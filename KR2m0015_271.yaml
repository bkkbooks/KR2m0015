body:
  text: 欽定四庫全書皇朝文獻通考卷二百七十一輿地考三盛京臣等謹按古帝王膺籙受圖天人協應必有王氣特鍾之地締造鴻基而後四海宅心大統茂集故居岐百堵致美於周詩過沛三侯流徽於漢史創業艱難發祥有自固非偶然也今之盛京為古青州之域居東方生物之位實符帝出乎震之義其水土深厚長白拱其東醫無閭控其西滄溟襟其前混同江黑龍江絡其後山海環抱為天下形勢之首蓋自開闢以來天作地藏以待首出之聖人我太祖高皇帝誕膺天眷撫有東土天命十年以瀋陽形勝之地遂定都焉太宗文皇帝底定全遼東至使犬使鹿之部罔不服屬世祖章皇帝統御寰宇定鼎京師尊盛京為留都設文武大員駐守其地聖祖仁皇帝孝思維則崇奉山陵大駕三巡躬修展謁又以平定羅剎闢地至黑龍江以北大興安嶺之外世宗憲皇帝善繼善述添設州縣增易駐防聖謨洋洋經書盡善我皇上丕顯丕承義昭繩武自乾隆八年暨十九年再謁園寢賜酺賜復恩澤便蕃賦有陪京之製舞成世德之辭奎藻宸章益光前烈蓋自承平纍葉以來聲教之隆文明之盛逾沙漠而被東瀛留都四境幅員萬里民物殷富風俗淳和瞻陵廟之巍峩仰宫廷之肅穆龍蟠鳯翥佳氣鬱蔥國家億萬年景祚鴻庥皆基於此矣盛京明洪武四年置定遼都衛八年改為遼東都指揮使司以領各衛盡罷所屬州縣改元之遼陽路地置定遼中左右前後五衛及東寧海州蓋州復州金州五衛改元之瀋陽路地置瀋陽中左右中屯四衛及鐵嶺衛改元之開元路地置三萬遼海二衛改元之廣寧路地置廣寧中左右前後五衛改元之大寧路地置廣寧中屯左屯右屯前屯後屯五衛及義州寧逺二衛永樂中復置安樂自在二州其迤東北混同江左右之境置努爾干都司領外衛一百八十四外所二十皆因其部族授為都督都指揮千百户鎮撫等職俾統其屬以時朝貢不在封域之內其後各相繼淪廢我朝發祥長白自逺祖定三姓之亂居俄漠惠之野鄂多理城在今寧古塔西南三百餘里國號滿洲是為滿洲國開基之始逮肇祖光復舊業始居呼蘭哈達山下之赫圖阿拉地方締造興京肇基王迹傳至興祖景祖顯祖積功纍仁基緒益大至太祖高皇帝創業鴻圖奄有哈達輝發烏拉葉赫及寧古塔諸地天命三年城界藩五年遷薩爾呼六年取瀋陽遼陽七年建東京於遼陽十年自東京遷都瀋陽太宗文皇帝天聰五年營造宫闕號為盛京於是全遼之地悉歸撫定世祖章皇帝統御六合入關定鼎以盛京為留都順治元年悉裁諸衛設八旗駐防官兵以內大臣副都統領之三年改內大臣為按班章京給鎮守總管官印十年以遼陽為府置遼陽海城二縣又於寧古塔設按班章京副都統鎮守之十四年罷遼陽府始於盛京置奉天府設府尹康熙元年改奉天按班章京為鎮守遼東等處將軍寧古塔按班章京為鎮守寧古塔等處將軍三年設廣寧府領廣寧縣錦縣寧逺州四年改鎮守遼東等處將軍為鎮守奉天等處將軍又罷廣寧府置錦州府移治錦縣仍𨽻奉天府尹是年奉天府又增置承德蓋平開原鐵嶺四縣改遼陽縣為州十年於吉林烏拉設副都統十五年移寧古塔將軍駐吉林烏拉留副都統鎮守寧古塔二十二年於黑龍江設將軍副都統二十九年移黑龍江將軍駐墨爾根三十年於伯都訥設副都統三十二年移黑龍江副都統亦駐墨爾根三十八年黑龍江將軍副都統皆自墨爾根城移駐齊齊哈爾四十九年於墨爾根設副都統雍正三年於阿爾楚喀設副都統四年於吉林烏拉置永吉州寧古塔置泰寧縣伯都訥置長寧縣俱𨽻奉天府五年設熊嶽錦州二副都統七年罷泰寧縣又於三姓設副都統八年於黑龍江城設副都統十年設九關臺門同知駐義州管理邉外土默特敖漢等部蒙古民人交涉事務十二年於故復州衛地置復州故金州衛地置寧海縣又於錦州府增至義州乾隆元年罷長寧縣九年於阿爾楚喀設副都統十二年罷永吉州十三年裁九關臺門同知以所管旗務改屬熱河之塔子溝廳二十七年又於拉林設副都統其全境自遼河左右則奉天將軍統之其東則吉林將軍統之其北則黑龍江將軍統之而副都統復分鎮於將軍所轄之地其餘各城各邉門又有城守尉防守尉等員分駐焉至編户之民則𨽻於州縣而以府統之共設府二其錦州一府仍屬於奉天府尹東西距五千一百餘里南北距六千八百三十餘里東至海四千三百餘里西至山海關接直𨽻永平府界八百餘里南至海七百三十餘里北至黑龍江外大興安嶺接俄羅斯界五千一百餘里東南至希喀塔山濱海界二千九百餘里西南至海八百餘里東北至赫哲費雅哈濱海界四千餘里西北至蒙古土默特奈曼各部界六百九十餘里自盛京至京師一千四百七十餘里興京在盛京東南二百七十里東西距二百五十五里南北距二百九十里東至吉林界三十五里西至奉天府承德縣界一百九十里南至鳯凰城界一百八十里北至奉天府開原縣界一百十里東南至吉林界十五里西南至鳯凰城界一百六十餘里東北至吉林界一百五十里西北至開原縣界一百三十里自興京至京師一千七百四十餘里明初置建州衛後廢本朝為四祖及太祖高皇帝發祥之地天聰七年設城守尉駐此乾隆二十八年增設理事通判廳凡駐防旗務以城守尉治之仍統於奉天將軍凡旗民交涉事務以通判治之仍統於奉天府尹奉天府東西距一百八十里南北距九百九十餘里東至撫順城界八十里西至錦州府廣寧縣界一百里南至海七百三十餘里北至開原縣發庫邉門接內扎薩克蒙古界二百六十餘里東南至鳳凰城界一百八十餘里西南至錦州府廣寧縣界三百里東北至威逺堡邉門接伯都訥界二百三十餘里西北至廣寧縣界一百里明洪武中置遼東都指揮使司治遼陽以領諸衛此為瀋陽中衛又兼為定遼中左右前後及東寧海州蓋州復州金州鐵嶺三萬遼海十三衛並安樂自在二州地本朝天命十年太祖高皇帝自遼陽遷都於此天聰五年尊為盛京順治元年以為留都設按班章京鎮守十四年設奉天府置府尹康熙元年以後改按班章京為將軍又增置各州縣以奉天府尹領州二縣六其錦州府各州縣亦兼轄焉自奉天將軍以下又分設副都統協領佐領等員凡滿洲蒙古漢軍八旗事務則統之於奉天將軍凡民人事務則統之於奉天府尹承德縣附郭明洪武中置瀋陽中衛屬遼東都指揮使司本朝建為盛京順治十四年置奉天府康熙三年置承德縣為府治遼陽州在府南一百二十里明洪武四年置定遼都衛八年改遼東都指揮使司置定遼左右前後四衛東寧衛及中左右前後等千户所並為都司治後又徙置自在州於城內本朝天命七年築遼東京城於遼陽城東五里九年遷都之十年由陽遷都瀋陽順治初設東京遼陽城守尉駐此十年置遼陽府領遼陽海城二縣十四年罷府為遼陽縣康熙四年升為遼陽州凡駐防旗務以城守尉治之統於奉天將軍凡民人事務以知州治之統於奉天府尹開原縣在府東北二百里明洪武中置都萬衛後又徙置遼海衛於此並屬遼東指揮使司永樂中於城內置安樂自在二州後徙自在州於遼陽城內本朝康熙二十一年設開原城守尉駐此康熙三年置開原縣凡駐防旗務以城守尉治之統於奉天將軍凡民人事務以知縣治之統於奉天府尹鐵嶺縣在府北一百三十里明洪武二十一年於鐵嶺城置衛二十六年徒置鐵嶺衛於此領中左右三千户所屬遼東都指揮使司禦本朝康熙三年置鐵嶺縣二十九年設鐵嶺防駐此凡駐防旗務以防禦治之屬於開原城守尉仍統於奉天將軍凡民人事務以知縣治之統於奉天府尹海城縣在府南二百四十里明洪武中置海州衛屬遼東都指揮使司本朝順治十年改置海城縣遼陽府十四年改屬奉天府蓋平縣在府南三百六十里明洪武中置蓋州衛屬遼東都指揮使司本朝天聰七年設蓋州防禦駐此康熙三年置蓋平縣凡駐防旗務以防禦治之𨽻於熊嶽副都統仍統於奉天將軍凡民人事務以知縣治之統於奉天府尹復州在府南五百四十里明洪武中置復州衛屬遼東都指揮使司本朝康熙二十六年設復州城守尉駐此雍正五年設復州通判轄復金二州之地十二年改為州凡駐防旗務以城守尉治之𨽻於熊嶽副都統仍統於奉天將軍凡民人事務以知州治之統於奉天府尹寧海縣在府南七百二十里明洪武中置金州衛領中左千户所屬遼東都指揮使司本朝康熙二十年設金州城守尉駐此雍正五年兼屬復州通判所轄十二年置寧海縣凡駐防旗務以城守尉治之𨽻於熊嶽副都統仍統於奉天將軍凡民人事務以知縣治之統於奉天府尹錦州府在盛京西南四百九十里東西距五百三十里南北距一百八十里東至奉天府遼陽州界二百四十里西至山海關接直𨽻永平府界二百九十里南至海四十里北至九關臺清河等邉門接內扎薩克蒙古界一百四十里東南至奉天府海城縣界三百五十里西南至山海關界三百里東北至奉天府開原縣界三百八十里西北至明水堂邉門一百六十里自府治至京師一千里明洪武初置廣寧中屯左屯右屯前屯後屯五衛與廣寧衛及廣寧中左右三衛寧逺義州二衛並屬遼東都指揮使司本朝康熙三年改置廣寧府治廣寧縣四年罷廣寧府改置錦州府移治錦縣領州二縣二雍正五年設錦州副都統駐此又分設城守尉佐領等員凡駐防旗務屬於錦州副都統仍統於奉天將軍凡民人事務屬於錦州知府仍統於奉天府尹錦縣附郭明洪武二十四年置廣寧中屯左屯二衛其城東南境又置右屯衛並屬遼東都指揮使司廣本朝康熙元年改置錦縣屬奉天府三年改屬寧府四年置錦州府以縣為府治寧逺州在府西南一百十里明初為廣寧前屯中屯二衛地宣德三年分二衛地置寧逺衛屬遼東都指揮使司府本朝康熙二年改置寧逺州三年屬廣寧四年改屬錦州府廣寧縣在府東一百六十里明洪武二十三年置廣寧衛二十五年封建遼王改廣寧中護衛明年復改廣寧衛又置中左右三衛並屬遼東都指揮使司本朝順治四年設廣寧協領駐此康熙三年置廣寧府並置廣寧縣為府治四年罷府以縣屬錦州府凡駐防旗務以協領治之統於奉天將軍凡民人事務以知縣治之屬於錦州知府義州在府北九十里明洪武中置義州衛屬遼東都指揮使司本朝初以其地賜察哈爾康熙十四年察哈爾叛討平之遷其部衆於宣化大同邉外十五年與義州設巡檢司屬廣寧縣十九年設義州城守衛駐此六十一年移錦州府通判臨治雍正十年改屬九關臺邉門同知管轄十二年升為義州屬錦州府凡駐防旗務以城守尉治之𨽻於錦州副都統仍統於奉天將軍凡民人事務以知州治之屬於錦州知府臣等謹按盛京為留守重地凡形勝扼要所在並設八旗駐防自將軍而下有副都統城守尉防守尉等官各有分治之地今奉天錦州二府全境皆奉天將軍統轄地也其各駐防之與州縣同城者已兼載入二府之內其有専城駐守地不屬於州縣者謹編次於左鳯凰城在奉天府東南四百二十餘里明初為鳯凰城堡設兵戌守後廢本朝天聰八年注官兵於通逺堡崇德三年移駐於此設城守尉及佐領防禦驍騎校等員管理駐防旗務雍正年間定旗民交涉事務分屬熊嶽通判管理牛莊城在奉天府海城縣西四十里明為海州衛地置牛莊驛於此本朝天命六年設防禦駐此管理駐防旗務臣等謹按以上屬奉天將軍統轄其興京城駐防已載奉天府之前東京遼陽城及開原城駐