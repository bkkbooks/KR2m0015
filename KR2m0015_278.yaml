body:
  text: 輿地考十福建省臣等謹按禹貢淮海維揚閩居海澨亦當為古揚州地然考其山川不見於經即貢篚亦不及焉蓋南境之荒徼也職方氏所列七閩鄭氏以為即蠻之别種漢雖𨽻㑹稽郡而建國閩越以封無諸則亦羈縻之義居多後漢遷其民於江淮而虛其地三國以後漸設官分邑顧統馭雖廣而比之江淮間之因地制賦猶未一轍焉唐時𨽻嶺南道後改𨽻江南東道遙控之而已至宋禮教漸盛名臣大儒每出其間然其初僅附於兩浙西南路元為江西行省所轄曽不得専列為省其與各省並稱為都㑹者實始於明時我朝承平日久戶口殷繁四民樂業其中縣復析縣而縣升為州州升為府迥非前代之規模疆域猶是而分理者日增無他田野闢而民人聚也若夫瀛海以外臺灣逺島袤延千有餘里入我版圖亦皆郡縣而編籍之以為全省屏障蓋由國家德威所播溟渤恬波所謂海隅日出罔不率俾者歟福建明福建等處承宣布政使司治福州府領福州泉州建寧延平汀州興化邵武漳州八府後復增直𨽻福寧州又置福建都指揮及行都指揮使司領福州等十六衛及將樂等守禦千戶所本朝初因之設福浙總督駐福州府兼轄浙江設福建巡撫及布政使司按察使司皆駐福州順治十五年令總督専轄福建一省康熙二十三年仍為福浙總督又置臺灣府雍正五年總督停轄浙江十二年復為福浙總督又升福寧州為府升泉州府之永春縣漳州府之龍巖縣為直𨽻州凡領府十直𨽻州二各衛所俱以次裁併入州縣東西距九百五十里南北距九百八十里東至海一百里西至江西贑州府瑞金縣界八百五十里南至海二百八十里北至浙江處州府龍泉縣界七百里東南至海二百八十里西南至廣東嘉應州鎮平縣界一千二百里東北至浙江溫州府平陽縣界五百十五里西北至浙江衢州府江山縣界八百二十五里在京師南六千一百三十里福州府為省治東西距三百九十里南北距六百三十里東至海一百九十里西至延平府尤溪縣界二百里南至興化府莆田縣界二百三十里北至建寧府政和縣界四百里東南至海二百八十里西南至泉州府德化縣治四百里東北至福寧府治五百四十五里西北至延平府治四百里自府治至京師六千一百三十三里明為福州府領縣九本朝初因之雍正十二年增置屏南縣凡領縣十閩縣附郭治府東境侯官縣附郭治府西境長樂縣在府東南一百里福清縣在府南少東一百三十五里連江縣在府東北九十五里羅源縣在府東北一百五十里古田縣在府西北二百七十里屏南縣在府西北三百四十里雍正十二年析古田縣地置縣閩清縣在府西北一百二十里永福縣在府西南一百六十里興化府在省治南二百四十里東西距二百十里南北距八十五里東至海九十里西至永春州界一百二十里南至海四十里北至福州府福清縣界四十五里東南至海一百里西南至泉州府惠安縣界六十里東北至福清縣治二百里西北至永春州德化縣治二百里自府治至京師六千四百有三里明為興化府本朝因之領縣二莆田縣附郭仙遊縣在府西七十里泉州府在省治西南四百十里東西距二百八十里南北距二百三十三里東至海一百三十里西至漳州府長泰縣一百五十里南至海一百三里北至興化府仙逰縣界一百三十里東南至海八十三里西南至漳州府龍溪縣界一百四十里東北至仙遊縣界九十里西北至永春州界一百五里自府治至京師七千二百五十五里明為泉州府領縣七本朝初因之雍正十二年升永春縣為直𨽻州以德化縣往屬凡領縣五晉江縣附郭南安縣在府西少北十五里惠安縣在府東北五十里同安縣在府西南一百三十里安溪縣在府西一百五里延平府在省治西三百六十里東西距二百七十五里南北距三百里東至建寧府建安縣界五十里西至汀州府清流縣界二百二十五里南至福州府古田縣界一百二十里北至邵武縣界一百八十里東南至古田縣界二百二十里西南至永春州德化縣界三百九十里東北至建寧府甌寧縣界一百三十里西北至汀州府歸化縣界二百六十里自府治至京師五千二百九十三里明為延平府領縣七本朝初因之雍正十二年以大田縣往屬永春州凡領縣六南平縣附郭順昌縣在府西少北一百二十里將樂縣在府西二百二十里沙縣在府西南一百二十里尤溪縣在府南一百六十里永安縣在府西南三百里建寧府在省治西北四百八十里東西距四百九十五里南北距四百三十里東至福寧府福安縣界三百四十里西至邵武府邵武縣界一百五十五里南至延平府南平縣界八十里北至浙江衢州府江山縣界三百五十里東南至福州府古田縣界二百五十里西南至延平府順昌縣界一百十五里東北至浙江處州府龍泉縣界二百二十五里西北至江西廣信府鉛山縣界三百四十五里自府治至京師五千七百五十五里明為建寧府領縣八本朝初因之雍正十二年以夀寧縣往屬福寧府凡領縣七建安縣附郭治府東南境甌寧縣附郭治府西北境建陽縣在府東一百二十里崇安縣在府西北二百四十里浦城縣在府東北二百七十里松溪縣在府東一百六十里政和縣在府東一百四十里邵武府在省治西北六百七十里東西距二百六十里南北距一百八十里東至延平府順昌縣界一百二十里西至江西建昌府新城縣界一百四十里南至延平府將樂縣界一百十里北至建寧府建陽縣界七十里東南至將樂縣界一百四十里西南至汀州府寧化縣界三百四十里東北至建陽縣界六十里西北至新城縣界一百六十里自府治至京師五千七百五十七里明為邵武府本朝因之領縣四邵武縣附郭光澤縣在府西北八十里建寧縣在府西南二百十