  text: 欽定四庫全書皇朝文獻通考卷二百六十九
  hash: sha256:4b12ca9361c09b170b21c18bd2106fd9b5044727c7780c8aadba23ce22421aa3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_269-1a, image: WYG0638/WYG0638-0241c.png}
body:
  text: 輿地考一臣等謹按馬端臨輿地考以禹貢九州為綱凡自宋以前之郡縣皆析載於其下蓋本杜佑通典之例顧其間分配疆域有不盡足據者禹貢分州但有山川之限非若後世郡國之書有四至八到之可考九州中惟兖豫青徐實居腹地猶可約略得之若冀州不言境界說者以為三面距河則其北界於河而極荆州曰荆及衡陽說者以為自衡以南無復有名山大川之可紀則其南界於何而止梁雍二州皆以黑水分疆自黑水之迹不明則其西界於何而判至於揚州之境北據淮而南距海自晉以後厯代諸史皆云五嶺之南至於海並為揚域然考禹貢山川及物産貢賦皆不及焉漢書所載南粵閩粵尚與西南夷同傳則自三代以前其曽通中國與否固莫得而知也於此欲按其界限分列地名使截然不爽難矣為九州之說者每曰禹以山川定疆界為萬世不易之書史家作志以郡縣為主郡縣一更而其書遂廢其言是矣不知郡縣能變其疆域而山川亦能混其疆域自山川未可盡慿而九州益難審考昔孔安國曰孔子述職方而除九邱九邱者九州之志也而除之存禹貢以著夏后治水之功而所述者職方也然則言地理者自當以今之郡邑為主豈必多為之說以求合於古哉抑又論之馬氏所纂者固自夏商周至宋十數朝之書也三代以後多襲古州之名止就其疆理所及分之故每代各有參差兩漢十三州晉十九州宋齊偏安而州名轉增多有僑置者蓋晉之冀州非即漢冀州本境宋之冀州非即晉之冀州本境諸州莫不類然梁魏之末益務夸張往往一郡之地而析置者數十一縣之名而復見者數四輾轉遷移循名失實幾於不可究詰至隋末改州為郡而古者以州領郡之制俱廢唐復改郡為州别設各道領之而宋又改稱為各路勢不得於一書之中屢更其體例兼之南北割據時邉境之守彼此不常晉末與十六國分地宋齊梁陳與北魏北齊北周分地唐末五代與十國及契丹分地朝隸南疆夕歸北界讀史者細辨方隅伊於何屬馬氏一以禹九州統之而後條理秩然至五朝續通考仍其舊例者亦以事閲數朝稱名互異必仍用九州分配而始歸畫一也洪惟聖朝丕基式廓分土辨方昭大一統之盛又何取拘牽前例以古州之名號冠當代之昄章乎且我皇清受天景命肇基東土撫有寰瀛幅􅊷之廣逺本有非禹迹所能限者而列聖相承重熙纍洽京師盛京而外為省一十有八分置各府以領諸縣諸州則參列其間或直隸如府或分治如縣至各邉外之地隸在輿圖者復以千萬里計四履之盛固已超軼漢唐今天子恢偉略靖遐壤月窟氷天皆歸疆宇境為亘古所未通事屬生民所未有其地之在古九州外者北自大青山左右為蒙古諸部至喀爾喀地南自五嶺外為廣東廣西及貴州地東北自盛京邉外為吉林黑龍江等地西南自四川境外為雲南及青海西藏地正西則自安西境外至於流沙而禹迹已盡其在天山北路則有烏嚕木齊伊犁等地天山南路則有喀什噶爾葉爾羌和闐等地自昔所稱近有龍堆逺則葱嶺天所以界别區域者今則建官授職因地屯田耕牧方興邉氓樂業其境且逺及二萬餘里若仍以九州為綱則是嬴出之地多於正數轉失分綱之本意矣兹編次輿地一門悉謹遵本朝之制自京師至各省以及各扎薩克部落凡地名之因革增省皆以見在者為凖試覘全盛之規模覽大同之版籍東越瀛壖西窮䝉泛北逾漠野南軼炎陬聲教之覃敷靡逺弗屆舉大荒以外之境無不棊置星絡包在提封彼自昔郡國地理之書局於州部限於方隅烏足語於聖朝無外之治哉京師臣等謹按古聖王辨方建國必以首善之區為㑹歸之極所謂王畿者四方之本而京邑者又王畿之本也今之京師為古燕薊之域地勢雄厚滄海環其左太行峙其右喜峰古北諸關口衛其後據九州之上遊南面而臨天下自古天府之國無過於此顧前代雖曽卜邑建都每以地近九邉控防是亟我聖朝德化逺被六合一家北至於瀚海南極於越裳東抵於朝鮮西窮於葱嶺名王部長莫不占風測海共赴梯航以形勢論之古稱河雒為九州之中而今之京師實又居天下之中故風聲四訖玉帛來同如水朝宗如星拱極用以統萬邦而撫方夏太平有道之鴻圖於兹永固矣京師明初為燕王封國永樂元年建為北京稱行在十九年稱京師洪熙初復稱行在正統六年始定為京師本朝順治元年世祖章皇帝定鼎建都於此為萬世之基直隸省臣等謹按禹貢首列冀州以其為帝都所在而甸服侯服綏服要服荒服又各有逺近之序誠以帝王聲教所訖本無間於東西朔南而必以邦畿為風化之首居重馭輕之勢然也夫古者中冀之區最稱廣大溯自軒轅涿鹿肇建帝畿其時畫野分州遂為萬世輿地之祖形勢之勝由來久矣禹貢分州於冀域不言境界蓋當時三面距河而北界所分說者以為當極陰山而止三代以後東南日嬴而西北日縮於是幽燕重地界在邉隅非特地運使然亦由德化之未廣故也今之直隸自遼金元明遞為畿輔我朝誕膺景命入關定鼎政教一新列聖相承以來漸仁摩義久道化成凡湛恩闓澤之涵濡直隸首先覃被焉其北自長城以外經野設官烟火桑麻遍成樂土已包越古冀州之境至於玉塞秋高合圍纘武斗車雲罕嵗舉時巡木蘭林壑之間儼成靈囿皆由聖朝威德丕宣化行蕃部舉龍沙朔漠之遙莫不隸於郊甸環衛京師實為亘古之所未有用奠我國家億萬世丕丕基猗歟盛哉又按自明改北平為北直隸而直隸之名以昉蓋以京畿之近不必别設布政使司而直隸於户部也然其時各道之分治近畿者仍假山東等省布政司參政諸銜故官與地每不能相符我朝以京師統馭各省而於畿輔設布政使司仍稱為直隸猶之漢置十三州部而司隸亦為一部唐置十五道採訪使而京畿採訪亦為一道也至於省之為名始於元之中書省及行中書省明代於兩京之外分置十三布政使司而亦得稱為十三省者以省為官司之署其名原可以通用皇清撫有區宇仍各布政使司之名惟改南直隸為江南布政使司復以江南湖廣陜西三處疆域較廣分設江蘇湖南甘肅布政使司雍正二年設直隸布政使司乾隆二十五年定江蘇設兩布政使司統計有布政使司之地凡一十有九惟是舊時一統志諸書即稱各省為各布政使司蓋沿明統志之例其實本朝設官分職因時變通有未可與前代同論者明之巡撫名寡無定有一布政司之地而多至數巡撫者有事則設無事則罷但為持節奉使之臣我朝則巡撫各有定員分寄以守土之責以京朝官之銜而兼統民事略如古之行臺省及元之行中書省其有専設總督者亦必以督臣兼巡撫之事至於布政使司但與按察使司分理錢穀刑名自不應専書於各省之首且如江蘇一省以兩布政司而總隸於一巡撫勢不得更將兩布政分列也國家創制顯庸務崇實政凡在詔諭所頒文移所用並稱各省兹編纂輿地考亦概書為省焉直隸明洪武初改諸路為府分屬河南山東行省廢上都路及大寧路二年置北平行中書省九年罷行省改置北平等處承宣布政使司二十年置北平行都指揮使司領大寧等二十二衛永樂元年以北平為北京罷布政使司以所領直隸北京行部以大寧衛僑治保定府而故地遂廢十九年改北京為京師各府州仍直隸京師共領順天保定永平真定順德廣平大名河間八府延慶保定二州宣德五年又置萬全都指揮使司領宣府等十五衛本朝順治元年世祖章皇帝定鼎建都其順天等八府二州及宣府鎮皆仍其舊因明治設順天巡撫駐遵化轄順天永平二府設保定巡撫駐真定轄保定真定順德廣平大名河間六府設宣府巡撫駐宣府鎮以直隸延慶保安二州屬之并設宣大總督駐山西大同鎮以宣府屬之五年設直隸山東河南三省總督駐大名八年裁宣府巡撫併於宣大總督十三年裁宣大總督以宣府屬於順天巡撫十六年裁保定巡撫改三省總督為直隸巡撫仍駐大名十七年移直隸巡撫駐真定十八年設直隸總督駐大名康熙初裁順天巡撫四年復改直隸總督為三省總督仍駐大名八年裁三省總督以直隸巡撫自真定移駐保定三十二年改宣府鎮為宣化府五十四年直隸巡撫加總督銜仍管巡撫事六十年巡撫罷加總督銜雍正元年改真定府為正定府又於古北口邉外增置熱河理事同知㕔二年改直隸巡撫為直隸總督復改守道為直隸承宣布政使司巡道為直隸提刑按察使司俱駐保定升正定府屬之冀趙深定晉五州為直隸州又於邉外增置張家口理事同知㕔三年改天津衛為直隸州七年升河間府屬之滄州為直隸州九年復升天津州為府以滄州屬之十年於邉外增置八溝理事同知及多倫諾爾理事同知㕔十一年於熱河置直隸承德州十二年升保定府屬之易州為直隸州以晉州仍屬正定府又於邉外增置獨石口理事同知㕔與張家口㕔多倫諾爾㕔並直隸於口北道乾隆元年於邉外增置四旗理事通判㕔五年增置塔子溝理事通判㕔七年罷承德州改置喀喇河屯理事通判㕔與熱河㕔八溝㕔四旗㕔塔子溝㕔並直隸於熱河道八年升順天府屬之遵化州為直隸州三十九年設烏蘭哈達㕔三座塔㕔四十三年升熱河㕔為承德府以喀喇河屯八溝四旗烏蘭哈達塔子溝三座塔等㕔置縣屬之凡領府十一直隸州六㕔三各衛所俱以次裁併入州縣其存者專司漕運不治民事東西距一千一百八里南北距二千餘里東至盛京錦州府寧逺州界六百七十八里西至山西大同府靈邱縣界四百三十里南至河南開封府蘭陽縣界一千四百三十里北至邉牆一百九十八里自邉外為熱河道口北道所轄地又四百餘里東南至海岸四百四十里西南至河南彰德府安陽縣界一千一百三十里東北至喜峰口邉牆四百二十里自古北口邉外為承德府地至木蘭圍場又五百餘里西北至山西大同府天鎮縣界五百三十里自獨石等口邉外為口北三㕔地又四百餘里臣等謹按自後漢書郡國志詳載里至後之地理家皆遵之晉裴秀禹貢圖序所列一曰分率二曰凖望三曰道里四曰高下五曰方邪六曰迂直說者為分率者計里畫方每方百里五十里之謂也凖望者某地在東西某地在南北之謂也道里者東西至某地若干里南北至某地若干里之謂也凖望以鳥道空虗之處測計道里以人跡屈曲之處測計自地有高下方邪迂直之不同故必合凖望與道里互相參驗而後得其實洵乎里至之不可不講矣杜佑通典元和郡國志太平寰宇記九域志等書皆於州郡下列四至八到之數馬氏輿地考用通典之例而獨刪其里至尚為疏略兹故備載其逺近之數焉順天府東西距四百七十六里南北距四百八十八里東至遵化州界二百四十六里西至宣化府保安州界二百三十里南至天津府青縣界三百十三里北至邉牆一百七十五里東南至天津府天津縣界二百里西南至保定府新城縣界一百七十里東北至遵化州馬蘭峪邉牆三百四十里西北至宣化府延慶州界一百三十里明洪武元年改為北平府為北平行中書省治九年為北平承宣布政使司治永樂元年罷布政使司改北平為順天府置府尹凡領州五縣二十二本朝初因之順治十六年省漷縣康熙十五年升遵化縣為州雍正九年增置寧河縣乾隆八年升遵化州為直隸州以玉田豐潤二縣往屬凡領京縣二州五縣十七統於順天府尹亦兼屬於直隸總督臣等謹按自昔京畿親民之吏視外郡品秩加優所以重帝都也漢置京兆尹左馮翊右扶風與各州刺史殊稱唐宋以來並稱為尹今之順天府曰尹曰丞列在京卿不儕於知府大興宛平二京縣亦較外縣秩加一等至於五城之地設兵馬司正副指揮使以分治之猶之漢之左右部尉唐之赤縣尉宋之都廂官也其統之以五城察院者猶之漢之司隸校尉也蓋輦轂之區四方所㑹設官分職整率攸資誠所謂教化之行建首善自京師始者矣大興縣附府京城內治東境宛平縣附府京城內治西境良鄉縣在府西南七十里固安縣在府南一百二十里隋開皇六年改置固安縣元中統時升為州明洪武初復降為縣因本朝之永清縣在府南一百四十里東安縣在府東南一百四十里元中統時為東安州舊治今縣西北境明洪武初復降為縣尋移今治之本朝因香河縣在府東南一百二十里明洪武十年省十三年復置本朝因之通州在府東四十里明洪武初省潞縣入州本朝順治十六年又以漷縣省入三河縣在府東一百十里武清縣在府東南一百二十里舊治今縣東境明洪武初移今治本朝因之寶坻縣在府東少南一百八十里寧河縣在府東南三百里金寶坻縣地明永樂初置梁城千户所本朝雍正元年改置寧河縣昌平州在府北少西七十五里順義縣在府東北六十里懷柔縣在府東北一百里密雲縣在府東北一百三十里涿州在府西南一百四十里房山縣在府西南九十里霸州在府南一百八十里保定縣在府南二百里文安縣在府南二百四十里大成縣在府南少東二百九十里薊州在府東一百八十里平谷縣在府東北一百五十里皇朝文獻通考卷二百六十九
