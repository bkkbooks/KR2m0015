body:
  text: 職官考七內務府內務府掌內府財用出入祭祀宴饗膳饈衣服賜豫刑法工作教習之事武備院上駟院奉宸苑皆𨽻焉總管大臣無定員於滿洲文武大臣或王公內簡用其屬有七司曰廣儲曰會計曰掌儀曰都虞曰慎刑曰營造曰慶豐臣等謹按國初置內務府設總管間以大臣總理順冶十一年裁十八年復設分司六曰廣儲會計掌儀都虞慎刑營造又設武備院上駟院與織染局康熙二十三年增慶豐司為七司又增奉宸苑其後以王公大臣管理府事廣儲司管理六庫郎中二人郎中四人內掌印一人員外郎十二人主事一人分掌庫藏以蓄經費凡六庫曰銀庫裘庫緞庫衣庫磁庫茶庫磁茶二庫康熙二十八年於表緞二庫內分設司庫十二人筆帖式二十六人初設員外郎八人康熙十八年增四人會計司郎中三人內掌印一人員外郎六人主事一人分掌內務府帑項莊園地畞戶口徭役之事筆帖式二十六人初設郎中三人康熙三十八年裁一人雍正元年增一人掌儀司郎中二人內掌印一人員外郎八人主事一人分掌宴筵祭祀禮儀樂舞之事司俎豆官五人贊禮郎十七人筆帖式二十二人初設郎中三人康熙三十八年裁一人都虞司郎中二人內掌印一人員外郎五人主事一人分掌內務府護軍訓練禁旅及畋漁之事筆帖式二十六人初設郎中三人員外郎六人康熙三十八年各裁一人慎刑司郎中二人內掌印一人員外郎四人主事一人分掌審讞刑獄核其情罪之重輕仍㑹同刑部定擬筆帖式二十人初設郎中三人康熙三十八年裁一人初設員外郎六人康熙三十六年裁一人六十一年又裁一人營造司郎中二人內掌印一人員外郎八人主事一人分掌繕修工作及煤炭陶冶之事司匠二十人筆帖式二十六人初設郎中三人康熙三十八年裁一人慶豐司郎中二人內掌印一人員外郎十人主事一人分掌牛羊羣牧及口外牧場孳息之事筆帖式十六人未設慶豐以前屬掌儀司管理康熙二十三年初設慶豐司員外郎六人尋增四人堂郎中一人主事二人凡府屬文職升補武職𨽻都虞司及奏章文移皆𨽻焉筆帖式三十八人管理江寧府蘇州府杭州府織造官各一人於內務府司官內奏派仍帶原銜所屬筆帖式各二人司庫各一人庫使各三人互見後直省官內管領三十人初設二十人康熙二十四年增四人三十年增三人三十四年增三人副內管領三十人初設二十人康熙三十四年增十人筆帖式八人分管承應供用等事凡內廷灑掃糊飾及三倉出納酒菜器皿皆司之初設米鹽庫郎中三人雍正元年裁并為管領管理三旗納銀莊郎中一人員外郎六人主事一人筆帖式十二人尚膳正尚茶正一等侍衛各一人二等侍衛各二人尚膳副尚茶副三等侍衛各一人尚膳三等侍衛六人尚茶三等侍衛三人尚膳藍翎侍衛七人尚茶藍翎侍衛四人主事一人筆帖式十二人奏事處內務府司員筆帖式無定數具奏各部院衙門及各省文武官員奏章䝉古侍衛無定數具奏理藩院及外藩䝉古王公奏章中正殿員外郎二人筆帖式三人雍和宫郎中員外郎各一人筆帖式三人咸安宫官學筆帖式一人南府景山筆帖式各二人藥房主事一人庫掌二人筆帖式十五人掌御舟筆帖式二人尚虞筆帖式一人鷹房鶻房筆帖式各二人狗房筆帖式三人官房租庫筆帖式七人庫掌一人刋刻御書處監造一人庫掌三人署庫掌四人筆帖式二人武英殿修書處監造二人庫掌四人署庫掌五人筆帖式五人養心殿造辦處郎中二人員外郎二人主事一人庫掌六人筆帖式十六人稽察內務府御史所屬筆帖式八人管畨役處辦事官二人於各司官內奏派兼管筆帖式四人於各處筆帖式內奏派兼管分掌緝捕逋逃及巡查內務府所屬各倉庫臣等謹按雍正四年初設番役以各佐領管領下兵丁挑取乾隆二十四年裁二十五年復設凡升除郎中至八品苑副等官由府簡選引見未入流司庫以下由府除授京察由總管考核分别具題請㫖遇三大節太和殿皇太后宫行禮與百官同皇后宫行禮於內右門外躬祀壇廟車駕出入則於午門外跪候如常朝總管率所屬於右翼門外總管於門階上各官依次列坐於階下都虞司司官察班直宿以總管一人如因事不能入直則以郎中代恭遇皇帝宿齊宫行幸駐蹕皇太后皇后在宫中奏留總管一人在京如遇皇帝進宫皇太后皇后在圓明園奏留總管一人在園恭逢皇太后皇后妃嬪出入總管一人率內府護軍統領參領內府護軍豹尾班扈從如總管乏人行文領侍衛內大臣以散秩大臣一人代凡用御寶恭遇行幸駐蹕總管一人同內閣學士於乾清門監視武備院掌陳設武備及給賜徴收之事卿二人所屬郎中一人員外郎八人初設六人康熙四十二年增二人主事二人筆帖式二十八人庫掌八人掌蓋三人司弓八人司幄三人司矢三人司匠八人臣等謹按順治初年設鞍樓以三旗侍衛三人領之設員外郎筆帖式等官十一年改鞍樓為兵仗局十八年改兵仗局為武備院康熙十五年分設甲庫鞍庫氊庫三十七年分鞍庫為二曰南鞍庫北鞍庫乾隆十四年定卿為二人一由內務府郎中一由侍衛簡用後上駟院奉宸苑同上駟院掌馬匹駝隻稽核芻牧之事卿二人所屬郎中一人員外郎四人初設六人康熙三十八年裁二人主事二人堂主事二人筆帖式二十五人廏長十七人牧長十一人大凌河牧長三十人上都達布遜諾爾效力筆帖式三人䝉古筆帖式七人牧長每犀額設一人無定員逹里岡愛同達里岡愛筆帖式三人臣等謹按順治初年設御馬監十八年改為阿敦衙門以大臣侍衛管理無定員設筆帖式十五人康熙十六年改為上駟院雍正六年定卿為三品奉宸苑掌理景山瀛臺闡福寺等處行宫圓明園等園王泉山稻田下