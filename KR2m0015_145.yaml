body:
  text: 欽定四庫全書皇朝文獻通考卷一百四十五王禮考二十一皇太后皇后妃嬪車輿儀仗臣等謹按周禮王后之五路重翟厭翟安車翟車輦車亦掌於巾車之職漢制太皇太后皇太后皇后法駕皆御金根車其非法駕則御紫罽軿車唐制重翟厭翟翟車安車之外又有四望車金根車鹵簿則減大駕之半宋制與唐略同明時中宫車輅儀仗較之前代差簡馬考有后妃命婦以下車輦鹵簿一門蓋唐宋后妃儀仗通稱鹵簿國初定皇太后皇后前陳設者曰儀駕皇貴妃貴妃所陳設者曰儀仗妃嬪陳設者曰采仗兹按皇朝禮器圖式敬謹編次標題不云鹵簿者遵今制也公主王妃命婦車輿儀從則别見於後云皇太后儀駕龍鳯輿一儀輿二龍鳯車一儀車二拂塵二提爐二香合二盥盆一唾壺一水瓶二馬杌一交椅一九鳯曲蓋一九鳯蓋十花蓋四方繖四龍鳯扇八鸞鳯扇八金節二龍鳯旗十臥瓜四立瓜四吾仗四龍鳯輿木質髤明黃通髙七尺穹蓋二重髙一尺五寸五分上為八角各飾金鳯下方四隅飾亦如之冠金圓頂七寸二分鏤雲文銜以雜寶簷縱五尺橫三尺七寸六分明黃緞幨上深三尺下深一尺一寸皆銷金龍鳯四柱各髙四尺七寸縱四尺上橫二尺九寸下二尺三寸五分皆繪金龍鳯櫺四啓青紃網之前為雙扉髙二尺六寸濶二尺一寸啓扉則舉櫺懸之內髤淺紅中置朱座髙一尺七寸倚髙一尺八寸坐具明黃緞彩繡龍鳯前加撫式亦髤明黃繪金龍鳯直轅二各長一丈七尺二寸五分大橫杆二各長八尺中為鐵鋄金鳯相向小橫杆四各長三尺肩杆八各長五尺一寸皆髤明黃橫鉆以銅縱加銅鋄金鳯首尾舁以十六人儀輿木質髤明黃通髙六尺一寸上為穹蓋髙七寸冠銀圓頂塗金髙六寸五分簷縱四尺九寸橫三尺八寸四隅繫黃絨紃屬於直轅明黃緞幨深一尺二寸四柱各髙四尺八寸縱四尺二寸橫三尺一寸門髙三尺九寸濶二尺七寸明黃緞幃黃裏中置朱座髙一尺七寸倚髤明黃髙一尺八寸繪金龍鳯坐具明黃緞亦繡龍鳯直轅二各長一丈五尺六寸橫杆二各長七尺八寸中為鐵鋄金雙鳯相向肩杆四各長五尺三寸俱髤明黃兩端鉆以銅鋄金舁以八人龍鳯車木質髤明黃通髙九尺五寸穹蓋二重髙一尺七寸上繪八寶八角各飾金鳯下繪雲文四隅飾亦如之冠金圓頂八寸五分鏤雲文銜以雜寶簷縱四尺九寸橫四尺明黃縀幨上深三寸下深一尺一寸蓋明黃絡四隅繫明黃絨紃屬於軫四柱各髙三尺三寸縱四尺八寸橫三尺一寸左右及後皆繪金龍鳯中各啓櫺青紃網之門髙三尺濶一尺八寸五分上鏤金龍鳯相向明黃緞幃黃裏坐具明黃緞彩繡龍鳯輪徑各四尺九寸各十有八輻轅二各長一丈七尺五寸鉆以鐵鋄金軫長六尺二寸濶三尺三寸駕馬一儀車木質髤明黃通髙九尺九寸穹蓋上圓下方髙一尺冠銀圓頂塗金髙七寸七分簷縱五尺六寸橫四尺二寸五分四隅繫明黃絨紃屬於軫明黃緞幨深一尺二寸四柱各髙二尺九寸縱四尺八寸橫三尺三寸不加繪飾裏髤淺紅明黃緞幃黃裏坐具明黃緞彩繡龍鳯輪徑各四尺各十有八輻轅二各長一丈五尺九寸鉆以鐵鋄銀軫長五尺九寸濶三尺五寸駕馬一拂塵朱氂為之長二尺三寸結於木柄髤以金上飾鏤金鳯首銜小金環以綴拂下飾鏤金鳯尾通長二尺六寸八分末鏤金錢形垂朱緌提爐笵金為之通髙八寸六分深四寸五分口徑三寸二分腹圍一尺六寸七分蓋髙二寸一分環鏤芙蕖下垂雲葉頂為立鳯項鏤花文雙鳯為耳三足各髙一寸五分提以金索三上冠雲葉旁繫索以屬蓋提杆攢竹髤朱長三尺九寸兩端飾金鳯首尾上綴金鉤於雲葉提之陳設時承以八角盤口徑一尺一寸二分底徑九寸七分通髤朱繪金龍鳯置方几上几髙一尺五寸七分上徑一尺四寸六分下徑一尺四寸八分四足鏤螭首虎爪承以圓珠下周橫距通髤以朱面繪龍鳯周繪行龍香合笵金為之橢圓有蓋通髙五寸二分口縱七寸二分橫四寸二分蓋髙一寸三分面為立鳯周為翔鳯四口為回文下深一寸二分亦鏤雲鳯回文間以火珠足髙四分盥盆笵金為之形圓十二稜髙三寸九分口徑一尺二寸九分邊鈒花文八寶底徑一尺一寸鈒花文中立雙鳯唾壺笵金為之通髙六寸七分口徑四寸六分鈒雲文回文蓋髙二寸頂為立鳯髙二寸五分旁為流雲下深一寸八分底徑二寸二分座髙四寸五分徑三寸三分四足鏤螭首虎爪承以圓珠下周圓距水瓶笵金為之大小各一大者通髙一尺五寸五分深一尺三寸口徑四寸鈒花文腹圍二尺七寸七分鈒雲鳯火珠下為如意雲文耳為螭首銜環底徑六寸蓋髙一寸徑六寸頂為立鳳髙二寸七分小者通髙一尺四寸五分深一尺一寸口徑三寸四分腹圍二尺五寸七分底徑五寸四分蓋髙一寸徑五寸七分形制花文皆同自香合至水瓶陳設時盤及几俱如提爐之制馬杌木質塗金髙一尺六寸方一尺九寸面繪金龍鳯間以流雲中為火珠四角飾鏤金花文四足為螭首虎爪承以圓珠下周橫距雜繪八寶交椅木質塗金交足橫距貫以鐵樞雙疊舉之通髙二尺九寸五分縱一尺一寸五分橫二尺二寸四角飾鏤金花文座面織明黃絲縧倚刻龍鳯踏几髙三寸三分縱九寸五分橫一尺八寸六分亦塗金九鳯曲蓋明黃緞為之黃裏通髙一丈二尺二寸蓋徑五尺三寸繡流雲上冠金頂七寸五分垂幨三層各深一尺三寸繡彩鳯九間以花文旁垂彯帶二長三尺五寸濶二寸九分如蓋色亦繡彩雲曲柄為木質塗金龍首二徑二尺三寸上下攢竹髤朱上長三尺七寸下長五尺三寸九鳯蓋以緞為之五色各二鳯及雲文花文皆銷金直柄長一丈一尺餘制同九鳯曲蓋花蓋明黃緞為之彩繡八寶雜花柄同九鳯蓋方繖紅緞為之方五尺垂幨三層不施繡文旁垂彯帶二柄同