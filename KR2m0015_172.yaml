body:
  text: 樂部十八樂歌四皇帝筵宴樂章康熙二十二年定皇帝升座丹陛大樂奏協平之章聖皇涖止穆穆皇皇百爾卿士章服斯光吹笙鼓琴式燕嘉賓萬福既同歸美一人皇帝還宫丹陛大樂奏興平之章湛湛零露維豐之芑猗與在公思皇多士宴示慈惠以洽百禮敬慎威儀福祿來只皇帝三大節筵宴樂章乾隆七年定進果丹陛清樂奏海宇升平日之章海宇升平日景物熙然遍乾坤草木樂清時河清海宴麥雙岐麟遊鳳集枝連理風淡淡日依依正蓬壺乍啓奉天顔有喜金門嶰竹傳仙吹金猊篆裊香烟細合殿歡聲殷地一統山河萬年天子一解佳氣佳瑞滿皇畿天門詄蕩御筵披千峯叠嶂排晴翠動龍蛇日暖旌旗菁葱玉樹萬年枝晏溫溫玉戺金墀二解天上四序平分嵗皇心惟念小民依一自農功始祁寒暑雨遍疇咨崇墉櫛比豐樂成民瑞真民瑞茅簷外簫鼓樂豳詩三解溯當年深仁厚澤到於今纍洽重熙皇心繼述踵前徽勤宵旰敕惟時惟幾四解孝享吉蠲修祀事捧明粢于豆于登祝繁禧為民祈聖心無逸天休至天心錫福聖無為聖無為太平恭已垂裳治五解得賢臣襄上理賁干旌連茹彚征至蟬有緌鷺在墀九苞揚彩映朝曦來集上林枝六解民俗恬熙盈寧婦子康衢黃髮偕兒齒食舊德服新菑想中天堯舜世鼓腹共遊嬉亦越于兹戴堯天遵舜軌七解重譯來時梯航萬里冠裳玉帛圖王㑹於萬載太平基想中天堯舜世鼓腹共遊嬉亦越于兹載堯天遵舜軌八解皇心和豫陽春似自萬類光輝盛美四海共傾葵五雲齊獻瑞趨辭進酒丹陛清樂奏玉殿雲開之章玉殿雲開金門春在蓬壺界日月昭回景福齊天大一解乾坤清泰五雲深處是三台看勾陳北指更閣道南回明朗朗左樞兼上相爛熒熒龍角枕河魁際中天珠連壁合仰紫極麕至鳬來一人有慶萬國春臺二解府事修和籲俊才扇仁風遍九垓萬方樂育仰栽培一人宵旰符真宰幾康劼毖天工代民生亦快哉饔飱厪聖懷勵憂勤保大持盈泰歌帝力望堯階三解香馥馥葡萄潑醅天漿泛玉罍光灔灔露從仙掌開北斗傾萬夀觴南山獻延夀杯慶玉食萬方來四解看蓬瀛春暖林巒間早梅喜風和日麗年華入睿才况山巔水隈玲瓏萬卉開緑芊芊蘚似茵紅灼灼花如海雨過也隱隱輕雷五解到清和暑風來茂對乘時長景恢台敞水殿紅紛緑駭曳暄颸楊栁毰毸六解金飈至商序回清秋皓月揚光彩芙蓉初日舒蓓蕾平疇䆉稏黃雲靄嵗登大有萬民歡皇仁優渥敷天戴七解寒雲沍四序該一陽來復天心泰兕觥釃酒公堂介豐年蠟饗吹豳賽乾資美利本無言帝恩廣運真無外八解天呈瑞愜睿懷金鏡光輝玉燭和諧鳴鳳雍喈堯棟上雲影徘徊舜琴中愠為吾民解奏南薰還阜民財冠裳玉帛圖王㑹皇風蕩蕩聖德巍巍九解淵思往代茅茨土階不圖不繪黃幄心齊不築崔嵬不重玫瑰不貴腥羶菹醢却猩蜃減豹胎惟寶賢才亦有鹽梅和舟楫九棘三槐念民依饑渴殷懷願時和田不汙萊神倉御廪藏精稗五風十雨無僭無差十解日晶熒雲靉靆蓂葉芳生玉階紺露丹霞接上台帝居深在蓬萊泛瑶觴玉斝雲罍宫漏銅壺緩緩催頌元首明哉喜君賡臣拜太平時節萬年杯趨辭進饌中和清樂奏萬象清寧之章萬象清寧海宇承平瑞日麗彤廷乾主大生坤職資生四序不言而成宸居端拱敷皇極帝道無為法健行五緯明百度貞萬邦額手歡慶一解軒圖麗日懸金鏡堯階蓂莢舒長景陽回黍谷開春令帝車運轉杓携柄天道本無言主德惟居敬萬方感頌吾皇聖二解歡幸纍洽重熙際太平萬國獻葵誠簪紱盈庭筐篚充庭圖王㑹奏咸英微颸不動珠簾捲露溥溥仙掌髙擎酒初馨薦瑶觥共祝一人有慶三解彤墀上花磚布影瑶階上爐烟細生鳳凰鳷鵲敞雲屏宫漏悄玉壺清四解泰階久平大有屢登上林草木瑞光凝卿雲景星梯航萬國冠裳整香烟盎盎排蓮井宫殿風微仙樂盈九成韶簫來儀鳳肅穆天容睟以清五解庭燎初炳仰垂裳一人有慶明離午正又千道彩霞籠瑞景西山峩峩分翠黛共南山獻夀北斗天漿溟涬天長地久永兹九野盈寧萬方綏定六解念世德承天命况復寶籙鴻圖嘉祥嵗嵗呈五風十雨九穗雙岐紫芝朱草榮木華連理更兼之屈軼階前指佞七解欣慶際昌期觀聖政億萬載培周鼎宵衣旰食日邁月征殫厥心為民求瘼菖葉抽時花綻杏寫豳風又思省春省秋省八解玉振金聲皇朝功德慶成從此年年獻兕觥佳節良辰喜交併傾堯酒堯棟雲生夀籙綿綿天共永趨辭又定上元筵宴樂章皇帝升座中和樂奏怡平之章皇心保太和海宇升平樂事多瓊樹長新柯氷泮春流漲玉河晴雲展細羅擎堯酒泛天波花舞鳥能歌齊拜手賦卷阿皇帝還宫中和樂奏升平之章時雍頌帝堯玉珮鏗鏘慶早朝紫禁瑞烟飄春意凌寒上栁條和風禁院饒陳仙樂奏簫韶三五正良宵宫漏永月輪髙除夕元宵上燈中和清樂奏火樹星橋之章火樹星橋爛煌煌燈月連宵夜如晝春風料峭鈞天奏徹奏徹簫韶烟雲中瑞靄交籠著鮫鮹錦繡叢萬花繚繞魚龍夭矯嵩祝聲髙一解分明是洞天是絳霄分明是靈臺靈囿靈沼更春光乍到景物暄妍雨露饒又黃上栁條漏泄青陽在野橋二解賀聖朝世德遙鬱曈曈日麗層霄聖嗣聖重明繼照萬民歡樂萬方熙皥升平節瑞應昭瓊蕊飄蕭寶殿開法曲雲璈魚龍夭矯嵩祝聲髙三解金支麝氣飄西吠琉璃四照影娥池鳳燭燒百子池涎爇龍膏九華燈篆烟消寒星纍纍綴銀霄蟻穿九曲珠光耀好良宵是皇家景福滔滔四解滿山椒花簇百枝嬌月輪正髙燈和月一片氷霄是皇家景福滔滔五解殿當中黼座髙春悄銅壺漫敲笙歌千萬里而遙是皇家景福滔滔六解良宵正好正好良宵看皇都萬井多娛樂良宵正好正好良宵蓬壺清窈銀海光搖百和香霏瑶島紫羅囊繡綵飄花匼匝東風吹飽同慶清朝七解小梅梢暗香浮動淡烟籠罩月上柔枝露滴輕苞今宵裡巷舞衢歌遍寰瀛同慶清朝八解願春光年年好三五迢迢不夜城燈月交奉宸歡暮暮朝朝成矞成卿萬朵祥雲護帝霄趨辭耕藉筵宴樂章雍正二年定進筵奏雨暘時若之章祥開黼座兮布瓊筵歌迭奏兮天樂宣三推既舉兮賜豐年五風十雨兮時不愆優渥霑足兮溉大田皇心悅豫兮福祿綿進酒奏五榖豐登之章龍犂轉兮春風生帝勤稼穡兮供粢盛戒農用兮勸服耕富教化行兮百榖成禾九穗兮麥兩莖黍稷種穋兮充棟楹嵗登大有兮怡聖情堯樽特進兮玉醴盈勞酒禮飲兮邁鎬京進膳奏家給人足之章嘉禾炊饌兮雲子芳仙厨瓊粒兮七箸香吾皇重農兮禮肅將明昭感格兮錫嘉祥千倉萬箱兮百榖穰崇墉比櫛兮遙相望豐亨樂利兮遍八方家多充積兮野餘糧含哺鼓腹兮化日長朝饔夕飱兮夀而康萬邦同慶兮璿圖昌乾隆七年重定進果丹陛清樂奏喜春光之章喜春光將瑞靄集斗杓運農祥正土脈融平野水泉滋景風至農夫塗脛長隄栁繭館條桑映蓑共笠村謳相永頌元后眉夀萬年育我民四方歡慶一解看風烏翔玉樹外帝座臨瑶階影百辟趨搢笏共朝天摳衣拜田夫瞻望簫韶奏磬管聲依永寢園內朱櫻初迸玉井藕十丈移根安期棗似瓜晶瑩二解是瑶池來閬苑薦世間物如何並嵰雪甜王母逺相將笑留核氷桃還勝吾皇念菽粟真民命異物捐芳甘俱屏富方榖在嵗有秋勞則思若時恆性三解辨土宜頒月令遍紫陌野人望杏玉盤待賜紅垂上苑櫻趨辭進酒丹陛清樂奏雲和迭奏之章雲和迭奏聽倉庚載鳴玉壺清漏萬井歡娛桑柘隂濃緑樹稠紅墻外栁絲微軃鴉黃瘦更桃李暄妍晴晝聖天子勞民勸相今日青轅黛耜芳塍如繡一解霞觴獻夀願吾皇萬年與天齊耉玉斚尊罍柏葉芳馨緑蟻浮彤墀下緋衣玉帶兼青綬更父老摳趨在後共慶祝皇圖鞏固從此五風十雨年年大有二解皇心在宥念春風始和不忘耕耨婦子盈寧宵旰仍懷饑溺憂深宫內心齊常屏瑶池酒喜天藉既栽黃茂坐廣厦與民同樂但見遐阡邇陌黃童白叟三解芳㫖陳金石奏進九醖在廷拜手萬年永錫稱觥樂有秋趨辭進饌中和清樂奏風和日麗之章風和日麗時鳥初喚春晴卓午清甽外一犂春雨玉砌旁萬年芳樹共慶天田成禮後聖主一遊一豫看零雨桑田疏疏秧馬闐闐村鼓一解雲開寶殿玉案初進金盤齊舉蘭英末盈盈翠醑蓬池鱠紛紛細縷玉粒長腰雲子飯來自神倉天庾正樂奏咸英春旗簇仗塗歌巷舞二解吾皇厪念四海黔首吾胞吾與所無逸九功六府繪豳風築場治圃一粟一絲民力在信是農家辛苦更問夜求衣亮工熙績治登三五三解勸九歌修六府飭太史順時瓜見土禮成樂備堯厨扇箑蒲趨辭皇帝升座還宫中和樂章與三月常朝同幸翰林院筵宴樂章乾隆九年定皇帝升座中和樂奏隆平之章龍文五色偕羽葆亭童法駕來祕閣列清才就日瞻雲瀛丈隈象緯正三台糾縵縵卿雲回元首實康哉舟用楫鼎需梅皇帝還宫中和樂奏顯平之章恩光浹面槐瀛洲十八並追陪南山頌有臺酒醴笙簧霖雨諧帝屣下蓬萊金枝靄秀華堆文光耀九垓求千里始於隗進果丹陛清樂奏文物京華盛之章文物京華盛論道崇儒萃衣冠禮樂在鴻都木天藻飾舊規模翬飛鳥革何軒翥麟在囿鳳棲梧牙籖分四庫更藝香辟蠧綺窗青瑣連朱户飈輪不隔瀛洲路鈴索丁東風度僚宷雍容鵷行鷺序一解欣遇欣遇小春初五雲深處啓鑾輿鳴鳶風細雲霞曙擁橋門萬嵗山呼詞林曠典古今無泝心源上接唐虞二解聖皇自昔需元輔都俞吁咈矢嘉謨斆學先稽古旁求爰立夢相符後先疏附左右皆心膂皆心膂如魚水在藻更依蒲三解况我朝雨露涵濡採瓌材並植天衢承明著作重璠璵欲方駕子雲相如四解聖學髙深超邃古得元珠乙夜丹黃性所娛不知劬琳琅宛委圖書府赤文緑字德充符德充符淳龎渾厚登三五五解戞球琳鳴筍虡際中天堂上虞琴撫獻堯尊接舜壺金虀玉膾出仙厨湛露共沾濡六解琬琰天書鸞翔鳳翥羲文奎畫雲霞護光藻井麗金鋪矢卷阿零露湑枚馬共嚴徐億萬斯年慶龍光歌燕譽七解朂爾簪裾勉思建樹風雲月露終無取崇實行是真儒矢卷阿零露湑枚馬共嚴徐億萬斯年慶龍光歌燕譽八解翠華臨幸恩光溥重儒術榮生藝圃天祿被春風石渠沾化雨趨辭進酒丹陛清樂奏延閣雲濃之章延閣雲濃蘭臺日麗鑾輿涖香泛玻璃九醖傳仙醴一解深嚴丹地髙張黼座面南離看黃庭碧䕃早清露晨晞錦斒綵仗和風度玉琮琤香階晝漏移光瀲灔雲開蓬島露氤氲香裊金猊鳯來丹穴鶴在軒墀二解雲漢為章際盛時命冬官斧藻施雕楹玉磶煥雲楣采椽不斫無華侈五經貯腹便便笥臨軒集衆思賢才聖所資慕神仙虛妄誠無謂惟得士致雍熙三解啓天祿斯文在兹宵燃太乙藜入承明花磚日影移覆錦袍䝉眷禮撤金蓮歸院遲賜玉膾自蓬池四解緬崆峒問道虛懷謁具茨更金華侍講流清鑒不疲信鴻逵羽儀通經淺漢韋樂橫汾宴鎬京歌在藻思行葦咸英奏春酒初釃五解集簪裾宴鳳池栁外輕颸曲沼漣漪陋宋主賞花垂釣笑唐宗結綵評詩六解班聨肅樂有儀天厨下逮皆珍味凝甘天酒還如醴御爐靉靆香烟細賡歌揚拜萬年歡年年侍奉天顔喜七解天顔喜福履綏太和保合中天世珠聨璧合奎垣麗一心妙衍圖書祕賡歌揚拜萬年歡年年侍奉天顔喜八解玉河東抱清且漣兮斯干既咏不日成之稽古論思銀榜親題用作儒林之氣培其根達其支無二無欺若作和羮為舟楫唯爾攸資思贊襄日有孜孜亮天工庶績咸熙須將器識先文藝有為有守汝翼汝為九解湛露濃卿雲麗滿院芝蘭臭味秋水蒹葭寤寐思鶴書時賁巖隈伴青松商雒仙芝拜手羣歌既醉詩更束帛安車遍山巔水