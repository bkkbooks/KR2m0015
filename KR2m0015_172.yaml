商右第四章丕承太宗允揚前烈倬彼松山明戈耀雪以寡敵衆杵漂流血惜無故老為余詳說右第五章余來故邦瞻仰橋山慰我追思夢寐之間崇政清寧載啓南軒華而不侈鞏哉孔安右第六章惟我祖宗欽天敬神執豕酌匏咸秩無文帷幔再張樽俎重陳弗渝弗替遵我先民右第七章先民宅兹載色載笑今我來思聖日俯照爵我周親藎臣並召亦有嘉賔歡言同樂右第八章懿兹東土允惟天府土厚水深周原膴膴南陽父老於是道古有登其歌有升其舞右第九章我歌既奏我舞亦陳故家遺俗曷敢弗因渾灝淳休被於無垠勿替引之告我後人右第十章盛京筵宴舞詞皇天明命篤生太祖錫之聖智奄有東土於聖太祖開基創業始制國書同文六合曰若太宗嗣承天命肇造區夏仁育義正太宗如天丕冒純德於鑠大清懋建皇極興京聿興盛京斯盛惟其至仁九有託命欽惟聖皇追慕深思率祖攸行惠我嘉師敬觀實録日星為昭祖業艱難中心忉忉乃頒明詔播告臣氓恭謁祖陵旋軫陪京皇帝篤誠珠邱展覲文武從臣駿奔效藎我皇聖哉細大不遺從臣文武體恤周知乃出邉關乃經䝉古閲七愛曼蕃部悅舞御光逺臨旃裘畢來宸衷軫念錫賚恩恢受我皇恩祝我聖皇合十膜拜恩膏溥將涖克爾素駕言行狩手格虎殪馬射熊仆英哉我皇舍矢如破獲獸孔多萬人腹果爰涖舊邦爰謁三陵既躬既親我心則平豈敢憚逺豈敢畏險至止禮成心猶繾綣皇帝大孝承祭至敬肅將明禋萬邦為鏡皇仁懋哉重齒敬老清問殷勤德施浩浩盛京涖止臨朝閲武御崇政殿恩敷率土乾清宫普宴宗室世德舞樂章乾隆四十八年定天開聖清覺羅肇興列祖繼序統一寰瀛右第一章溯祥長白垂統發蹟幅員廣大景附悅懌右第二章聖皇立極與天比崇純常茀祿昌後隆宗右第三章篤親九族錫恩單厚金黃帶垂峩冠品授右第四章枝蕃蕚榮皇情則怡嘉承天和方春載熙右第五章璇宫肆筵宗人爰集黼繡盈廷班行辨級右第六章皇眷有喜便蕃賚豫侍衛賜茶恩涵露醑右第七章肫仁普澤大府頒金皇慈既渥以洽壬林右第八章宗人拜舞臚歡忭祝億萬斯年永綏多福右第九章平定金川凱旋筵宴德勝舞樂章乾隆十四年定乾隆聖世瀛寓乂康元首惟明股肱惟良景運鴻昌休德懋著統馭八埏惠液遐布金川小醜蠢爾冥頑惟時弗率跳梁窮邊用申天討聲罪執言長驅驛駕油雲斯屯聖謨廣運决機萬里聿簡賢臣良弼是荷曰忠曰勇經略戎功心堅金石誠格蒼芎身先蒸徒跋履岩阻晨夕盡瘁均勞共苦奸宄是殛逆諜是攘國憲孔昭我武孔揚窟穴犂止巖巢圯止堅卞隳止峻碉毁止爰禠其魄爰喪其膽震衣股栗潛伏於坎如鼠竄穴如鱗遊釡號呼哀籲再三求撫元臣執義憤欲蕩除帝德好生曰免駢誅六條攸約䖍栗遵循恩綸祇奉解網施仁丕革厥心匍匐奔赴除道築壇香雲擁路帝仁覃敷六合滂洋蘇其枯朽錫以再生展也滿兵彌月成功云何其速皇猷是憑神功炳焯乾坤軒豁九重勝算明並日月勒諸琬琰昭諸汗青禮成巨典樂奏升平膚功克奏慶筵是侑太和氤氲翔洽宇宙卿雲糾縵景緯珠聨梯航琛賮億萬斯年平西凱旋筵宴德勝舞樂章乾隆二十五年定祖志繼成翦滅逺叛籌畫從容疆闢二萬川原式廓乃經土田廟算宏深天心契焉車楞內訌丐恩臣服爵賜王公周恤其屬鬼域阿首匍匐帝庭寵以藩服秉鉞専征俘達瓦齊再生曲宥念彼軍勞崇封晉授阿首狡獪將伏天誅妄兾非分叛於中途反覆二心棄厥妻子役屬離散巨惡宜爾汲水萬里欲息燎原似彼狂首徒然自燔竄俄羅斯疫戕其命遐方尊王獻尸于境滿洲索倫凌波飛渡奮勇莫當峻嶺爰度俘厥逋逃收彼牲畜取彼子女如摧朽木弓矢所加賊壘莫禦急思兔脫震駭無措蠢爾賊衆作亂變更帝德涵濡惸獨遂生豈曰窮兵豈曰黷武乘時遘㑹忍弗逺撫回首在囚解其禁錮甫還庫車流言煽布惟彼凶渠負君莫比罔念聖恩能勿切齒伊犂既輯諸部賔服預策久長悉收回族二賊潰逸命將追遏踰其穴巢直抵巴達爰遣侍衛乃得其情回長搏顙獻馘輸誠邃古莫稽列史具在殱冦如斯未有擬類欃槍淨掃寰宇升平師出以正中外永清睿謨惟誠宵旰無逸宏奏膚功聖心斯懌順我者昌逆我者亡旌别恐遺天語孔彰酬庸封爵表勇錫名昭兹懋賞章采聿明誅鋤元惡大功告成如春育物德合清寧筵宴笳吹樂章乾隆七年定牧馬歌人君之樂恃此紀綱兆民之樂恃我君王室家孔宜夫君之力朋友有成和輯之德古歌與牧馬歌同調八種成壞兮實人世之常墮迷網中兮欲鎖與情韁愚人無識兮樂兹殊未央執空為有兮謬語其奚當如意寶與牧馬歌同調不澡心於羣經具本性而無明不服膺於佛乘說妙行而聽熒佳兆一人首出萬國尊親湛恩汪濊普被生民百花敷榮一日悅目灌頂寶光萬衆所伏誠感詞與佳兆同調良胡畏哉襄以至誠良胡過哉竭已所能良胡僞哉語無文飾良胡怠哉罔敢休息吉慶篇與佳兆同調有君聖明逾戴天有臣靖共勝後嗣健婦持家過丈夫如意寶珠惟孝子肖者吟與佳兆同調滅除已罪仗佛真言如欲療病惟良藥存菩提燈兮出衆生於黑暗知慧梳兮櫛六欲之糾纒君馬黃大海之水不可量天府寶藏奚渠央良朋和睦益無方聖有謨訓垂無疆懿德吟與君馬黃同調人君能仁蒸黎之父君子和平羣相肺附懿厥哲人實惟師傅匿智懷私乃民之蠧善哉行惟安惟和心意所欲無二無虞朋友式榖樂土謡與善哉行同調分人以財惠莫大焉施人以慧寧不踰旃踏搖娘日將出兮明星煌煌夀斯徴兮秀眉其龎三十維壯五十遲暮莫親祖母莫尊祖父頌禱詞與搖踏娘同調我馬蹀􅞃行如流水雋英滿座交親悅喜族䣊姻婭咸富且貴酌酒為歡既多且㫖慢歌與搖踏娘同調十五歡娛八十衰壯容華茂遲暮悲祖妣最親祖尊哉唐公主遵王之路兮愆尤希素位而行兮夫奚疑丹誠曲與唐公主同調罔有敗事兮遵道而行長無離析兮順親之情明光曲與唐公主同調瞻彼日月虛空發光聖君聖母焜耀萬邦吉祥師與唐公主同調日月之明兮容光必照聖君之明兮蒸黎咸造聖明時際聖明時良我福只橫被恩澤良我祿只微言與聖明時同調倐忽變遷順其自然如彼蜃樓余生渺焉際嘉平與聖明時同調諸惡莫作菩提薩多瞑矇妄行用墮三塗善政歌經何本本於宗身何本媪與翁罪何本嗔爞爞福何本和雍雍長命詞與善政歌同調靡言不適於道兮水萬派而朝宗夫惟外道之妄語兮井自畫而不通窈窕娘惴惴原獸思全其身兢兢庶士思庇後昆湛露與窈窕娘同調維彼愚人惟知己身惟此哲人心周萬民四賢吟六欲相牽微生是戀嘆彼駒光如夢如電賀聖朝與四賢吟同調慈悲方便永斷疑情極樂淨土不滅不生英流行知之而作兮明哲所由不知而作兮庸愚之儔慮而後動兮卓彼先覺率而妄動兮是乃下流堅固子與英流行同調馬蹀􅞃兮身不獲康念此身兮本自無常馬騰驤兮生不獲寧念此生兮本自無生月圓良馬之德於田可徴良朋之行相交乃明緩歌與月圓同調良馬云何乘者所思良朋云何久而敬之至純辭惟帝力兮勞來父母力兮免懷乘騏驥兮馳驟仗巨擘兮弓開美封君與至純辭同調貢髙専美曰惟不仁擁資自厚不久四分惟不惺惺乃不戒懼凶心常萌誰與共處少年行嗟棄捐於巖穴兮盍逺播夫芳聲嗟終老於草芥兮盍永垂夫令名四天王吟與少年行同調悲哉北邙令聞宣揚北邙悲歟青史不渝宛轉辭瞻彼中林芃芃萬木旃檀有香生是使獨萬類咸若攘攘藝藝民之父母首出一人鐵驪載飛載翔惟翮是憑為聲為律惟心是經射之能中惟指是憑交之能善惟和是恆木槵珠鷇之成雛兮孚化之功羽用為儀兮賦命之隆迪彼愚蒙兮惟聖之功明厥本性兮實在已躬好合曲維勤斯哲安不可懷溺兹小樂至樂難期童阜乾照無私聖教無類謨訓洋洋鍳斯不昧天馬吟騏驥不羣蹇驢鴻鵠不偕斥鷃騶虞不邇狐狸聖哲不昵愚賤大龍馬吟疇知幻軀祕此佛性疇不退轉佛恩來證上德墮落疇其知病下士頓超疇其知競始條理福慧天亶誠哉難遘通人達士豈伊易逅追風赭馬葱兮蒨兮山有芳蘭僮兮祁兮首有妙鬘回波詞元首明哉首出股肱良哉罕匹賢夾輔兮王室莫執左道兮蟊賊長豫景行行止下民堪憐宜泛愛衆毋逆忠言平調騏驥適我體櫜鞬衛我身嘉言資我道經史沃我心遊子吟升彼髙阜兮思我故鄉有懷二人兮莫出户堂陟彼崔嵬兮思我故鄉有懷二人兮莫出垣墻平調曲帝王無逸天地和寧辟公膚敏兆民阜成髙士吟日之升天為經民之行君為程水之流隨坎盈牝之遊駒之情哉生明非冒於貨賄也感兄弟之敬心非貪於飲食也感父老之忱誠髙哉行云何致太平睪然望皇衢人生夫何常善保千金軀民之不能忘令名照神區子孫振繩繩百千萬億餘三章敬遵佛勑如滋甘雨莫行邪惡種兹罪苦圓音身無常花到秋名無常雷不留財無常蜂釀蜜業無常海發漚欄杆賢者斯賢賢不賢不賢賢蜜蜂見花駐蜻蜓去翩翩思哉行千金寶馬不如先人之敝遺嘗盡諸果不如母乳之甘兮法座引電可畏兮時届朱明霜可畏兮五榖將登禍可畏兮歡樂所成罔不可畏兮憶神魂之初降生接引詞火宅無清凉苦途無安樂鳥路誰能攜閻浮難駐腳化導詞閻浮提界如彼髙山越之維艱盡却今時大海漫漫欲度良難七寶鞍瞻彼隄岸水則不濫有君牧民當無畔散飛鳥雖疲寧甘墮地君子固窮之死不二短歌嗟余生之歡樂兮似黃離之盈昃感韶光之荏苒兮似葉上之青色及芳華之當齒兮且喜樂以永日夕照時乎時乎時外無時時其逝矣奚與樂為黃離既昃定少溫暾天光既暮曀曀其隂歸國謠皇矣聖世以如仁君懷哉懷哉日逺日分亦有良朋如兄如弟日逺日離能不遙跂僧寶吟投誠皈命即安旦夕如佛塔廟云胡逺别和樂且耽手足提擕如姊如娣云胡逺離婆羅門引酪必成醐父將成祖沙必成邱母將成嫗三部落試觀三界漚起漚滅如彼秋雲乍興乍沒五部落流水何湯湯吾生如是遊雖有賢聖人誰能少滯留平西凱旋筵宴笳吹樂章乾隆二十五年定閶闔煌煌鐘鏞鏘鏘鳴鞭祇肅帝用宴康荷天純嘏祖德凝庥從容底定允升大猷聖德宏敷光被遐邇如拱北辰諸部歸止慈恩覆幬滄海無量爭先效順奔走來王憲章斯備勝算克成跳梁羣醜魚貫輸誠天威震疊小腆惕厲大君惟仁莫不臣𨽻聖教宏敷額手格心月竁同風越邁古今逺謨是協絶徼安康撫綏之德遍於遐荒乾元功懋滂洽垓埏巍巍盛德億萬斯年筵宴番部合奏樂章乾隆七年定大合曲元縡是依明神是祇一心至誠照事勤只巍巍大君永底蒸民中心愛戴稽首來臣念人生之無常兮合勤修夫善行信百行之咸善兮終和平而神聽染絲曲大君至聖教敷率土敉寧萬拜拜跪奉主公莫丕顯元后惠懷萬方國彥棐恭協贊邦常率土之濱誠意溥將咸拜稽首依戴聖皇雅政詞皇皇明聖無逺弗燭林林衆庶無思不服元化惠心為善去惡聖人之邦長生永樂鳳凰鳴承乾體元惟我聖君光開草昧惟我聖君綱紀庶政惟我聖君父母萬國惟我聖君惟我聖君兮覆幬如天惟我聖君兮自新新民惟我聖君兮中外乂安惟我聖君兮羣慝消淪拜手稽首兮頌溢兆民乘驛使大地茫茫大海滄滄豈伊無寶求之奚方自古在昔為君為王膺圖御宇命不于常實心實政惠此萬邦聖御大寶繄惟我皇繄惟我皇兮疇可與之頡頏古稀祝嘏樂章乾隆四十五年藏僧班禪額爾德尼進宅中和㑹延鴻祥法王綏御臨當陽穆穆太紫瞻圜方金城寶界天中央乾德坤倪德莫量朂哉庶職咸才良滂洋鬯富來穰穰宸儀永固歌天慶右第一章妙喜如意香嚴開廣場選佛熙春臺古稀天子萬福偕匪今斯今吉大來隂陽諧燮含八垓讚宣寶卍雲縵回右第二章相光震旦開金輪無疆聖德夀萬春純純常常維日新矢音來賀揚尊親右第三章賜衍聖公筵宴樂章乾隆七年定洙泗發源長麟鳳流芳久眷兹後裔克紹箕裘詩書教澤延禮樂家聲舊茅社長膺天眷厚際端冕凝旒桓圭章甫彤庭舞蹈時覲春秋一解詔宗伯使饔人進羞大酋獻酬形虎形鹽訓恭訓儉慈惠兼施寵錫優勵嘉修素風益懋庶不負皇朝渥澤㫖酒思柔二解又定賜正一真人筵宴樂章上清碧落誦黃庭遊德園道成龍虎衛靈壇法貽後嗣承天眷來朝金闕頒嘉宴一解論論論仙家術最最最重是無為道德全說說說著這騎鳳與驂鸞便便便家風殊苦縣恁恁恁役風雷掌握間為為為黎民蠲灾沴要要要煉心性金丹久自還再再再守清虛雲月常舒卷願願願聖天子福如川二解又定賜進士筵宴樂章啓天門日麗黃金榜趂驊騮緩步青雲上論聖賢事業無涯量况生平溫飽何曾望念鯫生叨渥澤天來廣雖持寸草心莫報君恩蕩涓埃矢竭酬天貺一解玳筵內金壺玉漿月臺上絲竹鏗鏘繼自今木天清敞增岱巖不辭土壤二解又定賜武進士筵宴樂章和風洽泰階平皇威截烽烟靖念兔罝亦有干城虎頭猿臂交相慶看雕翮秋來徑一解須知道羽扇綸巾還有那弓强箭徑更兼之武庫縱橫效折衝驊騮騁執戈殳衛羽林備公侯腹心二解鄉飲酒升歌樂章乾隆十年御製補笙詩我逝南陔言陟其岵昔我行役瞻望有父欲養無由風木何補我逝南陔言陟其屺今我行役瞻望有母母也倚閭歸則寧止南陔有筍籜實包之孱孱孩提孰噢咻之慎爾溫清潔爾㫖肴今爾不養日月其慆右南陔三章二章章六句一章八句有白者華不汚纎塵咨爾士兮宜修其身不修其身乃貽羞于二人有白者華婉兹靜好咨爾女兮宜修婦道不修婦道乃貽羞于二老白華匪玉涅而不緇白華匪蘭芬乃勝之我擷白華載咏載思白華匪玉質玉之令白華匪蘭臭蘭之淨我擷白華載思載咏右白華四章章六句瞻彼阪田厥黍始華胝足胼手嗟嗟我農夫瞻彼阪田黍華以秀胼手胝足惟勤斯殖茂華有不秀矣秀有不實矣其雨其雨矣杲杲日出矣惄豫愁之恤矣右華黍三章二章章四句一章五句王庚便便東西朔南六符調燮八風節宣王庚容容朔南西東惟敬與勤百王道同王庚廓廓東西南朔先憂而憂後樂而樂王庚恢恢南朔東西皇極孰建惟德之依右由庚四章章四句澗松童童蛙黽鄰兮邱草萋萋蕩青雲兮凡百君子慎乃託身兮澗松童童澗則卑兮邱草萋萋邱則﨑兮凡百君子審乃所依兮有崇者邱物無不遂有卓者道愚無不智資生育德永植無替右崇邱三章章六句在上曰天在下曰地君君臣臣父父子子在下曰地在上曰天父父子子君君臣臣由其儀矣物則熙矣儀其由矣物則休矣右由儀四章二章章四句二章章二句皇朝文獻通考卷一百七十二
