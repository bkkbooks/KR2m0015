body:
  text: 經籍考八經小學臣等謹按舊唐書經籍志以訓詁小學分為二類然詁訓亦小學也焦竑曰古者八歳入小學習六甲四方與書數之藝爾雅津渉九流標正名物講藝者莫不先之於是有訓詁之學三蒼之説始製字法而説文興焉於是有偏旁之學孫炎沈約始作字音於是有音韻之學是解説名物固與辨釋形聲同為小學之始基凡以使之知類通逹靡所不晰而底於大成也今遵欽定四庫全書之例列訓詁於小學之首次字書次韻書各以其類而編次焉字詁一卷黄生撰生字扶孟歙縣人前明諸生越語肯綮録一卷毛竒齡撰竒齡見易類臣等謹按宋趙叔向有肯綮録詳述朝制竒齡沿襲其名以記其鄉之方言而證以古音古訓本未可厠於六經之末然李少通俗語難字載在舊唐書經籍志張推證俗音顔愍林證俗音畧載在新唐書藝文志皆入小學類中今亦姑從其例而列之爾雅補注六卷姜兆錫撰兆錫見易類續方言二卷杭世駿撰世駿字大宗號堇浦仁和人乾隆丙辰召試博學鴻詞授翰林院編修臣等謹按是編雜録十三經注疏及説文釋名之屬以補揚雄方言之所未及其前後類次悉仍爾雅之舊特不明標其目雖採録諸書多有闕漏六朝以前方言散見於玉篇列子古今韻㑹等篇可取以續揚雄之書者皆未之及然蒐羅典核引據詳明於訓詁之學不為無功矣連文釋義一卷王言撰言字慎旃仁和人右小學類訓詁御定康熙字典四十二卷康熙五十五年大學士張玊書等奉敇撰聖祖仁皇帝御製序曰易傳曰上古結繩而治後世聖人易之以書契百官以治萬民以察周官外史掌逹書名於四方保氏養國子教以六書而考文列於三重蓋以其為萬事百物之統紀而足以助流政教也古文篆隸隨世逓變至漢許氏始有説文然重義而畧於音故世謂漢儒識文字而不識子母江左之儒識四聲而不識七音七音之傳肇自西域以三十六字為母從為四聲横為七音而後天下之聲總於是焉嘗考管子之書所載五方之民其聲之清濁高下各象其川原泉壤淺深廣狹而生故於五音必有所偏得則能全備七音者鮮矣此歴代相傳取音者所以不能較若畫一也自説文以後字書善者於梁則玊篇於唐則廣韻於宋則集韻於金則五音集韻於元則韻㑹於明則洪武正韻皆流通當世衣被後學其傳而未顯者尚數十百家當其編輯皆自謂毫髪無憾而後儒推論輒多同異或所收之字繁省失中或所引之書濫疎無準或字有數義而不詳或音有數切而不備曽無善兼美具可奉為典常而不易者朕每念經傳至博音義繁賾據一人之見守一家之説未必能㑹通罔缺也爰命儒臣悉取舊籍次第排纂切音解義一本説文玊篇兼用廣韻集韻韻㑹正韻其餘字書一音一義之可採者靡有遺逸至諸書引證未備者則自經史百子以及漢晉唐宋元明以來詩人文士所述莫不旁羅博證使有依據然後古今形體之辨方言聲氣之殊部分班列開卷了然無一義之不詳一音之不備矣凡五閲歳而其書始成命曰字典於以昭同文之治俾承學稽古者得以備知文字之源流而官府吏民亦有所遵守焉是為序欽定篆文六經四書不分卷臣等謹按是編悉依小篆文體凡周易尚書毛詩春秋周禮儀禮學庸論語孟子綜為十四册漢人傳經多用隸寫至唐開元改寫今文於是諸經悉從楷體古經舊本久已沿訛是編仰䝉聖祖仁皇帝鑒定俾學者奉為圭臬得以循流溯源有禆經學洵非淺鮮也欽定西域同文志二十四卷乾隆二十八年大學士傅恒等奉敕撰皇上御製序曰歳庚午既定同文韻統序而行之蓋以梵音合國書切韻復以國書切韻叶華音字母於是字無遁音書皆備韻微特支那咒語窔奥可探而且寰宇方言拘墟盡釋兹者西域既平不可無方畧之書然準語回文非纂輯文臣所曉是宜示之綱領有所遵循俾無蹖駮舛訛之虞因以天山北路天山南路準部回部並西藏青海等地名人名諸門舉凡提要始以國書繼以對音漢文復繼以漢字三合切音其䝉古西番托忒回字以次綴書又於漢文下詳註其或為準語或為回語于是兀格蟀自之言不須譯鞮象寄而凡識漢字者莫不通其文解其意瞭若列眉易若指掌書既成名之曰西域同文志同文云者仍闡韻統之義而特加以各部方言用名西域紀載之實期家喻户曉而無魚魯毫釐之失焉然嘗思之天高地下人位乎其中是所謂實也至于文蓋其名耳實無不同文則或有殊矣今以漢語指天則曰天以國語指天則曰阿卜喀以蒙古語準語指天則曰騰格哩以西番語指天則曰那木喀以回語指天則曰阿思滿令回人指天以告漢人曰此阿思滿漢人必以為非漢人指天以告回人曰此天則回人亦必以為非此亦一非也彼亦一非也庸詎知孰之為是乎然仰首以望昭昭之在上者漢人以為天而敬之回人以為阿思滿而敬之是即其大同也實既同名亦無不同焉逹者契淵源於一是昧者滯名象於紛殊是志也將以納方俗於㑹極祛羣疑之分畛舉一例凡豹䑕易辨即世道人心豈云無禆益哉臣等謹按是書二十四卷又凡例總目一卷分門四曰地曰山曰水曰人分部四曰天山北路準噶爾部曰天山南路回部曰青海曰西番其體例則每條首列國書以為樞紐次以漢字詳註名義次三合切音次䝉古字次西番字次托忒字次回字如本條係準語則以托忒字為主而西番䝉古回字惟取對音本條係回語則以回字為主而西番蒙古托忒字惟取對音循環毗附音義咸審仰見聰明天縱于異俗殊音無不洞徹源流同條共貫聖徳神功允超三古天下一家之盛真無有過于今日者矣欽定增訂清文鑑三十二卷補編四卷總綱八卷補總綱一卷乾隆三十六年大學士傅恒等奉敕撰皇上御製序曰稽古語言文字之傳不能不隨方隨時代為變易將欲觀其㑹通惟音義兩端為之樞筦獨是施之於繙譯則以字之不得其音而舛者亦以字之强索其義而愈舛嚮評通鑑輯覽紏前史譯本失真則有校正金元國語解之命及製西域同文志序諸作復連類而引伸之兹増訂清文鑑告竣並為鬯厥指以詔來者夫字之不得其音者如明安之為猛安穆昆之為謀克猶云對字未叶耳甚者乃因字法以寓褒譏如金史書烏珠為兀术貝勒為勃極烈或為孛堇者是也且同一䝉古人名於膺世爵者則書羅卜藏於隸讞牘者則書羅卜贜沿流至今未改不綦誕乎至以文字强索其義者如䝉古語鄂博特堆砌之統詞而曲説者以鄂為嵯峩之峩博為軷癸之軷自詡語出經傳究之求其義而不得遂并其音而失之不愈盭乎蓋對音本無義也即如國語稱天曰阿卜喀䝉古語則曰騰格哩西番語則曰那木喀回語則曰阿思滿以漢文求之皆無義之可索且以漢文天字設用國書合音則字當云梯煙夫梯煙寧有義乎豈梯必梯磴之梯而煙必煙霄之煙乎穿鑿者又將謬解為梯煙而上為天之義可乎蓋嘗推而論之前代之主其不暇兼治漢文者既一任夫承偽襲謬而莫之正而兼治漢文者乃轉為漢文所牽掣而不克博訂方言之異精研聲律之元譬諸以水濟水誰能食之非虗語也洪惟皇祖聖祖仁皇帝神靈天亶制度考文於列祖剏垂國書廣大精微貫穿賅洽御定清文鑑全圅折𠂻大備惟當時編纂諸臣依國語分類排纂未列三合切音漢字註中間採經傳成語以佐訓詁日久易啟傅㑹穿鑿之習朕志切紹聞指授館臣詳加㩁覈每門首著國語旁附漢字對音或一字或二合或三合切音俾等量者不爽苗髪而字之淆於不得其音者尠矣詮釋具以日用常言期人共曉其俗解摭拾陳編章句及以之乎者也為文者悉汰之而字之汨於强索其義者抑又尠矣綜計續入新定國語五千餘句若古官名冠服器用鳥獸花果等有禆參考者别為補編系之卷末庶幾嘉與我子孫臣民可以同文可以傳世而行逺是為序臣等謹按是編因太宗文皇帝命巴克什庫爾纒剏造國書以十二字頭貫一切音厥後日趨精密音義益詳聖祖仁皇帝慮口傳筆授或有異同乃輯清文鑑一書而音譯則未之及皇上復親加訂定凡三十有五部子目二百九十有二每條以國書為綱左列漢字切韻右列漢語又右則音以國書而欽定新語悉皆載入尤徵詳備信能包羅萬象綜括七音同文之盛軌蔑以加於此矣欽定滿洲蒙古漢字三合切音清文鑑三十三卷乾隆四十四年大學士阿桂等奉敕撰皇上御製序曰向既増訂清文鑑序而行之與夫穿鑿字法謬寓褒譏曲解方言傅㑹漢語一切務竒求勝亦既辨之詳矣兹三合切音清文鑑書成司事者以序為請夫既有前序則此可以不必重為然前書祗載國語漢語而未及䝉古此書乃並載䝉古語所為異於前書者是不可以不闡其義我國家自太祖太宗以來近邊諸䝉古部落久為世臣而至今則喀爾喀青海及準噶爾之四衛拉特前後歸順蓋無一蒙古之非我臣矣諸部語言音韻剛柔雖畧殊而大段則一即國語雖與䝉古語異而亦有一二相同者朕即位初以為諸外藩歳來朝不可不通其語遂習之不數年而畢能之至今則曲盡其道矣侵尋而至於唐古特語又侵尋而至於回語亦既習之亦既能之既可以為餘暇之消遣復足以聨中外之性情因悟天下之語萬殊天下之理則一無不戴天而履地無不是是而非非無不尊君上而孝父母無不賢賢而惡小人彼其於語言文字中謬存我是彼非入者主之出者奴之不亦仰而唾空終於自汚其面哉故向有校正金元國語解之命及製西域同文志壹是義也雖然予以為亦無足深怪作金元史者之讕文何則彼一類之人尚有越人視秦人肥瘠之言而况非其類者乎又况彼實不解其語言音義乎則又安能保千秋萬世後不解此書者之不又將如作金元國史者之其人乎前書之序並命載于後庶幾並觀以互相發明也臣等謹按乾隆三十六年皇上既命增訂聖祖仁皇帝御撰清文鑑補注漢字各具翻切釋文而䝉古字猶未備列乃復命廷臣續定是編以國語與蒙古書漢書貫通為一互相音釋每國語一句必備載䝉古漢語以明其義復以䝉古漢字與國語對音以定其聲或漢字聲所無者則三合以取之蒙古字聲所無者則分各種讀法寫法收法以取之貫穿益為精密而稽覽更極詳明是皆頼帝學淵深務綜其備俾讀者得以舉一知三巍乎煥乎允昭萬世敷文之極已廣金石韻府五卷林尚葵李根同撰尚葵字朱臣莆田人根字雲根晉江人周亮工序曰篆體惟許氏説文最詳核用修楊氏宗之兼取衆家為六書索隱而其傳不廣錫山朱時望所輯金石韻府一編至今幾二百年亦漸湮没予獲諸舊簏因與林尚葵李根共為考訂譌者正疑者晰即所未備者亦間補其什一焉分書是序者鄭簠也臣等謹按是編不列亮工之名而序稱與林李二人共考訂未審其故卷首列所采各家次玊篇偏旁形似釋疑次乃依平上去入韻以真體書為紐而朱書類從焉他山字學二卷錢邦芑撰邦芑字開少丹徒人六書準四卷馮調鼎撰調鼎字雲鷗華亭諸生調鼎自序曰六書曰象形指事㑹意諧聲假借轉注形事字之原意聲字之流轉注假借又補原流之不足而以形事意聲為變化者也漢平帝時徵沛人爰禮等令説文字于未央庭中揚雄採以作訓纂篇及和帝申命賈逵修理舊文於是太尉南閣祭酒許慎采李斯揚雄之書博訪于逵作説文解字十四篇五百四十部九千三百五十三字載古文三百九十六籀文一百四十五重文或體六百二十二至宋雍熙三年命徐絃等重較定概為形聲昧於事意然頡籀遺文猶賴僅存世所流傳六書統六書故六書畧正譌本義索隱精藴之屬書之六義詳見一二間嘗摘象形指事㑹意之混淆轉注假借之錯亂及循俗譌謬者注分六義較正誤差其可依俗成文無甚深義者已詳載諸書不盡述六書通十卷閔齊伋撰齊伋字寓五烏程人畢𢎞述序曰閔寓五先生集三代秦漢篆法其體以説文字為標首下列古文籀文以及鼎彝符印有變體必載使觀者知其全得其變與通也而又繼之以附通附通者如東字之後附之以凍先字之後附之以姺東先具各變體加水加女則無變也然則東先之變參之以水女亦不可謂無本也附之以不變通之以無不可變義精而體詳有功後學不淺程煒序曰晟溪閔寓五先生好古讀書能逺紹倉頡㣲㫖於三代秦漢諸篆法遐搜備其形體窮討溯其本原參互辨其疑似勞精竭神者五十餘年輯成書題曰六書通後流傳散失付之荒烟又六十餘年煒得之煒交于畢殿揚弟既明先生一見驚絶謂周秦古法復見於今惜殘闕非全書為之參考篆訂以傳於後焉篆隸考異二卷周靖撰靖字敉寧呉縣人明吏部文選司郎中周順昌之曾孫隸辨八卷顧藹吉撰藹吉號南原長洲人藹吉自序曰隸辨之作為解經也字不辨則經不解而古文邈矣漢人傳經多用隸寫變隸為楷益失本真及開元始易以俗字名儒病其蕪累余因收集漢碑間得刋正經文虞書大鹿舊本無林泰卦包㠩後人加草鄭風摻執即為操執穀梁壬臣當作王臣若斯之類取益頗多後于北海孫氏見中郎石經殘碑經典釋文所云本又作者皆碑中字也於是鋭志精思采摭漢碑有不備者求之漢隸字原準以説文辨其正變或省或加靡不兼載譌者非之疑者闕之從古文竒字及假借通用者隨字附之下注碑名並録碑語羣書引據類以四聲復依説文次第纂偏旁五百四十字括其樞要又列叙諸碑之目折中分隸之説各為之考以彰信析疑焉項絪曰古隸書見於世者賴有漢碑然多增減移易替代之字顧南原氏作隸辨以印其是而砭其非昔之滯目礙膺者今皆可以屬讀矣前人亦常用意於此而無其貫通明確隸釋諸家咸所不及也别雅五卷呉玊縉撰玊縉字山夫山陽人廪貢生官鳯陽縣訓導韻原表一卷石鼓文定本二卷劉凝撰凝見禮類黄公説字無卷數顧景星撰景星字黄公蘄州人康熙己未薦舉博學鴻詞讀書正音四卷呉震方撰震方字青壇石門人康熙己未進士官至監察御史臣等謹按是書卷一以一音異讀者分門編輯其無門可列者附以通用一門卷二别為類曰字音清濁辨曰同音借義曰借同音不借義曰因義借音曰音借而借曰語詞之借卷三多録僻字而以四聲編之卷四則各依部分編常用之字以正塾師之誤毛竒齡序稱其精審然於古人之小學能訂六書音韻源流者則尚未之逮耳篆文纂要四卷陳䇿撰䇿字嘉謀錢塘人字辨七卷熊文登撰文登字于岸南昌人六書分類十二卷傅世壵撰世壵字賔石歸徳人臣等謹按是書分類悉仿梅膺祚字彚之例每字以小篆古文次於楷書後然古文真贋可信無幾恐未有當於古義也説文廣義十二卷程徳洽撰徳洽字學瀾長洲人篆字彚十二卷佟世男編世男滿洲鑲黄旗人康熙中官知縣鐘鼎字源五卷汪立名編立名號西亭婺源人官工部主事立名自序曰漢書藝文志書有六體曰古文竒字篆書隸書繆篆蟲書是古文與竒字且各為一體也世逺年湮其僅可據者彝器之欵識庶幾傳信即書家所謂鐘鼎文是也然而歴代博雅之士雖蒐集成編或直載本文或分隸韻部往往雜収碑篆各字而亦統之曰鐘鼎夫銘器與篆碑之文當必有異用不容以其説無可徵而臆為同也余少嗜六書數十年來未經卒業近復尋閲金石韻府見所収鐘鼎文徵引譌謬掛漏甚多爰考諸刻自商盤周鼎以迄秦漢諸書專採鐘鼎文仍依今韻編次有石刻之類於銘欵者如石鼓文為西京法物得附録焉其他碑篆皆不收采以其不合乎鐘鼎二字之義也天然窮源字韻九卷姜日章撰日章字旦童如臯人六書辨通五卷六書例解一卷附六書雜説一卷八分書辨一卷楊錫觀撰錫觀字顒若無錫人五經字學考五卷成端人撰端人字友端陽城人六經字便無卷數劉臣敬撰臣敬字恭邵江隂人字學正本五卷李京撰京字元伯高陽人例畧曰是書以小篆為本而正偏旁之不正者故名正本字學同文四卷衛執㲄撰執㲄字子覲韓城人臣等謹按是書分目從古未見凡十有三類曰上類曰下類曰上下中類曰上下左右類曰上下左類曰上下右類曰上左類曰下左類曰上右類曰下右類曰左類曰右類曰左右類類各統部然其中謬誤甚多則雖剏為此類亦未見其異於他書耳文字審一卷不著撰人名氏右小學類字書欽定音韻闡微十八卷康熙五十四年大學士李光地等奉敕撰雍正四年告成世宗憲皇帝御製序曰聲音之道微矣天地有自然之聲人聲有自然之節古之聖人得其節之自然者而為之依永和聲至於八音諧而神人和胥是道也文字之作無不講求音韻顧南北異其風土古今殊其轉變喉舌脣齒清濁輕重之分辨在毫釐動多訛舛樊然淆混不可究極自西域梵僧定字母為三十六分五音以總天下之聲而翻切之學興儒者若司馬光鄭樵皆宗之其法有音和類隔互用借聲類例不一後人苦其委曲繁重難以驟曉往往以類隔互用之切改從音和而終莫能得其原也我聖祖仁皇帝亶聰首出天地萬物之奥律歴象數之秘靡弗心解神㑹洞徹本原以國書合聲之法出於自然足以盡括漢文翻切之要妙也於是指授大學士李光地擬定條例節目俾諸生王蘭生纂輯之後復以尚書徐元夢董其成始自康熙五十四年迄今十載奏竣命之曰音韻闡㣲蓋其為法也緩讀則成二字急讀則成一音在音和中又極其和總出於人聲之自然而無所勉强洵為簡明易曉從來翻切家所莫及而講求音韻者習之良甚便也雖然此特就切韻言之耳嘗觀皇極經世書律感吕而聲生吕感律而音生律吕倡和相生不窮以聲音統攝萬物之變説者謂其以聲起數以數合卦而萬物之理備焉我聖祖仁皇帝獨見音韻之本原即用以審音定律作樂崇徳其道舉無所不貫蓋睿智淵通更有極乎至㣲者夫豈羣下所能仰窺萬一哉臣等謹按是書首列韻譜定四聲之輕重其部分一如官韻而附載廣韻之子部以存其舊然亦如冬鐘虞模許附近通用不碍施行其翻切則準乎國書之合聲仍前列舊音以考古讀云欽定佩文詩韻五卷臣等謹按是書部分一百有六每字下系以切音并詁釋一二語刋本有二其一廣註較詳欽定同文韻統六卷乾隆十四年和碩莊親王允禄等奉敕撰皇上御製序曰粤自字韻字母之學興於西域流傳中土遂轉梵為華而中華之字不特與西域音韻攸殊即用切韻之法比類呼之音亦不備於是有反切有轉注甚至有音無字則為之空圈影附其言浩若河漢而其緒紛如亂絲我國朝以十二字頭括宇宙之大文用合聲切字而字無遁音華言之所未備者合聲無不悉具亦無不脗合信乎同文之極則矣間嘗流覽梵夾華文筆授充牣支那而咒語不繙取存印度本音以傳真諦顧緇流持誦迥非西僧梵韻是豈説咒不譯之本意耶和碩莊親王當皇祖時面承音韻闡微之要㫖精貫字母博涉明辨爰命率同儒臣咨之灌頂普善廣慈國師章嘉胡土克圖考西畨本音溯其淵源别其同異為之列以圖譜系以圖説辨隂陽清濁於希㣲杳渺之間各得其元音之所在至變而莫能淆至賾而不可亂既正貝葉流傳之訛謬即硏窮字母形聲之學者亦可探婆羅門書之窔奥而破拘墟之曲見書成名之曰同文韻統而著其緣起如此云臣等謹按是編卷一天竺字母譜卷二天竺音韻翻切配合字譜卷三西畨字母配合字譜卷四天竺西畨隂陽字譜卷五大藏經典字母同異考卷六華梵字母合璧譜蓋列天竺字母五十字以標經咒諸字淵源列音韻翻切配合所成一千二百十二字各譜以備經咒諸字聲至唐古特字母另編一譜者所以備畨字音聲其天竺西畨字俱分隂陽及可隂可陽三種義例皆䝉我皇上敕示淵源使華語梵音同條共貫所以敷四海而大一統者宜其超軼三古也已欽定叶韻彚輯五十八卷乾隆十五年協辦大學士吏部尚書梁詩正等奉敕撰皇上御製序曰叶韻非古也而即古也有今韻而後有叶韻叶韻者以古韻而協之於今故曰非古然以今視之則用叶以合異以古視之則非叶而本同故曰即古朕㓜習易詩諸經考其音多與今韻不合長而汎覽百家其用韻亦往往異於今讀蓋韻書之行權輿江左至唐以聲律取士部分較嚴而今所循用則出於宋元人之分併宜其與古不相契也三代而上言律吕言諧聲言書名其於音韻當必審清濁别唇齒喉舌有一定之部分勒之簡䇿與律度量衡象魏之法同為當世所遵守而惜其世逺而不傳也好古之士欲忖而求之其道無由宋呉棫本易詩史漢諸書為韻補子朱子嘗取以釋毛詩楚辭明楊慎廣之為古音號稱淵博及證之羣籍其疏畧不備者則己多矣因于幾暇指授儒臣博考經史諸子以及唐宋大家之文所用古韻舉而列之疏其所出次於今韻之後臨文索句就考焉可以恢見聞可以益思致獨是四庫之編浩如淵海學士畢生不能窮其讀區區掇拾而覼縷之何異稽躔次而溯有虞氏之敬授汎江淮河漢而追禹功之疏鑿其可指而數者幾何然方之嘗鼎之一臠則未始非汲古之助云爾爰授之梓而行之臣等謹按書中每部前列今韻皆以佩文詩韻為宗而參訂註釋益致精詳次以今韻雖部分各殊而古韻相通者以類相比其古韻相通之字而今韻所無者併附于後所援据書名悉為標正或古今韻皆獨用者則一韻自為一部亦附以相通之字萬幾之暇詳示儒臣用以酌古韻之中資披吟之助豈呉棫韻補楊慎古韻諸書所能比擬萬一哉欽定音韻述㣲三十卷乾隆三十八年奉敕撰皇上御製序曰音韻述㣲者述音韻闡㣲之意也我皇祖欽定佩文詩韻頒示中外復依國書合聲切韻之法叶華音字母作音韻闡㣲一書按字母之説始於隋書經籍志載後漢佛法行於中國得西域書能以十四字貫一切音其文省而義廣謂之婆羅門書至唐僧守温増為三十六字母相沿至今未識其源由今考之蓋守温畧知唐古特字而所譯漢文則不免强為牽合即如見溪羣疑乃梵音之嘠喀噶迎阿端透定泥乃梵音之答塔逹納也闡㣲則於每字皆用國書合聲法切之如東字舊韻徳紅切今用都翁切緩讀成二字急讀成一音較之舊韻之轉字叶音實簡明精確足為華梵字母之㑹通而啟自古音韻未發之秘準也夫國書以阿字為首梵經亦謂阿字能括天下之音其生生之序出于自然今以人之始生證之雖各國各地殊語至其孩啼音皆出于阿則阿字之為諸方聲韻之源綜其異而得其同從可知矣字母既源出西域則國書之阿字實㑹通華梵字母之樞紐以立義所以得天地之元聲不獨梵音藉國書而明即華音之字母亦因國書而愈明也朕少時見等韻書亦茫然弗悉其原委及後習䝉古語回語又習唐古特語畨語然後知漢音字母即梵音之字母而以國書樞紐其間率可以通華梵之情暢形聲之奥前此同文韻統西域同文志既仰承聖祖闡㣲之義譔輯成編兹復命詞臣恭依佩文詩韻並萃廣韻集韻之字刪冗存英為音韻述㣲共收一萬五千二百七十九字成書三十卷嘗考古來韻書沈約四聲其書不傳今惟宋陳彭年廣韻則就隋陸法言切韻孫愐唐韻本重加修訂收字凡二萬六千一百九十四字又宋丁度集韻至五萬三千五百二十五字其實行用者不出尋常經見之文則雖多亦奚以為也至諸家分韻皆二百六部然其中有通用有獨用通用者名雖分而實合是以元隂時夫撰韻府羣玊於獨用者仍之通用者併之即今佩文韻府所因也及明樂韶鳯等奉敕撰洪武正韻則减為七十六部所收一萬二千一百四十六字分韻一改古人之舊誠未若今韻之繁簡適用損益得中也又從來韻書主音字書主義二者不能兼賅而審音與分韻又歧而為兩夫輕重清濁音也平上去入韻也韻顯而易明音㣲而難察詩賦家所用惟韻而不必審音至詩餘詞曲則兼辨音而於平上去韻轉得通用此唐宋及今音韻之大畧也是書翻切悉遵闡㣲凡古今音韻之奥華梵㑹歸之故以國書為樞紐無不一以貫之而於古人韻書義訓未詳者則加推廣發明焉其訓釋古無今有者量加増訂期於字義明而字音悉協四聲準而等韻貫通皆即皇祖宣暢中聲嘉惠藝林之意纘述而引伸之蓋四十七年以來所為繩繩翼翼無一念不敬承先志無一事不聰聽彞訓者亦於是書見端也夫臣等謹按御定音韻闡㣲以字母之先後為字之次序是書則以部首一字之母為首其下諸母所領字以次從之其合聲切字則一以御定音韻闡㣲為主部分亦仍從御定佩文詩韻惟以殷文分兩部而以殷附真不附文此其稍變者也至所収之字亦多所増益凡古今音訓迥異者亦從宜添入而互註之益為詳密蓋此所重者字義故訓釋為較詳由是兩書相輔而行則韻學之精㣲無美不備聖朝之作述所以嘉惠後學者至已古韻通八卷柴紹炳撰紹炳字虎臣仁和人古韻叶音六卷佐同録五卷楊慶撰慶字憲伯秦州人前明諸生聲韻叢説一卷韻問一卷韻學通指一卷韻白一卷毛先舒撰先舒字稚黄一名騤字馳黄仁和人臣等謹按叢説乃雜論毛詩及古今來有韻文字凡四十條韻問一卷則設為問答之辭通指謂風字可以入侵韻非東韻之字全可入侵舒字可以入支韻非魚韻之字全可入支謂古韻之差等有三今韻之差等有四所見皆視前人為確又析通指之緒餘輯韻白一卷皆雜論古韻詞曲韻之類大抵皆詳于今而畧于古于考證之學未免稍疎焉韻統圖説無卷數耿人龍撰人龍字書升號岵雲江隂人韻蕞一卷徐世溥撰世溥見禮類音論三卷詩本音十卷易音三卷唐韻正二十卷古音表二卷韻補正一卷顧炎武撰炎武見春秋類前五種本名音學五書炎武自序曰今音行而古音亡為音學之一變宋韻行而唐韻亡為音學之再變炎武既得唐韻之書乃始發寤于中而旁通其説于是據唐人以正宋人之失據古經以正沈氏唐人之失而三代以上之音部分秩如至賾而不可亂乃列古今音之變而究其所以不同為音論三卷考正三代以上之音註三百五篇為詩本音十卷註易為易音三卷辨沈氏分部之誤而一一以古音定之為唐韻正十卷綜古音為十部為古音表二卷又後序曰此書為三百篇而作也先之以音論何也曰審音學之源流也易文不具何也曰不皆音也唐韻正之考音詳矣而不附於經何也曰文繁也已正其音而猶遵其次第何也曰述也古音表之别為書何也曰自作也蓋嘗幾欲分之幾欲合之久之然後臚而為五矣闗中李因篤每與炎武言詩今頗採之以答書附于末韻補正自序曰炎武為唐韻正已成書矣念考古之功寔始于宋呉才老而其所著韻補合者半否者半一一取而註之名曰韻補正附古音表之後李因篤曰亭林顧氏廣引古人韻語謂三百篇無叶韻均是本音以闢呉才老韻補之謬山陽張弨力臣刋行其書詩韻更定五卷呉國縉編國縉字玊林全椒人順治壬辰進士聲韻源流考無卷數萬斯同撰斯同字季野鄞縣人諧聲品字箋無卷數虞徳升撰徳升字聞子錢塘人古今通韻十二卷易韻四卷韻學要指十一卷毛竒齡撰竒齡見易類竒齡自序易韻曰自尚書古經并各傳諸子百氏周秦間文以暨史記漢書淮南參同諸書往往間及韻語而在古經則周易尤甚顧周易非盡用韻者其彖象原辭亦偶然及之惟夫子上下象傳并雜卦傳則無一不韻一如詩歌銘頌賦誄之所為以其用讚體讚必盡韻所謂贊周易是也至彖傳即用韻十九説卦則偶有一二語入韻而序卦閴然焉李天馥序韻學要指曰竒齡為史官曾著古今通韻一書已梓之行世復括其議論之尤要者自三古立均太師造韻以及後之析併通叶皆溯其所始而究其所終即以訛傳訛如沈韻陸韻孫韻劉韻切韻禮部韻鄭庠古韻呉棫韻補無不備為指據確示可否使世之人讀詩讀易讀離騷古文及諸子百家之書一開卷而燎若觀火焉類音八卷潘耒撰耒字次耕號稼堂呉江人康熙己未召試博學鴻詞授翰林院檢討例畧曰舊字母三十有六有複有漏耒刪五増十九成五十母各具隂陽而列以喉舌腭齒脣之序舊四呼以音就字無定準今各母各韻並列四呼字缺而音不缺舊分類互有得失今統有字無字之音辨其全分分平上去為二十四類入為十類舊切同母同韻之字皆通用今則同母之中必用同呼同轉同韻之中必用元音分隂陽也李光地榕村語録曰潘次耕若將其師所著音學五書撮總纂訂令其精當豈不大快却自出意見欲駕亭林之上反成破綻以自已土音影響意揣便欲武斷從來相傳之緒豈可乎韻雅五卷施何牧撰何牧蘇州人康熙己丑進士古音正義一卷等切元聲十卷熊士伯撰士伯字西牧南昌人官陜西高陵縣知縣古今韻表新編五卷仇廷模撰廷模字季亭寧波人康熙辛夘舉人官知縣唐韻考五卷紀容舒撰容舒字遲叟號竹厓獻縣人康熙癸巳舉人官至姚安府知府八矢注字圖説一卷顧陳垿撰陳垿見樂類臣等謹按八矢者譬字為的以八矢注之所謂八門者一分四聲二經聲三定清濁之界四審五音五分隂陽六分正變七分輕重八分留送是也其謂三十六母為亂道已不可訓而于四聲之外又増一下聲則更駭人聽聞之甚矣聲韻圖譜無卷數錢人麟撰人麟字鑄菴武進人康熙庚子舉人官蕭山縣知縣類字本意無卷數莫宏勲撰宏勲字誠齋錢塘人韻學臆説一卷韻學五卷王植撰植見四書類五方元音二卷樊騰鳯撰騰鳯字凌虚堯山人臣等謹按是書部分十二曰一天二人三龍四羊五牛六獒七虎八駝九蛇十馬十一豺十二地其字母則併為二十曰梆匏木風斗土鳥雷竹蟲石日剪鵲系雲金橋火蛙皆純用方音于古義全未深究至其變亂韻部較之洪武正韻有過之無不及也詩經叶音辨訛八卷劉維謙撰維謙字讓宗自號雙虹半士松江人黄之雋序曰我朝文治賁明太平之鼓吹尤盛安溪李文貞光地論切字之法分母之理南北古今之音而以國書十二字頭為得天地元聲阿額伊鄂烏為歌麻支㣲齊魚虞七韻能切諸韻而不為諸韻之所切論極㣲渺而獨心服顧炎武之書竊謂炎武謂毛詩四聲通為一韻似以宋元之詞曲例商周之雅頌是書亦遵炎武而有駁正夫自有詩本音而詩不叶而自叶有叶音辨譌而詩有一定之叶而無餘叶其理同學者由是可以咏詩可以審音可以識字其效亦同也詩傳叶音考三卷呉起元撰起元字復一震澤人古韻標準四卷四聲切韻表一卷江永撰永見禮類本韻一得二十卷龍為霖撰為霖字雨蒼成都人選㧞貢生官至潮州府知府臣等謹按稱本韻者言韻必有本本樂律也樂有五聲故取郝氏四聲加一轉音馬氏四聲加一全音及林氏改為開承轉縱合五音之説以分為五其有不可當者以變宫變徵當之而為七聲樂有十二律故立十二字為韻而併合諸韻以屬之其于切韻唐韻廣韻諸書等韻經世諸法無不排詆以伸其説縁有傳本姑存而論之以備考焉音韻源流五十卷潘咸撰咸見易類韻歧四卷江昱撰昱見書類音韻清濁鑑三卷王祚禎撰祚禎字楚珍大興人祚禎自序曰此編博極諸家如揚雄訓纂許慎説文玊篇唐韻廣韻韻㑹篇海集韻正韻吕氏同文釋日月燈無不繹其論説證其異同聲音發源圖解一卷潘遂先撰遂先句容人臣等謹按是書分四聲為六聲曰初平次平終平初仄次仄終仄支離穿鑿盡廢齒腭脣舌而專以牙之一音定宫商角徵羽又盡廢齒牙腭脣而以十二舌定平仄六聲其説全無根据遂先自為草創其子命世續成之右小學類韻書皇朝文獻通考卷二百十八
