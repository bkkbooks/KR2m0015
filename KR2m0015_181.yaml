門而移參領等駐碧雲寺孔道十八年又定新增官兵內以署前鋒參領二人副前鋒校每旗各一人署前鋒每旗各十五人駐紅石山凡扈從之制乾隆十五年定每遇巡幸以健鋭營官軍分撥十分之四隨往十七年又定健鋭營操演事繁嗣後隨駕撥官軍十分之二恭載乾隆十四年平定金川御製實勝寺碑記去嵗夏視師金川者久而弗告其功且苦酋之恃其碉也則創為以碉攻碉之說將築碉焉朕謂攻碉已下䇿今乃命攻碉者而為之築碉是所謂借寇兵而資盜糧者全無䇿矣為之悶然因憶敬觀列朝實録開國之初我旗人躡雲梯肉薄而登城者不可屈指數以此攻碉何碉弗克今之人猶昔之人也則命於西山之麓設為石碉也者而簡佽飛之士以習之未逾月得精其技者二千人更命大學士忠勇公傅恆為經略統之以往且厚集諸路之師期必濟厥事賴天之佑大功以成此固經略智勇克兼用揚我武酋長畏威懷德厥角請命是以敵愾以往者率中道而歸竊恨未施其長技有餘怒焉記不云乎反本修古不忘其初雲梯之習猶是志也而即以成功則是地者豈非綏靖之先聲繼武之昭度哉因命擇向庀材建寺於碉之側名之曰實勝夫已習之藝不可廢已奏之績不可忘於是令成功之旅立為健鋭雲梯營並於寺之左右建屋居之間亦依山為碉以肖刮耳勒歪之境昔我太宗皇帝嘗以偏師破明十三萬衆於松山杏山之間歸而建實勝寺於盛京以紀其烈夫金川蕞爾窮畨豈明師比然略昆明而穿池勝僑如而名子其識勿忘一也漢書訓碉作雕碉為石室而雕則若雕鶚之棲云者皆非是蓋西南夷語彼中呼樓居其音為碉云爾乾隆二十六年平定西域御製實勝寺後記嵗己巳建實勝寺於西山之下其緣起已見前記不復綴今賴昊天垂佑宗社篤祐平凖噶爾回部拓地伊犁喀什噶爾葉爾羌一帶二萬餘里其外羈縻附屬如哈薩克布魯特安集延拔達克山等部不與焉凡乘機决計信賞必罰奉天討罪藉衆集事諸大端俱見太學之碑開惑之論西師之詩亦不復綴兹記者寺左近健鋭雲梯營實居之營之兵是役效力為尤多故不可不旌其前勞以勸夫後進先是呼爾璊霍斯庫魯克之戰我師以少敵衆而賊據險伺隙故凡行陳參伍彌縫之際略覺旗靡鼓餒處得健鋭兵數十立其間則屹如堅城整而復進遂乃斬將搴旗用成殊績蓋索倫兵馬射雖精以之馳突乘勝破陳無不如志而知方守節終不如我滿洲世僕其心定其氣盛夫出萬死一生為國宣力而為之君者事成而忽若忘獨何心哉朕豈為之哉自己巳設此營而辛巳即收其效不啻樹樹十年之得報故潜移默運有若天授豫亦有所不知其然而然者而敬繩祖武丕揚國烈瞿瞿惴惴惟盛滿之是懼猶初志也是用重勒碑記之且肖喀喇烏蘇襲迫之狀築堡其側嵗時幸香山閲健鋭兵用寓尹鐸晉陽之意不亦可乎臣等謹按健鋭營之設始於乾隆己巳年厥後平定凖噶爾回部雲梯兵宣力為多仰見睿略周詳修明武備用能儲材於十載之前而程功於二萬餘里之外敬録御製前後碑記以表兹營緣起之始及收效之逺焉三旗虎槍營總統一人以公侯領侍衛內大臣兼任三旗總領各二人初制設每旗各一人雍正元年各增一人以內大臣都統前鋒統領護軍統領副都統侍衛簡用虎槍長各七人初制設每旗各一人雍正元年增定即於虎槍人內選用虎槍副長各七人雍正元年增設即於虎槍人內選用筆帖式六人乾隆三年增設虎槍人共六百名於親軍校親軍前鋒校前鋒護軍校護軍驍騎校驍騎領催及間散人內選用初制設三百六十人雍正元年增置每旗各二百名內為虎槍人四百八十名學習虎槍人一百二十名虎槍營之制於康熙二十三年黑龍江將軍進精騎射善殺虎新滿洲四十人至京分𨽻上三旗初設虎槍營凡扈從之制遇車駕搜狩虎槍總統總領率所屬從日以十人携虎槍於前導侍衛前行安營後偵虎豹出入備伏弩箭犁刀行田遇大獸則列槍從之奉㫖殪虎或尋山追踪得實具奏有㫖則殪虎以獻以首先刺虎一二人名奏聞如差往畿輔或口外殺虎量地逺近奏請簡總統或總領酌帶虎槍人以前盛京內府三旗順治三年設盛京內府鑲黃旗正黃旗佐領八年設正白旗佐領初制給佐領總管盛京內府事務關防奏簡一人掌之乾隆十七年特設盛京內務府總管令三旗佐領皆歸統轄三旗佐領各一人順治三年設二人八年設一人內管領一人乾隆三十年增設驍騎校三人康熙十七年設司庫一人初制設三人乾隆十九年改補主事一人三十年改補內管領一人仍食原俸主事一人乾隆十九年增設委署主事一人乾隆三十年於筆帖式內改補筆帖式十五人初制設十六人乾隆三十年改補委署主事一人仍食原俸庫使十六人初制設十人即在驍騎數內乾隆九年改為定額又增六人頭目及執事人六十七名頭目及執事人初制即在驍騎數內乾隆九年改為定額催長八人初制設九人乾隆三十年酌裁一人定食俸四人食餉四人領催十八名驍騎委署領催二十四名驍騎六百八十四名初制每佐領下驍騎各二百三十共六百九十名乾隆九年定驍騎額內庫使及頭目執事人等為専設之缺實存驍騎六百十三名又增設十七名定為每佐領下各二百十共六百三十名十二年除各項専差打獵驍騎三十名看倉驍騎六名委署領催驍騎二十四名之外共存五百七十名又增設七十八名凡守衛之制順治初年定三旗官率所屬驍騎輪班守衛宫殿初制設班房六座乾隆九年增設宫內班房三座定驍騎分七班輪直每九十人為一班每班房十人十二年增設兩掖班房三座合新舊班房十二座改定驍騎分六班輪直每一百八人為一班每班房九人其餘官兵並分職掌酌𣲖齎送貢物及圍獵各差並屬於盛京內務府總管仍由在京內務府掌其升選臣等謹按盛京內府三旗守衛留都宫闕非駐防地方之比敬載入禁衛兵中其三將軍所屬官兵俱入直省兵內守衛陵寢官兵陵寢守衛各總管一人翼領二人惟孝東陵昭西陵禦驍専設防騎校各員騎都尉雲騎尉等世職無定員防禦十六人驍騎校二人所屬驍騎均八十名園寢守衛各防禦八人惟園寢設景陵皇貴妃防禦四人驍騎校一人所屬驍騎均四十名凡陵寢守衛之制天聰八年永陵設散秩官一人順治五年福陵昭陵設散秩官各一人十三年福陵昭陵設總管各一人翼領各二人防禦各八人康熙二年孝陵設總管一人翼領二人防禦十六人八年三陵散秩官改為司工匠官各一人九年永陵設總管一人翼領二人防禦八人十三年三陵增防禦各八人十九年仁孝皇后後恭易孝誠仁尊諡為皇后陵寢今陵景設總管一人翼領二人防禦十六人二十年妃園寢設防禦八人二十七年暫安奉殿今西陵昭設防禦十六人五十七年孝東陵設防禦十六人乾隆元年泰陵設總管一人翼領二人防禦十六人二年昭西陵孝陵孝東陵景陵泰陵設驍騎校各二人景陵妃園寢設驍騎校一人三年泰陵妃園寢設防禦八人驍騎校一人八年景陵皇貴妃園寢設防禦四人驍騎校一人九年端慧皇太子園寢設防禦八人十八年孝賢皇后陵寢設總管一人翼領二人防禦十六人驍騎校二人妃園寢設防禦八人驍騎校一人四十二年泰東陵設防禦十六人驍騎校二人領催四人馬甲七十六名王公府屬官兵親王設長史一人散騎郎四人護衛二十人典儀六人親軍校無定員世子設長史一人散騎郎三人護衛十七人典儀五人郡王設長史一人散騎郎三人護衛十五人典儀四人長子設長史一人護衛十二人典儀三人貝勒設司儀長一人護衛十人典儀三人貝子設護衛六人典儀三人鎮國公輔國公各設護衛四人典儀二人五旗內王公府屬參領每旗各五人佐領每旗各七人驍騎校每佐領下一人王貝勒貝子公等府佐領各設甲兵多寡不等固倫公主府本佐領額兵內設守門甲兵十五名和碩公主府十名郡主府八名縣主府六名凡王公府屬守衛之制於順治八年詳定官數至康熙十八年又定府屬長史散騎郎護衛典儀及佐領員缺並由王貝勒等擬定具題始行補授其六品以下各官照例選補雍正元年定諸王旗屬佐領非包衣佐領可比嗣後旗屬人員祗准用為散騎郎護衛親軍校此外或挑取隨侍之人或令各衙門官員兼理家務或需用多人供役或令隨侍子姪者俱列名請㫖然後知㑹該旗都統覆奏四年定各王屬下仍准設散騎郎其貝勒貝子等所有散騎郎一概酌裁乾隆十八年定長史司儀長員缺於下五旗應用人員內令該旗都統每旗選二人咨送兵部㑹同領侍衛內大臣該王貝勒擬題護衛以下由王貝勒等選擬俱引見補用皇朝文獻通考卷一百八十一
