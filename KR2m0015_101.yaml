body:
  text: 郊社考十一藉田祭先農儀注附臣等謹按藉田之制上以奉粢盛下以劭農事稽古簡牒其典巨矣我朝重農務耕以開王業舉先農之祀開千畝之藉冕而秉耒於古有加焉逮夫今日禮益備事益勤推之郡邑莫不順時循典以敬從事又舉先蠶祀禮躬桑令典務食之源重衣之本以率天下粟帛豐贏婦子恬熙此其端與順治十年三月詔舉行先農祀典十一年二月世祖章皇帝行耕藉禮親祭先農壇康熙十一年二月聖祖仁皇帝行耕藉禮親祭先農壇禮儀與順治十一年同前期遣官祗告奉先殿雍正二年二月世宗憲皇帝行耕藉禮親祭先農壇禮儀與康熙十一年同三推畢復加一推頒發新製三十六禾詞使工歌左右隨行禮畢王以下行慶賀禮停止筵宴自是每嵗皆親耕如儀八月以藉田瑞榖宣付史館是年藉田內産瑞榖一莖四穗者三本一莖三穗者三本一莖兩穗者十二本順天府尹張令璜奏進羣臣請宣付史館從之四年所産尤多有一莖九穗者豐澤園所植稻亦然羣臣表賀宣付史館蓋瑞應頻書不勝紀云四年八月命各直省俱行耕藉禮祭先農壇是月奉諭㫖國以民為本民以食為天朕念切民依舉行耕藉之禮殫竭精誠為民祈榖於上帝乃雍正二年三年藉田特産嘉禾今嵗所産自一莖雙穗至九穗皆碩大堅好異于常穀朕見之心甚慰悅特令宣示廷臣蓋實有見於天人感召之理捷於影響無纎毫之或爽朕以至誠肫懇之心每嵗躬耕藉田以重農事即䝉上帝降鑒疊産嘉榖以昭休應豈人力之所强為乎禮曰天子為藉千畝諸侯百畝則耕藉之禮亦可通于臣下矣朕意欲地方守土之官俱行耕藉之禮使之知稼穡之艱難悉農民之作苦量天時之晴雨察地力之肥磽凡為官者存重農課稼之心凡為農者無茍安怠惰之習於養民務本之道大有禆益九卿詳議具奏尋奏上請令奉天府尹各直省督撫及府州縣衛官于所治地方擇潔淨之地設立先農壇及藉田自雍正五年為始每嵗仲春亥日各率所屬行禮如儀所收米粟敬謹收貯以供祭祀之粢盛其祭先農壇之禮如祭社稷凡大小武職官一體與祭俾知耕藉巨典又以吉林黑龍江二處將軍皆有民社之任令照直省之制建立先農壇致祭耕藉以重農事禮部於每年十月預擇次年耕藉吉期奏聞通行內外同日行禮乾隆三年三月皇上行耕藉禮親祭先農壇是嵗初舉親耕之禮前期六日幸豐澤園演耕至日親祭先農壇遂詣藉田行三推禮畢復加一推禮成上御齊宫王以下行慶賀禮五年三月以閏嵗春寒遣官致祭先農壇禮部奏親耕典禮原可間嵗舉行今逢閏年節氣尚覺春寒更衣行禮不無過于煩勞請暫行停止其致祭先農壇遣官行禮從之八年二月詔遣官祭先農壇用中和韶樂內閣奉諭㫖向來先農壇親祭始用中和韶樂遣官則同小祀之例朝日夕月等中祀雖遣官仍用中和韶樂但不飲福受胙而已朕思國之大事在農先農宜在中祀之列此次遣和親王恭代即照朝日夕月等壇之例用中和韶樂永著為例十九年三月重修先農壇十八年冬奉諭㫖朕每嵗親耕藉田而先農壇年久未加崇飾不足稱朕祗肅明禋之意今兩郊大工告竣應將先農壇宇修繕鼎新其外壖隙地老圃於彼灌園殊為䙝瀆應多植松柏榆槐俾成隂鬱翠庶足以昭䖍妥靈該部會同查明具奏總理工程王大臣遵㫖詳議次第修繕並太嵗殿天神地祗壇俱崇飾鼎新惟旗纛殿以前明舊制本朝不於此致祭毋庸修葺壖外隙地計一千七百畝乘時種樹交太常寺飭壇戶敬謹守護疏上從之先農壇在正陽門外西南制方南向一成方四丈七尺髙四尺五寸四出陛各八級東南為瘞坎壇北正殿五間東神庫西神㕑各五間井亭各一東南為觀耕臺臺前為藉田後為具服殿東北為神倉前為收穀亭後為祭器庫繚以周垣門南向嵗以仲春亥日皇帝親饗先農之神祭畢乃躬耕藉田及秋玉粒告成所司以聞擇吉收貯神倉以供天地宗廟社稷之粢盛二十三年二月詔除耕藉設棚懸綵之例舊例相沿耕藉則設綵棚皇上以其繁費無益諭曰吉亥藉畝所重劭農黛耜青箱畚鏄蓑笠咸寓知民疾苦之意而設棚懸綵以芘風雨義無取焉吾民凉雨犁而赤日耘雖襏襫之尚艱豈炎濕之能避且片時用而過期撤是中人數十家之産也其飭除之三十九年三月上親耕藉詔嗣後耕藉時觀耕臺添設幄次四十七年三月皇上行耕藉禮親祭先農壇臣等謹案吉亥劭農典禮綦重天子夀逾古稀致勤民務維時侍儀之大學士尚書等皆年逾七旬以上臣等恭讀是嵗御製耕藉禾詞仰惟皇上聖夀無疆法天行健固已協無逸而慶屢豐而大臣觀禮者復多龎眉華首喜溢班聨洵千載罕逢之嘉會也五十年三月皇上行耕藉禮親祭先農壇是嵗十一月奉諭每嵗春三月應祭先農壇行耕藉禮禮部俱先期將祭祀日期及藉田一應事宜預行具題雖屬照例辦理但國家典禮以實不以文朕臨御以來兢兢以敬天勤民為念郊壇大祀無不躬親即藉田親耕亦未嘗稍憚煩勞雖本年夀已七十有五猶親舉三推之典惟是春秋已髙或恐步履稍遜若二三年後自揣精力如常偶一舉行豈非熙朝盛事至本年甫經親行耕藉明嵗應否躬蒞自應候朕酌行乃禮部仍照例具題竟似每嵗俱親詣行禮者然豈不轉為具文耶我國家受命延洪純嘏敷錫世世子孫若能皆似朕之敬勤不倦自必景祚綿長享國久逺嗣後我子孫繼承奕祀惟當不懈益勤凡遇親藉典禮若年在六十以內禮部自應照例具題年年躬行耕藉之禮若年逾六十禮部先期以親蒞或遣官之處具本題請庶巨典不尚虛文而展禮益昭誠恪著為令皇帝親祭儀嵗仲春吉亥皇帝親饗先農前二日禮部尚書一人視牲如儀右視牲致齊東西儀同郊祀先一日遣官一人詣奉先殿祗告如常儀右告祭書祝版視割牲視祝版東西儀同郊祀是日清晨太常寺卿率屬潔壇上下藉以棕薦為瘞坎于壇東南隅設先農神座于壇正中南向施黃幄工部官張皇帝拜次于南階上如式右設神座供張將事之夕夜分太常寺卿率屬入壇具器陳牛一羊一豕一登一鉶二簠簋各二籩豆各十盞三十爐一鐙二壇南中設一案少西北向供祝版東設一案西向陳禮神制帛一色青香盤一尊一爵三設福胙于尊爵之旁加爵一牲陳于爼帛實于篚尊實酒承以舟疏布冪勺具鑾儀衛冠軍使設洗于壇東樂部率太常協律郎設中和韶樂及樂舞于壇下東西分列器數與東西郊祀同右陳設省齍東西儀同郊祀辨行禮位壇上幄次為皇帝拜位正中北向壇下東南為望瘞位東向陪祀王公位樂懸北東西各二班百官位樂懸南東西各五班重行異等東位西上西位東上均北面辨執事位壇上太常寺司拜牌拜褥官各一人立皇帝拜位左右司祝司香司帛司爵各一人光祿寺卿二人侍衛二人太常寺贊答福胙一人侍儀禮部尚書侍郎都察院左都御史副都御史樂部典樂各一人位東西序分立祝案尊案之次如常儀壇下太常寺典儀一人司樂一人東立西面起居注官四人西立東面糾儀御史四人禮部祠祭司官四人引禮鴻臚寺官四人分立王公百官拜位之次協律郎歌工樂工舞佾分立樂懸之次均東西面掌瘞官率瘞人立于瘞坎之南北面右辨位其日五鼓步軍統領率所部清蹕除道御道左右塗巷皆設布幛鑾儀衛陳法駕鹵簿于午門外不陪祀王公百官朝服祗候如常儀辰初三刻太常寺卿赴乾清門奏時皇帝御祭服乘禮輿出宫前引後扈如儀駕發警蹕午門鳴鐘鼓導迎樂陳而不作羣臣跪送提爐官左右騎導詣壇如郊祀之儀右鑾輿出宫駕將至司祝奉祝版設於祝案禮部尚書一人率太常寺卿屬詣神庫上香行禮恭請先農神位奉安壇座上如儀鴻臚寺官豫引陪祀王公于壇門內按翼序立候駕至隨行引陪祀百官東班于拜位南北面西班于拜位西東面序立祗候駕至壇東門內降輿贊引對引太常寺卿二人恭導皇帝至壇東盥鑾儀衛官跪奉盥奉巾如儀贊引對引恭導皇帝由中階升就拜位前立前引內大臣提爐官侍衛均于階下止立後扈大臣隨侍鴻臚寺官引陪祀王公百官均就拜位典儀贊樂舞生登歌執事官各共乃職武舞執干戚進贊引奏就位皇帝就位立右盥洗就位典儀贊瘞毛血迎神司香奉香進立祗候司樂贊舉迎神樂奏永豐之章樂作贊引奏就上香位恭導皇帝詣香案前立奏上香司香奉香跪進於右皇帝上炷香次三上瓣香畢奏復位恭導皇帝復位立贊引奏跪拜興皇帝率羣臣行三跪九拜禮樂止右迎神典儀贊奠帛爵行初獻禮司帛奉篚有司揭尊冪勺挹酒實爵以次至案前恭俟司樂贊舉初獻樂奏時豐之章樂作司樂舉節舞干戚之舞司帛跪獻篚奠于案三叩司爵跪獻爵奠于墊中興各退司祝至祝前跪三叩興奉祝版跪案左樂暫止贊引奏跪皇帝跪羣臣皆跪贊讀祝司祝讀祝辭曰維某年月日皇帝致祭于先農之神曰惟神肇興農事萬世永賴兹當東作之時躬耕藉田祈諸物豐茂為民立命謹以牲帛酒醴庶品之儀致祭尚饗讀畢興奉祝版跪安神位前三叩興退樂作贊引奏拜興皇帝率羣臣行三拜禮樂止武功之舞退文舞執羽籥進右初獻典儀贊行亞獻禮司樂贊舉亞獻樂奏咸豐之章樂作舞羽籥之舞司爵獻爵于左儀如初獻樂止右亞獻典儀贊行終獻禮司樂贊舉終獻樂奏大豐之章樂作舞同亞獻司爵獻爵于右儀如亞獻樂止文德之舞退右三獻既終獻太常寺贊禮郎一人少前西面立贊答福胙光祿寺卿二人奉福胙至神位前拱舉退祗立于皇帝之右侍衛二人進立于左贊引奏跪皇帝跪左右官皆跪奏飲福酒右官進爵皇帝受爵拱舉授左官次受胙如飲福儀贊引奏拜興皇帝三拜興又奏跪拜興皇帝行二跪六拜禮王公百官均隨行禮典儀贊徹饌司樂贊舉徹饌樂奏屢豐之章樂作徹畢樂止右受福胙徹饌典儀贊送神司樂贊舉送神樂奏報豐之章樂作贊引官奏跪拜興皇帝率羣臣行三跪九拜禮樂止右送神典儀贊奉祝帛香饌送瘞司祝司帛詣神位前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香司爵跪奉饌興以次恭送瘞所皇帝轉立拜位東旁西向俟祝帛過復位立典儀贊望瘞司樂贊舉望瘞樂奏慶豐之章樂作陪祀王公百官退贊引奏詣望瘞位皇帝詣望瘞位望瘞贊引奏禮成恭導皇帝詣太嵗殿上香樂止禮部尚書率太常寺卿屬恭請神位復御上香行禮如儀皇帝于具服殿更衣乃行親耕禮禮畢還宫太常寺官徹乾清門齊戒牌銅人送寺右望瘞禮成乾隆三十七年遵㫖議准先農壇儀注皇上御禮轎自外北天門入內北天門循太嵗殿後轉至壇東北隅降輿詣壇行禮禮成仍於降輿處御禮轎詣太嵗殿上香遣官饗先農壇之禮先一日太常寺以祝版送內閣恭書受而奉諸神庫至日雞初鳴遣官朝服詣壇贊引太常寺贊禮郎二人引由壇右門入行禮于階下上香贊升壇升降均由東階不飲福受胙王公不陪祀祝帛送瘞避立西旁饗畢順天府府尹率屬行耕藉禮餘均如前儀右遣官儀直省府州縣衛各建先農壇嵗以仲春亥日致祭省會以總督若巡撫一人主之若有故則布政使以次攝陪祀文武官及各執事入均如祭社稷之禮先二日主祭官及各官致齊公所掃除壇壝內外祭日雞初鳴執事人入設先農神案于正中南向陳鉶一簠二簋二籩豆各四案前設爼陳羊一豕一又前設香案一陳祝文香盤爐鐙左設一案東向陳帛一尊一爵三陳福酒胙肉于尊爵之次設洗于階下之東質明引班引陪祭官入引贊引主祭官入通贊贊執事者各司其事贊就位引主祭官至階下盥手就拜位立陪祭官按班就東西拜位立均北面迎神上香讀祝行三獻禮餘儀均與祭社稷同祭畢率屬行耕藉禮其府州縣官嵗祭先農壇並同社稷祭期牲帛器數行禮儀節與省會同右直省府州縣先農壇皇帝親耕儀嵗仲春吉亥皇帝躬耕帝藉前期禮部疏請得㫖命親王郡王三人卿二九人從耕順天府備躬耕絲鞭耒耜飾以黃服耜黃犢稻種青箱備從耕三王麥榖九卿豆黍青箱鞭及耒耜朱飾服耜黝牛皆依期畢辦右戒辦先一日遣官祗告奉先殿是日黎明順天府豫設案二於太和殿東檐下以龍亭三分載躬耕鞭耒種箱彩亭四分載麥榖豆黍種箱鑾儀衛備曲蓋御仗樂部和聲署設鼓吹均俟於午門外府尹率屬奉耕器入陳于第一案鞭左耒右奉種箱陳于第二案中稻種左麥榖右豆黍皇帝御中和殿閲先農壇祝版畢記注官退俟丹墀皇帝御保和殿戶部尚書侍郎率屬舉案入太和殿南左門出北左門詣中和殿內正中陳鞭耒案于北陳種箱案于南皆東西肆遂及禮部尚書侍郎序立丹陛之南重行西面記注官升西階復位立禮部尚書奏請皇帝御中和殿閲耕器五榖種畢奏禮成皇帝出殿門乘輿還宫扈從如儀戶部官舉案復于太和殿東檐下順天府官升左階徹案奉鞭耒種箱出午門外仍設各亭內鑾儀校舁行前列繖仗導迎樂作奏禧平之章至先農壇由中門詣藉田耕所右閲耒耜榖種是日工部官灑掃觀耕臺上下藉以棕薦張次於具服殿之東設御屏寶座于臺上正中南向武備院官供御座鋪陳順天府官陳鞭耒種箱龍亭于藉田之左右陳麥榖豆黍種箱采亭于從耕位之左右陳耕器農器于臺下東西兩旁如儀右陳設鴻臚寺官乃辨位藉田之北正中為皇帝躬耕位戶部尚書一人在右順天府府尹一人在左禮部尚書一人太常寺卿一人鑾儀衛使一人在前耆老二人農夫二人掌耕犢立表于左右從耕田首東班王二人戶部兵部工部通政司各一人西上西班王一人吏部禮部刑部都察院大理寺各一人東上皆順天府官屬丞倅二人從耆老一人農夫二人掌耕牛樂部典樂一人和聲署正二人丞二人立于藉田南北面工歌禾詞者十有四人司金鼓板笛笙簫各六人頂帶耆老四人披蓑戴笠執錢鎛者二十人麾五色采旗者五十人耆老三十有四人農夫三十人相間為班魚貫東西序立署正一人立于北東面鴻臚寺鳴贊一人立于東西面一人立于西東面侍儀御史二人分立鳴贊官之北東西面記注官四人立臺南階下之西東面不從耕王公大學士及三品以上官夾臺東西隅翼立陪位右序位届時皇帝親饗先農禮畢前引內大臣贊引對引太常寺卿恭導皇帝詣具服殿更黃龍袍少俟鑾儀衛官率輿尉回輿於觀耕臺東階外從耕三王九卿暨陪位王公以下咸蟒袍補服按班東西祗候執事官依位序立禮部尚書太常寺卿奏時遂及前引大臣恭導皇帝出殿南向詣耕藉位和聲署正舉旗三麾歌工樂工以下齊赴藉田北前引大臣退於兩旁侍立從耕三王九卿就耕位東西面立鳴贊贊進耒耜戶部尚書奉耒耜贊進鞭順天府府尹奉鞭均北面跪進興退皇帝右秉耒左執鞭禮部尚書太常寺卿鑾儀衛使恭導行躬耕禮耆老牽牛農夫扶犁順天府府尹執青箱户部尚書隨播種左右鳴金鼓采旗招颭工歌三十六禾詞唱和從行皇帝三推三返每嵗奉加一推一返㫖畢歌止順天府府尹以青箱復于龍亭鳴贊贊受耒戶部尚書跪受耒耜贊受鞭順天府府尹跪受鞭皆興復置龍亭內皇帝御補服禮部尚書奏請御觀耕臺暨太常寺卿恭導皇帝升中階御寶座後扈內大臣隨升立御座兩旁記注官升西階東面北上序立從耕三王九卿以次受鞭耒耆老牽牛農夫扶犂順天府屬丞倅一人執青箱一人隨播種三王五推五返九卿九推九返釋鞭耒入侍班位立執事官以青箱復各采亭內序班引順天府屬官及耆老農夫服本色服持農器至臺前西偏北面東上重行序立聽贊行三跪九叩禮退至藉田終畝右親耕禮部尚書奏禮成皇帝降東階乘輿由先農門出法駕鹵簿前導導迎樂作奏祐平之章皇帝回鑾王公從各官以次退不陪祀王公百官朝服集午門外跪迎午門鳴鐘王公隨駕入至內金水橋恭候皇上還宫各退右鑾輿回宫恭遇時巡省方遣官祭先農壇禮畢順天府府尹率屬耕藉九推九返農夫終畝畢望闕行三跪九叩禮直省督撫耕藉禮同儀見後右順天府府尹耕藉奉天府直省府州縣衛嵗仲春吉亥省會總督若巡撫率在城文官耕藉是日首縣知縣視土宜備榖種青箱朱鞭耒服耜黝牛及他農器耕器豫陳耕所耆老率農夫俟於田間通贊學弟子員分立田首向闕張畫屏設香案南向通贊立香案之南引班教諭訓導立通贊之南皆東西面届期致祭先農禮畢各官易蟒袍詣藉田通贊贊行耕藉禮督撫以下就耕所執事者授耒耜鞭皆右秉耒左執鞭進耕督撫以府佐二官一人執種箱一人播種布政使按察使以首領官各道以州縣佐二官知府知縣以丞史執箱播種皆耆老一人牽牛農夫二人扶犁各九推九返畢釋鞭耒以次序立田首西面北上農夫遂終畝告畢事各官補服望闕立通贊贊齊班引班分引督撫以下至香案前按班序立重行北面耆老農夫稍逺列行北面隨立贊跪叩興行三跪九叩禮畢各退若府不附省州縣衛不附府者正官率佐二丞史耕藉各以耆老二人執箱播種餘儀同右直省耕藉皇朝文獻通考卷一百一
