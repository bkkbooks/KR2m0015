body:
  text: 經籍考六經論語孟子孝經經解讀論語劄記二卷李光地撰光地見易類論語稽求篇四卷毛竒齡撰竒齡見易類論語傳注二卷李塨撰塨見易類論語溫知録二卷崔紀撰紀見易類論語說二卷桑調元撰調元字􅌢甫錢塘人雍正癸丑進士官工部主事臣等謹按是書大㫖在闡集注未盡之義卷分上下凡五百條鄉黨圗考十卷江永撰永見禮類例略曰是編分類凡九曰圗譜曰聖蹟曰朝聘曰宫室曰衣服曰飲食曰器用曰容貌曰雜典凡經傳中制度名物有關鄉黨者畢録焉右論語孟子師說二卷黃宗羲撰宗羲見易類宗羲自序曰天下之最難知者一人索之而弗獲千萬人索之而無弗獲矣天下之最難致者一時窮之而未盡千百年窮之而無不盡矣四子之義平易近人非難知難盡也學其學者詎止千萬人千百年而明月之珠尚沈於大澤既不能當身理㑹求其著落又不能屏去傳注獨取遺經精思其故成說在前此亦一述朱彼亦一述朱宜其學者之愈多而愈晦也先師子劉子於大學有統義於中庸有慎獨義於論語有學案皆其微言所寄獨孟子無成書羲讀劉子遺書潛心有年粗識先師宗㫖所在竊取其意因成孟子師說一卷以補其所未備或不能無所出入以俟知先生之學者糾其謬云讀孟子劄記二卷李光地撰光地見易類讀孟子劄記無卷數崔紀撰紀見易類紀自序曰按史記或曰孟子受業子思之門人或曰親受業於子思今反覆七篇之㫖無一不出於曽子所傳之大學如仁義禮智之言性惻隱羞惡辭讓是非之言情性者心之體情者心之用即大學之明德也知言者格致之驗養氣者誠正修之功新民之道以恕與潔矩為本而孟子明義利辨王霸大㫖歸於同民惟後二篇闡發精微極似中庸然其為根柢大學無疑也右孟子御注孝經一卷順治十三年世祖章皇帝御撰世祖章皇帝御製序曰朕惟孝者首百行而為五倫之本天地所以成化聖人所以立教通之乎萬世而無斁放之於四海而皆凖至矣哉誠無以加矣然其廣大雖包乎無外而其淵源實本於因心溯厥初生咸知孺慕雖在顓䝉即備天良故位無尊卑人無賢愚皆可以與知而與能是知孝者乃生人之庸德無甚𤣥竒抑固有之秉彝非由外鑠誠貴乎篤行而非語言之間所得而盡也雖然降衷之理固根於萬民之心而覺世之功必賴夫聖人之訓苟非著書立說以迪天性自然之善抒人子難已之情使天下之人曉然於日用之恆行即為大經大法之所存而敦行不怠以全其本始夫亦孰由知孝之要盡孝之詳以無忝所生也哉此孔子孝經之書所由作也朕萬幾之暇時加三復自開宗明義迄於終篇見其言近而㫖逺理約而該博本之立身以行道推之移風而易俗愛敬所著公卿士庶皆得循分以承歡感應所通東西南北罔不漸被而思服誠萬世不刋之懿矩百聖不易之格言自天子以至於庶人不可一日闕者夫子所謂吾志在春秋行在孝經良有以也自漢以來去聖日逺詮釋滋多厥㫖寖晦孔安國尚古文鄭𤣥主今文互有異同各矜識解魏晉而降諸儒羣興析疑闡奧代不乏人源流攸分不無繁蕪逮及開元更立注疏亦既萃一代之菁英垂表章於奕世矣而詳略或殊詎云至當宋之邢昺元之吳澄輩標新領異間有發揮然揆之美善或未盡焉至於明季著述紛紜或拾前賢之緒餘文其譾陋或摘古人之紕繆肆彼譏彈不知天懷既薄學問復疏因心之理未明空文之多奚補其於作經之意均未當耳夫親恩罔極高厚難酬德至聖人猶虞未盡同為人子孰不佩至教而興永錫之感乎然則訓詁未確漸摩弗力欲其相觀而善厥路無由朕為此慮爰集古今之注更互考訂其得中而窽綮者採輯之其妄逞而臆說者刪除之譬諸沙礫既披美鏐始出稂莠盡剪嘉禾乃登至若流覽之餘時獲一是或足以補未發之藴者輒為增入聊備參觀總以孝之為道甚大而平故不必旁求隱怪用益高深誇示繁縟徒滋復贅惟以布帛菽粟之言昭廣大中正之理雖未知於作者之㫖能盡吻合可無枘鑿與否然而前代諸儒之書瑕瑜難掩與夫近代羣言之失淆亂不稽者於兹正之庶幾發蒙啓錮四方億兆咸知效法而久迪共底於大順之休焉夫如是將見至德要道由此而廣和睦無怨由此而成矣臣等謹按孝經向分今古文諸儒議論紛如迄無定本御注孝經因石臺舊本親加刪定闡發微言考明聖藴庶孔曽遺訓可以家喻户曉已御纂孝經集注一卷雍正五年世宗憲皇帝御定世宗憲皇帝御製序曰孝經者聖人所以彰明彝訓覺悟生民溯天地之性則知人為萬物之靈叙家國之倫則知孝為百行之始人能孝於其親處稱惇實之士出成忠順之臣下以此為立身之要上以此為立教之原故謂之至德要道自昔聖帝哲王宰世經物未有不以孝治為先務者也恭惟聖祖仁皇帝纘述世祖章皇帝遺緒詔命儒臣編輯孝經衍義一百卷刋行海內垂示永久顧以篇帙繁多慮讀者未能周遍朕乃命専繹經文以便誦習夫孝經一書詞簡義暢可不煩注解而自明誠使內外臣庶父以教其子師以教其徒口諷其文心知其理身踐其事為士大夫者能資孝作忠揚名顯親為庶人者能謹身節用竭力致養家庭務惇於本行閭里胥嚮於淳風如此則親遜成化和氣薰蒸躋比户可封之俗是朕之所厚望也夫孝經注義一卷魏裔介撰裔介字石生號貞菴柏鄉人順治丙戌進士官至保和殿大學士乾隆元年追諡文毅孝經集解一卷蔣永修撰永修字慎齊宜興人順治丁亥進士官至平越府知府臣等謹按永修督學湖廣時輯是編與小學合刋名之曰孝經小學集解大全然兩書合為一編是取聖經與宋儒雜纂之本相比倫矣於義殊有未協故仍析為二焉讀孝經四卷應是撰是字敬非號敬齊宜黃人康熙己酉舉人孝經類解十八卷吳之騄撰之騄字耳公歙縣人康熙壬子舉人官績溪縣教諭遷鎮江府教授孝經正文一卷內傳一卷外傳一卷李之素撰之素字定菴麻城人孝經問一卷毛竒齡撰竒齡見易類李塨曰此先生說經之餘録也先生自言曰學聖之功宜行不宜說惟經義是非極須論辨每思建講堂集諸生議羣經得失而厯求其人不可得遂爾中止此祗就問及偶然入記者登之於録臣等謹按竒齡駁詰朱子孝經刋誤吳澄孝經定本輯成是書設為與門人張燧問答之詞凡十條一曰孝經非僞書二曰今文古文無二本三曰劉炫無僞造孝經事四曰分章所始五曰朱氏分經傳無據六曰經不宜刪七曰孝經言孝不言效八曰朱氏吳氏刪經無優劣九曰閒居侍坐十曰朱子極論改文之弊反復辨論頗失詁經之體然其持論甚正恪守舊文則與變亂古經之習甚異矣孝經本義一卷姜兆錫撰兆錫見易類兆錫自序略曰間嘗取夫子志在春秋行在孝經之義因作本義一卷附在春秋參義後孝經詳說二卷冉覲祖撰覲祖見易類孝經三本管窺一本吳隆元撰隆元見易類孝經一卷朱軾注軾見易類軾自序曰元儒吳文正刋誤參校古今文於朱子本時有更定軾裒益舊注附以臆見編於易齊三本管窺之後易齊三本者歸安吳隆元所編今文本古文本朱子刋誤本也梁份序略曰是書不標目第自稱曰朱某學公大臣也大儒也而撝謙若是孝經集解一卷張星徽撰星徽號北山永城人孝星章句一卷任啓運撰啓運見易類啓運自述曰傳之十章君子無不敬也以下一百一十二字得之山西佛寺中疑為熊安生所傳之本又曰王肅於家語言本文有見戴記者後人輒於家語除其文此章之闕亦必因本文見戴記而後人於此除其文也臣等謹按熊安生北齊人其本恐未能傳至於今啓運之說未必有据至所增一百一十二字與禮記文亦小異今本孝經皆無之孝經通義一卷華玉淳撰玉淳見書類孝經通釋十卷曹庭棟撰庭棟見易類臣等謹按是書採録自唐以來凡數十家徴引極博又旁證諸說頗為詳備其大㫖則力主古文而今文亦附載其次焉右孝經欽定翻譯五經五十八卷四書二十九卷乾隆二十年欽定翻譯四書及易詩書春秋禮記至乾隆四十七年以次告成臣等謹按北魏孝文帝命侯伏侯可悉陵譯國語孝經教於國人載於隋經籍志中特侯伏侯可悉陵學識拘陋未能遍及諸經我國家肇興東土所作十二字母於一切語音無不貫攝是編復以國語詳譯諸經演明大㫖微言大義紬譯成章於以嘉惠寰瀛垂示無極同文盛軌宜乎駕軼萬古也墨菴經學無卷數沈起撰起字仲方秀水人五經翼二十卷孫存澤撰存澤見書類七經孟子考文補遺二百六卷原本題西條掌書記山井鼎撰東都講官物觀校勘山井鼎物觀俱日本人臣等謹按是書為日本國所刋専取汲古閣本為主而以其國足利學所有諸本參考異同凡有五目曰考異補闕補脫謹按存舊其别孟子於七經之外者蓋猶仿唐制也九經誤字一卷顧炎武撰炎武見春秋類炎武自序曰今天下九經之本以國子監所刻者為據而其中訛脫實多又周禮儀禮公羊穀梁二傳既不列於學官其學殆廢而儀禮則更無他本可讐其訛脫尤甚炎武至關中見唐石壁九經復得舊時摹本讀之雖不無蹖駁而有足以正今監本之誤者列之為離經之一助云稽古訂訛無卷數龔廷厯撰廷厯字玉成别號震西武進人順治壬辰進士官湖南推官五經辨訛五卷吕治平撰治平號愚菴海寧人順治中嵗貢生官德清縣教諭勉菴說經十卷齊祖望撰祖望字望子號勉菴廣平人康熙庚戌進士官至南安府知府七經同異考三十四卷周象明撰象明字懸著太倉人康熙壬子舉人臣等謹按七經者易詩書春秋三禮也大抵仿黃震日抄章如愚山堂考索之例而裒集舊說附以己意蓋詳於採録而略於訂證者也經問十八卷經問補三卷毛竒齡說經語其門人録以成編竒齡見易類李塨曰仁和汪祭酒嘗答人書謂西河論經終不見有絀理似乎鄭康成杜預孔頴達賈公彥輩皆有贏有絀而西河隨問隨答無是焉經說一卷冉覲祖撰覲祖見易類此木軒經說彚編六卷焦袁熹撰袁熹見春秋類六經圖十六卷江為龍等編為龍桐城人康熙庚辰進士官吏部主事重編五經圖十二卷盧雲英編雲英字默存盧江人冬餘經說十二卷邵向榮撰向榮字東葵餘姚人康熙壬辰進士官鎮海縣教諭王仕源跋曰此書辨制度於漢唐探義理於濓洛非尚意氣爭同異者可也十三經義疑十二卷三傳三禮字疑六卷附春秋大全字疑一卷禮記大全字疑一卷吳浩撰浩字養齊華亭人臣等謹按浩於注疏之學雖未能融貫而考訂頗核義疑十二卷較箋傳之得失辨注釋之異同其用力頗勤字疑之作則因汀州板不概見而北監板毛晉汲古閣板又多謬誤乃取監本毛本校其字畫之舛訛然亦未能詳稽確證以定其是非也經史辨疑一卷朱董祥撰董祥見易類九經古義十六卷惠棟撰棟見易類臣等謹按是編所解易書詩三禮三傳論語凡十經而左傳六卷刋板别行更名補注故僅存其九曰古義者漢儒専門訓詁之學得以考見於今者也棟掇拾殘剩頗見精核與王應麟詩考鄭氏易注諸書均為有功於經學焉經稗六卷鄭方坤撰方坤字則厚建安人雍正癸卯進士官至兖州府知府經玩二十卷沈淑編淑見禮類臣等謹按是編一名經玩七書七書者經典異文輯經典異文補左傳分國土地名左傳職官左傳器物左傳宫室及注疏瑣語也採輯頗為勤篤而於考證發明處則略焉三經附義六卷李重華撰重華字君實號玉洲吳江人雍正庚戍進士官翰林院編修松源經說四卷孫之騄撰之騄見書類經學淵源録三十卷黃琳撰琳字仲珩號藴山武進人雍正中諸生十三經注疏正字八十一卷沈廷芳撰廷芳字椒園仁和人乾隆丙辰召試博學鴻詞授翰林院編修官至山東按察使臣等謹按是書以監本重修監本陸氏閩本毛氏汲古閣本校正十三經注疏略倣韓文考異之例以本句標題而所訂異同得失條繫於下於形聲六體考据尤詳洵有禆於注疏之學不少朱子五經語類八十卷程川編川字鄜渠號春曇錢塘人乾隆元年薦舉博學鴻詞心園說二卷郭兆奎撰兆奎見書類六經圖六卷王皓撰皓字又皓號雪䲨六安人臣等謹按周伯琦六書正訛以說文鴻字為俗體造為䲨字取工字諧聲不知江字古亦音工無煩别造皓不知其誤取此字為號則於考古之學多見疏淺宜其補校諸圖毫無訂證也羣經補義五卷江永撰永見禮類經咫一卷陳祖范撰祖范字亦韓亦字見復常熟人雍正癸卯舉人本年中式㑹試乾隆辛未薦舉經學特賜國子監司業銜臣等謹按祖范膺薦後嘗恭録是書進呈御覽門人歸宣光等為之校刋凡涉經義者各以類附為條七十為篇七其曰經咫者取晉語咫聞之義也九經辨字瀆䝉十二卷沈炳震撰炳震歸安人古經解鉤沈三十卷余蕭客撰蕭客字仲林長洲人蕭客自序曰是書創始於己卯成稿於壬午晝夜手録幾於左目青盲而後成帙先儒所著義訓其書尚存者不載或名存而其說不傳者亦不載餘則自諸家經解所引旁及史傳類書凡唐以前之舊說有片語單詞可考者悉著其目雖有人名而無書名有書名而無人名者亦登載又以傳從經鈎稽排比一一各著其所出之書並仿資暇集龍龕手鏡之例兼其書之卷第以示有徴云十三經字辨無卷數陳鶴齡撰鶴齡字瑶賔江南通州人臣等謹按是書所謂十三經者乃大學中庸論語孟子易詩書春秋禮記周禮儀禮爾雅也所列經目次第古無此例於數亦不相協即其所謂校畫校音者參訂亦多訛漏也古學偶編一卷張炯撰舊本題潛山人仕籍未詳九經圖無卷數楊魁植編其子文源增訂魁植字輝斗文源字澤汪長泰人說書偶筆四卷丁愷曽撰愷曽字蕚亭日照人經解五卷經義雜著一卷黃文㴻撰文㴻字雨田一曰穀田又曰穀亭豐城人右經解皇朝文獻通考卷二百十六
