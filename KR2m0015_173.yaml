body:
  text: 欽定四庫全書皇朝文獻通考卷一百七十三樂考十九樂舞臣等謹按周禮以六舞大合樂自後厯代因之制之沿革不同皆所以和神人而象功德也我朝舞制亦仍前代之舊而斟酌盡善損益得中蓋列聖相承文德武功度越前古周禮六代之舞於今復覩其盛矣謹次樂舞聲容儀節之美備而於樂員人數服色之制亦附記焉崇德二年正月朔分别樂舞人等技藝賞銀有差順治元年定樂舞人員額數服色之制太常寺神樂觀提㸃一員左右知觀各一員協律郎五員贊禮郎十六員司樂二十六員奉祀五員丘圜方澤夕月朝日五壇先農祀丞三員方澤圜丘先農三壇樂生一百八十名文舞生武舞生各一百五十名執事樂舞生九十名如有遺缺於觀內官員家道童選補臣等謹按康熙三十八年裁協律郎一員贊禮郎二員司樂二員雍正元年皆添復乾隆八年改神樂觀為神樂所知觀為知所二十年又改為神樂署提㸃為署正知所為署丞品級仍舊凡樂舞儀節本寺令協律郎等官教習遇有祭祀先期於凝禧殿演習至祭日司爵司香捧帛捧爵焚香等事俱用執事樂舞生又有樂生文舞生武舞生執旌節樂舞生應給净衣俱行文工部取用天壇大祭共用樂舞生二百五十九名給淨衣二百五十九套執事樂舞生服藍鑲邊青縀袍武舞生并執旌節樂舞生服青縀銷金花袍文舞生并執旌節樂舞生樂生焚香樂舞生服青縀補袍俱繫緑綢帶戴裹金銅頂帽如遇祭告皇帝親詣行禮用樂舞生三十八名遣官行禮用二十八名祈榖大祭共用樂舞生二百三十五名給淨衣二百三十五套執事樂舞生服藍鑲邊青羅袍武舞生服紅縀銷金花袍文舞生樂生焚香樂舞生服紅縀補袍𢃄頂同前地壇大祭共用樂舞生二百四十七名給淨衣二百四十七套執事樂舞生服藍鑲邊青縀袍武舞生服青屯絹銷金花袍文舞生樂生焚香樂舞生服青屯絹補袍帶頂同前如遇祭告用樂舞生二十六名臣等謹按已上樂舞生各給淨衣康熙三十九年裁太廟祭祀共用樂舞生二百六十七名執事樂舞生服青縀袍武舞生服紅縀銷金花袍文舞生樂生焚香樂舞生服紅縀補袍帶頂同前遇祭告用樂舞生二十六名專祭一殿用十七名或十五名社稷壇每祭共用樂舞生二百二十七名執事樂舞生服藍鑲邊青羅袍武舞生服紅羅銷金花袍文舞生樂生焚香樂舞生服紅羅補袍𢃄頂同前如遇祭告用樂舞生十八名朝日壇每祭共用樂舞生二百三十五名執事樂舞生服藍鑲邊青羅袍武舞生服紅羅銷金花袍文舞生樂生焚香樂舞生服紅羅補袍帶頂同前夕月壇每祭共用樂舞生二百三十五名執事樂舞生服藍鑲邊青羅袍武舞生服玉色羅銷金花袍文舞生樂生焚香樂舞生服玉色羅補袍帶頂同前帝王廟每祭共用樂舞生二百八十三名執事樂舞生服青絹袍武舞生服紅色銷金花袍文舞生樂生焚香樂舞生服紅色補袍帶頂同前文廟每祭共用樂舞生一百四十名執事樂舞生服青絹袍文舞生樂生執旌節樂舞生俱服紅色補袍帶頂同前先農壇每祭用執事樂舞生十八名服月白鑲邊藍袍焚香樂舞生服紅絹補袍如遇皇帝耕藉親祭共用樂舞生二百二十二名執事樂舞生服月白鑲邊青袍武舞生服紅絹銷金花袍文舞生樂生焚香樂舞生服紅絹補袍𢃄頂同前太嵗壇每祭共用樂舞生二百三十二名執事樂舞生服青絹袍武舞生服紅色銷金花袍文舞生樂生焚香樂舞生服紅色補袍帶頂同前定文德武功舞制祭日典儀官唱樂舞生就位初獻樂作司樂執節引武舞生執干戚進奏武功之舞舞畢樂止武舞生退亞獻樂作司樂執節引文舞生執羽籥進奏文德之舞終獻樂作文舞生奏文德之舞舞畢樂止文舞生退臣等謹按舞制用八佾六十四人初獻奏武舞亞獻奏文舞凡郊廟大祀暨各壇廟中祀並同惟文廟用六佾三十六人初獻亞獻終獻均奏文舞康熙十二年定舞官各賞蟒縀大縀樂舞人等各賞綢縀細布有差十六年定織造樂舞生袍帶凡祭祀通贊樂舞生袍𢃄據太常寺來文式樣數目行浙江織造乾隆七年五月定大雩童子舞制和碩莊親王等議奏考古大雩用舞童二佾衣元衣各執羽翳歌雲漢之詩今䝉皇上倣雲漢詩體御製詩歌八章聖念懇誠宸章剴切亘古未有應用舞童十六人衣元衣為八列各執羽翳終獻後文舞生退司樂引舞童進典樂唱舞童歌詩舞童八列按舞而歌歌畢乃望燎舞童令掌儀司選聲音清亮者演習應用羽翳照周禮皇舞之式染五采其舞衣舞羽俱交內務府成造從之六月詔定舞譜奉諭鄭世子樂書等書俱有舞譜本朝舞制並無紀載應作何載入書內之處著傳諭莊親王張照知之嗣經莊親王等詳考各祭祀樂舞聲容儀節纂成舞譜奏准載於律吕正義後編垂為定制八年二月定武舞干上字句和碩莊親王等奏查武舞干上有字其字只五種而分八佾不能齊一必係原有八種年久遺失今將現在所用并另擬八句開單進呈奉硃筆改定雨暘時若四海永清倉箱大有八方敉寧奉三永奠得一為正百神受職萬國來庭定筵宴樂舞名色隊舞總名為慶隆舞介胄騎射為揚烈舞大臣對舞為喜起舞竹馬為禺馬所戴醜面為面具歌章為司章騎竹馬為司舞彈琵琶為司琵琶彈三絃為司三絃拉奚琴為司奚琴搊筝為司筝拉胡琴為司阮劃箕為司節拍版為司拍拍掌人為司抃瓦爾喀部樂為瓦爾喀部樂伎舞者為瓦爾喀部舞人敲碟子為擊缶伎打口琴為觱篥伎拉胡琴為瓦爾喀阮伎慶隆舞制司琵琶司三絃各八人司奚琴司筝各一人司節司拍司抃各十六人俱服石青金夀字袍豹皮端罩在丹陛兩旁立兩翼並上司節司拍司抃兩翼各八人分三排北面立司琵琶司三絃兩翼各四人東西向立司奚琴在東司筝在西司章十三人服蟒袍豹皮端罩從右翼上東向立奏慶隆之章揚烈舞上服黃畫布套者十六人服黑羊皮套者十六人各戴面具跳躍擲倒象異獸騎禺馬者八人分兩翼上北面一叩頭周旋馳逐象八旗一人射一獸受矢羣獸懾服象武成舞畢喜起舞上隊舞大臣十八員朝服入殿內正中三叩頭退東邊西向立以兩為隊進前對舞每隊舞畢正中三叩頭退次隊復進如儀瓦爾喀部樂舞司舞八人服紅雲縀鑲粧縀花補袍狐皮大帽在丹陛西邊立進前正中三叩頭退於西邊柱後立司觱篥司阮各四人分兩翼上向上一膝跪奏瓦爾喀部樂曲司舞以兩為隊按隊進舞每隊舞畢正中三叩頭次隊復進如儀回部樂舞司達卜一人司那噶喇一人司哈爾扎克一人司喀爾奈一人司塞他爾一人司喇巴卜一人司巴拉滿一人司蘇爾㖠一人皆衣錦面雜色紡絲接䄂衣錦面倭縀緣邊回回帽青縀靴緑綢􅭫膞司舞二人舞盤二人皆衣靠子錦腰襴紡絲接袖衣先作樂司舞二人起舞舞畢舞盤人上以次舞畢退臣等謹按已上舞制皇帝三大節筵宴進饌後中和清樂止禮部樂部官引慶隆舞上揚烈喜起先後進舞笳吹髙麗國俳後掌儀司引瓦爾喀部樂進乾隆二十四年平定西陲回部敬獻樂舞於瓦爾喀部樂後以次奏樂陳伎凡上元除夕筵宴暨皇太后筵宴舞制並同世德舞制皇帝幸盛京筵宴進饌後中和清樂止笳吹奏畢世德舞上司章奏世德之章隊舞大臣十八員朝服以次對舞如儀德勝舞制出師凱旋筵宴皇帝進饌賜凱旋大臣酒畢中和清樂止德勝舞上司章奏德勝之章隊舞大臣十八員朝服以次對舞如儀五魁舞制部宴衍聖公正一真人及文武㑹試鄉試筵宴樂用鼓一管二笛二笙二雲鑼一板一歌童五人衣五魁衣進舞舞器節律吕正義後編曰節朱漆木竿長七尺二寸九分徑一寸零九釐六毫竿頂金龍頭長九寸七分二釐節旄九層每層六寸四分八釐繫長五寸七分六釐緌長七寸二分九釐架髙二尺五寸六分濶一尺五寸三分六釐漆以金每架植二節文武二舞時司樂官執之以節舞童子舞節律吕正義後編曰竿長六尺水成數徑一寸水生數龍頭六寸水成數共長六尺六寸水成數節旄七層水生成共數一白色金二黑色水三青色木四赤色火五黃色土六白色金七黑色水五行相生始金終水每層六寸水成數繫長四寸金生數緌長九寸金成數距竿末一尺一寸水生數童子東西兩班各十六人執節者引至班所各分四行每行四人北面植羽立干律吕正義後編曰干木版為之上鋭下齊中髙三尺六寸四分五釐兩邊髙三尺二寸四分上濶七寸二分九釐下濶六寸四分八釐正面上截晝五彩雲氣龍頭下截四旁粉油中紅油凡八佾書雨暘時若四海永清倉箱大有八方敉寧奉三永奠得一為正百神受職萬國來庭各一句字旁畫五彩雲龍背面紅油橫帶二中有曲木武舞生左手執之戚律吕正義後編曰戚以木為之斧頭黑油刃粉油背至刃五寸一分二釐刃濶四寸五分五釐一毫背濶一寸八分二釐二毫背後一寸二分一釐三毫戚柄紅油長一尺五寸七分七釐大徑一寸一分三釐七毫小徑八分一釐上尖長二寸八分八釐尖濶八分六釐四毫本濶六分零七毫武舞生右手執之籥律吕正義後編曰籥朱紅竹管為之六孔管徑四分六釐八毫通長一尺七寸五分一釐最下第一孔距管端一尺三寸一分三釐二毫第二孔距管端一尺一寸六分七釐三毫第三孔距管端一尺零一分一釐二毫第四孔距管端八寸七分五釐五毫第五孔距管端七寸三分八釐七毫最上第六孔距管端五寸零五釐六毫文舞生左手執之羽律吕正義後編曰羽紅油木柄長一尺九寸四分四釐徑三分一釐三毫柄上貼金龍頭長四寸八分六釐龍口插雉羽長二尺九寸一分六釐五毫文舞生右手執之童子舞羽律吕正義後編曰羽長一尺六寸水生成數柄通長一尺六寸水生成數龍頭三寸六分金生金成相乘之數龍尾二寸四分金生水成相乘之數頭尾共長六寸水成數身長一尺水生數徑六分水成數羽染五采左羽三莖右羽二莖參天兩地數節律吕正義後編曰節形如箕中長一尺五寸七分六釐邊長一尺三寸六分五釐口濶一尺三寸六分五釐口深一寸九分四釐四毫掌濶一尺五寸三分六釐掌深三寸二分四釐筯二枝長一尺一寸五分二釐上連下開相距一寸九分四釐四毫皆用紅漆箕背繪虎頭以筯劃箕為節慶隆舞用之皇朝文獻通考卷一百七十三
