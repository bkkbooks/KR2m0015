body:
  text: 國用考八賑卹賑濟順治二年初定八旗賑濟例八旗澇地每六畝給米二石王貝勒貝子公府屬人役給米如之其投充人𢃄来地不准給口外八旗蒙古地按口名折給米銀許其沿邊糴米毋令進口八旗游牧地每口月給米一斗張家口者給米古北口者給銀五年定直省駐防官應給澇地米隨家口所在支給六年停八旗踏勘災地遇災王以下食俸官以上每嵗照俸米倍給是年定嵗災荒督撫即詳察頃畝分數具奏八年山東江浙水以倉榖賑窮民以學租賑貧士十年賑八旗貧人滿洲䝉古每佐領下給布六十匹棉六百斤米百石漢軍每佐領下給布三十匹棉三百斤米五十石是年定凡勘災京城内外由户部直省由督撫勘奏請賑十六年定直省勘災用道府府倅康熙四年定勘八旗災地用驍騎校領催勘明結送户部具題又定旗人七嵗以上為一口六嵗以下四嵗以上為半口其投充及傭雇人勿與十一年分賑八旗人澇地每佐領下滿洲蒙古給食米二百石漢軍百石管旗都統即以到通漕米酌量散給旱地每六畝給米二斛米折各半折色視時直守南苑海戸災地不論旱澇每六畝給米一斛又發户禮兵工部庫貯銀十六萬并内帑銀八萬兩分賑直𨽻各府饑民十二年發内帑銀二萬兩賑八旗窮民十三年賑給八旗滿洲䝉古每佐領米三百石漢軍米百石官員家人充兵者不與賑八旗被災地每六畝米一斛又發内帑銀三萬兩賑直𨽻饑民十四年發内帑銀十萬兩分賞八旗兵丁及賑直𨽻饑民十六年雲南貴州新入版圖發銀十五萬兩賑濟窮民十七年定奏報期限直省災傷先以情形入奏夏災限六月秋災限七月州縣遲報逾一月内者罰俸六月一月外者降一級二月外者二級均調用三月外者革職撫司道官以州縣報到日起限逾限議亦如之康熙七年定八旗報災不得過八月十日雍正六年増定勘報之官寛限十日奏報之官寛限五日統以四十五日為限乾隆二年定凡遇水旱督撫既入奏即親至災所率屬發倉廪先賑仍於四十五日限内題明加賑賑畢冊具戸口米糧各數題銷其被灾頃畝分數於勘奏之日隨疏聲明應蠲免數目於勘奏日始限兩月冊報七年定甘肅地氣節候較異他省鞏昌蘭州寧夏西寧甘州凉州六府肅州及安西靖逆二㕔如夏秋二禾於六九月災者仍舊限申報或有限後災者凖於七十月望前申報康熙元年定八旗被水災地每六畝給米二斛蝗雹災每六畝給一斛三年八旗莊田災賑米粟共二百十三萬六千斛有竒七年六月山東地震賑災民九年命大臣往勘淮揚水災明年又遣大臣同江南督撫截留漕米並鳯徐各倉米賑濟災民人給米五斗六嵗以上十嵗以下半之又分設米厰食餓者人日給米一升三日一散部差司官每府一人同地方官騐給是年賑湖廣竹山縣被火災民十年八旗屯地旱賑米百六十四萬七百石十二年山西饑發銀二十萬兩命部員往㑹賑十八年賑山東沂州等十三州縣饑民是年七月京師地震發帑十萬以賑旗民二十四年浩齊特郡王以所屬蒙古饑請賑從之遣官運拜察儲粟千石往賑二十五年特遣大臣往賑鳯陽徐州屬災民二十七年雲南鶴慶府劍川州地震死者每名給銀一兩傷者半之屋壞者每間銀二兩無棲止者人給穀一石幼者半之二十八年諭撥戸部庫銀三十萬兩賑直𨽻饑民三十年陜西西安二十七州縣災撥山西銀二十萬兩赴陜充賑命大臣一人往驗每大口日給米三合小口一合五勺折價視時直至明年四月終停賑是年賑直𨽻十四州縣災民每大口日給米四合小口二合三十三年賑直𨽻十一州縣災民大口日給米三合小口一合五勺自二月至明年四月止三十四年山西平陽府地震命大臣一人往賑卹死大口給銀二兩小口七錢五分葺居戸給銀一兩三十六年諭直省被災地方著差戸部賢能司官一人㑹同該撫等逐一親行確勘具奏三十七年山東濟兖東三府屬比嵗不登諭舉賢能司官二人往㑹巡撫同散賑三十九年發坡賴村倉糧賑巴林二旗窮丁四十年賑甘肅可州屬土司准内地每大口月給米一倉斗小口半之四十二年山東饑上命戸部官馳驛速往截留漕運尾船米五十萬石備用並委八旗官各支庫銀三千兩前往山東㑹同地方官賑濟諭曰賑濟山東饑民事闗緊要應分為三路每路差大臣一人與先差往司官一同往返巡察於事有益截漕糧亦屬𦂳要漕運總督見今無事著作速前來親看截留其賑濟饑民官員所領雖係公項若勉自効有益於民事竣回時一併議叙是年賑安徽鳯陽屬亳州等州縣饑民大口日給五合小口三合四十三年湖廣監利縣災每大口日給穀一升小口六合自十一月至明年二月止四十六年諭倉榖數少未足徧給惟各州縣截留漕米可以實恵及民目下時已届冬總漕無事著㑹同總督廵撫親往各州縣被災地方備加察勘將本年所徴漕糧每州縣或留八九萬石或留十萬石酌量足支賑給之數分别多寡存留支散及今漕米尚未開兑截見收之糧以濟待哺之衆實於民生大有禆益此朕殷殷懐保赤子矜念如傷之至意戸部即移文該督撫等實心奉行仍開具賑濟實數奏聞時以淮徐揚三府無存榖用司庫銀十萬兩充賑大口月給銀三錢小口半之四十九年福建漳州泉州旱令截留今冬應運鎮江漕十萬石運至狼山截留松江湖州漕各十萬石運至乍浦令福建總督遣總兵官二人用戰船至狼山乍浦接運至二郡以賑饑民五十二年賑四川茂州及平畨等營堡地震災民五十三年以甘肅去嵗薄收民艱食命大臣一人巡察兼行賑濟自二月至六月每大口日給米三合小口二合五十四年蒙古被雪損傷牲畜運榖賑烏喇特十四旗察哈爾八旗乏食人五十五年順天永平府屬米價翔貴撥京通倉米二十萬石令部院官徃賑五十七年索倫被水發銀一萬兩遣副都統等往㑹黒龍江將軍酌量賑濟是年發盛京倉賑扎賚特固山貝子特固斯屬下窮丁五十九年陜西饑戸部撥運銀五十萬兩差大臣率部院官分西安延安蘭州三路賑濟並將陜屬常平倉糧六十九萬二千石甘屬常平倉糧六十七萬二千石充賑旗人有情愿効力者許自備銀米赴部具呈將職名送散賑官處俟効力事竣照銀米之多寡覈明議叙是年直𨽻延慶保安懐來河城宣化龍門地震命大臣一人往賑六十年諭今春雨澤甚少備荒要緊著發帑金五十萬兩差大臣往山陜地方買米賑濟六十一年特遣大臣賑直𨽻贊皇等四十二州縣饑民並發米各州縣煮粥賑濟雍正元年直𨽻河南山東災各遣大臣一人往賑直𨽻河南則發倉榖及截留漕米充賑山東出司庫銀十三萬四千兩散給其耕種無資者量助流亡者令三省督撫招輯復業是年郭爾羅斯喀爾沁扎嚕特各旗饑發帑七萬兩命大臣往賑二年發帑二萬兩賑蘇尼特四旗人三年直𨽻饑截留漕米二十萬石發通倉米十萬石賑霸州七十二州縣民三月賑大興等四縣民一月又諭今嵗直𨽻地方被水小民乏食恐停賑之後正值東作之時農民謀食無策著再加賑一月是年江南睢寧宿遷二縣水災用積榖煮賑五月四年安徽所屬水無為望江等州縣煮賑五月泗州諭令布政使親勘用銀二萬兩按戸散給五年直𨽻還鄉河决玉田縣堤遣大臣御史賫銀二萬兩分視被災二十三州縣逐戸計口勘察散賑是年江南浙江湖北湖南間被水災各發帑飭大吏酌量賑濟六年定賑濟例勘災給糧有司官必親臨毋假手胥役里甲近城之地設粥厰逺在四鄉於二十里内各設一米厰照煮賑米數按口月給一次至七年増定賑濟畢將賑過銀米數目戸口姓名月日刋示曉諭以杜胥吏中飽八年北河溢直𨽻順徳廣平大名河間四府災遣侍郎副都統科道翰林等分四路每路各領帑銀二萬兩前往勘察仍動留漕改穀及捐穀散賑三月復遣大臣往撫綏安輯毋令遷徙失所又河溢山東江南賑濱河州縣饑民並給銀以葺廬舎之水毁者是年京師地震發帑二萬兩遣官分五路勘賑每旗各賞銀三萬兩按名分給十一年江南海溢常熟華亭等二十九州縣災直𨽻豐潤薊州等處亦被水咸如例賑卹是年賑科爾沁窮丁六千六百餘名乾隆元年諭地方偶有水旱之事凡察勘戸口造具冊籍勢不得不經胥役里保之手其所需飯食舟車紙張等費朕聞竟有𣲖累民間並且有取給於被災之戸口者若遇公明之有司尚知稽察禁約至昏憒庸懦者則置若㒺聞益滋閭閻之擾矣嗣後凡飯食盤費及造冊紙張各費皆酌量動用存公銀毋許絲毫𣲖累地方若州縣官不能詳察嚴禁以致胥役里保仍蹈故轍者著該督撫立即題㕘從重議處是年巴林四旗旱發帑萬兩遣官往賑三年諭各省學田銀糧原為散給各學廩生貧生之用但為數無多地方偶遇歉年貧生不能自給往往不免饑餒深可憫念朕思士子身列膠庠自不便令有司與貧民一例散賑嗣後凡遇地方賑貸之時著該督撫學政飭令教官將貧生等名籍開送地方官覈實詳報視人數多寡即於存公項内量發銀米移交本學教官均匀散給資其饘粥如教官開報不實給散不均及為吏胥中飽者交督撫學政稽察即以不職㕘治至各省學租務須通融散給極貧次貧生員俾霑實惠是年寧夏地震壊廨署廬舎人民文武官亦間有遇災者命大臣一人馳驛往視發司庫銀二十萬兩逐戸散賑其遇災身故官弁照巡洋被風身故例恩賜卹典又安徽旱天津水咸賑如例是年定民間火災准動存公銀酌賑四年賑江南貧民極貧賑四月次貧賑三月又次貧賑一月旋命下江極貧加賑一月上江州縣被災五分以上者極貧次貧加賑一月被災四分以下者極貧加一月是年定賑濟米數向例每名日支三四合至七八合不等嗣後大口日給米五合小口二合五勺凡遇賑有司官將被災分數賑卹欵目豫期宣示以曉愚民如有奸民藉端要挾者論如法六年安徽水賑鳯陽頴州饑民七年黄淮交漲淹民田廬江淮饑上心憂勞命大臣往㑹督撫勘賑用帑千餘萬破格拯濟民以蘇息時據奏報實數江蘇所屬江浦等二十九州縣衛撫卹正賑加賑給被災軍民米共一百五十六萬二千六百三十五石銀共五百五萬一千五百二十一兩有竒沛縣䕶城隄决漂沒貧民賑糧共補給小麥七百四十三石七斗又賑貧生米二千八百三十四石銀四萬三千六百九十四兩各有竒安徽所屬鳯陽等二十四州縣撫卹正賑加賑共給軍民貧生米八十三萬一千九百八十石九斗銀二百三十三萬四千零四十五兩八錢四分各有竒又宿州等州縣收養無依貧民米十有九石九斗五升銀一百有四兩七錢各有竒是年定地方凡遇水旱即行撫卹先賑一月再察明戸口被災六分者極貧加賑一月被災七八分者極貧加賑兩月次貧加賑一月被災九分者極貧加賑三月次貧加賑兩月被災十分者極貧加賑四月次貧加賑三月又定若地方積歉抑或災出非常許將極貧加賑自五六月至七八月次賑加賑自三四月至五六月又定山西湖廣貴州不分極貧次貧山東陜西祇分極貧次貧皆按月給賑江南浙江原分極貧次貧又次貧凡被災待賑每至數千戸分為極貧次貧易於察驗至又次貧與次貧相去無幾不便酌减賑䘏且分晰多端未免躭延滋擾應祇分為極貧次貧其又次貧宜從刪省又定凡遇夏災其災地嵗不兩熟及雖兩熟而秋禾不復可種者照秋災例請賑風災如雹災得貸種食傷大田者亦以秋災論八年諭上年江南淮徐鳯潁等府遭值水災朕宵旰焦勞無一時釋於懐抱特遣大臣㑹同督撫百計經理不惜千萬帑金期登斯民於袵席頃據陸續奏報被水之地漸次涸出冬間可以種麥石林决口亦已堵禦水勢减落朕心稍慰但念兩江受水之地甚廣其見在已經涸出者民間努力耕種自不待言其沮洳將涸者開春布種春麥大麥及雜糧之屬亦可冀望有收惟是最窪之地積水較深有非人力所能計日宣洩者倘春月不能趕種春麥雜糧而停賑之期已届窮民何以為生朕思慮及此深為憫惻著欽差大臣及該督撫將實在不能涸出補種之地一一察勘所有饑民口數若干按其情形酌定月分接續賑卹毋使失所是年賑直𨽻天津河間深州屬二十八州縣山東徳州等十三州縣饑民九年安徽徽州寧國二屬浙江紹興嚴州衢州三屬間被水咸賑如例以徽屬産米少許折給浙三屬積水不涸加賑一月十年直𨽻宣化府順天之延慶縣山西大同府江蘇安徽所治州縣間以災告咸賑如例各諭加賑有差又為延慶民給牛種營井樹俾得耕種江南之安東則戸給銀以葺其居十一年山東河南江蘇安徽均被水江南為甚截漕米二十萬石充賑並給銀葺居以安棲止餘並於常賑外加賑有差是年廣東廣州肇慶韶州南雄水例給口糧宣化府雹均飭大吏如例賑卹十二年山東大水九十州縣衛災截留山東河南漕並運天津北倉米充賑時據奏實數賑濟饑民共榖四十四萬七千六百八十二石八斗米五十九萬八千六百十有一石二斗銀一百七十九萬三千六百四十九兩八錢各有竒賑濟老弱殘病貧民銀七萬八百七十四兩六錢八分是年江蘇颶風海溢崇明寳山上海鎮洋常熟昭文南滙江隂沿江海各縣災上軫其艱諭令兵民並賑又直𨽻天津浙江杭州江南徐州間遇偏災咸賑如例十三年春駕幸山東軫念災黎令加賑外再加展賑江南亦如之秋山東鄒平等二十州縣衛又被水諭各省督撫酌運倉穀助賑是年西安福建旱諭河南泛粟以濟陜截留江南浙江漕海運以濟閩雲南山西甘肅亦小有偏災咸賑如例十五年賑上下江二十七州縣被水饑民是年盛京船厰久雨江漲人給口糧一月十六年浙東旱被災者凡五十四州縣又河溢山東丹沁水漲入豫福建寧化清流水入城福安夀寧風雨壊民廬舎江蘇之江浦銅山邳州沛蕭宿遷睢寧安徽之歙績溪廣徳建平銅陵夀宿山西之鳯臺髙平陜西之朝邑直𨽻之長垣皆以災告常賑加賑各飭大吏加意撫輯上尤厪念浙東命截留漕米五十萬石諭湖廣用倉榖碾米協濟十萬石賑糶兼施本折並賑民用不困十七年西安三十七州縣山西十一州縣旱民饑飭賑如例十八年黄淮漲淮揚徐災旋河决銅山隄宿靈虹泗等處亦被淹命大臣往視發帑截漕以賑饑民又撥運江西浙江湖北湖南河南山東四川米協濟賑糶是年山東掖濰昌邑三縣風災人給一月口糧十九年淮揚雨下河處所復被水農民竈丁賑如例並設厰於城粥以食饑者是年福建漳州屬水民饑人給一月口糧臺灣澎湖颶風壊商漁船及民田廬諸羅彰化二縣災雲南易門石屏地震壊人民廬舎均飭大吏動倉穀賑濟二十年淮揚徐大水賑饑民仍設粥厰浙江杭州湖州紹興府屬亦被水賑如例設粥厰如之是年山東沂州秋禾災加賑有差二十一年江南十六州縣衞山東四州縣衞水偏災咸賑如例二十二年駕幸江浙念山東災民命加賑外各展一月因諭曰豫省之夏邑商邱永城虞城四縣與蕭碭曹單災地犬牙相入豈獨無災此中州之民淳樸風厚不敢言災是以賑卹未及益用嘉憫著該撫即速勘明積水地畝加賑一月又諭河南歸徳府屬之夏邑商邱虞城永城考城并陳許兩屬各縣五六月間大雨連綿以致窪地復有積水秋禾被淹已命侍郎裘曰修前往相度疏濬兾速為消涸但該省濵河州縣與山東之金鄉魚臺江南之宿虹豐沛等處壤地相錯屢嵗被災在山東江南者均邀賑卹而該省地方官從前並未留心查辦獨抱向隅今涸出補種之秋禾復被漫淹平地亦多潦浸朕心深為憫惻雖定例夏災不賑而該處積歉之後民食艱難應加優卹副都統三泰郎中蘇爾徳現在奉使在豫著即率同䕶撫劉慥查明被災户口無論極次貧民概予一月口糧其董率有司實心查辦毋被胥役侵蝕中飽嗣後陸續奏報汲淇封邱中牟陽武新鄭武陟原武輝滑新鄉延津獲嘉許州長葛祥符皆被水壊民田廬命本折兼賑増折價撥江西湖北米協濟並以工賑疏濬溝塍引積水達于河自十月至明年二月賑垂畢上曰譬如赤子出慈母之懐未能强飯遽斷其乳其何以堪其再加賑一月是年漳河暴漲注衞河山東直𨽻均被水發粟賑濟給銀葺居如豫省其山東濟寧金鄉魚臺鄒嶧滕六州縣淹涸者再令折賑倍給其直是年夏兩江水甘肅雨雹山水大至民饑賑貸各如例行二十三年甘肅河東西旱秋禾災民艱食本折兼賑增折直河東十之三河西十之四叠諭展賑至明年七月河州狄道環縣東樂又展賑三月二十四年甘肅臯蘭等二十五㕔州縣秋禾復災其折賑視去年增直外再各增十之三仍分别展賑有差是年山西偏災賑陽曲等三十州縣貧民二十五年江南之淮揚徐海四府州及山東湖南甘肅州縣間有偏災咸賑如例二十六年秋北省久雨河南河溢祥符等縣災止勿漕命大臣往㑹巡撫隨勘隨賑四鄉設粥厰便饑民之就食者直𨽻之大名天津山東之徳州曹州皆被水截漕充賑直𨽻四十萬石山東十萬石是年雲南新興州江川縣地震壊人民廬舍照例振倍給之二十七年賑直𨽻四十五州縣山東甘肅各三十州縣衞饑民二十八年諭曰朕恭謁東陵途次周諮民隠直屬州縣上年秋霖被災較重深為軫念前已降諭㫖加賑至今年三月但現在農民東作方興麥秋尚逺口食猶恐拮据著加恩將被災六分以上各州縣無論極貧次貧再予展賑一月其被災五分者例不應賑並格外加恩亦無論極貧次貧民特予加賑一月以資接濟至地畝雖經涸出或無力播種者並著查明有可趕種春麥或候大田者均分别借給籽種一面辦理一面奏聞俾得無誤春畬副朕體卹愛飬至意又諭前因直屬去秋被水當此青黄不接之際猶恐拮据已降㫖將被災六分以上暨被災五分者概予加賑展賑一月兹恭謁東陵西陵所過通州三河良鄉三州縣其成災分數皆不及應賑之例念其地近輦道上年嵗事歉薄閭閻生計維艱著將通州等三州縣不應給賑村莊地方官確查實在貧民均予加賑一月該督其率屬悉心體察俾澤必下究副朕嘉惠黎元至意二十九年廣東湖北湖南江西水賑被災各州縣饑民是年甘肅旱蘭州鞏昌等屬災本折兼賑共糧十八萬五千八百餘石銀四十萬九千二百七十兩有竒三十年甘肅臯蘭鞏昌等府屬地㣲震其寧逺伏羌通渭三處情形稍重又蘭州等府屬十一處旱咸賑如例是年山東水加賑濟南等十五州縣糧一月又浙江天台新昌寜海旱人給一月口糧其仁和錢塘六縣於春耕時給籽本榖畝三升三十一年湖南江南浙江山東陜西江西甘肅均有偏災賑如例三十二年江南二十四縣江西十三縣湖北十三州縣水上命於正賑外各加賑有差其浙江江山直𨽻懐安龍門均按成災分數賑給三十三年直𨽻霸州等五十州縣㕔災命續賑摘賑加賑銀米兼放又江蘇安徽河南各屬旱盛京承徳遼陽海城廣寧及雲南各屬水均予加賑三十四年賑兩江浙江江西湖北各屬饑民并加賑有差其陜西直𨽻甘肅偏災均賑如例復以直𨽻需米頗多撥通倉米六十萬石資賑三十五年買運山東麥石解京平糶又直𨽻十六州縣災諭令加賑先後撥部庫銀一百萬兩通倉米一百三十萬石飭大吏妥協經理又浙江十四州縣加賑災民亦如之又諭直𨽻各屬被水應行賑卹之處著撥庫銀五十萬兩以資分給但聞銀庫舊例前經雍正年間果親王奏定凡遇應發銀兩除俸餉外俱有應扣平餘此在工程等項需用銀兩原不必悉照部法支放若地方偶有災歉特發帑銀賑卹毋許不肖官吏絲毫扣尅其事較俸餉尤重豈可於部庫撥給時分兩稍有輕减此次所發五十萬兩著該部即於庫貯元寳如數發往嗣俊如遇賑卹之項俱照此行著為令是年古北口山水驟發特𣲖大臣攜帑銀二萬兩加倍給與災戶又以閭閻艱食諭即開倉賑糶勿拘成例復於本月再撥内務府銀二萬兩解往備用三十六年直𨽻甘肅江蘇山東各屬災均予正賑加賑發庫銀五十萬兩截漕撥通共八十萬石聼直省應撥州縣領運又撥陜西藩庫銀二百萬兩赴甘其經運米糧三十萬石尚恐不敷賑糶飭地方大吏就近續撥三十七年再撥部庫銀二十五萬兩通倉米十八萬石濟直𨽻展賑借糶三十八年賑河南江蘇安徽陜西甘肅各屬災民仍各展賑其河東之大慶闗等十一村莊加賑極貧者四月次貧三月是年山西歸化城之黒河薩拉齊之善岱等處災人給一月口糧三十九年直𨽻天津河間十六州縣災發通倉米十萬石備災屬冬春加賑借糶又江蘇水截漕二十萬石濟賑其安徽河南湖北山東甘肅均有偏災加賑亦如之四十年直𨽻十四州縣水安徽七州縣衛江蘇二十八州縣衛甘肅三十一㕔州縣旱於例賑外各加賑一月四十一年賑甘肅二十九㕔州縣饑民分别災重之處展賑一月江蘇安徽水均予加賑四十二年甘肅三十二㕔州縣旱賑如例以皐蘭渭源七州縣災重特命展賑四十三年黄河漫溢河南災截漕三十萬石并撥鹽課銀一百六十萬兩特簡大臣前往查辦又以安徽為豫省下㳺受災較重並分别加賑其出貸亳州䝉城米一萬二千石令勿追償是年湖北漢江漲江夏等十八州縣及九衛所饑民發帑金六十萬兩供明春加賑又江蘇之江浦六合二十六州縣衞及各埸竈户加賑亦如之四十四年諭亳州蒙城災重貧民照夏災例再給一月口糧復於各屬豐收處所應徴漕米内截留三萬五千石以備減價平糶是年河南江蘇安徽甘肅災屬並加賑有差四十五年直𨽻水武清房山等四十一州縣災截漕三十萬石賑濟上念被災較重之區明春尚須加賑再撥通倉米三十萬石庫銀三十萬兩是年山東曹縣定陶城武災所貸麥本六千七百兩有竒均豁免又加賑河南商邱考城五縣貧民兩月其餘直𨽻二十州縣江蘇睢寧六州縣衛安徽泗州四州縣衛甘肅臯蘭九州縣衛災民均予展賑一月四十六年江蘇水撥藩道庫銀五十五萬兩鹽課銀五十萬兩漕米五萬石資賑又以災地較廣賑費甚繁再撥銀六十萬兩于被災較重貧民分别加賑諭甘省收捐監糧之事原因邊陲地瘠民貧應令倉儲充裕以備賑卹之用是以復經允行祗捐本色不准折色乃開例之始即公然私收折色甚至通省大小官員連為一氣冐賑分肥扶同揑結積成弊藪既經敗露自不得不徹底根究現據阿桂等陸續查奏厯年情弊俱已水落石出是竟以朕惠飬黎元之政作為官吏肥槖之資實屬愍不畏法為天理所不容况辦賑之事朕屢有㫖寜濫無遺亦欲窮民受實惠耳若公然上下通同冐賑作弊則有濫必致有遺官吏多一分侵漁即災民少受一分實惠朕之所以嚴行窮究者正欲剔除官吏積弊使百姓實受賑卹之益並非因辦賑有弊致將賑卹之事靳固不舉也前恐各督撫誤㑹此意或致有災不辦曽經明發諭㫖宣示中外但恐督撫等仍未能仰體朕懐且不肖之員或于己無可分肥即于民視如膜外其所闗於民政者甚大朕如傷在抱每遇各省偏災不惜多發帑金優卹以期一夫不使失所此天下臣民所共知共見者各督撫務皆以愛民卹災使得均霑實惠為念遇有地方水旱即詳悉查勘據實奏報加意賑卹斷不可因有甘肅監糧之案遂爾因噎廢食以致稍有諱飾倘如此申誡再三而督撫等仍有蹈此者經朕察出必當重治其罪將此再行通諭中外知之是年加賑安徽河南山東直𨽻甘肅湖北陜西等屬災民各一月四十七年黄河溢河南山東江南災命被水各州縣于正加賑外展賑三月撥浙商佐工銀八十萬兩漕糧八萬石濟江南以淮商公輸銀二百萬兩漕糧三十萬石濟山東上厪念江南豐沛等縣及山東兖曹濟各屬災甚諭常予賑卹不必論月災退後始行停止是年安徽二十州縣江蘇二十四州縣秋禾災賑如例並加賑有差又加賑河南災民兩月復以豫省河工雖已合龍而山東江蘇下游地畝甫經涸出窮民謀食維艱諭限至明年六月停賑四十八年賑湖北江蘇安徽災民如例其銅山豐縣沛縣邳州照山東例展賑五月上元句容丹徒加賑兩月是年陜西榆綏八州縣災散給折色大口日給銀一分小口半之四十九年甘肅逆回滋事照乾隆四十六年撒拉爾之例傷斃者大口給銀二兩小口七錢五分燒燬房屋每間銀二兩生存人口每口先給糧一倉斗初賑不論大小口給三倉斗再普行加賑一月大口日給八合三勺小口半之乂靖逺伏羌静寧等處被賊攻圍不能自謀生計酌給一月口糧是年江西萍鄉永寧安福湖南茶陵州攸縣水賑如例並給銀以資修葺掩埋又黄河溢諭地方大吏督屬攜帯錢米分途賑寧陵商邱境内災民並分别展賑其安徽亳州被災加賑一月五十年河南旱普賑衛輝屬五縣兩月復命展賑三月其附近災區之延津九縣給與一月口糧仍再展兩月至開封河南彰徳府屬二十三州縣其中有受旱較重及連年被淹積歉之區并無地極貧下戸加賑有差先後共撥銀二百五十萬兩漕米三十萬石供賑是年山東安徽旱濟南各府屬三十州縣亳州等八州縣給賑有差截漕三十五萬石濟兩省賑卹之用又江蘇淮安五府屬旱撥漕十萬石平糶右賑濟恤㷀獨順治八年定給大興宛平二縣收飬孤貧銀米每名月給米三斗銀三錢每年凖給六月至十年增給十月康熙四十五年京城廣寧門外士民公建普濟堂頒賜御製碑文又御書膏澤回春四字雍正元年諭各處養濟院所有鰥寡孤獨及殘疾無告之人有司留心以時飬贍毋致失所二年諭京師廣寧門外向有普濟堂凡老疾無依之人每棲息於此司其事者殊為可嘉聖祖仁皇帝曽賜額立碑以旌好義有地方之責者宜時奬勸鼓舞之但年力尚壯及㳺手好閒之人不得借名溷入其中長浮惰而生事端三年諭今冬天氣甚冷京城廣寧門外安定門外養濟院二處將變色米賞給百石煮粥賑濟以安窮民傳諭倉埸侍郎將變色米呈驗然後賞給十三年廣西鎮安府初設孤貧口糧四名每名嵗給銀三兩六錢遇閏加增一兩二錢其遷江縣口糧米折銀一兩四錢一分六釐有竒桂平縣板木銀五兩九錢六分五釐為殮葬孤貧而設均如原編定額充補乾隆元年諭各省府州縣皆有飬濟院以收飬貧民此即古帝王哀矜㷀獨之意朕聞歸化城地方接壤邉闗人烟凑集其中多有疲癃殘疾之人無棲身之所日則乞食街衢夜則露宿荒野甚可憫惻彼地舊有把總官房三十餘間可以改為收飬貧民之所每年於牛羊税内撥銀二三百兩粟米百餘石為饘粥寒衣之費著該處同知通判簡選誠實鄉耆經理其事仍不時稽察以杜侵蝕之弊倘地方有樂善好施者聼其捐助共成善舉但不得稍涉勉强著該都統㑹同該同知通判妥協辦理務令窮民均沾實惠二年各州縣收飬孤貧令保甲將本地實在孤苦無依者開明里甲年貌取隣佑保結呈報州縣官驗補其有浮於額數者亦收飬院内動公項散給口糧仍入冊報銷若外來流丐送本籍收飬又定四川多流寓路復險阻凖其收飬至七年又定凡流寓隔省遥逺及本省相去至千里外者亦凖收飬四年諭各府州縣設立飬濟院原以收飬鰥寡孤獨疲癃殘疾之窮民近聞山西陜西一帯多有老疾殘廢之人在途行乞行旅見之惻然朕思各處既有養濟院若有司實力奉行何至小民之困苦無依者饑寒難支乞食於道山陜一路如此則他省與此相類者不少矣著各省督撫各飭所屬州縣官體國家設立飬濟院之至意與朕哀此㷀獨之心實力奉行毋得視為具文故事該督撫亦當時時留心訪察六年令該管官汰除冒濫覈明收養實數分額内額外為二冊冊具里甲姓名年貌原住籍貫並注殘病孤苦實據用印結申府轉申上司官遇有開除頂補隨時申明嵗終冊具支給清數報銷又定道府每嵗因公所涖即帯原冊赴院㸃驗無弊具印結申上司官如屋宇傾圮孤貧冐濫或縱役代領侵蝕及道府狥庇者均論如法八年諭曰今年天氣炎熱甚於往年聞山東山西河南陜西所屬地方民人有病暍或至傷損者該督撫等自必為之經理此等最苦之人無所依倚全在地方官善為撫卹可令各該督撫轉飭有司悉心查辦有應動存公銀兩者即行動用嗣後如有類此之事無得膜視該部遵諭速行十五年諭曰國家欽恤民命德洽好生至於鰥寡㷀獨尤所矜憫是以定有獨子留飬之例凡屬情輕俱已沾恩減等但督撫聲請之案不過尋常鬭毆之類斷不至入于情實徒使淹禁囹圄不得侍飬而窮老孤孀無所倚賴深為軫惻著該部查明各犯祖父母父母現存果無次丁侍飬俱以可矜減等發落著為例二十八年令直屬州設留飬局收恤老弱貧民其外来流移貧民例無給賑者准一體入局留飬四十四年諭京城廣寜門外普濟堂冬間貧民較多將京倉氣頭厫底内小米撥給三百石自是嵗以為常四十九年諭直𨽻大名府屬各州縣其鰥寡孤獨困苦無依者大口日給米五合小口三合共計穀三千四百六十石有竒右恤㷀獨恤幼孤康熙元年於京師廣渠門内建育嬰堂收育棄子有姓名年月日時可稽者註於冊雇乳婦乳之有願收為子孫者亦詳其姓名里居於冊而後與至本家有訪求認領者訊與原註冊符令其歸宗雍正二年賜帑銀千兩八年賜帑銀千五百兩令置産嵗收息銀以充用又撥飬濟院嵗餘孤貧口糧銀二百兩於堂歸順天府察覈是年賜御書匾額諭曰聞廣渠門内育嬰堂一區凡孩稚不能育飬者收留於此數十年來成立者頗衆夫飬少存孤載於月令與扶衰恤老同一善舉為世俗之所雖朕心嘉悦特賜御書功深保赤匾額並白金千兩順天府尹等其宣示朕意並倡率資助使之益加鼓勵再行文各省督撫轉飭有司勸募好善之人於通都大邑人烟稠集之處若可以照京師例推而行之其於字弱恤孤之道似有禆益而凡人怵惕惻隠之心亦可感發而興起矣乾隆六年申嚴育嬰之令各省所設育嬰堂飭有司官擇鄉之富厚誠謹者董其事官為鈎稽嵗終具收飬及支存各數冊申上司官察覈右恤幼孤恤羈窮京師廣寧門外普濟堂每嵗恩賜崇文門税銀千兩撥給孤貧口糧銀二百餘兩本堂内地租銀千餘兩為飬贍孤貧之用順治九年初設飯厰以賑貧民京都五城城設一厰日費米二石作飯銀一兩供炊嵗十一月至明年三月終停賑康熙二十九年増飯厰五以滿漢部院官各一人日涖其事五厰日需米二十石銀十兩並原設五厰均至六月終止四十九年更定飯厰米數賑期五城設厰煮賑嵗十月朔至次年三月二十日止每厰日發米二石銀一兩米行倉埸銀行戸部支領六十一年諭展賑一月銀米倍給雍正十三年諭將存倉稄米充賑五城並各展賑一月乾隆二年以冬月五城貧民就食者多慮有凍餒於道者令各鋪總甲每日分巡各該𬋩處所遇即引赴普濟堂或棲流所晩就棲宿日出就賑春融聼其去留是年以漕船縴夫率多病棄道斃飭沿河各官就近送八各州縣普濟堂或寺院量給口糧留飬三年諭今嵗米價昻貴恐小民乞食者多著設厰於九月半舉行四年正月增厰飯米並増設厰五七年諭令五城御史親至厰督賑都察院堂上官時往稽察八年恩賞飯厰京倉老米二百石充賑時直屬嵗歉就賑者多故有是命十六年五城各展賑一月都察院以閏月天寒奏請展賑十日奉諭改展一月二十四年増給飯厰米日一石並增厰五城内外以便流民之就食者又展賑南城十五日城外二十日二十七年以近京嵗歉貧民赴厰就食者多於東壩蘆溝橋黄村清和樹村五處各増設一厰是五厰於額支米數外日加給一石簡科道滿漢各五人㑹同五城御史率司坊官經理二十八年諭煮賑各厰向年俱於三月二十日停止今嵗著加恩展賑一月以示優恤四十六年諭五城内外粥厰展賑半月四十七年諭京城德勝門外功德林冬間貧民就食較普濟堂人數雖減但常例賞銀一千兩經費尚恐不敷著加恩將京倉小米賞給一百五十石以資接濟右恤羈窮皇朝文獻通考卷四十六
