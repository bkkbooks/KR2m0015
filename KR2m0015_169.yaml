崇皇帝還宫奏導迎樂章時序羣品端在一欽衣德凝命荷天之任景軌儀誠既歆肅駿奔顒若臨先師孔子廟樂章康熙十六年迎神奏咸平之章大哉至聖峻德宏功敷文衍化百王是崇典則有常昭兹辟雍有䖍簠簋有嚴鼓鐘奠帛初獻奏寧平之章覺我生民陶鑄前聖巍巍泰山實豫景行禮備樂和豆籩惟靜既述六經爰斟三正亞獻奏安平之章至哉聖師天授明德木鐸萬世式是羣辟清酒維醑言觀秉翟太和常流英材斯植終獻奏景平之章猗與素王示豫物軌瞻之在前神其寧止酌彼金罍惟清且㫖登獻既終弗遐有喜徹饌奏咸平之章璧水淵淵崇牙嶪嶪既歆宣聖亦儀十哲聲金振玉告兹將徹鬷假有成羮墻靡愒送神奏咸平之章煌煌學宫四方來宗甄陶胄子暨豫微躬思皇多士膚奏厥功佐豫永清三五是隆乾隆七年重定迎神奏昭平之章大哉至聖德盛道隆生民未有百王是崇典則昭垂式兹辟雍載䖍簠簋載嚴鼓鐘奠帛初獻奏宣平之章覺我生民陶鑄賢聖巍巍泰山實豫景行禮備樂和豆籩嘉靜既述六經爰斟三正亞獻奏秩平之章至哉聖師克明明德木鐸萬年惟民之則清酒既醑言觀秉翟太和常流英材斯植終獻奏叙平之章猗與素王示豫物軌瞻之在前師表萬祀酌彼金罍我酒維㫖登獻雖終弗遐有喜徹饌奏懿平之章璧水淵淵芹芳藻潔既歆宣聖亦儀十哲聲金振玉告兹將徹鬷假有成日月昭揭送神奏德平之章煌煌辟雍四方來崇甄陶樂育多士景從如土斯埴如金在鎔佐豫敷治俗美時雍皇帝還宫奏導迎樂章先聖垂軌千載是祇䖍奉師表景行行止奠兩楹神降之啓後人文在兹皇帝視學導迎樂章崇聖尊道乾德下交思樂多士化流芹藻鼓篋徴經術昭聽講環宏育陶又定直省文廟樂章迎神奏昭平之章大哉孔子先覺先知與天地參萬世之師祥徴麟紱韻答金絲日月既揭乾坤清夷初獻奏宣平之章豫懷明德玉振金聲生民未有展也大成爼豆千古春秋上丁清酒既載其香始升亞獻奏秩平之章式禮莫愆升堂再獻響協鼖鏞誠孚罍甗肅肅雍雍譽髦斯彥禮陶樂淑相觀而善終獻奏叙平之章自古在昔先民有作皮辨祭菜於論思樂惟天牖民惟聖時若彛倫攸叙至今木鐸徹饌奏懿平之章先師有言祭則受福四海黌宫疇敢不肅禮成告徹毋疏毋瀆樂所自生中原有菽送神奏德平之章鳬繹峩峩洙泗洋洋景行行止流澤無疆聿昭祀事祀事孔明化我蒸民育我膠庠神祇壇樂章乾隆七年定迎神奏祈豐之章雲車馳兮風斾征雷闐闐兮雨𡨕冥表六合兮穹青橫大川兮揚靈紛總總兮來㑹穆豫心兮齊明奠帛初獻奏華豐之章束帛戔戔兮筐篚將昭誠素兮鬯馨香瘼此下民兮侯有望神垂鴻祐兮未渠央亞獻奏興豐之章疏羃兮再啓芳齊兮載陳惠邀兮神貺福我兮民人終獻奏儀豐之章犧尊兮三滌㫖酒兮思柔誠無斁兮嘉薦神宴娭兮降休徹饌奏和豐之章禮既成兮孔殷潔明粢兮苾芬廢徹兮不遲至敬兮無文送神奏錫豐之章流形兮露生苞符兮孕靈介我稷黍兮曰雨而雨神之格思兮祀事孔明太嵗壇樂章康熙十六年定迎神奏保平之章吉日良辰祀典孔殷於惟太嵗月將諸神乘時秉德輔國佑民遙遙龍馭頓轡九閽壇壝蠲潔延佇來臨奠帛初獻奏安平之章維神至此螭駕雲旗洋洋在上淑景延禧束帛承筐展我誠斯神示昭鑒尚其無遺神兮弭節薦馨敢後祀事方初陳饋捧酎神光熹微嘉祥承候百禮不愆樂具入奏亞獻奏中平之章以我齊明率禮攸行再拜稽首㫖酒斯盈牲牷肥腯交彼神明樽罍上下鬷假思成終獻奏肅平之章執事有嚴品物斯備非馨黍稷用宣誠意朱絃登歌絲衣揚觶於胥樂兮神錫爾類徹饌奏雍平之章春祈秋報嵗省惟勤含醇飲德莫匪明神惟神臨御肹蠁逡巡獻酬云畢誠敬斯伸送神奏寧平之章出令明堂神爽卒度報功迎氣崇祀斯作神人以和既康且樂瞻望景光邈彼寥廓乾隆七年重定迎神奏保平之章協兹五紀嵗月日辰天惟顯思神職攸分於赫太歲統馭百神承天之德隂隲下民奠帛初獻奏定平之章禮崇明祀涓選休誠潔齊滌志量幣告誠祈福惟何福我蒼生陳饋奉酎瞻仰雲旌亞獻奏嘏平之章百末蘭生有飶其香升歌清越磬管鏘鏘牲牷肥腯嘉薦令芳神其歆止在上洋洋終獻奏富平之章執事有嚴再拜稽首三爵既升以妥以侑顒若有孚肅兹籩豆神其歆止人民曼夀徹饌奏盈平之章王省惟歲有報有祈六氣無易平衡正璣嘉生蕃祉澤及蜎飛百禮以洽承神吉輝送神奏豐平之章神兮旋馭肅瞻景光靈颷上下無體無方嘉承惠和億兆漙將嵗嵗大有神其迪嘗又定太歲壇祈雨報祀樂章迎神奏需豐之章持元化兮富媪神秉嵗籥兮六氣均馳雲車兮風旗殷闐闐兮天門情倣徨兮孔殷神之來兮康我民奠帛初獻奏宜豐之章薦嘉幣兮芳醴清練豫素兮升飶馨紛肸蠁兮格歆甘膏沃兮神所令亞獻奏晉豐之章啓山罍兮攝椒漿侑神宫兮靈洋洋族雲興兮使我心若惠嘉生兮降康終獻奏協豐之章清斚兮三㪺揚翟籥兮載愈靈回翔兮六幕澤雱霈兮遍八區徹饌奏應豐之章禮儀備兮孔時音繁㑹兮徹不遲昭靈貺兮迓蕃祉田多稼兮汜濩之送神奏洽豐之章顧億兆兮誠求渥甘㴻兮神之休慶時若兮百昌遂惠我無疆兮歲有秋羣祀慶神歡樂章乾隆七年定三皇廟精氣緣乎理調劑觀所頥曰惟古聖嘗草定醫似鐡隨磁沴除吉至化工出自於指萬姓永荷恩施顯佑宫居所躔星軫象緯環拱辰貞元運轉藏用顯仁宥密基命育和葆順潔粢醴以昭信日襄哉贊大鈞東嶽廟維嶽嵩髙五泰岱常祀殊纍朝玉檢柴望始虞木德條風吹萬畢煦宅東㝢以生物仰天齊鑒有孚城隍廟佳麗皇都勝保障神力宏萬方輻輳尨夜不驚正直聰明疸彰如影荷靈貺篤其慶固金甌護玉京關帝廟扶植綱常正浩氣昭日星絶倫獨立英爽若生爼豆常馨夏夷胥敬仰神德莫疇並助邦家永太平關帝廟樂章乾隆三十三年重定迎神樂章青湛湛玉霄門神來下綵旄紛宫墻輪奐籩豆芳芬光景動人民丹心照日浩氣扶輪初獻樂章調蘭醑酌桂樽神來饗房爼陳忠貫金石義炳乾坤純臣戴一君力扶王室不願三分亞獻樂章泛盎齊觴再進簫鼓諧聲歌韻武節絶倫不辭利鈍神勇天威震方知舊史未符公論終獻樂章禮秩秩樂欣欣儼威靈至今存惟靈惟佑佑國佑民典祀極隆文式揚顯號時薦明禋徹饌樂章司儀告徹靈風來洎神聿歸嘉徴萃大濟羣生善良胥得意邪慝無伸喙王化所及咸尊廟食東西朔南靡勿暨火神廟離正南方位燭照光九圍粒民火食功用不違瓘斚明粢我民所慰履祥靄戢鶉尾息融風降福禧黑龍潭興雨祁祁應歷嵗恩屢覃湫幽神御農扈具瞻寸合崇朝十千有淹黍膏漙牟麥湛賽神庥以作甘祭門和氣嘉祥應聖日華耀明仰方泰紫俯奠泰寧繚廊紘瀛此惟表心食神德䝉神慶享明禋億萬齡祭司工仰眺銀河上閣道如駕梁儼神宅只愈矣穆將揆日鳴櫜翳神斯掌奠椒酒以禋享荷神庥澤未央迎吻皇作宫殿因地順天如竹苞矣美哉輪奐鳥翼飛松角梴芋且寧居萬年時巡致祭岱嶽樂章乾隆七年定迎神奏祈豐之章資元氣兮鎮青陽鼓槖籥兮孕靈祥行時令兮東巡式展禮兮誠將奠帛初獻奏華豐之章金壇肅穆兮黼帷張瑟黃流兮茅縮漿昭誠素兮舉初觴神斯陟降兮格馨香亞獻奏興豐之章日觀兮雞鳴天門兮鳯翔犧尊兮再獻維神兮降康終獻奏儀豐之章醴齊兮三薦金牒兮輝煌申至敬兮無祈鑒豫誠兮齊莊徹饌奏和豐之章瞻石閭兮在望實籩豆兮大房黍稷兮非馨明德兮是將送神奏錫豐之章禮成兮孔臧神駕兮龍驤膚寸而合兮觸石而起彌於六合兮降福穰穰時巡致祭嵩嶽樂章迎神奏祈豐之章維靈嶽兮鎮中央展時巡兮洛之陽䖍望秩兮懷柔儼對越兮神光奠帛初獻奏華豐之章石闕岧嶤兮鳴鳯翔奏瑶笙兮肅祼將初奉斚兮陳篚筐至誠昭格兮福無疆亞獻奏興豐之章潁水兮安恬緱嶺兮青蒼黃琮兮告薦椒醑兮芬芳終獻奏儀豐之章香升兮華黍三滌兮嘉觴答靈響兮嵩門登萬寶兮咸昌徹饌奏和豐之章三臺蔚兮峻極二室鬱兮相望告徹兮維時懷德兮靡忘送神奏錫豐之章雲車兮龍驤仰止兮髙閶玉漿含滋兮金璧呈瑞配天作鎮兮長發其祥又定致祭長白山樂章迎神奏祈豐之章天作髙山兮作而康鍾王氣兮應期昌巡豐沛兮來望躬禋祀兮䖍將奠帛初獻奏華豐之章飶黃流兮進初觴緬仙源兮心遫莊靄佳氣兮鬱蒼蒼欣來格兮惠無疆亞獻奏興豐之章朱果兮實蕃靈淵兮澤滂清尊兮再獻綿祚兮純常終獻奏儀豐之章具薦兮玉饌三爵兮瓊漿思王迹兮彌欽清緝熙兮敢忘徹饌奏和豐之章松花水兮湯湯鴨緑波兮泱泱神飫兮錫釐如川至兮莫量送神奏錫豐之章祀事兮孔臧昭格兮永明邁周岐兮越殷土萬有千嵗兮長發其祥皇朝文獻通考卷一百六十九
