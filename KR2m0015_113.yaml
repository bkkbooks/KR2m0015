body:
  text: 欽定四庫全書皇朝文獻通考卷一百十三宗廟考七太廟時享雍正十三年九月己亥皇上登極癸丑定三年内享太廟儀皇上親詣或遣官恭代俱用禮服作樂先期齋戒用素服冠綴纓緯視祝版用禮服時上定行持服三年之禮二年七月乙巳以營修奉先殿恭奉列祖列后神牌暫安太廟遣官祗告太廟八月定素服不入廟之制是月甲子皇上諭今因修奉先殿恭請列祖列后神牌暫安奉太廟中殿八月初九日太宗文皇帝忌辰十一日太祖髙皇帝忌辰此二日朕親詣太廟中殿行禮著總理事務王大臣㑹同禮部查明禮儀具奏和碩莊親王允禄等覆奏向來恭遇列祖列后忌辰皇上親詣奉先殿俱用素服至時享太廟及告祭皇上親詣俱用朝服並無素服入廟之制再禮部等前奏奉先殿興工告成之間朔朢一切祭祀俱遵康熙十八年修奉先殿例彼時遇列祖列后忌辰聖祖仁皇帝未嘗親詣太廟中殿今太祖太宗忌辰未便於太廟素服行禮應請停止至八月二十三日世宗憲皇帝再週之期皇上親詣雍和宫行禮則禮制周備皇上純孝之思已展是世宗憲皇帝忌辰太廟行禮亦應停止從之二十一日上詣雍和宫供奉世宗憲皇帝聖容行禮二十三日上詣雍和宫聖容前行禮十月戊申以奉先殿工竣恭奉列祖列后神牌還御遣官祗告太廟五年七月癸巳勅所司稽載祭器太常寺少卿蔣炳奏寺庫貯祭器俱有印冊惟太廟社稷壇祭器未設印冊雖内監經収無憑稽考請勅下禮部㑹同太常寺將新舊祭器敬謹造冊用印一存禮部一存太常寺以重典守得㫖著照所請行六年十一月丙寅命審定太廟樂章字譜七年七月戊午朔命樂部大臣總修太常寺樂並釐正樂貟詳見樂考同日飭太常寺樂部勤習樂律詳見樂考十二年十月命享廟派宗人府王公一人監視執事宗室人員是月己未諭向來祭享太廟獻爵獻帛例用侍衛及太常寺官朕御極後俱令用宗室人員蓋因宗支繁衍實惟祖徳所貽一氣感孚昭格尤為親切且使駿奔走執豆籩有事為榮亦得服習禮儀陶鎔氣質意蓋有在但演習禮節太常實所専司宗室既非所屬未必聽其指授嗣後每逢祭祀之期著派宗人府王公一人前徃監視俾進退優嫻執事有恪以昭誠敬十三年正月丁亥命敬造太廟祭器仿古範銅十四年五月戊申朔命禮部尚書侍郎敬典祀事時奉諭稽古虞書秩宗典朕三禮周宗伯掌邦禮而首以吉禮事邦國之鬼神示春官典祀職莫重焉乃者郊壇宗廟以太常寺専司而禮部堂官不蒞其事非古也治神人和上下敬服乃職其所有事者何在大學士㑹同禮部并㑹典館總裁官詳議以聞四十二年正月壬辰以皇太后升遐重定百日内及二十七月内致祭太廟服色各儀是日奉上諭昨據禮部奏大行皇太后喪儀二十七月之内所有郊廟社稷壇等祭祀援照雍正九年孝敬憲皇后䘮儀素服致祭樂設而不作等因朕以郊廟大祀典禮綦重似不應因大䘮而稍畧其祀因命軍機大臣查明具奏兹據查稱㑹典所載康熙年間列后之事遇大祀典祭日即穿朝服作樂禮部此奏未將逺年舊例細查僅引雍正九年乾隆十三年近年之例所辦原未周到今公同酌議二十七月之内如遇郊廟大祀仍作樂穿朝服行禮其餘尋常祭祀均用素服致祭樂設而不作等語所奏甚是孝敬憲皇后聖母大事係九月二十九日翼日即遇孟冬時享太廟彼時禮官或因為時太近不及詳查㑹典從權率辦本不可據以為例至孝賢皇后䘮事係三月十一日至仲秋祭祀已在百日以外尤不當引雍正年間二十七月以内之例其時禮部所辦本屬未協朕亦忽畧看過未為核定今既知其誤自應更正著交禮部即照軍機大臣所議辦理其從前誤辦之案不必存稿即以此著為令典同曰又奉諭㫖雍正十三年皇考龍馭上賔朕欲持服三年羣臣請循以日易月之例朕皆未允嗣奉聖母慈諭令朕持服百日因即遵行然百日釋服後仍素服滿二十七月今遭聖母大故自應仍遵懿㫖持服百日昨已明降諭㫖矣其素服二十七月亦照前例惟遇壇廟大祀行禮及致齋三日閱視祝版先期詣壇并視朝聽政諸事朕從前惟準理而行並未載在令典此時當詳議及之又如王公大臣官員持服二十七日而除素服則滿百日用何服色及陪祀齋戒常期坐班並一切典禮應如何定制亦當酌定章程頃檢閱雍正十三年王大臣等所定條欵頗為該括著將原摺交軍機大臣㑹同辦理䘮儀王大臣等悉心詳議具奏嗣軍機大臣等議奏恭擬皇上隨時御用服色及酌定王公大臣服色分為兩單進呈恭候欽定奉㫖依議一百日内皇上服縞素百日釋服之外二十七月内均用素服詣大行皇太后几筵前冠摘纓緯一百日内遇天壇地壇太廟社稷壇等祀俱遣官行禮皇上遇先期齋戒之日用素服冠綴纓緯帶齋戒牌百日外皇上親詣行禮齋戒日常服不掛朝珠閲視祝版先期宿壇用常服掛朝珠不御龍袍龍褂祭日朝服作樂還宫時導迎鼓樂設而不作一閲視大行皇太后冊寶用素服冠綴纓緯先期齋戒三日亦用素服冠綴纓緯帶齋戒牌一百日内祭奉先殿皇上戴有纓冠用青袍青褂百日外用珠頂冠藍色袍金龍褂一二十七月内祭夕月壇歴代帝王廟先師孔子廟先農壇廟俱遣官行禮一百日内遇祭天壇地壇太廟社稷等壇遣官恭代所遣之官先期省牲視牲咸素服照常齋戒祭日承祭執事各官咸朝服作樂百日外二十七月内恭遇皇上親詣行禮齋戒日用常服掛朝珠閲視祝版及先期省牲視牲俱用補褂不服蟒袍祭日咸朝服一百日内祭奉先殿隨駕執事各大臣官員俱用青色袍褂戴有纓帽百日外用補褂朝珠一奉移梓宫至山陵随從人員在途用青長袍褂帽摘纓緯禮成後恭奉神主回京仍用青長袍褂帽綴纓緯皇上登極以來乾隆元年