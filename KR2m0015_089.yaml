body:
  text: 職官考十三品級文職臣等謹案欽定吏部則例滿漢官員品級各自分載以著銓除之法兹編滿漢按品合輯以便稽考其滿漢之品初異而後更定畫一詳為條注至舊設之官或裁或改者則加案聲明凡滿漢一體內外等差於釐列品級之中庶俱可見焉謹輯品級考正一品太師太傅太保殿閣大學士初定滿洲一品漢人二品後俱改為正二品兼各部尚書銜今定正一品從一品少師少傅少保太子太師太子太傅太子太保各部院尚書初定滿洲一品漢人二品後俱改為二品康熙中復改滿洲為一品後俱改為正二品今定從一品都察院左右都御史初正二品今定從一品正二品太子少師太子少傅太子少保各省總督加尚書銜者從一品各部院左右侍郎初定滿洲二品漢人三品後俱改為正三品今定正二品內務府總管初定三品今定正二品從二品內閣學士初定滿洲漢軍二品漢人三品後俱改為正五品以兼禮部侍郎銜從侍郎品級為正三品今定從二品翰林院掌院學士正五品以兼禮部侍郎銜從侍郎品級為正三品今定從二品無専員以閣部大臣翰林出身者領之各省巡撫布政使司布政使正三品都察院左右副都御史宗人府府丞通政使司通政使滿洲初係二品後改為三品復改為二品今定為正三品大理寺卿滿洲初係二品後改為三品復改為二品今定為正三品詹事府詹事太常寺卿順天府府尹奉天府府尹武備院卿上駟院卿奉宸苑卿孔廟三品執事官按察使司按察使從三品光祿寺卿太僕寺卿都轉鹽運使司運使臣等謹案舊有苑馬寺卿康熙二年裁又舊有布政使司參政乾隆十八年並正四品之按察使司副使從四品之布政使司參議正五品之按察使司僉事俱改為守道巡道列正四品正四品通政使司副使滿洲初係三品後改為正四品大理寺少卿滿洲初係三品後改為四品復改為三品今定為正四品詹事府少詹事太常寺少卿太僕寺少卿鴻臚寺卿滿洲初係三品後定為正四品順天府府丞奉天府府丞四品太廟尉陵寢掌關防官陵寢尚茶正陵寢尚膳正孔廟四品執事官各省守巡道臣等謹案舊有督捕理事官康熙三十八年裁盛京五部理事官六十年裁都察院僉都御史乾隆十三年裁從四品內閣侍讀學士初係三品後改為從五品兼太常寺卿銜尋停兼銜今定為從四品翰林院侍讀學士初係從五品後定為從四品侍講學士同翰林院侍講學士國子監祭酒滿洲初係三品後定為從四品兼太常寺少卿銜後停兼銜都轉鹽運使司同知各府知府正五品左右春坊左右庶子通政使司參議滿洲初係四品後定為正五品光祿寺少卿滿洲漢軍初係四品後定為正五品六科給事中滿洲初係四品後改為七品復改為四品復改為七品今定正五品宗人府理事官初係三品後改為四品今定為正五品各部院郎中滿洲初係三品後改五品復改為四品復改為三品今定為正五品五品壇尉五品太廟尉順天府治中奉天府治中欽天監監正滿洲初係四品後改為三品復定為五品太醫院院使陵寢副掌關防官孔廟五品執事官盛京鳯凰城迎送官各府同知鹽運監掣同知各直𨽻州知州臣等謹案舊有尚寶司卿順治十五年裁大理寺寺丞康熙三十八年裁太常寺滿所牧乾隆二十六年裁從五品翰林院侍讀初係六品後定為從五品侍講同翰林院侍講司經局洗馬各道監察御史滿洲漢軍初係三品後改為七品後改為四品後復改為七品今定為從五品鴻臚寺少卿內閣侍讀初係四品今改為從五品宗人府副理事官初係從四品今定為從五品各部院員外郎滿洲初係四品後改為五品復改為四品後定為從五品鹽運使司副使鹽課提舉司提舉各州知州臣等謹案舊有尚寶司少卿順治十五年裁市舶提舉司提舉康熙五年裁右春坊右諭德五十二年裁左春坊左諭德乾隆十三年裁正六品左右春坊左右中允國子監司業各部院主事滿洲初係四品後改為六品復改為五品今定為正六品宗人府主事宗人府經歷初係四品後改為五品今定為正六品起居注主事理藩院主事大理寺左右寺丞滿洲漢軍初係四品後改為六品復改為五品今定為正六品都察院都事都察院經歷太常寺寺丞內務府副內管領內務府司俎官武備院掌蓋武備院庫掌奉宸苑六品苑丞奉宸苑六品庫掌六品壇尉欽天監監副滿洲初係三品後改為四品今定為正六品欽天監春夏中秋冬五官正太醫院院判王府管領孔廟六品執事官京府通判京縣知縣兵馬司指揮神樂署署正六品朝鮮通事盛京管官屯六品官盛京管千丁六品官盛京管理琉璃窑官各府通判臣等謹案舊有尚寶司司丞順治十五年裁太僕寺寺丞康熙二年裁理藩院院判三十年裁都司經歷斷事雍正二年裁從六品左右春坊左右贊善翰林院修撰大理寺寺丞光祿寺署正初係四品後改為六品復改為五品今定為從六品欽天監五官正王府典膳王府馬羣牧長布政使司經歷布政使司理問鹽運司運判各州同知臣等謹案舊有京府推官康熙六年裁光祿寺寺丞大理寺左右寺副俱於三十八年裁鴻臚寺寺丞五十二年裁正七品翰林院編修通政使司知事初係四品後定為正七品通政使司經歷大理寺左右評事滿洲漢軍初係四品後改為七品復改為五品今定為正七品內閣典籍滿洲漢軍初係正五品後改為從八品今定為正七品皇史宬尉太常寺博士太常寺典簿七品堂子尉國子監監丞太僕寺滿主簿各部寺內務府司庫武備院司弓武備院司幄上駟院廏長上駟院牧長奉宸苑七品苑丞奉宸苑七品苑副奉宸苑七品庫長孔顔曽孟四氏儒學教授孔廟七品執事官孔廟司樂孔廟管勾孔廟典籍京府儒學滿漢教授京府儒學滿訓導兵馬司副指揮京縣縣丞各部院衙門七品筆帖式七品朝鮮通事盛京管理驛站官盛京管千丁七品官按察使司經歷各縣知縣各府儒學教授臣等謹案舊有各府推官康熙六年裁上林苑監丞三十七年裁行人司司正乾隆十三年裁從七品翰林院檢討內閣撰文辦事中書舍人中書科中書舍人滿洲初係四品後改為從七品國子監助教國子監博士詹事府主簿光祿寺典簿光祿寺各署署丞初係六品今定為從七品鑾儀衛經歷順天府經歷奉天府經歷京府儒學漢訓導太常寺各祠祭署奉祀欽天監五官靈臺郎王府司庫布政使司都事鹽運司經歷各州州判衛經歷臣等謹案舊有太僕寺漢主簿苑馬寺主簿俱於康熙二年裁京衛經歷二十六年裁布政使司副理問三十八年裁宣慰司經歷招討司經歷雍正四年裁行人司副行人乾隆三年裁正八品翰林院五經博士國子監學正國子監學録欽天監主簿各部院衙門筆帖式八品朝鮮通事太常寺協律郎太醫院御醫八品堂子尉各部院司務內務府司匠武備院司矢武備院司匠奉宸苑八品苑丞奉宸苑八品苑副孔廟八品執事官布政使司庫大使按察使司知事各府經歷同知經歷各縣縣丞各州儒學學正各縣儒學教諭鹽課司大使鹽運司批驗所大使臣等謹案舊有欽天監五官保章正後裁上林苑監署丞康熙三十七年裁理藩院知事三十八年裁從八品翰林院典簿國子監典簿鴻臚寺主簿欽天監五官挈壺正太常寺各祠祭署祀丞神樂署署丞太醫院八品吏目王府司匠王府牛羣牧長王府羊羣牧長布政使司照磨鹽運司知事各府州縣儒學訓導正九品禮部太常寺盛京讀祝官初係五品後定為正九品內務府太常寺盛京贊禮郎滿洲初係四品改為九品後改為六品復改為五品今定為正九品各部院九品筆帖式寶泉寶源局大使會同館大使欽天監五官監候欽天監五官司書孔廟九品執事官按察使司照磨各府知事茶馬司大使各縣主簿臣等謹案舊有各牧監監正康熙二年裁理藩院副使二十八年裁布政使司檢校雍正二年裁營繕所所丞四年裁從九品翰林院待詔國子監典籍四譯館正教序班太常寺司樂鴻臚寺鳴贊鴻臚寺序班工部內務府製造庫司匠初係七品後定為從九品欽天監博士欽天監五官司晨刑部司獄京府照磨京府司獄太醫院九品吏目府宣課司大使布政司倉大使按察司司獄道庫大使各府照磨同知照磨各州吏目府稅課司大使各府司獄通判司獄巡檢司巡檢各府倉大使臣等謹案舊有詹事府通事舍人順治十五年裁市舶提舉司吏目康熙五年裁兵部督捕司獄三十八年裁詹事府録事五十二年裁都司儒學教授雍正三年裁未入流翰林院孔目內務府庫掌內務府署庫掌內務府監造奉宸苑未入流苑丞奉宸苑未入流苑副禮部鑄印局大使兵馬司吏目長官司吏目崇文門副使各府檢校各縣典史府庫大使鹽茶大使驛丞茶引批驗所大使鹽運司庫大使州縣稅課司大使閘官遞運所大使河泊所所官道倉大使州庫大使州倉大使縣倉大使營倉大使臣等謹案舊有鹽課司副使康熙五年裁各衛武學訓導三十二年裁衛稅課司大使雍正二年裁武職臣等謹案我朝揆文奮武丕飭官方伏查欽定中樞政考仰見整肅班聨紀綱九法至意於乾隆五十一年七月欽奉諭旨以向來文武官階諸多未協武職為國干城同膺心膂之寄其階級自應與文職相埒方足以重閫寄而勵戎行特命軍機大臣會同大學士吏兵二部詳晰定議經核定具奏後奉旨遵行於是文職自正一品至從九品一十八階武職亦定自正一品至從九品共一十八階體統所垂昭然畫一內外相制文武兼資並無畸重畸輕之流弊不獨逺軼前代實千古設官分職之極軌也謹依新增武職品級詳列如左正一品領侍衛內大臣從一品內大臣八旗滿洲蒙古漢軍都統外省駐防將軍烏嚕木齊都統新增察哈爾都統提督正二品左右翼前鋒統領八旗護軍統領提督九門巡捕五營步軍統領八旗滿洲蒙古漢軍副都統鑾儀使外省駐防副都統總兵從二品散秩大臣副將正三品一等侍衛冠軍使火器營翼長健鋭營翼長步軍翼尉包衣護軍統領圓明園營總鳥鎗營總前鋒參領護軍參領鳥鎗護軍參領驍騎參領陵寢總管圍場總管黑龍江總船炮水手總管察哈爾總管城守尉王府長史參將從三品圓明園包衣營總包衣護軍參領包衣驍騎參領吉林參領黑龍江參領察哈爾參領駐防協領一等護衛逰擊正四品二等侍衛雲麾使前鋒侍衛副護軍參領副鳥鎗護軍參領副前鋒參領副驍騎參領佐領步軍協尉信炮總管南苑總管陵寢副總管陵寢司工匠圍場翼長上都達布遜諾爾達里岡愛總管太僕寺馬厰駝厰總管防守尉黑龍江吉林等處管水手四品官司儀長都司從四品城門領包衣副護軍參領包衣副驍騎參領包衣佐領舊列正四品查包衣副參領係從四品佐領與副參領體制相等今改入從四品察哈爾副參領舊列正四品查察哈爾參領係從三品副參領亦應列入從四品今改入從四品察哈爾佐領舊列正四品查察哈爾副參領今改入從四品其佐領與副參領體制相等亦改入從四品四品典儀二等護衛正五品三等侍衛治儀正步軍副尉步軍校監守信炮官南苑門章京陵寢防禦陵寢管理燒造磚瓦官分管佐領蓋州牛莊二處滿洲掌印防禦關口守禦黑龍江吉林等處管水手五品官守備從五品四等侍衛委署前鋒參領委署護軍參領委署鳥鎗護軍參領委署前鋒侍衛新增下五旗包衣參領新增五品典儀三等護衛守禦所千總正六品藍翎侍衛整儀尉親軍校前鋒校護軍校鳥鎗護軍校驍騎校監造火藥官陵寢祭祀供應官太僕寺馬厰駝厰翼長黑龍江吉林等處管水手六品官門千總營千總舊列從六品查武舉揀選定例一二等以營千總用三等以衛千總用營用較衛用為優不應在衛千總之下今改入正六品從六品委署步軍校新增內務府六品翎長新增六品典儀衛千總舊列正六品今以營千總改入正六品應將衛千總改入從六品正七品城門吏盛京逰牧正尉太僕寺馬厰駝厰固山達七品廕監生把總從七品盛京逰牧副尉七品典儀正八品盛京養息牧左右翼長八品廕監生外委千總新增從八品八品典儀委署親軍校以下新增委署前鋒校委署護軍校委署驍騎校副護軍校正九品各營藍翎長以下新增外委把總從九品太僕寺委署固山達以下新增額外外委臣等謹案官名增補階級改定俱依乾隆五十一年十一月議奏奉欽定新例詳加纂輯云皇朝文獻通考卷八十九
