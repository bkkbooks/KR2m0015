body:
  text: 田賦考七水利田乾隆元年諭紹興府屬沿江沿海堤岸工程停止按畝派錢于存公項內動支興修著為例又諭三代以前不言水利溝澮之制時蓄泄備旱潦尚書周禮所載為田功計者其利甚溥開渠引水溉田育榖始於戰國蓋因阡陌既開溝澮尋丈已失其舊也歷代言水利者得失參半總以相土宜順水勢為主今江南蘇松常鎮四府太倉一州現在興修支河仿河工海塘之例朕思渠港墟壩附近溉田原宜開濬以備旱潦但開濬之法須河身深廣蓄泄得宜挑取塗泥逺移他處或培窪下或築堤岸方為可久若堆貯河旁水潦旋淤有名無實徒滋煩擾至古堤舊渠不為田害便宜仍舊改築甚無謂也今蘇松等處支河不比河工海塘之險古堤舊渠如元和至和等塘民利往來田資灌溉至今受益吳本澤國三江震澤支流四溢如邱與權單鍔郟亶趙霖夏原吉周忱所論水利考据精核得失暸然今承修人員不逮前人止宜加修不必改築若按畝派錢以供大修朕已降㫖停止嗣後督撫以至州縣建言為民興利或利小而害大或利在目前而害伏於後或有利無害而其事難成皆宜詳審熟籌慎之於始以副朕惠養元元之至意又諭曰史書詳志河渠經術兼明水利誠以國計民生所關也果使水道疏通脉絡流注陂澤非沮洳之藪隄防有蓄泄之方旱潦有備而田廬無虞其有禆於閭閻誠非淺鮮我皇考軫恤黎元興行水利凡直省泉源河湖莫不濬導俾民得以灌溉轉瘠為腴至於蘇松之太湖吳淞白茆劉河歸海要道淮揚之槐子烏塔河泰州如皋運河串場車路海溝等河尤不惜帑金専員督理建閘築堤按時啓閉使近水田畝均沾膏澤利賴甚溥但自開浚以來已閲數年墟岸不無坍頺沙泥不無淤積與其嵗久濬築事難費倍不若逐年疏葺事易費省著令管理水利河務各官及濵河州縣各於所屬境內相視河流淺阻每嵗農隙募夫挑挖定為章程逐年舉行二年諭養民之道必使興利防患水旱無虞方能使蓋藏充裕緩急可資是以川澤陂塘溝渠隄岸凡有關乎農事務籌畫於平時斯蓄泄得宜潦則有疏導之方旱則資灌溉之利非諉之天時豐歉之適然而以臨時賑恤為可塞責也直隸今年夏初少雨深以暵旱為憂及連雨數日尚不甚大而永定河隨有漲溢之患雖因山水驟發然水性就下其經行之地自有定所設預為溝渠以泄之為塘堰以瀦之自可以殺水勢不至滙為洪流衝突漫衍如此之甚是皆平日不能預先籌畫所致也東南地方每有蛟患考之於古季夏伐蛟載在月令今土人留心者尚能預知有蛟之處掘地得卵去之則不為害且蛟行資水遇溪澗而其勢始大田疇雖不可移而廬舍塋厝尚可遷就髙阜之地以避之是亦未嘗不可先事預防該督撫有司務以生民利賴為先圖一切水旱事宜悉心講究應修舉者即行修舉或勸導百姓自為經理如工程重大應動用帑項者即行奏聞妥協辦理興利去害俾旱潦不侵倉箱有慶以副朕惠愛黎元至意又諭直屬營田水利昔年䝉皇考世宗憲皇帝特命怡賢親王大學士朱軾查勘地方情形不惜數百萬金錢興修經理已有成效然溝渠澮洫堤埝圍埂之屬必須隨時修葺嵗加補治方於田功有益今嵗春夏間雨澤愆期各州縣水田多未動植則溝渠各項勢不能無廢棄之處倘地方有司不隨時整理必誤明嵗春耕夫州縣地土原有高下之不同其不能營治水田而從前或出於委員之勉强造報者自應聽民之便改作旱田以種雜糧若附近水次可以營治之田而從前已經開成者倘因本年未曾種稻遂至廢棄殊為可惜著李衛飭行各州縣分别查明將實在可垂永久之水田勸諭民人照舊營治毋得任其荒蕪其溝渠各項有應行修葺者即於農隙之時酌給口糧督率修治三年諭曰聞直𨽻保定河間兩府所屬地方夏月多被水淹深秋之後地雖涸出而積水仍未全消推求其故則州縣舊有渠淀居民耕種漸有收穫恐被爭占遂報墾升科及耕種既久壅培漸高而水不下注矣又聞各處多有涸河當有水時由此宣泄無水竟成廢地近河居民築埂築壩為蓄聚灌溉之用以致河道阻塞水不通流高阜有水歸於卑下而卑下之水無地注之此積水難消之由也著飭各州縣將舊冇之渠淀查明造報毋得隱匿若有已經升科者免其賦稅其有涸河之處亦行確勘不得築埂壩以阻河流之故道庶積潦不致為害於地方實有禆益遣大理寺卿汪漋總辦江南水利工程兩江總督那蘇圖言臣等往淮揚㑹勘署撫臣許容所奏應浚河道與水利農田原屬有益惟聞沿河一帶邊土較髙興泰寶鹽等處地方低窪形如釡底必須測量地勢隨宜辦理如䝉簡差在京熟諳水利工程大員相度董率方為有濟遂有是命四年諭水利工程重大著通政使德爾敏同往辦理大理寺卿汪漋等言山陽阜寧之漁濵河興化縣之白駒閘下引河髙郵之通湖橋馬飲塘河江都之灣頭河通州分司所屬之十鹽場河通州之黃河洋范公堤俱應疏浚興修又鹽城之新興場河阜寧之廟灣場河宜及時疏浚以工代賑俱從之又諭今年六月間開封等屬被水州縣甚多已屢降諭多方賑恤因思濟饑拯溺目前之補救維殷而陂澤河渠善後之經營宜亟查豫省地方有淮潁汝蔡諸水經緯其間凡舊有河道俱達江湖苐或故道被湮或無支河導引是以水無容納之區勢必旁溢下有壅塞之處潦即難消聞撫臣見令各屬勘估興修但愚民無知上游方事挑濬而下游填實阻攔仍致水無去路於事何益著撫臣河臣親勘全局通盤計算務使一律疏濬深通毋令各分疆界稍有阻滯再䂊省之賈魯河原由江南地方全注入淮是廬鳳等處即豫省之下流也此時見在欽差大臣興修廬鳳等處河渠亦當同為留意從來疏濬河道時上游十分用力而下游百計阻撓各處人情如此不獨豫省為然是在封疆大臣洞悉其弊勿為所欺庶幾源委暢流永無泛溢之患又諭直隸地方水利未講以致水漲則受其害而平時未獲其益前屢降㫖令總督孫嘉淦等悉心籌畫善為經理據孫嘉淦具摺陳奏大槩講論河道情形至如何消除積水俾民間田畝收水利而免水害之處未曾詳悉奏及朕思此時乃水勢消落之際又值年榖收穫正宜董率官吏及時經營不但工程可以早竣而無業貧民亦可藉以糊口若不趂此時速為料理為未雨綢繆之計轉瞬春水長發又恐難以施工朕為閭閻疾苦時厪於懷為封疆大臣者當體此意可即傳諭孫嘉淦知之五年命廷臣議淮揚各屬興修水利事宜大理卿汪漋等言淮揚下河九屬地介江淮瀕河臨海民間生計大都以水為利魚鹽之饒富田畝之灌溉商運之往來皆資於水臣訪之輿論下河之為害者有二最甚者開放高郵三壩次則東邊易進鹹水查高郵三壩因上洪澤湖之天然二壩而設今天然壩已堅閉不開請將高郵三壩及昭關壩子嬰壩平撤以期永除水患更添閘三座以溉田畝上源無驟漲之水下游自無泛溢之虞矣其鹹水易進之處惟天妃與白駒三閘為甚今議天妃口建設閘座白駒三閘並行拆建其沿范公隄之丁溪小海諸閘內有上岡北草堰二閘頺壞更設於串場河裏口以致鹹水灌入請移建於串場河之外口其餘有墻石底石損壞者有閘板朽腐者俱應修葺以時啓閉則鹹水之患亦除矣水患既除水利可興臣等勘下游諸水之大勢俱東北由鹽城界入海東塘河為分泄之要津久經淤墊迤下上岡草堰二閘內外河道亦淤應一律開浚其阜寧之清溝河蘇家嘴河山陽之涇河市河寶應之子嬰閘河興化之北官河溪河白塗河梓新河興鹽界河泰州之小紀宗村二河蚌沿河淮東兩分司所屬串場河以及溱潼河新河舊河皆灌溉所資鹽艘經行之路今俱淤墊淺阻亦應挑浚范公隄綿長三百餘里應加築寬厚以資捍禦以上皆東流入海之路也其南流入江之水道則揚州以北之灣頭河董家溝芒稻河去江甚近自芒稻閘以下見在淺澀應加挑浚揚州城東之沙壩閘河水道淤墊亦應疏濬城南之揚子橋閘閘口過高應行改修其挑河所去之土令於兩岸三丈五丈之外堆成墟岸嵗旱則引以溉田水大則聽其堵閉訪之居民咸稱有益臣等更請將下河九屬田畝之毗近河渠者依此例于兩岸修築田墟高四尺底寬八尺頂寬二尺令有司勸諭居民於農隙之時如式修築嗣後雖遇雨水盛大之年可無虞淹漫矣疏入下大學士㑹工部議覆准行修築松江海塘工成松江沿海東西兩塘改土為石長六千七百餘丈海寧縣尖山壩工成令修浚江北廬鳳潁等屬水道先是江寧布政使晏斯盛言鳳潁廬滁泗各屬皆有水利可興大學士等議令總理水利之汪漋德爾敏㑹同督撫詳勘定議上允其議至是汪漋等言合肥城內之金斗河及泄水越河虹縣之枯河頭亳州之乾溪溝和州之太洋河姥下河牛屯河含山之銅城閘河來安之龍尾壩河俱淤淺不足資以灌溉應亟為挑浚滁州之孟公石壩應改為閘合肥城東石閘已頺廢應修建五河城南蔣家壩應改土為石其餘各州縣陂塘溝渠墟埂土壩共六十二所向來民自行修築應飭地方官視年嵗之豐歉量民力之能否隨時勸導次第興舉又夀州之安豐塘即古芍陂向為瀦水之區今已淤成高地既不能蓄水反致阻遏水道若招民墾種可得良田五百餘頃每年農隙之時令種地之民於塘外挑成河道東西下游各築土壩一道以備蓄泄可化無用為有用應俟督臣撫臣妥議辦理疏入令大學士等㑹議如所請行浚河南之賈魯河先是河南巡撫尹㑹一奏請興豫省水利并浚賈魯河下游入渦㑹淮而安慶巡撫陳大受復言上游之水奔騰下注渦河淺窄恐不能容受工部議令總理水利大臣暨兩省督撫河臣㑹議務使有利無害上從之至是汪漋等言豫省自開封府以南沿河七州縣之水俱歸江南之渦河見議所開河道雖有沙河桃河永利溝老黃河諸名其實本屬一河所濬者即舊有之水道也唯賈魯河原係入淮之河因水勢善溢故議於北岸設閘開河以分其勢所泄之水本自無多况流行四百餘里方入於渦自不至於江南有礙查豫省地居上游其水皆以江南為歸而入渦入淮稍有區别賈魯河入淮之水既分泄入渦則渦水亦當分泄入淮庶上游下游之水兩得均平亳州迤下六十里渦河南岸有分流之水漳河一道由乾溪溝歷淝河以入於淮今應將漳河疏浚遇渦水盛大可以分泄大學士工部議應如所請從之七年命直隸總督高斌等往江南經理水利賑恤又諭江南水災之後賑恤乃一時之補救而所以安養民生者全在明嵗之農功自被水迄今已經兩月雖水漸減退不為大害而瀰漫之勢仍似從前若疏濬稍後機宜則今嵗田地斷不能盡皆涸出小民春耕無望彼嗷嗷待哺者何以為生况此時搭棚棲止於長堤者亦豈可以久處亟宜講因地制宜之策其如何疏泄水道涸出田畝以安民業以奠居民著欽差大臣河道總督江南督撫悉心妥議速為經理毋得稽遲又命大學士陳世倌㑹同高斌辦理江南水利明年正月陳世倌高斌等言淮揚徐海鳳潁泗七府州地既卑下又為百川滙聚歸江歸海之路黃淮二瀆為之經南北運河為之緯南以洪澤湖為之瀦而高寶卲諸湖承其下流入運分趨以歸於江海北以微山湖為之瀦入運分趨而駱馬湖承其下流以歸於海夫水性就下下游多淤則上游之勢必遏上游既溢則下游之浸必甚若大闢尾閭分流暢泄使來水不及去路之多復於上游收束散漫之勢不使旁溢則縱有漲水可循流以漸趨於壑矣高寶諸湖之水自卲伯以上入海卲伯以下入江臣等面承指授入江之路宜酌量加增竊查運河入江較入海之路為近而運河之水高於江靣消納亦速若從興鹽等縣入海路既紆逺而沿海地靣高於內地外潮勢仰內河水低必俟潮退方可隨潮而出即疏濬極深又恐潮水內灌是入海誠不如入江之便今議於金灣滚壩之下東西灣地方添建滚壩二座分引潮水入於鹽河即於鹽河對岸挑石羊溝引河一道河頭建滚壩以應東西灣二壩并將鳳凰橋下引河及壁虎橋下流之廖家溝俱挑浚深濶歸石羊河以達於江其董家溝原歸芒稻河應加挑使自為一河直注於江至芒稻閘河為通江之捷路一遇伏秋水漲啓放閘門恐鹽船淺阻請於芒稻閘以下仙女廟以上挑越河一道俾鹽船由此經由其泰州河舊有秦塘港白塔河百漢港三路入江宜改建閘門以時啓閉此湖水下游入江之路也黃河北岸則微山湖為上流所聚駱馬湖為下流所聚而中河居其間以為咽喉六塘河又承駱馬湖之下引衆流歸場河以為尾閭今議將板浦以下場河速為挑濬其六塘南北二股及六里車軸等河之淺窄者悉加修治并於五丈義澤六里河頭各建閘以時減泄則黃河北岸之水亦不致泛溢矣上江鳳泗二屬南有澮河中有沱河北有濉河沱河久淤應將宿州之水導入澮河靈鳳等處之水導入濉河不使仍入沱河併將濉河下游之謝家溝浚深以資宣泄海州等屬則沂沭二河為大應將河身之淤墊者疏治民堰之殘缺者堵築其餘兩江七府州屬支河溝渠應挑浚者約計百四十餘處庶水各有歸不致泛溢矣疏入敕廷臣議覆行之詔疏濬京城內外水道八年寶山新築海塘工成寶山縣城東北自楊家嘴炮臺至車家墳止改土塘為石長一千三百丈准桑乾河開渠引水以溉民田直隸總督高斌言桑乾河為永定河之上游可於南北兩岸各開大渠一道引水灌溉營治稻田從之九年命尚書訥親查勘江浙海塘訥親言海塘視沙之坍漲以為平險老鹽倉一𢃄柴塘向因江海回流冲刷初非正溜移注故一經漲灘即化險為平但潮患常在北岸漲沙未可盡恃海潮向由中小亹出入若將故道開通分減北大亹之溜勢則上下塘工悉可安堵即使不能遽行開通而潮汐情形與湖河逈異其日月衰旺既有期信隨長隨落為時非久若將險要處所酌量機宜多建坦坡木石創壩俾其挑水掛淤實為捷要之法蓋有髙沙則塘工即資鞏固有新沙則高沙不能坍塌柴塘一帶若辦理合宜不但不必改建石工向後並可免搶險之勞惟在該管員辨隨宜經理不可恃沙漲以為安不可妄矜潮汛以為險也江南沿海水勢較浙省稍為寬緩惟華亭寶山二處溜勢頗急已建有石塘其餘沿海各工令該管官督率相機守護自可無虞冲卸工部議覆應如所請從之令疏浚清水下游諸河道訥親言洪澤湖減下之水由高寶等湖至邵伯湖入運者則有泰州鹽河為歸江之路由高郵湖入運者各開壩分泄入於串場河為歸海之路然通江之芒稻閘通海之白駒天妃等閘皆閉蓄以濟鹽運既不能預為容受之地洪澤湖減水既多宣泄不及即至漫溢民田因而洪湖不敢輕言宣泄然閉蓄過甚驟有漲溢上游受患並及下游今議歸江之路宜浚鹽河也鹽河水深四五尺如皋以下益淺其底髙於運河應挑深五尺使常足以資鹽運視運河之水有餘將芒稻諸閘啓放預為減泄再將寶應髙郵二湖相連之華家灘大新河髙郵邵伯二湖相連之王家港茅塘港並邵伯通運引河逐加挑浚俾循次灌注為湖河遞減之法每年於重運過後四五月內行之即遇洪湖減泄盛漲亦差可容受不致有湖河先滿之患而芒稻各河更無宣泄不及之虞矣又歸海之路宜浚串場河也洪湖入運之水自高郵注官河以達串場河又卲伯頭閘二閘水亦分入串場河出天妃白駒小海丁溪諸閘歸海為下河宣泄之要道乃夏月水盈之時河水僅深二三尺白駒等閘常閉不開興化各湖河水無去路稍增四五尺即淹浸為患蓋興化地窪而串場河淺之故也應將鹽城以南南北二串場河挑浚寬深使水恆瀦蓄足資鹽運白駒等閘平時可相機啓閉盛漲則盡行開放其興化以上之髙郵官河承南關車邏二壩為減水總滙之路河道淺窄難以容納而泄水之蚌沿梓新車路白塗海溝均應挑浚寬深以資利導再卲伯以上運河東岸各閘壩歸下河者合計寬一百四十餘丈而范公堤各閘口門止寬三十六丈來水多而去路少應於見在閘座多添金門㑹入各引河以廣其宣泄之路疏入命大學士九卿集議令督河諸臣分别先後估計具題從之又詔興修畿輔水利大學士九卿議覆御史柴潮生奏河間天津二府頻嵗亢旱請大發帑金經理畿輔水利凡河渠淀泊有故跡可尋者重加疏濬開溝建閘引水溉田凡待賑之民分段派工厚給其直所費雖多實為無窮之利臣等思北方地勢平衍原有河渠淀泊水道可尋從前或行之未久輒就罷廢或奉行不善轉致虛糜遂謂北地水利不可興聽其自盈自涸而不為之均節有水無利而獨受其害雖天時之不齊亦人事之未盡也所奏興修水利事屬應行疏入命尚書劉於義往保定㑹同總督高斌詳議經理是嵗協辦大學士尚書劉於義等陳水利十二事一宛平良鄉涿州境內之牤牛正支各河宜疏濬以消瀝水一新城雄縣境內之白溝河宜濬支流以免漫溢一趙北口以東淀內支河宜分别開濬一東淀河道宜開通徑直一子牙河濁流穿淀宜另疏出口水門并築長堤分别清濁一附近永定南北之舊減水河宜疏歸鳳河一塌河淀尾閭淤塞宜亟疏濬一唐河宜由廣利等渠引歸保定之府河一天津新安霸州諸河淀宜渠閘通引以沃民田一正定各泉宜開河引渠一舊有營田渠閘宜酌加修復一民間自營稻田宜酌給工本大學士九卿㑹議俱應如所請命速行之至十年劉於義等又言一廣利渠以下應添建涵洞一望都以下沿白草溝河至清苑安肅宜開浚道溝一廣利依城二河宜挑減水河一張青口以下應挑支河以分淀河之水一新安縣之新河應挑深以泄容城新安之水十一年劉於義等又言一塌河淀漲水應由七里海引歸薊運河一天津東北賈家口舊河應挑浚以泄積水一靜海迤束蘆北口應接開支河一南運河捷地汛應改挑引河尋又言一慶雲縣積水應浚馬頰河引水歸海一慶雲縣西南慕臺窪應挑溝引水入老黃河一慶雲縣四鄉泄水溝渠應開挑以疏積潦一鹽山縣宣惠河應挑深泄積水入老黃河皆下部議行令湖蕩蓄水之地毋許民人墾種户部議准浙江上虞之夏蓋湖餘姚之汝仇湖水利攸關民人毋得侵占并令凡有湖蕩之地詳加察勘劃明界限不許再行開墾阻塞水道其從前已墾地畝亦令核明有無升科分别辦理十年命江南督臣河臣查勘興修上下兩江水利至十一年兩江總督尹繼善等言洪溝河為毛城鋪之咽喉應於兩岸各築子堰堰內建涵洞及閘以泄民田積水濉河兩岸亦應各築子堰分設涵洞斗門其王家山天然閘河擬於尾閭改挑向南仍入濉溪口又天然閘河及峯山閘下引河五湖迤下之謝家溝俱宜挑挖寬深至潁州府之淝河年久淤塞應擇其淺窄之處浚之又自孟家橋以下民間私築土壩設立魚籪有礙水道俱當拆除䝉城南鄉之黃河北鄉之北淝河亦應挑浚此上江應修之水利也六塘河承駱馬湖之水至沭陽錢家集分為南北二股由鹽河入海宜築子堰設涵洞而上游之港河亦宜疏浚建閘設堰以減駱馬湖盛漲之勢沭河發源東省入沭陽分為二支由漣河入海宜一例築堰立涵洞橋梁以消積水至山陽之吉家橋河鹽城之九曲河阜寧之橫溝河放生河清河之民便河史家蕩古河安東之尤家蕩河桃源之劉老澗積水河海州之薔薇河俱宜次第挑濬築堰立閘此下江應修之水利也疏入令大學士工部集議飭督臣分别緩急估題興修從之又諭江南海州沭陽一帶頻年被災水患迭見今年仍復被淹朕詢問巡撫陳大受據奏稱海州之水下苦於鹽河之南北橫截使六塘南北潮河之水不得東流上苦於沭河之水盡由於沭陽海州入海宣泄不及以致為害欲治海州之水下則當去鹽河橫截之弊令地方官視水大小一面及時開壩一面報明鹽院又令民修築墟圍廣留水道則海州之南可以無災上則當分泄沭河之源今於大山頭北四里溝八里湖地方正馬陵山腰斷處開一河引入贛榆之大興鎮河又於下流引一河南入新河頭北入圍子河則上流既減下流自無四潰之虞再贛榆之三公河舊為泄水之道因年久堵塞苟一挑浚積潦可消等語可諭尹繼善白鍾山令其委員查勘應作何開通疏浚之處妥酌辦理務使水患悉除民不罹災以副朕痌瘝民瘼之意至十一年兩江總督尹繼善言鹽河南北橫截一百三十餘里西有六塘南北兩股之水穿過鹽河由武障義澤六里等河歸北潮河入海因蓄水濟運鹽柴三處俱築草壩雖可隨時啓閉但六塘河數百丈之水奔騰而來三壩口寬不逾十丈即及時開放亦宣泄不及請於武障義澤六里三河口各設滚水石壩數十丈髙於河底五尺低於民田一尺水滿則泄水平則止既利民田亦無妨鹽運又贛榆之三公河年久堵塞亦應挑浚以消積潦至沭河發源莒州馬耳山由郯城之馬陵山東南流自宿遷至沭陽查大山頭北之四里溝八里湖地形稍窪中隔佃頭一嶺開鑿非易且引沭入贛雖有利於沭陽實有妨於贛榆毋庸别開引河惟贛榆之圍子河上段淤淺之處宜開挑以泄異漲大沙河旁亦須加築子堰以資捍禦臣等更議開薔薇河等處以分沭水之流築沭河子堰以束沭水之勢則海沭贛三州縣水患可望減除從之十一年諭淮徐所屬州縣連年被灾緣該處地形本屬低窪而海州為衆流入海之區較他處為甚歷年經理河務凡疏通宣泄之方俱隨其形勢挑挖前經陳大受奏稱六塘南北潮河之水盡由沭陽海州入海宣泄不及以致為灾經大學士等定議應行籌畫之處俱已加意料理而仍不免於水患者蓋因從前被灾稍輕處所俱不奏報遂覺被灾之時少今則無論灾之大小悉令奏聞是以灾傷屢告其實非今多於昔也海州為水之所瀦蓄若該處免於潦則是本年雨少而髙阜之地被旱必多矣惟是小民屢困沉灾朕心深為憫惻所當多方籌度以圖善䇿即地勢低窪不能全去其患然去其太甚則受灾之民少而積困亦可漸蘇可令高斌㑹同尹繼善顧琮陳大受等務須商確妥協俾將來水患可望漸除協辦大學士尚書高斌等議請於海州所屬及淮徐二屬之宿遷桃源清河安東阜寧諸縣將窪地修築墟岸令業主出資佃户出力於農隙時次第經理從之禁民人私將池塘陂澤墾種以妨民田户部議官地民業凡有關於水道者概毋許墾種如自恃己業私將池塘陂澤改墾為田有礙他處民田者察出懲治如果於水道無礙聽其報官墾種改則升科皇朝文獻通考卷七
