之使自能克敵制勝若平時不能拊循而流于廢弛或苛急而激為忿怨偶遇小醜竊發則號令不明指揮不定畏葸退縮縱冦老師或臨陳之時望風委靡甚至欺蔽容隱負恩僨事國家所以為干城腹心者何在此而不誅何以示懲乃使久繫囹圄纍歲經年虛擬罪名獲全首領是骫法也後之任事者何由知戒朕以仁治天下慎重民命罔敢弗欽而天討所在朕勿敢赦如訥親張廣泗之誤國負恩屢頒諭㫖已立正典刑慶復之欺䝉縱冦亦已賜令自盡而詳閲秋朝審冊內除李質粹宋宗璋尚須待質袁士弼情非退縮應該緩决此外如許應虎之失誤軍機臨陳退縮沈瑞龍之私回任所託病偷安胡璘劉鍾之恇怯退避離汛失守又如張通楊文富之棄地不守阻回援師皆法之斷不容貸而情之毫無可原者即其中有先經緩决之犯皆令改擬豫勾正法以為炯戒凡在披堅執鋭之徒當思臨陳爭先赴蹈危險死于鋒鏑或所不免而國家加恩贈恤廕及子孫如有退縮偷安挫衄失事縱一時苟免終於身伏斧鑕等死耳死敵者榮死法者辱雖至愚亦當審擇而知所處矣若専事姑息積玩成疲於軍務大有關繫訥親張廣泗慶復之敢於貽誤未必非向來失律幸免人心無所震悚有以啓之也今於勾到後特頒此諭詳悉開導令武臣咸知僨事者必無軼罰罹罪者斷難幸生與其伏法於誤事之後不如捐軀於臨事之時大義昭然將必致身效命以戰則克以守則固不致苟且偷生蹈於顯戮正辟以止辟之義也此諭著刋刻頒發令內外武職衙門入於交盤冊內永逺𫝊示各宜凜遵四十九年頒發行軍簡明紀律諭前因甘省勦捕逆回時緑營官兵於馬家堡打仗因軍裝火器被雨潮濕俟烘烤完妥再為前進並有懦怯退縮者當經降㫖通飭各督撫務宜隨時加意整頓今逆回之事雖完但思整肅營伍固在督撫提鎮之實心督飭而平時操演講習更在將辨之面為指導兵丁之明曉軍律國家纍洽重熙承平無事兵可百年不用不可一日無備與其臨時告誡不若先事講求著軍機大臣會同該部將行軍紀律擇其緊要數條務須簡切明當使兵丁人人知曉盡成徑旅以示朕整飭戎行之至意一兵丁隨征勦賊俱應奮勇直前其見賊退走者不過各惜身命心懷畏怯試思臨陳退走律應斬首示衆若能殺賊立功必䝉升賞即或陳亡國家自有恤典子孫俱得邀恩兵丁等與其臨陳畏葸難逃國法何如爭先殺賊奮不顧身况勇往直前未必即死一經退後斷不能生此理甚明該管將備等平時將此諄切告誡務令兵丁等咸知大義臨陳時自必勇氣百倍可期殺賊立功一鳥槍弓箭最為行軍利器若兵丁等臨陳時尚未見賊逺將槍箭施放及至交戰火藥箭枝俱已用完無以禦敵即同束手待斃關係甚重凡領兵將備平時務須講習令兵丁於臨陳遇賊槍箭可及之處不先不後一齊施放庶槍箭隨聲應手皆獲實用一行軍攜帶軍裝火藥俱應在帳房收貯毋令潮濕即或途中遇雨亦須嚴密遮護庶遇賊緩急可用凡帶兵將備等須嚴加曉諭勿致潮濕或需烘烤以致臨時貽誤至弓箭槍刀等平時尤須修整堅利不得廢弛一臨陳對敵倘遇將領受傷隨從兵丁更當奮勇直前竭力救護若兵不顧將各惜身命觀望退阻最為惡習亟應申明軍紀俾衆知悉凡遇將領受傷兵丁不即時救護竟致潰散脫逃者查明按名處斬其能奮勇保護者立即議功優賞以示鼓勵該管將備等平日尤當愛惜士卒臨事賞罰公平庶兵將同心合力所向無敵一兵丁對敵乘勝追趕刻不容緩若兵丁等有貪搶賊人遺棄財物以致賊衆逃遁貽誤不小該管將備等於領兵臨陳時務須通行曉諭違者立即依律治罪庶兵丁等各知警畏一營卡最關緊要凡領兵將備等務須嚴飭坐卞兵丁輪班防守留心偵探毋得怠惰偷安即探察有事只須選派明幹一二人密行飛禀餘仍嚴整坐守毋許輕動無事時不許髙聲喊呌致亂營規違者俱照軍法嚴治一兵丁遇有調撥自當恪守軍令即時遄行如敢騷擾地方欺壓良民蹂躪田禾搶掠財物等事應即按律從重治罪該管將備等平日加意教誡臨時尤當嚴行約束無許違犯一兵丁奮勇殺賊應豫奬賞但恐兵丁等希圖冒功任意朦混不可不預為防範凡軍法將他人戰功冒為已功及謊稱實在效力將無作有以輕報重者斬該管將備等應隨時曉諭親自稽查俾立功者得賞冒功者治罪以期核實一行軍馬駝最宜愛惜凡兵丁等牧放須㨂擇水草弔臕須按照時候遇有疲乏加意調養夜間尤宜小心看守偶有遺失須立時尋獲至所挖井泉不許汚穢飲馬各挨次序毋許爭先以致壅塞如有違犯立即重懲不貸一劄營後巡邏防守毋得疏懈夜間不許無故行走帳房內更要小心火燭遇有警報靜聽將令不得輕舉妄動若奉有密令須各自遵守毋得私相泄漏該領兵將備等尤宜申明號令隨時曉諭不得踈懈臣等謹案行師之道首重紀律本朝武功之盛戰必勝攻必克所向無敵者皆由號令嚴明賞罰必信故也書稱用命賞于祖不用命戮于社是賞之與罰皆為軍令所重兹以軍令各條謹加登載至於計功敘賞亦有一定之典所以鼓勵戎行振興士氣即附編於左凡議敘軍功行間將帥著有勞績有特㫖優敘者由部覆議奏請隨時酌定其由統兵將帥列序官兵功績等次造冊送部者部核其實分為五等八旗官兵給以印軸曰功牌應授世職者移咨吏部甄别授之自雲騎尉始按功遞加未至授世職者由部注冊仍令圖功准其積算功牌之式以紫綾為面潔白厚紙四邊墨印螭文內注明功次凡填功績及年月處鈐用部印編次號數核對給發一等功牌長三尺六寸五分二等功牌長三尺三寸五分三等功牌長三尺五分四等功牌長二尺八寸五分五等功牌長二尺六寸五分均各廣尺有五寸五分從征有功者文職視武職王公所屬護衛親軍視官兵委署官視見任各以所得軍功等第豫敘緑旗官兵第功議敘者曰功加立一等功者准功加一等紀録二次二等加一級紀録一次三等紀録三次四等紀録二次五等紀録一次立功多者積算授以世職凡提督有功加十等至千總有功加二十四等皆准給一雲騎尉文職軍功應功加一等者准加一級叙功不實者各論如法叙八旗官兵軍功之制凡用雲梯攻城視城之大小攻之難易分等次授世職克府城者分五等一等叙六人第一人授一等輕車都尉次授二等輕車都尉次授三等輕車都尉次授騎都尉兼一雲騎尉次授騎都尉次授雲騎尉領戰官授騎都尉指路官及射箭官並授雲騎尉二等叙四人授世職自三等輕車都尉以下以次遞降領戰等官與一等同三等叙三人授世職自騎都尉兼一雲騎尉以下四等叙二人授世職自騎都尉以下領戰官並授雲騎尉指路官克兩城者授雲騎尉五等叙一人授雲騎尉領戰官克兩城者亦授雲騎尉克一城者注冊克州城者分四等一等議叙視克府城二等克縣城者分三等一等議叙視克州城二等其餘均以次遞降克衛城與州城同所城與縣城同如敵兵據寨築堡或師艱苦攻克各視其寨之大小與城之等次相較議叙其賞賚以府州縣衛所為等次克府城者賞五人第一人賞銀五百兩次三百五十兩次二百五十兩次百五十兩次百兩領戰官視第二人指路官視第三人射箭官視第五人舁雲梯人各賞銀三十兩克州城衛城者減府城一等賞四人第一人賞銀四百兩次二百五十兩次百五十兩次百兩克縣城所城者減州城一等賞三人第一人賞銀三百兩次百五十兩次百兩其領戰官指路官射箭官及舁雲梯人均以次遞降給賞鑿毁城垣者視雲梯攻城例給賞用大炮攻城不論府州縣衛所均賞三人第一人賞銀二百兩次百兩次五十兩領戰官視第二人指路官視第三人射箭官不叙炮手克府城各賞銀十五兩克州城衛城各十兩克縣城所城各五兩奪門入城及無雲梯而疾走登城者賞三人第一人賞銀百五十兩次百兩次五十兩領戰官視第二人指路官視第三人凡攻戰之時敵人掘塹排柵堅壁難克我軍正在相持有能越衆前驅衆軍隨進克敵者叙三人第一人賞銀百兩仍咨吏部授世職次賞銀八十兩給越衆前驅二等功牌次賞銀六十兩給三等功牌均注冊積兩次三等功牌者准作一次二等積至兩次二等者咨吏部授世職凡齊力交鋒之時有於本旗行隊前出衆衝鋒前進本旗大隊隨進克敵者叙三人第一人賞銀五十兩給本旗前進一等功牌次賞銀四十兩給二等功牌次賞銀三十兩給三等功牌均注冊積兩次三等功牌者准作一次二等積兩次二等功牌者准作一次一等積至三次一等者咨吏部授世職如對敵之時官兵力戰不退八旗執纛人有能鼓勇首進者照越衆前驅例叙三人第一人賞銀百兩仍咨吏部授世職餘以次遞降如官兵前進將及十人執纛人續進者惟叙一人賞銀五十兩對敵時一旗內有參領下執纛人在衆參領前首進者照本旗前進例叙三人第一人賞銀五十兩給一等功牌餘以次遞降續進者惟叙一人賞銀二十兩凡遇水戰時能超登敵舟殺賊有獲者視舟之大小分為三等一等舟叙五人第一人賞銀二百五十兩次二百兩均咨吏部分别授世職次賞銀百五十兩給一等舟之三等功牌次賞銀百兩給一等舟之四等功牌次賞銀五十兩給一等舟之五等功牌均注冊積兩次五等功牌者准作一次四等以次遞加積至兩次三等者咨吏部授世職二等舟叙四人第一人視一等舟之次給賞授世職其餘以次遞降其功牌注明二等舟自二等功牌至四等功牌均注冊積至兩次二等者咨吏部授世職三等舟叙三人第一人視二等舟之次給賞其餘以次遞降其功牌注明三等舟自一等功牌至三等功牌均注冊積至兩次一等者咨吏部授世職其不列等次之常舟叙三人第一人賞銀八十兩次六十兩次四十兩其功牌注明常舟自一等功牌至三等功牌均注冊積至三次一等者咨吏部授世職凡在舟督戰官視第二人餘官視第三人在舟前鋒校護軍校驍騎校等視第四人均按舟論功若追獲空舟小舟及敗走之舟者不在給賞授世職之內如招撫敵人千名以上敵舟三十艘以上者為五等軍功招撫人每增五百名舟每增十艘各加一等人至三千名舟至七十艘者為一等軍功人自三千五百名以上舟自八十艘以上臨時酌量從優議敘招撫城池以府州縣衛所為等次招撫府城為一等軍功州城為二等軍功縣城為三等軍功衛城所城為四等軍功有名寨崖為五等軍功其立功官兵未及議叙病故者均按其立功等次以為敘官得一等二等軍功者給一子監生食七品官俸三等四等軍功者給一子監生食八品官俸均令隨旗效力五等軍功給一子監生准其應試兵丁委署官員給葬銀二十兩外得一等軍功者給功牌銀五十兩二等以下每等減銀十兩八旗武職陳亡者豫贈廕給祭葬各視爵秩之大小順治九年定凡陳亡人等之子孫襲次已完者賞給七品官世職乾隆十六年定名為恩騎尉其恤賞銀自一千一百兩至二百二十兩有差兵丁陳亡給賞八旗領催護軍各二百兩驍騎百五十兩炮手百三十兩棉甲兵百兩從役七十兩臨陳受傷者一等傷給賞五十兩遞降至五等每等減十兩傷至殘廢者視陳亡例減半敘緑旗官兵軍功之制凡用雲梯攻城分别等次授職克府城者分五等一等叙五人第一人授參將次授遊擊次授都司次授守備次授千總二等叙四人授職自遊擊以下三等叙三人授職自都司以下四等叙二人授職自守備以下五等叙一人授千總克州城者分四等一等議叙視克府城二等以次遞降授職克縣城者分三等克衛城所城者分二等遞降授職亦如之議叙五人四人者領戰官功加四等指路官功加二等議叙三人二人者領戰官功加二等指路官功加一等議叙一人者領戰官功加一等指路官不叙若城被炮擊及鑿毁兵丁因而乘勢先登者叙一人授千總領戰官功加二等其賞賚以府州縣衛所為等次克府城者賞五人第一人賞銀二百五十兩次二百兩次百五十兩次百兩次五十兩克州城者減府城一等賞四人克縣城及衛城所城者並減州城一等賞三人凡强敵在前陳堅壘固能倡衆戰勝者叙三人第一人賞銀五十兩授守備次賞銀四十兩授千總次賞銀三十兩授把總若勢均力敵有於本營中衝鋒前進者叙二人第一人賞銀三十兩授千總次賞銀二十兩授把總凡遇水戰時能超登敵舟殺賊有獲者分為三等一等舟叙四人第一人賞銀百兩授都司次賞銀八十兩授守備次賞銀六十兩授千總次賞銀四十兩授把總在舟督戰官加三級同戰官加二級二等舟叙三人授職自守備以下賞賚視一等舟之次以次遞降三等舟叙二人授職自千總以下賞賚視二等舟之次以次遞降督戰官及同戰官以次分别加級紀録炮手奪舟者叙功與兵丁同以炮擊沉舟者一舟賞銀二十兩二舟賞銀四十兩授把總三舟賞銀六十兩授千總多者以次遞加如招撫敵人五百名以上或一等大舟五艘難民五千人以上計其多寡大小紀録加級及功加等次各有差二等中舟十艘三等小舟二十艘以上或難民二千人以上者紀録一次招撫人至二千名大舟至十艘中舟至二十艘小舟至四十艘難民至五千名者文職加一級武職功加一等數多者以次遞加其立功官未及議叙病故者一二等軍功給一子監生以把總用三四等軍功給一子監生以外委把總用五等軍功給一子監生隨營食糧願應試者聽兵丁照例給銀直省武職陳亡者按品給以贈廕祭葬加贈或二級及一級加廕自都司至把總恤賞銀自八百兩至百兩各有差兵丁陳亡給賞緑旗馬兵七十兩步兵五十兩土兵助戰者減步兵之半臨陳受傷者一等傷給賞三十兩遞減至五等每等減五兩皇朝文獻通考卷一百七十九
