亂營者並將該管大臣官員議處其馬無印者罰銀二兩箭無字者罰銀十兩俱給與拿獲之人偷盜籠頭馬絆馬䩞者鞭責偷盜鞍轡等物及馬匹者按贓之多寡治罪失火者從重究治官兵及跟役人等所過地方不得擾纍百姓搶奪馬匹踐踏田苗妄離本營潛入村莊山谷强取物件違令者嚴加懲治該管官及本主一併議處如兵丁及跟役逃走在卡倫以內者即行查拿照例治罪已逃出卡倫者即派官兵務窮追獲無論兵丁及跟役即按軍法追拿不獲者將追趕之官兵治罪逃人之主並該管官一併嚴加治罪凱旋之日如有私賣盔甲軍器者從重治罪該管官議處再馬駝係大兵緊要之項添撥官兵加意揀擇水草牧放進兵之時派留官兵在後查收遺失疲乏馬駝其遺失者按照印烙並所拴名姓交還原主疲乏者開明馬駝毛皮數目交與就近地方官或村莊百姓等牧養將數目報明兵部如敢隱匿乘騎及宰殺者嚴加治罪其遺失馬駝之主令將馬駝毛皮開明報兵部注冊坐卡人等不許攜纛前往各按旗分將小旗帶往離大營稍逺放卡加謹瞭望晚間撤回就近住宿放卡地方不許攜帶帳房不得舉火止許乘一馬前往馬不離鞍勿窵逺散放如有敵至審實即刻報明領軍將軍大臣如並非敵冦誤報及賊人將近漫無知覺怠忽報遲者將放卡官兵即在軍前按法從重治罪示衆其坐堆官兵夜間弓必上絃毋得脫衣加謹防守如駐劄地方兵丁每日射箭修理軍器務令精鋭仍不時將所𫝊軍令曉諭堆卡加意嚴肅夤夜不許閒人行走凡有行走之人詳悉詢問所穿衣帽所備器械可異者即行拘拿如坐堆卡之人疏忽怠玩或偷眠或空一二人者該管大臣官員查出將官兵嚴加治罪至與敵相近領兵將軍大臣酌量添撥前鋒章京兵丁前往務令探明敵人虛實踏看地方情形遇敵對陳時領兵將軍大臣務必詳審地勢或係曠野或係排駝營陳或係排列檔木營陳並令某隊伍某旗擊賊之處詳加指示鳴螺進兵于敗賊後亦鳴螺收兵進攻之時如敵冦堅徑不動即令預備兵丁前往應援如違者將領兵將軍大臣治罪敵人在對面進攻之時如王貝勒貝子公大臣等有越次前進者不准議功仍行治罪務須排列整齊緩轡前進如不按本隊尾隨他隊及離棄本隊由他隊前進並他人前進佇立觀望者應治以斬絞籍沒懲責革職之處各按所犯擬罪進攻之時或有稍先稍後者不得彼此爭競既能隨本旗敗賊有將伊議論者即係心術不端置之勿論如賊人不能抵敵敗走即選精壯兵馬追趕隨即分隊接踵前進如追趕之人誤陷伏兵或突遇他冦後隊即接刃攻擊嚴禁兵丁毋許虜掠牲畜財物如正當對陳之際違令希圖搶奪財物者即將官兵治罪其有責任之大臣官員既經給有親丁軍前若再挑取護軍披甲漢仗好者則對敵之時精鋭兵丁必致缺少嗣後大臣官員除原有親丁外軍前不許挑取其無親丁官員及委署之章京等出征各准挑取一名再軍糧所關綦重凡出征之時官兵口糧務令按定日期裹帶如不按數以致缺少者將該管官並少帶之兵從重治罪其有跳越排駝營陳及排列檔木營陳身故者准從優議恤領兵大臣有能嚴行約束官兵不致虜掠為非者升賞如縱容官兵擾害良民者從重治罪凡與敵相近一切軍令既經𫝊諭仍敢故違者將違令之人即按軍法如有𫝊行不至者亦按軍法從事雍正九年申定軍律奉諭自古用兵之道首以申明號令為務周易曰師出以律周書曰不愆於六步七步不愆於四伐五伐六伐七伐乃止齊焉可知進退步驟之間尺寸不可違越方為節制之師而平日必須申明號令使三軍之士無不熟知深曉倘其中或有不遵者則按軍律置之于法是其獲罪乃本人之自取無所歸咎雖領兵將帥不能以已意一毫輕重於其間此大公之道也我國家武備精强超越往古從來軍行之際紀律嚴明信賞必罰是以天戈所指迅奏膚功此中外臣民所共知者今承平日久新進少壯之人未曾親履戎行則於從前規制未必一一諳練若不詳細申明宣諭以致官辨兵丁等或因陷於不知而遽罹罪譴朕心實為不忍今特令大臣等酌議軍令條約經朕親加鑒定凡大端細務莫不備載其中蓋以軍機關係至重必使事事合於紀律人人祇奉章程勿犯重罰而妄兾從輕勿因事小而不遵成法將來荷天眷佑奏凱言旋凡我辨兵等數十萬人有大功而無小過此則朕心所厚望者也著即刋刻交與兩路大將軍通行頒布咸使凛遵一戰陳之際聽掌號擊鼓鳴金為進止如有聞聲不進聞聲不止者斬一臨陳須奮勇前進如有回顧畏縮交頭接耳私語者斬一専司掌號擊鼓鳴金之人聞令即掌號擊鼓鳴金令止即止違者八旗兵鞭四十緑旗兵棍責三十如臨陳違令者斬一將軍密𫝊軍令如轉𫝊之人將其中要言私自增減並將疑似之言添造者斬一將軍授緊密軍令如敢私告他人以致宣揚誤事者斬一將軍參贊大臣領兵提督總兵等官密議軍情時如敢私行竊聽即係泄漏軍機之人犯者斬一差往探聽敵人形勢如有畏縮不往詭稱已到彼處及以少報多以多報少探信不實貽誤軍機者斬一官兵沿途欺壓民番恃强買賣掠財物毁房屋淫汚婦女者俱斬一官兵殺傷良人冒功者斬一官兵將他人戰功冒為已功及詭稱有功以虛作實以輕報重者斬一指稱夢寐中見鬼神無故造言惑衆者斬一兵丁竊馬濳逃者該管官即派頭目追拿如在劄營地方犯者八旗兵鞭一百緑旗兵棍責八十如係臨陳時梟首示衆一遇有遺失馬匹其獲馬之人即禀明該管官查問給還如有隱匿私乘者八旗兵鞭五十緑旗兵棍責四十仍插箭逰營如私行屠宰或偷賣與他人者俱斬一劄營地方兵丁輪班守卡務宜嚴肅訪察夜遇警急即密禀申報備設以俟如有擾動散走驚怖喧譁以致亂營者斬一夜傳