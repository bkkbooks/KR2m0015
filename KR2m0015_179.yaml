body:
  text: 欽定四庫全書皇朝文獻通考卷一百七十九兵考一臣等謹案周官大司馬統六軍之衆掌九法之職詳哉其言之當是時永清大定之後載戢干戈載櫜弓矢越裳底貢肅慎來朝可云無事矣而講明武備若是其委曲繁重何哉誠以兵者誅暴禁邪威不軌而昭文德不可一日而不備也班固作漢書十志而兵制僅附見於刑法中雖曰刑有三等甲兵為大理本相通然使一代政令闕而未全論者惜之自兹以還兵事日繁史各有志如馬氏通考及五朝續通考所載得失燦然著矣我朝龍興東土以武功開國自太祖高皇帝始以戎甲十三肇基王迹創立八旗實為萬世兵制所由昉太宗文皇帝兼弱攻昧取亂侮亡一時大畏小懷所向無敵世祖章皇帝一著戎衣混一區夏增定中外營制益復精詳聖祖仁皇帝翦削逆藩戡定荒服功烈懋昭彪炳史冊世宗憲皇帝宵旰勤勞繼志述事西北兩路用師申嚴戎律更為明備我皇上天錫勇智覲光揚烈比年以來命將出師親授方略蕩平準噶爾回部大小兩金川豐功偉烈亘古罕聞而持盈保泰猶無時不警戒恬嬉搜討軍實兵制之善洵足垂諸億載竊惟列聖相承决䇿於廟堂之上而制勝於萬里之外神機睿略運用無方固有非臣下所能揣測者然即其外見之迹窺之內外相維逺近相錯當其無事之時養兵不試屹然有金湯之固及其不得已而用之天戈所指電舉霆發無不立就削平蓋簡練精純規制嚴密自然之明效也臣等敬稽列聖實録五朝國史兵志皇上起居注冊欽定大清㑹典及兵科録書諸籍凡有關兵制者參酌排纂具載於篇至於馬氏所列尚有車戰舟師之目今水師營制已詳載直省兵內毋庸另編車戰雖古法而不行於今兹編並削其目從其實也兵制臣等謹案設兵之制歷代因革損益雖互有不同而其實不甚相逺其出於特創而無所因襲者則我朝八旗之制是也敬溯國初先編立四旗以統人衆尋以歸服益廣乃增建為八旗然猶統滿洲蒙古漢軍之衆而合於一也逮其後户口日繁又編䝉古八旗設官與滿洲等繼編漢軍八旗設官與滿洲蒙古等合為二十四旗其制以旗統人即以旗統兵蓋凡隸乎旗者皆可以為兵非如前代有僉派召募充補之煩而後收兵之用也洎乎寶籙攸歸中外一統復設緑旗營以統漢兵蓋本朝建旗辨色以相勝為用於是五德兼全五行悉備內而京營則有親軍前鋒護軍驍騎步軍之分或用上三旗或兼用八旗外而直隸各省凡駐防兵用八旗各標及營汛兵用緑旗百餘年來增損隨時悉臻盡善至於外藩諸部奔走偕來分職編旗與內八旗相等有大征伐並帥師以從斯尤柔逺之鴻圖迄於無外者也邇者西陲底定式廓版圖列戍開屯規模益逺謹先叙各兵制建置之大綱而以軍令附焉太祖高皇帝辛丑年初設四旗先是癸未年太祖以遺甲十三副起事征尼堪外蘭敗之益厲兵力以次削平諸部歸附日衆初定出兵校獵不論人之多寡各隨族黨屯寨而行每人各取一矢十人設一長領之其長稱為牛録額真至是始分為四旗曰黃旗曰白旗曰紅旗曰藍旗以純色為辨每旗下以三百人為一牛録轄以牛録額真一人臣等謹案是年為編牛録之始嗣後續設固山額真梅勒章京甲喇章京等官至順治十七年始定漢字稱都統副都統參領佐領等名兹謹仍舊稱以昭初制甲寅年定八旗之制以初設四旗為正黃正白正紅正藍增設四旗為鑲黃鑲白鑲紅鑲藍黃白藍均鑲以紅紅鑲以白合為八旗統率滿洲䝉古漢軍之衆每三百人設牛録額真一人五牛録設甲喇額真一人五甲喇設固山額真一人每固山設左右梅勒額真二人時滿洲牛彔三百有八䝉古牛録七十六漢軍牛録十六行軍時地廣則八旗並列分八路地狹則八旗合一路而行臣等謹案自後生齒日繁及中外臣民歸服者益衆隨時增編滿洲䝉古漢軍佐領無定額天命五年改設八旗官設總兵官分為三等其副將參將遊擊亦如之各牛録額真俱為備禦官每牛録下設千總四人天聰八年改定八旗官奉諭凡我國官名皆當易以滿語勿仍襲漢語舊名今悉為釐定五備禦之總兵為一等公一等總兵官為一等昻邦章京二等總兵官為二等昻邦章京三等總兵官為三等昻邦章京一等副將為一等梅勒章京二等副將為二等梅勒章京三等副將為三等梅勒章京一等參將為一等甲喇章京二等參將為二等甲喇章京遊擊為三等甲喇章京備禦為牛録章京旗長為壯達凡管理不論官職管固山者即為固山額真管梅勒者即為梅勒章京管甲喇者即為甲喇章京管牛録者即為牛録章京管巴牙喇纛額真即為纛章京管巴牙喇甲喇額真即為巴牙喇甲喇章京嗣後皆照我國新定者稱之又定八旗兵名奉諭滿洲蒙古漢人前此騎步守哨等兵雖各有營伍未分名色故止以該管將領姓名稱為某將領之兵今宜分辨名色永為定制隨固山額真行營馬兵為阿禮哈超哈巴牙喇營前哨兵為噶布什賢超哈駐防盛京兵為守兵預備兵為援兵各城寨兵為守邊兵舊䝉古左營為左翼兵右營為右翼兵舊漢兵為烏真超哈元帥孔有德兵為天祐兵總兵官尚可喜兵為天助兵後天祐天助兵俱歸入漢軍臣等謹案阿禮哈超哈為驍騎營之始巴牙喇為護軍營之始噶布什賢超哈為前鋒營之始烏真超哈為漢軍之始九年設䝉古八旗先是八年以所獲察哈爾部千餘户分給八旗是年正月復以察哈爾來歸各官並壯丁三千二百餘名均隸各旗至是始編審人丁及舊喀喇沁壯丁分為蒙古八旗其旗色與滿洲八旗同每旗設固山額真一人梅勒章京甲喇章京各二人分轄所編牛録崇德二年分漢軍為二旗先是天聰七年令滿洲各户有漢人十丁者授綿甲一副共一千五百八十户令舊漢兵之將領官統之以補各旗之缺額者至是始分為左右翼二旗其旗皆用皂色每旗設固山額真一人轄所編牛録四年分漢軍為四旗時定旗色一以皂鑲黃一以皂鑲白一以皂鑲紅一純用皂色每旗設固山額真一人梅勒章京二人甲喇章京四人牛録章京十八人七年設漢軍八旗定旗色與滿洲八旗同每旗設固山額真一人梅勒章京二人甲喇章京五人順治元年世祖章皇帝定鼎燕京分置滿洲䝉古漢軍八旗於京城內鑲黃正黃旗居北方正白鑲白旗居東方正紅鑲紅旗居西方正藍鑲藍旗居南方左翼自北而東自東而南鑲黃旗在安定門內正白旗在東直門內鑲白旗在朝陽門內正藍旗在崇文門內右翼自北而西自西而南正黃旗在德勝門內正紅旗在西直門內鑲紅旗在阜成門內鑲藍旗在宣武門內又定八旗驍騎營制滿洲䝉古漢軍各八旗每旗各設都統一人副都統二人所屬參領滿洲漢軍每旗各五人䝉古每旗各二人康熙三十四年增設委署參領雍正元年改為副參領佐領約以三百人為率隨時編設無定額驍騎校每佐領下一人稽所編人户田宅兵籍詳見後禁衛兵又定八旗都統所轄甲兵員本朝兵制各旗之官兵丁其户口屬籍無不隸于都統至於簡用充補自驍騎營而外則各該管大臣分領焉滿洲䝉古旗每佐領下設親軍上三旗者隸領侍衛內大臣下五旗者隸宗室王公設前鋒隸前鋒統領設護軍𨽻護軍統領康熙三十年於滿洲䝉古旗增設鳥槍護軍鳥槍驍騎炮驍騎隸大器營總統雍正二年設設圓明圈護軍隸護軍營總統乾隆十四年雲梯前鋒兵隸健鋭營總統設步軍領催及步軍𨽻步軍統領其本營領催與驍騎及弓匠或鐵匠鞍匠等各隸本旗都統漢軍旗每佐領下設步軍領催及步軍隸步軍統領其本營領催與驍騎雍正二年于漢軍每佐領下驍騎內設藤牌兵四名乾隆元年定漢軍每旗設藤牌兵一百名於驍騎內選充各隸本旗都統又定八旗前鋒營制滿洲蒙古八旗分左右兩翼每翼各設前鋒統領一人率前鋒參領前鋒侍衛前鋒校等其所轄為前鋒營兵備警蹕宿衛詳見後禁衛兵又定八旗護軍營制滿洲䝉古八旗各設護軍統領一人率護軍參領雍正元年增設副護軍參領護軍校等其所轄為護軍營兵備警蹕宿衛及門禁𫝊籌詳見後禁衛兵設領侍衛府滿洲䝉古鑲黃正黃正白上三旗設領侍衛內大臣六人內大臣六人散秩大臣無定員率一二三等侍衛及藍翎侍衛親軍校親軍等康熙三十七年增設宗室侍衛及漢侍衛雍正三年增設四等侍衛於藍翎侍衛內選充備宿衛扈從詳見後禁衛兵設提督九門步軍營步軍統領一人率左右翼步軍總尉順治五年增設八旗副尉雍正四年增設八旗參尉乾隆十九年改總尉名翼尉副尉名協尉參尉名副尉八旗步軍尉等統轄滿洲蒙古漢軍八旗步軍掌守衛巡警其城門尉城門校乾隆十九年改城門尉名城門領城門校名城門吏門千總等掌城門啓閉設巡捕營參將遊擊等官統轄馬步兵分汛巡緝别領於兵部職方司初設南北二營十四年增設中營康熙三十年始令步軍統領兼管乾隆四十六年增設左右二營為巡捕五營詳見後禁衛兵設內府三旗初定三旗設滿洲佐領旗鼓佐領正黃旗朝鮮佐領內管領等統各護軍驍騎隸領侍衛內大臣管轄後改隸內務府總管嗣後以次增設參領副參領及護軍統領復添設前鋒分為護軍前鋒驍騎三營備宿衛扈從屬或京內府三旗官員兵丁盛京內務府總管仍由在京內務府掌其升選俱詳見後禁衛兵設盛京八旗駐防兵時以遷都燕京命內大臣何洛會為盛京總管設左右翼梅勒章京各一人統領滿洲䝉古漢軍八旗兵駐防盛京並設各城城守官至三年改總管為昻邦章京十年增設寧古塔昻邦章京康熙元年改盛京寧古塔昻邦章京並稱將軍十五年移寧古塔將軍駐吉林船厰城二十三年增設黑龍江將軍三十八年移黑龍江將軍駐齊齊哈爾城與副都統統轄城守尉防守尉防禦各員詳見後直省兵設直省八旗駐防兵時初設獨石口張家口防禦分遣甲兵駐防至二年復遣八旗兵駐防直隸之順德府山東之濟南府德州臨清州江南之徐州府山西之平陽府潞安府蒲州府凡八城每城設協領一人滿洲章京四人䝉古漢軍章京各二人尋復增定江南江寧府浙江杭州府等處駐防兵制嗣後隨各省形勢設將軍都統副都統或但設城守尉防守尉駐防詳見後直省兵設直省緑旗營凡直省漢兵俱以緑旗為辨總督所屬為督標巡撫所屬為撫標提督所屬為提標總兵所屬為鎮標自總兵而下則為副將參將遊擊都司守備千總把總各員而總督則節制巡撫標及提督總兵標提督又節制各鎮總兵標各鎮標統轄各協及各營其屬於河道總督者為河標所轄各營専司防河護運屬於漕運總督者為漕標所管各衛所専司分幫領運詳見後直省兵設外藩扎薩克各旗先是天命天聰年間科爾沁等各蒙古相繼欵附豫以封爵定鼎之後以次編旗凡內扎薩克二十五部為五十一旗每旗扎薩克一人協理旗務者無定員以王貝勒貝子公台吉等為之設都統副都統以本旗台吉內以原爵兼任參領佐領驍騎校驍騎如內八旗之制至康熙三十年設喀爾喀各旗三十六年設賀蘭山厄魯特旗及哈密旗四十三年設額濟內土爾扈特旗雍正三年設青海各旗十年設土魯畨旗乾隆十九年設都爾伯特各旗各隨人衆編佐領有差詳見後設守衛陵寢官員兵丁先是天聰八年永陵設散秩官至順治初福陵昭陵各設雲騎尉五年增設散秩官八年永陵增設騎都尉雲騎尉嗣後盛京三陵各增設總管副總管防禦驍騎校等員嗣又于京師東陵西陵各設總管副總管防禦驍騎校等員園寢各設防禦驍騎校等員所屬八旗驍騎各有差詳見後八年定王公府屬武職官員兵丁分别親王郡王貝勒貝子鎮