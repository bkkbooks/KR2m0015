body:
  text: 欽定四庫全書皇朝文獻通考卷十三錢幣考一臣等謹按自上古刀布之用一變為九府圜法厥後輕重代殊而肉好之式未之有易於以權百物之貴賤通農末之有無錢之所關誠巨矣顧利之所在弊亦隨之錢重則姦民盜銷以牟利惜銅愛工則又以薄惡而偽鑄易興有天下者操利人之柄求酌中之宜惟在以人用法有以持其弊而已歷代錢法之得失具詳馬考及五朝續考中我太祖太宗龍興東土創制顯庸即已鑄有錢文以資民用逮定鼎燕京以來列聖相承府事允治內而寶泉寶源之設輕重協宜圜函精好外則各省局爐座或設或停隨時調劑而又定官司之監理以專責成分兵餉之配支以廣流布務使有逺近通行之利而無姦民骫法之弊經畫周詳並足垂諸永久邇者西陲底定式廓昄章復頒錢式於回部各城開鑄天朝乾隆通寶錢俾荒服之人咸昭法守斯尤大同之郅治已若夫鼓鑄所需首在採銅山礦所開海航所市嵗以數千百萬計若錫若鉛亦各隨所産京省諸局悉取給焉其收買有時其運輸有限權衡定制中外交資求之漢唐錢制極善之時未聞意美法良有如此者也至馬氏敘錢而兼及于幣蓋古者錢亦稱幣而尚不足以盡幣管子稱三幣而刀布為下則凡可以通功易事利民權物者皆可以幣例之也三代以後珠玉但為器飾而不以為幣皮幣惟漢武一行之龜貝惟王莽一行之元明時雲南行使􅖝子以之折賦尚沿貝貨之遺逮鼓鑄既興而海􅖝之用久廢若乃自宋以來兼用楮幣其制起於交子會子而金元明稱之曰鈔原其始亦以鹽茶劵引之屬視之而暫以權錢行之既久乃即以當錢論者謂以虛代實民不寶貴國家錢貨充盈而無藉乎鈔法之用故順治年間雖暫用之而旋即停止則亦非今日通行之幣也夫幣之堅而可久者莫過于金金有三品或黃或白或赤而錢特居其一周制黃金方寸而重一斤國語注虞夏商周黃金為上幣銅錢為下幣漢書秦并天下黃金以鎰名者為上幣銅錢識曰半兩為下幣漢代復以斤名金用金多以千萬斤計蓋其時但以黃金為幣若白金之用惟漢武之白選王莽之銀貨一見於史而後亦漸廢固不皆以為幣也魏晉以後金日少而昻幣始專用錢六朝迄唐交廣之域以金銀為幣然止限於一隅至金時鑄銀名承安寶貨公私同見錢用此以銀為幣之始前明中葉令各處稅糧得收納白金而銀之用益廣我朝銀錢兼權實為上下通行之幣故凡銀色之高下與銀直之輕重並附編於左天命元年鑄天命通寶錢丙辰春正月諸貝勒等具表上太祖尊號曰覆育列國英明皇帝建元天命尋開局鑄錢二品依古九府圜法制之輪郭外周錢面作字陽起一為國書滿文一漢字曰天命通寶其滿文一品錢質較大臣等謹按太祖己亥年二月始命以滿洲語製為國書嗣後議開金銀礦及鐵冶蓋五金之利已由此肇興逮建元天命以後即以滿漢字分鑄制錢迄今圜法流傳中外臣民共珍為重寶謹依舊制首載是編仰見我朝開國之初所以裕國而利民者規模宏逺矣天聰元年鑄天聰通寶錢時太宗文皇帝御極改元天聰亦鑄錢二品一為滿文一漢字曰天聰通寶大小各如舊制順治元年置户部寶泉局工部寶源局鑄順治通寶錢時世祖章皇帝定鼎燕京今置寶泉局屬於户部寶源局屬於工部各鼓鑄制錢文曰順治通寶用漢字每文重一錢寶泉局嵗鑄錢解交戶部庫配銀給發兵餉以户部漢右侍郎一人督理京省錢法滿漢司官各一人監督局務每年掣差設局大使一人寶源局嵗鑄錢解交工部節慎庫以備給發各工之用錢法亦掌於漢右侍郎置滿漢監督官三人專司出納設局大使一人餘制與戶部同尋户部議將順治通寶錢式頒發各省鎮有應需鼓鑄者令定議開局臣等謹按唐宋鑄錢之所皆稱為監元時亦稱為司其稱為局者仍明制也明代直省鑄局皆得稱寶泉寶源本朝惟京局稱之其開鑄之期曰邜宋以後始有畫卯點卯之名蓋取其時之早相沿既久遂以一期為一卯至計錢之數自漢以來曰貫亦曰緡前明或以錠計每五千文為一錠今以錢千文為一串猶之貫緡之義云二年定錢制每文重一錢二分先是工部侍郎葉初春以制錢每七文準銀一分錢價日增民未稱便請頒鑄當五當二錢以便民用不允至是户部議言錢文尚輕應更舊制每文重一錢者為一錢二分凡七文準銀一分舊錢以十四文準銀一分官以此徴收民以此輸納聽便行使從之臣等謹按錢之輕重古以銖與絫黍計今以錢與分釐計蓋分釐之數古者但以為度名而不以為權名權之為數則十黍為絫十絫為銖二十四銖為兩自太公圜法輕重以銖漢以後每以銖之數鑄於錢文唐開元通寶為二銖四絫積十錢重一兩是每文為今之重一錢後人以為繁而難曉故十分其兩而代以錢字蓋宋之前已然考宋太宗淳化二年詔定稱法其時以太府權衡但有一錢至十斤之數乃别為新制以御書三體淳化錢較定實重二銖四絫為一錢就黍絫銖參之度尺以忽絲毫釐各積分為一錢之則然後制取等稱新制既定中外以為便是則十釐為分十分為錢之計數始於宋時所謂錢者即借錢幣之錢以為數名所謂分釐者即借度尺長短之名以為輕重之名也若夫古之稱法至後世而加重隋文帝鑄五銖錢重如其文而每錢一千重四斤二兩則古稱三斤為隋一斤而少隋書亦謂開皇以古稱三斤為一斤孔頴達左傳正義謂周隋稱於古三而為一杜佑通典謂六朝稱三兩當唐一兩今以古稱三之一約之則漢之五銖錢止當今七分而弱而今之重一錢二分者實為古八銖有贏此固權法相沿之不同亦可見今之鼓鑄其不愛銅而不惜工實更勝於古焉又議令崇文門及天津臨清淮安三關各動支稅銀一萬兩辦銅解寶泉局又定工部差司官一人專督辦買商銅解寶源局又令山西陜西省及密雲薊宣府大同延綏臨清等鎮各開鼓鑄局先是元年已頒發錢式至是各省鎮陸續奏請開鑄戶部議準每文照京局重一錢二分令各右布政使總理錢法委就近道府及同知通判等官分管局務臣等謹按各鎮之名國初尚沿明舊制其薊宣府大同延綏四鎮明代在九邊之列順治初年於宣府大同仍專設有總督巡撫學道總兵等官於延綏設有巡撫總兵等官密雲為順天巡撫所駐并設總兵等官薊與臨清各設總兵等官並為重鎮故特置錢局嗣後各員陸續裁併移駐各地方仍如府州縣之制不復稱為鎮云三年禁用前代舊錢户部議定制錢漸廣舊錢應概禁不用惟崇禎錢暫許行使其餘舊錢有願送部者每斤給直八分以資鼓鑄至八年以明季舊錢流行日久未能遽革復申其禁以三月為限過三月仍行使者罪之又申假銀及行使低銀之禁臣等謹按銀乃幣之一端魏晉以前以黃金為通行之幣金元以後以白金為通行之幣漢時偽黃金之律馬考亦載入錢幣門自銀既盛行與錢互相流轉假銀與低銀足為市易之害考國初定偽造金銀者杖一百徒三年為從及知情買使者減一等至康熙年間定凡造錫錁充假銀者杖枷流三千里乾隆五年復定凡用銅錫鉛鐵藥煮為假銀行使者係旗人鞭枷發黑龍江係民杖枷發雲貴川廣煙瘴少輕地方為從及知情買使者擬流其將銀鑿孔傾入銅鉛及將銅鉛傾錠外包以銀使用者仍照杖徒原律定擬互詳刑考又增設戶部寶泉局筆帖式二人以一年更代又令湖廣省城及荆州府各開鼓鑄局四年議令蕪湖滸墅揚州西新北新九江六關各動支稅銀一萬兩辦銅解寶泉局禁止偽錢户部議言天下初定草竊未靖雜出偽錢且至姦民乘便盜鑄應下令禁戢從之臣等謹按國朝初年有故明福王朱由嵩竊據江左於順治二年平之唐王朱聿鍵竊據福州唐王之弟朱聿􅟽竊據廣州俱於順治三年平之永明王朱由榔初據肇慶後屢經轉徙於順治十八年平之朱由嵩等僣有偽號私鑄錢文故是年禁止行使又令盛京及江西河南省湖廣之常德府各開鼓鑄局又更定錢直户部議定制錢行使原係每七文準銀一分錢價既重小民交易不便應改為每十文準銀一分永著為令臣等謹按錢與銀相權而行欲求錢法之流通必先定錢直之高下錢無定直則鋪户之倒换者得以操其重輕私家之居竒者得以伺其贏縮錢價無準而物價亦失其平自漢以來銀尚未為通用之幣故銀錢相權之直前史多未及詳大抵古者金銀視後世較賤而銅錢視後世較貴漢書食貨志漢武鑄白金三品龍文白選重八兩直三千馬文直五百龜文直三百所謂白金者雜銀錫為之既非專用真銀而其時以縣官空乏聊造以贍用不可據以為準故重八兩者直三千而六兩四兩者止直五百三百則知當日原未嘗以白金之重與銅錢相較而平其直也新莽時黃金一斤直錢萬銀八兩為一流朱提銀一流直錢一千五百八十他銀一流直錢千以古稱比後世三之一計之金一斤實為今五兩有竒而直止萬銀八兩實為今二兩八錢有竒而直止千有竒及千則漢時錢貴可見而金價但五倍於銀則以金多而易得也宋真宗嘗論咸平中金兩五千銀兩八百是金銀之直已較貴於漢自鈔法盛行而錢價益無定準金時每銀一兩折錢二貫則銀直又過昻明代錢互有貴賤每銀一錢直五十五文至百文不等又有京錢外省錢多寡之異末季至銀一兩易錢五六千文而錢法大壞我朝定鼎之初議以銀一分為錢七文是年更定每分為十文以為定例嗣後屢經申明其令其囤積官錢者有禁興販攙和小錢者有禁偶遇錢價稍昻復多方調劑以平其直務使轉移出入上握其權交易流通下收其利誠為酌中便民之利也五年開江南江寧府鼓鑄停盛京及延綏鎮局户部議言江南江寧府為前代建都之地商賈雲集現在有滿兵分駐防守準於所在設局開鑄其盛京及延綏鎮錢文尚非急需採買銅斤亦甚不易應請暫行停止從之六年移大同鎮局于陽和城令浙江福建山東省各開鼓鑄局七年議令臨清淮安滸墅蕪湖北新九江六關各增支稅銀一萬兩辦銅解寶泉局開湖廣襄陽鄖陽二府鼓鑄局七月裁江寧府局鼓鑄同知先是以江寧重鎮特設同知一人專理局務至是定議裁減令地方官兼管八年增定錢制每文重一錢二分五釐户部議言錢為國寶務厚且大始定制每文重一錢繼重一錢二分猶嫌其輕應每文改鑄重一錢二分五釐仍照定制以每錢百文準銀一錢從之又行鈔貫之制是年始造鈔一十二萬八千一百七十二貫有竒自後嵗以為額至十八年即行停止臣等謹按鈔法始於宋之楮幣至明代鈔以桑穰故紙為之外為闌紋中圖錢貫之狀並印貫例文字於其上民間偽造者有禁原以濟錢法之窮也順治初年經費未定用度浩繁是嵗世祖章皇帝親政之始先以國帑未充特命發內庫銀支給官俸等項嗣後倣明舊制造為鈔貫與錢兼行蓋金元以來鈔法之弊在於錢不勝鈔鈔既日多錢行日少於是鈔輕物重終至壅格而法遂以窮明臣往往言鈔法不可行以用之者無權也國初制鈔甚少其上下流通仍以銅錢故暫行之而無弊嗣後旋即停罷大抵自宋迄明於銅錢之外皆兼以鈔為幣本朝始專以銀為幣夫因榖帛而權之以錢復因錢之難於齎運而權之以幣鈔與銀皆為權錢而起然鈔虛而銀實鈔易昏爛而銀可久使鈔難零析而銀可分用其得失固自判然前代恐鈔法之阻滯并銀與銅錢而禁之至于用銀者以姦惡論以錢交易者掠治其罪亦為不揣其本末矣然則錢與幣之各得其宜固無有逾於我朝者也又議令各布政司止各開一局餘俱停止户部議言見在鑄局過多民易盜鑄為姦應行裁減於各布政使司駐劄之省城止留一局鼓鑄其餘各鎮及湖廣之荆州常德襄陽鄖陽府等局一概停止從之九年定各省局錢本息奏銷之例先是各省設局鼓鑄初定章程局錢本息各布政使雖立册稽查未經達部户部議言本部為天下財賦總滙應責成各該管衙門將鑄錢本息按季報部以憑核查嵗終彚册奏銷從之又議減西新關辦寶泉局銅銀五千兩改令蕪湖關滸墅關增辦先是定西新關支稅銀萬兩蕪湖滸墅關各二萬兩辦户局銅斤至是以西新稅課不比他關户部議準令減銀五千兩改增蕪湖關銀二千兩滸墅關銀三千兩如額分辦十年復開密雲薊宣府陽和臨清等鎮鼓鑄局先因各省鎮局過多定議裁減至是以錢用日廣錢價漸昻户部議準仍設密雲等處鑄局共增爐三百有四座又鑄一釐字錢九卿等會議疏通錢法奏言鑄錢務照定式每文重一錢二分五釐錢背之左增鑄漢文一釐二字其右户部鑄户字工部鑄工字如江南江西浙江福建湖廣河南山東山西陜西省城及密雲薊宣府陽和臨清等鎮並鑄開局地方一字須極精工鑄不合式者參究每千文準銀一兩其見行舊時制錢原有高低厚薄不等難以強齊一切貿易應暫從民便至直省錢法責成右布政使專督稽查奉上諭錢法難行皆因鑄造不精所致見今官錢該部酌減爐座務精工如式背添一釐二字上下通行聞向來官爐夾帶私鑄尤為病國犯者以枉法贓論罪其私鑄姦民不時嚴緝若仍違犯並地方官究處餘悉如議行臣等謹按古半兩五銖等錢皆紀銅之輕重本朝之一釐字錢則紀直銀之數考古者數名先作氂字一蠶所吐為忽十忽為絲十絲為毫十毫為氂説者謂毫斷馬尾為之氂為氂牛尾毛蓋取自微至著之義也史記漢書多作氂後乃通用作釐其又為釐者從省文也是年錢局幕文皆作釐十二年定制錢配給俸餉之例户部議言制錢日廣請於每年二月八月以局錢半成配給官俸及兵餉其直省兵餉等項亦令以制錢按成搭放從之臣等謹按直省開鑄地方除搭放兵餉外或兼給官役俸工驛站雜支等項視局錢之多寡隨時酌放核算報銷本無定額又開山東萊州府鼓鑄局十三年停福建鼓鑄又定奏銷錢本違限處分户部議言各省鼓鑄錢本宜按期奏銷違者應酌定處分其自今各州縣錢本過三月不完者罰六月俸再限三月不完者住俸再展限三月仍不完者降職二級調用接催官不完者處分同例如樣錢頒發而鑄造遲延及季報愆期錢式粗壞者俱罰一年俸從之又移陽和局於大同改鑄錢幕陽字為同字臣等謹按陽和地近大同明洪武年間築城景泰時設宣大總督駐此為重鎮國初尚沿其制順治六年以移大同府治于此并移鑄局八年仍還故治至是年議裁宣大總督故鑄局復移大同時以高山衛并入陽和衛為陽高衛今為陽高縣十四年定直省錢糧兼收銀錢之例户部議言直省徴納錢糧多係收銀見今錢多壅滯應上下流通請令銀錢兼收以銀七錢三為準銀則盡數起解其錢充存留之用永為定例從之臣等謹按古者賦稅之制惟以穀帛其後以錢又其後以銀漢律有口算出錢但施之丁賦而已自唐定兩稅法始以錢為惟正之供宋代因之民間輸官之物謂之錢糧由此昉也唐以銀為土貢而不以為賦宋景祐時詔諸路嵗輸緡錢福建二廣易以銀于是銀始得代錢明洪武九年許民以銀錢鈔絹代輸今年租稅於是銀始得代糧正統元年以後令浙江江西湖廣等處租稅俱量收銀此以銀為賦之始也國初於是年定銀七錢三之例嗣後銀錢交納仍各隨民便雍正十一年復以民間正賦概行交銀經安徽巡撫徐本奏準凡小户零星及大户尾欠錢糧納銀時恐致稱收折耗請令完納制錢每銀一分收錢十文連耗羡在內至乾隆元年又以直𨽻所屬州縣徴收錢糧多有以錢作銀民間交錢比納銀為數較重特諭凡錢糧在一錢以上者不必勒令交錢在一錢以下者仍照舊例銀錢聽其自便云又停各省鎮鼓鑄專歸京局更定錢制每文重一錢四分于錢幕鑄滿文户部奉上諭鼓鑄之法原以裕國便民今各省開爐太多鑄造不精以致姦民乘機盜鑄錢愈多而愈賤私錢公行官錢壅滯官民兩受其病欲使錢法無弊莫若鼓鑄歸一其各省鑄爐一概停止獨令京局鼓鑄務比舊錢體質更加濶厚每文重一錢四分磨鑢精工且兼用滿漢字俾私錢難于偽作一面鑄順治通寶四漢字一面鑄寶泉二滿字其見行之錢姑準暫用俟三年後止用新鑄制錢舊錢盡行銷毁臣等謹按是年為錢背鑄滿文之始尋工部局亦照式鑄寶源二滿字考錢之為制自古迄今遞加詳備荀悅謂夏殷以前錢無文周制則有文蓋以寶字繫錢自周景王之寶貨始以年號繫錢自宋孝武之孝建錢始以通寶字繫錢自唐之開元錢始但武德鑄開元錢原取回環可讀亦得稱開通錢其專稱通寶者實自唐之建中通寶始至錢背之繫以地名則自唐會昌時之開元錢始厥後或有繫以開鑄年數者或有繫以當五當十數者至本朝始定鑄在京局名及直省地名焉若夫錢之有面有背古錢皆一面有字一面無字昔人以無字處為面為陽有字處為背為隂謂如器物欵識必書于底其實不然考漢書稱錢之面背又作文與幕荀悅以幕為漫而無文韋昭曰幕錢背也則無文字處之為背自古已然惟是古錢有字之面但紀銖兩之輕重至宋孝建四銖錢兼紀年號於是兩面皆有字唐宋以來皆紀年號而不紀銖兩遂以通寶之文為面此則古今稱號之各隨其宜也定私鑄銅錢禁例和碩簡親王濟度等議定凡姦民私鑄為首及匠人擬斬監候為從及知情買使者擬絞監候總甲十家長知情不舉首者照為首例不知者杖一百徒三年告捕者給賞銀五十兩其賣錢之經紀鋪户有興販攙和私錢者杖一百流徙尚陽堡臣等謹按錢之禁例事屬刑制而其隨時輕重所以維持錢法故前考亦見錢幣門考私鑄原律為首及匠人絞候為從及知情買使者各減一等至是年更定其例十八年復申其禁視前例加嚴為首及匠人斬決家産入官為從及知情買使者絞決總甲十家長知情照為首例不知者枷一月仍擬杖徒興販攙和者枷一月仍擬杖流康熙七年定攙和在十文以上者仍照原例九文以下者擬枷杖免其流徙又定私鑄之鄰佑不論知情與否俱枷一月杖一百徒一年二十九年定攙和私錢者不論錢數多寡係旗人鞭八十係民杖八十免其枷示流徙三十六年定官船户夾帶私錢者擬杖流同船人知情不首者擬杖徒三十八年定攙和私錢者係旗人鞭一百係民杖一百各枷一月四十四年定私鑄之總甲十家長不知情者枷一月杖一百徒二年興販攙和者枷二月杖一百發雲貴川廣煙瘴少輕地方尋又令水陸要口查拏專事興販私錢之人照知情買使例絞決四十七年定私鑄之鄰佑與總甲十家長知情不首者俱擬斬決私行興販者亦分為首斬決為從絞決漕船鹽船夾帶運賣私錢者俱照斬決例雍正十一年定私鑄各犯將情由審明照強盜例分别法所難貸情有可原于疏內申明可原者改擬發遣十三年定拏獲私鑄其知情分利之同居父兄伯叔等減本犯罪一等雖分利而不知情者減二等父兄不能禁約者杖一百又定私鑄未成即被獲者杖一百流三千里其鄰佑人等知情不首者杖一百徒三年不知者杖八十乾隆五年定私鑄之房主鄰佑總甲十家長知情者照為從者絞決不知者係旗人鞭一百係民杖一百十五年改定私鑄為首及匠人皆擬斬候為從及知情買使者皆發遣為奴如在場止得受些微雇直及停工後貪其價賤偶為買使以及房主鄰佑總甲十家長知情不首者皆照為從罪減二等杖一百徒三年其房主人等並不知情但失於覺察者杖一百官船户夾帶私錢者杖一百徒二年同船人知情不首者杖八十二十三年定私鑄在十千以上及鑄非一次者秋審時俱入情實其數不及十千及畏罪中止者俱照情有可原發遣二十四年定私鑄未成之房主鄰佑人等知情不首者照已成之案減二等罪止杖八十徒二年其受雇之人亦如之互詳刑考定各官失察私鑄處分和碩簡親王等議定凡民間私鑄該管地方官知情者照為首例不知情及聽其興販攙和者以失覺察論在內五城坊官在外州縣衛所官失察每起降職一級掌印兵馬司知府直𨽻知州每二起降一級司道官每三起降一級同知通判吏目典史有緝捕之責者照掌印官例鹽運使照司道官例分司照知府例鹽場大使照典史例武職副將參將逰擊照司道官例都司守備千總照州縣官例如五城御史各撫按不行查究者一併議處至十八年更定失察之例凡五城坊官州縣衛所官每起降二級調用至三起革職掌印兵馬司知府直𨽻知州每起降一級調用至四起革職司道官二起降一級三起降二級四起降三級俱調用五起革職府州縣之緝捕佐二及鹽務武職官各按職掌照新定例處分尋復定五城御史各巡撫不察參者每起罰三月俸至四起五起罰一年俸六起以上降一級留任定攙和行使舊錢廢錢禁例户部會同刑部議定凡係旗人犯者鞭一百係民杖一百各枷示一月臣等謹按攙和舊錢廢錢之例至康熙十年更定係旗人鞭五十係民笞五十仍枷示旁人首告者舊錢廢錢入官制錢給賞首告之人十九年定仍照順治十四年例治罪互詳刑考十五年裁工部寶源局大使一人十七年復開各省鎮鼓鑄增置雲南省局定錢幕兼鑄地名滿漢文時定各局錢背分鑄地名江南江寧府局鑄寧字江西南昌府局鑄江字浙江杭州府局鑄浙字福建福州府局鑄福字湖廣武昌府局鑄昌字河南開封府局鑄河字山東濟南府局鑄東字山西太原府局鑄原字陜西西安府局鑄陜字密雲鎮局鑄密字薊鎮局鑄薊字宣府鎮局鑄宣字大同鎮局鑄同字臨清鎮局鑄臨字並增置雲南之雲南府局鑄雲字皆滿漢文各一滿文在左漢文在右每文俱重一錢四分惟京局之寶泉寶源字俱用滿文臣等謹按順治十年所鑄一釐錢幕漢字地名惟江南江寧作江字江西南昌作昌字湖廣武昌作武字餘俱與是年所鑄字同又定工部寶源局監督差滿漢司官各一人增設筆帖式一人皆一年期滿更代又議定工部與蕪湖龍江南新荆州四關及蘆政差分辦寶源局額銅工部疏言寶源局鼓鑄每年額需銅一百八十萬斤本部司員悉買自商販之手銅數太多轉得藉口難購應兼令蕪湖龍江南新荆州四關差及蘆政差動支嵗課銀辦銅解局定各差分辦九十萬斤部辦九十萬斤則採購較易可源源接鑄從之十八年議收毁舊鑄無一釐字制錢先是順治十年于錢背鑄一釐二字其舊行無一釐字錢暫從民便十四年復定錢文兼用滿字其舊錢俟三年後盡行銷毁至是以三年限滿户部議言見在各局滿漢文新錢鑄造尚少其一釐字錢暫令展限行使請先收買十年以前無一釐字舊錢每斤給直七分交局銷毁改鑄從之臣等謹按順治年間錢式屢經隨時更定有錢幕未鑄字者蓋太祖高皇帝始鑄天命錢一面有字一面無字太宗文皇帝天聰錢亦然前明時錢幕亦多不鑄字國初尚仍其制嗣後有鑄漢文戶工字及各省鎮地名一字於錢幕之上或於錢幕之右者皆順治十年以前之制自十年七月增鑄一釐字與户工及各省鎮一字左右分列十四年改定京局錢幕鑄二滿字十七年復開各省錢局令鑄本地方一字兼用滿漢文而十年以前之舊錢及十四年以前之一釐字錢迭經先後發價收買銷毁更鑄故流行者少至雍正元年始定各省局錢幕亦照京局之例以寶字為首次鑄本地方一字皆用滿文至今遵行蓋於錢面鑄年號以昭王制於錢幕鑄國書以示同文折衷盡善洵為萬世不刋之制云又減大同局爐座額數增入山西省城局山西巡撫白如梅疏言山西省城錢局關係太原平陽潞安汾州四府配給兵餉之用今僅設爐十座所鑄錢不敷搭放大同僅一府治設爐二十座錢法恐致壅滯應于大同留爐十座其十座增入省城作為二十座鼓鑄户部議如所請從之又議收買私錢及舊錢廢錢山東道御史余司仁疏言頃者禁止私鑄及明季之舊錢廢錢立法甚嚴但此等錢積聚民間者不可勝數今禁止攙和行使而未講求收買變通之方請於京師並直𨽻各省地方立法收買俾民無所行使則攙和者自息下部知之皇朝文獻通考卷十三
