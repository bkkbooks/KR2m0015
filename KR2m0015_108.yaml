至享殿安設恭進冊文曰慈恩㒺極報莫殫夫追崇厚徳難名號宜尊乎顯懿用表無前之羙以彰不匱之思中外咸孚典禮惟偹欽惟皇妣大行慈和皇太后淑慎柔嘉温恭慈惠飭躬静好流藹吉之徽音逮下雍和著肅雝之雅化内承皇考匡贊惟勤上奉重闈䖍恭匪懈眇躬纘緒方期申尊養之忱鸞馭升遐遽永結終天之慕仰惟盛徳宜薦鴻名載考舊章愽咨公議謹奉冊寳上尊諡曰孝康慈和莊懿恭惠崇天育聖皇后伏惟慈寧昭鑒彞典茂膺益𢎞佑啟之仁永衍邦家之慶謹告寳文曰孝康慈和莊懿恭惠崇天育聖皇后之寳九年五月丙辰朔恭奉孝康慈和莊懿恭惠崇天育聖章皇后神主升附太廟先是閏二月庚戌聖祖仁皇帝諭禮部慈和皇太后誕育朕躬未遂孝養思慕之忱每切于懐雖已上尊諡但今升附太廟配食皇考典禮闗係重大其應進諡號著議政王貝勒大臣九卿科道㑹同詳議具奏丁巳議政王等議上太祖髙皇帝皇后稱髙皇后太宗文皇帝皇后稱文皇后今慈和皇太后配祀世祖章皇帝前上孝康慈和莊懿恭惠崇天育聖尊諡亦宜加上尊諡為章皇后得㫖是是日聖祖仁皇帝御禮服恭捧孝康章皇后神牌行祗見列聖列后禮奉安於世祖章皇帝神位之右行大饗禮與順治十八年同十三年恭進孝康章皇后玉冊玉寳奉安太廟是日禮部工部捧設行禮臣等謹按恭進孝康章皇后冊十頁青玉修八寸九分廣四寸厚三分鐫字深二釐面底二頁鐫升降龍寳白玉方四寸一分厚一寸二分紐髙三寸方三寸九分二十七年十月乙邜恭奉冊寳上大行太皇太后尊諡曰孝莊仁宣誠憲恭懿翊天啟聖文皇后先是正月辛巳聖祖仁皇帝諭禮部大行太皇太后聖徳母儀昭示萬國昔奉我皇祖太宗文皇帝贊宣内政誕育我皇考世祖章皇帝顧復劬勞受無疆休大一統業暨朕踐阼方在冲齡仰荷我聖祖母訓誨恩勤以至成立晨昏依戀三十餘年方期洊享遐齡茂膺繁祉詎至適遭違豫奄忽上賔朕哀疚之深五中摧絶昊天㒺極報徳實難緬維厚澤深仁信足炳傳簡冊非薦隆號莫展哀誠宜恪遵彞憲恭上尊諡垂示無窮以慰朕尊親之意著内閣翰林院詹事府㑹同擬奏其應行典禮爾部詳察議奏於是諸臣恭擬尊諡二道進呈奉㫖應上太皇太后尊諡曰孝莊仁宣誠憲恭懿翊天啟聖文皇后又諭太皇太后升遐未久祭文内遽改稱尊諡朕心深為不忍應俟梓宫奉安昌瑞山陵始稱尊諡以祭時先恭奉冊寳於暫安奉殿是日聖祖仁皇帝親詣恭獻冊寳宣冊宣寳禮如儀冊文曰坤順承天懿徳肇興夫鴻業萃亨假廟隆稱永式於明禋將崇升祔之儀宜備顯揚之典欽惟皇祖妣大行太皇太后徽音集慶厚徳凝符同溈汭以鍾靈並洽陽而著範歸我太宗文皇帝當金璽來賔之日正琱戈啟土之年内治克襄帝國式廓格精誠於九廟化洽蘋蘩敷隂禮於六宫祥徴穜稑篤生世祖章皇帝永清四海本胎教之䖍恭協正三辰奉母儀之雍肅每紆睿照睠青原蔀屋之艱實沛洪仁頒紅粟太倉之賜歡騰扶杖惠溢歌衢爰逮𦕈躬益彰慈訓秉三十年之聖善克致太平溥億兆姓之和恒常開景運懿筐載績勤勞不替於重闈大練垂裳節儉每先於下土萬國共尊親之戴兩朝備孝養之隆夀考康寧福駢臻於箕範含𢎞光大徳莫罄於羲圗方承愛日之歡遽遘升遐之痛終天銜恤率土均哀深惟篤祜所由來永念發祥之有自爰諮輿論請命於天謹奉冊寳上尊諡曰孝莊仁宣誠憲恭懿翊天啟聖文皇后於戲周室展閟宫之祀禮載升歌漢廷表長樂之儀史傳新注伏冀慈靈可接陟降在兹必得其名垂休聲於琬琰克昌厥後流餘慶於球圗彤管長新瑶函永煥謹告寳文曰孝莊仁宣誠憲恭懿翊天啟聖文皇后之寶辛酉恭奉孝莊仁宣誠憲恭懿翊天啟聖文皇后神主升祔太廟是日大臣二人恭奉世祖章皇帝孝康章皇后神主避立於旁聖祖仁皇帝恭奉神主奉安於拜位恭代行祗見太祖髙皇帝孝慈髙皇后太宗文皇帝禮三跪九拜興恭奉神主奉安於孝端文皇后神位之次行一跪三拜禮興大臣二人恭請世祖章皇帝孝康章皇后神主奉安於拜位聖祖仁皇帝恭代行祗見孝莊文皇后禮三跪九拜興大臣二人奉安世祖章皇帝孝康章皇后神主於寳座一跪三叩退行大饗禮三十三年恭進孝莊文皇后玉冊玉寳奉安太廟臣等謹按恭進孝莊文皇后冊十頁青玉脩八寸九分廣四寸厚四分鐫字深二釐面底二頁鐫升降龍寳青玉方四寸四分厚一寸八分紐髙二寸六分脩四寸六分廣三寸五分五十七年三月辛酉恭奉冊寳上大行皇太后尊諡曰孝惠仁憲端懿純徳順天翊聖章皇后先是五十六年十二月己亥大學士馬齊嵩祝李光地蕭永藻王掞奏查康熙二年恭上慈和皇太后尊諡内閣㑹同翰林院擇二十四字分為兩條具奏奉㫖尊為孝康慈和莊懿恭惠崇天育聖今恭上大行皇太后尊諡臣等㑹同翰林院依例敬擇具奏得㫖此奏甚屬錯誤爾等恭瞻太廟奉先殿二位文皇后神主便知其誤矣庚子大學士等奏臣等遵㫖恭詣太廟謹瞻神位見孝端孝莊兩太皇太后並從太宗文皇帝廟號俱有文字臣等愚昩僅照康熙二年初上慈和皇太后尊諡舊檔僅擬尊諡字樣未照康熙九年奉㫖慈和皇太后從世祖章皇帝廟號升祔太廟之典未擬章皇后字樣甚屬錯誤因將所恭擬内填寫章皇后字樣具奏得㫖此事不比尋常但聲明錯誤則已該部嚴察具奏所擬尊諡亦未明晰朕記太皇太后徽號字甚多即就原徽號内擬字並未更改今通行改換恐有不合丙午大學士等奏恭查舊檔太皇太后徽號原有昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣𢎞靖二十字賔天後恭上尊諡即原字减十五字留五字添擬七字尊為孝莊仁宣誠憲恭懿翊天啟聖文皇后升祔太廟慈和皇太后徽號原有慈和二字後尊為孝康慈和莊懿恭惠崇天育聖皇后康熙九年升祔太廟增定章字大行皇太后徽號原有仁憲恪順誠惠純淑端禧十字今欽遵上諭照恭上太皇太后尊諡將原字内留五字添擬七字尊為孝惠仁憲端懿純徳順天翊聖章皇后又將原字内留四字添擬八字尊為孝惠仁憲莊定端純順天翊聖章皇后恭候皇上訓示得㫖前一條所擬是屆期大行皇太后儀仗全設皇子承祭如儀恭進冊文曰禮隆祔配將申假廟之誠義極顯揚特重崇親之典奉明禋而有恪熙鴻號以無窮欽惟皇妣大行皇太后儷天體順應地含章鍾渭涘之殊靈繼蜀山之盛軌歸我世祖章皇帝克襄内治每持敬慎之小心允協坤承實禀肅雝之令則訓掖庭以節儉躬曳練衣率嬪御以勤勞心親織室迨乎奉事太皇太后重闈櫛縰日問長信之安内殿羮湯時視大官之膳閱嵗月而㒺懈繄仁孝之夙成六宫被慈惠之恩感深聖善四海享和恒之福慶衍昇平展祀瑶齋事䖍修夫蘋藻流光玉牒化徧洽於睢麟自惟幼沖備䝉顧復追憶昭隆之徳茂著兩朝載懐尊養之忱聿周五紀謂遐齡之永鍚詎仙馭之遽升逮及無期哀摧至極緬思懿行欲宣述以何由式奉遺規竭形容而莫罄用諮羣議敬告三靈謹奉冊寳上尊諡曰孝惠仁憲端懿純徳順天翊聖章皇后於戲考閟宫之樂頌長發其祥嗣京室之徽音克昌厥後伏冀慈靈曲眷神貺斯慿典冊常新等球圖而並重隆名㒺極與日月以齊懸炳耀琅函輝華彤管謹告寳文曰孝惠仁憲端懿純徳順天翊聖章皇后之寳十二月己未恭奉孝惠仁憲端懿純徳順天翊聖章皇后神主升祔太廟先是十一月甲午大學士九卿等恭議請孝惠章皇后神牌入太廟奉先殿得㫖此議不合朕曾諭衆阿哥爾等同衆阿哥等㑹議具奏丙申諸皇子諸王大臣等議奏去嵗大事時臣等親奉諭㫖大學士等恭上皇太后尊諡將章字遺冩皇太后係朕嫡母日後神牌升祔太廟奉先殿應安奉於慈和皇太后神牌之上伏惟皇上至孝超邁千古凡典禮攸闗無不敬謹周詳兹恭請孝惠章皇后神牌應供在左孝康章皇后神牌應供在右請交與禮部改正得㫖是時聖祖仁皇帝聖體違和是日遣和碩誠親王允祉恭代行禮王公百官陪祀與親詣同太廟前殿致祭孝惠章皇后寳座設於世祖章皇帝寳座之次孝康章皇后寳座設於孝惠章皇后寳座之次至中殿安奉世祖章皇帝神位居中孝惠章皇后神位居左孝康章皇后神位居右均南嚮先奉神主行祗見列聖列后禮畢行大饗禮五十九年恭進孝惠章皇后玉冊玉寳奉安太廟臣等謹按恭進孝惠章皇后冊十頁青玉脩八寸七分廣三寸九分厚四分鐫字深二釐面底二頁鐫升降龍寳青玉方四寸二分厚一寸紐髙二寸九分廣三寸八分皇朝文獻通考卷一百八
