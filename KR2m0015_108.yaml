body:
  text: 欽定四庫全書皇朝文獻通考卷一百八宗廟考二太廟順治元年九月世祖章皇帝定鼎燕京立太廟端門左南嚮朱門丹壁覆以黄琉璃衛以崇垣大門三左右門各一㦸門五間崇臺石䦨中三門前後均三出陛中九級左右各七級門内外列㦸百有二十左右門各三間均一出陛各七級前殿十有一間重檐脊四下沉香柱正中三間飾金梁棟階三成繚以石䦨正南及左右凡五出陛一成四級二成五級三成中十有二級左右九級中殿九間同堂異室内奉列帝列后神龕均南嚮後界朱垣中三門左右各一門内為後殿制如中殿奉祧廟神龕均南嚮前殿兩廡各十有五間東為配饗諸王位西為配饗功臣位東廡前西廡南燎爐各一中殿後殿兩廡各五間藏祭器後殿東廡南燎爐一㦸門外東西井亭各一前跨石橋五翼以扶䦨橋南東為神庫西為神厨各五間廟門東南為宰牲亭井亭廟垣周二百九十一丈六尺西南太廟街門五間西北太廟右門三間均西嚮九月壬子恭奉太祖承天廣運聖徳神功肇紀立極仁孝武皇帝神主孝慈昭憲純徳貞順成天育聖武皇后神主大行皇帝神主奉安太廟是日遣固山額真宗室拜尹圖代祭禮部尚書覺羅郎球奉太祖武皇帝神主甲喇章京胡世布奉孝慈武皇后神主吏部尚書宗室鞏阿岱奉大行皇帝神主禮部侍郎藍拜理事官哈爾松噶捧二功臣牌位及太常寺官於内院齊集學士額色黒捧祝版至謹身殿授太常寺卿郎球等奉神主及功臣牌位依次而行太常寺官六員前導毎階一揖代祭官拜尹圗隨行至太廟門外由東中門入奉神主進前殿跪奉太祖武皇帝神主孝慈武皇后神主安正案南向大行皇帝神主安東側案西向畢一叩頭興導引官引出立階上代祭官之後藍拜等捧二功臣牌位進西廡殿内跪安直義公費英東牌位於左𢎞毅公額亦都牌位於右東向畢一叩頭興出立於階下贊禮官贊行四跪四叩頭禮畢贊引官贊行初獻禮太常寺官三員各捧一爵詣案前跪獻畢鞠躬退一跪一叩頭興各復位贊讀祝額色黒入殿内跪捧祝文讀畢跪捧祝版置於太祖神位前一叩頭退代祭官及捧主官行讀祝禮贊禮官贊行一跪一叩頭禮畢贊行亞獻禮太常寺官獻爵如初獻禮畢贊行終獻禮太常寺官獻爵亦如初獻禮畢各退二功臣位前亦各三獻爵畢贊禮官贊行四跪四叩頭禮階下各官亦照行禮畢贊焚祝額色黒捧祝詣焚祝所各官東向鞠躬階下各官亦鞠躬焚祝畢各官北向揖階下各官亦揖代祭官立階西側捧功臣牌位各官立階下西側導引官引奉太祖武皇帝孝慈武皇后大行皇帝神主官詣神位前行一跪一叩頭禮興各奉神主由殿内後門進至後殿跪安於神位上退出殿門外行一叩頭禮興導引官引至功臣廡前候代祭官齊出十月辛酉恭上大行寛温仁聖皇帝尊諡曰應天興國𢎞徳彰武寛温仁聖睿孝文皇帝廟號太宗前一日遣官祭告天地社稷是日遣固山額真譚泰等祭告太廟遣固山額真宗室拜尹圗祭告大行皇帝凡上前祭告尊諡皆二年七月甲子恭進太祖武皇帝孝慈武皇后太宗文皇帝玉冊玉寳奉安太廟先期太常寺官設案於太廟神位前是日禮部鴻臚寺官設案於武英殿内院官奉冊居左寶居右并祝文置各案上設綵亭於殿門外陪祭官太廟門外序立不陪祭官午門外序立上出武英殿恭閲冊寳祝文行一跪三拜禮畢西向立内院官奉冊寳授捧冊捧寳官安綵亭内恭送入太廟午門外官太廟門外官跪迎由太廟中門進至前殿奉安畢禮部尚書覺羅郎球大學士剛林學士伊圖進後殿一跪三叩興郎球太祖武皇帝神主伊圖奉孝慈武皇后神主剛林奉太宗文皇帝神主出安於前殿一跪三叩興贊引官引代祭官由右門進各官皆進序立典儀官贊樂舞生就位執事官各司其事贊禮官贊就位代祭官就位協律郎贊奏開平樂行迎神禮鳴賛官贊代祭官同各官行三跪九叩禮畢典儀官贊進冊贊引官引代祭官至香案前鳴贊官贊跪贊進冊蔣赫徳劉清泰恩格徳跪從案上捧冊以次進於代祭官代祭官受獻訖授内院大學士剛林祁充格學士伊圗跪接置於各案贊宣冊剛林祁充格伊圗各跪冊案前宣畢三叩贊進寳蔣赫徳劉清泰恩格徳跪從案上捧寳以次進於代祭官代祭官受獻訖授剛林祁充格伊圖跪接置於各案贊宣寳剛林祁充格伊圖各跪寳案前宣畢三叩賛禮官贊叩頭代祭官三叩贊復位代祭官復位贊行禮代祭官同各官行三跪九叩禮畢典儀官贊行初獻禮太祖神位前甲喇章京陳泰獻帛侍衛噶布喇穆成格獻酒太宗神位前侍衛巴泰獻帛侍衛穆理瑪獻酒協律郎贊奏夀平樂獻畢樂暫止賛禮官贊跪代祭官跪各官皆跪鳴贊官贊宣祝宣祝官一跪三叩捧祝文跪宣文曰維順治二年嵗次乙酉七月庚戌朔越十五日甲子孝孫嗣皇帝章皇帝世祖廟諱遣英俄爾岱代告於太祖承天廣運聖徳神功肇紀立極仁孝武皇帝孝慈昭憲純徳貞順成天育聖武皇后神位前曰前者宣揚功徳已加尊諡今恪遵典制造成玉冊玉寳敬獻几筵尚饗太宗文皇帝前祝文同宣畢贊禮官贊叩頭代祭官三叩宣祝官捧祝文跪進於神主案三叩典儀官贊行亞獻禮獻酒如前儀協律郎贊奏嘉平樂獻畢樂止典儀官贊行終獻禮獻酒復如前儀協律郎贊奏雍平樂獻畢樂止典儀官贊撤饌協律郎贊奏熈平樂撤畢樂止協律郎贊奏成平樂行送神禮鳴賛官贊代祭官及各官行三跪九叩頭禮禮畢樂止典儀官贊捧祝捧帛詣燎所樂奏捧祝捧帛官一跪三叩捧祝帛送燎所代祭官退立拜位東西向既過復拜位鳴賛官贊禮畢代祭官與各官出太祖武皇帝冊文曰雲雷初動經綸開草昧之天日月在躬光耀先照臨之域既靈承於後嗣宜丕著夫前猷洪惟我太祖承天廣運聖徳神功肇紀立極仁孝武皇帝博厚髙明聖神文武始則龍潛渤海藏九天九地之規繼而虎步金源恢百戰百克之勢三靈協助援鐘鼔而對天休萬帳來王傾醍醐而飲帝徳於是舊邦式廓天街望紫氣之祥新命誕敷黒水正真人之位豐年恒慶多黍多稌國士彚征如羆如虎披草萊而立祖廟始薦馨香掃荆棘而朝羣臣豈惟綿蕞用能使耿光大烈丕顯丕承厚俗淳風可久可大協昌期於嗣聖衍駿業而重光兹者神臯是宅庇及眇躬盛徳載揚念予烈祖乃鐫徽號永夀天球於戲寳玉函文寫貽謀之𢎞逺金縢啟幄知創業之艱難惟神在天歆兹無斁謹言寳文曰太祖承天廣運聖徳神功肇紀立極仁孝武皇帝之寳孝慈武皇后冊文曰壼教協黄裳應地兆安貞之吉徽音昭彤管俔天開長發之祥既慶靈源宜揚惠問欽惟皇祖妣孝慈昭憲純徳貞順成天育聖武皇后性成仁孝心秉塞淵肅雍在宫堯母儷元妃之徳祗承於帝邑姜㕘十亂之功華星朗耀於軒轅内則勤供於穜稑求賢卷耳載襄櫛風沐雨之思致孝蘋蘩不忘昧旦雞鳴之節是以流虹繞電篤生聖人誕凱育元門多才子用能贊助鴻圗造有東夏昭宣鳳徳逺被南邦維𦕈躬之追孝前人實聖善之宜孚中土聿新清廟爰述瑶函於戲𤣥鳥呈祥授昌期於百世閟宫啟頌洽嬪則於萬年翼我皇風昭哉嗣服謹言寳文曰孝慈昭憲純徳貞順成天育聖武皇后之寳太宗文皇帝冊文曰三才定位首出咸推聖人萬國來同配天實惟元后莫不令聞奕世昭明顯融洪惟皇考寛温仁聖皇帝道合乾坤功參化育綏文謨而揚武烈海域賔王𢎞義問以濟仁心華風載穆聲靈足以震九有尚謙讓而未遑勲業可以表百王猶開誠而盡下闗睢麟趾之意偕黄鉞而並揮巖築射鈎之賢望彤墀而交罄是以白狼槃木接踵來歌紫塞雞田開闗望幸克享天眷爰集鴻圖暨予眇躬誕膺丕緒惟見休於士女卜宅神臯覽陳錫於几楹推原盛徳集羣工之篤論合四海之歡心表號稱天垂統作極上尊諡曰應天興國𢎞徳彰武寛温仁聖睿孝文皇帝廟號太宗於戲七廟觀徳時欽右序之文明堂肇禋世述維清之典敬鐫寳冊用藉鴻休謹言寳文曰太宗應天興國𢎞徳彰武寛温仁聖睿孝文皇帝之寳臣等謹按恭進太祖武皇帝冊十頁白玉修八寸八分廣三寸九分厚四分鐫字深二釐面底二頁鐫升降龍寳白玉方四寸二分厚一寸五分紐髙二寸七分修四寸二分廣三寸五分孝慈武皇后冊十頁白玉修廣厚同鐫字深與底面二頁升降龍同寳白玉方同厚一寸七分紐髙二寸三分修同廣三寸三分太宗文皇帝冊十頁白玉修廣厚同鐫字深與面底二頁升降龍同寳白玉方同厚一寸六分紐髙二寸八分修四寸五分廣三寸四分五年四月癸酉以重修太廟遣官祗告恭奉神牌暫安後殿六月癸亥以太廟工成遣官祗告奉安神位於正殿十一月戊辰冬至追尊肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后恭奉神主奉安太廟是日世祖章皇帝親詣後殿奉安神位致祭如時享儀祝文曰維順治五年嵗次戊子十一月辛酉朔越八日戊辰孝孫嗣皇帝廟諱敢昭告曰受命一統之模道隆尊祖推祖自出之本義重格天惟世徳以作求當肇稱而上祀恭惟太祖以上四世始祖曾祖祖考鍾祥毓瑞長發純禧創業貽謀久膺篤祜謹尊始祖澤王為肇祖原皇帝始祖妣為原皇后曾祖慶王為興祖直皇帝曾祖妣為直皇后祖昌王為景祖翼皇帝祖妣為翼皇后考福王為顯祖宣皇帝妣為宣皇后伏惟神聖鑒此孝思謹告恭進肇祖原皇帝冊文曰維順治五年嵗次戊子十一月辛酉朔越八日戊辰孝孫嗣皇帝廟諱稽首頓首上言於皇祖澤王今天下一統大業已成皆由皇祖篤祜所致爰修典禮用殫孝思敬薦冊寳尊上諡號曰肇祖原皇帝以垂功徳於萬禩謹告興祖直皇帝景祖翼皇帝顯祖宣皇帝冊文同原皇后冊文曰維順治五年嵗次戊子十一月辛酉朔越八日戊辰孝孫嗣皇帝廟諱稽首頓首上言於皇祖妣今天下一統大業已成皆由祖妣贊勷肇祖原皇帝行善篤祜之所致也爰修典禮用殫孝思敬薦冊寳尊上諡號曰原皇后以垂懿徳於萬禩謹告直皇后翼皇后宣皇后冊文同寳文曰肇祖原皇帝之寳原皇后之寳興祖直皇帝之寳直皇后之寳景祖翼皇帝之寳翼皇后之寳顯祖宣皇帝之寳宣皇后之寳七年二月丁亥恭奉冊寳上大行皇太后尊諡曰孝端正敬仁懿荘敏輔天協聖文皇后恭進冊文曰孝子嗣皇帝廟諱稽首頓首上言壼闈著聖善之儀凝禧未艾典禮重徽懿之報偹物宜隆聿示來兹用光前美惟皇妣大行皇后安貞應地敬順承天佐先皇致治之功啟冲子纉承之業方竭誠於奉養忽抱痛於升遐爰考舊章博咨公議用申哀慕式表尊崇謹奉冊寳上尊諡曰孝端正敬仁懿莊敏輔天協聖文皇后薦顯號於几筵垂休有永昭鴻名於簡冊錫祜無疆謹告寳文曰孝端正敬仁懿莊敏輔天協聖文皇后之寳八年正月丁夘恭奉孝端正敬仁懿荘敏輔天協聖文皇后神主升附太廟前一日遣官祗告太廟是日世祖章皇帝親詣行禮先奉神主祗見太祖武皇帝孝慈武皇后太宗文皇帝世祖章皇帝恭代行三跪九拜禮興恭奉神主奉安於太宗文皇帝神位之次行一跪三拜禮畢行大饗禮如儀凡升祔皆前祗告九年二月己未恭進四祖考皇帝四祖妣皇后孝端文皇后玉冊玉寳奉安太廟臣等謹按恭進肇祖原皇帝冊十頁青玉修八寸八分廣四寸厚四分鐫字深二釐面底二頁鐫升降龍寳白玉方四寸二分厚二寸紐髙二寸六分修四寸廣三寸原皇后冊十頁青玉修八寸九分廣厚同鐫字深同面底同寳青玉方厚同紐髙二寸八分修同廣三寸三分興祖直皇帝冊十頁白玉修九寸廣厚同鐫字深同面底同寳白玉方厚同紐髙二寸七分修同廣三寸四分直皇后冊十頁青