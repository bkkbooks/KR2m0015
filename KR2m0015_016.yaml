body:
  text: 錢幣考四乾隆元年頒行乾隆通寶錢先是雍正十三年九月大學士等以皇上御極定於明年改元乾隆所有開鑄錢文應用乾隆通寶請令錢法衙門行知寶泉寶源二局改鑄尋於十月户工二部將鑄成錢式進呈至是頒行天下令各省局照式鼓鑄又更定辦解京局銅數並定江浙海關分辦洋銅之令署江蘇巡撫顧琮奏言京局銅斤見在滇洋兼辦請嗣後洋銅一項減少數十萬斤則東洋出産寬裕商船之返棹自速至各省承辦洋銅向係委員赴江浙海關採辦每年道府輪派隔省地方情形未悉每致招商不實查洋船出口收口俱由江蘇上海浙江寧波二海關查驗為辦銅扼要之地向委道員管理請即將該道加以兼管銅務職銜責令招商辦解洋銅庶無貽誤經户部議言前定五省辦洋銅二百七十七萬二千斤三省辦滇銅一百六十六萬三千二百斤共計四百四十三萬五千餘斤但兩局所鑄錢從前每文重一錢四分嗣後改輕二分每年只需銅三百三四十萬斤見今兩局尚有餘銅應如該撫所請減少額數每年以四百萬斤為率滇洋兩處各辦二百萬斤除湖北湖南廣東應辦銅數已留滇鑄錢解京外令滇省每年再解銅三十三萬六千八百斤交局以足二百萬斤之數其額解洋銅交與江蘇浙江管理海關道員承辦每處各辦一百萬斤將管關道員官銜內加監督某處海關兼辦銅務字樣換給關防至安徽江西福建三省即停其辦銅以歸畫一嗣後洋銅既歸江浙海關専辦以本省之官轄本省之商不惟呼應得靈即衆商之身家饒乏亦易於稽查應令該道擇其殷實並無掛缺者弔驗倭照委令承辦於洋船進口時所載銅斤若在二百萬斤之外並准將餘銅聽各商自行售賣以平民間銅價從之又停設銅色對牌户部議言解局銅斤從前原未設立銅牌嗣因八省分買時不能畫一辦理致滋奸商欺弊多雜低銅是以設銅牌磨對今既將八省之銅歸雲南江蘇浙江三處採辦所有原設銅牌即行停止令辦銅各省督撫嚴飭辦員務選足色淨銅交部仍令户工二局監收之官照依未設銅牌前秉公稱收倘有攙和低銅不堪鼓鑄者該堂官委員㑹同錢局監督及解官抽驗鎔化將辦員參處其虧折之銅仍令補解至爐頭稱手不得任意低昻違者究治從之又罷黃銅器皿之禁户部尚書海望奏言錢文為民間日用所需近年以來鼓鑄無缺價值昻貴建議者莫不多求禁銅之法而奉行不善易致弊竇多端夫銅器散布民間相習甚久一旦禁使勿用則其情有所不便往往遷延而不交交納而不盡緩之則互相觀望急之則百弊叢生是以展限之奏請屢聞收買之告竣無日胥吏借此需索刁民借此訛詐得賄則賣官法不得則入入罪搜括難盡用法不均其弊一也民隱既難上逹有司未必皆賢民間交納銅器或有侵蝕扣尅僅得半價者或有除去使費空手而歸者名為收銅實為勒取其弊二也此等銅質本極粗雜加之鏽壞一經錢局鎔化折耗甚多而工價不減在收買之時原費帑金所得不償所失於鼓鑄毫無所益其弊三也又況黃銅乃係紅銅白鉛搭配而成是以百萬斤之黃銅器皿其中即有紅銅五六十萬斤今禁用黃銅而不禁紅銅是較之未禁之先銅又多費而適以昻其價直速其私毁是故未禁黃銅之先白銅甚少既禁黃銅之後白銅甚多皆奸匠銷毁制錢攙藥煮白以成器皿其弊四也凡此四弊必當究其根源以求變通之計夫自古銅貴錢重則易私銷銅賤錢輕則滋私鑄是以錢文輕重必隨銅價之低昻而增減之上年世宗憲皇帝因私銷之弊飭九卿議減分數每文重一錢二分所以調劑夫銅貴錢重者成效自有可觀固已不必屑屑於禁銅之未務矣嗣後請弛銅禁凡民間買賣悉從其便祗於雲南江浙辦銅之處立官分職統計部用銅斤數目採辦如有餘銅任民販賣則鼓鑄自得充裕於國計民生均屬有益經九卿等遵㫖議定將收銅及禁銅之處悉行停止又增定雲南餉錢作銀之數奉上諭朕聞雲南兵餉有搭放錢文之處每制錢一千作餉銀一兩而兵丁領錢千文實不敷銀一兩之數未免用度拮据其應如何變通辦理以惠養滇省辨兵著雲南督撫㑹議具奏尋議定自乾隆二年為始每錢一千二百文作銀一兩配給又議令商民得自行出洋採銅先是以洋商虧空甚多已議將江蘇浙江兩海關應辦乾隆三年額銅暫停一年清釐積缺以杜移新掩舊之弊並將虧空各商所有辦銅之倭照分别查收存貯按其每張定給租價至是工部尚書來保奏言見在户工二局之銅經數十年積纍方得餘一嵗鼓鑄之用今雖停止採辦一年特權宜之計請乘停辦之年令江浙督撫出示遍諭有願販銅者官給倭照聽其出洋採取不必先發價銀俟銅船進口時該管海關道員酌量收買毋許扣尅抑勒於鼓鑄實為有益九卿等議如所請從之二年令江蘇浙江辦解滇銅雲南總督尹繼善奏言京局鼓鑄關係重大採辦洋銅弊纍甚深江浙洋商殷實者本少即停辦一年亦不能全清舊缺查滇省各銅厰較前甚為旺盛青龍金叉等厰除供省城臨安二局鼓鑄所餘之銅金叉厰成色原低不能解部應招商發賣其湯丹等厰每年可辦獲銅六七百萬餘斤除留供廣西府鼓鑄運京錢及解京銅三十三萬餘斤又撥添省城局並供黔蜀二省採辦外尚可存銅三百餘萬斤若悉行招商銷售公私夾雜易滋弊端況以內地餘銅售之商販而京局必須之銅又辦自外洋殊覺舍近而求逺莫若將江蘇浙江應辦乾隆三年額銅毋庸停辦委員賫價來滇照依厰價每百斤九兩二錢之數收買解京嗣後每至年底滇省核實餘銅數目即先期報部并咨江浙二省來滇採辦倘滇銅偶有不敷亦即預行咨明仍令海關採洋銅補足經九卿等議定令江浙委員照依二百萬斤之數赴滇分辦仍分上下兩運照原定限期解部又議將工部餘錢設官局出易以平錢直户部㑹同提督衙門奏言見在京城每紋銀一兩換大制錢八百文較之往時稍覺昻貴蓋因兑換之柄操於錢鋪之手而官不司其事故奸商得任意髙昻以圖厚利查前因米貴於京城內外設立米局委官監糶米價得平今錢價與米價均關民生日用事屬相同工部節慎庫見存餘錢八萬串請於京城內外開設官錢局十處東西南北四城共八處東華門西華門外各一處於內務府户部刑部提督衙門各派官二員吏兵二部各派官一員併委各衙門雜職等官十員分派各局辦理庶奸商知無利可圖自必將囤積錢文各行出賣錢價可以漸平俟試行有成效後即酌量奏請停止從之三年定江浙應辦京運額銅歸雲南辦解直隸總督李衛奏言滇銅旺盛江蘇浙江現已停辦洋銅但若仍令委官前往採運萬里長途呼應不靈必致輾轉貽誤不若竟令雲南管厰大員辦理委官押運至京較為便益經九卿等議定江浙應辦銅二百萬斤自乾隆四年為始即交滇省辦運如官員差委不敷交吏部於候補候選人員內揀選發往委用其洋銅一項仍聽有力之商自攜資本出洋販運即令江浙二省公平收買以備就近開鑄之用又議停雲南廣西府局鑄運京錢令即以原銅解京户部議言從前停止湖北湖南廣東辦銅令雲南鑄錢運京原因滇省就近礦厰鼓鑄便易其起運錢文由四川之永寧縣即可從水路直達漢口附搭漕船解京沿途水腳又多節省是以定議舉行嗣因滇省附近四川地方無可建局遂定於廣西府開爐即由廣西府城陸運至府屬板蚌地方下船抵粵西之百色中間山川修阻水陸艱難牛馬舟船需用既多窮鄉僻壤雇覔不易較之自永寧直達漢口已屬逈别且因漕船不便搭解復令楚省撥站船及另募民船應用一切水腳費繁不如將銅斤直解京局供鑄更為便益請以乾隆四年三月為始停止廣西局鼓鑄即令雲南督撫照依原定一百六十六萬三千二百斤按年運解至京從之又議定雲南運銅條例時以停鑄運京錢定四百萬銅斤盡歸滇省辦解雲南巡撫張允隨將起運事宜分别條款具奏經大學士等議定一銅斤起程宜分八運也每年額銅應以五十萬斤為一運委滇省現任府佐或州縣官一員為正運雜職官一員為協運計銅四百萬斤需府佐州縣八員雜職八員一銅斤出厰宜分兩路也辦運京局俱係湯丹等厰銅産在深山由厰運至水次計陸路約有二十三站查自厰至東川山路﨑嶇難於多運而威寧以下又當滇黔蜀三省衝衢不能多雇䭾腳今應將銅斤分為兩路各二百萬斤半自厰由尋甸經貴州之威寧轉運至永寧半自厰由東川經昭通鎮雄轉運至永寧然後從水路接運到京一耗銅宜核定也湯丹厰銅多係九五成色應於每百斤外加耗銅八斤一併交納永為定例一餘銅宜備給也自滇至京程途萬里水陸搬運凡磕損失落在所不免應於正額百斤之外帶餘銅三斤交納之時正額缺少以此補足如有餘剩即作正銅交部歸於帶運數內報銷一運腳之雇覔宜各定責成也自威寧以下即非滇省所轄換馬換船處領運官勢難兼顧且以滇省之員雇外省之腳必致行户居竒髙昻價直嗣後令雲南巡撫於銅斤起運之前即預行咨明沿途督撫遴選幹員督同該處地方官俟滇銅一到即協同領運官雇募船馬催趲前進如有遲誤分别查參所需腳價仍聽雲南領運官給發報銷至張家灣地方為銅斤起運之所應設立銅房一所滇省預委駐府佐或州縣一員雜職一員總管稱收轉運至京交局再設監督一員由各部郎中員外郎內揀派駐劄張家灣専司彈壓稽查銅斤一到監督同轉運京局之員給發領運官回文即將運到銅斤數目先行報部查核一沿途之保護宜先定章程也銅斤經過地方文武各官均有巡防之責應行令各督撫飭令員辨實力防護催趲前進如在瞿塘三峽及江湖黃河等處偶遇風濤沉失地方官選撥兵役協同打撈實係無從打撈者出具保結題請豁免若長運官役有沿途盜賣等弊亦令該地方官嚴行查察報明該省督撫題參論罪一辦員之養廉宜為酌給也查湯丹等厰收買稱發銅斤向係糧道管理今自厰起運凡雇備䭾腳仍照舊責成料理其本任養廉已敷支用外其由厰至尋甸換車轉運應委尋甸州協同運員辦理由厰至東川換馬轉運應委東川府協同運員辦理各府州養廉僅敷本任之用應酌行添給至長運之府佐或州縣官每月給養廉銀六十兩雜費二十兩雜職官每月給養廉銀三十兩雜費十五兩其在漢口儀徵等處均須換船凡一應打包換簍搬運過載之費令運官按日登記回滇之時據實造報至委駐張家灣轉運之員往來京師需費頗多府佐或州縣一員每年應給銀二千兩雜職一員每年給銀六百兩監督一員與滇省委駐之員相等每年亦給銀二千兩統於運銅案內報銷一辦銅之工本宜為協濟也湯丹等厰出銅甚多每百斤需價銀九兩二錢每年約需工本厰費等項銀五六十萬兩其中撥運京銅四百餘萬斤又約需腳價及官役盤費銀十餘萬兩應令按年具題就近撥給銀一百萬兩存貯司庫陸續動用報銷如有餘剩留作下年之用又令雲南於正額之外加運銅斤户部奏言滇省解部銅斤僅敷本年鼓鑄之用並無多餘存貯查湯丹等厰近更旺盛每年可辦獲銅八九百萬斤除辦運京銅四百餘萬加以本省及黔蜀協鑄并賣給商民共用銅不過五六百萬斤此外餘剩尚多應乘目下加旺之時於正額之外令該省嵗增辦百餘萬斤運赴京局尋議定每年添辦銅一百七十萬四千斤仍由尋甸東川兩路分運照例每百斤加耗銅八斤仍帶餘銅三斤備用分委解銅之正運協運各官搭解臣等謹按滇省辦正運銅四百萬斤連耗銅三十二萬斤內解寶泉局二百八十八萬斤解寶源局一百四十四萬斤辦加運銅一百七十萬四千斤連耗銅十三萬六千三百二十斤內解寶泉局一百二十二萬六千八百八十斤解寶源局六十一萬三千四百四十斤嗣後嵗為定額又定雲南運銅限期户部議定從前江浙承辦洋銅自起運之後限以半年到京今雲南道里較逺應加展三月限以九月到京每運挨次計算如有逾限仍將領解官照舊例議處又增四川寶川局爐座四川巡撫碩色奏言寶川局開鑄以來兵民稱便但出錢無多配支兵餉尚不及一成之數近聞滇省産銅甚多請添買滇銅配辦黔鉛增爐七座共為十五座每年用銅鉛六十萬斤鑄錢七萬二千八百串除支給爐匠工價等項外實存六萬二千二百串有竒增搭兵餉下部知之至十年奏定省城滿漢兵餉以銀九錢一配給其離省各營兵餉除重慶鎮中左右三營及所轄之黔彭忠州綏寧三營并䕫州協左右及巫山梁萬四營暨川北鎮所轄之太平營以領錢不便停止搭錢外其餘無論營汛之逺近概以每銀百兩搭錢八串為例各官養廉仍照舊例配給停山東寶濟局鼓鑄四年令寶泉寶源二局爐頭工料錢改給銀兩工部侍郎韓光基奏言寶泉寶源兩局額鑄錢各四十一卯寶泉每年應給爐頭工料錢九萬串有竒寶源局半之共需十三萬餘串是經年鼓鑄之勞錢未出局已於爐頭項下耗去十分之二而有餘爐頭領出錢文非如兵民可以流通蓋兵民勢處於散爐頭勢處於聚兩局爐頭名為七十五人多係朋充實不過十數家以十數家之人而嵗擁十數萬串之錢宜其囤積居竒隱操市價之贏縮也且局中所需工料二項所謂料者不過煤與罐而已民間買賣價至一二十兩以上概不用錢何況兩局每年所用煤罐盈千纍萬從未見有以錢交易者至于工匠一項凡各匠在局日用俱係爐頭於支領項下代為買備按卯扣算所餘工價仍係每錢一千折銀一兩散給可見工料二者皆可不用錢文以徒飽爐頭之私槖也嗣後兩局鑄錢請盡數歸庫每月加增成數支放兵餉其爐頭應領工料每錢一千給銀一兩於四季由户部發兩局監督按數分給如此則兵民俱受流通之利而錢價亦可漸平下部知之又增貴州寶黔局爐座貴州總督張廣泗奏言寶黔局開鑄以來錢源流通見在增改營制添設官兵每月關支餉銀俱應以錢文搭放鼓鑄之數尚覺不敷請增爐十座共為二十座所需鉛斤本省各厰所出除運解京局及鼓鑄外尚多積貯取用甚便惟銅斤一項雖有格得八地二銅厰及新開之銅川厰出産尚不敷用每有藉於滇銅仍應按額向滇省銅厰添買每年共用銅鉛八十五萬六千八百斤鑄錢十萬三千九百五十八串三百文有竒除去工價等項實存八萬九千七百七十三串有竒增搭兵餉戶部議如所請從之尋復奏定威寧鎮標及大定黔西平逺三協水城畢赤二營兵餉核定配搭數目就近赴本局支領近省地方兵餉及官役俸工各官養廉令畢節局解錢至省城配給安順提標及安籠鎮標兵餉令解錢至安順府庫配給五年定改鑄青錢浙江布政使張若震奏言錢價之貴實由私毁欲清其弊當絶其源訪之舊時爐匠咸云配合銅鉛加入㸃錫即成青錢設有銷毁但可改造樂器難作小件民間無利可圖隨令户部試鑄每紅銅五十斤配合白鉛四十一斤八兩黑鉛六斤八兩再加㸃錫二斤共為百斤即鑄成青錢以所鑄錢復投爐內鎔成銅斤錘擊即碎不能打造器皿猶恐不肖奸民將鉛錫提出取銅獲利復用接紅銅爐座鎔試每大錢四串加火耗銀一兩有竒分得紅銅五斤八兩止值銅價銀一兩六錢較之原用工本虧折甚多經大學士九卿議定鼓鑄錢文専為便民利用既可永杜私銷雖工本稍有加增自應酌量變通嗣後户工二局應照式鑄造青錢與見在黃錢相兼行使并行令開局各省一體遵照改鑄臣等謹按隋志稱現用五銖錢皆須和以錫鑞唐書稱為白錢以其和錫而色白也宋時永平監鑄錢用銅鉛百萬餘斤加錫十餘萬斤明時每黃銅一斤加錫二兩後每百斤或加錫十斤或加錫六斤十三兩不等本朝於是年始加錫配鑄謂之青錢舊時未用錫者謂之黃錢至於明代鑄法尚有松香黃蠟硫黃稻草或用桐油瀝青焰硝磁末牛蹄等項其後迭經減革至國初已一併裁去云又定貴州兼運黑鉛廣東辦解㸃錫户部議定兩局所需黑鉛應定額為五十萬斤令貴州於鉛厰收買起運將應解白鉛每年減辦五十萬斤所需㸃錫定額為十五萬斤令廣東辦運均於乾隆六年為始如額解部供鑄又開福建鼓鑄局先是福建於乾隆四年以臺灣一郡錢貴殊常該處向用小錢每錢三文抵內地大制錢二文之用從前每畨銀一兩易小錢一千五百文近止易八百餘文兵民交困議將收存黃銅器皿八萬餘斤先於省城開鑄錢萬餘串儘數運往臺地搭放兵丁月餉其福建內地辦銅鼓鑄之處另行籌議至是以閩省內地錢價日昻巡撫王士任奏請採買滇銅二十萬斤照鼓鑄青錢之例添辦白鉛十六萬六千斤黑鉛二萬六千斤㸃錫八千斤合成四十萬斤開局於省城福州府設爐八座錢幕滿文鑄寶福二字每年二十四卯鑄青錢四萬八千五百三十三串三百文有竒除去工價等項配給兵餉先動帑銀五萬兩委員赴滇辦銅應用如有洋銅進口仍酌量官買接鑄户部議如所請從之臣等謹按嗣後寶福局每年買雲南金叉厰銅並收商販洋銅配鑄其所需鉛錫由湖廣漢口收買尋以金叉銅多有折耗議於十分內用滇銅四分洋銅六分後又以者囊厰銅與金叉厰銅對搭分買金叉厰銅每百斤價銀九兩者囊厰銅每百斤價銀十一兩又議定江蘇浙江收買洋銅價直江蘇巡撫張渠奏言從前九卿議定凡洋商自行辦回之銅即令江浙二省酌量定價收買開鑄見今洋銅市價每百斤約需紋銀二十兩與部定價每百斤給銀十四兩五錢者多寡懸殊但舊時所定官價原係預年發帑令辦商置貨出洋交易已有餘利是以不致虧乏若收各商自販之銅仍照前價未免有虧商本查從前官辦洋銅原價之外尚有解京水腳飯食銀三兩今擬酌中定價照十七兩五錢之數收買庶可源源接濟於公私兩有禆益經大學士九卿㑹議准其增價其浙江省亦一例給發尋復定凡洋銅進口以五分聽商自行售賣外其餘五分江浙二省對半官收有商人情願販銅者廣為設法召募令其出洋採辦又開江蘇寶蘇局鼓鑄江蘇自雍正十年停鑄之後於乾隆元年以續收存黃銅器皿復請開局二年即行停止至是總督郝玉麟奏言江省錢價日昻若待商人自辦之銅收買供鑄恐不能如期應用請先動帑銀十萬兩委員採買滇銅復開寶蘇局設爐十六座每年開鑄二十八卯用銅四十六萬八百斤配買漢口鉛錫合成九十二萬一千六百斤鑄青錢十一萬一千六百九十九串四百文有竒除去工價等項配給兵餉俟有商辦洋銅回棹即行發價官收以供接鑄户部議如所請從之尋復奏定通省兵餉皆以一成錢配給仍以所餘錢運送安徽藩庫搭放兵丁月餉臣等謹按嗣後寶蘇局每年皆係收買洋銅偶有不敷採滇銅添補至十年以後復以官商領帑分交之洋銅協濟配鑄偶有不敷採川銅添補又增雲南省城及臨安府局爐座雲南總督慶復奏言滇省錢文因需用者衆漸覺昻貴每年額鑄除撥運粵西錢外存留本省者止八萬二千四百餘串見在礦産旺盛請於省城局增爐十座共為三十五座臨安府局增爐五座共為十六座省城局向用附近各小厰雜銅並配用湯丹厰銅臨安局向用金叉者囊二厰銅並配用湯丹厰銅應如數添撥嵗可多鑄青錢六萬餘串其省城督標臨元鎮標等營官兵俸餉從前以二成錢給發者請照驛堡工食之例改為銀七錢三搭放庶流通既廣錢價日平户部議如所請從之至十五年以二局錢文搭放三成月餉之外尚有餘剩復議以銀錢各半配給俟積錢疏通完日仍照銀七錢三之例又令廣東開採礦錫解京署廣東巡撫王謨奏言粵東承辦京局㸃錫但本地錫山久經封閉外洋夷商販來之錫多少無定多則價平少則價昻見在各省局多赴粵東購買恐洋商藉以居竒漸至騰貴查惠州府屬之歸善博羅永安河源等縣皆有錫礦請招商開採每獲錫百斤抽課二十斤交官起解再加抽十斤以充折耗及在厰雜費餘錫聽厰民自行銷售以為工本如抽課不敷額運之數仍照市價收買餘錫配解倘課有盈餘亦儘數解部户部議如所請從之至六年以課錫不敷復議將餘錫每百斤給價銀九兩收買八年以厰民採錫甚艱工本不足仍照原議餘錫聽其自賣並將廣州韶州肇慶等府屬産錫山場各召商試採以備移衰就旺十年以後定收買厰錫每百斤照洋錫之例價銀十三兩五錢其自廣東運京每百斤給水腳銀一兩八錢七分嵗以為例又定雲南鼓鑄青錢配用版錫户部議定改鑄青錢需用㸃錫而㸃錫産自廣東自滇至粵採辦不易雲南䝉自縣之個舊厰産有版錫應准其就近收買配搭鼓鑄臣等謹按雲南版錫每百斤加耗錫九斤定厰價銀一兩九錢二分七釐嗣後寶黔局寶川局所需額錫亦令於雲南採買供鑄又更定雲南運銅之例户部議定滇省解銅原分八運每運委正運官一人協運官一人今應酌量變通每府佐或州縣官一人領銅五十萬斤每雜職官二人領銅五十萬斤先後分解至從前運員即在尋甸東川領銅雇覔車馬各行户每多催趲不前有誤限期實不如専責地方官雇覔為便嗣後銅斤自厰分運其尋甸一路委令尋甸州為承運官自尋甸用車運至貴州之威寧預先委員駐劄威寧雇腳轉運至永寧水次其東川一路委令東川府為承運官自東川運至魯甸自魯甸運至奎鄉即令昭通府鎮雄州為承運官並令魯甸通判奎鄉州同協同辦理雇腳轉運至永寧水次至解京之正運協運官竟令其赴永寧領銅由水路接運按限交納遲誤者分别交部議處其加運銅亦照正額之例分為四運每四十二萬六千斤為一運委員起解又復開浙江寶浙局鼓鑄先是四年閩浙總督德沛以浙省停鑄之後錢文缺少請動帑銀十萬兩委員赴滇採買銅斤陸續運浙鼓鑄至是復以收買商辦洋銅並將從前承辦未經解京之洋銅截留在浙巡撫盧焯奏請復開寶浙局設爐十座每年開鑄三十六卯用銅五十三萬斤加買漢口鉛錫合成一百六萬斤鑄青錢十二萬八千六百十三串三百文有竒除去工價等項配給兵餉户部議如所請從之臣等謹按嗣後寶浙局每年亦係洋銅滇銅兼買配鑄洋銅係江蘇額商出洋採辦浙省照例對半分買所用滇銅由金叉厰採買至二十一年以後以金叉厰銅成色甚低議以大興厰銅對搭分買尋滇省以大興厰銅添撥京運改為大銅金叉二厰對搭二十七年又以大銅厰出銅不敷仍全撥金叉厰銅二十八年復撥義都厰銅一半配買更定寶泉寶源二局淘洗餘銅之例先是乾隆三年議定京局連年鼓鑄積存銅渣不拘工匠鋪户及民人盡許赴局買出淘洗燒鍊聽其自行售賣至是户工二部奏定所有銅渣即令兩局爐頭隨時淘洗封貯各厰俟銅足敷一卯飭令添鑄其淘洗工價每百斤給銀四兩尋復定每至年終將淘洗所得餘銅之數清查奏明次年即行附卯添鑄錢文六年復開雲南東川府局鼓鑄雲南總督慶復奏言滇省開濬東川府屬地方之金沙江直通四川河道見在將上下游大小八十三灘估勘疏鑿匠役工食在在需錢查東川府附近湯丹等銅厰前以運陜錢曽經鼓鑄旋即議停請復行開局設爐二十座每年開鑄三十六卯共用正額帶鑄外耗銅鉛錫七十三萬四千四百斤鑄青錢八萬九千七百七十三串七百文有竒除去工價等項以為給發金沙江匠夫價直之用户部議如所請從之至八年以江工將次告竣需錢無多復奏定昭通一鎮及鎮雄尋霑東川三營皆係新闢夷疆制錢流通尚少將該處官兵俸餉馬乾等項以銀七錢三配給十一年復因東川局有積存錢文議以銀錢各半配給又更定寶泉寶源二局工料分給銀錢之例先是令錢局爐頭工料俱給銀兩嗣因匠役食用不敷經户工二部奏准工匠價酌給錢文六年六月以匠役首告爐頭案內降㫖仍俱給銀兩至是復以工價不足將誤鼓鑄奉諭從前改發銀兩中有不敷之處錢法堂官妥議尋奏覆仍照原議料價應給銀兩外工價給發錢文爐頭按卯領錢仍照市價易銀散給各匠役永逺遵行寶泉局每卯給料價銀九百七十四兩四錢工價錢一千一百七十三串八百文寶源局以半給算料價仍按季支領各項工價從前每季給發一次者並按月支給從之臣等謹按寶泉局每一卯用滇銅五萬一千四百二十八斤九兩一錢四分用白鉛四萬二千六百八十五斤十一兩四錢二分用黑鉛六千六百八十五斤十一兩四錢二分用㸃錫二千五十七斤二兩二錢八分鑄錢一萬二千四百九十八串除工價外得錢一萬一千三百二十四串二百文寶源局半之每爐額設爐頭一人其所需工價有八行匠役曰看火匠曰翻沙匠曰刷灰匠曰雜作匠曰銼邊匠曰滚邊匠曰磨錢匠曰洗眼匠例給錢文所需料價曰煤曰罐子曰黃沙曰木炭曰鹽曰串繩又有爐頭銀紅爐匠頭銀及自局解部車腳俱例給銀兩凡鑄錢之法先將淨銅鏨鑿成重二錢三分者曰祖錢隨鑄造重一錢六七分不等者曰母錢然後印鑄制錢每遇更定錢制例先將錢式進呈其直省開局之始亦例由户局先鑄祖錢母錢及制錢各一文頒發各省令照式鼓鑄云復開湖南寶南局鼓鑄湖南巡撫許容奏言長沙一帶多使小錢不能驟禁亟須鼓鑄大錢以便民用因咨商滇省知有金叉厰銅可以賣給請動帑銀委員採運回省復開寶南局設爐五座每年開鑄二十四卯用銅鉛錫十九萬六千二百斤鑄青錢二萬四千串除去工價等項實存二萬一千九十四串八百文配給兵餉所需鉛錫照時價赴漢口購買至湖南各屬山礦現議試採俟將來旺盛之時就近撥用户部議如所請從之尋奏定各營兵餉以每銀百兩搭錢五串為例每年尚有餘錢於省城設立官局照依市價酌減出易七年令寶泉寶源二局每年各開鑄六十一卯户工二部議定雲南現有加運銅斤應於京局每年各加二十卯開鑄寶泉局嵗添錢二十二萬六千四百八十四串寶源局嵗添錢十一萬三千二百四十二串以備增搭兵餉如遇閏加鑄四卯增定貴州辦白鉛黑鉛廣東辦㸃錫額數户部議定京局現在加卯鼓鑄每年應令貴州加運白鉛一百二十五萬斤共為四百四十一萬斤內解户部二百九十四萬斤解工部一百四十七萬斤加運黑鉛二十萬五百七十一斤共為七十萬五百七十一斤內解户部四十六萬七千四十七斤有竒解工部二十三萬三千五百二十三斤有竒令廣東加運㸃錫六萬一千七百十三斤共為二十一萬一千七百十三斤內解户部十四萬一千一百四十二斤解工部七萬五百七十一斤又開廣西鼓鑄局兩廣總督慶復奏言粵西久未開鑄惟賴滇省運錢以濟兵民之需查本省恭城縣之回頭山厰及懷集縣之響水厰河池州之將軍山厰嵗約共産銅十餘萬斤向係變價充餉請即配買鉛錫以供鼓鑄開局於省城桂林府設爐十座錢幕滿文鑄寶桂二字每年開鑄三十六卯用銅鉛錫二十一萬六千斤再加耗二萬一千三百餘斤鑄青錢二萬八千八百串其各銅厰若用心調劑尚可較前旺盛偶有不敷赴滇採買添補所需鉛錫亦相度開厰以資接濟鑄出錢文除去工價等項合之滇錢一體配給兵餉役食户部議如所請從之臣等謹按廣西自雍正七年開採礦銅奏定加二抽課餘銅每百斤以價銀六兩八錢收買至乾隆三年以厰民無利辦銅日絀每百斤加至八兩三錢八年又加至九兩二錢九年復以工本仍舊不敷議改為三七抽課餘銅聽商人照市價自行售賣十一年以三七抽課之例試行無效復改二八抽課餘銅每百斤增價銀為十三兩並定為一半官收一半聽其通商俾獲有餘利以為資本其鼓鑄所需多採滇銅配用又增定雲南運銅陸路腳價户部議定雲南辦運京局正耗銅及餘銅共六百三十三萬一千四百四十斤分兩路運至永寧向係陸路每百斤按每站給腳價銀八分五釐以及一錢三釐不等現在馬匹稀少食物昻貴應准其每站以一錢二分九釐二毫之數報銷又移銅房於通州令坐糧㕔兼管銅務先是張家灣設立銅房每銅船到灣監督與雲南委駐之轉運官按數稱收一面給發回批領運官即回滇報銷一面自張家灣轉運至京局至是以張家灣地方湫隘車輛稀少且自灣起岸至京計程六十餘里道路低窪易于阻滯户部議定將銅房移設通州令坐糧㕔兼管銅務嗣後滇省徑具批解局銅斤抵通州交坐糧㕔起運至大通橋由大通橋監督接運至京並令領運官自行管押赴局交收倘有短少亦令運官添補其由部派往駐劄張家灣監督一員即行停派雲南原委之轉運官亦裁去一員止留雜職一員移駐通州協理投掣文批之事至二十六年復議銅斤至京既有坐糧㕔及大通橋監督為之轉運且領運官既押銅至局則一應文批自應由運官辦理無庸更委一員承辦令雲南將轉運之雜職官一併撤回又定銅斤自通州運局限期並預行撥解車價之例户部奏言銅斤到通交坐糧㕔由五閘運至東便門外令大通橋監督用車運局統計應定限兩月全數進局間值漕糧同時並到及隂雨泥濘實在不能依限到局即令坐糧㕔及大通橋監督詳報倉場侍郎查明咨部展限至銅斤自滇至通一應水陸腳費係給發領運官隨帶應用其自大通橋運局車價銀應令雲南預行撥解坐糧㕔存貯以待臨期按運給發從之又開江西寶昌局鼓鑄先是巡撫陳宏謀奏言江西錢文最雜所用俱係小廣錢又攙和私鑄之砂錢其價竟與大錢相等若即行禁止又恐官錢未充民用不便惟有速開鼓鑄但本地向不産銅採買滇銅難以按期而至請將滇省解京銅內於船過九江時截留五十餘萬斤先濟急需餘俟次第籌辦得㫖銅斤運京從無外省截留之例但念江西錢文太少錢價太昻准如數截留濟用他省不得援以為例至是奏請以所留滇銅配買漢口鉛錫復開寶昌局設爐六座每年開鑄二十四卯用銅鉛錫三十四萬三千六百斤鑄青錢四萬一千九百三十二串八百文除去工價等項配給兵餉户部議如所請從之尋復奏定江西錢法與他省不同十三府中惟附近省城各屬向來不用大錢其餘贛州等各府或近閩粵或近楚湘制錢尚易流通價直亦不甚貴請自省城撫鎮兩標營兵餉每銀百兩搭錢十串外其餘暫緩配給以所餘錢按照工本酌定官價發省城及各屬缺錢地方鋪戶源源出易以便民用其見用之小廣錢暫准其八折行使以漸而減俟制錢充裕減至每小廣錢二文作大錢一文而止至剪邊及私鑄砂板等錢即行禁革八年增貴州辦黑鉛價直户部議定黔省所出黑鉛取給於柞子一厰從前於抽課之外餘鉛每百斤給價銀一兩二錢今礦砂漸薄工本較重應准其增價每百斤以一兩五錢收買解京又定私鑄鉛錢禁例户部㑹同刑部議定凡私鑄鉛錢為首及匠人皆擬絞監候為從及知情買使者各減一等里長知情不舉首者杖一百不知者不坐房主鄰佑知而不首者杖八十徒二年至九年更定私鑄不及十千者發雲貴兩廣極邊烟瘴充軍二十五年復定夥衆開鑄至十千以上者總甲十家長及房主鄰佑俱擬杖徒互詳刑考又更定雲南承辦正運加運額銅分為六運户部議定滇省辦解京局正額銅斤向定為八運今應合為四運每運委正運官一人協運官一人共領正銅一百萬斤及耗銅八萬斤餘銅三萬斤一同起解水腳雜費照數支發其搬運出厰以九十日為一運每年均分四運起程至加運銅斤向定為四運今亦應合為二運每運委雜職官二人共領正銅八十五萬二千斤及耗銅六萬八千一百六十斤餘銅二萬五千五百六十斤一同起解又開湖北寶武局鼓鑄先是五年湖北巡撫張渠以楚北為水陸通衢商賈雲集需錢最廣而各屬行使多係輕薄小錢相沿已久請採買滇銅以供鼓鑄至是辦回金叉厰銅巡撫晏斯盛奏請復開寶武局設爐十五座每年開鑄三十六卯用銅鉛錫六十萬斤鑄青錢七萬二千八百串除去工價等項配給兵餉嗣後所需額銅陸續委員赴滇辦運其鉛錫等項皆聚於漢口鎮可以隨時購買户部議如所請從之至九年以金叉厰銅成色不足復採買湯丹厰銅髙低對搭於每百斤內以湯丹銅三十八斤金叉銅六十二斤配鑄又增定江南餉錢作銀之數奉上諭兵餉有搭放錢文之例江南設局鼓鑄核計成本用銀一兩鑄出錢八百九十六文是以題明每銀一兩止折給餉錢八百八十文餘錢十六文充作錢局公費及運送餉錢之水腳等項朕思兵丁月餉僅足以敷日用若搭錢又行扣除則所得減少著將江南省搭放餉銀自甲子年為始仍照定例每銀一兩給錢一千文其錢局公費及運錢水腳准動公項報銷至見在鼓鑄各省如有折扣搭給者亦一體加恩照江南之例給發又開雲南大理府局鼓鑄雲南總督張允隨奏言大理府局自雍正四年停鑄之後迤西一帶制錢漸少兵民交易不便查迤西地方俱産有銅礦設法開採自可多獲銅斤請復行開局設爐十五座每年開鑄三十六卯所需銅斤即於附近銅厰採用如有不敷再將迤東各厰添撥其鉛錫等項仍自迤東運往共用正額帶鑄外耗銅鉛錫五十五萬八百斤鑄青錢六萬七千三百三十串二百文有竒除去工價等項照銀七錢三之例配給提標及大理城守營鶴麗鎮標劒州協兵餉戶部議如所請從之九年議定商辦洋銅分解直𨽻陜西江蘇江西湖北五省以供鼓鑄户部議言官商范育馪有承辦運米運鹽及銷售參票未完各項銀一百一十四萬餘兩應令其辦銅完補每年辦洋銅一百三十萬斤解運直隸保定府三十萬斤陜西西安府三十萬斤江蘇蘇州府二十萬斤江西南昌府二十五萬斤湖北武昌府二十五萬斤於本年置貨出洋自乾隆十年為始按數陸續交納分作六年清款其保定西安俱係陸路每銅百斤合腳價以十四兩核算蘇州南昌武昌俱係水路每銅百斤合腳價以十三兩核算仍預給與印照由海關出洋採辦其銅斤辦回經過各關免其納稅每年額辦之外如有多餘聽其自行販賣至江蘇江西湖北見在鼓鑄直隸陜西二省尚未開局應令該督撫將開鑄事宜先行定議從之至十一年以洋船未能按期回棹復議減核嵗辦銅八十萬斤十五年再行議減嵗辦銅五十萬斤分解各局嗣後仍派定每年出洋船數領帑接辦以供鼓鑄又令寶泉寶源二局加卯鼓鑄時以京城錢價昻貴復設官錢局經大學士等議定兩局於定額六十一卯之外各加鑄錢十卯交官局易换至十年復議兩局各帶鑄五卯加鑄二十二卯共可得錢四十五萬八千六百三十串有竒添給錢局以廣流通十年五月以錢價漸減奸民每以在京賤買之官錢運至近京錢貴之地興販射利議將官局停止其兩局開鑄仍照原額為六十一卯又令貴州寶黔局加卯鼓鑄貴州總督張廣泗奏言黔省自添設爐座以來兵民稱便即向不用錢之苗疆亦知以錢交易請加鑄十卯為四十六卯嵗可添錢二萬四千九百三十七串有竒增搭兵餉及養亷俸工等項户部議如所請從之臣等謹按嗣後寶黔局每年採本省礦銅十四萬餘斤買滇銅四十萬斤配鑄本省所産自威寧州之銅川厰勺彔厰撥用定例每百斤除抽課外以一成聽厰民易換米鹽餘銅官為收買價銀八兩白鉛由福集厰撥用每百斤價銀自一兩四錢至一兩九錢不等黑鉛由柞子厰撥用每百斤價銀自一兩六錢至一兩八錢不等至二十年以厰銅旺盛復議停止採買滇銅又增定貴州運鉛陸路腳價户部議定每百斤每站亦照雲南運銅之例給腳價銀一錢二分九釐二毫又嚴販運及囤積制錢之禁大學士九卿等議言京城近年以來錢價昻貴實由耗散多端若不官為稽查則錢文無由充裕今就見在情形公同酌議一販運之弊宜禁也奸商每於出京之時將制錢車載馬䭾向價貴之處興販射利再有閩粵商船裝載貨物由海洋直達天津發賣回棹時概用錢文壓載運至閩粵各省回空漕船亦往往多載錢文希圖興販獲利京局所鑄之錢豈能供各省之用應設法嚴加查察有犯者照違制例治罪一囤積之弊宜禁也近京所屬各村莊每多富户將所有糧草易錢堆積遂至不能流通應行文直隸總督轉飭各州縣先行曉諭不許囤至一百串以上倘有違禁藏匿不報者一經查出亦照違制例治罪至京城九門七市貨賣錢文最多者莫過於雜糧每遇秋成時外來各種糧食俱係車馬載至店鋪發賣所得錢文即用車馬載回易啓販運囤積之弊嗣後店鋪收買雜糧俱用銀兩不准用錢交與步軍統領衙門順天府府尹轉飭地方官出示曉諭仍不時查察從之又增江西寶昌局爐座江西巡撫塞楞額奏言江省自截留京銅開鑄以來恐銅斤不繼即委員赴蘇州收買洋銅因蘇州商辦洋銅定例以一半聽其自售見在亦照官價買其五分之一起運交局與滇銅配鑄但新錢額鑄有限請增爐四座共為十座每年用銅鉛錫五十七萬六千斤鑄錢六萬九千八百八十八串庶制錢足敷流轉錢價日平户部議如所請從之尋定贛州等屬兵餉自乾隆十年為始每年四季一例搭放一成制錢臣等謹按嗣後寶昌局額銅二十八萬八千斤每年用官商分交之洋銅並兼買雲南金叉厰銅定於十分內以洋銅七分滇銅三分配鑄後以商交洋銅漸次減額復委員至江蘇自行採辦以補商運之不足至二十七年以洋銅不敷接濟而滇銅尚屬有餘復議將金叉厰銅另加煎鍊提盡黑鉛以抵洋銅之用每金叉毛銅一百四十五斤鎔成淨銅一百斤酌用洋銅四分鍊淨金叉銅三分未鍊金叉銅三分配搭鼓鑄又減貴州辦黑鉛額數令湖南承辦户部議定黔省黑鉛以開採年久出産不敷見在湖南鉛厰甚旺應將貴州承辦之數每年減去三十萬斤令湖南如數收買協解十年開廣東鼓鑄局先是廣東按察使張嗣昌以該省僻處海隅制錢未廣民間買賣多用古錢請將從前開採存留銅九萬六千餘斤並添買滇銅鼓鑄以濟民用經大學士等議准令將現貯之銅即行開鑄其雲南餘銅仍咨商賣給至是滇省撥賣金叉者囊二厰銅共十八萬斤已委員領運署巡撫䇿楞奏請先將舊存銅斤配買鉛錫開局於省城廣州府設爐六座錢幕滿文鑄寶廣二字每年開鑄三十六卯用正耗銅鉛錫十四萬一千二百六十四斤鑄青錢一萬七千二百四十四串一百文有竒至粵東見在開礦俟將來採得銅斤再行添額户部議如所請從之尋復奏定先將鑄出錢文配給將軍督撫提標及廣州惠州肇慶三協兵餉餘俟局錢充裕後由近及逺一體搭放臣等謹按粵東自雍正十二年奏開銅礦方議鼓鑄旋以辦理未協即行停止至乾隆八年各銅山復先後試採已議二八抽課餘銅半歸官買半聽商賣其收買之價定每百斤給銀十兩續加至十四兩終以礦砂微薄費多獲少於十四年以後陸續封閉惟黑鉛厰開採有效先定每百斤抽課二十斤加耗十斤其餘以一半官收供鑄後以黑鉛需用無多議將餘鉛盡數給厰民自行銷售增貴州辦白鉛價直户部議定黔省白鉛工本漸增從前除抽課之外每百斤給價銀一兩三錢尚屬不敷應照黑鉛增價之例每百斤以一兩五錢收買臣等謹按貴州辦解京局白鉛先於威寧州之蓮花硃砂二厰撥解乾隆四年以遵義府屬之月亮巖厰開採有效復議分路由貴陽省城運解十三年以後月亮巖礦砂漸微改撥水城㕔之福集厰運解至二十年停止硃砂厰開採定以蓮花福集二厰鉛解京至每百斤於定價之外自黔運京給水陸腳價銀三兩一錢嵗以為例又議定用銀用錢事宜時以兵部侍郎舒赫德奏稱京師錢文自各門嚴查後價直漸平而近京州縣仍貴皆因天津一帶商船漕船回南時興販錢文所致應令地方文武官嚴查禁止得㫖照所請行錢文一事有稱廣為開採者有稱嚴禁盜銷者有稱禁用銅器者其論不一即京師現在稽查辦理亦不過補偏救弊之一端終非正本清源之至計朕思五金皆以利民鼓鑄錢文原以代白金而廣運用即如購買什物器用其價直之多寡原以銀為定準初不在錢價之低昻今惟以錢為適用其應用銀者皆以錢代而趨利之徒又復巧詐百出使錢價低昻以為得計是輕重倒置不揣其本而惟末是務也不但商民情形如此即官員辦公亦有沿習時弊者如直隸興修水利城工坐糧㕔採買布匹所領帑金數萬皆欲易錢運往其他官項大率類此夫所領帑項原係銀兩即報銷亦以銀數核算何必換錢應用若以領銀之人得受錢文為便不知所發銀兩即少至分釐亦可按數分豫與行使錢文何異況未必至分釐乎向來江浙地方有分釐皆用銀者何嘗見其不便嗣後官發銀兩之處除工部應發錢文者仍用錢外其他支領銀兩俱即以銀給發至民間日用亦當以銀為重其如何酌定條款大學士九卿議奏尋議言凡各省修理城垣倉庫等項領出帑銀除雇覔匠夫給發工錢外一應辦買物料如有易錢給發者該管上司即行察禁其民間各店鋪除零星買賣准其用錢至總置貨物俱用銀交易應通行各督撫轉飭地方官出示剴切曉諭使商民皆知以銀為重不得専使錢文實於民用有益從之臣等謹按銀與錢相為表裏以錢輔銀亦以銀權錢二者不容畸重凡一切行使大抵數少則用錢數多則用銀其用銀之處官司所發例以紋銀至商民行使自十成至九成八成七成不等遇有交易皆按照十成足紋遞相核算蓋銀色之不同其來已久銀幣始盛於元時而陶宗儀輟耕録載至元十三年以平宋所得撒花銀銷鑄作錠即當時之色銀也今民間所有自各項紋銀之外如江南浙江有元絲等銀湖廣江西有鹽撇等銀山西有西鏪及水絲等銀四川有土鏪栁鏪及茴香等銀陜甘有元鏪等銀廣西有北流等銀雲南貴州有石鏪及茶花等銀此外又有青絲白絲單傾雙傾方鏪長鏪等名色是海內用銀不患不足因其髙下輕重以抵錢之多寡實可各隨其便流轉行用至於福建廣東近海之地又多行使洋錢其銀皆範為錢式來自西南二洋約有數等大者曰馬錢為海馬形次曰花邊錢又次曰十字錢花邊錢亦有大小中三等大者重七錢有竒中者重三錢有竒小者重一錢有竒又有刻作人面或為全身其背為宫室器皿禽獸花草之類環以畨字亦有兩面皆為人形者閩粵之人稱為畨銀或稱為花邊銀凡荷蘭佛郎機諸國商船所載每以數千萬圓計考漢書載安息大秦諸國附近西海者多以銀為錢太平寰宇記載海西諸國錢有騎馬人面諸品蓋其遺制至今尚存而諸畨向化市舶流通內地之民咸資其用則實緣我朝海疆清晏所致云又開直隸保定府鼓鑄局直隸總督髙斌奏言保定府向未鼓鑄今部派官商辦交洋銅自應速籌開局請配買漢口鉛錫設爐六座錢幕滿文鑄寶直二字每年開鑄四十八卯用銅鉛錫六十萬斤鑄青錢七萬二千八百串其爐頭工料分給銀錢悉照京局之例按卯將制錢交納司庫以備配給兵餉之用户部議如所請從之嗣後至十五年以銅斤不敷議減爐二座又令廣東於厰錫之外收買洋錫解交京局署廣東巡撫䇿楞奏言各屬産錫山場所抽課錫不敷運京之額如必待抽收足數恐致遲悮請收買洋錫一同起運其價直每百斤實需銀十三兩五錢應動項給發嗣後核算厰錫不敷之數統於每年八九月間洋船到粵時如額採辦委員解京户部議如所請從之臣等謹按海外諸國多産銅錫銅斤來自東洋其出入由江浙海口皆江浙商人出洋採辦官為給照嵗有常額㸃錫來自南洋自內地商人販運之外復有外國夷商及附居澳門之西洋夷商載運進口各隨市舶之便無一定之期與一定之額也凡南洋互市之地若噶喇吧吕宋諸島不下數十國其水程近者或數十更逺者至二三百更不等自康熙二十三年始開海禁五十六年復禁往南洋惟聽各國夷船自來雍正五年仍令內地商船亦照常往市其時商販之錫並資民用乾隆五年定以㸃錫配鑄青錢於是京局及各省局鼓鑄多於粵東取給焉至於㸃錫之外若西洋諸國商船亦間有銅鉛悉隨時和買以充本省鑄局之用溟渤之涯雲帆相望大瀛一統之閎規實為超軼前古者也皇朝文獻通考卷十六
