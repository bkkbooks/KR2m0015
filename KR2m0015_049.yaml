body:
  text: 欽定四庫全書皇朝文獻通考卷四十九選舉考三舉士雍正元年奉諭㫖直省主考官俱係皇考選用之人必能自好是以特簡為主考官務秉公考取學問優長之士果能不徇私情聲名無忝則不但無負朕之選用亦不負皇考愛養之恩矣回京之日朕自加陞擢如有徇私之處經朕訪聞定行從重治罪决不寛貸又選新進士為内外官學教習吏部等衙門議定新進士除選取庶吉士外揀選學問好者令為内外官學教習年滿遇月官扣缺補用餘令回籍候選至是年六月又定三年期滿照科分名次以中書補用又總理事務王大臣奉諭㫖八旗滿洲等除照常考試漢字秀才舉人進士外在滿洲等繙譯武藝亦俱屬𦂳要應將滿洲另繙滿文考試秀才舉人進士武秀才舉人進士之處爾等㑹同該部作何考試額數多少等處定議具奏尋議滿洲䝉古能繙譯者三年之内考取秀才二次舉人一次進士一次每遇考取秀才之年吏部行文翰林院各部院衙門將滿洲翰林侍讀郎中等官内由清漢字出身精通繙譯者咨送吏部開列具題欽㸃學政一員其考試之童生八旗都統備造旗分佐領三代履歴年貎清冊咨送禮部轉送兵部考試馬步箭册送學政於貢院内考試將四書直解限三百字内為題繙滿文一篇其繙譯精通者聽考官選取考試之後將卷冊交送禮部該員仍回本衙門辦事其鄉試㑹試另立一塲於子午夘酉年二月鄉試辰戌丑未年八月㑹試鄉試禮部照例咨取滿洲由清漢出身之大臣官員職名併漢大臣官員職名開列具題欽㸃滿漢正副主考官各二員滿同考官四員禮部滿洲侍郎一員為監臨官㑹同順天府提調官管理鄉塲内外之事其應考之人不拘滿漢字貢監生員其現任筆帖式能繙譯者俱照例考試馬步箭咨送入塲頭塲將四書解義易經解義書經解義性理精義孝經衍義大學衍義古文淵鑑資治綱目等書限二百字内出題三篇二塲漢主考官或判論或表䇿自作二篇為題三塲於入塲後取現到通本一道為題其所用通本鄉試命順天府官赴通政司親領封固親身送至貢院門首交提調官轉送内簾監試主考官公同開閲㑹試亦照此例由禮部官賫送其現在文舉人能繙譯者亦准與繙譯㑹試殿試題目或於古文及律詩詞賦等文内由内閣奏請恭候欽命其鄉試於雍正二年十一月舉行㑹試於雍正三年二月舉行殿試於三月舉行奉諭㫖國家掄才大典首重試官主考憑房考閲薦之文定其去取則一榜衡鑒之當否係於分校諸臣之賢不肖亦匪輕矣近科以來皇考慎重闢門籲俊之典於順天鄉試及㑹試房考官慮其人邪正不一特命每房各用二人同閲試卷使之互相覺察彼此鉗制用意良為周宻但法久弊生一房爾考官豈皆遇秉公持正之人設有一狡黠者叅雜其間即為賢者之累况兩人或皆不肖則朋比作奸為弊更甚嗣後仍著照原定科塲條例各房止用一人校閲其責既専其功罪亦難推諉務俾鎻闈清肅悉拔真才以仰繼皇考旁求俊乂之志爾部即遵諭行又奉諭㫖此番鄉試落卷著大學士王頊齡刑部尚書勵廷儀署吏部侍郎内閣學士史貽直户部侍郎張伯行李周望兵部侍郎阿克敦副都御史李紱同南書房翰林檢閲如人不足於翰林院編檢内揀選十員同閲再此番係雍正元年特恩加科士子有因迴避不曽應試者殊屬可憫即令派出大臣擬題奏請候朕㸃出於内閣考試尋經考試取中迴避卷四名落卷二名又奉諭㫖孝經一書與五經並重蓋孝為百行之首我聖祖仁皇帝欽定孝經衍義以闡發至徳要道誠化民成俗之本也鄉㑹試二塲向以孝經為論題後改用太極圖説通書西銘正䝉夫宋儒之書雖足羽翼經𫝊豈若聖言之廣大悉備今自雍正元年㑹試為始二塲論題宜仍用孝經庶士子咸知誦習而民間亦敦本勵行即移孝作忠之道胥由乎此又奉諭㫖各省鄉試房考凡州縣官由科甲出身者止許入闈一次夫考官以秉公精鑒識拔人才為主何論曽否入闈嗣後凡遇鄉科各省督撫臨塲調齊科甲出身之員不論己未分房監臨試以時藝一篇其文理優長者為内簾房考荒疎者供外塲執事則分校得人而佳文盡拔矣分湖北湖南兩闈鄉試先是湖南士子赴湖北鄉試必經由洞庭湖六七月間風浪不測間有覆溺之患或至士子畏避險逺裹足不前特奉諭㫖於湖南地方建立試院每科另簡考官俾士子就近入塲永無阻隔之虞明年二月為鄉試之期湖南巡撫若能於二月之前預備塲屋則於明春即分湖北湖南兩闈考試至於湖廣通省取中原有定額今既分兩闈其取中之數應如何分别之處著湖北湖南督撫定議尋議定楚省分闈湖北中式五十名副榜十名湖南中式四十九名副榜九名武舉各二十五名又禮部奏言請定今科取中進士名數得㫖今科進士照朕所定一百八十名之數取中仍降㫖與總裁官朱軾張廷玉此外不拘省分不限額數如有佳卷選出另行具奏増廣東省鄉試舉人中額六名武舉中額四名從署廣東巡撫年希堯請也總理事務王大臣等奉諭㫖今年殿試天氣已寒諸貢士若照舊例在丹墀對䇿恐硯池氷結難於書寫著在太和殿内兩傍對䇿再𫝊諭總管太監多置火爐使殿内和煖諸貢士得盡心作文寫卷又奉諭㫖向來庶吉士學習清書散館之後每至荒廢殊為可惜嗣後清書散館之翰林不可令其荒廢今年新科進士選拔庶常朕意學習清書者少派數人令其盡心學習務期通曉散館後亦不可荒廢或在翰林或在部曹即令與滿員一同繙譯如此方實有禆益新科進士於引見之前朕欲先行考試知其學問再行引見選拔庶人才不致遺漏目今天氣寒冷一應仍照殿試預備考試題目朕將詩文四六各體出題視其所能或一篇或二三篇或各體俱作悉聽其便又禮部議覆御史田嘉榖條奏各省學政科考生員舊例用四書題文二篇請増用經題文一篇以崇經學如遇三冬日短減去四書文一篇應如所請從之又吏部䟽奏舉人揀選知縣每逾三十年不克及時試用除現在已經截取赴部聽其照例銓選外其餘無論己未揀選之員除本科外應行令直省督撫每於鄉試事竣㑹同主考官秉公騐看凡年力精壯克勝吏治者給文赴部銓選其年老及才具平常者雖已經截取俱准於本籍具呈改就教職歸班銓選從之又奉諭㫖昨引見新科進士名單内有用㸃記名者三十員以知縣即用尖圈記名者十七員年力尚壯𫝊問伊等有願在各館効力及在内官學教習者令各自陳明若行走勤謹學問好者朕仍拔為翰林二年上親詣太學釋奠加増國子監鄉試中額十八名五經加中四名直𨽻各省分别加増五經中額又吏部議奏内閣漢中書員缺専用景山教習之進士補授每致辦事乏人嗣後請照舊例以願就中書之進士舉人銓補内閣酌量考取擇其字畫端楷者分班選用從之又奉諭㫖逺省州縣員缺舊例部選月官領憑赴任每至需遲累月甚而懸缺日久署印屢易其官以致貽誤地方不少朕意將揀選舉人選期尚逺者挑選命往各省聽候缺出委用署事至應選時仍來京候選庶逺省署事不致乏人於吏治有益下部定議尋議㑹試後下第舉人吏部揀選引見發往雲貴川廣五省委署試用如果才守兼優著有實效該督撫保題於本省補用平常者咨部請㫖有情願㑹試者聽從之又禮部奉諭㫖鄉㑹試為掄才大典内外簾官子弟理應迴避但跋涉數千里志切觀光既至京師不得與試深為可憫朕於上科特降諭㫖另行考校然此只可暫行不便著為定例今科凡官員入闈者其子弟著一體應試將試卷另行進呈朕派大臣校閲遴選又奉諭㫖闈中謄録試卷弊端甚多其有賄囑者則書寫精工否則潦草舛錯致誤佳文著知貢舉及監試御史嚴行申飭其謄寫不工者必重加責懲令其重寫併令對讀官員嚴飭各生悉心校對勿使字畫錯誤倘有外簾官失於查察日後發覺將該管官一併嚴加議處又命㑹試舉人分别道里逺近賞給歸途路費雲南廣東廣西貴州四川五省每人銀十兩福建浙江江南江西湖廣陜西六省每人銀七兩直𨽻山東山西河南四省每人銀五兩又命㑹試及順天鄉試元魁三塲試卷繕録進呈又奉諭㫖考試繙譯舉人不必分作三塲只須一次考試一日一夜量其所能章奏一道或四書或五經酌量出一題其優劣便已可見此考試並無漢文不必派漢大臣再考試舉子俱係八旗内人其繙譯好者衆所共知即字蹟亦最易識認伊等試卷應行謄録著於六部各衙門善書之筆帖式内酌量足用選取令其謄寫選中之卷進呈時再定額數仍寫備卷呈覽其分校及巡察等員亦俱照文鄉試例派用尋議定繙譯舉人作一次考試或用章奏一道或於四書五經内酌出一題選取各部院衙門筆帖式等令其謄録其堪中式之卷挑選奏進時再行定額仍選備卷數本呈覽考試官員於滿大臣内派正考官一員副考官一員部院官員内派同考官四員其餘應行事宜俱照文鄉試例本年甲辰科繙譯鄉試取中滿洲繙譯舉人九名又禮部工部國子監奉諭㫖進士題名之典始於唐時進士榜後於慈恩寺塔下題名立碑自宋明以至我朝皆建碑於太學按其甲第先後勒載姓名籍貫於上所以重科名也今太學聖廟㦸門外所立本朝厯科題名碑自順治丙戌科起至康熙戊戌科而止稽之㑹典諸進士釋菜後禮部題請工部給建碑銀一百兩交與國子監立石題名康熙三年輔政大臣裁省自後每科諸進士各自捐貲立石我國家振興文教凡鄉㑹試動用帑金數萬朕即位之始即開恩科誠以科目一途實關用人取士之要題名之典豈宜缺焉著工部動用正項錢糧令國子監將雍正癸夘甲辰兩科題名碑速行建立康熙辛丑科亦宜補建嗣後每科仍照舊例題請庶士子觀覽此碑知讀書登榜之榮益勵其潛修上達之志爾該衙門即遵諭行又増福建省鄉試中額四名從福建巡撫黄國材請也三年奉諭㫖前各省正副主考朕皆視其人謹慎者派往並未試其文藝間有不能衡文者此皆由中式之後荒踈年久故耳著將應差委之翰林由進士出身各部院官員查奏朕試以文藝差委旋遵㫖將翰林院及進士出身官員人數查明具奏召集於太和殿試以四書題文二篇親定甲乙封貯内閣以備鄉試差遣次年將考試取定人員書名牙籖盛以金筒每届按省分差之期設黄案於午門外命大學士同禮部官掣籖唱名恭請欽定正副主考七年仍行御試分别記名暨十三年鄉試主考皆如之又禮部議覆左通政陳良弼條奏八旗漢軍筆帖式貢監生員官學生亦有學習繙譯者請照滿洲蒙古例一體考試應如所請嗣後三年之内考取秀才二次舉人一次進士一次其取中額數視人數多寡臨期請㫖欽定從之又吏部等衙門議覆原任川陜總督年羮堯䟽言陜西寧夏等衛所新經改設郡縣請分設寧夏西寧凉州甘州四府一年一貢靈州三年兩貢寧夏寧朔二縣各兩年一貢中衛縣三年兩貢西寧武威平羅碾伯古浪高臺永昌鎮番山丹平番張掖等縣各兩年一貢照寧夏例行應如所請從之又領侍衛大臣奉諭㫖爾等俱係勲舊大臣之子孫孰不當為國家効用但今擇人任用大臣等之子孫内能勝任者不可驟得今大臣之子及散秩大臣侍衛等之子内爾諸臣有知其善者即行舉奏縱不深知訪問於章京䕶軍校等如得其人亦行舉奏以備朕之試用又吏部議覆吏部左侍郎查郎阿奏言直𨽻州州同州判雖係佐貳現管逃盜等案不便以捐納貢監補授管轄屬縣請舉人銓補州同恩拔副榜貢生銓補州判應如所請從之四年奉諭㫖國家設學校以儲養人才鄉㑹廷試拔其尤者而用之即古選士造士之遺意也但士子作文有一日之長短縱使主司公明搜羅豈能無遺况去取惟憑文藝其人品之髙下才能之優絀無由得知每有出羣拔萃之才屢試不售即或晚得一第而年力衰邁不堪為國家任使朕思各省學政奉命課士黜劣舉優係其専責嗣後學政三年任滿將生員中實在人品端方有猷有為有守之人大省舉四五人小省二人送部引見朕親加考試酌量擢用現在報滿各學政即遵照薦舉其到任未久如有所知亦即舉出夫一省而舉數士不可謂無人學政巡厯各府三年之久日與士子相親考文察行不得謂不知但能虛公衡鑒所舉必得其人且風聲所樹凡讀書士子必皆鼓舞振興力學敦行求為有用之儒於士習人才大有禆益其各實心奉行毋得茍且塞責如有徇私冒濫等弊必嚴加治罪又以繙譯鄉試添増漢軍照文鄉試例滿洲䝉古編滿字號漢軍編合字號又定江西鄉試内簾書經房考舊用二員經撫臣裴繂度奏卷多房少請酌添書經房同考官一員從之又吏部議奏國子監漢字助教員缺將舉人副榜按科分每旗咨取十人併將由舉人副榜出身之俸滿筆帖式每旗咨取五人清文助教員缺於清文俸深筆帖式每旗咨取十人考取註册不限旗分各按名次補用論俸陞轉從之又奉諭㫖士子讀書制行之道首在明經其以五經取中副榜者必有志經學之士著將今年各省五經取中副榜之人俱准作舉人一體㑹試再今科各省所中副榜内有兩次中副榜者亦准作舉人一體㑹試此係特典後不為例又定考騐就教貢生例各省恩拔副貢生内已就教職者各省學臣於嵗科兩考事竣㑹同巡撫與挨貢一體騐看造册送部銓選年老者以原品休致五年吏部奉諭㫖㑹試舉人著爾部揀選引見併問九卿將所知者舉出再舉人内有伊等同鄉素日推服之人亦著舉人公舉或數人共舉一人或十數人共舉一人俱將姓名註明務須有猷有為有守之人方可推薦不得冒濫又奉諭㫖士子讀書應試須専心講習方可望其成就八旗舉人生員内在䕶軍執事人行走者朕念其用度艱難恐致分心是以於雍正元年特加殊恩令其退回仍賫給錢糧養贍俾得専心讀書勉勵上進庶國家可收得人之益今已三年有餘其中或有年力衰邁及不肖之人徒領錢糧無志上進虛糜國帑者亦未可知若不加考課分别勤惰無以鼓勵人才著於㑹試後將八旗滿洲蒙古舉人生員漢軍舉人查明人數請題考試分别等第騐其優劣又奉諭㫖朕以今年閏月節氣稍遲二月天寒故將㑹試日期改至三月但目今天氣尚覺寒冷若再改期又恐舉子盤費無多艱於旅食今照舊於初八日入塲著曉諭各舉子俱許攜帶手爐以温筆硯皮衣及厚綿衣服俱許穿進但不得乗機懷挾以滋弊端塲内茶飯著供給官加意預備朕另派大臣照看料理令早晩給與薑湯并按名給發木炭以資其用又奉諭㫖今科選拔庶常應如何簡選考試務得人材以濟實用著㑹議具奏尋議進士選拔庶常原屬儲才大典必得其學問素優才品兼著之士方可選列清華查雍正元年癸夘科殿試後集諸進士於保和殿御試並令九卿各舉所知雍正二年甲辰科照前舉行今科進士亦應詳加考試仍令内閣九卿確行保舉其考試擬用論詔奏議詩四題或作一二篇或諸體全搆聽其各展所長屆期欽㸃大臣閲卷進呈其進士内有彼此熟悉素為衆所推服者亦令公同舉出伏候親加選定從之又奉諭㫖外省鄉試房考舊例皆用現任知縣入闈朕思知縣身為民牧地方政務甚繁入闈動經數月諸事或至遲誤朕意欲將外省房考之例斟酌更定或於隣省中舉人進士之在家候選者臨期調取數十人交與監臨之督撫秉公掣籖令其入闈分校著九卿詳議具奏尋議順天鄉試仍照舊例其外省鄉試飭令所屬地方官將在籍之進士舉人文行素優者送督撫衙門騐看以備隣省調取大省十八房取用三十名中省十四房取用二十五名小省十二房或十一房取用二十名十房取用十八名隣省咨文到日遣官伴送人給路費銀三十兩臨期掣籖得内簾者入闈分校餘令回籍至外簾之收掌等五所官仍於本省府州縣佐貳等官内委用從之分設八旗官學順天學政孫嘉淦條奏請整飭八旗官學以育人材嗣後挑選官學生務擇聰明俊秀子弟考課分習清漢書每旗給官房一所為學舍以貢生五人為教習派定所教人數優其廪給専其訓導又不時稽查勤惰期滿分别議敘從之改定奉天廪生出貢例禮部議覆奉天府丞須洲䟽言奉天府學民籍廪生一年一貢似覺太速請二年一貢滿字號廪生五年一貢似覺太遲請三年一貢再盛京幅􅊷廣闊滿漢生員散處千里之内總屬府學教官管轄耳目難周請令查明居址撥歸相近縣學督課俱應如所請從之又禮部奉諭㫖直省拔貢舊例十二年題請舉行一次後因各省學政不能秉公選取國子監未便照例請行於雍正元年時特行一次朕思各州縣每年嵗貢較其食廪淺深挨次出貢内多年力衰邁之人欲得人材必須選拔著各省學政於科考時照例府學拔取二名縣學拔取一名寧缺毋濫務取學問優通品行端方才猷可用之才令其來京朕將親加考騐令入國子監肄業如有學問荒陋人品不端才具庸劣者將學政嚴加議處嗣後六年選拔一次國子監屆期題請候㫖六年刑部尚書勵廷儀條奏請除監生考職倩代頂冒之弊得㫖各省監生每於考職之時或憚於跋涉或不諳文理託在京之親戚朋友代為應考而本人安坐原籍濫竊職銜此等陋習相沿已久是以數年來朕特遣大臣専司考職之事及後訪察知考試之臣亦只能校閲文藝不能除假冒之弊故上年考試後朕令將一千一百餘人通行引見彼時伊等自知頂冒情虧不敢報名引見者九百餘人俱經降㫖革退其引見之二百餘人朕以為皆係正身又見其中有人材可用者因揀七十餘人交部即用或令外省督撫試用且有加恩用至知縣知州等官者近聞此即用人員内竟尚有頂冒之人似此敢於欺罔可謂愍不畏死者矣今朕開恩准其自行出首若代考得官之人遵㫖出首朕酌量寛減其罪其託人代考者情罪較輕若遵㫖出首但革去監生不治其罪倘仍前隠匿不首一經察出將與者受者即行正法其從前厯來考職監生有代考得官者亦照此例行又敕浙江士子照舊鄉㑹考試先是雍正四年停止浙江鄉㑹考試至是奉諭㫖浙江士習澆薄朕為世道人心計不得不嚴加整理今二年以來李衛王國棟先後奏稱兩浙士子感朕訓誨之恩省愆悔過將舊日澆凌奔競之習痛自改除可稱士風丕變前年朕原降㫖浙人秉性聰慧既知讀書必明大義非如强悍執滯之難於感化者一經指示則醒悟亦必最㨗不出二三載可以望其自新今果然矣明年即屆鄉試之期浙省士子准其照舊鄉㑹考試以示朕訓俗牖民樂聞遷善之至意又敕各省保舉貢生生員以教職用者俸滿應陞之時不得别行陞轉又禮部奉諭㫖各省考取拔貢原欲遴選儒生以宏教育向來之例俱於現考一二等生員内選拔文行兼優者但恐作文有一日之短長而文理平通不列優等者其人或品行端方才識練達足備國家之用亦未可定嗣後著各省學政不必拘一二等之生員俱准收考酌量試以時務䇿論其人果有識見才幹再訪其平日品行端方即正考未列優等亦准選拔則文行兼收可以昭國家廣攬人材之典七年宗人府奏宗學教習期滿之舉人貢生請予議敘得㫖宗學教習於期滿之時自應加恩議敘除舉人係應選知縣之員照原議銓選外其貢生等善於訓課未必嫻於吏治若一概用為知縣不但於吏治無益而本人不能辦事致干叅處亦非所以成全之也凡各處教習之貢生等著於期滿之時該管衙門帶領引見或用為知縣或用為教官候朕頒發諭㫖因材器使將此通著為例又奉諭㫖考官専司衡文之任必須學問明通者始能鑒别不爽雍正三年曽將在京科目出身應充正副考官之員通行考試分别等次記名於雍正四年掣籖命往各省使典試事今已越三年從前考取人員其中陞遷外任及告假回籍者甚多即有在京者其所學或以日久漸荒而前此之未曽入選者今用四年之功文藝未必無所進益且陸續新到之員亦復不少著照雍正三年之例通行考試俟朕分别記名以備持衡之任有不願就試者亦聽其意又禮部議覆雲貴廣西總督鄂爾泰䟽言貴州一省原轄十一府四十州縣每科鄉試額取文舉人三十六名五經二名武舉二十名近於四川湖南兩省内將十三州縣改𨽻貴州赴試人數較多請増貴州鄉試解額加中文舉人六名共四十二名武舉三名共二十三名庶不致人多額少黔省既經議加則四川湖南應行議減請將四川解額文舉人減四名武舉人減二名湖南解額文舉人減二名武舉人減一名應如所請從之又奉諭八旗貢監生員已經考取小京官筆帖式者准其與舉子等同與鄉試又奉諭㫖各省拔貢聞已陸續來京伊等既不能應本省之鄉試則當准其應試北闈俾得與觀光大典凡拔貢之有貢單者俱著該堂官咨送順天府令其應試再修書各館内從前有外省生員在館効力者若情願入塲考試著取具同鄉官印結送順天府亦准入塲又定漢軍義學肄業子弟如有文理精通考繙譯者不拘閒散俱准赴吏部考取筆帖式其文理粗通弓箭可造者聽其在本旗挑補領催兵丁三年之内教習勤謹者將教習人員分别議敘又遴選廣東連州生員欽賜舉人四名時署廣東巡撫傅泰䟽言廣州府理猺同知朱振基於前任連州知州任内奉祀逆賊吕留良牌位據連州生員陳錫等合詞呈首上以連州生員陳錫等深明大義不為邪説所惑據實出首令將今年該州應試完塲之舉子交與該省學政秉公遴選學問優長者賞作舉人一體㑹試如今科所取副榜内有連州生監亦准作舉人又奉諭㫖大學士尚書侍郎都御史副都御史各大員有子在京闈及本省鄉試未經中式年二十以上者著各舉文理通順可以取中者一人開送内閣尋開列大學士蔣廷錫子蔣溥吏部尚書嵇曾筠子嵇璜都御史唐執玉子唐少游吏部左侍郎史貽直子史弈簮户部右侍郎王廷揚子王鏐禮部左侍郎錢以塏子錢鋈禮部左侍郎鄂爾竒子鄂倫兵部左侍郎楊汝榖子楊綏刑部左侍郎繆沅子繆橒工部右侍郎張大有子張鴻運侍郎署理倉塲事務凃天相子凃士炳副都御史王寵子王謝升等具奏得㫖俱賜舉人户部侍郎劉聲芳子劉俊邦因病未應鄉試亦准作舉人一體㑹試又准八旗叅領處酌派筆帖式行走凡八旗文移稿案向由管檔領催繕寫伊等多係兵丁出身於滿漢文理不能通曉不無草率舛錯之處經給事中奚徳慎條奏嗣後八旗監生生員官學生内有通曉滿漢文願在叅領處効力行走者令該都統等按旗揀選滿洲每叅領下酌派二員䝉古漢軍每叅領下酌派一員授為貼寫筆帖式辦理一切檔案事件五年期滿該旗咨送吏部考試繙譯取中後以部院衙門筆帖式補用應如所請從之八年分派新進士於六部額外主事學習行走是年新進士除選拔庶吉士外曹繩柱係現任中書以六部主事用其馬丙等五十八名均奉諭㫖在六部額外主事上學習行走該部按各部司分多寡掣籖分派具奏三年之後如能稱職該部堂官題補如不能稱職該部奏聞其内若果有才猷出衆明練政治之員於一年之後該堂官將情由聲明保奏帶領引見請㫖此各部行走之員俱照額外主事之例給與俸禄又奉諭㫖今科外用進士著就伊等本籍地方掣籖派往交與各該督撫分派藩臬衙門令其學習伊等中式之後原須候選數年始能得官今著學習三年委署試用一年約計四年之後題補實授與伊等候選之期相仿而又得學習吏治較之閒居豈不大有禆益此三年内若該地方需用人員仍著奏請另行揀選命往不必於新科進士内遷就委用倘新進士中果有才具出衆平日熟練吏治不待學習者著該督撫格外委署題補即於本内聲明若才具庸常難以練習吏治情願改教者不拘三年之期准其具題改補其學習之員每年公費若干該督撫於公用銀兩内酌量給與著行文各督撫知之又吏部奉諭㫖向來各處鹽政弊端甚多難以清理是以定議於候選知縣内揀選命往彼時因人員不敷遂將監生捐職之人亦入於揀選之内聞有央同鄉官出結而私相饋送者此風斷不可長嗣後不必用捐銜之人著將在部學習及留京之拔貢生令各堂官擇其為人謹慎有身家可以辦事者保送吏部以備揀選又各省選拔生員到京派大臣秉公考試分别等次内有湖北應山縣生員楊可鏡一卷文理荒踈經部議照例革去選拔奉諭㫖楊可鏡乃明臣楊漣之元孫昔順治四年楊漣之子楊之易為江南松江府同知遭提督吳勝兆之叛捐軀殉難凛然忠節此即楊可鏡之曽祖也朕思楊漣父子兩世忠義其後嗣子孫若稍能自立品行無虧雖文藝不工亦當格外造就楊可鏡准作選拔赴國子監肄業仍著禮部帶領引見又禮部議覆四川巡撫憲徳䟽言茂州羌民久列版圖載糧入册與齊民無異請照例與漢民一體應試科舉出貢卷面不必分别漢羌額數憑文去取以廣樂育鼓勵之意應如所請從之九年奉諭㫖看來䝉古旗下人能䝉古話及能以蒙古字繙譯者甚少如是相沿日久䝉古文字并䝉古話必漸至廢棄宜令蒙古旗下人亦照考試滿洲繙譯生員舉人進士之例考取䝉古繙譯生員舉人進士在理藩院補用如有讀習漢書情願考試文生員舉人進士者令照常考試著在别部院補用如此則䝉古旗下人俱各奮發勤學蒙古文字並䝉古話不至廢棄而理藩院亦收得人之效著大學士㑹同理藩院議奏遵㫖議准八旗䝉古人等能繙譯滿洲䝉古文字者照考試滿洲繙譯之例三年之内考取秀才二次舉人一次進士一次鄉㑹試與滿洲繙譯合為一闈滿洲應試舉子在東文塲考試蒙古應試舉子在西文塲考試滿洲䝉古合為一榜一同張掛考取秀才派䝉古學院一員鄉㑹試各添派蒙古主考官一員䝉古同考官二員俱由該衙門咨取各部院蒙古大臣官員職名開列具題欽㸃考取秀才題目於清字日講四書内照漢文限三百字為題繙譯䝉古文一篇鄉㑹試題目於清字日講四書内照漢文限三百字為首題再用清字奏䟽一道為次題繙譯䝉古文二篇謄録試卷於各衙門善書蒙古字之筆帖式内咨取派用其監臨提調監試等官於滿洲繙譯科具題欽㸃毋庸另派其取中秀才舉人進士額數令考官挑取中式之卷並選備卷數本一并進呈請㫖欽定考取秀才於本年十月舉行鄉㑹試於考試滿洲繙譯一同舉行雍正十年壬子科繙譯鄉試取中滿洲繙譯舉人十六名䝉古繙譯舉人二名定滿洲教習選用例禮部奉諭㫖滿洲教習俱係旗人並無别項差使在館充數三載即得一官爾等當不時稽查分别優劣如果教導有方即當奏聞其不能稱職者亦應題叅今值酌定成例之初凡教習期滿作何補用之處著㑹同大學士等妥議具奏尋議滿洲教習三年期滿其行走勤謹教導有成者列為一等係舉人以小京官即用貢生生員以筆帖式即用已補筆帖式之貢生生員照舉人例用列為中等者再留教習三年如教導有成帶領引見照例咨送選用不能稱職者禮部不時查叅從之又吏部奏筆帖式例於繙譯人員内按旗補用但各旗出缺多寡不同請嗣後照各部主事例不論旗分補用得㫖借缺還缺易滋弊端惟是筆帖式一員係各旗出身之路若本旗一時無應補之人即將别旗人員頂補恐行之日久漸至人少嗣後該旗筆帖式缺出如不得應補之人帶領二十員候㫖補授十一年奉諭㫖雲南貴州廣東廣西四川福建六省舉人赴京㑹試郵程遥逺非近省可比朕意欲於落卷中擇其文尚可觀而人材可用者添取數人候㫖録用以昭朕格外加恩之意著𫝊諭主考官於六省試卷遵㫖取中外其次等可取之卷不拘數目秉公選出俟發榜後朕另派大臣㑹同主考官騐㸔人材更加遴選再六省下第舉子内除願與下科㑹試者不必報名外若有情願小就以圖即行録用者著在禮部報名一併交與派出之大臣主考官揀選奏聞請㫖又吏部遵㫖議奏定例滿洲舉人選用小京官漢軍舉人選用知縣從前漢軍舉人有冒入滿洲額内中式者以致内用外用任意趨避嗣後請令各該旗於考試時將應考人員詳加分别開明咨送順天府如仍有混行冒考中式者查出將咨送之該旗都統佐領等官交部議處舉人革退從之十二年奉諭㫖鄉試之年宣化府屬另立旦字號與奉天府屬夾字號額數相同各取中三名今宣郡人材較前漸盛又添蔚州一屬應舉人數加多查夾字號前已廣額二名則旦字號應加増中式之數下禮部議定宣化旦字號加増中額一名與夾字號各中四名十三年奉諭㫖縣令為親民之官關係民生休戚最為切近凡選用知縣者類多舉人進士出身之人其中才具可觀克稱厥職者固多而年老迂踈不諳吏治者亦復不少朕念其攻苦寒窻幸登科目不忍遽令放廢於是定以改教之例每見候選各員有年老才庸不稱縣令之任而苦不自量仍欲勉强謁選其意蓋以縣令為榮希圖僥倖且以到任之後不能辦事仍可改補教職無碍於功名故為茍且姑試之計殊不思以不能勝任之人冒昧銓選及到任之後試看一年半載再請改教其間輾轉更换時日已多事務廢弛之患有必不能免者嗣後科目出身之員若係簡選命往者到任後不勝縣令之任准該督撫以教職題請改補如係月選之員或年力衰邁或才識庸愚即當於未選之先或臨選之際呈請改教若不自量度仍欲銓選知縣該員到任後著該督撫留心察看或以才力不及或以溺職分别題叅不得奏請改教以遂其自便之私如果有為人謹慎學問優通者著該督撫將應否改補教職之處具本聲明送部引見請㫖禮部議覆福建巡撫盧焯䟽言臺灣鄉試士子向係另編字號額中舉人一名今臺灣五學人文日盛請於閩省解額外將臺灣字號再加中一名以示鼓勵應如所請從之是年九月皇上登極詔増郷㑹中額㑹試額數俟禮部臨期奏請廣額外鄉試大省加三十名次省加二十名小省加十名奉天宣化各加中一名廣東商籍亦於民籍外另額取中二名皇朝文獻通考卷四十九
