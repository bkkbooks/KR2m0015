body:
  text: 欽定四庫全書皇朝文獻通考卷一百四十九王禮考二十五國恤臣等謹按典禮孝誠仁皇后孝昭仁皇后孝懿仁皇后孝敬憲皇后皆崩於正位中宫之時㑹典列為皇后喪儀今從其例孝賢皇后喪儀恭紀於次康熙十三年五月丙寅仁孝皇后崩奉安梓宫於乾清宫禮部題准現今三藩叛逆大兵致討在外各官舉哀有惑觀聽移文直省免其齊集舉哀制服及遣官進香戊辰奉移梓宫於西華門外殯宫庚寅奉移梓宫暫安於都城北沙河鞏華城殯宫至二十年奉移陵寢梓宫於六月庚申册諡大行皇后曰仁孝皇后臣等謹按雍正元年六月改上尊諡曰孝誠恭肅正惠安和儷天襄聖仁皇后十七年二月丁卯孝昭皇后崩奉安梓宫於宫中正殿己巳奉移梓宫於武英殿三月丙申奉移梓宫於沙河鞏華城與仁孝皇后同安於殯殿閏三月辛酉册諡大行皇后曰孝昭皇后臣等謹按雍正元年九月加上尊諡曰孝昭仁皇后二十年二月癸卯奉移仁孝皇后梓宫同孝昭皇后梓宫於陵寢二十八年七月甲辰孝懿皇后崩奉安梓宫於承乾宫正殿丁未奉移梓宫於朝陽門外殯宫九月乙卯册諡大行皇后曰孝懿皇后臣等謹按雍正元年九月加上尊諡曰孝懿仁皇后十月甲戍奉移孝懿皇后梓宫於陵寢雍正九年九月己丑孝敬皇后崩奉安梓宫於暢春園九經三事殿十月丁酉奉移梓宫暫安於田村殯宫十二月己亥册諡大行皇后曰孝敬皇后十三年八月皇上御極九月辛酉上詣孝敬皇后几筵前致祭先期諭王大臣等曰九月二十五日朕親詣孝敬皇后几筵祭奠所有祭品應否加增之處著議奏尋議此次乃四周年之祭一切祭儀俱照二周年三周年之例似無庸加添恭遇皇上親詣行禮應加添冠一頂衣一襲以展孝思得㫖是十一月丙辰恭上皇妣孝敬皇后尊諡曰孝敬恭和懿順昭惠佐天翊聖憲皇后乾隆二年二月庚辰奉移孝敬憲皇后梓宫於泰陵十三年三月乙未孝賢皇后崩辛丑奉安梓宫於長春宫是月丙申奉諭㫖皇后同朕奉皇太后東巡諸禮已畢忽在濟南微感寒疾將息數天已覺漸愈誠恐久駐勞衆重厪聖母之念勸朕回鑾朕以途次亦可將息因命車駕還京今至德州水程忽遭變故言念大行皇后乃皇考恩命作配朕躬二十年以來誠敬皇考孝奉聖母事朕盡禮待下極仁此亦宫中府中所盡知者今在舟行值此事故永失內佐痛何忍言一應典禮至京舉行布告天下咸使聞知嗣是每日几筵前上食三次上皆親臨及至通州暫奉大行皇后梓宫於蘆殿靈駕至京由東華門入至長春宫奉安於正殿皇上親臨視安奉梓宫畢皇子祭酒三爵衆隨行禮畢各退己酉奉移梓宫暫安於景山觀德殿頒敕諭於天下先是和碩履親王允祹等言謹按會典內載孝誠仁皇后喪儀禮部題准移文直省免其齊集舉哀制服蓋緣康熙十三年時值三藩叛逆大兵致討恐在外各衙門舉哀制服有惑觀聽是以禮部題明免直省官民治喪原屬一時權宜嗣後相沿遂未更正考周禮為王后服齊衰注言諸侯諸臣皆齊衰是內外臣無異也明會典載皇后喪儀十三布政使司及直𨽻禮部請敕差官訃告在外文武官員軍民人等制服與京師同今大行皇后崩逝欽奉諭㫖布告中外應由禮部謄黃遣官頒下直省令在外文武各官於奉到諭㫖為始摘冠纓齊集公所哭臨三日持服通前二十七日而除三日後照常辦事二十七日內文武各官不嫁娶不作樂軍民人等摘冠纓七日七日內不嫁娶不作樂其見在出征官軍悉免舉哀制服督撫以下仍照舊例免其遣官進香從之五月甲辰册諡大行皇后曰孝賢皇后丙午諭今年尋常升殿日鳴鐘鼓樂懸而不作是日大學士等奏帝后雖云儷體而地道臣道天澤昭然升殿視朝事關典制非燕樂可比孝賢皇后喪制應遵用祖制百日後皇上升殿文武各官及外藩使臣行禮羣臣朝服均如常儀其作樂之處並照常舉行皇上兩月除沐後即應御門聽政羣臣常服不掛數珠禮畢仍素服百日後遇御門之期羣臣常服掛數珠庶於禮制分義皆為允協再恭檢孝誠仁皇后喪儀案卷內載百日以後期年以內王公以下各官逢初五十五二十五等日咸朝服月朔初十二十等日補服皆掛數珠馬懸繁纓尋常入內奏事常服不掛數珠馬不懸繁纓等語今孝賢皇后百日以後期年以前上朝坐班及入內奏事應悉遵此制至一切典禮應朝服采服之日仍如常儀所有原議入朝奏事用常服之處應通行改正得㫖孝賢皇后大事一切典禮朕皆斟酌古今務協其宜蓋皇后坤寧正位體制原尊然以天子之禮視之則節文亦自有别縱令伉儷恩篤亦不可事事從而加厚以致失之太過即或情誼稍有未洽亦不宜事事從而貶抑以致失之不及蓋皇后自有皇后之體制不可以夫婦之私情為之增損于其間也朕于孝賢皇后情誼隆重固天下臣民所共知而經紀喪儀從不肯以一毫私意稍紊典常考明代嘉靖七年孝潔陳皇后之喪閣臣張璁援據古禮以為喪服自期以下諸侯絶特為旁期言若妻喪本自三年報服殺為期年固未嘗絶上宜為后服期等語其折衷頗為允當今據大學士議奏禮儀內如升殿作樂一節凡屬大朝祀典自當照例朕意今年內尋常升殿但鳴鐘鼓樂懸而不作庶為合宜至來年正月將屆期年一切典禮著照康熙十四年之例如常儀餘依議六月申明國恤百日內不剃頭之令是月奉諭㫖山東沂州府營都司姜興漢奉天錦州府知府金文淳皆于孝賢皇后百日內剃頭經巡撫及副都統參奏已降㫖交刑部問罪本朝定制遇有國恤百日以內皆不剃頭倘違例私犯祖制立即處斬亦如進關時令漢人剃髮彼不剃髮者無不處斬之理此百餘年人所共遵不待傳諭而後曉是以㑹典律例皆無明文蓋以修㑹典時不過增損明季之舊章明朝原無此制也又以其事本理法所當必然不必載之簡册即如子孫孝養父母當食進食當衣加衣豈待專立科條然後盡其子職亦豈得以律令不載遂為不孝者解免至謂漢人遂可不遵百日之制茍有此心即與不肯剃髮者同尤不容誅也伊等身為臣子豈有不遵國朝定制之理若謂出于不知豈不見他人尚未剃頭何以不推求其故安心違犯此即立行正法以彰憲典亦無可恕然自朕思之律例會典實無明文而部文究未傳諭其所以未經聲明者亦因其為衆所共知今既明正其違犯之罪又當曲體其愚昧犯法之情且或逺方僻陋拘于二十七日除服之文遂有陷于不知或見他人有剃頭者即謂事屬可行冒昧觸網此等情節又不得不格外矜原更恐外省見有此兩案諭㫖慮蹈狥隱之愆紛紛參奏國家亦無此體制可傳諭各督撫提鎮學政欽差各官等此㫖未到之前或見在已經察出之案自當參處不容廢法姑縱其餘未發覺者概不必再行飭參旗人本屬當知若有喪心之徒不在此寬免之例嗣後將國恤百日內不得剃頭違者立即處斬之處載入㑹典律例令人共知遵守朕惟率由祖制欲使法在必行並無從寬從嚴之見存乎其間也七月復諭今日見江寧協領員缺保送之佐領尚未剃頭蓋伊等以㫖到計日矣皇后大事滿百日剃頭皆當以事出之日為始若以㫖到日計之則極逺省分益致遲久不齊從前會典未載入此條而禮部行文並未明白指示以致外省人員非失之不及則轉至矜持至于太過將此通行曉諭各省駐防處如有似此觀望未剃頭者皆令剃頭纂修會典時詳悉載入十月戊子奉移孝賢皇后梓宫於靜安莊十五年十二月定孝賢皇后三周年後祭獻禮儀是月禮部奏恭查孝誠仁皇后三周年後在沙河致祭之禮停止每日供獻及滿月致祭照陵寢致祭例每月朔望供羊酒果品㸃香燭四時大祭陳俎豆牲帛醴齊㸃香燭讀祝文朝服致祭凡遇慶典致祭供酒桌㸃香燭讀祝文致祭忌辰照周年禮供羮飯肴膳饌筵焚楮定讀文致祭雍正十一年孝敬憲皇后几筵前致祭改用補服伏思陵寢致祭是於神牌前與几筵前致祭究屬有别三年後若仍照常供獻又與喪儀無殊謹擬孝賢皇后三周年後停止滿月致祭及每日奠獻四時祭祀忌辰致祭不陳冠服不設楮錢惟供肴膳饌筵讀文行禮畢舉哀寒食進掛楮錢寶花一座除夕陳楮錢二萬金銀定二萬同寶花送燎祭酒於正中咸停齊集仍設儀駕祭日遣諸皇子輪流祭酒恭遇慶賀祭告仍照現今靜安莊祭告禮行每月朔望供羊一饌筵一奠酒致祭停止舉哀庶三年後之禮儀與神牌前祭祀皆有分别從之十七年十月庚子奉移孝賢皇后梓宫於陵寢皇后喪儀初崩皇帝冠去纓緯輟朝布告天下皇子去冠纓即次哭踊妃嬪暨皇子福晉咸摘耳環去首飾即次哭皇子成服截髮辮居宫中别室皇孫隨成服在京王公百官宗室覺羅及內務府所屬官員皆成服王公于府第齊宿大臣官員于各公署齊宿皇子福晉成服剪髮皇后宫中女侍內監咸成服剪髮截髮辮妃嬪公主福晉以下二品命婦以上及內府三旗官員護軍等妻皆成服皇帝縞素以白綢為之旬有三日易素服閲二月釋服親詣几筵前視奠仍素服至朞年除皇子喪服百日易素服詣几筵前仍喪服二十七月而除皇子福晉服如之妃嬪服二十七日皇孫及恭理喪儀王大臣殯宫守衛執事各官百日除服羣臣二十七日除服皆百日剃髮十三日內文移用藍印京朝官二十七日不作樂不嫁娶右初崩制服其日殮奠所司于奉安梓宫殿內正中施黃幔左右素帷內鑾儀校陳儀駕于宫門外諸執事皆辦皇帝親臨視奠至丹陛正中降輿哭後凡儀同親臨奠皇子立丹陛東妃嬪公主及在內福晉立几筵殿內王公以下文武二品官以上立宫門外三品以下官立外門之外王公福晉夫人郡主以下二品命婦以上立宫門內丹墀西三品以下命婦立宫門外之西皆齊集舉哀男摘冠纓女去首飾內務府總管命婦率尚茶女官奉茶尚膳女官奉膳由中門入尚茶女官跪進茶恭奠于案行一叩禮皇子以下皆北面跪叩徹茶尚膳女官揭巾幕上食畢執事官進奠几皇帝詣奠位坐西向奉爵大臣跪進爵皇帝受爵三奠皇子以下皆行三叩禮乃徹奠哭止皇帝乘輿還宫皇子返苫次衆各退右殮奠越日內閣繕敕下禮部恭鐫謄黃頒于直省遣使齎諭朝鮮國王理藩院遣官分路往諭外藩䝉古均如頒詔儀敕到之日順天府尹率屬制服跪迎宣讀畢奉安公署舉哀直省督撫率所屬文武各官跪迎宣讀奉安于㑹城公署分駐之提鎮道府州縣各奉安于治所舉哀皆朝夕哭臨三日移文各省督撫提鎮免其遣官進香直省官二十七日不作樂不嫁娶皆百日剃髮以初喪日為始不以詔到日為始軍民素服七日不作樂不嫁娶外藩䝉古王公台吉等公主福晉等服內來京者皆成服除服後來京者男摘纓女去首飾各三日朝鮮使臣同右頒敕成服後朝晡日中三設奠朝晡奠進羮飯肴饌午奠進饌筵一如事生儀朝晡設儀駕每奠王公百官咸齊集質明欽天監報時各執事皆辦執事官告朝奠皇子出苫次詣几筵前西嚮舉哀乃啓門恭理喪儀王公大臣內務府總管及內務府總管夫人內管領妻率尚膳尚茶女官舉茶膳由中門中路進至几筵前尚茶女官跪進茶衆咸跪恭奠于茶案行一叩禮衆隨行禮尚茶女官徹茶次尚膳女官進膳上食畢執事官進奠几于正中皇子詣几前跪執事官跪進爵皇子三祭酒每祭行一叩禮衆隨行禮興乃徹饌出闔門哀止皇子還苫次衆皆退午奠晡奠儀同右朝晡日中奠􅓪日行殷奠禮饌筵二十一席羊九酒十有一尊楮帛九萬設儀駕陳冠服張黃幕於宫門外之右設反坫具尊罍王公百官公主福晉命婦咸齊集陳俎豆于几筵前列饌筵于丹陛兩旁陳羊酒于黃幕積楮帛于燎所設祭文案于東檐下禮部堂官奉祭文侍郎二人前引由中門入祗設于案退皇帝親臨上食畢讀祝官奉祭文至閾外正中跪皇子跪衆皆跪哀暫止讀文畢執事進奠几皇帝坐祭酒三爵每祭皇子行一叩禮衆隨行禮舉哀畢徹饌皇帝還宫讀祝官奉祭文禮部堂官前引至燎所付內監退王公百官咸退次女官奉冠服內監十人前引恭送燎所皇子隨出齊集王福晉命婦內府婦女皆隨出皇子福晉出詣燎所祭酒三爵舉哀衆隨行禮舉哀畢乃焚冠服楮帛各退右殷奠諏日奉移殯宫先期以奉移告几筵行啓奠禮陳設讀文行禮均與殷奠同至日奉移梓宫於殯宫豫設大升輿於景運門外屆時皇帝親臨祭酒三爵恭理喪儀王大臣鑾儀衛工部堂官率校尉恭進小輿奉梓宫由乾清門右門出至景運門外登大升輿禮部尚書祭輿內大臣祭所過門橋皆三祭酒每祭行一叩禮焚楮帛皇子步送王公百官各以次隨行妃嬪等先詣殯殿後左旁恭俟靈駕至行奉安禮列几筵陳册寶於左右皇子祭酒衆隨行禮舉哀畢焚丹旐各退右奉移殯宫諏日行初祭禮設儀駕於殯宫門外陳饌筵八十一席羊二十七酒四十一尊楮製丹旐一楮帛四十萬五千張黃幕於二門外之右設反坫尊罍具齊集上食讀文祭酒送燎如前儀翼日繹祭陳饌筵十有一席羊五酒五尊棉帛三萬不設儀駕不齊集不讀祝惟恭理喪儀大臣內務府禮部工部光祿寺堂官執事餘如儀右初祭諏日行大祭禮陳設禮儀與初祭同翼日繹祭陳設禮儀與初祭次日繹祭同右大祭周月奠獻陳饌筵二十一席羊九酒九尊楮帛十萬皇子行禮儀與啓奠同凡月奠儀同右月祭內閣承㫖恭擬諡號敕工部製册寶諏吉行册諡禮前期遣官祗告於太廟後殿奉先殿至日設儀駕於殯宫大門外恭理喪儀王公大臣內務府總管率內府太常官進册寶案視內監設於几筵前兩旁內府官設御座於太和門正中鴻臚寺官設册寶案於御座之南左右鑾儀衛設黃亭於階下正副使素服於階下西嚮立禮部官預奉絹册寶陳亭內內閣官奉香册寶升階陳於案三叩退禮部堂官奏請皇帝素服御太和門升座正副使由東階升詣册寶案前一跪三叩興正使奉册副使奉寶由中階降陳於各黃亭跪叩如前禮畢皇帝還宫校尉舁亭御仗前導王以下入八分公以上齊集協和門外册寶亭至跪候過隨行民公侯伯以下四品官以上咸於殯宫大門外按翼序立册寶亭至跪迎亭由大門入至內門止禮部堂官奉絹册寶入授內官先陳於案退正副使詣亭前三叩恭奉香册寶由中門入陳于案三叩興鳴贊贊上香正使上香復原位贊宣册內官奉授宣册官於檻外宣訖仍授內官復於案宣寶儀同正使奉册副使奉寶授內官陳於凡筵左右行一跪三叩禮興由殿西門出太常贊引官引正使於殿外階上拜位立鴻臚官引皇子王以下入八分公以上於二門內四品官以上於大門外按翼序立上香奠帛讀祝三獻爵如儀奠獻均用內官祝文內官奉至門外讀祝官跪受讀畢仍授內官安設禮畢內官奉絹册寶祝帛授各執事官恭送燎所燎訖衆各退禮成正副使復命翼日頒詔天下右册諡百日奠獻陳饌筵二十五席羊九酒十有三尊楮帛十萬五千儀同初祭右百日祭期年小祥讀文致祭陳設禮儀與百日奠獻同右小祥再期大祥陳設禮儀與期年同三周致祭儀同右大祥二十七月行除服禮皇子喪服行奠獻禮王公百官隨行禮陳設禮儀與百日禮同祭畢皇子除服右除服皇朝文獻通考卷一百四十九
