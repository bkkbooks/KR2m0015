body:
  text: 欽定四庫全書皇朝文獻通考卷一百九十五刑考一臣等謹按古者以墨劓剕宫大辟為五刑自有虞氏肇始象刑鞭撲流宅之典興焉厥後寬猛各殊輕重異制隋唐以來作笞杖徒流死之法而五刑以定此馬端臨所謂聖人復起未能或易者也雖然法有定而情無定刑罰世輕世重在用之者權乎其時耳舜典臯陶曰宥過無大刑故無小周禮大司冦掌建邦之三典而異用以刑邦國其在吕刑曰上刑適輕下服下刑適重上服自古聖人立法以救世未有不因時凖情以用法而能輕重胥得其平者我朝自太祖宗肇造區夏維時俗淳刑簡所著為令鞭撲斬決而已世祖章皇帝除暴誅殘混一中外舉舊章而修明之特命儒臣纂輯大清律頒行天下於是斬絞徒流笞杖之條具而朝審秋審熱審之制詳酌相沿之制成維新之典猗歟盛哉聖祖仁皇帝大德涵濡彌復加意刑章增定律例益詳且盡而明罰敕法之意諄切反覆著之聖訓者藹然如見天地之心蓋至是久道化成勝殘去殺百有餘年矣民氣和樂而法久易弛骫骳者或且蘖芽其間世宗憲皇帝飭紀整綱雷行風動將使斯世斯民日遷善逺罪而不自知而於聖祖仁育義正之懷渾然無有二焉我皇上體列聖好生之心以為心承列聖弼教之治以為治御極之元年即諭重修律例折中損益書成奏進更定五年踵輯之令凡以申國憲正官方詰姦宄禁邪慝防微杜漸戒匪彛於已往而遏偭越於將來者罔不隨時更定權輕重而歸於至當洵不易之規臬風化之大防也至於振興明作矜慎周詳剔內外之積弊警法司之偏私懲廢弛迎合之陋習播之訓誥垂之令甲施之天下而民不寃傳之萬世而人可守雖古帝王明允協中之盛何以加兹若夫金作贖刑稽古定制國有赦典逾格推恩此又列聖相承仁之至義之盡所謂明慎用刑而不留獄宜大書特書以彰欽恤之盛軌者矣謹依馬氏作刑考五卷首刑制餘仍分類編輯云刑制天命五年命𥪡二木於門外凡下情不得上達者書訴牒懸諸木六年定死罪以下論功減免之例奉諭凡遇應死應笞應罰之罪必追論其功如係勤勞有功之人則當死者贖當罰者免當笞者戒飭而釋之人之功罪宜令相準臣等謹按此即八議中所謂議勤者開國之初以此為武臣勸自後兩朝遞加折中屢奉不得援免之旨至世宗憲皇帝修輯律例復為恃優恤而違理蹈愆者申明此律之不可幸邀俾人知警惕而重犯法大哉王言所謂政由俗革同歸於忠厚之意而已十一年申明屯牧田獵及商市違例各禁凡貝勒大臣併在外駐防之人及諸貝勒下牧馬管屯人等有事往屯毋得擅取莊民牲畜供給至田獵採捕不許逐殺麅鹿致疲馬力並禁止邊外行獵違者均治以罪其通商為市漏稅及私往外國交易者並罪之定告訐不實反坐之例嚴旗人恣意行遊及需索勒買之禁凡諸貝勒大臣屬下人等不許恣意行遊或私至漢官家索取馬匹鷹犬勒買器用等物違者罪之設十六大臣每旗二人聽斷獄訟嚴私鬻軍器於蒙古諸國之禁天聰元年嚴稽察賊盜之令奉諭近聞盜賊蜂起乘馬劫殺如管堡撥什庫有不修葺堡牆不稽察盜賊者與盜賊同罪如牧馬之人不查收馬匹縱賊竊乘及守門人役不行盤詰者亦與賊同罪定嚴宰牛馬驢騾之禁奉諭馬騾以便馳驅牛驢以資負載羊豕牲畜以供食用各有所宜非可任情宰殺也嗣後自宫中暨諸貝勒以至小民祭祀筵宴及殯葬所用牛馬騾驢永行禁止違者罪之三年嚴使臣需索之禁奉諭出差之人定例自備餱糧毋許科取民間食物近聞有違法妄行者不可不嚴為懲治爾諸臣皆受朕恩身居民上衣食亦已豐裕乃攫取貧民辛勤孳養之牲牢以供口腹貧民何所恃以為生乎逃亡背叛職此之由嗣後有需索食物者除凡人照常處分外若係管糧官筆帖式及巡臺人等處死又以遣土默特部落逃人諸臣中有不給馬匹及未會集公署者命畫地為牢禁飲食三日定殺降及劫掠降民者罪奉諭凡歸降者雖雞豚勿得侵擾俘獲之人勿離散其父子夫婦勿淫人婦女勿掠人衣服勿拆廬舍祠宇勿毁器皿勿伐果木如違令殺降淫婦女者斬毁廬舍祠宇伐果木掠衣服者鞭一百四年定藏匿姦細者罪奉諭今後有藏匿姦細者全家論死妻子為奴其親兄弟而異居者免罪定隱匿壯丁之罪奉諭今時值編審壯丁如有隱匿者將壯丁入官本主及牛録額真撥什庫等俱坐以罪至九年復諭年六十以上十八以上每家所有壯丁俱照例編審如隱匿者經人訐發首告之人準其離主所隱之人入官仍交刑部治罪其十家之長罰馬二匹永著為例五年設刑部承政參政啓心郎等官凡鬬毆竊盜田糧畜産及矢上失書姓名等事各該牛録額真即行審理有大於此者送部審理定家僕訐告諸貝勒離主條例先是太祖時凡訐告諸貝勒者準其離主後又更議諸貝勒如犯私通敵國及謀殺宗室兄弟罪身尚不存則原告之人又何主可離其以他事詰告者俱不許離主至是復議定離主條例一除八分外有私行採獵者其所得之物入官訐告者準其離主一除八分外出征所獲私行隱匿者以應分之物分給衆人訐告者準其離主一擅殺人命者原告準其離主被害人近支兄弟並準離主仍罰銀千兩一諸貝勒有姦屬下婦女者原告準其離主本夫近支兄弟並準離主仍罰銀六百兩一諸貝勒有將屬下從征效力戰士隱匿不報乃以並未效力之私人冒功濫薦者許效力之人訐告準其離主仍罰銀四百兩一本旗人欲訐告該管之主而貝勒以威鉗制不許申訴有告發者準其離主仍罰銀三百兩定詐稱喇嘛及私造廟宇者罪時姦民欲避差徭多相率為僧除明代舊建寺外私造日多特諭該部貝勒大臣詳察如係真喇嘛許居城外清淨寺焚修其擅稱喇嘛及私造廟宇者依律治罪嚴巫覡星士之禁奉諭凡巫覡星士妄言禍福蠱惑婦女誘取財物者殺無赦該管牛録額真章京及本主俱坐以罪有用巫覡星士者亦坐以應得之罪六年定首領索取旅次旗人財物之罪奉諭近聞滿洲蒙古行路之人於途次旅宿衛所首領輒往索錢今後有索取者罪之如不容宿而致死者償其人嚴賭博錢物之禁定訐告虛實之例奉諭凡有訐告諸貝勒者斷離主與否前已詳諭定例其餘彼此訐告者如告兩事以上重者審實輕者審虛免坐誣告罪仍準原告離主如告數欵輕重相符審實一欵亦免坐誣告罪如所告多實及虗實相等原告準離主所告多虛原告不準離主所告兩事以上而輕者實重者虛與告一事而情輕訴重者審實坐被告以應得之罪其原告仍坐誣告罪不準離主若子告父妻告夫及同胞兄弟相告果係反叛逃亡許告其餘不許若有告者被告者照常辦擬原告罪亦同不準離主定軍中擅奪人物者罪時軍中有擅奪蒙古人狐狼皮等物者奉旨為首者死為從者鞭一百貫耳鼻定臨陳退縮者罪奉諭凡臨陳退縮者貝勒等奪其部衆軍士處死妻子沒為奴定行獵為盜者罪上諭諸貝勒大臣曰凡出兵行獵時有為盜者論罪大小或殺或鞭久著為令乃此次行獵仍有盜鞍轡䩞屉等物者其嚴行查緝尋緝獲數人上以就彼地方處分恐衆人不知令解至瀋陽梟首以徇仍下令嗣後有不約束家人至為盜者罪及其主七年遣官頒欽定法律於科爾沁國土謝圖濟農十月復宣示外藩蒙古諸國八年定各蒙古貝勒擅奪有夫之婦給配他人及姦拐有夫之婦投别貝勒者罪上諭外藩各蒙古貝勒曰爾蒙古諸部落向因制法未備陋習不除今後諸貝勒奪有夫之婦配他人者罰馬五十匹駝五隻其納婦之人罰七九之數給與原夫姦有夫之婦拐投别貝勒者男婦俱論死取其妻子牲畜盡給原夫如貝勒不執送者罰馬五十匹駝五隻互見贖罪門定喪葬焚衣及殉葬違例者罪自貝勒以下牛録額真以上凡有死葬者許焚冬衣春夏秋衣各三襲庶人各一襲如舊衣不足毋得新製充數若逾定數及無舊衣而新製焚化者被人告發首告之人準離本主將焚化衣服賠出以二分入官一分給首告之人該管牛録額真等俱坐以罪婦人有殉葬其夫者仍行旌表若其妻不殉而強逼侍妾殉者其妻論死媵妾違例自殉者棄其尸仍令其家人賠婦人一口入官有首告者將首告之人準離本主夫族兄弟俱坐以罪崇德元年諭凡傳布訛言者處死時訛言將以童子合鐵鑄鐘故禁之二年申嚴劫掠降民之禁奉諭劫掠降民者該管章京及小撥什庫等一併治罪劫掠之人置之重典為首者斬以殉三年定擅奪俘獲婦女者罪上諭武英郡王阿濟格曰爾出略時順托惠奪額克親所獲婦人罪既審實何故止鞭五十而釋之前牛録章京哈哈納之子以姦淫俘獲婦人處死何彼罪偏重此罪偏輕情同罰異非爾瞻徇私庇乎法司定順托惠鞭一百貫耳鼻從之嚴出境貨買煙草之禁六年定私縱家人貿易致為盜者罪奉諭凡經商貿易必有主令之人宜於本旗地方或修市㕓或就家貿易近有縱家人混居别旗地方與别旗人合夥貿易者又有令其往來負販者俱按月勒索本息以致無計措辦遂糾合同夥為盜今後貿易等人有為盜者著令連坐既為貿易之主即有約束之責乃縱令自便有所獲則利歸於已茍為盜則罪歸於彼今立連坐之法自八家以下滿洲蒙古漢軍官員人等各令家人間散人等俱歸屯居住牛録章京及家長各嚴加稽察如不合歸屯居住者本牛録及家人撥什庫等俱坐罪七年嚴善友邪教之禁奉諭近有善友邪教非僧非道合羣結黨私造印劄惑世誣民凡列名於籍者三百餘人法司俱擬死罪朕加寬宥止誅為首十六人今後除僧道外凡從善友邪教者不論老少男婦殺無赦該管牛録章京撥什庫及本主不行察究者一例治罪八年定衝突儀仗者處死順治元年嚴姦民假托搜捕賊孽互相仇告之禁從大學士范文程請也諭旗人有強取民間一切細物者鞭八十貫耳定問刑衙門凖依明律治罪先是國初律令重罪有斬刑輕罪用鞭折至是凖用明律又諭諸土官民人等有將歸順人民徑充役使及給資貿易占踞行市虧損稅額者置之重典又命法司會同廷臣詳譯明律參酌時宜集議允當裁定成書從刑科給事中孫襄請也疏略曰刑之有律猶物之有規矩凖繩也今法司所遵乃故明律令就中科條煩簡情法輕重當稽往憲合時宜斟酌損益刋定成書頒示中外俾知畫一遵守刑不上大夫乃古者貴貴之義請自今文官犯罪先下吏部核議如所坐重大必請旨革職然後送刑部問擬武官𨽻兵部亦如之在外府州縣各官被參革職應逮問者行該撫按就近提訊具獄報讞法司但於爰書覆核不必徑行勾攝則士氣申而國體立矣比來風俗儇薄姦民健訟攖利嫁禍為害滋多請申飭內外各衙門凡經審結之案非竒寃積枉不得復起葛藤重滋株纍至於旁觀出首多屬傾誣百姓告訐官長尤為刁悖且民間婦女輒拘訊公庭亦傷廉耻之化俱乞嚴禁所全實多至治之世囹圄空虗晚季刑繁獄重甚非古人明慎用刑之意請敕法司各衙門務以清獄省刑為第一義非事關重大不得繫獄仍敕各撫按親詣郡邑查核即獄犯之多寡定有司之仁暴庶可漸幾刑措之治疏入悉如議通行並有是命嚴越訴之禁凡鬬毆及户婚田土細事止就道府州縣官聽斷歸結重大事情方赴撫按告理在京仍投通狀聽通政司察實轉送刑部五城御史有應受理送問者方準送問非機密重情入京越訴者加等反坐又命嚴緝姦細及煽惑百姓者治以重罪見聞不首者一體治罪定死罪依律分别絞斬應笞者折板刑部侍郎提橋疏言五刑之設死刑居二曰絞曰斬明律分别差等我朝法制罪應死者俱用斬刑請自今以後麗於重典者仍分别絞斬按律引擬至於應笞之人罪不至死若以板易鞕或傷民命宜酌減笞數以三鞭準一板從之定每年元旦令節七日上元令節三日端陽中秋重陽令節各一日恭遇萬壽聖節七日各壇廟祭饗齋戒以及忌辰素服等日並封印日期四月初八每月初一初二日皆不理刑名敕問刑諸官凡有以赦前事告訐者坐以違旨處分從御史李發元請也二年諭凡包衣達新收投充漢人於本分産業外妄行搜取較原給園地册內有浮冒者處死諭管莊撥什庫等凡圈占田地內所有民間墳墓毋許毁壞耕種所植樹木毋得砍伐違者罪之又敕修律官參酌滿漢條例分别輕重差等定杖流絞斬之律從刑科給事中李士焜請也嚴人民犯罪投旗之禁奉諭凡各省人民有既經犯罪欲圖幸免投充旗下者嗣後得實仍坐罪嚴旗人逼脅民人投充為奴之罪嚴旗人市買民物短價及強逼多買之禁嚴莊頭人等擾害村民之禁上諭戶部曰我國家底定中原滿漢官民俱為一家所以分給田廬原欲資其生養彼此交利貿易宜公近聞各處莊頭擅害鄉民勒價強買公行搶奪踰房垣毁倉廩攘其衣服資財少不遂意即恃強鞭撻甚至有揑稱土賊妄行誣告種種不法爾部遍行嚴查如有不遵法紀者俱行治罪傳諭各處撫按道府州縣各官不論滿洲及投充滿洲人有違禁犯法者即執送來京又敕法司詳察覆奏朝審熱審停刑舊例時御史薑金允奏明慎用刑重民命也斬之下有絞徒流笞杖不忍盡死人於法也斬有立決復有秋決於緩死中寓矜全也故歷朝有大理覆奏有朝審熱審又有臨時停刑蓋死者不可復生恆當慎之今修律之旨久下未即頒行非所以鬯皇仁也請敕部速行定律以垂永久得旨著作速彚輯進覽以便裁定頒行並有是命敕刑部修律但宜參酌同異刪除繁冗不必過為紛更從刑科給事中孫襄請也除割腳筋之法從刑科給事中李士焜請也嚴姦民託名滿洲之禁御史羅國士奏言滿洲僕從約束甚嚴近有姦宄之徒託名滿洲或悍僕借之以欺故主或狡吏借之以凌本官或賤役借之以侮縉紳或亡賴借之以傾富室種種為害不可枚舉請嚴飭中外以警刁風得旨著戶部通行嚴禁違者聽該地方官按律究治事涉滿洲者仍會同滿洲官審問定刑部不得濫收詞訟奉諭嗣後民間詞訟在外歸撫按監司在內歸順天府宛大二縣五城如有寃抑赴通政司投告察審送部問擬刑部不許濫收詞訟三年嚴漢人雜處旗下之禁奉諭京內盜賊竊發皆因漢人雜處旗下五城御史巡捕營官難於巡察之故嗣後投充滿洲者聽隨本主居住未經投充者不得留住旗下如違並其家主治罪工部疏於稽察亦著議處漢人居住地方著巡捕營查緝滿洲居住地方著滿洲守夜官兵查緝嚴漢人濫投旗下之禁御史蘇京奏投充名色不一率皆遊手無賴之人身一入旗奪人之田攘人之稼其被攘奪者憤不甘心亦投充旗下爭訟無已刁風滋甚祈敕部嚴禁從之定除貫穿耳鼻之刑舊例凡死罪減等者鞭一百貫穿耳鼻至是停止又大清律成命頒示中外臣等謹按開國之初律令未有一定廷臣屢以為言順治元年即奉詳譯明律集議裁定之旨二年以給事中孫襄言又奉參酌同異毋事過為紛更之旨至是書成統計十卷欽定刋布嗣經聖祖世宗兩朝屢加增訂及我皇上御極之初復命重修律例斟酌損益期於協中計律目一卷圖一卷服制一卷名例二卷吏律二卷曰職制曰公式戶律八卷曰戶役曰田宅曰婚姻曰倉庫上下曰課程曰錢債曰市㕓禮律二卷曰祭祀曰儀制兵律五卷曰宫衛曰軍政曰關律曰廄牧曰郵驛刑律十五卷曰賊盜上中下曰人命曰鬬毆上下曰罵詈曰訴訟曰受贓曰詐訛曰犯姦曰雜犯曰捕亡曰斷獄上下工律二卷曰營造曰河防總例七卷比引條例一卷凡四十七卷分四百二十六門縷析條分用昭畫一洵足憲百王而垂萬世矣定五刑之制一曰笞刑自一十至五十每十笞為一等凡五等用小竹板折責每十笞責四板旗人犯笞者以鞭代之二曰杖刑自六十至一百每十杖為一等凡五等用大竹板折責折數與笞刑等三曰徒刑發本省驛遞自一年至三年每半年為一等凡五等各依年限應役役滿回籍五􅑫各豫以杖自六十至一百有差到配折責四曰流刑安置逺方終身不返分二千里二千五百里三千里為三等三流並杖一百到配折責五曰死刑曰斬曰絞皆有立決監候之别五刑之外有較流徒加重者曰充軍發邊逺安置至康熙年間始分五等曰附近曰邊衛曰邊逺曰極邊曰煙瘴曰邊外為民發邊外安置曰雜犯流罪準徒四年曰賊犯斬絞準徒五年死刑之最重者為凌遲梟示又定獄具之圖一曰板以竹箆為之大頭徑二寸小頭徑一寸五分長五尺五寸重不得過二斤一曰枷以乾木為之長三尺徑二尺九寸重二十五斤一曰杻以乾木為之長一尺六寸厚一寸一曰鐵索以鐵為之長七尺重五斤一曰鐐以鐵為之連環重一斤徒罪以上用之命盜重案供辭不實男子用夾棍以挺木三根中挺木長三尺四寸旁木各長三尺上圓徑一寸八分下方濶二寸自下而上至六寸於三木四面相合處各鑿圓窩徑一寸六分深七分婦人用桚指以圓木五根為之各長七寸徑圓各四分五釐定刺字之法凡重囚應刺字者旗人刺臂奴僕刺面民犯徒罪以上刺面杖罪以下刺臂再犯者亦刺面逃犯刺左餘犯刺右初犯刺左者再犯纍犯刺右初犯刺右者再犯纍犯刺左字方一寸五分畫濶一分有半定死囚禁內監軍流以下禁外監婦人犯罪應禁者别置一室曰女監定耆民連坐之法僉都御史李日芃奏耆民與鄉約不同不過宣諭王化無地方之責若行連坐似於情法未協得旨耆民凡在九家內者一體連坐在外者不得株連又革鑾儀衛緝訪人役永著為令四年命嗣後夥盜誅其尤者二人獨行攘竊者斬無赦五年嚴私藏兵器之禁刑部議準嗣後除任事文武官員及戰士外不許收藏銃炮甲胄鎗刀弓矢等器違者本人處斬家産妻孥入官鄰佑十家長杖流至六年復以民無兵器不能禦侮反為賊利奉諭除火炮與甲胄仍照例嚴禁外其三眼鎗鳥鎗弓箭刀鎗馬匹等項悉聽民間存留又敕各官於該管地方嚴察盜賊失於舉報者俱治以罪窩盜之家處斬鄰佑十家長概不姑宥七年定章京以下披甲人等買喀厄魯特駝馬禁例每一次準買一匹多買者罪之馬入官包攬他人頂己名買者二人俱坐以罪馬入官不係披甲者概不許買犯者鞭一百駝馬入官居庸關以內一應官吏軍民人等俱不許沿途迎買違者以賊律擬罪至十二年以刑科艾穆布言又申私買馬匹之禁除各旗兵丁人役外如有馬販私買蒙古馬匹者滿洲責成固山額真梅勒章京牛録章京驍騎校小撥什庫漢人責成五城司坊等官各嚴行禁緝如禁緝不嚴被人捕獲將所獲馬匹賞給三分之一餘入官其該管各官一併治罪定隱匿錢糧者殺無赦仍籍沒家産人口入官互見􅑫流門八年申定職官有犯未奉旨革職毋得徑行提審奉諭大小臣工皆朝廷職官職官有體則朝廷體統益尊朕觀在外文武官必經撫按參劾奉旨革職然後提問今在京滿漢諸臣犯罪常有未奉旨革職問刑衙門輒提取審問殊非待職官之體自今以後凡在京滿漢諸臣有犯該衙門先將犯事緣由具奏請旨應革職提審者必奉旨革職然後送刑部提問毋得徑行提審著為令定投充旗人生事害民之罪本犯正法妻子家産入官本主及該佐領知情連坐本主不知情本犯罪不至死者不在此例互見徒流門又增設刑部理事官十四員九年命旗下莊頭及投充人等窩盜者一體依律治罪從兵科給事中王廷棟請也定職官交通姦盜律先是巨盜李應試潘文學二人盤踞都下多歷年所道路側目莫敢誰何至是皆因别事發覺立正典刑而兵科給事中李運長與李應試之姪李天鳯聫宗以兄弟稱事發之後仍藏匿天鳯子俱經內院刑部大臣鞫問得實奉旨將李運長正法仍諭嗣後內外文武官員有與姦盜往來者連坐十年停大臣犯罪鎖禁發門之例從給事中姚文然請也定宗室有犯除大罪請旨定奪外餘皆斟酌輕重永除鞭鎖之條從給事中劉餘謨請也十一年定旗下武職官員犯罪之例刑部奏滿洲蒙古漢軍武職官員犯罪舊例交刑部審理今議將犯罪重大者先交兵部議革後交刑部審擬緣事應贖身者免其贖身名色照漢官例改為罰俸從之又置督捕衙門專理緝逃捕冦事務設督捕司獄司置司獄二員十二年命有司講説律令兵科給事中魏裔介奏言各衙門只有律書一部小民不得與聞故犯法者衆請敕各督撫將刑律之有關於民者令有司春秋暇日為之講説并令學官常與士子講習從之定地方官擅取監犯病呈致死者依謀殺人律擬斬獄官禁卒聽從指使下手者依從而加功律擬絞從蘇松巡按孔光樾請也定滿洲世職官員犯罪降革之例兵部議覆戶部尚書陳之遴疏言滿洲官員犯罪多有籍沒家産革世職者實為太過滿洲世職多有登城殺賊死難捐軀而得今後軍前犯事者應照律例議及世襲等官其餘犯罪應照流銜酌議降革無流銜者亦照應降職銜住俸若犯重大另行題請得旨滿洲所得世職果係登城克敵捐軀盡忠者俱依議行如係恩詔考滿所得職銜仍照舊例行定衙役犯贓律上諭刑部曰朕覽參劾貪官本章贓私盈千纍萬及問結擬罪往往脫卸於衙役官既以贓輕免死而該役又止坐無祿輕條案墨未乾伊等即鑽營别衙門充役縱橫盤踞播惡無窮不加嚴處何以除民害而肅紀綱嗣後內外問刑衙門審究蠧役計贓定議不許援引無祿輕條凡情罪重大者分别絞斬其餘俱流徙該部即載律例內仍飭通行諭每年六月內審定立決重犯俟七月具題正法永著為例從左都御史龔鼎孳請也又頒行滿文大清律十三年嚴衙門蠧役之禁奉諭內外各衙門如有刁頑積蠧挾詐告訐誣衊官長或恐嚇挾制借端行詐者審問情真定行加等治罪又諭有擅入禁地聲寃抹項揑欵誣告者概不準行照律從重治罪定隨征軍士私自逃回初次者鞭一百遞發軍前二次者正法申定律例四事刑部條奏四事一旗下人犯充軍徒流罪止行鞭責以致姦宄無所懲創今後犯軍罪者枷號三個月犯流徙者枷號四個月犯徒罪者枷號一月仍照數鞭責職官本身及妻子俱照例準贖一竊盜例應刺字因久未舉行故盜不知警今後應照例刺字三犯者絞監候秋後處決一旗下人白晝搶奪者應枷號鞭責初犯刺一臂再犯又刺一臂三犯者即行正法一滿洲家人私結夥黨指稱隱匿逃人索詐民間財物三人以上為首者以光棍律正法為從係民人責四十板邊衛充軍旗人枷號三個月鞭一百如止二人依為從律得旨永著為例嚴商民下海交易之禁奉諭海逆未𠞰必有姦民暗通線索資以糧物今後有犯者不論官民俱處斬貨物入官本犯家産盡賞告發之人其地方文武官皆革職從重治罪地方保甲不行舉首皆處死臣等謹按海禁至康熙二十三年始開其貿易處斬之例俱停止惟出洋販賣硝磺者仍照例治罪定惡棍設法索詐之罪凡設法索詐財物者不分得財與未得財為首者立絞為從者民人責四十板邊衛充軍旗人枷號三個月鞭一百定貪官汚吏問擬斬絞按期處決之例時山東巡按劉允謙奏斬犯蠧書周一聘犯官張暉多贓未完請監候追完處決得旨貪官汚吏問擬秋決即按期處決何得以追贓未完又請監候以後凡係貪汚應秋決者不許再請停決著為例定捕務四欵侍郎吳達禮條奏凡解到正犯如有跟隨入署成羣探望者旗人鞭一百民人責四十板枷號一月凡起解逃人窩主地方官不嚴加杻鎖致脫逃者解役責四十板徙發地方官罰俸一年凡滿洲家人首逃者本部行題如誣鞭一百枷號一月民人赴督撫按首告不準方許赴部如誣責四十板枷號一月凡逃人自回者若不赴部圈鎖逃檔查出逃人之主鞕七十俱如議行嚴地方官隱諱盜賊之罪奉諭近見各處盜賊生發地方官懼罪隱匿以致益無顧忌嗣後著立刻申報速圖緝捕若仍前隱諱定行法外治罪十四年更定隱匿滿洲逃人之律先是順治元年隱匿滿洲家人者定擬重刑尋減為鞭笞後以議罪從輕罹法者多至三年定逃人鞭一百歸還本主隱匿之人正法家産籍沒鄰佑九甲長鄉約各鞭一百流徙邊逺本犯居某州縣即坐州縣以怠忽稽察之罪其知府以上各官不將逃人察解照逃人數多寡治罪其逃人自歸尋主者窩逃之人及兩鄰流徙七家之人各鞭五十該管官及鄉約俱免罪至六年定隱匿逃人者免死流徙兩鄰各責三十板十家長責二十板地方官俟計察時併議逃人自歸尋主或隱匿者自行送出一概免罪有親戚願贖回者聽至九年更定逃人一次拏獲者本人鞭一百歸原主隱匿之人并家産給與逃人之主二次拏獲者本人正法隱匿之人并家産解戶部其分家父子兄弟等無干涉者不許株連至十年復定窩逃者正法家産入官窩主自首者免罪逃人至兩次者仍鞭一百歸主至三次者正法至是奉諭秋審重犯半屬窩逃人命至重誰非朕之赤子著議政王貝勒大臣九卿詹事科道等官會議尋議窩逃犯人免死責四十板面刺窩逃字并家産人口入官從之互見徒流門定監犯不準援免之例刑部審擬盜犯塞秦塞得等應斬決援祖父伯叔兄弟陳亡例請從末減得旨盜案所犯重大豈可以祖父伯叔兄弟陳亡減死以後強盜不得援免申定私鑄錢文律和碩簡親王等會議凡私鑄錢文者為首及匠人處斬為從及知情買使者絞監候其賣錢經紀鋪戶興販攙和私錢者責四十板流徙尚陽堡互見徒流門總甲十家長知情不首者俱照為首例處斬不知情者坐失察責四十板徒一年該管地方官知情者亦照為首例處斬不知情者降級有差從之又宗人府議定郡王以上有大罪赴衙門審問小罪就其府第問之五年定行財説事及畨役私拷之罪九卿詹事府道會議刑部條奏凡行財説事計贓與受同罪如係勒抑索詐者與財人不坐番役獲盜未經送官私行拷打者枷責革役如得財及誣陷無辜者從重科罪從之嚴姦民假冒逃人詐害良民之禁奉諭近聞姦徒假冒逃人詐害百姓或借名告假還鄉結連姦惡將殷實之家指為窩主或原非逃人冒稱旗下在外嚇詐轉騙不已或有告到督捕買主冒認指詭名作真者或有聲言赴告在地方官處稟拏嚇詐良民者或告假探親肆行指詐及領木貿易縱夥攀害種種詐偽深為可惡今後凡有逃人本主即報明本固山額真梅勒章京牛録等官將逃人之主及逃人姓名具印結投部如逃後日久方報及獲逃人稱係伊家人者不準給主著入官直省地方有旗下告假私出妄為及冒稱旗下羣姦橫行者著該督撫嚴行訪拏解部查明並家主從重治罪議定理藩院大辟條例上諭理藩院曰朕覽爾衙門奏章於死罪重犯但稱處決毫無分别大辟條例多端若概為一例則輕重何别著議政王貝勒大臣會議定例尋議凡發貝子塜者截殺降人為首者劫奪死罪人犯為首者公行搶奪財物者與逃人通謀給馬遣行者挾仇行害放火燒死人畜者臨陳敗走者故殺人者以上八欵俱處斬夫私殺其妻者盜人口及駝馬牛羊者誤傷人命無中證可據有應坐故殺償命者以上三欵俱處絞又鬬毆傷重五十日內死者行毆之人處斬議上命永著為例定旗下投充人等有犯強盜者該撫按親審具題請旨正法其餘罪犯仍令解部審理十六年申定誣告之罪刑部議覆御史傅扆疏言誣告之徒若不立法嚴懲恐刁風難息嗣後有誣告人笞杖徒流等罪應照律加等科斷不準折贖誣告人死罪已決者反坐論死監候未決者本犯杖一百發邊衛充軍如以不赦罪誣人者雖遇赦不宥其誣告叛逆被誣之人已決者本犯擬斬立決未決者擬斬監候不得株連妻子家産如告人不即赴審輒行脫逃者將被告及證佐釋放本犯獲日不與審理仍以誣告擬罪從之嚴姦蠧窩訪賣訪之禁御史余縉奏言積蠧棍徒窩訪賣訪交結衙役欺朦問官種種惡習難以悉舉伊等身不在胥役之列而能驅使胥役捷於指臂事不登簡牘之迹而能飛騰簡牘幻於鬼神祈敕巡方諸臣嚴行查治下部議行犯者以光棍律擬罪定京城賊盜傷人該管官處分之例兵部以京城被盜傷人擬該管扎蘭達罰俸撥什庫鞭責上以所議太輕命將扎蘭達革職撥什庫送刑部擬罪著為例申定查解逃人事例先是順治九年議定凡州縣官地方逃人一名至十二名罰俸有差十三名降一級調用查解逃人十二名至二十四名紀録有差三十六名俟升轉之日加升一級知府知州則視其所屬州縣隱匿查解之多寡定其降罰紀録升級有差督撫亦視其所屬地方報解隱匿之多寡併議功罪武官營伍中有逃人冒名充兵者隊長百總把總外委責四十板至二十五板有差其衛千總守備都司遊擊降罰紀録加升照州縣例該管副將參將照知府例提督總兵官及掌印都司照撫按各道例尋又議凡隱匿逃人無論滿漢或係傭工或賃房屋與住有保人者罪坐保人傭工賃房之家及地方官鄰佑十家長俱免罪如無保人容留過十日者坐隱匿之罪逃人投宿店家越十日者店主治罪地方官查送者紀録夫妻父子同逃俱行歸來者隱主免查如半歸半留隱主鄰佑十家長照例治罪其逃人自回無隱主者兵部徑行歸結至十四年更定州縣官查解逃人至十五名加一級三十名不論俸滿即升知府三十名加一級六十名不論俸滿即升道員四十五名加一級九十五名不論俸滿即升巡撫巡按七十五名紀録一次一百五十名至三百名加級有差總督一百五十名至六百名紀録加級有差仍準功過相抵州縣解赴十五名後地方窩逃一名者功過不準相抵仍革職其知縣以上總督以下罰俸加級俱照先定例營伍等官功過照文官例其已獲逃人併窩主俱解督捕衙門審理民人首告逃人者如係挾仇誣害責四十板枷號一月民人自首身係逃人借端行詐者責四十板妻子家産人口入官其各處解來逃人審結後編刺給與伊主官員子弟逃走者亦照例鞭刺至是又定刺字逃人私出境外其經過州縣未能拏獲各官雖有查解之功應加級升轉者不準提敘仍罰俸半年各省道員責令嚴行保甲如所屬地方有失察逃人道員降級留任降後查解至四十五名復還原級逃人出邊或在盛京與未到京之先逃走者免刺字仍鞭一百給原主如無主逃人應入官者免鞭刺其畏罪潛逃或往屯過限十日之內拏獲者止鞭一百過十日者鞭刺十七年定訟師訟棍串通衙役詭名誣告詐財者照光棍三人以上例為首者立絞從者責戍從江寧巡撫衛貞元請也鑄稽察刑部送審告訐等事關防給在差刑科官又校定律例以盛京定例及屢奉諭旨並刑部定例分晰應入律各欵繕寫滿漢文册進呈嚴問刑官濫用夾訊之禁凡未有真贓確證及戶婚田土小事概不許輕用夾棍從左都御史魏裔介請也皇朝文獻通考卷一百九十五
