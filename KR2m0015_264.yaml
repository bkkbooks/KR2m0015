  text: 象緯考九月食上臣等謹按馬端臨所紀月食略於前代而詳於宋乾德至嘉定蓋可考者則存之耳今欽天監紀順治元年以來所遇月食與日食同例並序列之順治二年正月己亥望月食在星宿初度十六分食八分三十三秒丑初初刻三分初虧丑正三刻食甚寅正一刻十三分復圓閏六月丙申望月食在女宿八度十五分食十一分五十九秒戌初初刻初虧戌正初刻四分食既戌正三刻七分食甚亥初二刻十一分生光亥正二刻十四分復圓三年六月辛卯望月食在牛宿五度十九分食十二分四十九秒亥正三刻四分初虧子初三刻十四分食既子正三刻二分食甚丑初二刻四分生光丑正二刻十四分復圓十二月戊子望月食在鬼宿初度八分食三分五十二秒寅初三刻九分初虧卯初初刻五分食甚卯正一刻二分復圓五年閏四月己酉望月食在尾宿四度五十分食三分五十三秒酉正三刻三分初虧戌初三刻十四分食甚亥初初刻十分復圓七年四月己亥望月食在氐宿十四度四十六分食六分三十五秒丑正一刻一分初虧寅初三刻食甚卯初初刻十四分復圓九年八月乙卯望月食在室宿六度三十七分食八分三十六秒子正三刻二分初虧丑正一刻九分食甚寅正初刻一分復圓十年七月己酉望月食在危宿十六度二十四分食十五分四十九秒申正三刻一分初虧酉初二刻九分食既酉正二刻十分食甚戌初二刻十分生光戌正二刻四分復圓十二年十二月丙寅望月食在井宿二十一度二分食九分四秒丑正三刻一分初虧寅正一刻十一分食甚卯正初刻六分復圓十三年閏五月壬戌望月食在斗宿九度二十五分食十三分五秒戌初二刻十二分初虧戌正三刻四分食既亥初二刻九分食甚亥正二刻生光子初二刻七分復圓十一月庚申望月食在井宿十度六分食十五分四十七秒申正三刻初虧酉初二刻十一分食既酉正二刻十分食甚戌初二刻九分生光戌正二刻五分復圓十四年五月丁巳望月食在箕宿八度十九分食十分四十五秒丑正二刻五分初虧寅初二刻十二分食既寅正一刻十一分食甚卯初初刻九分生光卯正一刻一分復圓十一月乙卯望月食在觜宿十度三十分食三分二十五秒丑初二刻十四分初虧丑正三刻八分食甚寅正初刻一分復圓十六年閏三月丁丑望月食在氐宿五度五十分食七分三十六秒丑正初刻十分初虧寅初二刻十二分食甚卯初初刻十四分復圓十七年三月辛未望月食在亢宿六度九分食十六分四十二秒申初初刻九分初虧申正初刻十分食既酉初初刻八分食甚酉正初刻六分生光戌初初刻七分復圓九月丁卯望月食在奎宿七度五十八分食十八分十四秒酉正初刻初虧酉正三刻十一分食既戌初三刻十二分食甚戌正三刻十二分生光亥初三刻九分復圓十八年三月乙丑望月食在角宿六度三分食三分三十七秒亥正一刻六分初虧子初二刻三分食甚子正二刻十四分復圓康熙二年七月壬午望月食在虚宿六度五十一分食十分四十秒丑正初刻六分初虧寅初一刻二分食既寅初三刻十一分食甚寅正二刻五分生光卯初三刻十分復圓三年正月戊寅望月食在星宿初度十一分食十六分二十五秒戌正一刻十二分初虧亥初一刻五分食既亥正一刻六分食甚子初一刻七分生光子正一刻復圓五年五月乙未望月食在尾宿十五度食二分三十八秒丑正初刻四分初虧寅初初刻五分食甚寅正初刻七分復圓十一月壬辰望月食在觜宿初度四十九分食七分四十七秒戌正三刻二分初虧亥正一刻十三分食甚子正初刻八分復圓七年十月庚辰望月食在昴宿一度四十四分食五分三十一秒亥初二刻四分初虧子初初刻食甚子正一刻十分復圓九年閏三月癸卯望月食在軫宿九度五十分食八分酉初一刻七分初虧戌初初刻四分食甚戌正三刻二分復圓十年二月丁酉望月食在翼宿十五度四十六分食十七分七秒酉初初刻九分初虧酉正一刻三分食既戌初初刻十二分食甚戌正初刻七分生光亥初一刻一分復圓八月乙未望月食在室宿六度四十四分食十六分三十九秒子正二刻十一分初虧丑初二刻七分食既丑正二刻七分食甚寅初二刻七分生光寅正二刻三分復圓十一年二月辛卯望月食在翼宿四度四十五分食四分十一秒戌正三刻八分初虧亥正初刻八分食甚子初一刻八分復圓十三年六月戊申望月食在斗宿十九度三十六分食十一分四十一秒丑正一刻十一分初虧寅初二刻二分食既寅正一刻四分食甚卯初初刻六分生光卯正初刻十三分復圓十二月丙午望月食在井宿二十一度六分食十五分五十秒丑初一刻六分初虧丑正一刻二分食既寅初一刻一分食甚寅正一刻生光卯初初刻十一分復圓十六年十月戊午望月食在胃宿五度十分食六分酉初一刻十三分初虧酉正三刻十一分食甚戌正一刻九分復圓十七年閏三月丁巳望月食在氐宿五度四十八分食十七分四十四秒亥正二刻四分初虧子初二刻五分食既子正二刻四分食甚丑初二刻二分生光丑正二刻三分復圓九月癸丑望月食在婁宿七度十三分食十八分四十秒丑正一刻一分初虧寅初初刻十三分食既寅正初刻十三分食甚卯初初刻十四分生光卯正初刻十一分復圓十八年三月辛亥望月食在亢宿五度五十一分食四分三十七秒卯初初刻十一分初虧卯正二刻三分食甚辰初三刻九分復圓九月丁未望月食在奎宿八度四分食六分九秒酉初三刻二分初虧戌初一刻食甚戌正二刻十分復圓二十年正月己巳望月食在張宿十三度二十五分食七分五十二秒酉初一刻十分初虧戌初初刻四分食甚戌正二刻十二分復圓二十一年正月甲子望月食