body:
  text: 四裔考七西東布嚕特東布嚕特回部别種也在天山北凖噶爾部西南近葱嶺東北距伊犂千四百里其部有五共户二千有竒曰薩雅克鄂拓克者圗魯齊拜主之曰薩拉巴噶什鄂拓克者車里克齊主之兩頭目不相統别推一年長者名瑪木克呼里兼轄之曰霍索楚鄂拓克者邁他克主之曰啓台鄂拓克者喀喇博托主之兩鄂拓克析居塔拉斯地距薩雅克薩拉巴噶什鄂拓克六日程曰薩婁鄂拓克者阿克拜主之其酋長戴氊帽如僧家毗盧頂甚鋭捲末為簷衣錦衣長領曲夾至腰際束紅絲縧履紅革鞮頭目之婦辮髮雙垂耳貫珠環或一或二或三無定數衣冠履略同男子其民人冠無皮飾衣褐布帶革鞮其國舊遊牧處在特穆爾圗淖爾左右後為凖噶爾所侵始西遷寓居安集延乾隆二十年凖噶爾部平得復故地二十三年六月將軍兆惠等追捕逆賊哈薩克沙喇兵臨布嚕特界獲其頭目圗魯齊鄂庫遣侍衛烏爾金托倫泰往撫抵其游牧珠穆翰地恭奉諭㫖宣讀畢薩雅克薩拉巴噶什兩鄂拓克人衆俱以手加額曰我部久思投誠大皇帝為凖噶爾間阻不能自通今得為天朝臣僕實望外之幸言訖環向叩首歡聲振地時塔拉斯頭目邁他克子額什博羅適在其地亦願率所部來降托倫泰與俱往行六日至其地撫定霍索楚啓台兩鄂拓克人衆瑪木克呼里年九十餘形體肥平時趺坐腹垂至地不能逺行乃遣車里克齊圗魯齊拜尼沙三人獻牛羊百頭謁軍門兆惠等與之筵宴令觀軍營武藝咸驚詫曰天朝弓矢之利向固聞之至於有發必中層甲洞穿馬上三鎗連發五箭左右連射離馬及地騰躍而起此種竒特實罕聞見彼凖噶爾殘虐不道固宜破滅哈薩克素稱富强望風款附何有於我等區區小部落乎相與駭嘆不置同時邁他克遣弟舒庫爾喀喇博托遣姪哈畢齊來營投誠七月參贊大臣富德復遣侍衛伊達木扎布至薩婁鄂拓克阿克拜聞恩㫖招撫亦深感恱偕其姪車里黑葉里黑所轄共五千户及愛達爾伯克分領之百餘户來歸于是東布嚕特全部皆內附尋遣使臣朝京師詔扈木蘭行圍賜宴萬樹園觀燈火二十五年正月布嚕特阿集必依遣使西拉噶斯來召見於勤政殿賜宴六月又遣使臣來貢二十六年部長額穆爾且以其所寶之玉匕首來獻自是遵奉正朔每來朝貢焉臣等謹按漢書西域傳烏孫南與城郭諸國相接所謂城郭諸國者指天山以南葱嶺以東之三十六國而言東自車師西迄疏勒其北境皆與烏孫接特烏孫在山北諸國在山南耳今回部喀什噶爾城為古疏勒地踰山而北即今東布嚕特之薩雅克薩拉巴噶什諸部落是東布嚕特之在漢當屬烏孫西境地矣漢書又稱烏孫本塞地大月氐西破走塞王塞王南越縣度大月氐居其地後烏孫昆莫破大月氐大月氐西臣大夏而烏孫昆莫居之故烏孫民有塞種大月氐種是月氐未為烏孫所破時實居塞王故地在葱領之北也塞王南越縣度之後地屬月氐月氐西臣大夏之後地屬烏孫今東布嚕特諸部正當葱嶺之北是即昆莫當日西居月氐之地為烏孫西鄙無疑漢書又稱烏孫不田作種樹隨畜逐水草與胸奴同俗今東布嚕特諸部無城郭逐水草與迤東之凖噶爾同俗是亦烏孫之舊俗也夫西布嚕特西布嚕特與東布嚕特相接在回部喀什噶爾城西北三百里道由鄂什踰葱嶺而至其部落凡十有五最著者四曰額德格納鄂拓克曰䝉科爾多爾鄂拓克頭目阿濟畢兼轄之户七百有竒曰齊里克鄂拓克頭目由瑪特户二百有竒曰巴斯子鄂拓克頭目噶爾住户千三百有竒部落雖分而駐牧同地東南扼葱嶺西迄布哈爾諸部落共二十餘萬人逐水草事游牧其風俗衣冠略與東布嚕特同舊為休循捐毒地其國素仰天朝德化久思內附以兵阻未得通乾隆二十四年將軍兆惠既定山南回部追捕餘孽道經其地遮道籲請內附乃遣二等侍衛達克塔納等往撫阿濟畢奉將軍書曰額德格納布嚕特部小臣阿濟畢恭祝大皇帝萬萬夀恭呈如天普覆廣大無外如受養生素賚滿佛之鴻仁如古伊斯干達里之神威如魯斯坦天下無敵之大勇富有四海乾隆大皇帝欽命將軍之前今將軍自喀什噶爾傳諭我部頒給印文謹已奉到不勝踴躍適慰心想當率諸都自布哈爾迤東二十萬人衆皆作臣僕兆惠嘉其誠表於朝詔受之十五部落皆內附諸頭目以未出痘不敢入中國乃遣由瑪特之兄呼達里朝京師詔與觀大閲賜宴觀燈火二十五年八月遣侍衛索諾穆䇿凌等往賜之敕至額德格納齊里克部其頭目阿濟畢等咸歡躍踰望郊迎祗受盡禮二十七年十二月遣使來朝先是二十三年九月初三日布嚕特使臣車里克齊等來朝初六日布嚕特使臣舍勒伯克來朝初八日布嚕特使臣舒庫爾來朝俱賜宴加賚又初七日將軍富德奏右部哈薩克及塔什干城回人遣子弟入覲上以西域諸番部降附來朝自乙亥丁丑戊寅三年皆適㑹於布呼圗口地靈佳兆若有神異賜名曰伊綿峪云臣等謹按漢書捐毒國至疏勒南與葱嶺屬西上葱嶺則休循也西北至大宛北與烏孫接據此則休循之東為捐毒捐毒南為疏勒捐毒北為烏孫烏孫據有月氐之地月氐之先本塞王地以一方形勢考之北則烏孫南則捐毒捐毒以西則休循大宛則當休循捐毒之西北而東又與烏孫據有月氐之地相接今之東布嚕特既為古烏孫則今之西布嚕特其為休循捐毒二國地無疑又休循捐毒皆在葱嶺外二國相屬附葱嶺而居今喀什噶爾西鄂什一帶統屬葱嶺休循捐毒當在其西北麓班史所謂西上葱嶺者由鄂什口西出葱嶺也今西布嚕特之蒙科爾多爾諸部落道由鄂什出葱嶺則諸部正當其麓益信其為休循捐毒故地矣安集延瑪爾噶朗霍罕納木干附安集延東與東布嚕特部南與西布嚕特部接東南至回部喀什噶爾城五百里其西北為納木干西為瑪爾噶朗又西為霍罕四城俱當平陸南控葱嶺北濵河名那林郭勒從東布嚕特境西行過安集延城北又西過瑪爾噶朗城北又西過納木干城北又西過霍罕城南南北山泉支流會合襟帶諸城之間土膏沃衍氣候和煦人民殷庶畜牧饒富其人亦布嚕特種奉回教習帕爾西語其頭目冠髙頂皮帽其頂尖衣錦衣束紅巾穿紅革履其婦辮髮雙垂不束帛不綴珠衣鑲邊錦衣及翠㲲衣履與頭目同民人戴白氊毛皮為邊衣黃褐以金絲緣袖穿革鞮其地則皆古之大宛國也安集延納木干瑪爾噶朗霍罕等地諸城皆有伯克而霍罕城伯克額爾德尼為之長衆咸聽命乾隆二十四年將軍兆惠追捕霍集占遣侍衛達克塔納等撫定布嚕特諸部至其地額爾德尼伯克遣都官伯克迎至城內日饋特羊瓜果酒米及氊毺馬匹諸物備極誠敬使旋遣頭目托克托瑪哈默特等謁軍門上額爾德尼所奉表并上將軍書曰額爾德尼伯克等請大皇帝欽差統兵至威至勇如達賚扎木西特之將軍等安仰賴上天之德大皇帝洪福吾等羣生亦獲安業聞將軍至葉爾羌喀什噶爾後布嚕特哈薩克等衆部落俱傳檄安定而我部檄書未至日夜以兾幸侍衛齎將軍書來我等得為大皇帝臣僕永受康寧不勝感恱於是安集延等四城咸內附遣托克托瑪哈默特等朝京師貢馬賜宴瀛臺二十五年正月安集延額爾德尼伯克遣使臣托克塔瑪特入貢宴賚有加與觀燈火八月遣侍衛索諾穆䇿凌等齎敕往諭額爾德尼伯克率屬郊迎祇受成禮二十六年使臣巴巴什克入覲二十七年十二月額爾德尼伯克遣使來朝二十九年七月奉上諭據五吉納世通等將阿布却里雅木私下遣人寄書與霍罕額爾德尼伯克唆使謀叛之處審明定擬具奏阿布却里雅木原係霍集占黨羽早應正法之人因霍集占逃竄後伊看守喀什噶爾城池投順大兵是以寬宥其罪補放伊什罕伯克伊不知感恩反起意作亂其情甚屬可惡阿布却里雅木著照所擬凌遲處死仍梟首示衆伊所有子嗣俱著正法伊之婦女并伊弟兄家屬俱一并送京將伊家産抄沒其知情前往額爾德尼伯克處送書之果帕和卓哈爾默特著即處斬其餘著照伊所奏辦理噶岱默特感戴朕恩訪知此事禀告納世通甚屬可嘉著施恩賞緞十匹納世通著交部議叙至托穆齊圖從前去時原將阿布却里雅木之人一併帶往其私下遣人寄信與額爾德尼伯克之處縱不覺察而額爾德尼伯克與伊等接見時舉止傲慢並未出迎伊等回來時並不據實禀告仍虛揑掩飾甚屬不堪著將托穆齊圗之翎摘去仍交部嚴加議處永貴在彼失察亦交部察議三十五年霍罕伯克那爾巴圗遣使拜默特來京恭祝萬夀上御同樂園召見賞賚有差四十八年正月奉諭從前安集延回子阿布拉因在葉爾羌私行販賣玉石拿獲審明擬絞解京監禁現據該屬伯克那爾巴圗由逺方感激朕恩遣使鄂布勒克色穆前來請安奏稱那爾巴圗懇恩請將阿布拉賞給等語著照那爾巴圗所請將阿布拉釋放交伊使臣鄂布勒克色穆帶回原處並著該部遍行烏什葉爾羌喀什噶爾駐防大臣等一體辦理瑪爾噶朗東與安集延接相去百八十里南揖葱嶺北濵那林河西亦有河出葱嶺北山北入那林河霍罕東與瑪爾噶朗接其城相去二百里北濵那林河踰河南揖䓤嶺納木干東北與布嚕特雜處東南距瑪爾噶朗城八十里西南距霍罕城八十里南濵那林河有水出城北山南流入那林河臣等謹按漢書稱自車師前王廷隨北山波河西行至疏勒為北道西踰葱嶺則出大宛康居奄蔡諸國今喀什噶爾為古疏勒其北踰葱嶺必經鄂什是即古時自疏勒西踰葱嶺出大宛之北道也又休循在葱嶺西捐毒附葱嶺而居西北皆當大宛而捐毒稍東其北尚與烏孫接自今鄂什出葱嶺之道計之葱嶺西北為休循休循西北為大宛也休循捐毒夲塞種不土著無城郭為今之布嚕特無疑由是西北為安集延又西為瑪爾噶朗又西為霍罕北為納木干皆有城郭土著與史記大宛土著耕田有城郭屋室之說合則今安集延四城為古大宛地無疑元魏以洛那國為古大宛云在疏勒西北方位非誣唐之拔汗那即魏破落那而更名寧逺者是安集延諸城在漢為大宛在唐又為寧逺也塔什干塔什干東南與納木干接東與布嚕特接東北與右部哈薩克接南距回部喀什噶爾城一千三百里居平原有城郭以三和卓分轄其衆曰默勒多薩木什曰沙達曰圗爾占由塔什干西南行七百里外踰錫爾河又踰那林河為薩瑪爾罕城又西南為哈拉科子城又西臨達里岡阿鄂謨西境盡矣在漢為康居西境大宛北鄙唐則石國地也其部舊為凖噶爾羈屬嵗貢差役伊犂平後右哈薩克將脅服其部圗爾占不從默勒多薩木什者哈薩克所置和卓也為圗爾占所逐哈薩克之兵久而不解乾隆二十三年參贊大臣富德追擒哈薩克沙喇至其地遣䝉固勒岱赫善等往撫次軍於莽格特城外以待之䝉固爾岱赫善乃諭哈薩克降復憫塔什干之受兵於哈薩克也因諭哈薩克圗里拜等以睦鄰守土之義並宣示聖主威福遂大感悟釋爭相好如初於是默勒多薩木什圗爾占等獲安耕牧遣其屬默尼雅斯奉表降詔受之其文曰臣默勒多薩木什跪奏大仁至聖普冒羣生大皇帝恭惟天使惠臨臣土臣不勝歡躍奉承諭㫖若開瞽矇蠢兹邊末敢備外藩岡或有二心所有準孽額什木扎布謹獻闕下外臣草莽冀隨星軺仰瞻聖容躬服彛訓回歸游牧宣示臣等永永無極九月默尼雅斯入朝又塔什干回人吐爾占貢馬稱臣恭遣子弟入覲賜宴避暑山莊額什木扎布阿睦爾撒納兄子也亡命入回部為塔什干所得至是附貢使以獻上恩宥其死而遣還之自是朝貢不絶臣等謹按北魏時康居五王分為九姓後稍西南遷居漢大宛西北北史謂康居之後舊居祈連山北昭武城因被丐奴所破西踰葱嶺唐書謂九姓昭武始居祈連北為突厥所破南依葱嶺即此是也今塔什干城在哈薩克西安集延諸部北當葱嶺直北四百里外應即古所謂昭武城者是以南遷則依葱嶺西遷則踰葱嶺也巴達克山巴達克山居于葱嶺中南境西北至伊西洱庫爾東北去葉爾羌千餘里有城郭其汗曰素爾坦沙部落繁盛户十萬有竒頭目戴紅氊小帽束以錦帕衣錦㲲衣腰繫白絲縧足穿黑革鞮女則被髮雙垂餘與男子同其民人帽頂制似葫蘆邊飾以皮衣黃褐束白絲縧足穿黑革鞮亦有用黃牛皮者婦人不冠被髮雙垂衣紫㲲餘與男子同其國負山險扼葱嶺之右頗擅形勢有河北流經博羅爾巴達克山兩部落之間至伊什得特克分流一流經北入圗斯庫爾一流道西南又北入於伊西洱庫爾其北鄙之城曰瓦漢在漢烏秅國地乾隆二十四年八月回部逆酋波羅尼都霍集占為王師所敗奔巴達克山副將軍富德率師追之遣諭其汗素爾坦沙宣示博羅尼都霍集占負恩悖逆狀令擒獻是時二賊方竄入巴達克山之錫克南村詭稱假道往墨克乃逸去肆掠村落素爾坦沙因縛博羅尼都而以兵圍霍集占于阿爾渾楚哈嶺賊退保齊那爾河素爾坦沙以其屬進戰賊不能支傷背及胯乳擒之囚之于柴扎布柴扎布者巴達克山繫囚處也素爾坦沙乃遣人詣軍門投款且報二賊就擒副將軍富德鑒其忠順遣使者往諭責令獻俘進軍瓦漢以待之是時溫都斯坦方以兵臨巴達克山謀劫霍集占兄弟而塔爾巴斯者巴達克山讐國也賊將通之攻巴達克山所遣使被獲乃遷霍集占於密室以二百人圍而殺之初素爾坦沙以二逆酋與已同派噶木巴爾裔欲縳獻恐諸部不從難之富德反覆曉以順逆利害之故遂大覺悟曰我屬為大皇帝臣當同所惡且豈忍以兩凶故貽數萬生靈患耶乃刃二酋出逆尸馳獻率其部落十萬户與博羅爾部三萬户俱降二十五年遣陪臣額穆爾伯克等朝京師貢刀斧及八駿馬二十六年正月上召見額穆爾伯克巴圗爾伯克等賜賚如例二十七年素爾坦沙遣使阿布斯爾咱木來朝上御大西門幄次閲健鋭營軍俾與觀焉二十八年三月素爾坦沙貢馬犬鳥鎗腰刀至由是職貢不絶云臣等謹按漢書皮山國西南至烏秅國千三百四十里皮山在於闐國西今自和闐西行至巴達克山亦千三百餘里其國居葱嶺南境四面皆山與班史烏秅國山居之說相合則今之巴達克山在漢為烏秅國也又魏書載阿鈎羌國在莎車西南西有縣度山漢書亦云烏秅國西有縣度莎車今之葉爾羌在巴達克山東北亦與阿鈎羌國在莎車西南之說合又權於摩國去代一萬二千九百七十里阿鈎羌國去代一萬三千里二國相距止三十里當屬毗聫之境疑漢時統為烏秅至魏乃分兩國東屬權于摩故去代較近西屬阿鈎羌故獨與縣度相接也唐書不載烏秅權於摩阿鈎羌諸國有碣盤陀者由疏勒西南六百里至其國今之喀什噶爾古疏勒地西南六百里至巴達克山道里適符城居山內河抱城東所謂治葱嶺負徒多河者形勢可驗至元史載有巴達哈傷明史載有八答黑商其音與巴達克山相近疑即此地然元史不載逺近道里而明自陳誠使西域一至其地名號粗傳天順後絶不復至重以中外譯音倣佛同異猝難審證聊附存以備考云博羅爾博羅爾在巴達克山東有城郭户三萬有竒四面皆山西北面有河乾隆二十四年與巴達克山同時內附遣陪臣沙伯克等朝京師二十五年正月召見沙伯克等宴賚如例二十七年十一月博羅爾伯克沙呼沙默特貢斧匕首諸物其南有小部落曰溫都斯坦産金絲緞霍集占走巴達克山時溫都斯坦方以兵相攻謀劫霍集占不果後其部為愛烏罕所并二十九年正月博羅爾沙呼沙默特遣使呼達達特入朝是時博羅爾與巴達克山屢行搆釁圍城劫掠沙呼沙默特乞援于駐劄葉爾羌都統新柱遣諭巴達克山恪遵約束還俘罷兵至是沙呼沙默特以其部所寶之匕首進貢謝恩三十四年又進玉欛雙匕首愛烏罕愛烏罕在巴達克山西部落最大有三大城曰喀奔曰堪達哈爾曰默沙特喀奔城南北西面俱臨山東面地多平曠堪達哈爾城四面俱山其汗愛哈默特沙居之默沙特城舊屬伊蘭愛哈默特沙征取之並兼有溫都斯坦地遂統治三城俗事耕種無游牧人民廣稠勝兵十有五萬軍器則鳥鎗長鎗腰刀之屬不用弓矢善田作户有餘糧少物采自兼并溫都斯坦部後資其金絲緞匹諸物物力加豐其人亦有奄豎名曰巴爾什和特多取諸溫都斯坦者别部商人不至其國乾隆二十四年大兵逐霍集占將入愛烏罕境為巴達克山酋素爾坦沙擒獻其屬下有奔愛烏罕者具以情告愛哈默特沙以霍集占之見殺將問罪於巴達克山先遣使往素爾坦沙懼以御賜燈二盞及文綺往遺並言霍集占負大皇帝恩內地兵力甚盛設不擒獻則巴達為墟凡諸不得已狀愛哈默特沙云大清國地廣人稠見於記載未知道里近逺今擬與爾部偕往投誠大清國諒能容我乾隆二十七年十二月遣使臣密爾漢來朝宴賚優渥二十八年三月愛烏罕遣使和卓密爾哈貢馬又所屬有阿拉克巴拉斯阿爾雜拜延俱舊𨽻伊蘭者由喀奔至堪達哈爾二十八日程由堪達哈爾至默沙特二十日程其北境接布哈爾西有默克孔志爾等數部落中隔沙漠過此為西海南有思布部落過思布亦海也臣等謹按漢書出西域分二道北道西踰葱嶺通大宛南道西踰葱嶺入大月氐今愛烏罕部在葱嶺西以方位考之應屬漢大月氐地初方以霍集占見殺之故欲問罪於巴達克山及聞聖天子德威之盛遂乃翻然革面慕義輸誠不煩尺書寸刃而聲靈所及重譯駢來且其國西境逾一二小部落已瀕西海更推論之北則俄羅斯瀕北海立界守約所謂六合為家莫有盛於今日者也皇朝文獻通考卷二百九十九
