body:
  text: 兵考八直省兵福建浙江八旗駐防福州將軍一人駐劄福州府副都統一人統轄協領八人佐領八人防禦八人驍騎校十六人八旗滿洲領催一百六十名前鋒二百名驍騎一千二百名步軍三百二十名弓匠箭匠鐵匠四十名兼轄左右營緑旗兵及水師一營緑旗左營兼中軍副將一人中軍都司一人千總二人把總四人兵九百三十名右營遊擊一人中軍守備一人千總二人把總四人兵九百三十名水師營協領一人佐領二人防禦二人驍騎校六人領催三十名鳥鎗兵二百四十名弓箭兵七十名大刀兵四十名挑刀兵四十名藤牌兵九十名炮手四十名捕盜兵十名水手十六名船匠八名教習兵二十四名康熙十九年設福州駐防將軍一人副都統二人協領參領各四人防禦驍騎校各二十人撥杭州駐防漢軍左翼四旗驍騎步軍一千七名改駐福州又增兵一千名設領催二百四十二名驍騎一千四百十八名步軍三百四十七名鐵匠十九名兼管標下緑旗營官兵二十九年於福州駐防驍騎額內分設鳥槍領催一百四十二名鳥槍驍騎九百五十四名領催一百名驍騎四百六十四名五十七年定福州駐防兵額內一半充為馬兵一半充為步兵雍正元年以福州駐防步軍三百四十七名為鳥槍兵六年設福州駐防水師營協領一人佐領防禦各二人驍騎校六人水師五百名於駐防漢軍餘丁內選補教習兵一百名由海壇閩安二營緑旗兵內選撥入水師營遇缺開除即以本營水師兵充額乾隆十九年定福州駐防改用八旗滿洲設滿洲協領一人防禦一人佐領驍騎校各二人其驍騎步軍各兵均由在京八旗滿洲發往充額原設之四旗漢軍各官兵悉令出旗送部分别去留改補緑旗營二十八年令福州駐防水師營漢軍兵悉陸續出旗分别改補緑旗營由京撥議裁之鄭家莊兵六百十二名充額如不敷數再於八旗滿洲兵內發往三十二年撥天津水師營議裁兵二百二十九名充福州兵額三十四年裁福州駐防步兵八十名三十五年裁福州駐防佐領八人四十四年裁福州駐防副都統一人緑旗營閩浙總督一人駐劄福州府統轄本標官兵及水師營兼節制撫標二提標三鎮標十三臣等謹按順治二年設浙江總督駐杭州府五年改為閩浙總督駐衢州府兼轄福建十五年分設兩省總督以福建總督駐福州府浙江總督駐杭州府康熙八年併歸福建為閩浙總督九年又分設兩省總督移福建總督駐漳州府十一年仍駐福州府二十三年裁浙江總督仍併為閩浙總督駐福州府兼轄浙江雍正五年又分設兩省總督十二年復併為閩浙總督督標中營中軍副將一人中軍都司一人千總二人把總四人兵一千一百六名左營參將一人中軍守備一人千總二人把總四人兵一千一百七名右營參將一人中軍守備一人千總二人把總四人兵一千一百七名南臺水師營參將一人駐劄南臺中軍守備一人千總二人把總四人兵九百名福建巡撫一人駐劄福州府統轄本標官兵撫標左營兼中軍參將一人中軍守備一人千總二人把總四人兵六百四十五名右營遊擊一人中軍守備一人千總二人把總四人兵六百四十五名福建水師提督一人駐劄厦門統轄本標官兵及分防各營兼節制鎮標四提標中營中軍參將一人中軍守備一人駐劄海澄縣千總二人把總四人兵九百六十名左營遊擊一人駐劄龍溪縣石碼中軍守備一人駐劄厦門千總二人把總四人兵九百六十名右營遊擊一人中軍守備一人千總二人把總四人兵九百六十名前營遊擊一人中軍守備一人千總二人把總四人兵九百六十名後營遊擊一人中軍守備一人千總二人把總四人兵九百六十名閩安協副將一人駐劄閩縣兼轄烽火門營左營兼中軍都司一人駐劄連江縣中軍守備一人千總二人把總四人兵八百十六名右營都司一人駐劄大西洋中軍守備一人千總二人把總四人兵八百十六名兼轄烽火門參將一人駐劄霞浦縣中軍守備一人千總二人把總四人兵九百十二名銅山營參將一人駐劄漳浦縣銅山城中軍守備一人千總二人把總四人兵一千二百名金門鎮總兵官一人駐劄同安縣統轄本標官兵鎮標左營兼中軍遊擊一人中軍守備一人千總二人把總四人兵一千一百五十二名右營遊擊一人中軍守備一人千總二人把總四人兵一千一百五十二名海壇鎮總兵官一人駐劄福清海壇汛統轄本標官兵鎮標左營兼中軍遊擊一人中軍守備一人千總二人把總四人兵一千一百五十二名右營遊擊一人中軍守備一人千總二人把總四人兵一千一百五十二名南澳鎮總兵官一人駐劄廣東之南澳兼屬兩廣總督及廣東提督節制統轄本標官兵鎮標左營兼中軍遊擊一人駐劄詔安縣右營𨽻廣東中軍守備一人千總二人把總四人兵一千一百五十九名臺灣鎮總兵官一人駐劄臺灣府統轄本標官兵及分防各營鎮標中營中軍遊擊一人駐劄中路口中軍守備一人千總二人把總四人兵九百十名左營遊擊一人駐劄北路口中軍守備一人千總二人把總四人兵九百三十名右營遊擊一人駐劄南路口中軍守備一人千總二人把總四人兵九百三十名臺灣城守營參將一人駐劄臺灣府左營兼中軍守備一人千總一人把總二人兵五百名右營守備一人千總一人把總二人兵五百名臺灣協副將一人駐劄安平鎮中營中軍遊擊一人中軍守備一人千總二人把總四人兵八百五十名左營遊擊一人中軍守備一人駐劄築港千總二人把總四人兵八百名右營遊擊一人中軍守備一人千總二人把總四人兵八百五十名澎湖協副將一人駐劄媽宫汛左營兼中軍遊擊一人中軍守備一人千總二人把總四人兵一千名右營遊擊一人中軍守備一人千總二人把總四人兵一