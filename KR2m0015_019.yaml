body:
  text: 欽定四庫全書皇朝文獻通考卷十九戶口考一臣等謹按古者夫家之數稽於司徒生齒之版登於天府蓋有德而後有人即戶口之登耗可以徴治理焉而夫布口算之則亦國家惟正之供與田賦並列者也馬端臨通考戶口一門備載厯代戶口丁中賦役附以奴婢續考因之我朝土宇皈章靡逺不屆國初立編審法以稽人民之數後定為五年一舉丁增而賦亦隨之聖祖特頒恩詔自康熙五十年以後滋生人丁永不加賦天恩浩蕩亘古未有至直省丁徭多寡不等率沿明代之舊有分三等九則者有一條鞕徵者有丁隨地派者有丁隨丁派者後皆次第改隨地派俾無業之民永免催科之纍加以列聖重光休養生息戶口之版日增月益自書契以來未有如今日之蕃衍者益以徵太平一統之盛超軼曩古也若夫八旗壯丁既庶且繁編審之規載於會典亦宜持書凡二卷戶口丁中賦役直𨽻布政使司人丁每口科銀三分至二兩六錢五分七釐不等奉天府屬人丁每口科銀一錢五分至二錢不等江南江蘇布政使司人丁每口科銀一分四釐零至二錢零不等科錢五文零不等安徽布政使司人丁每口科銀五分至五錢一分九釐零不等鹽鈔小口每口科銀七釐四毫零山西布政使司人丁每口科銀一錢至四兩五分三釐六毫不等更名屯丁每丁科銀一錢至三錢零不等山東布政使司人丁每口科銀五分三釐九毫零至七錢八分零不等收併衛所每丁科銀二錢至三錢五分零不等河南布政使司人丁每口科銀一分至一兩二錢零不等收併衛所每丁科銀二分至一兩五錢零不等陜西西安布政使司人丁每口科銀二錢甘肅布政使司人丁每口科銀二錢臣等謹按舊會典西安等處民丁自四分四釐九毫零至七兩三錢八分九釐不等鞏昌等處民丁自三分二釐六毫零至八兩七錢七分八釐五毫零不等又有更名地收併衛所地監牧地其丁銀亦有多寡不同兹據新會典所載見行之例而附見舊例於此浙江布政使司人丁每口科銀一釐至五錢七分二釐五毫不等科米二合三勺至三升三合零不等江西布政使司人丁每口科銀三分二釐零至一兩三錢四分六釐三毫不等鹽鈔小口每口科銀二釐六毫零至九釐五毫零不等湖北布政使司人丁每口科銀一錢五分四釐四毫零至六錢四分三釐八毫零不等湖南布政使司人丁每口科銀三分零至八錢三分五釐零不等四川布政使司人丁每口科銀一錢二分零至五錢一分九釐一毫零不等福建布政使司人丁每口科銀八分三釐九毫零至二錢九分一釐零不等鹽鈔小口每口科銀一分四釐七毫至一分八釐一毫零不等廣東布政使司人丁每口科銀一釐九毫零至一兩三錢二分六釐零不等廣西布政使司人丁每口科銀一錢五分零至四錢五分零不等雲南布政使司人丁每口科銀三分至五錢五分不等貴州布政使司人丁每口科銀一錢五分零至四兩零不等順治十三年戶部議定賦役全書內惟江西福建廣東有婦女鹽鈔銀按口徵派不等他省無婦女名色其鹽鈔銀均派地丁內仍照舊行康熙十一年議賦役全書內直𨽻有流寓人丁山西有久流近流人丁改為實在人丁幼丁改為新編人丁浙江等省婦女小口徭銀改為食鹽鈔銀臣等謹按丁稅之法以貧富為差分上中下三等其科銀之多寡各省不同就一省之內州縣又各不同又民丁之外别有軍丁屯丁匠丁竈丁站丁土丁漁戶寄莊丁寄糧丁諸名各有科則入本朝以來屢有更定兹據會典舉其大略如此凡天下戶口之賦亦曰徭里銀順治十八年統計直省徭里銀三百萬八千九百五兩有奇米二萬二千五百七十石有奇康熙二十四年銀三百一十三萬六千九百三十二兩有奇米一萬二千七百一十五石有奇雍正二年銀三百二十九萬一千二百二十九兩有奇米一萬二千七百九十四石有奇豆二萬六千一百五十石乾隆十八年丁銀三百二十九萬五千三百五十九兩有奇各省丁銀俱勻入地糧內遇閏有加徵者有不加徵者各循成例順治元年令州縣編置戶口牌甲是時王師初入關百戶危列宿上言天津到海避亂之民萬有一千餘戶宜諭有司撫綏安插兵部侍郎金之俊亦請諭各鎮道臣招徠土寇有率衆歸順者令州縣編置牌甲俱見採用凡保甲之法州縣城鄉十戶立一牌頭十牌立一甲頭十甲立一保長戶給印牌書其姓名丁口出則注其所往入則稽其所來寺觀亦給印牌以稽僧道之出入其客店令各立一簿書寓客姓名行李牲口及往來何處以備稽察三年定人戶以籍為定及脫漏戶口律凡軍民驛竈醫卜工樂諸色人户並以原報册籍為定若詐冒脫免避重就輕者杖八十仍改正凡一戶全不附籍及將他人隱蔽在戶不報或隱漏自己成丁人口及增減年狀妄作老幼廢疾者分别罪之四年詔天下編審人丁凡年老殘疾并逃亡故絶者悉行豁免五年令三年編審一次凡三年編審責成州縣印官察照舊例造册以百有十戶為里推丁多者十人為長餘百戶為十甲城中曰坊近城曰廂在鄉曰里各有長凡造册人戶各登其丁口之數而授之甲長甲長授之坊廂里各長坊廂里長上之州縣州縣合而上之府府别造一總册上之布政司民年六十以上開除十六以上增注凡籍有四曰軍曰民曰匠曰竈各分上中下三等丁有民丁站丁土軍丁衛丁屯丁總其丁之數而登黃册督撫據布政司所上各屬之册達之戶部戶部受直省之册彚疏以聞以周知天下生民之數十一年定外省流民附籍年久者與土著一例當差新來者五年當差又嚴編審隱揑之律每三年編審之期逐里逐甲審察均平詳載原額開除新收實在每名徵銀若干造册送部如有隱匿揑報依律治罪十三年定五年編審一次十四年州縣官編審戶口增丁至二千名以上各豫紀録至康熙二年復定州縣增丁二千名以上者督撫布政司及道府俱准紀録十五年定編審人丁册於次年八月內到部州縣官借名科派者罪之十七年令直省每嵗底將丁徭賦籍彚報以戶口消長課州縣吏殿最十八年總計直省人丁二千一百有六萬八千六百有九口直𨽻人丁二百八十五萬七千六百九十二奉天人丁五千五百五十七江南布政司人丁三百四十五萬三千五百二十四山西布政司人丁一百五十二萬七千六百三十二山東布政司人丁一百七十五萬九千七百三十七河南布政司人丁九十一萬八千六十陜西布政司人丁二百四十萬一千三百六十四浙江布政司人丁二百七十二萬九十一江西布政司人丁一百九十四萬五千五百八十六湖廣布政司人丁七十五萬九千六百有四四川布政司人丁一萬六千九十六福建布政司人丁一百四十五萬五千八百有八廣東布政司人丁一百萬七百一十五廣西布政司人丁十一萬五千七百二十二雲南布政司人丁十一萬七千五百八十二貴州布政司人丁一萬三千八百三十九康熙五年以廣西西隆州西林縣改歸內地停其編丁十一年令浙江所屬食鹽鈔銀均攤入地丁徵收十七年令安徽等處屯丁一體編徵先是直𨽻山東山西河南陜西及江蘇等處歸併衛所屯丁俱照州縣例編審徵銀今安徽等處及浙江江西湖廣福建廣東歸併衛所屯丁亦令照州縣人丁例一體編徵二十四年總計直省人丁二千三百四十一萬一千四百四十八口直𨽻人丁三百一十九萬六千八百六十六奉天人丁二萬六千二百二十七江南江蘇布政司人丁二百六十五萬七千七百五十安徽布政司人丁一百三十一萬四千四百三十一山西布政司人丁一百六十四萬九千六百六十六山東布政司人丁二百十一萬九百七十三河南布政司人丁一百四十三萬二千三百七十六陜西布政司人丁二百二十四萬一千七百十四鞏昌布政司人丁二十七萬三千二百九十二浙江布政司人丁二百七十五萬一百七十五江西布政司人丁二百十二萬六千四百有七湖北布政司人丁四十四萬三千四十湖南布政司人丁三十萬三千八百一十二四川布政司人丁一萬八千五百有九福建布政司人丁一百三十九萬五千一百有二廣東布政司人丁一百十一萬九千四百廣西布政司人丁十七萬九千四百五十四雲南布政司人丁十五萬八千五百五十七貴州布政司人丁一萬三千六百九十七二十五年以編審原限一年八個月限期過寬胥役任意作弊嗣後定限一年嵗底造報州縣將新增之丁隱匿不報者罪之二十六年編審缺額人丁令該撫陸續招徠於下次查編補足二十七年定入籍奉天例凡身𨽻奉天版籍文武中式即令於奉天所屬州縣居住如居住原籍并别省者該府尹察出送部禠革其入籍出仕之員解任後居住别省該撫查明題參仍令於奉天所屬地方居住二十八年免四川松建等處編審松建等衛所地處極邊屯丁無幾建敘二㕔所轄山多土瘠舊例銀米並徵人丁載在銀米之內與雲南等省衛所不同亦與四川各州縣大異俱免其編審至三十六年以四川新設會理州原係番夷所管無版籍可稽照例免其編審四十年以四川東川府僻處極邊免其編審東川府後改𨽻雲南省二十九年定入籍四川例四川省民少而荒地多嗣後流寓之民情願在川省墾荒居住者即准其子弟入籍考試如中式之後回原籍并往别省居住者永行禁止三十三年以陜西西鳯二府屬被災流移人民尚未全復停其編審三十五年清查雲南省兵丁之兄弟親屬餘丁編入丁數輸糧三十六年以浙江匠班銀派入地丁徵收浙江省匠班一項戶籍雖存人丁巳絶其實徵銀七千四百九十餘兩令均派於通省地丁下帶辦至三十九年湖北匠班銀歸入地丁四十一年山東匠班銀歸入地丁均照浙江之例臣等謹按匠丁沿自故明厯年已久止存戶籍或派民戶代完或有司自行賠補至是始議派入地丁嗣後丁隨地派之例實肇於此五十年總計直省人丁二千四百六十二萬一千三百二十四口五十一年諭大學士九卿等曰朕覽各省督撫奏編審人丁數目並未將加增之數盡行開報今海宇承平已久戶口日繁若按見在人丁加徵錢糧實有不可人丁雖增地畝並未加廣應令直省督撫將見今錢糧册內有名丁數勿增勿減永為定額自後所生人丁不必徵收錢糧編審時止將增出實數察明另造册題報朕凡巡幸地方所至詢問一戶或有五六丁止一人交納錢糧或有九丁十丁亦止一二人交納錢糧詰以餘丁何事咸云蒙皇上宏恩並無差徭共享安樂優游閒居而已此朕之訪聞甚晰者前雲南貴州廣西四川等省遭叛逆之變地方殘壞田畝拋荒自平定以來人民漸增開墾無遺山谷崎嶇之地已無棄土由此觀之民之生齒實繁朕故欲知人丁之實數不在加徵錢糧也今國帑充裕屢嵗蠲免輒至千萬而國用所需並無不足之虞故將見徵錢糧册內有名人丁永為定數嗣後所生人丁免其加增錢糧但將實數造册具報豈特有益於民亦一盛事也直省督撫及有司官編審人丁時不將所生實數開明具報者特恐加增錢糧是以隱匿不據實奏聞豈知朕並不為加賦止欲知其實數耳九卿議嗣後編審人丁據康熙五十年徵糧丁册定為常額其新增者謂之盛世滋生人丁永不加賦至五十二年恩詔復申明之五十五年戶部議以編審新增人丁補足舊缺額數除向係照地派丁外其按人派丁者如一戶之內開除一丁新增一丁即以所增抵補所除倘開除二三丁本戶抵補不足即以親族之丁多者抵補又不足即以同甲同圗之糧多者頂補如有餘丁歸入滋生册內諭武官駐劄地方不許入民籍立産業其已立産業者令變賣回籍若身殁後有實不能遷移者該督撫查明具題五十三年准甘肅無業貧民編入丁册免納丁銀五十五年令嗣後買賣地畝其丁銀有從地起者隨地徵丁倘有地賣而丁留與受一同治罪准廣東所屬丁銀就各州縣地畝分攤徵收每地銀一兩均攤丁銀一錢六釐四毫不等五十六年以續增人丁既不加賦將增丁之州縣官停其議敘如州縣將滋生人丁私行科派該督撫即行題參六十年總計直省人丁二千七百三十五萬五千四百六十二口內滋生人丁不加賦者四十六萬七千八百五十雍正元年令直𨽻所屬丁銀攤入地糧內徵收直𨽻巡撫李維鈞言直𨽻地方丁銀請隨地起徵戶部議如所請上復令九卿詹事科道集議九卿等言應令該撫確查各州縣田土因地制宜作何均攤之處分别定例俾無地窮民免納丁銀之苦有地窮民無加納丁銀之纍上曰丁隨地起一事九卿不據理詳議依違瞻顧皆由迎合上意起見即如本內有地窮民一語既稱有地何謂窮民不與有米餓莩之語相似乎著仍照戶部議行尋議定直隸每地賦銀一兩攤入丁銀二錢七釐有奇嗣是各省計人派丁者次第改隨地畝矣福建丁銀雍正二年攤入地畝徵收每地賦銀一兩攤入丁銀五分二釐七毫至三錢一分二釐零不等屯地每兩徵丁銀八釐三毫至一錢四分四釐八毫零不等山東丁銀雍正三年攤入地畝徵收每地賦銀一兩攤入丁銀一錢一分五釐其新墾地俟升科後遇五年編審之期合計新舊地糧按數攤減各就一縣之地均算河南丁銀雍正四年攤入地畝徵收每地賦一兩徵丁銀一分一釐七毫零至二錢七釐零不等嗣後有報墾升科將丁銀隨年均派浙江丁銀雍正四年攤入地畝徵收每田賦一兩徵丁銀一錢四釐五毫不等陜西西安所屬丁銀雍正四年攤入地畝徵收每地賦銀一兩徵銀一錢五分三釐遇閏每兩加徵四釐零甘肅丁銀雍正四年議河東地糧輕而丁多河西地糧重而丁少不能一例攤派令河東每銀一兩攤入丁銀一錢五分九釐三毫零遇閏加徵一分五釐四毫零河西每銀一兩攤入丁銀一分六毫零遇閏不加徵四川丁銀向係以糧載丁徵收惟威州等十一州縣丁地分徵雍正四年議亦令以糧載丁每糧五升二合至一石九斗六合零不等算人丁一丁徵收雲南丁銀雍正四年攤入地畝徵收其屯軍丁銀將隱匿田地清查漸次抵補江蘇安徽丁銀雍正五年攤入地畝徵收其屯丁銀亦攤入屯衛田內徵收每畝徵丁銀一釐一毫至六分二釐九毫零不等其匠班銀三千八百餘兩亦令攤入地糧內江西丁銀雍正五年攤入地畝徵收每地賦銀一兩徵丁銀一錢五釐六毫屯地每兩徵丁銀二分九釐一毫零湖南丁銀雍正六年攤入地畝徵收每地賦糧一石徵丁銀一毫四絲至八錢六分一釐零不等廣西丁銀雍正六年攤入地畝徵收每地賦銀一兩徵丁銀一錢三分六釐零不等長蘆利民等場竈丁銀雍正六年攤入竈地徵收每畝徵銀六釐至一分不等湖北丁銀雍正七年攤入地畝徵收每地賦銀一兩徵丁銀一錢二分九釐六毫零惟江夏嘉魚漢陽漢川孝感蘄水黃岡黃梅廣濟鍾祥潛江沔陽天門荆門江陵石首監利松滋棗陽十九州縣向有重丁銀除抵減豁免外所攤入銀數多寡不等山東永利等場竈戶丁銀乾隆二年攤入竈地徵收每畝徵銀一分四毫零臣等謹按丁隨地起之例廣東四川諸省先已行之至雍正元年准撫臣之請行於畿輔而各省亦多效之惟奉天府以民人入籍增減無定仍舊分徵而山西省至乾隆十年始議參用攤徵分徵之法詳見後蓋因地制宜使有田之家所加無多而無業之戶利益甚大洵法良而意美也又令山西等省之樂戶浙江之惰民俱除籍為良山西等省有樂戶一項其先世因明建文末不附燕兵被害編為樂籍世世不得自拔為良民至是令各屬禁革俾改業為良又浙江紹興府之惰民與樂籍無異亦令削除其籍俾改業與編氓同列至五年以江南徽州府有伴儅寧國府有世僕本地呼為細民其籍業與樂戶惰民同甚有兩姓丁戶村莊相等而此姓為彼姓執役有如奴𨽻究其僕役起自何時則茫然無考非實有上下之分特諭開除為良民八年以蘇州府之常熟昭文二縣丐戶與浙江惰民無異准其削除丐籍又令提鎮以下官不許在見任地方置立産業即休致事故解退之後亦不許在彼處入籍居住二年總計直省人丁二千五百二十八萬四千八百一十八口順天府人丁十五萬八千一百三十三直𨽻布政司人丁三百二十四萬八千七百一十奉天人丁四萬二千二百一十江南江蘇布政司人丁二百六十七萬三千二十有八安徽布政司人丁一百三十五萬七千五百七十三山西布政司人丁一百七十六萬八千六百五十七山東布政司人丁二百二十七萬八千三百有五河南布政司人丁二百有四萬九千四百十七陜西西安布政司人丁二百十六萬四千六百五十六鞏昌布政司人丁三十萬二千七百六十三浙江布政司人丁二百七十五萬八千七百十三江西布政司人丁二百十七萬二千五百八十七湖北布政司人丁四十五萬三千有七湖南布政司人丁三十四萬一千三百四川布政司人丁四十萬九千三百五十一福建布政司人丁一百四十二萬九千二百有三廣東布政司人丁一百三十萬七千八百六十六廣西布政司人丁二十萬二千七百十一雲南布政司人丁十四萬五千二百四十貴州布政司人丁二萬一千三百八十八四年免雲南太和等處土軍丁銀太和鄧川等州縣土軍九百五名原非承種軍田之丁前明防守土冦設此名色既納民糧又納軍賦每丁輸銀一兩較民丁尤重至是將土軍丁銀九百五兩永行豁免又定棚民寮民照保甲之例江西浙江福建三省各山縣內向有民人搭棚居住種麻種箐開爐煽鐵造紙做菰為業謂之棚民令照保甲之例每年按戶編查責成地主并甲長出結呈送州縣官據册稽察倘居住分散不論棚數多寡自為一甲互相稽察內有已置産業并願入籍者俱編入土著一體當差至一邑中有四五百戶以上者該管官即於棚居鄉壯內選立保甲長専司巡察其棚民有願回籍者聽又廣東省窮民有入山搭寮取香木舂粉砍柴燒炭為葉者謂之寮民亦令照保甲之法每寮給牌一令互相保結寮內遇有遷徙增減令將牌赴縣添除擇老成謹慎者為寮長聽其鈐束如有藏匿奸宄容隱不報者事覺連坐凡業主召佃搭寮必將寮丁報官或係官山必赴官報明杳驗方准搭寮違者罪之五年川陜總督奏外省人民挈家入川者甚多皆稱係上年湖廣廣東江西廣西等省逃荒之人請設法安插以為生計諭曰去嵗湖廣廣東並非甚歉之嵗江西廣西並未題成災何逺赴四川者如此之衆此皆本省大小官吏平日全無撫綏以致百姓失所身為司牧而於地方民瘼漫不經心尚何以靦顔任職乎但此等逺來多人良奸莫辨其中若有游手無賴之徒不行稽查必轉為良民之擾且地方官吏坐視百姓逺徙異鄉而不知軫念不可不加懲戒其令四川州縣將入川人戶逐一稽查姓名籍貫果係無力窮民即留川令其開墾所用牛種口糧目前將公項給發即著落本籍州縣官照數補還如此則游惰之民不致冒混而地方官亦知所警戒共以愛養百姓為務可杜流移之患於將來矣九卿等會議湖廣江西廣東廣西四省之人挈家逺赴四川聽其散往各府州縣佃種傭工為糊口之計各府州縣稽其姓名籍貫如實係窮民造册申報該督撫咨查原籍令將本戶居址姓名造册回覆倘有以實在本籍人戶推諉欺隱希圗卸責者該督撫即行指參民人有願回籍者量豫盤費口糧給以印票其願在川開墾者量人力多寡分給荒地五六十畝或三四十畝給以牛種口糧其所用各項銀著落本籍各府州縣官賠補七年諭粵東有蛋戶以船為家捕魚為業生齒繁多粵民視為卑賤之流不容登岸居住蛋戶亦不敢與平民抗衡局蹐舟中終身不獲安居之樂蛋戶本屬良民且輸納漁課與民相同安得因地方積習强為區别著有司通行曉諭凡無力之蛋戶聽其住船自便如有力能建房搭棚者准其於近水村莊居住與齊民一同編列甲戶以便稽察不得欺凌驅逐又以廣西寧明東蘭二州改土為流免其編審至九年准停止廣西歸順州編審十一年滇省緬寧地方改土為流停其編審乾隆元年奉諭福建臺灣丁銀一項每丁徵銀四錢七分再加火耗則至五錢有零矣查內地每丁徵銀一錢至二錢三錢不等而臺灣則加倍有餘民間未免竭蹶著照內地之例酌中減則每丁徵銀二錢從乾隆元年為始永著為例又奉諭朕聞甘省以糧載丁從前辦理未善致多偏枯見有民戶丁銀攤入屯戶者九千二百二十五兩屯戶輸納惟艱今應酌籌變通之法著將此多攤九千餘兩暫為豁除俟下屆編審之時將平慶臨鞏四府及秦階二州所屬各州縣新編人丁應完丁銀均攤入民地糧內漸次補額即分作二三次編審逐漸補足亦可務令徐徐增補以紓民力俟補足之後即行停止永不加賦又聞康熙五十七年伏羌通渭秦安會寧等縣及岷州衛有地震傷亡缺額之七千六百八十丁該銀一千四百八十六兩零人口既無丁銀自應蠲免乃亦攤入田畝之內尤屬錯謬著查明豁除毋貽民纍又奉諭湖北丁隨糧派一案前蒙皇考疊沛恩膏多方調劑減免以除閭閻之纍其江夏等十九州縣攤納之重丁原議俟有升科丁銀可以漸次攤抵則輸納可得其平今朕聞得原墾之荒頗多不實則攤抵之期一時難必念此十九州縣獨受重丁之苦朕心深為軫恤今將江夏等十九州縣未經攤減之丁銀八千三百零八兩自乾隆二年為始全行豁免二年奉諭福建龍巖州屬之寧洋縣福寧府屬之夀寧縣每丁徵至四錢二三分不等民力未免艱難著照通省中則每丁徵收二錢其餘盡行寬免福建丁銀於雍正二年攤入地糧惟此二縣地糧少丁額重向未攤入至是乃減其額又乾隆元年查出福建通省缺額田地五萬四千餘畝將糧銀豁除其勻入丁銀九百六十一兩至是令一併免徵是年又以延平府之南平縣丁口衆多不能通勻應照例每田糧一兩勻徵銀二錢其浮多之數三千餘兩悉行豁免又漳州府之平和縣汀州府之清流縣延平府之永安縣每田糧一兩徵丁銀四五錢不等令督撫定議減免又諭滇省軍丁一項從前未曾攤入地畝原議俟查有欺隱軍屯田地陸續抵補每丁自二錢八分至六錢二分不等共應納銀一萬五千三百八十兩除抵去銀三千餘兩外尚有應徵丁銀一萬二千二百七十餘兩厯年惟按册載老丁名字徵收或已無寸土而追比無休或已絶後嗣而波及同伍深可憫恤著自乾隆三年為始槩豫豁免三年諭朕聞雲南麗江府原係土府於雍正二年改設流官比時清查田畝戶口有土官莊奴院奴等類共二千三百四十四名伊等並無田糧皆願自納丁銀以比於齊民每名編為一丁每年納銀六分六釐逮滇省民丁改為隨糧派納而此項夷丁不得與有糧之戶一例攤派至今照舊徵收其中不無貧乏之家艱於輸納者著該督撫查明槩豫豁免又諭雲南鶴慶府驛站丁銀悉行豁免雲南之鶴慶府城及所轄之觀音山前明時分設驛站後因驛站裁革以驛馬分給驛丁將觀音山編為三十馬頭每馬人丁十七丁每丁嵗徵銀五錢四分在城驛站編為二十馬頭每馬人丁五十六丁每丁嵗徵銀二錢五分相沿至今窮丁無力輸將致官役代為賠補至是除之五年戶部言每嵗造報民數若俱照編審之法未免煩擾直省各州縣設立保甲門牌土著流寓原有冊籍可稽若除去流寓將土著造報即可得其實數應令各督撫於每年十一月將戶口數與榖數一併造報番疆苗界不入編審者不在此例從之又令奉天府寄寓人民願入籍者聽不願者限十年內回籍至十五年議准奉天流民歸籍之期已滿十年其不願入籍而未經回籍者令查出速行遣回并令奉天沿海地方官多撥兵役稽察不許內地人民私自出口山海關喜峯口及九邊門亦令一體嚴禁十年定山西地丁攤徵分徵之例戶部議准山西丁糧分辦貧民偏纍尚多而丁隨地徵有勢所難行者今將太原等十八縣丁銀全攤入地畝每糧一石徵丁銀一分八釐至二錢二分二釐每賦銀一兩徵丁銀一錢四分七釐九毫至三錢三分八釐零不等交城等十五州縣丁銀一半攤入地畝寧鄉等二縣丁銀照下則徵收餘銀攤入地畝渾源等二州縣丁銀攤入三分之一河曲縣丁銀攤入十分之一吉州以無業苦丁攤入地畝其餘陽曲等二十州縣或貿易民多或民貧地瘠或田多沙鹻或多徵本色仍宜地丁分辦就中别有屯丁徭銀之處仍攤入屯地徵收十一年諭向來江西省編審丁男之外又有婦女蓋緣從前有鹽鈔一項分給小戶計口納鈔既有婦女應徵之項則不得不稽其存亡增減是以入於編審之內今鹽鈔久經攤入地糧則婦女已無可徵之項何必存此編審虛名徒滋擾纍嗣後編審婦女著停止十二年定福建臺灣府丁銀勻入官莊田園內徵收其番民祇就丁納銀如舊所種田槩不徵賦十四年總計直省人丁共一萬七千七百四十九萬五千三十有九口直𨽻人丁一千三百九十三萬三千二百五十八奉天人丁四十萬六千五百十一江南江蘇人丁二千有九十七萬二千四百三十七安徽人丁二千一百五十六萬七千九百二十九山西人丁九百五十萬九千二百六十六山東人丁二千四百有一萬一千八百二十九河南人丁一千二百八十四萬七千七百有九陜西西安人丁六百七十三萬四千一百五十八甘肅人丁五百七十萬九千五百二十六浙江人丁一千一百八十七萬七千四百三十六江西人丁八百四十二萬八千二百有五湖廣湖北人丁七百五十二萬七千四百八十六湖南人丁八百六十七萬二千四百三十三四川人丁二百五十萬六千七百八十福建人丁七百六十二萬有四百二十九廣東人丁六百四十六萬有六百三十八廣西人丁三百六十八萬七千七百二十五雲南人丁一百九十四萬六千一百七十三貴州人丁三百有七萬五千一百十一十八年總計直省人丁共一萬有二百七十五萬口直𨽻人丁九百三十七萬四千二百十七奉天人丁二十二萬一千七百四十二江南江蘇人丁一千二百六十一萬八千九百八十七安徽人丁一千二百四十三萬五千三百六十一山西人丁五百十六萬二千三百五十一山東人丁一千二百七十六萬九千八百七十二河南人丁七百十一萬四千三百四十六陜西西安人丁三百八十五萬一千有四十三甘肅人丁二百十三萬三千二百二十二浙江人丁八百六十六萬二千八百有八江西人丁五百有五萬五千二百五十一湖廣湖北人丁四百五十六萬八千八百六十湖南人丁四百三十三萬六千三百三十二四川人丁一百三十六萬八千四百九十六福建人丁四百七十一萬三百三十九廣東人丁三百九十六萬九千二百四十八廣西人丁一百九十七萬五千六百十九雲南人丁一百萬三千有五十八貴州人丁一百四十一萬八千八百四十八二十二年更定保甲之法一順天府五城所屬村莊暨直省各州縣鄉村每戶嵗給門牌十戶為牌竒零散處通融編列立牌長十牌為甲立甲長三年更代十甲為保立保長一年更代士民公舉誠實識字及有身家之人報官㸃充地方官不得派辦别差凡甲內有盜竊邪教賭博賭具􅌪逃奸拐私鑄私銷私鹽跴麴販賣硝磺并私立名色斂財聚會等事及面生可疑形迹詭祕之徒責令専司查報戶口遷移登耗責令隨時報明於門牌內改換填給一紳襟之家與齊民一體編列一旗民雜處村莊一體編列將旗分戶名并所𨽻領催屯目注明旗人民人有犯許互相舉首地方官會同理事同知辦理至各省駐防營內商民貿易居住及官兵雇用人役均另編牌冊仍報明理事㕔查核一邊外蒙古地方種地民人設立牌頭總甲及十家長等如有偷竊為匪及隱匿內地逃人者責令查報一凡客民在內地開張貿易或置有産業者與土著一例順編其往來商賈蹤跡無定責令客長查察一鹽場井竈另編排甲所雇工人隨竈戶填注責令場員督查一礦厰丁戶責令厰員督率厰商課長及峒長爐頭等編查各處煤窰責令雇主將傭工人等冊報地方查核一各省山居棚民按戶編冊責成地主并保甲結報廣東省寮民每寮給牌互相保結其招佃搭寮者責令業主呈報一沿海等省商漁船隻取具澳甲族鄰保結報官准造完日由官驗明給照商船將船主舵工水手年貌籍貫並填照內出洋時取具各船互結至汛口照驗放行漁船止填船主年貌籍貫至泛口查明舵工水手名數官為填注倘有租船出洋為匪將船主澳甲分别治罪如船主實有事故别令親族押駕者赴官呈明填入照內准行未呈明者即以頂冒論其內洋採捕小艇責令澳甲稽查至內河一切船隻於船尾設立粉牌責令埠頭查察其漁船網戶水次搭棚趂食之民均歸就近保甲管束一苗疆寄籍內地久經編入民甲者照民人一例編查其餘各處苗猺責令千百戶及頭人峒長等稽查約束一雲南省有夷人與民人錯處者一體編入保甲其依山傍水自成村落及懸崕密箐內搭寮居處者責令管事頭目造冊稽查一外省入川民人同土著一例編查如係依親佃種者即附於田主戶內倘有不安本分及來厯不明者報官遞回原籍一甘肅省畨子土民責成土司查察係地方官管轄者令該管頭目編查地方官給牌另冊造報其四川省改土歸流各畨寨責令鄉約甲長等教化畨民稽查奸匪均聽撫夷掌堡管束一寺觀僧道責令僧綱道紀按季册報如有遊方僧道形迹可疑及為匪不法者禀官查逐其各省回民令禮拜寺掌教稽查一外來流丐保正督率丐頭稽查少壯者詢明籍貫遞回原籍安插其餘歸入棲流等所管束是年總計直省人丁共一萬九千三十四萬八千三百二十八口直𨽻人丁一千四百三十七萬七千一百六十八奉天人丁四十二萬八千五十六江蘇省人丁二千二百六十三萬八千七百六十六安徽省人丁二千二百四十三萬一千九百八十二江西省人丁九百一十萬八千六百一十五浙江省人丁一千四百六十二萬五千六百七十七福建省人丁七百九十七萬七千六百八十六湖北省人丁七百九十五萬七千三百有四謹按湖北省於乾隆二十四年編審此係每年例奏丁數其編審數目另載二十四年總數下二十七年同此湖南省人丁八百七十六萬二千七百二十六山東省人丁二千四百七十四萬五千五百四十九河南省人丁一千六百有三萬四千四百一十二山西省人丁九百六十五萬四千二百三十四陜西省人丁七百有八萬一千八百四十六甘肅省人丁五百九十四萬一千六百九十九四川省人丁二百六十八萬二千八百九十三廣東省人丁六百六十九萬九千五百一十七廣西省人丁三百八十五萬一百三十六雲南省人丁二百有一萬四千四百八十三貴州省人丁三百三十三萬五千五百七十九二十四年總計直省人丁一萬九千四百七十九萬一千八百五十九口是年湖北省編審人丁八百二萬四千九百七十八二十六年定歸化城等處禁止私墾例凡歸化城大青山十五峪三百餘戶墾地民人令歸化城都統派員會同地方官按年巡查倘於現有民人外再多容留一人違禁私墾地畝將容留及私墾之人遞回原籍治罪又定番界苗疆禁例一臺灣流寓民人自去年停止搬眷之後不准內地民人私行偷渡一臺灣民人不得與番人結親違者離異其從前已娶生子者不許往來番社一民人無故擅入苗地及苗人無故擅入民地均照例治罪其民人有往苗地貿易者取具行戶鄰右保結報官給照令塘汛驗放逾期不出嚴查究擬二十七年定寧古塔等處禁止流民例凡寧古塔地方開檔家奴及官莊年滿除入民籍人等係世守居住不能遷移者令照舊種地納糧其本年查出之寧古塔種地流民安插吉林烏拉伯都訥等處將丈出餘地撥給耕種入籍納糧吉林烏拉伯都訥種地流民編入里甲入冊交糧嗣後倘復有流民潛入境地者將看守邊門官員嚴參議處是年編審總計直省人丁二萬有四十七萬三千二百七十五口直隸人丁一千六百一十三萬二千四百五十四奉天人丁六十七萬四千七百三十五江蘇省人丁二千三百二十八萬四千三百九十七安徽省人丁二千二百八十四萬八千四百十一江西省人丁一千一百有六萬九千六十一浙江省人丁一千五百六十一萬二千三百五十六福建省人丁八百有六萬五千二百八十八湖北省人丁八百十三萬七千九百四十七湖南省人丁八百八十五萬四千六百有八山東省人丁二千五百二十九萬二千六百八十三河南省人丁一千六百三十九萬八千六百有七山西省人丁一千二十三萬九千九百有七陜西省人丁七百二十九萬七千四百一十五甘肅省人丁七百四十七萬九百二十九四川省人丁二百八十萬二千九百九十九廣東省人丁六百八十一萬八千九百三十一廣西省人丁三百九十七萬二千六百五十三雲南省人丁二百有八萬八千七百四十六貴州省人丁三百四十一萬一千一百四十八二十八年定稽查江西安徽浙江等省棚民之例凡各省棚民除有家室者准其𨽻籍編入保甲外其餘單身賃墾之人令於原籍州縣領給印票並有認識親族保領方准租種安插倘有轉相頂替及來厯不明之人責成保人互相糾察舉報究治至現在單身棚民已經種地者責成有家棚民取具切實保狀如無人保結者即令押回原籍二十九年總計直省人丁二萬五百五十九萬一千一十七口是年湖北省編審人丁八百二十三萬一千八百一十六三十二年軍機大臣議准發送烏嚕木齊人犯原犯死罪減等發遣者作為五年原犯軍流改發及種地當差者作為三年准入民籍將伊等安插昌吉河東舊堡指給地畝耕種納糧等因從之是年總計直省人丁二萬有九百八十三萬九千五百四十六口直隸人丁一千六百六十九萬有五百七十三奉天人丁七十一萬三千四百八十五江蘇省人丁二千三百七十七萬九千八百十二安徽省人丁二千三百三十五萬五千一百四十一江西省人丁一千一百五十四萬有三百六十九浙江省人丁一千六百五十二萬三千七百三十六福建省人丁八百有九萬四千二百九十四湖北省人丁八百三十九萬九千六百五十二湖南省人丁八百九十九萬七千有二十二山東省人丁二千五百六十三萬四千五百六十六河南省人丁一千六百五十六萬二千八百八十九山西省人丁一千有四十六萬八千三百四十八陜西省人丁七百三十四萬八千五百六十五甘肅省人丁一千一百五十三萬七千五百三十九四川省人丁二百九十五萬八千二百七十一廣東省人丁六百九十三萬八千八百五十五廣西省人丁四百七十萬六千一百七十六雲南省人丁二百十四萬八千五百九十七貴州省人丁三百四十四萬一千六百五十六三十三年御史張光憲奏請設立大姓族長諭曰民間戶族繁甚其中不逞之徒每因自恃人衆滋生事端向來聚衆械鬭各案大半起於大姓乃其明驗惟在地方官實力彈壓有犯必懲以靖囂凌之習政體不過如是若於各戶専立族長名目無論同宗桀驁子弟未必遽能受其約束甚者所主非人必至藉端把持倚強鋤弱重為鄉曲之纍正所謂杜弊轉以滋弊也張光憲所請不可行臣等謹按雍正四年有選立族正之例本因苗疆村堡聚族滿百人以上保甲或不能遍查乃選族中人品剛方者立為族正以稽察匪類蓋因地制宜非通行之制也若大姓皆立族長反滋弊端睿慮精詳是在守土者遵奉力行自可化囂凌之習云爾又湖北巡撫程燾奏言清理鄖陽山地并咨陜西河南二省轉飭界連鄖陽各州縣查明所豁山地界趾設立保甲稽查奸匪部議從之三十四年戶部議准吉林將軍傳良奏阿勒楚喀拉林地方查出流民二百四十二戶俱自雍正四年至乾隆二十二年陸續存住在二十七年定議之前請限一年盡行驅逐至伯都訥地方每戶撥給空甸一具令其入籍墾種二年後納糧從之臣等謹按戶部則例載吉林寧古塔伯都訥阿勒楚喀拉林等地方不准無籍流民前往私墾責成邊門官嚴行查禁除各該處於例前安插各戶外乾隆二十七年以前後經查有流民將看守邉門官嚴參議處今查出流民在二十七年之前故准令入籍墾種一例安插俾無失所云三十六年禮部會同戶部議准陜西學政劉樽奏山陜等省樂戶丐戶請定禁例案內酌議削籍之樂戶丐戶原係改業為良報官存案如果祓濯舊汚閲時久逺為里黨所共知者自不便阻其向上之路應請以報官改業之人為始下逮四世本族親支皆係清白自守方准報捐應試該管州縣取具親黨鄰里甘結聽其自便不許無賴之徒藉端攻訐若係本身脫籍或係一二世及親伯叔姑姊尚習猥業者一概不許濫厠士類僥幸出身至廣東之蛋戶浙江之九姓漁戶及各省凡有似此者悉令該地方照此辦理但此等甫經改業之戶惟不准遽行報捐應試至於耕讀工商業已為良應悉從其便如有勢豪土棍藉端欺壓訛詐者該地方官仍嚴行查禁懲治以警刁風以安良善等因疏入從之臣等謹按山陜等省樂戶其先世因明建文末不附燕兵被害編為樂籍世世不得自拔為良民相沿日久至雍正元年荷䝉世宗憲皇帝沛寬大之詔除籍為良八年又以蘇州府之常熟昭文二縣丐戶與浙江惰民無異亦准其削除丐籍蓋俱已仰沐鴻恩豫以自新之路矣至是因學臣之請復䝉諭㫖准於四世以後令其報捐應試且推及廣東之蛋戶浙江之九姓漁戶等一例辦理凡此微賤編氓抑何幸䝉聖朝之寬典也哉是年總計直省人丁二萬一千四百六十萬有三百五十六口直𨽻人丁一千六百七十七萬有二百八十三奉天人丁七十五萬有八百九十六江蘇省人丁二千四百二十七萬七千七百五十五安徽省人丁二千三百六十八萬三千五百江西省人丁一千一百七十四萬五千一百九十六浙江省人丁一千七百有九萬二千三百二十三福建省人丁八百十七萬有六百三十湖北省人丁八百五十三萬二千一百八十七湖南省人丁九百有八萬二千四十六山東省人丁二千五百九十九萬九千五百九十九河南省人丁一千六百六十七萬八千五百有六山西省人丁一千有六十二萬六千四百四十八陜西省人丁七百四十二萬五千四百四十五甘肅省人丁一千三百二十一萬五千八百九十一四川省人丁三百有六萬八千一百九十九廣東省人丁七百有二萬一千三百有四廣西省人丁四百七十九萬四千四百九十三雲南省人丁二百二十萬七千六百五十貴州省人丁三百四十五萬八千有五三十七年戶部議四川總督桂林奏川省各府㕔州縣土司戶口人丁額數按冊開各數目分别核算實在新舊人丁並流寓戶口均屬相符令該督照例歸入地畝項下按額造地丁奏銷冊內題報查核疏入奉㫖允行四十年諭朕前諭令將發遣之曾為職官及舉貢生監出身者免其為奴於戍所另編入旗戶當差係指尋常為奴遣犯而言其真正反叛及强盜免死減等人犯原㫖即在開除不辦之例若吕留良子孫係大逆重犯緣坐即屬反叛豈可援輕罪有職人員概免為奴出戶致令逆惡餘孽得仍竄籍良民實不足以示懲創而申法紀著交刑部存記嗣後如遇辦理此等大逆緣坐之案不特舉貢生監不應減免即職官甚大者既為逆犯子孫罪在不赦不當復為區别所有吕懿兼吕敷先二犯及其家屬俱發往黑龍江給與披甲之人為奴臣等謹按逆犯緣坐罪在不宥我皇上慎理庶獄輕重一視其人之自取所謂雨露雷霆罔非奉若天道以昭平允如吕留良子孫作為另户是與尋常為奴遣犯無異洵未足以申國憲而垂炯戒聖諭煌煌允為明罰敕法之極軌矣又諭直省滋生戶口向惟冊報戶部朕臨御之初即飭各督撫嵗計一省戶口食榖實數於仲冬具摺以聞並繕冊由部臣彚核以進蓋仿周禮司民掌登民數拜獻於王之意即藉以驗海宇富庶豐盈景象法至善也顧行之日久有司視為具文大吏亦忽不加察榖數尚有倉儲可核而民數則量為加增所報之摺及冊竟有不及實數什之二三者其何以體朕周知天下民生本計之心乎我國家纍洽重熙百三十餘年於兹休養滋息盛於往牒且我皇祖恩㫖以生齒日繁人民永不加賦其利甚溥閭閻安享升平樂利阜寧嵗計倍有增益詎可不確核以登紀盛世殷繁之盛乎現今直省通查保甲所在戶口人數俱稽考成編無難按籍而計嗣後各督撫務飭所屬具實在民數上之督撫督撫彚摺上之於朝朕以時披覽既可悉億兆阜成之概而直省編查保甲之盡心與否即於此可察焉其敬體而力行之毋忽又諭據陳輝祖所稱從前厯辦民數冊如應城一縣每嵗只報滋生八口應山棗陽只報二十餘口及五六七口且嵗嵗滋生數目一律雷同等語實屬荒唐可笑各省嵗報名數因以驗盛世閭閻繁庶之徵自當按年確核豈有一縣之大每嵗僅報滋生數口之理可見地方有司向竟視為具文而厯任督撫亦任其隨意填造不復加查似此率略相沿成何事體現據陳輝祖另摺奏請將本年民數限於明嵗繕進以期核實湖廣通省如此各直省大略相同前曾降㫖令督撫將實在民數通核上陳但恐各督撫等泥於嵗底奏報之期尚不免草率從事仍屬有名無實所有本年各省應進民冊均著展至明年年底繕進俾得從容確核以期得實嗣後每年奏報人民各該督撫務率屬員實力奉行勿再如前約略開造倘仍因循疏漏查出定當豫以處分臣等謹按編查保甲蓋本周禮比閭什伍遺法用以周知天下生民之數我國家列聖相承奉行勿替乃相沿既久有司視為具文致直省滋生戶口報摺及冊俱無足憑且有如湖北應城等縣每嵗只報滋生數口而嵗嵗數目一律雷同之甚者兹奉諭㫖展限核實彚奏自當實力奉行庶幾閭閻蕃庶之徵悉登於天府矣四十一年總計直省人丁共二萬六千八百二十三萬八千一百八十一直𨽻人丁二千有五十六萬七千一百七十五奉天人丁七十六萬四千四百四十吉林人丁七萬四千六百三十一江蘇省人丁二千八百八十萬有七千六百二十八安徽省人丁二千七百五十六萬六千九百二十九江西省人丁一千六百八十四萬八千九百有五浙江省人丁一千九百三十六萬四千六百二十福建省人丁一千一百二十一萬九千八百八十七湖北省人丁一千四百八十一萬五千一百二十八湖南省人丁一千四百九十八萬九千七百七十七山東省人丁二千一百四十九萬七千四百三十河南省人丁一千九百八十五萬八千有五十三山西省人丁一千二百五十萬有三千四百十五陜西省人丁八百十九萬三千有五十九甘肅省人丁一千五百有六萬八千四百七十二四川省人丁七百七十八萬九千七百九十一廣東省人丁一千四百八十二萬有七百三十二廣西省人丁五百三十八萬一千九百八十四雲南省人丁三百十萬二千九百四十八貴州省人丁五百萬有三千一百七十七四十二年雲貴總督李侍堯條奏滇省永昌之路江順寧之緬寧二處皆屬通達各邊總匯應特派員辨専司稽察遇有江楚客民即驅令北回其向來居住近邊之人或耕或販查明現在共若千戶男婦共若干口仿照內地保甲之例編造寄籍冊檔登造年貌互相保結並嚴禁與附近夷結親如有進關回籍等事俱用互結報明官給印票關口驗明放行回滇時仍驗票放出若無印票概不准以探親覔友藉詞出外各員辨混放偷漏查明參處至沿邊各處如永昌騰越順寧緬寧南甸龍陵一帶所有本籍民人保甲亦應嚴為稽核毋許混匿江楚客民有則從嚴懲治疏入得㫖允行四十五年總計直省人丁二萬七千七百五十五萬四千四百三十一口直𨽻人丁二千一百五十二萬九千八百六十四奉天人丁七十八萬一千有九十三吉林人丁一十三萬五千八百二十七江蘇省人丁二千九百四十九萬五千五百有三安徽省人丁二千八百有八萬五千三百六十六江西省人丁一千八百有四萬九千二百六十八浙江省人丁二千有四十九萬四千一百五十二福建省人丁一千一百九十八萬有十二湖北省人丁一千六百有二萬一千有六十九湖南省人丁一千五百四十二萬三千八百四十二山東省人丁二千一百七十六萬三千有八十五河南省人丁二千有二十七萬五千二百六十三山西省人丁一千二百八十六萬四千七百九十二陜西省人丁八百二十三萬七千八百八十七甘肅省人丁一千五百十三萬六千八百八十二巴里坤烏嚕木齊等處人丁八萬八千四百四十四四川省人丁七百九十四萬七千七百六十二廣東省人丁一千五百二十一萬一千九百六十廣西省人丁五百七十四萬九千九百九十七雲南省人丁三百二十萬有一千二百有六貴州省人丁五百有八萬一千一百五十七四十八年總計直省人丁共二萬八千四百有三萬三千七百八十五直𨽻人丁二千二百二十六萬三千三百六十九奉天人丁七十九萬七千四百九十吉林人丁十四萬二千二百二十江蘇省人丁三千有三十六萬有九百十一安徽省人丁二千八百四十五萬六千二百十七江西省人丁一千八百五十一萬一千六百二十二浙江省人丁二千一百有三萬五千有八十二福建省人丁一千二百三十九萬九千四百五十六湖北省人丁一千七百十五萬五千有十八湖南省人丁一千五百六十七萬六千四百八十八山東省人丁二千二百有一萬二千六百六十一河南省人丁二千有五十五萬二千五百九十二山西省人丁一千三百有三萬六千五百五十六陜西省人丁八百二十五萬九千有八十一甘肅省人丁一千五百十五萬九千一百有一四川省人丁八百十四萬二千四百八十七廣東省人丁一千五百六十三萬四千五百二十廣西省人丁六百有三萬四千有三雲南省人丁三百二十九萬四千一百四十七貴州省人丁五百十一萬有七百六十四臣等謹按古今戶口之數三代以前杳逺莫考通典載夏后成康之盛口數僅千三百餘萬要亦後儒以意揣之未足深信三代以下有天下長久者莫如漢唐宋明拓地最廣者莫如元今以史志人戶之數考之西漢則千二百二十三萬三千有六十二後漢則千六百有七萬九百有六唐則九百六萬九千一百五十四宋則二千一萬九千五十元則千三百四十三萬三百二十二明則千二百九十七萬二千九百七十四皆舉當時極盛之數然猶逺不逮我朝之繁庶其故何也蓋自太祖太宗龍興東土即以不嗜殺人為本世祖承明季冦亂之後人歸真主遂定鼎京師命將四出數年之間海內一統窮鄉僻裔咸登戶版曾未有兵戈蹂躪之苦嗣是聖祖世宗暨我皇上聖聖相承休養生息若保赤子撫之者至厚教之者至周百餘年來丁男不知兵革之患亭障從無烽燧之警而且年豐人樂無有夭札疵癘轉徙顛踣以至凋耗者祖孫父子生育繁衍迄於雲仍永為太平之民是以乾隆元年以來直省生齒之版登於天府者較漢唐宋元明之極盛且增數倍之多而八旗之壯丁外藩之臣庶新闢之版章尚不在此數焉而我皇上宵旰憂勤軫恤民隱所以富而教之者益詳且備自今以始丁中黃小之數嵗有增益至於不可紀極猗歟盛哉皇朝文獻通考卷十九
