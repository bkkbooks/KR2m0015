body:
  text: 欽定四庫全書皇朝文獻通考卷二百三十六經籍考二十六集歌詞臣等謹按歌詞一體為樂府之遺音風人之餘派舊志多附詩文集後自馬端臨别為一類續通考因之今亦一仍其例除已見别集詩集中者無庸重出其别立詞集名目者輯為是門至詞譜詞韻為倚聲家科律分刌節度相須而行今敬録聖祖仁皇帝欽定詞譜冠於前而以諸臣所輯詞譜詞韻附於後焉欽定詞譜四十卷康熙五十四年詹事王奕清等奉敕撰聖祖仁皇帝御製序曰詞之有圖譜猶詩之有體格也詩本於古歌謡詞本於詩詩三百篇皆可歌凡散見於儀禮禮記春秋左氏傳者班班可考也漢初樂府亦期協律魏晉訖唐諸體雜出而比於律者蓋寡唐之中葉始為填詞製調倚聲歷五代北宋而極盛崇寧間大晟樂府所集有十二律六十家八十四調後遂增至二百餘换羽移商品目詳具逮南渡後宫調失傳而詞學亦漸紊矣夫詞寄於調字之多寡有定數句之長短有定式韻之平仄有定聲杪忽無差始能諧合否則音節乖舛體製混淆此圖譜之所以不可略也間覽近代嘯餘詞統詞滙詞律諸書原本尊前花間草堂遺說頗能發明尚有未備既命儒臣先輯歷代詩餘親加裁定復命校勘詞譜一編詳次調體剖析異同中分句讀旁列平仄一字一韻務正傳訛按譜填調渢渢乎可赴節奏而諧管絃矣樂記曰凡音者生人心者也哀樂喜怒感於心而傳於聲詞之有調亦各以類應不可牽合而起調畢曲七聲一均旋相為宫更與周禮大司樂三宫漢志三統之制相準故紫陽大儒而詩餘不廢是編之集不獨俾承學之士攄情綴采有所據依從此討論宫商審定調曲庶幾古昔樂章之遺響亦可窺見於萬一云臣等謹按是譜凡八百二十六調二千三百六體自唐迄元遺篇悉採元人小令擇其尤雅者附之均以字數多寡為序欽定曲譜十四卷康熙五十四年詹事王奕清等奉敕撰臣等謹按是譜與詞譜相輔而行首載及九宫譜定論一卷次北曲譜四卷次南曲譜八卷次以失宫犯調諸曲别為一卷附於末淡秋容軒詞一卷范青撰青見詩集類炊聞詞二卷王士祿撰士祿見史類士祿自序曰兀兀圜扉不殊邯鄲一枕故取杜陵詩語斷章而命之其文無謂其緒無端故系之以巵臣等謹按是集本名炊聞巵語且因科場磨勘事繫獄時作故自序云然珂雪詞二卷曹貞吉撰貞吉見詩集類臣等謹按貞吉詞芊眠清麗寄託遙深王士禎彭孫遹張潮李良年曹勳陳維嵩等皆所推挹實為近代詞家之卓卓者不必模周範栁要自成為雅製耳蓼花詞一卷余光耿撰光耿見詩集類玉山詞無卷數陸次雲撰次雲見史類南耕詞六卷嵗寒詞一卷曹亮武撰亮武見詩集類臣等謹按亮武與陳維嵩當時幾欲齊名雖縱橫跌宕之處才氣稍遜其情韻婉摯實不減於維嵩也情田詞三卷邵璸撰璸初名宏魁字柯亭大興人康熙己卯舉人官新河縣教諭遷昌邑縣知縣四香樓詞鈔無卷數范纘撰纘見詩集類詞律二十卷萬樹撰樹見詩集類樹自序曰維陽張氏據詞而為圖錢塘謝氏廣之吳江徐氏去圖而存譜新安程氏輯之於是嘯餘譜一書通行天壤近復有填詞圖譜圖則葫蘆張本譜則矉捧嘯餘蓋歷來造譜之意原欲有便於人但疑拗句難填試易平詞易叶至今日而詞風愈盛詞學愈衰矣樹據花菴草堂尊前花間萬選汲古刻諸家沈氏四集嘯餘譜詞統詞滙詞綜選聲數種考其調之異同酌其句之分合辨其字之平仄序其篇之短長有調同名别者則刪而合之有調别名同者則分而疏之復者釐之缺者補之計調六百六十為體千一百八十有奇臣等謹按是譜糾正嘯餘譜及填詞圖譜之誤并推求諸家詞集之舛異俱一一有據精確不刋雖間有考證偶疏之處然其剪除榛楛之功實不可沒自唐宋以來以詞律名家如樹者固不可多得也詞韻二卷仲恆撰恆字道久號雪亭錢塘人臣等謹按詞韻舊無成書蓋因雅俗通歌唯求諧於聲律不以韻拘故雖填詞之盛莫過於宋而二百餘載絶無撰韻之人自沈謙强作解事恆又因謙書而訂之所分之韻不俗不雅不古不今踵謬沿訛難更枚舉固不足為倚聲家範圍耳詞學全書十四卷查繼超編繼超字隨菴海寧人填詞圖譜六卷續集二卷賴以邠撰以邠字損菴仁和人皇朝文獻通考卷二百三十六
