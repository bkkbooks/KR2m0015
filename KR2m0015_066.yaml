body:
  text: 欽定四庫全書皇朝文獻通考卷六十六學校考四太學二康熙六十一年十一月世宗憲皇帝御極恩詔直省儒學以正貢作恩貢次貢作正貢其不及正貢之府州縣衛學准以次貢作恩貢再次貢作正貢雍正元年禮部尚書陳元龍疏稱國子監監生皆由捐納入監能文之士稀少舊例各省學臣於府州縣生員内每學拔取一名送監肄業名曰選拔監生此例停止已久應令直省學臣查明往例舉行一次於各學廪膳生員内秉公考試每學拔取一名送監肄業尋議請仍照康熙三十六年例府學選拔二名州縣衛所等學每學選拔一名每旗滿洲蒙古共選拔二名每旗漢軍選㧞一名如無文行兼優者寧缺勿濫如有文理荒疎者將該學政照溺職例處分從之定新進士考取八旗教習例捐納嵗貢不准考充酌減直省嵗貢生額數凡各省府州縣學有廩額數少者量減貢額停止國子監官用捐納人員祭酒伊爾登奏言監丞助教博士學正學録等員各有司教之職請停止捐納専用正途出身之教授學正教諭陞補從之又奉諭内外廕生監生到部考試繙繹書法再分𣲖各部行走令伊等咸得勉力學習至世襲官員所得三品廕生内若考試有列優等者賜以所應得原品則伊等必痛自砥礪以求上進不但國家得有用人才即各部院衙門亦不致令無知子弟羣厠其間矣又增設蒙古教習官先是額設八員至是於八旗蒙古䕶軍領催驍騎校内選有通曉經籍明白繙譯熟練國語䝉古語者十有六人分旗送學與助教一同教習互見旗學門命禮部㑹同工部修葺國子監文廟及講堂學舍酌減雲南麗江府學貢額時以學中止設廩生三十名不得照他府學廩四十名每年一貢之例仍照州學例三年貢二人二年上臨雝禮成以五氏子孫觀禮生三十五人送監讀書賜祭酒司業各官冠服及廕貢生銀兩有差諭曰朕惟聖人之道昭揭日月彌綸天地萬世帝王下逮公卿士庶罔不仰遵成憲率由教言我國家尊崇至聖逺邁前代朕纘承大統古訓是學惟日孜孜兹雍正二年三月朔日親詣辟雝祗謁先師孔子行釋奠禮思以鼔勵羣英丕隆文治爾監臣宜嚴督諸生善為誘導諸生亦宜殫心肄業實踐躬行秉端方以立身敦忠孝以興誼勿營奔競勿事浮華文必貴於明經學務期乎濟世俾品成詣進以副朕教育至意此爾多士之庥亦惟爾監臣董率之功也慎勿怠荒職業以貽爾羞諸生其共勉之増在監肄業録送貢生監生本科鄉試中額准琉球國遣陪臣子弟鄭秉哲等三人來學照康熙二十七年例遴選文行兼優貢生盡心訓迪委博士二人董率本監堂官不時稽察其教習生廩糧咨部考職等項俱照官學教習例其住房及四時衣服用物統令稽察務使得所又以平定青海大功告成御製碑文勒石太學御製文曰我國家受天眷命撫臨八極日月所照罔不臣順遐邇乂安兆人䝉福乃有羅卜藏丹津者其先世固始汗自國初稽首歸命當時使臣建議畀以駐牧之地其居雜番羌宻近甘凉我皇考聖祖仁皇帝睿慮深逺每厪於懐既親御六師平定朔漠威靈所加青海部落扎什巴圖兒等震讋承命聖祖仁皇帝因沛殊恩封為親王兄弟八人咸賜爵禄羈縻包容示以寛大而狼心梟性不可以徳義化三十年來包藏異志朕紹登寶位優之賜賚榮其封號尚冀革心輯寧部衆而羅卜藏丹津昏謬狂悖同黨吹拉克諾木齊阿喇布坦溫布藏巴扎布等實為元惡謂國家方宏浩蕩之恩不設嚴宻之備誕敢首造逆謀迫脅番羌侵犯邊城反狀彰露用不可釋於天誅遂命川陕總督太保公年羹堯為撫逺大將軍聲罪致討以雍正元年十月師始出塞自冬涉春屢破其衆凡同叛之部落戈鋋所指應時摧敗招降數十萬衆又降其貝勒貝子台吉等二十餘人朕猶憫其蠢愚若悔禍思愆束手來歸尚可全宥而怙惡不悛負險抗違乃决翦滅之計以方畧宻付大將軍羮堯調度軍謀簡稽將士用四川提督岳鍾琪為奮威將軍於仲春初旬禡牙徂征分道深入搗其窟穴電掃風驅搜剔巖阻賊徒蒼黄糜潰窮蹙失據羅卜藏丹津之母及逆謀渠魁悉就俘執擒獲賊衆累萬牲畜軍械不可數計賊首逃遁我師踰險窮追獲其輜重人口殆盡羅卜藏丹津孑身易服竄匿荒山殘喘待斃自二月八日至二十有二日僅旬有五日軍士無久役之勞内地無轉輸之費克奏膚功永清西徼三月之朔奏凱旋旅鐃鼓喧轟士衆訢喜四月十有二日以倡逆之吹拉克諾木齊等三人獻俘廟社受俘之日臣民稱慶伏念聖祖仁皇帝威靈振於遐方福慶流於奕葉用克張皇六師殄滅狂賊行間將士亦由感激湛恩厚澤為朕踴躍用命斯役也芟夷凶悖綏靖番羌俾烽燧永息中外人民胥享安阜實成先志以懋有丕績廷臣上言稽古典禮出征而受成於學所以定兵謀也獻馘而釋奠於學所以告凱㨗也宜刋諸珉石揭於太學用昭示於無極遂為之銘曰天有雷霆聖作弧矢輔仁而行威逺寧邇維此青海種類實繁錫之茅土列在藩垣被我寵光位崇禄富負其阻遐禍心潛搆恭惟聖祖慮逺智周睠念荒服綏撫懐柔朔野既清西陲攸震爵號洊加示之恩信如何凶狡造謀逆天鼓動昏憝冦侵於邊惟彼有罪自干天罰桓桓虎貔爰張九伐王師即路冬雪初零日耀組練雷響鼙鉦蠢兹不順敢逆戎旅奮張螳臂以當齊斧止如山嶽疾如雨風我戰則克賊壘其空彼昏中迷曽不悔戾當翦而滅斯焉决計厲兵簡將往擣其巢踰歴嶔嶇坦若坰郊賊棄其家我縶而獲牛馬谷量器仗山積蹇兔失窟何所逋逃枯魚遊釡假息煎熬師以順動神明所福旬日凱歸不疾而速殪彼逆謀懸首藁街獻俘成禮金鼓調諧西域所瞻此維雄特天討既申羣酋惕息槖戈偃革告成辟雍聲教遐暨萬國來同惟我聖祖親平大漠巍功煥文邁桓軼酌流光悠久視此銘辭繼志述事念兹在兹令滿漢祭酒司業率助教等官勤課官學諸生國子監滿漢祭酒司業轉飭助教教習等官每日親臨官學將官學生内習滿文者教以書寫本摺字畫習文章者講論聖賢經𫝊習繙繹者熟繙古文淵鑒大學衍義等書祭酒司業不時巡行親查以勸勤儆惰每月𫝊至國子監考試一次分别優劣優者奬賞劣者戒懲俾有實效毋存虚名又禮部議定凡五經博士應襲職之子孫宜送本部考試文藝劣者送監肄業三年方准承襲復建立題名碑制諭禮部工部國子監進士題名之典始於唐時新進士榜後於慈恩寺塔下題名立碑自宋明以至我朝皆建碑國學按其甲第先後勒載姓名籍貫於上所以重科名也今太學聖廟㦸門外所立本朝厯科題名碑自順治丙戌科起至康熙戊戌科而止稽之㑹典諸進士釋菜後禮部題請工部給建碑銀一百兩交與國子監立石題名康熙三年裁省自後每科諸進士各自捐貲立石我國家振興文教凡鄉試㑹試動用帑金數萬朕即位之始即開恩科誠以科目一途實闗用人取士之要題名之典豈宜缺焉著工部動用正項錢糧㑹同國子監將雍正癸卯甲辰兩科題名碑速行建立康熙辛丑科亦宜補建嗣後每科仍照舊例題請庶士子觀覽此碑知讀書登榜之榮益勵其潛修上達之志爾該衙門即遵諭行定甘肅凉州衛學嵗貢生例三年貢二人改定奉天府學嵗貢例向例滿字號五年一貢未免壅滯民籍一年一貢未免太速至是改定滿字號三年貢一人民籍二年貢一人増定陜西凉州衛學貢額向例二年一貢今照州縣例三年兩貢三年左通政陳良弼條奏八旗漢軍筆帖式貢監生員官學生亦有學習繙繹者請照滿洲蒙古例一體考試部議以三年之内應行考取秀才舉人進士各一次從之復設國子監舊裁滿助教四員從國子監祭酒宗室伊爾登請也定陜西寧夏府州縣衛學出貢例寧夏西寧凉州甘州四府各學一年一貢靈州學及中衛縣學三年並兩貢寧夏寧朔西寧武威平羅碾伯古浪髙臺永昌鎮番山丹平番等縣學俱兩年一貢張掖出貢照寧夏例酌減廣西思明府等學貢額時以思明府學額廩不滿十名一年一貢左州額廩十名養利州永康州額廩不滿十名三年一貢未免太驟乃均定四年一貢至太平土州初設學其廩生出貢俟補廩十年後照縣學例二年一貢四年頒御書文行忠信匾額於太學定山西朔平府等學貢額新設朔平寧武二府二年一貢其右玉偏闗左雲平魯陽髙天鎮六縣挨年出貢均照縣學之例吏部議奏國子監漢字助教員缺請將舉人副榜按科分每旗咨取十人并將由舉人副榜出身之俸深筆帖式每旗咨取五人清文助教員缺於清文俸深筆帖式内每旗咨取十人考取註冊不限旗分各按名次補用論俸陞轉從之奉諭内閣助教一官有教訓士子之責若只考試繕寫則年少淺學但工寫字者皆可入選何能得人可𫝊諭各部院衙門將滿洲筆帖式内老成有品行者保舉引見其應考繙譯者仍照例考試吏部遵㫖議覆各省恩㧞副貢已就教職者應令學臣於嵗科兩試事竣㑹同督撫與挨貢一體騐看造冊送部銓選年老者以原品休致從之五年定捐納貢監歸學臣約束例捐納貢監有應行禠革者令地方官申報督撫學臣事屬督撫者准督撫移咨學臣事屬學臣者准學臣移咨督撫増定奉天府學出貢例禮部議覆奉天府府丞湏洲疏言府學民籍廩生請二年一貢滿字號廩生請三年一貢應如所請從之命八旗官子弟十八嵗以上者入監讀書互見旗學門其不能習文者令其披甲學習馬步弓箭向來𢃄赴外任之處永行停止至八年又定八旗外官子弟十八嵗以上者悉令歸旗願讀滿漢書者移送官學國子監肄業并習弓馬定繙譯舉人得考補八旗官學助教例王大臣等議准凡選擇官學生不拘門第務擇聰明俊秀子弟年幼者令學滿文稍長者令學漢文向例八旗每佐領下必選一人入學今酌定一旗額設官學生百名分𣲖滿洲六十名以三十名習滿文三十名習漢文蒙古二十名漢軍二十名凡有官學生缺出通在一旗選擇不拘佐領申送本旗都統騐看交國子監當堂考録再向來官學每旗設滿洲蒙古教習二員漢教習五員今酌定漢教習每旗共設六員每名下各𣲖定學生若干人専心訓課以専責成不得如往日之輪流更换其支給銀米俱倣照景山官學之例本堂官不時稽查分别勤惰勸懲三年期滿以知縣候選再留教習三年者以知縣即用互見旗學門給官學生肄業錢糧康親王等議覆祭酒孫嘉淦條奏八旗官學生向來皆無錢糧以故無力之家不能行走查得八旗所設教養兵滿洲三千六百八十名蒙古四百八十名漢軍九百六十名滿洲蒙古每名一月給銀三兩漢軍每名一月給銀二兩令其學習弓馬但其中每有將㓜穉者充額不能操弓上馬而官學生年壯者往往挑選披甲伏思今官學生内有年壯而讀書遲鈍者令囘旗披甲其所出之缺選年㓜者補之以習滿文俟其稍長再學弓馬則彼此皆有禆益伏望聖恩飭令八旗將教養兵額數滿洲分出三十名蒙古十名漢軍十名將此五十名錢糧給官學生計滿洲蒙古每名領銀一兩五錢漢軍每名一兩則壯者既有錢糧以學習弓馬㓜者亦有錢糧以學習文藝長㓜皆蒙聖恩文武皆得造就請將八旗教養兵清查數目如目前現缺五十名者即照數撥給官學如缺額不及五十名者俟其將來缺出陸續撥給官學得㫖允行互見旗學門奉諭禮部直省拔貢舊例十二年題請舉行一次後因各省學政不能秉公選取國子監未便照例請行於雍正元年特行一次朕思各州縣每年嵗貢較其食廪淺深挨次出貢内多年力衰邁之人欲得人才必須選拔著各省學臣於科考時照例府學㧞取二名州縣學拔取一名寧缺勿濫務取學問優通品行端方才猷可用之人命其來京朕將親加考騐令入國子監肄業如有學問荒陋人品不端才具庸劣者將該學政嚴加議處嗣後六年選拔一次國子監届期題請候㫖又奉諭向例考取拔貢俱於現考一二等生員内選取但恐作文有一日之長短而文理平通不列優等者其人或品行端方才識練達足備國家之用亦未可定嗣後不必拘一二等生員俱准收考酌量試以時務䇿論果有識見才幹再訪其平日品行端方即正考未列優等亦准選㧞定河南延津縣學貢額時以胙城縣裁歸延津縣兩學見廩四十名照縣學例二年一貢未免壅滯議准出貢之年起送二人俟廩額停補扣清後仍照各縣學例二年一貢定湖南鎮谿所學貢額俟補廩十年後照例二年貢一人定陜西潼闗縣學貢額潼闗衛學新改縣學照例二年一貢酌定山東萊州府學貢額時以復州金州二衛廩生既歸并山東萊州府學每年一貢未免壅滯議准每年萊州府學二名俟金復二衛出貢完日仍照例每年貢一人六年吏部議准八旗蒙古官學生監内有能繙譯滿洲蒙古字話者以各部院蒙古筆帖式用又國子監八旗䝉古官學生監生學習滿洲蒙古繙譯既各蒙恩賞給錢糧其内蒙古學實屬多設應將内蒙古學裁去其裁退之學生俟國子監本旗學生缺出坐補其裁退之助教俟助教缺出坐補又八旗蒙古監生官學生内有學習漢文情願考試滿漢繙譯者令其考試取中後以吏部等衙門蒙古筆帖式用又國子監助教八員係訓迪滿洲蒙古繙譯之員嗣後遇缺於理藩院及修書蒙古筆帖式并國子監閑散巴克什内令理藩院㑹同國子監揀選擬定正陪咨送吏部𢃄領引見補用互見旗學門増設八旗官學向來兩旗共立官學一所而八旗子弟家居各自散處其逺者或值天寒或值隂雨不能就學至是令每旗各立一學共増四所並添設教習四員每學各一員其子弟二十嵗以下十嵗以上俱入學肄業或所居與别旗學相近情願就近讀書者聼其自便互見旗學門俄羅斯國遣其官生魯喀佛多徳宜畹喀喇西木四人來學即舊㑹同館設學選滿漢助教二員教之每人給以銀米學成遣歸嗣後更番受業不絶七年定湖北恩施縣學二年一貢例定四川成都華陽各學出貢例成都華陽四年輪貢二人威州學三年二貢餘縣學俱二年一貢命八旗選拔貢生滿洲蒙古每旗起送二名漢軍每旗起送一名命直省選拔貢生府學二名州縣學一名命各省拔貢來京者准以貢單應北闈鄉試嚴例監生借照入塲之弊先是生員俊秀援例捐貲入監事例不一如軍需營田塘工荒賑之類由各部題准遵行或咨送本監讀書或在籍准作監生免其到監至是禮部議覆學臣徐本疏言俊秀監中不應試者往往於鄉試年以監照借人頂名入場請飭各省於捐納後行文取結時即令其填寫不應試字様以便查騐從之八年定肄業生分班考課之期各省恩㧞嵗副貢生每旬以二五八三六九為期分為兩班按期赴監考課不得託故不到廣國子監學舍將附近官房一百四十二間給與肄業生等從祭酒鄂爾竒孫嘉淦之請也恩賞肄業生膏火每年於户部支給賞銀六千兩為諸生衣食膏火之資其餘以備諸生之遇有事故及實在無力者量加助給之需臣等謹按太學之地所以儲材育士也史稱光武起太學博士舍及内外講堂諸生横巷為海内所集唐貞觀五年増創學舍國學之内八千餘人以為近古以來未之有也我朝文教敷宣崇儒養士即元明國子監舊基而振新之復廣學舍五百三十一間以為諸生作息之所招徠遊學之士命直省起送貢監肄業其中猶復籌其衣糧而外曲備需用極於至纎至悉厚澤恩仁真同覆載蔑以加矣至是叠行選㧞多士觀光者雲集京師特沛恩綸加賞官房一百四十二間以廣學舍並賜嵗需銀六千兩以資餼廪於是膏火充餘几席展布四方之負笈而横經者濟濟如林視漢唐極盛時所稱猶未足比擬焉我皇上臨雝講學隆禮先師曠典殊恩有加無已而重修黌序輪奐聿新是以瑞槐重榮益彰棫樸菁莪之化以徴雲漢作人之盛而文治彌隆聲教四訖歟命九卿於進士舉人内保舉助教等官向例助教等官由外省學官陞轉至是特命祭酒司業秉公甄别年老衰憊者以原品休致學問平常者以應得之官改補所遺員缺以保舉人員引見補用定四川分設州縣學出貢例舊州分縣輪流二年出貢州貢二人縣貢一人其一州又分設二縣者仍照三年二貢例州貢一人後新縣貢一人州再貢一人後次新縣貢一人若舊縣分設新縣輪流二年各貢一人定湖南澧州直𨽻州學出貢例澧州升為直𨽻州從前撥入府學者州籍歸州縣籍歸縣廩増改為舊廩舊増與本州縣學生員照考案先後挨次間補較年分出貢其九谿永定二衛歸併安福縣學照縣學例二年一貢定山西河東運司學出貢額照縣學例二年一貢九年又申定選拔順天八旗貢生増加額數先是八年順天府府尹兼管國子監事孫嘉淦奏言漢人貢生為數甚多而旗下選拔不過數人臣前為學政考試八旗生員見其材質聰明氣宇軒昻者實繁有人而皆溺記誦詞章之習不知返躬實踐修已治人之道似為可惜請將旗下生員多行選㧞每旗或㧞八人或拔十人令其入監肄業臣等與各省貢生一體教導俟其學成再行揀用或即以之補授助教等官使之督率生徒則八旗官學益加振興矣得㫖著果親王鄂爾竒孫嘉淦㑹同選拔至是以考試八旗選㧞九十四人送監肄業奏聞報可臣等謹按此次選㧞専為順天八旗即奉天亦未舉行也葢自雍正五年定選拔貢生以六年一次為率是以此次係出特典云十年大學士等遵㫖議覆凡滿洲教習三年期滿其行走勤謹教導有成者列為一等舉人以小京官即用貢生生監以筆帖式即用已補筆帖式之貢生生員照舉人例用列為中等者再留教習三年如教導有成帯領引見照例咨部選用不能稱職者禮部不時查㕘從之令八旗漢軍記名舊家子弟無力延師者得入官學肄業左翼二十一人右翼十一人每月人給銀二兩令其各就本旗官學肄業該助教與教習等課讀清漢書再於兩翼滿洲内選騎射教習各一人間日赴學教騎射并國語每月人給銀三兩定直𨽻天津府縣等學貢額時天津州改為府俟十二年後照例一年一貢寳坻分設之寧河亦俟十二年後照例挨年出貢天津縣學仍二年一貢天津府商竈二籍廩生遇應貢之年照例出貢十一年定優生准作貢監例先是順治十五年以科臣王命岳疏言貢途壅滯遂停止選用優生之例至是禮部奏言各省優生令學政出具考語具題送部從前祗議升入太學並未分晰貢監名色以致一切考試録用皆無從着落今擬優生由廩増升入太學者准作嵗貢附生武生准作監生皆由部换給執照劄監肄業得㫖各省保送優生廩増准作嵗貢附生准作監生該部劄監肄業其武生到部時禮部考試文藝兵部考試騎射請㫖十二年定江南徐州府銅山縣各學嵗貢例府學嵗貢一人縣學二年貢一人吏部議覆祭酒覺羅呉拜條奏國子監監丞典簿員缺向例由各省教職論俸推陞每有年力衰邁學問平常者難為士子表率嗣後請於守部進士并學習期滿舉人内揀選引見補授應如所請從之定陜西興啇二州屬縣各學出貢例紫陽山陽啇南二年貢一人其石泉鎮安三年貢一人平利白和四年貢一人俟四學廩生各補足數仍准其二年一貢定奉天復金二州學出貢額復州三年貢一人金州五年貢一人命教授八旗官學生算法先是康熙五十二年設算學館於暢春園之蒙養齋簡大臣官員精於數學者司其事特命皇子親王董之選八旗世家子弟學習算法又簡滿大臣翰林官纂修數理精藴及律吕諸書至雍正元年告成御製序文鐫板頒行至是年於八旗官學增設算學教習十有六人每旗官學各擇資質明敏者三十餘人定以每日未時起申時止學習算法互見旗學門十三年又復增定奉天永吉州學嵗貢例五年貢一人定安徽夀州新分縣學出貢例州學二年一貢縣學三年一貢選㧞八旗貢生滿洲䝉古每旗起送二名漢軍每旗起送一名入監肄業選㧞直省貢生府學二名州縣等學一名定山東武定沂州等府學嵗貢例皆州升為府俟十二年後每嵗貢一人博山惠民蘭山各照縣學二年一貢定廣西太平府屬之太平土州學泗城府屬之西林縣學出貢例俟十年後四年貢一人定江南揚州府屬分縣各學出貢例江都分設甘泉舊廩暫照二年一貢之例兩縣輪貢俟舊廩完竣兩縣新廩四年貢一人山陽鹽城分設阜寧俟舊廩照例出貢後新補廩生山陽二縣各五年二貢阜寧四年一貢皇朝文獻通考卷六十六
