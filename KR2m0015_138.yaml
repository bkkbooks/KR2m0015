body:
  text: 欽定四庫全書皇朝文獻通考卷一百三十八王禮考十四巡幸乾隆三十年正月上奉皇太后南巡先是二十八年十二月諭曰兩江總督尹繼善等合辭具奏請於乾隆乙酉年再舉南巡之典以慰臣民顒望一摺朕惟江浙地廣民殷一切吏治農功均闗要計且襟江帶河濱湖近海之區籌畫澤國田廬無一不重縈宵旰前以壬午嵗恭奉安輿時巡周覽凡淮河水誌節宣牐壩啓閉以及杭屬塘工勘建柴石料段諸事宜曽與封疆大吏目擊手畫以期利濟羣生年來叠經督撫等疏報下河郡邑汛水恬流並無漫溢惟是浙中海潮漲沙雖有起機大溜尚未趨赴中亹是深所厪念而修築柴石諸塘亦當親閲其工以便隨時指示又近日特遣大臣督修水利如濉河荆山橋等處亦為數省灌輸喫𦂳闗鍵所以騐前工而程後効正惟其時矧東南嵗事頻告豐登洪惟聖母皇太后福履康寧彌臻純嘏於是承歡行慶答士民望幸之忱稽典實為允協著照所請准於乙酉之春諏吉南巡其河工海塘應親臨省視者即行先期預備至前此燈綵繁文暨扈從人員僱覔巨舟并簽佔公館諸禁已屢頒諭㫖即朕所過行宫道路距上届為日匪遙祗須灑掃潔蠲足供頓憩不得稍事増華勞費副朕仰承慈豫俯順輿情之至意將此通諭各該衙門知之至是駕發京師至景州諭曰朕恭奉皇太后安輿省方問俗凡清蹕所經祗令灑掃潔淨毋事華飾及添建行宫屢經降㫖申諭而地方大吏以慈駕臨駐旃廬究不若屋宇之安善尚有葺治行館以供憩息者因其義適温凊且成事不説是以不復禁止兹停蹕景州見一切位置頗為妥適從前所賞公帑尚恐不敷應用在封疆大臣善體朕意雖不敢派累閭閻而各官或有捐廉經理亦非所以示體恤著加恩于直隸存公項内賞銀二萬兩以裕工作之費再山東亦有新建座落三處經畫諒與直隸相同亦著於該省存公項内賞銀二萬兩充用該部即遵諭行至山東遣官祭東嶽先師孔子闕里元聖周公廟入江南境遣官祭河瀆淮瀆江瀆駕至清河縣渡河閲清口東壩木龍至蘇州詣文廟行禮至海寧縣閲海塘幸尖山觀潮諭増築塘下石坦水三層以衛石塘至杭州遣官祭禹陵南鎮海神廟閲兵御試進獻詩賦士子中選者四人特賜内閣中書至江寧親祭明太祖陵閲兵御試江蘇安徽進獻詩賦士子中選者十一人特賜内閣中書至淮安閲髙家堰堤工至徐州閲河工遣官祭河神廟駕自徳州登陸回鑾命簡親王豐訥亨等扈從皇太后聖駕由水程回京乾隆三十二年二月上巡幸天津先是正月諭曰朕於二月二十五日啓鑾巡幸天津閲視河堤所有應行備辦事宜著各該衙門照例預備至是駕發京師閲淀河諭曰朕此次巡幸天津閲視河堤經過陸路水程該地方官預備座落數處以供憩頓恐應銷公項銀兩不敷需用著於長蘆應解内務府銀兩賞給銀三萬兩以為辦差之費三月閲子牙河堤駕至福佑寺海神廟拈香觀海閲鹽池閲兵上回鑾三十五年三月上奉皇太后巡幸天津先是三十四年十二月諭曰據楊廷璋奏淀河神宇告竣請奉皇太后安輿拈香祝釐一摺天津近依輦轂朕前此親臨巡視經理淀河工程俾得永資樂利復以神庥昭應嵗稔瀾安勅建淀神祠宇同答嘉貺該督既稱兹當輪奐維新之㑹喜值普天同慶之時畿輔輿情願切瞻就自宜俯從所請於明春掖輦承歡祝延瞻禮以慰蒸黎望幸之忱明年為朕六旬慶節敬當展謁東陵西陵禮成旋蹕正屆春和即敬奉慈輿諏吉前往該督其飭所屬一切務從儉約毋得増飾繁文副朕行慶省方嘉恵甸民之至意所有應行預備事宜著各該衙門照例預備又奉諭曰明嵗為朕六十夀節祗循彞典躬謁東陵西陵復據楊廷璋奏直隸臣民情殷瞻就籲請敬奉慈輦巡涖天津以申祝釐望幸之忱業已降㫖允行隨即奏聞聖母兹䝉皇太后以後嵗為八旬萬夀亦欲於明春同朕展謁兩陵禮成再幸津門朕敬承懿㫖益切欽愉謹涓吉於來年二月十八日恭奉皇太后聖駕啓鑾所有應行典禮著各該衙門敬謹預備至是上奉皇太后謁東陵西陵禮成巡幸天津三月詣淀神廟拈香閲文安堤幸望海寺拈香奉皇太后至海光寺拈香閲操諭曰朕因淀神祠工落成親詣瞻禮並允直隸天津臣民之請恭奉皇太后巡幸天津共伸慶祝地方官於淀神祠旁及左格莊二處添行宫以供安憩臨幸時因其事屬已成不能復為禁飭但工作未免煩費雖伊等義效尊親朕實不欲其過耗物力著將此二處行宫各賞銀二萬兩於鹽課應解内務府銀兩項下撥給俾資興葺之需並諭該督等嗣後毋得稍有増飾及新建行宫以副朕體恤崇樸至意上回鑾三十六年二月上奉皇太后巡幸山東先是三十五年八月諭曰今嵗巡幸天津山東撫臣富明安至行在覲謁以明嵗恭逄皇太后八旬萬夀普天同慶奏請登嶽祝釐且言該省臣民五年來望幸之情實為誠切籲懇至於再三朕因奏聞聖母以泰山廟宇鼎新欲親詣拈香展敬朕亦以闕里乆未臨謁便道往涖於禮為宜而往返俱由水程可適髙年頤養面諭該撫俟秋成後再行降㫖兹該撫奏山左二麥既穫大田豐稔比户盈寧爰允所請於獻嵗春和恭奉安輿擇吉啓蹕以臚懽抃而迓慈禧惟是連嵗恭逢慶典業於春巡津淀時俯順輿情俾共伸巷舞衢歌之悃來年巡蹕所至非但甸畿境内不宜復事繁文即東省入疆以後亦不當綴景増華致滋糜費朕省方問俗念切觀民惟以閭里恬熙羣情愛戴為樂若備陳彩飾紛耀川塗不足觀美而徒耗物力實所不取該督撫其善體恪遵毋違朕命將此宣諭知之又諭曰明春恭奉皇太后巡幸山東由通州水路至徳州登陸仍自濟寧水路回鑾所有御舟後親隨船十餘隻仍照今嵗自天津回鑾之例備用外其餘隨從之大臣官員人等俱由陸路扈行該督撫即飭屬留心體察毋任胥吏人等借端封禁船隻致滋繁擾著將此宣諭直隸山東督撫等知之至是駕發京師諭曰今日至寶稼營登舟見所設水營外圍蓆牆概行羃以黄布甚屬非是向來巡幸所經水程營盤外牆率以葦蓆為之儘足以蔽外内惟江浙兩省因葦蓆稀少代之以布即與内布城相屬髙下亦略相等今乃於葦蓆之外復加布襲且髙逾數仭儼如大牆其意何取布疋為小民被服所需豈宜妄為耗費即如武清等縣去夏曽經被淹因加恩從優賑卹幸而民無菜色稍為慰懷若留此布為貧民𥜗袴之用資衣被者不知凡㡬顧置有用為無用使不知者㡬擬於土木衣文繡豈朕省方觀民之意司牧之謂何曽不知體下情承上徳乎前途有如此者即撤去所有布疋聴民間買用庶不至成棄物山東毗連直隸恐亦聞風效尤並著速行除撤至水營内所備座落數椽該督之意為朕披覽奏牘召對臣僚而設亦甚無謂且又未預為奏明又屬冒昩朕自辛未南巡以來川塗所涖毎月辦理庶務延見臣工俱在御舟諸凡甚為攸適且並未以舟居廢事衆所共知此次允富明安之請巡幸山東所重在問民疾苦嘉恵羣黎實不欲絲毫耗及閭閻物力猶恐地方大吏踵事増華屢經諄諭一切務從儉約毋飾浮靡不啻三令五申楊廷璋何竟不知仰體朕意若此著傳㫖申飭并將此通諭知之駕至山東上幸靈巖寺拈香詣岱廟拈香詣壺天閣碧霞宫拈香御試山東省進獻詩賦士子中選者二人特賜舉人一體㑹試至兖州城上臨閲復聖廟詣孔林酹酒少皥陵元聖廟行禮賜衍聖公合族等飯諭曰前嵗修葺太學告成因念闕里廟堂設有犧象諸尊爰擇舊藏周範銅鼎尊等十事陳之大成殿用備禮器兹臨幸曲阜祗謁先師閲視所列各器不過後漢時所造且色澤亦不能甚古惟兹昌平聖里宜陳法物以為觀美著倣太學之例頒内府所藏姬朝銅器十事備列廟庭用愜從周素願俟回鑾後慎選郵發交衍聖公孔昭煥世守勿替以副朕則古稱先至意上回鑾三十八年三月上啓鑾祗謁泰陵禮成後奉皇太后巡幸天津先是三十七年九月諭曰昨據周元理奏請明春巡幸津淀仰懇敬奉皇太后安輿周覽畿甸以洽慈歡並請趙北口登舟一路均係水程較為安適等語朕俯循輿望恭請懿㫖仰䝉慈諭欣悦允行明嵗皇太后自京啓鑾由黄新莊涿州至紫泉一路于趙北口登舟所有應行預備事宜各該衙門照例敬謹預備至是正月諭曰朕于三月初三日啓鑾祗謁泰陵禮成後奉皇太后安輿巡幸天津距京師不過數程較之熱河道里猶近非若巡幸他省可比如河東總河及山東河南二省巡撫以地壤相接就近奏請覲光原為合理即如鹽政織造等呈進備賞之物亦尚有因至各省督撫等差人齎摺請安已可不必乃督撫等相率進獻方物甚屬無謂念其逺道而來至費跋涉難以槩行屏却因量收食物數種以備隨營賚予但封疆大臣惟當善體朕心似此非理之禮實所不取嗣後巡幸近畿各督撫務恪遵此㫖不得復有進獻將此通諭知之上詣龍王廟拈香閲永定河堤詣淀神祠拈香閲淀河御試直省進獻詩賦士子特賜内閣中書者一人給舉人者四人詣教場閲兵閲永定河下口堤上回鑾四十一年二月上奉皇太后巡幸山東先是正月乙未諭曰前據將軍阿桂等奏蕩平金川大功業已全定更無俟馳報紅旗今諏吉二月初九日啓鑾先謁東陵再謁西陵申達集勲忱悃禮成回至南苑恭奉皇太后聖駕由桐柏村登舟巡幸山東由徳州遵陸掖輦展謁岱廟祗迓慈釐即詣闕里告成瞻禮仍於濟寧由水程回鑾計當將士凱旋之期即可舉行郊勞以彰定武鴻庸所有應行一切典禮各該衙門照例敬謹預備至是上謁陵禮成二月上詣皇太后行宫請安即恭奉慈駕登舟巡幸山東三月諭曰朕以金川全境蕩平恭奉皇太后安輿巡幸山東告成闕里先期諭知該督等沿途無事㸃綴繁文兹桐柏村駐蹕之所祗循向有行館而自寶稼營登舟以來水營規模亦悉仍其舊但程站較多地方官修葺經理亦未免需費著加恩於長蘆鹽課應解内務府銀兩内賞銀一萬兩以示體恤又奉諭曰朕因兩金川全境蕩平恭奉皇太后巡幸山左登岱延禧告功闕里巡撫楊景素以遵陸後沿途雖舊有行宫而自徳州至平原程站較長因於適中處所添設樸屋數楹以備聖母慈躬安憩於髙年頤養為宜是以不加禁止兹臨駐所至見其規制雖不事奢華而結構究不無所費且逐程修葺行館亦不免稍需用度著于山東鹽課内賞給銀二萬兩以示體恤又奉諭曰朕前嵗閲視河工臨涖天津督撫等有逐道進貢者曽降㫖通諭飭禁兹因平定兩金川巡幸山東告成闕里各省督撫呈遞貢摺者甚多殊屬無謂朕鑾輅所經如本省大吏呈進方物尚非過分即各鹽政闗差織造間進紬縀等項以備賞賚亦尚有因乃各省督撫竟相率逺致皮張縀匹等物為誇多鬬靡之舉朕非但不喜且覺煩凟可憎封疆大臣朕委任以地方政務惟視奉職程其殿最豈因進貢衡其短長伊等何不知善體朕意冒昩若此乎所有此次各督撫呈進之物已諭令奏事處槩行擲還仍著傳㫖申飭嗣後遇朕巡幸務恪遵此諭毋得復有進獻將此再行通諭知之上詣遙參亭岱廟拈香上詣泰山壺天閣南天門闗帝廟碧霞宫拈香賜山東巡撫以下及鹽政等官食御試山東及各省進獻詩賦士子特賜内閣中書者二人賞給舉人者三人上詣文廟行釋奠禮賜衍聖公及孔氏族人食復詣孔林酹酒少皥陵元聖廟行禮四月上登舟至分水龍王廟闗帝廟禹王廟拈香諭曰此次巡蹕所經直隸山東兩省毎日俱有戲臺承應甚或間以排當殊屬無謂朕啓鑾前再三申諭勿務繁文而地方官總不能實心仰體朕於道旁老㓜扶攜瞻覲嘉其情殷愛戴毎顧而樂之至於沿途㸃綴飾為巷舞衢歌之象從未嘗攬轡停輿一為聴覽亦何必為此無益繁費乎前次恭奉皇太后巡幸江浙臚歡祝釐所至或綴陳燈綵音樂以奉慈娱因兩淮蘇杭地本殷阜且俗尚如斯遂爾不加斥禁然亦初不以為觀美若北方風氣淳樸豈可效其所為又從而踵事増華乎況今年巡涖山東原因臨清地方前嵗經逆匪王倫滋擾閭閻不免凋敝故欲親臨閲視以慰厪懷適當平定兩金川告功闕里登堂展禮藉申五年疎濶之忱又因道經泰山祗奉安輿詣岱廟瓣香展敬以迓鴻禧此則朕自抒尊養之誠有司等固不當援引南巡祝嘏之例也朕省方問俗惟以民生休戚為念而農田晴雨尤軫于衷即如三月朔日天津途次優渥春膏夾岸麥隴青䓤深為欣悦乃自入山東境至今為之望霖已經彌月雖有廉纎微潤而甘澍未得霈霑麥禾漸覺減色朕心實切焦勞即行館供陳亦為之居不安席豈復能適意乎督撫等當以朕此心為心方不負朕委任至意朕簡畀封疆大臣惟視其留心民事者加之恩眷從未嘗因其能辦差善承奉稍為嘉奬此尤中外臣民所共見共聞者督撫等可不知所趨向乎朕行事期為天下後世法方今綱紀肅清朕巡省周咨並不以游觀為事誥諭諄諄督撫等尚且不能深喻朕意我子孫若能恪守朕訓庶不致為奢靡所移設或稍不自持畧涉流連游覽督撫因而曲意逢迎其流弊伊于何底此於國運人心所係甚鉅可不共知儆懼乎又如前四次南巡大學士傅恒總理諸務極為安静邇年兩次東巡大臣等管理一切雖尚屬妥協而行營已不能如從前之一無所事又漸有餽遺之風扈從諸臣不可益加戒勉乎今日召見軍機大臣並周元理楊景素詳悉誡諭並將此通諭知之駕至天津詣海神廟拈香御試直隸及各省進獻詩賦士子特賜内閣中書者五人賞給舉人者三人上御舟至望海寺香林院拈香上回鑾四十五年正月上啓鑾南巡先是四十三年十月諭曰大學士管兩江總督髙晉閩浙總督楊景素等合詞陳奏以江浙臣民望幸甚殷且河工海塘皆冀親臨指示懇請於庚子春再舉南巡盛典以愜輿情一摺朕於乙酉南巡回鑾時因耆孺攀戀情殷曽許以翠華再涖然敬念聖母皇太后春秋已髙難以再奉安輿長途逺涉遂諭江浙大吏不必更以南巡為請而江鄉士庶愛戴依戀之情狀未嘗不往來于懷距今已十有四年其顒望悃忱自益肫切且自前巡閲定五壩水誌以為展拓清口之凖下河從此遂免水災嗣聞黄河倒漾所繫甚重因酌定挑濬陶莊引河面諭薩載籌辦河成而清黄交滙處移逺清口不復有倒灌之患但下游尚有停淤亦不可不除其流弊而一切善後事宜若非臨涖閲視究不能悉其實在情形至浙省海塘近來潮勢漸趨北岸深為厪念亦不可不親為相度機宜今髙晉等既有此奏著照所請於乾隆四十五年正月諏吉啓鑾巡省江浙便道閲視河工海塘所有各處行宫座落俱就舊有規模略加葺治毋得踵事増華致滋煩費至該督等以庚子年適逢朕七旬萬夀欲就近舉行慶典則斷不可朕本意以庚子年為朕七旬慶辰越嵗辛丑即恭逢聖母九旬萬夀斯則敷天同慶自當臚歡祝嘏以抒萬姓悃忱今既不能遂朕願尚復何心為已稱慶況朕蹕途所經老㓜歡迎扶攜恐後未嘗不顧而樂之若經棚戲臺侈陳燈彩㸃綴紛華飾為衢歌巷舞深所不取且非所以深體朕意也不特江浙臣民不當為祝釐之舉即凡内外大小臣工於朕七旬萬夀時亦均不得請行慶典以及進貢獻詩若伊等謂欲藉以申其尊敬之誠是轉増朕心之所不悦尚得謂之忠愛乎將此通諭中外知之十一月諭曰前因降㫖允江浙所請於乾隆四十五年正月啓鑾南巡並諭令沿途毋得踵事増華致滋糜費第念蹕路所經江蘇地面較多水營行宫等事皆不能不需用度前四次南巡俱曾賞給庫銀以資籌辦因諭令髙晉將現辦南巡差務需用銀兩若干通盤核計據實具奏兹據髙晉將上四次南巡報銷銀數及恩賞銀兩開單呈覽並稱此次差務除添建行宫三處餘俱撙節辦理較之上屆所費有減無増等語該省辦理差務所用經費既有一定章程上届乙酉年曽經恩賞運庫銀三十萬兩以資籌辦此次著照乙酉之例於運庫恩賞銀三十萬兩為辦理南巡差務之用即著伊齡阿照數撥給仍具摺奏聞該督撫務須董率所屬妥協辦理毋得絲毫科派閭閻致滋擾累副朕觀民孚恵至意該部即遵諭行至是駕發京師諭曰朕因東南黎庶望幸情殷爰舉舊章五巡江浙所以省方觀民勤求治理清蹕所經各處舊有行宫祗令掃除潔淨以供憩宿毋得踵事増華致滋糜費屢經降㫖諄切曉諭封疆大臣自能仰體朕心遵㫖辦理第念直省行館近京數程屢經駐蹕即圬墁裱飾為費尚屬無多其自山東以至江浙所有行宫則自乙酉南巡至今未經臨蒞閲時既久不免舊剥落地方官修理葺治不無所費且山東江蘇二省俱有添建座落此項用度聞各省俱係捐廉辦理在地方大吏養廉豐厚分年扣捐以抒忱悃尚屬可行況朕又復加恩賞給庫銀用示體恤伊等辦理儘足敷用若更因此派累閭閻致滋苛擾則斷不可且非朕念切民依行慶施惠之意也第恐不肖有司或有藉辦差為名暗中科斂而窮鄉僻壤未及周知亦有帮貼差費者一經察出必將該督撫等重治其罪以昭警戒其各凛遵朕㫖慎勿自干嚴譴也將此通諭知之駕至遥參亭岱廟拈香遣官祭先師孔子闕里少皥陵元聖周公廟至江南境遣官祭河瀆江瀆淮瀆駕渡河詣陶莊龍王廟恵濟祠廣濟龍王廟拈香閲清口東壩駕渡江至金山江天寺焦山定慧寺甘露寺拈香至蘇州三月御舟至石門縣跋馬度城易輕舟至海寧州詣海神廟拈香閲海塘至杭州遣官祭禹陵閲兵諭曰朕清蹕時巡臨蒞江浙原因厪念河工海塘親臨閲視兼以省方問俗順時行慶非為遊觀計也前屢經降㫖所有經過地方止須掃除蹕路一切供頓毋庸踵事増華今浙省仍有添建屋宇㸃綴燈綵之事兼多華縟未免徒滋繁費朕心實所不取三寶王亶望均著傳㫖申飭嗣後如再有似此過費者朕必加以嚴譴不能寛貸也御試浙江進獻詩冊士子中選者四人特賜内閣中書諭曰朕巡幸江浙臨蒞杭州見西湖花神廟所塑神像及後樓小像牌字俱書湖山神位其像大小雖異而面貌相仿聞係李衛在浙江時自塑之像托名立廟是以後樓并有正夫人及左右夫人之像甚為可異李衛於督撫中並非公正純臣其在浙江亦無甚功徳於民聞其仰藉皇考恩眷較優頗多任性驕縱之處設使此時尚在猶當究治其愆豈可令其托名立廟永享祠祀乎所有廟中原像著該督撫俱即撤毁於前殿另塑潮神之像並於後殿另塑花神花后以昭信祀上回鑾諭曰朕自三十年南巡以後迄今十有五年東南土俗民風易趨華靡毎朂督撫大吏諄諄化導務期返樸還淳以臻郅治而江南之陶莊清口浙江之海寧塘工其修舉尤闗民瘼因允兩省督撫籲請於今春再舉時巡之典乃自啓蹕以來所過直隸江南一切行營供頓不過就舊有規模畧加修葺辦理尚為妥協而從事浮華山東已開其端至浙江為尤甚朕心深所不取現在陶莊及海塘各工經朕親臨指示所有應行修理工程特命頒發帑金交督撫等悉心妥辦將來工程完竣後朕當再行親蒞閲視恐後任督撫見此次所辦差務已多粉飾未免踵事增華從而加甚勢將伊於何底且江浙士民情殷瞻就者固多而窮鄉僻壤或有名附讀書不能上進之徒本自憤懣不平今因巡幸一切㸃綴過華朕視之實覺過當又安能免若輩之議論乎朕臨御四十五年無日不厪念民依乃以省方問俗之殷懷轉貽口實是誠督撫大吏之不能善體朕心而朕亦將引以為愧矣著再通諭各督撫以後務宜黜奢崇儉於地方諸大政實心經理毋得徒事繁華致滋浮費以稱朕恵愛東南黎庶之至意上渡江至江寧府親祭明太祖陵閲兵御試江蘇安徽進獻詩冊士子中選者十一人特賜内閣中書江西士子二人賞給舉人閲髙堰堤工御舟過黄河詣分水龍王廟禹王廟拈香五月上至圓明園四十六年二月上巡幸五臺山先是四十五年十二月諭曰朕於明春二月十二日啓鑾巡幸五臺所有應行預備事宜各該衙門照例預備至蹕路所經已降㫖止就舊有行宫量加修葺毋許再行添建該督撫等務宜妥協辦理不得踵事増華致滋糜費以副朕省方觀民之至意至是駕發京師巡幸五臺山四十九年正月上啓鑾南巡先是四十八年正月奉諭㫖曰兩江總督薩載閩浙總督富勒渾等合詞陳奏以江浙兩省臣民望幸情殷且河工海塘以次告竣一切善後事宜尤冀親臨指示懇請於乾隆四十九年春六舉南巡盛典以愜輿情一摺朕自庚子南巡時巡閲髙家堰石塘及徐州城外石堤鉅工俱逐一親臨指示兹據奏以次告成所有一切善後事宜自應臨蒞閲視指授機宜俾河流永慶安瀾至浙省海塘前經降㫖將柴塘四千二百餘丈一體改建魚鱗石塘為瀕海羣黎永資捍衛今要工將竣亦不可不親為相度且自四十一年告功闕里後閲時已乆應行展謁孔林以伸景仰今據該督撫等合詞陳奏江浙兩省耆庶望幸悃忱尤為肫切著照所請於乾隆四十九年正月諏吉啓鑾祗謁孔林巡幸江浙順道親閲河工海塘所有各處行宫座落俱就舊有規模略加葺治毋得踵事増華致滋繁費該督撫等其善體朕意妥協辦理副朕省方問俗觀民孚恵至意十一月諭曰朕於明年正月十一日啓鑾南巡江浙閲視河工海塘所有應行事宜各該衙門照例預備至是駕發京師至山東詣岱廟拈香詣孔廟行釋奠禮致祭少皥陵元聖周公廟至江南遣官祭河瀆江瀆淮瀆駕渡河詣陶莊河神廟湖神廟拈香駕渡江至海寧州詣海神廟拈香閲海塘至杭州遣官祭禹陵閲兵御試浙江進獻詩賦士子中選者四人特賜内閣中書至江寧府親詣明太祖陵酹酒閲兵御試江蘇安徽進獻詩賦士子中選者十五人特賜内閣中書江西中選者二人賞給舉人囘鑾至徐州閲黄河形勢指授方畧駕還京師御製南巡記舉大事者有宜速而莫遲有宜遲而莫速於宜速而遲必昩㡬以無成於宜遲而速必草就以不達能合其宜者其惟敬與明乎敬者敬天明者明理敬天斯能愛民明理斯能體物千古不易之理也予臨御五十年凡舉二大事一曰西師一曰南巡西師之事所為宜速而莫遲者幸賴天恩有成二十餘年疆宇晏安兹不絮言若夫南巡之事則所為宜遲而莫速者我皇祖六度南巡予藐躬敬以法之兹六度之典幸成亦不可以無言我皇祖蕩蕩難名予藐躬瞠乎景仰述且弗能作於何有然而宜遲莫速之義則不可不明示予意也葢南巡之典始行於十六年辛未是即遲也南巡之事莫大於河工而辛未丁丑兩度不過勅河臣慎守修防無多指示亦所謂遲也至于壬午始有定清口水誌之諭向來河臣率皆靳拆凊口恐干多費工料之議洪湖盛潨則開五壩下河一帶無嵗不被偏災自壬午年三次南巡始定髙堰五壩水誌髙一尺清口即放開十丈為凖候秋汛後洪湖水勢既定仍如常接鑲口門嗣是河臣恪守此法數十年來下河免受水患田廬並資保䕶丙申乃有改遷陶莊河流之為向來清水毎慮黄水倒漾康熙己夘春皇祖南巡親蒞河干閲視形勢因河臣命於清口迤西隔岸挑陶莊引河導黄使北董安國開放過早旋復淤墊其後庚辰辛巳壬申甲午以及雍正庚戌歴黄水倒命大臣㑹同河臣籌勘挑辦功迄未就是以灌舍開陶莊引河更無善策丙申春諭令河臣薩載詳悉履勘繪圖貼説往返指示即于是年秋興工至丁酉仲春蕆事開放新河大流暢逹既免黄流倒漾之虞兼收清水刷沙之益因命建河神廟以答神佑詳見御製碑記庚子遂有改築浙江石塘之工浙江海塘自戴家橋迤西皆柴塘不足資鞏䕶庚子南巡親臨閲視因飭該督㣳於老鹽倉一帶改建魚鱗石塘仍諭令存留舊有柴塘以為重門保障辛丑壬寅等年陸續採辦石料勘石建築至癸夘八月該督撫富勒渾福崧等奏報海塘三千九百四十丈全行告竣今甲辰更有接築浙江石塘之諭浙江海塘老鹽倉一帶魚鱗石塘雖已全竣而章家菴以西惟藉范公塘土堤一道衛䕶形勢單薄不足以資捍禦因先期傳諭該督撫詳晰籌畫採石鳩工兹甲辰南巡親臨指示不惜百餘萬帑金降㫖一律接築石塘俾濱海黔黎永資樂利至於髙堰之増卑易磚庚子南巡閲視髙家堰工據薩載請將三堡六堡等卑矮磚工加髙余以磚工究不若石工之經乆因命毋惜帑費一律改建石工分井修甃以冀永逺鞏固徐州之接築石堤並山丁丑壬午乙酉三次南巡均至徐城閲視河工形勢次第籌辦添甃石堤俱用石十七層以資鞏固其舊有石工三段長九百七十餘丈較之丁丑新建石堤短少二三層于庚子南巡時命嵇璜薩載㑹勘一律加髙十七層又自韓山至奎山一帶向止土堰兹亦一律接築石堤四百五十丈直連山脚俾濱河永保安居無不籌度咨諏得宜而後行是皆遲之又遲不敢欲速之為夫臣之事君其有知不可而强諍者鮮矣河工闗係民命未深知而謬定之庸碌者惟遵㫖而謬行之其害可勝言哉故余之遲之又遲者以此而深懼予之子孫自以為是而後之司河者之隨聲附和而且牟利其間也與其有聚斂之臣寧有盜臣在他事則可在河工則不可河工而牟利宣洩必不合宜修防必不堅固一有疎虞民命繫焉此而不慎可乎然而為君者一二日萬㡬胥待躬親臨勘而後剔其弊日不暇給焉則仍應於敬天明理根本處求之思過半矣予之舉兩大事而皆幸以有成者其在斯乎其在斯乎若夫察吏安民行慶施恵羣臣所頌以為亟美者皆人君本分之應為所謂有孚恵心勿問元吉予嘗以此自朂也至于克已無欲以身率先千乘萬騎雖非扈蹕所能減而體大役衆俾皆循法而不擾民亦亟其難矣斯必有以振其綱而挈其要然後可以行無事而胥得宜實總不出敬明兩字而已故兹六度之巡攜諸皇子以來俾視予躬之如何無欲也視扈蹕諸臣以至僕役之如何守法也視地方大小吏之如何奉公也視各省民人之如何瞻覲親近也一有不如此未可言南巡而西師之事更不必言矣敬告後人以明余志巡幸儀凡時巡省方命下禮部具議以聞乃宣布諸司及巡省之方豫期供備其地方大吏飭文武官屬敬修迺守攷迺職事無敢不敬戒駕所經行守土官陸治橋梁道路水備舟楫以竢旣諏吉閣部院寺府監疏列正貳官銜名請㫖扈蹕武衛諸臣部勒羽林衛士軍卒嚴明紀律鑾儀衛官整装御營次舍供張皆依時畢辦右戒辦啓行前一日遣官祗告奉先殿如常儀鑾儀衛校以行營次舍先發至日昧爽鑾儀衛陳騎駕鹵簿於聖駕所出禁門外扈從王公暨文武各官服征衣佩弓矢留京王公百官蟒袍補服咸按翼序立門外祗候鑾輅經行之地時命扈從大臣等䕶視田野青苗禁踐踏者稽察䭾車舟楫禁隘道爭先者皆出郊先發屆時皇帝御征衣乘輿出宫導從扈衛如常儀鼓吹振作鹵簿前導扈從王公各官咸跪候過興乘騎隨發留京王公百官跪送候過興各退駕出郊鑾儀衛校韜鹵簿御前張黄龍曲葢領侍衛内大臣率侍衛佩弓矢親軍二十人執豹尾槍前後翊衛豹尾槍後扈從諸王貝勒貝子公為一隊次公侯伯以下文武各官為一隊次八旗官軍依旗為隊毎旗齊馬首按部就班從人輜重隨後扈從次第進發鴻臚寺官豫傳百里内守土文官率紳士耆民武弁率本軍肅隊於御道右百步外序列駕至跪迎侯過興隨至行宫行禮右鑾輿發京師鑾輿既啓行有司豫庀駐蹕行營重城張幔殿黄幄五里外逺斥堠八旗䕶軍布幕環列於重城之外閣部院寺府監扈從官布幕環列於䕶軍之外皆以御營為向駕至詣行營王公離東旌門百步内下馬從大臣羣官百步外下馬從均候宫門前奏事如常及夜嚴鼓侍衛率禁旅分番警巡五漏交外營從官衛士聴角聲治行裝蓐食陸續前後扈從王公大臣豫至駕所出旌門外道右按翼序立内大臣侍衛於宫門前序列辨色皇帝御輿出宫翊衛如儀衆騎從地方文武官跪送道右如初迎禮右行營駐蹕御道所經名山大川及歴代帝王聖賢名臣忠烈陵寢祠墓在三十里以内者行在禮部奏遣扈從大臣各一人齎香帛致祭如儀詳見郊社考及羣廟考右祭所過名山大川將至巡省之方將軍總督都統巡撫總兵官出境奉迎提督學政布政使按察使道府以下州縣以上文官副將以下守備以上武官於本界奉迎皆蟒袍補服恭竢道右駕至跪候過興隨行至行宫紳士耆民隨守土官後跪迎翼日望秩於方嶽及祭古昔帝王功徳隆重者先聖先師皆親詣行禮境内山川先賢名臣忠烈祠墓遣官致祭並如儀詳見郊社考及羣廟考右望方嶽秩山川百神駐蹕行宫日覲地方大吏察其所屬能否而黜陟之清問民生利弊隨宜興除臨視河防指授方略召試陳詩獻賦之士量授以官廣泮宫取士之額以勵文風親閲方鎮重兵辨將備材武軍士技勇以講武事所過府州縣蠲免正賦訪問黎老凡男婦年七十以上者賜銀米有差右考績行慶恵省方禮畢乃以回鑾吉日宣示在京羣臣鑾輿旋蹕地方文武大吏率屬跪送如奉迎禮内閣得㫖宣布各部院寺府監駕將至王公暨文官京堂武官副都統以上内廷供奉記注翰林官科道等官咸蟒袍補服豫出郊至駐蹕行營外道右序立祗候駕至跪候過興隨至行營恭請聖安各退翼日黎明序立于聖駕所入禁門外祗候駕至跪迎皇帝還宫遣官祗告於奉先殿如初禮右回鑾皇朝文獻通考卷一百三十八
