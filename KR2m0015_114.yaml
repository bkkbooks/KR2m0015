body:
  text: 欽定四庫全書皇朝文獻通考卷一百十四宗廟考八太廟祫祭臣等謹按我國家行祫祭而未嘗行禘祭聖祖仁皇帝朝監察御史李時謙疏請舉行禘禮下九卿詹事科道會議禮部尚書張玉書等議曰臣等綜考禮制言禘者不一有謂虞夏禘黃帝殷周禘帝嚳皆配祭昊天於圜丘者有謂祖之所自出為感生帝而祭之於南郊者有謂圜丘方澤宗廟為三禘者先儒皆辨其非而言宗廟之禘又不一説有謂禘祭止及毁廟不及親廟者有謂長發之詩為殷之禘雍之詩為周之禘而親廟與毁廟皆兼祭者惟唐趙匡陸淳皆以為禘異於祫不兼羣廟王者既立始祖之廟直推始祖所自出之帝而以始祖配之故名為禘至於三年一祫五年一禘經無明文其説始於漢儒而後之議禮者咸宗之漢唐宋所行禘禮亦莫考始祖之所自出止於五歲之中行一祫一禘兩大祭於其宗廟而已大抵夏商以前有禘之祭而其制未詳漢唐以後有禘之名而與祫無别惟周以后稷為始祖以帝嚳為所自出之帝而太廟之中原無帝嚳之位故祫祭不及帝嚳至禘祭時乃特設帝嚳之位以稷配焉行於後代不能盡合故宋神宗諭廷臣議罷禘禮明洪武初御史答祿與權請舉禘祭衆議亦以為不必行詔從其議至嘉靖中乃立虛位祀皇初祖帝而以太祖配享事屬不經禮亦旋罷洪惟我國家受天顯命世德相承定鼎之初追上四祖尊稱以肇祖原皇帝始基王迹故立廟崇祀自肇祖始夫太廟之中以受命之君為太祖允宜特尊者也我太祖髙皇帝功德隆盛與天無極自當為太廟萬世之祖上而推所自出則締造之業肇祖為最著今太廟祭祀四孟分祭於前殿後殿以各伸其尊嵗暮祫享於前殿以同將其敬一嵗之中自肇祖以下屢申祼獻仁孝誠敬已無不極五年一禘之祭不必舉行從之蓋自世祖章皇帝肇舉祫祭一嵗時享大祫煌煌乎典制明備矣而合食之禮實即推本太宗文皇帝除夕享廟之精意以垂則於萬年者也謹考祫祭之典彚於編順治十六年七月世祖章皇帝定太廟祫祭禮是月壬戌都察院左副都御史袁懋功言禮莫大於宗廟孝莫大於祀先太祖太宗次第配享獨祫祭之禮闕焉未舉請敕典禮諸臣廣稽舊典復嵗暮祫祭之禮以彰孝治之隆疏入命禮部詳察典例以聞丙戌禮臣議覆請照會典舉行得旨是臣等謹按覆準每嵗暮日祫祭大建於二十九日小建於二十八日十二月甲寅以嵗暮行祫祭禮遣官祗告太廟臣等謹按此即祫祭前期之祗告也是次初行恭書之以見例而每嵗祫祭親詣行禮則彚紀於後十七年三月飭工部修造祫祭神位器皿康熙四十年十二月辛巳祫祭是日禮畢聖祖仁皇帝諭內閣禮部太常寺曰朕自御極以來一切祀典必敬謹齋戒躬親展祭以盡昭事之誠四十年於兹矣每當臨祭之時朕無一事不敬此禮部太常寺起居注官所共知從來祭祀登降起立莫不如常這次行禮將畢微覺頭眩朕之身體稍遜於前於此可見祀典關係重大朕恐精力偶有不周致敬心少間可以此意諭諸大臣等雍正三年二月庚辰世宗憲皇帝以聖祖仁皇帝大喪三年禮終祫祭太廟釋服即吉祭文曰欽惟我列祖受天景命積功纍仁締搆鴻圖逮我皇考聖祖仁皇帝聖德神猷式廓前烈厯數綿長貽謀篤慶以大統付授於臣伏念君親之恩如天罔極三年以來祭祀朝會之禮勉從廷議以時舉行不敢久曠惟於宫禁之中素服齋居想音容而灑淚感霜露以增悽僾見愾聞銜哀致敬無時能釋瞻依之念祗默盡其思慕之心耿耿微誠當蒙列祖昭鑒日月易邁倐值禫除諸臣合詞上言宜依禮經恭行夾祭昭告即吉謹涓良日薦獻几筵於戲德厚恩深莫罄終身之孺慕功崇業盛思揚歷世之耿光伏冀聖慈俯垂歆格先是二年十二月己卯吏部尚書朱軾言皇上至仁大孝居喪三年猶如一日今服制已滿請祫祭太廟即吉釋哀得旨朕覽朱軾所奏當之甚愧朕受皇考四十餘年顧復深恩罔極莫報諒隂三年祗以默盡一點私情非謂歷代帝王不能行之事朕能行之思欲立法定制以垂令名也且如祭祀朝會大禮不容久曠者朕亦勉徇諸玉大臣之請照常舉行惟有齋居素服悲哀思慕盡一已之誠於宫禁之中古人云禮之至者無文哀之深者無節朕自嗣統以迄於今撫時生感觸物增悽僾見愾聞澘然出涕情不容以自禁心不能以自覺遑論其合於古制否乎昔世祖聖祖皆以沖齡登極一時禮制容有未備設世祖聖祖踐阼之日已若朕躬之年則盡禮盡制必有朕所萬不能逮者今朕抱歉之處尚多敢云盡禮乎至所奏三年以來深山窮谷無不哀思戀慕遏密八音等語此乃皇考六十餘年深仁厚澤浹髓淪肌四海臣民哀痛迫切感激思慕愈久不忘出於人心之自然非有所禁約而然也夫以薄海內外凡有知識之倫尚且哀慕不忘如此況躬為子臣欲報昊天罔極之德其終身哀慕復何時能已耶朕之衷曲非欲表暴於人特因奏章過於稱揚朕心滋愧故略為宣寫以示中外至是祫祭禮成回宫又諭順天府尹直省督撫朕惟古昔帝王以孝治天下誠以孝者天之經地之義民之則也故魯論云慎終追逺民德歸厚矣朕以眇躬纘承大統永惟皇考聖祖仁皇帝顧復洪慈恩德罔極中心哀痛什伯恆情以日易月實所不忍特以郊廟大祀朝會重典不容久曠時亦勉從諸王大臣之請遵禮舉行惟於宫庭內素服齋居默盡此心每撫時觸景輒增悽愴僾見愾聞之際哀發於中澘然出涕古人云禮之至者無文哀之深者無節實非有所倣而行亦非欲以立法定制垂譽於天下後世也終身孺慕寧有已時今諸臣據二十七月即吉之文合詞公請夾祭釋服朕以禮制情勉允所請於雍正三年二月十二日祫祭太廟釋服即吉伏念皇考聖祖仁皇帝御極六十一年深仁厚澤普遍寰區賓天之日凡京畿直省海澨山陬士農工賈白叟黃童莫不號呼哀泣孺慕之誠三年有如一日今舉行吉禮應敷告天下朕嗣位以來惟日兢兢嚴恭寅畏不敢怠息庶幾克荷皇考聖祖仁皇帝付託之重羣黎百姓受皇考聖祖仁皇帝教育深恩當勉勵忠誠勤守職業言慈言孝克友克恭農夫盡力於田畝工商致精於器用毋尚奢侈毋事遊惰共期歸真還朴比戶可封以無負皇考六十餘年培養漸摩之至德於朕奉先思孝之心實有賴焉該地方官遍行曉諭俾薄海黎庶咸悉朕意故兹敕諭八年十二月癸亥祫祭太廟遣廣祿恭代先是己未大學士等奏本月二十九日恭遇太廟祫祭太常寺奏請遣官恭代奉旨朕親詣行禮臣等伏思太廟殿宇正興工修理本月二十九日皇上恭詣奉先殿行禮與太廟同伏祈俯允太常寺所請仍遣官恭代奉旨遣廣祿恭代乾隆二年十一月丁丑皇上以世宗憲皇帝大喪三年禮終祫祭太廟釋服即吉祭文曰欽惟我列祖誕膺眷命世德相承丕基式廓我皇考世宗憲皇帝聖明繼緒敬紹前徽纍洽重熙垂光錫慶以大統付授於臣伏念纘承以來哀思時切郊壇宗廟之祀稽定制以恪循宴饗慶賀之儀却廷議而不舉萬幾任重每素服以臨軒罔極恩深總齋居而灑涕歷三年如一日愴四序之遞遷服制屆除禮臣上請恭行祫祭之典昭告即吉之期於戲生成莫報禮有盡而孺慕無窮謨烈常昭運日新而紹聞彌切伏祈聖鑒俯賜格歆臣等謹按天子躬行三年喪肇自我朝奮復古制兹恭紀合享即吉之禮敬惟聖作於前聖述於後是以發勳華之業於周孔之心孝治彌隆所從來者深且厚矣三十七年十一月丁未重定太廟儀是日奉諭朕御極以來夙夜孜孜惟以敬天報本為念每屆郊壇大祀必躬親昭事用展悃誠三十七年於兹未敢稍懈向來詣壇行禮日由降輦進至拜位以迄薦獻禮成中間履蹈升降儀節最為繁重朕惟虔恪以臨無有愆忽今自念春秋已閲六旬其於動容周旋差不能及前此之從容中節幸朕康強如昔仍得祗循儀度經久不渝第思敬意所持貴乎內外交養若精力過勞恐心志轉未能純一與其拘於行走末節弗克致其寅恭且或因此而憚於親詣何如酌省步陟煩文得專於升馨告備時肅將劼毖更足以嚴對越而抒誠愫乎自古履帝位而臻夀考者載籍曽不多覯我朝景運遐昌化成熙洽上荷昊蒼鴻眷列祖貽庥朕周甲巳逾勵勤未怠真可謂國家祥瑞之大者兹特降此旨非敢自惜其勞惟期要之於久從此更為法守且知朕六十嵗以前不憚經曲之繁六十嵗以後冀申專一之敬初無二致也所有升降次數及降輦步行之逺近無關大體諸儀節應如何酌定合宜之處著大學士會同各該衙門敬謹詳悉妥議具奏尋大學士等遵旨議覆凡嵗暮祫祭太廟皇上親詣肇祖原皇帝位前上香至列祖列宗位前請派皇子親王分詣同時上香畢仍各復位行禮如常儀詣廟時皇帝乘輦由闕左門入西北門至太廟北門外御禮轎入左門循東墻行至戟門外東階下降輿步入左門升陛進殿行禮禮成升輿亦如之如此敬謹詳定似於繁文精意斟酌適中而於我皇上展敬之心益昭純一奉旨依議世祖章皇帝順治十六年定祫祭太廟親詣行禮二順治十六年十二月乙卯十七年十二月己酉聖祖仁皇帝在位六十一年祫祭太廟親詣行禮三十二順治十八年十二月癸酉康熙元年十二月戊辰二年十二月壬戌三年十二月丙戌四年十二月庚辰五年十二月甲戌六年十二月戊戌七年十二月癸巳九年十二月辛亥十年十二月丙午十一年十二月庚子十二年十二月甲子十三年十二月戊午十四年十二月壬午十五年十二月丙子十六年十二月辛未十七年十二月乙未十八年十二月己丑十九年十二月癸丑二十年十二月丁未二十二年十二月乙丑二十四年十二月甲寅二十五年十二月戊寅三十二年十二月丁酉三十六年十二月乙亥三十七年十二月己巳三十八年十二月癸巳三十九年十二月丁亥四十年十二月辛巳五十年十二月癸未五十二年十二月辛丑五十九年十二月辛酉世宗憲皇帝在位十三年祫祭太廟親詣行禮十一雍正元年十二月甲戌二年十二月戊戌三年十二月壬辰四年十二月丙戌五年十二月庚戌六年十二月甲辰七年十二月戊辰九年十二月丁巳十年十二月辛巳子十一年十二月丙十二年十二月庚午皇上登極以來乾隆元年至五十年祫祭太廟親詣行禮四十九雍正十三年十二月甲午乾隆元年十二月戌子二年十二月壬子三年十二月丙午五年十二月乙丑六年十二月己未七年十二月甲寅八年十二月丁丑九年十二月辛未十年十二月丙寅十一年十二月己丑十二年十二月甲申十三年十二月戊申十四年十二月癸卯十五年十二月丁酉十六年十二月辛酉十七年十二月乙卯十八年十二月己酉十九年十二月癸酉二十年十二月丁卯二十一年十二月辛卯二十二年十二月丙戌二十三年十二月辛巳二十四年十二月乙巳二十五年十二月己亥二十六年十二月癸巳二十七年十二月丁巳二十八年十二月辛亥二十九年十二月乙巳三十年十二月己巳三十一年十二月甲子三十二年十二月戊子三十三年十二月癸未三十四年十二月丁丑三十五年十二月辛丑三十六年十二月乙未三十七年十二月己丑三十八年十二月癸丑三十九年十二月丁未四十年十二月辛未四十一年十二月丙寅四十二年十二月庚申四十三年十二月甲申四十四年十二月戊寅四十五年十二月壬申四十六年十二月丙申四十七年十二月辛卯四十九年十二月己酉五十年十二月甲辰祫祭儀嵗除前一日奉後殿中殿列聖列后合食前殿致齋眂牲書祝版眂祝版眂割牲祭前諸儀並凖時饗先一日遣官各一人分詣後殿中殿以大祫告太常