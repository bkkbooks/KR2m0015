body:
  text: 欽定四庫全書皇朝文獻通考卷一百四郊社考十四祈禳禱疾榮祭禱水旱已見雩祭門臣等謹案前史所載祈禱之義舊矣惟聖人誠與天通自天佑之禱不在文然亦有不能已者如成湯桑林之祀周公金縢之册是也今考策府所記皆誠敬之實意與祝史之虛文迥異故備紀于篇崇德八年四月太宗文皇帝聖躬違和命禱於盛京各廟復禱於境內各廟順治十三年四月世祖章皇帝以災變祭告南郊太廟是嵗三月諭禮部朕自親政以來夙夜氷兢罔敢怠忽務求克當天心光昭祖德民安物阜早底治平乃近者冬雷春雪隕石雨土所在見告變匪虛生皆朕不德所致用是恐懼靡寧撫躬自責披瀝悃誠冀回災變欲昭告於上帝祖宗實圖省改爾部擇吉具奏四月乙卯祭告南郊太廟世祖親詣行禮康熙十八年九月聖祖仁皇帝以地震禱祀於天壇是年七月京師地大震民居多毁屢詔修省極意賑恤遣官禱祀至九月乙巳諭禮部曰前以地震示警朕恐懼修省夙夜靡寧已經遣官虔告郊壇乃精誠未達迄今時復震動未巳朕心益用悚惕兹當虔誠齋戒躬詣天壇親行祈禱爾部擇期具儀來奏越五日庚戌率諸王大臣文武官員詣天壇行祈禱禮二十一年二月聖祖為太皇太后祭星於景山聖祖天性純孝事孝莊文皇后垂三十年致敬盡誠委曲周至是年以祝釐居景山齋戒祭星仍遣近御侍衛首領內監祭星三年二十六年十二月以太皇太后聖體不豫步禱南郊是年冬孝莊文皇后違和聖祖親嘗湯藥席地而坐目不交睫衣不解帶者三十五晝夜逮疾大漸自撰祝辭步禱南郊祝文曰臣仰承天佑奉事祖母太皇太后高年荷庇藉得安康今者疹患驟作一旬以內漸覺沉篤旦夕可慮臣夙夜靡寧寢食捐廢虔治藥餌遍問方醫罔克奏效五內憂灼莫知所措竊思天心仁愛覆幬無方矧臣眇躬夙蒙慈養憶自弱齡早失怙恃趨承祖母膝下三十餘年鞠育教誨以至有成設無祖母太皇太后斷不能致有今日成立罔極之恩畢生難報值兹危殆方寸憒迷用敢潔蠲擇日謹率羣臣呼籲皇穹伏懇憫念篤誠立垂昭鑒俾沉疴迅起遐算長延若大數或窮願減臣年冀增太皇太后數年之夀為此匍伏壇下仰祈洪祐不勝懇禱之至行禮讀祝伏地誠懇涕泗交頥諸王大臣等莫不感泣三十二年以陕西荒旱御製祭文致祭西嶽華山互見祭山川諭大學士等往年山東旱曽遣尚書蘇赫禱於泰山今嵗陕西郡縣雨澤雖布而往者數罹旱災夫華山者關中名山也宜遣大臣祀之尋遣皇長子允禔致祭御製祭文曰朕惟五嶽之祀載於虞書所由來逺矣稽考厯代舊章國有慶典必舉告祭之文蓋以含靈布澤能錫福於斯民故禋祀惟虔禮至重焉西嶽華山之神聳峙關中照臨西土比年以來秦省左右亢旱頻仍百姓艱食流離轉徙未有寧居田疇荒蕪不能墾闢朕憫念焦勞罔間宵旰反復圖惟或者因朕之不德或者有司之不肖以致雨㿩失節重困吾民前者蠲租發賑屢遣大臣拯民疾苦守土巨僚亦已更置殫心竭慮以盡人事而蒸民猶未臻康食朕念國家以民為本民以食為天百穀蕃滋端賴雨澤順時霑足咸藉神功用是特遣皇長子允禔虔申殷薦祗期默佑時沛甘霖俾三農常沾優渥之休庶兆姓永享豐亨之樂錫民嘉祉丕慰朕懷不益光歟朕之斯舉非以媚神求福也惟敬為百姓請命爰布誠悃神其鑒之三十四年以災異遣官告祭嶽鎮海瀆長白山互見祭山川雍正十年三月以旱禱於風神廟御製祝文遣官行禮是年春夏之間京師旱多風世宗命祈於風神廟御製風神祝文曰朕奉天子民刻刻以雨暘時若為念乃今春三月膏雨愆期恆風示警朕心懷悚惕瞻仰焦勞思過省愆戒勉臣庶伏念節宣和氣神實專司夙彰福國之功宜切勤民之隱是用潔蠲齋祓昭告悃忱仰冀明神默垂孚佑風威斂息澍雨均霑用觀百榖之成大慰三農之望竭誠籲禱惟神鑒之乾隆七年定祈晴禜祭國門及用牲於社之禮御史徐以升請立雩壇行雩祭并請祈求晴霽亦於雩壇致禱禮部議以久雨祈晴前代皆無禜祭雩壇之禮請倣古制禜祭國門仍不止則伐鼓用牲於社已見雩祭門今各直省遵制行之已而直省以神位字樣為請禮部議令間行禜祭則寫城門之神字樣得旨允行九年五月以嵗旱多風致祭風神廟御製祭文遣郡王行禮前三日奉諭京師自春徂夏雨澤愆期風霾時作朕心憂惕親製祭文遣平郡王福彭虔禱於風神廟即於初八日敬謹舉行御製祝文曰維神大元中精輔翊生成以吹以噓百昌勾萌昔我皇考作是靈宇在紫禁巽方維厯有年所側聞曩時旱魃為災鼓怒漲天繼日以霾我考竭誠爰命宗枝曰帛曰牲祝史致辭遂蒙神庥駭飇為收禾黍沐澤乃亦有秋兹者雪旱於冬雨旱於春自春徂夏震雷無聞山川出雲慶散於風不惟其景乃惟其終曰豫不德小民何辜無麥無禾眇眇愁豫曰維百神各有攸職功在蒼生乃廟而食用是陳辭祈神之佑致是咎徴皆豫之咎願敕飛亷速收其暴油雲以作雨師前導曰豫不誠明神之欺降罪于豫豫其敢辭屏息以待惟神之思謹告皇朝文獻通考卷一百四
