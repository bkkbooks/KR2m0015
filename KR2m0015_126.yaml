body:
  text: 欽定四庫全書皇朝文獻通考卷一百二十六王禮考二朝儀聖節朝賀臣等謹按古者華封之祝見於陶唐天保之詩陳於周雅宋子云人臣受恩無可以報謝者但言使君夀考而已至於生辰受賀唐開元禮始有之元宗手詔報左丞相源乾曜等所謂朝野同歡是為美事者也宋志有紫宸殿上夀之文明制始與元日冬至並稱三大節我朝定制萬夀聖節進表慶賀王以下文武官俱朝服七日列聖相承皆以深仁厚澤淪浃人心每遇聖節薄海臣民羣抒祝嘏之忱盖有不介以孚者聖祖仁皇帝五旬六旬大慶及臨御之五十六十年諸臣合詞請上尊號皆謙而不居癸巳嵗以六旬萬夀特頒恩詔遐邇均霑其詳載于萬夀盛典一編聖恩之渥自古所未有也世宗憲皇帝五十聖夀禁止設立經壇諭督撫不得進獻玩好皇上御極以來恭儉惟德謙尊而光凡恭遇萬夀慶辰必先期傳諭内外臣工毋得購覓珍竒輒有進獻禁止各省士民設經壇建碑亭之舉而且特沛恩綸俾天下均霑樂利之休同登夀域尤仰見我皇上敬天法祖徳合無疆洵度越千古矣崇徳元年定萬夀聖節進表朝賀與元日同二年十月己未萬夀節上御篤恭殿内外和碩親王多羅郡王多羅貝勒固山貝子三順王及朝鮮質子文武各官上表稱賀進獻鞍馬黄金緞疋等物四年十月戊申萬夀節御殿受賀次日賜諸王貝勒文武羣臣大宴五年十月壬申萬夀節頒詔大赦遂御殿受朝賀賜諸臣宴於禮部是日内院大臣等奏請御殿上諭曰今日乃朕誕辰内外諸王貝勒及文武羣臣莫不懽忭小民及罪人等亦應加恩令其同霑膏澤爾等可於朕未御殿時先宣讀赦書宣畢來奏内院大臣等遂出宣讀寛温仁聖皇帝詔曰朕恭膺實籙敬迓鴻庥值夀域之宏開敷天同慶宜仁風之普被率土均霑特頒肆赦之條用沛好生之徳兹萬夀之辰朕普施恩澤自諸王以下以及庶民㒺不沾被即有罪之人亦欲恩及之除十惡外餘罪概行肆赦有以赦前事首告者法司不准審理其已議而未經結案者赦之若赦後有隠匿偷盗者仍行治罪宣讀畢復奏上乃御崇政殿受王公百官朝賀如儀七年十月壬戌萬夀節自二十二日至二十八日凡七日王以下章京以上俱朝服以國中方避痘停止作樂順治三年正月令外藩䝉古各旗慶賀聖誕進獻牛羊於每年元旦貢獻牛羊時一並奏進八年四月定萬夀聖節朝賀儀凡遇萬夀節鹵簿大駕全設上先詣太廟行禮次詣皇太后宫行禮畢陞太和殿鳴鐘鼓作樂諸王文武百官行慶祝禮直省文官知州以上武官守備以上各差官進慶祝表十四年正月萬夀節停止朝賀先期禮部奏行禮儀注諭曰朕親政以來數年於兹雨暘未調盗賊未息民困未蘇方切儆惕今以生辰受賀彌覺不安至日皇太后儀仗全設朕親詣行禮其諸王羣臣賀表及筵宴俱著停止康熙元年三月辛夘萬夀節上率諸王大臣詣聖祖母太皇太后宫聖母皇太后兩宫行禮畢御殿受諸王百官朝賀四十二年三月癸丑萬夀節停止朝賀筵宴是日頒詔天下先是正月壬子諸王貝勒貝子公文武諸臣奏今年三月十八日皇上五旬大慶兹聖駕巡視南河臣等請於駕發之前豫行慶賀禮恭進鞍馬縀疋等物上諭曰朕之誕辰爾等如此進獻在外督撫亦必效之朕必不受朕素嗜文學爾等諸臣有以詩文獻者朕當留覽焉既而大學士等及部院諸臣恭進慶祝萬夀無疆屏上復郤之於是大學士等及部院諸臣復以慶祝萬夀屏文繕寫册頁進呈奏曰臣等恭製此屏皆敷成我皇上功徳實事乞賜留覽得㫖屏内所書之詞俱已載在册頁朕留册頁即與留屏無異届期上詣皇太后宫行禮停止朝賀仍頒詔曰朕為天下民生主宵旰勤勞勵精圗治凡國家之休戚閭閻之樂利晷刻之間無不注意於此天下之大兆民之衆朕誰欺欺天乎今四十餘載親歴饑饉者不知其㡬南北用兵者不知其㡬人心向背者不知其㡬天變地震者不知其㡬自惟凉徳不能撫育履氷臨淵兢業惟守仰賴上天眷佑祖宗厚德幸生創業未久之際方免失墜今海㝢昇平年嵗稍和生民俱已樂業邇來諸王大小臣工士庶因朕五旬輿情肫切屢請加上尊號朕堅意固辭不允所請葢朕不以名譽稱掦為尚惟以海内富庶為心屢蠲賦役頻省刑罰總欲使老安少懐風俗惇厚漸㡬於康乂隆平之治近因淮黄告成乃東南要務再授方略望其善後朕不辭勞瘁親往閲視見畿輔山左江浙等省耆老人民俱中心愛戴雖童穉亦咸歡欣瞻仰是知民心皆一用是益深軫念視切如傷所以星夜回鑾兹特大沛洪恩普施遐邇庶㡬民生咸登夀域和氣徧滿寰區安民則惠益宏逮下之仁御衆以寛聿溥好生之徳布告天下咸使聞知五十年三月丁未萬夀節御殿受朝賀先是諸王貝勒貝子公大臣官員等奏稱今當五十年昇平之㑹中外臣民喁喁引領懇祈誕受尊號以慰輿情我皇上德盛不居屢詔未允臣等不敢更請兹者恭遇萬夀聖誕乃敷天率土衢歌封祝之時仰祈御殿受賀以愜中外諸臣及士子兵民人等之望得㫖朕於夀日停止朝賀已二十餘年兹諸王羣臣以今嵗當五十年昇平之㑹特請御殿行禮以愜中外仰望之心公疏奏陳詞意誠懇朕勉順羣情應如所請屆期上率諸王貝勒貝子公内大臣大學士侍衛等詣皇太后宫行禮畢御殿王以下文武諸臣上表慶賀如儀停止筵宴五十二年三月乙未以六旬萬夀御殿受朝賀頒詔天下先是五十一年十一月諸王貝勒貝子公文武諸臣等以明嵗萬夀六旬正誕請上尊號上不許至是年直省官員紳士耆庶先期赴闕自三月初一日為始分建綵棚由西直門至暢春園相屬二十里禮部奏言每嵗恭遇萬夀聖節王以下文武各官朝服七日在暢春園蟒袍補服今嵗恭遇萬夀六旬大慶非尋常可比應自三月初一日起至月終咸朝服蟒袍補褂嗣後每遇十年照此例行得㫖著自初一日至二十日三月戊寅朔諭諸王貝勒貝子公大學士九卿等曰朕昨進京見各處為朕六十夀誕慶賀保安祈福者不計其數朕實凉徳自覺媿汗從來帝王之治天下罔不以民生為念若為一已之私即不能擴而充之矣朕若先知必令止之今已成矣難違衆志夜來思之達旦朕為天下萬國蒼生之主萬姓安即朕之安天下福即朕之福若能祈禱雨暘時若家給人足則朕安寢飽食可以却病延年此朕之求福非有妄想也傳之各處凡有祝延萬夀者必以雨暘時若萬邦咸寧為先朕已老矣有若無實若虚夙夜匪懈履薄臨深之念與日俱増豈敢自有滿假乎壬辰諸王公内外羣臣恭進鞍馬縀疋等物却之甲午上奉皇太后御輦陳大駕鹵簿由暢春園回宫直𨽻各省官員士庶夾道跪迎耆老等跪獻萬年夀觴上停輦慰勞徧賜老人等夀桃及食品諸王貝勒貝子公文武大臣官員兵丁並於誦經處跪迎上霽容俯視皆賜以食品是日遣官祗告天地宗廟社稷頒恩詔曰朕五十餘年上畏天命下凛民碞以敬以誠覃思上理且以一心對越上帝未嘗瞬息稍懈賴昊穹之孚佑祖宗之䕃庇國家蓄積有餘民間年嵗豐稔朕以凉徳勉思列聖體大順公操心慮患敷景運於休期洪基業于光顯夙夜氷兢宵旰靡遑屈指春秋年屆六旬矣覽自秦漢以下稱帝者一百九十有三享祚緜長無如朕之久者朕之虛薄良深歉仄何敢稍有倦怠以負孜孜圗治之初心况在位之久者始勤終忽往往不能垂令名於後所以乾惕之懐彌殷憂勞之志愈切兼之承平嵗久幅員日廣户口漸増風俗日薄朕與臣鄰夙夜在兹以剛健中正惇大成裕謙尊有終持盈保泰猶恐未能豈自滿假少有逸豫朕以天下為心天下當亦體朕之衷各矢藎誠皆敦孝敬型仁講讓守已奉公務勤職業官僚胥勸人士奮興使遐邇之均被小大之咸同以享昇平之福此非朕之徳乃天地祖宗之賜今朕式慰中外臣民之情博考典禮大沛膏澤用稱躋世於仁夀之至意於戲錫民以福為皇極得夀之徴御衆以寛乃萬國咸寧之本布告天下咸使聞知是日復諭大學士等今嵗天下老人為朕六旬大慶皆從數千里匍匐而來如何令其空歸欲賜伊等筵宴然後遣回著查八旗滿洲䝉古漢軍漢人大學士以下民以上年逾六十五嵗者奏聞擇日賜宴内有艱於動履不能前來者聴之其能來者即令之來即不能來者朕另行按分頒給今時漸炎熱賜宴後即令回籍耕種再查八旗滿洲䝉古漢軍以至包衣佐領下不論官員閒散人等年七十以上老婦亦著奏聞俟老人賜宴後再定一日送至皇太后宫賜宴有艱於動履不能前來者聴之若有貧乏不能來者著各屬協助車馬使之前來俱開真實年嵗不可揑報再敕宗人府諸王以下宗室子孫内二十嵗以下十嵗以上選擇聰明堪供使令者六七十人令於耆老前執爵即朕子孫皆令之出宗室外不用他人也乙未萬夀節上率諸王公大臣侍衛等詣皇太后宫行禮畢御殿王以下文武各官及致仕給還原品官員行慶賀禮八旗兵丁直𨽻各省耆老士庶齊集午門外大清門内叩祝行禮上回宫内大臣侍衞内閣翰林院禮部都察院詹事府等衙門侍直官員詣乾清門行禮是日上奉皇太后幸暢春園王以下滿漢文武官員直𨽻各省耆老士庶仍于各誦經處跪送壬寅宴漢大臣官員士庶年九十以上者三十三人八十以上者五百三十八人七十以上者一千八百二十三人六十五以上者一千八百四十六人於暢春園正門内諸皇子出視頒賜食品宗室子執爵授飲傳諭諸老人曰今日之宴朕遣子孫宗室執爵授飲分頒食品爾等與宴時勿得起立以示朕優待老人至意上陞座命扶掖八十嵗以上老人至御前親視飲酒又諭曰書稱文王善養老孟子云七十者非帛不暖非肉不飽帝王之治天下發政施仁未嘗不以養老尊賢為首務近來士大夫只論居官之賢否而移風易俗之實政入孝出弟之本心未暇講究朕因今日之盛典特宣此意若孝弟之念少輕而求移風易俗其所厚者薄而其所薄者厚矣爾等皆是老者比回鄉井之間各曉諭鄰里須先孝弟倘天下皆知孝弟為重此誠移風易俗之本禮樂道德之根非淺鮮也昨日甘霖大沛田野霑足朕心大悦爾等無誤農時速回本地特諭甲辰宴八旗大臣官員兵丁閒散等年九十以上者七人八十以上者一百九十二人七十以上者一千三百九十四人六十五以上者一千十二人于暢春園正門前如前儀乙巳八旗滿洲䝉古漢軍老婦齊集暢春園皇太后宫門前隨召九十嵗以上者入宫門内八十以上者至丹墀下七十以上者集宫門外大臣妻年老者亦皆召至宫門内賜坐皇太后上親視頒賜茶果酒食等物其餘令諸皇子率宗室子以次頒給又賜大臣妻衣飾綵縀數珠銀兩賜八旗老婦白金各有差復准諸臣奏編纂萬夀盛典六十年三月萬夀節停止行禮筵宴先是五十九年十二月諸王貝勒貝子公滿漢文武大臣等奏皇上御極六十年普天大慶請行慶賀典禮上諭大學士等曰朕素性不喜行慶賀禮是以元旦日惟照例行禮停止筵宴雖萬夀日亦久不行慶賀禮今王大臣等為朕御極六十年奏請慶賀行禮欽惟世祖章皇帝因朕幼年時未經出痘令保母䕶視于紫禁城外父母膝下未得一日承歡此朕六十年來抱歉之處正月初七日世祖章皇帝忌辰二月十一日孝康章皇后忌辰朕何敢於正月初七二月十一日以前行慶賀禮又見在西陲用兵地方官民運米送餉甚屬勞苦山陜二年歉收民有流離者去嵗陜省地震兵民受傷今嵗沙城地震即京城地亦㣲震正當君臣憂勤求治之時何喜之有此所奏不准行至是年正月以御極六十年大慶命皇子等恭代告祭永陵福陵昭陵二月親謁暫安奉殿孝陵孝東陵告祭遣官告祭天地太廟社稷三月諸王公大臣百官合詞請上尊號曰聖神文武欽明濬哲大孝𢎞仁體元夀世至聖皇帝上謙讓不許並命停止慶賀及詔赦恩賚諸儀直省老人王年豐等詣闕叩祝并進土座諸物皆却之仍賞賚有差雍正元年十月萬夀節停止朝賀筵宴令中外臣工毋得建立道場先是七月諭諸王大臣及内外文武各官朕惟自古帝王撫御寰區治化隆盛中外臣民紀功述德頌禱情殷故天保之詩卷阿之什擬升恒於日月期純嘏之彌長祝釐之詞形諸歌詠者往往有之我聖祖仁皇帝御極六十餘年至治神功参兩天地深仁厚澤超邁百王薄海内外無不食徳飲和淪肌浹髓臣工黎庶無以致其感激愛戴之誠故每於萬夀聖節京師暨直省各建道場誦經祝夀總因聖祖仁皇帝恩徳及人者至久感人者至深諸臣於無可報答之中勉竭忱悃以普天同慶之心傚華封稱祝之意在諸臣亦藉以自盡其心耳今朕嗣位之初夙夜祗懼不敢少懈所以立政圗治者安能及聖祖之萬一爾諸臣於朕誕日倘仍照從前設立道塲則自此以後將成定例在京王公以下及部院等官未免從事靡文稽遲公事在外文武大吏亦恐科派屬員貽累地方且以有用之財供無益之費既非朕以勤儉勵有位之心又非朕以康阜期海内之意尚虛文而無禆實政朕甚無取焉特宣布中外於朕誕日毋得建立祝夀道塲但兾内外諸臣各殚厥心勉襄化理勤修職業利濟蒼生以慰朕宵衣旰食之焦勞即不啻天保卷阿之祝頌矣若不遵諭㫖朕必加以處分不少寛貸五年十月壬子萬夀節停止朝賀筵宴是嵗閏三月諭内外諸臣曰朕聞㑹試舉人感朕特恩以今年為朕五十萬夀特於京城寺廟設立經壇以申頌祝之意此舉甚為虚妄朕臨御天下孜孜求治凡所行之事惟以循理為本誠以理之所在即天意所在感孚黙應㨗於影響若朕所行悉合于理則問心無愧之處即可以對越神明而輿情之頌祝與否皆可置之不問也朕儆戒乾惕之功無時或釋舉人乃平日讀書明理之人當效法古之聖賢豈可為此世俗妄誕之舉且朕正念士子貧寒歸途艱于資斧是以賞給路費今乃費於無用之地尤不能體朕之心矣其所設經壇即行禁止朕又聞各省督撫因朕今年五十萬夀欲購覓玩好之物以為進獻者此舉尤為不可夫地方大吏偶有進獻方物土産者不過借此以達其瞻仰之意而朕之酌量收納則又復隨便分賜廷臣者亦所以聨君臣上下之情若今年亦只照每年之例備辦尚准其奏逹朕前倘别有玩賞之物則槩不寓目朕仰賴皇考福庇在藩邸數十年所蓄器玩頗有及即位後見宫中傳貽古玩器皿皆質樸之物實無竒異為人所罕見者視朕藩邸所藏尚屬不逮朕深用抱愧於懐當日二阿哥在東宫時廣蓄竒巧珍貴之物數倍於皇考宫中之所有朕仰思皇考恭儉至徳實可垂法萬世欽服之誠切於五内益覺二阿哥之所為當為鑒戒也朕既深知二阿哥之非若此時復留心玩好廣收進獻則將來子孫之賢而有識者豈不以此為朕躬之累乎朕意欲俟暇時將宫中所有之物或為皇考傳留或朕藩邸舊蓄一一分晰標記以明皇考之儉德俾世世子孫共知之又安肯多收玩好以滋朕心之愧乎朕澄清吏治令督撫諸臣共勵亷隅即量予公費不過供其日用之需安有餘資搜求玩器倘轉索之於屬員則又開下吏逄迎奔競之漸尚望其秉公督率整飭官方乎朕心惟以民安物阜為美薦賢舉能為貴倘督撫等秉公察吏實心為國行一利民之政勝於獻希世之珍也薦一可用之才勝于貢連城之寳也當年皇考五十萬夀時朕再三懇請慶賀不䝉俞允今朕五十夀誕躬自舉行於心實有未安至于設立經壇建立碑亭等事在皇考當日甚鄙而厭之因見諸臣籲懇之切隨便聴其舉行乃朕所深悉者而其中羣下隠情在皇考實不能深知朕居子臣之位四十年於臣庶情形皆所親見是以不肯復為内外諸臣其共體朕心祗遵朕諭殚極誠意屏絶虚文勉之勉之四月復諭曰朕今年五十已有諭㫖不行慶賀禮昨楊名時南天祥奏摺俱稱今年進京慶祝萬夀朕思聖祖仁皇帝久道化成聖徳神功際天蟠地當年五十聖夀之時尚未允行慶賀之禮朕臨御以來雖時時有勵精圖治之念乂安海宇之心而實在善政善教可以造福於社稷蒼生者何事可以自信正當羣臣交相儆勉期於有成又安可為此粉飾之事以滋煩擾乎朕之待下惟有一誠諸臣果矢誠懇之念於隐微寤寐之中尊君親上如詩書所載元后父母之誼豈不勝於拜舞彤墀效稱觴祝嘏之儀節乎外任諸臣俱不必具本奏請來京只照常年之例行若有因地方事務應來陛見者朕自另降諭㫖其各省耆民等若有欲來京慶祝者地方官切止之高年之人長途䟦涉未免勞頓非朕體恤之意倘違朕㫖而來俱不許奏聞朕亦不加以恩賜伊等若果有感恩戴徳之忱何不訓誨子弟勸導鄉人使各為善良各務本業而乃僕僕道路以為報效朝廷乎再各省地方若有指稱萬夀建立經壇或聚集梨園諠譁糜費者此皆生事不安本分之徒誘惑愚人希圖財利尤宜嚴禁倘地方官不行禁止經朕訪聞定照欺罔之律治罪將此通行各省並轉飭各府州縣咸使聞知乾隆元年八月甲戌萬夀節上詣雍和宫行禮畢還宫詣皇太后宫行禮停止慶賀是月諭諸臣曰朕前降㫖三年之内不行慶賀禮今八月十三日為朕誕辰禮部循例題請已降㫖停止行禮並令朝臣勿穿蟒袍補服所有外省慶賀本章俱著内閣發還五年八月辛亥萬夀節御殿受朝賀前期諭曰八月十三日為朕誕辰聞内外臣工以今年為三十萬夀之期欲行慶賀貢獻之禮朕甚不取今年春間外省督撫提臣中有請八月進京陛見者朕批諭止之葢朕年甫及壯不言慶賀且朕所望于内外臣工者總在實心實政為國家宣猷効力不在稱觴祝嘏之儀文著即傳諭内外臣工等仍照常年之例行若有在常例之外者俱著停止六年八月庚戍萬夀節時駕幸熱河上詣皇太后宫行禮畢御行殿扈從諸王貝勒貝子公文武大臣官員暨外藩蒙古王以下各官行慶賀禮先是七月禮部奏言八月十三日萬夀聖節恭遇聖駕巡幸扈從王大臣官員應于行宫前行慶賀禮其班位王公大臣在網城内三品以下官在網城外在京王公大臣官員於午門前行慶賀禮其筵宴應行停止從之臣等謹按行幸日恭遇聖誕慶賀之儀於是年禮部奏定嗣後每嵗巡幸熱河恭遇聖節俱照此例十五年八月癸未萬夀節御殿受朝賀是嵗四月諭曰今年八月為朕四十夀辰閲督撫諸臣奏摺有陳請來京慶祝者各省將軍督撫皆有封疆重任豈有概離職守來京慶祝之理一處陳請他處從而效之若明知不能悉允所請而各繕本章往來批答徒成具文豈君臣間以至誠相孚之誼耶當年皇祖聖祖仁皇帝四十五十聖夀皇考世宗憲皇帝五十聖夀俱未行慶賀禮皇祖夀登六十始允臣民之請舉行慶賀今朕四十夀辰未屆應行祝嘏之時何必遽事紛紛陳奏著傳諭各省文武大臣不必具摺奏請來京諸臣其明體朕意二十五年八月甲申萬夀節御殿受朝賀先是二十四年十月諭内閣曰雍正五年恭值皇考五十萬夀因㑹試舉人請於京城寺廟設立經壇以申頌祝欽䝉頒諭禁止並敕各直省督撫毋得以萬夀進獻玩好聖訓有云朕心惟以民安物阜為美薦賢舉能為貴倘督撫等秉公察吏實心為國行一利民之政勝於獻希世之珍舉一可用之才勝於貢連城之寳仰見我皇考恭儉聖徳實為萬世訓行朕嗣服以來屢諭各督撫等不得於方外之物别有進獻諒内外大小臣工無不明體朕意開嵗八月為朕五十誕辰惟恐臣僚中或以萬夀聖節欲購覓珍竒共申祝嘏其各省士民或且有設立經壇建立碑亭之事非先期詳悉傳諭必將競事浮華徒滋糜費甚非所以勵官常惜物力也朕心深所不取其飭禁之至在籍年老諸臣如尚書沈徳潜侍郎錢陳羣等若以隨班叩祝跋涉逺來亦非朕優禮老人之意况辛巳恭遇聖母皇太后七十大慶以新春敬奉安輿時巡南服諸臣就近迎鑾相見不逺又何必僕僕道路為耶著將此通行傳諭知之至是嵗七月諭曰今年為朕五十誕辰巳降㫖臣工等不得以合詞慶祝踵事繁文至督撫等各進土宜方物朕不過以其封疆大吏藉聨上下之情未可徑斥若藩臬兩司其位次本不宜貢獻前庚午年早經傳㫖飭禁惟託庸等數人以兼管闗差織造故不在遣郤之列乃今日調任甘肅布政使許松佶具摺進貢微特不悉朕意於體制亦屬冐昧已飭奏事處發還恐直省各員未能遍曉效尤之習不可不防其漸將此宣諭知之三十五年八月辛夘萬夀節御殿受朝賀先是三十四年八月諭内閣曰前者朕五十誕辰恐直省臣民有啟經壇立碑亭貢獻稱祝之事或致糜耗物力曽預飭禁止兹明年八月屆朕六十正誕意中外耆庶必有以週甲聖節非五旬大慶比欲申祝釐以抒愛戴者情固難却而非朕心所樂從用是明切宣示朕臨御三十四年以來承累洽重熙之盛海宇乂寧民氣恬樂復仰荷上蒼眷佑連嵗屢豐方思上答鴻庥宏敷闓澤以嘉恵吾民益臻熙阜國家之瑞莫大於此且越嵗辛夘即恭遇聖母皇太后萬夀璇闈慶典亘古希逄朕將率天下臣民臚歡舞綵敬迓慈禧自當聴衢巷謳歌共展尊親之義又何必因朕躬慶辰頻年祝嘏多此繁文縟節為哉其布告天下咸體朕意一切仍遵二十四年所降諭㫖不必舉行各省督撫不必以來京叩祝為請並不必進奉珍玩及紬縀表裏等物至在籍大臣中如尚書沈徳潜夀屆期頤錢陳羣亦年逾八秩不宜復以逺渉勞筋力已諄復傳諭令其無庸親詣京師叩祝俾黄髪耆臣領袖江鄉父老㩦杖呼嵩為熙朝盛事不亦美歟著將此通行傳諭知之是年四月諭曰本年為朕六旬慶辰中外臣民或有以週甲聖節籲請祝釐者雖出愛戴至誠但崇尚繁文必至耗糜物力朕心不以為然昨嵗已明降諭㫖預為飭禁今據高晉奏稱江南士民擬在該處各寺觀建壇唪經演戲稱祝者殊為未喻朕㫖朕臨御三十五年以來祗膺昊蒼鴻眷寰宇乂寧民氣和樂惟期推仁究澤嘉惠海内元元益臻康阜國家上瑞莫大於是况嵗屆辛夘恭逄聖母皇太后八旬萬夀朕將率天下臣工耆庶舞綵臚歡敬迓慈禧而隆慶典若因朕躬誕辰頻年稱祝致令多方預備朕心實所不取該督等誠切呼嵩屆期祗須率領官吏紳士于萬夀宫照常行禮慶祝已足共抒忱悃所有建壇演戯等事概不必行高晉既有此奏恐他省亦有似此凟陳者實非朕所樂聞著再通行明切曉諭咸體朕意毋有所請閏五月諭曰今日各部旗大臣等具奏以本年為朕六旬慶辰請于御園預備稱祝所奏不必行園中地本不寛勢難令文武大臣聨班並列且越嵗辛夘恭遇聖母皇太后八旬萬夀普天慶洽朕將躬率臣工舞綵臚歡以敬迓慈禧宏敷慶典九卿等屆期自可共抒忭蹈之誠若因朕躬誕辰頻年稱祝為此無益之舉實非朕所樂從昨嵗恐中外臣民因朕週甲聖節籲請建設經壇延釐祝嘏徒致耗糜物力已明降諭㫖預為飭禁今復思大臣中有因萬夀備物獻者伊等身膺顯秩藉此以申忱悃原非過分但亦當予以限制如内而大學士尚書都統外而總督巡撫尚可允其奏進其在京侍郎副都統以下併外省提鎮學政藩臬等人數既繁若紛紛呈進在諸臣既徒事分心購辦進覽時朕又増檢閲之煩甚無謂也所有伊等預備之處概不必行並勅奏事處毋許傳進七月禮部奏八月十三日皇上六旬聖節請舉行典禮奉諭照例行禮所有筵宴已于元旦舉行本日著停止至八月大學士奏恭逢萬夀聖節各省在籍大小臣工來京多備有詩冊除大臣例得奏進其餘品秩小者請令自赴吏部投遞彚交軍機處開單進呈奉㫖著交禮部丙戌皇上六旬萬夀聖節上詣奉先殿行禮率王公大臣等詣慈寧宫行慶賀禮隨御太和殿受王公文武百官行慶賀禮禮畢上奉皇太后於夀安宫侍早晚膳賜宗室王公内廷大臣及諸外藩回部鄂堆等宴四十五年八月己未萬夀節御殿受朝賀先是四十四年八月諭曰前因江浙督撫等以兩省臣民望幸奏請廵閲河工海塘已降㫖允於庚子春正月諏吉南巡至所稱明嵗為朕七旬萬夀欲就近申祝則斷乎不可業經宣諭飭禁葢朕本意原以庚子為朕七旬誕辰辛丑即聖母九旬萬夀連嵗疊逄大慶中外臚歡自可聴其抒誠祝嘏今既不能遂朕初願朕復何以為已稱慶惟念士民想望恩澤積有嵗年因詔開鄉㑹恩科並輪免各省漕糧一週以洽羣悃明年南巡迴鑾後俟北郊禮成即啟程幸避暑山莊駐蹕八月慶辰一切仍照常例行若在京受賀惟恐轉多棖觸遂至山莊以避之至於西藏班禪額爾徳尼預請覲祝實屬吉祥盛事是以允其前來即令於山莊瞻謁俾從其便朕并非因其稱祝先期往就之也恐内外臣工尚未能深喻朕意仍有以慶典為請者非惟不能博朕之悦適以増朕之懐又豈臣子愛敬之道俟朕八旬大慶則當聴從諸臣稱祝此次必不允行又前屆朕六旬萬夀時自古北口熱河兩處曽有㸃綴叚落燈綵之類本屬朕所不取明年尤當嚴禁將此再行通諭知之至是嵗正月朔庚辰上御中和殿陞座内大臣侍衛暨内閣翰林院詹事府禮部樂部都察院等衙門官員行慶賀禮畢御太和殿陞座諸王貝勒貝子文武大臣官員及來朝外藩䝉古哈薩克回部王貝勒貝子公台吉等朝鮮諸國陪臣進表行慶賀禮畢頒詔天下詔曰朕統御寰區勤求郅治茂時育物畏懼滋深仰賴上蒼眷佑列聖貽麻海宇敉寧輿圖式廓孜孜夙夜於今四十五年春秋正屆七旬緬惟皇祖聖祖仁皇帝法天行健久道化成我皇考世宗憲皇帝丕繼鴻謨厚澤深仁淪肌浹髓朕祗遹寅䖍不敢暇逸以承前烈惟兾實心實政永底昇平至如臣工慶賀繁文槩所弗取第念中外臣民企慕瞻依彌形篤摯已於乾隆四十三年降㫖普免天下錢糧並特開鄉㑹試恩科以宏樂利之庥以廣作人之化今兹履端協慶率土咸熙允宜俯協輿情溥施大澤我皇祖六旬萬夀曽特頒恩詔遐邇均霑朕惟以皇祖之心為心覃敷闓澤嘉與天下臣民共躋仁夀用稱朕敬天法祖加惠黎元之至意於戲惠此萬方俾緝熙于純嘏斂時五福用敷錫厥庶民布告天下咸使聞知三月癸未諭曰前以庚子年為朕七旬萬夀恐内外臣工欲申祝嘏屢經宣諭飭禁此次南巡回鑾後一俟北郊禮成即啟程幸避暑山莊各督撫等皆不必前來稱祝更恐外省督撫不能仰體朕懐聞因七旬萬夀有取九九之義購備貢品誇多鬬靡甚至力有不逮而隨衆效尤勉為充數尤屬不必各省督撫身任封疆惟當大法小亷奉公勤職副朕委任本不當以進奉見長著再傳諭各督撫今年八月慶辰一切仍照常例若借七旬萬夀為名多事繁文以申媚兹之悃不但為朕所不取且現今降㫖令奏事處屆期遇有多進貢物著一概不准接收諸臣其善體朕意毋得藉辭請覲致增煩費轉滋擾凟將此通諭各督撫知之七月丁酉班禪額爾徳尼自後藏來恭祝萬夀至避暑山莊於澹泊敬誠殿丹墀跪請聖安上於依清曠殿賜茶慰問賜茶畢上詣寳筏詣烟波致爽雲山勝地各佛堂拈香班禪額爾徳尼從禮畢上還宫八月己未萬夀聖節上御澹泊敬誠殿受王公大臣官員及䝉古王公貝勒額駙台吉回部郡王霍集斯等並阿哥木伯克貝子色提布阿爾第等十一人杜爾伯特汗瑪克蘇爾扎布等五人土爾扈特汗䇿凌那木扎爾等九人朝鮮正使錦城尉朴明源等三人烏梁海散秩大臣伊素特等三人喀什噶爾四品噶咱納齊伯克愛達爾之子烏魯克等三人木坪宣慰司堅木恭囊康等四十四人行慶賀禮禮畢並命隨至卷阿勝境賜茶果四十八年停止萬夀慶節内外臣工貢物先是二月諭曰向來内外臣工每于萬夀慶節備物呈進率成例事今嵗秋間朕自熱河啟鑾詣盛京恭謁祖陵蹕路經由蒙古部落道里較逺長途繁費更多未便所有本年萬夀貢物不必先期齎赴熱河呈進王公大臣各省督撫等務期仰體朕意毋滋煩凟將此通諭知之八月又奉諭曰朝鮮列在外藩勤修職貢最為恭順今以朕臨幸盛京遣陪臣賫表修貢迎駕請安並祝萬夀藉抒忱悃甚屬可嘉著屆時當加恩賚以示優眷著禮部堂官傳諭知之盛京朝賀臣等謹案恭遇皇帝恭謁祖陵巡幸盛京駕至之次日御殿受朝賀與在京朝賀同今附載於三大節朝賀之後雍正六年定盛京文武各官朝賀照在京文武官品級序定班次乾隆四十八年八月奉諭曰此次前往盛京遇陞殿慶賀行禮所有隨從王公大臣俱著穿蟒袍補褂毋庸攜帶朝服其盛京官員亦著一體穿蟒袍補褂行禮至尊藏冊寶行禮時亦並著穿蟒袍補褂盛京朝賀儀皇帝至盛京扈從之王公各官咸朝服豫至大清門候駕入陞崇政殿賜茶畢皇帝入宫各退右恭迎聖駕進宫次日早陳法駕鹵簿於崇政殿前陳中和韶樂於殿檐下二層階臺下之兩旁陳丹陛大樂於兩旁樂亭乾隆八年奏請建設留盛京樂懸以中和韶樂一分丹陛大樂一分盛京禮部衙門朝賀時樂部㑹同禮部恭設設詔案表案各一於崇政殿東之南又設黄案一於丹墀正中設黄葢雲盤於丹墀内如不盤及頒詔不設黄葢雲詔案本部堂官奉王以下文武各官所進慶賀表恭設于殿内東旁案上内閣學士恭奉詔書安設于殿内東邊黄案上右陳設鴻臚寺官引隨皇子以下各官俱蟒袍補服和碩親王以下入八分公以上于皇太后行宫外按翼排立文武各官及朝鮮使臣于大清門外按翼排立執事官豫設皇帝拜褥於皇太后行宫門外正中本部堂官奏請皇帝具禮服出宫于東旁門内乗輿本部堂官前引至皇太后行宫門外降輿東旁立本部堂官轉傳内監奏請皇太后陞座本部堂官引皇帝至拜褥上立王以下文武各官俱向上立鳴賛官奏跪拜興皇帝率皇子王公行三跪九拜禮興文武各官及朝鮮陪臣于大清門外隨行禮禮成本部堂官引皇帝仍至原位立轉傳内監奏請皇太后還宫本部堂官奏禮成引皇帝還宫皆退以上係乾隆十九年定右朝賀皇太后儀鴻臚寺官引隨駕皇子王公並外藩王公等在殿外兩旁立引隨駕之文武大臣官員在丹墀東旁各按品級侍立引盛京文武大臣官員並陵寢官員在丹墀西旁各按品級侍立引朝鮮使臣於丹墀西旁百官之末侍立耆老領催等皆齊集于大清門外屆時本部堂官奏請皇帝御龍袍衮服乘輿出宫本部堂官恭導皇帝陞崇政殿寶座中和韶樂作奏咸平之章皇帝陞座樂止鑾儀衛官賛鳴鞭丹墀内三鳴鞭鳴賛官贊排班鴻臚寺官引皇子以下文武各官並朝鮮國使臣排班朝鮮使臣向例另班行禮乾隆四十八年具奏臣附謁西班末陵禮成慶賀事宜令朝鮮使于右序班丹陛樂作鳴賛官賛進賛跪賛宣表宣表官至黄案前捧表跪于殿檐下正中大學士二人跪于左右展表樂止宣表官宣畢捧表起立丹陛樂作奏慶平之章捧表官捧表置于黄案上退鳴賛官賛叩興行三跪九叩禮興鳴賛官賛退皆退復原位立樂止大學士奉詔書至崇政殿檐下授本部堂官跪受由中階左旁至丹陛正中安設于黄案上行一跪三叩禮跪奉詔書起本部堂官奉雲盤受詔書安置雲盤内興黄葢前導由中道出大清門文武各官隨出皇帝賜王公大臣坐賜茶畢鑾儀衛官鳴鞭王以下皆起立中和韶樂作奏和平之章皇帝還宫本部堂官奉詔書至大清門外安設龍亭與京師頒詔儀同右宣表皇后率妃嬪慶賀皇帝行禮與皇太后行宫慶賀行禮妃嬪于皇后前慶賀行禮並與京師儀同盛京官員每嵗恭遇皇帝萬夀及元旦冬至行朝賀禮屆期内務府宫詣崇政殿啟扉拂拭御座禮部官恭設香案于殿外正中南向辨百官位于丹墀内按旗分左右翼東班西上西班東上均北面鳴賛二員分立班行之北引班二員分立班左右賛禮郎充均東西面文武各官咸朝於大清門外祗候竢屆時引班分引至崇政殿丹墀内鳴賛賛齊班引班引各官就拜位立賛進賛跪叩興百官行三跪九叩禮賛退引班引各官退盛京朝賀糾儀以盛京禮部司官二人直省朝賀臣等謹案凡恭遇萬夀及元旦冬至在外文武諸臣有望闕行禮之儀今附載于三大節朝賀之後順治八年定三大節在外文武官均設香案朝服望闕行禮與京朝官同康熙二十二年定直省朝賀班位凡直省班次將軍總督加將軍銜提督為一班巡撫副都統提督加左右都督銜總兵官乾隆十八年裁加衘為二班加都督同知以下銜總兵官協領恭領巡鹽御史織造郎中督闗郎中布政使按察使各道為三班佐領督闗員外郎知府副將恭將為四班防禦督闗主事司庫同知通判逰擊都司為五班驍騎校知州知縣守備為六班有品級筆帖式有品級庫使經歴州同州判縣丞千總等官為七班滿洲䝉古漢軍官分兩翼漢官分文東武西雍正八年令外省朝賀設糾儀官凡直省望闕朝賀設糾儀官省㑹以道員一人如無道員用府同知一人外府以同知一人無同知則用通判無同知通判則用教官一人州縣俱用教官一人屆期糾儀官黎明先至文武各官行禮時糾儀官旁立監視禮儀如有越次失儀及遲誤不到者糾儀官揭報督撫指名題恭凡遇有欽差人員一二品大臣列在第一班之首三品以下之京堂列在第二班之首五品以下之部院官員均列在第二班之末皇朝文獻通考卷一百二十六
