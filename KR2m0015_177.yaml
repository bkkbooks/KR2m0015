body:
  text: 欽定四庫全書皇朝文獻通考卷一百七十七樂考二十三夷部樂臣等謹按周禮四夷之樂曰韎曰任曰侏離曰僸先王用之於祭祀燕享所以昭大一統之盛也國朝列聖相承化隆無外幅員廣逺亘古所無我皇上紹世澤之鴻庥闢無疆之偉業西陲二萬餘里盡入版圖至德崇勳焜耀萬古迄今回部歸誠獻其國俗樂器列之殿廷與高麗國俳瓦爾喀樂並陳於宴享陳暘所謂中天下而立定四海之民服而役之得其歡心使鼓舞焉君子之所樂也至於西洋論樂頗極精深蓋中土律樂失傳而逺西之辨調審音實與古法默相符合聖祖仁皇帝特載其説於律吕正義續編聖意良有在也他如高麗琉球諸國以及新闢西疆內省邊境苗民類皆有樂大都隨地異宜仍其舊制今遵大清一統志暨各省全志所載敬謹採輯以為夷部樂考於以見皇朝德威光被中外一家之盛豈僅如周禮鞮鞻氏之所掌而已哉西洋樂律律吕正義續編曰西洋波爾都哈兒國人徐日升精於音樂其法專以絃音清濁二均遞轉和聲為本後又有一大里呀國人德禮格亦精樂律與徐日升所傳源流無二以其所講聲律節奏核之經史所載律吕宫調實相表裏故取其分配隂陽二均高低字譜編集成書使談理者有實據云五線界聲凡度曲之聲字不過七音至第八音而仍合於首音因用五線以界之五線四空共九位已足於用或九位之外别有當如之音則上下各略一短線而得十三音之分或所增短線上下各紀一位則又得十五音之分矣二記紀音凡樂不出剛桑二端故用剛柔二記以紀清濁互易為用之號蓋柔樂濁聲剛樂清聲若夫純用剛音或純用柔音則不紀焉如柔樂內間以剛樂聲字則用剛紀而知其髙半音或剛樂內間以柔樂聲字則用柔紀而知其低半音如南曲北曲中出調之類俾人一見而即知其為某聲字某宫調也六字定位音之有七傳記則以五聲二變名之度曲家則以字譜七字名之西法止用六字自下而上曰烏勒鳴乏朔拉其命立音之分則烏上至勒為全分勒上至鳴為全分而鳴上至乏則為半分乏上至朔仍為全分朔上至拉亦為全分夫絃音七聲之度有五全分二半分今止用六字紀之者蓋七調之絃每一絃第七音之分皆值半音之位故省而不用欲審絃音全度係何聲字必以鳴乏二音之分考之上起之音乏在第四則知第一音為烏乏在第三則知第一音為勒乏在第二則知第一音為鳴下落之音鳴在第四則知第一音為拉鳴在第三則知第一音為朔鳴在第二則知第一音為乏是以絃度之中但遇半音之分則以鳴乏紀之為其易於上下推尋而不亂也三品明調凡作樂必有高音低音平音之三等若不設一凖則髙低無憑故用上中下三品以紀一曲之始終為何聲調也其一曰上品乃自下而上遞髙之調惟有上起而無下落焉一曰中品乃上下適中最平之調此調之聲字可上可下也一曰下品乃自上而下遞落之調自最髙音至最低音其中可以兼髙低平三等聲字也此三品乃絃音諸樂之樞紐而為一切聲字之門户焉七級明樂用樂名之七級以明絃度之七音蓋絃音諸樂總以聲字之清濁互易為用此半音之名所由立也七級之中以三字名之者四以二字名之者三其以三字名之者三絃之分全而以二字名之者乃除第七分之虛位也第一曰朔勒烏第二曰拉鳴勒第三曰乏鳴第四曰朔乏烏第五曰拉朔勒第六曰拉鳴第七曰乏烏夫七樂名之中以剛柔二記紀於乏鳴二字者蓋乏鳴二字原係剛柔二音相交之界他樂名內此二音不能全具故乏音紀以柔號鳴音紀以剛號若剛樂內有雜柔音之處則紀柔號使奏樂者見之即知音係半減而以乏音代鳴音焉或柔樂內有雜剛音之處則紀剛號使奏樂者見之即知音當半加而以鳴音代乏音焉果能以樂名七級熟記於心而以剛柔二紀明練於目以六字精詳於耳則一聆樂音即知何者為全何者為半皎然洞悉於胸中矣三品紀樂名七級朔勒烏以上品紀之蓋朔勒烏為最低音之分調起低音則必自下漸上故以遞高之品配之使人一見此品即知朔勒烏之紀為上起之調也朔乏烏以中品紀之蓋朔乏烏為中音之分調起中音則必可上可下故以中品配之使人一見此品即知朔乏烏之紀為平調也乏烏以下品紀之蓋乏烏為最高之分調起高音必自上而下故以遞下之品配之使人一見此品即知乏烏之紀為下落之調也要之第一樂名朔勒烏之烏第二樂名拉鳴勒之勒第三樂名乏鳴之鳴第四樂名朔乏烏之乏第五樂名拉朔勒之朔第六樂名拉鳴之拉皆屬上品第四樂名朔乏烏之烏第五樂名拉朔勒之勒第六樂名拉鳴之鳴第七樂名乏烏之乏第一樂名朔勒烏之朔第二樂名拉鳴勒之拉皆屬中品第七樂名乏烏之烏第一樂名朔勒烏之勒第二樂名拉鳴勒之鳴第三樂名乏鳴之乏第四樂名朔乏烏之朔第五樂名拉朔勒之拉皆屬下品以此樂名次第熟之方能識度曲為何樂名之聲字品調也至於絃音七調相旋而三品之中獨遇乏與鳴及第七音空位之分上下互移半音之度是以七樂名內惟乏鳴之一樂名紀以半音髙低之二記此又半音與整音不同之一證也半分易字用六字以度絃音之曲凡聲字上起者不出於第六拉字下落者不過於第一烏字則不易名若上起出於拉下落過於烏則以七樂名之第二樂名拉鳴勒第五樂名拉朔勒兩樂名內之一字易之易之者聲音之高低不易但易其字以紀半音之分既易其字則當繼之字仍依其序以足上下溢出之分新法七字明半音互用六字配七音獨遺第七音之分今西法又一例其第七音增一犀字始足七樂名之位而全半互易為用者一覽而即明焉如一絃全度首音為朔乏烏者以七字明之則朔乏烏紀以烏拉朔勒紀以勒拉鳴紀以鳴乏烏紀以乏朔勒烏紀以朔拉鳴勒紀以拉乏鳴紀以犀此中法之四字調所謂正調也一絃全度首音為拉朔勒者以七字明之則拉朔勒紀以勒拉鳴紀以鳴乏烏半音高紀以乏半音高朔勒烏紀以朔拉鳴勒紀以拉乏鳴紀以犀朔乏烏半音高紀以烏半音高此中法之乙字調也一絃全度首音為拉鳴者如以七字明之則拉鳴半音低紀以鳴半音低乏烏紀以之朔勒烏紀以朔拉鳴勒半音低紀以拉半音低乏鳴半音低紀以犀半音低朔乏烏紀以烏拉朔勒紀以勒此中法之上字調也一絃全度首音為乏烏者如以七字明之則乏烏紀以乏朔敕烏紀以朔拉鳴勒紀以拉乏鳴半音低紀以犀半音低朔乏烏紀以烏拉朔勒紀以勒拉鳴紀以鳴此中法之尺字調也一絃全度首音為朔勒烏者如以七字明之則朔勒烏紀以朔拉鳴勒紀以拉乏鳴紀以犀朔乏烏紀以烏拉朔勒紀以勒拉鳴紀以鳴乏烏半音高紀以乏半音高此中法之工字調也一絃全度首音為拉鳴勒者如以七字明之則拉鳴勒紀以拉乏鳴紀以犀朔乏烏半音高紀以烏半音高拉朔勒紀以勒拉鳴紀以鳴乏烏半音高紀以乏半音高朔拉烏半音高紀以朔半音高此中法之几字調也一絃全度首音為乏鳴者如以七字明之則乏鳴半音低紀以犀半音低朔乏烏紀以烏拉朔勒紀以勒拉鳴半音低紀以鳴半音低乏烏紀以乏朔勒烏紀以朔拉鳴勒紀以拉此中法之六字調也樂音長短之度凡樂音必取一凖以為全度自此度而引伸之則為長自此度而遞減之則為短立度長短之間而音韻之遲疾生焉此以無聲之度而紀有音之樂也是故法驗時刻漏之義而為手勢抑揚之號取手之一揚為半度一抑為半度合一抑一揚而為全度自全度而上為漸緩之式自全度而下為漸速之式使度曲者依此度而為之長短庶品制有定而節奏以成焉八形號紀樂音之度全度之上長而緩者為三全度之下短而速者為四並全度為八其全度為中分自此而上則為全度之倍名曰緩分自此而上則又為緩分之倍名曰長分自此而上則復為長分之倍名曰倍長分自中分而下則為全度之半名曰半分自此而下則又為半分之半名曰小分自此而下則又為小分之半名曰速分自此而下則復為速分之半名曰最速分倍長形號音節極長人聲斷不能及管樂中設法用之或可以及然不過以備一種要無此等曲也其長形號人聲亦不能及管樂則能及之其緩形號人聲固能及然用於人聲者少而用於樂音之終者多以上三形號可用於下落之調不可用於上起之調蓋音長而上起樂聲尚不能及况人聲耶故謂之下聲焉其中形號於人聲為中分而於樂聲則為緩分其半形號用於人聲雖比中分稍速而用於樂音則為適中故凡度曲用此形號者最多此二形號不拘下落上起之調皆可用故為之中聲焉其小形號用於人聲為少速而於樂音則猶謂之中分其速形號於樂音為少速而於人聲則為極速其最速形號則音節極促樂音或能如之而人聲亦斷不能及此三形號用於上起之調則可用於下落之調則不可蓋高則宛轉成韻下則曲奏難成故謂之高聲焉八形號定為三凖一曰全凖其倍長分凖十二度手一抑一揚為一次此十二度即十二次長分凖六度緩分凖三度中分凖一度半其餘依次減半計之一曰大半凖其倍長分凖八度長分凖四度緩分凖二度中分凖一度其餘亦依次半之一曰小半凖各分俱為大半凖之半然度曲時用大半與小半二凖者多用全凖者少蓋全凖之中分為一度半自此分而減半之則數必奇零不若大半凖小半凖二者之得分整齊遞析之而無奇零之虞也臣等謹按西法以烏勒鳴乏朔拉犀七字紀樂即古五聲二變之七音今度曲家四乙上尺工凡六之七字譜也絃音之度分五正聲為全分二變聲為半分乏與犀皆得半分即變徴變宫二音也若夫旋轉為調則正變清濁亦互易焉至於奏樂之音韻疾徐彼以手勢之一抑一揚定為長短之度以凖遲速亦猶中法之以板節樂也其論音辨調頗稱精詳實與中法相為表裏今苐採撮大要著於萹其詳具載本書可見理之至者逺近同源法之精者中外一轍益徴我聖祖仁皇帝神明天縱審定黃鍾元音之度分辨明第八音合於首音之妙義闢閫奧而定宏規此我朝之雅樂所以獨絶千古云西洋天主堂其國本稱內有三十六祭臺中臺左右有編簫二座中各有三十二層每層百管管各一音合三千餘管凡風雨波濤謳吟戰鬬與百鳥之聲皆可模倣朝鮮高麗史郊廟朝會雜用唐樂宋大晟樂明雅樂又有俗樂俗樂之名頗有新異舞鼓侍中李混謫寧海得海上浮查制為舞鼓其聲宏壯動動其詞效仙女而為之無得出自西域歌詞多用佛語西京西京即箕子始封地其民習於禮讓作此歌大同江殷太師箕子封於朝鮮施八條之教以興禮俗人民大悅以大同江比黃河永明嶺比嵩山頌禱其君也五冠山孝子李文忠所作楊州楊州即高麗漢陽府地繁華男女方春好逰相樂而歌之也月精花普州妓名司録魏齊萬惑之里人作此以刺之長生浦侍中李濯出鎮金羅有威惠倭寇長生浦濯赴援倭望見即引軍去軍士悅而作歌叢石亭竒輒所作輒東還至江陵登此亭臨望大海感四仙之迹作是歌處容新羅憲康王遊鶴城還至開雲浦有一人奇形詭服從入京自號處容每月夜輒歌於市以為神人李齊賢詩新羅當日處容翁見説來從碧海中貝齒頳唇歌夜月鳶肩紫袖舞春風沙里花賦役繁重託言黃鳥啄粟以怨之長巖長巖老人譏平章杜英哲所作安東紫青婦人一失其身人所賤惡故作此歌以絲之紅緑青白反覆比之濟危寶婦人以罪徒役至濟危寶恨其手為人所執作是歌以自怨冬柏木蔡洪哲流逺島作此歌王聞之即日召還禮成江唐商賀頭綱善棋至禮成江見一美婦人乃與其夫賭棊佯不勝輸物倍夫利之果以妻注一舉勝之舟載而去其夫悔恨作是歌也鄭瓜亭內侍郎中鄭敘作李齊賢詩憶君無日不霑衣政似春山蜀子規為是為非人莫問只應殘月曉星知紫霞洞侍中蔡洪哲所作教坊女弟子奏王母隊歌舞一隊五十五人舞成四字或君王萬嵗或天下太平琉球凡有宴會歌呼踏蹄一人唱衆皆和音頗哀怨扶女子上膊搖首而舞凖噶爾部伊犁固爾扎廟海努克廟喇嘛居此二寺暮鼓朝螺梵唄清越又其俗每日申刻則擊鼓鳴鐃名曰送日惟阿奇木伯克門首建小樓早晚吹號鳴鐃擂鼓於其上以迎送日光其樂器有雅拖噶伊奇里琥兒土布數兒琵琶琥兒特木爾琥兒綽兒坑哥爾奇倉戥賒轟貨鼻什庫兒伊克捕肋冬捕肋大約與蒙古樂相似雅拖噶以下六器為其歡會宴飲所用以絲為主而竹附之坑哥爾奇以下七器則為誦經應和之用也其樂曲一名圖爾本衛拉特有聲無辭用以試絃一名噶爾逹木特歎美其人之辭一名布圖遜雅布逹爾頌禱之辭用以煞尾别有沙謹奇末克噶拉逹瑪奇爾吉斯訥末庫濟爾噶拉胡里莽拉土門額起諸曲率以雅拖噶以下六器相和成調云回部喀什噶爾其俗於十月朔日十二月十日大伯克率衆衣新衣張鼓樂赴寺拜天并慶賀宴會回民吉禮用鼓二胡琴一三絃二筝一樂人席地而坐以手拍鼓衆樂從之聲音和翕樂人歌曲婦女數人起舞踏步旋轉皆能應節城內築高亭一座每日夕時用鐃鼓嗩呐銅號以送日闢展每嵗二月謂之年頭彼此宴會幼子幼女相率歌舞凡婚禮男婦及親黨並赴女家作樂歌舞至娶日亦用鼓吹成婚三日壻偕婦回至女家鼓吹歌舞導從及門而止居父母之喪一年內不宴會不作樂伯叔兄弟之喪三月內不宴會不作樂其樂器有大鼓小鼓銅號鉸子嗩呐喇叭三絃胡琴哈龍哈龍之制以木為之形圓中空面挂銅絃六十歌曲皆番音烏什各城阿奇木每日用鼓吹一次回民吉禮用樂男女歌舞樂器有大鼓小鼓喇叭嗩呐三絃胡琴抓琴鼓子葉爾羌和闐樂器有筝三絃琵琶胡琴管喇叭嗩呐鼓鈸日夕時亦作樂送日庫車沙雅爾樂器有大鼓小鼓喇叭嗩呐三絃筝阿克蘇賽里木拜凡婚喪之事俱用樂樂器有三絃琴筝手鼓每日申刻以後並鼓吹作樂以送日回部樂曲一名思那滿愛慕其人之辭一名塞勒喀思拊掌行樂之辭一名察罕一名珠魯馬前鼓吹之辭凡按工尺字一周終而復始節以人聲隨其長短以成曲調臣等謹按凖夷崇尚黃教回民敬奉天主故其拜天禮佛儀節不同音樂亦異一統志舊載葉爾羌國俗未甚詳備自西陲底定以後人民土宇咸𨽻版圖教育撫綏等諸內地因得悉其祭祀婚喪嵗時伏臘之樂制大都西極之地迤邐廣逺族類繁多風尚不一聲音器數之制時有異同蓋習俗相承所從來逺矣回部所獻土音俗樂今已𨽻在樂官陳於宴享其樂技樂器詳見散樂樂器二門兹不備載瓜哇樂有橫笛鼓板亦能舞浡泥國凡宴會鳴鼓吹笛擊鈸歌舞為樂湖南苗擊銅鼓沙鑼以祀鬼神親戚宴會以匏笙銅鼓為樂四川苗賨人剽勇鋭氣喜歌舞宴樂則擊銅鑼鼓吹橫笛歌舞兩廣苗俚人最貴銅鼓鑄初成懸於庭中置酒招同類來者以金銀為大叉執以扣鼓因遺主人名為納鼓叉風俗好殺相攻擊輒鳴此鼓聚衆有是鼓者極為豪強號為都花雲南苗𤏡夷一名攞夷筵宴則貴人上坐僚屬以次列坐於下酒初行樂作一人大呼一聲衆人和之如此者三既就坐樂有三曰𤏡夷樂緬樂車里樂𤏡夷樂有筝笛胡琴響盞之類歌中國之曲緬樂者緬人所作以羊皮為三五尺長鼓以手拍之間以銅鐃鼓拍板與中國僧道之樂無異鄉村宴飲則擊大鼓吹蘆笙舞牌為樂人死親鄰相聚少年百數十人飲酒作樂歌舞逹旦謂之娛尸婦人羣聚擊碓杵為戲數日而後葬在鎮南者婚禮夷歌侑食窩泥喪無棺弔者擊鑼鼓搖鈴頭插雞尾跳舞名曰洗鬼忽泣忽飲三日採松為架焚而葬其骨祭用牛羊揮扇環歌拊掌踏足以鉦鼓蘆笙為樂在南安州又曰和泥飲酒以一人吹蘆笙為首男女連手周旋跳舞為樂花苗凡節序擊銅鼓吹喇叭歡聚賽神黑乾夷婚配不用媒妁男吹笙女彈口琴倡和相調悅而野合歸語父母始用媒聘嫚且男婦作歡鳴葉吹新彈蔑弄枯則皆音節流暢合夷曲而雜和之其聲喑然咿然亦可聽貴州苗紅苗擊鼓歌舞名曰調鼓八番燕會擊長腰鼓為樂克孟牯羊苗男女屣笙為偶免乳而歸其聘財狆家其種有三一曰補籠一曰卡龍一曰青狆嵗時擊銅鼓為歡土人或掘地得鼓即以為諸葛所遺富者不吝直爭購蔡家居喪猶存古禮聚親屬吹笙跳舞名曰做戞花苗每嵗孟春合男女於野謂之跳月男吹蘆笙女振響鈴旋躍歌舞東苖跳月與花苗同至禾熟牛肥釀酒斫牛召集親屬劇飲歌唱西苗延善歌祝者各著大氊衣腰摺如圍穿皮靴頂大氊帽導於前童男女百數十輩青衣綵帶相隨於後吹笙舞踏歷三晝夜乃殺牛以賽豐年皇朝文獻通考卷一百七十七
