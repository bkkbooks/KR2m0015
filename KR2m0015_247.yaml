原封輔國公綽克都子康熙二十一年正月封三十一年七月卒子降襲詳鎮國將軍輔國公塞勤太祖四世孫鎮國公蘇爾發子康熙三十八年八月封三等鎮國將軍四十年七月降襲雍正七年五月卒贈詳郡王齊努渾塞勤子雍正七年八月襲八年加奉恩字乾隆九年卒諡簡僖功宜布齊努渾弟乾隆九年十月襲十一年二月卒諡恪勤贈詳郡王如松功宜布子乾隆十一年六月襲晉襲詳郡王修齡多羅信郡王德昭子如松從叔乾隆二十七年六月以如松襲封多羅信郡王命襲公爵輔國公普昌太祖五世孫固山貝子敦達子康熙三十三年四月封三十五年四月卒無襲原封奉恩輔國公永齊太祖五世孫固山貝子準達子康熙四十二年六月封三等鎮國將軍雍正四年十月降襲輔國公八年加奉恩字十一年閏二月卒四年坐事追削爵蘇爾禪永齊弟雍正六年九月封三等輔國將軍十一年五月襲乾隆四年二月卒諡簡恪廣齡蘇爾禪子雍正十三年四月封奉恩將軍乾隆四年七月襲十年十二月卒諡敦僖博爾忠鄂廣齡子乾隆十一年五月襲奉恩輔國公瑟爾臣太祖五世孫鎮國公登塞子康熙五十五年四月封三等鎮國將軍雍正二年十二月降襲輔國公八年加奉恩字乾隆十五年八月卒諡温僖額爾經阿瑟爾臣子乾隆十五年十二月襲二十年八月卒德明阿額爾經阿兄乾隆二十一年二月襲二十二年十月坐事削爵襲詳鎮國將軍原封輔國公阿布蘭太祖五世孫鎮國公巴鼐子康熙二十三年四月降襲雍正元年三月晉多羅貝勒二年五月坐事仍降輔國公五年閏三月坐事削爵法爾善阿布蘭弟子雍正五年五月襲八年加奉恩字乾隆五年閏六月卒諡和慤禄慶法爾善子乾隆五年十一月襲二十三年十一月降封詳鎮國將軍輔國公魯賔太祖五世孫多羅貝勒克齊子初封詳貝子雍正四年三月降封乾隆八年六月卒諡恪思孫降襲襲詳奉恩將軍原封輔國公恒新太祖五世孫原封輔國公普照子雍正二年十一月封三年十月以父罪削爵奉恩輔國公竒崑太祖五世孫乾隆四十三年以饒餘敏親王阿巴泰及其子安郡王岳樂俱著有功績特命其裔孫一人世襲輔國公於是竒崑封輔國公輔國公智保太祖六世孫原封鎮國公普貴子雍正元年十月降襲雍正三年二月卒蘇保智保弟雍正三年五月襲四年十二月卒誠保蘇保兄雍正五年二月襲八年加奉恩字乾隆十九年九月卒諡温僖慶春誠保子乾隆二十年二月襲三十八年六月卒恒寧慶春子乾隆三十八年十月襲原封奉恩輔國公斗寶太祖六世孫奉恩鎮國公諾音託和子乾隆五年正月降襲二十四年六月坐事削爵奉恩輔國公逢信原名逢人太祖六世孫鎮國公贈固山貝子屯珠嗣孫康熙五十七年十二月降襲輔國公雍正八年加奉恩字乾隆十二年八月卒諡恭恪盛昌逢信子乾隆十二年十二月襲二十二年七月坐事削爵二十三年二月封鎮國將軍十二月仍晉封太宗系輔國公葉布舒太宗皇四子初封三等鎮國將軍康熙八年晉封二十九年九月卒輔國公品級常舒太宗皇七子初封三等鎮國將軍康熙八年晉封十四年十二月坐事削爵三十七年十二月授輔國公品級三十八年十二月卒輔國公韜塞太宗皇十子初封三等鎮國將軍康熙八年晉封三十四年二月卒子降襲詳鎮國將軍原封輔國公靖恒太宗皇孫鎮國公髙塞子康熙九年十二月降襲雍正六年七月坐事削爵原封輔國公雲升太宗皇孫鎮國公髙塞子康熙十七年正月封三十六年十一月坐事削爵子降襲詳鎮國將軍原封輔國公成孚太宗皇孫鎮國公髙塞子康熙二十二年正月封六十年五月坐事削爵雍正元年十二月卒以輔國公禮殯葬原封輔國公揆慧太宗四世孫多羅貝勒延夀子康熙五十年十一月封奉恩將軍五十四年十月降襲雍正元年二月坐事削爵奉恩輔國公永瑺太宗五世孫奉恩鎮國公贈恭勤世子𢎞普子乾隆八年七月降襲詳親王原封奉恩輔國公德謹太宗五世孫原封多羅貝勒球琳子乾隆二十三年四月封二十八年十二月坐事削爵輔國公𢎞曧太宗五世孫聖祖皇孫和碩莊親王允禄子乾隆二十一年封鎮國將軍三十二年六月襲封世祖系輔國公品級保綬世祖皇孫和碩裕親王福全子初封輔國公品級贈諡詳親王康熙四十五年九月卒原封輔國公廣華世祖皇曽孫原封和碩裕親王保泰子雍正二年三月封十月坐事削爵聖祖系原封不入八分輔國公𢎞晸聖祖皇孫原封貝子允禟子初以其父獲罪黜籍禁錮乾隆四十三年特命宥釋復列宗潢四十七年封不入八分輔國公四十八年坐事削爵輔國公品級𢎞晉聖祖皇孫贈和碩禮親王允礽子康熙五十二年三月卒以輔國公禮殯葬奉恩輔國公𢎞曣聖祖皇孫贈和碩禮親王允礽子雍正六年六月封輔國公八年加奉恩字乾隆十五年四月卒諡恪僖永瑋𢎞曣子乾隆十五年九月襲原封奉恩輔國公𢎞晀聖祖皇孫贈和碩禮親王允礽子雍正十二年十一月封乾隆三十四年十月縁事削爵奉恩輔國公𢎞晥聖祖皇孫贈和碩禮親王允礽子乾隆三年十一月封四十年五月卒永浩𢎞晥子乾隆四十年十月降襲不入八分輔國公四十三年六月卒無嗣停襲不入八分輔國公永澤聖祖皇曽孫貝勒品級𢎞昇子乾隆四十年十月奉特㫖封奉恩輔國公𢎞暢聖祖皇孫和碩諴親王允祕子乾隆二十一年十二月奉特㫖封詳親王奉恩輔國公永璥聖祖皇曽孫輔國公品級𢎞晉子乾隆元年二月封五十二年三月卒未襲世宗系奉恩輔國公永璧世宗皇孫和碩和親王𢎞晝子乾隆二十一年十二月奉特㫖封詳親王不入八分輔國公永琨世宗皇孫和碩和親王𢎞晝子乾隆四十年十二月封附贈輔國公贈輔國公達爾察顯祖皇孫贈多羅貝勒穆爾哈齊