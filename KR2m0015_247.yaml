body:
  text: 欽定四庫全書皇朝文獻通考卷二百四十七封建考二同姓封爵二多羅貝勒顯祖系原封多羅貝勒屯齊顯祖皇曽孫贈多羅貝勒圖倫子崇德四年八月以軍功封輔國公順治元年十月晉固山貝子六年十月晉封九年坐事削爵復封詳鎮國公原封多羅貝勒尚善顯祖皇曽孫贈和碩簡親王輔國公芬古子順治元年四月襲輔國公十月晉固山貝子六年十月晉封十七年七月坐事降固山貝子康熙十一年閏七月復晉封十七年八月卒十九年七月坐事追削爵襲詳貝子太祖系臣等謹按崇德元年始定九等爵以封宗室故天命天聰年間太祖皇子凡稱大貝勒和碩貝勒者特國初最尊之號與崇德建元以後封爵有異兹不具載多羅安平貝勒杜度太祖皇孫土門貝勒褚英子崇德元年四月以軍功封崇德七年六月卒杜爾祜杜度子初封輔國公崇德七年六月晉鎮國公十月坐事削爵順治二年二月復封輔國公八年二月襲多羅貝勒十二年二月卒諡慤厚子降襲詳貝子多羅貝勒岳託太祖皇孫和碩禮親王代善子初封詳親王崇德元年八月降封二年八月降固山貝子三年正月復封征山東薨於軍贈襲並詳郡王原封多羅貝勒察尼太祖皇孫追降多羅豫郡王多鐸子順治十二年正月封康熙十九年十一月坐事削爵二十七年九月卒以輔國公禮殯葬諡恪僖多羅貝勒多爾博太祖皇孫追降多羅豫郡王多鐸子順治十四年正月封康熙十一年十二月卒子降襲詳鎮國公乾隆四十三年正月奉㫖過繼與和碩睿忠親王多爾衮為嗣多羅貝勒喀爾楚渾太祖皇曽孫贈多羅克勤郡王岳託子順治二年二月封鎮國公六年十月晉封八年十一月卒諡顯榮克齊喀爾楚渾子初名魯克度順治九年十月叙父功績襲康熙六十一年六月卒子降襲詳貝子多羅貝勒巴爾楚渾太祖皇曽孫贈多羅克勤郡王岳託子順治六年十月封十二年正月卒諡和惠無襲原封多羅貝勒巴思哈太祖皇曽孫贈多羅克勤郡王岳託子崇德四年正月封鎮國將軍順治六年十月晉封十一年坐事削爵詳鎮國將軍多羅貝勒祜里布太祖皇曽孫贈多羅克勤郡王岳託子順治六年十月封九年五月卒諡剛毅無襲原封多羅貝勒杜蘭太祖皇曽孫贈和碩穎親王薩哈璘子順治六年十月封康熙七年正月降鎮國公詳鎮國公多羅貝勒齊克新太祖皇曽孫和碩親王追降多羅貝勒博洛子初襲和碩端重親王順治十六年以父罪降封十八年正月卒諡懷思無襲多羅貝勒常阿岱太祖皇曽孫和碩禮親王滿達海子初襲詳親王順治十六年十月坐事降封康熙四年四月卒諡懷愍襲詳貝子多羅貝勒訥尼太祖四世孫多羅衍禧郡王羅洛渾子順治十三年正月封康熙四年三月坐事削爵三十九年十二月復封四十四年正月卒子降襲詳鎮國公太宗系多羅貝勒延夀太宗皇曽孫多羅温良郡王猛峩子封詳郡王康熙三十七年四月降封子降襲輔國公詳輔國公原封多羅貝勒球琳太宗四世孫贈多羅貝勒福蒼子襲封詳郡王乾隆十一年三月坐事降封二十二年坐事削爵世祖系多羅貝勒海善世祖皇孫和碩恭親王常寧子康熙三十四年四月封奉恩將軍四十二年十二月晉封五十一年十月坐事削爵雍正十年八月復封乾隆八年二月卒諡僖敏滿都䕶海善兄康熙二十七年二月封三等輔國將軍五十一年十月襲封雍正四年七月坐事降固山貝子詳貝子斐蘇海善孫雍正九年九月奉特㫖襲多羅貝勒乾隆二十八年三月卒子降襲詳貝子聖祖系多羅貝勒允禕聖祖皇二十子雍正四年五月封固山貝子八年二月晉封十二年八月降輔國公十三年九月仍晉封乾隆二十年正月卒諡簡靖多羅貝勒允祜聖祖皇二十二子雍正二年八月封固山貝子十二年二月晉封乾隆八年十二月卒諡恭勤郡王品級多羅貝勒允祁聖祖皇二十三子初封貝勒既降貝子乾隆四十二年坐事降鎮國公四十五年晉貝子四十七年晉貝勒四十九年加郡王品級五十年子𢎞謙降襲詳貝子原封多羅貝勒𢎞昌聖祖皇孫和碩怡親王允祥子雍正元年四月封固山貝子十三年十月晉封乾隆四年十月坐事削爵多羅貝勒𢎞明聖祖皇孫多羅恂郡王允禵子雍正十三年十一月封乾隆三十二年正月薨諡恭勤子降襲詳貝子多羅貝勒品級𢎞昇聖祖皇孫和碩恒親王允祺子康熙五十九年十二月封世子雍正五年四月坐事削爵乾隆十九年四月卒以多羅貝勒禮殯葬諡恭恪多羅貝勒品級𢎞暾聖祖皇孫和碩怡親王允祥子雍正六年七月卒以多羅貝勒禮殯葬多羅貝勒品級𢎞昑聖祖皇孫和碩怡親王允祥子雍正七年二月卒以多羅貝勒禮殯葬多羅貝勒永喜聖祖皇曽孫多羅寧郡王𢎞晈子為伯父多羅貝勒品級𢎞暾嗣雍正八年八月封九年十二月卒多羅貝勒永福聖祖皇曽孫多羅寧郡王𢎞晈子乾隆二十九年十二月降襲多羅貝勒永璦聖祖皇曽孫理恪郡王𢎞㬙子乾隆四十五年十二月降襲多羅貝勒永鋆聖祖皇曽孫淳慎郡王𢎞暻子乾隆四十二年十月降襲多羅貝勒永珔聖祖皇曽孫愉恭郡王𢎞慶子乾隆三十五年降襲多羅貝勒綿惠聖祖四世孫今上皇帝孫履端郡王永珹子乾隆四十二年降襲多羅貝勒綿譽聖祖四世孫恭恪貝勒永福子乾隆四十七年襲今上皇帝系多羅貝勒永瑢今上皇帝皇六子乾隆二十四年十二月奉㫖為多羅慎靖郡王後封多羅貝勒綿懿今上皇帝孫贈循郡王永璋嗣子乾隆五十一年正月封多羅貝勒綿億今上皇帝孫榮純親王永琪子乾隆四十六年十月封附贈多羅貝勒贈多羅貝勒穆爾哈齊顯祖皇二子順治十年六月贈諡勇壯贈多羅貝勒巴雅喇顯祖皇五子順治十年五月贈諡剛果贈多羅貝勒圖倫顯祖皇孫贈和碩莊親王舒爾哈齊子順治十年五月贈諡恪僖贈多羅貝勒寨桑古顯祖皇孫贈和碩莊親王舒爾哈齊子順治十年五月贈諡和惠贈多羅貝勒福蒼太宗皇曽孫原封多羅惠郡王博翁果諾子乾隆五年四月卒以貝勒品級殯葬十五年七月以子球琳襲封多羅貝勒至是追贈以上貝勒固山貝子顯祖系固山貝子吳達海顯祖皇孫贈多羅貝勒穆爾哈齊子崇德四年八月封三等輔國將軍順治二年二月以軍功晉二等四年六月以考滿晉一等九月晉三等鎮國將軍八年三月晉封卒諡襄敏子降襲詳鎮國公原封固山貝子芬古顯祖皇孫贈和碩親王舒爾哈齊子崇德元年封四年五月削爵復封詳輔國公固山貝子固爾瑪洪顯祖皇曽孫大貝勒阿敏子崇德四年封輔國公五月以父罪削爵順治五年閏四月復封輔國公六年十月晉封康熙二十年十月卒諡温簡子降襲詳鎮國公原封固山貝子扎喀納顯祖皇曽孫閒散宗室扎薩克圖子崇德四年以軍功封鎮國公坐事降輔國公七年十月坐事削爵黜宗室籍順治二年二月復籍仍封輔國公六年十月晉封九年七月削爵復爵詳輔國公固山貝子傅喇塔顯祖皇曽孫贈和碩簡親王篇古子順治二年二月封輔國公六年十月晉封十六年二月坐事降輔國公十八年三月復晉襲父爵康熙十五年十一月卒諡惠獻贈詳親王富善傅喇塔子康熙六年正月封鎮國公十七年六月以父軍功晉襲二十九年十一月坐事削爵福存傅喇塔子康熙十七年七月封鎮國公三十年正月襲三十九年九月卒贈詳親王固山貝子努賽顯祖皇曾孫贈和碩簡親王篇古子初封輔國公順治六年十月晉封七年十一月卒諡悼哀子降襲詳鎮國公原封固山貝子吞齊哈顯祖皇曽孫贈多羅貝勒圖倫子崇德四年八月封輔國公順治元年十月晉封五年九月坐事降鎮國公六年十月復晉封十四年十一月坐事削爵原封固山貝子温齊顯祖四世孫鎮國公屯齊子順治六年十月封康熙十六年二月降輔國公詳輔國公太祖系固山貝子博和託太祖皇孫贈和碩饒餘親王阿巴泰子初封輔國公順治元年十月以軍功晉封五年九月卒諡温良彰泰博和託子順治八年閏二月封鎮國公尋晉固山貝子九年正月襲父封康熙二十二年四月叙平雲南功以功績入封冊二十九年正月卒子降襲詳鎮國公固山貝子和度太祖皇孫原封和碩英親王阿濟格子初封輔國公順治元年十月晉封三年十月卒無襲原封固山貝子額克親太祖皇孫贈輔國公塔拜子崇德四年八月封三等奉國將軍九月晉封三等輔國將軍順治元年四月以軍功晉二等四年九月晉一等尋封輔國公六年十月晉封鎮國公七年八月晉封十年以罪黜為庶人後復宗室籍十二年正月卒原封固山貝子穆爾祜太祖皇曽孫多羅安平貝勒杜度子天聰九年以軍功封輔國公崇德七年十月坐事削爵順治二年二月封三等鎮國將軍三年正月以軍功晉一等四年三月以軍功晉輔國公六年十月以軍功晉封九年以罪削爵固山貝子特爾祜太祖皇曽孫多羅安平貝勒杜度子初封輔國公崇德七年十月坐事削爵順治二年二月復封輔國公十月晉封十五年二月卒諡恪僖子降襲詳鎮國公固山貝子薩弼太祖皇曽孫多羅安平貝勒杜度子順治二年二月封輔國公六年十一月以軍功晉封十二年二月卒諡懷愍子降襲詳鎮國公圖子貝子蘇布圖太祖皇曽孫贈固山貝子尚建子初封輔國公順治六年十月晉封五年十一月卒諡悼愍子降襲詳鎮國公固山貝子强度太祖皇曽孫贈固山貝子尚建子順治六年十月封八年十月卒諡介潔無襲固山貝子佛克齊庫太祖皇曽孫固山貝子博和託子順治六年十月封十四年十二月卒諡介潔無襲原封固山貝子岳端太祖皇曽孫原封和碩安親王追降多羅郡王岳樂子初封詳郡王康熙二十九年二月降襲三十七年四月坐事削爵原封固山貝子蘇爾發太祖皇曽孫多羅貝勒多爾博子降襲固山貝子康熙三十九年五月降鎮國公詳鎮國公固山貝子敦達太祖四世孫多羅貝勒杜爾祜子順治十二年八月降襲康熙十三年九月卒諡恪恭子降襲詳鎮國公原封固山貝子準達太祖四世孫多羅貝勒杜爾祜子康熙六年正月封二十年十月坐事降鎮國公詳鎮國公原封固山貝子訥默遜太祖四世孫鎮國公杜蘭子康熙四年正月封十二年六月坐事削爵降襲詳輔國公原封固山貝子星尼太祖四世孫多羅貝勒常阿岱子康熙四年十月降襲二十七年二月坐事削爵五十二年十二月以子鎮國公星海削爵復封輔國公詳輔國公原封固山貝子魯賔太祖五世孫多羅貝勒克齊子康熙二十三年正月封六十一年六月降襲雍正四年三月坐事降輔國公詳輔國公固山貝子品級福秀太祖七世孫原封多羅平郡王訥爾蘇子乾隆二十年七月卒以固山貝子禮殯葬固山貝子慶恒太祖八世孫多羅平郡王福彭嗣子初封詳郡王乾隆二十七年閏五月坐事降封太宗系原封固山貝子𢎞普太宗四世孫聖祖皇孫和碩莊親王允禄子乾隆元年二月封四年十月坐事削爵復爵詳鎮國公世祖系原封固山貝子滿都護世祖皇孫和碩恭親王常寧子初襲詳貝勒雍正四年七月坐事降封是年降鎮國公詳鎮國公固山貝子明韶世祖五世孫多羅貝勒斐蘇子乾隆二十八年十月降襲聖祖系固山貝子品級允禔聖祖皇長子初封詳郡王康熙四十七年十一月坐事削爵雍正十二年十一月卒以固山貝子禮殯葬固山貝子品級允䄉聖祖皇十子初封詳郡王雍正二年四月坐事削爵乾隆二年二月授奉恩輔國公品級六年九月卒以固山貝子禮殯葬固山貝子允祁聖祖皇二十三子初封詳貝勒乾隆二十三年降封固山貝子𢎞暻聖祖皇孫多羅誠郡王允祉子雍正五年六月封鎮國公八年五月晉封乾隆四十二年