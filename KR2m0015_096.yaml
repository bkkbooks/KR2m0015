body:
  text: 欽定四庫全書皇朝文獻通考卷九十六郊社考六雩禱水旱附臣等謹按古者龍見而雩遇旱而禱以為百榖祈膏雨以為民請命皆王者敬天勤民之心也我朝凡遇水旱或親詣祈禱或遣官將事皆本誠意以相感格不事虛文初立神祇壇以禱水旱雩祀既舉禮儀修備間或遣禱山川悉準古典謹考國史備載於䇿順治十四年四月癸卯世祖章皇帝以旱禱於圜丘是嵗四月不雨世祖躬行祈禱率羣臣致齊三日官民衣淺淡色服禁屠宰不理刑名至期皇帝素服詣圜丘不設鹵簿不除道不奏樂不設配位不奠玉不飲福受胙餘行禮如常儀遣官致祭方澤社稷壇神祇壇應時大雨越三日遣官行告謝禮臣等謹按本朝定制嵗遇水旱則遣官祈禱天神地祇太嵗社稷至於親詣圜丘即大雩之義初立天神壇於先農壇之南以祀雲師雨師風伯雷師立地祇壇於天神之西以祀五嶽五鎮四陵山五今為陵山四海四瀆京畿名山大川天下名山大川詳見第十卷於禮本無専祀惟祈雨則修祀事義與雩同既行常雩間有不雨仍遣官祗告以祈甘雨雨潦祈晴冬旱祈雪亦如之祈而應則報祀禮儀皆同直省各令建壇致祭常雩祈報皆循定制行禮十五年六月以久旱禱雨遣官詣各壇致祭十六年五月以久雨祈晴遣官詣各壇致祭如禱雨禮十七年六月丙申以久旱禱雨於圜丘世祖章皇帝步行詣南郊齊宿行禮是年亢旱日久五月中遣官分詣各壇䖍禱如禮六月壬辰諭禮部今夏亢𤾉日久農事堪憂朕念致災有由痛自刻責榖為民天非雨不遂竭誠祈禱積有日時乃精誠未達雨澤尚稽晝夜焦心不遑啓處兹卜於月之十三日預行齊戒黎明步至南郊於夜子刻祭告圜丘懇祈甘霖速降以拯災黎若仍不雨則再行躬禱務回天意又諭祭告為民請命應先詣郊壇潔誠齊戒十三日步至南郊即於彼處齊戒三日以十五日之夜子刻祭告十三日丙申皇帝率諸王文武羣臣素服步至南郊齊宿是日早四際無雲頃之隂雲密布甘霖大沛越三日戊戌行祀禮於圜丘祭畢雨復降越四日辛丑遣官行告謝禮是時禮部奏請修舉名山大川及古帝王聖賢祀典從之康熙四年三月旱命禮部遣官同河道總督朱之錫往泰山祈雨十年四月壬辰聖祖仁皇帝禱雨於圜丘是嵗自春入夏亢陽不雨諭㫖深自刻責即詣天壇禱祀前期致齊三日素服詣壇致祭旋以甘霖沾足遣官告謝俱與順治十四年同十七年六月丁亥親祈雨於圜丘是嵗夏旱諭禮部朕惟天人感召理有固然人事失於下則天變應於上捷如影響豈曰罔稽今天氣亢𤾉禾苗枯槁朕夙夜靡寧力圖修省躬親齊戒䖍禱甘霖爾部擇期具儀來奏前期致齊至日自西天門步行至壇行禮時甘霖大沛仍步出西天門乘馬回宫十八年四月十九年四月皆以祈雨親詣行禮詔諭修省直言得失清理刑獄得雨告謝皆同二十二年六月以天氣亢旱命建壇祈禱即日雨二十六年五月丁酉親祈雨於圜丘是月以天旱諭九卿等曰京師為天下根本之地乃幾月不雨朕甚憂之欲躬行祈禱大小臣工宜盡誠齊戒毋循故事至期素服乘馬自西天門步行至壇行禮御製祭文曰臣以眇躬仰承天眷撫育羣黎兢兢業業惟恐隕越邇日自春徂夏雨澤愆期京輔亢暘深懷疚懼良由眇躬不德政未咸宜大小臣工罔盡厥心惟君臣之咎於億兆何辜前者循省已過詔告四方而靈雨尚未霑足浹旬仰望彌切焦勞兹特潔蠲吉日率勵羣工實圖洗心齊祓將事呼籲上帝切望慈休伏冀俯鑒誠懇大沛甘霖俾兆民之咸蘇惟邦家之有慶引領郊壇尚祈昭格謹告祭畢回鑾甘霖立降雨有香氣越日遣官告謝如儀二十八年六月丁未以旱御製祭文遣官禱雨於圜丘五十五年五月駐蹕熱河以天旱減膳齊戒諭京師䖍誠祈雨越七日雨始復常膳臣等謹按水旱之災關乎天運治世所不能無然聖賢之心則無事不惕厲靡已敬考聖祖仁皇帝康熙五十六年冬諭諸皇子及大臣等曰京師初夏每少雨澤朕臨御五十六年約有五十年祈雨每至秋成悉皆豐稔昔年曽因暵旱朕於宫中設壇祈禱長跪三晝夜日惟淡食不御鹽醬至第四日步詣天壇䖍禱油雲忽作大雨如注步行回宫水滿兩鞾衣盡沾濕後各省人至始知是日雨遍天下又諭曰禮部於各寺廟祈雨所用僧人道士但務虛文殊無實意大約每月十八二十二十二二十四等日往往有雨人多言宜及此數日祈禱朕以為既知有雨何用禱為若知有雨而後禱此心便已不誠矣總之天行不齊多賴人事補救朕倉有餘粟帑有餘金隨時隨地皆可賑濟故雖逢旱嵗亦不能災也恭誦王言敬稽前事仰見六十年中祈禱之誠感格之理雖堯湯弗逮蓋編纂有不能詳者焉雍正元年五月微旱甲申世宗憲皇帝諭禮部䖍誠祈禱諸大臣各敬謹齊戒至於己亥世宗減膳齊戒精䖍致禱甘雨大霈羣臣諄請乃照常進膳二年二月辛未親詣黑龍潭禱雨黑龍潭在都城西北金山之麓潭有黑龍禱雨輒應詳見羣祀聖祖時建廟致祭是年旱乃親詣拈香致禱越數日世宗親祭歷代帝王廟甘雨大􅉈羣臣衣盡沾濕各加恩賜御製喜雨詩羣臣敬和五年七月以久雨世宗齊戒祈晴時自初八九日隂雨連綿世宗在圓明園行宫齊戒䖍禱十一日午刻冒雨步行至恩佑寺聖祖仁皇帝御容前䖍誠叩懇雨勢遂緩次日晴越一日復雨乃詣大髙殿䖍禱於上帝行禮畢回宫雨止天晴九年六月京師旱世宗齊心祈禱命羣臣設壇祈雨即日大雨臣等謹按世宗憲皇帝十三年中偶值亢旱無不齊居䖍禱精誠感應史不絶書謹載數事以見敬天憂民之意始終如一日云乾隆二年六月以天時亢旱遣官致祭天神地祗太嵗各壇及四海之神七年五月增神祗壇祈雨樂章是嵗夏旱皇上親禱黑龍潭復命於神祗壇祈雨增用樂章其後十七年禮臣奏言舊例祈雨惟祈告於壇而不奏樂自乾隆七年始增樂章揆之一應因事祗告之禮均不作樂殊未畫一至甘雨霑足報祭之時僅用酒果脯醢與祈告相同又與報祭之禮未稱請嗣後各壇告祭停止作樂至報祭時均應加籩豆牲牢即將神祗壇樂章用於報祭詔令更議之尋奏言凡祈雨之祭時當待澤孔殷蠲誠致禱與因事祗告之禮原有不同儀文自宜周備今奉諭㫖祭祀用樂以導和氣而格神祗乃祀神之禮與齊戒徹懸自致誠恪其義各異且樂足以宣通隂陽之氣祈雨致祭仍當用樂為是應遵㫖仍用樂章其太嵗壇祈雨樂章交樂部另行撰擬奏上允之八年四月始行常雩禮於圜丘先是七年四月御史徐以升奏言堯水湯旱聖世不免災異之乘禱雨祈晴古來原有特舉之禮我皇上旰食宵衣勤求民瘼今春夏以來畿輔地方雨澤愆期深宫齊禱默致精禋恩㫖頻頒大施解澤臣竊以為祀典所在宜亟修也按春秋傳曰龍見而雩蓋古者有雩祭之典所以為百榖祈膏雨也祭法曰雩宗祭水旱也月令仲夏之月命有司祈祀山川百源大雩帝用盛樂命百縣雩祭百辟卿士有益於民者以祈榖實是為常雩乃若偶逢亢旱則又有雩周禮稻人旱暵共其雩斂春秋書雩二十有一故有一月而再雩者旱甚也是又因旱而雩義雖不同要之雩祭之典自古有之考雩字為吁嗟求雨之義其制則為壇於南郊之旁故魯南門為雩門是雩壇亦有其地矣自西漢之世雩禮始廢旱則禱祀天地宗廟晉永和時議制雩壇於國南郊梁武帝始移於東郊又改燔燎而從坎瘞唐太宗又雩祀於南郊宋制孟夏雩祀昊天上帝前明雩壇在泰元門外是歷代皆雩也我朝禮制具備㑹典載有躬禱之儀獨於雩祭尚未設有壇壝似屬缺典雖郊祀之祭亦有雲雨風雷之神與嶽鎮海瀆之位而禮必有所専設乃於祈禱之典似更覺誠敬周詳伏乞敕下禮臣博求典故詳考制度於京城之內擇地建立雩壇倣古龍見而雩之禮每年及期擇日致祭偶遇亢旱愆陽雨澤稀少即於此望告嶽鎮海瀆及諸山川能出雲雨者以祈求雨澤毋庸於各宫觀處祈禱再者祈雨祈晴事同一體倘有雨水過多祈求開霽之處請照祭法雩宗祭水旱之例亦於雩壇致禱庶誠敬克伸於典禮似為允協併請停止僧道建壇諷經勿庸禁止屠宰照常辦理刑名又考之書曰王省惟嵗卿士惟月師尹惟日自古雨暘寒燠休咎攸關不獨人君當誠心修省即大小臣工亦宜有省躬省職之思至於直省州縣亦應並設雩壇俾展祈求之典臣請京師地方或遇雨𤾉偶爾愆期應致祈禱者皇上於大內䖍誠致禱特遣大臣官員詣壇致祭其王公各官員如何分班詣壇䖍誠祈禱及直省官員遇本地方水旱詣壇祈禱之處伏乞敕下禮臣一併詳議酌定儀注施行疏上詔禮部大學士㑹議尋議奏孟夏龍見擇日行常雩禮祀昊天上帝於圜丘以列聖配享四從壇從祀於下前期禮部奏請皇上親詣行禮或遣親王行事孟夏後旱則祈天神地祗太嵗壇次祈於社稷壇次祈於太廟皆七日一祈不雨或小雨不足還從各壇祈禱如初旱甚乃大雩祀昊天上帝於圜丘先經祈禱太廟既已䖍告列祖此次不設配位仍設四從壇於下雨足則報祀或已齊未祈而雨及所曽經祈禱者皆報祀如常儀其以前望祭四海之禮可以停止再考古大雩用舞童二佾衣元衣各執羽籥歌雲漢之詩今蒙皇上倣雲漢之體御製歌詩八章聖念懇誠宸章剴切從古未有應令舞童習歌交內務府製辦教演所用神祗壇樂章交與律吕正義館撰擬若久雨祈晴之處厯考前代皆無禜祭雩壇之禮請倣春秋左傳鼓用牲於社及文獻通考禜祭國門之禮但伐鼓禜祭於京師國門視水來湧集最多之門而祭仍雨不止則伐鼓用牲祭於社毋庸於各壇祈禱其僧道建壇諷經應行停止餘皆如舊至直省州縣所有耕藉田中皆設有壇祀應令於孟夏擇日行常雩禮或有亢旱亦每七日先祭界內山川次祭社稷致齊䖍禱雨澤但不得用大雩之禮其或霪潦為災則伐鼓用牲禜祭城門以祈晴霽不必另設雩壇至京師雨暘愆期皇上於大內祈禱其専承祈禱之官天神地祗社稷太嵗各壇遣王大臣一人太廟上帝遣親王一人應陪祀各官皆一體齊戒詣壇行禮如遇皇上親詣圜丘王以下俱陪祀疏上皆從之是嵗初舉雩祭皇上已降㫖親詣行禮醫院臣奏聖體微患初愈不宜勞動左右大臣言皇上誠敬之心至肫至切足以昭格穹蒼雩祭為常行之典不必今嵗一定親行乃遣恆親王𢎞晊恭代行禮九年四月乙卯雩於圜丘皇上親詣行禮是年孟夏常雩祀前五日奉諭㫖雩祭之典所以為百榖祈膏雨也從前定議禮儀悉照恭祀圜丘之制行朕思目下畿輔雨澤愆期此次舉行雩祭正望恩迫切之時非每夏常雩可比其先期前詣齊宫及祭畢回鑾朕俱御常服不乘輦不設鹵簿不作樂以示䖍誠祈禱為民請命之意五月乙酉皇太后禱雨於龍神廟是年亢旱屢禱未應五月初二日皇上恭請皇太后安還大學士等奉諭㫖一春以來雨澤稀少二麥黃萎今逾芒種之期甘霖猶未普降切恐秋禾難以布種民食堪虞朕心憂灼思過省愆無一時之暫釋朕詣暢春園問安皇太后雖慈訓屢頒寬慰朕躬而每見皇太后以天時亢旱憂形於色朕心更為不寧今日皇太后從寢宫步行至園內龍神廟䖍誠祈禱朕敬聞之下惶恐戰栗此皆朕之不德不能感召天和而纍母后焦勞至於此極為人子者實無地以自容即刻前往請安諄懇謝罪恐衆不知以為他故並諭內外臣工知之二十四年四月丁巳孟夏常雩皇上親詣行禮以天時亢旱步行致禱前三日奉諭㫖日者恭逢雩祭農民望澤正殷朕宵旰靡寧仰祈靈貺宜從抑損以𢡟寅承前詣壇齊宿所司應設法駕鹵簿一概停止視壇位拈香時服常服至翼朝由齊宫步行恭詣幄次行禮五月辛丑皇上步禱社稷壇御製祝文薦玉行禮社稷詳見門六月庚申大雩於圜丘祀前五日奉諭㫖朕躬祭方澤值祈雨之時竭誠籲懇未獲甘霖夏至已逾迫不可待後日即進宫徹膳䖍齊思過待命十一日敬舉大雩之禮以祈天祐御製祝文曰臣奉命嗣服今二十四年無嵗不憂旱今嵗甚焉曩雖失麥可望大田兹尚未種赤地里千嗚呼其惠雨乎常雩步禱未䝉靈佑方社方澤均漠弗佑為期益迫嗟萬民誰救敢辭再瀆之罪用舉大雩以申前奏嗚呼其惠雨乎上天仁愛生物為心下民有罪定宥林林百辟卿士供職惟欽此罪不在官不在民實臣罪之日深然上天豈以臣一身之故而令萬民受災害之侵嗚呼其惠雨乎謹以臣身代民請命昭昭在上言敢虛佞計窮力竭辭戅誠罄油雲沛雨居歆賜應嗚呼其惠雨乎謹告己未皇上乘馬詣齊宫齊宿正祭日戴雨纓冠素服步詣圜丘壇行禮十二十三日大雨霑足乃令直𨽻總督飭所屬有司勸種晚禾酌借牛具籽種以待秋成二十八年四月京師微旱遣官祈禱上帝太廟天神地祗社稷太嵗各壇尋得雨報祭如禮三十一年五月京師微旱遣官祈禱尋得雨報祭如禮三十五年四月癸丑常雩於圜丘定遣官省視籩豆詣壇降輦儀節諭朕祗肅明禋恭遇郊壇大祀竭誠致慎向於致祭圜丘先期敬宿齊宫必躬詣神位前升香展禮其省視籩豆臨期由禮臣請㫖或循例遣官或降㫖親蒞而朕每親詣者多今朕年屆六旬郊祀大典嵗嵗躬行即將來晉袠日髙仍當弗懈益䖍惟是儀文品節之間略宜折𠂻至當可以永逺率由行之無斁如先期赴壇時神位前允宜躬親展謁其省視籩豆應按例専遣臣工蒞事不必更請㫖至赴壇所經由道路向由昭亨門外降輦步入第步履遙逺當質明行事轉恐失儀嗣後應改由廣利門入於向時祭畢乘輦處降輦五月以京師微旱命禮部照例䖍禱又諭刑部清釐庶獄以祈雨澤臣等謹按三十六年三十九年四十年四十七年四五月間京畿偶遇雨澤愆期俱命禮部照例䖍申祈禱並清理刑獄霑足後報謝如儀四十三年四月皇上齊禱黑龍潭五月詣時應宫禱雨臣等謹按頻年以來偶遇缺雨上親詣黑龍潭時應宫䖍求輒獲甘㴻是嵗禱黑龍潭後諭禮部按例䖍祈神祗各壇五月詣時應宫䖍求并命大臣往石匣䖍禱白龍潭翊日大雨霑足各報謝如儀四十七年四月壬申常雩於圜丘諭常雩大典朕親詣行禮凡執事諸臣胥應共矢恪恭一切禮器於朕未經齊宿之先預行𣲖員周視均宜敬謹安設誠以敬天大典小心昭事之忱大小臣工所當共凛乃朕行禮時見壇內懸掛天燈僅止二盞更衣幄次所設坐褥亦不整齊夫敬天所以勤民龍見而雩典禮尤重朕古稀之年尚敬謹為民請命乃大小諸臣疏忽若此不得不嚴加懲創禮部工部太常寺官並分别降譴有差常雩禮始乾隆八年至乾隆五十年皇上親詣數次乾隆九年四月乙卯十年四月乙卯十一年四月丙子十二年四月乙丑十四年四月庚辰十五年四月丙子十七年四月戊戌十八年四月辛卯十九年四月乙酉二十年四月己酉二十一年四月辛丑二十三年四月辛酉二十四年四月丁巳二十五年四月辛巳二十六年四月丙子二十八年四月辛卯二十九年四月戊子三十年四月癸卯三十二年四月庚子三十三年四月庚申三十四年四月乙卯三十五年四月癸丑三十七年四月辛未三十八年四月甲午三十九年四月丙戌四十年四月甲申四十三年四月丁酉四十四年四月辛酉四十六年四月己酉四十七年四月壬申四十八年四月丁卯五十年四月丙戌孟夏常雩儀龍見常雩之禮嵗以孟夏即事於圜丘準冬至大祀儀祝辭曰維某年月日嗣天子臣御名敢昭告於皇天上帝曰臣恭承帝命率育寰區民為邦本深思稼穡之艱難食乃民天惟兾雨𤾉之時若用蠲吉日肅展明禋兹當龍見之期爰舉祈年之典維皇上帝鑒兹將享之誠用康兆民咸受明昭之賜俾五風十雨黍稷維馨九榖三農順成有慶奉太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝侑神尚饗祀日迎神樂奏靄平之章奠玉帛樂奏雲平之章進俎樂奏需平之章初獻樂奏霖平之章亞獻樂奏露平之章三獻樂奏霑平之章徹饌樂奏靈平之章送神樂奏霮平之章望燎樂奏霈平之章回鑾樂奏祐平之章右常雩大雩祀圜丘儀大雩之禮孟夏常雩後不雨既遍祈三復仍不雨乃諏吉修大雩禮於圜丘右諏吉既諏吉翰林院撰擬祝辭或皇帝親製祝文先期齊戒如常禮齊之日禁斷屠宰祀前一日皇帝御常服於太和殿視祝版執事官咸常服太常寺卿率屬掃除潔器陳備脯醢果實設皇天上帝神座於圜丘第一成南向設四從神位於第二成東西向皇帝詣壇齊宿常服出宫乘騎不乘輦不設鹵簿不陳樂前引後扈大臣侍衛咸常服導從午門鳴鐘不陪祀王公百官常服跪送駕至郊壇由西門入至昭亨門外降騎步行恭視壇位上香行禮如儀右減服御徹樂祀之日皇帝雨冠素服步禱於壇扈從官及陪祀執事各官咸雨冠素服恭行雩禮不燔柴不進俎不飲福受胙餘與常雩同皇上行三獻禮畢復位北向立協律郎引舞童十有六人衣元衣執羽翳進為八列典儀贊舞童歌詩贊引奏跪皇帝跪羣臣皆跪舞童乃舞皇舞按節歌御製雲漢詩八章詩見樂考歌畢引退贊引奏拜興皇帝率羣臣行三拜禮興乃徹饌送帝神望燎並如常雩之儀禮畢皇帝還宫午門鳴鐘不陪祀王公百官常服跪迎如初儀右大雩直省雩祭之禮嵗孟夏後諏吉行常雩禮祭雲雨風雷及境內山川城隍之神與春秋祀儀同詳見第七卷若間不雨及潦諏宜祀之辰撰祝文備牲器守土大吏率屬素服䖍禱為民請命行禮儀節與常祀同既應而報則朝服將事禮與祈祀同各府州縣雩若祈報均同省㑹右直省雩祭祈報皇朝文獻通考卷九十六
