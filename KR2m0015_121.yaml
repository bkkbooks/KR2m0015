文鏡遺疏入優加典禮並諭田文鏡在豫年久化導民俗積貯倉糧豫民深蒙其福著於開封府城內建立專祠春秋展祀乾隆四年十一月辛未敕祀大學士嵇曽筠於河工時奉皇上諭故大學士嵇曽筠前任江南河道總督悉心籌畫殫力宣防叠䝉皇考褒嘉至今河渠受益查從前河工靳輔齊蘇勒俱建祠永祀而嵇曽筠勞績實可嫓美兩人著照靳輔齊蘇勒例一體祠祀以示優奬以慰輿情十六年四月辛未敕建雙忠祠是日諭禮部駐藏大臣等奏朱爾墨特那木扎爾自立名號潛遣其心腹堅參扎錫等通欵凖噶爾稱䇿旺多爾濟那木札爾為汗且求其發兵至拉達克地方以為聲援幸值凖夷內潰所遣使人回藏被獲得其逆書並餽獻諸物是其隂蓄異志勾結凖夷罪不容誅設非都統傅清左都御史拉布敦協力同心决計先發則其貽害藏地將不可言是二臣之心甚苦而有功於國家甚大應特建雙忠祠合祀二人春秋致祭丕昭勸忠令典傅清既有專祠著不必從祀家廟尋遵㫖㑹同內務府營度建祠於崇文門之內每嵗春秋仲月遣官行禮御製雙忠祠詩勒碑祠中乾隆十五年駐藏都統傅清左都御史拉布敦誅叛臣朱爾墨特那木扎爾其黨羅藏扎什率兵助逆二臣死焉贈以伯爵優恤而歸其喪于京師親臨奠醊建專祠祀之命曰雙忠並紀以詩衛藏西南夷極邊入我王化百餘年始猶羈縻後執賮置兵為守防呼韓雍正年間始命大臣駐彼率緑旗兵防守凖噶爾蒙古習俗尚黃教得失視此為轉旋其何小醜背厚澤夜郎自大輕王臣托詞承平勞物力示之大信休兵屯戕兄虐下遂無忌更與外賊為牽援血人于牙攫財賄中梗驛路軍書傳朱爾墨特那木扎爾乃頗羅奈之子朕以其父勤勞頗能安輯疆土封為郡王後頗羅奈故伊襲其父王爵即詭詞請撤駐藏官兵因念彼既以撤兵為請即不從適足以致其疑故如其請自此肆無顧忌戕其兄及姪荼毒所部遣使通凖夷求援旋斷絶郵置軍書不達者旬日二臣覘其逆謀已露遂决計先事誅之惟時奉命監彼土曰傅清暨拉布敦目覩賊勢日猖獗炎炎不熄將燎原戰守不可兵力弱官軍萬里阻蜀門國事為重餘度外二人同心利斷金叶知無一生有九死但期濟事酬深恩朱爾墨特那木扎汝來示汝大義存天無二日爾二日爾忘爾父叨藩翰凶渠稔禍力已張去聲藐視二人何有焉籠中之鳥砧上魚西藏指日據有全挺身來見忽疑慮潛呼羣醜施戈鋋傅卿直前扼其臂逆王命者誅無延拉卿拔刀剚其脰罪在魁首無牽連羅藏扎什其羽翼走險呌詉豕突然桀犬吠堯各為主蜂屯蟻聚來獽狿吁嘻二臣力不逮如歸視死雙軀捐小醜烏合旋就縳駢首就戮長竿懸逆誅順撫妖氛靖衛藏萬衆如一言忠臣報主有如此智勇兼濟誠通天昔每椎心今吐氣如披雲霧瞻蒼旻不勞一旅翦渠冦豈止萬衆免沉淪尸祝社祭衆夙志䖍伸絶域千秋傳靈輿肅肅歸故里建祠臨奠思頻宣錫爵賜封延後世志豫哀悼旌勳賢雙忠之氣浩千古雙忠之力敵萬軍罵賊有似奮常山誘致大異斬樓蘭雙忠蹟略傳斯篇他年以待信史編祭雙忠祠儀嵗春秋仲月遣官一人將事是日太常寺官具祝版備器陳龕位前統設一案陳羊一豕一果實五盤爐鐙具設案於祠內正中少東供祝版東設一案陳素帛二香盤一尊一爵六設洗於東階下之南承祭官拜位在香案前正中司祝司香司帛司爵典儀掌燎各以其職為位質明承祭官朝服詣祠行禮儀節與祭昭忠祠同祝辭曰維某年月日皇帝遣某官某諭祭於襄烈伯傅清壯果伯拉布敦之靈曰臣子效匪躬之節報禮斯隆國家昭異數之恩褒忠罔替既旗常之永勒宜爼豆之世延惓撫流光長懷往績爾襄烈伯傅清壯果伯拉布敦共矢精誠同宣義烈捐生絶塞已銘殊績於鐘鏞晉爵崇階用妥貞魂于廟食兹當春秋仲爰命祠官載考彞章聿修秩祀馨香申薦歷日月以如新琬琰揚芳與河山而共久爾靈不昧尚克歆承臣等謹按雙忠之敕祠恤爵以駐藏而翦逆捐軀有合於祀典以死勤事之義仰邀賜詩崇奬忠績光垂穹壤矣繼此則乾隆二十一年平定伊犁定北將軍班第議政大臣鄂容安之錫名雙烈二十四年平定回部靖逆將軍納木扎爾參贊大臣三泰之錫名雙義均荷宸章褒錫紀其事而第其功蓋天威逺暢拓土開疆而優恤仗烈殉義之臣以示風厲迄今嵗時祠祀其地沭睿藻以揚名爰繼雙忠恭載雙烈雙義二詩用志緣起御製雙烈詩雙烈詩者例雙忠詩而作也昔駐藏都統傅清左都御史拉布敦誅叛臣朱爾墨特納木扎爾以人少力微二臣死事然究能鋤元凶而安絶域故臨奠建祠並有雙忠之詩以揚其勳去嵗命定北將軍班第議政大臣鄂容安駐伊犁時二臣既奏阿睦爾撒納有反志朕命便宜從事庶幾銷患未然乃二臣觀望疑慮以致脫而賊黨反得結連赴約襲我軍營二臣力不能敵捐軀沙場猶之死王事也一以勇决建績一以徘徊僨事然而臨難致命奮不顧身有足哀者今大兵既靖伊犁逆賊窮促逃竄不日獻俘二臣靈輿至京之日朕亦親臨醊奠並成是作雙烈云者蓋不如雙忠之盡善矣昔有傅介子手斬樓蘭頭通權建殊績芳名播千秋况乎統三軍既悉彼逆酋一武夫之力何事仍夷猶逡巡大軍徹偏師五百留彼梟有密約入覲中逗遛八月草五日三處共一謀阿睦爾撒納來阿爾台陬將合其部衆挈妻孥以逃是則預有旨其妻孥盡收厥阿巴噶斯斷我軍書郵克什木巴朗伊犁逞劫偷兩路如期發猖狂肆呌詉蜂屯更蟻集不可爬與梳二臣知不敵全軍將內投而彼集歸路加以聚蚍蜉巴朗諜致辭權假為我逑徐當備馬駝送之返皇州二臣怒唾罵天朝無此偷效死視如歸背義生肯求奮旅更前進氣髮衝兜鍪終知事不濟畢命飲屬鏤問罪重整師豈辭雪載途阿睦爾撒納叛後向謂事難成者皆以為不出所料伊犁卒不能平朕料叛賊隂險多詐其得在此其失亦在此伊犁之衆不過一時附和終不能人盡從彼若少延緩則叛賊又將别生變詐反失事機因正永常恇怯退師之罰急趣西路軍帥剋期進勦旋於今春直達伊犁逆賊失據奔竄旋復定伊犁脅從寬厥尤一二助惡者謂阿巴噶斯克什木之流繫虜皆䖍劉渠魁竄異域王師奮遐搜亦聞哈薩克縳獻深同讐命求二臣骨靈輿返首邱臨奠例雙忠惜哉淚湧流初若聽我言寧有今日不忠於國有濟烈惟已不渝究匪貪生比使我悲心悠朱門歌舞輩青史文章儔我豈為彼哉長歌旌乃休御製雙義詩副將軍富德至葉爾竒木既定回城痛去嵗將士之沒於王事暴骨沙場為之築墳表墓因以奏聞蓋隨將軍兆惠力守者固已無恙而旁出捉生及在途值賊者猝至捐軀實出逆料時則納木扎爾三泰適以奉差而往遇難而殉此雙義之詩所由作也夫雙忠戡亂於無形雙烈表節於有北今之雙義亦復炳然此皆我八旗世臣與國同休戚者在諸人含笑九泉已知世祿之必被而朕捫心午夜奚啻手足之如傷用兵既非得已盡節豈所樂聞且即此役而言非生擒二酋何以雪我三軍之恨哉然既建大業寧免微疵即走卒厮養頗切同仇則知我國家豢養旗人萬年鞏固之基而非周秦漢唐一興兵而天下驛騷怨聲載道者比此又朕所深慶幸者夫雙忠昔集事雙烈能忘身兹作雙義詩其故得細陳曰納木扎爾曽贊北路軍奮勇翦逆賊封伯酬其勳納木扎爾先以都統參贊北路軍務曽擒喀爾喀叛逆青滚雜卜論功加封伯爵副都統三泰英氣頗超人均御前侍衛素悉厥忠純兆惠富德輩從戎久效勤欲代俾將母將軍兆惠富德母俱年髙比嵗領軍討賊故特簡二臣往代之二臣被選掄去嵗黑水役固守遣索倫致信愛隆阿權退催後援可支百日間速進莫逡巡將軍兆惠等猝被賊遮時愛隆阿拒河駐後將軍兆惠自圍中遣索倫二人問道傳語大兵未集可速回阿克蘇俟後軍一齊進援將軍及參贊輕進徒具焚當待師並來何慮狂狙狺時授納木扎爾為靖逆將軍三泰為參贊大臣之信兆惠已知之故亦令暫回以俟後軍爾時二臣者馳驛往軍門過愛隆阿營却近黑水濵所遣人未遇炮聲前忽聞知賊與我戰聞戰恥退奔徒攜百餘騎赴義命同捐凶信驛遞來痛淚傷心魂使早知拒守退俟熊羆羣同進可樹功何致均沉淪即先至一日合兆惠軍屯亦可旋今嵗奚煩以身殉不前復不後此實若有神富德自和闐重至黑水津葉爾竒木降諸事粗處分痛念我將士沙場化為燐黃頭雖不備掩骼權為墳猿鶴昔屬幻邱隴今可循因以此事奏西望揮淚頻豐碑旌墓門千秋西海垠捐軀固臣節在爾非所論在豫則何忍此恨終當伸夷考六人蹟事異心同均與國休戚共寧止曰藎臣史筆多訛傳永言傳其真十九年九月甲午敕建盛京賢王祠是日諭朕由吉林至盛京周覽山川形勝敬稽實録所載仰見列祖締造艱難維時宗室諸王克奮忠勤功成百戰開國翊運之勳彪炳簡册深切景念思盛京為龍興重地國初諸王功烈懋著如此並宜建祠以酬舊勳而示來許此地現有怡親王祠應將太廟配享之通達郡王慧哲郡王宣獻郡王及禮烈親王饒餘親王鄭簡親王潁毅親王一併崇祀即命曰賢王祠令所司春秋致祭應行典禮該部詳議以聞祠內碑文可移於正中鐫勒此旨永昭我朝宗功元祀之巨典祭賢王祠儀正殿設三案中案奉通達郡王雅爾哈齊武功郡王禮敦慧哲郡王額爾衮左案奉宣獻郡王界堪禮烈親王代善饒餘親王阿巴泰右案奉鄭簡親王濟爾阿朗潁毅親王薩哈亷怡賢親王允祥均南向每案羊一豕一果實五盤爐鐙具殿中少東設案一陳祝文東設案一陳尊九素帛九爵二十有七嵗春秋季月以奉天府尹承祭讀祝贊禮暨執事官以盛京禮部贊禮郎充餘行禮儀節均與祭京師賢良祠同祝詞曰維某年月日皇帝遣某官某諭祭於通達郡王武功郡王慧哲郡王宣獻郡王禮烈親王饒餘親王鄭簡親王潁毅親王怡賢親王之靈曰功推元祀懿親光翊贊之勳禮重專祠時祭稱褒崇之典溯謨猷而長在申禋祀以彌加惟王等川嶽鍾英親賢備美當列聖開基之日丕奮忠勤緬舊邦佐命之勞遹昭來許恩垂帶礪既錫祉於銀潢績煥旗常亦揚芬於玉册新祠肇建懿典攸崇褒德酬庸篤念風雲之㑹感時撫序式憑爼豆之馨兹以仲春秋用申告祭靈其不昧尚克歆承二十二年二月丁卯敕祠大學士內大臣髙斌於河工是日諭原任大學士內大臣髙斌前任河道總督時頗著勞績即如毛城鋪所以分泄黃流髙斌設立徐州水志至七尺方開後人不用其法遂致黃弱沙淤隱貽河患其於黃河兩岸汕刷支河每嵗冬季必督率㕔汛實力填築近年司工疏忽因有孫家集奪溜之事至三滚壩泄洪湖盛漲髙斌堅持堵閉是以數年之間下游州縣屢獲豐收其功在生民自不可泯至於癸酉張家馬路及運河二閘之決則又其果於自信抑且年邁志滿之失朕不得不治其罪而要其瑕瑜自不相掩在本朝河臣中即不能如靳輔而較齊蘇勒嵇曽筠朕以為有過之無不及也兹者翠華南幸追溯前勞特沛恩綸用孚公論可與靳輔齊蘇勒嵇曽筠一併祠祀以昭國家念舊酬庸之典且亦使後之司務者知所激勸也該部其遵諭行二十二年二月戊辰敕祠明臣潘季馴於清江浦是日諭昨以內大臣髙斌前在南河懋著勞績特頒恩諭令與靳輔齊蘇勒嵇曽筠一同祠祀更念有明一代治河之臣最著者惟陳瑄潘季馴二人而季馴之功實優於瑄運道民生至今攸賴今清江之湄瑄有專祠季馴獨不列祀典朕甚憫焉其以潘季馴與陳瑄並祀春秋致祭以昭崇德報功之典三十三年二月敕建旌勇祠時奉諭將軍公明瑞夙秉忠誠歷著勳績昨命統兵進勦緬匪明瑞身先士卒屢挫賊鋒乃以懸軍深入而額爾登額等有心逗留後援不繼因於猛臘地方保護諸軍身留殿後衝冒矢石以致受傷身殞已降旨加恩優恤並入祀昭忠祠以酬忠勳從前駐藏大臣傅清拉布敦鋤凶死事曽敕建雙忠祠秩在祀典兹明瑞勤事捐軀義烈尤堪嘉尚著循前例于京師特建專祠舉行嵗祀其先後陳亡之都統扎拉豐阿護軍統領觀音保總兵李全王玉廷均豫入祀用慰忠魂所有應錫祠名及建祠事宜各該衙門察例具奏尋議凖建祠於地安門外之西錫名曰旌勇正室三間東西廡各三間室內三龕中奉一等誠嘉毅勇公諡果烈明瑞左奉都統諡昭節扎拉豐阿總兵李全右奉護軍統領觀音保總兵王玉廷嵗以春秋仲月諏吉遣官致祭祭文曰維某年月日皇帝遣某官某諭祭於原任雲貴總督將軍兵部尚書一等誠嘉毅勇公明瑞之靈曰戎行致果英風永播於光陬巨典褒忠靈祀聿標乎綽楔惟折衝以並奮斯妥侑之宜崇用建朱甍式彰丹悃爾明瑞簪纓世胄韜略雄才葱嶺雪山早嵗樹從戎之績金符玉節頻年抒綏逺之謨西陲久著夫威名南土仍資其䇿馭權兼九伐並加司馬之官階地控三宣爰建將軍之幕府瘴江築壘擁楯先登石壁橫梁揚旌竟渡堅摧象陳盡收蠻結之糧影息蜂屯逺致波龍之使佇看羆虎早殄鯨鯢猥因别隊之紆程遂致大兵之乏援轉戰經四五旬之久懸軍歷數千里而遙連營之士氣猶强身親斷後極徼之將星忽落計絶遄歸惟時師武之臣共勵疆場之節爾都統扎拉豐阿護軍統領觀音保總兵李全王玉廷等心甘鋒鏑競效命以爭先感動旌旄遂捐身而不惜分鋭師於兩路未竟成謀嫓義烈于雙忠宜隆秩祀嗚呼崔嵬棟角九章之賜服空懸穆肅几筵奕世之垂名勿替雲臺烟閣畫圖傳颯爽之姿電馬颷車笳鼓振精靈之氣歆兹俎豆賁爾鼎鐘三十四年命以總兵官德福入祀旌勇祠時隨大學士公傅恆擊賊於老官屯受傷陳亡照例賞恤四十一年正月己卯詔以前明建文崇禎時殉難諸臣入祀忠義祠先是四十年十一月癸未奉諭旨崇奬忠貞所以風勵臣節然自昔纍朝嬗代凡勝國死事之臣罕有録豫易名者惟我世祖章皇帝定鼎之初於崇禎末殉難之大學士范景文等二十人特恩賜諡仰見聖度如天軫恤遺忠實為亘古曠典第當時僅徴據傳聞未暇遍為搜訪故得邀表章者只有此數逮久而遺事漸彰復經論定今明史所載可按而知也至若史可法之支撑殘局力矢孤忠終蹈一死以殉又如劉宗周黃道周之立朝謇諤抵觸僉壬及遭際時艱臨危授命均足稱一代完人為褒揚所當及其他或死守城池或身殞行陳與夫俘擒駢戮視死如歸者爾時王旅徂征自不得不申法令以明順逆而事後平情而論若而人者皆無愧於疾風徑草即自盡以全名節其心亦並可矜憐雖福王不過倉猝偏安唐桂二王並且流離竄跡已不復成其為國而諸人茹苦相從舍生取義各能忠於所事亦豈可令其湮沒不彰自宜稽考史書一體旌諡其或諸生韋布及不知姓名之流並能慷慨輕生者議諡固難於概及亦當令俎豆其鄉以昭軫慰嘗恭讀太祖實録載薩爾滸之戰明楊鎬等集兵二十餘萬四路分出侵我興京我太祖太宗及貝勒大臣等統徑旅數千殱僇明兵過半一時良將如劉綎杜松等皆沒于陳近曽親製書事一篇用揚祖烈而示傳信惟時王業肇基其抗我顔行原當多為獮剃然跡其冒鏑攖鋒竭忠效命未嘗不為嘉憫又若明社將移孫承宗盧象升等之抵拒王師身膏原野而周遇吉蔡懋德孫傳廷等以闖獻蹂躪禦敵亡身凛凛猶有生氣朕惟以大公至正為衡凡明季盡節諸臣既能為國抒忠優奬實同一視所有應諡諸人並查明史及輯覽所載遵照世祖時之例仍其原官豫以諡號其如何分别定諡之處著大學士九卿翰詹科道集議以聞至是又奉諭旨前以明季殉難諸臣各為其主義烈可嘉令查明錫諡冀以褒闡忠良風示來兹復念建文革除之際其臣之仗節死難者史册所載甚多當時永樂位本藩臣乃犯順稱兵隂謀圖國諸人自當義不戴天雖齊泰黃子澄等輕率寡謀方孝孺識見迂疏未足輔助少主然跡其尊主鋤强之心實堪共諒及大勢已去猶且募旅圖存抗詞抵斥雖隕身湛族百折不回洵為無慚名教者其他若景清鐵鉉者或慷慨捐軀或從容就義雖致命不同而志節凛然皆可謂克明大義甚至如東湖樵夫補鍋匠之流雖姓名隱晦不彰其心均足嘉尚特以永樂性成殘刻逞志淫刑其屠戮之慘極於瓜蔓牽連殆非人理朕讀史至此未嘗不深為憤恨逮其中葉雖少弛厲禁而彼時臣子徇私曲諱終不肯顯示褒揚使忠臣義士之氣久弗獲伸殊堪憫惻夫以勝國革命之時其抗我顔行者尚念其忠於所事特豫表章矧建文諸臣不幸遭遘內難為主捐生成仁取義豈可令其湮沒自當一體議諡以發幽光而昭公道其應如何分别豫諡著同前旨交大學士等一併詳查集議具奏嗣大學士等議覆奉諭旨大學士等將明末並建文殉節諸臣核查悉按史乘擬豫專諡通諡及應入祀忠義祠者分册具奏甚為允協著照所議行其進呈各册於姓名事實摘具梗槩頗為詳備著名勝朝殉難諸臣録交武英殿刋刻頒行以垂示久逺臣等謹按大學士等遵㫖查覆建文時殉難諸臣專諡者七人通諡者九十九人無諡職官十六人士民十三人崇禎時殉難諸臣專諡者二十六人通諡者一千六百四十一人無諡職官四百九十五人士民一千四百八十六人其姓氏事跡具詳勝國殉難諸臣録中並皆仰邀軫恤入祀其鄉忠義祠煌煌聖訓至大至仁使忠臣義士之氣久而獲伸考古史册所載凡勝國死事之臣罕有録豫褒恤者我皇上仰體列祖軫念遺忠至意概為表章雖樵夫鍋匠咸得留芳簡册湛恩汪濊勿濫勿遺寧惟是異代忠魂感荷殊榮共深銜結於地下已哉皇朝文獻通考卷一百二十一
