body:
  text: 欽定四庫全書皇朝文獻通考卷一百二十一羣廟考三諸臣祠順治十四年十月己丑敕建忠節祠先是九年十一月庚寅湖廣辰常總兵官左都督徐勇與黔冦白文選戰敗死之至是世祖章皇帝褒其忠節令建祠祀之康熙二十一年十一月己丑敕建雙忠祠時廣西巡撫郝浴請建祠祀殉難廣西巡撫馬雄鎮撫蠻滅冦將軍廣西巡撫傅宏烈從之三十四年七月敕建浙閩總督贈太子少保諡忠貞范承謨祠福建巡海道贈工部侍郎諡忠毅陳啓泰祠時福建巡撫卞永譽言浙閩總督范承謨當耿逆之變幽羈三載自縊殞身巡海道陳啓泰矢守孤城從容自經皆已䝉贈諡今士民皆請立祠致祭得㫖允行三十五年四月乙未敕建福寧總兵官吳萬福福州府知府王之儀邵武府知府張瑞午江西建昌府知府高天爵建寧府同知喻三畏邵武府同知高舉侯官縣知縣劉嘉猷龍溪縣知縣李塤福州城守營千總廖有功等祠時禮部議覆福建巡撫卞永譽疏耿逆叛亂之時諸臣守節殉難請建公祠致祭應如所請從之四十七年十二月命以嵇永仁王龍光沈天成范承譜入祀范承謨祠時禮部議覆廣東巡撫范時崇疏耿逆之變隨臣父范承謨殉難者五十餘人內生員嵇永仁王龍光儒士沈天成及臣族叔范承譜俱偕臣父幽囚三載殉難死節仰祈特沛綸恩豫以一命陪祀臣父祠以慰忠魂查生員嵇永仁王龍光應照例追贈國子監助教沈天成范承譜雖庶民無追贈例但殉難死節風烈可嘉應酌量追贈國子監學正並准其入祠從之五十七年十月壬戌敕建雲貴總督甘文焜山西汾州府知府黃廷柏祠時禮部議覆故雲南貴州總督甘文焜值逆賊吳三桂之變不屈殉節故山西汾州府知府黃廷柏值逆賊姜瓖叛亂罵賊殉節應各建祠本處載入祀典從之雍正元年九月辛巳敕建八旗左右翼直省府州縣衛忠義孝弟祠節孝祠是日世宗憲皇帝諭旌表節義給銀建坊民間往往視為具文未曽建立恐日久仍至泯沒不能使民間有所觀感著於學宫內建忠義孝弟祠一所立石碑一道於學宫近處購買基址建節孝祠一所立大牌坊一座其石碑牌坊將先後忠孝節義之人悉標姓名於其上已故者設牌位於祠中春秋祭祀用闡幽光以垂永久尋議准行令所在各建忠義孝弟祠一建節孝祠一嵗春秋以守土官致祭祭忠義孝弟祠節孝祠儀屆期清晨廟户啓祠門拂拭神案執事人入陳羊一豕一籩四豆四爐一鐙二陳祝文於案左陳壺一爵三帛一香盤一於案右引贊二人引主祭官入詣案前北面立禮生自右奉香盤主祭官三上香訖引贊官贊跪叩興主祭官跪三叩興禮生自右授帛主祭官受帛拱舉仍授禮生獻於案上禮生挈壺酌酒實爵自右跪授爵主祭官受爵拱舉仍授禮生興獻於正中讀祝者取祝文跪案左引贊贊跪主祭官跪讀祝辭曰維某年月日某官某致祭於忠義孝弟之靈曰惟靈禀質貞純躬行篤實忠誠奮發貫金石而不渝義問宣昭表鄉閭而共式祗事懋彝倫之大性縶莪蒿克恭念天顯之親情殷棣萼模楷咸推夫懿德綸恩特闡其幽光祠宇維隆嵗時式祀用陳尊簋來格几筵尚饗讀畢以祝文復於案退主祭官俯伏興執事者酌酒獻於左又酌酒獻於右退引贊贊跪叩興主祭官跪三叩興執事者以祝帛送燎引贊引主祭官出執事者徹皆退節孝祠儀同祝詞曰維某年月日某官某致祭於節孝之靈曰維靈純心皎潔令德柔嘉矢志完貞全閨中之亮節竭誠致敬彰閫內之芳型茹氷蘖而彌堅清操自勵奉盤匜而匪懈篤孝傳徽絲綸特沛乎殊恩祠宇昭垂於令典祗循嵗祀式薦尊醪尚饗臣等謹按舊制直省府州縣衛儒學左右皆建有忠義節孝名宦鄉賢四祠嵗春秋丁祭禮畢教諭一人公服詣祠致祭今名宦祠鄉賢祠祭品與行禮儀節均如前其祭文則所在各異臣等再按馬端臨所載祀先代帝王賢臣其於孝婦烈女固以類及而書入我朝節婦貞女著聞里巷比屋而有列聖禮教之孚行實超前古我皇上慎重名器既令直省督撫核實節孝之祀並諄諭名宦鄉賢之難其人所為維風化示觀型典至隆意至切矣雍正二年十月癸未敕建昭忠祠是日世宗憲皇帝諭九卿翰詹科道朕惟周禮有司勳之官凡有功者書名太常祭於大蒸祭法曰以死勤事則祀之凡以崇德報功風勵忠節也太祖髙皇帝肇造鴻圖太宗文皇帝式廓區夏世祖章皇帝奄有萬邦自創業以至定鼎將帥之臣致命立功者不少聖祖仁皇帝臨御六十一年中間殱滅三逆永清朔漠以及平定西藏臺灣雖天戈所指如疾風振槁而師旅臣之捐軀馬革及守土官之見危授命者所在多有邇者青海蕩平西域效順然自用兵以來將士奮勇前驅亦有殁於行陳者此皆盡忠報國之臣朕甚嘉之亦甚憫之當於京城建立祠廟春秋妥侑其偏禆士卒力戰敵愾舍生取義者亦附列左右用以褒崇大節揚表芳徽俾逺近觀聽勃然生忠義之心於治道亦有禆益仍令翰林官纂其籍貫事蹟各為立傳彚成一編垂諸永久爾等悉心詳議具奏尋議覆凡文武諸臣臨陳捐軀守土授命及偏禆士卒赤心報國奮不顧身者令兵部查案行八旗直省將籍貫事蹟繕册具奏工部於崇文門內度地建祠正殿九間南嚮左右序各七間東西屋各五間屋南東西廡各三間殿後正室五間東西正屋各三間左右配房各五間東西羣房各三間至六年工竣欽定曰昭忠祠錫額表奬忠勳恭懸正殿七年禮部㑹同工部太常寺堂官將王公大臣官員兵丁牌位按次安設前大殿正中奉和碩敬謹莊親王尼堪英誠武勳王揚古利定南武壯王孔有德追贈忠勇王黃芳度武襄公巴爾堪五人東次龕奉一等公安北將軍忠勇佟國綱贈太師一等公忠烈佟養正散秩大臣一等公達福一等公領侍衛內大臣西哈一等侯諡襄武馬得功贈三等侯巴什太一等伯諡武壯宜理布贈二等伯巴都里一等伯程尼三等伯穆和琳大學士張泰贈一等伯議政大臣羅沙太子少保三等伯諡忠毅王之鼎贈太子少保福建總督諡忠貞范承謨額駙托柏大學士龍西大學士色思泰湖廣總督諡忠勇額倫特副將軍查弼納內大臣兵部尚書圖捫贈大學士佟濟倉場總督王秉仁贈太子太師兵部尚書諡忠毅傅宏烈二等子都統博波圖大臣長史諡襄壯雅賚刑部尚書道禪工部尚書名蓋參贊內大臣馬爾薩共二十八人西次龕奉續順公沈瑞輔國公諡襄愍巴賽大學士諡忠愍莫洛禮部尚書布顔岱十六大臣管佐領綽和諾湖北巡撫柯永升都統沙里布贈太子少保巡撫諡文毅馬雄鎮雲貴總督諡忠果甘文焜兩廣總督佟養甲禮部侍郎朝哈爾贈禮部尚書諡忠烈髙天爵贈工部侍郎費揚古贈三等子圖魯錫贈三等男喀爾他拉護軍統領喀爾護吉副都統海蘭蘇圖前鋒統領胡里布護軍統領哈克三葉喜侍郎永國護軍統領阿爾岱湖廣提督孫定遼二十四人東又次龕奉前鋒統領劉哈副都統盧錫科普蘇阿喀倪納爾特錫密賚科爾坤多頗洛戴豪渾錦魏正羅濟阿什圖覺羅阿克善常祿阿爾護吉三巴雅思虎朗十八人西又次龕奉福建提督段應舉副都統穆舒孟魁副都統白闕巡撫賈維鑰副都統邁圖葛思特雲南巡撫朱國治右副都御史張文衡刑部侍郎馬如璧工部侍郎諡忠節葉映榴巡海道諡忠毅陳啓泰通政使莫洛渾一等子穆克覃阿納達代音布通政使陳丹赤一等子覺羅莫洛渾十八人東稍龕奉贈左都督總兵官諡忠愍吳萬福總兵官諡忠勇徐勇賈雅達總兵官諡忠壯朱天貴張存福都督僉事洪徴總兵官諡忠武阿爾泰歐陽凱贈光祿寺卿李懋祖總兵官楊佐贈雲騎尉張廷輔贈總兵官楊光祖前鋒統領定壽總兵官王承業三等子錫喇巴江西布政使司遲變龍十六人西稍龕奉護軍統領郭色新泰提督諡壯勇康泰二等子覺羅顧納岱贈都督同知司九經二等子拜蘭總兵官郝效忠劉良臣三等子巴郎都爾莽鼐贈左都督楊三虎都督同知趙登舉贈提督紀法贈總兵官甘應龍贈右都督蔡龍二等子拜三一等男路什總兵官康海十七人後正室奉備禦尼馬禪等一百十有五人左次龕奉護軍參領倭赫等七十人右次龕奉一等輕車都尉季普哈達等八十人左又次龕奉參將劉衍等四十五人右又次龕奉二等輕車都尉莽儀祿等四十人東配樓奉贈雲騎尉七品官覺羅星德等四百三十七人西配樓奉贈雲騎尉護軍校雅思哈等四百五十八人東廡奉三等輕車都尉赫爾德等一百八十八人西廡奉守備劉澤久等一百二十八人東西房祔祀兵丁共一萬三百有七人自是每嵗春秋二祭遣官行禮世宗憲皇帝御製昭忠祠碑文朕惟疆場用命因敵愾以效忠行陳爭先值臨危而殉節追尋壯槩殊切軫懷載建豐碑用光崇祀爾和碩敬謹親王尼堪等賦資雄毅秉性堅貞均際會於從龍各圖功於汗馬我國家蕩平區㝢命上將以專征綏靖邊陲張王師而撻伐戈鋋所向旋見廓清貔虎前驅一惟奮勇或氣凌徑敵縱橫萬衆之中或志鋭先登出入重圍之內王公將帥既赴義以如歸禆校卒徒亦銜恩而自矢勵致身之素志蹈刃何辭耿報國之丹誠嬰鋒不顧芳名常著摛文宜付於史官英爽猶生勤事允符於祀典乃者構成棟宇羅設几筵考厥官資定其位次握麾擁節並肹蠁於一堂擐甲荷殳得從班於兩廡懸之巨榜表厥忠勳錫以綸章昭兹節烈於戲華楹敞朗長回日月之輝雕琰嵯峨永壯風雲之色聿傳久逺式載寵榮乾隆十三年以總兵官任舉贈雲騎尉三等侍衛丹泰入祀十四年以副將買國良參將李成邦守備梁士偉等四十人馬步兵丁二千三百二十八人入祀又以逰擊孟臣等五十六人馬步兵一千五百十有三人入祀十五年以駐藏都統贈一等伯諡襄烈傅清左都御史贈一等伯諡壯果拉布敦入祀十八年議准前殿正龕內武襄公巴爾堪西第一龕內輔國公巴賽皆追封簡親王巴爾堪應改題封號位於英誠武勳王揚古利之上巴賽應改題封號入中龕位於定南武壯王孔有德之上前室左右各三龕祀公侯至二三品官向以爵秩尊卑為序不論時代先後應自天命年以來按代序官同代同官則序年月再前室內有贈襲公侯伯子男世爵而官兼尚書都統侍郎副都統者有任尚書都統等官而世爵不及五等者亦有贈襲世爵而别無兼銜者更有官爵本小以子孫貴顯追封加大者位次最難應照賢良祠按代敘官例公侯伯大學士內大臣尚書都統將軍總督一品子爵前鋒統領護軍統領侍郎巡撫副都統二品男爵三品京卿提督總兵官武職加贈至正從一品等官依序列前室其四品卿翰林院學士藩臬一等侍衛參領輕車都尉武職二品之副將等官列後正室五品少卿二等侍衛道府佐領騎都尉武職三品之參將逰擊等官列後左室講讀御史部員三等侍衛雲騎尉武職四品之都司等官列後右室同知知州通判驍騎校等武職五品之守備等官列前東配室知縣筆帖式州同縣佐以下武職六七品之千把總等官列前西配室均按時代官爵為序庶位次秩然而忠義之靈益昭妥侑至兵丁位前後廡共八處應將各龕皆以橫板隔别次第安設二十一年以義烈公班第剛烈伯鄂容安佐領薩積圖三人入祀二十二年以副台吉孫都布等二十五人入祀又以參領扎布等官兵五百三十人入祀二十三年詔即翰林院開館令翰林院官統輯昭忠祠前後諸功臣事蹟各為立傳歷嵗纂撰天命年天聰年崇德年順治年康熙年雍正年諸臣是為初編皇上乾隆元年以來諸臣為二編二十三年以都統滿福等官兵三百六十六人入祀二十四年以驍騎校老格等官兵七百九人入祀二十五年以參領科木布薩等官兵二百五十六人入祀二