  text: 輿地考十三湖南省臣等謹按禹貢荆州先之以江漢朝宗而即繼之九江孔殷水經謂九江在長沙下雋縣西北楚地記謂巴陵瀟湘之淵在九江之間至宋儒胡旦及朱子等皆以為即洞庭湖蓋長江為四瀆之長古稱天塹實當今之湖北境洞庭為五湖之長古稱天險實當今之湖南境必九江治而後荆之全境始底於作乂湖南與湖北之並為要地也久矣漢時荆州刺史治漢夀即在湖南常德府劉宋以後湘州與荆郢諸州往往分治至唐廣德初於荆南節度之外分置湖南觀察使以領諸州嗣後宋分湖南北為兩路元分湖南北為兩道明代雖總𨽻於湖廣布政使司而萬厯年間仍别置偏沅巡撫至本朝康熙三年遂定湖南與湖北為兩省蓋荆楚之間幅員最廣畫疆而理固撫馭之道然也抑又論之禹貢荆州以衡陽為南界其時衡山左右錯處諸蠻已非內地王制所謂南不盡衡山者也殷周之時荆蠻漸為邊患屢加征伐逮楚悼王南并蠻越遂有洞庭蒼梧之地秦昭王伐楚略定蠻夷置黔中郡此湖南之始通歟漢興稍增置州郡而長沙五溪諸蠻時起為冦唐宋以後若猺若獠之屬猶未能使之盡遵約束我朝德教流行若永順一府及乾州永綏鳳凰營諸㕔並以生苗內附列於郡縣斯固古昔盛王所鄙為化外之民甚且以為是膺懲者今且俗易風移無不共歸休養聖化之覃敷又寧有涯量哉湖南明湖廣布政使司共領府十五州二其長沙嶽州常德衡州永州寶慶辰州七府靖郴二州為今湖南省地又置都指揮使司領長沙等衛澧州等千戶所及各宣慰宣撫等司萬厯二十八年始置偏沅巡撫治偏橋鎮本朝初為湖廣省康熙三年分湖廣右布政使司駐長沙又增置按察使司並移偏沅巡撫駐長沙府分領長沙嶽州等七府及郴靖二州六年改右布政為湖南布政使司雍正二年改偏沅巡撫為湖南巡撫七年改永順土司為永順府升澧州為直𨽻州八年升沅州為直𨽻州十年升桂陽州為直𨽻州乾隆元年升沅州為府凡領府九直𨽻州四各衛所以次裁併入州縣其存者專司漕運不治民事東西距一千四百二十里南北距一千一百五十里東至江西南昌府寧州界二百八十五里西至貴州銅仁府銅仁縣界一千一百三十五里南至廣東連州界七百六十五里北至湖北荆州府監利縣界三百八十五里東南至廣東韶州府仁化縣界七百九十里西南至廣西平樂府恭城縣界九百五十五里東北至湖北武昌府通城縣界六百四十里西北至四川酉陽州界九百里在京師西南四千五百五十里長沙府為省治東西距一千里南北距五百九十里東至江西袁州府宜春縣界三百五十里西至常德府沅江縣界六百五十里南至衡州府衡山縣界二百三十里北至嶽州府巴陵縣界三百六十里東南至江西吉安府永新縣界五百三十里西南至寶慶府新化縣界三百八十里東北至江西南昌府寧州界二百八十里西北至常德府沅江縣界二百里自府治至京師四千五百五十里明初改為潭州府洪武五年改為長沙府本朝初屬湖廣省康熙三年分為湖南省移偏沅巡撫駐此雍正二年改為湖南巡撫凡領州一縣十一長沙縣附郭治府西北境善化縣附郭治府東南境湘潭縣在府西南一百里湘隂縣在府北一百二十里湘鄉縣在府西南二百十里寧鄉縣在府西一百里益陽縣在府西二百里瀏陽縣在府東一百五十里安化縣在府西北二百六十里醴陵縣在府東南二百九十里攸縣在府南二百八十里茶陵州在府東南四百八十里嶽州府在省治東北三百二十里東西距三百八十里南北距三百二十里東至湖北武昌府通城縣界二百里西至澧州安鄉縣界一百八十里南至長沙府瀏陽縣界二百九十里北至湖北荆州府監利縣界三十里東南至江西南昌府寧州界三百六十里西南至常德府龍陽縣界三百十五里東北至武昌府嘉魚縣界二百十里西北至荆州府石首縣界二百里自府治至京師四千二百五十里明洪武二年為嶽州府旋降為州十四年復為府共領州一縣七本朝初屬湖廣省後分屬湖南省雍正七年升澧州為直𨽻州分安鄉石門慈利三縣往屬今領縣四巴陵縣附郭臨湘縣在府東北九十里平江縣在府東南二百四十里華容縣在府西一百八十里常德府在省治西北六百七十里東西距四百二十里南北距二百十里東至長沙府益陽縣界一百六十里西至辰州府沅陵縣界二百六十里南至長沙府安化縣界一百二十里北至澧州界九十里東南至長沙府益陽縣界一百三十五里西南至沅陵縣治三百八十里東北至嶽州府治四百五里西北至澧州府石門縣治二百二十里自府治至京師三千九百八十里明為常德府本朝初屬湖廣省後分屬湖南省凡領縣四武陵縣附郭桃源縣在府西八十里龍陽縣在府東八十里沅江縣在府東南二百七十一里衡州府在省治南三百六十里東西距四百里南北距二百九十里東至江西吉安府永寧縣界二百八十里西至寶慶府邵陽縣界一百二十里南至桂陽州界一百六十里北至長沙府湘潭縣界一百三十里東南至郴州治三百里西南至永州府治三百五十里東北至吉安府治八百七十里西北至長沙府湘鄉縣界一百六十里自府治至京師四千二百二里明為衡州府共領州一縣九本朝初屬湖廣省後分屬湖南省雍正七年升桂陽州為直𨽻州分臨武藍山嘉禾三縣往屬乾隆二十年增置清泉縣今領縣七衡陽縣附郭清泉縣附郭本衡陽縣地衡本朝乾隆二十一年折置清泉縣與陽縣並為府治衡山縣在府北一百里耒陽縣在府東南一百五十里常寧縣在府西南一百二十里安仁縣在府東一百五十里酃縣在府東三百里永州府在省治西南六百六十里東西距三百四十里南北距五百九十里東至衡