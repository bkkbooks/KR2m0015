body:
  text: 欽定四庫全書皇朝文獻通考卷一百六羣祀考下直省専祀順治三年勅封顯佑通濟之神臣等謹案㑹典載神謝姓名緒浙人行四讀書金龍山明景泰間建廟沙灣盖崇祀已久至是加封廟祀宿遷從河臣請也其後南巡恒遣官致祭是年加運河龍神封號定致祭禮時從河臣請下禮部議封運河龍神為延庥顯應分水龍王之神令河道總督以時致祭康熙十九年加封福建海神天妃為䕶國庇民妙靈昭應宏仁普濟天妃神莆田林氏靈應之迹著於前代師征臺灣神湧潮以濟師遂克厦門及平臺灣亦顯靈異詔加封號遣官致祭又立祠於原籍六十年臺灣有警神復湧潮濟師世宗憲皇帝追褒神功御書神昭海表廟額分懸原籍舊祠厦門鎮祠臺灣府祠雍正十一年福建督臣郝玉麟以省城神廟請入祭典並請各省俱行廟祀皆允之乾隆二年加天后封號増福佑羣生四字尋加誠感咸孚四字凡廟之所在皆以春秋致祭二十二年遣官致祭雞公山神時以議政王大臣等奏大兵向駐永興城中與賊對壘仰荷上天眷佑靈神顯助於雞公山真武廟旁竪旗立隊一時官兵及賊衆無不共見於是我軍氣奮賊勢遏阻其雞公山廟神應特致褒旌載之祀典以垂永久從之遣禮部司官齎香帛往祀有司春秋致祭行禮雍正二年封雲南各鹽井神為普潤龍王之神春秋致祭三年封青海水神為靈顯青海之神先是大軍西征道經青海於塞外嚴寒之候湧泉濟軍督臣請加褒封允之遣官致祭建立石碑以滿漢䝉古三體字様勒封號以垂永久是年加封浙江江海保障之神時以撫臣法海疏言呉國上大夫伍員唐呉越武肅王錢鏐宋安濟公張夏實為浙省江海保障之神又明代紹興知府湯紹恩創築三江閘有功紹郡請各加封號修整廟宇春秋致祭下禮部議封伍員為英衛公廟祀錢塘封錢鏐為誠應武肅王廟祀杭州封張夏為静安公廟祀蕭山封湯紹恩為寧江伯廟祀紹興其後建海神廟皆與配食之列四年加封寧漕公永濟之神春秋致祭明工部尚書宋禮開㑹通河用汶上老人白英策分水濟運事載史策舊有廟祀禮及英河臣以其治河濟運永垂功績請加封號乃封宋禮為寧漕公白英為永濟之神於汶上縣祠廟祭之五年封四川灌縣都江堰口通佑王顯英王之神時以四川巡撫憲徳疏言都江堰口廟祀李二郎有功蜀地請加封號下禮部議言按史記漢書専載蜀守李氷鑿離堆穿三江功績歴歴可考惟灌縣志書内有使其子二郎鑿山穿江之語是二郎雖能成父之績李氷實主治水之功又考玉圻續文獻通考載元至順元年曽並加封號今既言有功於蜀屢彰顯應理宜並崇祀典該撫祇請封其子而不及李氷似未妥協詔令並給封號乃封李氷為敷澤興濟通佑王李二郎為承績廣惠顯英王令地方官春秋致祭六年封河東鹽池為昭惠阜裕鹽池之神春秋致祭七年封浙江蛟門山龍神為涵元昭泰鎮海龍王之神時以漕運總督性貴疏言蛟門山龍神例於六月朔日致祭雨旱祈禱有驗靈應甚著請加封號禮部議覆允之載入祀典是年封寧夏大渠龍神為寧渠普利龍王之神先是世宗憲皇帝特命大臣督理寧夏水利修建大渠及六年改渠既訖工以封號祀典請詔加封致祭嵗以春秋禮祀其後惠農昌潤二渠既成寧夏寧朔二縣各建祠宇皆令以春秋仲月照山川禮致祭嗣是大清漢唐三渠皆廟祀如之八年封浙江清溪神為保濟顯佑侯神姓戴名繼元宋時以拯溺沒於溪中屢著靈異元代封顯佑侯總督李衛疏言清溪地方屢有水患賴神捍禦且有䕶衛漕艘之功請加封號奉㫖加封春秋廟祀於徳清縣是年封故廣東海安營水師副將江起龍為英佑驍騎將軍立廟徐聞海口春秋致祭將軍在官以公事沒於海頗著靈異保䕶商民有功守臣以為言故封十年封廣西興安縣陡河海陽山神為安流襄績海陽山神嵗以季秋九日致祭十一年封廣西鬱林州泉神為昭徳沛澤泉源之神時巡撫金鉷疏言鬱林州之富民鄉湧瑞泉二穴味甘色清足以灌田利民令選地建祠春秋祀之十二年令祀山西介休縣水神廟時巡撫石麟奏介休縣上堡村向有水泉久淤於十一年秋冬復發又湧新泉可灌民田其處向有水神廟請重修致祀從之是年加封江西鄱陽湖顯佑安瀾之神春秋致祭神為唐忠臣張巡布政使李蘭奏言故唐御史中丞張巡見危授命保障江淮江西居民廟祀最盛捍禦鄱陽一湖屢昭顯應請加封賜祭從之廟祀於饒州之浮梁縣乾隆三年加封河南靈佑襄濟之神河臣白鍾山疏言陳留河神觀所祀黄大王神姓黄名守才偃師人禱泉禱雨皆著靈應請加封號春秋致祀從之至四十五年大學士阿桂奏豫省河神最著靈驗者為靈佑襄濟之神請於其子孫中賞給奉祀生一人得㫖允行四年加封江南彰靈衛漕之神時河臣髙斌疏言清口張将軍廟神名祥宿遷人漕船商船䖍禱響應請加封號列祀典允之八年加封廣西顯佑英濟廣福王之神時巡撫楊錫紱疏言神為蜀漢禆將武當溺於溪中屢著靈異請加封號許之二十二年建顯佑通濟神廟於徐州先是二十一年秋徐之孫家集黄河奪溜大發帑金塞之越嵗皇上親臨閱視以河溜刷深神明黙佑令地方官擇地建廟於雲龍山之北先是廟祀宿遷康熙三十九年曾詔加封昭靈效順至是復加封廣利安民立碑紀實嵗以春秋致祭是嵗於甘肅嘉峪關外立龍神廟春秋致祭諭㫖嘉峪關外路多戈壁從前並無水泉今年大兵經過鑿井得泉水勢騰湧普濟軍行此實神明贊佑所致昔年皇祖用兵時地湧靈泉曾於拖犁地方建廟以答神庥今即照例交該督建造二十四年廟成立碑致祭春秋祀之二十五年修涿州佑濟龍神祠涿州城北為胡良拒馬二河所滙明代曽建橋河徙而橋廢是年移建通橋隄長二百丈祠在橋東南御製碑文勒石三十二年諭東西二淀為畿輔滙萃清流之所邇年瀦蓄安恬節宣有藉近淀村莊田土泛溢無虞而菰蒲魚蠏之饒利賴於民生者更大兹者春巡郊甸循覽河堤鳯艇乗流祥飈助順尤足徴神貺之昭宜建専祠用答靈佑著該督方觀承卜地興工特崇廟祀以示妥神報功之典四十二年陶莊開放引河工成命建河神廟嵗以春秋致祭御製碑文紀之四十五年皇上南巡親詣陶莊河神廟瞻禮以儀封漫工未成黙致䖍禱儀封兩壩自行合龍即告功成是年封故河臣朱之錫為助順永寧侯時以大學士阿桂奏言順治年間總河朱之錫功著南豫二省沒為河神屢著靈應請特賜位號得㫖交禮部酌議位號尋議上從之四十九年河南蘭陽睢寧新堤并引河工成命建河神廟於南岸御製碑文紀之皇朝文獻通考卷一百六
