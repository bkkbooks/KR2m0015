body:
  text: 欽定四庫全書皇朝文獻通考卷一百九宗廟考三太廟康熙六十一年十一月辛丑世宗憲皇帝登極雍正元年二月己巳恭奉冊寶上大行皇帝尊諡曰合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝廟號聖祖先是康熙六十一年十一月辛丑世宗憲皇帝諭禮部朕惟自古賢聖之君必有顯號徽稱以彰功德之盛垂於萬世此國家不易之巨典也仰惟我皇考大行皇帝臨宇六十一年蚤承大統寅畏小心旦明凛昭格之忱郊祀親升中之典監於成憲率由舊章孝奉兩宫尊養兼至展敬陵廟備物盡誠總攬萬幾阜成兆姓蠲賦動盈千萬賑恤曾不稽時水旱先籌雨暘必達寬刑肆赦德洽好生盛暑則釋囹圄嚴寒則賑饘粥兵糧預給優賞頻頒淮甸屢巡動數百萬之帑金運睿謨而兩河底績魯邦特幸行數千年之殊禮屈帝尊而九拜崇師覽奏牘而利弊周知覲臣僚而賢愚立辨保全勳舊庇廕宗支廣育人材敦厚風俗布昭聖武申討不庭元裔背叛而旋踵就殱三孽逆命而尅期獻馘鄂羅斯占喀爾喀之疆圉諭以威德即奉約章喀爾喀逼厄魯特之暴殘納其困窮胥登衽席噶爾丹肆毒鄰境三臨絶漠掃靖烽烟策妄阿喇布坦摧滅與國出師命將恢復藏地臺灣置郡紅苗格心南朔東西無思不服至於天縱生知日新好學講筵時御手定六經廣博士於五賢配先儒於十哲文嫓二典書邁百家貫徹天文總括地理旁羅術數考正元聲研索羣編鑒裁纂輯凡此難名之美善洵亘古帝王首出之一人雖復纍牘連章不能紀述萬一朕方與天下臣民均切怙戴不意龍馭上賔顧豫冲人嗣膺大統仰承佑啓之恩敢後顯揚之禮謹考彝章宜升尊諡爾部詳察典禮具奏乙巳總理事務王大臣等奏大行皇帝尊諡廟號乃追崇大典臣等管窺蠡測未能仰盡髙深恭祈睿思親定以昭垂萬世奉諭曰皇考大行皇帝尊諡廟號諸王大臣等請朕親定朕思子臣尊崇君父之心何有止極然必須至允至當方孚千秋定論若少有溢美之詞不獨失天下之至公且開後人之僭越是因臣子之愚忠愚孝轉將君父盛德大業之實行涉於贊頌之虛文朕心殊不安也我皇考大行皇帝纘繼大統舊典本應稱宗但經云祖有功而宗有德我皇考鴻猷駿烈冠古轢今拓宇開疆極於無外且六十餘年手定太平德洋恩溥萬國來王論繼統則為守成論勳業實為開創朕意宜崇祖號方副豐功但追崇大典攸關理應僉謀共協爾諸王大臣等㑹同九卿詹事科道文六品以上武四品以上詳考舊章從公確議毋得依違毋得附和務期紀實以垂萬年己酉諸王貝勒貝子公文武大臣官員等議奏大行皇帝尊諡廟號議曰謹按傳云為人君止於仁禮運云仁者義之本順之體也得之者尊說文云在天為元在人為仁故易曰元者善之長仁者德之首大行皇帝體元立政茂育羣生以義制事綏安兆姓史稱帝堯其仁如天惟大行皇帝實與並之又按禮經云有虞氏禘黃帝而郊嚳祖顓頊而宗堯而尚書舜典云舜格於文祖釋者謂文祖堯廟也又歸格於藝祖釋者謂藝祖堯之祖也合之祖顓頊之文則有虞氏有三祖矣宋臣陳祥道云凡配天者皆得稱祖故國語展禽有有虞氏祖髙陽而郊堯之說堯所以稱文祖也顓頊至堯皆黃帝子孫而皆稱祖又周禮大宗伯祫禘追享朝享解云古者朝廟合羣祖而祭焉故祫謂之朝享以合羣祖為不足又禘其祖之所自出故禘謂之追享夫祖之所自出始祖也而其下曰羣祖則自始祖以下皆可稱祖矣又諡議曰帝王功業隆盛引古者祖有功之義得稱祖此皆經書可據者臣等竊謂惟聖字可以贊揚大行皇帝之峻德惟祖號可以顯彰大行皇帝之隆功恭擬敬上尊諡曰合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝廟號曰聖祖是日召諸王大臣等入諭曰諸王大臣官員俱深悉我皇考一生神聖實行同心合詞恭上尊稱無一人異詞甚愜朕懷朕之哀思庶可稍釋諭畢上持針刺中指出血將奏內聖祖二字圈出敬恭髙捧交與大學士等齎出至是先期禮部具儀注奏諭曰爾部所奏閲冊寶儀注內並未議及朕躬行禮之處凡閲壇廟祝帛悉皆行禮今閲聖祖仁皇帝冊寶亦當行禮為是禮部隨議定凡閲壇廟祝帛皇上並皆行禮今閲冊寶亦應照閲祝帛儀行一跪三拜禮得㫖是是日設冊寶案於太和門正中大學士二員恭捧香冊香寶安奉案上行一跪三叩禮畢禮部奏請升太和門視冊寶上素服乘輿出宫至太和門後階下即降輿步至太和門東門望見冊寶即悲感涕泣閲畢行一跪三拜禮大學士恭捧冊寶由正中階下奉安各彩亭內前列御仗出協和門彩亭啓行後方回駕預詣夀皇殿恭候是日大行皇帝鹵簿全設於夀皇殿大門外彩亭由景山東門入大學士恭捧冊寶由中門中路入殿中槅扇奉安於東邊案上上從大門中門入進殿東就拜位行三跪九拜禮大學士恭捧香冊箱跪獻上受冊供獻畢授左邊禮部大臣跪接恭安冊案上大學士恭捧香寶盝跪獻上受寶供獻畢授右邊禮部大臣跪接恭安寶案上典儀官奏宣冊宣寶隨捧絹冊絹寶宣畢上行三跪九拜禮奠帛獻爵亞獻終獻畢上行三跪九拜禮恭奉祝帛絹冊絹寶詣燎位贊禮官奏禮畢上趨至几筵前跪撫寶榻呼號大慟左右無不悲感以各有執事不敢進勸捧冊寶大學士二人進前哀懇良久上方出及乘輿猶涕泣不止供獻時上髙捧頂戴於首備極恭敬冊文曰源逺流長寶厯綿延於萬葉功髙德盛鴻名炳耀於億年參覆載以成能亘古今而立極光垂寶冊典重彝章恭惟皇考大行皇帝智勇表邦寬洪錫福統天作則符大德之好生法祖綏猷繼顯謨而垂裕溯自乾綱始握暨夫泰運宏開推上理之化成以至仁為治本勤勞幾務皆緣利濟蒼黔愛惜人才總為輯寧區㝢涖法宫而問夜民隱周知御鑾輅以省方輿情畢慰導黃流於淮海悉本宸衷挽紅粟於東南用寬物力無一夫之不獲致比屋之可封萬象如春嫓美三皇之世百祥從善凝和四德之元尊號宜崇惟仁克允若乃時際守成功同開創我皇考膺圖受籙纘緒重光文治休明威靈赫濯值三藩之叛逆命諸將以誅鋤攘元裔之跳梁搗其巢穴滌臺灣之氛祲𨽻我版圖喀爾喀窮蹙來歸綏闔部而享安全之樂噶爾丹凶頑不戢統六師而彰掃蕩之勳惟彼策妄阿喇布坦者潛蹤逺竄負固弗庭禁旅長驅露布捷馳於北闕天威逺震御碑屹立於西藩光列聖相繼之謨猷拓自古未開之疆土式遵彝典載考詩書禹謨以帝堯為聖君商頌以成湯為烈祖德無不備必稱聖而始該功有獨隆非稱祖其曷副小子寅紹丕基仰承鴻業莫罄顯揚之悃僉詢朝野之公謹奉冊寶恭上尊諡曰合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝廟號曰聖祖萬年有赫百代彌尊伏冀天慈俯垂鑒格謹言寶文曰聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝之寶臣等謹按凡香冊香寶致祭時恭獻後即奉安山陵絹冊絹寶宣讀送燎位是皆上尊諡所用也若夫進玉冊玉寶則以尊藏太廟七月癸巳以加上列祖列后尊諡恭修飾太廟神牌遣官行禮八月己酉恭奉冊寶加上太祖承天廣運聖德神功肇紀立極仁孝睿武端毅𢎞文定業髙皇帝孝慈昭憲敬順仁徽慶顯承天輔聖髙皇后太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏隆道顯功文皇帝孝端正敬仁懿哲順莊敏輔天協聖文皇后孝莊仁宣誠憲恭懿至德翊天啓聖文皇后世祖體天隆運定統建極英睿欽文大德𢎞功至仁純孝章皇帝孝惠仁憲端懿慈淑純德順天翼聖章皇后孝康慈和莊懿恭惠溫穆崇天育聖章皇后尊諡於太廟又恭上仁孝皇后尊諡曰仁孝恭肅正惠安和儷天襄聖皇后孝昭皇后尊諡曰孝昭靜淑明惠正和欽天順聖皇后孝懿皇后尊諡曰孝懿溫誠端仁憲穆奉天佐聖皇后先是康熙六十一年十二月丁巳世宗憲皇帝諭朕仰荷祖宗眷佑纘承大統恭上皇考聖祖仁皇帝尊諡敬念太祖髙皇帝太宗文皇帝世祖章皇帝三聖相承功髙德盛載考典章加上尊諡因念孝端文皇后孝莊文皇后肇基翊運啓佑兩朝朕在冲齡備膺慈愛孝康章皇后誕育先皇懿徽流慶孝惠章皇后德隆福厚篤愛朕躬朕意亦宜並加尊諡但追尊固出至情而推崇必遵定禮爾等酌古準今㑹同確議俾朕得展思慕之誠又念仁孝皇后作配皇考孝敬寬仁坤儀懋著孝昭皇后恪恭溫順樹範宫闈孝懿皇后徽音淑德慈撫朕躬恩勤備至均應恭上尊諡以昭示萬年內閣九卿翰詹科道㑹同詳察典禮具奏尋議上臣等伏查從前恭上列祖尊諡太祖承天廣運聖德神功肇紀立極仁孝睿武𢎞文定業髙皇帝今擬於睿武字下加上端毅二字太宗應天興國𢎞德彰武寬溫仁聖睿孝隆道顯功文皇帝今擬於睿孝字下加上敬敏二字世祖體天隆運英睿欽文大德𢎞功至仁純孝章皇帝今擬於體天隆運字下加上定統建極四字又查從前恭上列后尊諡孝慈昭憲敬順慶顯承天輔聖髙皇后今擬於敬順字下加上仁徽二字孝端正敬仁懿莊敏輔天協聖文皇后今擬於仁懿字下加上哲順二字孝莊仁宣誠憲恭懿翊天啓聖文皇后今擬於恭懿字下加上至德二字孝惠仁憲端懿純德順天翼聖章皇后今擬於端懿字下加上慈淑二字孝康慈和莊懿恭惠崇天育聖章皇后今擬於恭惠字下加上溫穆二字仁孝皇后孝昭皇后孝懿皇后尊諡應遵照初上尊諡十二字之典禮恭擬上仁孝皇后尊諡曰仁孝恭肅正惠安和儷天襄聖皇后孝昭皇后尊諡曰孝昭靜淑明惠正和欽天順聖皇后孝懿皇后尊諡曰孝懿溫誠端仁憲穆奉天佐聖皇后伏候欽定得㫖是依議至是親詣行禮恭加上太祖髙皇帝尊諡冊文曰聖德誕敷肇啓萬年之統緒神功丕煥𢎞開百世之升平垂大業於無窮奉鴻名於有永欽惟太祖承天廣運聖德神功肇紀立極仁孝睿武𢎞文定業髙皇帝智勇性成聰明天縱體元立極建經天緯地之功應運綏猷擴物與民胞之量聲教訖於九有文德遐宣威靈懾乎萬方武功逺震決機制勝成算如神置腹推心求賢若渴啓疆宇而立宗廟制度恢宏相原隰而定邦都規模久逺文同倉史爰造國書義取卦圖聿修軍制致人心之徯應承天命之維新緬惟垂統訏謨發祥澤逺上溯開基厚德昌後功宏兹當纘緒之初宜重追崇之典謹奉冊寶增上尊諡曰太祖承天廣運聖德神功肇紀立極仁孝睿武端毅𢎞文定業髙皇帝伏冀聖鑒長昭𢎞庥永被貽博大昌明之運集山陵岡阜之祥謹言寶文曰太祖承天廣運聖德神功肇紀立極仁孝睿武端毅𢎞文定業髙皇帝之寶孝慈髙皇后尊諡冊文曰義重顯揚懿範聿昭於開創功宏贊助隆稱宜奉於纘承緬令則之長垂識凝休之有自欽惟孝慈昭憲敬順慶顯承天輔聖髙皇后承乾育物應地資生溈汭觀型早著幽閒之度洽陽作合夙嫻貞靜之風歸我太祖髙皇帝克勤克儉勷櫛風沐雨之勞至孝至仁佐天與人歸之業著慈祥於樛木𢎞愷悌於螽斯景運誕膺本慈闈之垂裕輿圖式廓推至德之淵源緬懷雍肅徽音傳諸奕世永被睢麟雅化貽及萬年用展微忱敬加鴻號謹奉冊寶增上尊諡曰孝慈昭憲敬順仁徽慶顯承天輔聖髙皇后伏冀慈鑒丕昭繁禧懋錫萃日升月恆之福介民安物阜之休謹言寶文曰孝慈昭憲敬順仁徽慶顯承天輔聖髙皇后之寶太宗文皇帝尊諡冊文曰聖人有作贊化育於兩間至德難名耀聲華於萬世道光簡冊頌溢寰區欽惟太宗應天興國𢎞德彰武寬溫仁聖睿孝隆道顯功文皇帝覆載同規中和建極照臨六合亶成性之聰明表正萬邦錫自天之勇智布公誠以待下英俊歸心施慈惠以寧人蒼黎向化武功耆定雷霆驅精鋭之鋒文教𢎞敷日月炳光華之象修明禮制同倫軌於方輿綏輯要荒萃共球於屬國纘肇基之迹式廓帝圖恢受命之符彌膺天眷耿光大烈已開一統宏模厚澤深仁遂裕億年景祚欽承丕構緬懷締造之猷思闡鴻稱莫罄顯揚之願式稽古典爰合僉謀謹奉冊寶增上尊諡曰太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏隆道顯功文皇帝伏冀神靈陟降緒業昭融恭承烈祖之庥永篤曾孫之慶謹言寶文曰太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏隆道顯功文皇帝之寶孝端文皇后尊諡冊文曰配天立極表地道之安貞儷日揚光彰壼儀之雍肅徽音勿替顯號宜加欽惟孝端正敬仁懿莊敏輔天協聖文皇后敬慎溫恭含𢎞光大範髙蘭掖邁夏室之塗山德冠璇閨嫓周家之渭涘勤勞成性心罔軼於針規節儉持身動必遵乎律度雞鳴警戒助當寧之求衣佩帨從容向閟宫而潔藻玉階金戺聿傳溫惠之風綺殿珠宫式著齊莊之範承文皇齊家之化業贊時雍逮世祖御極之期禮隆孝養屬當冲眇初荷鴻基追椒壁之遺芳捧瑶函而頌美謹奉冊寶增上尊諡曰孝端正敬仁懿哲順莊敏輔天協聖文皇后伏冀慈靈降鑒厚澤凝庥恆衍慶於紫宸永揚名於彤管謹言寶文曰孝端正敬仁懿哲順莊敏輔天協聖文皇后之寶孝莊文皇后尊諡冊文曰道符內則垂芳範於千秋德懋母儀享鴻聲於九廟几筵增煥典冊攸新欽惟孝莊仁宣誠憲恭懿翊天啓聖文皇后應地含章配天贊化仁𢎞逮下關㫿傳和藹之心禮重正家褕翟仰端凝之度宵衣旰食常參燮伐之勳體巽承乾每佐憂勤之治誕我世祖章皇帝鍾祥啓運善教凝庥八埏歸王㑹之圖四海戴慈闈之澤逮我聖祖仁皇帝神姿濬哲彌資鞠育之深恩至孝感孚丕受綿長之介福備兩朝之尊養運啓羲農裕奕葉之貽謀名髙任姒顧惟冲眇夙荷恩暉兹當繼序之初爰切追崇之義謹奉冊寶增上尊諡曰孝莊仁宣誠憲恭懿至德翊天啓聖文皇后伏冀長綏純嘏俯鑒精誠綿百世之本支篤萬年之慶譽謹言寶文曰孝莊仁宣誠憲恭懿至德翊天啓聖文皇后之寶世祖章皇帝尊諡冊文曰聖德光昭長衍萬年之景運神功奠定宜崇百世之鴻稱大一統以貽庥式九圍而立極功𢎞啓佑禮重顯揚欽惟世祖體天隆運英睿欽文大德𢎞功至仁純孝章皇帝表正萬邦首出庶物精明果毅智勇本於性生中正齊莊神靈由於天授擴祖宗之𢎞業同軌同倫統華夏以歸心來王來享明禋昭事精誠允格乎蒼穹駿烈纘承孝享實孚於清廟隆慈闈之尊養視膳問安普宗族之恩施明倫敦本時頒解澤大地回春屢諭祥刑普天向化登兆人於衽席躋寰㝢於雍熙積十八載之惕厲憂勤開億萬年之豐亨豫大緬懷盛德繩祖武於方新祗述鴻規詒孫謀於盡善謹奉冊寶增上尊諡曰世祖體天隆運定統建極英睿欽文大德𢎞功至仁純孝章皇帝伏冀鑒觀有赫默佑無窮永貽昌大之祥益啓升平之祚謹言寶文曰世祖體天隆運定統建極英睿欽文大德𢎞功至仁純孝章皇帝之寶孝惠章皇后尊諡冊文曰懿德垂休美報宜隆於奕世聖慈積慶鴻名自耀於億年禮莫重於追崇義必先於報本彝章式煥典冊丕昭欽惟孝惠仁憲端懿純德順天翼聖章皇后淑慎溫恭含𢎞光大佐世祖以敷政內治勤修事文母以承歡孝思維則精誠罔懈潔九廟之蘋蘩謙抑自持率六宫以節儉撫聖神於冲幼端母教於掖庭厯六十四載之恩勤仁慈備至合千八百國之推戴尊養兼隆緬企前徽彌思厚德宫闈顧復瞻色笑以長依禁籞趨承溯音容而如昨蓋諸福咸備已徵保定之符而慈教長垂愈衍升平之慶兹丕基之是纘正顯號之宜崇謹奉冊寶增上尊諡曰孝惠仁憲端懿慈淑純德順天翊聖章皇后伏冀神靈默佑福履永綏介繁祉於無疆錫𢎞庥於勿替謹言寶文曰孝惠仁憲端懿慈淑純德順天翊聖章皇后之寶孝康章皇后尊諡冊文曰慈範丕昭厚德衍無疆之慶徽音廣被深仁開有道之長稽巨典以尊崇奉鴻名而揚扢金函煥采玉冊增輝欽惟孝康慈和莊懿恭惠崇天育聖章皇后坤順同符乾元協撰著幽閒之度禁掖流芬建雍肅之儀宫庭起化克宣內治精誠而潔蘋蘩奉事重闈愈婉而勤問視躬節儉以昭令則浣濯成風本愷悌以布𢎞庥慈祥及物篤生我聖祖仁皇帝誕應昌期育成至德集萬方之愛戴慶五紀之升平當纘承伊始之年正尊顯宜隆之日仰體孝思於不匱繼述維殷緬懷懿訓於無窮顯揚益切謹奉冊寶增上尊諡曰孝康慈和莊懿恭惠溫穆崇天育聖章皇后伏冀慈眷加隆純禧洊至奠清寧於四海貽昌熾於萬年謹言寶文曰孝康慈和莊懿恭惠溫穆崇天育聖章皇后之寶己未恭奉冊寶上大行皇太后尊諡曰孝恭宣惠溫肅定裕贊天承聖仁皇后先是世宗憲皇帝諭朕惟尊親之典首重易名聖善之修必崇顯號我皇妣大行皇太后端莊恭肅慈惠安和奉侍先皇壼儀茂著誕育冲藐母道備隆顧復恩周命提義盡寬仁逮下澤洽宫庭謙儉持躬化流禁掖朕繼承大統嗣服鴻基方期合萬國之歡心奉慈闈之色養不意遽遭大故仙馭上升抱痛銜哀感深罔極惟藉顯揚之典少申孝慕之誠允宜稽考彝章薦升尊諡六月丁巳大學士恭擬上尊諡得㫖是是日世宗憲皇帝素服率諸王大臣文武官員詣夀皇殿大行皇太后梓宫前躬獻冊寶致祭行禮冊文曰母儀正位仁風誕播於四方壼德流輝寶訓永垂於萬世進徽稱於清廟玉冊爰新議典禮於容臺彤編式煥欽惟皇妣大行皇太后華渚炳靈慶都凝瑞秉含𢎞之淑性應地安貞樹雍肅之芳型儷天作則贊襄內治逮􅉏御以加恩輔佐先皇自宫庭而起化寬仁夙著胥食德而飲和朴素攸崇務去奢而存儉荷生成於聖母誕育藐躬極尊養於慈闈未酬厚載上推崇之號允諧萬國歡心執謙讓之衷堅却百僚敦請音容倐隔戀慕實深兹當升祔之辰莫罄顯揚之悃嘉言懿行永懷至德於坤元琬刻瑶稜肅薦明禋於閟寢謹奉冊寶恭上尊諡曰孝恭宣惠溫肅定裕贊天承聖仁皇后伏冀默扶景祚𢎞衍慶源啓後人紹衣之圖克承克繼導寰宇龎鴻之祉俾熾俾昌謹言寶文曰孝恭宣惠溫肅定裕贊天承聖仁皇后之寶九月庚辰恭奉聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝神主孝誠恭肅正惠安和儷天襄聖仁皇后神主孝昭靜淑明惠正和欽天順聖仁皇后神主孝懿溫誠端仁憲穆奉天佐聖仁皇后神主孝恭宣惠溫肅定裕贊天承聖仁皇后神主升祔太廟先是六月乙丑禮部奏配祔太廟事關巨典宜合廷臣考古制核正禮確議以定世宗憲皇帝諭總理事務王大臣內閣九卿翰詹科道㑹同詳稽典禮確議具奏丁卯議上恭請四后同祔聖祖廟尊諡並加仁字奉諭曰朕惟母后升祔太廟大典攸關欲伸臣子之孝思必準前代之成憲務得情理允協乃可昭示萬年諸王大臣等奏請四后同祔太廟引據宋朝太宗真宗四后祔廟之禮朱子及有宋諸儒皆以為允當覽奏既得展朕孝敬無窮之心復合前代斟酌盡善之典不覺悲慰交集恭惟孝誠仁皇后元配宸極孝昭仁皇后孝懿仁皇后繼位中宫孝恭仁皇后誕育朕躬母儀天下按先儒祔廟之儀一元后一繼后一本生以次並列今母后升祔位次當首奉孝誠仁皇后次奉孝昭仁皇后次奉孝懿仁皇后次奉孝恭仁皇后如此庶於古禮符合而朕心亦安矣先禮部等衙門奏恭上仁孝仁皇后尊諡仁字重復謹請改易恭上孝誠恭肅正惠安和儷天襄聖仁皇后得㫖是又奏准諏吉恭請孝誠仁皇后孝昭仁皇后孝懿仁皇后安奉奉先殿神牌至太廟恭製神牌處改題前期遣大學士二人恭行填青禮别於奉先殿神庫敬製恭題奉先殿神牌同日升祔八月乙亥聖祖仁皇帝升祔太廟届期命大學士等恭奉神主填青諭曰填青典禮所關最重古人必取名望素著德行純粹學問淵深者以充此任今爾等位既貴顯人品皆優是以特加簡命爾等當體朕敬恪之誠潔誠齊戒屏除塵慮儼如聖祖在天之靈陟降上下誠意所孚洋洋如在方副朕一片孝思爾等不必有意於哀慟不必有意於儀文祗以一誠感格為是是日神主黃輿由朝陽門入諸王大臣滿漢文武官員集大清門外朝服跪迎世宗憲皇帝御禮服於端門外跪候聖祖仁皇帝黃輿將至太廟街門親王三人詣孝誠仁皇后孝昭仁皇后孝懿仁皇后神主案前跪三叩興恭捧神主各安奉於黃輿俟聖祖仁皇帝孝恭仁皇后黃輿入街門中門三后黃輿叙次隨行至廟南門外世宗憲皇帝詣聖祖仁皇帝黃輿前跪三拜興恭捧聖祖仁皇帝神主親王四人詣四后黃輿前跪三叩興恭捧孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后神主敬升太廟世宗憲皇帝恭代行祗見禮於太宗文皇帝神位之次以次奉安神位行大饗禮如儀是日恭進孝誠仁皇后尊諡册文曰道協坤元樹母儀而作則化隆內治揚聖淑以垂休晉千秋有耀之榮稱奉萬世無疆之寶册欽惟皇妣孝誠仁皇后慶鍾厚載德嫓皇家當先帝敕天凝命之辰乃中宫應地含章之㑹䖍奉重闈之􅎵瀡曲慰慈顔潔承九廟之蘋蘩克襄孝治仁能逮下推惠澤於掖庭恪以持身贊勤勞於旰食椒塗緬企芳型閲久以長存彤管昭垂懿範如新而未逺期當升配兩儀均健順之功事極尊崇奕葉著肅雍之範刻瑶函而煥彩彞典丕彰依玉几以薦馨徽音永協謹奉册寶恭上尊諡曰孝誠恭肅正惠安和儷天襄聖仁皇后伏冀慈恩默佑錫介祉以熾昌壼教永新致協和於悠逺極顯揚之微悃庶靈爽之式憑謹言寶文曰孝誠恭肅正惠安和儷天襄聖仁皇后之寶孝昭仁皇后尊諡冊文曰襄治化於昌朝夙合二儀之撰耀徽音於典冊聿昭萬葉之光勳華之盛烈丕彰任姒之芳規益播欽惟皇妣孝昭仁皇后性含柔順範表溫莊華閲鍾祥協坤貞而作則椒塗正位偕帝德以交輝侍膳慈闈克謹晨昏之奉勞心中壼每分宵旰之勤針銘茂著於彤編褕翟久辭於丹禁溯淑恭之懿行茂典流光揚藹吉之仁風貞珉煥彩兹值纘承之始彌深崇報之思清廟森嚴考彞章而合祔寶函鄭重列俎豆以升馨謹奉冊寶恭上尊諡曰孝昭靜淑明惠正和欽天順聖仁皇后伏冀在天靈爽永貽萬世之安裕後儀型長介億年之福進鴻稱而永協垂琬琰以光昭謹言寶文曰孝昭靜淑明惠正和欽天順聖仁皇后之寶孝懿仁皇后尊諡冊文曰儷乾作則坤元彰厚載之功體巽流徽廟祀舉尊親之典賁瑶函於有耀熙鴻號於無窮欽惟皇妣孝懿仁皇后育粹髙門騰芬戚畹佐顯承之𢎞烈壼政勤修篤慈愛之盛心母儀懋著履和思順致誠孝於彤闈尚儉懷謙翼升平於黼座撫冲齡而顧復備蒙鞠育之仁溯十載之劬勞莫報生成之德緬宫庭之佑啓翟茀如存感嵗月之遷流萱闈久閟追維慈覆彌懷髙厚之恩誕紹丕基倍切顯揚之願安貞令範洵應地以無疆炳曜徽音長配天而不泯謹奉冊寶恭上尊諡曰孝懿溫誠端仁憲穆奉天佐聖仁皇后伏冀淑靈式庇茂膺天祿之熾昌嘉德維馨永廓聖圖之廣大潔苾芬而肅薦耀金石以長垂謹言寶文曰孝懿溫誠端仁憲穆奉天佐聖仁皇后之寶三年五月丙辰恭修飾太廟神牌是月戊戌朔禮部奏欽天監敬擇本月十九日申時修飾神牌太廟派太常寺卿行禮恭捧神牌交承修官敬謹修飾得㫖是六年十二月癸巳恭進太祖髙皇帝孝慈髙皇后太宗文皇帝孝端文皇后孝莊文皇后世祖章皇帝孝惠章皇后孝康章皇后聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后玉冊玉寶奉安太廟先是庚寅諭冊寶告成恭進太廟奉安事關大典朕親詣行禮其應行禮儀著怡親王大學士㑹同禮部詳定具奏其恭捧玉冊玉寶之員著將王貝勒貝子公大學士部院堂官旗下頭等大臣開列請㫖辛卯禮部以職名奏奉硃筆圈出十七員又硃筆批出九員是日世宗憲皇帝親詣行禮臣等謹按雍正元年二月禮臣㑹同大學士遵諭議准列祖列后玉寶修平舊篆敬鐫加上尊諡新造玉冊並舊進玉冊一同珍奉時恭進太祖髙皇帝冊十頁青玉修八寸八分廣四寸厚四分鐫字深二釐面底二頁鐫升降龍孝慈髙皇后冊十頁青玉修八寸九分廣厚同太宗文皇帝冊十頁青玉修八寸九分廣厚同孝端文皇后冊十頁青玉修八寸九分廣厚同孝莊文皇后冊十頁青玉修八寸九分廣厚同世祖章皇帝冊十頁青玉修八寸九分廣厚同孝惠章皇后冊十頁青玉修九寸廣厚同孝康章皇后冊十頁青玉修九寸廣厚同鐫字皆深二釐面底二頁皆鐫升降龍寶八方皆改鐫加上尊諡聖祖仁皇帝冊十頁青玉修九寸廣四寸厚四分鐫字深二釐面底二頁鐫升降龍寶白玉方四寸二分厚一寸二分紐髙二寸四分方三寸九分孝誠仁皇后冊十頁青玉修廣厚同寶白玉方同厚一寸四分紐髙二寸六分方三寸八分孝昭仁皇后冊十頁青玉修廣厚同寶青白玉方同厚一寸七分紐髙二寸八分方三寸八分孝懿仁皇后冊十頁青玉修廣厚同寶青玉方四寸三分厚一寸七分紐髙二寸八分方同孝恭仁皇后册十頁青玉修廣厚同鐫字皆深二釐面底二頁皆鐫升降龍寶青玉方厚同紐髙二寸八分方三寸八分皇朝文獻通考卷一百九
