body:
  text: 學校考十直省鄉黨之學四乾隆三十一年増定福建分設屏南縣學本籍寄籍取補廩増例雍正十三年分古田為屏南定入學額數每縣各八名廩増各缺亦均分兩學嗣因屏南文風不及古田禮部議准古田童生寄考屛南額取四名名曰寄屏其本籍童生額取四名名曰正屏廩増額缺輪流間補至是學政王杰奏屛南廩増十缺多為寄屏所佔正屏無廩童生考試亦無認保請將嵗科試卷面註明正屏寄屏字様以便酌量録取從之嚴申送嵗貢入監肄業例各省嵗貢赴監例由地方官取結覈其籍貫有無違礙方行申送至是并令詳驗本生年力不得以精神衰邁之生濫行申送赴監三十三年禮部議准四川雅州府人文日盛應與卭州分棚考試另立一棚卭州照舊自為一棚學政以次按臨考試又議准廣西土民佃種土官之田向聽土司役使充兵若准其應試一經上進勢必不服差徭其果有志向上退還所佃之田實無原籍可歸者方准令土司送考如退佃准考之後仍隱占土官田地託避徭役該地方官嚴查究處又議准查各省造送學冊其府學生員並不註明係某州縣籍貫以致遇有報捐等事無憑核對嗣後各該學政造送學冊務將府學生員名下查明本州縣籍貫詳細填註毋致舛錯以備查核又咨覆浙江巡撫永徳咨稱廩生丁本生父母期年憂例不出缺其廩糧各學有照舊支給者亦有停糧扣除者辦理兩岐當經行查户部據稱江南等十三省奏銷冊開丁憂廩生廩糧銀兩係扣缺造報並未造有期䘮扣缺之欵浙省事同一例應畫一辦理三十四年設立迪化寧邊二㕔學額議准烏嚕木齊地方駐兵屯田招徠開墾生齒繁盛自設立義學以來兵民子弟俱各踴躍現在讀書習弓馬者均有成效照安西敦煌等縣之例設立學額以示鼔舞應將迪化寧邊二㕔兵民子弟内嵗科兩試每㕔各取進文童四名嵗試取進武童四名交與兩㕔管束其考試事宜均照安西之例歸於陜甘學政咨部辦理但烏嚕木齊距甘肅窵逺諸童應試維艱應令陜甘學政按臨肅州之前將考試文武生童題目封固預行密送駐劄大臣俟㕔道將録取應試文童名冊呈送到日嚴行扄試仍將試卷封固移送學臣按額取進其武童外場弓馬技藝由㕔道録送駐劄大臣考試分别等次造冊并考試䇿論一併移送學臣按額取進如文武童生試卷不能足額均照例寧缺無濫又議准呉縣太湖内東西兩山分𨽻太湖同知所轄舉貢生監遇有丁憂服滿事故等項准其就近取結送部監生北闈鄉試亦合歸㕔給文其鄉㑹科場起送并舉報節孝等案應令吴縣儒學查明送㕔轉詳又議准雲南永北府既改為掌印同知並無府佐州縣等官其考試童生應照蒙化景東二府之例即令掌印同知考試申送學政録取又議准泰州額設廩増既將十名分撥東臺縣若仍照州學例三年兩貢未免太驟應改為二年一貢三十五年諭畿輔為首善之區人文漸被多士蔚興上屆臨幸天津曽加恩廣額用光黌序乃者慈禧普被懽洽敷天業已特開鄉㑹恩科彚徴叶吉而鑾輅經臨推恩行慶並宜嘉恵士林所有直𨽻通省本年入學名數大學増額五名中學増額四名小學増額三名該學政其悉心甄録務抜其尤以副樂育作人至意是年禮部議准四川羅江縣裁併綿州又羅江縣學原額六名内分撥綿州四名嗣後綿州連原額十名共取進十四名其二名撥入梓潼縣學連原額八名共取進十名羅江縣廩増額數歸併綿州廩増各三十名與州學定額相符應照州學例三年兩貢毋庸與彰明徳陽二縣輪貢其彰明徳陽二縣廩生各額數均止有十名應照清溪縣之例四年一貢梓潼縣廩増額數及出貢年分仍循舊例又議准大宛兩縣童生令知縣教官遵例慎選素行優謹衆所共信之廩生申送府丞該府丞臨時復實心查核如有濫選妄保諸弊聽其隨時查辦又議准江南省和州江浦二縣縣交界之豐樂宋家唐家馬家華家黄墩等六圩統歸江浦縣管理其考試報捐等事亦應改𨽻江浦縣所有現𨽻和州之捐納各生應改换江浦籍貫得㫖允行又議娼優𨽻卒子孫雖經出繼不准収考凡娼優𨽻卒専以本身嫡𣲖為斷本身既經充當賤役所生子孫例應永逺不准収考其子孫雖經出繼為人後者終係下賤嫡裔未便混行収考又議准定例舉貢生監罪在杖一百以内革後能改過自新者該地方官查明取具里鄰確實甘結申送准以原名應試若於結案時即聲明辦理其能改過自新與否尚未可知嗣後如係舉人斥革願以原名應試者由該督撫核明咨部定議其貢監生員斥革後呈請原名應試應照例令鄰里出具甘結由教官牒送該州縣官申送提調官詳報學政収考三十六年聖駕東巡増廣山東學額一次大學加取五名中學加取四名小學加取三名嗣覆准山東省遵奉恩詔増廣學額查靈山衛業已歸併膠州並非各為一學且於乾隆十六年減去進額三名若膠州既照大學例増額五名靈山衛復照小學例増額三名未免浮濫應於膠州増額五名内酌與靈山衛一名又禮部議准雲南之永北䝉化景東三府各改為直𨽻㕔仍照原額各取進文生二十名武生二十名原設廩増及出貢年分俱毋庸裁改元江府原額文武生各二十名係與他郎通判合取今改府為直𨽻州他郎改歸普洱府應將元江直𨽻州學額改為文武生各十五名廣西府原額文武生各二十名係與五嶆通判合取今改府為直𨽻州五嶆改歸曲靖府應將廣西直𨽻州學額改為文武生各十八名所減二名作為五嶆之額撥歸曲靖府元江廣西各原設廩増各四十名今改為三十名三年二貢鎮沅府原額文生十名内有威逺同知撥入二名武生八名今改府為直𨽻州威逺改歸普洱府應將鎮逺直𨽻州學額改為文生八名其武生八名及廩増額數出貢年分俱毋庸議改普洱府原額文武生各八名今威逺撥歸文生二名他郎撥歸文武生各五名應増為文生十五名武生十三名原設廩増各八名今増為十二名二年一貢武定府原額文武生各二十名係和曲禄勸二州及元謀縣分撥今改府為直𨽻州裁汰同城之和曲州應將和曲州本額文生十二名并撥府十名武生八名并撥府十名歸入武定直𨽻州仍照大學之例定為文武生各二十名武定原設廩増各四十名今改為各三十名三年二貢至禄勸州改為縣本額文武生各八名并撥府文武生各六名應定為禄勸縣學額進文生十四名武生十四名原設廩増各三十名今改為各二十名二年一貢元謀縣本額文武生各八名并撥府文武生各四名應為文生十二名武生十二名原設廩増及出貢年分俱毋庸議改姚安府原額文武生各二十名係撥姚州大姚縣文生各八名白井文生四名撥姚州武生十一名大姚武生九名今該府既裁應將府學原額酌歸姚州大姚縣文生各八名武生各八名白井文生四名武生四名姚安府原設廩増應行裁汰姚州大姚白井各原設廩増及出貢年分俱毋庸議改鶴慶府原額文武生各二十名今改府為府屬州仍取進文生二十名其武生二十名應改為十五名原設廩増各四十名今改為各三十名三年二貢彌勒師宗建水三州今改為縣彌勒縣照原額取進文武童生各十五名師宗縣照原額取進文武童生各十二名建水縣照原額取進文生二十名武生十五名彌勒師宗建水各原設廩増各三十名今改為各二十名二年一貢順寧府原設文武生各二十名今新設首縣應將府學裁去文武生各八名作為順寧縣學府學原設廩増各四十名今改為各三十名三年二貢麗江府原額文武生各十五名今新設首縣應將府學裁去文武生各七名作為麗江縣學府學原設廩増各三十名今改為各二十名二年一貢順寧麗江二縣均設廩増各十名四年一貢各府州所裁廩増應歸於現在所𨽻本籍作為候廩候増嵗科兩試各按考案新舊間補又議准生員代人作證經地方官審係全誣則故攖法網較之尋常包攬者其情尤重應行詳請禠革即照教唆詞訟本罪上各加一等治罪如計贓重於本罪者仍照律以枉法從重論其訊明事屬有因並非揑詞妄證者雖證佐確鑿而以全無闗渉之事出入公庭其平日不能讀書自愛已有明騐亦應將本生嚴加戒飭倘再犯案申詳黜革又議准陜西學政劉墫奏稱山陜之樂户江浙之丐户雖編籍由來無不確據而其相仍託業實屬卑汚雍正元年因御史年熈噶爾泰先後條奏准令除籍改業得為良民正所以杜其邪僻之路非即許其厠身衣冠之林嗣後應酌定限制如削籍之樂户丐户應以報官改業之人為始下逮四世本族親支皆係清白自守方准報損應試該管州縣取具親黨里隣甘結聴其自便若僅一二世及親伯叔姑姊尚習猥業者一槩不許僥倖出身其廣東之蛋户浙江之九姓漁户及各省凡有似此者悉令該地方官照此辦理所有從前冒濫報捐各生均行斥革又議准奉天復州學額自雍正十二年為始照小學例取進八名蓋平廣寧二縣學各取進二名今復州應試僅三十餘人蓋平廣寧二縣應試自三十餘人至五十餘人不等各學額數未昭平允應將復州原額八名照遼陽寧逺二州之例改為五名即以復州所減三名撥増蓋平廣寧各一名仍餘一名歸入奉天府學令該府丞於府屬州縣内撥取武童亦照此例辦理再復州原設額廩増各五名較之遼陽寧逺二州尚少二名應仍其舊又議准湖南衡永寳辰郴靖等府州所屬猺童向例另編字號於正額外各量取一二名嗣於雍正三年因額少人多定議増為三名今永州府屬之東安永明二縣毎試猺童不過數人而寧逺縣則有百餘名多寡懸殊應將東安永明猺童進額各減二名定為一名至寧逺縣應試猺童既多應於東安永明二縣所減四名内酌撥二名作為定額五名三十七年貴州巡撫李湖奏黔省書院掌教張甄陶由編修改授雲南昆明縣嗣在雲南五華書院掌教五年經前督臣劉藻奏明移為貴山書院掌教已滿六年克著成效應照五華書院掌教孫見龍例議叙給與八品官職銜從之又議准河南内黄縣應試童生僅三百餘人湯隂縣應試童生六百餘人文風較勝應將内黄進額裁減三名増入湯隂縣兩學額數均各取進十五名又議奏盛京學宮毎嵗春秋祭祀沿用民間鼔樂於文廟定制有違請令該府尹等將需用樂舞等噐按照欽定皇朝禮噐圖如式製造其額設樂舞生照闕里之例酌選稍通音律者送太常寺肄業俟熟諳時咨回本學令其轉相𫝊授從之又議准定例娼優𨽻卒之家不准考試其皂𨽻馬快小馬禁卒之子孫有朦混捐納者俱照例斥革至門子長隨湖南省有濫行報捐者均予斥革惟民壯一項雍正年間先後議准各省民壮原為捍禦城署倉庫而設應停其承緝盗犯耑令學習武藝其中有技藝可觀者准挑入營伍漸次考拔是民壮既與兵丁一律拔補自非賤役可比應不便阻其進身之階但各省俱有皂快民壮三班隨時改撥者應令地方官查明除未經改撥之民壮子孫准其報捐應試外其由民壮改充皂快及其先曽充當皂快者仍不准報捐應試以杜冒濫又議准奉天府屬滿合生員散居各州縣者於雍正五年議令撥歸各該學與民籍諸生一例収管所有現在滿合諸生居址應即交與該將軍查造清册咨送府丞其補廩補増出貢等項由府丞查明檄行各該學申送仍令奉天府學照例註冊於各名下註明某州縣字様送部查核三十八年禮部議准湖南省庫子斗級據該撫查明係選擇質樸殷實農民承充與皂隸馬快禁卒門子等役不同其子孫應照民壯之例一體報捐應試如有先後改充皂快禁卒門子等役者應仍照例不准報捐應試得㫖允行又議准廩生報劣照