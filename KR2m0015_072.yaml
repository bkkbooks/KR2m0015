題定後再為分撥又改定迪化等州縣學額迪化州改為直𨽻州寧邊州同改為昌吉縣其所設學額嵗科兩試准其各取進文童四名嵗試取進武童四名令陜西學政按臨肅州之前將題目密送巴里坤道嚴行扄試仍將試卷封送學政按額取進再迪化州改為直𨽻州寧邊州同改為昌吉縣已不由鎮西府管轄其文武生童無撥府之例應將該州縣應試童生照額取進各歸本學収管毋庸酌撥府學又増減福建屛南古田學額文武入學額數以八名留古田八名歸屛南廩増各二十缺亦均分兩學嗣因屛南童生稀少復議准古田童生報名寄考謂之寄屛取進四名其屛南本籍童生謂之正屛亦取進四名廩増十缺各半分撥但正寄相雜恐滋冒考之弊應將寄屛進額四名撥歸古田縣准其嵗科兩試各取進十二名廩増各十五名屛南縣取進四名廩増各五名俱作為定額刪去正寄字様再古田二縣廩生從前照分學之例兩縣輪流二年一貢今既分𨽻各學所有古田縣廩缺較多應改為三年兩貢其屛南廩生五缺照該省小學例定為四年一貢又議准蘇州府學増生季秉徳於乾隆三十年聖駕南巡時獻畫考取進京在内廷行走經前院以遊學註冊欠考三次該生現在丁憂回籍又難補考若照例除名則該生實屬辦公與尋常遊學欠考者不同應於學冊内註明因公欠考字様俟服闋後再行補考又議准向例生員已成痼疾及年屆七旬者准給衣頂免其補考其欠考數次並未載明但此項病廢生員與有心規避者有間其廢病日久既不能希冀痊愈雖欠考二三次尚非託詞展限可比應照例准給衣頂免其補考四十一年熱河地方設立義學每㕔一處延請品學兼優之士分司訓課是年上東廵諭朕因兩金川耆定恭奉慈輦東巡修在泮獻功之典首自近畿覃敷愷澤膠庠樂育並宜一體加恩著將直𨽻本年入學名數大學増額五名中學増額四名小學増額三名該學政其悉心校録甄拔殊尤副朕加恵士林至意又諭兩金川現已勦平獻俘奏凱稽典東巡告功在泮業已恩施疊沛慶洽羣黎更念齊魯諸生户盈弦誦地切近光當此武功大定之時更宜加恵膠庠式敷教澤所有山東省本年入學名數大學著増額五名中學増額四名小學増額三名該學政其悉心蒐録遴拔真才副朕樂育人材至意定安徽衛籍丁童歸各土著州縣報名收考管束先是江蘇等省衛所軍童各歸坐落州縣收考今安徽衛籍丁童亦由各土著州縣收考但不論離衛逺近由衛報明移送各州縣丁童考試既歸各州縣不便於臨考之前復令其赴衛報名應令各衛将本管軍籍預行造具户口印冊移送土著州縣存案至考試屆期即令各本童徑赴州縣報名填註衛籍字様該州縣按照本衛原冊詳細核對如有本童隐匿衛籍及廩保扶同出結者照例治罪至取進衛童均撥入本州縣學以便管束毋庸撥入府學其從前由衛録取之廩増附生亦令填明衛籍改歸各土著州縣學冊諭朕毎嵗木蘭秋獮先期駐蹕熱河數十年來見該處户口日増民生富庶且農耕蕃殖市肆殷闐儼然成一都㑹惟弦誦之風未盛由於口外人多樸魯無所師承且未立學額更無以示鼔舞因思熱河各㕔所屬編氓及僑居年乆者其子弟應不乏秀良誠能教育而振興之未嘗不足以示造就自宜剏設義學延師訓課以勵文風并當建立學宫酌定庠額俾得藉以上進其如何興建籌辦各事宜著該督周元理悉心勘議具奏至學校章程并著㑹同學政羅源漢酌議奏聞副朕嘉恵塞民廣學毓材至意嗣據議准嵗科二考熱河一㕔每試取進文童四名其餘六㕔各取進文童二名如佳卷不敷寧缺無濫嵗考武童減半取進額定廩増各十六名以開考之年計筭俟十二年後始行出貢照例三年挨貢一名遇拔貢之年拔取一名又熱河本無土著凡流寓民人身家清白寄籍二十年者俱准考試各㕔查明申道轉送學政考取入學其有現在口外居住業於密雲等處入學者准其報明改歸熱河學冊其中有現係廩生應即令其各保本㕔童生如該㕔現無改歸廩生飭取地鄰保結俟該處補有廩生仍照例令廩生保結又熱河生童從前歸併密雲縣學厯年俱赴通州考棚應試今七㕔生童仍赴通州應試毋庸另建考棚俟將來人數日増再行酌量添建其鄉試之年一體編入北貝字號取中御製熱河文廟碑記丙申夏駐蹕熱河避暑山莊曹秀先以禮部尚書扈從幾暇召見談及時政秀先云臣春卿也在職言職以為此處宜興學校以造就士朕曰俞哉亦其時矣於是乎有設學之㫖於是乎有加額之恩學校既設則文廟亟宜建乃命相地伐材卜吉鳩工宫墻泮水殿廡禮樂一如制越二年已亥夏朕以來巡親釋奠而落成之夫熱河固自古闗塞以外荒畧之區也雖金遼有興州之稱然旋舉旋廢建置沿革率不可考而况有臯比之𫝊絃誦之聲哉是以我皇祖每年避暑於此亦不過名之曰山莊故有聚民至萬家之句盖於禮樂之興未免存待以百年之意今則耕桑日以闢户口日以滋幅員計之不啻數千里而版籍或逾十萬焉此而無學校以牖民迪俗豈宣祖猷揚聖化之道且今西域烏嚕木齊等處率置郡縣立學校以此較彼為尤近矣則兹文廟之建於時於地胥不可緩亦不待人之請而後行稱之曰熱河文廟者今雖升之曰承徳府從其朔紀其因也昔蘇軾作韓愈碑記云公之神之在天下如水之在地中予謂韓愈因文見道我夫子體道垂文韓愈之所因者即夫子之所垂而見猶待乎行體則其本也且水在地中尚需求而得之我夫子乃天之經地之義山之峙海之淵無日不在人人心目之中範圍曲成而不遺豈待穿鑿求之而後得然則木鐸之音孰謂不可覺斯民於闗外荒畧之區也哉又設立仁懐㕔學仁懐縣改設直𨽻同知専設學校其入學額數於遵義府仁懐縣兩學進額内各撥二名定為㕔學四名並將遵義府仁懐縣額設廩増缺内各撥四名定為㕔學廩生八名増生八名至出貢年分照永豐州等學之例四年挨貢一名俟十二年後選拔之期拔取一名如無文行兼優之士照例寧缺毋濫又設立水城㕔學時以平逺州所轄之時豐嵗稔崇信三里撥歸水城通判管轄該㕔舊轄二里額定進學二名附入大定府學平逺州舊轄九里額進十五名今以三里裁歸㕔學亦應裁去州額三名即於該㕔所轄五里内定為額進五名附入府學嗣於乾隆四十二年議准平逺州廩増各撥六名作為水城㕔額缺歸入大定府學又更定兩淮商籍額數時以兩淮商籍額多人少不應仍照原額取進亦不便以商竈之額攤入民額致啟混淆酌定商竈毎十名各取進一名其尾零過半者亦准取一名照例附入揚州府學嗣後商竈倘人文復盛仍於原額内通計酌取總不得過原額二十名之數以示限制仍令該學政毎屆考竣之期開造清冊並將商竈應試各若干名即於文内聲明呈送禮部查核如考試童生雖與取進額數相符而佳卷不敷寧缺毋濫山東省増撥濟寧臨清二直𨽻州學額時以兖州東昌二府分出濟寧臨清二直𨽻州并州屬各縣應於兖州府學額内以二名撥入濟寧州東昌府學額内以二名撥入臨清州其廩増生員與各本州縣生員照考案先後挨次間補較其食糧年分一體出貢其嵗科兩試文武童生由本州考取徑送學院考試濟寧州屬之汶上等三縣臨清州屬之武城等三縣各文武童生由縣考定送州覆考轉送學院按試録取並於各該州城另建考棚其未建考棚之先暫附兖州東昌二府考棚應試甘肅省設立竒台阜康二縣學時以甘肅特納格爾等處改設竒台阜康二縣専設學額嵗科兩試竒台阜康二縣各取進文童四名嵗試取進武童四名竒台縣係鎮西府管轄應照内地之例撥入府學文童一名武童一名竒台與宜禾縣並𨽻鎮西府定撥府學額三名其阜康縣係直𨽻迪化州管轄取進文武生童各歸本學收管毋庸酌撥府學學政按臨肅州之前將考試文武生童題目密送鎮西府并巴里坤道嚴密扄試封送學政按額取進如試卷不能足額照例寧缺無濫其武童外場亦由該府㑹同巴里坤鎮考試照例辦理四十二年禮部議准雅州府科嵗連考四川雅州一府生童徃返險阻該學政咨請嵗科連考准為定例又議准各省廩生按照年分挨次出貢其平時有無縁事戒飭之案原應分别核辦應行令各省學政嗣後廩生内有詞訟牽連經地方官審明申詳督撫發學戒飭者即將該生出貢之處扣除註冊仍將原案呈報禮部查核四十三年申嚴地方官子弟親族冒占商籍并裁倂各省商籍設立鹵字號各事宜先是四十三年因紹興府通判張廷泰引見奉㫖飭令冒籍人員自行呈明改歸本籍毋許隐匿不報嗣後倘有牽混入籍不准再請改歸照例斥革治罪嗣有潘鷺杭光晉俱籍𨽻浙江均係現任濟寧州知州藍應桂之婿冒占山東運籍入學中式後又不遵例改歸仍以山東商籍赴京㑹試實屬顯違例禁應行斥革仍照違制例杖一百再定例現任官員令子弟冒籍者革職藍應桂現任山東官員明知伊婿等冒籍並不禁阻又不勸令改歸實屬瞻顧親誼應請㫖革職潘鷺之父潘汝誠曽任山東濮州知州潘鷺入學乃不令據實呈報改歸應交部議處嗣後凡有商籍省分之各督撫學政飭屬嚴查商籍内有本省現任地方官之子弟親族在彼冒籍者除本人斥革外將該員查㕘革職其已經離任後尚有子弟親族在彼冒籍者查明斥革仍將該員議處至並無父兄在該省居官僅有商人招引冒籍者俱著自行呈報改歸如敢隐匿查出斥革查辦之後仍有冒籍别經發覺者原查之督撫學政及該管各官交部議處嗣後止許領有鹽引合例官商之親子弟姪應考併於結内三代下註明現行何地引鹽及住居地方以憑查核倘不敷學額寧缺無濫奉㫖藍應桂僅予革職尚不足以蔽辜著發往軍臺効力贖罪又是年續經御史戈源㕘奏孫履謙原籍常州陽湖縣人入籍宛平縣進學中式本年二月到京場期已迫未及呈改仍以順天籍中式進士孫履謙雖無父兄戚屬在順天居官較潘鷺杭光晉有間但並不遵例改歸朦混應試顯違例禁未便照自行呈明之吴煥胡秀森辦理應全行斥革以示懲儆皇上詣盛京恭謁祖陵將盛京滿合二號及奉天所屬各學科考廣額一次其向取進六名以上者増額三名四五名者増額二名二三名者増額一名禮部議覆直𨽻總督周元理奏長蘆商籍厯年應試文童不過二十七八名武童十六七名計十名取進一名文童定額三名武童定額二名又商籍生員毎科五十餘名應照從前另編鹵字號五十名取中一名人數雖多不得過二名之額不及五十名不准取中至順天鄉試房考閲卷有南北互相迴避之例應交該督將鹵字號應試者預查原籍咨報順天府臨場令内簾迴避併造冊送部以憑磨勘時查核至竈籍一項住居已久與土著無異應照舊歸入北貝字號應試又議覆山西巡撫覺羅巴延三奏山西運學舊額進二十名雍正九年減去八名額進十二名兹據奏山西有坐商運商二項坐商置有畦地錠票澆曬鹽觔本年文童一百九十七名内籍𨽻朝邑及解州平陸等縣者僅十一名籍𨽻安邑者一百八十六名若非専設運學則此項坐商當全歸安邑勢必多佔民額其運商係本省殷户出資轉運共五十五名其中兼置畦地者五十二名未置畦地者止餘三人向係附運報考應仍一體附考俟五年更换後移回本籍運學進額酌減二名取進十名武童酌減八名取進四名鄉試毋庸另編鹵字號四十四年奉上諭熱河自皇祖建立山莊以來迄今六十餘年户口日滋耕桑益闢儼然一大都㑹禮樂百年而後興此正其時曽於丙申秋降㫖添設學校書院加廣庠額以教育而振興之並相地鳩工建立文廟兹鑾輅來巡適屆落成親詣行釋奠禮宫庠泮水間青袍環列彬雅可觀從此文化益當蒸蒸日盛苐現在庠生已有五十餘人均應與順天鄉試雖丁酉科曽經中式一人但邊外士子樸魯者多恐尚未能與通省貝字號卷校藝獲售著加恩照宣化府之例另編承字號毎科鄉試取中舉人一名俾士子知上進有階愈加鼓舞俟將來文風漸盛人數多至百餘名該督臣學臣再行奏聞増額以示嘉恵上塞士林多方樂育至意御製文廟釋奠禮成有述聖祖於斯避暑曽養恬樂利被黎蒸閭閻此日較前盛禮樂百年以後興爰建廟堂欣慶落載因釋奠仰依憑菁莪雅化㨗影響已有庠間俊秀升禮部尚書曹秀先奏請頒發熱河學宫書籍聖祖詩文全集世宗詩文全集皇上御製文初集御製詩初二三集及武英殿刋刻御纂欽定書籍詩賦時義各編照直省學校之例一體頒發送至熱河貯文廟之尊經閣從之又議覆江蘇巡撫楊魁奏本年商籍報考人數合例者止有張鏻一名請將學額酌留四名仍照童生十名取進一名之例以為定制不及十名之數停其收考其鄉試之人毎科多則十二三名少則六七名不敷另編鹵字號請併入民卷取中所有雨淮商學應行裁汰此後如果人文日盛該撫等不妨隨時據實查奏再行設額其鄉試現在人少此後缺額既裁自不能另編鹵字號取中有願改歸本籍者准其改歸其與入籍之例相符者准其在江南入籍又竈籍童生與土著無異請改歸民籍應將該省竈籍學額六名裁汰歸各州縣民籍考試又議覆山東巡撫國泰奏東省商籍文武原額各進八名今奉新例本省商人改歸本籍人數較前愈少請額減一半各進四名如不敷取數寧缺無濫等語查商學進額亦須約計人數核實辦理若不查明槩為減半恐原額本多議減尚少嗣後交該撫等查明實數以十名取進一名如果有四十名方准取進四名即人數再多不得過額入學後另編鹵字號鄉試如中額不敷有願改回本籍者遵照原奏辦理又議覆陜甘總督勒爾謹奏甘省寧夏府商學額進文武各八名該府地處邊隅向係平凉慶陽二府屬及寧夏屬五州縣人合夥充商並無外省承充之人間有一二山西陜西人幫辦鹽務俱係三府屬商人出結一同應考毋庸另設學額應將寧夏商學裁汰均令改歸原籍又議准署理兩廣總督李質頴奏粤省向編立鹵字號雖數百人止取中一人現在别省真商子弟姪存粤應考者七八十人應酌定進額七名如人數不敷寧缺無濫鄉試另設鹵字號於民籍外另設中額如人數不敷不准取中亦無庸併入民卷其有情願改回本籍者聴浙江巡撫王亶望奏請將浙省商籍學額五十名全行裁汰諭浙省商籍與長蘆山東情形不同該省人文本盛應試人多本地之人藉商籍登進者十居七八其中人材輩出頗有用至大僚者是浙省商籍即仁錢士子進身之一途朕所素知若一旦全行裁汰名為嚴核商籍童生實則暗減杭城學額寒畯不免有向隅之歎况商籍所以清釐者原因該省地方官或私令子弟至親冒名入籍以冀倖進實為積弊不可不嚴查究治此外如實係冒濫者有犯必懲其餘則不必因噎廢食預申厲禁朕從不為已甚之事何必獨於此加嚴以抑士氣乎且浙江商籍學額相沿已久向亦未聞其有弊竟可毋庸更張朕以為浙江商籍學額竟可仍舊辦理但令該撫等隨時查察勿使有倖濫等弊足矣尋九卿議奏浙省商學向撥杭府仁錢三學凡廩増出貢中式即佔仁錢之額其中人材輩出誠如聖諭與長蘆山東情形不同未便議請裁汰應遵㫖照舊辦理其現在行鹽及商人後裔一併收考至商籍各生既入杭府仁錢三學即與民籍無異鄉試照舊散入民卷取中不必另編鹵字號得㫖允行臣等謹按各省商籍俱從酌量減額裁併惟浙江商籍欽奉恩㫖照舊辦理所以嘉恵浙省士子者至矣四十五年上南巡増廣江蘇安徽浙江三省學額一次大學加取五名中學加取四名小學加取三名四十七年諭朕稽古右文究心典籍近來命儒臣編輯四庫全書特建文淵文溯文源文津四閣以資藏庋現在繕寫頭分告竣其二三四分限於六年内按期蕆事所以嘉恵藝林垂示萬世典至鉅也因思江浙為人文淵藪朕翠華臨莅士子涵濡教澤樂育漸摩已非一日其間力學好古之士願讀中秘書者自不乏人兹四庫全書允宜廣布流𫝊以光文治如揚州大觀堂之文滙閣鎮江金山寺之文宗閣杭州聖因寺行宫之文瀾閣皆有蔵書之所著交四庫館再繕寫全書三分安置各該處俾江浙士子得以就近觀摩謄録用昭我國家藏書美富教思無窮之盛軌臣等謹按國家文治覃敷士敦實學我皇上幾餘念典特命儒臣編輯四庫全書建文淵文溯文源文津四閣以資藏庋又以江浙為人文淵藪復命繕寫全書三分於揚州大觀堂之文滙閣鎮江金山寺之文宗閣杭州聖因寺行宫之文瀾䦨各貯一分俾士子得以就近觀摩以照嘉恵藝林之至意此誠千古以來文教之隆未有如今日者也臣等謹於學校門恭載諭㫖以見皇上稽古右文之盛至於採訪遺書及全書目録俱詳載經籍門焉四十八年皇上詣盛京恭謁祖陵盛京滿合二號及奉天所屬各學嵗考廣額一次其向取進六名以上者増額三名四五名者増額二名二三名者増額一名定順天府四路二十二州縣照大宛兩縣例歸府丞考試向例順天府所屬各州縣童生於該州縣考試録取後大興宛平二縣則由順天府丞考試其餘各州縣則由四路同知各按所管於駐劄地方考試至是尚書兼管府尹胡季堂奏稱該同知各處衡要之地遇有要事公出往往稽遲試期所有四路二十二州縣請一體責令府丞考試令各屬童生即赴通州考棚該府丞尅期前往就棚考試至府丞試畢正屆學政考期士子即於該處應試既無似從前先赴各路府考又赴通州院考往返道路之煩而該處原有考棚無庸另為籌辦亦與保定等府體制畫一從之諭盛京為本朝根本重地兵丁皆知恪守舊風嫻騎射以裕武備現亦校閲分别賞賚其讀書之士亦漸摩文化蒸蒸日盛堪與畿甸比隆朕鑾輅所臨青衿獻詩趨迓絃誦彬彬且見膠庠樂育自宜一體加恩用彰作人盛典著將盛京滿合二號及奉天所屬各學嵗考廣額一次其取進六名以上者増額三名四五名者増額二名二三名者増額一名該府丞其悉心校録甄拔殊尤副朕加恵士林至意四十九年上南巡増廣江蘇安徽浙江三省學額一次大學増取五名中學増取四名小學増取三名五十年酌定隨棚投考出貢事宜大學士九卿議奏湖南學政錢灃奏稱嗣後考貢概令無須逺出嵗科兩試各就本棚投考除本年考本年者無論外其有下年始輪應貢而計下年按臨不復至者准其預考有本年應貢而本年按臨不及者准俟下年補考給發貢照時仍按應貢本年填註報部應如該學政所奏辦理惟學政按臨一屬不過匝月該生等難保無患病事故致悮本棚考試應仍准其隨棚投考以示體恤但須明立限期無論預考補考均以學政按臨之期定限一年違者不准出貢至該學政奏稱永順一府最為窵逺例嵗科兼試二年一貢通計六年三貢前後按臨兩次則此次一貢下次兩貢亦係酌量變通之意應如所奏辦理各省有嵗科並考之處其出貢年分不一應令各該學政就該省所屬道里逺近酌量核定報明禮部存案得㫖允行是年増減湖南鳯凰乾州等㕔學額大學士九卿議覆辰州府屬之鳯凰乾州三㕔量為酌改學額請將鳯凰㕔原額八名減去二名仍留六名永綏乾州二㕔原額各八名各減去四名仍留四名其武童取入名額亦照此數至所減各額請照該省苗疆新童之例於鳯凰㕔所減漢童二名改設新童二名永綏乾州二㕔各減四名亦各改設新童二名仍照例寧缺無濫衡州府附郭之衡陽清泉二縣文風久為出色而入學名數較少請將永綏乾州二㕔所減學額二名撥増衡陽清泉二縣各取進文童十二名又請衡陽清泉二縣遇選拔之年於二縣内酌取一人今二縣實有讀書上進之士請將共技一人之例量為酌變得㫖大學士九卿議覆學政錢灃酌定苗疆學額内衡陽清泉二縣遇選妆之年仍照舊例於二學内酌取一名但念該省為民苗雜處之地而衡陽清泉二學既據該學政奏稱烟戸錢糧稍多且文風較為出色自應隨時量為酌變著照所請准其於選拔之期各拔一名以示鼓勵陜甘總督福康安烏嚕木齊都統奎林奏請巴里坤自三十八年設學以來因道途遥逺學政將試題密封發往考試從前責成該處道員辦理後改歸府嗣於四十四年前任總督㑹題統歸烏嚕木齊都統扄試俱於考後將試卷密送學政按額録取鎮西府屬生童自改歸烏嚕木齊都統扄試之後嵗科兩試往返長途資斧不繼並有因此不能赴試者請仍復舊制將鎮西府宜禾竒台二縣生童就近歸府扄試從之皇朝文獻通考卷七十二
