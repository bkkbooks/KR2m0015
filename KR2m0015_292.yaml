body:
  text: 欽定四庫全書皇朝文獻通考卷二百九十三四裔考一臣等謹按大地東西七萬二千里南北如之中土居大地之中瀛海四環其緣邊濵海而居者是謂之裔海外諸國亦謂之裔裔之為言邊也三代以降中原幅􅊷視主德為廣狹四裔逺近亦隨時轉移懿惟我國家統一函夏四裔賔服列聖經營宅中馭外百餘年來聲教覃敷梯航洊至皇上繼承鴻烈平定凖夷回部闢疆二萬餘里前代號為冦敵者皆𨽻版籍重譯貢市規模益逺試舉今日四裔全勢揆之東則朝鮮日本琉球南則安南南掌廣南緬甸葫蘆及海中暹羅港口東埔塞宋腒朥柔佛亞齊吕宋莽均達老蘇祿文萊馬辰舊港曼加薩噶喇巴之屬更逺而為意達里亞博爾都噶爾亞英吉利干絲臘荷蘭佛朗機瑞國嗹國之屬西則東西布嚕特安集延霍罕納木干瑪爾噶朗塔什干巴達克山博羅爾愛烏罕之屬北則俄羅斯左右哈薩克齊齊玉斯諤爾根齊之屬固已跨越四瀛之界廣逺綿邈什百前代矣考朝鮮在今兼有古髙句麗百濟新羅沃沮諸國帖心內面恭順有加日本當明時素擾內地今洋銅交市海波不揚至於西陲新附諸部踰蔥嶺來玉門不待招徠顒顒向風恐後咸切尊親自非聖德洋溢曷克臻此抑臣嘗稽之書傳志外藩者司馬遷大宛傳所云旁有五六國者皆得自傳聞唐書西域傳半採釋氏西域記並無朝貢之實何關藩服之義又其甚者元史西北地附録八十餘國名號徒存方隅莫辨至於地名沿革紛如尤難縷指馬端臨通考以三韓為南接倭國今朝鮮南境濵海接日本豈以三韓為朝鮮耶考遼史遼陽府有辰州以辰韓得名是三韓即今寧古塔東北吉林烏拉地相傳已久無可致疑而以為南接倭國不足據矣後漢書東夷傳稱韓有三種遂以韓為部落之名第考韓與汗音相近汗者君上之稱譯音輾轉或為可汗或為可韓或為克韓則三韓疑即三汗轉音猶云馬王辰王辨王云爾又如堅昆為唐回鶻别部見唐書回鶻傳中舊說即今之俄羅斯亦無確據臣等參核舊志折衷聖論往昔淆訛均為訂正是惟當國家頓紘一軌之時萬國車書見聞倍確爰舉獻琛奉朔及互市諸國稽其山川風俗之未登曩乘者著為斯考仰見我朝聲教暨訖之逺諸藩部傾心內附之誠惟聖天子無外之量足以涵之也馬考舊分東南西北四面王圻續考增東南西南二面分𨽻之處悉多牽率今南洋諸國由南方迤及西南日本琉球由正東迤及東南新附布嚕特安集延巴達克山愛烏罕諸部由西北而及正西皆壤地相接難為強晰爰以環瀛之大總分四正方位云東朝鮮一朝鮮為古營州外域箕子始封其地漢末改稱髙麗明洪武中從其國王李成桂請復今名其建置沿革備詳前考我太祖髙皇帝肇興東土附近諸部落以次服屬朝鮮北境與我接壤猶納貢於明上亦未之較也天命四年三月朝鮮以兵助明與明海蓋道康應乾兵合營富察之野我師與戰大破之是時貝勒阿敏等方擊敗明遊擊喬一琦兵一琦奔朝鮮將姜宏立營我師攻之急宏立不能支來告曰此來非吾願如撫我當歸順衆貝勒諭之曰若降當令主將來宏立盡執明兵擲山下一琦自縊宏立率兵五千降上留宏立遣其部將張應京等還國是時國王李琿成桂十世孫也立十一年矣上因以書諭琿曰爾以兵助明吾知非爾意也迫於其勢有不得已且明曾救爾倭難故報其恩爾原與我國無仇今擒爾統兵官屬十人念王之故特留之王其與我合謀以仇明耶抑既已助明不相背負耶其詳告我十年正月朝鮮國韓潤偕其姪韓義來歸上以潤為遊擊義為備禦官天聰元年正月命貝勒阿敏率師征朝鮮先是富察之役朝鮮復書無稱謝語我軍征瓦爾喀復出境拒我烏拉貝勒布占泰我朝之姻也屢侵朝鮮以上諭故息兵亦不報謝太祖髙皇帝上賔不遣使弔問以是諸罪聲討正月壬午大軍薄義州克其城殺府尹李管等判官崔鳴亮自殺留兵千人守之翼日攻定州獲牧使金搢斬宣州副使竒協丙戌克漢山城獲郡守朴田建留兵五百人守之戊子大軍渡江克安州牧使金浚兵使南以興赴火死殺郡守張憞等居民安堵癸巳次平壤城城中官民悉遁甲午師次中和是時國王李琿廢姪李倧代立三年矣惶遽甚遣使求成貝勒阿敏責數其罪二月壬寅軍至黃州癸卯逼王京倧挈子遁江華島長子􅓭遁全州甲辰我軍自平山進發倧復遣使來告曰敝邑無所逃罪惟上國命是從願悉索土物以獻倘延社稷實同再造自克安州後求成之使絡繹至是遣副將劉興祚往江華島諭倧駐營平山以待之倧遣族弟原昌君李覺等偕興祚來請罪乃許之獻馬百虎豹皮百綿紬苧布四百布萬五千於是遣劉興祚巴克什庫爾禪往江華島涖盟三月庚午刑白馬烏牛誓告天地和議成上遣使諭阿敏曰朝鮮既經和好毋得秋毫擾纍阿敏復與李覺盟於平壤上命分兵駐義州大軍振旅而還四月李覺隨大軍入朝召見賜宴五月遣歸國上御殿賜倧駝馬雕鞍等物覺及從官俱賞賚七月倧遣副將沈正笏等獻方物齎書來謝并請撤還義州駐兵遣國舅阿什達爾漢等往報之九月上命鎮守義州將士還歸其城於朝鮮并許贖所俘人民十月倧遣使來謝獻方物十二月命參將英俄爾岱往諭通市二年二月開市中江倧獻米二千石别具千石供市糴八月倧遣侍郎鄭文義等來貢三年正月遣使吳希楠來貢九月遣使來貢四年二月遣使朴蘭英來貢八月遣使吳希楠來貢五年正月遣使朴蘭英來貢先是朝鮮春秋貢方物俱有定額及是額漸減却之仍賜賚如例命英俄爾岱以人參詣蘭英館賜倧蘭英辭曰未蒙納貢何敢受賜英俄爾岱曰不納貢者以爾渝盟減額故也蘭英曰以我貢物為減貴國賜物不亦減乎英俄爾岱怒曰曩爾助明侵我致我興師問罪爾王竄入海島我國寬大俾得返疆土爾等願效職貢今敢作較量語耶蘭英懼謝罪上聞之留蘭英子並偕來之李必章俱不遣遣阿朱户董納密齎書偕朴蘭英往責以違約減貢之罪三月倧遣使魏廷采來補貢春季方物五月上將往征明之南海諸島遣滿達爾漢等齎書使朝鮮調兵船使至其國留三日乃見倧覽書曰明國猶吾父也今征吾父之國豈可相助船殆不可借也閠十一月上以朝鮮國人潛入我境竊參獵取禽獸又殺我國人互市勒價奪取馬匹牲畜隱匿我國罪犯漸減歲貢額數遣巴克什庫爾禪等往諭貢獻毋違定額有逃往者察明送還十二月巴克什庫爾禪等還奏言倧已聽命是月倧遣使張翼貢元旦方物復缺額六年正月遣使臣歸國遺書責之九月倧遣朴蘭英來朝貢春秋方物上遣滿達爾漢往弔李倧祖母喪十一月倧遣副將溫樞紀來貢謝恤弔恩先是遣巴都禮察哈喇等使朝鮮頒定貢額至是還奏言李倧于所定貢額止供什一金銀牛角非國所出不肯應命上命部臣逐朴蘭英還併却貢物七年正月倧遣侍郎申得淵來貢方物並齎書言新定貢額比前十倍地之所生敢不如命其非土産願賜豁除得淵還上賜以書曰乃者爾國貢物數少質惡是以此番所定額數較多倘以新定之數不能一年兩貢可以一次為期如依朕言往來如故不然一切遣使俱宜停止但互相交易可也若云金銀緞帛非國所産則爾與明人交易往來不絶中國所有爾亦有之朕豈不知之耶爾若惜財則當以兵助我征明一次以償侵我之罪再調大船三百助攻海島以償匿我逃民之罪誠若是則爾罪可免朕豈復向無罪之國索纎毫財物哉或助兵船或貢禮物王宜審思速定二月遣備禦郎格等赴朝鮮會寧城互市倧上書言方今兩國不通信使之時敝邦商賈裹足恐貴使虛行特為申告上賜復書曰朕前書言不必遣使惟行互市者蓋為爾國物漸惡又不遵議加增與其泛然遣使往來不如息兵互市故也今爾欲永絶互市是爾先啓兵端朕亦無如之何矣四月明元帥孔有德總兵耿仲明自海島以舟師來降遣使諭朝鮮協濟糧餉五月倧遣侍郎朴祿來貢六月令歸國賜倧黑貂人參朴祿等賞賚有差遣參將英俄爾岱等齎人參往朝鮮互市上賜倧書曰我國天賜戰艦不可輕棄故發兵守之道里遙逺輸挽為艱暫就爾處給之較為便易爾國視明如父輸粟者十次朕今既為兄獨不與一次乎貢物雖不足額若屢却恐乖兄弟之和以故收納至金銀牛角王既吝此三物已之可也其餘方物仍當如數王其熟籌之八月倧復書曰昨貴國使者來時登州叛黨方在江岸意實叵測雖䝉諄諭不敢聞命續知二叛已歸瀋陽獨貴國將帥在船即令發粟接濟矣又一書曰貴使到會寧已令商人平價買賣苐未知果能兩家滿意否至刷還逃人事事在約後者不敢容隱在約前者恐難聞命于是上遣溫塔石齎書諭倧曰我國得孔元帥耿總兵船繼又得旅順口船我統兵諸貝勒大臣俱云乘此舟楫盡𠞰諸島朕思島中所存不過羸弱倘復調東西南路之船揚帆前進恐爾國邊民驚避致誤農業以此罷用船之議今各島餘孽幸勿以糧濟之有願歸我者亦勿禁止又諭曰我索會寧逃人者蓋當兩國無怨無德時我嘗遷邊民於內地邊民與爾國人往來相善內遷時人畜財物不能攜取暫寄親戚之家者有之私自逃避者有之今乃物主各索其所寄耳王不可不遣發也九月倧復書曰自孔耿歸投貴國敝邦人咸謂二惡往矣必能離間兩國孤獨决其不然今見來書處置最明益信孤所期於貴國者果不虗也又一書曰會寧索人一事當兩國無事時或東或西聽民所往何足介意况布占泰在日於我兩國均為鄰敵其種類既投貴國敝邦前已將原係江北人一一刷送今復責刷于十有餘年之後其應刷與否尚祈鑒察上復遣英俄爾岱等往朝鮮互市並送所獲朝鮮盜參二人賜倧書曰自和好以來朕原欲一歲中四季互市爾國不允定以春秋二季後止在義州互市二次仍負約中止曩定參價一十六兩爾國云人參我國無用止給九兩既言無用乃每年出爾邊界入我疆土不顧罪戾採此無用之參何為乎至爾國之閉市得毋以我國衣服之需欲相困乎不知我與爾國未市前何嘗缺於服御遼東原自産棉我國仗義興兵臣服諸國筐篚之貢絲枲相繼故不以織布為意耳又一書曰布占泰來自䝉古乃蒙古苗裔瓦爾喀與我俱居女直地我發祥建國與大金相等是瓦爾喀人民原係我人民豈無故索取之哉爾試觀遼金元三史自曉然知朕索所當索也是月倧遣侍郎羅德憲來弔貝勒莽古爾泰喪賜德憲等鞍馬貂參十月英俄爾岱等自朝鮮還倧復附書申辨且言開市一事實緣國儲已竭島貨久虛無物充市願貴國諒之十一月遣英俄爾岱往朝鮮賜書切責仍諭兩國和好不相通市於理弗宜故遣英俄爾岱達意諸凡議論悉令口傳八年二月倧遣總兵官李士英來賀元旦貢方物是時朝鮮加築平安黃海京畿三道白馬等十二城三月士英等遣歸國諭倧令遣能臣赴會寧城議索還逃人事並令于互市時遣官評價嚴飭商賈勿斷布帛勿減紙張則兩國交歡釁端可杜是月遣英俄爾岱等往朝鮮互市並以欲與明國議和之意作書諭倧令倧轉達四月倧復書言貿易時敝邦商人將緞布短少紙張減數不勝惶愧已遣部臣查究矣貴國欲與明議和去歲明周都督來已經轉達至今未有成言兹當往告皮島令其再達八年十月倧遣侍郎羅德憲來貢賫倧書曰上年定約時止敝邦使臣之行例帶商賈以資兩國通貨乃者貴國使臣亦有所持貨物責貿於邊雖違前約猶不害理此外復有貴國差人持貨來市頗無限節自今春秋兩使外勿再賫貨來為久長計會寧開市不宜叠行以滋弊端又金愛守原非臨陳所獲自當見還前屢言此未䝉聽允恐損兩國和好之道餘言令使臣口禀上見書詞悖戾遣英俄爾岱等訊來使口禀云何德憲曰我王謂此後皇上遣去使臣撤其坐椅令坐於地在我國大臣之末英俄爾岱還奏上大怒不令朝見却其貢物留德憲不遣德憲有攜來商人貨物請仍貿易上許之以書令德憲遣人賫歸國諭倧曰初定約時每年四大市於義州交易朕遷居積至義州而爾國之物不至其後又約每年二次義州交易爾國復違之後又約市物與春秋使臣同來兩國遵行至今由此觀之爾國渝約則有之朕實未也又春秋使臣外我國遣人往市頗無限節者係何月日凡幾次係何姓名曷不明白開說而徒以空言傷和好果何謂也會寧開市恐滋弊端若與我國逃匿之民竊市反不滋弊端乎爾國人從慶興等處與朕逃民竊市已經察出似此弊端豈非起自爾國乎金愛守固非陳獲亦非我兩國通好後所遣來者王不過以此藉口欲不還我瓦爾喀逃人耳又欲令我使臣至國撤其坐椅似此七八年來成例而復議於今日守和議者果如是乎朕實有疑於此故以書問王若反躬自責速遣使來十二月倧遣使李廷顯齎復書至乃令前使羅德憲偕李廷顯朝見兩使跪獻倧書書中具陳引咎謝罪之意始命收納貢物是月遣户部承政馬福塔等賫書往朝鮮諭倧曰王今自知其過引為己責朕復何言惟會寧交市每逢使來動言無貨又每每竊市不知此貨更從何處得耶王熟思之九年正月馬福塔等還倧復書言會寧開市以北路地瘠民貧從事為艱非敢託辭也邊民潛商非縱之使為實禁之不得緣潛商民自主之故冒禁樂趨開市官為主之故聞風疑沮自今請各無遣官聽商民兩願為便三月倧遣總兵官李俊來貢令齎書還諭倧會寧之市若不遣官恐兩處人民滋事已令彼處首領官監市矣四月又遣馬福塔等往朝鮮報禮時朝鮮昌城官李翊縱人入內地捕魚獵獸為我巡哨者所執因賫書諭倧俟其國秋使來付之五月以朝鮮前遣往明國使臣歸途舟破存者三十四人漂入我境加恩收養遣珠瑪喇往諭朝鮮令具馬來迎六月馬福塔自朝鮮還倧以昌城越境人䝉許發還附書陳謝是月倧遣使來迎自明還漂失者並以書謝復書以收服察哈爾東海及戰勝明寧逺錦州諸捷音宣示之七月誅朝鮮盜參者十四人興京建寺宇佛像需用顔料遣董得貴等往朝鮮賫書諭倧給發不在互市之例並以倧權委臣下不能約束奸民屢次越境亂法責之八月執朝鮮盜參千總二人及所率四十九人九月倧以邊民違禁附書謝罪十月倧遣侍郎朴魯來貢上召見出所得察哈爾汗玉璽示之魯驚異稱賀曰真天賜之寶也是月遣馬福塔等往朝鮮報禮賫書諭倧曰王每言以信義為尚近見王毁渝前盟縱民入我內地採參捕魚禁商民不許以佳貨市我國又纍年禮物缺額巧言飾辭非善䇿也倧尋以書申辨十二月復遣馬福塔等賫書往朝鮮並責其上書不稱奉字故減人參價值助皮島漢人舟船米糧諸欺誑罪十年正月倧復書至略言書中奉與致均相敬之稱近文所稱不過無心所致參價隨時消長非不榖所能專皮島助米助船本無此事蓋妄言者之誤歲幣當勉力量增以盡誠禮二月遣英俄爾岱並馬福塔偕往弔其王妃之喪先是八和碩貝勒及外藩蒙古四十九貝勒以上功德隆盛議上尊號上堅拒不允內外諸貝勒等復屢表固請上曰朝鮮兄弟之國應與共議至是內外諸貝勒各修書遣使附英俄爾岱往八和碩貝勒書曰我皇上躬承太祖丕基臨御十年功隆德盛天與人歸我國諸貝勒文武大臣暨外藩諸貝勒察厯數之攸歸驗輿情而並協謹同集恭奉尊號上秉德謙冲拒而弗允今歲春正蒙古各部落諸貝勒俱來覲賀與我等復奉表堅請奉上諭朝鮮國王吾弟也宜令知之伏思我皇上恩威所屆各國歸順兼獲玉璽適彰符瑞王夙締盟好當同慶幸䝉古四十九貝勒書曰我等與明國交好二百餘年今非樂為背離也因明之諸臣欺詐姦詭䝉蔽其主明帝茫然不知以致人心解體將懦兵弱竊窺天意明數將終今我皇帝仁智兼全恩威並濟招徠異國愛育黎庶兼之將勇兵強所向無敵衆心願慕天眷有歸革命興邦知在此時况我蒙古各國散亂無統䝉我皇上誕布寬仁宏敷教化流膏沛澤淪浹萬民是以感激上恩每思捐軀報效去年與在內諸貝勒恭上尊號以答天心上拒而不允今十六國四十九貝勒會集盛京復與內諸貝勒議俱言皇上平服諸國玉璽呈祥天意祐助信而有徴因再合詞奏請上諭朝鮮國王吾弟也宜令知之我等謹遵上諭遣使相聞推戴之誠諒王素有同心也英俄爾岱等至朝鮮倧不見與內外諸貝勒書不納變易常禮詭令至彼議政府議又設兵防守英俄爾岱等疑之即率諸使者奪民間馬突門出倧聞遣人持報書追付又以書諭其邊臣令固守城垣預為設備且有丁卯年誤與講和今當决絶之語英俄爾岱等併奪之三月英俄爾岱還以書獻上覽書知朝鮮無歸附意命諸貝勒大臣共閲衆皆怒請興兵滅之上曰先遣人諭以利害令其以諸子大臣為質彼許則已否則再議征伐可也崇德元年三月我大清即以天聰十年改元崇德倧遣參議羅德憲等來貢上賜倧貂皮百五十使臣等賞賚有差並賜倧二書一書備數其背盟肆侮之罪一書令送子弟為質否則大軍臨境德憲等懼不敢以書歸還至通逺堡繳書於我守臣而去十月倧遣使臣拜米等齎書至上曰爾王既不閲朕書朕何復覽爾書却其書遣歸十一月上以朝鮮敗盟逆命將統大軍徂征率羣臣祭告天地太廟簡卒伍申軍律馳檄朝鮮官民聲罪致討十二月辛未朔外藩䝉古諸王貝勒各以兵來會命和碩鄭親王濟爾哈朗居守多羅武英郡王阿濟格駐牛莊備邊多羅饒餘貝勒阿巴泰駐噶海城集邊民防守壬申上親統大軍命和碩禮親王代善和碩睿親王多爾衮和碩豫親王多鐸多羅貝勒嶽託豪格多羅安平貝勒杜度等從固山額真等分右翼率諸軍上謁堂子禡旗啓行是日車駕次沙河堡命睿親王多爾衮貝勒豪格分統左翼滿洲蒙古兵從寬甸路入長山口癸酉遣户部承政馬福塔等率兵三百人潛師往圍朝鮮所都王京豫親王多鐸等率護軍千人繼之己卯遣貝勒嶽託等以兵三千濟師上率禮親王代善等大軍繼發庚辰渡鎮江壬午次郭山城朝鮮定州逰擊自刎郭山定州皆降乙酉次安州丁酉次臨津江先是江水冰泮不可渡車駕未至前三日天驟寒冰堅是日大軍安驅渡江衆兵無不驚駭而前遣馬福塔等以是月甲申抵朝鮮王京倧副將二人逰擊四人率精兵迎戰擊敗之有崔尚書李侍郎者迎勞城外設宴為緩兵計倧挈其長子􅓭潛棄京城遁馬福塔覺即督軍士駕雲梯登城上兵皆駭散我軍穿城追倧四十里倧遁入南漢山城時豫親王多鐸貝勒嶽託沿途已收服平壤城以是月丙戌與馬福塔合軍圍南漢山城三次擊敗外道援兵兩次擊敗城中兵原在朝鮮之瓦爾喀二百餘户皆來歸己亥上次王京城命固山額真談泰等率兵偕外藩䝉古兵入城搜𠞰上統大軍由城外徑渡漢江直抵南漢城西駐營益軍圍之二年正月壬寅貝勒嶽託擊敗全羅道援兵遣英俄爾岱等賫敇往南漢城諭朝鮮大臣翼日朝鮮閣臣洪某侍郎李某上書請罪甲辰大軍北渡漢江營於江岸距京城東二十里許丁未豫親王多鐸擊敗全羅忠清兩道援兵庚戌先所遣睿親王多爾衮貝勒豪格等率左翼軍入長山口攻克昌州擊敗安州黃州兵五百寧邊城兵千截殺赴南漢城援兵萬五千及是來會是日貝勒杜度送紅衣將軍等炮至言前至臨津江冰解復凝輜重坦度上曰禎祥洊至皆天意也癸丑倧奏書請成上不許降敇切責之己未倧再奏書請成庚申敇諭曰爾困守孤城屢詔切責方知悔罪再三上書求免朕開宏度許爾親盟所以命爾出城見朕者見爾誠心悅服欲加恩令永主爾國旋師以歸示仁信于天下耳若以計誘爾何以示信天下是絶人歸順之路矣首謀敗盟之人原欲盡誅方已爾果出城歸命先縛送三四臣正國法以警後人是日倧奏書稱臣具言感戴天恩傾心歸順但出城一節衆情震駭臣身若出雖䝉陛下恩德俾復主國而百官士庶必不欲戴以為君伏惟陛下哀憐至倡議敗盟諸臣昨年已加屏斥倘蒙大度付之小邦政刑之中益荷寬大之德初倧之棄王京而走南漢山城也先遣其妻子及其大臣家口遁居江華島島在開州南海中意大軍不能飛渡也上命睿親王多爾衮率兵造小船八十用車輪陸地曳行壬戌出渡口島中出大船三十餘艘分兩路拒戰為我紅衣大炮擊潰我軍徑登島岸擊敗迎敵鳥鎗兵千人遂入島城獲王妃一王子二家屬七十六人閣臣一侍郎一羣臣家口百六十六人置之别室令人護守禁毋侵犯王子與睿親王同處待以優禮甲子上敕諭倧告以江華島已克家室無恙令速遵前降詔書出城來見倧仍猶豫奏書求免出城丁卯倧又奏言臣奉二十日聖旨仰感生成歸附益切非不知絲綸之降皇天是臨而循省臣躬邱山罪積是以中心惶怖纍日徘徊今聞旋駕有日若不早覲龍光則微誠莫伸追悔何及苐臣方以三百年宗社數千里生民仰託於陛下情實可矜倘或事有參差不如引劍自裁之為愈伏望明降詔旨以開臣安心歸命之路戊辰解送倡議敗盟之宏文館校理尹集修撰吳達濟詣軍前敇諭倧曰朕覽來奏知爾欲保全宗社束身來歸且述二十日詔旨欲求信實朕詔已出寧肯食言既盡釋前罪將永定規則以為君臣世守之信義爾若悔過自新委身歸命子孫世守信義當去明年號納明所與誥命册印躬來朝謁爾以長子並再令一子為質諸大臣有子者以子無子者以弟為質爾有不諱朕立爾質子嗣位從此一應文移奉大清國正朔萬夀節及中宫千秋皇子千秋冬至元旦及慶弔等事俱行貢獻之禮遣大臣內官奉表爾與使臣相見及爾陪臣謁見并迎送饋使之禮毋違明國舊例朕若征明調爾步騎舟師刻期會集數目限期不得有誤今朕移師攻取皮島爾可發兵船五十艘大軍將還宜備禮物獻犒軍中俘獲過鴨緑江後若有逃回者執送本主若欲贖還聽從兩主之便蓋我軍以死戰俘獲之人爾後毋得以不忍縛送為詞爾與內外諸臣締結婚媾以固和好新舊城垣不許擅築爾國所有瓦爾喀具當刷送日本貿易聽爾如舊當導其使者來朝東邊瓦爾喀有私逃於彼者不得復與貿易往來若見瓦爾喀人便當執送爾以既死之身朕與生存保全爾之宗社復還所獲當念朕再造之恩後日子孫毋違信義則邦國永存矣朕見爾國狡詐反覆故降兹詔諭每年進貢一次其方物數目黃金百兩白金千兩水牛角二百對貂皮百張鹿皮百張茶千包水獺皮四百張青黍皮三百張胡椒十斗腰刀二十六口順刀二十口蘇木二百斤大紙千卷小紙千五百卷五爪龍席四領各樣花席四十領白苧布二百匹各色綿紬二千匹各色細麻布四百匹各色細布萬匹布四千匹米萬包於是倧以孤城困守妻子被俘八道離散旦夕城陷䝉上降敇赦罪許其歸降乃頓首受命庚午服朝服率文武羣臣獻上明國所給敇印出城歸順崇德二年二月禮臣於漢江東岸三田渡築壇設黃幄上出營旗纛森列奏樂渡漢江登壇升座設鹵簿如常儀將士皆環甲列隊倧率其羣臣離南漢山五里許步行令英俄爾岱馬福塔迎於一里外指示禮儀引至儀仗下立上降座率倧及其諸子羣臣拜天行三跪九叩頭禮畢上還座倧率其羣臣伏地請罪求我國大臣代奏言皇帝天心赦臣萬罪生已死之身存已亡之國自兹以後改過自新世世子孫不忘厚澤奏上上曰王既知罪來降朕豈念舊惡今後一心盡忠不忘恩德可也前事毋再言及倧及其羣臣大悅奏曰皇上恩德小邦不勝感戴上命李倧朝見禮臣贊禮倧在前諸子羣臣以次後列行三跪九叩頭禮畢禮部官還引至儀仗下立奏請李倧班次上曰以威懾之不如以德懷之王亦一國之主也令近前坐於左側禮部官從儀仗外引至壇下左側西向坐次和碩親王多羅郡王多羅貝勒等以次坐右側和碩親王多羅郡王多羅貝勒等以次東向坐倧次子淏三子㴭次貝勒坐賜宴畢江華島所獲倧妻子子婦及羣臣家口俱行三跪九叩頭禮命盡放還賜倧黑貂袍褂鞍馬王妃及其第三子㴭黑貂皮褂陪臣金􅣌等各賞賚有差倧率衆謝恩行兩跪六叩頭禮畢命倧及其羣臣各與其妻子相見俱相抱慟哭曰稍緩數日我等皆為灰燼幸遇皇帝寬恩得賜完聚上命英俄爾岱等護送朝鮮君臣家屬入王京留其長子􅓭次子淏為質二月班師倧率其羣臣出王京十里外跪送遣英俄爾岱等送之還倧復疏言積弱以來民散財竭所在懸磬貢額或非地産且力有不逮願察小邦危迫之私恢大朝薄來之度上遣范文程等傳諭曰爾被圍山城時已有成議今不當言爾國窮苦朕已知之丁丑戊寅兩年准免貢物己卯年秋季始照例入貢表爾忠誠朕自有定奪今非爾言時也是時大軍凱旋車駕所臨秋毫無犯朝鮮官民皆跪道迎送倧遣官解送倡議敗盟之臺諫官洪翼漢至三月洪翼漢尹集吳達濟皆伏誅四月朝鮮陪臣金友等送質子李􅓭李淏偕其大臣質子二人至遣都察院承政國舅阿什達爾漢等導入城賜金友等宴遣歸閠四月賜李􅓭李淏宴上御崇政殿召賜坐時䝉古貢竒獸并黑狐皮令􅓭等觀之傳諭曰此獸乃黃河外夏國所産千百成羣頗為難致黑狐皮乃東海使犬國所貢因逺方罕見之物故令爾等觀之􅓭等對曰此等異物但於書史聞之今始目覩以皇帝聖德普天之下凡珍竒之物無所不至臣以疏逺之人䝉皇上恩養何幸又得見異物食異味也五月倧遣陪臣左議政李聖求等進表謝恩貢方物求贖陳獲人口以朝鮮助征皮島功賜倧白金千兩紬緞百匹馬二匹朝鮮從征總兵林慶業等賞賚有差內院擬撰宣諭朝鮮敕書上曰爾等撰文毋過為誇大當順理措辭朕素不樂聞誇大之語彼明國之主自比于天輕視他人身無德義徒事矜張究何益哉嗣後撰擬切宜詳慎於是遵旨撰給敇曰近者島孽蕩平朕絶門庭之冦海氛掃淨爾無心腹之憂雖藉諸臣之宣力實賴藩服之攄誠助朕兵船用張撻伐勳勞聿著忠順可嘉宜頒恩錫以勵有邦爾之將士人等已經一體賞賚其麗民投寓各島者亦盡付安州陪臣柳琳訖兹特賜王銀幣馬匹就令陪臣林慶業齎回爾可祇領尚宜時嚴烽燎勿俾餘孽之復猖益著忠貞作我東藩而永固是月召朝鮮質子李􅓭李淏進清寧宫賜宴六月陪臣李聖求等遣歸令齎敇諭倧曰惟爾黽勉作忠洗心陳謝吐丹誠於表狀傾葵節於包茅王既堅事大之志朕爰宏字小之恩特賜王鞍馬白金貂皮等物以示優眷王其佩服休命益勵忠勤又諭曰王在南漢時感部臣英俄爾岱馬福塔等往來道達之恩各餽銀二千兩英俄爾岱馬福塔奏朕方知伊等一則盡心為主一則以向嘗往來欲保全爾國故身任役使豈望報耶王如知感存之於心可耳安用賄為且我國從來不加兵於無罪之國惟有罪則興師致討奉使諸臣豈有借以納賄之理如謂與以賄則事成不與則事敗寧有此事耶欲著忠誠全在小心正直恪守典常匪由通賄今兩國一家猜疑盡釋此後倘有貪婪之輩越理私索者不惟不可與王即當奏聞若知而不奏亦非理也是月倧以贖俘事遣陪臣辛竒榮齎疏來奏上諭禮部曰朕曾諭朝鮮我士卒所俘人口有欲贖還者當聽本主之便可謂曲體施恩矣今以價值艱難迫勒贖取殊為不合曩因朝鮮有罪興師致討若將有功士卒血戰所得人口勒令贖還是以有罪者為功有功者為罪豈可乎七月倧執送被俘逃回四人至十月倧遣陪臣崔鳴吉等表賀萬壽聖節貢方物並謝五月中所賜奬諭銀幣是月上命英俄爾岱馬福塔達雲等以一品服齎敕印制誥往封倧為朝鮮國王敕諭曰朕惟禮不廢玉帛賞以勸忠誠所從來尚矣念爾歸命宜有封錫今特遣英俄爾岱馬福塔達雲封爾為朝鮮國王齎賜玉紐金印誥命并黑狐套一領製帽黑狐皮一張貂皮百張鍍金雕鞍良馬一匹王其祇受以見朕優禮至意制曰天地布寒燠之令帝王操賞罰之公惟叛服之無常故恩威之異用念爾朝鮮係我鄰國往來行李不啻弟兄朕方期金石之堅王忽起參商之異拒我信使戒爾邊臣王實興戎朕方耀武雖云聲罪以致討惟圖革面而回心王今既悔前非朕豈仍念舊惡從兹創始嘉與惟新既定藩封宜申新命爰銷傳國之印用頒同文之符特遣使臣齎捧印誥仍封爾李倧為朝鮮國王嘉乃恭順金章寶冊重新作我藩屏帶礪河山不改立一時之名分定萬載之綱常天地無私冠履不易王其洗心滌慮世修職貢之常善始令終永保平康之福敬之懋哉勿替朕命十一月倧遣陪臣崔鳴吉等表賀萬壽冬至貢方物齎奏疏二一請質子歸國一言比遭雨雹牛疫國內空虛民間相傳謂大朝早晚有徴兵之命疑懼逃竄伏望皇上憐察又移咨禮部言陪臣柳琳林慶業先經從征皮島有功奉召至京領賞慶業即時趨赴而琳以海洋未靖稍稽馳達已褫琳職豫杖懇請轉奏宴賚鳴吉等並賜倧鞍馬貂皮白銀賀表皆降敕答之又諭倧曰王奏稱國內空虗民間疑懼誠若此王之奏請固宜朕豈慮不及此徴兵自量時勢詎可強以難堪乎且王委身歸誠為生靈計也朕所以置王者亦為生靈計也朕既為民而加恩於初寧不斟酌於其後乎所慮者恐王復似常年聽書生迂見以空言掩飾耳又諭曰王之二子朕非左右乏人而藉為侍衛也言及於此不幾誤歟王果抒誠圖報渾忘彼此不待奏請聽其往來方是兩國一家之象今既言君臣猶父子兩國猶一家而復有歸國之請萬一朕心稍疑則如之何王子若興此念王應訓之云吾等忠誠未著胡為不俟上命如此乃為義方之訓十二月倧遣陪臣韓亨吉等表賀元旦貢方物賜倧鞍馬貂皮白金遣歸嗣後凡元旦冬至萬壽聖節皆專遣陪臣表賀貢方物崇德三年四月倧遣陪臣右議政申景禎等來謝賜封並降敕訓諭恩貢方物朝鮮兵使柳琳以免罪來謝恩先是上將征明徴朝鮮兵從征倧誤軍期至是年十月遣陪臣崔鳴吉等請罪部臣以聞遣英俄爾岱等諭鳴吉曰朝鮮國王傾心歸服朕既以非常之恩禮待王意王亦必以非常之忠順報朕不意負恩至此朕格外施恩不降爾王爵俟征明之諸王貝勒回時降㫖議罪十一月倧以發還逃人上表謝恩又以徴兵誤期奉旨責其負恩惶恐甚遣錦陽君朴瀰疏奏言臣業已挑選餘氓取准原額聽候明命凋兵弱卒雖不足備厮輿之末而區區下忱藉以稍白苐惟皇旨嚴切有非臣子所可聞者夫臣而負恩罪在罔赦使臣有此則天地所不容使臣無此而未䝉君父之諒察乃天下之至痛伏願矜臣愚悃俯賜原宥又咨户部言前准部咨因寧古塔官往會寧互市會寧使鄭一驥迎欵未周已褫一驥職另立接待節目預飭邊臣尋倧兵倍道至以時值天寒無益行陳仍遣歸國四年正月倧遣陪臣李德揚等恭請聖安二月倧遣陪臣議政府右贊成尹暉等來請其繼室及長子封號四月以征明俘獲賜朝鮮質子李􅓭李淏銀各二百兩并蟒緞素緞五月倧遣判官崔鳴鶴刷送瓦爾喀人口又遣陪臣宋國澤等來請聖安降敇宣諭征明大捷六月上命户部參政馬福塔刑部參政巴哈納理事官星鼐齎玉紐金印誥敇往封倧繼室趙氏為朝鮮國王妃並封長子􅓭為世子先是東方庫爾喀叛入熊島熊島在東海中恃其險逺抗不服上命朝鮮以兵討之倧遣將劉纘先偕我使臣二人率炮手四百箭手百人船百十二艘於三月己卯由慶興之西水羅前浦出口討平之七月執叛首加哈禪來獻賜倧銀二百兩是月倧遣陪臣沈悅等慶賀征明大捷并貢方物九月日本國遺書朝鮮求致土産倧來告並以其書獻詳日本傳是月遣使往朝鮮問倧病封倧長子􅓭為世子賜誥命倧遣陪臣申景禎等齎表謝恩十月倧遣陪臣權大任等來貢初丁丑戊寅兩年額數減免至是方及額遵二年二月恩諭也上以倧去年徴兵緩期已從寬赦罪仍降敕誡諭初上之征朝鮮而納倧降也築壇於三田渡倧既復國感戴殊恩乃即其地樹碑頌德及是事聞遣內院官查布海等往驗十二月録碑文進呈文曰大清崇德元年冬十有二月寬溫仁聖皇帝以敗和自我始赫然怒以武臨之直搗而東莫敢抗者時我寡君棲於南漢凜凛若履春冰而待白日者殆五旬東南諸道兵相繼奔潰西北師逗撓峽內不能進一步城中食且盡當此之時以大兵薄城如霜風之捲秋籜爐火之燎鴻毛而皇帝以不殺為武惟布德是先乃降敕諭之曰來朕全爾否則屠之有若英馬諸大將承皇命相屬於道於是我寡君集文武諸臣謂曰豫託和好於大邦十年於兹矣由豫惛惑自速天討萬姓魚肉罪在豫一人皇帝猶不忍屠戮諭之如此豫何敢不欽承以上全我宗社下保我生靈乎遂從數十騎詣軍前請罪皇帝乃優之以禮撫之以恩一見而推心腹錫賚之恩遍及從臣禮罷即還我寡君于都城立招兵之南下者振旅而西撫民勸農逺近之雉舉鳥散者咸復厥居詎非大幸歟小邦之獲罪上國久矣己未之役都元帥姜宏立助兵明朝兵敗被擒太祖武皇帝止留宏立等數人餘悉放回恩莫大焉而小邦迷不知悟丁卯歲今皇帝命將東征本國君臣避入海島遣使請成皇帝允之視為兄弟國疆土復完宏立亦還矣自兹以後禮遇不替冠蓋交跡不幸浮議煽動搆成亂梯小邦申飭邊臣言涉不遜而其文為使臣所得皇帝猶寬貸之不即加兵乃先諭以師期丁寧反覆不翅耳提面命而終未免焉則小邦羣臣之罪益無逃矣皇帝既以大兵圍南漢而又命偏師先陷江都宫嬪王子暨卿士眷屬俱被俘獲皇帝戒諸將不得擾害令從臣及內侍看護既而大沛恩典小邦君臣及被獲眷屬復歸於舊霜雪變為陽春枯草變為時雨區宇既亡而復存宗祀已絶而還續環東土數千里咸囿於生成之澤此實古昔簡冊所希覯也鳴呼盛哉漢水上游三田渡之南即皇帝駐蹕之所也壇埸在焉我寡君爰命水部就其所增而髙大之又伐石以碑之垂諸永久以彰夫皇帝之功德直與造化同流也豈特我小邦世世永賴抑亦仁聲武誼無逺不服者未始不基於兹也顧摹天地之大日月之明不足以倣佛於萬一謹載其大略銘曰天降霜露載肅載育惟帝則之并布威德皇帝東征十萬其師殷殷轟轟如虎如貔西番窮髮暨夫北貉執殳前驅厥靈赫濯皇帝孔仁誕降恩言十行昭回既嚴且溫始迷不知伊戚自貽帝有明命如寐覺之我后祇服相率而歸匪惟怛威惟德之依皇帝嘉之澤洽孔優載色載笑爰東干矛何以錫之駿馬輕裘都人士女乃歌乃謳我后言旋皇帝之賜皇帝班師活我赤子哀我蕩析勸我穡事金甌依舊翠壇維新枯骨再肉寒荄復春有石巍然大江之頭萬載三韓皇帝之庥五年正月倧遣陪臣崔鳴吉等表謝赦罪及遣使問疾恩是月朝鮮陪臣以其王病篤求世子歸省上許之敇諭倧曰朕推心置腹以綏逺人本無需於質子也原以爾國反覆不常故質王二子為信爾若能恪遵朕命將瓦爾喀人户盡行刷送逃亡者盡行縛還凡有徴調不致稽延縱不得親身入覲時遣汝子前來朝謁如是則忠悃克昭疑懷自釋王之二子朕有不令往來無間者乎近又不候朕旨擅修南漢平壤蓄積糧草朕不疑王王反疑朕是何心哉今聞王疾亟深軫朕懷仍允所請遣世子歸省爾可將現留本國之子及世子􅓭之子速至鳳凰城朕亦即敕世子至鳳凰城相會世子歸省即來我國彼此更換而還朕無他意欲令諸子互相往來共敦親睦耳閠正月禮部定迎送朝鮮國王諸子禮儀凡國王子來朝一宴於鳳凰城再宴於東京又宴於盛京歸亦如之凡往來每程給羊一鵝二雞二其從人廪給如常例凡迎送若世子往來盛京以多羅貝勒諸子以禮部承政以下官東京以禮部參政鳳凰城則禮部理事官二月倧遣第三子㴭及其妻室從官至命世子􅓭歸省四月賜淏㴭宴倧遣陪臣趙繼新等補進歲貢黃金額數又遣陪臣李聖求等表謝世子歸省恩兼解瓦爾喀人户五月倧咨送逃民朴介孫等二十口又咨報也春屯所米榖三千餘石及農器已於大朝使臣章京處如數運交六月朝鮮世子李􅓭省親復命遣其弟淏歸省九月倧聞上幸溫泉遣陪臣尹順之來獻豹皮獺皮等物十月詔諭倧曰十月二十五日乃朕誕辰慶洽臣民恩宜覃沛國中概行肆赦亦宜恩及外藩爾國歲貢米萬包皆取給於民者今減去九千止貢千包俾爾臣民同沾浩蕩十二月倧次子淏省親復命遣其第三子㴭歸省六年正月倧遣陪臣表謝減免貢米恩又咨部言大國邊民私自越境需索米糧乞加禁約得旨嚴行禁止倧遣陪臣車大元來弔固倫碩駙和碩親王碩哲喪先是上以征明錦州調朝鮮舟師五千運糧萬石尋李倧奏言軍糧船三十二艘糧九千三百六十七石將領三百員水手二百五十九人盡行漂沒上以從來海運千百船中間有漂沒今各處兵船全沒無存甚可疑駭降旨切責命户部參政碩詹往朝鮮安州督催限四月十五日起行又遣洪尼喀庫里率三十人偕其水師將領同舟為之導行碩詹等至安州促朝鮮兵使林慶業等督船一百一十五艘載米萬石由大凌河小凌河口進發至三山島遭風壞船三溺死五人抵竒爾山橋沈船四溺死七人失船三漂入明境又五十四艘為石所壞明人獲遭風船知有船在前發兵船三十八截戰於熊嶽北新台朝鮮兵被殺傷者三十四人存五十二艘至蓋州慶業等以不能前進具奏上命大學士希福范文程等往驗希福等詰責慶業不與明船拒戰慶業以彼船輕便我船重滯對促其前進又以船重且壞請從陸運希福等回奏上遣學士瑚球額色黑往諭慶業曰爾主李倧當南漢見朕時曾奏本國舟楫堅固利於對敵明人之船柔脆不能當也今爾等在道遷延託言三舟漂入明境暗通消息及見明之兵船不即迎敵今既不由水路前進又不退歸皆爾主與汝輩通謀於明故為巧飾耳爾不遵諭運至所約之處朕亦何需於此米或棄之道路或載歸本國聽爾自便朕無與焉慶業等大懼請冒險從水路行上乃遣內國史院學士羅碩往諭准其自備夫馬改從陸路用我國車輛運至蓋州耀州止留精炮兵一千厮卒五百令副將五員遊擊三員備禦五員率領亦由陸路前赴衣糧馬匹令該國賫送將士於海州暫駐以俟餘兵悉遣歸國倧奏言衣糧馬匹理宜及時賫送但道里遼逺艱於糧運前船所載歲米萬包外軍糧萬七千石雖經支用損失尚有餘剩請就近撥給其衣資馬匹措辦續送既而運糧夫馬及留軍馬匹久不至屢奉嚴旨倧始具雇馬價銀六千兩馬百匹送至軍前上命英俄爾岱等往朝鮮詰責倧鞫其大臣并歷數倧罪狀英俄爾岱等還奏朝鮮尚書金聲黑尼當李倧自南漢來降時彼獨不降避至金羅道後倧欲發兵來助復力持不可又閣臣申得英吉阻撓解送馬匹俱應提解監禁倧亦上疏謝罪此五年三月至十二月事也及是年三月朝鮮總兵柳琳副將刁何良等始率兵千五百馬一千一百五十五匹往錦州助和碩親王濟爾哈朗軍六月倧遣陪臣李浣等獻新羅瑞金奏言咸陽郡新溪書院新羅古寺遺基也居民袁年掘地得瓦罈一蓋刻一千年三字中有黃金二十片內一片鐫宜春大吉四字今發於大朝庇護之藩國其為聖世嘉瑞無疑奏入得旨新羅刻字藏金為朝鮮所得王即進獻足見誠敬其金片刻宜春大吉及罈蓋書一千年字允屬祥瑞朕當與王共荷庥嘉王其自受即與朕受無異將原金付浣賫回也春在我邊境與朝鮮接壤居民四五百人歲歉乏食朝鮮賑米百石移咨户部以聞得旨朝鮮國王發糧助濟也春饑民具見事大之誠務須始終周濟為善王可諭該道府總計也春饑民户口照數給糧務令足用仍將給過糧數造冊一付也春首領收執一送部察核七月倧遣總兵劉定伊計等率兵九百七十名詣錦州更戍八月敇諭倧曰朕覽王奏云數調軍士路逺勞苦民力凋敝欲留戍為瓜期之代此亦有理當如王所請但戍兵應用衣糧務期接續送至軍前不得有誤賜朝鮮旋戍總兵柳琳等馬匹牛羊十一月倧遣太監尹完致祭敏惠恭和元妃倧聞上班師遣部臣尹得說恭請聖安獻方物七年三月倧以倭國情事來告得旨令朝鮮審量可否而行詳日本傳倧又咨部言上國此次會寧貿易差官不遵舊規縱恣勒索乞加禁約部臣以俟提兩造勘定虗實然後奏聞移咨覆之四月賜朝鮮總兵等官及陳亡兵丁金有差是月朝鮮總兵金得幹等率兵一千從役五百往杏山助圍又總兵牛典儀等率兵八百從役三百九十五自錦州換班回六月倧以錦州之役上征明大捷遣第三子林坪大君㴭等奉表稱賀時明國震我軍威遣使議和上將許之廷臣咸謂宜乘機直取燕京不與議和便上降敕詢倧令直陳所見倧疏言皇上應天順人威德並隆松錦杏塔一舉迅掃實前代未有之盛烈以破竹之勢有席捲之形諸王之必欲乘此機會者此也皇帝寬仁不忍死傷之多欲成和事此誠帝王止殺為武不戰屈人之勝算聖念所及與天同大無容議焉顧此和戰重事有非藩臣所敢與聞而特降推心之問益切銜感之私七月户部提集前二次遣往會寧貿易官暨朝鮮咨送會寧官趙衡等質訊前次差官擾害屬實即從重究治其後次並無擾害而彼地官失接待之禮朝鮮世子奏請加治重罪奉上諭彼處官有失接待理宜重懲但念其志在為民若槩加重罪後將不復有以民事為言者然亦不可盡釋聽王量加罪責九月倧以敏惠恭和元妃小祥遣禮曹侍郎安獻正進禮物十月逮朝鮮陪臣崔鳴吉等先是明國有兵船二至朝鮮國界上命擒之不聽上怒絶其往來倧大懼密奏閣臣崔鳴吉兵使林慶業等潛通明國私書往來明國船至曾饋送銀幣人參交相貿易上遣多羅額駙英俄爾岱等偕其世子李􅓭往鳳凰城逮訊慶業懼罪逃逸鳴吉等逮至自言曾作書遣髙調文等送往明國詞連平壤觀察使林尚和並繫義州獄以聞褫尚和職鳴吉及髙調文等八人仍繫獄餘俱減罪倧又密奏駙馬沈玉盛及其弟沈玉全判書李名翰倪傑英參判霍傑等結黨惑衆擅自妄行遣學士羅碩等往訊并察林慶業潛逃踪跡羅碩等至朝鮮遵旨將與明往來之髙調文等八人正法林慶業屢捕無獲執其家屬同沈玉盛等械繫至京世子李􅓭奏懇免沈玉盛等罪上以沈玉盛沈玉全係倧姻親從寬免罪交􅓭遣回李名翰倪傑英霍傑俱削職是時􅓭質我國所生子已四歲上命歸國與其祖相見一年後仍聽往來十二月朝鮮副將率兵四百厮卒二百赴錦州更戍八年三月倧咨兵部言去歲日本國君生子建廟祈福索助祭器請遣使往賀藉觀日本形勢從之是月遣户部啓心郎布丹等齎敇往朝鮮諭倧及其臣民曰朕惠養爾等欲悉豫保全不使一人失業乃爾等不自圖安屢起亂端夫見亂而不以法正之恐愈滋亂而長罪也故爾國大臣崔鳴吉與明通謀金聲黑尼誤國助惡則執而囚之髙調文等八人入明之登州寧逺等地往來交通今已斬首示衆其餘交通明國貿易饋遺之罪咸與赦除自諭之後再有與明貿易私通往來漢人船至不擒獲者必治以法不貸五月朝鮮副將朴桓南等率鳥鎗手四百厮從一百九十四更戍錦州六月倧遣陪臣沈啓元等表謝赦罪七月以征明大捷頒敕於朝鮮九月朝鮮擒獲明國天津偵探兵船一解至照舊例倍賞並賜倧銀五百兩授朝鮮通事固爾瑪琿為牛録章京以屢發朝鮮隂事無隱親族被害故也是月世祖章皇帝登極頒詔於朝鮮並賫太宗文皇帝遺敕往諭減歲貢內紅緑綿紬各五十匹白綿紬五百匹紵布三百匹布二百匹腰刀六口龍席二領花席二十領前逮繫逆臣崔鳴吉金聲黑尼等及逃犯林慶業家屬均豫釋放十月倧遣其子㴭奉表恭上太宗文皇帝香貢方物十二月倧遣陪臣金自典等表賀登極兼謝恩賜朝鮮世子李􅓭歸國省親順治元年正月倧於歲貢外獻所獲倭刀等物附饋攝政和碩睿親王多爾衮禮儀王謂輔理國事誼無私交定議禁止四月倧表謝遣世子歸省恩􅓭以省親還朝敕諭李倧曰瓦爾喀人民在爾境未經察解者皇考久欲停其察解但未降旨今朕仰體聖意永行停止聞爾陪臣沈啓元等謀為不軌王已殱其黨羽恐有餘孽未盡宜急搜剪以弭後患又諭曰我皇考曾降明旨以李明漢李敬輿許啓閔聖徽李景奭朴璜曹漢英申得淵等俱係罷廢不許復録今爾復用李敬輿等厥罪實大朕仰承皇考眷顧爾國至意姑置不問李敬輿留置世子李􅓭所不令回國其李明漢等均宜罷黜五月以破流賊李自成底定燕京捷音宣示朝鮮七月倧遣陪臣表賀并謝停解瓦爾喀人民及復用李敬輿等免罪恩十一月朝鮮叛臣林慶業自石城島奉表投誠得旨免究尋令歸國時以中原平定遣世子李􅓭歸國厚加賜賚並降敇赦其國中罪犯其永不敘用官李敬輿李明漢李景奭閔聖徽四人以世子請姑准任用減歲貢額內紵布四百匹蘇木二百斤茶千包再減綿紬千匹各色細布五千匹布四百匹粗布二千匹順刀十把刀十把其元旦冬至萬壽慶賀貢物以道逺俱於朝正時附進二年三月遣倧次子淏歸國五月倧遣陪臣表賀即位及上太宗文皇帝尊號並謝去年十一月恩詔諸事時朝鮮世子􅓭已殁上聞而憫之因却貢物又賜王銀五百兩緞三十匹遣工部尚書星訥等往朝鮮祭故世子􅓭尋倧遣使表謝並疏請封其次子鳳林大君淏為世子許之先是以軍需孔亟諭朝鮮量運米粟至燕京助國用十月倧運白米五萬七百八十餘石至十一月命內翰林宏文院大學士祁充格為正使禮部郎中朱世赴户部主事固爾馬渾為副使齎敇誥往封倧次子淏為世子三年二月倧遣使表謝十月恩免朝鮮貢米十一月倧遣陪臣劉廷良等表謝先是有詔責朝鮮貢獻怠玩四年六月倧遣第三子㴭來朝奉表謝罪並貢方物七月賜㴭貂裘銀幣等物并賜王白金五百兩綵緞三十端仍降敇戒諭五年正月朝鮮貢使閔聖徽卒豫祭一次減省朝鮮接待使臣儀節並酌定餽送使臣禮物正使銀五百兩綿紬二百匹布二百匹苧布六十匹豹皮十張大紙五十卷小紙百卷水獺皮三十張青黍皮十五張花席二十張鹿皮七張順刀二小刀二被褥一副靴襪各一雙鞍馬一空馬一副使銀四百兩餘如正使遣學士額色黑等齎敕往諭六年正月以朝鮮一年一朝原定閣臣一員尚書一員書狀官一員代覲念閣臣尚書等年老不堪涉逺此後或閣臣尚書一員侍郎一員代覲書狀官仍舊五月倧以太祖配天覃恩遣陪臣鄭太和等表謝六月朝鮮王李倧薨世子淏以訃告王妃趙氏奏請以淏襲封八月遣禮部啓心郎渥赫等往朝鮮諭祭故王倧賜諡莊穆又遣户部啓心郎布丹侍衛撒爾岱充正副使齎誥敕往封世子李淏為朝鮮國王妻張氏為王妃制曰立極開天之大義王盡稱臣建邦錫土之洪庥子當繼父屏藩攸賴渙號宜加爾朝鮮國王世子李淏秉禮淑躬施仁濟物肯堂肯構家庭夙信其象賢曰孝曰恭臣庶樂推夫雁序爰稽舊典式沛新綸封爾為朝鮮國王帶礪山河恪職率海東之君長苞桑社稷貽謀篤奕世之忠貞爾其欽哉毋替朕命七年正月淏奏言日本向憾下國近日以密書示通事情形可畏請築城訓練為守禦計遣使往訊慶尚道觀察使李曼東菜府使盧協等並言朝鮮倭素和好前奏涉虛淏上表謝罪淏銜曼協等應對失指擅加竄謫降旨切責褫其用事陪臣李敬輿李景奭趙泂職復李曼等官八月淏遣弟臨平大君㴭等表謝諭祭恩八年正月以加上昭聖慈壽皇太后徽號禮成遣學士葉成格等頒詔於朝鮮九年正月淏遣陪臣李㴭等表賀皇太后加上徽號並謝恩賜五月淏以國人趙昭元等詛咒謀逆亂黨伏誅遣使奏聞遣刑部侍郎伊爾都齊等齎敕慰問之九月朝鮮執送明末往日本商人二十八名得旨二十八人皆朕赤子漂流外國殊可憫念著發回原籍貨物令本人領去十一月以朝鮮别克屯城沈尚莪等至東阿西牛兒磨山採參事覺遣內院學士蘇納海等往訊並齎敇諭淏十年三月淏遣使來謝罪先是朝鮮國王印篆有清文無漢篆及是上命禮部改鑄兼清漢字賜給十一年十二月封淏子棩為世子賜誥命十二年六月淏遣陪臣表謝七月以朝鮮人越境伐木殺二人國王淏鞫審具奏僅以越境坐罪置殺人事不問上遣內大臣吳拜等往訊得實金忠一等三人論斬餘流杖有差仍援赦免國王淏不行確察冒昧具奏應擬罪特旨免議其原問官草率成招有心狥庇復遣少保額色黑等㑹訊各治以應得之罪初朝鮮國王族女為和碩端重親王博洛妃王薨妃寡其父錦林君李愷元入充貢使請其女還國許之十三年二月遣議政大臣哈世屯等送歸十四年二月淏弟㴭因奉使來謝前越境事免罪恩其隨行員役等竊於歸國時違例擅買硝藥為鳳凰城守官搜獲遣內大臣阿魯哈等往訊尋讞上金秋立等援赦免死㴭亦免罪十五年二月以羅剎犯我邊境發滿兵往討諭朝鮮簡發善使鳥鎗手二百名從征並備應用之物委幹員統領期五月初至寧古塔十一月諭禮部朕撫御萬方臣民一視朝鮮恭順有年尤厪體恤聞遣使該國多員貿易滋擾朕心不忍嗣後使臣正副使各一其八分人員隨往及貿易俱行停止以昭朕字愛藩服至意十六年五月朝鮮國王李淏薨六月世子棩以訃告淏母趙氏奏請以棩襲爵九月遣工部尚書郭科等往朝鮮諭祭故王李淏賜諡忠宣遣大學士蔣赫德吏部侍郎覺羅碩博會充正副使往封朝鮮世子李棩為朝鮮國王妻金氏為王妃制曰建邦敷化壯屏翰於東維式訓守成秉正朔於北極禮崇嗣位爰載彛章國重象賢應加寵錫爾朝鮮國王世子李棩奕葉殫忠冲齡著美岐嶷擅譽永昭圭璧之良䖍惕持躬克紹禮儀之緒念藩屬郡邑既慶纂服之有長君順倚望輿情因隆析爵以煥新命特封爾為朝鮮國王提封濵海賜履承先明天澤以篤忠貞無忝作述撫河山而謹節度表率臣民欽哉勿替朕命十七年三月棩遣陪臣洪得箕等奉表謝恩十八年四月棩遣陪臣洪柱元等上世祖章皇帝香五月棩遣陪臣袁都朔洪專表賀聖祖仁皇帝登極是月貢使從人盜買硫磺其民越江刨參盜買銅馬交部移咨詳審擬罪皇朝文獻通考卷二百九十三
