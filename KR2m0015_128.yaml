body:
  text: 欽定四庫全書皇朝文獻通考卷一百二十八王禮考四朝儀御門聽政臣等謹案國初定制每日聽政必御正門九卿科道各員齊集啓奏率以為常至雍正初始定御門之典凡部院折本下內閣者積如干件始得㫖舉行其儀至為整肅至每日召對內閣部院大臣引覲庶僚咨詢政治披閲章奏皆臨御內殿寒暑無間仰見列聖相承敕幾凝績宵旰不遑以所其無逸之心用集萬年太平無疆之庥猗歟盛哉順治二年定每日奏事吏户禮兵工五部輪流首奏刑部常列三班並令翰林科道同奏事官齊進侍班記注康熙六年七月己酉聖祖仁皇帝親政行慶賀禮是日御乾清門聽政嗣後日以為常十三年令各部漢司官照滿司官例隨堂官入奏十八年九月諭大學士等朕每日聽政一切折出票簽應商酌者皆國家切要政務得失所係今後起居注官除照常記注外遇有折本啓奏俱令侍班記注二十一年九月定御門晷刻先是大理寺司務趙時楫疏言皇上宵旰精勤命部院全班奏事日集午門但諸臣每夜三更早起朝氣耗傷未免日間辦事反難精密不若分班啓奏俾其精神遞相節養或令滿漢正佐輪流或將朝期比前量為增益以立不刋之典且聖躬亦宜節勞平日本章但須封進其緊要事宜必須靣陳者分班啓奏事下九卿詹事科道㑹議尋上議言九卿詹事科道官員皇上不時召問議事仍令每日上朝其餘無事官員及閒散衙門官員停其每日上朝照舊一月三次上朝又自古人君從未嘗每日親御聽政即定期視朝亦未有甚早者今因皇上宵旰勤勞每早聽政故啓奏官員惟恐遲誤必四五更趨朝難免夜行風寒之苦若皇上於辰刻視朝則逺居大小各官黎明而入亦不致遲誤上曰朕每日聽政自不可已若定時視朝可免庶僚早起風寒之纍此言亦是黃機魏象樞皆年逾七旬不堪逐日趨走故具疏乞休已經留任伊等或遇勞頓及有恙時可令報知本部免其啓奏其餘官員如有疾病不能上朝啓奏者亦著報部爾等可傳諭詹事科道官員觀衆意何如再行具奏翼日大學士等奏皇上洞悉下情慮及下僚風寒欲限時聽政即同天地之心無不歡忭上曰朕御朝太早各官於三四鼓趨赴朝㑹殊為勞瘁自今以後朕每日御朝聽政春夏以辰初刻秋冬以辰正初刻為期啓奏各官從容入奏九卿詹事科道原係㑹議官員仍每日於啓奏時齊集午門如有年力衰邁及偶患疾病俱向本衙門說明免其入奏齊集此外各衙門及部院司屬官員俱停其每日齊集著各赴本衙門辦事每月常朝仍應照舊行二十三年五月諭九卿詹事科道等御史衛執蒲奏請御門聽政或以五日或以二三日為期其意蓋欲君臣之間政事餘暇稍得休息也朕自躬親庶政宵旰弗遑念致治之道務在精勤勵始圖終勿宜有間二十餘年以來於凡用人行政事無巨細罔不殫心籌畫早夜孜孜有如一日郊廟禋享必躬執事間有不親詣之時皆甚非得已至於內殿齊居幾微悉謹左右􅉏御咸所稔知在朕未明求衣辨色視朝日與大小臣工率作省成用熙庶績近念爾諸臣奏事勞苦少展御門晷刻俾得從容入奏非圖便安邇年海宇敉寧政事漸簡頃復諭部院事務應得歸併者酌量合奏期於簡要清省從此民生日康刑清政肅部院章奏當不期省而自省若必預定三日五日以為奏事常期非朕始終勵精之意也二十四年五月定大朝之期章奏交送內閣停止啓奏九卿議言凡大朝之期皇上視朝最早回宫進講後仍御門聽政恐聖躬太勞今四海升平政事簡少請以後大朝之期及大雨雪俱停止啓奏遇祁寒盛暑之時間幾日一御門聽政上諭大學士等曰朕御極以來孜孜圖治罔有暇逸惟期禆益國家乂安兆庶用臻上理非不自知其勞但念庶政叢集一日萬幾若從所請未免始勤終怠且恐不及詳察致有疏略舛錯于政事得失所關非細自後大朝之期一切章奏交送內閣遇大雨雪臨時請旨其祁寒盛暑之時各部院果無應奏事宜方許暫止啓奏朕始終不欲一念倦怠晏安自便也二十九年十月户科給事中何金藺請定御門之期不允金藺疏言請酌定御門之期或三日或五日事應面奏者仍面奏請㫖至尋常奏章俱交內閣照例送進上曰朕惟致治務在精勤久道期於無斁朕躬親庶政早夜孜孜靡敢暇逸冀與大小臣工共圖熙績據奏用人行政條例具舉尋常奏章日煩臨御臣誼難安請酌定御門之期等語朕三十年來每晨聽政面見諸臣咨詢得失習以為常今若行更改非勵精求治初終罔間之道且與諸臣接見稍疏朕衷亦深眷念此奏不准行三十二年十二月大學士等奏請間三四日御門一次仍不允先是上諭大學士等曰朕觀近日政務簡少每日啓奏部院大臣中有年邁者甚屬勞苦自後年逾六旬以外大臣令其量力間二三日一來啓奏至折本內遇緊要事朕有旨傳進爾等方來請旨若無朕㫖爾等將折本彚齊亦間二三日一來啓奏尋大學士等奏言皇上宵旰勤勞勵精圖治天下已享太平政務亦極清簡臣等敢請每日奏章交送內閣皇上隔三四日御門一次聽理引見人員與緑頭牌啓奏諸事似於政事亦不致有誤上曰朕聽政三十餘年已成常規不日日御門理事即覺不安若隔三四日恐漸致倦怠不能始終如一矣此乾清門乃朕宫中亦有何勞但念年老大臣黎明從家中入奏甚為勞苦故有此諭朕仍照常每日聽政雍正元年四月世宗憲皇帝御門聽政時總理事務王大臣等以聖祖仁皇帝奉安山陵大禮已成奏請上御門聽政得㫖皇考梓宫尚在享殿安奉朕今即臨御正門理事心實不忍應俟奉安地宫之後舉行諸王大臣復援典禮懇請再三乃允之二年定吏部奏事在各部院衙門之後三年令翰林官四人侍班每聽政日於翰林院編修檢討內按俸以四人侍班班在科道之上七年十二月諭內閣十五日御門辦事奏事大臣及引見官員等俱著用補服嗣後朕臨御前殿照常用朝服至御門理事只用補服遇應服蟒袍之日亦著補服蟒袍永著為例乾隆元年十一月甲午上御門聽政先是雍正十三年十二月諭曰據禮部奏請初十日御門辦事朕查雍正元年四月間諸王大臣奏請御門聽政皇考聖意欲俟山陵禮成之後經王大臣再三懇請始降㫖允行計已五閲月矣今百日甫過朕即臨御正門理事心實不安朕受皇考付託之重所有國家政務在便殿隨時辦理不敢略有曠廢其御門之典俟明春再行請旨至是年二月復奉諭曰禮部奏請二月十三日御門聽政朕思百日之後雖閲兩月但皇考梓宫現在雍和宫朕即御門聽政心實不忍可俟梓宫奉移山陵後再行請旨十月奉移世宗憲皇帝梓宫禮成至是月上始御門理事如儀二年六月甲戌上御門聽政以遇雨賞諸臣紗有差諭曰連日仰蒙上天降賜甘霖衆心感慶朕今日御門聽政復值㴻雨再降更為優渥念諸臣衣服未免霑濕大臣等著賞紗二匹凡陪奏侍班引見執事官員及侍衛等俱著賞紗一匹十一月戊子令御門日設氊墊於大學士等跪所諭曰向來御門聽政大學士等俱不設氊墊惟圓明園奉皇考特旨鋪設而乾清門尚仍其舊原定制之意蓋以君尊臣卑預防専擅之漸然亦不係乎此况古有三公坐論之禮大學士等皆年老大臣當此嚴寒就地長跪朕心特切軫念嗣後著鋪氊墊以示優禮至意癸已令翰林院修撰編修檢討俱懸帶數珠諭曰朕御門聽政之時翰林院修撰編檢與科道一同侍班翰林班次在科道之上科道懸帶數珠而翰林未有定制朕思侍從之臣理應畫一嗣後修撰編檢亦著一體懸帶數珠以肅朝儀御門聽政儀常日部院章奏未奉聖㫖者折本下內閣積若干件得旨御門聽政內閣宣布在京部院寺各部院寺官檢所應進奏事於函飭陪奏官屬各部院均以滿漢司官二人陪奏吏部轉飭侍班官先期各部院具所屬滿漢官各四人考語移送吏部恭遇御門聽政吏部按序列名單以十人隨班引見亦曰侍班具吉服朔日逄五逄十日公服依期畢㑹右戒辦至日所司設御榻於乾清門正中榻前設章奏案一辨百官班位乾清門侍衛在御榻左右翼立領侍衛內大臣內大臣散秩大臣及豹尾班執槍侍衛佩刀侍衛在丹陛下左右立東西面記注官在西柱下立侍衛翰林科道官在西階下立皆東面大學士啓奏折本在御榻之左內閣學士在其後少南為部院官奏事位尚書左都御史在前侍郎副都御史大理寺卿少卿次之陪奏官又次之皆西面以户部禮部兵部工部分日首對三法司直第三班吏部直第六班若宗人府奏事則在各部之先右班位漏未盡部院寺奏事官暨侍班官畢集朝房進至中左門祗候春冬辰正初刻夏秋辰初初刻進至後左門祗候侍衛轉奏得㫖百官以次進至乾清門丹墀東西面魚貫序立記注官翰林科道官於西階西東面序立皇帝御輿至門啓扉降輿出闔扉升座翊衛如儀記注官由西階升至西柱下就位立部院奏事官由東階升尚書一人奉疏折旋而西餘入就位西面跪奉疏者至正中北面詣奏案前跪恭設於案興少退趨至東楹轉入班跪奏某事畢興少退循東階左降其次各班依序升東階進奏如前儀至吏部奏事引見侍班官畢退內閣侍讀學士二人升東階詣奏案前北面跪舉本日奏函興退翰林科道及侍衛皆退右進奏百官既畢奏內閣滿學士一人本日先期派出奉折本函升東階折旋而西大學士內閣學士從升依次就位跪記注官進至御榻之右仍東面立奉函學士至正中北面詣奏案前跪恭設於案啓函取折本依序啓奏皇帝降㫖大學士學士承㫖訖興由東階降記注官由西階降皇帝還宫各退恭遇聖駕駐蹕圓明園御勤政殿聽政奏事及啓奏折本皆如前儀右啓奏折本皇朝文獻通考卷一百二十八
