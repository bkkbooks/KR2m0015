  text: 欽定四庫全書皇朝文獻通考卷二十二
  hash: sha256:917c5b173453aa3681fe0a8bf64acf645192d3039178dcd9b20749dc9691ffa3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_022-1a, image: WYG0632/WYG0632-0454a.png}
body:
  text: 職役考二康熙元年令江南蘇松兩府行均田均役之法時戸科給事中柯聳疏言任土作賦因田起差此古今不易之常法但人户消長不同田畝盈縮亦異所以定十年編審之法則役隨田轉册因時定富者無兎脱之弊貧者無䖟負之憂勞逸適均法至善也臣毎見官役之侵漁差徭之繁重不一而足其源總由於僉㸃之不公積弊之未剔目下編審届期請痛除宿弊以拯民困查一縣田額若干應審里長若干每里十甲每甲該田若干田多者獨充一名田少者串充一名其最零星者附於甲尾名曰花戸此定例也各項差役俱係里長挨甲充當故力不勞而事易辦獨蘇松兩府名為僉報殷實竟不稽查田畝有田已賣盡而仍報里役者有田連阡陌而全不應差者不特十年之中偏枯殊甚至年年小審那移脱換叢弊多端田歸不役之家役累無田之戸以致貧民竭骨難支逃徙隔屬請令撫臣通行兩府及今大造之時必期田盡落甲役必照田務將本區之田均役本區十甲倘本區田多則派入下區按田起役不得憑空僉報以滋賣富差貧之弊庶㡬役均而民便矣其他花分子戸詭寄優免隔屬立戸買充册書諸弊皆宜嚴加禁革戸部議覆通行臣等謹案均役之法時惟知婁縣李復興行之最為得宜各屬皆倣而行之因編為均役成書沈荃序畧曰婁邑自均役以後流亡復歸荒蕪日墾鄰邑外省相繼取法所慮世俗昧於均役之義而議其無義且以為師心而不法古夫三代之役軍旅土功而已夫子所謂使民以時王制所謂嵗不過三日皆此役也井田廢而兵民分兵乆無預於民若夫築城浚川則計田出費以供其事如近日吳淞之役豈非至均者哉若議里役不設則古之鄉長里正本非役也周之比長里宰皆下士閭胥酇長皆中士旅師比師皆上士黨正縣正皆下大夫州長則中大夫此命官也豈役也哉漢去古未逺故亭長嗇夫聽獄訟收賦税皆有禄秩張敞朱邑朱博薛宣之流由此至卿相隋人欲以鄉正理五百家獄訟李徳林謂鄉官治民恐狥私不便唐時此意未冺故栁宗元言有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連帥是里胥與連帥貴賤雖殊而皆為天子任理民之責者也未聞有比較鞭笞破家亡身者也唐末大亂諸節帥多出羣盜所用守令視民如仇而用之日新由是鄉里之職大為民困此豈古所謂役哉五代因循至宋未改或差役或雇役或義役皆能困民然弊則改之初無定轍元時賦最輕故役亦輕而民多富明室賦重縣令催科難徧故分編里甲使之催賦俗曰經催是役之設為催賦設也賦辦則役舉矣今均田之法家自催賦無不辦之賦是即無不舉之役豈必辦賦之法嵗破數百家斃數百命而後謂之役哉向之有役有不役故見其役今也即賦為役故不見其役若遂議其無役此正如對和羮而别索鹽梅多見其不知味也若謂以田從人為非則向者以人從田圖蠧圖書為政而官與民交受其害今之以田從人業戸自為政而官與民交受其利行且徧此法於吳越間雖百世可也二年濬淮安涇河閘計田出夫漕運總督林起龍疏言開濬涇河閘自淮城迤南運河東岸至金吾莊延袤七十餘里下流淤塞處約可十餘里令山陽寶應二縣計田出夫衆志鼓舞甫二十日畢事河道深通閘流無阻直達射陽湖入海居民田廬可無水患下部知之六年嚴禁江西提甲累民之弊御史戈英疏言州縣每年設有輪值甲長凡催徵錢糧及衙門需用各項之費皆令甲長承辦獨江西更有提甲之弊既將現年甲長追比各項銀兩復提次甲為現年甲長責成備辦禮物廣信等府積弊尤甚至有連提數甲不止者累民已極請飭該撫嚴禁奉㫖令督撫察奏巡撫董衛國以並無私派奏覆總督郎廷佐奏提甲之弊風聞如御史言奉㫖嚴飭令確查禁革臣等謹案提甲之説始於前明嘉靖中名曰提編實則加派當時以兵役繁興為此不得已之法迨乎役罷名存遂不能改其後所行十段錦亦有此弊汙吏縁以為奸非值聖明之世不能一旦除之也七年定驛遞給夫之例凡有驛之處設有夫役以供奔走各按路之衝僻以為多寡額數不一其夫日給工食自一二分以至七八分不等皆入正賦編徵若額外雇用則按逺近加給工食水驛用縴夫亦同凡應給夫役者按品定數不許額外强索是年户科給事中吳國龍疏言驛遞苦累最甚除出征大兵及駐防官兵家口自北往南皆係𦂳急軍機應照例給夫外其自南往北者宜停止給夫庶不致差繁費重事下兵部部臣言出征大兵關係軍機應照舊例其駐防官兵家口無論往南往北陸路量給夫車下水不給縴夫上水縴夫比舊例減半給發自京起程者臣部定限自外起程者該督撫定限報部不許沿途逗遛違者治罪從之臣等謹案郵傳之設除車馬船隻外水陸皆有額設人夫雖例給工食皆募民充之差役稍繁莫不臨時添雇是亦民役之一也律載包充驛夫詐索驛夫皆有明禁其出使人員役使民夫擡轎者治罪仍追雇值銀八分五釐五毫蓋所以甦驛困亦所以恤民力又考直省所設之夫名目不同凡有馬之驛視馬多少例設二馬一夫外有走遞夫白夫青夫此項裁摃夫所厰夫差夫站夫有水驛之處有水手水夫縴夫南省有轎夫兠夫擔夫摃擡夫皆隨宜額設支給工食九年於江南山東派夫協濟河工加給工食并停地方津貼之費是嵗九月河道總督羅多以大修河工額用協夫三萬四千八百餘名請於江南山東兩省僉派協濟事下工部以僉派夫役道逺民艱又恐官吏借端滋擾應行召募為便查舊發工役銀每日四分今加給二分則工程不致遲誤奉㫖河工關係重大時近冬寒勢不容緩倘臨期應募無人復行僉派必致遲誤著該督先行竭力召募儘所得人夫供役如萬不能得就近量行僉派協濟十一月刑科給事中張惟赤疏言河工協濟人夫皆經該地方津貼而來江南各府方被水旱之災正項尚且議蠲額外豈堪重累前部臣主募夫之議原定每名給工食銀六分今河臣改用派夫豈有募則給工食而派遂不給工食之理所宜一體議給將原派地方按月津貼之説行令停止復下工部議從之臣等謹案河工夫役工有大小則夫役有多寡在河臣酌其緩急時有變通考用夫之多莫如康熙十六年以靳輔為總河大修全河之時考靳輔初議每日需夫十二萬有竒議令山東江南河南鄰郡地方協募赴工後經議減仍日用夫三四萬人皆係設法就近召募其最後奏疏有曰從前河工原無修治全河之事間有興舉無不勒之州縣派募里民凡所派之州縣用一費十民不勝其苦累臣奉命兩河並舉日需人夫十餘萬若循派募之舊章必半壁號呼矣乃易派募為雇募多方鼔勵設法招徠十年之中大功告成而民不擾又議挑運河亦日用夫三萬四千有竒奏疏有云挑濬運河向有每工給銀四分之例亦有撥派坊里人夫量給銀米之例此番工程浩大萬難撥派况坊里人夫率皆老弱不堪之輩而又每每逃逸大抵坊里夫十名不敵募夫三四名之用不若一體召募為便又挑髙郵月河因河帑不敷調用附近州縣民夫每名日食米鹽菜銀二分二釐以為日無多故也其大修歸仁堤令泗州虹縣五河臨淮四處協募人夫一萬又恐有影射透領之弊乃令百姓按田出夫以其土方工價與錢糧抵兑一時頗以為便總其前後諸疏亦見河工夫役之畧矣至二十七年開濬下河於髙郵等州縣用夫一二萬則仍派募云十二年停止河南僉派河夫河南巡撫佟鳯彩疏言河工派夫貽累地方請動支錢糧雇夫應役下工部議允之令凡遇嵗修准動河庫銀雇募每夫月給銀二兩嗣是河道總督王光裕又專疏請停僉派其嵗修夫役動帑雇募皆如河南之例臣等謹案河工嵗修夫役原屬舊例撫臣之為此請欲以便民也考靳輔奏疏嘗言人夫一項除架船裝料鋪埽簽樁收放揪頭繩纜栽栁修栁巡查堤岸㸔守料物修補水溝填塞狼窩貛穴等務俱河兵力作僅僅足用至於􅶇䌁打纜搬運草栁拉埽擡梯挑土幫修埽臺等一切雜作則用嵗修人夫往例嵗修工程從無募夫之例皆係酌撥附近民夫資其力役江南河南山東三省皆然後河南一省經前撫臣佟鳯彩因每年所用嵗修人役太多且不特附近州縣而隔逺州縣亦行概撥人夫不無逺涉之苦於是具題改為雇夫應用江南山東則仍舊今康熙二十二年山東曹單二縣黄河工程除用額夫之外照例酌撥附近州縣民夫協助額夫力作量各險工共撥嵗修夫八九千名見在舉行考此是嵗修夫役例固未嘗盡廢也十六年禁止有司派罰百姓修築城樓垜口十七年裁江南鳯陽淮安等府淺夫溜夫改設河兵河臣靳輔經理河工事宜請設江南河兵八營專司河工而罷回所設夫役從之至三十八年又裁徐州所屬額設嵗夫改設河兵先是沿河之處皆設有淺夫溜夫以備挑濬募民充應時有裁減至是裁夫設兵遂為定制十八年令天下立社倉義倉以本鄉之人管理其事時議整飭常平倉法勸諭官紳士民捐輸榖石於鄉村立社倉市鎮立義倉公舉本鄉敦重善良之人管理出陳入新春月借貸秋收償還每石取息一斗儲榖多者管倉人給予頂帶二十五年置近輔屯莊保甲直𨽻巡撫于成龍疏言順永保河四府旗民雜處盜警時聞非力行保甲不能寧謐應將各屯莊旗丁同民戸共編保甲令屯撥什庫與保正鄉長互相稽查有事一體申報究治下兵部議從之二十九年令直省紳衿田地與民人一例差徭山東巡撫佛倫疏言累民之事第一職役不均凡紳衿貢監户下均免雜差以致偏累小民富豪之家田連阡陌不應差徭遂有奸猾百姓將田畝詭寄紳衿貢監户下希圖避役應力為禁革請限二月之内通令自首盡行退出嗣後凡紳衿等田地與民人一例當差庶積弊一清而小民免偏枯之累得㫖紳衿等優免丁銀原有定例其鄉紳豪强詭寄濫免以致賦役不均積弊已乆該撫所奏直省應一體行下其事九卿確議尋議上悉如所奏一體通行又徵僉派河夫工銀令州縣雇夫應役河道總督王新命山東巡撫佛倫合疏言前以沿河州縣僉夫苦累將額編工食銀兩徵解令河員募夫應役但非地方官專司雇夫恐致逃散請令州縣雇夫解交下工部議從之臣等謹案河工用夫繁多勢不能不取之民徵銀召募乃隨時權宜之法也河臣于成龍嘗請豁免民夫得㫖以河道工程浩繁未允所請河臣董安國上言黄運兩河險汛甚多若將民夫豁免專責河兵必致貽誤止請酌減民夫一二千名部議從之先是既設河兵原為減省夫役于成龍再為總河又以嵗夫苦累亟請變通言每派嵗夫一名約費銀二十兩老幼充數或到工即逃計嵗夫數將七千請每名量徵銀五兩編入正供徵解河工添設營兵三千餘酌量緩急分班搶䕶亦從之大抵嵗修夫役例出僉派改為徵銀召募設兵乃役法之變耳法非可執總期不累於民則善矣三十二年發民夫修盛京城垣奉天將軍綽克托疏言修理盛京城垣需用夫役請在本處民内按丁取用工部議覆從之臣等謹案從來修築大工莫不起發民夫本朝之例取用民丁給以工食即召募之義蓋於公旬之中隠寓優恤考律載凡軍民官司有所營造不申明待報而擅起差人工者計雇役之值罰之若非法營造及非時起差人工者罪亦如之惟城垣倉庫公廨有急修處一時起差丁夫修理者不在此限三十九年令甲首催徵錢糧時行滚單法如一邑每里之中或五戸或十戸止用一滚單逐戸開明田糧及應完分數限期發給甲首挨次滚催令甲内之民照例自封投櫃以免里長銀匠櫃書稱收作弊四十七年申行保甲之法先是順治元年即議力行保甲至是以有司奉行不力言者請加申飭部臣議奏弭盜良法無如保甲宜倣古法而用以變通一州一縣城關各若干户四鄉村落各若干戸户給印信紙牌一張書冩姓名丁男口數於上出則註明所往入則稽其所來面生可疑之人非盤詰的確不許容留十户立一牌頭十牌立一甲頭十甲立一保長若村莊人少户不及數即就其少數編之無事遞相稽查有事互相救應保長牌頭不得借端魚肉衆户客店立簿稽查寺廟亦給紙牌月底令保長出具無事甘結報官備查違者罪之皇朝文獻通考卷二十二
