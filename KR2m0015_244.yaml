body:
  text: 欽定四庫全書皇朝文獻通考卷二百四十四帝系考六皇族宗室太祖高皇帝系二世恭載皇子門三世多羅安平貝勒杜度和碩敬謹莊親王尼堪以上廣略貝勒禇英子多羅克勤郡王嶽託和碩頴毅親王薩哈璘多羅謙襄郡王瓦克達奉恩輔國公瑪瞻和碩巽親王滿達海和碩惠順親王祜塞以上和碩禮烈親王代善子鎮國將軍席特庫奉恩將軍費雅三奉恩輔國介直公干圖輔國懷儀將軍範圖奉恩輔國公鞏安奉恩輔國公灝善以上奉恩鎮國勤敏公阿拜子鎮國將軍聶克塞鎮國恪恭將軍穆爾察以上鎮國克潔將軍湯古代子內大臣原封固山貝子額克親原授大學士封輔國公巴穆布爾善奉恩輔國恪僖公拔都海奉恩懷儀將軍拉都海輔國悼殤將軍巴特瑪費揚古以上奉恩輔國慤厚公塔拜子固山賢懿貝子尚建固山溫良貝子博和託多羅貝勒博洛多羅安郡王嶽樂以上和碩饒餘敏親王阿巴泰子奉恩輔國公噶布拉原封三等鎮國將軍祜錫祿以上奉恩鎮國恪僖公巴布泰子固山貝子和度奉恩鎮國公傅勒赫以上原封和碩英親王阿濟恪子原封輔國公來祜奉恩輔國介直公賴慕布子多羅貝勒多爾博和碩睿忠親王多羅衮嗣子多羅信宣和郡王多尼多羅貝勒輔國恪僖公察尼多羅信郡王洞鄂原封輔國公費揚古以上和碩豫通親王多鐸子餘詳玉牒四世多羅慤厚貝勒杜爾祜原封固山貝子穆爾祜固山恪禧貝子特爾祜固山懷愍貝子杜努文固山懷愍貝子薩弼以上多羅安平貝勒杜度子原封敬謹親王蘭布和碩敬謹悼親王尼思哈以上和碩敬謹莊親王尼堪子多羅衍禧介郡王羅洛渾多羅顯榮貝勒喀爾楚渾多羅和惠貝勒巴爾楚渾鎮國將軍品級巴思哈多羅剛毅貝勒祜里布以上多羅克勤郡王嶽託子多羅順承恭惠郡王勒克德渾奉恩鎮國公杜蘭以上和碩穎毅親王薩哈璘子原封鎮國公留雍原封鎮國公噶爾塞以上多羅謙襄郡王瓦克達子多羅懷愍貝勒常阿岱和碩巽親王滿達海子多羅懷愍郡王精濟和碩康良親王傑書以上和碩惠順親王祜塞子奉恩將軍能額理奉恩輔國公英額理奉恩輔國公英格宜以上鎮國將軍席特庫子奉國將軍法喀原封三等輔國將軍法復理以上鎮國懷儀將軍範圖子原封三等輔國將軍圖薩輔國將軍巴哈穆以上奉恩輔國公鞏安子原授刑部尚書鎮國將軍佛格奉恩將軍保格輔國將軍善福輔國將軍瑪錫禮原封三等輔國將軍尚祿輔國將軍薩穆當以上奉恩輔國公灝善子內大臣輔國將軍額竒散秩大臣輔國將軍度爾巴輔國將軍伯竒原封三等輔國將軍伯爾赫宜原授三等輔國將軍品級伯赫以上內大臣原封固山貝子額克親子原封三等輔國將軍巴爾岱原封三等輔國將軍塞圖以上原授大學士封輔國公巴穆布爾善子輔國將軍席爾圖原封三等輔國將軍博爾都以上奉恩輔國恪僖公拔都海子輔國將軍巴爾善輔國悼殤將軍巴特瑪費揚古子固山悼愍貝子蘇布圖固山介潔貝子強度以上固山賢懿貝子尚建子奉恩輔國懷愍公翁古奉恩輔國懷儀公錦柱固山介潔貝子佛克齊庫固山貝子彰泰以上固山溫良貝子博和託子原封多羅郡王塔爾納多羅懷思貝勒齊克新以上多羅貝勒博洛子護軍統領輔國將軍塞楞額多羅安慤郡王瑪爾渾原封三等輔國將軍塞布禮奉恩鎮國公經希原封固山貝子藴端以上多羅安郡王嶽樂子鎮國將軍輝塞原封三等輔國將軍齊穆布原封三等輔國將軍發度輔國將軍德儀以上奉恩輔國公噶布拉子輔國將軍富良原封三等鎮國將軍祜錫祿子奉恩輔國公構孳原封輔國公綽克都以上奉恩鎮國公傳勒赫子輔國將軍來度原封輔國公來祜子多羅信郡王蘇爾發多羅貝勒多爾博子多羅信郡王鄂扎奉恩將軍鄂明以上多羅信宣和郡王多尼子奉國將軍查達原封奉恩將軍德福以上輔國恪僖公察尼子奉國將軍鄂齊禮古北口提督彰格原封三等奉國將軍查庫齊以上多羅信郡王洞鄂子奉恩將軍畢喇席奉恩將軍詹布奉恩將軍堯努以上原封輔國公費揚古子餘詳玉牒五世固山恪恭貝子敦達固山溫恪貝子準達以上慤厚貝勒杜爾祜子原授三等鎮國將軍品級長源原封固山貝子穆爾祜子奉恩鎮國公噶爾哈圖奉恩鎮國恪恭公登塞原封奉恩將軍瑪爾噶圖以上恪僖貝子特爾祜子奉恩鎮國公巴鼐奉恩鎮國悼愍公固鼐以上懷愍貝子薩弼子奉恩輔國公賴士奉恩輔國公務友以上原封敬謹親王蘭布子多羅平比郡王羅科鐸多羅貝勒諾尼以上多羅衍禧介郡王羅洛渾子多羅貝勒克齊顯榮貝勒喀爾楚渾子輔國將軍品級固克度渾原授三等輔國將軍品級庫布素渾以上鎮國將軍品級巴思哈子多羅順承忠郡王諾羅布原封順承郡王勒爾錦以上多羅順承恭惠郡王勒克德渾子奉恩輔國公訥默孫奉恩輔國公弼禮克以上奉恩鎮國公杜蘭子原封三等輔國將軍台渾原封鎮國公留雍子原封輔國公海清原封鎮國公噶爾塞子都統奉恩將軍席倫圖奉恩將軍實憲奉恩將軍席昌原封奉恩將軍希常原封輔國公星尼以上多羅懷愍貝勒常阿岱子原封三等輔國將軍尼他哈輔國將軍扎爾圖和碩康簡親王巴爾圖和碩康悼親王椿泰以上和碩康良親王傑書子原封三等奉國將軍務爾登奉國將軍務爾德宜以上奉恩輔國公英額理子原封三等奉國將軍業爾圖奉恩輔國公英格宜子奉國將軍塞德宜原封輔國將軍法復理子奉國將軍塞爾都副都統諾穆珠以上原封輔國將軍圖薩子奉國將軍務鼐奉恩將軍德爾弼以上輔國將軍巴哈穆子原封三等奉國將軍瑚璉原授刑部尚書鎮國將軍佛格子奉國將軍珠隆輔國將軍善福子原任護軍統領儒富原封輔國將軍尚祿子奉國將軍德敏輔國將