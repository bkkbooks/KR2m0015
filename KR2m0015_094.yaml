body:
  text: 欽定四庫全書皇朝文獻通考卷九十四郊社考四郊儀注臣等謹按古者制禮聖者作之明者述焉作則立其宏綱述乃臻於美備也考儀於今日以通禮為定蓋自立制以來儀節遞有損益今則禮明樂備釐定精詳昭之方䇿永為法守兹編纂輯一遵盛典庶無參差焉冬至大祀儀冬至大祀天於圜丘先期五日遣親王一人詣犧牲所恭代視牲所牧豫設香案於庭中南向一東西向各一遣官補服遇朝期則朝服太常寺贊禮郎二人前引詣香案前北向所牧立案右牧人牽牛羊過案前導以旗仗所牧跪告牷次東向視鹿西向視豕所牧跪告如前儀畢引由北門退右視牲先三日昧爽太常寺卿進齋戒牌銅人設黃案於乾清中門之左太常寺卿率所屬咸補服常朝日朝服雨雪常服恭奉齋戒牌在前銅人在後導以御仗入自西長安門至午門徹仗太常寺官十人前引由中道入進太和門中左門後左門侍衛二人引至乾清門階下太常寺官恭設於案齋戒牌南向銅人西向太常寺卿行一跪三叩禮退皇帝致齋於大內頒制辭於羣臣曰某年月日冬至朕恭祀皇天上帝於圜丘惟爾羣臣其蠲乃心齊乃志各揚其職敢或不共國有常刑欽哉勿怠文武衙署恭書制辭於版安奉正堂自員外郎騎都尉以上咸齋於公署右齋戒先二日遣禮部尚書一人詣犧牲所省牲如視牲儀右省牲是日昧爽太常寺司祝恭送祝版於內閣授中書舍人安奉潔室敬書祝詞於版畢內閣典籍豫設黃案於政事堂正中舍人奉祝版陳於案南向大學士詣案前立北面展祝文敬書御名舍人奉祝版安奉堂上俟翼日授司祝右書祝版先一日子初刻宰人豫鑿坎於宰牲亭外墻東廣深二尺太常寺官設香案於宰牲亭外光祿寺卿一人朝服太常寺贊禮郎二人前引詣香案前北面立三上香遂及御史二人禮部司官二人咸朝服視宰宰人以鸞刀割牲以豆取毛血瘞於墻東之坎右視割牲是日五鼓太常寺卿率屬掃除上下藉以棕薦設上帝神座於圜丘第一成南向列聖東西向四從於第二成大明東夜明西北斗七星五星二十八宿周天星辰在大明之次雲師雨師風伯雷師在夜明之次均施青幄工部司官張皇帝拜次於第二成午階上張大次於外壝左門外神路之東太常寺典簿陳牲俎於神厨博士辨簠簋籩豆登鉶之實登以太羮鉶以和羮簠以黍稷簋以稻梁籩以形鹽稿魚棗栗榛菱芡鹿脯白餅黑餅糗餌粉餈豆以韭菹醓醢菁菹鹿醢芹菹醢筍菹魚醢脾析豚拍酏食糝食以次展器於神庫右設神座幄供張展牲器其日昧爽太常寺設黃案於太和殿中御座之南設香亭於殿內左楹之東設奉祝版亭奉玉帛香亭於殿內右楹之西太常寺贊禮讀祝各官具玉帛於篚貯香於盤祇俟太和門外太常寺卿率屬贊事殿內屆時太常寺卿率欽天監博士二人至乾清門奏時皇帝龍袍補服乘輿出宫至太和殿北階降輿御殿立左楹前西向記注官四人立殿右門外東面司祝自內閣奉祝版入太和中門玉帛香隨入前列提爐二太常寺贊禮郎十人導引升中階至丹陛上導引止司祝奉祝版各官奉玉帛香進殿中門以次陳於黃案三叩退太常寺卿展祝文贊禮郎布拜褥凡拜則布拜褥後同皇帝詣案前次第恭閲畢行一跪三拜禮興復位立太常寺卿韜祝版贊禮郎徹拜褥凡拜畢則徹拜褥後同司祝各官進至案前三叩興恭奉祝版玉帛香依次設亭內三叩退司香官就香亭奉香盒立於亭東太常寺卿二人恭導皇帝至香亭前立司香跪進香皇帝上香畢行一跪三拜禮興復位司香奉香盒置亭內退鑾儀衛官率校尉舁亭香亭在前祝版亭玉帛香亭以次由中道出前引如儀太常寺卿奏禮成皇帝乘輿還宫太常寺卿隨亭送南郊安奉神庫內是日徹乾清門齋戒牌銅人恭設於齋宫導引如儀右閲祝版玉帛香厥明步軍統領飭所部清蹕除道鑾儀衛官校陳大駕鹵簿全設詳見鹵簿凡職事官均采服親軍護軍旗尉民尉各服其服辰刻不陪祀王公百官咸朝服會闕下鴻臚寺序班序百官立位東班西面西班東面均北上祗候已刻太常寺卿赴乾清門奏請詣南郊齋宿皇帝龍袍補服乘禮輿出至太和門階下降輿鑾儀衛進玉輦掌鑾儀衛內大臣一人跪奏請升輦鑾儀使二人奉輦扶輦官四人納陛於輦正中皇帝升輦駕士三十六人輿輦駕發警蹕鑾儀使二人率官校夾輦而趨午門鳴鐘鼓導迎樂前引而不作出午門百官跪送前引大臣十人後扈大臣二人暨侍衛扈從諸臣以下咸乘馬御道左右塗巷皆設布幛護軍統領步軍統領各率所屬按班立於幛外咸辟除清蹕所至不得歡譁右鑾輿出宫駕至南郊由西門入至昭亨門外謹案乾隆三十五年奉處降諭改由雩廣利門入於向時祭畢乘輦輦詳見門掌鑾儀衛內大臣跪奏請降輦扶輦官納陛輦前皇帝降輦前引大臣右贊引左對引太常寺卿二人恭導皇帝由外壝南左門入至皇穹宇詣上帝香案前立司香官太常寺少卿一人跪進香皇帝跪受香拱舉仍授司香官興三上香畢以次詣列聖香案前上香如儀皇帝行三跪九拜禮兩廡從位遣分獻官上香行禮皇帝詣圜丘陟午階第一成恭視上帝位列聖配位贊引以次跪奏畢暨對引官恭導皇帝由內壝東左門詣神庫恭視籩豆贊引跪奏如前儀遂遣官並眂牲牢皇帝由內壝南左門出至外壝左門外升輦詣齋宫陪祀王公百官采服分班祗俟於門外皇帝降輦升禮輿入齋宫乃退均隨壇齋宿是夜嚴更宿衛警蹕環巡右眂神位壇位籩豆視牲齋宿將事之夕夜分太常寺卿率官屬入然蠟炬明金鐙積柴加燔牛於上實以香具器陳於案各以其序登居中簠左簋右籩從簠豆從簋俎在案前第一成上帝幄內犢一登一簠二簋二籩十有二豆十有二金爐一青鐙二金鐙四爐瓶五事爵墊一列聖幄內皆犢一登一簠二簋二籩十有二豆十有二金爐一青鐙金鐙各二爵墊一幄南中設一案少西北向供祝版東設一案西向陳蒼璧一郊祀制帛十有二色青奉先制帛三色白香盤四尊四匏爵十有二壺一爵一實福酒盤一實胙肉西設一案東向陳奉先制帛二色白香盤二尊二匏爵六凡牲陳於俎凡玉帛實於篚凡尊實酒承以舟疏布冪勺具第二成大明夜明幄內皆牛一登一簠二簋二籩十豆十青瓷盞二十爐一鐙四各設一案陳禮神制帛一色一赤一白尊一爵三香盤一俎篚冪勺具星辰雲雨風雷幄內皆牛一羊一豕一登一鉶二簠二簋二籩十豆十盞三十爐一鐙四各設一案一陳禮神制帛十有一青黃赤黑各一白七一陳禮神制帛四青黃黑白各一各尊一爵三香盤一俎篚冪勺具鑾儀衛冠軍使設洗於外壝左門外大次樂部率太常協律郎設中和韶樂於三成階下詳見樂考後皆同右陳設陳設畢禮部侍郎一人由西階升第一成太常寺博士前引詣上帝位前視玉帛齍盛及籩豆登俎之實以次詣列聖位前省齍畢仍由西階降至第二成四從位前周眂如儀右省齍辨行禮位第一成午階上為讀祝受福胙皇帝拜位第二成黃幄次為皇帝行禮拜位北向第三成階上為陪祀王貝勒拜位階下為貝子公拜位均北面左翼東階西上右翼西階東上庭中夾神道東西為分獻官拜位外壝門外為陪祀百官拜位文五品武四品官以上東西各五班皆北面重行異等東位西上西位東上辨執事位第一成太常寺官二人立午階上皇帝拜位前一司拜牌西面一司拜褥東面司祝一人立祝案西東面司香四人司玉帛一人司帛三人司爵四人序立東案之東西面司香二人司帛二人司爵二人序立西案之西東面光祿寺卿二人立東司香之後西面侍衛二人立西司香之後太常寺贊賜福胙一人立西司爵之次東面侍儀禮部尚書一人侍郎一人立東案之南西面都察院左都御史一人副都御史一人樂部典樂一人立西案之南東面均北上第二成司拜牌拜褥官各一人分立黃幄次東西與第一成午階同第三成階上太常寺典儀一人立於東階西面引王貝勒行禮鴻臚寺官二人糾儀御史四人禮部祠祭司官四人分立拜位左右均東西面第三成階下記注官四人立於神道之西東面引貝子公行禮鴻臚寺官二人分立拜位左右東西面司樂協律郎樂工序立東西樂懸之次北面歌工立樂工之次樂舞生文武八佾分行序立東在歌工之左西在歌工之右皆東列西上西列東上外壝門外糾儀御史二人禮部祠祭司官二人立於從祀百官東班之東御史二人禮部祠祭司官二人立於從祀百官西班之西鴻臚寺序班東西各一人立於糾儀官之次稍後太常寺傳贊四人二人循內壝墻立二人循外壝墻立掌燎官一人率燎人立燎爐之東南隅右辨位祀日日出前七刻司祝詣神庫祝版案前上香行一跪三叩禮恭奉祝版至壇安於祝案跪叩如初退禮部尚書率太常寺卿屬恭請神位鑾儀衛冠軍使二人率校尉豫設龍亭一於皇穹宇階下正中南向又設龍亭五於左右稍後均南向又設龍亭四於南東西向至時太常寺官啓神龕禮部尚書詣皇穹宇各香案前三上香退出門檻外行三跪九叩禮太常寺卿率屬分詣皇穹宇及兩廡各行一跪三叩禮先請四從位奉至丹墀東西向次請列聖神位於殿內東西向俟請上帝神位南向先行乃奉列聖神位以從既出殿奉四從神位以從依序奉安於龍亭內各行一跪三叩禮校尉舁亭太常寺官十人前引禮部尚書從由圜丘北門入至午陛亭止上帝居中列聖左右稍後均南向從位再後東西向太常寺官詣各亭前跪三叩興恭請上帝列聖神位升午階詣第一成四從神位升東西階詣第二成以次奉安於神座各行一跪三叩禮退右請神位太常寺卿赴齋宫奏請詣壇皇帝御祭服乘禮輿出齋宫鑾儀使進玉輦掌鑾儀衛內大臣奉請皇帝升輦納陛奉輦如前儀齋宫鳴鐘太常寺導駕官二人前引大臣提爐官執鐙官左右列行後扈大臣二人暨侍衛從恭導皇帝至外壝門外神路西掌鑾儀衛內大臣奏請皇帝降輦納陛扶輦如儀導駕官退右贊引左對引太常寺卿二人恭導皇帝詣大次少俟太常寺贊禮郎引分獻官於外壝右門外序立鴻臚寺官引陪祀王公於外壝門外侍衛後百官於行禮位後按翼東西序立祗候太常寺卿告奉安神位畢奏請行禮皇帝出大次鑾儀衛雲麾使二人跪奉盥冠軍使一人跪奉帨巾盥畢司拜褥官豫布拜褥於第二成拜次凡行拜禮則布拜褥後皆同退贊引對引官恭導皇帝由外壝南左門入升午階就第二成拜位北向立司拜牌官安拜牌凡就位復位則安拜牌後皆同退侍衛至內壝門外前引內大臣執爐鐙官至三成階下均止立後扈大臣隨侍凡升壇隨侍同太常寺贊禮郎引分獻官入內壝右門至分獻拜位立鴻臚寺官引諸王貝勒貝子公文武百官均就拜位北面序立典儀贊樂舞生登歌執事官各共乃職武舞執干戚進贊引奏就位皇帝就拜位立右就次盥洗就位皇帝既就位典儀贊燔柴迎帝神乃燔柴司香各奉香盒由案南東西相向行至左右幄前止立司樂贊舉迎帝神樂奏始平之章辭詳樂考後皆同協律郎舉麾工鼓祝樂作凡樂以舉麾鼓柷作後皆同司上帝香一人由左而北司列聖香東位三人從西位二人由右而北以次進至各香案前恭俟司拜牌官起拜牌凡升拜牌後壇所司先起皆同贊引奏升壇暨對引官恭導皇帝升第一成對引官至祝案前止立凡升禮皆同壇行贊引官恭導皇帝詣上帝香案前司香跪贊引奏跪皇帝跪奏上香司香進香皇帝上炷香次三上瓣香興以次詣列聖香案前上香儀同贊引奏復位暨對引官恭導皇帝復第二成拜位立贊引奏跪拜興皇帝行三跪九拜禮傳贊贊跪叩興王公百官均隨行禮凡衆官行禮皆傳贊後同