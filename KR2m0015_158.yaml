所成五聲二變之分與每分所應之聲所合之度詳載其數以列表焉全絃九寸定黃鍾之律首音聲應黃鍾之律度合黃鍾之分得羽絃之全分二音聲應太蔟之律度合太蔟之分得羽絃之變宫三音聲應姑洗之律度合夾鍾之分得羽絃之宫位四音聲應𬎼賓之律度合仲吕之分得羽絃之商位五音聲應夷則之律度合林鍾之分得羽絃之角位六音聲應無射之律度合南吕之分得羽絃之變徴七音聲應半黃鍾之律度合無射之分得羽絃之徴位八音仍應黃鍾之律度合黃鍾之分得羽絃之半分全絃九寸定姑洗之律首音聲應姑洗之律度合黃鍾之半得宫絃之全分二音聲應𬎼賓之律度合太簇之分得宫絃之商位三音聲應夷則之律度合姑洗之分得宫絃之角位四音聲應無射之律度合𬎼賓之分得宫絃之變徴五音聲應半黃鍾之律度合林鍾之分得宫絃之徴位六音聲應黃鍾之律度合南吕之分得宫絃之羽位七音聲應太簇之律度合應鍾之分得宫絃之變宫八音仍應姑洗之律度合黃鍾之半得宫絃之半分全絃九寸定笛之合字首音聲應倍無射之律度合黃鍾之分得徴絃之全分二音聲應黃鍾之律度合太簇之分得徴絃之羽位三音聲應太簇之律度合姑洗之分得徴絃之變宫四音聲應姑洗之律度合仲吕之分得徴絃之宫位五音聲應𬎼賓之律度合林鍾之分得徴絃之商位六音聲應夷則之律度合南吕之分得徴絃之角位七音聲應無射之律度合應鍾之分得徴絃之變徴八音仍應倍無射之律度合黃鍾之半得徴絃之半分又絲樂絃音清濁二均之度分篇曰絃之長短同者分音於巨細如琴有七絃是也絃之巨細同者分音於長短如瑟設柱以别其長短是也而絲樂之中用絃之多寡又各不同故必按各器之體製而定其取分之大小焉如瑟二十五絃體為九倍黃鍾之數而絃為六倍黃鍾之數琴七絃體為四倍半黃鍾之數而絃為四倍黃鍾之數又如琵琶三絃月琴之類其體雖無一定之制而絃之取分或以商或以徵以羽亦與雅樂相為表裏總之以各絃全分之音與各絃內所分之音互相應合為準是以不外乎十二律吕所生之七音也夫審絃者無論某絃之全分定為首音因而半之平分為二其聲既與首音相合而為第八音矣次以首音之全分因而四之去其一分而用其三分其聲應於全分首音之第四音此度乃全分首音與半分八音之間又平分為二分之度是即管子所謂凡將起五音凡首先主一而三之四開以合九九者也先主一而三之者以全分首音一分之度為主而以三因之其數大於全分之度為三倍也四開以合九九者以三倍全分之數四分之而取其一以合九九八十一之度為宫聲之分也小素云者素白練乃熟絲即小絃之謂言此度之聲立為宫位其小於此絃之他絃皆以是為主故曰以是生黃鍾小素之首以成宫也以八十一三分益一為百有八為徴乃此絃首音全分之度也於是以百有八三分去一為七十二是為商商三分益一為九十六是為羽羽三分去一為六十四是為角管子徴羽之數大於宫者用徴羽之倍數所謂下徴下羽者也若以宫之八十一取其四分之三則為六十分小餘七五比宫之變徴五十六則大比宫之角六十四則小此所以絃音之度必起於下徴而理始明也今列清濁二均之絃各九皆始下徴而終正羽絃音之用不過於五今列為九者取二徵二羽共二變以列位備載五聲二變之清濁以定絃音各分之等差按宫商而列表使分類以相從後之覽者亦將有所折衷焉首絃首音起於下徴全度一百八分二音為下羽得全度一百八分之九十六三音為變宫得全度一百八分之八十五小餘三三四音為正宫得全度一百八分之八十一五音為正商得全度一百八分之七十二六音為正角得全度一百八分之六十四七音為變徴得全度一百八分之五十六小餘八八八音為正徴得全度一百八分之半為五十四首絃首音起清下徴全度一百一分小餘一三二音清下羽得全度一百一分小餘一三之八十九小餘八九三音清變宫得全度一百一分小餘一三之七十九小餘九一四音為清宫得全度一百一分小餘一三之七十五小餘八五五音為清商得全度一百一分小餘一三之六十七小餘四二六音為清角得全度一百一分小餘一三之五十九小餘九三七音清變徴得全度一百一分小餘一三之五十三小餘二七八音為清徴得全度一百一分小餘一三之半為五十小餘五六二絃首音起於下羽全度九十六分二音為變宫得全度九十六分之八十五小餘三三三音為正宫得全度九十六分之八十一四音為正商得全度九十六分之七十二五音為正角得全度九十六分之六十四六音為變徴得全度九十六分之五十六小餘八八七音為正徴得全度九十六分之五十四八音為正羽得全度九十六分之半為四十八二絃首音起清下羽全度八十九分小餘八九二音清變宫得全度八十九分小餘八九之七十九小餘九一三音為清宫得全度八十九分小餘八九之七十五小餘八五四音為清商得全度八十九分小餘八九之六十七小餘四二五音為清角得全度八十九分小餘八九之五十九小餘九三六音清變徴得全度八十九分小餘八九之五十三小餘二七七音為清徴得全度八十九分小餘八九之五十小餘五六八音為清羽得全度八十九分小餘八九之半為四十四小餘九四三絃首音起於變宫全度八十五分小餘三三二音為正宫得全度八十五分小餘三三之八十一三音為正商得全度八十五分小餘三三之七十二四音為正角得全度八十五分小餘三三之六十四五音為變徴得全度八十五分小餘三三之五十六小餘八八六音為正徴得全度八十五分小餘三三之五十四七音為正羽得全度八十五分小餘三三之