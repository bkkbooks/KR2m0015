body:
  text: 欽定四庫全書皇朝文獻通考卷一百五十八樂考四律吕制度一臣等謹按禮運五聲六律十二管旋相為宫自漢以後律學不明旋宫之義失傳我聖祖仁皇帝親製律吕妙協宫商清濁分均辨隂陽之相配管絃同度明應和之各殊夫而後五聲二變之用悉貫通於十二律吕之中而古樂復昌明於盛世謹輯録律吕正義取音用律旋宫辨調諸論作律吕制度考康熙三十一年訓諭羣臣定律吕上御乾清門召大學士九卿等至御座前上取五聲八音八風圖展閲指謂諸臣曰古人謂十二律定而後被之八音則八音和奏之天地則八風和而諸福之物可致之祥無不畢至其言樂律所關如此其大而律吕之所從出不可不知如律吕新書所言算數専用徑一圍三法此法若合則所算皆合此法若舛則無所不舛矣朕觀徑一圍三之法用之必不能合蓋徑一尺則圍當三尺一寸四分一釐有竒若積纍至百丈所差至十四丈有竒等而上之其為舛錯可勝言耶因取方圓諸圖指示諸臣曰所言徑一圍三止可算六角之數若圓圍則必有竒零其理具在目前甚為明顯朕觀八線表中半徑勾股之法極其精微凡圓者可以方算開方之法即從此出逐一驗算無不吻合至黃鍾之管九寸空圍九分積八百一十分是為律本此舊説也其分寸若以尺言則古今尺制不同自朕觀之當以天地之度數為凖至隔八相生之説聲音髙下循環相生復還本音必須隔八此一定之理也隨命樂人取笛合瑟次第審音至八聲仍還本音上曰此非隔八相生之義耶以理推之固應如是五十二年改造樂器審定黃鍾之度為今營造尺七寸二分九釐五十三年御製律吕正義成律吕正義黃鍾轉生律吕篇曰律吕始黃鍾終應鍾止於十二者聖人審音制律其生聲之理不得不止於十二且稽之於度三分損益上下相生其成形之數尤不得不止於十二也至𬎼賓之生大吕漢志主下生通典主上生朱子儀禮經傳通解亦取上生蓋𬎼賓下生則三分損一僅得大吕之半必倍之始得其全上生則三分益一適得大吕之全其數立黃鍾太蔟之中而聲界黃鍾太蔟之交與其下生而得其半孰若即用上生之直截簡當耶此以聲音度數言之而宜用上生者也黃鍾一陽復始為十一月之律三分損一下生林鍾為六月之吕此陽生隂宜下生也林鍾三分益一上生太蔟為正月之律此隂生陽宜上生也至𬎼賓之生太吕復用上生者蓋自黃鍾十一月之律一陽始生而大吕十二月之吕二陽相繼位雖居隂而氣實應乎陽𬎼賓五月之律一隂始生位雖居陽而氣則屬乎隂故𬎼賓之生大吕實以隂生陽而宜上生者也自𬎼賓一隂生而夷則七月之律無射九月之律氣皆為隂自黃鍾一陽生而夾鍾二月之吕仲吕四月之吕氣皆為陽是皆緣𬎼賓上生而然此以隂陽理氣言之而宜用上生者也古之聖王制為十二律吕以配十有二月一皆本乎隂陽隂陽之辨精則理明而數備故三分損益上下相生之法誠千古不易之至理也又審定十二律吕五聲二變篇曰三分損益乃制律之則也凡金石之厚薄絲竹之短長皆依以定焉隔八相生乃審音之法也審音之法必取首音與第八音叶和同聲以為之凖即首音八音之間區而别之以為五聲二變則清濁之相應髙下之相宣皆賴以生焉但五聲二變有施於管律者有施於絃度者其生聲取分各有不同自漢唐以後皆宗司馬氏淮南子之説以三分損益之術誤為管音五聲二變之次復執管子絃音五聲度分而牽合於十二律吕之中故管律絃度俱不可得而明如旋宫圖黃鍾為宫太蔟為商姑洗為角𬎼賓為變徴林鍾為徴南吕為羽應鍾為變宫至半黃鍾復為清宫大吕為宫夾鍾為商仲吕為角林鍾為變徴夷則為徴無射為羽黃鍾為變宫而半大吕復為清宫夫正律為宫至半律而仍為宫正律為商至半律而仍為商則宫商一定而旋宫之義已失且陽律而雜以隂吕隂吕而雜以陽律隂陽相雜而取聲之原亦未為得是蓋各守所傳固執一理而未始備制律吕之管以審音也間嘗截竹為管詳審其音黃鍾之半律不與黃鍾合而合黃鍾者為太蔟之半律則倍半相應之説在絃音而非管音也明矣又黃鍾為宫其徴聲不應於林鍾而應於夷則則三分損益宫下生徴之説在絃度而非管律也明矣是知古聖人審定律吕隂陽各六陽則為律隂則為吕意固有在也是以即隂陽之各分者言之則陽律從陽隂吕從隂各成一均而不相紊故今所定黃鍾為首音宫聲次太蔟為二音以商聲應姑洗為三音以角聲應𬎼賓為四音以變徴聲應夷則為五音以徴聲應無射為六音以羽聲應半黃鍾為七音以變宫聲應此陽律之五聲二變也至半太蔟為清宫而與黃鍾應則陽律旋宫之義見焉如定大吕為首音宫聲則夾鍾為二音以商聲應仲宫為三音以角聲應林鍾為四音以變徴聲應南吕為五音以徴聲應應鍾為六音以羽聲應半大吕為七音以變宫聲應此隂吕之五聲二變也至半夾鍾為清宫而與大吕應則隂吕旋宫之義見焉所謂隂陽以類相從而不雜者此也若夫以隂陽唱和而合用之則一律一吕折中取聲使隂陽之氣得以相兼故黃鍾之宫為濁宫大吕之宫為清宫濁者不得揭之使髙清者不得抑之使下惟定宫聲在黃鍾大吕之間而可濁可清始能兼律吕之用黃鍾大吕既合而為宫則太蔟夾鍾合而為商姑洗仲吕合而為角㽔賓林鍾合而為變徴夷則南吕合而為徴無射應鍾合而為羽至半黃鍾半大吕合而為變宫是又隂陽唱和律吕合用者也驗之於樂器排簫鍾磬各一十有六正隂陽之分用者也今簫與笛一孔而兼律吕一音而能髙下正隂陽之合用者也至於簫笛之最上一孔適當出音孔上第一孔之半而聲低一字即宫聲之半不應宫聲而變為宫者也按其體推其數製以器審以音莫不確然有據而無纎毫之可疑則五聲二變運於十二律吕之中誠有一定不易之至理也又審定十二律吕髙低字譜篇曰十二律吕生聲之理陽律六音而繼以半律隂吕六音而繼以半吕各得七聲至八而原聲復是律吕雖有十二而用之止於七也五聲二變合而為七而正宫之半即為變宫是聲雖有七而體又止於六也每一律一吕各自為宫其相應之聲自有髙下或一律一吕合而為宫其相應之聲能兼清濁此按律取聲之定理也近代皆用工尺等字以名聲調宋史載燕樂書黃鍾用合字大吕太蔟用四字夾鍾姑洗用乙字夷則南吕用工字無射應鍾用凡字各以上下分為清濁其仲吕𬎼賓林鍾不可以上下分仲吕用上字𬎼賓用勾字林鍾用尺字黃鍾清聲用六字大吕太蔟夾鍾清聲各用五字而以上下緊别之緊五者夾鍾清聲也夫旋宫之法黃鍾大吕宜得一聲止分清濁耳燕樂書既失律吕相配之義且據上下緊别之文又似言絃音者嘗用縱黍橫黍之尺制為黃鍾之管與今現行管樂相較橫黍尺所制之黃鍾於簫應工字孔於笛應四字孔簫之工字孔與笛之四字孔名雖不同而聲則一縱黍尺所制之黃鍾於簫應乙字上字之間於笛應工字凡字之間夫燕樂書以黃鍾為合字其所為黃鍾者既非橫黍尺所制之黃鍾又非縱黍尺所制之黃鍾果何代尺度之黃鍾耶察其所配律吕之字蓋以琴之一絃定頭管與笛之合字得徴分者誤為黃鍾之宫其餘諸聲字遂皆以律吕之名配之故十字與十二律吕按分不能均而考聲亦不能協也然所載十字雖分配十二律吕及四半律而勾為低尺合為低六四為低五是字雖有十而音實止於七固與五聲二變有相通者矣今按橫黍尺所制之黃鍾正應簫之工字而今之簫制實由古排簫而作安知字譜所傳工字非即宫字之聲乎以工字為宫則凡字應商六字應角商字凡字皆平聲韻角字詩皆叶祿古多作龣與六同音至於五應變徴乙應徴上應羽五字乙字上字與徴羽二字同為上聲尺字樂工皆讀為車亦應變宫同為平聲則七字與七聲可配也審之律吕黃鍾為低工字大吕為髙工字太蔟為低凡字夾鍾為髙凡字姑洗為低六字仲吕為髙六字𬎼賓為低五字林鍾為髙五字夷則為低乙字南吕為髙乙字無射為低上字應鍾為髙上字半黃鍾為低尺字半大吕為髙尺字至半太簇仍為低工字與黃鍾應半夾鍾仍為髙工字與大吕應則七字與十二律吕可配也然則字譜之七字與五聲二變實相表裏者也又十二律吕同徑倍半生聲應五聲二變篇曰律吕之見於史志者其説不一有主同徑者有主不同徑者夫惟徑之同乃得其長短之異而聲字之清濁賴之以辨使徑不同而長短又異則成同形十二律吕皆如一黃鍾矣故同徑之説乃十二律吕之定論也又史志所載言律吕者正律之外又有倍律半律變律之名夫律有倍半所以助正律而成旋宫之用至於變律乃始自京房因仲吕還生黃鍾不及原數别名執始轉生四十八律後世因之遂有變律之説嘗以京房所定律數細較之仲吕生執始比黃鍾止少一分二釐有竒自執始至第三十七之質末比大吕止多九釐有竒至於謙待本𬎼賓變律而數弱於林鍾未知本大吕變律而數弱於太蔟白吕本夷則變律而數弱於南吕南授本夾鍾變律而數弱於姑洗分烏本無射變律而數弱於應鍾南事本仲吕變律而數弱於𬎼賓其編次各遷就於相近律吕數下且黃鍾大吕同一聲字止分清濁而執始至質末總未出黃鍾大吕範圍之內豈能比黃鍾大吕别生一音耶是故按其數不得至六十之多審其音不得成六十之用茍不實被之聲律則於倍半正變之名有未詳而施之於用亦未當矣夫正律為宫至半律則為變宫而或誤以半律為與正律應乃未達半律之為變聲也仲吕還生雖不及黃鍾原數而所差甚微故不能自成一聲又烏可自名一律乃或别名之為變黃鍾轉生十二變律合半聲而用之是未知變律之猶未離乎正聲也至於倍律之説古人亦嘗用之而傳記並無明文但以正律對半律言謂之倍不知倍律對正律言乃真倍律也夫自黃鍾而下欲用聲之更低者則有律吕之倍體自應鍾而上欲用聲之更髙者則有律吕之半體先審正律正吕之協於五聲二變者以為之準然後大而推之倍律倍吕細而及於半律半吕其清濁之遞降髙低之相應正變之屢遷按之聲音字譜無一不叶此旋宫之用所以成也配以七聲則黃鍾大吕為宫聲工字而分清濁太蔟夾鍾為商聲凡字而分清濁姑洗仲吕為商聲六字而分清濁𬎼賓林鍾為變徴五字而分清濁夷則南吕為徴聲乙字而分清濁無射應鍾為羽聲上字而分清濁至於大而推之倍律倍吕則倍無射倍應鍾共為尺字即宫聲之右有變宫而分清濁者也倍夷則倍南吕共為丄字即變宫之右有下羽而分清濁者也倍𬎼賓倍林鍾共為乙字即下羽之右有下徴而分清濁者也細而推之半律半吕則半黃鍾半大吕共為尺字即羽聲之左有變宫而分清濁者也半太蔟半夾鍾共為工字即變宫之左又有少宫而分清濁者也半姑洗半仲吕共為凡字即少宫之左復有少商而分清濁者也倍仲吕而上聲抑而啞半𬎼賓而下聲噍而促故倍體半體亦止於六此古樂之所以有起下徴而終清商者以其協聲音之正而得備於用也又旋宫起調篇曰古旋宫之法合竹與絲並著之而自隋以迄於今獨以絃音發明五聲之分律吕旋宫遂失其傳夫旋宫者十二律吕皆可為宫立一均之主各統七聲而十二律吕皆可為五聲二變也聲調者聲自為聲調自為調而調又有主調起調轉調之異故以轉調合旋宫言之名為宫調五聲二變旋於清濁二均之一十四聲則成九十八聲此全音也若夫八十四聲六十調實皆生於絃度以絃音七聲之位遞配以十二律吕之分則為八十四聲除二變不用止以五聲之位遞配以十二律吕之分則為六十調此乃按分以命聲調非旋宫轉調之法也主調起調皆以宫位為主故曰宫調然調雖以宫為主而宫又自為宫調又自為調如宫立一均之主而下羽之聲又大於宫故為一調之首即國語之宫逐羽音也羽主調宫立宫一均七聲之位已定則當二變者不起調而與調首音不合者亦不得起調蓋以羽起調徴在其前變宫居其後二音與羽相近得聲淆雜故不相合而變徴為第六音亦與羽音淆雜不合此所以當二變之位與五正聲中當徴位者俱不得起調也至於止調亦取本調相合可以起調之聲終之當二變與徴位者亦不用焉今樂工度曲七調相轉之法四字起四為正調樂工轉調皆用四字調為準以四字當羽位為起調處故云四字起四為四字調乙字起四為乙字調上字起四為上字調尺字起四為尺字調工字起四為工字調凡字起四為凡字調合字起四為合字調此皆以笛孔言四字調乙凡不用乙字調上六不用上字調尺五不用尺字調工乙不用工字調凡上不用凡字調合尺不用尺字調五工不用按近代皆以合字為黃鍾宫聲則當以某字當合為某宫今不取起合而取起四則是以四字為主而非以合字為主矣且不曰某宫而曰某調則是以四字名調而非以四字為宫矣如以四字為宫則四字調之乙字凡字適當商羽之位何故不用惟以四字為調首當羽位則乙字當變宫凡字當變徴故乙凡不用而知其為四字調也又四字調乙字凡字不得起調而六字亦不得起調即羽聲當羽位主調二變不得起調而徴音亦不得起調也七調之七字相轉即五聲二變之旋相為宫是故宫調聲字實為一體析而言之則有四科一曰七聲定位以五聲二變立一定之位自下羽以至正羽共列為八顯明隔八相生之理欲知某宫之某調於下羽位視其聲字律吕則知其為某宫之某調矣欲知某調之某宫於宫位下視其聲字律吕則知其為某調之某宫矣欲知聲字律吕之當避者於二變位下視之即知某聲字某律吕之當避矣二曰旋宫主調以五聲二變旋於七聲定位之下亦分為八位如羽聲立下羽之下宫聲立宫位之下則為宫聲立宫而羽聲主調也如宫聲立下羽之下則商羽立二變之下乃為角聲立宫而宫聲主調也又如商聲立下羽之下則變徴立宫位之下角與變宫立二變之位則為變徴立宫而商聲主調也三曰和聲起調以十二律吕兼倍半以備用按所生之音各隨其均序於旋宫之下仍以調主相和之聲所起各調注本律本吕之下以正各調之名如黃鍾立宫則倍夷則立下羽之位以主調倍無射正𬎼賓當二變之位不起調正夷則立徴位亦不起調故用倍夷則起調者為正羽調起黃鍾宫聲為正宫起太蔟商聲為正商起姑洗角聲為正角此正宫之四調也如大吕立宫則倍南吕立下羽之位以主調倍應鍾正林鍾當二變之位不起調正南吕立徴位亦不起調故用倍南吕起調者為清羽調起大吕宫聲為清宫起夾鍾商聲為清商起仲吕角聲為清角此清宫之四調也其餘立宫主調皆依此例四曰樂音字色以律吕簫笛所命字色隨聲調而序其次列於律吕之下如黃鍾為工字而簫應黃鍾者為工字笛應黃鍾者為五字皆注於黃鍾本律之下大吕為髙工字而簫之髙工字笛之髙五字亦皆注於大吕本吕之下其立羽位之字即為主調其立宫位之字即為立宫其當二變之位則不用當徴位者亦不以起調焉以此四科列為圖譜則旋宫轉聲主調起調之理自顯然而無遁情矣黃鍾宫聲立宫倍夷則下羽主調為上字調七聲定位旋宫主調律管簫笛起調下羽下羽倍夷則上凡正羽調變宫變宫倍無射尺合不起調宫宫黃鍾工四正宫商商太蔟凡乙正商角角姑洗合上正角變徴變徴𬎼賓四尺不起調徴徴夷則乙工不起調羽羽無射上凡同調首大吕清宫立宫倍南吕清下羽主調為髙上調七聲定位旋宫主調吕管簫笛起調下羽清下羽倍南吕上凡清羽調變宫清變宫倍應鍾尺六不起調宫清宫大吕工五清宫商清商夾鍾凡乙清商角清角仲吕六上清角變徴清變徴林鍾五尺不起調徴清徴南吕乙工不起調羽清羽應鍾上凡同調首太蔟商聲立宫倍無射變宫主調為尺字調七聲定位旋宫主調律管簫笛起調下羽變宫倍無射尺合變宫調變宫宫黃鍾工四不起調宫商太蔟凡乙商宫商角姑洗合上姑洗商角變徴𬎼賓四尺商角變徴徴夷則乙工不起調徴羽無射上凡不起調羽變宫倍無射半黃鍾尺六同調首夾鍾清商立宫倍應鍾清變宫主調為髙尺調七聲定位旋宫主調吕管簫笛起調下羽清變宫倍應鍾尺六清變宫調變宫清宫太吕工五不起調宫清商夾鍾凡乙清商宫商清角仲吕六上仲吕商角清變徴林鍾五尺清商角變徴清徴南吕乙工不起調徴清羽應鍾上凡不起調羽清變宫倍應鍾半大吕尺六同調首姑洗角聲立宫黃鍾宫聲主調為工字調七聲定位旋宫主調律管簫笛起調下羽宫黃鍾工四宫調變宫商太蔟凡乙不起調宫角姑洗合上角宫商變徴𬎼賓四尺角商角徴夷則乙工夷則商變徴羽無射上凡不起調徴變倍無射半黃鍾尺六不起調羽宫黃鍾工五同調首仲宫清角立宫大吕清宫主調為髙工調七聲定位旋宫主調吕管簫笛起調下羽清宫大吕工五清宫調變宫清商夾鍾凡乙不起調宫清角仲吕六上清角宫商清變徴林鍾五尺清角商角清徴南吕乙工南吕角變徴清羽應鍾上凡不起調徴清變宫倍應鍾半大吕尺六不起調羽清宫大吕工五同調首𬎼賓變徴立宫太蔟商聲主調為凡字調七聲定位旋宫主調律管簫笛起調下羽商太蔟凡乙商調變宫角姑洗合上不起調宫變徴𬎼賓四尺變徴宫商徴夷則乙工變徴商角羽無射上凡變徴角變徴變宫倍無射半黃鍾尺六不起調徴宫黃鍾工