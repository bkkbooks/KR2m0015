body:
  text: 欽定四庫全書皇朝文獻通考卷三十八土貢考臣等謹案馬端臨通考有田賦考復有土貢考一卷第其所載惟禹貢八州及唐一代州郡所貢文為詳備其他纍朝之事無可深考則其辭略焉然亦足見古任土作貢之大概矣我朝列聖相承深仁厚澤淪浹肌髓率土之內靡不願殫其葵向之忱以自效於盛世顧臣伏考今制宫庭服御所必需率令有司以經費購辦未嘗責貢民間其他軫念人勞罷免貢獻者為類尤廣是以今之土貢逺較唐制不過十存一二而已至於外夷職貢馬考雖未之及然肅慎貢矢西旅貢獒備載往牒以昭哲王慎德四夷咸賔之美我朝肇基東土德威逺播漠南䝉古諸部歸附最先嗣是東至朝鮮西至番藏朔南遐暨奔走偕來若夫幽深荒逺地阻重譯稽之前史職貢罕通亦莫不測海占風享王畢至我皇上布昭聖武用迪前光平定準回兩部拓地二萬餘里並入版圖嵗輸貢賦他若左右哈薩克東西布嚕特諸藩俱稽顙來朝奉表入貢猗歟盛哉誠亘古所未有也竊嘗論之前代之君其於外裔羈縻勿絶而已即使政令內修兵威逺揚猶且叛服靡常聲教莫訖聖朝撫有中外德洋恩普共球所集覆載同歸而且貢物則不拘往制准免則屢沛特恩錫豫便蕃矜嘉備至非所謂不寶逺物則逺人格者歟臣竊以中土所産久罷上供惟户工兩部則例內凡宫府內外需用物料於各直省原産處所令有司支款置辦造册報銷者謹著於篇視馬氏所稱土貢名目不殊義例自别至外藩諸貢梯山航海不可殫記在國家恆恤其力在藩國爭效其誠因敬稽成例所著者用昭聖朝綏來懷逺之宏略焉盛京額辦物産臣等謹按盛京為本朝王業所基長白鍾靈東溟育秀其包孕亭育發為物産者庶類繁昌洵嘉祥之薈蔚至於列聖建國以來經營相度綜理益周俾山虞水衡分司厥職嵗時採取上供天府其碩大充盈極古來所稱隩區神皋陸海之富有曽不足以嫓其萬一而且取之有經用之有節內府掌其名數冬官詳其考成纍牘連篇不能悉載惟東珠為川瀆之精英人參為叢林之靈卉豐貂溫徑備美冠裳謹述其物産之尤者冠於土貢之首焉東珠設珠軒置長上三旗珠軒五十有四下五旗珠軒三十有四每珠軒以得東珠十有六顆為率重自一分至十分為度每嵗合計所入之數佳者或以一當五或以一當四當三當二尋常者仍以一當一分為五等不及等者不入正數內如於額外多得總管以下等人按數給賞其東珠由黑龍江將軍捕牲總管選取輸納貂皮索倫壯丁每名嵗納一貂分三等頭等貂皮五百張二等貂皮一千張餘俱作三等收納如足數及等賞給總管以下等人緞匹青布有差若數目不足交與理藩院議處其足數不及等者免其處分由黑龍江將軍捕牲總管按數選取輸納人參户部委員攜信票出口招商給票入山開採每票以納人參十有二兩為則每嵗所採以給票之多寡為盈縮採二年三年間停一年由吉林將軍寧古塔副都統隨時酌奏直省額辦户部物産直隸省額解榛栗二十八石黃櫨木二千四百二十斤現在停解芝麻一百石長蘆每年額辦內務府白鹽二十萬斤按年聽內務府咨取光祿寺白鹽三萬斤磚鹽二千斤並非按年取用遇取用之年白鹽給工價銀三百兩磚鹽給工價銀三十七兩三錢五分零備辦造入報銷江蘇省額解銀硃三千九十四斤四兩三錢五分一毫零桐油七千九百七十一斤一兩七錢二分九釐九毫零紅銅六千三百一十斤十三兩一錢五分四釐四毫零明礬三千斤黃熟銅二千九百九十三斤九兩八錢八分四釐二毫零棉布二萬七千三百六十七匹烏梅五百斤燈草六百斤白蠟六千二百五十斤髙錫一萬六千二百三十八斤一十一兩零又辦銀硃三千斤紅銅七千斤黃蠟三千斤織造紗緞綢綾等物隨時酌辦嵗無定額安徽省額解銀硃二千七百四十斤七兩四錢七分三釐三毫零桐油六千一百一十七斤一兩四錢一分九釐四毫零紅熟銅三千三百三十六斤五兩四錢九分七釐零黃熟銅二千一百七十三斤九兩四錢一分一釐五毫零明礬三千斤烏梅五百斤白麻三萬四千一百五十八斤又辦白蠟六千二百五十斤髙錫一萬六千六百五十四斤黃蠟三千斤銀硃三千斤紅銅七千斤織造紗緞綾綢等物隨時酌辦嵗無定額浙江省額解上用黃茶二十八簍內用黃茶九十二簍芽茶二千斤黃蠟三千斤黃熟銅一千六十五斤零桐油八千三百三十二斤零白綿二百斤白絲八千五百斤織造紗緞綢綾等物隨時酌辦嵗無定額江西省額解銀硃二千五百八十九斤四兩九錢三分零桐油二千五百一十一斤十二兩零五棓子二百九十七斤三兩三錢五分零紫草一百六十二斤七兩六錢又解銀硃二千斤擡連紙一百萬張苧布五千四百九十六匹二丈現在停辦福建省額解紅銅四千六百二十二斤黑鉛一十萬五千一百五十七斤四兩黃熟銅三千一百二十七斤一兩七錢五分扛連紙一百萬張又解錫二萬二千二十八斤四兩其臺灣所屬合番社生番嵗納鹿皮獐皮各一張山猪毛加走山猫仔木鹿巴老逺等社每社嵗納鹿皮二張屋鏊末毒獅子等社生番每社嵗納鹿皮四張湖北省額解黃蠟三千八百三十七斤半現解二千五百斤餘停解白蠟六千三百斤黑鉛一萬七千六百六十九斤現在停解湖南省額解黃蠟三千八百三十七斤半現解二千五百斤餘停解白蠟六千三百斤黑鉛一萬七千六百六十九斤現在停解山東省額解闊白棉布二千三百匹牛筋六百斤黃蠟三千斤黃丹五千斤山西省額解毛頭紙五十萬張添解五十萬張髙錫一萬一千八百斤生素絹一千二百匹遇閏加添四十四匹農桑絹三百匹呈文紙一萬張河南省額解本色棉布三千九百六十八匹牛筋二百四十六斤零黃蠟三千斤四川省額解本色米一千八百二十二石九斗五升零本色馬十三匹三年一次貢本色馬五十三匹臣等謹按兩金川搆釁天兵迅掃閲五載全境蕩平設鎮安營皆成內地土司等以獲享太平分班入覲踰僰道赴筰關各貢土宜中其愛戴自乾隆四十一年至四十六年嵗嵗無間我皇上至仁普覆念其道里逺涉限以三年逮乾隆四十九年來京已七次矣所進物件無過藏香藝香黎椒菖蒲茯苓等人無定員物無定額而猶嘉其誠悃賜綵幣以厚賚之真所謂不寶異物綏柔逺人者歟今恭紀其略附於川省之後甘肅省凡內附番民嵗納馬匹如因墾地成熟情願納糧者准其停馬納糧廣東省額解降香九百斤紫榆木十四段每段二百斤花梨木十四段每段一百五十斤髙錫三萬五千六百六十四斤八兩靛花二千三百斤白蠟一萬二千六百斤廣膠一千斤螣黃二十五斤沈速香三百斤㸃錫二十一萬一千七百一十三斤廣西省南寧慶逺思恩鎮安五府屬土州縣峝寨每三年一次納馬六十一匹雲南省額解天大青二百三十斤五兩八錢天二青六十六斤九兩石磺二十二斤十兩五錢又辦天大青一萬七千二百二十斤天二青一千三百斤石磺一百斤松花石碌一千斤貴州省額解黃蠟四百七十四斤直省額辦工部物産直𨽻省額解五色土寶砂隨時酌辦嵗無定額江蘇省每年額解桅木二十根杉木三百八十根架木一千四百根又二千根桐皮槁二百根又正金磚副金磚魁藤棕絲織造誥敕制帛綵綢紅綢駕衣片庫存不敷隨呈明派解浙江省每年額解架木一千四百根桐皮槁二百根又黃花竹隨時酌辦嵗無定額江西省每年額解桅木二十根杉木三百八十根架木一千四百根桐皮槁二百根湖南省每年額解桅木二十根杉木三百八十根架木一千四百根桐皮槁二百根山西省每年額解大潞綢一百匹小潞綢三百匹臣等謹按本朝撫有區夏物産豐盈號稱極盛然而取民之制自田賦征𣙜而外概無聞焉世祖章皇帝定鼎之始特降諭㫖於故明各道額解內部物産分别蠲除嗣是嵗需上供悉歸經費採辦兹據㑹典所載各直省支款辦解户工兩部者條列如右大扺減之又減即什一僅存之數而又或解或停就地轉移隨時酌辦蓋自古任土之常至我朝而改為官辦曠蕩之恩洵千古所未有也已外藩西北各部落額貢物産臣等謹按內扎薩克各部落及喀爾喀四部青海土爾扈特阿拉善厄魯特西藏各寺廟喇嘛星羅碁布附近邊陲其所産若牛羊駝馬與夫毯罽藏香之屬無難得之貨我朝中外一統聲靈逺訖諸藩部長靡不效力輸誠世為臣僕其取道不紆其備物至䖍其奉職至誠且慤國家柔恤逺人或酌以成期或寬其定數至力不能來者得交所在有司轉進撫恤矜慈每加厚賞以視貢賮獻雉之朝其規模大小豈可同日而語也哉科爾沁扎賚特杜爾伯特郭爾羅斯土默特喀喇沁敖漢奈曼扎嚕特阿嚕科爾沁翁牛特喀爾喀左翼烏珠穆沁巴林阿巴噶浩齊特阿巴哈納爾克什克騰四子部落蘇尼特茂明安喀爾喀右翼烏喇特歸化城土默特鄂爾多斯各旗扎薩克每年十二月各貢羊一隻乳酒一瓶又歸化城土默特二旗四季貢馬一百六十三匹舊貢有緞百匹石青二千斤後俱免貢貢道科爾沁扎賚特杜爾伯特郭爾羅斯均由山海關土默特喀喇沁敖漢奈曼扎嚕特阿嚕科爾沁翁牛特喀爾喀左翼均由喜峯口烏珠穆沁巴林阿巴噶浩齊特阿巴哈納爾克什克騰均由獨石口四子部落蘇尼特茂明安喀爾喀右翼均由張家口烏喇特歸化城土默特鄂爾多斯均由殺虎口喀爾喀四部落王公扎薩克台吉等各貢駝馬羊隻無定數隨其朝覲之班來貢其車臣汗土謝圖汗及喇嘛哲卜尊丹巴胡土克圖每年俱貢白馬八匹白駱駝一隻謂之九白又定邊左副將軍喀爾喀親王每年八月內木蘭圍上貢羊三十隻十月內遣使來京貢湯羊十隻貢道由張家口青海貢藏香氆氌馬匹無定數各隨其朝覲之班來貢貢道由西寧土爾扈特貢藏香氆氌馬匹無定數各隨其朝覲之班來貢貢道由張家口阿拉善厄魯特貢駝馬羊隻無定數各隨其朝覲之班來貢貢道由張家口西藏前藏達賴喇嘛後藏班禪額爾德尼分為兩班隔年輪流遣使進貢每年於十一月到京所貢哈達藏佛經卷藏香珊瑚琥珀數珠氆氌等物無定數進貢之年於次年正月初十日以內慶賀進丹舒克所貢銅藏佛佛象經卷銀滿達銀輪銀塔銀瓶銀七珍八寶八吉祥銀杵珊瑚琥珀數珠藏香紅花氆氌藏杏藏棗等物亦無定數所有辦理藏務之胡土克圖公扎薩克台吉等所進各貢附於達賴喇嘛班內貢物俱與達賴喇嘛同貢道由四川之打箭爐其畨僧入貢者紅山報恩寺五年一貢貢道由莊浪衛圓覺等二十六寺分四班三年一貢貢道由岷州衛貢物各以馬匹及延夀果青木香之屬西寧瞿曇等九寺西納演教寺河州𢎞化寺均貢無常物亦無定期或力不能來即交所在有司轉進哈密闢展吐魯畨嵗貢葡萄二百斤乾瓜二筐布匹手巾佩刀諸物其附近闢展之羅布綽爾居住回民嵗貢玉石翎毛水獺皮諸物貢道由嘉峪關喀什噶爾嵗貢黃金十兩緑葡萄千斤溫都斯坦金絲緞二毛毯四其所屬伯得爾格嵗貢金絲緞二烏什嵗交硝一千八百斤貢道由嘉峪關葉爾羌嵗貢黃金四十兩葡萄千斤其所屬之沙爾虎爾回民二百戶每户嵗貢黃金一錢共金二十兩貢道由嘉峪關和闐嵗貢黃金六十兩其所屬之玉隴哈什哈喇哈什兩河産玉嵗令回人採取量其所得進貢無定額貢道由嘉峪關哈薩克左右部布嚕特東西部安集延瑪爾噶朗霍罕納木干四城塔什干拔達克山博羅爾愛烏罕竒齊玉斯諤爾根齊諸部落貢罽刀馬匹或三年或間年貢無定期貢道由嘉峪關臣等謹按國家奄有區宇䝉古諸部落絡繹踵至嗣是青海西套畨藏各部