body:
  text: 市糴考五糴乾隆元年以山西米價昻貴令發社倉積榖二十餘萬石照例出借外餘皆酌減價值及時發糶以裕民食又令江西買榖分貯江西早榖豐收議動存公銀買榖十萬餘石令各府州縣分貯以備緩急又準甘肅平慶二府買糧積貯甘肅平涼慶陽二府所貯食糧不足敷用大學士管川陜總督查郎阿請於陜省撥糧八萬石以六萬石接濟平涼二萬石接濟慶陽因言甘省民人素無蓋藏每遇豐收之年民間盡出所有以市賣則糧價頓減若稍有歉收百姓素無積蓄糧食稀少則價值頓昻甘屬通省皆然而平慶二府尤甚蓋因地瘠民貧一切費用皆仰給於所收之糧有不得不糶之勢逮至爭欲糶賣價值平賤所得無幾是以豐收之年轉受糧賤之纍名為熟荒今嵗五榖豐收請於平慶二府秋收之後隨時隨地按市價採買使民間不受熟荒之纍而倉儲常有充盈之慶嗣後甘省凡遇豐收之年皆請照此辦理從之又奉諭旨積貯平糶之法原以便民乃聞各省州縣於倉榖出入竟有派纍百姓者當出糶之時則派單令其納銀領榖若干及買補之時則派單令其納榖領銀若干納銀則收書重取其贏餘納榖則倉胥大肆其抑勒甚至以黴爛之榖為乾潔小民畏勢不敢不領惟有隱忍賠纍而已更有山多田少之地産榖無多而該地方官不能向他處採買但按田畝册籍核算發價派令百姓將田畝嵗收之榖交倉絶不為民間計及蓋藏至有十餘畝之田而亦責其承買榖石者在附郭居民去倉厫不逺尚可就近轉輸至於逺鄉僻壤離城或百里或七八十里之遙亦一概令其領銀納榖小民肩挑背負越嶺登山窮日之力始至交納之所而姦胥蠧吏又復任意留難及平糶之日而窵逺鄉村更不能均霑實惠是徒有轉運之苦而不獲蒙積貯之益夫良法美意行之不善流弊種種其作何變通之法使閭閻實受糴糶之益而無有擾纍各該督撫大吏當悉心籌畫令有司實力奉行以副朕愛養斯民之意又議定湖南等省常平倉榖存糶之例以湖南各屬地有髙下燥濕之不同常平倉榖存糶之數應因地制宜因議定湖南省列減糶為三等長沙等四十五府州縣地勢乾燥者仍存七糶三永州等三十一府廳縣衛地勢稍濕者存半糶半龍陽等四縣地勢尤濕者糶七存三倘民間有不須糴買或不能糶半糶七者聽該管官隨時斟酌又四川龍安寧逺二府並茂州所屬及雷波衛黃螂所等處地居邊荒風土較異兼之積貯雜糧性不耐久令每年糶半存半餘循例存七糶三偶遇歉收不拘成例酌量借糶廣東平糶倉榖令將沿海卑濕之廣州等七府南海等三十九州縣新安等二縣丞所管準其存半糶半其無可減糶之嘉應清逺等十四州縣亦如之南雄等三府羅定三水等三十六州縣既非沿海卑濕之區照例存七糶三明年又以安徽地髙土燥之滁州等七州縣及鳳陽潁州二府石埭等十二州縣常平積榖照例存七糶三其臨近江湖地形卑下濕氣最重之安慶等十府州懷寧等三十八州縣減價糶半存半又增設廣東左翼鎮標營倉先是議準總督孔育珣奏請於廣東邊海營分擇其最緊要者設立營倉買榖存貯嗣又從總督郝玉麟請增置營倉五處至是總兵黃錫申言廣東左翼鎮逼近邊海亦屬人稠榖少之區若榖價稍昻兵丁艱於買食應照各營設立營倉以濟不給請動鎮標現存公糧銀一千一百餘兩買榖三千石設倉存貯於青黃不接時勻借兵丁秋收買補其應設倉厫即查營中空間房屋改造從之二年以京師雨澤愆期米價稍長特旨發通倉米每城各二千石共設十厰減價平糶並嚴禁富户假託貧民賤買貴賣及興販窩屯之弊尋準户部議於京師四鄉添設八厰廣行糶賣吏科給事中馬宏琦言京師五城奉旨發米平糶倘有不敷再行撥給所以矜恤窮黎令無乏食也司其事者理宜實力奉行源源發糶俾官米流布市價不期而自減庶無負我皇上加惠元元之至意今查五城各厰每日所賣粳米僅一二石不等夫以京師數百萬户口食所需不知凡幾而各厰糶出粳米之數若此其少此非小民之不樂於赴糴也如現在京通各倉氣頭厫底之米運貯五城發糶者每日尚糶百餘石此項減色之米若按成計算舂碓折耗其價實與十成粳米無異乃十成者所賣甚少而減色所賣較多總緣減色米石向無囤販之禁司坊官無所畏避是以儘數多糶而赴買者亦可隨意多糴至於十成粳米現因姦民囤販燒鍋經步軍統領衙門拿獲參奏司糶各官因而聞風震恐畏噎廢食以規避失察之處分遂生出不行多糶之一法凡遇赴厰糴米者往往過加盤詰竟有候至終日不得升斗者夫窮民需食原有刻不容緩之勢官局留難必致轉購私局是欲嚴囤積而姦民愈得以居竒射利欲除混冒而仰食窮民轉無由均霑減糶之惠也臣愚以為查拿窩囤法不可不嚴而小販流通情有可恕蓋平糶官米本為拯窮而設如窮民以糴之所餘轉行售賣雖云違禁而獲利無多皆為仰霑大澤且地方有此等零星販賣之人則街衢巷陌俱可以食官米之利而市米不能坐索髙價矣市米之價平而嗸嗸八口可以無憂艱食矣然非定以限制則糴糶未有定數而官與民亦無所遵守請嗣後五城各厰所糶粳米有聽姦民串買圗販數滿十餘石以及百餘石者仍嚴行查拿治罪至於赴糴窮民肩挑背負轉行售賣總以一石為率免其查拿以濟民食倘有故意留難濫差生事使官米壅積澤不下逮者即行參處如此則官米流通市價亦平疏下大學士九卿議尋議查京城附近居民貿易者多耕種者少糶賣官米原以接濟民食使人人得霑減價之實惠內外城碓房不下千餘所率每日賣米舂碓肩挑出門沿街貨賣少藉餘利以資糊口而民間買米之人有離厰遙逺老弱婦女每藉小販到門就便買食此等小鋪正須有米舂碓然後米食流通價不昻貴且皆係本少力微原無多囤居竒之事若五城各官辦理未協官米不許轉賣則碓房之米來路既少沿門糶賣價值轉昻有損無益請嗣後五城發糶官米如有姦民串買囤積至四五十石及買作燒鍋之用者俱嚴行查拿治罪外其餘肩挑背負不過數石者概免查究則赴厰之窮民可無盤問守候之苦即碓房之販糴亦收買賣流通之益而米價可免騰貴矣從之又以直屬雨水過多撥天津北倉截留漕米於被水州縣減價平糶又令湖南採貯米石以濟兵食湖南辰州府屬永綏協營兵糧不敷眷屬之資議於司庫公項內動銀二千兩令同城駐防永綏同知赴産米州縣採買運貯髙巖倉交營員收貯遇有闕食兵丁酌量接濟又命撥兩淮義倉米榖減價平糶先是兩江總督慶復言兩淮鹽義倉米榖揚州倉存十二萬石泰州倉存六萬石其餘三十六萬石分派上下江通融撥補此項榖石因今冬挑濬運河民食維艱仍運赴揚州平糶將糶出價銀分撥上下兩江得旨允行至是兩淮巡鹽御史三保言淮商連名具呈懇請減價併將額存揚州之十二萬石一併發糶倘此十二萬石內將來買補不敷該商等情願公捐補足奉諭旨義倉積貯原以惠濟貧民今大工興舉河道不通時值隆冬小民生計艱難傭工夫役霑體塗足俱堪憫惜現今平糶之米每升制錢七文較之市價已為平減今再格外施恩每升減錢二文以五文一升計算每石僅糶銀六錢有零於小民實有禆益俟糶完之後將糶出價銀分解上下兩江如此項榖石不敷糶賣即將揚倉之十二萬石一併平糶此十二萬石之內將來買補缺額衆商既稱情願捐補伊等從桑梓起見補實倉庾以濟民食著照所請行但不必過於急遽至平糶之事在揚城者著三保會同知府辦理其山陽髙寶江甘等州縣著該地方官辦理仍著總督那蘇圗巡撫楊永斌不時查察務使小民均霑實惠三年移城內平糶六厰於城外大學士鄂爾泰等言五城所設米厰六居城內四居城外請將城內六厰移於城外關廂俾城鄉居民就近糴買并將八旗兵丁應領之稄米折銀給發即以此項米石運厰平糶每城另派御史一員稽察從之又奉諭旨乾隆元年六月朕曽降旨各省出借倉榖與民者舊有加息還倉之例此在春月青黃不接之時民間循例借領則應如是辦理若值歉收之年豈平時貸榖可比至秋收後祗應照數還倉不應令其加息此乃兼常平社倉而言也今聞外省奉行不一凡借社倉榖石者照此辦理而借常平倉榖者遇歉收之年仍循加息之成例似此則非朕降旨之本意矣嗣後毋論常平社倉榖石若值歉收之嵗貧民借領者秋後還倉一概免其加息俾蔀屋均霑恩澤又復設崇文宣武門外米厰并永定德勝二門適中地方添設米厰平糶從户部尚書海望請也四月於城內添設米厰三所各撥稄米三千石平糶又以山東河南二省麥秋大熟命該撫動支庫帑糴買餘糧存貯又令四川建社倉初四川糶賣常平倉榖價銀除買補正項外令將餘銀均買作社糧以為民倡尋該省士民相率樂捐自乾隆二年秋後買貯榖二千九百七十餘石捐貯榖二萬五千六百餘石又達州內江等三十餘處舊存貯榖二萬一千石以上合計川省新舊社榖凡四萬九千五百七十石有竒均令加謹收貯照常平倉例每榖四百石建厫一間其工料銀於存公銀內動支又申明直省買補倉榖之例先是元年議準秋收買補倉榖照各地方時價足數給發不得稍有短少至二年又議準被災州縣倉糧散給無存者務於秋收豐稔之時即題明撥銀完補以實倉儲如逢水旱價值昻貴令將存價緣由咨部以俟次年秋收採買如次年仍延緩不買以玩視倉儲例參處至是復議定買補倉榖嚴禁派纍小民及發短價低銀抑勒交糧或斗稱以大易小以重易輕有蹈此者即詳揭參究督撫徇隱者并罪之再買補時若秋成榖價仍昻則就鄰近價平之處於春月購買補足如鄰近價亦未平暫停買補或俟次年麥收豐稔買麥收貯秋成易榖還倉或竟俟次年秋成買榖隨時酌量辦理至倉榖無多地方不便虛懸令確訪鄰省價平之處委官採買其原糶價值不敷即於通省糶價內通融撥補倘再不足準其將糧價運費腳費在於藩庫存公銀內酌量撥給至應買若干之數預行知受買地方隔省則知會督撫轉行知照買足運回之日取具地方官印結將數目價值一併送府驗報察核又準兩江總督那蘇圗條奏分别平糶事宜兩江總督那蘇圗遵旨議言常平倉榖每年存七糶三秋成買補本屬法良意美祗以有司奉行不善遂至滋弊多端自宜詳定章程庶使永逺遵守但平糶一事原有不同有於歉收之後不拘三分之數發糶以濟民食者有於青黃不接之際市米昻貴發糶以平市價者有市價雖不昻貴祗因米榖難以久貯循例發糶以易新者三項之情事既異則隨時之辦理宜分查江南省各府州縣附城人民習於經營率皆不務農業終年糴米而炊居鄉之民人以力田為事秋成之後尚有儲蓄糴米者少此各屬情形之大較也今詳細斟酌如該地方當歉收之後則城鄉之民均無蓋藏咸資糴米時價必至倍昻應於城鄉八方多設厰所預定開糶日期令村莊居民各赴附近厰所糴買州縣印官及佐雜教職分頭巡視監糶并將平糶價值大加酌減兼應不拘糶三之數以濟窮民如年嵗原屬豐稔則鄉間頗有蓋藏惟城市居民當青黃不接之際市價昻貴必藉平糶應止於四城關廂及大鎮集處所酌量設厰其糶價止須視倉中米榖成色比市價酌減一二分因地制宜臨時報明督撫核定發糶不必大為減少蓋此不過藉平市價非歉嵗缺米可比兼之買補之時亦免不敷數多動請撥補徒耗公項而姦民囤户利不甚裕自不干蹈法紀肆行囤積窮民得霑實惠至於年既豐登市價亦不昻貴不過循例易新者則聽各州縣自行酌量公平出糶或稍為減價以便秋後買補此平糶一事似宜分别三等辦理庶有實濟若襟户役户牙户囤户以及倉書丁役乘機串通揑買暗竊事在必有查江南各州縣現行保甲逐户懸挂門牌紳襟衙役商賈庶民俱經登注一目了然平糶之時應令貧民各齎門牌赴厰驗糴兼令保甲稽察自無揑買其糶給之數每戶以二斗為率不許過多則囤戶亦難施其伎倆至丁役竊賣則惟令本官於出倉之時親身監視發糶之後稽核清楚或未糶而缺米或已糶而無價即嚴行追究自可水落石出倘該州縣仍不實力奉行致有前項等弊該管上司察實參處從之時雲南總督慶復議以分設各厰則人少易於查察出糶時令各鄉保在旁識認如有襟户等揑名報買即行舉究又準兩廣總督鄂彌達條奏平糶減價之法兩廣總督鄂彌達言平糶之價不宜頓減蓋小民較量每在錙銖平糶時市價必貴若官價與市價相去懸殊市僧惟有藏積以待價豈能抑價以就官而小民之藉以舉火者必皆仰資於官榖倉儲有限其勢易罄而商販轉得居竒於其後是欲平糶而糶仍未平也從來貨集價落民間既有官榖可糴不全賴鋪户之米以供朝夕鋪户見有官榖發糶而所減有限亦必少低其值以兾流通請照市價止減十分之一以次遞減期平而止則鋪户無所􅍾其權官榖不虞其匱榖價可以漸平而小民實霑其惠矣從之又派員往張家口古北口二處採買米豆雜糧運京平糶奉諭旨京城米價現在不能平減來春青黃不接之時恐益加騰貴著派出户部司官二員內務府官二員於張家口古北口二處每處各二員携帶內庫帑銀前往會同地方官將米豆雜糧照時價採買運送來京交八旗米局平糶使都門兵民得資外來之米而口外有餘之糧亦不致耗費於燒鍋等無用之地實屬兩有禆益嗣戶部議古北等口運到米豆雜糧已交八旗米局存貯者各該局在內城發糶嗣後運到俱交五城於城外關廂存貯俟來春開放平糶從之又直𨽻總督孫嘉淦奏明春漕運粟米請截留十萬石存貯天津北倉以便分給續賑平糶從之四年截留江蘇漕米二十萬石以備平糶之用又議準西安巡撫張楷奏定社倉事例一社長定三年更換以杜欺弊一春借之時酌留一半以防秋歉一限令每年清還兼收麥石以省拖欠一將借户榖數姓名粘貼曉示以除揑冒一令地方官稽查交代分賠以専責成又令江南收買民間有餘麥石户部議覆兩江總督那蘇圗奏言江南各屬麥收豐稔小民有餘之麥必將急於糶賣既恐價賤傷農兼恐姦商富戶囤積射利或販賣出境均與民食有關應令各屬詳察本境情形如果二麥有餘價值平減該印官或將平糶米榖價銀或於司庫撥項在麥糧聚集處所凡遇民間糶剩之麥即照市價收買存倉不必拘定數目若麥少價昻即行停止所收麥石俟秋禾一有定局或易榖存倉或動撥濟用總期因地制宜隨時辦理應如所請從之又發帑糴口外雜糧直𨽻提督永常言今嵗口外收成較往嵗倍為豐稔八溝等處民間雜糧甚多艱於出糶似應乘此糧多價賤之時令地方官按市價給發官銀採買奉諭旨著户部酌量給發帑銀數萬兩交與永常會同地方官採買口外雜糧分貯附近各倉以為地方儲蓄並使民間得價以資嵗底用度又令浙江買補倉榖時浙江各屬買補倉榖議令除今嵗偶有偏災收成歉薄者暫停買補外豐收之地將乾隆三年四年糶榖照數買足其餘各屬飭令將三年所糶之榖全行買補四年所糶之榖在四千石以下者亦全行買補四千石以上或緩買十之三或緩買一半隨宜辦理又令四川買榖分貯川省秋收豐稔米價平減議令動藩庫雜稅銀三萬兩地賦銀十二萬兩委官於成都等六府州縣附近水次出産米榖最多處分行採買交該地方官於沿江州縣空出倉厫內加謹收貯其採買不拘額數限期但遇價增即行停止又設立浙江福建四川各屬營倉浙江溫州鎮所轄樂清等九營於公糧銀內動支買榖分貯以濟兵食每兵一名備榖二石共買榖萬三千三十八石令都司各官盤收監管遇青黃不接每兵按月借榖六斗分作六月扣存共建倉二十三間每間貯榖六百石又溫州鎮標三營及城守營建倉十間共貯榖五千九百二十八石福建海壇金門澎湖閩安烽火銅山六鎮協營共買榖二萬石分貯遇青黃不接酌借兵丁免其加息秋收散餉扣除買補共建倉四十三間四川成都駐防兵米向例俱係折色每遇價昻艱於採買亦令將司庫現存生息餘剩銀飭發附近州縣及時採買遇青黃不接支給各兵在餉銀內扣還有浮冒尅扣者劾之議定陜甘社榖分别經理陜西甘肅所屬社榖有二一係百姓公捐自行議定倉正倉副經理出入報官存案不入官之交代仍聽民料理一係加二耗糧內留五分為社糧責成地方官經理五年準河營設立倉厫先是元年準於河標四營建設營倉以資兵丁接濟至是河東河道總督白鍾山言黃河南北兩岸河兵堡夫終年力作晝夜在工較之標營兵丁尤為勞苦而向來未經設有倉儲當糧少價昻之時不免稱貸貴糴上年地方偶被歉收兵夫更覺拮據臣再四熟籌必得如標營一例設倉積貯庶可通融接濟於兵夫有益而春借秋還年年出易亦可垂之久逺請動河營生息銀六千餘兩乘此麥多易買之時在附近沿河地方照依時價公平糴買麥石收貯為數無多採買自易設或市價稍昻亦即行停買將餘剩銀兩俟秋收後再行買榖此項倉儲交蘭陽縣知縣經管出入管河河北兩道公同按季盤查稽察該道等於每年春間糧價昻貴之時具詳借給兵夫秋收催令照數歸還免其加息從之又準山東省買豆補貯巡撫朱定元言上年東省被水蒙恩賑恤及厯年春糶並碾運直𨽻動用過各項倉榖共一百餘萬石均未買補現嚴飭各屬及早照額買補但東省今年雖號豐收閭閻尚少蓋藏是以榖價均未平減唯黃黑二豆因秋後雨水調勻較他種多穫其價較上年豆價減半止青州一郡因有滿兵駐防其價稍昻然豆之為利甚溥不惟馬可壯臕人亦充腹且質性堅實又可耐久是以漕米尚許改徴若得通融買補貯倉不惟倉儲易於充實帑項得以節省而豆榖分買榖價不致頓昻於災後民生甚屬有益請令地方官將原存榖價不拘榖豆兼買一併實貯歸倉俟來年平價再行糶豆易榖酌盈濟虗庶緩急有資而公私咸賴矣再豆榖兼買則出借之榖亦仰請聖恩許民間即以豆還榖則小民既免糶豆易榖之消耗而此時有豆之家亦可及時清完欠項不致糜費難追更為便民從之六年奉諭旨地方積榖不厭其多賑恤加恩亦所時有正未易言倉儲充盈州縣有司往往慮及黴變賠補以多積榖石為憂其如何酌量定例俾其從容不致賠補之處該部議奏尋議除地髙燥不致黴變及倉榖減少每年可按數出易者外其有地本潮濕積榖最多不便經年久貯者令各該督撫查照厫座新舊年分逺近照京倉氣頭厫底數目酌減開報估成糶賣題明辦理從之十二月奉諭旨國家設立平糶乃惠濟貧民第一要務但恐發賣官榖之處與鄉村相隔遙逺則小民搬運為難是以乾隆二年因直𨽻山東平糶濟民曽降諭旨如離府縣城郭路逺鄉村有司當設法運至倘腳價無出或動存公銀兩或開銷正項錢糧皆所不惜今年江浙地方有被災之州縣明年麥秋以前非平糶不能接濟民食該撫務飭有司查明道路之逺近將食米四路分糶以就民便著該督撫妥協辦理至於胥役有剋減升斗之弊家丁有得錢私糶之弊姦民有冒濫販賣之弊均當嚴行查察有一於此法在必懲毋得姑縱又免臺灣買運還粵榖石本年夏間臺灣米價昻貴曽令借撥潮州倉榖六萬石接濟平糶俟秋成買榖還粵至是以臺地榖價尚昻奉諭旨著將借撥潮州倉榖六萬石免其買運還粵其平糶榖價即留閩買榖以備倉儲至潮屬因借撥所缺榖數著將該處收捐之項照數補足七年奉諭旨從前廷臣議準張渠買補倉榖一事以本邑之贏餘為本邑之撥補其他州縣不得通融如嵗歉榖價昻貴不敷採買準其展限朕思地方積榖原以備民間緩急之需必及時買足方於儲蓄有益若一概不許通融而無贏餘之州縣或又值嵗歉價昻咨部展限則倉儲必至久懸非濟民利用之道也嗣後如州縣當秋成之時榖價髙昻不能買補而該處存倉榖石尚可接濟者照例展限於次年買補倘榖價既屬不敷而貯倉榖石又係不足準其詳明上司以别州縣榖價之贏餘添補採買為酌盈劑虗挹彼注兹之計該管督撫一面辦理一面奏聞又從前張渠奏請減價糶榖於成熟之年每一石照市價核減五分米貴之年每一石照市價核減一錢此蓋欲杜姦民賤糴貴糶之弊也但思尋常出陳易新之際自應遵此例行假若荒歉之嵗榖價甚昻止照例減價一錢則窮民得米仍屬艱難不能大霑恩澤嗣後著該督撫臨時酌量情形將應減若干之處預行奏聞請旨如有姦民賤糴貴糶之弊嚴拿究治又命各省遇歉嵗平糶毋拘成例奉諭旨各省常平倉榖每年存七糶三原為出陳易新亦使青黃不接之時民間得以接濟當尋常無事之際自然循例辦理若遭值荒歉榖價昻貴小民難於謀食而仍存七糶三則閭閻得榖幾何大非國家發榖平糶之本意也嗣後凡遇嵗歉米貴之年著該督撫即飭地方官交出倉儲減價平糶務期有濟民食毋得拘泥成例又令直𨽻磁州永年等州縣將存倉榖石減價平糶先是四月令直𨽻總督髙斌遣官赴河南採買麥石至是奉諭旨據髙斌奏磁州永年曲周邯鄲成安肥鄉廣平雞澤等八州縣麥收甚為歉薄著將現存倉榖減價平糶倘有不敷即於鄰近倉儲贏餘州縣撥運濟用仍俟赴豫採麥到日多撥平糶著該部速行文該督實力奉行又奉諭旨各省地方每遇歉收米價昻貴國家動撥倉儲減價平糶乃養民之切務然有司經理不善即滋弊端是以本年二月間特降諭旨令該督撫等於平糶時酌量情形應減若干之處預行奏聞請旨今朕再四思維地方當飢饉之時黎民乏食朝廷百計區畫方且開倉發粟急圗救濟一賑再賑以安全之豈有於平糶一節預防姦民之賤糴貴糶不為多減價值而使嗷嗷待哺之窮民仍復艱於糊口乎况赴官糴買官米與赴店糴買市米其難易判然又可厯數銀色有髙低之不等等頭有輕重之不同道里有逺近之各殊守候有久暫之莫定此在平時且然何况年荒乏米之日若官價較市價略為減少所差幾何是國家徒有平糶之恩而閭閻未受平糶之益也朕痌瘝在抱言念及此再行明白宣諭凡各省大小官員皆朕設立以牧養斯民者倘於此等要事視為具文茍且塞責則罪不可逭嗣後務將該地方實在情形必須減價若干方於百姓有益之處確切奏聞請旨至於姦民當歉收之年圗利囤積將官榖賤糴貴糶則惟在州縣官嚴行查拿倘或疏漏隱匿該督撫即嚴參從重治罪是亦並行而不悖也是月復申諭湖南有司奉諭旨各省常平倉榖遇地方米少價貴之時當多糶以濟民食毋得拘泥成例從前已屢經降旨今許容奏稱青黃不接糧價增長各州縣詳報市米稀少平糶倉榖已符額數等語此言甚屬不經是湖南有司並未領會朕旨也國家儲蓄倉糧専為接濟百姓而設若民間米榖充裕即三七之數亦可不需如粟少價昻則安得以存七糶三目為額數今許容所轄一省如此錯誤或他省有似此者亦未可定可即通行傳諭知之又申諭古北口採買米石之法先是古北口地方收成豐稔令將河南山東所有應供陵寢官兵米石運往江南接濟令古北口於本地購買以補原額至是復奉旨此外再廣為收買以備將來撥用其採買之道視收成豐稔之處照依時價不可勒派亦不可急於多糴使民間反致價昻此不過恐榖賤傷農之意耳又準山東行銷票鹽商人輸榖建倉分貯山東行銷票鹽地方共十有三萬七千五百有七票分上中下三等照票輸榖章邱濟陽萊蕪淄川新泰德平鄒平商河臨邑惠民十縣列為上等每票輸榖二石共榖八萬九千八百五十八石陵齊東陽信長山博山樂陵青城臨淄樂隂臨朐益都髙苑沂水費十四縣列為中等每票輸榖一石五斗共榖七萬六百二十六石莒新城博興濱蘭山海豐樂安蒲臺日照霑化利津夀光昌樂濰郯城十五州縣列為下等每票輸榖一石共榖四萬五千四百九十四石通計輸榖二十萬五千九百七十八石分限二年交倉倘遇本處歉收仍準展限於下年買足分發章邱等三十九州縣每年照社倉例於春夏之交察明實在乏食窮民借給照例加一收息應建倉厫在於城內及巨鄉大鎮搆造每處立社長社副并按米石多寡設立斗級社長社副每年各撥給息榖二十四石斗級每年各十二石以資養贍每年出借收領責成地方官稽察又奉諭旨天時有雨暘地土有髙下而年嵗之豐歉因之以天下之大疆域之殊歉於此者或豐於彼全賴有無相通緩急共濟在朝廷之採買撥協固自有變通之權宜斷無有以米榖短少之處而強人之糶賣者若有收之地商賈輻輳聚集既多價值自減則窮黎易於得食此鄰省之相周與國家賑恤之典相濟為用者也我皇考與朕俱曽屢頒遏糴之禁惟是地方官民識見未廣偏私未化未免以米糧出境稍多價值漸貴雖不敢顯行遏糴靡不隱圗自便羣相禁約有司又從而偏袒之遂視鄰省為秦越矣用是再頒諭旨著各省督撫各行勸導所屬官民毋執畛域之見務敦拯恤之情俾商販流通裒多益寡以救一時之困厄將來本地或值歉收又何嘗不於鄰省是賴並將此曉諭官民共知之臣等謹按平糴之道有二榖賤增價而糴使不傷農榖貴減價而糶使不傷民此官糴於民也豐熟之鄉商賈交糴以起太賤之價災歉之區舟車輻輳以壓太貴之直此民糴於民也官糴於民則馬端臨考所已載如常平倉是也民糴於民則馬端臨考所未載如禁遏糴開米禁戒囤積興販各條是也蓋聖天子因民所利而斟酌調劑慮無弗周法無弗備是以利澤溥遍蒸民率育惠民之政與導民之方交資並濟而糴之義始盡矣八年以米價增長發京倉官米平糶黑豆亦如之嗣復奉諭旨今年直𨽻所屬河間等處偶被偏災彼地貧民赴京覓食者俱已加恩賑濟但其間尚有不在賑濟之數者或手藝營生或傭工度日適值米價暫昻當此嵗暮天寒情殊可憫著户部將京倉米石酌量給發各旗局及五城米厰照依時價核減平糶賣與零星肩販之人俾得沿途糴買皆霑實惠九年以停止採買諭各省督撫斟酌辦理奉諭旨積貯乃民食所關從前各省倉儲務令足額原為地方偶有水旱得資接濟是以常平之外復許捐貯多為儲蓄無非為百姓計後因糴買太多市價日昻誠恐有妨民食因降旨暫停採買俾民間米榖自在流通價值平減亦無非為百姓計也乃近聞各省大吏竟以停止採買為省事不思常平之設不特以備荒歉即豐稔之年當青黃不接亦得藉以平糶於民食甚有關係其間因時制宜原不可執一定之見今因停止採買之令遂任倉厫闕少置而不理將來必至糶借無資固非設立常平本旨又豈朕停止採買本意乎各省督撫務須斟酌地方情形應買則買應停則停總在相機籌畫不可膠執定見希圗省事又以直𨽻米價昻貴於四路同知駐劄之處分設四厰平糶從順天府尹蔣炳請也東路之通州西路之蘆溝橋北路之沙河三厰各發米二千石南路之黃村發米六千石即令各該管同知就近管理平糶通州一厰交通永道稽查沙河一厰交霸昌道稽查蘆溝橋黃村二處各派御史一員稽查又仍於通州設立兩局糶賣官米通州糶賣官米向年設有兩局每局領本銀八千兩於八旗大臣內欽派二員經管每季收買俸米以備平價之需嗣於雍正十三年將京城每旗三局歸併一局時亦將通州兩局歸併一局止留本銀六千兩收買俸米交與倉場侍郎等經管至是都統永興言每季通倉約放俸米十九萬餘石關米人員所賣之米不下十萬石官局儘所有本銀六千兩收買外其餘俱係民間分買關倉之後民間所收之米盡行增長價值官局雖欲平市價而所收米石無多實有寡不敵衆之勢是徒有官局之名究無平價之益請通州地方除新城現設官局外仍於舊城內揀取官房一所添設一局每局發給本銀一萬兩於放米時令地方官稽查先儘兩處官局收買足數方準民間收買關倉之後官局將所收之米照時價稍減出糶以平市價其應領俸米兵米人員有情願借支者準於放米前一月將局內米石支借至關米時扣清若遇歉收之年即將兩局之米減價平糶再倉場侍郎事務繁多兩局實難兼顧并請於八旗大臣內欽差二員管理每月將出納銀錢米石數目咨報戶部都察院及該御史等查核從之又撥湖北米十萬石運赴浙省以備賑糶所糶之銀歸還楚省買補倉儲從湖廣總督鄂彌達等請也又議定陜甘積貯榖數議準陜西西安所屬常平榖二百七十三萬三千有十石按州縣大小分貯咸寧長樂二縣各貯榖七萬五千石葭州神木等七州縣各貯榖五萬石綏德膚施等十二州縣各貯榖四萬石富平臨潼等七州縣各貯榖五萬石乾州三原等八州縣各貯榖四萬五千石華州藍田等十一州縣各貯榖四萬石邠耀等七州縣各貯榖三萬石商鄜等十七州縣各貯榖萬七千二百餘石同官麟遊等七州縣各貯榖八千石興安洵陽等七州縣地氣潮濕多貯恐致紅朽仍以見存舊榖四萬四千五百四十石作為定額又設立河南營倉河南駐防營所需糧餉草豆向係折色遇糧價昻貴未免購買拮據議令於兩翼各設常平倉一座將駐防營息銀於麥熟秋收價平之際無論米豆二麥均行買貯遇青黃不接照依原價糶給兵丁俟麥熟秋收買補十年撥口外二溝地方存貯米石運赴熱河平糶又於密雲古北口等處撥糧平糶密雲古北口一帶有運到漕糧一萬五千餘石又口外四旗通判所屬及喀拉河屯等處現貯倉糧一萬二千餘石即於此內酌撥平糶貧民無力糴買者令地方官酌量戶口情形借給麥收後補還兵丁無力者借支糧石亦於月餉扣還又以宣化府屬州縣有現存糧二十餘萬石俱可以供民間借糶之用并委員照例速辦以資接濟十一年令臺灣買榖備貯以福建福興漳泉四府民食不能不藉臺灣運濟議令臺屬各廳縣於本年二月內買足四十萬石之榖永為定額遇有內地需用即於此內動撥仍發藩庫銀交臺隨時買補又撥京通倉色米運至昌平州平糶又以鹽山慶雲寧津三縣民間市糴艱難奉特旨於糶三之外多撥倉榖每石大為減價設厰城鄉糶賣俾閭閻不致乏食又令淮徐海三府州於所屬豐收地方買補倉儲奉諭旨據陳大受奏稱淮徐海所屬州縣倉儲多缺現存糶價積至十四萬兩之多未曽買補朕思三屬乃係常被水患之處積貯尤關緊要何以存貯銀兩不預於豐收之地買補及至被災仍欲於本地採買徒增時價於民何益已降旨訓諭令於所屬豐收地方或麥或榖委員採買尹繼善共有地方之責將此一併傳諭知之旋復奉旨貯價未買者自不獨江南一省今嵗豐收之處尚多正宜趂此時留心籌畫預為倉貯民食之計俾不至榖賤傷農但必以本地之榖補本地之倉恐收成分數不齊産米多寡不一或因一時採買米價又致昻貴有妨民食著該督撫酌量所屬地方情形有二麥既豐而秋成又稔者動撥厯年所存榖價分路採買亦不必迫期足額務須妥協辦理又定山西義倉事例山西義倉士民捐榖議定照直省社倉之例其所收雜糧按照米榖時價折算奬賞州縣能捐俸急公首先倡率捐五十石者記功一次百石者記功二次百五十石者記功三次二百石以上者注册送部察核先豫記功三次三百石以上者於現任內紀録二次義榖照直省之例分鄉收貯春借秋還照社倉例每石加息一斗所需倉費亦照直省於息榖內動用倘士民情願捐資建倉或捐倉屋地基木料等物準其計價合算榖數彚入捐榖內分别奬賞再慎選倉正倉副分别勸懲遊惰民人禁其濫借均照社倉例辦理每遇州縣官交代時照例盤查如有私借那移分别參處至貯榖之鄉附近村莊如猝遇氷雹例不成災農民有闕乏口糧籽種者準其將榖借給每年春借秋還先盡雜糧出易俟本息充裕之日再照存七糶三辦理其每百石收息十石內一石為倉正倉副紙張飯食之需一石為倉榖折耗一石為賃房之費如遇歉收免息之年所需費用於上年餘剩息榖內借給俟下年收息照數撥還又設立山東營倉山東河標兵丁食米拮據議令將標營生息銀買榖四千石設倉存貯令城守營都司經管河標副將盤查春間借給秋成免息徴還十三年發京倉官米撥給各旗并五城米局減價出糶以平市價又以江蘇米價未能平減撥江西倉榖碾米十萬石運至江蘇以備平糶又議定各省倉榖存糶額數先是奉諭旨米榖為民生日用所必需朕夙夜籌維所以為百姓謀朝夕者纎悉具備而邇年以來各省米價不見其減而日見其增反覆推究莫知致此之由常平積貯所以備不虞而衆論頗以為採買過多米價益昻因思生榖止有此數聚之官者太多則留之民者必少固亦理勢之自然溯查康熙雍正年間各省常平已有定額朕以積貯為要故準臣工奏請以捐監榖石增入常平額雖益倉儲實礙民食朕既知初意之失不可不為改弦之圗直省常平積榖之數應悉準康熙雍正年間舊額其加貯者以次出糶至原額而止或鄰省原額不足即就近撥運補足所需運價照例報銷其如何彼此撥運並查定原額及原額存糶之法著大學士會同該部悉心妥議具奏嗣復奉諭旨朕前降旨將各省常平貯榖之數悉照舊額令大學士等查明妥議但各省奏報常平倉存糶米榖其乾隆十三年實數尚未報部若僅據從前報部册查核則十三年又有動用之項統不足憑即可傳諭該督撫等將康熙雍正年間額數若干及該省現年實存若干糶借若干現存糶價若干查明確數逐一分晰即繕清摺具奏俟奏到時交大學士等據所報實數會同該部妥酌定議嗣復奉諭旨據舒輅奏稱上江各屬存貯節年未買糧價及本年平糶價銀二十七萬餘兩一時不能採買而頻年存貯州縣庫中將來恐不免於侵那現在籌酌如倉額未足與存價少者俱令將價先行解貯該管府州秋後領銀採買其存價甚多一時不能買足者分别酌留應買之數外餘價俱行提解司庫等語舒輅如此辦理較為妥協朕前降旨各省倉榖俱照康熙雍正年間舊額其餘皆停止採買則所存榖價銀兩與其存留各州縣以啓侵那之弊不如令解藩庫以備臨時動撥可傳諭各省督撫照舒輅所奏提解司庫將來各州縣即有應用再從司庫請撥亦為妥便如康熙雍正年間舊額之內應行買補者其榖價仍存州縣以備酌量買補若舊額之外所餘糧價有必應需用之處準其分别酌留其餘悉令解司該督撫等就各省情形悉心查辦仍遵前旨一面將康熙雍正年間額數及現年實存糶借等項數目速行具奏應否動撥之處聽軍機大臣等會議尋議直省常平倉所貯米榖康熙年間或未經定額或定額無多間有檔册不全難以稽考應請照雍正年間舊額內惟雲南地處極邊不近水次西安甘肅沿邊積貯兼備軍糈各該省雍正年間倉貯多寡亦屬無定應以乾隆十三年以前現額為準雲南積榖七十萬一千五百石西安二百七十三萬三千有十石甘肅三百二十八萬石又福建環山帶海商販不通廣東嶺海交錯産榖無幾貴州跬步皆山不通舟楫倉貯均宜充裕酌量三省情形即以現存之榖作為定額福建二百五十六萬六千四百九石有竒廣東二百九十五萬三千六百六十一石有竒貴州五十萬七千十石有竒其餘直𨽻奉天山東山西河南江蘇安徽江西浙江湖北湖南四川廣西悉以雍正年間舊額為準直𨽻二百十五萬四千五百二十四石奉天百二十萬石山東二百九十五萬九千三百八十六石山西百三十一萬五千八百三十七石河南二百三十一萬九百九十九石江蘇百五十二萬八千石安徽百八十八萬四千石江西百三十七萬七百三十石浙江二百八十萬石湖北五十二萬九百三十五石湖南七十萬二千百三十三石四川百有二萬九千八百石廣西百二十七萬四千三百七十八石通計一十九省應貯榖三千三百七十九萬二千三百三十石有竒較之乾隆十三年以前現額四千八百一十一萬六百八十石有竒計減貯榖一千四百三十一萬八千三百五十石應令該督撫按所屬大小均勻存貯其間有轉運難出産少地方緊要以及提鎮駐劄處所並各省犬牙相入之處彼此可以協濟者均應分别加貯至各省有餘不足之數查直𨽻江蘇江西湖北湖南山西廣西安徽山東四川雲南西安福建廣東貴州一十五省皆係額外有餘奉天浙江河南甘肅四省皆係額內不足查額外有餘省分內除四川現辦軍糧山東西安賑務未竣動存數目尚難確計外其餘直𨽻等一十二省現在實存榖并米折榖共一千六百二十萬八千六百八十二石有竒出借榖并米折榖二百七十五萬七百一石有竒平糶榖并米折榖二百六十五萬八千八十一石有竒存價銀一百九十九萬五千七百七十三兩有竒錢九萬五千七百五十千文有竒臣等將實存并借糶榖數劃抵定額外約計溢額榖及以米折榖三百二十一萬九千一百七石有奇存庫糶價銀一百四十二萬八千一百二十七兩有竒又錢三萬六千二百三千文有竒應令將現在溢額榖石及出借徴還餘剩榖石以次出糶其現在溢數糶價提貯司庫酌撥或額內出借榖石一時不能催交齊全而該處豐收價平即於此項糶價銀內奏明酌留買補再額內不足省分原應就近協撥但查奉天一省現據該府尹奏明以徴收地米陸續補足河南現據該撫奏明本年收捐本色尚未截報除抵補外缺額亦屬無幾浙江甘肅現存米榖尚有未備而鄰近省分實在溢額之榖亦皆無多均應以收捐本色漸次補足毋庸彼此撥運至於存糶之法定例存七糶三然風土有燥濕年嵗有豐歉價值有貴賤地方有衝僻各省情形不同向來辦理亦量為增減其每年平糶之榖照例秋收以原價買補價平則買價貴則停總在地方大吏因時因地妥酌奏辦使倉儲有充餘之益而閭閻無食貴之慮從之臣等謹按是年核定各省常平貯榖額數具列如前此外另倉貯備各省有無不一大率皆因地之宜而為之制今依會典所載條列如左河南漕榖倉貯榖七十七萬五千一百四十三石有竒江寧省倉貯榖萬二千石崇明縣倉貯米抵榖二萬石浙江永濟倉貯米八萬四千四百三石有竒玉環同知倉貯榖六十石廣東廣糧通判倉見存榖九萬二千七百八十五石平糶榖六千三百四十五石存價銀三千三百八十四兩有竒福建新設臺灣倉貯榖四十萬石見存三十九萬六千七百十六石有竒皇朝文獻通考卷三十六
