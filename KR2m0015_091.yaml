body:
  text: 欽定四庫全書皇朝文獻通考卷九十一郊社考一郊臣等謹按聖王之制祀典禮莫大於郊義莫重於配天惟天子父天母地得以行之三代之制冬日至則祀圜丘以大報天孟春上辛為民祈穀嵗凡郊祀者再仲夏而雩夏至則祀方澤禮至備義至精也漢承秦制採緯書方士之說其禮叢雜不經又率領于祠官親祀者寡若南郊北郊分祀合祀自漢及唐紛紜莫定宋世三年一郊於義為疏盖其禮文太繁儀衛太盛賞賚太厚而肆赦尤濫非大禮必簡之義也明初合祀禮行而冬至反闕嘉靖定禮頗酌古今之中然祭多遣攝誠敬微矣恭惟聖朝定制典文盛於三代損益邁於千古若乃齋必致嚴無故不攝尤前代所萬不能及者謹次第纂紀以昭鉅典焉崇徳元年四月乙酉太宗文皇帝肇祀天於圜丘太宗文皇帝於是嵗受尊號改元先是天命元年貝勒以下諸臣奉上太祖髙皇帝尊號曰覆育列國英明皇帝立國建元行焚香告天禮而郊壇之制未備太宗光宅盛京建圜丘於徳盛門外其制九成週圍一百十丈南門三東西北門各一是嵗天聰十年王貝勒以下諸文武大臣以太宗功徳隆盛奉上尊號曰寛温仁聖皇帝先期太宗率王貝勒以下文武羣臣齋戒三日以太牢親祀南郊建國號曰大清改元崇徳是為本朝祀天於郊之始舊例以生牢祭告即以祭肉分給衆官太宗諭曰古帝王當未知火食之前即行祭天之禮是以用生牢致享後世特踵而行之未之有易耳况以恭祀上天之胙分給衆官令各於其家享之是反汚䙝也可熟而薦之於是定制祭天用太牢熟薦十一月乙丑冬至大祀天於圜丘親詣行禮是時將征朝鮮齋戒三日以太牢致祀并告出征是為冬至大祀圜丘之始五年冬至以聖躬違和遣官恭代並令文武羣臣齋戒陪祀七年冬至以駐蹕納蘭遣官恭代齋戒如禮停止行獵順治元年十月乙夘朔世祖章皇帝定鼎燕京親祀南郊告祭天地即皇帝位先是七月癸巳以將遷都遣官告祭上帝九月駕入京師十月朔躬祀天地行受寶之禮是日黎明大駕出宫親王以下文武百官皆從鹵簿前導不奏樂出大清門詣圜丘禮官恭導贊引如儀乃迎神三上香畢皇帝行四跪四叩禮羣臣隨行禮乃奠玉帛獻爵讀祝文辭曰大清國皇帝臣廟諱敢昭告於皇天后土帝鑒無私眷隆有徳我皇祖寵膺天命肇造東土建立丕基及我皇考開國承家恢𢎞大業臣以𦕈躬纘承鴻緒值明祚將終姦雄蠭起以致生靈塗炭傒望來蘇臣欽承祖宗功徳倚任親賢爰整六師救民水火掃除暴虐撫輯黎元内外同心大勲克集因兹定鼎燕京以綏中國臣工衆庶僉云神助不可違輿情不可負宜登大位表正萬邦臣祗荷天眷以順民情於本年十月初一日告天即位仍用大清國號順治紀元率由初制伏惟天地佑助早靖禍亂載戢干戈九州悉平登進仁夀俾我大清皇圖永固為此祈禱伏惟歆饗謹告讀畢皇帝率羣臣行一叩禮亞獻終獻徹饌送神皆如儀皇帝復率羣臣行四跪四叩禮乃望燎灌奠如儀九奏樂章改和為平詳見樂考禮成皇帝入御幄南向陞座諸王羣臣以班序大學士奉寶奏曰皇帝已登大寶文武羣臣不勝懽忭學士奉寶置案上鳴贊贊羣臣行三跪九叩禮禮畢皇帝回鑾作樂還宫復御皇極門今為門太和諸王大臣上表稱賀行禮同日遣官告祭太廟社稷是年定制每嵗冬至大祀天於南郊圜丘以大明夜明星辰雲雨風雷為四從壇配享十一月丁未冬至大祀天於圜丘親詣行禮冬至前三日以將行親郊祭告太廟是日禮部太常寺官設齋戒銅人於武英殿正中越二日奉三亭於武英殿貯祝版祭帛香燭金鑪祝版上書御名送至圜丘正祭日禮部尚書奉昊天上帝神位於龍亭内奉安郊壇第一成正位奉安從祀四神位於第二成皇帝親詣行禮禮成還告太廟二年十月定郊祀齋戒及設玉帛祝文香亭儀注詳見儀注三年四月設守視天壇地壇社稷壇官員詳見職官四年三月定大祀南郊用胙牛之禮禮部奏言國初定制祀南北郊及社稷壇向例俱用生牢今應如舊惟南郊以胙牛一進上得㫖照舊例如朕親祀則照例進胙牛遣官則止五年十一月戊辰冬至大祀天於圜丘奉太祖髙皇帝配享前期四日遣官四員告祭天地宗廟社稷正祭日皇帝詣壇行禮奉安太祖髙皇帝神位於上帝神位之左旁青幄内一應禮儀俱與上帝位前同詳見儀注八年三月定祭祀齋戒例凡大祀齋戒三日中祀齋戒二日或親祭或遣官恭代俱於太和殿設齋戒牌銅人各衙門亦設齋戒牌如親祭南北郊王以下公以上各在家齋戒陪祀各官於各衙門齋戒其不在部院衙門者於金水橋兩旁齋戒如遣官代祀則皇帝齋戒王公不必齋戒陪祀各官齋戒如前如親饗太廟祭社稷歴代帝王廟王以下陪祭各官以上俱於家内齋戒如遣官代祀與郊祀例同康熙年中定例齋戒前一日禮部太常寺後專由太常寺題請進齋戒牌銅人越日恭設於乾清門中間東簷下各衙門俱設齋戒木牌若郊壇大祀照例齋戒都察院遣官至齋所㸃齋大清㑹典定制南北郊祀皇帝於大内齋宫致齋二日壇内齋宫致齋一日頒勅羣臣誓戒百執事恭書於版王公陳設於府第文武官陳設於公署各致齋二日隨壇齋宿一日如饗太廟祭社稷皇帝於大内致齋王公於府第文武官於公署各致齋如祭各中祀皇帝於大内致齋百官均於私第致齋凡陪祀致齋各官不理刑名不宴㑹不聽音樂不入内寢不問疾弔䘮不飲酒茹葷不祭神不掃墓有疾有服者皆弗與其有故違不到者察治之若小祀則不進齋戒牌各衙門不致齋四月定諸王文武羣臣陪祭扈從及送駕接駕儀注詳見儀注六月定大祀眂牲省牲之制凡大祀有眡牲省牲之禮是年定制祀圜丘方澤先期三日遣公侯伯一人眂牲前二日遣禮部堂官省牲至十四年二月諭禮部南郊祀天理宜嚴重祀前一日朕親宿齋宫祀前五日朕親詣眂牲如遣官恭代亦著詣壇齋宿眂牲永著為令其年舉行祀典親詣如儀故有皇帝眂牲之禮自後遣官為常㑹典定制凡大祀南北郊前五日遣官恭代眂牲前二日遣禮部尚書一人省牲饗太廟祭社稷以前三日中祀以前二日均禮部尚書一人眂牲十三年七月定祭祀出宫時刻禮部奉諭㫖致祭天地不可不䖍嗣後凡祭圜丘方澤朕於五鼓出宫爾部先期一日奏聞永著為例十四年正月辛亥祈榖於上帝奉太祖髙皇帝配享初制每年正月上辛日祭上帝於大享殿祈榖至是親詣行禮一應儀節俱與冬至大祀同凡祀圜丘以冬至日子時後定用黎明時祈榖以孟春上辛均為大祀皇帝親詣行禮先於太和殿閱視祝版玉帛香祝版用青質朱書上帝正位用蒼璧一青色制帛十有二沉圓炷香一餅香十有二降真圓餅香二十有四樂用九奏黄鍾為宫舞用八佾舞武功文徳之舞牲用犢色尚騂或黝必在滌九旬中祀六旬羣祀三旬爵用匏籩用竹絲純裏髹以漆豆登簠簋犧尊皆用陶列聖配位前牲器皆同無玉用奉先制帛各一速圓炷香各一速方瓣香各五十皇帝禮服用青贊引以禮部堂官太常卿奉福胙以光禄卿接福胙以侍衛從壇大明帛用赤夜明用白牲用特牛星辰制帛十有一青黄赤黒各一白色七牲用太牢雲雨風雷制帛四青黄白黑各一牲同器各有數祈榖不設從壇神位儀注具詳於後三月己酉大祀天於南郊奉太宗文皇帝配享圜丘祈穀壇禮部奉諭㫖禮莫重於事天孝莫重於尊親朕纘承鴻緒恪修典禮每嵗郊祀皆奉太祖髙皇帝配享今思太祖受命上天肇興帝業太宗繼志述事丕振皇猷功徳並隆咸宜崇祀以後冬至祈榖祭天俱奉太宗同太祖配享夏至祭地亦奉太祖太宗配享著為定制部臣議奏肇行配享大典攸闗現今夏至在邇冬至尚遙若先方澤而後圜丘於序少紊若俟冬至太宗配天之後明嵗舉行方澤配享禮為期太逺應不俟冬至夏至即恭製太祖太宗神牌擇吉先行太宗配享圜丘祈榖壇之禮隨行太祖太宗配享方澤之禮前期應遣大臣祭告天地宗廟社稷至期皇上親詣圜丘行禮隨詣祈穀壇行禮儀節俱應如南北郊舊例大禮告成之後宜布告天下奏上悉如所議正祭日詣壇行禮恭奉太宗文皇帝神位奉安於上帝神位之右旁青幄内如太祖配享儀十七年二月定祈穀壇祀典用燔柴禮向例祈穀行禮與冬至同惟不設四從壇神位不燔柴至是諭禮部帝王奉天子民禮隆禋祀享帝大典所闗尤重必儀物克備乃足昭對越之誠向來郊祀惟冬至用燔柴禮祈穀壇未經舉行雖祀典原有等差而同為祀上帝典禮不宜有異嗣後祈穀壇亦行燔柴禮祈穀燔柴自是年始四月己酉合祀天地百神於大享殿先是二月諭禮部帝王父天母地禋祀大典務求至當朕稽考舊章洪武初原係孟春合祭南郊至嘉靖年間始定分祭冬至祀圜丘夏至祭方澤春分朝日秋分夕月而合祭之禮遂止朕思合祭之禮原以畢萃神祇普薦馨香不宜竟廢今欲祗申昭事之誠每年孟春合祭天地日月及諸神於大享殿但禮闗重大爾部詳議以聞部臣議奏合祀事宜請照前明㑹典開載舉行尋奉諭㫖合祭典禮已定於孟春舉行今雖時序已過大典肇修理應本年即舉爾部擇期速議又諭孟春祈穀向例於大享殿今大享殿合祭以後祈榖禮於圜丘舉行部臣議奏大享殿内神座應増設皇地祇神座其從壇照舊用頂架在丹墀内東西相向其東西二十壇原在内壝外設亦宜在丹墀内照東西向少後至於神牌臨期迎請未便應令工部恭製安奉前期一日應於各壇廟行祭告禮又議以啟運山附於中嶽壇天柱隆業二山附於北嶽壇設祭皆從之尋定從祀為十二壇詳見儀注皇朝文獻通考卷九十一
