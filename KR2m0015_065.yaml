body:
  text: 學校考三太學一臣等謹按太學之制詳於禮經尚已王制太學天子曰辟雍又曰成均鄭康成釋辟為明雍為和所以明和天下也宋陳祥道謂明之以法和之以道曰辟雍成其虧均其過不及曰成均蓋學校為造士之地而國學尤為首善之區事則始乎明倫和行而功則全乎成德均才故曰養士莫大乎太學太學者賢士之所關教化之本原也國家恢儒重道尊經右文自定鼎以來即修葺國子監為太學設立文廟講堂􅈦廨萃八旗子弟與直省貢監生肄業其中而以祭酒司業董其成助教學正督其課官司大備條教周詳嗣是列聖繼承頒書賜敇敦勉師儒恩綸叠沛既厚其嵗需復廣其學舍士子誦讀有資講習有業矣我皇上御極之初即命監臣倣宋儒胡瑗經義治事齊法分課諸生時復欽頒切諭以躬行實踐聖賢為已之學為策勵而於司訓等職尤加慎選焉引明經耆宿之儒入充司業嚴考取教習之例澄清化源今優拔副嵗諸生補博士弟子於是道德修明文物風雅郁郁彬彬四方之士贏糧而景從者不逺千萬里至於蕃夷異域蠻徼外臣航海梯山請橫經而受業美哉洋洋乎所謂辟雍成均之化何以加諸若夫鴻碑巨碣聖訓天文皆所以新多士之耳目而昭垂萬古者也臣謹臚太學規制備載於篇順治元年始置國子監官詳定規制置官之法詳見職官考其規制一彛倫堂係詣學御講之所本監堂上官不敢中堂而坐及中門出入王以下文武各官亦不敢中門出入一祭酒司業職在總理監務嚴立規矩表率屬員模範後進一監丞職在繩愆凡教官怠於師訓監生有戾規矩並課業不精悉從糾舉懲治立集監冊凡監生有不遵學規者即登記以憑通考一博士助教學正學録職在教誨務須嚴立課程用心講解如或怠惰致監生有戾學規者堂上官舉覺罰治一典籍職在收掌一應經史書板典簿職在明立文案並支銷錢糧季報文冊一本監正官每入署升堂就位各屬官以次赴堂序揖分列東西相向對揖各堂監生排立恭揖禮畢方退一本監屬官每遇赴堂禀議事務或質問經史皆須拱立聽受一各監生入監日首謁先師廟各生排列廟墀禮生贊行四拜禮畢赴彛倫堂臺下序立謁見祭酒司業行四拜禮隨詣各堂師相見行二拜禮凡遇進監至大門外下馬不許乘馬出入一各監生於朔望日隨行釋奠禮外有講書兩廂及六堂講四書性理通鑑博士講五經覆書上書覆背諸課每月三回周而復始一朔望日祭酒司業率屬員諸生拜謁文廟畢升堂講書一各監生凡聽講書後習讀講章有未能通曉者即赴講官處講解或赴兩廂質問毋得憚煩蓄疑安於愚昧一每日各監生務寫楷書六百字以上須端楷有體一諸生到監日本堂嚴查年貌籍貫經書務取連名保結以防冒名頂替之弊如有犯者照例重處一在監肄業各監生祭酒三月季考一次司業每月月課一次務期齊集不許托故規避一例監生坐監二十四個月恤廕生難廕生考滿廕生坐監六個月恩詔廕生坐監二十四個月恩貢生坐監六個月嵗貢生坐監八個月選拔貢生內廩膳坐監十四個月增附坐監十六個月准貢生坐監三個月例監生內廩膳坐監十四個月增附坐監十六個月俊秀坐監二十四個月貢生有考充教習者連監期共三十六個月至雍正五年定除監期計算一各廕監生途遇師長步行者旁立侯過乘騎者逺下趨避藐忽抗行者决責一各監生凡一應事務先於本堂教官禀知率領赴廂禀覆毋得徑行違者决責一援例各監坐以文到日為始即赴監肄業其有丁憂親老患病者地方官另文申報一監生丁憂呈送本堂轉呈堂上官批准回籍守制如在籍丁憂者有司隨申本監以憑稽考一監生入監後遇有省親完姻及同居伯叔兄長喪而無子者許告假歸里立限給以假票進限遲曠本監行文提取計日倍罰一監生有不守監規及挾制師長出入衙門包攬錢糧等事按律究治一本監舊有號房五百二十一間為諸生讀書之所一分設六堂教習諸生曰率性堂修道堂誠心堂正義堂崇志堂廣業堂每堂各以助教學正司其事至於監中事件順治元年以後俱屬禮部公同辦理十五年改歸本監康熙二年復歸禮部十年仍歸本監其應題應行事宜俱由本監奏請施行恩詔文官三品以上廕一子入監讀書是為恩廕生之始凡滿漢官員子弟或奉㫖送入監讀書或遇恩詔分别內外文武品級各准廕一子入監讀書者皆為恩廕生至是始廕及文官三品以上之子五年恩詔並及文武三品以上官員之子至八年併詔文官在京四品以上在外三品以上武官在京在外二品以上各送一子入監讀書又奉恩詔直省府州縣學俱以本年正貢為恩貢次貢作正貢每處貢二名舉行一次不著為例有才華出衆孝弟著聞者不拘廩增附生許提學官特薦試用是為恩貢之始二年恩詔並同八年詔欵每學恩貢一名餘並同又奉恩詔國子監積分監生已經考定者即與選授撥出厯事監生免厯二月至八年又奉恩詔監生免坐監一月已撥厯者免厯一月又奉恩詔國子監監生免坐監兩月已撥厯者免厯事兩月至十六年又奉恩詔免監生坐監一月命直省選拔貢生奉諭舉選貢生掄才大典准先行嵗考補足廩生以撥其尤順天府特貢六名每府學貢二名州縣學各貢一名考試盤費官為處給如有拔萃竒才許特疏薦舉尋禮部議定在外府州縣學廩生赴提學道考試選貢來京者以學逹經濟行合規矩方為及格至拔貢定例彚通省廩生於貢院中兩埸考試士子跋涉艱辛今聽學臣於所至之地便宜考試是為拔貢之始又命滿漢官生入監讀書設滿洲司業助教官互見旗學門祭酒李若琳奏言學以國子監名所謂國之貴遊子弟學焉者也前朝公侯伯駙馬初襲授者皆令入國學習禮讀書今滿洲勳臣子弟有志向學者宜令奏送國學一體讀書講習得㫖滿洲官員子弟有願讀清書或讀漢書及漢官子弟有願讀清漢書者俱送入國子監仍設滿洲司業一員助教二員教習清書後滿洲助教增至十六員并設䝉古助教八員定迋試貢生閲卷分等例上卷以知州用上次卷以推官知縣用中卷以通判用中次卷以州判縣丞教職用增定學正助教等官及學長禮生額制祭酒李若琳條奏太學官舊額三十九員今裁定十四員尚缺學正助教等官未補滿洲子弟濟濟盈廷授書課習亟須師儒啓迪乞於吏部候選進士舉人中擇其學行兼優者充之太學舊規監生中有友伴堂長禮生等名率諸生課習今應以二㕔六堂分配八旗每一旗須學長四人八旗共三十二人同給廩米如有效則咨部量才考用至太學禮法之地舊設禮生十五人文廟各祭典執爵駿奔皆所必需應月給廩米年深量補鴻臚寺序班下所司議行二年禮部疏請直省府州縣學不拘廩增附生每學將文行兼優者大學起送二名小學起送一名入監肄業聽監臣考課仍以貢監名色彚送應試從之臣等謹按此例至康熙二十四年始復舉行餘不數舉蓋特例也廷試貢生先是禮部奏言貢生廷試每年例在四月十五日昨年以銓選乏人將先到貢生隨便考試今各省咨送恩拔嵗貢生三百十四人若拘四月定期守候為艱應請先行考試得㫖於三月十五日舉行吏禮二部同翰林官赴內院閲卷又定設八旗官學教習先是元年祭酒李若琳奏言滿洲官員子弟咸就成均肆業而臣衙門僻在城東北隅諸子弟往返晷短途遙臣等議滿洲地方各覔空房一所立為書院將國學二廳六堂教官分教八旗子弟滿洲十六人蒙古八人各旗下仍設學長四人俱於各旗書院居住朝夕誨迪臣等不時親詣稽查勤惰定於每月逢六日各師長率子弟同進衙門考課以示懲勸下部議行至是祭酒薛所藴奏請凡滿洲子弟就學者分為四處用伴讀十人以京省生員充補十日一次赴監考課遇春秋演射五日一次就本處習練俾文武兼資以儲實用從之互見旗學門又定官學教習咨部考用及給月廩之例禮部議准祭酒薛所藴疏言監中所取京學生員教授滿洲子弟讀書三年中應查所教子弟成材多者將生員咨吏部考用每月人給米二斛以資贍飬從之互見旗學門又增八旗官學生額數先是每佐領下各取官學生一名以十名習漢書餘習滿書至是禮部奏請增額命每牛録增取一名於原額習漢書十名外加用十名餘俱習滿書互見旗學門定直省嵗貢士於京師是為嵗貢之始府學每年貢一名州學三年貢二名縣學二年貢一名各省提學將印結單卷由布政司起送提學造冊送部定限三月如過期者次年補試至四年頒定起送貢生廷試單式於直省提學每嵗將應貢生員屢經科舉者三人一正一陪嚴加考試如正貢不堪次取陪貢一陪不堪更及二陪務於挨次之中仍寓掄材之意如有濫充於所送內發回五名以上者學政照例罰俸其正陪以食糧年深為序同補則以原考案先後為序至九年定已考正貢遇有事故出缺繫人文未經到部在一年內者將原給追􅌳挨取年力富强文學優長者充補十五年又定嵗貢生於禮部過堂時詳查年力强壯者方准送監其後嵗貢生多不到部吏部祗按冊挨選本省教官得缺後該省巡撫有考驗之例令順天鄉試副榜入監是為副榜貢之始增附中式者准作貢監廪生及恩拔嵗貢貢監中式者俱免其坐監即與廷試至十一年復定廩生副榜照恩貢生例坐監六月增附生副榜照嵗貢例坐監八月又優取遼東入關士子送監順天提學御史曹溶疏言遼東十五學遷隨入關僑居失業學問久荒今逢考監議寬取百人就近教育仍敕監臣從優考課減月積分為天下勸部議十五學內共取三十名入監從之定漢監生積分法禮部議准漢監生積分之法除常課外每月一試經書䇿論各一道合式者優拔一等通計一年內考居一等十二次者即為及格免其撥厯即送廷試超選定監生給假例監生肄業或資斧不繼回籍取費或各官子弟送親隨任及寒暑疾病量准給假日期俱作曠學候補定監生撥厯例凡監生讀書期滿分撥諸司部院衙門厯事者務須練習政體三月考勤一年期滿准送廷試三年廷試恩嵗貢生五百五人四年以殉難陕西固原道副使吕鳴夏子入監讀書是為難廕生之始至九年禮部題准凡內外滿漢三品以上官三年任滿勤事以死者准廕一子入監後又定凡三司首領州縣佐二官死難者查舊例有贈無廕嗣後應亦准廕一子入監讀書五年恩詔各學生員拔貢一名即用本年科舉首卷送部奏請廷試如首卷中式或有事故即以次卷挨補定例監生得在籍肄業例凡生員俊秀援例入監事例不一由各該部題准遵行或入監肄業或在籍准作監生免其入監定遼學嵗貢生額每嵗貢三人六年廷試直省恩拔嵗副貢生八年廷試天下貢生一千七十二人由禮部㑹同內院吏部於四月十五日赴天安門外橋南行禮考試畢㑹同閲卷定序送吏部出榜又定聖裔監生例時上臨雍禮成以五氏子孫觀禮生員十五人送監讀書是為聖裔監生自是永著為例詔肄業監生月給米三斗定漢軍嵗貢生額數不論旗分每年起送二名詳見旗學門九年廷試官貢監生等一百四十一人嵗貢生八百五十人副榜貢生六百二十七人賜敕訓勉師生敕曰聖人之道如日中天上賴之以致治下習之以事君爾等務盡心教訓諸生諸生亦當祗承師訓力體諸身教成為師訓之功學成為弟子之職倘訓誨不嚴服習有怠爾師生俱不能辭其責勉之互見視學門十年廷試直省貢生五百六十一人又廷試官貢監生一百七人十一年宗人府等衙門議覆祭酒姑爾瑪吽疏請覺羅廕生照各官恩廕生例一體送監讀書俟月分滿日仍開送宗人府與官員恩廕生一例照等銓受從之互見宗學門定察驗八旗官學生例每佐領下留官學生各一名禮部㑹同國子監詳加察驗如學業無成者各歸佐領仍於本佐領下選擇頂補以後三年一次永為定例互見旗學門定功貢例凡隨征廩生俱准貢監生員有軍功二等准作監生更有軍功二等准作貢生此外有軍功作紀録至十五年停止定直省考試選拔貢生條例禮部議准直省儒學廩生令學臣通行考試限一日內作經書䇿論取學行兼優者拔一名充貢其原卷印封解部磨勘不許轉發謄紅以致改竄文字荒謬者由禮部㑹同禮科指參尋又議定各生原卷解部後仍令本生自録硃卷粘連貢單於布政司處取具該府州縣印結送部彚交內院以候廷試是月廷試貢監生等八十四人定選取監生充禮生例先是元年因本監無監生可充以生員十二名選補三年期滿送吏部酌用祭酒沙澄條奏仍照例於監生內選補至十七年祭酒姑爾瑪吽復請於各項監生內選取容止端莊聲音響亮者十人充之於朔望釋菜時行獻贊禮在監凡三十六月期滿咨送吏部優與出身即授知縣下部議行至康熙二十九年停止十二年增設八旗官學教習每旗選兼通滿漢文義者各一員令其教習三年考滿核一次如果教育子弟有成多䝉任用者升遷紀録不盡心者議處詳見旗學門又廷試官生貢監生一百五人嵗貢生五百四十八人恩拔副榜貢生等八百二人又吏部奏請八旗教習貢生期滿咨部免其厯事考較文義以知縣通判酌用報可停止京省生員教習八旗子弟例嗣後令禮部㑹同國子監於監生中嚴加考試選補教習有成優加録用十三年廷試嵗貢生五百三十九人十四年奉諭舊例官員遇恩詔及考滿俱得廕一子入監讀書如常令讀書補授文職者居多則止尚文學不習武事其廕監讀書各官子弟令其學習武事即於武職補用送監讀書之例暫行停止又廷試貢生六百八十九人又廷試就教貢生四百六十六人十五年廷試恩拔嵗貢生七百五十四人定永平府遼學貢額遼學生有原寄永平府學者與遼陽府學一例每年各貢一人遼海二縣學每二年各貢一人更定漢監生積分法祭酒姑爾瑪吽議積分之法最有益於士子然諸監生盡令積分勢必不能擬令各項監生考到之日拔其尤者許以積分其不與積分之例者照例期滿咨部厯事積分之法以一年為限除常課外每月一試考列一等者與一分二等與半分二等以下無分有五經兼貫全史精熟或善摩鍾王諸帖者雖文不及格亦准與一分前後積滿八分為及格名數每嵗不過十餘人如係恩拔嵗副等積分及格者咨送吏部厯滿考職照教習貢生例上上卷以通判用上卷以知縣用係例監咨部厯滿考職許與不積分貢生一體廷試每百名取正印八名餘俱以州縣佐二用其一年後積分不滿數願分部者照常出咨不准優選再願肄業滿分者聽其自便從之又科臣王命嶽疏言貢途壅滯故也又允禮部議功貢准貢雖為數不多亦宜停止至副榜貢應照舊額解卷與中式者一體磨勘准為貢生俟三科不第後方准考職又停內外文武四品以上官送子弟入監例至十八年并裁四品以下官生入監讀書廷試就教嵗貢生六百二十一人裁八旗漢書教習四員漢博士一員助教四員學録二員十六年定湖南辰州府五寨苗學貢額照各縣例二年貢一人十七年裁國子監䝉古祭酒司業定考選八旗教習止用恩拔副榜嵗貢生例先是十六年定教習改用監生至是復行更定凡准貢例監不准考取定貴州省屬苗生貢額時以苗生新進人數甚少因令附大學者三年貢一人附中小學者五年貢一人别立一冊將苗生挨年序貢勿與府州縣學額數相混俟入學人多始照州縣舉行嚴監生私歸之禁凡監生未經准假遽自私歸者黜革又廷試嵗貢生五百餘人停止漢監生積分法時以恩拔嵗副諸貢俱經停止在監人少難以校定分數俟到監人多再議舉行嗣後遂停止又掌翰林院事學士折庫納條奏今見官學生習學數年尚不諳文義此皆師範不得其人而弟子嬉遊荒惰習學不専故也宜選滿漢文義精通德行純正者以為教官不論滿洲蒙古漢軍學生俱令讀滿漢書令國子監按季考試禮部年終考課將該學師生分别勸懲部議應如所請嗣後國子監祭酒司業助教等缺出臣於應升各官內遴選通滿漢文義才品優長可為師範者推用從之增定八旗官學生額數滿洲漢軍每佐領下各出二名一習滿書一習漢書止於武員及甲兵等子弟內開送文員子弟不與互見旗學門康熙元年禮部議准貢監生停止分撥各衙門厯事於監期滿日本部即咨部考試取用自是部院諸衙門俱無監生監生有文理俱通字畫端楷者考選分送修書各館效力較其年勞分别議敘各照應得職銜選用優者加等令貴州雲南兩省貢生暫免廷試貴州咨送吏部就近改補教職雲南咨行該撫就近考試將試卷封送吏部校閲定銜序選至二十三年又議准雲南蕩平後嵗貢生暫就本省考試試卷解送到部閲定次序移咨吏部其願就廷試者聽酌減直省嵗貢生額數府學三年貢二名州學二年貢一名縣學三年貢一名至八年仍照順治二年所定額數府學二年一貢州學三年二貢縣學二年一貢停止鄉試副榜作貢送監之例二年復定貢監生考選內閣中書例詳選舉考三年印刷監本四書大全五經等書頒發直𨽻各省又命在監恩拔嵗副貢生補官學教習分别監生考用職銜例監生以州同州判縣丞主簿吏目用貢監生以州同用四年定恩詔廕生先送國子監讀書後授官職定官廕准例監生未經考職者考補官學教習以停止恩拔嵗副補用之例也至六年復定考取八旗教習先儘恩拔嵗副官廕等生如無此項仍將准例監生考取定禮部每年考試官學生例凡官學生除該監照常考試外每年禮部嚴考一次分别等第送部録用如肄業怠廢即開列助教教習職名參處停止廕生監生分别文武例舊例廕生監生武官之子以部院衙門用文官之子照品級隨旗上朝至是題准滿洲蒙古漢軍廕生監生停其分别文武凡年至十八嵗文義優通者一體以部院衙門録用如有不能學習情願隨旗者各照品級令其隨旗上朝八年上臨雍禮成以五氏子孫觀禮生十五人入監讀書頒敕諭刋掛彛倫堂敕諭國子監祭酒司業等官朕惟聖人之道髙明廣大昭垂萬世所以興道致治敦倫善俗莫能外也朕纘承丕業文治誕敷景仰先聖至德行辟雍釋奠之典將以鼓舞人才宣布教化爾等當嚴督諸生潜心肄業諸生亦宜身體力行朝夕勤勵若學業成立可禆任用則教育有功其或董率不嚴荒乃職業爾等係師生難辭厥咎尚其勉之毋忽九年命包衣佐領下官員子弟入監讀書先是內務府佐領下官員子弟不准為廕生監生至是上以內外官員效力相同加恩豈宜有别特諭吏部嗣後包衣佐領下官員子弟准為廕監之處爾部定議具奏尋議照康熙六年恩詔包衣下一品官子弟許其承廕二品至四品各廕一子入監讀書互見旗學門定奉天府府州縣學貢額每學五年一貢奉諭天文關係重大必選擇得人令其専心習學方能通曉精微可選取官學生與漢天文生一同學習有精通者俟欽天監員缺考試補用尋議於官學生內每旗選取十名交欽天監分科學習有精通者俟滿漢博士缺補用互見旗學門定廕監生補用部院筆帖式例凡部院筆帖式員缺録用廕生監生停其年分次序俱照國子監年滿咨送到部之文先後補用若將三次恩詔所廕監生同日咨送者仍照廕監生年分前後補用凡廕生監生録用十員將庫使領催內識漢字者用二名官學生識滿漢字者用二名若庫使領催內無識漢字者將官學生補授其補授官學生令該部考試咨送掣籖復令八旗文官子弟得充官學生先是世祖章皇帝時八旗官學生不論文武官員子弟每佐領下選擇二名移送國子監教習後又定文官子弟不許移送官學至是復奉諭文武廕監仍以部院衙門録用仍遵世祖章皇帝時例不論文武官員子弟令本佐領將可學之人移送本監教習互見旗學門十年定八旗嵗貢生額數滿洲蒙古漢軍每年各出貢二人至二十八年减漢軍貢額一名互見旗學門祭酒查祿疏言太學為教化本源之地查順治年間曽令各省學臣選取生員文行兼優者起送赴監今宜遵倣此例於郡邑各庠或間一嵗或間三五嵗舉文行兼優年齒少壯者一人入太學肄業則辟雍多經明行修之士矣得㫖直省各學於現考一二等生員內文行兼優者府學選拔二名州縣等學選拔一名入監肄業定滿洲漢軍監生咨部考試例凡滿洲監生并漢軍識滿漢字監生坐監年滿者定期於二月八月咨部三月九月考試照考定名次挨補其漢軍止識漢字監生與漢人一體於五月十五日考試復直省鄉試副榜作貢送監例先於元年停試至是仍照順治十一年定例行從祭酒查祿之請也十一年命八旗選拔貢監於滿洲蒙古漢軍新舊生員內有文行兼優者與漢生員一體入監肄業每旗滿洲蒙古起送二名漢軍起送一名寧缺無濫互見旗學門又酌減八旗官學生額數滿洲漢軍每佐領下止减留一人讀書蒙古每二佐領下酌留一人讀書詳見旗學門十二年賜八旗各官學大學衍義一部互見旗學門嚴八旗漢軍廕生官學生考試於策論判語內酌量出題考試再令翻譯滿漢文一篇嚴加關防彌封各卷擇取文理優通者送部其未取者令回監讀書如八旗各助教不行勤課者查參其滿洲識漢字廕監生官學生不在考試之例又停止舉人官廕准例監生考取八旗教習例止以選拔副榜嵗貢考充定八旗教習坐監報滿之期凡恩拔嵗副貢生考充教習者連坐監期二十六月報滿十三年定官廕生歸監臣考試咨部例凡漢軍漢人各項官廕生俱聽國子監考試文理優通者咨部録用其吏部考試之例停止十六年定八旗官學生以生員俊秀選補例如本佐領下無生員俊秀准選補閒散人嚴監生冒籍之禁凡監生有冒籍者許本生赴部自首改歸原籍免其斥革在外赴學政自首改正報部十八年十一月令考取監生充吏館謄録二十一年諭大學士覺羅勒德洪等曰國子監乃國家養育人材之所近聞司教之官不將監生嚴加約束教誨縱之遊戲又其甚者閒雜之徒任行出入爾等𫝊祭酒司業等官嚴行申飭二十二年定覺羅廕生由監臣考試咨部例互見宗學門國子監祭酒王士正疏言明代南北兩雍皆有十三經注疏二十一史刻板今國學所藏漫漶殘缺宜及時修補至南監板請敕該督撫查明令學臣收貯儒學尊經閣中毋致遺失從之定八旗官學生考補筆帖式例二十三年奉諭助教官員職掌教習廕監官生應選優於文學者補用若文學庸劣之人何以表率生徒以後著吏部考取仍將試卷送內閣閲奏二十四年令直省選拔貢生照十年例舉行令八旗選拔貢生照十一年例舉行又令本監嚴查監生凡各項監生有素行不端違悖條教及娼優𨽻卒濫厠太學并武斷鄉曲懶惰廢學者本監題參革處定監生犯事參革例凡監生犯事經該督撫咨報國子監者如係廕生及恩拔嵗副貢生仍行題參如係例監俊秀監生國子監徑行黜革發該撫究問又申定奉天錦州府等學貢額錦州府錦縣定逺州三學各二年一貢廣寧縣五年一貢復令直省起送貢監禮部議准監生止有輸納一途貧窶之士無由觀光將各儒學生員選其文行兼優者准作貢監府學二名其餘各學一名起送赴監如該學無文行兼優者寧缺無濫其試卷解部磨勘察有冒濫將考官糾參二十六年詔八旗子弟准與漢人一同考試先是十五年停止至是復照舊例取生員四十名漢軍減二十名互見旗學門定直𨽻懷來等衛學貢額時以懷來安定保安三衛設學照縣學例每二年貢一人停止直省嵗貢生來京廷試從禮部題請也凡直省嵗貢生聽學臣考准挨序咨部補授訓導捐納嵗貢亦聽考選補授願入監肄業者學政給文送部劄監定臺灣等縣學貢額每二年貢一人二十七年始照例舉行二十七年准琉球國遣陪臣子弟來學先是二十三年冊封使臣汪楫林麟焻奏言中山王尚貞親詣館舍懇臣等轉奏願令陪臣子弟四人赴京受業考之史冊唐貞觀中新羅百濟俱遣子入學琉球自明初內附洪武永樂宣德成化間琉球官生俱入監讀書今國王尚貞逺被皇仁傾心嚮學應准所請聽其遣陪臣子弟入監讀書從之至是奉諭琉球國送到陪臣子弟三人入監讀書著安置得所尋定取貢生一名令其教習博士一員専管董率祭酒司業等不時稽察俾講解經書學習文藝至衣服食用等需官生三人每年冬季給緞靣細羊皮袍羊皮掛紡絲綿小襖褲各一件染貂鼠皮帽各一頂鹿皮靴氊襪各一雙春秋二季給緞面袍褂紡絲衫褲各一件線纓凉帽各一頂馬皮靴緞襪各一雙夏季給紗袍褂羅衫褲各一件綢被褥各一床所有紙筆墨等項月各給銀一兩五錢跟伴三名每年冬季給布靣老羊皮襖綿布小襖褲各一件貂皮帽各一頂牛皮靴布襪各一雙春秋二季給布綿袍褂各一件夏季給單布袍布衫褲各一件綿布被褥各一床雨纓凉帽各一頂其官生三人口糧俱照給進貢都事之例給發跟伴三人亦照給跟役之例給發住居房屋於國子監附近給十間并給與煤炭器皿等項二十八年御製孔子贊序及顏曽思孟頒發國子監摹勒上石分發直省定貴州貴筑縣學貢額照直省縣學例每二年貢一人定八旗嵗貢例滿洲蒙古嵗貢二人漢軍嵗貢一人二十九年停止監生贊禮期滿送部優叙之例至三十一年并停止監生充禮生改令八旗教習兼攝獻贊三十年停八旗幼童選入官學之制時以科臣博爾濟疏請立盛京兩翼官學奉諭京師八旗幼童由各佐領內擇其優長之人令其教習讀書及馬步箭著九卿一併議奏尋議盛京左右兩翼各設官學二處設滿漢教習各二員將各旗俊秀幼童選取十名每翼四十名分别滿漢書並教習馬步箭所有京師八旗官學除讀漢書官生外其餘幼童十嵗以上者每佐領各選一人滿洲漢軍學習滿書滿語蒙古兼學蒙古書語均令教習馬步箭仍令各佐領驍騎校稽查將此學名為義學從之詳見旗學門三十一年定雲南馬龍州等學嵗貢額馬龍寧師宗三州照州學例每三年貢二人呈貢元謀定逺三縣照縣學例每二年貢一人申嚴季考月課禮部覆准國子監季考月課雖有成例恐日久廢弛嗣後考試務親身督課分别奬勵每月朔望令滿漢監生齊集講書如視為具文不實心奉行者從重議處又嚴禁官役勒索到監諸生監臣徇庇失察者議處定貢監撥堂録科起文條例凡入監肄業生先行考到列二等者復加考驗文字入格分撥六堂其恩拔嵗副等貢生或赴部廷試或在監肄業或咨吏部考用遇鄉試年在外貢監生聽學臣録科入場其願入北闈者必於前一年起文赴監考試三十二年奉諭幼童惟在訓迪茍加意教誨未有不成者騎射與文字原宜並重不可偏廢滿洲通文義官員即用之行間未嘗不可近見國子監教習官學生甚屬委靡大不及前即八旗教習幼童亦皆懈怠現在八旗幼童務宜選擇良師勤加訓誨爾等𫝊諭該都統知之定湖廣五開衛學嵗貢額數照例二年貢一人定貴州安化縣嵗貢額每二年貢一人頒發御書萬世師表匾額於國學琉球國奏請在監讀書之官生梁成構等歸國許之三十三年定直𨽻宣化府學及宣化等縣學嵗貢額數宣化府學照例每年貢一人宣化懷安懷來萬全蔚西寧龍門赤城八縣學照例二年貢一人自是永著為例三十六年命直省及八旗選拔貢生平定朔漠恩詔直省儒學以正貢作恩貢次貢作正貢定直省嵗貢生由本府州縣給文到監肄業之例向例俱由學臣起送至是停止三十七年御製平定朔漠文立石太學御製文曰惟天盡所覆海內外日月所出入之區悉以畀豫一人自踐阼迄今蚤夜殫思休養生息冀臻熙皥以克副維皇大德好生之意庶幾疆域無事得以偃兵息民乃厄魯特噶爾丹阻險北陲困此一方人既荼毒塞外輒狡焉肆其凶逆犯我邉鄙虐我臣服人弗用寧夫蕩冦所以息民攘外所以安內邉寇不除則吾民不安此神人所共憤天討所必加豈憚一人之勞弗貽天下之逸於是斷自朕心躬臨朔漠欲使悔面革心故每許以不殺彼怙終不悛我師三出絶塞朕皆親御以行深入不毛屢涉寒暑勞苦艱難與偏禆士卒共之逮彼狂授首脅從歸誠荒裔之長來享闕下西北萬里灌燧銷鋒中外又謐惟朕不得已用兵以安民既告厥成事乃蠲釋眚災潔事禋望為億兆祈升平之福而廷臣請紀功太學垂示來兹朕勞心於邦本常欲以文德化成天下顧兹武略廷臣僉謂所以建威消萌宣昭斯績於有永也朕不獲辭考之禮王制有曰天子將出征受成於學出征執有罪反釋奠於學以訊馘告而泮宫之詩亦曰矯矯虎臣在泮獻馘又體王師大獻則奏凱樂大司樂掌其事則是古者文事武事為一拆衝之用具在樽爼之間故受成獻馘一歸於學此文武之盛制也朕嚮意於三代故斯舉也出則告於神祇歸而遣祀闕里兹允廷臣之請猶禮先師以告克之遺意而於六經之㫖為相符合也爰取思樂泮水之義為詩以銘之以見取亂侮亡之師在朕有不得已而用之之實或者不戾於古帝王伐罪安民之意云爾銘曰巍巍先聖萬世之師敬信愛人治平所基煌煌聖言文武道一禮樂征伐自天子出朕臨域中逾兹三紀嘗見羔牆寤寐永矢下求民瘼上承帝謂四海無外盡𨽻侯尉維彼凶醜瀆亂典常既梗聲教遂窺我疆譬之於農患在螟螣秉畀不施將害稼穡度彼遊魂險逺是怙震以德威可往而取朕志先定龜筮其依屬車萬乘建以龍旗祝融驂鸞風伯戒途宜暘而𤾉利我樵蘇大野水涸川瀆效靈爾忽自湧其甘如􅌬設為觭角一出其西一出其東中自將之絶域無人獸羣受掩五日窮迫彼狂走險大殱於路彼血其拿剪其黨孽俘彼率徒衆烏晝號單馬宵遁恐久駐師重為民困慎用戍守還轅于京自夏徂冬雨雪其零載馳載驅我行歸至蠢兹窮冦昏惑不悔我邉我氓以休以助爰寧其居爰徂其賦藩落老稚斯恬斯嬉豈晏來歸春與之期春風飄翩揚我旌旓我今于邁如涉我郊言秣我馬狼居胥山登髙以眺閔彼彈丸天降之罰孤雛就羈三駕三捷封狼輿尸既臘梟獍既獮豺貙大漠西北解甲棄殳振旅凱入澤沛郊卜明禋肆赦用迓景福昔我往矣在泮飲酒陳師鞠旅誓屈羣醜今我來思在泮獻功有赫頌聲文軌來同采芹采藻頌興東魯車攻馬同亦鐫石鼓思在安民非出得已古人有作昭示此㫖緬維虞迋誕敷文德聖如先師戰慎必克惟兵宜戢維德乃綏億萬斯年視此銘辭命祭酒司業力行考課法凡監生考課不缺者准其應試若臨期始到不准入場三十九年嚴監生鑽營之禁監生或有借國學肄業名色一遇試期鑽營作弊者著祭酒司業助教等官平日檢舉不肖貢監嚴拿究治如狥庇者照溺職例議處停止直省選拔貢生定例選拔貢生務取真才如有冒濫聽監臣駁回參處先是三十七年祭酒特默德孫嶽頒靣試山西選拔張漢翀等六名陕西吕爾恆等四名文理不堪照例駁回原卷抄發該學道候參三十八年靣試廣東選拔陳其瑋等三名文理不堪字畫舛謬抄卷駁回至是遂停止選拔遇應行拔貢之年以陪貢充之四十一年御製訓飭士子文勒石太學頒行直省文曰國家建立學校原以興行教化作育人才典至渥也朕臨御以來隆重師儒加意庠序近復慎簡學使釐剔弊端務期風教修明賢才蔚起庶幾棫朴作人之意乃比年士習未端儒效罕著雖因內外臣工奉行未能盡善亦由爾諸生積錮以久猝難改易之故也兹持親製訓言冉加警飭爾諸生其敬聽之從來學者先立品行次及文學學術事功源委有叙爾諸生幼聞庭訓長立宫墻朝夕誦讀寧無究心必也躬修實踐砥礪亷隅敦孝弟以事親秉忠貞以立志窮經考業勿雜荒誕之談取友親師悉化驕盈之氣文章歸於醇雅毋事浮華軌度式於規繩最防蕩軼子襟佻達自昔所譏苟行止有虧雖讀書何益若夫宅心弗淑行已多愆或蜚語流言挾制官長或隱糧包訟出入公門或唆撥奸猾欺孤凌弱或招呼類結社要盟乃如之人名教不容鄉黨勿齒縱幸脫禠撲濫竊章縫返之於𠂻寧無愧乎若夫鄊㑹科名乃掄才大典關係尤巨士子果有真才實學何患困不逢年顧乃標榜虛名暗通聲氣夤緣詭遇罔顧身家又或改竄鄉貫希圖進取囂陵騰沸網利營私種種弊端深可痛恨且夫士子出身之始尤貴以正若兹厥初拜獻便已作奸犯科則異時敗檢踰間何所不至又安望其秉公持正為國家宣猷樹績膺後先疏附之選哉朕用嘉惠爾等故不禁反覆惓惓頒兹訓言爾等務共體朕心恪遵明訓一切痛加改省爭自濯磨積行勤學以圖上進國家三年登造束帛弓旌不特爾身有榮即爾祖父亦增光寵矣逢時得志寧俟他求哉若仍視為具文玩愒不警毁方躍冶暴棄自甘則是爾等冥頑無知終不能率教也既負栽培復干咎戾王章具在朕亦不能為爾等寬矣自兹以往內而國家外而直省鄉校凡學臣師長皆有師鐸之責者並宜𫝊集諸生多方董勸以副朕懷否則職業勿修咎亦難逭勿謂朕言之不預也爾多士尚敬聽之四十四年賜景山官學及兩京八旗官學古文淵鑑各一部重修國子監告成頒賜御書彛倫堂匾額先是四十一年詔修文廟及公廨至是告成五十年定八旗官學生分堂肄業之制凡八旗官學生隨貢監生分撥各堂鑲黃旗在東講堂正黃旗在西講堂正白旗在率性堂正紅旗在修道堂鑲白旗在誠心堂鑲紅旗在正義堂正藍旗在崇志堂鑲藍旗在廣業堂令八旗六堂助教設立公座每逢進署之日季考月課之期先赴本堂謁見使坐立有所且杜頂替之弊互見旗學門五十一年申嚴滿漢祭酒司業及助教等官潔已率屬之戒五十二年裁國子監滿助教四員漢博士一員漢學正二員頒發御纂朱子全書於國子監定廣西西隆州學貢額三年貢二人宗人府題請宗人府素無廕子入監讀書之例今奉萬夀恩詔凡未入八分公以下及宗室內為一二品大臣者俱准給廕生一人入監讀書之後即令隨旗行走從之互見宗學門恩詔直省儒學以正貢作恩貢次貢作正貢五十四年頒發御纂周易折中於國子監五十五年定湖南嶽州府學輪年出貢之例時以湖西六屬湖東四屬分建考院其挨年出貢定各輪貢一年定廣東諸衛學出貢之例附入各府學挨年出貢五十九年琉球國遣其陪臣子弟來學六十一年釐剔貢監頂冒入場之弊凡應試貢監務於鄉試前一年起文到部自鄉試本年正月為始月課季考無缺仍取連名互結并本堂助教等官結狀方准移送入場如有頂冒等弊事覺一體治罪皇朝文獻通考卷六十五
