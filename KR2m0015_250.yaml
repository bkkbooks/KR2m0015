  text: 欽定四庫全書皇朝文獻通考卷二百五十
  hash: sha256:abac7721d938b32ba2849a9c179200edfb8a20fcbc00d20f5dcc82337351f422
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_250-1a, image: WYG0637/WYG0637-0777a.png}
body:
  text: 封建考五異姓封爵一臣等謹案我朝封爵之制親親而外次及勲臣所以隆報功之典廣世禄之恩也兹所紀載首滿洲次蒙古又次漢軍其間以王公侯伯子男為經以八旗為緯若漢人以軍功封者則次於漢軍之後焉錫爵詔禄爰及苖裔其承襲世數復視功􅈴大小為差葢本古者賞延於世之義酌劑以歸盡善矣外戚恩澤不從五朝續通考别分一類以外戚亦多有功勲者不容殊異也至於文臣無封公侯伯之例聖訓煌煌間有格外加恩者例得並書其有外藩新附膺封爵而徙内地者亦附卷末云天聰八年四月始設一等公一二三等昻邦章京梅勒章京先是總兵副將逰擊備禦等官俱仍明朝舊稱太宗特諭漢文官名易以滿語五備禦之總兵官為一等公一等總兵官為一等昻邦章京二等總兵官為二等昻邦章京三等總兵官為三等昻邦章京一等副將為一等梅勒章京二等副將為二等梅勒章京三等副將為三等梅勒章京順治四年十二月禮部議改昻邦章京為精竒尼哈畨梅勒章京為阿思哈尼哈畨十六年十二月定世爵承襲例世爵自嫡子孫承襲外有絶嗣者許親兄弟及親兄弟子孫承襲三世三世之後停止承襲其嗣養疏逺宗族之子不準承襲十七年十二月奉諭㫖凡世職有子有孫者仍照常襲替外其無親生子孫有本生祖父及親伯叔兄弟姪男姪孫槩許襲替其嗣養疏逺宗族之子不許承襲永著為例雍正八年二月諭内閣我國家膺圖受命則有佐命元臣際會風雲開拓疆宇至於承平之世亦有勞臣宣力綏靖不庭凡厥鴻猷駿烈焜耀旗常於是酬庸奬功錫以公爵分為一等至二等三等以第其勲勞表其閥閲比於古者河山帯礪之盟爰及苖裔永久勿替甚盛典也朕考古封爵之制漢唐以來公侯皆繫以郡縣之名而漢世功名顯著者則加以美號如信武冠軍建忠定逺之屬並以榮名垂光史冊本朝封王者選用嘉美字其嗣王襲封皆因之而公爵則但分等次未有封號朕意欲考其當日􅈴庸錫以嘉名追加為某公使勲勞之臣顯功丕績常赫赫在人耳目間而其子孫承襲封號亦皆顧名思義共知奮勉世為國家効忠抒力期踵美前人之光以副朕褒念勲舊之至意至於宗室外戚則倣古恩澤侯之例命為奉恩公或承恩公以昭寵錫其如何命名定制並將厯來功臣􅈴戚加錫美號之處該部定議以聞九月禮部議奏勲舊等公追加封號仍冠以一二三等之號撰呈欽定外戚封公加承恩字並世襲乾隆元年七月改精竒尼哈畨為子爵阿思哈尼哈畨為男爵少保大學士鄂爾泰等議覆監察御史舒赫徳條奏本朝定制公侯伯之下未列子男之爵别立五等世職以視古法尤為隆備但未立漢文名稱今擬精竒尼哈畨一等者漢文稱為一等子二等者為二等子三等者為三等子阿思哈尼哈畨一等者漢文稱為一等男二等者為二等男三等者為三等男從之十三年欽定公侯伯以下封爵表一等公襲二十六次二等公襲二十五次三等公襲二十四次一等侯兼一雲騎尉襲二十三次一等侯襲二十二次二等侯襲二十一次三等侯襲二十次一等伯兼一雲騎尉襲十九次一等伯襲十八次二等伯襲十七次三等伯襲十六次一等子兼一雲騎尉襲十五次一等子襲十四次二等子襲十三次三等子襲十二次一等男兼一雲騎尉襲十一次一等男襲十次二等男襲九次三等男襲八次十四年六月奉諭㫖我朝定鼎以來酬庸賞功列爵惟五分等惟三以表世閥而第宏勲雍正年間因公爵居五等之首倣古封號字義錫以嘉名此誠篤念勲舊俾奕世子孫承襲者顧名思義意至厚也但封爵之制公侯伯一體優崇前代侯則有冠軍定逺之稱伯則有誠意威寧之號今公爵令名炳著而侯伯僅分等次似屬缺略朕欲推廣其意凡我朝所封侯伯考厥成勞追加羙號庶伊嗣人咸念乃祖乃父之忠勤紹修令緒國家實攸賴焉至於子男同位自古以地為號未有别封可仍其舊其侯伯如何詳稽􅈴蹟定制命名之處該部定議以聞八月禮部議奏勲舊侯伯追加封號如公爵加號之例嗣後有建立􅈴庸恩封公侯伯者即於受封時酌一羙名呈請欽定臣等謹案異姓禄制亦如同姓之例詳國用考俸餉門中滿洲王臣等謹案滿洲八旗異姓無王爵惟贈王爵一人例應附載以爵為序列於公爵之前贈武勲王揚古利滿洲正黄旗人封詳公爵崇徳二年正月贈公臣等謹案公爵以一二三等為序爵同則編年月侯伯子男均倣此至凡書封爵始封者以最尊之爵為主承襲者以所襲之爵為主凡有陞降並以附載勿致重一出但其間或别有初襲之爵其上世封襲不能附入則必仍詳本爵條下又或兩爵各有世襲雖一人曽俱襲授而既經晉襲則前爵别有替人如一等公遏必隆達爾當阿之類若從附載之例恐襲爵世次不明二者不得不變通也一等公佟國綱滿洲鑲黄旗人贈一等承恩公佟圖頼子孝康章皇后弟順治十七年五月襲三等精竒尼哈畨康熙十六年八月襲一等公二十九年從征厄魯特陣亡諡忠勇鄂倫岱佟國綱子康熙二十九年十二月襲以罪削爵夸岱鄂倫岱弟雍正三年五月襲那穆圖夸岱子雍正七年九月襲八年九月襲一等承恩公嗣存那穆圖子乾隆三十一年十二月襲晉璽嗣存子乾隆三十四年十二月襲書明阿晉璽親伯祖鄂崙岱之孫晉璽無子乾隆三十九年十二月襲四十三年改為三等公臣等謹案佟佳氏原籍滿洲以先世流寓撫順佟國綱之祖佟養正歸本朝與漢人歸命者同隸漢軍康熙二十七年國綱疏請改隸滿洲部議國綱鑲黄旗漢軍佐領仍留漢軍旗下其編審冊内開為滿洲從之故佟圖頼以下支派並據八旗通志封爵表隸滿洲云一等公佟國維滿洲鑲黄旗人贈一等承恩公佟圖賴子孝懿仁皇后父康熙二十八年七月以勲戚封卒諡端純雍正八年九月贈一等承恩公世襲隆科多佟國維子康熙六十一年十二月襲雍正五年六月以罪削爵慶復隆科多弟雍正五年六月襲八年九月襲一等承恩公乾隆十三年十月以罪削爵無襲一等承恩公凌柱滿洲鑲黄旗人崇慶慈宣康惠敦和裕壽純禧恭懿皇太后父雍正十三年十一月封伊通阿凌柱子乾隆十二年十二月襲伊松阿伊通阿弟乾隆十八年十二月襲觀音保伊松阿親侄乾隆四十一年十二月襲四十三年改為三等公一等承恩公富文滿洲鑲黄旗人孝賢皇后兄初封一等侯乾隆十三年五月晉封明瑞富文子乾隆十四年十二月襲二十四年三月以討回部功晉一等承恩毅勇公三十三年正月封一等誠嘉毅勇公𬗟甸陣亡諡果烈彚倫明瑞子乾隆三十三年二月襲一等忠勇公傅恒滿洲鑲黄旗人孝賢皇后弟乾隆十四年正月以平大金川功封卒諡文忠福隆安傅恒子乾隆三十五年七月襲豐神濟倫福隆安子乾隆四十九年十二月襲三等公圖爾格滿洲鑲黄旗人一等總兵官贈𢎞毅公額亦都子天聰十年四月封一等梅勒章京尋削爵崇徳五年十月以錦州軍功復爵晉三等昻邦章京八年十月積克城拓地功晉三等公卒諡忠義雍正九年三月贈三等果毅公世襲科布梭圖爾格子順治二年二月降襲三等昻邦章京坐事削爵八年閏三月事白襲三等公九年正月遇恩詔晉二等公尋削爵遏必隆圖爾格弟孝昭仁皇后父初襲詳子爵順治九年正月襲二等公晉一等公康熙六年七月以輔政功加封一等公其初封一等公以子襲九年坐事削恩封一等公尋復一等公品級卒諡恪僖法喀遏必隆子康熙六年八月襲坐事削爵阿靈阿法喀弟康熙二十五年四月襲阿爾松阿阿靈阿子康熙五十六年四月降襲二等公坐事削爵殷徳阿爾松阿伯父雍正二年十月襲卒諡慤敬訥親殷徳子雍正五年四月襲九年三月襲二等果毅公十三年十二月晉一等果毅公以罪削爵策楞訥親兄乾隆十三年十月仍襲二等果毅公以罪削爵達爾當阿策楞從弟乾隆十九年九月襲坐事削爵阿里衮達爾當阿從弟乾隆二十三年十一月襲二十四年三月以葉爾羌軍功晉一等果毅公豐盛額阿里衮子乾隆三十四年十一月襲四十年以金川功於果毅加繼勇二字并追加阿里衮公號為一等果毅繼勇公明安豐盛額繼子乾隆四十二年十月襲三等公倭黑滿洲鑲黄旗人初封詳子爵順治十六年二月以祖贈三等直義信勇公費英東佐命功特㫖賜襲傅爾丹倭黑子康熙三十年七月襲雍正九年三月襲三等信勇公坐事削爵兆徳傅爾丹子雍正十一年正月襲坐事削爵哈達哈兆徳弟乾隆元年十二月襲坐事削爵哈寧安哈達哈子乾隆二十二年十二月襲坐事削爵二十三年十二月仍以兆徳襲復興兆徳子乾隆三十六年十二月襲四十三年奉特恩晉封一等信勇公以上鑲黄旗超等公揚古利滿洲正黄旗人積克城拓地功封一等總兵官以駐守耀州等功晉三等公天聰八年五月厯叙勇戰功晉超等公征朝鮮陣亡雍正九年三月贈超等英誠公世襲贈詳王爵塔詹揚古利子崇徳二年七月襲六年十二月坐事降一等公愛星阿塔詹子順治四年六月襲卒諡敬康福善愛星阿子康熙三年七月襲卒諡恭懿海金福善子康熙四十七年十月襲豐盛額海金子康熙五十九年十二月襲雍正九年三月襲一等英誠公豐安豐盛額子乾隆二年二月襲阿克東阿豐安子乾隆三十五年十二月襲一等公圖頼滿洲正黄旗人崇徳四年七月以征山東軍功封三等梅勒章京七年八月以錦州松山杏山軍功晉一等順治元年二月以克前屯衛功晉三等昻邦章京二年三月以入山海闗擊流冦功及輔政功晉三等公三年五月以勦流冦平江南功晉一等公卒諡昭􅈴雍正九年三月贈一等雄勇公世襲惠塞圖賴子順治四年六月襲坐事削爵九年正月復封頗爾盆惠塞弟順治九年四月襲永謙頗爾盆子康熙五十一年十二月襲雍正九年三月襲一等雄勇公景惠永謙子乾隆二十七年十二月襲以事罷職景恒景惠親弟乾隆四十九年十二月襲原封一等公譚泰滿洲正黄旗人崇徳四年七月以征山東等處軍功封一等梅勒章京七年八月以錦州軍功晉二等昻邦章京順治二年三月以輔政功晉三等公坐事削爵六年八月以平江西功封一等精竒尼哈畨八年閏二月晉一等公以罪削爵無襲一等公索尼滿洲正黄旗人崇徳八年十二月以攻錦州圍大淩河征大同軍功封三等梅勒章京順治二年二月以輔政功晉二等昻邦章京九年正月遇恩詔晉三等伯又以恩詔晉一等伯康熙六年閏四月以輔政功於一等伯外加封一等公卒諡文忠襲詳伯爵一等公噶布喇滿洲正黄旗人孝誠仁皇后父康熙十三年十二月封卒諡恪僖子長泰有罪爵除倫布噶布喇孫雍正五年十月特㫖復襲八年九月追贈噶布喇一等承恩公世襲尋坐事削爵達爾馬倫布叔父雍正九年襲法爾薩達爾馬兄初襲詳伯爵雍正九年十二月襲善保法爾薩從侄一等伯令徳子初襲詳子爵乾隆二十三年十二月襲坐事削爵阿爾景阿噶布喇孫乾隆二十七年九月襲四十三年正月改為三等公以罪革爵善保阿爾景阿族叔乾隆四十七年四月襲一等公圖海滿洲正黄旗人康熙十四年八月以征湖廣平察哈爾功封一等阿思哈尼哈畨十五年八月以平凉慶陽固原等處軍功普三等公卒諡文襄六十一年十二月贈一等公雍正九年三月贈一等忠達公世襲諾敏圖海子康熙二十一年六月襲三等公馬爾賽諾敏子康熙三十二年七月襲六十一年十二月晉襲一等公雍正九年三月襲一等忠達公以罪削爵馬禮善馬爾賽弟雍正十年九月襲馬賢馬禮善子雍正十一年十二月襲坐事削爵馬贇馬賢弟乾隆五年十二月襲