之號循名責實罔涉虚聲審義考文悉衷睿鑒是以昭然釐定不爽不淆矧我皇上褒績崇庸以恩澤受封之爵與功臣之櫛風沐雨拓土開疆者究有懸殊特命外戚上公改為三等而恩封世閥果有克篤忠貞宣猷効命者則仍躋諸功臣之列錫以嘉名可知懋賞所加一視乎其人之自奮而凡以功封者當益知所勉矣而凡以恩封者當亦知所勸矣贈三等信勇公費英東滿洲鑲黄旗人封詳子爵崇徳元年贈直義公順治十六年正月以開創佐命元勲贈三等公雍正九年三月贈三等信勇公世襲贈𢎞毅公額亦都滿洲鑲黄旗人封詳子爵崇徳元年贈贈三等奉義公恩格徳里滿洲正黄旗人封詳子爵雍正七年正月贈三等公九年三月贈三等奉義公世襲贈一等公西哈滿洲正白旗人康熙三十六年贈贈一等褒績公賴塔滿洲正白旗人封詳男爵雍正五年十月贈一等公諡襄毅九年三月贈一等褒績公世襲附原封一等公一等公鼇拜滿洲鑲黄旗人順治九年二月以平流㓂及輔政功由一等侯晉二等公康熙六年七月以輔政功加封一等公八年坐事削爵雍正五年十一月特㫖復一等公納穆福鼇拜子康熙六年八月襲二等公八年五月以鼇拜事連坐削爵達福鼇拜孫初襲詳男爵雍正五年十一月特㫖襲一等公岱吞達福子雍正九年十一月襲徳勝岱吞子乾隆二十六年十二月襲四十五年十二月奉特㫖俟出缺時即行停襲仍給予一等男爵乾隆四十五年十二月初六日上諭閣臣曰朕恭閱實録見鼇拜以從征屢立戰功歴封公爵聖祖仁皇帝嗣統與内大臣蘇克薩哈等為輔政大臣並加太師是時皇祖沖齡踐祚鼇拜受事以後即專權自恣擅作威福因與内大臣費揚古有隙坐伊子倭赫並侍衛西住折克圖覺羅塞爾弼等以擅乘御馬及取御用弓矢射鹿罪俱棄市并坐費揚古怨望亦棄市並殺其子尼堪薩哈連籍其家以與其弟穆里瑪又蘇克薩哈係鼇拜姻婭亦以論事齟齬積而成讐因蘇克薩哈籍隸正白旗鼇拜欲以薊州遵化遷安諸屯莊改撥鑲黄旗而别圈民地給正白旗詔遣大學士管戸部尚書蘇納海與直隸總督朱昌祚廵撫王登聯丈量酌易昌祚等勘明奏請停止圈换鼇拜即坐蘇納海以撥地遲誤昌祚等以紛更妄奏悉逮治棄市且以蘇納海族人英俄爾岱為睿親王私黨令部臣盡削世職以洩其忿並以蘇克薩哈疏稱往守陵寢得以生全之語即誣坐以懐抱奸詐存蓄異心二十四大罪應千磔死皇祖鑒其枉堅不允所請鼇拜攘臂强奏累日竟予絞决並誅其族屬又入對時輒請申禁言官不得上書陳奏時有竊鼇拜馬者即捕斬之并殺御馬羣牧長皇祖以鼇拜黨權不法怙惡弗悛用人行政專恣妄為文武各官欲盡出伊門下與穆里瑪等結成羽黨凡事在家定議然後施行倚仗凶惡毁棄國典特降諭㫖嚴拏勘審並親加鞫問情罪俱實諸王大臣擬請正法皇祖念其効力年久不忍加誅從寛革職籍没同其子那摩佛一併拘禁迨伊死後仍念其舊􅈴追賜一等男令其子孫相繼承襲皇考世宗憲皇帝御極後賜鼇拜祭葬復一等公世襲罔替是鼇拜一身之功罪載在冊籍昭然不爽朕惟大臣為國宣勤功銘鐘鼎尤當深自斂抑律己奉公以保全終始況以輔臣親承顧命翊賛機務更宜小心謙謹不可稍涉恣縱乃鼇拜當日自恃政柄在握輒敢擅權骫法邀結黨羽殘害大臣罪蹟多端難以枚舉若非皇祖英明剛斷立予拏究漸將跋扈難馴而政事亦不可問至圈地一案相持不下百姓環訴失業幾至釀成大事皇祖不即加誅僅予褫奪并仍給以男爵正屬格外之仁至皇考復還公爵時因念鼇拜舊勞伊孫達福才具又尚可用仍予施恩葢於鼇拜擅權縱恣固所熟聞至其不法狀蹟實録所載累累如此未必不一一臚悉也今朕備稽事實蹟狀顯然若不核其功罪明示創懲在鼇拜一家之僥倖所闗猶小而後之秉鈞執政者無復知所顧忌將何以肅綱紀而杜僉邪乎所有現襲鼇拜公爵之徳勝本身既無過犯且令承襲俟出缺時即行停襲公爵仍照皇祖所降諭㫖給予一等男爵世襲罔替已足以示國家法外施恩舊勲之意矣至鼇拜當時所殘害大臣中有曽以戰功得受世職為鼇拜所枉復行褫革者著各該旗詳悉查明并現在有無子孫奏聞請㫖候朕酌量加恩朕辦理庶務一秉大公至正雖於已往臣工之功罪亦必追論嚴明懲奸回於既死以為萬世子孫有大臣擅權不法者戒並將此通諭中外知之臣等謹案我國家功臣蔚起列爵相承伏遇皇上生成教養仰體列祖列宗之意眷念功臣凡厥閥閱之家諄諄訓諭其有克篤忠貞紹乃勞績者則賞之不稍遲緩而顯爵俾配於前人其有不自愛惜蹈於咎戻者則懲之不少姑息而世爵仍畀其宗支是以勸誠孔彰罔敢逸豫令裔纘服無忝舊勲況我皇上大公至正賞罰既垂示於來兹功罪更不愆於已往以佐命元臣如費英東者則擢其子孫為一等公以輔政大臣如鼇拜者則降其子孫為一等男一陟一黜莫不有至當不易之權衡存乎其間此不惟功臣之子孫有所勸誡而為功臣者三復綸音昭然法鑒其亦知所感也夫其亦知所慎也夫以上公爵侯三等侯諸蘭泰滿洲鑲黄旗人一等伯贈三等侯巴世泰子順治九年四月襲桑格諸蘭泰弟順治十二年七月襲偏圖桑格子康熙二十三年十月襲後降襲詳子爵一等超勇侯海蘭察滿洲鑲黄旗人以平定金川功乾隆四十一年正月封一等嘉勇侯福康安滿洲鑲黄旗人乾隆四十一年正月以金川功授三等男四十九年九月以甘肅勦平回匪功晉封以上鑲黄旗一等侯伊爾徳滿洲正黄旗人崇徳五年十月以圍錦州擊杏山松山軍功封三等梅勒章京七年八月復以錦州軍功晉一等順治三年五月以擊流冦功晉二等昻邦章京四年改為二等精竒尼哈畨七年五月以福建江西軍功晉一等