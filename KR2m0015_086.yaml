body:
  text: 職官考十武職領侍衛府國朝以八旗將士平定海宇鑲黃正黃正白三旗皆天子所自將爰選子弟命曰侍衛用備周廬環衛之列統以勳戚大臣視周官虎賁旅賁職綦重焉領侍衛內大臣六人三旗各二人內大臣六人散秩大臣無定員掌統領侍衛親軍以先後宸御左右翊衛焉一等侍衛六十人二等侍衛百五十人三等侍衛二百七十人藍翎侍衛九十人親軍校四十五人三旗宗室侍衛一等九人二等十八人三等六十三人每十人各設什長一人御前侍衛乾清門侍衛皆無定員於三旗侍衛內簡擢隨印協理事務侍衛班領十二人於班領署班領什長內選用漢侍衛無定員分一二三等及藍翎侍衛同凡宿衛更畨輪直凡六班班分兩翼各設侍衛班領一人署班領一人侍衛三十人宿衛乾清門為內班散秩大臣一人侍衛親軍十人宿衛中和殿侍衛什長三人侍衛親軍三十人宿衛太和門為外班以領侍衛內大臣一人總統之內大臣散秩大臣二人隨班入直行幸駐蹕宿衛一如宫禁之制凡升除領侍衛內大臣員缺除奉特旨補授外將滿洲都統內大臣散秩大臣前鋒護軍統領暨各省滿洲將軍職名開列具奏恭候簡命內大臣員缺以散秩大臣暨都統前鋒護軍統領各省滿洲將軍職名開列亦如之散秩大臣多由特恩補授或人員不敷於宗室鎮國輔國公鎮國輔國將軍宗室一等侍衛暨公侯伯子男內簡選引見或授散秩大臣或署散秩大臣恭候欽定漢一等侍衛以一甲一名武進士補授二等以一甲二名三名武進士補授三等於二甲內簡選藍翎侍衛於三甲內簡選凡習射三旗侍衛按期於該旗侍衛教場騎射二次步射六次領侍衛內大臣暨侍衛班領察驗凡閲軍器之年更畨擐甲胄騎射親軍按期習騎射於侍衛教場協理事務侍衛班領及親軍校察驗鑾儀衛鑾儀衛職掌乘輿供奉鹵簿之事掌衛事內大臣一人鑾儀使滿洲二人漢軍一人初設二人康熙三十一年裁一人所屬左右中前後五所分鑾輿馴象擎蓋弓矢旌節幡幢扇手斧鉞戈戟班劍十司馴象一所分東西二司旗手一衛分左右二司臣等謹案順治元年置錦衣衛設指揮使等官二年改為鑾儀衛四年罷指揮使等銜改為鑾儀使副使等名五年復罷副使以內大臣掌衛事康熙七年定鑾儀衛使為正二品左所冠軍使滿洲一人雲麾使滿洲三人漢軍二人治儀正滿洲四人漢軍四人整儀尉滿洲二人漢軍九人掌輦輅右所冠軍使滿洲一人雲麾使滿洲三人漢軍一人治儀正滿洲三人漢軍三人整儀尉滿洲三人掌繖蓋儀刀弓矢槍殳戟中所冠軍使滿洲一人雲麾使滿洲三人漢軍一人治儀正滿洲三人漢軍三人整儀尉滿洲二人漢軍二人掌麾氅幡幢纛幟節鉞仗馬前所冠軍使滿洲一人雲麾使滿洲三人漢軍一人治儀正滿洲三人漢軍五人整儀尉滿洲二人漢軍二人掌扇拂爐盒盂盤几椅星御仗引仗棕薦靜鞭品級山後所冠軍使滿洲一人雲麾使滿洲三人漢軍二人治儀正滿洲三人漢軍三人整儀尉滿洲二人掌旗瓜吾仗馴象所冠軍使滿洲一人雲麾使滿洲三人漢軍一人治儀正滿洲三人漢軍二人整儀尉滿洲一人漢軍一人掌儀象寶瓶騎駕鹵簿鐃歌鼓吹旗手衛冠軍使滿洲一人漢軍一人雲麾使滿洲二人治儀正滿洲一人漢軍二人整儀尉滿洲一人漢軍二人掌金鉦鼓角鐃歌大樂陪祀冠軍使漢軍二人所屬有主事經厯二人載前文職中贊鳴鞭八人凡本衛官除授掌衛事內大臣員闕由領侍衛府以領侍衛內大臣內大臣列名疏請補授滿鑾儀使員缺於冠軍使及一等侍衛內簡選冠軍使於雲麾使內簡選雲麾使治儀正於治儀正治儀尉內簡選如選不得人移領侍衛府簡選三旗三等侍衛擬補雲麾使藍翎侍衛擬補治儀正整儀尉於滿洲蒙古世爵及佐領內簡選均由衛引見補授漢鑾儀使員闕由兵部以直省提督總兵官本衛漢冠軍使列名疏請補授冠軍使雲麾使治儀正於雲麾使治儀正整儀尉內以次簡選整儀尉於漢軍領催驍騎間散人內簡選均由衛引見補授凡軍尉儀刀弓矢殳戟用親軍豹尾槍仗馬用護軍蒙古畫角用蒙古鳴角軍奉輦擎執各校尉由內府選充者為旗尉五城選充者為民尉奉輦旗尉百六十八人民尉六十人各執事旗尉二百四十六人民尉三百二十二人左右中前後五所民尉計千三百二十八人馴象所民尉二百有六人八旗漢軍更夫四十人八旗都統滿洲蒙古漢軍各編八旗臣等謹案國初設立八旗曰鑲黃正黃正白正紅鑲白鑲紅正藍鑲藍分八旗為兩翼左翼曰鑲黃正白鑲白正藍右翼曰正黃正紅鑲紅鑲藍又以鑲黃正黃正白為上三旗各以王貝勒等統之每旗各分滿洲蒙古漢軍為三旗共二十四旗今謹依會典編次而守陵寢官及世職等官並備列於後滿洲八旗旗各都統一人副都統二人掌宣布教養整詰戎兵以治旗人所屬參領五人副參領五人掌頒都統副都統之政令以達於佐領佐領所治以三百人為率人户滋生則增設佐領蒙古漢軍旗同今以見數計之鑲黃旗八十五人正黃旗九十三人正白旗八十六人正紅旗七十四人鑲白旗八十四人鑲紅旗八十六人正藍旗八十四人鑲藍旗八十七人驍騎校每佐領一人掌稽所治人户田宅兵籍以時頒其職掌蒙古八旗旗各都統一人副都統二人所屬參領二人副參領二人佐領鑲黃旗二十八人正黃旗二十四人正白旗二十九人正紅旗三十二人鑲白旗三十一人鑲紅旗三十二人正藍旗三十人鑲藍旗二十五人驍騎校每佐領一人以上職掌與滿洲八旗同漢軍八旗旗各都統一人副都統二人所屬參領五人副參領五人佐領鑲黃正黃正白三旗各四十人正紅旗二十八人鑲白旗三十人鑲紅旗二十九人正藍旗三十人鑲藍旗二十九人驍騎校每佐領一人以上職掌均與滿洲八旗同臣等謹案國初凡有率所部來歸及戰陳有功賞賜人口編為佐領者為原管佐領其有宣力國家人材服衆俾管佐領世世相傳者為世管佐領其有能任佐領之事能惠佐領之人是以簡用者為公中佐領兩翼前鋒統領滿洲蒙古各編八旗前鋒統領左右翼滿洲蒙古各總設一人前鋒參領每旗二人前鋒侍衛每旗二人委署前鋒參領每旗一人虛銜無専員前鋒校每旗十二人護軍統領滿洲蒙古各編八旗護軍統領滿洲蒙古每旗各一人護軍參領滿洲每旗十人蒙古每旗四人副護軍參領如參領之數委署護軍參領每旗七人虛銜無専員護軍校每佐領下一人護軍參領雍正二年增設提督九門步軍統領提督九門巡捕五營步軍統領一人掌管門禁鎖鑰統率八旗步軍五營將備以肅清輦轂左右翼步軍翼尉各一人八旗步軍協尉副尉各二十四人掌董率守衛巡警掃除步軍尉每旗滿洲二十四人蒙古漢軍九人委署步軍尉每旗滿洲各五人蒙古漢軍各二人掌分汛警夜清道詰姦捕盜步軍尉滿洲每旗各三人蒙古漢軍每旗各一人緝捕盜賊稽察姦宄領催二千三十一人步軍萬七千八百四十七人城門領內九門每門二人外七門每門一人城門吏同所屬參將以下官載後京營所屬員外以下官載前文職臣等謹案京師重地禁旅宜嚴初制屬兵部職方司漢主事専管康熙十三年始設提督九門步軍統領又特簡八旗大臣綜理其事至三十年兼巡捕三營乾隆四十六年復兼巡捕五營則制愈詳而責愈重矣火器營白塔信炮附火器營總統六人以王公領侍衛內大臣都統前鋒護軍各統領兼任八旗鳥槍護軍參領十六人鳥槍驍騎參領二十四人司鳥槍司炮散秩官九十六人八旗通志載聞散旗員每旗七人管炮旗員每旗五人合計之共九十六人按會典管鳥槍散秩五十六人管炮散秩四十人數亦相符鳥槍護軍校一百十二人鳥槍驍騎校一百十二人管炮驍騎校四十人八旗滿洲蒙古每佐領下鳥槍護軍校三人鳥槍驍騎四人炮驍騎一人以上鳥槍護軍參領為該營専設官餘均以八旗滿洲蒙古官兵兼任臣等謹案火器營康熙三十年設先是二十八年設漢軍火器兼練大刀營衙門每翼總管一人以現任副都統兼管每旗協領參領各一人操練尉驍騎校各五人三十六年停止白塔信炮總管一人司信炮官旗各一人圓明園等營南苑附圓明園總統無定員王公大臣兼任掌翊衛之政令營總護軍參領八人每旗各一人副護軍參領十六人旗各二人署護軍參領三十二人旗各四人護軍校一百二十八人副護軍校一百二十八人護軍三千六百七十二人教養兵四百八十人健鋭營健鋭營總統無定員王公大臣兼任翼領左右翼各一人前鋒參領旗各一人副前鋒參領如參領之數署前鋒參領十六人前鋒校五十人副前鋒校四十人什長五十人前鋒千人委前鋒千人虎槍營虎槍營總統一人以公侯領侍衛內大臣兼任總領六人以內大臣都統前鋒護軍統領副都統侍衛參領簡補三旗虎槍六百人旗各二百人虎槍長旗各七人副長七人南苑總尉一人防禦八人內府三旗三旗護軍統領各一人護軍參領副護軍參領驍騎參領旗各五人佐領鑲黃正黃二旗各三十五人正白旗三十六人前鋒校旗各二人護軍校旗各三十五人驍騎校每佐領下一人臣等謹案初設佐領每旗滿洲三人旗鼓四人康熙三十四年各增二人正黃旗又增朝鮮佐領二人乾隆二十五年正白旗增回人佐領一人護軍統領雍正元年增設圓明園護軍營總一人護軍參領副參領旗各一人署參領如參領之數護軍校旗各三人王公府屬武官親王各設長史一人散騎郎四人以世爵領之護衛一等二等各六人三等八人典儀從四從五從六品各二人親軍校無定額世子長史一人散騎郎三人護衛一等六人二等五人三等六人典儀從四品一人從五從六品各二人郡王長史一人散騎郎三人護衛一等六人二等四人三等五人典儀從五從六品各二人長子長史一人護衛一等二人二等四人三等六人典儀從五品二人從六品一人貝勒司儀長一人護衛二等六人三等四人典儀從五品一人從六品二人貝子三等護衛六人典儀從六品一人從七品二人鎮國公輔國公三等護衛各四人典儀從七從八品各一人五旗王公府屬參領每旗五人佐領每旗七人驍騎校每佐領下一人守護陵寢武官永陵福陵昭陵總管各一人翼領各二人司工匠各一人防禦各十六人昭西陵防禦十六人驍騎校二人孝陵總管一人翼領二人防禦十六人驍騎校二人孝東陵防禦十六人驍騎校二人景陵總管一人翼領二人防禦十六人驍騎校二人皇貴妃園寢防禦四人驍騎校一人妃園寢防禦八人驍騎校一人泰陵總管一人翼領二人防禦十六人驍騎校二人妃園寢防禦八人驍騎校一人孝賢皇后陵寢總管一人翼領二人防禦十六人驍騎校二人純惠皇貴妃園寢防禦八人驍騎校一人端慧皇太子園寢防禦八人世職一等公二等公三等公一等侯二等侯三等侯一等伯二等伯三等伯一等子二等子三等子一等男二等男三等男一等輕車都尉二等輕車都尉三等輕車都尉騎都尉雲騎尉恩騎尉俱無定員凡滿洲蒙古漢軍官員襲職天聰五年定他國貝子當太平無事舉國來歸者或陳亡或病故子孫準與世襲罔替危急來歸者陳亡準襲五次病故準襲三次若每戰身先有功及一二次首先攻克城池者或陳亡或病故各照原官世襲罔替仍察其舊日有無罪過另行酌奪有出首叛逆大罪者量授官職準襲六次又自他國太平無事有孑身來歸者陳亡準襲四次病故準襲二次有臨難危急而孑身來歸者陳亡準襲二次病故準襲一次至於無職之人或首先登城或當先戰死者準給官爵襲二次拿獲姦細授職者陳亡準襲一次病故不準襲十年定準襲次數有越十五次以上者世襲罔替順治八年定凡遇恩詔其原有襲次者俱準世襲罔替給與誥命其原無襲次官員今恩詔中準授騎都尉者亦給與敕書陳亡準襲病故不準襲其效力軍前所得雲騎尉準襲一次九年定已得誥命之人又得官職者準其添給其襲次有過十次以上者即準世襲十八年定一等子襲十四次二等襲十三次三等襲十二次一等男襲十次二等襲九次三等襲八次一等輕車都尉襲六次二等襲五次三等襲四次騎都尉襲二次雲騎尉襲一次康熙三十四年定凡參贊大臣一等公陳亡照例給與騎都尉又一雲騎尉令伊子承襲四十年定三次恩詔所加雲騎尉遇承襲時銷去此承襲之通例也臣等謹案國初計功授爵凡漢人與旗人同例故靖海海澄諸人旋皆編入漢軍旗分世宗憲皇帝推恩勝國朱之璉亦原𨽻鑲白旗惟衍聖公仍宋明之舊列朝重道崇儒恩綸優渥其體與一等公無異故不另載漢人積有軍功勞績或陳亡者亦豫世職如八旗例皇朝文獻通考卷八十六
