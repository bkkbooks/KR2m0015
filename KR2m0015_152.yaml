body:
  text: 欽定四庫全書皇朝文獻通考卷一百五十二王禮考山陵世宗憲皇帝陵曰泰陵孝敬憲皇后合葬敦肅皇貴妃從葬在易州西三十里永寧山本名太平峪山勢自太行來巍峩聳拔脈秀力豐峻嶺崇山逺拱於外靈巖翠岫環衛其間前則白澗河旋繞而清􅋤沙滋諸水會之後則巨馬河瀠流而胡良琉璃大峈諸水會之信天設之吉地也先是雍正七年十二月壬寅世宗憲皇帝諭大學士等曰朕之本意原欲於孝陵景陵之旁卜擇將來吉地而堪輿之人俱以為無可營建之處後經選擇九鳳朝陽山吉壤具奏朕意此地近依孝陵景陵與朕初意相合及精通堪輿之臣工再加相度以為規模雖大而形局未全穴中之土又帶砂石實不可用今據怡親王總督髙其倬等奏稱相度得易州境內泰寧山太平峪萬年吉地實乾坤聚秀之區為陰陽和會之所龍穴砂水無美不收形勢理氣諸吉咸備等語朕覽所奏其言山腳水法條理分明洵為上吉之壤但於孝陵景陵相去數百里朕心不忍且與古帝王規制典禮有無未合之處著大學士九卿詳悉會議具奏戊午大學士等會議言謹按帝王世紀及通志通考諸書厯代帝王營建之地逺或千餘里近亦二三百里地脈之呈瑞關乎天運之發祥厯數千百里蟠結之福區自非一方獨擅其靈秀今泰寧山太平峪萬年吉地雖於孝陵景陵相去數百里然易州及遵化州皆與京師密邇實未為遙逺又泰寧山雄髙羣巘抽脈自管涔恆嶽而來襟帶百川分水以拒馬滹沱為界相其形局既屬大地之凝庥稽之典章又合三代而同揆伏乞遵照定制敬謹辦理自集純嘏於萬年流嘉祉於奕葉矣得旨大學士九卿等引據史册典禮陳奏朕心始安一應所需工料等項俱著動用內庫銀兩辦理規模制度務從儉朴其石像等件需用石工浩繁頗勞人力不必建設著該部遵行乾隆元年二月戊子尊世宗憲皇帝陵曰泰陵十月戊辰恭懸御書泰陵匾額辛未奉移世宗憲皇帝梓宫於泰陵先是八月丙戌禮部奏十月十一日世宗憲皇帝梓宫發引儀注奉諭旨奏內議稱奉移梓宫發引時朕隨行出寰宇尊親牌樓門跪於街南恭候梓宫過後朕乘輿出西直門由别路前往恭候至於梓宫到泰陵三孔橋更换小輿時朕先至隆恩門恭候到陵後安梓宫之次日祭畢即行回京等語雍和宫奉移梓宫之日朕不忍於城內乘輿前往應步行送梓宫出城後再乘輿由别路前往以便跪接至三孔橋更换小輿時朕仍在旁跪候不必先至隆恩門梓宫到陵之次日祭畢即回朕心實為不安朕欲在彼居住數日以申哀戀之忱著總理事務王大臣議奏十月初九日行奉移梓宫禮告祭畢朕即在雍和宫居住恭候梓宫發引餘依議至九月癸巳總理事務王大臣議言謹按前代帝王親送梓宫者少無成憲可稽禮曰既葬反而卒哭又曰既反哭主人與有司以几筵舍奠於墓左反日中而虞是安奉既畢原無復行居住之文恭查雍正元年三月二十七日世宗憲皇帝親送聖祖仁皇帝梓宫至山陵屢降諭旨欲於安奉後在陵居住數日羣臣再三勸請伏蒙俞允於四月初三日祭畢回鑾臣等恭請皇上遵照世宗憲皇帝典禮於次日祭後回鑾實屬允協奉諭旨王大臣援引禮經及皇考所行定例具奏朕謹遵此例行戊戌諭曰十月十一日朕親送皇考梓宫前往山陵朕躬縞素其隨往之王大臣官員等俱素服冠摘纓緯到陵後回鑾時各官冠綴纓緯俱服行衣又諭履親王允祹等曰爾等所議奉移皇考梓宫送至陵寢照從前仁壽皇太后恭送聖祖仁皇帝梓宫之例內稱皇太后宫眷於每日早辰先行由另修道路預至享殿恭候駐次於朕黃幔城之右稍後等語雖云天子行營宜居正中朕心實為不安伏思皇太后恭送梓宫宜瞻望梓宫起行稍間在後隨行駐次亦應於梓宫營內至回京時皇太后仍由原行路回京則既與理相合亦不致勞民動衆修墊三道著總理事務王大臣會同再議具奏尋王大臣等議言奉移世宗憲皇帝梓宫日皇帝於梓宫前祭酒三爵皇太后於梓宫旁祭酒三爵皇太后宫眷皇后宫眷瞻望梓宫起行後由阜成門出候梓宫過隨行駐次請於蘆殿大營東邊稍後建立行營設皇太后黃幔城每日早晨瞻望靈駕起行後稍間隨行晚間停止進謁至日由駐次所修新路先至隆恩門西所設黃幔恭候回鑾時仍由去時所行道路還京從之丙子世宗憲皇帝梓宫至泰陵暫安奉饗殿臣等謹按泰陵安奉地宫以前致祭之禮乾隆元年八月禮臣奏恭查世祖章皇帝於二周年安奉地宫自期年後每日一次奠獻每月饌五筵羊三酒三尊楮錢五千楮帛五千致祭聖祖仁皇帝於期年內安奉地宫於安奉前每日仍三次供獻每月饌十有一筵羊五酒五尊楮錢二萬楮帛一萬致祭本月二十三日於世宗憲皇帝前行期年致祭禮至十月十一日奉移梓宫於泰陵至次年三月初二日安奉地宫奉移之前請照聖祖仁皇帝前奠獻之例每日三次至奉移泰陵安奉地宫之前請照世祖章皇帝前奠獻之例每日一次其月祭所用饌筵羊酒楮錢楮帛等項仍照見行例致祭至是禮臣復奏言世宗憲皇帝梓宫暫安奉隆恩殿每日三次點香燭晡時供果饌一筵凡在陵寢之貝勒公大臣侍衛等分作二班輪流齊集安奉地宫以前隆恩門令大臣侍衛等守護周圍內外令總管率八旗官兵總兵率緑旗官兵各輪班守護每月二十三日周月致祭由部奏遣親王承祭行禮舉哀如儀從之二年二月庚辰奉移孝敬憲皇后梓宫於泰陵先是元年十二月戊辰諭總理事務王大臣等曰明年二月二十二日朕親送孝敬憲皇后梓宫前往泰陵前已頒發諭旨今因禮部奏進儀注奉皇太后懿旨屆期亦欲親送朕思奉移之日距安奉地宫之期尚逺皇太后慈輿可以遲數日啓行少節勞勩再三奏懇未蒙俞允又降懿旨孝敬憲皇后梓宫奉移大事若不親送於禮未盡於心未安欽此傳諭總理事務王大臣禮部工部內務府將一切儀注及途次行走事宜一并詳議具奏尋王大臣等議言孝敬憲皇后梓宫奉移日皇帝詣梓宫前祭酒三爵皇太后於梓宫旁祭酒三爵皇太后宫眷皇后宫眷瞻望梓宫起行梓宫由殯殿出皇上預詣大門外東旁跪候梓宫登大升輿興在左隨行至下馬紅樁處候靈駕過乘輿由别路預往蘆殿祗候皇太后皇后宫眷由御路往行營宿次靈駕將至皇上跪迎候過隨行安奉蘆殿畢供獻果饌皇上行夕獻禮畢由東南角門出翼日早皇帝詣蘆殿前行朝奠禮皇太后皇后宫眷退於蘆殿東間瞻望靈駕起行每日恭迎行禮之處皆照此例行至陵之日皇帝皇太后皇后皆先詣世宗憲皇帝几筵前恭謁畢皇帝至紅門內東更衣殿內恭俟靈駕至紅門外橋東跪迎候過隨行俟奉安畢於梓宫前行奠獻禮乃還行宫衆皆退皇太后皇后宫眷均詣殿內祭酒三爵畢回行營從之甲申孝敬憲皇后梓宫至泰陵暫安奉蘆殿乙酉王大臣等奏請間日一詣梓宫前奠獻不允總理事務和碩莊親王允祿等奏言昨奉諭旨二十八日二十九日三十日俱親詣饗殿梓宫前奠獻行禮臣等伏見皇上自二十一日詣孝敬憲皇后梓宫前行祖奠禮二十二日梓宫發引皇上步行親送又先至蘆殿奉迎躬親奠獻沿途每日迎送兩次行禮盡敬盡哀聖躬已極勞瘁二十六日恭謁世宗憲皇帝梓宫今日行奉安大祭禮連日哀勞實為過甚在皇上大孝性成中情純摯不覺過哀而臣等瞻仰之際不勝感悚伏念三月初一日大祭初二日安奉地宫典禮至為重大皇上仁孝誠敬之心更不知如何深切若於此三日內詣泰陵瞻依悲痛深恐哀勞大過致煩皇太后慈念且初五日升祔大禮儀文隆盛歸途程次遙逺聖駕更為勞頓伏乞俯允臣等所請間日一次前往親奠稍加撙節以慰安皇太后聖心臣等不勝誠懇激切之至得旨諸王大臣所奏知道了朕若間日一往心轉不安仍照前旨每日親詣奠獻三月庚寅奉安世宗憲皇帝孝敬憲皇后梓宫於泰陵地宫其日辰刻奉移世宗憲皇帝孝敬憲皇后梓宫升龍輴由隧道入地宫安奉寶牀次請敦肅皇貴妃金棺升太平車安於寶牀皇上親視安奉又特命和親王𢎞晝隨入上痛號不已諸臣再四叩請乃出是日大學士等恭題世宗憲皇帝孝敬憲皇后神主畢行虞祭禮上恭奉神主回京升祔太廟先是二月己卯諭據禮部奏稱向來點主有具采服之例今世宗憲皇帝點主日期在二十七月服制之內除簡命點主之大學士具朝服外朕與羣臣皆素服不綴冠纓等語朕思服制之內固素服為是但點主乃係皇考萬年崇祀之吉禮朕與臣工在隆恩殿行禮時咸應從吉服冠綴纓緯可傳諭禮部知之戊子諭派出點主之大臣鄂爾泰張廷玉三泰任蘭枝曰點主大禮攸關必取其人品望素優老成端慤者俾之敬謹將事方克稱尊奉之隆儀卿等皆國家大臣夙荷皇考恩遇倚任有年名望素著故藉卿等襄此巨典其體朕哀慕悃忱齋莊嚴恪靜慮凝神以對越皇考在天之靈庶得仰邀皇考歆鑒朕有厚望焉甲午清明節奉安世宗憲皇帝孝敬憲皇后神位於隆恩殿禮部奏三月初六日清明節於隆恩殿奉安神位大祭儀是日泰陵奉祀等官俱朝服預陳祭品進祝版畢奉祀執事等官詣東配殿供奉神牌處行三叩禮恭奉神牌由中階升奉安世宗憲皇帝神牌於正中左寶座奉安孝敬憲皇后神牌於正中右寶座俱南向奉安敦肅皇貴妃神位於西寶座東向各行三叩禮退承祭官奠獻行禮如常儀祭畢奉祀官行三叩禮恭奉世宗憲皇帝神牌安奉正中暖閣居左孝敬憲皇后神牌安奉正中暖閣居右敦肅皇貴妃神牌安奉西一室均南向奉安畢行三叩禮退五月丁未封泰陵山為永寧山從祀方澤九月壬辰恭建泰陵聖德神功碑上御製碑文曰洪惟我聖祖仁皇帝統承三聖之謨烈奄奠萬方撫臨天下六十一年實兼開創與守成之事爰自綏靖南荒剪除三蘖而後惟務以深仁厚澤淪浹中外俾涵泳優遊四方從欲而勵精圗治悠久無疆晚嵗之政尤欲申嚴庶務以正官方糾詰敝民以清禮俗以明作濟惇大以節制保豐亨故我皇考嗣承丕基凡誠孝中正寬仁之大原無一不與聖祖同揆至用人行政規模則稍有變通以求繼志述事之盡善惟皇考神聖之姿默契聖祖是以膺付託之重任而宏開夫萬年有道之長惟皇考誠敬之德簡在帝心是以致嘉祥之駢臻而即驗於四海於變之盛雖十三年之憂勞無一日一時少釋於宸衷而所以貽我子孫臣庶億萬祀之樂利無窮者誠如天地之無不幬載也皇考世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝第四子也母孝恭仁皇后在妊時夢月中仙娥授以神子既覺而誕生皇考皇考幼而徇齊天性仁孝聖祖恩眷逾常八嵗時患腹疾皇祖方巡狩塞外聞之遽馳歸一晝夜而至其篤愛有如此者奉事庭闈數十年深愛慤敬無一言一動不允當皇祖之心每語衆稱為至孝先是舊皇太子贈理親王之未得罪也皇考小心承順恪盡臣弟禮而王恐聖祖之眷愛日隆有妨於已遂至以非禮相加皇考每順受之而剛正之氣亦不為少屈律己則篤謹有加焉及嵗戊子王以罪廢居常進諛者多背離相忌者率傾陷禍且不測皇考多方保護以悃忱惻怛感慰聖祖之心而曲為王解始獲矜容王乃愧悔自失東宫舊屬咸灑泣驚頌聖德方是時聖祖違和又以允禔允祀等屢作非彝以干天怒居常鬱鬱病勢增劇皇考竭心孝養凡百躬親靡晝靡夜逮四閲月聖躬乃安及理親王再廢聖祖春秋益髙諸王中私懷覬覦者往往矯飾名譽私樹黨援而皇考絶不以一事自表異友于兄弟均平如一莫不同其憂喜軫其疾痛其自取咎殃者亦不避嫌疑力為調劑自內外族姻左右大臣以及近侍宿衛無一人往來觀密者聖祖用是灼知聖德淵懿大義明著無黨無偏足以膺宗社臣民之付屬也及遭大故水漿不入於口以乾清宫東廡為倚廬素服齋居養心殿三年如一日每遇朔奠殷祭及獻食壽皇殿悲不自勝哀動左右躬送梓宫安葬景陵仁壽皇太后升遐哀誠一如初禮凡太廟郊壇必躬必親致齋致慤觀者罔不肅然起敬每遇水旱之祲輒愀然曰上天譴責朕躬命直省旬月奏報雨雪茍應時則喜動顔色或過期即減常膳元年五月京畿旱虔禱於宫中自晨至夕不膳霖雨立沛蓋皇考深念所任受於皇天暨列祖者惟兹天下之蒸黎故休戚相關如保赤子而民之所以安者存乎政政之所以舉者存乎人故宵衣旰食日有孜孜尤以是為先務焉念民所苦病者莫若賦重而刑濫有司遇災祲而不恤巧法侵漁或惰侈以自耗致民俗之日偷逐姦利縱淫樂聚徒鬬狠若是者皆盜賊之源也皇考即位之元年即大免直省逋賦陜西甘肅二省以軍興運餉其所供賦稅無嵗不蒙豁免七年至九年輪蠲各省賦稅有差自元季張士誠據蘇松嘉湖陳友諒據南昌袁瑞與明太祖苦戰於江東西橫斂以給軍終明之世故籍未改特命永除數郡浮糧著為令典凡直省報災朝聞發不待夕夕聞發不待朝每語近臣朕蠲租發賑如救焚拯溺猶恐災黎之鮮有濟也彼視民之傷與已若無與者獨何心哉常念水土為農田之本而救荒之政莫要於興工築以聚貧民遂博求海內水利修川防俾各省河渠湖澤嵗久或淤塞為連州比郡農商害者咸開濬之京畿則命怡親王大學士朱軾經理水利營田官開水田數萬頃聽民自占者不與十餘年中費數百萬貧民皆取食焉洪澤湖都受淮流廣數百里恃髙家堰為關鍵以束淮而潄黃下河七州縣民命繫焉發帑銀百萬盡改石工浙江松江海塘經潮水屢漲修築相繼費數百萬濱海之民始得安衽席無為魚之患往者封疆大吏好因事以自為功有司承迎以速進取之路凡有興作及賑災動稱捐助或曰小民樂輸皇考再三諭禁以蘇民困州縣巧取有禁門關苛索有禁而民隱之萬難上達者莫不在皇考洞鑒之中每遇重囚即深厪睿懷屢飭法司必三覆奏好生之德發於不能自己者如此念刑罰所以濟政教之窮必修禮正俗乃可清其源詳注聖祖仁皇帝諭旨十六條親製勸農種樹之詔御書刋示四方命九卿詳定貴賤服色兵民婚喪禮制實舉孝義貞節分遣御史巡行直省常恐所任非人則雖有良法美意德難下究教不虛行故搜揚俊乂立賢無方自唐宋以後秩祿不足以贍庶官不肖者各以他途取之用此苞苴盛行不可遏止皇考於外省督撫以及州縣親民之官各賜養廉較正祿數十百倍其在京師卿二則賜雙俸司旅並給飯費雖間曹職官亦準俸銀之數賜之廪穀而寡廉鮮恥巧取以殃民者法亦有所必行焉左右輔弼及封疆重臣忠勤夙著猷績彰聞則推誠倚任坦然不疑俾得展盡底藴而常戒以面從責以啓沃優容寵賚十百於尋常其有恃功驕蹇植黨營私者則法立誅必而忠直善良即時有失悮屢被譴訶卒保全其終始建賢良祠崇祀纍朝碩輔其餘著勳伐效命疆場者皆録用其後人又念士者民之表儀而庶官所由備也故廣其登進之途而董之以教元年命郡州縣學官必用正途二年躬詣太學頒訓飭士子文四年命直省督學舉英才八年舉通曉性理舉人八人並賜進士各省會俱特建書院取之之廣恤之之周如此兵者民之衛藩而國威之所蓄也故勤其搜簡之政而曲體其情命提鎮考核將校必察其訓練拊循之實毋得徇私提鎮之優劣一以整飭將校訓練行伍和輯兵民定之士伍則正糧之外别發帑銀俾軍帥營運以恤其婚喪蓋皇考蒞官馭將勤民養士整軍恤衆使文武並勵中外相維制防曲盡如此重念八旗乃國家根本內外大小臣工士民軍吏所觀式也故所以教之養之取之任之察其情而優恤之者尤詳且備焉元年命舉人庠生之服公事者各還家専力於學誦設八旗官學各就其方簡其士之秀異者而官教之命諸王察舉孝弟守分力學者以承平日久生齒愈繁取八旗餘丁四千八百人為教養兵嵗給十七萬有奇自五旗諸王不得以旗分人員多供差役擅治其罪下此正副都統及參領佐領不得苛索外吏財物竊嘗審究皇考治法之源流然後古聖王所為以天下為一家以中國為一人者其規模氣象始可得而見焉皇考自宗親戚畹勳舊以及八旗之士衆自京師畿服以及九州四海之軍民惟恐其疾苦之蔽壅禮俗之衰惡一如一身之中毛髮有觸而必動雖外藩蒙古皆如家人父子其職官並豫俸祿兵衆咸給月糧土默特守臺站人嵗時有賞用此凡有征討外藩效命屢諭蒙古王貝勒宜愛民惠下其子弟之俊秀者或在內廷教養之賜安南以隙地減朝鮮琉球貢物厚朝鮮俄羅斯國人之賞賚給琉球來學者歸國之道齎不獨澤流方外而聲教亦漸被於遐荒十有三年之間宵衣旰食無晷刻之寧不謂天下已治萬民已安而少懈夫朝乾夕惕之皇衷故以事天之誠敬昭事百神而神無不格以法祖之仁孝錫類萬物而物無不孚至於孔子德配天地尤加崇禮王爵之封上及五世跪獻之禮首著上丁詳定配享先賢增置五經博士皆前古所未有也教養宗室而寬其拘禁者自登宸極即封理親王子𢎞晳為郡王而於理親王未降一旨未遣一使曰吾不欲受其拜並聞感恩之言也錫賚頻仍惟命內監傳送且教以詢所從來勿令告以上賜及王薨躬臨哭奠追贈理親王命𢎞晳進襲親王爵分封供具特厚怡賢親王之喪躬臨哭奠哀慟久而不已自戊子年後允祀允禟輩莫不妄冀非分結黨樹援嘗觸怒聖祖聖祖降硃批諭皇考及諸王云朕與允祀父子之義已絶及皇考嗣位重念兄弟情且知彼明敏能任事爰命輔政加恩信用冀以感悟其心乃密封皇祖旨於內閣不以宣示外人乃允祀不但不改悔且心懷怨望怙惡不悛允禟在西寧多為不法顯悖臣禮皇考雖申告中外明正其罪絶其屬籍而兩人猶得以天年終罰弗及嗣自御極以後瑞應駢至日月如合璧五星如聨珠黃河之清自陜州至邳宿二旬有五日不變鳳集麟生慶雲甘露靈芝嘉穀之祥不可勝紀皇考每見奏章必深自警惕咨戒臣工茍德政之不修雖天瑞不足恃也彰明人紀更定刑章凡繼母虐殺前子以所生子抵法無故杖殺僕婢者分别輕重治罪訪明太祖本支裔孫襲封侯爵以承其宗祀自明初紹興有惰民靖難後諸臣抗命者子女多發山西為樂户數百年來相沿未革一旦去籍為良民命下之日人皆流涕自準噶爾擾邊聖祖仁皇帝宿兵西北陲以保舊屬諸藩青海之平也彼又納我叛臣雖屢加訓告襲盜不休故定議濯征為一勞永逸計及十年大破之於喀爾喀之地邊將爭言宜乘時進剿皇考念彼逺處外夷武不可黷乃遣使諭告決意罷兵西南洞苗自古為附近州縣之害自平定廣烏蒙古州歸義開地二千里而時戒邊疆大吏為善後之謀敬惟皇考自始至終所以蒞官勤民教士恤軍安內馭外者無不體之以誠本之以孝用之以中持之以正育之以仁撫之以寬與聖祖仁皇帝若合符節而更化砥俗使天下遵道遵路如優恤宗室而禮度必謹於防維愛禮大臣而法禁必行於貴近搜羅才俊而甄别不漏於昏庸教育士民而捕詰獨嚴於敗類蓋非此不足以移文恬武嬉陰私交結之風革吏蠧民偷險戾姦欺之習未嘗非聖祖晚年整肅官方矯除薄俗之遺意也是以數年之後蒸然丕變外自郡州縣吏私餽不行於大府監司內而閣部院司臺垣不敢以己事干外吏倉庫侵蝕者所在充盈庠序鮮囂陵之士門關無需索之兵蠧吏散朋姦民徙業孔子所稱善繼人之志善述人之事者我皇考實克當之皇考即位之元年即手書建儲事密封宫庭布告羣臣八年六月聖躬違和特召臣御名及莊親王果親王和親王大學士內大臣數人入見靣諭遺詔大意謂夙夜憂勤惟體聖祖之心以為心法聖祖之政以為政因見人情澆薄官吏徇私罔知改省不得不懲治以戒將來故有從前條例本嚴而改易從寬者乃原議未協朕與廷臣悉心酌定可垂永久有從前本寬而改易從嚴者本欲俟諸弊革除之後酌復舊章乃知皇考聖智天縱灼見聖祖不言之意以就前功而隨時取中用建民極蓋聖祖時瘡痍初復非遍覆包涵不足以厚生養而定民志皇考繼承之初則政寬而姦伏物盛而蘖萌非廓清釐剔大為之防其流將溢漫而不可以長久兩朝聖治正如天地四時之運相推相代以成嵗功先儒所謂雖有改制之名而無變道之實者此也皇考聖意原欲大加整剔使弊絶風清人人皆知禮法而後布恩施德以培國家萬年元氣昊天不弔未假之年使十有三年憊精勞神之聖心猶未釋於龍馭上賓之日而廣大欲沛之澤不及旁流汪濊以遂皇考之初志而親見黎民遍德之休也嗚呼痛哉雍正十三年八月皇考崩聖壽五十有八乾隆二年三月庚寅葬泰陵小子御名謹稽首而獻頌曰維天行健運而不息陰陽甄陶萬殊一則惟聖時憲建極宜民其用曷先曰義與仁當豐而亨蔀亦潛滋既大且豫必戒其隨皇考繼序履盛持盈日暄雨潤雷動風行皇天所付惟此嘉師四聖容保豫承豫依曰豫作君在厚其生其災其害我躬是膺曰豫作師在正其德其薄其頑我躬之忒設監置牧惟民之安茍非其人慮為民殘心膂股肱信賢不二庶司百吏開誠以示片言必録小善必登耳提靣命毋或荒寧官針之敗交以賄成賢姦可易白黑可更植黨背公譸張譎誑上下相蒙斯民曷望重增秩祿用絶苞苴私途既閉邦經可臚旌賢擢能俾欽俾慕誅恣懲貪俾愧俾寤九官承式庶事寡愆大府整躬百城晏眠敬刑明罰亂獄無滋嵗會月要出納無欺救荒拯溺家沾户浹增防浚川役均廪給興禮明教以示之則禁暴詰姦以除其慝煌煌帝京政肅風清豪強屏息姦宄潛形博戲鬭囂鶉茵雞柵竒技淫聲兒童莫識近自畿甸周於海隅山行野宿刁柝無虞曷占政成官稱其職曷占民安鼓腹作息皇帝致治身為表儀由中達外誠一無私郊廟明禋洞洞屬屬闕廷蒞政雍雍穆穆大孝備矣昭哉嗣服眷舊親賢久而彌篤近承德意逺樹風聲父勉其子弟祗其兄未明求衣日昃不食一日萬幾是匡是飭天現其光珠聨璧合地效其靈河清川翕畝穗叢歧陵芝結紐鳳翽麟遊近在郊棷皇帝曰咨毋安毋豫我君我臣惟戒惟懼遇災而懼災可為祥以祥為常志將日荒重道崇文德心是懋張皇六師武不敢究天衢如砥萬國朝宗開我明堂四裔來同盛德之氣生物之元於時為春在人曰仁尊嚴之氣物以凝閟於時為秋在人曰義巍巍聖皇是則是效雨露雷霆罔非至教德厚於地智崇於天儀我後昆億萬斯年先是三月丙申諭內閣禮部工部曰欽惟皇考世宗憲皇帝秉道綏猷建中立極恩覃海宇溥樂利於萬方德配蒼穹詒憲章於百世鴻模駿烈史不勝書今泰陵大禮告成應恭建聖德神功碑昭示無極朕祗承基緒敬念先猷謹於齋居之次灑淚濡毫撰述碑文丕揚懿鑠雖蕩蕩巍巍之盛非言語文字所能傳即竭力鋪陳莫罄萬一而言言紀實足以傳信千秋光照琬琰所有相度方位建立碑亭及應行典禮內閣禮部工部敬謹詳議具奏尋議遣大學士工部堂官各一人前往相度建立諏吉於九月初七日興工遣官詣泰陵祭告從之十一月壬申上恭謁泰陵行釋服禮三年二月己亥清明節上恭詣泰陵致祭行上土禮八月癸卯上奉皇太后恭謁泰陵行三期致祭禮孝聖憲皇后陵曰泰東陵在泰陵之東北乾隆四十二年正月辛卯諭曰泰東陵為皇太后萬年吉地典禮綦重著派誠郡王𢎞暢侍郎劉浩前往敬謹辦理丙申又奉諭曰現在泰東陵工程緊要著德成和爾經額前往會同諴郡王劉浩迅速辦理二月戊戌諭曰朕從前原欲於皇孫內遣派一人恭赴泰陵承祀因仰體皇太后年高以孫曾繞膝為樂聖意不欲令其逺離是以未經辦及今遭大行皇太后大事現在敬辦泰東陵工程即日山陵禮成著封綿德為鎮國公前往泰陵泰東陵侍奉四月己酉孝聖憲皇后梓宫發引上躬親奠獻哀慕切至恭奉梓宫升大輿啓行哭泣步從里許由别路先至蘆殿敬視陳設候梓宫至跪迎於黃布城北門外奉安梓宫於蘆殿行夕奠禮致祭盡哀是日儀仗全設辛亥諭曰本月十八日恭奉皇妣孝聖憲皇后梓宫至泰東陵道由泰陵東經過自應朕躬恭代向皇考世宗憲皇帝皇妣孝敬憲皇后陵寢行禮而禮部儀注未經議及蓋因康熙初年孝康章皇后大事未行此禮是以部臣無可援引然其時皇祖尚在沖齡廷臣又忽於禮意遂致缺略朕思皇妣升祔太廟之日朕恭奉神牌進殿門預設拜位安奉朕躬代於列祖列后及皇考皇妣前行禮然後請神牌升座正可援以為例是日早朕先展謁泰陵再詣泰東陵恭閲工程畢預至泰陵分路處候梓宫至恭請靈輿暫停朕即於道旁遙向泰陵恭代行禮再奉梓宫啓行朕仍先至隆恩門外跪迎安奉隆恩殿所謂禮以義起必如是始足為萬世法守辛丑上恭謁泰陵駕未至碑亭即降輿步入隆恩門至隆恩殿上香詣寶城前行禮恭奠號慟良久王公文武官員隨行禮畢上出明樓門猶揮淚徐行瞻仰慕思感動左右詣泰東陵閲視工程畢詣兩陵神路分道處候梓宫至暫停躬代孝聖憲皇后向泰陵行禮畢奉梓宫啓行仍先至泰東陵隆恩門外橋南祗候梓宫至跪迎哭泣隨行奉安於隆恩殿供奠行禮悲哀篤至壬寅上詣泰東陵未至碑亭即降輿舉哀至隆恩殿梓宫前行饗奠禮慟哭良久先是大學士等遵旨將儀注內遣奠字樣查考會典所載並不詳遣字之義遍檢儀禮經注亦無遣奠明文惟孔穎達士喪禮疏內始有此説唐代遂相沿承用見於通典然考儀禮葬日將行祭畢苞牲體之車名為遣車其義與祭禮頗不相涉穎達牽合成文於禮既不甚相合而於稱謂尤屬未安謹考儀禮敘將行之祭云徹巾苞牲鄭康成注苞者象既饗而歸賓俎者也又禮記雜記曾子曰夫大饗既饗卷三牲之俎歸於賓館所以為哀也鄭注既饗歸賓俎所以厚之也言孝子哀親之去也據此是將行之祭原用饗禮以明哀親之去之義今會典內遣奠二字擬改用饗奠字樣似於經注既合而於稱名較為理得心安是否有當伏候訓示以便交禮部遵照改正謹奏奉旨是依議甲辰上詣泰東陵未至碑亭即降輿舉哀至隆恩殿梓宫前行百日大祭禮慟哭良久丙午上摘冠纓詣泰東陵未至碑亭即降輿舉哀至隆恩殿梓宫前行遷奠禮哀慟良久戊申上摘冠纓詣泰東陵未至碑亭即降輿舉哀至蘆殿內跪接梓宫呼號哭泣哀慟良久辰刻恭奉龍輴入寶城安於寶牀上於梓宫前奠酒行禮伏地慟哭呼號哀戀於將閉元宫門時始出至幄次猶涕泣不止禮臣奏點主吉時將屆上冠纓緯更龍袍衮服王公大臣同點主大學士皆更朝服上至隆恩殿向上立王公大臣官員各於班次排立大學士于敏中署大學士尚書永貴恭點神主奉安寶座上就位行虞祭禮畢鑾儀衛官設安奉神主黃輿於丹陛上詣寶座前行禮畢恭捧神牌奉安於黃輿內步隨出隆恩門外跪送黃輿啓行五月乙丑上詣天安門外恭迎孝聖憲皇后神牌入太廟躬代行禮奉神牌升座致祭畢詣奉先殿行禮丙寅孝聖憲皇后升祔禮成頒詔天下詔曰朕惟顯親義重乎尊稱報本典隆於告廟粵考慈儀之懋著爰稽殷禮為推崇懿號載在前聞配食彰於往牒蓋睿德必大名始副而升禋實萬世為昭欽惟皇妣皇太后履順垂型坤貞示範敦仁愛而輝流京室荷恩勤而慶篤藐躬備福壽者八十六年受孝養者四十二載儀天下而為大母尊宫中之有聖人合九州萬國以迓歡心萃五世一堂而徵盛事侍春筵於仙館奉夏凊於山莊欣色笑之時愈幸尊親之倍摰掖輦巡方而呼騰嵩岱推恩賜復而感逮葭蓬紀祝嘏在玉河入貢之年緬承禧於雪徼永清之會仰藉洪熙為普幬喜逢寰宇之豐亨慶典頻臻崇勳茂集晉鴻稱於一十八字介繁祉於億萬千齡厚福冀自此引長前史真罕有倫比方念春暉之永庇何期愛景之難追慈恩遺慕於終天義訓縈悲於罔極溯徽音而同符髙厚審上諡而莫罄名言行本孝斯無以加德推聖為不可尚闡實一根乎至性考衷兼協夫羣情敬成大禮於山陵彌眷哀思於俎豆肇神宫之妥祀躋太室以升香燕天之靈爽式憑諏吉之彞章備舉祗告天地宗廟社稷於乾隆四十二年三月十六日率諸王貝勒文武羣臣恭奉册寶上尊諡曰孝聖慈宣康惠敦和敬天光聖憲皇后四月二十五日奉安泰東陵禮成五月初一日升祔太廟既表崇親之大誼當推錫類之深仁於戲懿行揚光展悃報劬勞之德馨聞孝饗延釐閎昌熾之庥布告中外咸使聞知四十三年正月甲申上恭謁泰東陵行初周年大祭禮先是正月癸未諭曰本月二十三日聖母孝聖憲皇后大事業屆初周諸皇子及王公大臣等已滿期年今既經查照舊例一切自應如舊其挂朝珠及穿補褂蟒袍之處以言朝廷禮有常經萬年體制所關宜從此議朕亦不能矯為過禮至因尊敬朕躬而設則朕於二十七月內尚係素服而臣工服飾如常朕心實有所不忍對之所有王公大臣等如遇朕在宫內及諸臣有事進朝服色俱著照舊如朕駐蹕圓明園非正朝可比隨往及奏事引見之大臣官員仍照上年所議行統俟過二十七月後再行復舊庶為心安理得餘依議三月戊辰上恭謁泰陵泰東陵禮成己巳上以清明節詣泰東陵行添土禮四十四年正月戊申上恭謁泰東陵行二周年大祭禮四月癸酉上詣泰東陵行釋服大祭禮諭曰朕於本月恭祭泰東陵行釋服禮二十七月之制古禮相沿已久不得不從惟是時序易遷益增愴慕蓋禮有節而哀則無盡耳至朕躬所釋之服今昔不同其故當明白宣示國俗於親喪服縞素百日而除朕昔遭皇考大故欲持服三年聖母諭云滿洲舊俗服縞素即不剃髮故止能以百日為斷若百日外仍服縞素亦不當剃髮經二十七月之久蓄髮甚長不幾如漢人之蓄髮乎此必不可之事且國俗不剃髮即不祭神而舊制從無三年不祭神之事縞素百日已為得中不宜太過欽此朕因敬遵慈訓然於釋縞素後仍存縞素之服蓋因其時山陵之禮未蕆詣几筵則服之而尋常則遵皇考家法素服三年前年聖母大事仍如前縞素百日百日後因即釋縞素而不存蓋即位時年力正壯自問可終三年之禮今春秋已望七設或精力稍有未逮存之而弗克盡禮於心轉有不安此今之所以異於昔非敢厚於前而薄於後也先王制禮不敢過亦不敢不及朕心猶歉然如不足焉將此通諭中外知之孝賢皇后陵慧賢皇貴妃哲憫皇貴妃淑嘉皇貴妃從葬在遵化州昌瑞山孝陵之西乾隆十七年十月庚子奉移孝賢皇后梓宫於陵寢先是九月丙子諭曰本年十月二十七日行孝賢皇后安奉地宫禮稽之國家舊典皇祖聖祖仁皇帝於孝誠仁皇后孝昭仁皇后孝懿仁皇后俱經親送自應謹遵祖制但奉移梓宫距安奉地宫之期計逾旬日朕於十月十三日至靜安莊臨送後擬於二十三日自京起鑾恭謁祖陵禮畢屆期詣孝賢皇后陵寢親行視奠甲辰孝賢皇后梓宫至陵寢暫安奉饗殿甲寅奉安梓宫於地宫是日上親臨祭酒屆時奉移龍輴由隧道入地宫奉安於寶牀次移慧賢皇貴妃哲憫皇貴妃金棺同葬上親視奉安畢乃還十一月癸酉奉安孝賢皇后神位於陵寢饗殿是日冬至行大祭禮畢乃奉安孝賢皇后神牌於殿中寢室慧賢皇貴妃哲憫皇貴妃神牌於西一室均南向每年清明孟秋望冬至嵗暮大祭與各陵寢同二十二年十一月庚寅奉移淑嘉皇貴妃金棺於孝賢皇后陵安葬奉安神牌於饗殿西室哲憫皇貴妃之次列聖奉安山陵儀前期禮部疏聞預簡王公大臣相度吉壤工部營治山陵其制甃石為地宫築以黃土環以寶城前起方城覆以崇樓上題陵名內碑一鐫廟號方城階下設祭臺上陳石香爐一燭臺花瓶各二祭臺前二石柱一門朱櫺又前三琉璃花門為陵寢門前為隆恩殿重簷五間殿中設暖閣寢室如太廟之制東西廡各五間左右燎爐各一前為隆恩門五間三門繚以朱垣門外東西廂各五間守護官軍班房左右各三間前為神道碑備鐫尊諡廟號覆以亭皆繪五采飾金亭前石橋三橋左右下馬石牌各二宰牲亭神厨神庫井亭皆繪采橋南神路正中龍鳳門門外兩旁班房各三門文臣武士及麒麟獅象馬駝等石象左右序列前為望柱二又前石橋一橋前聖德神功碑覆以崇樓擎天柱前後各二神道前為大紅門門三繪采脊四下左右角門二南石坊一東西石坊二左右下馬石牌各一大紅門內左為具服殿繚以周垣門一殿三間均西向為乘輿更衣之所凡神路兩旁封以樹十株為行各間二丈周垣之外植紅樁以為界限禁樵採耕種右營治山陵內閣撰擬陵名進呈欽定先期禮部會內務府疏聞遍布諸司供備乃封陵名遣禮部尚書侍郎致祭太常寺具祝版香帛皇帝御中和殿閲視如儀祭日有司設壇於陵東南承祭官奠獻行禮如告祭嶽瀆之儀山陵工峻復祭陵山同日並遣官致祭后土司工之神如興工祭儀右封祭乃簡大臣為嚮導總領率嚮導官相視梓宫所出之都門至山陵量地逺近計日分程工部平治道路為行殿於宿次行殿及陵旁均設廬供張畢備前期三日遣官各一人以奉移山陵祗告天地太廟後殿奉先殿社稷均如儀右視途祗告奉移前一日祖奠陳祭筵三十有一羊九酒十有五尊楮帛十有五萬內外齊集讀文哭奠如啓奠儀右祖奠屆日五鼓所司陳法駕鹵簿大升輿於殯宫門外設册寶亭於階下執事官各供乃事治喪儀王大臣率官役豫入殯殿出綴衣黼扆王公百官素服畢集四品以下官豫於都城外齊集祗俟王以下三品以上於門外鹵簿之末左右序立三旗內務府官於大臣班後序立福晉以下二品命婦以上集於大門內內務府婦女集於門外屆時禮部尚書奏請皇帝喪服詣梓宫前舉哀奠酒三爵每奠行一拜禮衆隨行禮畢皇太后詣梓宫旁三奠爵皇后率妃嬪暨公主福晉郡主等皆集於殿內舉哀行禮如儀卒奠皇帝退立於左西向皇太后皇后妃嬪以下退立殿後奉册寶官奉香册香寶安於亭內治喪儀王大臣工部鑾儀衛率執事官校尉進小輿恭移梓宫由中門出內外齊集者各於其次跪舉哀候過興皇帝由殿左門出詣大升輿之左北向跪候梓宫登輿禮部尚書祭輿奠酒三爵行三叩禮畢皇帝興步行恭送皇太后皇后以下瞻仰梓宫啓行由别道詣宿次福晉命婦等亦由别道先行靈駕發册寶亭及騎駕鹵簿前導治喪儀王大臣禮部工部內務府鑾儀衛官屬夾道巡行豹尾班侍衛佩儀刀弓矢侍衛扈從三品以上官按品隨行校尉按班舁輿及更班皇帝率衆跪候凡途中更班皆跪候後同畢乃行梓宫出都門內大臣奠酒三叩凡過門橋皆奠酒後同四品以下官各於其次跪舉哀候過興皇帝乘輿由别道預往宿次祗候靈駕將至宿次王公百官先至幔城北門外皇帝率王公百官舉哀跪迎候過興梓宫奉安於行殿正中藉以氊毯前設供牀案几左右陳册寶陳騎駕鹵簿於門外王公百官按翼按品序立所司進果筵皇帝行晡奠禮祭酒三爵三拜衆隨行禮卒奠闔門皇帝退居廬治喪儀王大臣戒所在官軍祗嚴宿衛翼日昧爽皇帝詣行殿朝奠舉哀祭酒衆隨舉哀行禮均如晡奠儀治喪儀王大臣率舁校進靈駕發導引翼衛如前儀皇帝率王公百官跪送啓行步送里許仍乘輿由别道先詣宿次祗俟羣臣步從至舁校更班之所乃乘馬凡在途皆朝夕奠如初皇太后皇后妃嬪以下與朝奠不與晡奠每朝奠畢瞻仰靈駕啓行仍乘輿先詣宿次御道所經百里內守土官素服跪迎於道右舉哀至宿次於幔城外行三跪九叩禮奠獻時於右翼班末隨行禮如儀凡在途之日並同右宿次朝夕奠靈駕將至陵皇帝皇太后皇后妃嬪預至陵所恭俟守陵貝勒公大臣官員於十里外舉哀跪迎自紅門設法駕鹵簿前導靈駕至皇帝迎於大門之左跪舉哀王公百官隨駕先至者均隨跪舉哀從梓宫後行者近陵橋下馬步從靈駕至享殿門橋南大升輿止皇帝跪視降輿校尉恭舁梓宫由享殿中門外皇帝由左門入奉安梓宫於享殿正中陳設几筵畢皇帝詣殿內奠酒三爵率羣臣舉哀行禮如儀出還居廬衆退皇太后皇后妃嬪等入享殿右門詣殿內奠拜畢均回行宫是日遣官祗告各陵並后土皇陵山神各如儀翼日行饗奠禮舊作遣奠乾隆四十二年奉諭改稱饗奠所司陳鹵簿於享殿門外設幕於門內之左置奠案陳祭文於殿簷下陳祭筵二十有五羊七酒十有五尊楮幣九萬往送王公百官及在陵貝勒公大臣官員皆按班齊集屆時皇帝由享殿左門入詣殿內舉哀奠酒讀文行禮衆隨行禮舉哀均如祖奠之儀右饗奠諏日奉安元宫前三日遣官各一人祗告天地太廟後殿奉先殿社稷如常告儀工部官豫設蘆殿於方城門外接方城以木為平臺陳龍輴於蘆殿正中設創橋於方城前及陵門外布木軌於隧道內自方城徑達元宫寶牀之前先一日皇帝行遷奠禮如饗奠儀卒奠王公百官於隆恩門外按品齊集如初福晉以下命婦等預詣方城西旁立俟皇帝於幄次少俟執事王大臣率屬戒辦屆時皇帝詣梓宫前舉哀祭酒三每祭一拜衆皆舉哀隨行禮畢皇帝退立於丹陛之左執事者入殿恭奉梓宫降中階循殿東行皇帝跪候過興豫入陵左門梓宫登創橋由陵中門入至平臺奉安梓宫於寶城前蘆殿正中登龍輴北向去幠陳設几筵畢皇帝詣梓宫前舉哀祭酒三每祭一拜衆皆舉哀隨行禮乃徹送燎皇帝仍由左門出還居廬右遷奠奉安日所司慎簡工役執事王大臣祗率供事內外齊集如初屆時皇帝詣蘆殿內祭酒舉哀每祭一拜衆皆舉哀隨行禮畢皇帝出陵門外跪候梓宫御龍輴執事奉輴尋軌行入於元宫侍衛執鐙前導王大臣隨入敬視奉安於寶牀上禮部內務府大臣奉册寶陳於左右石案執事以龍輴及木軌出封石門大葬禮成遣官祗告陵山后土之神皇帝入陵左門詣祭臺前奠爵舉哀行禮衆皆舉哀隨行禮卒哭皇帝乃出詣幄次右奉安山陵是日恭題神主行虞祭禮所司陳黃輿於隆恩殿丹陛之下設寶座於殿內正中南向前設供案陳設牲牢俎豆又設帛案香案各一陳制帛香盤尊爵爐鐙具設祭文案於西簷下設題主案於香案之東南北肆司拜褥官豫設皇帝拜位於殿內正中司祝司帛司香司爵以次序立於殿內東西典儀立殿外東階掌燎立於隆恩門外燎所奉櫝大臣豫由東配殿恭奉神主櫝陳於案滿漢大學士各一人朝服入俟禮部尚書詣幄次奏時皇帝御素服冠加飾執事暨陪祀官服同出次贊引對引太常寺卿二人恭導皇帝由隆恩左門入升東階進殿左門詣拜位北向立鴻臚寺官引陪祀王以下入八分公以上於露臺上序立引文五品武四品以上官於丹墀內序立奉櫝大臣進啓櫝奉神主恭設於東案大學士二人詣案前行一跪三叩禮興就位恭題神主跪安於寶座三叩興退乃行虞祭禮上香讀祝三獻爵送燎均如隆恩殿親饗之儀右題主虞祭祭畢鑾儀衛率官校舁黃輿於露臺上正中南向太常寺卿一人北向跪奏請神主登輿升祔太廟三叩興退贊引恭導皇帝詣寶座前行一跪三叩禮興恭奉神位贊引對引暨大學士恭導由殿中門出奉安於黃輿內行一跪三拜禮興退立於左校尉舁輿導以御仗黃蓋內大臣十人大學士禮部堂官前引皇帝率王以下各官於大門外跪候過隨行神輿出隆恩中門大學士退立左右皇帝由左門出先詣宿次恭俟神輿出龍鳳門內大臣預詣紅門外祗俟侍衛禮部尚書侍郎率官屬十人進前恭導至紅門外止立內大臣乘馬導行侍衛扈從王公百官序從均乘馬至宿次所司豫張黃幄奉安神位黃輿前設供案陳果品十有二爵三實以酒又設香案一於正中前為拜位太常寺卿奏請行夕奠禮恭導皇帝詣香案前上香行三跪九拜禮畢還居廬翼日朝奠親詣上香行禮畢出幄次轉立於左所司徹案校尉舁輿禮部尚書暨太常寺卿引詣網城南門外止內大臣侍衛前導後扈如初神輿出皇帝跪候過興仍先詣宿次恭俟王公各官於網城外跪候過隨行御道所經守土官朝服跪迎道右至宿次行謁見禮三跪九叩退在途每日儀同神輿至都城前一日皇帝還京豫俟遣官恭代夕奠就香案前上香畢退至幄外行禮次日恭代朝奠亦如之奠畢校尉舁輿出次遣官於西跪候神輿過隨行是日王公百官均朝服從神位還京升祔太廟至大清門王以下文武百官跪候過興神輿至天安門贊引對引恭導皇帝跪迎如儀詳載宗廟考右神位還京期年小祥皇帝詣陵於寶頂方城前行禮前期翰林院撰擬祭文執事諸司供備部院大臣官員三分之一隨往先一日皇帝詣陵行展謁禮儀别見禮畢退居廬所司豫張黃幄於明樓前丹陛之上幄內設供牀一設祭文案於階上之西設燎牀於隆恩門外燎所殿東設幕置奠案祭日黎明內監奉冠服篚安設供牀所司陳祭筵三十有一羊九酒十有五尊禮部尚書奉祭文安於西案鴻臚寺官引王公大學士內大臣侍衛於陵門外公侯伯子男以下文武百官於配房前按翼序立均去冠飾素服守陵貝勒公夫人以下命婦及內務府婦女於方城前丹陛下庭西之末齊集序立皇帝喪服乘輿出行宫內大臣侍衛扈從至隆恩門外降輿禮部尚書侍郎恭導皇帝詣幄次少俟屆時禮部尚書侍郎奏請遂前導駕由隆恩左門入陵左門詣明樓前黃幄內拜位立尚茶舉茶案設於階下正中奉茶升階恭獻於案灌畢退尚膳奉湯飯進獻於案揭羃司祝及展祭文官詣祝位跪皇帝跪衆咸跪司祝讀文畢復於案三叩退奉爵大臣進爵皇帝恭奠三爵每奠行一拜禮興衆隨興皇帝復位立舉哀衆隨舉哀乃徹鴻臚寺預引百官於燎所東西稍逺立司祝奉祭文禮部尚書侍郎前引送至燎所避立東旁俟內監奉冠服篚出內監四人前引皇帝跪候過隨行出陵中門內大臣十人恭導侍衛扈從王以下跪候過隨行百官均跪候過至燎所皇帝詣奠酒位跪衆皆跪奉爵大臣進爵皇帝奠酒三爵拜如初興舉哀衆隨叩興舉哀奉爵大臣灌畢哀止皇帝仍由左門出還居廬衆各退若遣官致祭去冠飾素服出入自右門立於丹陛西旁燎位奠酒禮部官進爵餘均如前儀右期年致祭再期大祥皇帝詣陵致祭或遣官行禮所司陳祭筵羊酒讀文齊集序立舉哀均如初期儀三周年致祭儀同自後逢忌辰致祭載謁陵門右再期致祭中月而禫皇帝詣陵致祭前期翰林院撰擬祭文執事諸司供備部院大臣各官以其半隨往所司陳祭筵羊酒如百日致奠之數內外齊集序立皇帝喪服率羣臣舉哀讀文致祭奠酒行禮均如期年祭儀是日周二十七月皇帝皇后均除服羣臣皆即吉右除服致祭列后奉安山陵儀前三日祗告天地太廟後殿奉先殿社稷前一日祖奠屆日奉移梓宫皇帝率皇子皇孫百官皇后率妃嬪皇子皇孫福晉以下命婦以上恭送在途朝夕奠梓宫至山陵奉安於享殿遣官祗告列聖陵寢並祭陵山后土之神翼日行饗奠禮均如儀右奉移山陵奉安元宫之前三日遣官祗告天地太廟後殿奉先殿社稷先一日奉移梓宫於寶城前蘆殿行遷奠禮屆日梓宫御龍輴執事官恭奉循隧道木軌入元宫奉安於寶牀是日行敬題神主禮恭奉還京在途虞祭至京升祔大葬禮成遣官致祭陵山后土之神均如列聖大葬禮右大葬皇后奉安山陵儀奉移前三日遣官各一人祗告天地太廟後殿奉先殿社稷前一日行祖奠禮陳饌筵三十一席羊九酒十有五尊儀與啓奠同至日陳大升輿於殯宫大門外設册寶亭於階下皇帝親詣梓宫前祭酒三爵不往送祭酒時皇子行禮衆隨行禮畢奉移梓宫登大舁輿禮部堂官祭輿三祭酒行三叩禮畢焚楮帛靈駕發册寶亭及儀駕咸前列沿途分站預設蘆殿繞以黃幔城皇子王公百官內監女侍內府婦女六十人皆以次隨行恭理喪儀王公大臣內務府禮工二部鑾儀衛官左右翼衛所過門橋遣內大臣祭焚楮帛妃嬪以下由别道先往宿次祗俟靈駕將至宿次王公百官先至幔城北門外舉哀跪迎靈駕安奉於蘆殿衆至大門外序立陳設儀駕乃行晡奠如儀奠畢各退翼日昧爽行朝奠如儀皇子跪送仍隨行在塗皆朝夕奠如初日妃嬪以下與朝奠不與晡奠所過五十里內守土官於道右百步外跪迎靈駕舉哀至宿次於幔城外行三跪九叩禮奠獻時各於右翼班末隨行禮至陵日守陵貝勒公大臣官員咸於十里外舉哀跪迎靈駕至饗殿大門外降大升輿安奉梓宫於饗殿皇子祭酒三爵衆隨行禮舉哀是日遣官告祭各陵寢並祭后土皇陵山神翼日行饗奠陳饌二十有五席羊七酒十有五尊楮帛九萬往送王公大小官員及在陵貝勒公大臣官員齊集儀如祖奠右奉移山陵先葬三日遣官各一人祗告天地太廟後殿奉先殿社稷前一日奉移梓宫於寶城前蘆殿皇子行遷奠禮如饗奠儀恭理喪儀王公大臣等率夫校進小輿奉梓宫登龍輴三祭酒畢衆皆退乃焚儀駕訖至日皇子詣梓宫前祭酒屆吉時恭移龍輴自隧道入地宫安奉寶牀列香册寶於左右几遂掩閉元宫皇子於祭臺前祭酒舉哀行禮畢卒哭各退大葬禮成遣官祗告陵山后土之神如儀右大葬行題主禮執事官預設黃輿於階下設神主寶座於殿內正東南向設題主案於東旁西向設奉安主櫝案於寶座旁南向至時大臣一人啓櫝奉神主設於題主案大學士二人朝服詣案東行一跪三叩禮興就位恭題神主畢大臣奉主安於寶座三叩退乃行虞祭禮遣官就拜位王公百官各就拜位上香奠帛讀祝三獻爵送燎均如儀禮畢鑾儀衛堂官率校尉舁黃輿於階上遣官詣寶座前行一跪三叩禮恭奉神主由殿中門出奉安黃輿校尉舁輿前列御仗黃蓋內大臣十人禮部堂官導引啓行王以下各官隨行沿途仍朝夕奠俟還京時升祔奉先殿升祔儀恭載宗廟考如大葬期逺則於殯宫東廡製神主卜吉於殯殿欽命大學士二人行題主禮奉主大臣恭奉神主至几筵前設左案大學士上香行禮畢恭題神主鑾儀衛舁鳳輿升至階正中奉主大臣恭奉神主出大學士前導奉安鳳輿內前引大臣十人前導校尉舁輿由中門出儀駕前導至東華門止黃蓋御仗前導至誠肅門止右題主升祔皇朝文獻通考卷一百五十二
