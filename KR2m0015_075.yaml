body:
  text: 欽定四庫全書皇朝文獻通考卷七十五學校考十三祠祭褒贈録後三雍正十三年訓勉聖裔皇上御極之初衍聖公孔廣棨入覲奉上諭至聖先師功在萬世我皇考尊師重道備極敬誠典禮之隆超越往古爾為後裔尚躬行實踐勤學讀書勉為聖賢以仰承先澤凡爾子孫兄弟雖親疏不一姿禀或殊然逺溯尼山要皆聖人之後不可自待菲薄務期交相砥礪立志端方使天下儒風有所宗仰遵家訓即所以報國恩也朕實有厚望焉遣官告祭闕里乾隆元年命修周公顔子曽子子思孟子廟増定文廟祭品禮部議准祭祀脯醢宜豐鹿脯鹿醢加増鹿二正位及四配崇聖祠正位仍用兎醢十一哲兩廡崇聖祠配位兩廡易兎醢為醓醢加增豕二其陳設向于前一日與各處例不畫一今交太常寺照各廟辦理祭畢國子監官分胙予從祀先儒陸隴其諡贈禮部奏從祀文廟之御史陸隴其欽奉恩旨賜諡清獻應照字號字様建立石碑查御史係五品之員㑹典内並無開載碑價數目其應照何品級給與碑價之處請旨遵行奉諭㫖陸隴其著加贈内閣學士兼禮部侍郎照例給與碑價二年恭奉世宗憲皇帝升祔太廟配饗南北郊禮成遣官祭告闕里又詔太廟文廟改用黄瓦崇聖祠改用緑瓦奉上諭至聖先師孔子天縱聖神師表萬世尊崇之典至我朝而極盛皇考世宗憲皇帝尊師重道禮敬尤隆闕里文廟特命易改黄瓦鴻儀炳煥超軼前模朕祗紹聖猷羮墻念切思國子監為首善觀瞻之地辟雍規制宜加崇飾大成門大成殿著用黄瓦崇聖祠著用緑瓦以昭展敬至意以元儒吳澄從祀位在先儒趙復之次三年二月上丁上詣太學釋奠先師孔子行三獻禮上齋戒二日于前一日閲視祝版諭大學士等曰本年春祭文廟朕降㫖親詣行禮查文廟春秋二祭舊例遣官我皇考尊師重道始定親祭之禮間年舉行從前所未有者今覽太常寺奏進儀注朕躬獻爵一次其亞獻三獻之爵預先陳設香案上朕思既行親祭仍當從三獻之儀至是致祭禮畢以御書與天地參匾額命懸掛國子監大成殿并書氣備四時與天地鬼神日月合其徳教垂萬世繼堯舜禹湯文武作之師對聮懸掛互見太學門升先賢有子配享位于大成殿位于先賢卜商之次移朱子神位于西在先賢顓孫子師之次號十二哲前期祗告照朱子升配之禮命給文廟執事官員封典衍聖公孔廣棨奏文廟執事官自三品至九品共四十員皆孔氏子孫充補恭遇覃恩請一體給與封典奉㫖允行又命文廟碑亭易用黄瓦四年御製文廟碑文勒石學宫御製文曰天生蒸民若有恒性人道立焉亶生聰明神聖作之君作之師以厚其生以正其徳綱常之所以不墜倫類之所以相維相係于天地間者斯焉是賴古聖皇繼天立極君師之道兼隆夐乎尚矣繼是以來雖代有君而克盡其為君之道者葢寡若夫同天地亘今古繼往聖開來世特立為師之道于宇宙間者則維我先師孔子一人敬惟孔子集羣聖之大成祖述憲章垂教萬世使後之帝王建極綏猷得有所遵循以求治法道法之大全由之則治悖之則亂大哉孔子功參乎覆載明並乎日月生民以來未有盛焉者也我列祖撫御寰區敘彛倫明禮樂誠民阜俗一惟孔子所傳之大經大法是矩是式微言奥義悉推闡而表章之統緒相承心源符契欽敬追崇之盛典超越往代其在彛章予小子懋學門闈景行志切逮寅承丕緒祗奉先猷夙夜兢兢繹思聖道越乾隆三年季春上日躬釋奠於先師前期飭官庀材崇飾廟貌特命大成殿宇大成門覆以黄瓦崇聖祠覆以緑瓦稱朕慕道崇師至意記曰禮時為大宜次之稱次之先王之制禮也順于鬼神合于人心惟其稱而已太學者帝王尊師之地盡禮備物以明尊也稱其徳而不為過宜莫大焉抑非以炫耳目之觀也欽崇至道敷正教以淑羣黎法祖隆師㒺敢或斁俾薄海内外無一夫不與被聖人之澤斯朕志也夫乾隆四年己未用允廷臣之靖勒文紀事以垂示于奕世系以詩曰于昭道統淵源三五至聖挺生立極萬世贊修刪定為帝王師天地悠久斯文在茲惟我祖宗惇崇典禮爰謁林廟爰封祖禰予膺鴻緒彛憲足承釋奠視學大昕鼓徵萬仭宫墻圜橋首善笙鏞斯陳俎豆斯薦耽耽翼翼鳥革翬飛制符宸居金碧流輝丕煥宏模神明所宅玉振金聲永揚教澤式眎兆庶式育才賢光宣文治億萬斯年五年八月丁祭上親詣釋奠御製丁祭先師孔子詩一章法祖恢文徳崇儒禮素王晨光開輦輅露氣浥旂常寅祀心恒凛丁辰日正陽皇皇陳禮樂肅肅對宫墻言念百王後身登夫子堂君師誠有愧仰止志方良六年頒文廟祭器於闕里鉶十六簠一簋一籩四豆四俱有盖頒文廟從祀先賢先儒神位次序于直省學宫議准學宫從祀先賢先儒神位次序以京師太學成式通行直省府州縣遵照書題按東西先後次序安設七年改定山東曲阜及直省文廟樂章内舊稱王字大學士等議中允于振奏闕里志樂章内稱惟王神明猶襲唐人稱王之舊恭請釐正查國子監所歌六曲皆已稱師稱聖無可改易至曲阜及各省學宫未能畫一應請另行撰擬頒發遵照得旨依議文廟樂章令張照撰擬進呈頒發曲阜及各省學宫八年正月衍聖公孔廣棨卒予祭𦵏如例又頒闕里文廟樂章迎神奏昭平詞曰大哉孔子先覺先知與天地參萬世之師祥徵麟紱韻答金絲日月既揭乾坤清夷初獻奠帛奏宣平詞曰予懐明徳玉振金聲生民未有展也大成俎豆千古春秋上丁清酒既載其香始升亞獻奏秩平詞曰式禮莫愆升堂再獻饗協鼖鏞誠孚罍甗肅肅雍雍譽髦斯彦禮陶樂淑相觀而善終獻奏敘平詞曰自古在昔先民有作皮弁祭菜於論詩樂惟天牖民惟聖時若彛倫攸敘至今木鐸徹饌奏懿平詞曰先師有言祭則受福四海黌門疇敢不肅禮成告徹毋疏毋凟樂所自生中原有菽送神望燎奏徳平詞曰鳬繹峩峩洙泗洋洋景行行止流澤無疆聿昭祀事祀事孔明化我烝民育我膠庠以故衍聖公孔廣棨子孔昭煥襲封衍聖公世爵上駐蹕盛京詣文廟行禮九年二月上丁上詣太學釋奠先師孔子御製詩一章靈春惟仲月吉日值丁辰禮樂遵先進詩書淑兆民宫墻増慕永俎豆薦馨新敢謂百王後能傳一脈真承筐將素幣獻爵列儒臣試問得門者誰為不愧人上幸翰林院謁先師孔子十一年増定崇聖祠執事官及祭器増分獻官國子監助教二人贊引官太常寺贊禮郎二人其陳設四案增帛二爵六八月仲丁上詣上書房至聖前行禮御製詩一章萬古生民首千秋祭典光攝儀専國學展禮詣書堂言念承宗社何曾致治康徘徊講筵側惟覺愧宫墻十二年欽頒闕里文廟祭器銅爵七十三年二月上躬詣闕里致祭于先師孔子御詩禮堂視學畢遂謁孔林先是十二年奉上諭朕幼誦簡編心儀先聖一言一動無不奉聖訓為法程御極以來覺世牖民式型至道願學之切如見羮墻辟雍鐘鼓躬親殷薦而未登闕里之堂觀車服禮器心甚歉焉仰惟皇祖聖祖仁皇帝巡幸東魯親奠孔林盛典傳于奕禩皇考世宗憲皇帝崇聖加封重興廟貌嘗遣朕弟和親王恭代展祀未以命朕意者其或有待歟朕寅紹丕基撫兹熙洽思以來年春孟月東巡狩因溯洙泗陟杏壇瞻仰宮墻申景行之夙所有應行典禮至大學士㑹同該部稽考舊章詳悉具議以聞其應預備之各衙門宜先期請旨尋大學士等奏闕里祀典即係春秋丁祭之禮康熙二十三年聖祖仁皇帝親詣致祭折衷盡善典文該洽應請遵例舉行其文廟樂章于乾隆八年奉旨改定頒發曲阜及天下學宫但恐本處學宫尚有未諳應遵康熙二十三年之例令樂部太常寺派官員人等前往演習至康熙二十三年聖祖仁皇帝致祭闕里行視學禮畢頒勑諭于衍聖公及五氏官員子弟即日詣孔林行三酹禮今請遵照往例將應宣勑諭及應講經書即命翰林院撰擬于隨駕大學士内奏𣲖一員會同衍聖公于五氏子孫内選擇二人進講講畢駕詣孔林行奠獻禮奉㫖允行又奏准設御案于詩禮堂御座南陳講章正本于御案東野氏閔氏冉氏言氏卜氏端木氏顓孫氏各裔照孔顔曾孟仲五氏之例同赴講堂聴講命太常卿往闕里查視樂舞樂器樂部等衙門遵㫖議准闕里樂工照文廟人數于京師樂工内揀選樂員三員樂生五十名𣲖員帶往其舞佾仍用本處舞生至是駕臨曲阜詣文廟親行周覽御書大成殿匾額曰時中立極對聮曰覺世牖民詩書易象春秋永垂道統出類拔萃河海泰山麟鳯莫喻聖人詩禮堂匾額曰則古稱先對聮曰紹緒仰斯文識大識小趨庭承至教學禮學詩并書杏壇金絲堂奎文閣同文門大中門宏道門聖時門櫺星門萬仭宫墻等匾御製萬仭宫墻贊曰芚予自幼被服聖言明徳新民知易行難顒有素誠瞻謁尼山亦既涖止敢云得門奎文閣贊曰奎婁垂象爰在魯東夫子之文天地並隆煌煌御書充仭其中先聖後聖其揆則同手植檜贊曰文欄肥壤厥有檜株先聖攸植繋手澤餘㡬經枯榮左紐右紆造物憑䕶孫枝扶疎杏壇贊曰憶昔緇帷詩書授受與有榮焉軼桃轢栁博厚髙明亦曰攸久萬世受治杏林何有禮器贊曰祗謁先師載觀禮器犧尊象尊伊古之制有道存焉儀型攸繫申明太常記予初祭聖蹟殿贊曰明王不興夫孰能宗豈無宗者邈矣莫從鐫勒苕華景仰遺踪七十三年雲中見龍金絲堂贊曰禮樂詩書金絲萬古豈繫魯恭廣宅斯舉在左移西亦惟其所懸甕乃神夫子不語詩禮堂贊曰昔者趨庭詩禮垂訓維言與立伊誰不奮九仭一簣願免乎進御堂聴講景仰聖舜故井贊曰疏食飲水曲肱樂之既清且渫汲繩到兹我取一勺以飲以思嗚呼宣聖實我之師故宅門贊曰居廟之左厥門斯故藻繢不施意存後素徘徊瞻仰心焉學步告爾後人由兹義路翼日詣先師廟行釋奠禮啟聖王祠崇聖祠遣顯親王致祭四配十哲兩廡遣官分獻命遵照聖祖成例以御用曲柄黄傘留供大成殿中上御詩禮堂命舉人孔繼汾進講中庸貢生孔繼涑進講易經各一章畢大學士宣諭衍聖公孔昭煥等曰至聖之道參天地贊化育立人極為萬世師表凡兹後裔𣲖衍支繁尤當永念先型以期無忝昔我皇祖東巡時邁特頒聖諭炳若日星朕仰紹前徽䖍修展謁之禮念爾等令緒相承淵源勿替再申告諭用是訓行其務學道敦倫修身慎行克禀先師之彛訓祗遵皇祖之誨言勿愧為聖者子孫朕心實嘉予之其欽承毋怠衍聖公祗聴畢率執事官五氏子孫等叩謝于階下駕至先師墓門降輦步入墓前北面跪三酹酒畢行三叩頭禮是日復詣元聖周公廟行禮駕還行宫御製闕里釋奠禮成詩曰禮原尼父定文是素王垂用以將欽若因希尚鑒兹一貫平聲天道性萬古帝王師過魯繩皇祖思齋奉聖慈黍莫陳俎豆升降式威儀教澤常貽在心𫝊竟屬誰景行稍此遂蠡管尚難窺三子希蹤後安能賛一詞孔林酹酒詩曰宫墻親釋奠林墓此重來地闢天開處泗南洙北隈春鳴仙樂鳥冬緑石碑苔教澤垂千古泰山終未頽上諭孔昭煥曰先師修道立教萬世之人服習聖訓咸有以自善其身况為其子孫者乎卿以宗裔奉祠紹封列爵既優崇矣當思淵源何自夙夜敬勉親師尚學以植始基慎行謹言以培徳器循循詩禮之教異日卓然有所成就允孚令望表率族黨俾當世知聖人之後能守家傳于勿替非徒章服之榮已也豈不休哉賜衍聖公博士等宴并賜衍聖公孔昭煥御製日知薈説十三經二十一史明史唐宋文醇各一部蟒衣狐裘貂裘各一襲表裏各五端曲阜縣世職知縣孔𫝊松加一級書二部蟒衣一襲縀五端復諭朕東巡至曲阜敬禮先師躬詣講堂覩宗廟百官之盛衍聖公既優加賞賚其餘聖賢後裔應一體加恩凡孔氏及十二氏子孫官員著加一級進士舉人各賞銀十兩貢監生員各五兩俾共沐洪恩鉅典廣山東通省入學額數府學大學增取三名中學二名小學一名又奉上諭朕此次東巡加恩士類已令増廣入學名數復念十三氏子孫逺承世緒濟濟膠庠其中當有文學可觀讀書立品之彦宜加甄拔以廣恩施其令該學政考騐其文行兼優者數人咨送禮部貢入成均示鼓勵焉其引駕官孔繼汾朕看其人尚可造就著加恩以内閣中書用遣官詣顔曽思孟故里専廟致祭并命以御製賛詞勒石御製復聖顔子賛曰貧也者吾不知其所惡夀也者吾不知其所慕徳以潤身孰謂其貧心以傳道孰謂難老簞瓢陋巷至樂不移仰髙鑽堅三月無違夫子有言克已成性用致其功允成復聖宗聖曾子賛曰宣聖轍環在陳興歎孰是中行授兹一貫曽子孜孜惟聖依歸唯而不疑以魯得之㑹友輔仁任重道逺十傳釋經超商軼偃念彼先子沂水春風淵源益粹篤實春容臨深履薄得正以終三千雖多得其宗述聖子思贊曰天地儲精川嶽萃靈是生仲尼玉振金聲世徳作求孝思維則師曽𫝊孟誠身是力眷兹後學示我中庸位天育物致和致中夫子道法堯舜文武紹乃家聲述乃文祖亞聖孟子贊曰戰國春秋又異其世陷溺人心豈惟功利時君爭雄處士横議為我兼愛簧鼓樹幟魯連髙風陳仲亷士所謂英賢不過若是于此有人入孝出弟一髪千鈞道脈永繋能不動心知言養氣治世之畧堯舜仁義愛君澤民惓惓餘意欲入孔門非孟何自孟丁其難顔丁其易語黙故殊道無二致卓哉亞聖功在天地又御製至聖先師孔子廟碑文勒石大成門外御製文曰朕惟至聖先師孔子天縱聖人躬備至徳修明六籍垂訓萬世自古聖帝明王繼天立極覺世牖民道法之精藴至孔子集其大成後之為治者有以知三綱之所由以立五典之所由以叙八政之所由以措九經之所由以舉五禮六樂之所由以昭宣布列於天地之間遵而循之以仰溯乎古昔雖堯舜禹湯文武之盛弗可及已而治法賴以常存人道賴以不冺詎不由聖仁之教哉往代表章尊禮隆重亦越我朝偹極其盛當皇祖聖祖仁皇帝甲子之嵗東巡闕里躬謁殿廷盛典矞皇垂于册府皇考世宗憲皇帝追晉王封鼎新廟貌崇敬誠切瑞應章顯實由心源孚契先後同揆惟聖人能知聖人所以躋海宇於蕩平仁夀之域也朕自養徳書齊服膺聖教髙山景行之慕寤寐弗釋於懐嗣統以來仰荷天庥海宇又安用舉時巡之典道畿甸厯齊魯登夫子廟堂躬親盥獻瞻仰睟儀展敬林墓徘徊杏壇循撫古檜穆然相見盛徳之形容愾乎若接夫聞聖人之風誦其詩讀其書皆足以觀感興起况親陟降其庭觀車服禮器得見宗廟百官之美富有不益増其嚮慕俛焉而不能自己者歟朕撫臨方夏惟日兢兢期與斯世臣民率由至道敷教澤于無疆顧徳弗類於衷歉焉恭繹兩朝碑刻之文益以知道徳政治體用一源顯微無間慕聖人之徳而不克見之躬行者非切慕也習聖人之教而不克施之實政者非善學也法祖尊師固無二道用勒石中庭志鑚仰服習之有素思以繼述前徽酬願學之初志云敬系以辭曰皇矣至聖代天覺民天何言哉聖人是申立人之極曰義與仁建治之統曰明與新聖謨洋洋祖述憲章配天廣運應地無疆四時遞嬗日月貞明濯以江漢暴以秋陽泱泱東海巖巖岱宗於穆聖徳疇與絜崇巍乎聖公疇與比隆循之則治彌暢皇風仲稽令辟展敬尊師過魯祀牢炎祚開基宫墻翼翼魯壁金絲蒼檜鬱鬱殷楹鼎彝皇祖皇考聖智達天探脈道要孚契心源豐碑虬䕶巨榜鸞鶱上繼三五一中允傳顧惟寡昧仰紹先型時邁自東祗謁廟庭洋洋盈耳玉振金聲若弗克見時殫予誠見聖匪艱由聖則難弗克由聖孰圖治安亦既涖止觀止是歎摛辭表志乾隆戊辰定闕里文廟陳設樂器舞佾之式先是闕里文廟陳設樂器相沿訛舛至是始遵定式陳樂器于露臺上編鐘在東編磬在西壎一箎一排簫一為一列在編鐘之北西上笛三一在壎北一在箎北一在排簫北洞簫三在笛北瑟二在洞簫北琴三在瑟北編磬之北亦如之東上楹鼓一在編鐘之東瑟北向歌工東三人在琴東北西三人在琴西北笙六在歌工後搏拊二在歌工北東柷一西敔一在搏拊北麾二在柷敔北皆東西相向文舞生六佾三十六人在樂懸之中旌二在舞佾之北相向十四年平定金川遣官祭告闕里十五年恩詔遣官祭告闕里十六年十一月皇太后六旬萬夀恩詔遣官祭告闕里至二十六年十一月皇太后七旬萬夀恩詔並同十八年八月上丁上詣太學釋奠先師孔子御製詩一章髙居詎恃九重尊丁祭親承率駿奔山海從來欽出類宫墻何有得其門樂音六奏非鐘鼓禮器千年復簋罇經席昨臨今釋奠躬行未逮敢他論先是七月奉上諭春秋釋奠例應遣官朕自往嵗恭詣孔廟行禮後已閲五年仰止宫墻心殷景慕此次親詣行禮崇聖祠遣史貽直行禮大學士等奏先師孔子廟皇上親詣行禮現在戸部主事聖裔孔繼汾可否准其一體陪祀奉㫖准其陪祀二十年平定伊犂遣官祭告先師孔子二十一年上詣太學行釋奠禮御製詩一章經筵昨甫過釋奠此親臨寧僅崇文典惟殷望道心衣冠集魚雅殿幕仰深沈道法參天地神衣貫古今千年綿後裔六佾協元音聖藻光楣梠君師責並欽衍聖公以祖庇廟戸事部議革爵上以孔昭煥為先聖後裔且年少無知特加恩寛免上詣闕里釋奠先師孔子御製禮成即事詩一章涖止重瞻禮器遺翕如既備協金絲星霜倐隔八年序日月同昭萬載師芹藻獻功皇祖述宫墻煥道素王垂可封比户吾恒願教養切闗恧自知是日謁孔林酹酒御製詩一章一老名愆魯兩楹夢奠殷聖惟知有命天豈喪斯文六尺存瓴甓千秋鬰柞枌壠前欽下拜景仰寸心勤謁元聖祠行禮御製詩一章東山宗國重廵狩元聖宗祠設苾芬三吐有勤殷接士一篇無逸訓為君輔成跡不同遷甲忠武心原為孝文官禮㫿麟共條貫諸家注解惜徙紛又恩授聖裔曲阜縣知縣六品世襲官其縣缺改為題缺吏部議准白鍾山所奏曲阜縣知縣改為題缺奉上諭闕里為毓聖之鄉自唐宋以來率以聖裔領縣事夫大宗主鬯既已爵列上公而知縣一官専以民事為職奉法令則以裁制傷恩厚族黨則以偏私廢事甚至因縁為奸簠簋不飭者有之且亦非古人易地而官之道我國家尊崇先聖逺邁前朝延恩後葉有加無已豈于此而有靳焉但與其循舊制而致癏官有乖政體何如變通宜民㑭吏舉其職民安其治于邑中黎庻孔氏族人均有禆益著照該部所議行其現任世職知縣既已謝事若歸部改銓不過恩及其身而止于朕心猶有未愜著加恩授為世襲六品官仍令揀選充補用副朕重道崇儒至意二十二年上南廵至蘇州詣文廟行禮迴蹕至山東詣闕里瞻拜御製詩一章去嵗躬親奠素王迴程重謁廟堂皇誰知獻馘翻成偽遂致餘氛更搆殃豈礙告成斯定局曰惟聲罪不庭方祖功聖徳胥垂佑在泮行歌載輯章二十四年以平定回部功成遣官祭告闕里二十七年上南廵至鄒縣城外展禮孟子廟至曲阜釋奠先師孔子遂詣孔林酹酒賜衍聖公孔昭煥表裏縀各四疋御製詣闕里瞻拜詩一章過魯常聞祀漢王師尊萬古帝兮皇斯文未喪真成慶違道移治平聲必致殃六籍俱存猶望港五年又值此巡方天庥獻馘曾於泮載和籌邊昔嵗章三十年上南巡遣官告祭闕里頒鏄鐘特磬於國子監臣等謹按先是江右獻古鏄鐘特命樂部仿鑄適和闐已入版圖復詔采玉以琢特磬至是告成乃依春秋釋奠月律頒夾鐘南吕鏄鐘特磬各二焉三十三年諭國學崇祀先師規制法程美備是飭我列聖右文重道尊禮有加朕臨御初即詔易黄瓦儀惟其隆邇以殿廡嵗久弗葺特發帑金二十餘萬鳩庀鼎新勅大臣董厥成輪奐視舊増益工就告蕆而門殿諸額向沿明張璁陋議非所以肅觀瞻明折衷也既依㑹典定名躬為牓書並宣示釐正大指兹復親製碑記具修建原委且於幾暇手書付鋟表示鄭重将以明年仲春詣學釋奠落成之彰盛典焉遐稽闕里廟堂有後漢時犧象諸尊以為觀美爰擇内府所藏周笵銅鼎尊卣罍壺簠簋觚爵洗各一頒置太學陳之大成殿中用備禮器夫孔子志在從周楹間列姬朝法物於義惟允所司其敬凛將事典守弗替以克副朕意命先師廟碑亭並易黄瓦三十四年上丁上詣太學釋奠先師孔子并落成國學御製即事詩二章國學惟新逮落成躬承丁祭致寅精經綸萬古歸陶冶道徳千秋示典程祗覺行難増以愧未能言贊出乎誠見近作重修國學碑記兩朝題額奎章煥心法由來治法并子曰三年必有成虞𫝊惟一與惟精益滋宵旰寸心恧敢詡治安百世程周鼎載陳古如式釋奠前出内府所藏周笵鼎尊罍壺簠簋觚爵冼各一供大成殿中用備禮器春芹敬薦潔為誠試看陪禮來東魯時衍聖公孔昭煥聞命自曲阜先期赴京陪位将事教澤帡幪弈葉并修先師廟工成皇上親詣釋奠儀注與乾隆三年同三十五年禮部議准曲阜縣俊秀挑補文廟禮生闕里文廟額設禮生十六名雍正年間建立崇聖祠添設二十名俱以曲阜俊秀選充嗣於乾隆三十年議令将曲阜四氏兩學生員内補用又於三十四年議准四氏兩學生員散處各州縣未便常用供役應令在廟佃户子弟内挑補不必復以俊秀選充今衍聖公咨稱闕里文廟禮生湏稍知文義熟悉禮儀者方克勝任廟佃各户子弟率皆椎魯不文請將曲阜縣俊秀充補嗣後挑選禮生除廟佃户子弟四十名外其餘四十名准将曲阜縣俊秀挑選補足仍造册送以備查核又禮部議准浙江西安縣聖廟嵗時祭薦與曲阜同所有大成殿及四配兩廡崇聖祠等處需用禮生四十名准于本氏族人中儘數選充如有不敷将西安縣附近俊秀挑補足數仍造册送部查核從之是年春皇上車巡詣文廟行釋奠禮翼日上臨閱復聖廟詣孔林少皥陵元聖廟行禮賜衍聖公合族等飯是日協辦大學士于敏中等奉諭㫖前嵗修葺太學告成因念闕里廟堂設有犧象諸尊爰擇舊藏周笵銅鼎等十事陳之大成殿用備禮器兹臨幸曲阜祗謁先師閱視所列各器不過後漢時所造且色澤亦不能甚古惟兹昌平聖里宜陳法物以為美觀著倣太學之例頒内府所藏姬朝銅器十事備列廟庭用愜從周素願俟回鑾後慎選郵發交與衍聖公孔昭煥世守弗替以副朕則古稱先至意十一月皇太后八旬萬夀遣官告祭闕里四十一年春上東巡詣文廟行釋奠禮賜衍聖公及孔氏族人食上詣孔林少皥陵元聖廟行禮四十五年上南巡八月皇上七旬萬夀均遣官告祭闕里是年冬恩賜衍聖公孔昭煥御筆五臨曲阜詩一匣命陳設闕里以為世寳四十六年諭熱河自恭建文廟以來朕每至山莊之日必即展誠祗謁用志景行嗣後仲秋著照在京文廟之例𣲖扈從大學士一員前往行禮以襄大典四十七年諭據衍聖公孔昭煥奏稱自本年六月以來患病沉重難以承祀等語孔昭煥著准其解職調理伊長子孔憲培前經賞給二品頂帶今已成立即著承襲衍聖公以奉祀事四十九年春上南巡至曲阜親詣文廟行釋奠禮五十年元旦頒恩詔以紀元五十覃慶神人遣官祭告闕里是年新建辟雍落成上詣文廟行釋奠禮詳見視學門御製仲春丁祭先師禮成述事月令徒聞釋上丁用丁義未著明經象心承丙前賢注内聖外王後世型疏十四年増怵惕當仲春月敢稽停擬仍明嵗奠闕里重道猶應勵艾齡皇朝文獻通考卷七十五
