body:
  text: 欽定四庫全書皇朝文獻通考卷五十六選舉考十舉官雍正元年定滿洲翰林升轉例上以滿洲進士舉人出身之翰林無升轉之途著吏部議尋議嗣後翰林院侍讀侍講諭德洗馬國子監司業缺出將由庶吉士授職編檢之翰林論俸推升一員將由進士舉人出身之中允等升補一員講讀學士少詹庶子等缺出將現任之講讀諭洗司業推升一員之後將進士舉人出身之科道等官升補一員從之又定科道升轉不拘年限通行開列又議準新改直隸州令督撫於屬員內揀選題補又定年滿千總補授守備例凡守備缺出應歸部選者照例銓選其應分發年滿千總補用者令督撫不論名次先後秉公考驗弓馬優長具題補用技藝生疏者令其學習又奉諭旨湖北布政使員缺朕熟思數日不得其人著大學士尚書都御史侍郎副都御史等各保一人密摺封奏如更有堪任他職者亦併繕入務宜謹密所奏必出於公正倘有交通約會等情經朕聞知不獨見輕於朕且彼此非笑亦當顧惜尚其慎之又奉諭旨各部院司官不論滿洲漢軍漢人郎中員外主事按司官之多少十人內保舉一等一人二等一人各部院遵旨保舉滿洲蒙古漢軍漢人一等六十二人二等四十三人賞人參貂皮緞紗有差各部院衙門筆帖式按數保舉亦如之又奉諭旨蒼梧道員缺業已部選殷邦翰朕聞張若霈居官聲名較優所以允行至其餘各員俱照爾所請爾統率一省該屬員自必有深知灼見處始行奏請假若日後改易操行切無存回護之念姑息從事今日因其賢能而保薦後日因其改易而糾參正見爾之公正無私將朕此旨傳諭伊等俾各知警懼時加慎勉庶不敢恃被薦在前而稍有放縱也保薦一事甚難人或懷衒玉求售之心掩其不善而著其善一被愚惑他日受纍不淺斷不可輕忽於一時也朕將合省百萬赤子付託督撫似此薦舉數人有何可疑而不推心信任其間設有徇情納賄假公濟私實據斷不輕恕又吏部奉諭旨國家分理庶績務在得人道府州縣等官尤屬要職其有才幹素著亷節自持者倘不得以時上聞何以示勸著於各省道府同知通判州縣等官內總督保奏三員巡撫保奏二員布政使按察使各保奏一員將軍提督亦屬本省大員將所知者亦令保奏一員俱各密封保奏不得會同商酌此保奏內不得將朕特用之員塞責朕特用人員有才守兼優者不拘人數亦另摺奏聞俟朕降旨調取之時再令來京引見如保奏不當日後劣迹敗露將保奏上司一併治罪又兵部議覆雲南提督張國梁奏言雲南地極邊逺副參遊守缺出部推人員每不諳邊情請照舊例仍令該督撫提臣將才具優長熟諳邊情之員越銜一二等揀選題補至守偹員缺仍於分發年滿千總內秉公選用從之又奉諭旨部院筆帖式食俸僅二十八兩不及一護軍領催之錢糧而伊等樂於供職者冀有升轉之途也伊等既有升轉之途若概與加俸恐伊等不知鼓勵轉不竭力嗣後各部院筆帖式著各堂官及該管之人將伊等內謹慎無過又或辦事勤敏或寫本精工或善於翻稿者於年終分别保奏此保奏之人如何照伊等品級增添俸銀或另行加恩之處朕再降旨又奉諭旨從來用人之道必兼聽並觀疇咨博採方能允當而無失朕於選用人員勤加咨訪正以朕一人之耳目有限不若合爾諸臣之見聞始無遺漏也乃爾等僉云未能深知互相推諉夫百職在廷四方具集同鄉親故豈無見聞其賢者即小善亦應稱舉不肖者即小惡無容隱匿若知其賢而不言是謂蔽賢知其不肖而不言是謂黨惡即如月選官內有劉尚儉者係四川夔州府參革貪酷知府劉天觀之子其父刻剝民膏為伊子捐職罪莫大焉如此之人豈可録用在廷豈無一人知之者乃俱緘默不言以此推之可見知而不言者甚多爾等之意惟恐結怨於朋友不若徇情容隱雖誤朕選用之事而不顧貽害於地方而不恤試思得罪於朋友與見棄於君父孰重孰輕全一人與貽害地方孰大孰小即所舉之人為賢為不肖朕不過於引見時借以參酌並非責爾等保其終身無過致貽日後之纍何必過慮乎嗣後務宜痛政積習茍有見聞即從實舉出進賢勿避嫌退不肖勿避怨朕生平惟以真誠待人爾等亦當以至誠報朕尚其各抒忠悃勿負朕推心置腹之至意又大學士等奉諭旨國家建官分職於翰林之選尤為慎重必人品端方學問醇粹始為無忝厥職所以培館閣之材儲公輔之器也從前聖祖加意育才循循訓導又纂修各種書籍需員甚多故翰林院編修檢討幾至二百人庶吉士亦五六十人朕臨御之初未有編纂諸事誠恐人才置之間散特多方録用內而科道吏部外而道府州縣俱各隨材器使務令疏通今編檢尚有百餘人庶吉士尚有數十人著內閣大學士會同翰林院教習秉公别擇其學問優長字畫端楷或精於翻譯國書者留本衙門辦事及派各館纂修其或才具練達可當科道吏部之選或長於吏治編檢可為道府庶吉士可為州縣者一一分别具奏至或老病衰廢願自解退者聽其以原官休致其有行止不端事迹確實者奏聞革退今朕特恩開科人材輩出將來揀選庶常朕當親加考試引見至日後散館仍照舊例以三等分用今正屆殿試之期朕深知向有擬送䇿聨鑽營甲第等弊殊可痛恨朕所點閲卷大臣俱係平日實心委任之人各宜虛公謹慎杜絶諸弊倘有仍蹈前轍者必嚴加處分務使文治日隆英材蔚起以副朕籲俊興賢之至意二年奉諭旨朕命各省督撫提鎮將所知官員保題特以要缺須得人辦理耳若其人著有勞績升任别省者概不肯令赴升任乃復題留本省殊未允協夫天下一體豈得各分爾我嗣後如係水師營緊要員缺仍許題請外餘俱不許題留又奉諭旨各省武職有未經引見者可行文督撫提鎮自副將以下遊擊以上除地方有緊要事務及曽經引見之員外將人材可觀素有聲名者每省陸續保送四五人輪流來京引見又吏部議覆雲貴總督高其倬疏言彌勒州人煙漸稠嵐瘴漸息請停調補例開化廣西二府瘴雖漸減而地居極邊又祿勸州新平縣地方緊要請將知府同知通判州縣等官俱照例調補五年報滿如無合例之員請旨揀選補用其廣西府屬之五槽地方去府治甚逺請以該府通判分防彈壓俱應如所請從之又刑部奉諭旨刑名案件最為緊要朕所賴者諸大臣之贊襄諸大臣所賴以辦事者各司之盡職是以每司必得一二實心辦事才能之員方有裨益朕思翰林院滿漢編修檢討庶吉士俱係進士出身伊等即未必素諳律例亦必不難於練習爾等於滿漢編修檢討庶吉士內揀選或有情願在刑部學習辦事者或有為爾等所知者共揀二三十員帶領引見分在各司學習辦事如有辦事明白實心效力者酌量題補三年大學士等奉諭旨進勦青海等處兵辨其人材可觀技勇優長者著將軍嶽鍾琪揀選保奏守備二員千總二員把總二員馬兵四名總兵官黃喜林王嵩紀成斌宋可進孫繼宗每人保奏守備一員千總一員把總一員馬兵四名文到限三日書名報部候旨調來引見録用又奉諭旨科道外轉向係降用是以令其將科道原銜帶於新任前御史陳時夏越分奏事今河南管河道給事中陳世倕工程掣肘他省所用道員倚恃科道職銜抗違上司亦未可定除新用許容柯喬年陸錫書三人仍帶科道職銜外其餘兼科道銜之各省道員各該督撫問明情願不兼科道銜在道員效力者留任其有不願在道員者仍調回原任又大學士等奉諭旨應開科道人員俱係科甲出身再考文字亦屬無益今次著於翰林各部院衙門應行開列人員內令各堂官薦舉從前朕於科道中欲用外省道員故將有才幹者選用今外省道員將次用足科道職司言路務擇忠誠為國直言無隱者方為稱職如錢廷獻之徒務虛名劉燦之挾仇為已崔致逺之抗違狂妄此數人皆但知有身而不顧朝廷如此存私之人斷不宜於言責今次薦舉人員內若有此等行為必將原保舉之人一併究問又定外任回避例督撫兩司及統轄全省之道員其族人回避者赴京另補若分巡數府之道員及知府同知通判知州等官所轄之地無幾本族回避官員即於本省內調補又吏部奉諭旨各省吏治今漸可觀惟四川陜西兩省劣員甚多爾部將應補應選人員傳集會同九卿驗看除年老及人材甚劣者不用外其通曉文義人材可用者帶領引見朕親加揀取再行考試發往四川陜西補用又吏部奏各省題奏命盜案件及刑部咨稿俱係漢文滿洲司官如不識漢字必被猾吏欺隱嗣後刑部滿洲司官缺出請揀選通曉漢文人員補授庶案件可理而滿洲學習漢字者愈加勉勵從之四年奉諭旨漢人為外官者俱回避本省朕思漢軍之在直隸亦當如漢人之回避本省也直隸去京城甚近漢軍中親戚朋友散處直隸州縣伊等莊田地土亦多分隸其地保無請託牽制徇私報怨之弊乎嗣後應照漢人回避本省之例停其在直隸居官令於别省各缺銓用著九卿速議具奏尋議八旗漢軍人員應照漢人回避本省之例凡遇直隸道府州縣等缺於銓選時扣除布按二司缺出亦停其開列得旨布政使按察使仍行開列又奉諭旨連年以來朕令督撫提鎮等保送所屬武辨進京引見若該上司奏摺內有該員操守平常字樣朕於召見日必將所奏諭知冀其洗滌前愆以圖後效無非愛惜人材之意間有不肖之員於回任之後心懷怨望日漸參商或又以平時操守不謹既為朕所知將來難望上進志氣隳頽見私忘義該上司即當據實參奏勿謂朕曾擢用有所瞻顧勿謂已曽保舉回護前非則賞罰明而屬員知所勸懲矣又吏部遵旨議覆雲南貴州四川福建廣東廣西等省地處邊逺選授教職曠缺遲久嗣後將應選人員由部截定人數照科分名次填寫執照給發各該巡撫令其挨次具題選補從之又陜西巡撫圖理琛摺奏保送遊擊守備引見奉諭旨嘗見滿洲為上司則以滿洲為可信任漢人為上司則以漢人為可信任漢軍為上司則以漢軍為可信任不思身為大臣管轄之人滿漢俱有一有偏向則諸事皆不得其平何以服人心而理庶務前朕令陜西督撫提臣各保遊擊一員守備一員送京引見朕意以陜西武辨可用者甚多而征討桌子山等處又多效力有功之人地方大臣當從公保薦以副朕留心人材之意乃圖理琛於遊擊內將查爾扈保送前來查爾扈曽在乾清門行走而圖理琛即將伊保舉詎此外遂無可保舉之人乎且查爾扈係朕所深知熟識之人又何必進京引見著即令回任又吏部奉諭旨朕從前曾下諭旨各省道府州縣之居官好者命總督巡撫提督布政按察二司各保舉密奏不得互相商議原以通省人材不少保舉多者不過二三人少者僅一人諸臣於素所知者各拔其尤自然精確乃其中竟有挾私妄舉者及來京引見俱極庸陋殊非人臣以人事君之義今各員俱已引見爾部可再行文與各省督撫布政按察二司除從前曾經密舉及朕特旨補授各員外督撫暨布按二司各於道府州縣中明舉一人不得雷同督撫自行題奏布按二司咨呈爾部文到日爾部即繕摺具奏被舉之州縣官員並令給咨來京引見如有挾私任情草率濫舉者朕必從重治罪斷不姑容又兵部議覆佐領一官非散職可比如兼在散騎郎行走則佐領事務必至有誤應將現在佐領之兼散騎郎者俱撤回嗣後散騎郎缺出不準挑取佐領定保送各處監督之堂官能據實參出者免其治罪凡各處監督俱由該部院堂官保舉派出之後若有劣迹許據實參奏倘别經發覺則將原保題之人一併治罪又奉諭旨吏治惟在得人而各省有司員缺甚多非廣收博取不足備庶官之位故數年以來各省官員經朕揀選命往者亦多然當其揀選之時或見其奏對明白舉止從容或見其條陳事宜似屬可採遂命往各省以試用之又有奉旨特用之員大約因督撫上司等薦舉保奏朕召來引見見其才具可用遂加遷擢以鼓勵之此等人員朕不過取拔於臨時並未曾試驗於平日實不知其居心行事何如為督撫者宜深知朕心勿以其為揀選特用之員有意優待而姑容之倘居官不善即據實參奏則人皆知警而於吏治大有裨益又奉諭旨助教一官有教訓士子之責若只考試繕寫則年少淺學但工寫字者皆可入選何能得人可傳諭各部院衙門將滿字筆帖式內為人老成有品行者保舉引見其應考翻譯仍照例考試五年奉諭旨治天下之道在於用人今日刑部堂官塞爾圖等保舉筆帖式一人升用主事朕問其在部辦事幾年則對曰三月又問所以保舉之由則曰因伊坐臺十二年是以舉之朕令內外各衙門遴選人員者原期官得其人人稱其職使吏治民生均收實效也况刑部為民命所關朕尤加意慎重惟恐用人不當使刑罰偶失其平干天和而枉國法此意乃舉朝所共知者塞爾圖等以朝廷量能授職之任視為用情市恩之地此不過身受者一人感激而已而欲有益於國家之事生衆人鼓勵之心豈可得乎朕治天下用賞用罰悉秉至公塞爾圖等身為大臣乃庶官之表率今存卑鄙狹小之見既欲市賣私恩則必回避嫌怨似此私心自用即作威作福之所由也此風斷不可長是以特行宣諭令內外臣工咸以為戒又改定保送科道及補授吏部司員例舊例科道吏部等官專用科目出身之人至是閣部遵旨議定嗣後科道缺出在京則令翰林院掌院於編修檢討內保送各部院堂官於各屬司官內不論科甲貢監擇其勤敏練達立心正直者保送在外則各省督撫將州縣官保送其留京者以科道補用至吏部四司郎中等員缺出與户兵工刑四部司員不論科甲貢監俱歸月選又改定武職歸部選之缺準令該督撫提鎮保題備用各省武職員缺有題補不題補之分有題缺之省分升遷甚速其本無題缺及題缺無多之省分即有諳練之員格於成例亦必論俸升遷至是該督撫提鎮秉公揀選開列具本保題兵部注册以備選用又定病痊起復例凡在京官因病告假回籍調理者病痊之日仍以原衙門補用至在外各官一經告病即令休致以防規避上以外官有地方之責患病離任不得起用殊為可惜嗣後府州縣官員告病者令其回籍調治痊可有情願起用於本籍起文赴部引見仍以原缺補用者如此可以杜規避之端而人才亦不至淪棄至七年以文武一體武辨病痊起復亦如之又定拔補千總就近調補例先是督臣髙其倬奏凡兵丁不得拔補本營千把部議準行至是奉諭旨朕思本營兵丁即為本營千把誠不能免於牽制瞻徇若於同城之中互相更换庶於公私兩便其地方止有一營者或於就近調補或仍照從前舊例著該部定議尋議嗣後督撫提鎮於本標下左右前後等營準其互相拔補或同城協營亦許彼此更换至獨營地方千總有左哨右哨之分把總有頭司二司之别如無鄰近營汛可即於本營左右哨二司調拔庶兵丁營理汛務各皆嫻熟且可免遷移之纍從之又大學士九卿等奉諭旨為治之道首重得人朕臨御以來夙夜孜孜廣為咨訪期得人材以理庶政內外臣工所保舉之員其中秉公推薦足備任使者固不乏人而徇私濫舉及茍且塞責者亦復不少朕思薦保人材關係國家辨材論官之要道舉得其人則政事無不就理舉非其人則弊從此而生孟子曰立賢無方孔子曰舉爾所知觀聖賢之言則知得人之道宜廣其途以為搜羅而各舉所知庶可以收克知灼見之益也今特諭內外諸臣等京官自翰林科道郎中以上外官自知府道員學政以上武官自副將以上旗員自參領以上皆令各舉一人滿洲官員則保舉滿洲漢軍官員則保舉漢軍漢人官員則保舉漢人文職官員許保武職武職官員許保文職於滿漢文武內或係現任職官或係候補候選之人或係進士舉人貢生生員或係山林隱逸務期有猷有為有守品行才具足備國家之用者各人密封奏摺赴奏事人員處轉奏外官則遣家人賫送密摺來京付奏事人呈進即或親戚子侄等亦可據實薦奏不必以嫌疑引避但京官如尚書侍郎外官如督撫提鎮兩司皆係朕已經深知簡任者不必入所薦之列其奏摺內只開本人官銜姓名注明所薦之人官銜考語不必引頌繁文此朕旁求俊乂之苦心冀賢才輩出師濟盈廷俾百職得宜庶務畢舉凡有保舉之責者不得瞻顧私交不得受人囑託不得互相商議不得輕聽風聞夫十室之邑必有忠信凡人生平豈無一人熟識深知者况既列朝紳受國家之爵祿而朕又推心置腹畀以舉賢薦能之美事倘猶有懷藏私意濫舉非人者清夜捫心尚可以為人乎且朕之觀人往往洞見隱微將來觀所舉之人即可知舉人者心術之公私識見之明昧亦不使諸臣得以行其私也六年奉諭旨凡辦理府州縣事務若得曾經出仕諳練之人於地方實有禆益朕愛惜人材於罷斥之員常降旨調來引見以觀其才具之優劣不忍令其棄置今思從前因公詿誤之員其中未必無才守可觀者著吏部行文各省凡知府同知通判知州知縣任內除大計特疏糾參外其因公詿誤降革者該員曽經居官五年而離任之後交代清楚無錢糧案件未清之處準本人親赴吏部具呈吏部不拘人數即行奏聞考試履歷帶領引見候朕酌量起用起用之後若再貪婪不法再經察出必嚴加治罪又奉諭旨州縣為親民之官向來督撫藩司等委員署印每慿一己之私心而不計道里之逺近夫州縣一官錢糧必及時徵收盜賊必立時緝捕人命必當時相驗承審案件必如限完結若於數百里之外兼攝印篆顧此失彼諸務廢弛嗣後州縣缺出必須委鄰近官員署理倘正印官一時不得其人即選鄰近之賢能佐二官署理如鄰近難得其人則將隔府正印官委署另委官以署該員本縣之事務期人地相宜而各員公務又不至於遲誤斯有禆益倘該上司有市惠徇情任意委署者經朕察出嚴加處分又吏部議覆理藩院尚書特古式等奏稱理藩院專司蒙古事務非通曉蒙古字話之人不能辦理請於八旗蒙古官學生監生內有能翻譯蒙古字話者吏部會同理藩院考取以各部院蒙古筆帖式挨次補用唐古忒學生由理藩院考取翻譯蒙古唐古忒字話揀選好者以理藩院唐古忒筆帖式挨次補用又唐古忒學生補用筆帖式中書者仍兼唐古忒學行走升至主事員外方令其離學庶所習唐古忒字不致荒廢又舊例蒙古官學生唐古忒學生補用中書似屬太優嗣後官學生停其補中書中書缺出於八旗蒙古筆帖式內揀選補用至內閣蒙古中書額設十六缺內有唐古忒中書四員查內閣翻唐古忒字話既設巴克什喇嘛並不專藉中書請以唐古忒中書內裁去二缺止留二缺令唐古忒學生出身之筆帖式補用其蒙古中書十二員令理藩院會同內閣於八旗蒙古筆帖式考試擬定正陪咨送吏部引見補用此補授中書人員內由理藩院蒙古筆帖式考取者仍以理藩院應升之缺升轉由吏部等衙門考取者仍以吏部等衙門應升之缺用又國子監八旗蒙古官學生監生學習滿洲蒙古翻譯既各蒙恩賞給錢糧請將內蒙古學裁去其裁退之學生俟國子監本旗學生缺出坐補其裁退之助教俟國子監助教缺出坐補又八旗蒙古監生官學生內有學習漢文情願考試滿漢翻譯者令其考試取中後以吏部等衙門蒙古筆帖式缺與考試取中人員一體挨次補用又八旗遊牧員外郎主事仍照舊例由理藩院於蒙古護軍校驍騎校中書筆帖式護軍內揀選補放又喜峯口殺虎口驛站員外郎各一缺張家口歸化城蒙古理事同知各一員原係揀選之缺應照定例於理藩院司官內揀選補授又國子監助教八員係訓迪滿洲蒙古翻譯之員嗣後遇缺於理藩院及修書蒙古筆帖式并國子監間散巴克什內令理藩院會同國子監揀選擬定正陪咨送吏部引見補用又欽天監蒙古五官正二員原係考選之缺請照例於內閣蒙古中書八旗蒙古筆帖式內考選咨部引見補用又理藩院司官筆帖式內有不通曉蒙古字話又不通曉漢文者交與該堂官甄别令其回旗以對品旗員補用其不能通蒙古字話而能通曉滿漢翻譯之員令該堂官咨部注册俟彚齊人數吏部奏請考試果係翻譯精通者準其於六部司官筆帖式等通行較俸以應升之缺升補俱應如所請從之又鑲黃旗蒙古副部統宗室滿珠錫禮奏言京營武辨等員參將以下千總以上應參用滿洲不宜專用漢人得旨從來為治之道在開誠布公遐邇一體若因滿漢存分别之見則是有意猜疑互相膜視豈可以為治乎天之生人滿漢一理其才質不齊有善有不善者人情之常用人惟當辨其可否不當論其為滿為漢也自我太祖高皇帝開國之初即將滿漢兼用是以規模宏逺中外歸心蓋漢人中固有不可用之人而可用者亦多如三藩變亂之際漢人中能奮勇效力以及捐軀殉節者正不乏人豈可謂漢人不當用乎滿洲中固有可用之人而不可用者亦多如貪贓壞法罔上行私之輩豈可因其為滿洲而用之乎且滿洲人數本少今將中外緊要之缺補用已足辦理若參將以下之員辨悉將滿洲補用則人數不敷勢必有員缺而無補授之人朕臨御以來以四海為一家萬物為一體於用人之際必期有濟於國家民生故凡秉公持正實心辦事者雖疏逺之人而必用有徇私利己壞法亂政者雖親近之人而必黜總無分别滿漢之見中外諸臣皆宜深體朕懷同寅協恭股肱手足交相為濟則國家深有倚賴久安長治之道必由於此也又吏部奉諭旨國家政務必得其人而後理朕加意旁求多方遴選惟期庶士百職俊乂在官以收得人之效但各職需人之處甚多該督撫等又屢屢奏請而見在赴部銓選之員不敷揀用因思自古人臣為國有以人事君之義孔子論舉賢才之道亦云舉爾所知可見凡人生平必有深知篤信之才足備朝廷之使者果其以公忠為心自無薦舉不得其實之理也兹特降諭旨著京官大學士以下主事以上之滿洲漢軍漢人外官督撫以下知縣以上之滿洲漢軍漢人每員各舉一人除現任知縣以上官員不必保舉外或係舉貢生監或係山林隱逸果有品行才猷可備任使者即親戚子弟亦不必引避嫌疑據實保舉至外官所轄之見任佐二雜職等屬員亦準其保薦朕從政務需人起見開誠布公以期集思廣益內外大小臣工等共受國恩時懷報效自應秉公據實以展臣子之心必無有徇私冒濫以自蹈欺罔者倘或舉非其人將來覺察或試用不稱責有攸歸勉之勉之七年兵部奉諭旨各省守備內有操守亷潔漢仗去得諳練營務熟習水師堪用遊擊之員爾部行文該提督出具考語分别水師陸路填寫年嵗籍貫履歷照保舉副將參將分定等第之例開列一等者咨部俟降諭旨再行調來引見倘保舉之後有改易前轍不思奮勵精進者亦照副將參將更换等第之例咨部改定又奉諭旨外任督撫藩臬為全省之表率關係甚重每當簡用之時常以一時不得其人深勞念慮凡內外大臣受國家厚恩均當留意於平時秉公奏薦盡以人事君之道京官自學士侍郎以上外官自藩臬以上著各密保一人將其人可勝督撫之任或可勝藩臬之任據實奏明不必拘定滿漢亦不限定資格即府縣等官階尚逺者纍有真知灼見信其可任封疆大􅒼亦準列於薦牘之內若一時無深知可舉之人準其從容採訪不得草率塞責有負咨詢又內閣奉諭旨向來有司官補授之時回避本省蓋因地方密邇恐其中有嫌疑牽制等弊也朕思江南之上江下江湖廣之湖北湖南陜西之西安甘肅雖同在一省中而幅員遼濶相距甚逺定制各設巡撫司道以統轄之其情形原與隔省無異則官員選補不過有同省之名並無嫌疑牽制之處况既係同省則於彼處人情土俗較他省之人更為熟悉未必不於地方有所禆益嗣後凡江蘇安徽湖北湖南陜西甘肅諸處府州縣以下官員得本省之缺不在本籍巡撫統轄之內者不必令其回避其相隔在五百里之內者仍照隔省回避之例一體遵行又改定各省庫大使選用人員向例庫大使以吏員銓選嗣後照鹽大使例將候選知縣州同州判縣丞等揀補給與八品職銜又奉諭旨凡外任文武官員因公詿誤革職者朕恐其罷斥之由限於定例而人材尚屬可用不忍使之廢棄終身是以格外施恩於部議革職之時往往酌量降旨令其交代後該上司出具考語送部引見此朕愛惜人材體恤下情之意惟是外官在任參罰之案常多每有先經革職奉旨來京引見之員陸續又有别案革職者此等官員著交部查明若續參之案情罪重於前案非係因公詿誤應從後案辦理倘與初參革職之案情罪相同仍著帶領引見於摺內將該員共有處分幾案之處聲明候旨又吏部議定六部漢軍堂主事員缺向係小京官及有品筆帖式論俸推升不能盡得熟習翻譯之員嗣後漢軍堂主事缺出請令該堂官於應升堂主事之漢軍中書小京官及有品筆帖式內將熟習翻譯者出具考語保送吏部擬定正陪引見補授再起居注主事職司翻譯諭旨載入史册關係緊要亦請於應升人員內揀選熟習翻譯者引見補授永為定例九年奉諭旨陜西甘肅地方辦理軍需須用年力精壯才可辦事者命往以備差委現在分部學習人員內著該堂官保送其候補候選及降革官員無錢糧未清之案者漢軍人員著該旗大臣揀選保送滿漢大臣等若有深知之人不論漢軍漢人亦準其舉出若該員身有挂欠處分果係才能出衆亦準該旗及滿漢大臣等保送請旨此差往人員著交與該撫酌量差遣委用將來辦事若好著該督撫等奏聞加恩議敘十年奉諭旨山東地方户口繁多現在辦事若得本省人員前往更為妥協朕思在京居官及赴部候補者必多伊等熟悉土風必能實心辦事著大學士等於此項人員內揀選一二十員奏聞令往山東每人酌賞銀兩以為路費俾其星速起程又吏部議準派往軍前人員遇俸滿應升雖經指缺不準實授其新任之缺既已空懸而現出之缺例不另補請嗣後除口內奉差人員仍俟引見補授其派往軍前辦事官員得缺即具題補授準其升轉所遺員缺歸部月選從之又八旗都統等議補選內外文職人員內有不能即行補用者有降級調用及由各衙門撥回不能即得對品之缺者此內不無人材可用之人請嗣後此等人員內有情願就武職效力者令該旗大臣等驗看揀選其有可習騎射年力精壯之人帶領引見照伊等品級相當之缺具題補用從之十一年奉諭旨官員有告假丁憂緣事開復者定例於單月補用有待至經年纍月者朕思告假開復人員自應遵照定例若丁憂之員亦拘此例於情理未協嗣後不論單雙月遇有缺出即行補用將此永著為例又八旗漢軍都統等奉諭旨嗣後補授驍騎校如本佐領下不得其人即於合旗通行揀選如一佐領下人材果好即多補數缺亦無不可又奉諭旨從前滿洲侍衛補用緑旗員缺乃朕鼓勵人材之意近觀所用滿洲人員能整頓營伍者無幾且緑旗應用之員甚多嗣後滿洲藍翎侍衛著仍在侍衛內行走揀選都司守備時不必帶來引見又兵部奉諭旨從來將備之選務須精悍之材雖目不識丁而膽略豈關文采縱貌非出衆而義勇無礙粗疏蓋整肅部伍委寄干城矢奔走於疆場甘勤勞於行列類非薄具聰明小有才幹者之所能為而徑健渾朴氣盛力充之禆辨所當略短取長加意造就以儲將材以重武備者也近見各省督提等保題引見之大小辨員除軍功勞績外大率以明白勤敏才堪辦事注考朕親加簡閲并逐一詢問奏對便給者有之才具明晰者有之而人材雄偉技勇超軼者曾不數見豈明白勤敏即可為將材而才堪辦事者可為武備耶嗣後該督提等凡保題將辨務重弓馬兼選漢仗全材難得實效須收如仍有以軟弱而謬稱熟練以機巧而謬稱通達濫行保題者是重違朕訓膜視封疆矣定將該督撫等嚴加議處十二年奉諭旨各省將軍所屬協領內有堪膺外省副都統之任者著行文各該將軍出具履歷考語保舉送部如不得其人亦出具緣由報部毋得草率徇庇如所保之人不能稱職定將原保之將軍大臣一併議處十三年奉諭旨現今道府出缺甚多一時不得勝任之員著在京三品以上滿漢官員於現任科道部屬及知府同知知州通判知縣內各舉一人或勝道員之任或勝知府之任填注明白於三日內各送內閣彚齊奏聞候朕簡用若所舉有相同者亦準彚奏伊等身為大臣歷官年久豈無深知確見之人可膺保薦者况奉朕特旨尤當矢公矢慎以副朕咨詢之意倘懷私心瞻徇情面將來所舉之人或有不端劣迹或不能勝任定將原保舉之大員嚴加議處皇朝文獻通考卷五十六
