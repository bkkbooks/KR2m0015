body:
  text: 封建考八異姓封爵四蒙古公一等誠勇公班第蒙古鑲黃旗人乾隆十九年十月以勦準噶爾軍功封一等子二十年五月以平準噶爾功晉封十二月以伊犂兵變盡節諡義烈巴祿班第子乾隆二十年十二月襲慶林巴祿子乾隆三十六年十二月襲三等公博羅蒙古鑲黃旗人贈三等建烈公多尼庫魯格子崇德七年八月襲三等公噶爾瑪博羅子順治九年六月襲杜噶爾噶爾瑪子康熙四十六年十二月襲達什琳陳杜噶爾子康熙五十四年十二月襲雍正九年三月襲三等建烈公敏珠爾多爾濟達什琳陳子乾隆十八年十二月襲以上鑲黃旗三等公吳訥黑蒙古正白旗人以取烏喇等功封三等副將又以攻寧逺軍功晉三等總兵官天聰八年五月以擊遵化州玉田縣軍功晉三等公光泰吳訥黑子天聰九年二月襲崇德四年六月以罪降襲詳男爵三等義烈公保寧蒙古正白旗人贈三等義烈公那木扎爾子乾隆二十四年四月以那木扎爾陳亡襲以上正白旗附贈三等公以旗分為序贈三等建烈公多尼庫魯格蒙古鑲黃旗人封詳子爵陳亡崇德七年贈三等公雍正九年三月贈三等建烈公世襲贈三等義烈公那木扎爾蒙古正白旗人封詳伯爵赴西路軍營遇賊戰沒乾隆二十四年四月贈世襲以上公爵伯二等超勇伯薩拉爾厄魯特人𨽻籍蒙古正黃旗乾隆二十四年十二月封玉魯斯薩拉爾子乾隆二十五年十二月襲三十四年降為一等子四十四年卒無嗣繼子博綽諾克降襲三等誠毅伯伍彌泰蒙古正黃旗人贈三等誠毅伯阿爾訥子雍正二年十二月襲三等伯乾隆十四年八月襲三等誠毅伯伍米伍遜伍彌泰子乾隆五十一年十二月襲以上正黃旗一等勤襄伯那木扎爾蒙古正白旗人乾隆二十一年十二月以擒叛賊青滚雜卜功封贈襲並詳公爵以上正白旗一等伯班肫蒙古正藍旗人初襲詳子爵順治九年正月遇恩詔晉二等伯又以恩詔晉一等伯巴特馬桑班肫子康熙二年四月襲索訥木喇什巴特馬桑子康熙二十二年十二月襲子降襲詳子爵以上正藍旗附贈三等伯贈三等誠毅伯阿爾訥蒙古正藍旗人封詳子爵雍正二年二月以軍營效力贈三等伯乾隆十四年八月贈三等誠毅伯世襲以上伯爵子一等昂邦章京多尼庫魯格蒙古鑲黃旗人國初積軍功封陳亡贈詳公爵一等精竒尼哈番多爾機達爾漢諾顔蒙古鑲黃旗人崇德元年五月自蒙古歸順封一等梅勒章京順治四年六月以考績晉三等昂邦章京是年改為三等精竒尼哈番九年正月遇恩詔晉二等又以恩詔晉一等卒諡順僖博地多爾機達爾漢諾顔子順治十七年七月襲色楞博地子康熙四十五年十二月降襲三等精竒尼哈番黑達色色楞子雍正三年五月襲乾隆元年改為三等子啓拉克黑達色子乾隆二十四年十二月襲興安啓拉克子乾隆四十八年十二月襲一等精竒尼哈番塔什蓋護魯格蒙古鑲黃旗人崇德元年五月自蒙古歸順封三等精竒尼哈番順治九年正月遇恩詔晉二等又以恩詔晉一等馬德理塔什蓋護魯格孫順治九年正月襲黑雅圖馬德理子康熙十四年閏五月襲關夀黑雅圖子康熙四十六年四月降襲三等精竒尼哈番善福關夀子雍正十一年十月襲乾隆元年改為一等子常明善福子乾隆三十二年十二月襲二等精竒尼哈番杜魯麻占蒙古鑲黃旗人順治二年二月封三等梅勒章京四年改為三等阿思哈尼哈番七年三月遇恩詔晉二等九年正月遇恩詔晉三等精竒尼哈番又以恩詔晉二等卒諡忠直齊錫杜魯麻占孫康熙三年五月襲德爾格爾禮齊錫子康熙十五年十月襲外庫德爾格爾禮弟康熙三十一年五月襲塞布特外庫子康熙三十八年閏七月襲三等精竒尼哈番阿喇納蒙古鑲黃旗人三等精竒尼哈番隆古子詳男爵康熙九年二月襲畢禮克阿喇納弟康熙十八年八月襲以罷弱除爵布達畢禮克兄康熙三十七年六月襲色勒布達子康熙三十九年四月襲四十二年二月仍以畢禮克襲烏爾圖那蘇圖畢禮克子康熙五十九年四月襲乾隆元年改為三等子德福烏爾圖那蘇圖孫乾隆十二年十二月襲二十四年六月削爵無襲以上鑲黃旗一等精竒尼哈番郭爾圖車臣蒙古正黃旗人崇德元年五月自蒙古歸順封一等昻邦章京順治四年改為一等精竒尼哈畨沙殷察格郭爾圖車臣子順治五年十二月襲班第沙殷察格子順治十五年七月襲巴爾彌特班第從弟順治十八年五月襲多爾濟巴爾彌特子康熙三十三年四月襲鄂竒爾多爾濟兄康熙五十四年二月襲永達鄂竒爾子康熙五十七年十二月襲巴查爾永達伯父康熙五十八年八月襲乾隆元年改為一等子鍾文巴查爾子乾隆十六年閏五月襲坐事削爵鍾惠鍾文弟乾隆十八年十二月襲慶祥鍾惠孫乾隆五十一年十二月襲一等精竒尼哈番德參濟旺蒙古正黃旗人崇德元年五月自察哈爾歸順封一等昻邦章京順治二年十月以罪降三等四年三月以追滕機思軍功仍晉一等是年改為一等精竒尼哈畨噶爾瑪德參濟旺子順治五年八月襲劉保住噶爾瑪孫康煕二十一年九月襲常在劉保住子雍正七年二月襲乾隆元年改為一等子拜凌阿常在子乾隆元年十二月襲坐事削爵達沖阿拜凌阿弟乾隆十四年十二月襲他思哈達沖阿子乾隆四十七年十二月襲一等精竒尼哈畨哈岱蒙古正黃旗人贈三等昻邦章京巴賴都爾莾鼐子崇德七年八月襲三等昻邦章京順治四年三月以入山海關擊流冦平浙江追滕機思軍功晉二等是年改為二等精竒尼哈畨十四年九月以平浙江舟山功晉一等卒諡勤壯阿爾訥哈岱孫康熙十九年十一月襲贈襲並詳伯爵一等精竒尼哈畨和善蒙古正黃旗人康熙十年五月兼襲叔祖亥色叔阿桑爵並詳男爵晉封色特里和善子康熙三十四年十二月襲子降襲詳男爵二等精竒尼哈畨巴賽卓爾齊泰蒙古正黃旗人崇德元年五月自蒙古歸順封三等昻邦章京順治二年七月以入山海關擊流冦功晉二等巴岱巴賽卓爾齊泰子順治二年七月襲四年改為二等精竒尼哈畨色楞巴岱弟順治五年七月襲阿玉錫色楞弟順治十八年五月襲吳巴希阿玉錫子康熙五十一年二月襲以罪削爵吳巴第吳巴希弟雍正三年六月襲乾隆元年改為二等子班珠爾吳巴第兄子乾隆五年六月襲坐事削爵巴圖扎布班珠爾弟乾隆十九年十二月襲羅布藏依喜巴圖扎布子乾隆四十二年十二月襲二等精竒尼哈畨達運蒙古正黃旗人崇德元年五月自察哈爾歸順封一等梅勒章京順治四年改為一等阿思哈尼哈畨順治九年正月遇恩詔晉封俄竒爾達運子康熙十年九月襲子降襲詳男爵二等精竒尼哈畨沙爾代蒙古正黃旗人三等阿思哈尼哈畨沙濟弟順治十五年五月以原職兼襲爵封達爾查沙爾代孫康熙九年七月襲巴雅思呼朗達爾查子雍正三年六月襲乾隆元年改為二等子白玉巴雅思呼朗姪乾隆元年十二月襲二等子常亮唐帑弟乾隆四十七年十二月襲一等子博綽諾克到魯斯子乾隆四十四年十二月襲原襲超勇伯降一等子以上正黃旗一等昻邦章京峩爾克竒代青蒙古正白旗人崇德元年五月自察哈爾歸順封二等昻邦章京七年八月以征山東圍錦州擊松山兵等功晉一等卒諡勤良嘉穆素峩爾克竒代青子崇德八年二月襲順治四年改為一等精竒尼哈畨根都賈布嘉穆素子康熙六年十月襲綽格圖根都賈布子康熙六年十二月襲希喇巴峩爾克竒代青弟孫康熙九年十月襲喇馬扎布希喇巴從弟康熙十五年九月襲八達理喇馬扎布子康熙四十四年八月襲常德八達理子雍正十二年五月襲乾隆元年改為一等子溫都遜常德兄子乾隆九年十二月襲德爾格楞貴溫都遜子乾隆二十四年十二月襲原封二等精竒尼哈畨明安達理蒙古正白旗人順治二年四月以征山東擊流冦功封三等梅勒章京三年三月以追滕機思功晉二等四年六月以考績晉一等是年改為一等阿思哈尼哈畨九年正月遇恩詔晉三等精竒尼哈番又以恩詔晉二等後以罪降卒諡敏果二等精竒尼哈番沙哈納蒙古正白旗人二等精竒尼哈番光泰兄子詳男爵康熙八年十一月襲智勇沙哈納弟子康熙二十一年二月襲以罪削爵延福智勇子雍正八年五月降襲三等精竒尼哈番乾隆元年改為三等子阿玉璽延福子乾隆十八年十二月襲坐事削爵安泰阿玉璽從弟乾隆十九年十二月襲伊魯爾圖安泰子乾隆四十年十二月襲三等精竒尼哈番固魯格蒙古正白旗人崇德三年六月自察哈爾歸順封一等梅勒章京順治二年八月以軍功晉三等昻邦章京四年六月坐事降一等梅勤章京七月仍晉三等昻邦章京是年改為三等精竒尼哈畨烏巴什泰固魯格子康熙六年二月襲阿玉璽烏巴什泰子康熙二十四年二月襲多爾濟阿玉璽子康熙三十六年十月襲以罪削爵丹金多爾濟孫康熙五十九年七月襲乾隆元年改為三等子扎什泰丹金子乾隆二年九月襲二十四年十一月以始祖固魯格世襲都統兼襲二等男富勒賀扎什泰子乾隆三十五年十二月襲三等子兼三等男以罪革職富保富勒賀親弟乾隆三十六年十二月襲三等精竒尼哈畨綽爾濟蒙古正白旗人康熙六年正月封納木扎爾綽爾濟子康熙二十年十一月襲後降襲以上正白旗一等精竒尼哈番色楞車臣蒙古鑲白旗人崇德元年五月自察哈爾歸順封三等昻邦章京順治二年二月以入山海關擊流冦功晉二等四年改為二等精竒尼哈畨九年正月遇恩詔晉一等阿玉璽色楞車臣子康熙十一年十二月襲無嗣以上鑲白旗一等精竒尼哈畨多爾機蒙古鑲紅旗人三等精竒尼哈畨班惕思希布子詳男爵康熙十二年五月襲三年精竒尼哈番三十九年七月以平噶爾丹功晉二等雍正三年四月以平西藏功晉一等旺扎爾多爾機孫雍正十一年十二月襲乾隆九年改為一等子特古思旺扎爾子乾隆二十九年十二月襲以病罷爵圖仗住特古思弟乾隆三十二年十二月襲二等昻邦章京叟格都蘭蒙古鑲紅旗人崇德九年五月自察哈爾歸順封三等昻邦章京順治三年五月以入山海關破流冦平江南河南功晉二等三津叟格都蘭子順治三年五月襲四年改為二等精竒尼哈畨渾進三津弟順治十四年十月襲阿里渾渾進子康熙十八年四月襲二十五年二月以平陜西功晉一等根篤扎布阿里渾子康熙五十六年四月襲乾隆九年改為一等子班扎布根篤扎布子乾隆十七年十二月襲丹達布爾瑪班扎布從孫乾隆三十二年十二月襲三等昻邦章京畢喇希蒙古鑲紅旗人崇德元年六月自喀喇沁歸順封多爾吉畢喇希子順治三年十二月襲四年改為三等精竒尼哈畨九年正月遇恩詔晉二等畢里格多爾吉從姪順治九年四月襲南第畢里格子康熙二十二年八月襲吳爾圖那蘇圖南第子康熙四十八年三月降襲三等精竒尼哈畨乾隆元年改為三等子佛保吳爾圖那蘇圖子乾隆七年五月襲金剛保佛保子乾隆十六年十二月襲阿爾京阿金剛保子乾隆二十九年十二月襲瑞祥阿爾京阿子乾隆五十年十二月襲以上鑲紅旗一等昻邦章京布爾哈都蒙古正藍旗人崇德元年六月以駐守羅文峪城軍功封班肫布爾哈都子順治元年三月襲晉封詳伯爵吉昌班肫曾孫一等伯索諾木喇什子康熙五十五年十一月仍襲一等精竒尼哈畨乾隆元年改為一等子色布騰吉昌子乾隆三十六年十二月襲以上正藍旗三等昻邦章京色稜布篤馬蒙古鑲藍旗人崇德元年五月自察哈爾歸順封多爾濟色稜布篤馬子崇德三年八月襲順治四年