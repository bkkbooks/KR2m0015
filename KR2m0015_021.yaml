  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_021-1a, image: WYG0632/WYG0632-0441c.png}
body:
  text: 職役考一臣等謹按古者體國經野因民授事凡鄉黨州里之間皆以官治之考之周禮其法良備大抵以士大夫治其鄉之事為職以民供事於官為役於以敷政教聨族黨興庶功而均勞逸條理秩然亦上下相維之端也漢治近古三老亭長嗇夫之屬其職匪一於民之任役者則從而後先之至於唐鄉職漸㣲自是凡治其鄉之事皆類於役迨至宋代役法紛如差役雇役義役屢變而弊彌甚自元暨明鮮有良規我朝政平事簡與民休息鼛鼓之徵公旬之召幾無其事不獨公家營造一瓦一木不肯徒用民力甚至修城浚池以及河工興築諸務凡所以為民捍禦者莫不按日計工人予之直殆實未嘗役一民也即如近年皇上平定伊犁大兵冞入師行極逺然所用皆索倫勁旅河西近塞之民目覩出車耳聞唱凱而身不與其役古所稱從袵席上過師者今始見之且所過之區蠲租賜復殆無虚歳民生其間誠厚幸矣是故襲狐貂之厚者不知至寒之悽愴享昇平之樂者不知憚人之況瘁熙熙之衆沐國家休養生息之恩百有餘年之久自髙曾以逮子孫安居聚處愚氓狃於樂利或有忘乎前代之事竟若分所應得如擊壤老人者臣等依馬氏前考仍立此門非徒以體例不容變易而已亦以見職役為生民之常分而聖朝寛大實千載一時也謹就現存版籍編為四卷而復除一巻附焉天聰八年以漢官陳訴差役重科命集衆官宣諭之時衆漢官訴於管户部貝勒之前云所派差役似有重科之事太宗文皇帝命大臣察訊所訴多不實因命傳集衆官諭曰爾衆官在明國時所有人丁若干今有若干孰多孰寡何不細思之朕思我國雖貧爾等如此亦足矣欲令爾等與滿州一例當差尚恐致累今爾等反言苦累過於滿洲滿漢官民雖有新舊皆我臣庶豈有厚薄之分乎滿洲出兵三丁抽一今令爾等亦與滿洲一例三丁抽一為兵爾等以為何如乎且滿洲之偏苦於漢人者不但三丁抽一也如每牛彔下守臺淘鐵及一切工匠牧馬人旗下聽事人役等所出不下三十人當差者凡十有四家又每年耕種以給新附之人每牛彔又出婦人三口又耀州燒鹽獵取禽獸供應朝鮮使臣驛馬修築邊境四城出征行獵後巡視邊墻守貝勒門及派兵防守巨流河在在需人皆惟每牛彔是問又每牛彔設哨馬二匹遇有倒斃則均攤買補遇征瓦爾喀時又各餧馬二三匹從征每牛彔復派䕶軍十名兵丁二三名往來驅使差回又令餧養所乗馬匹遇各國投誠人至撥給滿洲現住房屋令滿洲展界移居又分給糧穀令其舂米釀酒解納每年獵取獸肉分給新附之人又發帑金於朝鮮貿易布疋仍令滿洲負載運送邊城滿洲又有窖氷之役每年迎接新附之虎兒哈於教場看守皮張運送薪水朝鮮䝉古使至駐瀋陽䕶軍甲喇額真各出一人運給水草若夏月至更有採給青草之役又每年採參併負往朝鮮貨賣每旗以一户駐英格地方巡緝踪跡又以一户駐瀋陽渡口看守船隻此皆滿洲偏苦之處若不向爾等詳切言之爾等亦未必深信今滿漢均屬一國人民爾等何竟不知差徭之少倍減於滿洲而滿洲差徭之多實踰爾等三十餘項也諭畢衆官謝罪並釋之臣等謹按開國之初規模宏逺而經制未定徭役之事畧見於此敬録之以備原始之義至於各項差務分派八旗兵丁者不復與民差類載云九月嚴濫役民夫之禁先是天命十一年太宗即位之初嘗諭羣臣云城郭邊墻事闗守禦勞民力役事非得已今修葺已竣嗣後不復興築用䘏民力専勤南畝以重本務至是自郊外還集諸臣於朝諭之曰朕昨出見民間耕種愆期蓋因牛彔章京有事城工欲先時告竣故額外派夫致誤耕作築城固為正務然田地荒蕪民食何賴嗣後有濫役民夫致妨農務者該管牛彔等俱治其罪順治元年置各州縣甲長總甲之役各府州縣衞所屬鄉村十家置一甲長百家置一總甲凡遇盜賊逃人姦宄竊發事件隣佑即報知甲長甲長報知總甲總甲報知府州縣衞核實申解兵部若一家隠匿其隣佑九家甲長總甲不行首告俱治以罪臣等謹按保甲為弭盜安民之良規國家定鼎之初即舉而行之其後屢經申飭為法甚詳且備此蓋其權輿也考十七年令民間設立里社則有里長社長之名惟八旗莊屯以設領催不更設里長南省地方以圖名者有圖長以保名者有保長其甲長又曰牌頭以其為十家牌之首也十牌即為甲頭十甲即為保長又曰保正是皆民之各治其鄉之事而以職役於官沿諸古法變而通之與民宜之各直省名稱不同其役一也又有耆老一項例有頂帶亦預聞鄉里之事考順治三年僉都御史李日芃言耆老不過宣諭王化無地方之責非州縣鄉約比若以連坐之法加之似於情法未協乃定議耆民在九家内者連坐在外者免其株連定取用匠夫之例臣等謹按凡内工取用匠夫行文工部移都察院轉行五城取送如工程𦂳急即行坊官取送至康熙十年定各衙門應用工匠均行都察院轉行五城取用永以為例二年令順天府屬州縣各派匠役一百名赴工應役時以營建太和殿需用工匠行令各州縣派解應役按工給值至十二年工部以匠役缺少工程稽遲復奏令順天等八府派解赴工又令山東山西二省查各匠有願應役者解部供用其後大功告成凡匠役皆酌路塗逺近按日給與飯銀令其回籍又除豁直省匠籍免徵京班匠價前明之例民以籍分故有官籍民籍軍籍醫匠驛竈籍皆世其業以應差役至是除之其後民籍之外惟竈丁為世業匠價詳見十五年三年特命大臣訂正賦役全書因田定賦計丁授役舊有經制明季加派紛繁民生凋瘁世祖章皇帝定鼎後特命大臣察覈欵項盡除濫額擬定賦役全書進呈御覽至十四年告成頒行天下兹後隨時修訂備詳舊制以現行者為定則臣等謹按取民之制有田則有賦有丁則有役而丁役分銀差力差則有受役輸銀之不同其閒分異等則派别名目皆役法也今考全書所載地糧自歸田賦人丁宜屬户口惟是丁徭之征原係版籍供役而凡民役之在官者編徵工食召募應役其數具列於中優免服除亦在焉是故㑹典所載祗舉大綱考丁徭者惟全書可備稽云又定編審人丁征徭科則編審之法核實天下丁口具載版籍年六十以上開除十六以上添註丁增賦亦隨之考直省丁徭有分三等九則者有一條鞭徵者有丁隨地派者有丁隨丁派者其後改隨地派十居其七總計直省徭里銀約三百數十餘萬亦閒徵米徵豆其科則最輕者每丁科一分五釐重者至一兩三四錢不等而山西有至四兩餘者鞏昌有至八九兩者大抵因地制宜如前代差役視民間物力為輕重故各有不同三年或五年一編審凡所以平賦役清隠匿别老幼均差徭律有差遣不平賦役不均隠蔽差役逃避差役之目皆役法之條件也又有屯丁者明代衞所屯軍各給以地入本朝除其軍籍改為屯丁其後惟留駕運漕船之運丁其非運丁者陸續改入民籍現運屯丁則免科閒丁各科銀不等皆免其民丁重派又三等九則之目沿自前明一條鞭征法亦同其法將均徭均費等銀不分銀力二差俱以一條鞭從事凡十甲丁糧總於一里各里丁糧總於一州縣州縣總於府府總於布政司通計一省丁糧均派一省徭役里甲與兩税為一凡一州縣丁銀畢輸於官官為僉募以充一歳之役小民得無擾而事亦易集至康熙五十二年恩詔以現在丁冊定為常額續生人丁永不加賦雍正元年以後各省丁徭皆陸續攤入地畝惟編審人丁以供差役其詳具見於戸口考又定内外各衙門額設吏役凡内外各衙門書吏皆取良民充役定有經制額數不許濫設國初沿前明之例吏典由各處僉撥充役後改為考取或由召募投充凡在内各衙門書役投充必取原籍地方官印結方准著役不許有冒籍冒姓頂替之弊各衙門各派一官専司稽察在外府州縣書役必取隣佑親族甘結地方官印結方准著役其有無弊端責令道員按察司查察之司道闗鹽書役令督撫稽察督撫衙門自行稽察不許有重役濫充之弊役以五年為滿役滿不退者斥革凡在内書役及各館閣供事役滿報部彚至三月於吏部衙門考試封貯試巻以俟在外考試者在外書吏役滿印官保送巡撫每年七月彚集考試并試卷送吏部至年終吏部一併校閲定等第名次奏聞請㫖以雜職等官分别銓用其府州縣額設祗候禁子弓兵於該納税糧三石之下二石之上户内差㸃免其雜泛差役勿得將糧多上戸差占各處衙門又有快手皁𨽻門卒庫子諸役皆按額數召募額外濫充者謂之白役私用白役者有禁白役犯贓與正役同罪通州坐糧㕔所屬八行運役及倉役亦有定額令知州僉選誠實良民應役不許旗人充應不許一人充兩三役兼充者謂之霸役罪至徒初定禄秩之時吏役銀米皆有定額在内各衙門聽事書役及皁役𨽻卒匠夫人等按季給以銀米多寡各殊在外各衙門吏書門子舍人皁𨽻禁卒舖兵倉夫斗級工匠人役亦按季給以工食銀兩其後屢經裁減皆於州縣地畝編征詳載賦役全書臣等謹按吏役之設今古異制而未嘗不同如内外衙門之有書吏猶古之有曹掾古者由於辟召故有秩有職士人為之不以為賤今由召募充役官府故皆名之曰役然必取之鄉户之中擇而使之其受役有期考察有法入仕有階亦與古相似其在鄉里非出於㣲賤者亦可以與士齒凡吏之能其事者可以贊助政理有禆吏治在宋代所云曹司押録諸名目皆其類也其曰快手者以供奔走驅使如宋之承符人力手力之屬又以馬步别為名目其主捕逐盜賊者别名健快亦曰應捕其役如古游徼求盜大率不得與士人齒其諸雜役則又卑矣民壯一項考之前明其初為數不多後州縣官以額設兵丁隨營差操不敷驅遣多取民閒壯丁教以技藝以備守城禦寇已遂泛應雜差用供奔走國初頗裁其冗制為定額凡督税課攝詞訟捕盜賊祗候迎送皆役使之白役非額設之人諸正役私引為助律有明禁然州縣事劇役繁必藉其力勢有不能盡革者惟在得良民充之正役有缺即以代役書吏雖禁額外濫充然因税糧由帖户口冊籍雇募攅造者則勿論或從書吏習業名曰貼寫亦非所禁又各衙門皆有募充書識凡經制之吏有缺即於現充書識内選代惟濫取掛名及監司衙門收受納班錢者有禁自書吏以下諸役既庀官事亦養身家在民每願為承應非如宋時役法之害視為畏途者比也其以鄉人治其鄉之事者鄉約地方等役類由本鄉本里之民保送僉充而地方一役最重凡一州縣分地若干一地方管村莊若干其管内税糧完欠田宅爭辯詞訟曲直盜賊生發命案審理一切皆與有責遇有差役所需器物責令催辦所用人夫責令攝管稍有違誤扑責立加終歳奔走少有暇時鄉約里長甲長保長各省責成輕重不同凡在民之役大畧若此又定賦役不均及脱漏户口隠蔽差役逃避差役之律凡有司雜泛差役皆驗籍内户口田糧為派差之差等若放富差貧那移作弊者罪之如由部中派取物料必酌所屬大小豐歉坐派不均者亦罪之在民户有定籍按籍受役若户不附籍及隠蔽他人在户則差役不平應治其脱漏之罪仍改正當差若民户逃往他處以避差役者罪如之并治里長故縱之罪若丁夫雜匠在役而逃與故縱者皆罪之又禁革主保里長并催頭大户名色天下各府州縣編賦役冊以一百一十户為里推丁多者十人為長餘百户為十甲甲凡十人歳役里長一人管攝一里之事城中曰坊近城曰廂鄉里曰里里長十人輪年應役催辦錢糧勾攝公事凡十年一周先後各以丁數之多寡為次其鰥寡孤獨不任役者帶管於百一十戸之外名曰畸零若有妄稱主保小里長保長此與他處保長不同主首等項名色生事擾民者皆治其罪里中有合設耆老者於本鄉年髙有徳衆所推服人内選充不許罷閑吏卒及有過之人充應凡里甲之民輪充現年止令催納各户錢糧其一應差徭勿使現年受累若有徵收錢糧派人作催頭者或有借稱徵糧令里中僉報大户派納銀米至於破産者皆嚴行禁革其州縣官或於額外私派而上司狥隠者許里長甲長據實控告依律治之又禁止私充牙行埠頭凡城市鄉村通商之處陸有牙行船有埠頭為客商交易貨物並選有抵業人戸充應官給印信文簿附寫客商船戸住貫姓名路引字號物貨數目每月赴官查照不許私充雍正二年有言各省牙帖之弊者畧為州縣正税之外又有雜税户部額徵為數無幾將所收田宅印契典舖行帖等銀已綽然解部有餘至小民趁集交易乃數百文數十文之事為利甚㣲藉以營生餬口而地方光棍自呼為經紀百十成羣逐日往州縣中領牙帖數十紙每紙給銀二三錢不等持帖至集任意勒索不論貨物大小精粗皆視賣之盈縮為抽分之多寡名曰牙帖税少與齟齬即行驅逐不容陳設於街道此積弊也於是令各省藩司查明禁止至十一年奉諭㫖各省商牙雜税額設牙帖俱由藩司衙門頒發不許州縣濫給所以防增添之弊不使貽累於商民也近聞各省牙帖歳有增添即如各集場中有雜貨小販向來無籍牙行者今概行給帖而市井奸牙遂恃此把持抽分利息是集場多一牙戸商民即多一苦累甚非平價通商之本意著直省督撫飭令各該藩司因地制宜著為定額報部存案不許有司任意增添嗣後止將額内退帖頂補之處查明換給再有新開集場應設牙行者酌定名數給發亦報部存案庶貿易小民可永除牙行苛索之弊矣互見市糴考又禁有司官私役部民凡有司官私役部民出百里之外及久占在家使喚者有禁仍追雇直若有吉凶及在家借使雜役不得過五十名役其人不得過三日違者以私役論又定州縣舖司舖兵及弓兵之制禁止私役直省各州縣公文來往役民遞送名曰舖兵每十五里置急遞舖一所設舖兵四名舖司一名於附近有丁力糧近一石之上二石之下者㸃充須要少壯正身與免雜泛差役凡公文一到即刻遞送晝夜須行三百里稽留者分别時刻治罪若公文有損壊沈匿拆動原封者亦分别治罪舖司為舖兵之長専一於該管舖分往來巡視其提調官吏每月親臨稽查若有無藉之徒不容正身應當用强包攬多取工錢以致公文有誤者重治其罪其各衙門一應公差人員不許差使舖兵挑送官物各私齎行李若舖舍不修什物不備舖兵數少及老弱當役則罪其舖長巡檢司所屬弓兵専司巡緝地方亦不許包攬應當並禁止私役違者如私役舖兵之罪四年設直𨽻沿河堤夫御史佟鳳彩言近畿沿河州縣屢年衝決禾稼被淹有虧正賦宜令各州縣額設堤夫量其河之淺深口之寛狹修築堅固庶河水不致汎漲而秋成可望下部議允之臣等謹案瀕河之地例有夫役守䕶黄運兩河皆然此所請設乃舊制未備者餘并詳後又設立臨河州縣墩堡舖夫快壯從總河楊方興請以䕶漕運也九年令直省州縣置社學社師每鄉置社學一區擇其文義通曉行誼謹厚者補充社師免其差徭量給廪餼令提學考核之雍正元年復申明其制十一年定流民附籍當差之例明季民多流移所居之地不附冊籍至是部臣議奏凡外省新舊流民俱編入冊籍與土著一體當差新來者五年當差從之十二年增給河夫工食時遣大臣視河言額設河夫工食不敷請酌為增給下部議行仍令河臣嚴察河工官吏扣折夫食臣等謹案民間夫役河工為大用民之例有二一為僉派一為召募皆屬民間力役前代沿河州縣有歳修民夫頗為苦累國初改設河夫額給工食編入賦役全書十六年河臣朱之錫條奏河政議增河南夫役均派淮工夫役撥補河夫工食皆下所司議行考順治九年河決封邱起大名東昌兖州及河南丁夫數萬塞之此僉派舊例也額設之夫則召募新例也間遇大役召募不足即用僉派仍給工食詳見於後又考河工夫役其名不一黄河兩岸皆有堡夫二里置堡設夫二名住宿堡内常川巡守每日責令擔積土牛以資修補堤工之用後令改築子堰運河所設亦同山東有黄運河徭夫分汛供役遇有險要調集搶䕶又有淺溜橋牐壩渡等夫各以其事供役又於有泉之十七州縣額設泉夫歳以春夏秋三季在本境浚泉栽栁冬季調赴運河均令濬淺河南有浚船栁船長夫埽工長夫樁埽夫直𨽻河淀有􅙳夫淺夫漳河有防夫其或裁或設事例不一皆於沿河州縣召募應役山東運河大濬額募夫六千有餘小濬用夫千二百有餘日給工銀外仍給以器具銀江南浙江海塘例設堡夫塘長湖廣江防有隄長圩長圩甲圩役其沿江隄岸例用民間夫役按糧均派至康熙五十五年聖祖仁皇帝賞銀六萬兩以助民工至雍正六年世祖憲皇帝亦賞銀六萬兩以助民工四川亦有堰工按照田畝均攤夫價解官募夫冬月修築考各直省所用夫役皆始由僉派繼歸召募盖役民給直較古役法為最善矣十五年令直省匠價仍照經制徵解工部等衙門奏言按經制所載遇有大工直𨽻各省徵諸匠役解赴京師每年春秋更換後匠役屢解屢逃因而折工價解部於順治二年奉㫖除免匠價今臣部工程尚繁需用不貲應將匠價仍照經制徵解從之至康熙三十六年以後陸續併歸田畝各省賦役全書分析項數名目具存十六年令直省舉行鄉約之法宣講上諭臣等謹按先是順治九年頒行六諭卧碑文曰孝順父母恭敬長上和睦鄉里教訓子孫各安生理無作非為至是令五城設立公所講解開諭以廣教化直省府州縣亦皆舉行鄉約各地方官責成鄉約人等每月朔望聚集公所宣講至康熙九年頒上諭十六條一敦孝弟以重人倫一篤宗族以昭雍睦一和鄉黨以息爭訟一重農桑以足衣食一尚節儉以惜財用一隆學校以端士習一黜異端以崇正學一講法律以儆愚頑一明禮讓以厚風俗一務本業以定民志一訓子弟以禁非為一息誣告以全善良一誡窩逃以免株連一完錢糧以省催科一聨保甲以弭盜賊一解讐忿以重身命令府州縣鄉村人等切實遵行十八年浙江撫臣衍輯直解奏進名曰鄉約全書刋刻分發至雍正二年御製聖諭廣訓萬言頒發直省通行講讀於是人敦孝弟俗化敦龎蒙樂利之澤於無疆矣十七年禁有司私派里甲之弊凡有司各官私派里甲承奉上司一切如日用薪米修造衙署供應家具禮物及募夫馬民壯每年婪飽之弊通飭撫按俱行嚴禁康熙八年科道官言各處土産有文武官員行票差役令州縣買送州縣按里派取等弊請行嚴禁部臣又言州縣加派里民近經禁革乃以日用供應取辦牙行舖家並强索賤市應勒石永禁皆從之至三十九年復申陋規雜派之禁如遇大差大役有因公濟私以一派十者又有每年每節派送大小禮儀者郡守之交際又有派之各屬者有府州縣衞所官出門派中火路費以及跟役之食用者有上司差使往來派送規例下程者起運餉銀派解費者嗣後革除陋習不得仍蹈前轍又部議湖廣等處徵收錢糧有公然科派如闔邑通里共攤同出者名曰軟臺如各里各甲輪流獨當者名曰硬駝豪劣奸棍包攬分肥應勒石永禁從之皇朝文獻通考巻二十一
