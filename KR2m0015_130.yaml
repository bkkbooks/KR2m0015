body:
  text: 欽定四庫全書皇朝文獻通考卷一百三十王禮考六登極臣等謹按馬端臨王禮考不載登極之儀王者踐阼而治萬國應期啟聖握紀御符典禮詎宜従畧元史禮樂志載即位受朝儀明史禮志亦首載登極儀於例為協洪惟我太祖肇興王業建元受朝式創受命之規太宗拓土啟疆諸部咸附建國號曰大清築壇告天宣表稱賀益宏開國之模世祖定鼎燕京柴燎告天行即位禮遂成萬年一統中外之業至於列聖繼體守文正位凝命告於几筵臨莅萬國所定儀注斟酌古今之宜至孝至仁超軼千古我皇上嗣皇帝位悉遵前典敬迓天庥兹按五朝實録起居注及大清㑹典敬謹編載以垂示無極天命元年正月壬申朔諸王百官恭上太祖髙皇帝尊號曰覆育列國英明皇帝建元天命御殿受朝賀是日内外貝勒大臣率羣臣集殿前分八旗序立上御殿陞座衆貝勒大臣率羣臣跪八大臣出班跪進表章近侍侍衛阿敦巴克什額爾徳尼接表額爾徳尼在御前宣表訖上乃降御座焚香告天率貝勒諸臣行三跪九叩禮畢復陞座衆貝勒大臣各率本旗人員行慶賀禮十一年九月庚午太宗文皇帝嗣皇帝位御殿受羣臣朝頒詔大赦是日三大貝勒諸貝勒大臣及文武各官聚於朝具法駕設鹵簿上率貝勒羣臣焚香告天行三跪九叩禮畢上陞座諸貝勒大臣文武官員行三跪九叩禮畢頒詔大赦以明年為天聰元年崇徳元年四月乙酉内外貝勒以下文武百官上尊號曰寛温仁聖皇帝改元崇徳建國號曰大清前期築壇於天壇之東屆期上率内外貝勒以下文武百官出徳盛門詣壇告祭天地禮成文武各官先至壇東所築壇下奉玉璽四金椅陳設壇上大駕鹵簿陳設壇前畢𨗳引官二人在前恭導駕由中堦登壇升座諸貝勒大臣左右序列樂作鳴贊官贊跪叩衆行三跪九叩禮興贊跪衆皆跪和碩貝勒等捧寶跪獻上受寶授内院官置寶盝内諸貝勒等復位鳴贊官贊叩興衆行三跪九叩禮興贊跪衆皆跪宣讀官捧滿洲䝉古漢字三體表文立於壇東以次宣讀畢贊叩興衆行三跪九叩禮興贊退諸貝勒羣臣俱退陳儀仗奏樂駕還宫越二日丁亥諸貝勒大臣率文武各官上表慶賀齊集殿前分翼排立上御殿陞座樂作鳴贊官贊排班贊進贊跪叩興貝勒大臣率滿洲各官行三跪九叩禮興贊跪貝勒大臣率滿洲各官俱跪捧表跪進侍臣接至御前跪讀畢贊叩俱行三跪九叩禮興贊退各復原位立次外藩貝勒大臣進表行禮次漢官進表行禮俱如前儀御前官傳㫖曰寛温仁聖皇帝有制諭諸貝勒大臣進前贊禮官贊班齊衆皆序立贊禮官贊跪衆皆跪滿洲文臣捧上諭至諸貝勒大臣前西向立宣讀曰寛温仁聖皇帝勅諭朕以涼徳祗承丕緒加以尊號懼無以慰衆望爾等勸進再三屢辭勿獲今敬告天地允受尊號爾諸貝勒大臣當同心輔政恪共厥職以匡朕之不逮正已率屬各殫忠誠立綱陳紀毋圖小利倘能建立功名朕當隆以爵賞尤須撫衆恤民君臣一徳庶㡬上合天心下遂民志如此則明良喜起政治咸熙萬民樂利天益佑助之矣布告天下咸使聞知宣畢諸臣奏曰聖諭及此國家之福也於是贊禮官贊跪贊叩諸貝勒大臣行三跪九叩禮贊禮官贊復位諸貝勒大臣俱復位次執事文官都察院贊禮官各行三跪九叩禮畢賜諸貝勒大臣文武各官坐衆各一跪一叩坐賜宴畢駕還宫衆皆退是日頒詔大赦八年八月丁亥世祖章皇帝嗣皇帝位御殿受羣臣朝頒詔中外前期告祭郊壇宗廟是日内外諸王貝勒率文武羣臣具朝服齊集篤恭殿前兩翼按旗序立内院官奏請陞殿上出宫時寒甚侍臣進貂裘上却視裘弗御時上甫六齡將升輦乳媪欲同坐上曰此非汝所宜乘不許遂升輦由東掖門出諸王羣臣跪迎御殿陞座和碩鄭親王濟爾哈朗和碩睿親王多爾衮率諸王貝勒貝子公文武羣臣前進鳴贊官贊跪叩興衆行三跪九叩禮興贊退俱復原位立次外藩王以下各官前進鳴贊官贊跪叩興衆行三跪九叩禮興贊退俱復原位立贊排班贊進贊跪衆俱跪贊頒恩詔大學士自黄案上捧詔書至丹陛上立宣詔曰我太祖武皇帝受天明命肇造丕基懋建鴻功貽厥孫子皇考大行皇帝嗣登大寶盛徳深仁宏謨逺畧克協天心不服者武功以戡定已歸者文徳以懐柔拓土興基國以滋大在位十有七年於崇徳八年八月初九日上賔諸伯叔兄及文武羣臣咸以國家不可無主神器不可乆虚謂朕為皇考之子應繼大統乃於八月二十六日即皇帝位以明年為順治元年朕年幼冲尚賴諸伯叔兄大臣共襄治理所有應行赦𣢾開列于後布告中外咸使聞知宣詔畢贊叩興衆行三跪九叩禮興贊退俱復原位立贊禮畢上陞輿還宫顧謂侍臣曰適所進裘若黄裏朕自衣之以紅裏故不服耳諸王以下文武各官跪送各退是日不陳鹵簿不作樂不設筵宴順治元年十月乙邜朔以定鼎燕京告天行即位禮御殿受朝賀頒詔天下前期太常寺官掃除壇壝司設監設金椅於郊壇之東南向設寶案于金椅前是日遣官告於太廟社稷鹵簿全設駕由大清門出作樂前導上躬詣南郊告祭天地畢内院大學士率文武各官跪奏告祭禮成贊禮官恭𨗳進詣壇東幄次更衣陞座諸王以下文武各官侍立鳴贊官贊排班贊進賛跪衆俱跪大學士剛林由東班陞階正中跪學士詹霸自案上捧寶授大學士剛林大學士剛林奉寶奏云皇帝君臨萬國諸王文武羣臣不勝懽忭奏畢以寶仍授學士詹霸置於案上皆退立原班鳴贊官贊跪叩興衆俱行三跪九叩禮興贊退俱復原位立候駕還宫鹵簿前導作樂進大清門衆俱退是日鴻臚寺設御座子皇極門正中今名太和門設表案於門檐之東王等齊集於金水橋之北文武各官齊集於金水橋之南東西相向序立祇竢樂作上陞座樂止鑾儀衛官贊鳴鞭階下三鳴鞭内大臣侍衛内院禮部都察院及鴻臚寺執事各官先於階上行三跪九叩禮畢各司其事鳴贊官贊排班贊進贊跪諸王率文武各官俱跪贊進表内院大學士捧諸王等所進三體表文跪置案上興鳴贊官賛宣表内院大學士詣案前取表以次跪宣畢興捧表仍跪置案上行三叩禮興退立原位鳴贊官贊跪叩興諸王以下文武各官行三跪九叩禮興贊退衆俱復原位立鑾儀衛官贊鳴鞭階下三鳴鞭上還宫各退越九日甲子御皇極門頒詔天下大宴諸王文武羣臣詔曰我國家受天眷佑肇造東土列祖創興鴻業皇考式廓前猷遂舉舊邦誕膺新命迨朕嗣服雖在冲齡締念紹庭永綏厥位頃縁賊氛洊熾極禍中原是用倚任親賢救民塗炭方馳金鼓旋奏澄清既解倒懸非富天下而王公列辟文武羣臣暨軍民耆老合詞勸進懇切再三乃於今年十月初一日祗告天地宗廟社稷即皇帝位仍建有天下之號曰大清定鼎燕京紀元順治緬維峻命不易創業尤艱况當改革之初更屬變通之㑹是用準今酌古揆天時人事之宜庶㡬吏習民安彰祖功宗徳之大於戲天作君師惟鑒臨于有徳民歌父母斯恱豫於無疆既已俞㫖布恩宏敷大賚將使投誠歸命無阻幽深惟爾萬方與朕一徳布告遐邇咸使聞知十八年正月己未聖祖仁皇帝嗣皇帝位御殿受羣臣朝頒詔天下前期司設監設御座於太和殿宣徽院設寶案於御座之南鴻臚寺設表案于簷下之東設詔案於檻内之東是日遣官各一人祭告天地太廟社稷陳鹵簿儀仗於太和殿前陳輦輅於午門陳黄葢雲盤於丹墀内陳龍亭香亭於午門外教坊司陳中和韶樂於丹陛上之東西陳丹陛樂於太和門之東西俱設而不作内閣官捧詔置於太和殿内之東案上尚寶司捧寶置於御座之南案上上縞素服詣世祖章皇帝几筵前行三跪九叩禮祗告受命禮畢具禮服詣聖祖母太皇太后前行三跪九叩禮次詣兩宫皇太后前行三跪九叩禮畢禮部堂官奏請御中和殿升座鴻臚寺官引内大臣侍衛内院禮部都察院執事各官行三跪九叩禮畢不贊禮部堂官奏請御太和殿陞座鳴鐘鼔不作樂王以下公以上齊集丹陛上文武百官齊集丹墀内俱朝服序立鑾儀衛官贊鳴鞭鳴贊官贊排班贊進贊跪諸王以下各官俱跪贊上表稱賀有㫖免宣鳴贊官贊跪叩興諸王以下各官行三跪九叩禮興贊退俱復原位立内閣官捧詔至寶案前用寶訖大學士捧出太和殿授禮部堂官禮部堂官跪受由中階降安設雲盤内張黄葢由中道出行禮開讀王以下公以上進殿内一跪一叩坐賜茶畢鳴鞭駕還宫易服是日頒詔天下詔曰惟我國家受天眷命祖功宗徳肇造丕基我皇考大行皇帝盛徳至仁英資大度纘承厯數統一寰區恩波洽于多方政敎臻于上理方期邦國永底雍熙不幸奄棄臣民遽升龍馭顧以大寶屬於眇躬朕㷀㷀在疚本不忍聞而諸王貝勒大臣文武官員人等僉謂神器既已攸歸天位不宜乆曠堅請再三朕是以俯徇輿志勉抑哀衷於是月初九日祇告天地宗廟社稷即皇帝位仰惟上天眷佑之篤祖宗付託之隆涼徳冲齡膺兹重寄敬圖覲光揚烈用紹無疆之休其以明年為康熙元年與天下更始式衍舊恩聿𢎞新化於戲孝思惟則永深繼述之懐忠悃載攄實賴劻勷之佐凡爾親賢文武其尚輔翼菲躬共矢嘉謨以成至治布告天下咸使聞知康熙六十一年十一月辛丑世宗憲皇帝嗣皇帝位御殿受羣臣朝頒詔天下前期遣官各一人告祭天地太廟社稷禮部設寶案於太和殿御座之南鴻臚寺設表案於檐下之東設詔案於檻内之東是日鑾儀衛陳鹵簿儀仗於太和殿前陳輦輅於午門外陳黄葢雲盤龍亭香亭於丹墀内敎坊司陳導迎樂於午門外陳中和韶樂於簷之東西陳丹陛樂於太和門之東西設而不作内閣大學士捧詔置于太和殿之東案内閣學士捧寶大學士隨後由乾清門至太和殿置於御座之南案上上縞素服詣聖祖仁皇帝梓宫前行三跪九叩禮祗告受命出更禮服詣聖母皇太后宫行三跪九叩禮出至乾清門外陞輿先是總管太監下清乾清宫中間簾内鑾儀衛在乾宫丹陛中預偹出奉金輿奏請清宫雖陞輿由何乾清門中門㫖乾垂簾朕忍在皇父前即坐輿出中門朕従東旁門出再坐輿心始安禮部堂官恭𨗳至保和殿後降輿奏請御中和殿陞座鴻臚寺引内大臣侍衛内閣翰林院詹事府禮部都察院執事各官行三跪九叩禮畢不贊禮部堂官奏請御太和殿陞座鳴鐘鼓不作樂王以下公以上齊集丹陛上文武百官齊集丹墀内俱朝服排班序立鑾儀衛官贊鳴鞭鳴贊官贊排班贊進賛跪諸王以下各官俱跪贊上表奉諭免宣鳴贊官贊跪叩興王以下各官行三跪九叩禮興贊退俱復原位立大學士捧詔至寶案前用寶訖捧出太和殿授禮部堂官禮部堂官跪受由中階降安設雲盤内由中道出行禮開讀文武各官由昭徳門貞度門出王以下公以上進殿一跪一叩坐鳴鞭王以下各官興駕還宫易服内閣學士捧寶大學士隨後送至乾清門乃退是日頒詔天下詔曰我國家受天綏佑太祖太宗肇造區夏世祖章皇帝統一疆隅我皇考大行皇帝臨御六十一年徳茂功髙文經武緯海宇寧謐厯數悠長不謂謝棄臣民遽升龍馭親授神器屬於藐躬朕皇考大行皇帝徳妃之子昔皇二子弱齡建立深為聖慈鍾愛寢處時依恩勤倍篤不幸中年神志昏憒病類風狂皇考念宗社重任付託為艱不得已再行廢斥待至十有餘年沉疾如故痊可無期是以皇考升遐之日詔朕纘承大統朕之昆弟子姪甚多惟思一體相闗敦睦㒺替共享昇平之福永圗磐石之安孔子曰三年無改於父之道我皇考臨御以來良法美政萬世昭垂朕當永遵成憲不敢少有更張何止三年無改至於皇考知人善任至明至當内外諸大臣朕方亟資翊贊以期始終保全務宜竭盡公忠恪守亷節俾朕得以加恩故舊克成孝思倘或不守官箴自干國紀既負皇考簡㧞委用之恩又負朕篤愛大臣之誼部院屬吏直省有司亦宜實心任事潔己奉公不得推諉上官自曠厥職天下百姓受皇考恩澤日乆蠲賑頻施勸懲備至間有愚氓甘犯律令皇考毎遇讞決必加詳審爰書累牘披閱靡遺少有可生之路立施法外之仁凡我百姓各宜孝親敬長畏罪懐刑以副朕仰法皇考如天好生之意兹因諸王貝勒大臣文武官員人等僉謂天位不可乆虚宗社允宜蚤主再三陳請朕勉徇輿情暫抑悲痛於是月二十日祗告天地宗廟社稷即皇帝位以明年為雍正元年仰惟先志之宜承深望皇圗之永固遹昭新化期衍舊恩於戲追慕前徽繼述無忘於夙夜廣推聖澤恩膏願被於寰區凡爾親賢文武其共矢藎誠各輸心膂用紹無疆之業永垂有道之庥布告天下咸使聞知雍正十三年九月己亥皇上嗣皇帝位御殿受羣臣朝頒詔天下前期遣官各一人告祭天地太廟社稷至日五鼔各執事官入太和殿設寶案於御座前正中設詔案筆硯案表案陳鹵簿樂懸均如儀内閣學士一人奉詔書禮部儀制司官奉表内閣中書奉筆硯均陳於案大學士一人率學士詣乾清門請皇帝之寶陳于殿上寶案正中質明上縞素服詣世宗憲皇帝几筵前行禮祇告受命出更禮服詣皇太后宫行禮畢禮部堂官奏請御殿上自乾清門左旁門出陞輿先是禮部奏此奏登極儀注得㫖内稱安轎于乾清門正中今門正中皇考梓宫安奉乾清宫朕不敢於乾清乘輿著安于稍左導引扈衛如儀御中和殿内大臣侍衛内閣翰林院禮部都察院執事各官行禮畢禮部堂官奏請御太和殿陞座鳴鞭王公百官行三跪九叩禮畢復位大學士奉詔詣寶案學士北面用寶訖乃頒詔布告天下禮成鳴鞭上還宫易服是日宫懸大樂設而不作不宣表不賜茶詔曰惟我國家受天眷命太祖太宗創垂基緒世祖統一萬邦皇祖聖祖仁皇帝享祚乆長重熙累洽我皇考大行皇帝纘承大統御宇十有三年夙夜憂勞勤求至治用康乂我億兆臣民盛徳豐功炳耀寰宇恩膏洋溢漸被八紘薄海時雍中外蒙福方期永綏隆祚仰荷鴻禧何意奄棄臣黎遽升龍馭以宗廟社稷之重屬於藐躬朕自冲齡即䝉皇祖撫育宫中深恩鍾愛睠睞逾常皇考顧復恩勤聖慈篤摯瞻依朝夕祗受誨言牖迪有加宸衷黙眷朕自惟凉徳懼弗克勝顧念神器不可乆虛勉抑哀衷欽遵成命於九月初三日祭告天地宗廟社稷即皇帝位以明年為乾隆元年仰惟上天篤祜之隆皇考詒謀之重撫躬乾惕祗紹前徽丕布新恩聿昭錫類於戲覲光揚烈深思負荷之維艱建極綏猷時勵精勤於㒺懈諸王文武大小臣工其共殫公忠協心襄贊懋圖上理祗迓洪休以光大我國家無疆之祚布告天下咸使聞知登極儀凡登極之禮既􅓪吉諸司下所屬供備王公大學士文武百官前期進表内閣先一日遣官祗告天地太廟社稷各一人朝服將事如常儀禮畢出易服退右祗告是日五鼓步軍統領勒所部屯禁城諸門所司入太和殿鋪陳御座南正中設一案南向前楹之東設二案皆西向西設一案東向又中設一案於丹陛上設黄繖雲盤于丹墀鑾儀衛率官校入備鑾輿陳法駕鹵簿樂部率和聲署入展樂如儀夜漏未盡禮部尚書奉表入陳東楹南案内閣中書奉筆硯入陳西案内閣學士一人奉詔書入陳東楹北案大學士一人率學士詣乾清門請皇帝之寶學士恭奉大學士従入殿内恭設於中案退記注侍班執事各官王公百官班位如常儀詳見三大節右陳設序位質明王公文武百官畢會午門闕下朝服序入均如常儀皇帝詣几筵前行祗告受命禮禮成出更禮服詣皇太后宫皇太后禮服陞座皇帝行三跪九拜禮畢禮部尚書侍郎二人率欽天監候時官奏時午門鳴鐘鼔皇帝由乾清門左門出乘輿禮部尚書侍郎恭𨗳内大臣十人前引二人後扈豹尾班執鎗侍衛十人佩刀侍衛十人翊衛隨行由保和殿御中和殿陞座鴻臚寺官引侍班導従各官按班行禮畢侍班官先趨出外朝就位禮部尚書一人進至檐前奏請即皇帝位駕興導引翊衛如初御太和殿陞寶座南面即皇帝位鑾儀衛官三傳鳴鞭丹墀内三鳴鞭鴻臚寺卿引王公於丹陛上鳴贊引文武百官於丹墀内北面立贊進皆進贊跪皆跪贊叩興王以下文武百官行三跪九叩禮興鴻臚寺官引退復位立大學士進殿左門就東案奉詔陳於中案上少退西面立内閣學士進就中案北面用寶訖退禮部尚書進至檐下大學士奉詔由闑東出殿中門授禮部尚書禮部尚書跪受興奉至丹陛案前北面恭設于案行一跪三叩禮興復奉降中階至丹墀陳於雲盤禮部儀制司官一人跪受興十人前導由中道出頒詔天下皇帝降座至殿後階乗輿入後左門至乾清門左門外降輿入還側殿易服大學士率學士奉皇帝之寶送乾清門各退是日陳表而不宣宫懸大樂皆設而不作餘儀與三大節同右百官朝見皇朝文獻通考卷一百三十
