body:
  text: 欽定四庫全書皇朝文獻通考卷二百三十九帝系考一臣等謹按周官小史奠繫世辨昭穆帝系所由昉也司馬遷史記立世表自黃帝以下譜之自時厥後史表或立或缺不一要夫紹統歷年以及宫中之位號傳世之本支按表而稽斯可指數馬端臨師其意倣王溥唐及五代會要之體首敘帝王之姓氏出處及其享國之期改元之數以及各代之始終次及后妃皇子公主皇族其可考者悉著於篇前此續編通考自宋迄明並循斯例欽惟國朝肇基東土奄有方夏聖神纘承流長源逺加以宫庭翊贊德懋祉綏丕集純釐益昌景運臣等奉命恭閲宗人府尊藏帝系玉牒國史館列祖實録本紀暨我皇上記注諭旨敬謹編纂依馬端臨通考五朝續通考分類名目釐為七卷式彰洪庥傳於奕世焉帝號歷年臣等謹按我朝誕膺天眷肇啓皇圖自先世發祥長白山之陽靈符神貺丕著休徵洎乎聖聖相承宏闢疆宇寖熾寖昌垂裕大統恢億萬年無疆之祚猗歟盛哉亘千古而配兩儀矣臣等恭遵宗人府帝系敬謹編纂用昭列聖億萬斯年垂裕盛軌云皇始祖肇祖原皇帝姓愛新覺羅氏崇德元年四月丙戌追尊曰澤王順治五年十一月戊辰恭上尊號尊諡興祖直皇帝肇祖原皇帝曾孫崇德元年四月丙戌追尊曰慶王順治五年十一月戊辰恭上尊號尊諡景祖翼皇帝興祖直皇帝第四子稱寧古塔貝勒崇德元年四月丙戌追尊曰昌王順治五年十一月戊辰恭上尊號尊諡顯祖宣皇帝景祖翼皇帝第四子崇德元年四月丙戌追尊曰福王順治五年十一月戊辰恭上尊號尊諡太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業高皇帝顯祖宣皇帝長子聖母宣皇后誕生稱聰睿貝勒癸未高皇帝起兵削平諸國丙午蒙古五部落來朝尊高皇帝曰神武皇帝鴻勳克集帝業已成貝勒大臣勸進丙辰正月壬申朔恭上尊號曰覆育列國英明皇帝建元天命十一年八月庚戌上賓聖壽六十有八在位十有一年崇德元年四月丙戌恭上尊諡曰承天廣運聖德神功肇紀立極仁孝武皇帝廟號太祖康熙元年四月丙辰加上尊諡曰承天廣運聖德神功肇紀立極仁孝睿武𢎞文定業高皇帝雍正元年八月己酉加上尊諡曰承天廣運聖德神功肇紀立極仁孝睿武端毅𢎞文定業高皇帝乾隆元年三月乙巳加上尊諡曰承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業高皇帝恭加上太祖承天廣運聖德神功肇紀立極仁孝睿武端毅𢎞文定業高皇帝尊諡册文曰聖德誕敷肇啓萬年之統緒神功丕煥𢎞開百世之升平垂大業於無窮奉鴻名於有永欽惟太祖承天廣運聖德神功肇紀立極仁孝睿武𢎞文定業高皇帝智勇性成聰明天縱體元立極建經天緯地之功應運綏猷擴物與民胞之量聲教訖於九有文德遐宣威靈懾乎萬方武功逺震決機制勝成算如神置腹推心求賢若渴啓疆宇而立宗廟制度恢𢎞相原隰而定邦都規模久逺文同倉史爰造國書義取卦圖聿修軍制致人心之徯應承天命之維新緬惟垂統訏謨發祥澤逺上溯開基厚德昌後功宏兹當纘緒之初宜重追崇之典謹奉册寶增上尊諡曰太祖承天廣運聖德神功肇紀立極仁孝睿武端毅𢎞文定業高皇帝伏冀聖鑒長昭𢎞庥永被貽博大昌明之運集山陵岡阜之祥恭加上太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業高皇帝尊諡册文曰天開泰運升日馭於東維帝握乾符建斗樞於北極定萬年之統緒啓百世之升平盛業常昭鴻名彌耀欽惟太祖承天廣運聖德神功肇紀立極仁孝睿武端毅𢎞文定業高皇帝聰明天亶智勇性成大德體元參三才而正位至誠立極用庶務以成能緯地經天卜世之功日永民胞物與肇基之迹方新聲教訖於四方仰同光被神武昭於九有望切來蘇合謳頌以歸心集賢才而佐治國書初設製字母以諧音軍制新頒按卦圖而取義際天與人歸之會肇建邦啓土之勳造草昧而大經綸發祥自逺首庶物而膺圖籙裕後方長緬維垂統之隆宜極尊崇之禮祗承丕緒敬考彝章謹奉册寶增上尊諡曰太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業高皇帝伏冀聖鑒長昭皇圖永固益啓綿長之澤彌臻熙皥之風建元一天命十一年太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝太祖高皇帝第八子聖母孝慈高皇后誕生稱貝勒天命十一年九月庚午朔嗣登大位改元天聰以明年為元年十年四月乙酉羣臣表上尊號曰寬溫仁聖皇帝建國號大清改元崇德八年八月庚午上賓聖壽五十有二在位十有七年是年十月丁卯恭上尊諡曰應天興國𢎞德彰武寬溫仁聖睿孝文皇帝廟號太宗康熙元年四月丙辰加上尊諡曰應天興國𢎞德彰武寬溫仁聖睿孝隆道顯功文皇帝雍正元年八月己酉加上尊諡曰應天興國𢎞德彰武寬溫仁聖睿孝敬敏隆道顯功文皇帝乾隆元年三月乙巳加上尊諡曰應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝恭加上太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏隆道顯功文皇帝尊諡册文曰聖人有作贊化育於兩間至德難名耀聲華於萬世道光簡册頌溢寰區欽惟太宗應天興國𢎞德彰武寬溫仁聖睿孝隆道顯功文皇帝覆載同規中和建極照臨六合亶成性之聰明表正萬邦錫自天之勇智布公誠以待下英俊歸心施慈惠以寧人蒼黎向化武功耆定雷霆驅精鋭之鋒文教𢎞敷日月炳光華之象修明禮制同倫軌於方輿綏輯要荒萃共球於屬國贊肇基之迹式廓帝圖恢受命之符彌膺天眷耿光大烈已開一統宏模厚澤深仁遂裕億年景祚欽承丕構緬懷締造之猷思闡鴻稱莫罄顯揚之願式稽古典爰合僉謀謹奉册寶增上尊諡曰太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏隆道顯功文皇帝伏冀神靈陟降緒業昭融恭承烈祖之庥永篤曾孫之慶恭加上太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝尊諡册文曰神謨丕顯瞻陟降於在天帝德誕敷仰光華於復旦長垂啓佑逺樹儀型欽惟太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏隆道顯功文皇帝乾健偕行離明普照道兼作述繼鴻業以開太平化洽寬仁慰羣黎而均覆幬任英賢而圖治一德一心定法制以宜民同倫同軌文思廣被耀海隅出日之鄉聖武布昭震漠外無雷之域決策而平遼右龍起雲從移師以討朝鮮風行草偃三十五部咸抒貢琛獻賮之誠億萬斯年永承受籙膺圖之緒大勳丕集皇哉迹廓肇基景命維新赫矣功先定鼎鴻猷緯績崇太室於不祧厚澤深仁覺徽稱之莫罄式遵彝典爰合僉謀謹奉册寶增上尊諡曰太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝伏冀耿光俯燭繁祉鴻綏鑒繩武之微忱介錫齡之遐福改元二天聰十年崇德八年天聰十年即崇德元年世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝太宗文皇帝第九子聖母孝莊文皇后誕生正月十三日萬壽聖節崇德八年八月丁亥嗣登大位改元順治以明年為元年時流寇肆逆明祚已終入關靖寇建都燕京天下傳檄底定六齡踐阼八年親政十八年正月丁巳上賓聖壽二十有四在位十八年是年三月癸酉恭上尊諡曰體天隆運英睿欽文大德𢎞功至仁純孝章皇帝廟號世祖雍正元年八月己酉加上尊諡曰體天隆運定統建極英睿欽文大德𢎞功至仁純孝章皇帝乾隆元年三月乙巳加上尊諡曰體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝恭加上世祖體天隆運定統建極英睿欽文大德𢎞功至仁純孝章皇帝尊諡册文曰聖德光昭長衍萬年之景運神功奠定宜崇百世之鴻稱大一統以貽庥式九圍而立極功𢎞啓佑禮重顯揚欽惟世祖體天隆運英睿欽文大德𢎞功至仁純孝章皇帝表正萬邦首出庶物精明果毅智勇本於性成中正齊莊神靈由於天授擴祖宗之𢎞業同軌同倫統華夏以歸心來王來享明禋昭事精誠允格乎蒼穹駿烈纘承孝享實孚於清廟隆慈闈之尊養視膳問安普宗族之恩施明倫敦本時頒解澤大地回春屢諭祥刑普天向化登兆人於袵席躋寰宇於雍熙積十八載之惕厲憂勤開億萬年之豐亨豫大緬懷盛德繩祖武於方新祗述鴻規詒孫謀於盡善謹奉册寶增上尊諡曰世祖體天隆運定統建極英睿欽文大德𢎞功至仁純孝章皇帝伏冀鑒觀有赫默佑無窮永貽昌大之祥益啓升平之祚恭加上世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝尊諡册文曰聖人首出開景運於萬年至德光昭享鴻稱於百世式九圍而立極大一統以垂庥禮重顯揚業崇簡册欽惟世祖體天隆運定統建極英睿欽文大德𢎞功至仁純孝章皇帝道貫百王功垂萬世照臨六合亶成性之聰明表正萬邦錫自天之勇智敷同軌同倫之治肇造鴻基萃來王來享之忱長貽燕翼敬天而虔昭事允秉精誠法祖而篤顯承聿彰仁孝奉慈闈而侍養備極隆儀恤宗族以敦倫頻施曠典深仁厚澤率土均霑善俗宜民敷天共戴擴祖宗之宏業統華夏以歸心受命則惕厲憂勤圖治於十有八載啓後則親賢樂利衍慶於億萬斯年緬懷締造之謨欽承丕構莫罄頌揚之願敬薦徽稱謹奉册寶增上尊諡曰世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝伏冀鑒觀有赫默佑無窮恭承列祖之庥永篤曽孫之慶改元一順治十八年聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝世祖章皇帝第三子聖母孝康章皇后誕生三月十八日萬壽聖節順治十八年正月己未嗣登大位改元康熙以明年為元年時八齡踐阼奉世祖遺詔以四大臣輔政至六年七月己酉躬親大政六十一年十一月甲午上賓聖壽六十有九在位六十一年雍正元年二月己巳恭上尊諡曰合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝廟號聖祖乾隆元年三月乙巳加上尊諡曰合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝康熙二十年十二月癸巳王大臣九卿等以滇逆蕩平請上尊號上諭大憝既除寰宇底定君臣之間宜益加修省恤兵養民布宣德化共致太平其上尊號之事斷不可行二十二年十月丁未九卿等以海寇底定請上尊號上諭臺灣僅彈丸之地得之無所加不得無所損若稱尊號即入於矜張粉飾矣不必行二十六年正月喀爾喀土謝圖汗察罕車臣汗諾爾布及七旗濟農台吉等請上尊號上諭喀爾喀諸汗貝勒等恪恭敬慎具悉悃忱宜仰體朕一視同仁無分中外至意謹識朕諭和之旨自兹以後無相侵擾親睦雍和永享安樂更甚於上朕尊號也所請不準行三十六年六月庚戌王貝勒貝子公滿漢文武諸臣及士民等以平厄魯特噶爾丹請上聖神文武大德廣運尊號上諭朕御極四十年自始至終孜孜不倦方今外寇既靖正宜休養生息徒加尊號何益於治不必行毋復再奏四十一年十二月壬辰王貝勒貝子公大學士九卿文武諸臣及士民等以明年皇上五十萬壽請上尊號上諭朕即位四十餘年未嘗一刻不以民生休戚為念逺邇安寧為本若誇耀功德取一時之虛名大非朕意不必敷陳諸王大臣等再三奏請終不允五十年三月庚寅王貝勒貝子公大學士九卿文武諸臣及士民等以恭遇萬壽聖節請上聖神文武大德廣運尊號上諭朕自幼讀書歷觀經史持身務以誠敬為本治天下務以寬仁為尚此心此念恪守五十年夙夜無間即纎悉細務不敢稍有怠忽朕之御極年久皆祖宗厚德景福積厚留貽之所致至於請上尊號特虛文耳於朕躬毫無禆益所奏知道了五十一年十一月己亥王貝勒貝子公文武諸臣等以明年皇上六旬萬壽請上聖神文武大德廣運尊號上諭朕臨蒞日久每於讀書鑒古之餘念君臨天下之道惟以實心為本以實政為務若侈陳功德加上尊號以取虛名無益治道朕所不喜前諸王大臣等屢有奏請朕曾手書批示諭以斷不允行前旨甚明所奏知道了六十年三月己丑王貝勒貝子公滿漢大臣文武百官等請上聖神文武欽明睿哲大孝𢎞仁體元壽世至聖皇帝尊號上諭從來所上尊號乃歷代相沿陋習本朝受命以來惟以愛養萬民為務今當修省圖治加惠黎元所奏慶賀無益不準行恭加上聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝尊諡册文曰乾符廣運超萬古而獨隆鴻號丕昭配兩儀而並立創垂永賴巍蕩難名欽惟皇考大行皇帝道貫三才恩涵九有沖齡繼序肇增昭代之𢎞模久道化成式廓熙朝之景運敬天法祖盡制盡倫濟世安民允文允武極孝思於尊養郊廟尤虔篤慈愛於宗支勳賢必恤用人立政欽明被四表之光赦罪蠲租怙冒溥萬方之澤禮樂興而刑罰措水旱弭而河嶽靈既好生之如天復神武而不殺兵威所指反側皆消廟算在心遐荒永靖收歷代未收之屬國闢從來未闢之輿圖治河則神謨捷於禹功巡狩則懿德多於周頌誕敷文教幸魯而崇萬世之師勤御講筵尊朱以表六經之學金聲玉振帝王集其大成精義入神道德通於遊藝綜六十餘年之謨烈美不勝書稽三百一帝之簡編古來未有唯手定長治久安之天下而心懷憂勤惕厲以終身仰靈爽之式憑考彝章而肆祀僉謂席守成而兼開創統中外以定太平功高百世而不祧禮洽羣情而稱祖中和建極聖則大而化之乾健體元仁者善之長也敬備顯揚於君父敢申昭告於神明謹奉册寶上尊諡曰合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝廟號聖祖於戲秉謙德於生前屢辭尊號定徽稱於今日彌切追思伏冀於昭于天克昌厥後紹庭陟降賴申錫於無疆入廟顯承凜鑒觀之有赫永綏奕祀式荷𢎞庥恭加上聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝尊諡册文曰聖德同天駿烈常垂於百世仁恩浹地鴻稱永著於千秋萬方之元化周流五紀之太和洋溢光昭啓佑禮重顯揚欽惟聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝道備中和功隆化育勵精圖治統經文緯武以宣猷久道化成兼繼往開來而立極邁百王而獨盛廣運彌神超千古以加隆大成集聖敬天立政時時弗釋夫憂勤法祖諴民事事務歸於寬大定三逆而平絶塞克成不世之膚功蠲舊賦而緩新徵疊沛無窮之惠澤六十一年宵衣旰食總萬幾而日昃不遑千八百國樂業安居熙庶績而耄期不倦溯自眇躬之沖幼即蒙鞠育於宫闈聖訓親承憶音容而如昨祖庭逺隔瞻色笑以何從敬紹丕基詒孫謀於盡善緬懷盛德崇顯號於方新式考典章肅將忱悃謹奉册寶增上尊諡曰聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝伏冀神靈陟降緒業昭融永貽昌大之祥長享升平之福改元一康熙六十一年世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝聖祖仁皇帝第四子聖母孝恭仁皇后誕生十月三十日萬壽聖節康熙三十七年三月丁丑封多羅貝勒四十八年十月戊午晉封和碩雍親王康熙六十一年十一月辛丑嗣登大位改元雍正以明年為元年十三年八月己丑上賓聖壽五十有八在位十三年是年十一月丁未恭上尊諡曰敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝廟號世宗恭上世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝尊諡册文曰至德同天裕鴻模於萬世深恩浹地垂駿烈於千秋揚顯號以薦徽稱考彝章而崇殷禮光照寶册輝映瑤圖欽惟皇考大行皇帝道協清寧功隆位育敬天而虔昭事孚精意於郊壇法祖而篤顯承致孝忱於廟祏紹中天之景運開奕代之昌期精一傳心建大中而出治蕩平立極居至正以表邦敷文則重道尊師宏作人之雅化振武則安邊懷逺恢保泰之神謨天亶聰明坐照靡遺於庶物性成英睿淵衷逺徹於萬方御衆以寬而蠲賦省刑共沐仁恩之浩蕩示民有信而敦化善俗咸欽毅力之甄陶蓋本大孝不匱之思善繼以成夫善述且運至誠無息之用實政而體以實心乃至瑞集苞符海宇之禎祥畢致誠輸職貢梯航之琛賮胥來而乃謙挹彌深憂勤益勵朝乾夕惕弗釋一二日兢兢業業之心旰食宵衣用成十三載蕩蕩巍巍之治樹百王之模範言言寶鑑丹書傳百代之章程事事金科玉律有典有則永垂裕於後昆是訓是行敬率由於成憲兹博詢夫公議期允愜於輿情尊諡憲皇實符盛烈載稽往籍式考禮經宗堯宗禹宗湯廟貌宗尊於有德世道世法世則蒸嘗世奉於不祧殷美三宗宜肇禋宗之典周崇世室爰開卜世之祥配列祖於在天薦世宗之新廟合朝野僉謀而悉協揆古今通議而交孚謹奉册寶恭上尊諡曰敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝廟號世宗惟耿光大烈之常昭冀景福純庥之茂介伏祈昭格俯賜鑒臨改元一雍正十三年今上皇帝世宗憲皇帝第四子聖母孝聖憲皇后誕生八月十三日萬壽聖節雍正十一年二月乙未封和碩寶親王雍正十三年九月紹登大寶改元乾隆以明年為元年乾隆十四年二月己亥王大臣等以平定金川請上尊號奉旨不用二十年五月乙未王大臣等以平準噶爾請上尊號奉旨不用二十四年十月壬寅王大臣等以平回部請上尊號上諭諸王大臣等以巴達克山汗素爾坦沙投誠逆酋小和卓木授首準噶爾全局大定具表奏賀並請加上尊號雖稱援據典章而朕功成祗懼彌切於懷豈肯崇尚虛文勉從所請西陲一事仰賴上天福佑宗社鴻庥殊勳速奏𨽻版籍者二萬餘里治軍書者不及五年載籍以來實罕有倫比而朕所深用愜心者乃不在逺圖之式廓而在先烈之克成欽惟皇考付畀朕躬夙夜勉圖繼述矧在蚤年備承皇祖眷顧優隆每遇軍國重務即令面聆聖訓籌畫是朕躬之仔肩倍重而纘緒者亦倍艱今以數載間運籌決策之勞克全我兩朝撻伐綏遐之略返衷自問差可無負燕詒者當在於是故非好大喜功之為見也我皇祖聖德神功超越萬古戡定殊勳炳於史册廷臣請上尊號尚未允行乃者關門以西迄乎大漠雖通亘古未通之境究以國家全盛餘力及之視當年之事會稍需刻難中輟者其緩急輕重固不可同年語矣然方其罪人未得朕斷不因盈廷畏葸輒事茍安若逆渠既獻馘告功則國法用申而軍威自無可極是以富德奏捷尚請追索鄂斯滿阿布都海里二人以絶根株朕以成事已蕆即傳諭飭止之固不能惑於築室之謀亦豈或蹈夫佳兵之戒所謂行乎不得不行止乎其所當止無成心也兹功成事定惟欽遵祖宗之心法益深兢業耳所有王大臣等加上尊號之請不必行皇朝文獻通考卷二百三十九
