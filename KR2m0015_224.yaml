body:
  text: 欽定四庫全書皇朝文獻通考卷二百二十四經籍考十四史地理時令譜牒目録御定清涼山新志十卷聖祖仁皇帝御製序曰朕惟清涼山古稱文殊大士演教之區也兹山聳峙於雁門雲中之表接恆嶽而俯滹沱橫臨朔塞藩屏京畿其地風徑而髙寒層氷結於隂巖積雪留於炎夏故名清涼然地雖寒而嘉木芳草蒙茸山谷稱靈異焉五峯竦立上矗霄漢日月之所回環煙霞之所虧蔽蒼然深秀其為神臯奧區蓋自昔而已然矣是以自漢至今歷代皆有崇建古剎精藍遍滿巖岫宇內稱靈山佛土最著者有三峨嵋普陀而五臺為尤盛焉我世祖章皇帝上為慈闈祝釐下為蒼生錫福賜金遣使屢沛恩施朕數經駐蹕兹山為兩宫祈康寧福祉因而登五峯陟臺懷各為文勒石以紀之琪樹靈葩形於篇咏蓋嘗念佛教以清淨慈惠為本以戒定智慧為宗亦有禆於勸善逺慝兹山又密邇塞垣逺離塵俗當為清修者之所棲泊故於此每惓惓焉山之有志所以紀形勝述建置載藝文俾後之人有所稽考往迹舊聞不致淹沒兹編詳簡適中不蕪不支清涼勝境可撫卷而得其梗概也因敘於簡端臣等謹按舊志成於順治十八年至康熙三十年奉敇重修凡分十類並御製序文辨諸卷首焉欽定盤山志二十一卷乾隆十九年協辦大學士戶部尚書蔣溥等奉敕撰皇上御製序曰向於雍正年間奉命敬謁景陵往來薊野田盤山色宜人蓋蓄於目且沃於心矣而以程期惟謹訖未登臨因索智朴志書讀之嗤其意求博而辭失冗夫耕問僕織問婢山經地志文士之事彼方外流拘名象而濫碔砆者何為哉踐阼以後敕幾勤政日不暇給閲七年而後一往遊焉及一遊則峰之秀泉之清松之蒼石之詭日往來於吾懷是猶未見君子惄如調飢亦既見止我心則夷矣嗣是規地建園施金葺寺迹之廢者日以舉境之幽者日以出上陵回鑾每憩止焉夫山川顯晦時有定數而必待人以彰不數年之間使田盤改觀者余也而顧兹寰宇風未臻乎唐虞嵗未餘乎三九恧然抱愧者亦余也志盤山而請序者其亦同余此心也耶臣等謹按乾隆十九年二月命溥等纂修新志因詳加裒訂輯成是編兹山林巒幽邃秀甲畿東在漢為田疇隱居之地伏遇我聖祖仁皇帝鑾輅巡臨大開神秀我皇上展謁祖陵翠華駐蹕特建山莊以供靜憩由是輝煌金碧靈境日開宜其偕嶽鎮以效靈永備宸遊於無極矣西湖志四十八卷李衛纂衛字義玠銅山人官至直𨽻總督諡敏達西湖志纂十二卷乾隆十六年大學士梁詩正等恭纂臣等謹按乾隆十六年聖駕南巡詩正請重修西湖志會尚書沈德潛取雍正中李衛等所輯舊志重加刪訂繕録恭進得旨嘉奬並詔詩正即取李衛本刪併為一乃復參考釐定别類分門首名勝各圖次西湖水利次孤山南山北山吳山西溪諸勝迹次藝文凡十二卷門目雖減於舊志紀載已綜夫大綱天翰親題湖山生色夫是以炳朗乎寰區爭芳乎嶽瀆豈僅以幽巒絶壑擅東南山水之最也哉太平三書十二卷張萬選編萬選字舉之濟南人官太平府推官乍浦九山補志十二卷李確撰確見雜史類昌平山水記二卷顧炎武撰炎武見經類四明山志九卷黃宗羲撰宗羲見經類宗羲自序略曰壬午嵗余作四明志亡友陸文虎欲刻之而未果癸丒嵗盡偶展此卷文虎評校之朱墨如初脫手然其間凡例不齊詞不雅馴重為竄改始得成書黃山志七卷閔麟嗣撰麟嗣字賔連歙縣人麻姑山丹霞洞天志十七卷羅森撰森字約齋大興人順治丁亥進士官至陜西督糧道峩眉山志十八卷蔣超撰超字虎臣金壇人順治丁亥進士官翰林院編修峩眉志略一卷張能鱗撰能鱗見經類浯溪考二卷長白山録一卷補遺一卷王士禎撰士禎見傳記類士禎自序浯溪考曰楚山水之勝首瀟湘瀟湘之勝首浯溪浯溪以唐元結次山名得魯公磨崖書而益張之舊有浯溪前後兩集為李仁剛綦光祖撰見於輿地志碑目皆無傳今志乃出庸手冗雜泛濫至不可耐乃以退食之暇窮搜遐托要取精核間録詩賦雜文多郡志溪志所未收者鼓山志十二卷僧元賢撰恆嶽志三卷張崇德撰崇德字懋修順天人官渾源州知州七星巖志十六卷韓作棟撰作棟字公吉鑲藍旗漢軍人順治中官按察司僉事臣等謹按此志本明王泮所作名曰定山石室志蓋七星巖一名嵩臺又名定山故也作棟因泮書重加修纂而吳綺又為之潤色焉峩眉山志十八卷曹熙衡撰熙衡字素徴錦州人順治中官至貴州按察使龍唐山志五卷僧性制撰臣等謹按浙江通志本作龍塘而此作龍唐者蓋猶錢塘之可作錢唐也故書中如唐井等字亦盡不加土旁以昭畫一寶華山志十卷釋德基撰廬山通志十二卷釋定皓撰西湖夢尋五卷張岱撰岱字陶菴自號蝶菴居士會稽人僑寓錢塘百城煙水九卷徐嵩張大純同撰嵩吳江人大純長洲人尤侗序曰嵩有詩名好遊佳山水間嘗綴集吳地古迹為此書其友張大純助其捃托未畢而嵩殁大純因重加纂輯刋行蟂磯山志二卷柯願撰願字又鄒龍溪人康熙甲辰進士官主事嶽麓志八卷趙寧撰寧字又裔山隂人官長沙府同知説嵩三十二卷嵩嶽廟史十卷景日昣撰日昣字東陽登封人康熙辛未進士官至戶部侍郎日昣自序説嵩略曰主山為幹附見為支曰嵩髙曰太室曰太室上曰太室隂曰太室麓曰太室原曰少室上曰少室東曰少室南曰少室隂曰箕山為是書之經曰星野曰沿革曰形勢曰水泉曰封域曰遊記曰古迹曰金石曰傳人曰物産曰二氏曰托異曰藝林曰風什為是書之緯嵩嶽廟史例略曰漢武之登封孝明之巡幸胡后武曌之離宫别院事涉遊盤無關秩祀概從刪削雞足山志十卷范承勳撰承勳鑲黃旗漢軍人官至雲南總督普陀山志十五卷朱謹陳璿同撰謹見經類璿始末未詳湘山志八卷徐泌撰泌字鶴汀衢州人康熙中官全州知州林屋民風十二卷王維德撰維德字洪緒吳縣人廬山志十五卷毛德琦撰德琦字心齋鄞縣人由貢生官星子縣知縣德琦自序略曰山川分紀多仍其舊文翰則隨時而增書之玉華洞志六卷陳文在撰文在字新我將樂人羅浮山志十二卷陶敬益撰敬益江寧人康熙中官博羅縣知縣羅浮山志會編二十二卷宋廣業撰廣業字澄溪長洲人康熙中官至山東濟東道羅浮外史無卷數錢以塏撰以塏字蔗山嘉善人康熙戊辰進士官至太子少保禮部尚書諡恭恪惠陽山水紀勝四卷吳騫撰騫字益存號樂園當塗人康熙辛未進士官至惠州府知府臣等謹按是編雖總名惠陽山水而其實止紀羅浮西湖兩地故如霍山龍川等並為惠州之名勝而志皆不及焉西樵志六卷馬符録撰符録字受之南海人官陸豐縣訓導武夷九曲志十六卷王復禮撰復禮見經類太嶽太和山紀略八卷王概撰概字成木諸城人雍正癸丑進士官至兩廣鹽運使峽石山水志一卷蔣宏任撰宏任字擔斯海寧人雁山圖志無卷數僧實行撰實行字奕庵山隂林氏子居雁山能仁寺金井志四卷薑虬緑撰虬緑字秋島烏程人自號蒼辨山人又號大海樵人虬緑自序曰住山以來日有記録并見古人詩歌雜識手輒鈔摘凡分山谷文獻金石藝文四門泰山道里記一卷聶鈫撰鈫字劍光泰安人鈫自序曰生長泰山下少為府胥性嗜山水每攀幽躋險探稽往躅因讀劉其旋泰山紀略成城泰山勝概其中有一地兩稱或名同地異巖谷深阻題刻為苔蘚所蔽者間遺而未録近乃架梯刮磨垢蝕而求之雖風雨寒暑勿憚其勞又質之野老參考羣書竭半生精力彚成一編提挈道里為綱領分之為五合之為一曰泰山道里記鈫從孫學文識曰余從祖搜討金石之文閲二十餘年凡諸紀載所未詳者如石經峪刻金剛經據徂徠刻石辨為北齊王冠軍書唐紀泰山銘下截剝落葉彬補書百八字宋述功德銘磨勒岱巔鑱毁原碑字猶存介邱巖分水溪及古明堂均失核蓄疑又肅然山奉髙城季札之墓與白騾冡俱誤指其地汶泮三溪諸水皆牽混源流岱背琨瑞靈巖諸山因𨽻他縣而未録併逐加考驗以辨訛補闕焉峽川志一卷潘廷章撰廷章字梅巖自稱海峽樵人海寧人西湖覽勝志十四卷夏基撰基字樂只杭州人南湖紀略稿六卷邱俊撰俊見政書類臣等謹按南湖一名白洋池在杭州城北隅宋張俊賜第四世孫鎡别業據湖之北因名南湖楊萬里陸遊諸人皆為題詠而鎡亦以自名其集遂傳為古迹俊少居其地因采輯宋時志乘及説部文集勒成此志右地理類山水江城名迹五卷陳宏緒撰宏緒字士業新建人臣等謹按宏緒自序曰古與今不以時代為斷而一以興廢存亡為斷蓋是書上卷考古下卷證今故其言如此營平二州地名記一卷顧炎武撰炎武見經類金鼇退食筆記二卷髙士奇撰士奇見經類士奇自序曰自丁巳賜居太液池之西朝夕䇿馬過金鼇玉蝀橋望苑中景物七閲寒暑退食之頃偶訪曩時舊制約略得之傳聞又倣佛尋其故址離宫别館廢者多矣脫復不加訂證無以昭我皇上卑宫室約園囿之儉德因率筆記之詳於西而略於東以所居在苑西故也紀其興廢而復雜以時事欲見昭代之盛存為太平嘉話也又曰衙署監局載在會典者不書訪聞未確者不書外人所罕窺者亦不敢書石柱記箋釋五卷鄭元慶撰元慶字芷畦歸安人朱彝尊序曰湖州石柱歐陽永叔謂非顔魯公不能書孫莘老知湖州聚境內碑碣築墨妙亭貯之記其一也所記山川陵墓廟石旁及屏風竹帳雉尾扇顧唐五縣而記遺其二元慶成箋釋四卷彞尊為補其遺靈隱寺志八卷孫治撰徐增重編治字宇台仁和人增字子能吳縣人滄浪小志二卷宋犖撰犖字牧仲號漫堂商邱人由廕生官至吏部尚書杏花村志十二卷郎遂撰遂字趙客號西樵子池州人二樓小志四卷程元愈撰汪越沈廷璐補葺元愈字偕栁越字師退廷璐字元佩皆寧國人臣等謹按寧國府有南北二樓其北樓即晉謝眺之髙齋其南樓乃明嘉靖間知府朱大器所建之文昌臺也後佟賦偉嘗作二樓記略不專言二樓之事元愈等乃取歷代題詠之詞彚為是編青原志略十三卷僧大然撰施閏章補輯大然始末未詳閏章字尚白號愚山宣城人順治己丑進士官至江西布政司參議康熙己未召試博學鴻詞授翰林院侍讀崇恩志略七卷僧智藏撰智藏字竺堂安福人江心志十二卷釋元奇撰始末未詳臣等謹按江心寺之建其來甚久考謝靈運詩已有亂流趨正急孤嶼媚中川之語矣寺在永嘉江中古稱名迹特未有紀其勝者其後郡人王暘谷始創為志元奇特重加校訂而成是編白鹿書院志十六卷廖文英撰文英見經類靈谷寺志十六卷吳雲撰雲號舫翁安福人白鹿書院志十九卷毛德琦撰德琦見山水類通元觀志二卷吳陳琰撰陳琰見經類孔宅志六卷諸紹禹撰紹禹松江人臣等謹按孔宅在青浦縣之北世傳孔子三十四代裔孫名禎者於隋末為蘇州刺史遂僑寓於吳立家廟葬先聖衣冠於此後廟漸湮廢明陸應陽復為修治採閭閻説作孔廟記陳功又作續記康熙中紹禹取舊本刪輯成編然先聖衣冠之説終不免為無稽之談耳丹霞洞天志十七卷蕭韶撰韶字明彞南城人康熙中舉人武林志餘三十二卷張暘撰暘字東榑號滌岑錢塘人東林書院志二十二卷髙􅀢髙嶐髙廷珍髙陛許獻同撰􅀢等四人皆髙攀龍裔獻亦同縣人也增修雲林寺志八卷厲鶚撰鶚見正史類臣等謹按雲林寺本名靈隱聖祖仁皇帝巡幸江浙時特賜今額鶚以志書不應仍用舊名乃因前志易其名而增輯之宋東京考二十卷周城撰城號石匏嘉興人王珻序曰城客大梁三載隨境討搜以成此書鵝湖講學會編十二卷鄭之僑撰之僑字東里潮陽人乾隆丁巳進士官至寶慶府知府關中勝迹圖志三十二卷陜西巡撫畢沅撰臣等謹按是書以郡邑為經以地理名山大川古迹為緯附圖於後會萃古今記載如三輔黃圖以下及山水遊記州郡志乘諸書無不採取訂舛釐訛使之歸於畫一蓋沅當行部之時涉歷川原親為詢求古迹考古證今因成是編故凡名勝之區無不詳其始末云右地理類古迹顔山雜記四卷孫廷銓撰廷銓見傳記類王士禎序曰田雯黔書七十六篇有似爾雅者有似考工記者有似公榖檀弓者有似越絶書者孫文定公作顔山雜記文筆竒峭亦如此天府廣記四十四卷孫承澤撰承澤見經類山東考古録一卷京東考古録一卷譎觚十事一卷顧炎武撰炎武見經類四州文獻摘鈔四卷畢振姬撰振姬字亮四髙平人順治丙戍進士官至廣西按察使司昌齡跋曰四州文獻蓋潞澤遼沁之通考也其間有懸揣附會之説前無總序倫類紛雜蓋草創未就而其徒所鈔次凡二十五册余以前人舊文各有原書又繁不能盡録乃節其論著之要者與其所纂物産釐為四卷題曰四州文獻摘鈔云甌江逸志一卷勞大輿撰大輿字宜齋石門人順治辛卯舉人官永嘉縣教諭嶺南風物紀一卷吳綺撰宋俊增補江闓刪訂綺字園次號聽翁江都人順治甲午拔貢生官至湖州府知府俊字長白山隂人闓字辰六桂陽人粵述一卷閔敘撰敘號鶴臞歙縣人順治乙未進士官至監察御史星餘筆記一卷王鉞撰鉞見傳記類中州雜爼三十五卷汪價撰價字介人號三農外史自稱吳人里居未詳臣等謹按順治己亥河南巡撫賈漢復修通志時價嘗與其役因採古來遺事涉及中州者彚為是書仿類書之例分天地人物四門而各係以子目然所採多取諸稗官野史近於小説之體矣湖壖雜記一卷陸次雲撰次雲字雲士錢塘人康熙初由拔貢生官江隂縣知縣姑孰備考八卷夏之符撰之符字玹伯當塗人臺灣記略一卷李麟光撰麟光號蓉洲武進人海表竒觀八卷不著撰人名氏自序題康熙戊申嘗官瓊州江南星野辨一卷葉燮撰燮字星期吳江人康熙庚戍進士官寶應縣知縣嶺南雜記二卷吳震方撰震方見經類臺灣隨筆一卷徐懷祖撰懷祖字燕公松江人燕臺筆録一卷項惟貞撰惟貞字端伯秀水人神州古史考一百五十卷方輿通俗文一卷倪璠撰璠字魯玉錢塘人康熙乙酉舉人官內閣中書璠自序曰按今之版圖取自漢迄唐諸史地志列於郡縣之首上搜舊聞旁托遺逸凡兩京十四省共一百五十餘卷謂之神州古史考又取唐以後者别為一編名曰方輿通俗文臺海使槎録八卷黃叔璥撰叔璥見職官類西粵對問無卷數江德中撰德中字漢石徽州人官至廣西布政司參議龍沙紀略一卷方式濟撰式濟字屋源號沃園康熙己丑進士官中書舍人潯陽跖醢六卷文行逺撰行逺字樵菴江西德化人康熙中貢生例略曰讀書時遇郡事隨見隨録自經史子集及稗官野乘小説之類靡所不採蜀都碎事六卷陳祥裔撰祥裔本姓喬氏號藕漁順天人康熙中官成都府通判續閩小紀一卷黎定國撰定國字于一江都人嶺海見聞四卷錢以塏撰以塏見山水類東城雜記二卷厲鶚撰鶚見正史類南漳子二卷孫之騄撰之騄見經類右地理類雜記廣州遊覽小志一卷王士禎撰士禎見總録類臣等謹按士禎自述年譜曰康熙甲子十一月奉命祭告南海乙丑二月十日抵廣州入南海神廟蕆事四月一日發廣州蓋其在廣州留連者五十一日以其暇遊覽諸名勝因作是編焉天下名山記鈔無卷數吳秋士撰秋士字西湄歙縣人泰山紀勝一卷孔貞瑄撰貞瑄見經類匡廬紀遊一卷吳闡思撰闡思字道賢武進人滇黔紀遊二卷陳鼎撰鼎見總録類王山遺響六卷張貞生撰貞生號簣山廬陵人順治戊戍進士官至翰林院侍讀學士羅麗序略曰貞生所著文集尚未刋行此其家居一載之內流連山水隨筆記之以示其意之所寓者蒼洱小記一卷畢曰澪撰曰澪見傳記類右地理類遊記安南使事紀一卷李仙根撰仙根字南津遂寧人順治辛丒進士第二官至戶部侍郎坤輿圖説二卷南懷仁撰懷仁西洋人康熙中官欽天監監正臣等謹按是書為上下兩卷上卷分十五條自坤輿至人物皆言地之所生下卷分五大州載海外諸國附以西洋七竒圖説與艾儒略職方外紀互有詳略雖所記不無粉飾而要以外國人記外國事或不盡虛謬耳西方要記一卷利類思安文思南懷仁等撰類思等皆西洋人洱海叢談一卷釋同揆撰同揆字輪菴雲南大理府文殊寺僧使琉球記一卷張學禮撰學禮字立菴鑲藍旗漢軍人官廣西道監察御史巡視河東鹽政臣等謹按康熙元年琉球國王尚質繳故明敕印舉國內附學禮以兵科副理事官偕行人司行人王垓奉詔册封此其紀請封遣使始末及往來途路之險阻末附中山紀略載其土風民物足備採陳八紘繹史四卷紀餘四卷八紘荒史一卷洞溪纎志三卷志餘一卷陸次雲撰次雲見雜記類次雲自序洞溪纎志曰諸書所載同異攸殊余徴諸見聞詳為考正措詞雖簡徴事彌該安南紀遊一卷潘鼎圭撰鼎圭字子登晉江人海外紀事六卷釋大汕撰大汕廣東長壽寺僧連陽八排風土記八卷李來章撰來章號禮山本名灼然以字行襄城人康熙乙卯舉人官連山縣知縣異域録一卷圖理琛撰圖理琛姓阿顔覺羅氏先世業赫人由考取內閣中書官至兵部郎中中山沿革志二卷汪楫撰楫字舟次休寧人康熙己未召試博學鴻詞授翰林院檢討楫自述曰奉使諭祭故王入其祖廟因密録其神主又得琉球世纘圖參以明代實録約略詮次輯成是編中山傳信録六卷徐葆光撰葆光字澄齋吳江人康熙壬辰進士官翰林院編修臣等謹按康熙五十七年葆光副海寶使琉球成書奏御繪圖系説紀述頗稱詳洽楚南苗志六卷假汝霖撰汝霖字時齋號梅亭漢陽人由舉人歷官建寧府知府海國見聞録二卷陳倫炯撰倫炯字資齊同安人官至浙江寧波水師提督琉球國志略十六卷周煌撰煌字海山涪州人乾隆丁巳進士官至兵部尚書諡文恭臣等謹按煌於乾隆二十二年奉命敕封琉球纂輯志略别類分門徴信紀實仰蒙睿鑒排版行世洵儒臣稽古之榮也右地理類外紀欽定月令輯要二十四卷圖説一卷康熙五十四年聖祖仁皇帝御定聖祖仁皇帝御製序曰古者於明堂之中施十二月之令本堯典授時之意而推廣之今所傳大戴禮夏小正篇小戴禮月令篇三代之遺文大略可見矣月令雖出吕覽而蔡雍次其章句孔頴達定其正義推明周公品制列之於經漢晉而下若四民月令四時纂要以及千金錦帶嵗華紀麗嵗時雜紀諸書代有撰述未睹賅備前明之季馮應京戴任始輯月令廣義二十四卷為士庶通用觀其原本經訓推衍義類用意亦云勤矣顧其采托既多蕪纍間出爰命儒臣重加編輯次第呈覽親為裁定正訛芟復一歸雅馴别起義例補所未備博觀約取務合於體要而切於實用庶幾古者明堂月令之遺式矣書成名曰月令輯要舊本圖説并為釐正列諸卷端因天時而課治功察物候以盡人事自國家政典下逮氓庶作息均可參驗而閎覽博物之學亦於是乎有取焉由今而後言紀時之書者其必以此為權輿也夫古今類纂嵗時部四卷董榖士董炳文同編榖士字農山炳文字霞山烏程人潘耒序曰榖士兄弟共撰類書分天地人物為四部名曰古今類傳先以嵗時日次一編見示乃天部中之一種自元旦至嵗除徴綴條繫無有缺者其搜採致為繁富節序同風録無卷數孔尚任撰尚任見傳記類臣等謹按是書以十二月為綱以節令為目各紀其風俗事宜於下蓋仿荆楚嵗時記例也時令彚紀十六卷餘日事文四卷朱濓編濓爵里未詳右時令欽定八旗滿洲氏族通譜八十卷乾隆九年大學士鄂爾泰等奉敕撰皇上御製序曰我祖宗誕膺天命勃興東土德綏威讋奄甸萬姓維時龍從鳳附之衆雲合嚮應輻輳鱗集強者率屬歸誠弱者舉族內附我祖宗建師設長以涖之分旗𨽻屬以别之厥有熊羆之士不二心之臣效命疆場建謀帷幄親以肺腑重以婚姻酬以爵命逮入關定鼎或聚居遼左或散處燕畿錫之土田爰及苗裔至於今百五六十年生聚蕃衍時萬時億纍朝休養煦植鞠保胥勤越我嘉師咸能永世以滋大朕惟祖宗德澤之深不可不繼修令緒益綿延惇固於無疆重慮物阜且博代序日逺族姓日繁不為之明章統系俾知世德所自將罔克念先人之勤無以光昭前烈爰發金匱石室之藏徴載籍稽圖譜考其入我朝來得姓所始表之以地系之以名官階勳績綴為小傳勳舊戚畹以及庶姓釐然備具秩然有條與國史相為表裏昔周小史定繫世辨昭穆左氏內外傳言天子建德因生賜姓胙土命氏而司商吹律以定姓名蓋萬物本乎天人本乎祖木有根而枝附焉水有源而流出焉譜牒者所以聨人情之渙而維舊俗之漓不可忽也相昔先民遺風敦朴不徒以俗望相髙是書之作非如魏晉隋唐譜牒之學炫博聞而廣附會以膏梁閥閲為尚也書曰古我先王暨乃祖乃父胥及逸勤又曰惟乃祖乃父世篤忠貞服勞王家纘乃舊服無沗祖考前之人既以忠實勤勞覆幬其後嗣凡兹食舊德而服先疇者其何以無隳厥緒書亦曰率乃祖考之攸行昭乃辟之有乂是則朕所厚望也夫臣等謹按是書詳載滿洲氏族源流以姓氏為綱地名人名為目姓氏下總書地名地名下總敘得姓之由及支分派别人名下撮其官階事實為傳其蒙古髙麗尼堪等之久𨽻八旗者亦併録焉仰見開國之初八旗部屬枝幹相維什伍相保聨比閭族黨之情膺腹心干城之寄故其間勳勞懋著節義昭垂雲龍風虎之遭逢蔚為名世之佐者有非偶然者矣歷朝人物氏族會編十卷舊題禾川南里松山逸叟頴侯氏撰不著姓氏希姓補五卷單隆周撰隆周字昌其蕭山人臣等謹按明夏樹芳以楊慎所輯希姓二卷紀録未備因分韻編次為竒姓通十四卷隆周復為補楊氏之缺略然亦但就所見録之究未能無遺憾耳顧氏譜系考一卷顧炎武撰炎武見經類姓氏譜六卷李氏類纂五十卷李繩逺撰繩逺字斯年嘉興人氏族箋釋八卷熊峻運撰峻運字在湄新建人千家姓文一卷崔冕撰冕字貢收巢縣人類姓登科考六卷不著撰人名氏臣等謹按宋謝維新合璧事類所纂諸姓故實以百家姓為次此本蓋倣其例為之間有希姓為百家姓所不載者亦附録云同姓名録八卷王廷燦撰廷燦錢塘人康熙辛酉舉人官崇明縣知縣同人傳四卷陳祥裔撰祥裔見史類别號録九卷葛萬里撰萬里號夢舫崑山人右譜牒欽定天祿琳琅書目十卷乾隆四十年奉敇撰臣等謹按乾隆九年內直諸臣奉詔編排內廷祕笈列架庋藏於昭仁殿賜名曰天祿琳琅近因編纂四庫廣搆遺書宛委叢編悉登祕府乃命重為補輯定著此目以經史子集為綱書則以刋板朝代為次一書而載數本則參用尤袤遂初堂書目例至每書詳其題跋姓名收藏印記則兼用鐵網珊瑚例並各親題甲乙奎藻摛華自來册府珍藏洵無能與之嫓美也已欽定四庫全書總目二百卷簡明目録二十卷乾隆四十七年奉敕編臣等謹按前代著録之書若七略七録見於史志者部分次第多為後人所駁正蓋其時立法未善搜羅未廣又聽臣下意為進退鑒别不精故無以定是非之準而滙古今之大全我皇上典學稽古嘉惠藝林乾隆三十七年詔求遺書四方大吏悉心採録江南浙江好古之士各以其藏書來獻旋因安徽學政朱筠言永樂大典中多人間未見之本命開四庫全書館於翰林院遴選儒臣詳審編核又設局於武英殿專司繕録之事凡經史子集條分得失其善本則著録其外間所稀覯者則以聚珍板廣厥流傳其餘則附見存目每校一書進呈乙覽仰蒙御製詩章敷言建極式型奕祀衮鉞同昭館臣得奉以編摩次第甄録四十六年編定全書三萬六千册從古圖書之備未有盛於此者復綜各書提要合為總目又專輯著録各書括其簡要為簡明目録大聖人親示折𠂻垂定論於億載固非崇文總目諸書所能希蹤萬一矣千頃堂書目三十二卷黃虞稷撰虞稷字俞邰泉州人僑寓上元述古堂書目無卷數讀書敏求記四卷錢曾撰曾字遵王自號也是翁常熟人臣等謹按書目所載乃其藏書之總目敏求記所載則其所藏之最佳本也仿歐陽修集古録之例分經史子集四門又各列以支目凡四十類云讀書蕞殘三卷王鉞撰鉞見傳記類經義考三百卷朱彞尊撰彞尊字錫鬯號竹垞秀水人康熙己未召試博學鴻詞授翰林院檢討陳廷敬序曰竹垞歸隱小長蘆以輯學著書自娛所輯經義考至三百卷之多雖其或存或佚者悉載簡編余以為存者固森然其畢具而佚者亦絶其穿鑿附會之端則經義之存又莫有盛於此時者矣微竹垞博學深思其孰克為之毛竒齡序曰竹垞於歸田之餘據疇昔所見聞合古今部記而著為斯編曰經義考真所謂古文舊書外內相應者其所部分則御注敕撰一卷尊王也十四經為經義者共二百五十八卷廣經學也逸經三卷恐經之稍有遺而一字一句必收之也毖緯五卷緯雖毖説經者也擬經十三卷此則不惟自為義并自為經者也又有承師五卷則録其經義之各有自者而廣譽附焉宣講立學合一卷刋石五卷書壁鏤板著録各一卷通説四卷此皆與經學有繫者然而非博極羣籍者不能有此家學一卷自序一卷共三百卷孟子曰觀於海者難為水遊於聖人之門者難為言今經學大著聖人之言畢見於斯世復得從此而有所考鑒則天下後世知有經并知有義也明藝文志五卷尤侗撰侗字展成號悔菴又稱艮齋又號西堂長洲人由拔貢生任永平府推官康熙己未召試博學鴻詞授翰林院檢討官至侍講易傳辨異四卷翟均亷撰均亷字春沚錢塘人乾隆乙酉舉人官內閣中書右目録類經籍欽定校正淳化閣帖釋文十卷乾隆四十三年侍郎金簡恭録臣等謹按宋太宗命侍書王著摹刻諸家書為淳化閣帖後之釋者不下十數家皇上幾暇臨池辨訛匡謬詔以內府所藏宋畢士安本詳加釐正以次取裁御定重勒貞珉並頒恩賚然惟大臣登二府者始得拜賜金簡以石刻貯在禁庭陬澨末儒罕窺崖概乃恭録釋文請以聚珍板摹印以廣流傳由是諸書家之墨迹精采彌增而篆籀行草之竒傑者亦復人人能識並悉同異之原誠墨林之鴻寶為藝苑之竒珍也已禊帖綜聞一卷胡世安撰世安見經類金石表一卷曹溶撰溶見總録類溶自序云余行塞上見古碑橫茀草間偶一動念古人遺迹歷千百年自吾世而湮沒之為可惜搜自境內以至逺地積五年得八百餘本經以碑緯以撰者書者之姓名及所立之地與世與年合而成表間者軒帖考一卷孫承澤撰承澤見經類求古録一卷金石文字記六卷石經考一卷顧炎武撰炎武見經類炎武自序金石文字記略曰比二十年間周遊天下所至名山巨鎮祠廟伽藍之迹捫石履榛其可讀者必手自鈔録抉剔史傳發揮經典頗有歐陽趙氏二録之所未具者天發神讖碑釋文一卷周在浚撰在浚字雪客祥符人亮工之子嵩陽石刻集記二卷葉封撰封字井叔黃州人順治己亥進士官至工部主事王士禎序曰封精爾雅説文訓詁工於篆𨽻手輯嵩志二十一卷復旁搜漢唐以來碑板文字别為石刻集記二卷辨證精博人比之劉原父薛尚功云昭陵六駿贊辨一卷瘞鶴銘辨一卷張弨撰弨字力臣山陽人觀妙齋金石文考略十六卷李光映撰光映字子中嘉興人金介復跋曰光映所收碑刻拓本視曹溶古林金石表不減其數乃博采諸家之論録之以互證其然否間附已説於其後石經考一卷萬斯同撰斯同見經類來齋金石考三卷林侗撰侗字同人侯官人臣等謹按是編總録古今碑刻自夏迄唐凡二百二十皆據目見者書之其考證以顧炎武金石文字記為主而以己意為之折𠂻云瘞鶴銘考一卷汪士鋐撰士鋐字文升長洲人康熙丁丒進士官至右春坊右中允分𨽻偶存二卷萬經撰經字授一號九沙鄞縣人康熙癸未進士官翰林院編修金石遺文録十卷陳奕禧撰奕禧字子文號香泉海寧人由貢生官至南安府知府王士禎序曰奕禧於秦漢唐宋以來金石文字收藏尤富皆為題跋辨證蓋米元章黃伯思一流人也續金石録無卷數葉萬撰萬字石君常熟人金石續録四卷劉青藜撰青藜字太乙襄城人康熙丙戌進士改庶吉士中州金石考八卷黃叔璥撰叔璥見傳記類淳化祕閣法帖考正十二卷竹雲題跋四卷王澍撰澍見經類澍自序法帖考正曰淳化祕閣法帖米元章始以所見創為區别黃長睿更據史書考其紕繆所見益精而字畫淆訛未暇是正明嘉靖中上海顧汝和本黃米未盡之指細意較勘雖其板本皴裂字畫剝蝕處亦必異同並載國朝康熙間義門何焯更以薑白石絳帖評增注其上徐葆光又旁搜博採益增其舊年來時時臨寫偶有所見輒復博取羣書補正詳訂於是閣帖十卷是非同異皆有所依據書十二卷者第十一卷附古今法帖考第十二卷附論書賸語也金石經眼録一卷金石圖二卷褚峻摹圖牛運震補説峻字千峯郃陽人運震見經類石經考異二卷杭世駿撰世駿見經類厲鶚序略曰其五經六經七經之核其實一字三字之定其歸二十五碑四十八碑之析其數堂東堂西之殊其列自洛入鄴自汴入燕之分其地駁鴻都門學非太學魏石經非邯鄲淳書直發千古之蒙滯臣等謹按是編因顧炎武石經考採托未備辨正未明乃為糾訛補缺勒為二卷上卷標目十五下卷標目三而趙信汪祚符曽諸人各抒所見互相訂正較炎武之書頗為完密云石迹記一卷不著撰人名氏右目録類金石皇朝文獻通考卷二百二十四
