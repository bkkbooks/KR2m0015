body:
  text: 欽定四庫全書皇朝文獻通考卷一百三十四王禮考十冊立皇太子冊封附臣等謹按馬端臨以冊立皇太子儀附見帝系門今載入王禮考古稱建儲為國本史冊所載或以貴恣招愆或因讒間獲咎往往有之蓋古今事勢不同未可執一而論也我朝列聖相承天眷有德付託得人聖祖仁皇帝時以理密親王分居嫡長冊建東宫教誨成全至再至三其後終以罪廢嗣是臣僚有以建儲請者特召諸大臣宣諭以為君難為臣不易今欲立皇太子必能以朕心為心者方可立之豈宜輕舉及顧命之際以神器授我世宗憲皇帝天下臣民莫不傾心悅服僉謂聖祖之深識逺慮髙出於從古帝王萬萬也我皇上生知天縱自冲齡即䝉聖祖踵愛及世宗踐阼之初眷注攸屬召集諸王大臣密書諭㫖藏之乾清宫最髙之處神明化裁創古人所未有初不假受冊出閣之虛文也皇上纘緒以來慎選臣僚授經內廷程課尤密臣等恭讀諭㫖謂建儲一事如封建井田不可行之近世仰見睿照髙深洞徹時勢實古今所未發又以史冊所載建立儲二事蹟有關鑒戒者編輯古今儲二金鑑一書垂示久逺煌煌聖訓具載簡端謹述之卷中以開千祀之惑云康熙十四年十月丙寅冊立嫡子允礽為皇太子前期一日遣官告祭天地太廟社稷至是日御太和殿遣輔國公葉伯舒大學士圖海為正使户部尚書覺羅勒德洪兵部尚書王熙為副使持節行冊立禮上率諸王貝勒貝子公內大臣大學士都統尚書子侍衛等詣太皇太后皇太后宫行禮次日御太和殿受賀頒詔天下詔曰自古帝王繼天立極撫御寰區必建立元儲懋隆國本以綿祖宗無疆之休朕纘膺鴻緒夙夜兢兢仰惟祖宗謨烈昭垂付託至重承祧衍慶端在元良嫡子允礽日表英奇天資粹美兹恪遵太皇太后皇太后慈命載稽典禮俯順輿情謹告天地宗廟社稷於康熙十四年十二月十三日授允礽以冊寶立為皇太子正位東宫以重萬年之統以繫四海之心大典告成洪恩宜沛於戲主器得人益篤靈長之祜綸音式焕用昭浩蕩之仁布告中外咸使聞知是嵗禮部題定冊立皇太子典禮一前期遣官祭告嶽鎮海瀆歷代帝王陵寢先師闕里皇帝親視香帛一前期一日遣官各一員告祭天地太廟社稷皇帝親視玉帛香祝版是日皇帝率皇太子親詣奉先殿行告祭禮一前期一日禮部鴻臚寺官設節案一於太和殿內正中設制冊案一於左旁設寶案一於右旁設制冊寶綵亭二於丹陛下設節案一香案一於皇太子殿門正中設制冊案一寶案一於殿門左旁是日早設大駕鹵簿樂懸於太和殿前王以下文武各官俱朝服於常朝處齊集內閣禮部堂官將制冊寶節自內閣捧出由御道左旁行置太和殿內各案上鴻臚寺官引諸王各官至太和殿前王貝勒貝子公等於丹陛上文武各官於丹墀下排立禮部堂官奏請皇帝陛殿皇帝具禮服升太和殿閲冊寶畢作樂升座樂止鑾儀衛官贊鳴鞭階下三鳴鞭鴻臚寺官引正副使於常朝行禮處排立贊禮官贊行三跪九叩首禮樂作禮畢樂止禮部堂官鴻臚寺官引正副使至丹陛上立贊禮官贊有制正副使跪宣讀官宣制畢大學士於案上捧節授正使官正使受節前行禮部官舉制冊寶案出鴻臚寺官引王等入殿內坐賜茶畢還宫正使執節在前禮部官捧制冊寶隨後置丹陛下綵亭內正使捧節授禮部官禮部官一員執節前引校尉舉亭列御杖二對黃蓋一柄在前至皇太子殿門置綵亭於殿門外正副使捧制冊寶節置黃案上皇太子在殿門內向節跪迎正使捧制冊授皇太子皇太子恭受授右旁接制冊內監副使捧寶授皇太子皇太子恭受授右旁接寶內監贊禮官贊叩興皇太子行三跪九叩首禮興內監捧舉進內皇太子隨後行正副使持節復命若姆皇太子年幼保奉以行禮禮部堂官奏請皇帝詣太皇太后皇太后宫行禮皇帝具禮服升輿王以下內大臣侍衛等官皆隨行至太皇太后宫門前降輿立門內丹陛東禮部堂官傳令內監奏請太皇太后升座太皇太后御內殿樂作升座樂止皇帝在宫前丹陛上立王以下公以上在門內丹陛上大臣侍衛在門外丹墀內二等三等侍衛在宫大門外排立鳴贊官照常處立贊行三跪九叩首禮樂作禮畢樂止皇帝就原位立禮部堂官傳該內監奏請太皇太后還宫樂作入宫樂止皇帝出詣皇太后宫行禮與太皇太后宫行禮同禮畢皇帝還宫次公主王妃以下大臣命婦以上以次恭詣太皇太后皇太后皇后宫行慶賀禮如常儀次皇太子以次恭詣太皇太后皇太后皇帝皇后宫行禮如常儀一次日皇帝升太和殿諸王文武各官進表行慶賀禮頒詔天下如常儀是日和碩親王以下文武各官以上於皇太子前進箋行慶賀禮一是日皇太子詣武英殿與親王郡王等行禮一直省文武官員於太皇太后皇太后皇帝前進表皇后皇太子前進箋慶賀四十八年三月辛巳以復立皇太子頒詔天下前期遣官告祭天地太廟社稷是日行冊立禮次日頒詔天下詔曰朕惟建立儲嗣承奉宗祧國本攸關元良是託信能飭身澡德敬學勤修行懋著於宫庭論允孚於臣庶申命主器實協彝章皇太子允礽久踐青宫夙標譽望克殫誠孝篤守恪恭不意忽染迷惑狂易之疾朕深惟祖宗洪業及萬邦民生所繫至重不得已而有退廢之舉嗣後漸次體勘當國家有此大事時性生奸惡之徒各庇邪黨借端搆釁朕覺其日後必成亂階遂窮極始末究其情實因而確得病原悉由鎮魘所致亟加除治盡滌前疴纍月以來朕因諸事憤鬱心神耗損允礽朝夕侍朕左右憂形於色藥餌必親寢膳必視惟誠惟謹厯久不渝令德益昭丕基克荷此誠仰賴上天垂庥列祖篤祜以默相我國家於有永者也兹特昭告天地宗廟社稷載稽典禮於康熙四十八年三月初十日授以冊寶復立為皇太子正位東宫用洽四海之人心茂衍萬年之厯服聿成慶典宜沛洪恩於戲春陽應律協氣溢於宫闈海潤流膏恩波遍於寰㝢布告中外咸使聞知五十三年二月庚戌諭領侍衛內大臣大學士九卿等趙申僑陳奏皇太子為國本應行册立朕自幼讀書凡事留意纎悉無遺况建儲大事朕豈忘懷但關係甚重有未可輕立者昔立允礽為皇太子時索額圖懷私倡議凡皇太子服御諸物俱用黃色所定一切儀注幾與朕相似驕縱之漸實由於此索額圖誠本朝第一罪人也宋仁宗三十年未立太子我太祖皇帝並未預立皇太子漢唐以來太子幼冲尚保無事若太子年長其左右羣小結黨營私鮮有能無事者人非聖人孰能無過安得有克盡子道如武王者今衆皇子學問見識不後於人但年俱長成已經分封其所屬人員未有不各庇護其主者即使立之能保將來無事乎且為君難為臣不易古來人君窮兵黷武者有之崇尚佛老者有之任用名法者有之朕御極五十餘年朝乾夕惕上念祖宗遺緒之重下念臣民仰望之殷乾綱獨斷柔逺能邇體恤臣庶毫無私心當吳三桂叛亂時已失八省勢幾危矣朕灼知滿漢䝉古之心各加任用勵精圖治轉危為安是以數十年來海㝢寧靖今欲立皇太子必能以朕心為心者方可立之豈宜輕舉即臣僚為國為民念兹在兹先憂後樂者實不易得太子之為國本朕豈不知立非其人關係匪輕朕將允礽從幼教訓逮後長成變為暴虐無所不為不知忠孝不識亷耻行事乖戾有不可言者推其故皆由瘋狂成疾迷惑所致此疾有二十餘載矣凡人醉後傷人醒時知悔伊似長醉不醒所為過惡身不自知伊之儀表及學問才技俱有可觀今一至於此非瘋狂而何自廢而復立以來朕尤加意教訓心血耗盡因伊狂疾終不痊愈故又行廢黜孟子云父子之間不責善責善則離離則不祥莫大焉大學云人莫知其子之惡蓋父之於子嚴不可寬亦不可誠為難事如朕方能處置得宜耳爾諸大臣俱各有子凡人幼時猶可教訓及其長成一誘於黨類便各有所為不復能拘制矣立皇太子事未可輕定特召集爾衆大臣明示朕意雍正元年八月甲子世宗憲皇帝御乾清宫西暖閣召總理事務王大臣滿漢文武大臣九卿入面諭曰我聖祖仁皇帝為宗社臣民計慎選於諸子之中命朕纘承統緒於去年十一月十三日倉猝之間一言而定大計薄海內外莫不傾心悅服共享全安之福聖祖之精神力量默運於事先貫泣於事後神聖睿哲髙出乎千古帝王之上自能主持若朕則豈能及此也皇考當日亦曾降㫖於爾諸臣曰朕萬年後必擇一堅固可託之人與爾等作主必令爾等傾心悅服斷不致貽纍於爾諸臣也朕自即位以來念祖宗付託之重太祖太宗世祖創垂大業在於朕躬夙夜兢兢惟恐未克負荷向日朕在藩邸時坦懷接物無猜無疑飲食起居不加防範此身利害聽之於天蓋未任天下之重也今躬膺聖祖付託神器之重安可怠忽不為長久之慮乎當日聖祖因二阿哥之事身心憂悴不可殫述今朕諸子尚幼建儲一事必須詳慎此時安可舉行然聖祖既將大事付託於朕朕身為宗社之主不得不預為之計今朕特將此事親寫密封藏於匣內置之乾清宫正中世祖章皇帝御書正大光明匾額之後乃宫中最髙之處以備不虞諸王大臣咸宜知之或收藏數十年亦未可定諸王大臣等各竭忠悃輔弼朕躬俾朕成一代之令主朕于爾等亦必保全成就篤厚恩誼豈非家國天下之大慶乎朕意若此諸王大臣其共議之諸王大臣奏曰皇上聖慮周詳臣下豈有異議惟當謹遵聖㫖上曰爾諸臣既同心遵奉諭㫖朕心深為慰悅乃命諸臣退仍留總理事務王大臣將密封錦匣收藏於乾清宫正大光明匾額後乃出乾隆元年七月甲午上御乾清宫西暖閣召總理事務王大臣九卿等入面諭曰朕受皇考付託之重踐阼以來兢兢業業無刻不以敬天勤民為念宵衣旰食日理萬幾務期海宇乂安庶政咸理仰副我皇考付託得人之聖心以綿宗社無疆之慶朕思宗社大計莫如建儲一事自古帝王即位首先舉行所以重國本而定鴻基也朕即位已逾半載而未經降㫖者並非不稽古典而視此事為緩圖良以後世人心不古往往有因建儲太早以致别生事端者或本人恃貴驕矜漸至失德或左右逢迎諂媚誘引作非甚且有奸宄之徒窺視讒搆以搖動之是以皇祖當日于建儲一事大費苦心及授神器于我皇考時一言而定萬世之業我皇考御極之元年聖心即默注朕躬不肯宣布中外而傳集諸王大臣九卿特加訓諭親書密㫖收藏於乾清宫正大光明匾額之後此我皇考監古宜今寶愛玉成之妙用也今朕當春秋方盛之時皇子年齒又尚冲幼揆之事勢雖若可緩而國本攸係自以預定為宜再四思維惟有循用皇考成式親書密㫖照前收藏在我皇考神明化裁創舉于一時而朕繼志述事踵行於今日此乃酌權劑經之道非謂後世子孫皆當奉此以為法則也將來皇子年齒漸長日就月將識見擴充志氣堅定萬無驕貴引誘之習朕仍應布告天下明正儲二之位若夫以建儲為嫌忌而不肯舉行者此庸主卑陋之見朕亦深鄙者也今傳集總理事務王大臣九卿等面降此㫖非謂諸臣不知朕心必俟朕之諄諄告諭也誠恐天下讀書泥古者以朕不早建儲為疑用是特為宣曉如有拘牽舊制復行奏請者著該衙門將奏章發還今日朕親書密㫖著總理事務王大臣親看宫中總管太監謹收藏于乾清宫正大光明匾額之後三年十月辛卯諭曰二阿哥永璉乃皇后所生朕之嫡子為人聰明貴重氣宇不凡皇考命名永璉隱然示以承宗器之意御極後不即册立者恐幼年志氣未定恃貴驕矜或左右諂媚逢迎至于失德甚且有窺伺動搖之者故于乾隆元年七月初二日遵照皇考成式親書密㫖召諸王大臣面諭收藏于乾清宫正大光明匾之後是雖未冊立朕已命為皇太子矣今於本月十二日偶患寒疾遂致不起深為悲悼一切典禮著照皇太子儀注行元年密藏之諭㫖著取出將此曉諭天下知之尋大學士恭擬諡曰端慧皇太子于十一月甲寅遣官行冊諡禮十八年十一月壬子朔諭㑹典館總裁官曰詹事乃東宫僚佐儲二未建其官原可不設第以翰林叙進之階姑留以備詞臣遷轉地耳古稱建儲為國本大計朕酌古準今深知於理勢有所難行載在史冊者姑置弗論即如理密親王當皇祖時聖慈鍾愛初無間言嗣以東宫既建狎眤匪人陷于失德再致廢黜然其先所置宫僚何嘗非一時之選如湯斌即所稱當代醇儒然亦何俾萬一蓋别立宫府則僚屬多人賢否參雜斷難保其不滋事端夫以皇祖之包含宏大尚迫于宗社之重必不可容可見建儲一事亦如封建井田固不可行之近世也是以皇考鑒于前事默定宸𠂻不事建儲分府惟擇老成宿望大臣如朱軾鄂爾泰傅敏張廷玉蔡世逺等勸讀內廷聖謨深逺慈覆如天朕纘承以來恪遵家法今皇子等讀書內廷亦惟慎簡師傅俾之薰陶德性講習經書日有程課其視出閣就傅有名無實者相去為何如耶夫豫教固所當重實則存乎人此蒼穹之敷佑宗社之貽庥景運靈長有非人力所致者矣㑹典載詹事官春秋進講虛文縟節甚屬無謂又如皇太子賀箋論體制當由內閣撰擬乃由詹事頒發此亦前明坊局閒曺借以招事示權已耳果爾則賀皇太后皇后表箋亦當由內務府頒發耶此皆沿襲之謬著該總裁官改正進呈四十八年九月戊午奉上諭朕閲館臣所進職官表志詹事府一門其按語內稱詹事為東宫官屬我國家萬年垂統家法相承不事建儲冊立詹事府官員留以備詞臣遷轉之階等語是書館臣因朕前降諭㫖于建儲一事之斷不可行明切訓示故于按語內特為揭出其實書生拘迂之見豈能深計及此且使是書留傳後世安知不又訾議館臣為無奈迎合諭㫖非其本懷耶用是不得不再為明白宣諭夫堯授舜舜授禹唐虞固公天下禹之傳啓亦非於在位時有建立太子之事三代以後人心不古秦漢預立太子其後爭奪廢立禍亂相尋不可枚舉逺而唐髙祖立建成為太子至於兄弟相殘建成被害近而明神宗朝羣臣奏請預立國本紛紜擾亂大率皆為後來希榮固寵之地甚至宵小乘間伺釁釀為亂階如挺擊等案神宗召見太子泣為慰藉父子之間至于如此閲之真可寒心可知建儲冊立非國家之福召亂起釁多由于此即我朝而論皇祖時理密親王亦嘗立為太子且特選公正大臣如湯斌者為之輔𨗳乃既立之後性情乖張即湯斌亦不能有所匡救羣小復從而蠱惑遂致屢生事端上煩皇祖聖慮終致廢黜且即理密親王幸而無過竟承大統亦不過享國二年其長子𢎞晳縱欲敗度不克幹蠱年亦不永使相繼嗣立不數年間連遭變故豈我大清宗社臣民之福乎是以皇祖有鑒于兹自理密親王既廢不復建儲逮我皇祖龍馭上賓傳位皇考紹登大寶十三年勵精圖治中外肅清皇考敬法前徽雖不預立儲位而于宗社大計實早為籌定雍正元年即親書朕名緘藏于乾清宫正大光明匾內又另書密封匣以隨身至雍正十三年八月皇考升遐朕同爾時大臣等敬謹啓視傳位于朕之御筆復取出內府緘盒密記核對吻合人心翕然此天下臣民所共知也朕登極之初恪遵家法以皇次子乃孝賢皇后所生嫡子為人端重醇良依皇考之例曽書其名藏于乾清宫正大光明匾額後乃禀命不融未幾薨逝遂命大學士鄂爾泰張廷玉將其名撤出追諡為端慧皇太子是未嘗不立嫡也但不以明告衆耳嗣後皇七子亦孝賢皇后所出秉質純粹深愜朕心惜不久亦即悼殤其時朕視皇五子于諸子中覺貴重且漢文滿洲蒙古語馬步射及算法等事並皆嫺習頗屬意于彼而未明言乃復因病旋逝設依書生之見規仿古制繼建元良則朕三十餘年之內國儲凡三易尚復成何事體是以前于癸巳年復書所立皇子之名藏于匣內常以自隨是年南郊大祀令諸皇子在壇襄事曽以所定皇子默禱于上帝若所定之子克承堂構則祈昊蒼眷佑俾得年命延長倘非天意所屬則速奪其算朕亦可另為選擇毋悮我國家宗社生民重寄本年恭詣盛京祗謁祖陵亦如告天之言默祝于太祖太宗之前仰祈靈爽式慿永垂昭鑒朕非不愛子也誠以宗社為重若朕之子孫皆以朕此心為心實大清國億萬斯年之福也今日召對諸皇子及軍機大臣面降此㫖即朕前所默告上帝祖宗之言豈容有絲毫虛飾耶朕于天下一切庶務無不宵旰勤求悉心籌畫寧于繼體付託之重轉不早為定計乎秋間朕于避暑山莊河岸御鎗打鵁鶄失足落水濕衣其時不特御前王公大臣等聞知俱即趨至問安即漢軍機大臣亦接踵前赴該處朕仍率伊等談笑而行並未有因內廷禁地太監等敢于阻止者設朕起居偶有違和大臣等俱可直詣寢所此皆由朕平日君臣一體無日不接見諸臣面承諭㫖何至有若前代夜半禁中出片紙之語為杞人之憂乎總之建儲一事即如井田封建之必不可行朕雖未有明詔立儲而于天祖之前既先為齊心默告實與立儲無異但不似往代覆轍之務虛名而受實禍耳故現在詹事官屬雖沿舊制而其實一無職掌祗以備員為翰林升轉之資耳因再明切宣諭我子孫其各敬承勿替庶幾億萬年無疆之休其在斯乎總之此事朕亦不敢必以為是其有欲遵古禮為建立之事者朕亦不禁至於父子兄弟之間猜疑漸生釀成大禍時當思朕言耳並諭館臣將此㫖冠于是編之首俾天下萬世咸知朕意十月庚子諭曰朕歷覽前代建儲諸弊及我朝家法相承於立儲一事之不可行已明降諭㫖宣示中外至史冊所載因建立儲二致釀事端者不可枚舉自當勒成一書以昭殷鑒著皇子等同軍機大臣及上書房總師傅等將歷代冊立太子事蹟有關鑒戒者採輯成書陸續進呈即著皇孫等之師傅為謄録書成名為古今儲二金鑑十二月壬辰諭曰朕恭閲康熙三十二年聖祖實録禮部奏祭奉先殿儀注將皇太子拜褥設置檻內上諭尚書沙穆哈曰皇太子拜褥應設檻外沙穆哈即行奏請諭㫖記於檔案經聖祖降㫖交部嚴加議處部議革職一事禮臣安設拜褥未協既經聖祖面諭已遵奉移設乃沙穆哈胸中即豫存畏忌皇太子之見奏請諭㫖記檔以為後日卸責地步我皇祖洞燭其隱將伊革職皇祖之仁慈大度皇太子維時年幼尚無縱恣事蹟禮臣因關係儲位即心懷顧忌如此厥後日漸失德致遭黜廢夫仁如聖祖冊立儲二猶致有理密親王之事設後之人主未能如聖祖之慈愛明哲而為太子者又不能小心謙謹必致漸生嫌隙鮮有能始終獲保萬全之理可見建儲冊立之斷不可行也在書生拘迂之見必有竊議其非而後之人不思深慮逺仍踵前轍或啓事端彼時當益信朕言之早經灼見耳前經朕叠頒諭㫖明切曉諭並令皇子同總師傅軍機大臣編輯古今儲二金鑑垂示久逺因恭閲皇祖實録禮臣安設拜褥請㫖記檔即此一節益可見朕所慮之不爽並令編入古今儲二金鑑卷首四十九年正月庚子奉上諭皇長孫綿德前因與革職禮部郎中秦雄褒往來餽遺書畫革去承襲定郡王嗣後加恩封為公爵綿德為皇長子定安親王嫡長子係朕長孫設如書生拘迂之見若明洪武時懿文太子既殁劉三吾建議謂皇孫世嫡禮宜承統洪武泥于法古遂立建文為皇太孫其後釀成永樂靖難之變禍亂相尋臣民荼毒皆劉三吾一言喪邦之所致也朕惟深鑒于歷代建儲之失是以再三宣諭並令纂輯儲二金鑑一書為萬世法戒若如洪武之泥古立儲封建以祖宗神器之重輕為付託豈我大清宗社萬年之福乎今念綿德之子奕純新嵗可以得子朕慶抱元孫五世一堂實為古稀盛事自應特沛恩施以衍奕祀雲礽之慶綿德著加恩晉封固山貝子嗣後宜益加謹飭常存敬畏以期永承恩澤副朕諄切訓勉之至意此㫖並著入于儲二金鑑十二月上召訓諸皇子大學士軍機大臣諭曰昨和珅福長安伊齡阿覆審內務府郎中海紹妄斷地畝釀成人命一案訊出海紹曾于上年十月具稿呈堂內務府大臣俱經閲畫而原參摺內未將曽經畫稿之處聲明實屬回護請將內務府大臣交部嚴加議處朕以內務府大臣取巧回護自應嚴議乃述㫖時僅寫餘依議字樣竟未聲明叙入經朕硃筆添出蓋因六阿哥兼管內務府欲為之隱諱耳方今綱紀肅清諸皇子皆謹慎小心奉公守法諸臣亦斷無有畏憚迎合者而因有皇子在內形迹之間猶不免稍存瞻顧此甚非也即朕有錯誤處不容大臣及御史等明言乎即如前代之建儲冊立其流弊不可屈指數朕近閲皇祖聖祖仁皇帝實録康熙三十六年八月上諭內務府總管海喇孫等膳房人花喇額楚哈哈珠子德住茶房人雅頭伊等私在皇太子處行走甚屬悖亂著將花喇德住雅頭處死額楚交與伊父英赫紫圈禁家中一事其時理密親王尚在年幼皇祖何等英明而膳房人花喇等即敢心存彼此依附覬覦皇祖洞燭先幾將花喇等正法以示懲創厥後羣小復從而蠱惑遂致屢生事端上煩皇祖聖慮終至廢黜自理密親王既廢不復建儲逮我皇祖傳位皇考十三年勵精圖治中外肅清及朕纘承洪業五十年間日理萬幾朝乾夕惕重熙纍洽海宇升平使理密親王及𢎞晳父子繼踐尊位不數年間屢遭事故豈大清宗社臣民之福乎夫以我皇祖之慈愛明哲猶有理密親王之事設後之人主未能如皇祖之仁慈英斷而為太子者又不能小心謙謹必致漸生嫌隙鮮有能始終獲保萬全之理可見建儲冊立之斷不可行也又朕偶閲續通志載李林甫搆陷太子瑛一事紀載未明因檢查通鑑輯覽稱明皇惑於武惠妃之譛欲廢太子瑛張九齡犯顔强諫武惠妃密使宫奴謂九齡曰有廢必有興若為之援宰相可長處九齡叱之即以其語奏聞明皇為之動容九齡實賢臣若明皇能斷應立抵武惠妃之罪乃致九齡反罷斥李林甫專國阿附宫闈搆陷太子卒與鄂光二王廢黜同日賜死夫以儲位之故搆煽交乘致明皇一日而殺三子天下銜寃足見儲二一建幻起百端弟兄既多所猜嫌宵小且從而揣測其懦者獻媚逢迎以陷于辜其强者設機媒孽以誣其過往往釀成禍變遂致父子之間慈孝兩虧而臣工亦必由此身罹刑憲平心而論其事果有益乎無益乎朕即位之初即默告上天若䝉穹蒼眷佑願如皇祖御極六十年之久不敢復有奢望其時朕年甫二十五嵗並未計及六十年當至八十五嵗至過五旬萬夀後始億及此因暇日侍聖母時面奏及此曽䝉慈諭皇帝如此勤政愛民天下臣民亦必不肯聽皇帝歸政朕因默念若得上天嘉佑聖母夀踰百齡朕即八十五嵗亦何敢即言歸政今既始願不遂追憶斯言實深悲咽朕春秋七十有四距歸政尚十一年自當仰體上天愛養億兆董治百官猶日孜孜不敢自暇逸倘蒙嘉貺將來得歸政頤養親為授受豈非古今稀有之盛事而朕之心亦可明於天下後世朕辦理天下一切大小庶務無不宵旰勤求悉心籌畫即安置一物亦必期其穩妥寧於繼體付託之重轉不早為詳慎定計是朕非不立儲特不肯效立儲之虛名俾衆人有所窺伺致父子之間有責善則離之不祥爾此正朕維持調護之殷衷天地祖宗實鑒朕心若子子孫孫皆能以朕此心為心則我大清億萬年可永承鴻貺於無疆也總之立儲一事如井田封建之必不可行尚有過之將來書生拘墟之見必有心生竊議且謂今日諸臣有意迎合不知此等陽為國家根本之論而陰實遂其鑽營結納之私即億萬年後朕之子孫有泥古制而慕虛名復為建立之事者亦所不禁但人心不古如江河日下之勢父子之間必有為小人搆成釁隙復啓事端彼時始信朕言之不爽然悔已晚矣此事前屢頒訓諭並令皇子及總師傅軍機大臣等編輯古今儲二金鑑垂示久逺兹恭閲皇祖實録處治膳房人花喇等事用是再行明切申諭並著補載入古今儲二金鑑冊封親王親王世子郡王儀凡冊封親王及世子命下禮工二部製冊寶皆以金若嗣封王注名於冊寶世相傳授預期禮部諏吉奏請命內大臣散秩大臣一人為使內閣學士翰林院學士禮部侍郎一人副之届期鴻臚寺官設案於太和殿丹陛正中南向王府官備鼓吹一部於長安門外鑾儀衛設采亭於禮部堂上儀制司官陳節冊寶於亭內校尉舁亭由東長安門入至太和殿階下亭止奉節升階陳於案封使及執事官朝服俟於丹墀禮部侍郎升東階就節案左右封使升東階詣案前北面西上侍郎舉節西面授正使持節偕副使降階鑾儀校舁采亭從導以御仗出太和中門至長安門外封使及執事官咸乘馬鼓吹前導詣王邸第是日府屬官預設節案於堂內正中前設香案均南向左設冊寶案西向設樂於儀門內設儀仗於庭中封使及王府第門下馬正使持節前行副使奉制冊禮部官奉寶隨行樂作王率所屬官朝服迎於大門外道右跪候過興隨入樂止正副使奉節冊禮部官奉寶由中階升堂各陳於案正副使就案東立宣冊官禮部官立於其後均西面引贊引王升西階就堂內北面立樂作贊行三跪九叩禮興樂止進至香案前跪禮部官詣冊案展制冊宣冊官西面宣讀訖以制冊授正使正使授王王祇受轉授從官從官跪接興陳於案次宣寶訖以授副使副使授王如受冊儀封使皆復位立王退立拜位樂作行三跪九叩禮畢樂止正使奉節出副使及執事官從王率屬出大門外跪送如初迎儀封使回還節有司皆退若冊封郡王製冊印皆銀質金飾餘與親王及世子同册封郡王長子貝勒貝子儀凡册封郡王長子貝勒貝子命下工部製制册以紙為之前期禮部奏請命內閣侍讀學士侍讀翰林院侍讀學士侍講學士侍讀侍講一人為正使禮部郎中員外郎主事一人副之屆日鴻臚寺官設案於太和殿階下正中禮部儀制司官奉節册於采亭鑾儀校舁行入至殿階下陳節於案陳采亭於案左封使及執事官入俟丹墀禮部侍郎就節案左立封使詣案前北面侍郎舉節西面授正使正使持節出鑾儀校舁亭導以御仗副使及執事從出太和中門至長安門外乘馬詣府第如封諸王儀是日府屬官設樂於儀門內設儀仗於庭中長子貝勒貝子迎節册受冊送節均如諸王儀冊封公主儀凡冊封公主正使用內大臣散秩大臣副使用禮部滿侍郎內閣滿學士翰林院滿掌院學士劄欽天監擇吉後行文各該衙門移取銜名開列奏請欽派正副使仍將冊封儀注奏聞得㫖行知正副使及公主府行太常寺派宣讀官部派筆帖式二員前引凡分别固倫和碩品級應備冠服儀仗俱於指婚後奏明凡冊封公主命下工部製冊以金禮部諏吉奏請命正副使持節往封如親王之儀是日府屬官豫設節案於公主府㕔事正中前設香案左設冊案設樂於儀門內設儀仗於庭中封使及府門下馬正使持節入采亭從公主禮服率侍女迎於儀門內道右跪候過興副使奉冊隨節升自中階以節冊陳於案退就案東立宣冊官禮部官立於其後均西面侍女引公主由西階升詣堂中北面立樂作行六肅三跪三叩禮興樂止進至香案前跪禮部官詣冊案展制冊宣讀官西面宣冊訖正使奉冊授內監內監跪接授侍女侍女跪授公主公主祇受仍授侍女陳於案公主興退就拜位行六肅三跪三叩禮畢樂止正使奉節出副使及執事官從公主跪送節於儀門如初迎禮封使回還節有司皆退冊封福晉夫人儀凡親王世子郡王福晉長子貝勒貝子夫人間五嵗禮部彚疏請行冊封禮制冊封使各視其夫爵是日鴻臚寺官設案於太和殿階下禮部奉節冊視彚節人為冊封數於采亭鑾儀校舁入至殿階下陳節於案陳亭於案左各府屬官備鼓吹於長安門外封使及執事官朝服入俟丹墀禮部侍郎率屬立節案左封使詣案前禮部奉各節授正使鑾儀校舁亭副使及執事官從出太和中門至長安門外乘馬鼓吹前導詣各府第福晉等迎節册受冊送節均如公主儀冊封郡主縣主郡君縣君儀與封福晉夫人同凡封郡主縣主郡君間五嵗禮部彚請遣使往封均用紙冊凡親王嫡繼福晉所生女俱封郡主側福晉所生女降二等封郡君親王世子郡王嫡繼福晉所生女俱封縣主側福晉所生女降二等封縣君凡親王郡王妾所生女均不准封郡王長子貝勒嫡夫人所生長女封郡君其餘俱作為側夫人所生之女貝子嫡夫人所生長女封縣君其餘俱作為側夫人所生之女入八分公嫡夫人之長女封鄉君其餘俱作側夫人所生之女凡貝勒以下准封嫡出之女一人其餘及側夫人妾所生之女均不准封凡親王郡王庶出女許字外藩者照公嫡出女之例請封凡郡王等有降革者令將原封冊誥繳回乾隆十三年三月議准宗室庶女從無受封之例有許字䝉古者念其逺適外藩格外加恩以示優禮嗣後本家奏准許婚後報宗人府請㫖交部照例具題二十七年四月奉㫖凡王公之女請封俱先呈報宗人府再行知禮部三十七年九月鑲黃旗滿洲都統奏准郡君額駙明亮奉㫖降為二等侍衛職銜其妻郡君停給俸祿冊內填寫降級緣由三十八年正月奉㫖嗣後福晉及多羅格格以上俱稱位其夫人以下概應稱人不得稱位四十三年四月輔國將軍特通額之次女請封四十六年十月貝子明韶之次女請封俱因長女自幼病故禮部奏明請㫖給封四十四年十月諴親王𢎞暢之四女五女照親王嫡出女授為郡主品級嗣於四十八年十月彚封題准𢎞暢已緣事降為郡王其女應照郡王嫡出女之例降封縣主品級製給冊誥