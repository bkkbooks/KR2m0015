front:
  text: 欽定四庫全書皇朝文獻通考卷一百七十四
  hash: sha256:caf2586e97f3c0062f4e1b06209451d92e4d8eaab94b64b6075881e5480254db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_174-1a, image: WYG0635/WYG0635-0817a.png}
body:
  text: 樂考二十俗部樂女樂附臣等謹按俗樂之異於雅樂者其調從濁至清更迭為用下則益濁上則益清其聲器寖殊雖有宫調之名而聲不近於古如漢晉之清樂隋之七部樂唐之教坊九部樂宋之雲韶部鈞容直馬端臨考皆以列於俗部者也國初亦設立教坊司而朝會宴享所奏有用時俗曲調者蓋沿明代之舊也逮雍正七年改教坊之名除樂户之籍盡革前明陋制我皇上欽定樂章中和雅奏盡美盡善善夫房庶之言曰使知樂者由今之樂寄古之聲而一出於雅正非治世之音乎蓋政和而民樂則今樂猶古樂矣至於傳竒雜劇倡自元人相沿不廢然其定音取調古法猶存且艷曲淫詞久經禁止是雖遊戲俗樂亦足以感人心而導和氣焉若夫閭閻習俗隨地不同如彈詞秧歌之類亦古衢歌巷舞之遺意也所在多有兹不具載國初教坊司樂凡筵宴進果丹陛樂奏喜得功名進酒丹陛樂奏朝天子進饌清樂奏金殿喜重重小宴進果丹陛樂奏喜得功名進酒丹陛樂奏朝天子進饌清樂奏三月韶光耕藉筵宴皇帝至齋宫導迎樂奏天下樂皇帝升殿丹陛樂奏萬嵗樂行禮丹陛樂奏朝天子進果管絃樂笙簫合奏朝天子次奏望吾鄉進酒丹陛樂奏三月韶光次奏黃薔薇進饌清樂奏太清歌徹饌丹陛樂奏啄木耳次奏黃薔薇次奏紅衲襖次奏調笑令次奏鬼令次奏清江引次奏看花會俱教坊司承應臣等謹按教坊之名昉於唐元宗置左右教坊以教俗樂後世因之我朝初制分太常教坊二部太常樂員例用道士教坊則由各省樂户挑選入京充補凡壇廟祭祀各樂太常寺掌之朝會宴享各樂教坊司承應順治八年停止女樂改用太監舊制太皇太后宫皇太后宫慶賀行禮作樂俱教坊司婦女承應至是改用太監四十八名臣等謹按順治十二年仍改女樂四十八名至十六年復改用太監遂為定制雍正元年除樂户籍各省樂户皆令確查削籍改業為良若土豪地棍仍前逼勒凌辱及自甘汚賤者依律治罪更選精通音樂之人充教坊司樂工七年改教坊司為和聲署乾隆七年更定和聲署樂員樂工名目并奏樂舊用戲曲者均改撰樂章和碩莊親王等奉諭旨和聲署樂工皆民間屠沽之輩即加教訓豈易通曉伊等在署當差徒誤其衣食生理朕意須令掌儀司人員承應方能妥協俟樂章既定之後將和聲署樂工作何裁汰并朝會日期如何令掌儀司率領所屬人員承應之處王會同三泰詳悉定議具奏尋議和聲署本前明之教坊司由各省樂户挑選應差顧民間恥𨽻教坊召募不應於是改為和聲署始有五城鼓手應差然世業子弟仍是樂户而新充鼓手又屬屠沽欲其鏗鏘應節誠所難能况乎殿陛趨蹌豈容此輩欲加釐正必先得可以肄習之人今詳悉定議一查和聲署奉鑾一員左右韶舞二員左右司樂二員協同十五員並正九品俳長無定員未入流樂工一百二十名奉鑾等官品秩雖卑究亦一命之士豈容汙賤之人忝竊向因教坊名不雅馴無人肯充並用世業子弟今遵旨令內務府掌儀司辦理其奉鑾等官各名目應請另定嘉名以别於舊其員缺於掌儀司所屬人員內挑選補授至新舊交代不宜太驟現今奉鑾等官雖經裁汰仍請暫留與新員一體當差俟一年之後新員習熟然後令奉鑾等官住俸歸農一額設樂工一百二十名現不足額臨期雇民間鼓手承充今請將現存人員內逐一挑選如果有出身清白又能通曉者不妨仍令當差如果無人一概裁汰除掌儀司所屬人員內有通曉音律者可以充當承應外其不敷之額必須别簡承充但此等通曉音律之人本無定額今令充當承應須有定員查鑾儀衛有鼓手八十名頭目八名俱是內務府人員此外尚有民校尉三百六十名係漢人充當又有六十名將內務府借充今請將此六十名竟改歸內務府於佐領管領下間散人內挑選學習並於掌儀司所屬內通曉音律者派出頭目將二項人員一併教習至鼓手名目既係俗呼而樂工二字又人所輕賤亦應更易其名請將奉鑾等裁去更其名為滿漢署正各一員滿漢署丞各一員鼓手樂工人等總名為署史而以所司之樂器分别其名曰司鐘司磬司琴司瑟視一器應用若干人之處另行派撥分定員額一和聲署職掌內如大宴進果進酒進饌樂章俱仍明代之舊並用戲曲一闋如喜得功名之類奏於殿廷殊屬非體應令律吕正義館撰擬至凡大祀中祀耕藉視學進表進實録玉牒時憲書文武狀元筵宴謝恩迎送金榜並有導迎之樂春秋二季各小祀如城隍廟賢良等祠並用戲曲牌名鼓吹承應又耕藉筵宴文武會試主考衍聖公等筵宴舊例俱承應作樂請交律吕正義館詳考舊章查辦定議得旨大學士等議奏嗣經大學士伯鄂爾泰等議覆查樂工額數未足必出身清白通曉音律者始克充選今既稱鑾儀衛有鼓手頭目可以學習並借充校尉六十名俱係內務府人員應準其移𨽻內務府挑選其奉鑾等官更名為滿漢署正署丞鼓手樂工總名為署史以所司樂分别其名命名定秩俱屬允當至和聲署職掌各樂有仍用戲曲者自應令該館撰擬樂章得旨允行南北曲調宫譜宋燕樂以夾鍾收四聲曰宫曰商曰羽曰閏閏為角其正角聲變徵聲徵聲皆不收而獨用夾鍾為律本宫聲七調曰正宫曰髙宫曰仲吕宫曰道宫曰南吕宫曰仙吕宫曰黃鍾宫商聲七調曰大石調髙大石調雙調小石調歇指調商調越調羽聲七調曰般涉調高般涉調仲吕調平調南吕調仙吕調黃鍾調角聲七調曰大石角髙大石角雙角小石角歇指角商角越角此四聲二十八調之大略也世傳曲譜北曲宫調凡十有七南曲宫調凡十有三大抵祖二十八調之舊而其義多不可考夫南北風氣固殊曲律亦異然宫調則皆以五聲旋轉於十二律之中廖道南曰五音者天地自然之聲也在天為五星之精在地為五行之氣在人為五臟之聲由是言之南北之音節雖有不同而其本之天地之自然者不可易也今合南北曲所存燕樂二十三宫調諸牌名審其聲音以配十二月正月用仙吕宫仙吕調二月用仲吕宫仲吕調三月用大石調大石角四月用越調越角五月用正宫髙宫六月用小石調小石角七月用髙大石調髙大石角八月用南吕宫南吕調九月用商調商角十月用雙調雙角十一月用黃鍾宫黃鍾調十二月用羽調平調如此則不必拘拘於宫調之名而聲音意象自與四序相合羽調即黃鍾調蓋調闕其一故兩用之而子當夜半介乎兩日之間於義亦宜也閏月則用仙吕入雙角仙吕則正月所用雙角即十月所用合而一之履端於始歸餘於終之義也夫律吕雖十有二而用之止於七五聲二變合而為七音近代皆用工尺等字以明聲調四字調乃為正調是譜皆從正調而翻七調七調之中乙字調最下上字調次之五字調最髙六字調次之今度曲者用工字調最多以其便於髙下惟遇曲音過抗則用尺字調或上字調曲音過衰則用凡字調或六字調今以仙吕宫為首調工尺調法七調俱備下不過乙髙不過五旋宫轉調自可相通也若夫曲之髙下疾徐皆從板眼而出板眼有定節奏乃成聲初出即下者曰迎頭板亦曰實板字半而下者曰掣板亦曰腰板聲盡而下者曰底板亦曰截板板之細節曰眼一板原有七眼連板為八數北曲落板有一起三四調俱作底板其落板之曲或有於第三四句方落實板或一兩句已落實板而忽義搜板不落或煞尾前半闋巳落實板後半闋作收煞每句用一底板此皆度曲之跌賺總之北曲貴乎跌宕閃賺故板之緩急亦變動不拘常有一字而下三四板者至襯字多處亦不妨增一二板以就之此北曲之與南曲不同也皇朝文獻通考卷一百七十四
