  text: 欽定四庫全書皇朝文獻通考卷一百二十七
  hash: sha256:f0e96dfc15ff7970b5514c0dc4dae687972887384585bd0ebca56e683dfecedd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_127-1a, image: WYG0634/WYG0634-0777c.png}
body:
  text: 王禮考三朝儀常朝謝恩儀附臣等謹按常朝之禮唐時有朔望御太極殿文武職事官九品以上皆入朝文官五品以上日參號常參官武官三品以上三日一朝號九參官五品以上五日一朝號六參官宋初以文徳殿入閣為常朝之盛禮文武官每日赴文德殿正衙曰常參五日一赴崇徳殿或垂拱殿曰起居熙寧以後罷入閤儀始定月朔御文德殿望日御紫宸殿而常參六參朔望參其儀不廢由金迄明朝參常朝制亦與唐宋等本朝大典以每月五日十五日二十五日為常朝之期先期鴻臚寺奏請御殿王公百官應謝恩者及外國陪臣以次行禮若不御殿則王公列坐於太和門外百官列坐於午門外内務府官列坐於右翼門外糾儀官察其失儀者移時乃退所以昭儀度而辨品秩也若夫常朝之外八旗官員則於月朔及十日二十日坐班左右翼王公分單雙日坐班上三旗領侍衛大臣侍衛等每日坐班滿漢御史司員各加糾察是仿唐宋常參六參之意而益精詳也今皆著於篇崇德元年定每月初五十五二十五日御殿聽政及各官謝恩儀凡王以下各官遇陞賞等事於每月常朝日行謝恩禮王貝勒貝子等謝恩者皆啟奏進内行禮官員有功陞賞者亦啟奏進内行禮其因事謝恩者於大清門外行禮革職官不許具朝服行禮外藩王貝勒貝子及外藩官謝恩亦於常朝日行禮凡王以下文武官陞遷謝恩者行三跪九叩禮賜銀幣等物行二跪六叩禮賜食行一跪三叩禮凡賞賚謝恩皆常服不贊是嵗五月諸王貝勒等以賜儀仗皆入清寧宫丹墀謝恩次衆官欲謝恩禮部官奏曰官員甚衆若俱入清寧宫丹墀行禮恐不能容札蘭章京以下應於大清門外行禮太宗文皇帝曰向例惟獲罪官員方在外逺處謝恩豈可因人多不容遂令門外行禮乎因俱令入内行禮八年命吏部定王貝勒貝子公等失誤朝㑹處分例凡常朝之期有一次不到者親王罰大牛一郡王罰中牛一貝勒罰中次牛一貝子罰小牛一公等罰羊一若借稱有事失誤朝㑹者送法司治罪順治八年九月重定謝恩儀禮部擬定儀注王以下各官以上陞級授官謝恩王貝勒貝子公大臣等出師凱旋受賞謝恩王以下文武各官以上及喀爾喀貢使朝見俱設鹵簿奏樂鳴鐘鼓上御太和殿鳴贊官唱贊行禮王以下官員以上欽命婚娶者或於中和殿或於位育宫俱朝服行禮不唱贊其不時賞賚謝恩便服行禮亦不唱贊從之九年二月定常朝之期禮部議覆科臣楊黄疏言舊例百官每月十一朝似太煩數今應於每月初五十五二十五日上御太和殿在京文武百官俱穿朝服入朝行朝參禮凡陞選起用及朝見辭朝等官有應面朝者俱於太和殿前丹墀行禮其餘俱於午門外行禮從之八月定常朝儀凡朝期上御太和殿鹵簿全設奏中和丹陛樂鳴鐘鼓鳴鞭内大臣侍衛列殿内兩傍王以下輔國公以上集於常朝房文武各官列午門外其謝恩辭朝陛見等官該部分别應在内在外行禮先期奏聞親王以下文武官進爵陞官及王貝勒貝子公大臣出征凱旋賞賚及諸恩賜俱於常朝日進内聴唱贊行禮漢軍漢人官員赴任及外省朝覲應行禮各官亦進内行禮應在外行禮各官俱於午門外行禮如是日不御殿赴任及朝見官員均在午門外行禮外藩王以下公台吉以上來朝及喀爾喀厄魯特諸部落入貢使臣亦於常朝日行禮又定八旗武官坐班儀凡八旗武官除大朝常朝外每月初一初十二十日具公服於午門外分翼坐班如遇巡幸除朝期外每日於午門外坐班用常服十年定常朝日謝恩見辭文武官四品以上太和殿前行禮五品以下午門外行禮十二年定朝期王以下公以上在午門内朝房齊集又禮部奏嗣後常朝御殿謝恩各官行禮諸王貝勒貝子公等應進殿兩旁排立俟各官行禮畢賜茶候㫖列坐俟駕還宫方出從之十八年定王公百官行禮位次凡大朝及常朝親王以下入八分公以上在丹陛上行禮不入分公以下於丹墀内行禮又定常朝日如遇御殿文武陞賞各官及京官外陞外官來京應行禮者不論品級皆於殿前行禮如免朝於午門外行禮康熈九年令都察院糾察諸王大臣失儀者諭都察院曰國家朝儀大體所在貴於整肅嚴飭不止係堂陛之觀瞻亦以見臣心之敬肆諸王大臣有踰越班行交相接語或輕佻嬉笑禮不踰階而相與言又况其甚乎爾衙門監察御史侍班切近見而不糾皆縁畏事徇情所以如此都察院職任重大朕躬有失尚爾指陳王及諸臣乃不參奏揆之事理實所未協今後有失儀者毋得容隠十年禮部議準凡遇應具朝服日奏事官咸朝服補服違者本部指叅十二年又議凖官員宜具朝服日而服不如制者罰俸一月十四年禮部議每月常朝日御殿行禮後羣臣入内奏事止具補服如不御殿仍具朝服二十年設常朝糾儀御史及司員凡常朝及八旗上朝坐班之日班首以滿漢御史各一人班未以滿漢御史各一人吏部禮部亦委滿漢司官監察如有越次私語或互相背坐及先自起散者指名題參雍正二年三月遣侍衛四人監察朝班凡常朝日遣侍衛四人監看如有坐立越班跪拜失儀御史指示侍衛即指名拿參交刑部治罪又定凡御殿日未明以前鴻臚寺官左右各二人引左右翼官從兩掖門入各就本班坐鼓嚴咸起立聽唱贊由仗南引進依次排班行禮乾隆元年三月諭曰每月逢五朝期鴻臚寺照例奏請御殿朕雖未准行而未經降㫖曉諭蓋此二十七月之内如遇國家重大典禮萬不可已者間一御殿外此概不舉行從前諭㫖甚為明晰似此朝會常儀理應停止俟二十七月之後再行奏請又奉諭嗣後御門聴政若遇逢五日朝期各官咸補服奏事不必用朝服永著為令二年申嚴常朝坐班儀凡朝期除内廷行走各官外凡滿漢文武大小官均於黎明齊集坐班如有事故先期於朝單内聲明至期都察院吏禮二部官稽察有無故不到者指名叅奏三年定每月八旗官員坐班日初一初十二十日禮部兵部各派司官二人稽察又定文武月選官謝恩儀凡文武官選授之後吏兵二部開列名單知㑹鴻臚寺俟領慿領劄十日之内鴻臚寺傳集演禮四品以上於午門外五品以下於天安門外謝恩逾期不到者四品以上由鴻臚寺指名題叅四品以下送吏兵二部察議彚奏六年奏准每逢朝期八旗官員除有公事外不赴朝班者稽察御史㑹同該部將官員過少旗分察明縁由指叅交部察議七年六月諭内閣昨日陞殿遇雨謝恩大臣官員及御前侍衛乾清門侍衛大門侍衛内務府官員等冠服未免霑濕著各賞給正俸之半十六年七月諭此次陞殿行禮時遇雨霑濕衣帽之大臣官員等著各賞給正俸半年御前大臣侍衛乾清門侍衛亦照此賞給十二月禮部奏上朝官員宜朝服親投職名由東西掖門分入以便稽察常朝坐班各部院大臣宜董率庶僚按期到班母許曠闕從之十七年四月禮部奏常朝坐班向無定時今定春冬以辰正夏秋以夘正屆時各官依次列坐後至者指叅從之又定各部院堂官惟實有事故不能到班方許於册内聲明若遇本署奏事仍留一人率屬就列毋得曠闕二十八年七月更定外官謝恩例凡文武月選官于給發慿劄日齊集吏兵二部先期行知鴻臚寺派員率領謝恩其各省㨂發陞調薦舉卓異預行保舉官員例應給照者由部彚齊人數定期知照鴻臚寺率領謝恩再行給照赴任二十九年六月更定外官謝恩例凡外任文武各官引見後仍令吏兵二部將職名咨送鴻臚寺由寺定期傳示帶領謝恩三傳不到者鴻臚寺按季彚參三十五年定外藩使臣朝賀儀凡外藩使臣來京應入於何班朝賀俱由禮部先期奏請是年猛拱頭目興堂札貢象來京奉㫖隨五品班之末行禮又蒿漢使臣來京奏准入於三品班之末行禮三十八年哈薩克阿布賴遣子阿苐勒素坦來京禮部具奏行禮班次奉㫖交軍機大臣查奏入於蒙古公之次回子之前其同來瑪木克等入於三品班之末四十年閏十月禮部以土爾扈特郡王策楞德勒克來京恭遇皇帝陞殿奏准入于蒙古王公之次行禮常朝儀每月五日常朝之期皇帝有㫖陞殿謝恩各官具銜名送鴻臚寺列疏交送内閣至日五鼓所司豫設案一於太和殿内之西陳筆硯樂部和聲署入展中和韶樂於殿檐前展丹陛樂於太和門檐下鑾儀衛率官校入陳法駕鹵簿鳴鞭仗馬步輦五輅馴象鼓吹常朝象依次如式侍班執事官王公文武百官班位如朝賀儀右陳設序位漏未盡王公文武百官朝服外國陪臣以時至者服本國服畢會闕下質明侍班執事官入就位鴻臚寺官按翼序定王公班次由午門左右門太和門左右門引入序定文武百官班次由午門左右掖門昭德門貞度門引入又序定外國陪臣班次引隨西班百官後入咸就位立鴻臚寺卿二人鳴贊官二人詣乾清門奏請御殿午門鳴鐘鼓皇帝禮服乘輿出宫鴻臚寺卿前導前引後扈如朝賀之儀至大和殿北階降輿入中和韶樂作奏隆平之章皇帝御太和殿陞座樂止鑾儀衛官贊鳴鞭丹墀内三鳴鞭丹陛樂作奏慶平之章鴻臚寺官引謝恩官出班其餘百官俱按本班立序立贊進皆進贊跪皆跪贊叩興王公百官行三跪九叩禮興贊退各復原位立樂止又贊進鴻臚寺官引外國陪臣進就西班拜位立丹陛樂作奏治平之章贊行三跪九叩禮畢鴻臚寺引退復位立樂止乃賜茶儀詳三大節畢丹墀内三鳴鞭中和韶樂作奏顯平之章皇帝還宫樂止鴻臚寺分引王公百官依次出退右朝儀臣等謹按中和韶樂每嵗十二月各有常朝樂章依所值歌之其辭載樂考常朝日坐班儀先期八旗部院寺具朝官名册送六科至日黎明王公百官朝服畢會闕下鴻臚寺官序定王公班位於太和門外東西各二班按翼分列親王郡王貝勒一班貝子入八分公一班皆東西面北上如巡幸聖駕日王公常朝位於午門外左右序定百官班次午門外朝房前東西各九班東班鑲黄正白鑲白正藍四旗吏部户部禮部宗人府通政司翰林院詹事府太常寺光禄寺鴻臚寺國子監吏科户科禮科内閣中書欽天監太醫院以次在左翼四旗之南西班正黄正紅鑲紅鑲藍四旗兵部刑部工部都察院大理寺鑾儀衛大僕寺中書科兵科刑科工科順天府京縣五城兵馬司三營以次在右翼四旗之南公侯伯以下世爵暨文武品官各依序為位詳見三大節皆東西面列坐重行北上糾儀御史二人吏部禮部司官各二人分位東西班首糾儀御史二人吏部禮部司官各二人分位東西班末均東西面北上右班位列坐之節春冬以辰正夏秋以夘正屆時門校禁斷行人糾儀官就位左翼諸王率羣公入午門左門右翼諸王率羣公入午門右門就位未入八分公以下文武百官各以次就位坐吏部禮部官屬受銜名糾儀官起繞班行視不如儀者糾之上下一匝還復位坐少頃王率羣公出百官皆退右列坐凡係内廷行走軍機處行走及内閣大學士學士官員等每晨進内辦事遇常朝日毋庸坐班再上元端陽中秋等日恭遇皇帝在圓明園各部院堂官俱宜赴賀或逢朝期該堂官適有帶領引見之事均免坐班偶遇雨雪各官例免坐班七月初十十二月二十五日俱係素服之期照雨雪之例毋庸坐班盛京常朝儀凡月朔及逢五日盛京文武官於大政殿八旗朝堂前坐班其日黎明百官朝服會朝堂辨定班位鑲黄正白鑲白正藍四旗在東正黄正紅鑲紅鑲藍四旗在西奉天府堂屬官在鑲藍之南其班將軍一班副都統五部侍即一班巡察御史奉天府尹府丞一班五部郎中佐領治中五部員外郎五品世職一班五部主事通判京縣知縣防禦一班七品筆帖式七品世職司庫經厯驍騎校一班八品筆帖式教授一班九品筆帖式司獄一班東位西面西位東面皆北上春冬辰正夏秋邜正就各朝堂前按班列坐禮部贊禮郎左右各一人自班首繞行受銜名畢少頃各退八旗坐班儀每月朔及月之十日二十日王貝勒貝子公暨八旗武官咸補服列坐左翼在東右翼在西班位與常朝日同元日萬壽聖節前後凡七日上元節前後凡三日上三旗四品以上官於太和門外五品以下暨下五旗官於午門外咸朝服列坐每月左右翼王公分單日雙日常服列坐班位均如常朝儀三旗内大臣侍衛坐班儀三旗領侍衛内大臣侍衛隨侍衛班親軍均分兩翼鑲黄旗為左翼正黄旗為右翼正白旗半為左翼半為右翼每日黎明除内外班直宿内大臣侍衛外内大臣侍衛等均會集於太和門門左右次各設榻二重東西向散秩大臣以上得與坐本班侍衛按次坐於兩稍間負壁北上東西向鑲黄正黄二旗侍衛在東西三四間一等侍衛齊前楹為第一班二等三等藍翎侍衛為二三四班東西上正白旗侍衛在東西次間各二行北上均北面序坐三旗前鋒䕶軍叅領列坐於左右門之外各東西向王公入朝領侍衛内大臣以下咸降榻坐於一等侍衛之前直班侍衛什長令侍衛知會尚茶由内頒茶左右各二筩至門下兩翼侍衛什長各二人起立視侍衛等分授王公内大臣及前鋒䕶軍參領一二等侍衛茶宗室侍衛漢侍衛不散茶茶畢以次退如遇齋戒日素服日不頒茶元日萬壽聖節前後凡七日上元節前後凡三日朝晡二次上朝亦如之内務府官員坐班儀凡常朝内務府總管率所屬文武官於右翼門外總管於門階上各官以次列坐於階下以都虞司司官察班皇朝文獻通考卷一百二十七
