火耗令各直省文臣齎錢糧册籍以朝當時民承故明加派之後望治甚切巡按順天御史栁寅東言解京錢糧頭緒紛雜有一縣正額止三千餘兩而條分四十餘頃有一頃錢糧止一兩六七錢而加費至二三十兩宜總計各欵彚解以免賠累山東撫臣方大猷亦言錢糧欵項宜清并刻由單俾熟地糧米實數定為一編使民易曉而御史甯承勲以賦役之制未頒官民無所遵守請勅所部扵賦役全書外給易知由單一應無藝之徴通行裁革悉照恩詔内或全免免半免三分之一者刋定册書令天下識所遵行又縁明季内官縱恣紳衿優免踰額部臣議将各厰地租照御用監近例歸併有司徴解保定巡撫王文奎請免優免舊習甦小民取盈攤派之困時御史衛周祚巡行畿甸見真定地方荒與亡居十六七請行清丈編審之法使丁地稅糧得符實數而山東向遭流㓂焚掠地土荒蕪總河楊方興疏請以見在熟地為數其抛荒者無論有主無主盡數除之俾民得沾實恵其言皆見採用以故明内監地畝錢糧總歸户部管轄定開墾荒地之例州縣衛所荒地分給流民及官兵屯種有主者令原主開墾官給牛種三年起科臣等謹按㑹典順治二年准新墾荒地免租税一年又准河南抛荒地畝令鎮協官兵開墾查係向來熟糧令一年後供賦葢三年起科者原荒之田一年後供賦者原熟而抛荒之田也二年諭各撫按凡前朝宗室禄田散在各直省者與民間一例起科三年諭户部曰國計民生首重財賦明季私徴濫派民不聊生朕救民水火蠲者蠲革者革庶幾輕徭薄賦與民休息而兵火之後多借口方册無存增减任意此皆貪墨官胥惡害已而去籍使朝廷徳意無由下究特遣大學士馮銓與公英俄爾岱徃爾部徹底察核在内責成各該管衙門在外責成撫按将錢糧數目原額嚴核詳稽彚造賦役全書封進御覽是時總計天下財賦重地惟江南浙江江西三省蘇松嘉湖諸府尤最撫臣黄徽請以漕白二糧與嵗貢絹布俱官兊官解以舒民累江西南瑞袁三府水漂沙塞虗糧懸欠巡按御史黄贊元請履畝清丈豁免荒地之賦其近山易旱近水易潦者上田改為輕則俱從之六年頒行易知由單户科右給事中董篤行請頒行易知由單将各州縣額徴起運存留本折分數漕白二糧及京庫本色俱條悉開載通行直省按户分給以杜濫派從之始定州縣以上官以勸墾為考成凡地方官招徠各處逃民不論原籍别籍編入保甲開墾荒田給以印信執照永准為業三年後有司親察成熟畝數撫按勘實奏請徴糧不得預徴私派州縣以勸墾之多寡為優劣道府以督催之勤惰為殿最毎嵗終載入考成至十五年定督撫一年内開墾荒地二千頃至八千頃以上道府開墾千頃至六千頃以上州縣開墾百頃至六百頃以上衛所開墾五十頃至二百頃以上分别議敘不准以二三年墾數合算八年世祖章皇帝親政以從前睿親王邊外築城加派九省額外錢糧二百五十餘萬兩令開除本年正賦尋以恩赦令有司按户給還命御史分巡各省察民間利病蘇松巡按秦世禎因條上興除八事一曰田地令業主自相丈量明註印册以清花詭一曰額定錢糧俱填易知由單設有増減另給小單使奸胥不能藉口一曰由單詳開總算數目花户姓名以便磨對一曰催科不許濫差衙役設立滚單以次追比一曰收糧聴里户自納簿櫃俱加司府印封以防奸弊一曰解放先急後緩勒限掣銷不得分毫存留衙役之手一曰民差查田均派與排門册對騐無使苦樂不均一曰備用銀兩每事節省額外不得透支布政司将徵解原册一季一提年終報部扶同容隱者擬罪從之是嵗以山海闗外荒地甚多民人願出闗墾地者令山海道造册報部分地居住九年令八旗壯丁退出晌地並首告清出地及各省駐防遺下地照墾荒例招墾三年起科至十七年復以八旗撤出地畝向交各佐領收存以致荒蕪令地方官招民墾種十年准四川荒地官給牛種聴兵民開墾酌量補還價值又以陜西荒地令酌調步兵給發牛具籽種開墾屯田又以直省州縣魚鱗老冊原載地畝坵段坐落田形四至等項間有不清者印官親自丈量十一年訂正賦役全書户部言賦役全書闗一代制度查考舊籍貴詳盡無遺創立新規期簡明易曉請勅臣部右侍郎将舊籍全書作速訂正董率各司官照所管直省創造新書仍同户科詳加磨勘有應増減變通者小則部科酌定大則具疏奏請務求官民易曉永逺可行户部又言人丁地土乃財賦本根故明舊例或三年或五年一行編審繕造黄册呈進我朝定鼎以來尚未舉行宜自順治十二年為始責布政司彚造以便查稽隙地漏糧之弊俱從之減江西袁州瑞州二府浮糧定丈量規制凡丈量州縣地用步弓各旗荘屯地用繩如有民地缺額督撫詳查開除至十二年頒部鑄步弓尺於天下廣一步縱二百四十步為畝方廣十五步縱十六步有司於農隙時親率里甲履畝丈勘以定疆界杜占爭均畝賦凡丈量之制州縣册籍原載坵段四至不清者丈欺隠牽累有地無糧有糧無地者丈畝步不符賦則或浮者丈熟荒相間旗民鹽竈以及邉地民番相錯者丈壤界相接畛域不分者丈荒蕪召墾寄糧分𨽻者丈水衝沙壓公占應抵應豁者丈瀕江瀕海之區五年一丈視其或漲或坍分别升免十二年各邊口内曠土聴兵墾種不得往墾口外牧地十三年諭户部曰帝王臨御天下必以國計民生為首禹貢則壤定賦周官體國經野其法至詳且備當明之初取民有制休養生息至萬厯間海内殷富家給人足及乎天啟崇禎之際因兵増餉加派繁興貪吏滋奸民不堪命國祚隨失良足深鍳朕荷天休命為生民主一夫不獲亦疚朕懷凡御服膳羞深自損約然而上帝祖宗百神之祀軍旅燕饗犒賜之繁以及百官庶役餼廩之給罔不取之民間誠恐有司額外加派豪蠧侵漁中飽民生先困國計何資特命爾部右侍郎王宏祚将各直省每年額定徴收起存總散實數編撰成帙詳稽往牘酌量時宜凡有參差遺漏悉行駁正錢糧則例俱照萬厯間其天啟崇禎時加増盡行豁免至若漕白雜項或已改折或解本色或有昔未詳而今宜増昔太冗而今宜裁者俱細加清核條貫井然綱舉目張勒成一編頒示天下庻使小民遵兹定式便於輸将官吏奉此章程罔敢苛斂為一代良法垂萬世成規時賦役全書外又輔以㑹計赤厯丈量諸册賦役全書者先開地丁原額繼開荒亾次開實徴又次開起運存留起運分别部寺倉口存留詳列欵項細數繼有開墾地畝招徠人丁續入册尾每州縣各發二本一存有司查考一存學宫令士民檢閲丈量册以田為主諸原隰墳衍下濕沃瘠沙鹵之形畢具而黄册則准於户口詳其舊管新收開除實在之數條為四柱與賦役全書相表裏赤厯毎年頒發二扇開列户口錢糧數目一備謄真一令百姓自登納數令布政司嵗終磨對㑹計册則備載州縣正項本折錢糧凡起解到部逐項註明年月日期解户姓名以杜侵欺併稽完欠其徴収則行一條鞭法給以易知由單一條鞭者以府州縣一嵗中夏税秋糧存留起運之額通為一條總徴而均支之至運輸給募皆官為支撥而民不與由單之式則每州縣開列上中下地正雜本折錢糧末編總數刋成定式每年開徴一月前給散花户使民通曉而又佐以截票串票印簿循環簿及糧冊奏銷冊截票之法開列實徴地丁錢糧數目分為十限每月限完一分截票其票用印鈐葢就印字中分而為兩一給納户為憑一留庫櫃為騐即所謂串票也印簿由布政司頒發令州縣納户親填入簿季冬繳司報部糧册則以各區納户花名細數繕造成册務與一甲總額相符易於摘比循環簿者照賦役全書欵項急者居先緩者居後按月循環徴收奏銷册者以各直省錢糧支解完欠按年分欵彚造清册嵗終送府由府送司由司送部據以銷算考核時直省奏報錢糧又有所謂無序册者其所載條件即奏銷册數目也順治初議定每嵗造送康熙四年以其糜費無益令永行停止令民間種植樹木以補耕穫地方官加意勸課如私伐他人樹株者按律治罪是年山東無主荒地每五里設一官荘借給資本三年後償還照熟地例起科又以州縣招人開墾勢必給發牛種以資耕作令於原獲屯息米豆草束内動支其地方去原貯本色稍逺者量動屯本銀給發次年繳還一半三年照數全納十四年令各省屯地已經歸併有司者廣行招墾有殷實人户能開至二千畝以上者照遼陽招民例録用十五年命御史二員詣河南山東二省督率州縣履畝清丈分别荒熟實數其地畝大小及丈量繩尺悉照舊規不得任意盈縮凡丈量地畝遲延限期及丈量後不即確報不送文册檄催又不申詳及監丈官互相推諉者州縣衛所官及該管上司俱罰俸又直省田土查明萬厯間賦役全書與今賦役全書數符者不必清丈其餘有荒蕪田畝地方選委亷幹官員履畝清查無得隠漏派累小民又以山東明藩田産相沿以五百四十步為一畝租銀比民地倍輸今令照民地例概以二百四十步為一畝時江西道御史許之漸言財賦之大害莫如蠧役有蠧在收者有蠧在解者有蠧在提比者有蠧在那移支放者所侵累萬盈千有司恐此蠧一斃無從追補故官以㕘罰去而此蠧厯久尚存前無所懲後無所誡請敕撫按将從前侵蠧姓名數目逐一清查籍其家業侵多者立梟市曹侵少者即時流配捐此所侵之數以清積蠧之源工科給事中史彪古又言國家之財用原取足於正供乃今之州縣有一項正供即有一項加派應勅直省撫按将見行申飭私派之例刋入易知由單使閭閻之民共曉徳意嵗終仍取所屬印結報部以憑察核庻私派止而公輸裕上以所奏皆深切時弊令所司議行十六年准陜西膚施縣地五畝零折正一畝甘泉縣地三畝零折正一畝令地方官踏丈照舊徴賦至康熙七年又以陜西洛川縣地八畝零折正一畝宜川延川縣地四畝折正一畝令丈明改正十八年令州縣官不許私室稱兊錢糧凡州縣各置木櫃排列公衙門首令納户眼同投櫃以免剋扣凡布政司及州縣徴收錢糧均遵部頒法馬稱兊勿令吏胥髙下其手工科給事中隂應節言錢糧之弊一州縣那移一紳士包攬一土豪冒名紳户一隔縣寄荘抗糧請飭該撫嚴查懲治部議如所請從之又以江南蘇松等府地糧荒熟混淆莫辨令州縣官履畝踏勘分析圖户造冊申報上司嚴核是年巡按河南御史劉源濬言南陽汝寧荒地甚多急宜開墾縁無人承種之地耕熟後往往有人認業遂起訟端三年起科雖有定例開種之初雜項差役仍不能免此官雖勸耕而民終裹足不前也嗣後請令該地方官先給帖文開列姓名年月並荒田四至坐落每嵗申詳上司以息争訟寛徭役以恤窮黎借常平倉榖以資農本各州縣以勸墾之多寡分别優劣部議如所請從之是年總計天下田土共五百四十九萬三千五百七十六頃四十畝田賦銀二千一百五十七萬六千六兩糧六百四十七萬九千四百六十五石各有竒順天永平保定河間正定順徳廣平大名八府延慶保安二州計四十五萬九千七百七十二頃四十五畝有竒田賦銀一百八十二萬四千一百九十一兩米一萬二千二百一十石籽粒四十三石豆七千三百三十八石各有竒奉天錦州二府計六百九頃三十三畝有竒田賦銀一千八百二十七兩有竒江南省計九十五萬三千四百四十五頃一十三畝有奇田賦銀四百六十萬二千七百三十九兩米二百七十四萬五千一百一十三石麥一萬九千四百七十二石豆二萬三千九百三十二石各有奇山西省計四十萬七千八百七十一頃二十五畝有奇田賦銀二百二十萬五千五百四十五兩糧四萬五千九百三十一石各有奇山東省計七十四萬一千三百三十六頃六十五畝有奇田賦銀二百三十八萬九十一兩麥二萬八千六百一十一石米三十六萬六千五十八石穀七百三十一石各有竒河南省計三十八萬三千四百三頃九十七畝有奇田賦銀一百八十萬九百四十三兩糧二十三萬七千四百四十一石各有奇陜西省計三十七萬三千二百八十五頃八十八畝有奇田賦銀一百四十三萬六千三十三兩糧六萬一千八百五十一石各有奇浙江省計四十五萬二千二百一十六頃一畝有奇田賦銀二百五十七萬二千五百九十二兩米一百三十六萬一千三百六十七石各有奇江西省計四十四萬四千三百三頃八十五畝有奇田賦銀一百七十二萬六千九百七十兩米九十三萬八千七百五十三石各有奇湖廣省計七十九萬三千三百五十三頃七十一畝有奇田賦銀一百八萬八千五百九十七兩南糧二十三萬八千五百八十二石漕米二十二萬二千一百九石各有奇四川省計一萬一千八百八十三頃五十畝有奇田賦銀二萬七千九十四兩米九百二十八石各有奇福建省計一十萬三千四百五十七頃五十四畝有奇田賦銀七十五萬八百六十二兩米一十萬九千六百六十一石各有奇廣東省計二十五萬八百三十九頃八十七畝有奇田賦銀八十四萬七千九百六十一兩米二萬七千六百六十八石各有奇廣西省計五萬三千九百三十八頃六十五畝有奇田賦銀一十九萬九千六百五十四兩米九萬四千二百九十九石各有奇雲南省計五萬二千一百一十五頃一十畝有奇田賦銀六萬一千七百四十八兩糧一十二萬三千九百一十七石各有奇貴州省計一萬七百四十三頃四十四畝有奇田賦銀五萬三千一百五十兩糧七萬六千六百六十石各有竒臣等謹按歴年升除賦額不一兹據㑹典所載是年報銷册核其總數如右皇朝文獻通考卷一
