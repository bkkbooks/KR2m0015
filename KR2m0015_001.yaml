body:
  text: 田賦考一臣等謹按周禮六官皆以體國經野著於卷端而九賦之制首載於天官冢宰誠以民惟邦本食為民天度地以居民徹田而定賦因民之所利而利之俾厚其生而安其業故上下通而公私有濟王者代天子民未有不以民生國計為本務者馬端臨文獻通考二十四門以田賦為首其所見者誠大也今考其所載歴代田賦之制上溯陶唐迄於宋寧宗而於宋事尤詳所述四京一十八路墾田暨夏秋二税見催額數以及支移折變預借代輸受納稅限之法無不畢備又别有水利田屯田官田諸門臣等承詔續編自宋寧宗嘉定以後及遼金元明並循其例洪惟我朝統一中外版圖之逺度越前古凡任土定賦之規多仍明舊而其隨宜損益者皆因時度地而酌協于中世祖初併宇内即除明季加派私増之弊訂定賦役全書頒行天下嗣是列聖相承勤恤民隠蠲浮賦以蘇疲氓慎丈量以杜隠占所定科則至詳至當雖禹貢三壤之則周官九等之制蔑以尚兹矣加以地利日興汙萊漸闢墾荒召佃俾為世業無曠土無㳺民民咸安其居樂事勸功洵法良而意羙也至八旗王公以下各有荘屯田土其圈撥之制交糧之額載在㑹典宜大書以彰昭代之洪範若夫列祖列宗暨我皇上御極以來視民如傷周咨疾苦復除之令嵗下振貸之澤有加此則恩施於常額之外者别見於國用考焉今首列正課次八旗田制次水利田屯田官田凡十二卷田賦之制直𨽻民賦田每畝科銀八釐一毫至一錢三分零不等米一升至一斗不等豆九合八抄至四升不等更名田歸國初以明代各藩所占田民墾種曰更名田下倣此毎畝科銀五釐三毫至一錢一分七釐三毫不等農桑地毎畝科銀一釐六毫八絲零蒿草籽粒地毎畝科銀五分至七錢二分五釐一毫零不等葦課地毎畝科銀一分至六分不等歸併衛所地每畝科銀七毫二絲至七分九釐三毫零不等米八合九勺七抄至九升七勺二抄不等豆四合三勺八抄至三升六合不等草一分毎十分為一束下倣此九釐二毫至四分一釐七毫零不等河淤地毎畝科銀二分九釐至二錢五分六釐五毫零不等學田毎畝科銀一分至二錢六分七釐八毫零不等小麥粟米各六升奉天民賦田毎畝科銀一分至三分不等米二升八勺至七升五合不等退圈地每畝科銀一分至三分不等豆四升三合至一斗不等江南江蘇民賦田每畝科銀九釐至一錢四分一釐一毫零不等米豆一升四合七勺至一斗九升二合六勺零麥二抄至三勺零不等地毎畝科銀九釐至三錢三分三毫零不等米豆七合三勺至四斗一升六合九勺零麥一抄至八勺零不等山蕩漊灘毎畝科銀九釐至一錢四分五毫零不等米豆三合四勺至一斗六升五合二勺零麥一勺至三勺零不等城基倉基屋基毎間科銀五分七釐至一錢二釐四毫零不等米豆五升五勺至一斗二升六合三勺零麥一勺至二勺零不等歸併衛所地毎畝科銀九釐至一錢四分一釐一毫零米豆一升四合七勺至一斗九升二合六勺零麥二抄至三勺零不等安徽民賦田每畝科銀一分五釐至一錢六釐零不等米二合一勺至七升一合零不等麥五勺至八勺零不等豆八勺至九合一勺零不等地毎畝科銀八釐九毫至六錢三分零不等米七合九勺至五升九合零不等麥八勺至二合二勺零不等塘每畝科銀一錢九釐至四分四釐零不等米四合七勺至七合八勺零不等麥一勺至二勺零不等草山毎里科銀八分三釐桑絲每兩折銀三分二釐歸併衛所屯田每畝科銀一分至六釐不等衛所管轄屯地每畝科銀一分七釐九毫至二兩七錢二分二釐九毫零不等糧三合至二斗五升四合一勺零不等山西民賦田每畝科銀一釐七絲至一錢零不等糧一合五勺至二斗七升不等屯地毎畝科銀二釐三毫至一分四釐零不等糧一升八勺至一斗九合零不等更名地每畝科銀五釐至一錢四分不等糧七勺至二斗不等衛所屯地每畝科銀一分四釐山東民賦田每畝科銀三釐二毫至一錢九釐一毫零不等麥一勺至四合三勺零不等米二勺至三升六勺零不等歸併衛所地毎畝科銀一分至六分五釐零不等更名田每畝科銀一分至三錢七毫零不等麥三合二勺零米一升八合零學田毎畝科銀九釐至三錢不等竈地每畝科銀二分六釐五毫至四分四釐一毫不等麥一勺至四合一勺零不等米一升八合至二升八合四勺零不等衛所軍屯糧田每畝科銀一分至五分三釐八毫零不等條銀一分二釐至二分四釐不等衛所更名籽粒等地毎畝科銀六釐至一錢二分不等河南民賦田毎畝科銀一釐四毫至二錢二分七釐零不等米七勺至二升二合零不等更名地毎畝科銀一分一釐至一錢二分九釐零不等歸併衛所地每畝科銀一釐六毫至一錢八釐零不等陜西西安民賦田每畝科銀二兩三錢八分一釐七毫糧五升八合五勺至五升二合五勺不等屯地毎畝科銀二釐至九分八釐不等糧一升五合至三斗不等更名地每畝科銀六釐九毫至七分五釐一毫零不等糧四升三合五勺至一斗四升八合零不等甘肅民賦田毎畝科銀二毫至一錢五分四毫零不等糧三勺至八升一合一勺零不等草三分至四分六釐零不等歸併衛所屯地毎畝科銀一釐二毫至六釐不等糧五升至六升不等更名地毎畝科銀四釐八毫至一分七釐一毫零不等糧二合二勺至一升四合二勺零不等草一分至九分二釐不等土司地毎畝科銀七分五釐零糧二升四合二勺五抄零衛所管轄屯地每畝科糧四升一合八勺七抄零草五分八毫零番地每畝科糧四合至三升不等草二分一釐五毫至三分不等每户輸銀三錢糧一斗至二斗五升不等監牧地每畝六釐浙江民賦田每畝科銀一分五釐三絲至二錢五分五釐不等米三撮至一斗九升零不等地每