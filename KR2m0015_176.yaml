body:
  text: 欽定四庫全書皇朝文獻通考卷一百七十六樂考二十二鼓吹臣等謹按鼓吹者短簫鐃歌軍中之樂也古有靈夔吼雕鶚爭等曲漢魏而下皆有鼓吹鐃歌曲凡出入警衛陳師獻馘並用之我朝百餘年來聖澤涵濡禮樂大備鼓吹之制法駕鹵簿有導迎鼓吹大樂鑾輿巡幸有馬上所奏鐃歌大樂清樂出師奏凱受俘有凱歌鼓吹樂因事定制各得其宜蓋所以昭盛治而揚大烈者其歌辭音節之美善尤為度越前古云天命六年三月太祖髙皇帝征遼陽大張鼓吹導引入城康熙十二年正月幸南苑大閲陳設鹵簿鼓吹大樂二十九年八月會閲用鼓吹時喀爾喀新附上特行會閲禮陳設鹵簿鼓吹大樂三十五年二月親征厄魯特噶爾丹陳設鹵簿鼓吹大樂前導五月親征大軍凱旋陳設鹵簿鼓吹大樂前導九月親巡北邊用鼓吹時上巡行北邊經理機務大排鹵簿鼓吹前導至十二月班師陳設鹵簿鼓吹如初三十六年二月上三舉北征陳設鹵簿鼓吹前導五月親征大軍凱旋用鼓吹時朔漠蕩平大軍告捷振旅凱旋陳設鹵簿鼓吹大樂前導雍正二年十月平定青海受俘用鼓吹時命將討平青海於獻俘次日行受俘禮工部張設御幄於午門樓楹正中鑾儀衛設儀仗金鼓於闕門東西兩向設鼓吹大樂於午門外左右駕出太和門鑾儀衛大樂鼓吹金鼓全作升座樂止各官行禮兵部奏獻俘囚禮畢駕興大樂鼓吹金鼓全作還宫樂止乾隆七年定時巡省方鐃歌鼓吹是日陳設鹵簿駕出宫前導鼓吹振作馬上所奏有鐃歌大樂二十八章鐃歌清樂二十七章樂器有大小銅角金口角蒙古角金鼓點鈸雲鑼笙笛之屬曲名歌詞詳樂歌門重定大閲鐃歌鼓吹鑾儀衛陳設騎駕鹵簿鼓吹樂部陳設鐃歌樂駕出行宫至御營鼓吹鐃歌大樂作禮畢駕還行宫鐃歌清樂作定直省閲兵鼓吹直省講武以督撫提鎮為閫帥每嵗於霜降日令本標辨卒校閲於演武場建大纛行禮軍門鼓吹節鉞前導閲畢鳴金鼓吹振旅而還重定親征鐃歌鼓吹鑾儀衛陳設鹵簿鼓吹前列鐃歌大樂皇帝出宫導迎鼓吹陳而不作詣堂子行禮畢駕出鼓吹金鼓振作大軍啓行鐃歌樂與巡幸鼓吹同重定親征凱旋鐃歌鼓吹鑾儀衛陳設鹵簿鼓吹樂器自郊外五里至堂子門外駕入都門大樂前導鼓吹振作重定受俘鼓吹鑾儀衛陳設鹵簿金鼓樂部陳設鐃吹軍樂駕出太和門大樂鐃吹金鼓振作升座樂止各官行禮兵部奏獻俘囚禮畢駕興大樂鐃吹金鼓振作還宫樂止定賓興試院鼓吹會試順天鄉試皆奏進試題試前一日五鼓內簾吏傳金外簾吏報鼓啓門考官跪奉奏章知貢舉提調官跪接興由中道降鼓吹樂作試之明日諸生交卷鼓吹樂作啓門序出揭曉之日陳榜於亭舁行鼓吹樂作前導八年九月幸盛京用鼓吹皇上於行營起程至盛京儀仗全設馬上鼓吹導引御崇政殿升座王公文武大臣行禮賜茶畢皇上還宫鼓吹止二十四年定軍中納降鼓吹命將出師如窮冦乞命請降即封章入告得旨報可乃諏吉納降所司先期陳設至日軍門鼓吹舉炮大將軍戎服乘騎出營鼓吹節鉞前導登壇升座鼓吹振作降人匍伏乞命大將軍宣諭皇帝威德受降降人泥首謝退大將軍降坐乘騎還營軍門舉炮鼓吹振作如初定鐃歌凱歌樂時平定西域大功告成特撰鐃歌樂十六章凱歌樂四十章鐃歌樂器有大小銅角金口角金鼓鈸鑼小鈸雲鑼海笛笙箎簫管笛司樂七十六人司歌二十人俱服駕衣戴黃翎駕帽領班官四人俱蟒袍補服凱歌樂器有方響點鈸星錫簫管笙笛雲鑼杖鼓司樂四十八人司歌十二人俱服金夀字袍戴本身暖帽領班官四人俱蟒袍補服曲名歌詞詳樂歌門二十五年二月凱旋郊勞用鐃歌鼓吹時將軍武毅謀勇公兆惠平定西陲凱旋皇上駐蹕黃新莊行宫親行郊勞是日陳設鹵簿大駕設黃幄御座於郊臺正中設大纛於南面樂部內班署史等承應之鐃歌樂鳴螺軍士俱於臺左右排立凱歌樂排立於御道左右駕至郊臺軍士鳴螺鐃歌樂作皇上拜天行禮畢御黃幄升座將軍大臣行抱見禮將軍大臣回部人等行禮賜坐賜茶畢禮部堂官奏禮成皇上出黃幄乘騎鐃歌樂止停鳴螺馬上凱歌樂作駕還行宫樂止皇朝文獻通考卷一百七十六
