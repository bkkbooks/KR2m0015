body:
  text: 選舉考五舉士乾隆二十一年清順天鄉㑹試冒籍之弊陜西道監察御史陳慶升奏順天鄉試及㑹試冒籍考中並出仕者俱准改歸本姓原籍該學政遇考試之期嚴查辦理以清籍貫一摺奉諭㫖此奏大有關乎士習人心著大學士㑹同九鄉一併詳議具奏尋議北皿北貝字號中式之舉人內有南人冒捐北監及冒入北貝者於填寫親供時俱自行首明更正勒令改歸原籍報明禮部如不早自首别經發覺即照例斥革再該御史所奏今科冒籍順天中式舉人李駿等三十一人已經訪知確有本姓本籍僅令首明改歸原籍實不足以示懲應將李駿等三十一人並今科之首明冒籍舉人俱罰停㑹試一科以警冒濫其現在翰林中薛田玉之榜名田玉等皆係久經中式應改歸原籍之人內除業經首明改歸江南原籍之人員外將翰林院編修丁田樹與以罰俸處分至該御史單開本科中式舉人三十一人之父兄身係職官者於子弟冒籍不能覺察亦屬不合均照違令笞五十公罪律罰俸九個月至從前各科南人冒捐北監冒入北貝中式之舉人進士令其首明咨回本籍倘踰限不行呈改照例斥革議處其冒籍未經中式之貢監生員一體辦理得㫖允行又奉諭向例各省鄉試硃墨卷解送到部即派翰詹坊局以上及京堂科道等公同磨勘所以慎重科場稽查弊竇典至重也其磨勘諸臣不過按數按省分閲若不於卷面注明某官某人磨勘字樣以専責成則已經夾簽者尚知為某人摘出其未經夾簽者或不過虛應故事陽博寬厚之名隂省校閲之煩而盡心乃事者反不無觀望殊失磨勘本意此朕偶因問陳世倌磨勘事而思及者然不戒視成朕所不為著以下科為始磨勘諸卷俱於卷面填寫銜名俟該部彚卷後朕另派人於每束內量取數卷特交大臣再詳加校勘呈覽朕仍於此中復行抽閲如有草率從事者即交部照例分别議處則磨勘各官及特派大臣之是否詳慎均難逃朕之洞鑒矣著為例又奉諭㫖鄉試磨勘一事前已有㫖令於下科為始將來詳加覆勘自不致視為具文惟是三場試藝篇幅繁多士子風簷寸晷中檢㸃偶疏輒干指摘其以磨勘獲咎者轉得有所藉口且設科立法程材無取繁文虛設一士子論表判策不過雷同勦說而閲卷者亦止以書藝為重即經文亦不甚留意衡文取士之謂何此甚無謂也三場試以書藝經文足覘素養繼之五策更可考其抱負之淺深又何庸連篇纍牘為耶嗣後鄉試第一場止試以書丈三篇第二場經文四篇第三場策五道其論表判概行刪省至㑹試則既以名列賢書且將拔其尤者備明廷制作之選淹長爾雅斯為通才其第二場經文之外加試表文一道即以明春㑹試為始鄉試以乾隆己卯科為始著為例如此則士子闈中不得復諉之於日力不給而主試者亦可從容盡心詳校無魚目碔砆之混且鄉試第二場止經文四篇斯潦草完篇者當在所黜専經之士得抒夙學淺陋者亦知所奮勵去浮文而求實效斯足稱國家賓興大典可𫝊諭該部遵行再向來㑹試例不磨勘未足昭慎重亦著寬至庚辰春榜後奏請一體派員磨勘二十二年奉諭㫖前經降㫖鄉試第二場止試以經文四篇而㑹試則加表文一道良以士子名列賢書將備明廷制作之選聲韻對偶自宜留心研究也今思表文篇幅稍長難以責之風簷寸晷而其中一定字面或偶有錯誤輒千貼例未免仍費檢㸃且時事謝賀每科所擬不過數題在淹雅之士尚多出於夙搆而倩代强記以圖僥幸者更無論矣究非核實拔真之道嗣後㑹試第二場表文可易以五言八韻唐律一首夫詩雖易學而難工然宋之司馬光尚自謂不能四六故有能賦詩而不能作表之人斷無表文華贍可觀而轉不能成五字試帖者况篇什既簡司試事者得從容校閲其工拙尤為易見其即以本年丁丑科㑹試為始現在各省㑹試舉子將已陸續抵京該部即通行曉諭知之旋以邊方北省聲律未諧驟押官韻恐不能合有司程式諭主考及分校各官今科各就省分酌量節取不必繩以一律至下科㑹試時則三年之功自宜研熟不妨嚴其去取又禮部議順天府府尹劉綸等奏大宛兩縣冒籍貢監一疏奉諭㫖依議此等捐納貢監其因應試投捐者乃圖獵取科名冒占試額自當從嚴辦理然例由國子監分堂肄業或由學政録科其為數不過數百人年貌語音不難立辨嗣後應専其責成務令於肄業録科時嚴加察驗以杜假冒倘仍前濫行收考一經發覺必將録送各官嚴加議處至不應試之貢監苐希項帶之榮或由以捐納官職自與玷冒科名有關政體者殊異若必如前議限年令自改回籍違皆斥革及如該府尹所奏由該縣具結赴部始准收捐轉致胥役藉端需索種種過甚勿如聽其捐納為便二十三年奉諭㫖滿洲蒙古現任三品以上大臣之子孫及親兄弟子姪有應試者俱令自行奏聞必國語騎射皆有可觀方准入場考試並照鄉試之例請派監試御史及監場都統各員前往彈壓又議准鄉㑹試第一場四書文外仍加試性理論一篇二十五年禮部議兵部侍郎錢汝誠條奏磨勘試卷內除直書廟諱御名先師諱及失格違禁真草不全五策誤寫題目者仍照不諳禁例罰停㑹試三科其行款偶誤字面違式者罰停㑹試一科應照所請纂入則例再順天等五省試卷內有御纂字樣未經三擡業經奏准罰停㑹試三科應否一併改為罰停㑹試一科之處恭候欽定一疏奉諭㫖依議磨勘順天等五省擡寫不合試卷著一體准其改為罰停一科又奉諭㫖廷試士子為掄才大典向來讀卷諸臣率多偏重書法而於策文則惟取其中無疵纇不礙充選而已敷奏以言特為拜獻先資而就文與字較則對策自重於書法如果文義醇茂字畫端楷自屬文字兼優固為及格之選若其人繕録不能甚工字在丙而文在甲者以視文字均屬乙等可以調停入彀之人自當使之出一頭地况此日字學稍疏將來如與館選何難臨池學習倘專以此為進退兼恐讀卷官有素識貢士筆跡者轉以藉口滋弊非射策决科本義也現在定例擬選十卷進呈須俟引見始定名次决科衡文尚待觀人而閲卷時竟先抑文重字可乎又向來讀卷官雖例不回寓然皆各覔公所散住地非鎖院人得自由在監試王公大臣等既不能各分一員同居糾察而讀卷諸臣從容退息亦何不可遣人回家潛通消息此而置之不問則凡鄉㑹試之設法關防又何取焉且試策不過一二百卷以十四人公閲即一二日亦可竣事乃遲之三五日始行進呈晨集暮散展轉需時於形跡尤為未協著大學士九鄉將嗣後讀卷官如何參核文字務令取擇適中並作何住居監察刻期竣事之處一併詳悉議奏尋議得本年殿試奉諭㫖令於𫝊臚前一日將擬定十卷進呈即於本日帶領引見詳核文品始定名次臨軒策士本欲得明體達用文義醇茂之卷拔置上第以備他日之用而讀卷諸臣向因原卷進呈未免兼擇其書寫精工者始行充選行之既久轉若嚴於字跡而寬於文格夫㸃畫粗工可以弋獲而文詞醇茂或且見遺非所以示權衡之凖得輕重之宜也應遵奉諭㫖參核文字務令取擇適中除條對精詳楷法莊雅者盡登上選外其有繕録不能甚工而援据典確曉暢時務即為有體有用之才亦應列為上卷若對策敷衍成文全無根據即書法可觀亦不得充選進呈請於文華殿兩廊並𫝊心殿之前後房間令讀卷官及監察之王公大臣科道收掌等官一同住宿舊例讀卷用十四人未免過多應請量行裁減派用八員內欽簡大學士二員其餘六員照㑹試總裁之例將應行開列人員請㫖欽㸃以兩日閲卷第三日進呈帶領擬定十卷貢士引見刻期竣事不致輾轉需時既杜形跡之嫌而於衡校益見肅清矣從之又奉諭㫖據鞠愷奏粵西省內應試生童多有他省人冒籍現在嚴行查辦等語該省地處偏隅嚮學者少他省人士未免乘機混名冒考但自乾隆三年部議停止外省及本省異府人入籍之例司學政者自應嚴為禁飭何以尚多混行冒試者此厯任學臣不能查察所致著該部查明乾隆三年以後所有廣西學臣照例議處再此等冒考弊竇在江浙等處尚少他如雲貴川廣偏僻州縣文風稍陋他省人或因父兄作幕或因親友貿易遂爾乘便混考皆所不免并著各該學政留心查察毋使滋弊定主考同考意見不同闈中閲卷處分例禮部議侍郎觀保奏鄉㑹試同考官黜落之卷主考官公同研核如實係可中之卷仍行取中磨勘時有干例議専坐主考倘所搜之卷允當即將同考官嚴加議處應如所請從之又奉諭㫖鄉㑹磨勘試卷蓋以防弊竇正文風所關綦重前經降㫖飭部定議實力奉行司事者勸懲既明持衡者去取自慎其有剽竊支離穿鑿險僻希心詭遇之士諒不敢濫登選格自取糾彈苐矯枉無取失中而掄才務崇大體經義之制原以見理明通措詞爾雅為正果能理明詞達有大醇而無小疵固稱上選若其學識才情大端確有可取即一二字句失檢無妨棄瑕採録蓋風簷寸晷中一日校藝即在學問優通者亦不能必無疵纇要不足為全璧之玷也為考官者倘意在求免吏議因而吹求擯棄轉謂平庸膚淺之文似是而非無可指摘遂致燕石冒玉魚目混珠則所云救弊適以滋弊殊非慎重磨勘本意嗣後鄉㑹典試諸臣務擇清真雅正文藝兼優之作為多士凖繩不得因磨勘周詳反以庸才塞責更不得因有此㫖藉口瑕瑜不掩以致怠忽從事負朕崇實黜浮至意將此通行𫝊諭知之又奉諭㫖學政馮成修奏考試事宜一摺所見明昧各半朕明斥其非然亦不棄其是如馮成修所稱試題不宜割截牽搭一條據其所列各省出過諸題則實係不顧文理强為凑合非惟難核真才抑且大悖經義非取士之道即所奏童試取進文卷請免解部磨勘雖不免有自為張本之意苐童試之文不能皆有醇無疵且一學政所取合計通省不下數千卷原非鄉㑹硃墨卷應行磨勘可比此二條尚不為無見若鄉試及嵗科兩試皆免試詩帖則其說已自相矛盾前因科場表判多涉雷同勦竊陋套是以改試排律使士子各出心裁若以詩為僅尚詞華則前此表判獨非駢體乎試問表判之詞華較排律之詞華孰難孰易若如馮成修之議去詩則將仍為表判乎否乎將仍表判盜襲之風為是乎此論之必不可通者至考試武生請復用四書論題一條所稱讀書明理乃能宣猷閫外等語尤屬誕謬武科一項不過舊制相沿因仍不廢若論我國家用兵自開創以來暨近日平凖夷蕩回部皆我滿洲及索倫勇將健卒折衝萬里蕆成大功緑營兵尚無所用更何嘗恃武科出身之人而藉其干城腹心之寄耶至侈談升平羽林棄武尚文諸論此不過見之詩歌寄興尚可其實文恬武嬉宴安鴆毒為國家之大害朕必不出此而我子孫萬世所當奉為家法永為深戒馮成修或别有深見欲為嘗試乎從前明季陋習每遇一事舉朝各挾意見議論紛然其時人主皆漫不省視是以諸臣得遇事生風紛呶噂㳫甚至借建白之名黨援門戶無所不至究於國是毫無禆益朕於內外章奏何一不親覽而肯令此風稍啓其漸耶馮成修識見卑詐如此不可仍令司鐸著開缺來京供職其尚可行二條下該部議行二十六年大學士蔣溥奏考取內閣漢中書請於㑹試薦卷中文理尚屬明通詩律亦能穩妥者照上次額數另取中書一榜揭曉後照例帶領引見定奪挨次選用如逢應取明通榜之年更於中書外照例選取從之又定國子監教習期滿引見例舊例國子監教習人員分别一二等引見其一等留學三年例以知縣即用遇有挑選例得赴挑至是遵㫖定議嗣後三年期滿出具考語帶領引見恭候欽定毋庸分别等第亦毋庸留學三年俱令歸班候選從之又奉諭㫖乾隆十七年壬申恭遇聖母皇太后六旬萬壽恩科曾經格外加恩於下第舉子中揀選引見量豫録用其年在七十以上者並分别賞給職銜本年恭遇皇太后七旬萬夀敷天同慶特開萬夀恩科所有未經入彀舉子應照前例一體加恩按其科分名次先後為序派出大臣詳慎㨂選分别以知縣試用教職銓補不得専取年少新科之人充數並著軍機大臣㑹同該部查明應試舉子中有年在七十八十以上者於揭曉後列名具奏候朕加恩降㫖以普慈惠而光盛典旋禮部於揭曉後查明八十以上之李勉等七人俱著賞給翰林院檢討職銜七十以上之盛大業等十九人俱著賞給國子監學正職銜又奉諭㫖廷試為策士巨典上年因朱嵇條奏令讀卷官㑹集文華殿悉心較閲其制已為周備惟是增派王公大臣及御史等監試一節在讀卷諸臣有事讀卷而監者終日坐視此不過防其爭執把持耳然各人意見時有不同勢難禁其折中商確亦無取其同聲附和也若云把持獨斷則今日尚覺鮮有其事即果有之亦非監試數人所能盡察諸事朕惟務實有名無實不如不為自後王公大臣御史均毋庸如朱嵇所云增派因思諸臣讀卷向俱各加圈㸃分别標識其間即各有參差不過如上之適中中之適下品題不無互見當不至相去懸絶其或相去懸絶者必各存成見有髙下其手之弊應自本科為始俟𫝊臚事竣禮部即將讀過試卷請㫖另派大臣覆行察看如有標識懸絶者即行簡明進呈候㫖庶諸臣不敢稍以私意抑揚鑑别益昭公慎又讀卷官所進策目問條向有由內閣預擬之陋例漏泄揣摩不可不防其弊應一概禁止屆期令讀卷官密擬策問進呈候朕裁定發齎刋刻著為令嗣於二十八年四月定進呈十卷不必預拆彌封候欽定後再行𫝊齊按名引見三十年奉諭㫖前經降㫖八旗三品以上子弟遇考試之期其父兄自行奏明原因八旗淳朴素風恐其艷心詭遇是以示之節制俾知崇實黜華非概從禁制遏其進取之途也乃邇年來八旗大臣竟無奏請子弟應試者我國家滿洲世臣宣力贊政者多不藉文章一途但承平百餘年滿洲詞臣文藻黻飾亦不可少大臣子弟中果能於國語騎射之外兼習文藝者仍准一體入闈毋庸奏明請㫖又奉諭㫖科場取士原以文體為重士子作為制藝惟當根柢經史發揮義理一以清真雅正為宗自不致動多瑖纇磨勘官遇試卷中詞句多疵者自應逐一簽出按例議處至科場禁例凡遇廟諱字面理應恪遵敬避如有違錯自難貸其處分若擡頭小誤既無關於弊竇且於文體無妨而條例所定字樣甚多如必齗齗較量曲為指摘何異吹毛求疵况擡頭格式本無一定即詞臣所進詩文尚有不能悉合朕亦從不計較又豈肯於草茅下士風簷寸晷中過為苛責乎又如貼例內有填寫添注塗改字數等語其於立法防弊亦所謂不揣其本而齊其末所有條例內應加刪正之處著大學士㑹同該部議行尋議舉子行文恭遇擡頭頂格非係廟諱御名至聖諱及例載列聖郊社宗廟皇上各實寫字樣偶失檢㸃誤作單擡概豫免議又試卷內塗改添注字數各於卷尾填明之例一併停止從之又酌定科場事宜御史戈濤條陳科場事宜四事一府尹監臨順天鄉試宜駐場終事一貼例字畫小差擡頭雙單小誤添注塗改小不如式量從寬宥一科舉應試驗文宜行裁革部議應如所請得㫖允行三十一年奉諭㫖知貢舉等卷稱謄録所燭煤失落燒損墨卷五十二本俱不堪謄送內簾等語舉子跋涉觀光業經竣事而試藝不獲送邀閲選情甚可憫著將被燒各卷其如何加恩俾伊等文字得以一體補謄送閲不致獨抱向隅之處查明辦理尋議就中燒去邊幅及損缺一二百字者三十四本令本人仍照原卷謄校不得改竄燒燬零落者十八本應行另試於三月二十四日赴圓明園恭請四書題二道與校謄原卷之三十四人分别隔坐將各卷交知貢舉一體彌封發謄從之又奉諭㫖向來新進士殿試朝考後復派王大臣驗别等第原因人文並重且使遠省之名次在後者亦得均與館選也但新進士通行引見其人之可造與否朕皆臨時甄録自可無庸預為揀選嗣後著各按省分仍依甲第前後分班帶領並將上次每省録用人數詳悉開呈其朝考録取者并注明於緑頭牌及排單內三十三年令在京各衙門揀選開列試差人員諭今年鄉試應考開列試差人員已降㫖令該部帶領引見但此次既停其考試則應開人員為數衆多其中間有年力就衰學殖荒落者若令概行開送恐不足副衡文之任著該衙門於合例人員內即速揀選送吏部帶領引見又議定鄉試卷鈐用關防並開寫履厯併歸畫一先是各省鄉試硃卷有用監臨官關防者有用布政司印信者有竟無鈐用印信關防者殊未畫一嗣後各省鄉試硃卷照順天鄉試及㑹試之例於硃卷接縫處鈐用彌封官土紅色關防其各省墨卷首頁開寫履厯亦應照順天鄉試之例書寫某生應乾隆某年某省鄉試字樣乂議定中書以進士舉人輪用事宜吏部准御史蔣曰綸疏稱中書一官向來為舉人進士兩項進身之路而其職掌専以字畫工楷為重請將朝考録取未經簡用之卷及㑹試薦卷內硃墨各卷一併奏請欽派大臣彚總校閲擇其文字俱優者分别名單帶領引見恭候欽定記名交部按照名次進士舉人相間輪用從之又諭嗣後校對順天闈墨筆跡不必另請派人即著派出大臣磨勘時一併校對又諭前曾降㫖令順天鄉試同考官南省人回避南皿卷北省人回避北皿卷邊省人回避中皿卷滿洲漢軍回避滿洲合字卷所以防弊竇而慎掄才顧行之未久旋經給事中吳煒條奏停止今御史王猷奏請順天鄉試房考閲卷仍應回避所見甚是南北中皿雖總數省合編究之本籍人多或同鄉戚友適分入本房難保無暗為照應之事况鄉㑹試事同一例㑹試房考閲卷既回避本省鄉試何獨不當回避本籍乎取士大典所關綦重不可不杜漸防微以遠嫌疑而矢公明於考官士子均為有益嗣後順天鄉試並仍照乾隆六年所降諭㫖行著為令又令新中舉人照順天鄉試例依限赴學政衙門填寫親供時即令默寫首藝七八行一同封固送部辦理又令主考官遵照定例於落卷中盡數搜閲其中有無取中於奏報試竣摺內聲明又申定順天副榜取中額數定例副榜中額每正榜五名取中一名如不足五名不准取中順天鄉試應分别滿合南皿北皿北貝等字號核計各號正榜之數照每舉人五名取中一名以歸畫一至夾旦中皿三號合算取中副榜之處查夾旦二號每號額中舉人四名中皿字號額中一二三名不等均不足五名之數應照例毋庸取中再各字號舉人中額滿字二十七名合字十二名北貝一百二名南北皿各三十八名今副榜亦分字號取中除每舉人五名取中副榜一名外各號俱有竒零亦應照不足五名之例毋庸核算取中又奉諭昨據順天府奏本年鄉試取中美二十號硃卷誤將美十二號吳嗣德名姓填寫發榜後請將吳嗣德除名其美二十號之卷毋庸議吳嗣德既係誤中自應於榜內除名至原取中美二十號之朱鈐著加恩准作舉人三十四年諭禮部奏請磨勘官照例議叙之處尚未允協從前定例原為其實能詳慎從事秉公糾舉者而言若僅隨班塞責而於卷內全無簽摘亦得幸邀叙録不足以示奬勸著詳悉定議具奏嗣經軍機大臣等㑹議得嗣後磨勘鄉試㑹試卷各官全無簽摘及簽摘不當塞責了事者概不准豫議叙如磨勘官果能秉公糾舉經覆勘大臣校勘俱各允當奏准鑒定者事竣後禮部移咨吏部議叙准其紀録一次若奉特㫖交部議叙者准其加一級從之又諭昨派閲朝考卷之大臣以擬取各卷進呈朕閲前列數卷并拆開彌封則擬列第一之嚴本卷論冒云人心本渾然也而要必嚴辨於動靜之殊兩句內姓名顯然併見復閲擬第二卷之王世維卷則云維皇降衷而擬第三卷之鮑之鍾則用包含上下包為鮑字之半擬第五卷之程沅則云成之者性也成與程音相同實堪詫異雖文義原屬可取而字跡可疑且不止一卷豈得盡謂偶然適合似此隱藏字樣非關節而何若謂此非關節不解有何等字樣為關節者朕從不肯逆詐億不信而亦斷不能漠然無先覺為此等伎倆所䝉諸臣皆朕所信任派出不值因此遽興大獄今為一一舉出應有內愧於心者耳此事姑從寬免究將此明白宣示俾嗣後衡文諸臣及應試士子各自猛省倍加警惕又禁臨場私改所習經書時因湖北巡撫查訊新中舉人李桃張汝弼潘德化胡薰四名臨場私改經書照違制律杖一百革去舉人嗣後凡遇鄉試之年各直省學政造送録科録遺等册均照順天鄉試之例將年貌籍貫經書注明移送布政使交該收掌官於投卷時詳加核對倘有不符不准收卷仍將底册移送提調監試等官查核以杜臨場私改經書之弊三十五年奉㫖開萬夀恩科諭國家茂膺多福瑞祉駢臻思與海內同兹嘉慶粵在壬申辛巳兩遇慶典再開萬夀恩科今年為朕六十誕辰明年恭逢皇太后八旬萬夀仰惟慈禧光被歡洽敷天允宜申錫無疆彚征叶吉用彰行慶作人之盛著於本年八月舉行恩科鄉試來嵗三月舉行㑹試俾多士忭舞觀光副朕錫類延釐至意臣等謹按是科為始凡鄉試八十以上㑹試七十以上者各督撫暨禮部查明具奏俱䝉賞給舉人并檢討學正職銜有差自是耆年宿學得沐恩榮作人之盛有加無已其詳見養老門內兹不贅焉又諭順天府進呈恩科鄉試録內有中式舉人名姓與已故尚書張照全同者其人籍隸宣化見聞僻陋偶然適合亦未可知但張照係舊日大臣且其學問字法近所罕有豈新進後生所能幾及又旗人有名乾元者不知此二字著於易義豈臣下所宜命名均著禮部查明即行更名注册又酌議直省外簾等官直省外簾受卷等四所事竣即陸續出闈收掌試卷官有始終經理之責該督撫於事簡同知通判內不必拘定科甲遴調入闈仍於揭曉後出闈嗣江寧等處布政使姚成烈奏請減江南外簾官之處查江南外簾官增至二十三員未免浮多應照順天十八員之例減去五員以符體制又停貢監生員改習經書先是士子改經雖任從其便而在臨場則例綦嚴兹因廣西學政童鳳三查出今科中式舉人朱一沛臨場私改經書奏聞辦理並稱士子呈改經書非本經荒蕪即妄思僥幸請嗣後舉貢生監改經之例永行停止其新捐貢監及新進各生皆以初次進場録科册注習某經為定如有私行改經等情察出照例斥革從之三十六年酌減殿試執事官員等事宜禮部奏請向例殿試應用監試御史四員受卷官十員彌封官十二員收掌官四員印卷官四員填榜官十八員共五十二員由臣部於內閣翰林院都察院等衙門題請簡用但受卷彌封事不甚繁應將受卷官改為四員彌封官改為六員印卷官改為二員填榜官書寫清漢字樣改為十二員於應辦事宜足敷經理至各項執事內有應用臣部筆帖式者向例一併開入嗣後交與臣等屆期酌量委用無庸一體開列以符體制從之又嚴禁謄録對讀選充不慎及雇替等弊國子監祭酒張裕犖奏請查向例謄録書手係各州縣解送對讀生員係教官解送若選充不慎有雇替充數即將該員照例參處各役本身并雇替之人照例究治從之又頒發直省貢院書籍先是直省鄉闈惟順天領有欽頒書籍而江南等省尚沿用舊存坊本嗣經議准御史趙鍈條奏頒發各省御纂欽定經史詩文各書及十三經注疏文獻通考史記前後漢書各部俾闈中主考房考各官臨場用資翻閲以正向來坊本沿訛之弊從之又更定內外簾用藍筆禮部議覆署雲南巡撫諾穆親奏請內外簾所用藍筆應行改定嗣後正副考官仍用墨筆謄録書手仍用硃筆外內簾自房考內監試及內收掌官外簾自監臨提調監試及受卷彌封謄録對讀收掌等官均改用紫筆其原用紫筆之對讀生改用赭黃筆即於本年萬夀恩科㑹試為始從之臣等謹按是年九月因御史興德奏請申明前議嗣後對讀所官除文移册檔用紫筆外其於改正硃卷字樣之處如有誤用紫筆者令監臨知貢舉及監試等官查參議處又議准鄉㑹試卷尾印卷戮記及一切應用藍色之處俱改用紫色以歸畫一又考試山東進獻詩賦諸生奉諭此次山東省考試諸生各賞緞一匹又諭此次考試山東省進獻詩賦之生員初彭齡監生竇汝翼俱著加恩賞給舉人准其一體㑹試又諭今日讀卷諸臣將擬定十卷進呈閲其文詞頌多規少且有語涉瑞應朕意深為不取現就各卷中擇其立言稍知體段不致過事鋪張者拔列前茅其措詞近浮及引用失當之卷酌量抑置以昭激勸將此通行曉諭知之又議定朝考散館等考試止限排律一首御史張霽奏請鄉㑹科場例限排律詩一首近科新進士朝考於欽命詩題有賦至二首或三四首者應令遵照制科定式毋許示異矜竒此外如庶常散館翰林大考以及考試試差嗣後亦均不得違例多作以肅成規而符體制從之又諭今嵗恭逢聖母皇太后八旬萬夀特開鄉㑹恩科俾歡洽彚征永為例事其年臻耄耋者業於今春榜後視其齒序恩豫職銜夀宇覃釐用徴士林嘉瑞而雲集觀光之衆亦當令其同霑慶澤益廣慈禧著於明嵗春闈後仍照丙戌年之例將應試舉人分别等第揀選引見録用俾得乘時筮仕以示振興並彰錫類作人之至意又議定鄉㑹試派出大臣隨帶官員從人名數御史克濟等奏請鄉試派出搜檢大臣等應帶官役人數未經著有明條應請嗣後派往貢院搜檢之王公等進磚門時隨帶官員不得過三員從人不得過四名各部院八旗大臣等隨帶官員不得過二員從人不得過三名仍預期將各職銜姓名造具清册移送外場巡察御史臨期按照名數查明放入再龍門內稽查接談換卷等弊之大臣及㑹試鈐榜之禮部堂官順天鄉試鈐榜之府尹隨帶官役並請照搜檢各大臣之例以歸畫一從之禁策問不得連及本朝臣子並不得過三百字議准左都御史張若溎奏請近科策問有尚論古人連類及於本朝臣子抑之則近於攻訐揚之則涉於黨同嗣後鄉㑹試發策不得以本朝臣子學問人品策問士子士子對策中亦不得泛引涉及違者聽磨勘大臣舉奏分别議處至策題每問至五六百字之多空疏者不難就題易移㸃竄成篇應申明定例嗣後策問每道俱不得逾三百字之數倘有逾額冗長者將該考官參奏又酌議滇省鄉試同考官並增減經書房數議准署雲南巡撫諾穆親奏請鄉試內簾同考官有分校呈薦之責原應慎擇充選惟是滇省現任之員為數較少而每年運銅差委較他省為多不敷考選現在委署正印人員與閒居省㑹聲氣易通者有異入闈襄事亦可無虞滋弊嗣後該省鄉試同考官照例於科目出身之現任州縣同知通判內調取外如有不敷即將現在委署州縣以上人員一體考充其非現在委署及借補縣丞等官仍照定例概不准入內簾以昭慎重再滇省同考八房內詩書各二房而屢科詩經約有一千五六百卷書經僅五百餘卷多寡迥别應將該省書經裁去一房詩經加增一房定為三房從之三十七年諭前於乾隆三十一年丙戌科㑹試降㫖分别挑選各省舉人以疏壅滯閲今已逾六載業經加恩降㫖於本年春闈後照例舉行但思前次挑選所有新中舉人不應遽行入選者止扣除切近兩科而王大臣等驗看多取年力精壯之人是入選者仍係近科舉子為多其科分較陳者仍致艱於預列豈朕設法疏通本意自應再為參酌使官人造士並得其中方為允協今計切近兩科如庚寅辛卯年分竟與本年直接即推溯至戊子乙酉兩科距今亦不過五年七年舉子半屬年富力强較之乾隆初年舉人懸隔三十餘年者相去霄壤概豫甄録甚非情理之平此次挑選者將乙酉戊子庚寅辛卯四科舉人均行扣除至王大臣等就應挑舉人內量其科深而人才出色者列入一等以備分發各省試用科深而才力不至近衰堪勝司鐸者列入二等以教職銓補俱引見候㫖定奪其按省酌定人數照上屆例此朕愛惜士子慎重官方不得已調劑之苦心該部即遵諭行嗣經吏部奏准此次大挑據禮部查覆㑹試舉人在壬午科以前者共二千四百八十九名各省人數多寡不齊若大中小省分别核計難以適均臣等悉心籌酌請照截取舉人分别遠近省之例近省直隸江南山東山西河南陜甘浙江江西湖北挑取十分之五遠省四川廣東廣西福建湖南貴州雲南挑取十分之六約計一千三百餘名謹將各省人數酌定應挑數目開列清單恭呈御覽至其入選之員無論遠近省分俱酌取一等四分二等六分臣部將列在一等者帶領引見恭候欽定二等各員開列清單另行奏聞注册銓選悉照上屆之例從之又諭今日禮部奏㑹試磨勘試卷請將簽摘允當之原勘官照例議叙至以原勘遺漏之員交部察議而置全無簽摘之員於不問定例殊未允協嗣後凡原勘官已經簽出者雖覆勘另有增易毋庸復行交議至各員內有派辦兩科並未簽摘一卷則其人全不以事為事疏漏實所難辭照例豫以處分庶足示警所有此次㑹試磨勘無簽各員著該部存記俟下科磨勘時彚核查辦如此准情定例則功過皆得其平而公事亦益昭詳慎著為令又吏部將録取朝考未用人員及㑹試薦卷內挑取舉人等帶領引見奉㫖李楘等三十人以內閣中書用劉景嶽等十人以學正學録用三十八年諭此次天津召試一等生員顧坤李廷敬貢生閔思毅陸伯焜賞給舉人舉人杜兆基以內閣中書用列在二等之進士張虎拜舉人張方理等六人生員陸蓉三人貢監生邱人龍四人俱賞緞二匹四十年禁鄉試題不得割裂牽搭禮部議覆程景伊條奏禁止鄉試考官出題割裂小巧嗣後如有似此命題者將考官議處從之臣等謹按時因四川省出題牽連無理正副考官並行議處又諭據派出驗看本年八旗㑹試舉人騎射王大臣等奏稱應行考試者一百二十五人內報近視眼者七十三人已揀令二十人照常騎射外其餘實屬不能之五十三人俱未令其騎射等語馬步騎射旗人根本即讀書人亦不可不學今考試者一百二十餘人內報近視眼者竟有七十餘人之多明係揑報希圖規避嗣後考試內若有似此不能騎射者俱著停其考試著為例臣等謹按是年不能騎射之五十三人已停其考試嗣後即著為令又議革除鄉㑹試經頭名目先是鄉㑹試入場有經頭名目雖載在條例令報明該衙門驗准取結押送入場但此項既非州縣書手每科存此名目不免有藉端包攬滋弊之處且與舊例選取總書之語不符今御史孟邵奏請永行革除嗣後辦理科場照舊例令地方官選送誠實書手正身入場分撥四所仍就其中擇誠謹明白者每十名選取總書一名亦令籖掣各經分司其事總於場內臨時酌定自不致有先期請託之情弊並請㑹試交知貢舉提調鄉試交監臨提調同至公堂御史一體稽查從之又議禁考試官不得向家中索取什物山東道監察御史穆隆阿疏奏三年考試為國家掄才大典必須關防嚴密杜絶弊端方可收取真才向來值場中閲卷之時凡考試官員向家中取送什物例無明禁請嗣後初八日舉子進場完畢後凡考試各官不得仍向家中索取什物并請交稽察外場御史如遇有考試各官自家中送到什物即全行駮回不准放進從之四十年諭御史孟邵奏㑹試磨勘簽出應議之許士煌一卷原係詩三房李殿圖呈薦經主考取中撥入詩四房白麟名下今白麟固應照例處分其原薦之房考轉得置身局外似覺偏枯請敕部釐定處分以昭平允朕初閲之下以其言為近理及詢大學士于敏中奏稱向例撥房之卷原儘受撥之房考覆閲必其文果當意方交內監試改用薦條如不願受撥主考官亦不能相强改撥之卷即由受撥房考閲定方換薦條即與本房呈薦無異且聽其自擇並非主考所能抑勒無虞滋弊至受撥以後即認該房考為房師與原薦之房無涉則功過皆當任之遇有處分乃所應得更不得謂之偏枯孟邵此奏不必行皇朝文獻通考卷五十一
