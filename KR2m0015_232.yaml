body:
  text: 欽定四庫全書皇朝文獻通考卷二百三十二經籍考二十二集别集忠貞集十卷范承謨撰承謨字覲公號螺山鑲黃旗漢軍人大學士文程子順治壬辰進士改庶吉士授宏文院編修官至浙閩總督殉耿逆之難賜諡忠貞臣等謹按是集首録諭祭文御製碑文御題祠額附以家傳祠堂記為一卷次撫浙督閩奏議各一卷吾廬存稿一卷百苦吟一卷畫壁遺稿一卷雜著一卷附録題跋哀挽詩文三卷其畫壁詩乃為耿逆拘繫時備受窘毒守者屏絶筆墨以桴炭畫字壁上自抒忠憤後僅存四十七首為世傳誦刻入吳震方説鈴中康熙五十七年其子時崇復以遺稿進呈蒙聖祖仁皇帝御製序文辨諸簡首仰見眷懷忠烈扶植綱常千百世下猶想見其抗節之槩焉遂初堂文集九卷楊兆魯撰兆魯字青巖武進人順治壬辰進士官至福建延平道按察司副使見山樓詩文集無卷數撫皖治略一卷撫楚治略一卷榖城水運紀略一卷楊素藴撰素藴見史類素藴自序水運紀略曰逆藩吳三桂既叛之明年五月襄陽總兵楊來嘉及鄖陽副將洪福相繼叛附踞房保二竹間陷穀城蹂均州南漳一路王師由均南穀三路恢復房保仍留兵防守月需米若干自襄陽至均州南漳又至房保康各數百里並山徑不通車牛扳藤負重血流被足日行不三十里若雨溜崖石一蹉跌即人米並墮壑中雨稍久即山水突發湍洶不能飛渡素藴於十七年四月授鄖陽道首以此為憂退而思明季楊嗣昌督師𠞰張獻忠正當此地其運糧必自有道日進楚人而訪之有團練長以榖城菜園坪之小河告乃申報三院覔舟修縴路繕塘房又慮賊巢逼近撥兵防護其始行也即減三郡夫十分之三久則民船人夫爭集自八月至來年三月可得十運足各營一嵗之食即其間民得力耕故列其經理文告之詞於後而記之學源堂文集十八卷郭棻撰棻字快圃清苑人順治壬辰進士官至翰林院侍讀學士蓮龕集十五卷李來泰撰來泰字仲章號石臺臨川人順治壬辰進士官工部虞衡司主事康熙己未召試博學鴻詞授翰林院侍講司勳五種集二十卷王士祿撰士祿見史類林蕙堂集二十六卷吳綺撰綺見史類王方岐序曰綺所著亭皋集萟香詞林蕙堂文集諸編綺沒之後其子夀潛搜訪遺稿合而編之飲和堂集二十一卷姚夔撰夔字胄師號成葊山隂人順治甲午舉人官安化縣知縣託素齋集十卷黎士宏撰士宏字愧曾長汀人順治甲午舉人官至陜西布政司參政漣漪堂遺稿二卷沈峻曾撰峻曾字窳庵仁和人順治甲午副榜貢生半農齋集八卷蔣中和撰中和字本達又字眉三靖江人順治乙未進士官蘭陽縣知縣遷滄州州判陸密庵文集二十卷録餘二卷詩集八卷詩餘四卷陸求可撰求可字咸一淮安人順治乙未進士官至刑部郎中恥躬堂文集二十卷王命嶽撰命嶽字伯咨號恥古晉江人順治乙未進士官至刑科給事中淡餘軒集八卷孫光祀撰光祀字怍庭號溯玉厯城人順治乙未進士官至兵部侍郎西陂類稿三十九卷宋犖撰犖見史類陳廷敬跋曰犖詩某稿某集者凡三十有四而文稱是焉西陂者犖舊廬也南沙文集八卷附録一卷洪若皋撰若皋字虞鄰臨海人順治乙未進士官至福建按察司僉事漁洋文略十四卷蠶尾集十卷續集二卷後集二卷王士禎撰士禎見史類門人張雲章序文略曰以先生為今之太白子美羣知非溢美語以先生之文為昌黎栁州之文容有或信或不信者士禎自序蠶尾集曰偶次甲子使粵以前及丁卯以後詩文稍成卷帙因以蠶尾名集臣等謹按士禎詩文鏤版者甚夥其詩推重一時古文雖詞章修潔要非專門當時自有公論蠶尾諸集乃康熙甲子奉命祭告南海後所作詩文因阻雪東平望小洞庭中蠶尾山悅其清逺取以名集猶之漁洋為太湖中小山取以自號也其詩之單行者别入詩集類中兹不具録堯峯文鈔五十卷鈍翁前後類藁一百十八卷汪琬撰琬字苕文號鈍翁晚居堯峯因以自號長洲人順治乙未進士官至刑部郎中左遷兵馬司指揮再升户部主事康熙己未召試博學鴻詞授編修七頌堂集十四卷劉體仁撰體仁見子類雪鴻堂文集十八卷李蕃撰蕃字錫徵號懶庵通江人順治丁酉舉人官黃縣知縣暗修齋稿一卷蕭企昭撰企昭見子類改亭詩集六卷文集十六卷計東撰東字甫草吳江人順治丁酉舉人庸書二十卷張貞生撰貞生見史類安序堂文鈔二十卷毛際可撰際可字會侯號鶴舫遂安人順治戊戍進士官彰德府推官臣等謹按際可與毛先舒毛竒齡名望相埒世稱三毛實則亞於先舒而遜於竒齡也初刻詩文曰松皋堂集此則彚而行之又曰會侯文鈔者乃淳安方楘如所重刻也午亭文編五十卷午亭集五十五卷陳廷敬撰廷敬字子端號説巖澤州人順治戊戌進士改庶吉士授檢討本名敬以是科有同名奉旨加廷字官至大學士諡文貞臣等謹按廷敬遭遇熙時和聲鳴盛從容載筆垂四十年海內羣推燕許大手實能與王士禎汪琬並駕齊驅故二人亦甚重之自序謂得汪王砥礪之力為多又曰於汪王不茍雷同則其虛衷若谷與不肯隨人步趨之槩均可想見故能回翔館閣上副主知非偶然也挹奎樓文集十二卷吳山鷇音八卷林雲銘撰雲銘見楚詞類經義齋集十八卷澡修堂集十六卷熊賜履撰賜履見史類臣等謹按前十八卷乃賜履丁憂家居時所刻後十六卷則辛未起復及癸酉致仕十三年中所作經義齋澡修堂皆聖祖仁皇帝御賜扁額之名槐軒集十卷王曰髙撰曰髙字北山號槐軒茌平人順治戊戌進士由庶吉士改給事中霞園文集一卷詩集三卷鄭重撰重字山公建安人順治戊戌進士官至刑部左侍郎荆南墨農全集無卷數徐喈鳯撰喈鳯字竹逸宜興人順治戊戌進士官永昌府推官靜庵集十二卷鄭日奎撰日奎字次公貴溪人順治己亥進士改庶吉士散館授禮部主事讀書齋偶存稿四卷葉方藹撰方藹字子吉號訒庵崑山人順治己亥進士第三官至翰林院學士兼禮部侍郎加禮部尚書銜諡文敏王原祁序曰方藹詩宗蘇陸文宗眉山生平嗜王士禎之詩汪琬之文實兼有二家之長臣等謹按方藹以文章受知世祖章皇帝榮冠詞林後復蒙聖祖仁皇帝召入內廷從容載筆以兩朝教育之恩際一時明良之會故其詩文舂容和雅歌咏升平洵乎治世之音蔚為臺閣之望也日知堂文集六卷鄭端撰端見史類願學堂集二十卷周燦撰燦字星公臨潼人順治己亥進士官至南康府知府世德堂集四卷王鉞撰鉞見史類月巖集五卷周禮撰禮字情耕號月巖宜黃人思誠堂集二卷吳琠撰琠號銅川沁州人順治己亥進士官至大學士諡文端臣等謹按琠此集詩僅五十三首餘皆奏疏雜文並督撫楚中時牌示聖祖仁皇帝嘗親書千文以賜伏讀御跋云琠為人寬厚和平持已清潔先任封疆文武軍民受其實惠者至今頌之朝中之事面折廷爭必得其正則琠生平立朝風采己可想見讀是集者益見聖祖知人善任洵所謂文以人重者矣松桂堂全集三十七卷延露詞三卷南􅐹集三卷彭孫遹撰孫遹字駿孫自號羡門生海鹽人順治己亥進士官中書舍人康熙己未召試博學鴻詞擢第一改編修官至吏部侍郎古愚心言八卷彭鵬撰鵬字奮斯莆田人順治庚子舉人康熙甲寅耿逆之叛九拒偽命卒不汚賊平授三河縣知縣官至廣東巡撫聊園全集十五卷孔貞瑄撰貞瑄見經類葉忠節遺稿十三卷葉映榴撰映榴字炳霞號蒼巖上海人順治辛丑進士官至湖廣布政司參議武昌叛兵夏包子作亂映榴死之特贈工部侍郎賜諡忠節臣等謹按映榴嘗與李基和合刻詩集朱彛尊序之及殉節後其子敷芳彚裒其詩文重刻是集彛尊又為之序蓋映榴之節足炳霄漢固不僅其文之足傳也已張文貞集十二卷外集二卷張玉書撰玉書字素存丹徒人順治辛丑進士官至大學士諡文貞臣等謹按玉書文章爾雅簮筆有年所撰拖諾山等二碑詳述聖武耆定之功足以昭示萬世其紀平定江南等事彰定鼎之鴻勳至為詳核至於賜逰玉泉山等記尤肅雍典麗覺太平愷樂之象溢於簡端其他記述多有資於掌故惟遺稿未經刪定不分卷帙募疏祭文之屬頗病繁蕪四庫全書汰其冗濫釐為十二卷則淨洗微瑕粹然完璧矣柴村集十九卷附録一卷邱志廣撰志廣字粟海號洪區又號蝶庵諸城人世居柴村由貢生官長清縣訓導李澄中序略曰舅氏詩文雜以詼諧出以調笑亦覺風流藴藉罔不宜人晚簾集七卷陳針撰針字于寶龍溪人由貢生官連城縣教諭中巖集六卷宋振麟撰振麟字子貞號中巖淳化人順治中拔貢生鴻逸堂稿無卷數王艮撰艮見經類止泉文集八卷朱澤澐撰澤澐見子類欣然堂集十卷陶孚尹撰孚尹字誕仙江隂人官桐城縣訓導夢華子遺集一卷吳坰撰坰字季野宣城人王士禎居易録曰吳坰文學戰國短長及管韓荀卿子作凖言以擬權書其正學觀時斂禍諸篇可自作一子荆樹居文略十卷李懋緒撰懋緒字汝時號止所江陵人谷水集二十二卷胡夏客撰夏客字宣子海鹽人順治中諸生臣等謹按夏客為前明兵部職方司郎中震亨之子震亨撰唐音統籖時夏客實司校纂蓋其家藏書最富稽覽既博才氣自豪是集凡詩二十卷雜文二卷里人陳光縡序之且為之傳與箋焉杲堂文鈔六卷詩鈔七卷李鄴嗣撰鄴嗣字杲堂鄞縣人順治中諸生黃宗羲序曰鄴嗣詩文從胸中流出無比擬皮毛之習孔天徵文集無卷數孔尚典撰尚典字天徴號汶林江西新城人順治中嵗貢生懷葛堂又集十五卷梁份撰份字質人南豐人草亭文集一卷彭任撰任字遜仕號中叔寧都人孔鍾英集十卷孔育瓊撰育瓊字鍾英江西新城人孔惟敘集六卷孔育功撰育功字惟敘江西新城人江泠閣文集四卷續集二卷冷士嵋撰士嵋字又湄丹徒人懷舫集三十六卷魏荔彤撰荔彤見經類臣等謹按荔彤為大學士裔介之子然是集末附自述一篇中有云手注九古經望道窺一貫發微言明大義不落前儒窠臼則未免過於自詡矣秋水集十六卷馮如京撰如京字紫乙代州人順治中拔貢生官至廣東左布政使偶然云集十卷湯之錡撰之錡字世調宜興人江南通志曰之錡論學以周子主靜之説為宗仿髙攀龍復七規春秋兩會北墅緒言五卷陸次雲撰次雲見史類尋壑外言五卷李繩逺撰繩逺見史類白漊文集四卷沈受宏撰受宏字台臣太倉人芙蓉集十七卷宗元鼎撰元鼎字定九號梅岑江都人王士禎漁洋詩話曰元鼎詩以風調勝酷似才調集其緣情綺靡不減西崑丁卯不礙雲山樓稿無卷數周綸撰綸見子類臣等謹按是編無目録亦未載序跋似非全本天外談四卷石龎撰龎字天外太湖人復園文集六卷董聞京撰聞京字丹鳴烏程人官至吉安府知府章江集五卷安世鼎撰世鼎字鑄九鑲紅旗漢軍人官至江西巡撫緣事禠職政書八卷于成龍撰成龍見史類臣等謹按成龍起家令牧至兩膺節鉞所至以清節著名是書八卷皆其厯任所紀平生規畫具著篇中經濟鴻才固非漫無挾持者比也抱犢山房集六卷嵇永仁撰永仁字留仙别號抱犢山農無錫人以諸生佐總督范承謨幕殉耿逆之難康熙四十七年追贈國子監助教古歡堂集三十六卷附黔書二卷長河志籍考十卷田雯撰雯字子綸一字綸霞號山薑德州人康熙甲辰進士授中書舍人官至户部侍郎趙執信跋曰子綸詩中無人然偏師馳突能自成一隊談藝者弗能廢也王士禎序曰黔書不一格有似考工記者有似公榖檀弓者有似越絶書者如觀偃師化人之戲然與長河志籍考實皆祖郭憲洞冥記王嘉拾遺記之體讀書堂集四十六卷趙士麟撰士麟雲南河陽人康熙甲辰進士官至吏部侍郎九谷集六卷方殿元撰殿元字蒙章别號九谷畨禺人康熙甲辰進士厯官郯城江寧二縣知縣耿巖文選無卷數沈珩撰珩字昭子海寧人康熙甲辰會試第一授內閣中書己未召試博學鴻詞授編修文端集四十六卷張英撰英見經類臣等謹按英蒙聖祖仁皇帝特逹之知簮毫禁闥榮冠清班矢音賡唱歌詠升平故詩格亦進而益上是集和平典雅玉質金相館閣諸臣皆推為詞林巨手至於言情賦景又多淡逺清微蓋燕許閎麗之格與儲孟髙曠之體兼而有之者也健松齋集二十四卷續集十卷方象瑛撰象瑛見史類百尺梧桐閣集二十六卷汪懋麟撰懋麟字季甪號蛟門江都人康熙丁未進士官刑部主事學文堂集四十三卷别本學文堂集四十七卷陳玉璂撰玉璂字賡明號椒峯武進人康熙丁未進士官中書舍人王晫今世説曰玉璂每讀書至夜分兩眸欲合如線輒用艾灼臂久之成痂所為詩文旬日之間動至盈尺見者遜其俊才五經堂文集五卷語録一卷范鄗鼎撰鄗鼎見史類鐵廬集三卷外集二卷後録一卷潘天成撰天成字錫疇溧陽人寄籍桐城安慶府學生溧陽縣志曰天成幼與父母避讐相失年十五乞食行求遇於江西界百計迎歸傭販以養備極艱苦以其間讀書講業竟為積學年七十四訖窮餓以死臣等謹按瞿源淶集有潘孝子傳敘述頗詳蓋天成天性真摯篤志苦行故文章亦如其人當時操觚之士未必重之而身後之名昭如日月洵足為聖朝扶植綱常砥礪名節而尤難其出自寒門食貧終老古之所為獨行君子者其天成之謂乎縱釣居文集八卷應是撰是見經類殘本匏庵遺集三卷石璜撰璜字夏宗别號匏庵如皋人憺園集三十八卷徐乾學撰乾學見經類榕村集四十卷李光地撰光地見經類三魚堂文集十二卷外集六卷附録一卷陸隴其撰隴其見經類隴其從子禮徵識曰從父平生不為詩古文詞尤以濫刻文集為戒故易簀時篋中無遺稿至康熙辛巳禮徴乃旁搜廣輯彚成是集而屬侯銓編次焉臣等謹按隴其學問經術卓然為國家理學之儒集中奏議公牘正其明體達用之學確然見之行事者乃列之為外集至詩歌非隴其所長轉列之為內集則本末倒置毋乃非隴其之旨歟是編次者之失也皋軒文編一卷李光坡撰光坡見經類白石山房稿十三卷别本白石山房稿二十六卷李振裕撰振裕字維饒吉水人康熙庚戌進士官至兵部尚書已畦集二十一卷原詩四卷葉燮撰燮見史類趙恭毅剩稿八卷附裘萼賸稿三卷趙申喬撰申喬武進人康熙庚戌進士官至户部尚書諡恭毅裘萼賸稿其子熊詔撰熊詔字裘萼康熙己丑進士第一官至翰林院侍讀藕灣全集二十九卷張仁熙撰仁熙見子類臨野堂文集十卷鈕琇撰琇見子類芝在堂集十五卷劉醇驥撰醇驥見經類立命堂二集十三卷嵇宗孟撰宗孟字淑子山陽人官至杭州府知府沈珩序曰已刻賦若干卷詩若干卷文若干卷故編為二集計賦十二首詩四百三首文八十八首凡七卷七卷以下附刻各種小集曰蠡史曰星路陽秋曰識小箋曰詩拇曰甌樂行舊録皆各為一卷又詩餘一卷曰酒古董有懷堂詩文稿二十八卷韓菼撰菼字元少號慕廬長洲人康熙癸丑進士第一官至禮部尚書乾隆三十年賜諡文懿朱彛尊序曰菼文學臨海朱右所選唐宋六家蘋村類稿三十卷附録二卷徐倬撰倬字方虎號蘋村德清人康熙癸丑進士官至翰林院侍讀聖祖南巡進所纂全唐詩録晉禮部侍郎附録二卷其子元正遺稿元正字子貞號靜園康熙乙丑進士官至工部尚書禮山園文集八卷李來章撰來章見史類殘本經史緒言一卷朱董祥撰董祥見經類南畇文集十二卷湯潛庵文集節要八卷彭定求撰定求見史類臣等謹按定求受業於湯斌斌之學出於孫竒逢而根柢於姚江是集留意於文章之有關學術者而持論則能持朱陸之平無所偏倚節要八卷則擇其師遺書諸刻中有切於身心者倣聶豹南軒節要之例而纂之者也旭華堂文集十四卷補遺一卷續編一卷王奐曾撰奐曾字元亮别字思顯號誠軒山西太平人康熙丙辰進士官至湖廣道監察御史通志堂集十八卷附録二卷納喇性德撰性德見經類兼山堂集八卷陳錫嘏撰錫嘏字介眉號怡庭鄞縣人康熙丙辰進士官翰林院編修蘧廬草一卷黃鍾撰鍾字宏音號蘧廬如皋人康熙中諸生青門簏稿十六卷附邵氏家録一卷青門旅稿六卷青門賸稿八卷邵長蘅撰長蘅一名衡字子湘武進人曝書亭集八十卷附録一卷竹垞文類二十六卷朱彛尊撰彛尊見史類臣等謹按趙執信談龍録以彛尊王士禎為國朝大家謂王之才髙而學足以副之朱之學博而才足以運之蓋彛尊茹涵既富自根柢宏深實則論其詩固與士禎分途並騖論其文更在漁洋文略之上自順治乙酉迄康熙己丑凡六十五年之作具載是集至文類二十六卷乃未入翰林時所刻王士禎為作序極稱其永嘉詩中南亭西射堂孤嶼瞿溪諸篇至有曝書亭集所未録者則自悔其少作而汰之也西河文集一百七十九卷毛竒齡撰竒齡見經類門人蔣樞識略曰先生自康熙三十八年以後越五年而歸又九年而卒中間研講殆無虛日所積經集文集如千卷既刻而原目未載者今悉補入但全集板多殘缺從孫聖臨重檢校輯其無從補輯者闕而有待如經集之儀禮疑義文集之文例策問表是也臣等謹按竒齡著述最富除分載各部外此一百七十九卷則當編入集部者也陳檢討四六二十卷陳維嵩撰維嵩見史類王士禎古夫于亭雜録曰陽羡陳其年諸生時老於場屋小試亦多不利己未博學鴻詞之舉以詩賦入翰林不數年病卒京師及沒而其鄊人蔣京少景祁刻其遺集無隻字遺失皖人程叔才師恭又注釋其四六文字以行於世一以桑梓後進一以平生未面之人而收拾護惜其文章如此孜堂文集二卷張烈撰烈見經類西堂全集五十六卷鶴棲堂詩稿五卷文稿五卷尤侗撰侗見史類臣等謹按侗詩文類多綺靡恆傷率易江南通志載其全集五十九卷朱彛尊撰墓志銘則云五十四卷彼此互異鶴棲堂者康熙己卯聖祖南巡御題賜侗者也故首載侗恭撰御題鶴棲堂記及其子孫紀恩之作並附録同時投贈詩文于後朱彛尊所謂鶴棲堂稿十卷合詩文計之適得其數也遂初堂文集二十卷詩集十五卷别集四卷潘耒撰耒見經類抱經齋集二十卷附焚餘草一卷徐嘉炎撰嘉炎字華隱秀水人康熙己未召試博學鴻詞授檢討官至內閣學士白茅堂集四十六卷顧景星撰景星見經類溉堂前集九卷續集六卷後集六卷詩餘二卷孫枝蔚撰枝蔚字豹人三原人康熙己未薦舉博學鴻詞以老病不能入試授中書舍人叢碧山房集五十七卷附詩義固説二卷龎塏撰塏字霽公號雪崖任邱人康熙己未召試博學鴻詞授檢討降中書舍人終建寧府知府二曲集二十二卷李顒撰顒見經類卧象山房集三卷附録二卷白雲村集八卷李澄中撰澄中見史類秋錦山房集二十二卷李良年撰良年字武曾秀水人初冒姓虞名兆潢康熙己未嘗薦舉博學鴻詞聰山集十四卷申涵光撰涵光字孚孟亦作符孟又曰孟和自號曰鳬盟永年人恩貢生思復堂集十卷邵廷采撰廷采字念魯餘姚人康熙初諸生拙齋集五卷朱竒齡撰竒齡見經類張邇可集四卷張逺撰逺字邇可蕭山人由貢生官縉雲縣教諭顧汧序曰逺詩三變蕉園最先梅莊次之雲嶠則官縉雲時所作為最後三集格調皆與毛竒齡相近蓋二人同里得法於竒齡者多云秋水閣文鈔一卷陳維嶽撰維嶽字緯雲宜興人維嵩之弟夢鼎堂文集四卷若溪集一卷任觀瀛撰觀瀛字子登一曰紫登蕭縣人康熙己未進士官至陜西潼商道居業齋文集二十卷别集十卷金德嘉撰德嘉字會公廣濟人康熙壬戌進士官翰林院檢討德星堂文集八卷續集一卷河工集一卷詩集五卷許汝霖撰汝霖字時庵海寧人康熙壬戌進士官至禮部尚書素巖文稿二十六篇王哲生撰哲生見子類周廣庵全集三十八卷周金然撰金然字廣庵上海人康熙壬戌進士官至司經局洗馬奉使滇南集無卷數許嗣隆撰嗣隆字山濤如臯人康熙壬戌進士官翰林院編修嵗寒堂存稿十卷林璐撰璐字鹿庵錢唐人諸生皇朝文獻通考卷二百三十二
