body:
  text: 選舉考十六考課乾隆三十三年諭向來各衙門保舉撫民同知通判例由吏部請旨特派大員考試第思此項人員原不過取其通曉字義標判文書而止並非場屋衡文可比若一一傳集校藝恐其中轉易滋代倩傳遞諸弊甚屬無謂嗣後各衙門保舉此項人員彚送吏部照月選官之例令其赴部親筆繕寫履厯以憑核對不必另為派員考試臣等謹按向例考試保舉人員久成具文今奉諭止令填寫履厯以從核實所以澄敘官方者至矣又諭向來部院各衙門京察屆期所有列入一等人員均由吏部帶領引見至二三等留任各官並無引見之例該堂官等以循分供職無關黜陟之典且人數衆多其中即有年力衰庸不無稍為姑息人材既難考核公務未免曠鰥大典何由克副嗣後京察二三等人員內凡年至六十五歲以上者並令吏部一併帶領引見候朕鑒定庶曹司不致濫竽戀棧而該堂官甄别公私亦可立辨於澄敘官方益昭慎重著為例又諭各省歲貢生應用教職人員督撫考驗務須詳慎甄别不得稍示姑容其教職遇有懸缺向來率委别學教官代理此等司鐸微員兩任豈能兼顧現在各省有挑選二等舉人在籍候選教職之員遇有缺出需人聽候督撫會同學政挨次派委暫署則員缺既不致久懸而需次者亦不致間曠自為一舉而兩得該部即遵諭行又諭翰林詹事府應考人員自乾隆二十八年考試之後迄今已閲五年著於初五日在正大光明殿考試尋定一等吳省欽等三員二等宋銑等十八員三等袁鑑等三十員四等祝德麟等十五員不入等德昌等二員又滿洲由别衙門升用翰詹等官之一等巴彥學一員二等恆濟等二員三等覺羅德成等五員四等鶴齡一員不入等兆毅一員分别升降有差又諭向來各部司員補授御史該堂官等有奏請仍兼本部行走者雖為熟諳部務起見但御史有稽查各部之責若仍令兼司部務不無意存瞻顧嗣後司員改任御史奏請留部之處著永行停止其現在御史中兼部行走者并著撤回又諭各省甄别教職佐雜及千總等員前經諭令吏兵二部於年終核較彚奏但各省地方大小不等額設員辨多寡不同其在地狹員少之省每年酌量甄别一二員即不得謂之姑息若大省員數衆多而其甄别斥退者不過略舉數人塞責則較之小省為數稍多而統計該省原額所去尚不及百之一二且並有全行留任者勢必至衰頽庸劣之員姑容戀棧而年壯應用者反阻升進之路豈核實澄敘之道嗣後吏兵二部於彚奏時各按省分大小屬員多寡核其去留之數列單呈覽並統核三年內有無甄别一併奏聞臣等謹按甄别人員勸懲攸繫兹定為統核彚奏之例庶政歸核實吏治益昭慎重矣三十四年諭前經降旨令兵部將俸滿之滿洲副將參將隔二三年題奏一次今據該部將各省俸深之員開列名單具奏此內厯俸在五年以上之滿洲蒙古副將著該部行文調取來京引見所有參將各員俟厯俸七年再行調取來京引見著為令又諭昨吏部將各部院保送楚呼楚辦事之蒙古郎中等帶領引見率皆年齒衰邁之人雖將哈喇勒岱派出不過就短取長非謂其果副此選也各部院堂官遇內地美差多擇出色司員保送而於此等差使輒以衰庸無用之員充數塞責即此可見各堂官不能實心任事著傳旨通行申飭嗣後如再蹈此轍必將該堂官交部議處三十五年督撫大計薦舉人員厯俸未滿三年分别議處吏部議覆刑科給事中虞鳴球奏請嗣後各省大計無論正附薦舉之員除本省前後閲厯數任及輾轉升署或緣事開復一時扣算未清經臣部核明未滿三年者照例議駮該督撫免其查議外其自到任之日起扣至該督撫具題之日止實在俸次易於扣算顯然未滿三年者該督撫明知必經部駮故違定例濫行列入即將該督撫隨本查議照越次保題降一級留任從之三十六年諭今日吏部引見京察人員比較單內翰詹衙門保送一等者已較上屆為多其外又有兼部行走之員由部注考仍赴本衙門引見雖屬循例辦理但此等人員既已職係翰林不占部員之數而翰詹衙門又以由部保薦聽其溢於舊額似此兩相影射浮濫潛滋殊非慎重考績之道所有此次兼部翰林之保列一等者俱著撤去不準帶領引見嗣後滿洲翰詹各員有兼部行走列在一等者即入於各該部保送員數內一體比較其仍歸本衙門另班聲敘之例不必行又各部院衙門有到任未滿半年之員仍由原衙門注考者該堂官往往曲為奬藉冀博寬厚之名按之激揚大典究乖核實此等人員任事之日既淺即才猷出衆何妨暫置二等俟下屆再登薦剡奚事亟亟於此一時為耶著自今年為始即為查明改正所有原衙門注考之例永行停止至各衙門人員在翻書房行走者因其給事勤勞亦準保送一等向例由該管大臣注考而引見則仍歸各本衙門并不於單內注明尤易混濫此後翻書房準其自為一項吏部另行帶領引見候朕閲定後即為將來比較之數並著為令又諭太常寺鴻臚寺讀祝鳴贊等官其職專於宣贊自以儀嫺聲亮者為優間有升任各部院衙門者仍兼本寺行走遇典禮執事如常並不藉其專心部務與翰林兼部者不同是其考察又當責其本寺堂官而不必歸於部院矣乃向來京察太常寺鴻臚寺官升任部院者皆由所升之缺注考而本寺置之不問所列一等率取其次者濫充既非所以示平允亦不足以昭勸勵即如前日引見鴻臚寺京察人員該寺因永信已升刑部而以伍林泰為一等夫永信在刑部不過旅進旅退即二等尚屬過分而在鴻臚傳贊實為傑出之員逈非伍林泰所能及因將二人等第更置今日太常寺之德明扎爾漢亦然若仍拘泥成例於造就人材之道無益嗣後讀祝鳴贊等官升任後仍兼本寺行走者俱由該寺堂官注考保送著為令又吏部議覆總理泰陵事務公永璥等奏陵寢筆帖式係隨同司員供職辦公之員三年舉核大典該員等竟置之不議不足以示勸懲嗣後準其照部院筆帖式之例一體辦理從之又諭本日引見京察各員內翰林庶吉士亦有列入一等者該員尚未散館授職不應遽膺薦剡著撤去嗣後庶吉士保列一等之例著停止又諭嗣後各省推升知府人員該督撫驗係堪勝任者仍遵前旨辦理外不能勝任之員亦著一體送部引見或仍令回任或留部另用候朕臨時分别降旨其向例升銜留任未免過優應改照卓異人員例加一級以示平允著為令又諭吏部將各部分别堪勝繁簡缺之知府人員帶領引見內有保送簡缺兵部郎中張萬國一員朕閲其人年力衰庸即簡缺亦難勝任因降旨將該員仍行留部堂官則官保蔡新等注考咨送甚屬非是各部院司員在署辦事情形該堂官皆所習見至年滿截取分别繁簡自當秉公核實不得稍事姑容方為允協該堂官如此漫不經心貽誤甚大使到任後一經體察即登彈章於該員既難保全而人缺紛更官方已深受其弊撫躬自問亦何所為而出此耶所有此次濫行咨送張萬國之堂官俱交部議處三十七年諭嗣後各部司員派出坐糧廳倉差者除京察仍依舊例由倉場衙門分别出考外其有於任內值報滿之期者吏部且不必行文截取俟該員差滿回部後再行知照該堂官分别繁簡及是否堪勝外任之處咨送吏部引見著為令三十八年諭兵部將各處保送以副將參將等官應用之員揀選帶領引見時朕視其中人去得者揀選數人記名以緑營官員簡用至伊等記名後各省有奏請調用人員者陸續揀發並非現在便可得缺發往理宜簡發之前於各項差務仍照常奮勉茍以業經記名不日便用遂將一應差務視為膜外頇了事此乃斷不可有之惡習著交各該大臣嚴行申飭各管記名人員揀發之前務於各項差務當留心奮勉毋得稍有怠忽倘有因已記名於一切差務視為膜外頇了事者該管大臣即據實參奏又諭前據裴宗錫奏到屬員賢否各府州內列在三等凡三員其中知府李世瑞佘模二員因拿獲鄰省盜犯升用者其才具皆屬中平現在留心察看如果未能向上難膺表率當即據實糾參所奏甚是嗣後各省督撫均宜照裴宗錫所奏虛公甄别弗存成見於特用人員內見有不堪䇿勵之員即當據實具奏斷不可有意遷就稍事優容可將此通諭各督撫知之又敕督撫大計考察藩臬另摺具奏先是乾隆三十三年浙江巡撫熊學鵬條奏凡遇大計之年藩臬二司令該督撫出具考語繕具履厯清單隨本進呈奉諭嗣後遇大計之年著督撫等於藩臬考語另摺具奏聲明交部存案毋庸再於本內夾單著為令又諭向來吏部推升文職人員曽令該督撫等出具考語送部引見而兵部之推升武職送部引見時該督撫並不出具考語所辦尚未畫一此等推升人員部中不過因其厯俸既深循資敘擢至其平日居官之優劣及於營務是否有益惟該督撫為能深悉嗣後著各督撫遇有論俸推升武職人員於給咨送部時亦照文職例出具切實考語咨部兵部於帶領引見時注明緑頭籖上候朕臨時酌量録用著為令三十九年諭嗣後凡新疆各處卡倫侍衛三年期滿果能巡查嚴密不與哈薩克布嚕特等私行貿易並無過犯者準其保列二等如照常行走者著列為三等其保列頭等帶領引見之例著停止定離任候補各官京察例吏部奏請考察各官適屆京察之期年滿離任候補尚未得缺者仍由原行走之處注考從之又諭昨因分部學習人員三年期滿奏留本部及歸部銓選之例未經明晰以致厯年辦理每有參差令軍機大臣酌議凡留部之員統歸各本部以主事用其次以知縣歸班銓選及監丞等官用者仍照舊例甄别嗣後分部學習人員三年報滿時各該堂官等務須秉公核實甄别毋致濫竽滋弊將此通諭知之四十年諭御史邱日榮所奏京察人員必本衙門厯俸三年方準保送一等意在杜絶躁進之風所言不為無見即不能照外省拘定三年亦當酌示限制著該部詳悉妥議具奏尋議京察人員由别衙門升調新任及由外任升補京職人員在現在衙門厯俸已滿一年方準一體保送從之又吏兵二部會同議覆鴻臚寺卿江蘭條奏查廢弛營伍向由提鎮題揭參處是以免其處分至欽派督撫大臣查閲營伍之時有以廢弛參奏者並不由提鎮題揭自應將該管將備一體分别議處從之又諭兵部議將總兵哈攀鳯照徇庇例降三級調用係因鴻臚寺卿江蘭近日條奏定議其例未免過嚴各省提鎮所轄將備如果年力衰憊弓馬不堪並不預行參劾原應酌豫處分但各標營員甚多督撫於巡察營伍時必不能不察出一二以塞責若即將提鎮實降則應降調者歲不知凡幾安得如許堪勝提鎮者而易之人材難得亦殊可惜且恐督撫等因立法過嚴慮提鎮之輕罹參處即實遇衰頽庸劣之員亦竟姑容不劾日久流弊轉致營伍廢弛甚有關係並督撫與提鎮或有嫌隙即藉此為挾私報復之計亦屬非宜著該部另議行又諭騎射係滿洲本業今閲在京八旗大臣等送到引見人員步箭甚屬不堪此內應行補放之人步箭平常將擬陪者補放以示懲警所有此次在京挑選引見人員之都統副都統等俱著交部議處並將此通諭八旗官兵等嗣後若仍有似此者不惟將該管大臣議處必將伊等從重治罪又諭據高晉奏推升廣西平樂協都司之守備陳錦章因患病精力疲弱請勒令休致此等辦法貌似秉公久之不免流弊其人才具中平或僅勝守備而不勝都司或僅勝都司遊擊而不勝副將參將該督撫等於各省推升時據實奏聞自屬公當若年齒衰邁及精力疲弱則平日早應知之何直待其推升始行劾奏此不過常時曲示姑容及部推之後必須送部引見知難逃朕洞鑒恐干詰斥是以故為此奏以塞責各督撫類此者甚多殊非封疆大臣秉公整飭營務之道著傳諭通行申飭嗣後如仍有似此辦者必須將該督撫議處四十一年諭據裴宗錫奏石阡府知府洪彬由刑部司員俸滿截取以簡缺知府用該員才質中平辦理地方公務每形竭蹶難勝表率之任請給咨送部引見可否以府佐改補所奏甚是著交部照例辦理各部郎中員外俸滿截取知府令該堂官酌量繁簡分别出具考語保送引見其不勝外任者即聲明留部原屬慎重甄别之意乃相沿日久各該堂官率徇情取悅以繁缺保送者多而簡缺及留部者少昨經降旨申飭今裴宗錫適有此奏可見各部堂官之保送不能公當矣向來各部保送人員遇有貪黷敗露原舉之堂官考成甚重而簡缺選用人員或有不勝任者該堂官向無處分遂不免於任情濫舉嗣後各部保送簡缺知府經督撫奏其不勝方面之任者其原舉之堂官亦當豫以議處俾知警惕其應如何酌定之處著該部詳議尋議得嗣後各部保送知府人員經督撫以不勝知府參奏者將原保送不實之堂官照濫保繁缺知府致犯貪贓之例議處從之定各衙門濫保筆帖式處分吏部言在京各衙門滿洲蒙古筆帖式外升知縣於咨取時令各該衙門於筆帖式內將厯俸五年以上堪勝外任者出具考語按衙門員數保送升用如後有以不勝外任題參者將濫保之堂官照例議處從之又諭嗣後遇督撫題奏知縣改教人員摺奏到部留心察核如有曾任教職之人除由下第揀選分發及舉人進士本班截取選授知縣者毋庸查議若原保之督撫升調他省見所保之員難勝民社不肯回護前非據實奏請改教者自應免其處分止將原保之學政議處其餘保舉堪膺民社之教職有仍改教者所有原保之督撫學政均照例議處若該督撫於改教摺內不將原係教職保舉之處聲敘經部查出將該督撫嚴加議處倘該督撫瞻徇原保之上司情面任意姑容經朕察出或經科道糾參必將該督撫重治其罪又諭向來部院各堂官每屆計典除薦舉外不過約略劾去一二員以符成例其餘槩豫優容姑息瞻徇之習皆所不免明年又屆京察之期各該堂官務將滿漢司員及筆帖式等秉公核實舉劾沙汰毋許稍示姑容倘仍有心存徇庇致衰病庸劣之徒濫竽曠職者或經朕訪聞或為科道糾彈必將該堂官從重議處將此通諭知之四十二年諭向來各衙門保送京察一等人員俱照上次數目比較寧闕毋濫引見時吏部開單進呈候朕閲定於甄簡材能之中仍寓慎重激揚之意惟是每次比上屆少一人下屆又比此次少一人遞行遞少勢將無所底止亦非所以示鼓勵嗣後吏部引見進呈比較清單著將上兩次數目一併開列若此次比上屆多一人而較之再上次數仍相仿即可毋庸裁減將來吏部較核亦以此為準如此酌中定制既無慮濫膺保薦亦不至屈抑人材著為令又吏部奏請凡告病人員該督撫等應詳慎注考其有患病劣員出具應補考語至病痊補用後或犯有貪酷劣迹並才力不及者將從前出考之督撫及該上司均照保薦不實例處分從之令州縣佐雜不得輾轉更署大學士阿桂疏奏州縣為親民之官刑名錢榖是其專責佐二有彈壓地方稽查匪竊監獄等項均須實缺之員辦理方無貽誤請嗣後各省州縣佐雜不得輾轉更署如有必須調署者將緣由並委調若干員按季造册咨報查核通省實缺調署數在十分之二以外將督撫藩司照徇情例議處從之又諭保舉教職雖由司道府縣等轉詳然其人之堪膺保薦與否則由督撫學政核定主稿使司道等所詳未當督撫等原可駮正既已列之薦剡其處分自應較重而原詳者酌豫從輕方為允協至所保堪膺民社之員後經他省以才力不及參劾者其原保題之上司固難辭咎然竟議以降級調用不準抵銷設或所保之員有犯貪婪不法者其原保官又當如何加重乎所有議處原保上司之例著該部另行詳悉妥議具奏尋議得嗣後保送教職人員如僅以才力不及題參或仍請改教者將主稿之督撫學政改為降二級留任申詳之司道府改為降一級留任從之令道府以下等官終養滿服由本籍督撫驗看分别奏咨浙江升任巡撫三寶奏請道府廳州縣等官凡遇病痊起用以及終養丁憂服滿請咨赴選者均由本籍督撫驗看如果年力不至衰庸查敘原咨考語給咨赴部引見補用佐雜各員咨部銓補倘精力就衰難勝原官之任即行據實分别奏咨降補改教勒令休致以昭慎重或其中有不甘廢棄情願來京引見人員即照大計六法人員情願引見之例準其給咨赴部引見從之又諭向來副參各員每屆五年該督等分别一二等密行咨部具奏一次而提鎮因係專閫大員向未之及今思各省提督不過十餘員皆朕所深知者始行擢用原無俟該督之甄核至總兵員缺為數甚多間有經朕特加簡用之員其餘或因副參等於保送引見時酌量記名升用亦有因軍營勞績及資俸稍深從而升補者其人之才具優劣及在任管轄操防是否於營伍有益皆無由深悉嗣後著各該督將所屬總兵亦照副參之例出具切實考語分别等次每屆五年密為陳奏一次即以今歲為始其無總督省分即著兼提督之巡撫遵照辦理宜一秉至公毋稍瞻徇四十三年諭向曾令翰林院於輪班日期帶領編檢十人引見以備甄識著於三月內朕謁陵回鑾後將現在編檢按班通行輪帶嗣後每閲五年即請旨辦理一次四十四年吏部奏請凡卓異官原任錢糧未清及前後别犯貪贓不法向例督撫降二級調用司道等降三級調用查保用人員雖由司道等申詳其堪膺薦舉與否則専由督撫核定出具切實考語咨送引見僅照舊例處分殊未允協請將舊例司道降三級調用者今改擬督撫降三級調用其司道等即請照議處督撫舊例查議庶計典不致濫邀懲勸益昭平允得旨允行四十八年諭現在京察屆期所有各部院衙門保送一等人員著吏部即行辦理於三月內帶領引見又諭昨召見詹事興桂見其年力已衰已降旨將伊原品休致此等三品京堂每逢京察屆期吏部不過照例具本開列既不似各部院堂官時常接見又非如四品以下京堂特派王大臣驗看帶領引見者可比是衰庸者得以戀棧轉致有礙後進者升途非澄敘官方之道嗣後京察時滿漢內閣學士副都御史仍著吏部照例開列具題其餘大小三品京堂既不便派王大臣驗看俱著吏部一體帶領引見其履厯注明所有本年京察三品京堂即著照此例行又諭臺灣為海疆重地民番雜處最關緊要向例該處總兵道府俱係三年更换即調回內地該員等因瓜期不逺未免心存玩忽以致諸務廢弛近來屢有械鬬滋事之案必當設法調劑俾該地方文武大員久於其任新舊相兼則伊等知責成綦重方足以資整頓嗣後臺灣總兵道府各員俱著改為五年任滿屆期若一體更换未免更易生手著將總兵道府各員輪間更换每過兩年更换一員庶該處前後交代常有久任熟諳之員經理於海疆重地自有禆益著為令四十九年諭據福嵩參奏石門縣知縣朱麟徵因地保張奕高承催錢糧多未完納令役責處張奕高推諉不服出言唐突該縣將張奕高重責三十板旋因傷重斃命請將朱麟徵革職等語所辦未免過當知縣身膺民社如於所管人役有因私挾忿責處致斃情事自應參奏革職治罪今朱麟徵於地保徵催錢糧多未交納且又挺撞本官責處三十板亦係如法決責不得謂之濫刑若因此而槩請革職則將來州縣所管吏役保約皆得有所依恃挾制本官於實力辦公之道殊多未便嗣後如挾嫌逞凶致斃人命者仍照例辦理外如事屬因公按法責斃所屬人役該督撫止須奏請交部議處部議時亦不過議以降級留任已足示警不得遽行革職致啓胥役刁惡之漸著為令五十年諭朕因修四庫全書未免從權優用兹書既告成理應循名責實以清翰苑是以於乾清宫考試而切題者不一二見祗按其文字優劣分為四等其留館者各宜讀正書勵實行勉之考列一等陸伯焜等二員二等蔡廷衡等三十五員三等彭冠等五十員四等羅修源等三十二員不入等饒慶捷等四員分别升降留任改補部屬知縣及休致革職有差又考試滿洲由别衙門升用翰詹等官一等慶齡一員二等觀永等二員三等傅彬等二員四等九十四等二員不入等阿禮謨一員留任降革有差皇朝文獻通考卷六十二
