body:
  text: 欽定四庫全書皇朝文獻通考卷一百三十九王禮考十五大狩臣等謹按古者搜苖獮狩之典所以講武事而數軍實其事與振旅治兵相表裏降及兩漢射熊長楊之館校獵廣成之苑詞臣鋪張形於賦頌唐開元禮有田狩儀宋初恆以秋冬或正月田於四郊元時御位及諸王位下皆有打捕獵户而近郊捕獵則謂之飛放今之南苑即元飛放泊也明時亦稱南海子置海户千餘守之永樂天順間常搜獵於此我朝以神武定天下太祖太宗開國之初常率諸貝勒大臣親行校獵申嚴軍令賞罰必當世祖一統中外嵗時行幸南苑間或幸塞外行圍以習武備聖祖際承平之運自三孽平定以後兵革不試然猶時巡塞外建山莊於熱河每嵗避暑於此蒙古諸部獻其牧地以為至尊肄武合圍之所秋時大獮名王扈從射獵奔走恐後畏威懷德悉主悉臣蓋於講武示度之中寓柔逺綏邊之略視古所稱為乾豆為賔客而有事者規模更宏逺矣我皇上恪遵家法每嵗巡幸木蘭舉行秋獮之典四十九旗及喀爾喀青海王公分班入覲負弩先驅一如故事加以天威逺暢西域蕩平康居大食之名王布露大宛之貢使投誠歸命稽首塞垣者莫不瞻仰清光蹈舞震讋所以法天行繩祖武鑒文恬武嬉之失而厪持盈保泰之衷訓武習勤治內安外用永固此丕丕基也猗歟盛哉天命十年四月上自瀋陽城出獵初上命族弟王善等統兵征東海瓦爾喀部有功至是軍還上自瀋陽城出畋迎之翼日至避蔭地行獵凡四日會於木户洛地王善等率衆軍士朝謁上以所獵獸百餘賜之天聰二年十二月戊子上率諸貝勒羣臣出獵於東北四百里外三窪地方是行也上親殪五虎從臣皆驚服神勇下令諸貝勒射中之獸有爭論者付審理官驗對勿明言諸貝勒射中何處爭論之人射中何處但匿名驗傷即付傷痕相符之人四年十一月己邜上幸札木谷行獵時節候嚴寒隨獵之人俱苦寒瑟縮垂帽護面及耳上諭窄帽手不入袖控縱馳射若不知寒漢人蒙古各官莫不稱異六年十月己巳上行獵至新哈達地方庚午獵於費德里山甲戍上還瀋陽諭諸貝勒大臣曰凡出兵行獵時有為盜者論罪大小或殺或鞭久著為令乃此畨行獵仍有盜鞍轡䩞屉等物者是法令不彰而人不遵守也夫搜苖獮狩原以講習武事必紀律嚴明然後人不敢犯今行獵兵少尚多犯法若師行動衆將何以約束之乎爾諸貝勒大臣其遍行親察嚴加懲治於是諸貝勒大臣等嚴查緝獲上以就彼地處分恐衆人不知令攜至瀋陽梟首以徇丁亥上率諸貝勒出地載門往獵於葉赫地方庚寅上行圍諭諸貝勒曰爾等不可以獵人所射之物冒為己之所射而奪取獵人誰不懼爾諸貝勒若爾等強為已有而奪之誰敢抗拒時阿薩蘭布庫侍側上目之曰如彼最稱強勇我若令之仆彼敢不仆乎遂以手指阿爾薩蘭令之仆即仆因諭曰爾等若強奪獵人之物亦如是也自後獵人不得以己之所射因貝勒之故而讓之宜各就獸被傷處審驗真偽再令隨爾等之綿甲軍各立誓倘再有厮卒人等盜取馬絆䩞轡等物者罪及其主決不姑宥至爾等之厮卒出入圍場者俱不得攜帶弓矢違者罪之十二月癸酉上率諸貝勒出獵至撫順所有獵卒八人強取民間積薪各鞭二十七集八旗大臣諭之曰自今以後不許私入莊屯擅取堆積柴薪行獵時山木亦不得砍伐違者執究庚辰獵於厄野地方辛巳以從獵者亂行復諭每旗令大臣一人専私統轄有不隨札蘭牛録行走逗留失次者皆執治之七年十一月辛亥上率諸貝勒往獵於葉赫地方癸丑諭隨獵大臣官員軍士等曰凡行獵處有擅入圍中者貝勒罰良馬一匹札蘭額真罰銀十五兩旗長罰銀十兩間散人罰銀九兩離伍退後者與入圍同罪遇榛葦而規避不入者亦罪之見野豕成羣不驅入圍入而向外逐射者亦罪之見猛獸在易射之地則往告貝勒在險地則令原派勞薩等入捕之其餘間散厮卒宜令在後有射中麅鹿帶箭走入圍中者即告於所在貝勒準其追尋不告而私尋者罪之八年十一月甲戍上率諸貝勒獵於蒙古地方乙亥諭從獵者曰搜苖獮狩古人原以之講武須有紀律若猝遇猛獸不可輕射毋許一二人逗留在後有逗留者執之若遇黃羊勿逼近追逐恐逼逐之反致從後逸出爾等各按泛地分圍駐守帶傷之獸不可隱藏馬之羈靮鞍韉毋相私竊違者罪之九年六月癸邜上諭諸貝勒大臣曰昔太祖時曾禁諸貝勒子姓不許郊外放鷹今聞違背禁令仍復擾民此風漸不可長放鷹之人應自備牛羊以供諸人食用不宜需索民間若剝削小民而取其牲畜貧民何以堪此且朕凡行師出獵雖嚴寒之時皆駐蹕郊野不入屯堡亦恐耗損民物耳嗣後放鷹之人如擾民不止事發之後決不輕恕十一月癸亥上與諸貝勒率兵三千往獵於長嶺丙寅傳諭從獵者曰凡札蘭章京該管泛地務宜申明約束遇野豕及熊勿射但向圍內逐之若遇虎遣人奏聞並傳報諸貝敕隨後躡其蹤若朕及諸貝敕已射之獸從人尾追勿因追獸脫走而奪他人所射之獸倘有奪取者許同赴驗傷官處察視上遂由長嶺厯米鴉湖蒙古莫落科及鳩緑哈達諸地射獵凡十有二日上射殪虎四鹿麅野豕共一百二十八崇德二年閏四月乙邜上率諸王往獵於葉赫地方丙辰上渡遼河行獵時有護軍統領哈寧噶巴都禮等率獵人前後離伍行上怒責之曰爾等皆習熟畋獵之人凡獵必先整圍場然後併力合圍乃可獲獸今爾等漫無紀律或前或後何獸之可得耶此皆該管章京懦弱不能約束之所致今姑寬宥後再如此定治以重罪七年十一月甲戍上率諸王貝勒羣臣出地載門行獵於勒克地方丁丑上由鐡嶺獵於開原丁亥獵於吳牙漢地方見有帶傷之鹿從正白旗泛地奔走傳令射之正白旗人俱不射鹿遂逸去上怒集從獵衆官諭曰夫疲馬力以行獵者原欲公同合力射獸耳在事之人不分彼此遇獸即當射殺不射不殺何能有獲朕親令正白旗人追射帶傷之鹿竟觀望不射聽其逸出不可不加懲治於是執札蘭章京等官更畨鞭責復以正紅旗札蘭章京道喇哈寧噶泛地有帶傷野豕逸出亦鞭責之順治三年十月禁官員人等於近京百里內圍獵貝勒以上欲獵於百里外者必請旨方行違者治罪八年九月禮部擬定儀注凡車駕出獵外藩王以下公以上於行在朝見賜宴各官侍班鳴贊唱贊行禮如不賜宴不侍班行禮亦不唱贊從之十年三月上幸南苑行圍南苑方一百六十里在永定門外二十里元為下馬飛放泊明永樂中增廣其地以為蕃養禽獸種植蔬果之所中有海子大小凡三自萬泉莊平地湧泉滙注於此四時不絶有晾鷹臺亦名按鷹臺皆元舊也禁城北有海子故此别名南海子本朝設總管防禦等官守之周圍繚以垣墻四達為門時命禁旅行圍以肄武事臣等謹按南苑行圍世祖親政以後聖柤御極之初嵗每舉行皇上踐阼以來亦嵗時習武於此比於周之靈囿漢之上林兹特舉一以見例其餘不復備載云康熙二十年十二月甲戍上幸米峪口乙亥上聞居民有為虎傷者是日圍獵南山上親殪二大虎并一小虎民絶虎患二十一年二月上巡幸盛京辛丑上出山海關行圍壬寅次中後所癸邜次寧逺州丙午次廣寧縣皆行圍三月丁巳上自盛京至琉璃河戊午次札凱皆行圍庚申上巡幸烏喇地方行圍辛酉次鄂爾鐸哈噠壬戍次哈噠畢喇癸亥次喇湖塔鄂佛羅甲子次庚額乙丑次庫魯戊辰次阿爾灘諾門己巳次色穆懇畢喇皆行圍四月辛巳上自烏喇回鑾己丑次噶哈達巴漢辛邜次威逺堡壬辰次三塔堡皆行圍甲辰上在沙嶺城行圍甲辰上在寧逺州行圍臣等謹按我朝列聖相承神武天縱是嵗聖祖仁皇帝巡幸盛京出山海關抵廣寧次烏喇途間親御王弧行校獵之典嗣後每嵗出口行圍或一嵗再舉每合圍時射殪虎豹甚多我皇上恪遵祖制嵗幸木蘭以習勞肄武吉日教獮獲禽無算恭讀記注所載御箭射中虎豹熊羆應弦即仆者無日無之兹故不能備録非如周易之獲三狐雅詩之殪大兕以偶然命中誇耀簡册也丙寅諭寧古塔將軍巴海副都統薩布素瓦禮祐等曰圍獵以講武事必不可廢亦不可無時冬月行大圍臘底行年圍春夏則視馬之肥瘠酌量行圍令貧人採取禽獸皮肉須預先傳明日期以便遵行所獲禽獸均行分給圍獵不整肅者照列懲治不可時加責罰苛求瑣屑遇有猛獸須小心防禦以人為重勿致誤有所傷十一月定派兵口外行獵之制是月戊辰議政王大臣等奏口外一年兩次行獵講武事宜上曰一次行獵每佐領派護軍三名驍騎七名太多若口外一時不得水草不亦難乎尚書杭艾等奏曰議政王大臣曾議及此但既為講武不便太少在外分作兩班行獵亦不為多口外地方水草似不缺少上曰一年兩次行獵専為講武與行兵無異校獵紀律自當嚴明從前行獵之人概令帶旗不許擅射今既講武若槩令帶旗不許馳射何以習武此行獵於三四人內令一人帶旗其餘俱令馳射如此遞換帶旗遞換騎射則均可練習武事𨗳獵章京最為緊要應於章京侍衛內揀選才優者委任其行獵紀律當作何嚴明預令通曉著議政王大臣再議具奏至十二月甲戍朔議政王大臣等遵旨議定行獵紀律入奏得旨兵數太多駐營之地水草必致艱難朕意一年派兵一萬二千名分為三班一次行獵撥兵四千於四月十月十二月令其前往行獵則兵既少水草易得人馬俱不致困乏近見部院衙門官員不諳騎射者多以前亦有派往出征者此行獵亦著一併派出令其嫺習騎射二十二年三月戊午諭派出行獵諸王大臣等曰圍獵之制貴乎整嚴不可出入參差令左翼官在左右翼官在右統轄而行宗室公等毋得越圍場班次在後逗留如或逗留則衆人停待圍場必致錯雜爾等須嚴加管轄先是宗人府題分派諸王三班行獵事宜上曰爾等如何分派和碩安親王嶽樂奏曰臣等為便於行走各視其家族分派上曰行獵雖係習武亦有整飭號令之事一班之內皆派一旗一家之王恐圍場中不便彼此爭論隨取擬派人名參互更定復申諭訓飭之六月上幸古北口外行圍臣等謹按實録世祖章皇帝順治四年駕出張家口行獵八年駕出獨石口行獵次上都河由古北口入塞外行圍實始於此聖祖仁皇帝屢幸塞外舉搜田之典蒙古諸藩獻遊牧之地周千有餘里規以為圍場即所謂木蘭也嗣後每嵗車駕避暑塞外至秋進哨行圍率以為常間於冬月再出口校獵聖躬之不自暇逸如此兹不復具載而謹志其緣起云二十三年設虎鎗營時黑龍江將軍送精騎射善殺虎新滿洲四十人到京令分隸上三旗設虎鎗營總統一人以內大臣或侍衛充每旗設虎鎗總領以大臣侍衛參領官員充凡大狩行田則從遇大獸則列鎗從之若命殺虎則以首先刺虎一二人名奏聞至雍正元年定每旗虎鎗總領二人虎鎗長七人副長七人三旗虎鎗凡六百人旗各二百人凡虎鎗總統總領皆著黃色馬褂鎗長紅色馬褂虎鎗人白色馬褂襟俱鑲以青四月令各省駐防官兵每年分班行圍江寧將軍瓦岱疏言請率標以下官兵一年兩次行圍得旨瓦岱所奏極是各省駐防官兵若不令其每年行圍習武漸致怠緩軍士將流於玩愒為匪但江寧地方駐防雖久向不曾令其行圍恐民人不知以為駭異著該督撫將習武行圍之處明白傳諭又恐軍士行圍借端搶奪騷擾地方著該將軍嚴行禁戢三十七年上巡幸盛京十月癸卯上於奇爾賽畢喇地方行圍射殪二虎其一虎卧於山下驚鳥鎗聲而起上隔澗發矢穿其脅虎應弦倒斃新滿洲俱大駭奏曰從未聞隔澗望影能射倒猛虎者也四十年上巡幸塞外行圍八月甲申上行圍發矢穿兩黃羊并射斷拉哈里木時近御諸台吉無不驚異奏曰即鳥鎗亦不能穿兩羊並拉哈里木我等自幼從未經見如此射法上曰此亦借黃羊跳躍之勢故射穿耳四十二年建行宫於熱河曰避暑山莊自古北口至熱河車駕頓宿之所曰巴克什營曰兩間房曰王家營曰常山峪曰喀喇河屯自熱河至圍場曰中關曰波羅河屯曰張三營皆有行宫俱康熙年所建規制朴素有茅茨土階之風焉四十八年上巡幸塞外九月丁亥上於巴顔陀羅海獲異鹿藏其角內庫臣等謹按自古帝王之世河出圖洛出書麟遊於郊鳯翔於苑以凡景星慶雲白狼赤之屬罔不爭呈符瑞以光至治之隆聖祖仁皇帝登三咸五隂陽和而萬物序休氣充塞故山靈亦獻其奇異鹿所由獲也恭讀御製鹿角記有曰嘗閲武庫所藏皇祖時鹿角一記曰康熙四十八年九月五日上於巴顔陀羅海所獲其長自􅑠骨至尖各三尺九寸有十分寸之五兩尖抵直得七尺有九寸兩末徑距凡四尺義之數十有六最末者不尖而博狀如魚尾義如芝朵近􅑠者其圍八寸有十分寸之二既堅且澤不紾而昔景鑠哉是蓋我皇祖神威所攝山靈不敢閟其珍用出瑞獸以燕聖人而什襲天府示我後昆俾無忘先烈誥戎益勤也臣等仰見聖祖仁皇帝內府珍藏詒謀深逺皇上頌揚祖德久而彌光豈特表希世之殊祥永無疆之休應已哉五十年上行圍自熱河啓行八月庚辰次鄂爾楚克哈達是日上哨獲大鹿十一船厰佐領那栁奏曰臣生長本地一日獲十一鹿者臣實未經見真神奇也上曰朕從來哨鹿行圍多所殺獲何神奇之有五十八年八月己未諭近御侍衛等曰朕於騎射哨鹿行獵等事皆自幼學習稍有未合式處侍衛阿舒默爾根即直奏無隱朕於諸事諳練者皆阿舒默爾根之功迄今猶念其誠實忠直未嘗忘也朕自幼至今凡用鳥鎗弓矢獲虎一百三十五熊二十豹二十五猞猁猻十麋鹿十四狼九十六野豬一百三十二哨獲之鹿凡數百其餘圍場隨便射獲諸獸不勝紀矣朕曽一日內射兔三百一十八若庸常人畢世亦不能及此一日之數也朕所以屢諭爾等者以爾等年少宜加勤學凡事未有學而不能者朕亦不過由學而能豈生而能者乎六十一年上幸塞外行圍賞隨圍蒙古王貝勒貝子公台吉等衣物有差理藩院議定蒙古隨圍之多羅郡王四人各賞緯帽一綿龍縀袍一粧縀褂一佩帶一副襪靴一雙腰刀一撒袋一副弓矢具貝勒四人貝子二人公四人減腰刀撒袋弓矢餘與郡王同札薩克一等台吉一人減縀褂餘與貝勒貝子同台吉塔布囊都統副都統參領佐領侍衛總管副管驍騎校等共四百二十二人各賞官用縀一隨圍驍騎長槍手鳥槍手前鋒護軍領催哈嘛爾嚮𨗳捕户等共千七百四十二人各賞銀六兩牽駝馬人及蒙古王等之隨從人共五百八十五人各賞青布一銀三兩九月乙酉諭議政大臣等從前曾有以朕每年出口行圍勞苦軍士條奏者不知國家承平雖久豈可遂忘武備前噶爾丹攻破喀爾喀并侵擾我內地扎薩克至烏蘭布通朕親統大兵征討噶爾丹敗走後又侵犯克魯倫朕統兵三路並進至昭莫多剿滅之今策妄阿喇布坦無端侵犯哈密地方朕徴發阿爾泰及巴爾庫爾兩路兵進剿策妄阿喇布坦聞之心膽俱碎乃遣策零敦多卜等潛往西藏劫掠毁壞寺廟土伯特地方已被殘蠧朕又遣大兵前往擊敗策零敦多卜等復取西藏救土伯特於水火之中我兵直抵西藏立功絶域此皆因朕平時不忘武備勤於訓練之所致也若聽信從前條奏之言憚於勞苦不加訓練又何能逺至萬里之外而滅賊立功乎爾等諸臣咸宜知之雍正八年四月令八旗侍衛執事人等學習步圍副都統劉汝霖等奏言漢軍人等應習步圍得旨步行較獵甚為善事人人既得學習而於行圍之道亦得嫻熟爾等每年與其較獵一次不若多演數次為善嗣後於初冬行步圍時每一旗令行圍二三次其行圍之時著各該旗大臣等親身帶往於前一日奏聞每圍派侍衛打牲人鷹上人或二十名或三十名亦著前往如此則侍衛執事人等既得學習而兵丁等亦得嫻熟行圍之道矣皇朝文獻通考卷一百三十九
