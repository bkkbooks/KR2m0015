body:
  text: 征𣙜考四鹽乾隆元年正月弛窮民販鹽四十斤以下之禁停止商人私雇鹽捕及巡船汛兵以除擾纍奉諭㫖私鹽之禁以大夥私梟每為盜賊逋藪務宜嚴加緝究然恐其展轉株連故律載私鹽事發止理人鹽並獲其餘獲人不獲鹽獲鹽不獲人者概勿追坐至於失業窮黎肩挑背負易米度日不上四十斤者本不在查禁之內乃近見地方官辦理私鹽案件每不問人鹽曽否並獲亦不問販鹽斤數多寡一經指拿輒根追嚴究干纍多人至於官捕業已繁多而商人又添私雇鹽捕巡鹽船隻凡遇奸商大梟公然受賄縱放而窮民擔負無幾輒私拘執或鄉民市買食鹽一二十斤者並以售私拿獲此弊直省皆然而江浙尤甚朕心深為憫惻著直省督撫嚴飭各府州縣文武官辨督率差捕實拿奸商大梟勿令疏縱其有愚民私販四十斤以上被獲者照例速結不得拖纍平人至貧窮老少男婦挑負四十斤以下者概不許禁捕所有商人私雇鹽捕及巡鹽船隻幫捕汛兵俱嚴查停止毋得滋擾地方又改浙江巡撫為總督管理兩浙鹽政浙江布政使張若震奏稱藩司之職經管通省錢糧難以兼管鹽務奉諭㫖大學士嵇曽筠現為浙江巡撫著改為總督兼管兩浙鹽政浙省海濵之地向來鹽價每斤不過數文今加一倍且有不止一倍者小民甚為不便嵇曽筠可悉心調劑使之平減俾商民均受其益又裁汰滇省鹽課盈餘以平鹽價奉諭㫖朕聞滇省鹽價昻貴每百斤自二兩四五錢起竟有賣至四兩以上者邊地百姓物力艱難僻壤夷民更為窮苦每鹽價太貴有終年茹淡之事朕心深為軫念查該省鹽課除正項外有增添盈餘以備地方公事之用朕思盈餘之名原係出於民力充裕之後若民食不充自無仍取盈餘之理著總督尹繼善悉心妥辦將盈餘一項即行裁汰令鹽價平減縱使昻貴亦只可在三兩以下若裁去盈餘之後公用有不敷處另行酌議請㫖減廣西鹽斤價值先是廣西鹽引因商人無力承辦於雍正元年經督臣孔育珣題請官運官銷借動庫銀將鹽本赴廣東納價配鹽分給各州縣照部定價值發賣行之二年已有盈餘遂將通省鹽價照部定之數每斤減價二釐百姓稱便雍正五年又經孔育珣奏稱粵西鹽斤自官運官銷以來已無鹽缺價貴之虞應請照原定部價一體銷售不必裁減二釐經部議准至是奉諭㫖食鹽乃小民日用之需部價既多二釐則民間所費必不止於二釐廣西地瘠民貧道路遙逺應令鹽價平減以惠閭閻自乾隆元年為始著照雍正元年原題每斤減去二釐銷售該督撫可嚴飭各州縣不許加增分毫務使小民均沾實惠暫停浙江鹽政領發餘引大學士浙江總督管理鹽政嵇曽筠奏查兩浙正引每年共七十萬一千六百九十八道雍正七年間前督臣李衛預請餘引額目十萬道經部議准鹽多增配鹽少續銷贏縮隨時原不拘定成數嗣後則步趨前例必欲取盈遞年增至二三十萬引不等查上年冬掣不敷正額今届夏掣竭力趕煎只可照正引捆運暫停請領餘引從之又議准浙江鹽務四條大學士浙江總督嵇曽筠條奏浙江鹽政四條一商捕難裁請盡改為官役報明地方官造入卯簿以便約束一水路巨梟積販原藉兵役駕舟巡緝請將緊要隘口令有司㑹同營汛逐一確查編號造册以備巡緝之用一巨商領運鹽斤自應一引一鹽若飛渡灌包夾帶引鹽相離殊非鹽法定制應飭巡船辨兵一體查拿究處一巡緝私鹽應以功過之大小定賞罰之次第嗣後巡鹽兵捕能拿獲私鹽船隻應分别賞給有差部議應如所請從之定漁户領鹽例兩江總督趙宏恩奏覆酌籌鹽務事宜經部行查各欵逐一分晰咨部查漁户領票赴買之鹽除淮分司所屬場分厯來並無海關照票亦無完課之處至通泰二分司所屬各場每逢魚汛之期沿海居民雇備船隻先赴海關投納船稅請領照票本關驗明該船梁頭尺寸九尺以上為大船八尺以上為中船七尺以上為小船票內填定舵工船户姓名並大中小尺寸漁户執票赴場場司驗票大船給鹽三千斤中船給鹽二千斤小船給鹽一千斤漁户買鹽出洋採捕汛畢歸港報明場司查驗該船得魚若干如魚少鹽多即令將餘鹽歸垣售商如魚多鹽少漁户即投醃切牙行照魚數買鹽復醃仍照魚數於狼鎮投納餉稅然後裝赴江南貨賣此外並無完納别項課銀再報稅用鹽俱以魚數之多寡為憑此等船隻承潮雲集赴場則多報漁數希圖混冒鹽斤赴關則少報魚數希圖脫漏稅課關場官役勢難盤查實數每多受其欺䝉應飭令各場員每年汛畢漁船進港該船報明捕得漁數一面查核用銀之多寡一面將各船魚數咨呈狼鎮收稅衙門如漁户投稅少報魚數聽收稅衙門查究則漁船不敢揑報冒鹽亦不敢減數漏稅應飭行為例下部議行又定浙省增斤改引例奉諭㫖浙江濵海地皆斥鹵向來鹽價甚賤居民稱便十餘年來鹽價增長近則加至二三倍不等朕再四圖維並留心咨訪鹽價之貴固在於場鹽少産亦由於商本艱難惟有使商人鹽斤充裕則鹽價自然平減今酌定增斤改引之法將杭嘉湖三所引鹽循照兩淮舊額每引加增鹽五十斤連包索共重三百三十五斤至松江一所原屬濵海産鹽之區向因額設季引九萬餘道分别上中下三則徴收正課公費銀五萬四千餘兩遂使近場州縣多有鹽貴之苦今循照沿海溫台等處之例改行票引九萬餘道每引給鹽四百斤令商人設店住賣如此增斤改引則商本寬裕轉輸便易庶可復還數十年前之原價以便民用又以運河挑淺預運鹽斤酌寬商人納課限期奉諭㫖淮揚運河於來嵗挑淺鹽船不能行走民食所關必須先事綢繆預為捆重運至儀所以便源源運往口岸計得預鹽七十萬引但商人行鹽原係陸續完課以次轉輸今既預運七十萬之引鹽即須早完七十萬引之正雜錢糧商力未免竭蹶查鹽務正雜錢糧商人向分三次完納首先完銀謂之請單其次完銀謂之呈綱最後完銀謂之加斤此舊例也今朕寬緩其期將此預運之引鹽所有請單呈綱兩次應納錢糧准於加斤時一併完納俾商力寬舒得以從容辦課至淮北引鹽亦由運河經過所有預運鹽斤十萬餘引亦照此例行嗣以預運與正運一齊趕辦恐其中仍不免竭蹶令將淮南丁巳綱正運引鹽未築壩以前運到儀所過掣者其應納請單呈綱錢糧各先完納一半餘聽陸續完納總限奏銷之時全數通完俾商人更得通融辦理裁滇省鹽課盈餘并除分派烟户食鹽之弊先是滇省鹽價昻貴每百斤有賣至四兩以上者敕諭滇省督臣裁減盈餘以平鹽價續於是年又奉諭㫖各省鹽政辦理之法各異如雲南所産井鹽俱係府州縣領銷派定額數由各鹽井領運分銷辦課不許越界販賣通行已久兩迤衝繁之處人民輻輳不難照常銷引間或缺鹽借之鄰近州縣通融協濟其山僻州縣鄉村窵逺居民鮮少地方官恐蹈墮銷之咎關礙考成遂將鹽斤分派里甲挨户分食官鹽按限繳課名曰烟户鹽小民家口多者可以照數納銀若貧民家口無多餘鹽未曽食盡及期催追前課未完後派又至輾轉積纍懸缺難償夫鹽為小民日用必需之物慮民逺涉是以因地制宜不徒為銷引計也一則患鹽之不足一則患鹽之有餘俱非均平之道著該督撫酌量變通悉心妥議務使官不墮銷民無偏纍户部行文該督經督臣尹繼善等疏奏仍下户部議覆除井地賣價每百斤自二兩內外至三兩以內者毋庸置議外其黑井等井鹽斤運至昆陽永北建水保山嶍峨開化石屏等處行銷鹽價每百斤既自三兩一二錢至四兩一二錢不等應令該督等遵奉上諭減至三兩以下至鹽斤派散烟户多由鹽不能銷官慮考成所致自應酌量變通改撥調劑其白井墮銷鹽九十萬斤照依該督等送部原册改撥省店並元謀等州縣行銷白井井東按板改板等井煎鹽共八十四萬一千六百斤其鹽課及本欵盈餘銀兩相應一併准其豁免滇省每年正項鹽課銀二十七萬六千三百三十九兩七錢零今除豁免銀一萬四千三百九十餘兩尚應徴課銀二十六萬餘兩應令該督尹繼善等造入鹽課奏銷册內具題查核疏上如議行臣等謹按滇省地處極邊水程難達自後漢時夷人嵗輸鹽一斛以為常賦至明季而分井各置鹽官我朝因之順治十七年給票易引以出鹽多寡定經制課程各隨商販照例抽稅雍正二年於鎮沅府地方開按板井於威逺地方開抱母井三年於普洱地方開磨黑井元江府地方開猛野土井合之白珥雲龍安寧阿陋等共十五井地不愛寶鹽井已視前加闢而升平日久生齒繁庶苖猺夷猓仰食於各井鹽斤是以鹽價日昻皇上裁減盈餘以核定鹽價為民食計者至周且渥而因地制宜改撥調劑則一時酌盈濟虛裒多益寡之道並著於此矣二年免兩廣鹽課餘平銀兩户部議准兩廣總督鄂彌達疏稱兩廣鹽課商人完餉每一千兩於平頭三十三兩之外徴收飯食銀十五兩其餘平二十五兩全行免徴應如所請從之四年議准古州行食粵鹽先是乾隆三年户部議准兩廣總督鄂彌達疏稱貴州省古州地方原係新闢苖疆向無官引行銷俱係買食淮鹽價值甚昻民苦食淡經臣於雍正十年七月內奏明撥發帑鹽委員運往該地試銷每斤定價二分一釐聽該地方民苖買食題增引餉欽奉諭㫖允行嗣查古州試銷帑鹽將及五載委員料理民苖稱便但思官辦究非常策自應招商認引行鹽以定章程咨商貴州督臣轉行鹽道核議兹據驛鹽道黃嶽牧詳稱黔省司道所議從前于古州設埠試銷之始恐僻逺居民未能遍及是以於丙妹永從三角􅋭等處俱設子埠以便民屯就近買食今試銷五載日漸疏通應以古州為總埠分撥銷售其商人亦應聽古州同知管理每年銷引應請定額四封計引三千八百道遞年按引輸餉歸古州同知衙門督徴銷解所有應輸餉銀應請照粵東次輕之保昌埠例每封餉銀六百二十七兩五錢三分有竒遞年額引三千八百道共應輸餉銀二千五百一十兩一錢四分有竒所有鹽斤亦照東省各埠每引行鹽二百三十五斤自乾隆四年行銷乾隆三年引鹽為始彚入東省額內造册奏銷每斤應照定價賣銀二分一釐母許絲毫增長應如所請從之至乾隆六年復於銷買引鹽酌減價銀案內每斤減銀二釐停止浙江省儲備鹽斤先是管理浙江總督嵇曽筠疏稱請動道庫帑羡收買餘鹽入厫存貯以備平價之需至是巡撫盧焯奏稱出易之時分派各商腳費甚重鹽斤消耗力不能賠勢必取償於賣價不但纍商并以纍民是貯鹽一事殊未有便部議應如所奏將儲備鹽斤永行停止從之又以兩浙鹺政分𨽻江南敕江南督撫提鎮督率所屬稽查私販奉諭㫖江南蘇松常鎮四府及太倉州皆邊海鄰場為浙鹺門户該地方文武官辨倘或巡緝懈弛必致有妨引課而藉端滋擾又必有纍平民著江南督撫提鎮諸臣時飭所屬官辨實心稽查善於辦理務期有禆公事不擾閭閻勿以為鄰省之鹽政而淡漠視之又免雲南各鹽井歸公之項及黑井鍋課銀兩奉諭㫖雲南黑白琅等鹽井舊有規禮銀二千八百餘兩歸入公項下為公事養亷之需在於每年發給薪本銀內扣解在當日柴價平減竈户猶能供辦聞近年以來童山漸多薪價日貴兼之鹵淡難煎所領薪本不敷購買柴薪之用竈户未免艱難所當酌量變通以示存恤著將白琅二井節禮黑井鍋課銀兩免其扣解俾竈户薪本較前寬裕所有公項不敷統於銅息銀內撥補放給六年議准酌加淮鹽引價成本先是乾隆四年十一月太僕寺卿蔣漣奏兩淮運地極廣鹽價日昻小民甚受其纍請仿照長蘆之例官為定價湖北巡撫崔紀奏湖廣通省行銷淮鹽䝉世宗憲皇帝特差吏部侍郎黃叔琳等酌定價值逮雍正二年鹽臣噶爾泰奏海潮淹沒鹽場倍增成本懇祈隨時銷售部議覆准至乾隆二年部議據鹽臣三保撫臣崔紀開列成本數目互相參校請㫖并交接任鹽臣準泰秉公查察巡撫徐士林㑹同確核定議旋經撫臣鹽臣等㑹議查南鹽草本之資包索水腳之費辛工火足之用掣鹽之裝載三汊河之起駁揚州漢口之商夥灣頭關鈔之稅課及織造銅斤河餉等之銷算引窩根窩之租息合之引課定額按照閣部㑹議通盤酌核賤價時每引應需成本銀五兩三錢七分三釐八毫零每包一錢二分八釐每斤一分五釐六毫零至貴價時每引應需成本銀五兩七錢八分二毫零每包一錢三分八釐六毫零每斤一分六釐八毫零按欵造册大學士㑹同户部議覆應如所請奉㫖依議至是巡撫徐士林奏恤商正以惠民懇加給淮商餘息每引三錢至七年九月兩淮鹽政準泰奏場竈為行鹽根本連遭水潦商運艱難懇再加每引餘利三錢下部議駁奉㫖今年江省被水非尋常可比著照依該鹽政所奏以次年四月為限不得為例七年定福建鹽務歸水商辦理並定該省行鹽引額户部議覆閩浙總督那蘇圖等奏稱法定例自應以部引為憑商領引以行鹽官按引而徴課方可無那移影射之弊閩省除汀州一府尚食粵鹽外其餘各府州縣舊額共部頒引一十萬九千九百二十二道每引配鹽多寡不等額徴正課及額徴丘折銀共九萬四百六十一兩六錢嗣經定例將鹽院衙門及商人盡行裁革援照粵東瓊州府竈户徴課之例均派各場交與各府州縣照數收納解司上遊西路延建邵三府屬下游福興泉漳福蒲潯􅜉惠浯浦詔各場俱係官運其餘各縣或招水客行運或聽民販在場完課挑賣漳州府屬之龍溪海澄南靖長泰平和龍巖漳平寧洋八縣在於石碼設館徴課奏准遵行並未請引至雍正六年十年節經督臣先後奏請閩省之鹽全歸商運惟永安一縣仍留官運更有福州府屬之長樂福清泉州府屬之晋江同安或係附場之邑或係産鹽之區非官運不能遏絶私梟毋庸招商其漳州府之漳浦海澄長泰平和詔安暫委官運現在招募水客承充亦經奏准遵行而厯年因循至今並未請引查閩省鹽額原額九萬四百六十一兩六錢零又經裁革鹽院各官雜費歸公銀八萬二千二百一十兩又雍正元年以後陸續升報丘折銀三百七十三兩八錢零共銀一十七萬三千四十五兩五錢零內除原額及新升址折共銀一萬三千八百八十五兩七錢零另行解部外實存銀一十五萬九千一百五十九兩七錢零此項額征有年自應定為正引內西東南三路及各縣澳共應給引五十四萬五千六十五道合之西路鹽斤銀兩連雲澳額課及台灣鹽埕餉銀徴課如額應令僉商分地行銷定為正課其附近場地各縣仍歸官辦又前經户部議准督臣郝玉麟以閩省銷鹽既招水客承充應酌定盈餘均勻配搭此項盈餘銀一十四萬一千六百九十八兩六錢零厯年徴收並未缺額似應定為餘引其西東南三路及各縣澳共應給餘引四十萬六千九百四十四道及連雲澳台灣頒發餘引定為盈餘額課再此外每年尚有盈餘銀兩每年西路約發餘引二萬三千道東南二路及各縣澳約發餘引十萬道應額外銷算不入年額考成之內倘有存剩餘引繳部查銷均應如所奏辦理得㫖如議行又議准勻銷粵鹽商引酌量改撥並將沿海鹽􅫒改種稻麥以重本計户部覆准署理兩廣總督慶復條奏粵省各商埠地逺近不一其近在場竈之埠因各場産鹽日多鹽價日賤民間多食就近私鹽而官鹽壅滯難銷此名曰難銷之埠其離場地稍逺界近鄰省雖運費加增民多買食此名曰易銷之埠請將難銷埠引勻撥於易銷之埠配運行銷應如所奏辦理如有勻出埠地轉難為易或受勻之埠别有難銷仍准臨時酌量題請改撥又沿海鹽􅫒太多宜改稻田以絶私販之源查鹽斤米榖均關民食而産鹽之區日多究不若産米之地日墾粵東鹽􅫒前據侍郎吳應棻等奏請改為稻田臣部原恐産鹽或有不敷民食無以接濟且已墾鹽田均係斥鹵諒難改種榖麥是以無庸置議今查粵場近年以來正鹽之外收有餘鹽出産甚多四處充溢應如所奏將離場窵逺之鹽􅫒飭改稻田數經雨洗即可改種稻麥從之又准四川蓬溪等處積滯鹽引改撥行銷户部議覆四川巡撫碩色奏稱蓬溪一縣於雍正九年計口授鹽時原額袛陸引四百九十七張嗣復增一千三百五十二張又增水引一百七十八張較原額三倍有餘又瀘州仁夀縣松潘㕔均有積滯引張難以行銷今查有德陽等十三縣均以食指漸繁額鹽不敷情願各就近便認銷應如所請將蓬溪等四㕔州縣積引二千二百五十一張自乾隆八年為始酌量改撥於德陽等處就近行銷得㫖依議速行以淮揚鹽務道事歸併淮揚道管理户部議淮揚海一帶地方場竈俱係淮揚道所屬其通州地方場竈亦與該道所屬毗連請將鹽務道所有事宜俱責成淮揚道管理青山頭守備三江營陸路守備及各營辨丁并原設巡役俱聽鈐束從之八年議准兩淮乙卯綱未完引額提入癸亥綱閏月內帶銷户部覆准兩淮鹽政凖泰奏稱兩淮引鹽經前任鹽政三保奏請自庚申綱起將乙卯綱引鹽照帶戊之例分作十年帶銷今乾隆八年遇有閏月現行癸亥綱引既不敷民食自當通融酌辦以資接濟應如所請將己巳年淮南應帶乙卯綱引一分提入癸亥綱內帶辦得㫖准行九年改撥川鹽接濟滇黔兩省民食户部議覆四川巡撫紀山疏稱滇省東川等處鹽斤不敷民食經滇省督臣奏請改撥川鹽接濟查犍為各厰現有餘鹽可以增引行滇應令照富順原行水引一百五十張折增陸引一千八百七十五張自厰順流運至宜濵縣換截引紙水小之時督商運至鹽井渡若時届大水仍聽由筠髙長寧等縣換截引紙運至川滇口岸令滇省民人商販接運發賣其犍鹽入滇務令川省換截各衙門將截過引數日期移明滇省查察其應徴課銀查川省水引一張徴稅銀三兩四錢五釐陸引一張徴稅銀二錢七分二釐今以折增陸引一千八百七十五張按引徴稅應令該撫飭令犍為縣照現行折增陸引數目按則徴收造報至行滇引鹽既於宜賔換截自應照例刋入引紙以便換截配運其黔省施秉縣及鎮逺縣屬之西南北三隅均係沿邊買食川鹽地方應令一併刋入引紙從之十年添鑄煎鹽盤角兩淮鹽政吉慶奏言臣前因兩淮所産之鹽僅敷年額並無積餘足備緩急是以籌議奏明添鑄盤角二十七副較之䥕煎費省産多甚為便利自應多為添鑄以資廣産而備儲蓄兩淮煎䥕向係商人呈明開鑄兹添鑄盤角應無論商竈如有情願備資自鑄者許其循照往例呈明官為稽察從之又議准兩廣鹽法八條户部議覆兩廣總督那蘇圖條奏兩廣鹽法一商缺宜分年帶徴以清帑項一催追商缺宜酌定議處議叙之例以示勸懲一現在埠商宜秉公甄别以肅鹺政一運鹽到埠宜令地方官先收鹽價以專責成一加增各埠鹽包宜盡行革除以清鹽法一緝捕私鹽宜頒發賞格以示奬勵一各屬鹽規宜責令首報一運司分司鹽庫宜徹底清查以杜侵冒俱應如所請從之又定淮揚預運鹽斤每引加鹽之數是年淮揚之串場等河築堤挑濬鹽舟不能行走其丙寅新綱預先趕運特㫖諭令請單呈綱兩次應納錢糧俱緩至加引時一併完納又以預運鹽斤堆積垣所不無滷耗著照乾隆二年之例凡本年十二月三十日以前到所新鹽每引加耗二十斤自是每恭遇南巡省方之嵗皆奉諭㫖加耗如例又准兩淮食鹽撥於綱地行銷兩淮鹽政吉慶因山清等八州縣食鹽壅滯屢次奏請通融酌銷以三分留運本地以七分撥運綱鹽口岸行銷户部照例議覆不准所請奉諭㫖通融撥銷鹽引自於商人有益其夾帶影射之處該鹽政等亟當實力稽查以清弊竇著暫准其所請俟一二年後食鹽疏通之日該鹽政奏聞仍照定例辦理嗣於十一年四月以淮南寧國等縣壅積食鹽經鹽政奏請通融行銷户部仍按例議駁上以事同一例准其所請交與該鹽政遵照淮北之㫖一體辦理十一年豁免海贛二州縣鹽場帶徴銀兩奉諭㫖淮安分司所屬坐落海贛二州縣之板浦徐瀆中正莞瀆臨洪興莊等六鹽場乾隆十年以前未完折價帶徴銀兩一體豁免十二年定淮南運楚限期並建常平鹽倉於漢口鎮户部議覆湖廣總督鄂彌達奏言淮鹽運楚船大難行改用小船得以速運請將現在可裝四百引以上至一千二百引之船准其常行裝運其水程日期擬裝四百引及五六七百引之船定限一月到漢其裝八九百引以至一千二百引之船定限四十日到漢逾限十日以外即比照凡差送起解官物違限律笞二十以每五日加一等科斷又漢口建造常平倉厫以存貯遞年未銷積引自是有備無患查倉基舊址有二十三處雖或經棄置或經改造請即飭令各商仿照從前倉房酌量修葺仍轉飭鹽道於場鹽旺産水滿風便之時督令各商預為多運存貯以備接濟從之十三年加給兩淮引額鹽斤兩淮鹽政吉慶奏稱兩淮綱食引鹽近因蒲草歉産包索減輕鹽斤易致虧折仰請量豫加增俟蒲草豐時奏聞停止奉諭㫖於引額之外每引增給十斤俾商本不致虧折民食永資利益十四年以長蘆鹽臣請增課額傳㫖申飭交部察議長蘆鹽政麗柱奏稱大軍凱旋辦理一切善後事宜官兵糧餉等項在在需用其撥協軍餉之各省嵗支俸餉亦所必需請照康熙十四年之例蘆東每引增銀五分並請飭令兩淮兩廣河東浙江等省一體按引增課奉諭㫖金川用兵供億固為浩穰但國家公帑所儲儘足敷用且康熙十四年增加鹽課原因開創未久正供缺乏今時勢懸殊豈可援以為例麗柱著交部察議又議准粵省鹽引按年酌撥運銷户部議准兩廣總督碩色奏言粵省難銷埠地共有順德等四十二埠易銷者計有連州等三十六埠奏請將難銷各埠積引撥交易銷之埠代為運銷三年一撥造册報部惟是近場難銷之埠尚不止於四十二處此外如仁化江浦乳源陽江長樂等二十餘埠亦皆屬近場疲爛之區與其三年之後方始造册報部致有在外私融之弊莫若按年隨時酌撥據實報部且查閩省鹽法遇有難銷額引俱係按年隨時酌撥彚册報部閩粵事同一例自可援照辦理從之十六年豁免兩淮竈户未完折價帶徴銀兩奉諭㫖兩淮竈户僻處海隅專以煎曬鹽斤為業其生計更窘於農民殊深軫念所有乾隆二年至十四年因災停緩帶徴各未完折價共四萬二千餘兩著加恩照民户例一體豁免臣等謹按場竈為鹽法根本之地竈丁為鹽場作苦之民故竈户之勤與農家等蓋竈丁終年盤䥕之間畜蕩草勤淋曬謹火伏候隂晴薄寒盛暑不得休息展四體之力僅足以給衣食我皇上軫念細民咨詢疾苦憫其生計更窘於農民數年逋缺盡豫豁免計通州分司所屬各場曰豐和曰掘港曰石港曰西亭曰金沙曰吕四曰餘西曰餘東曰角斜曰栟茶泰州分司所屬各場曰富安曰安豐曰梁垜曰東台曰何垜曰丁溪曰草堰曰小海曰劉莊曰伍祐曰新興曰廟灣曰板浦曰中正曰臨興凡場有竈竈有户户有丁丁有額家人婦子棲息於濵海斥鹵之地按册考數可以坐計而周知大抵兩淮鹽場執業約有二端淮南之鹽熬於盤其形散淮北之鹽晒於地其形顆鹽成輸賦為民食之源國家所以保護而生全之者旁皇周浹無不曲至自是年豁免帶征折價之外有蠲恤以救其歉收有借給以免其稱貸雖煮海編氓漸有家給人足之象睿慮所經不使一夫不獲其所也加兩淮綱食引額鹽斤奉諭㫖朕省方所至廣沛恩膏因兩淮商衆運綱輸課接濟民食著將兩淮綱鹽食鹽於定額外每引加賞十斤不在原定成本之內减一分售鹽之價即利一分食鹽之人其有昻值綱利致纍閭閻則深負德意矣該鹽政其通示商衆知之又免兩淮追繳鹽引貴價盈餘並令淮商嗣後不得於貴價外另增價值兩淮運銷丁卯戊辰己巳三綱引鹽皆照原定貴價曽經部駁追繳鹽政吉慶奏請免追户部仍照例議駁奉諭㫖向來各省鹽引原聽其自相交易無官為限制之例長蘆河東至今尚然惟兩淮行運江楚鹽引適因崔紀沽名三保庇商兩持異議始將各商運楚成本分别定以賤價貴價然自定價以來商人總以貴價銷售至今夫恤民裕商本屬一事若任其屢擡時價日引日增則於民食有害然勒令賤價則該商等又以成本有虧不免紛紛籲請今計各商比年行銷價值於成本自可無虧將來即藉口年嵗不齊料亦不過如今之所稱歉年而止耳嗣後淮商銷售引鹽即遇應貴之年亦不得於現在所銷價值外復議稍有加增庶可示以限制至於嵗事豐稔鹽價可以酌量平減則令各該督撫㑹同鹽政等隨時籌畫妥辦部臣亦不必固執定例徒滋駁結之繁庶於商民均為有益至於部議已賣貴價復令商人追繳之處事理亦屬難行若云買貴在民則仍應給還食鹽之户於勢固有所不能否則以商人市值所餘歸之官帑於政體尤有所不可總之民間物價本自不齊袛可隨時調劑不能概繩以官法即如人生日用最急者莫如食米一項今謂意在恤民而欲官為立制務使市價損之又損閭閻皆得賤食意則善矣欲其行之於事能乎不能乎國家休養生息百有餘年户口繁衍自古希逢之盛㑹人庶則用廣用廣則價昻此一定之理經國者要在務知大體而於事勢通變贏縮之間為之補偏救弊俾庶政皆得其平即所以嘉惠元元者不外是矣因議鹽法故推類及之而因時立政之道實亦不外此將此傳諭中外知之又借給兩淮鹽丁公項銀兩兩淮鹽政吉慶奏言兩淮各場煎丁本屬窮民專以煎晒鹽斤為業每因鹽斤不能接濟向各竈户重利借貸以資日用生計甚為拮据奉諭㫖該鹽政酌量於公項內動銀數萬兩准其赴官借領每年春借冬還不必加息務須妥協經理俾濵海窮丁咸沾實惠又酌減河東餘引四萬道并更正陜西咸寧等處升斗照依部式軍機大臣議覆河東鹽政西寧條奏酌減河東餘引一摺奉諭㫖河東商人營運資本原非兩淮可比厯年餘引存積既多自難一時銷售但向來頒給餘引本為廣濟民食起見例准儘銷儘報並未責其按數全完何至領運不前藉稱商本銷乏或由商人等以每嵗餘引既有額頒則於銷未及額之中究不敢過為減少而司𣙜政者因視為考成所繫雖儘數銷報之項亦未便任其贏縮懸殊此鰓鰓過計所由慮其辦理拮据也此項既屬餘引嗣後部臣亦不妨量為酌准以示體恤朕加惠商民原無二視著照軍機大臣等所請令該鹽政㑹同山西陜西河南各該撫將實在民官行銷及商人承辦各情形詳悉熟籌疏引裕商一一酌議具奏嗣經三省撫臣及鹽政㑹議合詞具奏查得晋省太原汾州寧武三府遼沁平定欣代保德等六州例銷河東之引或食本地土鹽或食䝉古達鹽州縣各按引徴稅名曰鹽稅陜西鳳翔一府邠州屬之長武縣例銷河東之引食花馬池鹽州縣按引徴課名曰鳳課長武課此民官行銷之情形也引既無多鹽復任便經久相安稅課不誤無可置議其晋省之平陽蒲州潞安澤州四府解綘吉隰四州陜西西安同州二府邠乾商興四州豫省之河南南陽二府陜汝二州許州屬之襄城共一百二十四州縣例銷河東之引食河東池鹽俱係商人認地銷引凡出鹽出場覓腳轉發所認地方或用升斗或計斤兩遵照定價聽民買食如有額引不敷之處請領餘引接濟此商人承辦各情形也查河東餘引自雍正十三年至乾隆五六兩年陸續增添至二十四萬道若如該鹽政所請遽減十分之三核計減數已至七萬二千道較之厯年未銷之數反覺過多不若將續增餘引四萬道暫為酌減其餘引二十萬道作為定數至所稱陜省咸寧等十二㕔州縣查明升斗較報部之數加重應請改正並運銷豫省鹽斤請由水路運發以省腳費均屬恤商疏引之舉應悉照該鹽政等所議辦理從之又議准滇省鹽政五條户部議雲南巡撫愛必達條奏一滇省原定鹽價低昻不齊請按照地方情形統行酌定數目每百斤自一兩五六錢至二兩三兩不等與乾隆元年欽奉諭㫖每百斤總在三兩以內之數相符一滇省鹽斤惟黑白兩井額煎最多黑井鹽概運省店行銷白井鹽分運大理等府屬行銷其雲龍安寧琅阿陋草溪麗江景東抱母各井或分給近便府州縣行銷或即令本府兼辦均係厯年各按應徴課欵開報奏銷嗣於乾隆四年奏撥川鹽二百四十餘萬又奏運粵鹽以致鹽多壅滯自應量為增減原題川鹽另行撥銷並將增減改撥數目開造清册送部一各井員離任交盤應將支發薪本流滷及鋪販鹽斤各項應追應接統於册內分别條欵交代一滇省行鹽井官專司督煎則奏銷督征職名自應免其開列至該管知府有督征之責行銷未完者應開列請參全完者亦應開列請叙以上均應如所議辦理一滇省井官督煎有無墮誤作何議叙議處亦應如所奏督煎井官如按年足額准照課欵全完五萬兩以下議叙之例紀録一次其墮煎官亦照輕重分别議處得㫖如議行十七年敕長蘆加斤商鹽減半納課並豁免應追未完鹽課加斤銀兩奉諭㫖從前長蘆各商積缺甚多令於每引加鹽五十斤分派行銷續經部核每年應增課銀八萬九千餘兩但蘆商積困之餘舊缺甫清若按斤加課商力未免拮据著將所加鹽斤減半納課永為定額其乾隆二年至六年應追未完加斤課銀一十四萬餘兩著一併加恩豁免十八年准長蘆添領餘引七萬道長蘆鹽政吉慶奏長蘆額引而外向設餘引五萬道今乾隆十八年領到餘引均已分領全完就現在暢銷情形通計本年應運引數前領餘引實在不敷銷售應請再領餘引七萬道連前共合十二萬道存貯運庫庶可乘此場鹽旺産之候多為領運使引地皆有儲積民食不虞缺乏疏入報可免天津餘引輸納課銀軍機大臣議覆直𨽻總督方觀承等奏言天津縣老少牌鹽影射滋弊仍舊折給錢文俾老弱貧民糊口有資牌鹽既去而引鹽計本取值則民食皆須增錢買鹽與民情亦多未便若使商鹽仍照牌鹽之價亦虧運商成本請以天津所銷餘引免其輸課惟額引照例輸納從之十九年禁止蕩草出境販賣户部議覆兩淮鹽政吉慶奏稱通泰二分司所屬各場俱係淋滷煎鹽而其法即將煎鹽之草灰攤晒淋滷熬成鹽斤是以沿海草蕩俱撥給竈户供煎厯禁開墾占賣蕩內産草二種白者力大較旺灰滷沉厚紅者稍遜總以供場竈之燒煎不容出境販賣乃各場竈藉口紅草曾有出賣每將蕩草私販出場轉至煎辦無資查鹽法志載止有放荒蓄草之條而私販蕩草該管場員分司州縣並無處分之例應照管理礦厰官員私運銅鐵出厰不行查出罰俸一年至産草極豐之年供煎有餘紅草仍聽酌量轉售白草雖遇豐收仍禁止販賣以裕竈煎疏入報可十月定鎮雄州嵗解鹽斤仍歸商辦設口抽稅户部議准雲南巡撫愛必達條奏滇屬鎮雄州地方厯係行銷川省邊引鹽斤聽商販自行運售今既官為辦銷若聽威寧鹽販經由過往查察難周必致販商充斥官鹽墮銷若概令禁阻則威寧川販雖向由永寧畢節一路運銷而自開羅星渡以來即俱由羅星渡轉運享便捷之利已久一旦阻止令其繞道赴威又恐於威寧民食額稅致多掣肘官商實有不能並行之勢應將鎮雄官鹽停止仍聽商販行銷於鎮雄總滙扼要之處酌設稅口抽收每馱一百六十斤抽稅銀一錢八分試抽一年再行題請定額從之二十年議准兩淮新淤草灘悉照䥕給升户部議覆江蘇巡撫莊有恭奏言泰州分司所屬十二場除何垜一場新淤尚屬不毛外其餘十一場共丈出有草新淤八千六十一頃八十一畝零原應給各竈户報升但版籍竈户並不盡業煎鹽現煎場亦不盡皆竈業自應分别給升查富安安豐梁垜東台丁溪劉莊伍祐等七場場俱係竈業所有新淤沙蕩自應按各本場竈户現在池面口勻派給升至草偃小海新興三場及廟灣一場應請無論為商為竈俱按現在煎辦䥕均勻酌配管業無䥕者雖係竈籍不准給升則場商之自置䥕者俱各有草可刈不須重價購買倘恐日久商占竈業則令地隨䥕轉移如該商䥕歇開即將原給蕩地另給接開之人倘版籍竈户向不業煎者肯自置䥕辦鹽查淤地甚多因草未旺盛未經全文嗣後草漸蕃廡亦即照例撥給應如所奏辦理從之二十一年准河東借買蘆鹽配運接濟河東每年額餘引張共五十八萬三千一百三十八引應配鹽四千八百五十九名是年河東鹽政西寧奏稱六七等月隂雨連綿收鹽歉薄除收獲鹽斤配運之外尚不敷鹽二千四百名懇借買長蘆餘鹽一千五百名仍用河東額引運發附近之豫省汝州等州縣及晉省潞澤等府屬按地行銷即將河東收獲應配晉豫二省鹽斤就近改撥陜省嗣後不得援以為例疏上報可嗣是纍年皆以池鹽不敷配運借買蘆鹽接濟俱經部覆准行議准粵東海康等縣場埠事務統歸官辦粵東場産鹽斤例係動帑收買轉給各商配埠行銷原屬官為經理惟雷屬海康遂溪徐聞三縣向未設有場員一切場埠事務俱交商人承辦據兩廣總督楊應琚奏稱自各商經辦以來未能撫恤竈户重收鹽斤近復無力飬竈漸致田􅫒荒殘竈丁失業請一體改歸官辦其埠務亦現乏殷商承充部議應如所請統歸各縣管理從之又議准增復河東餘引河東鹽政西寧奏稱河東從前每年請領餘引二十四萬道嗣因積鹽過多壅滯難銷於乾隆十六年奏請將續增四萬道暫為酌減乾隆十八年經前任鹽政薩哈岱以從前積鹽銷完商力稍紓奏請酌復餘引二萬道今積鹽久已銷完商力亦覺漸紓各地方既經暢銷請將從前酌減餘引二萬道照舊增復從之二十二年加淮鹽每引十斤以二年為限奉諭㫖兩淮商衆銷引辦課嵗額通完而於地方公事更樂輸恐後著加恩自丁丑綱為始綱鹽食鹽每引加賞十斤不在原定成本之內以二年為限庶民食足而商力亦紓以示恤商愛民之意又以河東鹽池歉收准運蒙古鹽斤接濟户部議覆山西巡撫塔永寧等奏言本年河東池鹽不敷配運伏查太原府屬之岢嵐州等一十八州縣皆因相距河東千有餘里馱運維艱向無官鹽到此而地近沿邊所以俱員食䝉古之鹽百姓便安已久此十八州縣之民既准買食䝉古之鹽則其餘州縣之民偶因不足暫時通融亦得仰請援照事同一例查河東運發陜省鹽斤由黃河運入渭河向來船笩行之已久今自蹬口裝載由黃河運至河津縣蒼頭鎮順流而下計程不過二千餘里且鹽斤運回必須由河保營等處按票查驗然後放行進口一路經由地方均可按票稽查其包頭地方交易仍轉飭薩拉齊通判就近約束無許滋擾應令理藩院轉行鄂爾多斯貝子吳喇忒公綏逺城建威將軍將所買鹽斤照依時價公平交易不得髙擡居竒致滋勒掯并令該管蒙古將山椽小木售賣商人以備船笩行運各商亦勿得借端私販木植得㫖如議行二十三年修築河東鹽池以資澆晒山西巡撫塔永寧河東鹽政那俊奏言河東鹽池畦地為産鹽之本引課之源三省民食攸繫今為水所淹沒急須修築請於池北築堰一道外禦南面之汪洋而戽乾堰內之水使復舊畦仍開􅉼洞以資澆晒其餘地有可墾者多開新畦添補不足部議應如所請借給耗羡銀兩興工修築從之又定兩廣鹽務章程大學士忠勇公傅恆等議覆户部侍郎吉慶署兩廣總督李侍堯條奏兩廣鹽務章程一改設引目以定課程也查粵省鹽法正鹽之外又有正額餘鹽額外餘鹽子鹽耗鹽花紅餘鹽等項正餉之外又有正鹽場羡餘鹽場羡埠羡額外餘鹽場羡七折埠羡三封掛一鹽價子鹽京羡花紅額溢羡餘等項名目紛雜官吏易於牽混請照每年各色餘鹽斤數所納羡餘銀數核計改為額引按引輸課實屬簡易便行而於各省鹽法亦歸畫一應改設額引一十七萬六千六百九十五道併入現行六十萬四千一百三十二道額引之內又給餘引五萬道以備接濟即自乾隆已卯年為始按數行銷一嚴緝私處分以杜私梟也查粵西巡查私鹽立法未嘗不善無如相沿日久視為故套間獲一起多係有鹽無犯又以積少成多為場員開脫處分嗣後地方官承審私鹽案件必須究其來自何場審明實在數目即將場員照鹽法透漏成例議革如有仍聽多開人犯巧脫罪名者將承審官嚴加議處一官辦各埠宜全行改歸商辦也查粵西官辦之埠拖缺羡餘銀兩反多於商埠且商人行鹽等弊賴地方官稽查惟至官辦誰復為之查察自應照依平樂等埠一例召商領引辦課至廣東之博羅等埠亦應令該督作速召商承頂一禁攙和定價值以通商竈也查竈丁煎晒鹽斤資本微細一經虧折則攙和鬻私之弊必多是欲杜弊端必先恤竈户應於歉收之年按場竈情形生鹽每包加價二分至五分不等熟鹽每包加價四分至八分不等使竈力稍裕則積弊可以漸除但加價之後仍當不時稽查如仍有攙和泥沙等弊即行查拿究治場員照例參處從之又定買運䝉古鹽斤事宜户部議覆山西巡撫塔永寧等奏稱蒙古運鹽交商領買䭾運之地逺近不等今查鄰近包頭之薩拉齊㕔并托克托城與陜西之皇甫川皆離水次甚近即陜省神木縣離水次亦止一百餘里該貝勒既情願分運至四處地方與商貿易應准定以四處為䝉古商人交易之所至䝉古鹽斗每斗四十斤有竒今買運蒙古鹽斤彼此必須用牲口䭾運若不酌增價值不敷食用請按向日與民間交易至重之價每斗酌定價銀二錢四分令較準鹽斗印照給發各處自今嵗至明年正月運足三萬石以資接濟其餘鹽十三萬石零統限於八月內運完向來鹽斤入口止於殺虎口河保營皇甫川三處水陸稅口上稅即聽其散往各處售賣應給發印票以便稽查得㫖如議行二十四年以河東池鹽歉收准配銷花馬大小池等處鹽斤接濟河東鹽政薩哈岱奏言河東池畦被水收鹽無幾所有山陜兩省民食全賴䝉古鹽斤以資接濟奈急切不能運到民間待食孔殷伏查甘肅寧夏府靈州所屬之惠安堡共計鹽井四百餘眼除配運平慶寧各府屬本引之外向有積鹽餘剩並附近之花馬小池蓮花爛泥狗澗等池收鹽豐裕較勝往時分多潤寡實於課食有益再陜省延安府屬定邊縣之大花馬池産鹽亦裕但山路險僻䭾運艱難成本不無多費然蒙古鹽斤未到之先亦宜令商人備資赴買以濟配運不敷之處部議應如所請飭商自備資本前往買運以濟民食仍照長蘆之例給發護票以杜私販至所買之鹽配河東之引輸河東之課所有本省課稅自應免其重復徴收得㫖如議行議准粵西南寧等府土民鹽斤仍歸官辦粵西南寧等府屬土民即苖獞之類住居深山窮谷向𨽻土司管轄與漢人不相往來從前俱係買食交趾鹽斤嗣因改設流官分轄每年分撥土司餘鹽四千三百九十四包照各府首邑鹽價每斤減去四五六釐不等專責該管知府領運轉發土司官運回銷售繳納價羡旋因粵省官埠久課經侍郎吉慶等奏請將官運各埠招商定引土司鹽斤亦應一體改引以歸畫一是年兩廣總督李侍堯奏該處每年領銷餘鹽僅止四千三百九十餘包合引二千八百四道零為數無幾若與民人畫一辦理該土司素食賤鹽非其意所樂從且苖獞與漢人素不相往來未便以銷鹽細故遽令商人前往交售致啓漢奸交通之漸所有南寧等府土司領銷鹽斤仍歸官運免其改設引目部議應如所奏辦理仍令該督責成知府領運轉發稽查銷解不得於額銷鹽包之外再請餘鹽以杜價輕易致别埠影射之弊疏上報可又酌撥淮鹽食引於綱地行銷户部議兩淮鹽政髙恆奏江甘髙寶泰等州縣壅積食引請改撥綱地融銷查兩淮行鹽口岸通融改撥例有明禁且江甘二縣逼近場竈尤為私鹽充斥之所若派撥綱地非特私鹽愈滋透越將見綱鹽口岸悉為食引所占殊於鹽法有礙應將該鹽政所請之處無庸議奉諭㫖髙寶等十四州縣著照該鹽政所請行其江都甘泉二縣照部議不准撥綱行銷又准滇省添買粵鹽撥給彌勒州行銷雲南省城鹽店每年應收黑井等處鹽九百三十餘萬斤聽各鋪販領賣於昆明嵩明彌勒十六州縣行銷其開化廣南二府地方每年買粵鹽一百四十萬斤分運銷售巡撫劉藻以近年生齒日繁兼秋成豐稔鹽斤較前多銷請添買粵鹽三十萬斤酌撥附近廣南之彌勒州行銷其應支鹽價及帶買耗鹽等項悉照從前買運成例辦理統於銅鹽互易案內􅔰兑如有不敷核明應找價值數目支給報部至添買鹽斤即令委買本年粵鹽之員帶運回滇撥給行銷所有賣出鹽價除還原借銅息銀兩即將盈餘數目隨本年報銷案內一併造冊送部查核從之二十六年議准籌辦河東鹽務事宜大學士忠勇公傅恆等議覆巡撫鄂弼鹽政薩哈岱等奏辦鹽務事宜查河東鹽務自鹽池被淹以來産鹽既少不敷配運應准其所請將二十五年額引寬至來年六月清繳俾得漸次疏銷續增餘引十四萬道之內暫行停領七萬道現今鹽價之外每斤酌增一釐至該鹽政另摺所奏遴取殷商頂補引地不過一時補救之計在該鹽政惟當以經理鹽池為急務鹽池之産鹽果旺商賈之人惟利是趨不必勉强遴取而自爭先恐後矣至於近嵗收買䝉古鹽斤甚屬有限惟小民之貿易出口者或以布帛茶烟互相􅔰換往來既便私販日多在目下鹽少之時禁之過嚴則有妨民食而將來鹽多之際查之不力則有礙官引又當因時制宜悉心籌畫務祈河東鹽務日就整頓以仰副我皇上軫念至意疏上如議行又議定兩淮鹽法七條奉諭㫖兩淮鹽務經費浩繁商力不無拮据如預提餘引一事從前吉慶係派之通綱而普福髙恆則擇其奮勉辦事者以為酬奬之地其中即不能允協羣情其應作何定立章程著軍機大臣㑹同尹繼善吉慶高恆等詳悉妥議具奏尋議一擬派餘引宜均攤衆商以期普沾利澤一外支銀兩除公務應用不得濫行開銷一辦理常貢宜酌定用數以備查核一鹽政養亷宜裁減五千歸之公項一匣商費用宜嚴加查察以免通綱派纍一綱食鹽引宜照例行銷不得濫為通融一私鹽透漏宜嚴加查緝以疏引目從之又敕准長蘆未完鹽課分作五年帶征奉諭㫖户部議駁長蘆鹽政金輝鹽課緩徴一摺自屬按例定議但念該處鹽場今秋雨水過多商力未免稍艱著加恩將長蘆本年未完鹽課四十二萬兩准其緩至明年奏銷後分作五年帶徴以示體恤二十七年停止粵東茂暉等場墾闢鹽􅫒先是兩廣總督楊應琚疏請墾闢鹽􅫒奏准行知嗣因沙土鬆浮一遇大潮風雨基圍易於坍壞以致旋作旋輟現在開成場􅫒僅成一百八十三口每年可收鹽三千包餘皆罷廢應准其停止其築成鹽􅫒行令該督造具應升課銀清冊報部所收鹽斤歸官收買以資配運從之二十九年准長蘆鹽政奏增蘆鹽價值大學士忠勇公傅恆等議准長蘆鹽政高誠疏奏長蘆物價近年增長繩巾席片車船腳費逐嵗加增辦課辦運每多拮据除天津係公共口岸衆擎易舉無庸增價外其餘請照各州縣地方原定鹽價每斤加增制錢一文以資行運在小民每人每月食鹽不及一斤以一月之內多用制錢一文實無所纍而商免虧賠之纍民無淡食之虞應如所奏以收因時調劑之益從之又加給滇省黑白二井薪本銀兩户部議覆雲南巡撫劉藻奏言滇省黑白二井自十八年釐定章程以後兩井合計每年多辦餘鹽一百二十餘萬斤産鹽甲於通省又該二井取給薪柴於百里之外運價較前倍蓰與各井情形逈有不同請將黑井之大東復三井應煎額鹽每百斤添給薪本銀一錢白井所煎正額沙滷鹽每斤添給銀一錢五分即於該二井續辦收買及白井所管之安豐井餘鹽息銀內動支以二井額外之有餘補二井竈户之不足於民食大為有禆應如所奏從之二十九年准兩淮鹽政奏預提乙酉綱引給商接濟兩淮鹽政高恆奏兩淮行鹽各省年穀屢豐銷售甚暢現辦甲申一綱計算不敷民食請預提乙酉綱淮南鹽引三十萬道淮北鹽引十萬道分給領運以裕民食户部議查兩淮每年行銷綱引共一百六十八萬五千四百九十二道先於乾隆十一年據前任鹽政奏請預提綱鹽每年可銷若干先期約數咨部請領經臣部議覆准行嗣後歷任鹽政按年酌數請領行銷自二十萬至三四十萬不等今該鹽政奏預提乙酉綱引四十萬道應如所請照數給商領運從之又准長蘆鹽課奏銷展限一月長蘆鹽政高誠奏長蘆各商本年領借帑項運鹽較遲鹽價未及歸回而奏銷已届酌請暫展一月於十一月舉行以紓商力得㫖如所請行三十年准兩淮鹽政奏預提丙戌綱引給商接濟兩淮鹽政高恆奏請預提丙戌綱淮南綱引二十萬道以裕民食户部議如所請從之又令河東額外存鹽照淮揚之例配用餘引以濟民食奉諭㫖據李質頴奏河東本年收鹽配引足額外尚存鹽三千二百引有零令各商加謹收貯以備將來不敷年分等語鹽斤收貯過夏易致滷耗該處池鹽何以獨能久貯留待將來補用河東邇年産鹽既旺照額暢銷之外尚有盈餘或可將此項存鹽仿照淮揚之例配用餘引以濟民食較貯積陳因不更妥協乎著傳諭李質頴確按彼處情形悉心籌畫據實奏聞嗣河東鹽政李質頴奏請先酌復餘引三萬道自三十年為始赴部補領仍察看情形如有鹽引不敷之州縣即行奏請給引領運從之至三十一年復請復餘引二萬道給商領運又酌增山東行鹽餘票山東原設額票一十七萬一千七百四十道雍正八年增餘票五萬道乾隆元年復增一千五百道五年六年復增一萬五千道至是長蘆鹽政高誠奏山東濵海行銷票鹽各州縣鹽斤日加暢銷恐將來不敷接濟請再增餘票一萬五千道以本年請領丙戌綱票引為始所銷之票按數納課户部議應如所請從之三十一年准兩淮鹽政奏預提丁亥綱引給商接濟兩淮鹽政普福奏請預提丁亥綱淮南鹽引二十萬道淮北鹽引五萬道以裕民食户部議如所請從之三十二年諭朕此次臨幸天津該商等趨事辦公頗稱踴躍因念長蘆通綱引課每年十月內奏銷正值銷售菜鹽之時鹽價未及收齊而奏限已届商力未能舒徐著將長蘆通綱鹽課嗣後改至十一月底奏銷俾得從容完納以示體恤三十五年兩淮鹽政尤拔世奏淮南北各場春夏多雨場鹽歉産各口岸亦多被水行銷不暢請將已丑綱奏銷展至八月題報經部議駁得㫖著照所請行又諭兩浙商人聞朕允直𨽻臣民之請恭奉皇太后安輿巡幸天津情殷愛戴籲懇巡撫熊學鵬代奏携衆赴津抒誠祝嘏奏到時伊等業已在途情詞誠切兹蹕途所至見該商等歡欣踴躍忱悃可嘉自應量加恩賚著將每額引定鹽斤外加鹽五斤免其輸納課項以一年為滿俾商力益臻饒裕三十六年諭上年夏間天津等處因雨水過多被災較重業經疊降諭㫖動撥銀米蠲賑頻施黎民幸無失所苐念長蘆鹽地同時亦被淹浸該商等工本不無稍虧既仍照常納課又不能與貧民一體沾恩未免向隅今翠華臨蒞深悉該處情形且咨訪錢價較前更為平減雖去嵗曽加鹽價現在商力仍覺拮据著加恩每斤再暫加錢一文以降㫖之日為始定限一年仍照舊值行銷俾資充裕以副因災恤商之意又諭山東引票各商自乾隆十六年至三十一年尚有積滯未銷之鹽六十餘萬包課項俱已隨引清完而鹽包仍須陸續運售加以按年輸納正課商力未免拮据著加恩將乾隆三十五年應徴欵項除雜項錢糧照舊交納外所有正課銀十八萬三千八百五十兩零分作八年帶徴俾各商益資寬裕又諭前以長蘆鹽地去夏偶被水淹且詢知今年錢價較前更為平減因降㫖准將鹽價暫加錢一文以一年為限仍照舊值行銷兹臨蒞山東聞該商歷年引課無缺而積鹽仍有未銷經降㫖將乾隆三十五年應徴正課分作八年帶徴苐念東省錢價亦甚平減著再加恩准照長蘆之例每斤暫加錢一文以奉㫖之日為始定限半年俾商力益資充裕三十八年諭長蘆商衆資業素微前兩次巡蒞天津閲視鹺務深悉其情是以節次加恩增價俾不致有墊纍並將乾隆三十六年引課分作三年帶徴以紓商力今翠華臨幸各商無不踴躍歡呼但念伊等第一次銀兩業已完交而第二限帶徴之銀與本年正課同時並納仍不免少形竭蹶著再加恩將三十七年正餘課項自三十八年奏銷後起分限六年帶徴俾紓商力益臻充裕以示格外體恤三十九年户部議覆山西巡撫覺羅巴延三河東鹽政瑺齡奏大池産鹽不敷配運請開六小池並撥運蘆鹽接濟應如所請將原封六小池開濬仍將貯鹽處所堅固築垣以防透漏並令長蘆鹽政知㑹河東飭商買運從之又長蘆鹽政西寧奏商力微薄請將乾隆三十六年第三限銀兩並三十七年六限銀兩統俟本年奏銷後分限十年帶徴經部議駁得㫖允行又四川總督文綬奏請犍為縣開淘鹽井照例徴收課銀從之又諭據李質頴奏今嵗黃河漫堤淮安一帶鹽堆被浸該商成本虧缺商力未免竭蹶請將甲午綱除己完正課外其未運引鹽應完正課銀兩分限徴收等語著照所請將淮北未運綱食引鹽應完正課銀二十七萬五千餘兩加恩准其自乙未綱起分限五年帶完以紓商力四十年兩淮鹽政伊齡阿奏請預提丙申年淮南綱引二十萬道給商接濟以裕民食户部議如所請從之又諭兩淮鹽課例限次年二月奏銷前以乙亥己丑兩綱該處鹽場歉收是以准其展至八月今乙未綱奏銷復請展限該部議駁但念該處場竈偶被旱災商力不無拮据加恩將乙未綱准其展至明年八月造報至稱淮北各商上年被水辦鹽實多竭蹶請將丙申以後四綱帶完銀二十二萬餘兩展限完納之處並加恩展限四年分作八年完納以紓商力署山西巡撫覺羅巴延三等奏請將河東暫增二釐鹽價再展限三年經部議駁得㫖户部議駁巴延三等奏河東暫增二釐鹽價再請展限三年之處毋庸議一摺自應照例辦理但念該處場價未平其小鹽池六處甫經開採接濟所得贏餘未能補足前兩年歉收之數商力不無拮据著加恩照該撫等所請將從前暫增二釐鹽價再行展限三年俾轉運益資充裕四十一年諭朕因兩金川蕩平奏凱恭奉皇太后安輿臨蒞山左詣岱拈香告成闕里所有東省啇衆祗候迎鑾用宜特沛渥恩俾沾慶澤著加恩將山東啇人本年應征乾隆四十四十一兩年引票正項銀三十六萬七千七百餘兩又未完借項銀二十四萬兩自本年奏銷後起限分作八年帶征以示優恤四十三年諭河東鹽政與山西巡撫因各有専司未免意存畛域於鹽務每多掣肘因思河東鹽政事務本簡非兩淮長蘆可比竟不如令山西巡撫兼管至一切鹽務原有運使専辦今得該撫統轄俾事權歸一呼應更靈並著為令四十五年諭朕巡幸江浙道經畿輔長蘆商衆踴躍抒忱用宜一體加恩俾沾慶澤著加恩將長蘆商人應徵乾隆四十四年分鹽課銀五十餘萬兩內十分之一分作五年帶征俾商力益資饒裕又諭朕此次巡幸江浙蹕途經過直𨽻山東地方其長蘆商人業經加恩緩征課項所有山東商人並著加恩將乾隆四十五年應征票引鹽課銀十八萬餘兩自本年奏銷後起限分作六年帶征以示優恤四十七年諭淮南商人應繳提引餘利銀兩前經降㫖加恩將未完銀展期遞緩分作二十一限繳完今該商等已完至苐十三限其餘八限尚應交銀三百八十六萬六千餘兩此項提引餘利弊由高恆而起該商等按限完交已經過半朕思恤商即所以惠民著加恩於未完銀內豁免二百萬兩其餘一百八十六萬六千餘兩仍著按原限完繳以示體恤四十九年諭朕翠華南幸取道淮揚兩淮商衆踴躍抒忱自應特沛恩膏俾沾慶澤所有該商等提引餘利銀一百六十三萬二千七百七十四兩零著加恩全行豁免俾淮揚商衆益資饒裕又諭朕此次南巡勤求民隱翠華所蒞慶典時行因念兩淮竈户僻處海濵亦應一體加恩俾得均沾慶澤所有乾隆四十五四十六等年各場因灾帶征遞緩未完銀七千九百餘兩著加恩全行豁免又諭朕鑾輅時行普施慶惠長蘆山東商衆踴躍抒忱自應一體加恩俾沾渥澤所有長蘆應徴引課銀四十九萬餘兩山東應徴引課銀三十六萬餘兩著加恩分作八年帶徴俾商力益資饒裕又户部議覆兩廣總督舒常奏粵東鹽務經尚書福康安㑹同福州將軍永德於審辦談逹元控告總商沈翼川案內查出各商逾限未完鹽價銀一十八萬七千三百餘兩皆由轆轤轉運各商完舊掛新陸續拖缺且因總商派捐津貼銀兩散商有所藉詞遂致積少成多力難併納請照乾隆二十三年清查積缺成例分限帶徴如數在一千兩以內者分别定限自四箇月起至八箇月止勒令全完自一千兩至二千兩者限一年帶完自三千兩至四千兩者限一年半帶完自五千兩至一萬以內者限二年半帶完王昌龍名下埠地較多缺數繁重應請限五年帶完等語臣等伏思粵東鹽務自乾隆二十四年查辦以後仰䝉皇上天恩先鹽後課俾得轉輸獲利各商等自應急公報效乃經理不善掛缺鹽價至如許之多若一時遽議紛更轉於公事無益應如所奏照乾隆二十三年清查積缺成例分限帶徴勒追還欵仍令該督轉飭運使將應完銀數按月追繳倘有不實力急公仍前拖缺者即將該商加倍治罪並將承追不力各員照例參處該督仍隨時通飭文武員辨實力緝私俾得暢銷官引又稱總商之設原因督辦查催必需有人承總方得無誤課程前因沈翼川倡議派捐以致衆情不服今靣詢散商均稱辦理奏銷督催餉項必須専責總商應請仍循其舊查粵省設立總商原因督催餉課承辦奏銷乃積久弊生遂有收捐津貼致成派纍今既清釐積弊自應一併革除况運使及場員皆専司鹽務地方官又有承催鹽課不力處分該督果實力督辦不患不年清年欵何必固循陋習復立總商致滋勒派之漸從之五十年諭全德奏海州分屬板浦中正臨興三場因去冬今春雨澤愆期晴乾日久産鹽有限請將乙已綱應征錢糧懇恩緩征著照所請所有該竈户等應輸乙已綱錢糧著加恩緩至本年秋場産旺後再行征收以紓商力十二月山西巡撫伊桑阿奏請將河東續增二釐鹽價作為定額經部議駁得㫖户部議駁伊桑阿奏河東運鹽成本不敷請將續增二釐作為定額一摺固屬照例辦理苐念河東池鹽全係陸運需費浩繁今户口日增物價胥貴則運鹽之食物腳價較之往年自必有增無減該撫既稱現增之價不致有妨民力而該商等亦藉得少為舒展著照所請將續增二釐鹽價加恩准作定額以紓商力皇朝文獻通考卷二十九
