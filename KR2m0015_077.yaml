body:
  text: 欽定四庫全書皇朝文獻通考卷七十七職官考一臣等謹按自古帝王體國經野因人事以授官馬考所載漢唐之迹備矣宋承唐制階品煩多雖正官非别敕不治本司事當時朝士頗議之而終不能革遼設南北面諸官以理庶務金建三省頒新制換官格雖因俗之治亦一代之規也元初命劉秉忠許衡等酌古今之宜定內外之官典制綦備大德以後爵賞滋繁名器日濫焉明太祖罷丞相以部府諸司理天下事亦漢九卿遺意末造批答歸之寺人軍紀司於紈褲豈立法之始意乎本朝創制顯庸典章明備國初首設八旗天命十一年設八大臣及十六大臣自是定官制建六部內外文武綱舉目張世祖章皇帝混一寰宇大小官制相維蓋監前代而損益之而內而八旗各部院外而督撫提鎮滿漢並用文武兼資補缺汰浮因革盡善列聖相承凡所以綜核名實澄敘官方因時以制宜者無弗周備我皇上耆定功成昄章式廓設官置吏中外相維是以萬里之遙若臂指之相使兆民之衆若呼吸之可通官習其事民安其教求之漢唐極盛之時未聞整齊畫一有如此者而又何論於前五朝乎謹依前考例首載建置規模詳稽各官之裁設職掌附以祿品之制作職官考官制太祖髙皇帝辛丑年以開國之初凡出兵校獵不計人之多寡各隨族黨屯寨而行獵時每人各取一矢凡十人設一長領之各分隊伍其長稱為牛録額真至是遂以名官凡三百人為一牛録每牛録設額真一甲寅年時復以削平諸國每五牛録設一札蘭額真五札蘭額真設一固山額真每固山額真左右設兩梅勒額真初設有四旗旗以純色為别曰黃曰紅曰藍曰白至是增設四旗參用其色鑲之共為八旗又置理政聽訟大臣五人札爾固齊十人凡有聽訟之事先經札爾固齊十人審問然後言於五臣五臣再加審問然後言於諸貝勒衆議既定奏明三覆核之天命五年分總兵官品級為三等其副將參將遊擊亦如之衆牛録額真俱為備禦官每牛録下設千總四人十一年太宗文皇帝嗣位設八大臣為固山額真每旗一人與諸貝勒偕坐議事凡出獵行師各領固山兵以行又設十六大臣每旗二人料理國政審斷訟獄不令出兵駐防又設十六大臣亦每旗二人出兵駐防仍行差遣居則審理詞訟天聰五年設六部官每部設一貝勒主之吏部設承政一員户禮兵刑工五部承政各二員蒙古承政六部各一員漢承政吏户禮兵工五部各一員刑部二員每部各設參政八員啓心郎一員工部增設漢參政二員蒙古參政二員漢啓心郎二員其辦事筆帖式各酌量繁簡補授凡稱榜式俱著停止稱為筆帖式如欽賜榜式名者仍稱榜式八年諭曰朕聞國家承天創業未有棄其國語反習他國之語者棄國語而效他國其國亦未有長久者也蒙古諸貝子棄蒙古之語名號供學喇嘛卒致國運衰微今我國官名俱因漢文從其舊號夫知其善而不能從知其非而不能省俱未為得也凡我國官名俱易以滿語勿仍襲總兵副將參將遊擊備禦等舊名定五備禦之總兵為一等公一等總兵官為一等按班章京二等總兵官為二等按班章京三等總兵官為三等按班章京一等副將為一等梅勒章京二等副將為二等梅勒章京三等副將為三等梅勒章京一等參將為一等札蘭章京二等參將為二等札蘭章京遊擊為三等札蘭章京備禦為牛録章京代子為分得撥什庫章京為小撥什庫旗長為專逹屯撥什庫仍為屯撥什庫凡管理不論官職管固山者即為固山額真管梅勒者即為梅勒章京管札蘭者即為札蘭章京管牛録者即為牛録章京管巴雅喇堆額真即為堆章京管巴雅喇扎蘭額真即為札蘭章京嗣後俱照我國新定者稱之若不遵我國所定之名仍稱漢字舊名者是不奉國法恣行悖亂者也查出決不輕恕九年設蒙古八旗官員先是八年以和碩貝勒德格勒等所獲察哈爾國千餘户分給八旗是年正月復以察哈爾來歸官兵均𨽻各旗至是始編審蒙古壯丁及在內舊喇嘛沁壯丁為蒙古八旗每旗設固山額真一人梅勒章京札蘭章京各二人及佐領驍騎校等官臣等謹按此設蒙古八旗之始也官制悉與滿洲同十年以國初設立文館至是改為內三院曰內國史院曰內祕書院曰內宏文院各設大學士一人順治元年增設內三院學士各一人二年以翰林官分𨽻之稱內翰林國史院內翰林祕書院內翰林宏文院增侍讀學士侍讀等官各分其事為職掌內國史院職掌記注詔令收藏御製文字凡用兵行政事宜編纂史書撰擬郊天告祝文及升殿宣講慶賀表文纂修祖宗實録撰擬礦志文編纂機密文移及各官章奏掌記官員升降文册撰功臣母妻誥命印文追贈諸貝勒册文凡六部事宜入史册選擇記載一應逺方往來書札俱編入史册內祕書院職掌撰外國往來書札並録各衙門奏疏及詞狀撰擬敕諭祭文內宏文院職掌注釋厯代行事善惡進講御前侍講皇子並教諸親王頒行制度崇德元年設都察院二年命固山貝子尼堪等與議政事每旗設三員以鞏阿岱等為議政大臣復集和碩親王多羅郡王多羅貝勒固山貝子固山額真都察院承政及新設議政大臣諭之曰議政大臣或出兵或在家向時甚少若遇各處差遣則朕左右及王貝勒之前竟無議事之人矣議政雖乏人然不令妄與會議者以卑微之人參議國家大事彼必逢迎其主且以賢能自居諂諛之詞既誤其主復悮國政今特選擇以爾等為賢置於議事之列正欲令各念其主為國效力耳三年定蒙古衙門為理藩院又定部院官制先是六部都察院理藩院各設承政三四員其餘皆為參政官止二等至是范文程等奏請每衙門止設滿洲承政一員以下酌量設左右參政理事官副理事官額哲庫各官凡五等上可其奏更定八衙門官制六部理藩院都察院承政各一員吏部左參政二員右參政三員理事官四員副理事官六員户部左參政二員右參政四員理事官十員副理事官十六員禮部左參政二員右參政三員理事官四員副理事官七員兵部左參政二員右參政三員理事官十員副理事官十六員刑部左參政二員右參政三員理事官六員副理事官八員工部左參政二員右參政三員理事官九員副理事官十二員啓心郎每部三員滿一員漢二員額哲庫每部二員理藩院左右參政各一員副理事官八員啓心郎一員都察院左右參政各二員理事官六員滿漢蒙古各二員七年定漢軍八旗官員先是二年分烏真超哈為二固山每固山設固山額真一人編壯丁為牛録旗用元青色四年分為四固山每固山增設梅勒章京二人扎蘭章京四人牛録章京十八人其三旗以黃白紅色鑲之一旗純用元青色至是始編為八旗增設各官其色與滿洲同八年設守陵官停諸王貝勒管理部院順治元年世祖章皇帝定鼎燕京定內外文武官制內官自閣部以至庶司外官藩臬守令提鎮將辨略仿明制而損益之兼用滿漢人詳見後各官下三年罷織造太監四年更定八旗官名禮部遵諭議定固山額真按班章京堆章京梅勒章京扎蘭章京牛録章京噶布什賢噶拉按班噶布什賢章京皆係管兵官銜不論世職大小有授此官者即照此銜稱之凡箭號等項亦書此銜於上其世職按班章京改為精竒尼哈畨梅勒章京改為阿思罕尼哈畨扎蘭章京改為阿達哈哈畨牛録章京改為拜他拉布勒哈畨半個前程改為拖沙喇哈畨其在部院官員各省駐防章京官銜仍照舊八年復命諸王貝勒管理部院九年復停諸王貝勒管理部院十年給事中劉顯績奏請設立記注官凡皇上詔諭一言一動及諸臣奏啓俱隨事直書以為萬世法則報聞罷各省巡按臣等謹按各省巡按専以察吏安民為要逮其後多受屬員獻媚參劾無聞鄭親王濟爾哈朗請停此差從之詳見後都察院下十五年裁尚寶司初設卿少卿等官順治元年裁二年以給事中朱徽疏請復設如舊至是諭吏部曰向以官制宜備設立尚寶司衙門滿漢文官専理用寶事務朕近見該司事簡員多且既有尚寶監承收又經內三院看用該司理事副理事卿丞等官似皆可省今暫行裁之各官照品改用又諭大學士覺羅巴哈納等曰朕思大理寺衙門所管事務無多不過三法司會議時少有事耳此等事堂上官三人辦理足矣工部衙門有左右侍郎部中諸事郎中主事同辦之其總理稽查則左侍郎辦之有餘即無右侍郎亦何不可中書科中書舍人所管事務有何繁劇允宜裁汰至於道員管理事務繁多當增員不可復汰科員甚多全無職掌一科中用都給事中等足矣設漢軍副理事官何為原因從外行取不遇御史員缺故改用耳又在外布政司衙門左布政使事繁右布政使有何職掌此非冗員而何內外官員中此等冗員甚多但部院堂官不肯詳察豈有本衙門官不知其有用無用者乎漢官動稱總兵官及各武官併無用兵丁應行裁汰有肯將文職裁汰者乎此皆伊等偏執之處爾等可將朕諭傳諭議政王貝勒大臣九卿詹事科道等官當此錢糧匱乏之時故爾暫行裁汰嗣後錢糧充裕再行增設未為晚也又諭吏部曰自古帝王設官分職共襄化理所關甚巨必名義符合品級畫一始足昭垂永久用成一代之典本朝設內三院有滿漢大學士學士侍讀學士等官今斟酌往制除去內三院祕書宏文國史名色大學士改為殿閣大學士仍俱正五品照舊例兼銜設立翰林院設掌院學士一員正五品照舊例兼銜除掌印外其餘學士亦正五品以上現任各官俱照本品改銜供職以後升授銜品俱照新例內三院舊印俱銷毁照例給印內閣滿字稱為多爾吉衙門漢字稱為內閣翰林院滿字稱為筆特黑衙門漢字稱為翰林院其侍讀學士以下員數官銜滿名照漢官稱謂通著察例詳議具奏六部滿漢尚書俱作正二品滿字仍稱阿里哈按班漢字仍稱尚書滿漢侍郎俱作正三品滿字仍稱阿思哈尼按班漢字仍稱侍郎理事官滿字稱為伊齊轄喇哈畨漢字稱為郎中俱作正五品副理字官滿字稱為愛什拉庫哈番漢字稱為員外郎俱作從五品額哲庫哈畨滿字仍稱為額者庫哈畨漢字稱為主事俱作正六品司務添設滿官漢字仍稱為司務滿字稱為他庫喇布勒哈畨俱作從九品都察院左都御史滿字稱為哈思呼額爾機阿里費拜察喇按班漢字稱為左都御史俱作正二品左副都御史滿字稱為哈思呼額爾吉阿思罕尼拜察喇按班漢字稱為左副都御史俱作正三品左僉都御史滿字稱為哈思呼額爾吉阿達費拜察喇按班漢字稱為左僉都御史俱作正四品監察御史滿字稱為拜察默拖喇哈畨漢字稱為監察御史俱作正七品經厯改為司務添設滿官漢字稱為司務滿字稱為他庫喇布勒哈畨俱作從九品通政使司通政使滿字稱為阿里費哈畨布勒哈畨漢字稱為通政使俱作正三品左通政滿字稱為哈思呼額爾吉哈畨布勒哈畨漢字稱為左通政俱作正四品右通政滿字稱為伊齊額爾吉哈福布喇哈畨漢字稱為右通政俱作正四品左參議滿字稱為哈思户額爾機愛什拉喇哈畨漢字稱為左參議俱作正五品右參議滿字稱為依齊額爾機愛什拉喇哈畨漢字稱為右參議俱作正五品經厯改為司務添設滿官漢字稱為司務滿字稱為他庫喇布勒哈畨俱作從九品大理寺卿滿字稱為阿里哈哈畨漢字稱為卿俱作正三品少卿滿字稱為伊勒希哈畨漢字稱為少卿俱作正四品寺丞滿字稱為希喇默哈畨漢字稱為寺丞俱作正五品寺正滿字稱為伊齊轄庫漢字稱為寺正俱作正六品寺副滿字稱為愛什拉庫漢字稱為寺副俱作從六品評事滿字稱為額哲庫漢字稱為評事俱作正七品司務添設滿官漢字仍稱為司務滿字稱為他庫喇布勒哈畨