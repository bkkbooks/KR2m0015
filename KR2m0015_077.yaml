鑄給關防以重職守至七年福建廣東各設觀風整俗使一人尋俱停罷又添設中倉南倉滿漢監督户部議覆倉場侍郎托時等議御史殷式訓條奏漕務各欵一各倉例設滿漢監督各一員辦理倉務中倉南倉相隔一城一倉一人難於查看應於中倉添設漢監督一員南倉添設滿監督一員可無顧此失彼之虞應如所請從之五年盛京户部刑部工部添設漢郎中各一員員外郎各一員主事各一員從監察御史傳色納請也又諭兵部前科武進士大半皆授為侍衛餘亦依次俱得選用今科進士朕恐其多選侍衛反不能盡心學習所以揀選侍衛者甚少但伊等未得一時録用置之間散殊為可惜今特廣為加恩將未選侍衛之滿洲蒙古進士授為藍翎交與領侍衛內大臣效力行走漢軍進士交與該旗以驍騎校補用其餘漢進士有人材可用者分發各省賞食千總俸命督撫提鎮試看如果材力勇壯效力勤謹者以守備題補六年定理藩院補用人員各條例吏部議覆理藩院尚書特古忒等奏稱理藩院専司蒙古事務非通曉蒙古字話之人不能辦理請於八旗蒙古官學生監生內有能翻譯滿洲蒙古字話者吏部會同理藩院考取以各部院蒙古筆帖式挨次補用唐古特學生由理藩院考試翻譯蒙古唐古特字話揀選好者以理藩院唐古特筆帖式挨次補用又唐古特學生補用筆帖式中書者仍兼唐古特學行走升至主事員外方令其離學庶所學唐古特字不致荒廢又舊例蒙古官學生唐古特學生補用中書似屬太優嗣後官學生停其補用中書中書缺出於八旗蒙古筆帖式內揀選補用至內閣蒙古中書額設十六缺內有唐古特中書四員查內閣翻唐古特字話既設巴克什喇嘛並不専藉中書請於唐古特中書內裁去二缺止留二缺令唐古特學生出身之筆帖式補用其蒙古中書十二員令理藩院會同內閣於八旗蒙古筆帖式內考試擬定正陪咨送吏部引見補用此補授中書人員內由理藩院蒙古筆帖式考取者仍以理藩院應升之缺升轉由吏部等衙門考取者仍以吏部等衙門應升之缺用又國子監八旗蒙古官學生監生學習滿洲蒙古翻譯既各蒙恩賞給錢糧其內蒙古學實屬多設請將內蒙古學裁去其裁退之學生俟國子監本旗學生缺出坐補其裁退之助教俟國子監助教缺出坐補又八旗蒙古監生官學生內有學習漢文情願考試滿漢翻譯者令其考試取中後以吏部等衙門蒙古筆帖式取中人員一體挨次補用又理藩院內額設郎中五員員外郎十九員主事五員係専司蒙古事務取其諳練不使將别部人員升補亦未可升補别部嗣後理藩院缺出請於理藩院蒙古筆帖式各口驛站及將軍駐防並察哈爾等處蒙古筆帖式并由理藩院筆帖式考取補用之中書助教五官正等不論旗分通行較俸升補由主事升補本院員外郎郎中再與六部滿洲蒙古郎中一體較俸升轉又內閣蒙古侍讀二員太僕寺蒙古員外郎二員盛京刑部蒙古員外郎二員亦係専司蒙古事務之人嗣後缺出請於理藩院蒙古主事內不論旗分通行較俸升補又八旗遊牧員外郎主事仍照舊例由理藩院於蒙古護軍校驍騎校中書筆帖式護軍內揀選補放又喜峯口殺虎口驛站員外郎各一缺張家口歸化城蒙古理事同知各一員原係揀選之缺應照定例於理藩院司官㨂選補授又國子監助教八員係訓迪滿洲蒙古翻譯之員嗣後遇缺於理藩院及修書蒙古筆帖式并國子監間散巴克什內令理藩院會同國子監揀選擬定正陪咨送吏部帶領引見補用又欽天監蒙古五官正二員原係考選之缺請照例於內閣蒙古中書八旗蒙古筆帖式內考選咨部引見補用又六部蒙古郎中員外郎主事都察院監察御史原俱係理藩院六部蒙古人員通行升補之缺今理藩院人員既不令其升轉别部嗣後六部蒙古主事缺出請將吏部等衙門蒙古筆帖式及中書五官正等不論旗分通行較俸升補又理藩院司官筆帖式內有不通曉蒙古字話又不通曉漢文者交與該堂官甄别令其回旗以對品旗員補用其不翻譯字話而能通曉滿漢翻譯之員令該堂官咨部注册俟彚齊人數吏部奏請欽點閲卷大臣公同考試果係翻譯精通者準其於六部司官筆帖式等通行較俸以應升之缺升補俱應如所請從之七年添設八旗都統衙門司務每旗二員從正紅旗漢軍副都統朱國極請也又添設八旗都統衙門左右二所每旗於參領副參領內揀選二員引見授受掌管關防從正紅旗滿洲副都統宗室鄂齊請也定滿漢科道品級六科給事中俱為正五品各道御史滿洲例由員外郎升授漢軍例由郎中升授俱為正五品漢御史由內閣侍讀翰林院編修檢討各部郎中員外郎補授者為正五品由主事中行評博行取知縣補授者為正六品著為令八年復設漢中書四員大學士疏言雍正七年十一月奉旨內閣本章各於正本之外立一副本另行收貯以備查對臣等伏查各部院議覆事件副本內不載案呈日後案牘繁多難以查核應將各部院議覆副本與通政使司送進原題副本聨合一處専派滿中書二員漢中書四員敬謹收掌但漢中書舊額三十六員於康熙三十八年裁去八員今存二十八員分派票籖房本房以及稽查各部院注銷案件繕録抄寫各項事務人員不敷請復設漢中書四員以敷分派辦事之用從之又定大學士尚書品級諭旨向來大學士尚書俱係正二品今大學士著授為正一品尚書著授為從一品又吏部議雲貴廣西總督鄂爾泰奏雲南永昌道請改為分巡迤西道其迤東地方請添設分巡迤東道如蒙俞允分巡迤東道員缺請以元江府遲維璽升補奉旨遲維璽準其補授分巡迤東道餘依議九年諭曰我國家膺圖受命則有佐命元臣際會風雲開拓疆宇至於承平之世亦有勞臣宣力綏靖不庭凡厥鴻猷駿烈焜耀旗常於是酬庸奬功賜以公爵其中分為一等至二等三等所以第其勳勞表其閥閾同於古者河山帶礪之盟爰及苗裔永久勿替甚盛典也朕考古封爵之制漢唐以來公侯皆繫以郡縣之名而漢世功名顯著者則加以美號如信武冠軍建忠定逺之屬並以榮名垂光史册本朝封王者皆選用嘉美字樣其嗣襲封則因之而公爵則但分等次未有封號字樣朕意欲考其當日勳庸錫以嘉名追嘉為某公使勳勞之臣顯功丕績常赫赫在人耳目間而其子孫承襲封號亦皆顧名思義共加奮勉世為國家效忠抒力期踵美前人之光以副朕褒念勳庸之至意至於宗室外戚則仿古恩澤侯之例命為奉恩公或承恩公以昭寵錫其如何命名定制並將厯來功臣勳戚加錫美號之處該部詳察定議具奏尋以部覆欽定一二三等公爵為號凡十曰褒績忠達奉義超武雄勇果毅信勇建烈勇勤英誠十年設杭州駐防蒙古八旗每翼防禦二員從杭州將軍阿里衮請也又吏部議奏八旗都統印房筆帖式五年效力期滿調補部院者向未議定何等品級現在俱用為無品筆帖式請照八旗左右二司筆帖式之例定為八品令其食俸從之又諭兵部八旗都統朕看滿洲武舉武進士等於六旗營不甚相宜若與六旗官員一體擢用恐於營務未諳亦且壅滯嗣後伊等如何升轉補用爾等會同詳議尋議八旗滿洲蒙古武舉武進士內除蒙特恩選用外伊等應得之缺補用但伊等應補品級不同則升用亦宜分别嗣後將滿洲蒙古武舉照漢人武舉例會試後請大臣驗看才優者列為一等於護軍校驍騎校等缺挨次委署試用行走三年入於驍騎校人員內補授平常者駁回該旗再此等人員係實授者自有應得之俸嗣後內九門千總缺出請照外七門千總例從之十一年兵部議覆湖廣荆州將軍衮泰條奏各省駐防協領以下官員向例俱係本旗人員補授承辦事件不無瞻顧掣肘等弊嗣後請照京城例設主副員於本翼內揀選佐領調旗委署副協領揀選防禦驍騎校調旗委署副佐領此委署人員仍照原品食俸俟有協領佐領缺出即將委署之員送部引見補授再於領催前鋒內預行保舉記名調旗委署副驍騎校如記名人員不足即將未經保舉之人揀選委署給與八品頂帶仍食本身錢糧遇有驍騎校缺出將已經保舉領催前鋒奏請補授其未經保舉之領催前鋒送部轉交該旗帶領引見至出兵人員補授之缺仍照例委員署理並委副員協辦從之十二年吏部議覆詹事府詹事顧祖鎮條奏起居注衙門止滿主事二員請增設漢主事一員於舉人進士出身之現任中書內揀選引見補授從之皇朝文獻通考卷七十七
