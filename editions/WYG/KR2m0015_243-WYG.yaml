body:
  text: 欽定四庫全書皇朝文獻通考卷二百四十三帝系考五皇族臣等謹按我朝天潢世系源逺流長顯祖宣皇帝支派迄於萬禩並為宗室興祖直皇帝暨景祖翼皇帝皇子支派並為覺羅恭遵玉牒分析編纂至於宗人府事例悉以次詳紀用昭歴朝展親錫類之鉅典云天聰九年諭宗室者天潢之戚不加表異無以昭國體令繫紅帶以表異之復分别名號太祖庻子俱稱阿哥六祖子孫俱稱覺羅六祖子孫俱令繫紅帶他人毋得紊越崇徳元年定親王以下至宗室俱束金黄帶覺羅束紅帶三年定親王以下至宗室生子女周歲書其名及年月日時母某氏詳其嫡庻次第具冊送宗人府覺羅亦如之順治九年定親王以下至宗室所生子女載黄冊覺羅所生子女載紅冊康熙五十二年諭宗室革退者向皆不入玉牒其子孫若不及今表著日乆年逺必至湮没所關甚大應查明載入玉牒酌量給帶為記覺羅等原係同祖所生其犯罪革退者若不察明亦將湮沒所生子女皆應察明記載著詳議具奏遵㫖議准革退宗室給以紅帶附入黄冊革退覺羅給以紫帶附入紅冊於纂修玉牒時附名冊後所生子女亦具冊送府附載黄紅冊後乾隆三年定皇帝伯叔兄弟輩子女至十五歲請㫖賜婚其餘宗室子女係特㫖指婚者令候㫖行餘酌量及時婚嫁如以女與外藩䝉古結姻者均奏請得㫖乃行臣等謹按宗室列爵授封條例並詳封建考兹不複載間有由科舉入仕者載以備考康熙三十六年諭宗室子弟有能力學屬文應令一體應試編號取中於三十八年己卯科鄉試一次旋即停止乾隆九年宗人府議准請欽命大臣合試左右翼學生凡本年考取一二等及往年考取一等並在家肄業願觀光者咸准與考拔取佳卷進呈御覽恭候欽定名次由府引見以會試中式註冊竢禮部會試之年習繙譯者與八旗繙譯貢生同引見賜進士以府屬額外主事用習漢文者與天下貢士同殿試賜進士甲第有差十七年奉㫖將宗室等鄉㑹試及選庻吉士之例永行停止臣等謹按馬端臨通考皇族一門紀載至簡良以譔述歴代成書其體例固與宗室世譜異也我朝天潢蕃衍玉牒所載卷帙浩繁擬倣通考原例稍加變通凡列祖世系下宗室覺羅以世分系其曽膺十等封爵及仕至一二品文武大員者詳載餘則並著玉牒至編載之例系以世分世以系合别之以世使有次從之以系使有屬是卷宗室之系凡七覺羅之系凡六凡某世必注某人之子其或不在十等之爵二品以上者則從某子推而上之注曰某曾孫某元孫遞溯數世以上名見本書者而止若牒末附見爵秩應載者則附書於各系之後亦仍以世次焉臣等又按玉牒所載於其人之膺封爵而兼有官職者則官爵並書然官爵有陞降如爵有由始封而晉封者則從其所晉之爵書之有由始封而降封者則從其所降之爵書之今恭照此例編載至於縁事革去者則於官爵上加原封原授原任等字樣以示區别云臣等又按前次編纂玉牒成於乾隆四十三年其有封爵官職名氏見於四十三年以後者因現修玉牒尚未告成無憑查載謹聲明於此宗室顯祖宣皇帝系二世恭載皇子門三世奉恩輔國剛毅公達爾察固山襄毅貝子務達海原封鎮國公漢岱奉恩輔國公塔海奉恩輔國公祜世塔奉恩輔國恪僖公喇世塔以上多羅誠毅勇壯貝勒穆爾哈齊子原封大貝勒阿敏多羅恪僖貝勒圖倫多羅和惠貝勒寨桑古和碩鄭獻親王濟爾哈朗和碩簡親王芬古以上追封和碩莊親王舒爾哈齊子餘詳玉牒四世奉恩輔國慤厚公穆青奉恩輔國剛毅公達爾察子奉恩鎮國純和公託克託慧固山襄毅貝子務達海子奉恩輔國慤厚公海蘭奉恩輔國悼愍公席布錫倫奉恩輔國懷思公嵩固圖以上原封鎮國公漢岱子輔國將軍泰䕃布禄輔國將軍德倫以上奉恩輔國公塔海子鎮國將軍祜世布鎮國懷思將軍蘇赫輔國將軍伊尚阿以上輔國公古世塔子輔國將軍喇克達奉恩輔國恪僖公喇世塔子固山温簡貝子固爾瑪渾奉恩鎮國公恭阿奉恩鎮國端純公果蓋奉恩鎮國公果賴以上原封大貝勒阿敏子奉恩輔國公品級扎喀納扎薩克圖子和碩莊親王舒爾哈齊孫原封固山貝子屯齊喀奉恩鎮國公屯齊以上多羅恪僖貝勒圖倫子鎮國將軍洛託和惠貝勒寨桑古子慤厚世子富爾敦和碩簡純親王濟度多羅敏簡郡王勒度和碩簡親王巴爾堪原封輔國將軍都統輝蘭輔國將軍固美輔國將軍武錫以上和碩鄭獻親王濟爾哈朗子原封貝勒尚善和碩簡親王傅拉塔固山悼哀貝子努賽以上和碩簡親王芬古子餘詳玉牒五世副都統奉國將軍勒塞禮奉國將軍德塞禮以上奉恩輔國慤厚公穆青子奉國將軍當阿賴奉國將軍卓隨奉恩鎮國襄毅公揚福奉國將軍白努宜以上奉恩鎮國純和公託克託慧子奉國將軍哈爾薩奉恩輔國慤厚公海蘭子奉國將軍蘓爾德宜輔國悼愍公席布錫倫嗣子奉國將軍錫立渾奉國將軍務立渾以上輔國懷思公嵩固圖子奉國將軍滿珠錫禮兵部右侍郎奉國將軍塞爾赫以上輔國將軍奉䕃布禄子奉國將軍額爾赫布奉國將軍瑪勇奉恩將軍訥爾特宜以上輔國將軍徳倫子奉國將軍滿達鎮國將軍祜世布子奉國將軍席布輔國將軍伊尚阿子奉國將軍敬德奉國將軍雍占以上輔國將軍喇克達子輔國懷儀將軍塞克圖輔國懷儀將軍塞勒伯輔國慤厚將軍度爾伯以上宏科泰子孫原封大貝勒阿敏奉恩鎮國懷思公瑪爾圖奉恩鎮國懷愍公僧額奉恩鎮國懷儀公瑪三奉恩輔國襄敏公瓦三輔國敏恪將軍扎三原封三等輔國將軍薩三以上固山溫􅂤貝子固爾瑪渾于奉恩輔國公法塞鎮國公恭阿子輔國將軍塞祜德鎮國端純公果蓋子奉恩輔國懷思公翁武鎮國公果賴子輔國將軍薩克新鎮國公果賴嗣子原任副都統阿喀