body:
  text: 輿地考十七西域天山南路臣等謹按兩漢西域傳於城郭諸國皆備述其風土之異而獨未詳回教所自始唐時于闐國滅莎車服疏勒於山南諸國中為最大唐書謂其俗重佛法王尤信尚設齊日必親自灑掃饋食石晋髙居誨使於闐記謂其喜鬼神而好佛已近於今之回教矣後之言回回者或以為即唐之回鶻然回鶻種落雖繁其散處多在天山以北隋時回鶻尚名鐡勒而回回國人已云傳教中國遼元二史回鶻回回亦兩國並見則其族類之異可知明史西域傳稱天方於西域為大國回回之祖曰馬哈木者首於此地行教又稱黙徳那為回回祖國地近天方相傳其國王謨罕驀徳生而神靈盡服西域諸國隋開皇中始傳其教迄元世其人徧於四方皆守教不替所謂謨罕驀徳即排罕帕爾音之訛也今之葉爾羌喀什噶爾諸城在唐時皆為于闐屬地雖未即為回回祖國要其服習回教固已久矣夫回部居天山之陽四境廣逺向以受制準夷未通中國自王師底定以後設官經野制度一新視内地之雄州𦂳縣犬牙相錯者不啻焉至其百産充盈民物殷庶撈玉和闐之水採銅烏什之城其土宜足以備貢賦之入其編户足以習耕屯之利加以山川形勝秀甲金方尋泑澤之河源辦崑岡之地脉從古地志以為荒邈難稽者莫不部居州次列在圖經睿覽親裁徵信萬古彼張騫鑿空之迹甘英窮海之言傳聞異詞名實失據祇等於管闚錐指又何足語於覆幬之大哉天山南路漢時為西域三十六國地其最著者為車師焉耆龜兹于闐疏勒莎車諸國皆在匈奴之西烏孫之南其東接漢玉門陽闗西限蔥嶺自兩闗出西域由車師前王庭傍北山西行至疏勒為北道由鄯善傍南山西行至莎車為南道並通於孝武時至昭帝時始開屯田於輪臺渠犁宣帝時置西域都䕶總䕶南北二道治烏壘城元帝時置戊巳校尉屯田車師前王庭哀平間漸析為五十餘國至王芥時四境擾亂西域與中國遂絶往附於匈奴後漢永平間乃更通焉仍置都䕶與校尉自章和至於延光又經再絶而復通漢末迄晉中原多故而諸國亦自相分併後魏太武時貢獻者十有六國惰大業中引致諸番來朝者三十餘國因置西戎校尉以接應之唐興西突厥强盛諸國多為所役服太宗時平髙昌開置西州設安西大都䕶府其諸國之通朝貢者則遥置為都督府有疏勒都督府焉耆部督府貞觀之末復討降龜兹以龜兹疏勒于闐碎葉號四鎮徙安西都䕶治龜兹城以統之顯慶時又置龜兹都督府咸亨初為吐蕃所殘安西四鎮並廢上元初于闐國王入貢以其地置毗沙都督府長夀元年擊破吐蕃始復四鎮仍置安西都䕶府於龜兹開元中以焉耆與龜兹疏勒于闐為四鎮天寶初又置安西節度使治安西都䕶府安史之亂其地漸次沒於吐蕃逮貞元時安西與北庭府俱陷不能再復五季迭興惟晉天福時于闐國曽遣使一至宋有天下西域為夏人所隔若回鶻髙昌龜兹于闐等國貢使偶通聲教不訖南渡後益濶絶焉元時以諸王駙馬分長各部凡前代國名始盡易以䝉古語此為巴什伯里部地至元二十一年置宣慰司二十三年置元帥府其所屬有合失合兒鴉兒看諸城即今之喀什噶爾葉爾羌也明洪武永樂時巴什伯里部入貢後稍西遷改為伊力把里此為哈實哈兒葉爾欽諸城地其東兼為栁城火州吐魯畨諸地其俗習尚回教亦稱回回國國初順治二年有回回天方國來貢其後準噶爾漸强遂服屬之輸其賦稅至康熈二十一年間其酋長阿卜都里什特父子為噶爾丹所執拘留帳下迨三十五年大兵既破噶爾丹阿卜都里什特脫身來降朝於太和殿錫以衣冠銀幣遣官䕶送至哈宻俾返故地至波羅泥都霍集占兩和卓木復為準噶爾所執拘於阿巴噶斯地方乾隆二十二年我師既定伊犁始釋其囚以兵送波羅泥都歸葉爾羌而令霍集占統回衆之在伊犁者既而兩和卓木黨附叛賊戕害使臣皇上乃命伊犁凱旋之師討之所過諸城皆望風降直抵葉爾羌城下以馬力弗及猝為所遮相拒者累月及新調兵至全軍而出還至阿克蘇於二十四年整兵再進兩和卓木俱先期遁其喀什噶爾葉爾羌回衆等以城降我師追逆回屢敗之殱其衆殆盡兩和卓木竄至拔達克山尋即授首回部全境悉定恭載御製平定回部告成太學碑文建非常之功者以舉非常之事舉非常之事者以藉非常之人然亦有不藉非常之人而舉非常之事終建非常之功者則賴昊蒼篤貺神運斡旋事若禍而移福機似逆而轉順順天者昌逆天者亡故犁準夷之庭掃回部之穴五年之間兩勲並集始遲疑猶未敢信終劼劬以底有成荷天之寵在兹畏天之鑒益在兹爰叙其事如左達瓦齊之就俘也伊犁已大定矣無何而阿睦爾撒納叛彼其志本欲藉我力以成已事時也人心未定佐饔者嘗一蜮肆狂萬狙應響蜂屯蟻雜不可爬梳畏難者羣謂不出所料準夷終不可取並有欲棄巴里坤為退守謀然予計其衆志不齊將有歸正倒戈者於是督䇿將帥之臣整師亟進既而伊犁諸台吉宰桑果悔過勤王思討逆賊以自贖此天恩助順者一也二酋大小和卓木者以回部望族久為準噶爾所拘於阿巴噶斯鄂拓者也我師既定伊犁乃釋其囚以兵送大和卓木波羅泥都歸葉爾竒木俾統其舊屬而令小和卓木霍集占居於伊犁撫其在伊犁衆回乃小和卓木助阿逆攻勤王之台吉宰桑等阿逆賴以茍延及我師再入阿逆遂逃入哈薩克而霍集占亦即收其餘衆竄歸舊穴此天恩助順者二也準夷之事前紀略見梗概兹不復紀紀興師討􅉰之由則以我將軍兆惠在伊犁時曽遣副都統阿敏道往􅉰議事小和卓木乃以計誘阿敏道而拘之及我師抵庫車問罪彼攜阿敏道以來援至中途害之乃從行者百人彼猶逞其狂勃抗我師顔且敢冒死入庫車城乃雅爾哈善略無紀律致彼出入自由然我滿洲索倫衆兵士無不念國家之恩効疆場之力故能以少勝衆逆渠懼而脫此天恩助順者三也知僨轅之無濟掄幹才之可任時將軍兆惠以搜勦準夷餘黨至布露特部落已款服其衆因命旋師定回部於是克庫車存沙雅爾定阿克蘇略烏什收和闐師之所至降者望風直至葉爾奇木城下而我軍人馬周行萬有餘里亦猶强弩之末矣二酋以其逸待之力統數萬人與我三千餘人戰我師之過河者纔四百餘猶能斬將搴旂退而築堡黒水固守以待此天恩助順者四也萬里之外抱水救火其曷能濟乃予以去年六月即降㫖派兵撥馬欲以更易久在行間者耳故兵馬率早在途一䟎進而各争前恐後人人有敵愾之憤此天恩助順者五也副將軍富徳及㕘贊舒赫徳輩率師進援以速行戈壁中馬力復疲值狂􅉰據險坐俟頗有難進之勢夫援軍不能進則固守以待者危矣而㕘贊阿里衮後隊之馬適至夜擣賊營我師内外夾攻彼不知我軍凡有幾萬握炭流湯之徒自相蹂躙顧命不暇於是解黒水之圍鹿駭麞驚遁而保窟我之兩軍合隊全旅以迴阿克蘇此天恩助順者六也既而彼料我必再入泰山之壓難當乃於我師未進之先攜其部落載其重器跳而逺去而葉爾奇木哈什哈爾二城之舊伯克等遂獻城以降㕘贊明瑞一邀之於霍斯庫魯克副將軍富徳再陷之於阿爾楚爾於是離心者面内前途者反斾二酋惟挈其妻孥及舊僕僅三百人入拔達克山境此天恩助順者七也人跡不通之地語言不同之國既已雀敺寧不狼顧其授我與否固未可定也然一聞將軍之檄莫不援旗請奮整旅前遮遂得兇渠函首露布遥傳此天恩助順者八也夷考西師之役非予夙願之圖何則實以國家幅員不為不廣屬國不為不多惟厪守成之志無希開創之名兼以承平日久人習於逸既無非常之人安能舉非常之事而建非常之功哉然而輾轉輻輳毎以艱而獲易視若失而反得故自締始以逮定功雖予自問亦將有所不解其故而不敢期其必然者故曰非人力也天也夫天如是顯佑國家者以祖宗之敬天愛民蒙眷顧者深也則我後世子孫其何以心上蒼之心志列祖之志勉繼繩於有永保丕基於無窮乎繫以銘曰二酋偕徳始亂為賊是興王師報怨以直伊犁既平蕞爾奚屑徐議耕闢徐議戍設以噢以咻伊予本懐豈其弗戢圖彼藐􅉰彼􅉰不量怒臂當車戕我王臣助彼狂狙始攻庫車僨轅敗事用人弗當至今為愧悖逆罪重我武宜揚易將整師直壓彼疆阿蘇烏什玊隴和闐傳檄以定肉袒羊牽二酋孽深知不可活狼狽相顧固守其穴桓桓我師周行萬里馬不進焉强弩末矣以四百人戰萬餘虜退猶能守黒水築堡間信達都為之傷悼所幸後軍早行在道督飭速授人同怒心曽不兩月賊境逼臨賊境逼臨彼復徼隙馬繼以進賊營夜研出其不意賊乃大驚謂自天降孰敢鋒攖大鞣大膞如虎搏案角隴種誰敢迴顧黒水圍解合軍暫旋整旅三路期並進焉賊偵軍威信不可支挈其妻孥遁投所依所依亦回豈不自謀豈伊庇猿而受林憂利厥輜重無遺盡掠遣其都丸遂來獻馘詎惟獻馘並以稱臣捧賫表章將詣都門奏凱班師前歌後舞尸遂染鍔温禺釁鼓露布至都正逮初陽慈寧稱慶亞嵗迎祥郊廟告成諸典並舉皇皇太學豐碑再樹豐碑再樹敢予喜功用不得已天眷屢䝉始之以武終之以文戡亂惟義撫衆惟仁布惠施恩寰宇共喜古不羈縻今為臣子疆闢二萬兵出五年據實書是永矢乾乾御製平定回部勒名伊西洱庫爾淖爾碑文機有似若失而反得智者之所懃而愚者之所惑也事有初若勞而終逸壯者之所劭而懦者之所怯也若夫定全回殱二酋戰無不克攻無不取皆二將軍及諸㕘贊以及行間衆將士之力也然予亦有所深慰於其間者則以五年劼劬宵旰運籌狎至實未敢偷安於頃刻也幸我武保定庶因答乾貺慰先志且以免浮議之指斥也伊西洱庫爾淖爾者我副將軍富徳等窮追二酋至㧞達克山之界獲其降者萬人二酋僅以身免而遣使索俘遂得獻馘振旅以成茂勣也其地依山臨水單騎可容而我突將無前四甄並發如入無人之域也賊衆首尾不能相顧竪我四纛以招之降者鋪崖以來霍集占持及止之或且反戈倒㦸也是以二酉見事不成拔身逺跳駾突而喙息也先是蹙之於霍斯庫魯克襲之於阿爾楚爾無不以少勝衆批亢擣堅桓桓之士真如驅虎豹而逐貍纒頭碩鼻者流皆惃惃踉踉見即辟易也是以先聲異域駭其跳盪遮逆助順用攫重輜而獻兇級也我兵未深入㧞達克山境者則以討逆之師不蹂無罪之地姑遣使焉彼域曉逆順亦將擒獻是以將帥之臣審機度時我武少輯也卒蕆事而告成功則亦未為計之失也回部始末已見於勒名葉爾奇木之碑辭不復綴也特紀耆定之在兹是以誌嵗月而刻石也闢展城東至塔呼接哈宻界西至伊拉里克接哈喇沙爾界南臨沙磧北至磚克達山接天山北路界城一所屬城村中最著者曰吐魯番至京師八千一百十里漢時為車師前王國其西北境兼為車師後城長車師都尉與山北六國地後俱併與軍師元帝時置戊巳校尉屯田車師前王庭後漢永光時復置校尉治車師前部髙昌璧晉咸和中前涼張軌置髙昌郡後入于北魏尋為蠕蠕所併後其國復立唐貞觀時平髙昌以其地為昌州置安西大都䕶府顯慶時移安西都䕶治龜兹城改置西州都督府於此後復改為金山都䕶府天寶元年改西州為交河郡乾元元年復為西州領髙昌栁中交河蒲昌天山五縣寶應時改髙昌為前庭縣時西州治前庭為今哈喇和卓諸城地栁中居前庭之東為今闢展本城及魯克察克以來諸城地交河居前庭之西為今交河城以西諸城地蒲昌居前庭之南為今勒木丕以南地天山居前庭之北為今連木齊木以北地安史之亂其地皆陷於吐蕃宋時仍名髙昌其地有回鶻雜居亦謂之西州回鶻元時號輝和爾置萬户府明時為吐魯畨栁城火州諸地皇朝初為吐魯蕃地後為準噶爾所侵掠屢經遷徙乾隆二十四年平定西域復遷吐魯畨部於闢展所屬之吐魯畨城其内皆内屬駐辦事大臣管轄無定員仍設伯克分理境内事務闢展城屬地塔呼在闢展城東二百八十里為最東界自此至洪武在闢展東境納呼在塔呼西七十里齊克塔木在納呼西一百四十里特斯在齊克塔木西三十里特庫斯在特斯西二十里洪在特庫斯西二十里楚輝在洪西北二十里自此至伊拉里克皆在闢展西境色爾啟布在楚輝西北四十里魯克察克在楚輝西五十里漢時車師前國栁中地為戊巳校尉所居後漢西域長史居此唐時為髙昌國田地城入唐為栁中縣治自此東至塔呼皆為縣境時稱為古魯塵明為為西域之栁城地洋赫在魯克察克西北二十里哈喇和卓在洋赫西北三十里唐時為髙昌國故城入唐為唐昌縣治後為前庭縣治自此東南至洋赫西北至阿斯塔克皆為縣境元時稱為合剌火者明為西域之火州地玊門口在哈喇和卓西北十里阿斯塔克在哈喇和卓西五里勒木丕在阿斯塔克西南二十里唐時為蒲昌縣地自此南經沙磧直抵羅布淖爾皆為縣境吐魯畨在阿斯塔克西北五十八里唐時為髙昌縣之安樂城地乾隆三十一年平定準噶爾移𤓰州吐魯畨還居於此臣等謹按吐魯畨部係元太祖次子察哈台受封於此本為䝉古後習回教明時與栁城俱屬於火州永樂宣徳年間火州王與栁城吐魯畨萬户俱遣使入貢成化以後吐魯畨日强遂併有火州栁城之地皇朝順治三年吐魯畨内附貢使不絶雍正初年其酋長額敏和卓避準噶爾侵掠自吐魯畨城東遷於魯克察克地方其後率衆内附駐其部衆於嘉峪闗外之𤓰州編為一旗封額敏和卓為扎薩克輔國公乾隆二十年以後屢晉封爵以西域蕩平遣吐魯畨人復還故地並封額敏和卓之子蘇賚滿公爵管轄回衆交河城在吐魯畨城西二里里漢時為車師前王庭後漢戊巳校尉此此唐時為交河縣治自此西至伊拉里克皆為縣境雅木什在交河城西南十五里安濟延在雅木什西五里布干在安濟延西南三十里托克三在布干西南六十里伊拉里克在托克三西四十里自塔呼至此皆為漢時車師前王國地連木齊木在闢展地西八十里漢時為車師後城長國地自此至濟木薩皆在闢展西北境雅圖庫在闢展城西七十里漢時為車師都尉國地罕都在連木齊木東北二十五里漢時為車師後城長及都尉二國地蘇巴什在連木齊木西二十里漢時為郁立師國地僧尼木在蘇巴什西三十里漢時為卑陸前國地汗和羅在僧尼木東北一百里漢時為卑陸後國地穆圖拉克在僧尼木西北六十里布拉里克在僧尼木西北七十里與穆圖拉克皆漢時刧國地又有東西且彌二國皆在附近金嶺以北山谷之間是為山北六國濟木薩在布拉里克西北九十里漢時為車師石城地自連木齊木至此皆為唐時天山縣地哈喇沙爾城東至烏沙克塔勒東北至察罕通格接闢展界西至鄂博爾接庫車界南臨沙磧北至天山踰山接烏魯木齊界城二舊城在海都河西新城在特伯勒古西至京師九千一百里漢時為焉耆國其東境兼為危湏國西南境兼為尉犁國渠犁國地宣帝時置西域都䕶理烏壘城以為西域適中之地唐初焉耆國附西突厥後討降之遥置焉耆都督府為四鎮之一𨽻於安西都䕶府其西境兼為輪臺縣地𨽻於北庭都䕶府貞元時俱廢宋時為西州回鶻地元時為巴什伯里地置軍站宣慰司元帥府明時為伊力把里地舊屬於回部乾隆二十一年既平凖噶爾沙拉斯台吉兄弟以城來降二十三年逆回和卓木叛沙拉斯相應為逆討平之其地内屬駐辦事大臣管轄無定員仍設伯克分理境内事務哈喇沙爾城屬地烏沙克塔勒在哈喇沙爾城東二百十五里為最東界自此至特伯勒古皆在哈喇沙爾東境察罕通格在哈喇沙爾城東北一百九十五里楚輝在烏沙克塔勒西五十里塔噶爾齊在楚輝西三十里特伯勒古在塔噶爾齊西北四十五里自烏沙克塔勒至此皆漢時危湏國地後為焉耆所併佛和屯在哈喇沙爾城西二十里自此至鄂博爾皆在哈喇沙爾西境碩爾楚克在佛和屯西南二十里博爾海在碩爾楚克西南二十里哈勒噶阿滿在碩爾楚克南五十里自佛和屯至北又西為庫隴勒皆在海都河之南為漢時尉犁國地後為焉耆所併庫隴勒在哈喇噶阿滿西南七十里車爾楚在庫隴勒西一百七十里䇿特爾在車爾楚西一百四十里漢時烏壘城地為西域都䕶治所後漢為烏壘國後為焉耆所併唐遥置為烏壘州地其南境即漢時渠犁國後亦入焉耆唐遥置為渠犁都督府地英阿薩爾在䇿特爾西七十里布古爾在英阿薩爾西一百二十里漢時輪臺地後亦為侖頭國為龜兹所併唐遥置為輪臺州都督府又並為輪臺縣故地鄂博爾在英阿薩爾西北三十里庫車城東至第納爾河接哈喇沙爾界西至烏恰特河接賽哩木界南亦至烏恰特河接沙雅爾界北至額齊奇巴什山接伊犁界城一至京師一萬有八十里漢時為龜兹國地唐初附西突厥後討降之徙安西都䕶於其國後復遥置龜兹都督府為四鎮之一𨽻於安西都䕶府貞元時廢宋時為西州回鶻地亦稱龜兹回鶻元明時為巴什伯里地舊屬於回部乾隆二十三年大兵進討逆回霍集占至此逆黨阿布都克勒木竄去霍集占來援我軍敗之於烏恰特河以殘兵入庫車旋復遁去其故伯克阿集等以城降其地内屬駐辦事大臣管轄無定員仍設伯克分理境内事務庫車城屬地阿巴特在庫車城東二百里托和鼐在庫車城東南六十里特勒伯在庫車城東南一百里常格在庫車城南三十里奇里什在庫車城東