body:
  text: 學校考六太學四乾隆三十一年又改定考試敎習書題二道為一道増試五言排律八韻例詳見旗學門又申定増設八旗官學滿洲敎習一員裁漢敎習一員詳見旗學門嚴申送嵗貢入監肄業例詳見直省鄉黨門三十三年頒孔廟門題殿榜諭修葺文廟現届落成太學規模式昭輪奐惟門題殿榜尚應詳考彛章用肅景仰向來正殿稱先師廟二門曰廟門而大門未有書額葢沿習明代舊文未加釐正夫廟門之號於禮經所稱祖廟既涉嫌疑而先師廟額揭諸殿楹名實尤多未稱應於大門増先師廟額其正殿改為大成殿二門改為大成門庶符㑹典定制朕親書牓字涓吉恭懸以彰崇道尊師之至意三十三年禮部議貢監内有年老癃疾情願繳照不換者照生員告衿之例准其仍𢃄原頂應於執照繳銷之時即在季報四柱冊内註明縁由下季毋庸造報以省案牘從之三十四年御製重修文廟碑記舉江淮河濟以贊海吾知其不知海舉嵩岱恒華以贊地吾知其不知地然則舉道徳仁義以贊孔子者其亦類於是乎夫江淮河濟豈不為海所納而不足以形海之大然海固不拒江淮河濟以為水也嵩岱恒華豈不為地所載而不足以究地之厚然地固不讓嵩岱恒華以為土也道徳仁義豈不為孔子所垂而不足以盡孔子之量然孔子固不外道徳仁義以為敎也敎之義始見於虞書而未有定所夏校殷序周庠學則三代共之是國學所昉乎夫三代既有學亦必有敎而吾以為孔子立道徳仁義之敎者何盖三代以前之敎非孔子不明三代以後之敎非孔子不垂也國學始於元太祖置宣聖廟於燕京由元及明代有損益至本朝而崇奉規模為大備列聖右文臨雍必事輪奐乾隆戊午朕詣學展儀先詔易盖黄瓦聿昭茂典然丹艧雖致飾壯觀而上棟下宇風雨燥濕歴年既久浸欹是虞爰以嵗丁亥發帑二十餘萬特簡重臣司其事越己丑仲春告蕆工朕親釋奠以落成焉先是言臣有以宜乗此時修復辟雍圜水之制為請者禮官以為三代之制弗相沿襲實政不必泥古朕以其言良是遂從之門殿諸額一準㑹典皆親書各懸於其所舉大功者必勒碑以誌故叙其事書之若夫述孔子之言仍以頌孔子是猶繪日月星辰以象天朕有所不能諭向來各省學政三年任滿例應舉報優劣其優生之保題到部者經禮部彚試分别廩増附作貢監送入成均肄業且有按省大小定額不得過幾名之令而日久相沿奉行殊難責實在學政中之拘謹畏事者多以無可舉為辭人才既不無屈抑其他好名市恵之人雖所舉不敢踰額必致儘數充選自博寛厚之譽况學政與生員分屬師生隨時得以相見其中保無納贄夤縁情弊於造士掄才甚有闗係但三年舉行一次為奨勵士子之一端若竟輟而不行未免因噎廢食嗣後學政舉報優生照選拔貢生之例㑹同該督撫一體考核果屬文行兼優者准其㑹銜保題庶諸生不得濫邀而甄拔益昭公當其報劣之例照舊核實辦理吏部覆准管國子監事侍郎徳保奏准學正學録例應推陞各衙門典簿司務等官其有文理優長訓課有方者或遇推陞准奏明請㫖留監俟助敎缺出照例題補從之管國子監事侍郎徳保奏請本監滿漢博士助敎及學正學録等官有文理荒疎而年力未衰尚堪辦事者咨行吏部准其以對品官調補從之更定泰州學出貢泰州本三年兩貢嗣以額設廩増將十名分撥東臺縣因改為二年一貢三十五年更定四川綿州學嵗貢生三年兩貢彰明徳陽二縣學四年一貢三十六年更定雲南元江州廣西州嵗貢生各三年二貢普洱府二年一貢武雲州三年二貢禄勸縣二年一貢鶴慶府三年二貢彌勒師宗建水三縣各二年一貢順寧府三年二貢麗江府學二年一貢順寧麗江二縣學四年一貢是年恭上皇太后徽號恩詔國子監貢監生及各官學敎習俱免坐監期一月令各省儒學以正貢作恩貢以次貢作嵗貢三十九年四庫全書處奏准永樂大典内採輯散篇成部有可刋行之書擬於國子監揀派内肄業貢生十名到武英殿照現在行走貢生例専供校録刋本之用得㫖允行三十九年増定浙江海寧州學出貢例三年兩貢又定福建古田縣學嵗貢生三年一貢屏南縣學四年一貢四十一年建立熱河學宫定熱河等七􅆹以開考年計算俟十二年後始行出貢照例三年一貢遇拔貢年拔取一名又定懐仁縣學出貢例四年一貢拔貢年拔貢一名禮部奏准廩生出貢各該學政於考准之日當堂填給貢單令其收執其赴監肄業者仍取本籍地方官文結并親齎貢單投驗倘無單呈騐除駮回外將遺漏給單之該學政㕘處至現在肄業及續來之嵗貢生内如出貢在乾隆四十年以前未經給有貢單者由國子監核騐本籍文結再咨查禮部俟准部覆貢冊有名仍准其肄業報滿咨部銓選毋庸補給貢單以歸簡易從之禮部議准順天各屬考貢諸生距考棚在五百里以内者以十月為限其在五百里以外者以一年為限如逾限不行投考即將該生應貢之處永行扣除其赴考以前有實在患病事故者由該敎官具結報明暫行轉限不得過三個月仍於冊内聲明報部所有現在應貢之生即照新定章程辦理並通行各省學政一體遵照從之平定兩金川大功告成恭上皇太后徽號恩詔國子監貢監生及各官學敎習俱免坐監期一月平定兩金川大功告成御製碑文勒石太學太上立徳其次立功又其次為立言而徳與功皆頼言以𫝊言之無文行而不逺文之時義大矣哉然𫝊徳之辭直而寡𫝊功之辭費而多直而寡者不因文而徳自見二典三謨經世立敎是也費而多者必因文而功乃明周誥殷盤佶屈聱牙是也吾嘗讀韓昌黎平淮西碑益悉此言之不爽何則彼其藩鎮乃家奴之類慫惥因循以致宛成敵國削而平之是宜引以為愧而不可炫以為功頼昌黎之文幾與江漢常武同稱耆定然有識者固知其辭費而多飾而未知憲宗之愧與弗愧耳今之平定金川之文不有類於斯乎解之者曰逆酋覊縻徼外非若淮蔡之居中土元濟之為世臣也吾則以為既受職為土司則是我臣而其地近接成都逺連衛藏則是我土我土我臣而横生逆志蠶食鄰封將欲大有所為弗勦而滅之則西川將不能安枕兹雖蕆事與平定淮蔡擒呉元濟何以異故宜引以為愧而不可炫以為功者以此金川之始見於己巳告功之文兹不複記記其復叛而復征則其隂謀負恩已自戊寅年始盖戊辰之師實縁其跳梁不靖而師既臨境彼即窮蹙乞降遂以赦罪班師甫十年而其酋郎卡即與革布什咱搆釁又四年遂與綽斯甲布及三雜谷為敵而逆子索諾木凶悖益甚自恃地廣人衆力强與各土司搆兵訖無寧嵗故各土司皆畏之如虎而以勢分力散又莫能如之何余以為業已受其降不宜復加兵且蟻鬭蠻觸不足以勞王師因命地方文武大吏隨宜彈壓令弗越内地界亦足以安民而示度耳不虞地方大吏欲息事而毎示寛逆酋轉以為無足懼而日益逞其小金川逆酋僧格桑者始則與索諾木水火相仇繼乃狼狽為奸於是索諾木計殺革布什咱土司色楞敦多布取其印勅以歸而僧格桑亦侵佔鄂克什地界且發兵圍其土司色達拉之官寨期於必取總督阿爾泰提督董天弼知事不可掩乃有發兵之請是役也或咎阿爾泰依違誤事之過而余則以為阿爾泰之過皆余之過盖金川因其地險衆悍久蓄異志是以有殺至維州橋之謡維州本漢徼外羌冉駹地蜀將姜維征羌駐此築壘役因名姜維城唐武徳初因其地置維州屢叛屢復廣徳中䧟土蕃號為無憂城遂屢入冦擾大中時始復内附五代蜀州内徙改縣曰保寧宋景徳初改曰威州元至元間以州治保寧縣并入明洪武初於州境析置保縣有本朝雍正五年省威州入保縣屬茂州今其地尚維州橋之稱而促浸畨人以殺至維州橋播為謡曲似係聞土蕃舊事妄冀效尤耳則其不忘内地情率可知戊辰之役我師罙入屢勝即不宜赦其罪而受其降此一誤也甫十年而郎卡背恩作亂以及逆子踵其蹟皆不及發兵問罪惟令地方大吏隨宜處置又屢誤也以至尾大不掉終於興師故予不咎人之議為窮兵黷武而轉咎已之類於姑息養奸盖中國之制外域張撻伐則彼畏而歛跡主和好則彼輕而生心漢唐宋明之覆轍率可按也若謂予窮兵黷武則予頼天恩平伊犂定回部拓疆二萬餘里豈其尚不知止足而欲滅蕞爾之金川以為揚赫濯紀勲烈之圖哉雖然平伊犂定回部其事大矣然費帑不及三千萬成功不過五年兹兩金川小冦地不逾千餘里人不滿三萬户而費帑至七千萬成功亦遲至五年則以跬步皆險畨奴效命死守故能延至今日而我將軍阿桂立志堅定决機明敏兩副將軍及參贊領隊諸臣同心合力各軍士敵愾奮勇凡經大小數百餘戰而後成功視平伊犂定回部費力轉不啻倍蓰設非天恩助順衆志成城則金川未易言滅而國威或致少損矣是不可以不記觀斯文者尚諒予懐慚悔過之不暇知非稱功詡徳而為言其庶幾乎繋之以辭用誌始末云爾小金首禍曰僧格桑兵救鄂什向稱沃日今定為鄂克什急呼之則鄂什也竟抗顔行僧格桑於庚寅夏與鄂克什土司搆怨稱兵阿爾泰董天弼親徃誠諭奏稱逆酋遵敎退歸亦遂釋而不問未數月復圍鄂克什辛卯夏阿爾泰乃遣兵䕶鄂克什而逆酋遂與官兵交戰督臣提臣毎事遷就知弗勝任將軍别授阿爾泰等名為進兵仍思遷就完事因諭温福由滇赴川經理軍務且命桂林馳徃視之辛卯冬因阿爾泰始終遲疑玩誤遂罷其職而以温福代為大學士授定邊將軍由西路督兵進攻其四川總督則令桂林代之統兵攻勦南路攻破巴朗向訛為斑斕山今改直取達圍進抵資哩數月克之兩路夾擊遂得美諾鼠竄狼奔金川助惡温福初至西路即䇿勵將士攻克巴朗拉乗勝直取達圍進攻資哩數月而克之繼命豐昇額為副將軍同温福進勦賊尋退還木蘭􅄵我兵進抵路頂宗桂林在南路其始頗合機宜連破約咱卡了諸寨並復革布什咱侵地尋為宋元俊所誤致有墨壟溝之失桂林匿不上聞為阿爾泰所劾因即罷斥而令阿桂為副將軍赴南路代領其兵南路自逹烏至僧格宗皆峭壁懸崖碉卡林立阿桂董飭官軍勵勇摧堅罙入其阻乗勝進擣美諾賊營壬辰十一月遂克之温福亦攻克明郭宗至美諾與阿桂㑹復督兵攻取布朗郭宗逆酋自僻徑竄入金川擒其父澤旺解京仍𫝊檄撫定汗牛大板昭等寨落小金川悉平而金川逆酋索諾木復敢黨惡拒命因移兵並討之既平䟎拉小金川畨語本名遂討促浸即金川畨語名雪多境險奏功以沈奏功以沈賊更遮郄緑營怯懦遇戰辟易攻勦浞浸之兵溫福由功噶爾拉阿桂由當噶爾拉分兩路並進功噶之前為卡撒了口賊築碉斷徑不能進遂别由昔嶺繞攻而碉堅地險兼多雨雪攻之半年雖屢得賊卡終未扼其要害緑旗兵既懦葸温福又不善調度以二萬餘人散布各卡防守遂以分而見單賊窺其罅隙於癸巳六月遣畨衆數百由間道潜出煽誘䟎拉降畨復叛董天弼庸懦失守為賊所戕賊益猖獗擾温福後路直侵大營緑營兵衆先潰將領戰􅒙者多温福率親兵與賊搏戰亦遇害䟎拉之地復失逆酋等罪大惡極愈不可寛矣兵既無能將亦失算豈如南路全師而返叶果阿桂在當噶軍律明而士心困賊不敢犯然木木有事之後當噶亦難獨駐遂飭勵兵衆由南路全師而歸重調勁旅吉林索倫健鋭火器其心忠純前已簡派八旗兵三千令赴川助勦為温福等奏止使木果木軍營有滿洲兵在彼則緑營得所依恃亦不致倉皇潰竄是其事仍由温福自誤幸阿桂一路軍氣甚整即授為定西將軍並選健鋭火器營兵三千吉林索倫黒龍江兵四千迅赴軍營重籌進勦仍分兩路堂堂正正不旬日間美諾重定癸巳冬將軍阿桂統兵由西路進攻其南路則令明亮為副將軍進勦兩路並進所向克㨗旬日之間即收復小金川全部谷噶既入馬尼去聲並克豢養旗兵允得其力阿桂等於甲午正月搶佔谷噶了口山梁明亮等亦於是時攻克馬尼兩路之兵皆因有八旗勁旅奮勇先登緑營觀感激勸皆效法恐後奏績甚速釃三路進一阻宜喜及彼絨布遇險而止副將軍豐昇額同舒常於宜喜駐兵與阿桂明亮共成三路第宜喜之兵攻勦半載未能寸進而明亮則由馬尼攻得木谿卡卡角及抵庚額特亦阻險而未能進遂駐絨布寨阿桂西路則屢建功羅博淜普逮遜克宗甲午三月阿桂攻克羅博瓦山梁六月攻克色淜普此諸寨並峰峻碉堅賊衆悉力死守官軍皆涉險鋭攻殱醜甚衆遂臨遜克爾宗喇穆山梁日則了口舉黙格爾以擾其後我兵攻克色淜普後賊衆防守並力阿桂偵知喇穆喇穆迤西峯崖陡削賊備禦稍疎因分兵超越進攻盡據其碉並攻克日則了口亦六月中事其後兵進稍阻至十月初復繞道攻得黙格爾山梁其榮噶爾博日爾八當噶之賊皆截於後明亮宜喜亦據嶺梁而復難進徒然望洋宜喜為賊要隘守禦極嚴豐昇額舒常攻之一年未下繼而命豐昇額改赴西路舒常在彼更不能進甲午夏因明亮在絨布屢攻未進不宜頓兵於無用之地令其分兵七千移攻正地明亮遣偵卒徃探不見賊蹤難以輕進亦赴西路協勦阿桂扎止之㑹綽斯甲布土司懇明亮駐宜喜并願效前驅明亮乃出其不意分兵冒兩直進遂據宜喜山梁並攻得俄坡格勒古賊因掘濠斷路明亮等復為所阻矣逮昨乙未畧康薩爾木斯工噶賊碉並毁阿桂自攻得黙格爾欲乗勝直進賊復於康薩爾山梁抗拒兩月餘乙未正月阿桂派兵分路前進拔其鹿角連越重濠躍上碉頂遂毁其碉殱賊甚衆四月復攻得木思工噶克了口從此下壓勢益甚矣明亮河西亦有所據日旁以前五十里路明亮因逹爾圖之路為賊所斷商之阿桂謂當仍由宜喜一路進攻並派西路兵一千令福康安帯徃攻克甲索碉卡海蘭察亦徃㑹攻合力并撃先克撒撤谷其日旁右之沙壩山並逹爾圖得楞及溝内之斯年木咱爾各賊皆紛紛棄碉遁周圍五十餘里寨落悉行焚燒夾河兩軍聲息可通並清後路遜克爾宗五月中明亮攻克額爾替碉卡可下至平坡六月間復攻克石真噶寨阿桂派兵沿河從赤爾寨攻打隔河之沙爾尼一帯兩岸夾擊聲息可通适阿桂攻得噶爾丹喇嘛寺等處居髙得勢以遜克爾宗在我兵之後留之非計遂派兵三路分進豐昇額督率攻勦或斫寨而入或梯墻而進遂得其碉殺賊無算後路益肅清矣菑則大海昆色拉枯層層破要步步披嶇阿桂以昆色爾喇嘛寺在拉枯喇嘛寺之上於此路尤為扼要其菑則大海亦當並勦分派將領統兵同徃其昆色爾山梁最險官兵皆蟻附上攻佔其碉寨復縱火焚燒拉枯喇嘛寺又攻得菑則大海官兵無不超越而登飛騰而入遂克勒圍紅旗飛遞而何四月大㨗未至既克西里乃若建瓴科布曲索隆古不日而傾阿桂於八月十五夜攻克勒烏圍其附近碉卡木城六十餘處一夕無不推破八日而紅旗遞至木蘭詳見聞㨗凱歌及誌事詩自奏㨗後四月雖時有克獲未能罙入直至十一月初攻克西里軍聲愈壯而賊勢愈蹙尋即攻得科布曲索隆古山梁並克格隆古兠窩等要隘又掃清安布魯木一帯監據建瓴之勢矣雍中舍齊易如拉朽密圍噶喇依賊其奚走阿桂既由索隆古進攻朗阿古則朗噶克了口等處皆克之並據噶古山梁十二月十七日遂由瑪爾古當噶一帯寨落悉行掃蕩並克舍濟喇嘛寺次日復攻克雍中喇嘛寺即於十九日統兵直擣噶喇依四面圍攻水陸俱斷促浸番衆自攻克勒烏圍以來大小男婦紛紛投出其大頭人布籠普阿納木達什阿庫魯等遂皆相率乞降並索諾木之母阿倉姑阿青及其姊妹亦皆投至軍營僉云索諾木莎羅奔兄弟并作惡之大頭人丹巴爾雜爾等皆在圍中此盖逆酋賊黨等也罪孽深重天奪其魄驅之一處以就擒時是河西明亮亦入富徳馬邦𫝊檄芥拾明亮既克阿爾古等寨克取獨古木開通乃當山梁並擣甲雜掃獨松河西一帯悉行勦洗遇河㑹阿桂合攻賊巢富徳亦将河南北之噶咱普庚額特曽達等各寨落全行掃清直據馬爾邦亦遣兵與阿桂㑹富徳所得之地俱不煩兵力易如拾芥設非西路圍噶喇依則其兩路亦無進期明亮富徳兩路向皆難於攻取而富徳久駐絨布尤未能寸進自阿桂既克索隆古乗勝席捲已圍噶喇依各處之賊皆膽破心散望風潰降非果由力戰而得若非西路官兵直擣賊巢則明亮富徳兩路仍未有進取之期也諸軍既合火攻周遭雖據三穴訖其奚逃然猶死守四十餘日計窮力竭乞命而出官兵四面合圍賊猶負嵎力抗繼用大礟環轟摧其碉卡將士等乗勢克取旁近寨落層層進逼殱賊日多逆酋惶懼遣其兄岡逹克彭楚克次第詣營並即拘繋於是攻圍益急據其近碉斷其水道索諾木窘迫無計遂於二月初四日早率其兄弟莎羅奔甲爾瓦沃雜爾斯丹巴并兩土婦及黨惡大頭人丹巴沃雜爾阿木魯綽窩斯甲尼瑪噶喇克巴並兩喇嘛挈大小頭目男婦二千餘人出寨逆酋跪捧印信乞免誅戮因即悉就擒獲俘獻京師自圍勦以來計四十餘日至是全境蕩平罪人斯得紅旗於二月十二日馳至桃花寺行宫適當告功東陵之期此實仰賴功將士皇祖黙佑益深感敬隨諭將軍阿桂等統成擇日凱旋俟東巡回蹕至黄新莊舉行郊勞大典以昭偃武䇿勲之盛金川之功阿桂居首特恩異數加之宜厚征勦金川之役實由將軍阿桂藎誠體國不憚艱勞制勝運籌克成偉績實為此事首功特封為頭等誠謀英勇公加賞雙眼孔雀翎紅寳石㡌頂四團龍補褂金黄𢃄紫轡以昭崇奨能出能入有權有經運長撃短後實先聲金川之功允資羣力寸步層峯氷滑石仄將軍指揮無不奮勇以此破敵鹿埵隴種金川之功非予所期事弗可已久而得之鬭猶獸困捨懲雞肋念我衆勞至今心惻金川之功允賴上蒼靖彼蕃徼我武維揚勒碑太學用遵成例静言思之文以誌愧四十二年禮部議各館謄録人員如係肄業外班於依限寫書之外仍可自理本業無庸扣除五月孝聖憲皇后升祔太廟恩詔國子監貢監生及各官學敎習俱免坐監期一月是年廷試八旗各直省選拔貢生將一二等帯領引見以知縣試用者十五人以部員用者九人餘交部以敎職佐貳用嗣經吏部言拔貢以部員用者向無成案請照雍正八年湖北拔貢楊可鏡之例在七品小京官上學習行走得㫖允行四十四年多羅質郡王等奏四庫全書處貝字謄録内有前由寄籍順天入學旋經遵例改歸該省原籍併有由召試二等在館行走各生以在館謄録不能回原籍應試俱呈請就近在順天鄉試各取具同鄉京官印結按照省分歸於南北中皿字號照例由本館咨送國子監一體録科應順天鄉試從之四十五年皇上七旬萬夀恩詔一歴代帝王陵寢先師孔子闕里應遣官致祭一國子監貢監生及各官學教習免坐監期一月一各省儒學以正貢作恩貢以次貢作嵗貢臣等謹按辟雍之名昉於大雅王制宋横渠張子謂商以前本未有辟雍頖宫之名文王建侯國之學命曰辟雍亦猶謂其臺曰靈臺謂其沼曰靈沼耳厥後治定制禮遂以為天子之制其說最優漢書稱武帝欲治明堂濟南人公玉帯上黄帝時明堂圖於是作於汶水上後漢書載建武中初營明堂辟雍靈臺故東京賦曰左制辟雍右立靈臺薛綜注謂於之班教曰明堂大合樂射饗者曰辟雍記候節氣者曰靈臺蔡邕又謂取其堂則曰明堂取其四門之學則曰太學取其四面周環水圓如璧則曰辟雍異名而同事其實一也毛萇詩𫝊曰水旋邱如璧曰辟雍以節觀者白虎通曰辟雍者所以行禮樂宣徳化也我皇上御字五十年法祖敬天登皇纂聖凡所以覺世牖民者固已隆風猷於至粹矣乃復參稽周制酌古準今特命新建辟雍於太學彝倫堂之南乙巳嵗仲春吉日親詣文廟釋奠禮成臨雍講學爰開經筵闡宣御論大小臣工祇聆聖訓諸生觀禮環集橋門文教覃敷殊恩特沛矞皇盛典洵千載一時也謹臚其制度規模於左至臨雍典禮儀節别詳載視學門焉辟雍殿一座四靣各顯三間内明間靣濶二丈一尺次間各面濶一丈六尺外週圍廊深六尺八寸柱髙一丈六尺徑一尺八寸擎簷廊深四尺三寸四脊攢尖安銅寳頂重簷成造琉璃牌樓一座面濶五丈五尺高三丈五尺五寸進深六尺六寸碑亭二座各方二丈柱高一丈四尺五寸石碑二統各髙一丈六尺五寸鐘鼓􅈦二座各方一丈四尺柱高一丈圓河一座裏口徑過十九丈二尺深一丈橋四座各長四丈寛二丈二尺丹陛二道長二十一丈九尺寛二丈二尺皇上親詣文廟釋奠禮成諭稽古國學之制天子曰辟雍所以行禮樂宣徳化昭文明而流教澤典至鉅也朕此次釋奠禮成念國學為人文薈萃之地規制宜隆而辟雍之立自元明以來典尚闕如自應増建以彰美備著派禮部尚書徳保工部尚書兼國子監劉墉侍郎徳成敬謹前徃閲視度地鳩工諏吉興建落成之日朕將行臨雍典禮以昭久道化成之盛嗣經尚書徳保等相度地勢定於彛倫堂南營建繪圖進呈上諭徳保等將辟雍圖式呈進自應仿照禮經舊制度地營建即著徳保劉墉徳成總司其事敬謹承辦以光盛典嗣於四十八年九月初五日興工四十九年諭稽古明倫設教典重學官國學為首善之區橋門觀聴規制尤宜隆備前命尚書劉墉徳保金簡侍郎徳成鳩工庀材興建辟雍現在已届落成朕於明年仲春釋奠禮成即臨雍講學所有應行典禮著該衙門詳議具奏欽派大學士伯伍彌泰大學士兼管國子監事務蔡新祭酒覺羅吉善鄒奕孝充臨雍進講官諭太學門集賢門匾額及繩愆􅆹博士􅆹六堂等處横額俱換􅆆額添寫清文五十年正月詔曰朕膺圖建極熙績撫辰恭荷上蒼篤祐列聖貽謨遐邇乂安版圖式廓夙夜兢業弗敢康寧仰惟皇祖聖祖仁皇帝化成久道仁義漸摩皇考世宗憲皇帝累洽重熙涵濡休養朕祗承世徳敬迓鴻釐於今五十年夀逾古稀康强勤政稽三代以上帝王御宇紀登久祚者代不數覯洎漢而後史冊更尠聞焉方今昊穹申命繁禧茂祉集於朕躬五世元孫一堂衍慶緝熙純嘏之庥浹於海宇凡兹中外臣民咸登仁夀際斯熙㑹洵千載一時爰循祖典於上春六日懋舉耆筵龎眉鳩杖集於闕廷者三千叟二月上丁恭行釋奠迺臨新建辟雍引年講學用以導揚明和式昭觀聴上儀既舉丕烈用光我國家億萬斯年之福申錫無疆惟爾海内羣黎向化喁喁瞻依彌摯前者朕七旬萬夀曽普頒恩詔闓澤覃敷今御極五十年嘉慶疊臻兆民允頼是宜特沛殊恩下孚輿望用稱朕敬天法祖加恵黎元之至意一先師孔子闕里遣官致祭一滿漢大臣命婦年過六十者俱加恩賜一軍民年七十以上者許一丁侍養免其雜派差役八十以上者給與絹一疋棉一觔米一石肉十觔九十以上者倍之百嵗者題明旌表並加賞大縀一疋銀十兩一各省儒學以正貢作恩貢次貢作嵗貢一國子監監生及各官學教習免其坐監期一月又諭朕此次釋奠禮成臨雍講學圜橋觀聴文教覃敷實為矞皇盛典且自冬春以來雨雪尚未霑足朕心焦切兹當俎豆馨聞恰值春膏霑霈深為欣慶第念隨從執事諸臣及觀禮多士衣履沾濕允宜廣錫恩賜所有執事扈從之王公大臣衍聖公並文武官員俱著紀録一次其觀禮諸生及至聖各裔並如恩分别賞賚御製國學新建辟雍圜水工成碑記名者實之賓實者名之主為學之方應務其實以蘄循其名不可炫其名以致亡其實興學之源綦要於國學國學者天子之學也天子之學曰辟雍諸侯之學曰泮水北京之國學自元歴明以至本朝盖五百餘年矣有國學而無辟雍名實或不相稱雖有建議請復以乏水而格部議至今未復癸卯春始有復建之諭甲辰冬乃觀新工之竣將於乙巳行釋奠禮遂臨雍以落成焉夫北京為天下都㑹教化所先也大典缺如非所以崇儒重道古與稽而今與居也雖乏水然有不改之井汲以綆而用之無窮亦在人為之而已於是石之鱗次見圜斯池水之鏡澄見明斯漪殿之據中見隆其榱橋之通行見接其基上庠下庠雖難考二典之制而東序西序總不出三代之規則是工之舉也又予知過論所謂於不可已者仍酌行之之意而物給價工給值原非勞民動衆之為若夫三老五更之説予以為括於養老化俗之儀而非天子臨雍所必應並行而不遺者盖弗見於詩書乃特出於杜氏通典之私耳且予向有三老五更之説已明闢其謬兹不復綴乎詞雖然予更有懼於是舉者夫是舉豈非復古興學之懿有何懼而予懼之者恐後之人執予復古之説於一切衣冠典禮皆效漢人之制則予為得罪祖宗之人匪教伊虐甚屬不宜也予之子孫體予此心於可復古者復之其不可復古者斷不可泥古而復之夫徒慕復古之虛名而致有忘祖宗之實失非下愚而何予不為也予敬以是告子孫以保我皇清萬年之基也御製上丁釋奠後臨新建辟雍講學近體詩四首國學由來教化先北京建五百餘年空𫝊中統廟修矣案元史稱太祖平燕京以金樞密院為宣聖廟又世祖紀中統三年修宣聖廟此皆言南城國子監盖元太祖初定燕京時所建也至選舉志稱至元二十四年遷都北城立國子監學於國城之束又世紀二十四年閏二月設國子監乃今城東國子監之權與也是以己丑年御製重修文廟碑記云國學始於元太祖置宣聖廟於燕京乃指燕京初設國子學時而言兹城東之文廟國子監則世祖至元二十四年遷都北城所立而非中統所修矣向來記載重叠毎自相牴牾因為訂正明晰附記於此獨惜辟雍宫闕然酌古準今圖以創穿池引井璧成圓崇儒重道心雖亹懼亦在兹記語宣古制天子之學曰辟雍諸侯之學曰泮宫北京國學自元歴明以至本朝五百餘年有國學而無辟雍名實不稱雖有建議請復以乏水而格部議昨癸卯春始命酌古準今穿池引新建圍水復親製碑文以復古而不可泥古諄切誥誡詳見辟雍碑記文放勲巍蕩未言學教胄命䕫始有虞夏序殷宗因遞述文豐武鎬豈相殊橋圜莫作徒觀者廷獻應為有用儒却憶永平稱億萬後漢紀稱明帝永平二年上始率羣臣恭養三老五更於辟雍饗射禮畢帝正坐自講諸生執經問難於前冠帯搢紳之人圜橋門而觀聼者盖億萬計云云所記未免失實臨雍盛典觀聼雖多然搢紳冠帶何至億萬人之多且圜橋之間豈能容而人多擁擠亦必觀聴不及史𫝊之誣徃徃類是雖云善善却鄰誣三五昔經著説詳謂他杜撰失荒唐三老五更之説不見詩書惟禮記出漢儒非孔子之言古𫝊始有三老凍餒之文註疏者紛紛不一而蔡邕獨斷遂有父事兄事之説白虎通直以為老更各一人且曰父一而已不宜有三其謬更甚杜佑通典亦宗其説真成杜撰矣向嘗著説闢之詳見三老五更説今命刻於辟雍碑隂祗宜養老示恩渥難並臨雍贊禮煌韓愈不甘弟子列蔡新或備伯兄行韓愈答呂毉山人書謂世無孔子不當在弟子之列其見甚高其語甚正若今之羣臣孰可當老更之席者獨大學士蔡新長於予四嵗或可居兄事之列然恐其局趨弗敢當舉王導對晉元帝之語耳慮其驚懼謝無當去聲王導稱曽喻太陽晉書王導𫝊率登尊號百官陪列命導升御床導固辭曰若太陽下同萬物蒼生何能仰照帝乃止祭毋欲數上丁逢釋奠禮成臨辟雍舉事率因待時節北京國子監自元迄今五百餘年而臨雍國水之制未備癸卯春始命興建甲辰冬工竣此誠舉大事者亦必有時節之待也崇儒寧渠去聲在儀容五倫知止須勤朂一已自强切戒慵是日講章題大學為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信易經天行健君子以自强不息文質彬彬衆和樂重熙茂對誌兹恭又諭朕此次釋奠禮成臨雍講學諸生觀禮環集橋門允宜廣錫恩施以昭盛典著於乾隆五十一年丙午科順天鄉試皿字號巻内廣額十五名用示嘉恵膠庠鼓勵人材之至意又湖南學政錢灃奏請隨棚投考出貢不得過一年以外從之又定湖南陽清二縣遇拔貢年於二縣共拔一人皇朝文獻通考巻六十八
