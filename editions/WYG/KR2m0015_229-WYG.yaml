body:
  text: 欽定四庫全書皇朝文獻通考巻二百二十九經籍考十九子天文醫家推算五行占筮形法兵家臣等謹按天學至後世而益精自利瑪竇入中國始倡㡬何之學制器作圖愈推愈密我聖祖仁皇帝造化在心璣衡齊政御定厯象考成諸書研闡精微示萬世修明之法皇上復親涖靈臺徧觀儀制欽定儀象考成等編酌古準今昭垂無極臣下如梅文鼎輩各抒妙悟具有成書言天之學洵無過於昭代矣考天文推算馬氏析而為二然善言天者必有驗於人故陳象緯之文率兼推步今從其例畧為分輯凡兼言測量之法者胥𨽻天文明所統也至陰陽一門今已無書亦従其闕仍以五行占筮形法列於後云御制儀象考成三十二卷乾隆九年和碩莊親王允禄大學士鄂爾泰等奉敕撰皇上御製序曰上古占天之事詳於虞典書稱在璿璣玉衡以齊七政後世渾天諸儀所為權輿也厯代以來遞推迭究益就精宻所傳六合三辰四㳺儀之制本朝初年猶用之我皇祖聖祖仁皇帝奉若天道研極理數嘗用監臣南懐仁言改造六儀輯靈臺儀象志所司奉以測騐其用法簡當如定周天度數為三百六十周日刻數為九十有六分黄赤道以偹儀制减地平環以清儀象創制精宻尤有非前代所及者顧星辰循黄道行每七十年差一度黄赤二道之相距亦數十年差一分所當隨時釐訂以期脗合而六儀之改創也占候雖精體制究未協於古赤道一儀又無逰環以應合天度志載星象亦間有漏畧躐次者我皇祖精明歩天定時之道使用六儀度至今必早有以隨時更正矣予小子法祖敬天雖切於𠂻而推測協紀之方實未夙習兹因監臣之請按六儀新法㕘渾儀舊式製為璣衡撫辰儀繪圖著説以禆測候并考天官家諸星紀數之闕者補之序之紊者正之勒為一書名曰儀象考成縱予斯之未信期允當之可循由是儀器正天象著而推算之法大備夫制器尚象以前民用莫不當求其至精至密矧其為授時所本熙績所闗尤不容有杪忽差者折𠂻損益彰往察來以要諸盡善奉時修紀之道敢弗慎諸至乃基命宥宻所為夙夜孜孜監於成憲者又自有在是為序臣等謹按尚書在璿璣玉衡以齊七政馬融諸人註皆以為渾儀葢自軒昊以来羲和所掌以之則天象而立人紀者莫大於是唐宋而後新製屢更而所謂六合儀三辰儀四㳺儀者亘古不變元郭守敬析之為簡仰二儀頗稱精當我聖祖仁皇帝命監臣南懐仁新製赤道黄道二儀及地平象限紀限天體四儀與黄赤相錯綜者共為六儀又命製地平經緯儀合地平象限二儀為一其法尤密皇上以渾天之制為最古改製璣衡撫辰儀酌古今以通其變損益得中斟酌盡善爰勒為是編以御製璣衡撫辰儀説冠諸卷首焉天文大成管窺輯要八十卷黄鼎撰鼎字玉耳六安人明末以諸生從軍積功至總兵官入國朝官至提督中星譜無卷數胡亶撰亶號勵齋仁和人靈臺儀象志十六卷南懐仁撰懐仁西洋人官至欽天監治理加工部右侍郎銜諡勤敏臣等謹按康熙十三年懐仁製新儀六曰黄道經緯儀曰赤道經緯儀曰地平經儀曰象限儀曰紀限儀曰天體儀並撰説四卷表十卷圖二卷書成恭進並請刋布肄習得㫖允行天經或問前集一卷天經或問後集無卷數游藝撰藝字子六建寧人天歩真原一卷天學㑹通一卷薛鳯祚撰鳯祚見經類梅文鼎䟦曰鳯祚以西法六十分通為百分從授時之法實為便用惟仍以對數立算不如直用乗除為正法惜所證正之處未獲與之相質云臣等謹按天歩真原鳯祚所譯西洋穆尼閣法也天學㑹通所言皆推算交食之法葢用表算之例殊為簡㨗精宻璇璣遺述七卷掲暄撰暄字子宣江西廣昌人梅文鼎序曰暄深明西術又别有悟入其謂七政小輪皆出自然亦如盤水之運旋而周遭以行疾而生旋渦遂成留逆一條為古今之所未發中西經星同異考一卷梅文鼏撰文鼏字爾表宣城人文鼏兄文鼎序曰歳戊辰歸自武林武林人張慎碩忱能製西器鼎乃依歳差考定平儀所用大星屬碩忱施之渾蓋而屬弟鼏作恒星黄赤二新圖因詳核星之經緯知楊氏厯書圖表與南懷仁儀象志星名夲同而數有多寡異於古人者别識之以成此書至其所為辨正經緯之度者尚存别卷又曰西厯黄道十二象與中土異而回回厯與歐邏巴復自不同故雙女或以為室女陰陽或以為雙兄至黄道内外之星或以為六十象或以為六十二象而貫索星回回厯以為缺椀歐邏巴以為冕旒其餘亦多互異且西厯言恒星有經度東行歳差而緯度終古如一然又言二至距緯古逺今近是黄極且有微移既言恒星之形畧無改易然又言王良之側有萬厯癸酉年新出之星竊嘗譬之地志陵谷豈無小異而嶽瀆大致自如然其名之所起亦人實為之而已矣萬青樓圖編十六卷邵昂霄撰昂霄字子政餘姚人㧞貢生乾隆元年薦舉博學鴻詞右天文御定厯象考成四十二卷康熙五十二年聖祖仁皇帝御定世宗憲皇帝御製序曰粤稽前古堯有羲和之咨舜有后䕫之命周有商髙之訪逮及厯代史書莫不志律厯偹數度用以敬天授民格神和人行於邦國而周於鄉閭典至重也我皇考聖祖仁皇帝生知好學天縱多能萬㡬之暇留心律厯算法積數十年博考繁賾搜抉奥微恭伍錯綜一以貫之爰指授莊親王等率同詞臣於大内蒙養齋編纂每日進呈親加改正彚輯成書總一百卷名為律厯淵源凡為三部區其編次一曰厯象考成其編有二上編曰揆天察紀論本體之象以明理也下編曰明時正度宻致用之術列立成之表以著法也一曰律吕正義其編有三上編曰正律審音所以定尺考度求律本也下編曰和聲定樂所以因律製器審八音也續編曰協均度曲所以窮五聲二變相和相應之源也一曰數理精藴其編有二上編曰立綱明體所以解周髀探河洛闡㡬何明比例下編曰分條致用以線靣體括九章極於借衰割圜求體變化於比例規比例數借根方諸法葢表數偹矣洪惟我國家聲靈逺届文軌大同自極西歐羅巴諸國専精世業各獻其技於閶闔之下典籍圖表燦然畢具我皇考兼綜而裁定之故凡古法之歳乆失傳擇焉而不精與西洋之侏􅍣詰屈語焉而不詳者咸皆條理精明本末昭晰其精當詳悉雖専門名家莫能窺萬一所謂惟聖者能之豈不信歟夫理與數合符而不離得其數則理不外焉此圖書所以開易範之先也以線體例絲管之别以弧角求經緯之度若此類者皆數法之精而律厯之要斯在故三書相為表裏齊七政正五音而必通乎九章之義所由試之而不忒用之而有效也書成纂修諸臣請序而傳之恭惟聖學高深豈易鑽仰顧朕夙承庭訓於此書之大指微義提命殷勤歳月斯乆尊其所聞敬效一詞之贊葢是書也豈惟皇考手澤之存實稽古準今集其大成高出前代垂千萬世不易之法将欲協時正日同律度量衡求之是書則可以建天地而不悖俟聖人而不惑矣臣等謹按是編合律吕正義數理精藴二編凡三部本為一書初名律厯淵源此即其第一部也天文推步之術由疎而漸宻然西洋算術本於周髀特中土失其傳而西人能推闡其説我國朝聲教覃敷㤗西諸國累譯而至厯算之術測闡彌詳聖祖仁皇帝以精一之心執大中之矩特命諸臣詳加考證釐定此書上編曰揆天察紀下編曰明時正度集中西之法而歸於一致推衍精宻累黍無差殊非管蠡之見所能窺測也御製數理精藴五十三卷臣等謹按是編為康熙五十二年聖祖仁皇帝御定律厯淵源之第三部於中西兩法融㑹貫通權衡歸一上五卷曰數理本源曰河圖曰洛書曰周髀經解曰㡬何原本曰算法原本則其立綱明體者也下四十卷曰首部曰選部曰面部曰體部曰末部則其分條致用者也又八卷曰八線表曰對數闡微表曰對數表曰八線對數表則其經緯異同辨訂今古者也至本法所不能求者一一疏通證明之俾學者了然心目實為從古未有之書大聖人所以妙契天元精研化本者胥不外乎是矣御製厯象考成後編十卷乾隆二年皇上御定臣等謹按測騐之學積乆而彌精自西史第谷以來其法盛行我聖祖仁皇帝創厯象考成上下二編闡發精微洞徹理數固已貫通中西之法以歸於大同垂諸萬世矣西洋噶西尼發蘭徳等即將第谷未盡之藴更為推衍窮極纎微其大端有三一曰太陽地半徑差一曰清䝉氣差一曰日月五星之本天騐之經緯尤為宻合是以世宗憲皇帝特命修日躔月離二表續於厯象考成之後然未加詳説亦未及推算之法我皇上纘承前緒夙夜勤求復増修表解圖説凡新法與舊法不同之處疏剔精鑿而古法新製脗合無殊仰見聖學之高深而心源之符合也已曉菴新法六卷王錫闡撰錫闡字寅旭號曉菴又號天同一生吳江人錫闡自序曰炎帝八節厯之始也而其書不傳太初三統法雖疎逺而創始之功不可冺也劉洪姜岌次第闡明何祖専力表圭益稱精切自是南北厯家率能好學深思多所推論皆非淺近所及唐厯大衍稍親然開元甲子當食不食一行乃為諛詞以自解何如因差以求合乎至宋而厯分兩途有儒家之厯有厯家之厯儒者不知厯數而援虚理以立説術士不知厯理而為定法以騐天天經地緯躔離違合之原槩未有得也明初元統造大統厯因郭守敬遺法增損不及百一及西人利氏來歸頗工厯算崇禎初命禮臣徐光啟譯其書數年而成遂盛行於世今兼採中西去其疵纇㕘以臆見著厯法六篇㑹通若干事考正若干事表明若干事増葺若干事立法若干事舊法雖舛而未可遽廢者兩存之理雖可知而非上下千年不得其數者闕之雖得其數而逺引古測未經目信者别見補遺而正文仍襲其故非敢妄云窺其堂奥也梅文鼎序曰從來言交食只食甚分數未及其邊惟王寅旭則以日月圓體分為三百六十度而論其食甚時所虧之邊凡㡬何度今為推演其法頗為精確又曰近代厯學以呉江為最識解在青州薛鳯祚之上㡬何論約七卷數學鑰六卷杜知耕撰知耕字臨甫號伯瞿柘城人梅文鼎序曰近代作者如李長茂算海詳説亦有發明然不能具九章惟方位伯數度衍於九章之外蒐羅甚富杜端伯數學鑰圖註九章頗中肯綮可為算家程式數度衍二十四卷方中通撰中通字位伯桐城人明檢討以智之子中通弟中履序曰九算之名始出周禮註稱九章則見於鄭康成傳章懐云九章周公所作凡九篇藝經又云周公作捐悶今皆不傳惟周髀積矩三圗而已自鄭元嵩真曹元理輩皆善算而未嘗著書張衡許商等皆有著書而亡者又衆近惟泰西諸書行於世古法用竹徑一分長六寸二百七十一枚而成六觚為一握今則用珠算泰西則用筆算又有籌算尺算其法不一其理則同葢勾股出於河圖加减乘除出於洛書此數度衍之所以作也凡例曰西學精矣中土失傳耳今以西學歸九章以九章歸周髀周髀獨言勾股而九章皆勾股所生故以勾股為首少廣次之方田次之商功次之差分次之均輸次之盈朒次之方程次之粟布次之九章取用無踰加减乘除四法四法偹於四算故以珠筆籌尺之法衍於九章之前數盡於九章矣然有不可屬於某章之下者故曰外法於九章之後衍之又云勾股出於河圖加减乗除出於洛書知一切不外河洛也故首言其原黄鍾為數之始故次律衍線靣體之理盡於㡬何故約之厯算全書六十卷大統書志十七卷勿菴厯算書記一卷梅文鼎撰文鼎字定九宣城人康熙四十一年大學士李光地嘗以其所著厯學進呈㑹聖祖仁皇帝南巡於徳州召見御書積學㕘微四字賜之後奉詔修樂律厯算等書文鼎自序曰萬厯中利氏入中國始倡㡬何之學以㸃線靣體為測量之資制器作圖頗為精宻然其書率資繙譯篇目既多徑紆瀾濶讀者每難卒業又奉耶蘇為教與士大夫聞見齟齬學其學者又張皇過甚輙以世傳淺術為古九章盡此於是薄古法為不足為而或株守舊聞遽斥西儒為異學兩家之説遂成隔碍此亦學者之過也竊以學問之道求其通而已己之所不能通而人則通之又何間於今古何别乎中西因彚其書而説之臣等謹按文鼎厯算全書乃魏荔彤屬楊作枚所校刋首曰厯學疑問即聖祖仁皇帝親為㸃定者其他著述極為繁富衍九章之未備著今法之靣形論中西形體之變化釋弧矢勾股八線之比例葢中西法至難貫通文鼎原原本本洞究精微實為數家之總滙大統書志因明初大統術詳為推衍分為法原立成推步三部法原凡七目立成凡四目推歩凡六目辨論詳明有條有理厯算書記各疏其論撰之意於中西諸法一一得其要領自郭守敬徐光啟以來無有出其右者矣秦氏七政全書無卷數秦文淵撰文淵爵里未詳勾股引䝉五卷勾股述二卷陳訏撰訏字言揚海寧人由貢生官淳安縣教諭隠山鄙事四卷李子金撰子金號隠山柘城人勾股矩測解原二卷黄百家撰百家見儒家類臣等謹按勾股測量昉於絜矩其術至精其用至廣測高則用立矩測深則用覆矩測逺則用偃矩顧方可測圓不可測於是割圓之法立平可測險不可測於是重差之術生周髀開方之圖劉徽海島之算傳者寥寥不絶如綫自本朝三角形測量法立較勾股至為徑㨗簡易功用懸殊要之儀表相輔而行勾股之法實不可廢百家是書雖不過摭陳古法而測量之學頗足以資考證焉少廣補遺一卷陳世仁撰世仁海寧人康熙乙未進士臣等謹按少廣之術所賅不一是編専取少廣中堆垜一條因其僅具邊數層數求積數法未具以積數求邊數層數法且算家鮮通其故乃以一靣尖堆及方底三角底六角底尖堆各半堆等題分為十二法復有抽竒抽偶諸目反覆推求以補少廣所未偹實為有禆算學惜其圖説未之及焉厯算叢書六十二卷梅㲄成重定其祖文鼎之書㲄成宣城人康熙乙未進士官至左都御史莊氏算學八卷莊亨陽撰亨陽字元仲南靖人康熙戊戍進士官至淮徐海道九章録要十二卷屠文漪撰文漪字蒓洲松江人圍徑真㫖無卷數顧長發撰長發字君源江蘇人全史日至源流三十三卷許伯政撰伯政見經類算學八卷續一卷江永撰永見經類八線測表圖説一卷余熙撰熙字晉齋桐城人右推算御定星厯考原六卷康熙五十二年聖祖仁皇帝御定臣等謹按古者重黎世職羲和命官所以順天行而成人事也後世陰陽之術頗沿其流方技之家遂滋其説葢荒誕無稽者往往而有矣是書簡汰諸説之紛繁而括其綱要凡分六目一曰象數本要二曰年神方位三曰月事吉神四曰月事凶神五曰日時總類六曰用事宜忌毎一目為一卷俾趨吉避凶者瞭如指掌大聖人所為敬承天道而不拘於小數不牽於禁忌者宜萬世奉行而勿替也已欽定協紀辨方書三十六卷乾隆六年和碩莊親王允禄刑部侍郎張照等奉敕撰皇上御製序曰粤昔帝堯命羲和敬授人時厥民知析因夷隩之節後聖有作推而彌廣至於外事用剛日内事用柔日此皆載之經典百王不易者也厥後濫觴日以訛謬術士以吉凶禍福之説震驚朕師不可方物如褚少孫補史記所稱彼家云吉此家云凶彼家云小吉此家云大凶茫乎不知其畔岸漢武以來已如聚訟而荀悦王充輩斥為理之所無棄而勿論者也雖然天以日月行四時人奉天而時若嚮明而治嚮晦而息后王君公所以奉若天道也日出而作日入而息羣黎百姓所以奉若天道也否則不能晨夜不夙則暮詩人譏焉人人所知也然則舉大事動大衆協乎五紀辨乎五方以順天地之性豈無寸分節解以推極其至精至微之理者歟其支離蒙昧拘牽謬悠之説乃術士之過而非可因噎而廢食者也欽天監舊有選擇通書刻於康熙二十二年其書成於星官之手因訛襲謬見之施行往往舉矛刺盾皇祖聖祖仁皇帝知其荒率不可以訓曽纂為星厯考原一書刋刻頒行而未将監本改正葢以待夫後人聖人之心慎而又慎如此也以喻監臣監臣曰通書之謬允宜改正朕因其請謂及今猶有莊親王等數人曽經皇祖指授稍明此理使此時不加訂正恐後此益復無可任使爰命編輯成書頒布天下較之舊本謬説少除然俗所乆沿則亦不能盡去便民用也命名曰協紀辨方書夫協紀辨方者敬天之紀敬地之方也一作止一語默天地實式臨之况其大乎如曰如是則吉如是則凶如是則福如是則禍則明者所弗道也雖然敬不敬之間吉凶禍福隨之矣是為序臣等謹按舊本選擇通書羣疑滋甚皇上特命諸臣詳加駁正定為斯編凡本原二卷義例六卷立成宜忌用事各一卷公規二卷年表六卷月表十二卷日表一卷利用二卷附録辨訛各一卷凡五行之生克神煞之吉凶一一繪圖立説以識趨避之端舉術家之傅㑹不經繁碎拘礙者悉破除之仰見聖人利用前民無不本乎至正大中之義有如是之深切著明者耳禽遁七元成局書十四卷汪漢謀編陳錕校録漢謀錕里籍俱未詳臣等謹按是書用翻禽倒将之法世頗稱之然與池本理所論以翻覆為翻禽倒轉為倒将不能盡合葢猶未離乎俗説也陳子性蔵書十二卷陳應選撰應選字子性廣州人康熙中諸生右五行易冒十卷程良玉撰良玉字元如歙縣人良玉自序曰用爻隨大隨細可求吉凶良玉向成筮類五十篇内設三百七十有七問適楚遇枯匏老人授以闡易之書數十種立法四十一篇計九十一章列成卦成爻之由立世立應之法葢易者象也告於蓍則以蓍占告於五行則以五行占告於焦氏則以焦氏占可也其成卦成爻一也皇極數鈔四卷陶成撰成南城人康熙己丑進士官翰林院編修卜法詳考四卷胡煦撰煦見經類畫前易衍無巻數徐燦撰燦字朗亭號玉峯崑山人乾隆辛酉舉人臣等謹按燦取周子太極圖説衍為是編法用十六事為綱以十六事相錯得二百五十六毎事各為五兆合為一千二百八十兆古來言數者所未有也右占筮畫莢圖一卷撼龍經一卷孫光􅀢撰光􅀢字丹扶餘姚人順治辛夘副榜貢生官藁城縣知縣定穴立向開門放水墳宅便覽要訣四卷梅自實撰自實字有源宣城人山法全書十九卷葉泰撰泰字九升婺源人例畧曰山法流傳既乆其正形正象俱𦵏去無遺故曰有遺穴無遺龍若言遺龍惟竒形怪穴人所不能識人所不敢下者耳於今日而言山穴舍竒怪無從也尚書天地圖説六卷潘咸撰咸見經類臣等謹按是書多涉堪輿之説雖借尚書以立名實則支離蔓衍渺不相闗故附於形法之末右形法握機經解一卷王㬚撰㬚字始旦絳州人臣等謹按李衛公問對三卷本宋阮逸偽撰㬚乃據以定此書為太公之文多見其考古之疏耳孫子彚徴四卷鄭端撰端見儒家類武經體註大全㑹解七卷夏振翼撰振翼字遯闇蕪湖人兵鏡十一卷鄧廷羅撰廷羅字叔竒號偶樵江寧人順治中㧞貢生官至湖廣荆南道武偹志畧五卷傅禹撰禹字服水義烏人厯代車戰叙畧一卷張泰交撰泰交字洎谷陽城人康熙壬戍進士官至浙江巡撫練閲火器陣記一卷薛熙撰熙字孝穆蘇州人右兵家御定醫宗金鑑九十卷乾隆四年大學士伯鄂爾泰等奉敕撰臣等謹按醫雖小道而學必深於古用必酌乎時岐伯秦越人後精其業者不少槩見雖以宋代重醫而官撰局方或未能實禆於療治我皇上仁育萬民同登夀宇特為釐定此編凡訂正傷寒論註十七卷訂正金匱要畧註八卷刪補名醫方論八卷四脈要訣運氣要訣各一卷諸科心法要訣共五十一卷正骨心法要㫖四巻斟酌適中權衡允當洵乎拯濟生民之要術也已尚論篇八卷醫門法律六卷附寓意草一卷喻昌撰昌字嘉言南昌人選貢生臣等謹按是書有三百九十七法凡太陽經篇一百五十五法陽明經篇七十三法少陽經篇二十一法附合病九法併病五法壊病二法痰病三法太陽經全篇九法少陰經前篇後篇四十四法厥陰經全篇五十五法附過經不解病四法差後勞復病六法隂陽易病一法有自序以為引伸觸類究不敢於仲景論外溢一辭至醫門法律者治則著以法誤則罪以律也金匱要畧論註二十四卷徐彬撰彬字忠可嘉興人聖濟總録纂要二十六卷程林刪定宋政和中原本林字雲來休寧人臣等謹按宋徽宗御製聖濟經十卷又詔海内名醫纂輯二百卷林撮其大要汰其荒誕别擇具有條理足為岐黄家資考證焉證治大還四十巻陳治撰治字三農華亭人治自述曰余家五世業醫所著書有璜溪醫學解外臺秘典脈學驪珠各種皆斟酌盡善擇其近要者付之梨棗馬師津梁八卷馬元儀撰元儀蘇州人石室秘籙六卷陳士鐸撰士鐸字逺公山隂人李氏醫鑑十巻續補二卷李文來編文來字昌期婺源人臣等謹按此編全據休寧汪桓醫方集解本草偹要二書排纂而成末附桓所作三焦命門辨一篇頗稱簡要張氏醫通十六巻傷寒纘論二卷緒論二卷本經逢原四卷診宗三昩一卷張璐撰璐字路玉號石頑吳江人璐自序醫通曰是書初名醫歸未及刋行佚其目科痘疹二冊晩年命子以倬重輯目科治例以柔重輯痘疹心傳補成完帙改題此名又自序本經逢源曰瀕湖博洽今古尚爾舍本逐末僅以本經主治冠列於首以為存羊之意繆氏仲淳開鑿經義迥出諸家之上而於委曲難明之處則旁引别録等説疏作經言未免朱紫之混醫學彚纂指南八卷端木縉撰縉字儀標當塗人傷寒舌鑑一卷張登撰登字誕先吴江人臣等謹按以舌觀病之法始於漢張機傷寒論此編分胎色八種為圖一百二十視金鏡録觀舌心法等書繁簡尤為得中也傷寒兼證柝義一卷張倬撰倬字飛疇吳江人絳雪園古方選注三巻附得宜本草一卷王子接撰子接字晉三長洲人續名醫類案六十卷魏之琇撰之琇字玉横錢塘人臨證指南醫案十卷葉桂撰桂字天士吳縣人濟陰綱目十四卷武之望撰汪淇箋釋之望字叔卿自署闗中人淇字澹漪一字右子錢塘人保生碎事一卷汪淇撰釋骨一卷沈彤撰彤見經類彤自序曰此編為吴文球講明經穴而作醫學求真録總論五卷黄宫繡撰宫繡宜黄人素問懸解十三卷靈樞懸解九巻難經懸解二卷傷寒懸解十五卷傷寒説意十一卷金匱懸解二十二卷長沙藥解四卷四聖心源十卷四聖懸樞四卷素靈微藴四卷玉楸藥解四巻黄元御撰元御見經類神農夲草經百種録一卷蘭臺軌範八卷傷寒類方一卷醫學源流論二卷難經經釋二卷醫貫砭二卷徐大椿撰大椿字靈胎號洄溪吴江人臣等謹按大椿説醫猶毛竒齡説經論病如秦越人論方如孫思邈輩無不遭其詆排然其辨論實有切中肯綮之處固非庸醫所能知也成方切用十四卷傷寒分經十卷吴儀洛撰儀洛字遵程海鹽人得心録一卷李文淵撰文淵見經類文淵自述曰古方不能盡中後人之病後人不得盡泥古人之法故名曰得心録傷寒論條辨續註十二卷鄭重光撰重光字在辛歙縣人醫津筏一卷汪之蘭撰之蘭字含微歙縣人右醫家皇朝文獻通考巻二百二十九
