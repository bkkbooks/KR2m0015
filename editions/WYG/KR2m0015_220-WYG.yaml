body:
  text: 欽定四庫全書皇朝文獻通考卷二百二十經籍考十史起居注臣等謹按五朝續通考改馬氏起居注為詔令奏議良以寔録日厯等編宋代以下散佚無存其書既無可採登其目即不能仍舊因時通變理固宜然洪惟我國家肇興東土列聖相承五朝實録炳朗中天聖訓煌煌昭垂奕葉凡史局所尊藏記注所恭載豐功偉烈逺邁二典三謨之盛敬謹纂輯以符端臨通考舊例焉太祖髙皇帝實録十卷崇徳元年大學士剛林希福等恭修康熙二十一年大學士覺羅勒徳洪明珠奉敕重修雍正十二年大學士鄂爾泰張廷玉等奉㫖校訂皇上御製序曰粤稽自古帝王乗時建極膺天命而佑下民豐功駿烈垂諸史乗炳炳麟麟是以紀言紀事必詳且核焉况於聖人首出開物成務經緯天地奠麗河山智勇沈深謨猷訏逺布為法則著為章程將使後世子孫繼繼承承遵循罔軼詎不重歟洪惟太祖承天廣運聖徳神功肇紀立極仁孝睿武端毅欽安𢎞文定業高皇帝以聖神文武之姿受天眷命誕興東土爰總義旅遹求厥寧九國連兵相向一怒而討平之明人四路來攻亦尅日盡殱於境外師出有名光明俊偉威愛並立近服逺懐當是時羣部來歸英豪嚮附奮迹遼瀋之間而號令行於萬里帝業之興何其神也由是天人協應建國紀元修明庶政教育羣倫創國書分旗制申軍令定禮儀經營締造之際旰食宵衣不遑暇逸故乃綱舉目張傳之億萬年而不可易心法治法與二帝三王有同揆也太宗文皇帝繼天登阼命儒臣敬輯實録規模畧備聖祖仁皇帝復加蒐考修纂成書尊藏内府並貯史宬惟是山川疆土以及臣僚名氏前後間有異同清漢之文或簡或繁未經畫一我皇考世宗憲皇帝懼有舛訛特開史館重加校訂按日進呈親為閲定朕纘承丕緒仰體前徽用復潔誠披覽卷帙如舊繕録一新祇祇乎覘開國之鴻謨昭垂統之大業書曰監于先王成憲其永無愆詩曰昭兹來許繩其祖武於以率攸行而保天佑其敢忘紹庭上下之思哉謹序太祖高皇帝聖訓四卷康熙二十五年聖祖仁皇帝恭編聖祖仁皇帝御製序曰朕惟帝王創業垂統傳之無窮非獨世徳茂也蓋亦有典則之貽焉其運之一心播為成憲恒足以示道揆於子孫昭法守於臣庶盱衡千古載籍具存矧其為大聖受命而興者乎皇哉何規模之𢎞逺也我太祖承天廣運聖徳神功肇紀立極仁孝睿武𢎞文定業高皇帝靈承休命誕受多方經綸於天造草昧之年締搆於王業艱難之日除殘伐暴度越漢唐順天應人絜隆湯武所以茂𢎞風教宣暢聲靈振舉綱維恢張疆宇者勒諸蘭臺之上布在方䇿之中駿烈鴻猷粲然明備矣若其攄詞為典播告成經建邦立國之模戰勝攻取之畧化民成俗之務用人行政之方靡不道合樞機理取體要有非臣鄰所能悉覩黎獻所能盡傳者不有成書何以彰聖謨而答光訓乎朕紹庭繼緒志切覲揚因命儒臣分類編輯為目二十六為條九十有二總為寳訓四卷浩浩乎乾包坤負之大皇之墳也秩秩乎民彝物則之常帝之典也以紹心法至中也以握化原至正也以迓天眷至順也以垂後昆至裕也率而循之欽承而無斁之所以卜有道之靈長緜無疆之厯服胥於是焉在奕世子孫尚其克念祖武永永勿替也哉皇上御製序曰朕惟神聖首出濟世覺民立徳立功立言三者統而有之蓋仁義中正之極定於厥躬布諸紀綱為巍巍之帝業頒諸誥令成洋洋之聖謨文教彰明覃被海宇炳乎如日月之照臨窮天地亘古今而莫不仰焉於戲盛哉洪惟太祖承天廣運聖徳神功肇紀立極仁孝睿武端毅欽安𢎞文定業高皇帝體肖二儀量包六合應期受命肇建丕基叶雲雷以展經綸法四時而宣教化六師順動九有輸誠拯生民於塗炭之中轉宇宙為平成之運當是時締造維新規模盡善武緯文經萬物咸覩亦既布在方䇿傳信億年矣乃若心通造化道綜百王吐詞成經發聲為律闡貞一之㫖明至善之宗論聖學則以正心修身為先辨君道則以求賢聽言為要昭晰乎上天降監之原無念不將之以敬畏申儆乎君臣契合之誼每事必體之以公誠以至班朝治軍明刑制用靡不敷陳至理約而該複而不厭信乎有徳者必有言也我聖祖嘗命儒臣編輯聖訓四卷類聚條分燦然明備朕紹膺統緒追契徽猷口誦心維匪伊朝夕仰見義藴之淵閎典章之畫一庶政之周詳直與帝典周官同其廣大顧金匱石室之藏廷臣無由得見是用敬加剞劂宣示萬方俾我子孫臣庶率而循之世世罔斁奉之涖政可以致治保邦準以淑躬可以儆心寡過蓋一時之制作而萬古之世道人心胥賴焉非甚盛徳其孰能及此乎謹序臣等謹按所分四卷凡二十六類析為九十二則粤自有明末造綱解紐弛鍾王氣於大東審神器之有授太祖高皇帝恭膺天眷誕造丕基以遺甲十三人肇開鴻業經綸締造薄海歸仁仰惟聖哲顯融之徳運世有基聰明睿智之符健行不息用是敷為彝訓義藴淵閎紹千古之心傳垂萬年之家法我聖祖仁皇帝仰契前徽命儒臣敬謹編述彰闡鴻謨九十二條之中固巳致廣大而盡精微矣豈非萬世所宜聰聽者哉太宗文皇帝實録六十五卷順治九年大學士希福范文程等恭纂康熙十二年大學士圖海覺羅勒徳洪等奉敕重修雍正十二年大學士鄂爾泰張廷玉等奉㫖校訂皇上御製序曰洪惟太宗應天興國𢎞徳彰武寛温仁聖睿孝敬敏昭定隆道顯功文皇帝狥齊敦敏廣大寛仁早從太祖贊襄大業才徳冠世中外歸忱迨乎嗣統之年敦宗睦族戢衆安民御將行師開疆拓土軍威震疊而以不嗜殺為心武功赫濯而以善養人為務存朝鮮故土字䝉古遺氓明政不綱天人共憤且舊與我國有隙於是應天順人率師直抵燕京聲罪致討猶念彼為中國功垂成而弗取天性仁厚大度豁如固已超越百王包涵六合矣至若建官分職推賢舉能愷澤龎鴻刑章平允設制科以崇文教開言路以重忠良隆規鉅典巍乎煥乎皆一統之大猷百世之良矩也世祖章皇帝輯為實録六十有五卷聖祖仁皇帝命儒臣蒐討訂正繕録成編尊藏惟慎皇考世宗憲皇帝孝切崇先敬加披覽以前後字句之未盡畫一也復令臣工校對而躬為閱定焉朕仰承遺志莊誦繹思用竣厥事緬惟帝典商盤前王之懿範也天球琬琰宗廟之重器也昔之君珍為世寳奉以無墜矧夫典章所紀謨烈所垂造邦制治之圖啟泰貽安之要煌煌簡䇿世昭法守何止帝典商盤天球琬琰之寳重也耶謹序太宗文皇帝聖訓六卷順治末世祖章皇帝恭編康熙二十六年聖祖仁皇帝續成聖祖仁皇帝御製序曰朕惟帝王誕膺天眷肇造丕基功徳茂隆疆宇日闢有紀綱以昭大法即有謨訓以啟後昆方䇿具存燦然可考也若夫道兼作述業裕創垂以聖繼聖而鉅烈鴻猷煥乎宇宙間者尤足冠百王而立極焉欽惟太宗應天興國𢎞德彰武寛温仁聖睿孝隆道顯功文皇帝躬上聖之資承開天之運神武不殺寛和有制萬國向化而賓從庶績撫辰而就理峻徳𢎞勲巍巍蕩蕩稱極盛矣至於命令誥誡誕播宏詞皆義切訓行理歸體要洪纎畢舉本末咸周而其大指之所存則首在於愛養生民旁求俊乂敕幾凝命惇典明倫大哉王言誠治平之極則也我皇考世祖章皇帝嘗命纂修未竟厥緒朕嗣膺歴服念切纘承爰命儒臣詳加編輯計一百一十一條分二十三類定為聖訓六卷既成因披陳莊誦朝夕繹思見夫㫖原於精一義著於典謨上之可以正道揆焉下之可以昭法守焉書曰監於先王成憲其永無愆詩曰不愆不忘率由舊章自昔詩書所載莫不以紹衣為兢兢矧夫義藴精深規模宏逺嘉言彝訓超踔古今朕用是覲揚光烈昭示來許後之子孫以此藴之於心則為天徳敷之於政則為王道範圍臣庶則為會歸之極垂裕後昆則為貽燕之謀尚其夙夜祗承以為致治保邦之本而迓祈天永命之休也是為序皇上御製序曰聖人之情因辭以見易曰修辭立其誠所以居業也蓋以通天下之志以成天下之務本乎至誠施諸命令無意於辭而理臻其極歴觀堯舜禹湯文武之世典謨訓誥釐然具存後人奉之為經列在學宫為載籍首矧夫運際開天功存繼志制作侔造化教澤被生民天下之文章孰有大於此者乎欽惟太宗應天興國𢎞徳彰武寛温仁聖睿孝敬敏昭定隆道顯功文皇帝英姿挺出聖武布昭大智如神淵衷若谷及登寳位疆宇日增厚禄以養賢勤身而率下恩威所及大畏小懷政教所孚逺來近悦皇哉何化理之神也至若敷陳治道誨諭臣民不尚虚文惟崇大體謂行善所以事天而逺利始能服衆闡伊尹一徳之訓稱曾參三省之言以勸農講武為立國之大經以考古讀書為服官之要務自立綱陳紀以逮服飾器物之間或即事以宣猷或因時而定制洪纎咸備張弛攸宜蓋察理精故見之也逺更事乆故慮之也詳用能承藉丕基佑啟聖哲是誠億萬年繼往開來之極軌也順治中嘗因記注舊文纂修聖訓一書未竟厥緒聖祖仁皇帝特命儒臣詳加編輯事以類分凡二十有八言以條舉凡一百一十有一彚為六卷體要著明朕在宫中䝉皇考恩勤教育定省之時備聞祖訓嗣膺大統志切纘承晨夕披陳尋繹仰見心符道要語中機宜㫖藴閎深函蓋天地文辭昭晰彪炳日星垂裕後昆永昭法守用是勒為成書敬授剞劂頒示中外書曰聖謨洋洋嘉言孔彰又曰聖有謨訓明徴定保我子孫臣庶其誦習遵循永敬承於世世哉謹序臣等謹按所分六卷凡一百一十一則欽惟太宗文皇帝守成創業益擴昄章所以開一統之基者謨訓昭垂布在方策巍乎煥乎宜與天地同其悠乆矣世祖章皇帝實録一百四十六卷康熙六年大學士巴泰魏裔介等奉敕恭修雍正十二年大學士鄂爾泰張廷玉等奉㫖校訂皇上御製序曰我國家受天眷命統一萬邦日月所照血氣之屬咸切尊親亦惟是小心翼翼之忱有以通帝載而昭來許故乃朝廷宫府之政罔不參稽古訓溥協人心制定於一時而慮周乎萬世重熙累洽至於今兹海隅蒼生穆然想見盛徳信乎開國之規模詒謀逺而流澤長也洪惟世祖體天隆運定統建極英睿欽文顯武大徳𢎞功至仁純孝章皇帝神靈天亶沖齡踐阼紹我太祖太宗丕緒懋建大猷勤思上理當是時流賊已入京師明祚已成板蕩遂因明將吳三桂之請命將士入關定燕京殄羣冦挈斯民於水火之中而登之衽席之上爰主郊禋式頒正朔自古得天下之正未之有比也政令彰施百度具舉滌前代之煩苛沛興朝之膏澤治化翔洽達乎四表由是制禮作樂敷教明刑虗已以尚賢推誠以納誨斟酌損益秉至中而時措之著為謨訓載在簡編皇哉唐哉子孫世世守之以成乆安長治之業於是乎在康熙十一年聖祖仁皇帝特開史館纂輯實録凡一百四十六卷雍正十二年皇考世宗憲皇帝恭閲全書復令儒臣重加校訂事未竣而龍馭上賓朕哀戚之餘飭令陸續進呈敬加披覽於戲覩世祖聖祖經綸之鉅典則知創業之甚難念世宗繼述之深衷則知守成之不易方䇿可傳者紀綱之成規夙夜罔間者兢業之一心敢弗繹思而敬承之以迓上天無疆之休則是書也誠致治之權輿萬年之鴻寳矣謹序世祖章皇帝聖訓六卷康熙二十六年聖祖仁皇帝恭編聖祖仁皇帝御製序曰朕惟自古膺圖御歴之后躬集大統手致太平懋烈豐功光前翼後行之為政斯發之為言義藴固卓越乎百王訓行尤昭示乎奕禩惟聖有作後人述焉千載同揆也我皇考世祖體天隆運英睿欽文大德𢎞功至仁純孝章皇帝神靈首出智勇天授禀英斷之姿而持以恭儉擴寛仁之量而濟以憂勤爰是沖齡定鼎薄海歸心救生民於水火之中而庶政咸熙萬邦作乂德盛勲崇夐哉莫尚矣若夫宵旰圖維宫庭訓敕煌煌綸綍嘉言孔彰究聖學之高深著王道之正直凡所以凝天命揚祖德顧民碞持國體者丁寧反覆深切著明而意㫖所注尤殷殷乎省躬克已納誨親賢綱紀畢張淵衷若歉及乎訓誡臣下守正奉公鼓勵激揚至誠感發靡不輸服而効忠黽勉而奮績也蓋自我太祖高皇帝肇造鴻基太宗文皇帝式廓駿業而我皇考心傳合一丕顯丕承𢎞闡經猷布為政教所以即事成謨遇物為誥包羅典册釐剔章程美善畢臻鉅細咸備堯咨舜儆何以加兹朕祇承遺緒惕厲靡寧瞻方䇿之常新僾羮牆之如覩因命儒臣分類編纂朕復詳加披繹計一百一十三條統為聖訓六卷寳諸金匱拱若球圖俾後嗣子孫知我皇考之貽謀燕翼百世無疆開國經綸萬年時叙所以杜愆忘而遵典則者心法於是乎在書曰紹聞衣德言詩曰紹庭上下陟降厥家嗚呼可不敬哉皇上御製序曰古昔帝王應運而興開物成務有君天下之規模凝命敕幾有師天下之典則故言出而成經教思所被率土歸仁歴觀往代紀載肇乎二典彝倫敘於九疇罔不播為成憲炳若日星簡籍具存可考而知也欽惟我世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝秉岐嶷首出之姿建永清大定之業沖齡踐阼統一車書義問達乎梯航仁聲徧於塗巷盛德大業富有日新自唐虞三代以來史册所傳罕有及者至若洋洋聖謨包含萬有大之闗倫教綱常之重而閭閻之日用飲食所弗遺精之在身心性命之微而宫府之制度典章所必飭巨細畢該綱維盡善要惟本精一執中之奥藴以成經世服物之鴻謨誕告多方嚴明愷摯訓敕有位深切周詳意皆出乎至誠理尤協於克一用以光大前徽開萬年有道之長夐乎與天地為昭矣我聖祖仁皇帝躬承先訓命儒臣分類編輯計一百一十有三條彚成聖訓六卷以傳乆逺我皇考念切紹衣宫庭宵旰追述先猷朕從温凊之時聞知維謹嗣膺大統志在覲揚朝夕披陳具見開國經綸超越前古詒謀燕翼垂裕無窮是用敬為剞劂昭示臣民俾海隅出日之逺咸覩光華寳之如圖球信之如蓍蔡是訓是行欽承勿替庶幾道徳一而風俗同唐之政要宋之寳訓夫豈可同年而語者哉謹序臣等謹按所分六卷别為三十二類仰惟世祖章皇帝宅中定鼎率土傾心一百十三章之内聖謨廣運炳三光而羅萬象誠億萬世所宜法守者也聖祖仁皇帝實録三百卷康熙六十一年十二月世宗憲皇帝命吏部尚書一等公隆科多大學士嵩祝白潢等恭修世宗憲皇帝御製序曰粤稽古載籍以來聖帝明王徳隆業茂莫不揚休紀美照耀簡編若夫上天純佑下民聚扶輿積厚之氣篤生至聖備道徳之崇廣集皇王之大成經綸宇宙彪炳帝紀巍巍乎蕩蕩乎自義軒至今未有如我皇考聖祖仁皇帝之盛者也洪惟太祖太宗肇構鴻基發祥垂裕世祖開天建極統一寰區暨我皇考天亶神靈丕承先烈以徇齊敦敏之質而學有緝熙以繼體守成之時而事兼開創以光華格被之勲而日新盛徳以郅隆熙洽之運而時敕幾康臨御寳阼六十餘年厯服綿長超越千古仁漸義摩文經武緯典章大備聲教覃敷峻徳崇功蟠天際地有如敬天凛昭事之誠尊祖切覲揚之志郊壇禋祀嵗必躬親廟享薦馨心䖍對越用致蒼穹之昭假聿彰謨烈之丕承奉事兩宫尊養備極承歡致敬閲數十年巡幸則躬扶鸞輅侍疾則步禱南郊送龍輴而親行瞻寢園而灑淚自古天子之孝莫與比隆友愛裕親王等垂老靡間視疾臨喪恩禮交至推仁宗室教育天潢展親惇族誼莫厚焉宵衣旰食明目達聰親政六十餘年夙夜勵精始終惟一臨軒召對虚已求賢敷陳有益於民生必䝉採録亷能實見諸治效立荷寵褒眷耆舊而體貌攸崇簡俊乂而程材器使小亷大法百僚皆得其人綱舉目張庶司各修其職四方之利弊周知萬里之情形洞燭愛民如子軫恤維殷普樂利於農桑裕葢藏於積貯偶遇水旱立沛恩施發帑蠲租動以數百萬計即在屬國運粟賜糧視同一體徳洋恩溥故黎庶樂業中外阜康慎重刑章哀矜庶獄每於奏讞明允之中施仁法外嚴寒停遣盛夏弛刑大逆寛族誅叛人無孥戮如天好生之徳洽於民心欽恤之仁無以加矣講幄𢎞開精研道要考六藝之折中抉性理之精義宸翰則鸞迴鳳翥天章則玊振金聲御定諸書包涵萬有融貫百家緗帙瑶編充牣册府生知天縱莫名聖學之髙深加以重道尊師表章儒術親詣闕里瞻拜加䖍賜博士於五賢躋紫陽於十哲訓飭多士敦崇實學加科廣額惠浹儒林夀考作人於斯極盛聖武布昭神謨密運天戈所指立奏膚功平三逆収臺灣布爾尼應期而授首俄羅斯望風而請命躬率六師三臨朔漠殱噶爾丹而藩服乂安命將徂征長驅絶域復達頼喇嘛而西陲寧謐銷鋒灌燧俾薄海内外永慶昇平厪念河防親臨指授覽全河之形勢運疏瀹之神功開中河築高堰而淮黄底績東南獲衽席之安濬永定隄子牙而漳滏順流畿甸享膏腴之利地平天成萬世永賴至若躬行節儉而大官服御務崇樸素之風秉徳謙沖而徽號鴻名屢却廷臣之請至誠不息而朝乾夕惕本行健以法天聖敬日躋而肅廟雝宫儼動容之中禮凡兹盛美莫罄名言是以乆道化成太和翔洽天庥滋至嵗奏屢豐户樂盈寧人登仁夀自古未賔之國重譯踵至戴髙履厚莫不尊親升遐之日自僻壤遐陬逺暨蠻夷荒服含生負氣之倫感慟哀號如喪考妣羣臣恭擬廟諡曰聖曰仁祗荐祖號萬口一心允孚公論猗歟休哉至矣大矣朕纘承鴻緒念切紹庭踐阼之初即簡命大臣等董率儒臣開館纂修發金匱之祕藏稽綸言於政地表年繫日敬謹編輯紀言紀事鉅細靡遺朕齋肅展禮親加詳閲厯今九載敬成聖祖仁皇帝實録若干卷又於尊藏皇史宬外恭繕全帙䖍供几案時時展讀以遂朕敷時繹思繼志述事之意於戲帝載難名而嵗功昭布日月之運行星辰之經緯可以仰觀成象焉聖徳難名而治法昭垂條理之精詳規模之宏逺可以仰求成憲焉我皇考參贊位育之神欽明精一之藴雖非簡牒所能殫述而鴻謨駿業炳於紀載與天無極萬世勿諼後之紹作君作師之任求治統道統之全者於是乎在敬弁言簡端以昭示我子孫俾永永敬承於億萬世謹序皇上御製序曰皇祖聖祖仁皇帝臨御六十一年耿光大烈融爍古今積惠襲恩淪浹寰宇功徳之盛具載實録垂千萬禩我皇考世宗憲皇帝御製序文推本上天孚佑下民列祖垂裕後嗣篤生至聖開邃古以來未有之盛業煌煌乎言之廣大精微至矣蔑以加矣予小子寅承丕緒紹聞衣徳兢兢業業仰思繼述皇祖皇考成憲日於治事之先展誦列祖實録周而復始皇祖實録卷帙浩繁排日敬覽寒暑靡間至自今凡數閲矣緬惟尚書史記所載古帝王治化之隆各極其至而孔子於堯曰惟天為大惟堯則之蕩蕩乎民無能名焉於舜曰無為而治孟子則曰王者之民皥皥如也予嘗推繹其㫖想見唐虞中天之盛乃今思皇祖之世之民有以知孔孟之言信乎其能知聖人也皇祖自親政之始即手鋤三蘖蕩定南疆滇黔閩粤之奥揭日月而掃氛雺海内赤子喁喁向風由是亭之毒之煦以淳風沃以甘澍浸以醲化甄以大鈞數十年之間南奠臺澎北犁沙漠命將肆征而閭左無徴發之警親臨淮河指授方畧歴吳會陟會稽登岱宗謁闕里西巡關隴抵雲中三覲祖陵觀於東海嵗出塞外獮狩上都天行之健古無以加而庠序詠仁甿庶樂業市廛殷阜卒伍服習熙熙然相忘於無所事事於焉正晷緯考律度定元聲煥為宸章灑為奎翰集古帝王文治之大成而穆清宥密凝然不見經營之迹簡任公卿百執事器使而責其成俊夀魁碩布列有位外自節鉞連帥以至守令賢否清濁立判剔侵蠧勵亷平吏治烝烝無綜核之煩而徳意宣究蠲逋賑恤肆赦緩刑指揮深宫之中風馳萬里匹夫匹婦無不浸潯涵育鼓舞徳化而不能自已當其時誠所謂不識不知順帝之則者耶歴今二十餘年遺澤餘烈深入人心固結而不可解迴溯鼎成之初謳思如一日夫乃恍然曰是所謂至仁如天民無能名者也無為而治恭已南面者也孟子所謂王民皥皥者也於戲四海九州之民無得而名予小子又烏能名之憶自幼沖蒙皇祖撫愛日侍左右用人行政皆覩記所及簡册紀載政如杓衡規天躔次測日可見者迹象而已於穆之運重離之明終無能言其所以然者盥誦之次稽首敬為之序以誌紹庭繼序之忱於罔斁云聖祖仁皇帝聖訓六十卷雍正九年世宗憲皇帝恭編世宗憲皇帝御製序曰朕荷皇考聖祖仁皇帝付託至重兢兢業業早作夜思以期無負繼述仰惟皇考留貽矩矱朕得監於成憲是則是傚實天下萬世所當欽承觀法爰命大學士等纂修聖祖仁皇帝實録閲時九載書成千卷自古帝王功徳之隆盛記載之繁富未有加於此者顧實録乃編年之書我皇考順時布化若天道之流行春夏秋冬各協其宜而其中條分縷析飭綱振紀精微所寓隨舉一端皆為法式於是復令纂修諸臣分類恭輯聖訓六十卷洋洋乎盛徳大孝敬天勤民文教之誕敷武功之赫濯禮樂之明備政刑之修舉一經睿謨千古莫易夫六經諸史之傳皆有經有緯朕於皇考神功聖徳精心體察以實録為經以聖訓為緯於編年見因時之宜於分類見隨事之要一敷施而有所循也一話言而有所守也一寤寐飲食而有所遵也於戲如天之仁如日之照如神之哲萬類雖賾莫不含𢎞並包於聖人之度内而儆惕訓諭之辭尤必凛凛於時幾孜孜於熙績勤勤於小民之恬養亹亹於嘉師之祥刑葢聖心愈切而聖徳愈崇是以統乾坤之範圍而不過發聖賢之閫奥而靡遺以六十餘載之鴻規為千萬世後昆之垂裕其所禆益曷有涯量哉此朕命官敬纂皇考實録而又恭繕聖訓之深意子子孫孫其永寳諸皇上御製序曰自古聖人誕受天命為下民君師必亶聰明睿智之資首出乗乾以綏猷而立極凡其經緯萬端敷之彞訓者罔不深切著明炳日星而章雲漢典謨所載雅頌所陳唐虞三代之隆有如一轍欽惟皇祖聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖徳廣運乆道化成文治光昭武功赫濯薄海内外深山窮谷之衆總淪浹於仁心仁政之中教思無窮訓辭深厚歴考熙明之運未有躋此崇隆者也肆我皇考世宗憲皇帝以聖繼聖用人行政一一仰法前徽既纂修實錄成書復分類恭輯聖訓六十卷俾皇祖六十餘年敬天尊祖經國保民農田學校禮樂兵刑之盛蹟見之都俞吁咈間者粲然常新釐然備具永貽我後嗣子孫億萬年昇平矩範葢皇祖性本生安道兼創守實集千古聖帝明王之大成是以聖謨洋洋明徴定保宏綱鉅目有要有倫精一之心傳蕩平之王路胥不外乎此也予小子昔在齠齡早荷聖慈賜育宫庭祗聆訓廸兹膺基緒紹聞衣徳之志兢兢業業不懈益䖍昕夕尋繹惟期懋遵祖訓以無負皇考善繼善述之詒謀顧金匱石室之藏中外無得見者爰命儒臣敬謹繕寫授之剞劂庶我皇祖聖祖仁皇帝建中表正牖民覺世之言昭垂寰宇羣工士庶咸得漸摩於聖訓之崇閎而率由無斁也不亦休歟謹序臣等謹按所分六十卷别為三十二類欽惟聖祖仁皇帝秉中和之徳膺上夀之符歴六甲五子之遥際萬世一時之盛故垂訓獨多而載筆亦最富球圖美備之觀直逺邁二典三謨而上之矣世宗憲皇帝實録一百五十九卷雍正十三年十月皇上命大學士尹泰張廷玊朱軾等恭修皇上御製序曰國家受天眷命集慶垂光承承繼繼肆我皇考世宗憲皇帝荷三聖之洪庥祗紹聖祖仁皇帝丕緒宵衣旰食底區宇於和恒以茂衍億萬年無疆之祉厚徳隆功溢於簡牒巍乎煥乎治平之盛軌未有逾兹者也皇考徇齊敦敏仁孝性成早嵗承歡聖祖友愛同氣迨膺大統一切禮儀隆備廟號尊崇莫不定自宸衷符乎典則仰惟聖祖仁皇帝臨御六十餘年濊澤洽人心醇化流方外豐亨豫大之福極盛無加皇考承郅治之餘因時制宜以善繼而善述惟是本之以誠持之以敬行之以中正要之以寛仁用能杜玩愒於熙時綿昇平之泰運大經大法粲然為後嗣子孫法焉荐馨郊廟必躬必親旁秩祀典懐柔百神間遇水旱微愆祈禱深宫罔弗潛孚立應聖學高深探性命之精操治平之要天德王道一以貫之隆禮先師孔子增祀先儒右文重道之典超越常制猶復表章經術廣勵士風籲俊興賢蔚有德造辟雍鐘鼓後先疏附之風殆無以過念用人為愛民之本自公孤卿尹下至庶司百執事登明選公咸稱任使而守令之親民暨封疆大吏之司董率者尤厪聖心重撫字之方嚴貪墨之罰明四目達四聰賜復蠲租農桑被野遂躋斯民於衽席之安刑罰者所以佐政教之不逮也皇考如天好生既已刋布律令俾愚氓重於犯法復詳定貴賤服色兵民婚喪禮制更闡明聖祖諭㫖十六條細加訓註家諭户曉翕然從風河防之關於運道生民也萬里黄流滙以百川之水兖徐而下嵗苦沮洳皇考黙運神謀指示經畫加長淮之石堰闢三省之引河渙發帑金厥有成績又吳越海塘南北水利凡可以惠此蒸黎者悉因時而修舉之先是聖祖親統六師平定朔漠威靈所加青海扎什巴圖爾等震讋承令因沛殊恩畀以爵秩垂三十年而羅卜藏丹津與吹拉克諾木齊等誕敢首造逆謀擾犯邊域皇考聲罪致討密授方畧於閫帥戈鋋所指電掃風驅振旅獻俘勒成功於太學準噶爾蠢動西陲數肆患於喀爾喀部落南方苗蠻蔓延行旅居民苦其侵掠皇考為藩服計乆逺為遐陬圖寧謐或命將興師或諭文武諸臣隨宜搜𠞰至逆夷悔禍輸誠傾心納土則皆宥其前愆而曲賜包容焉徳威並耀無逺弗屆賜安南之地減朝鮮之貢俄羅斯南掌等國阻昧幽深胥漸被於聲教他若儆怠荒矯浮薄求言納諌教孝褒忠宗室天潢之胄多方造就八旗根本之地備予綢繆頒訓諭於臣工飭官常也錫侯封於明裔示殊典也豐盈徧萬國而服御有經見聖躬之儉焉嘉應在庶徴而憂勤益懋昭聖德之謙焉葢我皇考誠敬之心中正之道寛仁之恩悉同符乎聖祖以綏猷而立極十三年中有如一日宜其治功之盛綱舉目張蕩蕩平平樂樂利利傳之愈逺而可法可守也歟予小子繼序之初即命監修總裁大學士等董率儒臣稽歴年之紀載敬謹纂修次第進呈齋肅披閲迄今五載恭成世宗憲皇帝實録一百五十九卷昔在唐虞三代制治保邦之道備載於書惟我皇考際重熙累洽之盛勵精圖治良法美意厯乆彌新玉簡琅函實與典謨訓誥相輝映用是􅋔繕尊藏朝夕循誦以志繹思衣德之義垂裕後昆永永無極焉謹序世宗憲皇帝聖訓三十六卷乾隆五年皇上恭編皇上御製序曰自古人君有盛徳大業者其規畫周詳而詒謀悠逺則必敷之彝訓以明定保之徴紀之簡編以著經綸之績非徒為一時事功計也亦將以示後嗣昭法守焉我皇考世宗憲皇帝亶聰明睿智之資建中立極茂登上理御極十有三年體聖祖之心以為心法聖祖之政以為政祗承郊廟惇睦宗親整飭官方修明法度正人心厚風俗文經武緯禮序樂和凡宏綱鉅目罔不黙運於深宫乾健之精神以圖其乂安而計其乆逺聖謨洋洋有典有則或因人以立教或隨事以敷言存之淵然而有條理發之煥然而無凝滯其與二帝三王都俞吁咈咨儆誥誡之㫖曷以異焉允矣彪炳之綸音治平之模範也可不謂至盛者歟既命大學士等詳慎纂輯恭成世宗憲皇帝實録一百五十九卷復於編年繫日之中分類備錄恭成聖訓三十六卷仰惟皇考德合天地明並日月序參四時躬荷聖祖仁皇帝積厚之貽善繼善述故乃保泰持盈諴民阜物寓惇大於明作劑整肅以寛仁致治規條炳如星日豈苐予小子朝乾夕惕之衷期於謹凛率由嗣守丕緒繼自今億萬斯年子孫臣庶沾被熙洽之澤者庶咸有以遵聖訓之光昭而頌鴻猷之允塞也謹序臣等謹按所分三十六卷析為三十類仰惟世宗憲皇帝纘承前緒百度更極其修詳庶司倍申其箴戒我皇上踐阼以來永維至訓故綜述至為詳明而積帙乃臻美富燕翼之謀鍾於至聖宜乎丕迪前光而萬年乆道也上諭内閣一百五十九卷雍正七年和碩怡親王允祥和碩莊親王允禄等奉敕繕録校刻乾隆六年和碩和親王𢎞晝等奉敕續成臣等謹按是編本無卷數四庫全書恭依舊次釐為一百五十九卷仰惟世宗憲皇帝勵精圖治一日萬幾諸臣於陳奏事件皆得專函呈進上邀御覽必親御丹毫詳為指示所以勵俗維風飭綱整紀者罔不深切著明允宜宣示寰區導揚至治上諭八旗十三卷上諭旗務議覆十二卷諭行旗務奏議十三卷雍正九年和碩莊親王允祿等奉敕編臣等謹按是編凡三集自康熙六十一年十一月十七日以後所奉諭㫖涉於八旗者曰上諭八旗其先錄諭㫖而綴以八旗大臣奏議者曰上諭旗務議覆其先錄八旗大臣所奏而恭錄諭㫖於後者曰諭行旗務奏議三編共為一書兼用清漢文刋布葢即輦轂至近之地而綸綍所宣已積成巨冊仰見睿慮周詳不遺於邇所以深維根本之重者有如是之反復著明者哉世宗憲皇帝硃批諭㫖三百六十卷雍正十年奉敕校刋世宗憲皇帝御製序曰朕向在藩邸未諳政事不識一人毫無閲歴聞見及受皇考聖祖仁皇帝付託之重臨御寰區惟日孜孜勤求治理以為敷政寧人之本然耳目不廣見聞未周何以宣達下情洞悉庶務而訓導未切誥誡未詳又何以使臣工共知朕心相率而遵道遵路以繼治平之政績是以内外臣工皆令其具摺奏事以廣諮諏其中確有可採者即見諸施行而介在兩可者則或敕交部議或密諭督撫酌奪奏聞其有應行指示開導及戒勉懲儆者則因彼之敷陳發朕之訓諭每摺或手批數十言或數百言且有多至千言者皆出一己之見未敢言其必當然而教人為善戒人為非示以安民察吏之方訓以正徳厚生之要曉以福善禍滛之理勉以存誠去偽之功往復周詳連篇累牘其大指不過如是亦既殫竭苦心矣至其中有兩人奏事而朕之批示迥乎不同者此則因人而施量材而教嚴急者導之以寛和優柔者濟之以剛毅過者裁之不及者引之並非逞一時之胸臆信筆直書前後矛盾讀者當體朕之苦心也此等奏摺皆本人封達朕前朕親自覽閲親筆批發一字一句皆出朕之心思無一件假手於人亦無一人贊襄於側非如外廷宣布之諭㫖尚有閣臣等之撰擬也雍正六年以前晝則延接廷臣引見官弁傍晩觀覽本章燈下披閲奏摺毎至二鼓三鼓不覺稍倦實六載如一日此左右近侍及内直大臣所備知者近年以來天下庶政漸次就理下情稍覺洞達臣工之奏摺較前減少而朕躬精力亦不如前批答之事始從簡便此實情實事可舉以告天下者今檢内外諸臣繳回硃批之摺不下萬餘件因思自古帝王治天下之道以勵精為先以怠荒為戒朕非敢以功徳企及古先哲王而維此勤勉之心自信可無忝於古訓實未負我皇考付託之深恩也又念此等批示之語實出於朕之苦心或可為人心風俗之一助但本人承㫖之時不敢宣露於外他人無由知之今將外任之大臣官員奏摺經朕手批酌量可以頒發者檢出付之剞劂計算實不過十分之二三俾天下臣民展讀咸知朕圖治之念誨人之誠庶幾將此不敢暇逸之心仰報我皇考於萬一耳或人人觀此而感動奮發各自砥礪共為忠良上下䝉福朕心愉快更當何如皇上御製後序曰皇考世宗憲皇帝天縱聖神精勤庶政四方文武臣僚具摺言事者日或數人人或數事緘封直達御前手自批發或立見施行或咨詢廷議善者温綸襃予過者訓誡諄諄隨宜指示悉出睿裁一字不假手於人御極十有三年常如一日粤雍正十年特檢厯年批發奏摺命内廷詞臣繕録校理付諸剞劂彚成數帙輒以頒賜在廷羣臣工未告竣奄遘上賔予小子纘紹丕基敬展遺箧見所貯手批奏摺不下數萬奎畫爛然充溢巨簏然以未經皇考檢定不敢意為增益謹就檢録已定者彚著為目前後凡二百二十三人分一百一十二帙統為十八函當時隨檢隨發無先後倫次兹亦不復排類葢摺奏浩繁不勝編録所刻僅十百中之一二畧見大凡本非全覽故也既告蕆事僅綴序言於後洪惟我皇考至仁如天至明如日至誠如神簡㧞賢才任之以心膂股肱之寄開誠布公藹然家人父子無不可盡之言諸臣之才具大小短長與性質之剛柔強弱克知灼見如權衡繩尺之不爽片長足録亟登而進之有不及則激厲而開導之稍肆焉則裁抑之其䧟於過始則訓飭之能改則已不悛則戒儆之使知悔艾終於怙惡則亦未嘗姑容然哀矜惻怛之意尚流溢於毫楮間也同一事而此或俞之彼或咈之非有所好惡於其間也葢俞之者必有可俞之道而咈之者亦必有可咈之端同一人而始或予之終或斥之非有所喜怒於其間也葢始有可予則予之終有可斥則斥之明燭幾先坐悉情偽逺隔萬里遲閲數年睿鑒所周範圍莫越正人心厚風俗兢兢業業儆戒無虞雖屢豐見告瑞應頻仍而惟是憂勤惕厲之心乆而並篤記有之曰天道至教聖人至徳春秋冬夏風雨霜露無非教也我皇考之為治一天道之運行教澤所被百志惟熙即萬世而下尚如日月之臨照光景常新春風之煦然被物不自知其感動奮發而興起也予小子寅承鴻業自惟寡昧無能企逮萬一仰法皇考明目達聰孜孜圖治之心祇紹徽猷夙夜黽勉其服教畏神警省弗怠之志詎敢以嵗月易耶謹序臣等謹按秦漢以後章奏既興批答之詞多由代擬即有偶然涉筆多不過寥寥數語而鳳尾諾之名且止一字從未有如我世宗憲皇帝之親灑宸毫一一手敕批答者良由聰明天縱志氣如神故明燭無疆不遺鉅細卷中所載臣工奏摺凡二百二十三人皆恭錄批示多者至數百言其肯綮之處皆經御筆圈抹微特陳奏諸臣曉然於得失之故即千萬世下亦必因端竟委共仰權衡自謨典以來未有勤政若斯之懋勉者已皇朝文獻通考卷二百二十
