body:
  text: 欽定四庫全書皇朝文獻通考卷二十八征𣙜考三鹽順治元年整理長蘆鹽法詹事府通事舍人王國佐條奏長蘆鹽法十四事一復額引以疏壅滯一改引部以速引利一便引價以壯京圉一革防銷以省商費一除濫贖以伸商寃一除變價以止姦欺一清焚溺以杜虛冒一止改告以一引鹽一疏闗禁以通引楫一杜擾害以清私販一核埸竈以清窩囤一復兩坨以譏察一免徭助以濟孤商一設賞例以鼓富商部覆允行二年勅免陕西本年鹽引額課三分之二又定河東鹽法改票用引户部議覆河東巡鹽御史劉今尹疏言河東鹽課銀一十二萬四千九百餘兩故明給宣大山西三鎮宗禄軍餉今應解京庫其給發鹽引之法河東地逺勢不能先納銀而後領引應先解紙價後按引納課舊例可循至河東地方去年十月方出湯火業於順治二年春定期征解以甦商力其撈採之法均宜仍舊惟是山西太原府汾遼沁州欲行票鹽似非畫一當如山東例革票行引以信令甲而除私販之弊從之又定原食淮鹽之汝寧歸兩淮巡鹽御史管理原食西和漳縣鹽之臨洮鞏昌歸甘肅巡按兼管從河東巡鹽御史劉今尹請也定河南江北江南等處鹽課征解例奉諭㫖河南江北江南等處各運司鹽課自順治二年六月初一日起俱照前朝㑹計録原額征解官吏加耗重收或分外科斂者治以重罪又准鹽臣於户部領引召商納課户部議覆兩淮巡鹽御史李發元疏言兩淮鹽引舊例於南京户部闗領今南直規制未定鹽臣請於臣部急頒鹽引以疏鹽利應先給二十萬引濟目前急用其邊商納粟原為邊計今中外一統防兵無多應令運司召商納銀依額解部從之又給新引以杜混冒鳯陽巡撫趙福星疏言鹽課為軍需所闗今各商所行皆故明舊引其中不無混冒請速給新引以裕國課疏入如所請行又詔免本年鹽課三分之一奉諭㫖各運司鹽法明末逓年加増有新餉練餉及雜項加派等銀深為厲商今盡行蠲免止照舊額按引徴收本年仍免三分之一又核定本年行鹽一百七十一萬六千六百二十五引徴課銀五十六萬三千三百一十兩六錢有竒臣等謹按是年行鹽一百七十餘萬引次年即行引三百餘萬十六年行引四百餘萬固由昇平之後户口日増民食漸廣亦以我朝鹺政之寛將故明加派名色盡與蠲除無積引套搭之苦無常股存積之名無新餉練餉追呼徴繕之擾埸竈煎曬可以當耕鑿之勤自食其力而商賈出湯火之後額徴既減亦自易於轉輸是以行銷既逺而課額日増傳所云為之者疾用之者舒則財恒足盖鹽法祇國計之一端而因連嵗革除之苛政與逓年引目之加増由此識維新治象與商民抃舞之效可以並觀而互見也四年蠲免浙閩加派鹽課時以浙東福建初定浙閩運司鹽課自故明天啟崇禎年間加派名色甚多甚為商厲今盡行蠲免止照萬歴年間舊額按引徴課又免江南崇明鹽課銀兩允招撫江南大學士洪承疇請也又嚴禁旗兵私販奉諭㫖興販私鹽屢經禁約近聞各處姦民指稱投充滿洲率領旗下兵丁車載驢䭾公然開店發賣以致官鹽壅滯殊可痛恨爾部即出示嚴禁有仍前私販者被獲鞭八十其鹽觔等物入官巡緝員役縱容不行緝拿者事發一體治罪嗣於順治五年六月以地方土棍串同滿兵車牛成羣携帶弓矢公然販賣私鹽諭各管旗官員嚴行禁止並敕部再加申飭地方巡緝擒拿解部依律治罪又蠲免廣東鹽課加派銀兩以廣東初定本省鹽課照萬厯四十八年舊額按引如數徴解其天啟崇禎年間加派盡行蠲免又議准山西鹽法道歸鹽運司兼管六年免四川商民鹽課以四川未定免徴鹽課從巡撫趙班璽請也七年敕廣西驛鹽事務歸併布政使兼理八年以鹽課餘銀通飭各鹽差御史奉諭㫖各處所報鹽課毎報餘銀若干細思鹽課正額自應徴解若課外餘銀非多取諸商人即係侵尅百姓大為弊政户部都察院通行各鹽差御史及各鹽運司止許徴解額課不許分外勒索餘銀有御史及運司各官貪縱者許商民指實赴都察院首告審問確實奏請治罪用布朝廷恤商裕民至意十二年稽核河東長蘆鹽務奉諭㫖河東長蘆等處各運司鹽課原應商人辦納中有毎年派民納課而民不見升合之鹽者著該運司詳加稽核從長計議務令公私兩便經久可行毋得因循積弊又復差御史巡理鹽政從科臣張王治請也十五年暫停長蘆鹽政解送光禄寺鹽觔禮部議覆光禄寺條奏長蘆運司所解青白鹽鹽磚厯年存剰六十萬觔有零現在足用應暫停解本色自十五年以後該地方官照時價改折解送光禄寺俟庫内現存之鹽用完日具題仍解本色應如該寺所議行從之户部議准上元江寧等八縣食鹽九萬六千七百引將原派綱鹽十三萬八千八百四十七引仍歸綱地行銷十七年嚴糧船夹帶私鹽之禁巡鹽御史李賛元疏請預杜糧艘夾帶之弊回空糧船約有六七千隻皆出瓜儀二閘其船一帮夾帶私鹽奚止數十萬引合而計之實侵淮商數十萬引鹽之地查漕規回空利於速囘以便早赴下運如此夾帶私鹽必致躭延時日是害鹽法亦所以害漕規乞令督撫轉行漕道申飭禁緝發賣之地先窮其源所過之地嚴察其弊庶於鹽法漕規兩有禆益户部覆准令各該督撫檄行沿河各道府州縣並山清髙寶等處地方官嚴加禁緝揚州鈔闗乃萬艘必由之地回空到彼勢不能飛渡應令該巡鹽御史逐船查騐即便放行如有仍前夾帶者罪之後鹽政李賛元復奏請緝私不力議處及拿獲私鹽議叙以次數分别輕重著為例又議准按臣條奏清理四川鹽政户部議覆四川巡按張所志奏蜀省之鹽皆産於井必相山尋穴鑿石求泉而井始成開鑿艱難毎一井常費中人數家之産應照開荒事例三年起課以廣招徠新鑿鹽井仍令毎年報部武弁抽索竈丁應嚴行申飭違者題叅重處貧民易食鹽觔應令四十觔以下者准免課税四十觔以上者仍令納課至蜀省鹽課則例查明季萬歴年間額鹽九百八十六萬一千二百四十觔嵗解陕西省銀五萬餘兩嵗留本省備用銀二萬一千餘兩其行鹽地方係成都府嘉定州叙州府潼川府順慶府保寧府廣元縣䕫州府廣安州雅州也其告運行鹽事宜鍋井徴收則例應行該御史斟酌損益具題從之又議准鹽臣條奏清釐両淮鹽務兩淮御史李賛元條奏鹽政八欵一毎年見行額引宜帶積引附銷一清釐府州縣私販之源一清釐三十鹽場之弊一嚴飭各道巡緝各省越販一稽核官引以杜夾帶重複一淮北地方宜併引行鹽一鹽引日増請照長蘆河東兩浙例加課不加引一溢觔割没日重請照所發印簿實填下户部議行十八年定鹽引歸部以杜鹽賤引壅之弊巡視長蘆鹽政御史張冲翼疏言長蘆舊例引存户部先課後引順治十五年户部發引到司皆争先求售減價而沽以致鹽賤引壅逋課甚多請仍循舊例將鹽引歸部庶引不虛發課無逋欠從之又定臨安府屬枯木八寨牛羊新縣四處食鹽銀兩自順治十七年為始編入䝉自縣經制全書又免崇明縣鹽課户部議覆江南總督郎廷佐疏言崇明縣地丁錢糧雖已蠲免其鹽課仍應完解得㫖崇明孤懸海外逆賊來犯皆賴兵民同心協力固守全城所欠鹽課著與豁免康熙元年以淮北食鹽改撥淮南派額銷引巡鹽御史鄭名疏言兩淮南北綱引食鹽原有定例派行州縣户口不無盛衰宜設法疏理請行改銷部議覆准既稱淮北引壅酌量派銷疏通淮安府等州縣一萬引改撥寧國府六千五百引和州含山三千五百引毎年奏銷以為定額三年免廣東康熙元年分逋欠鹽課銀七萬一千一百一十五兩又准江西吉安府改食淮鹽江西總督張朝璘疏言吉安府向食粤鹽但距粤千餘里更有十八灘之險商賈裹足民多淡食請以康熙三年為始改食淮鹽仍照粤額完課得㫖允行四年恩詔蠲免鹽課積欠銀兩時因遵奉詔㫖蠲免直省舊欠錢糧推廣及之又蠲免東省竈課銀兩户部議覆長蘆巡鹽御史李粹然疏言本年東省旱災錢糧盡行蠲免竈地同為被災之地竈民同為應恤之民請將本年竈課銀一萬四千八百餘兩照例全免應如所請從之又減廣西鹽引額數户部議覆廣西巡撫金光祖疏言粤西鹽引舊額一萬三千四百九十有竒但丁少民貧無力行銷請減存四千四百九十一引以康熙三年分見在丁口均派定額俟户口繁盛再議加増應如所請從之六年定湖南衡永寶三府改食淮鹽巡鹽御史寗爾講疏言湖南衡永寶三府改食淮鹽應酌議引額課銀將兩粤課銀照淮南輸課則例計派引九萬五千八百一十七引其口岸照三府見行粤鹽包數派銷部議准行又定湖廣郴州等十一州縣食鹽免其銷引辦課先是湖廣郴州十一州縣食鹽取給廣東連韶諸處例不銷引粤商欲令楚民分引辦課户部以郴州等州縣既食粤東之鹽自宜分銷鹽引得㫖據該撫奏言郴民既食粤商興販之鹽是食鹽之民已寓税於買鹽之内而認税之商已浮税於賣鹽之中兩得其便又十一州縣民困已極分銷鹽引恐窮民愈致苦累其再詳議至是部議仍如舊例免楚民分銷鹽引從之七年飭禁陕西州縣官按畝攤派銷引病民户部議覆吏科給事中王承祖疏言各省鹽觔應令商人自行銷運今陕西州縣官轉向商人買引按畝攤派毎引費銀一兩甚為民困應飭撫臣並巡鹽御史嚴行禁革從之又改廣東巡海道為廣肇道管理鹽法九年禁止兩淮運鹽額外私派及淮鹽掣摯弊端巡鹽御史席特納徐旭齡疏言兩淮積弊相沿其苦有六其一為輸納之苦商人納課例將引數填註限單謂之皮票而運庫扣勒皮票胥役又有使用謂之照看綱總又有科歛謂之公匣除正納外必費一二錢始得築一引之鹽計嵗費約至數萬金其苦一也其一為過橋之苦商鹽出塲例將艙口報騐謂之橋掣而闗橋扣勒引票毎引科費數分不等除溢觔外必費七八分始得過一引之鹽計嵗費約至數萬金其苦二也其一為過所之苦商鹽呈綱例必造冊擺馬謂之所掣而未經稱掣先有江掣之費又有茶果之費又有緩掣之費又有加窩之費除割没外毎引必費一二錢方能過所計嵗費約至數萬金其苦三也其一為開江之苦引鹽既掣矣例必請給水程毎引數分不等又請給桅封毎張數兩不等毎引約費二三錢方能開行計嵗費又至數萬金其苦四也其一為闗津之苦鹽船既放行矣而所過鹽道有掛號之費營伍有巡緝之費闗鈔有騐料之費計嵗費又至數萬金其苦五也其一為口岸之苦船鹽既抵岸矣而江廣進引毎引約費錢餘不等様鹽毎包數釐不等查批書吏毎船數兩不等計嵗費又至數萬金其苦六也又言淮鹽掣摯三大弊其一為加鉈之弊掣官毎籍餘觔虧額為名不論鹽包輕重暗挂觔兩毎一引増至二三十觔不等利歸於鉈而病中於商其弊一也其一為坐觔之弊掣官又藉合算底馬為名不論觔重有無預定餘鹽商鹽非多帶觔兩不能抵補掣費毎一引帶至四五十觔不等公觔愈多則私科愈重其弊二也其一為做觔改觔之弊商之姦良不一姦商觔多賂入可以填少良商觔少賂不入亦可以填多掣官於未掣之先議定使費暗做觔兩已掣之後議定使費又暗改觔兩其弊三也此三弊者惟有請㫖嚴禁觔重一法火鹽出場滷耗雖有参差觔兩原自無多乞交部酌議定例凡橋所掣摯溢觔割没少者三四觔多者七八觔不得逾額如姦商夾帶過多掣官有虛填太重者商則計引科罪官則計觔坐賍則掣騐公而國法信疏上奉諭㫖各處鹽差官員因循陋規巧立名色額外私派苦累商民據席特納所奏情節俱實各鹽差積弊作何禁止經部議將私派等欵嚴禁勒石立於橋所及經過闗津口岸永行禁止如有違禁私派苦累商民者照律治罪停止鹽政官員徴收鹽課議叙例順治十八年以内外大小官員勢豪之家貿易販鹽倚勢不納課銀巡視鹽課官員畏勢徇情即致課銀虧欠於是有管鹽官稱職者從優議叙課額虧欠者以溺職治罪之例至是僉都御史陳一炳條議巡鹽御史及運司分司州縣等各官任内徴收鹽課不能全清虧額者仍照考成定例處分其全清及溢額議叙紀録加級俱行停止又停止鹽課預徴巡鹽御史席特納等疏言兩淮鹽法春夏行鹽秋各納課相沿已久原照引數徴納並無計日催徴之例祇因康熙七年鹽臣差遣稍遲時日部覆鹽差在任一日即有一日考成之責於徴完本年課銀外又行重徴新鹽四月方掣新課即於五月開徴鹽尚未賣一引而課已催至二十餘萬此種金錢追呼無措非重利掲債即典鬻赴比最為苦累及查此項課銀前差所徴仍入後差考成例於八九等月起解九十等月到部是商人徒受預徴之苦而鹽課並無預徴之益官收一金商費數金年年逓壓流害無窮兩淮鹽課一百五十餘萬毎嵗報完早徴於額不増遲徴於額不减查民間地丁正賦尚禁預徴商民徴納法無二視伏乞交部議將五十七日預徴立行停止户部議覆兩淮御史按日扣算考成後差任内徴銀作為前差御史考核係歴差額徴不便更改疏入上以預徴原非舊例飭部再行確議户部覆奏該御史既稱此五十七日課銀預徴累商應照所請令後差御史徴收十二年定長蘆等處鹽務仍令御史巡視順治二年定巡視兩淮長蘆兩浙河東鹽政差監察御史各一員嵗一更代順治十年裁去各省巡按御史將巡鹽御史一併議停鹽務交與運司十二年部覆科臣條議以運司權輕難以糾劾鎮將抑豪强禁私販請仍擇㢘能風力御史巡察康熙七年部院㑹議嗣後鹽差不分滿漢應將六部郎中員外郎及監察御史選擇賢能官員毎一差滿漢官各一員康熙八年侍郎李棠馥奏巡鹽原差御史不獨鹺政利弊兼有舉劾地方官員并察拿惡棍之責應將六部司官停差専差御史以便責成至康熙十一年左都御史杜篤祐奏准停差巡鹽御史歸併各巡撫督理至是九卿等㑹議直𨽻巡撫金世徳疏言直屬事務殷繁長蘆鹽政巡撫勢難兼顧請仍差御史專理應如所請其兩淮兩浙河東三處鹽政亦仍照例差御史巡視從之十三年添設江南安徽驛鹽道其管理通省驛道改為江蘇等處驛鹽道是年添設四川督糧道及湖北驛傳道俱兼管理鹽務至十四年改陕西固原道為平慶道管理驛鹽事務十七年刋刻竈户由單先經臺臣奏場竈丁地錢糧照民户地丁刋刻由單部議行令鹽臣查覆嗣據兩淮巡鹽御史郝浴疏稱刋刻由單則總竈無包攬之隠情散竈知正供之確數亦似有禆鹽政部覆施行十八年蠲免福建舊欠鹽課銀兩以海澄等十三縣厯年被兵故也二十年革除廣東福建鹽務積弊先是尚之信在廣東令其部人私充鹽商據津口立總店耿精忠在福建横徴鹽課乆為民害命該部檄各督撫悉革除之停止奉天銷引聴民人自行貿易九卿議覆户部侍郎達都疏言盛京地方係招徠安挿之民其烏喇以内居住之人並新滿洲邊外䝉古等盡屬窮苦自康熙十八年召募商人吕進寅等領引行鹽徴課無幾而鹽價騰貴將及二倍窮民難以資生請停止銷引民人有情願煎鹽發賣者聴其自行貿易不許豪强覇佔更行令奉天將軍户部侍郎查緝嚴禁應如所請從之二十一年以髙亷鹽田既復令廣西食鹽仍復舊例兩廣總督吳興祚疏言謹按舊例廣西南太思三府俱食亷鹽鬰林等處俱食髙鹽挽運甚便後因鹽田盡遷改銷梧引今髙亷二府鹽田既復請仍照舊例改食髙亷之鹽路近價賤有便於民從之又蠲免廣東渡口鹽埠額外加増銀兩户部議覆廣東巡撫李士禎疏言渡口鹽埠等項較舊額増銀六萬五千餘兩均請蠲免從之二十二年議修撰漕運鹽法二書户部題臣部專治錢糧而錢糧事務莫大於漕運鹽法但漕鹽二項條欵繁多隨時因革如撥餉裁員截漕増引以及商民旗弁之優恤鹽課運艘之増減合加纂集查臣部主事趙吉士張琦纂修㑹典將次告成應即令其續修漕運鹽法二書臣等覆加檢閲再行繙繹進呈從之又蠲免山西修築鹽池包賠銀兩户部議覆山西巡撫穆爾賽巡鹽御史馬爾漢疏言前撫圖克善查核鹽丁將老少病廢盡行開報迨鹽池水患仍責鹽丁修築以致力役交困里甲包賠今通計包賠一萬七千一百餘丁銀一萬五百餘兩請行豁免從之二十五年定江西南贛二府仍食粤鹽江西南贛吉安三府原食淮鹽後改食粤鹽康熙五年兩淮御史黄敬璣請將吉安一府仍食淮鹽康熙十七年南贛二府改行淮引至是廣東巡撫李士禎疏言粤東濱海小民藉鹽以資生從前江西南贛兩府俱食粤鹽因康熙元年禁海以來粤東路阻後改食淮鹽今粤省平定已久産鹽甚多銷售無地請循舊例令南贛兩府仍食粤鹽銷引下部議行二十六年准陳州項城等處改食蘆鹽陳州項城等處舊食解鹽並舞陽縣均于眀季改食淮鹽各屬距淮窵逺風濤險阻脚費既多鹽價騰貴額引難以完銷河南巡撫章欽文奏請比照懐慶府之例改食蘆鹽以長蘆距豫道路平坦挽運甚易引課不難完銷將六屬額引九千一百張改増於長蘆國課無虧民生有益部議應如所請將兩淮之課照數除去自康熙二十七年為始増入蘆額得㫖允行二十七年清釐粤省鹽政諸弊廣東巡撫朱𢎞祚條奏粤省鹽政一查從前僉商掣鹽納餉凡上下大小衙門皆有公費官役分派取用此乃正課之外加出私派者請嚴行禁革一埠商定例三年一换倘商人内有公平交易地方相安者應令永逺承充其欠課及作姦犯科者即行驅逐另募充補一各州縣銷引設有定額如東莞増城等縣逼近海洋無地非鹽小民就近取食官引難銷其餘州縣户口繁多或有官引不敷之處請酌量増減又私廢埠商課餉派徴田畝有累居民請仍令招商行運一粤省舊駐尚逆黨棍未靖或冒名旗下或投托現任謀充卡商踞地為害請敕查冒名旗人及投托現任文武各官佔奪民利者嚴加處分一粤省地方遼濶易於行私艱於巡緝如虎門港口惠州浮橋等處皆為要津請專委佐貳亷幹之員駐守盤查一粤省行鹽原有生熟二引熟鹽出歸徳等場生鹽出淡水等場民間嗜好不一有食生鹽者有食熟鹽者自尚逆在粤時以生熟鹽引限令三七配搭派往鹽埠行銷民間多有不便請嗣後隨商掣運隨民買食不拘定額以利商民一掣鹽之地多一次盤查即多一次冗費如佛山距省城不過三十里省城掣定之鹽行至佛山應免其復行稱掣一粤省鹽價㚥商多任意増加今各項陋規俱令禁絶商人雜耗既少鹽價自宜少減請酌水陸運費之多寡以定鹽價之低昻逺者以一分二釐為準近者以七釐為準如遇陰雨量加一二釐商民兩便至奸商攙和沙土諸弊一併嚴禁從之二十八年豁免河東本年分額徴鹽池地租又豁免長蘆新増引課户部議覆直𨽻巡撫于成龍疏言長蘆新増鹽引原因軍興需餉暫議加増數年以來積引難銷請賜豁免查康熙十四年因軍需按引加増五分已於康熙二十五年停止今所増新引乃康熙十七年按人丁加徴並非因軍需所増應不准行得㫖長蘆新増引課照該撫所題豁免嗣於二十九年蠲免新増天津鹽引課餉亦如之敕甘肅巡撫就近管轄徴收花馬小池并臨鞏二府鹽課河東巡鹽御史索禮疏言陕西花馬小鹽池並臨鞏二府鹽課去河東衙門遼逺不便徴收請令甘肅巡撫就近管轄徴課從之豁免雲南黒井鹽課雲南巡撫王繼文疏言雲南黒井鹽課前因官兵衆多吳逆題請加増今全滇恢復之後逆屬家口盡行遣發投誠人員安挿各省食鹽甚少此項加徴課銀懇祈豁免從之二十九年定直𨽻宣化各屬自煎食鹽例直𨽻巡撫于成龍等疏言長蘆行鹽地方惟宣屬最苦請將額引除去聴民自煎食鹽仍照舊額納課從之三十二年以西鳯二府嵗歉暫減額銷鹽引之半俟年豐仍照舊額行銷又議定改設兩廣鹽政所屬人員吏部議覆巡視兩廣鹽政太常寺少卿沙拜疏言兩廣鹽政向屬撫臣兼理課餉引目係驛鹽道提舉司經管兹䝉皇上欽差管理鹽課所屬之員自應照例改設將驛鹽道改為運司潮州一府離省窵逺行鹽亦多必得専員管理應將提舉裁去改設運同使之駐劄潮州催徴課餉廣州府有歸徳等埸惠州府有淡水等場為鹽觔出産之所課餉之源必湏設立分司催徴巡緝應如所請從之三十八年減兩淮鹽課二十萬以紓民力奉諭㫖朕子育黎元勤求治理日孜孜以施徳澤厚民生為急務而江浙二省尤東南要地朕時切軫念比嵗以來蠲豁田賦賑濟凶荒有請必行無災不䘏雖漕項錢糧向未蠲免者亦曽特㫖蠲免愛養之道備極周詳庶㡬民生日益康阜用是乗輿時邁於視河事竣巡厯江浙咨訪民間情形見淮揚一路既困潦災而他所過州縣察其耕穫之盈虛市㕓之贏絀視十年以前實為不及此皆由地方有司奉行不善不能使實惠及民所以小民雖懐愛戴之誠而朝廷恩澤卒未下究朕目擊厪懐亟思拯恤截留漕糧寛免積欠另有諭㫖惟各鹽差闗差向因軍需繁費於正額外以所私得盈餘交納充用今思各官孰肯自捐私橐必仍行苛取商瘠民困職此之由著將加増銀両一概停罷以紓商民之累其兩淮鹽課恐商人辦課維艱有漸至匱乏者著減去二十萬兩朕視民如傷惟恐一夫不獲其所兹值海宇昇平兵革不事正當與民休息之時故特渙沛徳音減徴寛税以為閭閻留有餘之力爾部即遵諭行減浙江鹽課加徴銀三萬一千三百兩三十九年免緝私官兵獲鹽不獲人及私梟不能全獲處分江南總督阿山疏言大夥鹽梟結黨興販遇有獨行船隻及孤僻村莊恣肆刼奪實為小民大害臣令兵弁協力緝拿設遇鹽梟抗拒傷民梟賊不能全獲即罹重譴故兵弁遇有賊犯不無躊躇却顧臣思販私之徒盡屬輕生亡命之輩緝私勢必拒捕拿獲十人以下私梟不能叙功不幸兵丁有被殺傷專汎官即罹重譴則人皆自顧其功名性命所以反生懈怠臣請嗣後巡緝小夥鹽徒不論外若大夥鹽船有能人鹽全獲者臣與巡鹽御史酌量捐賞凡私販知風預行逃走止獲私鹽變價充餉設或私梟黨衆官兵不能全行緝獲而兵丁或被殺傷專兼各官從寛概予免議一年不獲仍照舊例處分其有縱私不緝者仍定嚴例繩之庶幾將弁思奮地方寧謐部議覆准其縱私不擒者專汛官革職兼轄官降二級調用不知情者仍照失察私鹽處分四十三年勒石嚴禁兩淮鹽務浮費江南總督阿山疏言兩淮鹽課甲於他省全賴商力充裕價平民便易於銷辦急應禁除浮費如賞給差役如餽送别意如過往贐儀皆鹽政差滿所用也又如帶行鹽觔如隨費飯食如重收桅封則鹽政書差規例也又如巡鹽到任規費如過所稱掣鹽觔如到任預借息銀如承差二十名之内㸃用發收一名以經手諸事魚肉衆商致鹽多壅滯商民交困請悉行禁革勒石建碑嗣後如有違禁即行指名題叅從重治罪奉㫖請革各欵大有禆於商民著勒石永行嚴禁四十四年敕禁直𨽻山東兩省私鹽奉諭㫖朕頃者南巡見直𨽻山東兩省販私鹽鑄私錢者甚多傳諭該部嚴行禁止四十八年議定均派行銷鹽引並改就近食鹽以利商民之事廣東巡撫范時崇疏言廣東連州總鹽額引原派行銷本州及湖廣之桂陽臨武藍山嘉禾等四州縣樂昌總鹽額引原派行銷本縣及湖廣之彬州宜章興寧永興等四州縣今應將此項引餉作為十分量地均匀連州樂昌二處行銷十分之三桂陽彬州等八州縣行銷十分之七又潮州惠州贛州三府俱行銷廣濟橋之鹽此三府所屬平逺鎮平程鄉興寧長樂五縣額引較别州縣獨多而惠州府屬之龍川和平永安三縣及江西贛州府屬十二縣額引獨少應將平逺等五縣之引匀銷於龍川等十五縣至贛屬十二縣内信豐龍南定南三縣原食潮鹽接壌惠州距潮路逺轉運維艱應就近改食惠鹽又福建汀州府屬八縣額引内長汀一縣之引幾居通府之半應撥長汀縣額引匀銷於寧化等七縣廣西所屬鹽引易銷者為全州灌陽興安三州縣其鹽引難銷者為靈川陽朔義寧三縣應撥靈川等三縣額引匀銷於全州等三州縣庶於商民均有禆益部議應如所請從之四十九年定湖廣鹽引無分南北一例通銷户部覆准兩淮巡鹽御史李煦㑹同湖廣督撫等奏楚省長岳等十二府一州向行淮引原係酌量地方食鹽多寡通融銷售自康熙六年將向食粤鹽之衡州永州寶慶三府改行淮引遂致各守口岸不能通銷而衡永寶三府又有粤省私販鹽引壅積請照舊例不計疆界一例通銷運到漢口之鹽聴水商分運各處銷賣合力緝私同心辦課兩有禆益從之五十年定兩浙鹽差交代之期兩浙巡鹽御史顓圖疏言兩浙鹽差於毎年十二月交代請改期八月當秋水滿盈盤運不難則錢糧易於完納下部議行五十三年准川鹽加増引額户部議覆四川巡撫年羮堯疏言查成都所屬犍為等七州縣竈民請増水陸鹽引一千一百四十五張徴税銀七百三十兩有竒於康熙五十三年為始徴收以便民食應如所請從之臣等謹按四川一省請増鹽引嵗有陳奏盖蜀中經明季兵燹之後招集流亡土著者僅百分之一二江楚人民往耕其地動成村落我國家休養生息日見蕃庶是以户口嵗増食鹽者衆請増請給數倍於昔而鹽井所生流澤孔長滇黔連界盡仰食於斯盖自成都以外各郡邑水陸鹽引悉無壅滯舉此一隅以見蜀中鹺政之大概云五十七年添駐兵丁於三江營緝防私販兩淮巡鹽御史李煦疏言揚州府屬三江營地方惡棍販賣私鹽者甚多雖有分防汛兵為數極少不敷巡防之用應於京口將軍標下派兵一百五十名千總一員赴三江營地方駐防聴江寧府江防同知鈴束從之五十八年裁去山東膠萊分司令濱樂分司兼管山東巡撫李樹徳疏言東省濱樂膠萊各設分司一員膠萊分司不過在雒口騐放商鹽出闗查雒口離省僅十餘里而鹽法道駐劄省城騐放最易請裁去膠萊分司其應管事務令濱樂分司兼轄從之裁湖北驛鹽道即以湖北糧道管理從總督滿丕請也五十九年議定兩廣鹽務交與兩廣總督管理户部等衙門議覆廣東廣西巡鹽御史昌保疏言兩廣鹽課有厯年積欠九十一萬餘兩康熙五十七年十月經督臣楊琳題請先完新餉舊欠五年帶銷臣於康熙五十八年三月到任以舊欠全未清完因截住新鹽飭完新餉不但舊欠未交新餉又復拖欠且塲鹽缺少私鹽横行臣力不能任請將臣撤回交督撫管理庶新舊課餉得按年清完應如所請將兩廣鹽務並新舊錢糧交與兩廣總督專理從之定就撫鹽梟重販私鹽之罪刑部題直𨽻各省有鹽梟就撫之後復行販賣私鹽者應將本犯解部充發科布多烏蘭固木地方其從前受撫出結之地方專汛兼轄各該管官俱照失察例議處從之六十年敕江浙官兵嚴緝私匪奉諭㫖聞江浙私鹽盛行盡為盜賊地方官員明知並不查拿應著江南浙江京口將軍等派出兵丁嚴行查拿大學士九卿詹事科道等㑹議查江浙行鹽地方遼濶若令官兵在一處查拿不能徧緝江南京口地方應交與江南京口將軍毎處㨂選賢能協領各一員佐領防禦等各八員兵丁酌量派出各分明地方除窮民肩挑背負小販外其大夥私販嚴行查拿如有能拿獲大夥私販一次者准其紀録一次獲二次者准其加一級該督撫等不時稽查如有不將偷販私鹽之盜賊緝拿混行生事者亦即行題叅其地方文武官員議處議叙之處俱照從前九卿原議定例遵行至雍正元年以江寧私梟甚少停止江寧滿營官兵協捕雍正元年飭各省鹽道革除鹽法陋例積習奉諭㫖邇年鹽法弊竇叢生正項毎多虧欠一由上下各官需索商人巧立名色誅求無已窮商力竭不得不挪新補舊上虧國課髙擡鹽價下累小民一由商人用度奢靡相仍陋俗不知節儉致欠額徴爾等運籌鹽法宜將陋例積習盡情禁革必思何以甦商何以裕課上供軍國下利閭閻方為稱職又以崇尚節儉敕諭各省鹽政官員奉諭㫖國家欲安黎庶莫先於厚風俗厚風俗莫要於崇節儉周禮一書上下有等財用有度所以防僣越禁驕奢也孟子亦曰食時用禮菽粟足而民無不仁朕臨御以來躬行節儉欲使海内之民皆敦本尚實庶康阜登而風俗醇夫節儉之風貴行於閭里而奢靡之習莫甚於商人朕聞各省鹽商内實空虛而外事奢侈衣服屋宇窮極華靡飲食器具備求工巧俳優妓樂恒舞酣歌宴㑹嬉遊殆無虛日金錢珠貝視為泥沙甚至悍僕豪奴服食起居同於仕宦越禮犯分㒺知自檢驕奢滛佚相習成風各處鹽商皆然而淮揚為尤甚使愚民尤而效之其弊可勝言哉爾等既司鹽政宜約束商人嚴行禁止出示曉諭諄諄勸誡使其痛自改悔庶循禮安分不致蹈僣越之愆而省一日靡費即可以裕數日之國課且使小民皆知儆愓敦尚儉約庶不負朕維風振俗之意若仍前奢侈不知悛改或經朕訪聞或被督撫叅劾商人必從重究治爾等亦不能辭徇縱之咎又定湖廣鹽觔價值先是奉諭㫖據楊宗仁奏請欽定鹽價固執伊所原題具奏朕視民商皆屬一體士農工商雖各異業皆係國家子民理當一視著黄叔琳謝賜履前往楚省㑹同楊宗仁將鹽價作何酌定之處確議具奏經部臣黄叔琳等覆奏伏查厯来鹽價貴賤之因率由塲竈産鹽多寡不一運到口岸先後不齊嵗時豐歉不常之故但查康熙三十年間楚省鹽價毎包一錢是以督臣楊宗仁因照此減定兼革陋規亦兾稍便於民其於正雜加増實未深悉而鹽臣謝賜履專司鹺政通計銅觔織造河工並帶徴等項毎年加増數十萬兩不得不代商人縷晰陳奏臣等公同酌議除照裁革陋規毎包減去六釐外於價賤時毎包以一錢一分九釐為率於價貴時毎包不得過一錢二分四釐但楚省有安梁二種黒白不同價亦稍有低昻安鹽毎包應較梁鹽再減二釐飭令遵行商民兩便疏入如所議行二年定廣西鹽法廣西總督孔毓珣奏稱粤西地處邊逺商人資本無多往往悞鹽悮課欲求便民裕課惟有官運官銷一法通計合省一年鹽觔賣出價内約有餘銀四萬六千六百八十餘兩二年之内共約餘銀九萬三千三百餘兩存銀六萬兩永為毎年鹽本運費之用尚餘三萬三千三百餘兩交貯道庫行至下年盈餘又増於第三年將通省鹽價照部定之價毎觔減去二釐毎年所得餘銀四萬六千六百餘兩之内約減二萬七千八百餘兩尚餘銀一萬八千八百餘兩收貯道庫遇有地方公事撫臣奏明支用核實造冊題銷部議准行嗣經廣東督臣等奏福建所定鹽法將鹽院衙門各官及商人盡行裁革鹽課均攤各塲交與州縣官照數收納殊覺簡㨗但廣東與福建地方懸殊若著地方官赴塲納課運鹽必委之家人衙役非設舖分賣中飽花銷即分發地里按户勒派臣等商議廣東課餉不缺全在收鹽充足應將塲商停設仍發帑委官監收埠商仍留完課運鹽内有課餉難完無人充商之地著落地方官領鹽運銷解價完課引多壅滯地方有可以代銷者聴其呈明代銷從之又以兼理鹽政申諭各省督撫奉諭㫖從來鹽差之弊飛渡重照貴賣夾帶弊之在商者猶少加派陋規弊之在官者更多若不徹底澄清勢必至商人失業國帑常虧夫以一引之課漸添至數倍有餘官無論大小職無論文武皆視為利藪照引分肥商家安得而不重困賠累日深則配引日少配引日少則官鹽不得不貴而私鹽得以横行故逐年之課難以奏銷連嵗之引盡皆壅滯非加派之所致與鹽差惟在力除加派使商困少蘇盡復舊業則課自盈餘至於督撫係封疆大吏更當仰體朝廷歸併之意巡鹽御史地方官或不奉約束今歸督撫則孰敢抗違况欽差猶毎年更换而督撫兼理則無限期若不實心奉行使風清弊絶則大負歸併之本意矣至將耗羡充課固屬急公但恐以耗羡歸正額而正額之外復加耗羡商民重輸叠出何以堪此朕深悉商民營逐之苦特諭爾等其悉遵朕㫖又議准湖廣江西及江南上江等處毎引加鹽五十觔户部侍郎李周望等議兩淮所行之鹽如湖廣江西及江南上江等處地方濶大而鹽不敷用者自甲辰綱為始准其毎引加鹽五十觔其山陽等州縣逼近埸竈鹽不易售不必加鹽照舊遵行又敕查漕船私鹽於運河口奉諭㫖漕船回空夾帶私鹽固宜嚴禁但仍照例在運河口内地方派官捜查查出私鹽必究明根窩場竈照例治罪若至大江不可攔阻捜查致生事端有悮漕運又議給竈丁鹽價復設兩廣運同一員福建汀州府鹽務即令知府領運辦理户部議覆兩廣總督孔毓珣奏發帑收鹽所給竈價水脚銀兩照從前所定數目毎十分之内加増一分其所加銀兩即於埠商鹽包内議増之羡餘銀二萬兩内給發汀郡引課通融長汀等八縣協辦銷售專責知府彚總務將毎年引課照數全完淡水等埸皆係地勢廣逺産鹽甚多應㨂選㢘幹之員分委督收至兩廣運使原設有運同一員應准於潮州府照舊復設得㫖報可嗣於雍正十一年以髙亷二府私鹽充斥知府不能兼管添設髙亷二府運判一員又飭巡鹽御史酌量時價改撥綱地行鹽以濟民食巡鹽御史噶爾泰題明食鹽難銷之處值有綱地行銷不敷臨時改撥又海潮淹没竈煎不繼鹽少價貴成本倍増懇祈隨時銷售奉諭㫖鹽價之貴賤亦如米價之消長嵗歉則成本自重價亦隨之嵗豐則成本自輕不待禁而自減近來聞得自湖廣禁價之後以致商竈居民皆甚不便此楊宗仁一時偏執之見朕意若仍隨時銷售以便商民均屬有益該部於此本内一併確議具奏尋議除壬癸二綱積存廩鹽從前煎辦之額應仍照依平價運銷其自雍正二年海潮淹没以後煎辦不繼商本自必倍増應令該御史以本年成本之輕重合輓運逺近脚價酌量時價移㑹曉諭商民公平買賣隨時銷售不得禁定鹽價以虧商亦不得髙擡時價以病民至食鹽之課輕於綱鹽如果有綱地行銷不敷之處應將何府州縣并可銷若干之處查明具題改撥照綱輸課暫濟民食俟各場煎辦旺足即行停止三年巴東縣地湧鹽泉准於楚北州縣行引分銷户部議覆湖北巡撫納齊喀疏報荆州府巴東縣北紙倍溪地方忽湧鹽泉居民煎煮毎日得鹽約二千餘觔請照淮鹽行引於楚北各州縣分銷應如所請從之又裁波羅冲可克地方鹽務官怡親王允祥等議覆原任大將軍年羮堯奏稱臣在西寧時因邊外波羅冲可克舊有鹽池青海蒙古人等運來邊内貿易西寧軍民賴食此鹽臣奏設副將一員兵一千六百名駐防彼處將西寜通判移駐管理鹽務在案現今郡王額駙阿寶移在波羅冲可克地方駐劄無庸復駐官兵其管理鹽務之通判亦應裁去應如所請從之五年定滇鹽減價増薪之例户部議覆雲南總督鄂爾泰奏黒鹽一井薪本不敷請毎百觔加銀四分二釐又額煎撥給鹽觔毎百觔酌加銀二錢應如所請行至稱黒鹽發價於毎觔額定三分内再減二釐之處不准行奉㫖地方出産有舊無而可以新増者亦有舊有而應當裁减者若有彼此抵算之項准據實奏聞則事皆核實倘但令増添而不許裁減殊非公平之道且隠瞞那移之弊由此而生著鄂爾㤗查明鹽觔内所増銀兩抵補減價増薪之數定議奏聞嗣經鄂爾泰奏滇省各塩井新増正課之數共銀五萬七千七百八十三兩减價増薪之數共銀一萬九千餘兩抵補有餘請如前奏議行從之又河東池鹽獻瑞産鹽七百萬餘觔河東鹽政碩色奏報十月初三日起至十一月十一日止池鹽獻瑞不需人力自然滋生多至七百萬餘觔悉皆顆粒盤簇味甘如飴逈異常鹽下部知之六年停止河南省知府彚銷鹽引例河南總督田文鏡疏言豫省惟汝寧一府九屬係食淮鹽各州縣自應各照額引督銷如銷不足引者應照分數叅處乃因光州所屬之光山固始等縣與湖廣連界湖廣食鹽價貴奸商趨利盡將汝寧府屬之鹽賄通光州等處地方官全運湖廣作私鹽貨賣故光州等處毎年銷引溢額而汝寧府屬之汝陽上蔡新蔡西平等縣終年不銷一引謬謂民間不食官鹽毎引一張派令小民出銀一錢八分解府通融奏銷甚為民累至汝陽上蔡新蔡西平等縣俱與銷食蘆鹽之陳州項城等州縣連界又以長蘆之官鹽作私鹽自行販運買食各縣紳衿富户俱縱令家人佃户挑販私鹽鄉地巡役不敢過問及至奏銷派課止累一二窮民更為偏苦葢因彚銷之知府有收課分潤之肥督銷之知縣無分數考成之咎近楚之地方又有商人買路之規運銷之商人坐獲官引私銷之價欲絶其弊當先嚴以法部議應如所請嗣後汝寧一府所屬引鹽停止知府彚銷令各州縣招募殷實水商取結送部准其行鹽辦課該管州縣按季督催各銷各引將商人運到鹽觔按引註明某州縣於某年月日行銷字様並截去一角鈐盖印信俟銷完日繳部查騐違者罪之報可議准修理河東鹽池經費河東巡鹽御史碩色疏言河東鹽池為山陕河南三省食鹽所闗其防水之池墻渠堰均屬𦂳要查舊例於額外羡餘之内毎年動撥銀五千兩嵗修渠堰而鹽池一帶若不毎嵗修補恐致大修之年倍多費用請於添設餘引羡餘銀内毎嵗再動撥六千兩以三千兩作嵗修池墻之用以三千兩存貯運庫積至五年以作大修之費則池墻渠堰俱可永保完固此等工程運同不能獨力兼營請於附近州縣㨂選幹員凡遇修築之時委用五六員協助監修庶事有専責而工無怠誤從之又議准福建督臣條奏鹽政五條户部議覆福建總督髙其倬條奏閩省鹽政事宜一謹産地之收曬閩省鹽場福清一場最大其各團所産之鹽零散難稽請建設總倉令各團曬丁將所曬之鹽統歸一處封鎖則稽查自易且免雨濕水淹之患莆田一場各團滷窟並無遮蔽應設法修砌以資防䕶至潯美􅜉州梧州惠安漳浦南埸金坑漳南詔安等場俱各委員整􅉐期有實效一嚴銷地之售賣閩鹽向係商行後改為官賣近復用水客肩販請暫令水客分認行銷而以官運接濟俟行之三年有辦理無誤者報部僉為商人再請發引以立成法至存貯鹽觔照例於場鹽多産之時官動課銀就場收積以備接濟一定鹽課之額數閩省鹽課有額徴公費二項共徴銀一十七萬有竒是為正額其額外溢行之鹽乃為盈餘除支給鹽道暨各場官役公用外俱造入盈餘冊奏銷一酌辦理之人員閩省舊設辦理鹽務各官雍正二年悉行裁去嗣後請於通省佐雜官内遴選亷幹之員管理鈐束仍不時遣官巡查均應如所請從之又定浙省玉環各嶴征收漁鹽税銀例户部議浙省玉環各嶴舊有採捕漁船應照例刋號給牌令赴玉環查騐其濱海煎鹽之户亦令編入保甲並竈聚煎官收官賣毋許私販出境所有漁鹽税銀即以備各項公費之需俟玉環一切經理完備後另照内地之例各歸藩司鹽政項下充餉從之又飭江常鎮道督緝鎮江閘口私鹽户部議覆總督兼理兩浙鹽政李衛疏言江南蘇松常鎮四府民間食鹽定例行銷浙引至京口一帶地方接壤兩淮僅隔一江私販易於偷渡是以從前鎮江閘口責成文武各員盤騐捜查但日久法弛以致私販潛滋浙鹽壅滯請交江常鎮道就近管理督同鎮江府海防同知京口將軍標下副將鎮江城守叅將輪流分班經管不論糧船兵船差船如有夾帶私鹽許即嚴拿其水陸一切私鹽並令查拿倘有踈縱失察照例糾叅仍嚴禁官弁兵役毋得勒掯商民需索進閘使費倘該道員不能實力整􅉐該督即行指叅照例議處應如所請得㫖依議盤查私鹽著該管官員實力奉行並令江南巡察御史不時訪察又定私梟連坐之法浙江總督李衛議覆江南督臣奏稱私梟窩囤已經㑹題舉行十家連坐之法如一甲之人不行出首致旁人首告者其甲長及同甲人等一併治罪查連坐之法惟當就兩隣甲長嚴治其罪足蔽厥辜若因一人而株連及於同甲之十家未免罹法者繁且恐反畏同罪衆口朋比隠匿難以稽查應請尋常興販止治兩隣甲長以不首之罪若大夥窩囤聚衆拒捕者將首犯之同甲一併連坐從之又議准兩淮鹽場設立竈長保甲以清鹽政户部議覆浙江總督李衛遵㫖㑹議兩江總督范時繹等條奏兩淮鹽務一各竈燒鹽處令商人公舉幹練殷實者按其塲竈酌用數人並設立竈長巡役查核其鹽之多寡盡入商垣以杜竈丁私賣之弊一凡州縣場司俱令設立十家保甲互相稽查遇有私販據實首明將本犯照例治罪私鹽變價分别賞給誣者治以反坐之罪倘有狥隠等情被旁人告發者該州縣場司官照失察私鹽例叅處俱應如所請從之臣等謹按保甲之法所以靖盜源而著效莫切於場竈盖都㑹郡邑以及鄉里市鎮土著者與外來相間奸良錯雜遷徙靡常非精勤職事之員鮮能徹底清釐永久無弊惟鹽埸竈户星羅碁布環聚而居且皆各有執業不同㳺手少為檢察一望可知其法以十家為甲十甲為保櫛比鱗次不湏越户編排保長甲長謹司其事私煎私販無自而生而且晝夜之守望相助蕩草之有無相通盤䥕之假借相近兼以賑貸之恩旁施遍及丁男户口指掌可推保甲之易行而有效無過於是惟在場官及地方有司力行而堅守之有要有倫不踈不懈則鹽法中所以清釐場竈之道思過半矣又禁鹽場竈户私置盤䥕并定淮北矖掃餘鹽商買配運例江南巡鹽御史戴音保條奏從來場竈燒鹽之具深者為盤淺者為䥕設有定數無許過額而煎燒鹽觔以一晝夜為火伏竈户臨燒向本商領取旗號舉火則張旗息火則偃旗垂為定例又有巡查之人往來場竈間用防息火之後復又私煎近來竈户毎多私置盤䥕而火伏又不稽查是以任意煎燒毎多溢出之數請飭鹽法官將在埸盤䥕徹底清查再嚴火伏之法如有額外私置盤䥕於火伏之外私行煎燒者即以販私之罪罪之又淮安之北五場用潮水曬掃成鹽難與火伏一例請責令各埸官凡日掃之鹽全數送入商垣餘鹽令商人收買配運酌加引課報部查核下部議行七年清理山東鹽法添設膠萊運判一員户部議覆欽差刑部左侍郎繆沅等條奏山東鹽政事宜一永阜永利濤雒三埸灘廣鹽豐率皆露積請設立官鹽坨將所産鹽觔収貯編設保甲互相稽察一商人領引行鹽毎多重複透運請設水程騐單隨領隨運一州縣行鹽殘引應按期繳銷如地方官督催不力請嚴查掲㕘一東省十場地方遼濶運同一人鞭長莫及請復設膠萊分司運判一員分任營轄均應如所請從之八年定川省鹽引行銷分别納課例奉諭㫖川省鹽課考成惟責之産鹽州縣其餘並無巡查之責且有僻逺地方不行官引以致私販充塞甚為鹽政之弊應将官引通行各省約計州縣户口之多寡均匀分發引張令其各自招商轉運倘有壅滯責成各州縣定為考成如此則有司等自必加意查察使私販息而官引銷弊端可釐剔矣著督撫詳議具奏經四川督撫覆奏稱川省州縣如簡州閬中等三十九州縣均係産鹽地方原無引目分發各州縣招商辦運應將各州縣應銷引目計算户口另請増給責令竈户照商人一例行銷辦理至所産鹽不敷民食之處亦令計算户口分認别州縣招商行運其不産鹽之成都華陽等州縣㕔衛共九十九處均令分認引目招商運銷又疏稱僻逺州縣如松潘衛南江縣儀隴縣建始縣四處或道處遥逺或治設山僻路途﨑嶇人民散處招商不易因而鹽價髙昻貪利奸徒乗間興販應令地方官查明户口約計食鹽配引凡一村一莊配發引目招商轉運接濟民食至各州縣考成既經分引行鹽倘官引壅滯或課税未能全完以及招商遲延私販發覺均仍照定例處分又據稱寧逺一府係新設府治查所屬之西昌㑹理冕寧鹽源越嶲徳昌迷易鹽中等州縣衛所俱食鹽源縣鹽今鹽源縣行銷陸引四百張倘有餘鹽自應查明鹽觔請引行銷查該府所屬八處地方均屬漢畨雜處向來引税俱係就買鹽人民抽收税課應將引目交與鹽源縣令該縣典史駐劄白鹽井地方仍於各屬居民買鹽時抽税又據稱川鹽有例行黔省之貴陽安順平越都匀思南石阡大定威寧並改黔省之遵義滇省之鎮雄烏䝉等十一府州縣及川省之酉陽石砫明正木坪瓦寺金川阿日離谷九姓等各土司並新改設之黄螂雷波等處發賣者從前引目並未帶往各省及土司等處地方蓋因途路遥阻商人不能前進皆係沿途州縣截角掛騐彼處商人轉運該地方截角州縣换給照票以為前途盤騐之據今請將應行黔滇兩省及土司並新設之黄螂雷波等處鹽觔行令該督撫核明水陸引張確數照例刋刻雙聮引根引紙鈐葢鹽道印信分發沿邊州縣俟商人運鹽到日該州縣照部引字號張數填注引根引紙於中縫大書鹽觔數目以引紙截給鹽商照例截角放行其引根飭令該州縣俟鹽觔運銷完日同部引申送鹽道查核繳銷得㫖允行又議准青登萊鹽課攤入地糧征收巡視長蘆鹽政御史鄭禪寶疏言山東青登萊三府所屬之安邱蓬萊十六州縣票鹽舊係招商辦課民情未便嗣後請革除商名聴民自行領票銷賣其應納課銀攤入地糧徴收追報部議應如所請從之又議准東省鹽包分重作輕以便行運並舉行經徴全完議叙之例户部議覆原任長蘆鹽政鄭禪寶條奏山東行運散鹽地方逐一確查除可以整包行運者照舊毎包額重二百二十五觔外其道路﨑嶇車輛難行之處許分作四包毎包五十六觔四兩著為定例至嗣後經徴全完之埸大使並州縣等官請照地丁錢糧經徴五萬兩以下全完之例督催之分司運同通判照直𨽻州知州知府督催十萬兩以下全完之例鹽運使照布政使督催五十萬兩全完之例俱給與紀録一次以示鼓勵均應如所請從之九年勅兩江總督兼行總理鹽政奉諭㫖兩淮所轄地方甚為遼濶緝私禁弊往往官弁視同膜外該鹽政呼應不靈兩淮鹽務著署總督尹繼善兼行總理與髙斌和衷共濟於鹺政自有禆益十年議准廣東子鹽貯省配引行銷户部議覆廣東總督郝玉麟疏稱廣東帑鹽俱由海運赴省往往䟎運稽遲商人候配居民缺食今毎年所收子鹽約有二十封應請存貯省倉遇正鹽遲缺之時撥配商引以濟民食毎包仍照定價收銀三錢六分五釐所收價銀同廣西鹽餘歸入京羡項下據實題報從之又撥節省銀兩加給竈丁鹽價户部議覆廣東總督鄂彌達疏言疏通官引必先杜絶私鹽而粤東私販充斥總由沿海竈丁偷賣所致今該督以竈曬各丁所領官價除完課租等項外所餘無幾不得不冒法鬻私今欲杜私鹽必加増鹽價奏請將淡石二場專歸官辦毎年可節省銀一萬六千三百五十八兩零即分給通省曬丁以培竈户應如所請將惠州淡石二場專歸大使督收管理除毎包給工火銀一分五釐外所有節省銀一萬六千三百五十八兩零即以分給通省曬丁内毎包加銀一分五釐零以為煎曬工本仍行該督飭令該管官不時查察嗣後倘再有鬻私情弊即行從重究治疏入從之嗣於乾隆元年九月據督臣奏鹽丁貧苦即加價收鹽不敷養贍部議鹽有貴賤自應隨時増長以養竈矖乃竟以核定價值致竈曬苦累從前辦理原未妥協應如該督所題將毎年所獲鹽場羡餘銀兩出示曉諭自行銷乾隆元年引鹽為始於通省各場毎年應收鹽一百萬餘包内毎包加増銀四分共銀四萬餘兩以裕竈曬各丁養贍家口之資得㫖允行十一年嚴禁鹽觔虧短並令行銷省分十日一咨以懲遲滯江南總督尹繼善等覆奏王士俊條陳鹽觔虧短價值増昻一欵查淮商捆鹽觔數無虞短少惟是鹽到口岸轉發水商而水商偷出觔兩銷售不可不嚴懲其弊應如所請於引鹽到岸未發之先抽稱不足即將淮商究治如已發水商在地行銷觔兩不足即將水商究治又覆奏鹽船到楚向無時日可稽請於鹽船開行之日將裝載引目及商人姓名定為十日一咨移㑹行銷省分令其依限到岸如遇風大難行即將縁由報所泊地方官轉報行銷省分地方官稽察此外遲延即行究處從之又改設淮南巡道督緝鹽務並令設専營於儀徴之青山頭吏部等衙門議覆原署兩江總督尹繼善條奏兩淮鹽政事宜一淮南三江營地方舊設鹽捕同知不足以資彈壓請改設巡道一員督緝揚州通州各屬暨鹽城阜寧靖江等鹽務以重職任一儀徴之青山頭請立一專營設守備一員把總一員外委把總一員兵一百名江都縣之馬家橋甘泉縣之邵伯鎮北壩僧道橋各添設把總一員兵三十名分駐巡緝應如所請從之又革除廣東坐標行標私收税課之弊户部覆准廣東總督鄂彌達疏言東莞新㑹等十三埠從前各商設立坐標私收漁户帮餉又於各墟場鎮市設立舘舍凡遇挑賣鹽魚鹽菜等物勒令納税苦累貧民請將坐標帮餉嚴行禁革令各商帶罪辦課并曉諭沿海漁户照部定價值減去一釐五毫務買食鹽應用並將墟場鎮市之舘舍行標勒石永禁嗣後如仍有坐標私收帮餉及行舘私收税課者分别治罪又定湖南新闢苗疆行銷淮引户部議覆湖廣總督邁柱疏言永順府屬之永順保靖龍山桑植四縣及辰州府屬分防永綏同知地方向來均屬苗土所食鹽觔原未定額行銷是以該地食鹽價值昻貴今土民輸誠向化改土歸流經辰永靖道王柔奏請照川省引鹽之例借支藩庫帑項令各該地方官承運行銷川鹽内閣議覆楚省行銷淮鹽十分之七若因苗土一隅領運川鹽恐致川私蔓延淮引難銷行令湖廣總督㑹同江南總督兩淮鹽政詳悉妥議另設引張酌減課額運銷淮鹽今㑹查永順所屬四縣及永綏同知地方通計户口照江西吉安口岸引鹽之例共需運鹽三千二百七十一引可足民食應如所請増給淮鹽引目從之定新闢苗疆鹽價湖廣總督邁柱疏言永順府屬之永順保靖龍山桑植四縣毎年需鹽二千七百二十一引又辰州府屬永綏苗疆毎年需鹽五百五十引惟是永順永綏均係新闢地方且又極處楚邊其所増引張應輸課額實難照淮南正綱一例完納今遵部議酌減請照獨行認運之江西吉安口岸一例納課每引納銀八錢四分八釐零查鹽價隨時久奉諭㫖茲苗疆食鹽原奏内開現在鹽價毎觔幾至四分今折中定價雖至貴不得過三分既不過昻以病民亦無過尅以累商於商民實為兩便從之旋於雍正十二年湖督邁柱酌定永順永綏等處改捆包砠觔兩毎小包以八觔為率毎一引改小鹽四十三包咨部准行十二年定湖南常寧縣屯户食鹽行銷淮引湖南巡撫鍾保疏言湖南常寧桂陽二州縣界址毘連屯丁田賦户口欽奉上諭清查歸併常寧例銷淮引桂陽例食粤鹽令屯丁散處常寧縣交界地方食粤食淮不無混淆又因離州窵逺不服縣轄遂有販私抗拒之弊查五十四户屯丁散布彌勒等處實常寧腹内之地今屯户錢糧仍在該州完納烟户門牌又在該州查㸃似此離州窵逺不服縣轄實屬兩歧請將五十四户屯丁田賦户口歸併就近之常寧縣以雍正十二年為始徴收管轄其五十四户之食鹽亦照常寧縣銷引成例改銷淮引可杜私販之源再常寧桂陽二州縣年銷額引經行已久未便更張即此五十四户屯丁銷鹽諒亦無多不便議請彼増此減部議覆准應如所請額引毋庸另議増減從之又定粤省餘鹽價值廣西巡撫金鉷條奏亷州鹽務收買場竈餘鹽以清私販之源奉上諭收買餘鹽以清私販金鉷所奏甚是但私既歸官而官又或行私其間收數之多寡運銷之先後定價之寛刻報課之虛實惟視奉行者何如謂立法以除弊恐弊即因法生亦正未足恃也其廣西通省可否專銷㢘州鹽及亷場餘鹽作何收買動何欵項並如何撥用如何交領能否遍行土司有無闗礙引課之處著鄂彌達等㑹同金鉷一併虛衷熟籌妥議具奏經廣督鄂彌達等奏稱場竈餘鹽不鬻於官即售於私故欲清私販之源不得不用官買之法而官買餘鹽若照正鹽一例給價恐竈丁貪圖重利仍不免漏私之弊今毎包酌定價銀四錢五分以毎包一百五十觔計算毎觔合銀三釐較之額價毎觔増銀一釐三毫零應照所奏行之收買漁鹽既比正鹽額價酌増若照正鹽一例配引納課則工本較重恐致壅滯難銷亦應如所奏毎官鹽一包令帶銷餘鹽五十觔即於正引内填載引程不必另設引目再據稱毎鍋一口應煎得鹽四百觔即以三百觔為正鹽給以額價一百觔為餘鹽給以加價或有多寡不等照此逓算通省各埸應按各場各地定價不必拘定四錢五分約計工本銀四萬兩方能敷用應淮其在於雍正九年埸羡銀内借動俟收有羡餘歸還原項並令將廣西省如何行銷酌搭之處再行查議具奏經廣東督臣等合詞疏稱東省各埸増加價值收買生熟餘鹽價有髙下不同配運搭銷亦異自廣東廣州府等各屬毎包加價由一錢八分以至五錢一分不等其就場配埠塔銷及配銷西省毎包收價自三四錢以至九錢有零不等分晰註冊報部至西省運銷如南太思三府額銷亷州埸熟鹽共應加銷餘鹽六千三百五十一包内除該三府加額一千九百五包外其餘四千四百四十六包分撥於太平等府各土司及寧明歸順二州照數領銷欝林等七屬例配髙州場熟鹽共應加銷餘鹽四千一百五十九包内除該七屬加銷一千二百四十七包外其餘二千九百一十二包再令岑溪容縣北流三縣領銷其該府州共應帶銷餘鹽一萬二千三百七十包該督等既稱生引各埠逓年銷鹽不能畫一未便派定埠地應令該督等按年稽查各埠行銷數目通塞隨時酌撥行運至各埠帶銷生熟餘鹽應令嚴飭各該埠照部定價值一體銷售毋得髙價累民其分撥土司及改土為流地方照各府首邑定價配減四五六釐令各土司該管官運回發賣以便民食其鹽包專責該管知府領運轉發督銷解價至各埠遞年收買餘鹽除撥西省運銷外所餘鹽觔分别搭銷按年造冊送部查核一據稱西省各埠銷此餘鹽毎包除歸還東省鹽本羨餘並扣西省轉運脚費賣鹽工火又扣還埸價納回東省埸羡銀兩並各土司減賣毎年約共羨餘銀三萬餘兩此項羡餘應歸西省毎年於造報正引羡餘外另案造冊題報一西省領銷餘鹽並收買􅠏白兩柵餘鹽該督等既稱毎年共需銀二萬三千兩應於該省官運官銷羡餘銀内暫行動支俟兩年内將所得餘鹽羡餘歸還原項再於餘鹽羡餘銀内提出二萬三千兩永為買運餘鹽之用至雷州府属海康等三埸所收鹽包既僅足供本埠額引之用三埸餘鹽毋庸議收從之又定留各埸竈醃切及貧難挑負售買鹽觔户部議准江南總督趙𢎞恩疏言淮南淮北之通州泰州興化鹽城阜寧如臯等州縣濱以捕魚為業食鹽之外又有醃切一項應按户口及醃切多寡就近埸竈餘鹽酌留漁汛之期於海闗填定鹽數照票赴埸買鹽彚冊報查至各州縣酌留食鹽應令各州縣於城市鄉村查造貧難小民花名年貌置造循環號籌循去環來輪流倒换其鹽無許過四十觔之數或有假托貧難肩挑運送窩囤合成大夥私鹽者仍照律併數究擬從之議准髙寶等處口岸食鹽兩江總督趙宏恩等議前督尹繼善條奏髙寶儀徴等處同淮北綱鹽口岸共増食引二萬道綱引二萬道配運餘鹽所有髙郵州寶應縣泰興縣共請頒發食引一萬道收買餘鹽配運試行一綱告竣如有不足另請續頒倘銷售不前即將餘引繳銷俟行三綱再作準數定額其捆運事宜悉依江甘食鹽成例從之又添淮南儀所監掣官吏部覆准兩江總督趙宏恩等疏言儀所乃淮南綱食引鹽掣鹽重地即鹽政不奉别差亦難逐日身親其事批驗大使㣲員非可代辦是以厯委府佐幹員在儀徴監掣究屬借用應於儀所添設專理監掣一員以重職守嗣後於通省府佐内遴選諳練之員題補並請鑄給淮南儀所監掣闗防報可十三年議准直省鹽法四條兩淮鹽政髙斌疏言一浙閩川粤及長蘆商人於淮鹽接界廣開鹽店多積鹽觔結梟興販私梟借官店為囤户鹽店以梟棍作生涯應行令各督撫實力查拿究治一湖廣界連川粤設有總巡商人究非職官可比宜各選幹府佐一員督率巡查一審鹽案無許避重就輕一江廣水程與引目無異請歸撫臣就近查核完欠分數檄行驛鹽道勒限嚴追下部議行又敕諭兩淮鹽課乙夘綱正額分年帶銷奉諭㫖淮南鹽政課額甲於天下兩江三楚延袤七八千里皆仰給於淮鹽課源用以饒裕近聞湖北旱禾收成稍歉鹽未暢銷楚地素為魚米之鄉湖魚旺産亦號豐收商得資其醃切藉以完課今年漢水漲發魚市稀少又湖南因經理貴州苗疆軍務未暇轉運以致漢口鹽壅未銷積至七八百萬包是乙夘綱正額未能當年報銷而明年乾隆元年丙辰綱又應接年起運兩年並納商力維艱朕心深為軫念用是詳為區畫籌度變通將乙夘未完正額提出分年帶徴自乾隆元年丙辰綱起按年接運則商力既紓完納自無遲悮從此年清年額可永無遞壓之虞又蠲免兩淮埸竈應徴折價錢糧奉諭㫖朕即位之初加恩海内民人已降㫖將雍正十二年以前民欠錢糧悉行蠲免俾閭閻無催科之擾因查兩淮鹽埸竈户應徴折價錢糧亦有未完之項當與民人一體加恩者著該部即速傳諭總督趙宏恩鹽政髙斌將雍正十二年以前舊欠若干一一查明照地丁錢糧例奏聞蠲免俾竈户均霑實恵毋許胥吏作弊中飽皇朝文獻通考卷二十八
