body:
  text: 欽定四庫全書皇朝文獻通考卷十五錢幣考三雍正元年頒行雍正通寳錢先是康熙六十一年十二月户工二部以世宗憲皇帝御極定於明年改元雍正請將寶泉寶源二局錢改鑄雍正通寶㝷將鑄成錢式進呈至是頒行天下又令寶泉局每年開鑄四十夘設立官牙議平錢直奉上諭錢文係國家要務皇考常注意勞思此事見在錢價日昻其如何平價之處著王大臣㑹同九卿定議具奏尋議言錢價騰湧總縁制錢尚少從前寶泉局每年曽鑄四十夘旋因銅鉛解運甚遲議減四夘見今厯經嚴催本局解收銅鉛甚多應増四夘即於雍正元年為始開鑄四十夘毎年用銅二百八十八萬觔鉛一百九十二萬觔鑄出新錢與順治錢及康熙年間大小制錢相兼行使則錢多而價自平但恐有奸民囤積居竒應令大興宛平兩縣設立錢行官牙將錢價議平毋得任意低昻以便交易違者論罪從之臣等謹按牙即古之合㑹交易以平市價者史記稱為駔㑹周禮注稱為月平唐書稱為經紀其後或稱為互郎亦稱為牙郎凡各貨物流通皆有官牙至乾隆三年御史陶正靖條奏將錢牙裁革凡銀錢交易聴民自相買賣七年步軍統領舒赫德奏稱囤錢各舖無人說合轉致居竒請照舊設立錢牙十二名領帖充當責成各牙等議平錢價互詳市糴考又開雲南省城及臨安府大理府霑益州鼓鑄局定鑄幕俱鑄滿文先是雲南於康熙四十四年奏開青龍金釵等銅厰嗣以銅産日旺巡撫楊名時奏請每年解京局銅一百萬觔以供鼓鑄經王大臣㑹同户部議言滇省採銅漸次有效與其解京多需脚費不如即留滇開鑄其省城之雲南府及臨安府大理府霑益州四處相近銅厰轉運俱為便易各令其開局務選賢能道府官監理其錢幕應俱用滿文擬令鑄雲泉字様於康熙六十一年十二月得㫖依議其部議錢幕清字鑄雲泉見在京城二局係寶泉寶源字様錢乃國家之寶雲南應鑄寶雲以後他省鑄錢俱將寶字為首次鑄各本省一字至是雲南各局俱行開鑄復題定省城局爐二十一座臨安府局爐六座大理府局爐五座霑益州局爐十五座遵照銅六鉛四配鑄銅價毎百觔銀九兩二錢鉛價每百觔銀四兩五錢每鑄銅鉛百觔准耗九觔給工食錢一千二百文料價六百二十文除銅鉛本及工料外得息錢一千二百六十文每年開鑄三十六夘遇閏加三夘每爐一夘用銅鉛千觔計四十七爐歳用銅鉛一百六十九萬二千觔於稅銅之外動支厰課銀收買充用俟鑄出錢文搭放兵餉易銀以為次年更鑄工本所需鉛觔由黔省採買至七年以議開羅平州之卑淅厰鉛平彛縣之塊澤厰鉛即由鉛厰每百觔以價銀二兩收買供鑄臣等謹按錢局鼓鑄例給工料錢是時京局每銅鉛百觔給工料錢一千九百五十九文各省匠工物料貴賤不一是年雲南定毎百觔為一千八百二十文嗣後貴州局四川局亦照雲南之例若蘇州江寧二局每百觔為工料錢一千五百一十文有竒浙江局毎百觔為工料錢一千七百七十文有竒各隨價直核算奏定其各省錢局例有總理官以道府官為之亦有委按察使司者有監鑄官以同知通判為之亦有委州縣官者隨錢局之逺近與員缺之繁簡無一定之例也又定積欠銅觔限期及江浙二省委員解銅之例湖廣道御史單疇書奏言從前八省辦銅時安徽湖廣等省於康熙六十年以前承辦之銅至今尾欠未清恐有藉詞故延之弊請徹底清查又向來解官欠銅未交者俱典史巡檢等員職小任重易至悞公嗣後江浙銅觔宜委府佐領解經户部議言各省厯年尾欠銅觔亦照江蘇浙江辦銅題定四月限期初㕘二㕘三㕘為滿之例令各督撫將承辦日久尚未清完及已報起程尚未到局之銅速催完解如限滿不完將各上司一併議處勒令分賠至從前各省解官多係雜職微員今銅觔既歸江浙二省總辦應行令該督撫選賢能府佐家道殷實者委令領解從之又更定制錢放餉為每兩月一次銀八錢二配給京畿道御史戴芝奏言户部給發兵餉惟二月八月銀錢各半搭放每逢放餉時民間錢價暫平過此仍貴請將二八月對搭制錢之例改為每兩月一次銀八錢二兼放經都察院議覆户部支放兵餉毎月需銀約及三十四萬兩銀八錢二兼放則每次需錢六萬六千九百五十六串有竒每年六次應共需錢四十萬一千餘串見在寶泉局毎年四十夘開鑄除給工料錢外有錢四十萬五千一百六十八串儘足搭放應如所請改為每兩月搭放一次俾兵民知餉錢陸續給發則市價不致騰貴從之尋户部又議准自每年雙月銀八錢二搭放之外復令工部移送錢二十萬串於春秋二八兩月再増搭餉錢各十萬串又禁雲南收銅之弊令商民得以餘銅自行販賣户部議言雲南自康熙四十四年設立官銅店官收厰銅奉行已久每易短少價值加長秤頭以致礦民賠累應令該督撫嚴行禁革凡有官買悉照市秤市價出入畫一其額抽税銅亦令公平抽納不許抑勒商民至所産之銅除抽税及官買供本省鼓鑄外有餘聽民間自行販賣流通毋得禁遏從之又停止稽察錢局滿漢科道官更定二局監督仍以一年更代大學士馬齊奏言寶泉寶源二局每年𣲖滿漢科道官各一員稽察自派設以來於錢法並無禆益徒多人役需索莫若停止専責錢法侍郎並監督等加謹鼔鑄户工二部㑹議應如所請停派科道至二局滿漢監督應仍於一年差滿更代以清錢法從之二年令寶源局每年開鑄四十夘先是工部錢法侍郎薩爾納奏言寶源局毎年額鑄之錢止給匠役工價尚有餘錢併銅鉛亦多餘剰若加鑄錢除本局爐役錢外歳可得二十一萬一百九十餘串留錢一萬餘串以備給發各工其餘俱交户部増搭兵餉於兵丁甚有禆益經户部議准令其加鑄以二十萬串移送户部於每兩月一次銀八錢二定額之外為毎年春秋二季増搭餉錢之用至是遂加夘開鑄又議減江蘇辦五省銅額數令福建廣東承辦並定辦銅官逐年更換之例署江蘇巡撫何天培奏言從前各關差等辦銅時係洋銅滇銅兼買後為商人承辦専取給於洋銅厯年以來東洋産銅有限購辦不齊遂多積久自康熙五十五年改歸八省分辦在江蘇雖偶有遲延猶得辦完而各省仍有缺額至六十年復改江蘇浙江總辦江蘇獨承認五省銅數皆先發帑銀交商船出洋採買今徹底清查有六十一年銅八十四萬六千觔係捏報起程雍正元年上下兩運内尚該銅二百餘萬觔至今未能辦到細加訪問知東洋開採日久銅礦日減每年江浙二省銅商出洋者不過三十六船從前每船載銅九萬五千觔近因採銅漸少每船止得銅七萬五千觔約收江南海關者十八九船合計可得銅一百三四十萬觔止敷承辦一半之數尚需一半實屬無從採買請江蘇亦照浙江之例認辦三省銅數一百六十六萬三千二百觔其二省銅數一百十萬八千八百觔應請另派産銅之省承辦至於辦銅官宜令逐年更換不使屢年壓欠以杜移新掩舊之弊經户部議准令江蘇承辦本省及安徽江西三省銅數其餘福建廣東二省額銅該省地皆近海可以收買洋銅應交二省巡撫於雍正三年為始仍照舊額承辦分解户工二局至辦銅之官令各省一體逐年更換著為定例又申定辦銅逾限處分户部錢法侍郎托時奏言從前八省分辦銅觔時曽拖欠一百一十餘萬觔自歸江浙兩省至今又已虧欠銅三百八十八萬餘觔皆由初次二次違限不過止將承辦官降級留任其原委上司並未明定有議處之例至已經起運之後亦未計程立限請再行嚴定處分經户部議覆嗣後辦銅毎年上下兩運仍於四月十月起解如報解初次逾限承辦官革職留任委辦上司官降二級留任展限四月戴罪承辦如仍未完承辦官革任交刑部治罪别委賢員接辦如有虧缺著落家産追賠委辦上司官降二級調用並令分賠如㕘後六月内辦足者准其開復二㕘四月内能完三分之二者免其革任再限四月照數辦足如仍未完承辦官從重治罪委辦官降調分賠至該撫已報起解之後上運准其於本年九月下運准其於次年三月到部逾限不到領解官革職戴罪管解委解上司官降三級留任並將沿途官弁照催行糧船不力之例題㕘其銅觔如有虧缺著落本解官追賠委解上司官分賠如㕘後六月内解部交完者亦准其開復從之又行收買舊銅之令户工二部議言京局每年鑄錢四十夘需銅甚多見在辦銅之省不能如期按濟應照康熙五十五年之例収買舊銅攙用除逺僻之省載運維艱毋庸知照併不足六成之低銅不准收買外應令近京各省并劄行順天府及京局監督出示曉諭毋論旗人民人有願將舊器皿廢銅運送到京者不拘多寡隨到隨收錢法侍郎預向銀庫領銀貯局每觔給銀一錢一分九釐九毫俟各省解運紅銅足用之日即行停止如各省採辦額銅之外收有廢銅亦准解部照廢銅價直題銷從之尋又議定商人得自備資本收廢銅交納其自外省收買送局者每觔給銀一錢五分在本京收買者仍照前定價直如有紅銅毎觔給銀一錢七分五釐户部給與路引聽往各省收運又議減浙江辦銅額數令湖北湖南承辦先是浙江巡撫黄叔琳以洋銅出産不敷承辦三省之數滇省距楚甚近請分令湖北湖南委員辦滇銅運解部議滇省見在開鑄即有銅觔出産非從前俱聽商販者可比應毋庸議至是以辦銅洋船皆係預領價銀浙江先後已發銀六十餘萬兩而銅觔解部者甚少不獨銅期久誤抑且銅價虛懸巡撫請再籌變通經户部議准自雍正三年為始將浙江銅數分作二省交與湖北湖南承辦每省仍各解寶泉局銅三十六萬五千四百二十三觔寶源局銅十八萬八千九百七十七觔浙江既止辦一省額銅減數已多令將累年積欠全行完解禁直省收納錢糧銀匠估色之弊刑部尚書勵廷儀奏言完繳錢糧例易銀上納民間買賣色銀未必即係足紋必投銀舖傾鎔而後入櫃官銀匠當傾鎔之時每苛估成色横加勒索各有戳字為認逮州縣折封後再發匠另鎔大錠方始解布政司銀匠見非其字戳必以成色低潮禀官責令完户重補以致重耗累民嗣後請嚴禁銀匠藉口成色包攬需索之弊經九卿議言直省州縣解司錢糧例鑿有州縣及銀匠姓名或店號銀匠之認識誠不可少應令地方官酌量錢糧之多寡擇其信實有身家者選用數人或十餘人聽民隨便赴舖傾鎔不許銀匠包攬代納如有不肖州縣設立當官總銀匠非其戳子即不准收致有扣尅等弊督撫即指名㕘處從之臣等謹按直省解銀由布政使起解者曰地丁銀由運使起解者曰鹽課銀由糧道起解者曰漕項銀由闗監督起解者曰闗稅銀皆必傾鎔成錠然後起解其解銀之具曰鞘每銀一千兩為一鞘或委員押解或即由吏胥押解例填給勘合火牌及兵牌於所過地方撥夫擡送撥兵防䕶所以慎重帑項也考古者金銀皆有定式必鑄成幣而後用之顔師古注漢書謂舊金雖以觔為名而官有常形制亦猶今時吉字金挺之類武帝欲表祥瑞故改鑄為麟趾褭蹏之形以易舊制然則麟趾褭蹏即當時金幣式也漢之白選與銀貨亦即銀幣之式舊唐書載内庫出方圓銀二千一百七十二兩是唐時銀亦皆係鑄成金史食貨志載舊例銀每錠五十兩改鑄銀名承安寶貨一兩至十兩分五等此今日以重五十兩者為元寶重十兩或五兩三兩者為中錠所由始也元至元三年以銀五十兩鑄為錠文以元寶嗣後或鑄重四十九兩或鑄重四十八兩又有揚州元寶遼陽元寶等名色此元寶命名之始蓋古者多以元寶之名鑄於錢面自元以後銀始䝉錢文元寶之稱於是錢面始専鑄通寶字矣其稱銀為錠者考錠字説文鐙也廣韻豆有足曰錠無足曰鐙又博古圖有虹燭錠當時皆以為器物之名其在古之稱銀多稱為鉼三國志魏嘉平五年賜郭修子銀千鉼水經注嶺南林水石室有銀有奴竊其三鉼歸是也亦有稱為鈑及笏及版者猶之稱鉼之意所謂鉼者以其傾銀似餅則與今所稱錠者其式原自不同蓋今之稱錠者即古之稱鋌南史梁廬陵威王續子應至内庫見金鋌唐書太宗賜薛收黄金四十鋌舊唐書作挺南唐書耿先生握雪為鋌􅅡之成金五代史賈緯言桑維翰身後有銀八千錠自宋以後遂轉稱銀為錠云三年令雲南各局鼓鑄制錢聴其流通各省以便民用不必禁止出境又申私錢之禁奉上諭京局每歳鼓鑄則制錢應日加増而各省未得流布必有銷官錢以為私鑄者聞湖廣河南等省私鑄之風尤甚著各省督撫申飭該地方官嚴加禁緝其私鑄治罪之例當如何嚴定律條著三法司詳議具奏尋議言從前定例内凡私鑄之犯分别首從治罪及各官失察處分不為不嚴且密而終未能禁絶者蓋縁私鑄之利厚奸民畏法之勝不勝其趨利之心故也查官局每錢一文計重一錢四分鼓鑄之法由紅爐翻沙刷灰剉邊滚邊磨洗而後成錢今私鑄錢毎文止重八九分一爐之外别無剉滚磨洗等事俗稱為沙板為錘扁既省銅觔又省工力所以不法之徒寧蹈死而不肯悛改伏思私鑄之錢不能自用必藉經紀為之興販舖户為之攙和而其錢始得流布今應再通行八旗提督五城及大興宛平二縣並直𨽻各省出示曉諭凡經紀鋪户人等嗣後私錢不許攙和一文其從前有收買在家者限於一月内赴官首明量給官錢半價收毁若逾限仍敢攙和行使者不論錢數多寡俱發黒龍江給披甲人為奴如此則私鑄之徒知私錢為無用其風自可漸息至地方官知情故縱者固當從重治罪外其不知情者始或由於疎忽繼又恐干嚴例故多因循瞻徇嗣後凡地方遇有私鑄之事從前雖漫無覺察今但能挐獲無論年月逺近概免其處分果能實心查緝者不拘本管地方及别州縣准以所獲之多寡交部量予議敘若仍行怠玩或别經發覺俱照舊定失察例處分從之四年定寶泉局分設四厰鼓鑄増設大使各一人户部奏言寳泉舊局在東四牌樓街之北今鼓鑄加増請分為四厰其舊厰作為公署但以收貯銅鉛不復置爐設東厰於東四牌樓之四條衚衕置爐十二座設南厰於東四牌樓之錢糧衚衕置爐十四座設西厰於北鑼鼓巷之千佛寺後置爐十四座設北厰於新橋北之三條衚衕置爐十二座共為正爐五十座復於東南西三厰各置勤爐三座北厰置勤爐一座共為十座以備銅鉛多餘加夘鼓鑄至舊局向設大使一員今既添四厰應増設大使四員各分厰辦理從之又令寶泉寶源二局每年各開鑄四十一夘又嚴造用黄銅器皿之禁令交官收買先是正月大學士九卿等議言奸民銷毁制錢改鑄銅器從前立法甚嚴而終不能禁止者縁定例之時但禁將來未造之銅器而已成之銅器置之不問民間總有新造亦必託名已成又新造之器惟禁五觔以上者而五觔以下者不問故法乆玩生仍然濫行鑄造而其弊至於銷毁制錢也今欲杜毁錢之源惟在嚴禁黄銅器皿嗣後除紅白銅不禁并黄銅之樂器天平法馬等子及五觔以下圓鏡亦不禁外其餘一應器皿無論大小輕重俱不許仍用黄銅製造倘有犯者造賣之人照違例造禁物律治罪買用之人照不應例治罪其已成銅器有願賣者俱作廢銅交官每觔給價照一錢一分九釐九毫三絲之數官吏不得扣尅江蘇福建浙江湖北湖南廣東見在辦銅其本省廢銅交辦銅官收買如紅銅不敷即以此項銅器解部扣六成紅銅補額其四成鉛准扣出另給價直俱照例每觔給水脚價三分其不足六成之銅器亦准收買總照成色遞減其價於解部時報明至安徽江西廣西貴州四省雖不辦銅然與江蘇湖廣廣東接壤安徽江西廢銅歸於江蘇廣西廢銅歸於廣東貴州廢銅歸於湖廣令三省委官收買解部雲南見開鼓鑄所收黄銅和入紅銅扣算成色鼓鑄直𨽻山東令各州縣收買廢銅交布政司彚齊解交京局直𨽻解送每觔給水脚銀一分山東解送每觔給水脚銀一分五釐至山西陜西無水道可通河南亦半由陸運脚價非輕四川有川江之險解運亦難此四省廢銅暫收存本省俟一二年後視所收多寡或本省開鑄或作何解送各督撫再議具題如此則私毁之弊可息而於錢法實有禆益得㫖依議至是以民間銅器交官者少而各舖户亦仍行貨賣奉上諭錢文乃民間日用所必需鼔鑄日増而錢不見多必奸民圖利有毁錢造器皿之事若不禁止銅器則錢價究不能平嗣後京城内除三品以上官准用銅器其餘俱不得用黄銅器皿定限三年令將所有悉行報出當官給價收買經九卿遵議除樂器等項外京城官民人等所有舊存黄銅器皿俱交官領價旗人交本旗佐領漢人交五城御史處隨交隨收其收買銀兩各於户部先行支領存貯其所收之銅毎季解送錢局如過三年之限不交官者照私藏禁物律治罪其舖户有仍將黄銅製造器皿者照銷毁制錢為從律治罪令各該管衙門不時稽查各直省應請俱照京城例定限交收上命先於直𨽻各府並各督撫駐劄之省城試行收買尋復申諭都察院五城御史及八旗官員等朕為銷毁制錢之弊是以禁用黄銅器皿令其交官給價専為民間資生利用起見並非朕有需用之處而廣收銅器於内府也民間即當踴躍急公欣然交納尚何待上官之稽查催迫耶且民間器皿不必定需黄銅其在有力之家則白銅紅銅皆非難得之物至中人之家瓷器木器價亷工省亦未嘗不適於用非若錢為人所不可闕者與其藏匿在家將來限滿三年犯禁獲罪何如早為交出既得價直而又受錢價減省之利益乎著將此㫖通行曉諭知之至五年四月令各省所屬府州縣地方皆一體禁飭九月復諭各督撫等前禁鑄黄銅器皿及官民不得濫用曾諄切詳諭京城見今奉行維謹錢價已覺稍平乃近聞各省城銅器舖内仍用黄銅鑄造者甚多此明係督撫不實力奉行徒以告示虛文掩飾而已朕時時諭内外諸臣若所頒㫖有不便於民之處即當據實敷陳請弛其禁斷不可陽奉隂違有失為政之體督撫等寧不聞之乎朕向因制錢日少即知有銷錢鑄器之弊嗣於京城内屢次挐獲銷毁制錢之人而欽差官至甘肅地方亦見有毁錢為器者省㑹乃督撫駐節之區耳目最近政令易行非若逺鄉僻壤之難於稽察也朕為制錢籌畫焦勞各地方官辦運銅觔亦甚費跋涉之苦然後官局得鼓鑄以供百姓之用夫以鑄錢若此之難而奸徒射利竟將已成之錢復行銷毁蠧國害民孰大于此故禁用銅器者所以杜毁錢之源也今後各督撫務實心遵奉倘仍前疎忽定嚴加處分至從前曾議三品以上許用黄銅今猶覺濫用者多以後惟一品官之家器皿許用黄銅餘著徧行禁止有藏匿私用者概以違禁論嗣是各省遵㫖奉行將所收銅器觔兩於年終彚題其三年為限之例以交銅未盡復陸續定議展限收買臣等謹按自賈誼以收銅為七福可致唐劉秩貨泉議亦終之以銅不布下禁銅之令古人多有行之者然其間亦各有辨考之前史宋孝建三年曽禁用銅器唐開元十七年大厯七年貞元九年元和元年並申其禁太和三年詔惟鑑鈕釘鐶得用銅餘皆禁之㑹昌時以銅像鐘磬皆歸巡院晉天福三年亦禁民作銅器周顯徳元年令民間銅器悉輸官給直宋紹興二十八年命取公私銅器悉付鑄錢司民間不輸者罪之蓋當時皆以乏銅為患故議收銅於上以為官錢之用賈誼所謂上挾銅積以御重輕貨物必平劉秩所謂禁於人則銅益賤而錢之用給者是也若國家銅産豐饒礦冶之利自足以流轉而不窮原無藉民間所有之銅用充鼓鑄特是欲絶毁錢之源不得不嚴銅器之禁是時每銅器百觔官給價銀以十一兩九錢而贏鑄錢除工料外以毎串為銀一兩計之實止得銀八兩四錢有竒其各省之奏銷者江南鑄錢二十串需銀二十四兩一錢而贏浙江鑄錢二十串需銀二十五兩五錢而贏是同一禁銅也古者専欲為利於國而我朝之暫行於一時者専欲止弊於民故并不惜多費帑金以為之調劑彼前代權宜之術又豈可以同日語哉又定各官收禁私錢不力處分署山西巡撫伊都立疏言民間行使私錢應官為收買但地方官奉行不力向無議處正條年終報部時並無起解請嚴定處分經户部議照失察私鑄之例得㫖如此定例則地方官自顧考成必至奉行嚴迫生事擾民聞向來晉省民間所用多係小錢只應設法漸次收禁若通令將小錢收買而大錢未議及如何行布民間日用未便著另議具奏尋議令該撫試行收買寛限三年俟將來大錢流通然後盡行收禁倘逾限猶有私錢事發者將奉行不力之地方官失察每起降職一級至四起降四級俱留任俟另有緝獲私鑄之案仍照次數還職如失察五起以上者降一級調用其各省收禁私錢俱照此例又停雲南大理府霑益州鼓鑄増雲南省城及臨安府局爐座鑄錢發運各省並准於鼓鑄正額外加帶鑄錢及外耗錢先是三年已議減大理府霑益州局爐七座至是總督鄂爾泰以所鑄之錢難免多壅題請概行停爐已下部議嗣復請裁去大理府霑益州二局存留二局鑄錢發運外省易銀還滇庶無阻滯省城一局本省疏通既易且至蜀至楚路皆易達舊設爐二十一座今擬加爐四座臨安一局附近粤西至廣最便舊設爐六座今擬加爐五座共設爐三十六座至於解送各省尚需脚價擬於毎爐毎夘添鑄銅鉛一百觔名曰帶鑄所得息錢以為運脚之用又從前開局時毎爐每夘鑄正額銅鉛一千觔准耗九十觔止作正鑄九百一十觔外仍加鑄銅鉛九十觔名曰外耗所得息錢以為添給在局官役養亷工食之用帯鑄錢只給物料不給工食外耗錢只給銅鉛不給工料俱請照正額之例一體動支銀兩以為採買銅鉛之本經户部議如所請其鼔鑄制錢除本省搭放流通外以四萬串發運四川湖廣廣西等省令各督撫動藩庫銀每制錢一串易銀一兩交雲南解官領回接濟工本各省所收錢搭放兵餉如錢輕薄不合式許各督撫㕘奏將雲南監局官交部議處從之又増户部寶泉局筆帖式二人五年正月令寶泉寶源二局以所收銅器於定額之外加卯鼓鑄臣等謹按兩局加鑄初自六卯遞増至十五六卯不等各設勤爐添鑄嵗無定額皆在正夘之外其每年配鑄銅鉛之正額仍為四十一夘自雍正十年以後寶源局減正額為三十七夘至十三年復各為四十一夘又定以銅鉛各半配鑄制錢臣等謹按是年寶泉寶源二局照例配鑄其雲南各局及嗣後所開之貴州局四川局以銅質髙低不一兼之沙水異宜仍以銅六鉛四相配至乾隆五年改鑄青錢始照京局一例配鑄云又議轉運雲南銅觔令江蘇湖北湖南收買解交京局雲南總督鄂爾泰奏言滇省自増開湯丹等厰以來採銅有效已於上年題定額課見在礦産増盛除供本省鼓鑄一百餘萬觔外核算雍正五年分銅觔可餘二百數十萬觔但銅多本少不敷官買請動支鹽務贏餘銀兩收銅轉運至江南等省令收買還項經户部議言見在惟江蘇一處尚辦三省銅數湖北湖南浙江福建廣東五省各辦一省銅數除福建廣東二省從無遲誤浙江見已開洋毋庸别購滇銅外其湖北湖南以採買維艱毎逾定限而江蘇則積欠滋多正宜急為變通應將滇省餘銅令該督動鹽務銀六萬兩收買委員以一百餘萬觔運至漢口以備湖北湖南採辦之用以一百餘萬觔運至鎮江以備江蘇採辦之用各省辦銅定價每百觔十四兩五錢水脚三兩今滇銅每百觔價銀九兩二錢加以運至漢口鎮江水脚需十三兩以外將來再由漢口鎮江遞運至京尚需水脚三兩較之原額亦稍有節省江蘇兩湖所買滇銅均作雍正六年額辦不必拘定舊例分上下兩運倘有不敷另行補足總以不缺額數不逾六月到部為率江蘇於雍正六年所收洋銅以抵厯年舊欠其滇省將来出産之銅贏縮難以懸擬令該督扣定年限將所獲銅數預行題明以便知照各省採辦至此項銅觔既係官收官賣經過闗津毋得抽課當即騐明放行從之又更定寶源局移交户部放餉錢額數先是定户部放餉於二八兩月取寳源局錢二十萬串配銀増放四年以工部不敷支用議每年止交户部錢二萬串將户部二八月増搭餉錢之例停止至是工部復議定每年存留十萬串以備各工取用其餘皆移交户部放餉倘遇大工需錢至十萬串不能足用者另行奏請又行各省舊欠錢糧折收銅器之令户部奉上諭前令各省設立收買銅器公所選員專司其事在司庫先撥銀兩以為價直但恐各州縣與所設公所有隔逺之處交納未便欲令民間以銅器扺作錢糧著詳議具奏又聞外省官員欲捐買銅觔此斷不可行地方官但能實心辦理便於公事有益如有見將已貲收買銅器者著照數給與價直尋議定各省有舊欠錢糧准其以黄銅器血扺交除四川廣西雲南貴州四省並無民欠安西民欠無多其餘各省令各督撫於舊欠内酌量以二十萬兩為率令欠戸交納銅器扣扺應完之數至所收銅器中熟銅照定價每觔以一錢一分九釐有竒生銅價比熟銅减二每觔以九分五釐有竒各按成色觔兩扺算州縣官不得尅減價直亦不得重秤收兑毎季將徴收數目報明督撫年終彚題其無民欠之省分及無民欠之州縣與無舊欠之糧户有以銅器交官者亦按生熟銅色照例給價如地方官有借捐買名色以賤價收買民間銅器者該督撫即題㕘議處開甘肅鼔鑄局甘肅巡撫石文焯奏言甘省錢文頗雜請動支庫銀二萬兩收買各屬户工一釐字小錢及古舊錢廢錢開局於省城設爐十二座錢幕滿文鑄寶鞏二字以所鑄大錢收换小錢源源更鑄俟收盡停止户部議如所請從之臣等謹按甘肅布政使司先駐鞏昌康熙六年於錢幕鑄滿漢文鞏字嗣於九年停止錢局移布政使於蘭州至是年即於蘭州設局其錢幕仍鞏字之舊曰寶鞏六年定辦解額銅分别成色之例户工二部議言各省承辦二局額銅四百四十三萬五千餘觔每觔定價一錢四分五釐向係一例支銷並未分别成色但解到銅斤不能一色純熟若不為收受不惟解員往返苦累亦恐各省産銅不同請嗣後除浄銅照例給價如有塊銅及廣條蠏殻等項不足成數者即令監督同解員估定成色彈兑交收行文辦銅本省減價報銷至於錢局亦照所估成色分别配搭每開鑄銅鉛百觔如九成銅以銅六十觔鉛四十觔配鑄九五成銅以銅五十五觔鉛四十五觔配鑄從之又定寶源局増設新厰鼓鑄工部奏言寶源舊局向在朝陽門内之西南今鼔鑄加増請照户部分厰之例添設一厰於崇文門内東之泡子河舊厰置爐十二座新厰置爐十三座共為正爐二十五座仍於舊厰置勤爐六座以備銅鉛多餘加夘鼓鑄從之又停甘肅寳鞏局鼓鑄署甘肅廵撫張廷棟奏言甘省收買小錢改鑄大錢未免擾民請暫停鼓鑄户部議如所請得㫖從前石文焯請收小錢開鑄朕諭以開鑄一事當詳細斟酌若因不能禁止小錢欲藉此為良䇿恐未必所毁之銅能敷鼓鑄之用小錢之禁不可急驟應暫緩候㫖乃石文焯復行具請始准其行不意收錢開鑄之弊煩擾如此著即行停止七年申定錢直户部奉上諭錢為國寶固貴流通以利民然必權衡輕重使得其平方能使民用而無弊近聞直𨽻及奉天等處錢價過賤民間貿易物價必致虧損且恐奸弊從此而生著該督及奉天府尹飭地方官通行曉諭嗣後每銀一兩止許换制錢一千文并著該部行文各省一例遵行以為經久平準之定則又定寶泉局大使用户部筆帖式辦理以五年更代户部奏言寶泉舊局及新分四局共設大使五員伊等約束工匠看守物料均闗𦂳要而部選者多係吏員出身錢法重地恐有貽誤請照三庫大使之例於户部筆帖式内揀選幹練謹飭之人令其到局分厰辦理大使事務移咨吏部註冊以五年為滿更代五年之内勤慎無過由部保奏以應陞之官補用如有疎懶怠忽即交部分别議處從之又定解運銅鉛於正額外報稅之例户部議定嗣後凡有銅鉛到闗到局令該管官察騐批文如與原解數目相符免其輸稅若正額之外多出觔數即係私販令其照數報稅又増設寶源局大使二人用工部筆帖式辦理工部奏言寶源局從前除筆帖式一員之外僅有局吏四人見令分設新舊二局請照寶泉局例設立大使二員分任局務於本部筆帖式内揀選補用五年更代一如户部之制其局内原設筆帖式一員仍照舊例以一年更代從之又令江西浙江湖北湖南河南山東山西各開鼓鑄局先是正月户部奉上諭各省收買銅器屢降㫖令該督撫酌量可以鼓鑄即為奏聞至今未見奏到再行文各省但所收銅觔可設局開爐即當鼓鑄俾錢法疏通不必拘定足放一成二成兵餉嗣是各省陸續奏請開鑄經户部議定各局錢幕滿文江西南昌府局鑄寶昌二字浙江杭州府局鑄寶浙二字湖北武昌府局鑄寶武二字湖南長沙府局鑄寶南二字河南開封府局鑄寶河二字山東濟南府局鑄寶濟二字山西太原府局鑄寶晉二字臣等謹按雍正年間各省鼓鑄惟寶雲局及八年所開之寳黔局十年所開之寳川局皆因礦開鑄配用銅鉛餘若寳鞏局則收小錢改鑄旋即議罷是年所開之寳昌寳浙寳武寳南寳河寳濟寳晉局及嗣後所開之寳蘇寳安局並收買舊銅器分别生熟銅對搭鼓鑄熟銅器毎觔價銀一錢一分九釐有竒生銅器每觔價銀九分五釐有竒亦有每銅八觔内仍加用鉛七八觔者皆隨各省斟酌題定後以廢銅鑄完各局於雍正十三年以前次第停止寳濟局於乾隆三年停止自乾隆五年以後江蘇江西浙江湖北湖南山西諸省各隨水陸之便分買東洋滇南等處之銅復行開局又令增撥雲南局錢運往廣西户部議言粤西距京遥逺制錢從未到粤民間所用多係私錢每年雖有雲南撥錢二萬串不敷流轉應令滇省增撥錢文尋經雲南總督鄂爾泰奏定從前原議每年以錢四萬串分運四川湖廣廣西見在兩湖已經開局四川錢價平減亦已停運請於省城臨安二局歳撥錢六萬二千串發運粤西沿途經過該省右江左江地方即酌定數目順便截留以為搭放兵餉俸工之用俟運至桂林省城即從司庫照例易銀給滇員領囬歸還原本八年定廣東辦觧滇銅之例廣東總督郝玉麟奏言廣東從前承辦洋銅近縁洋銅竟不到粤辦員俱領價赴滇買囬毛銅至粤鎔化成條然後起運毎百觔㡬需銀二十兩賠累實多而到部之銅成色仍有耗折且自粤至滇間闗萬里勢不能依限完觧請酌增水脚竟令從滇買銅起運至京有銅色不足照例添補可免重複虧折且不致往返稽遲經户部議言滇省每年餘銅約一百六七十萬觔不等除湖北湖南收買外其餘運至鎮江偹江蘇收買之用近因江蘇以滇銅成色觔兩不足已議全購洋銅嗣後請令雲南將每年餘銅扣出廣東額數仍撥運至漢口令廣東委員收買即從漢口起運其水脚仍照定額支銷從之又議減江蘇辦銅額數令安徽江西承辦並定八省分辦洋銅滇銅之令江蘇巡撫尹繼善奏言江蘇額辦三省銅觔必分員承辦而本年銅觔未完來年發帑之期又至通省各官人人辦銅尚在不敷安能擇人而委查福建見在委員在江蘇辦理請令安徽江西亦照舊額分辦經户部議准自雍正九年為始将江蘇銅數分出二省交安徽江西遴選大員領本省司庫銀亦赴江南海闗募商採辦嗣後八省仍各辦一省銅數江蘇安徽江西浙江福建五省分辦洋銅湖北湖南廣東三省分辦滇銅各依限如額起解又開貴州畢節縣鼓鑄局先是貴州于雍正元年議開銅礦鼓鑄督撫以黔省漢苖雜處用銀沿襲已久若以錢文搭餉領運既難流通無時請停止開採至是復以威寕州採銅有效而大定府境内又産有鉛礦巡撫張廣泗奏請開局於畢節縣城設爐十座錢幕滿文鑄寳黔二字每年開鑄三十六夘毎爐毎夘照雲南之例鑄正額銅鉛一千觔帶鑄銅鉛一百觔外耗銅鉛九十觔該縣與銅鉛各厰道里相近且鄰接滇省之湯丹等厰如數有不足即採買滇銅添補以所鑄錢配給官兵俸餉户部議如所請從之九年設立寳泉局銅色對牌户部奏言各省辦觧寳泉局額銅向例洋銅作為十成廣條作為九五成塊銅蟹殻作為九成匀配鼓鑄今各省觧到銅觔每種各有髙低收兑時若但照銅名核算成色配鑄必至虧折嗣後請設立銅色對牌以八成八五九成九五十成分為五牌凡銅觔到局令觧官與監督從公較對除八成以下者不收外八成以上者俱照成色秤收核算價直但照牌定估恐或過苛應將估定八成以上者作為八五八五以上者作為九成九成以上者作為九五九五以上者作為十成其有包裹鉛渣及黒暗灰色之銅令辦銅官家人公同解銅官鎔化浄銅照觔數作十成兑收虧折者補觧則辦員不致濫收低銅觧員可以免於争執而匠役人等亦永杜包攬需索之弊從之臣等謹案是年寶泉局設有對銅牌其有應交寳源局銅觔即由寳泉估騐成色移㑹工部至十一年八月寳源局亦照式設立對銅牌又定制錢放餉成數毎季具奏之例先是定毎兩月一次銀八錢二配給兵餉八年改為每月銀九錢一搭放至是户部復議定本年餉錢單月以一成搭放雙月以二成搭放嗣後每月餉錢以錢數之多寡酌定一成二成或増至三成按季具奏配給臣等謹案各省制錢配餉亦視鑄錢之贏縮以定多寡之數自雍正五年户部奏明各省兵餉多者至一百四十萬餘兩少者三十萬餘兩其餘皆百萬兩内外餉多之省以一成錢搭放需錢十四萬餘串餉少之省以一成錢搭放需錢三萬餘串二成錢各倍之如雲南於雍正四年定省城局錢配給在省之督標及城守等八營近省之竒兵武定等營二成兵餉臨安局錢配給臨元鎮標及新增元江等營二成兵餉其驛堡夫役工食等項並以銀七錢三配給貴州於雍正八年定除新闢苗疆暫緩搭錢外其省㑹通衢地方以銀九錢一其地居腹裏漢夷相間者以銀九五錢一成之半配給其逼近苗疆夷多漢少者従減配給通省官役俸工以半成配給惟各官養㢘概以二成配給至十三年以増添營制官兵不敷配搭復定原議二成搭放者改為一成一成搭放者改為半成四川於雍正十年定省城滿漢兵餉以銀八錢二各營離省近者以銀八五錢一五稍逺者以銀九錢一更逺者以銀九五錢一成之半配給其各官養亷亦照逺近分别配給尋以出錢不敷復定省城等處各標營兵餉均以一成之半搭支其隨時增減皆聴各省自為核定奏報又更定江蘇浙江辦觧洋銅展限之例户部議定江蘇浙江採買洋銅不能如期起觧已遞將定限拖延今若今仍照原定四月十月起觧之限勢必不能查洋船必趂西北風出口東南風囬棹大率每年皆冬去秋還應將採辦洋銅之江浙二省上運俱展四月之限於八月内起解下運銅觔本與上運一同領銀出口縦使洋船到有先後至十月内亦可購足應寛限兩月於十二月起觧如逾限不觧照例議處至安徽江西福建三省及辦滇銅之湖北湖南廣東三省尚無遲悮仍照定限起解又令江蘇浙江兼辦滇銅户部議言滇省毎年産銅除存留本省鼓鑄及供湖北湖南廣東採辦外尚有餘剰可供江浙收買祇因江浙辦銅每百觔十四兩五錢之内有節省銀一兩五錢洋銅毎百觔定價銀十三兩滇銅運到鎮江口每百觔需價脚共十三兩二錢又或銅色不足平秤稍輕是以江浙辦員但買洋銅寕蹈遲延之處分不能於十三兩外另為賠補嗣後應令江浙督撫毎年除額辦洋銅之外再預發銀兩兼採滇銅如有成色及平秤不足者總以節省銀兩補算每百觔以十四兩五錢為率布政司發價時不得預扣節省其安徽江西福建三省辦銅本無節省一項亦應聴其兼採滇銅以補洋銅之不足從之又嚴販運及囤積制錢之禁户部議言民間錢多則價減錢少則價增應令順天府提督衙門五城御史不時巡查其有販運出京者即行究處至京城内有奸民勾通經紀預發本銀於大小舖户收買制錢居竒囤積俟錢貴始行發賣名為長短錢亦應嚴行察禁從之又開江蘇安徽鼓鑄局户部議定江蘇開局於蘇州府設爐十二座錢幕滿文鑄寳蘇二字毎月開鑄二夘毎夘用對搭生熟銅二萬八千八百觔鑄錢二千九百九十四串有竒安徽開局於江寕府設爐四座錢幕滿文鑄寳安二字每月開鑄二夘每夘用對搭生熟銅九千六百觔鑄錢九百九十八串有竒臣等謹按是時安徽布政使司駐劄江寕府城故江寕局錢幕用寳安字又停河南寳河局山西寳晉局鼓鑄十年定工部寳源局監督以二年期滿并定滿漢二員新舊互相更代之例工部奏言寳源局監督專司收納銅鉛鼓鑄制錢必得諳練之員方克勝任向例以一年為滿即行另派應改為二年期滿至毎逢差滿之時若滿漢二人一同更替恐新派者仍未能熟悉并請嗣後滿漢二員新舊互相更代從之又開四川鼓鑄局先是四川於康熙四十二年奏開寕逺府屬各銅厰至雍正元年已請鼓鑄以礦砂未旺復經議停至是廵撫憲徳奏請開局於省城成都府設爐八座錢幕滿文鑄寳川二字每年開鑄二十四夘用銅鉛三十二萬觔採買滇銅及黔鉛應用如本地採得礦銅亦即凑補供鑄以所鑄錢配給兵餉及各官養亷户部議如所請從之停江蘇寳蘇局鼓鑄十一年定各省辦銅預頒部鑄法馬户工二部奏言各省觧到之銅赴局交收用部定法馬彈兑毎與批觧數目短少其故因從前採辦皆用市秤視部法較輕是以數目不符其所缺之銅行令補觧往往承辦之人與領觧之員互相推諉以致不能按期交納請嗣後江蘇等八省皆照依部存經制法馬每省鑄給四副令各督撫將上下兩運額銅俱照部頒法馬兌收兌觧不得仍用市秤並將所頒法馬令領觧官㩦帶至局收銅之時監督將局存法馬較準合一然後兑收至雲南省亦應鑄給法馬一副各省赴滇辦銅照此收買從之又議開雲南東川府局鑄錢運往陕西户部議言陜西錢價昻貴應令雲南嵗鑄錢十萬串發往易銀還滇其開鑄錢局令該撫相度水陸適中地方尋雲南廵撫張允随奏請開局於東川府設爐二十八座毎年用銅鉛一百一十九萬九千五百觔有竒其銅即由東川府屬之湯丹厰採用其鉛由曲靖府屬之卑淅塊澤厰採用錢幕亦鑄寳雲二字定於十二年正月開鑄錢發運陜西分頭運二運三運令陜西委員接觧毎串合工本脚費銀一兩一錢一分六釐有竒又定查騐採辦洋銅之例户部議言各省出洋辦銅商人毎因限期寛裕將本年所領帑項營運射利新舊挪移嗣後令各督撫嚴飭辦銅官秉公發價其承辦之商先察明於何處出洋知照出口汛弁並地方官自該商領銀之日為始定限兩月置貨齊偹報知該汛官並察明果否係採買易銅貨物騐放出口一面報明督撫並取該員等印結偹案如有逾限並無貨物出口或非採買易銅之貨即将該商嚴究着落家産追賠帑項至洋船進口之日亦令該汛弁並地方官察明係某省銅商及載銅數目通報該督撫定限於一月内將銅船進口日期及觔數先行報部察核一面即委官起觧從之又停江西寳昌局浙江寳浙局湖北寳武局湖南寳南局鼓鑄十二年復定錢制毎文重一錢二分奉上諭鼓鑄錢文専為便民利用銅重則滋銷毁本輕則多私鑄原宜随時更定籌畫變通斯可以平錢價而杜諸弊順治元年毎文鑄重一錢二年改鑄一錢二分十四年加至一錢四分康熙二十三年因銷毁弊多仍改一錢嗣因私鑄競起于四十一年又仍復一錢四分之制迨後銅價加增以致工本愈重朕思錢重銅多徒滋銷毁且奸民不須重本便可随時鎔化跴緝殊難非若私鑄必須有力之人兼設有爐座器具易於查拏者可比若照順治二年例毎文鑄重一錢二分在銷毁者無利而私鑄者亦難似屬權衡得中著九卿詳議具奏尋議言寶泉寳源二局見在毎年正額鑄錢六十萬二千六百八十七串有竒毎串需工本銀一兩四錢三釐有餘以錢一串抵銀一兩計之毎年約虧折銀三十萬兩以致不肖奸民肆行銷毁嗣後應改鑄毎文重一錢二分則錢本稍輕每年節省銅鉛約各五十一萬觔計可共節省銀十二萬八千七百餘兩而銷毁制器與買銅私鑄均無利可圗實可永逺遵行請將錢様頒行開鑄之各省一體照式鼓鑄務令分兩準足磨鑢精工至見行一錢四分之錢若分别增價恐不便於民若復行改鑄亦無禆於國計應仍一體行使如有私行銷毁者不時查獲治罪從之嗣後經户工二部議定見在寳泉局正額四十一夘寳源局正額三十七夘向例寳泉局每夘用銅鉛十二萬觔寳源局毎夘用銅鉛六萬斤毎銅鉛百觔鑄錢十串四百文給匠工物料錢一串九百五十九文今新制錢每文改輕二分寳泉局毎夘節省銅鉛一萬七千一百四十三觔寳源局每夘節省銅鉛八千五百七十一觔除鑄造之匠役工食應照舊支領外至所用銅鉛較少則鎔化銅鉛之煤罐物料亦視前較少核算寳泉局毎夘應減物料錢一百四十七串六百文寳源局毎夘應減物料錢七十三串八百文按夘交庫備用嗣後寳泉局每夘用銅鉛十萬二千八百五十七觔有竒鑄錢一萬二千四百九十八串有竒給工料錢二千二百三串二百文寳源局仍視寶泉局之半核算又定貴州辦觧京局額鉛停商人承辦之例自京局改定銅鉛對鑄毎年增辦鉛至三百六十六萬觔向由商人採辦毎觔給價銀六分二釐五毫水脚銀三分至十一年以鉛價平減各商呈請毎觔節省銀一分五釐定價四分七釐五毫至是户工二部遵㫖議言貴州之蓮花硃砂等厰所産白鉛嵗不下四五百萬觔各厰定價每百觔銀一兩三錢較之商辦實多節省請自雍正十三年為始令貴州巡撫委員照額收買分觧户工二局每百觔給水脚銀三兩照辦銅之例分為上下兩運上運於四月起觧十月到部下運於十月起觧次年三月到部如有遲悞將承辦之員照例議處其商辦之鉛停其採買再湖南桂陽州郴州鉛礦毎年抽税鉛約五六萬觔向係附商人額鉛觧部今商辦既停應令湖南巡撫委員運解從之至十三年以湖南鉛厰礦砂漸微題請暫行封閉其京局鼓鑄全用黔鉛又議開雲南廣西府局鑄錢運京停湖北湖南廣東辦觧滇銅奉上諭見今五省辦洋銅三省辦滇銅朕思與其令三省辦銅解部莫若即令滇省就近鑄錢運至四川永寕縣下船由水路運赴漢口搭附漕船觧京可省京鑄之半經户部議言湖北湖南廣東三省每年額辦滇銅一百六十六萬三千二百觔毎百觔價銀十四兩五錢若即在滇照厰價買銅鑄錢較運京鼓鑄實多節省應令雲南鑄出錢文運赴漢口照運陜錢之例每百觔給水脚銀二兩三錢五分其附搭漕船運至通州毋庸議給水脚至通州運京應照運銅例每百觔給脚價銀一錢二分八釐統較從前銅鉛觧京需用脚價毎百觔三兩之數亦有節省其滇省作何添爐鼓鑄應俟該撫詳議尋雲南巡撫張允随奏請開局於廣西府設爐九十四座照舊例於正額外加帶鑄錢及外耗錢每銅百觔定價銀九兩二錢鉛百觔厰價二兩由厰運至府城加脚價五錢共用銅鉛三百四十五萬一千六百七十八觔鑄錢四十二萬一千九百三十六串有竒錢幕亦鑄寳雲二字除工料并官役養亷工食外實得錢三十四萬四千六百三十二串有竒其運道自廣西府城運至粤西思恩府屬之百色地方抵達漢口每年八九月内委員運至漢口交貯漢陽縣庫聴楚省轉運到部總計毎錢一串自廣西府至京合銀八錢三分八釐有竒嗣後以滇省運錢至京尚需時日議湖北湖南廣東應辦丙辰年上下兩運額銅仍委員赴滇辦解于丁巳年停止其廣西府局定于丙辰年四月開鑄丁巳年起解又定户部寳泉局監督以二年更代又定各省解銅官按運更換之例户部奏言各省承辦額銅其解官皆係厯次領運往來日久與局内書役爐頭人等兩相熟識恐收銅時滋生弊竇行文各省嗣後委觧銅觔遵照觧餉之例按運更換如有逓年長令管觧者即將觧官治罪原委之上司交部議處從之又停安徽寳安局鼔鑄十三年停雲南東川府局鑄運陜西錢陕西巡撫史貽直奏言陜省錢價已漸平減且自陜至滇路經八千餘里水陸艱難每年委員領觧亦不能如期接濟請停領運經户部議如所請停止東川局鼓鑄又定剪邊錢禁例及各官失察處分户部㑹同刑部議定見在民間行使剪邊錢令各督撫出示嚴禁其從前收買在家者以文到一月内赴官首明量給半價嗣後凡將制錢剪邊毁化製造噐皿貨賣者拿獲之日審明剪至十千以上者為首之人擬絞監候為從杖一百流三千里不及十千者為首照毁化小制錢例枷二月杖一百發雲貴川廣烟瘴少輕地方為從減一等杖一百徒三年房主鄰佑總甲十家長知情不首皆照為從例治罪在千錢以下者枷三月杖一百地方官失察奸民剪邊毁化至十千以上者知州知縣吏目典史等官一起降三級調用二起革職知府直𨽻州知州同知通判等官毎起降二級調用至三起革職司道官每起降一級調用至四起革職巡撫毎起降一級留任至四起降四級調用五起革職失察剪邊毁化不及十千者州縣及緝捕佐貳官一起降二級二起降三級調用三起革職知府直𨽻州知州及緝捕㕔官毎起降一級調用至四起革職司道官每起降一級留任至四起降四級調用五起革職巡撫一起罰一年俸二起降一級三起降二級皆留任四起降三級五起降四級皆調用六起革職如數止千錢以下者州縣等官降一級留任凡經紀舖户有收買剪邊錢攙和貨賣至十千以上者發雲貴川廣烟瘴少輕地方不及十千者杖一百流三千里千錢以下者枷一月杖一百其並無收買貨賣一時未及交官㦯數止十文五文難以交官者令交地方保甲嵗終彚繳如行使者照不應重律杖八十地方官不行嚴禁以致民間仍有行使者照收禁私錢不力例按起降級准其戴罪於一年内有緝獲私鑄之案每起還職一級失察五起者降一級調用其奸民將錢剉磨薄小取銅求利者舊例議以滿杖亦屬太輕應令以文到日為始如有挐獲者不分首從枷三月杖一百互詳刑考皇朝文獻通考卷十五
