body:
  text: 欽定四庫全書皇朝文獻通考卷二百十七經籍考七經四書樂儀注日講四書解義二十六卷康熙十六年大學士庫勒納等奉敕編聖祖仁皇帝御製序曰朕惟天生聖賢作君作師萬世道統之傳即萬世治統之所繫也自堯舜禹湯文武之後而有孔子曽子子思孟子自易書詩禮春秋而外而有論語大學中庸孟子之書如日月之光昭於天岳瀆之流峙於地猗歟盛哉葢有四子而後二帝三王之道傳有四子之書而後五經之道備四子之書得五經之精意而為言者也孔子以生民未有之聖與列國君大夫及門弟子論政與學天徳王道之全修已治人之要具在論語一書學庸皆孔子之傳而曽子子思獨得其宗明新止善家國天下之所以齊治平也性教中和天地萬物之所以位育九經達道之所以行也至於孟子繼往聖而開來學闢邪説以正人心性善仁義之㫖著明於天下此聖賢訓辭詔後皆為萬世生民而作也道統在是治統亦在是矣厯代賢哲之君創業守成莫不尊崇表章講明斯道朕紹祖宗丕基孳孳求治留心問學命儒臣撰為講義務使闡發義理禆益政治同諸經史進講經厯寒暑㒺敢間輟兹已告竣思與海内臣民共臻至治特命校刋用垂永乆爰製序言弁之簡首每念厚風俗必先正人心正人心必先明學術誠因此編之大義究先聖之微言則以此為化民成俗之方用期夫一道同風之治庶幾進於唐虞三代文明之盛也夫臣等謹按四書之名仿於朱子自元迄今定為程式我聖祖仁皇帝夙齡懋學以四書為作聖之基敷治之本爰取經筵講義親御丹鉛首先刋布諸臣欽承指授薈萃成編掲四子之心傳綜百王之治法仰見帝徳之隆同符洙泗逺紹唐虞也已四書近指二十卷孫竒逢撰竒逢見易類竒逢自序曰劉静修著四書精要至鹿忠節著説約一編竊領其教㫖述曰近指非有高逺之言也麗竒軒四書講義無卷數紀克揚撰克揚見易類四書翊注四十二卷刁包撰包見易類聖學心傳無卷數薛鳳祚編鳳祚字儀甫益都人四書大全纂要無卷數魏裔介撰裔介見孝經類四書講義困勉録三十七卷松陽講義十二卷三魚堂四書大全四十卷續困勉録六卷陸隴其撰隴其見書類四書惜隂録二十一卷徐世沐撰世沐見易類世沐自記曰仇滄柱示以闗中李中孚反身録中孚曽講學毘陵彼深惜南浙兩省學者害於舉業彼時心不甘南士必遜北士如此迄今幾三十年彼學已成名已立南士竟無與頡頏狂不自量續為惜隂二集不覺積成二十一卷又曰李從陸王入而出入於程朱四子余從程朱入而準則於周宋八賢雖剛峻不逮而古人所云醇正則當仁不欲多讓云四書初學易知解十卷卲嗣堯撰嗣堯見易類四書述十九卷陳詵撰詵見易類詵自序曰朱子慮佛教之惑人故確切分疏以為下學所遵守陸子略其枝葉而獨抉其宗㫖葢於朱子有一本散殊之分而非有所悖謬也臣等謹按詵自序乃調停於朱陸兩家之學者故是書多不主朱子章句集注葢其源固出於姚江也四書鈔十八卷秘丕笈撰丕笈字仲負故城人康熙癸丑進士官至陜西提學副使四書貫一解十二卷閔嗣同撰嗣同字來之號雙溪烏程人康熙乙夘副榜貢生官景寧縣教諭四書賸言四卷補二卷四書索解四卷逸講箋三卷毛竒齡撰竒齡見易類章大來序賸言略曰是編補綴所聞各有記憶且亦陸續成此書故不能一轍王錫序索解曰謂必有以解之直是索解人不得耳一經考索則世多學人豈無始而驚既而疑又既而劃然以解者因更名索解四書釋地一卷續一卷又續二卷三續二卷閻若璩撰若璩見書類若璩自序曰宋王尚書應麟作詩地理考葢補紫陽夫子之不備然序而不斷甚至兩説並存其與僅云邑名地名不詳其所在者何以逺過余故矯之作四書地理考得若干條爾雅有釋地杜氏有春秋釋地爰易其名曰釋地云臣等謹按是書初釋五十七條續八十條間及人名以地非人不傳也又續一百六十二條遂因人以及物且廣而釋訓詁釋典制三續一百二十二條則又推之及其餘葢若璩學既淹通又精於考證故旁參互訂精核詳明自顧炎武而外鮮有與之相匹者聖門釋非録五卷陸邦烈編其師毛竒齡語邦烈字又超平湖人邦烈自述曰北宋諸儒高樹門幟不容一人訾議如劉貢父改二程全書一二字便作札四布痛加譏貶必欲使其還復舊文而後已而於先聖先賢恣情敲駁大學孝經連篇刪改即孔門諸賢何一不受其削斵相其用心實有抑聖賢以揚同類之意因稍輯先生所言與他書偶録可引㨿者彚為一卷名曰釋非以為聖門口語各有精義或未可盡非耳四書反身録六卷續補一卷李顒撰顒字中孚别號二曲盩厔人康熙己未薦舉博學鴻詞以老病未赴臣等謹按是書乃顒口授門人王心敬所録實仍顒所自定康熙四十二年聖祖仁皇帝西廵召顒入見時顒已衰老遣其子慎言以是書及二曲集進呈睿覽特賜御書操志高潔匾額仰見聖度如天嘉奬宿學秦中下士至今稱榮幸焉四書劄記四卷辟雍講義一卷楊名時撰名時見易類此木軒四書説九卷襍説無卷數焦袁熹撰袁熹見春秋類五華纂訂四書大全十四卷孫見龍撰見龍字叶飛號潛村烏程人康熙癸巳進士改庶吉士嘗掌教雲南五華書院故是編以五華為名見龍自序曰於四書大全舊本訛者正之偏者刪之明以來諸家制藝評語併為採入間附以近時李光地楊名時之説見龍有所自見亦附著於後四書纂言無卷數王士陵撰士陵見易類四書㕘註無卷數王植撰植字槐三深澤人康熙辛丑進士官至邳州知州菜根堂劄記十二卷夏力恕撰力恕字觀川孝感人康熙辛丑進士官翰林院編修四書録疑三十九卷陳綽撰綽見易類四書本義滙叅四十五卷王歩青撰歩青字漢階或自書罕皆號已山金壇人雍正癸夘進士官翰林院檢討歩青自序略曰朱子之注易曰本義歩青稟此以讀四子之書四子書之本義固以朱子為宗而朱子書之本義則必以章句集注為斷焉四書約㫖十九卷任啟運撰啟運見易類翼藝典略十卷蕭正發撰正發字次方廬陵人臣等謹按劉吳龍序曰翼藝者所以羽翼制藝也書中皆詮釋四書典故葢専為制科而作江漢書院講義十卷王心敬語其子功述而録之心敬見易類四書説註巵詞十卷胡在甪撰在甪永年人乾隆丙辰進士官湖北松滋縣知縣四書順義解十九卷劉琴撰琴字松雪任邱人乾隆丙辰舉人官順義縣教諭邊連寶序略曰是編自雍正丁未至乾隆壬午三十年而後脱稿臨歿猶斟酌改竄一以紫陽為主不敢稍背云四書就正録十九卷四書晰疑無卷數陳鋐撰鋐字宏猷嘉定人晰疑例略曰四書疑義雖多其間或有一説之確當於經義者概不敢贅特輯朱注以來諸説之所未偹而或未定者故論孟皆少而學庸多虹舟講義二十卷李祖惠撰祖惠本姓沈字屺望嘉興人乾隆壬申進士官高安縣知縣四書句讀釋義十九卷范凝鼎撰凝鼎字庸齋自號磨鏡居士洪洞人選㧞貢生四書逸箋六卷程大中撰大中字拳時號是菴應城人乾隆丁丑進士四書講義尊聞録二十卷戴鋐撰鋐字景亭長洲人四書窮鈔十六卷王國瑚撰國瑚字夏器號珍吾臨縣人襍説八卷不著撰人姓氏右四書御定律吕正義五卷臣等謹按康熙五十二年聖祖仁皇帝御撰律厯淵源此其第二部也凡分三編上編二卷曰正律審音以定尺考度推求律本下編二卷曰和聲定樂以明因律制器并圖説之同異續編一卷曰協均度曲則取西洋聲律節奏而以古法證之欽惟聖祖仁皇帝學究天人心㕘造化故能辨積黍之縱横審旋宫之端委神明通手制作之原度數析乎精微之藴自非聖神天縱烏能使千古難明之絶學炳如復旦也乎御纂律吕正義後編一百二十卷乾隆十一年和碩荘親王允禄和碩履親王允祹大學士張廷玉等奉敕纂皇上御製序曰皇祖聖祖仁皇帝建中和之極通聲氣之元欽定律厯淵源一書審推歩以明象緯研數理以備成法至律吕正義凡所以定尺考度制器審音與夫五聲二變應和之原析其精微區其訛舛古樂之大義明而千古有定論今樂之至理具而千古有正聲誠所謂惟聖人能之者顧七政授時九章布算至今遵循罔斁而律吕尚未暇施行太常之司和聲之署習其氣而不能究其所以然遂并其所習者而失之襲謬承偽不協不度篇章音節非重為釐正不可和碩莊親王親承皇祖指授貫徹樂義尚書張照研窮律本博習往訓因命協同考正朕親加釐定為器為音為宫為調聲之高下節奏之短長分刌而節比之合則仍其故不合則易其辭更其調或出自臣工撰述或出自幾暇親裁必考義理之原究制作之本夫而後郊廟所陳朝㑹燕饗所奏律吕各得其宜歌奏不淆其序八音克諧無相奪倫矣爰詮次成編俾垂永乆更叅稽前代因革損益之異為樂器考樂制考樂章考度量權衡考以備律吕之條貫復推闡為樂問三十五篇以申明其㫖趣於是而聖祖之所為審音定樂制器協均者一一旋諸實用自漢魏以迄元明是非得失之故瞭然可述名之曰後編者實以徴皇祖天縱聖神通極造化千古作者無能出其範圍亦無能窺其涯涘至於繼述先緒則在我後人益亹焉而弗敢忘臣等謹按是編凡分十類曰祭祀樂曰朝㑹樂曰宴饗樂曰導迎樂曰行幸樂曰樂器考曰樂制考曰樂章考曰度量權衡考曰樂問葢聖祖仁皇帝首闡聲氣之元我皇上洞徹源流備徴器數至是而律吕之學粹然集萬古之大成矣大成樂律一卷孔貞瑄撰貞瑄字璧六晩號聊叟曲阜人順治庚子舉人官大姚縣知縣鐘律陳數一卷顧陳垿撰陳垿字玉停太倉人康熙己酉舉人官行人司行人古樂經傳五卷李光地撰光地見易類臣等謹按是書首樂經即周官大司樂章而注之是為古樂經次樂記即小戴禮之樂記注之次附樂經即易書詩周禮儀禮之言樂者注之次附樂記一聲律篇取禮記左傳國語管子吕氏春秋淮南子史記漢書後漢書通典文獻通考及宋儒之言樂者注之次樂教篇取孟子禮記之言注之次樂用篇取孟子禮記左傳之言注之而附以樂論三篇皆考核精詳議論確當固非師心臆度者所可比擬也古樂書二卷應撝謙撰撝謙見易類聖諭樂本解説二卷皇言定聲録八卷竟山樂録四卷毛竒齡撰竒齡見易類李塨序曰樂者六經之一也漢藝文志稱六經為六藝六藝者一易二書三詩四禮五樂六春秋也則是樂在春秋之前而惜其經不傳迄於今即志所載六家之學尚存百六十五篇者亦皆不傳而於是樂亡焉先生少於樂有神解著樂録四卷㑹聖諭樂本指生聲之法開周秦以後既亡之緒因之著樂本解説二卷皇言定聲録八卷塨讀而感之越三千里請受樂凡三日恍然曰如是乎豁然開於心即以所受五音二變四清七始九聲十二管之㫖歸而被以歌按以器色始知人皆有聲以人聲而調之以律皆可以為樂而乃籌管量尺稱錙算黍使舉世茫然以為古樂不可復是猶言衣食者不以口嘗味以身量衣但聞古聖衣食之制皆取諸易因争執乾坤以為衣裳描畫小過以當杵臼令人惶惑莫解駭衣食為神竒而去之卒至飢寒相尋而莫知返不亦異哉夫以塨之愚聞先生言尚覺心怡意解渢渢手古樂若在當前况天下之大生人之衆誰非具天地自然之聲者一倡百和清明廣大之奏可立致也臣等謹按前二種竒齡嘗於康熙三十八年繕録恭進其後一種則竒齡所自作而託於其父鏡所傳鏡字竟山故題曰竟山樂録律吕圖説九卷王建常撰建常字仲復渭南人王士禎曰此編本諸朱蔡㕘之李文利王子魚邢雲路諸書而折𠂻以自得之義李氏學樂録二卷李塨撰塨見易類塨自識曰塨學樂河右先生一年餘矣雖窺涯岸未盡精微也其明年春卜旋里乃將五聲歌訣及旋宫相生諸義修札求剖而忽忽拜别受言未悉鬱抑於心端月北上一路沉吟似有所得若相生圖則四易稿乃成焉因具録如左以備就正臣等謹按􅷊嘗問樂五音七聲十二律以器色相配之説於毛竒齡因手録之附宫調圖七調全圖十二律旋相為宫隔八相生七聲旋宫相生諸圖而皆為之論説主於四上尺工六五字圓轉為用於黄鍾律本之義一無發明存之以備參考可耳樂經内編二十卷張宣猷撰氏籍未詳律吕新書注三卷周模撰模儀封人律吕新書衍義一卷吕夏音撰夏音字大昭新昌人雍正丙午舉人官知縣臣等謹按蔡元定論律吕相生謂六律在子寅辰午申戍六陽辰者皆損而下生六吕在丑卯己未酉亥六隂辰者皆益而上生至㽔賔生大吕損而下生其管只四寸一分八釐三毫夷則生夾鍾損而下生其管只三寸六分六釐三毫無射生仲吕損而下生其管只三寸二分八釐六毫於是謂三吕在隂無所增損三吕在陽則用倍數使與十二月之氣相應夏音雖取元定之書更為推闡而不從其説専主吕氏春秋淮南子之論無惑乎與司馬遷班固諸家古法多不合耳樂律表微八卷胡彦昇撰彦昇字竹軒徳清人雍正庚戍進士官定陶縣知縣賡和録二卷何夢瑶撰夢瑶字報之南海人雍正庚戍進士臣等謹按是書恭録聖祖仁皇帝律吕正義為述要上下卷末附所纂蔡氏律吕新書訓釋曹庭棟琴學纂要二篇諸家論琴律皆云一弦為宫蔡曹二書亦仍舊説恭讀御定律吕正義本管子白虎通諸書以大弦為倍徴三弦為宫與諸説逈異夢瑤未能㨿正義以糾流傳之誤則亦烏能推闡聖製之精微乎易律通解八卷沈光邦撰光邦臨海人雍正中官中書舎人樂經古義二卷童能靈撰能靈見易類律吕新論二卷律吕闡微十卷江永撰永見禮類臣等謹按新論上卷分九篇下卷分七篇大㫖本京房造均以弦求聲之意故以琴音立説不知管音弦音生聲取律稍有不同故不免於牽合闡微十卷首録聖祖仁皇帝論樂五條為皇言定聲一卷然於五線六名八形號三遲速之類多不能解則亦未嘗恭讀御製律吕正義也其書中大㫖多原本於鄭世子樂書惟方圓周徑用密率起算則不能盡合云大樂元音七卷潘士權撰士權號龍菴黔陽人官太常寺博士士權自序曰琴備五音之全以全音之琴而定各音之調則無不可就理愚嘗欲定古樂於琴而音則究無有一定讀管子有云下徵之數一百八下羽之數九十六又白虎通云弦音離故首徴由是按弦審音以首弦為下徴二弦為下羽三宫四商五角六徴七羽且從全數而半之而再半之而再半半之靡不各如其音以相應粗述鄙見聊為盛世雅樂之助云爾律吕新書箋義二卷羅登選撰登選衡山人臣等謹按登選以蔡沈律吕新書至明永樂中列入性理大全而韓邦奇直解李文察補注今皆不傳乃薈為箋釋卷首附集論及八音考略各一卷葢取蔡元定書為之訓釋間附以臆説不能無強合云律吕圖説一卷張紫芝撰紫芝字鷲山一字秀山杭州人音律節略考一卷潘繼善撰繼善號本菴婺源人黄鍾通韻二卷都四徳撰都四徳字乾文號秋莊滿洲鑲紅旗人樂原無卷數舊本題囂囂子撰名字里籍未詳律吕纂要二卷不著撰人姓氏琴㫖二卷王坦撰坦字吉途江南通州人臣等謹按是書奉御定律吕正義為宗而反復推求精思闡發論琴音之律吕而獨得其宗㫖故附之於樂不以之入藝術類焉右樂讀禮問一卷吳肅公撰肅公見詩類臣等謹按是書辨論禮家喪服之制意所未喻及俗禮之不合於古者雖㫁以已見亦頗有可採焉讀禮偶見二卷許三禮撰三禮字典三湯隂人順治辛丑進士官至兵部右侍郎朱子禮纂五卷李光地撰光地見易類汪漋曰文貞服膺朱子於語類手輯至再是編則専擇其言之闗渉經典散見文集及語類者讀禮通考一百二十卷徐乾學撰乾學字原一號健菴崑山人康熙庚戍進士第二官至刑部尚書讀禮記略六卷附婚禮廣義一卷朱董祥撰董祥字熊占長洲人婚禮辨正一卷喪禮吾説篇十卷辨定祭禮通俗譜五卷毛竒齡撰竒齡見易類竒齡婚禮辨正自述曰㓜時觀鄰人娶婦婦至不謁廟不拜舅姑歸而疑之急舉似之仲氏仲氏曰斯禮之不明五百年矣禮無不謁廟者娶則告迎入則謁至曲禮曰齋戒以告鬼神此告迎也左傳曰夫人姜氏入此謁至也婦至之夕必入而告謁謂之謁廟亦謂之朝廟予聞其言越數十年每就人質難而不得要領予本無學而仲氏又逝全禮不明將以俟後之有學者因先録婚禮一節記其所聞於仲氏之所言者以就正有道名曰辨正嗟乎世豈無知禮者耶又自序吾説篇曰少時與先仲兄相訂纂喪祭二禮以正末俗而奔走鹿鹿何能著書往往偶記一禮但黙㑹其意以為之説縱不之考據而疑即闕之初還里時先輯祭禮通俗譜藉以問世而衰疾頓至急取喪禮所為説因陋就簡綴成帙間較胸臆所未備者縱或原文難稽多以已意相疏校而一往審慎並不敢鈔易其辭而變反其義至於武㫁則務絶焉子不云乎吾學周禮今用之則但從先古所傳與習俗所誤而較論其間是亦夫子吾説之意也臣等謹按婚禮辨正一書論頗辨博多有根據惟穿鑿處在所不免吾説篇則恃才譎辯妄肆攻擊竒齡説經固多立異此則其叛經之尤者通俗譜則取朱子家禮并各族祠堂禮酌以今制先為譜以備叅考斟酌變通辨析古俗存之以備一家之説可耳學記五卷李塨撰塨見易類服制圖考八卷朱建子撰建子字辰起秀水人朱彞尊之從子儀禮節要二十卷朱軾撰軾見易類臣等謹按軾家居時嘗輯吉凶諸禮載之譜牒其後又博蒐三禮及唐宋議禮諸書著為家儀及後廵撫浙江乃増訂全書益以士相見鄉飲酒禮為十七卷而屬其門人王葉滋為圖三卷附刋行世其目冠禮一學義一婚禮二士相見一鄉飲酒一喪禮九祭禮二有黄利通為之序家禮辨定十卷王復禮撰復禮號草堂錢塘人四禮寧儉編無卷數王心敬撰心敬見易類婚禮通考二十四卷曹庭棟撰庭棟見易類齊家寳要二卷張文嘉撰文嘉字仲嘉錢塘人右儀注皇朝文獻通考卷二百十七
