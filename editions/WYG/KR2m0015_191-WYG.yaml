body:
  text: 兵考十三藩部各旗臣等謹按自昔帝王聲教所訖遐邇咸賓凡在要服荒服之列者要不過使之保塞壖通朝貢而止我聖朝威徳隆盛列部來同絶幕之遥如在宇下北自内扎薩克蒙古及喀爾喀西迄於青海等部統以旗籍以時簡其軍實審其壯丁其制並同内八旗故入覲則隨獮狩之班有事則備徴調之用兵制之盛古未有也其爵系已入封建考其疆域已入輿地考兹謹將其編旗之數分次於左内扎薩克䝉古科爾沁六旗在奉天錦州二府北邉外左翼旗左翼前旗並於崇徳元年設左翼後旗於順治六年設右翼旗右翼前旗右翼後旗並於崇徳元年設其左翼旗自本旗外兼統轄前後二旗及郭爾羅斯二旗扎薩克事右翼旗自本旗外兼統轄前後二旗及杜爾伯特扎賴持二旗扎薩克事郭爾羅斯前後二旗在奉天府及吉林北邉外並於順治五年設杜爾伯特一旗在白都訥及黒龍江将軍地西北邉外郭爾羅斯旗之北於順治五年設扎賴特一旗在白都訥及黒龍江将軍地西北邉外郭爾羅斯旗之北於順治五年設扎魯特二旗在塔子溝㕔東北境外喀爾喀左翼旗之北左翼旗於崇徳元年設右翼旗於順治五年設喀爾喀左翼一旗在塔子溝㕔東北境外於康熙三年設奈曼一旗在塔子溝㕔東北境於崇徳元年設敖漢一旗在塔子溝㕔北境於崇徳元年設土黙特二旗在錦州府西北邉外塔子溝㕔東境左翼旗於崇徳元年設右翼旗於順治二年設喀喇沁三旗在永平府口外塔子溝㕔八溝㕔境左翼旗於順治五年設右翼旗於崇徳元年設增添一旗於康熙四十四年設翁牛特左右二旗在八溝㕔北境並於崇徳元年設阿禄科爾沁一旗在八溝㕔東北境外於崇徳元年設巴林左右二旗在木蘭北境外並於順治五年設克西克騰一旗在木蘭北境外於順治三年設烏珠穆秦二旗在巴林旗之北右翼旗於崇徳六年設左翼旗於順治三年設蒿齊忒二旗在克西克騰旗之北左翼旗於順治三年設右翼旗於順治十年設阿霸咯納爾二旂在多倫諾爾㕔北境外左翼旗於康熙四年設右翼旗於康熙六年設阿霸垓二旂在多倫諾爾㕔北境外右翼旂於崇徳六年設左翼旂於順治八年設蘇尼特二旗在張家口外鑲黄旗正黄旗察哈爾之北左翼旗於崇徳六年設右翼旗於崇徳七年設四子部落一旗在張家口外正紅旗鑲紅旗察哈爾之北於順治八年設喀爾喀右翼一旗在殺虎口外歸化城之北於順治十年設毛明安一旗在殺虎口外歸化城之北於順治初年設呉喇忒前中後三旗在河套之東北並於順治五年設鄂爾多斯七旗在歸化城西河套内左翼中旗前旗後旗右翼中旗前旗後旗並於順治六年設増添一旗於雍正九年設歸化城土黙特左右二旗在殺虎口北歸化城並於崇徳元年設今以副都統往管旗務並統於綏逺城将軍互見山西駐防喀爾喀土謝圖汗部二十旗為中路駐翰海北圖拉河左右在蘇尼特四子部落諸部北境外康熙三十年設十七旗三十二年以後增至三十五旗雍正年間增至三十八旗尋分二十旗屬於賽音諾顔部存十八旗乾隆元年以後復増設二旗於本旗外分十九扎薩克掌之仍統轄於土謝圖汗喀爾喀車臣汗部二十三旗為東路駐瀚海北克魯倫河左右在阿霸哈納爾阿霸垓諸部北境外康熙三十年設十二旗三十五年以後増至二十一旗乾隆十四年增設一旗二十二年復増設一旗於本旗外分二十二扎薩克掌之仍統轄於車臣汗喀爾喀扎薩克圖汗部十七旗為西路駐杬愛山左右在賀蘭山厄魯特北境外康熙三十年設八旗三十三年以後增至十二旗雍正年間增至十五旗乾隆十三年增設一旗二十二年復增設一旗於本旗外分十六扎薩克掌之仍統轄於扎薩克圖汗喀爾喀賽音諾顔扎薩克親王部二十二旗駐翁金河北在毛明安呉喇忒諸部北境外雍正十年設即於土謝圖汗部内分轄二十旗乾隆元年以後復增二旗於本旗外分二十一扎薩克掌之仍統轄於賽音諾顔扎薩克親王烏蘭烏蘇厄魯特部二旗即在賽音諾顔境内康熙二十五年設一旗駐喀爾喀河一旗駐達拉爾河乾隆二十六年移於烏蘭烏蘇並屬賽音諾顔部統轄賀蘭山厄魯特部一旗駐河套西在寧夏府涼州府甘州府北邊外於康熙三十六年設額濟内土爾扈特部一旗駐額濟内河在甘州府及肅州北邊外於康熙四十三年設青海厄魯特部二十一旗在甘肅之西寧洮岷西邊外四川之松潘北邊外雍正三年設二十旗乾隆十一年增設一旗青海游牧綽羅斯部二旗於雍正三年設青海遊牧輝特部一旗於雍正三年設青海遊牧土爾扈特部四旗於雍正三年設青海游牧喀爾喀部一旗於雍正三年設哈宻一旗在安西府西北境外於康熙三十六年設土魯畨一旗在西域天山南路之闢展地方雍正十年設一旗移駐於嘉峪闗外之𤓰州乾隆二十一年移於魯古沁二十二年以平定西域還駐土魯畨城故地都爾伯特部十四旗駐烏蘭古木等處地方為準噶爾四衛拉特之一舊在額爾齊斯游牧乾隆十八年其台吉䇿凌䇿凌烏巴什䇿凌孟克等率所屬内附詔封以汗王貝勒貝子公等爵有差編為十四旗其部衆夏駐烏蘭古木地方冬駐科卜多迤東附近地方以上各部俱詳見與地考土爾扈特部分駐博瑚圖和博克薩里科卜多阿爾台等處地方為準噶爾四衛拉特之一舊在伊犁之額什爾努喇等處游牧至和鄂爾勒克與巴圖魯渾台吉不睦竄入俄羅斯居於額濟勒之地乾隆三十六年其台吉渥巴錫䇿伯克多爾濟舍楞等率所屬來歸詔封渥巴錫為烏納恩素珠克圖舊土爾扈特部卓里克圖汗封䇿伯克多爾濟為烏納恩素珠克圖舊土爾扈特部布延圖親王封舍楞為青色特竒勒圖新土爾扈特部弼里克圖郡王封巴木巴爾為弼什勒爾圖郡王封功格為巴圖色特竒爾圖和碩特部圖薩圖貝勒封黙們圖為濟爾噶爾貝勒封旺丹為鄂爾哲依貝子封沙喇扣肯為烏察拉爾圖貝子封克布騰為伊特格勒具子封葉勒木丕爾為阿穆爾靈貴貝子封額黙根烏巴什為巴雅喇爾圖貝子封拜濟呼為協理公封諾海博爾哈什哈為頭等台吉俱作為扎薩克封阿拉克巴博克班䝉衮徳爾徳什巴雅爾喇瑚䇿登博羅業林巴木巴爾之子丹拜扎爾桑根敦諾爾布之子騰特克等十人俱為閑散頭等台吉封諾爾布䇿楞烏梁海扎納錫禮玉増濟卜藏巴特瑪等六人俱為二等台吉封三達克額林親達瓦諾木琿等三人俱為三等台吉封巴布爾達克諾音格楞巴圖爾圖古爾扎納木羅卜藏楚魯木扎林業林之子舍楞圖古斯蒙庫三達克之子懇澤等十一人俱為四等台吉復度地定居分駐其衆渥巴錫等駐博瑚圖地方䇿伯克多爾濟等駐和博克薩里地方舍楞等駐科卜多阿爾台附近地方巴木巴爾等駐楚爾地方旺丹等駐多羅諾圖地方黙們圖等駐書魯台地方博羅等駐烏蘭和托地方凡一切事宜並照䇿凌䇿凌烏巴什等之例一體辦理臣等謹按各藩部設旗之制同於内八旗謹編次入兵考與輿地封建二門互見以彰聖朝兵制之盛洪惟我皇上徳威逺播西陲悉𨽻版圖凡平定準噶爾回部御製紀事之文俱恭載入輿地考用昭幅員式廓之極軌至於土爾扈特本準噶爾四衛拉特之一其先世竄居俄羅斯離其故土逮後都爾伯特部率先臣服其綽羅斯和碩特輝特等部相繼翦滅惟土爾扈特部遁跡北荒多厯年所雖逖聴聲教曾經遣使來朝而越在異鄉罕有寧宇兹於乾隆三十六年其台吉等景仰聖化率全部之衆踰越險阻不招自徠實為往牒所未見於是特命大臣等贍其餼牽給其衣帳入覲之後敬循祖制錫之封爵指地授居睿慮周詳計垂乆逺復親灑宸翰紀其縁起以徵信萬世謹載入兵考藩部各旗之後猗歟盛哉從兹休養生息世守藩衛以長享天朝太平之福葢靡有窮極矣御製土爾扈特全部歸順記始逆命而終徠服謂之歸降弗加征而自臣屬謂之歸順若今之土爾扈特携全部捨異域投誠嚮化跋渉萬里而来是歸順非歸降也西域既定興屯種於伊犁薄賦税於回部若哈薩克若布魯特俾為外圉而覊縻之若安集延若拔達克山益稱逺徼而概置之知足不辱知止不殆朕意亦如是而已矣豈其盡天所覆至於海隅必欲悉主悉臣為我僕屬哉而兹土爾扈特之歸順則實天與人歸有不期然而然者故不可以不記土爾扈特者準噶爾四衛拉特之一其詳已見於準噶爾全部紀略之文溯厥始率亦荒略弗可考後因其汗阿玉竒與䇿妄不睦竄歸俄羅斯俄羅斯居之額濟勒之地康熙年間我皇祖聖祖仁皇帝嘗欲悉其領要令侍讀圖麗琛等假道俄羅斯以往而俄羅斯故為紆繞其程凡行三年又數月始反命今之汗渥巴錫者即阿玉竒之曾孫也以俄羅斯征調師旅不息近且徵其子入質而俄羅斯又屬别教非黄教故與合族台吉宻謀挈全部投中國興黄教之地以息肩焉自去嵗十一月啟行由額濟勒厯哈薩克繞巴勒喀什諾爾戈壁於今嵗六月杪始至伊犁之沙拉伯勒界凡八閲月歴萬有餘里先是朕聞有土爾扈特來歸之信慮伊犁将軍伊勒圖一人不能經理得宜時舒赫徳以參贊居烏什辦回部事因命就近前往而畏事者乃以新來中有舍楞其人曾以計誘害我副都統唐喀禄唐喀禄於戊寅四月偕厄魯特散秩大臣和碩齊率兵追捕逸賊至布古什河源射舍楞弟勞章扎布仆而禽之既而舍楞至稱欲投誠請釋其弟唐喀禄雖許而疑其詐欲先擒舍楞和碩齊云擒之無益不若招之使降越日舍楞詭稱欲入覲且携衆至唐喀禄益疑之和碩齊復言彼畏我兵威不敢動移曷親蒞撫諭之唐喀禄信其言從數人往既至和碩齊勸各觧鞍去櫜鞬俄頃變作唐喀禄遂遇害和碩齊即降賊尋擒獲伏誅舍楞乃竄俄羅斯境因以竄投俄羅斯者恐其有詭計議論沸起古云受降如受敵朕亦不能不為之少惑而略為備焉然熟計舍楞一人豈能聳動渥巴錫等全部且俄羅斯亦大國也彼既背棄而來又擾我大國邉界進退無據彼将焉往則是歸順之事什之九詭計之伏什之一耳既而果然而舒赫徳至伊犁一切安汛設偵籌儲宻備之事無不悉妥故新投之人一至如歸且掄其應入覲者由驛而來朕即命隨圍觀獵且於山莊宴賚如都爾伯特䇿凌等之例焉夫此山莊乃我皇祖所建以柔逺人之地而燕賚䇿凌等之後遂以平定西域兹不數年間又於無意中不因招致而有土爾扈特全部歸順之事自斯凡屬䝉古之族無不為我大清國之臣神御咫尺有不以操先劵閲後成愜志而愉快者乎予小子所以仰答祖㤙益凜天寵惴惴焉孜孜焉惟恐意或滿而力或弛念兹在兹遑敢自詡為誠所感與徳所致哉或又以為不宜受俄羅斯叛臣虞起邉釁葢舍楞即我之叛臣歸俄羅斯者何嘗不一再索取而俄羅斯訖未與我也今既來歸即以此語折俄羅斯彼亦將無辭以對且數萬乏食之人既至近界敺之使去彼不刦掠畜牧将何以生雖有堅壁清野之説不知伊犁甫新築城而諸色人皆頼耕牧為活是壁亦不易堅而野亦不可清也夫明知人以嚮化而來而我以畏事而止且反致㓂甚無謂也其衆渉逺厯乆力甚疲矣視其之死而惜費弗救仁人君子所不忍為况體天御世之大君乎發帑出畜力為優恤則已命司事之臣土爾扈特部衆長途疲頓凍餒㡬不能自存因命舒赫徳等分撥善地安置仍購運牛羊糧石以資養贍置辦衣裘廬帳俾得禦寒並為籌其乆逺資生之計令皆全活安居咸獲得所兹不贅記記事之縁起如右御製優恤土爾扈特部衆記歸降歸順之不同既明則歸順歸降之甲乙可定葢戰而勝人不如不戰而勝人之為盡羙也降而來歸不如順而來歸之為盡善也然則歸順者較歸降者之宜優恤不亦宜乎土爾扈特歸順源委已見前記兹記所以優恤之者方其渡額濟勒而來也戸凡三萬三千有奇口十六萬九千有奇其至伊犁者僅以半計夫此逺人嚮化擕孥挈屬而徠其意甚誠而其阽危求息狀亦甚憊既撫而納之茍弗為之贍其生猶弗納也贍之而弗為之計長乆猶弗贍也故自聞其來及其始至以迨於今惟此七萬餘衆凍餒㒬瘠之形時懸於目而惻於心凡宵旰所究圖郵函所咨訪無暇無輟乃得悉其大要於是為之口給以食人授之衣分地安居使就米榖而資耕牧則以屬之伊犁將軍舒赫徳出我牧羣之孳息驅往供饋則以屬之張家口都統常清發帑運茶市羊及裘則以屬之陜甘總督呉達善而嘉峪闗外董視經理則以屬之西安廵撫文綬惟時諸臣以次馳牘入告於伊犁塔爾巴哈台之察哈爾厄魯特凡市得馬牛羊九萬五千五百其自達里岡愛商都達布遜牧羣運往者又十有四萬而哈宻闢展所市之三萬不與焉撥官茶二萬餘封出屯庾米麥四萬一千餘石而初至伊犁賑贍之茶米不與焉甘肅邉内外暨回部諸城購羊裘五萬一千餘襲布六萬一千餘匹棉五萬九千餘觔氊廬四百餘具而給庫貯之氊棉衣什布幅不與焉計儲用帑銀二十萬兩而賞貸路貲及宴次賚予不與焉其台吉渥巴錫等之入覲者乗𫝊給餼而來至則錫封爵封渥已錫為卓里克圖汗策伯克多爾濟為布延圖親王舍楞為弼里克圖郡王功格為圖薩圖貝勒默們圖為濟爾噶爾貝勒沙喇扣肯為烏察拉爾圖貝子葉勒木丕爾為阿穆爾靈貴貝子徳爾徳什達木拜扎爾桑為頭等台吉懇澤為四等台吉其未至之巴木巴爾亦封為郡王旺丹克布騰封為貝子拜濟呼封為公餘封台吉等秩有差備恩禮各賜鞍馬櫜鞬黄袿並賜渥巴錫策伯克多爾濟黄轡舍楞功格默們圖沙喇扣肯紫轡其汗王皆賜三眼翎貝勒貝子雙眼翎餘皆花翎並視其爵秩錫以章服其往也復慮其身之生不宜内地氣候䝉古以已出痘為熟身未出痘為生身其生身者多畏染内地氣候出痘則命由邊外各臺厯巴里坤以行而迎及送並遣大臣侍衛等護視之用以柔懐逺人俾毋致失所或有以為優恤太甚者葢意出於鄙吝未習聞國家成憲毋惑乎其見之隘也昔我皇祖聖祖仁皇帝時喀爾喀土謝圖汗等為厄魯特所殘破率全部十萬衆來歸皇祖矜其窮阨命尚書阿喇厄等徃撫之發歸化城張家獨石二口倉儲以振其乏且足其食又飭内大臣費揚古明珠等齎白金茶布以給其用採買牲畜以資其生遂皆安居得所循法度樂休養迄今八十餘年喀爾喀衆以康熙二十七年來歸畜牧日以蕃生殖日以盛樂樂利利殷阜十倍於初其汗王台吉等世延爵禄恪守藩衛一如内扎薩克之效臣僕長子孫莫不感戴聖祖徳澤及人之深得以長享昇平之福也朕惟體皇祖之心為心法皇祖之事為事惟兹土爾扈特之來其窮阨殆無異曩時之喀爾喀故所以為之籌畫無弗詳賙恵無少靳優而恤之且計長乆庸詎知謀之勞而費之鉅乎兾兹土爾扈特之衆亦能如喀爾喀之安居循法勤畜牧務生殖勿替厥志則其世延爵禄長享昇平之福又何以異於今之喀爾喀哉用是臚舉大凡勒石熱河及伊犁俾土爾扈特汗王部衆咸識朕意且以詔自今以往我諸臣之董其事者御製土爾扈特部紀略事不再三精覈率據耳食以為實君子弗為也言不求於至是已覺其失䕶已短而莫之改易君子弗為也必知斯二者然後可以秉史筆以記千載之公是公非余之為土爾扈特部之紀略亦亹是而已土爾扈特之初來也葢嘗詠之詩載之記皆以為始自阿玉奇汗溯而上之荒略弗可考此亦述向之所聞者而書之而不知其更有所祖非始自阿玉竒兹以其麋至乃得一一詳徵其實為之重記何必隠約弗明以諱吾前言之未精覈哉阿玉竒之父曰棚楚克其祖曰書庫爾岱青其曾祖曰和鄂爾勒克其高祖曰卓立甘鄂爾勒克其高祖之父則曰貝果鄂爾勒克自貝果鄂爾勒克溯而上之實逺不可徵其入俄羅斯也則自阿玉竒之曾祖和鄂爾勒克於䇿妄之祖巴圖魯渾台吉時其時四衛拉特各自為汗無所統屬又不相和睦和鄂爾勒克因率其子書庫爾岱青等至俄羅斯之額濟勒地其時阿玉竒尚在襁褓因留巴圖魯渾台吉處後書庫爾岱青往西藏而回遂向渾台吉索阿玉竒歸俄羅斯巴圖魯渾台吉為阿玉竒之外祖以時代計之適相當而阿玉竒汗時其子散扎布台吉率所屬一萬五千餘户往投䇿妄䇿妄盡留其屬而逐散扎布歸額濟勒則向記所云阿玉竒與䇿妄不睦亦未為大誤也自貝果鄂爾勒克至和鄂爾勒克皆單𫝊和鄂爾勒克有子六人一即書庫爾岱青餘三無子其二皆有子孫式㣲無足𫝊書庫爾岱青子四二絶嗣其一曰那木䇿楞四𫝊而至巴木巴爾今封郡王其一即棚楚克四𫝊而至渥巴錫今封汗棚楚克之子阿玉竒有子八人其六皆無子嗣其一曰衮扎卜有子嗣今之封親王䇿伯克多爾濟者其曾孫也衮扎卜乃渥巴錫之祖沙克都爾扎卜之親弟故其子孫為渥巴錫近族與沙克都爾扎卜子孫皆隨渥巴錫而來其户口之數已見前記兹惟記其始祖所自出並証前之失精覈而未實者至其重黄教置鄂拓克宰桑之類率同凖噶爾但具體而㣲葢準噶爾之紀略紀其全部之盛衰而兹土爾扈特之紀略則紀其世系之詳悉云爾西域兵臣等謹按西域天山南北從古未及版圖前史所載或勝兵數千人或勝兵數百人止就其部落中丁壯可用之數言之與兵制無與也漢唐以來雖置都䕶都督等官不過遥示覊縻初未嘗設兵鎮守同於内地我皇上天威逺播綏定殊方分設兵防以為善後之計其中滿洲蒙古索倫察哈爾厄魯特緑旗營兵皆參錯互用或永駐以安室家或更畨以均