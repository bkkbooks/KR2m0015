body:
  text: 欽定四庫全書皇朝文獻通考卷九十三郊社考三郊乾隆元年正月辛丑祈穀於上帝皇上親詣行禮先是雍正十三年九月皇上紹登大寶仁孝方篤逾三月後羣臣以祀典上請奉諭㫖郊廟大祀朕自不敢因一已孺慕之私情有缺天祖禘嘗之鉅典所議朕詣行禮甚是但先期齋戒所以潔齊心志對越神明朕意齋戒之日即當素服冠綴纓緯其視祝版亦當照例用禮服以昭敬謹朝日夕月等祀雖係遣官行禮然誠敬之心黙為昭格陟降左右不啻親承朕意於遣祭之日亦應素服冠綴纓緯方與禮意相合爾等再議具奏禮部等遵㫖議上允之於乾隆元年孟春祈穀行禮如儀二年四月甲戌大祀天於圜丘奉世宗憲皇帝配享行恭奉神牌㕘拜上帝之禮先是元年十二月諭禮部仰惟皇考世宗憲皇帝徳並高深恩覃海宇駿烈鴻功垂裕百世允宜配享郊壇永崇禋祀朕思來年三月升祔太廟之後配享之禮理宜敬謹舉行苐其時夏至伊邇冬至尚遥敬稽我朝舊制順治十四年三月世祖章皇帝恭奉太宗配享圜丘翼日配享方澤康熙六年十一月丁未時屆南郊聖祖仁皇帝恭奉世祖配享越十日配享方澤兩朝典制均係特行禮隆儀備燦垂史冊且稽之經傳成周郊祀后稷以配天宗祀文王於明堂以配上帝即月令所謂季秋大享帝也召誥三月丁巳用牲於郊釋者謂非常祀而祭天以告定位也又宋仁宗皇祐二年以大慶殿為明堂合祭天地三聖並侑一如圜丘南郊之儀則是古來因事郊祀之禮不必定在二至之時明矣我朝舊制盡孝盡誠與古符合來年世宗憲皇帝配天大禮宜遵照舉行於是禮部具儀奏上奉諭㫖爾部具奏皇考配享天壇儀注朕敬謹詳閲内稱配享時朕恭奉神牌陞壇奉安於東三青幄次並未議及㕘拜上帝之儀朕思升祔太廟時先行㕘拜列祖列后禮然後陞座今配享圜丘亦應先行㕘拜上帝禮然後陞座於理方協議政王大臣等議奏伏查本朝會典及明會典未經詳載神牌㕘拜上帝之儀今皇上特諭臣等詳議仰見皇上仁孝敬謹之心至周至備應遵㫖増入㕘拜上帝之儀實為盡善儀注見後其夏至配享方澤㕘拜皇地祇俱遵此儀至上辛配享祈穀壇不必再行㕘拜禮疏入從之正祭日皇上恭奉世宗憲皇帝神位㕘拜皇天上帝禮畢奉安於上帝神位之左世祖章皇帝之次第三青幄内前期祭告一應禮儀均與雍正元年同三年正月辛酉祈穀於上帝奉世宗憲皇帝配享七年十一月二十六日辛巳冬至大祀天於圜丘以齋戒於皇太后萬夀前三日預行慶賀禮十二年十一月定郊壇大祀誓戒百官之禮是嵗冬至大祀後六日奉諭㫖古天地大祀前期有百官受誓戒之禮周官冢宰祀五帝則掌百官之誓戒唐宋則掌以太尉或於尚書省或於朝堂明初誓於中書省後於闕門宣制嘉靖中則親御奉天殿百官朝服聴誓戒所以聳衆聴而致肅共儆怠玩典至重也國朝祀典太常寺先期行文出示葢本古人誓戒遺意而集衆宣示儀章未舉朕思八政祀居其首而大祀莫重於郊嗣後有事於圜丘方澤祈穀雩祭應於午門前宣誓戒陪祀之王公文武大臣官員朝服齊集跽聴行禮以明齊明嚴敬之意大學士會同該部稽古具儀以聞尋具儀奏上舉行如儀至十九年大學士等奏令各衙門恭錄敕諭製牌收貯每遇兩郊大祀太常寺豫奏通行令於致齋日恭設堂中隨時仰瞻其宣讀之禮停止允之十二月定郊壇大祀省視神位上香及省視牲器之禮内閣奉諭㫖朕惟致敬郊壇宜從典制乃者朕於大祀前期一日恭詣壇位躬親省視展潔告䖍良云周備惟是神主向藏皇穹宇皇祇室皇乾殿考之唐開元禮先期升主陳設省視復收朕思因省視而陳設神主有違神道靜穆之義未協寅恭嚴事之誠應於躬省皇穹宇皇祇室皇乾殿上香行禮分獻官詣配殿行禮肅將悃忱以伸對越但事屬剏舉着大學士㑹同該部詳悉定議并恭詣壇位後親視籩豆之處具儀以聞尋遵㫖具儀奏上舉行如儀詳見儀注十三年十一月壬子冬至大祀天於圜丘用新成祭器更定大駕鹵簿乗玉輅親詣行禮是嵗正月奉諭㫖國家敬天尊祖禮備樂和品物具陳告豐告潔所以將誠敬昭典則也考之前古籩豆簠簋諸祭器或用金玉以示貴重或用陶匏以崇質素各有精意存乎其間歴代相承去古寖逺至明洪武時更定舊章祭品祭器悉遵古而祭器則惟存其名以甆代之我朝壇廟陳設祭品亦用甆葢沿前明之舊皇考世宗憲皇帝時考按經典範銅為器頒之闕里俾為世守曽宣示廷臣穆然見古先遺則朕思壇廟祭器既遵用古名則祭器自應悉倣古制一體更正以備隆儀著大學士㑹同該部稽核經圖審其名物度數制作欵式折衷至當詳議繪圖以聞朕將親為審定敕所司敬謹製造用光禋祀稱朕意焉十月又諭朕敬天尊祖寅承毖祀壇廟祭器聿既稽考古典親為釐定命所司準式敬造質文有章精潔告備自今嵗圜丘大祀為始灌獻陳列悉用新成祭器展䖍敬焉古者崇郊享則備法駕乗玉輅以稱鉅典國朝定制有大駕鹵簿行駕儀仗行幸儀仗其名㕘用宋明以來之舊而旗章麾葢視前倍簡今稍為增益更定大駕鹵簿為法駕鹵簿行駕儀仗為鑾駕鹵簿行幸儀仗為騎駕鹵簿合三者則為大駕鹵簿南郊用之方澤以下皆用法駕鹵簿五輅酌仿周官及唐宋遺制金玉象革各如其儀乗用亦自今嵗南郊始光昭羽衛用肅明禋諭所司知之十五年四月又諭禮器昭垂世守勿替祠官掌故圖譜宜詳其令内府依鹵簿大駕之例按器繪圖具著體式俾懿文洽禮展帙犁然永傳冊府稱朕修釐法物毖敇明禋至意十四年五月詔齋宫致齋勿鳴鼓角内閣奉諭㫖朕於兩郊大祀先御齋宫以齊一思慮聞之記曰齋者耳不聴樂孔子曰三日齋一日用之猶恐不敬二日伐鼓何居言不敢散其志也今齋宫宵漏下鳴畫角嚴鼓以為節雖異於宫懸合奏而吹角鼓鼜軍中之容豈所以專致其精明者歟此葢相沿前明弊典未更後此嚴更鼓角不當用之齋次大學士其會同禮部定議以聞載入會典是月詔修繕兩郊壇宇展拓舊制是嵗五月皇上以夏至大祀方澤詣齋宫齋宿大學士等奉諭㫖稽古明禋肇祀郊壇各以其色地壇方色尚黄今皇祇室乃用綠瓦葢仍前明舊制未及致詳朕思南郊大享殿在勝國時合祀天地山川故其上覆以青陽玉葉次黄次綠具有深意且南郊用青而地壇用綠於義無取其議更之至兩郊壇宇雖嵗加塗塈而經閲久逺應敕所司省視所當修整者敬謹從事詳考典章具議以聞嗣大學士禮部奏言臣等謹考禮經所載兩郊義類甚著故祭分二至以順陰陽之時壇釐南北以從陰陽之位制别方圜以則陰陽之象惟辨色亦然春官以玉作六器以禮天地四方蒼璧禮天黄琮禮地牲幣各從其器之色所謂依類求神者也制禮從類辨色從方原屬不易之道又况棟宇檐桷乃以藏神祇而昭妥侑其義尤謹明代南北兩郊分祀而皇祇室編次綠瓦臣等詳檢一切禮書並無考據查綠乃青黄間色誠如聖諭於義無取坤卦天元地黄考工記天謂之元地謂之黄二者係乾坤正色今北郊壇甎壝瓦及牲帛幃幄色俱用黄乾隆十三年遵㫖議定籩豆成式地壇祭器亦用黄質製造契合古制寧神與歆神不當有異應請易葢琉璃黄瓦庶與坤卦黄中之義相符若夫兩郊壇宇嵗修向有著令而經閲久逺金碧采章或日久不鮮階級甎甓間有損缺堊赤間有漫漶均宜遵㫖修整及時鳩工疏上上命和親王海望王安國三和總理其事十五年正月諭和親王等圜丘壇上張幄次及陳設祭器處過窄既議鼎新可將圜丘三層臺面仍九五之數量加展寛則執事者得以從容進退益昭誠敬至椶薦向係滿鋪則臺面可以不用琉璃著改用金甎益經久矣王等奏言兩郊制度自前明嘉靖間始定圜丘壇制上成徑廣用明官司尺五丈零九寸取九五之數二成九丈取九數三成十二丈取天全數據明臣張孚敬諭對錄所載大抵以意為量度原非垂自古昔一定不可増減今往壇内較度若依工部營造尺為度未能恰當九五之數謹考聖祖仁皇帝御製律吕正義一書内載古尺制度其長較工部營造尺直八寸一分今依古尺定壇徑廣上成取九數用古尺九丈二成取五數用古尺十五丈三成仍取九數用古尺十九丈既與天數九五之義脗合而幄次之廣深亦可量加展寛俾應陳器物以及執事人員得以從容進退實屬適中又壇面甎塊奉諭改用金甎攷原制甎數上成九重二成七重三成五重上成圍甎取陽數之極自一九起遞加環砌以至九九二成三成圍甎不拘今壇面加廣上成仍照九九墁砌計金甎每塊應長三尺六寸八分下寛三尺五寸七分上寛一尺伏查燒造金甎向例不過二尺二寸今若照依展寛尺寸誠恐燒造維艱若增加塊數又與原制取義不符查直屬房山縣産艾葉青石質性堅澤色應法象可否飭令官員選擇精純者倣依甎式細加磨琢墁砌如原法既得寛長隨宜復足以永垂久逺又壇制每成四陛之外各用青色琉璃欄板圍繞上成每面用九二成每面十七取除十用七之義三成每面積五用二十五雖各成均屬陽數而合計三成數目並無取義謹按易大傳曰乾之策二百一十有六今請用乾䇿依九數分配三成最為宜稱但上成九數琉璃欄板每塊應長四尺五寸有竒比之現今欄板每塊長一尺三寸有餘亦難燒造攷諭對錄明代建壇時曽有欲用南方青石之議後張孚敬以南來石質經霜易致剥落遂不果用竊思現在北地所出艾葉青石堅潤非南方之比堪以如式製辦若易用前項艾葉青石其上成每面一九計三十六二成每面二九計七十二三成每面三九計一百零八合二百一十有六用符乾䇿之數上命大學士等議奏大學士等奏言郊壇規制其意貴於法古而數貴於合宜謹按易大傳曰天數二十有五葢一三五七九皆竒屬陽而五為中數九為老陽是故洛書用五統竒大易用九策筮煌煌聖諭仍九五之數量加展寛至為精當查明時上成用五丈九寸當九五之數稍涉牽合而三成用十二丈則於竒義無取今據奏以古尺計度臺面上成徑九丈為取九數二成徑十五丈為取五數極為妥協惟三成徑十九丈雖亦為竒數然非由九而生謂為仍取九數未盡脗合擬請三成面徑用古尺二十一丈取三七之數上成為一九二成為三五三成為三七則天數一三五七九於此而全且合九丈十五丈二十一丈共成四十五丈於九五之義尤為恰合再考古尺制起黄鍾數協九九我聖祖仁皇帝審元音而定以作樂我皇上重郊壇而推以制禮義既法古而數更合宜應如所奏照依律吕正義所正古尺制度上成面徑九丈二成面徑十五丈惟三成面徑改用二十一丈確核今尺按數興修又查壇面甎塊原置上成圓面九重自一九遞加環砌以至九九其義甚精允宜仍舊至二成七重三成五重圍甎不拘未免參差臣等酌議壇面既加展寛二成三成擬合亦用九重遞加環砌二成自九十至一百六十二三成自一百七十一至二百四十三體制方為整齊再查金甎向例不過見方二尺餘今上成鋪面每塊長濶至三尺五六寸誠難燒造應如所奏用艾葉青石敬謹成造俾保永逺堅固又前奉聖諭臺面椶薦滿鋪是以改用金甎若欄板則係露明不便易用青石應請仍用琉璃成造至原奏稱琉璃欄板每塊長四尺五寸有餘難以燒造臣等伏思欄板扇數加多則尺寸自然減少擬請三成欄板共用三百六十扇應周天度數上成每面十八扇四面計七十二扇每扇之長得今尺二尺三寸餘二成每面二十七扇四面計一百八扇每扇之長得今尺二尺六寸餘三成每面四十五扇四面計一百八十扇每扇之長得今尺二尺二寸餘則扇數加多尺寸減少自然易於成造而每成毎面亦皆與九數相合總計三百六十較之二百一十有六取義尤為明顯再查原奏三成徑數俱係古尺而所定中心圓面週圍壓面及九重之長則皆係今尺至三成臺髙現今上成髙五尺七寸二成髙五尺二寸三成髙五尺並欄柱長濶髙厚踏垜寛深亦係今尺臣等逐項悉按古尺合算畧為増減皆與九數相合如此則郊壇重典制崇法象數協乾元允足昭盛代之宏規垂萬年之鞏固矣謹繪圖列數恭呈御覽奏上允之嗣因琉璃欄板難以成造經總理工程大臣奏明易用青白石須彌座用旱白玉石為欄板柱子添安出水龍頭至十八年工竣十六年九月改祈穀壇大享殿為祈年殿門為祈年門總理工程和親王等奏臣等奉修兩郊壇宇伏見祈穀壇匾額舊書大享二字殿與門相同竊疑名義未協詳考明史紀載縁前明初建大祀殿合祀天地至嘉靖中定南北郊二至分祀罷大祀殿不用其後致仕揚州同知豐坊疏請復古明堂大享之制葢附會孝經嚴父配天語以迎合大禮之議時明世宗已尊生父興獻王為皇帝因並議稱宗以配上帝明堂秋享即於大祀殿行之改大祀為大享此殿與門得名所自始也國朝既定南北郊祀奉祖宗升配爰舉祈穀之禮行禮之地即明之大享殿是以舊有題額襲用未改謹按大享之名見於禮記月令篇葢指季秋報祀而言與孟春祈榖異義仰惟皇上釐定典禮式煥郊壇理合仰請聖訓别薦嘉名庶與祭義協應上命大學士等議奏大學士等奏言祈穀壇額實起前明嘉靖中原取季秋饗帝之説以崇興獻王已非成周明堂本制而殿宇告成以後每嵗大享咸在元極寶殿隆慶初並罷元極享禮是即在前明時固已徒存虚名矣考祭法列序禮神之處於祭天曰泰壇於祭地曰泰折於祭日曰王宫於祭月曰夜明雖郊壇不屋無事標題然循名足以見義未有不相應者宋儒朱子有言為壇而祭謂之天祭於屋下謂之帝天與帝其實一也隨地而異其名耳國朝孟春祈穀上帝因殿行事準諸朱子所論屋下祭帝義例正自相通敬稽禮部每嵗恭進祀冊於冬書某日冬至大祀天於圜丘於春書某日祈穀典式備極昭著獨殿與門襲用大享名號實覺未協仰請皇上欽定嘉名俾昭盛典尋奉諭㫖改曰祈年圜丘在正陽門外南郊形圓象天南向三成上成徑九丈髙五尺七寸以古尺合今尺合九數計二成徑十有五丈髙五尺二寸三成徑二十一丈高五尺每成四出陛皆白石九級内壝形圓周百有六丈四尺門四壝外東南丙地燔柴鑪一瘞坎一東南燎鑪五西南鐙杆三外壝形方周二百十丈一尺門四燎鑪四分設於壝東西門之左右壝北門後為皇穹宇南向環轉八柱圓簷上安金頂基髙九尺徑五丈九尺九寸石欄四十有九東西南三出陛各十有四級左右廡各五間殿廡覆瓦均青色琉璃圍垣形圓周五十六丈六尺八寸南向三門外壝東門外東北隅為神庫神厨井亭祭器庫樂器庫椶薦庫又東為宰牲亭井亭壝外内垣門四東曰泰元南曰昭亨西曰廣利北曰成貞昭亨門外東西石坊各一成貞門北為祈年殿壇圓南向三成上成徑二十一丈五尺二成徑二十三丈二尺六寸三成徑二十五丈面甃金甎圍以石欄四百二十南北三出陛東西一出陛上成二成各九級三成十級壇上建祈年殿制圓内外皆十二柱中龍井柱四檐三重上安金頂左右廡各九間均覆青色琉璃舊制圓頂三層上覆青瓦中覆黄瓦下覆綠瓦兩廡用綠瓦前為祈年門門外東南燔柴鑪一瘞坎一燎鑪五内壝周百九十丈七尺二寸門四北門後為皇乾殿殿五間上覆青色琉璃正面三出陛東西一出陛各九級石欄五十有九内壝東門外長廊七十二間通神厨井亭宰牲亭為祭時進俎豆避雨雪之用壝外圍垣四門南接成貞門門外西北為齋宫廣利門外西北為神樂署中為凝禧殿顯祐殿奉祀協律廨舍西為犠牲所中祀犧牲之神後為官署東西列屋以飼牲牢外垣内西角鐘樓一圍垣二重内垣周千二百八十六丈一尺五寸外垣周千九百八十七丈五尺西向門二南北並列南入圜丘北入祈年殿皆三門角門一二十四年十一月庚戌冬至大祀天於圜丘以蕩平囘部並告成功定制武功告成祗祀郊壇是嵗西師告㨗囘部悉平時在冬至之前奉諭㫖殊勲克奏茂典應修郊廟告功宜申昭報時當長至朕方躬祀圜丘其敕所司敬舉受釐宣㨗之忱載諸祝冊用申懇欵告祭太廟朕親行展事方澤社稷照例遣親王恭代三十年正月辛酉祈穀於上帝用立春後初辛日先是二十九年十二月諭禮部前經該部請於正月初五日舉行祭辛典禮但初五日在立春以前為時尚早應俟立春後初辛舉行於義方協所有祈穀壇典禮於十五日舉行三十七年冬至前期奉諭朕御極以來夙夜孜孜惟以敬天報本為念每屆郊壇大祀必躬親昭事用展悃誠三十七年於兹未敢稍懈向來詣壇行禮日由降輦進至拜位以迄薦獻禮成中間履蹈升降儀節最為繁重朕惟䖍恪以臨無有愆忽今自念春秋已逾六旬其於動容周旋差不能及前此之從容中節幸朕躬康彊如昔仍得祇循儀度經久不渝苐思敬意所持貴乎内外交養若精力過勞恐心志轉未能純一與其拘於行走末節弗克致其寅恭且或因此而憚於親詣何如酌損步陟繁文得專於升馨告備時肅將劼毖更足以嚴對越而抒誠愫乎自古履帝位而臻壽考者載籍曽不多覯我朝景運遐昌化成熙洽上荷昊蒼鴻眷列祖貽庥朕自周甲巳逾勵勤未怠真可謂國家祥瑞之大者兹特降此㫖非敢自惜其勞惟期要之於久從此更増年嵗當永矢此昭格之誠我世世子孫承庥衍慶即可奉此為法守且知朕六十嵗以前不憚經曲之繁六十嵗以後冀申專一之敬初無二致也所有升級次數及降輦步行之逺近無闗大體諸儀節如何酌定合宜之處著大學士會同該部詳悉定議以聞尋遵㫖具儀奏上舉行如儀詳見儀注同時並議准祈穀壇方澤壇社稷壇類分先農壇行禮儀節謹依載各門儀注卷内又諭壇廟祭祀王公大臣宿齋陪祀各期恪致寅恭若其中有年齒漸増精力未免稍減倘以格於查核之例因而勉強支持跛倚從事轉非嚴恪肅將之本意嗣後王公大臣有年逾六旬者凡遇祀典聴其自行酌量精神或致齋而不陪祀或並不能致齋一聴其便並無庸列入查奏彚核之内以昭體恤以重明禋三十九年正月辛酉祈穀於上帝親詣行禮諭朕臨御以來恒以敬天報本為要不敢稍有怠惰凢壇廟大祀必親詣行禮自降輦以至禮成必敬必誠至三十七年朕年逾六旬始敕大學士及該部將降輦步行之逺近及升降之無闗鉅典者酌減一二葢欲稍減步履之小節蓄養精力於大典益致恪恭亦因朕年逾六旬始如此酌量節減所以益矢誠敬也萬世子孫其敬識朕意於諸大祀設非年至六旬一切典章斷不可稍減倘䝉上天垂祐年逾六旬方可遵朕現在所行舉行將此永著為例四十年十一月甲戌大祀天於圜丘命皇子陪祀觀禮先是四月奉諭朕每遇郊壇大祀必親詣行禮歴四十年如一日弗敢稍有懈弛一切儀文典禮悉本誠敬之心仰期昭格凡諸升降拜獻弗愆於儀實有可以自信者惟是行禮時諸皇子向不在陪祀之列無由知朕恪恭將事之忱著於本年冬至南郊令諸皇子在旁侍立敬謹觀瞻祀事既蕆並令就壇位前恭閲朕所進之爵皆安奉端正無稍偏敧俾共體朕所以展精禋而答鴻貺者實在乎是其敬承毋忽四十四年十一月乙未南郊定配位前帛爵命皇子代陳禮前期奉諭朕自踐阼以來恭遇郊壇大祀一切儀文典禮悉本誠恪之心敬謹將事歴四十年如一日越嵗庚子朕春秋已屆七旬雖自信精力如舊但迎神進爵儀典繁重若各壇位前俱仍親詣轉恐過疲生憊於精意或有未孚正位上香獻爵朕必躬晉申䖍至列祖列宗配位前上香朕仍親致其獻帛爵諸禮著自今年南郊為始令諸皇子代陳四十六年正月禮部具題壬寅年祈穀日期改用正月十四日次辛奉諭天子父天母地祇承之義不可稍弛從前雍正七年恭奉皇考世宗憲皇帝諭㫖以定例正月上辛若在初五日以前則改於次辛但元旦朝賀乃朕躬之禮儀若因此而展祈穀之期於心實有未安著於上辛行禮煌煌聖訓實屬萬世不刋之論朕御極以來遇正月初三日以前上辛因必須隔年齋戒是以改用次辛其有初四日上辛亦改用次辛者則因聖母皇太后祝釐初祉儀不容缺至明嵗正月初四上辛並非向年可比該部何得亦改次辛況冬至南郊禮成有於次日受賀者所謂禮縁義起如謂臣下意在尊君不敢輕易朝正令典亦當備查往例具奏請㫖所有明嵗祈穀仍用上辛並著為令二月又奉諭㫖禮莫大乎敬天義莫隆於郊祀前以禮部具題壬寅年祈穀日期改用次辛所擬不當已明降諭㫖矣孟春祈穀所以迓陽氣而兆農祥考諸經傳葢立春後之上辛而非元旦後之上辛雍正年間恭奉皇考聖諭飭禮臣定議允宜永逺遵守敬思其義若上辛在立春前舉行與乗陽之義未為精當又上辛設在正月初三日以前則當於舊臘隔年齋戒而太廟祫祭實為合饗大禮即宫中拜神亦屬國朝定例若於齋戒期内照舊舉行於專一致敬之道似猶未協其應如何斟酌古今百世遵守可行之處著大學士九卿詳議以聞尋議上辛以立春後所得之辛始為上辛若立春之辛尚在上年十二月内則仍用正月之上辛以符嵗首之義正月上辛如值初三日以前於未進祀冊以前奏請改用次辛至正月初四日上辛應於初一日齋戒起是日皇上未入齋宫之前宫中拜神奉先殿行禮均可各昭誠敬毋庸改期從之四十六年定大駕詣壇降輦儀諭朕自臨御以來每遇郊祀大典無不蠲潔躬承四十六年如一日仰荷昊蒼眷佑壽越古稀仍當躬親行禮而一切登降禮儀步履究覺稍遜於前若遣官恭代非朕勤於躬親昭事之初心而勉強將事復於精一凝承之意轉有未盡因諭該部前往敬視祈穀壇宿齋宫詣壇瞻拜日降輦處兹據請擬由皇乾殿西牆門外降輿較為近便應如所奏此朕仰體上天眷愛朕躬長申寅恪之意將來朕子孫纘緒凝庥有壽登古稀者亦可欽承朕志於郊壇大祀嵗嵗躬行率由此典以上邀皇天眷顧之隆庶㡬無疆惟休永膺昊貺垂裕萬年四十七年十一月庚戌上親祀圜丘次日奉㫖凡祭壇行禮時派出王大臣若係四人著在門站立二人壇内站立二人一體管察四十九年正月辛丑祈穀於上帝遣皇子恭代行禮諭本年上辛祈穀因氣滯舊恙偶發誠恐登降儀節或愆轉不足以昭誠敬著派皇六子永瑢恭代行禮朕仍於齋宫敬謹齋宿屆期親詣大高殿行禮乾隆元年至乾隆五十年皇上親詣次數乾隆元年正月辛亥元年十一月己夘二年正月辛丑夘二年十一月乙三年正月辛酉申三年十一月庚四年正月辛酉丑四年十一月乙五年十一月庚午六年正月辛未六年十一月丙子七年正月辛未七年十一月辛巳八年正月辛酉八年十一月丙戌九年正月辛夘九年十一月辛夘十年正月辛巳十年十一月丙申十一年正月辛巳十一年十一月壬寅十二年正月辛丑十二年十一月丁未十三年正月辛夘十三年十一月壬子十四年正月辛酉十四年十一月丁巳十五年正月辛酉十五年十一月癸亥十六年正月辛亥十六年十一月戊辰十七年正月辛未十七年十一月癸酉十八年正月辛酉十八年十一月戊寅十九年正月辛酉十九年十一月壬午二十年正月辛巳二十年十一月己丑二十一年正月辛巳二十一年十一月甲午二十二年正月辛丑二十二年十一月己亥二十三年正月辛丑二十三年十一月乙巳二