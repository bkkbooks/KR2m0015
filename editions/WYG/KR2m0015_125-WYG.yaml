body:
  text: 王禮考一臣等謹案周官宗伯掌邦禮治神人和上下禮之大綱有五曰吉凶軍賓嘉至於節文度數之詳則記所謂經禮三百曲禮三千是也禮之用通乎上下故自王朝達乎諸侯大夫及士庶人咸共由之而議禮制度考文則歸於首出庶物之天子焉春秋以降禮經殘缺漢興高堂生傳士禮十七篇即今所謂儀禮而河間獻王所獻周官禮分職三百六十凡祭祀朝聘㑹同賓客燕饗與夫圭璧車旗冠冕服章無不備具盖即王朝之通禮而後世六典㑹要經世大典㑹典諸書實權輿於此朱子撰儀禮經傳通解分王朝禮邦國禮鄉禮學禮家禮之目其王朝禮十四卷則朝覲而外分土制國設官建侯名器師田刑辟咸附入焉夫臣庶以下冠婚喪祭之禮有歴乆而廢及不為限制者本無沿革不煩紀載故馬端臨文獻通考特立王禮一門取其通乎古今而代有沿革者若所載朝儀廵狩田獵冠冕服章圭璧符璽車旗鹵簿及國恤山陵諸條盖本諸朱子儀禮經傳通解之王朝禮而畧為變通焉我國家肇基東土太祖登極建元首創朝儀太宗式闢疆宇改元定號郊壇廟朝之典以次修舉鹵簿冠服秩然有等開國規模洵稱宏逺矣世祖一統中外制禮作樂參酌古今之宜而因革之省前代之煩文布聖朝之新憲巍乎煥乎儀文大備聖祖世宗加意典禮次第修明康熙中命儒臣修大清㑹典雍正中復加增修煌煌鉅典小大率由我皇上敬天尊祖頒朝治官之典弗懈益䖍臨御之初敕修大清通禮大清㑹典宣布海内至於禮器一書復加釐定按圖系説固莫不美善同歸敷錫罔暨矣數十年來猶以舊儀沿襲恐有未協訓行爰經睿慮務損益之得中悉荷裁成極推行之盡利舉凡皇朝典禮郁郁彬彬理器該而經曲貫遐哉尚已臣等嘗考三代以下漢叔孫通之朝儀其詳既不可盡考若唐之開元禮宋之政和五禮新儀元之典章明之集禮又皆有文無實煩冗而不適於用我朝列聖相承典章明備以闗雎麟趾之心行周官周禮之法宜古宜今足為億萬世遵守今依馬氏例編次朝儀以下等禮又增入登極上尊號徽號冊立冊封皇子公主婚嫁等儀凡三十卷為王禮考云朝儀臣等謹案朝㑹之儀所以正名分辨等威萬國朝宗共球畢集用昭中外一統之盛馬氏王禮考首載朝儀今循其例首皇帝三大節朝賀次常朝次御門聽政次皇太后皇后三大節朝賀儀文彬彬乎盛矣元旦朝賀臣等謹案元旦者一嵗之始冬至者一陽之始聖節者人君之始帝王所以涖萬方臣子所以尊君上皆於是觀禮焉本朝定為三大節元日典禮尤重今列為朝儀之首云天命元年正月丙辰朔太祖髙皇帝御殿行慶賀禮儀注恭載登極門毎年受朝不備書始制朝儀天聰元年正月己巳朔太宗文皇帝率諸貝勒大臣拜天畢御殿受朝是日諸貝勒文武羣臣各按旗序行三跪九叩頭禮大貝勒代善阿敏莽古爾泰以兄行命列坐左右凡朝㑹之處悉如之國制每於除夕元旦陳樂舞設大宴是日以太祖喪撤樂停宴六年正月己亥朔御殿受朝賀次日筵宴先是五年十二月丙申諭八旗諸大臣曰元旦朝賀堂陛之儀宜於整肅兹允衆議先令八旗諸貝勒行禮察哈爾喀爾喀諸貝勒次之滿洲䝉古漢官率各旗官員次之官員行禮時先總兵官固山額真次副將次㕘將逰擊䕶軍纛額真侍衛又次備禦各分班序行禮是日上率諸貝勒拜天畢御殿上兩旁設二榻命大貝勒代善阿敏莽古爾泰坐諸貝勒先朝賀畢令議政諸貝勒入殿内左右列坐次蒙古諸貝勒及總兵官以下各行朝賀禮次朝鮮使臣朝賀陳貢物於庭朝罷上以兄禮詣代善第拜之舊例國人朝見上與三大貝勒俱南面坐受八旗貝勒率大臣朝見不論旗分惟以年齒為序至是更定八旗依旗分以次朝見十一月丁未諭六部諸貝勒曰國家初設六部時滿洲䝉古漢人各部承政㕘政分為二行定有班次近見朝㑹之時坐立無序尊卑紊越如此體統何由而肅乎嗣後爾等宜按次序班各加整飭崇徳元年定元日進慶賀表箋奏樂又定元旦前三日至第九日止各官皆朝服順治元年正月庚寅朔世祖章皇帝御殿受朝賀停筵宴免上表並年例進獻令和碩禮親王代善勿拜二年十二月庚子定元日前後七日王公百官皆朝服丙午更定朝儀凡元旦慶賀皇上先御武英殿内大臣兩翼䕶軍統領䕶軍㕘領侍衛等内三院都察院大臣及禮部執事各官行禮畢皇上御太和殿衆官跪迎及陞座諸王貝勒貝子公等奉表於階上行禮次兩翼滿洲䝉古漢軍各官次漢文武百官次朝鮮國進貢使臣次外國諸王使臣次土魯畨回回哈密衛人及董蘇固爾地方喇嘛等行禮八年四月戊申定三大節禮儀凡元旦冬至上詣皇太后宫行禮畢還宫陞太和殿鳴鐘鼓作樂諸王文武百官行慶賀禮六月壬子禮部議定凡遇大禮上朝服御太和殿諸王以下文武羣臣朝服集太和殿前行禮諸王貝勒由午門兩傍門行固山貝子以下文武羣臣由午門側兩掖門行諸王貝勒由太和門兩傍門行固山貝子以下文武羣臣由昭徳門及貞度門行每月常朝及奏事除中門外各門俱隨便行走九月己夘頒慶賀表箋式於各藩王及督撫提鎮等衙門是年定朝㑹賜羣臣坐之儀凡大朝常朝行禮畢賜羣臣坐郡王以上進殿内貝子以下在丹陛上百官在丹墀内均照班次跪行一叩頭禮坐皇帝進茶王公百官均就坐次行一叩禮光禄寺執事官授羣臣茶羣臣受茶就坐次行一叩禮飲畢復行一叩禮至十二年十月禮部復議大朝貝子公以上同諸王行禮畢進殿内兩傍列坐從之九年設糾儀司員凡御殿日設禮部司官四人於王公行禮處設吏部禮部司官各四人於百官行禮處糾儀康熈元年定王公百官班位凡大朝及常朝齊集親王世子郡王長子貝勒貝子入八分鎮國公輔國公在丹陛上序立不入八分公民公侯伯鎮國將軍都統子尚書第一班輔國將軍䕶軍統領副都統前絳統領侍郎男步軍翼尉大九卿第二班奉國將軍一等侍衛䕶衛㕘領輕車都尉步軍協尉小九卿郎中第三班奉恩將軍二等侍衛䕶衛騎都尉佐領員外郎科道官第四班三等侍衛䕶衛雲騎尉鳴贊官主事步軍尉第五班䕶軍校驍騎校筆帖式第六班其次各照職銜不論加級違者察處十六年重定百官班位凡大朝及常朝齊集滿官公侯伯鎮國將軍都統尚書左都御史子及凡一品官第一班輔國將軍䕶軍統領前鋒統領步軍統領副都統侍郎學士左副都御史通政使司通政使大理寺卿詹事府詹事男凡二品官第二班奉國將軍步軍翼尉長史㕘領一等侍衛䕶衛太常寺卿太僕寺卿光禄寺卿祭酒通政使司副使大理寺少卿少詹事侍讀學士侍講學士侍讀侍講庶子洗馬鴻臚寺卿理事官郎中給事中監察御史太常寺少卿太僕寺少卿輕車都尉及凡三品官第三班奉恩將軍步軍協尉佐領司儀長二等侍衛䕶衛欽天監監正内閣侍讀司業光禄寺少卿鴻臚寺少卿通政使司參議中允員外郎騎都尉及凡四品官第四班三等侍衛䕶衛雲騎尉步軍尉贊善欽天監副太常寺丞主事大理寺正光禄寺署正都察院經歴及凡五品官第五班䕶軍校驍騎校通政使司知事大理寺評事鳴贊司務司庫等各職掌官及六品筆帖式第六班七品官及七品筆帖式第七班八品官八品筆帖式第八班九品官九品筆帖式第九班漢官尚書左都御史第一班侍郎學士左副都御史宗人府府丞通政使大理寺卿詹事第二班太常寺卿順天府尹太僕寺卿光禄寺卿通政使司副使大理寺少卿少詹事講讀學士祭酒庶子侍讀侍講洗馬鴻臚寺卿太常寺少卿順天府丞第三班通政使司㕘議大理寺丞中允贊善司業光禄寺少卿鴻臚寺少卿修撰編修檢討庶吉士給事中御史吏部司官五部郎中第四班五部員外郎宗人府經歴順天府治中欽天監正太醫院使光禄寺丞第五班五部主事都察院經歴都事理藩院判大理寺正欽天監副太醫院判太常寺丞京府通判京縣知縣兵馬司指揮欽天監五官正鴻臚寺丞大理寺副光禄寺署正第六班大理寺評事太常寺博士中書科中書内閣典籍撰文中書辦事中書各部司務大理寺司務通政司經歴太常寺典簿京縣丞兵馬司副指揮鑾儀衛經歴詹事府主簿正字録事翰林院典簿待詔京衛經歴欽天監五官靈臺郎祠祭署奉祀等官第七班五經博士國子監丞博士典簿助教學正學録典籍理藩院知事欽天監主簿五官保章正太醫院御醫太常寺協律郎等八品官第八班理藩院副太常寺贊禮郎鴻臚寺鳴贊等九品官第九班武職恭將遊擊在三班守備等官在四班千總等官在五班隨旗上朝官照在部院衙門職掌品級其降級上朝官照所降品級部院衙門官有兼銜則從其銜之大者二十年設滿漢糾儀御史凡御殿日設滿御史東西各二人於王公行禮處設滿御史東西各二人漢御史東西各二人於百官行禮處侍立糾儀雍正元年正月辛巳朔世宗憲皇帝詣壽皇殿行禮不陞殿受賀前期禮部等衙門議言帝王即位首重元正元者嵗之始正者月之始也故曰春王正月所以紀即位之始也雍正元年為龍飛之首嵗皇上孝思罔極即不陞殿受賀而羣臣進表之禮斷不可缺臣等請雍正元年元旦在京諸王百官恭進皇太后表文皇上表文仍照例呈覽交與内閣收貯將此表文式頒示朝鮮直𨽻各省於雍正二年具奏冬至萬壽節雖不受賀其表文亦照例具奏交與内閣收貯則孝思已盡而國典亦全矣從之二年正月丙子朔御殿受朝賀宣表始定漢官分東西班禮部奏准凡朝期漢官以吏部禮部刑部宗人府通政使翰林院詹事府太常寺光禄寺鴻臚寺國子監吏科禮科刑科内閣中書欽天監太醫院列左班户部兵部工部都察院大理寺鑾儀衛太僕寺四譯館中書科户科兵科工科行人司乾隆十三年裁順天府五城兵馬司三營列右班均立於鑾駕之末聽贊唱依次排班行禮三年正月庚子朔御殿受朝賀表文不宣讀先是二年十二月壬申禮部奏元旦受賀禮儀上謂大學士曰朕即位之初諸王大臣奏請元旦陞殿受賀至再至三朕無可如何准於次年受賀今年元旦陞殿讀表時朕聽之不禁心傷凄然垂淚今尚未過三年著停止行禮壬午諸王大臣復請陞殿行禮上曰諸王大臣雖請朕俯順輿情亦當思仰體朕意朕意以為行慶賀禮以示萬國不若盡孝道以示天下二年元旦因行元年之禮故允所請去年允行長至之禮因聖祖仁皇帝配天大典朕不得已勉從衆請至於御殿進表受賀不比尋常之御殿謝恩行禮也朕降此諭㫖諸王大臣著即遵行己丑諸王大臣又奏孝經言天子之孝得萬國之懽心以事其先王今元旦陞殿受賀錫福兆人聖祖仁皇帝在天之靈必為欣慰與孝經之義相合得㫖諸王大臣引經據典陳懇再三著准行禮其表文但行呈進不必宣讀七年十二月諭羣臣曰元日朝賀凡三品以上之大臣年逾七十者不必隨班行禮竢百官朝賀禮畢朕還宫後至乾清門行禮乾隆元年正月丙申朔上御太和殿中和韶樂設而不作諸王公文武各官朝鮮使臣進表行慶賀禮表文不宣讀十二月壬戌停止次年元旦朝賀禮部奏乾隆二年元旦禮儀上曰今嵗元旦乃朕御極元年朝正大典禮制攸闗且在皇考大事百日之外是以勉從諸王大臣所請御殿受朝明年元旦尚在二十七月之内陞殿受賀朕心不忍不必陞殿行禮二年十二月定大學士於殿内賜茶諭曰朕御太和殿向來大學士皆立於殿外檐下即於殿外賜茶嗣後立位仍照舊例賜茶時令坐於殿内領侍衛内大臣之上至十五年復諭曰嗣後大學士坐次仍著在領侍衛内大臣之上協辦大學士事務尚書著在領侍衛内大臣之下署領侍衛内大臣之上更定漢官東西班位以吏部户部禮部列左班兵部刑部工部列右班至十一年復定六科班次隨六部分列吏科户科禮科列左班兵科刑科工科列右班七年令外省官在京者一例入班行禮凡外省文官督撫以下道府以上武官將軍都統以下協領副將以上或入覲或奉調在京者遇御殿日一例入班行禮總督加尚書銜者列六部尚書之末廵撫加侍郎銜者列侍郎之末加副都御史者列副都御史之末布政使按察使列小九卿之末道府列部郎之末將軍都統提督列都統之末副都統總兵官列副都統之末協領副將列㕘領之末八年重定殿内賜坐儀四品以下官停止賜茶是嵗奉諭㫖嗣後御殿及筵宴日殿内止大臣賜坐侍衛等均著侍立不必賜坐賜茶時若侍衛輪流奉授不無舛錯遺漏嗣後授茶時著禮部前期取應坐之王公大臣數目每一人令侍衛一人授茶仍依次接回庶不致舛錯遺漏尋禮部議奏御殿日除文官三品武官二品以上照舊賜茶其四品以下官惟殿内之記注官丹墀内之外國使臣賜坐賜茶其餘百官但賜坐停止賜茶從之十六年十二月重定百官朝班禮部奏准國家建官列品各有正從次第秩然順治初文官階未置一品惟加師保及宫銜者充之每常朝尚書左都御史以二品居第一班侍郎内閣學士副都御史通政使大理寺卿以三品居二班祭酒通政副使大理太常太僕少卿鴻臚卿以四品居三班其下五品居四班六品居五班位次率進本階一等此舊典所載朝班之位也雍正八年改大學士為正一品尚書左都御史從一品侍郎内閣學士從二品乾隆十五年又改侍郎為正二品翰林院掌院學士為從二品是今尚書左都御史之居一班侍郎學士之居二班適與本階相稱而副都御史以下班位仍舊實為越次臣愚以為官品既已更改則朝班亦當釐定嗣後恭遇御殿日及每月常朝百官班次請皆依品序列正從一品為一班二品為二班遞至九品分為九班毋許越次至翰林詹事為文學侍從之臣體統視庶僚為優但舊典以五品列三班六七品列四班亦為太過今擬少詹事侍讀學士侍講學士仍舊列三班庶子侍讀侍講洗馬國子監祭酒改列四班中允贊善司業修撰編修檢討庶吉士改列五班其京營武職朝班及外省提鎮等官遇事入朝者請照康熈二十二年所定直省行禮班位提督二班總兵官三班副將㕘將四班遊擊五班守備六班千總等官七班均附於右翼各班之末十八年十一月停止外省藩臬等官進表箋慶賀諭曰元旦長至萬壽三大節外省文官臬司以上武官副將以上例得隨進表箋稱賀朕思督撫提鎮封疆大吏事皆専達表賀為宜藩司副將既不得専達章疏其由督撫附進表箋亦可不必且不過由部送閣存貯並不呈覽此亦向來虚文陋習甚無取焉其概行停止二十二年五月增設朝㑹糾儀官員禮部奏准凡遇陞殿日仗外百官班次恐有參錯不齊應於儀仗之後昭徳貞度二門階下東西各設滿漢御史二人禮部司員二人侍衛二人嚴行稽察二十四年七月設紅漆木牌於仗外百官班次禮部議准凡大朝之期百官仗外侍立各有品級班次但從前未經標示一定地位恐百官站立不無參差斷續嗣後遇陞殿日交鴻臚寺於儀仗之外照常朝坐班例設立紅漆木牌預先按次排班如有參差斷續錯綜者令糾儀官查㕘二十七年八月定慶賀題本式通政使司奏言此次貴州巡撫喬光烈慶賀萬壽本章面用黄綾内加黄簽與各省督撫互異請欽定式様以昭畫一得㫖嗣後慶賀本章著照喬光烈之式二十八年二月更定慶賀題本式通政使司奏准凡恭逢慶賀之期在京各部院衙門陳奏尋常事件俱用黄摺況慶賀本章事闗大典請嗣後恭遇慶賀皇太后皇上本韋及貼黄俱用黄紙其面頁仍用黄綾黄簽本内及貼黄俱毋庸另行加簽皇帝三大節表式及朝賀儀先期諸王大學士率京朝官直省文武率闔屬官具賀表豫送禮部其式曰具官臣某等誠懽誠忭稽首頓首上賀伏以表聯随時撰擬恭惟皇帝陛下随時撰擬臣等恭遇熙朝欣逢元旦恭遇萬壽聖節則云欣逄長至聖誕冬至則云欣逢伏願隨時撰擬臣等無任瞻天仰聖懽忭之至謹奉表稱賀以聞禮部屆期具疏請皇帝御太和殿受賀制報曰可右表賀儀式三十五年六月停止五經博士赴京朝賀諭曰向遇國家慶典衍聖公以及五經博士俱有來京朝賀之例今思五經博士雖膺章服之榮究與各省紳士無異且其品秩不崇非若衍聖公之身膺顯爵者可比伊等趨詣闕廷既無由一體延見加恩徒令其跋涉往來致滋糜費甚無謂也嗣後五經博士凡遇慶典俱在各本籍隨班行禮其來京朝賀之例著永行停止至衍聖公孔昭煥昨已傳諭令其今年且不必來京將來遇有朝賀之事並著先期奏請候㫖遵行著為令恭遇皇上萬壽大慶聖節自初一日起至三十日止一月内王公百官應衣蟒袍其前後各三日内常朝處仍衣朝服均前期具奏請㫖通行在京衙門及各直省每遇元旦節前後各三日王公百官常朝處衣朝服辦事及入朝奏對咸衣蟒袍禮部豫於秋季封開印本内題明右朝服凡王公等進午門親王随從六名親王世子郡王五名郡王長子貝勒四名貝子三名公二名進太和門親王親王世子隨從三名郡王郡王長子貝勒二名貝子公一名恭遇朝賀皇帝陞殿王以下公以上止用䕶衛内一人㩦坐褥右王公等随從恭遇皇帝御殿受賀先期具題請㫖每逢朝期行知步軍統領衙門屆日於曉鐘時即啟正陽門俾城外居住各官早入右戒期至日五鼓鑾儀衛率官校入陳法駕鹵簿親軍䕶軍旗尉民尉各服其服禁語譁者察不整備者樂部率和聲署陳中和韶樂於太和殿檐前設丹陛大樂於太和門檐下有司設表案於殿内東楹之南西向設筆硯案於殿