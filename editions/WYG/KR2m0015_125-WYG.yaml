鴻臚寺官排班鳴贊官贊進贊跪衆皆進跪贊叩興衆行三跪九叩禮鳴贊官贊退俱復原位立樂止鑾儀衛官贊鳴鞭階下三鳴鞭禮部堂官奏禮成中和韶樂作皇帝還宫樂止衆俱出内監奏請皇帝御内殿陞座皇后率皇貴妃貴妃妃嬪俱龍袍補服於皇帝前行六肅三跪三拜禮禮成皇帝起座皇后皇貴妃貴妃妃嬪等還宫右熱河朝賀若值行在所朝賀是日早扈從各官俱蟒袍補服於行在宫之網城外齊集鴻臚寺官引皇子皇孫王公以下二品以上大臣至皇帝行在宫網城内三品以下各官在網城外按翼排立禮部堂官奏請皇帝御行在宫正殿皇帝御殿陞座鴻臚寺官引皇子皇孫王公文武各官行三跪九叩禮復原位立禮部堂官奏禮成皇帝還行在後宫衆俱退内監奏請皇帝御内殿陞座皇后率皇貴妃貴妃妃嬪俱龍袍補服於皇帝前行六肅三跪三拜禮禮成皇帝起座皇后皇貴妃貴妃妃嬪等還宫右行在朝賀太和殿筵燕儀凡元旦及萬夀聖節及大慶典前期禮部疏請舉行筵燕領侍衛内大臣奏請命進酒大臣既得㫖乃徧布諸司供備屆日尚茶庀茶尚膳庀御饌王以下入八分公以上進饌筵牲酒光禄寺供酒席兩翼供羊辰刻法駕鹵簿樂懸依次陳設於太和殿笳吹隊舞雜伎百戲竢於殿外東隅尚膳總領内管領豫於寳座前設御筵加黄幕武備院張黄幕於丹陛上正中内務府掌儀司設反坫於幕内尊爵金巵壺勺具禮部張青幕於丹墀内鹵簿之後東西各八光禄寺每幕置尊陳官饌具席皆有幕右陳設乃布席領侍衛内大臣内務府大臣禮部理藩院尚書侍郎朝服視席布内外王公額駙台吉及入班大臣等席於殿内東西各七行席各四十有一東席西向當東楹西席東向當西楹均北上寳座左右布後扈大臣席各一稍後僉向寳座前左右布前引大臣席各三東西相向寳座後左右布領侍衛内大臣席各一又西布日講起居注官席一均南向殿門外西檐下布左都御史副都御史樂部大臣席一東向丹陛左右布一二品大臣一二品世爵暨侍衛席各三行席各二十有三東西相向東當東懸之外西當西懸之外北上布禮部尚書侍郎席一於黄幕左内務府總管席一於黄幕右丹墀左右青幕内布三品以下文武百官席按翼為序如常朝之位席各二十有四均東西向外國陪臣來朝者席於西班之末東向右布席已刻内外諸王貝勒貝子公額駙台吉等朝服集太和門外文武大臣百官朝服外國陪臣服本國服集午門外午刻鴻臚寺官引宗室王公暨大臣理藩院官引外藩王公台吉在丹陛上又引文武百官在丹墀内分翼序立禮部尚書奏請御殿皇帝禮服乗輿出宫前引後扈如常儀午門鳴鐘鼓中和韶樂作奏隆平之章皇帝降輿入殿北門陞御座樂止階下三鳴鞭鴻臚寺理藩院官分引内外王公台吉暨入班大臣等由殿左右門入就位行一叩禮坐鴻臚寺引一二品大臣暨一二品世爵侍衛等官就丹陛上又引三品以下文武各官就丹墀青幕内按翼依次於本位行一叩禮皆坐右就位迺進茶丹陛清樂作奏海宇昇平日之章尚茶暨侍衛執事官舉茶案以次由中道進至檐下進茶官奉茶入殿中門王以下咸就本位跪進茶官自寳座中陛升跪進皇帝茶興立於右王以下行一叩禮進茶官跪受茶甌由右陛降出中門羣臣咸坐侍衛内務府䕶軍等分賜王以下文武百官暨外國陪臣茶各於坐行一叩禮飲訖復叩坐尚茶徹茶案樂止右進茶尚膳總領䕶軍㕘領内管領入殿由東西陛升展御筵幕執事官並徹王以下席幕各退迺進酒内務府掌儀司官三人由黄幕内一人奉壺一人奉爵一人執金巵以次進至殿中門閾外之左西面立丹陛清樂作奏玉殿雲開之章進爵大臣興離席釋補服王以下皆興進爵大臣入殿中門北面跪王以下咸於坐跪掌儀司官舉壺實酒於爵由中門入西面跪授爵興退進爵大臣奉爵興自寳座中陛升至御前當右北面跪恭進皇帝酒興由右陛降復位行一叩禮王以下皆隨行禮進爵大臣興由右陛升跪受爵仍由中陛降復位跪掌儀司官入跪受虛爵以退迺以金巵酌酒承㫖賜進爵大臣酒王以下起立掌儀司官入立授巵進爵大臣受巵行一叩禮飲卒巵掌儀司官立受虛巵退進爵大臣叩如初興王以下皆坐進爵大臣出殿右門加補服入席坐執事官分恩賜果食於羣臣各於坐行一叩禮樂止右羣臣奉觴上壽迺進饌尚膳以饌入恭進於皇帝前中和清樂作奏萬象清寜之章執事官分恩賜肴饌於羣臣叩如前儀尚膳率屬舁反坫案至殿中階下御前侍衛酌酒升至御座前皇帝簡召王公大臣至御前賜酒領侍衛内大臣東西各二人興離席視侍衛行殿陛諸王大臣酒光禄寺官行丹墀青幕内文武各官暨外國陪臣酒王以下各就本位行一叩禮飲畢叩如初坐樂止右行羣臣酒是時禮部滿尚書侍郎率官屬引慶隆舞進司章東面奏歌司舞飾面具乗禺馬進揚烈舞司弦司筝司阮司節司拍司抃諸樂人各奏其技喜起舞大臣十有八人朝服由殿左門入詣正中跪三叩興退立於左循歌聲按對起舞每對舞畢行三叩禮歌闋退又引歌笳吹樂人入殿歌畢又歌畨部合奏樂歌畢内務府官引朝鮮國俳入陳百戲畢咸退右樂舞入侑行酒畢樂舞退尚膳升徹御筵降王以下咸起立王公大臣出殿左右門鴻臚寺理藩院官引王公至丹陛拜位序立引文武大臣降東西階丹墀内百官出幕咸就東西拜位序立北面聽贊行一跪三叩禮丹陛大樂作奏慶平之章禮畢樂止鳴鞭如初中和韶樂作奏顯平之章皇帝還宫樂止羣臣皆退所司徹席幕各退右謝恩冬至朝賀崇徳元年定長至進表慶賀不設宴順治元年十一月戊申以南郊禮成上御殿受諸王貝勒及文武羣臣朝賀八年定長至節於次日御殿受賀如元日儀康熙二年二月停止在外各衙門齎進冬至慶賀表文諭禮部曰冬至慶賀典禮明洪武十四年方定例舉行其後隨令在外各衙門官齎進表文今思官員往返有悮職掌且驛遞繁苦以後在外各衙門官員除元旦聖壽節照舊齎進外冬至齎進慶賀表文著停止惟於本衙門行禮其在京慶賀表文典禮仍照舊行六年十一月丁未冬至戊申御殿諸王羣臣上表慶賀以世祖章皇帝配天禮成頒詔大赦雍正元年十一月辛丑冬至壬寅御殿受朝賀以聖祖仁皇帝配天禮成頒詔天下先是禮部奏冬至次日受賀頒恩詔禮儀上諭大學士九卿等曰朕惟聖祖仁皇帝大禮告成普天同慶朕陞殿頒布恩詔盖以賀列祖之鴻禧慰萬方之誠悃也然朕思念顧復深恩中心哀慕今未滿三年不忍陞殿受賀著内閣九卿等詳察典禮酌古準今務期於禮允協庶朕心得安大學士馬齊等奏言謹按漢禮儀云冬至之日宗祀明堂登靈臺大赦百官稱賀此冬至配天行慶之明文也自晉至唐宋皆隆其儀宋仁宗皇祐二年以大慶殿為明堂合祭天地三聖並侑大慶禮成百官奉表上賀其後仍之名曰慶成禮明㑹典載大祀禮成次日御奉天殿受賀我朝㑹典載冬至南郊禮成次日御殿百官進慶賀表臣等伏思先王制禮原以節情鉅典攸宜古今不易懇祈俯允禮臣所請以二十六日御殿諸王羣臣上表行禮頒聖祖仁皇帝配天恩詔誠於典禮符協得㫖諸臣酌古準今詳察典禮具奏朕今亦難固却但朕中心實甚不安著允諸臣所請行乾隆三年十一月庚申冬至壬戌御殿受朝賀臣等謹案是嵗冬至次日辛酉係月十三日以值聖祖忌辰改於十四日行禮二十四年十一月庚戌冬至辛亥御殿受朝賀以回部平定頒詔中外臣等謹案冬至朝賀禮儀亞於元日蔡邕獨斷謂冬至陽氣起君道長故賀是也馬端臨朝儀一門具載歴代元旦冬至朝㑹儀注縁其間有僅一見者有不恒舉行者故特紀之以存一代之掌故焉我國家典章明備每嵗元旦冬至令節禮臣奏請臨御正殿王公百官及外國陪臣以次行禮中外一家整齊嚴肅洵為往牒所未有固無庸循馬氏之例一一臚列也兹惟恭載剏制更定諸大端及祗奉諭㫖遵行者以昭萬世之典則焉皇朝文獻通考卷一百二十五
