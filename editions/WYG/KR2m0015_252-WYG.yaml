body:
  text: 欽定四庫全書皇朝文獻通考卷二百五十二封建考七異姓封爵三滿洲男一等阿思哈尼哈畨哈世屯滿洲鑲黄旗人順治九年正月遇恩詔封二等阿思哈尼哈畨又以恩詔晉一等贈詳公爵米思翰哈世屯子康熙三年五月襲贈詳公爵李榮保米思翰子康熙十四年四月襲坐事削爵後降襲贈詳公爵一等阿思哈尼哈畨多諾滿洲鑲黄旗人順治七年三月遇恩詔封三等阿思哈尼哈畨九年正月遇恩詔晉二等又以恩詔晉一等色爾塞多諾子順治十五年七月襲以校射不􅈺爵除後降襲一等阿思哈尼哈畨阿禄哈滿洲鑲黄旗人順治九年正月遇恩詔封二等阿思哈尼哈畨又以恩詔晉一等卒諡勤僖尹濟納阿禄哈孫康熙二十年七月襲後降襲一等阿思哈尼哈畨阿哈尼堪滿洲鑲黄旗人順治九年正月遇恩詔封二等阿思哈尼哈畨又以恩詔晉一等噶爾哈圖阿哈尼堪子順治九年四月襲襲詳子爵達賴阿哈尼堪子康熙元年十一月與兄子三等精奇尼哈畨夸哈分襲三等阿思哈尼哈畨坐事削爵大成達賴兄子康熙十九年三月襲子降襲一等阿思哈尼哈畨蘇黒滿洲鑲黄旗人一等超武公鰲拜姪孫康熙五十二年十一月奉特㫖襲達福鰲拜孫康熙六十年十二月襲晉襲詳公爵原襲一等阿思哈尼哈畨詹布滿洲鑲黄旗人二等伯唐保住嗣子雍正六年三月降襲以罪削爵恒徳詹布叔父雍正十二年十二月襲乾隆元年改為一等男伊興阿恒徳兄子乾隆五年十二月襲坐事削爵方海伊興阿兄子乾隆十四年十二月襲索諾木車楞方海從叔乾隆十七年十二月襲以罪削爵烏爾圖那斯圖索諾木車楞從孫乾隆四十七年十二月襲一等男陳龍滿洲鑲黄旗人一等子善岱子乾隆十四年五月降襲二等阿思阿尼哈畨呉賴滿洲鑲黄旗人順治九年正月遇恩詔封三等阿思哈尼哈畨又以恩詔晉二等卒諡康毅顧徳呉賴子順治十年十月襲坐事削爵綽爾門顧徳弟康熙十六年六月襲子降襲二等阿思哈尼哈畨費揚古滿洲鑲黄旗人順治十一年封以事降事白復職色赫費揚古子康熙九年襲色克圖色赫子康熙三十一年襲子降襲二等阿思哈尼哈畨巴山滿洲鑲黄旗人順治九年正月遇恩詔封三等阿思哈尼哈畨十一年二月以駐守江寧敗賊功晉二等舒書巴山子康熙十二年七月襲二十五年七月以陜西湖廣雲南軍功晉一等子降襲二等阿思哈尼哈畨兆布泰滿洲鑲黄旗人順治年以軍功封坐事削爵奉特㫖復爵増夀兆布泰子康熙十七年襲西圖増夀子康熙三十六年襲後降襲二等阿思哈尼哈畨路什滿洲鑲黄旗人順治九年正月遇恩詔封三等阿思哈尼哈畨十七年七月以擊流冦功晉二等征湖廣陣亡晉贈一等布納海路什子康熙二十七年七月襲二等阿思哈尼哈畨二十五年四月追叙路什軍功晉一等三十六年七月以征噶爾丹軍功晉三等精奇尼哈畨胡什屯布納海子康熙四十六年六月降襲二等阿思哈尼哈畨海昌胡什屯子雍正二年十二月襲後降襲三等副將巴爾巴圖里爾滿洲鑲黄旗人自䝉古歸順封諾孟達賴巴爾巴圖里爾子天聰八年五月襲是年改為三等梅勒章京順治四年改為三等阿思哈尼哈畨順治七年三月遇恩詔晉二等九年正月遇恩詔晉一等阿圖海諾孟達賴孫康熙八年七月襲以庸劣削爵孫保住阿圖海子康熙三十年十二月襲乾隆元年改為三等男報國孫保住子乾隆二十六年十二月襲徳寧報國子乾隆四十六年十二月襲三等梅勒章京圖魯錫滿洲鑲黄旗人天聰八年五月以征大凌河軍功封征大同陣亡贈詳子爵襲詳伯爵三等梅勒章京高赫徳滿洲鑲黄旗人順治二年二月以入山海闗軍功封莊機達高赫徳弟順治四年正月襲是年改為三等阿思哈尼哈畨七年三月遇恩詔晉二等九年正月遇恩詔晉一等達爾占莊機達子順治十八年十一月降襲三等阿思哈尼哈畨康熙五十二年十二月以廣東廣西雲南軍功晉一等達郎阿達爾占子康熙五十九年七月降襲三等阿思哈尼哈畨武清額達郎阿子雍正元年六月襲坐事削爵後降襲三等阿思哈尼哈畨俄奇爾桑滿洲鑲黄旗人本䝉古貝子初以軍功累戰立功順治二年二月封三等梅勒章京四年改為三等阿思哈尼哈畨褚禄俄奇爾桑子順治五年四月襲七年三月遇恩詔晉二等俄綽爾褚禄弟順治七年三月襲圖䕶禄克俄綽爾兄順治十六年二月襲坐事罷爵畢禮克圖圖䕶禄克子順治十六年五月襲沙金達賴畢禮克圖弟康熙二十五年十二月襲以罪削爵特古思沙金達賴弟康熙五十年正月襲乾隆元年改為二等男龔山特古思子乾隆九年四月降襲三等男鄂恒龔山子乾隆二十年十二月襲松禄鄂恒子乾隆二十七年十二月襲蘇爾泰松禄族兄乾隆二十八年十二月襲四格蘇爾泰之伯祖乾隆三十六年十二月襲永清四格子乾隆四十六年十二月襲三等阿思哈尼哈畨額黒里滿洲鑲黄旗人順治九年正月遇恩詔封三等阿思哈尼哈畨又以恩詔晉二等十二年八月以征湖廣福建軍功晉一等十七年十月坐事仍降三等英素額黒里子康熙十年九月襲三十六年七月以征噶爾丹軍功晉二等郎保英素子雍正元年六月降襲三等阿思哈尼哈畨陣亡子降襲三等阿思哈尼哈畨瑚沙滿洲鑲黄旗人順治九年正月遇恩詔封三等阿思哈尼哈畨又以恩詔晉二等後以罪仍降至三等子分襲三等阿思哈尼哈畨額爾格圖滿洲鑲黄旗人順治年遇恩詔封賴杜額爾格圖子順治十七年十月襲阿哈道賴杜弟康熙元年襲興麟阿哈道孫康熙三十五年四月襲後降襲三等阿思哈尼哈畨齊爾格申滿洲鑲黄旗人順治年遇恩詔封石清齊爾格申孫康熙十二年八月襲蒙安塔石清弟康熙二十年襲一等男重倫奎林子滿洲鑲黄旗人乾隆四十一年以奎林從征金川功特封一等男世爵即以其子重倫襲以上鑲黄旗一等副將黒東格滿洲正黄旗人國初以功封襲詳子爵三等阿思哈尼哈畨安達理滿洲正黄旗人崇徳八年九月以拜他喇布勒哈畨殉節擢封賴達庫安達理子是月襲順治二年以從定鼎擊敗流冦功晉一等七年三月以太祖配天禮成推恩舊績加一拖沙喇哈畨八年二月以兼爵累晉二等精奇尼哈畨詳子爵一等阿思哈尼哈畨三保住滿洲正黄旗人康熙四十六年四月以父一等精奇尼哈畨席喇爵降襲尋以罪罷保奈三保住弟康熙四十八年七月襲傅起保奈子雍正六年三月襲乾隆元年改為一等男六十五傅起弟乾隆二十四年十二月襲福倫六十五子乾隆二十六年十二月襲一等阿思哈尼哈畨希爾根滿洲正黄旗人順治三年四月叙軍功封三等梅勒章京以事降九年正月遇恩詔晉二等阿思哈尼哈畨坐事降三等叙軍功仍晉二等尋晉一等商世泰希爾根孫康熙十八年十月襲杜泰商世泰子康熙二十七年十一月襲子降襲一等男馬爾岱滿洲正黄旗人一等精奇尼哈畨胡什布子康熙四十五年十一月降襲一等阿思哈尼哈畨乾隆元年改為一等男富鼐馬爾岱子乾隆二年十二月襲以軍政削爵富如富鼐從姪乾隆七年十二月襲阿克棟阿富如子乾隆十八年三月襲富和徳阿克棟阿子乾隆三十一年十二月襲四十年七月更名文成一等男春寧滿洲正黄旗人乾隆三十三年六月以父扎拉豐阿出征緬匪陣亡奉特㫖併前職一等輕車都尉加為一等男令春寧承襲緣事革職福勒洪阿春寧子乾隆四十八年九月襲一等男和珅滿洲正黄旗人世襲三等輕車都尉乾隆四十九年九月以勦辦回匪克著勤勞加給一等輕車都尉併前職為一等男二等阿思哈尼哈畨喀凱滿洲正黄旗人順治年遇恩詔封子分襲二等阿思哈尼哈畨努山滿洲正黄旗人順治九年正月遇恩詔封三等阿思哈尼哈畨又以恩詔晉三等陶代努山子順治十六年二月以原職兼襲爵晉一等江瀰陶代弟子康熙二十二年八月仍襲二等阿思哈尼哈畨後降襲二等阿思哈尼哈畨俄莫克圖滿洲正黄旗人順治十一年八月封以事降事白復爵班岱俄莫克圖子康熙二十四年十月襲以軍功晉一等孫降襲三等梅勒章京徳爾格勒滿洲正黄旗人國初自葉赫歸順封三等副將天聰八年改為三等梅勒章京南楮徳爾格勒子天聰八年襲以罪削爵索爾和南楮弟崇徳二年六月襲順治四年改為三等阿思哈尼哈畨順治七年三月遇恩詔晉二等九年正月遇恩詔晉一等尋以罪降二等敖塞索爾和弟順治十二年四月襲噶那海敖塞弟子康熙二十三年八月襲巴錫噶那海從姪康熙三十一年三月以原職兼襲爵晉一等穆爾泰巴錫從姪雍正八年六月仍襲二等阿思哈尼哈畨乾隆元年改為二等男那延保穆爾泰子乾隆四十四年十二月降襲三等男三等梅勒章京昂洪達爾漢和碩奇滿洲正黄旗人國初以錦州軍功封三等副將天聰八年改為三等梅勒章京俄齊爾昻洪達爾漢和碩奇子天聰八年五月襲順治二年二月晉二等四年改為二等阿思哈尼哈畨七年三月遇恩詔晉一等以罪降三等九年正月遇恩詔晉二等又以恩詔晉一等十一年正月仍以罪降二等丹岑俄齊爾子順治十四年十月襲阿禹錫丹岑弟順治十七年七月襲通寳昻洪達爾漢和碩奇弟子順治十八年十一月襲圖喇通寳子康熙二十七年十一月襲坐事削爵明忠圖喇從弟雍正十二年十一月降襲三等阿思哈尼哈畨乾隆元年改為三等男永常明忠子乾隆八年十二月襲縁事革職永徳永常從弟乾隆四十三年十二月襲三等梅勒章京昻昆杜稜滿洲正黄旗人天聰八年五月自蒙古歸順封綽爾吉昻昆杜稜子崇徳八年十二月襲順治四年改為三等阿思哈尼哈畨順治七年三月遇恩詔晉二等尋以罪降九年正月遇思詔仍封三等阿思哈尼哈畨坐事削爵噶爾瑪綽爾吉弟順治八年閏二月襲沙殷查渾噶爾瑪兄子康熙八年襲徳爾格勒沙殷查渾從姪康熙十年五月襲闗保徳爾格勒子康熙十四年十二月襲乾隆元年改為三等男成徳昻昆杜稜四世孫乾隆二十五年十二月以原職兼襲爵晉二等男額爾景額成徳子乾隆四十四年十二月襲三等梅勒章京那木泰滿洲正黄旗人天聰十年四月以克大凌河大同等處軍功封阿哈連那木泰子天聰十年四月襲阿拉宻阿哈連兄順治二年三月襲四年改為三等阿思哈尼哈畨七年三月遇恩詔晉二等坐事降九年正月遇恩詔仍晉三等阿思哈尼哈畨復坐事降征湖南陣亡仍贈三等阿思哈尼哈畨齊藍布阿拉宻子順治十二年七月襲積夀齊藍布孫康熙三十八年閏七月襲子降襲三等梅勒章京和尼齊滿洲正黄旗人贈三等梅勒章京奇格特魏徵子崇徳三年八月襲諾木奇和尼齊子崇徳八年八月襲順治四年改為三等阿思哈尼哈畨順治年遇恩詔晉一等哈木尚諾木齊子順治十二年八月襲坐事削爵無襲三等阿思哈尼哈畨布顔他不能滿洲正黄旗人順治五年七月以原職兼襲職晉封莽色布顔他不能子順治八年二月襲阿勒格泰莽色伯父順治九年正月襲毛奇塔阿勒格泰弟子順治十五年三月襲康熙三十六年七月以征噶爾丹軍功晉二等長保毛奇塔子康熙五十三年十月襲松齡長保子雍正十一年八月襲乾隆元年改為二等男永泰松齡子乾隆二十八年十二月襲三等男三等阿思哈尼哈畨達里善滿洲正黄旗人順治年叙征浙江江西雲南軍功封六占達里善孫康熙二十五年襲後追叙達里善陜西軍功晉二等以庸劣削爵代奇立六占弟康熙四十四年十二月襲達桑阿代奇立嗣子雍正十年閏五月襲子降襲三等阿思哈尼哈畨譚布滿洲正黄