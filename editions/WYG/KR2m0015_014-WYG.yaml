body:
  text: 欽定四庫全書皇朝文獻通考卷十四錢幣考二康熈元年頒行康熙通寳錢先是順治十八年八月戸工二部以聖祖仁皇帝御極定於明年改元康熙請将寳泉寳源二局錢改鑄康熙通寳輕重如舊制發各省局依式鑄造與順治通寳錢相兼行使尋於十月将鑄成錢式進呈至是頒行天下又停工部司官辦銅之例工部疏言前令部員與蕪湖等闗及蘆政差分辦銅觔但本部採買仍須赴各闗口購運現在銅觔出産有限請停止部内辦銅從之定闗差任滿未完銅觔禁限户部疏言各闗差任滿得代任内未完額銅毎多因循推諉應申明禁限自今差滿回京額辦之銅俱限兩月内全完未完五分以下罰半年俸辦銅人役及原保並領辦商人各杖八十六分以上罰一年俸人役各杖百再限兩月全完如未完仍五分以下罰一年俸停其陞轉六分以上降一級留任人役各杖百該督撫嚴催交納限一年完解如不足令原監督於四月内自行賠補仍未完由部題㕘解任追補完日復職辦役原保及商人照侵盜錢糧例治罪從之停各省鎮鼓鑄止留江寧府局時以鑄局既多錢價過賤户部議准停止各省鎮鼓鑄唯聽寳泉寳源兩局制錢流通行使江寧為駐防重地其局仍令暫留二年議収毁一厘字制錢先是順治十八年議將銷毁一厘字錢之例暫展限二年行使至是復屆限期户工二部奏定各撥銀收買毎觔給直六分發錢局改鑄新錢其工部收買銀兩令暫停本年各闗採辦寳源局銅即將額銀先行解部聽候撥用三年申定各官失察私鑄處分之例户部議定私鑄之人潜藏僻野全在該管州縣各官宻訪嚴究雖舊定有失察處分恐日久玩生應申明其例嗣後該州縣官並吏目典史及衛所官失察一起降職三級調用二起革職知府直𨽻知州毎一起降一級調用司道官舊有降級之例今更定毎起各罰俸一年督撫毎起各罰六月俸又議定辦銅價值令各闗差兼支蘆課銀辦寳泉局額銅户部議言銅價毎觔定為六分五釐見在寳泉局額銅二百四十六萬一千五百三十八觔有竒各闗税額銀少銅額銀多不能如數採買江南等省各有蘆課額銀嗣後如闗税不敷請於蘆課銀内酌撥添補務照原額辦運以充鼔鑄從之又更定蕪湖龍江南新荆州四闗辦寳源局銅數時以停止部辦銅觔並蘆課辦銅復併歸户部撥用其寳源局額用之銅工部奏定蕪湖闗龍江闗各辦銅二十九萬二千三百七觔有竒南新闗辦銅七萬三千五百觔有竒荆州闗辦銅六萬一千五百三十八觔有竒四年定各官失察攙和舊錢廢錢處分户部議定凡官員不能疏通錢法仍聴民間將舊錢廢錢攙和行使者州縣衛所官毎起降職二級調用至三起革職知府直𨽻知州一起罰一年俸二起降一級三起降二級俱留任司道官毎起罰六月俸至三起降一級留任督撫毎起罰三個月俸三起罰一年俸六年復開各省鎮鼓鑄増置湖南江蘇甘肅省局時以浙江總督趙廷臣疏言直省爐座應仍令照舊鼔鑄以裕國儲而濟民用經户部議准除見存之江寕局外其餘各省鎮依順治十七年之例通行開局照式鑄地名滿漢文並増置湖南等局其錢幕湖南長沙府局鑄南字江蘇蘇州府局鑄蘇字甘肅鞏昌府局鑄鞏字臣等謹按湖廣左右布政使舊駐武昌府康熈三年移右布政使治長沙府改為湖南布政使司江南左右布政使舊駐江寕府順治十八年移右布政使治蘇州府康熙六年改為江蘇布政使司陜西左右布政使舊駐西安府康熙二年移右布政使治鞏昌府五年改為甘肅布政使司是年以三處分省伊始故特増鼓鑄七年増蘇州府局爐座江蘇巡撫韓世琦疏言蘇州繁富之地百貨流通近雖設鼓鑄局而錢價尚昻請更増置爐一百座開鑄户部議如所請從之又議令直省官役俸工諸項俱配給制錢户部議言直省錢糧見在銀錢兼收其存留之官役俸工驛站襍支諸項請均照銀七錢三例配給該督撫仍取所屬徴收錢糧流水底簿查對嵗終將收放數目造冊報部奉行不力者叅處從之又令四川廣東廣西貴州省各開鼓鑄局户部疏言湖南等處俱已開鑄惟四川等省原未設局應令各督撫詳查定議尋俱奏請開爐其錢幕滿漢文四川成都府局鑄川字廣東廣州府局鑄廣字廣西桂林府局鑄桂字貴州貴陽府局鑄貴字九年停江寧蘇州江西福建湖北湖南河南山東山西陜西甘肅廣東廣西雲南貴州四川鼓鑄時以四川巡撫張徳地疏言四川僻處邉地州縣本無存留錢糧而陸路有棧道之艱水路有川江之險若令銀錢兼徴則起解脚費恐致累民見在無需錢文之用請停鼓鑄經户部議應如所請其江寧等十五布政使司均恐有需錢非急之處開鑄以來官錢既多或致壅滯亦應行查議停得㫖俱暫行停止十年停宻雲薊宣府大同鎮鼓鑄又行收買舊錢廢錢之令户部議言兩局制錢見在逺近流通民間舊錢廢錢不准行使但不行收買恐滋攙和之弊應令盡數交官毎觔照銅價給直六分五釐解局銷毁鼓鑄其有違例不交仍前攙和行使者照例治罪從之十二年議令浙江及臨清局買銅増給水脚銀時各省鑄局陸續議停惟存浙江及臨清局户部議言各局銅價原定毎觔六分五釐而脚費無出恐至累民令浙江與臨清局俱於正價外許増脚價銀五釐從之又定私銷制錢禁例四川道御史羅人傑疏言奸民銷毁制錢造作銅器應行禁止經九卿議定銅價所在髙昻而毁千錢已可得銅八觔有餘銅價浮於錢價直可獲利以倍非嚴立科條不能禁其不毁制錢也私銷之罪同於私鑄嗣後有犯者照私鑄例論罪官員失察亦如之其能宻訪究治者毎起紀録一次至四起加職一級旁人首告者所獲銅觔以半入官以半賞給臣等謹按是時私鑄之例係為首斬决為從絞决私銷者與同罪至乾隆十五年改私鑄為首斬候為從發遣其私銷之犯仍照立斬立絞例房主隣佑人等知情受賄者照為從例但知情不首並未分贓者杖一百流三千里失於覺察者杖一百告捕審實者給賞銀五十兩其有私鑄之犯即係私銷之人拿獲時究有實據仍照私銷例治罪互詳刑考議行鑄造銅器之禁時以銷錢作銅者多九卿議定民間市肆交易除紅銅鍋及已成銅器不禁外嗣後一應黄銅器在五觔以下者仍許造賣其餘不得濫行鑄造違例者係旗人鞭一百枷一月係民杖一百流三千里所獲銅入官互詳刑考十三年停浙江鼓鑄十四年定開採銅鉛之例户部議准凡各省産銅及白黒鉛處所有民具呈願採該督撫即委官監管採取至十八年復定各省採銅鉛處令道員總理府佐分管州縣官専司採得銅鉛以十分内二分納官八分聴民發賣有不便採取之處督撫題明停止監管官所得税銅鉛准按觔數議敘上官誅求逼勒者從重議處其採取銅鉛先聴地主報名如地主無力聴本州縣人報採許雇鄰近州縣匠役如有越境採取及衙役擾民俱治其罪臣等謹按嗣後各省銅鉛之厰視山礦之旺衰或開或閉隨地隨時初無一定康熙年間如盛京及閩浙諸省皆曽開採續經停止今則雲南貴州湖南四川廣西廣東等處並饒礦産而滇之紅銅及黔楚之鉛粤東之㸃錫尤其上供京局者也開厰之例亦陸續増定大抵聴商民自為採取而官為監之税其十分之二其四分則發價官收四分則聽其流通販運或以一成抽課其餘盡數官買或以三成抽課其餘聽商自賣亦有官發工本招商承辦又有竟歸官辦者其額有増減價有重輕皆隨各省見在情形斟酌辦理沿革具詳征𣙜考之坑冶門兹不複載又議令各闗銅觔止辦解定額之半又定辦銅官虚報起解處分户部議定各官採買銅觔有並未解運將起解日期虚揑申報者降職二級調用其解送遲延照違限例處分停臨清鎮鼓鑄十五年定工部寳源局監督不論滿漢止差司官一人工部疏言寳源局監督向設三人順治十七年裁一人定滿漢各一然局務止得户部之半應再減一人嗣後無論滿漢遴委賢員督理一年更代其筆帖式一員仍如舊制從之十七年申定各闗差完解銅觔之限戸部疏言各闗監督應辦銅觔闗係官鑄應嚴立限期自到任後八月完解定額之半如不完降職一級留任其半於差滿後限四月完解如不完降二級留任限一年全完開復仍不完革職變産追賠商役悉照例治罪從之十八年議定户部寳泉局工部寳源局俱令滿右侍郎一人公同漢侍郎督理錢法又行解送廢銅之令奉上諭今聞錢法漸弛鼓鑄滋弊以致制錢日少價值騰貴著戸部工部都察院堂官同詣錢局親查釐剔弊端至部院衙門各處所有廢銅器皿及廢紅衣大小銅礮並直省所存廢銅礮著盡行解部鼓鑄尋議各闗差承辦兩局銅觔聽買廢銅舊器解送或將紅銅六十觔鉛四十觔折作銅一百觔不得攙和板塊之銅以絶毁錢之弊至二十四年復議不拘板塊及廢銅准其一體解送又令兩淮兩浙長蘆河東鹽差増辦寳泉局銅户部疏言鹽差與闗差俱屬一體各闗税銀先已分撥辦銅見在銅斤尚屬不敷應撥鹽課銀兩淮三萬兩兩浙長蘆各萬五千兩河東五千兩令各巡鹽御史督催各運使照部定價直辦銅解送以充鼓鑄從之又定寳泉寳源二局收買淘洗餘銅户工二部議定兩局鼓鑄錢文凡土砂煤炭内有滴流餘銅應令該監督召人淘洗所得之銅照部定價收買復開廣西鼓鑄局十九年議派滿漢科道官各一人稽察錢局一年更代又開福建漳州府鼓鑄局錢幕鑄滿漢文漳字二十年停塩差辦銅之例户部疏言鹽差與闗差辦銅同購之商販自分辦以來責成不専轉致解運難前仍應停止鹽差採辦從之停廣西鼓鑄二十一年復開雲南省城鼓鑄増置大理府禄豐縣䝉自縣局錢幕俱鑄雲字定各闗承辦局銅仍照原額全行解運停福建漳州府鼓鑄二十二年議減臨清闗辦寳泉局銅銀萬兩改令贛闗太平橋闗承辦並増湖口鳳陽闗辦銅之令臨清闗監督髙拱乾疏言闗差辦銅應照額税定數今臨清闗税止二萬四千餘兩而所辦之銅已至二萬兩請酌量裁減經户部議言見在崇文門及天津揚州二闗毎處各支銀一萬兩各辦銅十五萬三千八百四十六觔有竒淮安北新湖口臨清四闗每處各支銀二萬兩各辦銅三十萬七千六百九十二觔有竒滸墅闗支銀二萬三千兩辦銅三十五萬三千八百四十六觔有竒蕪湖闗支銀二萬二千兩辦銅三十三萬八千四百六十一觔有竒西新闗支銀五千兩辦銅七萬六千九百二十三觔有竒今臨清闗税稍覺不敷有贛闗太平橋闗二處額税銀三萬餘兩從不辦銅應酌減臨清闗辦銅銀一萬兩令二闗各支銀五千兩採辦見在官鑄需銅宜令充裕並請再酌増湖口闗銀三千兩又有鳳陽闗亦從未辦銅請派銀一萬二千兩採辦官銅解交鼓鑄從之臣等謹按康熙二十一年移九江闗於湖口縣故亦稱湖口闗至雍正元年仍還九江復開湖南鼓鑄局二十三年選差専員督理京省錢法户工二部錢法向以本部右侍郎管理至是奉上諭管理錢法俱應另行選差將鑄錢事冝並耗費等項詳加察看親督鑄造務期盡除積弊永為定式應差各官該部開列具奏尋將各部院堂官列名請簡以吏部侍郎陳廷敬兵部侍郎阿蘭泰刑部侍郎佛倫都察院左副都御史馬世濟管理錢法又議將各闗税及蘆課銀増辦寳源局銅令毎年開鑄二十四卯管理錢法刑部左侍郎佛倫疏言寳源局毎月分二卯鼓鑄毎卯需銅五萬觔現在各闗額解之銅尚不無遲延尾欠毎年約止交局六十五萬八千餘觔僅可供鑄六月有餘其餘五月匠役無事各歸鄉村安能保其不行私鑄請將各闗税及蘆課銀増買銅至一百二十萬觔一年按月鑄足二十四卯不令匠役出局可杜私鑄之弊經工部議言見今蕪湖龍江南新荆州四闗嵗辦額銅七十一萬九千六百五十四觔尚不足銅四十八萬三百四十六觔應照部定銅價毎觔銀六分五釐令蕪湖闗贛闗各支税銀一千九百五十兩滸墅闗支税銀六千一百七十五兩太平橋闗支税銀二千六百兩鳳陽闗支税銀一千四百十六兩七錢四分湖口闗支税銀九百十兩共辦銅二十三萬七百九十六觔再撥江蘇蘆課銀一萬一千五十兩安徽蘆課銀三千九百兩湖廣蘆課銀六百五十兩江西蘆課銀六百二十兩七錢五分共辦銅二十四萬九千五百五十觔即以康熙二十四年為始解交寳源局以足鼓鑄從之又更定錢制毎文重一錢令寳泉局毎年開鑄四十卯管理錢法吏部左侍郎陳廷敬疏言民間所不便者莫甚於錢價昻貴定制毎錢一千直銀一兩今毎銀一兩僅得錢八九百文錢日少而貴者葢因奸宄不法毁錢作銅牟利所致鼓鑄之數有限銷毁之途無窮錢安得不貴乎欲除毁錢之弊求制錢之多莫若鑄稍輕之錢毁錢為銅既無厚利則其弊自絶總計寳泉寳源二局毎年各處動税課銀二十五萬三千兩辦解銅三百八十九萬二千三百七觔有竒内除耗銅三十五萬三百七觔有竒净銅三百五十四萬二千觔見鑄錢四十萬四千八百串今若改毎文重一錢計毎年可多鑄錢十六萬一千九百二十串此利於民而亦利於國者也得㫖令九卿㑹議尋議應如所請於寳泉局按卯増鑄其各省錢局俱照新定錢式鑄造從之又定以銅六鉛四配鑄制錢戸部議定凡銅觔仍由各闗辦運鉛觔由部發銀交商人承辦解局配用臣等謹案鑄錢之法兼用銅鉛盖銅性燥烈必以鉛濟之而後錢始光潤唐錢已用銅鉛錫配鑄故開元時曾禁以銅為器及私賣銅鉛錫又宋史稱轉運使張齊賢求舊鑄法惟永平兼用開元錢料最善即詣闕面陳詔増市鉛錫明代錢分别四火黄銅二火黄銅配鑄所謂黄銅者即紅銅與白鉛相和而成葢其法相傳已久國初鑄錢或聴各闗於銅額内兼辦鉛觔或收用廢錢舊器分别生熟銅配鑄至是始酌定成數是年若湖南省嗣後若福建廣東湖北浙江等省開局皆令照例配鑄惟雲南鑄局是時以本地及貴州等處鉛礦俱未開採銅賤鉛貴銅價毎觔五分四釐鉛價毎觔五分五釐准以銅八鉛二配鑄又申定兩局爐役夾鑄私錢之禁户部議定錢局爐頭匠役藉名官鑄或夾鑄私錢先經順治年間嚴定科條而究獲者少應令錢法侍郎與稽察錢局科道及監督等嚴行查緝如瞻徇縦容不行嚴究别經發覺各官均以失察論又令步軍統領衙門及巡捕三營查緝私錢凡京城内外私銷私鑄之案向令五城司坊官及大興宛平縣官承緝五城御史督察至是户部議定步軍統領衙門巡捕三營官員亦應協同查緝如失察者一併照例議處從之二十四年復開福建鼓鑄局又罷前代舊錢之禁福建巡撫金鋐疏言福建錢文頗襍所轄州縣多用前代舊錢應為禁遏經戸部議准一切舊錢悉行銷毁上復以問内閣諸臣時内閣學士徐乾學議言自古皆古今錢相兼行使以從民便考梁太平元年詔雜用古今錢宋泰始二年㫁新錢専用古錢魏熙平初任城王澄上言請以太和錢與新鑄五銖及諸古錢並得通行金大定十九年以宋大觀錢一當五用之明太祖實録辛丑嵗二月置寳源局於應天府鑄大中通寳錢與厯代錢相兼行使嘉靖十五年御史閻隣等言國朝所用錢幣有二曰制錢如洪武永樂等通寳是也曰舊錢如開元太平淳化祥符等錢是也百六十年來二錢並用民咸利之以臣所聞厯代如是大抵錢者厯代通行之貨金志謂之自古流行之寳自漢五銖以來未有廢古而専用今者若隋時盡銷古錢明天啓以後廣興鑄局盡括古錢以充廢銅此錢之變也昔時錢法之弊至於鵝眼綖環之類無代不有然歴代之錢尚存旬日之間便可澄汰至舊錢已盡即使良工更鑄而海内之廣一時難徧欲一市價而裕民財為稍難矣故自古雖易姓革命而古錢仍舊流通錢亦不壅况於閩處嶺外負山鄰海非同内地聽從民兼用古錢似為至便奉上諭舊錢流布不止福建一省他省亦皆有之若驟為禁止恐不肖之徒借端生事貽害平民亦未可定所奏銷毁之處不准行臣等謹按前代舊錢廢錢凡民間攙和行使及各官失察向俱定有禁例至是特寛其禁又定旗人私銷私鑄禁例戸部議定旗人有在本旗地方私銷私鑄者依律論罪領催及鄰佑縂甲十家長知情者照為從例不知者旗人鞭一百民人杖一百係職官降一級留任該管驍騎校失察毎起降一級罰一年俸佐領降一級俱留任若他旗或民人在該旗地方私銷私鑄失察者領催鞭八十歩軍校驍騎校罰半年俸佐領步軍副尉各罰三月俸㕘領罰二月俸都統副都統罰一月俸本旗該管官免議如家人犯者其主係職官降二級留任平人鞭一百該管官免議賃房之主知情者照為從例不知者職官降一級留任平人鞭一百如看房家人賃與他人犯者家人照房主例論其主免議在屯莊家人犯者屯荘領催知情照為從例不知者鞭一百其主及該管官俱免議又議減龍江闗辦寶源局銅銀五千兩改令西新闗承辦又開雲南臨安府鼓鑄局錢幕亦鑄雲字二十五年増各闗辦銅價直户部奉上諭近來各闗差官任意徴收託言辦銅價直浮多将商册改换重困商民今欲盡除諸弊其銅價既已不敷應酌量増加著㑹同九卿科道詳議尋議言各省銅産不能充裕價直漸昻毎觔原價銀六分五釐誠有不敷今酌増三分五釐毎觔合計銀一錢各闗辦解户部銅二百六十九萬二千三百七觔有竒辦解工部銅九十五萬四百五十觔有竒合計三百六十四萬二千七百五十八觔應加増銅價銀一十二萬七千四百八十八兩有奇即于各闗税内支給著為定額以本年出差監督到任為始如有例外苛索将商人親填簿册揑造改易一經察劾從重論罪從之又復開廣東省城鼓鑄増置肇慶府局錢幕亦鑄廣字二十六年定戸工二部錢法仍令本部右侍郎督理停止選差専員又復開湖北鼓鑄停廣東肇慶府局二十七年増各省蘆課辦銅價直工部疏言各闗辦銅價直䝉皇上軫念商民慮差員苛索已酌量加増俱係毎觔定價一錢所有蘆課銀辦銅亦請照闗税例毎觔増給銀三分五釐以足一錢江蘇應加銀五千九百五十兩安徽湖廣江西三省應共加銀二千七百八十四兩有竒合計増銀八千七百三十四兩有竒俱於蘆課項内動支購買從之又定工部寶源局監督仍差滿漢司官各一人二十八年開福建䑓灣府鼓鑄局錢幕鑄滿漢文臺字福建廵撫張仲舉疏言臺灣孤懸海外自建設郡縣以來民間猶用偽錢應請頒發制錢式様就本地開爐鼓鑄其銅本就兵餉銀内動用購買鑄獲制錢歸還原項户部議如所請從之又停雲南省各局鼓鑄雲南各局舊共設爐四十八座後以錢價􅂈賤已議裁爐二十四座至是縂督范承勲復以錢法壅滯請將雲南省城禄豊縣臨安府城蒙自縣大理府城五局概行停止俟積錢疏通完日再議開鑄從之二十九年申定錢直不平禁例户部議言官局制錢順治年間即定毎十文準銀一分近因錢市居竒而價復参差不一自今市肆交易務照定例毎銀一兩毋得不足千文之數違者旗人鞭一百民人杖一百各枷一月互詳刑考又行收買私錢之令户部議言民間私錢在京城限六月交送戸部照銅價毎觔給銀一錢收買改鑄在外以文到日為始亦限六月各州縣動庫銀照銅價收買解布政司其限内交送私錢之人免其治罪嗣後京城内外責令司坊官及大興宛平二縣官各省責令州縣官不時嚴查若仍有攙和行使者經科道及督撫訪出或别經首告将該管地方官毎起罰一年俸從之三十一年停廣東及福建臺灣府鼓鑄又申定各闗差在京城買銅之禁先是議寶泉寶源爐頭匠役有将各闗差應解銅觔在京包攬買交希獲餘利轉致虧帑誤鑄者予以杖枷並妻子流尚陽堡各闗監督知情者革職嗣後議定各闗額銅有在京城辦買者代為辦買人係旗人鞭一百枷三月係民杖一百枷三月流三千里銅價入官知情之闗差照例議處各差觧銅至臨清該闗官㑹同知州查騐至天津該闗官㑹同天津道查騐至崇文門該監督㑹同科道官查騐各給印文若不查而給與虚數印文者亦革職至是奉上諭各闗差於京城託人購銅及令衙役解銅俱著嚴行禁止務於出差地方如數辦買令同差之筆帖式依期親解送部三十三年令寶泉局毎年開鑄三十六夘每夘用銅鉛五萬觔三十四年復開廣東鼓鑄停福建局三十五年復開浙江鼓鑄局三十六年以湖北湖南局錢輕小禁止行使湖北局昌字錢湖南局南字錢以式様輕小已於二十六年得㫖嚴加申飭至是户部議定昌字南字錢色紅不堪行使應行禁止照小錢例依限交收仍行令該督撫飭監局之員嗣後務鑄造精工如仍攙和多鉛将司道官以尅減例督撫以徇隐例處分又嚴失察私錢處分奉上諭朕頃謁陵時見用小錢者甚衆所換之錢亦多舊錢兩局錢使用者絶少此實非益民之事也今嵗田禾大有而米價仍貴詢之土人皆云錢賤所以米貴又聞小錢從山東來者居多先年佛倫科爾坤管錢法時請将錢式改小朕每謂錢改小易改大難錢價若賤則諸物騰貴今果如朕言大學士等即同九卿将錢法如何盡善確議具奏尋議定官錢價賤悉由私鑄􅂈多欲維持錢法惟先嚴禁私錢嗣後内外各官将該管地方私鑄及興販私鑄之案自行緝獲者免其論罪如被戸部都察院差官及在外督撫查出或旁人首告五城坊官及直省州縣官不知情者一起降職三級調用二起革職掌印兵馬司知府直𨽻知州一起降二級二起降四級調用三起革職司道官按起議降至三起降三級調用四起革職五城御史直省督撫一起罰一年俸二起降一級三起降二級四起降三級調用五起革職同知通判吏目典史有緝捕之責者照掌印官例運使照司道分司照知府鹽大使照典史例武職提鎮照廵撫副将照司道㕘將逰擊照知府都司守備千縂照州縣例各旗地方犯者都統副都統照廵撫㕘領照司道佐領照知府驍騎校照知縣例各分别議處其有因公出境者免議至官船戸夾帶私錢押運官知情者革職不知者降三級調用其不知情之文武地方官但能緝獲者無論年月逺近皆免處分文官緝獲者兼免同城武職處分武職緝獲者同城文職亦如之有自别省興販私錢以舟車騾馬装載發賣者或被看守闗津之人緝獲或旁人舉首私錢入官緝獲舉首之人照例給賞将經􅂈地方未經查出之文武官俱照失察例議處其私錢已有收買之令在内限兩月交戸部在外以文到日為始限三月交地方官送布政司均照銅價毎觔給銀一錢收買改鑄三十七年停廣東鼓鑄三十八年議令民間自行銷毁私錢交官收買先是收買小錢視銅價毎觔給銀一錢嗣因其攙和低鉛不便照依銅價毎觔酌給銀八分至改鑄時毎百觔仍除耗九觔後復以紅色小錢鉛質尤重毎觔改給銀六分五釐至是以銷毁改鑄折耗甚多且户部寶泉局中收貯小錢已足攙鑄四年有餘将議停買管理錢法工部侍郎常綬疏言寶源局毎嵗需銅一百二十萬觔各闗解送銅觔於四五月始到春間無銅可鑄毎向戸部領取存貯小錢攙和鼓鑄請仍行收買但小錢銅少鉛多應令民間自行銷燬交官毎觔仍給價六分五釐在京立限兩月在外以文到日為始限亦如之如逾限不行銷毁仍舊行使者照例治罪從之又議以蕪湖滸墅湖口淮安北新揚州六闗應辦寶泉寶源二局額銅改交内務府商人承辦内務府奏言有張家口買賣商人等呈稱現在十四闗差所辦銅觔原係監督隨