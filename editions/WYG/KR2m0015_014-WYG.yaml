其銀一兩折錢二千俟錢盡時折收諸銅噐則不出一年私錢自盡彼地方官不能緝獲私鑄俱係有罪即将所收錢及銅交伊等運至京城増爐鼓鑄爾等與九卿科道議奏嗣議将趙世顯所請不准開爐鼓鑄其山東明年錢糧遵㫖折收俟私鑄盡而止四十七年議令湖廣舊鑄局錢展限行使户部議言湖廣舊鑄昌字南字錢以錢質輕小私錢易於攙和該省見在發價收買但一時既難驟盡而大制錢尚少流通應展限五年准其行使俟期滿後再行議禁從之又申嚴失察私錢處分之例戸部議定直省私錢盛行皆該管各官不實力訪緝以致奸民藐法應再行嚴定處分嗣後有私鑄及興販不法之徒該管地方文武官不行嚴緝或上司查出或旁人首告其知情者照私鑄為首例斬决家産入官不知情者以溺職論革職官船户有販運私錢押運官知情者與同罪不知者革職五十年増定寶泉局毎夘用銅鉛十萬觔五十一年議以龍江西新南新贛闗應辦寶源局額銅交商人承辦又令撥京局大制錢運往湖南偏沅廵撫潘宗洛疏言湖南所用制錢半係康熙三十九年以前所鑄錢小而輕私鑄易於攙和康熙四十一年以後寶泉寶源所鑄一錢四分之新大制錢尚未流通請毎年撥給大制錢四萬串於回空糧船載至湖南運到之日按照州縣大小赴司領發易銀觧貯司庫以三年為限俟大錢敷用将小制錢盡收銷毁經户工二部議准於寶泉局撥三萬串寶源局撥一萬串毎年交該省糧船運回以便民用五十二年議派兩浙福建廣東鹽課増辦寶源局銅並各省蘆課辦銅銀俱交商人承辦工部議定官局所需額銅從前所辦尚多不敷應於兩浙鹽課増銅二十萬觔福建鹽課増銅六萬觔廣東鹽課増銅十萬觔並從前派定之江蘇安徽湖廣江西蘆課辦銅銀兩均令商人辦運共解寶源局銅二百五十二萬觔又議以各闗應辦寶泉局額銅並増派鹽課海闗税辦銅銀俱交商人承辦户部議言各省例辦官局額銅向應解工部者已定悉令商辦其應解戸部者查有内務府買賣商人係身家殷實之戸於辦理銅務尤所熟諳應将各闗辦寳泉局額銅悉責令如數領價採辦毎年可節省銀五萬兩再於兩淮鹽課辦銅十七萬觔河東廣東鹽課辦銅各十萬觔福建鹽課辦銅六萬觔福建海闗税辦銅四萬觔均交與内務府商人照定限全交如遲延虧欠錢法侍郎指名㕘究保結之佐領並從重治罪從之五十三年令寶源局毎年開鑄三十六卯又議定商人辦解銅鉛違限處分及寶泉寶源二局監督奏銷更代之例管理錢法侍郎崔徴璧疏言商人虧欠銅鉛不下數百萬觔之多前䝉皇上准其作十年帶銷而見在新欠日積宜立限責其完觧逾限不完議定處分至錢法之奏銷向止對月計算不按年分故往往前官經手之銅鉛後官代為奏銷而滿漢監督又参差更换前後無一定之考成請照州縣錢糧之例按年奏銷監督更代亦宜在奏銷之後經工部議覆商人運解銅鉛正宜嚴定限期應於毎年奏銷時照各商所辦銅鉛額數以十分為準未完不及二分者免其處分限一年完足未完二分至五分以上者分别治罪未完六分以上者照侵欺錢粮例從重科㫁皆限一年補足不足者變産追賠至各省錢糧皆定於毎年五月奏銷今錢法亦照此例無論有閏無閏縂以正月為始歳終為止次年五月奏銷滿漢監督於奏銷後更代毎年鑄錢照定限三十六卯銅鉛不完責在商人鑄卯不足責在監督或商人限内所交甚少逾限始行完解以致卯數不足者咎不在監督於奏銷内聲明統照直省徴收錢粮未完分數之例交部議處監督有事故離任者接任官以六月為期不足六月者再令接任一年多於六月者即於奏銷後報滿更代從之五十四年議定京局額銅改交江蘇安徽江西浙江福建湖北湖南廣東八省督撫委員辦解増定價直罷内務府商人辦銅之令先是以商人虧欠日重漸至解運不前有誤鼓鑄已議仍交各闗差官照原數採辦尋户部以闗差辦銅仍須取之商販復請照舊例令商人辦運奉上諭商人採買銅觔前已令停止今復議交辦必致積欠無了期矣已經議定之事豈得再有紛更若以官辦為難則原奏時即應詳慎計處及事不能行又欲交與商人可乎運銅諸事著再議具奏尋大學士㑹同戸工二部議言額辦銅鉛以銅六鉛四計算毎年寳泉局額銅二百九十二萬三千三百八十四觔寶源局額銅一百五十一萬一千八百十六觔共需銅四百四十三萬五千二百觔歴年商人虧空不便仍交採辦即以五十五年為始分派江蘇安徽江西浙江福建湖北湖南廣東八省督撫遴委賢能官承辦毎省各辦紅銅五十五萬四千四百觔解戸部三十六萬五千四百二十三觔解工部十八萬八千九百七十七觔毎觔増定銅價銀一錢二分五釐給水脚銀三分俱動正項錢糧銀兩採辦其辦銅水脚銀向係各闗差鹽差及江南等處有蘆課地方各官從盈餘銀内扣支以毎觔五分計算内實給三分節省二分今既俱動正項錢糧則此項水脚銀十三萬三千五十六兩及節省銀八萬八千七百四兩應令其一併觧交戸部至毎年寶泉局額鉛一百九十四萬八千九百二十三觔寶源局額鉛一百萬七千八百七十七觔共需鉛二百九十五萬六千八百觔毎觔定價銀六分二釐五毫水脚銀三分仍令商人領戸部銀兩聽其收買礦鉛如額觧用從之又定各省辦觧銅觔分為兩運上運以毎年四月起解下運以毎年十月起解五十五年令京局暫行收買舊銅以充鼓鑄時江蘇等八省督撫辦銅以事在創始未能依限觧交户工二部議定先行收買舊噐皿廢銅交局鼓鑄毎觔定價銀一錢脚費五分由戸部給發銀兩辦買務令不誤鼓鑄仍照銅六鉛四合計将銅六價直併脚費銀兩數目扣明行文江蘇等八省督撫照原額扣除減辦其所减之銅價及水脚銀兩令其彚齊觧部五十六年嚴私銷小制錢作銅變賣之禁大學士等議言前因江蘇等省觧銅恐有逾限定錢局暫行收買舊噐皿廢銅通融辦理近聞奸民私銷小制錢作廢銅變賣較之錢價獲利以倍於錢法轉滋弊竇應亟行禁止奉上諭毁壊制錢原有明禁朕屢次更定錢法皆酌量當時情形辦理前李光地請将小制錢嚴禁曽諭以㫁不能行伊亦知其不可縂督額倫特請於湖廣省發大制錢二百萬貫通行使用将小制錢銷毁朕以不可之故分晰明諭伊始曉然今奸民竟敢将小制錢私行銷毁作銅變賣甚非所以維持錢法也如何禁止之處九卿科道㑹同戸部確議尋議言嗣後錢局止許買舊銅器皿不准買新鑄板塊銅觔如有毁小制錢充作廢銅者通行八旗歩軍統領並五城大興宛平兩縣嚴緝為首者枷二月杖一百遣發雲貴川廣烟瘴少輕地方為從者枷一月杖一百流三千里該管官知情故縱者與同罪不知者降職三級房主鄰佑知情不首者照為從例不知者杖九十從之互詳刑考五十七年議増各省辦銅價直預年給發並准兼收舊銅交納户工二部議言見今銅價日昻應請将從前節省水脚銀二分之數自五十八年為始増入額銅正價内為毎觔價銀一錢四分五釐向定辦銅四月完半限期太廹嗣後採辦次年銅觔先年即預動正項錢糧給發以免臨期藉口遲延八省所辦額銅中如紅銅不能足數准於十分内兼收三分舊銅器皿交納其價並水脚毎觔給銀一錢一分九釐有竒如仍前遲誤将該督撫一併議處從之増定寶泉局毎夘用銅鉛十二萬觔五十八年罷收買舊銅之令奉上諭户部見今採買舊銅器皿工部又行採買京城焉有如許舊銅採辦不得之時不肖之徒乗機射利必致将制錢銷毁轉賣毁錢則錢價必長甚與民生無益著大學士九卿等確議尋議言見今兩局所貯餘銅及各省觧到銅觔可以不誤鼓鑄其採買舊銅之例應不准行至江寕等八省舊欠未完銅二百七十二萬八千六百觔有竒應令各該督撫於文到日勒限十月盡數觧部如有遲誤将辦銅各官嚴加議處督催不力之督撫布政使俱照承追錢糧例處分從之又議停各衙門公費及官俸給錢之例户部議言毎年局錢配給八旗兵餉及各衙門公費漢官俸錢共需錢三十七萬五千餘串見查寶泉局毎年所鑄錢除本局支用工料各項外所存止三十三萬四千二百餘串合之所出錢數尚不敷四萬一千餘串請将各衙門應支公費與漢官俸錢停其給錢毎錢一串給銀一兩從之五十九年議令湖南桂陽州税鉛觧京局配鑄湖南桂陽州開採鉛礦所有抽收税鉛向例逐年變價将課息報部至是户部議言見在局鉛商辦不易桂陽州有上年税鉛十二萬三千三百十一觔應令觧交京局並自今五十九年以後税鉛俱停其變價毎年起運以十分之七觧户部十分之三觧工部配銅鼓鑄仍照商人辦鉛之例毎觔給水脚銀三分從之嗣後湖南郴州税鉛亦令照例觧部六十年議定八省承辦京局額銅歸併江蘇浙江二省辦觧九卿等議言鼓鑄銅觔惟需東洋條銅而洋銅進口船隻俱收江浙二海闗是江浙為洋銅聚集之區見在八省分辦銅數俱在江蘇浙江購買徒滋紛擾以致觧運不前莫若即歸併江浙廵撫委員辦解自六十一年為始其分辦銅數仍令該撫等自行酌定尋江浙廵撫奏覆江蘇辦本省及安徽江西福建廣東五省銅數共二百七十七萬二千觔内觧户部一百八十二萬七千一百十觔有竒觧工部九十四萬四千八百八十觔有竒浙江辦本省及湖北湖南三省銅數共一百六十六萬三千二百觔内解户部一百零九萬六千二百六十觔有竒解工部五十六萬六千九百三十觔有竒毎觔照定價一錢四分五釐水脚三分於司庫地丁銀内預撥採辦分解二局六十一年議将平糶官米錢文交五城市易以平錢直並令八旗月餉暫以銀錢各半配給戸部議言京城制錢舊時毎市銀一兩易錢八百八十文今銀一兩易錢七百八十文錢價日貴民間日用以錢交易資用甚艱應将糶米所收錢文即令五城平價易銀交庫併八旗給發月餉暫以銀錢各半搭放俟錢價稍平即行停止從之臣等謹按嗣後毎遇平糶官米及豆麥所收錢文多照此例兑換以平市價或交官局照舖户減價出易或即交錢牙經紀流傳易銀交庫乾隆二十七年復恐錢牙囤積居竒議令歩軍統領衙門交商發賣随時調劑事関市易具詳市糶考之市門兹不複載又議平錢直申定辦銅限期奉上諭京師錢價甚貴至今尚未得平昔年管理錢法侍郎陳廷敬等條奏奸宄圖利毁錢作銅以致錢直騰貴如将制錢毎文鑄重一錢則錢價即平九卿議覆准鑄小錢迨後私鑄甚多朕以制錢仍照舊鑄大者為善故特降諭㫖而九卿請鼓鑄大錢将小錢銷毁朕念小民行之已乆暫令大錢並用自後於民亦甚便利凡事須隨時制宜鼓鑄一事從前屢經更改今錢價何故驟貴交九卿科道㑹同確議尋議言錢直平減全在錢文之充裕見在銅觔已定歸併江浙購辦務令仍照原議四月完半十月全完如上運銅觔於四月内不完者即應初㕘再限四月不完為二㕘展限四月不完為三㕘下運銅觔一照上運扣限糾㕘如有狥隐不行揭報将該督撫一併交吏部議處銅觔運解既速則按夘鼓鑄制錢日多錢價自平從之聽商民得赴安南國採銅九卿等議言向聞安南國銅産頗饒令雲貴兩廣督撫行文安南國王凡有客商採買銅觔務使照常貿易不時放行毋得禁止阻留則内地銅觔自必益加充裕從之又議增辦鉛價直户部議言錢局以銅六鉛四配鑄見在鉛觔價直昻貴是以商人承辦不前應酌量照八省銅價増給二分之例毎鉛一觔増價二分為八分二釐五毫仍給水脚銀三分務令勒期觧部不得藉詞遲誤從之尋以鉛價漸平仍復毎觔六分二釐五毫之例臣等謹按鼓鑄錢數例於户工二部按年奏報國初京局鑄錢尚無一定額數順治元年以後毎年自數萬串遞加鑄至數十萬串不等十五年以後以制錢改重故鑄額中減十七年以後數復加増寶泉局嵗鑄錢二十八萬餘串寶源局嵗鑄錢十八萬餘串康熙初年兩局錢數又稍減二十三年以後分定夘數嗣後銅鉛辦觧有遲速故鑄夘有増減局錢仍復盈縮隨時大抵寶泉局毎年為二十八九萬餘串或二十三萬餘串不等寶源局毎年為十七萬餘串或十二萬餘串不等五十年以後兩局夘數銅觔逓經増定至康熙六十年間兩局各三十六夘毎銅鉛百觔除耗九觔給工料錢一串九百六十九文寶泉局毎夘用銅七萬二千觔鉛四萬八千觔鑄錢一萬二千四百八十串寶源局毎夘用銅三萬六千觔鉛二萬四千觔鑄錢六千二百四十串毎年共為錢六十七萬三千九百二十串云皇朝文獻通考卷十四
