韶樂作奏隆平之章樂辭與常朝同後仿此皇帝陞座樂止鑾儀衛官贊鳴鞭丹墀内三鳴鞭丹陛大樂作奏慶平之章鴻臚寺鳴贊官贊齊班序班引正副使就丹墀東班拜位立北面西上贊進少進贊跪叩興行三跪九叩禮興樂止序班引正副使升東階至丹陛北面立鳴贊官贊有制正副使跪宣制官進至殿中門之左宣制曰某年月日冊立某妃某氏為皇后命卿等持節行禮如奉奉曰欽皇太后㦤㫖則皇太后㦤㫖宣畢大學士進殿左門詣中案奉節由中門闑左出至丹陛以節授正使正使受節偕副使興内閣禮部官進殿左右門舉冊寳案出中門正使持節前行副使從以次降中階内閣禮部官奉冊寳設龍亭内鑾儀校舁行導引如初由太和門出皇帝賜王公大臣茶如常儀畢皇帝降座鳴鞭如初中和韶樂奏顯平之章皇帝還宫樂止王公百官咸退右臨軒遣使是日内鑾儀衛陳儀駕鹵簿於皇后宫階下及宫門外内監設丹陛樂於宫門内設節案一於宫内正中南為香案均南向設冊寳案於東西各一東西向設皇后拜位於香案前北向女官四人立拜位左右東西面宣讀女官二人立東案之南西面宫殿監率内鑾儀校豫候於景運門冊使既受命出由協和門至景運門外西面立正使奉節授内監内監持節内鑾儀校接舁冊寳亭至皇后宫門外亭止内監奉冊寶詣皇后宫皇后具禮服出内宫丹陛樂作賛引女官二人引皇后迎於宫門内道右候過隨行入宫内監奉節陳於中案奉金冊冊文金寳寶文陳於東案退賛引女官引皇后就拜位北向立樂止賛跪皇后跪賛宣冊宣冊女官就案奉宣讀冊文西面立宣畢授侍右女官跪接賛受冊女官以冊奉皇后皇后受冊授侍左女官女官跪接奉以興陳於西案次宣寳受寶亦如之樂作皇后行六肅三跪三拜禮畢少退東向立樂止内監進至中案奉節出賛引女官引皇后送於宫門内道右候過還宫内監奉節至景運門授冊使正使持節副使從詣後左門復命册立禮成還節有司各退右受冊翼日皇帝率羣臣詣皇太后宫行禮乃御太和殿受賀如三大節之儀頒詔宣示天下皇后詣皇太后宫行禮詣皇帝前行禮貴妃妃嬪公主福晉命婦詣皇后宫行禮均如三大節儀右禮成朝賀冊封皇貴妃儀凡冊封皇貴妃命下禮部諏吉以聞乃徧布諸司供備先期工部製冊禮部製寳均以金送内閣鐫字行禮如儀右諏日具冊寳届期禮部奏請命正副使各一人正使以大學士尚書充副使以侍郎内閣學士充右命使先一日遣官各一人祗告太廟後殿奉先殿如常儀右祗告至日五鼓禮部鴻臚寺官設節案於太和殿正中設冊案於左寶案於右鑾儀衛官設采亭於内閣門外内閣禮部官奉節冊寶出陳於亭内鑾儀校舁行導以繖仗禮部官前引至太和殿階下亭止奉冊寳隨節以升設於殿内各案質明大學士一人朝服立節案之東正副使朝服立丹墀之東均西面欽天監官報吉時已屆正使由東階升副使從至丹陛左北面跪大學士詣案奉節由殿中門出授正使正使受節偕副使興所司舉冊寳案從降中階仍設亭内導引如初以次設皇貴妃宫右遣使發冊是日内鑾儀衛設皇貴妃儀仗於本宫門外内監設節案香案於宫内正中設冊寳案於東西正副使既受命由協和門至景運門外正使西面授節内監内監奉節舁冊寳亭至宫門奉冊寳隨節詣皇貴妃宫皇貴妃禮服出迎於宫門内道右立候過内監奉節冊寳陳於各案退引禮女官引皇貴妃就拜位北面跪女官宣讀冊文寳文皇貴妃恭受冊寳行六肅三跪三拜禮畢送節於宫門内道右均如皇后受冊之儀内監持節出景運門授正使正使持節副使從詣後左門復命冊封禮成還節有司各退右受冊翼日皇貴妃詣皇太后宫行六肅三跪三拜禮乃詣皇帝前行禮次詣皇后前行禮並如儀右禮成朝見冊封貴妃儀命下所司供備製冊寳均以金既諏吉奏請命使遣官祇告太廟後殿奉先殿至日遣使發冊並如冊封皇貴妃之儀是日内鑾儀衛設貴妃儀仗於本宫門外宣冊寳受冊寳及朝見儀與皇貴妃禮同冊封妃儀命下所司製冊印均以金奏請命使祗告太廟後殿奉先殿至日遣使發冊如冊封貴妃之儀是日内鑾儀衛設妃采仗於本宫門外宣冊印受冊印及朝見儀俱與貴妃同冊封嬪儀命下所司製冊以金奏請命使不遣官祇告至日發冊不設印案如冊妃儀是日内鑾儀衛設嬪采仗於本宫門外設冊受冊暨朝見儀均與妃同皇朝文獻通考卷一百三十三
