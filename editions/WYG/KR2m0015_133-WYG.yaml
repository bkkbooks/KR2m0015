body:
  text: 欽定四庫全書皇朝文獻通考卷一百三十三王禮考九冊立冊封附臣等謹按納后之禮著於春秋臨軒冊命載於後漢志東晉升平初講求納后禮儀始詳唐開元禮有納后及冊命皇后儀後世多采用之馬端臨以納后册后禮儀附見帝系考今據本朝㑹典通禮所述大婚冊立之儀載於王禮考而冊封妃嬪儀注以次附見焉崇徳元年四月冊立中宫嫡妃為皇后是日設黄幄於清寧宫前設黄案於幄内王公百官朝服序立崇政殿前太宗文皇帝御殿閲冊寳命正副使持節至清寧宫宣讀冊文行册立禮禮成正副使持節復命皇后率公主王妃命婦於太宗文皇帝殿前行六肅三跪三拜禮諸妃率公主王妃命婦詣中宫行六肅三跪三拜禮上御殿諸王大臣進滿洲䝉古漢字三種表文次第宣讀行慶賀禮賜王公百官宴順治八年八月戊午冊立科爾沁卓禮克圖親王吳克善女為皇后行大婚禮前期題定大婚納采用馬十匹玲瓏鞍十副甲胄十副緞百疋布二百疋金茶筒一銀盆一大徵用金二百兩銀萬兩金茶筒一金盆一銀桶一銀茶筒一銀盆一緞千疋布二千疋馬二十匹玲瓏鞍二十副䭾甲二十副常甲三十副賜后父母金百兩銀五千兩緞五百疋布千疋金茶筒一銀桶一銀盆一上等鍍金玲瓏鞍二副常等玲瓏鞍二副漆鞍二副馬六匹冬夏朝衣各一襲冬夏衣各一襲貂裘各一領上等玲瓏帶一刀一撒袋一副弓矢具甲胄一副大婚前一日遣官一人祭告天地太廟屆日質明設皇后儀仗於卓禮克圖親王邸設黄案一於院中一於東側以受冊寳盖置中黄案大駕鹵簿全設太和殿前設黄案一於殿中置冊寶綵亭二於太和門外階下内院禮部官俱朝服以次捧冊寳由中道入置殿中黄案上上朝服出御太和殿視冊寳畢内院官捧冊寳授冊封使臣使臣跪受自殿中由中道捧出禮部官前導至太和門外置冊寳於綵亭校尉舉綵亭冊亭在前寳亭在後由協和門出詣皇后邸是日先遣兩親王奏請皇太后至位育宫皇太后乗輦出宫設儀仗作樂至協和門儀仗停止皇太后輦由中道入上出宫步迎至太和門内皇太后由太和殿入宫冊封使臣既至皇后邸卓禮克圖親王等朝服出迎置冊寳綵亭於門外皇后同母妃及格格等朝服迎於院中序立内院禮部官捧冊寳由中道入置東側黄案上讀冊内院官於東側西向立讀冊寳文畢以冊寳授女官二女官跪受獻皇后皇后跪受授侍立女官跪受置中黄案上皇后興望闕行六肅三跪三叩禮畢皇后升輦女官捧冊寳蓋仍置綵亭内儀仗鼓樂前導至協和門儀仗停止二女官捧冊寳前行皇后輦由中道入至太和殿階下皇后降輦由中道入宫和碩親王以下有頂帶官員以上朝服集朝㑹所固倫公主和碩福晉以下一品命婦以上悉集宫内已刻禮部堂官奏請上御中和殿多羅郡王以上於太和殿階上立多羅貝勒階下立固山貝子以下有頂帶官員以上俱於太和殿丹陛内排立上率諸王入宫於皇太后前行三跪九叩禮畢上復御中和殿諸王出立殿外階上皇后率諸王妃朝見皇太后行六肅三跪三叩禮畢還宫諸王妃入侍皇太后上出御太和殿賜諸王及察哈爾額駙阿布鼐親王土謝圖親王卓禮克圖親王等並貝勒文武羣臣宴畢上回宫皇太后乗輦還宫上送至太和門内乃還次日御太和殿諸王貝勒文武羣臣上表行慶賀禮頒詔天下詔曰朕惟聖化始於二南作配協鳯鳴之盛天庥垂於萬世于歸廣麟趾之祥正位中宫勤宣風教朕纉承鴻緒祗荷丕基慎擇淑儀覃延後嗣邇者昭聖慈夀皇太后特簡内徳用式宫闈仰遵睿慈謹昭告天地太廟於順治八年八月十三日冊立科爾沁國卓禮克圖親王吳克善之女為皇后貞順永昭奉尊養之令典敬恭匪懈應天地之同功爰合德於隂陽期錫類於仁孝詔告天下咸使聞知十一年六月甲戌冊立科爾沁鎮國公綽爾濟女博爾濟錦氏為皇后行大婚禮前期諭禮部諏吉日擬定儀注及大婚之日御太和殿閲冊寳宣制命正副使持節詣皇后邸行冊立禮有司具儀駕鹵簿奉迎皇后升輦入宫大婚禮成次日上御太和殿文武羣臣上表行慶賀禮賜宴頒詔天下詔曰帝王應天顯命洪敷化理必肇自宫壼乃達家國以訖於萬方即躬備令德恒資内助弼成雍穆故慎簡厥始用介有終所以承宗廟敦孝養崇化源茂本支也朕祗纘鴻緒篤敬彛倫聖母昭聖慈夀恭簡皇太后深惟内治期遴懿淑以襄朕躬必得賢媛乃正中宫俾儀天下兹欽遵慈命䖍告天地宗廟於順治十一年六月十六日冊立科爾沁鎮國公綽爾濟之女博爾濟錦氏為皇后惟朕躬暨后克迪厥徳邦其永孚於休用紹徽我聖善邇睦宫庭乃錫祉於爾多方丕協熙治布告天下咸使聞知康熙四年九月辛夘聖祖仁皇帝大婚冊立内大臣噶布喇之女赫舎里氏為皇后前期一日行大徵禮屆日上御太和殿閲冊寳畢授冊封使臣捧冊寳至皇后第宣讀皇后謝恩行禮畢鑾儀衛陳儀仗車輅鼔樂前導皇后由大清中門行御道入中宫上具禮服詣太皇太后宫皇太后宫行禮還宫行合􅈟禮畢上陞太和殿賜皇后親屬及諸王百官筵宴皇后詣太皇太后宫筵宴諸王以下免行禮公主王妃以下免㑹宴次日皇后詣太皇太后皇太后宫行朝見禮癸巳御太和殿王以下文武各官上表朝賀頒詔天下詔曰帝王承天立極作民父母使四海同倫萬方向化匪獨外治蓋亦内徳茂焉故政教𢎞敷肇先宫壼所以共承宗廟助隆孝養綿本支睦九族甚鉅典也朕祇纉鴻基篤念倫紀兹者聖祖母昭聖慈夀恭簡安懿章慶敦惠太皇太后深惟婚禮為天秩之原王化之始遴選賢淑俾佐朕躬正位中宫以母儀天下欽遵慈命䖍告天地宗廟於康熙四年九月初八日冊立内大臣噶布喇之女赫舎里氏為皇后朕躬暨后允修厥徳夙夜敬勤期克紹於徽音庶俾薄海内外丕協倫常洽被仁恩聿臻上理布告天下咸使聞知十六年八月丙寅冊立妃鈕祜禄氏為皇后前期遣官祗告天地太廟後殿聖祖仁皇帝親詣奉先殿告祭屆日設節案於太和殿正中設册寶案於左右上御太和殿閲冊寶王公百官咸朝服按翼序立乃宣制命正副使持節行冊立禮正副使至景運門内監接奉節冊寶入宫皇后受冊寶行禮如儀行貴妃冊封嬪各禮内監出至景運門以節授正副使正副使還至後左門復命上率王公大臣詣太皇太后皇太后宫行禮次日皇后禮服詣太皇太后皇太后宫皇帝前行禮各如儀公主福晉命婦免隨行禮越三日上御太和殿王公百官上表行慶賀禮如儀免公主福晉命婦詣中宫行禮頒詔天下詔曰帝王仰膺天眷撫育羣生爰溯治理之隆莫不肇自宫闈達於海宇故必慎選賢媛用資内助承宗廟之重敦風化之原甚鉅典也朕祇纉丕基篤念倫紀兹者聖祖母昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣太皇太后深惟内治攸闗特遴淑徳作配朕躬正位中宫母儀天下欽遵慈命䖍告天地宗廟於康熙十六年八月二十二日冊立公遏必隆之女妃鈕祜禄氏為皇后惟朕躬暨后共勗敬勤克迪厥徳庶其上紹徽音敷宣盛化以貽子孫臣民億萬年無疆之祉布告天下咸使聞知二十八年七月癸卯冊立皇貴妃佟氏為皇后是日遣官告祭天地太廟行册立禮頒詔天下詔曰帝王受天明命撫御萬方莫不端本宫闈化行海宇矧承奉宗廟敦睦本支皆於内助是賴兹者聖母仁憲恪順誠惠純淑端禧皇太后以坤教不可乆虚壼政必資懿徳皇貴妃孝敬性成淑範素著鞠育衆子備極恩勤宜立為皇后正位中宫母儀天下欽遵慈命䖍告天地宗廟於康熙二十八年七月初九日冊立領侍衛内大臣舅舅佟國維之女皇貴妃佟氏為皇后尚其聿修令範益篤教勤仰嗣徽音永綿福祉肇化原於倫紀溥仁恵於寰區布告中外咸使聞知雍正元年十二月丁卯冊立嫡妃那拉氏為皇后前期遣官告祭天地太廟社稷至是日行冊立禮御太和殿宣制命正副使持節將事皇后受冊寶行禮俱如儀惟慶賀典禮得㫖俟三年後補行次日頒詔天下詔曰朕惟乾施坤成迺布和於四序日明月儷並臨照於萬方故王者建邦必正宫庭之位聖人作則先隆冊命之文所以理叙人倫輔修内治也朕丕纉鴻基欽承大業奉皇妣孝恭仁皇后諭㫖以嫡妃那拉氏誕秀髙門禀貞華胄淑恭中度懿範性成孝敬盡於晨昏承顔養志柔嘉著於宫壼恵下肅躬令徳克全徽章允稱宜册立為皇后洎慈闈失恃典禮乆稽而宗事聿嚴正名斯亟兹敬遵慈訓載考舊儀祗告天地太廟社稷於雍正元年十二月二十二日冊立那拉氏為皇后俾承光於軒耀式正號於長秋大禮既成湛施應溥於戲祉貽璇室宏昭式榖之原福備椒庭廣錫敷恩之典布告天下咸使聞知三年十月庚午御太和殿王以下文武大臣官員進表補行慶賀冊立皇后禮禮畢御乾清宫皇后率妃嬪行六肅三跪三叩禮次妃嬪率公主王妃命婦詣皇后宫行慶賀禮均如儀乾隆二年十二月丁亥冊立嫡妃富察氏為皇后先是雍正十三年十二月癸未諭禮部欽奉皇太后懿㫖倫常攸重肇始坤元風化由基恒資内輔禮昭王制聿隆褕翟之儀詩首闗雎爰啟肅雝之治典至鉅也皇帝嫡妃富察氏恭淑性成柔嘉素著宫庭視膳篤敬順以承歡壼掖傳徽昭勤儉而宣敬動符禮度化洽賢慈宜正位於中宫用光襄夫宸極應立為皇后以崇内治以裕嘉祥欽此朕祗遵慈命立嫡妃富察氏為皇后應行典禮爾部詳察具奏乾隆元年二月禮部擬定典禮具奏得㫖冊立皇后典禮著於二十七月後舉行及二年十二月始行冊立禮前期遣官告祭天地太廟社稷至是日御太和殿宣制遣使皇后受冊寶行禮均如儀次日上率王公大臣詣皇太后宫行慶賀禮畢御太和殿王公百官上表稱賀如儀皇后率貴妃妃嬪詣皇太后宫行慶賀禮畢内監請皇帝御内殿皇后率貴妃妃嬪行禮畢還宫貴妃率妃嬪及公主王妃命婦詣皇后宫行禮是日頒詔天下詔曰朕惟位明天地乾行與坤順同功治洽家邦壼政與朝章並肅詩紀睢麟之盛禮隆䄖翟之榮所以秩彛倫而承禋祀也燦乎鉅典炳有成規朕纉紹丕圖統綏羣服御極之初恭奉聖母崇慶皇太后懿㫖以嫡妃富察氏秀毓華門禮嫻内則柔慎秉扵粹性温恭著于令儀殫誠敬以事庭闈孝同孺慕抒恪勤而式禁掖徳懋純修和平敷芣苢之仁澣濯比葛覃之儉淑儀咸備景福維新允宜冊立為皇后時值永懐方切大禮有稽兹當即吉之辰用定中宫之位祗遵慈諭載考鴻章謹告天地宗廟社稷於乾隆二年十二月初四日冊立嫡妃富察氏為皇后俾得敬承璽紱並佑清寧璇宫之慶典斯彰寰宇之恩施宜沛於戲日明月儷祥徵泰祉之符巷舞衢歌喜協敉寧之瑞布告天下咸使聞知十五年八月壬申冊立攝六宫事皇貴妃那拉氏為皇后先是十三年七月癸未諭大學士等朕躬攬萬㡬勤勞宵旰宫闈内政全資孝賢皇后綜理皇后上侍慈母皇太后承歡朝夕純孝性成而治事精詳輕重得體自妃嬪以至宫人無不奉法感恩心悦誠服十餘年來朕之得以専心國事有餘暇以從容冊府者皇后之助也兹奉皇太后懿㫖皇后母儀天下猶天地之相成日月之繼照皇帝春秋鼎盛内治需人嫻貴妃那拉氏係皇考向日所賜側室妃人亦端莊惠下應效法聖祖成規即以嫻貴妃那拉氏繼體坤寧予心乃慰即皇帝心有不忍亦應於皇帝四十嵗大慶之先時已過二十七月之期矣舉行吉禮嘉兒嘉婦行禮慈寧始愜予懐也欽此朕以二十餘年伉儷之情恩深誼摯遽行冊立於心實所不忍即過二十七月於心猶以為速但思皇后大事上軫聖母懐思乆而彌篤嵗時令節以及定省温凊朕雖率諸妃嬪及諸孫問安左右而中宫虛位必有顧之而愴然者固宜亟承慈命以慰聖心且嬪嬙内侍掖庭之奉職待理者甚衆不可散而無統至王妃命婦等皆有應行典禮久曠不舉亦於禮制未協冊立既不忍舉行可姑從權制考之明太祖淑妃李氏寧妃郭氏相繼攝六宫事國朝順治十三年冊立皇貴妃皇曽祖世祖章皇帝陞殿命使翌日頒詔天下典至崇重今應倣效前規冊命嫻貴妃那拉氏為皇貴妃攝六宫事於以整肅坤儀上奉聖母襄助朕躬端模範而迓休祥順成内治有厚望焉至是年七月壬子奉諭㫖朕恭奉皇太后懿㫖皇貴妃攝六宫事那拉氏孝謹成性徳著椒塗乾隆十三年值孝賢皇后大事内治需賢即諭皇帝宜敬循祖制以嫻貴妃那拉氏繼體坤寧皇帝秉禮準情不忍遽行冊立粤從權制冊命嫻貴妃那拉氏為皇貴妃攝事六宫閲今二載嬪嬙效職壼政茂修兹逢皇帝四十大慶所當舉行冊立皇后典禮以愜予懐以符成命欽此朕惟宫庭為基化之原人倫攸始皇貴妃攝六宫事那拉氏自皇考時賜朕為側室妃二十餘年以來持躬淑慎禮教夙嫻暨乎綜理内政恩洽彤闈用克仰副皇太后端莊恵下之懿訓允足母儀天下既臻即吉之期宜正中宫之位敬遵慈命載考彛章冊命皇貴妃攝六宫事那拉氏為皇后於以承歡聖母佐孝養於萱闈協賛坤儀儲嘉祥於蘭掖所有應行典禮大學士㑹同禮部内務府詳議以聞尋大學士等擬定儀注具奏得㫖報可冊立之前一日遣官告祭天地太廟社稷至是日御殿遣使受冊寳暨慶賀行禮諸儀均與乾隆二年同大婚儀凡大婚之禮制下禮部偏布諸司供備諏納采大徴奉迎吉日以聞㑹工部製金冊金寳翰林院撰制冊文進呈欽定送内閣恭鐫如儀詳后儀册右諏日鐫冊寳納采之禮内務府官備文馬十鞍轡具甲胄十幣百布二百以竢將屆期禮部奏請命尚書一人充納采使内務府總管一人充副使屆日黎明禮部鴻臚寺官設節案一於太和殿内正中東西肆内閣官自閣奉節陳於案退内務府官以龍亭分載甲胄布帛陳于丹陛上左右陳文馬于丹陛下左右正副使入祗竢於丹墀東鴻臚寺序班二人立使者之右少後授節大學士一人立殿東檐下宣制鴻臚寺官一人立大學士之右少後均朝服西靣鳴賛二人朝服分立殿外東西柱前東西靣欽天監官報吉時屆鳴賛賛齊班序班引使者就丹墀東班拜位立北靣西上賛進少進賛跪叩興行三跪九叩禮興序班引使者升東階至丹陛北靣立鳴賛賛有制使者跪宣制官進至殿中門之左西靣宣制曰皇帝欽奉皇太后懿㫖納某女某氏為后命卿等持節以禮納采宣畢大學士進殿左門詣案奉節由中門闑左出至丹陛以授正使受節偕副使興前行䧏中階左内務府官率校尉舁禮物龍亭隨䧏衛士牽文馬從御㐲前導由太和中門出詣皇后邸第右傳制遣納采是日后父飭子弟潔掃邸第有司豫設案於㕔事正中南向左右案各一東西向使者持節至邸將及門下馬后父朝服出迎於大門外道左跪候過興使者入中門升中階登堂陳節中案偕副使退就案東西面立龍亭隨入至儀門外止内務府官奉甲胄布帛入登堂陳於左右各案衛士以馬入陳於庭左右訖后父升自西階詣中門外北靣跪使者少進西面傳制納采復位后父聽制行三跪九叩禮興受諸禮物使者詣案奉節出副使從后父跪送於大門外如初内務府官皆出使者乗馬復命還節有司右使者傳制納采納采禮成有司詣皇后邸設燕皇帝特命公主大臣命婦燕后母於内命内大臣侍衛八旗公侯以下滿漢二品以上官燕后父於外外燕朝服后父為賓席東上内燕常服后母為賓席西上序坐行酒三巡如常燕儀右納采筵宴次行大徴禮所司備黄金二百兩白金萬兩黄金茶器一白金茶器二盆二幣千文馬二十鞍轡具閑馬二十䭾甲二十備賜后父后母黄金百兩茶器一白金五千兩茶器一盆一帛五百布千馬六鞍轡具甲胄一弓一韔矢一服朝服各二襲衣各二稱皆冬一夏一貂裘各一帶一備賜后兄弟及從人服物有差屆日有司陳大徴禮物於丹陛上陳賜物於丹陛下禮部奏請命使傳制授節於太和殿儀如納采使者承制持節詣皇后邸執事官陳禮物於堂陳賜物於階上陳䭾馬於庭中使者傳制后父聴制行禮如納采之儀傳制訖后父降階率子弟詣庭東向節行三跪九叩禮畢豫往大門外祇竢后母率諸婦出詣庭西向節行六肅三跪三叩禮畢退使者持節出后父以下跪送使者復命還節退右大徴及大婚前一日遣官各一人祗告天地太廟奉先殿如常儀右祗告屆日行冊迎禮禮部奏請命大學士一人充册迎使尚書一人副之所司豫疏列内外執事官奏請命内大臣十人侍衛十人充扈從官命二品以上命婦四人充前導七人充後扈十人充恭侍其日内鑾儀衛設皇太后儀駕鹵簿樂懸於慈寧宫常次如儀禮部鴻臚寺官設節案冊寳案於太和殿内設龍亭於内閣門外鑾儀衛陳法駕鹵簿樂部和聲署陳樂懸各依常次如式又陳中宫車輅於太和門階下陳儀駕鹵簿於午門外内務府官陳冠服於車輅之南黎明内閣禮部官自閣奉金冊金寳及宣讀冊文寳文分設龍亭内禮部侍郎奉節同詣太和殿恭陳各案王公文武百官記注糾儀執事各官朝服陪位冊迎使序立於丹墀東扈從内大臣侍衛在其後授節大學士宣制鴻臚寺官舉冊寳案内閣禮部官序立於殿檐下均朝服欽天監官報吉時屆禮部尚書侍郎詣乾清門奏時遂前導駕皇帝禮服乘輿出宫前引後扈如常儀由隆宗門至永康左門降輿入立於慈寧門外東位西向内監轉奏皇太后陞慈寧宫寳座禮部尚書侍郎恭導皇帝就正中拜位北向行三跪九叩禮畢皇太后還宫皇帝自永康左門乘輿仍入隆宗門由保和殿北門出御太和殿午門鳴鐘鼓作樂鳴鞭序班引正副使就拜位行禮畢升東階