body:
  text: 田賦考九水利田乾隆二十四年濬山東曹單二縣江南豐沛二縣之順堤河山東巡撫阿爾泰言曹單二縣境内之順堤河上承直𨽻河南之水東注江南之豐沛二縣入㣲山湖收蓄濟運因年久未挑間段淤塞臣先經咨㑹江省督撫諸臣商辦務使江省與東省河身一律寛深庶直豫之水不致灌聚曹屬尋據兩江總督尹繼善言豐沛二縣順堤河東省上游現在興挑下游入湖之路自應一併挑濬深通不特濟運有資而順堤一帶田間坡水亦得藉以宣洩實與運道民田均有禆益俱從之開常熟昭文二縣白茒河徐六涇海口移建石閘挑濬入海淤河兩江總督尹繼善等言蘇州府常熟昭文二縣東北濱每向有海口二十餘處其最大者如白茒河徐六涇為太湖及境内諸水歸海尾閭乾隆十九年為防海潮築土塘一百十餘里止留小口數處可以通潮餘皆築壩堵塞數年間塘外通海之河淤成平陸内水漲發塘寛壩厚臨時難開以致太湖所洩東來之水壅積不行自常熟昭文及上游各縣田疇均受其患臣等相度形勢白茒河徐六涇二口亟宜開通而海潮亦須防䕶查上游舊有石閘二座自築土塘已成無用應移於開壩之處用板啟閉以資蓄洩其塘外淤河挑濬深通直達於海則尾閭通暢鮮有積水為患矣疏入得㫖允行又諭現在甘霖未沛京師各處河渠若加修濬深通水土之氣庶可條暢通達且無業貧黎畚鍤將事亦可得僱植以資口食所有䕶城河渠圓明園一帶應修河渠著鳩工開濬准修建浙江海塘柴石各工程浙江巡撫莊有恭言海寧仁和二縣石塘自康熙五十四年後陸續改建已無復可加之工惟老鹽倉一帶柴塘四千二百餘丈當年亦曾議建石工以活水浮沙難施樁石而止現在江溜海潮因中小亹之下口門沙漲連接水勢北趨其北大亹河莊山後已冲開港道大溜由中北二亹水半分流則老鹽倉迤西之華家衖翁家埠等處正在河莊峯之𦂳對北岸雖塘外老沙尚未坍動設遇江流迅發秋潮盛滿不能保無進臨塘脚之虞查柴塘停修已十餘年現多矬蟄柴底自必霉朽應於富陽建徳桐廬分水四縣採辦柴料俟秋汛過後審量河勢有無坍逼塘身應否拆修分别緩急辦理又海寧城外附塘土堰共長三千三百餘丈應於現存矬蟄舊土之上加高三尺以六尺為凖於舊堰底帮寛二尺以一丈四尺為凖再新舊石塘全賴層石坦水保䕶塘根今北趨方始而䕶河已日見坍卸應俟大汛過後相度情形如有逼溜頂冲處所查若未建坦水另行添建如舊有坦水或因年久樁朽石欹亦即勘實修補疏入部議令大汎經臨即查勘確實情形及時辦理得㫖依議即行令濬衛河泉源河東總河張師載等言衛河之水全賴泉源而山水性猛動挾泥沙退即淤墊應於春季水生時凡有泉眼壅塞河身淤墊及豐草盤結有礙泉流之處即飭地方官督率民夫上𦂳挑濬芟夷自可收濟運利民之實益從之二十五年諭據張師載高晉陳𢎞謀等前後摺奏俱稱五月中雨水較多各河水勢叠次加長旋即消退工程俱屬平穩此皆前年籌辦河工水利時經朕特派大臣㑹同各該督撫悉心相度不惜帑項疏濬得宜是以河道俱極深通雖水勢驟長而消退甚速可見事茍善籌效必旋至為其事而無其功者未之有也然此等工程創之於一旦甚難隳之於日久甚易此時盛漲後各河之淤墊必多若不隨時撈濬勢必漸成淺阻與其修挑於甚淤之後費大而人勞何如修挑於未淤之前事半而功倍著各該督撫一俟水退即行查察淤淺處所一律挑濬仍不時相機籌辦俾河道長得深通水勢永無泛溢用副朕又安生民至意准將南闗車邏等壩封土三尺尹繼善等言高寳興泰下河被水之由皆由南闗車邏等壩並無限制故洪湖水長不及歸江歸海先後各壩滚入下河其勢甚順乾隆十八年臣等曾經奏明將南闗車邏等壩封土三尺伏秋水漲次第開放二十二年又經改議不必封土任其過水意謂以漸而去下河可以容受但一遇水勢長發下河即易受淹臣等再四籌思欲使下河減災惟有節其來水請將南闗車邏等壩仍封土三尺俟水勢長至三尺以外方許啟壩如在三尺以内嚴謹防守不得擅啟俾湖河之水專注歸江則下河可獲豐收實於補偏救弊大有禆益從之開運河東堤金灣壩下引河改低董家溝等三壩禮部尚書嵇璜言運河東堤之金灣滚壩上承諸湖之水為歸江要道今口門寛四十丈而尾閭仍歸入六閘河内未能暢注應請於壩下開挑引河一道俾減下之水由董家溝直㨗注江則尾閭更為寛暢又查董家溝廖家溝石羊溝三壩壩面尚高應改低三尺以芒稻西閘為凖使就下之水益加暢利奉㫖交尹繼善等勘議尋據尹繼善等議應如所請并請於壩北展寛十丈以順其吸川建瓴之勢又西灣壩下引河應取直加挑鳯凰橋引河亦應挑濬寛濶董家溝廖家溝石羊溝三壩壩面並應展寛壩下引河酌量挑濬從之准改常熟昭文二縣海口石閘為壩江蘓巡撫陳𢎞謀言白茒河徐六涇為常熟昭文二縣洩水最大之海口向為土塘築斷乾隆二十四年臣㑹同督臣尹繼善奏請開通將附近舊閘二座移建塘口隨時啟閉奉㫖允行年來田禾均得有收已有成效因今年夏間潮大異常又值霪雨以致閘口沖激欹斜其建閘之處又係沙土即再增閘口亦難經久不如改閘口為滚壩將土塘缺口用石鑲砌壩底另鋪石盤其壩底高低以酌量内地需水之分為度不需啟閉内蓄外洩旱澇益覺有備從之二十六年准於易州原泉村開渠建壩以資灌溉直𨽻總督方觀承言易州城西原泉村向有泉一道由村南行入於沙灘即伏而不見從前曾在沙灘北築壩鑿渠引水東注中貫厰城以達於州環城為濠由西南放歸易水居民鑿子渠支分派引約可溉田二百餘頃迨後壩毁渠塞泉仍滲入沙灘應重建石壩一座隔截沙灘别開新渠一道長一百一十八丈導入舊渠由厰城以達城濠又木槽村及厰城西南乾河溝二道應各築小石壩攔截俾無旁洩如此則水到之處田疇蔬圃均資利澤而繞城深池亦符體制其各子渠聴民自行挑挖官為督率辦理疏入得㫖報可至二十八年渠成賜名安河濬常熟縣之福山塘河陳𢎞謀言常熟縣福山塘河潦則積水由此河歸海旱則引海水入河分資灌溉千萬頃農田水利所闗又為商賈入口之要道祗因海潮帯沙常有淤積應及時挑濬得㫖允行至三十一年十月巡撫明徳言福山塘河自開浚後農田大有禆益迄今五載海潮冲擊河身復淤宜乗時再行挑濬從之疏通良鄉縣水道方觀承言良鄉縣逼近西山西高東下每逢大雨山水漲發東注之水去路遏塞徃徃為患田廬阻隔行旅查縣之雅河廣陽牤牛琉璃等河本足以資宣洩因其間舊有溝渠淤塞不能轉輸應按其地勢隨宜疏引使之節節流通各有歸宿從之開泰州阜寧鹽城縣之各閘引河歸海河道總督高晉等言揚州府屬高寳興泰等下河地方積年被淹䝉恩准將南闗車邏等壩封土三尺又加挑金灣壩下引河分流歸江自此湖河之水不致漫過三壩而免西來水患惟是各州縣境内支河汊港及田間積水向來俱滙入串塲河北流二百餘里始行歸海道逺迂迴驟難消涸臣等相度形勢籌其去路請將泰州之丁溪小海二閘引河疏濬深通順勢再開一引河滙入王家港歸海又將阜寧鹽城二縣境内之上岡草堰陳家冲三閘各引河疏濬深通順勢亦開一引河滙入射陽湖歸海裁灣取直順勢安流則積水可以早消沮洳漸成沃壤矣從之二十七年諭朕稽典時巡念海塘為越中第一保障比嵗潮勢漸趨北大亹實闗海寧錢塘諸邑利害計於老鹽倉一帶柴塘改建石工即多費帑金為民間永永禦災捍患良所弗惜朕抵浙次日簡從臨勘則柴塘沙性澁汕一樁甫下始多扞格卒復動搖石工斷難措手所以為吾民善後者惟有力繕柴塘得補偏救弊之一䇿地方大吏其明體朕意悉心經理定嵗修以固塘根增坦水石簣以資擁䕶庶幾盡人事而荷神庥是朕所宵旰厪懐不能刻置者督撫等可將此㫖於工次勒石一通永誌遵守又諭尖山塔山之間舊有石壩朕今親臨閲視見其横截海中直逼大溜猶河工之挑水大壩實海塘扼要闗鍵波濤衝激保䕶匪易但就目下形勢而論或用竹簍加鑲或改用木櫃排砌宜隨時經理加意修防如將來沙漲漸逺即宜改築條石壩工俾屹然成砥柱之勢庶於北岸海塘永資保障該督撫等其善體朕意於可興工時一面奏聞一面動帑儹辦并勒石塔山以誌永久准修築直𨽻濵河堤堰挑濬停淤水道以工代賑方觀承言直屬上秋雨水過多河淀交漲各處濵河堤堰多被冲刷亟需加培完補而河渠水過渟淤亦應挑濬查文安大成等七州縣之千里長堤固安霸州等五州縣之牤牛河並霸州之中亭河六郎堤雄縣之清河高陽蠡縣之豬龍河河間府屬之羊河天津海河西沽盧北口等處叠道南運堤堰並青滄二減河呉橋東光等五州縣之宣惠河河間天津二府屬分疏􅄋水入子牙南運之各支流河冀州衡水等處之滹􅇭㑹流河望都新安等處長渠一切應濬應築各工均屬上年被水之地仰懇天恩准照興工代賑之例每土一方給米一升鹽菜錢八文俾貧民咸得赴工食力而各處水道河防並獲疏通鞏固實多禆益從之命大學士劉統勲等查勘湖河歸江應辦事宜劉統勲等議言臣等查勘湖河歸江之路自卲伯以下向設有灣頭閘等七處宣洩湖水由鹽河歸廖家溝石羊溝董家溝芒稻閘四河分流下注内如灣頭閘壁虎橋鳳凰橋河身寛展足資分洩惟金灣滚壩新挑引河尚覺未能暢遂又金灣六閘舊有鹽河由芒稻閘歸江該處六閘金門僅寛十丈八尺未免來源過窄又東灣滚壩先於乾隆二十二年落低三尺西灣滚壩未能並落臣等酌議將金灣壩新挑引河量為展寛以河底十丈為率下游地勢稍仰亦應一律挑濬深通使有建瓴之勢六閘鹽河向設南中北各二閘北閘二門為運鹽要津應仍留以利鹽運自中間迤南拆去二閘添建石壩三十丈其閘下土堤接築加長酌挑引渠以順水勢西灣滚壩照東灣一體落低三尺并於西灣河頭酌挑寛深以導引水勢則高寳諸河歸江之路益暢實於下河民田廬舍大有禆益疏入得㫖報可又諭江南瀕臨河湖沮洳之區南則高寳甘泉北則宿清海沐最稱窪下每遇伏秋大汛霖潦堪虞而下游蓄洩機宜惟洪澤一湖尤為槖籥闗鍵朕早作夜思為澤國民生求保障安全之計非親巡規畫難定折衷昨駐蹕蘇城先命大學士劉統勲協辦大學士兆惠㑹同督河臣將歸江歸海各路詳勘標誌朕回鑾取道按閲講求指示其在高寳一帶應宣導歸江者自邵伯以下如灣頭閘等處足資分洩惟金灣滚壩新挑引河未能暢達應再為展寛以河底十丈為率下游地勢稍仰並一律挑濬深通俾成建瓴之勢又東灣壩前已落低三尺西灣壩尚仍其舊諸臣議請一體落低三尺朕量該處洩水情形至為便㨗應將西灣壩再落低一尺共低四尺則平日已有尺水入江庶可預減暴漲之勢其河頭亦加挑寛深以資利導金灣六閘應折去中二閘添建石壩按築土堤並量挑引渠以備盛漲湖水自無閼壅之患然此節節措置特為三湖旁疏曲引起見耳若其溯原掣要為釜底抽薪之䇿則莫如廣疏清口乃為及今第一義現在測驗洪湖高堰五壩高於水面七尺及七尺五寸不等清口口門現寛二十丈當即以此酌定成算將來俟兩壩之水如再増長三尺清口不必議寛設至四尺即將清口拆寛一丈湖水以次遞長則清口以次遞寛總以上壩增一尺之水下口開十丈之門為凖過秋汛遂漸收至二十丈或十數丈則全湖勢暢以視求助於分支别派者其功奚啻倍蓰至駱馬湖水由永濟橋東注為六塘河源流既逺所受支河甚多河中淤埂阻滯溜勢一遇暴漲猝難容洩田廬易致漫淹應視兩岸中間窄狹者再加寛展切去河中淤埂俾游波寛緩不至出槽堤身殘薄者量為修補以資捍衛其六塘河尾閭横經鹽河由東岸武障等河下洩入海原設條石滚壩為過水之凖其旁並設草壩水小則蓄水運鹽水漲則拆壩消水商民彼此各爭其便當每年權其緩急利害立定限制以時啟閉地方大吏其善體朕意實力奉行所有一切各工該督撫河臣㑹同鹽政悉心確估核議以聞又諭直屬被水窪地此時已屆冬令非設法疏消涸出何以無悞春耕目下稍事因循一遇沍寒便已難施畚鍤於民生闗係甚重著方觀承趁此天氣融和悉心及早籌度於沮洳附近之土多方挑挖溝濠俾積水不致稍淤而赴工貧民兼可藉以餬口實為一舉兩得可即一面詳悉具奏一面乗時妥辦又諭直省督撫辦理溝渠蓄洩事宜山東道御史湯世昌言今嵗近京各處雨水過多低田淹損行路泥濘頗為農商之病惟於大道兩旁開渠深廣旱澇蓄洩該地農民照河工民堰民修之例富者計畝出夫貧者出力餬口因其地勢節節疏通則水有歸宿農商不至受病矣疏入工部議如所請奉諭㫖工部議覆御史湯世昌條奏廣開溝渠以資蓄洩一摺所辦尚未洞悉自古力役一項本為捍衛民生並非征求無藝第如摺内所稱富者計畝出夫貧者出力餬口微特小民久樂昇平不識公旬之令設使地方不肖吏胥因而從中高下其手苛派賄脱轉非因利利民之意自宜分晰籌畫如其地與民田民舍甚為切近而工程又屬細㣲民間願出力從事者聴其自行修築不必繩以官法外若其功非旦夕可既而民力更難以全任則仍當官為酌助口食之資庶民不艱而事易集是在封疆大吏飭屬善為之耳建復南昌縣富倉圩石閘江西巡撫湯聘言南昌縣屬之富倉圩地處極低該圩中間有民田萬一千餘畝四面受水舊有土堤石閘以資捍禦今年久頃圮宜於北堤小港以下琵琶洲以西建復石閘一座乗此農隙水涸之時趕𦂳興築其土堤小閘聴民自經理官為督率實於該處民田大有禆益從之濬烏程長興二縣境内漊港閩浙總督楊廷璋言湖郡之水由七十二漊洩入太湖出蘇州之寳帶橋歸呉淞口入海其漊𨽻烏程者三十六𨽻長興者三十四港内淤墊港口復為蘆葦壅塞以致秋雨過多山水驟發便至淹浸應開寛濬淤以分水勢而䕶民田俾水道暢流歸湖迅速自不至有淹浸之患從之二十八年准濬鳯河上游以工代賑方觀承言鳯河發源南苑出回城門閘子口經大興東安通州武清天津各地方入大清河其自武清之南宫村以下現在深通南宫村以上至閘子口一百二十餘里内間段淤淺兼有河身過窄之處雖泉河本水尚資容納而兩岸􅅹水淹浸田禾即不能資其宣導今逐段查勘應將淺處挑深窄處挑寛照現在工賑之例辦理從之又諭畿輔一帶去年秋霖過多窪下之區現在設法消疏以利東作因思海河為積水委輸之尾閭而地方官或拘於成例僅將五閘宣洩不肯推廣籌辦多開壩口以為釜底抽薪善䇿著協辦大學士兆惠馳驛前徃㑹同鹽政達色知府周元理悉心確勘情形有應行增開之口一面奏聞一面辦理務期去路疏暢水消之後補築口門即不無所費而利民實多不必稍為瞻徇也兆惠言津城宣洩大勢水在運河東南者以海河為尾閭今積水俱在東南必視海河長落為利導臣等查看情形於舊設五閘口測量海水高下大抵閘内之水高於海河五六七八寸不等其中大閘口白塘閘均無庸加開其餘賀家口何家圈灰堆等三舊閘應量為開寛以資輸㵼至五閘外地方官所開溝渠自雙港東南至鹽水沽五溝須大加開寛以便流駛又賀家口東之陳唐莊灰堆北岸之黄家莊並雙港西口及新莊等四處俱可添開溝道通計自大閘口至鹽水沽五十里新舊溝閘凡一十五處足資疏消約計四月初間全境積水可以消退其現添新溝至海河水長即須填塞舊存五閘夏月潮漲亦須堵閉疏入得㫖報可濬治蘇州松江太倉等屬水道江蘓巡撫莊有恭言太湖之水由三江歸海經流蘇松太所屬之呉江震澤十二州縣境内查呉江之十八港十七橋呉縣之貼魚口大缺口為湖水穿運入江要道不無淺阻又入呉淞之龎山湖等處向稱寛濶邇來民間圖利遍植茭菱圈築魚蕩亦多所侵佔劉河情形大非昔比舟楫來徃必艤舟待潮崑山外濠為婁江正道淺狹特甚蘇州之婁門外河為江源出運咽喉河面僅寛三四丈不等應自運河以西凡太湖出水之口就其有港可通有橋可洩之處為之清釐佔塞務使分流迅速其運河以東呉淞江自龎山湖以下婁江自婁門以下凡有淺狹阻滯處所疏濬寛深一切植蘆揷籪及冒佔水面之區儘數剷除嚴為之禁疏入得㫖報可准桃濬荆山橋舊河山東巡撫崔應階言東省濟寧魚臺二州縣屢遭湖水淹浸本年復被偏災臣於八月初旬查勘韓莊滚壩過水五尺至十二月過水尚四尺一寸必須湖水與壩脊相平窪地方可涸出今消落無期有妨耕種查南陽昭陽㣲山等湖水昔年原藉銅沛境内之茶城小梁山内化山三河㑹入荆山橋河内王母山倪家溝彭家河三處出水濟運自荆山橋淤墊以致湖水泛漲䝉恩發帑開東省之伊家河添建韓莊滚壩又將江南荆山橋河道疏濬深通衆水齊下濱湖窪地盡皆涸出是荆山橋尤為全湖尾閭扼要今查勘銅沛一帶如茶城小梁山内化山三處支河俱已淤淺下游荆山橋河道間段淤阻橋設一百五十九洞僅止數洞流通餘俱乾涸㣲湖之水去路甚㣲仰懇皇上天恩勅下江南督撫將茶城小梁山内化山三處支河一律挑濬使直達荆山橋其橋上下河道及出口入運處凡間段淤淺者普加疏濬使湖水得以暢流東省濱湖窪地固有禆益而江省銅沛二縣水淹地畝亦可涸出矣疏入諭崔應階奏請挑荆山橋舊河一摺所見甚是東省南陽昭陽㣲山等湖滙為巨浸每遇水漲之時窪地常遭淹浸濟寧魚臺二屬適當下游之衝田廬所闗綦重前曾特派欽差同地方大員辦理朕上次南巡復經親臨閱視面諭河督諸臣隨宜設法籌辦但橋畔河淤日增日積非大加興挑何以去沮洳而資利導著派協辦大學士兆惠於明嵗初春馳驛前徃㑹同尹繼善葉存仁崔應階相度㑹議熟籌妥辦至二十九年尹繼善等言臣等遵㫖挑濬茶城等三處支河處處深通宣洩甚暢㣲湖之水日漸消落茶城小梁山兩處河頭過水漸減經臣高晉督令將茶城河頭接挑一百三十丈小梁山河頭一百六十丈臣親行查勘湖水較前又落數寸應再接挑茶城河頭七十丈小梁山五十丈并將河形淺窄之處加展寛深其内化山河頭舊有引渠二百一十丈亦屬淺窄應一併展寛仍不時留心查看俟湖灘再有消涸即行續挑務期得尺進尺挑至湖深處為止俾湖水源源暢洩永資利賴從之二十九年諭高晉籌辦雲梯闗黄河下游一摺所見甚是已於摺内批諭雲梯闗一帶為黄河入海尾閭原不必設立堤岸與水爭地而無識者好徇浮言或以上流清口洩水分數較多遇海潮盛時或不免意存顧慮因有子堰堤防之議殊不知清口暢洩其收利在下河州縣者不可數計至雲梯闗附近不過阜寧安東二邑所轄地面即令一時偶值盛漲所侵溢者不敵百分一二高晉既知下游之制防一切毋庸置議益可信清口之展放無難永逺力持於水利民生實為交有禆益先是髙晉言雲梯闗下游北岸之五套南岸之陳家浦近日溜勢趨逼漸次兠灣向裏舊有土堤卑矮單薄據山海二㕔請估帮高厚添接魚鱗越堤臣親赴察勘雲梯闗以外俱係蘆葦蕩地離海甚近是以舊制本無堤岸因一望平灘水勢易於散浸曾設卑矮土堤約欄水勢與闗内堤工形勢逈别自不應與水爭地臣等詳加相度與其築堤束水致生新工不如讓地與水以順其性將來伏秋汛内酌量情形預於舊堤上另作斜長子堰一道俾漫灘之水攔入正河而清口東西壩每年大加拆展湖水滙黄歸海尾閭寛濶於就下之勢益資暢達矣疏入遂有是諭修築無為州圩田堤壩安徽巡撫託庸言安省沿江各屬圩田全賴堤壩捍衛本年夏間江潮盛漲漫缺甚多小民俱各自行修築惟無為一州地處極低被水獨重臣委員分勘大小缺口二百餘處州境内外堤壩二百餘里經江潮汕刷處處卑薄應及時修築完整以資捍禦從之三十年諭海寧石塘工程民生攸繫深厪朕懐連年潮汛安瀾各工俱屬穩固兹入疆伊始即日就近親臨相度先行閲視遶城石塘五百三十餘丈實為全城保障而塘下坦水尤所以捍衛石塘但向來止建兩層今潮勢似覺頂衝外沙漸有汕刷二層之外應須預籌保䕶該撫等上年所奏如建三層坦水六十餘丈亦就尤險要處而言於全城形勢尚未通盤籌畫若一律普築三層石坦則於䕶堤保塘尤資禆益著將應建之一百六十餘丈均即一例添建其二層舊坦内有樁殘石缺者亦著查明補换該督撫等其董率所屬悉心籌辦動帑興修務期工堅料足無濫無浮以收實濟副朕為民先事預籌之至意又諭前因㣲山湖蓄水過多瀕湖窪地每致淹浸經崔應階等奏請宣洩㣲湖以水誌一丈為度於韓莊添建新閘以殺其勢並挑荆山橋以暢其流朕今嵗南巡回鑾時舟行所經詢知窪地近多涸出農田耕作有資但湖水暢消亦恐艱於濟運今據楊錫紱奏稱湖内之水須存一丈二尺用至五月八閘底水尚可得四尺餘寸若止存一丈則五月間八閘底水止存二尺六七寸重運難行請交東省河撫二臣可否量改水誌或將湖口以下數十里河底一律挑濬五尺等語所奏於漕渠轉輸自有禆益但水誌改加二尺於低窪地畝有無妨礙及挑深河底是否可行著崔應階會同李宏詳悉確勘具奏期於漕運民田均得利賴崔應階等議濟寧魚臺濱湖地勢高於滚壩無幾如水消至一丈方能耕種若將滚壩加高二尺不免淹浸臣等議將滚壩内磯心每孔安砌石槽設立板片如水小之年加板欄束多收一尺設水勢日增即將板片起除及時暢洩至八閘河底多係沙礓難於開鑿惟應將新經淤墊沙泥儘力估挑務至舊時河底而止如此則小水之年滚壩之上既經加水一尺河底又復挑深於漕臣增水二尺之數儘可相符而濟寧魚臺民地亦不致有淹浸之患矣疏入得㫖報可開挑武進丹陽二縣之孟瀆等河尹繼善言常州府屬之孟瀆徳勝兩河南通運道北達大江闗係數邑水利民田萬頃咸資灌溉縁積年吐納江潮流沙停積河身淤墊孟瀆河計長一萬五百餘丈徳勝河六千六百餘丈亟須築壩大加挑濬鎮江府丹陽縣之九曲河亦係通潮濟運灌溉田疇年久淤塞計長九千五百餘丈亦應行挑濬從之三十一年諭京畿内外河道溝渠前經動帑興工濬治今雖閲有年所物料或漸朽敝亦究因估辦之初未能核實所致是以每嵗仍事補苴難以經久完善今據該管大臣等議覆御史戈濤請修街道溝渠條奏估需銀十七萬餘兩此項程工闗係𦂳要原不惜多發帑金以為永逺利民之舉然非悉心籌辦實用實銷於事終無所補現今估計大修非從前隨時修治者可比惟在董辦大臣稽覈精詳毋致工程稍有偷漏庶從此經途平坦溝道宣通足垂悠久又諭阿思哈奏嵩縣知縣康基淵開渠溉田著有成效批司記功以示奬勵一摺州縣為親民之吏於地方農田水利果能實心經理禆益民生實為吏治首務今該縣康基淵挑濬伊河兩旁古渠並山澗諸流可資引導者一律疏治深通溉田六萬二千餘頃洵屬崇尚實政留心民事之員僅予記功不足以示鼓勵著交部議敘但有司承辦此事務期誠心為民方足表循績而膺録敘若因有此㫖妄生冀倖遂爾粉飾沽名虛文塞責其或辦理不善紛擾更張則是名為興利而轉以滋累又不可不防其流弊惟在各督撫覈實體察以為課最耳著將此通諭知之三十二年諭朕此次巡幸天津閲視淀河隄牐按圖披覽内有千里長堤之三灘里起至格淀隄莊兒頭止並無隄岸東西約長十餘里每當雨水過多之年村民一二千户地畝千餘頃常被水患村民未免向隅著交與方觀承再行詳悉相度接築長隄即核實估計妥議具奏又諭朕此次巡行河淀閲視隄防今由運河回鑾經筐兒港查看減河形勢見壩身出水處高於河底七尺則遇汛漲時所減之水下注過猛易致跌落成坑排樁不無撼動自應於石工之外接築灰工十五丈使坦坡漸平以導其勢至王家務捷地興濟三處減河皆所以宣洩盛漲保衛堤工則由一路入海不使三岔河之水滙積尤為畿南水利攸闗亦宜一律疏濬留淤期於深通易達再子牙河故道自谷家莊以下至呉家溝一帶河身窄狹並應普例展寛用消􅄋水以衛民田所有各處工程著該督方觀承按工核實估計奏聞動帑興修務使疏洩得宜俾河務民生永資利賴副朕省方籌咨至意三十四年諭前經軍機大臣會同工部議覆范宜賓奏挑挖運河一摺以河工形勢不便懸擬請㫖特派大臣於霜降水涸後會同辦理今據呉嗣爵奏到現在回空糧艘全出東境必須早為勘定庶可不悞挑工等語著派大學士劉統勲侍郎徳成馳驛前徃會同呉嗣爵富明安詳加履勘悉心籌畫據實核議奏聞妥協辦理務期於河道運務俱有禆益三十五年諭據楊廷璋奏北運河張家王甫堤漫工甫經合龍因連日大雨河水盛漲以致復有漫溢汕刷等語近日直𨽻地方雨水過稠熱河古北口等處俱有被山水冲刷民居鋪面之事今北運漫口復有汕刷之處所有過水地方田廬間有損傷自應照例查辦至大城文安一帶本屬窪下之區旁近地畝恐不無被淹之處朕心深為軫念著傳諭楊廷璋即速遴委大員悉心體勘如有被災户民即行妥協撫綏其涸出之地可以補種蕎麥者亦應酌借資本諭令及時趕種又命徳成徃永定河堵築漫口工程三十六年諭據高晉等奏七月初間汛勢更甚工程在在危險隨開放王營減壩以洩黄漲而上游之桃源宿遷邳睢豐碭各隄浸水滲水之處均無虞淹及民田廬舍等語今年黄河秋汛復盛正切厪念高晉李宏能督率員弁相機籌度搶䕶得宜現已漲消工固深為嘉慰是年堵築桃源􅈦屬陳家道口工竣三十七年諭上年因永定河北運河等處遇夏秋雨水過多每不免於漫溢宜急籌修治宣洩之方現在春河冰泮正屆開工之期自應及時經理興作但此兩河應辦工段極為繁重所派承辦之員甚多動用錢糧亦大著尚書裘曰修前徃協同周元理董率各員悉心佽􅂇務使大工迅速告成永資恬鞏又修汶上嘉祥濟寧魚臺等州縣湖堤民埝兼疏通水道諭裘曰修奏驗收永定河工程一摺併陳近水居民與水爭地之弊淀泊利在寛深其旁間有淤地不過水小時偶然涸出水至仍當讓之於水方足以暢蕩漾而資瀦畜非若江海沙洲東坍西漲聴民循例報墾者可比乃瀕水愚民惟貪淤地之肥潤佔墾效尤不知所佔之地日益增則蓄水之區日益減每遇潦漲水無所容甚至漫溢為患在閭閻獲利有限而於河務闗係非輕其利害大小較然可見著通諭各督撫凡有此等瀕水地面除已墾者姑免追禁外嗣後務須明切曉諭毋許復行佔耕違者治罪周元理奏永定北運二河并淀河之千里長堤及天津之格淀隄等處修築工竣三十八年諭今日閱視淀河内鷹嘴壩及鹿疃兩處應添引河工程其鹿疃引河據周元理擬挑九百丈即如所擬行至鷹嘴壩曲處該督擬開挑引河一百二十七丈仍恐射堤灣處不能引流歸漕著向西北展長百十丈則大堤不致受頂衝以資保障河防原以衛民惟期盡善即為費較多亦所不靳著周元理即照指示機宜動帑妥協辦理仍飭大員董率稽查務令工歸實濟民資利賴張家口上堡圈城修築東北兩面石壩被水沖圮之處計一百六十餘丈於外添築䕶壩石坦坡四百十二丈二尺三十九年諭江南黄河老壩口堤工漫溢現在高晉等集料剋期堵築併有㫖令何煟於查勘潘家屯引黄入湖事畢順赴老壩口協同堵築以期迅速集事但此次漫缺堤工淹及板插淮安一帶水勢較大運道民生甚有闗係大學士舒赫徳河工向為諳悉著即前徃會同高晉等妥籌速辦以副朕懐呉嗣爵薩載等奏外河􅆹屬老壩口漫溢堤工晝夜儹趕鑲柴壓土立見斷流黄河大溜全由故道歸海四十一年工部議巡漕御史索興阿奏通惠河各牐修理工程坐糧􅈦不能親身辦理又無屬員可委請改歸通永道管理如議行四十二年諭朕從前屢次南巡閲視清黄交滙處悉其倒漾之患因思若能引向陶莊以北而流則清口通暢庶免黄流倒灌因未躬臨陶莊一帶閲視是以踟蹰昨嵗薩載赴山東行在召見時諭令赴黄河海口上下察看伊即奏請若於陶莊開穵引河一道使黄水繞北下注清水益得暢行與朕意相合伊果能遵照指示剔挑完竣可免黄河倒灌之虞並收清水刷沙之益即就近險工亦俱化為平穩實為全河一大關鍵四十三年工部議浙江仁和海寧等處修築柴塘及竹簍魚鱗石塘坦水各工准動帑修理諭高晉奏查時和驛漫口下注之水歴陳留杞縣睢州柘城境内之黄河康家河南沙河老黄河均歸賈魯新河下達江南亳州之渦河儀封漫口下注之水一由考城之盤馬寺溝入北沙河至商邱縣之鄧濱口由歸徳府之陳兩沙河滙入渦河一由寧陵縣之馬三河亦會歸徳之陳兩沙河入渦河是豫省漫水均以亳州之渦河為總滙如有停淤歸於嵗修水利案内一律疏濬等語所籌未為要善其疏濬工程斷不宜照常籌辦復滋派累著高晉於祥符儀封合龍事竣會同鄭大進閔鶚元沿途親行確勘將應挑之河核實估計具摺奏聞候朕發帑興工四十五年湖北巡撫鄭大進奏鍾祥潛江各堤潰口攸闗億萬田廬亟宜興築以資保衛鍾祥縣自永興觀至保堤觀挽築月堤九百九十七丈又毁家灣潰口淤沙盈積難於沙面築堤應挽築月堤二百五十三丈潛江縣之長一垸地形窪下應自地勢較高之董家至鎮龍山挽築月堤一千八十六丈四尺零則襄水不致衝突矣從之大學士公阿桂等會奏雲梯闗外馬港河修復牐壩疏入奉諭㫖所奏修復馬港河西堤殘缺之處及接築無堤處所聯至北潮河西岸民堰以禦倒漾自應如此辦理其二套以下由北潮河入海之處既係路捷勢順設遇漫溢正可分洩盛漲俾尾閭益得暢達轉可不必添建牐壩雲梯闗以外原不必與水爭地今二套以下既為分洩盛漲之區則馬港河堤東灘地即不能保無漫溢其應徴減則地畝錢糧著交薩載等查明奏請加恩豁免又諭海寧州石塘工程所以保衛沿海城郭田廬民生攸繫從前四次親臨指受機宜築塘保䕶連年潮汛安瀾各工俱為穩固今朕閲視石塘惟繞海寧城之魚鱗石塘内有工二十餘丈外係條石作牆内填塊石歴年久逺為潮汐衝刷底樁霉朽兼有裂縫蹲矬之處又城東八里文將字號至陳文港宻字號止有石塘工七段約共長一百五六十丈地當險要塘身單薄亦㣲有裂縫不可不預為籌辦著將兩處塘工均改建魚鱗石塘并添建坦水以垂永久又石塘迤上前經築有柴塘四千二百餘丈究不如石塘之鞏固雖老鹽倉有不可下樁之處未必四千餘丈皆然朕於民瘼所繫從不惜帑省工俾資保䕶著該督撫將可以改建石塘之處逐段勘估奏聞辦理俾濱海羣黎永享安恬之福以副朕先事預籌至意又諭朕巡幸浙江由海寧閲視塘工至杭州老鹽倉一帯有柴塘四千二百餘丈雖因其處不可下樁為石塘然柴塘究不如石塘之堅固業經降㫖將可以建築石塘之處一律改建石塘以資永乆保障兹忽憶及該地方官及沿塘諸民見該處欲建石塘或視柴塘為可廢之工不但不加防䕶甚或任聴居民拆毁竊用致有損壊石塘未蕆工之前於該處城郭田廬甚有闗係且改建石塘原為保衛地方之計若留此柴塘以為重闗保障俾石塘愈資鞏固豈不更為有益著該督撫即嚴飭地方文武官將現有柴塘仍照前加意保固勿任居民拆損竊用增築徐州城外石工徐州居江南黄河上游北岸居民稠宻南岸𦂳靠府城黄河至此一束河面寛八十餘丈大汛時甚闗𦂳要城外舊有石工七段惟韓家山尚有空檔四百五十丈至是一律接築石工自韓家山至奎山全資衛䕶河臣陳輝祖言徐屬豐碭銅沛邳睢等􅈦漫堤平堰之處現在保䕶平穩汎期已過乗此擇要加培高厚方資抵禦從之四十六年大學士公阿桂會同陳輝祖等奏仁和縣西塘海寧城東石塘七段遵㫖一律改建魚鱗石塘直𨽻總督袁守侗奏文安大城霸州天津靜海安州新安雄縣武清等九州縣境内堤埝各工冲塌過甚需工較多之處照工賑例修築下部議行展挑沈家窰河工時清河舊縣之玉皇閣埽土迤上河勢向走北岸冬間溜向南趨露有窰基數座土人咸稱為沈家窰土性堅實就勢再為展寛與陶莊新河頭形勢更為直捷從薩載等請也阿桂薩載等會議桃源􅈦屬臨河集之九里岡砂礓堅實中間横亘千餘丈未免梗阻全河惟於北崖坐灣處自李家莊起至臨河集北首挑引河一道計長一千一百四十丈自可冲刷寛深疏入奉諭宜速為之補修臨湖風損石工時揚河揚糧高堰山旴四􅈦臨湖石工屢被風暴撞塌至是補修完竣諭前以浙省老鹽倉一𢃄塘工是否可以及時接辦降㫖詢問阿桂兹據覆奏此段工程可以接續辦理浙省辦理石塘二千二百餘丈計明嵗冬間始可蕆工其老鹽倉一帯塘工若一律築砌自應俟現辦工程完竣後再行次第籌辦四十七年諭陳輝祖奏海塘頭圍開濬引河江潮暢順一摺所辦甚合機宜可嘉之至海塘南岸淤沙綿亘從前歴辦引河迄無成效陳輝祖能督率司道等悉心講論辦理此段工程於南坍北漲之機切中窽要將來魚鱗石工告竣可以永期鞏固此事陳輝祖所見既確不待奏聞即督同屬員實力妥辦又諭據阿桂等覆奏豫省漫工另籌築堤改渠並嵇璜所奏秋間施工一摺内稱青龍岡漫口屢經變動形勢敗壊已極是以遵㫖於迤南一帯另籌去路自應及時辦理若於白露後開工恐水落歸槽不能掣溜且既有決口漫水下注即遇伏秋盛漲不能復有移改等語河工闗係民生最為重大今據阿桂等奏於五六七三月内興工即遇雨水躭延亦可先得雨月工程並請現在應用民夫踴躍即東省災氓亦聞風雲集並可以工代賑各等語所籌皆是均應如所議辦理又諭前據胡季堂奏黄水灘出地畝甚多居民村落並皆耕種麥苗一遇水發勢必築圍打壩填塞自多且河身多一村莊即水勢少一分容納請勅下河南山東江南各督撫確查令其遷居隄外等語河灘地畝居民開墾日久必至填塞河身於河道甚有闗係且居民廬舍佔據灘地猝遇水漲之時於民居亦多未便因特降諭㫖令薩載等確加履勘其隄外地居高阜者仍聴照常居住耕種若佔居堤内於水道有礙即行明切曉諭俾陸續遷徙並令該督撫等妥為經理毋致貧民失業因思灘地居民墾地結廬已非一日若其目前無事安居已久不免安土重遷且河堤以外均屬民田亦無隙地可以遷徙所有舊居隄内灘地無礙河身者仍加恩准其各守舊業以副朕廑念窮黎之至意此後毋許再行住居佔種又諭前據薩載奏開放顧家莊引渠分洩運中河水暢達入黄情形一摺朕以該處引渠分洩上游漫口之水既能得力即使掣動全河由此歸入舊黄河直注入海似亦無不可因降㫖詢問該處情形是否可以如此辦理此朕廑念河防設為或然之想今據薩載覆奏顧家莊所開引河分洩運中河之水入黄實為得力若一經掣動全河則顧家莊至楊家莊口門此七十里運道即不能通行舟楫必須經由黄河七十里始行入運等語此等情節薩載熟悉彼處情形據實入告所辦甚是自應照所議行四十八年諭此次曲家樓漫口為民生運道攸闗特命大學士公阿桂前徃經理籌辦幾閲兩載因諭阿桂等於迤南一帯另籌去路經阿桂等公同酌議於蘭陽十二堡至商邱七堡共一百七十餘里另築新堤疏挑引渠阿桂等原議本定霜降以前完工開放而堤渠並舉需用人夫較多該地方督撫等屢請鄰省助夫朕洞鑑情形以鄰省􅂇夫非便屢經降㫖訓諭并展限緩至春間挑汛開放引河俾豫省夫役可以從容挑築停止他省撥派之煩阿桂等遵照辦理如期開放大溜全掣壩工堵合穩固此皆仰邀天佑神􅂇幸得蕆工朕欣感之餘益深䖍敬工部議續辦西塘海寧州境内自場字號至因字號柴塘一千七百丈一律改建魚鱗石塘以垂永久飭該撫造冊送部先是大學士公阿桂等因場字號至名字號一千五百丈改築鱗塘而獨留立字號至因字號二百丈之柴工恐潮汐徃來衝決究不抵石塘之足資捍禦請一律改建石工從之四十九年諭浙江建築石塘所以保障民生闗係甚重前庚子南巡時朕親臨閲視指示機宜於老鹽倉舊有柴塘後一律添建石塘四千二百餘丈次第興修於上年七月間告竣今抵浙後親臨閲看所辦工程不惟不應邀敘並多未協之處石塘既建自應砌築坦水保䕶塘根乃後之督撫惟云柴塘必不可廢此受工員慫恿為日後嵗修冒銷地歩况朕添建石塘原留柴塘為重門保障並未令拆去柴塘前降諭㫖甚明也若如該督撫所言復加嵗修又安用費此數百萬帑金添築石塘為耶又石塘之前柴塘之後見有溝槽一道現有積水並無去路將來日積日甚石塘根脚勢必淹浸滲漏該督撫亦並未慮及又石塘上有堆積土牛甚屬無謂不過為適觀起見無當實際設果遇異漲又豈幾尺浮土所能抵禦耶所有塘上土牛即著填入積水溝槽之内仍將柴塘後之土順坡斜做祗需露出石塘三四層為度并於其上栽種柳樹俾根株蟠結塘工益資鞏固如此則石柴連為一勢即以柴塘為石塘之坦水至范公塘一𢃄亦必需一律接建石工方於省城足資永逺鞏䕶著自新築石塘工止處之現做柴塘及挑水段落起至硃筆圈記處止再接築至烏龍廟止一體添築石塘撥給部庫銀五百萬兩連從前發交各項帑銀交該督撫據實核算仍予限五年分段從東而西陸續修築以期海疆永慶安恬生民益資樂利又諭據薩載李奉翰奏江南河工預籌修防蓄洩機宜辦理工程三處已於圖内詳悉批示並面諭該督等遵辦矣天然牐下既舊有引河年久淤墊理應一律疏濬深通以備盛漲之年開放分洩自當首先辦理方為有備無患其所奏外河順黄壩堤工後深塘用土填平並於迤下估築新堤一道是應次第辦理以資保障江西巡撫伊星阿奏南昌新建鄱陽餘干建昌等六縣下游地接鄱湖又當章貢諸水之衝圩堤冲塌田禾被淹請借項修築下部議行五十年挑穵昆陽海口工程工部議准雲南巡撫劉秉恬奏滇池在雲南省城之南周圍三百餘里受昆明六河之水會為巨浸附近昆明呈貢晉寧昆陽四州縣環海田疇資以灌溉者不下數百萬頃所恃以宣洩者惟在昆陽州之海口大河為填池出水咽喉疏通則均受其利壅遏則即受其害應自龍王廟至石龍壩共長二千七百七十五丈應穵一二尺至四五尺不等以資宣洩從之河南巡撫畢沅奏查賈魯河即在古汴水發源滎陽縣之大周山會京孛等水經鄭州中牟祥符至朱仙鎮下達尉氏扶溝西華淮寧之周家口商水項城沈邱至安徽省潁州正陽闗入淮又賈魯河自中牟縣西十五里分支為惠濟河經祥符陳留杞縣睢州柘城淮寧鹿邑至安徽亳州會陽河入淮各計長四百餘里此河淤塞為開封等府屬商販民食攸闗今既久經淤淺自應及時開濬且於水旱年時兼可以資蓄洩從之皇朝文獻通考卷九
