body:
  text: 輿地考六河南省臣等謹按禹貢荆河為豫而爾雅職方並稱河南為豫州盖禹貢兼指南北界言之爾雅職方専指北界言之河南之名由來久矣今之河南半為古豫州地豫州南至荆山而今自南陽府外不及荆者二百餘里豫州北距河水而今自開封府外兼有河南地者數百里豫州東北以菏澤與兖分界而今自歸徳府外即為直𨽻山東境豫州東南以淮水與揚分界而今自陳州府外即為安徽境此則古今建置之異也夫兩戒山河迺天地自然之形勢而豫州實居天下之中古稱風雨所㑹隂陽所和者於是乎在自太皥神農建邦兹土其開闢獨先於他州逮乎商周作邑舊蹟相傳東漢以迄於宋金洛汴二州每遞為都㑹苐以四逹之區地形平坦加之大河入境盪决靡常三代而還屢經南徙地脈之遷移有非可執古形勢以論者我朝定都於燕處上㳺以制六合而以河雒為畿南之雄輔盖居高以馭規模宏逺矣河南明置河南等處承宣布政使司治開封府領開封歸徳彰徳衛輝懐慶河南南陽汝寜八府汝州一州又置河南都指揮使司領宣武等十二衛及頴上守禦千户所本朝因之設河南巡撫及布政使司按察使司皆駐開封順治五年定河南與直𨽻山東共一總督十六年裁三省總督十八年専設河南總督康熙四年仍設三省總督八年復裁雍正二年升開封府之陳許鄭禹四州及河南府之陜州汝寜府之光州並為直𨽻州五年改河南巡撫為河南總督六年並轄河南山東二省為河東總督十二年升陳州許州為府仍降鄭州禹州為屬州十三年裁河東總督仍設河南巡撫乾隆六年改許州府為直𨽻州凡領府九直𨽻州四各衛所俱以次裁併入州縣東西距一千二百二十里南北距一千二百九十里東至江蘇徐州府碭山縣界三百六十里西至陜西同州府潼闗㕔界八百六十里南至湖北黄州府黄安縣界八百五十里北至直𨽻廣平府成安縣界四百四十里東南至安徽頴州府阜陽縣界五百六十里西南至湖北襄陽府襄陽縣界八百二十里東北至山東曹州府曹縣界二百里西北至山西遼州界七百四十里在京師西南一千五百四十里開封府為省治東西距三百七十里南北距三百三十六里東至歸徳府睢州界一百四十里西至河南府鞏縣界二百三十里南至陳州府西華縣界二百三十六里北至衛輝府滑縣界一百里東南至陳州府太康縣界一百四十里西南至河南府登封縣界三百十五里東北至歸徳府考成縣界一百五十五里西北至懐慶府温縣界二百六十五里自府治至京師一千五百八十里明洪武初建為北京尋罷京仍為開封府改鈞州為禹州共領州四縣三十本朝初因之雍正二年升陳許鄭禹為直𨽻州以商水西華項城沈邱四縣屬陳州臨𨽻襄城郾城長葛四縣屬許州滎陽滎澤河隂汜水四縣屬鄭州密新鄭二縣屬禹州復以延津縣改屬衛輝府原武縣改屬懐慶府十二年以鄭州及滎陽等四縣還屬以太康扶搆二縣往屬陳州府乾隆六年又以禹州及密新鄭二縣還屬二十九年省河隂入滎澤縣四十八年以封邱縣改屬衛輝府以陽武縣改屬懐慶府凡領州二縣十五祥符縣附郭陳留縣在府東少南五十里把縣在府東一百里通許縣在府東南九十里尉氏縣在府西南九十里洧川縣在府西南一百五十里鄢陵縣在府南一百六十里中牟縣在府西七十里蘭陽縣在府東北九十里儀封縣在府東北一百二十里鄭州在府西少南一百四十里滎陽縣在府西二百十里榮澤縣在府西一百四十里雍正二年分屬鄭州十二年還屬開封府乾隆二十九年以河隂縣省入汜水縣在府西二百五十里雍正二年分屬鄭州十二年還屬開封府禹州在府西南二百九十里雍正二年升為直𨽻州十二年改屬許州乾隆六年還屬開封府密縣在府西二百八十里雍正二年分屬禹州十二年改屬許州乾隆六年還屬開封府新鄭縣在府西二百里雍正二年分屬禹州十二年改屬許州乾隆六年還屬開封府歸徳府在省治東二百八十里東西距四百七十里南北距三百二十里東至江蘇徐州府蕭縣界二百九十里西至開封府把縣界一百八十里南至陳州府淮寜縣界二百五十里北至山東曹州府曹縣界七十里東南至安徽鳯陽府宿州界二百二十五里西南至陳州府太康縣界一百三十里東北至山東兖州府單縣界一百十里西北至開封府儀封縣界一百七十里自府治至京師一千八百里明初降為歸徳州屬開封府嘉靖二十四年復升為府以睢州為屬州本朝因之乾隆四十八年以考成縣改屬衛輝府凡領州一縣七商邱縣附郭寜陵縣在府西六十里鹿邑縣在府南一百二十里夏邑縣在府東一百二十里永城縣在府東南一百八十里虞城縣在府東北七十里睢州在府西一百十里柘城縣在府西南九十里彰徳府在省治北三百六十里東西距三百二十里南北距二百里東至直𨽻大名府清豐縣界一百五十里西至山西潞安府壺闗縣界一百七十里南至衛輝府淇縣界一百三十里北至直𨽻廣平府磁州界七十里東南至衛輝府濬縣界六十五里西南至山西澤州府陵川縣界二百三十里東北至廣平府成安縣界九十里西北至山西遼州界四百四十里自府治至京師一千二百里明彰徳府領州一縣六本朝初因之雍正三年以直𨽻大名府之内黄縣來屬四年以磁州改屬直𨽻廣平府凡領縣七安陽縣附郭湯隂縣在府西南四十五里臨漳縣在府東北七十里林縣在府西南一百二十里武安縣在府西北一百六十里渉縣在府西北二百二十里内黄縣在府東一百十里初屬直𨽻大名府雍正三年改屬彰徳府衛輝府在省治西北一百六十里東西距三百九十里南北距一百七十八里東至直𨽻大名府東明縣界一百八十里西至山西澤州府