body:
  text: 欽定四庫全書皇朝文獻通考卷一百九十二兵考十四教閲臣等謹案馬端臨兵考於教閲中備載歴代帝王閲兵儀注豈不以訓練之法固宜倡之自上哉顧英武之辟史不數人餘則因襲故事徒存條教而己我朝列聖相承皆天授聖武健行不息方䇿所載自太宗文皇帝天聰年間即躬率大貝勒等演習行陣是為大閲之始列朝皆舉行之以為恒制皇上纘承前烈每年親巡塞外校獵行圍俾衆人處承平極盛而不至耽於晏安於訓武習勞之義意至深逺若夫南苑西厰於逺人欵塞之時屢行大閲之禮奏定儀注益加完備至於天弧親御神武當陽尤為史牒所罕見於鑠哉聲靈赫濯家法相傳以為億萬世丕丕基此固聖朝之實事實功非前代之靡文所可同日而道也由是内而京營教閲外而直省教閲其肄練以法其巡察以時訓諭頻申凡所以整飭戎行懲警怠玩者益復著明深切謹以次條載焉大閲天聰七年太宗文皇帝舉行大閲時滿洲行營兵未出八旗䕶軍舊漢人馬步軍滿洲步軍俱集分八旗䕶軍為左右翼舊漢人馬步軍為一營滿洲步軍為一營俱四靣環列前設紅衣礮三十位及各種大小礮隊伍既成乃上奏上擐甲乘馬率大貝勒代善及諸貝勒先周視衆軍畢陞御座諸貝勒率䕶軍如對敵狀䕶軍在前貝勒率親軍立於後呐喊三次傳令聞礮聲三即喊而進聞䝉古角聲即退於是衆軍皆依令而進依令而退次舊漢人馬步軍次滿洲步軍亦如對敵三喊而進攻礮軍礮軍亦聲礮對戰閲畢復諭八旗䕶軍統領等官曰凡臨陣對敵必各依隊伍並馳而前若有不依已之隊而退縮他人後棄己之隊而混逐他人隊及他人既進而却立觀望者或斬或籍没或鞭責或革職或罰贖量罪之輕重處之至整隊進攻稍有先後勿以我先爾後為言但以遇敵不退却能撃敗為主若争論先後是居心不良亂之道也如敵不戰而走則選精騎追之追時䕶軍統領勿往但引纛結隊躡後而進倘追兵誤入敵伏或衆方四散追逐遇敵兵旁出䕶軍統領即接戰崇徳八年大閲於瀋陽城北郊兵部貝勒岳託率滿洲八旗䝉古二旗舊漢軍一旗共十一旗行營兵俱集前列舊漢兵礮手次滿洲蒙古步兵次騎兵次守城各處應援兵次守城礮兵以序列綿亘二十里許上臨閲駐馬蒲河岡聲礮三衆軍呐喊如之步伐止齊軍威嚴肅上嘉奬之頒賞順治十六年世祖章皇帝諭大閲典禮三年一行永著為例連年尚未修舉著即傳諭八旗官兵整肅軍容候秋月朕親行閲視康熙十二年聖祖仁皇帝大閲於南苑八旗王以下四品武官以上及前鋒䕶軍俱擐甲於晾鷹臺兩旁按隊排列滿漢大學士尚書以下三品官以上及各衙門堂官翰林科道等官於臺上分兩翼立鳥鎗手在臺西排列上擐甲登晾鷹臺御黄幄命上三旗内大臣都統䕶軍統領前鋒統領各領隊自西行至東排列諸王貝勒等亦各領本旗官員䕶衛按隊行至東排列鳥槍齊發鳴號發喊自臺東結陣馳至西依兩翼排列閲畢上諭兵部尚書明珠曰今日陳列甚善可著為令又命樹侯臺下親發五矢皆中的又命内大臣舅舅佟國維内大臣阿宻達䕶軍統領桑遏新陞真定總兵張華善一等侍衛費耀色對秦吳丹䕶軍叅領法喇納等射上復騎射一發即中外藩王以下仰見上騎射超神軍容嚴整相視駭異上乃卸甲復登臺御黄幄命諸王貝勒貝子公内大臣侍衛内閣都察院諸臣及外藩王貝勒等俱於臺上分兩翼坐八旗都統副都統尚書侍郎及文武各官俱於臺下分兩翼坐賜宴十六年大閲於南苑命鑲黄旗正白旗内府佐領下官䕶軍驍騎擐甲列晾鷹臺東鳥槍兵亦以次列臺東北向上擐甲命内大臣侍衛大學士學士起居注諸臣俱擐甲先周視衆軍畢御晾鷹臺黄幄命内大臣侍衛及兩旗官兵俱乘騎列隊鳴號角前隊進次隊繼之殿復繼之東西往來數次呐喊馳驟槍礮齊發復歸隊閲畢命於臺下樹侯上率内大臣侍衛馬步射各四次命大學士學士起居注官及各官兵以次射畢上復登臺御黄幄命内大臣侍衛大學士學士起居注官以次列坐官兵俱於臺下分旗列坐賜宴十九年大閲於南苑命鑲黄旗正黄旗正白旗内府佐領下官兵擐甲序列晾鷹臺東鳥槍兵以次排列北向上擐甲御晾鷹臺黄幄命内大臣侍衛禁軍等按翼分列鳴號角列陣槍礮齊發十步一進十進而止閲畢上馬步射命内大臣侍衛各以次射畢列坐賜宴二十四年大閲於王家嶺麓先是諭兵部國家武備不可一日懈弛舊例每歳必操練將士習試火礮爾部即傳諭八旗都統等預為整備朕於十八日將親閲焉時喀爾喀土謝圖汗子多爾濟厄爾徳尼阿海台吉等以朝貢來京請於理藩院尚書阿喇尼轉奏云臣等聞皇上大閲逺方之人願一覩軍容上曰從來撫綏萬邦在徳教不在威武故兵者不得已而用之今四海昇平偃兵不用然訓練士卒簡閲軍器所以修武備也喀爾喀台吉既請觀可允其奏又有厄魯特固魯木錫台吉噶爾丹博碩克圖汗來使塔西蘭和卓等亦請觀上亦命隨往是日上自午門出宣武門八旗都統各率所部將士擐甲胄佩弓矢建旗纛自灣子里夾道分列至拱極城前鋒軍自蘆溝橋夾道分列至王家嶺麓其東則排槍其西則紅衣巨礮皆次第陳列上登王家嶺陞御座軍中吹螺角三發巨礮三既而排槍並發前後聲絡繹不絶者久之又命發巨礮於是八旗所列紅衣將軍及諸火器盡發凡二次巨礮所擊樹侯欄墻應聲而倒時阿海台吉及衆䝉古等驚懼失色有匍匐仆地者阿海台吉少息語阿喇尼曰我等初見士馬精壯兵甲堅利已知聖朝軍威無敵於天下今觀火器轟烈如此愈覺破膽矣上命阿喇尼𫝊諭曰朕惟以寛仁撫馭欲使薄海乂安家給人足近者悦逺者來此本懐也至兵為㐫器非可輕試苐念古來世際承平不忘武備閲兵乃本朝常制耳上御行宫召扈從諸王内大臣及阿海台吉等賜食旋復御黄幄設布侯校射上先射五發皆中次令諸王貝勒八旗善射者校射上還宫三十年奏定本年春季開操每佐領下前鋒各一名䕶軍各六名鳥槍䕶軍各一名驍騎各四名䕶軍驍騎各二名每旗礮十每礮兵十名火器營兵千五百名前隊前鋒四百名前鋒叅領六人侍衛四人每佐領下䕶軍各三名每旗䕶軍叅領三人每佐領下鳥槍䕶軍各一名每旗鳥槍䕶軍叅領二人每佐領下驍騎各二名每叅領下散秩官二人驍騎校二人漢軍每旗礮十每礮官一人兵十名鳥槍兵千五百名官校每旗各五人二隊每佐領下䕶軍二名每旗䕶軍叅領三人每佐領下驍騎一名漢軍驍騎二名每叅領下散秩官二人驍騎校二人協隊前鋒二百名前鋒叅領各二人侍衛三人每佐領下䕶軍一名每旗䕶軍叅領二人每佐領下驍騎一名每叅領下散秩官一人驍騎校一人䕶軍纛每旗三驍騎纛每叅領二都統前鋒統領䕶軍統領副都統㕘領等均令帶海螺既成列令鳥槍䕶軍火器營兵各放鳥槍一次再鳴螺進兵至所指處鳴螺收兵回兵時每翼䕶軍統領一人副都統一人每旗驍騎叅領一人每旗䕶軍五十名䕶軍叅領一人䕶軍校每叅領下二人驍騎四十名驍騎營每叅領下驍騎校一人領催二名令殿後回兵三十一年大閲於玉泉山八旗前鋒䕶軍驍騎及火器營兵擐甲胄分翼排列上由右翼至左翼先周視衆軍畢登玉泉山御黄幄乃吹角發礮三馬步軍鳥槍齊發以次退立命八旗鳥槍兵演連環旋轉二式各放槍一次翼日復閲於玊泉山三十四年大閲於南苑擇西紅門内曠地八旗官兵槍礮按旗排為三隊第一隊漢軍火器營鳥槍步軍居中礮位列左右滿洲火器營鳥槍列礮之兩旁第二隊前鋒兵居中八旗䕶軍列兩旁第三隊列八旗䕶軍兩翼則設應援兵上擐甲率皇子等均擐甲前張黄蓋内大臣侍衛大學士各部院大臣均扈從繼以豹尾班侍衛後建黄龍大纛二上三旗侍衛擐甲胄按次隨從先周視衆軍畢火器營立於馬軍前正中鳴角者三撃鼓步軍舁鹿角大礮衆兵齊進鳴金而止發鳥槍一次如是者九第十次火器營馬步軍槍礮連環齊發無間鳴金而止開鹿角為八門後二隊馬軍出既成列鳴角譟而進復鳴角收軍立於本陣結隊徐旋其殿軍立於後閲畢駕還行宫特降勅諭申明軍令宣示於大閲之地是日未閲前官兵均賜食既閲後賜酒雍正六年奏准大閲官兵數目及營伍器械嗣後遇大閲列陣首隊前漢軍火器營官兵排立每旗鹿角二十舁鹿角棉甲兵八十名鹿角兩旁引繩兵四名長槍二十連枷棍二十每旗神威將軍礮十礮手三十名御礮車驍騎百有十名鳥槍百䕶礮鳥槍驍騎百名叅領纛十執纛驍騎三十名小旗二十負小旗隨礮領催二十名紅旗二麾旗領催二名金五鼓一鳴金驍騎十名舁鼓棉甲兵四名撃鼓驍騎二名海螺五鳴螺驍騎五名每旗叅領二人散秩官十人驍騎校十人漢軍鳥槍營每旗設纛一執纛領催一名驍騎三名隨纛散秩官一人領催二名驍騎二十名叅領纛五執纛驍騎十有五名紅旗二麾旗領催二名鳥槍領催二十名鳥槍驍騎二百名小旗二十二鳥槍二百二十金五鼓一鳴金驍騎十名舁鼓棉甲兵四名撃鼓驍騎二名海螺十有三鳴螺驍騎十有三名每翼都統二人每旗副都統一人叅領二人散秩官五人給使官二人驍騎校七人以上八旗漢軍都統副都統十有二人將校三百十有二人礮手二百四十名隨礮領催驍騎二千二百三十二名鳥槍領催驍騎二千三百有四名舁鹿角舁鼓引繩棉甲兵七百三十六名共兵五千五百十有二名應用大纛八叅領纛一百二十紅旗三十二小旗三百三十六神威將軍礮八十鳥槍二千五百六十鼓十有六金八十鹿角一百六十海螺一百四十四連耞棍一百六十長槍一百六十八旗火器營總統五人每旗設纛二執纛䕶軍四名紅旗一麾旗䕶軍二名小旗十冇二負小旗鳥槍什長十有二名海螺十鳴螺䕶軍十名鳥槍䕶軍叅領二人䕶軍校十有四人鳥槍一百二十䕶軍一百二十名驍騎營每旗子母礮六每礮小旗一負小旗隨礮領催一名驍騎九名纛一執纛驍騎二名叅領一人散秩官五人驍騎校五人鳥槍驍騎營每旗設纛二執纛驍騎四名紅旗一麾旗驍騎二名小旗十有二負小旗領催十有二名海螺十鳴螺驍騎十名鳥槍叅領二人散秩官七人驍騎校十有四人鳥槍一百二十驍騎一百二十名以上八旗火器營總統五人將校四百人鳥槍䕶軍九百六十名鳥槍什長九十六名鳥槍驍騎九百六十名鳥槍領催九十六名礮領催驍騎四百八十名執旗鳴螺䕶軍領催驍騎二百七十二名共兵二千八百六十四名應用鳥槍一千九百二十海螺一百六十纛四十紅旗十有六小旗二百四十子母礮四十八首隊前鋒營每翼前鋒統領一人每旗前鋒叅領一人前鋒侍衛一人每佐領下前鋒一名於前鋒數内每旗撥前鋒校八人小旗八海螺四鳥槍人數按撥出前鋒之數每前鋒二名用鳥槍前鋒一名䕶軍營每翼䕶軍統領一人每旗䕶軍叅領五人每佐領下䕶軍二名每旗䕶軍統領纛一八旗海螺共五十四每䕶軍四用小旗一驍騎營每翼都統二人每旗副都統一人㕘領二人每叅領下散秩官二人驍騎校二人每佐領下領催驍騎二名每旗叅領纛七海螺七每驍騎四用小旗一以上首隊大臣共十有六人將校二百九十六人兵四千四百有十名兵額各按佐領分撥後仿此應用纛共六十四前鋒營小旗六十四海螺一百四十二此内撥出前鋒營統領一人前鋒叅領二人侍衛二人前鋒二百名䕶軍營䕶軍統領一人䕶軍叅領八人䕶軍四百名驍騎營副都統二人叅領八人散秩官十有六人驍騎校十有六人驍騎三百二十名再於火器營内撥出鳥