body:
  text: 樂考十樂器四奚琴律吕正義後編曰奚琴刳木為體二絃以木桿繫馬尾軋之長二尺八寸八分龍頭長五寸七分六釐濶一寸九分六釐厚三寸二分四釐柄長一尺一寸五分二釐上濶一寸零一釐下濶二寸八分八釐即槽之肩上厚一寸二分一釐下厚與上濶等槽長與柄長等徑濶四寸九分九釐端濶三寸八分四釐背厚二寸二分七釐槽面覆板長五寸一分二釐槽頭留圓柱施皮扣以結絃端龍頭下唇為山口後開槽以設絃軸槽長三寸零三釐濶三分六釐軸長四寸零四釐槽面覆板正中設柱以承絃計絃度長二尺零四分八釐為四倍蕤賓之度自山口至絃柱木桿長與槽柄共長等繫馬尾八十一莖通體用桐木柱軸用紫檀龍頭貼金槽柄裏背用硃紅油柄面五彩䕫龍槽面五彩雲龍為飾陳暘樂書奚琴乃奚部所好之樂其制兩絃間以竹片軋之元史胡琴制如火不思卷頸龍首二絃用弓捩之弓之絃以馬尾然則胡琴亦奚琴類也今名奚琴胡琴律吕正義後編曰胡琴似琵琶而下鋭龍首皮腹背有脊稜二絃以木桿繫馬尾軋之龍頭長四寸零四釐濶一寸六分一釐厚三寸二分四釐頸長一尺三寸六分五釐上濶八分一釐下濶二寸三分厚九分七釐腹長一尺二寸五分四釐濶七寸二分九釐脊厚三寸五分二釐邊厚五分三釐腹濶背厚處距腹末三寸八分九釐腹末安木如簮頭以扣絃龍口下際為山口後開槽以設絃軸槽長二寸零二釐濶三分軸長三寸八分四釐腹濶處設柱以承絃計絃度長二尺二寸三分為四倍姑洗仲吕相和之度自山口至絃柱木桿長二尺六寸一分九釐與頸腹共長等繫馬尾八十一莖通體金漆龍頭貼金為飾胡琴絃度較奚琴制㣲長又槽端彼方此尖槽面彼覆以木此冒以皮其用則同也番部胡琴律吕正義後編曰番部胡琴椰槽竹柄二絃以竹弓繫馬尾施絃間軋之槽徑三寸八分四釐厚二寸一分六釐柄通長二尺七寸八分四釐曲首長五寸五分六釐八毫柄端木本長二寸八分八釐穿直孔以施絃扣槽面正中設柱以承絃曲首下際安山口開孔通後槽以設絃軸槽長二寸零二釐濶得長十之一軸長三寸零三釐絃度長二尺零三分五釐二毫自山口至絃柱為應鍾五倍三分之度竹弓絃長八寸六分四釐馬尾八十一莖槽軸柄本用紫檀槽面桐木柱用竹柄首山口槽周用駝骨為飾番部胡琴絃度較奚琴制㣲短彼槽以木此以椰彼柄以木此以竹彼軋以木桿此以竹弓其用則同也提琴律吕正義後編曰提琴圓木為槽上冒以蟒皮而空其下竹柄貫槽中柄端刻木為龍首柄末出槽外覆之以木如簮頭形穿直孔以施絃扣柄上穿四直孔以設絃軸四絃共貫小環中束之於柄槽面正中設柱以承絃竹片為弓馬尾雙絃夾四絃間而軋之槽徑二寸三分長三寸二分四釐龍頭長與槽長等濶與槽徑等柄長二尺一寸一分七釐環距絃柱一尺一寸一分五釐為姑洗仲吕之共度第一軸距環四寸五分五釐第四軸距第一軸五寸三分九釐第四軸距柄端一寸二分三釐軸長四寸五分五釐竹弓絃長八寸六分四釐槽與龍首用花梨柄用斑竹軸用紫檀柄端軸頭用象牙為飾塞他爾律吕正義後編曰回樂塞他爾木槽通柄共長三尺四寸二分五釐有竒槽茄形面平下圓冒以革長八寸二分零八毫上濶九分二釐一毫八絲厚一寸一分三釐七毫有竒腹濶三寸三分三釐七毫有竒厚三寸一分五釐五毫有竒柄長二尺六寸零四釐九毫有竒面平背圓濶八分六釐四毫厚九分五釐有竒柄上漸濶至端濶一寸二分八釐兩側有八軸絲絃二大絃應合字小絃應上字雙鋼絃一單鋼絃六應絲絃以取聲上繫於軸下繫於槽末側面柄端向下設山口以起絃度距端三寸八分四釐槽面設柱以承絃山口距柱二尺八寸四分三釐一毫柄身施線篐二十三道似琵琶之品第一篐距柱二尺六寸八分有竒第二篐距柱二尺五寸三分四釐有竒第三篐距柱二尺四寸八分三釐有竒第四篐距柱二尺四寸一分五釐有竒第五篐距柱二尺二寸六分二釐有竒第六篐距柱二尺一寸九分四釐有竒第七篐距柱二尺零二分八釐有竒第八篐距柱一尺九寸六分三釐有竒第九篐距柱一尺九寸一分有竒第十篐距柱一尺六寸六分七釐有竒第十一篐距柱一尺六寸零九釐有竒第十二篐距柱一尺五寸零五釐有竒第十三篐距柱一尺四寸六分七釐有竒第十四篐距柱一尺三寸九分四釐有竒第十五篐距柱一尺二寸七分三釐有竒第十六篐距柱一尺二寸一分四釐有竒第十七篐距柱一尺一寸三分三釐有竒第十八篐距柱一尺零一分一釐有竒第十九篐距柱九寸六分第二十篐距柱八寸四分六釐有竒第二十一篐距柱七寸五分二釐有竒第二十二篐距柱七寸零三釐有竒第二十三篐距柱六寸四分一釐有竒以左手按絲絃之線篐以右手冒撥指彈之合字絃第一篐散聲得合字按第二篐得四字按第三篐得乙字按第四篐得上字按第五篐得尺字按第六篐得工字按第七篐得凢字按第八篐得六字按第九篐得五字按第十篐得乙字按第十一篐復得上字按第十二篐復得尺字第十三篐得工字第十四篐得凢字第十五篐得六字第十六篐得五字第十七篐得乙字第十八篐得上字第十九篐得尺字第二十篐得工字第二十一篐得凡字第二十二篐得六字第二十三篐得五字上字絃第一篐散聲得上字按第二篐得尺字以下逓髙一字應鋼絃以取聲喇巴卜律吕正義後編曰回樂喇巴卜木槽通柄絲絃五鋼絃二上端曲向後以施絃軸槽形似半瓶長四寸八分六釐髙二寸九分一釐六毫槽柄通長二尺零七分七釐六毫五絲瓶形以上柄濶一寸一分三釐七毫有竒髙一寸三分三釐有竒柄之上端濶七分零五毫有竒髙八分六釐四毫柄上曲長三寸三分二釐八毫曲柄之本濶一寸八分二釐有竒末濶七分五釐二毫有竒其厚與柄上端之濶等曲柄之上作山口曲柄之中挖空隙兩傍施五軸通五絲絃而繫於軸五絃之本繫於木槽下側面五絃通長一尺九寸二分九釐有竒又鋼絃二其本亦繫於槽下側面其末繫於直柄右側面之二軸一長一尺四寸九分有竒一長一尺四寸零八釐有竒一絃為合字二絃三絃皆為乙字四絃五絃皆為工字以手冒撥指彈之應鋼絃以取聲筝律吕正義後編曰筝似瑟而小十四絃長四尺七寸三分八釐五毫額廣七寸二分九釐尾廣六寸四分八釐前梁内際至額三寸六分四釐五毫後梁内際至尾七寸二分九釐前後梁之髙廣俱四分三釐七毫梁内絃長三尺六寸四分五釐為五倍黄鍾之度前額中髙三寸七分八釐九毫中厚二寸九分八釐八毫足髙八分零一毫邊髙二寸六分二釐四毫邊厚一寸八分二釐二毫後尾中髙三寸五分七釐二毫中厚二寸五分五釐一毫足髙一寸零二釐六毫邊髙二寸六分九釐七毫邊厚一寸六分七釐六毫前梁内際邉髙二寸八分四釐三毫後梁内際邊髙四寸五分一釐九毫邊厚俱一寸六分七釐六毫與尾邊同額邊雲牙長四寸三分七釐四毫尾邊雲牙長倍之首尾兩端雲牙與濶等底二孔前孔四瓣徑二寸九分一釐六毫後孔上圓下平長三寸六分四釐五毫徑二寸一分八釐七毫下濶與前孔徑等前孔上周距首牙内際五寸一分零三毫後孔下周距尾牙内際一寸四分五釐八毫十四絃絃五十四綸各隨宫調設柱和絃以諧律吕通體用桐木金漆四邊繪金䕫龍梁及尾邊用紫檀絃孔用象牙為飾唐書言筝十三絃或十二絃制不可考今筝十四絃則五聲二變為七倍之為十四也六絃筝律吕正義後編曰按陳暘樂書唐清樂筝十二絃天寳中史盛作六絃琵琶今䝉古筝與史盛六絃同而為清樂筝之半意亦唐制也餘與慶隆舞筝同軋筝律吕正義後編曰軋筝似筝而小十絃以木桿軋之通長二尺二寸二分四釐七毫五絲額廣四寸四分二釐二毫尾廣三寸四分五釐一毫前梁内際至額二寸零二釐二毫五絲後梁内際至尾四寸零四釐五毫前後梁之髙廣俱三分二釐三毫梁内絃長一尺六寸一分八釐為四倍無射之度前額中髙二寸六分九釐六毫中厚一寸九分九釐五毫足髙七分零一毫邊髙一寸八分八釐七毫邊厚一寸一分八釐六毫後尾中髙二寸五分八釐八毫中厚一寸五分六釐四毫足髙一寸零二釐四毫邊髙二寸零四釐八毫邊厚與足髙等前梁内際邊髙與尾邊髙等邊厚一寸二分四釐後梁内際邊髙二寸九分一釐二毫邊厚一寸一分三釐二毫額邊雲牙長二寸九分六釐六毫尾邊雲牙長五寸三分九釐三毫首尾兩端雲牙與濶等底前孔四瓣徑一寸八分八釐七毫後孔上圓下平長二寸四分二釐六毫上濶一寸一分八釐六毫下濶一寸七分二釐五毫前孔上周距首牙内際二寸五分八釐八毫後孔下邊距尾牙内際五分三釐九毫通體桐木金漆四邊繪金䕫龍梁及尾邊用紫檀絃孔用象牙為飾陳暘樂書曰唐有軋筝以竹撋其端而軋之因取名焉元史禮樂志􅌙如筝七絃有柱用竹軋之然則軋筝因唐制而􅌙亦軋筝之類也樂書不言絃數今十絃琵琶律吕正義後編曰琵琶曲首長頸廣腹圓背四絃自頸端至腹末長二尺四寸二分七釐二毫為四倍夾鍾之度頸端山口厚四分八釐五毫髙三分零三毫曲首方一寸零九釐二毫長三寸二分四釐匙頭長三寸六分四釐五毫濶一寸九分四釐四毫腹濶八寸零八釐邊厚四分八釐五毫背厚一寸二分一釐三毫頸濶為腹濶十之一鳯枕髙與背厚等長九分一釐濶七分二釐九毫覆手外邊濶三寸六分四釐五毫内邊濶二寸五分九釐二毫長一寸二分一釐三毫内邊距面髙二分零二毫絃長二尺一寸六分自山口至覆手内際為三倍商數亦為四倍徴數曲首中開槽以設絃軸槽濶三分二釐四毫軸長三寸八分八釐八毫四象十三品按分取聲第一象一尺九寸二分以距覆手内際為度為本絃寅分絃音度分以本絃全度順逆各推六音得十二分按相生之次用十二辰名為記除丑午𤣥三分變聲不用餘九分全分為子分第一分為寅分第二分為夘分第二象一尺八寸二分二釐五毫為本絃夘分第三象一尺七寸零六釐六毫為本絃辰分第四象一尺六寸二分為本絃已分第一品一尺四寸四分為本絃未分第二品一尺三寸六分六釐八毫為本絃申分第三品一尺二寸八分為本絃酉分第四品一尺二寸一分五釐為本絃戍分第五品為全絃之半第六品為第一象之半第七品為第二象之半第八品為第三象之半第九品為第四象之半第十品為第一品之半第十一品為第二品之半第十二品為第三品之半第十三品為第四品之半體用桐木覆手曲首匙頭用樟木象用黄楊品用竹山口絃軸并四象上下二叚皆用紫檀心内繫細鋼條為膽面本色餘金漆繪雜花覆手内邊及絃孔用魚牙為飾琵琶之制大小不等又四象十三品多以意為遷就彈者難之今以三分損益定其度則上中下三等皆可按度求聲語其絃分雖為四倍徴三倍商而考其聲音則十二律吕無不悉協也月琴律吕正義後編曰月琴八角木槽而微凹柄貫槽中四絃覆手曲首似琵琶槽面方七寸零五釐八毫厚一寸二分九釐六毫柄長一尺八寸二分上濶七分六釐八毫下濶九分一釐曲首長二寸六分九釐六毫濶與柄上濶等匙頭長三寸零三釐四毫下濶一寸二分一釐三毫上濶一寸六分一釐七毫軸長三寸六分四釐五毫絃長全分二尺三寸零四釐為四倍姑洗之度自覆手内際至山口十七品與二絃同通體用紫檀槽面桐木山口品用象牙軸頭絃孔鰍角為飾唐書元行冲傳有人破古塜得銅器似琵琶而圓人莫