body:
  text: 欽定四庫全書皇朝文獻通考卷六十九學校考七直省鄉黨之學一臣等謹按天下者黨庠術序之推也士習者民風之本也我朝文命覃敷崇尚儒術海内喁喁向風説禮樂而敦詩書士有言不𠂻於理而行不軌於正者則鄉里非之何者列聖之教澤有以深入乎人心而庠序之教化有以表率乎民俗也今國家徳政化成百有餘嵗矣土宇昄章日以増闢山陬海澨蠻土瘴鄉悉建之師儒而沐以禮義加之聖天子揆文奮武拓地二萬餘里逺極無雷日入之鄉未習聲名文物之化者皆舉踵逖聴各效其尊親之戴而食黮懷音豈非明倫修教之方即一道同風之具而為中外所㑹歸乎若夫敦實黜浮崇經勵學塞奔競而防啙窳士習悉化其偏陂而風教胥臻乎醇厚視學者固職有専屬而守土諸臣所為恪遵令典以振新乎士類維持乎治化者也至於别裁偽體示以清真屏斥支離頒之程式使操觚者陳言務去以宗法先民秉鐸者得所遵循以嚴其繩尺而且甄别教職提訓學臣以端其表率之原樹其衡量之準此文風所以丕變而蹈徳詠仁者無不和其聲以鳴國家之盛歟他如郡邑廩増之額生童入學之數考核課試之條因革損益隨時折中皆有以仰興賢育才嘉恵儒林之至意焉臣等謹連類附纂於篇順治元年定直省各學支給廩餼法在京者戸部支給在外者州縣官支給命賑助貧生褒卹順天府學死節之士時以兵火之後士有菜色特命給予錢粟故明流賊之亂臨難殞身者順天學不下百人更予褒卹以勵風化從順天督學御史曹溶請也以御極覃恩詔各省府州縣儒學食廩生員仍准廩給增附生員仍准在學肄業俱照例優免定旌表孝行節義之例是時奉恩詔所在孝子順孫義夫節婦有司諮訪確實申該巡按御史詳覈奏聞以憑建坊旌表嗣又敕部定議建立忠孝節義祠宇尋禮部議奏八旗直省凡有孝行節義之人例得請旌恭遇覃恩彰善大典即鄉曲貧民勿令湮沒又節婦年逾四十而身故者守節已厯十五載以上亦應予旌酌設祠宇入於祀典永為定例其設立祠宇應令順天奉天直隸各省府州縣衛每處各建二祠一為忠義孝弟之祠建於學宫之内祠門立石碑一道刋刻姓名於其上已故者設牌位於其中一為節孝婦女之祠另擇地營建祠門外建大坊一座亦標姓名於其上已故者亦為牌位八旗分左右翼擇地各建二祠毎年春秋二祭至於建坊銀兩應停給奉㫖孝行節義建立牌坊年乆毁壞遂至湮沒今欲設立祠宇特為昭垂久逺之意並非欲節省錢糧部議建立祠宇停給銀兩不合仍著給與餘依議定游學來京士子附順天府學例逺方士子游學京師者取保結准附順天府學一例考試又設廩十名照縣學例充貢至二年又定查明本身父母墳墓向係北方土著者即令入籍應試其實係逺方游學來者皆發回本籍應試二年平定陜西恩詔本省各學廩増附生仍舊肄業照例優免廪生内每學貢二名提學官於學田内動支錢糧賑給貧生頒恩詔河南河北江南等處各學恩貢一名正貢一名貧生照例賑給又頒部定生員品服式銀雀帽頂髙二寸帶用九品烏角圖板四塊藍袍青邊披領同四年定直省儒童入學額數大學四十名中學三十名小學二十名至十五年又定直省取進童生大府二十名大州縣十五名小學四五名定直省各學廩膳増廣各生額數廩膳生員府學四十名州學三十名縣學二十名衛學十名増廣生員名數同平定廣東恩詔廣東各府州縣學廩増附生仍准食廩肄業槩予優免每學恩貢一名正貢一名俱照平定中原例舉行其貧生在學田内動支錢米賑給孝子順孫義夫節婦所在巡按御史奏聞建坊旌表五年十一月恭奉太祖武皇帝配天及追尊四祖考妣帝后尊號禮成恩詔各直省鄉試副榜諸生廪監准貢増附准入監肄業毎學拔貢一名即用本年科舉首卷送部廷試如首卷中式或有事故以次優卷挨補七年改江寧國子監為江寧府學又裁蘇松學政歸併江寧八年又申嚴學臣考試及約束教官生員之法都察院條議一學臣報滿照例考核公明者優升溺職者㕘處一嵗科兩考完日即報部銓補新舊交代以杜署事諸弊一學臣以到任日為始嵗考限十二月考完毎三月解卷一次科考分四次解卷以憑磨勘所取生童文字以純正典雅為主詭謬者本生褫革學臣分别卷數之多寡議處一生員不許聚衆結社糾黨生事及濫刻選文窻稿一教官生員不遵條教者學臣嚴行懲治若與武職兵丁有爭教官生員聴學臣處治不許武職擅責武職兵丁聴該衙門處置不許生員結黨争抗一學官不宜懸缺致曠職業撫臣務按缺題請下吏部銓補其有不由科貢出身濫冒教職者一併題明送部别用若署事教官止用本學及别學不得濫委雜流從之始令八旗子弟考試取入順天府學滿洲䝉古子弟内院禮部㑹同順天學政考試通清漢文者繙譯漢字文一篇通清文者作清字文一篇漢軍子弟令與順天府民童一例出題考試互見旗學門恭上皇太后徽號禮成恩詔直省儒學貧生於學田内動支銀米賑給九年頒卧碑文於直省儒學明倫堂文曰朝廷建立學校選取生員免其丁糧厚以廩膳設學院學道學官以教之各衙門官以禮相待全要養成賢才以供朝廷之用諸生皆當上報國恩下立人品所有條教開列於後一生員之家父母賢智者子當受教父母愚魯或有為非者子既讀書明理當再三懇告使父母不陷於危亡一生員立志當學為忠臣清官書史所載忠清事蹟務須互相講究凡利國愛民之事更宜留心一生員居心忠厚正直讀書方有實用出仕必作良吏若心術邪刻讀書必無成就為官必取禍患行害人之事者往往自殺其生常宜思省一生員不可干求官長交結勢要希圖進身若果心善徳全上天知之必加以福一生員當愛身忍性凡有司官衙門不可輕入即有切己之事止許家人代告不許干與他人詞訟他人亦不許牽連生員作証一為學當尊敬先生若講説皆須誠心聴受如有未明從容再問毋妄行辨難為師亦當盡心教訓勿致怠惰一軍民一切利病不許生員上書陳言如有一言建白以違制論黜革治罪一生員不許糾黨多人立盟結社把持官府武斷鄉曲所作文字不許妄行刋刻違者聽提調官治罪令地方官選取教讀訓督土司子弟土司子弟有向化願學者令立學一所行地方官取文理明通者一人充教讀以司訓督嵗給銀八兩膏火二十兩於正項錢糧支給定各學條例禮部題准各省府州縣提調官員宜嚴束生徒按季考校凡學内殿堂齋房損壞即辦料興修其齋夫膳夫學糧學田等項以時撥給不許遲誤尅減生員除干謁凟擾例應處治外宜以禮相待勿得横肆凌侮責成提調教官課習生儒并嚴禁坊賈刋刻淫詞瑣語禮部題准嗣後直省學政將四子書五經性理大全資治通鑑綱目大學衍義厯代名臣奏議文章正宗等書責成提調教官課令生儒誦習講解務俾淹貫三塲通曉古今適於世用坊間書賈止許刋行理學政治有益文業諸書其他瑣語淫詞通行嚴禁定考覈教職之例提學按臨之日將各學教官考其學行兼優教有成效者據實列薦其行履無過但學問疎淺者姑行訓飭責令勉進有老病不堪者惟令以禮致仕若鑽營委署横索束脩卑汚無恥素行不謹者即行叅奏分别究革其有把持學校生員及書役門夫行私誘惑者一併究擬重治奉諭禮部明末冦陷都城君死社稷當時文武諸臣中豈無一二殉君死難者幽忠難冺大節可風爾部㑹同各部院堂官詳訪確查死節職名并實蹟具奏勿遺勿濫嗣給事中趙進義王廷諫等奏言皇恩褒忠無外而在廷論列僅舉死難之臣未及抗節之臣竊以逆顔强項雖負天髙地厚之恩而原其殺身存仁實關綱常綸紀之大是抗節與死難跡似異而心則同也請勅部核實奏聞並賜褒録從之定漢軍廩膳増廣生員各二十名俱歸併順天府學例廩生均有圈撥地畝不給廩餼禁濫舉名宦鄉賢孝子節婦及鄉飲賓僎提學官遇有呈請務須覈實確據非年久論定者不得舉鄉賢名宦非始終無議者不得舉節婦孝子非鄉里推服者不得舉鄉飲賓僎如有受人請求妄舉者師生人等即以行止有虧論其從前冒濫混􅇎者徑行查革定提學按臨赴學禮儀按臨次日祗謁先師行禮畢升明倫堂官生以次揖見應坐官遵照憲綱序坐講書生員總出一揖西向立講畢不必揖跪以次下堂東向立俟行賞罰畢官吏師生先出不必赴謝定各學生員丁憂服闋遊學告病縁事補考各條例禮部題准凡生員丁父母憂免其應試服闋呈學轉詳提調試以經書論三篇廩解卷詳奪増附青社徑行學起復凡游學從師隨祖父任告假出門者由學開明事由呈提調官轉詳批允給假不得誤嵗考果千里外未能即回限三月補考違者黜凡患病者提調官取該學及醫生甘結開糧限三月内補考違限者褫降再違者黜無故臨考不到者黜凡縁事非由學政明文開復黜革者不得收學除名廩膳縁事三月以上不結停食餼不作缺事結供明准補支坐罪不至革者計拘發日月作曠不補支凡願告老者呈學轉申提調檢勘取結於按臨半月前申詳免試若已赴考及縁事未結青衣發社與行止不端者俱不准告老凡補考者提調官面試經書論三篇封交本生親齎赴補考試對騐以防冒替十年諭禮部國家崇儒重道各地方設立學官令士子讀書各治一經選為生員嵗試科試入學肄業朝廷復其身有司接以禮培養教化貢明經舉孝㢘成進士何其重也朕臨御以來各處提學官毎令部院考試而後用之誠重視此生員也比聞各府州縣生員有不通文義娼優隸卒本身及子弟厠身學宫甚者出入衙門交結官府霸佔地土武斷鄉曲國家養賢之地竟為此輩藏垢納汙之所又提學官未出都門在京各官開单囑託既到地方提學官又訪探鄉紳子弟親戚曲意逢迎甚至賄賂公行照等定價督學之門竟同商賈正案之外另有續案續案之外又有寄學並不報部入冊以致白丁豪富冒濫衣巾孤寒飽學終身淹抑以及混占優免虧耗國課種種積弊深可痛恨今後提學御史提學道俱宜更新􅅥勵嚴察前項冒濫盡行褫革大小地方人才不等酌定名數併查舊題額例具奏定奪至於嵗考除行檢問革外其文理荒謬不通者須多置劣等嚴為降黜其儒童經由府縣送試者詳其身家履厯廩生保結方許入試廩生亦不得借端掯索儒童督學諸臣如有仍蹈前弊并自甘不肖以試士為市者許督撫巡按指實㕘奏如督撫巡按徇情不㕘聴禮部都察院禮科糾劾一併重處其入學生員提學御史提學道嚴諭府州縣衛各學教官月加課程不得曠廢亦不得假借督課凌虐諸生提學御史提學道即將嵗考科考塲中原卷解部稽察不許換卷謄改禮部仍照舊例考定等第以示勸懲仍照解到各學廩増附名數細查在學若干名黜退若干名照報冊出示行各該府州縣張掛俾通知生員的確姓名然後優免丁糧不許濫免地土攤累小民違者究治除已往外今後各提學御史提學道誠能體朕教養儲材之心實力遵行自使士風丕變人材輩出國家治平實嘉賴之朕不靳陞賞如仍沿襲陋規茍圖自利憲典具在决不寛宥十一年設遼陽府儒學初遼東十五學寄設永平府置三教官統之都司學官兼管自在瀋陽鐵嶺開原四學寧逺學官兼管前屯錦州義州右屯四學廣寧學官兼管永寧葢州海州定遼右衛四學其都司廣寧照府學例設廩生各四十名自在州照州學例設廩生三十名海葢錦義永寧右屯定邊前屯寧逺鐵嶺門原瀋陽十二學照縣學例設廩生二十名諸生俱就順天府考試嗣經五年裁十五學名色復改永平寄學為遼學設教官一員廩額八十名至是始設遼陽府學令寄籍永平者改歸本學肄業至十三年又定永平遼學舊設廩増各額八十名以四十名歸遼陽府學留四十名歸永平寄學每年各出貢一人永平寄學毎案仍取進儒童四十名不得濫入冒籍禁生員充當里長從御史牟雲龍請也恭上皇太后徽號禮成恩詔直隸各省儒學於廩生内拔取文行兼優者一名充貢送部迋試定商籍生員附府學例長蘆鹽運司所屬在直隸者附河間府學在山東者附濟南府學兩淮所屬附江南揚州府學兩浙所屬附浙江杭州府學陜西所屬附寧夏府學惟河東運城别設運司學又改定江南江北提督學院為提學道十二年諭禮部朕惟帝王敷治文教是先臣子致君經術為本自明季擾亂日尋干戈學問之道缺焉未講今天下漸定朕將興文教崇經術以開太平爾部即𫝊諭直省學臣訓督士子凡經學道徳經濟典故諸書務須研求淹貫博古通今明體則為真儒達用則為良吏果有此等實學朕當不次簡拔重加任用十三年減定八旗童生入學名數先是八年定滿洲䝉古漢軍子弟歸順天府考試取進童生滿洲百二十名䝉古六十名漢軍百二十名至是又定滿洲取八十名蒙古四十名漢軍百名互見旗學門學臣姜元衡疏言盛京發祥之地取進童生乃儲才之首務今科嵗兩考取進數目應比照京學但文教初興赴試人少請將遼陽府暫照外省大學例取進生員四十名其遼海二縣各取進十二名俟人民聚集文風漸盛再議定額從之定遼陽府遼海二縣學廩增額數禮部議准遼海二縣學宫初設諸生數少毎學應先設廩増各五名俟人才漸充再照各縣學例増設十四年詔直省學臣購求遺書新設寜夏等衛儒學復設廣東雷連各猺峝社學一所教讀一名又脩復衡陽石鼓書院撫臣袁廓宇疏言衡陽石鼓書院崇祀漢臣諸葛亮及唐臣韓愈宋臣朱熹等諸賢聚生徒講學於其中延及元明不廢值明末兵火傾圮祀典湮墜今請倡率捐修以表章前賢興起後學嵗時照常致祭從之十五年停直省科試録取儒童以三年為率隨嵗試考取歸併宣大二鎮學政於山西提學道管理歸併四川松潘衛學於茂州學十六年定直省學臣不懲治劣生之罰凡劣生犯事經教官舉報學道不盡法懲處者被撫按糾㕘照教官例一名以上罰俸六月三名以上罰俸一年五名以上降一級七名以上革職設湖南辰州五寨學巡撫袁廓宇疏言五寨界接苗猺向事詩書今更歸化輸誠應請設學考取童生七名廩生六名増廣生八名出貢年分俱照各縣事例兩年一貢從之令直省學臣校士務遵經𫝊不得崇尚異説給事中楊雍建奏言六經之道炳若日星四書所以發明六經而集註又以發明四書為功最鉅坊刻中有四書諸家辨又有四書大全辨皆以譏訕先賢崇尚異説得罪名教不小乞勅部毁板庶先賢𫝊註不為異説所奪而學術大醇人心可正矣部議應如所請併應曉示直省學臣從之定直省各衛學歸併各府州學例直隸山海衛宣府衛學邊逺無可歸併仍照舊立學外其懷來永寧二衛學歸延慶州保安衛學歸保安州龍門所學歸開平州昌平衛學歸昌平州定順天府大宛二縣童生入學額數府學二十五名縣學二十名十七年申嚴植黨訂盟之禁禮科右給事中楊雍建疏請勅部嚴飭學臣約束士子不得妄立社名糾衆盟㑹其投刺往來亦不許用同社同盟字様違者治罪倘學臣奉行不力糾㕘處置得㫖士習不端結社訂盟把持衙門關説公事相煽成風深為可惡著嚴行禁止以後再有此等惡習各該學臣即行革黜㕘奏如學臣徇隠事發一體治罪嚴生童私充吏役之禁凡生員内有身列黌宫見充書吏者有原係積年衙蠧經犯罪名者並除革治罪應考童生有現在衙門應役朦朧應試者嚴查重治廩生教官扶同保結者併行議處定貴州苗民入學及廩増額數巡撫卞三元疏言貴州苗民中有文理稍通者准送學道考試擇其優者取入附近府州縣衛學肄業仍酌補廩増事下部議尋定新進苗生大學五名中學三名小學二名均附就近各學肄業苗籍廩増大學各三名中小學各一名十八年令滇省土官子弟就近各學立課教誨康熙二年新設廣西各屬儒學教授官嚴直省學臣㣘縱劣生之罰先是順治十五年定學臣據教官舉報劣生不行盡法懲處者每一名罰俸六月七名以上革職至是改定一名降四級調用二名革職三年停止京衛武生武童部試之例先是元年十二月定在京十衛武生兵部春秋二考各取五十名至是議歸順天學政三年一試至五年併令奉天各學武生附順天武鄉試四年設奉天各府州縣等儒學奉天府照順天例為京府大學考取生員七名遼陽寧逺海城為中學考取生員五名葢平鐵嶺廣寧為小學考取生員二名錦州府學考取生員四名五年裁定雲南廣西兩省儒學教職雲南省共裁教職二十一缺改廣西府學訓導為教授羅平建水雲龍南安四州學訓導為學正禄豐羅次等十二縣學教諭為訓導通省共設府衛學教授十八員州學學正二十三員縣學教諭九員訓導十五員定山東寄籍遼生歸併考試例寄籍山東者歸併山東寄籍永平者歸併永平咸除夾字號名色五年令廣西土司子弟能習經書者就近州縣考試額取二名又以湖廣黎平府學改隸貴州又設四川㑹川衛學教授桐梓綏陽仁懷三縣學訓導各一員六年定八旗考試漢文例八旗子弟有願就試漢文者各都統開送到部移送順天學院滿洲蒙古别編字號漢軍與漢人同塲考試文優者取入順天府學至十五年停止八年改大寜都司學為保定府左衛學萬全都司學為宣化府前衛學九年令各直省置社學社師凡府州縣每鄉置社學一選擇文藝通曉行誼謹厚者考充社師免其徭役給餼廩優膳學政按臨日造姓名冊申報考察設奉天府州縣學廩生各一名定生員緣事未黜地方官不得擅撻例如果犯事情重先報學政俟黜革後治以應得之罪若辭訟細事發學戒飭更定各直省取進儒童額數先是順治四年定大府二十名大州縣十五名小學四五名至是更定大府州縣學仍照舊例中學取進十有二名小學或八名或七名又定八旗取進儒童額數先是順治十三年更定滿洲八十名䝉古四十名漢軍百名至是更定滿洲䝉古四十名漢軍四十名凡八旗童生應試者照漢童生例由部轉劄順天府丞先行考試後録送學政至二十六年定漢軍取進童生減去二十名十年令四川士子入籍他省者查明囘籍十二年復直省嵗科兩考之制順治十五年科臣奏准合嵗科兩考為一考至是有以儲材不廣督學不勤為言者部請仍照舊兩考例行從之諭吏禮二部致治之道首重人才儲養之源由於學校必衡鑒得人釐剔有法乃能革除積弊遴拔真材以彰文治之盛近聞直隸各省學差沿襲陋䂓隳廢職業營私作弊考試不公以致真材淪棄文治不光今應作何整飭差遣何官及磨勘考校之法何以盡善務期永革弊端著九卿科道㑹同詳確議奏尋議磨勘學差試卷之法直隸各省學臣所解之卷不能無改謄潤色且因解卷以致請託亦未可知相應停其解卷磨勘俟三年期滿督撫以稱職薦舉者照例以叅議道用以公明尤著保舉者照例内陞京堂若有㣘情溺職等弊應聴督撫指名題㕘若督撫徇情不㕘被科道糾叅或有别官首出将督撫一併議處從之始令盛京八旗子弟通習漢文者與民童一體考試滿洲䝉古編滿字號取進三名漢軍編合字號取進二名至十五年停止互見旗學門十五年改設順天遵化州學正訓導二員十八年剔除學臣考試十弊吏部議覆左都御史魏象樞條奏學道考試童生府考無名徑取入學弊一額外溢取童生撥發别學弊二私查印簿某卷某號即某人以便賄買弊三解部冊籍遲延更改等第弊四先開六等草单嚇詐保等銀兩弊五將文童充武童入學後夤緣改武為文弊六將童生逺調考試弊七縱容教官包攬通賄弊八曲徇情面孤寒棄斥弊九額外溢取童生附生員冊内報部弊十請嗣後凡考覈學政之時若有不能剔除此十弊者督撫糾㕘有贓者革職提問無贓者降二級調用應如所請從之定教職用科貢出身人員有不由科貢出身者題眀送部别用若部選教職未到止許本學及别學官署事不得濫委雜流二十二年復設直𨽻阜平縣學教諭令雲南貴州兩省土司子弟得應試入學先是雲貴總督蔡毓榮疏言土司世相承襲不由選舉罔識禮義嗣後土官族屬子弟内有通曉經義志圖上進者請就郡邑一體應試至是差往區畫土司事冝侍郎庫勒納疏請如蔡毓榮言乃命雲貴二省各録取土生二十五名其土司隸貴州者附貴陽等府學𨽻雲南者附雲南等府學不准科舉亦不准補廩二十四年增設奉天府錦州等處儒學廩増額數時以生聚日繁人文漸盛府尹董秉忠疏言錦州府錦縣寜逺州三學原各設廩生一名今請各増四名每學二年一貢廣寜縣原設廩生一名今請増一名仍照舊例五年一貢増廣生員亦照各學廩膳生之數下部議行二十五年改浙江青田龍泉二縣小學為中學定直省學臣考試遲延之罰定例學臣嵗科兩試以三年為限至是復定限内不能完結者降一級調用頒發御書學達性天匾額於白鹿洞書院嶽麓書院頒發御纂曰講解義經史諸書於直省學官及白鹿嶽麓二書院二十五年詔直省購求遺書二十六年復詔八旗子弟准與漢人考試詳見旗學太學門改貴州大定府學為州學設臺灣郡縣儒學廩増生禮部議覆福建巡撫張仲舉疏言臺灣郡縣設立學校但與考人數無多未便照内地之額府學量設廩増生各二十名縣學各十名俟人才漸盛仍照直隸各省定額至廪生出貢挨年考取自康熙二十七年為始照例舉行應如所請從之二十七年定直隸懷來永寧保安三衛學廩増生員各額數順治十六年定懷來永寧二衛歸併延慶州保安衛歸併保安州至是復令三衛仍各取進儒童八名廪増及出貢俱照縣學例其三衛事務仍令延慶保安二州學兼攝二十八年上南巡江浙詔増江浙兩省儒童入學額數奉諭朕稽古省方政治所先在崇文教江南浙江為人文萃集之地入學額數應酌量加増永昭宏奬著該督撫詳議奏請尋議准入學名數小學増至十二名中學十六名大學二十名府學二十五名新設貴州貴筑縣儒學取進童生八名廩増照小學例二十九年定滿洲八旗生員不能騎射者不准考試例奉天八旗考取生員亦照此例新設四川奉節縣儒學以奉節為䕫府首邑又兼大寧歸併議准取進童生八名又頒御製孔子贊序及顔曽思孟四贊摹本於直省學宫詳見褒贈門令蜀省流寓之民有開墾土田納糧應差者准其子弟一體考試三十年更定奉天八旗童生取進額數先是十二年定取進滿洲䝉古童生三名漢軍童生二名二十六年定漢軍減去一名至是又定奉天滿洲䝉古加増取進童生三名共六名漢軍増二名共三名三十一年禁學臣濫設祠生贊禮生違者照濫取入學例議處新設貴州安化縣學取進儒童照小學八名例定雲南貴州新設各學廩増及取進儒童額數雲南馬龍寧師宗三州呈貢定邊元謀三縣貴州安化縣廩増各照州縣學例行其馬龍寧州呈貢取進儒童各照中學十二名餘照小學取進八名三十二年定湖廣五開衛學廩増及取進儒童額數廩増照衛學例取進儒童照中學例即令靖州學兼攝三十三年増定八旗内府佐領及王公府屬佐領等子弟考試取進額數原定滿洲䝉古取進童生四十名至是將上三旗内府滿洲佐領内管領及五旗王公府屬滿洲佐領子弟歸併考試量増二十名共取進六十名漢軍原定二十名至是將上三旗内府旗鼓佐領及五旗王公府屬旗鼓佐領子弟歸併考試量増十名共取進三十名増定宣化府學及屬縣各學取進儒童額府學増二名宣化懷柔照大學十五名懷來萬全蔚三縣照中學十二名西寧龍門赤城三縣照小學八名例三十四年増定盛京八旗内府佐領旗鼓佐領等子弟取進額數盛京取進童生原定滿洲蒙古六名今内府佐領子弟量増四名共十名旗鼓佐領原定三名量増二名共五名至三十六年停止盛京内府佐領子弟考取生員之例所増名數悉行裁去至五十五年又増奉天合字號童生額於三名外量加一名三十五年定彚題節孝之例禮部題准直省節孝應旌表者照八旗例於年終彚題定守陵千丁子弟准入盛京八旗漢軍内考試例三十七年命増雲南府州縣學廪増生員及文武童生額數又改設雲南永北府學教授又頒御製平定朔漠碑文於直省學宫詳見太學門三十八年増定貴州省教授學正訓導等官及文武生員取進額數清浪衛學設教授一員開州廣順永寧獨山麻哈五州州學正各一員普安餘慶安化普定平越都匀鎮逺銅仁龍泉永從十縣學訓導各一員取進文武生員額各八名又上南巡詔増本年江浙各府州縣大學中學小學取進童生各五名三十九年令直省考試儒童課以五經及小學性理諸書有將經書小學精熟及能成誦三經五經者學臣酌量優録論題將性理中太極圖説通書西銘正䝉一併出題定在京冒籍生員改歸原籍例除入籍二十年以上不議外餘以部文到日為始限兩月内具呈自首改歸原籍過期照例斥革至六十年定各省亦照此例行申嚴直省學臣考試徇私之弊督撫勒索學院棚規司道需索常規及學臣與者皆革職提問如有勢宦京官請託及教官巡捕進士舉人等求情者事發分别治罪學臣隠徇者革職提問知府有包攬入學童生將文理庸劣之人濫行考送者革職提問學臣扶同作弊者亦如之督撫提鎮有開送秀才童生及知縣賄薦案首者革職提問學臣扶同作弊者亦如之凡學臣遇有挾制干請准其封奏上聞至如奸胥猾吏勾通内外招揺不法者令該地方官察挐究處其祖父兄弟為子孫弟姪營謀入學者除本童責革外有官者革職無官者從重治罪頒聖諭十六條於直省學宫一敦孝弟以重人倫一篤宗族以昭雍睦一和鄉黨以息争訟一重農桑以足衣食一尚節儉以惜財用一隆學校以端士習一黜異端以崇正學一講法律以儆愚頑一明禮讓以厚風俗一務本業以定民志一訓子弟以禁非為一息誣告以全良善一戒窩逃以免株連一完錢糧以省催科一聯保甲以弭盜賊一解讐忿以重身命每月朔望令儒學教官𫝊集該學生員宣讀務令遵守違者責令教官并地方官詳革治罪四十年定奉天各學廩増額數錦州學向設廩増各五名加五名廣寧縣學向設二名加一名錦州府寧逺州遼陽海城二縣各學向各設五名均加二名葢平鐵嶺開原三縣學向設一名各加一名定土官子弟有愿應試者先送附近儒學讀書之例四十一年増設貴州府州衛縣儒學教諭訓導官令同省隔府者得應考試府州衛等學各増設訓導一員縣學各添設教諭一員時以各學考試者甚少許照滇省之例同省隔府之人得往應試又頒御製訓飭士子文於直省儒學諭禮部訓飭士子文并令各府州縣學官一體勒石恐有不産石州縣地方或欲借端擾𣲖應候國子監勒石後以搨本彚頒各省轉發所屬學宫一體遵行定義學小學之制京師崇文門外設立義學特賜御書匾額五城地方各設小學延塾師教育有成材者選入義學凡義學小學每年廩餼共三百兩於府縣按月支給四十二年御書學宗洙泗匾額令懸山東濟南省城書院又定増豫省考城柘城温縣登封四縣取進文童額數先是因兵火之後應試寥寥定為小學取進童生八名至是河南巡撫徐潮以户口額賦倍於從前人才漸盛請改為中學考取童生十二名部議應如所請從之増四川省各屬學訓導一員吏部議覆巡撫貝和諾疏言各省教職係每學二員川省五十七學每學止設一員應如所請每學各増一員從之又命發帑金脩理順天府府學尊經閣等處飭學臣取士衡文不得任性好異時直隸學政楊名時専以背誦五經取士且考取生員但係富室文雖佳不録若係貧寒粗通文義即予入彀上以楊名時秉性好異背誦五經事既繁瑣亦不合例且校士應論文學優劣不當論其貧富因奉特㫖申飭定紅苗歸化就近教導及立義學之例戸部等衙門議覆湖廣總督喻成龍疏言紅苗歸化將麻陽縣學訓導移駐五寨司就近教導五寨司等處設立義學聴苗民肄業應如所請從之四十三年定貴州考試童生及府州衙縣學教職例時貴州新定疆域各府州縣衛考試之人甚少學政張豫章疏請照雲南同省隔府之人往試俟人文漸盛再行釐正再府州衛等學請各添訓導一員縣學各添教諭一員下部議行奉諭吏部教職官員必文義明通方稱厥職近見直省教職官内不諳文義者甚多如此何以訓士著行文直省巡撫將各屬教職通行考試分别具題嗣後俱照此例不時考試尋定一二三等者給憑赴任四五等者解任學習三年再行考試六等者革職令湖廣各府州縣熟苗中有通曉文義者准與漢人一體應試廣西土司之民人子弟及貴州苗民並照此例申定湖廣黄梅等縣學儒童額數黄梅縣改復大學雲夢桂陽二縣改復中學照例考取増陜西平凉府學儒童額數時有請立平凉衛學者部議將平凉府學改為大學加撥平凉衛童生八名不必别立衛學從之四十四年令貴州各府州縣設立義學土司承襲子弟送學肄業以俟襲替其族屬子弟併苗民子弟願入學者亦令送學該府州縣學復設訓導躬親教諭添設貴州永寧麻哈獨山三州學正各一員普定平越都匀鎮逺安化龍泉銅仁永從八縣學教諭各一員設雲南省廣南麗江二府學時以二府百姓久歸版圖生聚日繁尚未設學巡撫佟毓秀疏言請於二府設教授訓導官各一員每府取進童生十五名其滇省土人有願考者准以民籍應試㫖允行四十五年定考試儒童出題例先是三十六年定學臣考試童生出四書題一道令作時文小學題一道今作論至是更定儒童正考時仍作四書文二篇覆試作四書文一篇小學論一篇命頒行欽定古文淵鑑資治通鑑綱目等書於直省頒發御書文教遐宣匾額懸黔省各義學四十六年増設廣西省各學教諭訓導官義定等十三縣増設教諭共十三員永寧等七州平樂等三縣及思明土府増設訓導共十一員四十八年改定陜西陜州葉縣中學為大學四十九年定奉天八旗廩増額數滿洲各四名漢軍各四名定考試武生武童出題例凡學臣考試武生童出論語孟子題一道孫子吴子司馬法題一道令作論二篇五十年申定考試教職之例凡直隸各省教官如係學道所屬令布政司按察使㑹同學道考核開送督撫具題如係學院所屬布政司按察使開送督撫學院㑹同考核具題設廣西西隆州儒學撥武緣縣訓導一員移駐西隆州専司督課嵗科兩試取進文武生員各六名五十二年御纂朱子全書告成頒發直省刋板通行定廣西西隆州學廩増額數廩生四名増廣生五名令各省府州縣多立義學聚集孤寒延師教讀五十三年又定設湖南乾州鎮溪所儒學自康熙五十四年為始嵗考取文武生員各八名以瀘溪縣訓導就近兼攝從偏沅巡撫阿琳請也五十四年諭直隸巡撫趙宏燮曰朕毎年春間行幸水淀近見民生雖不能家給人足比之往時似覺差勝但村莊之中誦讀尚少朕思移風易俗莫過讀書況畿輔之地乃王化所先宜於窮鄉僻野皆立義學延師教讀以勉厲孝弟可望成人矣爾即徧示村莊俾皆知朕崇文好學之深意設貴州南籠㕔學取進文童武生各八名御纂周易折中成頒發中外刋行増直隸府州縣衛入學額數除順天大興宛平外大中學各増三名小學増二名増設湖廣安陸府鍾祥縣學教諭訓導各一員定湖南衡永寶辰郴靖六府州屬苗猺入學額數别編字號於正額外量取一二名五十五年定廣東各衛儒童撥入府學例是時各省俱有衛學獨粤東未設巡撫楊琳疏請將廣州等處八衛二所文武童生各取進二名其餘三十六衛所文武童生各取進一名撥入府學從之定四氏學正考試引見例詳見録後門定湖廣岳州府湖西六屬於澧州别建考院以洞庭湖間隔不便應試也府學訓導改駐澧州専司其事廩増各府學一半五十七年改江南寧國府及南陵縣二中學俱為大學五十八年改江西興國縣小學為中學改浙江武義縣小學為中學定浙江西安縣孔氏聖裔於本學正額外加取儒童二名互見録後門五十九年増定四川古浪取進儒童額數増取八名附凉州衛學改定河南襄城山西太平中學為大學浮山小學為中學改貴州黄平州中學為大學因裁黄平衛學故也令廣西土屬設立義學土屬十五處各立義學一所令該撫擇本省舉人貢生學品兼優者毎屬發往一員教讀土屬子弟有文藝精通者就近流官州縣附考取進定四川東川府入學額數自六十年為始取進童生十五名六十年改江南銅陵縣小學為中學更定廣東商籍童生所進額數分撥廣州府學及南海畨禺二縣學各二十名六十一年頒御書學道還淳匾額於蘇州紫陽書院皇朝文獻通考卷六十九
