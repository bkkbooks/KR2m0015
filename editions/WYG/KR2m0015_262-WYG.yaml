body:
  text: 象緯考七五星臣等謹按前史天文志胥言五星行度而明晳莫逾晉志凡伏見留退遲疾順逆各有定率可為後代考驗之凖元史益詳歩術惟繁簡疎宻之不同也我朝用西法推七政每頒來嵗之朔則經緯躔度並有成書持以驗諸懸象皆無差忒兹據乾隆九年以後七政時憲書約陳綱領分詳節目並述推歩之法焉五星近太陽則伏逺太陽則見星體大黄道正升正降緯度在北則速見遲伏星體小黄道斜升斜降緯度在南則遲見速伏五星之體金星最大木水二星次之土星又次之火星最小星體大則太陽在地平下之度少即可見星體小則太陽在地平下之度多方可見土星當地平太陽在地平下十一度可見木星水星當地平太陽在地平下十度可見火星當地平太陽在地平下十一度三十分可見金星當地平太陽在地平下五度可見五星行上弧順輪心行自西而東為順為疾行下弧逆輪心行自東而西為退為遲五星距地有逺近次輪有大小上弧之度多於下弧其多少又各不同土木二星輪小而距地逺上下弧不甚懸殊土星上弧一百九十二度有餘下弧一百六十七度有餘木星上弧二百度有餘下弧一百五十九度有餘火金水三星輪大而距地近上弧之度愈多下弧之度愈少火星上弧二百八九十度下弧七八十度金星上弧二百七十度下弧九十度水星上弧二百二十二度下弧一百三十八度五星與太陽同度太陽在星與地之間星為太陽所掩伏而不見是為合伏土木火三星能距太陽半周地在星與太陽之間星與太陽正相對照如月之望是為衝金水二星常繞太陽行不能相距半周星在太陽與地之間於次輪下半退行正當太陽之下如月之朔是為退伏土木火三星合伏後漸逺太陽則晨見順行先疾後遲遲極而留為留退初退行先遲後疾距太陽一百八十度為退衝旋夕見退行先疾後遲遲極而留為留順初順行先遲後疾漸近合伏則夕不見金水二星合伏後漸逺太陽則夕見順行先疾後遲遲極而留為留退初退行先遲後疾漸近太陽則夕不見復與太陽同度為合退伏漸逺太陽則晨見退行先疾後遲遲極而留為留順初順行先遲後疾漸近合伏則夕不見土星合伏後約踰二十五日移三度餘晨見東方順行約踰一百日移七度餘為留退初退行約踰六十日移四度餘為退衝次日夕見約踰七十日移四度餘為留順初順行約踰一百日移九度餘夕不見約踰十五日移二度餘復為合伏木星合伏後約踰十五日移四度餘晨見東方順行約踰一百十日移十七度餘為留退初退行約踰五十五日移五度餘為退衝次日夕見約踰六十日移五度餘為留順初順行約踰一百十日移十五度餘夕不見約踰十五日移四度餘復為合伏火星合伏後約踰三十七日移二十餘度晨見東方順行約踰二百七十日移一百四十餘度為留退初退行約踰二十五日移五度餘為退衝次日夕見約踰三十日移六度餘為留順初順行約踰三百三十日移二百八十餘度夕不見約踰四十七日移三十餘度復為合伏金星合伏後約踰二十五日移三十餘度夕見西方順行約踰二百四十日移二百三十餘度為留退初退行約踰十二日移七度餘夕不見次日移一度為合退伏又次日移一度晨見東方約踰二十日移七度餘為留順初順行約踰二百二十日移二百六十餘度晨不見約踰二十日移二十八度餘復為合伏水星合伏後約踰十二日移二十餘度夕見西方順行約踰二十八日移二十餘度為留退初退行約踰二日移一度夕不見約踰四日移三度餘為合退伏約踰六日移四度餘晨見東方約踰七日移二度餘為留順初順行約踰二十日移二十餘度晨不見約踰十五日移二十餘度復為合伏推土星法求積年同推日躔法求中積分同推日躔法求通積分同推日躔法求天正冬至同推日躔法求積日同推月離法求土星年根以積日與土星每日平行一百二十秒六二二五五一相乗滿周天一百二十九萬六千秒去之餘為積日土星平行加土星平行應宫度分秒微得土星年根上考往古則置土星平行應減積日土星平行得土星年根求最高年根以積日與土星最高每日平行十分秒之二又一九五八三相乘得數為積日最高平行加土星最高應宫度分秒微得正交年根上考往古則置土星最高應減積日最高平行得最高年根求正交年根以積日與土星正交每日平行十分秒之一又一四六七二八相乗得數為積日正交平行加土星正交應宫度分秒微得正交年根上考往古則置土星正交應減積日正交平行得正交年根求土星日數以所設日數與土星每日平行一百二十秒六二二五五一相乘得數為秒以度分收之得土星日數求最高日數以所設日數與土星最高毎日平行十分秒之二又一九五八三相乗得數為秒以分收之得最高日數求正交日數以所設日數與土星正交每日平行十分秒之一又一四六七二八相乗得正交日數求平行以本星年根與本星日數相加得本星平行求最高平行以最高年根與最高日數相加得最高平行求正交平行以正交年根與正交日數相加得正交平行求引數置本星平行减最高平行得引數求初均數均輪心自本輪最高左旋行引數度次輪心自均輪最近㸃右旋行倍引數度用兩三角形法求得地心之角為初均數引數初宫至五宫為减六宫至十一宫為加隨年次輪心距地心之邊為求次均數之用求初實行置本星平行加减初均數得初實行求星距日次引置本日太陽實行减初實行得星距日次引求次均數星自次輪最逺㸃右旋行距日度用三角形法以次輪心距地心線為一邊即求初均數時所得次輪心距地心之邊次輪半徑為一邊星距日度為所夾之外角過半周者與全周相减用其餘求得地心對次輪