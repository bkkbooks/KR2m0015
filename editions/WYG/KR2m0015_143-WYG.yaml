body:
  text: 欽定四庫全書皇朝文獻通考卷一百四十三王禮考十九璽寳符印臣等謹按馬端臨王禮考有圭璧符節璽印一門考古者圭璧之用不一周禮典瑞玉人所載詳矣而天球陳諸東序夏璜分於列侯則又珍之以為世守之法物焉馬氏云圭璧葢即符節璽印之類三代以来天子所佩曰璽臣下所佩曰印唐時改稱璽曰寳而圭璧之制無聞我朝誕膺天命設御寳於交泰殿初立尚寳司其後以内監典守當用則内閣請而用之伏讀乾隆十一年御定寳譜藏之交泰殿者二十有五藏之盛京者十御製序文謂君人者在徳不在寳人君日新厥徳居安慮危凝受皇天大寳命則徳足重寳而寳以愈重大哉皇言斯所以緝熙敬勝而享萬年有道之長也至於崇上慈寧徽號則有册寳中宫正位妃嬪受封則有册寳印之别其制度分寸具有常式載在禮官若夫百司之印以昭法守而防詐偽其别曰印曰闗防曰條記曰圖記其鑄造則禮部鑄印局專司之文有漫漶者則請於朝而改鑄之内外衙門印俱兼用滿漢文其行於藩部者則用䝉古托忒囬子唐古忒各種字副國書以行乾隆戊辰皇上釐定國書篆法厥體三十有二乃改鐫御寳及王公百官印御寳用玉筯篆諸王則芝英篆文臣則有尚方大篆小篆鐘鼎篆垂露篆武臣則有桞葉篆殳篆懸針篆皆以位之崇卑為等視漢唐以来官印文專用一體書者等威益以辨矣茲據大清會典及禮部擋敬謹編次首載御寳次皇太后皇后册寳次皇貴妃貴妃册寳妃册印嬪册次親王世子郡王寳印次諸藩國印次公侯伯印次京朝直省文武諸司印信闗防次符制其丹符出騐四方者尤為鄭重非尋常符制可比俱詳其規度以彰昭代之法守標目稱璽寳符印而不言圭璧者從今制也天聰九年征察哈爾國獲玉璽相傳此璽藏於元朝大内至順帝為明所敗攜璽至沙漠後遂遺失越二百餘年有牧羊於山岡下者見一羊三日不嚙草但以蹄跑地牧者發之此璽乃見旣而歸於元後裔博碩克圖汗後博碩克圖為察哈爾林丹汗所侵國破璽復歸於林丹汗林丹汗亦元裔也至是和碩墨爾根戴青貝勒多爾衮征察哈爾得之視其文乃漢篆制誥之寳四字璠璵為質交龍為紐光氣絢爛洵至寳也多爾衮等喜甚曰皇上洪福非常天賜至寳此一綂萬年之瑞也於是文館㕘領鮑承先奏言皇上聖徳如天仁政旁達苞符協應大寳呈祥天賜玉璽乃非常之吉兆當敕工部製造寳函諏擇吉日躬率諸臣郊迎由南門入宫以膺天眷而昭符瑞仍以得璽之由書於敕諭緘用此寳頒行滿漢䝉古俾逺近聞知咸識天命之攸歸也上是之又上出御營迎勞凱旋諸貝勒受所得玉璽是時凱旋諸貝勒設案襲以氊奉所得玉璽置於上令正黄旗都綂納穆太鑲白旗都綂吏部承政圖爾格舉案前進諸貝勒率衆遙跪以獻御幄前設黄案陳香燭上受玉璽親捧之率衆復拜天行禮復位傳諭左右曰此璽乃厯代帝王所用之寳天以畀朕洵非偶然也順治二年錢塘縣縣丞黄自昌子禧光進玉璽一文曰紹興之寳十年設尚寳監十二年設尚寳司每遇用御寳内院會同尚寳監及尚寳司官員公同驗用十三年裁尚寳司十八年裁尚寳監令内監守掌凡請用御寳内院先期知會及期學士率典籍諸官赴乾清門接出與内監公同驗用康熙四年十二月溧陽縣獻玉璽一江南江西總督郎廷佐疏報溧陽縣民顧起龍等獲玉璽篆文人心惟危道心惟微惟精惟一允執厥中十六字遣官齎進命收貯内庫賞顧起龍等銀各五十兩雍正二年十月提督江南總兵官髙其位進䨇龍紐玉璽一時黄浦漁人得之海濵漁網中乾隆三年江南河道總督髙斌進玉璽一時河員濬寳應河得之十一年御定交泰殿寳譜大清受命之寳以章皇序白玉方四寸四分厚一寸盤龍紐髙二寸皇帝奉命之寳以章奉若碧玉方四寸四分厚一寸一分盤龍紐髙三寸五分大清嗣天子寳以章繼繩金方二寸四分厚八分交龍紐髙一寸七分皇帝之寳以布詔赦青玉方三寸九分厚一寸交龍紐髙二寸一分皇帝之寳以肅法駕栴檀香木方四寸八分厚一寸八分盤龍紐髙三寸五分天子之寳以祀百神白玉方二寸四分厚八分交龍紐髙一寸三分皇帝尊親之寳以薦徽號白玉方二寸一分厚七分盤龍紐髙一寸三分皇帝親親之寳以展宗盟白玉方二寸二分厚一寸二分交龍紐髙一寸二分皇帝行寳以頒賜賚碧玉方四寸八分厚一寸九分蹲龍紐髙二寸五分皇帝信寳以徴戎伍白玉方三寸三分厚六分交龍紐髙一寸六分天子行寳以册外蠻碧玉方四寸八分厚一寸九分蹲龍紐髙二寸三分天子信寳以命殊方青玉方三寸八分厚一寸三分交龍紐髙一寸七分敬天勒民之寳以飭覲吏白玉方三寸一分厚一寸五分交龍紐髙一寸七分制誥之寳以諭臣僚青玉方四寸厚二寸交龍紐髙二寸七分勅命之寳以鈐誥勅碧玉方三寸五分厚一寸三分交龍紐髙一寸八分垂訓之寳以揚國憲碧玉方四寸厚一寸五分交龍紐髙二寸命徳之寳以奨忠良青玉方四寸厚一寸四分交龍紐髙二寸一分欽文之璽以重文教墨玉方三寸六分厚一寸五分交龍紐髙一寸六分表章經史之寳以崇古訓碧玉方四寸七分厚二寸一分交龍紐髙二寸二分巡狩天下之寳以從省方青玉方四寸七分厚二寸交龍紐髙二寸五分討罪安民之寳以張征伐青玉方四寸八分厚二寸交龍紐髙二寸五分制馭六師之寳以整戎行墨玉方五寸三分厚一寸四分交龍紐髙二寸二分勅正萬邦之寳以誥外國青玉方三寸八分厚一寸五分盤龍紐髙二寸三分勅正萬民之寳以誥四方青玉方四寸一分厚一寸五分交龍紐髙二寸廣運之寳以謹封識墨玉方六寸厚二寸一分交龍髙二寸以上御寳二十有五貯交泰殿御寳盝髙九寸方八寸五分金質鈒香草花文外櫝髙尺有三寸方尺有二寸木質朱漆繪龍文架髙二尺一寸方尺有八寸柟木為之朱漆金飾彫刻龍文寳色池連葢髙三寸四分方六寸四分純素金質袱墊均用黄縀為之御製交泰殿寳譜序曰國初受天命采古制為璽掌以内閣承收以宫殿監正襲以重盝承以髹几設交泰殿中以次左右列當用則内閣請而用之其質有玉有金有栴檀香木玉之品有白有青有碧紐有交龍有盤龍有蹲龍其文自太宗文皇帝以前專用國書旣乃兼用古篆其大小自方六寸至二寸一分不一嘗考大清會典載御寳二十有九今交泰殿所貯三十有九會典又云宫内收貯者六内庫收貯者二十有三今則皆貯交泰殿數與地皆失實至謂皇帝奉天之寳即傳國璽兩郊大祀及聖節宫中告天青詞用之此語尤誕謬大祀遵古禮用祝版署名而不用寳聖節宫中未嘗有告天事或道籙祝釐時一行之亦不過偶存其教耳未嘗命文臣為青詞亦未嘗用寳且此璽孰非世世傳守而專以一寳為傳國璽亦不經葢縁修㑹典諸臣無宿學卓識復未曾請㫖取裁祗沿明時内監所書册檔承譌襲謬遂至於此甚矣紀載之難也且㑹典所不載者復有受命於天旣夀永昌一璽不知何時附藏殿内反置之正中按其詞雖類古所傳秦璽而篆法拙俗非李斯蟲鳥之舊明甚獨玉質瑩潔如截肪方得黍尺四寸四分厚得方之三以為良玉不易得則信矣若論寳無問非秦璽即真秦璽亦何足貴乾隆三年髙斌督河時奏進屬員濬寳應河所得玉璽古澤可愛文與輟耕録載蔡仲平本頗合朕謂此好事者仿刻所為貯之别殿視為玩好舊器而已夫秦璽煨燼古人論之詳矣即使尚存政斯之物何得與本朝傳寳同貯於義未當又雍正年故大學士髙其位進未刻碧玉寳一文未刻則未成為寳而與諸寳同貯亦未當朕嘗論之君人者在徳不在寳寳雖重一器耳明等威徴信守與車旗章服何異徳之不足則山河之險土㝢之冨拱手而讓之他人未有徒恃此區區尺璧足以自固者誠能勤修令徳繫屬人心則言傳號渙萬里奔走珍非和璧制不龍螭篆不斯籀孰敢不敬信奉承尊為神明故寳器非寳寳於有徳古有得前代符寳君臣動色矜耀侈為瑞貺者我太宗文皇帝時獲蒙古所傳元帝國寳容而納之初不藉以為受命之符由今思之文皇帝之臣服函夏垂綂萬世在徳耶在寳耶不待智者而知之矣善夫唐梁肅之言曰鼎之輕重璽之去来視徳之髙下位之安危然則人君承祖宗賦畀思以永膺斯寳引而勿替其非什襲固守之謂謂夫日新厥徳居安慮危凝受皇天大寳命則徳足重寳而寳以愈重璽玉自古無定數今交泰殿所貯厯年旣久紀載失真且有重複者爰加考正排次定為二十有五以符天數并著成譜而序其大指如此御定盛京尊藏寳譜大清受命之寳碧玉方四寸八分厚一寸九分蹲龍紐髙二寸四分皇帝之寳青玉方四寸八分厚一寸九分交龍紐髙二寸七分皇帝之寳碧玉方五寸厚一寸八分盤龍紐髙三寸皇帝之寳栴檀香木方三寸八分厚六分素紐髙五分奉天之寳金方三寸七分厚九分交龍紐髙二寸天子之寳金方三寸七分厚九分交龍紐髙二寸奉天法祖親賢愛民碧玉方四寸九分厚一寸五分交龍紐髙二寸丹符出騐四方青玉方四寸七分厚二寸交龍紐髙二寸二分勅命之寳青玉方三寸七分厚一寸八分交龍紐髙二寸五分廣運之寳金方二寸四分厚八分交龍紐髙一寸五分以上御寳十尊藏盛京御製盛京尊藏寳譜序曰乾隆十一年春閱交泰殿所貯諸寳旣詳定位置為文記之其應别貯者分别收貯至其文或複見及國初行用者為數凡十雖不同於見用之寳而未可與古玩並列因念盛京為國家發祥地祖宗神爽實所式憑朕旣重繕列祖實録尊藏鳯凰樓上覲揚光烈傳示無疆想當開天之始凝受帝命寳符煥發六服承式璠璵孚尹手澤存焉記不云乎陳其宗器𢎞璧琬琰陳之西序崇世守也爰奉此十寳齎送盛京鐍而藏之而著其縁起如此十三年改鐫御寳始用清篆文左為清篆右為漢篆御題交泰殿寳譜序後曰寳譜成於乾隆十一年丙寅越三年戊辰始指授儒臣為清文各篆體書因思向之國寳官印漢文用篆書而清文則用本字者以國書篆體未備也今旣定為篆法當施之寳印以昭畫一按譜内青玉皇帝之寳本清字篆文傳自太宗文皇帝時自是而上四寳均先代相承傳為世守者不敢輕易其檀香皇帝之寳以下二十有一則朝儀綸綍所常用宜從新制因勅所司一律改鐫與漢篆文相配並紀之寳譜序後云又内繙書房奏言謹将内閣頒發誥勅内制誥之寳四字遵照欽定玉筯篆體擬篆清文恭呈御定後交該衙門選擇吉期於大内祇領應鐫二十一御寳敬謹改鐫皇太后皇后金寳各宫妃金寳金印均用玉筯篆俟册封皇后舉行慶典加上徽號時交該衙門如式敬謹鐫刻從之皇上御用各寳敬天勤民白玉方二寸九分四周鐫御製詩并序臣等謹按是寳為聖祖仁皇帝鈐用御書璽世宗憲皇帝收藏聖祖御寳時特留是寳於外以備鈐用皇上敬遵成典亦常鈐用御書伏讀御製四言詩仰見列聖心傳紹述奕葉重光奉敬天勤民四字為家法兢兢業業葢不啻盤盂几杖之銘洵乎聖謨洋洋億萬斯年昭垂無極也已畏天愛人青田石隂文方二寸六分髙三寸二分上嵌白玉刻陽紋人物乾隆尊親之寳銀晶方二寸六分厚二寸六分䨇螭紐髙三寸乾隆親賢之寳青玉方二寸二分厚八分獅紐髙一寸五分信天主人白玉方三寸二分厚一寸三分交龍紐髙一寸三分古稀天子之寳青玉方三寸四分四周鐫御製古稀說古稀天子之寳青玉方二寸二分厚一寸蟠螭紐髙一寸猶日孜孜青玉方二寸二分厚一寸蟠螭紐髙一寸二分臣等謹按以上二寳共為一分伏讀御製古稀說皇上虛懐若谷兢惕彌深惟古