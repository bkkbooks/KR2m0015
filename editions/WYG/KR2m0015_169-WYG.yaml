body:
  text: 欽定四庫全書皇朝文獻通考卷一百六十九樂考十五樂歌一圜丘樂章康熈十六年定迎神奏始平之章敬承純佑兮於昭有融時維永清兮四海攸同輸忱元祀兮從律調風穆將景福兮乃眷㣲躬淵思髙厚兮恐負鴻則聿章彛序兮夙夜宣通雲軿鸞輅兮忽降中壇翠旂紛裊兮列缺豐隆肅始和暢兮慶洽陶匏百靈祇衛兮齋明辟公恭仰顥穹兮神來燕喜協昭慈恵兮逖鑒予𠂻奠玉帛奏景平之章靈旗爰止兮奉玉筵執事有恪兮駿奔前有美珪璧兮薦縞纎經緯獲理兮耀瑚璉來格洋洋兮思儼然孔忱翼翼兮告中䖍進爼奏咸平之章升肴珍錯兮列豆籩吉蠲為饎兮格乾圜九州美味兮薦膏鮮特牲潔敬兮苾芳筵願垂降鑒兮駐雲軿錫嘉福兮億萬斯年初獻奏夀平之章玉斚肅陳兮明光桂漿初醖兮信芳臣心廸恵兮捧觴醴齊載徳兮馨香靈慈徽眷兮矞皇勤仰止兮斯徜徉亞獻奏嘉平之章考鐘拂舞兮再進瑶觴翼翼昭事兮次第肅將睟顔容與兮蒼几輝煌穆穆居歆兮和氣洋洋生民望澤兮仰睨玉房榮泉瑞露兮慶無疆終獻奏雍平之章終獻兮玉斚清肅秬鬯兮薦㣲誠磬管鏘鏘兮協氣升盈盈㫖酒兮勿替思成尚其醉止兮懐嘉生八龍蜿蜒兮苞羽和鳴徹饌奏熙平之章盥薦畢兮精白申虞燕娭兮勞帝神百辟肅雍兮傾罍尊福施下逮兮宜祐人民送神奏太平之章嘉徳夙成兮晻藹壇場穆思廻盼兮雲駕洋洋山河日月兮朗曜崇深青龍按節兮白虎低昻洪鈞滌蕩兮妖孽潜消我求時恵兮感思馨香鳴玉鏘金兮肅若有望紫壇嶻嶪兮赫赫皇皇臣乗寳厯兮載須我輔願䝉博産兮河岳鍾良天施地育兮不可殫究殖我嘉師兮沐浴休光望燎奏安平之章雷車電邁兮飛逺揚有䖍秉火兮焫越芳繁㑹賁鏞兮奮龍旂俾爾昌熾兮降蕭光烝民歌福兮富夀康予獲疇祉兮萬億斯皇皇帝還宫導迎樂奏祐平之章皇天有命列聖承之我后配徳文匡武綏海隅寕謐神靈宴娭於萬斯年流慶降釐乾隆七年重定迎神奏始平之章欽承純祐兮於昭有融時維永清兮四海攸同輸忱元祀兮從律調風穆將景福兮迺眷㣲躬淵思髙厚兮期亮天工聿章彛序兮夙夜宣通雲軿延佇兮鸞輅空濛翠旗紛裊兮列缺豐隆肅始和暢兮恭仰蒼穹百靈祇衛兮齋明辟公神來燕娭兮惟帝時聰協昭慈恵兮逖鑒臣𠂻奠玉帛奏景平之章靈旂爰止兮樂在縣執事有恪兮奉玉筵聿昭誠敬兮駿奔前嘉玉量幣兮相後先來格洋洋兮思儼然臣忱翼翼兮告中䖍進爼奏咸平之章吉蠲為饎兮肅豆籩升餚列爼兮敢弗䖍毛炰繭栗兮薦膏鮮致潔陶匏兮香水泉願垂降鑒兮駐雲軿錫嘉福兮億萬斯年初獻奏夀平之章玉斚肅陳兮明光桂漿初醖兮信芳臣心廸恵兮捧觴醴齊載徳兮馨香靈慈徽眷兮矞皇勤仰止兮斯徜徉亞獻奏嘉平之章考鐘拂舞兮再進瑶觴翼翼昭事兮次第肅將睟顔容與兮蒼几輝煌穆穆居歆兮和氣洋洋生民望澤兮仰睨玉房榮泉瑞露兮慶無疆終獻奏永平之章終獻兮玉斚清肅秬鬯兮薦和羮磬管鏘鏘兮祀孔明㫖酒盈盈兮勿替思成明命顧諟兮福羣生八龍蜿蜒兮苞羽和鳴徹饌奏熙平之章一陽復兮協氣伸盥薦畢兮精白陳旋廢徹兮敢逡巡禮將成兮樂欣欣瞻九閶兮轉鴻鈞福施下逮兮佑此人民送神奏清平之章升中告成兮晻藹壇場穆思廻盻兮雲駕洋洋臣求時惠兮感思馨香願䝉博産兮多士思皇天施地育兮百穀繁昌殖我嘉師兮正直平康望燎奏太平之章隆儀告偹兮誠既將有䖍秉火兮焫越芳雷車電邁兮九龍驤紫氛四塞兮靈旂揚烝民蒙福兮順五常惟予小子兮敬戒永臧皇帝還宫奏導迎樂章崇德殷薦升燎告䖍惟聖能饗至誠天眷駕六龍臨紫烟佑命申圖籙綿臣等謹按祭祀樂歌俱重定於乾隆七年其奏樂章名則乾隆十一年奉御筆更定也方澤樂章康熙十六年定迎神奏中平之章吉蠲兮玉宇開薰風兮自南來鳯馭紛兮後先岳瀆藹兮徘徊肅展禮兮報功沛靈澤兮九垓奠玉帛奏廣平之章神州吉土兮中壇毖我郊畤兮孔嚴辟公趨蹌兮吉蠲考鐘伐鼓兮肆筵黄琮纎縞兮陳列靈光下燭兮誠悃宣進爼奏咸平之章玉爼金奏兮未央嘉餚有踐兮大房牲牷告歆兮惟恪民力普存兮肅将厚載資生兮無外几筵俯鑒兮洋洋初獻奏夀平之章匏尊泛齊兮朝踐揚博碩升庖兮鼎方清風穆穆兮靈旂張神明和樂兮舉初觴洽百禮兮禋祀罄九土兮豐穰亞獻奏安平之章江茅兮縮漿山罍雲羃兮馨香介黍稷兮芳㫖再展㣲誠兮趨蹌樂成八變兮樂只儼皇祇兮悦康終獻奏時平之章方壇兮豐薦盈㫖酒思柔兮中和平陟降從容兮駐雲軿禮成三獻兮捧玉觥含𢎞廣大兮德厚靈祐丕基兮永清徹饌奏貞平之章樽爼畢兮誠未虧黄琮告徹兮儀景暉晏隂定兮邀靈錫南訛秩兮奏薫時肅惟昭明兮孔邇覃博厚兮載羣黎送神奏寧平之章望瘞同靈旂兮雲際屯飛龍兮逝駸駸隂儀粹兮德純眷四海兮無塵配皇穹兮化宣綏百禄兮烝民皇帝還宫導迎樂奏祐平之章圜丘不辭同祀複載乾隆七年重定迎神奏中平之章吉蠲兮玉宇開薰風兮自南來鳯馭紛兮後先岳瀆藹兮徘徊肅展禮兮報功沛靈澤兮九垓奠玉帛奏廣平之章式時吉土兮中壇毖我郊兆兮孔安辟公趨蹌兮就列考鐘伐鼓兮舞干黄琮纎縞兮既奠靈光下燭兮誠丹進爼奏含平之章禮行樂奏兮未央嘉肴有踐兮大房牲牷告歆兮惟恪民力普存兮肅將厚載資生兮無外几筵來格兮洋洋初獻奏太平之章醴齊融冶兮信芳博碩升庖兮鼎方清風穆穆兮休氣翔神明和樂兮舉初觴洽百禮兮禋祀罄九土分豐穰亞獻奏安平之章一茅三􅆃兮縮漿山罍雲羃兮馨香介黍稷兮芳㫖再滌犧尊兮敬將樂成八變兮綴兆儼皇祇兮悦康終獻奏時平之章紫壇兮嘉氣盈㫖酒思柔兮和且平凛兹陟降兮心屏營禮成三獻兮薦玉觥含𢎞光大兮徳厚靈佑丕基兮永清徹饌奏貞平之章玉爼列兮庶品該黄琮告徹兮雲徘徊晏隂定兮㬢景回南訛秩兮日恢台肅惟昭明兮孔邇覃博厚兮奠九垓送神奏寧平之章望㾏同靈旂兮雲路遵飛龍蜿兮髙旻隂儀粹兮德純眷四海兮無塵配皇穹兮兩大綏下土兮烝民皇帝還宫奏導迎樂章隤爾而静持載廣生長至修祀聿來光景富媪愉元德升嶽瀆安民物亨祈榖壇樂章康熙十六年定迎神奏中平之章惟帝勤民兮求莫匪舒小民何依兮黍稷與與元日有事兮百辟趨為民請命兮食咸需遥瞻龍駕兮歴紫虛日臨黄道兮東風徐臣深昭事兮遑寧居願垂嘉惠兮大有書奠玉帛奏肅平之章民天惟食兮農事先粒我烝民兮有大田風霆流形兮雨澤霑實頴實栗兮氣化全玉帛祇奏兮禋祀䖍仰祈寰宇兮享豐年進爼奏咸平之章鼎烹兮苾芬嘉薦兮無文奉雕爼兮大武羶薌逹兮氣干雲昭普存兮民力惟明德兮馨聞初獻奏夀平之章初獻兮㫖酒盈著誠致潔兮犠尊盛儼對越兮在上惟昭明兮有融瑟黄流兮玉瓚帝心歆假兮賚嘉禎亞獻奏景平之章著尊啓兮告䖍清酤次第兮舉前禮再獻兮肅拜列瑶觴兮秩斯筵神恱懌兮如在恵我嘉生兮福便便終獻奏永平之章終獻兮㤗尊移苾芬嘉㫖兮圭瓚交馳神既醉止兮錫祉禮成於三兮陳詞願灑餘瀝兮沐羣黎臣拜手兮望雲霓徹饌奏凝平之章爼豆具陳兮庶品齊舉荷昭鑒兮靡或遺饌告徹兮玉几登歌洋溢兮式禮無違肅㣲忱兮告終事上帝居歆兮錫純禧送神奏清平之章祇奉天威兮弗敢康小心翼翼兮昭穹蒼雲垂九天兮露瀼瀼翠旂羽節兮歸何鄉臣拜下風兮意徬徨願沛汪澤兮時其雨暘望燎奏太平之章翹首兮天閶邈彼雲海兮何蒼茫焫蕭束帛兮薦馨香精誠感格兮降福穰四時順序兮百榖以昌臣同兆姓兮咸荷恩光皇帝還宫導迎樂奏祐平之章圜丘不辭同祀複載乾隆七年重定迎神奏祈平之章帝篤祐民兮求莫匪舒小民何依兮飲食惟需莫嘉於榖兮萬事權輿為民請命兮豈非在予日用辛兮百辟趨暾將出兮東風徐惟予小子兮敬盥顒孚皇皇龍駕兮穆将愉奠玉帛奏綏平之章念兹稼穡兮惟民天農用八政兮食為先雨暘時若兮玉燭全粒我烝民兮迄用康年仰三無私兮昭事䖍奉璋承帛兮慄若臨淵進爼奏萬平之章鼎烹兮苾芬嘉薦兮無文升繭栗兮惟犉羶薌逹兮干雲昭民力兮普存惟明徳兮馨聞初獻奏寳平之章初獻兮元酒盈致純潔兮儲精誠瑟黄流兮罍承酌其中兮外清明儼對越兮惟清帝心歆假兮綏我思成亞獻奏穰平之章犧尊啓兮告䖍清酤既馨兮陳前禮再獻兮祠筵光煜爚兮非烟神恱懌兮僾然惠我嘉生兮大有年終獻奏瑞平之章終獻兮奉明粢苾芬嘉㫖兮清醴既釃神其衎兮錫祉禮成於三兮陳詞願灑餘瀝兮沐羣黎臣拜手兮青墀徹饌奏渥平之章爼豆具陳兮庶品宜􅆄蠁昭臨兮荷帝慈饌告偹兮玉几登歌洋溢兮廢徹不遲肅㣲忱兮告終事上帝居歆兮錫純禧送神奏滋平之章祇奉天威兮弗敢康小心翼翼兮昭穹蒼雲垂九天兮露瀼瀼翠旂羽節兮上翺翔臣拜下風兮肅徬徨願沛汪澤兮民多盖藏望燎奏榖平之章卬首兮天閶混茫一氣兮浩無方􅡒蕭束帛兮薦馨香精誠感格兮降福穰穰四時順序兮百榖以昌臣同兆姓兮咸荷恩光皇帝還宫奏導迎樂章民者邦本食乃民天爰卜辛日大君殷薦龍角明祈有年耒耜親天下先雩祭樂章乾隆七年定迎神奏靄平之章粒我烝民兮神降嘉生雨暘時若兮百榖用成龍見而雩兮先民有程臣膺天祚兮敢不祗承念我農兮心靡寧肅明禋兮殫精誠靈皇皇兮穆以清金支五色兮罨靄蜺旌奠玉帛奏雲平之章玉帛載陳兮磬管鏘鏘為民請命兮惕弗敢康令清和兮遂百昌麥秀岐兮禾茀稂日照九兮時雨滂俾萬寳兮千斯倉進爼奏需平之章越十雨兮越五風三光昭明兮嘉氣䝉天所子兮眇躬予小子兮子萬邦紛總總兮頼皇穹犉牡鬺亨兮逹臣𠂻初獻奏霖平之章酌彼兮罍洗飶芬兮椒香愧明徳兮維馨假黍稷兮誠將願大父兮念兹衆子穆將愉兮綏以豐穰亞獻奏露平之章再酌兮醑清仰在上兮明明庶來格兮鑒誠曷敢必兮屏營合萬國兮形神精承神至尊兮思成終獻奏霑平之章三酌兮成純備物致志兮敬陳多士兮駿奔靈承無斁兮明禋維蕃釐兮媪神雨留甘兮良苖懐新徹饌奏靈平之章禮將成兮舞已終徹弗遲兮畏神恫願留福兮恵吾農神之貺兮協氣融遂及私兮越我公五者來備兮錫用豐送神奏霮平之章祥風瑞靄兮彌靈壇上帝居歆兮風肅然左蒼龍兮右白虎般裔裔兮糺縵縵仰九閶兮返御介祉釐兮康年望燎奏霈平之章碧翏翏兮不可度思九奏終兮爟火哲而神光四燭兮休氣夥頤安匪舒兮抑抑威儀帝求民莫兮日鑒在兹錫福繁祉兮庶徴曰時皇帝還宫奏導迎樂章炎夏初届憫我穡夫為民請命法駕載塗明徳馨誠意孚禾稼登斯樂胥大雩童子舞雲漢詩乾隆七年御製瞻彼朱烏爰居實沈協紀辨律羽蟲徴音萬物芸生有壬有林有事南郊陟降維欽瞻仰昊天生物為心右第一章維國有本匪民伊何維民有天匪食則那螻蟈鳴矣平秩南訛我祀敢後我樂維和鼉鼓淵淵童舞娑娑右第二章自古在昔春郊夏雩曰惟龍見田燭朝趨盛禮既陳神留以愉雷師闐闐飛亷衙衙曰時雨暘利我新畬右第三章於穆穹宇在郊之南對越嚴恭上帝是臨繭栗量幣用将悃忱惴惴我躬肅肅我心六事自責仰被桑林右第四章權輿粒食實維后稷百王承之永奠邦極惟予小子臨民無徳敢懈祈年潔𠂻翼翼命彼秩宗古禮是式右第五章古禮是式值兹吉辰玉磬金鐘大羮維醇元衣八列舞羽繽紛既侑上帝亦右從神尚鑒我𠂻錫我康年右第六章惟天可感曰惟誠恪惟農可稔曰惟