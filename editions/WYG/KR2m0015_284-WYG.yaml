地皆内屬設總統將軍總理天山南北全境並駐參贊大臣領隊大臣等官恊同管轄無定員兼設同知等員分理屯田各事務御定平定凖噶爾勒銘伊犁碑文惟天盡所覆俾我皇清罔不在宥惟清奉昊天撫薄海兆庶悉主悉臣叶太祖太宗世祖肇基宅中皇耆其武聖祖世宗覲光揚烈克臻郅隆逮予藐躬思日孜孜期四海同風咨汝準噶爾叶亦蒙古同類何自外擕數世梗化簒奪相仍碩仇其下厥逹瓦齊甚毒於酲衆心疧疧如苗斯蟊如虺斯螫衆口嗷嗷視爾嗷止予焦勞止期救不崇朝止視爾疧止予噫嘻止亟出汝塗泥止迺命新附爾為先鋒熟悉其路迺命勁旅擕數月糧毋或掠擄師行時雨王旅嘽嘽亦無潦阻左旋右抽王旅渾渾既暇以休烏嚕木齊及五集賽度之折折台吉宰桑迎降恐後奚事斧吭波羅塔拉闥爾竒領險如闗闔倒戈反攻達瓦齊走早夕塗窮回部遮獲彼䑕斯喙地入無隙露布飛至受俘午門爰貸其罪自今以始四部我臣伊犁我宇叶曰綽羅斯及都爾伯特和碩特輝特封四可汗衆建王公游牧各安宰桑公臣屬我旗籍誰汝苦辛爾恭爾長爾孶爾㓜徐以教養爾駝爾牛爾羊爾馬畜牧優游分疆各守毋相侵凌以干大咎齊禦外域曰布魯特越哈薩克酔飲飽食敬興黄教福自天錫伊犁平叶矣勒貞珉叶矣於萬斯年矣御製平定凖噶爾後勒銘伊犁碑文天之所培者人雖傾之不可殛也天之所覆者人雖栽之不可殖也嗟汝凖噶爾何狙詐相延以世而為賊也强食弱衆凌寡血人於牙而蔑知悛易也云興黄教敬佛菩薩其心乃如夜叉羅刹之以人為食也故罪深惡極自作之孽難逭活也先是分封四部衆建宰桑四圖什墨廿一昻吉葢欲繼絶舉廢以休以息也而何煽亂不已焦爛為期終於淪亡胥盡伊犁袤延萬里寂如無人之域也是非我佳兵不戢以殺為徳也有弗得已耳西師之什實紀其詳悉也以其反覆無常遲益久而害益深則其叛亂之速未嘗非因禍而致福也是葢天佑我皇清究非人力也伊犁既歸版章久安善後之圖要焉已定者豈宜復失也然屯種萬里之外又未可謂計之得也其黙移潛運惟上蒼鑒之予惟奉時相機今日之下亦不敢料以逆也是平定凖噶爾後勒銘伊犁之碑所由作也伊犁東北路地海努克在伊犁城東乾隆二十七年建堡一固爾扎在伊犁河北岸乾隆二十七年建城一賜名安逺城烏哈爾里克在伊犁河北岸乾隆二十七年建城一賜名綏逺城塔哩竒在伊犁河北岸乾隆二十七年建城一阿里瑪圖在伊犁東北五十里烏爾圖固爾畢在阿哩瑪圖東北九十里博囉布爾噶蘇在烏爾圖固爾畢東北六十里自海努克至此唐時皆為西突厥突騎施部遥置為嗢鹿州都督府地其東北接為烏嚕木齊西界伊犁東南路地都爾伯勒津在伊犁東一百二十里崆吉斯在都爾伯勒津東南三百二十里形勢寛廣宜於耕牧為伊犁東南最近要地自都爾伯勒津至此唐時亦為西突厥突騎施部束境遥置為嗢鹿州都督府地哈什在崆吉斯之北形勢與崆吉斯相連屬為伊犁東最近要地珠勒都斯在崆吉斯東南二百里其地東西六百里南北二百里山水圍抱形勢尤勝為伊犁東南要地自珠勒都斯左右地方唐時皆為突厥䑕尼施處半部遥置為鷹娑都督府地哈布齊垓在珠勒都斯東一百八十里登努勒台在哈布齊垓之東北近天山南麓自此而東接烏嚕木齊界其東南踰天山通闢展界伊犁西北路地哈討在伊犁河北岸摩垓圖在哈討北一百里哲克得在摩垓圖北八十里雅木里克在哲克得西北六十里徹臣哈喇在雅木里克西北五十里哈喇塔拉在徹臣哈喇之西達朗呼都克在哈喇塔拉之西托博隴在達朗呼都克之西庫克車勒在托博隴之西圖古哩克在庫克車勒之西自哈討至此皆在伊犂河下流之北巴爾噶什淖爾之南唐時為西突厥咄利失可汗分界處後為突騎施部所有唐遥置為絜山都督府地自此而北為巴爾噶什淖爾其西北通哈薩克界奎屯自圖古哩克折而南當伊犁河南界庫爾圖在奎屯東十里古爾班阿里瑪圖在庫爾圖東二十里塔拉噶爾在古爾班阿里瑪圖東四十里圖爾根在塔拉噶爾東二十里古爾班察畢達爾在圖爾根東三十里古爾班沙集垓在古爾班察畢達爾東三十里塔拉錫克在古爾班沙集垓南四十里沙塔圖在塔拉錫克南六十里庫爾木圖在沙塔圖西三十里古爾班呼蘇台在庫爾木圖西三十里古爾班薩里古古爾班呼蘇台西三十里自奎屯至此皆在伊犁河下流之南圖斯庫勒之北唐時為西突厥咄陸可汗分界處後為突騎施部所有唐遥置為絜山都督府地自此而北接圖斯庫勒界伊犁西路地庫納薩爾在伊犁西南一百六十里烏蘭哈勒噶在庫納薩爾西二百里濟爾噶朗在烏蘭哈勒噶南十里圖爾根察在濟爾噶朗之西南古爾班哲爾格斯在圖爾根察之西阿爾什圖在古爾班哲爾格斯之西特布克在阿爾什圖之西頁特庫斯在特布克之西自圖爾根察至此為圖斯庫勒東南岸招哈在頁特庫斯西四十里古爾班伊勒噶齊在招哈西三十里巴勒衮在古爾班伊勒噶齊西二十里塔瑪噶在巴勒衮西二十里托薩爾在塔瑪噶西十五里通在托薩爾西十五里阿克賽在通西二十里烘郭爾鄂隴在阿克賽西二十里自招哈至此為圖斯庫勒南岸什巴爾圖和碩在濟爾噶朗之西北為圖斯庫勒東北岸哈喇諾海在什巴爾圖和碩西五十里推托墨克在哈喇諾海西一百里察巴噶圖在推托墨克西三十里和約爾察罕烏蘇在察巴噶圖西三十里古爾班克敏在和約爾察罕烏蘇西八十里自哈喇諾海至此為圖斯庫勒北岸和什噶爾在圖斯庫勒西岸裕勒阿里克在圖斯庫勒西岸自庫納薩爾至此皆環圖斯庫勒四境唐時為突厥之碎葉川地突騎施烏質勒移建大牙於此其後别部蘇禄復居其地吹在圖斯庫勒西北二百里自此沿吹河西北行五百餘里統名曰吹薩勒濟圖在吹河南岸沙穆什在薩勒濟圖西二十里格格圖布拉納在沙穆什西三十里阿什圖在格格圖布拉納西北二十里達布蘇圖在阿什圖西南三十里阿爾察圖在達布蘇圖西三十里伊蘭巴什在阿爾察圖西南五十里庫努克薩爾在伊蘭巴什西四十里索郭魯克在庫努克薩爾四十里哈喇巴爾圖在索郭魯克西三十里古爾班哈納圖在哈喇巴爾圖西三十里阿什布里在古爾班哈納圖西五十里和爾衮在吹河下流地方自薩勒濟圖至此皆在圖斯庫勒之西北境沿吹河南岸唐時為突厥之千里細葉川異姓突厥居之其西踰沙磧通哈薩克界英阿爾在圖斯庫勒南二百餘里博得里克在英阿爾西南一百里額得墨克在博得里克西一百里為塔拉斯河上流發源之處唐時為突厥弩矢畢部地塔拉斯在額得墨克之西為塔拉斯河下流左右之地唐時為突厥之干泉突厥統葉䕶可汗建庭於此烏嚕穆瑪拉爾在塔拉斯河上流西一百里特穆爾哈巴哈納在烏魯穆瑪拉爾西一百里薩爾巴哈什在特穆爾哈巴哈納西南二百里自英阿爾至此皆在圖斯庫勒之西南境其西北通哈薩克界南踰山通布嚕特界以上為伊犁屬地皇朝文獻通考卷二百八十四
