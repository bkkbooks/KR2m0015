body:
  text: 輿地考十六西域臣等謹按西域之名始見於漢史自玉門陽闗而外直抵葱嶺其在天山以北為烏孫諸國地天山以南為城郭三十六國地班范二書西域傳所載道里逺近形勢宛然大約各君其國自相雄長終漢之世時通時絶雖有都䕶校尉之設聊示羈縻而已唐代西突厥居天山之北龜兹焉耆諸國居天山之南當貞觀永徽盛時分設北庭安西都䕶開置四鎮其地之列為州府者往往各就其部落稱之而版籍不登於司徒貢賦不入於天府有駕馭之名而實鮮開闢之實此無他地既荒逺人復鷙悍中外逈絶控制為難厯代以來凡其名稱之沿革疆域之分併且有未能深悉者矣我國家統一函夏式廓丕基薄海内外罔不欵服維凖噶爾以元代强臣遺孽竄處西陲據有伊犁役屬回部竟敢恃其險逺自外生成我聖祖仁皇帝三征朔漠克奏膚功其餘衆退保故巢復成部落世宗憲皇帝嗣位以後遣師致討未及掃穴犁庭逮我皇上御極二十年中亦未嘗一加撻伐聴其自生自息於天地之間豈復有㡬㣲利其土地人民而為佳兵黷武之事無何蠢爾凖夷自尋禍亂其部衆欵闗内附相望於途天子命將出師用聲厥罪長驅而入徑繫其酋乃甫與輯安旋生逃叛斯地斯民水深火熱洎乎王師繼進重定伊犁回部二酋復敢負恩助逆抗我師顔用是上厪睿謨再申天討我皇上指授方畧無不曲中情形於萬里之外是以五年之内兩集大勲天山南北悉歸綏定此以見天之仁愛斯民必欲使之入我版圖共霑聲教惟聖主奉天時若運籌决䇿洞悉機宜用以丕拓逺圖迪光先烈由此休養生息保艾奠安億萬斯年垂之無極矣天山北路臣等謹按天山為葱嶺分支即漢書西域傳所謂北山也漢之烏孫匈奴唐之突厥皆随畜牧逐水草與龜兹於闐諸國之土著者不同並以天山為之限今之西域新疆北為凖部故地南為回部故地風氣之分其來久矣夫自古行國居國種類各殊而其習俗之獷悍兵力之驍雄則山北尤為强國凡山南之城郭君長率多服屬之漢唐之世逼近塞垣乗勝角逐雖結之以繒幣重之以和親猶難保其終不内犯也明初自衛拉特建國雄長諸酋宣徳以後脫歡額森稱號太師往往誘脅諸部窺伺塞下葢邉徼之患無代無之威之以力則客主既殊制之以謀則要領未悉即有一二英武之主奮發有為亦不過攘之境外而止從未有收其全部入我版圖者我皇上智勇天錫超越百王先機制勝獨操神斷故師行衽席罙入其庭拓地之遥罕有倫比自登天朝輿籍以來以伊犁為總統之區以烏嚕木齊為孔道之要以雅爾為封守之固而又南有回部諸城為之襟帶西北有哈薩克布嚕特諸部為之屏翰於是計里興屯因方築堡開荒裔之土田皆成沃壤起大䝉之亭障不限提封舉從古狉獉睢盱之地一變而為廬井桑麻共歸耕鑿從兹山河表裏樂業安生永享太平之福豈非斯土斯人之厚幸歟天山北路漢時為烏孫國其東境兼為蒲類諸國北境兼為匈奴右部地北魏時為悅般國其東北境兼為髙車及蠕蠕國地後周時盡入於突厥唐初西突厥强盛部落皆散處天山以北其東境又兼為東突厥地太宗既擒突厥頡利諸部相繼降附遥置各州設北庭大都䕶府以統之後賀魯來降置瑶池都督府永徽初以賀魯叛廢都督府顯慶以後擒滅賀魯復以諸部遥置各都督府有金滿沙陀二州都督府隂山大漠元池三都督府鹽泊雙河匐延嗢鹿絜山鷹娑六都督府並𨽻于北庭都䕶天寶初又置北庭節度使治北庭都䕶府後逢安史之亂其地漸與中土濶絶各府州亦相繼淪廢唐末突厥為諸夷所侵至五季時漸以式微宋代聲教不及史無可紀元太祖肇迹北方蕩平西域多以皇子諸王統軍鎮之此為勒穆爾部其東境兼為回鶻三城地元亡而其强臣蒙克特穆爾據之其部落曰衛拉特在韃靼之西吐魯畨之北後其衆分而為三其渠有馬哈木者尤雄於部内數與韃靼酋長阿魯台相讐明永樂時阿魯台既受封為和寧王馬哈木亦内附封為順寧王其後擁兵將入犯明帝親征破其衆於呼蘭和實衮追至圖拉河而還馬哈木復修貢職其子脫歡嗣封順寧王於宣徳年間襲殺阿嚕台欲自稱汗而衆不附乃求元後托克托布哈立之自為丞相居漠北凡䝉古諸部俱屬焉脫歡死子額森嗣稱太師衆益强托克托布哈不能制正統時額森脅諸畨大舉入冦明師覆於土木既而額森弑其主自立以其次子為太師東自烏梁海野人西至䝉古赤金哈宻皆受約束額森入貢於明自稱大元田盛大汗明帝詔稱為衛拉特汗額森恃强盛益驕景泰中阿拉知院攻額森殺之額森諸子始不復居漠北而衛拉特之衆亦以分散其承襲代次無可考嘉靖以後又數為土魯畨哈宻所侵掠勢益寖衰至國初時復自成部落曰凖噶爾傳至巴圖魯台吉於順治七年曾遣使入貢其子僧格繼之僧格被弑其弟噶爾丹繼益强盛自稱博碩克圖汗因與喀爾喀相争䦨入我邉塞聖祖仁皇帝親整六師自康熙二十八年至三十五年三征朔漠噶爾丹戰敗走死其姪策妄阿拉布坦收其父僧格舊屬及噶爾丹遺衆復自據汗位子噶爾丹策凌繼之至策妄多爾濟那木扎爾嗣立其庶兄喇嘛達爾扎簒而奪之尋又為達瓦齊所簒於是部衆内潰欵塞來歸者接踵於道皇上乃出師兩路討之於乾隆二十年春抵其境其所屬之台吉宰桑等相率迎降凡三月直抵伊犁擒其酋達瓦齊伊犁平越月阿睦爾撒納叛大兵追討之阿睦爾撒納奔哈薩克二十二年大兵分道並進阿睦爾撒納自哈薩克來還博囉塔拉等處與大兵遇復奔追及哈薩克哈薩克降阿睦爾撒納遂奔俄羅斯而死其餘黨以次擒滅凖噶爾全境悉定其部舊稱四衛拉特曰綽羅斯部曰都爾伯特部曰和碩特部曰土爾扈特部後土爾扈特部西遷復以輝特部為四衛拉特之一而綽羅斯世為之長其餘各部皆為衆台吉其地有二十四鄂拓克九集賽二十一昻吉鄂拓克為其汗之屬户每一鄂拓克或千戸至數千戸不等各有宰桑司之其供賦皆上之於汗集賽所出賦則以供應喇嘛事務其昻吉為各台吉之屬戸而仍統屬於其汗自平定以後其地皆内屬恭載御製平定凖噶爾告成太學碑文遼矣山戎薫粥旃裘毳幕之人界以龍沙畜其驒奚雖無恒業厥有分部葢自元黄剖判萬物芸生東夷西夷各依其地謬舉淳維未為理據皇古莫紀其見之書史者自周宣太原之伐秦政亘海之築莫不畏其侵軼猾夏是虞自時厥後一二奮發之君慨然思挫其鋒而納之宥然事不中機材不副用加以地逺無定處故嘗勞衆費財十損一得搢紳之儒守和親介胄之士言征伐征伐則民力竭和親則國威䘮於是有守在四夷羈縻不絶地不可耕民不可臣之言興矣然此以論漢唐宋明之中夏而非謂我皇清之中夏也皇清荷天之龍興東海撫華區有元之裔久屬版章嵗朝貢從征狩執役惟謹凖噶爾厄魯特者本有元之臣僕叛出據西海終明世為邉患至噶爾丹而稍强吞噬鄰蕃䦨入北塞我皇祖三臨朔漠用大破其師元惡伏冥誅脅從逺遯跡毋俾遺種於我喀爾喀厥姪策妄阿拉布坦收其遺孽僅保伊犁故嘗索俘取地無敢不共逮夫部落兹聚乃以計襲哈宻入西藏凖夷之勢於是而復張兩朝命将問罪雖屢獲捷而庚戍之役逆子噶爾丹策凌能用其父舊人乘我師怠掠畜於巴里坤擣營於和卜多於是而凖夷之勢大張然地既險逺主客異焉此勞往而無利彼亦如之故額爾徳尼招之敗彼亦以彼貪利而深入也皇考謂我武既揚不可以既允其請和以息我衆予小子敬奉先志無越思焉既而噶爾丹策凌死于策妄多爾濟那木扎爾暴殘喇嘛逹爾扎簒奪之逹瓦齊又簒奪喇嘛達爾扎而酗酒虐下尤甚焉癸酉冬都爾伯特台吉策凌等率數萬人來歸越明年秋輝特台吉阿睦爾撒納和碩特台吉班珠爾又率數萬人來歸朕謂來者不可以不撫而撫之莫若因其地其俗而善循之且毋令滋方來之患於我喀爾喀也於是議進兩路之師問彼罪魁安我新附凡運餉籌䭾長行利戰之事悉備議之始熟經於庚戌之艱者咸懼蹈轍惟大學士忠勇公傅恒見與朕同而新附諸台吉則求之甚力朕謂犁庭掃穴即不敢必然喀爾喀之地必不可以久居若而人毋寧用其鋒而觀厥成即不如志亦非所悔也故凡禡旗命將之典概未舉行亦云偏師嘗試為之耳塞上用兵必以秋而阿睦爾撒納禡木特請以春月欲乘彼馬未肥則不能遯朕謂其言良當遂從之北路以二月丙辰西路以二月己巳各起行哈宻瀚海向無雨今春乃大雨咸以為時雨之師入賊境凡所過之鄂拓克擕羊酒糗糒迎恐後五月乙亥至伊犁亦如之達瓦齊於格登山麓結營以待兵近萬我兩將軍議以兵取則傷彼必衆彼衆皆我衆多傷非所以體上慈也丁亥遣阿玉錫等二十五人夜斫營覘賊向賊兵大潰相蹂躙死者不可勝數來降者七千餘我二十五人無一人受傷者達瓦齊以百餘騎竄六月庚戌回人阿竒木霍集斯伯克執達瓦齊來獻軍門凖噶爾平是役也定議不過二人籌事不過一年兵行不過五月無亡矢遺鏃之費大勲以集遐壤以定豈人力哉天也然天垂佑而授之事機設不奉行之以致坐失者多矣可與樂成不可與謀始亦謂蚩蚩之衆云爾豈其卿大夫之謂既克集事則又曰茍知其易將勸為之夫明於事後者必將昧於幾先朕用是寒心且凖噶爾一小部落耳一二有能為之長而其樹也固焉一二暴失徳之長而其亡也忽焉朕用是知懼武成而勒碑文廟例也禮臣以為請故據實事書之其辭曰茫茫伊犁大幹之西匪今伊昔化外羈縻條支之東大宛以南随畜獵獸蟻聚狼貪乃世其惡乃恃其逺或激我攻而乘我緩其計在斯其長可窮止戈靖邉化日薫風不侵不距不來其那欵闗求市亦不禁訶始幕希珎終居竒貨吏喜無事遷就斯愞漸不可長我豈懼其豈如宋明和市之為既知其然飭我邉吏弗縱弗嚴示之節制不仁之守再世斯斬篡奪相仍飄忽荏苒夙沙革面煎鞏披惋集泮飛鴞食黮懐音錫之爵位榮以華裾膝前面請願効前驅兵分兩路雪甲霜鋒先導中堅如鼂錯攻益以後勁蒙古舊屬八旗子弟其心允篤二月卜吉牙旗飄颻我騎斯騰無待折膠泉涌於磧蕪茁於路我衆歡躍謂有天助非啻我衆新附亦云黄髮未覩水草富春烏嚕木齊波羅塔拉台吉宰桑紛紛欵納牽其肥羊及馬潼酒獻其屠耆合掌雙手予有前諭所禁侵陵以茶交易大愉衆情衆情既愉來者日繼蠢達瓦齊擁兵自衛依山據淖惟旦夕延有近萬人其心十千勇不目逃掄二十五日阿玉錫率往賊所銜枚夜襲直入其郛揮矛拍馬大聲疾呼彼人既離我志斯合突將無前縱横鞺鞳案角鹿埵隴種東籠自相狼藉孰敢攖鋒􅈢竄䑕逃將往異域回部遮之兇渠斯得露布既至告廟受俘凡此蕆功荷天之衢在古周宣二年乙亥淮夷是平常武詩載越我皇祖征噶爾丹命將禡旗亦乙亥年既符嵗徳允協師貞兵不血刃漠無王庭昔時準夷弗恭弗穗今随師行為師候尉昔時凖夷日戰夜征今也偃卧知樂人生曰匪凖夷曰我臣僕自今伊始安爾遊牧爾牧爾耕爾長孫子曰無向非豈有今是兩朝志竟億載基成側席不遑保泰持盈御製凖噶爾全部紀畧自古無不誌外夷而實者少舛者多非以其方域所限言語不通耶得什一於千百加以魚魯亥豕其堪信者鮮矣兹者平定凖部止封達瓦齊子一人居之京都且城伊犁駐將軍鎮守事耕牧焉念彼原一大部落不可無紀故就親詢實事書之亦以便方畧纂敘也凖噶爾四衛拉特者綽羅斯部都爾伯特部和碩特部土爾扈特部是其輝特一部本附庸於都爾伯特後土爾扈特竄歸俄羅斯故别輝特為一部仍稱四衛拉特云衛拉特明史稱為瓦剌其音頗近史所載脫歡太師葢其始祖元亡而其疆臣分為三其渠曰馬哈木者即脫歡之父也脫歡者䝉古凖語同為釡今凖人語釡為海蘇而䝉古語則仍舊葢凖人自避其祖諱此亦一證也自脫歡逮孛汗其世次不可考孛汗背正妻與他婦野合而生子曰烏林台巴靼太師其母棄之澤中孛汗收養之遂統部落又十一世而傳至賽音諾顔哈喇忽喇是為策妄阿拉布坦之曾祖子曰巴圖魯渾台吉有子十一人五曰僧格策妄之父六曰噶爾丹博碩克圖其餘無事無足稱長曰策臣次曰巴圖魯策臣與巴圖魯殺其弟僧格噶爾丹博碩克圖始自藏中回舊部反俗為汗於康熙年間犯塞戰敗走死先是噶爾丹博碩克圖既殺兄僧格之次子索諾木阿拉布坦僧格臣七人與策妄阿拉布坦同逺逃凖語所謂多倫努庫爾者是多倫者漢語為七努庫爾者漢語為友葢其患難相共所謂世臣並赦其子孫七死云及噶爾丹為我兵敗策妄始還和博克薩里收其父舊屬及噶爾丹餘衆復成部落并縛噶爾丹子獻闕下遂自據汗位子噶爾丹策凌噶爾丹策凌子策妄多爾濟及那木扎爾其庶兄喇嘛達爾扎執而篡之達瓦齊復因阿睦爾撒納之計簒奪其位達瓦齊者巴圖魯渾台吉之第七子布木之子大策零敦多卜之孫於策妄為再從姪孫其小䇿零敦多卜則䇿妄之祖巴圖魯渾台吉之弟黙爾根代青之曾孫其去策妄世派葢已逺矣先是康熙年間噶爾丹博碩克圖拘繫和碩特車臣汗收所屬人衆併入凖噶爾鄂托克其時有和碩特之拉藏汗者居唐古特忒地即顧實汗之裔也子二人一名丹衷一名索爾扎丹衷由唐古忒仍回至厄魯特娶䇿妄阿拉布坦之女博托洛克為妻後䇿妄阿拉布坦知其學習哈拉爾查達術即巫蠱事也以兩釡夾丹衷身烙死遂令大策零敦多卜領兵六千襲西藏擒殺拉藏并擄伊子索爾我聖祖仁皇帝勅諭䇿妄阿拉布坦不得繹騷唐古忒地並發大兵進剿於是大策零敦多卜携索爾扎逃回厄魯特藏地復平迨雍正年間策妄阿拉布坦死子噶爾丹䇿凌欲與唐古忒和好給索爾扎戸十資養並以博托洛克與韋徴和碩齊為妻其在丹衷處所生子班珠爾給戸五資養彼時博托洛克復有孕未産適韋徴和碩齊後乃生一子是曰阿睦爾撒納故阿睦爾撒納雖為輝特台吉實與班珠爾皆丹衷之子噶爾丹策凌死策妄多爾濟那木扎爾恐索爾扎之子納哈查逃往唐古忒將伊禁錮至達瓦齊簒立始將納哈查釋放又和碩特羅卜藏車凌者娶䇿妄阿拉布坦之女達什色布騰為妻噶爾丹策凌時因羅卜藏車凌率領伊屬萬戸欲往土爾扈特遂遣兵擒藏羅卜藏車凌囚之以其妻給韋徴和碩齊二子交烏魯特鄂拓克宰桑伍巴什安置至青海居住之羅卜藏丹津於策妄阿拉布坦時逃至凖噶爾策妄阿拉布坦死後羅卜藏車凌羅卜藏丹津二人謀殺噶爾丹策凌嗣因羅卜藏丹津被拘羅卜藏車凌恐亦被囚遂逃往土爾扈特故雍正年間我世宗憲皇帝索羅卜藏丹津噶爾丹策凌稱已縛送至中途聞進兵而止者非詐也葢彼業經拘繫之囚故不靳固而且欲以為竒貨也噶爾丹策凌於丑年死策妄多爾濟那木扎爾年㓜其姊鄂蘭巴雅爾同母出也每以善言相勸禁其淫亂策妄多爾濟那木扎爾年既長遂不受其禁制並聴讒言謂其姊欲效我羅斯其立為扣肯汗扣肯汗者女人掌國事也遂將鄂蘭巴雅爾拘繫並殺戮多宰桑其後屠狗盜妻之事無所不為益無忌憚鄂蘭巴雅爾之夫薩因伯勒克遂同噶爾丹策凌庶子喇嘛達爾扎攻執策妄多爾濟那木扎爾喇嘛達爾扎遂簒汗位有噶爾丹策凌㓜子策旺達什者阿睦爾撒納班珠爾欲誘出策旺達什立為汗後被喇嘛達爾扎知覺遂殺策旺達什阿睦爾撒納班珠爾二人慫慂達瓦齊云喇嘛達爾扎既將與爾同仇之達什達瓦小策凌敦多卜之子殺戮恐禍將及爾於是達瓦齊阿睦爾撒納班珠爾三人同逃哈薩克至申年達瓦齊阿睦爾撒納班珠爾復回舊遊牧處阿睦爾撒納遂殺其兄沙克都爾據其衆復與伊犁喇嘛等合謀殺害喇嘛達爾扎立達瓦齊為汗其次即阿睦爾撒納用事二人仍屬親厚有達什達瓦姪訥黙庫濟爾噶爾者欲與達瓦齊分領凖噶爾猝領兵一萬至伊犁與達瓦齊戰達瓦齊敗至舊逰牧額米爾處與阿睦爾撒納會因阿睦爾撒納計誘執納黙庫濟爾噶爾誅之凖噶爾衆仍立達瓦齊為汗達瓦齊聴伊犁衆宰桑言與阿睦爾撒納生隙阿睦爾撒納本垂涎汗位既失望遂與班珠爾納哈查及都爾伯特納黙庫等㑹同哈薩克將額米爾一帯住牧者肆行擄掠且耕種額爾齊斯為自固計達瓦齊凡三遣兵剿阿睦爾撒納皆不克其後自領兵三萬至阿睦爾撒納遊牧之額爾齊斯蹙之阿睦爾撒納勢不敵始投誠來歸此凖噶爾始終搆亂所由也至凖噶爾鄂拓克昻吉之名各異者鄂拓克為其汗之部屬昻吉為各台吉之户下舊鄂拓克凡十有二烏魯特有四宰桑人五千户為一鄂拓克喀拉沁有一宰桑人五千户為一鄂拓克額爾克騰有一宰桑人五千户為一鄂拓克克里野特有二宰桑人六千户為一鄂拓克卓托魯克有一宰桑人三千户為一鄂拓克布庫斯有一宰桑人三千户為一鄂拓克阿巴噶斯哈丹各有一宰桑共人四千户為一鄂拓克鄂畢特有一宰桑人三千户為一鄂拓克羅岱有二宰桑人三千户為一鄂拓克多果魯特有一宰桑人四千户為一鄂拓克霍爾博斯有一宰桑人三千户為一鄂拓克綽和爾有一宰桑人三千戸為一鄂拓克其後復立鄂拓克十有二巴爾達木特有三宰桑人四千户為一鄂拓克庫圖齊納爾有五宰桑人四千户為一鄂拓克噶爾雜特有三宰桑人四千户為一鄂拓克沙拉斯有二宰桑人三千户為一鄂拓克嗎唬斯有一宰桑人五千户為一鄂拓克布庫努