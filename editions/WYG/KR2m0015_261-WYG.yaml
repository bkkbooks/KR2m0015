  text: 欽定四庫全書皇朝文獻通考卷二百六十一
  hash: sha256:224eefb4bf2b8e2d438f1ceff979da09cf9ddcd9907573941ae44ab8158a9b8e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_261-1a, image: WYG0638/WYG0638-0107c.png}
body:
  text: 象緯考六極度偏度臣等謹按西法謂地居天中其體渾圓與天度相應即渾天家卵黃之説也天半覆地上半繞地下日出地上為晝入地下為夜此終古不易者也人居赤道北者北極見南極隱居赤道南者南極見北極隱近極則見極高逺極則見極低東方日中西方夜半南方日中北方夜半此易地殊觀者也周天三百六十度半在地上者為一百八十度天頂距地極距赤道皆九十度黃道出入赤道南北各二十三度二十九分京師北極出地三十九度五十五分則天頂距極五十度五分而赤道距天頂亦三十九度五十五分自京而北二百里而極高一度自京而南二百里而極低一度而日月星之出入晝夜之長短因之而異是為南北里差自京而東一度而時遲四分自京而西一度而時早四分而交節之後先日月食之早晚因之而殊是為東西里差此由人居地面隨在所見不同者也明史天文志列北極高度東西偏度謂惟兩京江西廣東四處係實測其餘皆據地圖約計我朝於各省及䝉古囘部金川皆經實測以推晝夜節氣時刻亦從古所未有也爰備列之京師北極高三十九度五十五分晝夜刻分節氣宫度詳前日月行道自盛京以下偏東偏西及節氣遲早皆準京師别之盛京北極高四十一度五十一分偏東七度十五分夏至晝冬至夜各六十刻四分夏至夜冬至晝各三十五刻十一分節氣時刻遲二十九分尼布楚北極高五十一度四十八分偏西十七分夏至晝冬至夜各六十五刻十三分夏至夜冬至晝各三十刻二分節氣時刻早一分黑龍江北極高五十度一分偏東十度五十八分夏至晝冬至夜各六十四刻十分夏至夜冬至晝各三十一刻五分節氣時刻遲四十四分三姓北極高四十七度二十分偏東十三度二十分夏至晝冬至夜各六十二刻十四分夏至夜冬至晝各三十三刻一分節氣時刻遲五十三分伯都訥北極高四十五度十五分偏東八度三十七分夏至晝冬至夜各六十一刻十三分夏至夜冬至晝各三十四刻二分節氣時刻遲三十四分吉林北極高四十三度四十七分偏東十度二十七分夏至晝冬至夜各六十一刻一分夏至夜冬至晝各三十四刻十四分節氣時刻遲四十二分山西北極高三十七度五十三分三十秒偏西三度五十七分四十二秒夏至晝冬至夜各五十八刻八分夏至夜冬至晝各三十七刻七分節氣時刻早十六分朝鮮北極高三十七度三十九分十五秒偏東十度三十分夏至晝冬至夜各五十八刻六分夏至夜冬至晝各三十七刻九分節氣時刻同吉林山東北極高三十六度四十五分二十四秒偏東一度四十分夏至晝冬至夜各五十八刻二分夏至夜冬至晝各三十七刻十三分節氣時刻遲三分甘肅北極高三十六度八分偏西十二度三十六分夏至晝冬至夜各五十七刻十三分夏至夜冬至晝各三十八刻二分節氣時刻早五十分河南北極高三十四度五十二分二十六秒偏西一度五十六分夏至晝冬至夜各五十七刻七分夏至夜冬至晝各三十八刻八分節氣時刻早八分陜西北極高三十四度十六分偏西七度三十三分四十秒夏至晝冬至夜各五十七刻三分夏至夜冬至晝各三十八刻十二分節氣時刻早三十分江蘇北極高三十二度四分偏東二度十八分夏至晝冬至夜各五十六刻六分夏至夜冬至晝各三十九刻九分節氣時刻遲九分安徽北極高三十度三十七分偏東三十四分夏至晝冬至夜各五十六刻夏至夜冬至晝各四十刻節氣時刻遲三分四川北極高三十度四十一分偏西十二度十六分夏至晝冬至夜各五十六刻夏至夜冬至晝各四十刻節氣時刻早四十九分湖北北極高三十度三十四分四十八秒偏西二度十七分晝夜刻分同四川節氣時刻早九分浙江北極高三十度十八分二十秒偏東三度四十一分二十四秒夏至晝冬至夜各五十五刻十三分夏至夜冬至晝各四十刻二分節氣時刻遲十五分江西北極高二十八度三十七分十二秒偏西三十七分夏至晝冬至夜各五十五刻五分夏至夜冬至晝各四十刻十分節氣時刻早二分湖南北極高二十八度十三分偏西三度四十二分夏至晝冬至夜各五十五刻五分夏至夜冬至晝各四十刻十分節氣時刻早十五分貴州北極高二十六度三十分二十秒偏西九度五十二分四十秒夏至晝冬至夜各五十四刻十分夏至夜冬至晝各四十一刻五分節氣時刻早四十分福建北極高二十六度二分二十四秒偏東二度五十九分夏至晝冬至夜各五十四刻八分夏至夜冬至晝各四十一刻七分節氣時刻遲十二分廣西北極高二十五度十三分七秒偏西六度十四分夏至晝冬至夜各五十四刻四分夏至夜冬至晝各四十一刻十一分節氣時刻早二十五分雲南北極高二十五度六分偏西十三度三十七分晝夜刻分同廣西節氣時刻早五十四分廣東北極高二十三度十分偏西三度三十三分十五秒夏至晝冬至夜各五十三刻十一分夏至夜冬至晝各四十二刻四分節氣時刻早十四分阿勒坦淖爾烏梁海北極高五十三度三十分偏西二十八度四十分夏至晝冬至夜各六十七刻三分夏至夜冬至晝各二十八刻十二分節氣時刻早一百十五分汗山哈屯河北極高五十一度十分偏西二十九度夏至晝冬至夜各六十五刻三分夏至夜冬至晝各三十刻十二分節氣時刻早一百十四分唐努山烏梁海北極高五十度四十分偏西二十四度二十分夏至晝冬至夜各六十五刻三分夏至夜冬至晝各三十刻十二分節氣時刻早九十八分布嚨堪布爾噶蘇台北極高四十九度二十八分偏西十一度二十二分夏至晝冬至夜各六十四刻夏至夜冬至晝各三十二刻節氣時刻早四十五分額格色楞額北極高四十九度二十七分偏西十二度二十五分晝夜刻分同布嚨堪布爾噶蘇台節氣時刻早五十分桑錦達賚北極高四十九度十二分偏西十六度二十分晝夜刻分同布嚨堪布爾噶蘇台節氣時刻早六十五分烏蘭固木杜爾伯特北極高四十九度二十分偏西二十五度四十分晝夜刻分同布嚨堪布爾噶蘇台節氣時刻早一百零四分額爾齊斯河北極髙四十九度二十分偏西二十五度四十分晝夜刻分同布嚨堪布爾噶蘇台節氣時刻早一百三十分齋桑淖爾北極高四十八度三十五分偏西三十二度二十五分晝夜刻分同布嚨堪布爾噶蘇台節氣時刻早一百三十分肯特北極高四十八度三十三分偏西七度三分晝夜刻分同布嚨堪布爾噶蘇台節氣時刻早二十八分阿勒台山烏梁海北極高四十八度三十分偏西二十八度三十五分晝夜刻分同布嚨堪布爾噶蘇台節氣時刻早一百十六分阿勒輝山北極高四十八度二十分偏西三十六度五十分夏至晝冬至夜各六十三刻三分夏至夜冬至晝各三十二刻十二分節氣時刻早一百四十七分克嚕倫巴爾城北極髙四十八度五分三十秒偏西二度五十二分夏至晝冬至夜各六十三刻三分夏至夜冬至晝各三十二刻十二分節氣時刻早十一分圖拉河汗山北極高四十七度五十七分十秒偏西九度十二分晝夜刻分同克嚕倫巴爾城節氣時刻早三十七分科布多城北極高四十八度二分偏西二十七度二十分晝夜刻分同阿勒輝山節氣時刻早一百零九分烏里雅蘇台城北極高四十七度四十八分偏西二十二度四十分晝夜刻分同阿勒輝山節氣時刻早九十分喀爾喀河克勒和碩北極高四十七度三十四分三十秒偏東二度四十六分晝夜刻分同克嚕倫巴爾城節氣時刻遲十一分哈薩克北極高四十七度三十分偏西三十四度五十分晝夜刻分同克嚕倫巴爾城節氣時刻早一百三十九分杜爾伯特北極高四十七度五分偏東六度十六分晝夜刻分同克嚕倫巴爾城節氣時刻遲二十五分塔爾巴哈台北極高四十七度偏西三十度夏至晝冬至夜各六十二刻十分夏至夜冬至晝各三十三刻五分節氣時刻早一百二十分布勒罕河土爾扈特北極高四十七度偏西二十八度十分晝夜刻分同塔爾巴哈台節氣時刻早一百十三分巴爾噶什淖爾北極髙四十七度偏西三十八度十分晝夜刻分同塔爾巴哈台節氣時刻早一百五十三分烏隴古河北極高四十六度四十分偏西二十九度十五分晝夜刻分同塔爾巴哈台節氣時刻早一百十七分赫色勒巴斯淖爾北極髙四十六度四十分偏西二十九度十五分晝夜刻分同塔爾巴哈台節氣時刻早一百十七分和博克薩哩土爾扈特北極高四十六度四十分偏西三十一度十五分晝夜刻分同塔爾巴哈台節氣時刻早一百十分鄂爾坤河額爾德尼昭北極髙四十六度五十八分十五秒偏西十三度五分晝夜刻分同塔爾巴哈台節氣時刻早五十二分崆格扎布堪北極高四十六度四十二分偏西二十度十二分晝夜刻分同塔爾巴哈台節氣時刻早八十一分扎賚特北極高四十六度三十分偏東七度四十五分晝夜刻分同塔爾巴哈台節氣時刻遲三十一分扎哈沁北極高四十六度三十分偏西二十二度十分夏至晝冬至夜各六十一刻十分夏至夜冬至晝各三十四刻五分節氣時刻早九十二分推河北極高四十六度二十九分二十秒偏西十五度十五分晝夜刻分同塔爾巴哈台節氣時刻早六十一分科爾沁北極高四十六度十七分偏東四度三十分晝夜刻分同塔爾巴哈台節氣時刻遲十八分齋爾土爾扈特北極髙四十五度三十分偏西三十一度晝夜刻分同郭爾羅斯節氣時刻早一百零二十四分郭爾羅斯北極高四十五度三十分偏東八度十分夏至晝冬至夜各六十二刻夏至夜冬至晝各三十四刻節氣時刻遲三十三分阿嚕科爾沁北極高四十五度三十分偏東三度五十分晝夜刻分同郭爾羅斯節氣時刻遲十五分翁吉北極高四十五度三十分偏西十一度晝夜刻分同郭爾羅斯節氣時刻早四十四分薩克薩克圖古哩克北極高四十五度二十三分四十五秒偏西十九度三十分晝夜刻分同郭爾羅斯節氣時刻早七十八分哈布塔克北極高四十五度偏西二十四度二十六分晝夜刻分同郭爾羅斯節氣時刻早九十八分吹河北極高四十四度五十分偏西四十二度夏至晝冬至夜各六十一刻七分夏至夜冬至晝各三十四刻八分節氣時刻早一百六十七分博囉塔拉北極高四十四度五十分偏西三十三度三十分夏至晝冬至夜各六十一刻七分夏至夜冬至晝各三十四刻八分節氣時刻早一百三十四分烏珠穆沁北極高四十四度四十五分偏東一度十分晝夜刻分同博囉塔拉節氣時刻遲五分拜達克北極高四十四度四十三分偏西二十五度晝夜刻分同博囉塔拉節氣時刻早一百分晶河土爾扈特北極高四十四度三十五分偏西三十三度三十分晝夜刻分同博囉塔拉節氣時刻早一百三十四分安濟海北極高四十四度十三分偏西三十度五十四分晝夜刻分同博囉塔拉節氣時刻同齋爾哈什北極高四十四度八分偏西三十三度晝夜刻分同博囉塔拉節氣時刻早一百三十二分浩齊特北極高四十四度六分偏東三十分晝夜刻分同博囉塔拉節氣時刻遲二分伊犁北極高四十三度五十六分偏西三十四度二十分夏至晝冬至夜各六十一刻一分夏至夜冬至晝各三十四刻十四分節氣時刻早一百三十七分庫爾喀喇烏蘇土爾扈特北極高四十四度三十分偏西三十一度五十六分晝夜刻分同博囉塔拉節氣時刻早一百二十八分塔拉斯河北極高四十三度五十分偏西四十四度晝夜刻分同伊犁節氣時刻早一百七十三分固爾班賽堪北極高四十三度四十八分偏西十一度晝夜刻分同伊犁節