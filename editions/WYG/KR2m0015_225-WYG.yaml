  text: 欽定四庫全書皇朝文獻通考卷二百二十五
  hash: sha256:30c34dd05ecaf1a47523ecdce75cc665162c4ebae2e1d2d709b172c212eff4e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_225-1a, image: WYG0637/WYG0637-0283a.png}
body:
  text: 經籍考十五子臣等謹按諸子之名昉於七畧至荀朂以兵書術數方技併入乙部而其類愈繁馬端臨通攷依倣前志自儒家至雜藝術分二十有二門顧隂陽房中二類皆有目無書名家墨家縱横家即存書亦尠五朝續通考謹遵欽定四庫全書之例闕之餘皆依類詮次惟譜録一門増馬氏之所無兹所編輯亦分為一十八門首儒家次法家次雜家次小説家次農家譜録次天文推算五行占筮形法次兵家醫家次類書次襍藝術至于道家􅇚氏神仙别有専藏惟取其有資掌故者慎而録之附見于後猶四庫全書例也夫六藝之支流沿為諸子掇其精要原可與經史相叅我國家文教誕敷尊崇正學先儒論説經列聖之表章學者仰如星日奉為榘薙其他巵語鈴書醇疵互見而小道可觀有足以晰理致資考鏡者咸著録云子儒家御定資政要覽三卷順治十二年世祖章皇帝御撰世祖章皇帝御製序曰朕惟帝王為政賢哲修身莫不本於徳而成於學如大匠以規矩而定方圓樂師以六律而正五音凡古人嘉言善行載于典籍者皆修己治人之方可施於今者也朕孜孜圖治學于古訓覽四書五經通鑑等編得其梗概推之十三經二十一史及諸子之不悖于聖經者莫不藴涵事理成一家言但卷帙浩繁若以之教人恐未能一時盡解其義亦未能一時盡得其書因思夫記事宜提其要纂言當鈎其元乃採集諸書中之闗於政事者為三十篇又慮其渙而無統於是每篇貫以大義聮其文詞于忠臣孝子賢人亷吏畧舉事跡其貪姦不肖悖亂者亦載其内使法戒炯然加之訓詁詳其證據譬之萃衆白以為裘範六金而成鼎㫖約而易明文簡而易閲名曰資政要覽觀是書者熟思而體之可以為篤行之善人推類而廣之可以為明理之君子毋徒求之語言文字之間則朕諄諄教諭之心庶乎其不虚矣臣等謹按順治十二年大學士吕宫等奉命恭纂是書凡三十章曰君道曰臣道曰父道曰子道曰夫道曰婦道曰友道曰體仁曰宏義曰敦禮曰察㣲曰昭信曰知人曰厚生曰教化曰儉徳曰遷善曰務學曰重農曰睦親曰積善曰愛民曰慈幼曰養生曰懲忿曰窒慾曰履謙曰謹言曰慎行曰愛物每篇箋註皆出自聖裁擷義理於六經寓勸懲於百史凡修身齊家之要反復詳明仰見我世祖章皇帝大業初開勵精宵旰于以敦崇政本俾朝野咸知所激勸而共躋太平者信天下萬世所宜法守也御製勸善要言一卷世祖章皇帝御撰世祖章皇帝御製序曰朕惟天道至善即以其善賦之下民故人之生無有不善其或有不善者皆因内蔽于私欲外染于汚習遂失其繼善成性之本體而日逺于天矣因人之存心行事不同是以上天鑒察降以災祥其降祥者固以顯佑善人其不得已而降災者亦以明戒下民使之改過而遷于善也從來報應昭昭不爽詎不可畏哉古人原天垂訓以教天下正論嘉言不一而足但文之深者或不易通言之簡者又不能盡朕恭承天命撫育萬方深念上之教世勸善為先人之立身為善最樂故取諸書之要者輯為一編名曰勸善要言語不欲文期于明理詞不厭詳期于曉衆欲使賢愚同喻小大共知讀此書者當深思其義反之于心體之于身善者則益當加勉而進于淳良以求吉慶其或無知而誤染于不善者尤當速改而歸于無過以免災戾庶㡬不負上天好生之心而朕殷殷教化之意亦不虚矣凡我人民其敬勉之哉聖諭廣訓一卷世宗憲皇帝恭纂世宗憲皇帝御製序曰書曰毎嵗孟春遒人以木鐸徇于路記曰司徒修六禮以節民性明七教以興民徳此皆以敦本崇實之道為牖民覺世之模法莫良焉意莫厚焉我聖祖仁皇帝久道化成徳洋㤙普仁育萬物義正萬民六十年來宵衣旰食祇期薄海内外興仁講讓革薄從忠共成親遜之風永享昇平之治故特頒上諭十六條曉諭八旗及直省兵民人等自綱常名教之際以至于耕桑作息之間本末精粗公私鉅細凡民情之所習皆睿慮之所周視爾編氓誠如赤子聖有謨訓明徴定保萬世守之莫能易也朕纉承大統臨御兆人以聖祖之心為心以聖祖之政為政夙夜黽勉率由舊章惟恐小民遵信奉行久而或怠用申誥誡以示提撕謹将上諭十六條尋繹其義推衍其文共得萬言名曰聖諭廣訓旁徴逺引往復周詳意取顯明語多直樸無非奉先志以啟後人使羣黎百姓家喻而戸曉也願爾兵民等仰體聖祖正徳厚生之至意勿視為條教號令之虚文共勉為謹身節用之庶人盡除夫浮薄囂凌之陋習則風俗醇厚家室和平在朝廷徳化樂觀其成爾後嗣子孫並受其福積善之家必有餘慶其理豈或爽哉臣等謹按聖諭十六條聖祖仁皇帝欽頒盖體天牖下民之意垂教萬世我世宗憲皇帝復欽承至訓每條推演廣為一萬餘言詳明剴切迄今直省郡縣朔望宣讀士民肅聴者皆踴躍鼓舞蹈徳詠仁宜乎累洽重熙億萬年共遵道路也庭訓格言一卷世宗憲皇帝恭編世宗憲皇帝御製序曰欽惟皇考聖祖仁皇帝性秉生安道㕘化育臨御悠久宇宙清寧六十載聖徳神功超越萬古凡為史臣所記注黎獻所睹聞者固已備編於實録寳訓珍藏於金匱琅函矞矞皇皇盛矣大矣朕曩者偕諸昆弟侍奉宫庭親承色笑毎當視膳問安之暇天顔怡悦倍切恩勤提命諄詳鉅細畢舉其大者如對越天祖之精誠侍養兩宫之純孝主敬存誠之奥義任人敷政之宏猷慎刑重榖之深仁行師治河之上畧圖書經史禮樂文章之淵博天象地輿厯律歩算之精深以及治内治外養性養身射御方藥諸家百氏之論説莫不隨時示訓遇事立言字字切於身心語語垂為模範盖由我皇考質本生知而加以好學聖由天縱而益以多能舉天地間萬事萬物之理融㑹貫通以其得之于心者宣為至教視聴言動悉合經常飲食起居咸成矩度而聖慈篤摯啟廸周詳涵育薰陶循循善誘朕四十年來祗聆黙識夙夜凛遵仰荷纉承益圖繼述追思疇昔天倫之樂緬懐丁寧告戒之言既歴歴以在心尚洋洋其盈耳謹與誠親王允祉等紀録各條萃㑹成編㳟名為庭訓格言於戲聖謨𢎞逺包涵無際以今所紀揆昔所聞僅存什一於千百闕畧甚多實深愧悚然而是編也文詞精要意㫖深長苟能引伸而擴充之則片語能涵衆議隻字可括千言雖卷帙簡約而格致誠正修齊治平之道罔弗兼該堯舜禹湯文武周孔之傳一以貫之矣爰奉秘集夀之琬琰以昭垂于億萬世書曰監于先王成憲其永無愆詩曰貽厥孫謀以燕翼子朂哉後嗣恪循祖訓念兹罔斁受益靡窮世世子孫尚其永久敬承哉謹序臣等謹按是編凡二百四十有六則皆追述聖祖仁皇帝天語盖我世宗憲皇帝夙齡典學至孝性成既于龍樓問視之餘親承温諭而真源黙契至徳同符以古帝之心傳為聖人之家法故編摩寳帙義藴宏宣垂諸萬禩固與典謨訓誥同如日月之經天矣御製日知薈説四卷乾隆元年皇上御撰皇上御製序曰日知薈説者取予嚮日日課所為文刪擇編次合而録之爰定之以名也予禀承庭訓懋學書齋流連徃復於六經四子之書求其義藴精㣲旁搜諸史通鑑攷定得失區明法戒以至儒先緒論詞苑菁華莫不遍覽雖究心探索饜飫其中然考之古聖賢躬行實踐之學盖恧焉而未逮自十有四嵗學屬文至于今又一紀矣其間日課詩論雜文未嘗少輟積成卷帙瑕瑜各半踐祚以來萬㡬待理豈復得如曩時専志篤學日與良師友敬業樂羣於翰墨之場哉紬繹舊聞念兹弗􅇚因取其精去其疵録其正棄其偏合二百六十則釐為四卷而舉凡道徳性命之㫖學問政治之要經傳之淵源古今之事迹莫不畧見梗概夫日知之説出自子夏繼以無忘所能必所知者日新不失而賡續以極于高明乃為學問窽要若予向日所得尚非空言而無濟實用則今班朝涖政之間豈不足自考其知行合一與否以發抒聞見遜敏敦修乎臣等謹按帝王之學必根于傳心之要義徴諸經世之宏謨我皇上功崇時敏徳懋日新紬繹舊聞發揮新得第一卷論帝王治化之要第二卷論天人性命之㫖第三卷論禮樂法度之用第四卷論古今得失之迹臣等循環跪誦仰見聖學高深經綸大備迄今累洽重熙化成久道尤簡冊之所未聞盖聖神文武之源早有以握其樞要耳御定内則衍義十六卷順治十三年世祖章皇帝御定臣等謹按是編以禮記内則篇為本分八綱三十二子目首孝之道分子目二曰事舅姑事父母次敬之道分子目五曰事夫勸學佐忠賛亷重賢次教之道分子目三曰教子勉學訓忠次禮之道分子目九曰敬祭祀肅家政定變守貞殉節端好尚崇儉約謹言慎儀次譲之道分子目四曰崇謙退和妯娌睦宗族待外戚次慈之道分子目五曰逮下慈幼敦仁愛民宥過次勤之道分子目二曰女工飲食次學之道分子目二曰好學著書凡于經義皆詳加演繹並援引史書以資考鏡排纂既出自聖裁審定復仰邀慈鑒所以端人倫之始握風化之原者胥不外乎是矣御定孝經衍義一百卷康熙十九年翰林院學士兼禮部侍郎葉方藹等奉敕撰聖祖仁皇帝御製序曰朕緬惟自昔聖王以孝治天下之義而知其推之有本操之有要也夫孝者百行之原萬善之極書言奉先思孝詩言孝思惟則明乎為天之經地之義人性所同然振古而不易故以之為己則順而祥以之教人則樂而易從以之化民成俗則徳施溥而不匱帝王奉此以宰世御物躬行為天下先其事始於寢門視膳之節而推之於配帝饗親覲光揚烈諴萬民而光四海皆斯義也孔子教孝之言散見于冊籍而統㑹於孝經曾子以純孝親承斯訓其詞約其㫖逺條貫終始綜括羣論言孝之義于斯為備自顔芝藏本出於漢初考注箋􅇚代有其人如孔安國鄭康成皇侃邢昺輩無慮百餘家大約皆訓詁章句辨論古今文同異而求其推廣義藴達之于萬事萬物而皆莫出其範圍者則尚未之備也世祖章皇帝𢎞敷孝治懋昭人紀特命纂修孝經衍義未及成書朕纉承先志詔儒臣蒐討編輯仿宋儒真徳秀大學衍義體例徴引經史諸書以旁通其説竊以仲尼稱至徳要道以順天下又曰教之所由生而後詳列天子諸侯卿大夫士庶人之五孝此則一經之大㫖亦猶大學之言明徳新民格致誠正修齊治平也是故衍至徳之義則仁義禮智信之説備矣衍要道之義則君臣父子夫婦昆弟朋友之倫備矣衍教所由生之義則禮樂政刑之屬備矣衍五孝而皆以愛敬為本明貴賤之所同也由天子之敬親推之則郊丘宗廟典禮之義備矣由天子之愛親推之則仁民育物撫綏愛養之義備矣無非敬也無非愛也即無非孝也逓而至于諸侯之不驕不溢卿大夫之法服法言法行士庶人之忠順事上謹身節用何一非愛敬之義推而極之通于神明貫乎天地夫寧有涯際乎哉書成凡一百卷鏤板頒行併製序言冠于簡端庶㡬嘉與海内共遵斯路家修子弟之職人奉親長之訓協氣旁流休風四達以成一代敦厚鴻龎之治斯則朕繼述先烈尊經崇本之志也夫臣等謹按是書仿真徳秀大學衍義體例卷首衍經之序述經之㫖二篇不入卷數次衍至徳之義以五常分五子目次衍要道之義以五倫分五子目次衍教所由生之義以禮樂政刑分四子目次天子之孝以愛親敬親為綱愛親分子目十二敬親分子目十四次諸侯之孝分子目四次卿大夫之孝分子目五次士之孝分子目四次庶人之孝分子目三亦始于愛親敬親末二卷終之以大順之徴體用賅而本末備而于帝王錫類推闡尤詳迄今孝治光昭萬方嚮化所以揚至徳之休而隆太和之象者則皆是編有以潛孚而黙化也御纂性理精義十二卷康熙五十六年聖祖仁皇帝御定聖祖仁皇帝御製序曰朕自沖齡至今六十年來未嘗少輟經書唐虞三代以來聖賢相傳授受言性而已宋儒始有性理之名使人知盡性之學不外循理也故敦好典籍於理道之言尤所加意臨涖日久玩味愈深體之身心騐之政事而確然知其不可易前明纂修性理大全一書頗謂廣備矣但取者太繁相類者居多凡性理諸書之行世者不下數百朕實病其矛盾也爰命大學士李光地詮釋進覽授以意㫖省其品目撮其體要既使諸儒之闡發不雜於支蕪復使學者之披尋不苦于繁重至于圖象律厯性命理氣之源前人所未暢發者朕亦時以己意折𠂻其間名曰性理精義頒示天下讀是書者自有所知也已臣等謹按性理之名昉于朱子門人陳淳撰性理字義及熊剛大性理全書迨明成祖命胡廣等纂輯性理大全支離冗碎無復體裁我聖祖仁皇帝特詔大學士李光地等刋正其書復親加釐定裁汰謹嚴所取雖約而全書綱領已具按語出自聖裁發前人所未發至諸儒解説亦擇而存之其有舊書見遺者並多採入盡性窮理之學斯為闡發無遺矣御纂朱子全書六十六卷康熙五十二年聖祖仁皇帝御定聖祖仁皇帝御製序曰唐虞夏商周聖賢迭作未嘗不以文字為重文字之重莫過五經四書每覽古今凡傳於世者代不乏人秦漢以下文章議論無非因時制宜諷諫陳事繩愆糾繆補偏救弊之計耳若夫文辭之雄摛藻之麗古人已有定論予何敢言但不偏于刑名則偏于好尚不偏于楊墨則偏于釋道不偏于詞章則偏於怪誕皆不近于王道之純予少時頗好讀書祇以廣博華贍為事剛勇武備為用自康熙三十五年天山告警朕親擐甲胄統數萬子弟深入不毛沙磧乏水瀚海指揮如意破敵無存未十旬而凱旋可謂勝矣後有所悟而自問兵可窮乎武可黷乎秦皇漢武英君也因必欲勝而無令聞或至不保者豈非好大喜功與亂同道之故耶所以宵旰孜孜思逺者何以柔近者何以懐非先王之法不可用非先王之道不可為反之身心求之經史手不釋卷數十年來方得宋儒之實據雖漢之董子唐之韓子亦得天人之理未及孔孟之淵源至邵子而玩索河洛之理性命之微衍先天後天之數定先甲後甲之考雖書不盡傳理亦顯然矣周子闡無極而太極復著通書其所授受有自來矣如星辰繫于天而各有其位不能掩也光風霽月之量又不知其何似二程之充養有道經天緯地之徳聚百順以事君親前儒已誦之矣至于朱夫子集大成而繼千百年絶傳之學開愚䝉而立億萬世一定之規窮理以致其知反躬以踐其實釋大學則有次第由致知而平天下自明徳而止于至善無不開發後人而教來者也五章補之于斷簡殘篇之中而一旦豁然貫通之為要雖聖人復起必不能逾此問中庸名篇之義則不偏不倚無過不及之名未發已發之中本之於時中之中皆先賢所不能及也若語孟則逐篇討論皆内聖外王之心傳於世道人心之所闗匪細如五經則因經取義理正言順和平寛𢎞非後世淺見而輕議者同日而語也至于忠君愛國之誠動静語黙之敬文章言談之中全是天地之正氣宇宙之大道朕讀其書察其理非此不能知天人相與之奥非此不能治萬邦於袵席非此不能仁心仁政施於天下非此不能外内為一家讀書五十載只認得朱子一生居心行事故不揣粗鄙無文而集各書中凡屬朱子之一句一字命大學士熊賜履李光地素日留心于理學者彚而成書名之朱子全書以備乙夜勤學雖未能㡬於寡過亦自勉君親之責者朕又思朱子之道五百年未有辨論是非凡有血氣皆受其益朕一生所學者為治天下非書生坐觀立論之易朕集朱子之書恐後世謂借朱子之書自為名者所以朕敬述而不作未敢自有議論往往見元明至于我朝注作講解萬不及朱子而各出己見每有駁雜反為有玷宋儒之本意况天下至大兆民至衆輿圖甚逺開地太廣諸國外蕃風俗不同好尚各異防此失彼之患不可不思若以智謀要結人心如挾泰山而超北海也以中正仁義老成寛信似乎近之凡讀是書者諒吾志不在虗詞而在至理不在責人而在責已求之天道而盡人事存吾之順沒吾之寧未知何如也臣等謹按朱子語録甲於南宋諸儒卷帙至為繁富咸淳中黎靖徳刪除重複編為一集尚得一百四十卷盖記載既非一手編次亦不在一時故或雜以蕪詞參以臆説即間有親受師傳確乎可據者亦因年嵗之後先致異同之錯出其意欲以尊朱子而不知於朱子之本㫖早已背而馳矣我聖祖仁皇帝萬㡬之暇辨析精㣲特命大學士熊賜履李光地等芟除榛楛採掇菁英以類排比分門一十有九盖鎔金質純琢玉瑕去不依違于朱子之書者乃所以表章朱子之學也已御定執中成憲八卷雍正六年世宗憲皇帝御定皇上御製序曰惟我皇考法天行健一日萬㡬宵旰不遑猶以其間簡命儒臣採録經史子集所載自古帝王元徳顯功訏謨大訓以及名臣奏章先儒語類深切治道者次第進呈皇考親為刪定命曰執中成憲始于雍正六年仲春成于十三年仲夏未及刋布而我皇考遽遐棄臣民予小子煢煢在疚未之前見也嗣統既月勉從諸臣請躬涖庶政始發而讀之既卒業然後知聖心聖學實與堯舜孔子同揆而汲汲于是編則専以啟廸我後人示之標凖也間嘗殫思大學一書竊見仲尼祖述堯舜之實義焉其所謂明徳者即虞書所謂道心也所謂明明徳者懼其為人心所蔽也所謂格物致知者嚴辨人心道心之界以盡萬事萬物之理即書所謂惟精也所謂正心誠意者力祛人心之雜以致道心之純即書所謂惟一也所謂修身齊家治國平天下而止於至善者即書所謂允執厥中也然極乎執中之量則惟堯舜為無歉而中之散見于萬事萬物者則不惟三代聖王即秦漢以後仁厚英哲之君下及中主亦必有一事二事之合焉不獨臯䕫益契伊傅周召孔曽思孟即近代羣儒文士亦必有一話一言之合焉故中庸曰舜好問而好察邇言執其兩端用其中於民盖中之理無事無物而不具亦無人而不知是即明徳之根於性而不息者而惟舜能察之惟舜能執之惟舜能用之故善與人同合徳於天地我皇考編定是書自二帝三王之事古聖賢之言下逮羣儒文士之可節取者兼收而不遺用是道也皇考之治天下無一事不審其則無一物能匿其情即書所謂惟精大學所謂物格而知至無一時之不敬無一念之不誠即書所謂惟一大學所謂心正而意誠故凡施於政教者或予或奪或寛或嚴或抑揚遲速之稍有不同而無不立乎大中可為民極即書所謂執中大學所謂身修家齊國治天下平而明徳新民皆止于至善也而所以立綱陳紀更化善治其大者皆斷自聖心而細者亦博採於衆議有其人不能皆入于善而一言之中必不廢焉即中庸所謂好問好察執两用中也然我皇考聰敏睿智夙具於聖性而養成於聖學者已數十年故皇考之惟精乃不思而得皇考之惟一乃不勉而中皇考之執中而化成天下乃從容中道無為而成豈復有資於是書所以親為刪定者正恐在後之侗懵然無見于執中立極之道爰示之以成憲也豈惟予小子奉以終身惟日兢兢無敢踰越哉世世子孫苟能服膺勿失而溯其淵源則於堯舜孔子之道一以貫之矣豈惟君人者舍是無以建其有極以消天下之偏陂反側哉凡百有位果能是訓是行則上之可輔理成化以著勲猷而下亦可以謹身而寡過於以謨明弼諧共臻喜起明良之盛無難矣臣等謹按是書前四卷録歴代帝王嘉言善政上溯帝堯下迄明孝宗後四卷則諸臣論説亦自唐虞以至有明皆有禆于治道者盖我世宗憲皇帝夙夜單心闡明帝學鑒觀千古撰定鴻編所以貽燕翼之謀而鞏丕基之緒者是書實與謨典同功彼帝範君鑒諸編烏足仰窺萬一哉御覽經史講義三十一卷乾隆十四年協辦大學士蔣溥等奉敕編臣等謹按講義盛于南宋解經論史循文衍説皆經筵所陳也其更畨奏御者謂之故事先引古書次列論斷凡以闡明義理評論是非我皇上御極之二十年特詔翰林詹事六科十三道諸臣輪奏講義或標舉經文或節取史事皆下列先儒義疏闡明理藴辨析異同畧如宋人故事之例因詔大學士蔣溥等編為此帙併以睿論改定者恭録簡端欽定古今儲貳金鑑六卷乾隆四十八年奉敕編臣等謹按是書裒輯自周代以迄元明凡冊立儲貳義闗鑒戒者備臚事實如宋之太弟明之太孫亦從附載以正史為据列案語于後卷端恭録聖諭謂立儲一事較封建井田之必不可行尤為過之洞鑒古今垂為成憲所由演慶於萬年也理學傳心纂要八卷嵗寒居答問二卷附録一卷孫竒逄撰竒逄見經類竒逄自述曰門宗分裂使人知反而求之事物之際晦翁之功也然晦翁歿而天下之實病不可不洩詞章繁興使人知反而求之心性之中陽明之功也然陽明歿而天下之虚病不可不補臣等謹按竒逄淵源于姚江故推崇甚至然其講學能叅酌朱陸之間而持以篤實和平主于明體逹用纂要原書凡七卷門人漆士昌復刪削其語録攙入之共為八卷答問二卷則與友人贈答之詞竒逄以顧憲成當古今第十一人士昌又以竒逄當古今第十二人殆猶不免東林標榜之習潛室劄記二卷刁包撰包見經類臣等謹按是書乃包以平日所見隨筆劄記中有云為盖世豪傑易為惬心聖賢難又云趨吉避凶盖言趨正避邪若認作趨福避禍便誤王士禎嘗稱之然所言心性及格致誠敬多不出前人窠臼聖學入門書無卷數陳瑚撰瑚字言夏號確菴太倉人前明崇禎壬午舉人藤隂劄記無卷數學約續編十四卷考正晚年定論二卷明辨録二卷孫承澤撰承澤見經類承澤學約續編自記曰學約于二程同時不入堯夫考亭同時不入南軒東萊故是編亦不入月川楓山後渠涇野念菴涇陽少墟諸家臣等謹按承澤學宗程朱自訂其講學之語一百餘條為藤隂劄記大㫖深詆姚江而旁渉史事又嘗輯周程張朱之言為學約一編兹復取明薛瑄胡居仁羅欽順高攀龍四家之語倣近思録之例訂為一集以續之又以王守仁所作朱子晚年定論不足為據乃取朱子年譜行狀文集語類等書詳為考正至斥守仁為吾道莽懿惟事智術籠罩並無實學是則門戶之見錮于中不顧其立説之已甚矣紫陽通志録四卷高世泰撰世泰見史類臣等謹按徽州汪知黙等輯其紫陽書院講㑹之語名曰理學歸一寄示世泰而孫承澤以學約續編魏裔介以知統翼録亦先後寄至世泰因并取刁包潛室劄記陳揆省心日記諸條合以授梓謂足通彼此應求之志名之曰通志云學言三卷白允謙撰允謙字子益陽城人前明崇禎癸未進士改庶吉士入國朝授秘書院檢討官至刑部尚書此菴語録十卷胡統虞撰統虞字孝緒武陵人前明崇禎癸未進士入國朝官至國子監祭酒張界軒集八卷張時為撰時為字景明餘干人前明貢生存性編二卷存學編四卷存治編一卷存人編一卷顔元撰元字渾然號習齋博野人臣等謹按四存編之説主於勵實行濟實用亦介然自成一家然于宋儒多所不滿不自知其矯枉過正至存治編欲復井田封建之法尤為不逹時務又按元父戌歿遼東元嘗跋渉險阻覔骨錦州奉以歸𦵏世稱其孝盖獨行可嘉而講學則不盡足法也教民恒言一卷致知格物解二卷周程張朱正脈無卷數論性書二卷約言録二卷魏裔介撰裔介見經類裔介自序周程張朱正脈曰周海門所輯程門㣲㫖王陽明所輯朱子晚年定論未足發䝉啟迷於㣲㫖取十之五於王陽明所輯則盡刪之而取北海考正定論云性圖一卷黄采撰采字亮公號復堂南城人學案一卷王甡撰甡字無量金壇人續近思録二十八卷鄭光羲撰光羲字夕可無錫人光羲自序畧曰不有朱子孔子之道不著不有高子朱子之道不著朱子依然一孔子高子依然一朱子朱子功不在孟子下高子功不在朱子下臣等謹按先儒輔翼後進在于申明聖賢緒論不務為標榜之習盖宗孔者莫如朱至即擬朱子於孔子恐朱子亦未能安也朱子聖學考畧十卷朱澤澐撰澤澐字止泉寳應人廣祀典議一卷吳肅公撰肅公見經類二程學案二卷明儒學案六十二卷黄宗羲撰宗羲見經類臣等謹按宗羲之學本于姚江嘗以二程造徳各殊乃輯語録及先儒議論各為一卷其子百家又附以己意名之曰學案然瓣香所在究不能掩其畛域之見云讀書質疑二卷欲從録十卷王錟撰錟見史類臆言四卷朱顯祖撰顯祖見史類日知録三十二卷顧炎武撰炎武見經類炎武自記曰自少讀書有所得輒記之其有不合時復改定或古人先我而有者則遂削之積三十餘年乃成一編思辨録輯要三十五卷陸世儀撰世儀字道成號桴亭太倉人江南通志列之儒林傳中世儀自述曰天下無講學之人此世道之衰天下皆講學之人亦世道之衰嘉隆之間書院徧天下呼朋引類動輒千人附影逐聲廢時失事甚有借以行其私者此所謂處士横議也又曰今所當學者正不止六藝如天文地理河渠兵法之類皆切於用世不可不講俗儒不知内聖外王之學徒高談性命無補於世所以來迂拙之誚也臣等謹按世儀辨諸儒之得失持論和平於制度儀象多所闡發盖有志於實用之學而不徒相尚以空言也小學集解六卷蔣永修撰永修見經類臣等謹按古所稱小學皆爾雅方言及六書訓詁而已至朱子以小學對大學勒成一書多切于身心日用之言義類當屬儒家顧馬考不載而載孔叢子於儒家附家語及晦菴語類于論語今更定之而附識于此儒宗理要二十九卷張能鱗編能鱗見經類理學辨一卷王庭撰庭字言逺嘉興人順治己丑進士官至山西布政使譚旭謀道續録曰王言逺理學辨据其所言宋代直無完儒如程子性即理等説邵子道為太極等説張子鬼神二氣良能等説一例譏弹而其闢朱子也尤甚又謂老子是易之坤道儒者是易之乾道和合三教全無義理其他支離散碎并取陸王之説者尤難縷述常語筆存一卷湯斌撰斌見史類臣等謹按是編即湯子遺書中語録一卷乃其子溥及門人姚岳生等所追記者凡二十餘條盖初出别行之本理學要㫖無卷數耿介撰介見史類溯流史學鈔二十卷張沐撰沐見經類沐自述曰是編取水哉之義故名曰溯流臣等謹按是編首敦臨堂録次闗中録次嵩高録次鈞談録次燕邸録次蜀中録次天中録共十八卷及雜論二卷皆其講學之語實非史論而名之曰史學則未知其何所取也下學堂劄記三卷閑道録三卷熊賜履撰賜履見史類賜履自序劄記曰佔畢之餘偶有所測自戊戌迄甲子積若干卷昔河東薛氏仿横渠正䝉之義著正續讀書録後餘干之居業泰和之困知皆有為而作履不敏亦猥附於前人論著之意焉朱子學歸二十三卷鄭端編端見史類端自序畧曰少讀朱子近思録而求明儒高攀龍所編朱子節要數年不得及此書既成復得節要一冊取以相質亦不至大相剌謬云性理譜五卷蕭企昭撰企昭字文超漢陽人順治丁酉副榜貢生朱子語類纂十三卷王鉞撰鉞見史類臣等謹按鉞有世徳堂遺書此即其第五種葢摘録黎靖徳所編朱子語類中理氣鬼神性理論學四門四門之外又各刪存大畧而時以己説附之小學分節二卷高熊徴撰熊徴字渭南岑溪人順治庚子副榜貢生官至浙江都轉鹽運使小學纂注六卷高愈撰愈見經類華學泉序曰小學有注舊矣然或沿襲他經之解而本義莫彰櫛比字句之間而條理鮮貫愈本陳氏舊注而正其得失節其繁冗如周禮智仁聖義忠和易忠為中之類皆足正經文之誤也大儒粹語二十八卷顧棟南編棟南字季任又字未餘吳江人皇朝文獻通考卷二百二十五
