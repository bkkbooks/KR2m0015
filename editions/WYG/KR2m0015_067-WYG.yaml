body:
  text: 學校考五太學三雍正十三年九月皇上初登大寳恩詔文官在京四品以上在外三品以上武官在京在外二品以上者各送一子入監讀書恩詔各省府州縣衛儒學以本年正貢作恩貢次貢作正貢定河南新設府縣各學出貢例陳許二府俱俟十二年後照例一年一貢淮寧石梁二縣學各照例二年一貢又申定江南徐州府學嵗貢例照州升為府例行定福建建寧府各學出貢例建寧升府嵗貢一人永春升州三年二貢新設霞浦二年一貢古田分設屏南照二年一貢之例兩縣輪貢臺灣府新設彰化十年後四年一貢又廷試直省選拔貢生乾隆元年又申定八旗拔貢生考選助敎例凡肄業期滿遇官學助敎員缺准與各部院咨送人員一同考選更定河南南召縣學二年一貢例定廣西西隆等州縣學貢例以西隆州額廩四名三年二貢思恩縣學額廩五名二年一貢均屬太驟改為四年一貢又上思河池等八縣及永寧州額廩多未補足改為三年一貢定陜西同州府學貢例州升為府俟十二年後嵗貢一人定湖北宜昌府縣學貢例宜昌州升府十二年後嵗貢一人彛陵州改東湖縣照縣學例出貢定山東泰安府縣學貢例泰安州升府俟十二年後嵗貢一人新設菏澤泰安二縣各照縣學例定八旗官學生肄業期滿者得補官學助敎例申嚴貢監生包攬錢糧之例侵收入己者照例革去貢監仍照常人盜倉庫錢糧律並賍論罪定擬八十兩以上照不應為而為之律杖八十仍革去貢監如不及八十兩以上仍照攬納税銀杖六十之例定擬收贖㨂選八旗直𨽻各省拔貢生分别録用交吏部以知縣試用者十八人餘令吏部詢問各生願以佐貳官用者以佐貳用願就敎職者以敎職用二年二月續行揀選直𨽻拔貢亦如之申明舉貢生員概免雜差之例奉諭雜色差徭紳衿例應優免乃各省竟有令生員充當總甲圖差之類者殊非國家優卹士子之意嗣後舉貢生員等著概免雜差俾得専心肄業二年復貢監考職之例先是雍正年間以捐納貢監多托人代考職銜之弊遂經停止至是奉恩詔貢生監生每年仍派大臣官員考定職銜照舊例送吏部註冊恩詔貢監生在監肄業者免坐監一月本年十二月恩詔同又廷試續到直省選拔貢生又命國子監文廟大成門大成殿改用黄瓦崇聖祠著用緑瓦詳見祠祭門命倣宋儒胡瑗經義齋治事齋法嚴課諸生凡明經者或一經或兼經務取御纂折中𫝊説諸書探其原本於人倫日用之理切實講明其治事者如歴代典禮賦役律令邊防水利天官河渠算法之類或専治一事或兼治數事務窮其源流考其利弊司成考課之時必以湛深經術通達時宜稽古愛民之識三年期滿即所學分别等第以示勸懲尋又定凡祭酒季考司業月課出四書題一道五經講義各一道策問各一條助敎等官毎月按堂考課亦如之定稽查肄業諸生出入禮部議准學中設簿毎日令助教等官一人稽察諸生如有事故告假者悉令將事由登記於簿月終移送監丞呈堂有肆行出入及出入過多者勒令出學本堂師容隱者察出記大過一次其有剽獵浮華不務實行者本堂即行糾舉亦毋許隱狥定安徽潁州等府縣學貢例潁州升府俟廩額補足先將鳯陽府撥歸之廩生較食餼先後照例嵗貢一人其餘陸續挨貢新設阜陽縣照縣學例二年貢一人定山西朔平寧武府等學嵗貢例朔平寧武人文漸盛三年二貢又神池五寨照縣學例行停拔貢生揀選引見之例先是禮部奏定選拔貢生廷試考列一二等者九卿㑹同簡選由部引見簡用其考列三等者停其簡選照例劄監肄業凡宗學義學敎習即於此中考取三年期滿以知縣銓用其肄業期滿者送部照例銓選至是又定拔貢到部概停簡選引見仍由部奏請欽命大臣考試劄監肄業如有文理荒謬者照例議處其肄業期滿除照例銓選敎職外果有經義治事精通練達品學兼優者祭酒等官覈實保薦引見以知縣敎職簡用仍照例輪班序選三年上臨雍禮成以聖賢後裔來京觀禮者三十一人入監讀書先是衍聖公孔廣棨奏視學大典聖賢後裔例得陪祀五經博士東野衍兆未得一體觀光仰請敕部收録奉㫖允行又命以先賢閔氏冉氏言氏卜氏顓孫氏端木氏之世襲五經博士均照五氏例行取陪祀并取閔冉等氏各二人赴京觀禮御書與天地參四字為文廟匾額御書氣備四時與天地鬼神日月合其徳敎垂萬世繼堯舜禹湯文武作之師為文廟對聫懸掛並頒各直省懸掛學宫大成殿互見褒贈門定六堂肄業生額數毎堂五十人在内肄業者三十人毎人嵗支膏火銀二十四兩在外肄業者二十人毎人嵗支膏火銀六兩凡到監之貢監生詳加考驗擇文優品端者充補命國子監選正途貢生善書者十人移送武英殿録書仍給與在監膏火數年後行走勤慎該管王大臣秉公具奏酌量議叙定八旗官學生考取監生之例凡八旗子弟選取入學三年之内令其専誦經書朝夕講課三年後監臣考驗擇其願學漢書資質相近者歸漢文班分𨽻敎習令其専心講誦其年齒已長願學繙譯者歸滿文班分𨽻助敎令其専心繙譯其歸漢文班者不必専讀四書亦使講求經史為有用之學毎三年一次監臣録其可以應考者奏請欽派大臣考試優者授為監生由官學生而升太學使與拔貢人等明經治事期滿擇尤異者一同保舉考選録用至六年又奏准官學生歸漢文班者邇年以來頗知奮勉但諸生年㓜度其資力止能於四書外専治一經史冊浩繁乍難責其研究定於明年八九月間試以經文一篇論一道優者酌量拔作監生期滿尤異者保舉停止敎授八旗官學算法専設算學先是雍正十二年八旗官學増設算學敎習十六人敎授官學生算法至是以設立官學敎養八旗子弟専以讀書繙譯為業算學理數精㣲非童稚所能驟通况以一時之暫敎授三十餘人勢難遍及所有官學生習學算法之例概行停止尋議令欽天監附近専立算學額設敎習二人滿漢學生各十二人蒙古漢軍學生各六人即以向來八旗敎習算法由舉人筆帖式貢監生員出身者充補敎習補完之日即於學内學習有成之人考選充補五年期滿量補欽天監等官其滿洲䝉古漢軍各學生即於八旗官學生内擇其曽學算法資性相近者不拘旗分選取漢人無論舉貢生童或世業子弟願入算學者聴候考試録取俱照官學例月給膏火功課中線面體三部各限一年通曉七政共限二年毎季小試嵗終大試分别勤惰去留五年期滿舉人出身者以博士用餘俱補天文生裁外肄業生留内肄業生一百八十人毎嵗各加膏火銀六兩其外肄業生一百二十人裁去從禮部尚書管監事趙國麟請也定湖南慈利永定二縣學貢例二年一貢定湖南沅州府各學貢例沅州升府祗轄三縣俟十二年後照州學三年二貢新設芷江縣照縣學例定廣東商學貢例照天津濟南二府遇挨貢之期二年一貢定未經報部之嵗貢身故例凡府州縣學廩生已經考取嵗貢給有貢單於未經報部本生身故者即於報冊内聲明達部准作貢生以示矜恤其本年嵗貢仍將陪貢頂補所有旗匾銀兩給頂補之生四年定算學事宜文移案卷俱歸國子監管轄稱國子監算學其敎習之飯食衣服由監行文支給至十年奏准以欽天監天文生二十四人撥歸國子監算學肄業無庸别給膏火其一切敎法及應試考取均照算學生例倘敎習不敷即選學業有成之算學生協同分敎已補者即食本俸未補者仍領學生膏火十二年又奉准敎習未滿五年分敎未經實授遇有陞任如實心訓課均仍留敎習之任令滿五年奏明交部議叙更定雲南宣威雲龍等州嵗貢例宣威暫照縣學例二年一貢雲龍州舊定二年一貢今改照州學例三年兩貢定臨榆縣學嵗貢例時改山海衛為臨榆縣議照縣學例二年貢一人定福建福鼎縣學嵗貢例時霞浦縣分設福鼎縣議准仍照例二年輪貢一人定八旗官學生考補各部寺庫使之例凡遇缺出考試能繙譯者四人咨部考擇充用後又定毎缺一人咨送三人與覺羅官學生一并由吏部考擇充用五年定廣東豐順鶴山各縣學嵗貢例由嘉應州海陽揭陽大埔三學撥入之舊廩鶴山縣學由新㑹開平二縣學撥入之舊廩均按年先准出貢新補本學廩生俟十年後准三年一貢定廣西泗城鎮安二府及歸順州學新設廩生出貢例俟十年後府學三年貢一人州學四年貢一人定雲南嵗貢例向例雲南嵗貢必係現食餼廩之生其已補廩生而或以丁憂事故開缺未經補實者雖年深亦不准貢與各省嵗貢之例不符至是禮部奏定嗣後遇應貢之年不論實廩虛廩挨年序貢以昭畫一定嵗終甄别肄業生去留每於嵗終將肄業生名數奏明除選用佐貳等官及考補教習外其餘諸生有三年期滿者咨部銓用其未滿三年而肄業已在一年以上者監臣復加簡選果係才可造就准其留監餘即咨回本籍歸原班挨次補用其願留京應試者聽又大學士管監事趙國麟議檢討夏之蓉奏成均造士請倣宋胡瑗經義治事齋例詳明規制嚴立勸懲諸條久經舉行毋庸再議惟各省選拔貢生及選舉優生不無冒濫應令直省學政嚴加考試務拔真才得㫖允行並諭成均課士之道惟貴躬行實踐不在多立科條如徒視為具文雖再増條欵又復何補是惟在國子諸生自知黽勉則古稱先務為明體達用之儒勿役役於禄位功名之念而司訓課之責者又復善為誘掖切加勸懲則辟雍鐘鼓教化聿興而珪璋特達之士亦從此輩出矣是月復奉諭士為四民之首而太學者教化所先四方於是觀型焉比者聚生徒而敎育之董以師儒舉古人之成法規條亦既詳備矣獨是科名聲利之習深入人心積重難返士子所為汲汲皇皇者惟是之求而未嘗有志於聖賢之道不知國家以經義取士使多士由聖賢之言體聖賢之心正欲使之為聖賢之徒而豈沾沾焉文藝之末哉朱子同安縣諭學者云學以為已今之世父所以詔其子兄所以勉其弟師所以敎其弟子弟子之所以學舍科舉之業則無為也使古人之學止於如此則必可以得志於科舉斯已耳所以孜孜焉愛日不倦以至於死而後已者果何為而然哉今之士惟不知此以為茍足以應有司之求矣則無事乎汲汲為也是以至於㳺惰而不知反終身不能有志於學而君子以為非士之罪也使敎素明於上而學素講於下則士者固將有以用其力而豈有不勉之患哉諸君苟能致思於科舉之外而知古人之所以為學則將有欲罷不能者矣觀朱子此言洵古今通患矣夫為已二字乃入聖之門知為已則所講之書一一有益於身心而日用事物之間存養省察闇然自修世俗之紛華靡麗無足動念何患詞章聲譽之能奪志哉况即為科舉亦無礙於聖賢之學朱子云非是科舉累人人累科舉若髙見逺識之士讀聖賢之書據吾所見為文以應之得失置之度外雖日日應舉亦不累也據今之世雖孔子復生也不免應舉然豈能累孔子耶朱子此言即是科舉中為己之學誠能為已則四書五經皆聖賢之精藴體而行之為聖賢而有餘不能為已則雖舉經義治事而督課之亦糟粕陳言無補實用浮偽與時文等耳故學者莫先於辨志志於為己者聖賢之徒也志於科名者世俗之陋也國家養育人材將用以致君澤民治國平天下而囿於積習不能奮然求至於聖賢豈不謬哉朕膺君師之任有厚望於諸生適讀朱子書見其言切中士習流弊故親切為諸生言之俾司敎者知所以敎而為學者知所以學定縁事斥革之貢監生准以原名應童試及捐復例禮部奏准縁事斥革貢監除包攬詞訟武斷鄉曲及凡實係本身重犯於律無可貸者仍照舊斥革外其有因人波累與本身事犯情有可原及罪在杖一百以内革後能改過自新者均准以原名應童子試監生准以原名捐復其應行收考收復者地方士庶不得挾嫌告訐違者以誣告論六年又定酌減肄業生額數於内肄業生一百八十人内撥出二十四人作外肄業計其膏火可給一百二十人監臣仍詳加考驗分𨽻六堂倘月課季考有曠怠不到者即行扣除頒發欽定四書文分給太學及八旗官學諸生先是元年上以時文風尚屢變不一非明示以準的則主司難操繩尺以度羣才士子亦難合矩矱以應搜羅特命學士方苞裒集故明王唐歸胡金陳章黄諸大家及本朝劉子壯熊伯龍以後作者時藝精選數百篇批抉其精㣲奥窔之處頒布天下以為舉業指南至是刋刻告成頒發直省并賜太學及八旗官學肄業諸生定漢算學生得由童生考取監生應鄉試例向例只滿洲䝉古漢軍算學生得與官學生一同考取監生入場至是議准得由童生考取監生應鄉試俄羅斯國遣其子弟來學於監中滿漢助敎内簡發文理明通者各二人引見簡用滿漢各一人敎習清漢書衣服飲食等項由理藩院給發九年奏准俄羅斯學漢助敎為額外助敎咨部别行銓補後復裁去仍照滿助敎例以六堂内助敎兼管俄羅斯學事務七年上以我朝屢開恩科加添中額所取進士濟濟多人而舉人則日積日衆竟有需次多年而不得一官者又添拔貢以分其缺數年一次舉行則人愈多而缺愈少舉人銓選更為無期特諭拔貢乃生員之優者夫既為文學華贍之青衿則應科舉時自可脱穎而出又不専藉選拔以為呈身之路也查從前選拔或數十年或二十年一舉今則六年一舉為期太近理應酌量變通嗣後著定為十二年選拔一次又以各省應試生員貢監由學臣録送入場向例毎舉人一名額取科舉三十名嗣後加至一百名而學臣於科舉之外遺才大收一概録送且有督撫好行其徳普收送考者以致文理荒疎之人皆得濫冒入場試卷太多不但試官於倉猝之中難於别擇即浮薄之士子將以觀光為㳺戲特飭學臣慎重辦理毋得濫溢並永著為例定貴州永豐州學新設廩生出貢例俟十年後准作四年一貢八年又申定八旗官學漢敎習期滿交送印冊例凡漢敎習每人給印冊二本將三年内所敎學生若干名并學業功課詳細填註期滿時以一冊交新敎習收存照例填註一冊呈送監臣秉公察核照例分别等第出具考語引見酌用定雲南東川昭通二府及鎮雄州永善縣各學新設廩生出貢例府學三年一貢州學四年一貢縣學五年一貢至二十三年改定俱四年一貢定山東商籍廩生出貢例十二年後五年一貢定甘肅口外安西等五衛廩生出貢例十二年後六年一貢九年禮部奏各省拔貢生自停止簡選引見後領咨赴部者日少前因到部士子苦於守候積至二二十名即奏請欽命大臣考試今各省拔貢未到部者尚數百名雖積至十餘名其先到者因資斧告謁又復回籍再難積至二三十名若十餘名即奏請廷試殊於體制未協查拔貢現例無論考試一二三等均歸國子監肄業嗣後凡拔貢到部由部驗到即劄國子監㑹同考試文理通者准為拔貢留監肄業荒謬者即行斥革如文理雖不荒謬而辭句疵累不稱拔貢之選者發回原籍肄業該學政仍照例議處從之十年又申定考核䝉古教習例以五年期滿為率監臣詳加考核實不能教習者飭令歸旗優者分别等第填註考語引見記名以應陞缺補用十一年更定考用八旗滿洲官學助教法先是以繙譯題一道考取至是増添漢文論題一道兼優者方准録取其現任筆帖式等坐補助教者非舉人恩拔副嵗貢生生員出身之人不用至十五年又定考試時准多取數人記名遇缺挨次補用定直省拔貢生入監考到考驗例向來貢監生入監先行考到列一二等者再行考驗貢生列一二等監生列一等者方准入監肄業今定拔貢生亦如之停止額外助敎之例時有協同助敎學習行走者名為額外助敎監臣奏請可否給與單俸得㫖照請給與單俸嗣後額外助敎之例著停止定稽查援例貢監年貌籍貫之例凡直省援例貢監生造冊報部即將本生年貌籍貫三代履歴造冊送監本監别設號簿列名銓記各給印票一紙在外者發與督撫轉給本生在部報捐者本生親領倘有斥革病故者一面報部一面繳銷印票定四川岳池縣學新設廩生出貢例十二年後准三年一貢定湖南永順府及永順保靖龍山桑植四縣學新設廩生出貢例俟十年後府學二年一貢縣學三年一貢定陜西潼闗縣學裁歸同知􅈦學廩生出貢例縣學現在之廩生留於􅈦學二年一貢俟三次嵗考後存廩十五名三年一貢定雲南普洱鎮沅二府恩施縣及黒白琅三鹽學新設廩生出貢例俟十二年後府學三年一貢縣學鹽學俱五年一貢定山東威海靖海二衛歸併文登縣學廩生出貢例文登額設廩生二十名威靖二衛歸併各二十名作為候廩人多額少挨補無期因暫准一年一貢俟舊存二衛廩生貢完仍照縣學例一年一貢十二年考試八旗肄業期滿之世職人員十三年恩貢十三氏優生時上東巡念十三氏子孫逺承世緒濟濟膠庠其中當有文行兼優者特命學政甄拔數人咨送禮部貢入成均示鼔勵焉裁滿洲司業一員向來蒙古司業漢司業各一員惟滿洲二員至是裁去一員以符體制十四年平定金川御製告成太學碑文勒石學宫文曰天畀我皇清握乾符俯坤軸函括萬邦悉主悉臣五后纘承創守佑啟亦惟是二三藎臣布徳宣力予曰有先後予曰有禦侮用造我丕丕基罔有蘗芽罔不煦嫗長養㳺於大當粤有金川娑羅莽者居西蜀桃闗以外界綽斯甲小金川之間向曽從征得受符檄與諸土司齒顧恃其險逺夜郎自大搆釁鄰畨各土司申訴封疆吏吏曰蔓之不圖豈其視為甌脱乃請兵籌餉期掃其穴而司其事者或怯縮以老師或􅘀狡以蓄志軍無適從事用弗集予心􅍀然念邊徼之不寧或致増防置戍重勞吾民大學士忠勇公傅恒義同休戚毅然請肩斯任乃命以經畧印益厚集諸路軍芻粟相繼閭閻不驚卜吉於戊辰十一月之三日禡牙以指所征朕親御武帳賜經畧酒以行天日和昶陽氣宣復都人士聴覩聳躍罔不忭喜謂露布之旦暮至也乃歴燕晉驅秦隴越劍閣絶川江臨桃闗之巇經天射之峻又日討軍實而敎誡拊循之均其渴飲饑食同其曉征夜眠至於密贊機務親草奏章則又經畧獨勤其勞而諸武臣有所不知有弗能共者恩威既明士用益勵度番落如户庭過部伍於袵席奸酋授首軍聲大振復以巨礟擊其碉堅碉以摧將俟諸軍之集搗其中堅而畨酋騤瞿駾喙稽首請降經畧臣以彼罪重惡極窮而乞生久或渝且背焉慮不允所請朕惟天地之徳在好生彼蟻潰而䑕駭者毋寧赦而宥之且求降而盡殱之不可謂武矧不足以汚我斧也於是經畧宣朕明㫖登壇受降己巳二月之朢日金川平定㨗音至京是役也罙入數千里奏凱未七旬而振旅之師多有返自中途未究其用者昔之成功巴蜀如建武之定公孫江陵之降李勢皆在版圖之内無足比數廷臣舉皇祖朔漠皇考青海成例請勒碑成均以示來許夫秉丹誠而運籌决勝永靖荒徼者經畧大學士之功也商可否於帷幄衝石矢於行陣者參贊大臣及諸將士力也朕何有焉惟是體乾元之徳凛佳兵之戒保大定功安民和衆庶幾可以垂則乎乃系之辭曰惟天生人類聚羣分凡兹林林孰非我民有羈而縻有誨而諄豈伊異視逺近殊倫守在四夷稽古名言無已用之寓義於仁蠢彼金夷恃其險阻蠶食豨張謂莫我拒不靖不庭侵厥鄰聚駭奔呌呶以干大咎匪棘匪紓玁狁之故我張我伐玁狁之故我師既集賊亦相持匪敢相持懼罪自支兩易寒暑敉功稍稽賊益以狂怒臂當車罪臣既誅以徇我師朕咨於恒汝徃視之朕咨於恒惟汝同徳惟我庻士亦久於後將兹旗兵羽林神策其勇熊羆其心金石何敵弗摧何功弗克濟以汝忠奏㨗頃刻恒拜稽首臣弗敢蘉既禡既宜師出於京師出於京時惟一陽未逾五旬乃壓其疆前旌獵獵有節煌煌羣畨乃驚謂自天降惟彼攸恃曰良爾吉以偵以諜如鬼如蜮其恃爰誅其類股慄紀律是明戎兵是詰鑄礟攻碉其守以失惟是懼誅潛勿敢出其潛勿出乃旦夕延將齊吾軍披其中堅大鞣大膊期目之前彼乃窮蹙乞降悚䖍惟命是從六事永遵除道築壇肉袒羊牽赳赳鍾琪乃度之愬聿抵賊巢開誠以諭携其二酋軍門親赴悔罪歸誠車塵馬足順斯撫之昭我王度昔也雷霆今也雨露七縱諸葛單騎汾陽曰我相臣於前有光晉爵錫服黼黻龍章速歸黄閣左右贊襄休養生息恵鮮蜀邦我武既揚無疆惟慶十五年恩詔國子監監生及官學敎習俱著免期一月恩詔各省儒學以正貢作恩貢次貢作嵗貢十六年恩詔國子監監生免坐監一月定考取八旗官學漢敎習恭候欽命大臣至監㑹監臣彌封閲卷先是由監臣將肄業之恩拔副優嵗各項貢生考取充補至是改定此例奉上諭各省選拔貢生經朕降㫖以十二年舉行一次計至癸酉年即届選拔之期惟是來京朝考揀選引見劄監讀書或以知縣等官試用或以敎職即用或以敎職歸班序選條例屢經更定朕思選拔於每學數十百人中拔取一二人且不糊名易書可以驗其人才核其素行自當精擇以充其選應令該學政於試列前茅之士舉其文行兼優才品出衆者㑹同該督撫秉公掄採至庠序為陶育人才根本今敎職率多昏髦龍鍾濫竽戀棧雖定以六年甄别而上官以閑曹多方寛假非國家設官敷敎本意應分以年限詳加澄汰所遺員缺即以應授敎職之選拔充補於士風當有裨益所有選拔貢生赴部驗到作何定限及朝考録用一切規條俱應詳悉酌定永著為令大學士九卿集議以聞尋議令直省學政於嵗科兩試時凡文理優通之廩増附生觀其才品接其言論合之文章已得其大概至考校時屢次優等及見列前茅之士擇其文優品端者秉公選拔即隨場咨明督撫存案俟科考事竣八月鄉試以前學政𫝊齊通省選拔之生㑹同督撫通行覆試驗看給與貢單咨文赴部仍將正覆原卷送部磨勘再順天學政選拔滿洲䝉古漢軍生員應於鄉試前奏請欽命大臣㑹同覆試驗看奉天由府丞選拔應㑹同府尹覆試驗看福建臺灣府由臺灣道選拔移送福建學政㑹同督撫覆試驗看倘驗覆不堪充選仍發回原學肄業至到部之期統以其年十月起限四川廣東廣西雲南貴州定限八月於次年五月到部江西福建浙江湖北湖南陜西限六月於次年三月到部直𨽻奉天河南山東山西江南限四月於次年正月到部禮部即照定限奏請欽命大臣於午門内考試分列三等進呈如有文理荒謬不入等者學政照例議處督撫亦一併議處至朝考取列優等者九卿簡選引見候㫖分别録用再直省府州縣敎職飭令督撫三年一次澄汰將實在年力就衰者勒令休致澄汰員缺即以簡選引見之拔貢充補未入簡選者仍劄監肄業從之十七年定學政學録得升補助敎官其録正學録缺出以吏部記名人員補用定四川成都華陽二縣學廩生出貢例三年内兩縣輪貢一人停止八旗世爵子弟附入官學肄業時以八旗世爵既於兩翼設立官學將見在八旗官學肄業者咨回各旗所有八旗官學増設之漢敎習一人裁去敎射敎習亦咨回本旗行走十八年考試滿洲助敎十九年揀選浙江等省拔貢生命國子監學正學録等官照内閣中書例考試從御史陳大化請也命甘肅等省選拔貢生送熱河引見先是禮部奏准直省選拔貢生赴部驗到朝考引見録用規條内有遇皇上行幸熱河所有考試欽命四書論判題各一道請照乾隆十七年㑹試在京總理事務處請㫖頒發題目并試卷免進呈之例由總理處請題令閲卷大臣祗領考試分别等第具摺奏聞其一二等照例奏派九卿㨂選恭候聖駕回鑾帯領引見至是應考甘肅川廣雲貴等省拔貢適遇皇上由熱河啟鑾木蘭奉諭此次考試甘肅等省拔貢若俟至回鑾後帯領引見未免守候需時著交在京總理王大臣等驗看㨂選其應行引見者即送至熱河行在帯領行見定進士舉人考補學正學録官例二十年平定伊犁大功告成御製碑文勒石太學文曰遼矣山戎薫粥旃裘毳幕之人界以龍沙畜其驒奚雖無恒業厥有分部葢自元黄剖判萬物芸生東夷西夷各依其地謬舉淳維未為理據皇古莫紀其見之書史者自周宣太原之伐秦政亘海之築莫不畏其侵軼猾夏是虞自時厥後一二奮發之君慨然思挫其鋒而納之宥然事不中機材不副用加以地逺無定處故嘗勞衆費財十損一得縉紳之儒守和親介胄之士言征伐征伐則民力竭和親則國威喪於是有守在四夷覊縻不絶地不可耕民不可臣之言興矣然此以論漢唐宋明之中夏而非謂我皇清之中夏也皇清荷天之龍興東海撫華區有元之裔久屬版章嵗朝貢從征狩執役維謹準噶爾厄魯特者本有元之臣僕叛出據海西終明世為邊患至噶爾丹而稍强吞噬鄰畨闌入北塞我皇祖三臨朔漠用大破其師元惡伏㝠誅脅從逺遯迹毋俾遺種於我喀爾喀厥侄策妄阿拉布坦收其遺孽僅保伊犁故嘗索俘取地無敢不共逮夫部落滋聚乃以計襲哈宻入西藏準夷之勢於是而復張兩朝命將問罪雖屢獲㨗而庚戌之役逆子噶爾丹策凌能用其父舊人乗我師怠掠畜於巴里坤𢷬營於和卜多於是而準夷之勢大張然地既險逺主客異焉此勞徃而無利彼亦如之故額爾徳尼招之敗彼亦以彼貪利而深入也皇考謂我武既揚不可以既允其請和以息我衆予小子敬奉先志無越思焉既而噶爾丹策凌死子策妄多爾濟那木扎爾暴殘喇嘛達爾扎簒奪之達瓦齊又簒奪喇嘛達爾扎而酗酒虐下尤甚焉癸酉冬都爾伯特台吉策凌等率數萬人來歸越明年秋輝特台吉阿睦爾撒納和碩特台吉班珠爾又率數萬人來歸朕謂來者不可以不撫而撫之莫若因其地其俗而善循之且毋令滋方來之患於我喀爾喀也於是議進兩路之師問彼罪魁安我新附凡運餉籌䭾長行利戰之事悉備議之始熟經於庚戌之艱者咸懼蹈轍惟大學士忠勇公傅恒見與朕同而新附諸台吉則求之甚力朕謂犁庭掃穴即不敢必然喀爾喀之地必不可以久居若而人毋寧用其鋒而觀厥成即不如志亦非所悔也故凡禡旗命將之典槩未舉行亦云偏師嘗試為之耳塞上用兵必以秋而阿睦爾撒納禡木特請以春月欲乗彼馬未肥則不能遯朕謂其言良當遂從之北路以二月丙辰西路以二月己巳各􅁸行哈密瀚海向無雨今春乃大雨咸以為時雨之師入賊境凡所過之鄂拓克携羊酒糗糒迎恐後五月乙亥至伊犁亦如之達瓦齊於格登山麓結營以待兵近萬我兩將軍議以兵取則傷彼必衆彼衆皆我衆多傷非所以體上慈也丁亥遣阿玉錫等二十五人夜斫營覘賊向賊兵大潰相蹂躪死者不可勝數來降者七千餘我二十五人無一人受傷者達瓦齊以百餘騎竄六月庚戌回人阿竒木霍集斯伯克執達瓦齊來獻軍門準噶爾平是役也定議不過二人籌事不過一年兵行不過五月無亡矢遺鏃之費大勲以集遐壤以定豈人力哉天也然天垂佑而授之事機設不奉行之以致坐失者多矣可與樂成不可與謀始亦謂􅃖􅃖之衆云爾豈其卿大夫之謂既克集事則又曰茍知其易將勸為之夫明於事後者必將昧於幾先朕用是寒心且準噶爾一小部落耳一二有能為之長而其樹也固焉一二暴失徳之長而其亡也忽焉朕用是知懼武成而勒碑文廟例也禮臣以為請故據實事書之其辭曰茫茫伊犁大幹之西匪今伊昔化外覊縻條支之東大宛以南隨畜獵獸蟻聚狼貪乃世其惡乃恃其逺或激或攻而乗我緩其計在斯其長可窮止戈靖邊化日薰風不侵不距不來其那欵闗求市亦不禁訶始慕希珍終居竒貨吏喜無事遷就斯愞漸不可長我豈懼其豈如宋明和市之為既知其然飭我邊吏弗縱弗嚴示之節制不仁之守再世斯斬簒奪相仍飄忽荏苒風沙革面煎鞏披忱集泮飛鴞食黮懐音錫之爵位榮以華裾膝前面請願効前驅兵分兩路雪甲霜鋒先導中堅如鼂錯攻益以後勁䝉古後屬八旗子弟其心允篤二月卜吉牙旗飄飄我騎斯騰無待折膠泉湧於磧蕪茁於路我衆歡躍謂有天助匪啻我衆新附亦云黄髮未覩水草富春烏魯木齊波羅塔拉台吉宰桑紛紛欵納牽其肥羊及馬潼酒獻其屠耆合掌雙手予有前諭所禁侵陵以茶交易大愉衆情衆情既愉來者日繼蠢達瓦齊擁兵自衛依山據淖惟旦夕延有近萬人其心十千勇不目逃掄二十五曰阿玉錫率性賊所銜枚夜襲直入其郛揮矛拍馬大聲疾呼彼人既離我志斯合突將無前縱横鞺鞳案角鹿埵隴種東籠自相狼藉孰敢攖鋒狐竄鼠逃將徃異域回部遮之兇渠斯得露布既至告廟受俘凡此蕆功荷天之衢在古周宣二年乙亥淮夷是平常武詩載越我皇祖征噶爾丹命將禡旗亦乙亥年既符嵗徳允協師貞兵不血刃漠無王庭昔時準夷弗恭弗譓今隨師行為師侯尉昔時準夷日戰夜征今也偃卧知樂人生曰匪準夷曰我臣僕自今伊始安爾㳺牧爾牧爾耕爾長孫子曰無向非豈有今是兩朝志竟億載基成側席不遑保泰持盈恩詔國子監貢生監生及官學教習免坐監一月二十一年定湖南衡陽新分設縣學出貢例兩學二年輪貢一人二十二年禮部議順天府尹劉綸等奏大宛兩縣冒籍貢監限滿不行自首請概行斥革并請將來先取本縣印結始准報捐查兩縣貢監地方官並不加意清查至限期將滿概請斥革殊未允恊應令府尹督率兩縣詳查如果踰限無踪再行照例斥革至其具結始行報捐之處徒啟需索之弊均毋庸議一疏奉諭㫖依議此等捐納貢監其因應試投捐者乃圖獵取功名冒占試額自當從嚴辦理然例由國子監分堂肄業或由學政録科其為數不過數百人年貌語音不難立辨嗣後應専其責成務令於肄業録科時嚴加察驗以杜假冒倘仍前濫行收考一經發覺必將録送各官嚴加議處至不應試之貢監第希頂帯之榮或由以捐納官職自與占冒科名有闗政體者殊異若必如前議限年令自改籍不皆改籍者又皆斥革及如該府尹所奏由該縣具結赴部始准收捐轉致胥役藉端需索種種過甚無如聼其投捐為便定考拔貢生試題例舊例考試拔貢第一場四書題文二經文一第二場時務策一論一判一至是禮部議准御史陳大復條奏改判為五言八韻詩一首朝考拔貢亦試以書藝一詩一著為例二十三年定優生到部嚴加考試例試以書藝一詩一分别等第進呈其文理明通者照例劄監肄業荒疎者發回原學併將該學政議處定考試優生不拘人數之例定例考試各省優生俟到部有四五名始行考試至是優生有於上年五六月間到京因人數不足以致守候日久艱於旅食者兵部侍郎兼管監事觀保奏請照考試續到拔貢不拘人數之例一體辦理或遇有拔貢續到亦可一同考試從之二十四年停止捐納貢監歸敎官約束例舊例捐納貢監統歸地方官約束嗣因各省貢監不受學臣約束妄自尊大部議准令督撫學臣轉飭州縣㑹同敎官將所屬貢監照生員例一併歸學舉報優劣嚴加約束至是安徽學政劉墉奏捐納貢監與生員逈不相侔責成敎官約束向例由州縣造冊移咨敎官在州縣既覺繁瑣在敎官不能綜覈一柄兩操不但有名無實抑且體制不符應請停止部議應如所請從之十一月平定回部大功告成御製碑文勒石太學文曰建非常之功者以舉非常之事舉非常之事者以藉非常之人然亦有不藉非常之人而舉非常之事終建非常之功者則頼昊蒼篤貺神運斡旋事若禍而轉福機似逆而轉順順天者昌逆天者亡故犁準夷之庭掃回部之穴五年之間兩勲並集始遲疑猶未敢信終劼劬以底有成荷天之龍在兹畏天之鑒益在兹爰叙其事如左達瓦齊之就俘也伊犁已大定矣無何而阿睦爾撒納叛彼其志本欲藉我力以成己事時也人心未定佐饔者嘗一蜮肆狂萬狙應響蜂屯蟻雜不可爬梳畏難者羣謂不出所料準夷終不可取並有欲棄巴里坤為退守謀然予計其衆志不齊將有歸正倒戈者於是督策將帥之臣整師亟進既而伊犁諸台吉宰桑果悔過勤王思討逆賊以自贖此天恩助順者一也二酋大小和卓木者以回部望族久為準噶爾所拘於阿巴噶斯鄂拓者也我師既定伊犁乃釋其囚以兵送大和卓木波羅泥都歸葉爾竒木俾統其舊屬而令小和卓木霍集占居於伊犁撫其在伊犁衆囬乃小和卓木助阿逆攻勤王之台吉宰桑等阿逆頼以茍延及我師再入阿逆遂逃入哈薩克而霍集占亦即收其餘衆竄歸舊穴此天恩助順者二也準夷之事前紀畧見梗概兹不復紀紀興師討􅉰之由則以我將軍兆恵在伊犁時曾遣副都統阿敏道徃􅉰議事小和卓木乃以計誘阿敏道而拘之及我師抵庫車問罪彼携阿敏道以來援至中途害之及從行者百人彼猶逞其狂悖抗我師顔且敢冒死入庫車城乃雅爾哈善畧無紀律致彼出入自由然我滿洲索倫衆兵士無不念國家之恩効疆場之力故能以少勝衆逆渠懼而脱此天恩助順者三也知僨轅之無濟掄幹材之可任時將軍兆恵以搜勦準夷餘黨至布露特部落已欵服其衆因命旋師定回部於是克庫車存沙雅爾定阿克蘇略烏什收和闐師之所至降者望風直至葉爾竒木城下而我軍人馬周行萬有餘里亦猶强努之末矣二酋以其逸待之力統數萬人與我三千餘人戰我師之過河者纔四百餘猶能斬將搴旗退而築堡黑水固守以待此天恩助順者四也萬里之外抱水救火其曷能濟乃予以去年六月即降㫖派兵撥馬欲以更易久在行間者耳故兵馬率早在途一趲進而各爭前恐後人人有敵愾之憤此天恩助順者五也副將軍富徳及參贊舒赫徳輩率師進援以速行戈壁中馬力復疲值狂􅉰據險坐俟頗有難進之勢夫援軍不能進則固守以待者危矣而參贊阿里衮驅後陣之馬適至夜𢷬賊營我師内外夾攻彼不知我軍凡有幾萬握炭流湯之徒自相蹂躪顧命不暇於是解黒水之圍鹿駭麞驚遁而保窟我之兩軍合隊全旅以迴阿克蘇此天恩助順者六也既而彼料我必再入泰山之壓難當乃於我師未進之先携其部落載其重器跳而逺去而葉爾竒木哈什哈爾二城之舊伯克等遂獻城以降參贊明瑞一邀之於霍斯庫魯克副將軍富徳再䧟之於阿爾楚爾於是離心者靣内前途者反斾二酋唯挈其妻孥及舊僕僅三百人入拔達克山境此天恩助順者七也人迹不通之地語言不同之國既已雀敺寧不狼顧其授我與否固未可定也然一聞將軍之檄莫不援旗請奮整旅前遮遂得兇渠函首露布遥𫝊此天恩助順者八也夷考西師之役非予夙願之圖何則實以國家幅員不為不廣屬國不為不多惟厪守成之志無希開創之名兼以承平日久人習於逸既無非常之人安能舉非常之事而建非常之功哉然而輾轉輻輳每以艱而獲易視若失而反得故自締始以逮定功雖予自問亦將有所不解其故而不敢期其必然者故曰非人力也天也夫天如是顯佑國家者以祖宗之敬天愛民蒙眷顧者深也則我後世子孫其何以心上蒼之心志列祖之志勉繼繩於有永保丕基於無窮乎繫以銘曰二酋偝徳始亂為賊是興王師報怨以直伊犁既平蕞爾奚屑徐議耕闢徐議戌設以噢以咻伊余本懐豈其勿戢圖彼藐􅉰彼􅉰不量怒臂當車戕我王臣助彼狂狙始攻庫車僨轅敗事用人弗當至今為愧悖逆罪重我武宜揚易將整師直壓彼疆阿蘇烏什玉隴和闐𫝊檄以定肉袒羊牽二酋孽深知不可活狼狽相顧固守其穴桓桓我師周行萬里馬不進焉强弩末矣以四百人戰萬餘虜退猶能守黒水築堡間信達都為之傷悼所幸後軍早行在道督勅速援人同怒心曽不兩月賊境逼臨賊境逼臨彼復徼隙馬繼以進賊營夜斫出其不意賊乃大驚謂自天降孰敢鋒攖大鞣大膊如虎搏案角隴種誰敢回顧黒水圍解合軍暫旋整旅三路期並進焉賊偵軍威信不可支挈其妻孥遁投所依所依亦回豈不自謀豈伊庇猿而受林憂利厥錙重無遺盡掠遣其都丸遂來獻馘詎惟獻馘並以稱臣捧賚表章將詣都門奏凱班師前歌後舞尸逐染鍔温禺釁鼔露布至都正逮初陽慈寧稱慶亞嵗迎祥郊廟告成諸典並舉皇皇太學豐碑再樹豐碑再樹敢予喜功用不得已天眷屢䝉始之以武終之以文勘亂惟義撫衆惟仁布恵施恩寰宇共喜古不羈縻今為臣子疆闢二萬兵出五年據實書事永矢乾乾二十五年定江南金山衛學出貢例三年貢一人定湖南永綏􅈦學出貢例十年後四年貢一人考試國子監助敎考試國子監敎習二十六年恩詔直省儒學以正貢作恩貢次貢作嵗貢二十七年定貴州荔波縣學出貢例四年一貢定四川茂州等學出貢例茂州二年一貢松潘越巂三年一貢資州眉州俟六年後三年兩貢新寧梁山三年輪貢一人二十九年定四川嘉定潼川二府樂山三臺二縣學出貢例俱二年貢一人三十年更定四川䕫州府嵗貢例照州學例三年二貢増派䝉古大臣一員兼管祭酒敎訓蒙古學生皇朝文獻通考卷六十七
