body:
  text: 欽定四庫全書皇朝文獻通考卷六十三學校考一臣等謹按古昔聖王維世翼敎所以風示天下者莫不首重乎建學親師故書曰降衷恒性克綏厥猷惟后又曰作之君作之師明乎民受中以生其能優柔循習相率而納於軌物之内非敎化不為功也唐虞之隆命契為司徒曰敬敷五敎夏商迄周庠序學校之制異名而同實倫明於上民親於下遐哉尚矣漢唐而後廣厲學宫增置師儒之典史不絶書然或徒飾彌文奉行故事尊經術者未必本諸躬行談性理者不盡宜於實用其於古者敦倫務本之意或有間焉洪惟我朝肇造區夏方事武功未遑文治然大勲甫集太宗文皇帝即詔諸貝勒大臣子弟讀書且以習於學問講明義理忠君親上為訓大哉皇言誠萬世立敎之權輿也世祖章皇帝定鼎京師興賢育才首隆學校聖祖仁皇帝醇化醲洽夀考作人厚澤深仁有加無已而飭勉士子惟以躬修實踐毋事浮華為急務葢國初諸生承明季凋攰之餘氣習虚驕文風龎雜經列祖範圍曲成多方奬勸而懲艾之於是禮敎明備横經鼓篋者蒸蒸革薄從忠胥知實學矣然而久道化成良窳間出世宗憲皇帝嚴加振刷厚其栽培官學義學彌布中外特頒聖諭廣訓覺牖斯民將使宇内無不學之人而於正人心厚風俗之理尤諄諄致意於多士焉我皇上以天縱之聖上繼列聖之治統下示億載之臣民植紀明倫尊經崇實於學校事宜隨時衡量而損益之凡所以培養士之源廣造士之術自宗室以逮八旗自京邑以逹直省自幼童以至成人迄夫重譯要荒子弟靡不漸以仁摩以義因地因人俾之講肄有業而跅弛有禁洵激勸之隆規極君師之大法也至於明考校之條申衡取之例定制義之準革沿襲之弊選敎職以慎司訓頒經書以宏文敎尚騎射繙譯以重國風飭監臣學臣及守土有司整新士習以端化俗之本則謨訓煌煌所以昭列聖敎思於無窮與聖天子所以廣敎澤於無既者並於是乎存焉若夫釋奠釋菜禮重明禋上徳上齒典隆鄉國列代成規祖宗以來並垂令甲而臨雍講學重道尊師養老引年示民孝弟之意皆惟其實不惟其文則又列聖相承所為移風易俗以臻唐虞三代之治而非漢唐後所能彷彿於萬一也歟臣等謹依馬端臨作學校考而變通其四門之例首宗學次旗學次太學次直省鄉黨之學次祠祭褒贈録後次視學養老為六門焉宗學臣等謹按虞書放勲克明俊徳以親九族重華命䕫典學以敎胄子三代學校元子衆子以至公卿大夫元士之適子皆造焉唐宋以來國學以敎國子宗學以敎宗人古帝王之立敎也自親者始自貴者始馬端臨考厯代學校首太學終直省鄉黨而於宗學之設附見太學一門良以自昔無宗學之名後世有其名而無其制故統以太學例亦宜然也臣等續考宋金遼元明五朝學校悉準此例矣我朝龍興東海人文蔚起屬在天潢莫不禀資卓犖應運而生當國學未興之日諸貝勒子弟即奉讀書習學之諭迨天下一統禮敎修明順治二年即建立宗學設敎習等官司其董戒厚其廩餼嚴其懲勸使宗室子弟咸涵泳於禮義道徳之途講明於倫紀綱常之大服習於書射繙譯之業練習乎文事武功之備列祖列宗厚加培養時申誥誡我皇上篤念宗支恩施叠沛以敎以養一監先皇之成憲猶慮其玩時愒日或㤀本而騖末也定三年考驗之條停鄉㑹應試之例以期其勿襲浮華崇尚醇厚是以玉牒天親咸勤敦行天下後世有以知帝室皇家所為立敎以成其忠孝賢良之徳者實有合乎古昔大學之敎非若唐宋以來之宗學僅與佔畢儒生鰓鰓尋章句以弋取功名已也臣等謹依類編次特纂宗學一門列卷首昭聖敎所及自親貴始也天聰五年奉上諭朕令諸貝勒大臣子弟讀書所以使之習於學問講明義理忠君親上實有賴焉自今凡子弟十五嵗以下八嵗以上者俱令讀書順治九年命諸王宗室内有孝友義順及守節貞烈者宗人府核實具奏禮部照例旌表始置宗學宗人府等衙門議每旗各設宗學毎學用學行兼優滿漢官各一員為之師凡未封宗室之子年十嵗以上者俱入宗學有不循禮法者學師具報宗人府小則訓責大則奏聞其親王世子郡王選用滿漢官各一員講論經史貝勒以下亦勤加講閲得㫖毎旗設滿洲官敎習滿書其漢書聴從其便次年三月議定親王應各設在部博士滿洲進士漢軍進士各一員世子應各設在部筆帖式哈畨滿洲進士漢軍進士各一員郡王應各設在官學閒散滿洲進士漢軍進士各一員如滿洲漢軍進士不足於舉人内考用舉人不足於各王所轄侍衛内選用親王郡王等滿十嵗然後設立師傅宗室入學各設滿洲生員一員各員六年滿後考取優者録用十一年諭宗人府朕思習漢書入漢俗漸㤀我滿洲舊制前准宗人府禮部所請設立宗學令宗室子弟讀書其内因𣲖員敎習滿書其原習漢書者各聴其便今思既習滿書即可將繙譯各項漢書觀玩著永停其習漢字諸書又令覺羅廕生送監讀書照各官廕生例一體送監讀書期滿亦與官員廕生照等銓授康熙十二年令宗室子弟各就本府讀書凡王以下入八分公以上其子弟年滿十嵗者於本府講讀經史諸書二十二年令覺羅廕生監生由國子監考試移送吏部二十四年令宗室子弟延文學優贍之士在各府第專精學習三十六年上以宗室子弟日益繁衍除已授爵秩人員外恐閒散子姓素無職業嚮學之志漸隳特諭宗人府八旗宗室子弟有能力學屬文奮志科目應令與滿洲諸生一體應試編號取中臣等謹按宗室子弟祗於三十八年鄉試一次至乾隆八年宗人府議准請欽命大臣合試左右兩翼宗學生拔取佳卷准作進士與㑹試中式之人一體殿試至十七年奉㫖永行停止誠以宗室託繫天潢不必藉舉業以入仕也故應試間一舉行不為常例云三十九年遣内大臣等考驗宗室子弟文藝騎射停止宗室鄉㑹考試之例五十二年令恩廕宗室送子入監讀書未入八分公以下鎮國將軍輔國將軍及宗室内為一二品大臣者俱給廕生入監讀書雍正二年復定宗室官學之制左右兩翼官房毎翼各立一滿學一漢學王貝勒貝子公將軍及閒散宗室子弟十八嵗以下有願在家讀書者聴其在官學子弟或清書或漢書隨其志願分别敎授十九嵗以上已曾讀書者亦聴其入學兼習騎射毎學以王公一人總其事設正敎長二人副敎長八人宗室中行尊年長者充之清書敎習二人選罷閒滿官及進士舉貢生員善繙譯者充補騎射敎習二人選罷閒官及䕶軍校䕶軍善射者充補漢書毎學十人設敎習一人令禮部考取舉貢充補毎月考試分别等第申報註冊春秋二季宗人府親加考試優者奏聞引見其敎長給與官俸敎習給與銀米衣服期滿三十六月稱職者議叙授官平等者再留敎習三年不稱職者㕘處讀書子弟月給紙墨筆及冬夏氷炭等物定宗學五年考試一次之例申嚴宗學立敎之法上諭宗學正敎長等朕惟睦族敦宗務先敎化若非立學設敎鼔舞振興安能使之改過遷善望其有成今特立義學揀選爾等敎習宗室隨其資質勸學興行導以禮義或有不遵敎訓者小則爾等自行懲戒大則掲報宗人府㑹同奏聞其行止端方精勤好學者無論年齒長幼即行保舉從來立敎之術莫要於奬善懲惡善不奬不能使之勸惡不懲不能使之改爾等既膺簡任務期勤慎黽勉恪供厥職以副朕篤厚宗親殷勤敎育之至意三年申嚴訓飭宗學子弟時諸王宗室等以建立宗學謝恩上諭曰爾等為立宗學之故謝恩如以朕設立此學果為有益爾諸王宗室之子弟或在家延師讀書亦可或勞其身心閲厯事務令入宗學中讀書亦可惟令敎習等嚴加訓誨爾等又時加約束自可望其成就若溺愛袒䕶己子反怨敎誨之人何由望其成立耶爾等勉旃七年奉上諭前者宗人府設立宗學祗令敎習宗室尚未及於覺羅覺羅人衆今若一槩歸併宗學敎者勢難遍及應毎旗各立一衙門管轄覺羅或王或公𣲖委一員統理令其於各該旗覺羅内揀選老成練達品行端方者一二人分管即於該旗衙門之旁設立一學除情願在家學習者外擇其可敎之人令其讀書學射滿漢兼習所𣲖出之管轄人員不時訓誨稽察如内有行止不端不知守法安分者即回明宗人府王等令在該旗衙門居住學習禁止出門俟其改行遷善之後再回明宗人府王等始許出門年底彚疏具題如此則於覺羅少年子弟大有裨益而人人皆可成就著宗人府王公等㑹同滿洲大學士六部尚書詳議尋議定讀書有情願在家讀書者聴其入官學讀書者或清或漢隨其志願分别敎授十八嵗以上已曾讀書者亦准入學至十八嵗以上未曾讀書者月之朔朢𫝊齊該旗公署宣讀聖諭廣訓其總管之王公一人由宗人府奏請欽㸃毎學副管二人於覺羅内擬定正陪引見補用清書敎習一人以滿洲進士舉貢生員充補騎射敎習一人以本旗善射者充補漢書敎習毎生徒十人設一人以舉貢充補副管共十六人毎日在學行走稽察勤惰甚劣者報知宗人府拘於本旗署内敎訓八旗各擇官房一所立為衙署旁設清漢各一學八旗覺羅内自八嵗以上十八嵗以下子弟俱令入學覺羅内有行為妄亂者亦行拘訓不准外出俟悛改後告知宗人府彚奏請㫖每年春秋二季該管之王公等親身考驗分别等第報知宗人府登記檔案優者引見擢用學成得與旗人同應嵗科考鄉㑹試及考用中書筆帖式等官至讀書之覺羅及督敎人等給與公費銀米紙筆墨氷炭等物俱照宗學之例其敎習分别勤惰勸懲及期滿議叙授官等例亦倣宗學十一年以翰林官二人分敎宗學子弟分日入學講解經義指授文法毎月給公費與各館纂修同給米與四季衣服與本學敎習同乾隆二年設立盛京宗室覺羅官學宗室覺羅子弟共為一學凡二十嵗以下十嵗以上願入學者分清漢書肄業兼習騎射不限額數於盛京宗室覺羅分尊年長行止方正者充宗學總管二人副管四人兼管覺羅學事於現任司官筆帖式内選長於繙譯者四人敎習清書於閒散官員以下領催驍騎以上選善於騎射者四人敎習騎射於奉天府舉貢内選學問優長者四人敎習漢書毎年將軍府尹㑹同宗學總管稽考分别等第註冊俟讀書人數加増應行考試之時該將軍等報府於領府事王公及五部侍郎内請欽㸃二三人公同考試優者奏聞有願來京與選侍衛筆帖式者與京學肄業宗室一例録用其覺羅子弟肄業五年者將軍府尹考試分别等第奏聞以盛京三陵及五部將軍等衙門省城口外等處筆帖式録用至敎習五年期滿分别勤惰議叙授官及總管副管敎習肄業諸生給與公費銀米紙筆氷炭等物之例俱倣京學其有已食嵗滿錢糧在學肄業之宗室覺羅該將軍毎嵗秋冬圍獵時將其中願隨圍者攜帶同往俾嫻習騎射三年設總稽宗學官以滿漢京堂各一人月試經義繙譯及騎射各一次又令宗人府考試宗學生毎嵗季秋宗人府奏請試以繙譯及經義時務策各一道以學士等官閲卷一二等賞給筆墨三四等留學五等敎戒六等黜退定兩翼宗學各增漢敎習二人四年頒發聖祖仁皇帝御製文集世宗憲皇帝御製文集并御纂諸書於宗學定宗室官學生十名設敎習一人例其未滿十人者均分各敎習名下訓課至應增設之時宗人府移咨禮部按數增補七年奉上諭我朝崇尚本務原以弓馬清文為重而宗室誼屬天潢尤為切近向來宗室子弟俱講究清文精通騎射誠恐學習漢文不免流於漢人浮靡之習是以世祖章皇帝諭停其習漢字諸書所以敦本實而黜浮華也近因雅爾哈善條奏設立宗學以漢文敎習宗室子弟迄今已厯數年昨經考試並無佳卷即繙譯卷亦屬平常但既經考試著宗人府將所取之人照例帶領引見嗣後宗室子弟或有不能學習漢文者應聴其専精武藝其在宗學肄業者考試之時更益加嚴肅至宗室進身之階原有襲封世職又可揀選侍衛及䕶軍㕘領等缺與其徒務章句虛文轉致荒廢本業不如嫻習武藝之崇實黜浮儲為國家有用之器也可𫝊諭宗人府將此㫖明白曉諭宗室人等知之八年考試宗室子弟照禮闈例授官時有以宗室子弟不應鄉㑹試恐怠廢學業為言者宗人府總理事務王大臣等議定准其鄉㑹試至是欽命大臣合試左右翼學生有本年考取一二等及往年考取一等並在家肄業願觀光者咸准與考拔取佳卷進呈欽定名次由宗人府引見奉諭㫖考取之宗室玉鼎柱逹麟圖福喜俱准作進士與乙丑科㑹試中式之人一體殿試引見或選入翰林或以部屬等官補用候朕臨時降㫖嗣後俱照此例行十年稽查右翼宗學右通政熊學鵬奏右翼宗學共設滿漢敎習九人凡在館學生滿漢文藝之優劣敎習人員訓課行走之勤惰皆應考核今稽查右翼宗學俱係漢官於繙譯素未通曉請再𣲖滿洲文臣一員公同辦理從之十一年改定宗學覺羅學生額數宗室左翼七十人右翼六十人覺羅左翼百五十五人右翼百八十五人十七年奉上諭宗室子弟不應鄉㑹試皇祖皇考均有明㫖後因條奏復令宗室等應鄉㑹試彼時宗人府總理事務王大臣並未聲明草率照覆實屬錯誤嗣後仍遵皇祖皇考原降諭㫖將宗室等鄉㑹試及選庶吉士之例永行停止再不可條陳考試如果有學問優長者自施恩録用可也二十一年更定敎習宗學子弟及録用之法裁漢敎習九人改為繙譯敎習其敎習騎射者毎翼向各二人今増一人肄業生年滿考列一二等者向例以府屬筆帖式補用需次無期今照部院貼寫筆帖式之例授為宗人府貼寫筆帖式三年後行走勤慎者引見以筆帖式坐補其貼寫之時仍給與在學應得公費嵗終視其行走於恩賞宗室銀内酌量賞給以示鼓勵二十七年裁定覺羅學敎習額數先是管理鑲藍旗覺羅學理郡王奏學内額設滿敎習一員漢敎習三員敎習馬步箭十五善射一員官學生四十五人學繙譯者二十三人讀漢書者二十二人請裁漢敎習一員改為滿敎習得㫖允行并將鑲黄正白正紅鑲紅正藍各旗俱裁漢敎習一員二十九年宗人府議准諴親王奏八旗宗室世職内食半俸之幼官等皆令入宗學敎習清話兼習馬步射三十六年皇太后八旬萬夀恭上徽號恩詔國子監貢監生及各官學敎習俱免坐監期一月三十八年尚書永貴奏准咸安宫官學及覺羅學滿敎習許恩監例監一體考試三十九年諭朕昨𣲖宗室公寧陞額前往東陵召見時竟不能説清語此皆素日全不學習所致清語原非難事設平日善為敎導亦何至全不通曉著宗人府查明王公等子弟内如尚能延師之家仍各任其在家學習其不能延師者俱令入宗學加意敎訓伊等入學讀書後務以清語為要不可仍似從前塞責著宗人府王公不時詳察仍每月考察一次考察時由宗人府請㫖朕𣲖阿哥及大臣等㑹同伊等考察值考試時其在家讀書者亦一併入考並著宗人府王公等詳察在學勤惰一年之内何人常到學何人不到學其不到學幾日並因何不到縁由俱著注明照稽查王公等祭祀齋戒朝期之例繕寫清單於毎年彚奏一次四十一年平定兩金川大功告成恭上皇太后徽號恩詔國子監貢監生及各官學敎習俱免坐監期一月四十二年孝聖憲皇后升祔太廟恩詔國子監貢監生及各官學敎習俱免坐監期一月四十五年皇上七旬萬夀恩詔國子監貢監生及各官學敎習俱免坐監期一月四十九年禮部議覆順天府尹虞鳴球奏咸安宫景山覺羅各學敎習報滿令其仍居學中訓課俟應補之人到學再令離學新補敎習俟部文到學之日起算違限十日不到者照京官到任違限例議處并請嗣後於敎習扣滿之日先期一月咨㑹禮部庶接替不致曠期得㫖允行五十年皇上親詣文廟釋奠臨新建辟雍講學禮成恩詔國子監貢監生及各官學敎習俱免坐監期一月皇朝文獻通考卷六十三
