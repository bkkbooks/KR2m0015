body:
  text: 欽定四庫全書皇朝文獻通考卷二百十五經籍考五經春秋日講春秋解義六十四卷聖祖仁皇帝御製序曰朕惟春秋者帝王經世之大法史外傳心之要典也大義炳若日星而褒貶筆削微顯婉章非後世所能窺至其立法謹嚴宅心一本忠恕因善惡是非而施予奪焉有正例有變例有事同而辭異有事異而辭同一人之身前後不相掩一人之事功過不妨殊如化工之肖物隨類付形未嘗有所容心於其間後之説經者或穿鑿深文或附㑹失實固難悉當聖人之心左氏親見聖人公羊榖梁及門子夏猶彼此牴牾蹖駁互見何况去聖人日逺紛紜探索如漢唐以下董仲舒趙匡啖助諸家乎惟宋康侯胡氏濳心二十年事本左氏義取公穀萃諸家之長勒成一家之書雖持論過激抉隱太嚴未必當日聖心皆然要其本三綱奉九法明王道正人心於春秋大㫖十常得其六七較之漢唐以後諸家優矣朕萬幾之暇研精六經竊有嘅於春秋經聖人手定其衮鉞本乎王章刑賞原於忠厚義例雖繁而其明白正大之㫖必不如後之説經者委折碎細若此爰命儒臣撰集進講大約以胡氏為宗而去其論之太甚者無傳經文則博採諸儒論注以補之朕亦時有所折𠂻期歸於一編輯成書朝夕省覽亦欲俾學者有所遵守其於經世大法傳心要典未必無少助云爾皇上御製序曰嘗考春秋經文不過萬有六千三百餘言自三傳以後羣儒義疏累數千萬言而微詞隱義之難明者猶十有六七蓋是經乃夫子所手定也辭約而義深聖心之所運用每舉一事其義必貫於全經非若他經一章一節各指一事雖有不通而不害其可通者故程朱二子深探力索久之皆見為難明而止至明初胡氏安國之説遂獨列於學官以朱子深病是經之難通而教門人姑從胡氏之説也然謂其以義理穿鑿則非義理之真而於聖人筆削之㫖未能脗合明矣故自明以來雖著功令科舉之士禀為程式而終不足以服學者之心我聖祖仁皇帝聰明天亶自少時即篤好經書及躬攬大政辨色出視朝裁決萬幾甫畢即召儒臣講論經義務抉其根源參伍羣言以求至當經筵所進日講四書及尚書周易解義皆裁自聖心以為無憾者故即時刋布及晩年以明初五經大全收採討論尚未精詳口授指畫成周易折中一書詩書春秋則命重臣開館編次而親釐定之惟三禮體大未議纂修蓋有待也周易折中成於康熙五十四年春秋傳説彚纂成於六十年已經頒布餘二經則至我皇考繼序之後始次第告成皇考大孝尊親凡皇祖一言一動莫不敬述以昭示來兹念欽定春秋於胡氏之説旣多駁正則廷臣當日所進講義一遵胡氏之舊者於聖心自多未洽是以遲之又久未嘗宣布必將俟諸經備成而後重加討論也故再降諭㫖命果親王允禮大學士張廷玉内閣學士方苞詳細校訂始事於雍正七年㳟呈御覽者再而後告成凡六十四卷乾隆二年鐫板旣訖諸臣請製序文頒示海内朕反覆循覽於胡氏穿鑿之説曠若發䝉筆削之㫖闡明者亦過半焉夫解義之成蓋數十年於兹矣觀皇祖之久不宣布可以徴望道未見之心觀皇考之再三考訂而後命刋可以知善繼善述之義豈惟是經之窔穾將由是以開通哉即兩朝聖人之心法治法亦於斯可覩矣臣等謹按是編亦聖祖仁皇帝講筵舊稿雍正七年世宗憲皇帝復命果親王允禮大學士張廷玉等重加考訂排次成書因崇政邇英進御舊體先徴左氏之事實次明公穀之義例凡三傳之得失辨之至詳而酌之極當伏讀御製序文陳作述之源流誌校刋之顛末聖祖仁皇帝未經宣布之隱世宗憲皇帝再三考訂之心昭然若揭洵惟聖人能知聖人矣欽定春秋傳説彚纂四十卷康熙三十八年大學士王掞等奉敕撰聖祖仁皇帝御製序曰六經皆孔聖刪述而孟子特言孔子作春秋左氏公羊榖梁三家各述所聞以為傳門弟子各衍其師説末流益紛以一字為褒貶以變例為賞罰微言旣絶大義弗彰至於災祥䜟緯之學興而更趨於怪僻程子所謂炳若日星者不因此而反晦乎迨宋胡安國進春秋解義明代立於學官用以貢舉取士於是四傳並行宗其説者率多穿鑿附㑹去經義愈逺朕於春秋獨服膺朱子之論朱子曰春秋眀道正誼據實書事使人觀之以為鑒戒書名書爵亦無意義此言真有得者而惜乎朱子未有成書也朕恐世之學者牽於支離之説而莫能悟特命大學士王掞纂輯是書以四傳為主其有舛於經者刪之以集説為輔其有畔於傳者勿録書成凡四十卷名之曰傳説彚纂夫春秋之作以游夏之賢不能贊一詞司馬遷稱七十子之徒口授其傳指而人人異端當時已無定論後之諸儒欲於千百年後懸斷聖人筆削之指不亦難乎是書之輯亦惟擇其言之當於理者雖不敢謂深於春秋而辨之詳取之慎於屬辭比事之義或有資焉是為序臣等謹按是書卷首二卷曰綱領曰王朝世表列國年表王朝列國世次及興廢説列國爵姓地圖王朝地名列國地名自隱公迄哀公分三十八卷通四十卷獲麟後附録經傳書成㳟呈欽定凡其中與經㫖違戾者詳加駁正於訂釋之内寓予奪之公而後尼山筆削之㫖粲然如日月經天矣御纂春秋直解十六卷乾隆二十三年大學士傅恒等奉敕撰皇上御製序曰中古之書莫大於春秋推其教不越乎屬辭比事而原夫成書之始即游夏不能贊一詞蓋詞不待贊也彼南史董狐世稱古之遺直矧以大聖人就魯史之舊用筆削以正褒貶不過據事直書而義自為比屬其詞本非得已贊且奚為乎厥後依經作傳如左氏身非私淑號為素臣猶或詳於事而失之誣至公羊穀梁去聖愈逺乃有發墨守而起廢疾儼然操入室之戈者下此齦齦聚訟人自為師經生家大抵以胡氏安國張氏洽為最著及張氏廢而胡氏直與三傳並行其間傅㑹臆斷徃徃不免承學之士宜何所考𠂻也哉我皇祖欽定傳説彚纂一書鎔范羣言去取精當麟經之微言大義炳若日星朕服習有年紹聞志切近因輯易詩二書竣事命在館諸臣條系是經具解以進一以彚纂為指南意在息諸説之紛歧以翼傳融諸傳之異同以尊經庶幾辭簡而事明於范寗去其所滯擇善而從之論深有取焉夫儒者猥云五經如法律春秋如斷例故啖助趙匡陸淳輩悉取經文書法纂而為例一一引徽切墨以求之動如鑿枘之不相入譬諸叔孫通蕭何增置傍章已後例轉多而律轉晦蓋曲説之離經甚於曲學之泥經也審矣書旣成命之曰直解匪不求甚解之謂謂夫索解而過不直則義不見爾而豈獨春秋一經為然哉是所望於天下之善讀經者臣等謹按是書宗主欽定春秋傳説彚纂以求筆削之大㫖復承訓示務酌情理之平凡穿鑿破碎之見悉斥不採辭簡事明曉易切直一洗舊説迂曲之弊彼胡安國傳之附㑹臆斷經御製序文直揭其失而後聖經之微意渙然氷釋怡然理順不誠讀春秋者之大幸哉左傳杜解補正三卷顧炎武撰炎武一名綘字寧人崑山人炎武自序曰北史言周樂遜著春秋序義通賈服説發杜氏違今杜氏單行而賈服之書不傳矣呉之先逹邵氏寳有左觽百五十餘條又陸氏粲有左傳附注傅氏遜本之為辨誤一書今多取之㕘以鄙見名曰補正凡三卷若經文大義左氏不能盡得而公穀得之公榖不能盡得而啖趙及宋儒得之者則别記之於書而此不具也春秋程傳補二十卷孫承澤撰承澤見書類臣等謹按承澤以程子春秋傳為未完之書重為增輯於桓公九年以前則全録程傳舊文十年以後補以經説經説所無集諸儒之説以補之其九年以前程傳之所無者亦為補綴然所採取多本新安汪克寛纂疏則是胡氏安國之徒而非程子之意矣左傳統箋三十五卷姜希轍撰希轍字二濱餘姚人明崇禎壬午舉人入國朝官至奉天府府丞春秋稗疏二卷春秋家説三卷王夫之撰夫之見易類春秋平義十二卷春秋四傳糾正一卷俞汝言撰汝言字右吉秀水人前明諸生汝言自序曰公穀胡氏以名稱褒貶言春秋而六經有名家法家矣彼其初未始不欲探聖人之精藴而智識弇淺强求深逺迨至有宋大儒程朱輩出而後正其紕繆夫春秋左氏親見聖人公穀傳諸高第弟子而偏駁者半焉康侯品高學博方以為程氏之正傳而疵累不少朱子心知之而時時見於弟子講論之餘後人又不能推明其義徒使附㑹穿鑿刑名法術之言出於一代大儒而不覺是可異也汝言不揣纂集諸家自為一書先之以四傳糾正為六端以該之一曰尊聖而忘其僣二曰執理而近於迂三曰尚辭而鄰於鑿四曰億測而涉於誣五曰稱美而失情實六曰摘瑕而傷鍥刻六者之弊去而後可以讀春秋矣繆泳曰汝言研精經史之學尤熟於明代典故擬成一書僅先就􅌠輔列卿年表而已晩專治春秋其詩古文曰漸川集讀左日鈔十二卷補二卷朱鶴齡撰鶴齡見書類鶴齡自序曰春秋三傳並立左氏獨詳於史事必世為魯史能尊信聖經而為之作傳其蹖駁而不純者固有之而臚陳二百四十年史事則十得八九特其筆法簡古往往費人推索元凱注旣多未備而孔仲逹疏又卷帙繁重東山趙子常特申不書之㫖輯為補注多與經義相證發予復廣演而博通之自孔疏而下弋獲於劉原父吕東萊陳止齋王伯厚陸貞山邵國賢傅士凱者居多又取春秋人物引繩墨而論㫁之使學者知古今人材之盛兵法之精莫過於春秋應變出竒益人神智讀史者當有取焉春秋傳注三十六卷嚴起隆撰起隆字爾泰烏程人前明諸生春秋論二卷嚴㲄撰㲄字佩之無錫人前明諸生春秋正業經傳刪本十二卷金甌輯甌字完城一字寧武秀水人春秋傳議四卷張爾岐撰爾岐見易類左傳事緯十二卷附録八卷馬驌撰驌字驄御又字宛斯鄒平人順治己亥進士官淮安府推官終靈璧縣知縣朱彝尊曰馬氏左傳事緯凡十二卷前有序傳一卷辨例三卷圖説一卷覽左隨筆一卷春秋名氏譜一卷左傳字音一卷又嘗㑹萃三代之書為繹史人目之曰馬三代臣等謹按序傳等八卷即附録也本名前書其十二卷曰正書凡百有八篇篇為終始篇末各為之論蓋易編年為叙事者春秋志十五卷湯秀琦撰秀琦見易類宋犖序曰臨川湯子弓菴作春秋志分事與理為二體事則統以年表而為表者八理則統以書法而為法者四八表各主一事為綱二百四十二年之首尾數簡足以瞭之其書法四種以精義為經比事為緯而條例遺㫖且足為交㕘考互之資其為道也備矣以此陳事寧復亂而無緒乎以此制理寧復㕘而不一乎春秋備要三十卷翁漢麐撰漢麐字仔安常熟人春秋類義折𠂻十六卷王芝藻撰芝藻見易類芝藻自序畧曰公羊襲取穀梁之書而續為之亦多繆戾左傳可信者十之四不可信者十之六惟穀梁猶不失聖門之舊春秋疏畧五十卷張沐撰沐見易類臣等謹按沐以經文為魯史以左傳為孔子所作謂孔子尊魯史為經而以不可為經者附之經左故曰左傳殊駭人聽聞也春秋類考十二卷春秋疑義一卷華學泉撰學泉字天沐無錫人春秋輯傳辨疑無卷數李集鳳撰集鳳字翽升臨榆人官洛陽縣丞畿輔通志曰集鳳淹貫羣籍尤善春秋彚先儒注解討辨詳核歴三十年凡四易稿然後成書名曰春秋辨疑春秋惜隂録八卷徐世沐撰世沐見易類春秋蓄疑十一卷劉䕃樞撰䕃樞見易類春秋毛氏傳三十六卷春秋簡書刋誤二卷春秋屬辭比事記四卷春秋條貫篇十一卷毛竒齡撰竒齡見易類李塨序毛氏傳曰經解曰春秋之失亂亂者亡之端也又曰屬辭比事而不亂則深於春秋者也夫屬辭比事治亂之法也先生知其然専為治經因為立一例曰以傳釋經不以經釋傳取史官記事法以設門部經若干條條若干事事若干門門若干部於是聨其書法之通覈謂之屬辭較其記事之參變謂之比事而予奪見焉於是始為之治傳就三傳之中取其事之與經合者曰傳且别其傳之與史合者曰䇿書不特杜預何休賈逵范甯受其區别即公羊穀梁指斥如蒯隸必不使與左氏䇿書互相溷亂至於唐後諸儒大率棄置不屑道而胡氏一書三致意焉以為是書者固亂經之階而亡經之本也間考先生立説不好詭異每所考校必與門部相依而分乃一袪雜例若所稱三體五情七缺九㫖者而以四例該之禮者固春秋要領也事與文與義又春秋之所自備也於是又立一例曰以經釋經不以傳釋經任取經文一條而初觀其禮繼審其事繼核其文又繼定其義而經之予奪進退無出此者而猶謂春秋之亡非藉是書以存之不得矣臣等謹按朱彝尊經義考云毛氏説春秋分二十二門曰改元即位生子立君朝聘盟㑹侵伐遷滅昏覿享唁䘮𦵏祭祀蒐狩興作甲兵田賦豐凶災祥出國入國盜弑刑戮而總括以四例曰禮例謂前二十二門皆典禮也曰事例則以二十二門一千八百餘條無非事也曰文例則史文之法也曰義例則貫乎禮與事與文之間其簡書刋誤一編取三傳異文詳為辨證大率多取左氏而仍執其傳據䇿書經據簡書之説故以簡書為名屬辭比事記四卷仿沈棐趙汸之例以經文分隸二十二門然僅得七門蓋其未完之書條貫篇則竒齡分校禮闈時監試官謂春秋雙題必以胡傳條貫竒齡謂惟經始可以條貫歸田後旣為傳三十六卷復於聖經中檢其事之有緒屬者或一條一屬或數條一屬而為是編也春秋集解十二卷緒餘一卷春秋提要補遺一卷應撝謙撰撝謙見易類學春秋隨筆十卷萬斯大撰斯大見禮類浙江通志曰斯大之言春秋也一曰專傳經無事實待傳而明左氏詳覈宜奉為主一曰論世春秋二百四十二年世皆無道孔子但據事直書是非自見一曰屬辭比事春秋一事必有本末異事亦有同形如衛人殺州吁衛人立晉此屬辭而見其為一人也立晉書衛人立王子朝書尹氏此比事而見其公私也一曰原情定罪如魯桓見殺於齊時莊公尚幼法無可施故書薨書䘮至書𦵏迨旣長而忘讐共狩則書如齊如莒以罪之春秋遵經集説二十六卷邱鍾仁撰鍾仁字近夫崑山人康熙戊午應博學鴻詞老不與試特賜中書舍人例畧曰是編本述孟子朱子説經之義故冠二子之説於簡端其集説則兼取諸家春秋地名考畧十四卷左傳姓名考四卷高士竒撰士竒字澹人錢塘人居於平湖以諸生薦直内廷授中書舍人改翰林院侍講官至詹事府詹事士竒自序曰成周千八百國春秋以還强兼弱削見於經傳者總一百二十四國按晉書地理志見於春秋經傳者百有七十國百三十九知其所居三十一國盡亡其處杜佑通典同與此序互異謹附識於此税安禮指掌圖可按也元凱所注十得八九若鄭樵春秋地名譜十卷楊湜春秋地譜十三卷及酈善長水經注陸淳春秋纂例張洽春秋集傳多所考按然世代侵尋沿革互異地名之異同往往毫釐千里王地洛邑相近而殊名故絳新田屢遷而非昔楚邱之紛紛聚訟郊郢之譌為郢中所繫非細士竒奉命總修春秋講義於纂記之暇博搜詩書而參考之取春秋二十㑹盟之國為綱各以其當時封境所屬隨地標名諸小國則編年附綴之削入他國者則從其初不從其後使覽者一展卷而知當日之某地某邑即今日之某名某處云臣等謹按地名考或又以為士竒鄉人徐善著善字敬可嘉興人朱彝尊曝書亭集中載有此序謂地名考吾鄉徐善所輯餘文並同謹附志於此以備參核姓名考則考周魯鄭晉楚齊宋衛陳曹蔡秦越許邾呉滕薛杞莒及諸小國君臣見經傳者或以族從或以官從后夫人婦人附焉亦間采國語春秋大義無卷數張希良撰希良字石虹黄安人康熙乙丑進士官至翰林院侍講學士希良自序曰善説經者莫若康侯私心竊有所未滿者聖心忠恕刻則離聖心簡直曲則離聖心明白而正大纎則離左氏即未親見聖人亦必竊窺魯史公榖二氏得之傳聞難以依據康侯據二氏以駁左亦未為盡得故一本左氏錯綜當時之事勢平心以想聖人之心而名字人爵時日諸例槪所不取春秋管窺十二卷徐庭垣撰庭垣秀水人官新昌縣丞庭垣自序曰世但知推尊聖人而不知孔子當日一魯大夫也於周天子則其大君於魯公則其本國之君於列國諸侯則俱周天子所封建與魯君並尊者也身為人臣作私書以賞罰王侯君公此犯上作亂之為而謂聖人肯為之乎如謂所誅絶者非在位之王公豈先王先公遂可得而誅之乎昌言無忌禍之招也縱曰深藏其書不輕示人然聖人者不欺屋漏明知犯上干禁而故作之又深匿之以圖幸免亦必無之事矣又自述釋例曰以左傳之事實質經以經之異同辨例於公羊穀梁二傳及諸儒論釋其合於義例先後無悖者不復置議如其曲説偏斷理有窒礙則據經文先後以駁正之三傳折諸四十四卷張尚瑗撰尚瑗字宏蘧一字損持呉江人康熙戊辰進士改庶吉士散館外補興國縣知縣臣等謹按尚瑗取揚雄羣言淆亂折諸聖之語故名是編曰折諸雖體要有乖而引據猶稱典核春秋參義十二卷春秋事義慎考十四卷公穀彚義十二卷姜兆錫撰兆錫見易類兆錫公穀彚義自序曰左氏傳主紀事二傳主發義先儒謂左氏為史學而失之誣二傳為經學而失之鑿唐以來乃升諸傳為經而與於十三經之列是明經而不免亂經也胡文定嘗本程傳以推經之藴而朱子復參胡傳以探經之真故程胡朱子之論合而後聖經存所以存其是也杜預嘗注左氏傳以釋經之事而忘其誣何休范甯復注公羊榖梁二傳以釋經之義而忘其鑿故杜預何休范甯之論紛而後諸傳存而聖經亂所以駁其非也駁其非乃以存其是也何也其文其事皆其義定之也夫左之失誣不待言矣且以二傳言之如月當書日之文間有逸文也而誣為異例則支月有書時之文乃指首時也而臆為異義則紊此皆混其文為害而義隨之也如赤歸曹而連郭偃納燕而牽陽且唐為陽又增為陽生朱為東又幻為東國此又皆竄其文為害而事隨之義亦隨之也又如公子翬公子招而謂豫貶於前公子臧公叔術而謂延賞於後祭仲黨奸謀蔑國君而美之曰行權叔術背王命奸國母而推之曰賢行訖於嬰齊以弟繼兄衛輒以子拒父又皆事與義胥害而害義彌大也然則二傳一無取乎曰如所謂正終以正始貴道不貴惠之屬固卓乎道義之權衡聖哲之軌範也其擇之也宜慎故曰駁其非乃以存其是也春秋義疏無卷數蔣家駒撰家駒見易類春秋指掌三十卷前事一卷後事一卷儲欣蔣景祁同撰欣字同人康熙庚午舉人景祁字京少皆宜興人春秋詳説無卷數冉覲祖撰覲祖見易類宋元春秋解提要無卷數黄叔琳撰叔琳見易類臣等謹按是編與宋元易解提要皆其屬稿未完之書或菴評春秋三傳無卷數王源撰源字崑繩號或菴大興人康熙癸酉舉人春秋鈔十卷朱軾撰軾見易類軾自序畧曰是編恪守胡傳惟間有詞㫖未暢及意所未安者始妄陳管窺之見以質之春秋闕如編八卷焦袁熹撰袁熹字廣期金山人康熙丙子舉人春秋宗朱辨義十二卷張自超撰自超字彝歎高淳人康熙癸未進士見江南通志儒林傳自超自序曰朱子謂聖人作春秋原以褒善貶惡示萬世不易之法今乃用此説以誅人未幾又用此説以賞人非聖人至正之道又謂春秋直載當時之事使見其治亂興衰不於一字兩字定褒貶此則春秋之條目可悉舉也朱子之説雖畧因其説而推之不必强立為例而大義自通春秋通論四卷春秋比事目録四卷方苞撰苞見禮類苞自序曰屈摺經義以附傳事者諸儒之蔽也執舊史之文為春秋之法者傳者之蔽也脱去傳者諸儒之説必義具於經文始用焉而可通者十四五矣然後以義理為權衡辨其孰為舊史之文孰為孔子所筆削而可通者十六七矣春秋長歴十卷春秋世族譜一卷陳厚耀撰厚耀字泗源泰州人康熙丙戌進士官蘇州府教授以通算入直内廷改授檢討終右諭徳臣等謹按厚耀明於算學是書補杜預長歴而作而所推較預為密能正杜氏之譌舛實有禆於推步之學世族譜一卷亦補杜氏之闕蓋預有釋例原本久就湮没㳟遇聖朝博訪遺編表章舊學釋例一編得於永樂大典中輯成完帙而世族譜尚闕厚耀旣未見釋例因据孔氏正義證以他書搜採頗為淹洽治春秋者固不可少此兩書矣半農春秋説十五卷惠士竒撰士竒見易類春秋三傳纂凡表四卷盧軒撰軒字六以海寧人康熙己丑進士官翰林院編修左傳拾遺二卷朱元英撰元英字師晦上元人康熙己丑進士春秋説十二卷田嘉榖撰嘉穀見易類春秋義十五卷孫嘉淦撰嘉淦見禮類臣等謹按是編無傳文謂經㫖本明無藉傳也春秋集傳十卷李文炤撰文炤見易類左傳杜註補義一卷蘇本潔撰本潔字幼清常熟人康熙癸巳舉人官宣化府知府陶貞一曰本潔原本兼補林堯叟注義貞一為刪之春秋測微十三卷朱竒齡撰竒齡字與三號拙齋海寧人康熙中貢生春秋三傳同異考一卷呉陳琰撰陳琰字寳崖錢塘人春秋左傳事類年表一卷顧宗瑋撰宗瑋字廷敬呉江人臣等謹按是編凡例尚有三傳異同一卷春秋通例一卷春秋稽疑一卷春秋參同一卷春秋提要發明一卷春秋圖譜一卷春秋箋釋一卷春秋餘論一卷今皆未見其書蓋猶未完之本耳左繡三十卷馮李驊陸浩同編李驊字天閑錢塘人浩字大瀛定海人春秋大事表五十卷偶筆一卷附録一卷顧棟高撰棟高見書類棟高自序曰胡氏之春秋即開章春王正月一條而其違背者有二其一謂春秋以夏時冠周月是夫子以布衣而改時王之正朔也其一謂不書即位為首絀隱公以明大法是夫子以魯臣子而黜君父也其餘多以復讐立論是文定之春秋而非夫子之春秋用是覃精研思廢寢與食家貧遊歴燕齊宋晉陳衛呉楚越之區所至訪求春秋地理始創意為表為目五十為卷六十有四首列時令表明商周皆改時改月以正胡氏及蔡氏書傳之非於吉禮表詳列十二公即位或不書即位明當日皆據事實書以正聖人以天自處貶削君公之謬列朔閏及長歴拾遺二表以補杜氏之長歴而二百四十二年之時日屈指可數列疆域及犬牙相錯五表以補杜氏之土地名而一百四十國之地理聚米可圖郊禘社雩崩薨卒𦵏蒐田大閲㑹盟聘享逆女納幣列吉凶賓軍嘉五禮以紀上陵下僭之情形税以足食賦以足兵乃魯税畆而田制壊作邱甲而兵制亦壊列田賦軍旅表以志强臣損上剥下之實霸統興而王道絶周室夷為列國霸統絶而諸侯散列國淆為戰爭列爭盟凡五交兵凡七以紀盛衰强弱之世變列晉中軍楚令尹以志二國盛衰强弱之由列宋鄭二執政表以志二國向背闗於天下之故列王迹拾遺魯政下逮二表以志周魯陵遲尾大不掉之漸禘即祫祫即禘而朱子取趙伯循説謂祭始祖所自出殊不知帝嚳原非稷契之父生民長發皆商周禘祀之樂斷無稱母不稱父之理著禘祫説以明戴記祭法大傳之誣去姜存氏去氏存姜杜孔已斷為闕文宋儒謂各有意義不知文姜哀姜之惡豈待去其姓氏而明况上下截去一字人復知為誰某聖人無此弄巧文法列闕文表以掃後儒穿鑿支離之翳三傳各執一説學者靡所適從列三傳異同表酌𠂻一是以袪後日雷同偏枯之弊列四裔表以正史遷允姓姬宗目為兄弟之妄列兵謀以志孫呉韜畧之始文王演易周公作詩書一時士大夫占筮決疑歌詩贈答引物知類千里同風列三經表以志漢宋儒經説之祖大河遷徙從古不常而周定王五年河徙係魯宣公之七年春秋以河為境者六國獨係於衛列河未徙與已徙二圖以志春秋與禹貢河流遷變之自謹述其縁起命之曰春秋大事表云春秋義存録十二卷陸奎勲撰奎勲見易類春秋識小録九卷程廷祚撰廷祚見易類臣等謹按是編凡職官考畧三卷地名辨異三卷人名辨異三卷訂證頗為詳洽惟考職官一門畧諸國而獨詳晉則未解其何意也春秋筆削微㫖二十六卷春秋通論五卷劉紹攽撰紹攽見易類空山堂春秋傳十二卷牛運震撰運震見易類春秋管見無卷數魏樞撰樞見易類春秋義補注十二卷楊方逹撰方逹見易類臣等謹按方逹凡例載孫嘉淦作春秋義復自燬其板蓋嘉淦以胡傳常事不書之説為宗主於春秋本㫖頗多未愜方逹為孫嘉淦所知因為增其闕畧刪其譌舛以成是編故名之補注春秋原經四卷王心敬撰心敬見易類左傳補注六卷惠棟撰棟見易類春秋左氏傳小疏一卷沈彤撰彤見書類春秋地理考實四卷江永撰永見禮類臣等謹按永以現在之輿圖訂春秋山川國邑地名確指其今為何地當時方向道里㑹盟侵伐之迹讀者得以展卷瞭如訂訛補闕鑿鑿可稽名曰考實信不誣也三正考二卷呉鼐撰鼐見易類春秋究遺十六卷葉酉撰酉見詩類春秋深十九卷許伯政撰伯政見易類春秋隨筆二卷顧奎光撰奎光字星五無錫人乾隆乙丑進士官瀘溪縣知縣春秋集古傳注二十六卷或問六卷郜坦撰坦淮安人春秋義解十二卷劉夢鵬撰夢鵬字雲翼蘄水人乾隆辛未進士官饒陽縣知縣夢鵬自序曰公榖比事屬辭義不詭於儒者而斤斤於日月名氏爵號以求例曾謂春秋之㫖盡如是乎若左氏紀事多而誤説經疎而謬如莒密州之事經不云世子展輿也而左以為展輿莒庶其之事經不云世子僕也而左以為僕蔡侯申之事經賤者書盜也而左以為公孫翩晉州蒲之事經不云欒書中行偃也而左以為書與偃晉夷臯之事經以為趙盾也而左以為穿鄭伯夷之事經以為歸生也而左以為宋呉僚之事經不云公子光也而左以為光鄭髠頑經以為卒也而左以為公子騑之謀楚子麋經以為卒也而左以為公子圍之逆齊陽生經以為卒也而左以為陳乞以説於呉其他大夫奔殺經或止一二人而左增入數人㑹盟侵伐經各有其事而左或牽移他事滕薛杞宋蔡邾各二國經載分明而左誤合為一縁陵城杞實係兩地而左以為俱繋淳于入祊假田各有情事而左以為魯鄭相易子帛君氏訛誤字也而左以為名稱甲戌己丑兩存日也而左以為再赴𦵏桓王諱也而左以為改𦵏子般卒也而左以為殺子牙卒也而左以為酖諸如世次增添事迹引誤難以殫述讀左補義五十卷姜炳章撰炳章見易類炳章自述畧曰春秋無例左氏所言之例皆史氏之舊文其凡有五一曰西周舊典二曰東遷後列國相沿之例三曰魯史自相傳授之例四曰霸國更定之例五曰魯君臣私定之例杜預所謂凡例皆周公之禮經變例皆聖人之新意者未為定論春秋經傳類求十二卷孫從添過臨汾同編從添號石芝常熟人臨汾長洲人左傳評三卷李文淵撰文淵字靜叔益都人李文藻曰弟文淵潜心易禮兩經取古人圖象傳注羅而繹之者數年以至於病故所評閲多未終卷春秋日食質疑一卷呉守一撰守一字萬先歙縣人春秋不傳十二卷湯啟祚撰啟祚字迪宗寳應人臣等謹按是書專取公穀胡氏三家嚴刻煅鍊之説裒為一編名之曰不傳者謂於四傳無所專從也春秋集解讀本無卷數呉應申撰應申字文在歙縣人春秋三傳事實廣證無卷數不著撰人名氏皇朝文獻通考卷二百十五
