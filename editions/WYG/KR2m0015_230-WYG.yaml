body:
  text: 欽定四庫全書皇朝文獻通考卷二百三十經籍考二十子類書藝術道家釋氏神仙欽定淵鑒類函四百五十卷康熈四十九年大學士張英等奉勅撰聖祖仁皇帝御製序曰朕幾務餘暇博涉藝林毎覽一書必盡其全帙沉潛往復既得其始終條理精義之所存而文句英華亦常讀之矣嘗謂古人政事文章雖出於二然文章以言理政事則理之發邇而見逺者也豈僅以其區區文句之間而可以自命為學術乎自六朝乃有類書而尤盛於唐此豈非求之文句之間者哉雖然理之所寓於斯萃焉弗可廢也昔者孔子之繫易也曰方以類聚又曰本乎天者親上本乎地者親下則各從其類也於諸卦則曰其稱名也小其取類也大蓋以天下古今事物之理畢具於易而易之為書因理象物因物徵辭以斷天下之疑而成天下之務者各從其類以明之然則類書之作其亦不違於聖人立言之意歟書之最著者藝文類聚北堂書鈔初學記白帖杜氏通典宋明以來撰者寖廣若博而不繁簡而能覈者抑亦鮮矣獨俞安期唐類函頗稱詳括大抵祖述歐陽詢之類聚稍刪存書鈔初學記白帖通典而附益之安期明人也而曰唐類函者以其皆唐輯也既缺宋以來書而唐以前亦有脱漏者爰命儒臣逖稽旁搜泝洄往籍網羅近代増其所無詳其所畧參伍錯綜以摛其異探賾索隠以約其同要之不離乎以類相從而類始備焉書成計四百五十卷夫自有類書迄於今千有餘年而集其大成可不謂斯文之少補乎學者或未能盡讀天下之書觀於此而得其大凡因以求盡其始終條理精義之所存其於格物致知之功修辭立誠之事為益匪淺尠矣臣等謹按明俞安期撰集虞世南北堂書鈔歐陽詢藝文類聚徐堅初學記白孔六帖諸書以其為唐人所述題曰唐類函六朝以前遺文舊事頗存梗概至武徳貞觀以後詞章僅見數篇蓋當時七子倡復古之説相戒勿讀唐以後書安期在明之季號稱積學猶持七子之緒論然唐人搜輯舊聞不遺隋魏即宋時太平御覽亦著三唐况類書之作要使古籍散亡藉以存什一於千百非徒為詩文𨽻事而設則何必更限以時代轉令千餘年文獻無徵乎我聖祖仁皇帝乙夜觀書廣為紬繹因命詞臣博採元明之文章事跡併安期所編㑹成巨製百川歸海九金就鎔自有類書以來未有若兹之宏博富麗者也御定佩文韻府一百六卷康熈五十年大學士張玉書等奉勅撰聖祖仁皇帝御製序曰朕萬幾在御日昃宵分未遑自逸時當燕閒不輟問學羣經子史誦其文而晰其義矣以至百家之書凡可以禆世教勵民風者修明補正罔使闕遺嘗謂韻府羣玉五車韻瑞諸書事繫於字字統於韻稽古者近而取之約而能博是書之作誠不為無所見也然其為書簡而不詳畧而不備且引據多誤朕每致意焉欲博稽衆籍著為全書爰於康熈四十三年夏六月朕與内直翰林諸臣親加考訂證其訛舛増其脱漏或有某經某史所載某字某事未備者朕復時時面諭一一増録漸次成帙猶以故實或未極博於十月復命閣部大臣更加蒐採以裒益之既有原本増本又有内増外增將付剞劂矣名曰佩文韻府隨於十二月開局武英殿集翰林諸臣合併詳勘逐日進覽旋授梓人於五十年十月全書告成共一百零六卷一萬八千餘頁囊括古今網羅巨細韻學之盛未有過於此書者也書成諸臣請序朕念自初至今經八年矣厯寒暑之乆積嵗月之勤朕於此書政事之暇未嘗惜一日之勞也朕又嘗諭諸臣從來著一大書非數十年之功不能成今數年以來所成大部書凡十有餘種若非合衆人之力豈能刻期告竣故念先後預事諸臣皆命列名其中兹序佩文韻府因備記編撰之始末遂及修集諸書之大指以見成書之不易如此臣等謹按類書之分韻隸事昉於唐顔真卿之韻海鏡原二百卷惜其書不傳今惟韻府羣玉五車韻瑞等書盛行於世而舛訛疏漏之處或不免焉我聖祖仁皇帝特詔儒臣重加纂輯延閣廣内之儲蒐羅遍焉前列韻藻凡皆陰氏凌氏之書所已録者也後則别標増字則兩家所未録者也分𨽻之字由少而多又各依經史子集序次秩如或一語而諸書互見者則先引最初之書而其餘以次注於下又别以事對摘句附綴於末御定韻府拾遺一百十二卷康熈五十五年刑部侍郎張廷玉等奉勅撰臣等謹按佩文韻府既成特命搜竒抉秘復輯是書其分韻𨽻事悉凖前編而所補之例則有四焉一曰前編所有之字則惟増韻書之音切一曰前編未收之字從他韻増入者則兼註音義一曰文句典故前編未及載者謂之補藻一曰前編已載而復加註謂之補註清詞麗句蒐採靡餘無隻字之憾信乎學海朝宗不遺涓滴也已御定駢字類編二百四十卷康熈五十八年工部侍郎吳士玉等奉勅撰世宗憲皇帝御製序曰我皇考徳秉生知學深稽古萬幾之暇披覽簡編自六經諸史以逮諸子百家莫不探其本源窮其閫奥又令詞臣纂集羣言廣稽博採丹黄甲乙薈萃成編所就者非止一書所録者動盈萬卷咸秉宸衷之釐定并為秘府之珍藏又以自古類書或以事而相從或以韻而相次因循故轍訛偽相沿乃命儒臣纂修駢字類編一書字從所統若律吕之有元聲類以字分如百川之歸大壑提綱挈領義例燦然首天地而時令次之次山水居處而珍寳數目又次之次方隅采色器物而草木鳥獸蟲魚人事又次之部分則簡而不煩取材則博而能要極詞壇之瑋麗創類苑之奇觀朕景仰前徽欽承丕緒如子史精華圖書集成等書悉遵先志分命臣工夙夜校讐並皆竣事而駢字類編亦以今秋告成記曰比事屬辭葢駢之義也易曰方以類聚則類之始也今字則從駢義雖不同而不妨於並列編則從類事雖互見而不至於混淆於是乎乾坤之藴民物之繁大備於一書之中而蔚然萃羣書之秀矣洪惟我皇考盛徳際天地大業照古今述作上繼夫聖明文章悉歸於性道是書之成豈徒為藝林之盛事而已哉形而上者謂之道形而下者謂之器引而伸之觸類而長之無器之非道也爰書大意弁之簡端庶幾以學務時敏之思為紹庭陟降之志云爾臣等謹按韻府羣玉五車韻瑞等書皆取落脚字為韻從未有以起頭字編次成書俾之互相為用者我聖祖仁皇帝韻府既成旋以尾字同韻必更以首字同韻者相為經緯爰輯為是編凡分十有二門曰天地曰時令曰山水曰居處曰珍寳曰數目曰方隅曰采色曰器物曰草木曰鳥獸曰蟲魚又補遺一門曰人事標首之字凡一千六百有四每條所引以經史子集為次仍仿韻府成例也至引書必著其篇名引詩文必著其原題或一題而數首者必著其為第幾首俾檢閲者得一覽而知不徒泛為捃摭務博而已欽定子史精華一百六十卷康熈六十年工部侍郎吳士玉等奉勅撰世宗憲皇帝御製序曰恭惟皇考聖祖仁皇帝天縱聰明秉上聖之姿而垂意典籍勤於稽古御極六十餘年萬幾之暇披覽卷帙不輟寒暑巡幸所至必以緗素自隨逮於耄齡精研不倦延閣廣内之藏搜討無遺所謂好古敏求多學而一以貫之也欲以編輯成書嘉惠天下後世嗜學之士特命開書局於武英殿召集詞臣厯嵗修纂每成數卷即上呈御覽親加指示前後所成充溢冊府而子史精華之纂為最後朕纘緒之初尚未告竣敬承先志俾就厥功綜觀大凡其部三十其目二百七十有九自天文地理帝徳王功禮樂兵刑之大人倫日用之常以及九邊之殊域二氏之異教方術技藝之巧草木鳥獸之蕃門分類别條理具備而採掇子史芟蕪擷秀甚有禆於學者葢士之嚮學通經為先而博及於子史固不能若窮經之専一惟攬其精華而識之弗忘俾考古者於兹尋其緒則無慮於簡牘之繁績文者於兹取其材則有助於翰墨之富用力甚簡而成功已多是聖祖皇帝垂教無窮之至意也剞劂既畢展閲全編敬為叙引昭示乆逺用綴於篇端臣等謹按是編部分三十天地帝王皇親嵗時禮儀設官政術武功邊塞倫常品行人事樂釋道靈異方術巧藝形色言語婦女動植儀飾服飾居處産業食饌珍寳器物凡治統道統之大品物名象之微罔不賅備而又詳為分注端緒秩如於子史兩家誠披沙而見寳矣御定分類字錦六十四卷康熈六十一年翰林院編修何焯等奉勅撰聖祖仁皇帝御製序曰司馬相如云合纂組以成文列錦繡而為質葢言詞賦雖雕蟲末技亦必掞藻敷華飾琢其章句然後文質相宣也朕山莊避暑􅎁幾之暇以翰墨自怡而卷帙充積廣博鮮要爰命何焯陳鵬年等薈萃經史子集下至說部諸書採擇其字之麗雅者别為四十門六百一十八類每類又分成對備用共六十四巻名曰分類字錦閲三載編纂告成朕惟日星輝耀雲霞綺駮天之錦也山川峙流草樹葱鬱地之錦也觀文察理禮定樂興帝王之錦也若夫相如所云乃錦之膚寸者耳然對偶本於陰陽音聲協於律吕古文人駢織之功又烏可廢哉是書也子夏所謂雖小道必有可觀者焉臣等謹按𨽻事纂言列為對偶徐堅初學記中即有此體有唐文士遂以精敏為工第丹青雜俎典冊紛繁博採恒難駢羅未愜是書纂合麗句薈成巨編凡四十門剪裁則華實兼收配𨽻則銖兩悉稱或玉屑珠英可供文藻而單詞片語未易駢連者各依字數附綴於末謂之備用於此見石渠天禄之珍藏者誠衆美之畢萃也欽定古今圖書集成一萬卷雍正三年户部尚書蔣廷錫等奉勅校世宗憲皇帝御製序曰欽惟我皇考聖祖仁皇帝聰明睿知亶生知之質而又好古敏求孜孜不倦萬幾之暇置圖書於左右披尋玩味雖盛暑隆寒未常暫曠積數十載之乆研綜古今搜討殆遍屢命儒臣宏開書局若周易折中發四聖之微言朱子全書會羣儒之奥義皆禀自睿裁復躬加校定若律厯淵源推軒皇之神策叶虞代之元聲皆親行指授以天縱之能而凖於儀器凡注經考史選詩論文以及博聞多識之資所纂輯雕鐫充溢於内府刪述之功嘉恵無窮稱極盛矣而又以為未攬其全乃命廣羅羣籍分門别類統為一書成冊府之鉅觀極圖書之大備而卷帙浩富任事之臣弗克祗承既多訛謬每有闕遺經厯嵗時乆而未就朕紹登大寳思繼先志特命尚書蔣廷錫等董司其事督率在館諸臣重加編校窮朝夕之力閱三載之勤凡釐定三千餘卷増刪數十萬言圖繪精審考定詳悉書成進呈朕覽其大凡列為六編析為三十二典其部六千有餘其卷一萬始之以厯象觀天文也次之以方輿察地理也次之以明倫立人極也又次之以博物理學經濟則格物致知誠意正心治國乎天下之道咸具於是矣惟我皇考法天行之剛健協坤徳之含宏察於人倫明於庶物尊六經而禮先儒釐六官以敷大政故是書之成貫三才之道而靡所不該通萬方之畧而靡所不究也我皇考金聲玉振集五帝三王孔子之大成是書亦海涵地負集經史諸子百家之大成前乎此者有所未備後有作者又何以加焉敬藏石室寳垂乆逺用敘其本末綴於篇首上以彰皇考好學之聖徳右文之盛治并紀朕繼志述事兢兢業業罔敢不欽若於丕訓云爾臣等謹按是書分六彚編三十二典首厯象彚編為典四曰乾象典二十一部嵗功典四十三部厯法典六部庶徵典五十部次方輿彚編為典四曰坤輿典二十一部職方典二百二十三部山川典四百一部邊裔典五百四十二部次明倫彚編為典八曰皇極典三十一部宫闈典十五部官常典六十五部家範典三十一部交誼典三十七部氏族典一千六百九十四部人事典九十七部閨媛典十七部次博物彚編為典四曰藝術典四十三部神異典七十部禽蟲典三百十七部草木典七百部次理學彚編為典四曰經籍典六十六部學行典九十六部文學典四十九部字學典二十四部次經濟彚編為典八曰選舉典二十九部銓衡典十二部食貨典八十三部禮儀典七十部樂律典四十六部戎政典三十部祥刑典二十六部考工典一百五十四部通六千一百九部凡一萬卷典制紀畧無卷數孫承澤撰承澤見經類臣等謹按承澤熟於典故是編廣徵博引頗資考核然體例不免龎雜經世篇十二卷顧炎武撰炎武見經類臣等謹按是書頗近埸屋策料葢應科舉者鈔撮類書為之而託名於炎武耳考古類編十二卷柴紹炳撰紹炳見經類紹炳自述曰此書取便童䝉比於小學紺珠之類廣羣輔録六巻徐汾撰汾字武令錢塘人王晫今世説曰汾喜著書苦無由得錢為楮翰常於破几上起草束麻濡煤以作字臣等謹按陶潛聖賢羣輔録乃後人假託為之此編補續尤未免冗蕪至明代七才子十才子之目乃係詞人標榜亦妄載之則苦於編摩而短於裁别矣二酉彚刪二十四巻王訓撰訓字敷彛安邱人順治丁亥進士古今疏十五卷朱虛撰虛字邵齋號可菴又號介菴曹州人順治丁亥進士官至紹興府知府政典彚編八巻王芝藻撰芝藻見經類三才藻異三十三卷屠粹忠撰粹忠號芝巖定海人順治戊戌進士官至兵部尚書三才彚編四卷龔在升撰在升字聞園嘉善人順治己亥進士官蘇州府推官教養全書十一卷應撝謙撰撝謙見經類臣等謹按是書之例畧仿馬端臨通考特改分選舉學校治官田賦水利國計漕運治河師役鹽法十考而多載明代掌故間附己見議論亦醇韻粹一百七卷朱彛尊撰彛尊見經類宫閨小名録四卷後録一卷尤侗撰侗見史類格致鏡原一百卷陳元龍撰元龍字廣陵海寧人康熈乙丑進士厯官文淵閣大學士諡文簡編珠補遺二卷續編珠二卷髙士竒輯士竒見經類臣等謹按徐乾學序謂編珠四卷隋大業中著作佐郎杜公瞻奉敕撰凡十四門門各有類惟取其事之切於用者故卷帙不多考隋經籍唐藝文二志並無此書他書録亦皆不注士竒偕乾學奉命校勘閣中書得之已逸其後二卷士竒博採故實以補其闕又廣其門類之未備者古事苑十二卷鄧志謨撰志謨字景南饒安人行年録無卷數魏方泰撰方泰字日乾號魯峯江西廣昌人康熈癸未進士官至禮部右侍郎翰林院學士石樓臆編五卷周綸撰綸字鷹垂江南華亭人康熈中官國子監學正五經類編二十八卷周世樟編世樟字章成太倉人古事比五十三卷方中徳撰中徳字田伯桐城人典引輯要十八卷丁昌遂撰昌遂字秀崖懷寧人讀書記數畧五十四卷宫夢仁撰夢仁字定山泰州人康熈戊戌進士官至福建巡撫花木鳥獸集類三卷吳寳芝撰寳芝石門人廣事類賦四十八卷華希閔撰希閔字豫原無錫人康熈庚子舉人根黄集十巻楊文源撰文源長泰人臣等謹按是書排纂三禮之文分律吕封建井田學校祭祀為五門每門之中各具子目其曰根黄者葢取黄鍾為萬事根本之意三體摭韻十二卷朱昆田撰昆田字西畯秀水人文獻通考節貫十卷周宗濓撰宗濓見儒家類考古畧八卷考古原始六卷王文清撰文清見經類春秋經傳類聫無巻數王繩曾撰繩曽字武沂無錫人雍正庚戍進士官揚州府教授繩曽自序曰宋徐晉卿有春秋類對賦拘於聲韻選詞難工事弗類從猶如野戰乃猶入經解得與諸家炳如列星並垂不朽兹編分類彚集聫為駢體以便記誦寧律不諧不使句弱寧句不工毋使語俗開府之長庶幾有取乎杜韓集韻三卷汪文柏撰文柏字季青號柯庭嘉興人官兵馬司指揮古今記林二十九卷汪士漢撰士漢見雜家類士漢自述曰此書義例有二一紀淑慝以示勸戒一蒐瑰琦以資見聞古學捷録十卷陳應麐撰應麐原名應明字縉英莆田人讀古紀源九卷何懋永撰懋永字念修山陰人經濟宏詞十二卷汪學信汪以時同編學信字四如以時字太易新安人唐句分韻初集四卷二集四卷續集二卷四集五卷馬瀚撰瀚字炎州順天人政譜十二卷朱栗夷撰栗夷字心菴山陰人是菴日記十四卷楊擁編擁字蔚芝號是菴爵里無考例畧曰是編㑹心即録叙次不倫挂漏孔多體殊握要類書纂要三十三卷周魯撰魯字南林無錫人駢語類鑑四卷周池撰池見史類右類書御定佩文齋書畫譜一百卷康熈四十四年禮部侍郎孫岳頒等奉勅纂聖祖仁皇帝御製序曰書者六藝之一昔柳公權言心正則筆正程子謂作字須敬即此是學葢以紀事載言行之天下垂之乆逺書誠重矣夫書以傳其意而畫以肖其形事若不相侔其義有可連類而並論者焉蒼頡史皇以來厯代載籍多能道之而時數相推材智間出繁重者變而之簡易樸拙者漸而之巧麗亦天地自然之理也其初古文繼為篆𨽻而今之所謂真書行草三者實權輿於斯矣然三者皆肇興於漢逮夫魏晉去古未逺多見古人篆𨽻故鍾繇書有其遺法而王羲之踵美垂徽祧前啟後士林所稱以為歸極矣若圖畫之事始自秦漢盛於六朝其間作者輩出曹衛顧陸擅能於前董展孫揚流聲於後隋有何鄭唐則閻呉大抵皆畫佛像人物下筆輒依故事迨氣韻之超極於潑墨寫生之精窮於没骨而畫之變盡焉朕萬幾燕閒披覽典册間臨書家名蹟每觀前代紀録書畫諸書種類錯互漫無統紀遂即佩文齋所有者編輯之使各以類相從為一百卷凡書畫之源流古今工於此者之姓氏以至聞人之題䟦厯代之鑑藏悉備考而慎其擇亦可謂詳且盡矣昔唐太宗好書親序王羲之傳自以為心慕手追而當時内府之圖籍亦號最盛迄於今日流傳者日逺日少晉唐已為隆古而况前此者乎然溯流者必窮其源習今日之書而不推本於篆𨽻亦猶齊末之觀也故上自蒼頡史皇下暨近代皆列焉朕於書畫偶有題䟦檢出數十則以為一卷從諸臣之請也要之尚稽曩昔用以攄適性情泳陶清暇附於古聖人游藝之意並為世之嗜古者樹毫楮之表凖宏考索之㫖趣則牙籖萬卷之中是編其亦可以永傳也夫臣等謹按書畫之品昉於齊梁唐張彦逺撰法書要録厯代名畫記自謂家世藏法書名畫李綽尚書故實亦亟稱之嗣後收藏鑒識家記載日繁大抵就所見聞品題真偽若考證之資固未能賅備也我聖祖仁皇帝萬幾餘暇翰墨怡情御製書畫題䟦奎章炳燿雲漢昭回乃復詔輯中秘之藏分門列目博採旁搜訂為兹譜首論其藝次傳其人而宸翰之所品評故府之所題識以及名人手䟦審定真贋者咸著録焉秘殿珠林二十四巻乾隆九年刑部尚書張照等奉勅編臣等謹按晉唐以來書家所繕經典雜列法帖鄧椿畫繼分八目亦以仙佛鬼神為首然均未嘗别為一書也我皇上以二氏之教畛域攸分爰勅内府所藏書畫有闗於釋典道籙者别為編録體例精詳巻端首載三朝宸翰皇上御筆次列厯代名人書畫而凡印本繡線刻絲之屬以類附焉次為臣工書畫次為石刻木刻經典語録科儀及供奉經像三藏旁羅七籖並列金題玉躞真有出於尋賞鑒之外者已石渠寳笈四十四卷乾隆九年刑部尚書張照等奉勅編臣等謹按書為游藝畫屬考工古未有所謂専門名家也東漢以來始以筆法為能事至書評書斷畫品畫記綜甄益精紀載日夥六朝三唐代有傳人其於名姓品第收藏著録題䟦古蹟辨别真偽或限於一家之見聞或誤於一時之鑒别迄未能羅厥衆美勒為鴻編惟我皇上摛藻為春尺素寸牋天工黙契而内府藏弆者復多人間所未睹儲積日富品鑒彌精勤政之餘萃成鉅帙其次序先册次卷次軸其記載則先書後畫先分後合以及欵式髙廣印記題䟦臚載既詳而列聖宸章幾餘寳翰尤炳燿於册府之中允為藝林之盛事也已庚子銷夏記八卷研山齋圖繪集覽三卷孫承澤撰承澤見經類臣等謹按承澤品行士論薄之而於鑒别書畫實别具隻眼退居後嘗於夏日録所藏墨蹟畫卷石刻及所見他人處者為之評隲考據詳明名曰銷夏記圖繪集覽三卷成於年八十二時其文多具銷夏記中以有其子炯所補且間有同異處故附録於後别有墨蹟集覽法書集覽四卷則全與銷夏記同無庸複載無聲詩史七卷姜紹書撰紹書見雜家類李光映序曰是書出於郡城項氏因多譌脱乃校定重刻焉書學彚編十巻萬斯同撰斯同見經類臣等謹按斯同録厯代善書之人凡一千五十四搜羅既博考證亦精由其邃於史學也畫法年紀一卷郭礎撰礎字石公江都人順治壬辰進士官至順徳府知府繪事備考八巻王毓賢撰毓賢字星聚鑲紅旗漢軍人官至湖廣按察使臣等謹按毓賢吏治精敏而案牘之暇不廢賞鑒是編先撮録諸家畫法為總論次取古來畫家姓名事迹以時代分序上自軒轅下至北宋雖祖述張彦逺厯代名畫記夏文彦圖繪寳鑑二書而蒐輯詳贍一覽周知謂之青出於藍可矣書法正傳十卷馮武撰武號簡縁常熟人臣等謹按武為馮班從子書學頗有淵源此其年八十一時所作閲厯既深論斷亦頗可據江村銷夏録三卷髙士竒撰士竒見經類式古堂書畫彚考六十卷卞永譽撰永譽字令之鑲紅旗漢軍人官至刑部侍郎王士禎居易録曰卞中丞永譽貽書畫彚考六十卷凡詩文題跋悉載上溯魏晉下迄元明所收最為詳博南宋院畫録八卷厲鶚撰鶚見史類六藝之一録四百六卷續編十二卷倪濤撰濤見經類臣等謹按此編上下二千年裒輯最富其為例凡六曰金器欵識曰刻石文字曰法帖論述曰古今書體曰厯朝書論曰厯朝書譜溯其源不遺其流觀其通亦窮其變誠書家之統會藝圃之淵林也草韻彚編二十六卷陶南望編南望字遜亭上海人石村畫訣一卷孔衍栻撰衍栻字石村曲阜人厯代畫家姓氏韻編七卷顧仲清撰仲清字咸三號松壑嘉興人烟雲過眼録二十卷周在浚撰在浚見史類髙兆跋曰綜計平生所聞見以欣賞之情具書畫之識謂今人皆及古人曹吳闗荆一顧再顧不復累心惟於幽人詞客故老貧交㫁練殘楮皇皇嵗月若寢食不暇耳小山畫譜二卷鄒一桂撰一桂字小山號讓鄉無錫人雍正丁未進士官至内閣學士臣等謹按一桂所畫花卉得惲夀平之傳此編論畫花卉法皆酌採古人微論而知天知地知人知物之説則未經人道者宜其以繪事之微上邀宸賞非偶然也傳神秘要一卷蔣驥撰驥字赤霄號勉齋金壇人漢溪書法通解八巻戈守智撰守智字達夫平湖人國朝畫徵録三卷續録二卷張庚撰庚見史類庚自序曰録國朝之畫家徵其蹟之可信者著於篇凡畫之為庚所寓目者以鄙見論著之或聞諸鑒賞家所稱述而未徵其蹟槩從附録創始於康熈後壬寅脱稿於雍正乙卯又精意識一卷記所見古畫而以論畫終焉月湖讀畫録一卷王樑撰樑震澤人艷雪齋書品二卷畫苑二卷筆墨紙硯譜一卷不著撰人名氏右藝術類書畫操縵録十卷胡世安撰世安見經類松風閣琴譜二卷抒懷操一卷程雄撰雄字雲松休寧人臣等謹按雄嘗學琴於韓昌因取閩人莊臻鳳原譜重加訂正宫夢仁祁豸佳皆為之序抒懷操三十調皆取時人之詞諧以為譜并付梓而行之溪山琴况一卷徐谼撰谼太倉人琴學心聲一卷莊臻鳳撰臻鳳號蜨菴江寧人琴談二卷程允基撰允基字寓山徽州人琴學内篇一卷外篇一卷曹廷棟撰庭棟見經類庭棟自序曰棟撰琴學内篇以律合琴即以琴證律而知正律之外必有變律還宫五聲必取半律實出於琴聲清濁之自然而與蔡氏新書有互相發明者若夫以十分定半律以九寸為虚數則與蔡氏微有不符至於取應必兼三節定徽俱出均分制絃則巨細同歸律位則分寸各具固新書所未備亦漢唐以來諸書所未論及也外篇薈萃古今琴説妄以已意按其是非非敢譏議前人葢不如是無以明其理之必然與其用之變化也右藝術類琴譜印存初集二卷印存元覽二卷胡正言篆正言字曰從海陽人前明嘗官武英殿中書舍人臣等謹按古人摹印之法以端重為宗明文彭何震二家篆刻最著然彭喜秀雅而傷於娬媚震尚蒼勁而故示圭稜其末流均不能無失正言以摹印名於時頗能矯兩家之弊是編乃其印譜朱印者為初集墨印者為元覽凡名字印十之八齋閣印十之一鐫成語者十之一印典八卷朱象賢撰象賢號清溪呉縣人白長庚序曰印典引宋王基梅菴雜記蝸廬筆記葉氏游藝雜述元宋無考古紀畧四書皆得之檇李曹氏鈔本為諸家所未見右藝術類篆刻臣等謹按漢藝文志曰道者秉要執本清虗以自守卑弱以自持有合於謙讓之義自神仙之流赤松子魏伯陽以煉養之術著盧生李少君以服餌之方傳淮南鴻寳秘鍊丹鉛北魏謙之訣傳齋醮以逮張魯杜充庭輩又以符籙科教為事異軌殊趨源流不一要於清净無為之㫖益背而馳此與老莊之學所以不容混為一也今仍馬考之舊仍析道家神仙為二至釋氏一門昉於阮孝緒七録而阮録本列神仙之上四庫全書已師其例今亦謹遵編次焉御定道徳經注二卷順治十三年世祖章皇帝御撰世祖章皇帝御製序曰朕聞道者先天地而為萬物宗生生化化莫得而名者也惟至人凝道於身故其徳為𤣥徳而其言為聖言老子道貫天人徳超品彚著書五千餘言明清浄無為之㫖然其切於身心明於倫物世固鮮能知之也嘗觀其告孔子曰為人子者無以有己為人臣者無以有己而仲尼答曽子之問禮每曰吾聞諸老耼豈非以人能清浄無為則忠孝油然而生禮樂合同而化乎猶龍之歎良有以也自河上公而後注者甚衆或以為修煉或以為權謀斯皆以小智窺測聖人失其意矣開元洪武之注雖各有發明亦未彰全㫖朕以聖言𤣥逺末學多岐茍不折衷以理恐益滋譌誤用是博叅衆説芟繁去支釐為一注理取其簡而明辭取其約而逺未知於經意果有合否然老子之書原非虚無寂滅之説權謀術數之談是注也於日用常行之理治心治國之道或亦不相逕庭也爰序諸簡端以明大㫖云臣等謹按司馬遷謂河上丈人通老子而不稱其有注漢書藝文志亦僅載其書未以注聞自隋經籍志以下注其書者始衆魏王弼宋蘇轍元吳澄明焦竑之流代有言詮徵諸典籍誠以道徳五千餘言特揭無為之㫖實足發人忠孝敬順之思迥異於他子書之偏駁也然注釋滋多謬悠日甚我世祖章皇帝知化窮神深明奥㫖親灑丹毫撰為此注大學士成克鞏等承命編校闢諸解之虚無析羣言之淆亂使人知老子之教不外尋常日用之間於以返樸還淳滌瑕盪穢夫是以於萬斯年永臻寧一之休也老子説畧二卷張爾岐撰爾岐見經類爾岐自序曰流覽本文讀有未通輒以己意占度稍加一二言於句讀隙間覺大義犂然迴視諸註勿計不能讀亦已不欲讀矣古今南華内篇講録十卷不著撰人名氏臣等謹按是編題林屋洞藏書以郭象注為今本以向秀註為古本然秀註雖間見於陸徳明經典釋文至陳振孫作書録解題已稱亡佚又何從而見其真本至於南華之名不知為唐天寳所尊而疑為郭向所加則其人考古之學亦可見矣陰符經註一卷李光地撰光地見經類南華評註無卷數張坦撰坦字方平號一菴泰安人坦自序曰廣求古注數十餘家採其簡當刪其繁蕪又叅以己意為之評釋别為或問十條列於卷首莊子解三卷吳世尚撰世尚貴池人南華通七卷孫嘉淦撰嘉淦見經類南華本義二卷林仲懿撰仲懿爵里未詳列子辨二卷不著撰人名氏前有康熈後壬寅自序署其號曰復堂道徳經編註二卷胡與髙撰與髙字岱瞻黟縣人雍正癸卯舉人與髙自述曰老子今本相沿章句多舛乃遍訪古本考正其文併注釋其義云南華簡鈔四卷徐廷槐撰廷槐字立三號笠山會稽人雍正庚戌進士道徳經懸解二卷黄元御撰元御見經類道徳經註二卷附陰符經註一卷徐大椿撰大椿見醫家類道徳經注例畧曰老氏之學與六經㫖趣各有不同六經為中古以後文物極盛之書老氏所云養生修徳治國用兵之法皆本上古聖人相傳之精意故其教與黄帝並稱其用甚簡其效甚速漢時循吏師其一二已稱極治南華摸象記八卷張世犖撰世犖字無夜錢塘人乾隆甲子舉人臣等謹按世犖之學以禪為宗因以禪解莊子其篇目皆依佛經之例以内篇之名標曰某品分割併附又各敘其宗㫖於每篇之首云右道家正宏集一卷釋本果撰本果字曠圜潮州靈山寺僧臣等謹按韓愈與大顛遊見與孟簡書中後人遂為大顛别傳依託簡作並偽為愈與大顛三書陳振孫書録解題嘗力辨其妄是書仍侈談韓愈皈依大顛事葢猶沿襲宗門統要之説以復闢佛之讐也南宋元明僧寳傳十五卷釋自融撰始末未詳臣等謹按宋僧恵洪撰有僧寳傳一編自融乃復采宋建炎丁未至國朝順治丁亥凡五百二十一年中得九十七人各系傳贊續為此編現果隨録一卷僧戒顯撰戒顯字悔堂順治間居杭州靈隠寺右釋氏列仙通記六十卷薛大訓撰大訓字六詁吳縣人臣等謹按是書採録道藏神仙凡八百七十七人時代舛錯真妄雜糅華亭王宗熈兄弟為之序尤怪誕無稽初名神仙通鑑順治己丑重刋改今名真詮二卷不著撰人名氏據後跋當為順治中人自序曰葆真子所留真詮余嘗刪節之猶病其多今重為訂正果山修道居志二卷葉鉁撰鉁見儒家類參同契章句一卷李光地撰光地見經類光地自序曰參同契者參之而同契也三相類者三字之義疏爾魏氏作參同契自謂闕畧未備復作三相類一篇互相解剥而二千年未有知者心之不達則竊易舊簡以就膚見故此書獨無完編惟漢魏叢書所載似是原本間有竄悞不多也獨其不知中斷二書及截立標題亦庸末者之妄參同契注二卷陳兆成撰兆成字宜赤上虞人得一參五七卷姜中貞撰中貞會稽人臣等謹按是書闡明修煉之㫖所註陰符經道徳經各一卷參同契三卷黄庭經悟真篇各一卷為書凡五故以得一參五名之萬夀仙書四卷曹無極編無極字若水金壇人古文周易參同契註八卷袁仁林撰仁林字振千三原人古參同契集注六卷劉吳龍撰吳龍字紹聞南昌人雍正癸卯進士官至刑部尚書諡清慤吳龍自序曰參同契自明楊慎掘地得原本經傳始分因本元俞琰發揮而為是注右神仙皇朝文獻通考卷二百三十
