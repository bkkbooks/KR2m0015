body:
  text: 征𣙜考臣等謹按馬端臨征𣙜考紀述𣙜政為目有六曰征商即闗市之征也曰鹽鐡則管子正鹽筴之説所造端也曰𣙜酤自漢時征之曰𣙜茶曰坑冶皆自唐時征之曰雜征歛自山澤津渡以及坊場牙契因事並見至宋代經總制錢月樁板帳並著於是雜征云者不可以類舉也盖自周易有重門撃柝之文周禮司闗掌國貨之節典其治禁以便詗譏而安行旅凡貨不出於闗者舉其貨罰其人其餘川澤林藪各有専司所以崇本抑末使民歸於南畝經制所定在昔為然秦漢相沿至唐宋而加宻竹木間架及坊場撲買未可縷述降及明季以軍興餉絀税額屢增惟我國家肇造區夏蕩滌繁苛與之更始列聖相承如傷厪念自惟正之供屢經蠲免而外言闗市則温綸告戒至再至三惟恐司𣙜之臣乘勢以取贏也論鹽法則加引加觔以紓商力因時因地以恤民艱惟恐鹺政之臣厲民以自封也至酒醪糜穀則惟燒鍋躧麯是嚴而不専設𣙜酤之務五金産地則以聚人生事為戒而不計及礦税之饒他如寛漁課以卹濱海之民定牙契而嚴胥役之禁所以為小民計者至周且渥夫貨惡其棄於地而地廣則民用益饒我皇上西陲底定拓疆二萬里内地商民持布幣而徃者輪蹄萬計薄征減税道路歡呼商賈市易之地已倍廣於向時而征商之額未嘗重加於昔日伊犁闢展烏嚕木齊葉爾羌喀什噶爾等處凡有市易之地畧征其税二三十分之一以慰新疆赤子食毛踐土貢芹獻曝之心初非利所有也臣等謹依類纂集考國朝之故實合以馬氏之舊文而變通之首闗市次鹽法又次𣙜酤𣙜茶坑冶而終之以雜征凡六卷惟是馬氏沿漢時故事合著鹽鐡今則以鐡屬坑冶而不繋於鹽私􅈨之禁我朝不列於令甲既為𣙜政所蠲除則節目應歸於簡易因並去之以明紀載核實之義焉征商闗市本朝太祖髙皇帝丁亥年與明通市於撫順清河寛奠靉陽四闗口是時上招徠各路國勢日盛明亦遣使通好嵗以金幣聘問我國所産東珠人參紫貂元狐猞狸猻諸珍異之物於撫順清河寛奠靉陽四闗口互市以通商賈天命十一年定漏税私商之罪奉諭㫖通商為市國家經費所出應任其交易漏税者罪之若徃外國交易亦當告知諸貝勒私徃者罪之順治元年豁免明季各項税課虧欠又免各直省闗津抽税一年禁革明末加增税額銀兩免順治元年闗津税課自二年正月初一日以後方照故明額起税凡故明末年一切加增税額盡行豁免其直省州縣零星抽取落地税銀名色概行嚴禁二年禁革陜西省落地税銀又定蕪湖等闗抽分例工部奏言蕪湖杭闗龍江荆州清江五處每年例抽税銀計十二萬九千六百三十一兩四錢有竒請差本部官抽分從之三年革明季加増太平府姑溪橋米税金柱山商税安慶府鹽税四年歸併荆闗通惠河中河清江厰杭闗蕪湖龍江等闗於户部又定閩浙收税例並禁明末濫征私税閩浙闗津抽税經明末疊増數倍原額户部奏定照萬厯年間原額及天啟崇禎遞增額數一半征收杭州南北二闗先已差官其餘自順治四年正月初一日以後俱照此例一體抽征其州縣零星抽取落地税銀名色及閩省勢官土豪不肖有司向來津頭牙店擅科私税概行嚴禁違者罪之又定闗差滿漢員數户工二部十九處闗差漢官外増設滿洲官十九員漢軍官十九員又定張家口等處闗口開塞事宜户部兵部奏差理事官科奎鍾固自張家口起西至黄河止察得張家口闗門迤西黄河迤東共一千四十五里共應留臺二百四十四座故明時得勝堡一口係察哈爾國討賞出入之路河保營係鄂爾多斯部落茶鹽交易之處以上二口俱已堵塞又差理事官滿都户等自張家口起東至山海闗止察得張家口迤東山海闗迤西共二千四百四里共應留臺四百一十七座洪山口龍井闗口西常峪正闗口潘家口冷口俱係捕魚網户耕種徃來之路宻雲迤後石塘嶺正闗口係民間運木之路昔户部於此按枚抽税以上應留闗口共六處外如常峪口獨石口龍門所口墻子嶺口黄崖口羅文峪董家口劉家口桃林口界嶺口一片石口以上十一闗口俱已堵塞得㫖河保營既為鄂爾多斯部落交易鹽茶之地與董家口俱准開餘如議臣等謹按國家設闗置尹掌其治禁本以譏察奸宄而安行旅非徒徵商抑末用佐經費已也山海闗外在我朝本為内地然内外人民徃來闗口未嘗不稽其出入之數異言異服非有勘合騐放者無所容於其間今自張家口至山海闗較諸故明所設臺座減十之七八而攜帶軍器有禁夾帶私參有禁屬國朝使持禁物出闗亦有禁當兹中外一家仍寓重門撃柝之意是以闗口開塞與臺座興廢之故仍備著於篇云六年嚴禁各闗差收税例外多徴户部奉諭㫖設闗徵税原寓稽察奸宄之意非專與商賈較錙銖也爾部行文各闗滿漢官員以後俱照原定則例起税如有狥情權貴放免船隻乃於商船増收或希充私槖例外多徵以病商民者一經查出定行重處八年減定闗差員數先是各闗差期滿回京户部行咨吏部議叙銓用而闗差員數遞増攜帶書吏多行不法上深知其弊諭吏部𣙜闗之設原有定額差一司官已足何故濫差多人忽而三員忽而二員每官一出必市馬數十匹招募書吏數十人未出都門先行納賄户部填給糧單沿途騷擾鞭打驛官奴使村民包攬經紀任意需索量船盤貨假公行私商賈恐懼不前百物騰貴天下通行河道何以至此朕灼知今日商民之苦著仍舊毎闗設官一員其添設者悉行裁去以後不得濫差其裁缺撤回之員既不利於商賈又何利於州縣之民户部不得妄咨勤勞吏部不得更與銓補國家愛惜牧民之官豈得仍前朦混爾部謹識朕諭實心遵守毋負朕通商愛民之意九年定直省典舖税例在外當舖每年定税銀五兩其在京當舖並各舖仍令順天府查照舖面酌量徵收十一年准科臣所奏清釐闗弊户科給事中杜篤祐條奏清釐闗弊四事一裁吏役一查税累一闗差迴避原籍一批文核對限期章下所司遵行十八年定張家口殺虎口兩翼税額張家口税額毎年一萬兩殺虎口税額每年一萬三千兩兩翼税額每翼一年六千兩康熙二年定盤詰糧船闗口地方户部議覆漕運總督林起龍條奏漕運重船原令各闗盤詰夾帶私貨但闗口甚多處處盤詰必多悞運應如所請止於儀真𤓰州淮安濟寧天津等五處地方嚴加盤查又運丁舊例每船許帶土宜六十石恐南北闗司概作私貨查每船土宜載在議單應仍許帶以恤運丁勞苦從之四年罷抽税溢額議叙之例令各闗税務分别差遣户部司員及地方官兼理奉諭㫖各省設立闗税向例將抽税溢額者加級紀録遂致各差冀邀恩典困苦商民嗣後税課俱照定額征收缺額者處分溢額者加級紀録之例永行停止其輪流差遣部員亦應停罷并税額作何征收著議政王貝勒大臣九卿科道㑹議具奏嗣後議定京城左右翼張家口殺虎口四差不必輪差六部官員止於户部司員中輪差管理其崇文門税務歸順天府治中兼理天津鈔闗税務歸天津道兼理通州税務歸通薊道兼理居庸闗税務歸昌宻道兼理又嚴禁各闗違例收税及遲延掯勒之弊奉諭㫖各省闗鈔之設原期通商利民以資國用近聞各處收税官員巧立名色另設戥秤於定額之外恣意多索或指稱漏税挾詐過徃商民或將民間日用瑣細之物及衣服等類原不抽税者亦違例收税或商賈已經報税不令過闗故意遲延掯勒遂其貪心弊端甚多難以枚舉嗣後凡地方收税官員俱著洗心滌慮恪遵法紀如有前項情弊在内科道官在外督撫嚴察叅奏從重治罪如督撫不行叅奏别經首發即治該督撫以狥縱之罪五年議准刋刻闗税條例竪立木榜於直省闗口孔道曉諭商民户部議覆直隸巡撫王登聫疏言直隸各省征收闗税條例甚屬繁多請刋刻木榜竪立闗口並商賈徃來之孔道徧行曉諭或例内有加増之數亦明白註出以杜吏役濫征之弊應如所請嗣後直隸各省設立闗税之處應多刋木榜昭示商民照額征收如有不肖官吏於定額之外私行濫收者令該督撫不時查察據實題叅依律治罪從之又定居庸闗每年税額銀三千兩又停罷崇文門出京貨物税課六年議定淮安闗及直省各闗税務俱委専員管理户部議覆河南道御史徐浩武疏言江南淮海道専管海防地方事務俱停其兼管其淮安闗税等項亦應委員管理應如所請并行文直隸各省將各闗事務俱委専員管理從之又命杭州府同知管理北新南新兩闗事務七年命浙江鹽運使管理北新闗事務八年議定各闗税務分别差遣部員及地方官管理户部議覆户科給事中蘇拜疏言闗税一差歸於外府佐貳官管理但各官俱有専掌又兼理闗税事務煩多且身為地方官畏懼上司希圖足額必致増派商民請仍差部員應如所奏將滿漢司官専差收税奉諭㫖闗税多者將各部院賢能滿漢官員差遣闗税少者仍交地方官征收其應差部院官與應交地方官之處分别議奏户部再議查崇文門税差已經設官收税其通州坐糧㕔京城左右二翼倉寳泉局大通橋通州西倉中南倉張家口殺虎口此九差原係臣部官員差遣應仍舊例外滸墅闗蕪湖闗北新闗九江闗淮安闗太平橋揚州闗贛闗天津闗西新闗淮安倉臨清闗鳳陽倉税額俱多應擇各部院賢能滿漢官員差遣其穵運㕔居庸闗徐州倉税額俱少應交與地方官征收從之又定部員闗差掣籖例户部議覆御史黄敬璣疏言各省闗差缺出於部曹中選用賢能止可為一時破格之舉行之既久恐有營求之弊請照舊例挨資俸掣籖應如所請闗差缺出將六部俸深官員咨送掣籖其差過之員不准重差從之九年裁江南西新闗户部差歸併龍江闗工部管理江南蕪湖闗工部差歸併本闗户部管理十一年更定闗差員數減户部工部闗差員數照鹽差例不論滿洲漢軍漢人序俸掣籖每闗差司官一員筆帖式一員十二年禁直隸各省官吏無得私税市貨十三年以江南鳳陽等三處倉闗事務歸併地方官管理江南總督阿席熙疏言鳳陽倉額税本折錢糧歸併鳳陽府知府管理正陽闗税歸併通判管理臨淮闗税發大使征收停差部員部議應如所請得㫖允行二十一年移九江𣙜闗於湖口縣先是給事中雅齊納條奏請將九江𣙜闗移於湖口地方九卿兩議並奏上命畫一定議尋九卿議覆暫移九江闗於湖口收税以一年所得為定額如有不便具題另議從之又停止差遣潼闗收税部員先是潼闗額税有司征收七千餘兩康熙十九年遣郎中敦多禮督徵得税四萬餘兩至是奉諭㫖數年以來秦省兵民苦於輓運潼闗收税仍照舊額著停止差遣部員二十三年議准浙江沿海貿易收税例九卿等議覆工部侍郎金世鑑疏言浙江沿海地方請照山東諸處見行之例聴百姓裝載五百石以下船隻徃海上貿易捕魚預行禀明人數至收税之處交與該道計貨之貴賤定税之重輕按季造冊報部應如所請從之又定開海征税則例其海口内橋津地方貿易悉免抽分九卿等議覆户科給事中孫蕙疏言海洋貿易宜設立専官收税應如所請得㫖海洋貿易創收税課若不定例恐為商賈累當照闗差例差部院賢能司官前徃酌定則例嗣經郎中伊爾格圖酌定開海征税則例奏請給與各闗定例款項於橋道渡口征收税課奉諭㫖向令開海貿易謂於閩粤邊海民生有益若此二省民用充阜財貨流通各省俱有禆益且出海非貧民所能富商大賈懋遷有無薄征其税不致累民今若照奉差郎中伊爾格圖所奏給與各闗定例款項於橋道渡口等處概行征收何以異於原無税課之地反増設一闗科歛乎此事恐致擾民爾等傳諭九卿詹事科道㑹議具奏户部等衙門遵諭議覆福建廣東新設闗差止將海上出入船載貿易貨物征收其海口内橋津地方貿易船車等物停其抽分并將各闗征税則例給發監督酌量増減定例從之又議定通惠河税差照例掣籖三年更换户部等衙門㑹議僉都御史趙之鼎疏言通惠河一差每年帶征税銀有議叙之例應歸入各闗内將部院衙門官員照例掣籖三年更差應如所請從之二十四年免外國貢船抽税福建總督王國安疏言外國貢船請抽税令其貿易部議應如所請得㫖進貢船隻若行抽税殊失大體且非朕柔逺之意悉免之互見市糴考乂酌減洋船丈抽之例監督伊爾格圖奏言粤東向有東西二洋諸國徃來交易係市舶提舉司征收貨税明隆慶五年以夷人報貨奸欺難以查騐改定丈抽之例按船大小以為額税西洋船定為九等後因夷人屢請量減抽三分東洋船定為四等我朝未禁海以前洋船詣粤照例丈抽但徃日多載珍竒今係日用雜物今昔殊異請於原額之外再減二分東洋船亦照例行至江浙閩廣俱經開海若不畫一恐啟外夷趨避之端應照粤省量減此等丈抽船隻裝載回國或因風水不順飄至他省查騐印票即便放行其四省印烙船隻徃外國貿易者亦照此例從之二十五年停止抽税溢額議叙之例先是康熙四年罷抽税溢額議叙之例至十四年題准各闗欠不及半分者降一級留任餘照前例全完者紀録一次溢額每千兩者加一級至五千兩以上者以應陞缺先用十六年題准各闗額税二萬兩以下者仍照前議叙二萬兩以上者額税全完紀録一次溢額半分以上加一級一分以上加二級一分半以上加三級二分以上加四級三分以上以應陞缺先用數多者遞准加級十七年定闗税足額者不准議叙至是上以各闗差苛取溢額希圖議叙而採買銅觔價值不敷恐累商人令大學士等傳集舊任闗差各員問明四季造冊送部果否有益據舊任闗差各官並稱部定銅觔價值六分不敷採買其各差造冊四季報部不如改令差滿之日一并彚送奉諭㫖國家設闗𣙜税必征輸無弊出入有經庻百物流通民生饒裕近來各闗差官不恪遵定例任意征收託言辦銅價值浮多四季解冊需費將商人親填部冊改换塗飾既已充肥私槖更圖溢額議叙重困商民無禆國計朕思商民皆我赤子何忍使之苦累今欲除害去弊必須易轍改絃所有見行例收税溢額即陞加級紀録應行停止其採辦銅觔定價既已不敷作何酌議増加其四季達部冊籍應俟差滿一次彚報嗣後務令各差潔已奉公實心釐剔以副朕體下恤商至意如或仍前濫征侵隠藐玩不悛作何加等治罪至銅價既議加給額税應否量増俱著九卿詹事科道詳議具奏尋議闗差各官希圖議叙託言銅價浮多不遵定例任意苛征令酌議加增銅價停其議叙即於各闗部定則例原額外酌量匀派著為定額以為採買之費以康熙二十四年為始如有例外苛索征多報少將商人親填簿單揑造改易被叅察出從重治罪至見在闗差各官雖有溢額俱不准議叙并停其四季所報部科簿單總俟任滿彚報從之又敇闗差缺額處分仍依定例御史敦拜條奏闗差缺額處分例輕以致拖欠日重應嚴定處分則例並賠補限期上曰闗差缺額處分自有定例若法令太嚴必致苦累商賈所奏無益不准行敇閩海抽税仍依定例督理閩海税務户部郎中瑚什巴疏言閩省商賈貿易無丈船抽税之例請照粤闗一例丈抽至貿易船隻原在某闗印烙給照准出海口者别闗不得私留仍令各回本闗庶人數軍器各有稽查而奸宄不敢影射得㫖凡收海税官員因係創行設課希圖盈溢將出入商民船隻任意加征以致病商累民亦未可定著嚴加申飭務令恪遵定例從公征收無溢無苛以副朕軫恤商民至意所請不准行二十六年議滸墅闗監督征收溢額之罪户部題滸墅闗監督桑額任内除征收正額外溢銀二萬一千二百九十六兩零得㫖設立闗𣙜原欲稽查奸宄照額征收桑額征收額課乃私封便民橋以致擾害商民著該衙門嚴加議處二十八年嚴飭各處𣙜闗毋得稽留商民奉諭㫖朕舟行所至諮訪過闗商民每不難於輸納額税而以稽留闗次不能速過為苦𣙜闗官員理宜遵奉屢頒諭㫖恤商惠民豈可反貽之累自今應力除積弊凡商民抵闗交納正税即與放行毋得稽留苛勒以致苦累違者定行從重處分又議定江浙閩廣四省海闗徵税之例户部奉諭㫖近聞江浙閩廣四省海闗於大洋興販商船遵照則例征收税課原未累民但將沿海地方採捕魚蝦及貿易小船概行征税小民不便今應作何征收俾商民均益著九卿詹事科道㑹同確議以聞尋經九卿等遵㫖以兩議覆奏一議錢糧無多應交地方官征收一議交與地方官則無専管之員應仍差官征收至海中船隻何者應免收税惟候聖裁得㫖採捕魚蝦船隻及民間日用之物併糊口貿易俱免其收税嗣後海闗著各差一員管理税務又減免閩海闗税額永著為例閩海闗監督殷達禮奏閩海闗税額逐一確查分晰應免税銀共六千四百九十四兩有竒著為則例永逺遵行從之又免琉球國接貢船隻税課琉球國中山王尚貞疏言舊例外國進貢定數三船船中貨物免其收税今琉球進貢止二船尚有接貢一船未蒙免税請照例免收以足定數下部議覆准行三十四年定山海闗毎年税額銀二萬五千兩三十五年令海洋商船徃天津海口運米但收貨物正税外免其雜費三十七年減廣東海闗額税奉諭㫖廣東海闗收税人員搜檢商船貨物槩行征税以致商船稀少闗税缺額且海船亦有自外國來者如此瑣屑甚覺非體著減額税銀三萬二百八十五兩著為令三十八年停罷各闗正額外加増盈餘銀兩奉諭㫖向因軍需繁費闗差官員欲於正額外以所得盈餘交納充用今思各官孰肯自捐私槖必仍行苛取商瘠民困職此之由著將加増銀兩一槩停罷四十一年遣官偕喇嘛監督打箭爐貿易喇嘛達木巴色爾濟郎中舒圖員外鐡圖等徃打箭爐地方監督貿易上諭以移文第巴令彼速遣大喇嘛來監督貿易其税銀不取於彼就我國商人征之不可専以税額為事互見市糴考四十七年免暹羅國貢使所帶貨物征税禮部題暹羅國貢使所帶貨物請聴其隨便貿易并免征税以示柔逺之意從之五十三年以臨清闗税務交巡撫征收奉諭㫖臨清闗錢糧毎至缺額皆由地方積棍串通作弊所致不必派遣監督著交該巡撫收税五十五年以鳳陽闗税務交巡撫征收户部奏請更换鳳陽等闗監督上諭大學士等曰各闗監督所欠錢糧甚多未𣲖之先俱願前徃及到任之後額税必欠此皆多帶人役征收過刻之故昔南新闗有一監督問巡撫王度昭錢糧如何不致缺額王度昭告以從寛征收斷不欠缺後果如其所言鳳陽闗額税著交與該巡撫征收餘缺俟朕另派又嚴各闗監督題請展限之禁户部題奏定例各闗監督一年限滿更替邇來以錢糧虧空為辭題請展限者甚多嗣後有似此者請照溺職例革職從之五十七年命浙江南新北新兩闗税務交杭州府捕盗同知管理從撫臣朱軾請也又定免厦門闗經過商船増税之例閩浙總督覺羅滿保疏言各省徃來臺灣船隻經臣題明必令到厦門盤騐䕶送但查從前自臺灣徃各省貿易船隻俱從外洋直至停泊之處赴本處海闗輸税至於中途經過之所不便一貨兩征嗣後各省商船遵例必到厦門盤騐除收泊厦港貿易者照舊報税如收泊江南浙江各省貿易者仍聴其彼處海闗報税其中途經過之厦門闗税免其増添下所司議行之五十八年敇查江西湖廣糧船無得夾帶貨物致妨榷政戸部議覆蕪湖闗監督赫昌疏言蕪湖闗缺少錢糧因江西湖廣糧船二千餘隻毎年過闗旗丁任意將貨物滿載船尾拴扎木筏不令查騐請令兩省糧道於本處糧船載米起運後親身先行到闗查騐放行如有裝載貨物木筏盡行入官庶於糧船無悞而闗課亦不致多闕應如所請令總漕於湖廣江西二省漕船載米起運後令各該道至上流漢口呉城馬頭親身稽察仍嚴飭押運官弁毎船照定例除土宜六十石外如有違例多載及拴扎木筏過闗者將貨物入官該管道及押運官弁一併題叅治罪從之六十年議准停征淮安鳳陽等闗米船課税一年又議准淮安闗税交江蘇巡撫管理户部議覆署理河道總督事陳鵬年疏言淮安闗税經河臣趙世顯於康熈五十八年題請歸併總河衙門令裏外河同知一員管理臣思河員職守𦂳要不可暫離勢難兼管𣙜務請别差部員或歸併附近衙門帶管應如所請將淮安闗税交與江蘇巡撫管理從之六十一年免暹羅國運米收税奉諭㫖暹羅國人言其地米甚饒裕價值二三錢即可買稻米一石朕諭以爾等米既甚多可分運米三十萬石至福建廣東寜波等處販賣此米係官運不必收税互見市糴考又敕各省税務悉交地方官監收總理事務王大臣奉諭㫖往年税差官員公帑無虧而羡餘又足養贍家口兼及親族近日則不然率多虧帑獲罪公私均屬無益皇考洞鑒其故毎將税務交與地方官管理各省已居其半嗣後税務悉交地方官監收嵗額之外所有羡餘該撫奏聞起解應賞給者再行賞給至雍正元年正月户部等衙門議定滸墅揚州龍江蕪湖湖口贛闗太平橋粤海閩海等九闗税務應照淮安天津等闗例交與各該撫令地方兼管從之雍正元年以額外御史慶元管理淮闗税務時兼管税務趙世顯征收錢糧多侵蝕隠瞞之項上以淮安闗課𦂳要著慶元查明即授慶元額外御史管理税務三年又嚴飭各闗差及崇文門税務毋許任信胥役分外苛求奉諭㫖朕撫御寰區加惠黎庶惟恐民隠不能上達近聞𣙜闗者往往寄耳目於胥役不實騐客貨之多寡而只憑胥役之報單胥役於中未免髙下其手任意勒索飽其欲者雖貨多税重而朦蔽不報者有之或重從輕報者亦有之不遂其欲雖貨少税輕而停滯闗口至數日不過是國家之額税聴猾吏之侵漁以小民之膏脂飽奸胥之谿壑司其事者竟若㒺聞知乎又聞放闗或有一日止一次者江濤險急河路窄隘停舟候闗於商亦甚不便嗣後司闗𣙜者務須秉公實心查騐過闗船隻隨到隨查應報税者納税即放不得任胥役作弊勒索阻滯以副朕通商便民之意至於崇文門收税及分派各處查税之人亦有多方勒索分外苛求之弊京師為四方輻輳之地行李絡繹豈宜苛刻滋擾尤當不時稽察杜絶弊端二年以兼理闗𣙜諭各省督撫實心辦理奉諭㫖從來闗𣙜之設或用欽差専轄或令督撫兼理無非因地制宜利商便民之至意也大抵闗差之弊皆惟知目前小利恣意侵漁聴信家丁縱容胥吏開闗分别遲早肆無厭之誅求報單任意輕重為納課之多寡飽谿壑者則任其漏税代為朦朧不遂欲者則倒箧傾箱不遺纎細致商賈畏懼褁足不前行旅徬徨越闗迂道則困商實所以自困也故闗差惟在嚴禁苛求使舟車絡繹貨物流通則税自足額至於督撫皆封彊大吏當仰體朝廷歸併之心不得視為帶理漫不經心誤任屬員聴其剥削况欽差猶毎年更換而督撫兼理則無限期若不實心奉法遴委得人責有攸歸其恪遵朕㫖臣等謹按此與元年所奉諭㫖並為各闗奉差者以報滿有期視為傳舍歸併督撫兼管望其實力奉行雖封疆繁重而遴委得人則弊端自絶嗣後或因時因地轉移委畀各從其宜仰見我世宗憲皇帝加惠商民周知疾苦臚列諸弊端如在指掌損上益下之盛意為萬世準則云又准移江西湖口𣙜闗於九江分設口岸於大姑塘從江西巡撫裴􅏍度請也以湖口闗税盈餘諭江西巡撫嚴飭胥吏毋致加税累民江西巡撫裴􅏍度摺奏湖口闗税盈餘應悉解部奉諭㫖今嵗盈餘是爾等清釐所致但數覺過多倘額外剥削商民則㫁然不可闗税多少係於年嵗之豐歉難可預定或遇不及之年不可勉强必求足數不然是又增加税額矣當嚴飭胥吏毋致苦累商民又免暹羅國運米壓船貨税暹羅國王入貢稻種果樹等物并運米來廣貨賣廣東巡撫年希堯以聞上嘉其國王不憚險逺進獻稻種果樹等物最為恭順運來米石令地方照粤省時價速行發賣其壓船隨帶貨物概免征税互見市糴考又以各直省税務申諭巡撫并刋刷税務詳單徧示商旅奉㫖朕念商賈貿易之人徃來闗津宜加恩恤故將闗差歸并巡撫兼管以巡撫為封疆大吏必能仰承徳意加恵商旅也但各闗俱有逺處口岸所委看管之家人賢愚不一難免額外苛求及勒取飯錢之弊稍不如意則執送有司有司礙巡撫之靣狥情枉法則商民無所控訢矣嗣後將上税課之貨物遵照則例逐項開明刋刷詳單分發各貨店徧行曉示使衆皆知悉其闗前所有刋刻則例之木榜務令竪立街市人人共見不得藏匿屋内或用油紙掩盖以便髙下其手任意苛索立法如此自能剔除弊端但爾等受朕委任之重尤當仰體朕心遴選誠實可信之人以任稽查之責必期商民有益方為稱職三年禁邉闗城門索取䝉古進貢車輛茶馬税銀其借名䝉古匿税者罪之理藩院奉諭㫖邉闗城門祇令來往商人納税其請安進貢之蒙古等並無收税之例今聞將伊等餘帶馬匹及口糧車輛與買用之茶俱勒令停止私行收税并索取零星物件又有奸商希圖匿税専雇蒙古車輛偷載商貨著行文該管官員嚴行禁止又更定委員管理宿遷闗及由閘税務例工部議准河道總督齊蘇勒奏言淮徐道一官有經管徐邳宿遷一帶黄運兩河之責地方遼濶工程浩繁且駐劄清江與宿遷闗相距二百餘里不惟難以稽察而遇河工𦂳急之時更不能分身兼顧恐於公事有悮請將宿遷闗收税事宜敕令督撫擇就近賢員以司其事再揚州江防同知既管𤓰州一帶江工又收由閘税課亦難兼顧應請一例飭委别員俾同知得専力修防應如所請得㫖宿遷闗著交與年希堯兼管由閘税課著該撫遴選就近地方賢員管理又定川省船料報税飭禁沿途地方官借端需索川陜總督岳鍾琪疏言川省運販米船向無船料客商或夾帶私鹽違禁之物無可稽查而沿途地方往往借端需索請照淮闗船料尺寸則例抽報料税所輸無幾稽查甚便至米船出川地方官如有勒索稽留者該督撫指名題㕘從之六年免暹羅國運米内地税銀禮部議覆福建巡撫常賚疏言暹羅國王誠心向化遣該國夷商運載米石貨物直達厦門請聴其在厦發賣照例征税委員監督嗣後暹羅運米商船來至福建廣東浙江者請照此一體遵行得㫖依議米榖不必上税著為例互見市糴考又敕定各闗征税則例户部議浙江布政使髙斌奏滸墅闗現行征收則例與部頒數目不符請敕部議定刋刻木榜令衆商共曉遵依應如所請並令直省各闗將各處現行徵收則例徹底清查據實奏聞刋刻木榜曉示奉㫖著各省兼理税務之督撫並各闗監督實力奉行毋得陽奉隂違虛應故事倘經接理之員查出定行交部從重議處又定䕫州府收税派差監督一員户部議覆四川巡撫憲徳疏言䕫州闗税向委䕫州府知府監收請於己酉年為始照滸墅淮闗例派差監督一員征課按年遴員更換應如所請從之諭崇文門查税官員毋得稽留㑹試舉子借端苛索内務府總管常明奏報蘆溝橋遵㫖盖造官房安歇㑹試舉子工程告竣得㫖此朕體䘏應試舉子之意俾其有旅次居宿之安而無盤查行李之擾並令崇文門毎年查税官員實心奉行嚴飭巡察人役等毋得借端稽留額外苛索七年令各闗據實填寫部頒號簿奉諭㫖各闗開放船隻之處向例部頒號簿以便稽查兹聞各闗另設私簿征收惟於報部之時始將號簿挨日填造其意以水路船隻往來多寡不齊若據實填簿則不能逐日有征收之數目恐干駁查是以設法勻派填造如此則簿内全非實在數目與商船過税串票毫不相符殊非政體凡事據實則可以無弊作偽則弊竇叢生今既係任意勻派填造則號簿亦為虛設矣嗣後各闗於部頒號簿據實填寫如無船隻過税之日亦即註明不得仍蹈前轍致滋弊端又移湖北荆州徐闗於田家洲更名田闗從湖北巡撫馬㑹伯請也又免暹羅載米失風船隻貨税禮部議覆廣東總督孔毓珣疏言暹羅載米船隻因風飄泊廣東已飭各屬加意撫恤其撈回壓艙貨物仍請准其輸税發賣得㫖免其輸税又以核實落地税銀申飭各省大小臣工奉諭㫖朕即位以來屢有臣工條奏各處地方官征收落地税銀交公者甚少所有盈餘皆入私槖雍正三年又有人條奏廣西梧州一年收税銀四五萬兩不等止解正項銀一萬一千八百兩潯州一年收税銀二萬兩止解正項銀二千六百兩應令該撫查核據實奏聞並令各省抽收税銀之處俱據實奏報等語隨經九卿議令各省督撫遴委幹員監收一年之後視其盈餘若干奏聞候㫖朕思孟子言治國之道首稱取於民有制所謂有制者即一定額征之數也若課税之屬無顯然額征之數則官吏得以髙下其手而閭閻無所遵循即如從前各處税課經地方官征收有於解額之外多數倍者且多至數十倍者既無一定之章程則多寡可以任意其弊不可勝言屬員既已貪取上司必至苛求官員既已營私胥吏必至横索日積月累漸有增加之勢豈非生民之隠患乎朕是以允從條奏所請及九卿所議令各省督撫委員監收以定科則其征收不及舊額者亦令奏聞降㫖裁減年來報出盈餘之處朕皆令留於本地或作各官養㢘之需或為百姓公事之用使官員用度有賴自不妄取民財使地方公用有資即可寛恤民力無非以小民財物仍用之於民間不令飽貪官汙吏之欲壑而已乃聞外省中多有奉行不善者以朕愛民除弊之善政而庸劣有司借歸公之名或肥身養家或争多鬬勝以致肩挑背負之㣲物皆征收税課而該督撫等又不悉心稽查民間苦於擾累自諭到通行之後倘仍有如此者必從重治罪决不寛貸八年定征收落地税銀搜求溢額議處之例户部奉諭㫖向來各處落地税銀大半為地方官吏侵漁入已是以定例報出税銀四百兩者准其加一級後因查報漸多吏部定議報出税銀八百兩者准其加一級多者以此計算年來地方官員皆知守法奉公凡有税課隨收隨報不敢侵隠其報出之數毎倍於舊額祇恐將來不無冀倖功名之人希圖優叙以致恣意苛索擾累小民且落地税銀非正項錢糧有一定之數者可比侵蝕隠匿者固當加以處分而争多鬬勝者不但不當議叙亦當與以處分其如何定議並如何議叙加級處分之處著吏部户部悉心妥議具奏尋議嗣後各省落地税及税契銀兩如搜求需索以致盈餘之數倍於正額或將數十年以前置買産業苛索擾累者令該督撫題㕘革職上司失察狥庇查出照例議處其於正額外實在盈餘者以八百兩為率准加一級多者不得過三級永著為例從之十二年令直省督撫稽察各闗𣙜務奉諭㫖直省闗税監督於地方官原不相統轄一切呼應不靈而大小口岸甚多監督一人勢難分身兼顧雖選委書役公同親信家人稽查收放而地方文武各員以為無與己事並不協力或轉挾私意則姦商之隠漏地棍之把持督撫或不闗心監督動則掣肘不獨於税務無補即於地方亦難免擾累嗣後凡有監督各闗著該督撫兼管所屬口岸飭令該地方文武各官不時巡查如有縱容滋擾情弊聴該督撫㕘處至監督徵收税課及一切應行事宜仍照舊例遵行不必聴督撫節制如此庶既有専司仍無岐視於税課商民似均有禆益嗣據監督毛克明奏稱粤東海闗地面遼濶事務繁多洋商胥吏以及地方勢豪引誘串通弊端百出監督一官難於稽查防範不若就近歸於督撫兼管則通省文武軍民均受統屬節制不敢欺公玩法再令京員掌管監督印信監收錢糧則税務肅清而弊端可杜䟽上照所請行又以貴州永寜縣改隸四川裁除永寜縣税四川叙永㕔與永寜縣同處一城從前㕔隸四川縣隸貴州各設税口征收鹽雜等課嗣經兩省㑹勘將永寜縣改隸蜀省所有田地丁糧已俱改照川省條例征收惟税課一項仍係㕔縣兼收敕諭將縣税裁除止留叙永㕔税一切俱照川省之例行十三年議定張家口居庸闗已經收税之貨無得於宣府重徵設居庸闗税課大使一員户部議准兵科給事中尚徳疏奏闗税事宜一宣化府為南北通衢凡有貨物已經張家口居庸闗上税過府之時張家口監督復委家人書吏照數重收以致小民肩挑背負無不邀攔收税民情甚為不便且家人書吏征多報少究非實裕國課嗣後南北商貨若已在張家口居庸闗上税者請勅部定例宣府不許重征刋刻木榜竪立各門如有違禁横征者嚴加㕘處一居庸闗收税之所離張家口三百餘里監督勢難躬親毎差親信家人協同書役攜帶印單收税而家人識見卑鄙輙為闗役利誘私用小票隠漏偷肥嗣後請委附近州縣不時查考但昌平延慶二州離闗稍逺請設立税課大使一員給以鈐記令收商税銀兩按月轉解監督仍令霸昌道就近稽查照宣府之例民間零星日用之物免其抽税如有掯勒商民侵漁滋事者亦嚴加㕘處均應如所請從之是年皇上即位之初奉㫖朕聞各省地方於闗税雜税外更有落地税之名凡耰鋤箕帚薪炭魚蝦蔬菜之屬其值無幾必查明上税方許交易且販於東市既已納課貨於西市又復重征至於鄉村僻逺之地有司耳目所不及或差胥役征收或令牙行總繳其交官者甚㣲不過飽姦胥猾吏之私槖而細民已重受其擾矣著通行内外各省凡市集落地税其在府州縣城内人烟凑集貿易衆多且官員易於稽查者照舊征收不許額外苛索亦不許重複征收若在鄉鎮村落則全行禁革不許貪官汙吏假借名色巧取一文著該督撫將如何裁革禁約之處詳造細冊報部查核倘奉㫖之後仍有不實心奉行暗藏弊竇者朕必將有司從重治罪該督撫並加嚴譴此㫖可令各省刋刻頒布務令逺鄉僻壤之民共知之嗣以淮闗監督年希堯於徐州所屬四縣之落地税例應地方官征收者改為闗額征收私添税口并市集買賣㣲物亦勒令上税得㫖交該督撫嚴查究審并飭行查明該縣落地税之應征者歸地方官征收應革除者仍即遵㫖革除皇朝文獻通考卷二十六
