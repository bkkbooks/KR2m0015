門而移叅領等駐碧雲寺孔道十八年又定新増官兵内以署前鋒叅領二人副前鋒校每旗各一人署前鋒每旗各十五人駐紅石山凡扈從之制乾隆十五年定每遇巡幸以健鋭營官軍分撥十分之四隨徃十七年又定健鋭營操演事繁嗣後隨駕撥官軍十分之二恭載乾隆十四年平定金川御製實勝寺碑記去嵗夏視師金川者乆而弗告其功且苦酋之恃其碉也則創為以碉攻碉之説將築碉焉朕謂攻碉已下䇿今乃命攻碉者而為之築碉是所謂借㓂兵而資盗糧者全無䇿矣為之懣然因憶敬觀列朝實録開國之初我旗人躡雲梯肉薄而登城者不可屈指數以此攻碉何碉弗克今之人猶昔之人也則命於西山之麓設為石碉也者而簡佽飛之士以習之未逾月得精其技者二千人更命大學士忠勇公傅恒為經略統之以徃且厚集諸路之師期必濟厥事頼天之佑大功以成此固經畧智勇克兼用揚我武酋長畏威懐徳厥角請命是以敵愾以往者率中道而歸竊恨未施其長技有餘怒焉記不云乎反本修古不忘其初雲梯之習猶是志也而即以成功則是地者豈非綏靖之先聲繼武之昭度哉因命擇向庀材建寺於碉之側名之曰實勝夫已習之藝不可廢已奏之績不可忘於是令成功之旅立為健鋭雲梯營並於寺之左右建屋居之間亦依山為碉以肖刮耳勒歪之境昔我太宗皇帝嘗以偏師破明十三萬衆於松山杏山之間歸而建實勝寺於盛京以紀其烈夫金川蕞爾窮畨豈明師比然畧昆明而穿池勝僑如而名子其識勿忘一也漢書訓碉作雕碉為石室而雕則若雕鶚之棲云者皆非是葢西南夷語彼中呼樓居其音為碉云爾乾隆二十六年平定西域御製實勝寺後記嵗己巳建實勝寺於西山之下其縁起已見前記不復綴今頼昊天垂佑宗社篤祐平凖噶爾囘部拓地伊犁喀什噶爾葉爾羌一帶二萬餘里其外覊縻附屬如哈薩克布魯特安集延㧞達克山等部不與焉凡乗機决計信賞必罰奉天討罪藉衆集事諸大端俱見太學之碑開惑之論西師之詩亦不復綴兹記者寺左近健鋭雲梯營實居之營之兵是役効力為尤多故不可不旌其前勞以勸夫後進先是呼爾璊霍斯庫魯克之戰我師以少敵衆而賊據險伺隙故凡行陣參伍彌縫之際略覺旗靡鼓餒處得健鋭兵數十立其間則屹如堅城整而復進遂乃斬將搴旗用成殊績盖索倫兵馬射雖精以之馳突乗勝破陣無不如志而知方守節終不如我滿洲世僕其心定其氣盛夫出萬死一生為國宣力而為之君者事成而忽若忘獨何心哉朕豈為之哉自己巳設此營而辛巳即収其效不啻樹樹十年之得報故潜移黙運有若天授予亦有所不知其然而然者而敬繩祖武丕揚國烈瞿瞿惴惴惟盛滿之是懼猶初志也是用重勒碑記之且肖喀喇烏蘓襲迫之狀築堡其側嵗時幸香山閱健鋭兵用寓尹鐸晉陽之意不亦可乎臣等謹按健鋭營之設始於乾隆己巳年厥後平定凖噶爾回部雲梯兵宣力為多仰見睿略周詳修明武備用能儲材於十載之前而程功於二萬餘里之外敬録御製前後碑記以表兹營縁起之始及收效之逺焉三旗虎槍營總統一人以公侯領侍衛内大臣兼任三旗總領各二人初制設每旗各一人雍正元年各増一人以内大臣都統前鋒統領䕶軍統領副都統侍衛簡用虎槍長各七人初制設毎旗各一人雍正元年増定即於虎槍人内選用虎槍副長各七人雍正元年増設即於虎槍人内選用筆帖式六人乾隆三年増設虎槍人共六百名於親軍校親軍前鋒校前鋒䕶軍校䕶軍驍騎校驍騎領催及閑散人内選用初制設三百六十人雍正元年増置每旗各二百名内為虎槍人四百八十名學習虎槍人一百二十名虎槍營之制於康熙二十三年黑龍江將軍進精騎射善殺虎新滿洲四十人至京分𨽻上三旗初設虎槍營凡扈從之制遇車駕蒐狩虎槍總統總領率所屬從日以十人携虎槍於前導侍衛前行安營後偵虎豹出入備伏弩箭犁刀行田遇大獸則列槍從之奉㫖殪虎或尋山追踪得實具奏有㫖則殪虎以獻以首先刺虎一二人名奏聞如差徃畿輔或口外殺虎量地逺近奏請簡總統或總領酌帯虎槍人以前盛京内府三旗順治三年設盛京内府鑲黄旗正黄旗佐領八年設正白旗佐領初制給佐領總管盛京内府事務闗防奏簡一人掌之乾隆十七年特設盛京内務府總管令三旗佐領皆歸統轄三旗佐領各一人順治三年設二人八年設一人内管領一人乾隆三十年増設驍騎校三人康熙十七年設司庫一人初制設三人乾隆十九年改補主事一人三十年改補内管領一人仍食原俸主事一人乾隆十九年増設委署主事一人乾隆三十年於筆帖式内改補筆帖式十五人初制設十六人乾隆三十年改補委署主事一人仍食原俸庫使十六人初制設十人即在驍騎數内乾隆九年改為定額又増六人頭目及執事人六十七名頭目及執事人初制即在驍騎數内乾隆九年改為定額催長八人初制設九人乾隆三十年酌裁一人定食俸四人食餉四人領催十八名驍騎委署領催二十四名驍騎六百八十四名初制每佐領下驍騎各二百三十共六百九十名乾隆九年定驍騎額内庫使及頭目執事人等為専設之缺實存驍騎六百十三名又増設十七名定為每佐領下各二百十共六百三十名十二年除各項専差打獵驍騎三十名看倉驍騎六名委署領催驍騎二十四名之外共存五百七十名又増設七十八名凡守衛之制順治初年定三旗官率所屬驍騎輪班守衞宫殿初制設班房六座乾隆九年増設宫内班房三座定驍騎分七班輪直每九十人為一班每班房十人十二年増設兩掖班房三座合新舊班房十二座改定驍騎分六班輪直每一百八人為一班毎班房九人其餘官兵並分職掌酌𣲖齎送貢物及圍獵各差並屬於盛京内