body:
  text: 兵考三禁衛兵八旗步軍營順治元年設提督九門步軍統領統轄八旗歩軍營及九門官兵其巡捕營别以兵部職方司漢主事一人督之康熙三十年始定歩軍統領兼管提督九門巡捕三營歩軍統領一人左右翼歩軍翼尉協理三營事務每翼各一人順治元年設歩軍總尉乾隆十九年改名翼尉八旗歩軍協尉每旗各三人順治五年設歩軍副尉乾隆十九年改名協尉每旗滿洲䝉古漢軍兼用共二十四人餘倣此歩軍副尉每旗各三人雍正四年設歩軍叅尉乾隆十九年改名副尉歩軍尉每旗滿洲二十一人䝉古漢軍各八人捕盜歩軍尉每旗滿洲三人䝉古漢軍各一人捕盜歩軍尉康熙三十四年設歩軍委署歩軍尉每旗滿洲五人䝉古漢軍各二人委署歩軍尉康熙三十四年設即於歩軍内選委領催共二千二十八名歩軍共一萬八千一百四名各官養亷兵糧六百八名即在數内捕盜歩軍三百二十名歩軍統領所屬文職員外郎二人初制設一人康熙六十一年増一人主事二人司務一人司務雍正十三年増設筆帖式十二人初制設四人康熙三十年増四人雍正十三年又増四人内城九門每門城門領各二人初名城門尉乾隆十九年改名城門領外七門同城門吏各二人初名城門校乾隆十九年改名城門吏外七門同外城七門每門城門領各一人城門吏各一人内外城門千總每門各二人初設指揮千户順治四年改為門千總城門驍騎共三百三十名門軍共六百四十名門軍初制召募民人充補雍正二年改用八旗養育兵乾隆四年定於歩軍内撥補礮手每門各二名初制惟設内九門礮手乾隆七年外七門増置中南北左右巡捕五營中軍副將兼管中營㕘將一人原設叅將乾隆四十六年改設副將南北左右四營叅將各一人原設二人乾隆四十六年増二人每營遊擊各一人原設三人乾隆四十六年増二人都司各一人乾隆四十六年増設守備共十八人康熙三十年初設守備十七人五十一年増一人雍正元年又増一人乾隆四十六年裁一人凡中營四人南營五人北營三人左營三人右營三人千總共四十六人康熙三十年初設千總七人雍正元年増一人十二年増七人乾隆四十六年増三十一人凡中營十人南營十二人北營八人左營八人右營八人把總共九十二人初制設十人順治四年増五人康熙三十年増六人五十一年増二人雍正元年増一人十二年増六人乾隆四十六年増六十二人凡中營二十人南營二十四人北營十六人左營十六人右營十六人外委千總共四十六人外委把總共九十二人馬兵共四千名戰兵共三千名守兵共三千名原設馬兵一千五百名歩兵三千六百名共五千一百名乾隆四十六年増設兵四千九百名共一萬名凡馬兵四千名戰兵三千名守兵三千名巡捕營之制順治元年設南北二營十四年増設中營康熙三年始令歩軍統領兼管原設三營叅將三人遊擊三人守備十九人千總十五人把總三十人兵五千一百名乾隆四十六年奉諭京師輦轂重地向來歩軍統領所管營務止分中南北三營地方本屬廣濶又西北昆明湖一帶離城較逺稽查巡緝更覺耳目難周所有額設官兵不敷𣲖撥且營制亦有叅差未協之處其應如何添設兵丁酌安營汎並管兵員弁及一切事宜著歩軍統領衙門㑹同各該部詳悉妥議具奏尋議准増設左右二營増副將一人叅將一人遊擊二人都司五人千總三十一人把總六十二人兵四千九百名共為五營二十三汎額兵一萬名又諭現今京城巡捕三營已改為五營每營俱應添設官兵但此等馬歩兵缺向例招募民人挑選今既添兵甚多著於八旗漢軍鄂爾布歩甲閒散内擇其年壯漢仗好者充補著交歩軍統領遵旨挑選凡城守之制内九門城門領城門吏以八旗滿洲外七門以漢軍内外城門千總並以漢軍内九門城門驍騎門軍以八旗滿洲䝉古外七門以漢軍康熙三十八年増定正陽門城門領城門吏驍騎等由八旗充補母庸議調其崇文等八門官向係各按本翼旗分管轄或致瞻徇應對調看守崇文門以鑲黄旗宣武門以正黄旗朝陽門以正白旗東直門以鑲白旗阜成門以正紅旗西直門以鑲紅旗安定門以正藍旗徳勝門以鑲藍旗其兵丁等仍按旗守門凡内外城門啟閉城門領司之轄以歩軍統領其非時啟閉者順治初年定每月逢五常朝日由禮部咨兵部轉行歩軍統領於黎明啟正陽門遇御門聴政日外城居住官員應早入者由兵部行文於曉鐘後啟正陽門遇壇廟祭祀日内外城陪祀官有應早入城出城者由太常寺先期咨兵部轉行於五鼓後啟門内務府遇有祭祀出城取水預期行文或早啟或遲閉其餘各部院八旗有應早出入者均預具印文移咨兵部核明應行者轉行啟門如無兵部印文概不准啟康熙三十一年定遇行幸駐蹕暢春園雍正元年以後遇同駐蹕圓明園制城内各衙門按日前赴奏事𫝊知西直門徳勝門西便門遇駐蹕南苑𫝊知正陽門永定門均酌量早啟遲閉其尋常行人仍於黎明放行雍正四年於正陽門西直門各頒隂文合符一扇𫝊諭歩軍統領如遇夜有奉㫖差遣及𦂳急軍務應即時啟門者俟大内持出陽文合符該城門領即取隂文合符騐明啟鑰仍報知統領其餘各門遇陽文合符至門即報統領親齎隂文合符至門與陽文合符比騐乃啟均於次日具奏平時啟閉仍遵例行凡門禁順治初年定午門外朝㑹坐班行禮處一應閑人交歩軍尉等驅逐雍正年間増定凡遇朝㑹之期委歩軍協尉四人副尉四人歩軍尉十六人歩軍酌量差撥於午門外大清門内御道兩旁巡警禁止喧譁又於長安左右門外每門委捕盜歩軍尉二人阻逐閑人其内九門外七門官兵各按分管之處晝稽出入夜守扃鑰以為常凡越城者有禁依城搭蓋席棚及閑雜人等近門歇宿者均有禁凡送𦵏者禁出正陽門遇夏至祭地壇春秋祭日壇月壇安定門於祭前十日朝陽阜城門於臨祭日禁亦如之凡歩軍營汎守之制皇城内各汎専𨽻八旗滿洲共分汎九十列栅一百十六鑲黄旗滿洲界在紫禁城北東自地安門箭亭城牆起西至地安門甬路分中接正黄旗界北自火藥局城牆起南至三眼井接正白旗界中設歩軍尉二人後各旗同分汎十每汎設歩軍十二人後各旗同栅欄十八每座設歩軍三人後各旗同附近汎者或即以汛兵兼管於景山後設歩軍尉一人管理街道灑水兼管河道後各旗歩軍尉職掌同歩軍百二十人後各旗歩軍數同正白旗滿洲界在紫禁城東北東自内府庫東口東牆起西至景山東牆止北自三眼井起南至銀牐風神廟接鑲白旗界分汎十一栅欄十於景山東門設歩軍尉歩軍如前鑲白旗滿洲界在紫禁城東東自騎河樓東牆起西至北池子止北自宣仁廟起南至北池子南口並望恩橋北接正藍旗界分汎十栅欄十三於北池子街設歩軍尉歩軍如前正藍旗滿洲界在紫禁城東南東自東安門東城牆起西至南池子街止北自北池子街並望恩橋起南至菖蒲河城牆止分汛十一栅欄九於南池子口設歩軍尉歩軍如前正黄旗滿洲界在紫禁城北東自地安門甬路分中起西至西什庫止北自侍衛教場城牆起南至𢎞仁寺分中接正紅旗界分汎十二柵欄十六於地安門設歩軍尉歩軍如前正紅旗滿洲界在紫禁城西北東自景山西門起西至西安門城牆止北自𢎞仁寺分中起南至西安門甬路接鑲紅旗界分汎十二栅欄十七於景山西門設歩軍尉歩軍如前鑲紅旗滿洲界在紫禁城西東自大高元殿門分中起西至西安門城牆止北自西安門甬路分中起南至大石槽城牆止分汎十二栅欄二十四於大光明殿後設歩軍尉歩軍如前鑲藍旗滿洲界在紫禁城西南東自西華門起西至西苑門止北自慎刑司起南至南府城牆止分汎十二栅欄九於西華門外設歩軍尉歩軍如前皇城外各汎分𨽻八旗滿洲䝉古漢軍内九門城上設汎八十七所遇四十駐蹕圓明園増八旗驍騎汎八所與歩軍相間看守遇大街巡幸方岳將歩軍撤下分防巷口城上汎守悉易以驍騎大城内共分汎六百二十五列栅一千一百九十九鑲黄旗滿洲界在大城北䝉古旗同東自新橋起西至舊鼓樓大街接正黄旗界北自安定門城根起南至紅廟後接正白旗界中設歩軍尉五人後滿洲各旗同分汎五十三每汎設歩軍十二人後各旗歩軍數同栅欄九十四每座設歩軍三人後各旗同䝉古旗界東自東直門北小街口接本旗漢軍界起西至新橋西接本旗滿洲界北自北城根接本旗滿洲界起南至汪家衚衕西口接正白旗界中設歩軍尉二人後䝉古漢軍各旗同分汎二十二栅欄二十九漢軍旗界在大城東北東自東直門城根起西至新橋東接本旗䝉古界北自角樓迤西接本旗滿洲界起南至南水闗接正白旗界分汎十七栅欄二十七正白旗滿洲界在大城東䝉古漢軍旗同東自朝陽門北城根起西至地安門大街分中接鑲黄正黄旗界北自汪家衚衕西口起南至大市街接本旗䝉古界分汎五十一栅欄九十䝉古旗界東自拐棒衚衕東口接鑲白旗界起西至皇城牆止北自兵馬司衚衕接本旗滿洲界起南至豹房衚衕接鑲白旗界分汎二栅欄三十五漢軍旗界東自朝陽門城根起西至雞鵞市接本旗滿洲界南自南小街口接鑲白旗界起北至何家口接本旗滿洲界分汎十四栅欄三十一鑲白旗滿洲界在大城東䝉古旗同東自東城根起西至皇城牆止北自炒麪衚衕西口接正白旗界起南至金魚衚衕東口接本旗漢軍界分汎四十六栅欄八十䝉古旗界東自城根中心臺起西至東安門止北自小石槽衚衕接本旗滿洲界起南至小街口接本旗漢軍界分汎十三栅欄三十五漢軍旗界在大城東南東自東城根起西至王府大街院府衚衕口止北自金魚衚衕東口起南至就日坊三條衚衕接正藍旗界分汎十二栅欄十八正藍旗滿洲界在大城南䝉古漢軍旗同東自城根起西自皇城牆轉西至長安左門止北自三條衚衕起南至小豹房衕衕西口接本旗䝉古界分汎四十五栅欄八十七䝉古旗界東自城根起西至敷文坊東口接本旗漢軍界北自小豹房衚衕起南至城根止分汎十九栅欄四十五漢軍旗界東自敷文坊東口起西至碁盤街分中接鑲紅旗界北自兵部街北口接本旗滿洲界起南至城根止分汎十五栅欄十五正黄旗滿洲界在大城北北自徳勝門城根起南至皇城牆西北角止東自地安門分中接鑲黄旗界起西至水闗橋止分汎五十五栅欄九十一䝉古旗界在大城西北漢軍旗同北自北城根起南至官園口止東自横橋起西至西直門止分汎十八栅欄三十漢軍旗界北自北城根起南至臭皮衚衕接正紅旗界東自水闗接本旗滿洲界起西至横橋接本旗䝉古界分汎十八栅欄四十一正紅旗滿洲界在大城西䝉古漢軍旗同北自臭皮衚衕起南至丁字街止東自大市街分中起西至馬石橋接本旗䝉古界分汎三十八栅欄七十九䝉古旗界北自朝天宫前起南至武衣庫衚衕止東自石馬橋起西至阜城門止分汎十四栅欄三十六漢軍旗界北自倉夾道北起南至西安門分中止東自皇城牆起西至大市街分中接本旗滿洲界分汎十栅欄十四鑲紅旗滿洲界在大城西南北自按院衚衕起南至南城根止東自瞻雲坊分中起西至西城根止分汎四十八栅欄九十六䝉古旗界在大城南漢軍旗同北自絨線衚衕接本旗滿洲界起南至宣武門止東自六部口起西至大濠止分汎十二栅欄二十三漢軍旗界北自刑部門分中起南至南城根止東自碁盤街分中起西至六部口接本旗䝉古界分汎十栅欄三十九鑲藍旗滿洲界在大城西䝉古旗同北自丁字街接