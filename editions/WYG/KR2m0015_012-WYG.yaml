body:
  text: 田賦考十二官田臣等謹案官田之名見於周禮鄭衆以為公家所耕田鄭康成以為庶人在官者所受田二說不同馬端臨前考官田類止載殷周之公田耤田不及載師之官田似未賅備自漢至唐不聞云官田者至宋而其說始詳其時官田輸租民田輸賦官租之額浮於民賦甚至買民田以為官田田不改舊而租加至數倍此官田之為民累也眀初如蘇松嘉湖諸府雖有官田民田之分然皆係民業並非公産惟科則有輕重之不同與宋之官田又不同矣若明之皇莊及諸王勲戚所賜莊田則為在官之田其時公私侵占頗為民累我朝定鼎之初即將故明宗室禄田令與民田一例起科其明藩田産號為更名地者亦皆賦於民而薄其征斂前代相沿之秕政至是盡除矣至於内府之官莊宗室勲戚世職與兵丁所受之莊田不𨽻於州縣者已别立八旗田制一門以彰昭代之良法惟耤田學田直省公田牧地之類編入於此凡在京壇壝等處在京地畝不納糧其直省社稷山川厲壇文廟祠墓寺觀祭田亦為公地免其徵科祠墓寺觀祭田亦有納糧者與民田同兹不備載直省公地之數直𨽻一十九頃二十四畝一分九釐一毫有竒奉天一頃四十一畝九分三釐五毫有竒江蘇一百八頃八十四畝一分二釐五毫有竒又一千五百七丈安徽一十五頃一十三畝一分二釐五毫有竒浙江七十六頃五十四畝九分六釐九毫有竒江西一十四頃三十一畝六分一毫有竒又積步四千三百一十四步福建五百一十頃五十五畝一分九釐一毫有竒山東九十八頃九十六畝四分五釐七毫有竒山西三十八頃六十七畝二分四釐五毫有竒河南一百一頃七十四畝九分九釐八毫有竒陜西一十六頃二十三畝八分二釐五毫有竒四川一十五頃一十九畝九分一釐一毫順治元年賜聖賢後裔祭田除其租賦衍聖公祭田二千一百五十七頃五十畝林地一十八頃二十七畝廟宅基三頃二十七畝五分四氏學學田五十頃復聖裔祭田五十頃墓田地三頃三十三畝一分廟宅基九十二畝五分宗聖裔祭田五十一頃六十畝墓田地一十頃一十五畝七分廟宅基三十九畝一分亞聖裔祭田五十一頃一十五畝墓田地七頃三十一畝四分廟宅基一頃三十畝七分五釐先賢仲氏裔祭田六十五頃三十八畝墳地九頃五十畝廟宅基六十八畝皆除其賦令直省各置學田凡直省各學貧生聽地方官覈實申文該提學於所在學田内動支銀米酌給至七年改江寧國子監為府學嵗徵田房租銀錢稻穀留給貧生等春秋祭祀亦於租銀内動支二年以近京廢地撥給壯丁墾種有餘為牧馬厰至十一年給親王牧厰方八里郡王牧厰方四里十二年又定親王牧厰方二里郡王牧厰方一里額外多占者查出撥給新壯丁凡畿輔牧厰之數鑲黄旗牧厰坐落武清寶坻東自唐畦西至陳林莊七十里南自張家莊北至上馬臺九十里正黄旗牧厰坐落天津西北自俞家莊東北至小稍子三十五里西南自孫家莊東南至秋家莊四十七里正白旗牧厰坐落天津東自好字沽西至白家莊四十二里南自城兒上北至清溝六十五里正紅旗牧厰坐落甕山十五頃蘆溝橋西髙陵二十七頃六十畝鑲白旗牧厰坐落通州二十四頃八十四畝鑲紅旗牧厰坐落順義縣天主馬房村三十五頃二十八畝蘆溝橋西四頃八十畝正藍旗牧厰坐落豐臺王蘭等莊東西三十里南北五十里鑲藍旗牧厰坐落草橋十里廊房八里凡口外牧場曰楊檉木牧厰在錦州府廣寧縣北二百一十里彰武臺邊門外東西距百五十里南北距二百五十里曰御馬厰亦曰上都牧厰在獨石口東北百四十五里博囉城東西距百三十里南北距百九十七里曰禮部牧厰在張家口西北二百三十里察竒爾圖察罕城東西距四十六里南北距六十五里曰太僕寺左翼牧厰在張家口東北百四十里哈喇尼敦井東西距百三十里南北距五十里曰太僕寺右翼牧厰在張家口西北三百十里齊齊爾罕河東西距百五十里南北距六十五里曰鑲黄正白鑲黄正藍四旗牧厰在張家口北百里崆果羅鄂博岡東西距百四十里南北距百五十里曰正黄正紅鑲紅鑲藍四旗牧厰在張家口西北二百里諾穆罕博囉山東西距百三十里南北距二百五十里四年以江寧舊有十二馬羣場地今為民墾熟田毋令棄業五年以奉天屯衛地令八旗均分為牧場奉天中前所前屯衛中後所三處地分與八旗自東迄西先給兩黄旗次兩白旗次兩紅旗次兩藍旗六年順義等處設馬厰順義清河漷縣沙河蘆溝橋五處荒地一千四百六十八頃四十四畝潞河沙河清河蘆溝橋兩岸各長五里濶三里俱令丈作馬厰又定嗣後棄地為馬厰永行停止如沙地不堪耕種者仍留牧馬十一年耕耤於南郊耤田在正陽門外之西中為先農壇壇内地一千七百畝其二百畝給壇戸種五穀蔬菜以給祭祀之需餘千五百畝收租銀三百兩以備修理壇墻凡耤田嵗收黍一石二斗二升一合八勺穀一石五斗五升七合八勺大麥五斗七升九合七勺小麥一石三斗五升三合藏之神倉臣等謹案耕耤儀詳見郊社考今取馬氏之例載其田制於此十四年清釐學田直省學田不許豪强隠占令各督撫嚴查州縣額徵田租逐一清釐應征課稅責成有司提學官定其殿最賑濟貧生如有餘剰仍令解部康熈元年以天師菴草場歸并崇文門部員管理順治二年天師菴草場設場尉筆帖式及兵丁防守至是俱裁去以榆林城外牧地令民人耕種榆林城外牧馬地十六頃三十六畝零令地方官招民耕種明年以甘州鎮牧地三頃二畝招民承種入甘州中衛徵糧又奉天府錦縣馬厰地留備駐牧不許民間開墾二十四年給先聖周公祭田五十頃又廣孔林地十一頃十四畝有竒皆除其賦又減免曲阜顔氏地畝額糧有差三十年更定徳州駐防官馬厰徳州官兵向在滄州牧放因越省不便令將霑化縣邵家莊荒地為馬厰其應徵地畝銀兩准豁除三十九年以天津等牧地招民墾種天津等十二州縣衛所牧馬厰地特派都統會同直𨽻巡撫查明餘地交與地方官招墾起科東翼四旗丈出一萬二百六十一頃零西翼四旗丈出一萬一千三百七頃七十二畝雍正二年復查馬厰及其餘地八旗存留馬厰并馬厰餘地派官員查明可以墾種者交與地方官招民墾種其不堪耕種之處仍交八旗為馬厰是年總計天下學田三千八百八十六頃七十八畝五分四釐九毫有竒徵租銀二萬三千四百五十八兩二錢二分七毫糧一萬五千七百四十五石七斗七升八合三勺有竒錢六萬二千四百六十文順天府學田八十二頃八十一畝九分二釐八毫租銀四百三十四兩六錢三釐三毫穀一十八石三斗八升一合雜糧六石三斗錢四萬二百四十文直𨽻等處學田一千一百八十八頃九十二畝三分二釐二毫租銀二千三百十五兩七錢七分二釐穀一千二十四石八斗八合六勺米五百十七石七合七勺麥四十二石一斗二升七勺豆七石江南江蘇等處學田四百三十五頃九畝二分七釐六毫租銀五千七百一十六兩有竒錢二萬一千六百文安徽等處學田一百五十八頃七十七畝八釐四毫租銀一千六百三十八兩四錢一分八釐穀五百八十九石七斗五升八勺山西學田二百七十五頃五十三畝一分有竒租銀二百九十八兩七錢六分五釐五毫糧一千一百八十二石二斗六升有竒山東學田四百一十八頃二十二畝五分有竒租銀一千四百二十三兩二錢一分有竒河南學田一百六十頃九十三畝五分有竒租銀八百八十四兩九錢四分有竒陜西西延等處學田五十四頃六十四畝租銀一百五十四兩四錢有竒糧一千一百二十一石九斗有竒臨鞏等處學田三百一十一頃二十六畝有竒租銀二十七兩一錢有竒糧一千四百五十三石八升有竒浙江學田一百七十五頃六十三畝五分二釐租銀四千一十三兩二錢三分有竒江西學田六十八頃三畝五分九釐八毫有竒租銀一十八兩六錢三分穀八千四百一十七石七斗一升八合二勺湖北學田八十七頃七十八畝七分三釐有竒租銀六百四十三兩六錢八分有竒穀一百八十四石九斗八升有竒湖南學田四十二頃八十五畝一分租銀四百一十八兩四錢八分五釐穀九十七石三斗三升四川學田三頃六十三畝七分有竒租銀四兩七錢四分一釐有竒穀二百三十九石八斗七升有竒福建學田八十六頃五十畝四釐五毫山園池屋共租銀二千一百四十九兩八錢五分二釐八毫有竒廣東學田一百五十一頃一十六畝五分六釐有竒山塘房地共租銀一千九百三十兩八分七釐一毫廣西學田一百三十五頃五十四畝九分二釐三毫塘圃屋共租銀一千五十七兩八錢九分七釐有竒米三十二石七斗三升五合七勺雲南學田不計頃畝租銀六十九兩五錢二分一釐有竒穀一百石租穀折銀三十六兩六錢七分有竒貴州學田四千三百二十九畝五分有竒租銀一百一十一兩二錢八分米穀折銀一百二十五兩二錢有竒穀三百五十七石八斗一升有竒米三百三石二升有竒四年諭曰禮天子為耤千畝諸侯百畝此則耤田之禮亦可通於天下朕意欲令地方守土之官行耕耤之禮使凡為官者時存重農課稼之心凡為農者亦無茍安怠惰之習著九卿詳議具奏九卿會議請通行奉天直𨽻各省於該地方擇地為耤田每嵗仲春行九推之禮明年頒耕耤儀於直省令擇東郊官地潔浄豐腴者立為耤田如無官地則置買民田以四畝九分為耤田於耤田後立先農壇令守壇之農夫灌溉耤田所收穀數造册報部乾隆十二年除免福建閩縣先賢二十三祠祭田糧此田糧自國初已優免後地方官誤以溢額報解至是盡免並豁其積欠十三年遣官勘大淩河錦州馬厰地時以裁減馬羣議將餘地給官兵耕種遣大臣分定四至注册以免日後侵占尋據差往大臣會同牧羣總管等議言錦州大淩河馬場東至右屯衛西至鴨子厰南至海北至黄山堡東西長九十里南北長十八里至六十里不等計地萬七千九百餘頃原議自西界横截十里給與官莊就近耕種今丈量西邊自南至北長十八里有竒東邊自南至北長二十里有竒其自東至西應截地内南界窄狹北界有山有足截十里者有不足截十里者照地勢裁給計地九百三十八頃有竒分定界址將所截之處建築封堆以杜將來墾占從之十八年總計天下學田一萬一千五百八十六頃有竒租銀一萬九千零六十九兩有竒直𨽻學田千四百二十九頃八十八畝租銀二千七百七十六兩糧千九百十有六石各有竒江南江蘇學田四百十有八頃五十八畝租銀五千四百九十一兩各有竒安徽學田二百二十頃十有八畝租銀千六百四十兩各有竒山西學田二百七十七頃九十八畝租銀二百五十七兩糧十有六石各有竒山東學田四百一十七頃七十二畝租銀千三百二十九兩各有竒河南學田二百十頃七十一畝租銀九百六十五兩各有竒陜西西安學田五十二頃二十畝租銀百五十四兩糧千二百四十九石各有竒甘肅學田三百十有一頃二十五畝租銀八十九兩糧千二百九十四石各有竒浙江學田三百頃十有七畝租銀三千五十兩各有竒江西學田六十八頃租銀十有八兩糧八千四百十有七石各有竒湖廣湖北學田百二十頃五十七畝租銀八千三十二兩糧百九十二石各有竒湖南學田七千三百頃八十畝租銀二十九兩糧四千三百五十八石各有竒四川學田二十三頃有竒田不起租以賦給貧士福建學田九十頃七十畝山園池屋不計數租銀百五十四兩糧千二百四十九石各有竒廣東學田百五十一頃十有六畝租銀千九百三十兩有竒廣西學田百三十四頃七畝租銀千七十三兩糧三十二石各有竒雲南學田十有四頃八十八畝租銀三十六兩糧五百九十一石各有竒貴州學田四十四頃十有八畝租銀二百四十六兩糧四百八十七石各有竒凡學田専供修學及贍給貧士其田與賦即在州縣田賦之中惟佃耕收租以待學政檄發間有山塘園屋統名曰田所收有銀有錢有糧統名曰租田之多寡租之重輕各學不齊舊無定額二十一年清丈直𨽻馬厰地給民為永業改名恩賞官地天津静海青滄鹽山豐潤寶坁寧河大城文安任邱新安武清十三州縣於雍正二年查出馬厰地六萬一千九百七十七頃零給民墾種至是命侍郎吉慶等會同督臣查丈得十一萬五千一百二十六頃零至二十二年復命督臣覆丈實得十萬一千一百二十四頃零除已經墾種升科外其已墾未升科地一萬五千六百五十二頃零應按畝酌定科則天津静海青滄鹽山武清寶坻任邱新安九州縣地分為上中下三等每畝徴銀五分至一二分不等寧河縣葦草地分為二等每畝徵銀三分一分不等文安縣地每畝徵銀五分五釐大城縣地每畝徵銀五分五釐九毫零其餘未墾荒地俟召墾成熟之後按則起科又豐潤縣原報墾地三千五百餘頃係海濱斥鹵不能耕治仍應歸入未墾項下如有民人願認為業者照河泊葦草地之例起科二十六年准湖廣荆州八旗馬厰墾熟陞科地給民人管業諭蘇昌奏荆州八旗馬厰坐落江陵潛江石首監利枝江等縣一帶沿江地方從前原係民間抛荒地土後因設立滿州官兵即圈作馬厰近日居民漸次報墾陞科旗人稱為侵佔厰地民人指稱納糧産業彼此争競不息現在會同將軍定界造册以息兵民紛争等語牧厰闗係營伍而糧地亦民間生計所資自必明定界限始可永息争端現在沿江之地如果牧放久經圈用勢在必需而民人從中計圖侵種自應按照前此界限查出歸旗若僅係附近馬厰四旁原無礙於牧放民人又已墾熟陞科亦應仍給民人管業蘇昌已經調任著即交與愛必達會同該將軍秉公妥協勘辦嗣據愛必達等言石首監利枝江潛江四縣地方通計八旗馬厰共地六萬三千二十九畝内應撥歸民戸熟田柴山湖灘地共三萬五千二百一十七畝有竒均係馬厰四旁之地無礙於牧放應令業戸各照畝數管業仍於厰旁四至酌量地之逺近堆築土墩以為界限民人不許越界侵墾旗人不得界外滋事從之清丈四川建昌鎮標馬厰地招民承墾按年輸租諭據岳鍾璜奏建昌鎮等處馬厰地界多與民田相聨屢致侵佔搆訟請招佃開墾收租添補喂養馬匹等語此項馬厰地畝原係給營牧馬在官之産並非閒曠乃毗連民地以致日久私侵互相控告勢所不免今據該提請將此項地畝佃民承墾成田每嵗收租㪚給添補飼喂之資息争端而清案牘事屬可行著傳諭開泰令其確查勘丈酌量情形會同籌辦嗣經開泰等言建昌鎮標中左右三營馬厰地肥磽不一共丈出上中下地四千一百三十九畝就其形勢配搭分為九十區招集附近土著居民自備牛力工本承領分墾按戸給與執照上地每畝嵗納租穀五斗草十斤中地二斗下地一斗其應納租以乾隆二十七年為始收十分之四次年收十分之六又次年收十分之八三年以後按額徵收永無増減再此項地畝係在官之産與民間首墾不同均免陞科下部議行三十年准太僕寺右翼牧厰曠地招民開墾察哈爾都統巴爾品言太僕寺右翼遷移牧場廢棄空地在正黄正紅旗之察哈爾䝉古游牧界外長一百四五十里寛五六十里相隔各旗游牧處所甚逺與牧場無礙應招民耕種所出米石足敷支放張家口兵糧並可分賞牧場人等請交各該處地方官辦理戸部會同軍機處議覆應如所請其耕種納糧運送貯支各事宜交直𨽻督臣山西撫臣會同該都統委員前往該處相度丈勘酌量情形妥協議奏從之三十一年丈勘太僕寺右翼牧厰餘地招民墾種定交納銀糧運送貯交之例戸部議准察哈爾都統巴爾品等奏一會勘得山西所轄之豐鎮寧逺二㕔地方太僕寺右翼牧厰空地丈明可墾地二萬三千餘頃内一萬三千五百頃堪種粟穀應徵收本色又九千餘頃止宜雜糧應徵收折色凡與游牧毗連處立定界址以杜紛争侵越之弊一每地以五頃為一分視資本籽種多寡或每户准給一分或兩三人合認一分頒給印照執業不許轉賣並於查青時查明己未布種分别年限陸續陞科一前項議墾地畝應徵銀米悉照口外成例分别本折徵輸飭豐鎮寧逺二㕔各隨所轄地段隨時徵解一徵收糧石於豐鎮㕔地方建倉存貯以備轉運其運至張家口脚費照定例辦理一未經全墾之前就每嵗現徵銀米分别運解以給駐防兵糈三十四年直𨽻總督楊廷璋奏直屬現存入官地畝應准其停止委員查丈疏入諭此後入官地畝停止旗員查丈定租之例著照所議行至於舊案令地方官於一年限内自行詳查酌復原租由府道藩司轉詳該督覆核咨部之處尚未妥協此等入官旗地厯年久逺地方官原定租額時大率不能詳核者多若仍令伊等自行查改難保無迴䕶徇情朦混草率諸弊著户刑二部揀選明幹滿漢司官各四員其餘各部揀選滿漢司官各二員交戸部帶領引見候朕簡派前往會同府尹及各該府秉公悉心查辦三十六年戸部議准山西巡撫鄂寶奏豐鎮寧逺二㕔招民開墾太僕寺牧厰地共二萬一千五百五十五頃七十畝有竒自乾隆二十二年起陸續墾熟起科至本年全行陞科仍於徵糧三年之後委員清丈一次以禁侵佔如議行三十七年戸部議豐鎮寧逺二㕔民認墾太僕寺收厰地應照例確查覆奏從之陜西巡撫勒爾謹奏興平縣被水冲刷旗標厰外地畝及更名等地共二十三頃五十二畝四分零并太倉州捐置義冢田五畝請照例豁免下部議行戸部議殺虎口外馬厰地禁止私開原以防侵越察哈爾游牧地界今民人等所開地畝實係各王公馬厰界内則現在該王公馬厰内牲畜日稀無須多餘地畝是前項厰地本屬曠野與其嚴行飭禁坐成無用之區不若准其耕耘作為有用之土所有已經墾熟輔國公恒禄地畝三百餘頃該撫等查明確數在於各該佃名下每畝徵銀一分四釐由寧逺㕔通判衙門報部撥用仍令佃戸向各業主名下按畝交租其戸口編造清册送部此外毋得再行私開致無底止如議行三十八年諭據舒赫徳奏稱請將烏巴什游牧移往珠勒都斯地方等語烏巴什及伊犁等各台吉游牧遷移珠勒都斯地方恐伊等力㣲不無拮据著加恩在塔爾巴哈台地方現牧羊羣賞給以為伊等生計之助三十九年户部奏輔國公寧陞額名下口外馬厰係䝉古招同傭工貧民開墾夥種成熟至一百餘頃之多雖呈報在後而墾熟在先據察哈爾都統會同山西巡撫委員確勘前項牧地陸續開墾是飭禁以前早已成熟應照上年恒禄牧地辦理從之四十年户部議陜西巡撫畢沅奏西安移駐巴里坤協領佐領等官所遺地畝坐落咸寧長安二縣共地一百九十七畝三分除留為八旗兵丁葬墳地一百六十七畝三分尚該地三十畝應請照依官下旱地之例共科糧一石八斗零折色糧六斗折布等銀二錢七分零自四十年為始入額徵收按年報銷如議行山西巡撫覺羅巴延三奏查丈輔國公寧陞額等家牧厰成熟地一百一頃一十三畝請照例陞科從之户部議雲貴總督覺羅圖思徳奏乾隆三十年分開墾滇省昆海沿邊馬厰草地成熟田一千九百三畝零請照例陞科如議行四十五年陜甘總督勒爾謹等奏陜西提標前後兩營馬厰坐落咸陽髙陵長安三水淳化等五縣開種地一百六十六頃八十八畝零每畝以三分五分徵租共應收租銀六百三兩二錢一分自四十四年為始按年起租以備營中緊要之用從之四十六年户部議口外牧厰地方本屬遼濶近年來王公大臣等牧放牲畜漸稀而流寓小民在該地方居住者亦漸漸聚成村落伊等衣食無資日守無糧間地勢難禁其私墾是雖定有嚴禁之名究無嚴禁之實似不若准其耕種作為有收之土照例陞科所有和碩莊親王塔拉庫布爾地方牧厰一處既據察哈爾都統山西巡撫查勘所墾地畝實與游牧無妨應請照恒禄等家開墾馬厰空閒地畝之例一律陞科再和碩禮親王呈報現有民人私墾應令該都統等查明如果與游牧無礙者一并確查辦理并請嗣後各旗王公大臣等口外牧厰實與游牧毗連處所或有䝉古與民人私行刨挖墾種者令該地方官仍照前實力稽查嚴行飭禁如議行四十九年戸部議准建昌鎮標馬厰於三十七年七月安寧河上游水發地畝盡被水淹該督富勒渾時值進𠞰金川道府調赴軍營詳請緩勘迨凱旋後該督李世傑逐一履勘冲没地二千二百八十四畝已成河身自被水後至四十二年額徵租穀草斤應准其豁除其涸出地一千八百五十五畝沙礫不能種稻即以雜糧徵收每嵗共三百五石二斗九升按地分攤每畝計收租一斗六升有零較原定下地每畝收穀一斗之數尚屬有盈應照舊㪚給該標兵丁添補喂養馬匹按年造册報銷皇朝文獻通考卷十二
