body:
  text: 刑考十徒流雍正十三年定蠧役索詐貧民致令賣鬻男女者為首僉妻安挿奉天為從徒三年詳見刑制門改遣應發寧古㙮等處人犯奉諭嗣後發遣人犯有應發寧古㙮等處者皆改發三姓地方給與八姓一千兵丁為奴計一千人足數再行請㫖定稽查軍流人犯之例凡軍流人犯到配令該管印官每月㸃騐二次并造具年貌籍貫冊結呈報府㕔稽查如該管官不行㸃騐以致脱逃者議處乾隆元年正月詳定竊盜三犯分别贓數發遣之例凡竊盜三犯除五十兩以上照例擬絞外其五十兩以下至三十兩者俱發鄂爾坤種地自三十兩以下至十日以上改發極邊逺充軍如銀不及十兩錢不及十千者俱照偽造印信誆騙財物無多例杖一百流三千里定軍流查僉妻室之例凡審擬軍流各犯即將該犯有無妻室訊明有妻室者將姓氏年貌聲明招内依限轉詳以便於題結之日即行僉遣如無妻室者取具隣族州縣印甘各結隨招申送定聚衆格鬭杖流例刑部議准閩省嗣後有因㣲嫌起衅輒敢聚衆執持鎗棍等格鬭者照康熙五十八年沿江濱海用鎗棍混行鬭殺之例將兩造為首及鳴鑼聚衆之犯杖一百流三千里傷人之犯杖一百徒三年附和未傷人者枷號一個月責四十板互見刑制門改定漢人發配之例刑部以發遣鄂爾坤種地之例停止奏請仍發黒龍江寧古㙮吉林烏拉等處奉諭黑龍江寧古㙮等處若概將罪人發遣則該處聚集匪類恐本地之人漸染惡習有闗風俗嗣後如滿洲有犯法應遣者仍發黒龍江等處外其漢人應改發各省烟瘴地方總理事務王大臣㑹同刑部議奏尋議除滿洲䝉古漢軍及旗下家奴有發遣者仍照定例外其民人有犯如强盜免死及窩盜三人以上之犯發雲南貴州四川廣東廣西極邊烟瘴地方其平常發遣人犯酌發雲貴川廣烟瘴少輕地方從之定遣犯逃後為匪之例刑部議准嗣後平常發遣人犯逃後無行兇為匪者仍照例科㫁外其審有行兇為匪者悉照現在所犯分别擬改加重治罪至如竊盜計贓鬭毆傷人俱有罪止於杖者應照逃後無行兇為匪例枷號兩月之外再枷號一月詳見刑制門定毆死期親弟妹改照本律滿徒加一等杖一百流二千里詳見刑制門定職官舉貢生監犯發遣者免其為奴凡黒龍江寧古㙮等處發給披甲為奴之犯有曽為職官及舉貢生監者查明照例一概免其為奴即於戍所另編入該旗該營令其出户當差並諭嗣後法司定案除反叛强盜免死減等人犯外其職官舉貢生監等有罪應發遣者不得加以為奴字様定遣犯妻室病痊補解及老疾免遣之例凡軍流人犯之妻如有患病留養本犯先行發遣者伊妻於病痊補解時許親屬隨行再犯人之妻如有年逾六十老病不能隨行者聴二年復漢軍遣犯以枷責准折之例上以漢軍犯軍流等罪者其親族墳墓俱在京師邊方逺土風尚頓殊平時不習生計類難存活且與百姓交錯不無滋擾故有是命定鹽徒十人以下拒捕傷一人為從僉妻流三千里至配所杖一百詳見刑制門定外遣罪犯已故妻子准回旗回籍之例奉諭軍流人犯本身已故其妻子准其回籍從前已於恩詔内著為定例今朕思從前發遣在外安置及當差之犯雖情罪較重然本身已故其妻子原係連坐之人著該管官查奏准其回旗回籍互見刑制門定辛者庫旗人犯軍流一體折枷責之例刑部議奏漢軍犯軍流等罪既仍照例枷責完結其辛者庫内務府佐領旗鼓佐領人等與漢軍同屬旗人自應畫一辦理從之定私越畨地及偷越深山抽藤採棕分别杖徒例詳見刑制門定捕役串同夥盜教供妄認作為盜首者照誣良為盜律減一等杖一百徒三年詳見刑制門三年定妄攻冐籍為首照誣告人杖罪加所誣三等律杖六十徒一年詳見刑制門更定窩留逃旗過三月者杖九十徒二年半過一年者杖一百徒三年鄰佑知情者杖六十徒一年詳見刑制門定圖姦僕婦不遂毒毆致死者發往黒龍江當差詳見刑制門定刨參遣犯免解部之例刑部題刨參人犯該將軍既已審明定擬復送臣部轉發徒費往返且本犯先發續以僉妻年少婦女實屬不便嗣後寧古㙮等處拏獲刨參人犯一經審明定擬即徑解各犯原籍交與該督撫將應發遣者照例發遣應杖徒者照例充徒免其解部庶人犯無輾轉解送之苦而妻室無長途單行之累矣從之定窩留竊販子女分贓首從俱發邊衛充軍詳見刑制門定旗人三犯竊盜枷責後復行偷竊者發寧古㙮當差詳見刑制門定描畫紙牌減刻賣紙牌一等科罪例詳見刑制門定兵丁豢竊分别名數發遣例凡兵丁勾通竊盜坐地分贓豢竊一二名者照常人竊盜治罪外加枷號三月三四名者杖一百流三千里五名以上者發邊衛充軍如勾通積匪巨猾一二名者發附近充軍三四名者邊逺充軍五名以上者極邊烟瘴充軍詳見刑制門定竊盜三人以上者照九項例改發先是乾隆二年九卿議准嗣後民人有犯强盜情有可原免死減等者强盜行刼數家止首一家者夥盜供出首盜所在即時拏獲者竊盜臨時拒捕殺人為從者偷刨墳墓二次者並未賣身旗下謊稱賣身者民人謊稱旗下逃人者民人假稱逃人具告行詐者民人賣逃買逃者以上九項遣犯查明有妻室者照舊例僉發寧古㙮黒龍江等處給披甲人為奴如無妻室之犯并其餘各項犯遣民人悉行改發雲貴川廣等省分别極邊烟瘴與烟瘴少輕地方其民人竊盜三人以上之遣犯不在九項之内至是刑部以該犯情罪輕重請照九項遣犯之例查明有妻室者改發寧古㙮黒龍江等處給披甲人為奴如無妻室者酌發雲貴川廣極邊烟瘴地方交與地方官嚴行管束從之四年定繼母致死前母之子審非故殺者將繼母偏愛之子分别流徒例詳見刑制門定官役因事受財限内完贓者死罪減一等改流軍流以下各減一等發落限内不完照原擬監追流罪以下即行發落詳見刑制門定内地民人略賣畨仔者不分首從均杖一百流三千里例詳見刑制門定軍流各案題奏之例向來軍流各案有特疏具題者有年終彚題者有咨部完結者辦理不一至是刑部議定嗣後除人命强盜情罪重大應發黒龍江寧古㙮等處者仍令各督撫特疏具題外其餘一切軍流各案情節明顯别無疑竇者迅速審擬咨部完結年終彚題從之定遣犯親老丁單妻室免僉之例定例民人犯軍流者必父母年逾七年家無次丁方准留養未及七十者伊子不准留養妻室一同發遣至是刑部議准嗣後除强盜免死及情罪重大僉妻發遣外其餘軍流等犯父母未及七十例不留養者如年已衰邁不願隨往配所又家無次丁願留妻侍奉其親者應令該督撫確查免僉從之定夥盜年未及嵗被脅隨行者不論分贓不分贓並流三千里不准收贖例詳見刑制門定盜首自首免死改遣之例九卿議覆嗣後如未傷人之盜首能於罪未發而自首者僉妻發邊衛充軍聞拏自首者照情有可援例僉妻發遣無妻室者仍照例改發雲貴川廣烟瘴地方再窩家盜線與盜首無異如有自首及聞拏投首亦照此例分别定擬從之互見刑制門五年更定免死人犯為匪之例九卿議奏嗣後免死人犯除在配殺人及為强盜并逃後復犯行兇為匪仍照定例外其在配所行竊贓至滿貫以上及三次竊盜律應擬絞者俱擬斬立决犯該徒罪以上者均擬斬監候犯該笞杖者俱枷號鞭責其有犯别項罪名亦照此分别定擬從之互見刑制門定强奪良家婦女未成姦者杖一百流三千里詳見刑制門定兩家互毆各斃一命的係各兇身本宗親屬將應擬人犯免死發邊衛充軍詳見刑制門定奸胥揑充牙行照更名重役例杖一百徒三年其誆騙客貨為害商民者枷號一月發附近充軍詳見刑制門改定軍流發配例三條刑部議准嗣後貪贓官役應發尚陽堡遼陽者改發川陜邊省安挿為民按其原罪定地逺近其衙役索詐十兩以上例發奉天安挿者改為邊衛充軍至於官船户將私鑄錢文夾帶移往他處雖於私鑄為從稍間而情罪重大原例枷杖發遼陽安挿今改為杖一百流三千里其無票出口情節稍輕改為杖一百流二千里至十四年又議准官船户夾帶私錢及無票出口之例並改照偶為買使例杖一百徒三年定遣犯中途脱逃罪刑部議准嗣後免死減等人犯有在中途脱逃者除逞兇拒捕及逃後行兇為匪者仍照例正法外如無拒捕行兇為匪别故亦照在遣所脱逃之例枷責解配管束六年更定罪止擬流斷給財産例凡毆死同堂卑幼罪應擬流及毆至篤疾罪不至絞者均於該犯名下照例斷追一半財産給死者及篤疾之家定私販誣扳平人者照誣告人流徒杖罪加所誣三等律杖一百流三千里詳見刑制門定限内定贓減流為徒之官犯不准收贖例山東巡撫朱定元奏叅革擬徒之鹽法道楊宏俊手足瘋癱懇請收贖奉諭楊宏俊係計贓擬流之犯既經援例減等為徒今又以廢疾題請收贖則貪劣之員竟可脱然法外矣况所稱廢疾亦未必確楊宏俊不准收贖朱定元著嚴飭行互見刑制門定私鑄砂殻小錢為從律應絞法者改為發遣應發遣者改為滿流詳見刑制門定原毆傷輕保辜正限後十日内因風致死者杖一百徒三年詳見刑制門七年定遣犯家屬條例刑部議准侍郎張照條奏嗣後旗民發遣人犯係奉㫖僉遣及例應僉妻者其妻子解至遣所聴該管衙門同本犯一例管束至情願隨往之人與連坐家口不同到配時毋得與本犯一例羈管如本犯身故其妻女子孫有願擕骸囘旗回籍者即准回歸不在奏請之例又軍流發遣人犯到配後生長子孫本犯未故其子孫如欲他往耕種貿易呈明該管衙門聴其自便其生長之女或許嫁他處或寄養與人亦聴其自便至賞旗為奴人犯之在籍子孫有前往遣所省親及隨往之子孫原不在僉遣之内欲行回歸即赴該管衙門報明給票准其回歸本犯之主倘有挾勢羈留刁難計陷者照存養良家男女為奴婢律治罪八年定尋常軍流妻室免僉之例除例載緣坐犯屬及强盜免死減等例應僉妻外其餘軍流人犯概令免僉如本夫願帶或妻妾願從者聴從浙江巡撫常安請也定私鑄案内情有可原免死減等之犯俱僉妻發黒龍江等處給披甲人為奴定軍流人犯遇六月一體停遣先是康熙二十三年定發遣軍流人犯隆冬停遣之例盛暑仍照常接遞至是山東按察使圖爾炳阿奏請遣犯在途遇六月一體停遣從之九年定過失殺尊長例凡妻過失殺其夫妾過失殺家長杖一百流三千里妾過失殺正妻杖一百徒三年俱决杖一百餘罪收贖詳見刑制門改定軍流遞籍發配之例刑部議奏康熙四十一年定例民人在京犯流並免死減等流犯如無妻室及應追銀項順天府定地發配如有妻室及應追銀項遞回原籍追銀僉妻蓋以僉妻則必遞回本犯同解而應追之項亦必遞回本籍始能確查有無家産也至於例應免僉之犯若追項已完及有罪無贓者除本犯情願擕帶妻子仍照例遞回外其供無妻室與雖有妻室不願擕帶者應止按本犯原籍應軍應流地方發解毋庸遞回原籍從之定致死在配發遣為奴人犯例凡强盜案内免死減等發遣為奴之犯如果在配安分斂跡或伊主圖佔其妻女或平人有意欺凌將本犯致斃者將伊主及平人照例治罪如該犯怙惡不悛或不服伊主管束或無故欺凌平人經伊主及平人毆打斃命將伊主免其治罪平人照本罪減一等定擬互見刑制門申定逃犯不准停遣例定例凡脱逃被獲人犯雖遇隆冬不准停遣至是議准盛暑亦照例不准停遣定夥盜自首分别僉遣例凡夥盜除行刼一二次於事未發之前將行刼次數盡行首出仍照例免罪外其行刼三次以上雖係自首仍僉妻發邊衛充軍聞拏投首者僉妻發黒龍江等處給披甲人為奴詳見刑制門定私鑄鉛錢不及十千者為首及匠人俱照情有可原例於疏内聲明請㫖發遣為從及知情行使者依次遞減互見刑制門嚴流犯脱逃之例凡流犯脱逃分别原犯流罪及免死減等為流者按逃犯次數遞加治罪原犯流罪者初次脱逃照例枷號兩月責五十板加徒役三年二次枷號三月責五十板加徒役四年三次發邊衛充軍若係免死減等流犯初次脱逃枷號兩月責四十板加徒役四年二次發邊衛充軍三次照軍犯三次脱逃例擬絞監候互見刑制門十年申定犯屬情願隨往者毋庸押送刑部議奏嗣後除緣坐應流犯屬及强竊盜案内免死減等軍流人犯妻室仍照舊押解外凡係情願隨往之人自無脱逃之虞不必僉差押送以滋擾累從之定内徙土司身故酌量家口回籍之例定例各省土司獲罪減等遷徙内地者本人身故之後准其家口回籍上以此等土司桀驁性成本身雖故其家口習染舊俗恐回籍之後故態復出再罹法􅃠諭嗣後内徙土司身故之後家口應否回籍著原籍督撫酌量夷情奏聞請㫖定奪永著為例申嚴流犯分派輪養之禁定例流犯年逾六十及未六十而已成篤疾者准撥養濟院其少壯貧窮兼無手藝者計口官給口糧一年又各州縣需用夫役令其一體充當給以應得工食其挾有㣲貲習於手藝者聴其自行謀生例禁地方輪養至是御史薛澄以地方官恐罹脱逃處分或至分派里民輪養致滋擾累奏請申禁從之定官員犯徒者照流寓人犯例刑部議奏例載各省流寓犯徒在所犯地方充徒至文武員弁亦照此例行者原以該省官民皆知某人係某官為某事充徒俾同官共知警戒也但各省官員有回籍發配者有照流寓充徒者辦理殊未畫一嗣後文武官弁至犯徒五等及雜犯准徒者俱在犯事地方定驛發配充徒限滿釋放回籍從之定軍犯酌量派發之例刑部議准嗣後發陜省軍犯俱照軍衛道里表内開載應發之府分將犯徑解知府衙門查收酌量派發不必指定發何衛所州縣庶兇匪不致聚集一處貽害地方各直省順天府一例通行十一年定帮同發掘尊長骸骨照服制毁棄律為從杖流詳見刑制門十三年定僧尼毆弟子及毆受業師分别流徒之例凡僧尼但經毆傷弟子至折傷以上減凡人三等至死者杖一百流三千里其毆傷受業師除篤疾擬絞外傷者杖八十徒二年折傷以上加凡鬭傷一等定擬互見刑制門十四年定私鑄私銷案内情輕罪犯分别發遣流徒之例凡私鑄為從及知情買使者俱發遣為奴如受些㣲僱值挑水打炭及貪其價賤偶為買使以及房主鄰佑總甲十家長知而不拏獲舉首者照為從遣罪例減一等杖一百徒三年凡私銷除首從及知情受賄代為隠匿者分别斬絞立决外但知情不首並未分贓者杖一百流三千里互見刑制門定誣告擬流不准留養之例凡因誣告擬流加徒之犯除被誣罪名應准留養者仍照定例遵行外如誣告人謀殺故殺及為强盜等罪以致被誣良人久淹獄底身家受累審明反坐者依律問發不准留養定積匪猾賊改發雲貴兩廣極邊烟瘴充軍遇赦不准援減例定强姦十二嵗以下幼女未成審有確據者發遣黒龍江互見刑制門十五年定限滿未完代賠帑項分别杖徒之例凡知府通同徇隠州縣侵欺倉糧照例奏定著落代賠之項如三限已滿未完之數至六分者杖六十徒一年十分無完者杖一百徒三年詳見刑制門至二十九年定修理城工應追核減銀兩無完者亦照此例辦理十八年定逃犯發遣者分别已改未改之例大學士㑹同八旗都統議奏嗣後旗人逃走發遣黒龍江者年終令該將軍彚奏能改悔者在彼處當差行走如仍不悛改即發往廣東廣西雲南貴州極邊烟瘴地方聴其自行生理從之定聖駕巡幸地方民人具呈妄控者杖一百發邊衛充軍例互見刑制門十九年停止軍流罪犯編發直𨽻府州之例先是十六年刑部議准奉天地方不便安挿軍流罪犯嗣後各省軍流均按照軍衛道里表及三流道里表分别等次改發别省至是并除編發直𨽻府州地方充軍之例定旗人犯命案應軍流者不准概折鞭枷之例時刑部審擬旗人七克登布以酒醉細故毆服孫致死照例以枷責完結得㫖旗人犯杖流應枷責發落在公罪及過誤自可照例完結至闗人命即當核其輕重七克登布著發往拉林阿爾楚喀嗣後似此案件該部酌量情罪請㫖定奪互見刑制門二十年定私盜墳塋木石者杖枷充發例詳見刑制門二十一年定旗下家奴告主徒滿官賣之例先是二十年奉㫖告主旗下家奴應得徒罪著予實徒不准鞭枷完結至是大學士等議奏向例旗下家奴徒滿之後仍給還原主管理但奴僕告主嫌釁既開恐伊主挾嫌凌虐或該奴積怨愈深轉致釀成事端若使徒滿回旗竟與開户為民者無别則伊等轉得閑放亦非懲責之道請徒滿之日交於各該旗照例官賣仍令為奴價給原主從之互見刑制門二十三年定私鑄案内情輕緩决之犯照强盜免死減等發遣例改發巴里坤種地詳見刑制門定搶竊案内秋審三次緩决絞犯照强盜免死減等發遣例改發雲貴兩廣極邊烟瘴充軍詳見刑制門定嘓匪搶奪案内有犯止徒罪以上者俱改發巴里坤等處種地詳見刑制門二十四年分别詐假官假與人官輕重罪例凡詐假官假與人官除正犯擬斬監候外其知情説合者杖一百流三千里無官而稱有官并冐稱現任官員姓名止圖騙一人行一事犯該徒罪以下者發邊衛充軍犯該軍流罪者擬絞監候如假冐頂帶自稱職官無所求為者杖六十徒一年詳見刑制門定偷盜牲畜九匹以下分别發遣例䝉古人等偷盜四項牲畜六匹至九匹者發雲貴兩廣烟瘴地方三匹至五匹者發湖廣福建江西浙江江南等處一二匹者發山東河南等處俱交驛地當苦差民人在蒙古地方偷竊九匹以下者亦照此例分别充軍為從人犯照定例行如遇行圍巡幸地方不分䝉古民人有偷竊馬匹三四匹者發雲貴兩廣烟瘴充軍一二匹者發湖廣福建浙江江西江南等處充軍俱交驛地當苦差為從及知情故買者係民人減本犯一等係蒙古照䝉古辦理詳見刑制門二十五年定隣佑毆斃賊人照事主毆打至死減鬭殺罪二等例杖一百徒三年詳見刑制門定受人些㣲僱值代雕假印而非同謀分贓者照私雕為從例杖一百流三千里詳見刑制門定房主隣佑十家長徇隠私鑄至十千以上者杖八十徒二年詳見刑制門定拏獲脱逃軍犯毋庸遞回原配審斷例凡軍犯脱逃即令拏獲之州縣一面收禁一面闗查配所原案究明逃後有無行兇為匪及脱逃次數按例定擬將應行改調之處申詳督撫咨部核擬完結毋庸遞回原配審斷其尚未到配中途脱逃以及流犯三次脱逃例應改調者亦如之申定窩頓土娼及僧道犯姦分别杖徒例凡生監兵役人等偶然窩頓土娼為日無幾者枷號三月杖一百窩頓經久者杖一百徒三年再犯流三千里至僧道女尼和姦者照軍民相姦枷號一月杖一百於本寺觀庵院門首再枷號一月其姦有夫婦女及刁姦者照律加二等分别杖徒仍照例枷號兩月詳見刑制門二十六年定改發巴里坤罪犯例先是二十三年御史劉宗魏奏請將軍流遣犯改發巴里坤等處種地經軍機大臣㑹同刑部酌議免死減等情罪較重各犯奏准改發嗣因甘省軍務未竣嵗事歉收改發新例暫行停止至是上以大功久經告成新疆嵗收充裕自應仍照前例改發復命軍機大臣㑹同刑部將從前條例再行詳酌著為定例尋議一强盜窩主造意不行又不分贓者一竊盜臨時拒捕傷非金刃傷輕平復者一搶奪傷人為從者一發掘他人墳塜見棺槨為首及開棺見屍為從者一竊贓數多罪應滿流者一兇徒因事忿爭執持軍器毆人致篤疾者一三次犯竊罪應充軍者一已經到配軍流遣犯在配為匪脱逃者並發巴里坤給與種地綠旗兵丁為奴得㫖允行申嚴拏獲發遣巴里坤逃犯之令奉諭凡有發遣巴里坤等處逃犯經原籍及路過省分盤獲一經移訊明確即由各省督撫自行奏聞於拏獲處所正法示衆互見刑制門増定軍流罪犯追埋塟銀兩例凡兩家各斃一命減軍之犯其與被殺之人有不同居共財者即各於犯人名下追埋塟銀兩給付死者家屬定粤東軍流遣犯改照粤西寒暑停遣例先是二十三年定粤西軍流遣犯毎遇六七兩月俱行停遣俟八月初一日轉遞遇初冬十月一概起解至十一月再行停遣如有抵配不逺本犯情願前進者仍照例起解至是定粤東亦照此例行定搶奪江洋失風商船但經得財而未傷人者分别首從流徒例詳見刑制門定兩家互毆致死擬抵正兇者分别流徒例詳見刑制門定子孫將祖父母父母屍誤執傷痕告他人謀害致屍遭蒸檢者杖一百流三千里加徒役三年詳見刑制門定發遣巴里坤人犯分别種地當差為奴之例刑部奏准發往巴里坤人犯照旗人有犯發遣之例將旗人内之曽任職官及另户正身並民人内之舉監生員以上及職官子弟俱發往種地當差其餘人犯俱給與種地綠旗兵丁為奴二十七年改定刨參案内發遣雲貴兩廣極邊烟瘴人犯脱逃被獲例應發黒龍江等處為奴者均發闢展烏嚕木齊等處給與種地兵丁為奴定旗人造賣賭具為首三犯者即予實遣不准折枷例詳見刑制門定發巴里坤人犯改發伊犁烏嚕木齊等處例從陜甘總督楊應琚請也定誘拐案内婦人為首者所犯軍流等罪一概的决不准收贖例詳見刑制門定奉天等處盜馬各犯分别徒流例奉天吉林黒龍江等處凡民人盜馬一匹枷號一月杖八十二匹枷號三十五日杖九十三匹枷號四十日杖一百四匹枷號四十日杖六十徒一年五匹枷號四十日杖八十徒二年五匹以上者枷號四十日杖一百徒三年十匹以上杖一百流三千里盜殺者枷號一月發附近充軍俱刺字若旗人盜竊不及十匹者仍照例枷責完結十匹以上及盜殺者照例枷號應得軍流予以實遣咨送兵部酌發駐防各城分發當差為奴詳見刑制門定受賄頂兇致脱本犯軍流罪名例凡得受賄賂頂認正兇致脱本犯軍流等罪者即照軍流等罪科斷知情説合過錢之犯各減正犯一等其原犯軍流等罪買人頂認者照軍流加徒調遣例從重治罪杖徒以下按律各加一等并説合過錢之犯各減正犯一等科罪詳見刑制門定滿洲漢軍人犯軍流遣罪之例奉諭嗣後凡滿洲人犯軍流遣罪如尋常事故仍照舊枷責完結倘有寡廉鮮恥之徒甘為敗類自應削去户籍依律發遣其如何完結之處該部逐案聲明請㫖其漢軍人犯無論軍流徒罪均即斥令為民照所犯定擬發遣不必准折枷責著為例詳見刑制門又増定發墳盜殯案内軍流以下刺字各例詳見刑制門定黔省杖徒各犯遞回原籍復逃入黔例貴州巡撫喬光烈奏黔省苗疆重地每有外來匪徒流入苗寨設法哄誘為害多端請嗣後查拏游匪除斬絞軍流照例辦理外其杖徒各犯遞回原籍充徒復入黔境者訊無為匪照逃人例杖一百遞回原籍如有為匪犯在杖一百以下者并杖六十徒一年犯在徒一年以上者各照所犯之罪加一等其窩留之人請照知人犯罪藏匿律減罪人一等問擬其失察之原籍及黔省地保人等分别知情受賄治罪部議應如所請從之互見刑制門定黔省改苗為民罪犯照民人科斷例黔省苗人犯軍流徒遣照定例折枷完結其情罪較重或再犯不悛將本犯折枷仍將家口就土流所轄一并遷徙安挿至苗人薙髮衣冠與民人無别者犯罪到官悉照民人例一體科㫁互見刑制門更定流犯脱逃例湖北按察使髙誠奏嗣後流犯越獄脱逃應按律加二等三流以次遞加其滿流人犯改發邊衛充軍原犯充軍者照在配脱逃加等調發其原犯極邊烟瘴充軍者改發黒龍江等處與披甲人為奴部議應如所請從之互見刑制門定遣發回城罪犯脱逃及解送疎縱例時旗人六十七賣身為奴盜取什物審擬發遣回城中途脱逃奉諭六十七著即行正法嗣後此等罪犯脱逃一經拏獲即行奏明正法無庸候㫖并諭凡解送發往各回城罪犯等如有中途脱逃除將逃犯嚴拏解送官兵人役問擬死罪監候俟逃犯拏獲再治伊應得之罪若經年不獲將正法之處奏聞請㫖著為例詳見刑制門定解審軍流等犯不及収監例刑部議准雲南按察使張逢堯條奏審解軍流以上人犯令各州縣酌量地方情形如相距五十里以外不及收監者先期撥役於寄宿處所𫝊集地保知㑹汛兵支更巡邏往回一體辦理倘有疎縱地保營汛照原解兵役治罪地方官從重議處定圍場内盜砍木植偷打牲畜分别𤼵遣例初犯再犯𤼵烏嚕木齊等處種地犯至三次者𤼵烏嚕木齊等處給與種地兵丁為奴至二十八年又定私入為場未得畜木者杖一百徒三年再犯不論已未得均外遣詳見刑制門定逃人妄扳及旗下家奴畏罪潛逃分别發遣例盛京將軍社圖肻奏請嗣後拏獲逃人將本犯逃出日期及何處存留居住窩家鄰佑人等一併從重治罪上以隠匿逃人雖應嚴行治罪但逃犯不將實在隠匿之人供出將與伊不合之人混行指扳反致無辜連累因諭社圖肻㑹同盛京刑部詳議具奏尋議凡拏獲逃人初供若不指出實在窩留之人混行妄扳者將逃人加等治罪之處改為發遣以後再有妄扳即發巴里坤等處種地兵丁為奴窩家鄰佑人等照例分别於應得罪上各加一等治罪經軍機大臣議准并奏請將旗僕畏罪潛逃者定初次枷號兩月二次發烏嚕木齊等處給綠旗官兵為奴從之互見刑制門定回民行竊但經結夥三人以上及携帶繩鞭腰刀等械者不分首從不計贓數悉照積匪猾賊例發雲貴兩廣極邊烟瘴充軍其有窩藏回民竊匪者照減本犯一等例分别治罪詳見刑制門二十八年定各城駐劄官兵跟役滋事酗酒例凡各城駐劄官員兵丁跟役人内如有酗酒滋事者即由犯事處所發往伊犁等處給兵丁厄魯特等為奴如在回子各城即彼此易地調發與回子為奴仍不悛改即行正法詳見刑制門定勒追發遣人犯埋塟銀兩無完例勒限三月照數追完如係十分貧難量追一半本犯倘有物産可抵即令變交毋許藉端逗遛如限滿勘實無完者即將該犯發配取具地隣親族甘結地方官加結詳請督撫咨部豁免詳見刑制門定雲貴兩廣充發人犯開明該犯籍貫距省里數於隔逺烟瘴省分解赴該督撫衙門酌量地方分撥安置定軍流逃犯之親屬房主保人科罪例逃回原籍之軍流人犯其親屬保隣人等不行舉首者杖一百徒三年雖不容留而知而不首者杖一百親屬杖八十逃往别處知情容留及知而不首者罪亦如之定竊盜倉庫錢糧未經得財者首犯杖一百徒三年為從減一等杖九十徒二年半詳見刑制門定旗人窩留逃人及漢軍家奴問徒之例刑部奏請嗣後旗人窩留逃人除不知情者於本罪加等問徒外其知情容留之犯即於鞭一百本罪上加一等杖六十徒一年仍照例先枷號一月至漢軍旗下正身犯徒流罪者業已更定不准折枷而家奴犯徒折枷之例未經更定請嗣後漢軍家奴犯徒均不准折枷即問擬實徒徒滿之後仍押解回旗交伊主服役管束從之互見刑制門定和姦致姦婦自盡者姦夫問擬杖徒例凡和姦之姦婦因情事敗露羞媿自盡者姦夫杖一百徒三年至二十九年又定姦夫姦婦相約同死姦婦逼令姦夫致死已命姦夫隨後自盡經救不死者姦夫杖一百流三千里互見刑制門定採參工人竊參者杖流刺字例詳見刑制門改定另户滿洲䝉古逃走之例乾隆十八年定例另户滿洲䝉古逃走於一月内自行投回者交旗管束拏獲者分别初次二次鞭責枷號仍交旗管束至是上諭此等滿洲䝉古世僕現在充伍尚至潛逃若革去錢糧豈能安分靜守將乾隆十八年定例以後另户滿洲蒙古在一月以内自行投回及拏獲者俱行查明連家屬派往伊犁賞給步甲錢糧當差行走如仍不悛改復致逃走著於滿洲䝉古檔冊即將伊等名籍削除任其所之無庸辦理著為令酌通遞犯停遣之例先是刑部議准江西按察使翁藻條奏嗣後在外省犯罪應徒者除抵籍不逺即遇隆冬盛暑仍行遞解外其離原籍一千里以上者亦照軍流之例未經起解者遇冬月概行停遣若已在中途初冬十月仍照常接遞至十一月初一日一體停解俟明年春融再遞如已將抵籍本犯情願前進者照常接遞六月盛暑之時亦准停遣又雲南按察使張逢堯奏准滇省四時皆春並無盛暑嚴寒不必停遣他省如有似此寒暑適中者亦令畫一查辦至是刑部又議覆侍郎兼管府尹事錢汝誠等奏請嗣後軍流遣犯如遇隆冬停遣之期除發往西北嚴寒地方勢難起解者仍照例停遣外其有發往東南和暖之處本犯情願赴配者准其起解不願者聴應如所請從之定各省解甘發遣人犯先刺外遣字様之例先是二十四年定例改發巴里坤人犯按原犯本罪應刺事由者即刺事由其例不刺事由者止令起解省分於右面刺清漢地名解甘發遣嗣甘肅巡撫以此項人犯應遵諭先賞安西營兵再賞哈宻綠營兵以次及巴里坤烏嚕木齊等處若各省先定地名刺字到甘碍難分撥咨請部示部議行令各省改遣人犯有事由可刺者俱各就犯罪省分先刺事由遞甘聴發補刺地名至是又議覆江蘇按察使錢琦奏請各項罪犯有可刺事由者毋庸更定外如例不刺字人犯於本省起解時先於右面刺外遣二字解甘分發補刺地名俾中途兵役知為外遣重犯加意防維即有疎虞亦易偵緝應如所請從之二十九年定殺一家非死罪三人者之妻子發伊犁與駐防索倫兵丁為奴例詳見刑制門定期親尊長故殘卑幼至篤疾者杖徒例詳見刑制門増定禁卒鬆解獄具致囚脱逃罪例除賄縱獄囚依律全科及依法看守偶至疎脱仍依律減囚罪二等治罪外如係徇情鬆獄具或託故擅離或倩人代守防範疎懈乘間潛逃者亦照故縱例治罪不准照舊例減囚罪二等問擬定蒙古遣犯脱逃改調及僉發妻子之例刑部奏定䝉古在配脱逃例無明文嗣後此項逃犯均照民犯加調例辦理如原發山東河南者初次脱逃枷號一月調發福建湖廣等省二次脱逃枷號兩月調發雲南兩廣極邊烟瘴犯至三次枷號三月仍發回原調處其原調福建湖廣等省者以次調極邊烟瘴而止䝉古免死在配脱逃者亦照此例加調仍分别次數枷責刺字並令拏獲之州縣究明逃後有無行兇為匪分别照例定擬再查蒙古搶刦各案内有罪應抄沒家産連妻子一體為奴改發南省驛地當差之犯與尋常遣犯擕帶妻室聴其自便者不同嗣後䝉古例應僉遣人犯其隨從本夫者照軍機大臣原奏交與河南山東驛地當差若本犯已經正法妻子單行發遣者酌發南省駐防兵丁為奴定廣西安挿遣犯例定例廣西泗城鎮安寧明東蘭等處以烟瘴極重各省遣犯停其分撥至是刑部議准按察使袁守侗奏該省每年解到軍遣每府多至二三百名聚匪日多易致生事查泗城鎮安寧明東蘭等處見在烟瘴輕減請嗣後解到極邊烟瘴軍犯一體酌發定流犯脱逃及在逃拒捕例詳見刑制門定旗人移住拉林逃走分别治罪例吉林將軍恒魯奏移住拉林閒㪚滿洲内如有越過邊津逃回京城者拏獲時遵㫖正法外初次逃走不出該管地方無論不行告假私自走出及自回被獲者俱枷一月鞭一百二次逃走僉妻發伊犁等處折磨當差從之復定積匪猾賊緩决一次者查明年嵗改發新疆例先是刑部以積匪猾賊發往雲貴兩廣者日積日衆宜量為變通請將積匪案犯及搶竊滿貫三犯竊贓數至五十兩擬絞三次緩决以上者俱改發烏嚕木齊伊犁等處給與種地兵丁為奴其年在六十以外及廢疾人犯仍照例發往四省從之至是刑部議准江蘇巡撫明徳奏此等案犯緩决一次者即係將來應發新疆之人與其多禁二年不若乘其年力早發新疆以收屯墾之效請將搶竊滿貫及三犯竊盜贓至五十兩擬絞案犯緩决一次後即查明年在五十以内者即僉妻改發新疆從之定滇省苗人及改苗為民者犯軍流徒罪並照黔省辦理之例詳見刑制門申定解役疎脱軍流徒犯分别治罪例如受賄故縱即以所縱囚罪全科贓多者以枉法從重論若依法管解偶致疎脱並非受賄故縱者給限追捕捕獲後長解減二等問擬短解免罪若限滿無獲審得違例雇替實情即減囚罪一等問擬餘照律減二等治罪定旗人發遣家奴例奉諭旗人發遣家奴如有同妻子一併送部發遣者其妻子一體賞給兵丁為奴三十年改定私鑄不及十千之遣犯發黒龍江等處給披甲人為奴例定例私鑄不及十千者發雲貴兩廣安置至是刑部議奏雲貴等省出産銅鉛此等遣犯不免故智復萌請改發黒龍江從之定偷砍果松例盛京工部侍郎雅徳奏准偷砍果松數止十株者笞五十至百株者杖六十每百株加一等罪止杖一百徒三年木植概令入官互見刑制門定旗人發遣三年悔過准挑選兵丁例定家奴盜賣田産至五十畝者照子孫盜賣祖遺祀産發邊逺充軍例詳見刑制門皇朝文獻通考卷二百四
