body:
  text: 選舉考十五考課乾隆元年奉諭㫖翰林以讀書為職業然讀書將以致用非徒誦習其文辭也古來制誥多出詞臣之手必學問淹雅識見明通始稱華國之選今翰詹官員甚多於詩賦外亦當留心詔勅掌院學士以下編檢以上可各以己意擬寫上諭一道陸續封呈朕覽即可以覘其文藝之淺深並可以觀其胸中之藴蓄倘有切於吏治民生者朕亦即頒發見諸施行則詞曹非徒章句之虚文而國家亦收文章之實用矣嗣後庶吉士散館後即照此例行奉諭㫖外省知縣由正途出身任内無㕘罰者按其資俸行取來京以主事補用其有㢘明公正之員或因公罣誤與例不符者亦准督撫保題此古三載考績之意所以簡賢能録功最也但各部主事設有定額一年之中出缺無幾又有應補之人則行取來京之員挨班選授三年内必不能用完而下次行取之期又至日積月多勢將有遲至四五年不能得缺者朕思此等人員服官供職著有成效故特予行取以優待之今令其遽離原任需次選曹在彼既不免守候之苦而外任轉少一諳練之縣令殊為可惜所當酌量變通者嗣後行取屆期該部將合例之人具題後知㑹督撫照武官保舉註冊之例仍留本任俟單月缺出按俸銓補得缺之後給咨引見再赴新任二年吏部奏凡親老改補近地人員到任後停其陞轉保題俟伊丁憂服闋後坐補原缺再行論俸陞轉以杜借端規避奉諭㫖親老改近人員將來坐補原缺後若在任三年無過准其通算前俸陞轉奉諭㫖翰林乃文學侍從之臣所以備制誥文章之選朕看近日翰詹等官其中詞采可觀者固不乏人而淺陋荒踈者恐亦不少非朕親加考試無以鼓勵其讀書向學之心自少詹講讀學士以下編修檢討以上著於本月初七日齊赴乾清宫候朕出題親試倘有稱病託詞者具奏以聞試畢尋進呈各卷上親加詳閲按其優劣分為四等分别陞降改補部屬知縣及原品休致有差嗣於八年十三年十七年二十三年二十八年如例考試分别黜陟兵部遵㫖議覆緑旗軍政年老官員内如從前曾經出兵効力今係年老衰憊實難勝任者准其原品休致仍令其子弟一人入伍食糧如無子弟給與守糧一分以終贍養其年齒雖老而精力未衰尚可辦事者令該督撫提鎮悉心酌量或仍留原任或調補簡缺俾効力之員得以保全末路從之奉諭㫖三載考績大典攸闗在外則為大計在内則為京察所以昭黜陟而示勸懲也但向來直省大計經督撫薦舉卓異之員俱送部引見准其註冊者例得陞用其有干八法等官分别議處至於京察各官才守兼優者列為一等祗與二等三等人員均以應留註冊而無優叙之例惟列在四等者照八法例處分未免有懲無勸不足以示鼓勵朕意京察列在一等者亦應酌量加恩但京官與外省職任不同其應如何分别定議之處著九卿詳悉定議尋議嗣後京察之年除三品以上自陳官員仍應照例舉行其各衙門四品五品京堂并内閣侍讀學士及開坊翰詹官員以上俱係䝉恩特用之員官階體制與外省藩臬無異雖經列為一等無庸復行優叙加級又順天府奉天府所屬城内應入京察各官向例大計之年仍准保薦卓異亦無庸另議外其餘應行考察官員奏准引見列為一等者准其加一級註冊以示鼓勵至盛京五部等衙門三年期滿調回之時帶領引見准列一等並加一級以上人員遇有保舉之時該堂官即於此項人員内揀選薦舉二等三等人員仍照舊例註冊具題存案列在四等者分别議處如例從之三年奉諭㫖我朝國書義藴精微向來工於繙譯者能得其神理於漢文大有裨益昔聖祖仁皇帝時常將滿洲官員考試分别優劣以示鼓舞皇考世宗憲皇帝特開繙譯之科俾人人奮勉嚮學以圖進取誠為盛典朕思現任官員不在鄉㑹試之列者若不特加考試則優者無以表見或至怠惰日漸荒踈著禮部通行𫝊諭除三品大臣外現任職官等有通曉繙譯者在部報名該部奏聞候㫖考試奉諭㫖為政之道安民必先察吏則自蒞任之始便當細察廣詢詳加甄别王謩署事東粤已及一載而猶以屬員賢否未能深知為言則其不留心於察吏可知朕御極之初曾有㫖著各省督撫將屬員賢否具摺奏聞彼時各省督撫皆陳奏一切乃今並無一人陳奏者豈必待朕諭㫖屢頒而始為遵㫖敷陳了事耶即督撫之身不必更換他省仍居原任而前後數年之間屬員之新舊不一即就屬員而論彼一人之身亦豈無改行易轍者似此均當隨時奏聞惟以秉公據實為主不可存茍且塞責之念尤不可有瞻狥回䕶之私如此則激濁揚清不致差忒而於察吏安民之道庶有裨補四年奉諭㫖各省藩臬兩司朕已令其陸續來京引見至道府人員亦係地方𦂳要職任非朕親見無以知其優劣著各省督撫查明除已經引見之道府無庸再行送部外將未曾引見者酌量本地情形何時可以來京給文送部引見吏部議覆鴻臚寺少卿查斯海奏外省官員有干六法者例得送部引見惟京察被劾向無引見之例内外似未畫一或以姿本英露而堂官性多沉抑即目之為浮躁或以質稍遲鈍而堂官識多明敏即棄之為不及且更有賦性戅直舉止率畧不善應酬遂以嫌隙而加之吏議則廢置之中安知無片善寸長可以自効嗣後京察六法官員請照外省大計例令各該衙門咨送吏部引見恭候聖裁應如所請行之五年奉諭㫖朕恭閲皇祖聖訓内載諭九卿之㫖曰爾等俱為大臣天下督撫之賢否應於平時留心細訪以備顧問誰貪誰㢘即行公舉雖門生故舊不為狥庇庶人皆知畏懼而勉勵矣乃者朕問時或謂未經同衙門辦事或自謂平時不接見人知之不真以此推辭非理也聖諭煌煌切中情事近日在廷諸大臣之習亦甚類此即如郝玉麟鄂彌達從前議處之案皆從外省發覺廷臣並未有㕘奏之者又如王士任之劣蹟徳沛㕘劾之岳濬之劣蹟楊超曾㕘劾之豈伊等未經敗露之前在廷大臣等竟一無聞見而必待督臣之舉發耶朕統御寰區一人耳目豈能周知中外臣工之臧否惟大學士九卿等留心訪察有聞即奏庶人人知所儆戒共凛官箴朕可以收明目達聰之益且如王士任等以督撫而不能自保一身之操守皇考時並未有此也朕用是愈滋愧懼焉嗣後各矢丹誠無稍瞻顧則於朝廷進賢退不肖之道大有裨益六年奉諭㫖八旗記名人員内不無人材可用者著大學士等𫝊齊考試或能詩文或能繙譯各就所長不拘一格考試後分别等次進呈奉諭㫖知府一官承上接下為州縣之表率誠親民最要之職也葢小民之休戚惟州縣知之最周而州縣之賢否亦惟知府知之最悉是以雍正六年皇考特頒諭㫖令各省督撫甄别所屬知府以昭懲勸今各省郡守未必無庸碌衰邁之員著該督撫秉公甄别如有年老龍鍾者即勒令休致或才具不勝知府方面之任尚可内用部屬外用同知通判等官者亦分别具奏與年老之員一同送部引見請㫖庶守令相因整理而於吏治民生大有裨益奉諭㫖軍營辦事人員從前用兵之際期滿更替議以應陞即用者所以重軍務示鼓勵也今既已罷兵酌留駐防原與尋常差遣無異若仍照舊例議叙則無事之時與有事毫無輕重將來萬一有事又何以示鼓勵是不獨額外筆帖式即凡見任之員所有議叙條例較從前亦應分别著該部詳議尋議嗣後各部院派往軍營辦理糧餉人員三年期滿更換回京令該將軍出具考語保題列為一等之見任司員筆帖式俱准照軍功例加一級隨帶如額外司員筆帖式准其以應得之缺不論雙單月不入班次即行補用二等現任者准紀録二次額外者准以應得之缺入於本班先用三等見任者准紀録一次額外者准以本班應得之缺選用二缺之後補用至額外人員應選應補班次在先者仍照例准其銓補陞用俟年滿後按該將軍分别等第照見任司員之例准其加級紀録帶於新任至派往坐臺官員並照此例庶勞逸勤惰均有分别而議叙亦得畫一矣從之奉諭㫖各省副將㕘將從前曾降諭㫖令督撫提鎮㑹同分别等第五年舉行一次見在陸續咨部將所保一等之副將㕘將俱送部引見永著為例奉諭㫖今年更換各省學政凡應開列出差人員著該部𫝊齊擇日於保和殿考試其不願與試者聴七年奉諭㫖國家舉行大計乃三載考績黜陟幽明之要典督撫大臣職司其業必當秉公去私杜絶請託精明鑑别無黨無偏舉一人而衆皆知勸劾一人而衆皆知儆則官方以肅吏治以清百職修舉而民生共受其福矣昔我皇祖皇考嚴降諭㫖訓飭再三乃朕見近來各省計典頗有視為具文茍且塞責者或賢員不薦或劣員不糾或就目前之一端而不察居官之素或狥一己之愛憎而不㕘輿論之同又或庇䕶私人瞻狥情面而使貪墨不職之人姑容在位祗將教職及佐雜微員草草填註以充其數所謂旌别淑慝者安在乎督撫受朕股肱心膂之寄於此等切要政務等諸泛常朕將何所倚頼今年乃大計之期用是特頒諭㫖各督撫等務精白乃心矢公矢慎以肅鉅典倘有仍蹈前轍者經朕訪聞必當加以嚴譴旋以五年一舉軍政諭各省督撫提鎮亦如之八年再試名列下等已予休致之翰詹官員先是乾隆二年御試翰詹諸臣列為四等至是試於正大光明殿一等者仍列三員其餘遷擢降改及罰俸休致俱仍向例旋以休致之十九人命題再試仍留原任者六人嗣於二十八年御試休致者十一人允掌院學士奏以久在書局現有承纂未竣之書暫令留任者一人令翰詹官員中由部屬等官遷轉者一體考試翰林侍讀侍講以上詹事府中允贊善以上滿洲䝉古班有由别衙門科目人員遷轉者前屆御試之期未經與試至是奉諭㫖該員等已陞用翰詹讀書作文乃其職業既不似侍衛之足供差遣又不似部屬之日辦簿書若徒虚縻廪禄豈不貽誚素餐且伊等雖不由庶吉士陞轉實由科甲出身縱使不能詩賦如作論繙譯豈得謝曰不能著於初七日齊集候考嗣後考試翰林時即將此等人員一併傳齊另題考試永著為例試卷進呈上定列等第分别陞降外用罰俸休致有差後皆如之奉諭㫖朕惟養民之本莫要於務農州縣考成固應用是為殿最而向來功令不專以此課吏者因其迹似迂愚驟難見效又或上官之察勘難周有司之條教易飾不似催科聴斷捕盜等事之顯而有據也督撫察吏每於此等本計視為老生常談漠焉不甚加意以致州縣之吏趨承風㫖専以簿書期㑹為先而農事反居其後職司民牧之謂何不知為政之道本舉而末自隨之如果南畆西疇人無餘力于耜舉趾日無暇時則心志自多醇樸風俗自鮮囂陵人知急公而閭閻無待追呼矣人知畏法而盜賊因以寢息矣本計既端末事亦次第就理如此則州縣之考成似疎而實密即督撫之察核可簡而不煩日計不足月計有餘民生大有裨益即治道亦漸致郅隆各督撫其共勉之臣等謹按虞書三載考績黜陟幽明而考課之制縁以始孟子言入其疆土地闢田野治則有慶周家考課之法畧見於斯唐以四善二十七最課天下吏職其云耕耨以時為屯官之最則特為屯田者言之非以課守令也我朝重農務本以民事為先皇上問俗省方咨詢穡事每因麥秋在野戒扈從騎士毋得踐擾大田麥秀黍華見於賡咏聖心勤懇總以勉吏治而勸農功尚慮直省守令以課耕為文具而專事於期㑹簿書是以特沛徳音下明詔務俾阡陌循行汙萊盡闢青葱在望滿目桑麻戴記月令所云命農勉作毋休於都而減從輕騎不使更增人吏之擾庶幾本務既得家有盖藏則無事催科而徵書易集無煩禁捕而盜賊自弭古帝王所以致治於上理者率由斯道考課之法當以是為要務云奉諭㫖昔蕭何相漢終舉曹參羊祜佐晉亦進杜預薦賢自代青史稱焉是以宋有詔觀察薦忠勇自代之條金有勅宰臣奏賢良自代之諭今三載考績黜陟幽明邦之要典大臣徒遵例自陳乞賜罷斥而不舉賢自代使遂其髙尚職將誰任乎其以明嵗為始凡大臣自陳乞罷斥者令各舉徳行材能堪以自代之人隨疏奏聞若一人兼數職者材恐難全舉二三人或三四人聴食禄及韋帶之士均許但不得舉同列及位在己上者著為令監察御史章佑昌奏三年京察激濁揚清定例部院衙門所屬官員俱由該部堂官填註考語惟是四五品京堂與正卿分屬同官並無統轄往往俱置優等立法似未周詳請嗣後四五品京堂照國子監欽天監之例止令正卿開寫各員事實移送吏部都察院大臣於諸員過堂時秉公填註考語從之奉諭㫖向來在京八旗武職及外省駐防官員并在京文武官員遇有罰俸案件准其將議叙加級改為紀録抵銷惟在外文武不准此例朕思大小臣工雖分職有内外之殊而以功抵過俱屬一體嗣後外省地方文武各員有情願將議叙加級改作紀録抵銷罰俸者著照在京文武官員之例准其抵銷吏部議覆江蘇按察使李學裕奏請令月選州縣官考試律例應毋庸議奉㫖李學裕所奏事屬可行著即於九卿騐看時摘問律例數條令其條對與履厯一并進呈著為例九年奉諭㫖國家承平日久各省營伍日就廢弛現今據奏各處情形大槩甲仗旗幟尚屬鮮明而鳥鎗騎射則皆平常該管大臣平日所司何事而輕視若此乎本應從重議處但人數衆多祗將甚屬廢弛者交部議處為此特降㫖嚴行申飭各宜痛改舊習勤加訓練監察御史彭肇洙奏將各省闗係民生風俗之事雖經題結仍令户部計嵗中某省旱澇豐歉刑部計嵗中某省强盜奸滛鹽梟謀故鬭殺干名犯義案件若干簡切詳明按省分註於封印日彚集進呈此即嵗終課殿最之遺意奉㫖照所請行十年甄别年滿千總選擇年力精壯才技可觀者仍留候補外其弓馬漢仗平常而年力漸衰者俱准以原品休致三年舉行一次所留候補之員於支領千總俸銀外另賞給步糧一分奉諭㫖每科學習清書之庶吉士於散館授職後遂不留心清文以致日久荒棄厯來習氣如此昔我皇考曾經訓飭今當散館之期朕再行申諭所有清書留館各員既用三年之功仍應隨時温習不使遺忘棄置數年之後朕當考試以分勤惰毋謂朕不戒視成也奉諭㫖㑹典開載康熈年間選拔庶常後有選派講讀修撰編檢數員為小教習之例教習漢庶吉士詩文四六今科庶吉士著掌院張廷玉阿克敦教習庶吉士之大臣徳沛汪由敦於現在講讀修撰編檢内選派數員為小教習十一年奉諭㫖三年京察之典激濁揚清所以叙官方而明黜陟自當矢慎矢公甄别允當上次舉行之際恐各部院堂官有瞻狥情面濫列一等者曾降㫖令大學士於騐看過堂時慎重分别有不稱一等者俱行裁去嗣經大學士等分别去留此亦權宜辦理之道究之察核司員惟堂官最為親切要在平日留心體察臨時舉劾公平方為允協如上次定以一等者三年中行走平常即當改為二三等不得稍存姑息之心上次原列二三等者三年以來知所奮勉即當列為一等亦不得仍拘已成之見惟一秉至公分别等第庶察典肅而人人知所勸懲明嵗又屆京察之期特先行傳諭各部院堂官知之十二年奉諭㫖為國求才者若渴之心以人事君者忘私之義朕於京察之年令自陳大臣各舉賢自代乃夷考其中瞻顧黨同皆有所不免是不可以不諭如禮部侍郎楊嗣璟以廣西人而舉本省之學政官獻瑶不以官階越次為嫌内閣學士朱定元舉雲南知府徐鐸是皆藉口朕有韋帶之士亦許薦舉之㫖不知朕之此㫖原以待出衆之材必猷為特達者而後稱豈官獻瑶徐鐸輩即可舉以應明詔耶此等處若謂無私誰其信之又如盛京侍郎四人同在一城而所舉彼此相同顯係邪許㑹合並不出於誠也又如户部侍郎李元亮甫薦湖北臬司徐琳而徐琳即被總督塞楞額㕘奏以為辦事乖張居心詐偽李元亮之特保何所取耶又如廣西巡撫鄂昌薦布政使李錫秦上年託庸革職因粤撫一時不得其人即用鄂昌署理而用李錫秦為布政使適李錫秦在京朕召見時伊痛貶託庸之劣而極稱鄂昌居官之優今鄂昌即舉李錫秦以自代其何能免黨同朋比之嫌乎書曰舉能其官惟爾之能稱匪其人惟爾不任諸臣獨不聞之乎嗣自今諸臣其克勉進賢之誼勿茍且以塞責勿假公以濟私勿藏拙以廢公勿勉强以從事本省督撫不得舉本省藩臬本省搢紳亦不許舉本省官員著為例十三年河南巡撫碩色奏稱懐慶府知府郭咸寧由部郎補授難勝郡守之任請將該員送部引見降補奉諭㫖此等人員與其改補於事後不如斟酌於事前嗣後有似此俸滿應陞者掣補之時該堂官公同酌量或能勝繁劇之任或才具雖不甚優尚可以簡缺用者即咨明吏部准其前赴新任倘人雖老實而才具中平在内猶可黽勉供職而於外任不甚相宜者其應陞之處改為加級亦可酬勞所遺道府員缺照例另選下大學士九卿議行奉勅諭翰林考試不得稱病規避時翰林院奏侍讀學士世臣等病痊請行補考其病尚未痊不能補考者應請休致上免其考試分别處分並飭下次考試翰林有稱病規避者劾之奉諭㫖朕令大臣自陳者舉可以自代之人凡以拔茅茹籲俊乂之意也今吳同仁之囑周學健乃以許兩干之數朕不解焉問之錢陳羣始知二千之賕夫考績黜陟豈可為苞苴之門豈朕若渴之誠尚未喻於二三大臣耶朕甚恧焉其罷之十四年奉諭㫖各省督撫於所屬道府内有不能勝任者或奏請調簡或勒令休致不得仍請以部曹改用此定例也朕思此等人員既以不能勝任奏請改補執例詰駮往返遷延該員明知不能久留未免志氣隳頽視同𫝊舎甚至縈情囊槖簠簋不飭於地方殊屬無益嗣後各省督撫題奏改補人員於本摺内分晰聲明或宜調簡或勒令休致其才具平常而年未衰老者或以同知降補俱著送部引見有違例仍請改用部曹者吏部將該督撫議處一面行令離任毋致貽悞地方十五年奉諭㫖大計軍政固三載考績之義以示激揚但文武大臣具疏自陳雖屬遵循成例而於實政未覺甚有裨益蓋中外大臣皆朕所簡用既經委任其居心之誠否才具之短長舉在洞鑒之内如不能稱職早已隨時甄别其待至三年而計去者實缺非要任而人無大過介在可否之間者至於大臣恪供職守正宜久任以收實效而屆期輒求斥革復降㫖令照舊供職拘成例而事繁文非崇實務夲之道也至御前大臣領侍衛内大臣等或簡自勲戚或拔從宿衛其辦理閣部卿長以及八旗職任俱量才器使非循資録用者比且伊等多世沐國恩趨承左右論其情理亦不當引退就閒甘心暇逸而每至三年亦循例求罷是轉以疎逺自居如君臣一體之義何即如來保自皇祖時即已侍直内廷迄今五十餘載雖年登七袠而受恩如此其深且久則自陳請解退職任者義當然乎抑明知其於理有未安乎又何事此虚文為也前因宗室王公兼辦閣部等職者俱係宗潢近派特㫖令不必自陳嗣後御前大臣領侍衛内大臣御前侍衛乾清門侍衛等兼理閣部及八旗事務者遇大計軍政俱著不必自陳餘仍照舊例行奉諭㫖京官察典屆期三品以上堂官尚具本自陳部院司員亦俱令引見而四五品京堂則不在自陳之列考核之後亦不行引見雖有吏部都察院填註考語之例不過按冊過堂虛文應事其中龍鍾庸劣者既得姑容即才具優長精力壯盛堪供驅策者亦無由自見於培養人才澄叙官方之道蓋兩失之嗣後京察年分吏部開列王大臣等職名請㫖特派數人將四五品京堂秉公分别一二三等及應留應去具摺奏聞帶領引見以定黜陟庶優劣分而人知激勸於實政有裨其王大臣等之是否秉公據實亦不能逃朕洞鑒即於本年為始著為令十七年奉諭㫖京察之年部院大臣各省督撫循例自陳求罷候㫖照舊供職此雖三載考績之義但卿貳職贊機務督撫任寄封疆朕量材簡擢日復於懐其有不副委任或克稱簡畀者率已隨時黜陟斷無遥待三年之理凡可俟之京察解退者不過閒曹冷署年力衰昏而又非有大過介於可去可留之間者耳且身列大臣謬以斥罷為辭是相率為偽誠無謂也嗣自今内而部院司員外而道府京察大計之例仍舉行以昭激勸其自陳繁文著停止武職五年軍政視此十八年奉諭㫖前經降㫖部院堂官稱職與否久悉朕懐自可隨時黜陟京察之年停其自陳四五品京堂特派王大臣秉公分别去留奏聞引見至三品京堂則非尚書侍郎比也今既不令自陳轉得以散地容其濫竽可乎其令吏部於京察時將伊等事實另繕清摺候朕親為裁奪奉諭㫖刑部議駮外省題達案件經督撫遵駮改正者司員並邀議叙夫指駮案情必有首先立議之人乃將各員通行議叙其中隨同畫稿並學習額外之員均得濫邀叙録非核實之道且由刑曹陞調别衙門者恃有加級紀録可以抵銷往往不肯認真勉力辦事因思吏部司員向因議處之案較多别部僅將承辦之滿漢司員各一人開送議處此雖非正例然以吏部議罰可以通刑部議叙其於考課之法方為平允嗣後刑部各司遇有因題駮議叙者著照此㫖行奉諭㫖藩臬兩司履任三年屆滿請㫖陛見乃古述職之意朕得隨時察看以備簡用其奏請未經允准次年以後每年俱應復行具奏若又待三年之期是六年矣近來各省藩臬中具奏之例多未畫一該部可通行傳諭嗣後均照此㫖行奉諭㫖向例各省教職六年俸滿該督撫學政公同甄别堪膺薦舉者保題送部引見其年力衰邁者咨部休致但督撫陋習既不肯輕舉又不肯多革是以保題者固屬寥寥而休致者亦不多見惟使龍鍾之輩濫竽戀棧無所區分蓋視教職為無足輕重初不計及為造士之根本也前以選拔貢生為教職之階曾降㫖訓諭各督撫學政令其加意慎重嗣後教諭除有劣蹟者隨時㕘劾外至六年俸滿堪膺民社者保題其年尚强壯精力未衰可以留任者出具考語送部引見若准留任俟六年再滿仍如是甄别如年老人員即著咨部休致有願來京引見者照大計之例該督撫聲明給咨引見至訓𨗳一官例止得陞縣佐該上司尤多忽畧嗣後甄别之例與教諭同著為令嗣於二十六年以逺道孤征寒氊可念舟中傔從不無多費僻在邉省者轉瞬六年尤為僕僕雲貴川廣福建湖南甘肅等省俱改為八年舉行一次其六年保題及餘近省分仍照舊例行十九年奉諭㫖前以知府需人降㫖令各督撫遴選保送并飭部查明厯俸十年以上之府佐州縣均令送部引見蓋恐有用之才或以悃愊無華不事奔競因而見屈長官久覊下吏今各省雖未到齊而就直𨽻各員均經朕親覽即百里之任尚有未可姑容者况求其堪勝知府豈可得乎例之各省已可槩見則知中材藏拙簡任者多而脱頴者早登薦剡各督撫原未致屈抑人材朕用以慰而嘆十年不調者非不自量則旁觀好事者流為之嘖嘖稱屈耳以朕觀之各督撫尚屬包荒而非蔽賢嗣後更宜不時查察屬吏毋事姑息范文正之言甚可味也著再通行𫝊諭知之奉諭㫖湖廣總督開泰奏稱截取舉人李兆龍看其年力不特不堪知縣之任即改補教職并恐難司訓廸已勒令休致咨部等語知縣為舉人應選之缺其中有衰邁濫竽者自應慎重甄别但改補教職已屬降等今開泰於截取之日未試以職即行淘汰雖曰加意甄别然若輩讀書上進即年力才分各有所限而窮年苦志竟不獲一登仕版揆諸情理未免過當此正所謂過猶不及也朕總理庶政務在持平未嘗稍有畸重畸輕之見李兆龍既不勝知縣之任著仍以教職用二十二年奉諭㫖江南淮徐海等屬受水患有年矣朕翠華南涖周覽土風加賑截漕所有積年借欠籽種口糧槩予豁免惟是恩澤所施非得賢守令實力奉行無由下究况在稍歉之區尤資良牧撫循培養庶幾日有起色若仍因循闒冗漠不闗情假手胥吏視為故事即使厚費帑金蒼生何能免溝壑流離之慘是以此方州縣視他處更重該督撫當慎加遴選務得有猷有為悃愊愛民者以膺斯任仍時時留心體察有暇即親行咨詢使窮鄉僻壤民隠畢逹守令賢否自不能掩惟期於地方有益該督撫其善體朕懐毋僅以簿書期㑹為課吏先務也其數府現任守令各官著該督撫各出考語具摺奏聞或有如所諭賢明之吏宜留任者或有不能勝此而可以調他處事簡者其悉心詳酌一二年後朕將親臨考察若仍入其疆而田野不治則非守令之罪將督撫是問矣定甄别年滿千總以六年舉行一次定例各省提督將年滿千總内候補候推人員三年甄别一次並令將實在出衆者准再行保舉引見即用其原應題補而非出色者咨部降為候推候推内有應拔置題補者准一體保送引見其不在保送之例而人材尚可留者仍隨營候推衰老懶惰咨部休致定例綦詳從前因候補候推人員積年壅滯為數甚多是以定期三年舉行一次上以本年甄别之後伊等班次自可逐漸疏通特降諭㫖著嗣後六年甄别一次兩廣總督楊應琚彚奏甄别一摺將每項若干員分款列名開具清單辦理甚屬明晰嗣後各督提於六年甄别後著照此式開單彚總進呈則各督提之辦理得宜與否率可知矣奉諭㫖牧令與民最親其賢否所繫甚重前恐外省督撫各存意見登之薦剡者未必盡出於至公而實在循良之例或致淹滯有十年不調之嘆是以降㫖令將厯俸十年以上者送部引見蓋恐實有才具可觀久屈下僚者冀得簡拔數人以供驅策且示鼓勵乃數年陸續引見各員多屬尋常供職之人求其才猷出色者甚少類皆庸庸者流適膺簡僻小邑得以藏拙故可姑容其至十年之久者幸耳即如今日之廣東江陽縣知縣李青廣西武縁縣嵇坊其人殊無足觀較之督撫題陞薦舉之員相去甚逺可見數年來各督撫於保題陞調尚不敢逞其私意屈抑人才嗣後俸深人員如本人情願引見仍照例送部其有不願者聴不必僕僕道路徒費往返然人才具雖限之於天而志由自立果能實心任事必有實恵及民所當奮勉向上為國家有用之員上司自有聞見若該督撫等曲為隠庇以博寛大之名則大非委任封疆之意矣著將此㫖通行傳諭知之甄别各部屬年齒衰邁司員凡各部院司員除保送記名御史繁簡缺道府直𨽻州知州及厯俸未滿三年者外所有現任之郎中員外主事各官年逾五十五嵗者奉諭㫖著各部堂官詳加甄别或精力雖衰尚能辦事及行走年久熟諳部務者分别應留應去通行帶領引見該堂官之秉公甄擇與姑息從事亦於是觀之奉諭㫖各部院司員現已甄别龍鍾衰邁難以供職者予以原品休致將來部曹自可得人其給事中御史内亦有年力已衰甚至步履維艱者著都察院堂官照各部院甄别之例秉公區擇酌擬去留帶領引見二十三年奉諭㫖各省水師所設兵弁以熟諳水務為要向來遇有考選拔補督提等專以弓馬較優劣夫使既習水務又嫻弓馬誠為出衆全材但水師所重全在能識風雲熟知砂線以及通曉駕駛等事嗣後除内河水師仍照舊例拔補外其出巡外洋各兵弁著該管官於統領出巡時留心查察權水務之緩急驗技藝之髙下分别等第詳記檔案預行申報遇有考拔督提等可按籍而稽外委則以一等之兵丁考補千把則以一等之把總外委考補如一等不敷即用二等庶不致所試非所用而營務可收實效至水師保送俸滿千總尤當詳慎著各督提等嚴行考核并發隔營統巡大員帶領出海試驗如果嫻習水務准其送部引見其或本營濫行保送及隔營扶同狥庇即行查明㕘處其著為令二十四年定京察陞調人員分班引見京察向例各部院堂官將所屬官員分别等第若陞調未滿半年者則仍由原衙門堂官出具考語移咨新任衙門辦理至是奉諭京察為澄叙大典理宜詳慎甄擇以防濫竽各該堂官等因該員陞調别任移送考語或未免於有意假借嗣後京察人員在新任衙門年例未滿已移咨前任堂官出具考語列在二等三等者仍照舊例其有列為一等者於帶領引見時另分一班不得因有此分班之㫖轉増各部向來所定額數致滋濫觴奉諭㫖向來内外文武三品以上大員遇京察軍政之年援例自陳文具相沿無裨實政曾經降㫖停罷第念伊等洊陟崇階並由特簡其人賢否優劣雖已均在洞鑒然其間不乏旅進旅退茍圖持禄戀棧之人若以平時既無大過足干吏議又不按例甄核任其迴翔日久必致職業不揚甚非澄叙官聨之道嗣後吏部於京察時將在京之尚書侍郎以下至三品京堂以上在外之總督巡撫分列為二本兵部於軍政時將在京之都統副都統在外之駐防將軍都統副都統各省之提督總兵官分列為三本繕具簡明履厯清單進呈候朕鑒裁以重考績大典著為令令督撫於舉人截取時甄别就教署四川總督岳鍾璜奏截取舉人現任瀘州學政龍正國年力雖未衰老但氣體甚弱人亦拘迂難膺民社應仍令回學正之任咨部註冊奉諭㫖岳鍾璜所奏甚當知縣職司刑名錢榖原非才力衰庸者所能勝任與其得缺時始行改補何如截取時先為甄别此不獨地方可收循良之效即該員亦得免跋涉之勞岳鍾璜以暫攝督篆而能實心鑒别不事姑容深足嘉予但在該員或以曾列乙科未經引見豈即甘心冷署所謂人苦不自知也嗣後似此者著照大計年老被㕘之例如願來京准予給咨聴該員自行赴部引見庶不致妄抱向隅之怨而大吏程材之當否亦難逃朕洞鑒若不願赴部仍聴其便奉諭㫖愛必達奏楚姚總兵陳益將陛見起程舊疾猝發請緩至七月提鎮履任三年令具摺奏請陛見其人才優劣精力盛衰並可隨時體察今陳益因來京稱疾貴州提督哈攀龍自云病愈來京而言辭步履依然不能自主福建提督馬負書又因來京忽值感冐風寒不即就道夫疾病雖常有之事然若無陛見之例其甚不堪者幾資其養拙戀棧而姑息之督撫或且以為無礙姑容則害戎政為大矣即督撫膺一省重寄藩臬任方面専司吏治民生所繫尤為重大若以往來資斧計議則尚謂之封疆大臣乎且如胡寳瑔無嵗不請陛見而總未允其請嗣後督撫藩臬皆宜如提鎮之例若朕深知及有要務者自不令其亟來也奉諭㫖前經降㫖各省副將厯俸五年以上該督撫陸續送部引見而由旗員外補之人又有五年調換來京由軍機處查奏請㫖之例與緑營漢缺副將等専定五年一次送部者不同今據李侍堯將厯俸五年以上之副將福海送部引見係遵前㫖辦理但該員已屆應行調換之期若甫令回任旋復調京不特伊等徒勞僕僕道途且恐有妨營務嗣後凡旗員副將分别道里逺近定以年分雲南貴州四川廣東廣西福建等省著以七年為期江西浙江湖南湖北陜西甘肅等省以六年為期江南河南山東山西直𨽻等省以五年為期著該督提等屆期將該員分别出具考語送部引見如有堪勝總兵之任者一併奏明或應留京或回本任候朕酌量降㫖所有緑營副將彷此畫一辦理福海著即回京其員缺著兵部照例開列請㫖所有軍機處查辦五年調換之例著停止奉諭㫖直𨽻州知州調取引見應與道府各員一併按照省分逺近酌量分别年分著為定例直𨽻山東山西河南江南等省著以六年為期江西浙江湖南湖北陜西甘肅等省以七年為期雲南貴州四川廣東廣西福建等省以八年為期庶該員等赴部之期既屬適均而甄擇人材亦為有益二十八年奉諭㫖向來直省俸滿千總於引見發回後概行開缺是雖有陞擢之名轉致無任可回情理亦堪憫惜該部奏請嗣後千總等既經俸滿其下次無庸再待六年即改為三年一次據實甄别之處應如所議行第念頻年壅積員數過多現在即應通行甄别而其去留等次又當就年力以為斷葢武弁所業者弓馬所飭者戎行必年力壯盛始可能於其任非如俸滿教職茍不至暮齒頽唐猶可從容司鐸不當概以年格限之也所有直省各項年滿千總及例前尚在需次各員著即一併悉心秉公分晰甄别有年在六十以上者候補之員降為候推候推之員降為留任俱俟下次甄别以次遞降至六十六嵗即予休致其咨部留任之員一至六十嵗以上者概令休致其年雖未及期而技藝生疎人材闒葺不堪造就者並即勒休出缺毋得稍存遷就之見如此則把總陞用之途不致過閼而營政官常亦均有裨益矣著為令御史王懿徳奏考試翰詹諸臣事宜奉諭㫖嗣後考試翰詹等官俱著彌封試卷二十九年奉諭㫖外省題陞人員向例前此引見未滿三年者免送引見葢因其人政績尚優且經朕鑒别未久也至罣悞人員議降議革本屬分所應得特以事屬因公准令送部引見候朕量材甄録此乃格外之恩其情事與名列陞調之人判不相同今吏部於失察邪教之王銘錫馬鵬飛等前已因公罣悞從寛録用近復以此干議而該部以引見未滿三年聲明雙請是於僥倖中復求僥倖也王銘錫等仍著送部引見著為令奉諭㫖前令各督撫學政將俸滿教職六年甄别一次除保題勒休之外並令一體送部引見年來各省送到此等人員率皆循分供職並無必須復加鑒别之處因念伊等官卑禄薄特限於俸滿之例僕僕來京未必不以為苦嗣後凡僅堪勝任之員莫若多展年限分定等差按年遞汰著大學士等奏議尋議教職六年俸滿應行留任者該督撫學政核其才力堪策勵者列為勤職次為循分供職各註切實考語咨部註冊後俸再滿如勤職中有才政卓著者勿以前次未經保題概置不問如止照常奮勉仍列勤職如其少遜於前即改為循分供職又供職中有較前奮勉者准列勤職如止照常訓課仍列供職如才力衰庸即與休致再年逾七十以上其衰憊者固應勒休即精力尚堪留任者亦只展限五年概令休致得㫖允行奉諭㫖大計附薦人員其有正項錢糧未完及革職留任未經開復者部議俱以毋庸議題覆第思此等人員多以才具可造由簡調繁及處分多而開復不易即登附薦又以格於成例不獲隨衆引見其中恐不無屈抑著該部分别年例酌量章程具奏尋議附薦官員除係簡缺有錢糧處分及降革未經開復者仍議駮外其現任兼三兼四繁缺者以厯俸五年為限臣部將應否送部引見聲請如此等人員處分題本到部時現屆開復者即與正薦合例人員一體議准又嗣後卓異計俸應以本省屆滿三年為例其前别省厯俸不應接扣俱得㫖允行奉諭㫖縁事降調人員其中應行送部引見者例由督撫具考朕既核其人之才具亦因以覘該督撫之鑒别法至善也至離任候補人員因係前任案件罣悞本籍督撫無從注考嗣後此等人員著原籍之督撫一體具考送部是年十月復奉諭㫖於該員請咨回籍時該督撫即具切實考語咨明本籍存案俟於赴部時徑由本籍督撫查叙原咨無庸前赴原𨽻衙門注考以昭畫一三十年奉諭㫖藩臬兩司有奏事之責乃或摭拾尋常事件及更改一二律例俱於實政無裨至附奏年嵗晴雨情形又多仿照督撫所報而於地方要務未有専摺入告者如近日豫省河隂縣民因歸併滎澤聚衆罷市巡撫阿思哈時值迎鑾行在該藩臬雖一面具禀一面親往拏究但巡撫公出諸事責在兩司豈有遇此等重案猶待據禀具奏者雖督撫隨時陳奏兩司固不便攙越然使皆存顧忌概不發言將督撫倘有敗檢骫法之事勢必狥隠欺朦所闗更鉅嗣後兩司於地方要務有應陳奏者即以奏聞又從前保舉堪勝知府皆以督撫為政今後如再有應行保舉時兩司㑹同㕘核以昭公慎奉諭㫖各省道員副將厯俸六年以上者向俱送部引見該督撫等將伊等勝否臬司總兵之處聲明奏聞今思臬司總兵均係大員道員等堪勝與否朕原可於引見時甄定且恐循行日久視為具文屬僚或藉為干進之階而上司亦以為市恵之地於政體轉有闗係嗣後著概行停止奉諭㫖巡視臺灣御史前已降㫖三年簡派一次事竣即回無庸候代今思該處駐有鎮道大員足資經理而向來巡察御史多屬有名無實若遽行裁撒則有司或以逺隔海洋無人稽察日久不免廢弛嗣後屆三年請派之期該衙門仍照例奏請或停或派隨時酌量其盛京等五處分班簡派稽察亦視此例皇朝文獻通考卷六十一
