嚕木齊新屯之特訥格爾地方中間計有十餘處地土肥沃泉水暢流可墾地數十萬畝請就近於安西肅州等處招募無業貧民照例給與盤脚等項送至適中之穆壘地方先為安插耕種隨後廣為招徠逐漸接墾至烏嚕木齊之特訥格爾並移設官兵駐劄疏入軍機大臣議如所請得㫖允行三十一年總計緑營兵屯田伊犁四屯地三萬六千畝塔爾巴哈台一萬八千畝烏嚕木齊三營五萬一千三百二十畝景化城一萬一千三百四十畝庫爾喀喇烏蘇四千畝晶河四千畝瑪納斯四千畝烏什一萬二千畝哈喇沙爾七千三十五畝巴里坤一萬六千五百畝穆壘四千畝哈宻所屬材巴什呼四千六十五畝塔里雅沁七千三十畝招民承種地巴里坤四萬四千七百二十畝烏嚕木齊十萬三千八十八畝伊犁種地回民六千户嵗交糧九萬六千石三十三年諭伊犁烏嚕木齊等處種地兵丁收穫糧石已至應行議叙賞賚分數經朕俱施恩將官員議叙兵丁奬賞其烏嚕木齊種地之民人及遣犯雖非屯田兵丁可比該管官員並無分别理應一體議叙至種地之民人遣犯等如果竭力耕種所收糧石至分數者亦應於多收糧石内量加奬賞嗣後新疆各處種地民人遣犯所收米石如及應賞分數俱照此辦理三十六年户部議陜甘總督文綬奏巴里坤墾不成熟地畝六千三百畝准其照數豁除成熟有收地八千四百九十畝應照例入額報部如議行三十七年陜甘總督文綬奏新疆沃野綿延二萬餘里屯田雖已廣闢而餘地尚多必須廣為招徠使地無棄壤民無遺利因條具五事一招新疆商賈傭工之人就近認墾以省資送一指明新疆地名道里情形曉諭户民以期樂從一嘉峪闗請每日辰開酉閉以便商民一烏嚕木齊大路數丈請脩治寛濶以利行旅一安西溝渠應疏濬暢流以益灌溉皆為經乆要務疏入奉㫖下大學士九卿集議施行陜甘總督勒爾謹奏烏嚕木齊撥入民籍之遣犯一百三十二户並户民馬成喜等墾種地畝俱扣限六年期滿應准其一體陞科下部議行先是烏嚕木齊於三十二年至三十七年所有户民墾田一萬四千六百七十四畝已報部陞科至是復有此奏云三十九年户部議陜甘總督勒爾謹奏三十三年分巴里坤所屬竒台並東吉爾瑪等處報墾田地共九千一百二十畝今經六年期滿應准入額如議行諭巴格奏巴里坤所屬濟布庫古城二處種地緑旗兵丁每人收穫細糧二十五石四斗有餘著照所奏官員等交部議叙兵丁等賞賚又諭綽克托等奏烏什屯田兵丁本年屯田每人收穫細糧十九石以上慶桂等奏本年塔爾巴哈台屯田兵丁每人收獲細糧十九石以上著照所奏管理屯田官員議叙兵丁各賞給一月鹽菜銀兩又諭索諾木策凌等奏各營屯兵丁收成分數摺内稱濟木薩營三十九年種地兵丁每年收穫細糧二十二石有竒與議叙賞給之例相符著照所奏行四十年諭伊勒圖奏塔爾巴哈台等處緑營屯田准各該處辦事大臣按照地方情形查覆請仿照伊犁烏嚕木齊等處議定分數分别辦理其巴里坤哈宻遣犯種地交糧應照該處兵丁一例勸懲等語著照所請塔爾巴哈台等處屯田收糧分數准其仿照伊犁烏嚕木齊勒懲之例分别辦理該部知道户部議陜甘總督勒爾謹奏巴里坤宜禾縣續招户民馮天貴等墾地三千畝准照例陞科如議行諭勒爾謹奏本年巴里坤屯田兵丁及遣犯八百五十名收穫小麥豌豆共合折細糧一萬二千八百餘石均匀攤算每名收穫細糧一十五石零與議叙奬賞之例相符等語管理巴里坤糧地官員著照例交部議叙兵丁著賞給一月鹽菜銀兩遣犯著賞給一月口糧又諭伊勒圖等奏本年伊犁屯田兵丁每人計收穫細糧二十七石八升四合有餘應否將官員交部加倍議叙兵丁賞給兩箇月鹽菜銀兩之處伊犁屯田兵丁收穫細糧雖未及二十八石之數所欠不過數升著照所奏行又慶桂奏本年塔爾巴哈台地方屯田兵丁合計每人各收穫細糧二十一石六斗有餘索諾木䇿凌奏烏嚕木齊所屬中左右濟木薩四營並瑪納斯屯四十年分種地兵丁每石收穫細糧均在十五石以上又右營並瑪納斯屯種地遣犯每名收穫細糧均在六石六斗以上庫爾喀喇烏蘇晶河二屯種地兵丁每名收穫細糧均在十九石以上又該處遣犯每名收穫細糧七石二升有零綽克托奏今嵗烏什之屯田兵丁每人各收細糧十九石以上均與議叙給賞之例相符奉㫖允行四十一年軍機大臣議准將軍阿桂等㑹奏金川地方設鎮安屯條款内令兵丁攜眷居屯查建昌松潘維州等處兵丁男婦皆能習勤苦如有情願攜眷者初至墾種於應得錢糧外給與鹽莱口糧俟生計已成再行停止永慶奏庫爾喀喇烏蘇晶河二屯每人收糧二十石以上遣犯每人收七石六斗烏嚕木齊所屬中左濟木薩三營並瑪納斯屯種地兵丁每名收細糧均在十五石以上中左二營並瑪納斯屯種地遣犯每人收細糧均在六石六斗以上巴里坤種地兵丁每人收十五石以上古城等營兵丁每人收二十四石以上遣犯每入收十五石以上奉㫖官員議叙兵丁遣犯給賞四十二年四川總督文綬等言各營緑旗兵攜眷逺徙屯戍與西陲墾户新地降畨情事相等應使眷屬均有所資合力耕作方於屯政有禆各按家屬名口酌借口糧由屯員按月支放每日大口給米八合三勺小口減半統俟墾種成熟收還報部從之諭索諾木策凌奏巴里坤種地兵丁每名收細糧十五石以上古城穆壘種地兵丁每名收細糧十八石以上並巴里坤種地遣犯每名穫細糧十五石以上官員交部議叙兵丁賞一月鹽菜銀兩遣犯著分别賞給麫觔四十三年户部議准四川總督文綬等奏川省攜眷赴屯兵丁所種新疆地畝瘠薄若照烏嚕木齊兵丁之例每人給地二十畝則收穫無多不足以供養贍應照户民之例每户給地三十畝至所需牛隻農具番地田土畸零並非阡陌毗連若按三名給農具一副馬二匹徃來攜取實非所便且兵眷皆能耕種全頼男婦同耕以冀有秋器具牲畜實每户所不能缺每地三十畝合給牛一隻並借資口糧四十四年兵部議科布多辦事大臣明善本年屯田收穫糧石較每年甚為豐裕將緑營兵丁并䝉古章京兵丁賞給段布銀兩應將科布多屯田官員分别議叙成都將軍特成額等言金川各屯地勢迥異西陲眷兵種出之糧例應盡數交官但口外食物昻貴兵丁月餉鹽糧不足養贍家口請將兵丁種地之額參酌變通以本年為始每兵所撥三十畝地内以二十畝收穫之糧全數交官其餘十畝所收糧石即給兵眷為養贍於四十八年陞科納糧下部議行諭索諾木策凌奏瑪納斯左右兩營庫爾喀喇烏蘇晶河並提標中左右濟木薩四營所管各屯種地兵丁每名收細糧均在十五石以上古城穆壘營種地兵丁每名均收十八石以上又瑪納斯左右兩營提標中左右三營晶河屯種地遣犯每名均收六石六斗以上哈宻協所營材巴什呼種地兵丁遣犯收糧在十八石以上官員議敘兵丁遣犯給賞四十六年户部議准成都將軍特成額等奏稱兩金川新疆辦理屯田原議駐兵六千名内以二千名種地每兵給牛一隻農具一副嗣於四十四年裁兵二千名留實兵四千名以二兵合種地一分仍需計用牛二千隻農具二千副至四十五年又奏裁兵一千名止留額兵三千名除各官養亷及公費空糧外止存實兵二千六百五十三名仍以二兵合種一分止應給牛一千三百二十六隻五分農具一千三百二十六副半應裁牛六百七十三隻五分農具六百七十三副半農具口外無可變價飭交各糧務收貯以備例給民户應用牛隻新疆稀少遇有倒斃各兵需自買補應將所裁牛隻給兵牧放分作五年扣價歸款以此牛供陸續補額之用其價每隻牽算銀十兩五錢三釐七毫零共裁牛六百七十三隻五分應繳銀七千七十四兩二錢四分二釐自四十五年起分作五年扣繳應造入各年奏銷新收項下報部查核四十八年四川總督福康安等奏稱美諾等屯安插降畨戎噶阿甲等一千四十三户於四十一年投誠次年耕墾扣至四十七年六年屆滿請自四十八年起照漢牛降畨之例徴收先是儧拉漢牛降畨二百九十二户於三十八年投誠給地安插早經墾熟於四十四年每户徴納雜糧二斗一升八勺五抄美諾即照此例以稞麥荍豆四色兼收交各屯員照數徴收搭放官役口糧按年造報議如所請奉㫖允行五十年命奎林將烏嚕木齊吐魯畨兩處應否加屯查明籌議奎林奏從前設立屯田履畝確勘其磽瘠地畝及灌溉不到處所均為斟酌挑棄今烏嚕木齊所欲加之屯仍係從前挑棄之地是與巴里坤所報帶補霜災地畝無異且廸化州每嵗所需糧共七萬一千餘石除官屯户民嵗收糧二萬四千餘石外尚需撥運糧四萬七千餘石今欲加屯即使不致歉收亦僅得糧九千餘石仍須撥運糧三萬八千餘石是徒費周章終不能如數備供實屬無益但查向來一切輓運俱係雇用馬車每車百里需脚價銀一兩二錢其餉鞘茶封等項原係急需隨到隨送至輓運兵糧於一年前預行估定數目儘可從客運送且烏嚕木齊民間所用牛車每農隙時希冀餘利受人雇覔亦可載糧四石每車百里需雇價銀九錢較省脚費可永逺遵行吐魯畨糧價較各屬昻貴暫停採買必至平賤至烏嚕木齊應行清丈民田務令徹底清釐不能不有需時日約計丈量完竣分晣造册需至臘底於明嵗春間再行親身抽丈務使已墾地畝不至隠匿奉㫖如所議行皇朝文獻通考卷十一
