body:
  text: 欽定四庫全書皇朝文獻通考卷十一田賦考十一屯田新疆臣等謹按平定凖夷回部版圖式廓二萬餘里大功耆定興屯教種次第舉行由巴里坤以至伊犁前後墾闢無慮十餘萬頃天山南北禹甸畇畇盛哉非復漢唐以來足軍食省輓輸者所可同日而語也今臣等編次屯田謹特立新疆一門按年排纂列各省屯田之後以垂示萬世若夫城堡臺站駐防統轄之制已詳見兵考兹不備述云康熙五十四年設喀爾喀蘇爾圖喀喇烏蘇烏蘭固木科布多等處屯田命公傅爾丹等監管先是上以額徳爾齊老圖地近推河應屯田駐兵令將軍費揚古等與喀爾喀汗王等㑹議至是費揚古言臣等以屯田詢喀爾喀土謝圖汗等據稱蘇爾圖喀喇烏蘇烏蘭固木科布多等處俱可耕種應撥土黙特兵善種地者一千每旗令台吉塔布囊一人率徃屯種遣大臣一人監管奏入上命議政大臣等集議議應如所請再哈密地方亦可耕請一併行文將軍將西吉木布隆吉爾等處勘明具奏得㫖如議傅爾丹願徃効力即交伊辦理後都統穆賽等言科布多等處耕種收穫甚多應撥土黙特人一千及出兵歸化城之土黙特兵一千令徃耕種議政大臣等議如所請得㫖允行臣等謹按屯田之設不特省輓輸兼可盡地利我聖祖仁皇帝西事之初即勅所司留意趙充國三奏至是察勘蘇爾圖等處分兵屯種命傅爾丹辦理嗣後復募民田作不數年間嘉峪闗外裕軍儲於絶域化沙磧為沃壤矣五十五年命議開巴里坤哈密等處屯田諭議政大臣等巴里坤烏蘭固木等處種地之事甚屬𦂳要若種地得收則諸事俱易著㑹議具奏尋議開墾田地現令傅爾丹等率土黙特人一千徃烏蘭固木等處耕種發徃軍前贖罪人等有願種地者許其耕種又前者尚書富寧安言哈密所屬博羅爾圖古哩克接壤之處並巴里坤都爾博勒津喀喇烏蘇及西吉木達里圖布隆吉爾附近之上浦下浦等處俱可令人耕種兵丁有願徃者亦令耕種富寧安現駐肅州其附近之西吉木等處可令酌量耕種圖古哩克等處令大臣一人管理奏入得㫖如議著副都統蘇爾徳前徃管理是冬蘇爾徳奏言都爾博勒津圖古哩克喀喇烏蘇所種地畝並收穫議政大臣等議令預備籽糧為明年計從之五十六年增墾阿里滚固楚等處地傅爾丹言今嵗除耕熟之田已經播種外其阿里滚固楚錫巴爾鄂希納瑪爾濟呼勒克察罕郭勒等處地土肥厚現在開渠引水一體增種五月中又遇甘霖沾足所種青稞大麥小麥各極暢茂奏入報聞又命户部侍郎梁世勲等督理巴里坤屯田五十七年議叙屯田官郎中蘇赫等侍郎海夀言臣與富寧安新舊所墾都爾博勒津圗古哩克及回子扎薩克敏所種塔里雅沁地所餘青稞悉令備倉收貯充給軍糧其郎中蘇赫等急公耕種請約計榖數所入多寡量予議叙議政大臣議如所請得㫖允行六十年十月增墾烏蘭固木地征西將軍祁徳里言烏蘭固木地煖土肥請於來年多墾可望大收議政大臣議如所請得㫖允行六十一年覈科布多烏蘭固木等處地畝榖數祁徳里言據總理屯糧事蘇爾租呈稱科布多烏蘭固木特里河諸處可種之地悉乗時和開墾坤都倫河諸處可種之地亦悉開墾今年種麥所穫數倍徃年來年更可添種得㫖據所奏在科布多烏蘭固木等處開墾耕種因土沃水裕今年所得麥子收有數倍請明年添種千石等語軍前種地人員禀報所收糧數應照内地或一畝一晌收得米石若干方得明晰著議政大臣詳加議奏尋議行文將軍傅爾丹等將開墾地丈量頃數計算籽種及秋收糧數詳報從之雍正三年命議開鄂爾坤圖拉等處屯田諭振武將軍穆克登鄂爾坤圖拉一帶甚為寛濶若開墾屯田實為永逺之計爾㑹同喀爾喀將軍確議具奏尋穆克登奏言鄂爾坤一帶尚有昔人耕種處及故渠灌田蹤跡圖拉等處現有大麥小麥非不可墾之地但霜降早晚不一樹榖宜否不同請於屯長中擇十餘人於明年三月遣徃耕種俟秋收後具奏議政大臣議如所請得㫖允行至七年振武將軍順承郡王錫保奏報鄂爾坤濟爾瑪台圖拉三處屯田收穫大麥小麥糜子共七千五百五十石有竒九年奏報一萬六千三十石有竒十年開墾哈喇該圖地令兵民耕種工部侍郎原署西安廵撫瑪爾㤗言哈喇該圖為諸路隘口所㑹水草亦佳請撤額塞勒津城所駐歩兵并發西寧馬歩兵合二千人赴哈喇該圖詳閲耕種地方令兵丁開墾從之乾隆元年議辦鄂爾坤屯田先是雍正十三年定邊大將軍慶復奏請撥緑旗兵一百守營緑旗歩兵二百家選兵二百於鄂爾坤地方自呼克新至濟爾瑪台擇水土佳處開墾試種小麥豌豆一年有效據實具奏王大臣等議覆行至是總理事務王大臣等言鄂爾坤地界寛廣可耕種若撥兵三千人各種二十五畝計可墾田七百五十頃慶復所奏請於鄂爾坤附近屯田所見畧同請以原摺付軍營將軍等按可墾之田詳悉定議從之至二年額駙䇿凌等言鄂爾坤可耕地畝實可給三千人耕種即以今年換班緑旗兵六百再另撥一千九百共二千五百一千五百名擇地耕種令一千名分駐塔密爾鄂爾坤兩處防守倉庫王大臣等議覆據奏除駐防兵外當用一千五百人耕種今軍營緑旗兵六百并罪人計一千有餘不必更撥兵丁前徃從之二十年籌辦額爾齊斯等處屯田先是諭軍機大臣從前因未深知達瓦齊情形原議四月進兵故令於額爾齊斯派喀爾喀兵緑旗兵并策凌所屬人等留駐屯田今進兵甚早而達瓦齊之力已窮兵到即可成功其額爾齊斯仍需屯田與否應另行酌辦如需屯田或即於䇿凌等遊牧所留人内派徃或凱旋後再將䇿凌等人衆派徃著班第等詳議具奏至是班第等言臣等接奉諭㫖公同商酌現在凖噶爾窮蹙大兵一到自可迅奏膚功而平定凖噶爾後額爾齊斯地方亦必需駐劄兵丁照管新收人衆其派出屯田兵丁并牛種噐械等物既俱齊備應仍照原議辦理奏入諭軍機大臣據班第等奏額爾齊斯仍須屯田之處即著照所請行其耕種所得榖石以備接濟徃來兵丁口糧亦屬有益若欲撫綏新收人衆於額爾齊斯駐兵則大功告成後伊犁已留重兵兼有大臣駐劄額爾齊斯去阿勒台甚近又何必更設兵駐防著傳諭班第等知之二月班第等言本月十二日令屯田兵起程其管豁屯田兵有原𣲖塔爾瑪善現在齊齊克淖爾居住屯田兵由彼經過即令前徃額爾齊斯等處詢問可以屯田處即行耕種俟親王成衮扎布事畢徃額爾齊斯公同商辦從之至是班第等言屯田之地已定在伊蘇圖鏗格爾等處應移布拉罕兵一千名於鄂倫淖爾地方駐劄照管從之二十一年諭伊犁附近地方可否發緑旗兵前徃屯田著兆恵等預為籌酌奏聞至是兆恵等言自巴里坤至濟爾瑪台濟木薩烏嚕木齊羅克倫瑪納斯安濟海晶等處俱有地畝可資耕種伊犁附近地方約有萬人耕種地畝崆吉斯珠勒都斯等處可種之地亦多但須預為籌辦方不悞來春耕種之期現在伊犁有回人三十餘名擬酌增至百人再派緑旗兵一百名酌帶耔種於明年正月内前來臣等按地分給耕種試看一年再行辦理從之又諭軍機大臣伊犁等處可種之地既多酌量遣派内地兵民前徃耕種照西安地方之例辦理二十二年復設塔里雅沁屯田陜甘總督黄廷桂言塔里雅沁自乾隆七年停種之後渠道淤塞開挖修築在在須費人工現在派兵二百名乗時墾種止可種地一千五六百畝佈青稞一百五六十石餘地至明嵗再行辦理一二年内自可次第修復奏入報可又派兵吐魯畨屯田成衮扎布等言吐魯畨地方直通伊犁並與各處回城聲息相通應派兵屯種尚有闢展地方地勢寛展可資屯務即將臣等所帶緑旗兵丁派令耕種奏入報可至是阿里衮言吐爾畨所種大小米自四月初九至二十三已種小米二千三百四十餘畝再行接種大米又新附回人留於吐魯畨種地亦請給發耔種從之又諭軍機大臣兆恵等奏稱烏嚕木齊地方可以耕種又與吐魯畨相近著黄廷桂於緑旗兵内多選善於耕種之人發徃烏嚕木齊明春即令試種地畝量力授田愈多愈善即遵諭速行仍將選派官兵人數及督率員弁指交地畝陸續奏聞又諭軍機大臣黄廷桂奏派兵一千名於來春徃巴里坤等處屯田等語自應及時籌辦但此尚在近地其烏嚕木齊等處亦須漸次屯種其如何相度水利測騐土脉及派兵前徃預為料理之處著傳諭黄廷桂詳悉具奏先是黄廷桂言巴里坤尖山子起至奎素一帶百餘里内地畝雍正年間俱經開墾舊迹具在係取用南山之水共有正渠九道自山口以外多滲入沙磧必須木槽接引方可暢流似宜早計請於甘凉肅三處先派種地官兵一千名於來年正月前徃疏濬水泉開引渠道至二三月間土膏萌動即分布各兵於可墾之地翻犁試種查巴里坤氣寒霜早惟宜青稞應令各兵丁於青稞外如糜榖之類少為試種倘或有收再行加增疏入遂有是諭又諭軍機大臣昨令黄廷桂查勘屯田處所廣為播種勿致荒閒添派兵丁以資耕作可傳諭兆恵富徳等留心經畫務使地無遺利二十三年派兵屯田哈喇沙爾等處增烏嚕木齊等處屯兵先是二十二年成衮扎布等奏請來年派兵二千自魯克沁起程前徃哈喇沙爾等處耕種至是雅爾哈善言哈喇沙爾通庫車阿克蘇大路舊係厄魯特回人墾種約需兵二千名以上海都河水甚足烏嚕木齊約需兵一千名水亦足用闢展魯克沁吐魯畨除官兵及回人屯種外因水乏無可開墾吐魯畨西百餘里通哈喇沙爾托克三城水頗充足可得兵丁五百名屯種之地臣等擬於哈喇沙爾派兵二千四百名烏嚕木齊原派兵五百增派五百名托克三與闢展魯克沁相近量增兵五百名闢展仍派兵四百名共需兵三千三百名攜帶牛具口糧前赴魯克沁於三月前䟎行從之議増兵屯田哈喇沙爾托克三等處永貴等言烏嚕木齊等處現在屯田兵三千六百名其魯克沁吐魯畨附近哈喇和卓等處雖有餘地實為磽瘠不必增兵烏嚕木齊地廣而荒擬前徃查勘再議托克三餘地尚多水亦足用惟當修堤濬渠應請增兵四百名哈喇沙爾地最廣海都河水甚足但河身低於渠道須大加修築應請增兵二千名合之現在兵丁共六千名疏入軍機大臣議如所請得㫖允行又諭軍機大臣現在辦理回部未竣屯田伊犁可以暫緩惟於烏嚕木齊一帶及噶勒藏多爾濟遊牧之羅克倫等處亟宜相度地畝廣為屯種俟將來酌量情形由近及逺即一二年後亦無不可著傳諭黄廷桂及永貴定長等知之侍郎永貴等奏報烏嚕木齊等處屯田新舊開墾畝數永貴等言本年屯田地方闢展烏嚕木齊已經墾種外據各該管官員報稱哈喇和卓墾地八千七百畝托克三墾地五千三百畝哈喇沙爾墾地四千餘畝俱經種植臣等合併闢展所種一萬畝烏嚕木齊所種八十畝共三萬六千八百餘畝較去年增墾七千三百餘畝所種禾苖先後長發臣等督率官兵盡力耕耘引水灌溉今秋可望豐收奏入報聞至二十四年定長等奏報屯田本年增墾一萬零四百七十四畝因閏月增墾八千七百七十一畝計新舊地共種過五萬二千七百九十一畝察勘穆壘至烏嚕木齊可耕地畝先是黄廷桂言由巴里坤至烏嚕木齊南路一帶如闢展托克三哈喇沙爾等處今嵗俱已種植自烏嚕木齊以内察罕烏蘇穆壘北路一帶地方多係沙磧難於開墾由穆壘至烏嚕木齊一帶則可墾之地最多近因哈薩克貿易遵㫖揀選副將一員管押貨物應請遴選道員同徃於經過之處將曾開開墾地畝及氣候寒暄土脉肥瘠水泉多寡繪圖貼説請㫖遵行從之至是努三奏言臣率道員薩瀚等勘得自巴里坤至穆壘不堪屯種自穆壘至烏嚕木齊有噶勒藏多爾濟遊牧之昌吉羅克倫等處可耕地畝十六處視其地土肥瘠水泉多寡以定耕作仍令屯兵等輪替耕種以息地力方為有益計需兵六千八百名謹繪圖恭呈御覽奏入諭軍機大臣據努三察勘穆壘至烏嚕木齊屯田約需兵丁六千有竒繪圖呈覽此時雖距耕作之期尚早自當先為籌畫可傳諭黄廷桂於内地緑旗兵丁内挑選七千名調赴烏嚕木齊等處并傳諭永貴等知之議開昌吉羅克倫等處屯田努三等言臣等查勘昌吉羅克倫等處昌吉距烏嚕木齊六十餘里羅克倫距昌吉四十里舊係噶勒藏多爾濟遊牧地平水足有河渠舊址修理亦易丈量得昌吉可墾田八萬餘畝羅克倫可墾田七萬餘畝臣等㑹議昌吉羅克倫各駐兵一千五百名更畨開墾種植以休地力奏入諭軍機大臣努三前奏請查勘烏嚕木齊屯田時朕即謂雖為時尚早亦當先事籌辦隨諭黄廷桂來年穆壘烏嚕木齊屯田派兵七千名及辦給農工噐具今昌吉等處既又可駐兵三千名傳諭黄廷桂照數添派合之前派七千即得萬人為數雖多但屯兵惟取其習於耕作不必盡皆精壯黄廷桂宜酌量辦理仍與努三永貴等㑹同定議具奏又諭軍機大臣據黄廷桂奏稱塔里雅沁試種豌豆已有成效塔里雅沁既可種豆闢展吐魯畨托克三烏嚕木齊等處想皆可以試種若得成熟於牧養更為有益可傳諭永貴等將闢展等處節候地氣測騐確實即於明春佈種又諭軍機大臣從前因辦理回部將伊犁屯田暫時停止今回部迎降相繼大功計日可成則屯田自不可緩軍營緑旗兵丁駐防各城所用無幾應行派徃伊犁并酌派回人令納穆扎爾等辦理屯田或將魯克沁哈喇沙爾烏嚕木齊等處屯田兵丁移至伊犁再於内地派兵補缺可傳諭兆恵等將應辦之事先時預備二十四年定增兵屯田特訥格爾昌吉羅克倫等處陜甘總督楊應琚言特訥格爾昌吉羅克倫等處地氣和暖且與烏嚕木齊相近増兵屯田實為善䇿查烏嚕木齊現有屯田一千名擬於凱旋緑旗官兵内截留五千名以一千預備差遣以四千分墾地畝從之又諭軍機大臣定長等將本年闢展托克三烏嚕木齊哈喇沙爾喀喇和卓等處屯田收穫分數具奏又稱除烏嚕木齊外其他地畝較之初種時漸覺歉薄等語此等地畝雖不能如内地人工糞治可以常年耕種但地頗寛敞彼此遞年互調耕作自有餘力著傳諭楊應琚㑹同舒赫徳悉心講求酌議具奏二十五年命調巴里坤緑旗兵九百名赴烏嚕木齊屯田又諭軍機大臣阿桂等奏稱伊犁河以南有地名海努克與固勒扎相隔一日程途水土沃衍請於此處先行屯種相其形勢分立村莊等語所辦甚是俱依議行又諭軍機大臣安泰等奏屯田以漸開擴直通伊犁自烏嚕木齊至羅克倫擇水土饒裕之地立四村莊每莊屯兵八百餘名委遊擊等員督課耕種等語所見甚是可即勉力善為經理興舉伊犁屯田副都統伊柱言臣領屯田回人前來伊犁至海努克其地舊有廟宇又有築成營壘週圍俱可耕種即將官兵駐劄與屯田回人相隔二三里其應行安臺瞭望之處自東北塔前起至東南離本營四五十里伊犁河南安臺五處其屯田回人三百餘名約相隔半里立一村莊共五十處各修緝溝渠引水灌田計所攜粟麥可播種全完其回人所分各莊均有墻垣基址暫行搭葢窩舖俟農隙造房臣等駐劄處有廟宇二所大小住房百餘間雖俱倒壞加以修葺尚可駐兵六七百名奏入諭軍機大臣伊柱奏稱屯田兵丁巳抵伊犁之海努克現在安設村堡修理溝渠等語看來伊犁屯田俱有舊蹟著伊柱於一切應辦事宜先時相度加意奮勉督䇿回人盡力耕耘勿為偷惰其地畝數目收穫情形可遇便陸續奏聞至是參賛大臣舒赫徳言伊犁屯田初次遣回人三百名小麥等未及播種來年自應多為遣徃而海努克固勒扎兩處俱派官兵屯駐亦屬有益現派出回人五百户於來年二月辦給籽種器具攜眷前徃奏入報可議辦伊犁屯田増兵築城事宜參賛大臣阿桂等言伊犁本年現有屯田回人三百名近經舒赫徳增派五百名應再增派二百名俟伊犁麥熟後遣發屯田緑旗兵一百名應增派九百名陸續遣發伊犁要地河北則固勒扎河南則海努克其地土肥饒之處則察罕烏蘇應於海努克築城以回人三百名屯田察罕烏蘇築城以緑旗兵一千名屯田固勒扎須築大城凡駐劄大臣公署倉庫咸在以為總滙奏入軍機大臣議如所請得㫖允行至是舒赫徳言伊犁屯田回人一千户除本年三百户續派五百户外餘二百户今派出於麥熟後送徃奏入報可又諭軍機大臣海明等奏稱查閲喀什噶爾有索倫兵二百九十名察哈爾兵二百二十五名緑旗兵九百十名等語喀什噶爾現在有索倫察哈爾兵則緑旗兵可以調發今伊犁地廣而腴屯田兵丁頗覺不敷雖經派兵一千名陸續發徃尚可再為増加著傳諭舒赫徳來年遣辦屯田兵丁時即將喀什噶爾之緑旗兵丁撤回由阿克蘇就便發徃准議叙管轄屯田官員并兵丁酌量􅅄賞定長等言今嵗闢展等處屯田收穫較上屆多一萬三千餘斛請將管轄官員分别議叙兵丁酌量奬賞奏入軍機大臣議如所請得㫖允行安泰等言烏嚕木齊昌吉羅克倫五處村莊所收青黍等榖共九萬四千八十九石有竒村莊地畝肥磽不同而官兵等皆能盡力耕作應請照例議叙從之二十六年議闢展等處餘地募回人承種軍機大臣議覆安泰等奏闢展喀喇和卓托克三等處留屯兵六百名餘俱發徃烏嚕木齊陸續前徃伊犁屯田其空出地畝係官為開墾所留兵丁既不敷耕作應召募回人承佃交納官糧請交與安泰等詳議具奏從之議設瑪納斯等處屯田安泰等言瑪納斯庫爾喀喇烏蘇晶河等處在伊犁烏嚕木齊之間地可屯田應設立村堡三處以次經理來春先派兵五百名徃瑪納斯以一百名起蓋倉厫房舎四百名屯田續派兵五百名徃庫爾喀喇烏蘇即以瑪納斯餘糧辦給其晶河亦照此續辦奏入軍機大臣議如所請得㫖允行至是阿桂等言瑪納斯距昌吉羅克倫不逺酌派屯田兵二百名庫爾喀喇烏蘇晶河距伊犁烏嚕木齊俱逺每村派兵三百名共八百名人各墾地十五畝奏入軍機大臣議如所請得㫖允行又諭軍機大臣安泰等奏烏嚕木齊現在屯田五處所收榖石甚屬充裕查該處屯田有緑旗兵三千名請以二千差操一千屯田互相更换等語烏嚕木齊收穫榖石雖盈餘甚多支用處少但僅以千人屯田官兵已墾之地又必荒蕪甚屬可惜若不通融籌畫榖石陳陳相因必致朽腐因思該處兵丁俱係三年一换並未挈眷若聴兵丁等移家居住或内地遊民有願徃立業者著楊應琚查辦酌給田畝籽種安插似有禆益著傳諭安泰等相度情形妥協酌議再著軍機大臣議奏至是安泰等言烏嚕木齊現駐兵丁臣等詳加詢問俱願挈眷惟請於收獲後回籍遷移臣等擬咨㑹楊應琚從安西等處按其程途逺近給與車輛口糧於明年二三月前來再楊應琚有招徠遊民之舉俟送到時酌給地畝口糧籽種照水田例六年陞科但不便與兵丁雜居應令於臣等駐劄相近之處安挿從之楊應琚言肅州安西二處招募貧民二百户定於本年十月料理前徃又髙臺縣招民五十六户肅州招民四十四户此外河西一帶尚有數百户情願挈眷前徃又山西臨晉縣民盧文忠一户情願自備資斧前徃頗知急公仰懇賞給監生頂帶以示鼓勵其屯兵之願攜家口者現在續行辦送從之參賛大臣阿桂等奏報伊犁二麥豐收之數阿桂等言伊犁屯田兵一千名除委派二百名外其餘八百名分作八屯每人種大小麥十畝新舊回人八百户每户給麥種一石兹於六月二十内外二麥皆熟兵丁所種約計二十分以上回人所種核算亦有二十分以上俟全行收穫及粟米收成時再行請㫖加恩鼓勵奏入得㫖報可又諭成衮扎布籌辦科布多屯田成衮扎布言科布多屯田應先派緑旗兵一百名官給籽糧農具俟收穫後再將喀爾喀杜爾伯特扎哈沁人等派徃奏入軍機大臣議如所請得㫖允行募民開墾巴里坤餘地楊應琚言巴里坤地土廣衍水泉敷裕除屯兵所種地畝之外應出示曉諭聴商民認墾按限陞科庶流寓貿遷之人皆樂業安居漸成土著奏入得㫖甚好應廣為開墾楊應琚奏巴里坤招獲民人王玉美等六十七名認墾地三千七百餘畝二十七年續招民人三十九户認墾地一千四百五十餘畝二十八年續招吳臣等三十名認墾地三千四百四十餘畝共八千二百餘畝皆係近水易於引灌之地俱照水田六年陞科二十九年續報商民三十名認墾地三千六百九十畝又續報敦煌等三縣招有情愿赴巴里坤種地民一百八十餘户又諭軍機大臣阿桂等奏稱伊犁屯田八千畝收穫大小麥糜粟青稞等榖共二萬七千一百石有竒約二十分以上伊犁屯田回人八百户收獲大小麥約二十分以上糜粟青稞約四十分以上合算每人收榖四十石應令其交米二十石定為成額則回人益知勤動請嗣後人給籽種一石五斗以交糧十六石為率所種四項榖石有豐歉不齊亦可通融抵補等語伊犁屯田豐收皆官兵勤於力作所致自當加恩陞賞所有屯田各官員俱交部議叙兵丁等酌量賞給以示鼓勵回人等著與兵丁一體酌量賞給其定額交糧之處俱如所請行至二十九年明瑞等言伊犁種地緑旗兵一千名新舊回人三十二户所種地畝俱經成熟二麥青稞收成至二十分以上官兵等各知奮勉所收青稞視去嵗較多麥子比去嵗多至二千石以上回人所收亦與兵丁不相上下核計嵗交可得四萬四千六百餘石查伊犁去嵗所收較前嵗豐裕䝉恩將大小官員俱交部議叙兵丁人等賞給銀兩今嵗所收較去嵗更覺豐裕相應請㫖照去年之例議叙賞給從之二十七年諭軍機大臣旌額理等奏稱發徃烏嚕木齊屯田遣犯請先給屯田二十畝與兵丁一體計畝納糧伊等亦有携眷者酌給地五畝自可開墾其未收穫以前官為養贍家口等語著照所請行又諭軍機大臣旌額理等奏稱烏嚕木齊辦給瑪納斯庫爾喀喇烏蘇晶河屯田兵丁馬匹糧餉俱全抵各該處現在水土滋潤三月前後可盡行播種等語此次派徃兵丁衝寒行走奮勉可嘉著旌額理等酌量奬賞以示鼓勵又諭軍機大臣楊應琚請將闢展屯田收穫之芝麻菜子分給回人種植俟收穫後扣還籽種其餘糧為交官以抵應輸額賦等語闢展所種芝麻菜子上年已試有成效自應借給回人種植以省運油之費但回地向未有此恐非所素習著傳諭徳爾格酌量辦理再烏嚕木齊地畝廣逺現在開墾三屯或即於該處播種以濟日用亦無不可著傳諭楊應琚知之安插添註伊犁屯田回人阿桂等言葉爾羌回人續請移居伊犁屯二百十四户臣等量其年力精壯與從前移駐之一百十户共為二百五十户給與籽種等項合經制屯田回人一千户定為一千二百五十户其老弱七十四户交該伯克養贍年㓜者俟其長成仍可補屯田之缺再此項回人若俱令在河北固勒扎等處屯田亦尚可容但不如河南居住百餘户則兩岸俱有壯屯於觀瞻更協因於和濟格爾伯克編設一屯安插八十户海努克編設一屯安插七十户奏入報可定各城回民納賦之制楊應琚等酌定新疆事宜凡回民自種地畝視嵗收糧數交納十分之一其承種官地嵗收糧石平分入官總計各城回民自種地畝闢展嵗納糧四千五百六十五石哈喇沙爾納糧一千四百石庫車納糧九百六十石又另納地租糧二十五石沙雅爾納糧五百六十石阿克蘇納糧六千八百三十五石五斗賽里木納糧九百七十五石拜城納糧五百二十石五斗又另納糧三十