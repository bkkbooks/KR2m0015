body:
  text: 郊社考十二親蠶祭先蠶乾隆元年建先蠶祠於都城北郊以季春吉已遣官致祭先蠶雍正十三年河東總督王士俊疏請奉祀先蠶禮部議於北郊依先農壇典制建立先蠶壇尋以侍郎圖理琛奏改立先蠶祠於安定門外每嵗季春巳日遣太常寺堂官以少牢致祭七年建先蠶壇於西苑定皇后親蠶祀先蠶之禮是年七月大學士鄂爾泰等奏言古制天子親耕南郊以共粢盛后親蠶北郊以共祭服我皇上親耕耤田以示重農至意乾隆元年議建先蠶祠宇所以經理農桑之道至為周備今又命議親蠶典禮伏思躬桑親蠶厯代遵行但北郊蠶壇向在安定門外故明嘉靖時以后妃出入道逺親莅未便且其地水源不通無浴蠶所遺址久經罷廢考唐宋時后妃親蠶多在宫苑之中明代亦改建於西苑伏讀聖祖仁皇帝御製耕織圖序於豐澤園之北治田數畦環以溪水隴畔樹桑旁立蠶舍是育蠶之事聖祖仁聖帝親加講求今逢重熙累洽禮明樂備之時親蠶大典闗係農桑自應遵㫖舉行以光典禮其應相度蠶地建立蠶壇桑壇蠶宫從室之處請交内務府㑹同工部等衙門辨理至親蠶典禮所應齋祀躬桑授蠶治繭等儀注及選擇蠶母蠶婦受桑布繅一切禮文事宜應交禮部詳議請㫖奏上從之乃建先蠶壇於西苑之東北南向一成方四丈髙四尺四出陛各十級西北為瘞坎東南先蠶神殿西向覆以綠琉璃崇基三出陛左右宰牲亭一井亭一北為神庫南為神厨壇東為觀桑臺前為桑園具服殿五間東西配殿各三間後殿五間配殿各三間均覆以綠琉璃浴蠶河在宫牆之東自外圍北垣流入由南垣出設牐啟閉木橋二橋東蠶署三間蠶室二十七間均西向壇垣周百六十丈西南隅正門三左右門各一禮部擬上儀注言皇后親饗先蠶應令欽天監選擇吉日禮部具奏兩請皇上轉奏皇太后如奉懿㫖皇后親蠶之年禮部具題恭請行禮豫日設立先蠶西陵氏神位於蠶壇之上太常寺先期奏聞致祭前二日皇后於正殿致齋至日以一太牢親祀行三獻禮應陪祀者各致齋陪祀翼日蠶未生則諏日皇后詣桑壇行躬桑禮蠶事畢蠶母率蠶婦擇繭之圓潔者貯筐恭獻以告蠶事之登擇吉皇后復詣蠶壇親臨織室行繅三盆手禮遂布於蠶婦之吉者使繅而朱緑元黄之以供郊廟黼黻之用從之蠶母二人於内外命婦中擇髙年嫻禮儀者充之蠶婦二十七人擇内苑熟悉蠶事者充之詳見儀注臣等謹按蠶桑之利養育萬民王政要務故以親桑率之而必報功於始為其事者誠不忘本也伏讀聖祖仁皇帝耕織圖詩二十三首自浴種以至成衣備悉蠶女之情狀其第十五圖為祀謝御製云自是西陵功徳盛萬年衣被澤無疆則先蠶之祀亦待時而舉爾至於蠶神名號漢祀二神固屬無稽鄭氏馬祖之説亦殊難據農始炎帝止稱先農則蠶始黄帝止稱先蠶禮臣原議義理允當及茲定禮列於中祀祭用太牢樂用六奏仲吕為宫及諸禮儀皆折衷盡善焉九年三月吉巳皇后親饗先蠶壇翼日行躬桑之禮七年之秋既定皇后親蠶禮冬十二月禮部具疏以親饗先蠶吉期上請欽奉皇太后懿㫖皇后親詣行禮是年首舉親蠶大典行禮如儀十一年定致祭先蠶遣妃恭代之禮先是禮部具儀親蠶典禮於皇后不行親祭之年照例遣太常寺堂官致祭是年不行親祭禮部照例具題奉諭㫖從前建立蠶祠未議皇后親蠶之禮是以照祭祀例遣官今既舉行皇后親蠶典禮若遇不行親祭之年自應遣妃内一人恭代致祭所有行禮儀注大學士㑹議具奏尋議上嗣後或皇后親饗或遣妃恭代之處禮部照例兩請具題如奉㫖遣妃恭代之年應交内務府請㫖從之嗣至十四年二月禮部具疏請代奉諭㫖先蠶祭期禮部奏請照例遣妃恭代此於禮意未協夫妃所恭代者代皇后也有皇后則妃可承命行事皇貴妃未經正位中宫則親蠶之禮尚不當舉行何得遣妃恭代應照皇帝不親行耕耤順天府尹致祭先農之例於内務府總管或禮部太常寺堂官奉宸院卿内酌派一人致祭方足以明等威而昭儀制於是禮部遵行並載入㑹典及皇后冊立乃復舉親饗先蠶及躬桑之禮皇后親祭儀嵗季春吉巳皇后親饗先蠶先二日禮部尚書一人眂牲如儀右眂牲是日昧爽太常寺進齋戒牌銅人内監豫設黄案一於交泰殿之左内務府總管一人及宫殿監侍豫竢於乾清門太常寺卿率所屬恭奉齋戒牌在前銅人在後前引如儀至乾清門内務府總管以授宫殿監侍恭設於交泰殿案内齋戒牌南向銅人西向跪三叩退皇后乃齋陪祀妃嬪公主福晉以下文官三品武官二品命婦以上咸致齋右致齋眡割牲先農儀與饗同先一日奉宸苑卿率屬潔壇上下藉以椶薦為瘞坎於壇西北施黄幄於壇上太常寺官恭設先蠶神座於幄内正中南向工部官張皇后拜幄於南階上如式太常寺典簿具牲俎博士辦簠簋籩豆登鉶之實以次展於神厨太常寺卿詣神庫以恭請神位之儀指授蠶宫令退贊禮郎引内務府總管一人詣神厨周眡牲牢籩豆太常寺官以陳設之儀指授宫殿監侍訖皆退右設神座幄供張展牲器至日雞初鳴内務府總管及宫殿監侍率内監入壇具器陳牛一羊一豕一登一鉶一簠簋各二籩豆各十鑪一鐙二東設一案西向陳禮神制帛一色青香盤一尊一爵三設福胙於尊爵之旁加爵一牲陳於俎帛實於篚尊實酒承以舟疏布冪勺具内監設洗於具服殿樂部率掌儀司内監陳樂於壇下東西分列如式右陳設辨行禮位壇上正中為皇后拜位北向壇下西北為望瘞位西向當階左右為陪祀妃嬪公主福晉拜位北面稍南左右為陪祀命婦拜位按翼分列重行異等東位西上西位東上均北面辨執事位司拜褥女官二人立於壇上皇后拜位左右相儀女官二人立拜位後左右均東西面司香女官一人司帛女官一人司爵女官一人奉福胙女官二人序立東案之東西面接福胙女官二人立於壇上之西東面壇下典儀司樂女官各一人當階左立西面傳贊女官六人二人立於壇南東西面二人立於妃嬪公主福晉拜位左右二人立於命婦拜位左右均東西面樂工歌工以童内監為之序立於東西樂懸之次女官掌瘞者立於瘞坎之西北隅右辨位未明前三刻步軍統領飭所部清蹕除道自神武門至壇門左右塗巷皆設布幛陪祀公主福晉命婦及執事女官朝服豫集壇内鑾儀衛率内監陳駕鹵簿詳見鹵簿於順貞門外凡旂尉民尉皆内監充辰正初刻太常寺卿暨内務府總管赴乾清門奏時宫殿監督領侍轉奏皇后御禮服乗鳯輿出宫如儀陪祀妃嬪咸乗輿從由順貞門神武門北上門入陟山門至内壝左門相儀女官二人跪奏請降輿皇后降輿妃嬪咸降輿從前引女官十人右贊引左對引女官二人恭導皇后入具服殿少竢妃嬪隨入配殿祗竢傳贊女官引公主福晉命婦等於具服殿門外東西序立祗候執事女官之外補闕八人以備執事之闕凡女官均於宫人内選充如不足於内府及八旗命婦内選充右車駕詣壇辰正一刻蠶宫令詣神庫上香跪三叩興恭請先蠶神位内監十人前引入壇奉安座上畢相儀奏請行禮皇后出具服殿盥司盥跪奉帨巾盥畢詣壇妃嬪以下隨行司拜褥女官豫設拜褥於壇上拜次贊引對引女官恭導皇后陞中階就拜位前北向立前引十人止立壇下相儀二人隨侍傳贊引妃嬪公主福晉及命婦均就拜位序立典儀贊執事者各共乃職贊引奏就位皇后就位立右盥洗就位典儀贊迎神司香奉香進至香案前祗候司樂贊舉迎神樂奏庥平之章樂作贊引奏就上香位暨對引恭導皇后詣香案前立對引至帛案前止立司香跪贊引奏跪皇后跪奏上香司香進香皇后上炷香三上瓣香興贊引奏復位暨對引恭導皇后復位立奏跪拜興皇后行六肅三跪三拜禮傳贊贊跪叩興妃嬪以下隨行禮樂止右迎神典儀贊奠帛爵行初獻禮司帛奉篚司爵奉爵進至案前祗竢司樂贊舉初獻樂奏承平之章樂作司帛跪獻篚奠於案一叩興司爵跪獻爵奠於墊中興皆退樂止右初獻典儀贊行亞獻禮司樂贊舉亞獻樂奏均平之章樂作司爵獻爵於左儀如初獻樂止右亞獻典儀贊行終獻禮司樂贊舉終獻樂奏齊平之章樂作司爵獻爵於右儀如亞獻樂止右三獻典儀贊答福胙奉福胙二人恭奉福胙詣神位前拱舉退祗立於皇后拜位之右接福胙二人進立於左贊引奏跪皇后跪左右女官皆跪奏飲福酒右女官進福酒皇后受爵拱舉授左女官次受胙如飲福之儀贊引奏拜興皇后一拜興又奏跪拜興皇后行四肅二跪二拜禮妃嬪以下均隨行禮典儀贊徹饌司樂贊舉徹饌樂奏柔平之章樂作徹畢樂止右受福胙徹饌典儀贊送神司樂贊舉送神樂奏洽平之章樂作贊引奏跪拜興皇后率妃嬪以下行六肅三跪三拜禮樂止右送神典儀贊奉帛香饌送瘞司帛詣神位前跪一叩司帛奉篚興司香跪奉香司爵跪奉饌興以次恭送瘞所皇后轉立拜位旁西向起拜褥竢香帛過仍布拜褥復位立典儀贊望瘞陪祀妃嬪公主福晉命婦退贊引奏詣望瘞位樂作恭導皇后詣望瘞位望瘞奏禮成恭導皇后詣具服殿更衣妃嬪隨入便殿更衣樂止蠶宫令恭請神位復御上香行禮如儀皇后還宫宫殿監侍徹交泰殿齋戒牌銅人授太常寺官送寺越日皇后乃率從桑之妃嬪公主福晉命婦行躬桑禮右望瘞禮成遣妃致祭先蠶之禮先二日及陪祀之公主福晉命婦均致齋所司供具如式至日昧爽妃朝服乗輿詣壇清道辟除如常儀至内壝右門降輿入行禮於階下上香贊引壇升降均由東階妃嬪不陪祀不飲福受胙香帛送瘞避立西旁餘如前儀右遣妃儀皇帝遣官致祭先蠶之禮所司供具如前儀至日鷄初鳴遣官朝服詣壇贊引太常寺贊禮郎二人引由壇左側門入行禮儀節與饗先農同右遣官儀皇后躬桑儀嵗季春皇后躬桑前期三日禮部具疏以請皇帝承奉皇太后懿㫖下制報可乃徧布諸司供備内務府豫奏以妃嬪二人公主親王福晉以下縣君鎮國公夫人以上三人文三品武二品官以上命婦四人從蠶採桑掌儀司治桑畦飭採桑鈎筐皇后金鈎妃嬪銀鈎均黄筐公主福晉夫人命婦均鐡鈎朱筐依期畢辦右戒辦皇后既以吉已饗先蠶禮畢蠶已生翼日如蠶未生則視蠶生諏日皇后散齋一日從採桑妃嬪公主福晉夫人命婦畢齋宫殿監侍設案於交泰殿内正中東西肆又設案於左右南北肆率内監至内右門祗候是日執事官咸蠎袍補服黎明内務府官以龍亭一載躬桑鈎筐采亭一載從採桑鈎筐内鑾儀校舁行掌儀司官前導總管暨蠶宫令從由隆宗門至内右門亭止宫殿監督領侍率蠶宫令丞暨内監恭奉鈎筐以次入内右門陳皇后筐鈎於交泰殿中案陳妃嬪公主福晉夫人筐鈎於左案陳命婦筐鈎於右案皆筐左鈎右畢乃奏時皇后吉服出御交泰殿妃嬪隨出侍立皇后先閲鈎次閲筐既徧還宫妃嬪從入宫殿監侍奉筐鈎出内右門仍置各亭内以次舁行出隆宗門鑾儀校接舁前引如初至内務府署旗仗前導導迎樂作奏禧平之章及西苑奉宸苑卿自門迎入蠶宫令分陳於採桑所右閲筐鈎届期蠶宫令率内監潔掃具服殿内外及觀桑臺上下藉以椶薦設皇后觀桑寶座於臺北正中南向供御座鋪陳臺下桑畦東西首行第一株為皇后躬桑位東向執鈎相儀一人在右執筐相儀一人在左東西第二行一株為妃嬪從採位第三行一株為公主福晉夫人從採位第四行一株為命婦從採位執鈎筐蠶婦各二人皆在左右傳贊女官二人在臺南左右北面侍班福晉夫人命婦在女官之南東西面内侍率童監歌採桑辭者十人司金鼔板遂笙簫者二十有四人於臺前東西麾五色采旂者四十人於桑畦外東西分班序立右序位是日黎明蠶宫令啟西苑門從桑侍班公主福晉夫人命婦及執事女官蠶母蠶婦咸蠎袍補服豫至西苑南門内序立祗候辰正二刻禮部尚書内務府總管詣乾清門奏時已初刻宫殿監侍轉奏皇后御龍袍乗輿出宫從桑妃嬪蠎袍乗輿從詣西苑如饗先蠶儀右車駕出宫皇后駕至西苑詣具服殿少竢傳贊分引妃嬪公主福晉夫人命婦就從採位立引侍班之公主福晉夫人命婦就侍班位立執事女官暨童監咸依位序立典儀奏請皇后行躬桑禮皇后出具服殿前引後從如常儀至桑畦北正中相儀女官一人奉鈎跪進於右一人奉筐跪進於左興皇后右持鈎左持筐東行桑畦外采旂招颭臺前内監鳴金鼔歌採桑辭辭詳樂考皇后至東第一株桑前東向採桑一條蠶母二人助採復行至西第一株桑前東向採桑二條蠶母助採亦如之採畢歌止各退皇后以鈎筐授相儀相儀二人跪受於左右興復於龍亭退竢臺隅典儀奏請御觀桑臺贊引對引命婦恭導皇后陞臺御座妃嬪以下採桑各蠶婦一人授鈎一人授筐二人助採妃嬪公主福晉夫人採桑五條命婦採桑九條畢咸釋鈎筐授蠶婦復於采亭妃嬪登臺侍立皇后寶座前左右公主福晉夫人命婦退入侍班位立執鈎筐者皆退典儀相儀各女官歛諸筐次第置於臺南傳贊引蠶母蠶婦至臺前北面跪典儀舉皇后懿筐授蠶母蠶母恭受次舉妃嬪以下從桑各筐授蠶婦蠶婦受訖皆興奉筐至蠶室切之蠶婦灑箔禮成右親桑蠶母以禮成告典儀典儀跪奏皇后駕興贊引對引恭導皇后詣具服殿典儀奏陞座皇后陞寶座傳贊分引妃嬪以下東西序立次公主福晉次夫人次命婦次蠶母蠶婦東位西上西位東上皆北面傳贊贊跪叩興皆行六肅三跪三叩禮退典儀奏禮畢皇后降座陞輿警蹕妃嬪從還宫如來儀公主福晉以下皆退右禮成回宫及蠶成蠶母蠶婦擇繭貯筐以獻皇后遂以獻於皇帝皇太后乃擇吉日皇后行繅三盆手禮採桑妃嬪從繅是日乗輿出宫警蹕如常儀至織室繅盆前妃嬪侍立蠶母漬繭於盆以手出緒握其總跪進皇后皇后受總親繅三少退立妃嬪進繅以五為節遂布於蠶婦之吉者使繅禮畢乗輿還宫警蹕如來儀右獻繭繅絲皇朝文獻通考卷一百二
