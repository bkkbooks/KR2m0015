body:
  text: 市糴考一臣等謹按馬端臨市糴考其言市政也曰均輸曰市易曰和買皆本於泉府之法所謂以市之征布斂市之不售貨之滯於民用者是也其言糴政也曰常平曰義倉曰和糴皆本於平糴之法所謂穀賤不傷農穀貴不傷人者是也葢古之立法者曰滯於民用則官買之糴之適於民用則官賣之糶之原以酌盈劑虛曲為貧民之地而後之泥古者乃至置平準立五均配折帛興和市漢之均輸宋之青苗皆以泉府藉口而泉府之意併失矣自唐始以和糴充他用至於宋而邊儲軍餉悉仰給之逮熙豐而後又有結糴寄糴俵糴均糴博糴兑糴括糴等名皆以常平藉口而常平之意併失矣原其始意未嘗不欲抑富賈居竒之謀而其既也則官自效商賈之為而利其積粟之入宜端臨之與和買和糴併為一編也夫萬古不易之法惟聖人能行之洪惟我國家列聖相承以時乂厥庶民法制精詳度越前古自順治元年即奉諭㫖将前朝召買糧料諸弊盡行蠲除自時厥後凡市糴皆因商民所便時地所宜度物貨平市價勸商賈敦節儉抑豪强禁科派通工易事經邦柔逺其在各直省則設有常平倉鄉村則有社倉市鎮則有義倉近邊則有營倉瀕海則有鹽義倉又復以時布截漕之恵定勸輸之法時以糶糴筦其出納取贏散滯出陳易新鉅細有章逺邇一體皇哉兹實食貨之常經王道之大源自古恵民之政未有如今日之􅋀實而周備者也臣等續修五朝市糴考因宋末元初猶沿市易司平準庫之遺是以仍依馬端臨舊目編列今則並無所謂均輸和買和糴各名目既無其事自合芟去舊目悉依昭代實政按年謹書較若畫一用昭萬民樂業百物阜成垂示無極焉首編市次編市舶互市又次編糴其闗税茶馬諸制則具詳征𣙜考兹不贅入至於常平義社既實見於卷内亦不復臚為目云凡五卷市順治元年定貿易人參例諭户部比因東來之人借鬻人參名色擾害地方特行嚴察究治但小民恃貿易為生未便禁止惟當設立科條使之遵守以後人參止許於南京揚州濟寧臨清四處開肆貿易一應滿漢人民或商或賈各聴其便儻市易不平致行搶奪以及虧值勒買等項地方官即執送京師治罪二年禁止各荘頭人勒價强買先是令各荘頭人若採買芻糧定於民間開市之日著一人率領同往餘日毋得私行至是復奉諭㫖我國家荷天庥命底定中原滿漢官民俱為一家所以分給田廬原欲資其生養彼此交利貿易宜公今聞各處荘頭人等輒違法禁勒價强買少不遂意即恃强鞭撻甚至有揑稱土賊妄行誣告且狡猾市儈甘為義子豪僕種種不法殊為可恨爾部傳諭各處撫按道府州縣各官不論滿洲及滿洲家漢人若有違法犯罪者即送來京如滿洲恃强不服拘拿即識其姓名居址赴京控告便差人逮問若地方官不能稽查即屬庸懦溺職刑部官有所徇縱即屬挾私誤公國法具在但不許聴無據虚詞妄行具奏爾部可速刋示通行曉諭俾新舊兵民各安生業共享太平又奉諭㫖往年市賣紬緞等物皆寛長棈密近來人心姦巧希圗射利概多短窄鬆薄以致民間徒費錢財無禆實用爾部移文内院督臣傳諭江寧蘇杭各處機房商賈以後織造市賣紬緞等物務要寛長合式精密堪用如仍前短窄鬆薄查究治罪四年撤回廣東採珠差官兩廣總督佟養甲言粤東雷亷二郡素稱産珠僅有池九亷八雷一皆在洪濤巨浸中取珠之法例用長繩數百丈縋蜑户入海底毎果鯨鱷之腹而得珠多寡有無尚未可知是取珠甚難也前朝萬厯年間宦者李敬開採毎年協助夫銀不下巨萬是所費又甚繁也向在無事之時尚且得不償失况今蹂躪之餘豈堪重有此舉乞皇上俯念瘡痍緩其開採寛一分之民力則培一分之元氣矣得㫖覽奏知採珠不便於民差官著即撤回五年禁止諸王府商人及旗下官員家人外省貿易六年停止各省貿易人參時以各省賣參人役地方官民商賈甚受擾害勅令永行禁止不得仍前遣往各省發賣止許在京均平市易永為定例違者重罪不宥其採參人丁并行酌減若於額外多遣者其所遣之人入官如官員人民私行採取人亦入官伊主治以重罪仍於山海闗設人稽察八年停止陜西買辦皮張定山西解潞紬例先是山西長治髙平二縣嵗織潞紬三千匹至是頒定式樣每匹長五丈濶二尺五寸酌定價銀十三兩嵗織一千四百七十九匹康熙六年題准減去大潞紬一百匹改織小潞紬四百匹長三丈濶一尺七寸至十四年又議准大小潞紬各減去一百匹十七年題准毎匹核減銀五錢十三年戸部以江南採買布匹粗惡令入覲官帶回另買詔以發回另買恐致累民令該部将解到布匹酌議價值另用十七年禁止滿大臣霸占行市木場時内大臣伯索尼遵諭上言聞各省商民捆載至京者滿洲大臣家人出城迎截短價强買如此則商人必畏縮而不敢前甚非盛世所宜有也邊外之木皆係商人僱民採伐水運解部除照額抽税外其餘悉令發賣實欲利及商人今聞諸大臣将採木地方私行霸占以致商不聊生並請嚴行禁止從之康熙五年諭户部近聞内外姦棍違禁妄稱顯要名色於各處貿易馬匹緞匹及各項貨物河路霸占船隻闗津恃强妄為此皆該管官瞻徇怠玩所致以後如有此等仍前指稱王貝勒輔政大臣及内外大臣名色招揺肆行者地方官必嚴察拿獲送部從重治罪如地方官仍踵故轍不行緝捕或别經發覺或旁人出首将其貿易過地方不行緝捕官從重治罪爾部即行嚴飭六年禁止四川湖廣江西浙江江南五省採辦楠木官役借端累民從户科給事中姚文然請也又嚴察福建廣東江南三省採買香料借端累民之弊七年定河南布花價值折解之令時河南巡撫張自徳以折解布花價值數目具奏有㫖令户部核議減折尋議准照毎年時價折解如有冒徵侵蝕之弊該撫指名題叅九年議定部駁核減銀兩出自民間辦買者概行給還户科給事中姚文然言各省辦買豆米草料等項俱當官發價其藥材銅鐵絹布絲綿白蔴魚膠顔料等項俱係民間辦買交官價係官發則部駁核減銀兩自應追還貯庫若出自民間駁減之後仍追銀貯庫實為重困請嗣後将減價銀兩概行給還下部議行十四年禁里攤之弊户部議湖廣道御史郝浴奏言招買軍需名為市易實係里攤比及發價或貪官層扣或蠧吏互侵未必盡得實價嗣後軍需糧料如小民情願抵納正賦者即行給與印票儻有里攤情弊該督撫據實指名題叅嚴行處分應如所請從之十五年定文武官市買軍需浮冒開銷處分時軍前所用米豆草束諸項自将軍以下有自行販賣囑託地方官多取價值浮冒開銷者亦有地方官販賣支放多行開銷者有已備本色不行收納折價入已者有民間運到米豆草束地方官遲延掯勒及至軍前又刁難解官恣意需索者至於購買馬匹不開實價情弊種種王大臣等遵㫖議大小文武官備辦軍前草束米豆等項有營私射利浮冒開銷者照貪官例問罪該管官知而不舉亦以其罪罪之能從旁舉首者職官准應陞先用旗民授為七品官從之十八年定包衣下人王貝勒貝子公大臣家人霸占闗津生理之罪先是上諭諸臣曰包衣下人及諸王貝勒大臣家人侵占小民生理所在指稱名色以網市利所闗非細至是九卿等遵㫖議色衣下人王貝勒貝子公大臣家人領貲本霸占闗津生理倚勢欺凌者在原犯事處立斬示衆該管官革職若係宗室王以下公以上家人親王罰銀一萬兩郡王罰銀五千兩貝勒罰銀二千五百兩貝子罰銀一千三百兩公罰銀七百兩仍交宗人府從重議處其管家務官俱革職若係民公侯伯大臣官員家人将伊主俱行革職汛地文武官不行查拿者俱革職至王以下大臣各官将銀借貸與民指名貿易霸占地方者亦照此例治罪從之十九年以藩下人霸占廣東市利諸弊特諭侍郎宜昌阿等曰廣東所有大市小市之利經藩下諸人霸占者無算可㑹同巡撫詳察應歸百姓者題明仍歸百姓藩下所屬私市私税毎嵗所獲銀兩當盡充國賦以濟軍需二十二年定渾河運木至天津貿易例奉天将軍伊巴漢等言臣等遵㫖差官三路勘驗渾河根源如運放木植俱可入海應徧行曉諭八旗并府州縣有情願至天津貿易者該部給發執照准其貿易有借此夾帶禁物偷打貂䑕私刨人參等物者嚴行禁止從之二十四年以光禄寺估計價值等項頭緒甚多勅令各物俱照時價詳察估計釐剔諸弊逐一定為條欵永久遵行二十五年停止四川採運楠木九卿等議入覲四川松茂道王騭奏四川楠木採運艱難應行停減得㫖蜀中屢遭兵燹百姓窮苦已極朕甚憫之豈宜重困今塞外松木材大可用者甚多若取充殿材即數百年可支何必楠木著停止川省採運又停止直𨽻採辦狐皮巡撫于成龍言請将直隸毎年辦解狐皮改為折色上曰地方採買狐皮一倍費至十倍故百姓困苦此後俱著停止應用狐皮令户部在京採買二十六年令估計採買物料皆依時價諭大學士等曰各項採買估計價值前浮冒欺飾者甚多是以令其核減今所減者太過恐致苦累可令察訪時價度量估計又諭凡諸修造工程其估計在前修造已完者仍照原估銷算二十七年清釐江西採買竹木之弊巡撫宋犖言江省毎年採買竹木名為官捐實係累民請嗣後動支正帑並嚴禁科派採買勒掯經收等弊從之三十二年停減各省解送物料户部遵㫖上言各省解送物料共九十九項京中無貨買之物應令照舊解送外查所解印書紙張庫内現有存貯白銅無應用之處應停其解送青粉等三十八項價值并脚價合算比在京師較貴應停其外解照時價在京採買應用或遇時價騰貴辦買不得者具題行令出産處解送從之三十八年令皮張沈香等量用採買餘悉停止諭大學士等曰毎年所買皮張儘足供用多買亦奚用耶即如朕内用沈香毎年二百斤用尚有餘今辦解者已過數倍此等物件俱令察明量用採買其餘無用者悉停之四十三年勅部造鐵斛升斗頒發直省先是上諭大學士九卿等曰各省民間所用斗斛大小各别此皆牙儈平價之人牟利所致又升斗面寛底窄若少尖量即致浮多稍平量即致虧少弊端易生職此之故嗣後直𨽻各省斗斛大小應作何畫一其升斗式樣可否底面一律平準至盛京金石金斗闗東斗亦應否一併畫一爾等議奏於本年五月大學士九卿議查順治五年户部将供用庫舊存紅斛與通州鐵斛較紅斛大鐵斛小将紅斛減改永為斛式順治十二年鑄造鐵斛二十具一存户部一貯倉場直𨽻各省皆發一具今應令工部照部中鐵斛鑄造七具分發盛京順天府五城外其升斗俱改底面一律平準各造三十具分發直隸各省永逺遵行盛京金石金斗闗東斗皆停其使用從之至是復諭大學士及户部尚書等曰户部呈樣之斛與升斗朕俱注水詳加測量其樣升上下四角寛窄不均算積數見方得三萬一千三百八十二分有零其樣斗上下四角寛窄亦不均算積數見方得三十一萬六千七百六十四分有零其樣鐵斛算積數見方得一百六十萬分其數不相符查性理大全嘉量篇第十二内毎斛積一百六十二萬分與今之鐵斛較多二萬分因鐵斛用之已久不可輕改是以依今之鐵斛五斗為準造新樣斗一具方徑八寸深五寸積數見方得三十二萬分又造新樣升一具方徑四寸深二寸積數見方得三萬二千分若依此樣十升一斗五斗一斛毫釐不差諭畢因出新様銅斗升付户部堂官等令照式以鐵為之臣等謹按帝王均平天下治莫先於律度虞書王制若合符節而所謂同之正之者其法不傳我聖祖仁皇帝天縱生知特取部造斗斛親加測量酌古準今垂為定式於是五量用嘉允臻其極矣又革除私設牙行户部議御史張蓮疏言貿易貨物設立牙行例給官帖使平準物價乃地方棍徒於瓜果蔬菜等物亦私立牙行名色勒掯商民請令部查税課定例一切私設牙行盡行革除應如所請從之五十四年定採買銅鉛之例九卿遵㫖議寶泉寶源二局需用銅斤請匀交江南等處八省巡撫擇賢能官動正項採買鉛由户部發銀給商人採買現今寶泉局銅少不敷鼓鑄所買銅鉛令其四月交一半九月全完嗣後俱照此例從之臣等謹按採買銅斤暨疏通錢價各條有闗市易行使謹載入市門至於禁用銅器収買小錢廢銅各條事闗鼓鑄則别載錢幣門兹不複入五十九年禁止河工採買短價之弊工部議准吏科給事中紀遴宜奏河工所需草束河㕔差役向民間採買不無借端擾累嗣後凡置辦工料請嚴飭㕔員協同地方官購買不得短價多收令民運送如有累民之處或經首告許該地方詳報總河督撫據實題叅如總河不行題叅經督撫題叅者将總河及道員等俱照徇庇例議處六十一年禁諸王大臣家人爭買草炭奉諭㫖外間草炭價值騰貴其故皆因諸王阿哥及家貲豐裕大臣等令家人出城邀截居積待價冀獲重利家人復揑增原價以圖肥己此等情弊朕所洞悉嗣後凡草炭運至局厰聴買用外不得仍前逺迎争買該部嚴行傳示倘仍蹈前轍令官兵即行緝拿雍正二年諭各省採辦木植俱著該督撫遴選賢員照民間價值給發不許絲毫剋扣仍著該督撫等時時留心訪察倘稍有不遵諭㫖之處将督撫等一併從重治罪六年嚴禁承辦軍需剋扣侵蝕之弊奉諭㫖向來預備軍需如採買驘馬製辦物件之類不肖有司往往虛耗國帑派累民間種種弊端朕知之甚悉已降㫖屢行飭禁而今年預備進蔵軍需仍有甘屬金縣王錫九等剋扣價值經岳鍾琪題叅議罪是此風尚未全改也朕愛養斯民不使絲毫擾累凡軍務所需悉動帑金照時價購辦又恐承辦官預留将來核減之地稍借民力以助公事特令岳鍾琪等核定折中價值倘時價可減即為節省或定價不敷據實奏加此皆體恤官員撫綏黎庶之至意也倘嗣後承辦各員再有剋扣短發侵蝕之弊其罪誠不可逭矣若叅革後必俟審擬定案方行著追則該犯之銀物或至花費隠蔵而百姓守候補領未足之價值必累月經年而不能得深可軫念以後若有此等劣員一經題叅摘印即照數核明剋扣之價先動軍需銀兩另委賢員傳集百姓如數我給造册具報仍将該員於本境枷號勒限一月追完分别還項補帑如再逾限不完嚴加治罪庶貪墨之人知所儆懼而軍需有益民無擾累之虞矣九年令八旗五城設局兑換錢文以平市價御史王羾言京師春初米價稍昂䝉恩軫念民食特諭五城添設米厰減價糶賣羣黎無不均沾聖澤但定例五城糶賣概用錢文交貯户部目下錢價雖未髙昂祇恐将來錢文積聚必至價昂查户部毎月給放兵丁錢糧原有搭放錢文之例可否於定例外暫増分數将五城交貯之錢配入搭放俟米厰停止仍照前例奉諭㫖錢文乃民間日用必需之物向以價值昂貴屢厪皇考聖心數年以來朕備極焦勞所以為便民利用籌畫經理者亦殫竭心思矣惟是欲價值之得平若遽繩以官法又恐有生事滋擾之弊發米平糶以濟民食而令交納錢文本是便民之意今王羾又稱收錢既多則錢價必致漸長此亦事之所有不可不慮朕思錢價之不能平減者因兑換之柄操於舖户官府不司其事是以小人圖利得任意多取以便其私耳若照五城減價糶米之道将搭放兵餉之錢文令八旗於五城各設一局兑換與民照舖户之數多換數十文以銀一兩換錢一千文為率如此則錢價不待禁約自然平減於民用似有禆益復諭八旗都統等八旗所設錢局倘定價太賤則射利之徒賤買貴賣就中取利反生弊端今比民間價值毎兩酌賤十數文逐漸減至毎兩換大制錢一千文止其隨時減價之處八旗務須畫一辦理并知㑹步軍統領及察旗侍衛叅領等留心察訪爾等亦不時稽查又議定疏通錢價應行應禁事例户部遵㫖議言一民間錢多則價賤錢少則價增應令提督府尹五城御史不時稽查其有販運出京及囤積居竒者即行拿究一五城十厰糶賣成色米所得錢文發五城錢舖照定價九百五十文兊換俟此項兑完即令官錢舖将所換銀兩照時價收錢循環流轉至八旗米局糶賣錢文亦交本旗錢舖照五城例循環收換一兵丁月餉現在一九搭放今戸部卯錢及五城賣米等錢共得二十四萬餘串官錢舖既有銀兩兊換不必於庫内再發則八九十月餉錢皆可以二成搭放俟十一月以後仍照舊例行一八旗五城現有錢文并所賣成色米之錢定價毎市平紋銀一兩換大制錢九百五十文俟市價漸增官價亦漸增以銀一兩合大制錢一千文為率不得因市價而遞減一京城内有姦民勾通經紀預發本銀於大小舖户收買制錢多蔵堆積俟錢貴始行發賣名為長短錢應嚴行查禁從之又飭各省文武官所賞給兵丁營運生息銀兩毋與小民争利兵部覆准雲貴廣西總督鄂爾泰奏恩賞各省兵丁生息銀兩足資營運必須公平辦理如有将營運銀或占百姓行業或重利放債與商賈小民爭利者将出納官弁照騷擾地方索詐部民財物例治罪該上司照失察屬員貪劣例議處十年令肅州開採硫磺并禁私販大學士伯督巡陜甘經畧軍務鄂爾泰言武備軍威火器最重火藥宜精惟是揀材置料硝易而磺難硝賤而磺貴必赴外省採買運費工價未免浩繁肅州極邊毎磺一斤價值一錢至二錢不等軍需要地接濟維艱查肅州嘉峪闗金佛寺堡之所管汛地内南山隘口抵朱魯郭迤邐而西有硫磺山一座周圍四五十里遍産硫磺環山逺近並無番夷住牧若委員開採依法煎熬合算人工運費毎净磺一斤值不過五分而出産甚多用之不竭不獨便利軍需亦足接濟陜甘兩省標營需用事闗邊陲武備現與劉於義面商委員經理一面先支銀數百兩交總兵沈力學作本開工理合奏聞得㫖開採硫磺固於軍需有益但行之日久不無私販盜賣之弊著署督劉於義飭令總兵沈力學派兵防䕶實力稽查俟開採足用後奏聞請㫖十一年令直省督撫酌定牙帖額數報部凡城市鄉村通商之處陸有牙行船有埠頭並選有抵業人户充應官給印信文簿附寫客商船户住貫姓名路引字號物貨數目毎月赴官查照不許私充雍正二年有言各省牙帖之弊者畧謂小民趂集交易乃數百文數十文之事藉以營生餬口而地方光棍自呼為經紀百十成羣逐日往州縣中領牙帖數十紙毎紙給銀二三錢不等持帖至集任意勒索不論貨物大小精粗皆視賣之盈縮為抽分之多寡名曰牙帖税少與齟齬即行驅逐不容陳設於街道此積弊也於是令各省藩司查明禁止至是諭各省商牙雜税額設牙帖俱由藩司衙門頒發不許州縣濫給所以防増添之弊不使貽累於商民也近聞各省牙帖嵗有增添即如各集場中有雜貨小販向來無藉牙行者今概行給帖而市井奸牙遂恃此把持抽分利息是集場多一牙户商民即多一苦累甚非平價通商之本意著直省督撫飭令各該藩司因地制宜著為定額報部存案不許有司任意增添嗣後止将額内退帖頂補之處查明換給再有新開集場應設牙行者酌定名數給發亦報部存案庶貿易小民可永除牙行苛索之弊矣又奉諭㫖硝磺為軍器火藥之用例禁甚嚴聞河南地方有出産熖硝之處小販經紀往往以雜物零星易換赴隣省售賣現據湖北各屬盤獲甚多朕思河南之硝既私行於楚北則其私行於附近各省更不待言著該督等飭令各屬實力查禁不得仍蹈前轍十三年禁止淮安土棍代僱船載江南淮安板閘地方向有土棍開立寫船保載等行由縣請司帖合夥朋充為客商之擾累後經追帖禁止而土棍等仍盤踞淮闗上下凡河路豆米貨船有重載至闗口須用小船起剥者輒恃强代僱任意勒索行旅苦之至是奉特㫖飭令該督撫嚴行禁止布政司不得濫給牙帖若他處闗口有似此者該管督撫一體查禁又禁河工封捉客船河工官員毎於装運工料差役封船胥役借端騷擾及三汛搶工則稱装運𦂳急物料甚至将重載之客船勒令中途起貨以致商船聞風蔵匿奉諭㫖河工装運物件原有額設浚船即使搶築之時浚船或不敷用祗應僱募本地民船協濟運送原不必封捉客船阻遏商旅著河道總督飭令所屬河員嚴行查禁又諭㫖自古地方官員有進獻方物之禮葢以将其誠意而為君者鑑其意而酌納所以篤堂亷之誼聫上下之情也朕即位以來亦循照舊例間有進獻珍寳古玩者朕概降㫖停止鎮臣中亦有隨督撫進獻者朕皆諭止之至於所獻之物備隨時賞賜内外臣工以示家人一體之意並非朕所需用而收貯内府也雖臣之効忠於上君之加恩於下不在乎此然亦儀文禮節之一端所以厯來未廢凡為督撫者既以此将其誠悃則當厚其價值俾官民歡欣從事方為事君盡禮之實心乃朕向聞有恃上司體勢發價減少者以致民間視為畏途如榆次不敢種好瓜肅寧畏植好桃外間傳為話柄近聞福建採買甘果有短價累地方官民之處則與君臣聨接之本懷大相違背朕豈肯為此無益之儀文而令承辦之㣲員貿易之百姓或受擾累哉以貢物而累及閭閻萬萬不可即或交與屬員代辦而令其暗中賠補是又假公濟私收受賄賂之巧術也似此食用㣲物朕發價市買何所不得豈肯絲毫累及地方可通行曉諭自接奉此㫖為始著将從前貢物之數再減一半倘仍蹈舊轍朕必将各省貢獻之例全行停止乾隆元年禁止商人增長物價巧取兵丁營運銀兩奉諭㫖朕因八旗兵丁寒苦者多再四思維特命借給官庫銀兩俾伊等營運有資不憂匱乏伊等自應仰體朕心諸凡撙節以為久逺之計乃聞領銀到手濫行花費不知愛惜而市肆貿易之人惟利是圖将紬緞衣服等項增長價值以巧取之獨不思兵丁商賈原屬一體兵丁用度寛餘則百貨流通商人可獲自然之利是國家之加恩於兵丁未嘗無益於商賈也何得昧其天良使窮苦兵丁暗中受其剥削縱國法不便遽加亦當各自猛省著順天府五城通行曉諭商人並令八旗大臣等教訓兵丁咸使聞知二年申嚴商人居竒勒價之禁御史明徳言姦民富户囤積錢文勒價昂貴請勅下嚴查從重治罪諭㫖上年八月朕加恩八旗官員兵丁借給一年俸餉而京師錢文貨物一時昂貴彼時即降㫖曉諭令其省改目下朕又加恩借給八旗兵丁半年餉銀以厚其生計乃帑銀尚未領出而錢物價已驟長此等商民竟不凛遵從前諭㫖而惟以圖利為心是不奉法之姦民矣殊不知兵民原屬一體貿易亦應公平況兵丁以銀易錢易貨商賈營運得以流通即照常市賣亦儘可獲子毋之利何得借以居竒不知饜足致國家加恵兵丁之善舉竟為姦民等所阻其罪誠不可逭矣朕思伊等商民既具有人心則天良未冺尚可望其省悟著步軍統領順天府尹五城御史多方曉諭速令悛改如仍蹈故轍則國法難寛即照該御史所奏從重治罪如兵丁等因此諭㫖有向舖户短價强買者亦必重治其罪三年定宣屬採辦楊木長柴報銷之例奉諭㫖直隸宣化府屬懐來保安二縣採辦楊木長柴供郊壇宗廟焚帛之用向無開銷之例俱係兩縣捐資繼因添用柴薪又分派宣屬他縣協辦相沿已久朕思州縣公捐已啟借端科派之弊不可不防其漸著從乾隆三年為始将毎嵗需用楊木長柴按照辦解之數動用正項造入地丁册内報銷令出産之懷來縣承辦以専責成倘有私行派累等弊該督即行查叅從重議處又令東豫二省採買黒豆運通以供支放奉諭㫖八旗喂養馬駝黒豆在所必需今户部因倉貯豆少請毎月減半支放朕念若兵丁等自行添買不無多費且在京收買恐市價益復髙昂今年山東河南兩省收成尚好應於山東採買五萬石河南採買三萬石共八萬石足敷支放著該部行文東豫二省巡撫酌量地方情形動支正項錢糧分令各州縣採買嚴禁短價病民及胥吏侵蝕等弊務須於河凍之前委員運送抵通勿致有悮臘月以後支放之用其豆價并脚費等項仍造册報部核銷又嚴牙行侵吞客商資本之禁先是安慶按察使張坦麟言牙行侵吞客商銀兩雖值農忙亦准告理追給奉㫖發與各省督撫閲看回奏至是大學士管川陜總督查郎阿議應如所奏定例通行又西安巡撫張楷議亦應如坦麟所奏但牙行領帖時應令地方官查明取具保隣甘結不得濫行給發奉諭㫖張楷所奏更為詳悉下部議行四年奉諭㫖昔我皇考恵愛商民恐州縣牙行嵗有增添以致姦棍争奪抽分利息為閭閻之擾累於雍正十一年特諭令直省因地制宜著為定額報部存案不許有司任意增添所降諭㫖甚明近聞江蘇各屬於額帖之外陸續請增者一縣竟有數十張以致百餘張不等此必州縣官員才識短淺聴信吏胥播㺯借新開集場准其添設之例或舊集而揑為新設或裁牙而混詳改充徒使貿易小民受其苛索莫可伸訴江蘇如此則各省亦必皆然著該部即通行各省督撫該地方果有新開集場應設牙行者由府州核實詳司給發牙帖如非新開集場而朦混請添者即行題叅從重議處至五年議定清釐牙行之例向例每行認充經紀取具同行互保一人出具殷實良民甘結該管官加結送司給帖充應互結雖有殷實字樣而互保之責成未經議及今定舖家拖累商人者将本牙行帖追繳勒限清還仍行給與若係牙行誆騙商人者将互保行帖一併追繳勒限清還本牙更換互保行帖仍行給與倘逾限不完将互保之人一併更換牙行惟圖用錢任舖户坑騙客商者除逾限不完将牙行革退外仍将舖户責限追比其不足之項令牙行賠補牙行侵吞客帳者除逾限不完将本牙互保一體斥革外仍将本牙責限追比其不足之項令互保攤賠其追比之限期按欠數多寡酌定至於以後客之貨那補前客之欠移弱客之貨代償强客之欠該互保先行舉首免其治罪容隠者責令分賠牙行夥計人等侵吞客帳總照牙行侵吞之例追帖賠補本年又奉諭民間懋遷有無官立牙行以評物價便商賈其頂冒把持者俱有嚴禁近聞外省衙門胥役多有更名揑姓兼充牙行者此輩依勢作奸壟斷取利必致魚肉商民被害之人又因其衙門情熟莫敢申訴其為市㕓之蠧尤非尋常頂冒把持者可比所當亟為查禁嗣後胥役人等冒充牙行作何定例嚴禁及地方官失於查察作何處分之處交該部定議具奏尋議定胥役更名揑姓兼充牙行者杖一百徒三年誆騙客貨者枷號一個月發附近充軍地方官失察者罰俸一年徇縱者降二級調用受財故縱者計贓論罪臣等謹按牙即古互字書如㸦古稱駔儈亦謂互市郎葢通知交易所以便商故帖不可闕而盤踞滋弊亦即以累商故禁不可不嚴我國家利民阜物凡厥懋遷之規罔弗釐正而於牙行尤為法制詳備革除私設以杜掯勒嚴懲侵噬以安商旅核定額數以免濫增禁止冒充以防壟斷其給帖則有藩司以稽州縣之弊復有部册以權各省之宜其交貨則舖户不得累及商人互保亦不得徇庇行户上下相糾主客相制用以抑强扶弱通百貨而康兆民猗歟休哉五年定各省開報物料價值之例先是奉諭㫖據工部奏稱直隸山東甘肅等省開報城磚石灰等項價值較原定之價或少一倍或少數倍前後多寡甚覺懸殊請将原定價值浮多欵項行文各省督撫確查本處實價一一更正凡類此等欵項一并查改報部等語朕思今日開銷之價值既大減於前則從前所報之價顯係浮開工部何以不行指叅而但請行查改正夫前此所開之價既不足憑則此番改正之價又豈可以為據乎假有狡猾之人以開價少者為錯悮多者為實數該部又何以辨其虛實邪總之百貨價值原屬隨時增減各省不同一省之中各郡縣亦不畫一今預定數目永逺一例遵行則價賤之年必有餘貲以飽官吏之私槖弊在侵漁錢糧為害尚小若價貴之年採辦不敷勢必科派閭閻弊在苦累百姓為害甚大惟在各省督撫留心訪查詳確綜覈既不使承辦之官員恣意浮冒虛糜國帑又不至苛刻從事過於減少貽累官民庶為公平之道又豈預立成式所能杜絶弊端乎其應如何酌量定例之處著大學士九卿㑹議具奏尋議雍正八年因各省題銷事件未有一定成規止憑頂案銷算頂案不能畫一胥吏得以上下其手經工部奏請行令該督撫等将修造工程緩急物料貴賤悉心查訪市價題明定議嗣據各該督撫等陸續造册具題經九卿㑹議題准頒行并聲明嗣後時價偶有低昂必應増減者於奏銷案内據實聲明在案臣等請将各省所造册籍仍存工部以備叅考嗣後凡一應修建工程不必拘泥定價所需物料令承辦各員悉照時價確估造報工竣之日另委員查勘取具並無揑飾印結詳報該督撫等詳細核明據實題咨到日工部再行核銷倘承辦各員浮開揑報該督撫即照冒銷錢糧例指叅如所委員查騐不實亦即以扶同徇隠例叅處至京城物料以及顔料等項價值定例有年復於雍正十二年經工部㑹同内務府確訪時價酌中更定似無過寛過刻之處即時價倘有低昂亦令承辦之員據實聲明工部就近查訪酌量辦理從之又奉諭㫖寧夏供支滿兵糧草向係毎年採買散給共計白米一千五百餘石粟米七千餘石草一十三萬餘束其所定部價白米粟米每石價銀一兩草一束價銀一分今聞該地方自上年被災之後新寶二縣田地被水渰没不能耕種已少産米糧數十萬石目下糧草之價日覺昂貴所定官價恐不敷採辦勢必貽累小民著将乾隆五年應支滿兵糧草白米毎石加銀一兩粟米毎石加銀五錢毎草一束加銀一分如此則價值增添官民易於辦理但係格外之恩後不為例該部可即行文該督撫知之七年仍設錢牙以平錢價并定禁止囤積之數歩軍統領舒赫徳言京城各項貿易俱設立官牙經紀領帖平價錢文一項向設經紀十二名乾隆三年御史陶正靖等條奏裁革嗣是囤錢各舖無人說合轉致居竒請照舊設立官牙十二名領帖充當責成該牙等議平錢價再舖户囤積錢文向有例禁未經核定數目仍屬虛文今酌議除當舖外各項舖户所買大制錢積至五十千文以上者即令赴市售賣如敢囤積勒價或經查出或被人首告即将一半賞給查出首告之人一半入官疏下大學士等議尋議交與順天府尹令大宛二縣召募老成殷實之人照舊領帖充當如有舖户居竒髙擡價值等弊責成官牙等嚴切曉諭務令平減該牙等倘敢從中壟斷或别生事端該管官立即查拿並令五城御史一體稽查八年奉諭㫖上下兩江上年被水地方已經漸次涸出東作方興有資牛力凡民間買賣牛隻者俱聴其自相論價交易不許牙行從中需索有司亦不得視為細事一任胥吏侵蝕中飽十六年令将平糶錢文照市價酌減以平錢價時順天府四路發米平糶所糶錢文經御史李文駒奏准上届四萬四千石之數易銀解部此畨十萬石即将錢文解部毋庸易銀至是順天府蒋炳言各厰官員惟恐多貯錢文致長錢價已經多方銷售不能仍存所糶之數請令各厰總以現存之錢儘數解部其已經易銀即将銀解部更屬簡便奉諭㫖平糶錢文前據軍機處議覆御史李文駒條奏請解部搭放兵餉今該府尹等既奏稱不及十萬串為數無多且待至搭放兵餉轉不能即速流通著不必解部陸續交與八旗米局令其照市價稍為酌減以平市價俾錢文不至壅滯十九年議定鉛厰通商之例雲南巡撫愛必達言滇省採銅俱係官發工本除抽課外所獲餘銅官為儘數收買以供鼔鑄例禁商販偷漏其卑塊普馬者海等鉛厰向係厰民自備工本採辦各局鼓鑄錢文止照額用之數收買運供其餘概不置議與辦銅事例不同近年各厰産鉛旺盛除供買配鑄之外又奏准於卑塊厰毎年收買餘鉛二十五萬斤留備鼓鑄若照辦銅之例官為儘數收買所需工本銀兩一時難以歸欵若令僅照官買供鑄備鑄之數按年採辦不特勢有不能更恐無以資其生計轉滋營私偷漏之弊請嗣後各厰採辦鉛斤先儘官買額數其餘所出之鉛按例一體抽課無論隣省本省准令厰民自行通商由布政使編發印票存厰臨時填給不許票外夾帶有私買私運者罪之部議應如所請從之二十一年定各省赴山西附辦民用磺斤之法先是江南湖北二省赴山西買磺除官用磺斤外各具文另買民用磺二三萬斤帶回至是部議巡撫明徳奏磺斤一項各省民間所必需如銀匠藥舖薫布薫帽煎煉銀硃取燈花炮之類在在需用若各省買用官磺零星賣與民間則奸民私販之弊不禁自除請行令不産磺斤各省督撫轉飭各州縣将該地方銀匠藥舖等項毎年需用硫磺若干查明定數照江南湖北例於採買官璜時令該舖等出具鄉地隣佑保結繳價報官附近運回分給應用其晉省各州縣亦照此例辦理從之二十六年准甘肅臯蘭縣採璜先是十一年甘肅巡撫黄迋桂請於臯蘭縣屬之騷狐泉開採硫磺運交蘭州府衙門存貯凡滿漢各營需用俱就近領買得㫖允行至是陜甘總督楊應琚言從前採貯之磺僅存四萬餘斤不足資用而騷狐泉磺自封閉後磺砂旺盛請照前例責成蘭州府招商開採部議應如所請辦理并交伊犂烏魯木齊各該處辦事大臣留心體訪向來産磺處所一體查明採購或附近地方所産亦可採取運往以省内地辦運從之二十七年閏五月准江蘇辦解布疋工價以五錢核銷巡撫陳宏謀言辦解布疋工價既昂毎疋五錢難以再減部議以辦解布疋定有額價該撫所奏與原編定額不符駁令核減奉諭㫖此案辦解棉布毎疋定有原編額價該部自行核駁但據該撫稱現在花紗工價既昂著照所請暫准以五錢核銷将來一俟物價平減即令照舊額辦理又議将五城平糶錢文換銀繳部以平錢價時因五城設厰以米豆平糶所收錢文俱交戸部御史平治奏請将各厰所糶之錢兑換銀兩繳部以平錢價經大學士等議准并議從前平糶錢文俱准市販錢牙易銀交庫因恐奸牙囤積居竒於民間仍無禆益是以奏明交與步軍統領衙門出易及工程處給發工價令一面招商易換一面於土道工程處仍照從前舊例通融辦理調劑市價毎南市錢平紋銀一兩二錢易制錢一千文所易銀兩既係錢平将來交庫時若依庫平收兑未免分兩不敷應仍即照南市錢平交庫查現在户部庫存平糶錢八萬五千餘串又存厰錢一萬三千餘串應即行領出辦理外嗣後毎日各厰所得錢文俱令按數交與步軍統領衙門陸續兊易京城内外有此十萬餘串錢文以資流通而毎日平糶錢文又可源源轉運嵗底錢價自可不至加增至各鄉鎮來京貿易貨物之人售錢者居多若聴其装載四出京城錢文仍未免短少應交各該衙門嚴行稽查除負販小民以貨易錢數在十千以内者准其攜出各門外其數在十千以外者即令易銀攜回不許任意搬運再查向來毎大制錢一千文市例扣底四文近來錢舖竟有短至二十文者此又暗中增價巧於取利之一端臣等酌議毎錢一千准扣底四文不許任意多扣倘因禁止短扣而於銀色平頭暗加多索者仍交與五城御史順天府及步軍統領衙門密訪拿究並得㫖允行二十八年議令湖南採磺備隣省赴買并定官採硝斤之例湖南湘鄉安化二縣山内産煤煤中夾有硫磺從前時開時禁二十五年議准巡撫馮鈐奏委員經管開採煤則聴民買用磺則官為收買至是復議准巡撫陳宏謀奏收買磺斤已届三年共解省磺九萬一千三百六十三斤計湖南各營赴領并湖北赴買毎嵗需用磺不過五千餘斤現在積存磺八萬四千八百餘斤若因積磺已多将礦封禁則禁礦兼以禁煤於民間未便且恐因此民間私自刨煤並設計私煎轉致偷漏私磺查江南各營向係在山西購買路逺費多若赴湖南購買長江一水可達脚費較輕此外隣近各省凡有艱於逺購者均令通咨赴買則磺礦既可常開而私磺自免偷漏又各省軍火需磺少而需硝多而硝出土中惟視天氣之隂晴以定出産之衰旺向來各省多係委員向硝戸零星收買不能一時足數而硝戸轉得潛行私賣是以禁例雖嚴終不免有偷漏之弊應照湖南磺厰現行之法令地方官動支官項於出硝之時即為收買報明收貯官局将所收硝斤數目酌定官價由督撫核明咨令隣省賫價赴買按期運回不需委員守候零星收買所産之硝即歸官局皆為官硝責成地方官設法稽查民間自無私硝可售倘遇出産數多之年亦可聴各省需硝營分多買備儲以資取用但各省産硝地方逺近不同所産之硝亦多寡不一應令各該督撫酌量本處地方情形悉心妥議辦理從之二十九年令湖北需用硝斤准於本省煎運發營湖北各標營毎年需硝五萬四千餘斤向俱委員赴豫購運至是總督吳達善言本省之松滋巴東鶴峯長樂等州縣所産土硝先經煎試足敷應用其運脚之費較前亦有節省且可杜本地奸民偷挖之弊部議應如所請并将官辦商辦各價值及各該處運至省局道里逺近情形妥為籌辦從之三十四年大學士傅恒等議御史屏治請除通州米局積弊應如所請将通州米局永逺禁止不許開設從之三十五年内閣學士富察善奏請停糶麥石専賣麥麩以平市價於民食有益囤積之弊亦不禁自除得㫖允行三十九年諭據袁守侗等奏近日查辦京城囤積於通州馬駒橋沙河等處查有居民囤積各項雜糧至數千石之多請将該民枷責並将米石入官此等漁利奸徒囤積居竒實為民病之蠧自應枷杖以示懲儆所有查出囤積米石若查封入官恐市中缺此糧石流通於民食有礙莫如照順天府上月米長之價毎石再行減價二錢勒令出糶俾民間得以賤價糴糧且使逺近壟㫁之徒聞風警畏不敢再為效尤滋事四十六年奉諭京師開採煤窑為日用所必需近聞煤價比前昂貴推原其故皆因煤礦刨挖日深工本運脚既重窰戸無力開採呈請地方官封閉經工部核題覆准者甚多於民間生計大有闗係現在西山一帶産煤處所尚有未經開採者著步軍統領衙門㑹同順天府直𨽻總督委員前往逐細踹看無礙山場照例召商開採一面咨部一面奏聞以副朕籌計生民之至意四十八年奉諭據閔鶚元奏蘇州官商承辦洋銅除毎年額解六省銅五十一萬餘觔外其多餘之銅俱令一律繳官俟年清年欵之後准該商變賣餘銅等語此項銅觔前因范清濟辦理不善壓欠甚多是以餘銅不准自行變賣今新商王世臣代為接辦若能實力經理趕𦂳轉運所有從前壓欠之項原可陸續帶交況該商王世臣係接辦之人若俟積欠全完始准變賣餘銅該商不能少沾餘利未免偏枯嗣後除毎年額運正項銅觔交清並酌量分年帶交積欠若干外其餘銅觔即准其照舊變賣以紓商力皇朝文獻通考卷三十二
