body:
  text: 國用考六蠲貸上賜復順治元年京城遭明末冦賊蹂躪之後其民居被逼遷徙者免賦役三年被毁未遷者免一年大兵所經田禾被傷者除本年田租之半河北府州縣衛免租三之一二年免河南被冦額賦有差是年山西初復除本年田租之半三年免江南漕三之一其潛山太湖英山霍山諸縣皆除之五年以湖廣岳州辰州諸府為大兵所經宿處免賦有差十一年詔順治六七兩年民間地丁逋賦勿収責十三年詔除順治八九兩年逋賦是年定蠲荒流抵恐惠不下逮令民登填布政司冊以禁濫収康熙元年江西南昌新建豐城進賢奉新靖安五縣浮米及浮米折銀悉除之二年詔順治十五年以前民欠銀米物料皆勿収責四年詔天下逋賦在順治十六十七十八等年者悉除之十年詔巡幸經厯通州以東至山海闗免今年租十九年免江南康熙十二年以前逋賦二十三年恩詔减江南江西浙江湖廣漕三之一二十四年詔免河南湖北今年租及二十五年嵗租之半直𨽻江南被灾之地二十四年秋冬二十五年春夏嵗租悉除之二十五年免直𨽻順天永平保定河間四府四川貴州二省康熙二十六年額賦及今年賦之未入者湖廣福建二省二十六年秋冬二十七年春夏額賦及二十五年賦之未入者亦如之又諭免直𨽻正定順徳廣平大名四府明年田租二十六年恩詔自用兵以來動用錢糧累年未清者皆予除洗又諭免江蘇陜西省明年額賦其今年賦之未入者亦除之二十七年聖祖仁皇帝南巡詔免江南安徽府屬去年田租並諭令康熙十七年以前直省民欠漕銀米麥皆勿収責又諭曰朕南巡至江南境上所經宿遷諸處民生風景較前次南巡稍加富庶朕念江南累年帶徴錢糧恐為民累出京時曽詢户部知全省積欠約有二百二十萬除江南正項錢糧已與直𨽻各省節次蠲免外再將江南全省積年民欠地丁一應錢糧屯糧蘆課米麥豆雜税概予蠲除是年以雲南供億王師勞瘁免二十一年至二十七年逋賦三十年諭曰朕撫御區宇三十年以來夙夜圖維惟以愛育蒼生俾咸臻安阜為念比嵗各省額徴錢糧業已次第蠲豁其嵗運漕米向來未經議免朕時切軫懐所有京通各倉米榖樽節支給數載於兹今觀近年儲積之粟恰足供用應將起運漕糧逐省蠲免以紓民力除河南省明嵗漕糧已頒諭免徴外湖廣江西浙江江蘇安徽山東應輸漕米自康熙三十一年為始以次各蠲一年至江寧京口杭州荆州大兵駐防地方亦應豫行積貯將康熙三十一年起運三十年漕米各截留十萬石存貯倉厫以備需用是年江西南昌等五府康熙二十二年至二十七年帯徴逋賦吉水縣二十七年以前各逋賦悉予放除又奉㫖免湖南明年漕三十一年免廣東化州瓊州等四州縣康熙十八年至二十九年逋賦三十二年諭曰朕念廣西四川貴州雲南四省皆屬邉地土􅙓磽瘠民生艱苦與腹内舟車輻輳得以廣資生計者不同朕時切軫懐數嵗以來錢糧皆經次第蠲豁兹念育民之道無如寛賦矧邊省地方非再沛優䘏之恩則閭閻無由充裕所有康熙三十三年四省應徴地丁銀米著通行蠲免三十三年免江南邳州康熙二十四年至二十七年逋賦並免直𨽻安州等十一州縣明年田租三十四年詔免河南康熙三十二三四年逋賦三十五年免天下漕賦銀米宿逋又以直𨽻宣化山西大同及陜西省因征厄魯特噶爾丹供億大兵免明年田租三十六年免山西甘肅明年田租及陜西榆林等沿邊州縣衛今年租又免蘇松等府州康熙十八年至二十六年逋賦三十八年聖祖仁皇帝幸江南浙江康熙三十四五六年逋賦悉予放除又諭曰朕巡省民生風俗南至江浙兹已返蹕行經山東沿途見父老諮詢農事幸今嵗雨暘時若二麥繼登小民可以無憂粒食但前年被災泰安等二十七州縣生計尚未豐盈宜更加恩休養所有康熙三十六年未完地丁銀米均著免徴是年免湖廣康熙三十九年甘肅四十一年各田租直𨽻薊州康熙三十三十一二年退地逋負江南淮揚三十場竈户康熙三十七八年鹽課皆止勿責四十一年免安徽明年租又以秦省不通水運河西地尤貧瘠悉除明年田租四十二年聖祖仁皇帝幸山西除山西去年逋賦是年免山東河南雲南貴州廣西四川明年田租浙江康熙四十四年田租諭免亦如之其江南睢寧縣康熙三十七八九年邳州四十年各逋賦並山東積逋之在民者皆勿収責四十四年免湖北湖南明年租其帶徴宿負並停輸納是年諭嗣後蠲免新糧之年停徴舊欠俟次年徴輸四十五年以舊税新徴勢難兼辦分年帯輸仍多拮据諭免天下逋賦直𨽻康熙四十一年至四十三年銀八萬二千七百兩糧五千九百石山東康熙四十二年銀一百六十九萬千七百兩糧五千九百石山西陜西甘肅江蘇安徽江西浙江湖北湖南廣東康熙四十三年以前銀二百十有二萬二千七百兩糧十萬五千七百石各有竒悉予放除其已入者作本年正賦四十七年免江南明年田租四十九年諭曰朕比年省方時邁已閲七省南北人民風俗及日用生計靡不周知而民所以未盡殷阜者良由承平既乆户口日繁地不加増産不加益食用不給理有必然朕洞燭此隠時深軫念爰不靳敷仁用甦民力明年為康熙五十年原欲將天下錢糧一概蠲免因廷臣集議恐各處兵餉撥觧之際兵民驛遞益致煩苦細加籌畫悉以奏聞故自明年始於三年以内通免一周俾逺近均沾徳澤直𨽻奉天福建浙江廣東廣西四川雲南貴州各巡撫及府尹所屬除漕項錢糧外五十年應徴地畝銀共七百二十二萬六千一百兩有竒均予豁免並累年舊欠共一百十有八萬六千一百兩有竒亦著免徴其五十一年五十二年應蠲省分至期候㫖行是年奉㫖免江南淮揚徐三府淮徐泰三衛田租其湖廣康熙五十一年田租四十八九年逋賦盛京奉錦承徳等府州明年租榖並予放除五十年免福建臺灣府明年租榖稻榖例不入蠲而臺灣有榖無銀時奉普蠲之令巡撫黄秉中以為言上以嵗租已入諭除明年租五十一年諭曰朕宵旰孜孜勤求民瘼永維惠下實政無如除賦蠲租除每嵗直省報聞偶有水旱災傷照輕重分數蠲免正供仍加賑䘏外將天下地丁錢糧自康熙五十年為始三年之内全免一周使率土黎庶普被恩膏除將直𨽻奉天浙江福建廣東廣西四川雲南貴州及山西河南陜西甘肅湖北湖南各省康熙五十年五十一年地丁錢糧一概蠲免累年舊欠錢糧一並免徴外所有江蘇安徽江西山東各撫屬除漕項外康熙五十二年應徴地畝銀共八百八十二萬九千六百四十四兩有竒人丁銀共一百三萬五千三百二十五兩有竒悉予豁免其累年舊欠銀二百四十八萬三千八百二十八兩有竒著一并免徴計三年之内總免過天下地畝人丁新徴舊欠共銀三千八百有六萬四千六百九十七兩有竒各該督撫務須實心奉行體朕軫念民生至意是年以陜西潼闗衛山西大同府今年應免之米豆薪芻已徴在官其明年之應徴者除之又免陜西西安今年租五十二年詔免天下明年房地租稅及積年逋懸是年免山西河南陜西西安府及㑹寧等處今年田租五十四年諭免順天永平保定河間宣化五府明年田租五十五年諭䇿妄阿喇布坦近忽侵擾哈宻故特徴兵備邊一應飛芻輓粟悉支正供毫無累及閭閻今嵗山西陜西二省雖屬豐収猶念兵民効力轉輸無誤特將沿邊一帶運糧地方自山西大同府屬前衛右衛大同懐仁馬邑朔保徳七州縣衛直至陜西延安府屬府谷神木等共四十二州縣衛所堡康熙五十六年額徴銀八萬六千一百兩有竒糧米豆榖三十一萬七千七百石有竒草二千七十六萬五千九百束有竒通行蠲免並將從前積年逋欠銀糧草豆悉予蠲免是年又免直𨽻田租五十六年諭免直𨽻江蘇安徽江西浙江湖廣西安甘肅八省帶徴屯衛銀二百三十九萬八千三百八十兩有竒其江蘇安徽帶徴漕項銀四十九萬五千一百餘兩米麥豆十四萬六千六百十有餘石以半除之是年諭曰頃者朕巡幸口外經過三河等州縣及永平府交界地方見今嵗秋成豐稔米價稱平惟是去年雨水過溢田畝間被淹沒朕深加軫䘏蠲賦平糶轉漕分賑貧民使不至失所今者雖復有年然僅足支一嵗之用恐來年之輸將尚多難繼是必再沛恩膏始可大培民力著將順天永平兩府所屬大興宛平通三河密雲薊遵化順義懐柔昌平寶坻平谷豐潤玉田良鄉涿武清永清香河覇大城文安房山保定延慶盧龍遷安樂亭灤撫寧昌黎等州縣山海梁城等衛所康熙五十六年地丁銀二十六萬四千三百餘兩米豆髙糧二萬一千六百餘石草九萬四千九百餘束通行蠲免所有屢年積欠銀九萬三百九十餘兩米豆髙糧萬六千二百餘石草八萬四千四百餘束亦并予蠲除五十七年以軍興免陜西甘肅兩省逋賦及明年田租其甘肅康熙五十三四五六年未入之銀米草豆悉予放除五十八年又以沿邊民勞轉輸免陜西延安府屬府谷神木等六十六州縣衛所堡明年賦銀九萬八千一百兩有竒五十九年免陜西甘肅康熙六十四年額賦延慶等五州縣今年雜糧是年免福建臺灣府民畨銀粟六十一年世宗憲皇帝諭古北口一路為我皇考每年行幸之地百姓効力有年今將宛平順義懐柔密雲平谷五縣昌平一州雍正元年應徴正項錢糧一萬四千三百八十兩盡行豁免是年以大興三河通薊遵化為陵寢經由之路諭免明年額賦雍正元年免宛平等十一州縣田租雜稅又諭免江蘇等屬康熙三十三年以前逋賦旋又命三十四年以後逋賦亦勿収責共八百八十八萬兩有竒其旗丁康熙三十八年至五十年逋糧陜西康熙六十年以前未入之銀米豆草悉除之二年諭恩詔議免各省錢糧自康熙十八年至四十五年止著加恩將五十年以前舊欠銀米等項均察明豁免是年免廣東海康遂溪今年租直𨽻覇州等七州縣逋賦二萬七千七百餘令勿収責六年免直𨽻明年起運銀四十一萬七千八百餘兩是年諭免福建康煕五十五年至雍正四年逋賦三十三萬八千三百餘兩其有已徴在官者除明年正賦七年西蔵苖疆平免甘肅四川雲南貴州廣西明年租並免西安田租十之三以四川巡撫憲徳言免瀘州今年租其已入者除明年正賦是年諭免山東廣東直𨽻陜西山西安徽明年額賦各四十萬兩又免浙江民屯田租十之二八年諭國家經費既敷宜藏富於民朕特降㫖蠲免已多今次第舉行應及江西湖北湖南三省著將雍正九年錢糧各蠲免四十萬兩直𨽻畿輔首善之地應沛殊恩山東今嵗被水之州縣稍多朕心深為軫念著將九年直𨽻山東通省錢糧各蠲免四十萬兩九年又以軍興勞民西安地丁銀免十之三甘肅全除之並加免二省額賦四十萬兩又諭免甘肅之河州㕔洮州衛歸徳所西寧涼州府畨民本年米芻十年免甘肅今年米芻其已入者明年以實除之是年除臺灣彰化縣雍正八年未入銀榖以凶畨初定抒民力也十一年諭雲南元江普洱兩府猓夷蠢動夫役頻煩之後恐小民輸將力有不逮著將元普兩府雍正十一年額徴條銀公件銀並行蠲免是年免甘肅今年額賦二十七萬九千三百兩有竒河南額賦四十萬兩十三年免雲南貴州及湖南之沅州今年田租其貴州州縣之被殘破者給復三年是年九月今皇上登極詔免天下田租又諭免雍正十二年以前逋租其江南積逋内有官侵吏蝕二欵亦予放除隨諭訓業户各計所免之數捐十分之五以惠佃農又以陵寢興工除大興宛平良鄉涿房山淶水各州縣明年租明年又免各州縣入官地租十之三是年諭免者若直𨽻旗退入官各地各省漕糧甘肅芻米在雍正十二年以前者勿収責其貴州被賊州縣今年租糧四川明正沈令及口外新附處所又凉山㑹川鹽源阿樹木坪普安安阜酉陽各處本年貢賦西安明年地丁甘肅半之並予放除乾隆元年諭免甘肅乾隆二年租西安半之二年上以經理山陵大事自京至易州七州縣民趨役勤慎免今年田租陜西寳豐渠二縣招墾新户逋賦在雍正十三年以前者勿収責並免今年糧料其凉西畨民糧料凖屯地科則免三之一是年定蠲免以奉㫖日為始先期有已徴在官者作明年正賦又定陜西甘肅額徴匠價銀遇蠲準一例蠲免皆著為令四年諭免直𨽻本年錢糧九十萬兩江蘇百萬兩安徽六十萬兩又陜西榆林等十一州縣民貸倉糧在雍正十二年至乾隆二年者勿収責六年免行圍所經地今年額賦十之三又諭凖噶爾來使進藏熬茶曾令納克舒三十九部落豫備馬匹毫無違誤黽勉奉公甚屬可憫著加特恩將本年應納錢糧寛免七年諭曰朕御極以來愛養黎元於蠲免正賦之外復將雍正十三年以前各省積欠陸續蠲除以息民間追呼之擾今查雍正十三年正月起至十二月江蘇安徽福建三省未完民欠正項錢糧銀共一十七萬七千六百七十四兩六錢零甘肅福建江蘇等三省共未完民欠正項米豆糧共九萬五千二百六十九石零甘肅省民欠未完正項草一百七萬四千二十一束零又直𨽻江蘇安徽甘肅廣東福建等六省民欠未完雜項錢糧銀二千九百二十四兩零福建省民欠未完雜項租谷四百四十八石零此等拖欠各項厯年已乆多係貧乏之戶無力輸將况江蘇所欠獨多目今彼地現被水灾待恩撫䘏豈可復征負逋著將以上各項悉行豁免若諭㫖未到之先或有續完之項即咨部扣除再查江浙二省尚有雍正十三年未完漕項銀七萬一千二百七十兩零米二萬九百四十九石零麥四千三十七石零豆一百八十五石零向來漕項不在豁免之例今既蠲除各項著將漕項一體免徴此㫖到日各該督撫可即出示通行曉諭並令各州縣官實力奉行務令閭閻均沾實惠是年免甘肅雍正六年至十三年以前逋賦桞林湖三清灣柔逺堡毛目城雙樹墩九壩各屯户所貸牛種武威平畨永昌古浪西寧碾伯等六縣三年帶徴銀並予放除八年駕幸瀋陽諭盛京户部莊頭每年交納倉糧今朕恭謁祖陵親詣盛京軫念各莊頭終嵗勤苦輸將無誤著將八年分應交倉糧加恩寛免再各莊頭尚有七年分未完米豆草著覈明一併豁免又免納克舒三十九部落畨子明年額賦是年以直𨽻望都静海冀武邑四州縣貸糧宿逋追呼累民除之九年免肅州九家窑未完牛具十年諭曰我朝列聖相承深仁厚澤無時不加意培養元元以期家給人足百年以來薄海内外物阜民康共享昇平之福朕臨御天下十年於兹撫育蒸黎民依念切躬行儉約薄賦輕徭今寰宇敉寧既鮮縻費之端亦無兵役之耗是以左藏尚有餘積數年來直省偶有水旱朕加意賑濟多在常格之外如前年江南被水撫綏安插計費帑金千餘萬兩凡此皆因灾傷補救而沛恩澤者朕思海宇乂安民氣和樂持盈保泰莫先於足民仰惟我皇祖在位六十一年蠲租賜復之詔史不絶書又曽特頒諭㫖將天下錢糧普免一次我皇考旰食宵衣勤求民瘼無日不下减賦寛徴之令如甘肅一省正賦全行豁免者十有餘年朕以繼志述事之心際重熙累洽之候欲使海澨山陬一民一物無不均沾大澤為是特降恩㫖將乾隆十一年直省應徴錢糧通行蠲免又以芻糧例不入蠲諭將甘肅臨邊各屬明年芻糧一體放除河東西各屯免三之一亦如之是年福建臺灣粟米湖南乾州鳯凰永綏苖民雜糧四川民畨貢賦陜西玉樹納克舒馬貢並𤓰州安插回民未賞牛種悉予放除十一年駕幸山西免駐蹕之五臺縣明年額賦十之三是年瞻對平凡四川打箭爐口内外効力之各畨部給復二年其直𨽻覇州固安屯糧奉天錦州米豆浙江玉環山海寧縣大亹中小亹各銀榖例不入蠲以輪遇普蠲之年皆特諭免之十二年諭曰朕嘉恵黎元輪免天下正供山西通省地丁應於十三年全免惟該省太原平陽潞安寧武澤州蒲州六府遼沁平忻代保觧絳八州及歸化城所屬有額徴本色米榖豆麥以供兵餉例不蠲免但此次特沛恩施亦應量加愷澤得以均沾著將太原等府州應徴本色酌免十分之三其大同朔平二府地處邊瘠頻年歉収著全行蠲免是年免河南灘地官莊官地義田廣東官租學租屯地曠軍餘羡各賦例不蠲免者均免十分之一十三年駕幸山東免所經州縣今年田租十之三是年諭曰朕時邁東巡前詣闕里至於岱宗舊典聿修明禋肇薦東省今年錢糧見已普免因思曲阜泰安厯城鑾輿駐蹕之所也著將三縣乾隆十四年應徴地丁錢糧全行蠲免十五年恭謁易州陵寢諭免經臨州縣田租被灾者十之五未被灾者十之三是年駕幸嵩洛諭此次巡幸河南省方問俗所至推恩尤念祥符為省㑹之區登封實望秩之所鑾輿駐蹕宜沛恩施著將該二縣乾隆十六年應徴地丁錢糧全行蠲免十六年諭曰朕巡幸江浙問俗省方廣沛恩膏聿昭慶典更念東南貢賦甲於他省其累年積欠錢糧雖屢准地方大吏所請分别緩帶以紓民力而每年新舊並徴小民終未免拮据朕宵旰勤勞如傷在抱兹當翠華臨涖倍深軫䘏用普均沾之澤以慰望幸之忱著將乾隆元年至乾隆十三年江蘇積欠地丁銀二百二十八萬餘兩安徽積欠地丁銀三十萬五千餘兩悉行蠲免俾官無詿誤民鮮追呼共享昇平之福夫任土作貢嵗有常經自應年清年欵江蘇積欠乃至二百二十餘萬之多催科不力有司實不能辭其咎而疲玩成習豈民間風俗之澆漓尚有未盡革歟朕以初次南巡故特加恩格外嗣後該地方官務冝諄切勸諭加意整頓其在小民亦當湔除舊習勉効輸將勿謂曠典可希冀屢邀而惟正之供任其負逋也其浙江一省雖額賦畧少於江蘇而莭年以來並無積欠豈犬牙相錯之地不齊乃至是歟此具見浙省官民敬事急公之義而江蘇官民所宜懐慚而效法者也朕甚喜焉著將本年應徴地丁錢糧蠲免三十萬兩以示鼓勵各該督撫其仰體朕恵愛黎元之意嚴飭所屬實力奉行又諭曰朕上年巡幸嵩洛問俗省方清蹕所經已叠沛恩膏彰行慶施惠之典而該省紳民踴躍急公就瞻恐後其懽忭鼔舞之誠不惟無怨而益肫至今猶為繋念所宜再沛恩施者也其河南省乾隆十四年以前積欠𢃄徴緩徴錢糧三十五萬餘兩著再加恩概予蠲免俾該省小民催料不擾益宏樂利之休是年兩淮竈户乾隆二年至十四年甘肅元年至十年各逋賦皆諭除之又以駕幸木蘭經臨各州縣有被雹灾者免今年田租十之五餘免十之三臣等謹案乾隆二十一年祭告闕里二十二年幸江浙二十七年春幸江浙秋幸木蘭凡經臨之地分别蠲免皆凖是年諭㫖行十七年免長蘆鹽商逋課十四萬両有竒十九年恭謁盛京陵寢禮成免奉天今年田租户部莊頭糧免萬石各旗地米豆草免半壯丁米悉除之二十一年幸闕里免曲阜縣明年田租又以用兵西陲民勞輸輓甘州肅州凉州安西各衛臯蘭一縣今年賦銀米芻悉予放除寧夏平凉鞏昌蘭州四府田租免十之三全省乾隆十一年至十五年逋賦十年至十五年所貸牛種皆勿收責是年免齊齊哈爾黒龍江墨爾根呼蘭所貸種食在本年以前者悉除之二十二年聖駕南巡諭免江蘇安徽浙江本年以前逋賦並免江寧蘇州杭州三府今年租其江南乾隆十年以前漕項兩淮乾隆十七十八十九年竈賦浙江漕項屯餉沙地公租及貸種未償各積逋悉予放除是年免甘肅十六年至二十年逋賦並免甘州凉州肅州安西臯蘭今年田租又免直𨽻滄州静海南皮並山東海豐縣各逋賦二十三年免甘肅十六年至二十二年逋賦二十四年免甘肅明年租西安州縣分三等免本年田租有差其安西𤓰州屯民二十二年所貸牛具悉予故除二十五年征西大兵凱旋免甘肅明年田租二十六年幸五臺諭免山西經臨及駐蹕之地今年租十之三其五臺縣乾隆二十四五年所貸倉榖石樓陽曲二縣緩征帶征各銀榖皆勿収責是年免宣化府八年至十八年逋賦二十七年幸江浙諭免駐蹕之江寧蘇州杭州三府附郭諸縣今年田租其江蘇安徽浙江免二十二年至二十六年灾田緩征及地丁之未入者如二十二年例行又免兩淮竈課帶征銀九千兩浙江民屯田租漕賦竈課諸逋銀二十六萬四千兩各有竒迴鑾又諭曰朕巡省江浙畿輔所過地方應征額賦前已特頒恩㫖分别蠲免但念各屬尚有節年民欠未完之項分年緩帶錢糧尚應按數征收兹廻鑾沿途體察民依宜敷恩澤著再加恩將乾隆十二年至二十五年大興静海龍門宣化懐安萬全西寧懐來蔚州四旗等十州縣㕔未完地糧銀七千一百餘兩改折銀六千六百餘兩屯糧一萬六千餘石概予豁免其自十九年至二十五年各屬因灾緩帶地糧銀八萬六千七百餘兩改折銀九千一百餘兩屯糧六萬三千餘石並著加恩於本年起限再分作三年帶徴俾民力益紓得資耕耨三十一年諭曰朕統御萬方孜孜求治惟以愛育黎元為念自御極以來蠲賜所逮不下千億萬乾隆十年曾恭依皇祖普免直省錢糧恩例蠲除天下額徴正賦二千八百萬有竒惟嵗運漕米向以供給俸餉廩糈之用非水旱特蠲例不普免恭閲皇祖實録康熙三十年特頒恩㫖將各省起運漕糧通行蠲免一週大澤均沾慶逾常格仰惟皇祖冲齡踐阼臨御之三十年春秋未及四十朕年二十有五始登大寳膺祺受祉迄今亦閲三十年際重熙累洽之㑹必世昌期均符泰運其為慶幸倍深兹荷䝉上天眷佑列祖鴻庥函夏謐寧疆宇式闢北庭西域二萬餘里咸𨽻版圖外有耕屯之穫内無餽餉之勞且連嵗年榖順成庶物豐殖京通倉儲儘有餘粟天既誕貽樂嵗惠洽昇平朕自當仰體天心以推恩黎庶是用敬承嘉貺懋繼前謨使薄海億兆並裕倉箱之慶所有湖廣江西浙江江蘇安徽河南山東應輸漕米著照康熙年間之例以乾隆三十一年為始按年分省通行蠲免一次户部遵㫖議定乾隆三十一年免山東河南二省三十二年免江蘇省三十三年免江西省三十四年免浙江省三十五年免安徽省三十六年免湖南省三十七年免湖北省以次遞行蠲免是年上幸木蘭免所經地今年額賦十之三自後嵗以為常又諭雲南近日莾匪滋擾其未經被擾之處一切派撥土練修理橋梁急公踴躍免附近普洱之普藤猛旺整董等十三土司本年額徴條編正耗及米折銀三千餘兩正耗糧六百餘石並免猛籠一處宿逋又諭前經降㫖將各省漕糧分年普免一次期使海宇黎元均霑闔澤但聞漕糧欵内尚有例徴折色及民户輸銀官為辦漕者雖徴收銀米不同其為按田起漕之例則一也著再申諭各省州縣内有徴折色者一體概令蠲免三十二年上巡幸天津免經過地方及天津府屬今年額賦十之三又普免天津府屬莭年尾欠及上年緩征銀七萬三千兩有竒屯谷三千四百餘石又莭年因灾出借並舊欠及上年被水出借榖十三萬一千一百餘石均予放除復以畿輔地方共切近光之慕將直𨽻通省各屬莭年尾欠未完地糧銀四萬九千五百餘兩屯糧六萬六千四百餘石一體蠲免又諭各省督撫届輪蠲漕米年分諭各業户亦令佃户免交一半是年以滇省緬匪滋擾軍務方殷免本年額賦其大兵經過之地及永昌騰越普洱三府州全行蠲免其餘亦免十之五又普免近邊各該土司本年額賦明年諭免亦如之三十四年諭免雲南辦理軍需地方及永昌騰越普洱三府州明年額賦十之五並免直𨽻河南湖北湖南貴州等省大兵經過各州縣明年額賦十之三三十五年諭朕寅承丕緒撫有萬方申旦求衣無日不以勤恤民依為念是以劭農省嵗减賦逭征不靳多費帑金蘄閭閻共臻康阜溯在乾隆十一年丙寅朕御宇周句肇敷闓澤曽恭依皇祖普免天下錢糧恩例蠲除直省額徴正賦二千八百萬兩有竒越在三十一年丙戌際當必世興仁益惟比户饒裕是計復下詔將應徴漕米省分照康熙年例概蠲一次俾各倉箱盈衍倍積耕餘邇年以來寰宇乂寧民氣和樂惟上天孚佑我邦家洊錫康年頌符綏屢朕祗膺昊蒼鴻眷其可不究澤推仁以與我海内元元答兹嘉貺我國家席全盛之模内外經費度支有盈無詘府庫所貯月羡嵗増因思天地止此生財之數不在上即在下與其多聚左藏無寧使茅薝蔀屋自為流通廼者仰紹列祖貽庥化成熙洽為民藏富欣際斯辰且今年為朕六十誕辰明嵗恭逢聖母八旬萬夀普天懽祝慶洽頻年尤從來史冊所未有是宜更沛非常之恩以協天心而彰國慶兹用乗春頒令誕布陽和著自乾隆三十五年為始將各省應徴錢糧通行蠲免一次其如何分年遞蠲之處著大學士㑹同該部即速詳議具奏又諭乃者㳟奉皇太后安輿展謁兩陵前已降㫖蠲免所過地方十分之三兹蹕途所至小民扶老擕幼歡迎愛戴之忱特切朕心深為嘉悦著加恩將經過州縣及天津府屬所有乾隆三十一年至三十三年未完尾欠地糧銀共五萬一千八百餘兩地糧項下本色榖豆共五千九百餘石又莭年因灾借榖共十二萬六千一百餘石普行蠲免又免直𨽻通省未完尾欠地糧銀一千二百餘兩及應徴本色尾欠榖豆二千八百餘石改折二千六百餘兩并因灾緩徴銀十二萬四千九百餘兩榖豆八千二百餘石改折銀一千二百餘兩一體蠲免是年免甘肅臨邊各屬明年應徴畨糧草束其河東西屯糧草束免三之一又烏嚕木齊新疆户民額徴屯糧草束諭免亦如之三十六年免福建臺灣府屬額徴供粟一十六萬餘石并免廣東廣韶等府州屬官租及屯田曠軍餘羡學租等項銀兩十分之一其四川征收米豆雜糧并各㕔營土司夷賦及本折貢馬一體蠲免是年上恭奉皇太后安輿巡幸山東免直𨽻經行地方本年正賦十之三復念去嵗天津等處被灾較重免滄州等五州縣借欠榖三萬八千餘石及天津縣常借未完榖三千六百餘石至經由之東安等四州縣借欠榖三萬八千餘石及寳坻等五州縣欠榖一萬八千餘石均予蠲免其順天府屬之武清一縣被灾尤重免十之五又以便道詣謁闕里閭閻歡忭供役免上年歉收地方正賦十之五復諭泰安曲阜為駐蹕之地除本年田租并免濟南各屬借欠榖四萬九千餘石東平所未完灾緩地丁銀四千八百餘兩又灾借麥本未完之濟南武定兩府屬五千八百餘兩兖州曺州等六府屬九萬八千餘兩全行蠲免又諭朕巡幸木蘭今嵗雨水較大著加恩蠲免十分之五三十七年免奉天錦州米豆額賦又免山西太原等六府遼沁等八州及歸化城各協應徴本色米豆十之三其大同朔平二府地處邊瘠全行蠲免并將口外清水河㕔米折銀兩免十之三其和林格爾等處應輸折色銀兩一體全蠲至太㒒寺牧厰地畝向係本折兼徴其折色照地丁例全蠲本色亦免十分之三又免浙江温台所屬玉環㕔額徴租榖二萬一千餘石海寧縣天漲沙地租銀一千二百餘兩又以江南蘇州等屬積欠現在僅有尾欠五萬餘兩急公可嘉特諭免之是年又免陜西上年西安等九府州額徴本色併存留榖租糧及延安等三府州本色糧草其已經完納者准作本年額賦又免甘肅各㕔州縣莭年民欠倉糧三百七十六萬五千餘石三十八年諭朕此次巡幸淀津業將經過州縣未完民欠概予蠲免但念三十六年被灾最重者二十四州縣其宛平等十五州縣積欠已在經過普免之列唯通州寳坻三河等九州縣非鑾輅經行所及僅免三十五年以前而其地多有經過各州縣界址毘連者此征彼免小民未免向隅著將此各州縣三十六年分未完緩帶地糧銀一萬五千六百六十兩三錢本色豆四百八十一石九斗九合亦一併蠲免是年免直𨽻覇州等七十五州縣㕔莭年灾借倉糧二十三萬八百餘石屯糧項下米榖七千九百石有竒三十九年以川省自征𠞰金川以來羣黎踴躍奉公其大兵經行地方及未經辦差之九十㕔州縣莭年出夫運糧分别差務繁簡多寡將乾隆三十九年以前緩征錢糧蠲免有差其各土司夷民均屬奮勉出力並一體酌免貢馬夷賦四十一年因金川平定祗謁兩陵禮成恭奉皇太后巡幸山東免沿途經行地方本年正賦十之三其通州三河等十三州縣㕔及大興宛平等十五州縣并滄州交河莭年緩帶灾借等項銀糧麥豆悉予放除又以畿南一帶其灾區之不值蹕途者如覇州保定文安大城等二十州縣緩帶灾借等項銀米亦概行蠲免諭曰朕因兩金川蕩平祗奉安輿恭詣泰岱輦路所經加恩優渥而泰安曲阜為駐蹕之地尤宜廣敷恵澤著將該二縣乾隆丙申年應納地丁錢糧全行蠲免免水陸經行之徳州禹城等州縣衛歴年積欠其蹕路未經之鄒平新城齊東陵縣二十一州縣衛灾借等項銀榖悉行寛免又以入境以來小民夾道歡迎倍覘親愛將徳州夀張等十一州縣並臨清等州縣緩徴漕項銀米悉諭除之四十二年恭奉孝聖憲皇后梓宫詣泰東陵安奉免沿途經過地方本年額賦十之五易州免十之七是年以福建臺灣府屬官荘租息現值輪蠲之年照上届例免十之三又陜西甘肅向有額徴糧草例不入蠲均特諭免之其河東西蠲免屯糧草束悉依上届之例四十三年上恭謁泰陵泰東陵及三月清明莭恭詣祭謁免經行地本年正賦十之三諭曰遼瀋為我朝鴻業肇基之地風俗敦龎人心淳厚兹由山海闗至陪京恭謁祖陵蹕路所經村村殷阜老㓜歡迎扶擕恐後嘉恵之餘恩施宜渥啟鑾日業經降㫖免所過地方錢糧十分之三著再加恩將奉天所屬府州縣乾隆四十四年地丁正項錢糧通行蠲免又將各庒頭本年倉糧一萬餘石免其輸納其盛京興京遼陽牛庒等十五處旗地應納芻糧亦免徴一半又諭曰各省漕糧于乾隆三十一年普免一次兹䝉昊蒼眷佑累洽重熙敬體天心愛養億兆用是再沛恩膏著于庚子年為始復行普免天下漕糧一次俾藏富于民共享盈寧之福交户部詳悉妥議具奏四十四年諭朕此次敬謁泰陵恭祭㤗東陵及四月釋服恭詣祭謁所有沿途經過地方著加恩蠲免本年地丁錢糧十分之三免湖南乾州鳯凰永綏三㕔及城歩綏寧二縣苖糧照三十五年例又諭户部議覆富勒渾等奏銷川省軍需項下分别民欠商欠専賠分賠各欵一摺其中如民欠一欵念辦理金川軍務買糧運餉悉發官帑絲毫不以累民而川省百姓輓輸負送各出其力今于大功告藏之後復令償還前借帑項朕心實所不忍所有該省民欠津貼及採買站夫口糧共銀一百九十六萬八千四百餘兩均著加恩豁免再商欠一項未完米價脚價銀九十八萬六千九百餘兩雖有􅃜缺實情並非侵蝕其實在家産盡絶無可著追者並著加恩一體豁免又報銷項下與例案不符各欵請分别專賠分賠于通省文職内按年在養亷内扣半賠補等語因思平定金川之事費帑六千餘萬兩期使畨民永除後患何必以此難于報銷之案累及各官所有専賠分賠銀二百八十三萬二千餘兩糧米十五萬三千六百餘石及代賠無着一半商欠應扣通省一半養亷并富勒渾與陞調别省各員應扣一半養亷俱著加恩一併豁免是年免陜西延榆綏三府州屬民欠常平倉糧十二萬三千石社倉糧一萬三千石各有竒四十五年聖駕南巡免經過直𨽻山東省本年正賦十之三又免直𨽻順徳廣平大名天津四府屬積年灾借榖八萬四千石銀九萬八千兩各有竒併免山東歴城等二十一州縣緩徴銀十三萬四千兩臨清等七州縣緩徴榖二萬六千石社榖二千四百石麥種合榖三千二百石各有竒免江浙水陸經行地方本年額賦十之三又諭江省為財賦重地兹入疆伊始渥澤宜覃將江寧屬乾隆四十四年以前積欠銀四十五萬二千兩米十七萬二千石蘇州屬未完銀二萬三千兩米十二萬九千石安徽屬未完銀四十萬七百兩米麥榖九萬七千石各有竒俱一體全行蠲免又以兩淮竈户僻處海濵生計艱苦其各場厯年未完銀三萬五千餘兩悉予豁除又諭曰朕巡幸江浙取道淮揚兩淮商衆踴躍抒忱並應一體加恩所有應還川餉項内尚有未繳銀一百二十萬兩全行豁免又以江寧蘇州杭州為省㑹駐蹕之地并附郭諸縣本年額賦悉除之是年福建臺灣府屬額徴供粟山西太原等十六府州并清水河㕔太樸寺牧厰和林格爾等處本析糧銀廣東廣韶等府州屬應徴各項銀榖以輪遇普蠲之年悉照上届例分别蠲免有差四十六年上幸五臺免經過直𨽻山西各州縣本年正賦十之三又免五臺縣未完借榖三千六百石有竒其順天保定等府州縣屬未完榖四萬七千石米三萬四千石麥三千四百石銀五萬一千八百兩各有竒並免之是年以江蘇河灘地租欠項遞年積壓特諭免之又以甘肅靖逺安定等七縣今嵗承辦軍需民情踴躍將本年額徴銀糧免半輸納四十七年上幸盤山免經過地方本年正賦十之三又諭曰淮南商人應繳提引餘利銀兩前經降㫖加恩將未完銀展緩分作二十一限繳完今該商等已完至第十三限其餘八限尚應繳銀三百八十六萬六千餘兩此項提引餘利弊由髙恒而起該商等按限完交已經過半朕思恤商即所以恤民著加恩于未完銀内豁免二百萬兩其餘仍按原限完繳四十八年上恭謁泰陵免經過地方本年額賦十分之三諭曰豫省自辦大工以來厯次部撥及動用司庫銀千餘萬兩無非為百姓保䕶田廬所有採辦料物雇募人夫俱於例價之外寛裕給值俾小民踴躍趨事其例價外酌増銀兩自應分年均攤帶徴還欵但此次為數甚多而上次漫工案内又尚有攤徴未完銀九十餘萬兩若按年帯徴民力未免拮据朕自御極以來普免天下地丁錢糧者三次普免各省漕糧者二次不惜萬萬帑金又何靳此千餘萬庫項而令小民每年於正賦之外多此徴輸耶所有此次所請分年攤徴銀九百四十五萬三千九百二十餘兩以及上次攤徴未完銀九十四萬五千餘兩俱著加恩普行豁免復以南岸開挑新河考城商邱以下係山東曺縣地方查明東省挑河例價外酌増夫工各項銀共二十二萬餘兩俱予放除又甘肅積年未完銀二十四萬六千兩有竒糧一百三十八萬九千石有竒分年帶徴仍不免追呼之擾特㫖免之是年上臨幸盛京恭謁祖陵免奉天所屬府州縣正賦其各庒頭及旗地應納芻糧照四十三年例寛免四十九年上幸江浙免直𨽻山東經行地本年額賦十之三又免順天保定等十二府州屬未完榖十五萬五千餘石並免山東利津霑化等二十一州縣衛灾借籽種牛其銀十一萬八千餘兩榖十萬一千餘石又諭將江寧所屬積欠地丁漕項銀三十六萬七千兩民借未完銀十五萬一千九百兩米麥豆十八萬九千石各有竒蘇州所屬地丁等項銀四萬五百兩民借銀一千二百兩漕項等欵未完米豆三萬八千石各有竒安徽所屬地丁等項銀三十七萬三千兩民借六萬一千兩漕倉等項銀八萬三千兩漕糧等欵米麥豆六萬五千石各有竒全行蠲免又免江浙省㑹駐蹕之地附郭諸縣本年額賦其杭州嘉興湖州三府屬本年應徴地丁錢糧共一百九萬餘兩免十分之三又諭甘肅逆囬滋事一切輓運糧草有需民力除今年田租其業經徴収者作明年正賦又免自乾隆三十八年至四十六年壓欠銀一百六十餘萬并免民欠存留項下銀五萬一千餘兩糧二萬五千餘石民畨未完草束價銀二十萬四千餘兩又歴年民欠耗羡銀一十萬二千餘兩糧四十五萬二千餘石一體放除五十年上幸盤山免經行地方今年正賦十之三右賜復免科順治元年除明季加派三餉及召買津糧三年除直𨽻任邱縣水淹地租四年除江南淮徐無主荒地租有主者量免額賦三年漕米一年七年免湖廣蘄州麻城羅田蘄水黄梅黄岡六縣五年六年荒田額賦八年除山西荒田賦二萬八千四百九十頃西安新荒民屯廢藩地賦並虛限丁銀三萬七千三百九十兩糧千二百八十石各有竒是年除直𨽻安州芝蔴棉折徴額賦九年除陜西荘浪西寧肅州故絶抛荒水淹沙壓各地賦十一年減江西瑞州袁州二府浮糧康熙元年除江南海州移内地民所遺海濵田租二年除廣東福建海濱無主田租九年除邳州海州宿遷沭陽通州泰州坍沒田租十年除河南陜州江南靈壁臨淮各包荒古荒租賦是年定各官詐報墾荒致民賠累者淮勘明豁免又定蠲除漕糧并隨漕銀米亦准蠲十三年除江南丹徒金壇江濱坍沒田租二十一年定築提佔用民田其漕糧奏除二十六年恩詔除康熙十三年以後加増雜稅二十七年除江南丹徒縣海濱地康熙十八年以後坍沒田租二十九年諭朕近見廣東髙州瓊州等府所屬州縣地丁各項錢糧累年每致逋欠如果丁闕地荒不能輸納著該督撫將實繋户口稀少田租荒蕪徭賦無從辦納州縣積年所欠錢糧數目詳晰察明具奏議除廣東髙州府呉川縣瓊州府臨髙澄邁二縣自十八年至二十八年未完地丁銀十有二萬八千六百兩米四千六百石各有竒三十年除江南睢寧縣廢闕地丁額賦其本年以前逋者並勿収責又除通州海門鄉坍田銀四百九十二兩米麥百十二石三十一年除雲南鄧川州水石冲壓荒田額賦三十四年除山西津滎二縣河壖坍沒田租三十八年除浙江鄞縣海潮冲沒田租凡千有七十餘畆三十九年除鄞縣坍沒田租臣等謹按鄞縣十一都三圖近海田地舊有塘牐禦潮蓄水自順治十七年衝沒田淹租缺至是乃豁除四十九年除江南荒地銀五十二年除江蘇荒地銀五十三年除浙江奉化縣水沒田租六十一年諭曰聞陜西甘肅二屬各州縣衛所地丁銀每錢額外徴収三釐米毎斗額外徴收三合以為備荒之用此項徒有加賦之名而無賑濟之實著自雍正元年為始將額外徴收銀米永行停止如有舊欠亦悉予豁免又諭京師琉璃亮瓦兩厰官地每月按間計檩徴租相沿已乆朕念兩厰多繋流寓賃住揭本經營之民情可憫惻嗣後止徴地租免其按間計檁逐月輪輸雍正二年除浙江仁和等十一州縣水衝沙壓地租又除江西南昌新建豐城進賢奉新寧靖安七州縣浮糧三年怡親王允祥奏减蘇松浮糧奉上諭蘇松之浮糧向日部臣從未陳奏常厪皇考聖懐本欲施恩裁减朕仰體皇考愛民寛賦之盛心捋蘇州府額徴銀豁免三十萬兩松江府額徴銀豁免十五萬兩著為定例俾黎民輕其賦税官吏易於催科可飭令地方官知之是年除江南丹徒縣濱江坍沒田租凡百八十一頃二十三畝有竒又免䑓灣鳯山縣畨婦口賦臣等謹按鳯山縣八社額徴丁賦畨婦每口徴榖二石今以雍正三年為斷計八社畨婦一千八百四十四口折納榖三千六百八十石自雍正四年為始准此徴收免其計口納賦五年諭各省之中賦稅最多者莫如江南之蘇松二府浙江之嘉湖二府考四府賦稅加重之由盖始於明初籍富民之田以為官田按私租以為正賦此洪武之刻政也明二百餘年减復不一我朝定鼎以來仍照明例徴収盖因陸續辦理軍需經費所在未便􅑈然裁减皇考聖祖仁皇帝常論及此雍正三年朕仰體皇考聖心已將蘇松二府額徴浮糧豁免今特沛恩膏將嘉興府額徴銀四十七萬二千九百餘兩著减十分之一計免銀四萬七千二百九十餘兩湖州府額徴銀三十九萬九千九百餘兩著减十分之一計免銀三萬九千九百九十餘兩共二府免銀八萬七千二百八十餘兩永著為例六年除陜西西鄉縣康熙六十一年浮糧銀千二百三十九兩九錢有竒七年諭除湖南武陵縣宿郎堰湖濱淹田額賦八年湖南永順土司改土歸流照原額秋糧分則新科仍免科一年九年諭曰朕聞淮安府阜寧縣屬射陽湖地方于雍正五年題升淤地八千一百餘頃升租銀四千餘兩又康熙五十九年丈量射陽湖北岸灘地案内升四百餘頃應升銀一百七十兩皆係有銀無地小民賠累難堪向來積欠纍纍從未清完甚屬累民著將前項升地八千六百五十頃四十九畝零租銀四千二百六十一兩有竒悉行豁除以甦民困又江南開河築堤占廢之民屯田陜西武功縣之坍沒田福建寧洋縣無徴鐵稅鳳山縣荘地闕額賦銀悉予免科十三年皇上登極恩詔蘇松前已蒙世宗憲皇帝諭㫖裁免四十五萬兩以紓民力但江省糧額尚有浮多之處著再加恩免額徴銀二十萬兩乾隆元年諭江蘇淮安府屬之桃源縣徐州府屬之宿遷縣睢寧縣沿河地畝淹涸靡常雍正五年涸出睢寧縣報升地五千三十九頃宿遷縣報升地四千七十二頃桃源縣報升地三千八百四十二頃嗣䝉世宗憲皇帝以淤地勘報不實令河臣㑹同督臣委官察勘共豁地七千二百餘頃萬民感頌存地五千七百餘頃照各縣成例折算實地三千五百餘頃科則亦經減輕其淮安一衛裁汰改歸州縣徴収乃比年以來仍催徵不前盖此淤出之地即舊有糧田是以民力維艱輸將不繼也朕既洞悉其中情事自當加恩開除以紓民力著將宿遷睢寧桃源三縣見存新淤涸後改科地糧額徴銀六千五百四兩全行豁免其雍正十三年淤地未完錢糧亦免徴收至水沈地畝仍照例每年冬勘是年江南泗州安河兩岸淤地甘肅狄道縣山東郯城縣二十八州縣河南祥符等四十二州縣荒田又山東章邱縣詐報墾荒各賦悉令除免定新設湖北鶴峯州長樂縣雍正十二年至乾隆元年免其升科臣等謹按鶴峯長樂本容羡土司地自雍正十二年改土歸流至是奏報起科得㫖照容羡原徴秋糧之數為額仍免三年至明年起科二年諭江蘇阜寧鹽城二縣有濱河地畝淹涸靡定有司誤報升科小民納賦甚覺艱難著該督撫確核地畝額徴銀數悉行豁免其從前未完之舊欠一併赦除是年江南髙郵等五州縣河堤民防租湖北沔陽州未經清丈田雍正十三年乾隆元年逋賦山東商河縣鹻地賦甘肅河西各州縣衛所隨徴馬糧悉予免除三年除四川射洪等六縣坍沒田租四年諭雲南勲荘變價一案尚欠銀千八百二十九兩有竒此項田屢被水冲沙壓難以耕種承變各户逃散無可著追頗為地方之累著將應徴銀准予豁免是年西安同州鳯翔三府水衝屯荘銀米悉予除免五年除河南中牟封邱等十四州縣水冲沙壓各荒地額賦並除鄭州地户積逋六年除湖南湘鄉臨武二縣坍荒田租七年除浙江錢塘縣及河南洧川等十一州縣河坍沙壓荒田額賦八年諭曰朕聞浙江温台二洋為漁船採捕之所從前玉環未經展復以前凡漁船被汎兵需索陋規無異私稅後因展復玉環地方官恐經費無出遂將陋規改收塗稅此一時權宜之計也朕思濱海編氓以海為田每嵗出沒於波濤之中捕漁糊口生計淡薄應加軫恤著將此項永逺革除免致不肖官弁丁役苛刻需索擾累貧民是年除湖北興國黄岡二州縣荒田租九年四川水被决田一百九十六頃二十四畝有竒衝沒碾榨磨共十有九座並除其租課十年除江西樂平徳興玉山宜黄陜西郃陽各坍荒田租十年除江蘇城租初居民沿城搆屋賃地輸租後屋毁他徙租遂逋懸州縣率以罰鍰抵觧至是禁濫罰始奏除之是年諭减直𨽻慶雲縣額賦十之三著為令又浙江雲和縣坑鑪税廣東瓊州府雜稅福建無著漁課悉予免科十二年免直𨽻天津葦漁課十六年諭曰朕聞常州府屬之武進陽湖二縣開抵役田租銀一項原係前明時虛田領價後因本户逃亡株連親族各將已産開抵實非前明原置之田亦非當日領價之户小民條糧役租力難並輸以致積年拖欠朕省方所至民隠勤求清問既周倍深軫念著將武進陽湖二縣開抵役田除應辦條漕仍照民田一例完納外其新舊租銀概予豁免以除民累是年除浙江淳安臨海瑞安陜西吳堡各縣坍荒田租十七年除甘肅狄道等十五州縣坍荒田租十八年浙江山東竈地安徽太平縣福建臺灣府及直𨽻四旗通判熱河八溝同知所轄田地其坍荒者免科二十年諭諸羅縣民陳天松等係海外窮黎墾荒追罰與抗欠額賦不同且歴年乆逺上年臺屬又被灾傷情殊可憫所有未完罰粟及折價銀兩著加恩即予豁免二十二年上念山東海豐縣東北鄉黎敬等五莊低窪易澇諭勘改下則徴收二十九年免湖北漢陽縣積年坍田租凡五百五十頃六十畝有竒三十一年諭曰滇省山多田少水陸可耕之地俱經墾闢無餘惟山麓河濵尚有曠土向令邊民墾種以供口食而定例山頭地角在三畝以上者照旱田十年之例水濵河尾在二畝以上者照水田六年之例陞科第念此等零星地土本與平原沃壤不同倘地方官經理不善一切丈量查勘胥吏恐不免從中滋擾嗣後滇省地頭地角水濵河尾俱著聼民耕種概免陞科以杜分别查勘之累又湖廣漢川縣汈汊垸地勢低窪每多水患將垸内上八總民田紅糧三則均改為漁糧上則徴收其均田科則改為漁糧下則徴收至下八總民地内應徴南未照上八總南米一併减免三十六年除臨清及陵縣沙壓鹽鹻地畝租賦及江蘇江寧震澤清河坍荒田租其泰州坍荒田畝民逋悉除之是年除江西袁贑饒建各衛所水冲沙壓屯田糧又直𨽻喀喇河屯㕔所屬被水糧地并巴里坤墾不成熟地六千三百畝俱予免科三十七年湖北江陵縣直𨽻永定河下口江蘇宿遷縣各修築月堤占廢田租並予豁免其水冲沙壓之江蘇靖江縣屬十頃二十八畝有竒甘肅中衛縣屬一千九百九十四畝陜西興平縣屬二十三頃五十二畝又郃陽縣屬五十餘頃一體免徴三十八年直𨽻文安大窪連絡四淀向來漲涸靡常上念各業户所有地畝積水佔田糧無所出雖水小時尚可佃漁覔利究不若力田收穫之多嗣後視積水之多寡以定賦糧之等差水大則全行蠲除水小量行减賦是年山西豐鎮㕔屬旗地五百六十頃二十畝直𨽻涿州民地九十七畝浙江仁和場蕩地五千三百畝有竒均被水冲坍又湖北監利縣創築月堤佔壓田畝六十三頃有竒悉予免租三十九年免浙江錢塘桐廬餘杭臨安烏程各縣屬及江蘇上元江寧清河六合上海江浦震澤銅山常熟各縣屬坍荒及築堤壓佔田賦又除直𨽻懐柔縣屬江西新昌寧都等五州縣屬冲坍田畝額租四十年甘肅朔寧縣屬沙壓地一千三百餘畝應徴芻糧永行豁除又免山丹縣草湖等渠坍沒地七十七頃一十三畝田租是年湖北監利縣築堤挖壓之軍屯田江蘇江寧鎮洋丹徒各縣屬坍沒占廢田均予免科四十一年除福建建陽臺灣縣屬江西新淦新城縣屬江蘇桃源浙江仁和等縣屬冲坍田地租賦又免江蘇丹徒縣坍廢田地漕米四百四十九石有竒四十二年免直𨽻喀喇河屯水冲沙壓地畝租賦四十三年除江蘇常熟婁縣嘉定長洲坍沒田租及浙江仁和場三江場被潮坍沒竈課四十四年除江蘇沿江坍沒田租及常熟嘉定所屬坍沒田地漕賦并免甘肅高臺縣水冲沙壓地畝額徴四十五年諭阿桂所奏修復馬港河西堤殘缺之處及接築無堤處所聮至北潮河西岸民堰以禦倒漾自應如此辦理其二套以下由北潮河入海之處既係路捷勢順設遇漫溢正可分洩盛漲俾尾閭益得暢逹轉可不必添建閘壩雲梯闗以外原不必與水争地今二套以下既為分洩盛漲之道則馬港河堤東灘地即不能保無漫溢其應徴减則地畝錢糧著交薩載等查明奏請加恩豁免是年免河南孟津縣坍沒田租并甘肅平畨碾伯二縣被水冲沒地畝應徴芻糧永行豁除以免民累四十七年浙江仁和場仁和倉三圍等處坍沒存減則地九百二十畝有竒自乾隆四十五年為始令予豁除四十八年浙江仁和場扶基等處糧地續被坍沒又直𨽻懐柔縣水冲地畝均予豁免額賦四十九年諭蘇州藩司所屬地丁漕項公田餘租等欵積欠銀糧業經概予蠲除因思吳縣公田已與民田一律交納條銀漕米並加徴義租嗣因該縣冇積年無著田糧復于公田徴收餘租米二千二百餘石抵捕無著虛糧七百餘石外尚餘米一千四百餘石留為該縣地方公用歴年均有拖欠民力拮据所有該縣無著田糧除照舊于此項餘租徴收扺補外其留備地方公用應徴米一千四百餘石著永免徴收五十年免河南鄭州水冲堤壓廢地租賦右免科免役順治元年除各旗莊丁差徭其糧草布疋亦永停輸納二年除江南丹徒丹陽二縣明末加派馬折銀三年除浙江錢塘仁和縣間架房税七年除江南桐城潛山太湖宿松休寧句容六縣逃丁額賦十一月除江西逃丁額賦十八年准江南江都如臯海州民能修理烽墩馬路者各免一年差徭康熙十二年除河南僉派河夫十六年禁有司罰民修築城樓垜口三十三年聖祖仁皇帝南巡免山東江南經行各州縣衛所丁銀三十八年除江寧市㕓嵗輸房號廊鈔銀五十二年恩詔嗣後編審増益人丁止將滋生實數奏聞其徴收辦糧但據五十年丁冊定為常額永不加賦五十四年定社倉捐榖免徭之例富民能捐榖五石者免本身一年雜派差徭有多捐一倍二倍者照數按年遞免雍正二年禁官司科派大小文武官到任其屬官或吏役均不得科派兵民供具或官司指稱修署借端派累兵民者文照科歛武照尅扣律各坐罪如上司官狥庇或勒令屬員修署供具者均論如律又定官署遇有所需用物照市價工給時值不得科歛違者論六年覈天下丁銀實數盡匀入地糧徴收永罷口率之賦八年諭新設永順一府所屬永順龍山保靖桑植四縣火坑鋤頭煙户等名色錢一概刪除令該户自行開報開墾地方官給以印照永為世業十三年皇上登極諭山西大同偏闗老營水泉三汛兵丁交納徭銀向在餉銀内扣交毎年徴銀六百八十兩有竒著自乾隆元年為始將此項蠲除永著為例是年除江西太平縣江夫河蓬雜賦乾隆元年甘肅地震缺額丁賦湖北未經攤减丁賦福建南平縣浮多丁賦江南網户鰣魚折色銀陜西坍地徭銀悉予免科五年諭曰朕聞江省嵗額錢糧地丁漕項蘆課雜稅之外又有名為雜辦者不在地丁項下編徴仍入地丁項下彚入分數奏銷欵目甚多沿自前明迄今賦役全書止編應觧之數未開載出辦原委即有開載出辦之處亦未編定如何徴收則例於是有闕額累官者有徴收累民者有累在官而因以及民者有累在民而因以及官者朕心軫念特頒諭㫖除有欵可徴無累官民之項仍照舊徴觧但須覈明則例立定章程明白曉示以杜浮收隠溷等弊其實在闕額有累官民者著督撫確勘請㫖豁免十一年除江蘇雜辦各賦江蘇雜辦錢糧有城租吏養班餘米軍餉碾餉折榖等項均係有欵無徴與五年原奉諭㫖相符至是奏明准以十一年為始悉予豁除又諭曰從前朕巡幸直𨽻地方見城垣多有殘缺皆因不能隨時堵築以致出入踐踏踰越成路因令大學士等寄諭各督撫令其督率有司留心整飭嗣㨿巡撫碩色奏請分别工程一千兩以上者俟以工代賑之年動項興修一千兩以内者令該州縣分年修補除土方小工酌用民力外其餘即于工費項下支修朕將伊摺令各督撫閲看俾其彷照辦理但須善為經紀勿致累民而各督撫中遂有因此奏請開捐土方並將各官養亷合力捐修者或經批示或經議駁俱未准行今鄂彌逹覆奏摺内又稱按田起夫誠恐佔田之户必派之佃田之家不若暫借稅銀生息以偹修補等語此奏甚屬錯誤全不知朕本意矣盖城垣為國家保障其責全在地方官員其所以酌用民力者盖因各處城垣偶有坍損地方官並不查禁任民踐踏甚且附近居民竟將城磚竊取以供私用是以令于農隙之際酌用本地方民夫補葺使民知城垣之設原以衛民已身曽用力于其間則遇有坍損自然䕶息不肯任意踐踏且隨時修補亦易為力此上下相維之義並非令其按田起夫竟成賦額之外増一力役之征也如鄂彌逹摺内所稱者恐各省督撫亦錯㑹朕㫖或致辦理未善致有累民之處用是特頒此㫖曉諭各督撫知之二十七年令生監不得濫充社長圩長牙行埠頭各項雜役三十七年諭李瀚奏請停編審造冊所見甚是編審人丁舊例原因生齒繁滋恐有漏户避差之弊是以每届五年查編造冊以偹考核今丁銀既皆攤入地糧而滋生人户又欽遵康熙五十二年皇祖恩㫖永不加賦則五年編審不過沿襲虛文無俾實政况各省民榖細數俱經該督撫于年㡳專摺奏報户部核實具題是户口之嵗増繁盛俱可按籍而稽更無藉五年一次之另行查辦嗣後編審之例著永行停止三十八年諭今年七月間據陳輝祖奏請將該省民屯新墾丁銀隨年攤徴批交該部議奏旋經户部覆准並請行查各督撫就本省情形酌籌妥議具奏嗣據直𨽻等省陸續議奏大概請仍舊制者居多則陳輝祖所奏及該部所議皆未為得當國家承平休養百有餘年閭閻生齒日繁嵗有増益向來編審人丁按丁科則自康熙五十二年我皇祖特頒恩詔永不加賦即以是年丁糧之數作為定額朕臨御以來無時不以愛養斯民為念詎肯于丁糧區區毫末之賦稍存計較乎若以新墾民屯地畝復將丁銀隨年攤納是與小民較及錙銖尤非恵下恤民之道所有各省辦理丁糧一事無論己未覆奏俱著悉仍其舊毋庸另議更張其湖北長蘆二處已經該部覆准者亦不必行仍令照舊辦理右免役皇朝文獻通考卷四十四
