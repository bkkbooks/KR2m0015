body:
  text: 欽定四庫全書皇朝文獻通考卷三田賦考三田賦之制雍正元年諭户部國家承平日久生齒殷繁土地所出僅可贍給倘遇荒歉民食維艱將来户口日増何以為業惟開墾一事於百姓最有裨益但向來開墾之弊自州縣以至督撫俱需索陋規致墾荒之弊浮於買價百姓畏縮不前往往膏腴荒棄豈不可惜嗣後各省凡有可墾之處聴民相度地宜自墾自報地方官不得勒索胥吏亦不得阻撓至陞科之例水田仍以六年起科旱田以十年起科著為定例其府州縣官能勸諭百姓開墾地畝多者准令議敘督撫大吏能督率各屬開墾地畝多者亦准議敘務使野無曠土家給人足以副朕富民阜俗之意户部議准山西河南山東等處閒曠之地令各省督撫轉飭各州縣衛所確查如有未墾荒地有無從前種地之人勸諭開墾有力者令自備牛種無力者官借牛種秋收後還官起科之後官給執照永為世業又以瀕江近海之區定例十年清丈一次恐未至十年有坍漲者令各州縣衛所官不時清查坍者即行豁免漲者即行升科毋使胥役藉端需索是年又議准各省督撫於州縣開徵之始令該府遴選賢員與該管官同封銀櫃或十日二十日别委賢員或佐貳教職當衆拆封立即起解如有徇隠該府并委員題㕘議處二年諭直省督撫等朕惟撫養元元之道足用為先自臨御以來無刻不廑念民依重農務本業已三令五申矣但我國家休養生息數十年来户口日繁而土田止有此數非率天下農民竭力耕耘兼收倍穫欲家室盈寜必不可得周官所載巡稼之官不一而足又有保介田畯日在田間皆為課農設也今課農雖無專官然自督撫以下孰不兼此任也其各督率有司悉心相勸並不時咨訪疾苦有絲毫妨於農業者必為除去仍於每鄉中擇一二老農之勤勞作苦者優其奬賞以示鼓勵如此則農民知勸而惰者可化為勤矣再舍傍田畔以及荒山不可耕種之處度量土宜種植樹木桑柘可以餉蠶棗栗可以佐食桕桐可以資用即榛楛雜木亦足以供炊㸑其令有司督率指畫課令種植仍嚴禁非時之斧斤牛羊之踐踏奸徒之盜竊亦為民利不小至孶養牲畜如北方之羊南方之彘牧養如法乳字以時於生計不無裨益總之小民至愚經營衣食非不迫切而於目前自然之利反多忽略所賴親民之官委曲周詳多方勸導庶使踴躍爭先人力無遺而地利始盡不惟民生可厚風俗亦可還淳該督撫等官各體朕惓惓愛民之意實心奉行倘視為具文茍且塗飾或反以擾民則尤不可也又諭百姓完納錢糧當令户户到官不許里長甲頭巧立名色聞有不肖生員監生倚恃一衿輒包攬同姓錢糧以為己糧秀才自稱儒户監生自稱宦户每當徵收之時遲延拖欠不即輸納該督撫即曉諭糧户除去儒户宦户名目如再有抗頑即行重處又諭朕惟四民以士為首農次之工商其下也漢有力田孝悌之科而市井子孫不得仕宦重農抑末之意庶為近古士子讀書砥行學成用世國家榮之以爵禄而農民勤勞作苦手胼足胝以供租賦養父母育妻子其敦龎淳樸之行豈惟工賈不逮亦非不肖士人之所能及雖榮寵非其所慕而奬賞要當有加其令州縣有司擇老農之勤勞儉樸身無過舉者嵗舉一人給以八品頂帶榮身以示鼓勵至七年以直省所舉老農有冐濫生事者令督撫查明悉行革退另選題補其從前或因賄囑營求而得者准老農及保送之官員自行出首但革去老農頂帶免其治罪又諭户部聞州縣虧空錢糧有闔屬百姓代賠者名曰樂捐其實强派嗣後著禁止總理王大臣㑹議山西巡撫諾岷請提解火耗歸公一疏議入諭曰州縣火耗原非應有之項但通省公費各官養廉有不得不取給於此者然非可以公言也朕非不願天下州縣絲毫不取於民而其勢有所不能且歴來火耗皆在州縣而加派横征侵蝕國帑虧空之數不下數百餘萬原其所由州縣征收火耗分送上司各上司日用之資皆取給於州縣以致耗羨之外種種饋送名色繁多故州縣有所藉口而肆其貪婪上司有所瞻徇而不肯㕘奏此從来之積弊所當剔除者也與其州縣存火耗以養上司何如上司撥火耗以養州縣乎爾等奏稱火耗分數不可不分别酌定朕思一省之内州縣有大小錢糧有多寡地大糧多之州縣少加火耗已足養㢘若行之地小糧少之州縣則不能矣火耗不定分數倘地方遇差多事繁之時則酌量可以濟用或是年差少事簡則耗羨即可減矣又或遇有不肖有司一時加増而遇清廉自好者自可減除矣若酌定分數則將来竟成定額必致有増無減此火耗分數之不可以酌定者也又奏稱提解火耗將州縣應得之項聴其如數扣存不必解而復撥等語見今州縣徵收錢糧皆百姓實封投櫃其拆封起解時同城官公同騐看耗羨與正項同解分毫不得入己州縣皆知重耗無益于己孰肯額外加徵乎是提解火耗既給上下養廉之資而且留補虧空有益於國計若將州縣應得之數扣存於下勢必額外加増私行巧取浮於應得之數累及小民況屬之督撫顯然有據屬之州縣難保貪㢘此州縣羨餘之不可扣存者也法有因時制宜者如人有疾病因症投藥病愈即止今提解火耗原一時權宜之計將来虧空清楚府庫充裕有司皆知自好則提解自不必行火耗亦可漸減矣朕於臣下期望甚殷即州縣官員亦冀其為臯䕫稷契自此各加勉勵勿侵蝕官帑勿貪剥小民各省火耗自漸輕而至於盡革此朕之願也各省能行者聴其舉行不行者亦不必强自山西提解火耗之後各直省次第舉行以給官吏養廉及他公用錢糧少者或以税課盈餘佐之由是有司不得濫取於民而公用亦無匱乏行之數年上下交以為便臣等謹按錢糧出於田畝之中火耗加於錢糧之外火耗之名自明以来始有之葢由本色變而折銀其取之於民也多寡不一其解之於部也成色有定此銷鎔之際不無折耗而州縣催徵之時不得不稍取盈以補其折耗之數亦猶糧米之有耗米也迨行之既久州縣重斂於小民上司苛索於州縣火耗之増日甚一日因循瞻徇視為應得之物一遇公事加派私徵皆取之民間又不止於重耗而已此其故皆由於有司無養㢘之資而閭閻滋科派之累也自提解火耗之法行有司之養㢘於此酌撥地方之公用於此動支百姓永無藉名苛派之累而官吏得有潔己奉公之實所加於民者無多所益於民者甚大所謂上不誤公下不病民達權通變至公至善之計也是年令督撫率府州縣官舉行勸農春至勸耕秋至勸斂有輕視民隠不實力奉行者以溺職論又議准各省州縣將下年徵糧之紅簿於上年十月内申送布政司鈐葢印信於開徵前給發各州縣於徵收時眼同花户登記填寫串票上司盤查即取布政司鈐葢之紅簿對騐其徵收卯簿該管官務須親對完欠無得假手户房至民間輸納銀色不足者自應傾銷但州縣設立官匠因以累民者甚多令地方官擇銀匠之信實者數人連名互保聴民投舖傾銷又諭民間輸納錢糧用自封投櫃法亦屬便民之道但偶有短少之處令其増補每至多索其數浮於所少之外理應將原銀發還仍於原封内照數補足交納庶可免多索之弊令直𨽻等省發遣人犯往西寧開墾西寧布隆吉爾地方遙逺願往墾地者少議將直𨽻山西河南山東陜西五省軍流人犯連家口發遣之人有能種地者令其前往開墾初到之時地方官撥給地畝動支正項錢糧採買籽種牛隻分給之其應徵糧草照例於三年起科是年總計天下田土共六百八十三萬七千九百一十四頃二十七畝有奇田賦銀二千六百三十六萬二千五百四十一兩糧四百七十三萬一千四百石各有奇草十萬五千四百九十一束順天府計六萬八千四百五十頃二十二畝有奇田賦銀一十八萬一千六百七十九兩粟米三百八十石豆三千四百七十石籽粒五十八石各有奇草三百七束直𨽻計五十五萬七千四百九十二頃九十四畝有奇田賦銀一百九十萬六千九百三十三兩米糧一十萬五千四百四十二石麥四十二石豆七千七百八十六石各有奇草八萬五千六百八十一束奉天錦州二府計五千八百六頃五十八畝有奇田賦米三萬八千七十石有奇江南江蘇計六十八萬一千二百九十一頃二十七畝有奇田賦銀三百七十一萬九千九百四十二兩米豆二十七萬六千八百三十八石各有奇安徽計三十二萬九千九百八十六頃八十四畝有奇田賦銀一百三十八萬七千五百九十六兩糧一十七萬九千九百七十二石各有奇内折色糧三萬五千二百十三石有奇山西計四十二萬七千四百一十三頃八十八畝有奇田賦銀二百二十七萬七千三百二十七兩又地差課程等項銀一十萬六千七百九十八兩糧四萬五千七百七十石各有奇山東計九十六萬七千七百四十一頃四十六畝有奇田賦銀三百萬七千九百四十六兩米四十七萬四千三十七石麥三萬四千七百四十七石穀八百八石各有奇河南計六十五萬八千八百八十四頃四十三畝有奇田賦銀二百九十四萬三千四百五十三兩有奇陜西西安計二十五萬八千四百四十二頃八十畝田賦銀一百三十五萬五千二百四十五兩本色糧三萬一千九百四十二石折色糧八十六萬九千一百四十四石各有奇草一萬五千五百四十二束鞏昌計一十一萬七千七百六頃六十三畝有奇田賦銀十九萬六千三百四十三兩糧二萬三千七十四石草三千五百八十二束各有奇浙江計四十五萬六千九百三頃四十三畝有奇田賦銀二百六十九萬五千四百三十二兩米一百三十六萬九千二百五十八石各有奇江西計四十七萬八千六百三十一頃六十六畝有奇田賦銀一百一十七萬九千四百七十六兩米一十二萬七千四百五十二石有奇湖廣湖北計五十三萬五千七百四十一頃一十一畝有奇田賦銀九十八萬八千六百五十六兩米一十五萬七千二十七石各有奇豆五十三石湖南計三十萬五千二百七十六頃六十四畝有奇田賦銀一百九萬二千六百三十四兩米十四萬九千六百一石各有奇四川計二十一萬四千四百五十六頃一十六畝有奇田賦銀二十二萬五千五百三十五兩米五萬七千一百一十九石各有奇福建計三十萬五千二百七十六頃六十四畝有奇田賦銀一百十七萬四千四百四十五兩米一十二萬七千八十石各有奇廣東計三十一萬二千四百七十四頃六十四畝有奇田賦銀八十六萬五千九百二十七兩有奇遇閏加徵銀一萬九千三百一十九兩有奇米二十四萬七千八百四石有奇遇閏加徵米一百五十四石有奇廣西計七萬九千五百三十二頃七十一畝有奇田賦銀三十萬八千一百二十四兩有奇米一十二萬七百二十六石有奇内折色米三萬八千九百二十七石有奇每石折徵銀八錢共三萬一千一百四十二兩有奇雲南計六萬四千一百一十四頃九十五畝有奇田賦銀九萬一千二百五十七兩米一十四萬一千三百七十八石雜徵糧一千六百二石各有奇貴州計一萬二千二百九十頃四十三畝有奇田賦銀五萬七千七百八十八兩米一十萬九千八百五十五石豆七百五十五石各有奇臣等謹按以上據雍正二年奏銷冊開載以康熈二十四年奏銷實數較之凡増田七十五萬九千四百八十四頃二十六畝賦銀一百九十一萬二千八百十七兩糧四十萬二百六十九石草六千六百九十八束嗣後江南江西浙江浮糧額數蠲免至六十餘萬兩今著其原數於此而大書蠲免之詔於後愈以徵損上益下之恩意至深且厚也三年諭周禮稱惟王建國體國經野孟子亦言仁政必自經界始疆界所闗誠為至重從來兩省交壤之地其界多有不清雲貴川廣等省為尤甚至一省之内各州縣地界亦有不清者毎遇命盜等事則互相推諉鑛厰鹽茶等有利之事則互相爭競甚非息事寧民之意各省督撫其共矢公心勿存私見詳細清查如與鄰省地界有不清者則兩省各委賢員公同勘定若本省地界内有不清者即委本省賢員勘定地皆朕土人皆朕臣此盈彼絀悉在朕版圖之内無容分視也雖地界或間有難定之處但平心勘畫即使稍有不協然一定之後久逺得以遵據永無推諉爭競於地方大有裨益矣管理户部事務怡親王允祥奏請酌減蘇松浮糧上曰蘇松之浮糧當日部臣從未陳奏常廑皇考聖懷屢頒諭旨本欲施恩裁減乃彼時大臣以舊額相沿已久國課所闗綦重數以不應裁減固執覆奏凡國家大事因革損益必君臣計議畫一始可舉行若皇考違衆獨斷既非詢謀僉同之義且恐一時減免倘後來國用不足又開議論之端是以從衆議而中止然聖慈軫念蘇松誕敷渥澤屢蠲舊欠以紓民力其數較他處為多是亦與減正額無異也今怡親王等悉心籌畫斟酌奏請甚為可嘉朕仰體皇考愛民寛賦之盛心准將蘇州府正額銀蠲免三十萬兩松江府正額銀蠲免十五萬兩論語曰百姓足君孰與不足周易曰損上益下民說无疆朕但願百姓之足時存益下之懷用是特沛恩膏著為定例可飭令該地方知之是年又蠲免江西南昌府額徵銀七萬五千五百五十兩四年諭錢糧火耗各省舊例亦有多寡不同倘地方官員於應取之外稍有加重者朕必訪聞重治其罪清丈張家口外地限年招種設張家口同知一員管理口外地畝分地畝為十分限年招種如招種至八分以上題請議敘不及五分題請議處仍於每年六月中造冊送部年底照冊奏報以免捏報漏糧之弊五年諭自古帝王致治諴民莫不以重農為首務書陳無逸先知稼穡之艱難詩載豳風備敘田家之力作孟子云民事不可緩也葢國以民為本民以食為天農事者帝王之所以承天養人久安長治之本也我國家撫綏寰宇聖祖仁皇帝臨御六十餘年深仁厚澤休養生息户口日増生齒益繁而直省之内地不加廣近年以来各處皆有收成其被水歉收者不過州縣數處耳而米價遂覺漸貴閩廣之間頗有不敷之慮望濟于鄰省良田地土之所産如舊而民間之食指愈多所入不足以供所出是以米少而價昂此亦理勢之必然者也夫米穀為養命之寶既賴之以生則當加意愛惜而不可存輕棄之心且資之者衆尤當隨時撙節而不可縱口腹之欲每人能省一勺在我不覺其少而積少成多便可多養數人若人人如此則所積豈不更多所養豈不更衆乎養生家以食少為要訣固所以頤神養和亦所以節用惜福也況脾主於信習慣便成自然每見食少之人其精神氣體未嘗不壯此顯而可見者至於各省地土其不可以種植五穀之處則不妨種他物以取利其可以種植五穀之處則當視之如寶勤加墾治安可舍本而逐末棄膏腴之沃壤而變為果木之場廢饔飱之恒産以倖圖贏餘之利乎至於烟葉一種於生人日用毫無裨益而種植必擇肥饒善地尤為妨農之甚者小民較量錙銖且但顧目前而不為久逺之計故當圖利之時若令其舍多取寡棄重就輕必非其情之所願而地方官遽然繩之以法則勢有所難行惟在良有司諄切勸諭俾小民醒悟知稼穡為身命之所闗非此不能生活而其他皆不足恃則羣情踴躍不待督課而皆盡力於南畝矣朕聞江南江西湖廣粤東數省有一嵗再熟之稲風俗如此而仍至於乏食者是地土之力有餘而播植之功不足豈非小民習於怠惰而有司之化導者有未至耶或者曰米穀太多則價賤而難於糶賣昔人有穀賤傷農之説諺語所謂熟荒者此則不必過慮假若小民勤於耕作收穫豐盈至價賤而難於出糶朕必多發官價以糴買之使重農務本之良民獲利而有餘貲也朕生平愛惜米穀毎食之時雖顆粒不肯抛棄以朕玉食萬方豈慮天庾之不給而所以如此撙節愛惜者實出於天性自然之敬慎並不由於勉强且以米穀乃天所賜以生養萬民者朕為天下生民主惟有敬慎寶重仰冀雨暘時若嵗獲有秋俾小民家有葢藏人歌樂土爾等紳衿百姓獨不自為一身一家之計乎若果加意愛惜隨時撙節則天必頻頻賜賚長享盈寧之福若恣情縱慾暴殄天物則必上干天怒不䝉賜賚而水旱災祲之事皆所不免其理豈或爽哉又聞江西廣西地方竟有以米穀飼養豚豕者試思穀食之與肉食孰重孰輕孰急孰緩而乃以天之所賜小民終嵗勤苦之所獲者為豢養物類之用豈不干天和而輕民命乎朕所以惓惓訓諭者惟期天下之人專務本業以杜浮靡愛惜物力以圖久逺共體朕意則爾等家室必至於豐饒爾等子孫必綿其福澤思之思之毋忽朕言著將此曉諭内外官民人等並通行逺鄉僻壤咸使聞知又令直𨽻州縣勸民於村坊樹植棗栗河隄旁種栁陂塘淀澤種菱藕畜魚鳬其地宜桑麻者尤當勤於栽種毎嵗地方官將某村某坊種樹之數申報上司又諭開墾地畝本應隨墾隨報隠匿之罪定例甚嚴祗以法久弊生遂致墾多報少或為民間𨼆漏或為官吏侵漁積習相沿至于年久而奸民猾吏恐一經首報勢必追究從前欺隠之處因而多方回䕶百計掩藏於隠糧漏科之外又添欺㒺之重罪今朕特沛寛大之恩准各省官民自行出首將從前侵隠之罪悉從寛免其未納之錢糧亦不復究問定限一年令其首報統於雍正七年入額徵解倘逾限不首復行查出在官在民定行從重治罪先是户部議准山東開墾地官民隠匿未報者勒限一年令其自行出首續經山東巡撫奏首報地一千七百四十餘頃於雍正五年入額徵解故有是諭明年又令展限六個月又諭各省之中賦稅最多者莫如江南之蘇松二府浙江之嘉湖二府毎府多至數十萬地方百姓未免艱於輸將查蘇松嘉湖賦稅加重之由葢始於明初洪武時四府之人為張士誠固守故平定之後籍諸富民之田以為官田按私租為稅額夫負固之罪在士誠一人而乃歸咎於百姓加其賦稅此洪武之苛政也明朝二百餘年減復不一我朝定鼎以来亦照明例徵收葢因陸續辦理軍需經費所在未便遽行裁減也我皇考聖祖仁皇帝常論及此雍正三年朕仰體皇考多年寛賦之聖心將蘇松二府額徵浮糧豁免彼時頒發諭旨甚明本欲一體加恩於嘉湖因浙江風俗澆漓正須化導不便啟其望恩倖澤之心故爾暫止今見浙俗漸次轉移將来可望改行遷善朕心深慰特沛恩膏嘉興府額徵銀四十七萬二千九百餘兩著減十分之一計免銀四萬七千二百九十兩零湖州府額徵銀三十九萬九千九百餘兩著減十分之一計免銀三萬九千九百九十兩零二府共免銀八萬七千二百兩零永著為例著該督撫董率有司敬謹奉行以副朕蠲賦恤民之意臣等謹按蘇松嘉湖之賦較之他省獨重者由於明初籍諸富民田以為官田按私租之數為官糧之額遂有畝收一石以上者宣徳以後屢減官田之額而官田與民田輕重終自懸殊佃官田者不勝其累至嘉靖之世乃行權宜之法併官民田為一則以官田之重稅攤入民田於是官佃之困少蘇而賦額之浮于他省者終不能議蠲也我聖祖加惠東南舊逋新欠屢詔蠲免世宗仰承先志次第蠲免四府浮糧減嵗額五十餘萬兩除有明二百餘年相沿之秕政三呉黎庶戴徳懷仁永永無極大易有言損上益下其道大光豈不盛哉准雲南貴州二省廣行開墾凡地方招募開墾及官生捐墾者按户數多寡議敘其墾熟田地歸於佃户於次年起科民間自墾者按照年限起科其田俱給照為永業以江南河淤地畝給民耕種江南省安河淀至水家墩一帶地方新淤膏地數千餘頃差部院司官一員同該地方官並河員履畝丈勘其山陽鹽城二縣近年海口深通水由正道所有沮洳水淀皆已涸成髙阜又丈出海口新涸之地六千餘頃共地一萬八千餘頃令查丈官員㑹同該督撫公同丈勘分别年分均給士民人等領種輸租又以各省州縣荒地有難於墾復者如積鹻未消浮沙漲漫山石磽瘠低窪積水之區令該督撫將實在情形聲明仍飭所屬設法開墾不入年限之内六年諭各省督撫布政使等任土作貢天地之常經守法奉公生民之恒性斷無有食地之利而不願輸納正供以干蹈罪戾者何以錢糧虧空拖欠之弊積習相沿難以整理此則胥吏中飽之患未除也或由包攬入己或由洗改串票或將投櫃之銀釣封竊取或將應比之户匿名免追種種弊端不可枚舉其故則由於錢糧完欠細數官未嘗顯示於民在官則以為民欠在民則以為己完故胥吏得以作奸而官民並受蒙蔽也應飭州縣官每年令各莊各里書手將所管欠户各名下已完銀糧若干尚欠若干逐一開明呈送州縣官查對無差即用印出示各貼本里使欠糧之民家喻户曉如有中飽等弊許執串票具控則胥吏不得肆其奸盜矣又如不肖有司借端侵漁那新掩舊之弊不可不察也朕因各省舊欠甚多恐民力難於輸納格外開恩准其分年帶徵其應徵之數有在十年以内者亦有寛至十年以外者酌其多寡分别逺近此朕愛養黎元之至意期于民欠易完而民力可紓乃聞不肖州縣官另立私冊於毎年應徵分數之外溢額多收及至報解之時止照分數起解該管上司因其已經照數起解不復再行稽查而此多徴之數遂得任其侵那又成虧欠之項且民間見已經完納者徒供官吏之侵漁亦遂怠其急公之念而抗延拖欠之事由此而起朕意分年帶徵之項亦應將花户名下毎年應完若干之處詳細開明出榜曉示令其照數完納違者坐以抗糧之罪倘有急公良民完納在分數之外者該州縣官加以奬賞據實詳報若州縣官果能勸導百姓照應徵分數多完若干者著督撫具題照例議敘以上二條乃據朕所聞書示其作何因地制宜之道與斟酌立法之處總在地方大吏詳察弊端權衡損益督率有司實心經理果得忠誠㢘幹之人自無不可清釐之事治賦在乎得人除弊方能立政任地方之重寄者其慎思之是年行順莊編里法議定順莊編里開造的名如一人有數甲數都之田分立數户名者併為一户或原一户而實係數人之産即分立的户花名若田畝未賣而移住他所者於收糧時舉報改正田坐彼縣而人居此縣者就本籍名色别立限單催輸定沿江濱海地畝五年一丈新墾者升科坍塌者除賦准寧夏所屬插漢托輝地募民墾種寧夏東北插漢托輝地南北延袤百有餘里東西廣四五十里二三十里不等東界黄河西至西河其地平沃可墾為田遣大臣㑹同督撫濬治河渠召民墾種官借建房牛具籽種之資凡陜西各屬無業民户願往者計程途逺近給與路費每户按百畝以為世業又諭曰聞彼中得水可墾之地計二萬餘頃毎户以百畝授田可安至二萬户朕已諭令廣行招募逺近人民給以牛具籽種銀兩俾得盡力開墾給為世業惟是原議寧夏本籍見在出仕文武官員俱令開墾授業俾為世享之利今聞報墾者尚覺寥寥禮記曰貨惡其棄於地也力惡其不出于己也况乎上以急公而裕國下以力本而厚生縉紳者小民之望也果能身先倡率則民間之趨事赴功者必多凡屬本籍之人不論文武官員或見任或家居均當踴躍從事爭先墾種不可觀望因循耽延善舉凡兹所墾地畝但照原議給為永業三年起科果能使沃壤腴田有廣收之益無閒曠之區則不但於體國經野之謨重有攸賴而經營世産爾子孫亦䝉永逺之澤矣又准浙江温州府之玉環山招民開墾玉環山孤懸海外雍正五年設同知一員駐其地是年招民開墾前後報科田九百四十四頃二十畝有奇定陜西寧夏公用等田照寧夏上則田例熟田毎畝以一斗八升起科鹻地每畝以九升起科又從前樣田毎畝照全田之例納糧一斗二升草四分六釐四毫中衛縣額設用公田毎畝以一斗八升起科七年諭國家承平日久户口日繁凡屬閒曠未耕之地皆宜及時開墾以裕養萬民之計是以屢頒諭旨勸民墾種而川省安插之民又令給與牛種口糧使之有所資藉以盡其力今思各省皆有未墾之土即各省皆有願墾之人或以食用無資力量不及遂不能趨事赴功徘徊中止亦事勢之所有者著該省督撫各就本地情形細加籌畫轉飭有司作何勸導之法其情願開墾而貧寒無力者酌動存公銀穀確查借給以為牛種口糧俾得努力於南畝俟成熟之後分限三年照數還項五六年後按則起科總在該督撫等董率州縣因地制宜實心經理務使田疇日闢耕鑿惟勤以副朕愛養元元之至意又諭湖南武陵縣宿郎堰水淹田地額糧悉行蠲除又諭直省有寄莊寄糧之弊悉令改正先是直𨽻地方有寄莊寄糧之名往往地寄此處糧寄他處如宣化府之懷安一縣有人地俱在懷安而寄糧於宣化萬全者更有在懷安納糧而寄地於順天府之寶坻豐潤三河相隔五百餘里者至是令直𨽻總督詳察並他省或有類此者俱令該督撫議更正改隸之法後經户部覆直𨽻山東山西河南江蘇安徽江西福建浙江湖南陜西四川廣東廣西等省寄莊寄糧民屯田地應征銀米等項自丙辰年為始悉更正就近徵糧按額報解又諭奉天地畝向來概以上則徵科查彼處地畝多有隠匿每有三四畝止報一畝者是以概以上則徵科民力輸將甚為寛裕前嵗朕遣大臣官員清丈田畝皆得實數今若按畝俱照舊則徵糧恐小民輸將力有未給著盛京户部侍郎㑹同奉天府尹確查田畝之肥瘠分别上中下三則起科酌定成額永著為令是年以陜西朝邑縣與山西蒲州接壤向以黄河為界近河流西徙則西坍而東漲令清丈分界將二省錢糧應豁應徵之數確查定議八年清釐四川所屬田賦先是以四川墾闢田土從未丈勘隠占者多又土著與流民各居其半此侵彼占爭訟日繁雍正五年特遣科道等官會同松茂建昌川東永寧四道親往丈量所到州縣撥户書弓手隨往丈勘如有奸民脅衆阻撓公事照例治罪倘百姓果有寃抑准其詣督撫或欽差官處控告秉公審理誣妄者罪之至是丈量事竣松茂道屬原冊載上中下田地萬八千一百十有八頃山下地估種二千五百五十三石各有奇今丈得十有四萬九千八百四十七頃八十九畝下地估種及衛地糧共六千七百七十四石八斗應徵丁條糧租徭銀二十四萬八千六百三十六兩各有奇川東道屬原冊載上中下田地九萬九千八百四十頃有奇今丈得十有九萬八千七百三十一頃七畝酉陽石砫六土司報納秋糧千四百一十石一斗應徵丁條糧及折徵銀共十有九萬八千八百二十八兩三錢又石砫司應納倉斗米豆折徵銀九兩五錢各有奇永寧道屬原冊載上中下田地萬八千七百四十頃有奇今丈得三萬八千七十六頃三畝應徵丁條糧銀七萬四千一百八十八兩二錢各有奇建昌道屬原冊載上中下田地二萬二千一百五十四頃有奇今丈得四萬三千三百十有七頃十有六畝冷邊長官司報増籽糧二石四斗應徵丁條糧折色馬價差期銀十有一萬三千三百六十兩二錢蕎麥糧萬六千一百七石一斗本色倉斗米豆萬八百二十四石三斗各有奇均應照清釐田地科則徵收按年造入奏銷冊具題察核又諭曰向因四川地畝隠匿甚多以致奸猾之徒侵凌告訐故遣科臣前往清丈又頒諭旨若有額糧稍重之州縣即比照就近適中之科則令其核減以紓民力葢地多糧少者則當按則増加而地少糧多者則當查明減免此朕之本意也近聞該省州縣中有地少糧多之處乃歴年地方官勉强加増者此次清丈並未酌減即如成都華陽郫縣温江等處皆然其他州縣或尚有與此相類者著巡撫憲徳飭令布政使高維新等再加確查若有糧賦稍重之處即據實奏減以副朕均賦恤民之意户部議准四川成都等二十州縣上田毎畝以四分六釐至八分四釐零起科中田毎畝以三分六釐零至七分八釐起科下田毎畝以二分二釐零至五分八釐起科其新増之上地毎畝以一分五毫至一分三釐零起科中地毎畝以七釐五絲至八釐九毫零起科原載之中地毎畝以一分七釐至四分二釐零起科下地每畝以七釐八毫至二分八釐零起科統照均定科則按限徵輸准四川報墾田地分别年限起科先是雍正四年令四川督撫勸諭所屬開墾如民苗愚鈍不知開墾之法擇湖廣江西在蜀之老農給以衣食使之教墾俟有成效日題給老農頂帶送歸原籍不願歸者聴之六年議准各省入川民人毎户酌給水田三十畝或旱田五十畝若有子弟及兄弟之子成丁者每丁水田増十五畝或旱地増二十五畝實在老少丁多不能養贍者臨時酌増除撥給之數外或有多餘三五畝之地亦准一並給墾其奇零不成坵段之地就近酌量安置給以照票收執管業至是松茂道屬報墾荒田九百十有二頃六十七畝荒地七千二百七十九頃十有八畝川東道屬報墾荒田三千九百四十九頃三十二畝荒地九千八百六十二頃六十八畝永寧道屬報墾荒田千九百八十一頃三十畝荒地三千七百二十七頃六十八畝建昌道屬報墾荒田十有二頃六十六畝荒地三十七頃二十一畝各有奇荒田墾種六年起科荒地墾種十年起科至十一年又以苗疆山林坡岡之間猶未盡闢令招民墾種酌定年分分别起科又諭安西沙州等處招民屯墾原議以三年升科從民户到齊之日計算至辛亥嵗乃例當輸賦之期但小民甫經安插公私兼顧為難著寛期二年於癸丑年升科申明三聨串票之法倉場侍郎岳爾岱等言聯三版串之法應令有漕地方畫一通行嗣後州縣徵收糧米之時預將各里各甲花户的名填定聯三版串一給納户執照一給經承銷冊一存州縣查對按户徵收對冊完納即行截給歸農其未截給者即係欠户應查摘追比若有糧無票有票無糧即係胥吏侵蝕立即監禁嚴追諭湖南新設永順府令有産之家限一年内自行開報分别升科永順府向屬永順保靖桑植三土司毎年秋糧共二百八十兩永順一百六十兩保靖九十六兩桑植二十四兩皆由土司交納雖有秋糧之名實不從田畝徵收永順則名火坑錢民間炊爨毎一坑徵銀二錢二分保靖則名鋤頭錢每一鋤入山納銀三五錢不等桑植則名烟火錢與火坑相等所交秋糧即於此内量行撥解至於成熟之田土官多擇其肥饒者自行收種或為舍把頭人分占民間止有零星磽确之地每年雜派數次任意輕重此土司徵民之陋規也改土歸流之後有司或按土户均攤或照土司田種舊冊攤派以完秋糧二百八十兩之數較之土司陋規十不及一民皆歡欣樂輸然無田之家或以火坑等項尚未盡除而有力之家隠占田畝多不輸稅特諭將永順一府秋糧豁免一年其有産之家有司詳明勸諭一年内自行開報官給印照永逺為業按田肥瘠分别升科如有隠漏者照例究治一切雜派私徵嚴行禁革又諭陜西四川地方民風醇樸歴年逋賦甚少查每年徵收錢糧之期四月完半十月全完此定例也朕思四月十月既屆納課之期小民必須預先經營是麥穀未收之時即為輸將之計或因稱貸而受剝于富家或因預糶而大虧其價值且如甘肅地方有徵收本色者若在糧穀未穫之前更為竭蹷歴來川陜錢糧既無拖欠陋習著將四月完半者寛至六月十月全完者寛至十一月俟夏麥秋禾築場納稼之後從容完課十年諭江南蘇松等處財賦甲天下而歴年積欠亦較他省為最多特遣大臣官員會同地方有司徹底清查分析官侵吏蝕民欠三項以除朦混之弊朕因江蘇逋賦積弊􅓜生為此清查之舉所以經國計清吏治而除民累也但念官役之侵蝕奸徒之包攬槖國害民法所不宥而民欠纍纍亦皆抗玩疲頑之習日積月累以至於斯今若概行豁免不惟墨吏奸胥㒺知懲戒且頑户沾恩自以為得計而急公者不與焉非阜民善俗之道也嗣後自雍正十年為始將侵蝕包攬之項分作十年帶徵實在民欠之項分作二十年帶徵如本年帶徵之項完納若干即照所完之數蠲免次年額徵之糧若官吏百姓等果知悔過急公於毎年帶徵額數外多完若干即將次年錢糧照多完之數豁免則朕之清釐積欠並無絲毫入官實皆沛為萬民普被之澤該督撫董率地方官實力奉行倘有生事累民者罪之先是雍正三年江蘇巡撫張楷疏言臣查江省歴年錢糧完欠冊卷自康熈五十一年至雍正元年内止蕭贛榆無欠泰州碭山儀徵江浦欠止數百兩其嘉定長洲等四十七州縣尚有未完地丁漕項等銀積欠至八百八十一萬有奇江省毎年額徵銀三百五十三萬有零再加歴年舊欠共一千二百三十四萬有奇竭小民一嵗所獲斷難責以全完請將各屬舊欠銀兩勻作十分自雍正四年為始毎年限完一分十年按數徵完其嘉定一縣積欠銀共一百四十餘萬應勻作十五分分徵上海崑山常熟華亭宜興呉江武進婁長洲九縣積欠四十萬至六十餘萬兩不等應勻作十二分分徵上深納之勅部議行六年復命户部侍郎王璣刑部侍郎彭維新清察江南逋賦九年事竣通計歴年各屬積欠至一千一十一萬六千有奇其中侵蝕包攬者四百七十二萬六千有奇實在民欠者五百三十九萬有奇遂有是諭十一年令錢糧一錢以下准納制錢凡完糧一錢以下之小户毎銀一分准完制錢十文毎銀一釐准完制錢一文又以大户所完之銀不能恰合零數多成尾欠應將大户一錢以下之尾欠並拆封短少概准完納制錢至十三年令小户錢糧數在一兩以下住址距縣逺者將錢糧交與數多之户附帶投納於納户印票内注明如數在一兩以上及數少而願自交者仍遵例自封投櫃十三年以廣東高雷廉瓊等處平坡山麓及沿海一帶平壤可耕縁粤人不習種旱田以致地有餘利令山東河南二省選善種旱田者往粤教耕十三年寛徵收錢糧之限定例地丁錢糧二月開徵五月停忙八月接徵十一月全完時又以物土異宜樹藝穀麥紡績絲布收穫成就早晚多寡各省不同令督撫按照地方情形酌量徵收不必拘定四月完半之數至花户錢糧在一兩以下者皆係生計不足之人如完不足數即緩至八月接徵全完其力能完半者聴議地方官報墾地有以多報少以少報多或將已墾之地重報及荒熟田畝不分混行造報者分别處分又諭江南江西湖廣等省蘆洲均係沿江沙灘坍漲靡定定例五年一丈而不肖官吏往往借此納賄行私已坍者不得豁除正賦新漲者反可脫漏升科嗣後屆期丈量令該撫於通省道員内選賢能夙著者率同州縣履畝清釐凡有盈縮均按見在實數升除毋使漏課亦毋使賠糧又江蘇所屬腹内地畝曰漕田近水泥灘沙地曰蘆洲或新漲已成漕田仍報升蘆課或蘆洲久成熟地不轉則升科俱令履畝清丈據實定科其實在坍決者除之皇朝文獻通考卷三
