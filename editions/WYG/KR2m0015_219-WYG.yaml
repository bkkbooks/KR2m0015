  text: 欽定四庫全書皇朝文獻通考卷二百十九
  hash: sha256:ab4a8779fd0d710166cd9ee9eefaa51f504b17cf761f6335d8c631fc291a54e9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_219-1a, image: WYG0637/WYG0637-0143a.png}
body:
  text: 經籍考九史臣等謹按馬端臨通考史類自正史以下合編年起居注凡三門雜史以下合傳記偽史霸史史評史鈔凡四門故事以下合職官刑法地理時令譜牒目録凡七門共十有四門蓋以隋史藝文志為宗而參考宋中興以前諸志者也古來著録於正史之外兼收博採列目分編雖各有指歸然門類分而出入仍所不免且代殊事異或昔有而今無或昔無而今有即名目亦不能不因時通變如偽史霸史乃指當時僣撰者而言五朝續通考已遵欽定四庫全書之例改為載記一門今則中外一家咸奉正朔偽霸之名更宜刪易至起居注自宋迄明無可採録續通考改為詔令奏議二類國家列聖相承經綸丕布史局尊藏允宜敬謹恭輯昭示萬世凡詔令之屬謹依馬氏舊例以起居注統之章奏一門馬氏本列集部别集之次顧論事之文與史部為宜今特增奏議類次起居注後故事一門史家多載前代事蹟兹則國政朝章昭垂典冊未敢仍襲舊目爰從四庫書之例昜其名曰政書至刑法為民命所關我朝咸中定制矜慎再三今所著録已恭列於政書類法令中是以刑法門不復更立餘則悉仍馬氏之舊謹列其目曰正史曰編年曰起居注曰奏議曰雜史曰傳記曰載記曰史評曰史鈔曰政書曰職官曰地理曰時今曰譜牒曰目録各依次編輯如左史正史編年欽定明史三百三十六卷乾隆四年大學士張廷玉等奉敕撰臣等謹按我朝定鼎之初世祖章皇帝命儒臣纂輯明史歴康熙雍正至乾隆四年始成書凡本紀二十四卷志七十五卷表十三卷列傳二百二十卷目録四卷其中間有考究未詳者近又承命改正四庫全書謹以新定之本著於録蓋勝代三百年間君臣事實制度典章期於蒐採博洽彰癉愜當歴有歳年昭詳慎也先是康熙中户部侍郎王鴻緒撰明史稿三百十卷頗稱詳贍廷玊等因其本而増損之其間諸志一從舊例而稍為變通蓋自三朝以來屢申公慎之㫖復經皇上睿裁釐正始成定本至若甲申以後續載福王之號乙酉以後并録唐王桂王諸臣則是聖人大公至正之心包含徧覆直與天地同流固非編纂諸臣所能仰窺萬一也已欽定續通志六百四十卷乾隆三十二年奉敕撰臣等謹按鄭樵通志仿司馬遷史記分紀表畧傳總括古今實通史之體也第其書略定規模未及修飾紀傳多因襲舊文標題錯誤不無遺議故四庫全書歸入别史兹續綦唐以後正史皆叅訂異同折衷沿革定為二例一曰異名者歸一一曰未備者增修較之原書體裁實為詳密二十畧蒐羅詳博考証精核如藝文略圖譜略昆蟲草木略則為小變其例以補鄭氏之未備凡此皆仰承指授故條理分明自非樵書所及至於紀傳中恪遵三朝國史之例别立貳臣傳一門此則剏自宸衷垂為炯鑒植綱扶紀之意即寓於揚清激濁之中不特非樵所能知即司馬遷亦見不及此凡讀唐五代宋遼金元諸史者胥當奉此編為定論謹載入正史為古今言通史者之圭凖焉歴代史表五十三卷萬斯同撰斯同見經類朱彝尊序曰季野取歴代正史未著表者一一補之凡六十篇益以明史表十三篇攬萬里於尺寸羅百世於方䇿俾覽者有快於心庶幾成學之助讀史記十表十卷汪越撰徐克范補越字師退康熙乙酉舉人克范字堯民皆南陵人五代史志疑四卷楊陸榮撰陸榮見經類臣等謹按吳縝有五代史纂誤頗能訂歐陽氏舛漏然其書乆佚僅存梗概於永樂大典中我皇上命加編纂始葺成編陸榮在康熙末年宜其未見縝書故以意研求毛舉細故雖間有考訂精核處而引證未免稍疎遼史拾遺二十四卷厲鶚撰鶚字太鴻錢塘人康熙庚子舉人臣等謹按鶚有樊榭詩集自稱所注遼史比於裴松之三國志注蓋其採摭羣書至三百餘種實能考求端緒詳其年月事迹以備參稽惟卷末國語解一編對音舛誤名義多乖伏讀欽定遼金元三史國語詳明釐正於索倫舊語辨别尤精前代之訛至是始昭然若掲前此故牘因仍固不足以責鶚也史記疑問一卷邵泰衢撰泰衢見經類三國志補注六卷附諸史然疑一卷杭世駿撰世駿見經類臣等謹按是書參校異同頗為精核意欲駕出裴松之三國志注之上雖蕪雜之處瑕瑜不掩而訂訛砭漏所得為多亦足資讀史者之一助焉右正史平定三逆方畧六十卷康熙二十一年大學士覺羅勒徳洪等奉敕撰臣等謹按是編恭載康熙二十五年十一月上諭閤臣曰爾等所修平定三逆方畧四册朕已覽畢其中舛錯頗多如王輔臣由雲南援𠞰總兵官授為陜西提督今謂由陕西總兵官陞任至論賛中援宋太祖杯酒釋兵權事吳三桂非宋功臣可比乃唐藩鎮之流耳爾等其酌改之仰見睿鑒親裁權衡至當洪惟聖祖仁皇帝神武懋昭徳威丕播彼三逆恃恩驕恣自外生成是以憤合神人膚勲迅奏而八年之間凡命將遣師指授方畧無不於是編悉載焉千萬世下共欽盛烈昭垂益仰耆定之隆亘古未覩也親征平定朔漠方略四十八卷康熙四十七年大學士温逹等奉敕撰聖祖仁皇帝御製序曰朕祇承天眷懋紹祖宗丕基為億兆生民主薄海内外皆吾赤子雖越在邊徼荒服之地倘有一隅之弗寧一夫之不獲不忍恝然視也西北塞外喀爾喀七旗與厄魯特四部落並號雄藩同奉職貢非一日矣不意有厄魯特噶爾丹者賦性凶殘中懷狡詐戕害其兄弟兼并四部蠶食鄰封其勢日張其志益侈朕初聞厄魯特與喀爾喀交惡隨遣親近大臣頒恩賚以和解之迨其後興兵搆怨又命大臣曉譬利害諭令息争乃噶爾丹抗㫖狂逞致喀爾喀為所潰敗叩關乞援朕收撫之置諸邊内資給餼牽始皆得所而噶爾丹猶修郄如故所在侵陵忽闌入我烏闌布通之地朕授鉞親王大臣問罪聲討大師克㨗未即殄除時賊倉皇宵遁深懼我軍之窮追投牒指誓因而釋之假使噶爾丹能自此悔禍改圖則雖至今存可也夫何轉瞬渝盟包藏不軌窺伺我斥堠揺惑我外藩潜敚我納木扎爾拖音肆虐不止朕深念此㓂斷宜速滅於是整飭士馬備峙糧糗决䇿親征而賊之踪跡飄忽無常又慮其兵至逺颺兵退復入乃授宻畫於科爾沁王沙津令其遣使誘賊約至近地旋調發盛京諸路軍禦東路分遣一軍截西路朕躬統六師從中路入比行近賊巢噶爾丹不敢抗我顔行聞風奔竄朕遂親率前鋒軍併日追擊賊窮蹙已極盡棄其子女輜重而遁㑹與我西路師遇大敗其軍噶爾丹僅以數人跳身走嗣是朕再駕而至鄂爾多斯三駕而至狼居胥山麓宣威布惠兼用互施招徠其黨羽遏絶其歸路其寨桑等接踵嚮附其子復為我擒賊自料勢不能逭遂爾仰藥授首所親信丹濟喇等亦相繼乞降二十餘年狡悍陸梁之勁㓂曾不二載悉皆草薙禽獮而大業克就矣夫烈熖弗戢必將燎原積㓂一日不除則疆圉一日不靖方親征之初舉也在廷諸臣多持異議狃於目前之計者謂兇鋒挫衂無足深憂憚於征繕之煩者謂大漠遊魂難以就縛不知除惡務盡制勝在謀歴觀漢唐宋之已事往往罷敝中國之力而不能成廓清邊塞之功良由經理失宜而殱鋤之不早也朕既逺鑒前轍復追維烏闌布通之失故不避寒暑艱辛親涖窮邊三勤薄伐惟是逆形已著然後徂征怙惡不悛然後摉討身先士卒則櫛風沐雨而人皆忘勞指畫軍儲則轉饟饋師而人爭用命茂草茁於荒磧流泉溢於沙陀萬里經行安如枕席非徼神佑曷繇臻此易曰天之所助者順也人之所助者信也朕仰憑天道俯愜人情以萬不得已而用兵之意乗刻不容緩而滅㓂之機立拯邊境之毒痡永底中原於清晏昭告郊廟適契成謀使非慮出萬全可輕言師旅哉兹前後用兵本未具載卷中覽是編者尚克喻朕心焉臣等謹按卷首恭載御製紀畧一篇後載告成太學及勒銘察罕齊老拖諾昭木多狼居胥山諸碑文始於康熙十六年六月訖於三十七年十月越四十七年七月告成篇中據事直書語無増飾而聖謨廣運親履戎行與大聖人不得已而用兵之心皆昭垂於卷帙則是編誠與日月爭光矣欽定平定金川方畧三十二卷乾隆十三年大學士來保等奉敕撰皇上御製序曰金川方畧纂輯既竣諸臣以聖祖平定朔漠方畧御製序文之例為請夫所謂方略者非遙執事權掣其肘而矜自用千里請戰之謂也惟天子將將將將之道無他信賞必罰而已夫以一隅之不靖徵發士旅飛輓芻糧驛騷輒及數省舉億兆生靈之命委之一將而攻守失據險易弗知怠公事而棄時日失士心而張賊勢甚或揜敗為功逋逃告㨗此而不誅時乃失罰至夫藎臣宣力盡瘁馳驅金石可孚豚魚斯格成勞卓越則車服以庸之旂常以紀之稽績逮於行間執秩陳於幕府酬庸之典孰大於是此而不醻時乃恡賞且夫天討有罪叛則誅而服則舍兵革非快意之圖慘殺違好生之道然非其悔禍誠切向化革心顧以姑息為包荒旋撫旋叛蔓延益熾雖由司事者動乏成算而廟堂之無䇿亦已甚矣朕有鑒於大權之不容旁貸有罪不赦有功必録既服不誅命討一出於事理之當然而實無容心焉此兩年中宵旰憂勤始終弗懈保大定功之本意而編集之不可以已也若乃指授機宜視皇祖之親勤鑾馭固無由仰企萬一而金川夙隸職方亦非噶爾丹絶漠狡冦可同日而語要之行師者保邦之大事爰允所請弁言以示來許臣等謹按是編始於乾隆十一年十一月訖十五年十二月分卷二十有六又恭録御製詩文一卷附載諸臣詩文五卷凡三十二卷首紀九姓之搆釁逮郎卡之歸命具見廟謨決勝洞燭遐荒舞舜羽於七旬宏湯網之一面好生之徳藹然具著於簡編彼怙惡不悛而狡焉復逞者厥後藁街之戮真法所不能再貸耳御定平定凖噶爾方畧前編五十四卷正編八十五卷續編三十三卷乾隆三十七年大學士公傅恒等奉敕撰皇上御製序曰平定凖噶爾方畧書成纂言者以序請夫序者所以叙其事之本末而因文以悉其肯綮也事之本末則方畧三編盡之矣太學之碑磨崖之銘西師之詩開惑之論亦既悉其肯綮矣如是則可以不煩重序雖然五年之間大勲兩集又十年而後書成是不可以無序且朔漠金川前例具在也乃允其請而為之序曰功不可以虗成名不可以偽立幸不可以屢徼志不可以少侈夫用兵中國自古為難而況踰沙漠天山萬里而遥乎旰斯宵斯劼劬以至有成功非虛而名非偽是僅可免後人之指摘耳若夫揚揚自詡以為誠若能操必勝之券則不惟致物議而貽口實於心亦誠恧若也藉衆之力幸厎於績然我士卒之攖鋒鏑者不為少矣故此書之輯率因忠魂義魄不忍令其冺没無聞具載以志之而猶不在於擴土開疆之為也既平凖噶爾延及回部悉主悉臣耕作賦役興焉此亦一再徼幸矣而猶不自知足欲屢試我鋭而别有圖是志侈也志侈者不祥故近日撤征緬之㫖甫降而彼適投誠我兵振旅以還告成事焉此非盈虚消息之理㨗若響應乎是則此序之作不惟廻思而若有驚亦且永圖而懷有戒也臣等謹按是編記開闢西域始末釐為三編自康熙三十九年七月乙未至乾隆十八年九月壬申誌其縁起詳述聖祖以來屢申撻伐之事是為前編自乾隆十八年十一月甲戍至二十五年三月戊申備録掃蕩伊犂及削平阿睦爾撒納殱馘波羅尼都霍集占之事是為正編自二十五年三月庚戍至三十年十一月庚寅凡一切列戍開屯設官定賦規畫善後事宜與討定烏什及絶域嚮風之事畢載焉是為續編蓋前代豐功武畧史不乏書未有展拓黄圖二萬餘里使龍沙雪嶺之間安如庭闥聖武逺揚有如是之超前軼後者於以光昭祖烈垂裕萬年真為書契以來未之一覩者已皇清開國方畧三十二卷乾隆三十八年大學士舒赫徳等奉敕撰皇上御製序曰粤昔成湯放桀於南巢惟有慙徳曰予恐來世以台為口實斯成大聖人昭徳埀裕萬世之訓而非漫為謙辭也蓋世之治亂猶日月之盈晦四時之周序治極必亂亂極亦必返治此守器者所宜保泰而嬗代循環所由有開剏也湯之後為武王其於處桀紂則武已不如湯矣三代以下武之不如其餘又何足屈指數故以開剏論之實不如有元之與我大清也夫中國之嬗代莫非其祖宗本其君之臣子也有元興於北漠我大清興於東海與中國無渉雖曾受明之官號邪究不過羈縻名繫而已非如亭長寺僧之本其臣子也况乎戴不共之讐乘自壞之勢撫定中原建基立極以武王于湯有光擬之則實於漢明有光而唐宋在所弗論矣故兹開國方畧之著不重於繼明定中原而重於自鄂多理以至赫圖阿拉因十三甲篳路籃縷得盛京而定王業若夫興王之始長白朱果蓋猶簡狄元鳥姜源履跡天生聖人治四海必有祥符與衆不同而更在於聖人之奮智勇受艱辛有以冠人世答天命夫豈易哉予小子受祖宗之業每於讀實録觀我太祖開國之始躬干戈冐鋒刃有不忍觀不忍言而落淚者繼思不忍觀不忍言之心為姑息之仁其罪小觀至此而不念祖宗之艱難不勤思政治以祈天永命慎守神器其罪大故令諸臣直書其事以示後世即明臣之紀本朝事蹟如黄道周之博物典彚之類不妨節取以證信實然予此為非啻自勵而已也欲我萬世子孫皆如予之觀此書之志其弗動心落淚深思永念以敬天命守祖基兢兢業業懼循環治亂之機則亦非予之子孫而已矣此開國方畧之書所以作也嗚呼可不敬哉可不慎哉臣等謹按班彪王命論曰帝王之祚必有明聖顯懿之徳豐功厚利積累之業然後精誠通於神明流澤加於生民故能為鬼神所福饗天下所歸往韙哉斯言此雖唐虞三代禪伐不同然而受命之符其揆則一我國家累承世徳誕受鴻圖太祖高皇帝經綸草昩太宗文皇帝式擴昄章洎我世祖章皇帝入關定鼎統一寰區文徳武功蔚然大備而事經十紀或未能縷晰其詳我皇上覲掦前烈埀裕後昆特命儒臣纂述成編冠以發祥世統一篇自太祖高皇帝癸未年始至天命十一年丙寅凡八卷自太宗文皇帝御極始至順治元年甲申凡二十四卷鉅目鴻綱編年紀載逺邁典謨之所紀實為史册所未聞千萬世下跪誦是編共恍然於我祖宗運世之本功徳所紀有如是之艱難締造者宜乎神器之膺與天無極也欽定𠞰捕臨清逆匪紀畧十六卷乾隆三十九年大學士舒赫徳等奉敕撰臣等謹按是編紀戡定山東逆匪王倫而作倫以鷙忍悍戾之徒逞其邪説因而聚黨作奸螳臂之逞誠不自量伏念我皇上臨御以來厚澤深仁淪肌浹髓頻年賑䘏蠲除不下數千萬計食福飲和人思効命神武懋昭勇智天錫宜乎膚功之奏無有迅於是役者篇中所載顛末具陳至其倡亂雖始於夀張而伏誅則在於臨清故以臨清紀畧為名焉欽定平定兩金川方畧一百三十六卷乾隆四十六年大學士公阿桂等奉敕撰皇上御製序曰前平定金川實祇受促浸一處之歸降後平定兩金川則并促浸儧拉兩處削平之而屯戍其地不讀前方畧不知予之撫順宥過之寛惠不讀後方畧不知予之保大經乆之苦心兩金川之偝恩奢望屢赦屢叛與夫不得已用兵之原委亦既見之後告成太學之碑文矣兹方畧成而司事者以序請從其請是贅言弗從其請是闕體以書之有弁辭蕆體例也夫示之義方之謂方定之智畧之謂畧有方無畧失之執有畧無方失之隨二者相需殷而相得彰且方有隅之義而象地畧有包之義而象天乾圓坤方隂静陽動即兵法實不出乎此要之本於敬而弗懈公而無私泰而不驕勤而非躁然後能賞罰明而進退當緩急應而機宜合運之九重之上示之絶域之遥忘憂不可掣肘益不可是必注精神於董事之諸臣而念辛苦於衝􅄡之衆士嗚呼定方畧豈易言而成方畧更難覩也今幸覩方畧之成庶乎五年㤀餐廢寢之勞得以少慰而藉以解後世窮兵黷武之譏所謂伐逆不伐順伐險不伐夷者或庶幾乎臣等謹按篇首恭録紀畧一卷天章八卷末附臣下詩文八卷書中所載平定兩金川事則始於乾隆二十年六月以迄乎四十四年十一月也粤稽冉駹舊地險絶寰區自中國用武以來兵力雖强罕有能至其地者故郎卡歸命而後其子索諾木煽惑小金川僧格桑逞其鷙忍肆厥鯨吞以為石棧天梯勢難飛度我皇上造化由心輿圖在掌運籌九天之上决勝萬里而遥僧格桑授首行間索諾木獻俘闕下仰見耆定之隆實為曠古所未有而昔曾開一靣之網今復申九伐之討者聖主固出於不得已也欽定蘭州紀畧二十一卷乾隆四十六年大學士公阿桂等奉敕撰臣等謹按是編恭紀戡平逆回蘇四十三始末回人久隸版圖散處中國其雜居西北陲者性多獷悍蘇四十三等詭稱傳法於祖國别立新教與舊教搆爭遂萌不逞嘯聚河州用是命將遄征殱除醜類凡睿謨碩畫具著篇中所以為自外生成者之炯戒也欽定歴代紀事年表一百卷康熙五十年内閣學士兼禮部侍郎王之樞等奉敕編聖祖仁皇帝御製序曰古者紀事之書其體有二專紀一事而具其始末者尚書之體也編年而通紀一時之事者春秋之體也自漢司馬遷作史記盡變尚書春秋之體而後世為史者皆師之然其法實不外乎尚書春秋其本紀世家即春秋通紀時事之體八書與列傳即尚書專紀一事之體而所謂年表者又編年之變例也歴代之史具矣而表多缺焉康熙四十四年春朕南巡吳㑹有儒生龔士炯進其所編歴代年表若干卷起陶唐而終於隋朕惜其用心之勤而業未境也乃命侍郎周清源内閣學士王之樞續之迄於元至正之末凡一百卷其體依倣諸史而微有别者諸史之表各分一類而是編則王侯宰輔以及外藩層次附列於帝紀之下諸史之表獨載廢置朝㑹征伐之大者而是編則每事皆係焉是其所以異也代逺文繁親加裁定復考正三元甲子編年一卷列諸簡端昔宋袁樞為紀事本末朱子以為與資治通鑑相表裏亦猶左氏之於春秋既依經而作傳而復别為國語以相錯綜也以是知紀事之書不厭其類之廣蓋以歴世乆逺事物紛賾觀者易於遺忘故别為一體以提其要而使致詳焉是編之作亦所以備史之一類云爾翰林檢討馬豫鐫板告竣為序其大指如此凡例曰司馬遷史記年表及司馬光通鑑目録皆以年為經以國為緯兹本其例記事以朱子通鑑綱目南軒綱目前編商輅續綱目為主酌加裁損復㕘之司馬光資治通鑑金履祥通鑑前編薛應旂宋元通鑑及二十一史始唐虞迄宋元代殊事異表亦隨時變式隨式變例各有取義焉御批通鑑輯覽一百十六卷附明唐桂二王本末四卷乾隆三十二年大學士公傅恒等奉敕撰皇上御製序曰編年之書莫備於皇祖御批之資治通鑑綱目蓋是書集三編為一部自三皇以至元末明初振綱挈目謹予嚴奪足以昭萬世法戒為人君者不可不日手其帙而心其義也然皇祖雖嘗抉精微徴辭旨著論百餘首亦惟析疑正陋埀教後世耳於其書則一仍厥舊無所筆削也故全書篇幅雖多而議論乃什倍於事實即如前編之中總論史論音釋辨疑考證紛不一家正編之中凡例發明書法考異集覽考證正誤質實濫觴益甚至於續編之作成於有明諸臣其時周禮沿尹起莘例作發明而廣義則出於張時㤗效劉友益書法而為之者夫發明書法其於歴朝興革正統偏安之際已不能得執中之論而况效而為之者哉且以本朝之臣而紀其開國之事自不能不右本朝而左勝國此亦理之常也况三編中嬗代崛起之際稱太祖而繫以我者不一而足亦非體例也故命儒臣纂歴代通鑑輯覽一書盡去歴朝臣各私其君之習而歸之正自隆古以至本朝四千五百五十九年事實編為一部全書於凡正統偏安天命人心繫屬存亡必公必平惟嚴惟謹而無所容心曲徇於其間觀其書者凜天命之無常知統系之應守則所以教萬世之為君者即所以教萬世之為臣者也書中批論一依聖祖之例自述所見據事以書者十之三儒臣擬批者十之七而經筆削塗乙者七之五即用其語弗㸃竄者亦七之二云臣等謹按明正徳中李東陽等撰通鑑纂要一書舊藏内府皇上因其紀載舛漏襃貶失宜命儒臣詳稽史傳參訂是非親灑丹毫祥加評斷酌理凖情推見至隠而尤於系統年表示予奪進退之大公大哉王言所謂非一時之書而萬世之書也至於福王南渡殘喘茍延特命於乙酉一年分注以存其位號唐桂二王竊據稱戈跡同昰昺而遺臣軼事猶命考稽顛末附綴篇終此則覆幬之量尤非涑水紫陽所能窺見萬一者已欽定通鑑綱目三編四十卷乾隆四十年奉敕撰皇上御製序曰編年之書奚啻數十百家而必以朱子通鑑綱目為凖通鑑綱目蓋祖述春秋之義雖取裁於司馬氏之書而明天統正人紀昭監戒著幾微得春秋大居正之意雖司馬氏有不能窺其籓籬者其他蓋不必指數矣嘗謂讀書立言之士論世為難非如朱子具格致誠正之功明治亂興衰之故其於筆削鮮有不任予奪之私失襃貶之公者自綱目成而義指正大條理精密後儒有所依據踵而續之由宋迄元釐然方䇿至明代君臣事蹟編輯之難更倍於諸書蓋明史已成於百年之後而世變風漓記載失實若復遲待將何以繼續編而示来許爰亟命儒臣法朱子通鑑綱目義例増損編摩大書以提要分注以備言毎一卷成呈覽朕於幾暇亦時御丹鉛為之參定雖於天人一貫之精微未之能盡而惟是謹嚴之義守而弗失簡正之旨志而必勉書既成羣臣舉唐太宗之事為言勉從其請而為之序云臣等謹按先是大學士張廷玊奉詔輯綱目三編襃貶則極其謹嚴事迹則多所闕漏又塞外人名地名音譯亦踈於考正至是乃特命改修其大書體例悉遵欽定通鑑輯覽細注則備核史傳補遺糾繆使端委秩然又作發明以闡書法増質實以備參稽至於譯語則一本欽定遼金元國語解以訂正其舛訛蓋睿裁精審迥越尋常宜非廷玉等初編之本所能擬其詳密矣綱目分注拾遺四卷芮長恤撰長恤字蒿子原名城字巖尹溧陽人前明諸生臣等謹按朱子作綱目屬分注於趙師淵故其刪削通鑑率多舛漏後人悞以為朱子所作皆强為之詞長恤知非朱子手筆乃取通鑑原文與分注互勘各係考辨於後不特糾師淵之失實可為有功於紫陽也已皇王史訂四卷李學孔撰學孔字瞻黄渭州人順治中官大寧衛斷事竹書統箋十二卷徐文靖撰文靖見經類臣等謹按竹書紀年有附注偽傳出自梁沈約是書稱箋者所以别於注也稱統箋者不特於紀年箋之附注箋之諸凡所引書傳間有偽誤亦并箋之也蓋文靖誤以紀年為原書又誤以附注真出沈約故以箋自名綱目訂誤四卷通鑑胡注舉正一卷陳景雲撰景雲字少章常熟人寄籍吳江縣學生景雲自序曰朱子通鑑綱目屬門人天台趙㡬道成之朱子病其中多疎漏有意更定竟未及為元汪克寛有考異徐昭文有考證凡綱之疎漏據提要正之至分注之誤則在所畧景雲搜覽分注意所未安輒加訂正其綱中之可疑者間附焉資治通鑑後編一百八十四卷徐乾學撰乾學見經類此木軒紀年畧五卷焦袁熹撰袁熹見經類考定竹書十三卷孫之騄撰之騄見經類通鑑綱目釋地糾繆六卷補注六卷張庚撰庚字浦山秀水人乾隆丙辰薦試博學鴻詞庚自述曰通鑑於地名為要地名而有關軍事為尤要通鑑有胡身之注若王㓜學集覽馮智舒質實每於地名不考任意引注庚取胡注校定其半又主顧祖禹讀史方輿記要再證以輿圖名曰糾繆其所未詳者不注者一一補之惟封爵之地多挂空名有不補也讀史綱要一卷王植撰植見經類右編年皇朝文獻通考卷二百十九
