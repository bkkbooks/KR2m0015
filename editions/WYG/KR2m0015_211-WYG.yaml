body:
  text: 經籍考一臣等謹按聖人設為史官以記言行天子之史凡五太史總而裁之以成國家之典故隋志曰史官既立經籍是興至於著録之制漢劉向校經傳諸子詩賦任宏校兵書李柱國校方技每一書就向輒論其指歸辨其訛謬撰為一録其子歆嗣為七畧魏為四部齊梁間為五部七録隋志至以簿録為史類之一即馬端臨所改稱目録者也然而古之人不云經籍也經者徑也常也戴記所稱易書詩禮樂春秋是也籍者借也借簡書以記政事也孟子言諸侯皆去其籍史記蕭何収秦圗籍大抵經之義可以統籍而籍之類實不僅經自隋書以經籍志易班固藝文又倣荀朂四部之例分經史子集惟道經佛經别為二類附在卷末端臨因其舊名作為通考王圻續之其卷首以内府書為一類又眀史官焦竑撰國史經籍志六卷仍四部之舊而卷首别為制書類夫端臨身為宋臣於太平御覽神宗御集等編不分立門部而與故國諸書及臣下諸書為類甚至别寳訓於史類之故事類若王圻内府書多舉宋寜宗至明萬厯以前求書修書之典而著録寥寥焦竑制書類中其勅修一類皆係官書至記注時政一類祗出臣下私記而遽列為卷首之制書又實録寳訓入勅修類中在御製之次輕重亦甚非體我朝列聖相承右文稽古宸章睿製光被區宇自六經諸史以迄百家之學莫不洞幽闡微垂示無極皇上天亶聰明幾餘念典日有孜孜欽定四庫全書裒集宇内官私典籍悉親御丹毫抉摘奥突定為著録間灑宸翰賞歎其用心之勤藏弆之乆兼命列入聚珍傳諸遐邇即使純疵互見亦必列為存目不令片善或遺洵册府之鉅觀藝事之盛事也臣等恭纂經籍考謹遵四庫成規分為經史子集四門列聖御製御纂欽定之書皇上御製詩文集欽定各書恭列卷首至著述諸臣仍載其姓氏官閥或前人論斷有禆本書考訂者亦約載数家以符馬考之例用以見一人作則義協至公四海同風文成大備云爾經臣等謹按馬端臨通考以易書詩禮春秋論語孟子孝經經解樂儀注諡法䜟緯小學分十有三類皆夲列史藝文志以為依㨿區分部别次第秩如惟四書未有專門而諡法别於史部故事類著録欽定五朝續通考増四書而去諡法兹所編輯亦仍其例首五經論語孟子次孝經次經解次四書次樂次儀注次小學凡為類一十有三禮類次序謹遵欽定三禮義疏先周禮而後儀禮樂類中琴譜等從欽定四庫全書之例改入子部藝術類若䜟緯諸書固功令所必懲况我國家經學昌明列聖御纂諸經發聾振聵昭如星日學者奉為準䋲心術端而服習謹瑞應之符緯候之説乆置弗道故亦不復存其目云經易御定易經通註四卷順治十三年大學士傅以漸等奉敇撰臣等謹按卷首恭載世祖章皇帝諭㫖以明永樂間所輯易經大全繁而可刪華而寡要特命儒臣折衷諸論簡切洞達彚輯成編於順治十五年十月書成以漸等恭撰序文上呈乙覽萬幾之暇親為鑒定諸臣欽承聖訓禀受鴻裁發四聖之精微鏡諸儒之得失仰見睿智聰明同符羲昊允宜弁冕羣經昭垂萬世矣日講易經解義十八卷康熙二十二年翰林院掌院學士兼禮部侍郎牛鈕孫在豐等奉敕編聖祖仁皇帝御製序曰朕惟帝王道法載在六經而極天人窮性命開物前民通變盡利則其理莫詳於易易之為書合四聖人立象設卦繫辭焉而廣大悉備自昔包犧神農黄帝堯舜王天下之道咸取諸此蓋詩書之文禮樂之具春秋之行事岡不於易㑹通焉漢班固有言六藝具五常之道而易為之原詎不信歟朕夙興夜寐惟日孜孜勤求治理思古帝王立政之要必本經學甞博綜簡編玩索精藴至於大易尤極研求特命儒臣参考諸儒註疏傳義撰為解義一十八卷日以進講反復卦爻之辭深探作易之㫖大抵造化功用不外隂陽而配諸人事則有貞邪淑慝之别運數所由盛衰風俗所由治亂君子小人所由進退消長鮮不於竒耦二畫屈伸變易之間見之若乃體諸躬行措諸事業有觀民設教之方有通徳類情之用恐懼修省以治身思患預防以維世引而伸之觸類而長之而治理備矣於是刋刻成書頒示天下朕惟體乾四徳以容保兆民且期庶司百執事矢于野渙羣之公成拔茅允升之美則泰交嫓於明良而太和溢於宇宙庶稱朕以經學為治法之意也夫御纂周易折中二十二卷康熈五十四年大學士李光地等奉敕撰聖祖仁皇帝御製序曰易學之廣大悉備秦漢而後無復得其精微矣至有宋以來周邵程張闡發其奥惟朱子兼象數天理違衆而定之五百餘年無復同異宋元明至於我朝因先儒已發之微㫖或有妄参已見漸至啟後人之疑朕自弱齡留心經義五十餘年未甞少輟但知諸書大全之駮雜奈非專經之純熟深知大學士李光地素學有本易理精詳特命修周易折中上律河洛之本末下及衆儒之考定與持論之不可易者折中而取之越二寒暑甲夜披覽隻字片句斟酌無遺康熙五十四年春告成而傳之天下後世能以正學為事者自有所見歟臣等謹按漢唐以來言易者終如自董楷析朱子本義附於程傳十二篇舊第復淆是編恭禀睿裁改從古本先列朱子本義為主而程傳次之卷首載綱領義例綱領者歴代諸儒傳易源流及易道之精作易之義讀易之方説易之槩至義例則括全經之大凡者也上下經迄雜卦通十八卷又朱子啟䝉與本義互相表裏具載全文及附論等别為四卷自漢及明諸家之説其有合者則附録之即問有未合而足佐傳義所不及者為案語以斷之其書詩春秋三經綱領體例悉倣是書為編載云御纂周易述義十卷乾隆二十年大學士傅恒等奉敕撰皇上御製序曰詩義既竣爰從事於周易舉向所闡繹者命詞臣條次其説日一二卦一如詩義之例仍從朱子本義用晁氏本以應十翼之舊編成復為之序夫詩書春秋皆孔子所刪定而於易獨為之十翼以發明藴奥葢卦爻彖象交易變易之道非聖人莫能明故繫之辭以詔萬世而上承伏羲文周三聖之緒則猶夫述而不作之意耳學易者不深味乎聖人之辭則無以探夫分爻立卦之本然而體觀變翫占之實用後儒之偏主一説以為言者非知易者也我皇祖御纂周易折中廣大精微義無不備綜括漢唐以來諸説之全而取其粹言易者無能出其範圍今是編也異其體而宗其義庶無忝乎祖述之㫖云臣等謹按是書大㫖多推闡御纂周易折中之藴謂全易綱領皆本人事以立象逈非虗無之説術數之學所能測其精微取象多因互體尤能發明古義洵足抉羲文周孔四聖之秘㫖集漢宋羣儒之大成矣讀易大㫖五卷孫竒逢撰竒逢字啟泰號鍾元又號夏峰容城人前明萬厯庚子舉人入國朝後流寓河南乃作是書門人耿極為之校訂竒逢自序畧曰至蘇門始學易偶據見之所及撮其體要以示門人初非逐句逐字作解故曰大㫖周易稗疏四卷附考異一卷王夫之撰夫之號薑齋漢陽人前明舉人臣等謹按是編乃夫之讀易時隨筆劄記故毎條不全載經文但取數字標目㑹有疑義始為剖析故不逐卦逐爻盡為之解言必徴實義必據理其於焦京陳邵諸説均無所倚附近代説易諸家以夫之為最有根據易酌十四卷刁包撰包字蒙吉祁州人前明天啟丁卯舉人包自序曰易自庖犧氏一畫始由一畫而加之至三百八十有四變易交易妙有權衡故用酌或仰酌諸天或俯酌諸地或中酌諸人文王作於前酌羲之畫而為彖周公酌羲之畫而為爻孔子畫酌羲彖酌文爻酌周公用成十翼伊川程子以周元公為師既有以酌其源流以明道為兄又有以酌其體用原本孔翼發揮三聖之藴以教天下來世於無窮誠十翼功臣也夫是以纂輯成書以孔子十翼為三聖之階梯以程子傳為孔子之階梯間以朱義補程所未備亦間以諸儒及已意補程朱所未備總之酌朱以合於程酌程以合於孔酌孔以合於羲文周公統四聖二賢之易於一心極而至於家國天下何莫非一易之洋溢也哉臣等謹按包在國初與諸儒往復講學能得要領故所著述悉本義理是書根據注䟽以程子本義為主實足以羽翼宋儒於易學淵㣲深有所得讀易蒐十二卷鄭賡唐撰賡唐縉雲人前明天啓丁卯舉人賡唐自序曰易廣大變通之書也三畫無端六爻不處探理者以為深觀象者以為竒前之所是後或非之此之所疑彼或信之各出所見以得津涯猶之乎測海酌河也王輔嗣蘇子瞻朱元晦楊敬仲數子者或即事以明理或泝源以該流其為經傳羽翼則一也余讀易三十年輒不自揣網羅舊聞裁諸管見求庶幾無戾於理斯已矣大易則通十五卷閏一卷胡世安撰世安字處静别號菊潭井研人前明崇禎戊辰進士厯任詹事府少詹事入國朝官至大學士周易感義無卷數岳虞巒撰虞巒字衡山武進人田問易學十二卷錢澄之撰澄之初名秉鐙字飲光桐城人自號田問老人澄之自序曰我家世學易先君子諱爾卓里人稱敬修先生口授意㫖命澄之詮次名曰見易後余入閩毎念先生教思讀易而見易舊解已失惟記誦章句黙尋經義時有所獲乆之成帙名曰火傳葢以薪盡火傳即此猶是先君子之遺教也既歸里諸書散盡而見易一編獨存因取火傳證之雷同者居多乃盡刪後説微有異則存之又博考諸書凡前人所已道者皆削去一歸諸前人寧為述者可也徐秉義曰澄之習京邵之學通隂陽五行家言至於象緯律厯竒門大乙之書無不究也晚年乃盡棄之惟日玩本義故其為書明白簡易間有所得則一以繫傳為據其論卦爻則在辨卦位審卦主原卦變以承乗比應之義合全體而斷之易學筮貞四卷趙世對撰世對字襄臣衢州人麗竒軒易經講義無卷數紀克揚撰克揚字武維號六息文安人羲畫憤参二十五卷陸位時撰位時字與階錢塘人官鄞縣訓導位時自叙畧曰小憤小悟大憤大悟不憤不悟憤之云者心求通而未得之意故云憤参周易辨疑無卷數李開先撰開先字傳一長夀人開先自序曰伏羲之卦乾父與坤母相錯長男與長女相錯中男與中女相錯少男與少女相錯所謂進退存亡不失其正也文王之圗則仿河圗天一生水地二生火天三生木地四生金上下左右各順其方其次金生水水生木木生火火生土也雖然不必求之文字也玩方圎圗便已得之余初讀易杳不得其津涯後見來瞿塘始知所謂卦變始知所謂錯綜其中亦不無支離穿鑿之病余且讀且思毎至午夜不眠覺有若啓之者因作辨疑一書臣等謹按開先受易於其鄉人來知徳故卷首列知徳太極圗及羲文卦次卦位方圎諸圗卦變圗六十四卦錯綜圗毎卦論辨卦象爻畫悉本師説居多惟卦變之説與知徳不合又往往駁本義而不顧所安故委曲遷合語多不倫則亦好為立異之流也易存無卷數蕭雲從撰雲從字尺木蕪湖人前明崇禎己卯副榜貢生易學象數六卷黄宗羲撰宗羲字太沖號梨洲餘姚人前明御史尊素之子康熙初常薦修明史未赴宗羲自序畧曰易廣大無所不備自九流百家借之以行其説而易之本意反晦世儒過視象數以為絶學故為所欺今一一疏通之知其於易本了無干渉而後反求程傳亦廓清之一端汪瑞齡曰姚江梨洲夫子慨象數之失其正而為異説所淹汨也作論辨之其倚附於易似是而非者析其離合為内編三卷其顯背於易而自擬為易者決其底藴為外編三卷瑞齡獲受是書而卒業焉周易象辭二十一卷附尋門餘論二卷圗學辨惑一卷黄宗炎撰宗炎字晦木餘姚人宗羲之弟宗炎尋門餘論自序曰七八嵗時随先忠端公授周易本義句讀稍長兄太沖先生命讀王註程傳不過為博士弟子之學無所得於心也間從蕺山夫子與聞緒論未能冇所啟發每與執友陸文虎共閲郝仲輿先生九經解其融㑹貫通一洗前人訓詁之習遂有白首窮經之約擬以五十之年息絶世事専功畢力以補少壯之失或有億中頓忘困苦而姜子蒼涯毎出竒思更相問難因而隨筆雜述未能鱗次命之曰尋門餘論見得門而入之難也又圗學辨惑自序曰易有圗學非古也注疏猶是晉唐所定之書絶無言及此者圗學三派出自陳圗南以為養生馭氣之術與易道無關夫上古何甞有圗但文字未備畫為竒耦示文字之造端爾陳氏不識古文古字悞以為圗也可不辨歟陸嘉淑曰晦木尋門餘論直欲與洛閩大儒質辨於千載之上名書之意以乾坤為易之門恐不得其門而入故探索以尋之周易説畧四卷張爾岐撰爾岐字稷若濟陽人周易纂解正宗六卷謝復茪撰復茪字菁來吉水人周易麈談無卷數不著撰人名氏按朱彛尊經義考載孫應龍有周易麈談十二卷疑即此本應龍字海門餘杭人順治丁亥進士官隰州知州周易淺述八卷陳夢雷撰夢雷字省齋閩縣人順治己丑進士官翰林院編修坐謫戍䝉恩召還校正銅板縁事再謫尋卒臣等謹按凡例云解易者數千家未能廣覽葢此書為其初赴尚陽堡時所作行篋乏書故以朱子為主而僅参引王注孔疏蘇軾傳胡廣大全來知徳注諸家問以已意参考異同頗能掃除轇轕至卷末附其友楊文言所作三十問文言字道昇武進人所説多支離穿鑿遜於夢雷本書多矣易宗集註十二卷孫宗彛撰宗彛字孝則髙郵人順治丁亥進士官吏部郎宗彛自序曰聖人作易因象而測其數因數以測其理象有象之宗也數有數之宗也理有理之宗也河圗洛書五皆居中中五象之宗也五數之宗也中理之宗也中􅉼隂陽静乃生動此中之所以為理宗也是伏羲作易之宗㫖也孔子贊之教人執禮禮由中制故曰觀其㑹通以行其典禮是孔子傳易之宗㫖也六十四卦之内凡陽之毘於隂隂之干於陽無非利也利屬隂惟陽可以抑之乾不言利其利及物坤言利其利得主而貞不可以不辨也是又所以執中所以執禮之宗㫖也子受其㫖於先大夫五十年而始明其數信數之合於象而契於理如此也作易宗志不忘也周易纂註無卷數朱竒頴撰竒頴字九愚嘉定人順治辛卯㧞貢生官平遥縣知縣易史参録二卷葉矯然撰矯然字思菴閩縣人順治壬辰進士官樂亭縣知縣大易疏義五卷王芝藻撰芝藻字淇瞻溧水人順治甲午舉人周易滴露集無卷數張完臣撰完臣字良哉平原人順治乙未進士周易疏畧四卷張沐撰沐字仲誠上蔡人順治戊戍進士官資縣知縣譚瑄曰仲誠受學於容城孫竒逢易疏畧四卷自為之序臣等謹按沐於五經四書皆有疏畧是編自謂悉本孔子十翼之義然所注仍多取舊説雖力排陳邵之學而卷首仍列諸圗用朱睦㮮之例改卦畫為先上後下殊昧始初終上之㫖加年堂講易十二卷周漁撰漁字大西興化人順治己亥進士官翰林院編修漁自序曰是講也與朱子本義程子傳及古今來言易之家大相違背而吾黨之内有窮年學易而不得其解者莫不懽忻鼓舞而聴受之謂能發數千百年所未發漁不敢當若謂羲文周孔四聖人明道覺世之㫖不終晦於天下假吾之心慮口宣以代為發是則烏能辭臣等謹按漁自序諸語自負甚髙然觀其書多好為翻竒立異之論非有根柢之學者也讀易近解二卷湯秀琦撰秀琦號弓菴臨川人順治中歳貢生官鄱陽縣訓導易原就正十二卷包儀撰儀字羽修邢臺人㧞貢生儀自序畧曰早年聞有皇極經世而無由求得其書自順治辛卯至康熈己酉薄遊麻城乃得其書於王可南家至江寧玩求其㫖者一年始有所得乃作易原就正大易通解十七卷魏荔彤撰荔彤字念庭栢鄉人大學士裔介子官至常鎮道易圗明辨十卷胡渭撰渭原名渭生字朏明號東樵徳清人臣等謹按是書専為辨定圖書而作卷一辨河圗洛書卷二辨五行九宫卷三辨周易参同先天太極卷四辨龍圗易數鈎隠圗卷五辨啟䝉圗書卷六卷七辨先天古易卷八辨後天之學卷九辨卦變卷十辨象數流弊皆根柢羣言悉心参證其視元明以來陳應潤吳澄歸有光毛竒齡黄宗羲宗炎諸人所論述尤為窮源溯委洵足為易學指迷之一助也易經衷論二卷張英撰英字敦復桐城人康熈丁未進士官至大學士諡文端周易通論四卷周易觀彖十二卷李光地撰光地字厚菴安溪人康熙庚戍進士官至大學士諡文貞光地觀彖自述畧曰彖者材也文王以六爻為取用之材彖詞既繫六爻之義具焉爻詞之作所以推廣彖辭故云智者觀其彖詞則思過半惟彖可以該爻而論爻者不能外彖觀彖之名葢取諸此也周易郁溪記十四卷郁文初撰文初號郁溪蘄州人官至肇慶府知府文初自述曰文初生固陋從來學易諸家其書不能遍讀自天啟乙丑迄今丁酉三十三年霽心澄慮優游浸入而弗能自已以筆紀之日一改焉歳一改焉入仕以來閲十載庶乎淺深得失之辨可考以自驗若其竊聖人之藴附述作之林則吾豈敢周易起元十八卷陳圖撰圖字寄巖永豐人易贅二卷王艮撰艮字無悶歙縣人艮自序曰吾早歳讀易見爻之義而疑焉見卦之名而疑焉以質於人聞其告我之説而益大疑焉於是悉屏其文獨取象以觀之以我之疑而質之象象不我告則悶然退退而益不自得則悶益深悶極而幾忽啟焉急取而證之無不合也此庶幾為全易乎易大象説録二卷吴舒鳬撰舒鳬一名逸字吴山吳縣人周易惜隂録四十六卷周易存義録十二卷周易惜隂詩集三卷徐世沐撰世沐字爾瀚江隂人事蹟載江南通志儒林傳臣等謹按世沐惜隂録多本宋都絜緒論解經以變爻為主存義録即取惜隂録刪削之非别為一書惜隂詩集凡四言五言七言多至一千餘首葢取經傳字義分類題咏大率仿用張九成論語詩例因非詩集之體故仍附易類云圖易定本一卷邵嗣堯撰嗣堯邭陽人康熈庚戍進士官至江南提學副使嗣堯自述畧曰河洛之數一乗一除小圎圖即小横圗之順徃逆來大横圗即小横圗之因重成爻大圎圗即小圎圖之運行寒暑方圗即大圎圗之乾君坤藏文王二圗寔由此而變通之又自序曰此書凡四易稿一刻於都門再刻於上谷三刻於襄陽屢有改竄此本刻於康熙甲戍始為定本易經述無卷數陳詵撰詵字叔大號實齋海寜人康熙壬子舉人由中書科中書官至禮部尚書諡清恪周易廣義六卷潘元懋撰元懋字友碩鄞縣人元懋自序曰廣義云者取蔡氏䝉引林氏存疑諸書以廣本義之所未盡易為占筮作而能有以冐天下之道誠合理數以求之微本義其誰與歸幸蔡氏林氏之書具在因得服膺所傳以求本義縁本義而傳而經而無迷於數無戾於理或可免於曲學阿世之誚焉合訂刪補大易集義粹言八十卷納喇性徳編性徳字容若正黄旗滿洲人康熙丙辰進士官至乾清門侍衛性徳自序曰宋陳友文大易集義六十四卷方聞一大易粹言七十卷摭拾宋儒論説凡十八家而粹言所採二程横渠龜山定夫兼山白雲父子七家其康節濂溪上蔡和靖南軒藍田五峯屏山漢上紫陽東萊十一家之説皆集義上下經所引粹言則未之及也粹言有繫辭説卦序卦雜卦集義止上下經向竊病其未備因於十一家書中将講論繫詞以下相發明者合而訂之間以臆見考定焉大易蓄疑七卷劉䕃樞撰䕃樞字喬南韓城人康熙丙辰進士官至貴州巡撫周易筮述八卷王宏撰撰宏撰字無異號山史華隂人康熙己未薦試博學鴻詞宏撰自序曰易者天也筮者人也伏羲文王周公言天孔子言人葢易至孔子而正徳之事備則莫備於筮筮者和順於道徳而理於義窮理盡性以至於命之學也聖人以卜筮為教觀象玩辭觀變玩占顯諸仁藏諸用人事盡而天事協夫豈苟焉而已哉臣等謹按是書雖為筮蓍而設然大指多推本經義述本義之藴而復兼採諸家如筮儀則參以汴水趙氏變占則稽之左傳推驗則取之陸氏立論悉有根据固非方技術數者流所得而相提並論也仲氏易三十卷推易始末四卷春秋占筮書三卷易小帖五卷河圗洛書原舛編一卷毛竒齡撰竒齡一名甡字大可號秋晴一曰初晴又以郡望稱西河蕭山人康熙己未舉博學鴻詞官翰林院檢討竒齡自述曰余仲兄與三名錫齡在崇禎之季得錮疾授生徒以説經自娱而尤長於説易謂余曰古賢處憂患者必明易汝知之乎余拜而受言暨乞假歸而仲氏已不可見顧其説易實有西漢以來遺法為宋元諸儒所未及者余就兄子口授大㫖暨各卦詁義而擴大之為仲氏易李澄中曰推易始末者西河毛氏發明仲氏易推移之義葢即前儒卦變卦綜之説而暢之朱彛尊經義考曰易小帖係西河氏雜記説易之可議者臣等謹按占筮書内傳十四條外傳二條附十二條竒齡自以向所著推易始末一編書成而易義明即占易之法亦明故稍存其説於卷中其曰春秋者摭春秋傳所載占筮以明古人之易學實不為春秋而作故仍附易類小帖百四十三條叢説無次第葢竒齡説易之語而編次則出門人之手原舛編一卷竒齡以易大𫝊言河出圗洛出書尚書及論語單言河圗大抵圗為規畫書為簡册無非典籍之類自竹書紀年謂龍圗出河帝王世紀謂河出龍圖洛出龜書而記載家彼此紛錯故名其書曰原舛喬氏易俟十八卷喬萊撰萊字石林寳應人康熙己未舉博學鴻詞官至翰林院侍讀嚴繩孫曰石林尊人侍御聖任先生以理學名家易俟一書大約得之過庭之訓為多讀易日鈔六卷張烈撰烈字武承大興人康熙庚戍進士授内閣中書己未舉博學鴻詞改翰林院編修官至左春坊左賛善易論無卷數徐善撰氏籍未詳臣等謹按是書序中稱為南州徐敬可則當為南昌人而善自署郡望又曰嘉禾則似與左傳地名考序中所稱徐善為一人未知孰是周易應氏集解十三卷應撝謙撰撝謙字嗣寅錢塘人康熈己未以博學鴻詞薦徴不起撝謙自序曰隂陽之理著於易人莫不喜長而惡消喜盛而惡衰是故知進而不知退知存而不知亡若君子則不以盛衰消長易心而一歸於中正喜通惡窮而易其性君子不為也天地之大徳莫善於中用中之宜莫善於時是書也以中明易初曰易學大中既而懼其自以為是非所以求教於君子也乃以應氏集解名之易原無卷數趙振芳撰振芳字香山山隂人易或十卷徐在漢撰在漢初名之裔字天章晚年乃易今名字寒泉歙縣人在漢自序曰仲尼不云乎或之者疑之也疑者人心之所以不窮而鼓舞之所以盡神也不疑則人心息人心息則天地之變化不可見而易或幾乎息矣漢以疑學易以疑名易以疑就正天下萬世之學易者則天下萬世無窮之人心皆生生之易爾已易經辨疑七卷張問逹撰問達字天民江都人問達自序曰愚總角受易竊以學易者學此易於身也用易者用此易於世也反諸心而求聖人明道立教之心而天地萬物之心其在我心以外乎故不自揣度折衷異同附以已見其實在於尊信羲文周孔而非有間於先儒也然則是編也其敢遽以為是乎冀如錫曰天民得力於陽明良知之學故其書黜數崇理而談理一歸之心力周易通十卷周易辨二十四卷浦龍淵撰龍淵字潛夫吳縣人甞佐洪承疇幕薦授城歩縣知縣嚴沆曰呉門浦潛夫學易既乆一旦有悟於洗心之㫖遂貫通全易以孔子之言折衷羣言之非是與似是而非者既有易通十卷以疏大義又有易辨二十餘卷以辨析微辭可以翼往聖而開來學者也葉方藹曰浦潛夫易辨理明辭達體諸身心參諸世務援据經史博採衆説㑹而通之使一經條理了然心目之間故其分疏彖象六爻及繫辭諸傳無不首尾融貫事理昭晰周易義參六卷于琳撰琳字貞瑕平湖人嵗貢生身易寔義五卷沈廷勱撰廷勱字克齋嘉興人康熙中貢生官至商州知州廷勱自序畧曰易為盡性之書而實誠身之書也盈天地皆易則盈天地皆身之用此三極之道所以必待聖人之參贊而立乎其中與行乎其中之道始不虚也余為是編名之曰身易寔義謂以心言易未若以身體易之為寔以身體易又必以易見諸用之為寔也皇朝文獻通考卷二百十一
