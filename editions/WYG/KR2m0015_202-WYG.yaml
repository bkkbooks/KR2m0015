body:
  text: 刑考八刑制乾隆四十一年定拿獲軍營脱逃餘丁遣發例刑部遵㫖議定凡軍營脱逃餘丁在軍務未竣以前拿獲者問擬斬罪牢固監候俟大功告成後通行確查將附近新疆陜甘二省之人改發雲貴兩廣極邊烟瘴充軍其餘各省俱發伊犁烏嚕木齊酌量安插面刺脱逃餘丁字樣若在配復逃請㫖即行正法其自行投首并篤疾者杖一百流三千里互見徒流門定州縣承審凌遲重案錯誤未經招解改正照誣告人死罪未決問擬例諭㫖據御史李廷欽奏已革英山縣知縣倪存謀於僧人廣明因姦致身杜得正一案不能審出實情反將屍子杜如意疊加嚴訊以致畏刑誣服幾成寃獄僅予革職實乃罪浮於律請嗣後凡有大逆極刑并決不待時之案如有任情顛倒率意刑招之員除嚴行㕘革外即照誣告人以死罪而未決定擬等語地方官承審命案其故入人死罪而已決者即以其罪罪之所以儆酷吏而重民命定例不為不嚴惟枉坐人罪經上司審明改正者向因囚尚未決止照草率定案例㕘革但遇事闗逆倫重案如此案屍子畏刑誣服即應寸磔若非該撫等審出實情另行定擬幾至沈寃莫雪自非尋常無心失入人罪可比僅予革職實不足蔽辜但所寃之人究未決訖其應如何酌定條例之處著該部詳議具奏尋議凡州縣承審逆倫罪闗凌遲重案如有故入失入除業經定罪招解者分别已決未決按律定擬外其雖未招解業已定供通詳經上司提審平反究明失入故入各照本律減一等問擬其餘尋常審案仍照舊辦理定僧人殺死本宗卑幼及尊長因姦盜殺死卑㓜均同凡論例諭㫖刑部進呈秋審招冊朕詳加披閲内浙江省之僧靜峰起意毆死其俗家胞弟周阿毛圖賴邢直武等一案照故殺期親弟妹律擬絞監候又江西省郭義焙謀財殺死小功堂姪郭了頭仔一案照尊長謀殺本宗卑幼已殺者依故殺律擬絞監候雖皆擬入情實而所引之律俱未允恊僧人披剃出家即不當復論其俗家卑幼且致死人命即以犯其殺戒今靜峰因周阿毛癡呆無用輒行謀死圖賴洩忿兇殘殊甚彼既不念手足之誼何得復援卑幼之條刑部所以引此者因律有為僧於本身親屬有犯仍按服制定擬等語遂爾概行比附殊未思律言有犯専指尊長而言如僧人犯其祖父伯叔自不可因已出家稍為末減若卑幼本不可言犯又安得由犯尊之律推而下及乎是僧人致死俗家卑幼斷不當復以服制論也至郭義焙因其六嵗㓜姪郭了頭仔頸帶銀項圈輒行起意扭取見其哭喊遂行推跌糞坑溺斃兇惡殘忍情殊可惡且該犯意在圖財視堂姪如草芥盜攫而殘其命於死者恩義已絶又豈可復引謀殺卑幼之條乎夫尊長之於卑幼或不遵教誡或干犯名義責打致斃本律原止擬流若因財産起衅則不得概用此律從前曽降諭㫖勅部準情定擬是以有兄及伯叔因爭奪財産將弟姪故行殺害者擬絞監候一條然此亦第専指尋常索財爭奪因傷斃命而言蓋弟姪原有贍給尊長之義故尊長之罪尚可稍輕若謀財害命及强盜得財致死弟姪更復有何倫理以及圖姦卑幼之妻復將卑幼謀殺者此等兇徒身已蔑倫傷化定擬時轉因倫紀原情又豈明刑弼教之本意乎著刑部另行改議具奏以昭平允尋議凡僧人有犯本家祖父母父母及有服尊長仍按服制定擬外若致死本宗卑幼無論鬭殹謀故俱以凡論女尼道士喇嘛有犯一例辦理凡有服尊長殺死卑幼如係謀財害命强盜放火殺人及圖姦謀殺等案均照平人一例辦理不得復依舊制寛減其餘尋常親屬相盜及謀故殹殺卑幼之案仍照例議改定男子拒姦殺人減等例刑部奏改凡男子拒姦殺人之案除事後指姦並無實據者仍照謀故鬭殺本律定擬外如當場見證確鑿及生者生供有據或屍親供認可憑者照鬬毆律減一等擬杖一百流三千里奏請定奪互見徒流門定軍營逃丁投首分别軍務已竣未竣治罪例諭㫖據刑部議覆文綬奏審擬投首逃兵彭士仁汪國才照例即行斬決一案朕以此等逃兵如在軍務未竣以前聞拿投首其人尚知畏法若係大功告竣以後明知不復用兵始行投首不可不申明軍律俾營伍共知儆戒因諭令文綬查明該二犯投到日期據實奏聞今據覆稱查明彭士仁係於上年十月十二日在桐梁縣投到汪國才於上年十一月初十日在巴縣投到等語此等兵丁在軍營潛行脱逃原屬法無可逭但既查明該二犯軍務未竣以前自行投首尚屬心存畏法較之撤兵以後妄冀僥免始行投到者究屬有間尚可格外施恩於萬無可貸之中宥其一死著交刑部仍照從前例發烏嚕木齊給種地兵丁為奴其大功告成後投首者不得復援此例互見徒流門定竊盜圍塲拒捕之例刑部遵㫖議定拿獲圍塲内偷打牲口砍伐木植人等除照例治罪外若有緝拿時曽經拒捕不肯就擒者先枷號三個月再行照例發遣烏嚕木齊等處如敢拒捕致緝拿之人成傷者擬絞立决増改殺一家四命以上妻子加重定擬例諭據楊景素奏王之彬因挾董長海王三麻子挑撥㣲嫌輒持刀將董長海王三麻子夫婦子女同時扎死連斃六命兇惡慘毒實屬從來所罕有然按律不過凌遲處死實覺罪浮於法至伊妻劉氏子王小雨雖據該撫從重擬發伊犁給與種地兵丁為奴尚不足以蔽其辜夫王三麻子全家俱被殺害而兇犯之子尚令倖生人世以延其後豈為情法之平若云王小雨年僅十嵗則該犯所殺之王四妮王五妮皆孩穉無知尚未至十嵗一旦盡遭慘死何獨兇犯之子轉因其幼而矜原之乎且此等兇惡之徒為戾氣所鍾不應復留餘孽即伊四嵗之幼女王三姐亦不宜輕宥如查明被殺之家尚有子嗣即將兇犯妻劉氏及其幼女一併賞給死者家為奴若現已無人即發徃伊犁給與厄魯特為奴至刑部律例所載惟及殺一家非死罪三人而止至全家被殺多人之犯作如何加重未經議及此等兇徒明知法止其身或自􅂸一死逞其殘忍殺傷過多以絶人之嗣而其妻子仍得倖免於天理人情實未允恊其應如何増改律例並著刑部另行妥議具奏尋議謀故殺一家非死罪四命以上致令絶嗣者兇犯擬以凌遲處死㐫犯之子無論年嵗大小概擬斬立決妻女改發伊犁給厄魯特為奴若死者尚有子嗣即將兇犯之子俱擬斬監候妻女給死者之家為奴如本家不能管養不願収領者亦改發伊犁給厄魯特為奴互見徒流門増改互毆致死多命案内餘人分别定罪之例舊例餘人不論多寡己未傷人并或尋常金刃傷人概杖一百至是雲南按察使汪圻條奏如尋常互鬬衅起一時共相謀毆止斃一命者謂之餘人滿杖自屬平􅁢若糾衆洩忿執持防家器械互毆均傷二命三命者其夥徒助毆之人皆係知情與衅起一時偶然在塲幫䕶者輕重懸殊未可概以餘人科斷應請區别尋經部議凡糾衆互毆數在五人以上致斃二命三命者案内例止擬杖之餘人如有輾轉糾人助勢及執持金刃器械傷人者比照原謀滿流律減一等杖一百徒三年若猝遇在塲幫䕶審非預糾械鬭及互鬬止斃一命之餘人有執持兇器及金刃傷人者各照兇器金刃傷人本律定擬其餘仍照餘人科斷互見徒流門増定殹故殺人案内聴從擡屍埋藏例雲南按察使汪圻條奏凡毆故斃命及格殺姦盜懼罪私埋之案聴從扛擡掩藏之人律無治罪明條厯來辦理悉照地界内有死人不報官司律杖八十如共殹有傷即畧去私埋科以餘人滿杖向無分别治罪夫夤夜格殺及追捕格斃之案正犯本不應擬抵其幫同私埋之人擬杖八十已屬平允若毆故殺人之案兇犯起意埋藏滅跡刨坑棄井情形不一總湏捲裹扛擡勢非一人所能為者使夥犯知有嚴譴不肯相幫自必即時發覺死者可免刨驗之慘兇徒不致漏網之虞請將聴從扛擡埋藏之犯審係在塲幫毆有傷律應滿杖者照棄屍不失律擬杖一百徒三年未經傷人者照里長地隣棄屍水中為首律杖六十徒一年其不知情受雇並因格捕姦盜致死私埋例不抵命等案仍照地界内有死人不報官司輒埋藏律擬杖部議應如所請從之互見徒流門定承審命盜重案正犯供單送部例刑部議准兵部侍郎高樸條奏各省承審命盜重案於取供畫押時令要犯畫供二紙一紙存署一紙申送督撫随案送部如有抑勒畫押情弊經上司究出即據實揭㕘若闗罪名出入者將該州縣照故出入人罪律辦理至尋常外結之案亦即照此例將原供各畫二紙一存本署一送臬司備案定問擬徒罪官員㑹赦冊報例廣西巡撫吳虎炳奏定凡官員問擬徒罪不論己未到配遇赦減免令各督撫造冊咨部彚題存案其有闗人命擬徒常犯遇赦減等另冊報部核辦不得與尋常徒犯按季冊報申旗圓園館看戲之禁凡旗員赴戲園看戲者照違制律杖一百失察之該管上司交部議處如係閑散世職將該管都統等交部議處定救親情切毆傷伯叔例凡胞姪毆傷伯叔之案審係父母被伯叔毆打垂斃實係情切救䕶者照律擬以杖一百流二千里刑部夾簽聲明量減一等奏請定奪互見徒流門定瘋病連殺二命以上擬絞監候例從左都御史崔應階請也改定强娶孀婦致死例刑部奏改婦人夫亡情願守志别無主婚之人若有用强求娶逼受聘財因而致死者追給埋葬銀兩發近邊充軍互見徒流門改定姦夫自殺其夫姦婦不知情例刑部奏改凡姦夫自殺其夫姦婦雖不知情而當時喊救與事後即行首告將姦夫指拿到官尚有不忍致死其夫之心者仍照本律定擬該撫於疏内聲明法司核擬時夾簽請㫖増定虧空錢糧入已限内完贓不准減等例四十二年申定呈告忤逆事實即行發遣之例諭昨江蘓巡撫楊魁題請將桃源縣民孫謀掌毆伊父孫尚文并咬落指節擬以斬決一疏已批法司核奏矣查閲本内孫尚文供伊子孫謀平昔不孝屢次違犯曽於三十七年九月禀縣枷責等語彼時辦理實屬非是該犯孫謀忤逆既經伊父禀縣即應嚴行辦治向來刑部辦理呈告忤逆之案皆按律科罪即從輕亦擬發邊此案地方官若照此辦理何至尚留敗類任其囘家肆行狂悖幸而孫尚文被咬未死設使因傷致斃或竟有逆倫之事則是因一時姑息之心留此梟獍使得肆毒於其父母於倫紀風教大有闗係嗣後各省似此忤逆之案俱應照例坐以發遣著刑部定議具奏尋議凡呈告忤逆之案除子孫實犯毆詈罪干重辟及僅止違犯教令者仍各依律例分别辦理外其有祖父母父母呈首子孫懇求發遣及屢次違犯忤逆顯然者即將被呈之子孫發烟瘴地方充軍旗人發黑龍江當差互見徒流門定東省夾帶無票流民私渡並地方官濫行給票之例東省登萊等處有票船隻如有夾帶無票流民私渡奉天者將船戸照無票船隻夾帶流民例量減一等杖九十徒二年半船隻入官若船戸不能親身出洋别令親屬押駕已經報官不給票者將狎駕之人即照船戸例治罪船隻入官其有民人藉稱尋親覓食出口並無確據者地方官概不許給票如不查明確實濫行給票放行致有私刨樵採及邪教煽惑等事别經發覺將給票之地方官照濫行出結例議處定囘民結夥行兇分别問擬軍徒例刑部議准囘民結夥三人以上執持兇器毆人之犯發雲貴兩廣極邊烟瘴充軍如俱徒手爭毆者減等擬徒至結夥十人以上雖無執持兇器而但毆傷人者仍照三人以上執持兇器之例定擬詳見徒流門定滇省沿邊闗隘私販之禁大學士阿桂奏定凡滇省永昌順寧二府以外沿邊闗隘禁止私販碧霞璽翡翠玉葱玉魚鹽棉花等物如拿獲私販之人審訊明確共夥人數在一二十人以上為首者擬絞立決為從及數在四人以上不及十人者俱發黑龍江等處若止三人以下者僉妻流徙三千里安置如有因私販透漏消息者審實無論人數多寡請㫖即行正法闗口員弁或有失察故縱情弊查出分别從重治罪定宗室覺羅鬬毆折罰例諭凡宗室覺羅在家安分或有不法之徒借端尋衅者仍照例治罪外若甘自菲薄在街市與人爭毆如宗室覺羅罪止折罰錢糧其相毆者亦係現食錢糧之人一體折罰定擬毋庸加等若無錢糧可罰即照凡鬭辦理嚴重大案件承審遲延之弊諭刑部題覆直隸省毛成因圖姦殺死張興問擬斬決一本閲本内毛成於乾隆三十九年七月犯案旋即脱逃至四十年十月始行緝獲業已稽誅一載有餘而承審之知州又以隣境㑹審檢驗辦差等事公出以致更易三任輾轉稽延遲至兩年始行結案可見外省吏治廢弛積習相沿於地方𦂳要案件全不依限速辦為上司者又不實力督催至扣限時輒以㑹審辦差紛紛藉口尚復成何政體况州縣既有本任應審要件即不應復差委㑹審别縣之案以致反遲其應審之本案也嗣後各省審辦重犯案件尤湏上𦂳審轉依限題結不得托故稽遲倘有仍似此遲滯者定將該管上司交部從重議處將此通諭知之改定䝉古人等偷竊四項牲畜例刑部遵㫖議定䝉古人等偷竊四項牲畜均不分首從滿十匹以上者擬絞監候六匹以下仍照舊例如民人在蒙古地方打牲索倫在䝉古地方呼倫貝爾旗分另戸在扎薩克䝉古遊牧居住者偷竊四項牲畜俱照蒙古定擬如遇行圍巡幸地方不分䝉古民人五匹以上亦擬絞立決三四匹以下仍照舊例辦理定情罪較重案件督撫聲明入本年秋審情實例諭國泰審擬竇十調姦拒捕逞兇斃命一案情罪可惡僅按律擬斬監候不足蔽辜請㫖即行正法等語此等淫惡兇犯情節最為可惡但按律擬以斬候於法已無可加若因其情罪較重只湏趕入本年秋審情實朕辦理庶獄惟期公當不肯稍存畸重畸輕之見内外問刑衙門均當體朕此意著𫝊諭各督撫嗣後如遇此等案件按律定擬後即夾片聲明趕入本年秋審情實較之尋常案件歸入下年秋審者已屬從嚴毋庸將不足蔽辜字樣聲叙此案交刑部存記辦理外並著𫝊諭各督撫知之増定為所後母之父母服制並有犯照服制科斷例諭㫖刑部核擬直隸省王錦毒死繼母王苗氏之母苗趙氏一案聲明該犯與苗趙氏並無服制改擬斬決并引例載母黨有犯除親母嫡母本生母黨仍照服制定擬外其餘均從凡論等語所擬殊未允協為人後者為所後父母持三年之服而於本身父母降服期年即五服之制亦以所後為推而於本身皆降一等是所後之親屬服制俱較本身為重何於所後之外姻獨不得比於本身之有服乎若慮所後之外姻尊長於甥及外孫謂非其所自出故加凌虐或置於死自可權其曲直䋲之以法何必削其服制以為防乎且如本宗尊長非理謀殺卑幼其恩義已絶即照凡人擬抵則外姻尊長亦可援以為例若卑幼敢於謀殺外姻尊長即為干犯名義自當一例科斷又豈可强為分别而於所後之外姻視本生轉為末減乎此例係乾隆二十一年所定閲其例本惟事拘牽文義而揆之天理人情均未允當又豈明刑弼教之義著刑部將此例悉心斟酌更定具奏尋議凡於親母之父母有犯仍照本律定擬外其於與在堂繼母之父母庶子嫡母在為嫡母之父母庶子為在堂繼母之父母庶子不為父後者為己母之父母為人後者為所後母之父母及本生母之父母等六項均與親母之父母服同有犯即照卑幼犯本宗小功尊屬律毆殺謀故殺均擬斬立決謀殺己行已傷及鬭毆傷者仍各照本宗服制本律分别定擬至各項甥舅等有犯亦俱照外姻尊長卑幼本律治罪如尊長有於非所自出之外孫及甥等故加凌虐或至於死承審官臨時權其曲直按情治罪不必以服制為限定以妻賣姦之夫故殺妻者以凡論例諭㫖刑部核擬張二即張丕林扎死伊妻徐氏一案照夫故殺妻律問以絞候所擬尚未允協此案張二攜妻徐氏賣姦潘三時徃姦宿索錢爭毆迨經官責逐張二計欲躱避因徐氏不允輒起殺機奪刀扎斃是張二甘心將徐氏賣姦其夫婦之義早絶乃復逞兇戕命自當與凡人故殺同科猶之妻妾因姦謀殺本夫者律應凌遲若因本夫縱容抑勒其妻妾與人通姦罪止斬決則縱姦之本夫復殺其妻即不得以尋常夫故殺妻律擬斷蓋其夫縱妻賣姦已屬不知羞愧又忍而置之於死情更兇惡若復拘夫婦名義稍從末減何以勵亷恥而維風化乎著刑部將此例另行斟酌改定所有張二一案即著照新例定擬具奏尋遵㫖議上從之定僧人故殺幼徒例刑部遵㫖議定凡僧人逞兇謀故慘殺十二嵗以下幼孩者擬斬立決其餘尋常謀故殺之案仍照本律辦理定糧船南河失風分别虗實定擬例倉場總督徳保奏准凡糧船在内河失風至三隻以上者運弁㕔員交部分别議處旗丁各杖一百枷號一個月如有揑報失風審實從重定擬至盛夏之時倘遇雨水驟發衝壞數隻者該督及巡漕御史查明實在情形分别辦理定駐防旗丁應入秋審罪犯停止解部例時廣東駐防鑲紅旗前鋒克什布之妻楊氏違犯教令致伊姑投井身死審擬絞候例應解部監禁奉諭各省駐防旗人内應入秋審亦所常有若俱派人伴送不勝其煩向來東三省秋審常犯並不解京辦理各省駐防何獨不然况各省駐防將軍都統拘禁一二人犯亦非難事而理事同知衙門各有禁獄即可令其収禁嗣後各駐防遇有應入秋審人犯即令將軍都統等悉心確核分别情實緩決可矜三種造冊題達交刑部九卿㑹核具題至勾到時某省駐防即另冊同該省應勾人犯一體辦理著為令禁止土目土民私買土司田畆例廣西布政使朱椿條奏土目土民不許私相典賣土司田畆如有違禁不遵者立即追價入官田還原主並將承買之人比照盜買他人田畆律治罪其違例典賣並倚勢抑勒之土司失察之該管知府均交部議處四十三年修纂大清律例告竣頒行中外定發遣駐防兵丁為奴人犯停止賞給將軍都統例詳見徒流門定通緝外遣逃犯一體年終彚奏例刑部議准雲南按察使汪圻條奏凡各本省應緝外遣逃犯分晰年分名數登註事由及己未就獲為一冊外省通緝者於每年彚造尋常軍流逃犯冊内畫出另為一冊年終由臬司衙門彚冊造報督撫於開印後咨部查核該督撫將本省及通緝各案分摺具奏其通緝遣犯各督撫於文到日即飭屬分差緝拿將緝役姓名申報責成該管道府不時稽察如有怠忽不實力奉行者該道府揭㕘將該地方官議處定宗室覺羅鬬毆以凡論例刑部奏擬民人寳通高二毆傷覺羅赫蘭泰寳興一摺奉諭此案刑部宗人府㑹審將寳通高二毆傷覺羅律擬以杖徒覺羅赫蘭泰寳興照不應重例擬杖折罰所辦尚未允協常人毆辱宗室覺羅律有専條者固欲使齊民之不敢輕䙝天潢亦隠示宗室之各當律身自重也若宗室覺羅並不與人爭較而常人輒敢毆及自當照律科罪若宗室覺羅先已尋衅毆人其人因而還手則是宗室覺羅不知愛惜自取其辱即當以鬭毆論彼此同科不應更為區别至向以曽否拴繫黄紅腰帶為分雖亦别嫌明㣲之意但恐宗室覺羅因有此例轉恃黄紅腰帶為䕶符動輒毆人肆横毫無顧忌所謂愛之適以害之也况宗室覺羅犯該笞杖者例當准以折罰錢糧已存議親之典更何必多其條例𨗳之犯法乎嗣後審擬此等案件如宗室覺羅並未生事常人擅行毆及者自當照例杖徒問擬若係宗室覺羅先行動手者即照尋常鬭毆論其曽繫黄紅腰帶與否竟不必論庶共知儆畏各以禮義自閑期無負朕教誨成全之意著交刑部㑹同宗人府另行妥擬具奏尋議凡宗室覺羅與人爭毆之案除審明宗室覺羅並未與人爭較而常人尋衅擅毆者仍照例治罪外如輕入茶坊酒肆滋事召侮或與人鬬毆先行動手毆人者不論曽否腰繫黄紅帶子其相毆之人即照尋常鬭毆一體定擬其宗室覺羅應得罪名刑部按律定擬犯該軍流徒罪者照例鎻禁拘禁犯該笞杖應否折罰錢糧之處交宗人府酌量犯案情節如情罪可惡者在宗人府實行責打不准折罰増定私梟拒捕案内兵役包庇及私售窩頓人等分别治罪例兩江總督高晉條奏凡大夥梟徒拒捕傷差案内如有得贓包庇之兵丁俱擬斬監候私售之竈丁及窩頓之匪犯俱發伊犁烏嚕木齊等處為奴部議應如所請從之互見徒流門定白役詐贓逼命之案正役分别問擬例刑部議覆湖北按察使吳之黼條奏白役詐贓逼命之案除將白役照例擬抵外如正役知情同行在塲幫索及正役雖未同行而主使詐贓者俱發往黑龍江給披甲人為奴若正役僅止知情同行並無嚇逼情事者仍照例杖一百流三千里其並未主使詐贓亦未知情同行但於事後分贓即於白役死罪上減二等杖一百徒三年贓多者計贓從重論若並未分贓及白役詐贓並未致斃人命者仍照私帶白役例責革加枷號兩個月申嚴州縣武職等官僉差不慎致押解重犯脱逃例諭據湖廣總督三寳奏稱審擬穀城縣知縣邱徳孚於起解斬犯王長時僉差不慎致解役疎縱脱逃揑稱落水一摺已批交該部議奏矣州縣審解重犯理應僉派妥役飭令小心管押乃邱徳孚漫不經心聴憑解役出錢雇替以致中途縱放重囚非尋常僉差不慎可比其㸃派兵丁致令雇替之千總詹如侯亦然僅予革職不足蔽辜著該部將邱徳孚詹如侯另行擬罪具奏並著為例尋議押解斬絞立決及秋審擬入情實重犯如不小心僉解致解役有違例雇替開放鎻鐐縱囚脱逃者將僉差長解之州縣官照獄卒縱脱重囚管獄官杖八十徒二年例減一等杖七十徒一年半其撥兵䕶解之武職如所撥兵丁亦有雇替情弊即與州縣一例杖徒嚴私販新疆玉石例陜甘總督勒爾謹奏請凡私赴新疆偷販玉石者一經查獲即照竊盜例計贓論罪滿貫者擬絞監候下部議行定因母犯姦非姦所殺死姦夫致父母忿愧自盡者照罪人不拒捕而殺擬絞監候例諭㫖刑部等衙門題覆雲南文山縣民申張保毆死高應美致伊父母先後服毒身死一案將申張保問擬絞決固係按律擬罪而揆於情節實未允協凡子犯死罪致令父母自盡擬以立決者原為其子違犯教令及身犯不端之事致累其親忿恨自戕此等孽種斷不可復留於人世例意顯然今此案申張保因高應美與其母胡氏不避嫌疑屢為其父申茂盛撞見遂相反目申張保曽經徃勸數次嗣其父鬱結成疾申張保徃視始將情由密行告知及胡氏被夫責逐即奔至申張保家居住後高應美途遇申張保復聲言欲往伊家見其母申張保用言阻止高應美輒行嗔罵拾石向擲申張保情急始用所攜木棍毆戳致死後經發覺申茂盛胡氏忿激羞愧先後服毒身死是申張保之毆死高應美實出於義忿殊堪矜憫而申茂盛胡氏之死由於姦情敗露忿愧輕生並非申張保貽累若亦予以立決未得事理之平但非於姦所殺死姦夫自不能免罪擬以絞候亦足矣此本著交九卿㑹同該部另行妥酌定例具奏嗣後遇有此等案情即照新例辦理四十四年定私自淨身之案年終彚奏例定幼童毆斃人命分别年嵗定擬例諭刑部進呈毆傷李子相身死之劉縻子擬絞監候聲明年僅九嵗可否減等請㫖一本固屬照例辦理但所指十嵗以下犯殺人應死者或係被殺之人較伊年長强弱不同自可量從末減今劉縻子所毆之李子相同係九嵗輒行免死豈為情法之平况九齡幼童即能毆斃人命其賦性兇悍可知尤不宜遽為矜宥向因戲殺之案曽諭令刑部將該犯監禁數年再議減等以消其桀驁之氣此等幼童自當倣照辦理嗣後遇有十嵗以下毆斃之案如死者長於該犯四嵗以上者仍照例聲明雙請若所長止三嵗以下則年齒相若不得謂死者之恃長欺凌或齒小者轉較性暴力强亦情事所有縱不令其實抵而監禁數年亦不為過著刑部將此例另行定擬具奏尋議凡十嵗以下鬭毆斃命之案如死者長於兇犯四嵗以上准其依律聲請若所長止三嵗以下一例擬絞監候不得概行雙請至十五嵗以下被長欺侮毆斃人命之案確查死者年嵗亦係長於兇犯四嵗以上而又理曲逞兇或無心戲殺者方准援照丁乞三仔之例聲請㳟候欽定申定審擬案件限期不得因公出犯病重一加遲延例諭三法司題覆直隸獲鹿縣民李三邦年因姦殺死伊妻李氏並砍死伊嫂戎氏一案該省自四十二年正月呈報至十月二十七日始行審擬具題雖本内聲明封印及承審官公出監犯患病各日期而細核案情並非難辦其為藉詞延玩實屬顯然向來審案定限展限日期原因地方或有𦂳要公務或案渉疑難人証不齊未能速結者准其於本内聲明免議乃相沿日久地方官恃有此例既扣公出日期又扣監犯病限重疊聲請冀圖延緩該上司亦任其託故不加督責朕臨御四十餘年於巨細政務勵精圖治未嘗片刻自安此中外大小臣工皆所共悉自應仰體朕意各加整頓何至任意延擱竟置公事於不問耶嗣後辦理案件務湏督率屬員振刷精神一切案件速行完結毋得藉有扣限託故稽遲將此通行飭諭各督撫知之是年十月四川省秋審情實絞犯劉經柱在監病故題報遲延又奉上諭此案該督具題相距四月之久稽延太甚著交部分别議處至各省於監犯患病之事上司漫無稽查積習相沿於吏治大有闗礙是以曽降諭㫖定以限期雖畧有檢制而有司蒼滑者仍有以監犯患病及因公出境藉詞展限逾期者立法未為盡善其應作何酌定章程不致揑混之處著交刑部另行妥議具奏尋議州縣因公出境如捕蝗灾賑勘河防險等事該督撫查據預報起止日期核對相符准其扣限外其例内隣邑相驗及㑹審㑹勘公出展限之處俱行刪除至應擬斬絞人犯染患重病該督撫接到州縣通詳即先具文報部仍責成該督撫詳加查核如有假揑情事立將承審及核轉各員㕘處倘督撫不行詳察經部核對原咨查出弊竇將該督撫一併嚴㕘其秋審情實人犯遇有病故州縣官立時詳報該督撫於接到詳文之日先行題報總不得過十日之限至若每年新事秋審人犯遇有病故如係應入本年情實者該臬司即依限辦理其緩決及應入次年秋審仍照向例從之禁止閩省花㑹名色福建巡撫黄檢條奏閩省民屬刁頑無賴棍徒詭立花㑹名色以賭輸贏或編字號小單或製編號竹籌糾夥哄誘愚民買執籌單填寫錢數向設㑹頭家搖骰賭色搖得大㸃者每錢一文連本賠還三十文不著色者其錢盡歸頭家鄉愚貪得多賠贏錢為其煽惑什伯成羣械鬭逞兇徃徃由此而起應明立科條禁止請嗣後閩省拿獲花㑹案犯訊明起意為首之犯即照造賣賭具例發邊逺充軍其夥同開設輾轉糾人之犯照販賣為首例杖一百流二千里其在塲幫収錢文等犯均照為從杖一百徒三年仍盡賭博本法先於開設花㑹之處枷號兩個月示衆被誘入㑹之人俱枷號三個月滿日杖一百地方失察之文武各官俱照失察賭具例議處如匪徒另立名色誘賭聚衆至三十人以上情事同於花㑹者即照此例辦理交部議行改定殺一家非死罪四命將兇犯父子照數擬抵其有浮於所殺之數以幼者發遣為奴例諭㫖奏刑部奏殺死一家四命之兇犯余膺擬以凌遲處死其子余世聰余世華余世潤余世榮俱照新例擬以斬決前降諭㫖將殺死一家多人之犯加重定律者原以此等兇惡之徒實戾氣所鍾不應復留餘孽且恐兇徒明知法止其身或自拚一死逞其殘忍殺害過多以絶人之嗣其妻子仍得倖免於情理實未允協自應改用重典以期辟以止辟今此案余膺殺害熊士順一家四命而余膺及其子余世聰等分别凌遲斬決者共有五犯擬抵之人浮於所殺之數亦覺稍過所有余膺之子余世聰余世華余世潤仍著照原擬斬決其幼子余世榮著從寛免死同兇犯之妻丁氏發徃伊犁給厄魯特為奴並著刑部嗣後如有殺一家四命以上之案悉按其所殺人數將兇犯父子照數定罪俾多寡相當其有浮於所殺之數或一人或二人者均以其幼者照此辦理並令内外各問刑衙門知之著為令嚴外國人等私越邊境守卡官不即擒拿罪例兵部遵㫖議定凡有外國人等私越邊境無論是否賊匪守卡官員即行擒拿有將軍㕘贊駐箚者報明將軍㕘贊有督撫駐劄者報明督撫聴候辦理如守卡官員任意賄縱查出即行正法其該管之將軍㕘贊督撫等不遵照辦理亦一併從重治罪定因爭繼釀命房分不准立繼例湖北巡撫鄭大進題奏羅田縣民曽志廣因謀奪繼産將期親胞叔毆斃照例擬以凌遲處死並請凡因爭繼釀成人命者其爭産謀繼及扶同爭繼之房分均不准其繼嗣應戸族另行公議承立奉㫖所議甚是嗣後各省有似此者並照此辦理著為令更定改發内地十六項人犯仍照新疆例烏嚕木齊都統索諾木䇿凌奏請分别擇其情節輕者發徃種地當差情節較重者發給兵丁為奴從之互見徒流門定傷人夥盜自首照未傷人盜首自首例刑部議定凡傷人夥盜自首即照未傷人盜首自首之例如事未發而自首者仍照本例擬軍遇有脱逃拿獲加等調發如係聞拿投首者發黑龍江等處給披甲人為奴遇有脱逃獲日請㫖即行正法嚴乗火搶奪治罪例刑部議准浙江按察使孔毓文條奏凡因失火而乗機搶奪除有殺傷及計贓重者仍照定例問擬外其但經得財罪應擬以杖徒者俱照本例加一等治罪將為首之犯杖一百流二千里為從者杖一百徒三年均於面上刺搶奪二字定奉天所屬州縣旗民事件自行審理例刑部奏定奉天所屬十二州縣辦理旗民事件無分滿漢俱令自行審理於訊明定擬之後旗人笞杖等罪概行移旗發落仍知照該州縣備案至承審時遇有應刑訊之處仍照例用刑酌定鬭毆因風身死保辜限期例舊例原毆傷輕不致於死者越數日後因傷風身死將毆打之人免抵至是刑部奏例文傷輕之處未經分别明晰數日二字亦渾舉無定請嗣後因風身死之案除原毆並非致命之處又非極重之傷仍照舊例辦理外如當致命之處而傷輕或傷重而非致命之處必死在十日以外方准聲請依例改流其致命重傷及雖非致命傷至骨斷骨損即身死在十日以外均不得援照因風身死之例聲請仍依本律擬以絞抵四十五年定盛京圍場處所偷伐木植例將軍福康安奏准盛京威逺堡南至鳳凰城邊外山谷圍場處所拿獲偷伐木植人犯審明果係身為財主雇倩多人伐木屬實者杖一百流三千里若無財主一時㑹合各出本錢並雇人偷伐木植越度邊闗隘口者杖一百徒三年互見徒流門定軍流徒犯於到案日供内叙明有無祖父母父母兄弟子孫及年嵗例刑部奏定凡審辦軍流徒犯之案無論應否留養俱照命案之例於到案日訊明本犯有無祖父母父母兄弟子孫及年嵗若干於供内叙明存案如定案之初不遵例取具有無祖父母父母各供者承審之員照將軍流等犯未經審出實情例議處互見徒流門増定盜砍他人墳樹分别治罪例詳見徒流門増定積匪猾賊分别數次問擬遣徒例刑部奏定辦理積匪猾賊之案如係因竊擬流擬徒逃囘釋囘仍不悛改復連竊至三案以上又初犯再犯之賊如糾夥連次疊竊至六案以上者并雖未糾夥而疊竊在八案以上者均照積匪猾賊例擬遣其並未糾夥竊案數少而情節有類於積匪者即照積匪猾賊例量減一等擬以滿徒其三犯及計贓重者仍按本例從重論定發遣黑龍江等處為奴人犯在配行竊四次永逺枷號例詳見徒流門定殺死姦夫案内聴從加功之人照共毆餘人律科斷例刑部議奏殺死姦夫案内本夫及例許捉姦親屬起意殺姦糾約他人幫同下手致死此種聴從加功者非例許捉姦之人應作何治罪向未明立専條外省問刑衙門有照共毆餘人律擬杖者又有照尋常謀殺加功擬絞者輕重不能畫一嗣後凡姦情確鑿本夫及應許捉姦親屬起意殺死姦夫案内無論應許捉姦之親屬及不應捉姦之外人實係激於義忿聴從加功者悉照共毆餘人律杖一百如有挾嫌妬姦謀故别情乗機殺死圖洩私忿者仍照謀故本律問擬從之嚴粤東刦盜之罪刑部議覆兩廣總督巴延三題奏粤東拿獲强盜除竊盜臨時行强搶竊拒捕傷人或被人誘脇随行及年㓜尚未成丁并糾夥不及十人俱仍照舊例辦理外如出刦洋面或在陸路謀刦糾夥至十人以上無論犯次多寡曽否入室搜贓均不得以情有可原聲請應如所請從之改子孫違犯教令致父母輕生自盡絞候例刑部遵㫖改定凡子孫不孝致祖父母父母自盡之案如審有觸忤干犯情節以致忿激輕生窘迫自盡者即擬斬決其本無觸忤情節但其行為違犯教令以致抱忿輕生自盡者擬以絞候妻妾於夫之祖父母父母有犯同罪定妻妾迫夫致死絞決例諭㫖刑部議駁江蘓巡撫吳壇審題倪顧氏逼迫伊夫倪玉自縊身死一案該撫將倪顧氏照逼夫致死例擬絞監候與例不符應將倪顧氏依毆夫致篤疾絞決律擬絞立決一本部駁甚是已如所議行矣婦之於夫猶臣之於君子之於父同列三綱所闗綦重律載人子違犯教令致父母自盡者皆處以立決豈婦之於夫竟可從輕今乃逼迫其夫致令自盡此等潑悍之婦尚可令其偷生人世乎此係倪顧氏薄侍倪玉前妻之子致相吵閙已失婦道嗣倪玉見伊子常受單寒欲給錢營生顧氏又與爭毆以致倪玉氣忿情急自縊殞命兇悍如此該撫僅擬絞候豈明刑弼教之意乎律既載妻毆夫至篤疾者絞決本屬允當乃律又載妻妾逼迫夫致死者比依妻毆夫至篤疾律擬絞奏請定奪之條以致引用牽混殊未妥協著交刑部將此例另行妥議改正通行尋議妻妾逼迫夫致死者擬絞立決從之四十六年定行營地方金刃傷人例刑部遵㫖定例行營地方如有金刃傷人者先行插箭随營示衆如被傷之人限内因傷身死即於該處斬決如傷經平復即發往伊犁給厄魯特為奴嚴興立邪教之案州縣匿詳完結例湖北巡撫鄭大進奏言查乾隆四年孝感縣地方有嚴維臣自稱白蓮教哄誘愚民一案經督臣班第奏准如有僅借好善之名誆騙香錢與實在邪教有間者分别首從酌量枷責完結被誘人等免其深求彼時就事權衡使愚民不致株連棍徒仍按情懲治惟是原奏内但稱枷號完結而州縣或竟視同自理詞訟率不通詳恐有草率完結之弊萌蘖不除必至蔓引請嗣後各省遇有興立邪教哄誘愚民事件該州縣立赴搜訊據實通禀聴院司按核情罪輕重分别辦理倘有諱匿輒自完結别經發覺除有化大為小曲法輕縱别情嚴㕘懲治外即罪止枷責案無出入亦照諱竊例從重加等議處得㫖允行禁革督撫家人收受門包并押席陋規嚴囘民爭立邪教案件從重辦理例諭昨阿桂等奏甘省番囘新舊教起釁仇殺縁由一摺據稱撒拉爾番囘約有六千多戸分為十二工各工俱有掌教韓哈濟係世𫝊總掌教乾隆二十六年韓哈濟與賀麻六乎因念經不和互相控詐經地方官㑹同審明定擬咨部完結等語此等番囘在該處煽惑愚民妄言禍福甚至設立掌教及總掌教之名爭相控詐非尋常案犯可比皆當據實奏聞按律嚴辦以示懲儆乃當日該督僅以咨部完結刑部亦照咨率覆或入於彚奏均屬錯誤嗣後各省督撫遇有此等邪教爭控聚衆念經之案即應親提案犯嚴審從重究擬據實具奏以淨根株不得率行咨部完結致復蔓延滋事刑部遇有此等外省咨結之案亦即據實特奏從重定擬不得咨覆完案至邪教案内凡有發遣之犯不得發徃奉天吉林及新疆等處致將邪教復行煽惑民人被其愚誘將此𫝊諭各省督撫入於交代遵照辦理並交刑部存記一體遵照互見徒流門定調姦未成和息後羞忿自盡該犯遣發新疆例諭據廣西按察使富躬奏審擬北流縣民陳正仁調戲唐惠志之妻陳氏賄和後因被村童齒笑返悔抱忿夫婦先後服毒身死問擬充軍經部駁改擬絞候一摺從前此等案件凡遇手足勾引致本婦自盡者俱按例問擬情實秋審時予勾其僅止語言調戲者雖按例定擬俱從寛免勾此朕凖情酌理期於勿縱勿枉之意今此案雖致死二命但究係和息一月之後若定擬絞候情殊可憫如僅照該司原擬充軍則又係致死二命未免稍失之寛陳正仁著改發烏嚕木齊充當苦差如此折中辦理庶情法均得其平嗣後遇有此等案件即照此問擬著為令定本管官吏役有犯命案别委官相驗例都察院左都御史哈福納奏定京師五城吏役有犯命案本城官員概令迴避該巡城御史速調别城指揮帶領本管吏仵前徃相驗辦理其各省州縣如本州縣吏役有犯命案即就近禀請該上司立委别州縣帶領本管吏仵前徃驗辦改定比照大逆縁坐人犯實不知情免其坐罪例刑部遵㫖改定凡興立邪教及挾讐編造邪説煽惑人心等項照大逆定罪之案若本犯之祖父母父母訊明實不知情者概予省釋不必縁坐増定誣良為竊嚇打致死例刑部奏定凡誣良為竊嚇詐逼認因而致死者照誣告致死律擬絞監候如係因拷打傷重致死者照故殺律擬斬監候嚴嘓匪聚衆搶奪四人以上加重治罪例刑部議准四川總督福康安題奏川省匪徒在野攔搶未經傷人之案除數在三人以下者仍照舊例發烟瘴充軍外如四人以上至九人者不分首從俱改發伊犁給厄嚕特為奴均面刺外遣如有脱逃拿獲即行正法但傷人者即將傷人之犯擬絞監候若數至十人以上無論傷人與否為首者擬斬立決為從擬絞監候被脇同行者發遣為奴其中倘有殺人奪犯傷差等事有一於此即照場市搶刦之例將首夥多犯分别斬梟絞決監候匪犯父兄牌甲俱依盜案例查明是否知情分贓或止失於覺察分别懲處禁止内地民人與土司交徃例貴州巡撫李本奏准内地民人概不許與土司等交往借債如有違犯將放債之人照偷越番境例加等問擬其借債之土苗即與同罪四十七年増定嘓匪持刀傷人例四川總督福康安奏准川省匪徒因事忿爭執持騸雞尾黄魚尾鯽魚背海蚌等刀傷人者照庫刀傷人例發近邊充軍互見徒流門定情重改發新疆人犯年滿發交應配地方安插例詳見徒流門改定誣告人命致屍遭蒸檢分别治罪例刑部奏改凡子孫將祖父母父母死屍誣告他人致屍遭蒸檢者照舊例問擬若期親以上尊長按律不應抵命者誣告人謀死人命致蒸檢卑幼身屍仍照誣告人死罪未決律治罪其餘親屬尊長律有應抵之條者如挾讐誣告人謀死人命致蒸檢卑幼之屍及卑幼誣告致蒸檢尊長之屍俱擬絞監候若並非挾讐止以誤執傷痕告官蒸檢者亦照誣告人死罪未決律定擬定奉天省發遣人犯停止解京轉發例詳見徒流門改定行刦罪囚例刑部奏改凡行刦在獄罪囚不論曽否得囚有無傷人將為首之人擬斬立決有傷人者將傷人之夥犯亦擬斬決有殺人者將為首之人及夥犯俱梟示其餘為從未經殺人傷人者仍依律擬斬監候其在中途打奪罪囚因而殺人者為首斬決丁手致命者絞決餘仍照律分别坐罪定稽查斥革緑營兵丁例雲南布政使江蘭條奏凡緑營兵丁因事斥革後即移明地方官另記年貌冊檔嚴加管束按季㸃驗稽查若有作姦犯科除實犯死罪外犯軍流以下俱照凡人加一等治罪管束不嚴之本犯父兄如犯在軍流以上照不能禁約子弟為盜例杖一百如在徒杖以下照不能禁約子弟為竊例笞四十隣佑知情容隠者即視其父兄應得罪名減二等治罪約束不嚴之地方官交部議處部議應如所請從之定搶竊賊盜拒捕殺人案内為從人犯分别定擬例刑部奏定凡白晝搶奪殺人及竊盜拒捕殺人案内為從幫同下手有傷者不論他物金刃俱擬絞監候其從犯雖曽拒捕或亦持仗而未毆人成傷及拒捕另傷一人者仍各照本律例分别辦理定旗人罪犯例應刺字者即銷除旗檔照民人辦理例四十八年定和姦後悔過殺死姦夫例直隸總督鄭大進題奏張魏氏與魏賢生通姦為夫知覺責打改悔拒絶魏賢生逼續前好魏氏被逼情急將魏賢生毆打致斃照擅殺罪人律擬以絞候刑部議改凡婦女拒捕殺死姦夫之案如和姦之後本婦悔過拒絶確有証據後被逼姦將姦夫殺死者照擅殺罪人律減一等杖一百流三千里其因貪利與之通姦後以無力資助拒毆致死者或先經和姦復與他人通姦情密因而拒絶毆斃者仍各依謀故鬭毆等本律定擬定子孫毆傷祖父母父母立決例諭昨據刑部奏毆傷親母之張朝元一犯按律問擬斬決一摺己依議行矣此等蔑倫逆犯行同梟獍該部於審明後即應奏請正法使悖逆之人知毆傷父母即決不待時庶足以昭懲儆乃刑部定擬摺内所稱飭令伊母傷養平復随提該犯嚴加審訊等語在刑部之意以為設或其母因傷身死即當問以凌遲殊不知斬決凌遲同為一死該部拘泥律文轉令兇逆之徒得稽顯戮嗣後遇有子孫毆祖父母父母案件審無别情無論傷之輕重即行奏請斬決設或其親因傷身死將該犯剉屍示衆著為令詳定頂兇之罪諭刑部核議徐剛毆傷張文耀身死一案率照雲南巡撫劉秉恬定擬將頂兇之唐二照本犯絞罪同科其正兇之弟徐三係踏傷田内豆苗起衅之犯恐到官連累許給銀兩央求唐二頂兇該部亦照依説合人減等擬以杖流所辦殊欠平允蓋從中説合係指案内本無闗渉徒與犯人説合通信之人而言若徐三一犯本係正犯胞兄且事因伊起又係伊覿面賄屬舞弊其中並無另有輾轉為之説合之人何得比照説合人減等之例僅擬杖流著將徐三一犯暫行擬絞監候俟拿獲徐剛到案審明正兇及起意央求頂兇情弊另行定擬具奏至唐二貪賄頂兇罪由自取刑部於頂兇之犯向皆入情實漫無分别亦屬疎漏因思頂兇者其本案亦自有輕重如謀逆强盜謀故鬭毆本屬不同其應如何分别條款著另行詳議具奏尋議凡謀逆强盜罪干凌遲斬梟決不待時者頂兇之犯應照本犯一律同科即謀故等案應擬監候者本犯復行賄頂改為立決頂兇之犯仍照舊例入於情實至鬭毆等項案内如正犯應入情實者改為立決受賄頂兇之人或本係在場幫毆以刃傷人并助毆傷多傷重又或受賄贓至滿貫仍列入情實若正犯由緩決改為情實者頂兇之犯或僅止事後貪賄並無别項情事贓數亦屬無多正兇又未漏網俱擬緩決從之改定用藥迷人未經得財分别問擬例諭據雲南巡撫劉秉恬具題民人王奉以藥迷人未經得財一案將王奉比照𫝊授藥方貽害例擬斬監候永逺監禁其為從之楊富照律擬流改遣所擬尚未允協此等匪犯擬以斬候雖若從嚴永逺監禁仍得安坐囹圄較之為從之𤼵遣為奴者轉屬從寛王奉著改發伊犁給厄魯特為奴並著刑部將此等案件照此另行酌定條例具奏嗣又奉㫖據福康安具題民人具開富等用藥迷人未經得財問擬斬候永逺監禁一本前因滇省有王奉一案曽經降㫖令刑部另行酌定條例具奏矣今思斬之與遣究屬輕重有分若概與發遣不足明刑此等用藥迷人之案如人已被迷雖經他人救醒而用藥者本有殺人之心自應將該犯問擬實斬入於情實不得以未經得財稍為寛貸若甫經學習雖已合藥即行敗露或欲迷之人知覺未經受累則情節較輕尚可寛其一綫將該犯發徃伊犁給厄魯特為奴已足蔽辜著交刑部一併核擬具奏尋議請嗣後凡用藥迷人圖財案内除已行而得財者均照强盜本律不分首從問擬斬決外其有人已被迷經他人救醒雖未得財將首先𫝊授藥方轉𫝊貽害及下手用藥迷人之犯均擬斬監候入於秋審辦理若甫經學習及雖已合藥即行敗露或欲迷之人當時知覺未經受累者均發徃伊犁給厄魯特為奴倘到配之後故智復萌將藥方與人及復行迷竊並脱逃者請㫖即行正法其随行為從仍各依律定擬増定旗人竊逃並犯仍從逃罪改發邊逺例刑部奏定凡旗人犯竊犯逃並發核其搶竊贓數在流徒以下律應刺字者無論逃在一月内外俱照旗人逃走𤼵徃當差在配怙惡不悛之例改發雲貴兩廣邊逺地方令地方官與民一體嚴加約束至漢軍正身旗人犯應刺字者亦即照新例削除旗檔其逃竊治罪之處仍照漢軍本律定擬互見徒流門詳定拿獲黒龍江等處為奴脱逃人犯即行正法各條例原例載免死發遣盜犯在配脱逃者獲日請㫖即行正法三十九年將軍傅玉奏准一面正法一面報部於年底彚奏四十二年因將軍倭昇額將拿獲例應枷責之犯誤行正法經刑部奏明仍遵定例請㫖辦理至是刑部議定發遣黑龍江等處為奴人犯脱逃拿獲後一面正法一面奏聞毋庸請㫖者五條其餘東三省尋常發遣之犯如有脱逃被獲均不在正法之例互見徒流門定拒姦殺命之案詳核被殺之人年嵗定擬例詳見詳讞門定兇犯脱逃即行通緝例陜西按察使王昶條奏凡命盜一切重犯畏罪脱逃未必仍匿本省若按例於初㕘限滿始行分咨隣省協緝勢必輾轉逺颺嗣後命盗案件罪干重辟者遇有脱逃即於初限時一面在本省嚴拿一面造具年貌事由贓物簡明清冊詳請飛咨各省協同跴緝不必俟初㕘之後並令直省各飭所屬於奉文之日實力奉行而本處地方官亦不得恃有隣省通緝弛其緝捕之責部議應如所請奉㫖依議速行定應入情實人犯招解後留禁省監例刑部議覆陜西按察使王昶條奏凡外省命盜案件州縣官一經定案例應逐件解赴省城候臬司督撫覆審具題其有情罪重大秋審時應入情實該督撫於成招定罪時便可預定此等人犯與其發囘本縣監禁待秋審又復解省審勘致多徃返并有意外疎脱之虞莫若於招解到省定案後即行留禁省城於臬司首府首縣均匀分撥禁錮俟勾到部文到日即在省城處決其中或間有九卿改入情實者為數無多仍令各督撫飭行各州縣照舊辦理或有九卿由情實改入緩決者即解囘本縣監禁尋奉上諭以情實人犯如謀故殺行兇重犯及盜案自當留於省城至姦婦謀殺本夫及尋常鬭毆等案情節雖重尚不致有扭械脱逃之事仍解囘本州縣候部文到日於該處正法示衆俾知儆懼嗣經刑部分别行兇重犯及竊贓滿貫之情重者三十四條於犯案招解到省時即留禁省監其餘服制縁坐姦竊拐騙尋常鬭毆共毆及婦女老幼之犯易於防範者仍發囘各州縣監禁得㫖允行酌停發遣新疆人犯各條款伊犁將軍伊勒圖奏言遣犯過多請遵前例酌發停止刑部議覆照原例發往者六條陸續奏准應仍行發往者五條酌定停止發往者十二條詳見徒流門四十九年定立決案件公文馬上飛遞例向例惟秋審奉㫖勾到及議覆奏摺并由題本改奏案件俱釘封派筆帖式賫交兵部封面開明馬上飛遞外其餘具題立決案件亦用釘封與各項不釘封公文均送交兵部轉發提塘遞送至是江西巡撫郝碩奏請立決罪囚公文概由兵部加封發驛馳遞部議應如所請嗣後除常行公文仍照舊制交兵部轉發提塘外其一應立決人犯咨文俱釘封嚴固封面註明件數并馬上飛遞字樣派筆帖式送交兵部加封發驛從之増定因姦故殺有服尊屬例條諭刑部題覆安徽省程尚義砍傷小功服嬸程劉氏身死一案定擬斬決一本固屬罪無可加已照簽批發矣但核其情罪該犯因圖姦姪婦錢氏未成被伊嬸程劉氏詈罵反生氣忿頓起殺機砍傷致死實係因姦故殺尊屬該部按律定擬依卑幼毆本宗小功尊屬死者斬律擬斬立決核之該犯因姦故殺情節尚未允協嗣後如有此等案犯應將因姦故殺専條援引定罪如律内未有此條即著刑部堂官另行酌擬添入條例尋議嗣後凡卑幼因姦親屬起衅故殺有服尊屬之案按其服屬罪應斬決凌遲無可復加者於援引服制本律之上添載卑幼因姦故殺尊長字樣以昭明切再查卑幼故殺尊長律内所稱本宗大功小功則擬斬決餘俱監候是外姻之小功緦麻按照服制定罪仍止監候此等因姦故殺尊長之案情罪較重亦應定擬立決以懲淫兇但例冊未立明條請嗣後凡卑幼因姦親屬故殺本宗外姻有服尊長罪止斬候者均改為擬斬立決從之定嫁娶違律罪犯至死分别絞決監候例先是三十八年諭㫖刑部等議覆徐廷法與弟婦韓氏婚配一案固屬按律定擬但現據審無姦佔情事且由父母主婚與自行姦占小功以上妻者有間愚民無知自難責以大義遽予絞決情殊可憫俱著從寛改為應絞監候秋後處決是時刑部議覆奉天民人髙九收媳楊氏一案照尋常嫁娶違律事由主婚為首男女為從至死者減一等擬流上以亂倫婚配其罪不一况父母無不愛其子卑幼犯法尊長出而承認主婚其亂倫之男女遂得均從末減擬流非所以正倫紀而弼教化著刑部詳悉定議尋議請嗣後凡嫁娶違律罪不至死者仍依舊律定擬至兄亡收嫂弟亡收弟婦罪犯應死之案除男女私自配合及先姦後配者仍照律各擬絞決外其由父母主婚男女為從向例減一等擬流者即照為從之男女各擬為應絞監候俟秋審時核其情罪另行定擬從之五十年増定發遣黑龍江等處人犯添差押解例刑部議准直隸總督劉峩疏請部發黑龍江等處遣犯無論當差為奴均令知㑹地方官每犯一人添差幹役二名協同營弁遞解如有疎虞將地方官與弁兵一體查察治罪詳見徒流門改定莊屯居住旗人分别枷責實發例先是三十九年定例凡住居莊屯旗人及駐防無差使者犯流徒等罪照民人一例發遣至是刑部奏改東三省旗人皆散處四鄉無差使者亦多應請將有犯寡亷鮮恥自玷旗籍者始照例實發其餘仍照舊例分晰折枷鞭責完結從之互見徒流門増定卑幼圖姦有服親屬被尊長毆責致死例刑部奏定凡尊長致死卑幼案内如僅止為匪不法及一切尋常干犯或尊長另有私嫌乗機殺害者仍照謀故本律各按服制辦理外如有卑幼圖姦有服親屬被尊長忿激致死審有確據者悉照罪人已就拘執及不拒捕而擅殺律無論謀故各案照服制俱以鬭殺傷定擬其在場幫毆有傷之犯除係死者有服卑幼仍以謀殺鬭殺服制本律科斷外其餘無論凡人尊長概照鬬殺餘人定擬定通緝案内責成配所原籍地方官處分之例諭各省通緝人犯已屆四十年緝拿未獲者即將原案查銷原以廓清塵案而於奉文查緝年久無獲之州縣未經定有處分第思各州縣本任内承緝案件尚不能尅期弋獲其似此奉文通緝之犯鮮不視為其文但竟置之不議又不足以示懲朕意嗣後通緝人犯於何省脱逃但應責成該省州縣或問出本犯之原籍亦祗責成其原籍州縣實力緝捕如年久無獲當交部畧予議處此外無干之各直省州縣竟無庸行文通緝其如何分别年分予以處分之處著大學士㑹同該部議奏尋議通緝人犯舊例内開新疆改發内地遣犯脱逃配所地方官承緝不力初㕘降一級留任二㕘降一級調用原籍地方官俟該犯獲日查明逃囘本籍從前曽否奉文密緝分别降調降留但二㕘限滿之後年久無獲竟置不議未免於限年本意尚未周備應請將逃遣之案配所地方官於正限滿後即限一年緝拿不獲罰俸一年仍限一年緝拿不獲再罰俸一年如前官已經離任即將接任之員照此按限㕘處其原籍接緝之地方官如有失獲逃囘原籍者於應得降調降留處分外再將從前未獲年分按照二限各罰俸一年從之定故殺卑幼圖詐他人致被詐之家復釀斬決重案問擬絞候例諭刑部核覆湖南乾州㕔苗民張應琳商同張田氏謀死姪女張女并張學能謀死堂伯母張章氏互相圖賴一案朕細閲情節縁張學能與張章氏有祖遺來歩兠山場一處張應璞等本屬無分詎張應璞與弟張應琳舊存契紙内載來歩兠山場字樣欲行爭占經寨長查明實係張學能祖業將張應璞白契扯毁嗣張應璞之妻張田氏背負幼孩張女赴山檢收桐子被張學能喝阻並聲言報官張應琳遂起意將張女致死圖賴張學能畏懼因亦將堂伯母張章氏致死搪抵該部議覆將張學能依謀殺緦麻以上尊長律擬斬立決張應琳依故殺姪圖賴人例發附近充軍固屬照例辦理但此案起衅由於張應琳謀占張學能山場將女致死圖賴是張應琳本屬理曲况張學能謀死緦麻尊長律擬斬決而張應琳因故殺卑幼律止發遣不至於死是張應琳家僅傷張女一命而張學能之伯母張章氏已被害張學能以闗於倫理又應擬斬立决是理直之家轉兩命抵一命未為平允且張應琳係張學能近宗張學能正法之後伊家無人所有産業自必仍歸張應琳執業該犯既得免死仍獲遂圖産之謀則狡詐兇殘者勢必不復知所懲儆且恃長而謀死卑幼者必多矣非辟以止辟之道嗣後除尋常謀死卑幼希圖詐賴不致被詐之家又釀成人命者自應照舊辦理外其有被詐之家因其謀死卑幼復釀成人命致一死一抵如此案者則圖詐之犯即使所殺傷係屬卑幼亦未便僅照向例擬遣使兇惡之徒無所畏懼其應如何改擬絞候之處著刑部另行定擬具奏載入例冊遵行所有張應琳一案即照新例辦理尋刑部議奏查例載兄及伯叔因爭奪弟姪財産故行殺害者擬絞監後係指爭奪弟姪財産即將有財産之弟姪殺害者而言與圖占同族財産故殺弟姪圖賴者不同但因圖占財産起衅致被詐之家復致殺其尊屬搪抵是自殺其弟姪而又釀成二命即予以繯首之條實有應得請嗣後如兄及伯叔謀奪族人財産故殺弟姪圖賴致被詐之家復有致死尊長釀成立決重案除罪犯應死者悉照各本律定擬外其罪應軍流者即照兄及伯叔因爭奪弟姪財産故行殺害例擬絞監候以昭平允至被詐之家所有財産即使無人承管亦不得以爭奪者之後承繼從之刪除私自淨身斬候舊例更定問擬條款諭向來刑部定律凡有私自淨身人犯俱問擬斬候雖為慎重傷身起見然一經閹割便成廢人若非實在貧苦孰肯甘心出此况此輩供奔走掃除之役自古已然是宫闈在所必需而反治之以罪從前定例本未允協所有私自淨身問擬斬候一案竟應刪除並著直隸總督順天府尹嚴飭各屬州縣嗣後如有並無他故自行淨身者准其投内務府派撥當差照例驗看如有他故内務府大臣再行文問之地方官不得竟拘家屬致滋擾累其現因私自淨身問擬斬候己未招解及在監覊禁著查明釋放解送内務府分别當差尋刑部議奏此等淨身之犯情節不同有因貧而圖充太監者有畏罪而故自傷殘者今舊例既刪將來遇有此等案件如有委係貧難度日私自淨身别無他故者應即照例令其自投内務府驗看派撥當差如係畏罪情急希圖漏免此等人犯除實犯死罪及應外遣無可再加外其餘俱按其原犯科條上各加本罪一等從之定遣發各省駐防當差人犯改遣雲南等省停止解部轉發例詳見徒流門増定姦夫謀殺本夫姦婦不知情姦夫擬斬入本年秋審情實例定軍罪脱逃人犯拿獲由配所定地改發例刑部議定拿獲軍流罪脱逃改發人犯若應配之所與原籍相近而地處邊境再無别處可以改發者仍從其原籍改發倘原籍改發之所又較原配相近則視其拿獲地方改發互見徒流門皇朝文獻通考卷二百二
