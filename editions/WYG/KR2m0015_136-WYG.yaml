body:
  text: 欽定四庫全書皇朝文獻通考卷一百三十六王禮考十二巡幸臣等謹按四巡之典載在虞書時邁之歌列於周頌所以觀民設教展義示度典至重也漢唐以後偶有巡幸之文鮮聞勤民之實我朝列聖相承以無逸作所為家法聖祖仁皇帝翠華臨幸察吏治恤民隐相度河防講求水利若山東山西若河南陜西若江南浙江宸逰所經父老謳思數十年如一日以至塞垣清暑畿輔水圍嵗每舉行凡以體乾健而敷兑澤聖謨深逺誠足為萬世法我皇上繩武紹聞自强不息御極五十年來舉行時巡之典詣盛京幸齊魯禮嵩洛厯三晉而東南呉越車駕特六至焉所過整飭官吏加恵黎元嶽瀆懐柔神人胥洽至於河隄海塘躬親相度指示機宜以為一勞永逸之計前者敬遵聖祖仁皇帝前後省方恭侍太皇太后皇太后鉅典祗奉聖母親掖安輿錫類推恩罔不周溥仰見天家孝徳之隆聖母尊養之備逺邇欣愉殊音同聲則又稽諸往牒罕有倫比者也謹彚次厯年巡典具著於篇其蠲租免賦勸學造士優老恤刑諸大典則分見於國用學校刑考兹不載若夫盛京之地王業肇基聖祖仁皇帝凡三巡我皇上已四詣報本追逺愷澤覃敷則謹載於謁陵門至於巡幸近畿行慶施恵諏咨民莫一嵗之間六飛屢駕其詳見於起居注編年紀月有舉必書兹惟恭載最初一次嗣後事同一例者不備書天聰三年三月上南巡閲視邊境城垣頺壊者車駕次牛莊命築新城高二丈二尺有竒加雉堞賜督工諸臣宴次海州有漢民夫婦俱百餘嵗子年七十有三召見令守臣善視之九年三月上巡幸盛京北山道經都統楞額禮墓下馬以金盃酌酒奠而痛哭之崇徳七年五月上閲草場渡遼河閲視牛馬羣順治三年十月定行幸迎送禮儀所經過地方文官知縣以上武官逰擊以上於本境道右百步外跪迎送地方官百里内者來朝百里外者免八年四月定諸王文武羣臣扈從及接駕送駕凡大駕行幸扈從及留京和碩親王多羅郡王多羅貝勒各具吉服齊集朝房候駕出宫於午門内分兩翼序立駕至金水橋俱跪候駕過隨出留京固山貝子以下文武各員及隨行固山貝子公都統各具吉服於午門外常朝處分兩翼序立駕出午門俱跪候駕過其留京王以下都統以上俱隨行候㫖方囘扈從䕶軍統領副都統參領等官各率本旗兵丁於駕出門外排列跪候駕過各照旗按隊隨行駕還宫諸王貝勒各具朝服於午門外各樓邊分兩翼序立固山貝勒以下及文武各官各具朝服於午門外常朝處序立駕至王以下皆跪候駕過諸王貝勒隨入午門於内金水橋前分兩翼序立駕入宫乃退凡諸王貝勒貝子公等扈從俱分翼隨駕行召問則勒馬稍後欠身恭對赴駐蹕所俱於百步外下馬扈從大臣官員候御前鹵簿及諸王貝勒貝子公䕶衛過畢按旗分翼隨行若召問從旁入勒馬稍後欠身恭對赴駐蹕所於二百步外下馬是月上行幸塞外禮部奏言聖駕出都行幸地方官例進御膳等物得㫖進獻禮物出自民間有司以此進奉於禮不合今後永不許進十六年十一月上巡幸近畿過昌平州遣官分祭明諸陵親至明崇禎帝陵前酹酒遣學士麻勒吉奠明太監王承恩墓諭有司明代諸陵樹木永禁樵采康熈七年九月諭吏部兵部朕頃以秋冬農隙講武之時欲一往邊外閲視不久即還今覽諸臣前後各疏稱今嵗災變甚多不宜出邊以致兵民困苦朕思諸臣抒陳忠悃直言進諫深為可嘉已允所請停止邊外之行以後國家𦂳要重大事情如有未當務将所見直陳朕不憚更改八年十月諭户部朕巡厯所至凡御用器物皆係所司由京城供辦毫無取於地方除内廏之馬不用飼秣即部撥馬匹所需芻豆亦屬無多向聞地方官指稱御用私派民間預為儲偫既不銷算又不還民貪汚官吏侵肥入己苦累小民重違法紀自後務加嚴禁倘有仍前借端科派者所司官嚴察叅究重懲如匿不上聞事發一併治罪十一年正月上奉太皇太后幸赤城湯泉先期諭有司動支帑金前往修理道路毋得擾民啓蹕之日上隨太皇太后輦步行至神武門乗馬路出南口遣内大臣祭明代諸陵過八達嶺上自山麓下馬扶太皇太后輦太皇太后念上步行勞苦諭乗馬上奏曰此處道路必扶御輦於心始安至坦道始乗馬過長安嶺亦如之駐東山廟地少水是日山泉忽湧成河人馬皆足飲及至湯泉每日詣太皇太后行宫問安以耕耤屆期回京行禮禮畢復幸湯泉給换班兵丁口糧銀兩回鑾日上扶太皇太后輦行數步方乗馬行過長安嶺大雨上下馬步行扶輦至嶺上太皇太后欲少憇上即趨行命取凉棚親視安置及下嶺仍步行如初過八達嶺亦如初及囘京至神武門下馬扶太皇太后輦入宫隨詣太皇太后宫問安臣等謹按天子之徳莫先於孝聖祖仁皇帝孝事兩宫恭奉太皇太后詣湯泉步行扶輦嗣後奉仁憲皇太后南巡攬江山之名勝士庶之歡抃喜動慈顔中外傳為盛事我皇上敬承家法時邁所至恭奉聖母皇太后安輿以展養志之誠仰見我朝聖母嗣徽衍慶一人推恩錫類之隆軌前後輝燿伊古以来所未有也十六年九月上巡視沿邊内外諸䝉古王公等来朝貢駝馬調喀喇沁杜楞郡王扎什鎮國公烏忒巴喇一等塔布囊西達等率兵丁一十五百名来為嚮導各賜衣㡌帶鞾白金縀布有差二十年九月上巡幸近畿召霸州知州呉鑑保定縣知縣李文英詢以地方被災若何民生若何鑑等奏畢上曰知州知縣最為親民之官必忠勤守法愛惜百姓方為稱職若肆其貪殘貽害地方國家自有定法也直𨽻巡撫于成龍入見上密詢百姓生業地方事宜賜以御衣臣等謹按自是嵗以後聖祖巡省畿甸嵗恒舉行以肄習水圍循視河隄觀風問俗勤恤民隠於輦轂之下尤加意焉一逰一豫無非事者頌聲之作洵與夏諺同軌矣二十二年二月上幸五臺山諭巡撫穆爾賽等曰五臺繁峙静樂崞縣等處地瘠民貧爾等既膺簡用必持己亷潔恪共職業務期利興害除使民生各得其所不然罪有所歸矣六月上奉太皇太后出古北口避暑閏六月幸興安拜察地方召科爾沁達爾漢親王額駙班第阿禄科爾沁多羅郡王額駙色楞翁牛特多羅杜楞郡王畢禮衮達頼喀喇沁多羅杜楞郡王扎什及公台吉官兵等諭曰人生以道理為重人為情欲所牽恣意妄為以致䘮身皆由不明道理之故耳朕見其無知䧟罪甚為憫惻即今阿禄科爾沁翁牛特二旗盗賊甚衆為盗賊而致富者能有幾人身受惡名被獲則死凡貧富皆由天命違理妄求能必得乎爾等各遵法守分有牲畜者擇水草善地畜牧能耕田者勤於耕種則各得生理天亦佑之倘有貧困至極無以聊生者該管之主宜加撫恤使之得所坐視其迫於饑寒以致離散爾等之心何安朕本内外一視並無分别爾外國遇年嵗荒歉朕即運糧米賑濟或有困乏即賜牲畜縀疋無非慮爾失所之意况此畨巡幸爾等或有過犯朕並不執法治罪且頻加賞賚優待爾等於此可見嗣後爾等宜遵守教諭革除惡習以副朕好生之意及囘鑾日復諭八旗䕶軍統領等榖者生民之命一嵗不登則一嵗乏食今正秋收之時田穀未獲向恐擅放馬匹蹂踐禾苖屢降明諭傳飭今觀隨從人等尚有未遵法令蹂踐民田者爾等各嚴緝以聞臣等謹按此巡幸熱河避暑之始自是每嵗夏月啓鑾至秋則舉獮狩之典仰見聖祖健行不息詰戎綏逺之家法超越往古矣九月上奉太皇太后幸五臺山上過涿州以長城嶺山徑險峻先往親視所修道路命裕親王福全恭親王常寜隨太皇太后駕行諭扈從各官凡經過地方不許隨從人等借名市物擾害小民犯者并其主罪之至曲陽縣以行近五臺戒扈從人等勿射生太皇太后駕至長城嶺上侍左右親督校尉及隨從人等前後扶行厯嶺路數盤山勢巉崿險隘殊甚太皇太后諭曰嶺路實險予及此而止積誠已盡五臺諸寺應行䖍禮者皇帝代我行之猶我親詣也上下馬受命躬送鑾輿還龍泉闗仍命裕親王福全扈行上瞻禮五臺諸寺發白金三百兩綿三百觔命有司分給所過地方貧民二十三年九月上東巡先是吏科給事中王承祖疏請巡狩燔柴泰山即過孔林觀禮器下九卿議應如所奏從之遂諭户部曰朕軫念蒼生勤求治理邇年以来於畿輔郡縣時行厯覽補助兼施今俯允廷議諏吉東巡正欲體察民情周知吏治一切沿途供用皆令在京有司儲備毫不取之民間猶恐地方官役不能深體朕懐借端支應妄行濫取今特加申飭如有悖㫖私徴一經發覺定行從重治罪更念此畨巡厯原以撫䘏編氓問俗觀風於閭閻休戚務期洞曉凡經過地方百姓須各安生業照常寜處毋得遷移逺避反滋擾累爾部即行令該地方徧令曉諭知之前期頒詔天下曰帝王誕膺景命統御萬邦道重觀民政先求莫是以虞廷肆覲肇舉省方周室懐柔式歌時邁詩書具在典制丕昭朕仰荷天庥纘承祖烈撫兹兆庶期底時雍夙夜孜孜懋求治理以富以教靡敢怠遑猶慮蔀屋艱難㒺由上達故於直𨽻郡縣周覽巡行勤施補助更念山左等處土宜俗尚不加循習曷克周知矧嵗逢甲子世際昇平聿圖泰運之恒新在措芸生於豫大乗時命駕咨彼民依但樂利祗慰夫一方而徳澤未敷於九有朕心歉焉用是特昭公普以宏仁庶奏諴和之盛治於戲時臻熈皥彌隆寛䘏之恩户樂清寜丕篤綿長之慶布告天下咸使聞知車駕發京師日鹵簿大駕照常陳設王以下文武各官跪送如常儀經過百里以内地方官率本地鄉紳士民迎於十里之外本地鎮守滿漢官軍各整隊伍亦於十里外恭迎至山東泰安州親詣嶽廟祀泰山之神遂登泰山絶頂侍臣請往觀捨身崖上曰愚民無知惑於妄誕之説以捨身為孝不知身體髪膚受之父母不敢毁傷故曾子有臨深履薄之懼且父母愛子惟疾之憂子既捨身不能奉養父母是不孝也此等事宜曉諭嚴禁使百姓不為習俗所誤觀之何為至桃源縣閲黄河北岸諸險工指授河臣方畧上目擊隄夫作苦駐轡久之親加奨勞復諭河臣曰隄上工役勞苦倍常所給工食為數無幾恐不肖官役從中侵蝕當使人人得沾實恵渡黄河遣官祭河神上臨視天妃閘水勢湍急令河臣改為草壩另設七里太平二閘以分水勢御舟過髙郵湖見民間田廬多在水中惻然念之因登岸循行隄畔十餘里召耆老詳問被災之由復諭督臣曰朕此行原欲訪問民間疾苦凡地方利弊必設法興除使之各得其所昔堯憂一夫之不獲况目睹此方被水情形豈可不為拯濟耶渡江乘沙船風浪恬静舟行甚速上顧侍臣曰自兵興以来恢復岳州長沙多得此船之力今海㝢承平昔時戰艦僅供巡幸渡江之用然安當思危治當思亂朕乗此舟未嘗不念艱難用武之時非以觀遊為樂也至蘇州府上謂侍臣曰向聞呉閶繁盛今觀其土風大略尚虛華安佚樂逐末者衆力田者寡遂至家鮮盖藏人情澆薄為政者當使之去奢返朴事事務本庻幾家給人足可挽頺風漸摩既久自有熈皥氣象至江寜府遣官祭明太祖陵御製祝文上仍親詣明太祖陵奠酒是日過明故宫慨然久之幸江寜教場令將軍副都統總兵等官校射上親射右發五矢五中左發五矢四中士民觀者咸歡呼動地上將囘鑾地方文武各員及縉紳士民數十萬跪送諭之曰朕向聞江南財賦之地今觀市鎮通衢似覺充盈其鄉村之饒人情之朴不及北方皆因粉飾奢華所致爾等大小有司當潔己愛民奉公守法激濁揚清體恤民隱副朕老安少懐之至意至江都縣命吏部尚書伊桑阿等往視海口議疏導之法至淮安府閲髙家堰及黄河南岸諸險工至宿遷縣閲隄工居民老㓜數千人跪迎隄畔其年老貧寒者各賜白金駕至曲阜縣親詣先師廟致祭特行三跪九叩禮遣官祭啓聖公皆御製祝文禮成上御詩禮堂選孔氏子弟二人進講經書周覽先聖遺蹟復詣孔林酹酒御前曲柄黄盖留設先師廟廷遣恭親王常寜及禮部尚書介山祭元聖周公廟御製祝文二十八年正月上南巡先期諭吏部户部兵部工部朕統莅寰宇二十八年於兹早作夜思勤求治理務恤黎庶永圖乂安如黄運兩河運道民生攸係朕日切心勞比年工役雖漸有緒而應修應塞議論紛紜曩嵗巡幸曾允淮揚士民所請疏濬下河前已興工尚稽底績屢經廷議請朕親行閲視今特諏吉南巡躬厯河道兼欲觀覽民情周知吏治所至沿途供億皆令在京所司儲偫一切不取之民間即有日用應需該衙門於所在地方照市估平買不許錙銖抑勒小民猶恐地方官吏不能悉體朕懐借名科派供應今特頒諭嚴飭如有悖㫖借端私徴者察實即以軍法從事地方文武大小官員不許與扈從官員指稱交戚輙通餽遺違者並以軍法從事其扈從大小官員及隨往傔役如有生事擾民者一并從重治罪朕兹巡省原以軫恤編氓咨諏風俗凡經過地方百姓各安生業務令廛無廢市隴不輟耕毋得倉皇驚避輙滋煩擾其軍民人等懐奸挾詐希逞私憤擅於駐蹕處所凟行告訢者一概嚴禁倘有妄控除所告事不與准理外仍嚴加治罪爾部即傳諭各該督撫備行曉諭以副朕恵愛元元至意駕過獻縣民有進嘉禾一莖雙穂者諭侍臣曰自古聖王不貴金玉而貴五穀穀者民之命也朕甚寳之至山東躬率文武諸臣望祭岱宗行禮至江南界閲視中河親坐隄上出河圖指示諸臣至揚州府諭江浙督撫諸臣曰朕省察黎庶疾苦兼閲河工巡幸江南便道至浙觀方問俗簡約儀衛鹵簿不設扈從者僅三百餘人頃經維揚民間結綵歡迎盈衢溢巷雖出恭敬愛戴之忱恐至稍損物力甚為惜之朕視宇内編氓皆吾赤子惟使比户豐饒即不張結綵幔朕心亦所嘉悦前途經厯諸郡邑宜體朕意悉為停止又見百姓老㓜男婦奔走雜遝瞻望恐後未免諠譁擁塞念此行原以為民不嚴警蹕但人衆無所區别高崖水次或有傾跌之虞一夫不獲其所足軫朕懐此後止於夾道跪迎勿得紊亂追趨致有諸患自蘇州抵杭州府諭扈從部院諸大臣曰朕稽古省方咨求治理閲視河道期底平成凡有利於民生必令羣沾實恵念政治所先在崇文教江南浙江為人文萃集之地入學額數應酌量加增永昭宏奨江寜鎮江杭州駐防滿洲漢軍兵丁鎮守要地久厯嵗時深用軫念應加恩賚以彰優恤自南巡以来所經過地方官員除八法處分及列欵糾劾外凡因公罣悞降級留任者俱准與開復降級調用者著帶所降之級留任其經過地方現在監禁人犯除十惡及詔欵所不赦等罪並官員犯贓者不宥外其餘自康熈二十八年二月十一日以前死罪及軍流徒罪以下已結未結俱准寛釋以示朕赦罪宥過之意備辦船隻地方各官効力勤勞著該督撫㑹同奉差官員確查具題各加一級縴夫供役勞苦亦著該督撫察明人數量給恩賞朕厪念民依特蠲租賦總期實徳潤澤蒼生近見民間有建立碑亭稱頌徳意者雖出羣黎感戴之誠但恐各郡皆然未免致損民力誠使閭閻殷阜則禆益良多碑亭何與焉嗣後亦宜停止江浙錢糧既經蠲豁猶慮有不肖有司借端詞頌朘削民生著諸督撫嚴行禁飭至各處𣙜闗原有則例朕舟行所至諮訪過闗商民每不難於輸納額税而以稽留闗次不能速過為苦𣙜闗官吏理宜遵奉屢頒諭㫖恤商恵民豈可反貽之累自今應力除積弊凡商民抵闗交納正税即與放行毋得稽留苛勒以致苦累朕蚤夜孜孜惟冀官吏軍民士農工商無一人不獲其所故於民生吏治圖維區畫務極周詳爾等可即傳諭俾一體奉行稱朕意焉賜扈從王大臣侍衛及部院諸臣銀幣渡錢塘江至㑹稽親詣禹陵致祭御撰祭文祭文内書御名禮成還錢塘閲視官兵騎射以杭州將軍郭丕等請留駐一日諭諸臣曰朕兹行特為閲視河道諮訪閭閻風俗因禹陵在邇躬往致祭歸時便道過西湖聊爾寓目非為逰觀也又諭扈從部院諸大臣曰朕巡省民生風俗行次浙江見省㑹兵民俱相和輯生齒蕃庶閭里乂安但觀民間習尚好為爭訟爭訟一興則不肖有司因縁詐索勢所必至縱或官員無所朘削而胥吏作奸究不能無私行勒取之弊則小民之牽連苦累者多矣夫微忿不捐搆成嫌怨小則耗損物力大則傾隕身家其為蠧害不可勝言矜此愚民允宜深戒地方大小衙門官員亦應各簡詞訟勸導閭閻俾守分息爭共安生業又夙聞東南巨商大賈號稱輻輳今朕巡厯呉越州郡察其市肆貿遷多係晉省之人而土著者益寡良由晉風多儉積累易饒南人習俗奢靡家無儲蓄目前經營僅供朝夕一遇水旱不登則民生將至坐困茍不變易陋俗何以致家給人足之風爾等可傳諭將軍總督等令家喻户曉務使敦本興讓崇儉黜浮兵民日益協口風俗日益淳樸詞訟日益減少積儲日益豐盈則教洽化行朕心實加頼焉至蘇州府蘇松紳士軍民等獻本處所産土物叩請聖駕暫留數日上曰國家之用雖盡出於百姓朕兹南行民間之物秋毫無犯爾等既各輸誠姑取米一撮果一枚以慰民殷勤來貢之意至朕時巡事畢明日發駕不必勉留臣民復再三叩請上命再駐一日至江寜府親詣明太祖陵饗殿致祭復至陵前奠酒賜守陵人白金百兩閲江寜駐防官兵步射賞江寜鎮江杭州駐防兵丁一月錢糧至淮安復閲高家堰隄岸指授方畧三十年四月上巡幸多倫諸爾喀爾喀汗台吉等來朝謁受封賞有差是嵗以喀爾喀土諾圖汗等率所屬數十萬人来歸特往撫綏安輯諭内大臣等嚴約官兵人衆勿使踐踏麥田至古北口閲總兵官蔡元標下官兵至多倫諾爾上御行宫前黄幄喀爾喀汗台吉等行三跪九叩禮以次序坐樂作大宴上親閲喀爾喀營寨察其窮困者賞以銀布又大賚喀爾喀王貝勒貝子公台吉等牛羊留兵部尚書馬齊料理㑹閲事上囘鑾喀爾喀土謝圖汗車臣汗王貝勒貝子公台吉等皆依戀不已伏地流涕諭扈從諸臣曰昔秦興土石之工修築長城我朝施恩於喀爾喀使之防備朔方較長城更為完固矣三十五年二月上親征噶爾丹出獨石口駐中拖陵地方撫逺大將軍費揚古以㨗書聞御幔城行慶賀禮囘鑾至清河設鹵簿皇太子諸皇子諸王及在京文武大小官員出郭外五里跪迎八旗䕶軍驍騎步軍及近京閑散官員士民工商耆老男婦夾道捧香跪迎九月上巡幸北塞經理軍務出張家口厯歸化城渡黄河至東斯垓地方乃班師三十六年二月上巡幸寜夏出師征噶爾丹諭大學士曰自古帝王巡狩凡所過地方前代帝王陵寢先賢墳墓及名山大川皆行致祭甚盛典也朕今巡幸沿途所經其有古帝王陵寢先賢墳墓名山大川皆詳察具奏應致祭者祭之上至寜夏諭川陜督臣曰朕巡幸沿邊地方詢察閭并生聚及土田沃瘠之狀自晉及秦經行三千餘里直抵寜夏所以勤求民隐至殷且切朔方資大河之灌注疏渠溉田宜於稼穡當兹春氣暢遂正三農盡力南畝之時誠恐有司官員不體朕懐因車駕經臨調遣師旅借辭供億擾累小民東作有妨西成奚望今一切軍需芻糧俱儲偫足用至扈從簡約馬悉放牧並不以供辦草豆動煩民力爾可傳飭有司勿借端科派違者治罪務使地方百姓各安本業㕓無廢市隴不輟耕以副朕親厯邊圉軫恤民隠之至意御製牌文曰諭寜夏文武官員兵民人等朕體天育物日以治安為念雖身在宫庭而心恒周四海頃因指畫軍務不憚勤勞逺涖寜夏無非為蕩滌㓂氛綏乂生靈計也縁邊千餘里土壤磽瘠惟寜夏洪流灌輸諸渠環匝巡覽所至甚愜朕懐夫農桑者衣食之本積貯者殷阜之原爾官吏宜董勸父老子弟三時力田以盡地利比屋勤殖以裕盖藏縱使嵗偶不登亦可無憂匱乏若夫秦風健勇自昔為然其在朔方尤勝他郡爾等或職居將領或身𨽻戎行尚各厲精鋭以効干城禦侮之用斯國家有厚頼焉至於忠信慈恵服官之長軌孝弟齒讓生人之大經法紀不可不明禮教不可不肅勿以地處邊陲而不治以經術勿以習尚氣力而不澤以詩書總期上率下從庶幾馴臻雅化兹乘輿返蹕距靈朔雖逺而睠念塞垣如在几席爾等誠能敬體朕言將吏協恭兵民咸理生聚日益厚風俗日益淳則疆圉實有攸禆朕心亦用深慰慎勿視為具文辜朝廷惓惓牖導之意欽哉遂自寜夏出師往白塔駐狼居胥山駕出行宫親閲八旗鎗手緑旗兵起行至布古圖地方撫逺大將軍費揚古奏報噶爾丹窮蹙飲藥自盡上率文武官員拜天畢御行宫行慶賀禮乃班師三十七年四月上幸五臺山路經房山命皇子及大學士至金太祖金世宗陵奠酒三十八年二月上奉皇太后南巡前期諭吏部户部兵部工部朕撫馭寰區孜孜圖治期於天下咸遂生成物無不得其所今邊烽永靖四方無事獨是黄淮為患衝决時聞下河地方田廬漂沒朕軫念民艱曩曾屢遣大臣督修不惜數百萬帑金務期早綏黎庶乃厯年已久迄無成功今水勢仍復横濫浸漫城閭沉沒隴畝以致民多失業董其役者未有上䇿可以宜民時厪朕懐未嘗少釋在内諸臣咸請朕親臨指示為一勞永逸之圖方今春時水勢減少正宜講求疏濬以遂安瀾爰諏吉南巡親加勘閲更以呉地襟帶江湖乃東南奥壤勵俗省耕兼行臨視凡一切往返供億已皆俾辦於京師即途次日用所需亦令各衙門照本地時值採買總於民間一無所累仍恐沿途官吏藉名科派致累閭閻故特頒諭嚴行申飭如有悖㫖假託派索者察實即以軍法從事其扈從大小官員隨行傔從人等如有横行生事者一并從重治罪凡經過地方百姓各安生業皆如常時毋得遑遽引避其軍民人等懐挾私怨受人指使擅於駐蹕處所輙行告訐者一概嚴禁不准仍照例嚴加治罪爾部即傳諭通知以副朕體恤恵愛至意駕發京師由水路啟行將抵江南界御舟先行閲視高家堰歸仁隄等工畢回至奉迎皇太后舟渡河復臨視黄河隄岸命截留漕糧二十萬石於被水地方減直發糶渡江自京口至杭州府傳諭接駕兵丁速行遣囘勿使踐踏麥田又諭各鹽差闗差向因軍需煩費於正額外令在差官員以所私得贏餘交納充用今思各官孰肯自捐私槖必仍行苛取商瘠民困職此之由著将加增銀兩一概停罷至江寜府遣官祭明太祖陵躬詣奠酒諭大學士等令訪求明代後裔授以一官俾世守祀事囘鑾渡黄河閲視新埽並閲河標官兵射仍由水路還京四十年正月上巡幸塞外諭大學士等朕聞索岳爾濟山係名勝之山最為髙大今巡幸塞外欲乗便一往視之遂出張家口過上都塔爾呼必拉厯烏闌布通至喀爾必拉幸索岳爾濟山諭大學士等曰此山形勢崇隆允稱名勝嗣後此山禁止行圍四十一年正月上幸五臺山山西百姓詣行宫前跪奏言晉省饑饉䝉恩蠲免錢糧又動支倉粟賑濟愚民無以仰報請於菩薩頂建立萬壽亭上不允諸百姓跪獻各種食品命各取菓品少許上回鑾至大城縣巡視子牙河諸隄九月上南巡閲河至徳州回鑾前期諭吏部户部兵部工部朕念黄淮兩河為運道民生所係屢次南巡親臨閱視以疏濬修築之法指授河臣開六壩以束淮敵黄通海口以引黄歸海比嵗以來工程次第告竣修防漸有成效昨年冬月河臣張鵬翮曽以河工善後之䇿及應修之處請朕親閲指示兹當農事之隙減約從員輕装南下自徐州一路循視堤堰沿途皆設營幄不御屋廬日用所需悉已儲偫經過地方一切供帳宜通行禁止倘有官吏藉名科派累及小民或指稱預辦擅動庫帑察出定嚴加治罪地方大小文武官員託言親舊私相餽遺及隨從人等有妄行生事者俱以軍法從事閭閻百姓各事本業不須引避有懐挾私怨於駐蹕處所告訐者一概不准仍照律治罪該部即傳諭通知駕發京師至徳州留駐十數日諭扈從諸臣曰朕因閲河南巡今以皇太子允礽患病朕駐蹕此地為時已久應即回鑾明嵗再閲視河工也四十二年正月上南巡自暢春園啓行至泰安州登岱遣領侍衛内大臣詣嶽廟致祭入江南境沿途周視河防至蘇州府賞賚扈從大臣及侍衛䕶軍執事人等白金有差至杭州府遣官閲錢塘江隄至鎮江府賜京口驛站兵丁銀兩駐江寧府遣大學士馬齊祭明太祖陵又命皇太子往奠酒回鑾以河工告成頒詔天下十月上西巡前期諭吏部户部兵部朕統御寰區勤求治理鑾輿時邁省方觀民春月閲視河工自畿輔山東以及江浙地方皆經巡幸兹兩河漸已底績所至之地民生風俗亦因以周知念陜西省為巖疆重地當出師塞外時曽經歴其邊境而西安一路未及親莅頃陜西督撫諸臣言秦民望幸之心至殷至切合詞陳奏河南山西巡撫等亦諄切具請乗此冬令農隙之際觀覽民風詢察吏治簡閲禁旅整飭軍營實為要務用是輕装約從諏吉西巡沿途一切供御皆内廷儲備纖毫不取辦於地方即偶有市易之物亦敕所司依時價給值不許錙銖抑勒所過大小官員宜體朕愛民徳意勿借詞供億私派閭閻如有悖㫖科斂者察出即以軍法從事地方官不許與扈從人員指稱交戚私相餽遺違者並以軍法從事其扈從人員宜約束僕役勿使妄行如不遵法紀生事擾民一并從重治罪朕視民如子凡乗輿所至市㕓隴畆宜各安生理米豆薪芻等物民間照常貿易不必禁止惟懐私挾詐衝突告訐者所告事不准理仍嚴加治罪爾等即傳諭扈從官員人等並行各督撫令於經過府州縣城市村荘徧示曉諭俾咸悉朕懷駕發京師命給事中御史各一人於扈從後察不法者即時鎻拏至太原府閲官兵騎射復諭山西撫臣曰朕君臨天下四十餘載無一刻不以蒼生為念近因西省望幸甚切故于冬時農隙減從輕騎由晉及秦入境以來觀風問俗見民生畧有起色閭閻之間俗朴尚儉朕心少慰朕自弱齡讀書往往以不知窮簷僻壤之疾苦為嘆息所以留心於官方凡有往來者必先諮詢民情豐歉偶有失時定加蠲賑且思晉省不通水運嵗或不登即難籌畫雖有州縣存貯之米穀未必實數具在反益不肖有司之虧空也今嵗山西收成頗佳爾等仰體朕愛民如子之至意曉諭民間若嵗豐用奢則荒年必致匱乏教之以禮義導之以守法重農務本藏富於民則朕無西顧之憂矣凡朕所厯之處必大沛恩澤其將四十二年以前山西所屬州縣未完銀兩米草盡行蠲免以示朕加恵黎元之念至洪洞縣遣官祭女媧氏陵駕渡河至潼闗遣禮部侍郎祭西嶽華山賜固原提標迎駕兵丁二百五十名銀兩又賜接駕百嵗夀民銀兩至西安府閲駐防官兵分别賞賚遣官分祭周漢唐帝王陵寢諭禮臣曰文王武王皆古之聖君非他帝王可比祭文内可書朕名諭督撫諸臣曰秦省為天下要地時厪朕懐曩者連嵗荒旱所司未經奏報朕訪聞得實即多方籌畫運米拯濟蠲賦免逋秦民始得少蘇自康熙三十二年遣皇太子允禔致祭華山以來雨暘時若年榖豐登閭閻稍有起色朕隆冬跋履風霜逺臨兹土見百姓歡迎載道且知今嵗有秋地方文武大吏更能恪勤奉職滿漢軍士亦皆訓練有方朕心甚悦凡巡幸所至必大沛恩膏今將陜西甘肅所屬康熙四十二年以前各項積欠銀米草豆錢糧盡行蠲免俟四十三年直省咸獲豐稔當將秦省四十四年正供亦行免徴該督撫即通行曉諭俾窮鄉僻壤小民均沾實恵至陜州命皇子及侍衛等往閲三門底柱駕由孟津渡河遣官祭漢光武帝陵諭河南撫臣曰朕念西土兵民生計乗冬令農隙之時特事西巡返轡京師道由豫省自入潼闗見閿鄉以及河南府民生甚艱而懐慶少裕至衛輝府則又艱苦頼薄有秋成尚能餬口倘遇歉嵗必至流亡此皆大小官吏互相容隠雖有衰老病廢懶惰退諉之員仍使在任以致貽誤地方河南百姓質朴愚魯輸賦從未稽遲而今嵗所欠乃至四十萬兩顯係州縣官聞朕蠲除秦晉積欠錢糧希冀恩免於中漁利見今民欠俱免催徴著將河南通省俸工銀兩補足所欠之數如有不完停其陞轉俟完日開復至磁州賜先賢端木子後裔為五經博士御書賢哲遺休匾額命懸先賢端木子墓前四十四年二月上南巡前期諭吏部户部兵部工部朕厪念民生加意河道屢行親閲一切疏濬修築事宜悉經周詳指畫獲告成功前黄河之水往往倒灌清口者皆由仲荘閘與清口相對駱馬湖水勢湍急遂逼黄流灌入清口朕視河時躬臨相度命河臣移仲荘閘改建於楊家荘出口工竣之後河臣報稱黄水暢流入海絶無倒灌清口之患朕尚未經親閲今欲特涖其地察驗形勢用籌善後之規其中河黄河運河有應加修防者亦隨宜指示以圖經久至於山東省薦饑之民頼兩年來極力賑贍繼以有秋幸皆得所其民間生聚果否殷阜並於沿途親行周覽焉乗兹仲春解凍減從輕装循河南下往返皆用舟楫不御室廬經過地方不得更指稱繕治行宫妄事科歛其日用所需俱自内廷供御從無纎毫取辦於民前此屢次南巡閭閻皆所深悉倘有不肖官吏藉名預備擅動官帑並圖日後加派補償以為巧取侵漁之地者事覺嚴行治罪决不寛宥所在官吏私餽扈從人員及隨行人役生事擾民者俱如前㫖以軍法從事奸民挾私控訐者從重治罪爾部即通行傳諭駕發京師於張家灣登舟至山東境紳士軍民數十萬跪迎奏言山東連年饑歉䝉恩截漕散賑蠲免錢糧通省民命始得全活無不感激垂涕諭山東巡撫曰朕為兩河告成特來巡閲道經山左見民生自去嵗休養之後漸有起色朕心甚慰夾岸黄童白叟歡呼載道感恩叩謝者日有數十萬今仲春之時麥苗未長未致妨農倘回鑾之際正值農忙麥秀恐妨稼穡爾即曉諭百姓概免叩謝各務農事可也駕入江南境士民夾道跪迎奏稱聖駕屢臨河上指示修築淮黄方畧故能丕告成功今復謀及萬全務期善後不憚跋涉之勞為民閲視河道亘古未有感恩叩謝歡聲雷動至蘇州府恭遇聖誕百姓爭獻食物得㫖朕因閲視河工巡訪風俗而來非為誕辰也朕一切應用之物俱備自内府所過地方秋毫無犯今爾兆民中心篤至朕已知之即如朕受之爾等可攜去至松江府閲各標官兵射賜松江兵丁餉銀一月至青浦縣御書聖跡遺徽扁額命懸掛孔宅相傳漢時孔氏苗裔避地至此奉先聖衣冠葬處也諭江南督撫曰朕為兩河告成楊家莊新河建閘特来閲視爾等同地方士民再四懇請故渡江而南見百姓雖不能比户豐饒幸安居樂業無憔悴之色朕心少慰矣編氓皆朕赤子休息撫養已數十年民雖至愚亦所深悉所以扶老攜㓜日計數萬隨舟擁道歡聲洋溢者皆由中而發非假飾也但人多路隘菜蔬苗麥瀰漫田野不能保其無損朕甚惜也爾等即出示曉諭萬勿踏壊田禾有負朕恤民之意至杭州府閲浙江各標官兵射賜杭州八旗兵丁餉銀兩月至江寜府遣官祭明太祖陵上仍親往率諸皇子及大臣侍衛等行禮自蘇州至江寜御試士子者三中選者給白金令赴京録用有差駕至清河復臨高家堰徧閲河隄仍由水路回京四十六年正月上南巡前期諭吏部户部兵部工部朕念淮黄兩河工程為東南要務屢次躬臨河上相度指示一切修防疏濬業已次第奏功昨嵗河漕督撫諸臣詳勘地形請於溜淮套别開河道直達張福口以分淮勢朕欲即令動帑興築而督撫諸臣又以事闗創建合詞請朕親閱九卿等集議復冄三陳請朕以諸臣之言奏聞皇太后祗遵慈命擇于本年正月二十二日啓行閲河舟楫往返不御室廬日用所需取辦内府經過府州縣毋得更以預備行宫供設御用冒侵庫帑科斂閭閻倘有不遵事覺定嚴加治罪其文武大小官員私相餽贈隨從人役生事擾民及奸惡挾私告訐者俱如屢次諭㫖重處不宥爾等即轉行各該督撫通飭所屬張示徧諭俾咸知悉御舟至臺荘士民數十萬人進獻食物恭請暫停御舟少伸瞻仰之忱上為之登岸御龍亭令耆老近前問以農事生計諭令停止進獻耆老復叩懇收納命收食物一二種上由清口閲視溜淮套詳看形勢命停止開河渡江至江寧府遣大學士馬齊祭明太祖陵復親往行禮幸演武場閲射賜扈從大臣侍衛䕶軍及執事人等金幣有差至蘇州恭遇聖誕士民萬餘人集行宫前進表叩祝萬壽至松江府閲提標官兵射至杭江府閲浙江駐防官兵射賜扈從大臣侍衛䕶軍及執事人等縀匹有差諭江浙督撫曰朕因視河駐蹕淮上江浙兩省官員及地方官紳士軍民皆環道逺迎懇請臨幸朕勉順羣情涉江而南巡省風俗所至郡縣見雨暘應時麥苗蕃殖比閭樂業可冀盈寧雖山東一路尚未悉觀而江浙田疇鬱䓤在望深愜朕懐方今二麥垂熟正将刈穫之時一切扈從人員皆以次舟行不致蹂踏誠恐百姓沿途迎送老稚扶攜動盈千萬越阡度陌不無踐傷朕心甚為軫惜凡所過地方悉令停止迎送且節候漸熟朕舟行乗夜迎凉亦未可定民雖逺來無由親見爾等督撫可張示徧加曉諭無負朕重農愛民之意四十九年二月上幸五臺山五十七年七月編纂省方盛典左都御史蔡升元疏言皇上親閲河隄指示方畧淮黄底定漕運無虞生民永頼至于翠華時巡察吏治訪民俗諮問必周芻蕘必納聖徳神功洵可為萬世法恭請編纂省方盛典一書以光至治禮部議覆應如所奏設局纂修從之皇朝文獻通考卷一百三十六
