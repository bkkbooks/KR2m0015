body:
  text: 樂考樂器三絲之屬琴律吕正義曰絲樂雖多惟重琴瑟然具聲變之義者尤莫如琴今欲辨琴之音調必先考其法制詳其絃度徽分然後體用備而理數明焉韓詩外傳云伏羲琴長七尺二寸史記云古者琴長八尺一寸爾雅大琴謂之離注琴大者二十七絃觀此史傳所載琴制無乃太大然記有大琴大瑟中琴小瑟之别則此制或即上古之大琴乎通考載孔子琴長三尺六寸四分廣雅云琴長三尺六寸六分風俗通云琴長四尺五寸此葢中琴之制也及觀今時所用大者通體三尺八寸上下絃度三尺五寸上下小者通體三尺一寸上下絃度二尺九寸上下其三尺五寸上下者為今尺四倍黄鍾之度其二尺九寸上下者為古尺四倍黄鍾之度葢中琴皆以四倍黄鍾之數為準故孔子琴度乃百世之宜也今定琴制以時用大琴三尺八寸有餘命為古尺之度約以今尺得三尺一寸三分四釐七毫為通體之長以孔子之琴古尺三尺六寸為岳山至焦尾絃度之數約以今尺得二尺九寸一分六釐此以下皆以今尺言其岳山之度二分四釐三毫岳山内際至額二寸一分八釐七毫額廣五寸一分零三毫肩濶五寸八分三釐二毫腰廣四寸三分七釐四毫尾濶亦如之設鴈足於絃度四分之三此琴之制制也琴絃之有臣細者所以分各絃全度之音而琴徽之有疎密者又所以節制各絃五聲二變之分以協和其聲調考也按史記舜彈五絃琴以歌南風之詩乃五音之正位其宫音居中央而徴羽商角各分兩側者也如六絃七絃世傳為文武所加者乃一絃二絃之清聲也其或謂之少宫少商者又隨一絃二絃之旋宫轉調而名之者也夫絲音以徴為本白虎通曰八音法易八卦絃離音也盛徳在火其音徴此大絃之所以尚徴也故大絃為倍徴二絃為倍羽三絃為宫管子所云徴數一百八羽數九十六宫數八十一是也倍徴倍羽大於宫者即下徴下羽之謂非倍絃度之長乃倍絲綸巨細之分也是故一倍徴二倍羽三宫四商五角六絃應一絃而為正徴七絃應二絃而為正羽此七絃大小之次也如以五音相生度分定其巨細則倍徴為一百零八綸三壐一絲以十二絲為一綸過此則粗不及則細倍羽為九十六綸宫絃為八十一綸商絃為七十二綸角絃為六十四綸而正徴為五十四綸正羽為四十八綸此依三分損益之法而為七絃巨細之分也若夫徽之為用則按七絃之各分與全絃互相應和而定五音之正位也盖五音之位各有其分某分所在即應某聲合七絃之五聲而各分俱全就一絃之各分而五聲已備又就各絃之全分而倍半分之節節有五聲之正節節有二變之位此定徽取分之大義也是以琴之十三徽中第七徽得絃度之半謂之中徽以其平分五聲之正位也七徽既平分絃度之半復以半度平分為二則四徽與十徽之分以四徽至岳山十徽至焦尾之度平分為二則一徽與十三徽之分於是以絃之全度三分之其一分為五徽其二分為九徽復以五徽至岳山之度半之為二徽以九徽至焦尾之度半之為十二徽仍以絃度五分之其一分為三徽其二分為六徽其三分為八徽其四分為十一徽此琴徽折取之定分也至於取音於徽分間有上下者盖以五音相生之度有當徽不當徽之别也其當徽而七絃俱用者惟七徽四徽一徽皆得本絃之正聲故又謂之三準五徽九徽十徽之音雖亦當徽然七絃之中間有不用者所以徽分與絃度不可不並舉而詳覈之也以徽之用於絃者言之十三徽下徴一絃用之為下羽位下羽二絃用之為變宫位宫聲三絃用之為商位商聲四絃用之為角位角聲五絃用之為變徴位徴聲六絃用之亦為羽位羽聲七絃用之亦為變宫位此十三徽除二絃五絃七絃為二變不用其一絃三絃四絃六絃皆用之矣十二徽下羽二絃用之為宫位角聲五絃用之為徴位羽聲七絃用之亦為宫位此十二徽二絃五絃七絃用之矣十一徽下徴一絃用之為變宫位宫聲三絃用之為角位商聲四絃用之為變徴位徴聲六絃用之亦為變宫位此十一徽除一絃四絃六絃為二變不用獨三絃用之矣十徽下徴一絃用之為宫位下羽二絃用之為商位商聲四絃用之為徴位角聲五絃用之為羽位徴聲六絃用之亦為宫位羽聲七絃用之亦為商位此十徽獨三絃不用其餘六絃皆用之矣九徽下徴一絃用之為商位下羽二絃用之為角位宫聲三絃用之為徴位商聲四絃用之為羽位角聲五絃用之為變宫位徴聲六絃用之亦為商位羽聲七絃用之亦為角位此九徽獨五絃為變宫不用其餘六絃皆用之矣八徽下徴一絃用之為角位下羽二絃用之為變徴位宫聲三絃用之為羽位商聲四絃用之為變宫位徴聲六絃用之亦為角位羽聲七絃用之亦為變徴位此八徽除二絃四絃七絃為二變不用其一絃三絃六絃用之矣七徽則平分各絃之半七絃皆用之為正聲矣六徽乃十一徽之半各絃用之與十一徽同五徽乃九徽之半各絃用之亦與九徽同至於四徽則又七徽之半為七絃各音之清聲三徽又六徽之半為十一徽六徽之清聲二徽又五徽之半為九徽五徽之清聲一徽又為四徽之半乃七絃各音之最髙聲一徽之上則無以復加矣至於定絃取聲唐宋以來皆謂隋廢旋宫以後獨存黄鍾一均唐人紀琴以管色合字定一絃而宋志燕樂譜又以管色合字為黄鍾之律故以一絃合字謂之黄鍾之宫夫黄鍾之聲實非合字而琴之一絃又非宫位其以合字定一絃者何也邇來概以笛之四字調為正調定琴之絃者正此調之聲字今考定黄鍾之聲實為笛之四字黄鍾之宫聲四字立下羽二絃以起調則姑洗之角聲上字立宫位三絃以主調此正角宫也是以倍無射之變宫合字立徴位一絃太蔟之商聲乙字無射之羽聲凡字當二變之位而不用焉且絲樂既以徴音為本故琴之一絃得徴分三絃得宫分而五音相和之位始正此絃音之正宫調也如以律吕定琴之絃其徴律所定之絃不應徴絃之分而得角絃之分羽律所定之絃不應羽絃之分而得變徴絃之分變宫律所定之絃乃得徴絃之分宫律所定之絃乃得羽絃之分宫聲之律既為四字則變宫之律為合字也明矣宫律定絃既得羽分為四字則變宫之律定絃得徴分而為合字也益明矣此所以琴之一絃實有不得不定為合字之義也近世惟據正宫一調為論律吕之本是以有隋廢旋宫以後止存黄宫一鍾之説然琴譜中有𦂳某絃慢某絃為某調者實絃音旋宫轉調之義但未明晰其故以管律絃度相和取聲而考騐之耳今以律吕定琴之法言之管律絃度之五正聲得分陰陽二均以相合者止有三調其餘得絃度之正分者或雜入陰吕之音其得陽律之音者又或值二變之位此正管律絃度生聲取分不同之所致也如止論絃音而不較以律吕則琴之隂陽二均亦皆各為七調然立羽絃羽分之聲必定以律吕而諸調始備是故絃音轉調皆以正宫一調為凖其各絃𦂳慢轉移之際而宫調旋於其中矣如宫調以倍無射之律變宫合字定一絃得下徴之分倍無射之律實為變宫尺字因近世定琴皆取笛之聲字故凡聲字俱以笛孔名之以黄鍾之律宫聲四字定二絃得下羽之分姑洗之律角聲上字定三絃得宫聲之分蕤賓之律變徴尺字定四絃得商聲之分夷則之律徴聲工字定五絃得角聲之分仍以倍無射之律變宫合字定六絃得徴聲之分應於一絃復以黄鍾之律宫聲四字定七絃得羽聲之分應於二絃其太蔟之律商聲乙字所應則為變宫之分而無射之律羽聲凡字所應則為變徴之分此二分當二變之位而不用盖黄鍾宫聲立羽絃以起調姑洗角聲立宫絃以主調故為琴之正宫調七絃各分皆應陽律一均之聲字焉商調則二絃四絃五絃七絃不更其散聲仍得本律之聲字而一絃三絃六絃俱慢下管律一音盖以太蔟之律商聲乙字定三絃立羽位以起調蕤賓之律變徴尺字所定之四絃立宫位以主調而倍無射之律變宫合字所定之一絃六絃下為倍夷則之律下羽凡字姑洗之律角聲上字所定之三絃下為太蔟之律商聲乙字其倍無射之律變宫合字更為應鍾之吕清變宫髙六字當變徴之分姑洗之律角聲上字更為仲吕之吕清角髙上字當變宫之分而不用此調之五正聲分皆應陽律一均獨二變轉而應於陰吕焉角調則一絃三絃六絃不更其散聲仍得本律之聲字而二絃四絃五絃六絃俱𦂳上管律半音盖以姑洗之律角聲上字所定之三絃立羽位以起調㽔賓之律變徴尺字更為林鍾之吕清變徴髙尺字定四絃立宫位以主調而黄鍾之律宫聲上字所定之二絃七絃上為大吕之吕清宫髙五字蕤賓之律變徴尺字所定之四絃上為林鍾之吕清變徴髙尺字夷則之律徴聲工字所定之五絃上為南吕之吕清徴髙工字其黄鍾之律宫聲四字所應則當變徴之分蕤賓之律變徴尺字所應則當變宫之分而不用此調之五正聲内三聲雜入陰吕而二變反得陽律之聲字焉變徴調則獨𦂳五絃管律半音其餘六絃散聲仍得本律之聲字盖以蕤賓之律變徴尺字所定之四絃立羽位以起調夷則之律徴聲工字更為南吕之吕清徴髙工字定五絃立宫位以主調其太蔟之律商聲乙字所應則當變徴之分夷則之律徴聲工字所應則當變宫之分而不用此調之五正聲内獨宫聲一聲雜入陰吕而二變亦得陽律之聲字焉徴調則獨慢三絃管律一音其餘六絃散聲仍得本律之聲字盖以夷則之律徴聲工字所定之五絃立羽位以起調沽洗之律角聲上字更為太蔟之律商聲乙字定三絃立宫位以主調其姑洗之律角聲上字更為仲吕之吕清角髙上字當變徴之分無射之律羽聲凡字所應則當變宫之分而不用此調五正聲分皆應陽律而二變内變宫分亦應陽律獨變徴分雜入陰吕之聲字焉羽調則二絃五絃七絃不更其散聲仍得本律之聲字而一絃三絃六絃俱慢下管律一音四絃則慢下管律半音盖以倍夷則之律羽聲凡字即正無射之聲字定一絃六絃立羽位以起調黄鍾之律宫聲四字所定之二絃立宫位以主調而倍無射之律變宫合字所定之一絃六絃下為倍夷則之律羽聲凡字姑洗之律角聲上字所定之三絃下為太蔟之律商聲乙字蕤賓之律變徴尺字所定之四絃下為仲吕之吕清角髙上字其倍無射之律變宫合字更為倍應鍾之吕清變宫髙六字當變宫之分蕤賓之律變徴尺字更為林鍾之吕清變徴髙尺字當變徴之分而不用此調五正聲内一聲雜入陰吕而二變亦雜入陰吕之聲字焉變宫調則一絃三絃四絃六絃不更其散聲仍得本律之聲字而二絃五絃七絃俱𦂳上管律半音盖以倍無射之律變宫合字所定之一絃立羽位以起調黄鍾之律宫聲四字更為大吕之吕清宫髙五字定二絃七絃立宫位以主調而夷則之律徴聲工字所定之五絃上為南吕之吕清徴髙工字其黄鍾之律宫聲四字所應則當變宫之分夷則之律徴聲上字所應則當變徴之分而不用此調之五正聲内二聲雜入陰吕而二變反得陽律之聲字焉清聲七調亦皆以清宫一調為凖其旋宫轉調一如濁聲七調若夫各絃之五聲二變之分何以取之則以各絃總度為率其各絃之全度與各絃内五聲二變位分之比即如五聲二變之各分與五聲二變毎全分内之各分之比也總之以七聲互相應和為凖若非二變之聲字以紀五聲之正位烏能辨絃音旋宫轉調之理也哉今以清濁二均一十四調更絃之法詳列為表以為調琴之大規焉宫調徴一絃定倍無射之律變宫合字得下徵之分羽二絃定黄鍾之律宫聲四字得下羽之分應太蔟之律商聲乙字為變宫之分宫三絃定姑洗之律角聲上字得宫絃之分商四絃定蕤賓之律變