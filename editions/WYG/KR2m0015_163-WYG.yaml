多既取聲于兩均復於各均内合兩絃以取聲者何也葢律吕管音之生聲低吹則得柔音髙吹則得剛音然則雖分剛柔於一管而不能并聲字於一音故黄鍾之律低吹之為濁音宫聲低工字而髙吹之則亦宫聲而音微剛初不可謂之髙工字也大吕之吕低吹之即為清宫髙工字比之黄鍾髙吹之聲字則有上下之分若以此大吕之吕髙吹之則益髙而幾於低凡字矣是以黄鍾大吕雖同為宫聲而分清濁雖同為工字而分髙低其髙吹低吹之間又分而為二實有四音之用然則絃之一聲烏能變通之以隨此四音哉故設二十五絃立為二均仍於一均之内取髙低二音於全半長短之間乃得合律吕聲調而備於用焉旋宫轉調改絃移柱之法總以二絃主調三絃立宫其二變之聲字按其清濁定於各均之内避其聲而不用則一轉移間而自生生於無窮矣律吕正義後編曰瑟前廣後狹面圓底平中髙首尾俱下底孔二前孔四瓣當前梁之内徑四寸三分七釐四毫後孔上圓下平當後梁之外長徑與前孔等下濶五寸一分零三毫前孔中心距前梁内際後孔下周距尾牙内際皆三寸六分四釐五毫前後梁之外各穿二十五孔以受絃絃首結於瑟體之中絃尾從梁底孔出而環綰於後梁之上通體桐木黒漆身繪雲龍首尾繪綿邊繪雲梁用紫檀絃孔用螺蚌為飾以漆金架二承之架髙二尺五寸九分二釐濶一尺四寸四分一釐八毫雲頭髙三寸三分二釐一毫濶一寸六分二釐瑟與琴並稱作自皇古今考其制則二十五絃由來舊矣秦漢以後傳聞異辭自宋及明瑟皆二十五絃未有異説律吕正義謂琴無大小絃皆七瑟無大小絃皆二十五尤為得之至謂三等之瑟皆長九尺大者以黄鍾為尺中者以太蔟為尺小者以姑洗為尺則未免為臆説矣後世郊廟朝廷惟用大瑟而律度又復失傳其制過大義亦無取今定瑟制古尺之度通長八尺一寸前梁至尾七尺二寸絃長五尺四寸一器而三義備焉若其髙廣厚薄則雖稱式按律為之數度至於二十五絃之旋宫轉調則自古無言之者前編特以外十二絃為陽均應陽律内十二絃為陰均應陰吕各以一絃為下徴二絃為下羽三絃為宫四絃為商五絃為角六絃為徴七絃為羽八絃為清宫九絃為清商十絃為清角十一絃為清徴十二絃為清羽凡合樂則一與六二與七三與八四與九五與十六與十一七與十二並鼓之既陰陽之不淆又中清之協應内外同聲而分清濁五音順序而有等倫可謂酙酌古今貫通條理矣旋宫改絃之法前編以二絃起調為主故黄鍾調則以黄鍾之律定二絃今以三絃立宫為主故黄鍾宫則以黄鍾之律定三絃宫與調雖不同而旋轉之理則一也列表如左黄鍾宫倍夷則起調一絃下徴定倍㽔賓之律夷射簫乙笛工二絃下羽定倍夷則之律簫上笛凡三絃宫定黄鍾之律簫工笛四四絃商定太蔟之律簫凡笛乙五絃角定姑洗之律簫六笛上六絃徴定夷則之律簫乙笛工七絃羽定無射之律簫工笛凡八絃宫定黄鍾之律簫工笛五九絃商定太蔟之律簫凡笛乙十絃角定姑洗之律簫六笛上十一絃徴定夷則之律簫乙笛工十二絃羽定無射之律簫上笛凡大吕宫倍南吕起調一絃下徴定倍林鍾之吕南吕簫亿笛仜二絃下羽定倍南吕之吕簫仩笛􅚁三絃宫定大吕之吕簫仜笛伵四絃商定夾鍾之吕簫􅚁笛亿五絃角定仲吕之吕簫􅤪笛仩六絃徴定南吕之吕簫亿笛仜七絃羽定應鍾之吕簫仩笛􅚁八絃宫定大吕之吕簫仜笛伍九絃商定夾鍾之吕簫􅚁笛亿十絃角定仲吕之吕簫􅤪笛仩十一絃徴定南吕之吕簫亿笛仜十二絃羽定應鍾之吕簫仩笛􅚁太蔟宫倍無射起調一絃下徴定倍無則之律簫上笛凡二絃下羽定倍無射之律簫尺笛合三絃宫定太蔟之律簫凡笛乙四絃商定姑洗之律簫六笛上五絃角定㽔賓之律簫五笛尺六絃徴定無射之律簫上笛凡七絃羽定倍無射之律簫尺笛六八絃宫定太蔟之律簫凡笛乙九絃商定姑洗之律簫六笛上十絃角定㽔賓之律簫五笛尺十一絃徴定無射之律簫上笛凡十二絃羽定倍無射之律簫尺笛六夾鍾宫倍應鍾起調一絃下徴定倍南吕之吕簫仩笛􅚁二絃下羽定倍應鍾之吕簫伬笛􅤪三絃宫定夾鍾之吕簫􅚁笛亿四絃商定仲吕之吕簫􅤪笛仩五絃角定林鍾之吕簫伍笛伬六絃徴定應鍾之吕簫仩笛􅚁七絃羽定倍應鍾之吕簫伬笛􅤪八絃宫定夾鍾之吕簫􅚁笛亿九絃商定仲吕之吕簫􅤪笛仩十絃角定林鍾之吕簫伍笛伬十一絃徴定應鍾之吕簫仩笛􅚁十二絃羽定倍應鍾之吕簫伬笛􅤪姑洗宫黄鍾起調一絃下徴定倍無射之律簫尺笛合二絃上羽定黄鍾之律簫工笛四三絃宫定姑洗之律簫六笛上四絃商定㽔賓之律簫五笛尺五絃角定夷則之律簫乙笛工六絃徴定倍無射之律簫尺笛六七絃羽定黄鍾之律簫工笛五八絃宫定姑洗之律簫六笛上九絃商定蕤賓之律簫五笛尺十絃角定夷則之律簫乙笛工十一絃徴定倍無則之律簫尺笛六十二絃羽定黄鍾之律簫工笛五仲吕宫大吕起調一絃下徴定倍應鍾之吕簫伬笛佮二絃下羽定大吕之吕簫仩笛伵三絃宫定仲吕之吕簫􅤪笛仩四絃商定林鍾之吕簫伍笛伬五絃角定南吕之吕簫亿笛仜六絃徴定倍應鍾之吕簫伬笛􅤪七絃羽定大吕之吕簫仜笛伍八絃宫定仲吕之吕簫􅤪笛仩九絃商定林鍾之吕簫伍笛伬十絃角定南吕之吕簫亿笛仜十一絃徴定倍應鍾之吕簫伬笛􅤪十二絃羽定大吕之吕簫仜笛伍蕤賓宫太蔟起調一絃下徴定黄鍾之律簫工笛四二絃下羽定太蔟之律簫凡笛乙三絃宫定蕤賓之律簫五笛尺四絃商定夷則之律簫乙笛工五絃角定無射之律簫工笛凡六絃徴定黄鍾之律簫工笛四七絃羽定太蔟之律簫凡笛乙八絃宫定蕤賓之律簫五笛尺九絃商定夷則之律簫乙笛工十