body:
  text: 欽定四庫全書皇朝文獻通考卷七十學校考八直省鄉黨之學二康熙六十一年十一月世宗憲皇帝御極恩詔各直省入學額數大學加七名中學加五名小學加三名不為例恩詔各府州縣衛各舉孝廉方正暫賜六品頂帯以備召用雍正元年諭曰朕纘承大統遵守舊章寤寐求賢惟恐或失念學校為士子進身之階督學一官尤人倫風化所繫遴選各省學臣倍加鄭重爾等須廉潔持身精勤集事實行文風兩者所當並重若徒事文華而不敦崇實行未為盡職也衡文以理明學正典雅醇潔為主古人云言乃心聲氣由夙養必士品端而後文風正他日為國家柱石為廊廟羽儀不綦重歟勿私納苞苴勿瞻狥情面勿輕視武途勿濫取祠廕勿矯激沽名勿昏庸廢事勿卑汚貶節勿驕暴凌人胥吏必謹闗防幕客尤宜選擇如此則内外交毖本末兼修上不負朝廷下不愧多士朕耳目所及必有見聞若罔顧聲名廉隅不飭國有常憲罰必隨之尚其勉旃毋忽又諭吏部各省教官專司訓迪士子今捐納教官人員有不諳文藝之人不可為年長學優者之師應照伊所捐品級别任補用該部議奏尋議各省教職俱以舉人恩㧞副榜廩生挨貢補用其捐納人員教諭改以縣丞用訓導以主簿用從之申明旌表孝義貞節之典上以旌表孝義貞節之典直省大吏視為具文並未廣諮逺訪祗慿郡縣監司申詳即為題請建坊而山村僻壤貧寒耕織之人幽光湮鬱潜徳銷沉者不可勝數特諭禮部即行𫝊諭督撫學政嗣後務令各屬加意搜羅虛公核詢確具本人鄉評真蹟題奏旌奬勿以匹夫匹婦輕為阻抑勿以富家巨族濫為表揚以副成俗化民實心彰善至意至三年又勅直省督撫提鎮學臣查明營伍中合例節婦移明教官申報州縣詳請旌表定為例又命各省改生祠書院為義學延師授徒以廣文教如實係名宦去任之後百姓追思建造者准其存留餘俱著地方官查明改為義學定科試生員増用經文之例舊例四書題文二篇至是禮部議准御史田嘉榖奏請増用經文一篇如遇三冬日短減去四書文一篇設立廣西太平土州學額取文武童生各四名以養利州訓導一員移駐土屬就近教督至十年定廪増額各四名升山西平遥縣中學為大學額取童生十五名定各州縣設立社學義學之例舊例各州縣於大鄉鉅鎮各置社學凡近鄉子弟年十二以上二十以下有志學文者令入學肄業至是復經申定將學生姓名造冊申報學正按臨時如有能文入學者社師優賞若怠於教習鑽營充補者禠革至三年議准雲南威逺地方五年議准雲南東川土人八年議准四川建昌番夷湖南永綏六里等處並建立義學選延塾師先令熟番子弟來學日與漢童相處宣講聖諭廣訓俟熟習後再令誦習詩書以六年為期如果教導有成塾師准作貢生三年無成該生發回别擇文行兼優之士應需經書日用令該督撫照例辦給俟熟畨學業有成令往教誨生番子弟再俟熟習通曉之後准其報名應試二年頒發聖諭廣訓并御製序文於直省學宫命改直省小學為中學中學為大學上諭曰邇年文教廣被由我聖祖仁皇帝夀考作人山陬海澨莫不讀書稽古直省應試童子人多額少有垂老不獲一衿者其令督撫學臣查明實在人文最盛之州縣題請小學為中學中學為大學大學照府學額数取録督撫等務宜秉公詳查不得狥私冒濫尋禮部等衙門遵㫖查核題准直𨽻順天府大興宛平一學實分三學今照三大學例俱加七名各取進二十五名文安通州寶坻豐潤蠡縣髙陽河間任邱景州冀州定州南宫棗强清豐滑縣東明開州長垣等十八州縣向係大學今照府學額各取進二十五名薊州盧龍遷安昌黎樂亭博野祁州安州新安獻縣阜城静海寧津天津衛萬全蔚縣衡水安平雞澤成安清河魏縣南樂内黄等二十四州縣衛向係中學今改為大學取進各十八名香河順義深澤青縣西寧靈夀行唐贊皇新河髙邑無極新樂曲陽廣宗唐山内邱等十六縣向係小學今改為中學取進各十五名江南蘇松等屬之上元江寧句容溧陽太倉長洲吳縣吳江常熟崑山嘉定華亭婁縣上海青浦武進無錫江隂宜興丹徒丹陽金壇邳州山陽鹽城髙郵通州泰州江都儀徴泰興興化等三十二州縣向係大學今照府學額各取進二十五名溧水髙淳崇明海州清河桃源安東宿遷睢寧沭陽寶應如臯等十二州縣并金山一衛向係中學今改為大學各取進二十名江浦六合贑榆等三縣向係小學今改為中學各取進十六名其海門鄉向係海門縣後裁併通州另取六名今准其増額四名安徽所屬之懐寧桐城宣城涇縣鳯陽廣徳等六州縣向係大學今照府學額各取進二十五名潜山太湖宿松黟縣寧國旌徳太平貴池青陽建徳當塗蕪湖無為六安泗州合肥宿州亳州含山建平等二十州縣向係中學今改為大學各取進二十名望江東流繁昌舒城廬江臨淮定逺䝉城懐逺等九縣向係小學今改為中學各取進十六名江西之南昌新建豐城髙安宜春清江廬陵吉水安福臨川金谿南城新城上饒鄱陽贑縣寧都等十七縣向係大學今照府學額各取進二十名奉新永新宜黄東鄉南豐廣昌貴溪餘干星子都昌建昌徳化湖口大庾等十四縣向係中學今改為大學各取進十五名萍鄉峽江玉山安仁安義瑞昌南康石城等八縣向係小學今改為中學各取進十二名浙江之仁和錢塘海寧嘉興秀水嘉善海鹽平湖烏程歸安徳清鄞縣慈谿山隂㑹稽諸暨餘姚臨海金華蘭谿西安建徳淳安永嘉麗水等二十五縣向係大學今照府學額各取進二十五名奉化新昌嵊縣天台永康常山瑞安平陽等八縣向係中學今改為大學各取進二十名於潜昌化湯溪江山等四縣向係小學今改為中學各取進十六名又定海縣向止額取十一名今改為小學取進十二名福建之閩縣侯官長樂福清莆田仙逰晉江南安恵安同安安溪龍溪漳浦海澄南靖平和南平建安甌寧建陽崇安邵武長汀上杭永定福寧等二十六州縣向係大學今照府學額各取進二十名連江福安二縣向係中學今改為大學各取進十五名永春徳化尤溪向係小學今改為中學各取進十二名湖北之江夏武昌興國黄岡蘄水黄梅黄陂京山天門沔陽孝感江陵公安石首監利襄陽等十六州縣向係大學今照府學額各取進二十名大冶雲夢二縣向係中學今改為大學各取進十五名應山縣原係小學今改為中學取進十二名湖南之長沙善化湘潭茶陵攸縣益陽衡陽衡山耒陽零陵祁陽邵陽武岡新化巴陵華容澧州武陵桃源㑹同郴州靖州等二十二州縣向係大學今照府學額各取進二十名湘鄉寧鄉常寧安鄉溆浦永興桂陽等七縣向係中學今改為大學各取進十五名辰溪向係小學今改為中學取進十二名山東之厯城章邱泰安萊蕪徳州武定濱州滋陽滕縣濟寧魚臺單縣曹州曹縣東平沂州四氏學桞城髙唐濮州益都夀光安邱諸城掖縣膠州蓬萊萊陽等二十八州縣向係大學今照府學額各取進二十名新城濟陽長清陽信海豐樂陵商河利津霑化寧陽鄒縣武城定陶鉅野鄆城汶上東阿陽榖堂邑茌平館陶臨淄昌樂莒州日照髙密即墨棲霞寧海文登等三十州縣向係中學今改為大學各取進十五名嶧縣費縣觀城髙苑䝉隂等五縣向係小學今改為中學各取進十二名山西之陽曲榆次文水臨汾洪洞曲沃翼城聞喜汾陽介休忻州代州長治蒲州臨晉猗氏解州安邑澤州髙平陽城綘州太平襄陵等二十四州縣向係大學今照府學額各取進二十名綘縣臨縣大同蔚州朔州遼州平定盂縣崞縣夏縣沁州稷山等十二州縣向係中學今改為大學各取進十五名黎城壺闗繁峙保徳興縣吉州隰州等七州縣向係小學今改為中學各取進十二名又太原平陽二府府學向係所屬州縣内撥取今太原府分設直𨽻諸州屬府轄者止存十一州縣平陽府分設直𨽻諸州屬府轄者亦止存十一州縣令學臣將府學二十名即於府屬各州縣撥入其蒲州等十二州縣除聞喜縣已屬平陽府撥入府學外其餘十一州縣照舊例聽往運學考試河南之祥符杞縣太康陳州商邱永城鹿邑睢州安陽河内洛陽等十一州縣向係大學今照府學額各取進二十名陳留通許中牟西華臨漳濟源武陟孟縣温縣偃師􅂕保等十一縣向係中學今改為大學各取進十五名滎陽原係中學後改小學今准復為中學取進十二名原武長葛臨頴三縣向係小學今改為中學各取進十二名陕西之蒲城縣及寧夏等衛向係大學今照府學額各取二十名咸陽同州乾州武功鄠縣興平膚施洛川清澗寶雞城固興安涇州安化㑹寧文縣伏羌秦安等十八州縣向係中學今改為大學各取進十五名三水商州安平葭州汧陽沔縣鎮原盛寧禮縣等九州縣向係小學今改為中學各取進十二名華隂縣向係中學今潼闗衛裁去衛籍併入華隂縣准照府學額取進二十名鳯翔慶陽二府學向止十五名今俱准如府學定例各取進二十名鎮番衛向係小學今改為大學取進十五名平凉府向係中學有平凉衛籍八名附入府學今衛籍雖裁仍准如府學定例取進二十名凉州衛向係中學今改為大學取進十五名古浪所向取童生八名附入凉學凉學廪増舊止二十名今増古浪所八名准加廪増各十名其出貢舊照縣學例兩年一貢今照州學例三年兩貢四川之成都崇慶簡州閬中南部遵義睂州卭州雅州瀘州等十州縣向係中學今改為大學各取進十五名嘉定州向係大學今照府學額取進二十名溫江新繁新津郫縣巴縣江津南充宜賓富順奉節綏陽洪雅遂寧等十三州縣向係小學今改為中學各取進十二名廣東之南海番禺東莞順徳新㑹香山海豐海陽潮陽揭陽澄海等十一縣向係大學今照府學額各取進二十名三水増城保昌英徳興寧長樂龍川程鄉饒平儋州等十州縣向係中學今改為大學各取進十五名新寧初平永安大埔惠来平逺鎮平開平吳川東安西寧等十一縣向係小學今改為中學各取進十二名廣西之臨桂全州蒼梧鬰林懐集宣化横州新寧賔州上林等十州縣向係大學今照府學額各取進二十名􅂕川興安灌陽桂平貴縣隆安永淳武縁等八縣向係中學今改為大學各取進十五名南平向係小學今改為中學取進十二名雲南之昆明安寧晉寧宜良南寧尋甸建水石屏通海河西河陽新興太和趙州鄧川浪穹劍川保山騰越楚雄等二十州縣向係大學今照府學額各取進二十名呈貢陸凉霑益寧州阿迷蒙自雲南賔川等八州縣向係中學今改為大學各取進十五名和曲州向係小學今改為中學取進十二名再准該撫所請將黒白琅三井於州縣外另為設學俱照小學各取進八名貴州之貴陽威寧二府學向各止取十五名鎮逺府學向止十六名今俱准如黔省府學定例各取進二十名貴筑縣向係大學今照府學額取進二十名畢節縣向係中學今改為大學取進十五名貴定清鎮普定甕安安化等五縣向係小學今改為中學各取進十二名至三年并諭兵部令督撫㑹同學臣查明陕西技勇最優之州酌量數目奏請増加武童入學額數詳見三年分設陕下西寧夏等府學條頒發御製平定青海碑文於學宫詳見太學門禁貴州儒童寄籍冐考之弊凡同省異府同府異縣者不得濫行收考令各省學臣嚴核生監優劣凡各省生員優劣令學臣將舉黜之數於任滿日造冊送部至各省捐納貢監亦歸學臣約束嵗終将優劣造冊送部増八旗滿洲䝉古漢軍廩膳増廣生員額滿洲蒙古各四十名漢軍各二十名從順天學政呉襄請也互見旗學門増定盛京入學額數奉天錦州二府學各増五名滿字號増一