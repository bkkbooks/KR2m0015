body:
  text: 經籍考二十八集總集練音集補七卷國朝練音集十二卷王輔銘編輔銘字翊思嘉定人臣等謹按明翟校以嘉定代有作者而詩篇多㪚逸遂采宋天聖以迄明𢎞治合為一編嘉定本古之練祁市因名曰練音集後板燬於倭僅存鈔本輔銘以其遺闕尚多重加采補又選國朝詩人之作另為一集云金華文畧二十卷王崇炳編崇炳見史類例畧曰是書取金華文徴十之五金華文統十之二而益以他書十之三又曰文統之例凡論及兵機政術及為釋氏而作者不録毛竒齡序曰金華自顔烏許孜以後多忠孝節烈之士而各有文章在唐則駱丞最著而舒侍郎與馮節度繼之顧専以詩名至宋元迄今則道學如吕伯恭史學如陳同甫以及元之金許明之王宋輝煌彪炳指不勝屈然金文未易輯而從前若文統文憲文徴婺書類又多所闕軼崇炳起而選之又得唐中含為之校録云尺牘新語二十四卷徐士俊汪淇同編士俊字野君錢塘人淇見子類蕉雨軒詩餘彚選八卷陳澍選澍字雨夏嘉興人嵗貢生東白堂詞選初集十五卷佟世南編世南字梅岑遼陽人名家詞鈔無卷數聶先編先字晉人廬陵人林下詞選十四卷周銘選銘字勒山松江人説唐詩二十二卷徐增撰增字子能長洲人百名家詩選八十九卷魏憲編憲字惟度福凊人皇清詩選三十卷孫鋐編鋐字思九江南華亭人例畧曰論詩者必規摹初盛誠類優孟衣冠然使挾其佻巧之姿曼音促節以為得中晚之秘則風斯下矣又曰數年以來又家南山而户劍南矣在彼天真爛漫畦徑都絶此誠詩家上乗倘不衫不履面目頽唐或大袖方袍迂濶可厭輒欲奪宋人之席㡬何不見絶於七子耶國雅初集無卷數陳允衡編允衡見史類宋詩刪二十五卷顧貞觀編貞觀字華封無錫人由監生考授秘書院中書中康熙丙午舉人遷典籍厯朝賦格十五卷陸葇編葇字義山平湖人康熙丁未進士授内閣典籍己未召試博學鴻詞改翰林院編修官至内閣學士兼禮部侍郎續垂棘編三集十卷四集九卷范鄗鼎編鄗鼎見史類臣等謹按鄗鼎父芸茂嘗選輯山西之文二十卷題曰晉國垂棘鄗鼎因依例彚輯其鄉近人之文以續之前後共為四集今僅存者惟三四兩集焉傳是樓宋人小集無卷數不著編輯者名氏戴范雲跋曰是崑山徐氏所輯故仍題之曰傳是樓宋人小集榕村講授三卷古文精藻二卷李光地編光地見經類羣雅集十二卷李振裕編振裕見别集類瑞竹亭合稿四卷王愈擴及其弟愈融撰愈擴字若先泰和人康熙庚戍進士愈融字侣新諸生全唐詩録一百卷徐倬編倬見别集類聖祖仁皇帝御製序曰在昔詩教之興本性情之微導中和之㫖所以感人心而美謡俗被金石而格神祈故大舜以教胄子樂正以造俊秀葢自二帝三王之世固己然矣文武成康之際王澤洽頌聲作洋洋乎洵足以繼薰風之操並卿雲之奏也自時厥後作者彌繁孔子從而刪定之使六義彰明一經燦列録其忠厚悱惻之辭以寓諷諭戒勉之意天道人事胥於是乎具焉漢魏以還尤多新製體例雖更前徽未邈至陳隋之末稍凌替矣唐之太宗致治㡬於三代之隆躬自撰著一時文人才士將相名臣咏吟遞發藻采繽紛踵襲雅騷之迹光昭正始之音而歌行律絶獨創兼能自遐古以來未嘗有也爰及盛唐逮乎中晚或與運㑹為髙下而凡縁時託志觸物攄懷形諸翰簡者皆卓然成一家之言弗可廢也朕萬㡬餘閒迴環覽詠尋其指歸晰其正變而三百年升降得失之故亦因可以考焉於是論世觀人即其章句攬其菁英勒為成書置諸几席毎勤披閲加以精研迄於今已厯有年所矣頃以視河南巡至於江浙見比閭士庻有吹豳擊壤之風獻詩頌者絡繹於途雖其工拙淺深各極其不齊之致而衢謳巷舞儼然省方之所採列國之所陳亦可見人情之愛戴而先王以詩為教之義濡染而蒸陶之者所闗甚鉅也翰林侍讀徐倬以全唐詩録進展卷而讀之與朕平時品第者葢有合焉嘉其髦年好學遷秩禮部侍郎以為天下學者之勸乃取兹集親為鑒定賜以帑金即命校刋俾誦習者由全唐之詩沿波討瀾以上溯夫汾泗之傳而游泳乎唐虞載賡之盛其於化理人心將大有禆益也矣是為序以弁其端云臣等謹按康熙丙戍聖祖仁皇帝南巡倬繕録此編進呈御覽得㫖嘉奬由侍讀特擢禮部侍郎併為御製序文賜帑刋板儒臣榮遇實為千古所莫及至今傳為盛事其書較御製全唐詩先一年成故編次頗有不合云洛如詩鈔六卷明詩綜一百卷詞綜三十卷朱彛尊編彛尊見史類彛尊自序明詩綜曰合洪武及崇禎詩甄綜之上自帝后近而宫壼宗潢逺而蕃服旁及婦寺僧尼道流幽索之鬼神下徴諸謡諺入選者三千四百家或因詩而存其人或因人而存其詩間綴以詩話述其本事期不失作者之㫖汪森序詞綜曰彛尊輯唐以來迄元人所為詞凡一十八卷後彛尊北遊南至白下逾三年歸廣為二十六卷而森亦往來苕霅間從故藏書家鈔白諸集相對㕘論復益以四卷凡三十卷計覽宋元詞集一百七十家傳記小説地志共三百餘家厯嵗八稔然後成書庻㡬一洗草堂之陋而倚聲者知所宗矣漢詩音注五卷漢詩評五卷李因篤撰因篤見詩集類詩觀十四卷别集二卷鄧漢儀編漢儀字孝威泰州人康熙己未召試博學鴻詞以年老授中書舎人浙西六家詞十卷不著編輯者名氏朱子論定文鈔二十卷呉震方編震方見經類粤西詩載二十五卷粤西文載七十五卷粤西叢載三十卷汪森編森字晉賢桐鄉人休寜籍官桂林府通判鳳池集無卷數沈玉亮呉陳琰同編玉亮字瑶岑武康人陳琰見經類續三體唐詩八卷唐詩掞藻八卷髙士竒編士竒見經類楚風補五十卷廖元度編元度字大隠長沙人四家詩鈔二十八卷王企靖編企靖字苾逺雄縣人康熙乙丑進士官至江西巡撫臣等謹按是編為清苑郭棻集六卷鉅鹿楊思聖集八卷任邱龎塏集六卷文安紀炅集八卷每集各為之序濓洛風雅九卷張伯行編伯行見史類厯朝賦楷八卷王修玉編修玉字倩修錢塘人檇李詩繫四十二卷沈季友撰季友見詩集類朱彛尊序曰往者蔣之翹輯檇李詩乗其卷帙之富什倍朱翰英華當從雁川訪求之其身甫殁而遺稿已化為蛛絲蟫粉他若劉常武原集徐贊宸之海谷遺風一時轉相鈔撮流布未廣洊經嵗月亦㡬㡬有失傳之患季友辭世已十有餘年同里金南瑛校而刻之庶㡬其傳可永矣于野集七卷王原編原號西亭青浦人康熙戊辰進士官至給事中唐宋十大家全集錄五十一卷儲欣編欣見經類欣自序曰即茅坤唐宋八家文鈔所評論以窺其所用心大抵為經義計耳予欲破學者抱匱守殘之見所録加倍焉至増入習之可之似屬創見然大家豈有定數可以八即可以十臣等謹按欣論茅坤之説良是然亦不離乎經義之計伏讀御製唐宋文醇序文嘉欣用意之美而惜其學識之未當所去取亦與茅坤等聖諭持平欣亦何能置一辭矣松風餘韻五十一卷姚宏緒編宏緒號聴巖婁縣人康熙辛未進士官翰林院編修例畧曰是選七百餘家始張翰終葉有聲附以閨秀方外詩以姓叙姓以韻分有風雅萃於一門者即按世次列之又曰集内有鄙俚可笑者以采得不忍復逸存詩所以存其人也臣等謹按是編専采松江詩人各系以小傳意在博收故别擇未能精審焉述本堂詩集十八卷方登嶧式濟觀承撰登嶧字鳬宗號屏坧桐城人康熙甲戌貢生官工部主事坐事謫黒龍江卜魁塞式濟登嶧子見史類觀承登嶧孫見詩集類唐四家詩八卷汪立名編立名見經類立名自序曰唐王孟韋栁四家為宋元人鼻祖學宋元詩者當仍於唐詩求之故以此矯其弊云八劉唐人詩集八卷劉青夕選青夕名未詳淮安人唐詩叩彈集十二卷續集三卷杜詔杜庭珠同編詔見詩集類庭珠秀水人古文雅正十四卷蔡世逺編世逺見别集類世逺自序曰康熙乙未嵗自京師回閩家居數載評選厯代古文自漢至元約二百三十餘首雍正元年入京與同志李立侯張季長參論考訂又是正之髙安朱軾迨季長作令長洲取以授梓因為序之曰是選也採之各家文集者若干篇採之二十一史者若干篇若文選文苑英華唐文粹宋文鑑元文類以及厯代名臣奏議偶有所喜則登之文雖佳非有闗於修身經世之大者不録也言雖切而體裁不美備則賢哲格言不能盡載也其事則可法可傳其文則可歌可誦然後録之不及三傳檀弓者檀弓經也三傳雖傳經也不及戰國策者多機智害道也嗚呼虗車之飾與犬羊之鞟交譏也不加體察躬行之功徒誇閎博雕鏤之用先儒之所羞稱言不能以足志文不能以行逺亦大雅之所弗尚也措之為君臣父子夫婦昆弟朋友之倫發之有經國大業不朽盛事之美言為心聲詞尚體要斯集之所由選乎名之曰雅正者其詞雅其理正也臣等謹按是集以理為根柢以詞為羽翼而語錄之體浮艷之詞概從刪汰良由世逺䆳於學問深明文章正變之繇故所選錄傳誦藝林洵足為古文家正則也明文逺無卷數徐文駒編文駒見别集類尺牘嚶鳴集十二卷王相編相字晉升臨川人絶妙好詞箋七卷查為仁厲鶚同撰為仁字心榖號蓮坡宛平人康熙辛夘舉人鶚見史類鶚自序曰絶妙好詞七卷南宋周蜜所輯多紹興迄徳祐間人自二三鉅公外姓氏多不著為仁躭玩倚聲披閲之下隨筆劄記輯有詩餘紀事如干篇於是編特為之箋不特諸人里居出處十得八九而詞中之本事詞外之軼事俱攟拾無遺焉元詩選一百一十一卷顧嗣立編嗣立見詩集類文章鼻祖六卷楊繩武編繩武字文叔長洲人康熙乙未進士官翰林院編修鄱陽五家集十五卷史簡編簡字文令鄱陽人臣等謹按是編輯自宋末至明初其鄉人中黎廷瑞呉存徐瑞葉蘭劉炳五家之詩南宋雜事詩七卷沈嘉轍呉焯陳芝光符曾趙昱厲鶚趙信等同撰嘉轍字欒城焯字尺鳬曽字幼魯由薦舉官至户部郎中皆錢塘人鶚見史類芝光字蔚九昱字功千信字意林皆仁和人二家詩鈔二十卷邵長蘅編長蘅見别集類臣等謹按是編専選王士禎宋犖之詩然犖詩實遜於士禎故論者頗以並選為未協棣華書屋近刻四卷朱湘朱絳朱綱撰湘綱俱見詩集類絳字子桓由貢生官至廣東布政使誠求堂彚編六卷徐開錫撰開錫字定山常山人康熙中貢生官至彰徳同知明文在一百卷薛熙編熙見子類漢詩説十卷費錫璜沈用濟同編錫璜字滋衡呉江人用濟字方舟錢塘人嶺南五朝詩選二十五卷黄登編登字俊升號積菴番禺人臣等謹按是編前二十卷為第一帙皆載詩之為粤東作者後十五卷為第二帙皆粤東人詩其第一帙謂之名宦然如杜審言宋之問沈佺期輩其事具著唐書登以名宦稱之謬矣義門鄭氏奕葉吟集七卷義門鄭氏奕葉集十卷鄭爾垣編爾垣字一樞浦江人臣等謹按是集乃輯其先世詩文都為二編上編係詩七卷下編則遺文十五種鄭氏自宋建炎至明初同爨者十三世故稱義門宋十五家詩十六卷陳訏編訏見經類臣等謹按十五家者梅堯臣歐陽修曾鞏王安石蘇軾蘇轍黄庭堅范成大陸游楊萬里王十朋朱子髙翥方岳文天祥也每集各繫小傳及前人詩話而以已所評論附焉篤叙堂詩集五卷許豸許友許遇許鼎許均許藎臣許良臣等撰豸字玉史侯官人崇禎辛未進士官至浙江提學副使友字介有號甌香豸子遇字不棄號月溪友子官陳留長洲二縣知縣鼎號梅崖均號雪邨皆遇子藎臣號秋泉良臣號石泉皆鼎子續姚江逸詩十二卷倪紀宗編紀宗字漫野餘姚人官遂安訓導韜光菴紀遊集無卷數釋山止編山止西湖韜光菴僧興善寺厯代名賢留題集二卷釋浄溥編倪城風雅二卷勞巁編巁見詩集類渠風集畧七卷馬長淑編長淑字漢荀安邱人雍正庚戌進士官至磁州知州臣等謹按安邱古渠邱地故名曰渠風長淑因其里人張貞欲輯同邑諸人詩而未就乃踵成之七十二峯足徴集一百一卷呉定璋編定璋字友篁呉縣人選詩定論十八卷呉湛撰湛字伯其號冉渠睢陽人文選音義八卷余蕭客撰蕭客見經類明倫初集五卷續集五卷鄭文炳編文炳字慕斯莆田人長林四世弓冶集五卷林其茂編其茂見詩集類宋百家詩存二十八卷曹庭棟編庭棟見經類廣東詩粹十二卷梁善長編善長字崇一順徳人乾隆己未進士莆風清籟集六十卷鄭王臣編王臣字慎人一字蘭陵莆田人乾隆辛酉拔貢生官至蘭州府知府臣等謹按是集選興化一府自唐以來之詩并綴以自著蘭陔詩話山左明詩鈔三十五卷宋弼編弼字仲良徳州人乾隆乙丑進士官至甘肅按察使豐陽人文紀畧十卷聶芳聲編芳聲字晦之永豐人南園後五子詩集二十八卷陳文藻等編氏籍未詳臣等謹按南園在廣州城東南大忠祠側即抗風軒明初孫蕡趙介李徳黄哲王佐唱酬於此稱南園五子是編所云後五子者乃明順徳歐大任梁有譽從化黎民表南海呉旦畨禺李時行五人也二南遺音四卷劉紹攽編紹攽見經類崇川詩集十二卷孫翔編翔字吕溪南通州人東皋詩存四十八卷汪之珩編之珩字楚白如皋人臣等謹按是編專輯自宋至今如皋一邑之詩而已作乃多至二百餘首濮川詩鈔三十五卷不著編輯者姓氏閨秀集初編五卷季􅈺編季嫺字靜姎興化女子適李氏磁人詩十卷楊方晃編方晃見史類晚唐詩鈔二十六卷查克宏編克宏海寕人友聲集七卷賴鯤升編鯤升字滄嶠㑹昌人殘本湖陵江氏集五卷江八斗編八斗字四達號鈍夫貴溪人臣等謹按八斗始祖公榮遷居貴溪湖陵其後仕宦頗盛世為湖陵江氏是編乃輯其先世以來詩文也右總集剡源文鈔四卷金石要例一卷黄宗羲撰宗羲見經類宗羲自序金石要例曰潘蒼崖有金石例大段以昌黎為例顧未嘗著為例之義與壊例之始亦有不必例而例之者如上代兄弟宗族姻黨有書有不書不過以著名不著名初無定例故摘其要領稍為辨正所以補蒼崖之缺詩辨坻四卷填詞名解四卷毛先舒撰先舒見經類陸圻序詩辨坻曰楊子之目方言如鼠坻牛場用則實五稼飽邦民不用遂為糞壤抵之於道是書殆取義於此李義山詩注三卷補注一卷朱鶴齡撰鶴齡見經類杜詩説十二卷黄生撰生見經類東坡養生集十二卷王如錫編如錫字武工江寜人歴代詩話八十卷呉景旭撰景旭字旦生歸安人温飛卿集箋注九卷顧予咸補明曾益注子咸字小阮長洲人順治丁亥進士官至吏部考功司員外郎蠖齋詩話二卷施閏章撰閏章見史類漫文説詩一卷宋犖撰犖見史類臣等謹按是編乃其詩話已載入西陂類稿中讀詩堂杜詩註解二十卷張溍撰溍字上若磁州人順治壬辰進士官翰林院庻吉士宋犖序曰杜詩評㸃自劉辰翁始顧劉亦無註元大徳問有高楚芳者又刪存諸註附之向見今千家注本凡分註句下或綴篇下而不著姓氏者悉屬劉評苐刋落圈㸃耳是注能疏千家之蹖駮間亦佽以近代諸名人庻㡬萃諸家之長而擅其勝者然脂集例一卷王士禄撰士禄見史類臣等謹按其弟士禎書年譜後曰先生著書惟然脂集二百三十餘卷條目初就蓋為之未成僅存此例十條也古今閨閣之文選本殊嫌猥雜士禄此例條理差為可考云漁洋詩話三卷王士禎撰士禎見史類圍爐詩話八卷呉喬撰喬字修齡崑山人韓集㸃勘四卷陳景雲撰景雲見史類杜詩論文五十六卷呉見思撰見思字齊賢武進人聲調譜一卷談龍録一卷趙執信撰執信見别集類臣等謹按執信嘗問聲調之法於王士禎士禎靳不與語乃以古詩唐詩互相鉤稽而得之因著為聲調譜一卷法律頗為精密談龍録者因士禎與門人論詩謂當如雲中之龍時露一鱗片爪因作此書以詆其説大㫖謂詩中當有人在不當為縹𣺌無著之語實足救士禎末派之弊也四六金針一卷陳維崧撰維崧見史類詩話八卷詞話二卷毛竒齡撰竒齡見經類臣等謹按竒齡以考據為長詩文非其能事惟填詞之功較深於詩故詩話皆務為高論不得要領詞話深明原委足備倚聲家之談資詞苑叢談十二卷徐釚撰釚字電發號虹亭呉江人康熙己未召試博學鴻詞授翰林院檢討尤侗序曰侗嘗纂明史藝文志其以詩話著者西涯昌穀而下數十家而詞話自升菴之外無聞焉古今詞話久已失傳其軼時見於他説釚向曾續孟棨本事詩今又輯成詞苑叢談一書蓋撮前人之標而搜新剔異更有聞所未聞者夫詩之有話猶史之有傳也詩旣有史詞獨無史乎哉願以傳之海内且為他日藝文志中増一則也江南通志曰釻少刻菊莊樂府朝鮮貢使仇元吉見之以金餅購去貽詩曰中朝攜得菊莊詞讀罷烟霞照海湄北宇風流何處是一聲鐡笛起相思棗林藝簣一卷談遷撰遷見史類杜詩㑹粹二十四卷張逺撰逺字邇可蕭山人由貢生官縉雲縣教諭臣等謹按康熙中有兩張逺其著超然詩集者為侯官人此即朱彛尊曝書亭集内有送之桂林詩者也香山詩鈔二十卷楊大鶴編大鶴字芝田武進人康熙己未進士官至左春坊左諭徳杜詩闡三十三卷盧元昌撰元昌見經類元昌自序曰杜詩有因注而顯者有因注反晦者一晦於訓詁之太雜一晦於講解之太鑿一晦於援引之太繁反是者又為膚淺凡庸之詞曰吾以杜注杜也則太陋李義山文集箋注十卷徐樹穀箋徐炯注樹穀字藝初康熙乙丑進士官至山東道監察御史炯字章仲康熙壬戌進士官至直𨽻巡道皆崑山人例畧曰舊唐書李商隠本傳有表狀集四十卷新書藝文志樊南甲集二十卷乙集二十卷又賦一卷文一卷宋史文集八卷四六甲乙集四十卷别集二十卷㪚佚既多炯乃取文苑英華唐文粹御覽玉海諸書所載合而録之其僻隱未能注者僅二十餘條而箋則樹穀所成參之史傳考證時事焉杜詩詳注二十五卷附編二卷仇兆鼇撰兆鼇字滄柱鄞縣人康熙乙丑進士官至吏部侍郎康熙三十二年兆鼇進表畧曰本年孟夏之月伏䝉皇上諭翰林諸臣所著詩古文章鈔録呈進以備御覽臣謹録三載以來所著杜詩詳注呈進者解杜諸家非不各攄心力意本淺而鑿使深事本近而推使逺引證者泝流而忘源採摭者得此而遺彼從前注解不下百家近日疏箋亦將十種臣惟少陵詩集實堪論世知人可以見開元天寳盛而忽衰之故可以見乾元大厯亂而復治之機兼四始六義以相參知古風近體為皆合愚䝉一得冐逹九重倘邀清暇之鑒觀以當采風之陳獻陶詩箋五卷邱嘉穗撰嘉穗見經類補注東坡編年詩五十卷查慎行撰慎行見經類例畧曰王注譌謬施注亦有未愜今準欒城集按年編次又曽與東坡贈答之文潞國張宣徽文湖州至方外之辨才參寥有專集者悉采其詩附本篇末或有集而不傳傳而不逺如劉景仁錢穆父孫莘老李公擇陳舜俞王仲玉胡完夫蔣頴叔王定國魯元翰王晉卿趙景貺栁子玉周開玉亦偶得一二焉始於康熙癸丑積三十年乃成於人地時事獨詳年表冠之其末二卷則互見他集玉臺新咏箋注十卷庾開府集箋注十卷徐孝穆集箋注六卷呉兆宜撰兆宜字顯令呉江諸生李太白詩集注三十六卷李長吉歌詩彚解五卷王琦撰琦字琢崖錢塘人庾子山集注十六卷倪璠撰璠見史類陶詩彚注四卷呉瞻泰撰瞻泰字東巖歙縣人説詩樂趣二十卷附偶咏草續集一卷伍涵芬撰涵芬見子類文心雕龍輯注十卷黄叔琳撰叔琳見經類栁亭詩話三十卷宋長白撰長白原名俊以字行山隂人原詩四卷葉燮撰燮見史類杜律疏八卷玉臺新咏考異十卷紀容舒撰容舒見經類容舒自序杜律疏曰注杜詩者數十家於作者之意未必一一有當念杜詩為人所習誦者律句為多因取顧宸所觧者㕘以諸家之説逐句詮釋其體蓋近於疏云宋詩紀事一百卷厲鶚撰鶚見史類鶚自序曰宋承五季衰敝後其詩與唐在合離之問而詩人之盛視唐且過之前明諸人剽擬唐人太甚凡遇宋人集概置不問迄今留傳者僅數百家即名公鉅手亦多㪚逸無存江湖林藪之士更無論也鶚以為宋人考本朝尚有未當如胡元任不知鄭文寳仲賢為一人注蘇詩者不知歐陽闢非文忠之族方萬里不知薛道祖非昂之子以至阮閎休所紀三李定王伯厚所紀兩曹輔之類非博稽深訂烏能集事因訪求積卷兼之閲市借人歴二十年之久披覽旣多頗加汰擇計所鈔撮凡三千八百一十二家畧具出處大概綴以評論本事咸著於編其於前宋知人論世之學不為無小補矣臣等謹按鶚裒輯詩話勒為是書仿計敏夫唐詩紀事之例亦以紀事為名而多收無事之詩旁涉無詩之事體裁殊失斷限舛訛處亦復不免然蒐羅賅備實為有宋一代詩話之淵海其用力之勤亦足多矣古今詞話六卷沈雄纂雄字偶僧呉江人古今詞論一卷王又華撰又華字靜齊錢塘人春秋詩話五卷勞孝輿撰孝輿字巨峯一字阮齊南海人官鎮逺縣知縣臣等謹按是編専輯左氏傳之言詩者故曰春秋詩話然於傳文詩義實兩無所取焉鐡立文起二十二卷王之續撰之續字懋功宣城人學稼餘譚三卷不著撰人姓氏前題云櫟社老人輯全閩詩話十二卷五代詩話十卷鄭方坤撰方坤見經類方坤自序五代詩話曰五季兵戈之際風雅衰微談藝至此等諸季札觀樂自鄶無譏已矣然自光化天復以來下逮乾徳建隆之際首尾六七十年中間建國立名號者且以十計短什長吟亦復多如束筍上者引商刻羽次者嘲風弄月以至詞人之賦狎客之篇緇黄淡泊之音金粉纒緜之作莫不有賸句之可採與本事之堪傳彚而核焉亦知人論世之一助也向聞王士禎尚書有五代詩話未經鏤板近始鈔得知為士禎暮年手輯未及成書輒據此為藁本複者芟之舛譌者訂之更抄撮羣言増益其所未備瓣香可接倘亦前賢之所心焉許乎榕城詩話三卷杭世駿撰世駿見經類臣等謹按雍正壬子乙夘二科嘗以鄰省舉人充鄉試同考官故世駿以甲辰舉人得與福建同考之役輯為是編即以榕城詩話為名讀杜心解六卷浦起龍撰起龍見史類王右丞集箋注二十八卷附録二卷趙殿成撰殿成字松谷仁和人例畧曰向見摩詰集有廬陵劉須溪武陵顧元緯勾呉顧可久呉興凌初成四家刻本劉本較善然所載僅三百七十一篇則非寳應中進御原本矣是編自四十卷以前皆劉本所有者雖間雜他人之作然不敢損益其别本所増及他籍互見者另為外編一卷卷首則弁言十九條王縉進集表代宗批答及本傳太平廣記冊府元龜所載惟逸事卷末則畫學秘訣關中石刻雖係後人偽造而援引者多故姑存之李紱跋曰松谷辨霓裳七疊始有拍以駁按樂圖妄説可紏新舊二書之謬樊紹述集注二卷玉川子詩集注五卷孫之騄撰之騄見經類西崑發微三卷呉喬撰喬一名殳字修齡太倉人臣等謹按楊億西崑倡酬集序稱取玉山冊府之義名曰西崑是編所説李商隠詩而標題云云一似西崑之名由商隱而得者則不知其何所據也右總集類文史皇朝文獻通考卷二百三十八
