body:
  text: 欽定四庫全書皇朝文獻通考卷二百六刑考十二詳讞平反臣等謹按國家欽恤祥刑明辟慎罰列聖相承用中以治凡獄訟奏牘㒺不反覆推勘再四研求期協於中以成信讞猶慮内外執法者因仍舊習固執成心或以刻意為逢迎或以市恩而姑息偏畸枉縱弗得其情也於是乎疊頒諄諭深切著明以教戒之臣等恭讀列祖實錄聖訓及我皇上御極以來宣示辦理刑名詔㫖不啻數千萬言於大公至正之規毋枉毋縱之理提撕儆覺實合先後聖而同符臣等謹就事約舉編輯大要以垂圭臬至若詳勘騐清滯囚復熱審慎秋讞覈覆奏平反寃獄則又司刑者所宜率由成憲而勿替者也謹綜扢始末並列於左方天命元年定三覆審之例置理政聴訟大臣五人扎爾固齊十人凡有聴㫁之事先經扎爾固齊十人審問然後言於五臣五臣再加審問然後言於諸貝勒衆議既定奏明三覆審之恐尚有寃抑令訟者跪上前更詳問之故臣下不敢欺隠民情皆得上聞禁止私行聴斷奉諭凡事一人獨㫁必致生亂國人有事當訴於公所五日一聴㫁之有私訴於諸臣之家者必當執送其私行聴㫁者治罪二年勅諸貝勒詳審罪犯奉諭凡有罪之人雖縳執當急而誅戮不宜遽加生殺之際不可不慎必平心和氣詳審所犯始末方能得情天聰五年勅審事先取見証口供奉諭司刑諸臣審理民事於兩造未陳當即拘見証同衆面鞫庶有實據若不速問見証兩造知覺潛相囑托支飾避罪則審㫁安得公平自今以後不先取見証口供致事有寃抑者即按事之大小坐以罪六年諭八固山額真悉心審㫁罪犯崇徳五年分遣固山額真往各處審理寃獄順治二年飭内外刑官察審滯獄從御史趙開心請也又勅刑官研審監候罪犯陜西巡按董昌允奏决囚日期得㫖以後重辟如奉監候再審之㫖地方官毋得輕决著各巡按御史㑹同監司從公研審報部覆奏候㫖處决其事有寃抑情可矜疑者徑自奏聞復大理寺職掌舊例時大理寺卿房可壯奏臣等職司刑名舊例凡内外問擬俱送寺覈擬邇來懲前代稽延之弊一切務為簡捷即重如人命亦祗憑緑牌靣奏先行處决後補招疏似非良法莫如以翻異照駁之職還歸臣等得㫖大理寺職掌照舊例行四年定重犯臨决稱寃之例凡死罪在内法司定議在外督撫審錄定議法司覆勘奏聞候㫖應决者委員處决若犯人反異原招或家屬代訴稱寃即再與推鞫事果屈枉即同原審官改正如囚犯明稱寃抑不為伸理者分别失入故入論罪八年舉行熱審之例時有病死獄中者上覽奏諭曰天時向熱連日風霾不雨前代常有熱審之例刑部可通察刑獄五城司坊順天府京縣各察監犯之無干牽連者即日釋放笞杖徒流次第減免其有情罪可矜疑者請㫖定奪臣等謹按熱審之例因天時炎暑恐罪囚淹斃所以矜恤民命也是年止在京問刑衙門行之自順治十年以後則毎年於小滿後十日内外直省一例通行迨康熙四十三年聖祖仁皇帝停熱審之例每逢暑月温詔嵗下至五十三年於避暑山莊軫念獄囚在禁特頒諭㫖多方寛恤至減鎖釋枷以待暑退詳見赦宥寛恤門雍正元年世宗憲皇帝仍復熱審舊例其監禁重犯亦量加減免至情罪可疑及牽連待質人等暫與保釋我皇上矜恤罪囚屢勅清釐滯獄猶復定熱審減杖之條展熱審減等之限蓋無非仰體好生之仁以庶幾於刑措不用之治斯則列聖相𫝊之心法也十年以天旱命内外各衙門清理獄案奉諭雨澤愆期多由刑獄寃滯刑部即日㑹同都察院大理寺及凡有刑名衙門督率司官將死罪未經審結有情可矜疑者即日審明具奏定奪徒罪人犯察非重情准與減等笞杖豁免候審干連証犯先行釋放大小獄情未審結者限一月通行完結順天府五城直𨽻督撫所屬一體遵行臣等謹按我朝慎重刑獄凡輕重各案㒺弗詳審定擬期於協中兹復以天旱將死罪以下各案逐加詳審分别減免乃格外曠典也自後每值亢旱酷暑輒頒恩諭或清理重囚或減釋輕罪列聖相承寛大之典先後同揆臣等恭繹諭㫖有爰書既定飭令詳審者謹載詳讞門有格外優恤特予減免者並分載赦宥門以備考稽焉又勅内外問刑官詳審奉諭朕於政事最重刑獄奏讞本章必再三覆閲毎有改正但慮日有萬幾或一時不及致詳死者不可復生誤者不可復改此悔此怨咎將誰歸朕志存愛育於饑寒為盜之民尚許自首遐方未服之衆廣示招徠况於有職朝臣無知黎庶豈肻陷以刻深致滋寃濫以後問刑衙門議事大臣問擬人罪務朝詳審真情引用本律一切鈎索羅織悉宜痛革又不得借口故出以致漏網務平心守法使人不寃以幾刑措之治内外問刑各衙門一體遵行復秋决朝審例從尚書李化熙請也定朝審事例毎年於霜降後十日三法司㑹同九卿科道官將刑部現監重囚逐一詳錄分矜疑緩决情實三項具題命下之日矜疑者照例減等緩决者仍行監禁其情實者刑部三覆奏聞臨决之時另本開列花名候御筆勾除方行處决臣等謹按三覆奏之法是年以刑科給事中劉餘謨言於朝審行之至外省情實重犯秋審後法司具題即咨行各省無覆奏之例迨雍正二年特奉諭㫖凡外省重囚經秋審情實應决者亦照朝審之例法司三覆具奏誠慎重民命之意也我皇上欽恤庶獄毎嵗刑部進呈秋審情實招冊必將逐案事由一一披覽使獄情毫無遺漏而各案適輕適重又詳為稱量比擬有其跡雖涉疑似而情尚一綫可原者既於冊内折角存記即情罪重大法無可貸不得已予勾之案亦必反覆推勘於犯事實欵隨其節目次第折角及勾到前一日與臨勾之時必再三檢核務俾情罪悉符猶以各省奏牘繁多迫於時日披覽慮未周詳法司虗行故事乾隆十四年特命朝審照例三覆秋審減去二覆以從務實復諭勾到後將原本進呈覆閲再行批發蓋明慎用刑之意合先後聖而同揆矣定直𨽻秋審遣刑部司官㑹同督撫審决之例從刑部請也十三年改遣三法司堂官十四年仍照舊例遣司官二員至康熙五年俱行停止定法司看語異同之例凡三法司審擬死罪議同者合具看語不同者各具看語奏聞著為例十一年罷遣䘏刑官仍勅各省詳勘見審重囚以可矜可疑者奏聞定奪令各省按察司各道將已結未結大獄嵗終造冊進呈以便清釐從給事中魏象樞請也又諭凡重囚經三法司定議後議政王貝勒大臣再行詳議十二年勅問刑各官清理重囚奉諭朕覽法司章奏議决重囚日五六人或十餘人念兹愚氓兵戈災祲之後復罹法網深可憫惻爾等刑名衙門將現監未結重案悉心清理原情準法務求平允但不得故縱市恩仍𫝊諭各省督撫申戒所屬不得羅織刻覈負朕好生至意禁止㑹議用文移奉諭三法司核擬死罪必面同研審不得但用文移往復定凡遇䘏刑之年未經差官審錄者督撫不得竟自審决十三年命王大臣將朝審應决人犯再加詳審奉諭上年暫停秋决今年朝審應决人犯甚衆但其中情罪輕重不同或仍有可矜可疑者當行減等著多羅安郡王岳樂同索厄費揚古額巴黒蔣赫徳科爾坤車克圖海胡兆龍再加詳審分别確議十五年定熱審事例刑部議准大理寺卿杜立徳疏言熱審事宜每嵗於小滿前具題始通行各省但路有逺近不同如候部文到日方行審理必不能依限齊結以後外省熱審應免具題令各該撫按於小滿後十日舉行在京者仍題請審理著為例定各省秋審事例上諭三法司向來監候重犯在京者必經朝審其中有應即行處决有矜疑及仍監候者俱奏明候㫖定奪在外監候各犯雖有御史審决其中有可矜可疑及尚可緩决者未經奏明恐有寃抑爾等將在外秋决重犯比照在京事例酌議畫一具奏尋議准各省秋决重犯該巡按㑹同巡撫布按等官面加詳審分别應决緩决並可矜可疑三項於霜降前奏請定奪著為例十七年定嚴冬盛暑清理刑獄之例從給事中金漢鼎請也康熙元年定錄供不全引律不確之禁給事中宋訓誥奏邇來讞案内情輕而反比重律罪重而反從輕擬者不可勝舉請嚴飭刑部嗣後凡兩造口供不全錄及引律不確者治以不職之罪從之四年申定秋審事例刑部議霜降後冬至前續到案件該督撫即陸續審明具題内有可矜可疑者刑部核議請㫖減釋其情實人犯具題在冬至以前者照例行刑如已過冬至該督撫題明仍行監候俟明年秋審七年定朝審獄冊法司人各一冊查閲從副都御史董篤行請也九年命刑部詳勘盜案上以盜案内論死者多恐有誣引株連故有是㫖又以天旱諭問刑衙門一切訟獄務期平允得情速審速結勿得株累無辜久淹羈禁十年勅刑部清理獄囚十一年命大學士㑹同法司詳審重囚奉諭刑獄重地天時炎暑急宜清理雖熱審見有定例但已結大案中或有無知而罹法網小過而蹈重辟者株連無辜久淹羈禁朕心深為惻然兹特遣大學士㑹同法司詳加審鞫凡有可矜疑者即察明具奏務使情法允協有枉必伸副朕欽恤至意嗣十七年復以天時炎暑舉行是例二十五年亦如之併勅各直省將已結案内現在監禁者逐一詳審情可矜疑開明具奏十二年定朝審啓奏事例上諭刑部嗣後朝審㑹議緩决可矜可疑諸案仍如常啓奏外其情實重犯别用黄冊彚列罪狀及司名並犯人旗分佐領年貌姓名開列於前其情罪仍分晰開載於後定秋審冊籍限期到部之例上諭刑部向來朝審之例先期進呈招冊然後九卿科道㑹審覆奏完結乃各省秋審奏本内止有節略觀覽未能明晰又有續到者不及入覆奏案内以致留俟來年殊為不合以後各省秋審應照在京朝審例預期造冊進呈著九卿科道覆核奏請定奪其進呈招冊及奉㫖結案行咨俱應限定日期爾部一併詳議定例尋議各省秋審冊籍限七月十五以前到部如逾限將該督撫議處其定擬奉㫖後行咨各省亦應分道路逺近定限倘沿途遲誤該管督撫即行題叅從之十四年以天旱命内大臣㑹同三法司詳審重囚先是七年五月八年六月並以雨澤愆期命内大臣㑹同刑部詳審重囚至是并命㑹三法司詳審嗣十六年十九年二十五年二十六年二十八年悉如是年之例十六年復各省秋審繕冊送京覆覈之例先是直省重案如在京朝審例俱預期繕冊齎送京師命九卿科道㑹同覆覈情實緩决矜疑三等嗣以三逆之變部議暫罷至是復舊例從御史魏雙鳳請也定盜案已滿三年歸秋審完結之例刑部議覆江寧巡撫慕天顔疏言嗣後刑部及各省盜案内有監候質審人犯已滿三年因逸犯未獲無從審結者於秋審時一併審錄具題完結應如所請從之十七年定秋審事件止照原題定擬勿得將案内牽連及被害之人重提質審十八年詳審自首同行為盜而非手刃人者罪御史黄斐奏羣盜中有同行為盜而非手刃人者應許自首減罪部議應照律論罪奉諭同行為盜雖未及手刃人若聴其自首減罪恐有兇徒懷仇報怨投入羣盜令其黨殺人而後自首或親自手刄卸罪逸賊俱未可知應從依律論罪之議又以天旱命内大臣㑹同三法司詳審重囚遣司官分往直省㑹同撫臬審錄并諭差往各官員凡事務推勘確審從公審㫁勿徇一時私見顚倒是非二十年命申飭内外問刑衙門上諭三法司帝王以徳化民以刑弼教必聴㫁明允擬議持平乃能使民無寃抑可幾刑措之風近覽法司章奏議决重犯甚多愚民無知身蹈法網或由教化未孚或為饑寒所迫以致習俗日偷愍不畏法每念及此深為憫惻在外督撫臬司及問刑各官審理重案有律例未諳定擬失當草率完結者有膠執已見改竄供招深文羅織者有偏私索詐受囑徇情顚倒是非者有一於此民枉何由得申以後著嚴加申飭内外問刑各衙門務期原情準法協於至當不得故縱市恩亦不得苛刻失入加意祥刑副朕欽恤民命之意二十一年命刑部清理獄囚并諭問刑各官凡應速結事情即為歸結二十五年亦照此例行二十二年釐剔刑部草率因循諸弊諭刑部問刑衙門期於審鞫精詳讞决平允而後民情悦服寃抑畢伸近見爾部審理大小事件毎多草率因循瞻徇舛錯如聴訟之時兩造是非自應分别定案因意有偏私往往不問曲直勒令和息或逼撤原狀含糊完結以致奸頑倖免良善含寃至於審員膠執已見聴㫁不公或更改口詞圖遂私意或恐嚇犯証不令直供或妄肆株連稽延月日或怠玩疏忽茍且告竣此等弊端難以枚舉嗣後堂司各官俱著洗心滌慮一切刑名事務令情法允協無枉無縱以副委任之意二十三年命大學士尚書等審理刑部重犯二十四年勅法司詳審秋决人犯二十五年命内外法司詳審重囚果可矜疑照例減等定不理刑名日期審理尋常事件之例諭刑部刑獄民命攸闗聴㫁雖貴精詳而案牘務無留滯庶事得速竣民免株累向來凡朔一二日及齋戒等期不理刑名因而案件間有停積恐聴審人犯久候拖累覆核事件遷延滋弊嗣後遇前項日期除循例不行刑外其餘照常章疏事件仍行審理啓奏務期獄無稽緩案得早清以副朕明慎用刑之至意二十七年定御史詳閲供招之例左都御史徐元文奏法司審勘各案及各省揭帖送到都察院時應即令御史詳閲供招有無疑竇或行或駁現三日内説堂其現審重案刑部定稿之前即應移送口供到各道御史預期察覈下部議行三十年定毎年熱審限期凡熱審減等事件如遇七月立秋以立秋前一日為限其六月立秋之年以六月底為限三十六年辨誣坐盜律者寃時髙陽縣民張三等坐盜論罪上以情有可疑遣司官覆審據奏張三等實非真盜釋之並議原審官三十七年遣官教導䝉古審理盜案上以蒙古王等各私其所屬凡諸問罪盡不得其當特遣内地官員教導審理彼處盜案即與該旗王等㑹同聴㫁並諭加意鞫訊不得妄殺無辜三十九年上以州縣官審獄多有寃抑特諭州縣取原供時雖不得情亦必飾詞以詳上司上司覆審然後到部即有寃抑部内何由周知凡為州縣者遇刑獄之事初次不能審出實情及上司批駁後審出不妨改正若明知已誤又復隠諱則必致有寃抑矣定部駁審案另委員覆審將原審不明之官議處例四十七年户部侍郎穆丹奉差浙江察審大嵐山賊案上恐賊犯妄扳平人富户因而貪官奸役借以肆行嚇詐特親書諭㫖令察審時毋得恐嚇良民以致失所並諭除賊犯正身外株連人等用刑尤宜謹慎南人愚弱一遇嚴刑即行招認不復得脱矣五十年改正部審之案刑部察審山西民陳四等聚衆搶擄一案奉㫖此案部議甚謬陳四等供稱康熙四十四四十五兩年因本省歉收不能度日於康熙四十六年自山西帶婦女及親戚一百三十餘口逃荒至陜西康熙四十八年至河南由河南流移湖廣貴州此等言語顯係欺誑自朕巡陜西等省以來毎年俱係大有陳四等何曾遭遇饑饉若果係流移饑民自應徒步荷擔沿途乞食為何乘騾馬手執刀鎗器械繞行各省且如許人衆飄流數載每日口糧若干喂馬草料若干俱從何處得來謂之流民可乎部議將陳四等妻子各發回原籍安置伊等離家多年發回無産業度日更撥何處地畝與之耕種於此等處並不詳審濫援今年四月釋放監禁罪人之例朦混議奏可乎尋定陳四處斬立决為從陳六等三十六名及婦女三十六口分别發往伯都訥寧古㙮墨爾根黒龍江給披甲人為奴各該省督撫並經過之府州縣各官降革有差五十三年勅刑部秋審奏章毋得繁複奉諭閲刑部秋審奏章繁複者甚多皆由府州縣司道各官審錄供招盡行全載所致該府司道果讞有别情自應敘入若無互異之處但註明該府司道與各州縣等官歴審皆同一語止將州縣初招並督撫大吏審擬之處敘明足矣此非為朕便於省覽案牘繁多則事務必致遲延矣定秋審緩决之案照舊聲明情由奉諭刑部等衙門所奏各省緩决犯案並不將緩决情由聲明只書某人打死某人應行緩决一語嗣後應照例聲明情由其情實可矜等案亦著照例五十五年定㑹審八旗命案之例諭刑部嗣後八旗命案著該旗大臣㑹同爾部詳審定擬具奏五十七年定部駁審案督撫徇庇不行改正處分左都御史蔡升元奏督撫審擬案件有宜駁正者如所引律例不符或前後情詞互異經部駁回令其詳審該督撫恐承審各官有失入失出之罪而伊等復自涉朦混之愆遂終始徇庇不即改正嗣後部駁再審事件該督撫務虚心細按律例將舛錯處即行改正其承審官免其議處若始終不行改正令該部提取全案覆覈改正將承審各官及該督撫並交部議處部議應如所請從之五十九年命詳覈朝審情實人犯奉諭朝審情實人犯内有遇赦免者有不應赦免者若不詳察分别則明年或遇赦詔將伊等於赦詔前混行正法殊屬可矜著九卿科道㑹議除照常不赦罪犯外其餘逐一詳覈分别具奏皇朝文獻通考卷二百六
