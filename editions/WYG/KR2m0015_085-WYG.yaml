body:
  text: 職官考九直省官員總督統轄文武軍民為一方保障直𨽻一人兼巡撫事江南江西一人福建浙江一人湖北湖南一人陜西甘肅一人兼甘肅巡撫事廣東廣西一人四川一人兼巡撫事雲南貴州一人標下有副将㕘捋等官詳武職臣等謹案總督初設直𨽻山東河南各一人康熙四年併為三省總督八年裁直𨽻改巡撫五十四年以巡撫兼總督銜尋改為巡撫雍正二年改總督乾隆二十八年令兼巡撫事又福建浙江江西各一人康熙三十二年裁設閩浙總督又陜西一人康熙四年改為山陜總督十四年仍改陜西總督十九年改為川陜總督又四川一人康熙七年改為川湖總督後仍併川陜乾隆十四年改為四川總督二十四年復改川陜總督尋復改為四川總督仍兼巡撫事陜西甘肅併為陜甘總督兼甘肅巡撫事又廣西一人雍正二年裁併兩廣又雲南貴州各一人後併雲貴漕運總督一人掌運漕之政標下官詳武職河道總督掌黄河運河之政直𨽻一人以總督兼轄山東河南一人江南一人所屬専管河務官另載後標下官詳武職臣等謹案初設河道總督一人總理兩河事務康熙十七年以河南嵗修工程交河南巡撫管理四十四年以山東河道交山東巡撫管理雍正二年設副總河一人管河南河務四年兼山東河務七年分南北兩河一管理江南一管理山東河南雍正八年設直𨽻總河一人協理一人後改歸直𨽻總督巡撫掌考察布按諸道及府州縣官吏之稱職不稱職者以舉劾而黜陟之用兵則督理糧餉三嵗大比則為監臨合省之秀士升於禮部於一省文職無所不統標下有㕘将遊撃等官詳武職山東山西河南江蘇安徽江西福建浙江湖北湖南陜西廣東廣西雲南貴州各一人直𨽻四川甘肅總督兼管臣等謹案初設巡撫順天天津鳯陽南贛登萊延綏寧夏等䖏各一人及操江巡撫一人後並裁甘肅巡撫一人乾隆二十九年裁提督學政掌一省學校士習文風之政令直𨽻山東山西河南江蘇安徽江西福建浙江湖北湖南陜西四川廣東廣西雲南貴州各一人奉天學政府丞兼理臺灣學政巡臺御史兼理後改歸臺灣道臣等謹案初制直𨽻江南差御史餘省専設提學道一人後直𨽻江南浙江俱用翰林餘省以部郎及㕘議道知府為之仍稱學道雍正四年定各省學政俱為學院翰林部郎並差由部屬差者加以編修檢討銜御史開列詳都察院巡視鹽政長蘆兩淮各一人俱詳蘭都察院福建兩廣甘肅四川以總督兼理浙江雲南貴州均巡撫兼理臣等謹案初制河東鹽政一人乾隆四十三年裁歸山西巡撫兼管織造江寧府蘇州府杭州府各一人於内務府司官内簡用各帯原銜品級其庫使筆帖式俱互見前内務府條承宣布政使司布政使掌一省之政司錢榖之出納十年會户版均税役登民數田數以達於户部直𨽻山東山西河南江寧蘇州安徽江西福建浙江湖北湖南陜西甘肅四川廣東廣西雲南貴州各一人臣等謹案初每省設左右布政使各一人順治十八年江南分省康熙二年陜西分省三年湖廣分省六年各裁一人為全省布政使江南陜西湖廣各二人以所駐之地為布政使初以直𨽻近在京畿不設藩臬二司以道員兼銜口北守道兼山西布政使銜大名巡道兼河南按察使銜通永天津巡道俱兼山東按察使銜霸昌井陘巡道俱兼山西按察使銜康熙八年増設直𨽻守道一人總司錢糧巡道一人總理刑名康熙三十八年裁井陘道雍正二年改守道為布政使改巡道為按察使其各道俱停兼布政使按察使銜乾隆二十五年分江蘇為江寧蘇州各一人其屬經歴直𨽻山東山西河南安徽江西福建浙江湖北陜西四川廣東廣西雲南貴州各一人理問直𨽻江寧蘇州江西浙江湖南陜西雲南各一人都事河南福建各一人照磨山西福建浙江湖北甘肅四川廣東各一人庫大使直𨽻山東山西河南江寧蘇州安徽江西福建浙江湖北湖南陜西甘肅四川廣東廣西雲南貴州各一人倉大使安徽一人臣等謹案初設都事江西山西各一人康熙三十八年裁初設照磨山東河南江西廣西貴州雲南各一人康熙三十八年裁初各省俱設檢校後俱裁初設理問福建廣東廣西四川各一人康熙三十八年裁山東山西河南各一人雍正二年裁初各省設副理問一人康熙三十八年並裁初設庫大使山西三人後裁一人康熙三十八年又裁一人初設副使浙江江西山西陜西雲南各一人寳源局大使各一人後俱裁提刑按察使司按察使掌一省刑名按劾之事以振風紀而澄吏治三年大比為監試官大計為考察官秋審為主稿官與布政使稱兩司直𨽻山東山西河南江蘇安徽江西福建浙江湖北湖南陜西甘肅四川廣東廣西雲南貴州各一人其屬經歴直𨽻山東山西河南江蘇江西福建浙江湖北陜西四川廣東廣西雲南各一人知事江西一人照磨安徽福建浙江湖南甘肅廣東貴州各一人司獄司直𨽻山東山西河南江蘇安徽江西福建浙江湖北湖南陜西四川廣東廣西雲南貴州各一人臣等謹案初設知事福建山西廣東廣西各一人設檢校福建山西陜西各一人均於康熙三十八年裁照磨裁設與布政使司同各道職司風憲綜覈官吏為督撫布教令以率所屬直𨽻霸昌道通永道兼河務清河道兼河務天津道兼河務大名道兼河務口北道熱河道各一人山東督糧道濟東泰武道登萊青道兖沂曹道各一人山西兾寧道河東道雁平道歸綏道各一人河南督糧道開歸河道河北道兼兵備陜汝道南汝道各一人江南蘇松糧儲道江安糧道驛鹽道兼巡江寜蘇松道安徽道常鎮道廬鳯道淮徐海道各一人江西督糧道驛鹽道廣饒九南道贑南吉寧道各一人福建糧驛道鹽法道興泉道汀漳道延建邵道臺灣道兼理學政各一人浙江督糧道鹽驛道杭嘉湖道寧紹