body:
  text: 四裔考四南安南安南即交趾與滇粤接界由廣西至其國道有三從憑祥州入則經文淵脱朗諒山温州鬼門闗保禄縣凡七日至安越縣之市橋江由思明府入則過摩天嶺思陵禄平二州又過車里江安博州耗軍洞鳳眼縣凡八日至市橋江自龍州入則由平而隘七源州四日至文蘭平茄社分二道一從文蘭過右隴縣北山經鬼門闗渡昌江經世安安勇二縣凡三日至市橋江一從平茄社西經武崖州司農縣凡四日至市橋江市橋江在安越縣境昌江之南諸路總㑹處五十里至慈山府嘉林縣渡富良江入交州由雲南至其國道有二一由䝉自經蓮花灘入程瀾洞循洮江源右岸過水尾文盤鎮安夏華清波諸州縣凡二十七日至臨洮府又過山圍縣興化府白鶴縣凡十日渡富良江一自河陽隘循洮江源左岸過平源福安宣江端雄諸府州縣凡二十三日至富良江然皆山徑欹側難行若循洮江右岸入乃大道也若廣東海道自亷州五雷山發舟北風順利一二日可抵交之海東府沿海岸行八日始至海東有白藤安陽塗山多漁諸海口各有支港以達交州此海道大畧也國治在交州距京師一萬一千一百六十五里即唐都䕶治所郡縣分十三道道分十三承政司安邦海陽山南京北山西諒山太原明光興化清華乂安順化廣南是也𨽻安邦者府一曰海東舊即交州地𨽻海陽者府一仍曰海陽舊即新安地𨽻山南者府十有一曰上洪下洪天長廣東應天荆門新典長安涖仁昌平義興舊即諒江建昌奉化鎮蠻建平地𨽻京北者府四曰北河慈山諒江順安舊即北江諒江地𨽻山西者府六曰歸化三帶端雄安西臨洮沱江舊即交州嘉興歸化地𨽻諒山者府一仍曰諒山舊諒山地𨽻太原者府三曰太原富平通化舊太原地𨽻明光者府一曰宣光舊宣化地𨽻興化者府三曰興化廣威天闗舊即廣威州地𨽻清華者府四曰紹天鎮寧蔡州河中舊清化地𨽻乂安者府八曰乂安肇平思又竒華徳先演州北平清都舊即乂安演州地𨽻順化者府三曰順化英都昇華舊即順化昇華地𨽻廣南者府三曰廣南茶麟五麻舊即乂安地其形勢東南一帶皆海有望海城漢伏波將軍馬援建國境西界南掌北界廣西東北界廣東沿邊皆有重巒深澗林箐彌蔓至大小落靠嶺鬼門闗羅婆羅翁麗嶺尤其國中要地交州獨倚富良江為天險江濶二三里其水混濁一自緬甸流入由興化過嘉興府來一自雲南流入由興化府來至交岡滙合諸小河漸滙漸大自西東下經過交州北向東南流入海在國總屬州縣二百餘東西相距一千七百六十里南北二千八百里此安南全境也國王黎氏祖籍清華人為安南王都清華繼因交州為歴代據險地兼有通海之利始遷都之國無城池人烟輻凑地勢平坦一望皆田村莊櫛比人多地少合境州縣不過具數而已唐調露初置安南都䕶府始名安南至徳初改鎮南大厯間復名安南凡國王嗣位遣陪臣恭請朝命欽命正副使奉敕往封賜以鍍金銀印文曰安南國王其國中文武官制畧與中國同設有閣部卿寺翰林科道等衙門都察院稱御史臺職掌最重在外設有承政司憲司司有承政使憲使㕘政㕘議等官府州縣各有正佐亦有部選者亦有世襲守土者在内設有五軍都督府不相統屬在外設有提督領一方軍務留守領一道軍務兼管鹽政稅務聴文職節制文職按出身擢用武職無科甲多以世襲五等爵充之稱職有功陞留守提督都督要任仍以子弟侄輩一人襲舊職溺職有罪降罰革職世襲守土者不替考試亦三年大比試有四塲一經義二駢體三詩四策中三塲者為生徒即生員中四塲者為貢生即舉人中無定額大率十人取一㑹試中四塲者為進士亦無定額廷試亦以對策定科第考無號舍每人以竹籠冒之伏地而書在國兵丁皆免丁銀徭役按月給餉兵分水陸不分戰守也兵以象為重每象額兵二百五十名有正象奴一副象奴二其餘兵丁分執火器刀鎗行則前後序進戰則左右排列凡交界隘口及衝要郡縣皆撥象鎮守冠服文職紗帽圓領帶靴平時則用黑色緞高頭帽青布濶袖袍武職無紗帽圓領朝賀日用紅哆囉呢帽各色彩緞濶袖袍紅哆囉呢齊肩掛或虎豹象補服平時用青㡌青袍靴褲皆非所好閒居多去之行或乘馬或乘象或乗網兠乗則仰卧或乗轎形如無輪車上有漆藤席葢俯而入或卧或盤坐國王䕶衛兵目轎役衣帽畧與武職同制禄按品級給錢有額田無田者給米世襲守土不復給兵制無大小礟以哆囉呢加帽謂之盔甲有隔山鎗鳥鎗長柄刀短柄刀長鎗標鎗藤牌火箭刑名初無定法明時設布按始頒有律文僅知大概故出入多不當錢榖有地丁鹽税商税田分上中下上田十取三中取二下取一每丁納錢一貫皆隨時豐歉以為重輕嫁娶亦用媒妁備錢貫佐以㯽榔猪羊酒送女家任男家隨便領女完配貧人不能具禮男女相悦即成夫妻不避同姓由姓少故也喪祭多遵文公禮信尚風水禁官民不許卜地及葬山上故皆葬於田富貴家上葢茅屋嵗久即平惟國王與輔政鄭氏葬必卜地至於權幸勢要或有私卜敗則亦平矣崇儒教交州有國學文廟各郡縣皆建學祭祀配享俱如中國釋老之教間有之不甚尊遇時節以迎神為名男女㑹聚旬日不止男女皆披髮跣足衣衫或布或絹多用白色男子以布束腰從尻下穿前繋裏婦女以布絹上掩胸乳立常义手席坐盤足自幼食㯽榔待客亦用之故齒皆黑平居不冠出無隂晴皆戴笠謁尊貴跪膝三拜偶相見必脱笠披髪非是則為不敬然彛獠雜居性輕悍以富為雄豪役屬貧弱俘掠不忌惟交州愛州人倜儻好謀驩州演州人淳秀好學交州為國都及安邦承政司所屬地愛州屬清華承政司驩州演州屬乂安承政司云屋舍惟王府輔政宅及廟宇用瓦色紫黄鋪如魚鱗餘茆屋而已國中農桑極盛稻有三種養蠶無貴賤向不解種麥今亦有之荳麻蔽野兼饒魚鹽之利寳則金珠珊瑚玳瑁石磬火齊丹砂之屬香則沉香安息雞舌都梁之屬鳥獸則翡翠白雉潮雞犀象鹿兕猩猩狒狒猓􅛊􅽜獠駃牛搪牛果下牛居風母大蜈蚣紅飛䑕蒙貴羚羊之屬菓樹則㯽榔椰子蕉子菴羅菓波羅蜜甘蔗石榴小桃柑橘紅柿千嵗子九層皮石栗如何烏木蘇木他綸木訶羅勒穰木古度木棉之屬其餘雜樹成林然少成材者榕樹最多他如扁豆瓠茄等物雖經冬不謝也國中規制風俗土産如此若其中外離合國祚變遷自秦及明前考備載明末國王黎氏當其臣莫登庸簒逐之後僻處清華僅得一隅雖攻敗莫氏而莫敬用猶居高平國不能一也我朝定鼎順治初廣西巡撫于時躍疏言安南都統使莫敬耀向化投誠請給印敕未受爵而死授其子元清為安南都統使十六年八月經畧大學士洪承疇奏言安南國遣目吏玉川伯鄧福綏朝陽伯阮光華齎啟赴信郡王軍前攄誠納欵十七年九月國王黎維祺奉表貢方物得㫖覽王表奏輸忱向化深可嘉悦因下部議十八年四月禮部議奏安南國王黎維祺傾心向化有協力討賊之勞例應賞銀百兩錦四端紵絲十二表裏得㫖交趾傾心向化復協助𠞰賊深可嘉尚爾部以故明卑視外國之禮議覆殊不合尋另議賜銀五百兩大蟒緞二疋粧緞二疋綵緞表裏各十二令兵部撰給敕書付來使齎歸上從之勅曰朕維修徳來逺盛代之宏謨納欵歸仁人臣之正誼既輸誠而向化用錫命以宣恩褒忠勸良典至重也爾安南國王黎維祺僻處炎荒保有厥衆乃能被服聲教特先遣使來歸循覽表文忱悃具見古稱識時俊傑王庶幾有之用賜勅奬諭仍賚爾差官釵仁根銀幣衣服等物遣通事序班一員伴送至廣西沿途撥發兵馬導之出疆昭朕嘉與懐柔之至意爾受兹寵命其益勵忠節永作屏翰恪守職貢丕承無斁欽哉時巡撫于時躍請頒國王勅印永為藩臣下部議行未授而維祺卒子維禔嗣尋卒子維禧嗣康熙二年十一月維禧遣陪臣黎斆等表謝降敕褒奬賞賚恩附貢方物表文曰亶聰作后鼎光熙瑞之朝懋賞勸功渙及奉琛之壤欽惟皇帝陛下濬哲温恭聰明睿智式九圍受命政布湯初詔八統保庸禮循周舊致令異數猥及遐方臣教沐暨南星趨共北仰維懐逺之仁願効來王之義時所貢物與㑹典不符禮部請嗣後應飭遵㑹典得㫖外國慕化入貢所進之物著即收納不必定遵㑹典三年二月宴黎斆等於禮部遣内院編修呉光禮部司務朱志逺諭祭故王維祺維禔五年五月維禧繳送故明王永歴勅印遣内國史館翰林學士程芳朝禮部郎中張易賁冊封維禧為安南國王六年維禧奪都統使莫元清高平地元清奔雲南上疏陳訴上命安置於南寧維禧亦上疏言興兵復讐本末上遣内院侍讀李仙根兵部主事楊兆傑齎勅諭安南國王黎維禧曰據爾奏稱莫元清之祖莫登庸有逼陷爾先嗣王先國母行弑奪國之讐已興兵致討報復勦除止有莫敬恭莫敬寛竄居高平又經往討設誓和好則是讐已復好已結各居異地矣莫元清先經納貢歸誠朕授為都統使之職爾後又納貢歸誠隨封為王今生事興兵殊為不合既稱遵㫖罷兵著將高平土地人民歸莫元清各守其土以副朕綏乂生民之心盡爾奉藩之職庶永承寵眷矣七年五月維禧遣陪臣阮潤等表謝賜恤冊封恩并進嵗貢方物宴賚如例維禧又疏請六年兩貢並進得㫖覽王奏稱該國僻居禹服之外道里悠逺山川阻深貢役勞苦三年六年先後雖異敬恭則一著照該國王所請行八年使臣李仙根等齎回維禧覆疏内稱謹遵諭㫖將高平府石林廣原上琅下琅土地人民歸莫元清乞令莫元清歸屬本國詔從之十年四月雲貴總督甘文焜奏言安南國人阮福禄獲罪來投理不應受宜還安南處置上從之十二年四月莫元清奏言黎維禧所歸高平四州外尚有保樂七源二州崑崙金馬等十二總社未還請再勅諭全歸王大臣查奏莫元清來投時止言高平並未稱有保樂等州且事屬外國結案已久應毋庸議上從之是年國王黎維禧薨弟維䘺權理國事十三年正月維䘺以訃告遣陪臣胡士揚等進康熙八年十一年嵗貢又疏言先國王世守安南為逆臣莫登庸簒弑頼輔國政鄭檍之祖勦除恢復莫逆遺孽篡據國内高平地乍臣乍叛傳至莫元清懼臣國討罪潜入内地投誠康熙八年奉㫖令還高平臣兄維禧欽奉君命不敢不遵但莫元清為臣不共之讐高平為世守之土叛逆竊據後嗣難安叩懇天恩仍令高平屬歸本國且莫元清向有誓辭及祭伊父莫敬耀文内有圖逆天朝之語今謹進呈并貢方物事下部議尋議前維禧退還莫元清高平取有復相和好印結今維䘺雖言收得誓書祭文但此文年久誓辭係莫敬耀名或得自敬耀存時或得自元清今日未經聲明難以懸擬應勅維䘺查明具題再議上從之十四年黎維䘺卒弟維正權理國事十六年勅諭黎維正曰逆賊吳三桂值明季闖賊之變委身從賊以父死賊手窮竄來歸念其投誠錫之王爵方期其感恩圖報殫竭忠誠詎意以梟獍之資懐狙詐之計隂謀不軌自起釁端藉請搬移輒行叛逆煽惑奸宄塗炭生靈連年發遣大兵各路征𠞰秦隴底定閩粤蕩平惟吴三桂竊據一隅茍延旦夕今大兵雲集指日授首恐其窮迫逃竄嶺南兹以王累世以來抒誠進貢誼屬屏藩忠藎素著亂臣賊子諒切同仇今已遣大軍平定粤西進取滇黔爾國壤地相接素知形勢王宜遴選將士協力攻𠞰懋賞崇褒朝有令典王其恪遵朕命以奏膚功十八年十一月維正慶賀大㨗疏言逆賊呉三桂變亂數年阻臣國入貢之路且遣使脅誘令臣服從區區忠悃不敢從逆乃有本國逆臣莫元清與三桂密相締結領兵潜入高平圖為掩襲今願仰仗天威遣兵追擒逆黨明正其罪經王大臣議安南感戴皇恩不肯從賊且稱莫元清投順逆賊應如所請准遣兵追擒上從之二十一年九月維正遣陪臣申全等表賀閩粤蕩平并進嵗貢方物又奏臣親兄維䘺於乙卯年卒臣俯徇輿情權理國事以中國有外警下情難以上達兹值貢期備因陳奏議䘏如例時所貢金銀器皿與本内不符得㫖外國進貢其物本無足重特以傾心向化誠意可嘉耳金銀器皿少缺不必深求其餘貢物亦宜酌減尋經部議免進白絹降真香中黑線香等物從之二十二年四月遣翰林侍讀明圖翰林院編修孫卓冊封黎維正為安南國王御書忠孝守邦四字賜之同時遣翰林院侍讀鄔黑禮部郎中周燦諭祭故王維禧維䘺時莫元清已故其弟敬光為黎氏所討敬光敗率其餘衆來奔乞命奉㫖發回安南敬光尋病故所屬逃死過半由是莫氏遂絶二十五年維正遣使表謝冊封賜䘏恩並貢方物陪臣阮廷滚中途病故命地方官致祭賜維正表裏五十初安南國王例賜表裏二十及是始増其數後為例三十年維正遣陪臣阮名儒等入貢維正又奏言牛羊蝴蝶普園三處為隣界土司侵佔請給還上問雲南巡撫石文晟知其地屬開化府已三十餘年並非安南故地不准給與仍行文申飭五十七年十月國王黎維正薨王嗣維祹遣陪臣阮公沆等以訃告請襲封附貢方物五十八年二月遣内閣中書鄧廷喆翰林院編修成文諭祭故王黎維正冊封王嗣維祹為安南國王六十年十月維祹遣陪臣胡丕績等表謝冊封諭祭恩並貢方物雍正二年維祹遣陪臣范謙益等表賀上登極附貢方物並三年嵗貢諭禮部兵部曰朕因向來驛遞多有騷擾曾諭定例外藩給供不許溢額今安南慶賀大禮遣使逺來經過地方酌量増加以示朕嘉惠逺人之意十二月范謙益等至宴賚如例御書日南世祚四大字以賜維祹三年雲南督臣高其倬奏言雲南開化府與安南接界臣查自開化府馬伯汛外四十里至鉛厰山下小河内有逢春里六寨冊載秋糧十二石零於康熙二十八年入於安南應行清查又雲南通志自開化府文山縣南二百四十里至賭咒河與安南為界今自開化府至現在之馬伯汛止有一百二十里即至鉛厰山下小河亦止一百六十里是鉛厰山小河以外尚有八十里内設都龍南丹兩厰為雲南舊境雖失在前明但封疆所係亦應一并清查現在委勘立界奏入得㫖朕思柔逺之道分疆與睦隣論則睦隣為美畏威與懐徳較則懐徳為上據奏都龍南丹等處在明季已為安南所有是侵佔非始於我朝也安南自入我朝以來累世恭順方當奨勵是務寧與爭尺寸之地况係明季久失之區乎其地果有利耶則天朝豈宜與小邦爭利如無利耶則又何必與之爭朕居心惟以大公至正為期視中外皆赤子且兩地接壤最易生釁尤須善處以綏懐之非徒安彼民正以安我民耳悉朕此意斟酌行之尋維祹疏辯得㫖王未奏之先經總督高其倬入告朕念安南累世恭順王能恪繼職守此地棄自明朝安南之民居此既久安土重遷恐有流離之苦朕心存柔逺中外一視甚為不忍已令將勘界人員撤回另議王但共職靜候可也尋雲南總督鄂爾泰奏請於鉛厰山下小河離馬伯汛四十里立界維祹復激切陳訴五年五月頒諭維祹曰朕統御寰區凡兹臣服之邦莫非吾土何必較論此區區四十里之地但分疆定界政所當先侯甸要荒事同一體今逺藩蒙古奉諭莫不欽承豈該國素稱禮義之鄉獨違越於徳化之外哉王不必以侵佔内地為嫌拳拳申辨此乃前人之悞非王之過也王惟祗遵朕諭朕不深求倘意或遲回有失從前恭順之義則朕亦無從施懐逺之仁矣維祹隨感悔奏謝上因以馬伯汛外四十里地賜維祹仍以馬伯汛之小賭咒河為界六年三月遣副都御史杭奕禄内閣學士任蘭枝往安南降勅諭維祹曰朕統御寰區凡屬臣服之邦皆𨽻版籍安南既列藩封尺地莫非吾土何必較論此區區四十里之壤若該國王以至情懇求何難開恩賜與祗以該督臣兩次定界之時王激切奏請過於觖望該國王既失事上之道朕亦無從施惠下之恩今王自悔執迷踴躍拜命詞意䖍恭在王既知盡禮在朕即可加恩况此四十里之地在雲南為朕之内地在安南仍為朕之外藩一毫無所區别著將此地仍賜該國王世守之並遣大臣至該國宣諭朕衷五月諭雲貴總督鄂爾泰朕既加恩外藩亦當俯從民便此四十里内人民若有願遷内地者可給資安插滇省現有應墾地土即令承種務使得所其願居外藩屬安南管轄者聴十月維祹奉表謝賜鉛厰山地四十里恩八年十一月維祹遣陪臣丁輔益等表貢方物十一年十一月黎維祹薨王嗣維祜遣陪臣范公容等以訃告請襲封附貢方物十二年二月遣翰林院侍讀春山兵科給事中李學裕諭祭故王黎維祹冊封王嗣黎維祜為安南國王十三年黎維祜薨弟維禕權理國事乾隆二年維禕以訃告並請襲封遣翰林院侍讀嵩夀修撰陳倓諭祭故王黎維祜冊封維禕為安南國王三年九月維禕遣使奉表賀上登極並貢方物九年二月維禕遣陪臣阮翹等來貢五月兩廣督臣碩色奏安南番目黄福衛李福治誤殺邊界守兵黄林黄正玉應擬斬立决得㫖番目戕殺内地兵丁律應斬决朕詳察案情實為悞殺且該國王即獻兇犯毫無􅃝䕶足見恭順之誠黄福衛等從寛免死交該國王處治九月兩廣督臣馬爾泰奏粤西奸民葉蓁私出外夷誘教為匪安南饑民流入寧明處得㫖滇粤界接安南各處闗隘嚴行稽察始不至彼此滋擾或釀成事端今葉蓁始出作奸饑夷偷入内地是各要隘難免潜出竄入之虞殊非防範邊境之道該督撫㑹同詳酌具奏嗣兩廣總督馬爾泰廣西署撫托庸提督豆斌奏言南寧府屬遷隆土筒之板蒙等隘太平府屬思陵土州之叫荒等隘鎮安府屬下雷土州之下首等隘共三十餘口岸俱逼近安南應疊石建柵添卡撥兵各土司帶領土勇扼險守巡并飭地方官每年冬月查修通報安南驅驢地方為各處貨物聚集之所最與由隘相近從由隘入驅驢不過六十里故商販願從由隘出入向設閉禁開之實便商民應設客長稽商民往來并責地方官慎密查察至平而水口兩闗通太源牧馬等地宜設立鐵鍊横江攔截逢五十日開一面以通商上從之十五年維禕遣使來貢十六年四月雲貴督臣碩色奏安南兵目阮世魁戕殺土練矣念應擬絞監候得㫖阮世魁戕殺内地土練律應擬抵但詳閲案情實為悞殺且安南土目黄文棋擒獻兇犯亦能恪守公令阮世魁從寛免死交該土目處治初廣西思陵州沿邊與安南接壤巡撫舒輅請栽竹以杜私越憑祥思陵土目或有乘機侵安南地者交人不甘及是總督蘇昌等奏入上以舒輅輕率舉行於前辦理不善於後致滋事端下部察議十九年十二月維禕遣使入貢又奏謝番兵黄福衛等悞傷兵練二案減罪恩先是安南猺匪盤道鉗鄧成玉等謀亂造黄袍黄旗木印并勾結内地民彛何聖烈等散劄招人欲攻都竜安北宜京等處為安南兵目所覺獲何聖烈等誅之盤道鉗等竄匿山箐間及是安南八寳河沙目黄國珍等誘獲􅌉道鉗鄧成玉經雲貴督臣碩色究訊得實奏聞正法二十一年安南國械送在番為匪滋事之廣東民人李文光等十六人來閩初文光與順化土豪阮姓者交結謀踞禄頼桐狔等處為番官所獲李文光等久繫獄及是械歸内地閩浙總督喀爾吉善等奏言安南僻處蠻陬同沾聖化不敢將李文光等擅自加誅仍復送歸請示足徵懐服之忱應將李文光等照交結外國例核其知情與否分别處治上從之二十二年六月安南番船失風飄泊永寧汛撥兵守䕶給資送歸并收貯在船軍械於回時給還得㫖番船海上往來軍械本無足異飄泊汛口撥兵照看尚屬事理收械貯庫殊為非體可諭沿海各督撫提鎮知之二十五年閩浙總督愛必達奏言安南邊境沙匪與交目蘇由為難闌入漫卓馬鹿二寨搶掠滋事現咨安南國王擒解上以地方官平日巡防不嚴臨時追捕不力降㫖責之二十六年國王黎維禕薨王嗣維褍以訃告請襲封遣翰林院侍讀徳保大理寺少卿顧汝修諭祭故王黎維禕冊封王嗣黎維褍為安南國王維褍欲以彼國五拜事天之禮受封徳保等執不可隨凛奉天朝儀節禮成顧汝修以其侈陳儀從象械並迎送儀節未周遺書責安南國王廣西巡撫熊學鵬以聞得㫖持節冊封所以示懐柔而昭威信如該國王儀節有愆當據理面飭俾知遵循若既恭順將禮一切無闗重輕之事可無介意乃臨時隠忍既出境復致書相責適形見小氣怯况不偕正使私自移文所爭執者又不識大體乎顧汝修坐革職二十七年三月諭禮部安南世為屬國凡遇朝使册封至其國自應遵行三跪九叩首禮乃該國王狃於小邦陋見與冊使商論拜跪儀注原屬無知經徳保顧汝修援從前杭奕禄等指示成例始知恪遵外藩不諳體制部臣應預行宣示嗣後遇有安南冊封等事即將應行典禮并前後遵行拜跪儀節告知正副使令其永逺遵循三十八年正月維褍遣陪臣正使段阮俶副使武輝珽阮瑶進表行慶賀禮賞賜如例四十三年維褍遣陪臣正使胡士棟副使阮仲鐺入貢慶賀平定金川隨表方物按常規多二件少一件禮部奏明奉㫖凡外國進貢正貢方物自應按照常規若因慶賀陳奏謝恩等事加貢間有短少與例不符者毋庸計較又國王將竄越匪犯解送進闗奉諭於正賞外加賞該國王蟒緞粧緞倭緞錦緞各一匹閃緞二匹表緞二匹五月奉諭據吳虎炳奏宣化縣知縣萬廷莘查獲安南國人陳廷暄阮文富二名剃髮改裝稱係貢使胡士棟家人該縣即帶與該貢使認明屬實覆訊禀報等語陳廷暄私自剃髮改換服飾偷越隘口安知非另有别情該縣既因其形跡可疑盤獲自應徹底根究務得實情乃因其稱係貢使家人輒與該貢使自行認識辦理殊為錯謬安南土語該縣無由通曉或此二人詭揑而胡士棟為之掩飾俱未可定何得信為實據即此一節之錯謬其諸事糊塗可以概見豈可膺民社之寄萬廷莘著革職四十四年維褍奏奉諭二犯回國自行懲治另整儀物專員具表謝奉㫖不必再行具表四十六年維褍遣使謝恩隨表貢方物奉㫖收受下次正貢著減一半嗣後如有陳謝表奏一概毋庸備禮五月奉諭本年安南國貢使到京著禮部堂官一人帶往熱河瞻覲後遣令回國七月使臣阮維宏等三人於惠迪吉門跪迎聖駕賜該國王緞匹及賞使臣等有差四十九年維褍遣陪臣正使范阮達副使吳希禇阮香入貢閏三月皇上南巡安南陪臣黄仲政黎有容阮仲璫等於江寧城外迎駕恩賜幣帛等物有差特賜國王御書匾額南交屏翰又奉諭安南國匾額所用古稀天子之寳非朕自誇恐該國王不知朕意故以古稀說令其閲看即知朕意也八月又使陪臣范阮達來京赴熱河瞻覲御製賜國王詩一章交南三百餘年國拱北一心歴世臣知解文章守禮義用頒篇什副絲綸銀瀛馳介心誠篤玉塞開筵惠俾均撫衆和鄰綿奕葉長承朝澤萬千春其國中山川之最著者山則有若佛蹟山勾漏山在交州府石室縣東究山在嘉林州仙逰山金牛山在武寧縣俱屬北江府崑山在鳳山縣邱皤山即馬援開石道處在丹巴縣俱屬諒江府安子山一名象山在東潮縣雲屯山在雲屯縣大海中大圓山在新安縣大海中俱屬新安府鳳翼山在夏華縣屬三江府三島山在揚縣屬宣化府芃山在弄石縣隴山在洞喜縣俱屬太原府戲馬山在永寧縣安䕶山在東山縣俱屬清化府天琴山相傳陳氏主逰此夜聞天籟聲故名在奇羅縣横山在河華縣俱屬乂安府􅏛圓山在嘉興州艾山在䝉縣水則有若富良江一名瀘江在交州府東闗縣來蘇江自交州府城東北轉而西行直抵鋭山宣光江在宣化府曠縣源自雲南教化長官司入境流七百餘里以達宣化海潮江在建昌府快州龍門江在嘉興州蒙縣源出雲南寧逺州至此横截江流中分三道舟過此必舁上岸方可復行旁有穴多出鸚鵡魚色青緑口曲而紅似鸚鵡嘴相傳此魚能化龍云浪泊一名西湖在交州府東闗縣馬援所謂吾在浪泊西里間者是也夜澤在建昌府東結縣龍溪在鎮蠻府延河縣安州有鬼門闗馬伏波廟在焉朝使過者例得致祭有銅船馬援南征鑄此又獠奴以銅為鼔高三四尺有上面無下底相傳即諸葛亮征蠻鉦自安南府南海行三千餘里至林邑又南行二千餘里至馬援立銅柱處援留漢人居此柱下南蠻呼為馬留人云臣等謹按安南國為漢交阯九真日南三郡地唐分嶺南為東西二道置安南都䕶府為稱安南之始宋初州帥丁璉内附封交阯郡王為安南封王之始璉傳弟璿其臣大校黎桓簒立真宗封為南平王為黎氏有安南之始桓三傳而大校李公藴簒立公藴五傳至李天祥封安南國王為安南稱國之始黎氏受封始於有宋迄今享國雖久然其再絶再續簒於李移於陳又簒於莫至我朝定鼎莫氏黎氏先後來歸仰蒙世祖章皇帝並生兼育繼絶之仁扶弱之義可謂至矣乃元清不守臣節身死爵除黎氏世濟忠貞遂得終承寵眷永備南藩固天道之自然亦人事為之也考前代廢興之迹黎李陳莫數百年來仇殺殆無虚日入本朝而兵革不作山河晏如非皇靈所暢有以輯寧其邦家而世其子孫安能䝉福無既若此哉南掌南掌古為越裳氏地本老撾部屬其俗佩雕刀為飾故呼為撾家南掌之稱則始於明嘉靖間其地東南與安南接西南與暹羅接西北至雲南省治六百八十里皆陸行貢道由普洱府入夷性獷猂身及眉目皆刺花相傳酋長三等大曰招木弄次曰招木牛又次曰招木化居高樓部屬入見不下樓即所至之地為等級焉我朝雍正七年雲貴總督鄂爾泰疏言南掌國王島孫遣使奉編蒲金字表文一道馴象二隻求入貢奉㫖嘉奬沿途䕶送從厚支給八年二月遣使表貢並請定貢期奉㫖五年一貢本年初次納貢頒賜勅諭一道並賜文綺等物令使臣齎捧回國九年六月奉表謝頒勅諭恩乾隆元年賜國王島孫彩縀文綺八年二月上以南掌僻處天末逺道致貢改為十年一次十四年正月貢馴象二十六年二月南掌國王准第駕公滿遣使叭細哩門庭遮昆等齎捧正貢表文進馴象二隻又齎捧慶祝皇上五旬萬夀皇太后七旬萬夀表文進馴象二隻並貢請照例交送鑾儀衛一疏奉㫖依議六月十三日禮部議嗣後各省巡撫於南掌琉球蘇禄安南等國貢使到境即於同知通判中遴委一員應用武弁酌派守備一員伴行長送至京並知照經過各省預行添派妥員䕶送按省更替至貢使回國時亦一例辦理奉㫖依議又奏南掌外藩入貢使臣俱於陳設鹵簿之日帶領道旁瞻仰天顔備覩中朝儀典今南掌國王准第駕公滿遣使叭哩細哩門遮昆來京謹擬於七月初八日聖駕起鑾之期帶領大東門道旁叩見一疏奉㫖所奏是知道了四十七年南掌國王遣使臣叭整哄等四人入貢上於山高水長連日賜茶果又於紫光閣賜宴又於三無私殿賜宴廣南廣南為古南交地王本中國人阮姓歴代以來未通職貢其地東接安南西隣占城南濵海東北至緬甸西北距暹羅境有大山海水環之望如半月之形名曰廣南灣人善泅紅毛國人夾板船最大風帆不利漂入廣南灣者國人即遣小舟數百雲集其處人負一竹筒納長繩沒水而釘縷於船下還棹小舟逺曳以行於是奪其貨而焚之故紅毛人以不見廣南山為幸他國商船入廣南者税物加倍以為常康熙八年廣東都司劉世虎等遇風漂泊國境廣南國王遣臣趙文炳送歸并帶貨物船隻來粤部議趙文炳等雖奉廣南印文遣來實係中國之人或留或遣請㫖定奪其帶來之物現奉海禁不便貿易應入户部得㫖廣南國王送劉世虎等回粤殊為可嘉著給以照驗遣歸廣南船貨不必入官仍給來使嗣後凡往來商船由厦門至廣南過安南界歴七洲洋取廣南外之占畢羅山即入其境國無城郭周栽蕭竹以自固云緬甸緬甸古稱朱波國地界雲南永昌府騰越州天馬虎踞諸闗外其酋居阿瓦城南至海西至孟養北至孟密所屬有木邦等十三路地方遼濶俗尚柔詐老官屯一帶山髙瘴大殊難行走其夷官夷民服飾與南掌相似婦人束髮穿耳短衣圍以錦幅長裙老官屯地多海鹽恒與内地人民貿易土産有蘇木象牙翠羽木棉之屬元及明初雖示覊縻然柔詐性成時時反覆嘉靖後莽瑞體父子雄長諸部恃其險逺不修職貢我朝順治間故明桂王朱由榔走蠻莫思綿緬擒以獻涵濡聖化畏威懐徳盖非一朝夕矣乾隆十五年其王莽達喇製金銀二鈚篆刻表文並奉金塔馴象緬布各等物抒誠入貢奉諭嘉奬其使臣筵宴俱照各國王貢使之例並頒勅諭御書瑞輯西琛四字匾額賜之令使臣齎捧歸國嗣為木梳酋長甕藉牙所簒子惜惱懵駁相繼佔踞三十二年莽匪滋擾土司雲貴總督劉藻姑息誤事楊應琚前往接辦畏葸失機奉㫖切責命將軍公明瑞率兵討之並免永昌等處錢糧其經由土司糧銀亦蠲免三十三年正月奉諭據明瑞奏報現在進𠞰緬夷已過蠻結地方連破賊壘十六殺賊二千有餘等語明瑞秉性純誠才優幹濟前者西陲之役每身先士卒效績宣猷昨嵗自伊犁來京陛見值緬酋滋事因令節制雲貴並授為將軍領兵進𠞰凡辦理軍營諸務均能悉心籌畫動合機宜近自木邦整隊深入於臼小地方統衆毁柵今行次蠻結復親冒矢石摧堅陷鋭至目受鎗傷猶鼔勇直前克揚我武朕心深為嘉慰明瑞現在所襲之公係承恩世爵今既屢著殊績自應特沛恩施明瑞著授為一等誠嘉毅勇公又奉諭將軍公明瑞現在自宋賽進兵其猛密一路㕘賛大臣雖已令額爾登額補授但於督率調度未能勝任協辦大學士阿里衮著往雲南辦理軍營䇿應即授為㕘賛大臣又將直𨽻河南湖北湖南貴州軍行所過等省各賞銀十萬兩雲南省賞銀三十萬兩二月奉諭緬甸本南徼么䯢久置化外原不足重煩兵力即與沿途土司蠻觸相尋亦屬事所常有封疆大吏果能綏靖有方俾知懾我威徳自可相安無事乃自愛必達呉達善等先後姑息因循不克示之節制遂至養癰貽患及劉藻以書生接任一聞與土境交訌無故自生惶擾貽悞邊陲輕生殞命因令楊應琚往督滇省意其久稱歴練自可不動聲色示以創懲便可一舉集事詎伊始則意在招納漸堕賊計一經棘手措置茫然復以病迷之際甘受人愚且不惜懐欺罔上乖張僨事其實或稱莽匪或稱木匪究與緬匪是二是一且不能悉其種類何由責以奏功因將在事將領正其失律之誅以申軍紀而聲罪之舉遂致勢難中輟其實朕於此等不足比數之小醜何常有必欲用兵之意及至一誤再誤不得已命明瑞往蕆其事然啟行之前但授以總督並不冠以經畧之號本意固曉然可見中外臣民宜無不共知者當新疆式闢之後幅􅊷二萬餘里若準夷回部莫不為我臣僕又何有於彈丸僻處勝不為武之緬匪乎今該酋始則侵擾土境繼乃抗拒顔行若不急加翦滅何以申國憲而輯邊隅惟是明瑞受任之日朕以輕量窮蠻謂其不值張皇措置惟簡𣲖巴圖魯侍衛官兵百人並選健鋭火器二營勁旅三千人以為可備軍營調遣之用無如滇省緑營弁卒經楊應琚不善駕馭以至恇怯性成遇賊輒退而命往禁軍在在分資調撥未免不敷是則朕之蔑視緬酋未為深思逺計然兵之强弱視將之能否如明瑞之殫誠勵衆行間莫不自奮觀於臼小之立毁木城蠻結之連拔十六寨陷鋭摧堅即緑營亦何嘗無感激効命之人哉其猛密一路明瑞初議額爾登額譚五格督領前進朕即傳諭額爾登額只可供人驅使不能獨當一面而譚五格未經戰陣又係内務府微末出身器局本小不足以壓衆諄訓不啻再三軍機大臣聞之至熟後乃命額爾登額為㕘賛以資調度詎伊病故之後二人果皆觀望不前而索柱等駐防天生橋錫箔江等處以己據之險亦皆棄而不守遂任擊敗餘賊潜行滋擾木邦設使去年即用阿里衮分兵猛密舒赫徳鎮守木邦居中接應大功早已告成特以其事本屬不值大舉是以未經䇿遣今猛密既已遺悞無從追悔現命阿里衮等赴滇整理戎行率兵繼進伊等身為大臣自能和衷集事動出萬全至朕於臣工功罪一切各如其人所自取即如明瑞晉加公爵厚加優賞縁前在西路軍營屢著勲績現又鼔勵將士督率有方是以特示優崇而鄂寧駐劄永昌籌辦軍儲等項頗屬盡心朕亦深為嘉許若珠魯納駐守木邦其權衡失當之處惟在妄誅降匪一節賊黨因生疑懼但此乃其限於才識所致論其悉力守禦與賊相持即係任事出力之員並不加之責備惟額爾登額於接應將軍之事視同膜外及鄂寧調赴木邦䇿應七檄不行其意猶以株守旱塔於兵衆並無損失欲為卸責之計其居心豈可復問譚五格雖較額爾登額情罪有間而以提督領兵之大員附和推諉亦自有應得之罪明瑞現在沿途殱𠞰屢挫賊鋒兼之攻克猛弄搜獲糧石以濟儲糈則雖懸軍深入後乏應援而士飽馬騰無虞匱竭此後在事臣工自必益加奮勉共奏膚功以為外夷敢抗天威者之炯戒所有用兵始末恐中外未能盡曉著將此通諭知之時大兵至木邦賊於三日前聞風竄逸我軍臨江造橋逕渡賊以萬衆據守蠻結將軍公明瑞及領隊諸大臣連破其十六寨賊拒守天生橋我師繞道夾擊殱二千餘衆獲糧械無算尋進兵宋賽直趨猛密深入二千餘里時别令㕘賛額爾登額統兵由旱塔接應額爾登額逗遛不進致老官屯匪孽尾隨軍後伺隙明瑞由大山移駐猛腊連勝破賊以緑營兵疲病者多不忍棄去令將士䕶行部員文官皆命前行身自殿後遇賊受傷至宛頂死之額爾登額譚五格解至京皆伏罪賊酋奉蒲葉書求撤兵因􅀈夷送至上不許三十四年正月奉㫖征𠞰緬匪今嵗必須大舉昨嵗已派京城健鋭火器營成都荆州各駐防兵兹復添𣲖索倫吉林兵厚集其力聴候進發大學士傅恒授為經畧俟擇日前往總理一切進𠞰事宜阿里衮阿桂已授為將軍阿桂所有總督事務不必兼管二月二十一日大學士傅恒起程奏經畧典禮不敢當敕印令箭乞大臣頒發前赴金川已蒙賞給丹纛今恭請應用從之九月奉諭據傅恒奏稱九月初二日猛拱頭目興堂扎回營言土司渾覺並頭目脱猛鳥猛等俱來騰越投誠隨即酌量安撫傅恒等迅速進兵收服猛拱著賞三眼孔雀翎小荷包並詩阿里衮著賞小荷包三箇至渾覺從前雖懐瞻顧而年僅十八情尚可憫伊係倡議迎降之土司著賞翎並荷包其頭目亦俱著賞翎二十八日傅恒奏現今收服猛拱其猛養亦猛拱所屬距蠻暮甚近俟收服猛養兵至蠻暮該處船隻兵餉想亦齊備即可㑹集兵力直搗緬匪巢穴又奏渾覺夫妻帶領頭目呈獻象牙牛隻等物十月初二日又奏土司渾覺送到軍營象四隻猛拱宣撫司印信已被火燒請敕部鑄給時大兵已收服猛拱即進兵同猛拱土司渾覺等攻取猛養自猛養前赴蠻暮行至􅑕板雅地方獲􅀈夷六口沿途割取榖石軍糧充裕初緬匪恃有老官屯之險必得舟師夾擊始可沿江順流直搗大學士公傅恒始至即於銅壁闗外野牛壩地鳩工造船八月大兵至南底河奉諭傅恒自七月中由騰越進𠞰僅帶一月口糧而自戛鳩渡江以後經歴猛拱猛養已兩月有餘所至因糧於敵不藉内地輓運贍軍之外尚可留給蠻暮一路軍營之用至馬匹倒斃固由進兵較早之故使非早期兩月緬夷必預為防備倘或拒守戛鳩南籠一路則􅀈夷且為彼用我軍安能渡大江由西岸直收猛拱使後路廓清長驅無阻乎傅恒摺奏與朕所見不謀而合也猛拱猛養為緬甸門户既已服從賊匪震懾九月大兵㑹集大江從上流分撥舟師水陸並進賊衆潜聚新街於江灘結寨一其江右及兩岸各結大寨一以拒我師我師分路並進海蘭察等拏獲生口連奪賊人江灘所立木寨射死穿紅賊匪頭目一人礟碎其舟獲船隻軍械追賊二十餘里其西岸官兵亦奪得賊壘三處共殺賊五百餘人射殪賊人頭目奪獲賊纛一及軍械米糧等物無算軍聲大振進攻老官屯十月傅恒等奏大兵攻圍老官屯賊遣小頭目節綴來營齎逆酋懵駁由阿瓦遞到書函懇求停止進兵詞頗恭順非復從前狡譎但所遣僅小頭目未可輕信次日諾爾塔求見哈國興禀稱實在懼怕未敢叩謁將軍大人如給我回書我即來叩謝又附近新寨内有一賊匪頭目向守卡千總劉剛禀稱我係阿瓦大頭目特差我來聴候信息若施恩允我所請我即往見將軍大人叩謝所留内地之人即行送出因其詞意恭順是以繕發回書諭令奉表求降送出内地被留之人已經投順土司不得侵擾如能悉遵約束即當奏聞定奪付書去後復有頭目來至軍營懇求撤圍查老官屯氣候惡劣官兵日久攻圍多有患病之人似應允其所請暫行撤圍示我威徳又奏臣於國事當盡力辦理逆酋罪大國體所係勢難中止是以奏懇領兵冀竭力以報但緬地路既險逺且多瘴癘一路官兵在途多有病故及至老官屯水土尤惡臣在新街即腿患麻木兼患泄瀉身體亦覺軟弱看來老官屯亦難久駐萬一我兵稍露疲乏於事無濟若仍堅執前行又留不了之事致厪聖念則罪更大不敢不將實在情形奏聞惟是此次進𠞰衆人皆以為難臣獨執意請行既未能攻克賊巢直達阿瓦而官兵病損甚多深負委任仰求從重治罪十一月奉諭緬匪僻在炎荒本不足齒向來不敢侵軼邊界而中朝亦以化外置之乃歴任總督自張允隨即已廢弛邊備嗣是愛必達吳達善又因循不振致緬匪易視内地與沿邊土司滋事生釁而劉藻辦理緬匪侵擾黑龍口一事既已畏葸無能由思茅退回普洱致賊無忌此歴來貽誤情形也至命楊應琚接辦調度乖張致賊入闗内騷擾土司而楊應琚復種種欺謾及再命明瑞前往任總督事並未遽欲興師逺涉而所統八旗勁旅不過三千且又分其半與額爾登額由旱塔一路取道合𠞰及明瑞自錫箔蠻結拔寨殺賊乗勝深入轉戰至小猛育為時已久屢促額爾登額移兵往援乃敢抗延不赴又復紆道退回内地明瑞等仍沿途接仗力期殿䕶全師竟以策應不前捐軀以徇此事遂難中止彼時緬酋懵駁雖曽具書軍營懇停進𠞰而所遣乃内地被留之兵丁並未専派大頭目齎表乞降此則國體所闗豈宜輕納是以置之不答猶冀其悔罪輸誠果能請命如禮尚可宥其既往並非欲勞師動衆詎待至一載而逆酋仍頑梗怙終豈可不加懲創滇省緑營恇怯積習久為逆匪所輕而阿里衮阿桂在彼亦未能相機部署是以遣吉林索倫等勁兵並閩省水師水陸夾攻又因大學士公傅恒屢請前往督辦遂命經畧往蒞其事此朕不得已用兵之苦心也至傅恒於七月間自騰越進兵師期較前次早兩月賊未預防因得由戛鳩一路統兵前進收取猛拱猛養而其所經山徑崎嶇江河紆阻越險濟軍備極勞瘁且因糧於敵不藉内地轉輸及至新街㑹兵策勵將士無不賈勇於江岸河洲連奪賊砦殱賊五百餘衆並殪其頭目獲取舟船纛械賊衆望風披靡如此殫誠宣力實不易得及進次老官屯率衆攻𠞰而賊人守拒甚固猝未能下遂克彼西屯一寨勢可計日而取但其地水土惡劣官兵在彼多生疾病即領隊大臣間有染病身故者現今冬令瘴退之後屯駐尚不相宜雖得老官屯不可以深入明矣顧以我勇敢士卒令其嘗試瘴毒心所不忍前經傅恒等節次奏到朕以國威不可不伸而既屢經奪砦殄賊殪彼渠兇是既奮揚我武且炎瘴氣候非宜我兵不宜久留實屬地勢所限非兵力不足軍儲不充也朕惟一切順天而行今審度時勢自當知難而退不宜復執直達阿瓦之説是以於半月前即傳㫖撤兵惟諭傅恒等將善後事宜妥協經畫今據傅恒等奏緬酋懵駁奉有蒲葉書遣老官屯大頭目諾爾塔齎詣軍門求請貸其聲討傅恒等移檄使受約束義正詞嚴前既諄諭撤兵此時自應姑如所請以完此局至傅恒另奏請罪一摺若僅以攻寨未能迅克為歉則阿桂亦當同時引咎乃以為力違衆議執意請行將此次出兵引為一人之咎殊為未喻朕意此次出兵原屬萬不得已並非好大喜功傅恒承命經畧職分應爾設以為辦理非是朕當首任其過其次方及傅恒也前於傅恒收取猛拱時曽賜三眼翎以示褒寵伊即具摺懇請俟成功後戴用今既未經攻克賊巢前所賜翎即著撤回仍用伊原戴之翎即此於伊請罪之意適足相當所有撤兵各事宜著傅恒等悉心妥議具奏十二月初七日經畧大學士公傅恒等奏大兵攻圍老官屯緬匪懵駁遣人致蒲葉書懇求罷兵情愿繕具表文十年進貢一次兹差頭目二人呈送洋錦洋呢洋布等物臣等堅却不受經頭目等率夷衆一百八十餘人負荷陳設營門再四懇求即飭令接受並諭以表文規制察其情狀似無欺飾奏至上許之猛拱司渾覺令於邊内擇善地處之三十五年振旅而還自是緬酋震懾天威不敢侵擾諸土司南荒帖息焉臣等謹按三十二年緬甸滋擾土司上遣大學士傅恒興師問罪連破賊壘絶其糧援已可計日蕆事維時水土惡劣我將士多有受病者於是有班師之命嗣是緬甸不敢侵擾土司者二十餘年我皇上徳威所播無逺不服五十三年雲貴總督富綱奏掌管國事孟隕遣大小頭目齎金葉表文馴象金塔欵闗進貢恭順之心出於至誠上准令前來行在酌加優賚以示柔逺并賜陪臣宴於山莊夫以緬甸其始自作不靖甘外生成其繼懾我天威懇求罷兵其究漸仁摩義共切尊親之戴忠孚可格豚魚干羽可格有苗於兹益信臣等恭纂皇朝通考例載至五十年謹加按聲明葫蘆國葫蘆國一名卡瓦界接永昌府東南徼外歴古以來未通中國亦不為緬甸所屬地方二千里北接耿馬宣撫司西接木邦南接生卡瓦東接孟定土府距永昌府十八程乾隆十一年三月其酋蚌筑願以其地茂隆山銀厰抽課報解作貢解課三千七百九兩零赴雲南省投誠並稱境内茂隆厰目中華人呉尚賢開採以來礦砂大旺厰地人民各守天朝法度路不拾遺等語王大臣議令雲南督臣曉諭却之仍令將吳尚賢等違例出境查明具奏報可六月葫蘆國夷目仍請仰懇天恩俯順夷情收受厰課雲督張允隨請減半收受仍以所收課銀之半給賞該酋長以慰國人歸順之意上從之十六年總督碩色等以茂隆課長吳尚賢將歴年恩賞酋長課銀侵肥入已㕘奏治罪下部知之其地山多田少力耕火種以木為城索綯為屋牲畜繁孽人多造炭為業山居穴處氅衣短袴以布纒頭婦女曳裾衣短衣以紅藤束腰分地而治者皆其族姓惟傳國世次不可考整欠整欠地界九龍江邊外距普洱府約千餘里所屬大猛養等十數寨統大頭目十六其一曰先邁岩第乾隆三十四年抒誠内附請修職貢上念其地在僻逺命六年一貢四十年十月其頭目齎象牙犀角來獻上令預朝正班末宴賞如例其頭目被紅褐錦衣革鞋不冠以紅帕抹首婦人衣飾與􅀈夷相似景海景海地界九龍江邊外距整欠又數百里所統大小頭目二十餘其頭目日先綱洪乾隆三十四年抒誠内附請修職貢四十年十月入貢與整欠同其物産服飾亦與整欠相類皇朝文獻通考卷二百九十六
