body:
  text: 四裔考三東琉球琉球土音屋其惹在福建泉州府東海島中魏晉以前不著於史隋朱寛一至其地元招之不來明代始内向服屬接漳泉福興四州界自福州五虎門出海水程一千七百里至其國距京師七千八百三十二里國分三省省各𨽻間切間切譯言府也中山為中頭省王城在中山之中地名首里首里及附近之乆米泊那覇直領於王不稱間切屬村縣三十有三中頭省實𨽻間切十有四在首里東者六西源浦添宜野灣中城讀谷山具志川在西者一真和志在南者二南風原東風平在北者三北谷越来美里在東北者二勝連與那城屬村縣百六十有九山南為島窟省𨽻間切十有二大里玉城豐見城小禄佐敷知念具志頭麻文仁真璧喜屋武皆首里南兼城髙嶺首里西南屬村縣百一十有三山北為國頭省𨽻間切九金武首里東恩納名䕶羽地今歸仁本部皆首里北乆志大宜味國頭首里東北屬村縣六十有八地形東西狹南北長四際皆海海中島逺近環列屬琉球統轄凡三十有六東島四姑逹佳津竒奴巴麻伊計西島三東馬齒山間切一渡嘉敷西馬齒山間切一座間味姑米山間切二安河具志川仲里由福州至其國必望取姑米山以為凖西北島五度那竒安根㞾椅山葉壁山硫磺山山與姑米對産硫磺不生草木人為硫氣薫灼眼如羊目東北島八由論永良部度姑由吕烏竒奴佳竒吕麻大島竒界大島距國八百里島長百三十里分七間切屬二百餘村大酋長十二員小酋長百六十餘員領之自稱小琉球者也南島七太平山伊竒麻伊良保姑李麻逹喇麻面那烏噶彌西南島九八重山烏巴麻巴度麻由那姑呢姑彌逹竒度奴姑吕世麻阿喇姑斯古巴梯吕麻諸島所跨水程南北三千里東西六百里語言惟姑米葉璧與中山為近餘皆不相通此琉球全境也凡國王嗣位先遣陪臣來請朝命欽命正副使奉敕往封賜以鍍金銀印文曰琉球國王未封以前稱世子權國事受封乃稱王其國中官制每一間切設一按司惟王所領地不設按司多世官或王子為之皆聚居首里遥制所屬嵗遣察侍紀官知其事年終上其成左右國相二員正一品法司官三員從一品一掌除授刑法一掌錢榖一掌禮儀圖籍職雖分𨽻有事必集議議定上之國相王受成而已紫巾官紫金大夫無定員加法司銜者正二品不加銜從二品耳目官四員一司賔一典寳一司刑一司禮正三品正議大夫加耳目官銜從三品吟咏官正議大夫正四品那霸官察侍紀官中議大夫長史都通事從四品正殿遏闥里官正五品副通事加遏闥理官銜從五品正殿勢頭官正六品加勢頭官從六品里之子親雲上副通事正七品筑登之親雲上從七品正殿里之子正八品里之子座從八品正殿筑登之正九品筑登之座從九品官雖有定名有定品其稱謂亦不盡副名實人少則呼小名惟父子不得同孫名可同祖薙頂髮後改呼如某地筑登之座年二十以上有職事謂之某地筑登之盖國人不以姓著以所生之地為名其稱筑登之不必真為是官也乆米人七嵗後稱若秀才薙髪後王籍其名謂之秀才自大夫長史以下由秀才升授屬島中能中山語者給黄㡌為首長又遣黄㡌官涖治之主聼訟徴賦名奉行宫亦名監撫使嵗易人黄㡌官者自四品以至七品冠皆黄綾帕土人稱之總曰親雲上也太平山大島八重山各三員馬齒山二員小島各一員惟巴麻伊計椅山硫磺山四島不設田制分公私公田有二一為王府田一為職官采地皆農民代耕王田嵗入有額農食其餘官田與農民均分其地之所出無定額田土應科工費出於官不以病農私田為民自開墾之田嵗科官米聼為世業受役之法各地於嵗首比户審定人數有事以次受役人役二日大事則盡役之官府不設輿𨽻役其采地之人按月更直用兵畧倣寓兵於農意五家為伍五伍又各相統有事則以平時派定農民應役事畢歸農軍器惟盔甲刀頗堅利觧火攻礟位多用銅鑄弓長七尺餘射則樹於地就下窄處扣弦發矢逺及百餘歩執法甚嚴不狥情死刑三一凌遲一斬首一鎗刺心生刑五一流一曝日一夾一枷一笞國有大慶則赦流者皆放還屋宇避海風不甚髙其下架木施版去地率二三尺以避地濕結搆如亭瓦脊四出粘盖極厚非此不能禦颶也門牕無户樞上下刻有限左右推移以為啟閉屋材用樫木堅細不蠧出竒界島尤良然不易得故乆米有從仕多年尚處茅屋者壁無粉墁糊以箋紙及名書畫屋連比多横列無重構􅃨室室内布細席人皆席地坐無椅桌客至脱屨以進賔主平等皆危坐或皆盤膝坐卑㓜則跪伏於前然後危坐尊者令安坐乃盤膝坐器皿如古俎豆餚饌盡乾製無調羮主人先自飲而後酌客士大夫無事輒聚飲曼聲而歌搊三弦和之其音哀怨抑而不揚奉客以煙呼曰淡巴菰客至即供客退竟出主人絶不迎送人皆善奕終局以空眼多寡别勝負不數實子亦有象棋嫁女不治奩具父母走送之壻家衣白衣國俗不諱也棺制三尺長僅及身之半屈死者足以殮既𦵏舊每三年開視復封之今不復爾有築以三和土者國中無道士女尼惟有僧有男女巫凡男女初生即薙髪五六嵗尚髠然如僧後乃蓄髮既冠婚削去頂髪惟留四餘終其身早者年十三四即薙頂髮未薙頂前髻上挿長簮八九寸冠則易短簮簮制王龍頭金簪妃鳳頭金簪冠最貴者起花金簪次金頭銀柱餘皆以銀民以銅命婦士妻視其夫民婦以玳瑁婦人首餙惟此不用珠翠花有香色者不戴惟木蘭纍纍髻畔不穿耳年十五針刺手指背黥以墨嵗嵗增加至中年黧然矣衣服男女寛博交袵䄂廣二尺許長不掩指右禖末缺五六寸䄂口不緝夾衣可反覆服皆無鈕帶總名曰衾以織成棊紋細布為之亦有素質染繪成文者裏衣短小男女皆作堅領項上一鈕胸右一帶外衣惟男子以帶束之别有大帶長丈四五尺寛六七寸圍於腰帶錦細花最貴錦大花次之龍蟠紅黄緞又次之餘雜花色無定制㓜童及僧衣兩脅下皆不縫㡌初以帕纒首後易薄樫木片為骨以帕䝉之前七層或九層後十一二層紫最貴次黄次紅青緑為下中又以帽之花素為别國王見朝使冠烏紗㡌雙翅側衝上向盤金朱纓垂頷下受封後詣館謝及宴皆皮弁又有片㡌以黒絹為之漫頂上簷作六稜寒時皆戴之雨笠製以麥莖及籐皮笠黒漆其外而朱其裏為官役所戴女衣不設帶左右手曵襟以行婦裳至短叠其下為兩層風不得開髻垢輒洗之散髪行不以為異也抱見惟一手乂置腰間履無貴賤男女皆草靸名曰三板編草為底上横平梁中界寸繩用時舉足入梁納繩於拇指二指間貴宦近亦用襪或布或革及踝而止别為一竇棲將指王肩輿舁以八人或十六人其上亭盖帷帳髹木為之國相以下轎髙不踰三尺席底趺坐四圍以布逺望如籠榼貴族間用羅漢松木雕鏤金漆錦邊繪裏紗縠為蔽皆以横木貫其頂兩人舁之乗馬無鞭鞍制朱黒漆描金前後加紅帕四以為餙韉黒漆皮描金龍簡者以紅氊勒索五色相間蕉布全福入手兩盤垂之尚及馬脇鐙以木或銅鐵如曲杓形繫繩貫鞍下空其口以受足其地所産有番薯紅菜松露蕉實野牡丹吉姑羅樫木福木牙喇菩姑巴梯斯之屬禽有古哈魯麻石伊石求子烏鳳容蕋皆中國所無者麟介之屬異産尤多獸則牛馬山豬羊鹿犬其餘動植諸物畧同中國氣候多煖少寒無氷霜雪希降草木常青十一月秧田挿蒔田多瘠磽一嵗再熟人尚血氣輕死生首里乆米泊那覇地秀美所出人材為多俗喜儉嗇職官之家或經句茹蔬民小心畏法雖貧不敢為盜長官過輒俯伏道旁男子多惰女功習勤負薪運水亦婦人為之男仰給焉久米之辻山沿海坡上有女集早晩兩集皆女為市道中無擔負以首藉草圈承之垂首曳袖無偏墜者首里市集亦然其國中風土如此相傳自天孫氏始建國傳二十五代逆臣利勇弑而自立浦添按司舜天者日本人皇後裔討殺利勇衆推為王遂代天孫氏時宋淳熙十三年也國初無文字舜天依日本書制字母四十七名依魯花畧放中國切音三十六字母意或借以反切或取以連書琉球有字自此始後於明初賜以三十六姓又許陪臣子弟入國學肄業中華文字漸流入境今得中國書多用鈎挑旁記逐句倒讀實字居上虗字倒下逆讀文移中㕘用中國一二字上下皆國字猶存舜天遺製與華人酬接則全用漢文矣舜天在位五十一年薨子舜馬順熙嗣十一年薨子義本嗣義本立三年歲饑民疫歎息謂群臣曰惟我不徳故至此其舉賢者遜位焉僉舉天孫氏後伊祖按司英祖命攝政七年遂禪以位而退𨼆於北山義本在位凡十一年宋景定元年英祖立在位四十年薨子大成嗣九年薨子英慈嗣五年薨子玉城嗣荒淫無度諸按司不朝大里按司稱山南王歸仁按司稱山北王玉城遂自稱中山王國分為三元至元二年玉城薨在位二十三年子西威嗣母妃亂政在位十四年薨國人廢世子而立浦添按司察度察度當明太祖之世納欵稱臣奉朝貢在位四十六年薨子武寧嗣當是時山南佐鋪按司思紹子巴志嗣父職得諸按司心遂合衆攻山南繼攻山北山北王自殺攻滅中山武寧薨時永樂三年也其明年巴志奉其父思紹為王又明年思紹以父武寧之䘮告於明得嗣爵實非父子也在位十六年薨子巴志嗣復滅山南王自元延祐中國土三分至是合為一賜尚姓自兹始在位十八年薨子尚忠嗣五年薨子尚思達嗣五年薨無子以巴志第六子尚金福嗣四年薨子尚泰乆嗣七年薨子尚德嗣尚德無道鬼界島叛不朝貢自將伐之歸益自滿在位九年薨世子㓜國人廢之而伊平人尚圓者其先不可知或曰義本讓位隠北山圓即其後或曰葉璧有天孫嶽盖天孫氏裔也父尚稷為伊平里主圓長來仕中山尚全福時始給黄㡌後為内間里主時乆旱内間田獨不枯驚傳為異圓懼載妻子𨼆避一十四年王聞其賢召為御鎖側即今耳目官也尚德時圓切諌怒不聼再避於内間及是衆已廢世子迎立圓固讓不獲乃至首里嗣王位在位七年薨子尚真年十二弟尚宣威攝位引真就王位而已東嚮立退𨼆越來六閲月遽卒尚真弱齡親政能繼述父業舊制按司皆涖治間切權重兵争尚真改令聚居首里遥領其地在位五十年薨子尚清立國中事多所興革至今法守東北屬島恃險逺不朝貢征服之在位二十九年薨子尚元嗣十七年薨子尚永嗣十六年薨無子尚真子尚懿之子尚寜嗣倭入中山襲執尚寧寧不屈倭酋慶長異之曰有此氣象無惑乎受中朝封號也卒放還在位三十二年薨無子尚永弟尚乆之第四子尚豐嗣在位二十年薨第三子尚賢遣使金應元請封於明㑹道阻留閩未還我朝順治三年福建平使者與通事謝必振等至江寧投經畧洪承疇轉送入京禮部言前朝敕印未繳未便授封四年六月賜其使衣㡌布帛遣歸復遣通事往諭賜敕曰朕撫定中原視天下為一家念爾琉球世世臣事中國今故遣人敕諭爾國將故明給封誥印勅齎送來京朕亦照舊封錫是年尚賢卒六年尚賢弟尚質自稱世子遣本國通事周國盛齎表歸誠表文有獻琛稍寛於來䙫語因留其使京師七年五月先遣梁庭漢等十九人還而質亦遣王舅阿榜琨正議大夫蔡錦等奉貢入賀船漂沒未逹八年九月遣周國盛歸復降敕諭曰梁庭漢等回諭爾國迄今故明敕印未繳去使亦無消息意者海道迂逺風濤險阻抑有别故未逹爾國耶來使留京日乆朕甚憫念今賜表裏銀兩遣歸沿途給與口糧並増駕船夫役偕通事官謝必振回報聼爾國便宜復命用示朕懐柔至意十年閠六月質遣使来貢十一年三月質又遣王男馬宗毅大夫蔡祚隆等来貢兼繳前朝敕印請封且言其國王歿以敕隨𦵏惟尚寧未𦵏故即以寧敕繳於是賜宴於禮部賜尚質及其妃蠎緞織錦紗羅等物陪臣等俱頒賚有差自後陪臣來貢皆宴賚如例命兵科副理事官張學禮充正使行人司行人王垓充副使賫詔印往封令二年一貢進貢人數不得過一百五十人許正副使二員從人十五名入京餘俱留邊學禮等疏請十事部議不行特賜一品麟蠎服於欽天監選天文生一人自擇醫生二人准馳驛往並給從人口糧至閩造海船選將弁二兵二百人隨往詔曰帝王祗德應治協於上下靈承於天時則薄海通道罔不率俾為藩屏臣朕懋纘鴻緒奄有中夏聲教所綏無間遐邇雖炎方荒畧亦不忍遺故遣使招徕欲俾仁風暨於海澨爾琉球國粤在南徼乃世子尚質逹時識勢祗奉明綸既令王男馬宗毅等獻方物禀正朔抒誠進表繳上舊詔敕印朕甚嘉之故特遣正使兵科副理事官張學禮副使行人司行人王垓齎捧詔印往封為琉球國中山王仍錫以文幣等物爾國官獠及爾氓庶尚其輔乃王飭以侯度協攄乃藎守乃忠誠慎乂厥職以凝休祉綿於奕世賜王印一縀幣三十疋妃縀幣二十疋尋因海氛未靖使臣還京未往陪臣馬宗毅留福州十七年五月病卒賜賻祭聖祖仁皇帝御極念蔡祚隆等留滯日乆賞賚加前一倍以貴重之物給與並以彼國延跂切責學禮等卒遣行仍奉順治十一年所頒詔别降康熙元年敕文曰爾國慕恩向化遣使入貢世祖章皇帝嘉乃抒誠特頒恩賚命使兵科副理事官張學禮等賫捧敕印封爾為琉球國中山王乃海道未通滯閔多年致爾使人物故甚多及學禮等奉掣回京又不將前情奏明地方督撫諸臣亦不奏請迨朕屢㫖詰問方悉此情朕念爾國傾心修貢宜加優䘏乃使臣及地方各官逗遛遲悮豈朕柔逺之意今已將正副使督撫等官分别處治特頒恩賚仍遣正使張學禮副使王垓令其自贖前罪暫還原職速送使人歸國一應敕封事宜仍照世祖章皇帝前㫖行朕恐爾國未悉朕意故再降敕諭俾爾聞知二年學禮等至國禮成而還三年七月王遣陪臣吳國用金正春奉表謝貢方物且疏言捧讀敕諭為臣使人物故甚多滯閩日乆將正副使暨督撫諸臣分别處分伏念物故多人各有命數已䝉我皇上格外殊恩死有餘榮至庀材鳩工繕兵選將破浪衝風艱險萬里以竣大典臣不敢謂非諸臣仰遵皇上恩寵藩臣之意以至此也臣已躬承天庥不能少為諸臣之報而反重為諸臣之累中外均屬臣子臣何人斯豈能宴然清夜上命還學禮等原職賜國王蠎緞綢錦紗羅陪臣等綵緞表裏有差王有另疏稱學禮等所辭宴金正使一百兩副使九十兩請令二臣收受部議不可得㫖令收受四年九月王遣陪臣英常春等進貢奉表賀上登極并恭上世祖章皇帝香其貢物在梅花港口遭風漂失金銀器皿得㫖免其補進五年七月王遣陪臣英常春等来貢併補進前失貢物上曰尚質恭順可嘉補進貢物俱令齎回至所進瑪瑙烏木降香木香象牙錫速香丁香檀香黄熟香等十件不係土産免其入貢其硫磺留福建督撫收貯餘所貢方物令督撫差人觧送来使不必賫送到京即給賞遣歸六年令貢使仍賫表入覲七年二月重建柔逺館驛於福建以駐琉球使臣是年國王尚質薨八年二月尚質世子尚貞遣陪臣英尚春來貢於常貢外加進紅銅及黒漆嵌螺茶碗照例給賜惟正使不係王舅與副使正議大夫賜物同十年八月世子貞遣陪臣富茂昌等来貢於常貢外加進鬃煙畨紙蕉布其遭風漂失貢物免議十三年二月世子貞遣陪臣吳美徳等進貢於常貢外加進紅銅及火爐絲煙十八年八月世子貞遣陪臣補進十七年正貢且咨禮部稱康熙十三十五兩年正貢因閩省道梗莫由恭達請俟來年冬再遣使補貢部臣代奏得㫖免其補進是年貢使除赴京存留官伴外其餘員役令先乗原船歸國十九年世子貞遣陪臣来貢舊例貢物有金銀罐金銀粉匣金缸酒海泥金彩畫圍屏泥金扇泥銀扇畫扇蕉布苧布紅花胡椒蘇木腰刀大刀鎗盔甲馬鞍絲綿螺􅌉加貢之物無定額及是有㫖俱令免進嗣後琉球常貢惟馬及熟硫磺海螺殻紅銅等物二十年十一月世子貞遣陪臣毛見龍等来貢上以貞當耿精忠叛亂之際屢獻方物恭順可嘉賜勅褒諭兼賜錦幣五十又於常貢内免其貢馬著為例貞又疏言先臣尚質於康熙七年薨逝貞嫡嗣應襲爵具通國結状請封禮部議航海道逺應令貢使領封見龍等固請禮部執不可上特允之二十一年命翰林院檢討汪楫内閣中書舍人林麟焻為正副使齎詔敕銀印往封詔曰朕躬膺天眷統御萬邦聲教誕敷遐邇率俾粤在荒服悉溥仁恩奕葉承祧并加寵錫爾琉球國地居炎徼職列藩封中山王世子尚貞屢使来朝貢獻不懈當閩疆反側海冦陸梁之際篤守臣節恭順彌昭克殫忠誠深可嘉尚兹以序當纉服奏請嗣封朕惟世繼為國家之常經爵命乃朝廷之鉅典特遣正使翰林院檢討汪楫副使内閣中書舍人加一級林麟焻賫詔往封為琉球國中山王爾國臣僚以及士庶尚其輔乃王慎修法政益勵悃忱翼戴天家慶延宗祀實惟爾海邦無疆之休敕曰惟爾逺處海隅䖍修職貢屬在冡嗣序應承祧以朝命未膺罔敢專擅恪遵典制奉表請封朕念爾世守臣節忠誠可嘉特遣正使翰林院檢討汪楫副使内閣中書舍人加一級林麟焻賫敕封爾為琉球國中山王并賜爾及妃文幣等物爾祗承寵眷懋紹先猷輯和臣民慎固封守用安宗社於苞桑永作天家之屏翰欽哉勿替朕命先是户部議請賜故王尚質䘏銀百兩絹五十疋令来使賫往報可又議順治十一年間初封尚質加賜王縀幣三十妃縀幣二十後不為例應毋庸給得㫖照前例給賜又諭楫等曰琉球海外小國爾等前往務持大體待以寛和副朕懐柔逺人之意楫等疏陳七事一請頒御筆一請照例諭祭海神一渡海之期不必専候貢使一修船官匠隨同渡海一請給闗防一増兵䕶行一預支俸銀辦装禮部盡議不行上命㑹同户兵工三部再議奏上上特書中山世土四字額賜王許修船匠役隨行製祭文二道祈報海神并給二年俸以往二十二年楫等至閩時方治兵攻臺灣遂不俟造船取戰艦渡海六月楫等至國諭祭故王尚質冊封禮成還京奏言中山王尚貞親詣館舍懇為轉奏願令陪臣子弟四人赴京受業部議考之前明洪武永樂宣德成化間琉球官生俱入監讀書今國王尚貞傾心向學應如所請上從之尚貞遣陪臣法司王舅毛國珍大夫王明佐等謝封奏言前代封使奉命以後毎遲至三四年甚有十餘年而後臨臣國者若使臣汪楫林麟焻朝拜命而夕就道且當海疆多事之時衝風冐險實從前所未有且臣國僻在海東封舟開駕恃西南風以行中道無可倚泊常兼旬經月而後至甚至水米俱盡有不可言者今自五虎門開洋僅三晝夜而逹小國臣遣官迎䕶親見舟行之次萬鳥繞篷而飛兩魚夾舟而送經過之處浪静波平倐抵琉球國地通國臣民以為僅見仰惟皇上文徳功烈格天感神且有御筆在船故徴應若此也乞宣付史館以彰嘉瑞又疏請飭令使臣收受所辭宴金一百九十二兩部議不不可得㫖令收受二十三年八月上以汪楫等奉使往回迅速黽勉盡職交部議叙是年貞遣陪臣毛文祥等來貢二十四年十一月貞遣陪臣來貢得㫖觀所賜琉球等國之物甚菲於厚往薄來之道未協内閣㑹同禮部議増尋議増賜縀三十疋從之二十五年王遣官生梁成楫蔡文溥阮維新鄭秉均等四人入太學附貢使耳目官魏應伯大夫曾䕫船桅折傷秉均飄至太平山修船二十七年二月貢使至京於正貢外加屏風紙二千張嫩蕉布五十疋十月貞遣陪臣來謝凖子弟入監讀書恩并貢方物上命成楫等三人照都通事例日廪甚優四時給袍褂衫袴鞾㡌被褥咸偹從人皆有賜又月給紙筆銀一兩五錢特設教習一人又令博士一員督課二十八年十月貞疏言舊例外國進貢船定數三隻貨物得免收稅今琉球進貢船止二隻尚有接貢船一隻未䝉免税請照例免收以足三船之數又人數例帶一百五十人萬里汪洋駕船人少不能逺渉乞准加增部議准免接貢船税人數不准增特㫖人數准加增至二百人三十年八月貞遣陪臣耳目官温允傑大夫金元逺等來貢自是貢使常遣耳目官一員為正副以大夫一員三十二年貞遣陪臣馬廷器王可發等來貢請入監讀書官生歸國賜宴及文綺等物乗傳厚給遣歸三十四年八月遣陪臣翁敬徳蔡應瑞等來貢三十六年九月遣陪臣毛天相鄭宏良等來貢三十八年九月遣陪臣毛龍圖梁邦基等來貢四十年九月遣陪臣毛得範鄭職臣等來貢得範至杭州病卒賜祭一次惟職臣至京四十二年八月遣陪臣毛興龍蔡應祥等來貢四十四年八月遣陪臣温開榮蔡肇功等來貢四十六年九月遣陪臣馬元勲程順則等來貢四十八年十月遣陪臣向英毛文哲等來貢時琉球國中多災宫殿焚颱􅄓頻作人畜多死是年王尚貞薨世子尚純先卒四十九年尚純子尚益以嫡孫嗣五十年十一月世孫尚益遣陪臣孟命時阮維新等來貢五十一年世孫尚益卒未及請封五十二年尚益世子尚敬嗣遣陪臣毛九經蔡灼等來貢灼至福州病卒十一月九經至京五十四年十一月世曽孫敬遣陪臣馬獻功阮璋等來貢五十七年二月敬遣陪臣夏執中蔡温等來貢且告曽祖尚貞父尚益䘮六月上命翰林院檢討海寳編修徐葆光充正副使賫詔敕銀印往並頒賜國王王妃縀幣如前例復賜敕奬諭曰朕惟昭徳懐逺盛世之良規修職獻琛藩臣之大節輸成匪懈寵賚宜頒爾琉球國中山王世曽孫尚敬屬在遐方克輸丹悃遣使賫表納貢忠藎之忱良可嘉尚是用降敕奬諭并賜文綺等物王其祗承益勵忠貞以副朕眷五十八年六月海寳等至國諭祭故王尚貞尚益冊封尚敬為王十一月敬遣陪臣向秉乾楊聫柱等來貢十二月聫柱至通州病卒賜祭𦵏五十九年海寳等還京請給天妃春秋祀典八月敬疏請續送官生入監讀書部議俱准行十月敬遣陪臣王舅向龍翼大夫程順則等來貢并謝封貢金鶴盔甲馬鞍等物又疏請飭令使臣收受所辭宴金如前數部議不可得㫖令收受六十年十月敬遣陪臣毛廷輔梁得宗等來貢得㫖琉球國王可照安南國王之例於常賜縀匹定數外加賜縀匹即交來使賫回其正副使通事人等各加賜縀匹有差六十一年敬遣陪臣毛宏徤陳其湘等來貢附遣生官四人入監觸礁舟覆溺死惟從舟存雍正元年事聞恩㫖免其補貢仍照例給賜令從船歸國二年三月敬遣陪臣王舅翁國柱及曾信等奉表賀上登極恭上聖祖仁皇帝香并貢方物送官生鄭秉哲鄭繩蔡宏訓等入監讀書上召見國柱等御筆大書輯瑞球陽四字額賜王及妃玉器縀幣等物交國柱賫回以官生蔡宏訓病卒賜銀百兩營𦵏二百兩瞻䘏其家是年敬又遣陪臣毛建元蔡淵入貢三年九月遣陪臣向得功鄭士絢等奉賜御書匾額玉器縀幣恩得㫖朕加恩逺藩不欲收其貢物但既航海逺來不忍令其帶回本國著交内務府存留准作二年一次正貢示朕體䘏逺人至意四年得功歸國上召見賜國王玉器縀幣等物是年王遣陪臣毛汝龍鄭廷極等進貢并進謝恩禮物得㫖進到四年貢物存留准作六年正貢其六年應進表文仍照例遣使赴京恭進汝龍等呈請表文方物一併來京部議不可因令六年表文俟八年正貢時一併恭進汝龍等還附遣官生鄭秉哲鄭謙等歸國六年王遣陪臣毛鴻基鄭秉彛等進貢得㫖琉球地處重洋之外奉表修貢逺渉風濤朕心深為軫念是以從前降㫖令將雍正四年國王謝恩所貢儀物准作六年正貢以示恩眷今王以六年正貢之期仍遵定制遣使航海逺來情詞懇切其將六年貢物准作八年正貢若八年貢使已經起程即准作十年正貢八年王遣陪臣王舅向克濟及蔡文河等進貢具疏奏請遵依舊制二年一貢不敢愆期九年禮部議應如所請上曰前降㫖將雍正八年貢物准作十年正貢今王奏請按期入貢具見誠悃其仍遵前㫖若十年貢物已遣使起程即准作十二年正貢十一年不必遣使前來十年賜克濟等玉磁器物是年遣陪臣温思明鄭儀等進貢乾隆元年遣陪臣毛光潤鄭國柱等進貢光潤至閩病卒二年遣陪臣王舅向啟猷等賀上登極是年六月小琉球國有粟米綿花二􅊑遭風飄至浙江定海象山地方浙閩總督嵇曽筠資給衣糧由閩回國閠九月事聞上曰沿海地方常有外國船隻遭風飄至者朕胞與為懐内外並無岐視外邦民人既到中華豈可令一夫失所嗣後似此被風飄泊之船令督撫等督率有司加意撫恤動用存公銀兩資給衣糧修理舟楫查還貨物遣歸本國著為令三年遣陪臣向維豪蔡墉等進貢四年上以王遣使慶賀降勅奬諭併御筆大書永祚瀛壖四字額賜王及文綺等物五年遣陪臣王舅翁鴻業及蔡其棟等進貢併進謝恩禮物其棟至福州病卒六年禮部議琉球國謝恩禮物照雍正四年之例存留准作二年一次正貢報可七年二月翁鴻業等具呈禮部言臨行之際國王冄四諄諭仰懇天恩免作正貢部臣代奏得㫖國王所奏已悉仍遵前㫖行五月浙江提督裴鉽奏言江南商民徐維華等五十三人遭風飄入琉球之葉壁山國王資給養瞻遣都通事阮為標䕶送歸閩得㫖禮部行文傳㫖嘉奬國王阮為標令督撫賞賚是年敬遣陪臣毛文和蔡用弼等進貢禮部議琉球國進到禮物存留准作九年正貢其九年應進表文仍令照例遣使赴京恭進報可十一年遣陪臣毛允仁梁珍貢等進貢十三年遣陪臣向永成鄭秉哲等進貢十四年閩督以前次貢使毛允仁等歸國在洋遇風事奏聞得㫖貢使回國壊船宜加優恤既據此次使臣向永成等禀懇自行修船所需工料銀兩於司庫存公銀内賞給十五年遣陪臣毛元烈阮為標等進貢元烈至閩病卒又遣都通事阮超羣等送回十四年被風失舟之商民吳永盛等四船九十二人其林士興等六船一百三十人因船身堅固先已撥給桅木廪餼資送回籍閩浙總督喀爾吉善福建巡撫潘恩榘以聞賜國王縀幣十四疋其䕶送之都通事等令督撫優加奬賚十六年福建巡撫潘思榘奏言琉球貢使毛如苞等貢船在洋遇風飄還本島今修葺補進又前有閩縣遭風船户蔣長興等常熟縣商民瞿長順等三十九人留養兩年今亦隨船䕶送來閩奉㫖加奬於常例外加賜國王縀幣並令撫臣賞賚䕶送人等是年國王尚敬薨世子尚穆遣陪臣鄭國貞以訃告署福建巡撫新柱以聞十七年世子尚穆遣陪臣向邦鼎楊大壯等進貢并謝賜縀幣恩十九年世子穆遣陪臣毛元翼蔡宏謨等進貢兼請襲封疏言恭循典例以嫡嗣爵伏乞聖恩俯照臣父事例特命天使按臨蛟島臣穆拜綸音於海表永守藩疆膺詔命於波區代供貢職部議應如所請二十年五月上命翰林院侍講全魁編修周煌充正副使冊封頒賜並如前例二十一年七月全魁等至國諭祭故王尚敬并宣敕諭王世子尚穆曰惟爾逺處海隅䖍修職貢屬在冢嗣序應承祧恪遵典制奉表請封朕念爾世守藩服恭順可嘉特遣正使翰林院侍讀全魁副使翰林院編修周煌齎敕封爾為琉球國中山王并賜爾及妃文幣等物爾其祗承寵眷克懋先猷和輯臣民增修徳政永延宗社之嘉庥長作天家之屏翰欽哉毋替朕命詔曰朕恭膺天眷統御萬方聲教誕敷遐邇率被粤在荒服悉溥仁恩奕葉承祧並加寵錫爾琉球國地居炎徼逺隔重洋世烈藩封屢膺朝命代修職貢恭順彌昭兹以中山王世子尚穆序當纉服奏請嗣封朕惟世繼為家國之常經爵命乃朝廷之鉅典特遣正使翰林院侍讀全魁副使翰林院編修周煌齎詔往封為琉球國中山王爾國臣僚以暨士庶尚其輔乃王慎修徳政益勵悃忱翼戴天家慶延宗祀實惟爾海邦無疆之休實是年王尚穆遣陪臣向全才阮超羣等進貢初全魁等舟行至姑米山􅄓作觸礁石頃有火光見桅頂海靣燈光自逺浮來得無恙全魁等回京因請加天后封號别頒諭祭天后祭文冊封之年與海神並舉並代請官生入國子監讀書得㫖允行穆遣陪臣王舅馬宣哲及鄭秉哲等進貢并謝封貢金鶴盔甲馬鞍等物六月吏部以隨封兵役不慎議禠正副使職得㫖全魁周煌本應照部議處但念其出使海洋遭遇風險俱從寛留任又冊封時琉球所送使金使臣照例不受國王具奏懇請奉㫖使臣奉命冊封自應仰體朕意該國所送宴金不必收受仍令來使帶回二十四年琉球國來貢并遣官生梁文治入監讀書得㫖所進方物准作二十五年正貢是年琉球商民金任之等四十人照屋等十三人遭風飄入内地資送回國二十五年琉球飄風商民嘉手川等三人大領筑登之親雲上等八名山陽西表等三十六人麻支宫良等四十六人均照例咨送歸國二十六年正月琉球飄風商民黒嶋首里太屋子等四十二人咨送歸國七月琉球飄風之系數等九人大灣等十五人照屋等二十一人先後資送歸國二十八年十一月王尚穆奏壬午年正貢之期特遣使臣馬國龍等齎表進貢又奏遵㫖恭進二十五年正貢又奏謝敕免二十五年正貢方物二十九年遣官生梁文治等歸國三十五年正月禮部奏琉球國王尚穆差陪臣毛徳儀等進貢地方官不為䟎送試用知縣王紹曽伴送遲延稽程四月有餘致海國陪臣不獲與元㑹之盛請嗣後琉球入貢該督於同知通判中遴委伴送沿途亦派同知等更換途中如有停留令地方官報部以憑查核得㫖禮部所奏是依議崔應階派員伴送僅派試用人員又不飭令按程赴京所司何事著明白回奏至試用知縣王紹曽職司伴送不知催令貢使按例至京以致遲悞行禮亦屬不合著交部察議四十五年九月禮部奏琉球國進貢副使正議大夫蔡煥事竣回閩在途病故應照例給與棺價銀兩内閣撰擬祭文頒發該布政司偹辦祭品委員致祭買地塋𦵏立石封識得㫖依議四十七年正月王尚穆遣陪臣向翼等賫表貢獻賜向翼等宴四十九年正月王尚穆遣陪臣毛廷棟等入覲行慶賀禮五十年十二月入京欽賜御書匾額海邦濟美四字加賞如意玉磁等器縀匹等物仍照例賞給賜陪臣毛廷棟宴二次其國山形本南北向以中國在海西王殿及門皆西向表忠順内靣之意厯世奉天朝正朔貢使至京必候賜時憲書歸國而通事官預依萬年書推算名曰選日通書權行國中俟憲書頒到通國遵用云臣等謹按隋書琉球在泉州東有島曰澎湖煙火相望元史琉球境與澎湖相對然澎湖實與臺灣近去琉球逺隋書煬帝遣虎賁郎將陳稜等浮海至高華嶼又東行二日至黿鼊嶼又一日至琉球又稱王所居壁下多聚髑髏以為佳人間門户上必安獸頭骨角今考國王所居府城高踞山巔礪石成壁蒼黝磊厯逺望如聚觸髏民間屋上門前多置瓦獅盖形似成訛也至謂其國有熊豺狼無羊牛驢馬今則熊狼驢絶無而牛羊頗有馬尤蕃息終嵗食青不食棧豆貧家多畜以代耕明洪永間例以充貢皆與隋書所記相反中山之得尚姓自尚巴志始巴志以永樂二十年立而明史則云洪武初其國有三王曰中山山南山北皆尚姓此言殊為未核且史於洪武五年載中山王察度十一年載山南王承察度十六年載山北王怕尼芝俱非姓尚至永樂二十二年始載中山世子尚巴志厥後諸王乃各冠以尚姓豈非得姓自巴志始之明証而史文不免牴牾歟盖山南北兩王本莫考其姓氏即中山之姓尚者併非察度子孫也察度傳子武寧為尚巴志所㓕巴志奉其父思紹為王思紹遂以父武寧之䘮來告故史於永樂五年書曰中山王世子思紹遣使告父䘮其後尚圓代尚徳而立本非同族史於成化七年亦書曰世子尚圓來告父䘮外藩有更姓之實而不敢為更姓之名者懼中朝詰責也史家但據訃告直書於簡雖亦記載通例而要其傳國本末有不可誣者故於篇内詳叙世次而復綴論之如此日本日本古倭奴國唐咸亨初更號日本以近日出而名也或云日本乃小國為倭所併故冒其號國在東海中東北限大山其地東高西下勢若蜻蜓古亦曰蜻蜓國有五畿七道三島一百十五州統五百八十七郡皆依水嶼大者不過中國一村落而已屬國凡數十國有天皇者自開闢以來相傳弗易不與國事不轄兵馬惟世享國王供奉有國王者受國事掌兵馬盛衰强弱更替不常有官名闗白者如中國丞相職代相更替専國政兵馬平原滕橘四姓為日本巨族相竊據為國王然君長授受次序僅見於日本僧奝然所紀有吾妻鏡一書五十二卷始安德天皇治承四年訖龜山院天皇文永三年凡八十七年事識其小而略其大李言恭撰日本紀國書土俗頗詳而世系弗晰相傳國主以王為姓居長﨑島之東北地名彌耶榖譯曰京從長﨑至彌耶榖陸行近一月昔時上將軍曽簒其位山海貢獻之物不産五榖不登退居臣位然後順若如故故無敢妄兾者文武僚吏皆世官世禄以刺史千石為名禄厚足以養亷如簽舉一街官嵗給贍養五十金故少犯法街官者鄉保也王服中國冠裳自隋時已然習中華文字而讀以倭音通文藝者為髙士優免徭役其逹中國也去遼東逺而閩浙邇史稱從帶方至倭國循海水行厯朝選國乍南乍東渡三海厯七國凡一萬二千里然後至其國都又言去樂浪郡境及帶方郡並一萬二千里在㑹稽東與儋耳相近就至其國都而言故紆迴如此若日本所屬之對馬島與朝鮮僅隔一洋順風一宿可抵昔朝鮮國王李昖時闗白興師七載不觧八道㡬沒者屢矣自内附本朝倭人震懾帖息崇徳四年日本島主令平智連滕智繩等致書朝鮮云去年大君有疾乆不聼政今春始瘳山獵遊船與前無異大君左右用事之人需索貴國土産甚多近來貴國土産數少且唐貨交易之路又絶大君左右所求無以應之調興元方兩人奉使後代以麟書堂等三人及島主管下三人更畨來索將貴國乙亥以後未給之物一一補給然後可保兩國無虞矣薩摩州太守主和琉球肥前州太守主和南鑾每嵗所得不貲島主主和貴國而所得零星以視二州為何如哉又島主謂我等曰今所請送船事若不許則不必强請歸國直告大君庶免主和之責所云唐貨者倭人指中土人為唐人也同時日本國平義成遺書朝鮮曰日本國對馬州太守拾遺官平義成奉書朝鮮國禮曹閣下時維暑月欝抑台候若何恭惟本邦益固金湯貴國彌安磐石千里共一致也先是乙亥載使臣回時以貴國答書禀奏於東武執事即應遵照舊例可圖議之自今更始須發使船故為先容寛永十六己夘載五月日書於是朝鮮國王李倧以二書來告並咨稱倭書所謂大君者日本國君之號調興者島主之副官元方者島主之書記初約和時本國授兩人章服圖印許每嵗送船來取胡淑蘇木等物本國以土産估給乙亥年調興元方流配逺所本國以為二人得罪逺謫而仍舊送使事渉無據今忽訴於國君有此來請之舉情殊叵測應令邊臣戒飭防守以偹不虞是時日本雖觀釁而動而朝鮮究未被兵者皆震讋天威之所致也七年二月日本國君以生子故建祠祈福索助祭器於朝鮮上命擇宜而行八年三月日本復遣告朝鮮令致書所生之子如君例兼索朝鮮國王空白印紙倧請遣使往日本致賀儀藉觀形勢部臣以聞得㫖遣使往賀亦鄰國之禮乗機觀變實屬𦂳要爾部可轉諭之順治二年其國一十三人泛海遭風飄至内地詔守臣支給衣糧隨朝鮮使臣津發回國十一月己酉朔詔朝鮮王李倧曰今中外一統四海為家各國人民皆朕赤子務令得所以廣同仁前有日本國民人一十三名泛舟海中飄泊至此已敕所司周給衣糧念其父母妻子逺隔天涯深用憫惻兹命隨使臣前徃朝鮮至日本可偹船隻轉送還鄉仍移文宣示俾彼國君民共知朕意七年正月朝鮮國王李淏奏言據議政府報云倭子情形可畏去年秋間鞭撻使臣出言不遜驛館倭使常以宻書示通事言詞甚謬每年所與糧米前皆運至屯中今堆積驛館似有所待又云彼國叛賊雜於漢商船内出沒沿海地方又遣使至我國云漂至洋船即行執送今因觧送上國蓄怨於我比前尤甚臣竊念自壬丁之變城郭不修器械不整者十有餘年今觀狡倭情形可慮將欲修築訓練以為守禦之偹奏入上疑其妄遣大學士祁充格等往訊果無其事降諭切責之康熙三十二年九月兩廣總督石琳疏言風漂日本國船至陽江縣地計十二人請發回彼國部議應如所請得㫖外國民人被風漂至廣東情殊可憫著督撫量給衣食䕶送浙省令其歸國其與中國貿易者長﨑島為百貨所聚商旅通焉外此有七十一島自對馬島而南而東皆日本地也長﨑産乏粟菽開貿易通計終嵗所獲利按長﨑户口均分之國饒銅我朝鼓鑄所資自滇銅而外兼市洋銅安慶江西江蘇浙江等省每年額辦四百四十三萬餘斤商辦銅斤必藉倭照以為憑騐又有額外浮給之小照數止一二百箱用二三年即廢乾隆元年浙閩督臣嵇曽筠疏言銅政四事一曰江浙辦銅暫緩一年一曰督催處分再行更定一曰私毁制錢立法嚴查一曰辦銅倭照清查存貯尋下九卿議行十九年浙江撫臣奏言十八年三月定海之蝦岐地有日本船飄至畨人殿培等一十三名即䕶送進港交定海縣贍養撫恤伴送鄞縣附商船回國鄞定二縣衣装津遣之費八百餘兩核實具奏報聞二十四年御史李兆鵬以内地絲價翔踴條奏禁止出洋又兩廣督臣請將綢縀綿絹一并禁止俱經部議奏准嗣據江蘇巡撫陳宏謨以額商楊裕和等採辦洋銅向帶綢縀絲斤糖藥等物往日本易銅分觧各省今奉禁止未免貽悞鼓鑄請將綢縀紵絹酌量携帶尋户部議奏准其每船携帶綢縀三十三卷配運洋銅從之二十九年兩江總督尹繼善巡撫莊有恭奏言採辦洋銅之官商范清洪額商楊裕和等每年前往東洋之額船一十六隻禁絲之後許帶綢縀今請以糙絲一百二十斤抵綢縀一捲每船不得過一千二百斤其願照舊帶縀匹者聼部議准其綢縀絲斤兼帶非日本辦銅商船不得援此為例報可其國俗土風疆域物産前考雖詳而其軼時時散見於他説國人多複姓有單姓者則秦時徐福齎五百童男女入海為始皇求仙無所得懼不敢歸避居焉今其裔也徐福所居地猶名徐家村塜在熊指山下其攝摩依勢若佐博多之民相矜以賈積貲或百萬和泉一州鼎食擊鐘有中國風薩摩之鸚哥里其民知禮義重犯法獨伊紀之頭陀僧三千八百房頗羯羠嗜殺諸州郡統於山口豐後出雲三軍門三軍門相揃剽國分為三而豐後獨强總屬于山城君明代入㓂者薩摩肥後長門之人居多市舶所集内奸勾引故也俗尊佛尚僧敬祖先得名花佳果非敬僧佛即上祖墓立法嚴人無爭鬭犯法者事覺輙自殺無售賣人口傭工期滿即歸呼童僕鳴掌則然諾人好潔衢巷時為洗滌夫婦不共羮湯餘者僕婢尚棄之富人履絮席貧者履薦席名曰毯踏棉男女衣服皆大領濶袂女加長衣曳地雜繪文采褌用幅帛纒繞著襪而曵履男子髠鬚薙頂額惟留腦後至鬢髮濶寸餘向後椎結女傅粉不施脂不尚簪花飾用玳瑁人物多秀麗氣候與江浙齊産五金磁器漆器金文紙馬出薩㟃馬者良薩㟃馬即薩摩州也地産銅鍛工所聚刀最利故倭人好以為佩龍涎香及海參鰒魚之属皆海中産所統屬國北為對馬島與朝鮮接南為薩㟃馬與琉球接對馬島與登州直薩㟃馬與温台直長﨑與普陀東西對峙由此達彼水程四十更厦門至長﨑北風由五島入南風由天堂入水程七十二更以海道不可以里計舟人率分一晝夜為十更故以更記里云臣等謹案日本自帶方樂浪徐聞東莞所通中國處無慮萬餘里明初懲倭之詐沿海偹禦其大為衛置軍四千六百四十人其次為所置軍一千一百餘人又次為巡檢司置弓兵百人或數十人未嘗不嚴弭患之法嵗乆人玩武偹日弛惟永樂時劉江有望海之捷至嘉靖而倭患尤劇自江浙以至閩粤沿海皆受其毒盖縁海防疎畧奸民外通徐海汪直之徒乗機勾引神宗時倭破朝鮮明人七年用兵迄無大勝惟我聖朝徳威被於遐邇東南濵海之區軍門絡繹水師戰艦修明訓練官商額商有名絲斤縀匹有數出入稽查奸宄惕息又任其貿易自便不至如明時縁海大姓主事負倭貨直致啟兵端綏靖有經資夷貨以為中土利若洋銅其尤較著者我國家政治之隆莫不震疊覆幬無疆矣皇朝文獻通考卷二百九十五
