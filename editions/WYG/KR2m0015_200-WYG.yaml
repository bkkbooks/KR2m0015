body:
  text: 刑考六刑制乾隆二十六年申嚴拏獲發遣巴里坤逃犯之令奉諭凡有發遣巴里坤等處逃犯經原籍及過路省分盤獲即由各省督撫奏聞於拏獲處所正法示衆互見徒流門定强盗為首傷人傷輕平復抱贓自首者改為應斬監候定刼盗夥犯審係得財與盗首一律擬斬立决之例大學士㑹同刑部議准兩江總督尹繼善條奏嗣後尋常刼盗未經傷人之夥犯如曾經轉紏黨羽持火執械助勢搜贓到案誣扳良民或雖無前項情事而犯盗已至二次但審係得財均不得以情有可原聲請應與盗首一律擬斬立决定刼奪江海商船分别輕重科罪例先是四月大學士等奏准盗案内有行刼大江海洋商船者已行得財毋論内地居民及濵海奸匪均照江洋大盗例不分首從皆擬斬立决至是刑部又議准凡大江海洋之處遇有商船遭風著淺乘機搶奪者除有殺傷仍照例問擬外其但經得財而未經傷人者首犯杖一百流三千里從犯杖一百徒三年互見徒流門定兩家互毆致死一命例凡兩家互毆致死一命其律應擬抵之正兇當時被死者無服親屬毆死將毆死兇手之人杖流如被死者有服親屬毆死比照此例再减一等將毆死兇手之人杖徒仍各追埋𦵏銀兩給付屍親收領互見徒流門定子孫誣告蒸檢祖父母父母屍例凡子孫將祖父母父母屍挾讐誣告他人謀害致屍遭蒸檢者比照毁棄祖父母父母屍律擬斬監候其有並非挾讐止以誤執傷㾗告官蒸檢者照誣告人死罪未决例杖一百流三千里加徒役三年互見徒流門二十七年定旗人造賣賭具分别次數科罪例凡旗人造賣賭具為從及販賣為首為從者仍照例辦理外其造賣賭具為首之旗人初犯照定例發落再犯除照例發落外加枷號一月俱交該管官嚴行管束三犯擬以實遣不准折枷互見徒流門該管官隐匿不報者嚴加議處定誘拐案内婦人為首者軍流的决例刑部奏京師奸媒人等誘拐誘姦畧賣子女之案多屬婦人出名皆因恃有犯罪折贖及罪坐夫男之例應請嗣後凡屬此等案情係婦人為首者所犯軍流等罪一概的决不准收贖其夫男僅止事後知情並未親與其事核其情罪輕重依不應律分别杖責如不知情及無男之犯即依律獨坐本婦其犯婦隻身發配者皆輪流派發各省給駐防為奴使有倚依並出示曉諭俾知法無可逃庻幾有所警惕若數年之後此風少息再行酌量請㫖停止仍照舊例遵行從之互見徒流門定鬬毆誤殺旁人分别治罪之例刑部奏准與人鬬毆而誤殺之人審係被毆者之祖孫父子均依鬬殺律科斷不得援引誤殺旁人律至其餘親屬仍照定例辦理申定奉天等處竊匪盗馬例定例盗民間牛馬等畜者並計贓以竊盗論若盗牛馬而殺者杖一百徒三年又例載盗牛一隻杖八十枷號一月毎一隻遞加一等至四隻以上分别杖徒十隻以上者滿杖流盗殺者枷號一月發附近充軍俱刺字至是盛京侍郎朝銓奏奉省所屬藉馬耕種兼資旗人當差嗣後如有偷竊馬匹者民人俱照盗牛及宰殺例治罪旗人盗竊牛馬不及十匹者按例科罪仍折枷責完結至十匹以上及盗殺者照定例枷號應得軍流予以實遣其黒龍江吉林各將軍一體遵照辦理從之互見徒流門定得受賄賂頂認正兇罪例凡得受財物頂認正兇致脱本犯罪名無論成招與否均不計贓數多寡即照禁卒觧役賄縱罪囚例按本犯斬絞之罪一律全科本犯應擬軍流以下者即照軍流等罪科斷代為説合過錢之犯各减正犯一等亦不得計贓論罪其本犯買人頂認者除原犯律應斬决絞决外其原犯應入情實者即擬為立决應入緩决者秋審時擬入情實軍流等犯照軍犯脱逃加徒調遣例從重治罪徒杖以下按律各加一等互見徒流門更定旗人犯軍流徒罪不准枷責完結例湖廣總督愛必達等審擬蠧書黄在中等交通武弁營謀作弊除將本犯分别照律治罪外將擬發烟瘴充軍之劉煊馬元齡因係旗人照例解部完結經六司核擬不准折枷請發黒龍江當差上以旗人漸染惡習浮靡澆薄殊失國初淳厚之風特諭嗣後凡滿洲犯有軍流遣罪如係尋常事故仍照舊例枷責完結倘有寡亷鮮耻甘為敗類自應削去户籍依律發遣其如何完結之處該部逐案聲明請㫖其漢軍人犯無論軍流徒罪均即斥令為民照所犯定律發遣不必准折枷責著為例所有此案之劉煊馬元齡即著發往烟瘴地面充軍互見徒流門申定􅌪留積匪猾賊减本犯一等治罪例凡窩留積匪之家除造意及同行分贓代賣照本犯一例科斷外其未經造意又不同行但經窩留分得些㣲財物或止代為賣贓者均酌减本犯一等治罪増定發塜盗棺刺字例凡發掘墳墓開棺見屍者於面上刺發塜字為從及發塜見棺與未見棺罪在軍流以下者初次刺臂再犯刺面其盗未殯未埋屍柩者刺盗棺字亦如之互見徒流門定黔省查拏㳺匪例除斬絞軍流照例辦理外其杖徒各犯遞回原籍充徒發落并開明該犯姓名年貎籍貫通飭各屬備案若本犯回籍後復敢潜入黔境拏獲訊無為匪照逃人例杖一百仍遞回原籍如有為匪犯在杖一百以下者並杖六十徒一年犯在徒一年以上者各照所犯之罪加一等其窩留之人照知人犯罪藏匿律减罪人一等問擬其失察之地方官分别議處地保人等照例治罪詳見徒流門定黔省改苖為民犯罪照民人科斷例治罪詳見徒流門更定瘋病監禁之例定例瘋病之人即報明地方官令伊親屬隣佑鎻錮看守其瘋病殺人之犯照例收贖仍行監禁俟痊愈後以期年為斷如果並不舉發飭交親屬領回至是刑部奏定除偶然因瘋發狂並非瘋疾外其瘋疾之人家有嚴宻房屋可鎻錮的當親屬可管束及婦人患瘋病者仍照例報官交親屬看守並請令地方官親發鎻鐐嚴行封固如果痊愈不發報官驗明取具族長地隣甘結開放如不行報官及私啟鎻封者照例治罪若無親屬又無房屋即於報官之日令該管官驗訊明確嚴加鎻固監禁具詳立案如果監禁之後瘋病不發俟數年後診驗情形再行酌量詳請開釋領回防範若曽經殺人者其本罪業已收贖現在監禁即令永逺鎻錮雖或痊愈不准釋放從之更定流犯脱逃加等定罪例詳見徒流門定遣發回城罪犯脱逃例時有旗人六十七賣身為奴盗取什物審擬發遣回城中途脱逃該管官奏請拏獲即行正法其觧送之弁兵趙隆等致令疎脱照例治罪奉諭六十七即行正法嗣後此等罪犯脱逃拏獲即行奏明正法無庸候㫖把總趙隆等解送罪犯致令中途疎脱雖無故縱情弊若僅照例治罪無以示懲著從重治罪凡解送發往各回城罪犯如有中途脱逃者除將逃犯嚴拏外解送官兵人役問擬死罪監候俟逃犯拏獲再治伊應得之罪若經年不獲將正法之處奏聞請㫖即著為例互見徒流門定旗民盗圍塲木植牲畜例大學士等議准凡拏獲圍塲内賊犯除偷採菜蔬及割草之人仍照例辦理外如有盗砍木植偷打牲畜人犯審明初次二次發徃烏嚕木齊等處種地至三次發往烏嚕木齊等處給與種地兵丁為奴又二十八年刑部奏准私入圍塲未得畜木之犯均於已得罪上量减一等杖一百徒三年再犯即未得畜木亦與已得者同擬外遣互見徒流門定逃人妄供窩主及旗下家奴畏罪潛逃之例凡拏獲逃人初供若不將實在窩留之人指出混行妄扳者先將本犯加等治罪之處改為發遣以後再有妄扳即發巴里坤等處種地兵丁為奴窩家十家長地隣人等分别於舊例應得罪上各加一等治罪至旗僕為匪畏罪逃走初次枷號兩月二次即發往烏嚕木齊等處給賞緑旗官兵為奴詳見徒流門申明毁棄死屍及非登時殺死姦夫之例刑部議覆左侍郎錢維城條奏二事一竊刼之犯如在湖河舟次格鬬致斃屍墮水中漂流不獲及山谷險隘猝然禦暴屍沉溪澗者應如所奏仍依格殺本律勿論無庸牽引棄屍之條若室中夤夜格捕姦盗之犯或曠野道路格傷拒捕之竊盗本係不應擬抵而畏罪心切以致毁棄掩埋移投坑井者應照地界内有死人不報官司私自掩埋律杖八十因而遺失者照地界内有死人移置他所以致失屍律杖一百如格殺之後懷挾夙嫌逞忿殘毁或投之水火或割剥損傷仍照毁棄死屍律科罪一本夫及應許捉姦非登時而殺仍照夜無故入人家例擬以杖徒外其有捉姦非登時殺死不拒捕姦夫者或係倉猝毆死即照本例原文以罪人不拒捕而殺之律論絞或係有心致死及拘執而殺即依罪人不拒捕及已就拘執而擅殺律擬絞不得與平人同科若雖係捕獲姦夫又因他故致斃者自當仍以謀故論至已經犯姦有據及復逞兇拒捕雖非登時自應如所奏一依罪人拒捕律科斷從之定回民行竊窩竊之例凡回民行竊除贓數滿貫罪無可加及並無夥衆持械者仍照例辦理外其但經結夥在三人以上及擕帯繩鞭腰刀等械情狀可惡者不分首從不計贓數次數悉照積匪猾賊例發雲貴兩廣極邊烟瘴充軍如有本地回民窩藏回民行竊者照本年奏准窩留積匪例分别治罪互見徒流門二十八年停官兵跟役滋事者解京發遣之例定例凡駐劄官兵跟役如有怙惡不悛者分别情罪解京或發往黒龍江當差或解回本主家中管束至是阿克蘇特駐劄大臣德爾格奏解酗酒滋事之滿洲兵丁跟役楊福等定擬相近伊犁者即發伊犁相近烏嚕木齊者即發往烏嚕木齊令其種地得㫖所奏是嗣後各城駐劄官員兵丁跟役内如有此等酗酒滋事者毋庸發往黒龍江解送京城即照徳爾格所奏由彼發往伊犁等處給與兵丁厄魯特等為奴如回子各城即彼此易地調發與回子為奴亦可若將伊等發遣之後仍不悛改著即行正法互見徒流門定追埋𦵏銀兩分别勒限追完及量追豁免之例凡命案内有减等發落應追埋𦵏銀兩給付屍親之犯俱勒限三月照數追完如審係十分貧難照例量追一半或本犯尚有物産可抵即令於三月限内變交若限滿勘實力不能完者即將該犯發配取具地隣親族甘結州縣官加具印結詳請督撫核實咨請豁免互見徒流門如有貲財隐匿者出結之地隣人等照不應重律治罪加結之州縣官罰俸一年増定兵丁脱逃事例定例隨征兵丁自軍前逃回者擬斬立决又在京軍人逃者杖九十各處守禦城池軍人逃者杖八十仍著充伍乾隆十八年軍機大臣㑹同八旗遵㫖議定在京旗人脱逃一月之内自行投回者交旗管束拏獲者分别初次二次枷責交旗管束一月以外不論投回被獲發黒龍江等處當差二十四年綏逺城將軍恒魯奏准各省駐防兵丁初次逃走鞭一百枷號一月著當苦差半年後果能安分仍准披甲當差二次逃走即發黒龍江等處當苦差惟新疆换防種地兵丁脱逃並無治罪明文上以新疆駐守攸闗又與尋常本伍食糧未擕軍器者有間特諭刑部詳悉定議具奏尋議准嗣後派往伊犁等處换防種地之滿漢各項兵丁遇有中途及原派地方脱逃者嚴緝獲日發原派地方枷號兩月遊營示衆充當苦差如果十年别無他故令該將軍大臣等查奏准回旗籍再犯逃者即行正法并議京内京外在伍緑營兵丁脱逃原律或杖九十或杖八十尚未畫一應請定為在伍兵丁脱逃毋論在京及京外俱杖一百枷號一月示衆永逺不許入伍從之定職官負罪逃竄之律時有千總朱振清以侵用旗丁銀米被恭畏罪潛逃拏獲審擬照平民犯罪脱逃例於本罪上加等科斷刑部照例核覆得㫖職官與常人地分逈殊常人因逃加等示懲於法已足若既身叨一命即不得藉口不知功令此案朱振清著拏交刑部另行治罪嗣後官犯脱逃如何定律比照平民加重治罪之處該部詳析定議具奏尋議准官員負罪潛逃一經拏獲除罪應斬决絞决毋庸另議外其犯該監候者即改為立决犯該軍流滿流者即改為擬絞監候徒罪以上改發邊逺充軍犯該杖笞者改為杖一百徒三年均遇赦不准援减定軍流逃犯之親屬房主保隣不行舉首分别徒杖詳見徒流門定竊盗倉庫錢糧未經得財分别首從治罪例先是二十七年刑部議准山東按察使閔鶚元條奏定例常人竊盗倉庫錢糧計贓科罪一兩至八十兩分别杖徒八十兩至九十兩分别杖流查例載偷竊衙署財物賊犯改照積匪擬軍未便於盗竊倉庫錢糧轉得從輕完結應如所請嗣後除贓至一百兩以上仍照例擬絞外其贓在一百兩以下之首犯不論贓數多寡俱照積匪猾賊例發烟瘴充軍從犯仍照例計贓治罪至是江蘇按察使胡文伯奏倉庫錢糧乃敢妄生覬覦攫取之犯既已加重圖竊之犯亦應示懲請嗣後未經得財者即照得財充軍例首犯量减一等杖一百徒三年從犯仍减一等杖九十徒二年半部議應如所請從之互見徒流門改定親屬受財私和命案例定例凡親屬人等私和命案而受財者計贓准竊盗論至是刑部議准殺人應抵因私和而脱兇犯於死罪是枉法也且常人為他人私和人命既准枉法論而親屬仍准竊盗論情法未為允協應請改為計贓准枉法論從重科斷定殺一家非死罪二人斷給財産之例凡殺一家非死罪二人者為首之人除照例擬斬立决奏請定奪外仍查明該犯財産酌斷一半給付死者之家如殺三人而非一家内有二人仍係一家者亦酌斷一半給付被殺二命之家倘首犯監故者財産仍行斷給若係毆死一家二命原無必殺之心者不得援引此例定旗人窩逃及漢軍家奴問徒之例旗人窩逃知情者杖六十徒一年照例先枷一月漢軍家奴犯徒者不准折枷完結詳見徒流門定過失殺傷繼母之例山西廵撫明德審擬洪洞縣民鄭凌放鎗捕賊致傷繼母身死照律凌遲具題三法司以本内明叙情形事由捕賊放鎗時適伊母在房靠窓窺瞷鎗砂散開誤傷殞命黑夜之中實屬思慮所不及核其情法尚屬兩岐駁令該撫另審妥擬奉諭夫所謂失殺者在平人固無可議即以本家親長而論亦祗於伯叔兄姊尚可量從末减若子孫之父母祖父母即使實出無心原情定擬試問為子若孫者尚何心偷生視息靦顔自立於人世乎春秋許世子之義甚可味也但究係犯時不知凖情酌理自當免其凌遲定以繯首立寘於法庻為平允著刑部另將律文斟酌定議奏准頒行至此案鄭凌致死繼母陳氏放鎗雖由捕賊然既係繼母又同院居住是豈不知伊母卧房所在輙向放鎗致死不當令其茍活人世致乖倫理著三法司核擬具奏尋議鄭凌絞决并議嗣後雖係無心過失殺傷繼母者擬絞立决從之申明搶奪財物例除搶掠田野榖麥蔬果與十人以下無兇器者仍依搶奪本律科斷外如有聚至十人以上及雖不滿十人但經執持器械倚强肆掠果有兇暴衆著情事者均依糧船水手例分别首從問擬定採參工人偷竊人參之例吉林將軍恒魯等奏採參工人偷竊票商人參者律無専條向照詐欺官司財物計贓論盗免刺律辦理利重罪輕犯法者衆請嗣後嚴加查拏緝獲時即照偷參已得例不論參數多寡俱杖一百流三千里仍刺竊盗字部議應如所請從之定販賣私鹽在三百觔以上例凡私販鹽觔在三百觔以上不將窩頓透漏之家供出混稱買自不知姓名之人者於本罪上加一等定擬二十九年増定殺一家非死罪三人者妻子發遣例刑部奏定殺一家非死罪三人之妻子除同謀加功及有别項情罪者仍各照律定擬外其實未同謀加功者不分年嵗老㓜人數多寡並發往伊犁等處給與駐防索倫等兵丁為奴互見徒流門定期親尊長故殘卑㓜例除尊長毆卑㓜邂逅致成篤疾仍照律勿論外其挾嫌故殘卑㓜至篤疾者兄姊照毆死弟妹杖一百流二千里例减一等杖一百徒三年伯叔姑外祖父母照毆死姪姪孫外孫杖一百徒三年例减一等杖九十徒二年半互見徒流門嚴獄卒縱囚之例定例賄縱者全科故縱者同罪至死减一等疎縱者减二等至是刑部議准禁卒將斬絞重犯鬆放獄具以致脱逃者將該禁卒嚴行監禁俟拏獲正犯之日究明賄縱屬實照律全科審無賄縱情弊或係狥情鬆放或托故擅離或倩人代守以致乘間潛逃者亦照故縱律治罪不准照舊例减囚罪二等問擬定子殺人而父認兇之例刑部奏潮陽縣民翁阿仲毆斃王邦顯其父翁啟金代子認兇翁阿仲審擬絞决請嗣後子殺人而父認兇者即照本犯所犯罪名科斷除原犯斬决絞决毋庸議外其子犯擬斬候絞候者即擬斬决絞决軍流徒杖照例遞加從之定犯姦自戕之例先是二十八年定和姦案内姦婦因事敗露羞愧自盡者姦夫杖一百徒三年至是又定凡姦夫姦婦因事敗露商謀同死有姦婦逼令姦夫買藥同飲姦婦毒重殞命姦夫得灌救不死者有姦婦逼令姦夫持刀代割先死姦夫隨後自抹未死者並將姦夫照犯罪時雇人傷殘因而致死减鬬殺一等律杖一百流三千里互見徒流門定承辦城工應追核減銀兩未完者照知府代州縣官分賠侵欺錢糧未完計分數治罪例漢軍都統新柱奏㕘革知州劉度昭修理城工應追核减銀兩未完家産盡絶無可著追奉㫖劉度昭未完銀兩著寛免此項銀兩雖與侵貪不同但屬應還官項即如州縣官侵欺錢糧知府應行分賠至家産盡絶仍未完繳者尚應分别治罪今劉度昭係身自獲罪應行追繳之項若因家産已盡遽行豁免並不治罪既不足以示懲亦殊為幸免劉度昭照知府代州縣官分賠侵欺銀兩之例治罪嗣後有似此者俱照此例辦理部議劉度昭未完分數在七分以上應照知府代州縣分賠侵欺銀兩未完至六分杖六十徒一年毎一分加一等例杖七十徒一年半不准納贖係漢軍照例不准折枷并除旗檔發順天府定地充徒到配折責定命盗案内斬絞等犯概先刺字例向例立决之犯審明即行刺字其謀故各犯則係監候具題俟奉㫖之日再行刺字至是刑部議准山西按察使藍欽奎奏命盗案内斬絞等犯該督撫審明實屬情罪難宥者即於具題之日交按察使衙門概先刺字然後遞回犯事地方監禁定押解秋審重囚例凡秋審届期督撫飭各府州酌量所屬人犯數目遴委一二幹練佐雜督同差役將重犯押解省城候審審畢之後仍著原委原役解回收禁倘有人犯疎脱及解役頂替短少等弊即將委員㕘處更定拏獲重犯審解例定例積案行刼重犯事連數省隨案移解質審上以此等狡獪性成隔省長途易啟疎虞之漸特諭嗣後重案人犯經别省拏獲其案情有可行文闗白本省完結者即就所獲省分正法或有必應解質情由宜作何設法毋致貽誤之處該部詳議具奏尋議各省拏獲盗案重犯其在本省犯案供出外省曽犯行刦者不論罪輕罪重皆照行文闗查例研訊明確毋庸解往質審即隣省盤獲别省盗犯及協同失事地方官差役緝獲者均令在所獲地方監禁詳訊備移被盗省分查明案情贓證即由拏獲省分核擬請㫖正法如果贓跡尚須研訊或失事地方有夥盗待質必應移解者即照各省秋審解送重囚新例遴派文武官各一員𢃄領觧役兵丁親身押送仍預先知㑹前途經由地方照例接遞道逺州縣不及收監者照例令地方官預期選撥幹役前赴住宿處所𫝊集地保知㑹營汛隨同官弁鎻錮防範倘不如法管解致犯脱逃照例分别從重治罪從之定匪船誘賭之例時江右有名為相識匪船攬載客商設局誘賭為行旅之害者按察使廖瑛請定専條以懲積匪事下部議尋定誘賭匪船初犯到案審係一二次者仍照開塲誘賭例杖徒如三次以上及再犯者均照積匪猾賊例發雲貴兩廣極邊烟瘴充軍並將首犯先於拏獲地方再枷號一月其船户知情分贓者初犯照為從論再犯與犯人同罪船隻變價入官定軍流罪犯脱逃及拒捕殺人之例刑部議准嗣後流罪人犯事發在逃照流犯越獄加等例改發若犯罪事發在逃被獲時拒捕其原犯未至滿流及毆所捕人至折傷以上或殺人者各依本律定擬外若本罪已至滿流而拒捕在折傷以下者應照滿流人犯越獄例改發邊衛充軍犯應充軍者各以次逓加調發應極邊烟瘴充軍者改發黒龍江等處給披甲人為奴互見徒流門復定積匪猾賊緩决一次者查明年嵗改發新疆例詳見徒流門定滇省改苖為民犯軍流徒罪例先是二十七年刑部議准總督吳達善等奏黔省苗人犯軍流徒遣仍照例折枷完結其情罪較重或再犯不悛亦照例折枷仍將家口各就土流所轄一併遷徙安挿不使混入腹地至苖人薙髮衣冠與民人無别者犯罪到官一望可知雖揑名苖籍實已改苖為民應悉照民人例治罪至是覆准雲南按察使良卿奏滇省土苖犯該軍流徒罪分别枷責遷徙之處即照黔省之例辦理互見徒流門申定朝鮮國民越界打貂分别首從治罪例先是朝鮮國王咨覆越江偷打貂皮之樸厚贊等十犯例應斬决刑部核議應如所請得㫖改為監候至是秋讞法司仍照所咨奏請即行正法復奉㫖令人緩决並諭向來此等罪犯曽邀格外從寛然中朝字小之恩不妨過厚而藩服越邊之例禁又豈可稍弛嗣後遇有似此罪犯應將首惡明正典刑其屬在脅從者仍令分别議緩庻情法皆無偏任此案不即照此處分者以未經申諭於前事同不教而殺所不忍為耳刑部可即行文該國王知之定奴及僱工人設計畧賣家長之妻及子女者擬斬監候略賣家長之期功以下親屬者擬絞監候更定論功免死條例刑部遵㫖議定凡滿洲蒙古漢軍緑營官員軍民人等有犯死罪者除十惡侵盗錢糧枉法婪贓强盗放火發塜詐偽故出入人罪謀故殺各重罪外其尋常鬬毆及非常赦所不原各項死罪察其祖父及子孫陣亡者准其在内由刑部在外由該督撫於取供定擬後即移咨八旗兵部查取確實事蹟隨本聲叙其已經優免一人一次者不准再行申請至舊例有强盗案内議及伯叔兄弟陣亡並自身負有重傷及軍前効力有據仍於本内叙明陣亡効力情由具題之處概行刪除定苖人圖財害命照强盗殺人例斬决梟示定指引逃匪偷越出口罪例如實係不知逃匪情由僅止私行引送者仍照違制律定擬外若明知逃犯故行引送照故縱律與犯人同罪至再犯三犯各按本罪以次逓加得財故縱者計贓從重論増定糧艘縴夫勒價攢毆例刑部議准漕運總督楊錫紱奏嗣後糧船僱覔短縴如有棍徒勒價聚衆攅毆滋事者請將為首及下手傷人之犯俱問發邊衛充軍餘俱杖一百枷兩月河干示衆三十年定私鑄銅鉛錢不及十千等犯改發黒龍江給披甲人為奴例詳見徒流門増定偷砍果松計株多寡分别杖笞例詳見徒流門増定侵盗倉庫錢糧入已例刑部議定凡侵盗錢糧入已數在百兩以下仍照本律科斷外其一百兩以上至三百三十兩即於徒罪上加一等杖一百流二千里三百三十一兩至六百六十兩加二等杖一百流二千五百里六百六十一兩至一千兩加三等杖一百流三千里一千兩以上仍照舊例斬監候申定毆打宗室覺羅人例奉諭毆打宗室覺羅人之例較毆打平人較重者原係優待宗室覺羅之意伊等當自知尊貴不與下賤之人毆打方為合理嗣後凡宗室覺羅若繫黄帯紅帯被毆者仍照舊例辦理其不繫𢃄被毆者毆打之人即照毆打平人例辦理増定常人竊盗倉庫錢糧例定例常人竊盗倉庫錢糧除罪犯擬絞入情實外餘皆計贓分别杖徒是時刑部以未經得財之從犯既减首犯一等杖九十徒二年半應將已經得財之從犯自一兩以下至八十兩改為准徒五年八十五兩至一百兩仍請照例分别擬流從之増定售賣毒藥致死人命雖不知情亦照不應重律治罪例増定派往各省駐防兵丁脱逃拏獲治罪例歩軍統領衙門奏派往各省駐防滿洲兵丁有臨行脱逃者亦有中途脱逃者向無作何治罪之條請將此等案犯即銷除旗籍責八十板帯鎻發往伊犁充當歩甲苦差如再不安分復行脱逃拏獲時即令該將軍奏明正法定奴婢毆死家長之期親及外祖父母擬斬立决例増定盛京旗下家奴莊頭人等盗賣田産例盗賣田産至五十畆者依子孫盗賣祖遺祀産例發邊逺充軍不及前數者照盗賣官田例治罪盗賣房屋亦照盗賣官宅律科斷謀買人與串通説合之中保均與盗賣之人同罪田産給還原主賣價入官定軍流官犯脱逃拏獲例凡職官負罪逃竄就獲除犯斬絞立决及斬絞監候改為立决外其犯該軍流以下者無論本罪重輕一經脱逃被獲即俱改擬絞監候秋審時將原犯情罪聲明具奏定婦女通姦致本夫父母羞忿自盡例姦婦比照姦夫自殺其夫姦婦擬絞律擬絞監候姦夫比照姦婦因姦情敗露愧廹自盡姦夫擬徒例杖一百徒三年若本夫縱妻通姦後因姦情敗露愧廹自盡者姦夫姦婦止科姦罪増定毆死父妾例廣西按察使袁守侗奏嫡子衆子毆死庻母律照凡人同科無所區别請量為加等治罪明立専條刑部議嗣後妻之子妾之子毆傷生有子女之庻母仍依律分别科斷外如毆至死者擬斬監候謀故殺死亦擬斬監候於秋審時酌量情罪分别定擬増定租賃船隻出洋為匪罪及船户例除犯徒罪以下船户不知情者仍照自造商船租與他人例杖一百枷三月犯流罪以上者船户雖不知情照夾帯違禁貨物接濟外洋原保結之人治罪例杖一百徒三年船入官失察官議處三十一年更定發遣伊犁烏嚕木齊人犯概行僉妻例詳見徒流門増定徒流人犯脱逃條例詳見徒流門増定監臨官吏舉放錢債罪例兩江總督髙晉條奏監臨御史於所部内舉放錢債典當財物者即非禁外多取餘利亦按其所得月息照將自己貨物散與部民多取價利計贓准不枉法論强者准枉法論不枉法各主者折半科罪律减一等問罪所得利銀照追入官至違禁取利以所得月息全數科算准不枉法論强者准枉法論並將所得利銀追出餘利給主其餘入官申定卑㓜毆傷緦麻尊屬保辜餘限内身死例果因本傷死者仍擬斬監候恭請定奪如䝉恩准减等比限外身死者酌加為邊逺充軍仍追埋𦵏銀兩給屍親收領嚴定伊犁駐防兵丁脱逃例定例派往伊犁等處换防種地兵丁遇有脱逃拏獲發原派地方枷號充當苦差再犯者即行正法至是奉㫖伊犁係新設駐防之處非内地可比法必從嚴而後衆知儆懼可免妄行逃避之事嗣後伊犁駐防兵丁内有逃避者拏獲即行正法嚴懲解役玩悞脱逃要犯直𨽻總督方觀承奏脱逃遣犯王士蘭限滿未獲解役楊富元請㫖正法上以向來各省逓解新疆要犯往徃視為具文致多沿途疎脱雖定例將悞玩之解役擬斬監候未經按法懲治此輩不知儆懼特㫖令其即行正法以為玩法悞公者戒増改卑㓜過失殺尊長罪例先曽將子孫過失殺祖父母者杖流改為立絞至是刑部議准按察使李永書條奏將奴僕過失殺家長絞監候改為擬絞立决并議改妻過失殺夫妾過失殺家長律亦如之増改强占良家妻女例凡强占良家妻女中途奪回及尚未姦汚者照已被姦占减一等定擬若已被姦汚而婦女自盡者照强姦已成本婦羞忿自盡例擬斬監候若未被姦汚而自盡者照强姦未成本婦自盡例擬絞監候皇朝文獻通考卷二百
