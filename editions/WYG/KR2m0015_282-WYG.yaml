body:
  text: 輿地考十四陜西省臣等謹按古雍州與冀接壤而禹貢叙之於九州之末説者以為其地勢最高故治水之功以是終焉自豳岐豐鎬遞作周畿所稱奥區神臯者於是乎在公羊傳始有陜東陜西之稱後漢書郡國志以陜陌為二伯所分即今河南之陜州是也兩晉之時陜東西各隨建都之地稱之西晉都洛陽則闗中曰陜西東晉都建康則稱荆州曰陜西自唐乾元時置陜西節度使指陜州以西而言宋初始置陜西路於是潼關以西全秦之地通謂之陜西矣夫陜省據形勢之險秦漢迄唐之故都皆在焉其東距崤函西連隴坻南控漢津而北則黄河迴繞右自延安府之定邊縣西北出塞左自榆林府之府谷縣東北入塞其間迤為河套環帯邊城實為四塞之國明代以套地為元裔所居時多邊警雖屢議恢復而卒鮮成功自入本朝以來鄂爾多斯諸部𨽻我版宇拱衛塞垣是以三輔提封鞏固此實國家撫裔寧邊懐柔無外之盛畧豈徒以百二山河表地形之勝而已哉明陜西等處承宣布政使司治西安府領府八直𨽻州一其西安鳯翔漢中延安四府興安一州為今陜西省地又置陜西都指揮使司領西安等衛及鳯翔等守衛千戸所本朝初因之設陜西巡撫及布政使司按察使司皆駐西安府設陜西總督駐固原州兼轄四川又别設延綏巡撫駐榆林衛順治十四年令總督罷轄四川専為陜西總督康熙元年裁延綏巡撫二年移右布政使司分治甘肅其左布政使司仍治西安領西安鳯翔漢中延安四府興安一州四年令總督兼轄山西為山陜甘總督駐西安府六年改左布政為西安布政使司後改為陜西布政使司十四年令總督罷轄山西改為陜甘總督十九年改為川陜甘總督兼轄四川二十二年移總督駐漢中府後仍還駐西安雍正三年升西安府之同華耀商乾邠六州延安府之鄜綏徳葭三州俱為直𨽻州九年令總督専轄陜甘又改榆林衛為府十三年令總督仍兼轄四川又升直𨽻同州為府降直𨽻華州屬同州府降直𨽻耀州還屬西安府乾隆元年降直𨽻葭州屬榆林府十四年令總督仍専轄陜甘二十四年令兼轄陜西四川二省於甘肅専設總督尋仍定為陜甘總督二十九年定總督移駐甘肅蘭州府兼轄陜西四十八年升直𨽻興安州為興安府凡領府七直𨽻州五各衛所俱以次裁併入州縣東西距九百三十五里南北距二千四百二十六里東至河南陜州閿鄉縣界三百五里西至甘肅秦州清水縣界六百三十里南至四川達州太平縣界一千三十里北至榆林府邊牆一千三百九十六里東南至河南南陽府浙川縣界六百二十里西南至四川保寧府廣元縣界一千三百八十五里東北至山西保徳州河曲縣界一千八百六十里西北至甘肅慶陽府真寧縣界三百二十里在京師西南二千六百五十里西安府為省治東西距三百五里南北距七百十里東至同州府華州界一百六十里西至乾州武功縣界一百四十五里南至興安州石泉縣界四百三十里北至鄜州宜君縣界二百八十里東南至商州界二百里西南至漢中府洋縣界三百六十里東北至同州府蒲城縣界二百十里西北至乾州永夀縣界二百里自府治至京師二千六百五十里明為西安府共領州六縣三十一本朝初因之雍正三年升同華耀商乾邠六州並為直𨽻州以朝邑等十七縣分屬六州十三年又以耀州及同官縣還凡領州一縣十五長安縣附郭治府西境咸寜縣附郭治府東境咸陽縣在府西少北五十里興平縣在府西一百里臨潼縣在府少北六十里高陵縣在府東北七十里鄠縣在府西南七十里藍田縣在府東南九十里涇陽縣在府西北七十里三原縣在府北九十里盩厔縣在府西南一百六十里渭南縣在府東少北一百四十里富平縣在府東北一百二十里醴泉縣在府西北一百二十里耀州在府東一百三十里屬西安府雍正三年升為直𨽻州十三年還屬府同官縣在府北一百八十里初屬西安府雍正三年分屬耀州十三年還屬府同州府在省治東北二百四十里東西距一百七十八里南北距三百五十五里東至山西蒲州府永濟縣黄河界五十八里西至西安府富平縣界一百二十里南至商州雒南縣界一百七十五里北至鄜州雒川縣界一百八十里東南至雒南縣界一百二十里西南至西安府渭南縣界五十里東北至山西綘州河津縣黄河界二百六十里西北至雒川縣界一百九十里自府治至京師二千一百三十里明同州屬西安府本朝初因之雍正三年升為直𨽻州以朝邑郃陽澄城韓城四縣來屬十三年復升為府増置大荔縣以華州及華隂蒲城潼闗三縣并耀州之白水縣來屬乾隆十二年裁潼關縣以同知分治為潼闗㕔共領州一縣八㕔一大荔縣附郭金以前為馮翊縣地元省入州縣本朝雍正十三年升州為府以州地置為府治朝邑縣在府東三十里初屬西安府雍正正三年分屬同州十三年屬府郃陽縣在府東北一百十里初屬西安府雍正三年分屬同州十三年屬府澄城縣在府北一百里初屬西安府雍正三年分屬同州十三年屬府韓城縣在府東北二百二十里初屬西安府雍正三年分屬同州十三年屬府白水縣在府西北一百三十里初屬西安府雍正三年分屬耀州十三年改屬同州府華縣在府南一百八十里初屬西安府雍正三年升為直𨽻州十三年改屬同州府華隂縣在府南一百六十里初屬西安府雍正三年分屬華州十三年改屬同州府蒲城縣在府西八十里初屬西安府雍正三年分屬蒲州十三年改屬同州府潼闗㕔在府東南九十里明洪武九年置潼闗衛本朝初屬西安府雍正四年改置潼闗縣屬華州十三年改屬同州府乾隆十二年裁潼闗縣移同知駐此分理民事臣等謹按古雍梁二州皆以華山分界華隂為雍華陽為梁華東則為豫故周禮職方氏