body:
  text: 欽定四庫全書皇朝文獻通考卷四十一國用考三會計崇徳三年都察院承政祖可法等言户部掌司錢榖職任匪輕應立舊管新收開除實在文簿年終令公明官稽察從之順治元年順天巡撫桞寅東言觧京錢粮頭緒紛雜擾累滋多有一縣正額三十餘兩而起觧分四十餘項者有一項錢粮止一兩六七錢而觧費至二三十兩者請總計各欵四季觧府彚觧户部俾免賠累下所司議行三年定賦役全書詳見田賦考七年以兵餉缺額户部㑹議條上裁官汰兵各事宜得㫖巡按御史已差未行已行未到者俱不必前去裁併監司等官歸併江南學差酌汰無用兵丁皆依議行内庫錢糧工部織造各處抽分江南蘆課及各衙門錢粮額數不多者併已裁衙門錢糧俱歸併户部管理禮部工部太常寺光禄寺太僕寺國子監等衙門原管錢糧俱著照舊管理自順治五年十二月以前仍著户部察核完欠明白奏銷六年正月起一年之内著該管衙門照依原冊㑹同户部將直𨽻各省府州縣衛所等衙門完欠數目詳細對察已經完觧者著各衙門行催速觧奏請支用七年正月以後户部各衙門各照職掌管理一應催觧嵗參考成奏銷事宜悉依舊例舉行從前錢糧欵項如有遺漏未經報明者姑免追究自今以後必湏徹底清察各歸欵項倘或隐匿欺朦被人告發審究得實必殺不赦仍行籍沒人口入官家産充告發之賞各處闗税以前缺額者因地方多事曽經奏明俱免追賠各官俱免補考以後不必定額恐有餘者自潤不足者横徴俟回部之日酌量商賈通塞徴觧多寡有無擾害地方嚴加考核鹽課内水鄉等項應觧者户部作速催觧十年户部議裁折各錢糧欵目以充國用一山東登萊巡撫宜裁一宣府巡撫宜裁以總督兼理一江寜杭州西安漢中駐防滿洲漢軍兵丁除草料口糧照例支給外每年多支米石應裁一各直省應觧本色顔料藥材等項除京師無從備辦者仍觧本色外餘俱應折銀一工部錢糧除𦂳急營建外其餘不急工程及脩理寺廟等項俱應停罷一户禮工部製造等庫内監三百九十餘名應留數員餘盡裁革一在外當鋪每年定税銀五錢其在京當鋪及各鋪宜仍令順天府查照鋪靣酌量徴收一總督巡撫家人口糧應裁一州縣脩理察院鋪陳家伙等項銀兩應裁一各州縣脩宅家伙銀兩應裁一州縣備各上司朔望行香紙燭銀兩應裁一在外各衙門書吏人役每月給工食銀五錢應裁俱從之十年江南江西湖廣蘆課錢糧歸地方官管理先是每年差部員監督至是撤回十一年撤各省司餉部員十四年設巡視官察覈光禄寺錢糧并飭户工兩部於嵗終㑹計勿使入不敷出是年户部奉上諭朕惟帝王臨御天下必以國計民生為首務故禹貢則壤定賦周官體國經野法至備也朕荷上天付托之重為民生主凡朕服御膳羞深自約損然而上帝宗廟百神之祀軍旅燕饗犒錫之繁以及百官庻役餼廪之給㒺不取之民間誠恐有司額外加派豪蠧侵漁中飽茲特命爾部右侍郎王宏祚將各直省每年額定徴收起存總撤實數編列成帙詳稽往牘㕘酌時宜凡有㕘差遺漏悉行駁正錢糧則例俱照明萬厯年間其天啟崇禎時加増盡行蠲免地丁則開原額若干除荒若干原額以明萬厯年刋書為凖除荒以覆奉諭㫖為憑地丁清核次開實徴又次開起存起運者部寺倉口種種分晰存留者欵項細數事事條明至若九釐銀舊書未載者今増之宗禄銀昔為存留者今為起運漕白二糧確依舊額運丁行月必令均平胖襖盔甲昔觧本色今俱改折南粮本折昔留南用今抵軍需官員經費定有新規㑹議裁冗改歸正項本色絹布顔料銀硃銅錫茶蠟等項已改折者照督撫題定價值開列觧本色者照刋定價值造入每年督撫再行確查時值題明填入易知单内照數辦觧再有昔未觧而今宜増者昔太冗而今宜裁者俱細加清核條貫井然後有續増地畝錢糧督撫按例彚題造冊報部以憑稽核綱舉目張彚成一編名曰賦役全書頒布天下庻使小民遵茲令式便於輸將官吏奉此章程㒺敢苛歛為一代之良法垂萬世之成規其敬承之毋忽互見經籍考十八年命禮科稽察光禄寺錢粮康熙二年工科給事中呉國龍䟽言直𨽻各省觧京各項錢糧自順治元年起總歸户部至七年復令各部寺分管催收以致欵項繁多易滋奸弊請自康熙三年為始一應襍項俱稱地丁錢糧作十分考成除每年扣撥兵餉外其餘通觧户部每省各造簡明賦役冊送部查核其易知由单頒給民間者盡除别項名色至各部寺衙門應用錢糧年前具題數目次年於户部支給仍於年終核報下部議行十七年户部遵㫖㑹議各省動用錢糧司道等官湏先申詳督撫豫行題明如不申詳題明竟入奏冊請銷者不准銷司道等官革職追賠督撫降四級調用如申詳而督撫不題明擅令動用者司道等官免議督撫照司道例處分惟正在用兵刻不可緩之時一靣申請具題一靣動用若不具題咨報擅自動用督撫司道各降五級調用所用錢糧令其賠補若司道等官並未申詳而督撫徑為請銷者督撫降二級留任司道等官降五級調用其各省供應大兵俸餉米豆承放官重支不行扣抵承放官降三級調用其失察之司道等官降三級留任督撫降一級留任其重領官匿不自首者革職重領銀米賠還其失察之㕘領夸蘭大將軍俟回兵之日従重議處緑旗官員亦照此例至各省供應大兵米豆草束價值浮冐開銷等弊經督撫查㕘照貪官例革職提問如已銷結别經發覺者督撫一併照貪官例治罪従之二十三年以各省督撫侵欺庫帑户部無憑察核諭大學士九卿詳定條例以聞尋定議一奏銷錢糧應將存留起運逐項分晰并報部年月明白造冊毋致朦混駁查如有駁回者將該督撫照朦混例處分户部官不行詳查亦交吏部議處支給各省駐防及緑旗各官兵米豆草束除應折色地方不議外如應支本色儘本省所收支給如有不敷照時價給發如將價值浮折具題者該管官及督撫照例處分一各省採買米豆各項従前有價值浮多者有支領並無實據者令該督撫清查定限一年追完如不完承催官及督催之督撫俱照不力例處分一兵馬錢糧數目有舛錯者應令各省將軍督撫提鎮將各弁印領結狀按季送部核對如有不符照朦混例處分一直𨽻各省奏銷錢糧凡有駁查者俱令具題完結不得以咨文塞責議入得㫖本内第一欵奏銷駁察事情著照現行例餘依議二十四年迋臣言賦役頭緒繁多易於溷淆故令脩簡明賦役全書止載起運存留漕項河工等切要欵目刪去絲秒以下尾數以杜吏胥飛灑苛駁之弊及書成以舊賦役全書遵行年久新書停止頒發至雍正十二年重脩則凡額徴地丁錢糧商牙課税内應支官役俸工驛站料價及應觧本折絹布顔料銀硃銅錫茶蠟等欵各分晰原額新増開除實在並司府縣衛所總散數目悉以雍正十二年為凖詳細考核纂輯成書又恐越數年後仍有不符定例每十年脩輯一次三十九年諭工部情弊甚多後凡有脩理之處將司官筆帖式俱奏請派出每月支用錢糧分晰細數造冊具奏若三年内有坍塌者著賠脩四十五年諭著户工二部將不啟奏用咨文動支大小欵項錢糧於月終彚奏四十八年諭工部光禄寺每年所用銀兩奏請豫為儲備赴户部支領用完復奏一年之中光禄寺用二十餘萬兩工部用四五十萬兩至百萬兩不等俱造黄冊奏閲所用數目雖較前略省而動工之處奉委官員於未估計之先即已領銀備用以致浮支肥己之弊不絶嗣後工部光禄寺十五日一次將所委官姓名及支給銀數具摺奏聞又凡督工人員於工竣銷算延挨時日至十年銷算者有之至二十年銷算者有之凡工作物料俱登冊籍何故稽延若此此不過欲従中作弊耳嗣後銷算如有踰年者立即奏聞罷斥五十三年陕西道御史周祚顯言凡觧錢糧物料到部批文呈堂驗明示期兑收不得延踰五日届期滿漢堂官親臨收兑交典庫官即發回批如有留難包攬勒索等弊即指名題㕘下部議行五十九年聖祖仁皇帝以直𨽻各省錢糧虧空甚多欲立法清理諭户部行文各督撫確議具奏至是户部據各督撫覆䟽詳定條例一州縣官徴收錢糧務令随時随觧如遲延不觧即令該督撫題報㕘處如州縣批觧錢糧而布政司抵充襍派扣批不發許州縣官申報督撫并報部院衙門題㕘一令該督撫確查虧空情由或因知府扶同狥隐以致虧空者即行㕘革令知府獨賠一州縣官有揑報虧空審明定擬即於本犯名下獨追還項一虧空錢糧果係因公那用者將該員革職留任勒限賠補限内全完准其開復至霉爛倉榖現在㕘追者著於一年限内如數完補亦准開復一州縣虧空錢糧如有知府掲報而布政司不即掲報或已掲而督撫不即題㕘者應令該知府申報部院將布政司督撫等官照狥庇例議處仍令分賠一衛所官員虧空屯衛等項錢粮亦照地丁之例處分著為定例以上徴觧追賠各條既經各督撫定擬具題即應責成督撫如虧空未發之先伊等不盡心防範已發之後又不竭力補苴應將該督撫嚴加議處責令分賠從之六十一年申諭各省督撫清釐虧空是年世宗憲皇帝御極諭户部自古惟正之供所以儲軍國之需當治平無事之日必使倉庫充足斯可有偹無患皇考躬行莭儉裕國愛民六十餘年以来蠲租賜復殆無虚日休養生息之恩至矣而近日道府州縣虧空錢糧者正復不少揆厥所由或係上司勒索或係自己侵漁豈皆因公那用皇考好生如天不忍即正典刑故伊等每恃寛容毫無畏懼恣意虧空動輙盈千累萬督撫明知其弊曲相容隠及至萬難掩飾之時又往往改侵欺為那移勒限追補視為故事而全完者絶少遷延數載但存追比虛名究竟全無著落新任之人上司逼受前任交盤彼既畏大吏之勢雖有虧空不得不受又因以啟效尤之心又借此挟制上司不得不為之隐諱任意侵蝕展轉相因虧空愈甚庫藏全虛一旦地方或有急需不能支應闗係匪淺朕深悉此弊本應即行徹底清查重加懲治但念已成積習姑従寛典除陕西省外限以三年各督撫將所屬錢糧嚴行稽查凡有虧空無論已經㕘出及未經㕘出者三年之内務期如數補足毋得苛派民間毋得借端遮􅎖如限滿不完定行從重治罪三年補完之後若再有虧空者决不寛貸其虧空之項除被上司勒索及因公那移者分别處分外其實在侵欺入己者確審具奏即行正法倘仍狥私容隐或經朕訪聞得實或被科道紏㕘將督撫一併従重治罪即如山東藩庫虧空至數十萬雖以俸工補足為名實不能不取之民間額外加派山東如此他省可知以小民之膏血為官府之補苴地方得不重困乎既虧國帑復累民生大負皇考愛養元元之至意此朕所斷斷不能姑容者前日恩詔中内閣引例開列有豁免虧空一條朕未曽允行誠恐開貪吏儌倖之端而於民間究無禆益也至於署印之官更為𦂳要必湏慎重簡擇諺云署印如行刦皇考每言及此未嘗不痛恨之葢署印之人始而百計鑚營既而視如𫝊舎故肆意貪婪圖飽慾壑或取媚上官供其索取貽害小民尤非淺鮮其餘前任虧空視作泛常接受交盤復轉授新任苟且因循虧空之弊終不得清嗣後如察出此等情弊必將委署之上司與署印之員一併嚴加治罪决不寛貸雍正元年諭各省奏銷除地方正項錢粮及軍需之外其餘一應奏銷積弊甚大若無部費雖當用之項冊檔分明亦以本内數字互異或因銀數㡬兩不符往來駁詰不准奏銷一有部費即縻費錢糧百萬亦准奏銷或將無闗𦂳要之處駁回以存駁詰之名掩餙耳目咨覆到日旋即議准内外通同欺盗虛冐此等情弊盡在皇考睿照之中聖恩寛大未行深究朕今不得不加整理嗣後一應錢糧奏銷事務無論何部俱著怡親王隆科多大學士白潢左都御史朱軾㑹同辦理二年總理事務王大臣九卿科道等議覆山西布政使髙成齡條奏提觧火耗一䟽得㫖高成齡提觧火耗一事前朕曽降諭㫖令爾等平心静氣秉公㑹議今觀爾等所議見識淺小與朕意未合州縣火耗原非應有之項因通省公費及各官養亷有不得不取給於此者朕非不願天下州縣絲毫不取於民而其勢有所不能且厯来火耗皆州縣經收而加派横徴侵蝕國帑虧空之數不下數百餘萬原其所由州縣徴收火耗分送上司各上司日用之資皆取給於州縣以致耗羡之外種種饋送名色繁多故州縣有所藉口而肆其貪婪上司有所瞻狥而曲為容隐此従來之積弊所當剔除者也與其州縣存火耗以養上司何如上司撥火耗以養州縣乎爾等奏稱各屬火耗請將分數酌定朕思一省之内州縣有大小錢糧有多寡地廣糧多之州縣火耗已足養㢘若行之地小糧少之州縣則不能矣惟火耗不定分數倘地方遇差多事繁之時則酌計可以濟用或是年差少事簡則耗羡即可量减矣又或偶遇不肖有司一時加増而遇清㢘自好者自可减除矣若酌定分數則將來竟為成額必致有増無減此火耗分數之不可以酌定者也又奏稱提觧火耗將州縣應得之項聽其如數扣存不必觧而復撥等語現今州縣徴收錢糧皆百姓自封投櫃其拆封起觧時同城官公同騐看耗羡與正項同觧分毫不能入己州縣皆知重耗無益於己孰肯額外加徴乎是提觧火耗既給上下養㢘之資而且留補虧空有益於國計若將州縣應得之数扣存於下勢必額外加増私行巧取浮於應得之數累及小民况觧交督撫則顯然有據扣存州縣則難保貪㢘此州縣羡餘之不可扣存者也又奏稱巡撫諾岷清勤敏幹布政使髙成齡操守亦優應令二人盡心商確先於山西一省照所奏試行之此言尤非也天下事惟有可行與不可行兩端耳如以為可行則可通行於天下如以為不可行則亦不當試之於山西譬如治病漫以醫藥試之鮮有能愈者今以山西為試行之省朕不忍也且天下撫藩豈盡不如諾岷髙成齡而謂二人獨能行之乎又奏稱提觧火耗非經常可久之道凡立法行政孰可歴久無弊従來有治人無治法文武之政布在方䇿其人存則其政舉朕謂有治人即有治法法有因時制宜者譬如人有疾病因症投藥病愈即止今提觧火耗原一時權宜之計將來虧空清楚府庫充裕有司皆知自好則提觧自不必行火耗亦可漸減今爾等所議為國計乎為民生乎不過為州縣起見獨不思州縣有州縣之苦上司亦有上司之苦持論必當公平不可偏向又朝廷之與百姓原屬一體朝迋經費充足民間偶遇歉收可以施恩賑卹百姓自無不足之虞是清補虧空於國計民生均有益也天下督撫等有如諾岷等不避嫌怨實心任事自能酌量行之通省耗餘絲毫不能隐匿又孰敢此外多取一錢以干罪戾乎朕於臣下期望甚殷即州縣官員亦冀其為臯䕫稷契自此各加勉勵勿侵蝕國帑勿貪剥小民各省火耗漸自輕減以至於盡革此朕之願也爾等所奏與朕不合若令再議必遵朕諭議覆准行朕亦不能保其將來無弊否也各省能行者聽其舉行不行者亦不必勉强可將此諭並爾等所議之本交存内閣是年禁生監抗欠錢糧三年諭向來各部院動用錢糧俱係各衙門自行奏銷往徃無從稽考朕辦理之初不得不加意經理是以設立㑹考府以司察核自雍正元年以來迄今將及三載辦過各部院奏銷錢糧事共五百五十件内駁回應改正者共九十六件似此則部院事件之不能無誤而㑹考府之有益於察核可知矣但恐設立日久多一衙門即多一事端嗣後著將㑹考府停止凡爾部堂司官各宜秉公抒誠以盡職業勿謂無人稽查遂爾草率朦混自干罪戾六年諭蘇州巡撫所屬七府五州自康熙五十一年起至雍正四年未完地丁錢糧積至八百一十三萬八千餘兩其中蘇松常三府太倉一州積欠最多自一百四十餘萬至一百八十餘萬兩不等此項未完大約官虧空十之一二吏侵蝕者十之三四其實係民欠不過四五而已在貧窶之民固不能為無米之炊而官吏因縁作弊蠧國害民情罪可惡豈容聴其脱然倖免若非徹底清釐即欲加恵於百姓其道無由今尹繼善現在清查但茲事繁重非一人之心力所能辦理著將蘇州等七府太倉等五府厯年帶徴地丁錢糧一概暫停徴比俟朕派員前往與該地方官協理清查將各州縣官虧空若干吏蝕若干實在民欠若干一一釐剔清楚朕當再降諭㫖八年諭著將辛亥年春撥觧部銀兩照従前餘平之數減去一半此項銀兩留為本省地方公事之用雍正十三年皇上御極諭各直省督撫向來徴收錢粮因銀色有傾銷之耗折觧送有路途之盤費故於正項之外徴收耗羡原無定額其㢘潔者尚知自愛不肖者任意徴求而督撫以至道府等員於中收受節禮陋規互相容隐弊難究詰嗣經巡撫諾岷田文鏡倡為提觧歸公之法各該督撫就本省情形酌定分數徴收以為各官養㢘及地方公事之用除所定分數外絲毫不許濫徴葢以耗羡原屬額外之項與其聽地方官私行徴取不如明定分數使有節制不敢違越也然在未提觧以前尚為私項既提觧以後或恐不肖官員視同正課又得於耗羡之外巧取殃民從前皇考洞見流弊屢降諭㫖欲俟將來虧空全清府庫充裕之日漸減漸革聖心厪念未或忘之朕紹承大統切念民依孜孜軫恤日與王大臣等悉心籌畫期使我民於正項之外絲毫無擾而一時勢有不能尚湏從容計議惟是提觧耗羡之法行之已十有餘年恐日久弊生奸吏夤縁朘削耗外加耗重困閭閻不可不為深慮著各該督撫嚴飭有司咸體朕意知耗羡一項可減而决不可増可於格外從寛而斷不可於額外勒索倘於所定分數之外或又借估色添戥為名多取絲毫者該督撫即行題㕘重治其罪倘督撫狥隐不舉或經科道糾㕘定將該督撫等一併嚴加議處再各省耗羡分數率在加一上下然江南賦重之區如蘇松常鎮四府額賦較之他省㡬及數倍雍正六年以前每兩加耗僅止五分雍正六年以後增至加一且有司又復巧取苛索民何以堪其令江南督撫詳加酌定量減分數徴收不得仍前重耗困民倘敢陽奉隂違朕必於該督撫是問乾隆三年諭令各省京餉停觧平餘全數存貯本省司庫遇有公事奏請動用是年停罷懐來等縣捐辦楊木長柴所用價值入地丁册報銷四年従孫嘉淦請免直𨽻耗羨復經陳世倌請將江蘇安徽二省所蠲正賦之耗羨一體免征動撥河南耗費内餘銀十萬兩協濟直𨽻公用若江南蠲免耗銀之後官員等養㢘不足亦將河南多餘之銀通融撥補又奉諭㫖據工部奏稱直𨽻山東甘肅等省開報城磚石灰等項價值較原定之價或少一倍或少數倍前後多寡甚覺懸殊請將原定價直浮多欵項行文各省督撫確查本處實價一一更正凡類此等欵項一併查改報部朕思今日開銷之價值既大減於前則從前所報之價顯係浮開工部何以不行指㕘而但請行查各省照實價改正夫前此所開之價既不足憑則此畨改正之價又詎可以為據乎假有狡猾之人避重就輕以開價少者為錯誤以開價多者為實數該部又何以辨其虛實耶總之百物價直原屬隨時增減各省不同即一省之中各郡縣亦不畫一令預定數目永逺一例遵行則價賤之年必有餘貲以飽官吏之私槖弊在侵漁錢糧為害尚小若價貴之年採辦不敷勢必科派閭闔弊在苦累百姓為害甚大惟在各省督撫留心訪查詳確綜覈既不使恣意浮冐虛縻國帑又不至苛刻從事貽累官民庶為公平之道又豈預立成式所能杜絶弊端乎其應如何酌量定例之處著大學士九卿㑹議具奏是年從西寧鎮總兵李如栢奏稱西寧鎮自雍正十三年始至乾隆四年共應存缺曠銀三萬一千五百六十餘兩葢自辦理軍需以來欵項紛煩不能按年銷算是以存貯如許之多營中兵弁因而那移動用錢糧率多不清應將缺曠一項不必待至銷算時即為解繳司庫得㫖令各提鎮一體查辦以清夙弊五年諭曰國家一應賦税無論正雜羨餘凡徴之官府者均係出之閭閻而究其實乃以天下之物力供天下官弁兵民之用為上者不過為之權衡調劑於其間若經理其事者稍有纎毫假借則大不可也前此各省臣工不能砥礪㢘隅取之民者既極煩苛而侵於官者又多虧空計其贜私動逾累萬以致身罹法網貽害妻孥仰䝉皇考世宗憲皇帝聖慈矜憫提撕警覺釐剔肅清所有一切陋規悉行裁禁以紓民困俯允直省督撫所請將舊有耗羡一項酌定額數用資各官薪水及地方辦公之需名雖提觧耗銀而較之従前私派私收固已輕減數倍矣自奉行之後官員無拮据之憂百姓免需索之累吏治民生稱為兩便此實中外所共知共見者朕御極之初曽降諭㫖飭令督撫毋得重耗浮徴致困閭里凡賦多税重之地屢加寛免民捐官墊之欵悉動存公乾隆三年又將觧部减半平餘一項扣存司庫以備荒歉應用葢因各省公用甚煩而耗羡無㡬唯恐所入不敷所出是以不惜部庫之嬴餘留備地方之不足各省督撫藩司皆當加意慎重不時查核减官吏一分之浮費即留百姓一分之實恵此理顯然可見乃比年以來或無闗𦂳要之事遽行動用即例應支給之項亦有浮開部駁核減時見章䟽其扣存備賑平餘銀兩各省有已經報部者亦有未經報部者遇有應辦賑務仍多臨時請撥由此類推則司庫所存公項未必盡歸實用雍正十三年六月内曽奉皇考諭㫖將各省耗羡存公銀兩敕令清查原屬防㣲杜漸之至意朕嗣位之初念耗羡不同正項従前原未定有章程且厯年已久各省規條不一官員更换亦多况復恩詔屢頒縦有那欠亦當在寛免之列是以諭令暫行停止清查今看各省情形漸滋冐濫若不早加整頓立法防閑必至那移出納弊竇叢生一經敗露國法難寛揆之朕愛養教誨之心固有所不忍即經辦各員噬臍知悔已屬難追是及今綜核清理亦預為保全之道也户部可行文各省督撫將地方必需公費分晰欵項立定章程報部核明彚奏存案嗣後務將一年之内額徴公費完欠雜支同餘剰未給各數目逐一歸欵各官養㢘照依正署起支月日應得分數并扣除空缺詳悉登記其收數内有拖欠未完者分别應否著追其支數内有透動加増者分别是否應給有無那移虧缺之處俱於嵗底將一切動存完欠確數及扣貯減半平餘銀兩造冊咨送户部核銷如此年清年欵則民力輸將均歸地方實用而經理之員亦免罹於㕘處矣八年諭各省定例督撫盤司庫司庫盤道庫道府盤州縣庫所以杜虧空防那移也従前各省上司或借端需索貽屬員之累或虛應故事無查察之實且或肆筵設席以相娯樂納賄受禮以相交納種種弊端甚非立法之意二十餘年以來諸弊皆已肅清矣但奉行日久上下司賢愚不一雖顯然復蹈前轍者尚無所見聞而或漸露端倪故相容隐則亦未可定此各省督撫所當留心者司道之庫原不過照例盤查至道府之於州縣一年亦止可盤查一次不得屢行滋擾而盤查之時必湏詳核不得徒存其名並當各嚴其守不獨己之一身不可絲毫沾染即家人吏役亦不可稍有縦容如有犯此等弊習者該督撫即行㕘處庻盤查皆有實際常行不致滋擾若督撫漠不闗心倘别經發覺朕惟督撫是問是年從江蘇巡撫陳大受請將兩淮歸公鹽規銀六萬五千四百五十兩全數撥觧藩庫歸併耗羡存公統用報銷十二年諭向來州縣虧空倉庫定例綦嚴雍正年間復有分賠著賠之例所以懲戒通同掩餙朦混狥庇之該管各上司令其實力稽察使屬員不致侵蝕此正所以為保全之善術朕觀近年來虧空漸熾如奉天府尹霍備任内則有榮大成等五案山西則有劉廷詔之案朕是以照例令該管上司分賠而揆厥由來實縁該管上司見朕辦理諸事往往從寛遂一以廢弛為得體獨不思州縣定有養㢘用度儘已寛裕何至侵那虧空今民間絲粟固不容妄取乃於帑項正供恣其婪蝕有是理乎且倉庫所入出自窮簷小民力作以奉公貪員安享以自利以赤子之脂膏飽僉壬之嚢槖其情理深為可惡而為之長者一切置之不問迨至彌補無術則以掲㕘了事異日無可著追又為照例請豁是使貪員得計於目前國帑空虛於事後而於其間上下相䝉彌縫巧餙實乃苟且因循廢法欺公之惡習益致㕘案纍纍成何政體在朕力崇寛大黈纊凝旒㒺兼庻慎而諸臣秉節奉公整綱肅紀當查者查當㕘者㕘不事姑容不為蒙蔽乃所為主職要臣職詳合於寛而有制之正道一味縱弛其將何所底止豈諸臣公爾㤀私之意也可𫝊諭各督撫共體此意痛除積習時時加意稽查據實辦理如仍寛縦致貪風日熾帑項侵虧惟督撫上司是問又諭曰州縣官侵蝕倉庫非因公那用可比此等貪劣之員多有身故事發以後不過於家屬名下勒限著追遷延一二年率以家産全無保題豁免且並有父沒而子乗機盗帑歸罪於父已仍得坐擁厚貲者故無以儆貪風夫父子一身也子代父罪亦理之宜嗣後侵貪之案如該員身故審明實係侵盗庫帑者即將伊子監追著為例十三年諭朕前降㫖各省常平貯谷之數悉照康熙雍正年間舊額令大學士等㑹同該部查明妥議但各省奏報常平倉存糶等項米榖其乾隆十三年實數尚未報部若僅據従前所報部冊查核則十三年又有動用之項統不足憑可即𫝊諭各督撫等將康熙雍正年間額數若干及該省現年實存若干糶借若干現存糶價若干查明確數逐一分晰即繕摺具奏俟奏到時交大學士等據所報存糶實在數目㑹同該部妥酌定議該督撫等務湏確查速奏毋得遲延並不得稍有舛錯十六年諭山東山西各撥厯年積餘耗羡銀十萬兩河南五萬兩觧交直𨽻脩理城工十八年以江南河工費繁酌於浙省藩庫撥銀一百萬兩觧交備用又諭劉統勲奏到查出河南河員積年虧空未完工料銀兩數盈鉅萬已降㫖將髙斌張師載革職留工効力贖罪虧帑之員革職拿問勒限一年如限滿不完即行正法今又續據查出核減未完辦料未交各㕔員多至十餘萬此皆髙斌張師載積年狥縱不行實力清查所致由此觀之各省督撫之狥縱屬員者當不乏人其謂功令森嚴並無虧空者尚可信耶論髙斌張師載之罪即拿問重治其罪亦所應得但高斌尚屬舊人其在河工久經出力張師載恂謹自守素無劣蹟且係随從髙斌是以姑從寛典其應賠之項必不再寛至各省督撫若效尤試法朕不得不盡法䋲之勿謂教之不豫處之不公也其查出虧帑河員例應於任所原籍抄查貲産朕見邇来人心日壊平昔糜帑縱欲自知無所逃罪輙先期密為運寄嘗見虧帑纍纍貲財無㡬上司因巧為開脫甚或所虧雖自無多而因力難彌補知必敗露遂肆意侵欺别為寄頓者此固由心習澆漓而實上司之狥縱有以啟之是以此畨概不必抄查貲産惟以奉㫖之日為始勒限一年全完者據實請㫖限内未能全完者該督撫於限將滿之前請㫖即於該處正法􅃜帑著落上司分賠此項續添各員著即拿問遵照此㫖辦理朕於此案實為寒心不惜三令五申各督撫其咸知所儆十九年諭安省生俊捐監在部報捐折色外有願交本色者准其在本地收捐以實倉儲仍著該撫於嵗底將各屬共收若干之處彚數奏聞又諭外省動用錢粮及工程報銷應駁應准俱有定例乃督撫往往於部駁後展轉行查不即尅期辦給或據屬員詳禀叠次聲覆請銷而該部乃復往返駁詰以致塵案累積迨厯年久逺官吏迭更徒滋拖累此向來相沿陋習殊非敬事勤政之道現據劉統勲䇿楞查奏江南興脩水利以來有厯十餘年至二十餘年未結之案自雍正四五年間塵案尚有懸擱者此等案件如果有浮混自當據實查明催追完欵何至任意遲延厯久不結如果無情弊亦當請豁免累嗣後報銷之案符例者該部不得漫行駁詰例應駁查者至三次後該部即具摺聲奏或按例核減飭交該督撫查明經手官員照數追賠完案或核情酌予豁銷務令尅期速結仍著於每嵗底將未完各案彚摺奏聞其現有從前未結各案著予限一年令户工二部通行查明分别辦理完結又諭盛京户部銀兩自足賞賜之用不必隨帶於途但今嵗有新歸附之人著於部庫内撥銀十萬兩先期送往熱河交貯兵備道庫以備賞賜又諭甘肅係事簡省分何以未完至二十八案之多著户工二部逐細查明辦理應叅奏者即行㕘奏從前屢經降㫖務清積案其各省有似此者俱著該部嚴催速結毋得仍前延緩又諭藩司為錢粮總滙庫貯銀兩向成弊藪厯經釐剔仍未肅清即如川省撥觧陕甘軍需銀兩乃係經徴正項而鄂昌黄迋桂奏稱觧到軍需青潮不足者十分之三以撥兵餉雖屬不可若以採買軍需各物及運脚等項尚屬無碍已諭司照數兑收通融搭用等語協餉撥従隣省青潮不足應責該省撫藩賠補足額何可委婉通融在鄂昌苐藉以市恩而不知狥私舞弊已無所辭咎且青潮銀色既不可支給兵餉又以為採買運脚豈不重累商民殊不知朕之恐累吾民之念尤切也且藩庫之項觧自州縣州縣之欵徴自閭閻徴收兌觧稍有不足豈肯絲毫遷就以自貽厥累青潮之色何自而來此必有巧為舞弊者况潮色不已必至短平弊竇日滋何所底止即此而觀外省庫項殊不可信向來伊等畏觧部而利於協撥隣省正恃有彼此通融之説而經生迂論至謂庫項當存留各省不當多入太府此非獨不通世務乃典守者流言惑聽便於蠧蝕營私耳甘省此案已交劉統勲確查辦理其各省藩庫銀兩亦當徹底清查著各該督撫秉公盤騐如平色虧缺即著按數賠補仍將有無情弊具奏嗣後再有青潮不足等弊一經發覺唯督撫是問户部議江蘇巡撫莊有恭奏乾隆十六年聖駕南巡報銷錢糧應照例核減奏諭㫖該部此案自係照例議駁但十六年初次南巡該省辦理一切俱未定有章程往返駁查徒滋案牘著准其開銷又諭滇省地處邊檄備公銀兩務宜寛裕著將此項銅息銀兩以五十萬兩撥充兵餉其餘俱留充該省公用三十一年諭朕明春巡幸江浙所有供宿頓次皆出自帑項絲毫不以累民苐扈從官兵以及外省接駕人等輻輳雲集經過地方米價市值恐或一時騰踴著將該二省應運本年漕糧各截留五萬石減價平糶以裕民間食用尋令江省再截留五萬石南巡盛典俱照例於江浙二省冬兑漕糧内各截留十萬石在水陸駐蹕地方平糶二十二年諭甘省現在辦理軍需庫貯宜裕著該部於應撥省分酌撥銀二百萬兩觧往甘肅以備軍需之用又從陜西巡撫呉士功奏撫藩交代有無那借虧空之處請於離任接任時據實陳奏著為例二十三年命户部於附近甘肅省分撥銀三百萬兩觧甘以備供支屯田籽種之用又以甘省尚有應辦軍需再酌量撥銀三百萬兩觧交收貯又諭户部彚奏耗羡銀兩内安徽浙江山東四川西安五省所交耗羡除通融抵補外尚多支銀一萬四千四百餘兩請行令該督撫查明承辦各官分賠等語耗羡章程原因毎年動支數目多寡不同是以定議五年合計彚辦以示節制今安徽等五省除通融扺補外尚浮支銀一萬餘兩較上届已出範圍之外殊非原定章程本意但竟照部議即令追賠其中因何必需動用欵項原由殊未明晰著該撫按年詳細核查據實奏聞再降諭㫖二十四年諭據塩政髙恒奏稱兩淮南衆以西北蕩平逺人向化屯田塞上中外一家願捐銀一百萬兩少抒服役之誠等語年來軍需屯務撥用悉由内帑不但貯備充裕即各省一切蠲賑賞恤未嘗因此而少有節省但該商等踴躍捐輸同聲籲請其急公之志深屬可嘉所捐銀兩著交與髙恒委員觧交陕甘總督黄迋桂以備軍需屯務撥用又兩浙商衆亦公輸銀二十萬兩長蘆山東商衆三十萬兩均命觧往甘肅又諭户部撥銀十萬兩觧交熱河道庫存貯又諭户部酌撥各色庫縀一千匹於運送布疋之便搭觧甘肅交與該督等收貯備用又諭今秋杜爾伯特䇿楞烏巴什等來朝熱河道庫備賞銀兩存貯無㡬著户部撥銀十萬兩委員觧往熱河交與良卿收貯備用又諭劉統勲等查審江蘇藩庫一案已有㫖諭部矣藩司庫錢糧收放欵項本不應輕易借動即有本欵無存必湏借支者亦湏随時歸清以免滋弊該省毎有借支借放不及時清歸欵直至布政使交代時始行清楚之處此實向來相沿陋習毋怪乎頭緒繁多一時難於查對殊非釐剔之道今此案雖查無虧蝕情弊然當酌定章程務使及時清欵不得仍前逓年滚算致滋牽混即有一時難以遽歸者亦不得僅在該省自行存案或按季或逓年逐一造冊報部備核以昭慎重著尹繼善陳宏謀即行酌議具奏由部核定遵行二十六年户部議駁江蘇巡撫陳宏謀奏乾隆二十六年春聖駕南巡一切船隻馬匹車脚營尖橋道各項價值或與上届不符或價值浮多應令刪減得㫖准其報銷是年撥江南蘇松粮道庫銀二十三萬兩交觧河庫以濟要工又於淮商公捐銀一百萬兩内撥銀三十萬兩交尹繼善辦理差務即賞給兩淮二十萬兩為脩理行宫等費酌留十萬兩以備賞賜其餘四十萬兩備充河南工程賑恤之用又諭前因西陲平定新疆廣闢所有移駐大臣官兵嵗需養㢘經費比前或致増多是以特命在外辦事大臣等詳查奏聞頃據舒赫徳覆奏軍機大臣通行較核則葉爾羗喀什噶爾等城駐防應需各項合之陕甘節省諸費視未用兵以前不但絶無所増實可減用三分之二其屯墾自給之糧既可不縻費且將來種地日開所入倍當充裕又不在此約計之内此皆一一指數可按者前用兵之初庸愚無識之徒好生浮議朕固不屑深辨今武功大定又或以長駕逺馭不無多耗内地物力為疑今經查核不但未曽多費而且有所節省夫天子不言有無國家有當用者雖累巨萬不惜也朕非錙銖較量但因西陲用兵始末所闗不得不詳為剖晰以曉庸衆俾知此畨武定並非耗帑勤逺之為將此通諭中外知之二十七年諭髙恒於運庫内酌量再撥銀二十萬兩添補辦差二十八年從湖北巡撫宋邦綏奏請新任督撫盤查藩庫之時其糧驛二道如或駐劄同城者一體盤查二十九年太常寺奏天壇等各壇廟請擇吉補栽樹木以肅觀瞻其刨起枯樹照例變價充公從之是年諭㨿常鈞等奏監利縣孫家月堤工程例應民脩籲請自脩三分暫行借帑七分但今年驟漲該處現在尚加賑卹所有現請借銀一萬二千兩加恩免其帶徴歸欵著在罰修堤費等項内動支倘罰項不敷即動撥正項亦可三十年諭曰朕奉皇太后安輿省方問俗地方大吏有葺治行館以供憩息者茲停蹕景州見一切位置頗為妥適從前所賞公帑尚恐不敷應用著于直𨽻存公項内賞銀二萬兩以裕工作之費再山東亦有新建座落三處經畫諒與直𨽻相同亦著于該省公項賞銀二萬充用又以安徽脩理城垣俱經報竣所有安省收捐監生等項銀兩除撥協江蘇城工外尚有餘剰即於此内撥銀二十萬兩觧往直𨽻備脩葺城工之用三十一年諭前因各省應脩城垣費煩工鉅特發内帑一律脩繕屢經諭令各督撫董率實力承辦並派大員専司查估務期實用實銷茲據舒赫徳自甘肅回京奏稱該省各屬辦理城垣率多浮估其從前已經脩竣城工在定例保固限内者亦或有未盡核實之處等語甘肅一省如此他省亦不能保無弊混工程冐濫草率將來報竣時派大員察騐自不能絲毫掩餙但與其按治於事後莫若防檢於事前現在各省鳩工伊始物料在厰按冊可稽而夫役食價等項亦正當支發計人計日查考更易周詳著各該督撫於已報興工之各州縣或親往查勘或令原派司員前往確切查勘如有浮開冐估即行核減承辦各員咸知儆惕自不敢任意侵肥及蹈扣尅草率諸弊其已報脩竣城工在保固限内者或有浮冐情節著一體查明核辦倘各督撫及承辦各大員不以為意或心存苟且以致蝕帑誤工者將来經欽差查出或朕别有訪聞唯於伊等是問又命各闗節省銀兩俱著随正額盈餘一體觧交户部三十二年諭據竒成額等查審馮其柘虧空至二萬餘兩之多李因培授意張宏燧代為彌縫報少及赫昇額令屬員帮同彌補一案骫法營私實出情理之外州縣虧空本有應得之罪若私自通同帮補既使劣員偉逃法網且必復貽累他人效尤侵蝕勢將無所底止深可痛恨上年山西叚成功虧空累累各屬帮銀填補業經大加懲創不料未及一年湖南復有此案可見外間上下扶同之習固結不觧各省皆然吏治尚可問乎督撫為封疆大臣藩司為錢糧總滙一省之察吏紏貪乃其専責如遇屬員侵虧帑項據實㕘劾則屬員自必共知顧忌何難使諸弊澄清著𫝊諭各督撫即就所轄屬員内通行查察將有無虧空據實保奏嗣後並著於年終將屬員有無虧空之處彚奏一次以重責成著為令又諭朕此次巡幸天津閲視河堤經過陸路水程該地方官豫備座落數處以供憇頓恐應銷公項銀兩不敷需用著於長蘆應觧内務府銀内賞給銀三萬兩以為辦差之費是年工部奏各省裁汰衙署倉庫營房以及各項舊料估變價銀其數在二百兩以上者令該督撫確查造冊送部又諭湖北黄梅等縣董家口以上界連江西徳化境内一帶江堤潰缺之處應行脩築估需銀一萬七千九百餘兩即動用公項交地方官實力妥辦毋庸借帑扣還又以兩淮各商捐銀一百萬兩觧送雲南備辦理軍需之用三十三年諭前據工部核駁熊學鵬估變裁汰船隻一本閲其情莭顯係承辦之員以多報少希圖染指分肥等語所辦甚是已如所議行矣此等船隻俱係動用官帑脩造每隻不下數千金即經厯年久拆卸變價亦何至每隻僅止數十金之少其為官吏欺公肥槖不問可知今浙省明騐如此則其餘各省已可概見著將此通諭各督撫提鎮等嗣後遇有屆限應行拆造船隻悉照浙省所辦嚴飭各屬悉心確估變價務使物料皆歸實用而帑項不致虛糜無任稍有中飽侵漁自干咎戾著為令命内務府將廣儲司銀一百五十萬兩交户部照例派員觧送雲南諭貴州省為赴滇孔道一切需用較多著於觧滇銀兩經過黔省時就近截留五十萬兩備貯充用三十四年令江寜藩庫厯年積存銀兩撥銀二百萬兩觧滇再令隣近雲南省分應行觧部欵項内酌撥銀一百萬兩觧往又於本年諭内務府撥廣儲司銀一百萬兩交户部存貯但部庫帑蔵亦甚充裕即備撥滇省軍需之用亦可従四川總督阿爾泰奏川省支放軍需向資隣省撥協今查有茶鹽耗羡一項即將逓年積存銀四十三萬五千餘兩就近撥出三十萬兩應用又諭户部為度支總滙凡銀欵出入自應經由該部收支以備稽查今宗人府需用紅白銀兩逕由鹽政觧交既於體制未合且恐其中不無滋弊之處嗣後兩淮應交宗人府銀兩著該鹽政仍觧交户部查收宗人府按季赴部支領轉給又諭據直𨽻總督楊迋璋奏直屬現存入官地畆應准其停止委員查丈一摺著照所議行至於舊案令地方官於一年限内自行詳查酌復原租由府道藩司轉詳該督撫咨部之處尚未妥協此等入官旗地厯年久逺地方官原定租額時大率不能詳核者多若仍令伊等自行查改難保無迴䕶徇情朦混草率諸弊或僅將不能掩飾者舉出更正一二仍屬有名無實自應特派幹員通行履畝㑹勘確核方為徹底清釐之道著户刑二部揀選明幹滿漢司官各四員其餘各部揀選滿漢司官各二員該户部帶領引見候朕簡派前往㑹同府尹及該府秉公悉心查辦三十六年諭據髙晉裘曰脩周元理等查勘永定河北運河各工事竣來京復命將應行疏築事宜詳悉議奏已依議行矣至所稱估需工銀四十九萬六千餘兩現在直𨽻藩庫無欵可動著户部即於部庫内撥銀五十萬兩令周元理即日委員赴領以俾及時鳩工興築該部遵諭速行三十七年命豫省北岸河工等項銀兩悉行改歸道庫諭據裘曰脩奏直𨽻河工催支給值需用錢文請照京城發兑官錢之例許辦工各員一體交銀領買等語著照所請於平糶麥厰錢文内准其照大興宛平之例許辦理河工各員持印文赴步軍統領衙門領買其錢文出城時仍給票照騐以憑稽核又諭金川用兵以来已兩次撥帑六百萬兩觧川偹用今軍務尚未告竣著户部於相近湖廣省分查明足敷協撥欵項即酌撥銀二百萬兩觧赴湖廣轉觧四川偹用又諭工部核銷三官廟工程銀兩一摺内開承脩監督請銷工料銀二萬一千二百四兩零比較原估節省銀三百四十六兩零該部按冊核減銀一千一百九十三兩零請將核減銀兩併自行節省銀兩交納户部歸欵等語雖係照向例辦理未為妥協夫所謂節省者本謂無可核減而能節省而言若既經核減則造報時所開實用銀數已屬浮多便不當復云節省况節省一欵與核減條目並𫝊轉不足以服承辦人員之心嗣後該部核銷各處工程除報銷時自行節省而該部無核減者仍准存節省名目外其有呈報節省復經該部核減者即將節省銀數歸入核減欵内無庸另開節省條目以免重複著為令又諭工部以哈宻巴里坤等十二處物料價值前經駁令陕甘總督查核屢次咨催久未奏報請令該督速行更正刪減造冊具奏一摺殊未得辦事要領陕甘總督向駐内地距新疆甚逺一切物價何由深知伊犁喀什噶爾等處俱駐有辦事大臣若令其就近稽查則數易覈實為期亦能迅速嗣後該部遇有新彊應行駁查料值除照常行知該督外即一靣専行各該處辦事大臣就近作速確查㑹同該督核實報部辦理著為令三十八年諭據程景伊等奏銷脩理吏部衙署用過錢糧數目一摺内有行取户部顔料值銀八百三十三兩零取用工部杉木值銀八十六兩零工價錢六千一百九十串零按依時價核值銀六千六百十兩零令該部扣完還項等語各衙門奏請借項脩葺衙門分年扣完者止應就採辦物料給發匠工各項費用按數歸還若户部顔料工部木植及工價錢文皆係部内現有之官物只湏核實報銷若亦令作價扣繳竟是將官物出售成何事體所有此項價值六千六百十兩即毋庸扣還嗣後各衙門有借項脩理奏請分扣者均照此辦理三十九年諭川省軍需銀兩節經由部撥發及各省協撥捐觧者通計三千四百餘萬現在進𠞰金川將次蕩平而善後事宜亦當預為籌計著户部於各省存留協撥銀内動撥銀五百萬兩觧川存貯備用嗣于九月又於附近四川省分撥銀四百萬兩十一月撥部庫捐欵項下銀五百萬兩四十年節次撥部庫銀一千六百萬兩通計前後軍需及善後經費約六千餘萬兩又諭新疆工程均係派撥兵丁砍伐木植築打土方支給該處兵丁耕種所收米麥青稞等項較之採買物料雇覔匠夫者本屬減省今烏嚕木齊新建滿兵城房工程統較内地應用銀數有减無浮又何必復照内地之例核算所有用過銀兩即著照數准銷毋庸再行交部查核嗣後新疆等處工程派撥兵丁及砍伐木植脩建者俱不必照依内地定例核銷四十年諭周元理奏永定河搶脩等工請仍舊例一摺因乾隆三十八年報銷疏濬搶脩等工銀兩工部以所報之數與尚書裘曰脩議定大工章程案内較有浮多駁令刪減周元理復將厯来通融辦理縁由據實聲明籲請仍舊朕閲此案工部之駁固屬照例而周元理之請自亦實情今朕為之凖酌折衷所有此案動用工程銀兩仍准其照舊報銷不得復行駁減惟是永定河嵗搶脩疏濬等工每年額定三萬四千兩並准節年通融辦理不逾此數雖若示以限制實聴儘數開銷未為允協夫永定河水勢靡常工程亦因而増減即如嵗脩一項水大之年粘補必多水小之年費用較省此理之一定者又如搶脩量工之平險疏濬視淤之淺深亦難䋲以一律若向時所定籠統發銀不問工之鉅細多寡任其牽匀銷算則與庖人攬辦筵席何異殊非核實辦工之道治河所以衛民果屬𦂳要工程於閭閻實有禆益經費原所不靳若永定河舊例未妥以致毎年浮耗久之不但用渉虛縻且恐工無實濟何如随時確核實用實銷之為愈乎除業經辦過工程事屬已往毋庸另議外嗣後應如何刪去舊額核實辦理酌定章程之處著軍機大臣㑹同周元理悉心妥議具奏又諭呉嗣爵題嵗報河道錢糧一疏尚係乾隆三十七年分動支收存之數辦理太遲河道錢糧等項例應按年造報原欲周知一嵗河道工程之多寡鉅細以憑核實稽查即云俟各司道陸續造送查核需時則三十七年之案亦應在三十九年正月出本斷無查辦不及之理今乃遲至四十年冬間具題中間已閲三載實屬遲延嗣後河工嵗報錢糧俱著次年全數查明於第三年正月開印後具題如有逾期即查明㕘奏四十一年撥銀三十萬兩觧黔省司庫備貯又諭甘肅省歴年承辦軍需應行支發欵項甚多前因平定金川將部庫撥觧四川備用銀三百萬兩截留存貯西安藩庫著即於此内撥銀二十五萬兩觧交甘省備用命户部庫銀内撥三十萬兩發交河道庫存貯四十二年諭陜西華嶽廟自三代以來即為望秩之地規模宏壯體制尊崇近嵗風雨調匀屢昭靈應昨據該撫畢沅奏稱嵗久傾頽亟宜葺治約估需銀十二萬餘兩等語著於内務府撥銀十二萬兩交畢沅核實辦理造報四十三年諭甘肅省收捐監糧前經户部定議俟數年後令該督報明動存實數請派大臣盤騐今據勒爾謹奏請簡派查驗著派尚書袁守侗侍郎阿揚阿於四川查辦事件完竣時由陜西便道馳馹前往甘肅將各州縣監糧按其收發存貯實數通行盤騐又諭據鄭大進奏估勘修建嵩嶽廟工程撫藩大吏及現任知府以上身為方面大員所得養亷亦厚自可聴其捐資以襄盛舉至各州縣請分别缺分大小攤捐之處牧令非大員可比若因公扣捐所餘不敷贍給必至藉端擾累其捐欵外所需銀八萬兩著用内務府庫銀令鄭大進等核實辦理造報内務府核銷至此項銀兩即于應解户部正項内扣用咨部備核仍令内務府照數撥還户部以省解送之煩又諭朕此次詣盛京恭謁祖陵經過直𨽻地方該督等于行宫搭蓋涼蓬既非炎熱之時本可不必但詢知按程均已齊辦難以令其撤去又夷齊廟文殊菴兩處該督亦有預備房間更不免於多費著加恩賞銀三萬兩即于長蘆鹽欵應解内務府銀兩内撥給命于運庫賞銀三十萬兩辦理差務四十四年諭前因豫省黄河漫口節次撥給部餉及兩淮鹽課銀三百六十萬兩以備工賑之用現在堵築事宜業届蕆工恐需用不敷著户部再撥銀二百萬迅速解往以資接濟四十五年諭朕巡幸江浙蹕路經由直省一切行館地方官逐程修葺經理未免稍需用度著於長蘆鹽課應解内務府銀兩内賞給銀二萬兩以示體䘏又以山東省添建座落二處不無所費於山東鹽課内給銀三萬兩又於鹽項餘銀内賞給十萬兩為浙省辦差之用四十六年諭前以甘肅收捐監糧私收折色一事明係揑災冒賑上下一氣通同舞弊不可不徹底嚴查因屢經𫝊諭阿桂李侍堯將厯任道府何人如何冒銷賑濟如何勒買分肥逐一查明據實㕘奏阿桂等自必嚴切根求斷不肯為人代擔干係日内又命留京辦事王大臣㑹同該部提訊勒爾謹並𫝊王廷贊到部質訊並降㫖陳輝祖等即將王亶望拏交刑部審訊矣此事既經發覺斷無置而不辦之理阿桂等自必認真查辦令其水落石出不肯稍存諱匿之見至監糧折收之銀大半歸於冒銷賑䘏但賑䘏一事甘肅既向來如此自應治冒銷者之罪不應因有此弊因噎廢食將應賑䘏者致不賑䘏朕愛養黎元毎遇各省水旱偏灾不惜多費帑金優䘏寧濫無遺以期不使一夫失所况甘肅素稱邊隅磽瘠尤宜加意撫綏豈可以有冒賑之事遂致貧民或有拮据昔宋臣曽有以薦人不當輙有悔意者時程子云願侍郎受百人欺不可好賢之心稍替為大臣者尚應如此存心况朕君臨天下保赤情殷亦寧可受萬人之欺不肯使視民如傷之念因此少懈也即以逆回一事而論蘭州百姓並無從賊之人此實由朕平日子惠邊氓有加無已是以閭閻激發天良不肯附從逆匪豈非仁政之明效大驗耶總之甘省冒賑之弊斷不可不辦而甘省賑䘏之事仍不可不行此意著𫝊諭阿桂李侍堯徧行出示甘省百姓使之家喻戸曉倍深愛戴以仰副朕意並將此通諭中外知之又諭袁守侗海祿前赴行在軍機大臣𫝊㫖詢問直𨽻雲南賞兵銀兩支銷欵項據稱直𨽻裁扣公糧銀二萬兩雲南裁扣公糧銀一萬六千餘兩以備賞用等語看來各省大都如此兵丁紅白銀兩原係加恵營伍格外施恩若因此裁扣名糧致兵額不足殊非核實營伍之道况今戸部帑項豐盈各省藩庫積存充裕即現在京營添兵四千九百名陜甘二省各營添兵一萬二千九百餘名其馬步糧餉合之各省兵丁賞䘏紅白銀兩約算嵗支尚不及百萬國家何靳此費不令開銷正帑而各省乃紛紛裁扣名糧又且請復生息甚無謂也朕臨御四十六年以來唯事事以敬天勤民為念凡三次普免天下地丁錢糧兩次普蠲各省漕糧以及遇灾賑䘏總計何啻萬萬又並未加増賦税仰荷上蒼嘉佑開拓邊陲府藏殷實國用充饒朕又豈肯稍存靳惜致令有司開聚歛尅扣之端乎所有各省營伍賞䘏兵丁紅白銀兩自乾隆四十七年為始俱著於正項支給造冊報部核銷至各省提鎮以下武職員弁俱有應得坐糧馬乾等項前於六月内業經降㫖通諭各省督撫將各該省武職所得公項逐一查明覆奏俟奏報到齊令軍機大臣㑹同該部核辦照文員之例議給養亷其所扣兵餉即可挑補實額核計添給養亷嵗支亦不及二百萬兩官員既無拮据而各省又増添兵丁於營伍大有禆益朕御極之初戸部庫項不過三千萬兩今已増至七千餘萬兩有何不足而不加惠天下散財以得民乎所有辦理縁由明晰曉諭中外知之又諭甘肅需用銀兩現在甚屬𦂳要所有該省奏撥銀八十萬兩尚恐不敷著再於部庫内撥銀一百萬兩仍于附近省分先行遞撥解往俾得迅速濟用又諭據袁守侗奏宻雲石匣順義三處城工現在勘估修整請發帑銀二十萬兩以備工用直𨽻州縣城垣年久坍塌自應及時修葺且該省尚有已修各城未領工料均須找發恐二十萬兩不敷應用著撥給廣儲司銀四十萬兩發交該督派員請領直省如有他處城工應修整者亦著查明確估于此項内動支修理又諭前因圖思義等查奏㕘革哈宻通判經方虧短庫貯銀至十五萬餘兩據李侍堯奏縁口外各㕔州一切動用銀兩由該處徑行報銷其如何花費哈宻距省較逺一時未能悉其底裏等語口外各㕔州縣經管庫項銀兩其支收數目自應隨時詳報總督方足以資稽核嗣後口外地方一切請領接收銀兩及作何動用之處著㑹同該督查核詳確報銷著為令四十七年諭據富勒渾奏籌辦南岸添築新堤開挖引渠計長一百七十餘里現在集夫興工先於司庫借墊給撥工價俟大工告竣後照例核銷等語此次築堤改渠需費繁多前經于部庫解銀三百萬兩恐不敷用著于户部庫内撥給銀一百萬兩内務府撥給一百萬兩查照向例派員迅速解往以濟要工四十八年諭豫省河工挑挖引河節經頒發部庫銀六百萬兩現在將届開放引河之期一切需費尚多著再撥給部庫銀一百萬兩照例迅速解往備用又諭據惠齡等奏塔爾巴哈台實在庫貯房間地基各項租銀一萬二千七百四兩八錢四分一厘等語此項租銀著以一萬兩作為正項其餘著備該處零星公用又諭山東運河堤閘各工現在勘明叚落一律興修著于部庫内撥給五十萬兩照例解往備用四十九年三月迪化州知州觀成那移庫銀一千餘兩墊支公帑一欵經海禄奏新疆地方積習相沿弊竇叢生如採買冒賑虧空銀兩經原任都統明亮嚴㕘懲創之後尚未能弊絶風清總由各州縣㒺知儆􅅥濫用開銷流弊甚于内地不思口外情形非内地可比儻有急需即從内地撥解亦屬鞭長莫及緩不濟急所闗匪細謹遵諭㫖知照各處駐劄大臣俟内地派委大員到日會同一體盤查凡庫貯銀兩除滿漢各營官兵俸餉分劃明晰不得稍有影射鋪墊器具各物不得任其抵交外其餘報解者調騐庫收支銷者查對領狀以及文武同寅商賈富戸挪借搪塞事後發還種種掩餙彌縫之計均為明切曉示那借之項令其自首給還如不肯禀明即將銀兩入官凡倉庫糧石除照斗口色糧逐厫盤量不得以粗糧牽筭混抵細糧外其餘出借作何開除未收作何民欠者俱抽查花户取具甘結存案使騰挪朦蔽之術無所施其伎倆儻有絲毫未清即以虧空問擬每年如此盤查一次並請于盤查清理之後除糧石存貯各屬並哈宻庫項歸哈宻大臣辦理外將一切經費外備銀兩無庸存留㕔州縣衙門免致挪移虧缺遇應用之時按季請領鎮迪道造册移司備案則防範更嚴諸弊可以永逺杜絶從之是年以浙商捐輸銀六十萬兩歸入海塘工程應用又諭山東運河前因豫省漫水下注湖河一片縴道閘壩俱被淹浸上年合龍河復後特降諭㫖將山東運河官民堤埝土石各工一律興修共用銀五十三萬九千四百餘兩今因例價不敷加用津貼銀五十三萬餘兩據該撫明興奏請分年捐亷歸欵無庸按例攤徴等語向來黄運兩河間遇𦂳要工程採辦物料雇募人夫官發例價本屬優厚即或因物料昻貴限期稍𦂳一時難以取給於例價之外復有津貼不過加至十分之二三至多亦不過十分之五儘足敷用况運河堤岸工程尤非若豫省之堵築壩工可比加價銀兩何以較正價増至一倍恐其中不無藉端分潤之弊但朕軫念羣黎如河南江南等省一切河務闗係民生者不惜數千百萬帑金興修堵築以期各資捍衛又何靳此數十萬津貼銀兩致官民竭蹶耶所有此次山東運河津貼銀五十三萬餘兩若按例攤徴民力固不免拮据即地方官捐亷歸欵亦恐不肖之吏有所藉口致滋派累竟加恩准其一體作正項開銷又諭向來豫省地丁銀内每年撥二十萬兩解交甘肅協濟現在該省睢州下汛二堡復有漫口之事一切堵築辦稭事宜正需應用而甘肅存庫銀兩前據馮光熊奏現有四百七十餘萬兩諒支給兵餉及新疆經費並一切撫恤等項已屬寛裕此項銀兩毋庸撥解甘肅並著𫝊諭福康安即將藩庫實存銀數通盤籌畫是否足敷甘肅應用据實具奏另俟酌撥五十年諭撥内務府銀三十萬兩解交熱河道庫存貯備用又諭據劉秉恬奏滇省近年未完耗羡銀兩均已全完無欠一摺此事前因安徽省有節年未完耗羨銀兩該撫書麟奏請派員清釐分别催徴追賠經户部議以直𨽻各省亦有積欠耗羨令即彷照安徽辦理朕惟各省耗羨究與正項錢糧不同自雍正年間設立各官養亷後始行歸公遇有動支俱令該督撫等奏明自未便任其懸宕但思耗羨一項係徴收正項錢糧時所加耗羨斷無正項錢糧全完而獨欠耗羨之理此非州縣官私自挪移即係吏胥從中侵蝕雖當清釐豈可以官吏之所欠復向小民催徴滋擾自應將未完耗羨實欠在官在吏之處查明究治不以累民方為允協其應如何分别究治之處著該部妥議具奏皇朝文獻通考卷四十一
