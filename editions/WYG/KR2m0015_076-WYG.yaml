body:
  text: 欽定四庫全書皇朝文獻通考卷七十六學校考十四視學養老臣等謹按禮記天子視學遂適東序養老孔頴達疏謂視學虞庠釋奠既畢明日乃之東序而養老蓋兩事也馬端臨謂古者視學之禮専以養老而設後世乃分為二事其實視學以明道養老以教孝二者不可偏廢在昔有虞氏貴徳而尚齒俾百姓知所親而五品於以遜降自三代亦未有不謹庠序之教而申之以孝悌忠信者迨至東漢永平後周保定皆襲虛文而遺實意雖奉行故事奚當焉我國家撫有區夏文命敷於寰海率育普於羣黎加以神聖代興扶倫植教欽頒御纂諸經發明先聖㣲言以嘉惠多士猶復躬詣太學展禮先師視學講堂閎宣精藴使天下萬世咸仰聖道之尊而羣沾聖教之澤至於崇髙年敬有齒粟帛之頒遍乎耄耋鄉飲之典周乎郡國而且賜幣賜食扶掖視飲復命宗人子姓執爵行觴聚千叟而開筵過百齡而加錫夐乎曠典無以尚已我皇上懋修敬學惇叙彛常闡御論於經筵契心源於古聖而臨廱勸學於儒臣進講之餘復取先儒未發之奥義而申論之廣大精㣲超舜謨而軼禹範自古帝王視學以來未有倫比若夫引年卹老旌賞頻仍寵遇耆臣優奬耄士下逮老民老婦或厚為賚予或賁以天章異數殊恩非臣民意計所敢望而錫類推仁至優且渥焉是以經術彰而人知學彞倫叙而民不偷初不必拘執經祝哽之文而道立於上教成於下合秀頑愚智之倫胥沭乎文明之化而逰乎仁夀之域也至禮經所載有視學之典無幸學之文而馬考稱視學為幸學其沿襲漢唐諸史之舊稱歟我世宗憲皇帝稽古考文特命奏章記注改幸為詣以申崇敬重道尊師之禮曠古獨隆臣等已謹載詣學釋奠為祠祭褒贈一門兹則别採詣學典禮有視學儀節者合養老為一門直書視學昭其實也順治元年恩詔軍民年七十以上者許一丁侍養免其差徭八十以上者給與絹一疋綿一觔米一石肉十觔九十以上者倍之有徳行著聞為鄉里所敬服者給冠帶榮身此優老之始嗣後覃恩並如此例更不複書令京府及直省府州縣舉行鄉飲酒禮每嵗於正月十五十月初一日舉行鄉飲酒禮設賓介主人衆賓之席順天府以府尹為主直省府以知府州以知州縣以知縣為主大賓擇鄉里年髙有徳之人位於西北介以次長位於西三賓以賓之次者為之位於賓席之西衆賓序齒列坐司正主揚觶以教職為之贊禮讀法以生員為之讀律令曰律令凡鄉飲酒序長幼論賢良髙年有徳者居上其次序齒列坐有過犯者不得干與違者罪以違制失儀則揚觶者以禮責之二年順天府舉行鄉飲酒禮嗣後每嵗由順天府具題將所舉賓介等姓名履厯呈部存案八年上幸太學釋奠於先師孔子視學彛倫堂先期禮部具題行取衍聖公率孔顔曽孟仲世襲五經博士及孔氏族五人顔曽孟仲族各二人乗𫝊赴京觀禮其五氏子孫現任京職者咸與祭至是大内致齋一日王以下公以上文官三品武官二品翰詹官七品以上暨國子監官咸齋戒陪祀司設監設更衣大次於大成門外之左南向設拜位於神前設御座於彛倫堂正中鴻臚寺設經案於堂内之左設講案二於堂内左右至日置經於經案倍祀者自和碩親王以下多羅貝勒以上俱赴午門内候隨駕部院各衙門滿洲䝉古漢軍侍郎以上八旗都統精竒尼哈番以上文官三品以上武官二品以上及翰林院七品以上官俱先詣廟丹墀東西相向序立應在啟聖祠者在啟聖祠恭候本日夘刻駕從長安左門出鹵簿大樂以次前導樂設而不作至成賢街國子監滿漢祭酒司業服朝服率學官諸生於街左跪迎駕至櫺星門外降輦贊引官恭導由中門入至大次少憇太常卿奏請行禮上盥洗更衣入大成中門升中階入殿中門北嚮立分獻官入右側門至階下夾甬道立王公入左右門由中階左右升文武官員於廟庭左右均北面東西序立衍聖公在東班之首五經博士及五代有官者以其官序諸生在東班之末序立典儀贊樂舞生就位執事官執事贊引官贊就位上至拜位諸王貝勒陪祀分獻官亦各就位贊迎神樂作樂止贊引官贊上行兩跪六叩首禮通贊諸王貝勒及分獻陪祀官行禮同叩首畢贊釋奠禮樂作獻帛官跪進篚上立受篚拱舉獻畢復受獻帛官奠於神位前獻爵官跪進爵上立受爵拱舉獻畢復受獻爵官獻於神位前樂三奏酒一獻不讀祝其分獻官以次詣神位前奠爵訖仍以次退就原拜位樂止贊送神樂作贊引官贊上行兩跪六叩首禮通贊諸王貝勒及分獻陪祀官行禮同叩首畢獻帛官詣先師神位前捧帛由中門出贊引官贊禮畢導上出大成門樂止上至大次少憇更衣諸王貝勒候隨駕幸彛倫堂陪祀各官衍聖公五經博士等先詣彛倫堂臺上分班侍立祭酒司業學官等率領諸生於太學門内兩丹墀分班侍立禮部官入奏請上幸彛倫堂上至櫺星門外升輿從太學門入衆官諸生以次跪迎諸王貝勒隨駕入彛倫堂上陞御座諸王貝勒在堂内各官仍於堂外臺上分班侍立鴻臚寺官贊衍聖公祭酒司業學官五經博士在臺上四氏子孫及諸生在臺下丹墀序立贊行三跪九叩首禮畢上諭坐諸王貝勒叩首坐在部院衙門滿洲䝉古漢軍侍郎以上八旗都統精竒尼哈番以上衍聖公及陪祀漢文官三品以上武官二品以上俱入堂叩首坐祭酒等仍在外侍立鴻臚寺官贊進講滿漢祭酒從東小門入滿漢司業從西小門入俱北向立鴻臚寺官贊起案執事官舉經案設於上前賜講官坐祭酒司業就講案叩首坐滿漢祭酒以次講易經滿漢司業以次講書經其餘翰林官四品以下及五經博士并各執事官學官諸生圜立於外以聴講畢鴻臚寺官贊起案執事官舉經案置原處畢祭酒司業退就本位序立鴻臚寺官於堂正中跪奏傳制鳴贊官贊跪祭酒司業學官諸生皆跪傳制官贊有制制曰聖人之道如日中天講究服膺用資治理爾師生其勉之宣制畢復贊行三跪九叩首禮畢祭酒司業學官諸生以次退先於成賢街之右序立上賜諸王貝勒各官茶畢鴻臚寺跪奏禮畢上起陞輿出國子監鹵簿大駕大樂振作前導祭酒司業學官諸生候駕至跪送諸王貝勒隨至午門内候駕還宫退翼日壬辰衍聖公及祭酒等上表行禮賜宴禮部越三日癸已賜衍聖公五經博士四氏子孫祭酒司業等冠服及助教等官肄業生銀兩有差各氏後裔并送監讀書廣國子監鄉試中額十五名又賜勅勉勵師生勅曰聖人之道如日中天上賴之以致治下習之以事君爾等務盡心教訓諸生諸生亦當祗承師訓力體諸身教成為師之功學成乃弟子之職倘訓誨不嚴服習有怠爾師生俱不能辭其責勉之越四日甲午衍聖公率四氏子孫五經博士祭酒司業率助教等官及諸生於午門前謝恩九年亦如之十七年上以文廟落成親幸太學釋奠於先師孔子禮儀與八年同互見祠祭門康熙元年定奉天府舉行鄉飲酒禮照順天例行四年議准錦州府亦照例行八年上幸太學釋奠於先師孔子視學彛倫堂典禮儀節具如順治八年例行先期遣官取衍聖公孔毓圻及孔顔曽孟仲五經博士并族人赴京陪祀觀禮是日衍聖公孔毓圻率祭酒司業學官五經博士五氏子孫各監生恭進謝表賜衍聖公祭酒以下等官宴於禮部并賜袍服其助教監生等各賜銀兩有差陪祀聖賢後裔顔光毓等照例優敘生員孔興詢等十五人令入監讀書廣本監鄉試中額八名頒勅諭刋掛彛倫堂勅曰皇帝勅諭祭酒司業等官朕惟聖人之道髙明廣大昭垂萬世所以興道致治敦倫善俗莫是外也朕纘承丕業文治誕敷景仰先聖至徳今行辟雍釋奠之典將以鼓舞人才宣布教化爾等當嚴督諸生潛心肄業諸生亦宜身體力行朝夕勤勵若學業成立可禆任用則教育有功其或董率不嚴荒乃職業爾等係師生難辭厥咎尚其勉之毋忽四十二年定給百嵗老民昇平人瑞匾額例先是九年定命婦孀居夀至百嵗者給與貞夀之門匾額仍給建坊銀兩至是禮部議准百嵗老民照例給銀建坊仍給匾額並凖老婦夀至百嵗者建坊懸額與命婦同五十二年以萬夀聖節優賜老民是時上奉皇太后自暢春園回宫耆老等跪獻萬年夀觴上停輦慰勞徧賜老人夀桃及食品命賜老人筵宴諭大學士等今嵗天下老人為朕六十大慶皆從數千里匍匐而來賜伊等筵宴遣回著查八旗滿洲蒙古漢軍漢人大學士以下民以上年逾六十五嵗者奏聞擇日賜宴有不能來者朕另行按分頒給再查八旗滿洲䝉古漢軍以至内府佐領下不論官員閑散人等年七十以上老婦亦著奏聞俟老人賜宴後再定一日送皇太后宫賜宴有貧乏不能來者著各屬協助車馬使之前來再勅宗人府諸王以下宗室子孫内二十嵗以下十嵗以上者選擇聰明堪供任使六七十人令於耆老前執爵即朕子孫皆令之出宗室外不用他人也越翼日宴直𨽻各省漢大臣官員士庶人等年九十以上者三十三人八十以上者五百三十八人七十以上者一千八百二十三人六十五嵗以上者一千八百四十六人於暢春園正門前傳諭衆老人曰今日之宴朕遣子孫宗室執爵授飲分頒食品爾等與宴時勿得起立以示朕優待老人至意並諭曰書稱文王善養老孟子曰七十非帛不煖非肉不飽帝王之治天下發政施仁未嘗不以養老尊賢為首務近來士大夫只論居官之賢否而移風易俗之實政入孝出弟之本心未暇講究朕因今日之盛典特宣此意若孝弟之念輕而求移風易俗其所厚者薄而其所薄者厚矣爾等皆是老者比回鄉井當各曉諭鄰里須先孝弟倘天下皆知孝弟此誠移風易俗之本也是日命扶掖八十嵗以上老人至御前親視飲食賜年老諸大臣袍帽等物直省各老人白金有差命給年老致仕閒居大臣誥封及宫保銜以示優崇耆舊至意八旗滿洲䝉古漢軍大臣官員䕶軍兵丁閒散人等年九十以上者七人八十以上者一百九十二人七十以上者一千三百九十四人六十五以上者一千十二人宴於暢春園正門前其執爵頒賜飲酒一如前儀八旗滿洲蒙古漢軍七十嵗以上婦人齊集暢春園皇太后宫門前隨召九十嵗以上者入宫門内八十嵗以上者至丹墀下七十嵗以上者集宫門外大臣妻年老者亦皆召至宫門内賜坐皇太后親視頒賜茶果酒食等物其餘令諸皇子及宗室子孫以次頒給又賜大臣妻年老者衣飾綵縀素珠銀兩五十三年賜八旗滿洲䝉古漢軍年老婦人白金有差又賜熱河居住耆老白金有差六十一年正月賜千叟宴召滿漢大臣文武官員及致仕退斥人員年六十五以上者三百四十人宴於乾清宫前命諸王貝子貝勒公及閒散宗室等授爵勸欽分頒食品如前禮臣伏惟國家重熙累洽朝野多康强而仁夀加以列聖繼䋲深仁濊澤浹膸淪􅡌於是耆英大老或列在巖廊或恩加予告崇階厚秩引養引恬我皇上御極以來優老崇年之詔嵗不絶書若賜騎授杖賜俸晉銜賚子駢蕃天章炳煥皤皤黄髪衰齒頺齡罔不邀寵於聖朝而銜恩於數世以及耆官野老耄耋期頤或循例建坊或加賞銀幣凡優養隆恩非學校一書載筆能盡者更不備書其有年過百齡如再閲古稀身列膠庠而嵗登大耋拜賜鴻章仰承温諭者特類聚以紀實每舉要以發凡至如千叟之宴九老之㑹則又殊恩曠典合先後聖而同揆所宜大書特書以表人瑞於昇平彰國老庶老之養逺軼古初者也雍正元年崇鄉飲酒禮之制奉上諭鄉飲酒禮乃敬老尊賢之古制近聞年久視為具文所備筵讌亦甚草率應加謹舉行是年順天府舉行鄉飲酒禮特命禮部堂官前徃監禮嵗以為常申定優老之令上諭户部恩賜老人原為崇年尚齒而地方賞老人者每州縣動支數千金司府牧令上下通同侵扣吏役任意需索老人十不得一今飭督撫嚴查不許絲毫侵扣再老人九十以上者州縣不時存問二年詔改幸學為詣學諭禮部帝王臨雍大典所以尊師重道為教化之本朕覽史册所載多稱幸學而近日奏章記注相沿未改此臣下尊君之詞朕心有所未安今釋菜伊邇朕將親詣行禮嗣後一應奏章記注將幸字改為詣字以伸崇敬三月上詣太學釋奠於先師孔子視學彛倫堂先是正月上諭禮部朕於三月内舉行視學釋奠大典定例衍聖公應行陪祀聞孔傳鐸有疾且值守制之初可令伊子弟一人來京代伊行禮至是釋奠禮畢上御彛倫堂王以下及衍聖公孔傳鐸子孔繼溥祭酒司業文武各官行禮畢賜坐隨命講官坐滿漢祭酒以次講大學滿漢司業講書經翰林官及五經博士五氏子孫國子監官員進士舉人廕貢監生序立拱聴於堂下講畢宣制曰聖人之道如日中天講究服膺同資治理爾師生其共勉之宣畢賜王以下各官茶上回宫隨頒賜諸生食品典禮俱與康熙八年同其在京進士舉人與觀禮者及貢監生同賜銀兩各氏後裔送監讀書者十有五人廣監中鄉試中額十有八名増定恩賞老人例定例年逾百齡者奏給坊銀三十兩并昇平人瑞匾額至是奉上諭年至一百一十嵗加一倍賞賜至一百二十嵗者加兩倍賞賜更有多得夀算者按其夀算加増著為定例乾隆元年更定優卹耆士之典是時恩詔内凡民人年七十以上者免一丁侍養八十以上者給八品頂帶榮身上以直省生監中有年登耋耋者未邀恩賜於引年尚齒之典未備特諭直省凡屬生監年七十以上者優免一丁年八十以上者給與八品頂𢃄更定恩賞夀民之例定例各省老民老婦前經旌賞者遇有恩詔不得再行給賞至是豫省新鄉縣老婦劉氏年一百十五嵗因雍正十二年間一百十三嵗時曽經題准建坊賞賜至此又逢恩詔不得入册事聞奉上諭劉氏躋此罕有之貞夀自應一體霑恩以昭曠典著該地方官仍造入恩賞册内使伊得被光榮各直省老民老婦凡年登百嵗已䝉旌表者俱仍加賞賜以示優待夀民之意永著為令二年嚴鄉飲大賔之選禮部議准嗣後所舉賓介務貴齒徳兼優允協鄉評者舉之如地方官狥情濫舉即應題叅若所舉得人而不法之徒或藉端阻撓者嚴加究治三年二月上詣太學釋奠於先師孔子視學彛倫堂典禮儀節俱與雍正二年同先是二年十二月奉諭先師孔子聖集大成教垂萬世我皇祖聖祖仁皇帝皇考世宗憲皇帝親詣辟雍登堂釋奠儒臣進講經書諸生圜橋觀聴雍雍濟濟典至盛也朕祗承丕緒嚮慕心殷國學文廟特命易蓋黄瓦以展崇敬俟工程告竣之日朕躬詣釋奠用昭重道隆師作人造士至意復命東野氏冉氏卜氏端木氏言氏顓孫氏之五經博士俱照閔氏仲氏子孫例行取陪祀其東野閔冉等氏各二人赴京觀禮至是釋奠畢上召王以下文武大臣入堂内賜坐翰林院五經博士諸氏子孫及學官進士舉人廕生貢監等俱拱立堂外上賜講官坐滿漢祭酒講中庸天命之謂性一章講畢上曰天命之謂性率性之謂道是本一貫之理也亦猶無極而太極太極而隂陽隂陽本太極太極本無極也蓋道本乎性性本乎天至云修道之謂教則有人力之施為而已非道之本原矣故論其本原無所為離與合也至有道之可名於是乎湏臾不可離且戒之曰可離非道而戒懼慎獨之功亦莫不因修道而起不知喜怒哀樂之未發即天命也謂之中即性也發而中節即率性也謂之和即道也豈非天下之大本逹道乎故曰致中和天地位焉萬物育焉若曰天地自位萬物自育而已倘視喜怒哀樂未發以下為慎獨工夫殊失子思子之本指矣滿漢司業講尚書曰若稽古帝堯一節講畢上曰堯典紀堯之徳以欽始以欽終欽明本堯之徳至二女之嬪虞亦教之曰欽哉則聖人之心無時無事之不主敬可知矣夫人心惟危敬則不至於危道心惟㣲敬則不患其㣲以至精一執中舍敬其何以為功耶是故主敬為至要亦惟主敬為至難帝堯之聖猶競業之弗遑况在常人豈可斯須去敬以自外於聖人之教哉時堂内外文武官及進士舉人貢監等跪聆聖諭莫不心悦誠服大學士等奏曰皇上闡揚經書義藴廣大精㣲皆先儒所未及真帝王傳心之要也祭酒司業率學官諸生俱跪宣制曰聖人之道如日中天講究服膺用資治理爾諸師生其勉之祭酒率學官諸生謝恩王以下文武各官復坐賜茶畢並賜諸生食品禮部國子監帶領衍聖公孔廣棨等引見奉諭㫖爾等皆聖賢後裔因朕臨雍來京特行召見爾等既為聖賢之後即當心聖賢之心凡學聖賢者非徒讀其書而已必當躬行實踐事事求其無愧方為不負所學况身為聖賢子孫尤與凡人不同若不能實加體騐徒務讀書之名實於祖徳家風不能無忝爾等務須勤思勉勵克紹先傳以副朕諄切期望之意賜衍聖公國子監祭酒以下與雍正二年同加賜衍聖公聖裔五人五經博士御製樂善堂文集各一部及貂皮徽墨有差凡先聖先賢後裔來京觀禮者俱令入監讀書并廣本年監中鄉試中額十八名八月上丁上詣太學釋奠先師孔子九年二月十八日八月二十一年二月並如此例互見祠祭門五年恩賞年過百齡命婦時命婦索綽羅氏年一百三嵗其子孫五世同居萬夀節扶掖入朝照例旌表加恩賞賜並御製詩章賜之淑範能修四徳賢飲和獨占萬民先百齡瑞慶傳都下五代孫曽繞膝前天上拜恩沾雨露人間不老總神仙更期夀世多黄髪共樂昇平大有年六年恩賜耆民時上幸熱河至常山峪耆民趙可立年一百二嵗迎謁道左御製詩一章龎睂皓髪扶鳩杖道左携兒望翠華為説平生無外慕村居勤樸課桑麻八年上駐蹕盛京詣文廟行禮互見祠祭門賜父老酺並御製詩一章父老居豐沛久蒙煦嫗恩百年今宴安同為太平人雖無見知者尚有聞傳言錫宴思皇祖在此大清門今我來故家匪為騁逰巡三爵循古典炰兔亦烹豚白金以級頒百戱良具陳酌酒賜爾飲爾醉我亦欣還念爾先民曽同百戰勲九年恩賞夀民時巡撫開泰以楚省夀民湯雲山一百四十一嵗請旌上以此非尋常期頥之夀可比奉特諭賞給上用縀五疋銀五十兩再加恩特賜再閲古稀匾額以旌人瑞並書御製詩一章賜之常見六星輝楚地曽無一字獻丹楓老翁真是仙而隠舉世應推夀且雄矍鑠他年將比竇春秋此日已逾种生平無病不知藥耄耋有時還似童合宅孫曽凡幾閲一心念慮若為空漢陽草樹連天碧彷佛猶存太古風十一年恩賞夀民上幸五臺經唐縣老民劉永夀年一百一嵗接駕道左行不扶杖命賜之金與食御製詩一章睥睨山中古郡城征鞭暖拂杪秋晴趨迎道左吾之子萬億人中汝是兄聲亮耳聰鍾氣粹蒼睂黄髪稱耆英應縁獨得羅喬術靈夀無須此地行至十五年上幸五臺劉永夀年百有五嵗扶杖迎駕恩加賞賚并賜以御製詩章髙年一嵗度如旬百五春秋豈易臻重見期頥迎蹕路幾書亥字與時人自云老矣今扶杖我道仙乎為駐輪矍鑠精神教孫子力田孝弟作良民十二年恩賜百嵗耆臣先是致仕禮部侍郎銜内務府總管丁皂保年登九十御製詩二章賜之舊日春卿貳清時萬石君目光猶奕奕衷赤尚勤勤樂易故應爾忠良衆所聞太平無戰伐馬援漫從軍未解彭佺術曽將灌絳齊林泉應樂齒珂馬尚聞雞菊水無湏井丹霞自有梯所期職植衆難老總睂梨至是禮部以内務府總管丁皂保百嵗應照例建坊奉諭㫖賜朝衣一襲上用縀十疋銀千兩並給期頥國瑞匾額十六年上南巡恩賞經過州縣老民先是上所經過之地遇有老民接駕者皆命親隨侍衛頒給養老銀牌其貧窘者加賞白金至是又奉上諭朕問俗省方翠華所至黄耉台背皆䇿杖歡迎雖已於途次各皆恩賜而優卹髙年推恩宜渥著各督撫查明經過州縣男婦年七十以上者照從前恩詔之例分别賞賚至二十二年二十七年三十年南巡恩詔並如此例優賜耆臣時翰林院侍講劉起振年一百三嵗自粤至浙接駕恩加優賞並御製詩章賜之台背聳隆肩來瞻蹕路邊成名後梁灝得夀擬彭籛人瑞今猶古經傳後繼前越都無慮逺應是地行仙又優卹老民是時叩祝皇太后萬夀已到京之老民老婦俱經賞賚仍令該地方官䕶送還鄉并詔將次赴京稱祝之夀民俱著地方官從優䕶送回籍又賜生員詹星斗國子監學正職銜賞給縀疋上諭生員詹星斗年届期頤實為膠庠人瑞著加恩給與國子監學正職銜仍於常例外賞給上用縀二疋十七年恩賞㑹試下第耆老諸生八十以上者給與翰林院檢討職銜七十以上者給與國子監學正職銜至二十六年恩賞㑹試下第耆老諸生並同此例十八年恩賜國子監耆耋儒臣先是十七年學正王延年因七十以上㑹試下第奉㫖補授額外司業至是奉上諭國子監助教曹洛禋年逾大耋精力康强分教成均蔚為耋宿著加恩授為國子監司業額外行走更定鄉飲酒禮儀禮部奏言各省舉行鄉飲酒禮事不畫一且竟有頻年不舉致曠大典者應令督撫轉飭各屬府州縣遵照定例於正月十月舉行二次其賓介之數據舊禮所載鄉飲酒圖有大賓介賓一賓二賓三賓衆賓與大僎一僎二僎三僎之名按儀禮賓若有遵者諸公大夫則既一人舉觶乃入注言今文遵為僎又曰此鄉之人仕至大夫者來助主人樂賓主人所榮而遵法者也又曰不干主人正禮也又按經文主人親速賓及介而衆賓自從之至於門外主人拜賓及介而衆賓自入其獻酬辭譲之儀甚繁及介已省至於衆賓升受坐祭卒飲不酢而降皆無一言及僎者所謂不干主人正禮者也嗣後應令順天府及直省府州縣先期訪紳士之年髙徳邵者一人為賓次為介又次為衆賓皆由州縣詳報府尹督撫覈定舉行其本地有仕至顯官偶居鄉里願來觀禮者依古禮坐於東北順天府及直省㑹城一品席南嚮二三品席西嚮各府州縣三品以上席南嚮四五品席西嚮無則闕之不立一僎二僎三僎之名不入舉報之内仍將所舉賓介造具姓名籍貫清冊送部存案倘鄉飲後間有過犯按所犯輕重詳報褫革咨部除名并將原舉之官議處從之十九年上謁三陵恩賞耆民先是八年上謁三陵詔奉天吉林所屬旗民男婦年七十以上者分别賞賚至是悉照例行二十年賜安徽百齡生員姚光虞縀一疋銀十兩二十二年上南巡恩賞江浙老民奉上諭朕奉皇太后鑾輿載巡江浙所至黎庶愛戴情殷夾道焚香歡迎輦路而鶴髮皤然扶携恐後尤堪軫念所有江浙二省男婦俱著加恩照從前恩詔例賞賚以示優老引年之意至二十七年三十年南廵如此例恩賞駐防旗人耆老詔江寧京口杭州乍浦等駐防旗人男婦自年七十以上者查明分别賞賚至二十七年三十年南巡並如此例恩賞耄耋儒臣奉上諭顧棟髙年登耄耋經術湛深著加恩賜以國子監祭酒銜又奉上諭秦夀然著加恩賞給翰林院編修職銜秦芝田著賞復知縣原銜秦東田莘田俱賞縀二匹二十四年上詣闕里謁孔林恩賞耆老官兵先是十三年上東巡加賞經過州縣髙年男婦至是仍命照例分别賞賚又詔徳州青州駐防官兵年七十八十以上者查明賞賚又恩賞夀民奉諭㫖禮部議覆福建巡撫題詔安縣民沈起龍年登百嵗五世同居夫婦齊睂子孫繞膝洵屬昇平人瑞宜推優老之恩益懋敦倫之化親製詩章並書匾額以賜仍著賞上用縀三疋以示寵異六星臨海嶠五世茂昌枝聚井風原美充閭慶益滋睦雍堪勵俗和順自延禧鳩杖康强倚籐􅆖左右隨子孫無析箸夫婦又齊睂百嵗亦恒有如翁全者誰二十五年又申定直省鄉飲照京府責成藩司核實之例向例直省舉報鄉飲由儒學州縣具詳該管官其中不無冐濫滋弊部議請照京府之例責成布政司核實報明督撫察核存案不得其人即詳明停止不得拘於成例茍且塞責二十六年恩賞夀民廣東南海縣民楊能啟暨妻黄氏百嵗同臻持賜期頤偕老匾額並御製詩章賜之年登百嵗已堪欣偕老期頤古未聞便是竇公無内子欲贏羅氏有夫君兒圍孫繞唱隨叶五嶺三山瑞氣氲四字旌閭更成詠祥徵慶典蔚慈雲十一月皇太后七旬萬夀恩詔滿洲䝉古漢軍兵丁及内扎薩克喀爾喀等䝉古年七十八十九十以上者分别賞賚至百嵗題明給與建坊銀兩餘悉照從前恩詔例恩賞耄耋儒臣奉上諭編修傅王露檢討職銜周中䂓年登耄耋逺來京師獻冊慶祝洵昇平人瑞著賞給贊善職銜並縀二疋舉九老㑹命逰香山以優遇之在朝王大臣九人共六百七十七嵗在朝武臣九人共七百二十二嵗致仕諸臣九人共七百四嵗二十八年恩賞夀民山東章邱縣夀民王欣然夀一百三嵗弟瑞然夀一百嵗上以昆季一堂期頤萃慶特加優賞並御製詩章賜之淯水由來廖氏泉雞山今有地行仙不希終嘏及純嘏罕見欣然典瑞然棠棣枝同椿樹茂鶺鴒羽共鶴翎翩友于篤愛勤耕讀致夀斯宜表厥賢又上謁東陵幸盤山恩賞夀民奉上諭此次接駕之寧津縣夀民年一百三嵗之李友益著給賞銀牌一面縀二疋伊子年八十六嵗之李三貴八十四嵗之李三剛八十一嵗之李三强並伊姪孫八十嵗之李知毅著每人賞給銀牌一面縀一疋尋賜李友益匾額並御製詩章期頤旌瑞見常年罕覯如斯五代全百嵗春秋侍孫子一身矍鑠撫曽元倕邠懿範猶當遜羅竇髙齡祗獨傳閭里淳風世仁夀養恬引欲溥垓埏三十年上南巡恩賞耄耋文武諸臣浙江處州府訓導王世芳年一百七嵗迎鑾奉㫖賞給匾額並縀二疋提督武進陞年七十九嵗迎鑾上命加恩賞伊子恩夀一品廕生又江南在籍侍郎加尚書銜沈徳潛年九十浙江在籍侍郎加尚書銜錢陳羣年八十皆出迎聖駕諭曰沈徳潛錢陳羣耆宿也並以卿貳予告曩者省方東南存問所及特晉尚書階優頒廩禄兹時巡莅至二臣咸扶杖迎謁耄耋而神明不衰惟國之瑞朕甚嘉焉其各加太子太傅以寵異之沈徳潛之子錢陳羣之子各一人並賜舉人一體應禮部試二臣益忻愉恬養以躋期頤副朕優髙年眷舊臣至意並命照尚書銜食一品俸三十一年優賞㑹試下第年老舉人品級職銜是春直省㑹試舉人雲集京師上念厯科舉人銓選壅滯特命分别揀選録用廣為疏通復以年齒衰邁難以服官任事者並令查明奏請量予職銜以慰其寒窗攻苦之志尋據王大臣等奏各省舉人内騐看及自陳實在老邁龍鍾不堪民牧並不能司鐸者共六十餘名上加恩八十以上者賞給六品京銜七十以上者賞給七品京銜六十以上及雖未六十而騐係實屬衰頺者賞給八品京銜并勅直省督撫於每科驗看截取舉人時其年在七十以上者題請酌給翰林院典簿國子監典簿管官職銜用詔優老至意三十五年安徽巡撫富尼漢奏太湖縣民朱憲章暨妻劉氏同登百嵗欽賜期頤偕老字様照例給銀建坊諭夀民朱憲章暨妻劉氏百嵗同臻期頤偕老允為熙朝人瑞錫此嘉名用式閭里仍賜御製詩章以示恩榮而光旌典並著賞給上用縀二疋銀二十兩御製安徽太湖縣民朱憲章偕妻劉氏同登百嵗大吏請旌並成是什以賜儘有老翁及耆媪未聞婦嵗等夫年成雙大夀直希覯覔匹寰區孰並肩四代孫曽聚庭户一家耕讀樂鄉田重熙喜值閭閻泰用紀人祥叶藻篇是年春上巡幸天津諭朕恭奉皇太后安輿巡幸天津承歡祝嘏蹕途所經龎眉皓首扶杖懽迎足徵仁夀恬熙之瑞仰蒙慈豫宜霈恩施所有老民老婦著地方官照上次臨幸天津加恩賞賚之例賞賚諭原任浙江遂昌縣訓導王世芳前以俸滿引見因其夀躋期頤尚堪司鐸加賞六品頂帶嗣於南巡迎駕復經頒賜匾額縀疋以示優榮今行年百十有二嵗仍復精神矍鑠視履康强逺赴京師稱祝龎睂鶴髪蹈舞班聫實為史冊所罕覯王世芳著加恩賞給國子監司業職銜並予在籍食俸俾資頤養副朕優禮髙年至意又諭據海明奏江西省本年鄉試廣信府屬之興安縣生員李煒年已九十九嵗三埸完卷李煒年及期頤尚能康强應試洵為盛世庥徵著一體賞給舉人副朕推恩引年至意三十六年春上東巡諭朕敬奉安輿東巡齊魯畿封耆庶扶杖歡迎宜首沛渥恩以敷慶澤所有經過直𨽻州縣内男婦年七十以上者著督撫查明照從前恩詔之例分别賞賚又諭本年恭遇聖母皇太后八旬萬夀敷天洽慶特舉恩科多士雲集觀光欣承茂典其齒躋耄耋挾䇿偕來者多至三十餘人且有夀届期頤矍鑠應試者仰見慈慶覃増光昭夀宇而士民之秀受福尤先上瑞嘉徵實為史冊所罕覯允宜宏敷渥澤用廣鴻庥所有本年㑹試舉子内年登百嵗之李煒著賞給國子監司業職銜其八十以上之李珩周變榮胡寳璹傅䕫張棻王志宗桑浡趙銘王玢劉應薦吳觀俱著賞給翰林院檢討職銜七十以上之丁福隆胡銘揚宣猷靳増王熊應温瑗何孫詔許進益張士晸閻循中徐閏章徐勉吳光昇葛涵髙宏謀温朝榮俱著賞給國子監學正職銜俾耆儒應秩咸遂夙懐以彰推恩引年之至意御製江西興安縣舉人李煒年躋百齡來應萬夀恩科㑹試三埸納卷神采倍増洵為熙朝上瑞雖放榜未經入彀特賜國子監司業職銜加賞内府縀疋並親製詩以紀盛事人瑞期頤儘有云春闈應試未曽聞三埸竟得全文字一命應教奬毖勤雅化育材應夀世宏恩錫類祝慈雲端知欲笑胡安定年詡㑹昌最出羣江西巡撫海明奏興安縣欽賜舉人李煒現年一百嵗查李煒已經奉㫖賞給國子監司業職銜又䝉賞縀疋并御賜詩章特昭寵異應否仍照舊例給與建坊銀兩并昇平人瑞字様恭候欽定奉諭㫖照例賞給又諭今嵗恭逢聖母皇太后八旬萬夀特開鄉㑹恩科俾懽洽彚征永為例事其年臻耄耋者業於今春榜後視其齒序恩予職銜夀宇覃釐用徵士林嘉瑞而雲集觀光之衆亦當令其同沾慶澤益廣慈禧著於明嵗春闈後仍照丙戌年之例將應試舉人分别等第揀選引見録用俾得乗時筮仕以示振興並彰錫類作人之至意又諭本年恭逢聖母皇太后八旬萬夀慶洽敷天推廣慈仁施恩耆士兹當順天鄉試士子踴躍偕來其中皓首龎睂較上科倍盛榜後雖未獲雋念其耆年尚赴場屋壯志足嘉而福錫儒林益徵上瑞著加恩將應試諸生年在八十以上之張文逹蘇之洙張静深七十以上之邵無逸張淑瑗李峯段名時張純仁戈熙勲沈岱石震張淑琪趙美楊煜及前日鄂寳奏到山西省八十以上入場之喬玉柱本日何煟奏到河南省八十嵗之寗維祺俱賞給舉人一體㑹試俾遂其觀光夙願並昭夀考作人有加無已之至意又諭今年恭遇皇太后八旬萬夀恩施廣被歡洽耆儒業經降㫖將順天及山西河南各省應試舉子年臻耄耋者特賜舉人用彰作人上瑞今據裴宗錫奏江南應試貢生朱桓翟天衡俱年在八十以上奮志觀光等語朱桓翟天衡俱著加恩賞給舉人一體㑹試俾得遂志沾榮以昭慶澤又諭據徳保奏廣東省本年鄉試有肇慶府之開平縣生員張次叔年已九十四嵗三埸完卷張次叔年踰九旬尚能康强應試著一體加恩賞給舉人副朕推恩引年至意又諭今年恭逢皇太后八旬萬夀覃敷恩慶歡洽耆儒據富明安等奏湖北省應試貢生魯道傳年八十嵗精神矍鑠願切觀光魯道傳著加恩賞給舉人一體㑹試俾得遂志沾榮以昭慶澤又諭據周元理奏東試文闈應試諸生内有九十以上之董書宗郭毓麟八十以上之孫斐並各精神矍鑠妥協完場洵稱熙朝上瑞本年恭遇聖母八旬萬夀東省復有髙年勵志從事棘闈者自當令其同沾慶澤董書宗郭毓麟孫斐俱著加恩一體賞給舉人副朕推恩引年之至意又諭據勒爾謹奏本年陜省鄉試有華隂縣生員張溟年八十四嵗西安府學生員楊生華年八十一嵗均鼓舞觀光文藝完整今嵗恭逢聖母皇太后八旬萬夀陜西之張溟楊生華俱以髙年從事棘闈勵志可嘉著加恩一體賞給舉人俾得慰志叨榮以廣慶澤又諭據永徳奏湖南省本年鄉試有華容縣學生員涂丹山安鄉縣學生員劉志潤年皆八十一嵗考試完場精神矍鑠俱未中式等語今嵗恭遇聖母皇太后八旬萬夀所有湖南之涂丹山劉志潤耆年赴試壯志足嘉著一體加恩賞給舉人副朕引年推恩至意又賜三班九老宴逰香山命於次日赴乾清門内令畫工艾啟䝉繪圖又諭據鐘音等奏興化府學增生柯俊彦年九十六嵗應辛夘科鄉試三場完卷等語本年恭遇聖母皇太后八旬萬夀順天等省鄉試耄年士子踴躍觀光節經加恩賞給舉人俾得各酬夙願今福建省之柯俊彦年近期頤矍鑠應試雖未能獲雋而壯志殊堪嘉尚著一體加恩賞給舉人用彰儒林耆瑞四十一年諭兩金川現已奏凱集勲恭逢聖母鑾輿巡幸山左詣闕里告功兼以省方行慶道經畿輔所至耆庶歡迎倍覘愛戴自宜首沛渥恩所有經過直𨽻州縣内男婦年七十以上者著該督查明照從前恩詔之例分别賞賚又諭朕因功武耆定祗奉慈輿延禧泰岱並詣闕里告成蹕路所經過州縣黄髪龎睂扶携迎迓具徵親愛忱悃宜施渥澤以廣慈仁所有山東省經過州縣内男婦七十以上者著該督查明照從前恩詔之例分别賞賚其青州徳州駐防男婦年七十以上者並著查明照例分别賞賚用昭卹老引年盛典四十三年諭本年㑹試多士雲集觀光其中龎睂皓首頗不乏人且有齒躋耄耋挾策偕來者實為昇平人瑞宜敷渥澤用廣鴻庥所有本年㑹試舉子内九十以上之郭毓麟著加恩賞給國子監司業職銜其八十以上之魯道傳鄭兆球俱著加恩賞給翰林院檢討職銜七十以上之石震趙彦美張廷謨萬邦獻朱鏡俱著加恩賞給國子監學正職銜俾耆儒應秩咸遂夙願以慰其寒窗績學之志又諭向來鑾輅時巡每優賜髙年粟帛以昭行慶况盛京諸處乃祖宗徳澤培貽累洽重熙引恬引養尤徵仁夀之庥兹蹕路經行多有年踰耄耋龎睂皓首扶杖歡迎者宜沛恩膏以彰盛美所有奉天等處旗民男婦及官兵母妻七十以上者各給布一疋米五斗八十以上者給絹一疋米一石九十以上者倍之百嵗者加賞大縀一疋彭縀二疋用示優老引年至意四十四年諭本年恩科順天鄉試諸生中年臻耄耋者頗為踴躍觀光榜發俱未獲雋念其績學有志至老弗衰宜沛渥恩以廣化澤著加恩將應試諸生年八十以上之王景績李蘧張廣基李天民董斌許祖健康銑李成俱賞給舉人一體㑹試俾皓首寒儒得償夙願周昭嘉惠耆年之至意又諭前據三寳奏本年恩科應試士子内郭鍾岳一名年九十九嵗陳應騰等三人均年逾八旬又據畢沅奏應試舉子郭元標等五名皆八十以上舒常奏應試士子章彦一名現年八十伊等黌序寒儒齒臻耄耋尚赴場屋壯志足嘉今各省榜發該生等俱未獲雋宜敷渥澤以廣作人郭鍾岳陳應騰宋耀謝士豪郭元標劉夢花馮書佐徐常淳牛文連章彦俱著加恩賞給舉人一體㑹試俾遂其觀光夙願用昭奬惠耆年之至意又諭據鄭大進奏麻城縣生員李崶年八十三嵗天門縣生員李作朋年八十一嵗本年文闈應試精力尚健三場完卷榜發均未中式李崶李作朋俱著加恩賞給舉人准其一體㑹試用昭嘉惠耆年至意又諭據陳輝祖奏豫省鄉試諸生於出闈後校對學冊齒籍查明澠池縣増生劉髦學年八十五嵗淮寧縣附生李欽元年八十嵗西華縣附生索止任年八十一嵗太康縣附生張光龍年八十三嵗俱三場完卷未曽中式劉髦學李欽元索止任張龍光均著加恩賞給舉人准其一體㑹試用昭嘉惠耆年至意又諭據秦雄飛奏奉新縣嵗貢生王聘年九十五嵗本年文闈應試精神甚屬矍鑠三埸俱如期完卷榜發未得中式王聘耄年應試允稱士林人瑞著加恩賞給舉人准其一體㑹試以遂寒窗績學之志四十五年上南巡諭朕翠華南莅行慶施惠所有經過直𨽻山東二省凡老民老婦著加恩賞賚用示優老引年至意又諭朕翠華南莅愷澤旁敷而優卹髙年恩施宜渥所有江南浙江二省老民老婦俱著加恩賞賚又諭此次南巡所有山東徳州青州江寧京口杭州乍浦等處駐防之老民老婦著加恩一體賞賚用宣慶澤御製亳州夀民陳洪如夀百六嵗妻王氏夀百一嵗詩以紀瑞夀民夀婦本常披百嵗同登鮮見之山左廣東各一閲徽疆歙屬兩逢竒夫耕婦織胥良善子繞孫圍篤慶禧偕老期頤逮兹四旌揚合與異恩施又諭據李湖奏零陵縣學附生王繼梁年九十嵗常徳府學附生文人年八十五嵗衡山縣學附生朱瑞年八十二嵗安鄉縣學附生熊世焱年八十二嵗衡陽縣學附生王寅年八十一嵗黙陽縣學附生邱悊年八十一嵗三埸完卷未經中式等語王繼梁文人朱瑞熊世焱王寅邱悊俱著加恩賞給舉人准其一體㑹試用昭嘉惠耆年敷錫春祺至意又諭此次在淨慈寺接駕之紳士萬承式等十六員均年過古希龎睂皓首矍鑠可嘉俱著加恩各賞縀二疋其老民内之魯文元章傳竒俱夀屆期頤尤為昇平人瑞魯文元著賞縀四疋章傳竒著賞縀三疋鄭華玉亦年近九旬著賞縀二疋以示優賚其王迪清等五名著各賞縀一疋又諭據三寳奏上年福建省欽賜舉人郭鍾岳年百嵗又陳應騰年八十八嵗宋耀年八十五嵗該舉人等情殷感激現由福建來至浙省謝恩郭鍾岳等以海隅寒畯年臻大耋兹因翠華南莅逺涉迎鑾著各賞御書墨刻縀二疋荷包一對郭鍾岳夀躋百齡尤為熙朝人瑞著加恩賞給進士以示優眷耆儒至意至四十九年又賜國子監司業銜郭鍾岳詩登衮夀百四來程里二千誠云天下老疑是地行仙忱悃足嘉矣精神尚躍然恩榮司業袠酬爾矻芸編又諭本年恩科㑹試各省士子雲集觀光其中龎睂皓首挾䇿偕來者多至三十餘人實為熙朝盛事宜加渥澤用廣作人石震萬邦獻朱鏡已加恩賞給國子監學正銜所有年八十以上之李實生等五名俱係鄉試中式舉人著加恩賞給翰林院檢討銜其劉髦學等二十人俱係上年鄉試未經中式欽賜舉人著與年七十以上之吳兆魁等五名一體加恩賞給國子監學正銜俾耆儒膺秩各遂夙願以彰推恩引年之至意又諭本年順天鄉試諸生中三場完卷年屆八十者孟昐等九名榜發俱未中式念其踴躍觀光至老弗衰宜沛渥恩以廣化澤著加恩將孟昐等俱賞給舉人准其一體㑹試用昭嘉惠士林至意又諭本年各省鄉試據該督撫奏應試士子内有年八十九十以上者三場完卷榜發未經中式念其踴躍觀光至老弗衰宜沛渥恩以廣化澤所有江南省之吳球等七名江西省之鄭忠亮等三名湖北省之沈聚奎廣東省之張衍説等五名并中式副榜之楊朂徳雲南省之錢兆基周世徳俱著加恩賞給舉人一體㑹試用昭嘉惠士林之至意又諭據富綱奏本年閩省鄉試有侯官縣廩生林朝綱現年八十六嵗連江縣附生黄建洛現年八十二嵗三場完竣俱未中式林朝綱黄建洛俱著加恩賞給舉人一體㑹試又諭四川阜和協副將馬詔蛟前在軍營曽經出力本日兵部將該員帶領引見詢知伊母曽氏年逾百齡實為昇平人瑞著加恩賞給御書匾額並上用縀四疋貂皮六張用示優奬仍令該員即速回任侍養伊母以昭朕嘉惠耆年之至意四十七年諭袁守侗之母吕氏年逾七袠著加恩賞給御書匾額并大縀二疋貂皮四張四十八年諭金門鎮總兵羅英笈之母年逾八旬著加恩賞縀二疋貂皮四張四十九年諭據保寧奏四川逹州民人張子翼現年百嵗五世同堂一摺張子翼夀享期頤曽元繞膝洵為昇平人瑞宜加恩賚以示寵榮兹親製詩章御書匾額以賜其應賞給銀兩縀疋及建坊之處著該部照例具題御製四川逹州百嵗夀民張子翼五世同堂詩以賜之西川特地報嘉祥衍慶頤齡人姓張署四川總督保寧奏報逹州民張子翼現年百嵗有子三人孫八人曽孫六人元孫三人百嵗夀民五世同堂尤為昇平瑞應因御書頤齡衍慶匾額並成此什以賜一老百年登夀衮元孫五代喜同堂太和元氣天庥沐寰宇熙春祖徳昌際此繁滋仁夀世益廑懐保念無遑五十年諭新正舉行千叟宴所有與宴之官員兵民年在九十以上者俱准其子孫一人扶掖入宴其文武大臣年逾七十者令其自行揣量如步履稍難亦准其子孫一人扶掖入宴以示朕優待耆年有加無已之至意御製千叟宴詩恭依皇祖原韻抽秘無須更騁妍惟將實事紀耆筵追思侍陛髫垂日之曠典皇祖於壬寅嵗舉行千叟宴實從古未有維時與宴王大臣命諸皇子賜觴以示侍立觀慈惠至年未及嵗之皇子皇孫並命禮余時年甫十二躬逢嘉㑹親見耆筵慶錫龍光燕譽之隆閲今乙已凡六十四年矣訝至當軒手賜年今嵗乙已朕御極五十年恭依有年届皇祖盛典於新正初六日再舉千叟宴禮其九十及一品大臣以上皆召至御筵前手賜之觴以昭天恩國慶酬酢一堂之盛君酢臣酬九重㑹天恩國慶萬春延祖孫兩舉千叟宴史冊饒他莫並肩臣等謹按康熙五十二年三月萬夀聖節聖祖仁皇帝命賜老人宴六十一年正月賜千叟宴惟時龎睂皓首感悦鴻慈共升熙皥皇上臨御五十載夀進古稀法祖錫釐寵兹黄髪於上春六日修舉千叟筵宴優老崇年於斯彌烈凡期頤耄耋沐浴聖澤者莫不醉酒飽徳咸欽我皇上夀考作人率祖典以迓天庥依古以來未有比隆於今日者也若夫著三老五更之義闢父事兄事之誣則又聖天子稽古之精俾千百世昭若發䝉也豈不盛哉五十年諭李承鄴奏江西龍泉縣民古朝爵現年百嵗五世同堂古朝爵夀享期頤曽元繞膝洵為昇平人瑞宜加恩以示寵榮并親製詩章御書匾額以賜仍給賞縀疋銀兩建坊旌表御製江西龍泉縣百嵗夀民古朝爵五世同堂用賜四川夀民張子翼詩韻賜之作善應知降百祥西江古並四川張已看躋夀百年袠復喜歡同五代堂食徳飲和三世永龍泉夀民古朝爵生於康熙二十四年届今年一百嵗子孫曽元並萃一堂兹據該䕶撫奏報請旌因御書匾額並用昨賜四川夀民張子翼百嵗五世同堂詩韻以賜新春集慶頻詠繁禧實為昇平盛事夫耕婦織一家昌新春頻詠繁禧句祗益持盈敬莫遑又諭劉秉恬奏雲南阿彌州民王國琰現年一百三嵗請㫖旌表王國琰夀過期頤孫曽繞膝洵為昇平人瑞宜加恩賚以示寵榮兹御書匾額以賜仍給賞縀疋銀兩臣等謹按視學之典肇自禮經我朝列聖相承文明蔚起皇上右文稽古作君作師自御極以來嵗舉經筵闡揚邃學躬親釋奠重道崇師後以京師首善之地教化所先特命増建辟雍親臨講學明萬古五倫之要體自强不息之心猗歟盛哉此即皇上臨御五十年來統理萬幾競競業業常如一日之聖心也凡在侍講臣工圜橋觀聴之倫罔不鳬跂雀躍歡忭無已煌煌至訓誠發千古未發之㫖矣又豈漢永平之徒事鋪張者所可比哉所有行禮儀節宣講經義臣敬謹書載至辟雍規制詳載太學兹不贅述五十年二月上丁皇上釋奠於先師禮畢御彞倫堂更衮服各官咸更蟒袍補服屆時禮部堂官奏請皇上臨辟雍行講學禮皇上御辟雍殿陞寳座滿漢大學士講大學為人君止於仁十句上曰此雖言文王之止於至善而實訓萬古五倫之要道也夫文王固身厯為君臣父子與人交而各盡其善矣試思人孰不在五倫之中而各有當止於其善之道乎是故為君者匪惟博施濟衆以為仁即癉惡弼教之義亦必當本於仁而出之所謂止也人臣之敬詎其夙夜匪懈恪恭承㫖之謂即繩愆糾謬陳善閉邪亦必當本於敬而出之所謂止也生事死葬祭之以禮人子之止於孝蓋終身之事非謂無父母即無子之止於至善也若夫父之曰嚴似殊乎母之慈而不知父之嚴正所以行其慈也至於兄友弟恭夫唱婦隨皆與人交之義而朋友之信固該其中矣余固云此雖言文王之止於至善而實訓萬古五倫之要道也滿漢祭酒講周易天行健君子以自彊不息一節上曰天一日一周是行健也然天之運行終古不息不惟不息蓋並不息亦無意於其間所謂健也此應與中庸至誠無息並觀之所謂誠者天之道也若夫法天之君子乃誠之者人之道然亦不外自彊不息而已蓋天之不息無為而為人之不息則在自彊自彊者必本於克己復禮人十已千成已成物胥在乎是聖人之言非特為為君者言蓋人人皆有法天之道而為人君者益當夕惕朝乾孜孜亹亹不遑暇逸以是為亟耳講畢皇上賜王公衍聖公大學士九卿詹事茶禮畢皇上起座乗輿出太學門祭酒司業率所屬官暨進士舉人諸生跪送候駕過各官咸退如儀御製三老五更説三老五更之説不見於詩書其見於禮記者蓋出乎漢儒非孔子之言惟左傳三老凍餒之文為最古然傳謂公聚朽蠧而三老反不見養遇非與五更相提並論也註三老五更者多矣或謂上中下夀或謂工商農而不及五更或謂明天地人與五行之事或謂取象三辰五星或謂之三徳五事者各以臆度不堪僂指矣至蔡邕獨斷乃有父事兄事之説而白虎通之謬直以為老更各一人而且曰父一而已不宜有三吁可怪哉天子養老即所以教孝於天下何至以父事之且即其説父一而已則天子已自有父今復事一人是非二父乎腐儒執虛文而謬大義真不值一噱耳邕復解更為叟謂亥豕之訛夫叟與老同既有老又何藉叟為哉予以為三者天地人之數養老自以三舉其數耳若夫五更則更事之説為近而五倫五常莫不具於此人數不必其備行之以敬誠愷悌則中和位育將在是矣後儒一切穿鑿之論何足數哉御製三老記予既為三老五更之説以闢諸家之謬然以三老之稱數典於左氏其何以稱三老則求其解而終不得其辭兹以三餘之暇書辟雍詩冊有三老之語臨池下恍然悟曰三老之言實出孟子所謂老而無妻老而無夫老而無子此非三老而何孟子雖出左氏後而此語自由古以傳故即繼之曰文王發政施仁必先斯四者可知文王時即有三老之稱左氏提其綱孟子晰其目耳且晏子對叔向歎齊之將為陳氏所云公棄其民三老凍綏乃指一國鰥寡獨窮之民之無恤者設以上夀中夀下夀論之豈八十以下之老即可以弗恤乎其餘傅㑹之論愈説愈逺然總於辟雍養老興賢有何涉乎自是而三老之稱徧於鄉閭所謂三老董公壺闗三老之類不一而足蓋耆艾而長於鄉者即可稱三老而非定三人也夫予三老五更之説成於戊戌逮今又六年求其説而不得而筆下偶得之是不可以不記且此六年中何嘗不讀孟子而未有㑹兹偶㑹之益見理不可不日窮書不可不日讀寧渠呈已之是顯人之非以為博聞廣識而已哉是年二月諭朕仰承天眷上年喜得五代元孫嘉慶駢臻恩施宜渥因令各省督撫查明所屬紳士庶民冇身及五代同堂者加恩賞賚並據軍機處彚奏共一百九十二户内郭有英張羽劉湘鍾君寵四人俱夀逾百齡曽元繞膝洵為昇平人瑞朕親製詩一章分賞四家並御書匾額以賜用示寵榮仍給賞縀疋銀兩建坊旌表其未届百齡五代同堂之張文聚等一百八十八人並分别年嵗給予匾額賞給縀疋銀兩以昭錫福推恩同登夀宇之至意御製命查各省五世一堂者得百九十四家喜而成詠户口嵗増逾萬萬天恩五世得同堂因教各省胥檢校遂接奏章報吉祥百九四家慶繁衍前因慶得五代元孫隨傳詢各省督撫將民間得元孫者查明咨報彚奏續據奉天直𨽻江蘇安徽福建湖南湖北山東山西四川兩廣雲貴河南浙江江西陜西甘肅各陸續咨報到共百九十四家其中如直𨽻之張璧湖北之李進也貴州之孫月英廣西之鍾君寵得元孫自八人至四人不等尤徵繁衍為史冊所未有二旬三史遜蕃昌昨嵗命彭元瑞曹文植檢閲四庫全書自古見元孫者凡幾據奏三代以上不可考秦漢至隋未有其人惟唐錢朗宋張燾元吳宗元明羅恢歸璿文徵明等六人詳見昨嵗誌事詩並識語撫兹極盛益憂盛暇食惟殷敬不遑户口豈殊今古懸瑞因版籍按民傳黔黎滋盛寧非喜衣食謀艱廑可憐户口滋盛實為從古未冇之上瑞而米價諸物因之日貴此保泰之所以難也増以六家得二百五代同堂者得百九十四家若再増六家則為之二百矣較之四代異天淵前命查四庫全書内自古見元孫者唐宋元明四朝纔得錢朗等六家葢彼皆士籍是以記載得及若編户齊民豈能如今日之按籍而稽此馬遷所以致羡於青雲也然若兹得百九十四家想亦古所未有也立名誠豈乏閭巷所以青雲羡馬遷御製據各督撫奏報夀登百齡而五世同堂者復得四家仍用賜張子翼前韻成什分書賜之紀年五十承天眷述祖乾清叟宴張彚報遂教來續續上年因慶得五代元孫命各督撫查民間得元孫者咨報彚奏嗣據四川總督特奏逹州張子翼江西巡撫特奏龍泉縣古朝爵均以百嵗夀民五世同堂因親製詩章並御書匾以賜其各省陸續彚咨五世同堂者凡一百九十二家而百嵗五世同堂又得四家特章豈獨讓堂堂京畿齊粤四氏得直𨽻順義縣郭冇英山東聊城縣張羽厯城縣劉湘廣西柱平縣生員鍾君寵四人皆夀登百齡曾元五世因仍用前韻成什並各書匾以賜張羽郭冇英劉湘鍾君寵五代昌夀世庥徵真是罕持盈保泰惕何遑是年諭大學士蔡新老成端謹品學兼優由乾隆元年進士洊涉卿班典司胄監簡任綸扉在上書房行走為諸皇子總師傅朕視其年齒雖増精神不減正資倚畀兹以衰疾奏請解職回籍調理情詞懇切覽奏彌眷於懐第念伊年近八旬閩省又距京路逺不忍重拂其意勉從其請以原官致仕並晉加太子太師親製詩章以寵其行仍於朕巡幸熱河啟鑾送駕後再行束裝給驛回籍沿途經過地方官在二十里以内著照料䕶行俾得安適歸里怡志林泉蠲疴頤養以示朕優眷耆臣至意御製送原任大學士蔡新歸里不忍言留合令歸及歸言别又依依忠舒贊理登黄閣醇藉授經近紫㣲尚計一旬萬幾敕顧瞻左右老臣稀心交豈在形容際榻下閩山是也非建坊旌表五十年諭福崧奏海寧州民顧均玉現年一百一嵗顧武恭現年一百四嵗又天台縣民林均治現年一百二嵗請㫖旌表顧均玉等年逾百齡精神矍鑠洵為昇平人瑞其應旌表及賞給縀疋銀兩著該部照例具題又諭何裕城奏陜西長安縣民孟世强現年一百一嵗世安耕鑿請㫖旌表孟世强年逾百齡精神矍鑠素行淳良洵屬昇平人瑞著照例旌表以示嘉惠耆齡之意又諭特成額奏湖南芷江縣民周仲珍現年一百二嵗精力强健應請旌表周仲珍年逾百齡精神矍鑠洵屬昇平人瑞著准其照例旌表以示嘉惠耆齡之意皇朝文獻通考卷七十六
