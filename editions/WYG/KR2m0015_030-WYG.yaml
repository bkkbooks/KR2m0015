body:
  text: 欽定四庫全書皇朝文獻通考卷三十征𣙜考五𣙜酤康熙二十八年飭禁盛京多造燒酒縻費米糧奉諭㫖近聞山海闗外盛京等處至今無雨尚未播種萬一不收轉運維艱朕心深為憂慮且聞彼處蒸造燒酒之人將米糧縻費頗多著户部侍郎賽弼漢前徃奉天會同將軍副都統侍郎等嚴加禁止旋以奉天府府尹王國安陛辭復申諭之乾隆二年除東安等六縣油酒税銀長蘆鹽政兼管天津闗税務準泰奏言天津闗税務除各處口岸征收税銀外更有離闗窵逺之油酒税銀一項向例按季差役給發印票分徃東安武清香河永清寳坻及寳坻新分之寧河縣各城鄉地方挨查油酒舖家每舖收錢多寡不等伏查東安等六縣相距津闗自八十里至一百四十里不等所有油酒舖家及本地居民不比過闗商販且時歇時開額無一定該差持票逺出勢必苛求勒索擾累無窮雖相沿日久實屬陋例請將天津闗按季差役分徃東安等六縣查收油酒税銀之處永行停止户部議准得㫖允行又酌定北五省燒鍋躧麴之禁總理事務王大臣等奉上諭禁止燒鍋一事朕從前降有諭㫖因孫嘉淦條奏復令王大臣九卿集議續經兩議具奏朕又降㫖令其確議今思禁止燒鍋乃闗係民生日用之事督撫大臣所當悉心籌畫者著交直𨽻河南山東山西陜西等省督撫具奏仍下原議之王大臣等會議尋議民間私開燒鍋耗費糧食向經屢行禁止我皇上廣詢博訪察兩用中令河北五省督撫各就地方民生日用之情形據實陳奏有請仍照舊例查禁者有請宜寛於豐年而嚴於歉嵗者有請不必禁止者有請永行嚴禁者有請嚴禁肆行躧麴興販者實皆體民之情因地之宜以各抒所見也伏查直𨽻總督疏内以燒酒之禁宜嚴於歉收之年稍寛於豐裕之嵗本地釀造與零星造麴者毋庸禁止其麥麴燒酒槩不許出境如肆行躧麴興販者應行嚴禁并稱富商大賈之興販既絶則本地之所銷自少河南廵撫以行法宜因乎地而立禁先清其源豫省酒多自造比户皆然請免零星製麴之查禁而廣收多躧販賣者應行嚴禁躧麴不行燒鍋可以漸減甘撫以甘省並非産酒之區毋庸嚴禁陜撫則以為陜省俗儉民間祭祀慶弔等事不得已而用酒若禁燒酒而用黄酒則専用米糓細糧轉於民生未便况臨邉地冷兵民藉以禦寒勢難槩禁惟躧麴開行逺販者嚴加禁止陜督則以為燒鍋當禁而不可以必禁禁之所以節流寛之所以去擾惟歉年自宜禁令加嚴其躧麴開行逺販者宜嚴行禁止山西廵撫以晉省燒鍋可寛於豐年應禁於歉嵗小民自宜遵守至山東廵撫因本嵗二麥偶旱嚴某燒鍋躧麴竟有毁棄釀具者有改業者有自行出首者亦已行之著有明驗臣等公同詳議因地制宜者國法之備因時立法者王政之經王制有曰修其教不易其俗齊其政不易其宜謂凡居民服食器用之不能畫一也燒鍋一事各省之情形不同所以各省之陳奏亦不能畫一各就其土俗民情熟籌詳酌據實陳奏自必確有所見較之憑虛懸擬者自為親切應照所請即令各於本省因時制宜實力奉行以觀成效至躧麴一項係燒酒盛行之源躧麴多則私燒必廣有損蓋藏且富商巨賈肆行躧麴廣收販運易於查拿不致滋擾禁之以清其源禆益甚大各省督撫陳奏衆論僉同均無異説亦應如該督撫所奏凡富商巨賈廣收麥石肆行躧麴大開燒鍋者嚴行禁止但該督撫等所請治罪之處均未畫一查違禁私燒者向例俱照律杖一百今將躧麴販運之處嚴行禁止如仍一體懲治實不足以示儆應將廣收麥石肆行躧麴大開燒鍋者杖一百枷號兩個月其官員處分應照吏部原議失察之地方官每一案降一級留任失察至三案者降三級即行調用如官吏有賄縱等弊照枉法律計贓論罪從之五年禁畿輔燒鍋躧麴耗費糧食御史齊軾奏稱今秋收穫較徃嵗為豐畿輔盈寧視外省為更盛惟是商賈雲集嗜利多人而麴蘖一端耗糧最甚雖禁令已經詳定而農場多粟必樂於聚財倘奉行一有廢弛則以酒居竒者必以糧覔利竊見近日京師九門每日酒車銜尾而進市價甚賤為數年來所無是必網利之富賈販酒者多故其價大減亦必附近之州縣私燒者衆故車載日盛也應請勅下近省督撫轉飭所屬地方恪遵定例實力稽查奉諭㫖齊軾所奏甚是秋成豐稔之時正宜講求民間儲蓄之計著孫嘉淦轉飭所屬地方官窮緝治罪不得姑容至於零星沽賣者不必過為深究倘因降此㫖將二三無力小户查拿以為塞責之具致使閭閻滋擾而奸商巨販轉以納賄於官吏而脱然事外藐法公行則州縣官之咎更不可逭可傳諭直𨽻及隣近省分一體遵行八年勅免通州油酒等項征納額税總督倉場侍郎覺羅吳拜奏通州税務經前道祝兆熊任内以芝蔴麥子生猪已按石按口報納額税而磨油磨麫屠宰舖户又納季鈔似屬重複其燒黄酒零綢故衣㡌舖念係小本貿易經營餬口將一切所征舖户季鈔名色盡行革除具詳前任直𨽻廵撫批行勒石永禁至雍正五年前任坐糧㕔顧琮等查明故衣零綢舖户各税照舊抽收至乾隆七年經現任坐糧㕔恩特等檢查部頒則例所載磨油舖户每月報油四簍每簍正税銀一錢五釐通灣酒舖户上户每月税銀一錢五分中户一錢下户八分通灣糖房舖户上户每月税銀三錢中户二錢下户一錢仍令按欵報納查通州税欵内之油酒糖舖各税雖所抽數屬些微但以部册開載之欵向來未經題奏即行批禁殊屬不合奏請交部議覆得㫖免其納税十四年禁運販紅麴紅糟分别治罪輕重例福建布政司永寧奏言躧麴一項久奉禁止但麴原以麥製造是以直𨽻山東河南江南等省産麥處所造麴者多至於閩省種麥原屬稀少民間造酒不用麥麴而以米為之其名紅麴葢麴價較之米價頗昻小民於秋收之際不知珍惜每多製造紅麴以圖厚利訪得古田屏南永安平和等邑并汀邵二府各屬縣是處俱有嵗耗甚多又聞建安縣之南臺里地方專以上號食米製造紅麴凡造紅麴者又必先買紅糟方能造麴歴來雖經飭禁無如趨利之徒仍多不遵請以民間零星自用者免其查禁如多為製造船裝運販者槩行禁止如運販五百觔以内及廣收米石製造運販一千觔以上者分别治罪紅麴變價入官地方官失察賄縱俱論如法疏入下部議行臣等謹按周書有羣飲之戒周官有幾酒之條葢以徳將無醉戒彼沉湎者流而酒醪糜糓則亦漢詔所諄諄也自漢孝武𣙜酤以後或占租以市酒或列肆以聚贏或按月以納酒錢或逐月以克市絹甚者官自造酒而禁民之私酤吏主釀務而課民以入直至宋熙寧年間酒課嵗額有至四十萬以上者鬻樵雇薪抑配白納或且有算畝起􅉽反過正税又其甚者矣我朝本無𣙜酤之官其天津六縣及通州酒税有司以聞即䝉恩免惟念釀酒之家耗費米糧禁北省躧麴燒鍋集廷臣及外省督撫酌中定議官不利其所入而為小民籌葢藏之計至詳且盡因嵗收之豐歉以為禁約之寛嚴因販麴之多少以為論罪之輕重葢養民者使其自養愛糓者去其害糓猶是周書誥戒小子及漢初羣飲罰金之遺意焉四十五年户部議杭州織造徴瑞言北新闗收税舊例每烟百觔税銀四錢六分酒十罈約計二百觔税銀二分今部頒則例刪併兩項並每百觔税銀四錢均有窒礙應如所奏仍照舊例辦理從之𣙜茶順治二年定陜西茶馬事例先是元年定與西畨易馬每茶一箆重十觔上馬給茶篦十二中馬給九下馬給七至是差御史轄五茶馬司户部言陜西召商茶以易畨馬向有照給金牌勘合之制查前明詔諭通接西番闗隘處所撥官軍廵守不許私茶出境凡進貢番僧應賞食茶頒給勘合行令四川布政司撥發庫茶照數支放不許於湖廣等處收買私茶違者盡數入官仍將伴送人員治罪此舊例之可行者若金牌一項係明初事例永樂十四年已經停止我朝定鼎各番慕義馳貢金牌可以不用但以茶易馬務須酌量價值兩得其平無失柔逺之義從之三年免茶馬增解額數茶馬舊額一萬一千八十八匹自故明崇禎三年增解二千匹所增馬匹究竟年年虛額無濟軍需茶馬御史廖攀龍奏請永行蠲免從之七年定陜西茶引從部頒發例廵視茶馬御史吳達疏言陜西茶引明季係茶馬御史自行印發故引有大小之分又有大引官商平分小引納税三分入官七分給商之例今引從部發俱應照大引例官商平分以為中馬之用報可康熙三十四年勅遣専官管理茶馬事務户部議覆刑科給事中裘元佩條奏馬政事闗𦂳要洮岷諸處額茶三十餘萬箆可中馬一萬匹陳茶每年帯銷又可中馬數萬匹查茶觔中馬甚有禆益應將額茶中得之馬給營驛外其餘馬每年交秋將數千匹送至紅城口等處牧放得㫖茶馬事闗𦂳要著遣專官管理三十五年飭准打箭爐番人市茶貿易四川廵撫于養志遵㫖㑹同烏斯藏喇嘛營官等查勘打箭爐地界奏番人藉茶度生居處年久且達頼喇嘛曾經啟奏准行應仍准其貿易理藩院議准從之四十四年停止廵視茶馬官員歸甘肅廵撫兼管先是三十六年專差部院管理茶馬事務至是年復歸廵撫兼管因招中無幾西寧等處所徴茶箆停止易馬將茶變價折銀充餉至雍正九年奏准五司復行中馬之法每上馬一匹給茶十二箆中馬一匹給茶九箆下馬一匹給茶七箆俟一年之後計所收馬匹即留甘省軍營之用或馬數甚多分撥河南山西就近喂養十年奏准中馬之法應見馬給茶至十三年仍復奏明停止五十八年准􅂻塘巴塘地方買運茶觔議政大臣等議覆都統法喇疏言䝉古地方及西藏人民皆藉茶養生松潘一路茶價甚賤青海一𢃄積茶必多應暫行禁止俟其懇請時再酌定數目令其買運至打箭爐外最近者為􅂻塘遣官招撫令營官造具所管畨寨户口清册酌量定數許其買運巴塘以外亦照此例其打箭爐一路當視畨情之向背分别通禁應如所奏從之互見市糴考雍正八年定川茶征税例奉諭㫖川茶皆論園論樹以定税額夫茶樹有大小不同園地有廣狹不一若槩以園樹之數為額未為允當應將茶税照觔兩收納方得其平著該撫詳議經户部議准四川撫臣憲徳疏言川省行茶原額新增共邉腹土引八萬五千三百四十四張納課銀四百二十四兩計算每觔止納課銀四絲九忽零實屬太輕今該撫定以每觔一釐二毫五絲令各商人在於茶價銀内扣存即隨引税赴地方官照數完解所議甚為妥協應令該撫將前項𣙜課銀一萬六百六十八兩按年造入奏銷册内具題查核再查陜西行茶定例每引一道運茶百觔每茶一千觔准帯附茶一百四十觔如有夾帯即以私茶論罪今該撫請加耗茶一十四觔如有多𢃄照私鹽例治罪地方官有故縱失察者照失察私鹽例處分仍令該撫將行茶商人姓名並産茶州縣𣙜課細數造册報部得㫖允行十年准預頒四川省行茶引張隨時給發四川廵撫憲徳疏稱川省行茶原以部引為慿自應請引行運但口外畨彛貿易多寡内地州縣無從查考或見番客雲集茶觔易售方請增引如必候部頒發則番客已去各商未免畏阻不前請於額頒之外預頒茶引五千張收貯廵撫衙門俟有請增州縣一面題報一面即將部引給發下部議行乾隆六年酌減四川松潘地方行查邊引户部議覆四川廵撫碩色奏請酌減松潘茶引一案查川省松潘地方行茶邉引原額一萬三千七百六張已儘足行銷原無引茶不敷買食之處後因天全州土商濫請增給土引以致積滯經前撫臣楊馝題准改撥各州縣代為分銷維時成都等縣商人因松潘修城之時畨民聚集傭工茶觔易銷定為常額是以成都縣撥銷土引六百張彭縣八百一十一張灌縣三千六百張崇寧縣一百八十張石泉縣一百六十二張安縣二百六十四張俱改照邉引納税於松潘行銷年來城工告竣番民陸續回巢茶觔漸至壅滯應如所請將成都等縣積引量減四千四十九張併課税銀兩一併照數開除從之又准甘省官茶辦交本色先是甘省官茶因停止招中馬匹節經該撫題明將官茶改徴折色陳茶定價發變俟各司銷存至六十萬封上下題徴本色至是䕶撫徐杞以各司銷存庫茶止九十二萬餘封迨新茶辦運到甘陳茶接續分銷可存六十萬封上下請仍令商人辦交本色從之八年豁免川省茶引未完銀兩奉諭㫖前因川省松潘引多茶壅故將天全州之積引改撥成都彭灌等縣行銷每年空繳引張賠納税課官商交累乾隆六年朕降㫖開除成都彭灌三縣積引四千四十九張并課税銀二千四百一十七兩二錢從乾隆七年為始官商俱受其益惟是乾隆七年以前之羡餘截角尚屬拖欠成都彭灌三縣均有未完銀兩川省茶商貲本微薄無力復完舊項朕心軫念著將所有三縣舊欠悉行豁免二十四年准甘肅五司茶封搭放各營俸餉户部覆准甘肅廵撫吳達善奏言甘省交庫茶封日積酌議設法銷售經前任布政司明徳酌請每封或定價銀六錢運赴甘肅安三處變價三年以來僅銷茶一萬餘封現在各司庫貯茶尚有一百四十餘萬封宜亟為籌畫檢閲舊案康熙三十七年因甘司茶封無馬可中貯庫年久經督理茶馬事務内閣學士錢齊請於五鎮俸餉馬乾之内銀七茶三搭給今五司存貯茶封自應照此辦理惟是甘省滿漢各營每年需茶若干難以懸揣自乾隆二十五年春季起令其按季自行酌定茶數總以一二三成搭支銀兩在於司庫請領即於附近五司處支給從之二十五年奏定洮河二司茶封歸甘荘二司辦理户部議覆甘肅廵撫吳達善奏言甘省茶課向為中馬而設故每年額引二萬七千二百九十六道内分西司九千七百一十二道坐落西寧府洮司三千三百道坐落岷州河司五千一百三十二道坐落河州莊司五千一百五十二道坐落平番縣甘司四千道坐落蘭州府今中馬之例久停在甘莊二司係各處衝衢西河二司附近青海常有銷售之路惟洮司地處偏僻土瘠民貧故該司商銷茶觔歴年俱告改别司售賣惟交官茶封仍交洮庫徃徃積至數十萬封始請疏銷臣查甘莊二司地處衝衢撥用收支均屬近便應如該撫所請將洮司額頒茶引改歸甘莊二司給商徴課俟洮司庫貯茶封搭餉完日即行裁汰疏上如議行嗣於乾隆二十七年以河司雖附近青海䝉古而一切交易俱在西寧從不一赴河州其情形與洮司無異亦行裁汰其額引五千道併歸甘莊二司臣等謹按李唐囬紇入貢以馬易茶宋熙寧嘉泰間相繼行之漸置茶馬之官至故明齎金牌三衛收馬給茶名曰差發其制中廢當時籌國者屢以為言然明政已弛竟不能復也我朝定鼎之初差茶馬御史招商領引納課所中馬匹牡者給各邉兵牝者發所司牧養孳息順治十四年以七監馬匹蕃庶凡茶馬變價銀兩改解充餉康熙三十二年以蘭城無馬可中將甘州司積貯茶箆銀七茶三用充俸餉葢本朝牧地廣於前代稍為孳息則已驪黄遍野雲錦成羣今則大宛西番盡為内地渥洼天馬皆櫪上之駒中馬之制久停是以甘肅茶封恒苦於霉變或變折價銀或以充俸餉甘省五司已裁其二尚存甘莊二司及西寧一司頒引徴課亦以留中馬之舊跡於不廢云二十七年以茶觔積滯籌畫疏銷陜甘總督楊應琚遵㫖條議甘省五司官茶疏銷事宜一官茶應改徴折價也按甘省庫貯官茶向例如遇存積過多改徴折色如庫貯無幾復請征本色今五司庫内自乾隆七年至二十四年已存積至一百五十餘萬封經前撫臣吳達善於二十四年奏准每封作價三錢搭放兵餉以來當奉行之始兵丁領獲茶封尚有餘利今行之二年有餘已搭放過茶四十萬餘封現在市肆官茶日多非十年之久不能全數疏銷且每年商人又增配茶二十四萬餘封商茶既多官茶自必益加壅滯莫若將商人應交二成官茶五萬四千餘封暫停交納照例每封徴折價三錢俟陳茶銷售將完再行征收本色一商茶應准其減配也查甘省茶法商人每引交茶五十觔無論本折即係額課此外尚有充公銀三萬九千餘兩亦係按年交納無殊正供至商人自賣茶封每引止應配正茶五十觔連附茶共配售三十餘萬封該商等即以配售之茶完納前項應輸之課經前撫臣吳達善奏准增配以紓商力並無課項苐茶封既已加增又有搭放兵餉之庫貯官茶勢致愈積愈多難免停本虧折今酌中籌計商人情願每引一道止配茶十五封内應酌減無課茶一十五萬八千三百十六封共止配茶四十萬九千四百四十封至二成本色茶封現既酌議改徴折價自亦無庸配運一陳積茶封應召商減售也查各司俱有陳積茶封而洮司為最多該司地處偏僻定議搭餉計非數十年不能完現在每封四錢發售商民無利可獲裹足不前請仍照乾隆二十六年前撫臣明徳原議每封定價三錢召商變賣河西二司共存茶六十餘萬為數較多亦准其一體照數售變一内地新疆應一體搭放也查乾隆二十四年前撫臣吳達善奏准滿漢各營以茶封搭餉至新疆地方茶觔一項向湏取資内地誠如聖諭各處濟用自屬多多益善今官茶以沿途站車輓運毋庸脚費其自肅州運至各處將脚費攤入茶本之内較之買自商賈價值尚多減省部議應如所請從之二十九年免追浙省行銷順天茶觔殘引舊例浙省行銷茶引令各商過闗輸税截角統俟茶觔售完之日將所執殘引交原發衙門送部查銷嗣據閩浙總督楊廷璋奏報浙省行銷口外等處引張歴經收税截角更由崇文門戮去中間實無影射情弊請將口外殘引免其繳部内地殘引即在行茶處所催繳復據侍郎兼管順天府尹錢汝誠等奏稱浙省乾隆二十三四等年行銷順天茶引共一萬九千餘道自准浙省咨後即經照例查追迄今日久大半多無着落推原其故實緣行茶與行鹽不同商無一定地任遷移殘引多隨客散查究無根難以追繳嗣後浙省行銷京城茶引應令崇文門於戮去中間時即將所戮引心彚齊送部查核其殘引一體免追以省擾累從之三十七年户部議前任總督阿爾泰奏南川縣地方産茶茂盛每年除配額引之外尚有餘積請自今始增茶腹引一百張照例徴收課税應如所請從之三十八年户部議四川總督劉秉恬等覆奏請嗣後三雜谷等處土司買茶以千觔為率使僅敷自食不能私行轉售從之坑冶康熙十四年定開採銅鉛之例户部議准凡各省産銅及黒白鉛處如有本地民人具呈願採該督撫即委官監管採取至十八年復定各省採得銅鉛以十分内二分納官八分聴民發賣監管官准按觔數議叙上官誅求逼勒者從重議處如有越境採取及衙役擾民俱治其罪臣等謹按嗣後各厰之開閉視山礦之旺衰康熙年間如奉天浙閩諸省皆曾開採續經停止今則湖南雲貴川廣等處並饒礦産而滇之紅銅黔楚之鉛粤東之㸃錫尤上供京局者也大抵官税其十分之二其四分則發價官收其四分則聴其流通販運或以一成抽課其餘盡數官買或以三成抽課其餘聴商自賣或有官發工本招商承辦又有竟歸官辦者額有增減價有重輕要皆隨時以為損益云十九年定雲南鉛厰通商之例詳見市糴考四十六年定雲南礦税毋許加增户部議雲南金銀銅錫等礦厰税額應令該督據實查核加增上諭大學士等曰雲南礦税一年徴銀八萬兩零用撥兵餉數亦不少若又令增加有不致累民乎此所得錢糧即敷所用矣本發還著照題議結四十九年以盛京部臣請改採鉛地方飭部議處工部議覆盛京工部侍郎席爾圖疏言錦州採鉛請改於遼陽採取得㫖採鉛事情前因白爾克條奏自遼陽州改徃錦州大碑等處今又因席爾圖所奏議仍在遼陽州採取前所奏是則今所奏非今所奏是則前所奏非一切事務該部當據理剖㫁分别是非定議乃止據現在條奏草率議准殊為不合凡部院及督撫官員更换一人皆如此頻更舊例貽悞必多著嚴飭行五十一年以四川撫臣能太摺奏諭示廷臣奉諭㫖原任四川廵撫能太曾具摺奏聞開礦後又奏稱江中有銀派官監視撈取以為兵餉朕以此二事俱不可行隨硃筆批發朕乃人君豈有令江中撈取銀兩之理觀此二事即知能太必貪督撫提鎮奏摺一二次可知其行事也五十二年奏准久經開礦地方分别開採其未經開採者禁之大學士九卿等議覆開礦一事除雲南督撫及湖廣山西地方商人王綱明等各雇本地民人開礦不議外他省所有之礦向未經開採者仍嚴行禁止其本地窮民現在開採者地方官查明姓名記册聴其自開若别省之人徃開及本處殷實之民有霸佔者即行重處上曰有礦地方初開時即行禁止乃可若乆經開採貧民勉辦貲本爭趨覔利藉為衣食之計而忽然禁止則已聚之民毫無所得恐生事端總之天地間自然之利當與民共之不當以無用棄之要在地方官處置得宜不致生事耳雍正元年停止黔省開採銅礦貴州廵撫金世揚疏稱黔省地處荒陬銅觔原無出聚間有一二礦厰乆經封閉若令開採鼓鑄無論工費浩大一時難以獲效且貴州漢苗雜處每逢場市貿易少則易鹽多則賣銀今使錢文漢苖商賈俱非情願若以配充兵餉領運既難流通無時黔省用銀沿習已乆請照舊例停開下部知之二年兩廣總督孔毓珣奏請於廣東開採以濟窮民上諭廷臣㑹議嗣奉諭㫖昔年粤省開礦聚集多人以致盗賊漸起隣郡戒嚴是以永行封閉夫養民之道惟在勸農務本若皆舎本逐末各省游手無頼之徒望風而至豈能辨其姦良况礦砂乃天地自然之利非人力種植可得焉保其生生不息今日有利聚之甚易他日利絶則散之甚難爾等揆情度勢必不致聚衆生事庶幾可行若招商開厰設官收税傳聞逺近以致聚衆藏姦則㫁不可行也三年以江西撫臣奏封禁山事宜特㫖訓示江西廵撫裴􅏍度遵㫖摺奏廣信府之封禁山相傳産銅舊名銅塘山明代即經封禁其中樹石充塞荒榛極目並無沃土可以資生亦無頑民盤踞在内此山開則擾累封則安寧歴有成案康熙五十九年鉛山匪類擒獲之後此山搜查二十餘日並無藏匿據實奏聞得㫖當開則不得因循當禁則不宜依違但不存貪功圖利之心實心為地方興利除弊何事不可為也在秉公相度時宜而酌定之五年封禁雲南中甸銅礦從總督鄂爾泰請也又以湖南撫臣奏請開礦降㫖訓示湖南廵撫布蘭泰疏奏開礦事宜降諭㫖開採一事目前不無小利人聚衆多為害甚巨從來礦徒率皆五方匪類烏合於深山窮谷之中逐此末利今聚之甚易將來散之甚難也至於利之在公在私尚屬細事爾果欲効忠藎何必諄諄以利為言豈不聞有一利必有一害爾當權其利與害之輕重大小而行之耳六年賜安南國鉛厰山地四十里安南國王黎維祹上疏陳謝下部知之又准廣西地方開採礦砂户部議覆廣西廵撫金鉷疏言桂林府屬澇江等處各礦請招募本地殷實商人自備資本開採所得礦砂以三歸公以七給商其梧州府屬之芋莢山産有金砂請另委員辦理再粤西貧瘠銅噐稀少如開採得銅並請價買以供鼓鑄均應如所請從之九年禁止廢鐡出洋工部議覆刑部尚書勵廷儀疏言天生五材鐡居其一用以備軍需而造噐物所係綦重向例鐡貨不許私出外境而廢鐡不在禁例近聞射利之徒専收廢鐡鎔化運至近邊近海地方貨賣此風漸不可長請嗣後有將廢鐡潜出邊境及海洋貨賣者照越販硝磺之律科斷以除姦弊應如所請從之互見市糴考又禁洋船收買鐡鍋廣東布政使楊永斌條奏定例鐡噐不許出境貨賣而洋船私帶禁止尤嚴粤東所産鐡鍋每連約重二十觔查雍正七八九年夷船出口每船所買鐡鍋少者一百連二三百連不等多者至五百連併有至一千連者計算每年出洋之鐵約一二萬觔誠有闗係請照廢鐡之例一體嚴禁違者船户人等照例治罪官役通同狥縱照狥縱廢鐡例議處嗣後令海闗監督詳加稽察至商船煑食噐具銅砂鍋俱屬可用非必盡需鐡鍋亦無不便外夷之處於朝廷柔懐逺人之徳意並無違礙奉㫖鐡觔不許出洋例有明禁而廣東夷船每年收買鐡鍋甚多則與禁鐡出洋之功今不符矣楊永斌所奏甚是嗣後稽察禁止及官員處分商人船户治罪之處悉照查禁則他省洋船出口之處亦當一體遵行永著為例嗣是十年以湖南産鐡展轉運販應給與印照令沿途闗隘查照放行互見市糴考乾隆六年准開滇省卑浙塊澤二鉛厰并試開東川者海地方鉛厰户部覆准雲南廵撫張允隨奏稱滇省存厰運局鉛觔應預為籌畫請將曲靖府屬之卑浙塊澤二厰准其照舊開採所出鉛觔按例抽課再該署督奏稱東川府所屬之者海地方亦産有鉛礦距東局路止二站應令該署督張允隨將前項鉛礦查明作速採試得㫖如議行七年奏定川省銅鉛開採事宜户部議覆四川廵撫碩色奏言建昌道所屬之迤北沙溝紫古哵三銅厰川東道所轄雲陽界連奉節縣之銅鉛礦厰永寧道所轄長寧縣之茶山溝鉛厰並無妨礙田園廬舎取礦煎試每礦一觔約可煎凈銅鉛三四兩不等實屬旺盛應准其開採所出銅鉛除抽課之外商民所得銅鉛照例收買以供鼓鑄至開採礦厰人衆事繁若不委員専司經理難免滋事透漏應准其酌委佐雜幹員分厰經管専司抽課稽查約束并於建昌雲陽長寕三處各委官一員一年期滿於要隘處所不時廵查并將各商煎出銅觔給票登記如與抽課印簿不符及􅀻煎等弊即將本商爐頭責革另募殷商充補再黒白鉛觔俱係鼓鑄所需長寧雲陽等處應准其招商開採照例二八抽課每年將細數按季造報嵗底具題仍將厰名處所預行造册送部以備查核得㫖如議行八年定湖北湖南兩省礦厰開閉事宜户部議覆前任湖廣總督孫嘉淦疏稱原任左副都御史仲永檀條奏楚省出産銅鉛等礦一案查楚省産礦之地頗多而開有成效之處甚少若不悉心籌畫因地制宜濫請開採適滋擾累今除湖南常寧縣屬之龍旺山礦厰先曾刨試係黒鉛粗砂且不敷工本隨經封停在案又沅陵辰谿永順桑植等縣礦厰並綏寧縣銅礦㑹同縣金礦宜章縣錫礦及湖北施南興國竹山等府州縣礦厰或屬苗疆或有妨田園廬墓或産砂微細並無成效無人承採均應飭令地方官嚴加封禁他如湖南之邵陽武岡慈利安化永定等州縣鐵礦俱係各該居民農隙自刨以供農噐間有産鐵旺盛之芷江縣挑徃隣邑售賣應聴商民自便至於郴桂二州礦厰雖係銅鉛夾雜然地方既非苗猺又無妨礙自應聴其開採抽得税銅砂價鉛觔並收買商銅於鼓鑄庫帑洵有禆益應如所奏疏上從之九年准粤東開採銅礦兩廣總督那蘓圖等奏稱粤東開採礦厰自康熙三十八九年以來議開議停已非一次第以錢文日少民用日絀鼓鑄一事萬難緩待粤東現有礦厰棄而不取是猶坐守倉廩而無術療饑非計之得也况粤東山多田少應募工丁㫁非有田可耕有地可種之農圃是開採礦厰兼可為撫養貧民之計似宜將現在報出銅鉛各礦先行試採自廣州肇慶二府起由近至逺以少及多砂旺即開砂弱即止陸續酌量抽課至於金銀二礦民多競趨恐轉於鼓鑄有礙應請照舊封閉凡銅礦内有夾帯銀屑為數甚微者仍准開採抽課下部議行十一年定粤西銅厰加二抽課户部覆准署廣西廵撫托庸奏粤西開爐以來銅觔每不能接濟臣前奏請三分抽課七分聴商自賣仍於商本不敷試辦八月不能有濟懇將商辦銅觔仍照加二收課餘銅每百觔給以十六兩二錢之價收買應如所奏從之十二年以粤西礦厰飭委道員查核廣西廵撫鄂昌奏粤西一省地居邊徼向來額賦無多所有各處礦厰原為凑充兵餉之用雖各厰出砂之多寡抽課之盈絀自有不同而走漏侵𨼆之弊所在不免請令分守蒼梧道及分廵左江右江二道員將所轄各厰抽收課銀就近稽查確核從之十五年開浙省温處兩郡採鐵之禁户部議覆閩浙總督喀爾吉善疏言五金之産為天地自然之利如果經理得人設法開採原足以便民生而資器用第恐防閑不密料理未周每致紛擾滋事是以向有查禁之例浙省處州府屬之雲和等縣前經撫臣常安奏請槩行封禁今據該督等奏稱處州府屬之雲和松陽遂昌青田四縣并温州府屬之永嘉平陽二縣及附於平邑淘洗之泰順一縣土瘠民貧以採鐵為恒業封禁以後陽奉隂違徒啟吏胥需索之弊况雲和等七縣俱係内地與近海産鐡應行封禁之寧台等屬不同歴來並無潜藏奸匪透漏外洋等弊應照該督等所請仍弛其禁照舊開採以濟民生所有各項税課亦應如所請令地方官勘明分則起科俟試行三年後再為酌中定額從之十六年定湖南郴桂二州礦厰事宜湖南廵撫楊錫紱奏稱湖南省開採礦厰奏銷案内所有礦夫採獲銅砂以及黒白鉛砂於未煎鍊之前先抽砂税煎鍊之後乃税銅鉛是砂税一項非止黑鉛一砂銅砂白鉛砂俱應納税惟黑鉛礦内銀鉛並産康熙雍正年間銀氣旺盛是以從前京商開挖時報抽銀税後經封閉迨至乾隆七年原任廵撫許容奏請復開以黑鉛砂内出銀無幾不過滳汁成珠止堪賞給爐户請將銀税改為砂税現今銀氣復旺自應隨時更正以復銀税之名然不另立科條誠恐砂税銀税無由區别嗣後除銅砂白鉛砂及無銀氣之黑鉛砂所抽税銀仍名砂税照舊辦理外其有銀之黑砂定為銀税另立一條照例抽收列入奏銷冊内以備稽考又查郴桂二厰礦夫採獲銅鉛礦砂與商人煎煉每年砂税共銀七八千兩商人厰卡各處丁役辛工飯食等項嵗需三四千兩以砂税之半取給已屬充裕請自乾隆十六年起抽收砂税每十分内先歸官税五分餘五分為商人厰卡公費既於商本無虧又於課務有益從之又加增湖南收買鉛觔價值户部議各省分出産黑鉛除貴州之外惟湖南最稱旺盛是以京局嵗需鉛七十萬餘觔前於黔省黑鉛短少不能辦解案内臣部酌議題交湖南接辦每百觔照依康熙雍正年間定價以二兩八錢三釐報銷節據湖南廵撫奏稱工本不敷部議黑鉛闗係京局鼓鑄必上不虧帑下不病商方可經久黔省工本省而脚價多湖南路近於黔以節省之脚費抵不敷之工本辦理自覺從容應請嗣後湖南辦運除課鉛儘數凑解無庸給價外其收買商鉛運京比照從前貴州辦運之數每百觔定給脚價銀四兩六錢按年解運照數支給從之十七年派専員董理郴桂二州礦厰事宜加增收買餘銅價值湖南廵撫范時綬奏言楚省開採礦厰税課攸闗立法稽查理宜嚴密湖南郴桂二厰據前撫楊錫紱於題請開採事宜案内請於各處設卡廵防令該二州為監督衡永郴桂道為總理經臣部覆准在案兹復據稱該二州駐劄州城離厰窵逺不能親赴督查轉委親友家人料理舞弊營私勢所不免請遴委専員彈壓凡一切領價報銷及抽收税課辦解銅鉛俱歸經手一年期滿新舊更替造冊題銷並令該二州互相查察及州同州判隨從協辦仍責成該道總理是責任各有攸歸防範更為嚴密應如所奏辦理至郴桂二厰所出銅觔原議每煉銅百觔除抽課二十觔外餘銅八十觔給價九兩六錢收買據該省廵撫以定價不敷商本採辦維艱請照前撫楊錫紱所奏每餘銅八十觔給價銀十一兩二錢八分收買部議以湖南産銅之區祗宜量為加增請照粤西定例每出銅百觔除抽課二十觔外餘銅八十觔給價銀十兩四錢則採辦自必從容不致有虧商本應令該撫自題准之日為始照數支給報銷從之二十三年准湖南郴桂二州厰税俱歸官辦湖南廵撫富勒渾奏言湖南省郴桂二州銅鉛礦厰從前開採伊始一切估色設卡等事官役俱未諳悉是以必須商辦邇年以來官役已經熟練而税課銅鉛較之從前有增無減是商人力所難辦之事歸之厰員承辦實力稽查既有成效於厰務自有禆益應如所奏從之二十六年准甘省暫開騷狐泉磺礦大學士公傅恒等議覆陜甘總督楊應琚奏請採硫磺以資儲用查磺觔為營伍所必需遇有缺乏例得給批赴産磺地方購買備用若以本地開採之磺供支各營操防之用較之購自逺處實多節省兹訪得騷狐泉磺礦自封閉後礦砂旺盛請照前例責成蘭州府招商開採自屬籌備營伍之要應如所請辦理至稱口外不産硫磺處所應需火藥現經行文咨調一節查現今回部庫車等處俱有磺礦從前用兵時曾經採取配用充裕即伊犂及烏嚕木齊一𢃄當日凖噶爾亦用鎗炮又從何處購辦可見口外原自不乏磺觔應請交與各該處辦事大臣留心體訪向來産磺處所一體查明採購或附近地方産有磺觔亦可採取配藥運徃並可省内地辦運之煩更為便益其現議騷狐泉開採事宜應請交與該督委員妥辦毋令滋事從之二十九年准四川屏山縣開採鐵礦四川總督阿爾泰奏屏山縣之李村石堰鳳村及利店茨黎榮丁等處産鐵每礦砂十觔可煎得生鐵三觔每嵗計得生鐵三萬八千八百八十觔請照例開採十分抽二變價撥充兵餉户部議如所請從之又准雲南通海縣開採黑鉛厰雲南廵撫劉藻奏通海縣逢里山厰産黑鉛試採有效請照例每百觔抽正課十觔變價充餉餘課十觔以五觔充公五觔為官役亷食所餘之鉛給價收買户部議如所請從之又准雲南彌勒州開採白鉛厰雲南廵撫劉藻奏彌勒州野猪畊厰産白鉛試採有效請照例每百觔抽正課十觔餘課十觔所餘之鉛給價收買撥運廣西局鼓鑄於錢法實有禆益户部議如所請從之三十年准四川江油縣開採鐵礦四川總督阿爾㤗奏江油縣木通溪和合硐等處産鐵每礦砂一十五觔可煎得生鐵四觔八兩每嵗計得生鐵二萬九千一百六十觔請照例開採十分抽二變價撥充兵餉户部議如所請從之又停止陜西華隂縣開採黒鉛華隂縣之華陽川地方産黑鉛自乾隆十三年題准開採每年得鉛五六萬觔至十萬觔不等自二十三年以後得鉛日以減少至二十八年分僅得四百觔陜西撫臣奏請停止户部議如所請從之三十一年准四川宜賓縣開採鐵礦四川總督阿爾泰奏宜賓縣濫壩等處産鐵每礦砂十觔煎得生鐵三觔整每嵗計得生鐵九千七百二十觔照例十分抽二變價按年徴收撥充兵餉户部議如所請從之又准貴州清平縣開採鉛礦貴州廵撫方世儁奏清平縣之永興塞産黑鉛礦砂試採有效請准其開採照例抽課每年可收課鉛一萬二三千觔除支給各標營操演鉛觔外尚有餘剰存貯撥用户部議如所請從之又准廣西融縣開採白鉛礦廣西廵撫宋邦綏奏融縣四頂山産白鉛礦砂因無煤炭不能煎煉成鉛而羅城縣冷峝山跴有煤路可以運徃就煤煎煉試採已有成效請准其開採煎煉照例每煉鉛百觔抽正課二十觔撒散三觔造冊報部稽核户部議如所請從之又酌定滇省開採礦厰事宜詳見錢幣考三十七年諭滇省各銅厰前因馬騾短少柴米價昻每銅百觔准暫加價銀六錢俟軍務竣後停止嗣後展限一二年今念該省頻嵗曾獲有秋而米糧柴炭等價值仍未即能平減著再加恩展限二年俾各資本寛餘踴躍開採庶於銅務有禆而厰民亦得以資充裕該撫仍留心體察俟厰地物價一平即行奏明停止皇朝文獻通考卷三十
