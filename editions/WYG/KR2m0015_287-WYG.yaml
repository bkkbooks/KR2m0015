body:
  text: 輿地考二十廣西省臣等謹按馬考以全州入古荆州域餘並列為南越葢以五嶺為荆揚之南限其萌渚越城二嶺與廣西接壤故廣西自全州灌陽縣及興安縣以南實在古荆州之外自秦遣史禄鑿靈渠導湘灕二水始開其地逮秦併天下畧取陸梁地為桂林象郡史記索隱謂嶺南之人多處山陸其性強梁故曰陸梁則其地之荒僻而難治可知已兩漢而降郡縣日増編户設官等於内地顧自通都大邑之外谿峒深阻若猺若獞若獠若仡若狑人􅬍人狪人山子之屬性習獷悍馴服為難唐始置土州縣官其酋長使世領之薄其徵入寛其文網然猶依嶮負固叛服靡常自宋訖明若儂氏之亂大蕂峽田州之役蔓延數世久而後定葢勤師征者屢矣終未能使之服教畏神傾心効順也自登我朝版籍以來風俗移易民物諴和凡深林宻箐重岡複嶺之區向之慿阻而梗聲教者今且熙熙皥皥共樂太平蠻烟瘴雨並洗濯於光天化日之下葢聖朝徳化之漸摩其入人也深矣廣西明廣西等處承宣布政使司治桂林府領桂林平樂梧州潯州栁州慶逺思恩南寧太平鎮安思明十一府歸順田州泗城思陵向武都康龍州等七州又置廣西都指揮使司領桂林等九衛全州等十守禦千户所本朝初因之設巡撫及布政使司按察使司皆駐桂林府與廣東共一總督降歸順田州思陵向武都康龍州為屬州順治十五年升泗城州為府雍正三年升鬱林州賓州為直𨽻州五年升西隆為直𨽻州八年仍降為屬州九年降思明府為州十二年降賓州為屬州凡領府十一直𨽻州一各衛所俱以次裁併入州縣東西距二千八百十里南北距二千九百六十五里東至廣東肇慶府廣寧縣界一千二百六十里西至雲南廣南府土富州界一千五百五十里南至廣東亷州府靈山縣界二千四十五里北至貴州黎平府永從縣界九百二十里東南至廣東髙州府石城縣界一千一百八十里西南至安南國界二千三百十里東北至湖南永州府東安縣界三百四十五里西北至貴州南籠府永豐州界一千三十六里在京師西南七千四百六十里桂林府為省治東西距五百五十五里南北距五百里東至湖南永州府零陵縣界三百四十五里西至栁州府融縣界二百十里南至平樂府荔浦縣界一百八十里北至湖南寶慶府城步縣界三百二十里東南至永州府永明縣界三百七十里西南至栁州府雒容縣界二百五十五里東北至寶慶府新寧縣界三百六十里西北至栁州府懐逺縣界二百十里自府治至京師七千四百六十里明為桂林府本朝因之領州二縣七臨桂縣附郭興安縣在府東北一百三十里靈川縣在府東北五十里陽朔縣在府南少東一百五十里永寧州在府西一百四十里永福縣在府西南一百里義寧縣在府西北八十里全州在府東北二百五十里灌陽縣在府東三百二十里臣等謹按桂林八樹在賁隅東桂水出焉始見於山海經厥後秦置桂林郡唐書謂江源多桂不生雜木故立為郡其治在今鬱林州境是時統地甚廣故今桂林府境亦在所屬逮三國吳復置桂林郡治武安為今栁州府象州境晉徙治潭中為今栁州府境宋徙治中溜為今潯州府境齊徙治武熙亦為今象州境梁復徙治潭中至隋而廢皆無與於今之府境也梁天監六年置桂州元和志謂在蒼梧鬱林之境因桂江以為名大同六年始移於今治後遂因之舊唐書地理志以臨桂當秦之桂林郡葢未之深考云平樂府在省治南少東一百八十里東西距九百四十里南北距二百七十里東至廣東連州連山縣界五百六十里西至潯州府平南縣界三百八十里南至梧州府蒼梧縣界二百六十里北至桂林府陽朔縣界十里東南至梧州府懐集縣界二百里西南至梧州府藤縣界四百七十里東北至湖南永州府永明縣界一百里西北至陽朔縣界六十里自府治至京師七千六百三十里明為平樂府本朝因之領州一縣七平樂縣附郭恭城縣在府東北六十里富川縣在府東少北二百六十里賀縣在府東南三百七十里荔浦縣在府西少南七十五里修仁縣在府西少南一百二十里昭平縣在府南一百二十里永安州在府西南一百八十里梧州府在省治東南八百里東西距二百三十里南北距六百三十五里東至廣東肇慶府封川縣界四十里西至潯州府平南縣界一百九十里南至廣東髙州府信宜縣界四百二十里北至平樂府賀縣界二百十五里東南至廣東羅定州西寧縣界二百六十里西南至鬱林州北流縣界三百九十八里東北至廣東連州陽山縣界四百八十里西北至平樂府昭平縣界一百五十里自府治至京師八千五百三十二里明為梧州府降藤容二州為縣共領州一縣九本朝初因之雍正三年改鬱林為直𨽻州以博白北流陸川興業四縣徃屬凡領縣五蒼梧縣附郭藤縣在府西六十里容縣在府西南三百二十里岑溪縣在府西南一百八十里懐集縣在府東三百六十里潯州府在省治西南九百五十里東西距四百十里南北距五百二十里東至梧州府藤縣界一百九十里西至南寧府横州界二百二十里南至鬱林州界一百九十里北至栁州府象州界三百三十里東南至鬱林州北流縣界二百八十里西南至鬱林州興業縣界二百二十里東北至平樂府永安州界二百六十里西北至栁州府來賓縣界二百八十里自府治至京師八千四百十里明為潯州府降貴州為縣共領縣三本朝初因之雍正八年以武宣縣來屬凡領縣四桂平縣附郭平南縣在府東一百里貴縣在府西南一百四十里武宣縣在府西北二百里初屬栁州府雍正三年分屬賓州八年改屬潯州府栁州府在省治西南三百七十里東西距四百二十五里南北距八百三十里東至平樂府修仁縣界二百六十五里西至慶逺府宜山縣界一百六十里南至潯州府貴