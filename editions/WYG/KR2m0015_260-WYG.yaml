body:
  text: 象緯考五日月行道臣等謹按馬端臨考日月行道載漢書天文志日有中道月有九行之說似古今無異矣然並載宋中興天文志謂日行黄道每嵗有差古今不同又謂九道因日月之行名之以别算位非實有九道則考今之日月行道詎可泥於前志歟兹以御製厯象考成後編欽定協紀辨方書所列數度為準而備詳推步之法焉太陽每日平行三千五百四十八秒小餘三二九八九七周天三百六十度入算化作一百二十九萬六千秒七政諸行自度以下皆以六十遞析將度分化為秒數入算微纎忽芒則以六十與一百為比例收為秒之小餘黄赤大距二十三度二十九分二至太陽距赤道最逺之度以測夏至午正太陽高度得之日躔星紀宫初度冬至日出辰初一刻十分日入申正二刻五分晝三十六刻十分夜五十九刻五分日躔星紀宫十五度小寒日出辰初一刻七分日入申正二刻八分晝三十七刻一分夜五十八刻十四分日躔元枵宫初度大寒日出辰初初刻十二分日入申正三刻三分晝三十八刻六分夜五十七刻九分日躔元枵宫十五度立春日出卯正三刻十二分日入酉初初刻三分晝四十刻六分夜五十五刻九分日躔娵訾宫初度雨水日出卯正二刻九分日入酉初一刻六分晝四十二刻十二分夜五十三刻三分日躔娵訾宫十五度驚蟄日出卯正一刻五分日入酉初二刻十分晝四十五刻五分夜五十刻十分日躔降婁宫初度春分日出卯正初刻日入酉正初刻晝四十八刻夜四十八刻日躔降婁宫十五度清明日出卯初二刻十分日入酉正一刻五分晝五十刻十分夜四十五刻五分日躔大梁宫初度穀雨日出卯初一刻六分日入酉正二刻九分晝五十三刻三分夜四十二刻十二分日躔大梁宫十五度立夏日出卯初初刻三分日入酉正三刻十二分晝五十五刻九分夜四十刻六分日躔實沈宫初度小滿日出寅正三刻三分日入戌初初刻十二分晝五十七刻九分夜三十八刻六分日躔實沈宫十五度芒種日出寅正二刻八分日入戌初一刻七分晝五十八刻十四分夜三十七刻一分日躔鶉首宫初度夏至日出寅正二刻五分日入戌初一刻十分晝五十九刻五分夜三十六刻十分日躔鶉首宫十五度小暑日出寅正二刻八分日入戌初一刻七分晝五十八刻十四分夜三十七刻一分日躔鶉火宫初度大暑日出寅正三刻三分日入戌初初刻十二分晝五十七刻九分夜三十八刻六分日躔鶉火宫十五度立秋日出卯初初刻三分日入酉正三刻十二分晝五十五刻九分夜四十刻六分日躔鶉尾宫初度處暑日出卯初一刻六分日入酉正二刻九分晝五十三刻三分夜四十二刻十二分日躔鶉尾宫十五度白露日出卯初二刻十分日入酉正一刻五分晝五十刻十分夜四十五刻五分日躔壽星宫初度秋分日出卯正初刻日入酉正初刻晝四十八刻夜四十八刻日躔夀星宫十五度寒露日出卯正一刻五分日入酉初二刻十分晝四十五刻五分夜五十刻十分日躔大火宫初度霜降日出卯正二刻九分日入酉初一刻六分晝四十二刻十二分夜五十三刻三分日躔大火宫十五度立冬日出卯正三刻十二分日入酉初初刻三分晝四十刻六分夜五十五刻九分日躔析木宫初度小雪日出辰初初刻十二分日入申正三刻三分晝三十八刻六分夜五十七刻九分日躔析木宫十五度大雪日出辰初一刻七分日入申正二刻八分晝三十七刻一分夜五十八刻十四分臣等謹按古法以周天為三百六十五度四分度之一太陽每日行一度故十五日有奇行十五度有奇為節為氣今法以周天為三百六十度十二分之為十二宫各三十度二十四分之日行十五度為節為氣冬至至小寒止十四日有餘夏至至小暑則十六日不足此節氣與日躔宫度相應者也其交節氣時刻每年加減不同京師與各省亦不同兹以京師日出入晝夜時刻載列而凡各省及䝉古回部之不同者詳後極度偏度太隂每日平行四萬七千四百三十五秒小餘二三四八六同太陽平行入算法最大黄白大距五度十七分二十秒最小黄白大距四度五十九分三十五秒黄白大距中數五度八分二十七秒三十微黄白大距半較八分五十二秒三十微實行與太陽同宫同度為合朔限實行距太陽三宫為上弦限實行距太陽六宫為望限實行距太陽九宫為下弦限月離元枵宫十五度至大梁宫十五度為正升月離大梁宫十五度至鶉首宫初度為斜升月離鶉首宫初度至析木宫初度為横升月離析木宫十五度至星紀宫初度為斜升月離星紀宫初度至元枵宫十五度亦為斜升臣等謹按古法定太隂每日行十三度十九分度之七出入日道不逾六度東漢賈逵始言月行有遲速至劉洪列為差率元郭守敬乃定為轉分進退時各不同而出入日道之大距則仍恒為六度西法以朔望之行有遲疾兩弦不同於朔望兩弦前後又不同於兩弦為經度之差朔望交行遲而大距近兩弦交行遲而大距逺為緯度之差考成上編仍其說後刻白爾奈端噶西尼又以實測獲創解詳前總論篇兹僅列其大略焉推日躔法求積年本年天正冬至距法元天正冬至之年數自法元某年距所求之年共若干年減一年得積年因本年初交天正冬至尚在嵗前故減一年如甲子至癸亥計六十年而癸亥初交天正冬至止五十九年也下推將來則順推上考往古則逆溯其法皆同求中積分本年天正冬至距法元天正冬至之日分以積年與周嵗日分相乗得中積分求通積分本年天正冬至距法元天正冬至前甲子日子正初刻之日分置中積分加氣應日分得通積分上考往古則置中積分減氣應得通積分求天正冬至本年天正冬至距冬至前甲子日子正初刻之日分置通積分其日滿紀法六十去之餘為天正冬至日分上考往古則以所餘距冬至後甲子日子正初刻之日分轉與紀法六十相減餘為天正冬至日分自初日甲子起算得天正冬至干支以一千四百四十分通其小餘得天正冬至時分秒求年根本年天正冬至次日子正初刻太陽距冬至之平行經度以周日一萬分為一率太陽每日平行三千五百四十八秒三二九八九七為二率以天正冬至分不用日與周日一萬分相減餘為三率求得四率為秒以分收之得年根天正冬至分乃冬至距本日子正初刻後之分數與周日一萬分相減餘為冬至距次日子正初刻前之分數故與每日之平行為比例得次日子正初刻太陽距冬至之平行經度求紀日本年天正冬至次日之干支以天正冬至干支加一日得紀日求值宿本年天正冬至次日之宿置中積分加宿應日分為通積宿其日滿宿法二十八去之外加一日為值宿日分上考往古則置中積分減宿應為通積宿其日滿宿法二十八去之餘數轉與宿法二十八相減外加一日為值宿日分自初日角宿起算得值宿求日數本日子正初刻距天正冬至次日子正初刻之平行經度自天正冬至次日距所求本日共若干日與太陽每日平行三千五百四十八秒三二九八九七相乗得數為秒以宫度分收之得日數求平行本日子正初刻太陽距冬至之平行經度以年根與日數相加得平行求最卑平行本日子正初刻最卑距冬至之行度以積年與最卑每嵗平行六十二秒九九七五相乗得積年之行又以日數與最卑每日平行十分秒之一又七二四八相乗得日數之行兩數相併與最卑應度分秒微相加得最卑平行上考往古則置最卑應減積年之行加日數之行得最卑平行求引數本日子正初刻均輪心過本輪最卑之行度置平行減最卑平行得引數平行乃本輪心之行度自冬至起初宫引數乃均輪心之行度自最卑起初宫故置本日平行減本日最卑平行得引數求均數平行與實行之盈蹜差以二千萬為一邊倍兩心差三三八為一邊引數為所夾之角六宫内引數即為所夾之角六宫外引數與全周相減餘為所夾之角用切線分外角法求得對倍兩心差之角倍之為撱圓界角又以撱圓小半徑九九九八五七一小餘八五為一率大半徑一千萬為二率引數即前所夾之角之正切為三率求得四率為撱圓之正切得度分秒與引數相減餘為撱圓差角最卑前後各三宫與撱圓界角相加最高前後各三宫與撱圓界角相減一二宫為最卑後九十十一宫為最卑前三四五宫為最髙前六七八宫為最髙後得均數引數初宫至五宫為加六宫至十一宫為減求實行本日子正初刻太陽實在之行度置平行加減均數得實行平行乃本輪心之行度而太陽實在均輪之周其加減差即均數故以均數加減平行得實行求宿度本日子正初刻太陽所躔之黄道宿度以積年與嵗差五十一秒相乗得數與法元某年黄道宿鈐相加得本年宿鈐察實行足減某宿度分則減之餘為某宿度分實行自冬至起算宿度自各宿初度起算故於實行内減本年黄道宿鈐某宿度餘為太陽躔某宿之度推月離法求積年同推日躔法求中積分同推日躔法求通積分同推日躔法求天正冬至同推日躔法求積日法元天正冬至距所求本年天正冬至之日數置中積分加氣應分不用日減本年天正冬至分亦不用日得積日上考往古則置中積分減氣應分加本年天正冬至分得積日日躔自天正冬至起算故止用天正冬至不用積日月離自天正冬至次日子正初刻起算故必兼用積日求太隂年根本年天正冬至次日子正初刻太隂距冬至之平行經度以積日與太隂每日平行四萬七千四百三十五秒二三四八六相乗得數滿周天一百二十九萬六千秒去之餘以宫度分收之為積日太隂平行加太隂平行應宫度分秒微得太隂年根上考往古則置太隂平行應減積日太隂平行得太隂年根求最高年根以積日與最高每日平行四百零一秒七二二六相乗得數滿周天一百二十九萬六千秒去之餘以宫度分收之為積日最高平行加最高應宫度分秒微得最高年根上考往古則置最高應減最高積日平行得最高年根求正交年根以積日與正交每日平行一百九十秒六三八六三相乘得數滿周天一百二十九萬六千秒去之餘以宫度分收之為積日正交平行於正交應宫度分秒微内減之正交應不足減者加十二宫減之得正交年根上考往古則置正交應加積日正交平行得正交年根加滿十二宫去之求太隂日數以所設日數與太隂每日平行四萬七千四百三十五秒二三四八六相乗得數為秒以宫度分收之得太隂日數求最高日數以所設日數與最高每日平行四百零一秒七二二六相乗得數為秒以宫度分收之得最高日數求正交日數以所設日數與正交每日平行一百九十秒六三八六三相乗得數為秒以度分收之得正交日數求太隂平行以太隂年根與太隂日數相加滿十二宫去之得太隂平行求最高平行以最高年根與最高日數相加滿十二宫去之得最高平行求正交平行置正交年根減正交日數不足減者加十二宫減之得正交平行求一平均以太陽最大均數一度五十六分一十三秒化作六千九百七十三秒為一率太隂最大一平均一十一分五十秒化作七百一十秒為二率本日太陽均數化秒為三率求得四率為秒以分收之為太隂一平均太陽均數加者為減減者為加又以太陽最大均數六千九百一十三秒為一率最高最大平均一十九分五十六秒化作一千一百九十六秒為二率本日太陽均數化秒為三率求得四率為秒以分收之為最高平均太陽均數加者亦為加減者亦為減又以太陽最大均數六千九百一十三秒為一率正交最大平均九分三十秒化作五百七十秒為二率本日太陽均數化秒為三率求得四率為秒以