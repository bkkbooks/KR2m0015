body:
  text: 經籍考十六子儒家法家紫陽大指八卷秦雲爽撰雲爽字開地號定叟錢塘人臣等謹按是編專為王守仁朱子晩年定論而作分八門一曰朱子初學二曰論已發未發三曰論㴠養本原四曰論居敬窮理五曰論致知格物六曰論性七曰論心八曰論太極㑹語支言四卷陸鳴鼇撰鳴鼇字石菴仁和人官河陽縣知縣太極圖説註解無卷數陳兆成撰兆成字慎亭常熟人兆成子魯附記曰是書與所注叅同契互有異同是刻可分為二可合為一小學句讀記六卷王建常撰建常見經類雙橋隨筆十二卷周召撰召字公右號拙菴衢州人官陜西鳯翔縣知縣召自序曰老生常談誠不足採而藥石之言原以鍼砭兒軰與世無關所自矜者集中大意在於信道而不信邪事人而不事鬼言理而不言數崇實而不崇虚竊以為獨立之見若中流一砥也讀朱隨筆四卷三魚堂賸言十二卷松陽鈔存二卷問學録四卷學術辨一卷陸隴其撰隴其見經類楊開基序松陽鈔存曰問學録為中年之書此本為晩年手定之書隴其孫申憲識曰儀封張孝先刻大父書四種惟讀禮識疑讀朱隨筆為定本松陽鈔存及問學録均刪節失真云臣等謹按隴其之學一以朱子為宗為國朝第一醇儒於朱子之書誠能潛心體察洞悉精㣲非徒以耳食為事者讀朱隨筆一編正其生平得力所在賸言乃其緒餘而於名物訓詁典章度數無不考求原委辨别精深凡漢注唐疏在講學家久視為陳言亦皆潛心研索恭考是非其論朱陸異同平心辨析未嘗依違於疑似之間所謂中有所得之言也松陽鈔存乃其宰靈夀時所輯以靈夀為古松陽地故名至問學録一編大㫖亦力闢良知之説也注解正䝉二卷榕村語録三十卷李光地撰光地見經類臣等謹按李光地學宗朱子而能心知其意得所變通其詁經講學博引漢唐之書亦不廢陸王之説至於疑似之介則必為剖析詳明嘗因張子正蒙有未發之意及諸儒論説之異同撰為注解至語録為其門人徐用錫及其孫清植所輯冠以經書總論與論四書者為八卷論易書詩三禮春秋孝經者為九卷論六子諸儒諸子道統者為三卷論史者為一卷論厯代者為一卷論學者為二卷論性命理氣者為二卷論治道者為二卷論詩文者為二卷而以韻學附於後又光地博渉羣書精於律吕算術而是編不載豈以非儒者之所急歟或清植等不及聞也信陽子卓録八卷張鵬翮撰鵬翮見史類教習堂條約一卷徐乾學撰乾學見經類萬世玉衡録四卷蔣伊撰伊字謂公常熟人康熈癸丑進士官至河南提學副使臣等謹按是編所採自唐虞以迄有明分門編次為類六十有四取天官書玉衡為北斗杓之義名之曰萬世玉衡伊嘗恭録是書進呈御覽故以進書奏疏冠於卷首焉儒門法語無卷數彭定求撰定求見史類臣等謹按定求好明人髙攀龍之學意在調劑諸説不為矯激之言正學隅見述一卷王宏撰撰宏撰見經類宏撰自述曰予素信朱子惟於無極太極之説小異誠不敢以心之所不安者徒剿襲雷同以蹈於自欺欺人之為臣等謹按周子無極之㫖朱子格物之説陸九淵王守仁先後攻擊遂令數百年來大開聚訟之門詬爭不已此書於格物之説則遵朱子無極之説則主九淵持論確有所見固不僅為調停之論已也太極圖説論十四卷王嗣槐撰嗣槐字仲昭錢塘人康熈己未薦舉博學鴻詞不及與試授内閣中書舍人以歸太極圖集注一卷孫子昶撰子昶號主一聞喜人康熈己未進士官垣曲縣知縣性理大中二十八卷應撝謙撰撝謙見經類臣等謹按吕祖謙題近思録懼學者騖於髙逺以隂陽性命之説録於首卷而致知力行之方反録於後撝謙祖其意故増損大全以成此本亦以太極圖説退於末卷憤助編二卷蔡方炳撰方炳見史類體獨私鈔四卷王劉異同五卷黄百家撰百家字主一餘姚人王學質疑一卷附録一卷張烈撰烈見經類太極圖説遺議一卷毛竒齡撰竒齡見經類洪範皇極補六卷劉世衢撰世衢字何甫永新人二程語録十八卷小學集解六卷續近思録十四卷濓洛闗閩書十九卷學規類編二十七卷性理正宗四十卷廣近思録十四卷困學録集粹八卷張伯行撰伯行見史類伯行自序性理正宗曰性理大全一書雜採天文地志律厯兵機䜟緯術數之學及釋家恭同契縱横家言概有取焉未免失之駁而不純因刪其繁蕪補其闕畧遵道統以清其源述師傳以别其𣲖爰取周程張朱五子以下及元明諸儒之言分類次之程書五十一卷程湛編湛爵里未詳臣等謹按是編録程氏遺書外書及明道文一卷其序次與朱子不同小學集解六卷黄澄撰澄字庭聞莆田人康熈中諸生理學正宗十五卷竇克勤撰克勤字敏修號敬菴柘城人康熈戊辰進士官翰林院檢討家語正義十卷孔叢子正義五卷姜兆錫撰兆錫見經類臣等謹按毛晉汲古閣家語刋本篇目次第悉仍王肅之舊兆錫好為變古編次悉從葛鼐之本至孔叢子正義雖偶有考訂亦未免拘墟之見大學辨業四卷聖經學規纂二卷論學二卷小學稽業五卷李塨撰塨見經類塨自述例畧曰辨業意有不盡者入之學規學規意有不盡者入之論學又自序小學稽業曰朱子小學所載天道性命上達也親迎朝覲年及壯强者也以及居相告老諸條皆非幼童事且無分於大學乃别輯此編性理纂要八卷天理主敬圖一卷冉覲祖撰覲祖見經類覲祖自序性理纂要曰前四卷為附訓者周子太極圖通書張子西銘東銘程子定性書五者之訓詁太極圖通書西銘本朱子之注諸儒之説東銘定性書則襍考朱子及諸儒之説而恭以己意後四卷為附評者以程子之言為經朱子之言為傳諸儒為之羽翼而以己意為之評程功録五卷楊名時撰名時見經類嵩陽學凡六卷景日昣撰日昣見史類續小學六卷葉鉁編鉁號潛夫嘉善人心印正説三十四卷吳台碩撰台碩字位三嘉定人陸隴其之門人臣等謹按是書以學術治功之要分立篇目凡三十四類心印二字固非儒語説序二篇亦渉擬經顧隴其作序時未之糾正則不可解耳餘山遺書十卷勞史撰史字麟書號餘山餘姚人臣等謹按是書曰格致録曰學庸廣義曰邇言及襍文史多本易理以推人物之性史以實踐為務此其緒餘也虚谷遺書三卷何國材撰國材字維楚江西新城人筆記二卷程大純撰大純字漢舒孝感人康熈中由貢生官黄岡縣教諭大純自序畧曰陸王之學雖矯枉過正然用以教口耳之學不為無功周子疏解四卷王明弼撰明弼見經類日省編一卷馮昌臨撰昌臨見經類尊道集四卷朱搴撰搴字良一黄陂人近思續録四卷冷語三卷讀書日記六卷劉源渌撰源渌字崑石自號直齋安邱人馬恒謙序近思續録曰先生於朱子文集或問語類三書沈潛反覆撮輯纂叙席不暇煖手不停筆二十餘年凡三創草三脱稿乃成是書性理辨義二十卷王建衡撰建衡見史類臣等謹按是書分十有五目曰原理原氣原天原生物原性原命原道原德原倫原學原鬼神原人鬼原祭原妖厲襍論大㫖皆複衍宋儒之説其原天三篇則以歐羅巴語為藍本也靜用堂偶編十卷涂天相撰天相字爕菴號存齋一號迂叟孝感人康熈癸未進士官至工部尚書三子定論五卷王復禮撰復禮見經類正修録三卷齊治録三卷于準撰準字萊公永寧人江南總督成龍子官至江蘇廵撫臣等謹按是編因其父成龍襍鈔之稿與蔡方炳編次増益之凡例稱成龍不從理學中立名絶無胸中彼此異同之見又稱成龍不佞佛亦不闢佛其言尤明白正大成龍一生之學力具見矣廣字義三卷黄叔璥撰叔璥見史類臣等謹按孫承澤嘗増訂宋陳普所作字義叔璥復取陳淳北溪字義及程若庸字訓合承澤所訂彚為是編凡普之舊題標以原字其續増者則標廣義以别之因祗取性理諸字推演其義故列於此朱子晩年全論八卷陸子學譜二十卷李紱撰紱見史類學舫無卷數吳雲撰雲見史類白鹿洞規條目二十卷集程朱格物法一卷集朱子讀書法一卷王澍撰澍見經類太極解拾遺一卷通書解拾遺一卷後録一卷西銘解拾遺一卷後録一卷正䝉集解九卷近思録集解十四卷李文炤撰文炤見經類經書性理類輯精要録六卷王士陵撰士陵見經類衍範二卷顧昌祚撰昌祚號忍園婁縣人康熈中由舉人官江夏縣知縣降補萊州府經厯謀道續録二卷譚旭撰旭字東白新建人康熈丁酉副榜貢生讀周子劄記無卷數崔紀撰紀見經類臣等謹按是書以中庸之㫖發明太極圖説通書之理葢本明薛瑄説而益推衍之正䝉初義十七卷濓闗三書無卷數皇極經世解八卷王植撰植見經類植皇極經世解識畧曰皇極者三皇之君極邵子大意在發明先天之易所謂先天之學也經世即元㑹運世也内篇十二首即觀天地次言觀聖人次言觀萬物以下遞及古今君臣名物對道而言無不可曰物也外篇言理言數處尤難領㑹因於卷七之首附以臆説一篇至元㑹運世三篇後即繼以聲音唱和邵子以為可盡萬物之類非字書韻書可比尤宜詳之近思録集注十四卷茅星來撰氏籍未詳星來自序曰自宋史分道學儒林為二而言程朱之學者但求之身心性命之間不復以通經學古為事葢嘗竊論之馬鄭賈孔之説經譬則百貨之所聚也程朱諸先生之説經譬則操權度以平百貨之輕重長短者也㣲權度則貨之輕重長短不見而非百貨所聚則雖有權度亦無所用之故欲求程朱之學者其必自馬鄭諸傳疏始愚於是編備著漢唐諸家之説以見程朱諸先生學之有本俾彼空疏寡學者無得以籍口焉知非録一卷鄧鍾岳撰鍾岳字東長號悔廬聊城人康熈辛丑進士第一官至禮部左侍郎大學衍義輯要六卷大學衍義補輯要十二卷吕子節録四卷補遺二卷陳宏謀撰宏謀字汝咨號榕門臨桂人雍正癸夘進士官至大學士諡文慤聖學輯要一卷潘繼善撰繼善見經類載道集六十卷許焞撰焞字純也海寧人雍正癸夘進士官翰林院編修皇極經世考三卷徐文靖撰文靖見經類臣等謹按是編首列二圖一曰數皆不離於五圖一曰皇極經世一元圖葢即邵子起算之術皆櫽括王湜節要為之末附三十六宫解而證以鄭康成乾鑿度注及黄帝素問太乙遊九宫之語因邵子之説而偶及之者也恥亭遺書十卷周宗濓撰宗濓字簡菴華亭人雍正癸夘㧞貢生官潛山縣教諭太元别訓五卷劉斯組撰斯組見經類棉陽學準五卷女學六卷藍鼎元撰鼎元見史類鼎元女學識畧曰自班氏女誡以外若劉向列女傳擇而不精鄭氏女孝經精而不詳至女訓女史閨範女範等書尤為鄙俚淺率因採掇經傳格言參摭史傳分為德言容功四篇章區類别間綴以論斷焉易範同宗録無卷數李灝撰灝字柱文卷首自署曰南豐又署曰嘉禾張子淵源録十卷張鏐撰鏐號紫峰樂陵人雍正壬子舉人讀書偶記三卷雷鋐撰鋐字貫一寧化人雍正癸丑進士官至副都御史臣等謹按是編大㫖惟以朱子為宗書中論易多本李光地論禮多本方苞葢其讀書時所劄記也女教經傳通纂二卷任啟運撰啟運見經類躬行實踐録十五卷桑調元撰調元見經類朱子為學考三卷理學疑問四卷童能靈撰能靈見經類能靈自序理學疑問曰専心於先儒聖賢之㫖閲十餘年日用體驗間有所見輒自劄記而成是編讀書小記三十卷范爾梅撰爾梅字梅臣號雪菴洪洞人雍正中貢生例畧曰是編記易尚書詩為完書春秋禮記周禮等皆有殘佚重複南阿集二卷康吕賜撰吕賜見經類近思録集註十四卷江永撰永見經類淑艾録十四卷下學編十四卷祝洤撰洤字人齊原名游龍海寧人逸語十卷曹庭棟撰庭棟見經類東莞學案無卷數吳鼎撰鼎見經類臣等謹按陳建有學蔀通辨一書鼎因其排斥陸王阿附宰執因條列其説謂之詰難葢門户之見深故報復之詞激也困勉齋私記四卷閻循觀撰循觀見經類思通集二卷隨意吟一卷秦望撰望字元宫無錫人濬元十六卷張必剛撰必剛見經類必剛自述曰易之卦爻彖象先事立文春秋之征伐㑹盟後事立文至於歲時節候終古共是事即共是文幽明俯仰逺取近徵參伍錯綜抉摘發揮於觀象玩詞觀變玩占之義可以竊附云爾叙天齋講義四卷竇文炳撰文炳字質民長安人明儒講學考一巻程嗣章撰嗣章字元樸號南耕上元人業儒臆説二卷陶圻撰圻字甸方秀水人砭身集六卷劉鳴珂撰鳴珂見經類愚齋反經録十六卷謝王寵撰王寵字愚齋陜西人講學二卷陳祖銘編其師李培講學語培號此菴嘉興人三立編十二卷王梓編梓字琴伯郃陽人官崇寧縣知縣洪範補註五卷潘士權撰士權見經類洪範圖説四卷舒俊鯤撰俊鯤字潛夫溆浦人俊鯤自序畧曰讀欽定易圖説得洪範九疇之數兼得八十一疇之全數於欽定書圖説得洪範九疇之名兼得八十一疇之本名從此衍之分元㑹運世四卷性理析疑十五卷蔡洛撰洛武平人演極圖説四卷秦錫淳撰錫淳字沐雲臨海人童子問一卷敬義録一卷黄文澍撰文澍見經類理解體要二卷黄為鶚撰為鶚宜黄人讀白鹿洞規大義五卷任德成撰德成字象元吳江人朱子書要無卷數不著編輯者姓氏右儒家廵城條約一卷風憲禁約一卷魏裔介撰裔介見經類臣等謹按廵城條約四十條乃裔介為左都御史時告誡五城者語多瑣屑無禆大體至風憲禁約一卷皆廵按外省規條裔介自通籍以後由京秩累遷至大學士未膺直指之任此編或其平日擬定之稿有待見諸施行者歟折獄巵言一卷陳士鑛撰士鑛見經類讀律佩觽八卷王明德撰明德字金樵髙郵人官至刑部陜西司郎中續刑法叙畧一卷譚瑄撰瑄字子羽嘉興人康熈乙酉舉人官至給事中疑獄箋四卷陳芳生撰芳生見史類芳生自序曰晉和魯公凝著疑獄集二卷其子宋太子中允㠓増之為四卷明廵按御史張景廣之為六卷兹復増汰之統為三卷而附和㠓及元杜震明李崧原序於卷後末又輯昔賢論説讞獄成法别為一卷統名疑獄箋右法家皇朝文獻通考卷二百二十六
