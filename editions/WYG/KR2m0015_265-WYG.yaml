body:
  text: 欽定四庫全書皇朝文獻通考卷二百六十五象緯考十月食下御製歴象考成上編論月食臣等謹按考成上編論月食甚詳且繪圖繫說茲弗克具載僅録其要焉定食限以距交度太陰半徑與地影半徑相切即入食之限故以兩半徑度相併之數當黃白兩道之距緯度而求其相當之經度得距交一十一度一十六分四十五秒為必食之限距交一十二度一十六分五十五秒為可食之限蓋必食者無不食可食者或食或不食也二者皆實朢之限若論平望其限尤寛得距交食一十四度五十四分即為有食之限矣定月食分秒以併徑求月食分數之淺深視黃白距緯之多少距緯愈少太陰心與地影心相去愈近則太陰入影愈深故用太陰半徑地影半徑相併而與距緯相較併徑大於距緯之較即為月食之分若併徑小於距緯則月不食若太陰恰當交㸃而無距緯則併徑全為食分為月食之最深也但太陰與地影之半徑分秒皆係弧度而論食分則以太陰全徑直線計之其法命太陰全徑為十分以太陰視徑分秒與併徑距緯之較之比無距緯者即以併徑為比同於太陰全徑與食分之比也定五限時刻以距緯半徑自行求月食五限一曰食甚乃月入影最深之限也一曰初虧月將入影兩周相切也一曰食旣月全入影其光盡掩也是二者在食甚前一曰生光月將出影其光初吐也一曰復圓月全出影兩周方離也是二者在食甚後月食十分以上者有五限十分以下者止三限無食旣與生光也其時刻之多寡則由於入影之淺深過影之遲速蓋距緯有寛狹寛則入影淺而時刻少狹則入影深而時刻多又月與影之半徑各有小大月大影小則過影速而時刻少月小影大則過影遲而時刻多抑且自行有遲疾遲則出影遲疾則出影速故雖距緯同半徑同而自行不同即時刻亦不同也其食甚前後各限相距之時刻恒等而食甚又非實望之時所差雖微而理則實異夫地影之心即太陽正對之㸃地影心距交之黃道經度與月心距交之白道經度等是為東西同經即為實望然月心與影心斜距猶逺惟從白極出弧線過影心至白道與白道成直角月心臨此直角之㸃乃為食甚蓋惟此時月心與影心相距甚近食分最深也定初虧復圓方位四象限以交角求舊定月食初虧復圓方位距緯在黃道北初虧東南復圓西南在黃道南初虧東北復圓西北食八分以上則初虧正東復圓正西此東西南北主黃道之經緯言非謂地平經度之東西南北也惟月實行之度在初宫六宫初度望時又為子正則黃道經緯之東西南北與地平經度合否則黃道升降有斜正而加時距午有逺近故兩經緯迥然各别而所推之東西南北必不與地平之方位相符不如實指其在月體之上下左右為衆目所共覩乃為親切也其法從天頂作高弧過月心至地平即分月體為左右兩半周又平分為上下兩象限即成左上左下右上右下四象限而黄道在地平上之半周亦平分為東西兩象限乃於初虧復圓二限各求其黃道交高弧之角若月當黃道無距緯而交角滿九十度則初虧正左復圓正右在黃道西象限而交角在四十五度以上初虧左稍偏上復圓右稍偏下交角在四十五度以下初虧上稍偏左復圓下稍偏右在黃道東象限者反是若月在交前後有距緯則又須求得緯差角與高弧交角相加減為定交角然後可定其上下左右也加減之法月距黃道北而在西象限初虧為加復圓為減在東象限初虧為減復圓為加月距黃道南者反是乃視定交角為相加者在九十度以内則虧復之上下左右如前論若過九十度為鈍角則易象限之上下又或定交角為相減者而交角内減去差角則虧復之上下左右如前論若差角内減去交角則易象限之左右也定見食先後以子午線月食深淺分數天下皆同而虧復各限時刻不同者非月入影有先後乃人居地面有東西也蓋日之所之為時隨人所居各以見日出入為東西日中為南為子午而平分時刻故其地同居一子午線者雖南北懸殊北極出地高下不同而時刻不異若東西易地雖北極同高而西方見食必先東方見食必後也凡東西差一度則時差四分今以京師為主視各省之子午線在京師東者以時差加在京師西者以時差減皆加減京師各限時刻為各省各限時刻也是故欲定各省之時刻必先定各省之子午線而欲定各省之子午線非分測各省之月食其道無由也御製歴象考成後編論月食臣等謹按考成後編論月食推步法與上下編有異並繪圖繫說茲亦録其要焉定初虧復圓時刻以斜距比例求月食求初虧復圓時刻舊以食甚實緯為一邊併徑為一邊以實緯交白道之角為直角用正弧三角形法求得初虧復圓距食甚之弧以一小時月距日實行比例得時分與食甚時刻相加減即得初虧復圓時刻今以弧線可作直線算故用勾弦求股之法即得距弧至以距弧變時則以一小時兩經斜距為比例蓋食甚兩心實相距既以斜距成直角則初虧復圓之併徑亦與斜距成勾股故仍以斜距比例時分也定初虧復圓方位以併徑黃道交角求舊定月食方位月當黃道無距緯即用黃道高弧交角為定交角若月在交前後有距緯則又求緯差角與黄道高弧交角相加減為定交角然求緯差角之法必先用初虧復圓交周各求距緯今初虧復圓距弧皆斜距之度須復以斜距與白道為比例方得交周頗為費算且前已有斜距黃道交角與九十度相加減即黃道交實緯角則求得併徑交實緯角與之相減餘併徑交黃道之角即緯差角甚為簡便故質名之曰併徑黃道交角推月食法臣等謹按考成下編後編所載推月食法各有不同下編以推首朔諸平行及入交為入算之首蓋因平望太陽太陰諸平行皆以首朔諸平行為根也後編用日躔月離求實望則太陽太陰諸平行不以首朔為根而以天正冬至為根故止求首朔之日時及入交之月數合之即得平望距冬之日時而不必求首朔諸平行也下編先推平望諸平行推日月相距推實引推實望推實交周推太陽實經然後推實望用時後編推首朔入交及實望實時即推實望用時蓋以日躔月離求得實望而實望實交周及太陽黃道經度已在本時日躔月離之中也茲準後編序列之求積年同推日躔法求中積分同推日躔法求通積分同推日躔法求天正冬至同推日食法求紀日同推日食法求積日同推日食法求通朔同推日食法求積朔及首朔同推日食法求首朔太陰交周同推日食法求逐月望太陰交周置本年首朔太陰交周加太陰交周望䇿宫度分秒微再以太陰交周朔䇿宫度分秒微遞加十三次得逐月望太陰交周求太陰入交月數逐月望太陰交周自初宫初度至初宫一十五度九分自五宫一十四度五十一分至六宫一十五度九分自十一宫一十四度五十一分至十一宫三十度皆為太陰入交第幾月入交即第幾月有食求平望以太陰入交月數與朔䇿二十九日五三五九五三相乘加望䇿一十四日七六五二九五二六五與首朔日分相加其所得日數即平望距冬至之日數再加紀日滿紀法六十去之自初日甲子起算得平望干支以周日一千四百四十分通其小餘得平望時分秒求實望泛時以平望距冬至之日數用推日躔月離法各求其子正黃道實行將太陽黃道實行加減六宫與太隂黃道實行相較如太隂實行未及太陽則平望日為實望本日平望次日為實望次日如太陰實行已過太陽則平望前一日為實望本日平望日為實望次日又用推日躔月離法各求其本日或次日子正黃道實行乃以本日次日兩太陽實行相減為一日之日實行本日次日兩太陰實行相減為一日之月實行一日之二實行相減為一日之月距日實行化秒為一率周日一千四百四十分為二率本日太陽實行加減六宫内減本日太陰實行餘化秒為三率求得四率為距本日子正後之分數以時收之得實望泛時求實望實時以實望泛時之時刻設前後兩時用推日躔月離法各求其黃道實行乃以前後兩時太陽實行相減為一小時之日實行以前後兩時太陰實行相減為一小時之月實行一小時兩實行相減為一小時月距日實行化秒為一率一小時化作三千六百秒為二率前時太陽實行加減六宫内減前時太陰實行餘化秒為三率求得四率為秒以分收之加於前時得實望實時再以實望實時用推日躔月離法各求其黃道實行則太陰太陽必對宫而同度乃視本時月距正交自初宫初度至初宫一十二度一十七分自五宫一十七度四十三分至六宫一十二度一十七分自十一宫一十七度四十三分至十一宫三十度皆入食限為有食不入此限者不食即不必算求均數時差以實望太陽均數變時得均數時差均數加者則為減均數減者則為加求升度時差以半徑一千萬為一率黃赤大距二十三度二十九分之餘弦為二率實望太陽距春秋分黃道經度之正切線為三率求得四率為距春秋分赤道經度之正切線得太陽距春秋分赤道經度與太陽距春秋分黃道經度相減餘為升度差變時得升度時差二分後為加二至後為減求時差總同推日食法求實望用時置實望實時加減時差總得實望用時距日出後日入前九刻以内者可以見食九刻以外者則全在晝即不必算求斜距交角差以一小時太陰白道實行化秒為一邊一小時太陽黃道實行化秒為一邊實望黃白大距為所夾之角用切線分外角法求得對小邊之角為斜距交角差求斜距黃道交角置實望黃白大距加斜距交角差得斜距黃道交角求兩經斜距以斜距交角差之正弦為一率一小時太陽實行化秒為二率實望黃白大距之正弦為三率求得四率為秒以分收之得兩經斜距求食甚實緯以半徑一千萬為一率斜距黃道交角之餘弦為二率實望月離黃道實緯化秒為三率求得四率為秒以分收之得食甚實緯南北與實望黃道實緯同求食甚距弧以半徑一千萬為一率斜距黃道交角之正弦為二率實望月離黃道實緯化為三率求得四率為秒以分收之得食甚距弧求食甚距時同推日食法求食甚時刻置實望用時加減食甚距時得食甚時刻自初時起子正一時為丑初以次順數至二十三時為夜子初毎十五分為一刻不足一刻者為零分求太陽實引置實望太陽引數加減本時太陽均數得太陽實引求太陰實引置實望太陰引數加減本時太陰初均數得太陰實引求太陽距地同推日食法求太陰距地以實望太陰本天心距地數倍之為一邊以二千萬為兩邊和以太陰實行為一角用三角作埀線成兩勾股法算之求得地心至撱圓界之一邊即太陰距地求太陰地半徑差以太陰距地為一率中距太陰距地一千萬為二率太陰中距最大地半徑差五十七分三十秒化作三千四百五十秒為三率求得四率為秒以分收之得太陰地半徑差求太陽視半徑以太陽距地為一率中距太陽距地一千萬為二率中距太陽視半徑一十六分六秒化作九百六十六秒為三率求得四率為秒以分收之得太陽視半徑求影半徑置太陰地半徑差加太陽地半徑差一十秒減太陽視半徑得影半徑求影差太陰地半徑差化秒以六十九除之得影差求實影半徑置影半徑加影差得實影半徑求太陰視半徑同推日食法求併徑以太陰視半徑與實影半徑相加得併徑求兩徑較以太陰視半徑與實影半徑相減得兩徑較求食分以太陰全徑化秒為一率十分化作六百秒為二率併徑内減食甚實緯餘化秒為三率求得四率為秒以分收之得食分求初虧復圓距弧以併徑與食甚實緯相加化秒為首率相減化秒為末率求得中率為秒以分收之得初虧復