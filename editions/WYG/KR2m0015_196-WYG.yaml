body:
  text: 欽定四庫全書皇朝文獻通考卷一百九十六刑考二刑制順治十八年二月聖祖仁皇帝御極定校尉干連詞訟不服拘提之禁兵部議覆巡城御史徐越條奏校尉干連詞訟不服拘提應令承審衙門移闗該衛提究如有其親屬冒稱校尉名色者巡城御史提究重處得㫖嗣後校尉犯罪先拏議罪後移文鑾儀衛定光棍招搖騙挾詐官民以强盜律擬罪從御史趙祥星請也嚴隔屬赴控之禁從巡按御史張鳯起請也凡奸民隔屬赴控發被告所住地方官審結如事屬虚陷將赴控并代書人俱以光棍治罪定盜犯引線者罪刑部議准保定巡按王登聫條奏盜賊恃窩主為奥援又有引線者潛通消息以作嚮導二者共謀造意分股得財應將窩主照例引線之人即以窩主論從之申定死罪重犯不得論功議免之例奉諭向來死罪重犯因定有祖父伯叔兄弟陣亡及身有重傷者免死一次之例以致惡人豫知定例希圖倖免以後死罪犯人該部不得論功議免著照應得之罪擬定題請應否准其論功候㫖定奪定審問官有擅用匣牀捕獲强盜有妄用腦箍毛竹連根大板及竹籖烙錢等刑致斃人命者從重治罪康熙元年定追贓不完之例凡應追贓項年久不完家産盡絶免其追銀本犯入官身故産絶者贓銀免追妻子亦免入官至四年准部議凡贓罪流徒笞杖等犯若因家産盡絶即令入官較原罪反重嗣後照原罪的決免其入官互見徒流門二年定流犯身死妻子免遣之例詳見徒流門三年申定過失殺人之律先是國初舊例凡過失殺人者鞭一百賠人一口至是刑部議准凡旗下過失殺人者仍照盛京定制鞭責賠人民人責四十板追銀四十兩給死者之家旗民有彼此過失殺者俱照給銀四十兩之例免其賠人至康熙七年並旗下亦免賠人之例照律追埋𦵏銀十二兩有竒給死者之家定致死流犯之例妻家冀免伊女僉發致死其壻者以謀殺論惡棍冀得犯人妻設謀致斃本犯者照光棍例立斬詳見徒流門禁木籠之刑御史姚延啟奏言江南浙江等省有獄卒苛索不遂創為木籠上下分數層納囚其中不能屈伸天時炎暑穢氣薫蒸轉成疫癘多致監斃請勅部嚴禁從之定私行買贖發遣逆犯家屬之例官員革職旗人枷兩月鞭一百民人杖一百流三千里互見徒流門嚴挾私誣告逃人之禁兵部督捕侍郎馬希納疏言臣衙門之設原以緝逃為職近有姦民結黨夥告及至提審多屬子虛此輩原非實告逃人止欲借端嚇詐故首告狀内不詳寫被告人居址姓氏滿其欲則借為開脱之端不應其求則改為嫁禍之地雖將原告治罪而被告者家産蕩然有死於路斃於獄者請嗣後首告之人帶有逃人之主同赴具告准咨該督嚴查解部若並無逃人之主取地方官保結咨報免提案内牽連人質審得㫖嗣後首告逃人在某處某家者將首告之人拏送地方官止令窩隠之人出質若無逃人而挾仇控告或牽引妄扳加等治罪四年申定獨子留養之禁奉諭凡死罪非常赦所不原者若祖父母父母老疾家無次丁開具所犯罪名奏聞律文所有者著照律行其犯贓等罪流徙人犯取具地方官印結或照律留養或仍流徙請㫖定奪五年嚴搶奪婦女拐騙㓜童之禁奉諭凡搶奪婦女拐騙㓜童本犯從重治罪如係旗人將佐領及伊主一併治罪所屬地方不行查拏該管巡捕官亦治罪定奴僕行盜處分家主照旗人犯盜議處撥什庫之例六年嚴遞解逃人騷擾地方之禁時有遞解逃人經過城邑村莊嚇詐搶奪及解役縱放逃人借端枉道村莊同謀挾詐害民者上以此皆由地方官起解逃人時不嚴禁解役縱放逃人嚴加梏桎之故特諭嗣後逃人及解役若於所過地方騷擾者鎖拏送京治以重罪若原起解官不嚴禁解役經過地方官不行查拏事發嚴治其罪嚴採捕鷹鷂騷擾地方之禁戸科給事中查培繼奏浙省海鹽縣地方勾通營兵結連惡黨指官捕鷹百十成羣分投鄉鎮逼擾民家請勅嚴禁奉㫖嗣後如仍前弊將該將軍督撫總兵官副都統協領等從重治罪嚴强占闗津之禁戸部議覆左都御史王熙疏言凡王公以下文武各官家人强占闗津不容商民貿易者在原犯之地枷號三個月係民責四十板旗人鞭一百其縱容家人之藩王罰銀一萬兩公罰銀一千兩俱將管理家務官革職將軍督撫以下文武各官俱革職若兵民商人假稱王公文武各官之名照光棍例治罪貨物入官得㫖依議有横行欺壓者為首之人照光棍例治罪至十八年又定凡包衣下人及王公大臣家人領貲本霸占闗津者在原犯處所立斬示衆七年停止叩閽之例先是長安門外􅆆立石碑凡有寃抑者令其伸訴順治八年奉諭凡有奏告者先於該管各衙門控訴若不准或審斷寃枉再赴都察院通政司衙門具奏申告如内外大小衙門明知枉情蔽不上聞許具本至午門前進奏至九年固山貝子呼達海等奏奸人希圖報復動揑無影之詞詐害平民或僱人頂告或夥告夥証種種惡習大干法紀祈勅部嚴禁違者治罪上是其言令刋示曉諭至康熙三年復降㫖申禁定代控告者論死四年更勅部定大功以下緦麻以上親族相繼代告者旗人枷號四十日鞭一百民人責四十板徒三年無服兄弟代告者分别旗民枷責流徒所告之事俱不准行六年以御史田六善言定不俟原問官審結徑行叩閽者旗人枷號兩月鞭一百民人責四十板流三千里至是永停叩閽之例倘有寃抑令照例於通政司登聞鼓衙門控理又命刑部酌定現行則例詳晰分欵陸續進覽嚴定賭博禁例刑部議准凡開塲招集賭博之人抽頭者旗人枷號三月鞭一百民人責四十板充軍在場賭博者旗人枷號兩月鞭一百民人責四十板流三千里官員有犯賭博枷責者的決互見徒流門八年嚴投充人等控理前事及代親屬告訐之禁刑部題旗下有民人投充及賣身旗下之人多以從前舊事赴部控理并倚恃旗下代親屬告訐者請嚴加禁止凡此等告控不得准理從之申嚴在京文武官緝盜不力之令奉諭京師重地理宜肅清近聞竊盜搶奪詐騙者多此皆步兵及五城司坊各官並巡捕營稽查不力或番役等與盜交通受賄縱容以致奸徒肆行無忌嗣後所司文武官督率番役兵丁力行察緝如仍前弊治以重罪九年定隠匿入官人口之律刑部題律載抄扎人口隠匿不報者計口以隠匿丁口論若照律處分則罪輕而隠瞞者必多嗣後凡隠瞞反叛抄扎入官人口者不分男女大小五口以上照隠匿財物至五百兩例杖一百流徙寧古塔四口以下杖徒旗下有犯者枷號發落從之嚴犯夜之禁兵部都察院遵㫖議覆京城内外豪惡糾黨盜刼時聞城内責令步軍總尉步軍副尉步軍校城外責令五城御史司坊官巡捕營弁每日巡緝城外各巷口照城内設立柵欄定更後不許官員軍民等行走犯者照例治罪著為令從之嚴定監犯踰限不審之禁上諭刑部曰監犯踰限不行速結以致獄斃者甚多各犯自有應得之罪未死於法先死於獄殊非慎刑之意其作何嚴加議處詳議定例具奏尋議凡承問各官將正犯俱審取口供限内監斃者免議雖在限内並不審理取供遲延一案之内監斃一二人至三四人者罰俸有差五六人者降一級留任七八人者降二級調用九人以上革職將牽連無干之人監斃一二人者罰俸一年三人者降一級留任四人者降二級調用五人者革職若上司不據實題奏者降二級調用至於取録口供逾限不結致正犯監斃者照限内不取口供致死之例處分將牽連無干之人監斃一人者降一級調用二人者降二級調用三人以上革職上司不據實題奏者降二級調用若限内不能完結再行展限仍照限内監斃例處分如在展限外死者亦照逾限例處分從之十年定奸民嚇詐告訐之禁兵科給事中王曰温疏言京師五方輳會奸宄叢生無賴刁民多嚇詐告訐及告後潛逃種種惡習應加重懲嗣後有原告逃遁者應行文本籍嚴拏解究除原狀不議外照所告之罪反坐若曽經使人説合詐索者照光棍為首例治罪其説合起滅詞訟之人照為從例從之嚴屬員被劾掲告上司之禁吏部議覆給事中趙之符疏言直𨽻各省官員如果該管上司有勒索受賄等弊許於未劾奏之先控告如㕘掲之後控告者將所告之事不准仍照所控之罪反坐應如所請從之定旗下軍民論功免死之例刑部題旗下官員犯罪重大其親父伯叔兄弟陣亡俱免死一次至軍民人等並未議及嗣後應將旗下軍民人等犯重罪者亦照此例從之改定用非刑處分之例兵部題内外滿漢文武問刑衙門除夾棍桚指外有别用非刑者吏兵刑三部處分之例輕重不一查吏部例不論已未致死革職提問兵刑二部例未經致死者降級調用今應畫一定例凡滿漢文武官員用非刑者俱革職免其提問從之定强盜自首分别曽否殺人之例時交河縣監犯尹昌吉等行刼殺死事主自行投首部議免死御史孫錫齡疏言此風一開焉知無挾仇報怨殺人刼財自行投首希圖倖免者嗣後强盜投首如止刼財不曽殺人許令自新其傷人者仍治以殺人之罪下部議行十二年定逃人二罪俱發以重者論之例刑部㑹同督捕衙門議覆左都御史多諾疏言盜人或為竊盜或為搶奪事發被獲刑部枷責後督捕又加鞭刺或至殞命應從律内所開二罪俱發以重者論罪等者從一科斷嗣後逃人有犯搶奪竊盜罪至鞭一百者刑部枷號刺臂鞭一百督捕衙門免其鞭責止面上刺字不至鞭一百者刑部止臂上刺字送督捕衙門刺面鞭一百其各處逃人督捕審明逃盜情實先送刑部議結為盜之罪後移督捕議逃之罪從之定流徙人犯窩逃之例兵部督捕侍郎折庫納題窩隠逃人有定例處分至流徙有窩逃者未定處分之例今尚陽堡寧古塔等處流徙人等如窩隠逃人不便復擬流徙應枷三個月責四十板從之互見徒流門定刑部妄議株連之禁議政王大臣等議定凡滿洲罪犯除謀反叛逆照律連坐籍沒外其餘罪犯詳在律内者俱照律擬議至心存陷害借言情罪重大妄議株連籍沒者即照故入人死罪律治罪十二年定交代錢糧徇隠侵那之例凡新舊官交代錢糧如前任内有侵欺透冒那移墊解并拖欠未清等弊署事及新任官徇隠不報交代後始行查報者不議前官之罪將接任官照侵那例議罪已徵那用詐稱民欠者革職拏問上司徇庇前官逼勒後任交代者照徇庇例議處定贓犯産絶具題豁免之例凡催追侵盜錢糧贓私如果家産盡絶該督撫取結具題豁免若家産未絶徇隠揑結者從重議處定先㕘婪贓審無入己之例凡先㕘婪贓及借耗費等加派入已革職之員審無婪贓之處止擬那移加派因公科歛之罪者既經革職免其杖徒折贖如别案革職者照律擬罪十四年申嚴匿名掲帖之禁先是順治十七年定投匿名掲帖為首者以光棍律治罪至是復奉諭近見兇惡之徒投匿名掲帖者愈加昌熾如果有裨國家之事不妨明白具奏況設有通政司衙門令其上達此等兇徒並不知國家事務揑造背謬言詞大干法紀嗣後將投帖之人并知而不首者即行處死若旁人出首者授之官職奴僕出首者令開戸十六年改定方術誘取良人及畧賣良人子女之律律内設方術誘取良人與畧賣人子女者罪止論戍為妻妾子孫者罪止論徒上以法輕不足蔽辜勅部定議尋議嗣後凡誘取典賣或為妻妾等事不分所誘良賤已賣未賣為首者立絞為從者旗人枷責民人杖流如止一人即以為首論被誘之人和同者俱如為從之罪非和同者不坐其以藥物誘取者罪如畧誘例從之更定侵盜錢糧限内不完之例江寧巡撫慕天顔疏定例侵盜錢糧人犯限一年追完不完者本犯僉妻及未分家之子流徙財産入官今請於冊報之後發解之前全完者免其罪從之互見徒流門十八年嚴投營人挾制家主并發人塜墓之禁奉諭民間鬻身為厮養者多藉口投充營伍挾制家長勒索身契及妻子財物又有桀驁之徒乘戎馬倥偬之際發人塜墓或利其所有或挾私仇尤屬可惡著嚴議具奏尋議背主投營勒索身契及妻子者照光棍例治罪其無挾制勒索等情枷責給還家主乘機發塜見尸索財取贖分别論流徙斬絞如律營將知其背主而不舉發者分别專管兼管統轄謫調鐫級有差不知而不舉發者奪俸從之定衙役詐贓之罪十兩以上者僉妻安插奉天互見徒流門一百二十兩以上擬絞又命九卿詹事科道詳酌新例奉諭國家設立法制原以禁暴止奸安全良善向因人心滋偽輕視法網故於定律之外復設條例俾其畏而知儆免罹刑辟乃近犯法者多朕心深用惻然其定律之外所有新例過嚴者著九卿詹事科道詳加酌定尋將遵㫖更改條例繕冊奏准刋刻通行名曰現行則例十九年嚴旗人私往外省之禁奉諭各旂差遣家人或往外省索債或令隨官赴任或以情干求外官者甚多借端營私小民最為苦害令吏兵刑三部及都察院會同定例嚴禁尋議旗人私往外省借端挾詐囑託行私擾累小民者平人枷號三個月鞭一百係官革職鞭一百不准折贖失察之佐領罰俸三個月驍騎校罰俸六個月其差遣家僕之人係閒人鞭一百係官革職差去之僕枷號一月鞭一百從之定罏頭匠役包攬買銅交納者枷責并妻子流徙尚陽堡互見徒流定被㕘官員訐告上司之例定例京察大計降革官員有駕言控告者將所告不准外有冠帶者革職無冠帶者送刑部治罪至是定被㕘官員有訐告上司者照此例一體處分從直𨽻巡撫于成龍請也二十年嚴刑具不一之禁上諭刑部曰犯人各有應得之罪今聞爾部枷孔大小不一板有厚薄賄囑者板薄而孔大否則板厚而孔小所帶項鎖亦有輕重此等情弊爾部嚴察禁止定旗人横行非法詐害平民者該旗查拏奏聞請㫖發遣詳見徒流門二十一年嚴賣身旗下仍留原住地方擾害之禁刑刑部遵㫖議奏凡賣身旗下之人原有房田守分度日於地方無擾者仍令居住原處無田房者俱令伊主收囘若在原處有生事犯法者地方官申解治罪仍令伊主收囘倘再留原處容留之主及地方官各分别治罪得㫖依議凡賣身之人或曽經犯罪處分或見有犯法事情賣身旗下希圖倖免者從重治罪買主知情一併從重治罪定民人假稱逃人具告行詐者發遣為奴之例詳見徒流門嚴巡躧私恭官兵誣拏無辜之禁兵部議覆寧古塔將軍巴海請議巡躧盜採人參官兵給賞之例奉㫖盜採人參官兵緝獲議叙允當但恐非係採參之人妄有拘執奪其貲財俾孑身採買他物者無故罹害亦未可定嗣後有犯者作何處分爾部再議尋議巡躧章京兵丁誣拏無辜將章京革職兵丁枷號兩月鞭一百若奪取財物者將章京革職交刑部議罪兵丁枷號三個月鞭一百從之二十二年申定旗人畧賣人口處分之例刑部議覆御史蔣鳴龍疏言舊例畧賣人口止將該管官處分未曽定有佐領驍騎校小撥什庫及其家主作何處分之例嗣後城内旗人犯者本佐領驍騎校知而不舉革職失於覺察罰俸一年小撥什庫知而不首枷責失於覺察鞭五十旗下家人犯者家主知而不首係平人枷責係職官革職失於覺察平人鞭五十職官罰俸其城外園内所住旗人犯者本主照此例議處在屯内住者將屯内撥什庫照佐領下撥什庫處分闗外住之人來京買人口者圼明宛大二縣五城正印官取文契用印禀明該都統咨行兵部給發印票若無印票令其出口守闗章京等罰俸一年披甲人鞭八十領出者鞭一百從之定在京監斃人犯處分之例先是康熙九年定踰限不行審結一案内監斃三人以上者在外承問官及該管上司革職降罰有差上以内外刑獄事屬一體其在内各衙門及各門監犯致斃處分復命九卿詹事科道詳議尋議刑部衙門凡審案限内不取供與雖取供不行審結以致犯人並牽連之人監禁斃命或羈門斃命將承審官照外官例處分堂官不據實題㕘照督撫例處分若禁卒及守門人役將監禁及羈門各犯恣行凌虐致斃處分司獄及城門尉等官斃三四人至九人十人者罰俸有差十一人以上者革職從之定發掘歴代帝王名臣先賢墳墓者罪凡歴代帝王名臣先賢墳墓令地方官不時查看倘有發掘開棺見尸為首者立決為從者立絞發掘見棺為首者立絞為從者監候絞發掘未至棺槨為首者監候絞為從者充發定旗下家人及莊頭倚勢害民該管官及家主處分之例刑部議准旗下家人莊頭等在外倚勢害民霸占子女把持衙門及拏人到家綑縳打死者内包衣人該管官降級留任王貝勒貝子公家人該管家務官降級留任民公侯伯大臣官員家人伊主降級留任係平人鞭責著為令申定旗下官兵隠匿入官人口之罪議政王大臣等議准凡逆犯應行入官其匠役家屬人口有私帶入京者令其首送到部若已經私放為民者亦令呈首隠匿不首者係官交部議處平人照例擬罪其不行詳查之都統等官交部議處小撥什庫鞭一百各省將軍副都統以下披甲以上總督巡撫以下兵丁以上均照此例得㫖若係將軍等分撥及軍功被傷賞給者仍留與原主餘依議二十三年申嚴窩盜之禁奉諭京畿重地理宜肅静近聞盜賊公行且各有窩主多在墳園荒僻之處為其窟穴其令五城嚴緝務在必獲正法則盜源自絶矣定誣良為盜嚇詐財物者發遣寧古塔例詳見徒流門定强盜自首免死發邊衛充軍例詳見徒流門二十四年定有司誣良為盜之例九卿詹事科道等衙門議定有司誣良為盜本官照故入平人例從重治罪督撫審出題㕘者免議或部院衙門審出或被誣之人告發者將督撫一併嚴議從之嚴定貪官不入緩決之例時九卿會議廣東雲南秋審招冊内有貪官人犯奉諭此等藐視法紀貪汚不悛者祗以緩決故耳今若法不加嚴不肖之徒何以知警此内貪官耿文明等正法外餘俱照議完結申定貢使毆死内地人之例理藩院題厄魯特噶爾丹博碩克圖汗下沙里巴圖爾台吉來使特木把於北館中毆死正白旂商人王治民應論死上命傳諭厄魯特曰爾等進貢來使沿途擾害民生搶掠牲畜朕以爾等逺方之人不諳中國法紀未遽加罪屢從寛免曽經頒㫖曉諭今爾進貢頭目並不嚴束傔從任其擾害將内地人毆死干紀甚矣將特木把依律處斬令爾等識之觀之此後其謹遵成法毋得妄行二十五年嚴土司畨蠻交界地方販賣軍器之禁兵部議准土司畨蠻交界之處有將軍器禁物販賣者杖一百發邊逺充軍互見徒流門該管官知情故縱者一例治罪如失於覺察州縣官並專汛武職俱降四級調用府道及兼轄武職官俱降二級總兵官降一級督撫提督各罰俸一年定䝉古殺人及偷盜牲畜之例理藩院奏定嗣後䝉古如有擅殺内地民人者不論幾人俱斬其妻子牲畜入官餘鞭一百罰三九牲畜又定邊口禁例凡䝉古私入邊游牧雖不為盜台吉罰三九牲畜寨桑罰一九平人鞭五十仍將所騎馬匹入官其攜帶家口牲畜入邊游牧者不論幾戸俱入官至民人往邉外伐木刈草䝉古有奪其食物者不論幾人將乘馬匹盡行給還民人仍鞭三十其屬下毎犯一次并罰濟農五九牲畜至二十六年又議准凡食俸蒙古王公官員等有罪應議罰牲者免其罰牲九數量罪革俸民人無牌票私出邊口者將妻子一併發往山海闗外遼陽等處安插互見徒流門二十六年申嚴解役凌虐犯人及教唆搶奪之禁奉諭凡各省解送京師及京師解發各省人犯有解役拷打致死者其所犯之罪不至於死而凌虐致斃殊為可惡刑部㑹同督捕衙門定議條例尋議凡解部及遞解各犯計程給與口糧凡僉差官役遣有家業正役押解沿途官員詳察有無勒掯拷打之處如或有之即將解役懲治若拷打致死地方申報督撫嚴審從重治罪有教唆犯人通同搶奪者以光棍例治罪其在中途患病者原解即報明地方官驗明出結如未取患病印結途中死者以死者之多寡分别治罪著為例從之二十七年禁止有司官審案律例兩引刑部題凡審擬各案有律者引律無律者引例今督撫及承審各官多有律例兩引規避處分且恐受人囑託借此作弊應行停止從之定讐家遇赦復藉口報讐者杖一百流三千里詳見徒流門二十八年命察流犯發遣之弊諭流徙人犯遇有勢力者每羈禁不嚴及至發遣又輾轉遷延其貧苦無力營求者即肆行凌虐瀕於死亡著戸刑二部堂官稽察如有前項情弊從重治罪詳見徒流門定强盜事發自首者分别曽否傷人論戍擬徒詳見徒流門定强盜年未及嵗被脅同行贓無入已者免死杖流互見徒流門三十一年嚴大臣犯賭之禁刑部議准大臣犯賭者革職枷號不准折贖永不叙用三十二年申嚴太監犯罪之令刑部議太監錢文才毆死民人徐二應絞監候上諭大學士等曰凡太監犯罪斷不可宥朕觀古來太監善良者少要在人主防㣲杜漸慎之於始縱容姑息侵假事權迨其勢既張雖欲制之亦無可如何如漢之十常侍唐之北司竊㺯威權甚至人主起居服食皆為所制此非一朝一夕之故由積漸使然也朕聞明代諸君將本章批簽委之司禮太監司禮太監委之名下内監此輩素無學問不知理義委之以事其能免於舛謬耶錢文才此案爾等記之至秋審時勿令倖免定拘訊婦女之禁先是順治十六年刑部議准凡婦女犯姦盜人命及重案牽連者應行提審其餘小事牽連者令子姪兄弟代審至是又諭婦人除親身犯罪外事屬牽連遣官往問口詞其拘至公廷永行停止三十六年定内監逃出嚇詐有司之例刑部以内監劉進忠逃出訛詐議罪奏聞得㫖劉進忠乃禁中役使之人逃出已屬可惡況又嚇詐有司宜照光棍例治罪嗣後太監有與同罪者以此為例三十七年申嚴酷刑之禁奉諭各監口有刑具曰大鐐與匣牀無異又短夾棍止長尺許大枷重一百二十觔瓦樣重板此皆酷虐之刑著嚴行禁止三十八年嚴䝉古盜馬之例舊例䝉古盜馬人犯擬斬立決康熙二十年特降恩㫖免其處死給與失主為奴至是理藩院議蒙古盜馬人犯圖薩罪具奏奉諭往者塞外多盜近朕遣人教養䝉古申嚴法禁盜賊屏跡四十八旗各獲生理風俗稍醇而圖薩獨先犯禁決不可恕耳此法非朕創也太宗文皇帝時因䝉古等無廬舍墻垣馬匹難養故爾定法以警匪類嗣後有犯者殺無赦三十九年更定虧空那移律例直𨽻巡撫李光地疏言虧空那移律例雖有正條但法輕易犯嗣後地方官如有那移銀至五千兩以上或糧米至六千石以上者無論已完未完革職仍擬滿流不准折贖援赦從之互見徒流門四十一年定父子同犯不准留養之例刑部議毆人命之陳潮應照例留養得㫖罪人存留養親必其親原無犯罪情有可矜方為奏請陳蒂生與其子陳潮同毆陳大勝至死亦屬有罪照例留養殊未允協其另議尋議陳蒂生照餘人例杖一百年老收贖伊子陳潮仍按律擬絞監候不准留養從之定朝鮮民越境殺人之罪禮部議覆朝鮮國王李焞將其國越境殺人金禮進等擬立斬該管人員擬革職徒流具題應如所請上曰朝鮮國人越境殺人行刼法所不宥應立斬其該管官李有白等俱從寛免罪朴錫昌等俱革職免其流徒申濫用夾棍之例凡内外問刑官濫用夾棍致斃人命者嚴行治罪其學政鹽院以及佐貳官不許擅用夾棍如有應行刑訊事送問刑衙門審理四十四年革奸胥刪改供詞之弊刑部議准巧吏蠧胥率多鍛錬羅織刪竄供詞惡徒奸棍亦復串通賄囑嗣後命盜等情取明口供髙聲朗誦即於紙尾填註該犯姓名令其親自畫押以清宿弊四十七年定私鑄錢文及販賣私錢者罪私鑄及及工匠人等分别首從斬絞其糧艘鹽船私裝販賣運弁船戸等照私鑄為首例治罪定免死減等流犯逃囘復犯罪案不論罪之輕重即行正法例詳見徒流門定充發人犯在配毆死人即行正法例互見徒流門四十八年定兩次竊盜發黒龍江為奴例詳見徒流門五十二年定民人控告州縣官暫免解任交布按兩司審明情實再行題㕘從陜西總督鄭海請也定在部審結事例凡在京旗人在外民人為地畝房産主僕名分等事冊籍在戸部外省不便完結者應聽戸部審理其中有互相鬬毆重傷或搶奪等情戸部㑹同刑部審結定養子開户及本旗原主互相欺詐之禁九卿等議覆八旗出征舊人有將擄獲之人為養子分産開戸者傳至子孫或因勒詐不遂稱為祖父家人混行控告係職官革職無職者枷號兩月鞭一百如有勒詐欵跡審實照訛詐治罪得㫖允行并諭養子於分居開戸之後其原主子孫或極庸懦或至絶嗣養子之子孫或冒稱近族弟兄反肆欺凌及爭告家産者亦著嚴行禁止五十三年定造賣淫詞小説之禁例凡造作刻印淫詞小説者係官員革職軍民杖一百流三千里市買者杖一百徒三年定追贓之例刑部題准軍流人犯應追贓者贓完方行發遣因此有家産者畏發不肯清還定例承追官止罰俸一年督催上司並無處分所以追比不力嗣後追賠贓銀及分賠等項限一年通完死罪減二等軍流等犯俱免罪如不完承追及督催官罰俸有差再限一年追完減等若仍不完軍流充發死罪監追承追官降級留任督催罰俸有差再限一年著落妻子追賠限内能完承追官開復若不完調用督催知府直𨽻州降級留任司道督撫俱罰俸如果家産盡絶保題豁免後另有房産錢財人口俱入官出結官革職督催知府直𨽻州降調司道降留督撫罰俸所欠銀米出結官賠補武職亦照此例旗人犯死罪仍監追軍流等犯暫停枷責亦限年追比其佐領驍騎校照承追官㕘領照知府直𨽻州都統照督撫布按例從之仍諭該管上司有逼勒出結屬員不行出首者從重治罪定近京地方旗民詞訟交理事同知審理之例從御史周祚顯請也互見詳讞門五十五年定八旗命案令該旗大臣㑹同刑部審擬之例詳見詳讞門定糾衆搶奪稻穀者發三姓給披甲人為奴例詳見徒流門五十六年定海船禁例沿海小船偷載米糧剥運出洋大船者嚴拏治罪如將船賣與外國者造船與賣船之人皆立斬所去之人留在外國將知情同往者枷號三月該督行文外國將留下之人令其解囘立斬沿海文武官員隠匿不報者從重治罪定强盜分首從例先是康熙二十一年上以强盜犯案甚多且有獲贓甚少牽連多人不忍概置重典令諸臣詳議尚書梁清標奏强盜皆係凶惡難分首從且恐有司髙下其手或罪屬可矜間行寛免伊輩自感再造之恩若預定一例則伊等皆僥倖於不死而愈恣為盜矣左都御史徐元文奏此等古來皆不待教而誅按律竊三次者照强盜律處絞而强盜行刼至兩三次後發覺者甚衆若從寛典是竊盜反重於强盜矣上是其言至是特頒恩諭嗣後大盜案件將造意為首者正法餘俱減等發黒龍江等處著為令互見徒流門臣等謹按舊例强盜不分首從皆斬立決夥盜減等之㫖蓋於無可生中求一線可生之路誠自古未有之仁政也至雍正四年九卿有欲停夥盜減等之議者世宗憲皇帝特降諭㫖照舊遵行仍恐行之既久官吏捕役悉知此例或將愚劣無能之輩逼令自承盜首而奸狡積惡反或入於夥盜之中得邀減等令將此條另立檔案首載聖祖仁皇帝諭㫖次將凡因盜案所降諭㫖存案遵行遇有盜案令地方各官詳察案内情形其實在為盜及被人誘脅者一一註明令大學士九卿會同法司定擬有應減等者將縁由聲明蓋不使國家格外之恩或為奸人倖生之路則積惡者既無敢妄希漏網輕於犯法而情之稍有可原者亦得身邀寛典開其自新此則我朝明刑弼教之至意也夫五十七年定徒罪以下概免監禁交該佐領及地方官保出候審刑部具題後即行發落從左都御史蔡升元請也定冒充兵丁生事擾民照光棍治罪例定鬬毆傷輕因傷風及他病死者之例奉諭被毆受傷至保辜限外身死部内奏明縁由請㫖定奪者無庸議外有當時不曽殞命越數日或因傷風或因他病而死仍將毆打之人擬抵情有可矜向未定例著會同九卿確議具奏尋議凡鬬毆傷輕未即殞命或因傷風或因他病死者將毆打之人免其擬抵減等發落如係毆傷致死而揑報傷風他病死者承問府州縣及司道督撫俱照失出例處分從之五十八年定沿海濱江用鎗棍鬬殺例兩造為首及鳴鑼聚衆之犯杖一百流三千里為從傷人之犯杖一百徒三年附和未傷人者枷一月責四十板互見徒流門五十九年定鹽梟就撫復行私販本犯充發科布烏蘭固木之例互見徒流門六十年定造言訛詐者發科布多烏蘭固木之例詳見徒流門皇朝文獻通考卷一百九十六
