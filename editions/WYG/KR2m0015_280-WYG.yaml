body:
  text: 輿地考十二湖北省臣等謹按禹貢以荆及衡陽表荆州之界實兼今湖北湖南全境而爾雅則稱漢南曰荆州周禮職方則稱荆州其川江漢蓋南條之水以江漢為長江漢既治而其餘附近諸水亦無不治其負漢絡江為二瀆之所交㑹者惟今之湖北形勢為然漢水由鄖西入境經鄖陽襄陽安陸至漢陽府與大江㑹即書導漢自滄浪過三澨至大别入江之道也江水由巴東入境經宜昌荆州漢陽繞武昌府而南入江西界即書導江自澧過九江至東陵之道也是湖北一省禹跡㡬周徧焉總其地勢則東引三呉西控巴蜀北枕闗雒而南跨乎洞庭江山雄偉為全楚扼要之地荆門夏口之間自古倚為重險自入本朝以來承平日久舟車往來久為川陸通塗至於鄖陽界川陜河南之交明時特設撫治都御史以鎮之而施州故衛錯鑲黔中厯代又皆為土司所轄至我朝以秦蜀寧謐久罷鄖陽撫治之設其施南一府則以羣苗内面徧置流官即疆土之宜因時損益而聖世廣徳所及即於是徴焉蓋江漢之化行固逺過周南矣湖北明湖廣等處承宣布政使司治武昌府統轄湖南北共領府十五州二其武昌漢陽黄州徳安安陸荆州襄陽鄖陽八府為今湖北地又增湖廣都指揮使司領武昌等衛成化時又増置行都指揮使司分領荆州等衛及均州等守禦千户所嘉靖時改安陸府為承天府又増置興都留守以領衛所本朝初改承天府為安陸府設湖廣總督巡撫及布政使司按察使司皆駐武昌又設偏沅巡撫駐偏橋鎮又設撫治鄖陽都御史分治鄖陽以控四川陜西河南湖南四省之交康熈三年以偏沅巡撫駐長沙又移湖廣右布政使司於長沙分治湖南改湖廣巡撫為湖北巡撫與左布政使司仍治武昌領武昌漢陽黄州徳安安陸荆州襄陽鄖陽八府六年定湖北湖南為兩省改左布政為湖北布政使司又裁鄖陽撫治統歸於湖北巡撫七年令總督兼轄四川為川湖總督移駐荆州府十九年仍為湖廣總督還駐武昌雍正六年升荆州府屬之歸州為直𨽻州十三年升荆州府屬之彛陵州為宜昌府又升歸州屬之恩施縣為施南府仍降歸州為屬州屬於宜昌府凡領府十各衛所以次裁併入州縣其存者俱専司漕運不治民事東西距二千四百四十里南北距六百八十里東至安徽安慶府宿松縣界五百五十里西至四川䕫州府巫山縣界一千八百九十里南至湖南岳州府臨湘縣界四百里北至河南汝寜府羅山縣界二百八十里東南至江西九江府瑞昌縣界四百五十里西南至四川重慶府彭水縣界二千五百十五里東北至安徽六安州霍山縣界四百六十里西北至陜西商州山陽縣界一千四百七十里在京師西南三千一百五十里武昌府為省治東西距五百三十二里南北距四百七十二里東至江西九江府瑞昌縣界五百二十五里西至漢陽府漢陽縣界七里南至湖南岳陽府臨湘縣界四百里北至黄州府黄岡縣界七十二里東南至江西南昌府武寜縣治四百五十里西南至岳州府平江縣治六百三十里東北至黄岡縣治一百八十五里西北至漢陽府黄陂縣治一百二十里自府治至京師三千一百五十五里明為武昌府降興國路為屬州本朝初為湖廣省治後分為湖北省治領州一縣九江夏縣附郭武昌縣在府東北一百八十里嘉魚縣在府西南一百五十里蒲圻縣在府西南三百六十里咸寧縣在府東南二百四十里崇陽縣在府南三百六十里通城縣在府西南五百里興國州在府東南三百八十里大冶縣在府東南一百五十里通山縣在府南一百八十里漢陽府在省治西北十里東西距三百二十七里南北距六百四十里東至武昌府江夏縣界七里西至安陸府潛江縣界三百二十里南至湖南岳州府臨湘縣界四百十里北至河南汝寧府羅山縣界二百三十里東南至武昌府治十里西南至荆州府監利縣治五百六十里東北至黄州府治一百八十里西北至徳安府治三百二十里自府治至京師三千一百五十里明洪武九年省漢陽府入武昌府十三年復置府共領縣二又降沔陽府為屬州本朝初屬湖廣省後分屬湖北省雍正七年以黄州府之黄陂縣徳安府之孝感縣來屬乾隆二十七年以安陸府之沔陽州來屬又析沔陽州地置文泉縣三十年復省文泉縣入州凡領州一縣四漢陽縣附郭漢川縣在府西北一百二十里黄陂縣在府北一百二十里孝感縣在府北一百四十里初屬徳安府雍正七年改屬漢陽府沔陽州在府西南三百六十里初屬安陸府乾隆二十七年改屬漢陽府又析州地置文泉縣三十年仍省入州黄州府在省治東北一百八十里東西距六百六十五里南北距四百八十里東至安徽安慶府界五百十里西至漢陽府界一百五十五里南至武昌府武昌縣界十里北至河南汝寧府界四百七十里東南至江西九江府界四百二十里西南至武昌府界一百五十里東北至安徽鳳陽府夀州界五百八十四里西北至河南汝寜府信陽州界五百六十里自府治至京師三千二百六十里明為黄州府降蘄州為屬州共領州一縣八本朝初屬湖廣省後分屬湖北省雍正七年分黄陂縣往屬漢陽府今領州一縣七黄岡縣附郭蘄水縣在府東南一百十里羅田縣在府東一百六十里麻城縣在府東北一百八十里黄安縣在府北二百四十里蘄州在府東一百八十里廣濟縣在府東二百五十里黄梅縣在府東三百五十里徳安府在省治西北三百二十里東西距三百八十里南北距三百八十里東至漢陽府孝感縣界八十里西至襄陽府棗陽縣界三百里南至漢陽府漢陽縣界二百里北至河南汝寧府信陽州界一百八十里東南至漢陽府治三百十里西南至漢陽府沔陽州治三百四十里東北至河南光州治四百三十里西北至襄陽府治四百九十里自府治至京師二千四