body:
  text: 選舉考二舉士康熙二年停止八股文體鄉㑹試以䇿論表判取士分為二場第一場試䇿五道第二場四書論經論各一篇表一道判五條直省學政亦以䇿論考試生童三年更定科場試題鄉㑹考試自甲辰年為始頭場䇿五篇二場用四書本經題作論各一篇三場表一篇判五道四年禮部侍郎黄機疏言制科取士稽諸往例皆係三場先用經書使士子闡發聖賢之㣲㫖以觀其心術次用策論使士子通達古今之事變以察其才猷今甲辰科止用策論減去一場似太簡易恐將來士子勦襲浮詞反開捷徑且不用經書為文則人將置聖賢之學於不講恐非朝廷設科取士之深意臣請嗣後復行三塲舊制庶士子知務實學而主考鑒别亦得真儒以應國家之選下部知之六年吏部議覆福建道御史李棠條奏例監考補中書三年後即陞部屬進士舉人乃遲至十年之久始得官職嗣後例監考授中書之例應行停止將各科進士照年分前後一缺五人咨取考試得㫖各科進士不必拘年分前後人數有願考者預行選取遇缺即補又命滿洲蒙古漢軍准赴考試先是八旗生員舉人進士停止考試至是復命滿洲䝉古漢軍與漢人同塲一例考試其生童於鄉試前一年八月内考試從御史徐誥武請也又禮部議八旗教習缺出舉人内有願就教習者准國子監一體考取從之九年奏准二甲三甲進士俱以知縣用因推官已裁故也十年吏部奏八旗滿洲監生識滿漢字者考試繙譯止識滿字考試繕寫優者授為正八品以部院筆帖式補用其漢軍監生識滿漢字者照滿洲監生例考試取用止識漢字者照漢監生考職例以州同等官用從之十一年勅順天鄉試及㑹試仍用滿漢監察御史料理塲務十五年議政王大臣等議覆禮部疏言朝廷用人雖文武兼資然八旗子弟尤以武備為急恐専心習文以致武備懈弛今值用武之際若令八旗子弟仍與漢人一體考試必偏向讀書有誤訓練現今已將佐領下子弟一名准在監肄業亦自足用除現在生員舉人進士録用外嗣後請將旗下子弟考試生員舉人進士暫令停止應如所請從之又吏部奏滿洲䝉古漢軍旗下生員既經停其考試應將伊等以無品筆帖式註册録用從之十六年禮部奏本年添行鄉試查直隸江南浙江三省貢監數多應各遣考試官河南山東陜西山西貢監數少應令河南省遣官一同考試湖廣江西歸併江南省福建歸併浙江省考試以入塲應試人數計算於十五名中取中舉人一名不必另取副榜於本年九月内考試從之十八年召試博學鴻詞欽取五十人分别授職先是十七年奉諭㫖自古一代之興必有博學鴻儒振興文運闡發經史潤色辭章以備顧問著作之選朕萬㡬時暇遊心文翰思得博洽之士用資典學我朝定鼎以來崇儒重道培養人才四海之廣豈無竒才碩彦學問淵通文藻瑰麗可以追踪前哲者凡有學行兼優文詞卓越之人不論已仕未仕著在京三品以上及科道官員在外督撫布按各舉所知朕將親試録用其餘内外各官果有真知灼見在内開送吏部在外開報該督撫代為題薦務秉公延訪期得真才以副朕求賢右文之意嗣經内外諸臣保薦陸續送部又奉諭㫖所舉官人俟全到之日考試恐有貧寒難支者户部量給衣食於是月給俸廩及柴炭銀兩至是集諸人於體仁閣考試欽命試題賦一篇詩一首上親覽試卷大學士掌院學士參閲分為四等曰上上曰上曰中曰下以彭孫遹為第一共取五十卷上上卷二十作一等上卷三十作二等其中卷三等下卷四等俱落第又於上卷中斥去一卷上自取嚴繩孫卷補之爰命閣臣取前代制科舊例查議授職尋議查得兩漢授無常職晉上第授尚書郎唐制策髙者特授以尊官其次等出身因之有及第出身之分宋制分五等其一二等皆不次之擢三等始為上等恩數比廷試第一人四等為中等比廷試第三人皆賜制科出身第五等為下等賜進士出身得㫖俱授為翰林院官於是分别定議内陞道員授為侍讀邵呉逺一人候補道員郎中授為侍講湯斌李來泰施閏章呉元龍四人進士出身之主事中行評博内閣中書知縣及未仕之進士授為編修彭孫遹張烈汪霦喬萊王頊齡陸葇錢中諧袁佑汪琬沈珩米漢雯黄與堅李鎧沈筠周慶曾方象瑛金甫曹禾十八人舉貢出身之推知教職革職之檢討知縣及未仕之舉貢廕監布衣俱授為檢討倪燦李因篤秦松齡周清原陳維崧徐家炎馮勗汪楫朱彞尊邱象隨潘耒徐釚尤侗范必英崔如岳張鴻烈李澄中龎塏毛竒齡呉任臣陳鴻績曹宜溥毛升芳黎騫髙詠龍燮嚴繩孫二十七人共五十人俱充史館官纂修明史又奉諭㫖杜越傅山王芳榖等文學素著念其年邁從優加銜以示恩榮因俱授為内閣中書聽其回籍二十年以軍興旁午准撫臣所奏貴州本年鄉試於壬戌年補行又改增楚省中額先是因滇逆變亂於康熙十六年改照中省取中湖南平定撫臣請仍改為大省額數取中從之二十二年補行雲南省辛酉科鄉試二十三年諭大學士等曰滿文中書皆論旗分漢文中書不論旗分如此則一旗或多或少今應照旗均分其有餘者令解任候缺滿洲進身之階不可不加選擇嗣後部院各衙門中書缺出俱令考試補授又吏部覆奏助教各官應加考試録用得㫖職掌教習廕官生應選學優者補用若用文學庸劣之人何以表率生徒以後著吏部考取仍將試卷送閲具奏二十四年刑科給事中楊爾淑疏言試士先以八股首闈七藝重在四書請自乙丑科以後㑹試及順天鄉試四書題目俱乞皇上欽定從之凡鄉㑹試屆期先一日恭請試題密送内簾考試官其五經及二三塲仍令考試官擬出照例恭進著為例是年㑹試二塲表題亦出自欽定各直省鄉試試官出題錯誤者照例處分又定會試三塲畢主考等官遴選試卷十本繕寫恭進自第一名至第十名俱由欽定仍送塲内拆號填榜以後會試及順天鄉試並同但止頭塲文字雍正二年合進三塲揭曉後刋刻試録登科録即於試録内並載三塲中式文擇其尤者每題一篇正副主考作前後序以進二十八年兵部議覆兵科給事中能泰奏言考取滿洲生員宜試騎射應如所請上命如議又奉諭㫖滿洲以騎射為本學習騎射原不妨礙讀書考試舉人進士亦令騎射倘將不堪者取中監箭官及中式人一併從重治罪旋經奏准奉天八旗考試亦如之臣等謹按戴記云古者天子以射選諸侯卿大夫士諸侯嵗獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其諸候有慶則益地以示賞反是者讓之削地以示罰射之於舉士其重如此孔子射於矍相之圃觀者如堵墻古之儒者未有不能射者也自後世溺於章句而文武判為兩途懐鉛握槧之儒㡬不知弓矢為何事寛衣博帯以號於人曰士也抑知六藝均為士人所有事習書廢射則得一藝而失一藝人才之偏而不全逺遜三代者職是之故我朝以武功定天下而國書繙譯貫串經史創千古所未有凡考試滿洲進士舉人必先是二者乃准入闈以其為國家本務不可逐末而忘夫肇始是以功令所在八旗有不與試之士而無不能射之人入則含毫挾册出而躍馬彎弧要皆為有用之學承平無事蒐苗獮狩扈從塞外雞翹豹尾之間射雉獲鹿各具所長有事則公卿可為將帥頗牧出於禁廷行師一二萬里之外指揮坐定無事登壇選將如往代委曲繁重之所為也竊考是年定滿洲考試兼閱騎射遼海為興京重地例亦如之考之戴記射義舊文益見聖朝制作殆有酌古今而盡善者歟又九卿議覆左副都御史梅鋗疏言會試定例分南北中卷後又於南北中卷之内各分左右致閲卷者不盡衡文祇算卷數以定中額請仍照定例止分南北中卷概去左右名色應如所請併將江南廬州等府滁州等州舊係中卷者俱歸南卷其雲南貴州四川廣西四省去其中卷名色每科雲南定為雲字號額中二名四川定為川字號額中二名廣西定為廣字號額中一名貴州定為貴字號額中一名康熙二十九年會試恩詔加額應將雲南四川各加中二名廣西貴州各加中一名從之至三十年五月復分江南浙江為南左江西湖廣福建廣東為南右直𨽻山東為北左河南山西陜西為北右四川雲南為中左廣西貴州為中右仍照定例各計卷數之多寡憑文取中至安廬鳳三府滁和徐三州改歸南卷俱照原議行三十二年禮部議覆國子監祭酒呉苑疏言八旗之人學習制藝者日多而中式之額太少請增加名數查鄉試滿洲蒙古原取中舉人十名今增六名漢軍原取中舉人五名今增三名㑹試滿洲䝉古原取中進士四名今增二名漢軍取中進士二名今增一名從之三十四年增雲南鄉試解額十五名增貴州鄉試解額十名三十五年廣八旗滿洲蒙古漢軍直𨽻各省鄉試解額滿洲䝉古四名漢軍二名順天生員十七名南北監生十四名江南二十名浙江湖廣福建各十七名河南十五名山西陜西各十三名江西十八名山東廣東四川各十四名廣西十名三十六年宗人府禮部奉諭㫖國家樂育人才振興文教將使海内英雋之士靡不蒸蒸蔚起矧宗室子弟系託天潢豈無卓越之姿足稱令器久宜甄拔奬掖俾克有成考諸前史以公族應制舉入仕者代不乏人今屬籍所載日益繁衍除已授爵秩人員外閒散子姓素無職業誠恐進取之途未闢致嚮學之意漸隳嗣後八旗宗室子弟有能力學屬文奮志科目應令與滿洲諸生一體應試編號取中則賦質英異者咸服習於詩書而學業成就者不阻抑於仕進凡屬宗支人人得以自効而於朕興賢睦族之至意亦用是以允愜焉爾等衙門即遵諭行又命直省選拔文行兼優之士府學選拔起送二名州縣學一名滿洲䝉古二名為拔貢生又禮部以順天鄉試同考官開列知縣等具奏奉上諭考例用十六員此疏内進士知縣止有十人若應試之人預擬此十人必為試官有所鑽營則作弊更易著將員外主事以下小京官及知縣守部進士一併開列著為令又准順天鄉試貢監生五經中式又諭大學士王熙等曰鄉試為掄才大典出題理宜詳慎今覽各省所進題名録中其題目多有未當如福建三塲策問臺灣事宜一道於地方情形事勢毫未通曉乃茫昧命題殊為悖謬其餘各省亦未盡當爾等將各省呈覽題目及題名録詳加檢閲若有悖謬最甚者察出叅奏於是察㸔福建雲南河南三省第三場策問命題詞義多有未當均屬悖謬部議將主考王連瑛等分别各降級調用從之三十七年吏部議覆湖廣道御史李登瀛疏言直𨽻山東河南江南浙江江西陜西湖北等處舉人㑹試五科不中方許揀選又需次數年始得補用請酌減科分揀選使得及時効力應如所請直𨽻等九省舉人會試三科不中准其揀選知縣一科不中改授教職者以州學正縣教諭補用從之三十九年奉諭㫖此科中式舉人因有情弊為人指㕘朕亦聞外議紛紜故行覆試以騐其實朕親命題特命皇子重臣侍衛嚴加監試朕初謂必有不能終卷者及閲各卷俱能成文尚屬可矜至於落第者在外怨謗勢所必有焉能杜絶諸臣所擬三等以上者皆可觀有在三等朕拔置二等者亦有在四等朕拔置三等者四等果屬不堪著令黜革三等以上者仍令其會試又吏部等衙門會議各省舉人吏部於每年四月十五日考試以知縣用並無去取亦無分職銜大小之處考試實屬具文應行停止俱照各省中式年分名次註冊挨次選用從之又吏部奏各省舉人就中書者人多缺少此内有願就知縣教職之人聽其具呈改注仍以科分名次序選八旗教習期滿以知縣用亦照舉人例停其考試照咨送年滿日期注冊與舉人較年月先後序選漢軍舉人無銓用之處今酌議於舉人班次内每選過三班後選漢軍舉人一人從之定開列試差人員各省正副主考除應行開列外將侍郎學士京堂翰林科道部屬等官由進士舉人出身者無論己未典試通行開列又奉諭㫖今科鄉場曾令宗室考試宗室朕數加恩何患無官嗣後停其考試又准冒籍自首免罪除入籍二十年以上進學者照例不議外凡在京冒籍舉人貢監生員以部文到日為始限兩月内具呈自首禮部查明改歸原籍肄業如過期不准行仍照例黜革其出結等官亦於兩月内檢舉過限者仍照定例處分嗣後凡有假冒籍貫品行不端者或被告發或被紏㕘查審明確即行黜革仍交刑部又定中式舉人有冒籍者處分送考官宛大兩縣審音不詳亦如之康熙四十年改粤西冒籍舉人著歸原籍六十年議直𨽻冒籍進士舉人准其自首又議冒保定等衛籍者治罪又議令直𨽻中式舉人取具同鄉京官印結雍正六年議准外省貢監赴京闈者取具本籍地隣甘結加地方官印結十一年定滿洲漢軍朦混考試之禁乾隆三年議准包衣人員有投充庄頭子弟𨽻内務府管轄編入上三旗者又有舊漢人在内管領下及五旗王公所屬包衣旗鼓佐領内者此等原係漢人因由滿洲都統咨送每有在滿額内中式者悉行改正并飭嚴行禁止又奉諭㫖考取舉人進士特為得人耳若或行賄夤緣而得之則出身之本源不清而欲冀他日之為忠臣良吏得乎今朕意欲凡係大臣子弟另編字號令其於此中較閲自必選擇其文之優劣大臣子弟既得選中又不致妨孤寒之路經九卿議覆嗣後直𨽻各省鄉試在京三品以上及大小京堂翰林科道吏禮二部司官在外督撫提鎮及藩臬等官子弟俱編入官字號另入號房考試各照定額每十卷民卷中取九卷官卷中取一卷不必分經其副榜亦照此算取若各省鄉試官員子弟或止數人者不必另編官字號雲南四川貴州廣西四省在監鄉試亦編入南監内俱一體分别編官字號照額取中㑹試滿合字號南北字號亦編官字號每二十卷取一卷雲南等四省中額仍照現例行不另編官字號各項監生有願在監入塲者俱由國子監録取責令祭酒等力行考課之法考課不缺者准其入塲照例分别南北官民卷其願在本地鄉試者與監生一體分别官民卷取中從之旋停止會試官卷雍正元年覆准官卷内佳文不敷中額以民卷佳者補之七年議准有本係官卷而已經出繼者不准編入官號十三年議准貴州編設官號如例四十年禮部奏順天鄉試副榜額中二十六名請分定直𨽻生員貝字號内中十六名南北監皿字號内各中五名從之四十一年增浙江省鄉試中額十二名照江南例共八十三名並增同考官三員從巡撫趙申喬請也又增湖廣省鄉試中額十三名從總督郭琇請也又增順天鄉試中額八旗滿洲蒙古三名漢軍一名順天等八府十名國子監貢監生八名奉天一名宣化一名從順天府尹錢晉錫請也又江蘓巡撫宋犖疏言江南文闈同考官舊例用十二員今酌增四員以重衡文之典從之又定鄉㑹五經中式例先是順治二年以士子博雅不在多篇停五經中式至康熙三十六年京闈鄉試有五經二卷特㫖授為舉人後不為例至是禮部議本年鄉試監生莊令輿俞長䇿試卷作五經文字與例不合奉諭㫖五經文字若俱浮泛不切自不當取中若能切題㫖文理明順一日書寫二萬餘字實為難得莊令輿俞長策俱著授為舉人准其㑹試嗣後作五經文字不必禁止作何定例著九卿詹事科道議奏尋議嗣後鄉會試作五經文字者應於額外取中三名若佳卷果多另行題明酌奪五經文字草稿不全免其貼出二塲於論表判外添詔誥各一道頭塲備多頁長卷有願作五經者許本生禀明給發從之五十年增五經中額順天二名外省一名㑹試增中三名五十六年停止雍正二年議准每額中十九名加中五經一名四十三年禮部議覆提督湖廣學政潘宗洛疏言湖廣各府州縣熟苗中有通文藝者准與漢民一體應試應如所請從之四十四年奉諭㫖内廷供奉諸翰林雖皆善書但朕勤心典籍卷帙繁多見供奉人員繕寫不給爾等出示𫝊諭安徽江蘇浙江舉貢生監等有精於書法願赴内廷抄寫者報名考試旋考試浙江舉貢生等詩字以顧祖雍顧寧逺二人記名考試蘇州舉貢生等詩字以汪泰來等五十三人記名考試江寧舉貢生等詩字以錢榮等五人記名嗣奉諭㫖南巡考取貢監生生員准其一體順天鄉試至五十三年准太醫院及各館應舉生監亦俱准録送鄉試雍正元年覆准候補天文生及補用天文生之監生生員俱令入皿字號鄉試又兵部議覆兩廣總督于成龍疏言土司子弟中有讀書能文者注入民籍一同考試從之五十年增各省鄉試中額先是順治十七年奏減直省鄉試中額之半嗣後屢有加增至是上以各省讀書士子日盛鄉試中額酌令加增加順天生員貝字號十八名南北監生皿字號十三名滿洲䝉古四名漢軍二名江南浙江湖廣各十六名福建十四名江西十五名山東河南各十二名山西陜西各十名廣東四川各十一名廣西八名雲南九名貴州六名其副榜分經取中之處俱照名數計算永為定例至康熙五十八年江西解額著照浙江湖廣例取中又寛鄉㑹試發榜期限先是順治二年定闈中閲卷限程自分卷以至掲曉約可半月至是年順天鄉試發榜過期為監試御史㕘奏得㫖直𨽻各省生員舉人增額既多赴試者較前倍衆考試官不能細心徧閲草率録取以致遺失佳卷此皆因出榜之期太近故耳如出榜多展數日則考試官得以詳閲試卷不致有遺珠之嘆下九卿議奏尋議嗣後會試掲曉寛於三月十五日内鄉試掲曉大省寛於九月十五日内中省寛於九月初十日内小省寛於九月初五日内直𨽻江南浙江鄉試人數倍於他省照會試例加用房考二員限期既寛主考官閱房考官之薦卷外餘卷亦令徧閲庶不致遺失佳卷從之五十一年量增雲貴廣西㑹試中額各一名其江浙人士冒北籍者准其自首奉諭㫖趙申喬題請雲南貴州廣西三省中額量增數名今覆試中式進士可令趙申喬將所取三省備卷舉人亦帶來考試邇來浙江江南人冒直𨽻等處北籍及代人考試者甚多十三省語音朕悉通曉觀人察言即可識辨著出示徧曉中式進士等其中有冒籍替代等項俱赴部自首覆試之日朕前亦許面奏倘隠蔽不發朕一查出悔之無及又奉諭㫖今嵗考取進士額數無多止一百六十一人揀拔庶吉士者不過四五十人其餘俱挨次選授知縣縣令與民切近有刑名錢榖之責未登仕以前如不知事宜典禮則登仕之後於地方民生事務無有禆益今嵗考中進士除揀選庶吉士外其餘勿使回籍俱交與禮部選翰林内學優品端者數人派令教習文藝從事典禮如有修書處率同修書又考中武進士皆以㕘將遊擊守備等項員缺補用此等俱有約束兵丁整飭營伍之責未補官以前不可不先令其學習嗣後考取武進士亦著勿回原籍見在年滿千總皆分撥八旗武進士等亦著分撥八旗隨圍學習行走又禮部奏直𨽻各省舉人貢監生員李長庚等呈稱康熙五十二年恭遇皇上六旬萬夀普天胥慶率土同歡恭請特開萬夀鄉㑹科以彰千載一時之盛應如所請照順治丙戌科特行鄉試丁亥科特行㑹試例於二月内舉行鄉試八月内舉行㑹試以愜輿情以彰盛典得㫖造就人材實為美事著如所議行又奉諭㫖近見直𨽻各省考取進士額數或一省偏多一省偏少皆因南北卷中未經分别省分故取中人數甚屬不均今文教廣敷士子俱鼓勵勤學各省赴試之人倍多於昔貧士自逺方跋涉赴試至京每限於額多至遺漏朕深為軫念自今以後考取進士額數不必預定俟天下會試之人齊集京師著該部將各省應試到部舉人實數及八旗滿洲䝉古漢軍應考人數一併查明預行奏聞朕計省之大小人之多寡按省酌定取中進士額數考取之時就本省卷内擇其佳者照所定之數取中五十二年奉諭㫖主試之人衡文取士必當除去偏見拔選佳文若以偏見閲文則人心不服上科京闈鄉試雖無交通賄賂之弊而所中之卷不佳且有少年稚子僥倖入彀即題目應出各種乃得佳文今嵗京闈鄉試所出七題皆係理致士子偶有一二語合主司意者遂獲登録其同考官選文薦閲又皆揣摩主司之意塲中士子未能各展其長而實學之人多擯不録者職是故也又吏部議覆内閣中書奉㫖用進士出身之人嗣後滿中書缺出應論旗分於進士内挨次擬用如無進士將舉人挨次擬用漢中書缺出用留京教習進士其從前進士舉人候選中書者停其選授改歸知縣教職等項用其候選中書不由進士舉人出身者對品改選以鑾儀衛經歴詹事府主簿等缺用從之又殿試讀卷官大學士等遵例以試卷十本進呈上閲至第二卷曰此卷必係南省人命拆視之果然上一一閲卷畢諭大學士等曰爾等大臣多係進士出身深知文字凡文章書法各有所習一覽可知朕適閲第二卷未及拆封早知為南省人昭然不爽聞來京應試之人將伊等所作文字各處投送其應開考試官悉令過目以博已之聲名以求人之採取爾等場中閲卷當一秉虚公畧無私意始稱厥職至五經四書俱係聖賢之言考試出題専意取冠冕者則題目漸少士子易於揣摩甚有將不出題之書刪而不讀尚得言學問乎經書内有不可出之題試官自然不出其餘出題之處須以各種題目試之則懐才實學之士自無遺棄矣又奉諭㫖文武考試雖曰兩途俱係遴拔人才而習文之内亦有學習武畧善於騎射者習武之内亦有通曉制義學問優長者如或拘於成例以文武兩途不令通融應試則不能各展所長必至遺漏真才嗣後文生員舉人内願就武塲武生員舉人内願就文塲應各聽其考試中式者造入新冊不中式者仍各入文武原冊不准再考五十三年奉諭㫖教官有教養士子之責員缺甚屬𦂳要嗣後掣選教官者應取至京師令大臣面試方可補授其補授州同亦應取至京師令九卿面試補用有出身不明者著革退嗣於康熙五十七年諭教官不必來京惟令督撫考試可用者補用年老不堪者罷之又九卿議中式舉人俱到府丞衙門填寫親供與試卷一同送部磨勘如逾限不即送部禮部題㕘照例議處從之五十四年勅科場毋出熟習擬題令同考官互相紏察并停止五經中式先是康熙五十二年以近科鄉會試多擇取冠冕吉祥語出題每多宿搆倖獲降㫖申飭兹復奉諭㫖科場出題闗係𦂳要鄉會經書題目不拘忌諱斷不可出熟習常擬之題朕常講易及修定天文律吕算法諸書爾等考試官斷不可以此諸書出題表題亦不可出修書賜書等類不然則人皆可擬題倖進實學何由而得再房考亦屬𦂳要若房官有弊主考亦無如之何今可將一房卷令不同省房官二人同閲如一人有情弊發覺後二人並坐則各知畏懼互相紏察再五經中式甚屬無益十七八嵗之㓜穉皆能之不過手敏多寫字耳殊無實學著停止雍正元年覆准考官若仍出熟習擬題交與該部議處是年賜内廷行走舉人梅瑴成一體殿試五十六年禮部奏請順天鄉試正副考官及同考官將九卿舉出官員職名開列奉諭㫖棘闈弊端甚多此畨房考官即在所開正副考官内每房派二員其各省人著㕘雜派出每房所派二人不得派同省之人五十七年吏部奏貢監赴臣部考職者應交與九卿公同考試如有試卷與親供筆跡不同者察出從重治罪從之又奉諭㫖考試月官令作八股時文大都抄録舊文茍且塞責嗣後不必作八股時文止令寫履歴以三百字為限觀其書法妍醜文理工拙則人之優絀自可立見矣五十八年禮部議覆江西巡撫白潢疏言江西鄉試入場士子多至一萬二千餘人而中額比浙江湖廣少九名請照浙江湖廣額數取中九十九名應如所請從之六十年奉諭㫖此畨應試之人有學問優長不得中式以致抱屈者朕亦無從而知即有人奏聞亦難深信如舉人王蘭生學問南人中或有勝彼者若直𨽻人則未能及之前周易折中性理精義朱子全書魏廷珍王蘭生等在朕前晝夜校對五年不遺一字讀書人少全讀性理者王蘭生甚為精熟學問亦優屢試未中或文章不佳抑别有故耶再滿洲舉人留保學問好滿洲蒙古漢軍中罕有及者即翰林中諒如彼者亦少此在朕前行走之人朕深知之非屬偏向也王蘭生留保俱賜進士一體殿試皇朝文獻通考卷四十八
