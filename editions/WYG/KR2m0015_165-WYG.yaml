二管低工字和之或以第五管低凡字為主而以第一管髙上字和之吹低六字則以第十四管低六字為主而以第十二管髙尺字和之吹髙六字第十三管獨用吹低五字則以第四管低五字為主而以第十一管髙工字和之吹髙五字第八管獨用吹低乙字則以第三管低乙字為主而以第五管低凡字和之吹髙乙字則以第三管低乙字為主而以第十管髙凡字和之或以第十六管低乙字為主而以第十七管髙凡字和之第十六同第三第十七同第十故今亦不用名曰啞乙吹低上字則以第二管低上字為主而以第十四管低六字和之吹髙上字則第一管獨用或亦以第二管低上字為主而以第十三管髙六字和之吹勾字第九管獨用今樂譜無此音故亦不用管皆用紫竹匏身嘴頸皆用黒漆戧金雲龍垂五綵流蘇為餙小笙之制如大笙而小四管無簧故止十三簧以黄鍾八分積之一為體徑一分三釐七毫第一管長三寸九分四釐二毫本管無射應鍾相併之分第二管長五寸三分九釐二毫本管倍仲吕之分第三管長六寸八分二釐六毫本管倍大吕之分第四管長八寸三分六釐四毫本管倍南吕倍無射相併之分第五管長一寸零九分三釐五毫本管三倍黄鍾之分依次参差至十七管與第二管等自簧口而上按本管律吕之分於管之裏面開出音孔管端開氣孔第三管第四管在管裏面餘俱在管外面其無簧之四管亦不開氣孔匏之大小稱式匏腰安短嘴短嘴末安長嘴抑或即就短嘴吹之第一管無簧第二管於出音孔之次為第七為本管倍夷南之分為低上字第三管於出音孔之次為第六為本管倍蕤林之分為低乙字第四管於出音孔之次為第五為本管倍姑仲之分為低五字第五管於出音孔之次為第三為本管倍黄大之分為低凡字第六管於出音孔之次為第八亦本管倍夷南之分較之第二管簧少硬為髙上字第七管於出音孔之次為第二為本管四倍無應之分為低工字第八管於出音孔之次為第十三為本管蕤林之分為髙五字第九管無簧第十管於出音孔之次為第十一為本管太夾之分為髙凡字第十一管於出音孔之次為第十為本管黄大之分為髙工字第十二管於出音孔之次為第九為本管倍無應之分為髙尺字第十三管於出音孔之次為第十二為本管姑仲之分為髙六字第十四管於出音孔之次為第四為本管倍太夾之分為低六字第十五管於出音孔之次為第一為本管四倍夷南之分為低尺字第十六管十七管無簧無簧之管備體制而不用餘十三管各取其相和相應者合而成音如吹低尺字則以第十五管低尺字為主而以第四管低五字和之或以第十二管髙尺字和之吹髙尺字則以第十二管髙尺字為主而以第八管髙五字和之吹低工字則以第七管低工字為主而以第三管低乙字和之吹髙工字第十一管獨用或第十一管第七管第三管同用吹低凡字則以第五管低凡字為主而以第二管低上字和之吹髙凡字第十管獨用或以第五管低凡字為主而以第六管髙上字和之吹低六字則以第十四管低六字為主而以第十二管髙尺字和之吹髙六字第十三管獨用吹低五字則以第四管低五字為主而以第十一管髙工字和之吹髙五字第八管獨用或第八管第四管第十一管同用吹低乙字第三管獨用吹髙乙字則以第三管低乙字為主而以第十管髙凡字和之吹低上字則以第二管低上字為主而以第十三管髙六字和之吹髙上字則以第六管髙上字為主而以第十三管髙六字和之體餙並與大笙同笙之制經無明文漢魏諸儒皆云十三簧晉郭璞乃曰大笙十九簧小笙十三簧宋書則曰十九簧至十三簧唐南蠻笙有十六簧宋陳暘始言宋大樂笙並十七簧舊外設二管謂之義管又言唐樂圖所傳有十七管笙十二管笙後周鄭譯獻十六管笙李照作二十四管笙蜀孟進三十六管笙而宋史乃曰巢笙十九簧和笙十三簧皆用十九數十三簧者曰閏餘匏九簧者曰九星匏七簧者曰七星匏元史與宋史同明㑹典笙十七管律吕精義疑十九簧者名竽又名巢十三簧者名笙又名和而謂十七管者為隋以來俗樂之誤大抵古人制器必當於理而適於用然後可以達天下而垂萬世不然則雖一人作之一時用之而尺下萬世勿從也今觀笙制諸説雖有不同而小笙十三簧則未之有異其為古制無疑矣然今小笙十三簧實亦十七管獨四管無簧耳大笙十七管而四管不用實亦十三簧耳或漢魏以前據其實用而指為十三或自晉以後取其美觀而増為十九歟非可以臆定也明制十七管信而有徴精義乃執郭璞十九簧之説以為上下相生不可増減信斯言也則竽之三十六簧和之十三簧又何説耶且所貴乎樂器者以聲藉此而成也苟能成聲欲減不能苟聲不成雖増無用今之大笙十七簧而止用十三簧者以聲止十三而無十七也其管之必以十七者則所謂参差象鳯翼者也假使將大笙之最長者加二管而為十九或將小笙之無簧者去四管而為十三未為不可但管多則匏過大管少則匏過小無當於理而不適於用又何必改作為耶至笙管圓徑之大小出音孔分之長短乃聲音髙下之所由生然自古無言之者工人約畧為之而無一定之制上編黄鍾加分減分同形管既按積以審音下編又按分以制器誠極聲音之妙理而萬世莫能易矣今大笙小笙作全圖於前而各列孔分管次於後又依匏面作圖按序列十七孔各註律名及出音孔次於其外而註工尺聲字於其中其一管自為一字者本孔分之聲也其兩管或三管合為一字而以線連之者相和相應之聲也蓋笙管細而聲清必合兩管三管吹之始與人聲他器相協下編謂以本聲立宫而徴聲和之者為首音與五音相和正聲為主而清聲和之者為兩聲子母相應可謂一言以蔽之矣然用之亦有少變者如大笙十三管獨用則髙工字笙之十一管也乂或以十一管合三管為髙工字則較之獨用者聲㣲大而仍髙於低工亦為工與乙和十四管獨用為髙凡字笙之十七管也然其聲太髙或以十七管合二管為髙凡字又或以五管合一管為髙凡字亦為凡與髙上和八管合十五管為低乙字笙之三管與十管也或又以此為髙乙字而以三管合五管為低乙字亦為乙與凡和九管合十六管為低上字笙之二管與十三管也十管獨用為髙上字笙之第一管也然其聲亦太髙或以低上字為髙上字而以二管合十四管為低上字亦為上與低六和小管十管獨用為髙工字笙之十一管也然其聲甚小又或以十一管合低工字為髙工字亦與子與母和十一管獨用為髙凡字笙之第十管也然其聲亦小或又以五管合六管為髙凡字亦為凡與上和十三管獨用為髙五字笙之第八管也然其聲亦小或又以八管合低五字為髙五字亦為子與母和六管合十一管為低乙字笙之三管與十管也然無髙乙字或即以此為髙乙字而以三管獨用為低乙字此其取用雖畧有不同而其相和取聲之理則一也大笙出音孔之次始倍黄鍾大吕終無射應鍾小笙出音孔之次始四倍夷則南吕終蕤賔林鍾並始低尺字終髙五字其所謂黄鍾大吕云者乃據本管之分而言也其所謂工尺云者乃以笛之聲字而言也設簧而髙四音若以簧之髙應律之低則為下三音簧口與出音孔相為首尾氣孔與出音孔相為消息按氣孔則氣從出音孔徃來鼔簧成音不按則氣洩而無音其氣孔在内者祗取便於自内按之非别有取義鄭世子以為内外連闕惟雅俗之辨鑿也其列管之次與出音孔之次不同故有管短而孔髙管長而孔下者管之長短雖無闗於樂音而要必稱其體式通卦騐謂竽長四尺二寸風俗通謂笙長四寸雖参差象鳯翼或各據一長一短而言然未免大相懸逺今各取律吕之分以合體式之宜庻所謂制器尚象者乎若夫代匏以木則木亦匏矣笙之音以簧不以匏列管匏中取其能納氣以鼔簧耳今以匏為笙其聲固為清越但其質不堅不能經乆故以木代之而與匏音亦無甚差别昔人或以今笙非真匏音或謂不如代匏為妙皆拘迂之見也至謂代匏者必刻木為匏形不作匏形而作長底則於俗笙無異是尤於義無取而不足道矣皇朝文獻通考卷一百六十五
