body:
  text: 樂考十一樂器五匏之屬笙律吕正義曰笙於古為匏器其制攅衆管於一匏而共一吹口每管設簧以取音簧者於管側貼以薄銅葉氣至則鼔動成音開出音孔以别長短之度而音之髙下以生復設孔於匏外按某孔則某簧應故詩曰吹笙鼔簧近世易匏以木各管但以竹徑相倣者通其節約略其長短而無一定之制至於簧數之多寡則傳注所記其説不一今禮部太常所用俱十七管有全用者有空二管或三管不設簧而用十五管或十四管者俗部所用亦十七管或十五管而止用十三管其餘皆不設簧蓋去其重複但取一均之聲以備用也又禮部太常所用笙體大而空徑亦大其出音孔至簧度分反短俗部所用笙體小而空徑亦小其出音孔至簧度分反長蓋因取聲於容積之分故徑與長相為盈縮焉按十七簧大笙徑約二分上下每一笙之内各管空徑不一其自簧口至出音孔分最長第一管七寸五分餘二管七寸餘三管亦七寸餘視二管㣲歉四管六寸五分餘五管六寸餘六管五寸二分餘七管四寸五分餘八管四寸二分餘九管十管十一管皆四寸上下十二管三寸八分餘十三管三寸六分餘十四管三寸三分㣲歉十五管三寸二分餘此兩管亦相同十六管三寸餘十七管二寸六分餘此皆工人約畧為之初未有一定之真度也審其音最長一管應笛之尺字二管應最低工字三管應低工字四管應低凡字五管應低六字六管應低五字七管應最低乙字八管應低乙字九管應低上字十管應髙上字十一管應上字尺字之間為勾字十二管應髙尺字十三管應髙工字十四管應髙凡字十六管應髙六字十七管應髙五字此髙低字音皆以體之倍半而言非清濁二均之分其取聲之法一管合六管或一管合十二管為低尺字二管合七管為最低工字太常樂工省此二管不用故止十五簧三管合八管為低工字四管合九管為低凡字五管合十二管為低六字六管合十三管為低五字七管合十四管為最低乙字太常樂工亦多不用八管合十五管為低乙字九管合十六管為低上字十管獨用為髙上字十一管獨用為勾字十二管合十七管為髙尺字十三管獨用為髙工字十四管獨用為髙凡字十六管獨用為髙六字十七管獨用為髙五字此十七簧大笙立體取音之大槩也十三簧小笙徑約一分有餘每一笙之内各管徑亦不一其自簧口至出音孔分最長第一管八寸餘二管七寸餘三管六寸五分餘四管六寸餘五管五寸五分餘六管五寸餘七管四寸五分餘八管四寸五分不足九管四寸餘十管三寸五分餘十一管三寸三分餘十二管三寸餘十三管三寸不足審其音一管低尺字二管低工字三管低凡字四管低六字五管低五字六管低乙字七管低上字八管髙上字九管髙尺字十管髙工字十一管髙凡字十二管髙六字十三管髙五字其取聲之法一管合五管或合九管為低尺字二管合六管為低工字三管合七管為低凡字四管合九管為低六字五管合十管為低五字六管合十一管為低乙字七管合十二管為低上字八管合十二管為髙上字九管合十三管為髙尺字十管獨用為髙工字十一管獨用為髙凡字十二管獨用為髙六字十三管獨用為髙五字此十三簧小笙立體取音之大槩也大笙之十五簧於十七簧已為減二而小笙又少勾字凡字二簧蓋勾為低尺可以相代而凡字重出嫌其易淆故復減耳其一笙之内管體長者設簧亦大管體短者設簧亦小易其簧而更施之則或咽或掲皆不成聲至於簧之硬者應聲㣲髙㸃以蠟珠則可少下簧之輭者應聲㣲低不施蠟珠或易以硬簧則可以髙然所差不過半音未若管體長短之分音晰也今欲明製笙之法辨笙之體詳笙之用必一其徑覈其積考其度正其音一一本之於律吕而後笙之理數可明焉一其徑者使一笙各管之空徑皆同如十二律吕之同徑也覈其積者定衆管之積或用律吕之全或用律吕之半或用律吕㡬分之一也考其度者察某管得某律吕相和之分或得某律吕相和之倍某律吕相和之半也正其音者詳某管之應某律吕某聲字與某管設簧則應某律吕某聲字也蓋笙之大小雖殊而為用則一大笙之空徑二分上下者乃黄鍾八分之一又加此一分之四分之三之管徑也以通分約之乃黄鍾三十二分之七小笙之空徑一分有餘者乃黄鍾八分之一之管徑也其管之長者用本體律吕之倍管之短者用本體律吕之正或本體律吕之半其半管比正管每下一音亦如律吕之正與倍半之理也其相和取聲無論體之大小管之多寡要皆以本聲立宫而徴聲和之或以正聲為主而少聲和之取二聲相濟抑揚中聴也其兩管同一聲字而相和者乃宫與少宫商與少商工與髙工凡與髙凡為兩聲子母相應者也其兩管不同聲字而相和者乃宫與徴商與羽工與乙凡與上之類是兩聲得其相生之序而相和者也若夫兩管之斷不可和者如宫與商商與角工與凡凡與六之類是兩聲相比必甚乖謬而不可和者也是故笙之低尺字以低五字和之者乃濁變徴立宫而宫聲為徴以和之也低尺字以髙尺字和之者即倍變徴以正變徴和之也低工字以低乙字和之者乃下徴立宫而商聲為徴以和之也低凡字以低上字和之者乃下羽立宫而角聲為徴以和之也低六字以髙尺字和之者乃倍變宫立宫而正變徴為徴以和之也低五字以髙工字和之者乃宫聲立宫正用徴聲以和之者也低乙字以髙凡字和之者乃商聲立宫而羽聲為徴以和之也低上字以髙六字和之者乃角聲立宫而少變宫為徴以和之也髙上字仍以髙六字和之者亦角聲立宫而少變宫為徴以和之也髙尺字以髙五字和之者乃少變徴立宫而少宫為徴以和之也髙聲與低聲相和者乃首音與第八音相和所謂隔八相生也徴之可以和宫者所謂宫生徴也羽之可以和商者所謂商生羽也若夫商之可以和徴者又為徴之生少商皆為首音與第五音相和者也蓋各管之徑既同則聲字之度分可定聲字之度分既定則各管之相旋為用自有協和之妙焉夫簫笛之體起於黄鍾之加倍而笙之體則起於黄鍾之減分加倍者或加八倍或加四倍其所制之管皆與黄鍾一均之聲相應減分者或用黄鍾四分之一或用黄鍾八分之一所制之管亦皆與黄鍾一均之聲相應若應大吕一均者大笙則取黄鍾八分之一又加此一分之四分之二之管為本即三十二分之六小笙則取黄鍾六十四分之七之管為本或不易其體但用㸃簧之法以髙其音亦可備陰吕一均之用然其聲雖協於大吕而其數並起於黄鍾此黄鍾所以尤為竹音之本也十七簧大笙以黄鍾八分之一又加此一分之四分之三之管為本其十七管之徑皆一分六釐五毫其黄鍾之分四寸三分九釐二毫大吕之分四寸一分一釐三毫太蔟之分三寸九分零四毫夾鍾之分三寸六分五釐六毫姑洗之分三寸四分七釐仲吕之分三寸二分五釐蕤賔之分三寸零八釐四毫林鍾之分二寸九分二釐八毫夷則之分二寸七分四釐二毫南吕之分二寸六分零二毫無射之分二寸四分三釐七毫應鍾之分二寸三分一釐三毫此黄鍾八分之一又加此一分之四分之三之管聲應無射之律羽聲上字於笛為凡字設簧則應姑洗之律角聲六字於笛為上字以之和大吕之分得四寸二分五釐二毫仍應姑洗之律角聲六字乃此笙第九管低上字之分也長於此者用倍數而短於此者用正數矣其第九管低上字之分倍之得八寸五分零四毫乃應蕤賔之律變徴五字而為此笙之最長第一管低尺字之分焉太簇夾鍾相和之分三寸七分八釐聲應蕤賔之律變徴五字為第十二管髙尺字之分倍之得七寸五分六釐乃應夷則之律徴聲乙字為第三管低工字之分焉姑洗仲吕相和之分三寸三分六釐聲應夷則之律徴聲乙字為第十三管髙工字之分倍之得六寸七分二釐乃應無射之律羽聲上字為第四管低几字之分焉蕤賔林鍾相和之分三寸零六毫聲應無射之律羽聲上字為第十五管髙凡字之分倍之得六寸零一釐二毫乃應半黄鍾之律變宫尺字為第五管低六字之分焉夷則南吕相和之分二寸六分七釐二毫聲應半黄鍾之律變宫尺字為第十六管髙六字之分倍之得五寸三分四釐四毫乃應黄鍾之律宫聲工字為第六管低五字之分焉無射應鍾相和之分二寸三分七釐五毫聲應黄鍾之律宫聲工字為第十七管髙五字之分倍之得四寸七分五釐乃應太蔟之律商聲凡字為第八管低乙字之分焉其第二管之最低工字即第三管之分其第七管之最低乙字亦即第八管之分不過㣲長分餘或簧少輭使之聲字稍下而已其十管之髙上字仍如九管之分但九管以下至最長第一管設簧皆長而輭十管以上至最短第十七管設簧皆㣲短而硬是以九管因簧長而聲低為低上字十管因簧短而聲髙為髙上字此又管體一而因簧以别髙下者也若夫第十一管之勾字則取上字與尺字之間為度第十四管之髙凡字亦與十五管髙凡字之分同不過㣲長少低以配八管之乙字相和而取聲耳至於十五簧比十七簧減兩管者二管之最低工字七管之最低乙字嫌其與三管工字八管乙字相淆故不用獨留十四管之凡字以和十管之髙上字為髙凡字即四管凡字和九管上字之理也十七簧十五簧其聲字度分本出一體但用管有多寡之分爾雅大笙謂之巢注大笙十九簧此十七簧十五簧蓋倣十九簧之制者也十三簧小笙以黄鍾八分之一之管為本徑皆一分三釐七毫乃黄鍾徑之半其黄鍾之分三寸六分四釐五毫大吕之分三寸四分一釐三毫太蔟之分三寸二分四釐夾鍾之分三寸零三釐四毫姑洗之分三寸八分八釐仲吕之分二寸六分九釐六毫蕤賔之分二寸五分六釐林鍾之分二寸四分三釐夷則之分二寸二分七釐五毫南吕之分二寸一分六釐無射之分三寸零二釐二毫應鍾之分一寸九分二釐此黄鍾八分之一之管即應正黄鍾之音為低工字於笛為低五字設簧則應夷則之律徴聲乙字於笛為工字以之和大吕之分得三寸五分二釐九毫仍應夷則之律徴聲乙字乃此笙第十管髙工字之分也長於此者用倍數短於此者用正數矣其第十管髙工字之分倍之得七寸零五釐八毫乃應無射之律羽聲上字而為此笙第三管低凡字之分焉其太蔟夾鍾相和之分三寸一分三釐七毫聲應無射之律羽聲上字為第十一管髙凡字之分倍之得六寸二分七釐四毫乃應半黄鍾之律變宫尺字為第四管低六字之分焉姑洗仲吕相和之分二寸七分八釐八毫聲應半黄鍾之律變宫尺字為第十二管髙六字之分倍之得五寸五分七釐六毫乃應黄鍾之律宫聲工字為第五管低五字之分焉蕤賔林鍾相和之分二寸四分九釐五毫聲應黄鍾之律宫聲工字為十三管髙五字之分倍之得四寸九分九釐乃應太簇之律商聲凡字為第六管低乙字之分焉夷則南吕相和之分二寸二分一釐七毫聲應太簇之律商聲凡字於此笙為髙乙字之分因笙所用聲字止於髙五字故不用此分而倍之得四寸四分三釐五毫乃應姑洗之律角聲六字為第七管低上字之分焉第八管亦仍用此七管之分設以短簧髙其音為此笙之髙上字焉其無射應鍾相和之分一寸九分七釐一毫聲應姑洗之律角聲六字於此笙為髙上字之分今亦不用而倍之得三分九分四釐二毫乃應蕤賔之律變徴五字為第九管髙尺字之分焉至於最長之第一管復以第七管低上字之分倍之得八寸八分七釐聲應蕤賔之律變徴五字而為此笙之第一管低尺字之分焉第二管則以第九管髙尺字之分倍之得七寸八分八