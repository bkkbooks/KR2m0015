body:
  text: 欽定四庫全書皇朝文獻通考卷二百四十九封建考四同姓封爵四奉恩將軍顯祖系奉恩將軍訥爾特宜顯祖四世孫三等輔國将軍徳倫子康熙三十三年四月封五十六年五月卒無襲奉恩將軍古禄固顯祖四世孫原封多羅貝勒尚善子康熙八年正月封五十年四月卒延都古禄固子康熙三十九年四月封五十年四月襲封五十六年十二月卒登柱延都子康熙五十七年四月襲雍正十二年三月卒後無襲奉恩將軍鍾竒顯祖四世孫原封多羅貝勒尚善子康熙十八年正月封三十四年三月卒尤竒鍾竒子康熙三十四年四月襲雍正十年八月卒綬克尤竒子雍正十三年十二月襲乾隆十一年七月卒綬全綬克弟乾隆十一年十月襲二十三年四月卒珠蘭泰綬全弟乾隆二十三年七月襲三十四年八月卒靈嵩珠蘭泰子乾隆三十四年十二月襲星安靈嵩子乾隆五十一年十一月襲原封奉恩將軍逹里祜顯祖五世孫二等奉國將軍勒塞禮子康熙四十三年五月封五十三年十二月降襲雍正八年十月坐事削爵巴延布逹里祜子雍正三年十月封九年四月襲封乾隆十一年九月以疾罷爵海存巴延布子乾隆十一年十二月襲三十四年七月卒永登額海存子乾隆三十四年五月襲國祥永登額子乾隆五十年襲奉恩將軍逹里伯顯祖五世孫二等奉國將軍勒塞禮子康熙五十年十一月封雍正三年十月卒海誠逹里伯子雍正四年四月襲乾隆三十六年七月以疾罷恩特恒額海誠子乾隆三十六年九月襲三十七年八月卒圭達杭額恩特恒額弟乾隆三十七年十二月襲是年十二月卒無嗣奉恩將軍赫勒布顯祖五世孫二等奉國將軍勒塞禮子康熙四十七年四月封乾隆十八年七月卒巴啟納赫勒布子乾隆十八年十二月襲二十四年三月卒天師保巴啟納子乾隆二十四年七月襲常永天師保子乾隆五十一年襲奉恩將軍達里珠顯祖五世孫二等奉國將軍勒塞禮子康熙四十九年四月封乾隆三年四月以病罷爵成岱達里珠子雍正十三年閏四月封尋襲封乾隆二十二年九月以病罷爵清岱成岱子乾隆二十三年四月襲奉恩將軍長山顯祖五世孫二等奉國將軍勒塞禮子雍正三年十月封乾隆四年十月卒八十六長山子乾隆五年三月襲仙聰八十六子乾隆四十三年襲奉恩將軍崇揚赫顯祖五世孫三等奉國將軍徳塞禮子康熙二十五年十一月降襲乾隆元年十一月卒巴延徳崇揚赫子雍正三年十月封尋襲封乾隆四年十一月以病罷爵善志巴延徳子乾隆五年五月襲國住善志孫乾隆五十一年襲原封奉恩將軍卓善顯祖五世孫三等奉國將軍卓隨子康熙四十三年五月封雍正十二年九月以病罷爵保月卓善子雍正十二年十一月襲乾隆三十一年二月卒無襲奉恩將軍噶林顯祖五世孫三等奉國將軍白努宜子雍正二年九月降襲乾隆三年十月卒阿郎阿初名阿喇穆詹巴奉恩將軍卓善子雍正七年六月為叔父噶林後乾隆三年十月襲和濟匡鄂阿郎阿子乾隆三十四年襲奉恩將軍占泰顯祖五世孫三等奉國將軍哈爾薩子康熙十八年正月封乾隆十二年六月卒奉恩將軍納蘇圖顯祖五世孫三等奉國將軍蘇爾徳宜子康熙十七年正月封三十四年十二月卒康武利納蘇圖子康熙三十五年正月襲雍正二年正月卒後無襲奉恩將軍納拉泰顯祖五世孫三等奉國將軍蘇爾徳宜子康熙十七年六月封十九年八月卒無襲奉恩將軍天祥顯祖五世孫三等奉國將軍錫立渾子康熙二十五年正月封五十八年五月卒霄格天祥子康熙五十八年九月襲乾隆十年十一月卒慶善霄格子乾隆十一年三月襲四十三年以疾罷咸寧慶善子乾隆四十三年襲奉恩將軍善海顯祖五世孫三等奉國將軍滿珠錫禮子乾隆三年三月降襲二十五年六月卒奉恩將軍鄂洛順顯祖五世孫三等奉國將軍塞爾赫子雍正十二年四月封乾隆三十三年正月卒徳音泰鄂洛順子三十五年五月襲奉恩將軍常山保顯祖五世孫三等奉國將軍瑪勇子雍正十二年十月降襲乾隆三十六年正月卒承世常山保子三十六年六月襲奉恩將軍錫通額顯祖五世孫三等奉國將軍席布子乾隆元年二月降襲十年十一月卒慶阿泰錫通額弟乾隆十一年二月襲乾隆三十七年六月縁事削爵奉恩將軍巴進泰顯祖五世孫三等奉國將軍敬徳子康熙三十四年三月封雍正七年四月以病罷爵増誠巴進泰子雍正七年四月襲乾隆三十五年七月卒徳良阿増誠子乾隆三十五年十一月襲奉恩將軍琳康顯祖五世孫三等奉國將軍永占子康熙三十三年閏五月降襲乾隆二十四年十二月卒奉恩將軍琳安顯祖五世孫三等奉國將軍永占子雍正三年十月封乾隆十二年五月卒碩安琳安子乾隆十二年二月襲二十五年五月卒福増禄碩安子乾隆二十五年十二月襲奉恩將軍安圖顯祖五世孫輔國公法塞子康熙四十二年正月封雍正四年十月卒阿爾寧安圖子雍正五年三月襲乾隆十七年五月卒恒霖阿爾寧子乾隆十七年十二月襲五十一年十一月卒未襲奉恩將軍徳有顯祖五世孫三等奉國將軍阿爾蘇子雍正十一年十二月降襲乾隆十五年五月卒靈通徳有子乾隆十五年十二月襲四十二年五月卒子恒科襲奉恩將軍舒禄渾顯祖五世孫奉恩將軍古禄固子康熙二十六年正月封三十二年十一月卒無襲奉恩將軍履順顯祖五世孫奉恩將軍古禄固子康熙三十九年四月封乾隆十七年五月卒登久履順子乾隆十七年十二月襲二十八年正月卒海寧阿登久子乾隆二十八年五月襲奉恩將軍齊世就顯祖五世孫奉恩將軍古禄固子雍正六年八月封八年十一月卒無襲奉恩將軍履徳顯祖五世孫奉恩將軍古禄固子雍正七年八月封乾隆十三年八月卒徳忒赫履徳子乾隆十三年十二月襲四十一年五月卒五訥璽徳忒赫子乾隆四十一年十二月襲奉恩將軍徳全顯祖五世孫和碩簡親王福存子康熙四十七年五月封五十二年正月卒無襲奉恩將軍徳延顯祖五世孫和碩簡親王福存子康熙五十年十一月封五十三年二月卒無襲奉恩將軍徳克精額顯祖六世孫奉恩將軍占泰子雍正四年八月封乾隆三十三年二月卒敏俊徳克精額姪孫東科諾子松齡孫三十三年九月襲奉恩將軍薩穆達顯祖六世孫奉恩將軍善海子乾隆二十一年二月封二十八年六月卒素松額薩穆達子乾隆二十八年十月襲原封奉恩將軍武興顯祖六世孫奉恩將軍琳康子雍正十三年閏四月封乾隆二十年十二月以病罷爵果爾明阿武興子乾隆二十年十二月襲三十四年十二月以疾罷爵禄哈布禮果爾明阿子乾隆三十四年十二月襲賽炳額禄哈布禮子乾隆四十五年襲奉恩將軍恩特赫黙顯祖六世孫二等奉國將軍索斐子康熙三十七年七月降襲雍正四年四月卒色克恩特赫黙子雍正四年八月襲乾隆三十六年三月以病罷爵徳茂色克子乾隆三十六年四月襲四十九年十一月卒無襲奉恩將軍富清顯祖六世孫二等奉國將軍索斐子康熙四十二年六月封雍正六年九月卒子福康襲乾隆八年三月卒無襲奉恩將軍綬海顯祖六世孫二等奉國將軍索斐子康熙五十年十一月封乾隆八年六月卒多齡阿綬海子乾隆二十年十一月襲奉恩將軍多福顯祖六世孫三等奉國將軍鄂岳子康熙四十九年五月封五十五年三月坐事削爵乾隆二年九月降襲十一年十二月卒後無襲奉恩將軍五十九顯祖六世孫三等奉國將軍阿哈尼子雍正三年三月降襲乾隆二十三年以病罷爵和隆鄂五十九子乾隆二十四年十月襲奉恩將軍熙成顯祖六世孫三等奉國將軍塞赫禮子雍正十二年六月降襲乾隆十八年三月以病罷爵成翰熙成子乾隆十八年五月襲四十一年三月以病罷爵敏愷成翰子乾隆四十一年五月襲奉恩將軍祥彦顯祖六世孫三等奉國將軍漢章阿子乾隆二十九年七月降襲原封奉恩將軍威範顯祖六世孫三等奉國將軍揚岱子康熙十七年十月降襲四十三年十月以才力不及爵除奉恩將軍瑪富塔顯祖六世孫三等奉國將軍拜塞子康熙三十三年二月降襲五十四年四月卒後無襲奉恩將軍徳綸泰顯祖六世孫三等奉國將軍理盛恪子康熙五十一年十一月降襲雍正六年二月卒奉恩將軍牟尼保顯祖六世孫三等奉國將軍武格子雍正九年十二月降襲乾隆十八年三月卒舒爾金牟尼保子乾隆十八年十二月襲三十七年二月卒亷敏舒爾金子乾隆三十七年十月襲原封奉恩將軍登博顯祖六世孫奉恩將軍履順子雍正六年八月封十二年二月坐事削爵原封奉恩將軍綬祐顯祖六世孫奉恩將軍尤竒子雍正六年八月封十三年三月坐事削爵奉恩將軍定禄顯祖六世孫閒散宗室同泰子原封奉恩將軍慶阿泰姪乾隆三十七年十月襲四十一年三月卒揚慶定禄子乾隆四十一年十月襲奉恩將軍來齡顯祖六世孫奉國將軍莽古賚子乾隆五十一年封奉恩將軍福康顯祖七世孫奉恩將軍富清子雍正六年九月封乾隆八年三月卒無襲奉恩將軍紹徳顯祖七世孫奉恩將軍綬海子乾隆三年三月封二十年四月卒無襲奉恩將軍和中額顯祖七世孫三等奉國將軍寳麟子乾隆十七年十月降襲五十年十月卒子喀爾崇古襲奉恩將軍果明額顯祖七世孫一等奉國將軍平麟子乾隆二十二年十二月降襲奉恩將軍蘇赫納顯祖七世孫三等奉國將軍阿裕爾孫康熙五十八年十二月降襲雍正二年七月卒後無襲奉恩將軍景煌顯祖七世孫奉恩輔國公嵩椿子乾隆三十五年十二月封二等奉國將軍四十八年八月縁事降為奉恩將軍奉恩將軍伊赫里顯祖七世孫二等奉國將軍宗泰子乾隆三十六年四月降襲奉恩將軍品級英禄顯祖七世孫奉國將軍品級瑪商阿子乾隆十四年十月授四十年十月卒子降襲奉恩將軍揚森顯祖八世孫三等奉國將軍東海子乾隆九年六月降襲奉恩將軍重侯顯祖八世孫原封奉國將軍舒賢子乾隆三十年六月襲奉恩將軍連輝顯祖八世孫輔國將軍儀啟子乾隆三十五年十二月封三十六年十二月卒無襲奉恩將軍富珠齡阿顯祖八世孫二等奉國將軍吉拉敏之子乾隆四十二年六月降襲奉恩將軍内樂顯祖八世孫三等奉國將軍儀常子乾隆四十二年七月降襲奉恩將軍穆精阿顯祖八世孫奉國將軍興誠子乾隆四十六年二月降襲奉恩將軍寧璋阿顯祖九世孫奉國將軍達明阿子乾隆五十年十二月降襲奉恩將軍錦福顯祖九世孫一等奉國將軍敏輝子乾隆四十三年十一月降襲太祖系奉恩將軍賴慕布太祖皇十三子順治二年二月封贈詳輔國公來祜賴慕布子順治三年襲晉封詳輔國公奉恩將軍費雅三太祖皇孫二等鎮國將軍贈鎮國公阿拜子順治二年二月封三年九月卒無襲奉恩將軍範圖太祖皇孫二等鎮國將軍贈鎮國公阿拜子順治二年二月封五年十二月卒贈詳輔國將軍奉恩將軍喇都海太祖皇孫三等輔國將軍贈輔國公塔拜子順治二年二月封六年三月卒諡懷儀無襲奉恩將軍巴特瑪費揚古太祖皇孫三等輔國將軍贈輔國公塔拜子順治二年二月封六年正月卒贈詳輔國將軍奉恩將軍保格太祖皇曾孫輔國公灝善子雍正二年閏四月封十二年三月卒無襲奉恩將軍查達太祖皇曾孫原封多羅貝勒察尼子康熙十年正月封四十三年十二月坐事削爵雍正二年閏四月復封乾隆十三年正月卒無襲原封奉恩將軍徳福太祖皇曾孫原封多羅貝勒察尼子康熙十五年正月封三十七年十二月因校射不嫻爵除奉恩將軍畢喇席太祖皇曾