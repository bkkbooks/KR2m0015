生即制之所由定也攷定制宗室封爵迄於奉恩將軍而封爵之所不逮者胥量厥材能以服官於宗人府其未服官而無職業者惟帶色用黄以為旌别顧匪垂於禬祮之表則内隠於裼襲之間厥度未昭究無以示宗潢之體統我皇上推恩族姓乃詔王公胄子之及嵗暨宗室無職業者一體按照品級給予官頂以章其身以使之自愛示褒示勸教育成全既不踰封爵之定制而亦得擬封爵之殊榮洵度越古今盛典也所奉諭㫖一道恭録於左乾隆四十七年九月初十日上諭閣臣曰宗室中除承襲封爵及現有官職外其閒散宗室向無按品給頂之例現在宗支繁衍𤓰瓞綿延皆我祖宗派系流傳譜列銀潢名登玉牒乃以身無職級竟與齊民無别殊不足以示親親而崇體制嗣後著將王貝勒貝子公之子嗣及閒㪚宗室年已及嵗者俱分别給與官頂其宗室現在當差職分較小者准其與閒散宗室一體按照品級給予官頂在宗室中有品級自必各知自愛不至蕩檢踰閑其中或有不肖犯法之人即行革去頂戴如此則於褒榮之中仍寓勸懲之意籍此可以教育成全而天家子姓俱得章服之榮益足昭國家睦族展親之誼甚盛典也所有如何酌給官頂之處著大學士軍機大臣㑹同宗人府詳悉妥議及議上准給四品頂戴永著為令臣等謹案周雅行葦之詩所以惇親族也其首章曰莫逺具邇宋儒以為篤厚之意藹然言外而明臣歸有光推論之曰天下之勢常自近而逺以厚道教天下者每由其逺以思其近故族兄弟之别非一本之父道則其始一人而已㫖哉斯言實足與具邇之義相發明顧以周之篤於懿親如此而開國之始五叔即已無官此非不欲授以爵也盖授爵不量其材則愛之適以害之而况世逺支蕃其勢固有不能徧授以爵者乎我國家眷念天潢自親王以至奉恩將軍列爵十等以封宗室可謂仁親之至矣而仁之所施有文有節止乎禮裁乎義而不過乎範圍則當𤓰綿瓞衍之時誠有不容濫邀十等之爵者然爵之所不及而竟至無以别於齊民則又何以勸親親之誼我皇上敬宗收族恩普徳洋御極之四十有七年特命宗室之無爵者皆給官頂以昭冠服之榮於是爵之所不及亦不啻有以爵之而自古以來或患其限於材格於勢者皆可無所限格而酌劑以善其通是何典之渥法之良歟夫固推之有其本而原於孝思之不匱也臣竊憶戊戍之嵗我皇上三詣盛京恭謁永陵福陵昭陵每至必淚隨聲湧瞻戀不忍去因諭扈從之閣臣曰太宗為朕之髙祖而自太祖以上雖遞推遞逺然追溯水源木本一脈相承則固甚親而甚近盖我皇上永思維則所以報本而追逺者如此其仁孝之至孝之至斯仁之至而節文之禮化裁之義亦即出乎其中是以旁推下推洵如詩所云莫逺具邇而典自極其渥法自極其良也昔有虞史臣紀述帝堯之協和時雍厥惟以親九族為先務意其時所以親九族者必實有可以為法之事而惜乎書詞簡質畧而不詳臣等恭逢聖人之世幸得備覩夫典之渥法之良爰敢載諸簡編以廣周雅之義以㕘堯典之所未詳億萬斯年永垂令式盖不獨於封爵有可攷云臣等謹按覺羅世系無親王以下封爵惟贈多羅郡王三人贈多羅貝勒一人贈三等伯一人例應附載今以爵為序列於子男之前贈武功郡王禮敦巴圖魯景祖皇長子崇徳元年四月贈贈多羅郡王額爾衮景祖皇二子順治十年五月贈諡慧哲贈多羅郡王齊堪景祖皇三子順治十年五月贈諡宣獻贈多羅貝勒塔察篇古景祖皇五子順治十年五月贈諡恪恭贈三等伯謨洛渾五祖五世孫康熙二年二月贈諡剛勇臣等謹按子爵在國初為總兵官天聰八年改昂邦章京順治四年改精竒尼哈畨至乾隆元年始改子爵男爵在國初為副將天聰八年改梅勒章京順治四年改阿思哈尼哈畨至乾隆元年始改男爵今兹紀載凡受爵列祖朝者悉仍其身受名號遵舊典也異姓子男封爵倣此臣等謹按子爵男爵其封襲俸禄則例俱詳異姓封爵中以公侯伯均以爵異姓而子男則次其下當以類從也子景祖系二等精竒尼哈畨塞勒景祖皇曾孫順治四年封一等梅勒章京是年改為一等阿思哈尼哈畨七年三月遇恩詔晉封十四年六月卒諡勤慤額爾徳塞勒子原授一等精竒尼哈畨又一拖沙喇哈畨康熙八年以罪削爵本年留襲父爵十年九月卒喇祐塔額爾徳子康熙十年襲二十三年十一月卒噶爾漢喇祐塔弟康熙二十四年七月襲三十四年十二月以罪爵除五祖系二等精竒尼哈畨顧納岱五祖四世孫贈三等梅勒章京拜三子天聰八年五月以軍功襲三等梅勒章京崇徳四年七月以軍功晉一等順治三年五月以軍功晉三等昂邦章京四年改為三等精竒尼哈畨七年三月遇恩詔晉二等從征江西陣亡五月贈一等精竒尼哈畨謨洛渾顧納岱子順治七年五月襲一等精竒尼哈畨十七年五月征福建陣亡贈詳伯席特庫謨洛渾從弟康熙元年襲祖拜三三等阿思哈尼哈畨八年十月兼襲伯父顧納岱三等阿達哈哈畨晉一等精竒尼哈畨二十七年七月卒舒禄席特庫子康熙三十七年十一月襲雍正三年五月卒伊靈阿舒禄子雍正四年五月降襲二等精竒尼哈畨乾隆元年改為二等子十三年坐事削爵阿保舒禄曾孫伊靈阿姪倉庫官安崇阿子乾隆十三年十二月襲以疾罷爵四保阿保弟乾隆十九年十二月襲以上精竒尼哈畨今子爵男太祖系三等阿思哈尼哈畨布祜太祖四世孫順治十八年以原職襲父布三職改封三等阿思哈尼哈畨康熙二十五年二月卒額訥布布祜子康熙二十五年四月襲雍正十三年四月卒後無襲二祖系原封三等阿思哈尼哈畨科爾昆二祖四世孫順治九年正月遇恩詔封後以罪降三祖系二等阿思哈尼哈畨塞克森三祖五世孫康熙三十二年十一月以原職兼弟恭額職晉封三十四年十月卒巴顔徳塞克森子康熙三十五年正月襲雍正六年坐事削爵無襲景祖系三等阿思哈尼哈畨薩賽景祖四世孫順治十七年十二月卒無襲一等阿思哈尼哈畨瓦爾瑪景祖五世孫順治七年四月封三等阿思哈尼哈畨九年正月遇恩詔晉一等十七年六月卒蘇爾瑪瓦爾瑪子順治十七年七月襲康熙二十二年四月坐事削爵朗唐蘇爾瑪子康熙二十二年六月襲坐事削爵瑪克蘇朗唐族祖原授拜他喇布勒哈畨品級康熙二十二年九月襲三十年十二月罷爵佛寧額蘇爾瑪子康熙三十一年二月襲乾隆元年十二月卒子降襲三等阿思哈尼哈畨郎圖景祖五世孫順治十八年以原職襲從兄圖爾瑪職晉封康熙三十二年五月卒舒淑郎圖子康熙二年三月為族叔佐領薩克蘇後三十二年襲本生父爵晉二等子降襲五祖系一等阿思哈尼哈畨穆成格五祖皇曾孫順治十四年正月卒無襲二等阿思哈尼哈畨勒徳渾五祖皇曾孫康熙三十二年十月卒納泰勒徳渾子康熙三十二年十一月襲五十三年四月以罪削爵雍正三年九月卒原封三等阿思哈尼哈畨諾爾遜五祖五世孫康熙二年三月兼襲族叔顧納岱族兄謨洛渾職晉封尋罷無襲附贈梅勒章京贈三等梅勒章京拜三五祖皇曾孫天聰元年五月陣亡八年五月贈以上阿思哈尼哈畨今男爵皇朝文獻通考卷二百四十九
