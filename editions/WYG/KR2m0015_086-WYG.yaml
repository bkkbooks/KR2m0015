body:
  text: 職官考十武職領侍衛府國朝以八旗將士平定海㝢鑲黄正黄正白三旗皆天子所自將爰選子弟命曰侍衛用備周廬環衛之列統以勲戚大臣視周官虎賁旅賁職綦重焉領侍衛内大臣六人三旗各二人内大臣六人散秩大臣無定員掌統領侍衛親軍以先後宸御左右翊衛焉一等侍衛六十人二等侍衛百五十人三等侍衛二百七十人藍翎侍衛九十人親軍校四十五人三旗宗室侍衛一等九人二等十八人三等六十三人每十人各設什長一人御前侍衛乾清門侍衛皆無定員於三旗侍衛内簡擢隨印協理事務侍衛班領十二人於班領署班領什長内選用漢侍衛無定員分一二三等及藍翎侍衛同凡宿衛更畨輪直凡六班班分兩翼各設侍衛班領一人署班領一人侍衛三十人宿衛乾清門為内班散秩大臣一人侍衛親軍十人宿衛中和殿侍衛什長三人侍衛親軍三十人宿衛太和門為外班以領侍衛内大臣一人總統之内大臣散秩大臣二人隨班入直行幸駐蹕宿衛一如宫禁之制凡陞除領侍衛内大臣員缺除奉特㫖補授外將滿洲都統内大臣散秩大臣前鋒䕶軍統領暨各省滿洲將軍職名開列具奏恭候簡命内大臣員缺以散秩大臣暨都統前鋒䕶軍統領各省滿洲將軍職名開列亦如之散秩大臣多由特恩補授或人員不敷於宗室鎮國輔國公鎮國輔國將軍宗室一等侍衛暨公侯伯子男内簡選引見或授散秩大臣或署散秩大臣恭候欽定漢一等侍衛以一甲一名武進士補授二等以一甲二名三名武進士補授三等於二甲内簡選藍翎侍衛於三甲内簡選凡習射三旗侍衛按期於該旗侍衛教場騎射二次步射六次領侍衛内大臣暨侍衛班領察驗凡閲軍器之年更畨擐甲胄騎射親軍按期習騎射於侍衛教場協理事務侍衛班領及親軍校察驗鑾儀衛鑾儀衛職掌乗輿供奉鹵簿之事掌衛事内大臣一人鑾儀使滿洲二人漢軍一人初設二人康熙三十一年裁一人所屬左右中前後五所分鑾輿馴象擎盖弓矢旌節旛幢扇手斧鉞戈㦸班劍十司馴象一所分東西二司旗手一衛分左右二司臣等謹案順治元年置錦衣衛設指揮使等官二年改為鑾儀衛四年罷指揮使等銜改為鑾儀使副使等名五年復罷副使以内大臣掌衛事康熙七年定鑾儀衛使為正二品左所冠軍使滿洲一人雲麾使滿洲三人漢軍二人治儀正滿洲四人漢軍四人整儀尉滿洲二人漢軍九人掌輦輅右所冠軍使滿洲一人雲麾使滿洲三人漢軍一人治儀正滿洲三人漢軍三人整儀尉滿洲三人掌繖盖儀刀弓矢槍殳㦸中所冠軍使滿洲一人雲麾使滿洲三人漢軍一人治儀正滿洲三人漢軍三人整儀尉滿洲二人漢軍二人掌麾氅旛幢纛幟節鉞仗馬前所冠軍使滿洲一人雲麾使滿洲三人漢軍一人治儀正滿洲三人漢軍五人整儀尉滿洲二人漢軍二人掌扇拂爐盒盂盤几椅星御仗引仗椶薦静鞭品級山後所冠軍使滿洲一人雲麾使滿洲三人漢軍二人治儀正滿洲三人漢軍三人整儀尉滿洲二人掌旗𤓰吾仗馴象所冠軍使滿洲一人雲麾使滿洲三人漢軍一人治儀正滿洲三人漢軍二人整儀尉滿洲一人漢軍一人掌儀象寳瓶騎駕鹵簿鐃歌鼓吹旗手衛冠軍使滿洲一人漢軍一人雲麾使滿洲二人治儀正滿洲一人漢軍二人整儀尉滿洲一人漢軍二人掌金鉦鼓角鐃歌大樂陪祀冠軍使漢軍二人所屬有主事經厯二人載前文職中贊鳴鞭八人凡本衛官除授掌衛事内大臣員闕由領侍衛府以領侍衛内大臣内大臣列名疏請補授滿鑾儀使員缺於冠軍使及一等侍衛内簡選冠軍使於雲麾使内簡選雲麾使治儀正於治儀正治儀尉内簡選如選不得人移領侍衛府簡選三旗三等侍衛擬補雲麾使藍翎侍衛擬補治儀正整儀尉於滿洲䝉古世爵及佐領内簡選均由衛引見補授漢鑾儀使員闕由兵部以直省提督總兵官本衛漢冠軍使列名疏請補授冠軍使雲麾使治儀正於雲麾使治儀正整儀尉内以次簡選整儀尉於漢軍領催驍騎閑散人内簡選均由衛引見補授凡軍尉儀刀弓矢殳㦸用親軍豹尾槍仗馬用䕶軍䝉古畫角用䝉古鳴角軍奉輦擎執各校尉由内府選充者為旗尉五城選充者為民尉奉輦旗尉百六十八人民尉六十人各執事旗尉二百四十六人民尉三百二十二人左右中前後五所民尉計千三百二十八人馴象所民尉二百有六人八旗漢軍更夫四十人八旗都統滿洲䝉古漢軍各編八旗臣等謹案國初設立八旗曰鑲黄正黄正白正紅鑲白鑲紅正藍鑲藍分八旗為兩翼左翼曰鑲黄正白鑲白正藍右翼曰正黄正紅鑲紅鑲藍又以鑲黄正黄正白為上三旗各以王貝勒等統之每旗各分滿洲䝉古漢軍為三旗共二十四旗今謹依㑹典編次而守陵寢官及世職等官並備列於後滿洲八旗旗各都統一人副都統二人掌宣布教養整詰戎兵以治旗人所屬㕘領五人副叅領五人掌頒都統副都統之政令以達於佐領佐領所治以三百人為率人户滋生則増設佐領䝉古漢軍旗同今以見數計之鑲黄旗八十五人正黄旗九十三人正白旗八十六人正紅旗七十四人鑲白旗八十四人鑲紅旗八十六人正藍旗八十四人鑲藍旗八十七人驍騎校每佐領一人掌稽所治人户田宅兵籍以時頒其職掌䝉古八旗旗各都統一人副都統二人所屬㕘領二人副㕘領二人佐領鑲黄旗二十八人正黄旗二十四人正白旗二十九人正紅旗三十二人鑲白旗三十一人鑲紅旗三十二人正藍旗三十人鑲藍旗二十五人驍騎校每佐領一人以上職掌與滿洲八旗同漢軍八旗旗各都統一人副都統二人所屬㕘領五人副㕘領五人佐領鑲黄正黄正白三旗各四十人正紅旗二十八人鑲白旗三十人鑲紅旗二十九人正藍旗三十人鑲藍旗二十九人驍騎校每佐領一人以上職掌均與滿洲八旗同臣等謹案國初凡有率所部來歸及戰陣有功賞賜人口編為佐領者為原管佐領其有宣力國家人材服衆俾管佐領世世相傳者為世管佐領其有能任佐領之事能恵佐領之人是以簡用者為公中佐領兩翼前鋒統領滿洲䝉古各編八旗前鋒統領左右翼滿洲䝉古各總設一人前鋒㕘領每旗二人前鋒侍衛每旗二人委署前鋒㕘領每旗一人虚銜無専員前鋒校每旗十二人䕶軍統領滿洲䝉古各編八旗䕶軍統領滿洲䝉古每旗各一人䕶軍叅領滿洲每旗十人䝉古每旗四人副䕶軍㕘領如㕘領之數委署䕶軍㕘領每旗七人虛銜無専員䕶軍校每佐領下一人䕶軍㕘領雍正二年増設提督九門步軍統領提督九門巡捕五營步軍統領一人掌管門禁鎻鑰統率八旗步軍五營將備以肅清輦轂左右翼步軍翼尉各一人八旗步軍協尉副尉各二十四人掌董率守衛巡警掃除步軍尉每旗滿洲二十四人䝉古漢軍九人委署步軍尉每旗滿洲各五人䝉古漢軍各二人掌分汛警夜清道詰姦捕盜步軍尉滿洲每旗各三人蒙古漢軍每旗各一人緝捕盜賊稽察奸宄領催二千三十一人步軍萬七千八百四十七人城門領内九門每門二人外七門每門一人城門吏同所屬㕘將以下官載後京營所屬員外以下官載前文職臣等謹案京師重地禁旅宜嚴初制屬兵部職方司漢主事専管康熙十三年始設提督九門步軍統領又特簡八旗大臣綜理其事至三十年兼巡捕三營乾隆四十六年復兼巡捕五營則制愈詳而責愈重矣火器營白塔信礮附火器營總統六人以王公領侍衛内大臣都統前鋒䕶軍各統領兼任八旗鳥槍䕶軍㕘領十六人鳥槍驍騎㕘領二十四人司鳥槍司礮散秩官九十六人八旗通志載聞散旗員每旗七人管礮旗員每旗五人合計之共九十六人按會典管鳥槍散秩五十六人管礮散秩四十人數亦相符鳥槍䕶軍校一百十二人鳥槍驍騎校一百十二人管礮驍騎校四十人八旗滿洲䝉古每佐領下鳥槍䕶軍校三人鳥槍驍騎四人礮驍騎一人以上鳥槍䕶軍㕘領為該營専設官餘均以八旗滿洲䝉古官兵兼任臣等謹案火器營康熙三十年設先是二十八年設漢軍火器兼練大刀營衙門每翼總管一人以現任副都統兼管每旗協領㕘領各一人操練尉驍騎校各五人三十六年停止白塔信礮總管一人司信礮官旗各一人圓明園等營南苑附圓明園總統無定員王公大臣兼任掌翊衛之政令營總䕶軍㕘領八人每旗各一人副䕶軍㕘領十六人旗各二人署䕶軍㕘領三十二人旗各四人䕶軍校一百二十八人副䕶軍校一百二十八人䕶軍三千六百七十二人教養兵四百八十人健鋭營健鋭營總統無定員王公大臣兼任翼領左右翼各一人前鋒㕘領旗各一人副前鋒㕘領如㕘領之數署前鋒㕘領十六人前鋒校五十人副前鋒校四十人什長五十人前鋒千人委前鋒千人虎槍營虎槍營總統一人以公侯領侍衛内大臣兼任總領六人以内大臣都統前鋒䕶軍統領副都統侍衛㕘領簡補三旗虎槍六百人旗各二百人虎槍長旗各七人副長七人南苑總尉一人防禦八人内府三旗三旗䕶軍統領各一人䕶軍㕘領副䕶軍㕘領驍騎㕘領旗各五人佐領鑲黄正黄二旗各三十五人正白旗三十六人前鋒校旗各二人䕶軍校旗各三十五人驍騎校每佐領下一人臣等謹案初設佐領每旗滿洲三人旗鼓四人康熙三十四年各増二人正黄旗又増朝鮮佐領二人乾隆二十五年正白旗増回人佐領一人䕶軍統領雍正元年増設圓明園䕶軍營總一人䕶軍㕘領副㕘領旗各一人署㕘領如㕘領之數䕶軍校旗各三人王公府屬武官親王各設長史一人散騎郎四人以世爵領之䕶衛一等二等各六人三等八人典儀從四從五從六品各二人親軍校無定額世子長史一人散騎郎三人䕶衛一等六人二等五人三等六人典儀從四品一人從五從六品各二人郡王長史一人散騎郎三人䕶衛一等六人二等四人三等五人典儀從五從六品各二人長子長史一人䕶衛一等二人二等四人三等六人典儀從五品二人從六品一人貝勒司儀長一人䕶衛二等六人三等四人典儀從五品一人從六品二人貝子三等䕶衛六人典儀從六品一人從七品二人鎮國公輔國公三等䕶衛各四人典儀從七從八品各一人五旗王公府屬㕘領每旗五人佐領每旗七人驍騎校每佐領下一人守䕶陵寢武官永陵福陵昭陵總管各一人翼領各二人司工匠各一人防禦各十六人昭西陵防禦十六人驍騎校二人孝陵總管一人翼領二人防禦十六人驍騎校二人孝東陵防禦十六人驍騎校二人景陵總管一人翼領二人防禦十六人驍騎校二人皇貴妃園寢防禦四人驍騎校一人妃園寢防禦八人驍騎校一人泰陵總管一人翼領二人防禦十六人驍騎校二人妃園寢防禦八人驍騎校一人孝賢皇后陵寢總管一人翼領二人防禦十六人驍騎校二人純恵皇貴妃園寢防禦八人驍騎校一人端慧皇太子園寢防禦八人世職一等公二等公三等公一等侯二等侯三等侯一等伯二等伯三等伯一等子二等子三等子一等男二等男三等男一等輕車都尉二等輕車都尉三等輕車都尉騎都尉雲騎尉恩騎尉俱無定員凡滿洲䝉古漢軍官員襲職天聰五年定他國貝子當太平無事舉國來歸者或陣亡或病故子孫准與世襲罔替危急來歸者陣亡准襲五次病故准襲三次若每戰身先有功及一二次首先攻克城池者或陣亡或病故各照原官世襲罔替仍察其舊日有無罪過另行酌奪有出首叛逆大罪者量授官職准襲六次又自他國太平無事有孑身來歸者陣亡准襲四次病故准襲二次有臨難危急而孑身來歸者陣亡准襲二次病故准襲一次至於無職之人或首先登城或當先戰死者准給官爵襲二次拿獲姦細授職者陣亡准襲一次病故不准襲十年定准襲次數有越十五次以上者世襲罔替順治八年定凡遇恩詔其原有襲次者俱准世襲罔替給與誥命其原無襲次官員今恩詔中准授騎都尉者亦給與勅書陣亡准襲病故不准襲其効力軍前所得雲騎尉准襲一次九年定已得誥命之人又得官職者准其添給其襲次有過十次以上者即准世襲十八年定一等子襲十四次二等襲十三次三等襲十二次一等男襲十次二等襲九次三等襲八次一等輕車都尉襲六次二等襲五次三等襲四次騎都尉襲二次雲騎尉襲一次康熙三十四年定凡㕘贊大臣一等公陣亡照例給與騎都尉又一雲騎尉令伊子承襲四十年定三次恩詔所加雲騎尉遇承襲時銷去此承襲之通例也臣等謹案國初計功授爵凡漢人與旗人同例故靖海海澄諸人旋皆編入漢軍旗分世宗憲皇帝推恩勝國朱之璉亦原𨽻鑲白旗惟衍聖公仍宋明之舊列朝重道崇儒恩綸優渥其體與一等公無異故不另載漢人積有軍功勞績或陣亡者亦予世職如八旗例皇朝文獻通考卷八十六
