body:
  text: 欽定四庫全書皇朝文獻通考卷三十一征𣙜考六雜征歛山澤津渡順治二年以寺臣條奏蘆政傳㫖訓飭太常寺典簿王文言條奏江南長江一帶荻蘆數千餘里中多膄地乞遣臺臣部臣以次清查立為蘆政以充國用得㫖江南初經歸附治平急務惟在安民王文言何得借端言利不准行臣等謹按瀕江之地沙土隨水性遷移漸成洲渚小民植蘆為業田曰洲田課曰蘆課上農耕治之後即可以藝菽麥種秔稻與良田等非僅以菰蘆萑葦之盛為地利也盖大江兩岸坍漲靡常此落彼淤有司者隨時親勘備書於册越五年按籍履畆而覆核之其坍沒於水者除賦水落沙長者分年起徴以方田之法度其丈尺而乗除之其隔江對岸地分兩屬則令兩地牧令㑹勘酌其贏縮以定抵補之數順治九年暨十八年廷臣論奏蘆政利弊未嘗不採用之典簿王文言以小臣越職言事首論及此非真有度支盈絀之計特以聖政維新覬恩澤於分外傳㫖申飭以深折之恭誦聖諭治平急務惟在安民一語遂開我朝億萬年樂利之休云四年裁山東明季牙雜二税從巡撫丁文盛請也九年革除江隂青浦二縣坐派飬牛雜稅戸部奏言江隂青浦二縣有坐派飬牛之稅實屬病民請嚴飭督撫按臣行府州縣官將牛牙雜稅等項止許於買賣市集照例抽收若有横派鄉民者指名叅處又定蘆課五年丈量例工部奏言計臣王永吉按臣秦世禎請以蘆課歸併有司誠以丈量催提等弊重為民擾也但各州縣正項錢糧尚虧定額恐蘆課零星分散逋欠益多今後蘆課應仍歸主事管理毎五年一丈量止丈新漲新坍之地漲者増額坍者開除不漲不坍毋得丈量以滋騷擾報可十八年准巡按御史條奏蘆課六弊戸部議覆巡按江寧御史何可化條奏蘆課六弊坍設之賠累宜豁收解之耗費宜革豪强之𨼆佔宜清洲書之飛洒宜禁佃蠧之侵欠宜究蠲免之條例宜漙俱應如所請從之又清查各省蘆政工部議覆工科給事中王曰高條奏蘆政利弊四欵一嚴催征以懲積欠一清踏勘以核實數一按地形以清課額一酌久任以專責成俱應如所請得㫖江南江西湖廣每省差滿漢司官各一員嚴行清查康熙二年免崇明縣加征蘆課江寕巡撫韓世琦疏言崇明縣大糧田九千六十頃五十畝零除正賦外復征蘆課銀八千三百八十餘兩實係一田兩賦亟請蠲豁部議應如所請從之六年免廣東雜稅四千兩有竒廣東巡撫王來任請免粤東雜稅四千有竒以甦民困部議不准上特允之十年准江南江西湖廣等省蘆課錢糧歸併地方官管理戸部奏江南江西湖廣蘆課錢糧原係地方官按畆征收轉解監督衙門與各闗差監督親收商稅者有别請嗣後停止差遣部員將蘆課錢糧歸併地方官管理從之三十八年准内地商人往殺虎口外伐木入口販賣騐放輸稅工部議覆山西巡撫倭倫疏言殷實商人願往殺虎口外大青山等處採木者請令其赴部具呈給票守口官兵騐明放行輸稅入口販賣查殺虎口外從無砍木之例應將該撫所請毋庸議得㫖内外之民俱屬一體大青山木伐賣商民均為有益著照該撫所請行四十八年除革私設牙行吏部議覆江南道監察御史張蓮條奏貿易貨物設立牙行例給官帖使平凖物價乃地方棍徒於𤓰果菜蔬等物亦私立牙行名色勒掯商民請敕部查稅課定例除應立牙行者照舊設立外其餘一切私設盡數除革應如該御史所請從之互見市糴考五十三年議准呼努呼河等處木植抽分差奉天部院司官一員管理工部議覆盛京工部侍郎貝和諾疏言呼努呼河等處商人所販木植於十五根之内抽取一根請派盛京各部才能司官一員抽分一年差滿更換應如所請從之雍正七年免貴州軍田上契稅銀戸部覆准雲貴廣西總督鄂爾泰疏言原任工部侍郎申大成條奏黔省軍田許照民田一體買賣每畆上稅銀五錢給契為業經九卿議覆准行但黔省軍田一畆之價可買民田二畆應納糧賦一畆亦可扺民田二畆其每畆上契稅銀仰請豁免嗣後凡有軍田授受悉照常例報稅從之十年免西寧煤稅奉諭㫖朕聞西寧北川口外白塔地方出産石煤附近漢土畨回民人穵取販賣以為生計每䭾納稅錢三十文西寧府委員收解充餉約計每年收銀一千九百餘兩近因西陲用兵之際西寧移駐兵弁較前為多率皆用煤以供炊㸑煤價漸至昻貴若仍照例征收稅銀恐價值不能平减於兵民均有未便著將應收稅銀寛免十一年飭令各省額設牙帖報部存案諭内閣各省商牙雜稅額設牙帖俱由藩司衙門頒發不許州縣濫給所以防増添之弊不使貽累於商民也近聞各省牙帖嵗有増添即如各集場中有雜貨小販向來無藉牙行者今概行給帖而市井奸牙遂恃此把持抽分利息是集埸多一牙戸即商民多一苦累甚非平價通商之本意著直省督撫飭令各該藩司因地制宜著為定額報部存案不許有司任意増添嗣後止將額内退帖頂補之處查明換給再有新開集場應設牙行者酌定名數給發亦報部存案庶貿易小民永免牙行苛索之累互見市糴考十二年免黔省遵義府各山埸小稅雲南廣西總督尹繼善等疏奏黔省遵義府除遵義仁懐兩大稅之外又有遵義縣小板山場綏陽縣永興山埸桐梓縣新街山埸共小稅銀四百十九兩零到場之物皆係遵義仁懐兩大稅處已經征稅者查黔省原有各山場小稅久經豁免遵義向𨽻川省是以仍循舊規今既改𨽻黔省應請一例邀免以除民累得㫖遵義等縣山埸小稅著照黔省通例一併加恩豁免十三年禁止契紙契根并停征収稅課議叙之例奉諭㫖民間買賣田房例應買主輸稅交官官用印信鈐盖契紙所以杜奸民揑造文劵之弊原非為増課也後經田文鏡創為契紙契根之法預用布政司印信發給州縣行之既久書吏夤縁為奸需索之費數十倍於從前徒飽吏役之壑甚為閭閻之累不可不嚴行禁止嗣後民間買賣田房仍照舊例自行立契按則納稅地方官不得額外多取絲毫將契紙契根之法永行禁止至於活契典業者乃民間一時借貸銀錢原不在買賣納稅之例嗣後聽其自便不必投契用印收取稅銀其地方官征収稅銀多者停其議叙乾隆元年除近海居民雜稅戸部覆准尚書甘汝來奏言邊海之地居民採捕魚蝦藉以活命其船則用單桅不能出洋貿易向祗於本縣給照稽其出入並不輸稅近聞各海闗監督雖單桅船隻亦令請領闗牌同雙桅出洋貿易之船一體輸鈔無論輸鈔之多寡即請領闗牌一次已需規例四五兩不等請查明海疆單桅捕魚之船概免領牌輸餉庶海額貧民得有生計至近海貧民資生無業有用竹取魚者有於埠頭養鴨者閩廣之間悉按按埠征稅此項稅銀無多既非額稅所有即係官吏私征應令各該撫查明禁止從之免廣東歸善海豐惠來潮陽四縣加額漁稅並免粤東埠租奉諭㫖廣東山海奥區貧民多以捕魚為業各縣俱有額征海課為數無多相沿已久後因歸善縣不肖知縣私取陋規加於額征十數倍遂經撫臣定議加増魚稅一千餘兩作為盈餘而海豐惠來潮陽三縣亦仿照加増海豐縣則増至四千餘兩惠來縣増至五百兩潮陽縣増至七百餘兩朕思粤東山多田少小民生計艱辛故以捕魚為養贍之計今他縣漁租皆仍舊額而歸善等四縣獨征収加重􅂲漁民輸納維艱非國家愛養黎元之意著將四縣加増之數悉行豁免仍照原額征収其捕魚小船尤不應在輸稅之内再查粤東有埠租一項亦民間自収之微利前經地方官通查歸公為凑修園基之費夫園基既動公項銀兩修築則埠租一項亦著一體免征以免閭閻之煩擾該督撫可轉飭有司實力奉行毋使奸胥地棍借端私取致窮民不得均沾實惠又免湖北太和山香稅奉諭㫖山東泰安州香稅朕已降㫖豁免近聞湖北太和山凡逺近進香者亦有香稅一項著照泰安州之例永行豁免該督撫即飭令地方官實力奉行毋使奸胥土棍巧取滋弊又復各直省契尾舊例廣東巡撫楊永斌奏向來未設契紙以前凡民間執契投稅官給司頒契尾一紙粘連鈐印令民間収執為據盖因田房稅契銀兩贏縮不齊若止就民間自立之契印稅則藩司衙門無數可稽不肖官吏得以私収飽槖而且民間交易之後往往延挨不稅候至官員離任之頃假託親知書吏或乞恩盖印或量減稅銀彼匆忙解組之員多寡視為幸獲豈能審察致詳於是遂有揑造假契乗機投稅致滋訐訟不休者是以㑹典開載凡買田地房産必用布政使契尾非惟防私徴亦所以杜揑造也迨後因用契紙而契尾之例遂爾停止今契紙既已革除而契尾尚未復設臣思契尾之例係投契之時官為印給不同契紙苐由民間價買致有滋擾可比似應仍請復設照依舊例由布政使編給各屬令地方官粘連民契之後鈐印給發每嵗奏銷之時將用過契尾數目申報藩司查考其稅銀如有贏縮仍令儘収儘解庶可杜官吏侵収與奸民揑造之弊經王大臣㑹同戸部議奏得㫖如所請行四年開三道溝及熱河八溝等處煤窑戸部議覆亶𨽻提督永常奏三道溝至熱河八溝等處産煤之所請開挖煤窑以天地自然之利惠及兵民固屬因地制宜之法但三道溝等處俱係邊闗塞外地方遼濶一設窑座人民叢集自應稽查防範並劄知欽天監委員前往相度於行宫有無妨碍是日面奉諭㫖古北口外三道溝等處請開煤窑朕祗期於地方並無滋擾兵民實有禆益至於行宫不過暫時巡幸之所其有無妨碍不必議及又以牙帖嵗増令各省嚴加核實奉諭㫖昔我皇考惠養商民恐州縣牙行嵗有増添以致奸棍爭奪抽分利息為閭閻之擾累於雍正十一年特諭令直省因地制宜著為定額報部存案不許有司任意増添所降諭㫖甚明近聞江蘇各屬於額帖之外陸續請増者一縣竟有數十張以至百餘張不等此必州縣官員才識短淺聽信吏胥播弄借新開集場准其添設之例或舊業而揑為新設或裁牙而混詳改充徒使貿易小民受其苛索莫可申訢江蘇如此則各省亦必皆然著該部即通行各省督撫該地方果有新開集場應設牙行者由府州核實詳司給發牙帖如非新開集場而朦混請添者即行題叅從重議處至五年議定清釐牙行之例向例每行認充經紀取具同行互保一人出具殷實良民甘結該管官加結送司給帖充應互結雖有殷實字様而互保之責成未經議及今定舖家拖累商人者將本牙行帖追繳勒限清還仍行給與若係牙行誆騙商人將互保行帖一併追繳勒限清還本牙更換互保行帖仍行給與倘逾限不完將互保之人一并更換牙行惟圖用錢任舖戸坑騙客商者除逾限不完將牙行革退外仍將舖戸責限追比其不足之項令牙行賠補牙行侵吞客賬者除逾限不完將本牙互保一體斥革外仍將本牙責限追比其不足之項令互保攤賠其追比之限期按欠數之多寡酌定至於以後客之貨挪補前客之欠移弱客之貨代償强客之欠該互保先行舉首免其治罪客𨼆者責令分賠牙行夥計人等侵吞容賬總照牙行侵吞之例追帖賠補互見市糴考五年奉諭㫖民間懋遷有無官立牙行以評物價便商賈其頂冒把持者俱有嚴禁近聞外省衙門胥役多有更名揑姓兼充牙行者此軰倚勢作奸壟斷取利必致魚肉商民被害之人又因其衙門情熟莫敢申訴其為市㕓之蠧尤非尋常頂冒把持者可比所當亟為查禁嗣後胥役人等冒充牙行作何定例嚴禁及地方官失於查察作何處分之處交該部定議具奏尋議各省衙門胥役現在更名揑姓兼充牙行者令地方官嚴查確實即行追帖勒令歇業並將胥役充補牙行之處永行嚴禁倘不法胥役仍敢更名揑姓兼充牙行應照更名重役例治罪侵食客貨貽累商人者發附近充軍該管官照例議處載入則例遵行從之准東省濟南等府開挖煤窑戸部議覆山東巡撫朱定元疏稱東省生齒日繁山林所産樵蘇價值倍於往昔必須煤炭接濟查濟南府屬之章邱淄川泰安府屬之泰安新泰來蕪肥城兖州府屬之寧陽滕縣嶧縣泗水沂州府屬之蘭山郯城費縣蒙隂莒州青州府屬之益都臨朐博山登州府屬之萊陽海陽等州縣俱有煤可採今議於産煤之處毎窑立一窑戸民地以地主為窑戸其官山官地以領帖輸稅之人為窑戸照當稅之例領帖辦稅凡有僱用人夫必用本籍之人取具地隣等各結無許外方人等充冒致生事端從之六年革除牙稅積弊戶部覆准河南巡撫雅爾圖奏稱懋遷有無小民日用之常而抽收稅課設立牙行所以通商賈而息爭端其有私収把持者均干禁例查牙戶一項原因從前州縣任意増添濫行給帖是以著為定額毋許額外増添其有把持壟斷朋夥私充者例有治罪之條地方官理應實力奉行豈容於額設牙行之外另立名色擾累商民今該撫所奏各省貿易集埸及零星口岸於額設牙行之外豈復有集主包頭攬頭名色朋比攘㨿任意勒索實為商民之累自當通查禁革清除積弊以便商民應行令各省督撫轉飭各該地方官嚴查禁革倘地方官奉行不力復滋前項弊竇亦即指名查叅從之八年免浙江玉環塗稅奉諭㫖浙省温台二洋為漁船採捕之所從前玉環未經展復以前凡漁船在洋採捕者汛兵需索陋規無異私稅後因展復玉環該地方官惟恐經費無出遂將陋規改收塗稅以資經費之不足此一時權宜之計也而毎年所委微末員弁及丁役人等往往借端苛索朕思濱海編氓以海為田每嵗出沒於風濤之中捕魚以餬其口生計淡泊應加軫恤况自玉環展復以來地方所有錢糧已敷公事之用無庸更收塗稅著將此項永逺革除九年定稽察参山積弊事宜舊例商人領票辦参毎票一張一人兩䭾前往刨採而領票之人早已雇夫出口毎票一張或三四人五六人不等經奉天將軍奏稱與其聼伊私雇人夫任意刨採不若嚴定人數給發腰牌請嗣後每領官票一張准其三人出口一人守䭾炊㸑兩人入山刨採給發腰牌三面以别真偽至包攬飛参之棍徒應與産礦山塲礦徒潛行偷挖約練接濟夥同分利者同科請嗣後拏獲包送飛参之人亦照此律究治惟是邊門所轄鞭長莫及難以防範如威逺堡邊門路通寧古塔黑龍江兩省商賈車輛往來不絶又如英額江清二門雖無車輛出入多有馬䭾私運至鹻厰靉河兩門並應添巡緝即在各屬員内調補三年更換戸部議覆俱應如所奏從之十一年准湖南衡州府城設立牙行戶部覆准湖廣總督鄂彌達等疏稱郴桂二州界址雖屬毗連其水路所通一由永興來陽地境出衡郡大河一由常寧地界出衡郡大河河道既分運行各别其附近處所惟衡州府城為該二州往來舟楫必由之道實為總㑹處所應於衡州府城設立牙行頒給印烙官秤先儘採買後儘客販當面議價該牙止在旁眼同兊交銀兩貨物以免爭競該牙行如有壟斷把持哄誘代買以及虧欠客本等弊即行究革勒追另募頂充從之又免廣東瓊州府牛新等項無著稅銀廣東瓊州府屬有應征牛新等項稅銀四千二百餘兩載全書例應征納經該督撫查奏此項稅銀内有無著銀一千七百餘兩實係畸零小戶難以照舊派征奉特㫖永行豁免十四年定應城縣征収石膏稅額署湖廣總督新柱奏言查得應城縣石膏征稅一項征之於産膏地方之峝民者則曰峝稅征之於評膏價之經紀者則曰行稅征之河下装運石膏之船戸者則曰河稅歴來照數征収報解今委員監収一年期滿監収膏稅正餘并峝行河稅銀共四千一十八兩九錢八分零内除膏稅正額及耗羡并峝行河稅以及經巡紙筆飯食暨贏餘項下解費銀兩外實贏餘銀二千二百六十兩九錢七分八釐零其征收膏稅已奉發有循環簿登填其秤係照部法較凖逐船查秤設立木櫃令商人親填完納部議應如所請得㫖允行又更定稅契之法先是民間買賣田房應買主輸稅交官官用印信鈐盖契紙以杜奸民揑造文契之弊經田文鏡創為契紙契根之法於雍正十三年特奉諭㫖停止又於乾隆元年經廣東巡撫楊永斌奏請仍復契尾舊例覆准通行至是戸部議駁河南布政使富明疏奏請於業戸納稅時將契尾粘連用印存貯毎遇十號申送知府直𨽻州查對不知契尾經一衙門即多一衙門之停擱由一吏胥即多一吏胥之苛求甚且掯勒駁查以致業戶經年累月求一執照寧家而不可得應將所奏毋庸議臣等酌議請嗣後布政使頒發給民契尾格式編列號數前半幅照常細書業戶等姓名買賣田房數目價銀稅銀若干後半幅於空白處預鈐司印以備投稅時將契價稅銀數目大字填寫鈐印之處令業戸看明當面騎字截開前幅給業戶收執後幅同季册彚送布政使查核此係一行筆跡平分為二大小數目委難改換庶契尾無停擱之虞而契價無参差之弊疏上如議行十七年停止大宛二縣舖面行稅三年編審之例改為按年征收戸部議覆直𨽻總督方觀承等奏稱大興宛平二縣舖面行稅舊例分别上中二戶按則征收三年編審一次原以杜𨼆漏之弊惟是編定之後如過該年舖面減少則將下戸陞作中戸中戸陞作上戶加征稅銀以符前數商民不無苦累如遇該年舖面増多稅亦因之而多而報解仍止此數徒供官吏之侵蝕行欲稅之征收皆歸實在誠莫若於舖面之開閉隨時考核應請於毎年二月令該二縣將各行舖親身查㸃一次分别資本充裕者列為上戶照例嵗征銀五兩稍次者列為中戸照例嵗征銀二兩五錢並於由單内填註明白地方官祇須按舖給單按單収稅無俟假手吏胥紛紛查報應如所奏從之二十年定蘆洲地畆坍戶以次撥補之例江西巡撫胡寳瑔奏言蘆洲地畆坍漲靡常舊制五年丈量一次漲陞坍除嗣於乾隆十三年經部定議凡有坍塌洲地即令業戶報官勘明註册立案遇有淤漲按照報坍先後以次撥補倘有餘剩新淤官地召民認墾按則陞科通行遵照惟是蘆洲有有課無課之分凡濵江洲地先由水影次變沙灘又次為泥灘為草塌為草坦至於漸積成洲然後納課計自水影以至成洲必經數十年或十餘年之久其成洲頗費工本及遇塌卸必届大丈之年始行除課若有淤漲之地自應按照報坍先後俾復其業以完課額至於水影沙灘等類原無工本可費是以例不陞課即有坍卸自不在撥補之列乃有奸猾之徒因定例未經分晰指明往往以無課之沙灘等項混爭撥補請嗣後將有課之洲報坍者挨順先後彚為一册按次撥補庶課額既定訟端可弭經部議覆應如所請凡濱江新漲之地查原舊有課之洲報坍者次第撥補至於水影沙灘等項雖稱未經陞課但小民承認多年希圖成業一遇坍塌既不得與有課坍戸一例撥補至撥補餘剩之地若不量為准撥􅂲失業之戸未肯甘心彼此復啟爭端情理殊未平允應令嗣後新漲地畆除儘有課坍戸補足之外尚有餘地即將無課坍戸按照報坍先後酌量撥補再有餘剩始行召墾仍嚴行各洲戶安分息爭一聽官撥分别辦理疏上得㫖如議行二十一年准盛京大那禄等山埸招商砍木納税盛京侍郎清葆奉寛奏大那禄山九處山塲請勒限三年仍給各商領票砍木納稅至三年期滿仍將九處山場撥給台丁砍木如台丁内有不願領票者照例招商承領輸納稅課得㫖允行二十三年核定順天府屬額設牙行順天府尹劉綸等疏稱順天府通判所屬牙行額設一千七十二名除節次裁去各牙一百五十八名外實在存留牙行八百四十九名連崇文門經紀四十二名每年共應征銀一千五百兩有竒著為定額至議裁之燒酒𤓰茄青菜共二十三名停其募補并嚴禁坐地奸賈暗取牙錢其實係自置自買以及零星肩挑背負售賣者不得使該牙等藉端需索從之二十四年定山西穆納山征收木植稅課山西穆納山木植久經封禁該處奸商藉此射利潛行偷砍地方胥吏需索勒詐毎滋弊端上命戸部郎中英亷㑹同巡撫塔永寧前往各山溝逐細履勘具奏産木山埸共有四十七處屢經砍伐而可用之材尚多但山埸荒僻路徑叢雜與黄河磴口處處相接可通水運亟應仰遵諭㫖竟弛其禁招商砍伐按料給與蒙古山價既可為養贍窮乏䝉古之資材木運入内地又可供官民興作之用謹將招商開採設口稽查各事宜逐一詳議一稅口宜互相稽查也查穆納山木植運至山口即就山口騐量鑿用稅厰斧印派附近駐劄之薩拉齊協理通判兼司辦理至上游磴口木植必由查漢庫連磴口與托克托城河口兩處滙集或就近由陸路發往歸化城抑或竟由水路赴殺虎口河保營轉運各處售賣請於兩處各設立稅口責成各該駐劄之通判經管並令歸綏道専司稽查以專責成一稅課山價宜彚同征收分别解給也查從前議定商人認買穆納山木植毎料長七尺厚七寸寛一尺交官價二錢八分今運送稍艱請酌中定以毎料収木稅銀一錢二分至山價一項乾隆十七年奏定毎料給與一錢今應仰體禆益䝉古之恩㫖毎料酌増二分亦以一錢二分酌給行知烏喇特扎薩克差員赴歸綏道衙門領回養贍所屬窮乏䝉古每兩隨稅耗銀一錢以為吏役飯食巡船紙張之用一商人工丁宜定數約束以免滋擾䝉古也今酌議召募殷實諳練者為商總其散商或三四人或五六人不得過六名之數毎商一名其名下砍運工丁不得過一百名給與該商人印照指定山溝分編字號在山伐運一稅厰應按時分别開停也查穆納山木植非藉黄河水運不能致逺黄河每年十月立冬氷合至三月清明後氷泮方能行運兩處稅口即以酌定啟閉日期通報至開採數年之後大木無有所有商丁自應概行查逐出山以免逗留滋事從之二十五年定湖廣漢口等鎮牙行稅額湖廣總督蘇昌議覆湖北布政使公泰條奏牙行所完牙稅皆有上中下三等之殊江西牙稅上則納銀三兩中則納銀二兩下則納銀一兩湖北四通八達漢口一鎮更為九省通衢商買輻輳不減江浙等省乃檢查報部稅册自黄州鄖陽與漢口等處比較輕重失宜應請將通省各牙行酌中定議上行完稅銀二兩中行完稅銀一兩下行完稅銀五錢查湖北漢口富商大賈絡繹往來洵屬貿易最盛之地其他如荆州府之沙布草市襄陽府屬之樊城安陸府屬之岳家口等處雖在市集中亦稱繁盛而往來客貨已較遜於漢口其餘州縣之鄉村小鎮所有商販多係小本經營牙儈不過微利餬口不但與漢鎮懸殊即較之草市等處情形逈别今若改征稅銀較之舊時上行加増三倍中下行俱加増兩倍有餘恐簡僻州縣鄉村小鎮之牙行完納不前轉致有名無實請將漢口草市沙市樊城岳家口等處牙行按照上中下則上行完稅銀二兩中行完稅銀一兩下行完稅銀五錢其餘僻邑村鎮上行完稅銀一兩中行完稅銀五錢下行完稅銀三錢其黄州鄖陽二處牙稅一體改正從之二十六年議准徴收殺虎口油酒烟觔稅課并令守口員弁毋得禁止出口農噐戸部議覆前任殺虎口監督期成額奏言口外烟油酒三項向係由内地興販出口赴彼貿易是以該處並未定有起課之則今蒙古地方頗種烟葉雜糧口内民人赴彼造作油酒烟觔在歸化城一帶村庄售賣應行令現任殺虎口監督將此三項與皮張雜貨均附於落地木稅按則抽納至奏稱鐵噐到口收課守口員弁人等以久干禁例不准出口查戸部頒行闗稅全書内鍋杓鋤梨等項俱經列有科則並未禁其出口嗣後行令監督詳細查明除廢鐵鐵料仍照舊禁止外如祗係農噐及民間日用噐物即行按則征稅將名色件數註於票内毋庸禁止從之二十七年定烏嚕木齊舖面園圃分等收稅利駐劄烏嚕木齊大臣旌額理奏該處商賈開設舖面房五百餘間墾種園圃三百餘畆視其生理大小作為三等其園圃按年薄征從之臣等謹按舖面開設即日中為市之義以兼奏園圃生理故入雜征其他計舖面收稅者概入闗市門類二十八年議准在京牙帖額能通融頂補戶部議覆順天府尹錢汝誠等疏稱在京各項經紀多寡不齊一牙一帖統計額缺八百九十一名征輸稅銀一千五百三十一兩例由順天府通判管理遇有事故懸缺報明募補復定為五年編審一次將各牙實在情形查明覆核現在桐油棉花綢縀藥材等項帖多貨少陸續告退六十四名乏人充補又白炭江米銅鉛等項帖少貨多分𣲖城市不敷評價此絀彼盈難於酌劑請將現在懸帖六十四張發司查銷所遺懸缺即於貨多帖少之行准其認補飭司給帖按則輸稅實征實解總不得逾原定牙帖八百九十一名之額使額帖不致虛懸虧課而市儈亦無從壟斷居竒自屬因時制宜酌劑變通之法應如所奏從之三十一年令民間稅契無司頒契尾者首明即行補給其稅銀於原經手之州縣名下追完奉諭㫖前據湖北按察使雷暢條奏民間田房稅契不粘連司印契尾者立限一年令業戶首明補稅以杜侵隱而稽假冒經戸部覆准並令各督撫分别定限報部查核夫隠匿漏稅若在民間自應查明令其補交若州縣官辦理稅契於契紙内鈐盖印信並不粘用司印契尾是係不肖有司意圖侵肥入己所致其實小民應投稅銀業已照數輸納今乃令業戸首明補稅而不於原稅之州縣名下追還是百姓受重稅之累而侵隱之官吏轉安享其利於情理殊未得平著各該督撫詳悉出示曉諭凡民間有已經報稅並無司頒契尾者令其據實首明即行補給契尾其契銀毋庸重複補納以恤民力並查係何員任内經手除事在五年以前及該員已經身故者查明免其勒追外其現任及陞調各員著照原稅銀數於各名下定限追完此次立法已後如再有止鈐契紙不連用契尾者各督撫即行查恭治罪如此則閭閻既免重科州縣共知儆惕將來小契之弊亦可不禁自止著將此通諭知之定稅契申送道府直𨽻州查騐之例戸部議覆直𨽻按察使裴宗錫奏民間置産投稅布政使頒發契尾久經定例惟是法久弊生或有官吏串通將所填契尾前半幅之給民者開寫實數後半幅之送司者開寫虛數以百改十以千改百徴多報少希圖侵蝕請令該管之道府直𨽻州核轉固屬剔弊之法但契價多寡不同概令申送騐發事屬繁瑣臣等酌議嗣後州縣給發契尾如契價在千兩以下者仍照舊辦理毋庸申送查騐其契價在千兩以上者應如所請令各州縣將所填契尾粘連業戸原契按月申送知府直𨽻州查騐直𨽻州則申送該管道員查騐相符即將契裁兩半定限十日發還州縣一給業戸収領一彚送藩司稽核逾限不給者分别議處至田房稅契例應州縣衙門填給契尾經管征収查各處竟有由佐雜官征収者亦宜統歸正印官經管以昭畫一從之四十八年諭據慶桂奏挐獲吉林等處私行挖参人犯永瑋因朕恭謁祖陵前往辦理供應事宜是以見未及此著將慶桂奏摺抄録寄永瑋閲看並著伊派委妥幹官兵于産参山厰通衢要隘及山谿僻處嚴行搜緝近年封厰停採原期䕶養参苗令其滋長今吉林等處挐獲私挖人犯至百餘名之多是有封閉之名而無其實反令不肖之徒得以倖獲何若仍行放票開採之為愈也著自明年為始仍行放票開採皇朝文獻通考卷三十一
