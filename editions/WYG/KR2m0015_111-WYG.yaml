body:
  text: 欽定四庫全書皇朝文獻通考卷一百十一宗廟考五太廟升祔儀制下禮部具疏行欽天監諏吉工部敬製升祔龕案於太廟街門内潔室敬製神位於山陵配殿禮工二部尚書上香行三跪九叩禮既成内閣翰林院官朝服敬書題字大學士滿漢各一人朝服視鐫上香行禮禮部豫列親王名請㫖簡命恭奉后主一人山陵禮成敬題神位畢皇上恭奉神位於金輿自山陵迎歸太廟祔饗未至京前一夕皇帝由便道先回宫恭俟右迎神回京眂神致齋書祝版閲祝版眂割牲儀均與時饗同前期五日禮部工部太常寺官入廟詣中殿恭設新祔帝后神龕陳帷幔設香案供鑪鐙如列聖列后寢室前陳設儀右設寢室龕案先一日遣官以祔廟告祭天地宗廟社稷如常告儀右祗告其日太常寺卿率屬入廟潔蠲殿内外藉以㯶薦恭設後殿中殿列聖列后神座如時饗儀恭設新祔帝后神座於前殿列聖列后之次按昭穆為序乃展前殿兩廡配饗均如儀右設神座將事之夕夜分太常寺卿入廟然炬明燈具器陳於案各以其序工部官張黄幄於太廟街門外之南鑾儀衛官設洗於廟南門外樂部和聲署陳樂懸樂舞於階上昧爽鑾儀衛陳法駕鹵簿於午門均如時饗儀右陳設質明步軍統領勒所部清蹕除道自神輿所入都門至大清門御道左右塗巷皆設布幛至時禮部尚書侍郎赴乾清門請駕皇帝禮服乘輿出宫諸王貝勒貝子公内大臣侍衛朝服以從駕至端門外黄幄次降輿入幄祗俟王公百官朝服集大清門外祗俟神輿至大清門王公百官跪迎候過興神輿至天安門贊引對引恭導皇帝出次跪迎候過興隨行入太廟街門陪祀王公百官及承祭後殿官分獻官均豫入殿庭祗俟神輿至廟南左門外輿止贊引跪奏盥洗皇帝盥鑾儀衛官跪奉盥奉巾如儀畢贊引奏恭請神位暨對引官恭導皇帝詣帝主神輿前贊引奏跪皇帝跪奏拜興皇帝三拜興恭奉帝主奉后主親王詣后主輿前跪三叩興恭奉后主以從御仗黄葢前導由太廟南門左門至㦸門東階下御仗黄蓋止贊引對引恭導入㦸門左門陞東階進殿左門司拜褥官豫布新祔帝主拜褥於殿内正中布后主拜褥於西稍後布皇帝拜褥於後贊引對引恭導皇帝詣拜位前北向立奉后主親王祗立於後贊引跪奏新祔帝后祗見列聖列后皇帝恭奉帝主奉后主親王恭奉后主均跪安於祗見位奉后主親王退出殿右門俟贊引對引恭導皇帝退復位立贊引奏跪拜興皇帝恭代行三跪九拜禮興贊引奏請恭奉帝后神主陞寶座暨對引官恭導皇帝詣帝主拜位前跪恭奉帝主興奉后主親王入殿右門詣后王拜位前跪恭奉后王興隨於後皇帝奉安帝主於寶座接奉后主同安於寶座奉后主親王出殿右門入陪祀班皇帝退及供案前贊引奏跪拜興皇帝行三拜禮司拜褥官徹帝主后主拜褥贊引對引恭導皇帝復位立乃致祭上香讀祝三獻爵禮儀均與時饗同祭畢宗室官恭奉神位還寢室上香行禮如儀贊引對引恭導皇帝出太廟南門外陞輿還宫不陪祀王公百官朝服跪迎如儀右升祔加上尊諡儀制下禮部具疏行欽天監諏日内閣恭擬加上尊諡翰林院具祝文隨時撰擬均進呈欽定右定諡既諏吉乃遣官祗告太廟奉先殿如儀内閣翰林官書新加尊諡畢工部尚書太常寺卿詣中殿上香行三跪九叩禮恭請列聖列后神位於太廟潔室敬視漆飾既竣滿漢大學士各一人朝服上香三跪九叩敬視工部以青飾神位題字仍奉安於中殿上香行禮畢各退右改題前五日遣官各一人祗告天地社稷如常告儀右祗告致齋眂牲書祝版閲祝版眂割牲均如時饗儀其日五鼓鑾儀衛陳法駕鹵簿於午門外陳金輦於太和門外太常寺卿率屬入廟然炬明登供祝帛具器陳王公各率宗室覺羅官奉請神位如時饗儀陪祀王公百官各於其位集序太常寺卿詣乾清門奏時皇帝禮服乘輿出宫至太和門外降輿乘金輦前引後扈午門鳴鐘鼓不陪祀王公百官朝服跪候駕入太廟右門至神路西降輦贊引對引恭導皇帝由㦸門左門入殿左門詣正中拜位立乃祗告加上尊諡上香讀祝三獻送神望燎儀節與時饗同禮成皇帝還宫易補服詣奉先殿行禮如常祀儀右加上尊諡禮成恭進玉冊玉寶儀皇帝恭上皇考皇妣尊諡廟號勅工部製玉冊玉寶加上列聖列后尊諡勅重製玉冊改鐫玉寶工部於太廟街門内潔室鐫製内閣大學士禮部尚書皆朝服上香行禮如儀既成諏吉以聞右具冊寶屆日工部官豫設采幔於太廟街門内潔室設黄案於采幔正中陳玉冊玉寶設香案於黄案前張黄幄於太廟街門外之右及㦸門外之左鑾儀衛官設冊寶亭於采幔左右太常寺官設冊寶案香案於列聖位前奉冊寶王貝勒貝子公大學士尚書都統侍郎皆朝服分班序立於采幔旁祗俟屆時禮部尚書詣乾清門奏請行禮皇帝禮服出宫午門陳法駕鹵簿王公百官跪候如常儀皇帝至太廟街門外幄次盥洗畢禮部尚書侍郎各一人恭導皇帝入太廟街門至采幔正中黄案前恭視玉冊玉寶畢乃詣香案前上香司拜褥官豫布拜褥於案南正中恭導皇帝就位行一跪三拜禮興立案東西向奉冊寶王公大臣進至案前皆跪三叩興恭奉冊寶於亭内跪叩如初校尉舁亭御仗前導皇帝率王公大臣等隨行以次至太廟南門亭由中門入恭導皇帝由左門入奉冊寶王公大臣皆隨入皇帝至㦸門外幄次少俟亭入至殿外階上止以次序列均南向王公大臣詣亭前一跪三叩興奉冊寶入殿中門至案前各恭設於案上跪叩如初退司拜褥官豫布拜褥於殿門内正中皇帝由㦸門左門入陞東階入殿左門就拜位行三跪九拜禮執事王公大臣均隨行禮畢王公大臣各至冊寶案前跪三叩興恭奉冊寶行皇帝隨行至中殿立案東西向王公大臣奉冊寶分藏於金匱跪叩如初退皇帝詣各香案前以次上香畢行一跪三拜禮禮成皇帝還宫作樂王公百官跪迎如儀右進冊寶皇朝文獻通考卷一百十一
