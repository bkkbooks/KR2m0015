body:
  text: 經籍考十八子小説家農家譜録臣等謹按漢班固曰小説家流出於稗官如淳注謂王者欲知閭巷風俗故立稗官使稱説之也張衡西京賦曰小説九百本自虞初然則稗野傳竒厥來已久馬端臨權輿班志别輯是門四庫全書復析為三目凡叙述舊聞者曰襍事記録神怪者曰異聞綴緝瑣屑者曰瑣語體例益周於馬考今從而輯之其妖妄熒聽之屬則從汰焉讀史隨筆六卷陳忱撰忱字遐心秀水人臣等謹按是書採掇瑣屑間附論斷立名雖似史評實則傳記之屬故列於此玉堂薈記一卷楊士聰撰士聰字朝徹號鳬岫濟寧人前明崇禎辛未進士官翰林院檢討入國朝官至諭徳士聰自序曰古來正史所闕或得之襍録漫記以補其所不足亦識其小者之意也自余叨史局不廢記存且積有年嵗壬午再入春明感興時事乃取舊所編輯更加撰次不拘年月惟有慨於中則書之彚為一帙凡十餘年來世局朝政物態人情約略粗載於此而戲笑不經之事亦往往而在庭聞州世説無卷數不著撰人名氏題曰桃都漫士宫紫陽述客途偶記一卷鄭與僑撰與僑字惠人濟寧人前明崇禎丙子舉人玉劒尊聞十卷梁維樞撰維樞字慎可真定人前明舉人官工部主事明語林十四卷吳肅公撰肅公見經類明逸編十卷江有溶撰鄒統魯補編有溶字谷尚長沙人統魯字大系衡陽人聞見集三卷蔡憲陞撰憲陞字江雲南昌人笻竹杖七卷施男撰男字偉長吉水人順治初隨征廣西以軍功授廣西按察司副使今世説八卷王晫撰晫見襍家類秋谷襍編三卷金維寧撰維寧見史類隴蜀餘聞一卷皇華紀聞四卷王士禎撰士禎見史類惠棟精華録訓纂曰隴蜀舊游之地具詳驛程記中此又紀其所未備者也硯北叢録無卷數黄叔琳撰叔琳見經類魏兆龍序曰是書為叔琳巡撫浙江時罷官後所偶録襍採唐宋元明及近時説部亦益以耳目所聞見漢世説十四卷章撫功編撫功字仁艷錢塘人凡例曰書以語名始論語也國語記言不㕘以事陸賈新語馬上翁每奏稱善臨川世説一書諸名士所共撰述始自竹林迄於江左風流簡逺少許勝多最為可貴兹編獨尊兩漢意専叙事故不以新語名篇臣等謹按是書紀漢人言行大抵以史記漢書為主而襍以他書附益之葢仿劉義慶世説新語之體然義慶所述溯自東漢並非始於竹林且本名世説新書後人乃改為新語見黄伯思東觀餘論凡例所云誤矣過庭紀餘三卷陶越撰越字艾村秀水人右小説家襍事蚓菴瑣語一卷李王逋撰王逋字肱枕嘉興人矩齋襍記二卷施閏章撰閏章見史類臣等謹按是書多記見聞雜事舊載閏章外集中今别為著録故𨽻於此㝠報録二卷陸圻撰圻見襍家類雷譜一卷金侃撰侃字亦陶吳縣人史異纂十六卷有明異叢十卷傅爕詷撰爕詷字去異靈夀人工部尚書維麟子官至汀州府知府觚賸八卷續編四卷鈕琇撰琇字玉樵吳江人康熙壬子拔貢生官至陜西知府山海經廣注十八卷吳任臣撰任臣見史類曠園襍志二卷吳陳琰撰陳琰見經類鄢署襍鈔十四卷汪為熹撰為熹字若木桐鄉人官鄢陵縣知縣為熹自序曰此書事涉鄢陵者十之六七涉省郡别州縣者十之三四合以身之所歴目之所覩得十四卷果報見聞録一卷楊式傳撰式傳字雪崖鄞縣人信徵録一卷徐慶撰慶字賔溪自序曰烏山人未詳何地見聞録一卷徐岳撰岳字秀方嘉善人簪雲樓襍説一卷陳尚古撰尚古字雲瞻徳清人右小説家異聞豆區八友傳一卷王蓍撰蓍字宓草秀水人臣等謹按蓍以製造菽乳其名有八因呼八友各為寓名而傳之葢游戲之小品筆史二卷楊忍本撰忍本字因之南城人板橋襍記三卷余懐撰懐字無懐號澹心閩縣人右小説家瑣語臣等謹按馬端臨輯農家一門引宋三朝藝文志謂殖物寳貨著譜録者亦在助衣食之源故咸見於此然列香譜於農家何異綴錢圖於譜系懸癭引蔓厥體殊乖四庫全書於農家類盡汰榛蕪祇存本業並仿尤袤遂初堂書目之例别輯譜録一門俾酒譜茶經胥歸統𨽻變而能通善斯擇焉五朝續通考已師其例今亦從之庶幾小道可觀不以溷豳風無逸之本㫖焉欽定授時通考七十八卷乾隆六年大學士鄂爾泰張廷玉等奉敕撰皇上御製序曰孟子言不違農時榖不可勝食葢民之大事在農農之所重惟時敬授人時載於堯典周公七月一篇於日星霜露之候昆蟲草木之化詳哉其言之故先王之民莫不震動恪恭於農以修其事者懼失時也我聖祖仁皇帝勤咨民隠首重農桑率育烝黎􅇽濡徳澤六十餘載戸慶盈寧皇考世宗憲皇帝嵗舉耕耤之儀率先天下興水利廣儲蓄為萬世規凡兹薄海蒼生得荷鋤饁餉優游隴畝之間樂生遂性衣食滋豐者何莫非我祖宗宵旰勤勞以貽樂利於無疆耶朕纘承基緒鑒前代生深宫之中長阿保之手誠知稼穡艱難日與中外臣工為斯民籌食用至計胼胝機杼之作苦日厪於懐因檢前人農桑通訣農政全書諸編嘉其用意勤而於民事切也命内廷詞臣廣加蒐輯舉物候早晚之宜南北土壤之異耕耘之節儲偫之方蠶織畜牧之利自經史子集以及農家者流凡言之闗於農者彚萃成編命之曰授時通考夫天道廣運於上而四時行萬彚生地道發育於下而庶品蕃百昌遂人事㕘贊其中而六府修三農殖輔相裁成固國家之大政也趨事赴功亦閭閻之本業也貴穀劭農服田力穡上下交勉弗懈於時以副朕阜成海宇之至願覽斯編者尚有取焉臣等謹按是書凡分八門一曰天時二曰土宜三曰榖種四曰功作五曰勸課六曰蓄聚七曰農餘八曰蠶桑自土宜以下七門各冠以彚考一卷我皇上軫念民依首殷農政爰命儒臣刪纂諸書輯成是帙斟酌古今之制調劑天地之宜凡舊章政典之有禆於日用者㒺不臚陳垂美利於萬年溥盈寧於六合聖人之心抑何其詳且盡也梭山農圃三卷劉應棠撰應棠字又許奉新人豳風廣義三卷楊屾撰屾字雙山西安人臣等謹按蠶桑之法自明以前秦地久廢每逢卒嵗恒苦無衣然條桑采蘩之咏載在豳風其地固非不宜蠶桑者比屾是書備陳樹桑養蠶諸法并詳繪諸圖系以論説兼及雞豚畜字之法極為詳明近時秦紗之織傳售四方固抑賴聖天子衣被之功亦足徵屾等講求之力也右農家御定廣羣芳譜一百卷康熙四十七年翰林院編修汪灝等奉敕編聖祖仁皇帝御製序曰粤自神農氏嘗草辨榖民始知樹藝醫藥伊耆氏命羲和推步定厯以授時民始知耕穫之不愆而百工熙績偉哉開物成務啟牖來兹聖帝之功與天地並矣朕聽政之暇披閲典籍留意農桑繪耕織之圖製永言之什時巡所止親歴田間其稼穡之艱難作勞之辛苦既周知而洞悉矣每思究百昌生殖之理極萬變消長之情著為成編以佑吾民嘗謂爾雅具其名物而郭璞陸佃孫炎之流疏注埤翼又加詳焉其明備者莫如本草自本經以迄陶𢎞景蘇頌而下數十種凡採治之法無不賅核他如齊民要術月令廣義諸書其蒔植之宜為更晰矣遐稽往牘擷其英華歸於簡括良非易也比見近人所纂羣芳譜蒐輯衆長義類可取但惜尚多疎漏因命儒臣即秘府藏帙攟摭薈萃刪其支冗補其缺遺上原六經旁据子史洎夫稗官野乘之言才士之所歌吟田夫之所傳述皆著於篇而竒花瑞草之産於名山貢自逺徼絶塞為前代所未見聞者亦咸列焉復允廷臣之請益以朕所賦詠依類分載總一百卷命名曰佩文齋廣羣芳譜冠以天時尊嵗令也次榖次桑麻崇民事也次蔬茶果木花卉資厚生溥利用也終以藥物重民命也其諸天時早晚之候人事種溉之方地力彼此之殊物性良楛之異㒺弗條舉縷析燦然可觀焉是書也攬品彚之蕃滋想羣生之率育一展卷間化機洋溢於兹畢呈固不惟矜淹洽侈藻麗也以是刋布天下垂之久逺使吾民優游於農圃之中家室盈寧樂其業而不憚其勤而大夫士以及民之秀者因以區别物宜審其淑慝凛嗜好之常慎節宣之度於以躋仁夀而享泰平亦不為無所禆助也哉臣等謹按明王象晉二如亭羣芳譜多有疎漏我聖祖仁皇帝博綜萬彚涵育羣英特詔儒臣開局廣修十增六七凡天時譜六卷榖譜四卷桑麻譜二巻蔬譜五卷茶譜四巻花譜三十二巻果譜木譜各十四巻竹譜五巻卉譜六卷藥譜八卷凡逺徼遐陬之産竒花異草之名為爾雅所未聞本草所未賅者蕃然並萃博物之鴻編實古來著録家所未見也欽定西清古鑑四十卷乾隆十四年協辦大學士吏部尚書梁詩正等奉敕編諭曰邃古法物流傳有自者惟尊彞鼎鼐歴世恒逺良以質堅而體厚不為燥濕所移剥蝕所損淵然之光穆乎可見三代以上規模氣象故嗜古之士亟有取焉宣和博古一圖播在藝苑繼之者有吕氏考古圖而外此紀載寥寥豈非力能致之而弗能聚所見隘而無足紀歟我家法不事玩好民間鑒賞概弗之禁而殿廷陳列與夫内府儲藏者未嘗不富朕於幾務晏閒間加題品夷考舊圖多所未載因思古器顯晦有時及今不為之表章載之簡牘考索者其奚取徵焉爰命尚書梁詩正蔣溥汪由敦率同内廷翰林倣博古圖遺式精繪形模備摹款識為西清古鑑一編以游藝之餘功寄鑑古之逺思亦足稱昇平雅尚云爾臣等謹按是編以内府所藏法物按器為圖因圖系説每一卷成輒恭呈㸃定授梓刋行循覽之餘覺法器森羅儼然在目昔陸佃作禮象以改聶圖之失尊鼎舟彛皆從借覽以求其實矧乎祕府所儲有典有則垂之無窮讀是編者其亦可極天下之大觀而無遺憾也夫欽定錢録十六卷乾隆十五年協辦大學士梁詩正等奉敕撰臣等謹按是譜所録皆内府所藏歴代古錢卷一至卷十三上自伏羲帝昊錢下迄崇禎通寳卷十四列外域諸品卷十五撒帳吉語諸品及異錢各種卷十六厭勝諸品凡為錢五百六十有七辨明真贋圖繪形模夫錢幣之利弊可以驗國政之廢修一展覽間千古之盛衰畢著是豈徒為數典之助哉葢監古以省度者聖人之心固不遺於一物也欽定西清硯譜二十四卷乾隆四十三年大學士于敏中等奉敕編皇上御製序曰向詠文房四事謂筆硯紙墨文房所必資也然筆最不耐久所云老不中書紙次之墨又次之惟硯為最耐久故自米芾李之彦輩率譜而藏之以為藝林佳話内府硯頗夥或傳自勝朝或弆自國初如晉玉蘭堂硯璧水暖硯久陳之乾清宫東西暖閣因思物繁地博散置多年不有以薈綜粹記或致遺佚失傳為可惜也因命内廷翰臣甄覈品次圖而譜之凡舊藏者若干枚散置者若干枚新獲者若干枚其棄置庫中為之翦拂刮磨鬱為竒品者又若干枚譜既成欲命于敏中擬四六引言以行之既思題句銘辭皆自作且六日而成四十首所為惜淪棄悟用人慎好惡戒玩物無不三致意焉則又不可以無文而不序其梗概也昔許採一文人耳藏硯幾至百枚兹百年太平石渠天禄之府貯硯多至二百枚亦不為過而予以為己過者葢意有所好必有所繫若謂文房之資立言傳道有異他物之為嗟夫是予所以自解乎抑亦所以自訟乎臣等謹按是譜取内府所藏各硯圖其正背間及旁側並恭摹御製題銘與前人之款識凡尺度材質形製之殊悉皆詳述而收藏賞鑒諸家姓名及舊人銘跋諸臣奉敕所題均得附録宸章之後計瓦石之屬為硯二百凡四百六十四圖後附松花紫金駝基紅絲諸品及仿製澄泥各種為硯四十一凡百有八圖古藻之垂照映萬古於以上供乙覽傳示來兹自有硯譜以來未有如是之大觀者也異魚圖贊箋四卷異魚圖贊補三卷閏集一卷胡世安撰世安見經類臣等謹按異魚圖贊明楊慎所著間有自注世安因而箋之辨證頗悉又因其闕漏作為補編古雋亦略與慎等倦圃蒔植記三卷曹溶撰溶見史類漫堂墨品一卷怪石贊一卷宋犖撰犖見史類雪堂墨品一卷張仁熙撰仁熙字長人號藕灣廣濟人曹氏墨林二卷曹素功編素功字聖臣歙縣人嵗貢生官布政司經歴續茶經三巻附録一卷蓺菊志八卷陸廷燦撰廷燦見襍家類臣等謹按是編視陸羽經多至十倍依原例分一之源二之具三之造四之器五之煑六之飲七之事八之出九之略其十之圖不傳補以茶具茶器圖蓺菊志凡分六類以所繪蓺菊圖題詞附之觀石後録一卷毛竒齡撰竒齡見經類竒齡自序曰嘗見友人髙兆作觀石一録流傳人間故此曰後録北墅抱甕録一卷高士竒撰士竒見經類漢甘泉宫瓦記一卷林佶撰佶字吉人侯官人康熙乙卯舉人壬辰特賜進士授内閣中書烏衣香牒四卷春駒小譜二卷陳邦彦撰邦彦字世南海寧人康熙癸未進士官至内閣學士兼禮部侍郎茶史二卷劉源長撰源長字介祉淮安人居常飲饌録一卷曹寅撰寅字子清號楝亭鑲藍旗漢軍人康熙中巡視兩淮鹽政加通政司銜酒部彚考十八卷不著撰人名氏茶花譜三卷舊題樸靜子撰不著姓氏竹譜一卷蛇譜一卷陳鼎撰鼎見史類箋卉一巻吳菘撰菘字綺園歙縣人臣等謹按宋犖嘗題黄山僧雪花所繪黄山諸卉圖菘取其題詞各為作箋故曰箋卉晴川蠏録四卷後録四卷孫之騄撰之騄見經類苔譜六卷汪憲撰憲見經類畫睂筆談一卷陳均撰均字康疇歙縣人名花譜一卷舊題西湖居易主人撰不著名氏右譜録皇朝文獻通考卷二百二十八
