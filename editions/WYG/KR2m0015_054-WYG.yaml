  text: 欽定四庫全書皇朝文獻通考卷五十四
  hash: sha256:db2b6575cad21b492197fc621798b01bdd6e62fe8c790c61412fd8698a9f9913
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_054-1a, image: WYG0633/WYG0633-0345a.png}
body:
  text: 選舉考八任子臣等謹按虞書有云賞延于世而殷盤誥誡亦云世選爾勞葢因乃祖乃父之勤於王事而恩及其子孫任子之制從來尚矣西漢門廕人才最盛如蘇武之忠汲黯之直劉向馮野王之文學吏治皆在于是則任子中亦大有人在也第以恩澤得官其類不一有賜任者有奏任者有恩任者如南郊聖節致仕遺表秩滿兩任皆得廕及子弟所謂尚嬉竹馬已獲荷囊未應娶婦已得任子時已覺其太濫至如東漢延熹中宦官任子布滿州縣故明王振廕及貂璫拖朱曳紫比比皆是又其甚焉者矣我國家慎重名器不以爵賞濫施凡勲閥故家子孫或襲世爵或襲世官皆得以才地與選宿衛日侍殿廷教訓而成立之以備國家楨幹之選其因恩詔賜廕者例應視祖父品級入監肄業考試授官又慮其稚齒顓蒙恃前人之資廕面墻不學蒞事為慙是以令在部學習行走分别優劣以辨去留其長于騎射願改武途者聴之既以昭朝廷世及之恩亦以安臣子承家之分所謂仁之至義之盡也至人臣臨危盡節致命遂志不復慮及後昆而卹典施於身後裔嗣以難廕受官是又我國朝所以勸忠既徃垂訓方來不嫌于優渥者也因述選舉備著於左方順治十一年國子監奏覺羅廕生一例送監讀書俟月分滿日亦與官員廕生一例照等銓授從之十三年定滿洲蒙古恩廕例一品二品官廕生俱以六品博士用三品官廕生以七品筆帖式用十八年奉恩詔滿漢官員文職在京四品以上在外三品以上武職京外二品以上送一子入監讀書三年期滿候銓凡官員非現任者及未承廕之先曾經縁事治罪者俱不准廕至康熙三年題准各官廕監生其父緣事革職其廕子未仕者革廕已仕者免止於降調者仍留廕康熙六年定各官不論品級暨宫保等銜均照實俸廕子其遇詔各官廕子均查明准廕以後稱遺忘補請者不准康熙十年議准文職雖革尚存武職者仍留廕康熙十二年定原品解任食俸者准廕武職恭遇恩詔鑾儀衛鑾儀使提督總兵及帶一品銜管副將事等官各准廕一子入監讀書都督僉事管副將事及􅄁將管副將事者各送一子入監讀書其署副將以下小銜副將不准廕監康熙元年奉諭㫖原任大學士希福范文程寗完我額色黒皆自太宗文皇帝厯任内院賛理機務効力最久勤勞素著其子宜加擢用以示鼓勵范文程子范承謨額色黒子塞色黒已補内院學士希福寗完我各一子亦著以學士用吏部題請補用恩廕生秦保等十四人得㫖長春宫讀書大臣之子均䝉世祖章皇帝選入今當補用在内俱著授以二等侍衛在部院俱著授以郎中三年定承補恩廕例凡承廕先以嫡長子孫如嫡長子孫出仕或有故方廕適次子孫無適次子孫方廕庶長子孫庶長皆無方廕弟暨兄弟之子應合承繼者其子孫在詔後生者不准廕其廕生未仕而故准補一人患病殘廢者騐明退廕别補已補而又故者不准再補又定各官廕監生已得官職暨科目中式者不准補廕定漢軍難廕生均以州縣選用凡漢軍難廕生例俱以知縣知州隨到隨補漢人難廕生例俱以小京官用據廕生袁象乾等呈稱缺少人多永無補用之期得㫖漢軍漢人陞轉既已一體以後漢人難廕生俱著照漢軍之例行旋議改漢軍廕監生亦照舉人例以知縣用又定漢軍漢人殉難廕生三品以上者以知州用四品以下者以知縣用布按都三司首領及州縣佐貳六品七品官之子以縣丞用八品九品官之子以縣主簿用未入流之子以州吏目用六年准旗人廕監生分别學習定例滿洲䝉古漢軍廕生監生武官之子以部院衙門用文官之子照品級隨旗上朝至是吏部奏准嗣後不論文武年二十以上者照分部進士之例分派各部院衙門學習二年期滿果行走勤慎熟悉部務該堂官奏准移咨吏部照例銓補其有才識出衆之員許堂官指名具題即行捕用其不能學習情願隨旗上朝者各照品級准其隨旗上朝或已經學習而行走平常不能辦理部務者咨回該旗行走定廕生授官例公侯伯一品官廕生以部院衙門五品缺用二品官廕生以六品缺用三品官廕生以七品缺用四品官廕生以八品缺用尋定恩詔廕生漢正一品官以員外郎治中用從一品官以主事用正二品官以主事都察院經厯京府通判用從二品官以光禄寺署正大理寺寺副用正三品官廕生以中行評博通政司經厯太常寺典簿用從三品官廕監生以光禄寺典簿鑾儀衛經厯詹事府主簿京府經厯用四品官廕監生與捐貢監考職人員一體考定職銜入於應選分内分缺輪班選授漢軍正一品從一品官以員外郎用正二品從二品官以主事大理寺寺正用正三品從三品官以七品筆帖式用四品官以八品筆帖式用八年吏部奏定八旗滿洲漢軍文武官員廕生監生内有不能兼習滿漢字者有蒙古廕生監生内不識滿字亦有全不識字者不便以部院衙門用應報明吏部或願學習或願子弟頂補或願隨旗上朝分别辦理又加恩舊臣之子廕户部尚書蘇納海子瓦爾達兵部尚書朱昌祚子朱紱工部尚書王登聮子王盛唐入監讀書以通政使左右通政大理寺少卿督捕左右理事官等缺用九年准包衣下官員子弟一體承廕凡包衣佐領下官員子弟向不准為廕生監生至是吏兵二部奉諭㫖内外官員効力相同加恩豈宜有别嗣後包衣佐領下官員子弟准為廕監爾部定議具奏尋議包衣下一品官子弟許其承廕二品至四品各廕一子入監讀書從之又禮部奏據國子監呈稱順治初年八旗官學生不論文武官員子弟每佐領下選擇二名移送國子監教習順治十八年停止今奉諭㫖文武廕生仍以部院衙門録用以後應仍遵徃例送監學習應如所請從之十三年兵部奏舊例武職官陣亡皆照依職任閒散之官未經議及至是奏准將有部劄効用閒散各官陣亡者不論銜級大小皆廕子弟一人以衛千總用十四年賜殉難副將逰擊各廕子弟一人以守備用外委官俱廕子弟一人以千總用福建江西陣亡殉難官皆倣此例又吏部奏靖逆將軍甘肅提督俟張勇出首逆賊吴三桂偽劄今又恢復河州洮州為國効力克盡忠誠應將伊子一品官廕生張雲翼從優以大四品京堂用從之五十二年宗人府以宗室内素無廕子入監讀書之例奉萬夀恩詔授宗室之子為廕生其應將何等宗室給與廕生及廕生入監讀書期滿作何行走之處具奏奉㫖未入八分公以下鎮國將軍輔國將軍及宗室内為一二品大臣者俱准給廕生其廕生入監讀書之後即令隨旗行走雍正元年定考試廕生例先是文武廕生監生由國子監肄業期滿咨送吏部係武職廕生咨查兵部品級題廕年月有無事故文職廕生吏部查照品級題廕年月俱俟國子監咨送到日吏部將年二十以上者查明有二三人到部即考試履歴進呈帶領引見歸于月分先後挨選其同日題廕者照題疏先後録用未經考試者不准銓選至是奉諭㫖内外廕生監生等到部考試繙譯書法再分派各部行走令伊等咸得勉力學習至世襲官員所得三品廕生内若考試有列優等者仍著奏聞賜以所應得原品如此則伊等必痛自砥礪以求上進不但國家得有用人才足供任使即各部院衙門亦不至令無知子弟羣厠其間率意肆行為衆人所譏議矣三年考試八旗滿洲漢軍廕生頭等遇缺即用二等照本班挨次補用三等隨旗上朝吏部議覆詹事錢以塏條奏嗣後提鎮諸臣所得廕生除通習文理者照例考試以文職補授外其有幼習武藝人材壯健願改武職者令其呈明吏部移咨兵部考試簡用凡廕生改用武職者京官一品尚書等官及外任總督將軍廕生俱以都司僉書銜管都司僉書用二品侍郎等官及巡撫提督廕生俱以署都司僉書銜管都司僉書用三品副都御史通政使等官廕生總兵官布政使廕生俱以守備銜管守備用按察使廕生加一品大銜副將廕生俱以署守備銜管守備用二品銜副將之廕生以守禦所千總用小銜副將之廕生以衛千總用又定廕生願改武職者呈部咨送考騐弓馬技藝將年力精壯者帶領引見恭候欽㸃侍衛外其餘或交巡捕營行走學習或交外省督撫提鎮隨營試用俟弓馬熟嫻營務通曉在巡捕營者該統領帶領引見交兵部按品補用都司以人文到部先後補用守備衛千總於各班之末輪補一人守禦所千總歸入劄班内補用在外省試用者該督撫提鎮按品題補四年領侍衛内大臣等奉諭㫖朕思教育三旗之記名功臣子孫若令伊等在一處讀書則教授之人必不加勉而衆幼童聚於一處亦不得實在肄業將此内二十嵗以上曽習清漢書者各與二兩錢糧米石令在部院為貼寫筆帖式該管大臣將優者保奏以筆帖式補用若二十嵗以上之不曽讀書者照䕶軍與四兩錢糧米石令在捕牲執事人處行走優者即可用為侍衛或補授官職其十九嵗以下者如在家􅀎延師教訓無容併及其餘每月與四兩錢糧以為延師肄業之費此次恩施并將大臣等之子孫一體均沾交伊等父兄令將子弟之文武學業加意教訓俟伊等至二十嵗時奏聞朕所以如此施恩者凡欲成就功臣之子孫也伊等父兄理宜仰體朕心各自諄切教其子弟庶文武學業俱得漸進以底於成就矣五年吏部以八旗廕本具奏上命𫝊集八旗廕子之公侯伯及官員等宣諭以承廕子弟年俱幼穉不能辦理部務徒被叅革暫給三品廕生令其勉力學習成材之日奏聞請㫖六年以廕子奨督工死事員弁松江府知府周中鋐山清裏河把總陸章督築吴淞江險工被溺身故加贈周中鋐太僕寺卿廕一子入監讀書陸章廕一子以衛千總用十年勅陣亡之阿岱等七員均廕一子入監讀書乾隆元年廣西右江總兵潘紹用無子奏請將堂弟潘紹堯承廕特㫖允行三年奉諭㫖我皇考酬庸念舊特立賢良祠於京師俾我朝宣勞輔治完名全節之王大臣永承禋祀垂譽無窮實自古未有之曠典也賢良大臣之子孫已登仕籍者固多其中或有不能自振漸就零落之人亦屬可憫朕仰體皇考厚待耆舊之盛心加特恩一次除現在入祠之子孫有文官七品以上武官五品以上者已經録用無庸查奏外如子孫並無仕宦或有品級而甚屬卑微者著該部行文各旗都統及直省督撫查係嫡裔擇其品行才質可以造就者給咨送部帶領引見候朕酌量加恩四年定官員革職後不論文武職銜如品秩相當及在原品以上皆准復還原廕兵部奏桌子山案内議叙陣亡官弁可否仍准廕子推用奉諭㫖此案陣亡官弁俱准賜廕三十四年諭什狄所立之雲騎尉照依所奏著過繼伊兄什京之孫訥音布承襲但此項所立之官襲次已完仍賞給伊子嗣恩騎尉世襲罔替此特矜卹陣亡之人施恩於其正派子嗣其過繼之子即不應承襲訥音布並非什狄之正派子嗣其應襲雲騎尉襲次已完不必承襲恩騎尉永著為例又諭内外文武大臣皆分職任事為國宣力分應予廕世爵公侯伯等祖父勛庸懋著錫慶承家即照一品予廕亦與延賞之義相符若子爵男爵之一品二品或先世績本稍微或承襲久而逓減平日並無職任不過朝期上班及本旗應差不應與内外大臣公侯伯等一體予廕著照雍正二年諭㫖子爵視三品官男爵視四品官下部議行三十九年諭前因陣亡員弁深堪軫念曽經降㫖於伊等襲職次數已完復著賞給恩騎尉令其世襲勿替著為令其原官之嫡嗣准照此例承襲若係絶嗣撫養兄弟之子者於承襲世次已完時無痛給與恩騎尉今覽正藍旗滿洲都統進呈承襲原任前鋒校兆海所得之雲騎尉家譜内開兆海在四川軍營受傷身故由部遵㫖議卹照陣亡之例准襲雲騎尉二次因無子嗣將過繼伊兄伍什哈達之次子承襲等語此項受傷身故人員朕因念其勞績與陣亡人等一例議叙給與世襲已屬格外殊恩若承襲世次已完并給與恩騎尉則與實在陣亡者無别此等人員如承襲世次已完不但過繼兄弟之子不應賞給恩騎尉即有子嗣者亦不應令其承襲嗣後此項受傷身故人等朕特加恩與陣亡人等一體襲職者惟將應襲之官照例承襲無論有無子嗣於承襲世次已完時槩不准承襲恩騎尉著為令又諭向來八旗人員身任旗職如遇陣亡等事子孫議給世職其有年未及嵗者並照應得世職給與半俸至旗人簡用綠營官員陣亡議卹子孫即照綠營官職予以廕生其年未及嵗者未經議給應得分例苐思此等同為旗人雖予廕之例不可易而効命疆場其子孫當幼稚之時養贍無資情殊可憫嗣後無論旗人補用綠營及綠營中漢員遇有陣亡議廕其子孫年未及嵗者俱著一體加恩賞給馬糧一分以示優卹維均之至意四十年諭向來滿洲人員簡放綠營將佐者遇有應得卹廕其子弟照綠營例應以營員補用上年經侍郎阿揚阿條奏以此等人員若概以營員補用恐年少易染習氣弓馬轉致生疎請由部帶領引見分别旗營兩用業經八旗大臣㑹議准行今思此内經引見朕定以綠營録用者究屬年幼未經諳練驟放外省既於營務未諳且一時不能得缺在家守候仍不免於閒曠莫若令伊等在京營等處學習當差以資造就四十七年諭正白旗滿洲都統以隔旗同姓拉世喜之輕車都尉減等承襲雲騎尉富森布病故照乾隆三十年八旗王大臣等辦理之例奏請停其承襲三十年八旗王大臣等請將隔旗同姓子孫承襲之富森布二十員停其承襲等因具奏彼時朕即降㫖現在查出人員俟出缺之時再行辦理何必預行議定况拉世喜由班濟之輕車都尉已減至雲騎尉而隔旗同姓之富森布承襲已經三輩旗人惟賴俸餉度日今若停其承襲不惟初立世職之人絶其禋祀而出缺人員子孫不得食俸自至拮据實不副朕矜恤旗人之至意著加恩將富森布之雲騎尉交該旗㨂選應行承襲人員帶領引見令其承襲嗣後八旗此等隔旗同姓子孫承襲世職如已過三輩者俱著世襲罔替永逺為例四十八年諭朕披閲明臣奏議熊廷弼為遼東經畧時抒誠効命所奏諸疏具見忠鯁而其時主闇政昏不惟不用其言轉致身罹重辟深可憫惻因降㫖查其現在有無子孫曽否出仕兹據舒常等查奏熊廷弼後裔均以務農為業惟次支之五世孫熊泗先業儒人尚明白等語熊世先著加恩以訓導用該督撫即行咨補俟六年俸滿後如果堪膺民社再行保舉送部引見又諭朕披閱明史袁崇煥督師薊遼尚能忠於所事而其時主闇政昏不能罄其忱悃以致身罹重辟深可憫惻因降㫖查其現在有無子孫曽否出仕兹據該撫尚安查奏袁崇煥無嗣伊嫡堂弟文炳之子入繼為嗣現有五世孫袁炳並未出仕等語所奏尚未明晰袁炳如果文理通順即照熊廷弼裔孫之例以訓導咨補俟其六年俸滿察其堪膺民社再行保舉送部引見如僅能粗曉字義人尚明白即以佐雜等官補用若未經讀書以務農為業即賞給八品頂帶榮身臣等謹按明臣熊廷弼袁崇煥先後守邊備著勞績明季紀綱不振黨論紛呶是非倒置遂使任事之臣並罹重辟自經明史論定公議始昭兹復邀聖主褒嘉録及後嗣盛世勸忠之曠典洵與覆幬同符矣四十九年諭福康安奏逆回攻擾通渭縣時有告休在籍知縣李南暉帶領子姪協力守禦城陷罵賊遂為所害其子貢生李思沆同時被殺伊姪監生李師沆亦即投繯殞命李南暉著加恩賞給知府職銜並著該部即照知府陣亡例議給卹廕嗣經吏部遵議李南暉加贈太僕寺卿准廕一子入監讀書六月期滿照例以知縣注册銓選從之五十年諭緑營員弁除軍功議叙卹賞仍照舊辦理若陣亡人員無論漢人及旗人用於緑營者總與旗人一體給與世職即襲次已完亦應照例酌給恩騎尉俾賞延於世以示朕奬勵戎行一視同仁之至意尋經軍機大臣㑹同兵部議奏請將文職難廕與武職均歸一體辦理一定例旗員先受世爵將陣亡者按其等差加以應贈之秩合為一爵令其子孫承襲至一等公以上無爵可加令其嫡子襲其一等公以别子襲嗣後緑營人員均照辦理一文武陣亡人員應襲世職俟襲次完時均照旗員例給與恩騎尉世爵一世職承襲人員令該督撫查明年嵗照依旗員之例年已十八嵗者送部引見承襲發標學習准食全俸其年未及嵗者給與半俸定因公差委漂沒身故卹典兵部議覆署兩廣總督孫士毅奏廣東吴川營把總傅君召管駕該營在厰修竣戰船駕駛回營遭風漂至外洋擊碎淹沒身故請照陣亡例卹賞向例大洋大江危險地方凡官兵因公差委漂沒身故者照陣亡例辦理若在内洋内河漂沒身故者照陣亡例減一等辦理近䝉皇上特恩將陣亡緑營官員照旗員例一體改給世職伏思官員巡洋遭風猝遇不測固屬因公殞命但究與身先士卒効命疆場捐軀鋒鏑者有間若因陣亡廕贈舊例已删概照打仗陣亡新例議給世職似無以示區别而昭平允臣等酌議嗣後官員因公差委在大洋大江遭風淹斃及在内洋内河因公淹斃者仍按其官階各照舊例分别給予廕贈卹賞將舊例内照陣亡字様删去庶因公身故人員仍得仰沐恩施而延賞酬庸亦不致倖邀曠典從之増定軍營立功病故人員卹廕例時兵部將在軍前打仗列為超等未經咨部議叙即在軍營病故原任逰擊達賴保之子文格照例廕給七品監生具奏奉㫖令查明向例另行酌議尋議查定例陣亡者照品級給與世職出征立功未經議叙旋在軍營病故者照立功等第給予廕監一次似應照舊辦理惟已經議叙人員向以業經給有功牌功加病故後即不再議予廕是較之未經議叙得有廕監者轉覺偏枯請嗣後出征立功在軍營病故人員無論旗員緑營曽經議叙及未經議叙者均令兵部查核該領兵大臣原保等第一體照例給予廕監從之吏道臣等謹按周有府史胥吏漢有郡縣掾之屬即今之吏員也三代時人各以才地自安筦庫之士咸世其家終其身無外慕至漢則刀筆吏或至為宰相封列侯於是乎智計輻輳之士有不嫌以吏道入官者後世文武各途皆資拜獻為士者既不屑屑于吏其人之年力已長無所成就又不能霑體塗足束身南畆者徃徃歸于是以資其生自其祖孫父子居通都大邑日事侈靡勢必因事而有所索取我世宗憲皇帝懲其積蠧於是有役滿占缺之禁有回籍候選之條不使久住京師為滋弊淵藪近年以來皇上遇事重懲防微杜漸兼之五年期滿議叙得官亦可以贍其衣食夫治道去其太甚既防其有作奸犯科亦予之以微勞銓叙立法均平無踰是者謹以吏道出身銓用之法叙列于左順治五年吏部奏言佐貳雜職等官例由吏員充選今考定者俱經選用而懸缺尚多應令内外各衙門將辦事吏員自順治元二兩年實厯至今者俱確查送部照例考補得㫖允行仍諭嗣後吏員實厯五年即與考取著為令十二年吏部議覆山東道監察御史王秉乾疏言軍前委用官員必詳勘履厯方可給劄有以吏員出身而經委署府州縣正官者如部選有人繳劄到部俱應以首領縣佐用永著為例從之定吏員考職例内外各衙門吏員役滿考職自正八品以下至未入流十五年分為五等止與九品以下職銜至康熙三年分為四等一等以正八品經厯用二等以正九品主簿用三等以從九品用四等以未入流雜職用分班銓選康熙五年吏部議覆科臣碩穆科疏言吏員一途雖係微末亦闗係國家名器乃竟有冒名頂替之人嗣後各衙門起送年滿吏員應給與印信執照開明年貌籍貫并充役咨部日期付本人收執於畫憑領憑之日送部科查驗以杜頂冒之弊應如所請從之十五年以考定吏員發徃陜西以陜西總督哈占疏稱平凉固原等處地方已經恢復州縣佐貳驛丞大使需員補用故也雍正元年都察院奉諭㫖各衙門募設書辦不過令其繕寫文書收貯檔案但書辦五年方滿為日已久熟于作弊甚至已經考滿復改换姓名􅇡入别部奸弊叢生更有一等缺主名色子孫世業遂成積蠧自後書辦五年考滿之後各部院堂司官查明勒令回籍聴選如有逗留不歸者飭令五城司坊官稽查遣逐二年奉諭㫖吏員捐納出身知縣以上官員直省共有幾人著查明奏聞尋查明覆奏得㫖現今查出者其居官優劣之處著督撫出具保結報部如不詳細報明日後發覺將隠蔽之上司一併革職五年定倉書儒士録用例吏部議奏京通各倉倉書五年後滿倉糧毫無虧空咨送到部免其考職以從九品未入流二項兼掣再禮部儒士食糧三年期滿咨送過部免其考職以府檢校典史選用乾隆五年奉諭㫖前經吏部議覆役滿書吏應飭令回籍其中願就揀選之人於三個月㨂選一次帶領引見將奉㫖准用者註册俟將來外省請人時派徃等語昨日已經引見一次為數亦止五人朕思此等微員一年之中頻頻引見亦覺非體嗣後著交與大學士㑹同吏部堂官三月揀選一次將姓名奏聞請㫖著為例四十九年吏部疏言從九品款項繁多以吏目為最優捐納從九品人員不得選用吏目獨供事議叙從九品得以兼用未為平允請更定照捐納從九品之例不得選用從方伎崇徳八年内院大學士希福等以黒星通曉厯法奏用之并賞給房舎衣服等物順治十二年欽天監監正湯若望九考年滿加通政使司通政使銜賜二品頂帶仍管欽天監事十三年太醫院加太常寺少卿仍管院使事韋盡性太醫院加鴻臚寺卿仍管右院判事劉國棟俱考滿加太常寺卿康熙七年禮部奉諭㫖天象闗係重大必得精通熟習之人乃可占騐無誤著直隸各省督撫曉諭各屬地方有精通天文之人即行起送來京考試於欽天監衙門用與各部院衙門官員一體陞轉八年授西洋人南懐仁為欽天監監副先是欽天監官按古法推算康熙八年以十二月置閏至是南懐仁言雨水為正月中氣是月二十九日值雨水即為康熙九年之正月不當置閏置閏當在明年二月上命禮部詳詢欽天監官多直南懐仁乃罷康熙八年十二月閏移置康熙九年二月其節氣占候悉從南懐仁之言授為欽天監監副雍正七年添設太醫院七品御醫五員其原設吏目三十員定為八品吏目十員九品吏目二十員乾隆二年奉諭㫖在璣衡以齊七政視雲物以騐嵗功所以審休咎備修省先王深致謹焉今欽天監厯象考成一書於節序時刻固已推算精明分釐不爽而星官之術占騐之方則闕焉未講但天文家言互有疎宻非精習不能無差海内有精曉天文明于星象者直省督撫確訪試騐術果精通著咨送來京該部奏聞請㫖三年大學士伯鄂爾泰奏據太僕寺少卿成徳欽天監監正明圖等詳籌官學事宜查算法為六藝之一最為纎宻肄業必得専功應専立一學即在欽天監附近之地額設算學生三十六名滿洲十二名䝉古八名漢軍六名漢人十二名滿洲蒙古漢軍即于八旗官學生内擇其從前學過算法資質相近而願學者不拘旗分選取漢人無論舉貢生童或世業子弟具呈國子監移送該學考試秉公録取教習之法欽遵御製數理精藴次第教授線面體三部各限一年七政共限二年毎季一小試每嵗一大試届期該學㑹同欽天監公同考試又算學應額設助教一員教習二員即于現在奉停算法教習十六員之内㨂選其助教㨂選如何補用及期滿議叙應交部議算學生學有成效自不應選用别項應考用欽天監衙門應用各缺亦請交部議定又新設算學必得通曉算法之大員經理其事請交順天府府丞梅㲄成原任侍郎何國宗協同太僕寺少卿成徳管理從之又禮部奏浙江杭州府生員張永祚通曉天文明于星象應令其在欽天監天文科行走奉諭㫖張永祚著授為欽天監八品博士皇朝文獻通考卷五十四
