body:
  text: 欽定四庫全書皇朝文獻通考卷一百二十九王禮考五朝儀皇太后三大節朝賀臣等謹案古者命婦有朝女君之禮唐開元禮載太皇太后皇太后及皇后受羣臣朝及外命婦朝㑹儀我朝列聖以孝治天下御極之始尊奉慈寧每遇三大節親率王公大臣行慶賀禮皇上嗣位以來尊養聖母皇太后問安視膳典禮有加恭遇慈夀中外臣民同申慶祝我皇上推恩錫類周匝寰區仰見聖朝家法禮制尊崇孝養備隆情文並摯允為皇古以來所未有臣等職司載筆謹拜手稽首以志盛典云順治三年正月己酉朔世祖章皇帝詣皇太后宫行禮畢受諸王大臣朝賀八年四月定皇太后三大節禮儀是日皇太后儀仗全設皇帝皇后詣皇太后宫皇太后升內殿皇帝皇后先行禮畢還宫公主和碩福晉以下都統尚書子命婦以上俱詣皇太后宫行禮十年二月甲辰世祖章皇帝率內大臣侍衛等詣慈寧宫預行慶賀皇太后聖夀禮乙巳公主和碩福晉以下一品命婦以上行慶賀禮賜宴臣等謹按二月八日孝莊文皇后聖夀節是嵗以社稷齊期故移於前一日康熙八年定元旦冬至次日太皇太后皇太后宫慶賀禮儀凡元日太皇太后皇太后儀駕俱全設皇帝御禮服率王公內大臣侍衛暨都統尚書子以上咸朝服先朝於太皇太后宫畢次詣皇太后宫行禮次皇后御禮服率公主福晉命婦咸朝服朝於太皇太后宫畢次詣皇太后宫行禮長至次日皇帝率王公大臣詣太皇太后皇太后宫行禮次皇后率公主福晉命婦行禮與元曰同十七年二月己酉太皇太后聖夀節聖祖仁皇帝親撰表文率王以下文武大臣侍衛等詣太皇太后宫上表行禮十八年二月癸酉太皇太后聖夀節遵懿㫖以春分齊戒更於初十日行禮乙亥聖祖仁皇帝率諸王文武大臣侍衛等詣太皇太后宫補行慶賀禮二十一年正月定太皇太后皇太后三大節慶賀行禮時令在京文武官貟及直省進表官員於午門外行禮二十二年二月禮部議凡遇喜慶皇上於太皇太后皇太后宫行禮時王以下入八分公以上內大臣侍衛大學士等照常隨行禮八旗一品大臣及滿漢尚書俱令在午門外衆班內行禮從之是嵗又定寧夀官行禮時置糾儀御史二人於寧夀門外二人於儀駕末二人於午門外監禮三十九年十月壬戌皇太后六十聖夀聖祖仁皇帝率羣臣行慶賀禮是日王以下輔國將軍以上民公侯伯子大學士內大臣都統尚書左都御史護軍統領前鋒統領副都統侍郎直省將軍總督巡撫提督總兵官各恭進慶賀儀物陳午門外聖祖仁皇帝率文武大臣侍衛詣寧夀宫行禮次妃嬪暨公主福晉以下都統尚書子命婦以上行禮如儀四十九年十月甲子皇太后七十聖夀聖祖仁皇帝率王以下文武大小官員行慶賀禮儀與三十九年同六十一年十二月王大臣等奏請雍正元年元旦詣皇太后宫行慶賀禮奉懿㫖停止行禮乾隆二年正月庚寅朔停止王大臣等詣皇太后宫行禮前期諭內閣曰朕前降㫖明年元旦停止御殿受朝皇太后前照常行禮今奏知皇太后蒙降懿㫖明年元日尚在世宗憲皇帝服制二十七月之內皇帝既不受朝其王大臣赴慈寧宫行禮亦著停止十一月禮部奏皇太后聖夀日皇帝詣皇太后宫進表儀注得㫖每年用進表儀注遇大慶之年用宣表儀注五年十一月定皇太后萬夀聖節大小臣工咸服蟒袍七日不理刑名著為例六年十一月皇太后五十聖夀上率諸王大臣行慶賀禮前期諭曰本年十一月二十五日恭遇皇太后五十萬夀普天同慶伏查康熙四十二年聖祖仁皇帝五旬大慶曽經賞賚八旗年老人等今年朕亦欲將在京八旗官員及男婦太監等年六十以上者加以恩賞此等老人於皇太后自暢春園回宫之日欲瞻仰跪接者不必禁止其年老艱於步履者亦不必勉强是月丙子大學士等奏言皇太后聖駕回宫凡在夀康宫前行禮之滿漢一二品文武大臣懇請瞻仰跪接得㫖著於西安門外跪接癸未皇太后聖駕進西直門上出西華門請安奉皇太后詣豐澤園進膳丙戌聖夀節上率諸王公大臣等行禮百官于午門外隨行禮上侍皇太后筵宴畢回宫七年十一月丁丑上以皇太后聖誕預行慶賀禮是嵗十月禮部奏本年十一月二十五日庚辰皇太后萬夀聖誕次日適屆冬至令節皇上先期躬詣齊宫所有慶賀典禮請於二十二日預為舉行得㫖是十二年正月禮部議向例凡遇慶賀大典皇太后宫行禮公主福晉以下止及一品大臣命婦謹按祭先蠶壇二品大臣命婦皆與嗣後凡遇慶典二品命婦亦准入班行禮從之十四年四月諭朕閲禮部所進儀注朝賀皇太后行禮之世爵大臣止列入公侯伯子而男爵則未之及蓋因男爵原係二品向例惟一品大臣在長信門外行禮後以人數過少增入侍郎副都統而禮部所進儀注仍循前例不及男爵是五等之班竟闕其一未為允協著一併增入十六年十一月皇太后六十聖夀加上徽號上率王公大臣等行慶賀禮頒詔天下先期建夀安宫為奉觴之所王公宗戚六部八旗卿寺各衙門直省督撫在京紳士耆老自髙梁橋至西華門豫設綵棚樂劇恭祝聖夀是月癸未上奉皇太后御大安輦自暢春園進官設鹵簿上御龍袍衮服乘騎前𨗳王公大臣咸蟒袍補服滿漢命婦咸采服各於祝夀綵棚前夾道跪迎皇太后頒賜賞賚各有差皇太后進宫上率皇后貴妃妃嬪侍皇太后於夀安宫稱慶凡九日乙酉上率王公大臣詣慈寧宫恭上崇慶慈宣康惠敦和裕夀皇太后徽號進册寶行禮戊子皇太后聖誕日上率王公大臣侍衛詣慈寧宫行禮宣表文文武百官及休致降革官給豫品銜者并進士舉人貢生俱於午門外生監耆老於天安門外各行禮皇后率貴妃妃嬪於慈寧宫行禮如儀自是月十四日始至二十八日止王公百官咸蟒袍補服不理刑名二十六年十一月皇太后七十聖夀加上徽號上率王公大臣等行慶賀禮頒詔天下前期內外王公大臣官貟在京紳士耆老豫設綵棚樂劇恭祝聖夀上親撰聖母皇太后七旬萬夀連珠詞製圍屏恭獻至是月己酉上奉皇太后自暢春園進宫皇太后乘大安輦上御龍袍衮服乘騎前導王公宗室滿漢文武大臣官員及回部郡王霍集斯等各於恭祝萬夀亭前以次跪迎其年逾七十以上之親王及文職大臣和碩履親王允祹和碩顯親王衍潢大學士來保大學士史貽直吏部尚書傳森工部尚書歸宣光吏部侍郎勒爾森禮部侍郎何國宗左副都御史張泰開九人共六百七十七嵗武職大臣內大臣博爾本察盛京將軍清葆護軍統領保平散秩大臣噶錫泰散秩大臣巴海直𨽻提督吳進義副都統班第副都統黑色副都統集成九人共七百二十二嵗在籍文武大臣禮部侍郎加尚書銜沈德潛刑部侍郎加尚書銜錢陳羣左都御史吳拜左都御史木和林吏部侍郎德麟工部侍郎范燦內閣學士鄒一桂副都統李世倬三品職銜多倫九人共七百四嵗御製九老㑹詩賜遊香山御園及皇太后安輿回宫諸老臣分列三班跪迎懿㫖頒賜賞賚有差每日上率皇后貴妃妃嬪侍皇太后膳於夀安宫甲寅上率王公大臣詣慈寧宫恭上崇慶慈宣康惠敦和裕夀純禧恭懿皇太后徽號躬進册寶行禮禮成御太和殿頒恩詔中外是日上詣慈寧宫侍皇太后宴上綵衣躬舞捧觴上夀和碩和親王𢎞晝和碩果親王𢎞瞻皇四子永珹皇五子永琪皇六子永瑢皇八子永璇皇十一子永瑆皇十二子永璂皇長孫綿德皇次孫綿恩公永珌公永璸永瑍永珅額駙色布騰巴爾珠爾額駙福隆安以次進舞丙辰上率王公大臣詣慈寧宫行禮宣表文文武百官及休致降革官給豫品銜者俱於午門外行禮生監耆老於天安門外行禮皇后率貴妃妃嬪於慈寧宫行禮如儀臣等謹按是年十一月二十五日己未皇太后聖誕日以逢南郊齊期改於二十三日丁巳預行慶賀禮二十七年十月定慶賀題本式凡各省督撫慶賀皇太后本章面頁改用黃綾黃簽恭遇聖夀節賀本本面仍加黃簽敬書徽號二十八年二月更定慶賀題本式通政使實麟奏言嗣後恭遇慶賀皇太后本章及貼黃俱請純用黃紙其面頁仍用黃綾黃簽本內毋庸另加簽從之三十六年十一月皇太后八十聖夀加上徽號上率王公大臣等行慶賀禮前期內外王公大臣官貟在京紳士耆老豫設綵棚樂劇恭祝聖夀是日丙辰上率王公大臣詣慈寧宫恭上崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后徽號躬進册寶行禮禮成上奉皇太后幸萬夀寺正國寺拈香至倚虹堂停蹕奉皇太后御萬夀輦上乘騎前導三班九老王公宗室滿漢大小臣工在京文武外吏暨大臣命婦並在籍紳士老民老婦等各於恭祝萬夀亭前依次跪迎皇太后頒賜賞賚各有差皇太后駕還夀康宫丁巳上奉皇太后幸夀安宫侍膳戊午賜三班九老宴遊香山命於次日赴乾清門內令畫工艾啓䝉繪圗文職九老顯親王衍璜恆親王崇志大學士劉統勳協辦大學士官保吏部尚書託庸户部尚書素爾訥刑部尚書楊廷璋刑部侍郎吳紹詩工部侍郎三和武職九老都統四格都統曹瑞散秩大臣國多歡散秩大臣銜甘都副都統伊嵩阿副都統薩哈岱副都統李生輝副都統富僧阿副都統色瑞察致仕九老刑部尚書銜錢陳羣內大臣福祿禮部尚書陳德華兵部侍郎彭啓豐禮部侍郎銜鄒一桂副都御史吕熾內閣學士陸宗楷詹事府詹事陳浩國子監司業銜王世芳庚申禮部奏聖母皇太后八旬萬夀各省原任及候補候選人貟來京恭設經壇䖍申慶祝應准其午門外一體隨班行禮恭候欽定奉㫖准其隨班行禮辛酉皇太后八旬萬夀大慶節辰刻上詣夀安宫侍皇太后膳已刻詣慈寧宫侍皇太后筵宴親捧進御贊玉蟠桃一件上綵衣躬舞捧觴上夀皇四子永珹皇六子永瑢皇八子永璇皇十一子永瑆皇十二子永璂皇十五子永琰皇十七子永璘額駙色布騰勒爾珠爾福隆安扎蘭泰皇長孫綿德皇次孫綿恩綿億綿惠綿聰綿志鄂勒追特穆爾額爾克巴拜丹巴多爾濟豐申濟倫皇曽孫奕繩以次進舞禮成上奉皇太后幸夀安宫皇貴妃貴妃妃嬪於夀安宫行禮如儀三十七年十一月奉諭㫖曰奉皇太后懿㫖向來每遇慶典令節皇帝詣慈寧宫朝賀至永康左門外即降輿步入今皇帝春秋已逾六十雖氣體强健精力如常而禮數過勞之處亦宜隨事撙節嗣後遇元旦行禮在慈寧門東階下降輿萬夀行禮在慈寧門西階下降輿並就門旁著內監設便坐以資小憩以示惓惓愛護之意欽此朕欽承慈命敢不祗遵著傳諭各該衙門載入儀注敬謹遵照皇太后三大節朝賀儀先期內閣具皇帝稱賀皇太后表文其式曰子皇帝臣御名誠歡誠忭稽首頓首上言臣聞表聫隨時撰入欽惟聖母徽號恭書皇太后陛下隨時撰擬伏願隨時撰擬臣曷任踴躍歡忭之至謹奉表稱賀以聞諸王大臣及內外臣工隨進表賀送禮部其式曰具官臣某等誠歡誠忭稽首頓首上言伏以表聫隨時撰擬欽惟皇太后陛下徽號於恭書上隨時撰擬臣等幸際昌期欣逢聖夀元旦長至伏願隨時撰擬臣等無任瞻天仰聖歡忭之至謹奉表稱賀以聞禮部先期疏奏皇帝承奉皇太后懿㫖下制報可右表賀儀式恭遇皇太后宫慶賀行知工部備黃案一併桌套於前一日送至慈寧門外鴻臚寺派貟陳設又行景運門護軍統領至日五鼓開東長安門天安門端門各中門午門東旁門熙和門中門行內務府轉傳內監開永康左門以備恭進表文豫行八旗滿洲䝉古漢軍各都統將公主郡主縣主郡君縣君王福晉輔國將軍以上夫人二品以上大臣命婦查有無事故造具印册送部行理藩院查明下嫁蒙古之公主郡主等及䝉古王福晉貝勒貝子夫人有在京應行禮者