女官內管領妻入殿布席寶座前設皇太后御筵加黃冪寶座之東為皇后御筵西南向稍後左右為皇貴妃貴妃妃嬪筵東西向再後左右為公主福晉以下鄉君入八分公夫人以上席重行殿外丹陛左右為公侯伯子男滿一二品大臣命婦席均重行東西向北上席皆加冪右陳設布席辰刻內監引公主福晉以下二品以上命婦自永康右門入慈寧門序立於東西丹墀內已刻禮部尚書侍郎轉傳內監奏請皇后詣皇太后宫筵宴皇后率皇貴妃貴妃妃嬪具禮服升輿以次出啓祥門前引命婦八人恭導由慈祥門入至徽音左門外降輿入皇后進至殿內西向立皇貴妃貴妃妃嬪隨入東西序立公主福晉夫人命婦按翼升丹陛東西面序立均北上引禮女官轉傳內監奏請皇太后御慈寧宫皇太后禮服出中和韶樂作奏豫平之章升寶座樂止引禮女官引公主福晉夫人以次入殿就燕位次引大臣命婦就燕位皇后率皇貴妃貴妃妃嬪各於本位行一拜禮坐公主福晉以下皆一叩各就位坐乃進茶丹陛清樂作奏海宇升平日之章尚茶女官率尚茶婦舉茶案由中道進至殿檐下閾外中正北面跪進茶女官奉茶入殿中門由中陛升至皇太后寶座前跪進茶興東面立皇后率皇貴妃貴妃妃嬪行一拜禮公主福晉以下隨行禮坐女官跪受茶甌由右陛降退出殿中門侍衛妻進皇太后茶次分賜皇貴妃貴妃妃嬪公主福晉夫人命婦茶皇后率皇貴妃貴妃妃嬪以下行一拜禮飲畢復拜如初尚茶女官率尚茶婦徹茶案退樂止右就位進茶乃進酒尚膳女官內管領妻入殿展皇太后御筵皇后御筵冪以次展皇貴妃貴妃妃嬪以下席冪各退司爵女官自黃冪內奉壺爵金巵以次進至殿中門閾外之左西面立丹陛清樂作奏玉殿雲開之章進爵命婦興離席皇后以下皆興進爵命婦入殿北面跪皇后率皇貴妃以下皆跪女官舉壺實酒於爵由中門入西面跪授爵興退進爵命婦奉爵興自寶座中陛升當右北面跪恭進皇太后酒興由右陛降復位一叩皇后率皇貴妃以下行一拜禮坐進爵命婦興由右陛升跪受爵由中陛降復位跪女官入跪受虛爵乃以金巵酌酒承懿㫖賜進爵命婦酒女官入立授巵進爵命婦受巵行一叩禮飲卒巵女官立受虛巵退進爵命婦復叩如初興退入席坐執事女官分恩賜果食於各席皇后以下行一拜禮樂止右奉觴上夀乃進饌尚膳女官率尚膳婦以饌入恭進於皇太后前中和清樂作奏萬象清寧之章執事女官分賜肴饌於各席皇后以下皆拜如前儀樂止尚茶女官舉反坫案進至殿陛下侍衛妻進皇后前酒次分賜皇貴妃貴妃妃嬪公主福晉夫人命婦酒皇后率皇貴妃貴妃妃嬪以下行一拜禮飲畢復拜如初坐是時內監下宫門簾禮部滿尚書侍郎引慶隆舞進至丹陛舞揚烈舞次引隊舞大臣進至丹陛舞喜起舞畢笳吹進奏朝鮮國俳進百技並作畢各退右行酒樂舞入侑內監啓簾內管領妻升徹皇太后御筵退皇后皇貴妃貴妃妃嬪皆興離席就殿內拜位立公主福晉夫人出殿左右門暨大臣命婦侍衛妻按翼於丹陛上拜位立均北上丹陛大樂作奏益平之章皇后率皇貴妃以下一二品命婦以上謝恩行二肅一跪一拜禮畢樂止引禮女官轉傳內監奏請皇太后還後宫中和韶樂作奏履平之章皇太后還宫樂止引禮女官奏禮畢恭引皇后皇貴妃貴妃妃嬪降階仍由徽音左門出升輿還宫內監引公主福晉命婦各退右謝恩恭遇皇太后萬夀及元旦次日筵宴向例應備饌筵羊酒親王等各恭進桌張羊酒如不敷者交光祿寺及兩翼增備乾隆二十六年皇太后七旬萬夀筵宴奉㫖阿哥等進三九近派王等進三九顯親王等進三九內務府遵㫖辦理將向例王等各進桌張羊酒統入於六九數內乾隆三十四年軍機處遵㫖查奏元旦次日慈寧宫筵宴請用饌筵三十張奉㫖再減十張是年羊酒數目亦照饌筵減半之例三十六年皇太后八旬萬夀與二十六年同若元旦節慈寧宫於次日筵宴是日而遇齊戒應否改期豫行請㫖遵辦乾隆二十四年十二月奉㫖次年正月初二日係齊戒日期皇太后宫筵宴應於初一日舉行凡王公等所進羊隻自行備送外其增備羊肉及需用鐵鍋鐵杓磚竈水桶檐杖栁罐刷帚等量數咨工部送用若宴畢所剩桌張交與慈寧宫首領內監散給拜唐阿內監等前期奏請得㫖知照內大臣理藩院內務府上三旗護軍統領皇后三大節朝賀順治八年四月定皇后三大節禮儀是日皇后儀仗全設皇后詣皇太后宫行禮畢還宫公主和碩福晉以下都統子尚書命婦以上俱詣皇后宫行禮康熙八年定元旦冬至次日皇后官慶賀禮儀是日設皇后儀駕於太和殿前時修未乾清宫尚竣工設丹陛大樂於中和殿前皇后詣太皇太后皇太后宫行禮畢公主福晉以下一品命婦以上咸朝服行禮如儀十年定皇后儀駕丹陛大樂設於坤寧宫前十一年定皇后千秋節慶賀禮儀與元日同雍正六年皇后千秋節王公百官咸蟒袍補服乾隆六年禮部奏皇后千秋節恭進慶賀箋文向未列班行禮於典禮未備嗣後文武各官擬於午門外齊集行禮得㫖仍照舊例行十六年正月奏准皇后千秋莭正值皇上恭奉皇太后祗謁泰陵應行典禮應請停止賀箋仍屆期送閣二十七年十月定慶賀皇后題本式題本面頁用紅綾紅簽本內加紅簽二十八年二月更定慶賀題本式通政使實麟等奏言各督撫慶賀皇后千秋本章內加簽有用半簽有用全簽有並未加簽者殊未畫一嗣後慶賀皇后本章及貼黃請改用紅紙其面頁仍用紅綾紅簽本內毋庸另行加簽疏入令大學士等集議應如所請惟面頁面簽臣等酌議亦用黃綾以昭畫一從之皇后三大節朝賀儀先期諸王公及內外文武臣工具賀箋送禮部其式曰具官臣某等誠歡誠忭稽首頓首上言伏以箋聫隨時撰擬敬惟皇后殿下隨