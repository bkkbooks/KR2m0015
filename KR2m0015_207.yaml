body:
  text: 欽定四庫全書皇朝文獻通考卷二百七刑考十三詳讞平反雍正元年責成按察司釐剔宿弊歸於明允奉諭朕惟直省大小獄訟民命所關國家各設按察司以専掌之一切州縣申詳至爾司而獄成凡督撫達部題奏事件皆由爾司定案任豈不重與國家定律所以弼教非以厲民是故嚴立刑書防其或罹于法及至斷獄又條分縷析思以曲全其生今或情例相違牽合文法以納民於網或有兩例並見輒上下其手以自遂其私安得無寃獄哉夫折獄憑口供而平反憑案卷今法吏不求得情惟求完結州縣案卷之申詳於爾司者多鍛錬口供附於律例兾免爾司之駁查爾司之詳督撫督撫之揭部院者又加文致兾免三法司之駁查口供案卷如是寃抑何從平反咎在聽斷之初心原非欲必得其情也今既釐剔宿弊歸於明允毋得因循故事自墮姦欺至納賄出入人罪於法尤重爾司其正已率下使法無枉撓庶幾刑措之風改定蒙古立絞之案時辦理土默特事務郎中福柱等奏披甲阿納等盜牛二頭照例應絞立決得旨偷盜一二牲餼即將蒙古立絞人命重大嗣後應改為擬絞監候倘蒙古無知法輕易犯而盜案比往年較多則仍照原例擬罪復熱審舊例二年敕部臣詳慎刑獄先是二月以雨澤愆期命刑部清理刑獄至是奉諭朕面諭爾部刑獄上關天和當欽恤民命牽連之人毋得久羈監禁爾部等遵朕諭釋放數百餘人即大沛甘霖逺近霑足可見天人之感捷於影響嗣後益當詳慎以副朕刑期無刑之意又諭刑獄關係重大必須虛公詳慎盡得實情不可疏忽遺漏致有寃抑爾等遇事有可疑不能決者不妨面奏候朕斟酌至當然後施行若既不面奏又以私心揣度巧為迎合及刑罰不中則退有後言將所謂股肱大臣之任而存心卑汚如此豈不可恥爾等皆宜體朕欽恤之意和衷協恭平心靜氣毋得有意逄迎務使國無寃獄以共成咸中有慶之治定各省秋審具題法司照朝審之例三覆具奏定一人犯兩案審題之例奉諭嗣後具題案內有一人而兩案犯罪前案罪輕俟後案審明從重歸結者至後案題結之日仍將前案輕罪敘入然後就本案重罪按律定擬如前案已擬重罪後案罪輕亦必將前案重罪聲明仍歸前案定擬如有數案犯罪者亦必將各案所擬俱簡明敘入最後題結本章內三年改正刑部駁重之案廣西巡撫李紱題陳為翰毆死何壯深照毆殺律擬絞監侯部議改為斬監候得旨朕駁審陳為翰一案該撫審出實情仍照前擬具題而該部又欲駁重朕籌之再四若依部駁恐將來督撫等俱有意迎合而事情委曲有所未盡若仍照該撫所擬又恐將來督撫等堅執前見不肯改易朦朧結案二者皆於法不得其平朕慎重讞獄期於盡善無弊此案著九卿等會同詳議尋議覆陳為翰應照鬬毆殺人律擬絞監候從之又命刑部清理獄囚定州縣官承審重案議處議敘之例湖南黔陽縣革生黃振裘挾仇詐財誣控族戚傅廖氏與何綸有姦用藥毒死伊夫傅淑楫伊翁傅應泰伊子傅輔學三命并誘逼婢女誣證賄囑仵作揑傷妄報署縣陳煥拘訊廖氏與何綸俱誣服經接任知縣馮應正因尸傷未明詳委另驗審得實情黃振裘照開棺見尸律擬絞監候得旨允行仍諭馮應正將此案實情審出著交部議敘以示嘉奬前任陳煥誤定重罪草菅人命著革職照貪官例永不敘用嗣後州縣承審命盜重案有似此應賞應罰者俱照此例命法司詳閲緩決招册諭刑部今年情實人犯招册朕細加閲看將其中情罪有一線可原者已降旨分别發落緩決人犯招册昨亦逐一閲看見九卿所定尚有未協著將原册細心酌量於數日內候旨定核擬盜案疏內分别聲明例奉諭嗣後遇有盜案務將案內之悍惡實在為盜及被人誘脅或迫於飢寒要非素行為盜之處一一分注明白于疏內聲明候定五年改正法司駁輕之案河南巡撫田文鏡題胡大保強行雞姦致死人命擬斬立決法司改擬監候得旨不肖惡徒因雞姦不從勒死人命有何可矜可疑而反從末減若以其未成姦而改為監候則視雞姦為重而轉視人命為輕矣有是理乎田文鏡具題之案經朕御覽者尚敢意為輕重若此則凡外省咨文由部自行定奪者其輕重任意又可知矣嗣後督撫咨文到部而各部駁詰非理者準該督撫密摺奏聞定司官核駁議敘之例諭刑部李茂卿打死胡君彩一案若非爾部駁令覆審則凶犯李茂卿脫然無罪而尸親胡君星反坐以誣告擬流不惟是非失實亦且寃抑莫伸矣今駁回覆審該撫將一切實情審出李茂卿擬絞監候方成信讞似此定稿司官若不量加奬勵則將來實心辦事之員何由鼓舞嗣後此等事件司官能細心究核駁令覆審改正者應量加議敘若有妄行苛駁者亦當加以懲戒六年敕審擬罪案母得律例兩引奉諭凡審擬罪案應引某條則引之斷無輕重任意介在兩可之理今以一罪而引兩律則是法無一定而獄不得其平矣嗣後再有兩引條例者外省督撫提鎮本章著通政司駁回將情由參奏三法司本章著內閣駁回恭奏詳查各省緩決人犯凡各省緩決人犯其中情罪稍輕尚有可原宥者命大學士三法司九卿會同詳查確議分别具奏其特旨治罪之案亦令詳查妥擬七年定擬決重案本章覆奏三次奉諭朕慎重刑獄秋審朝審悉令三覆奏閲今思每日所進本內有擬以極典及斬絞立決之犯其情罪俱屬重大律無可寬然朕猶欲慎審而後置之於法嗣後如此等本章已閲過票簽交與本房者著批本官照三覆奏之例進呈三次候朕再加詳閲然後批發八年敕議罪不得擅用加倍字樣奉諭嗣後議處議罪之條俱照本律定擬其應從重者必須折衷平允不得擅用加倍字樣開朦混苛刻之端詳見刑制門義敕九卿詳議罪案奉諭各省命案其應輕應重朕確有所見者即降旨定奪若其情罪在疑似之間而擬罪在可輕可重之際朕心不能即定者方交與九卿定議以期平允乃往往見九卿定議概以減等發落覆奏如此則朕何不即令減等而必多此曲折乎向後務期權衡允當寬嚴適中以副朕明罰敕法之至意十一年敕部臣釐剔獄弊時以京師亢旱諭刑部大小事件應完結者完結應改正者改正種種弊端徹底釐剔務期正本清源毋再因循玩忽申定援引律例欵九卿議準大學士張廷玉奏凡引用律例務必情罪相符如律內數事共為一條祗引所犯本罪若一條止斷一事不得任意刪減或律無正條比照某例科斷者令於疏內聲明倘承審官援引失實查出題參至三法司衙門理宜一體詳慎嗣後刑部引見不確院寺即查明改正倘院寺駁改猶未允協三法司堂官會同妥議如有扶同朦混察出議處詳審情有可原之犯法司核擬聽從母命邀同鄰人何有爵等相助致死胞兄黃魯山之黃二斬決何有爵等杖流照例聲請情有可原黃二改擬發遣奉諭黃魯山酗酒費産頑梗不孝又欲盜賣伊母余氏膳田曽經余氏具稟有案是黃魯山忤逆之罪無可逃矣黃二迫於母命將魯山致死情有可原從寬免其治罪不必發遣其協助下手之何有爵塗介文亦著從寬免其流杖此案乃朕原情辦理將來不肖之徒或知有從寬之例假造揑飾以圗卸罪亦未可定此次寬免之處後不為例定法司親赴會審及朝審秋審之例大學士等議覆侍郎韓光基條奏一刑名重案三法司應行會勘者院寺堂官並不親身到部止委員辦理或送稿畫題殊非慎重讞獄之意嗣後應親至秉公會審倘有飾詞推故者議處一朝審秋審民命所關嗣後直省招册該部刋刷分送以便逐案詳核屆期齊集班次平心商酌倘有推故不到請派御史二員稽查指恭均應如所請從之又敕部臣詳勘秋審招册時上御洞明堂閲秋審情實招册諭刑部曰諸臣所進招册俱經細加勘酌擬定情實但此內有一線可生之機爾等亦當陳奏在前日定擬情實自是執法在此刻勾到商酌倘有可寬又當原情斷不可因己定情實欲符前奏難於更改遂隱默不復再奏也執法原情總歸於大公至當而已飭督撫臬司詳慎讞獄先是上以各省秋審擬罪先後互異或僅照部議擬覆漫無成見嚴行申飭至是復諭各省秋審有不應緩決之案經九卿改為情實者甚多如各省督撫臬司執法科罪而九卿核情平反或九卿據法定議而朕酌奪從寬如此方合政體豈有執法之官而任意于法外徇縱者乎今九卿雖行改正然不明白曉諭督撫臬司或謂九卿定擬務從苛刻稍存迎合之意遂於可矜可疑之案概以情實奏讞其流弊尤不可言著將改正各案逐一查明通行申飭俾後悉心定擬稱朕明刑欽恤之意十二年飭九卿詳慎秋讞上以九卿秋審定擬率照督撫所奏其有畸重畸輕之處未能悉心斟酌特諭嗣後秋審案件有應改而不改及不應改而妄改者從重議處若意見或有不同準兩議陳奏請旨定奪即衆人皆同而一人獨異者亦準陳奏十三年禁革各省秋審陋習向來各省秋審相沿陋習無論案件多寡定擬于一日之內一切聽督撫主張而且懸彩鼓吹肆筵設席甚至優人演劇為樂殊非詳慎刑讞哀矜惻怛之意至是奉旨禁止有仍蹈從前陋習者加以處分是年九月皇上御極十月敕法司詳察直省獄詞擬罪未安者另議奏聞奉諭刑部乃天下民命所關倘督撫擬罪有於律例未妥必悉心詳察另議奏聞不得稍涉疏忽即如近日湖廣督臣具題臨時行強毆傷僧人以思身故之鄧正一案刑部乃擬照殺人強盜例斬決梟示題覆朕思強盜殺人有明火執杖殺人而取其財物者有起意行竊被事主追毆希圗脫身因而回毆致傷事主身死者其中情罪原有分别今鄧正穿窬入室以思執棍出視鄧正頓起強心持鐮向敵致傷以思身死與殺人強盜亦微有差别應否梟示尚宜斟酌朕已著九卿議奏此類刑部皆須細心體究使絲毫不爽與其殺不辜寧失不經朕深有望于明刑弼教之臣工焉乾隆元年定委驗尸傷之例刑部議準嗣後相驗尸傷及鬬毆傷重之人如離城窵逺及繁冗州縣不能逐起詣驗者委佐二往驗仍聽州縣官填注傷單詳報倘州縣官實能往驗輒委佐二等官致滋擾纍揑飾等弊照例議處又定鄰邑印官代驗尸傷之例刑部議準凡相驗尸傷本邑與鄰邑相距不過五六十里本邑印官公出即請鄰邑印官代驗其或鄰邑地逺不能朝發夕至者許别委佐二代驗代驗之員必係同知通判州同縣丞等官毋許濫委雜職至十八年又奏準凡遇命案印官公出同城並無佐二又距鄰邑遙逺者即令該吏目典史驗立傷單申報印官覆驗如印官不能即回申請鄰邑代驗填圗通詳三年以天旱命刑部將拘禁枷號人犯分别詳審定監候待質年久之犯分别酌擬刑部議覆御史王綱振疏言各省秋審册內有監候待質一項如續獲盜首未肯招認而從前供明之夥盜已經決遣餘盜尚未盡獲無憑質證罪關首犯例應監候待質或有續獲之犯審供與原供案情相符並非首盜又未傷人原係案內夥盜因年久贓物花費遂照疑似之條監候待質又如獲犯並無贓據屢審堅供不認此或係夥盜或係無辜因餘犯在逃亦令待質伏思此等既屬疑似則虛實原屬未定乃嵗嵗待質有監至十餘年及二三十年者昔年之逃犯久已無蹤而此等衰老待質之犯久淹囹圄雖有一線可原之情概沉獄底請敕下法司于秋審之日公同九卿將原案逐一詳查酌其情罪之輕重量其監候之逺近或取保或末減或仍行監侯分别辦理至人命案內監候待質之犯其有情節不同之處均請一體查辦應如該御史所奏除罪關斬決仍應監候待質外其並非首盜又未傷人因贓物花消監候待質人犯供認既確令九卿會審核明擬以遣罪如並無贓據堅供不認者是其為盜為良尚屬未定並於秋審時核其情節酌量擬保俟緝獲正犯之日再行質審至奏稱人命案內待質人犯一體辦理查現在秋審人命正犯俱係情罪重大祗因少涉疑似尚應待質與盜案不同應於秋審時詳細分别辦理其朝審秋審監候待質之犯亦照秋審案件一體查辦從之又命王大臣會同刑部詳審不赦罪囚及屢經緩決人犯至明年復命詳加覆勘秋審朝審招册如有一線可原應行減等者酌定奏聞請旨四年禁州縣詞訟批發鄉地刑部議覆御史王柯疏稱州縣詞訟細事間有批委鄉地查覆者應令州縣秉公查核不得任其朦混至一應命盜及重大事件不得混行批查違者降調載入例册從之又敕撫臣讞獄持平奉諭河南秋審各案九卿從該撫所擬情實內改入緩決者十六起可矜內改入緩決者十五起夫讞獄貴得其平必合乎人心之同方不愧明允之義雖其間所犯情罪不一彼此輕重之間亦有介於疑似者內外大臣意見不能一轍然一省改輕改重者至三十餘起則非人心之大同可見矣可傳諭尹會一向後辦理刑名必揆情度理期允當以成信讞五年定承審官失出失入分别議處吏部奏準官員審理案件有失出失入經上司駁回承審官按律改正免其糾恭若承審官固執原擬具詳另委别員審出改正或已經咨題完結後復查出者仍照例議處如委員逄迎遷就互有出入後經發覺亦照例議處又命九卿於緩決案內詳審可矜人犯奉諭向來九卿辦理秋審朝審人犯分别情實綏決可矜三等而惟緩決之內情罪輕重不一其果係所犯重大實無可原因係久緩不復處決者雖終斃囹圄本無足恤其有一線可原尚在矜疑之間者九卿承審時附入緩決之內年復一年陳案日積以致此等人犯久淹獄底亦屬可憫今秋審在即著九卿于秋審朝審招册內詳加分别凡緩決之案果係情有可原者俱入于可矜條內以昭示罪疑惟輕法外施仁之至意申定審訊盜賊供招窩夥之令奉諭盜賊中狡猾者多平日窩夥不肯實供每誣扳素封之家及向有嫌隙之人以圗陷害而捕役索詐弊端百出縱審出誣扳實情準豫省釋而被拘候審已不勝擾纍矣各省臬司為刑名總滙當檄行所屬凡盜賊供扳窩夥必先訊有確據方可拘拏隨到隨審如係誣扳立即省釋并將誣良之賊盜先行重懲以免再有誣扳七年命閣臣詳閲刑案酌加雙籖奉諭讞獄必依乎律而其中情節不一又當恭酌核擬期歸平允朕於刑部所奏重犯其中稍有一線可原者或降旨從寬末減或交九卿定議皆於法外原情以示矜恤但日理萬幾恐披閲一時未周照籖批發雖論法不枉而原情較疏矣嗣後刑部進呈本章及秋審各案著大學士詳閲其中有應加覆核者即擬寫雙籖並將情節聲明進呈待朕酌量則周密慎重益可副朕哀矜庶獄之意定調姦未成致本婦羞忿自盡者由情實改緩決之例奉諭節烈之婦祀于其鄉所以旌善端化樹之風聲也其致死本婦之犯法無可貸是以乾隆五年福建秋審蕭充一案該撫擬以情實九卿改為緩決朕曽降旨申飭蓋以烈婦之死由於該犯之調戲若輕入緩決非所以重名教而端民俗也今正值九卿秋審之時其在蕭充以前定為緩決之案此畨毋庸改為情實其在乾隆五年以後此等案件各省多入情實九卿執法自不得輕擬但強姦未成本婦因調戲而羞忿自盡者其中情形不一朕辦理勾到之時自有權衡如果有一線可原者當免勾既經一次勾到之後下年即可改為緩決如係停止勾決之年入情實者下年不得即改為緩決又敕督撫詳讞母得妄臆寬嚴奉諭今年朝審秋審情實案件因兩年停刑是以勾決者較往時為多此皆九卿公同議定之成讞朕於刑部進招册之後逐加詳閲及勾到時又與大學士刑部堂官等再三推究凡有一線可生者姑且從緩必求其生而不得然後置之於法在朕心惟期至當至平並非有意從嚴而如此辦理也但恐外省督撫揣摩觀望之習不能盡除見今年勾決之人稍多遂妄臆朕意在嚴承辦刑獄相率而趨于刻核則大違朕之本懷若見此諭或又以朕意在寬相率而流於姑息則更非明允之道特頒此旨諭各省督撫知之八年定熱審人犯臨期稱寃覆鞫之例給事中鍾衡奏請敕諭直省督撫嗣後每屆熱審時將案情通行檢查除情罪相符者仍照原擬外倘有臨期極口稱寃按之情罪稍未允協即細加研鞫果係從前枉斷十分寃屈者即改正具題以便令法司再行確勘從之九年申飭各省秋審定擬之未當者奉諭今嵗各省秋審册內經九卿改正者甚多或先後案情不符混行矜減或以毁堤毆官之罪而寬其情實或以屢行謀殺之犯或犯姦毆死人命或連掘數冢或與族嬸通姦致死本夫或毆斃尊長二命或誣告伊主死罪以及屢次行竊持刀強姦與故殺病妻情極殘忍之人皆豫緩決矜減殊屬姑息至於情有可原之案或又草率擬斷應緩決而置情實應矜減而置緩決者不一而足夫法津為國之綱紀過重則乖矜恤過輕則長姦惡今各省案件朕舉其一二情節顯然者尚如此辦理則平日所辦刑名之事未能允當者諒亦不免著申飭十二年定侵貪官犯限滿擬入情實之例奉諭貪婪侵盜之員上侵國帑下朘民脂實屬法所難宥是以國家定制擬以斬絞重罪使共知警惕因律內載有分年減等逾限不完仍照原擬監追之語至秋審時概入緩決外而督撫內而法司習為當然初不計二限已滿既入秋審自當擬以本罪在本犯亦恃其斷不擬入情實以致心無顧忌不知立限減等原屬法外之仁至限滿不完則是明知不死更欲保其身家此等藐法無恥之徒即應照原擬明正其罪嗣後此等二限已滿照原擬監追之犯九卿于秋審時核其情罪應入情實者即入于情實案內以彰國法朕於勾到日再為酌奪十四年改定秋審三覆奏之例舊例朝審秋審情實人犯由刑部三覆具奏本年九月上以各省奏牘繁多迫于時日難以詳覽徒事具文命朝審照例三覆秋審減去二覆以從務實至是復諭勾到後將原本進呈覆閲再行批發著為例定秋審職官罪案另册進呈之例奉諭嗣後尋常命盜案件督撫刑部九卿照例審擬其職官治罪除雜犯外凡實犯罪名秋審時或應緩決或應情實者另為一册進呈則朕得以詳閲不至因煩混過部臣亦不能施高下之技而官犯與常犯有别亦所以示亷恥等級之意定詳審讐殺案情廣東斬犯曽士標因鴨走入緦麻服叔曽會昌田內被曽會昌次子曽朝芳打死因與曽會昌爭論曽士標以木挑抵格致傷曽會昌身死曽士標依律擬斬監候嗣曽會昌之子曽朝宗在山砍柴遇曽士標之子曽亞二觸起前恨用刀連砍曽亞二殞命曽朝宗亦依律斬候俱入情實奉諭朕詳閲招册曽士標服制攸關法無可貸而曽朝宗則因報復父讐情似可原然凶犯已經擬抵國法既彰則私恨可泄即使遇不共戴天之曽士標亦秪應聽其服法就刑不得擅肆殺害何况其子並非下手又未加功是無罪之人也殺無罪之人則但當治其故殺之罪而不當原其復仇之心果使有心復仇亦但當于曽士標未擬罪之先而不當于既擬結之後若因此遽從寬典則曽士標父子二命抵曽會昌一命於法不得其平且啓讐殺之端殊非辟以止辟之道曽朝宗亦無可貸但曽朝宗情因痛父曽士標子死非辜各有情節著俱改絞罪處決定詳審緩決官犯時刑部將各省秋審官犯入緩決者通行查具清單奏聞請旨奉諭向來辦理秋朝審案每遇官犯輒事寬縱但於一次混入緩決即為成案斷不復改謂之老緩決至辦理矜減如赦詔及一線可原五次緩決之類又斷不能邀恩年復一年不過令老死囹圄而已果爾則國法所行惟在閭里小民以及盜賊之輩而官犯僅止虗受罪名幸全首領是豈國家制刑之意哉但此等人犯經厯年久或曽經大赦未便復改為情實著大學士會同該部將所查各案再行詳悉斟酌應可矜者即入可矜應緩決者仍入緩決近年以來所定之案有應改為情實者即改為情實其在乾隆八年以前者既經漏網亦不復加以顯戮著改發黑龍江交該將軍嚴加管束著當苦差十六年定立決改監候人犯仍入情實之例湖廣秋審本內斬犯滕有伯原擬情實具題九卿會核以其救母情切改入緩決奉諭滕有伯棍格致斃大功服兄從前三法司按律擬斬立決經朕降旨改為監候是該犯救母情切之處已邀格外寬典矣若于秋審之時復擬緩決僅虗豫以重辟罪名久且入于矜減之列是乃輕視倫紀豈明刑弼教之意此端一開將使挾仇干犯者轉以父母為起釁之由得肆其毒手愚民益無畏懼嗣後由立決改擬監候人犯俱應入于情實勾到時即或原情免勾下次亦應仍入情實或情節果輕免勾數次之後遇特旨寬減則可耳十七年駁正撫臣率請聲敘之案時廣東巡撫蘇昌審題曲江縣民陳茂昌戳傷小功服叔丙林身死擬斬立決聲明該犯救母情切致傷服叔刑部照例夾籖請旨奉諭陳茂昌著即處斬此案陳丙林與陳氏互毆已受多傷該犯勢非危急託言救護輒將服叔戳斃前經降旨以父毆叔而子助父以斃叔不得謂救父此正母毆叔而子助母以斃叔不得謂之救母也蘇昌率請聲敘著交部察議敕刑部官速結命盜案件時刑部遵旨察奏命盜等案因贓迹未明監候待質者共五十四案內康熙年間一案雍正年間十一案乾隆元年至十七年積至四十五案上以犴狴之中淹禁多人非使無辜久繫囹圄即應辟重犯久稽顯戮皆因承審各官不能詳慎研究務在得情而刑部司員又以遵駁改正議敘之例多尋罅漏外省無以登答轉成疑案一經題明監候待質即束之高閣接任之員又以事非本任率多因循殊非明慎用刑而不留獄之意特諭嗣後內外問刑衙門各宜迅速辦理應緝拏者上緊緝拏應定擬者即行定擬勿致塵案日積若本非難結之案承審各官不能審出實情惟以監候待質為遷延時日之計且藉得邀免處分希兾録敘該堂官督撫察出即嚴行恭處定立決改監候人犯秋審另册進呈之例奉諭各省由立決改監候人犯均係服制攸關其改擬監候已屬原情酌減若秋審時入于緩決則減之又減殊非慎重倫常明刑弼教之意是以上年降旨令概入情實此其中情節多端但散在各省招册中有勾決者有未勾決者或未悉朕輕重權衡反滋疑議者該部將此等案犯彚為一册先期進呈候勾其有應宥者亦可即豫減等發落十八年酌減秋審緩決人犯奉諭現在刑部辦理秋審其中緩決人犯閲時既久為數滋多著該部察明朝審秋審各犯酌其情罪稍輕緩決至三次以上者分别請旨減等至此外有情罪本重厯年查辦未經寬減而定案在康熙雍正年間緩決十餘次至數十次內有一線可原者亦著察明分别請旨互見赦宥門敕法司讞獄迹涉兩是者不妨各抒所見候旨酌奪奉諭讞獄重案敕交法司核擬原期詳慎以昭平允其事屬衆議僉同固成信讞如或迹涉兩是間有一二人不能盡歸畫一者自不妨各抒所見候旨酌奪嗣後三法司核擬重案如有意見不能相同原可兩議具題但不得合部合院各成一稿朕欽恤庶獄不厭博咨諸臣亦當悉祛成見勵乃靖共將此通諭知之又命大學士會同刑部覆勘厯次秋審情實未勾案情奉諭各省由立決改監候人犯厯次秋審情實上年四十起內未勾者二十三人此次已勾吳祿一起但節次存留監禁積而愈多是因緩死而屢次綁赴市曹亦非所以重刑章也嗣後此項除本年未勾人犯下次仍入情實外其餘著大學士會同刑部將招册覆加詳勘有實在情節可寬如弟毆兄斃或果因其兄干犯父母迫于親命或素有瘋疾一時病發凡似此類酌量分别敘述案情確加看語請旨即入緩決朕于勾決册內已再三審量更加一畨公同斟酌則情節益明庶協明慎矜恤之意著為令定嚴飭承辦刑名遷就取供之習奉諭向來外省辦理刑名每存姑息之見即有關倫常亦多遷就率謂釁由死者或作凶徒以無心架格或兩相湊合用力過猛此婦寺之仁究之展轉達部仍歸按律定擬即如山西省陸三傑因受分田宅蕩賣無餘乘父病垂危仍索分田地伊叔陸應唐忿責用小刀扎傷陸三傑額顱陸三傑奪刀回扎致斃胞叔陸應唐悖倫滅理莫此為甚乃該撫本內所敘案情則云陸三傑用刀恐嚇陸應唐搶刀勢猛以致扎殺等語是陸應唐反為應死之人矣承辦之府縣臬司以至該撫豈不知陸三傑罪在不宥而習慣自然以書吏取供故套為當然不知改正則實有可矜情節者將致魚目不明矣著嚴飭行嗣後如仍有似此者從重議處十九年定重罪案犯未準部覆一體入秋審之例福建巡撫陳宏謀奏稱諸羅縣姦民吳典等糾衆奪犯及同安縣賊犯林對等糾衆拒捕兩案內為從各犯俱已擬絞監候具題尚未準部覆例應入于下次秋審但此二案情節重大已令臬司歸入秋審會勘得旨允行並著為例嚴飭督撫審擬過當之失兩廣總督班第等奏擬周紹華私雕假印照光棍為首例斬決上以所辦失之過當特諭私雕假印固屬藐法但所犯止于撞騙財物按律斬候已足蔽辜乃照光棍為首例擬斬立決存心觀望大失輕重之宜著嚴行申飭二十年平反誣陷罪名時總河富勒赫奏趙永德呈首原任郎中程𨫔作詩誹謗悖逆現交布按二司嚴審上閲程𨫔抄刻詩册膚淺本不成詩其中並無譏訕悖逆之語察知趙永德索詐不遂挾嫌誣陷特諭從前胡中藻身為翰林心懷怨望作種種悖逆之詞刋刻若不重懲無以正人心而端風俗是以不得不行辦理倘因有此案動于語言文字之間指摘苛求則狡黠之徒藉以行其誣詐有司不察輒以上聞告訐紛繁何所不至逮至辨明昭雪而貽纍已甚此風斷不可長趙永德著該撫莊有恭嚴審定擬具奏尋審察實照例發遣二十二年定鬬毆命案分别情實緩決之例奉諭律載鬬毆殺人均應擬絞而案情輕重逈異如係彼此互毆至斃正與鬬毆律意相符若其人並未還毆而逞凶肆毆以致殞命其去故殺一間耳即如刑部審擬李四毆傷張氏身故緣張氏索欠詈罵該犯拳毆跌地復連踢重傷致死張氏索欠不與而罵人之常情並未與鬬而李四直不欲償其宿逋毒毆斃命即謂釁起一時情非謀故顧安得謂之鬬毆殺乎嗣後遇有此等情節較重者秋審時俱當擬入情實或有類此而情輕者即量從寬典亦祗可歸入緩決斷不應在可矜之列庶凶徒知警正辟以止辟之意定秋審官犯概行粘簽例原任湖南布政使楊灝侵帑擬斬監候秋審定擬緩決上以其貪黷敗檢歸入緩決甚屬紕繆並諭嗣後官犯無論情實緩決概行粘簽聲明定尋常官犯不必補入秋審之例刑部議湖北巡撫莊有恭奏官犯李春明因買地葬親發掘義冢應擬絞監候補入本年秋審情實請即行正法得旨情實官犯令補入本年秋審此専指貪酷敗檢侵虧狼籍及有心狡詐不盡臣職者而言若此等尋常私罪非法難姑待者可比李春明著監候以俟明年秋審嗣後有似此者該部照此辦理著為例二十四年定詳讞戲殺案情大理寺少卿顧汝修奏河南命犯樊銀周推跌陳四致死實係戲殺應準留養刑部以該犯理曲傷重例不準留回奏得旨樊銀周因饃互推使當場果有先戲後鬬情事即應用鬬毆本律科斷乃該省既取陳四父叔供詞稱係戲頑是實而刑部亦不能徑指其是鬬非戲適當省刑之會即照所請準其留養尋刑部復援例具奏顧汝修復行奏辦奉諭論戲殺誤殺例條所係雖與閗殺案內之理直傷輕者同科然理曲傷重之語又統承戲誤而言定例之初亦必有深意豈竟無迹涉戲誤而情罪之重乃甚于尋常鬬毆者乎朕敬慎折獄期在協中樊銀周之案其罪尚屬可原初不因顧汝修之奏而為之寬減刑部大理寺同為司憲而始終各伸其説俱著飭行二十五年申明由輕適重例行駁審者不得遽行改正完結刑部題覆江蘇巡撫陳宏謀審擬故殺小功母姨之蔣汝才斬候不足蔽辜並未將該撫原擬駁回另審擬行改擬斬決完結奉諭朕意前因法司改輕改重之條曽經分别降旨該部于此案所辦殊未合例如前旨云督撫等擬罪過輕而部議應從重者自應駁令再審今該部以該犯既竊其衣復害其命與竊賊臨時殺死事主者同科罪應斬決而該撫僅擬斬候不足蔽辜正與由輕適重應行駁審之旨吻合無疑至後條所云如擬罪過重而部議從輕者若情節顯然該部所見既確即改擬題覆不必駁審是乃専指由重適輕而言使其中有情節未明者固當駁回另審且此等非謀逆大案不容姑待者比即俟另審題覆亦為未遲此本著照例駁審定補入秋審案犯分别輕重之例奉諭秋審情實招册內有案犯定讞時已逾該省熱審之期而九卿秋審即提入本年册內請勾者此雖該犯情罪重大法無可緩但朕詳閲招册見其中情罪等差尚有應行區别者如一人連斃二命暨妖言惑衆傳習符呪並官員侵魚帑項勒斂民財之類非殘忍已極即有關于民俗官方自不得不早正典刑以昭炯戒至尋常謀故等案定案限期適在秋審後此亦時會偶值自可令其幸延一年之生何必亟亟為也朕辦理庶政從不預存成見惟斟酌情理期適當于協中之治而已酌定提解秋審人犯之例先是八月刑部議準凡斬絞監候女犯業經解勘一次無可改擬者下次停其解審至是并議準凡秋審緩決人犯解審二次後如情罪無可更定者止令有司敘由詳報各督撫核招具題不必復行題審其曽擬情實未經勾決之犯及前擬情實并緩決人犯內情可矜疑者仍照例三次飭提解審二十六年定秋審招册以緩決三次為斷例左都御史金德瑛奏緩決册內改輕改重者多在新事而積年陳案罕能軒輊于其間九卿列坐以聽書吏之宣唱不能沿習具文請嗣後各省督撫于每年仍造全册送刑部存案以備稽考而刑部分散九卿招册惟以三次秋審為斷如已經審過三次並無更改者不必刷印分送其偶有一二案或尚須啇議者仍聽刑部摘出臨期印册分送是陳案可省而近事更得盡心詳審矣經大學士會同刑部議準得旨允行懲秋審會讞忿爭之失是時法司會審廣西省命犯陳希統案內之從犯陳父悔刑部改入情實副都御史竇光鼐以陳父悔毆傷鄧亞弄實非有心致死簽商紛駁且欲將故殺之陳希統概入緩決刑部以立意兩擬奏聞旋經大學士遵旨詳核秉公定擬具奏得旨陳希統雖防竊起釁而一聞黃父亦放火燒村之語有意連戳斃命實屬故殺其應情實何疑至陳父悔之加歐鄧亞弄骨折其傷雖重要非有心致死即令改入情實朕亦不即豫勾刑部所議原未免過當乃竇光鼐因欲爭一緩決輒轉輾自生枝節以會讞大典不肯平心啇確徒用筆舌相攻任氣謾罵不特有乖政體而分門樹幟之風尤不可不防其漸尋奉敕交部嚴察議奏刑部堂官並著察議二十七年飭問刑衙門臨事詳察案情勿逞已見增改舊章先是二十二年御史諸徐孫條奏州縣承審官不無更换招詳通融定案請令州縣訊取初供該督撫即據報部科存案經九卿議準二十六年江西布政司湯聘奏請將同謀共毆之案如驗係傷皆致命者無論當時身死過後身死將先後下手之人一併收禁解審經刑部議準至是刑部奏各省州縣命盜毋庸先據初供報部仍照例於命案初到驗訊時取具供招申報各該上司以慿覆審查核俟得確情審擬定案備敘初供題達以期虛公勘斷至同謀共毆致死人命之案仍請止將正凶解審以免拖纍得旨允行并諭刑名案件情偽微曖變幻百出若事事曲為逆億雖日定一例豈能遍給乎惟在司刑憲者臨事詳察案情恭酌令典期于平允徒鰓鰓然各逞已見議改議增適以變舊章而滋紛擾于讞獄之道有何禆益著傳諭中外問刑衙門知之定詳審可矜人犯奉諭可矜人犯有同在可矜之列而情各殊者如子婦不孝詈毆翁姑而其夫忿激致斃或因該犯之母素有姦夫已經拒絶後復登門尋釁以致拒毆致斃者此等尚因情切天倫一時義忿所致與尋常鬬狠者原屬不同然僅一例減流而終身逺涉不得完聚其情亦堪憫惻著該部會同九卿嗣後遇有似此罪犯量為區别照免死減等例再減一等發落仍逐案隨本聲明請旨互見赦宥門定詳審復讐命案奉諭今日勾到河南省情實招册內有智洪義因父智順被趙二毆死趙二已擬絞候智洪義藉言報仇輒殺其子趙倉律擬斬候九卿及閣臣以趙二業已減流將智洪義可否改入緩決之處夾簽聲明意雖近似于事理猶未剖晰至當儒生拘牽春秋復仇之説如唐陳子昻甚至欲以一時旌誅並行固為乖誕即韓愈栁宗元號稱善駁大率不越以其父死于法不死于法為斷殊不知其父已死於法則固無可復之仇即不死于法亦必其相鬬而殺者其情固可矜而其死無可寬亦無可復之仇也乃其子仍推創仇人之胸亦豈春秋之法所當豫此在唐代刑制懈弛其説尚不能無弊况我朝百餘年來明罰敕法審慎周詳豈可使生殺不關讞司而一介不逞之徒竟爾私行報復其可乎且智洪義謀殺趙倉時毆死其父之趙二尚以論抵在監其時智洪義不得有復仇之説也以謀殺核擬情實自為辟以止辟正義苐統核前後緣起智順既為趙二毆死而智洪義又復扺償趙倉則是智姓兩命而趙姓一命于事會所致稍覺情有未平朕是以悉心研究將該犯停勾然使徑行改入緩決則無以杜私復之源而與謀殺本律亦大相背戾該犯本年雖已停勾其下次秋審仍應入于情實俟將來年久或遇恩例減等之事再酌量辦理二十八年平反寃獄懲司讞扶同欺蔽之罪先是湖北歸州民李作椇家被盜州牧趙泰交拏獲贓盜張洪順審詳監禁臬司沈作朋據盜犯張洪順狡翻捕役栽贓將該犯釋放承問官及捕役事主並坐誣良論如律事經督臣愛必達撫臣周琬審題結案未幾州民趙啓賢家被盜州牧秦鑅拏獲贓盜張紅貴及張紅舜審詳監禁並申明此案盜犯張紅舜審即前案釋放之張洪順緣由詳悉稟報臬司沈作朋升任藩司回護前案并欲消弭後案督撫等扶同朋比隱匿不報事聞特遣大臣前往詳勘尋審據前後盜案贓證確鑿前案寃抑人員奏準超雪盜犯即行正法其縱盜寃良扶同欺蔽之前後兩案承辦各官並拏解來京治罪上親鞫得實經大學士九卿定擬具奏奉諭沈作朋實屬罪魁立即正法愛必達護非欺罔周琬朋比為姦本均應正法但以案中尚未寃及人命故從寬改為監候二十九年奉諭前經降旨各省遇有子孫蔑倫重案令各該督撫于審擬定讞後一面奏聞即一面正法原因該犯情罪重大不便稍稽顯戮但事關重辟其中情偽多端亦不應輕率完結即如廣東遂溪縣監生梁舉朝毆死陳國英之母張氏初經該縣管惟木妄斷尸子陳國英録供詳報及該督撫蘇昌委員覆審始究出梁舉朝自行歐死狡稱陳國英揢斃實情幸而獄無枉濫若非悉心研鞫遽爾加之寸磔即使事後别經訪出而其人已罹極典豈不竟抱竒寃莫白耶嗣後各省如遇此等重案不可不倍加詳慎該督撫等務須親提人犯再三確審以成信讞母得僅憑州縣供詳致滋寃抑該部遵諭速行定歸化城蒙古及旗民交涉命案驗傷之例山西按察使藍欽奎奏歸化城所屬蒙古及旗民交涉命案向例各協廳據報詳請都統派員會驗文移往返動經旬日倘尸身潰損檢驗不確生死攸關且蒙古微員不諳相驗嗣後無論蒙古及旗民交涉案件悉令歸化城通判星往驗明填格通詳其委蒙古官員會驗之處應行停止部議應如所請從之定恭革發審案件俱由臬司主稿例刑部議準山東按察使閔鶚元條奏嗣後不論侵貪那移以及濫刑枉法等案統由臬司主稿會同藩司審勘招解以專責成倘藩司以事非己責並不實心會鞫或臬司因事由自主偏執已見以致罪有出入督撫查恭交部議處定緦麻服屬人犯停勾二次後改入緩決例奉諭向來期功服制情實人犯停勾二次者曽經降旨省録改緩其服係鰓麻案件因非由立決改監候者散入各讞册本非前旨所概雖勾到時有以情節稍輕酌豫免勾而積至數年竟未得與服重人犯一體改緩不免向隅嗣後遇此等人犯亦照期功以上例于停勾二次後著大學士會同該部一體省核改入緩決互見赦宥門申定民間詞訟州縣審斷後復赴上司具控之例刑部議準凡民間詞訟經州縣審斷之後復赴督撫藩臬具控者飭令各本管道府按事輕重或親行集訊或委員另審詳明上司察核其中稍有疑義該上司即親行提審如赴道府衙門控訴者即行親審遇有寃抑即為昭雪如有檢驗查勘等事即遴委賢員不得仍令會同原問官辦理至于刁訟越訴照例治罪三十年詳審誤拏案情先是福清令程廷栻誤拏雲和縣民劉年學為天台縣逃匪丁欽顯蒲城令夏國相誤拏山西民人張機為江西逆犯胡中藻之子胡得玉業經審係誤拏分别結案督撫蘇昌明德等請將各該縣交部議處上以州縣官能不分畛域緝捕隔省逃匪逆犯例得擢用議敘若以偶爾錯訛即因此獲咎必皆自畏處分概置鄰封于不問特降旨寬免復諭曰厯來所辦盤獲案犯皆未嘗一就拘執即置重典是惟在各督撫遇此等案件詳悉跟究務得確情使實者不致幸逃法網虛者亦不及誤罹刑書而有司隨時實心體訪奮勉有為母或稍懷瞻顧庶吏治民生均有裨益設有不肖州縣以毫無影響之事羅織平民妄希進取一經審實自取罪戾又不得以閩陜二省之案藉口也定平反劾議案情廣寧令奎福素患痰疾蒞任後赴府謁見知府富察善聞其逋負甚多不令管理倉庫奎福回署疾作自戕奉天府府尹耀海恐富察善不無逼抑請與扶同驗報之錦縣令哲成額解任交部質審得旨允行嗣越半月而奎福傷痕平復復行自戕身死耀海續恭知府是否假公濟私有意窘迫奏請交部嚴訊上以奎福業已在官看守傷痕平復復自尋短見其非因富察善抑迫致死已明特諭曰奎福因病自戕更無疑義設云富察善果有别情則奎福活口可質時詳細究詰何難得其實情乃遲之又久于其身後過為擬議則有意苛求轉非情理之平矣因命富察善哲成額仍照舊任事其失察及防守不嚴各罪交部議處定酌減緩決人犯奉諭現在刑部辦理秋審案件其中緩決人犯為數漸多此等尚非情實難寬而尋常矜減亦難遽及淹繫日久讞牘徒致紛繁著該部查明朝審秋審各犯緩決至三次以上者核其情罪分别請旨減等發落以示矜恤祥刑之至意互見赦宥門改定同知承審命盜等案解道覆勘之例各省直𨽻州承審命盜等案例解道審轉惟離省窵逺各設同知管轄地方承審事件徑自解司是時雲南按察使良卿奏請將景東蒙化二府同知承審事件照各省直隸州例由迤西道審轉以昭詳慎浙江巡撫熊學鵬復請將玉環同知承審事件就近由溫處道覆勘再行解司如應行駁正該道即就近改駁部議並應如所請從之皇朝文獻通考卷二百七
