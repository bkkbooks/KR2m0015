body:
  text: 樂考八樂器二石之屬特磬律吕正義後編曰案禮記明堂位叔之離磬爾雅大磬謂之毊周禮注特磬十二依辰次陳之以應其方之律朱子云鐘磬有特懸者器大而聲宏故於起調畢曲時擊之以為作止之節此皆言特磬即孟子所謂玉振是也考工記磬人為磬倨句一矩有半其博為一股為二鼓為三後世磬制祖之兹當西域耆定和闐採玉豐博可叶鳴球臣工請依律琢為特磬十二以儷鎛鍾上集廷議允行御製銘詞鐫識其上猗歟盛矣今遵聖祖仁皇帝御定編磬黃鍾之度分倍加以定黃鍾特磬之制用三分損益之法而定以下之十一磬焉磬之股鼓修博倣考工記厚薄悉照律吕正義所載寸分十二磬成悉協律吕之音宫懸合奏以備始終條理之全韶樂大成允昭美備特磬第一聲應黃鍾之律股修一尺四寸五分八釐鼓修二尺一寸八分七釐股博一尺零九分三釐五毫鼓博七寸二分九釐厚七分二釐九毫御製銘曰子輿有言金聲玉振一虡無雙九成遞進準今酌古既製鎛鍾磬不可闕條理始終和闐我疆玉山是矗依度採取以命磬叔審音協律咸備中和泗濱同拊其質則過圖經所傳浮嶽涇水誰誠見之鳴球允此法天則地股二鼓三依我繹如獸舞鸞鬖考樂惟時純禧祖德翼翼繩承撫是萬國益凛保泰敢或伐功敬識嵗吉辛巳乾隆特磬第一黃鍾大清乾隆二十有六年嵗在辛巳冬十一月乙未朔越九日癸卯琢成特磬第二聲應大吕之吕股修一尺三寸六分五釐二毫鼓修二尺零四分七釐八毫股博一尺零二分三釐九毫鼓博六寸八分二釐六毫厚七分六釐八毫御製銘同前特磬第二大吕年月同前特磬第三聲應太簇之律股修一尺二寸九分六釐鼓修一尺九寸四分四釐股博九寸七分二釐鼓博六寸四分八釐厚八分零九毫御製銘同前特磬第三太簇年月同前特磬第四聲應夾鍾之吕股修一尺二寸一分三釐六毫鼓修一尺八寸二分零四毫股博九寸一分零四毫鼓博六寸零六釐八毫厚八分六釐四毫御製銘同前特磬第四夾鍾年月同前特磬第五聲應姑洗之律股修一尺一寸五分二釐鼓修一尺七寸二分八釐股博八寸六分四釐鼓博五寸七分六釐厚九分一釐零二絲御製銘同前特磬第五姑洗年月同前特磬第六聲應仲吕之吕股修一尺零七分八釐六毫鼓修一尺六寸一分七釐九毫股博八寸零八釐九毫五絲鼓博五寸三分九釐三毫厚九分七釐二毫御製銘同前特磬第六仲吕年月同前特磬第七聲應蕤賔之律股修一尺零二分四釐鼓修一尺五寸三分六釐股博七寸六分八釐鼓博五寸一分二釐厚一寸零二釐四毫御製銘同前特磬第七蕤賔年月同前特磬第八聲應林鍾之吕股修九寸七分二釐鼓修一尺四寸五分八釐股博七寸二分九釐鼓博四寸八分六釐厚一寸零六釐四毫御製銘同前特磬第八林鍾年月同前特磬第九聲應夷則之律股修九寸一分零二毫鼓修一尺三寸六分五釐三毫股博六寸八分二釐六毫五絲鼓博四寸五分五釐一毫厚一寸零七釐八毫七絲御製銘同前特磬第九夷則年月同前特磬第十聲應南吕之吕股修八寸六分四釐鼓修一尺二寸九分六釐股博六寸四分八釐鼓博四寸三分二釐厚一寸一分五釐二毫御製銘同前特磬第十南吕年月同前特磬第十一聲應無射之律股修八寸零九釐鼓修一尺二寸一分三釐五毫股博六寸零六釐七毫五絲鼓博四寸零四釐五毫厚一寸二分一釐三毫六絲御製銘同前特磬第十一無射年月同前特磬第十二聲應應鍾之吕股修七寸六分八釐鼓修一尺一寸五分二釐股博五寸七分六釐鼓博三寸八分四釐厚一寸二分九釐六毫御製銘同前特磬第十二應鍾年月同前特磬十二枚各按月律陳設凡有四簨虡第一簨虡懸黃鍾大吕太簇三磬第二簨虡懸夾鍾姑洗仲吕三磬第三簨虡懸蕤賔林鍾夷則三磬第四簨虡懸南吕無射應鍾三磬皆以黃絨紃繫之趺飾卧鳬白羽朱喙簨端鳯首簨虡之髙濶雕飾金采流蘇几墊並與鎛鍾簨虡同編磬律吕正義曰按磬制周禮考工記言之已詳奈注者未盡其藴而制又未按其理故施於用而未合存諸簡而無徵也夫倨句一矩有半者倨之為言曲也禮記注微曲曰倨大曲曰句蓋句股之角直為大曲而磬之角鈍故微曲而為倨總之凡句與股皆矩也矩之小者為句矩之大者為股句為二分股為三分則股為句之一矩又有半譬如小矩句為一尺八寸則大矩股為二尺七寸句之一尺八寸復加其半九寸非二尺七寸乎下文博為一股為二鼓為三正此意也博為廣濶先儒已解之博為一乃一分譬如句為一尺八寸則博為九寸三分其股博去一以為鼓博者言股博為三分則鼓博為二分譬如股博為九寸則鼓博為六寸矣然首言博為一股為二鼓為三則所謂博者未分股博與股廣也今若以股博為股之半則鼓廣復去三分之一毋乃太狹若以股博為鼓之半而鼓廣為股博之三分之一則體制適合於宜原其故蓋因鼓修大於鼓分懸之必偏一側惟鼓之長者狹而股之短者反廣則輕重相稱懸之而無偏側之慮大矩以擊而言故謂之鼓而小矩反易名曰股此又見古之句股之名蓋未嘗分大小也為一為二為三者一分二分三分之謂非一律二律三律之意也黃鍾之九寸三之而二尺七寸以為特磬獨懸其一可已若編十六枚而同懸一虡豈能勝之今取考工記博一股二鼓三之說依律吕損益之法而定制焉一則以黃鍾之律為本使各磬大小一制則按十二律吕上下相生之制而為各磬之厚薄彼鼓大至二尺七寸者為黃鍾之特磬矣今若半之為一尺三寸五分則股為九寸鼓博則四寸五分以今尺之度言之則股為七寸二分九釐鼓為一尺零九分三釐五毫股博為五寸四分六釐七毫五絲鼓博則為三寸六分四釐五毫此依黃鍾之律而起度如此既以黃鍾之律為之本或用其全或用其半或用其倍以定其股博鼓廣之度分而使十六磬大小長短一制然後以黃鍾之律定一磬之厚為之準如黃鍾今尺度七寸二分九釐則用其十分之一七分二釐九毫以為一磬之厚審其音與黃鍾之律相應乃以此度倍之得一寸四分五釐八毫復為一磬之厚審其音必與前七分二釐九毫之磬同聲為一音之清濁乃自清音之磬依律吕三分損益之法上下生之則十二磬之厚薄以次皆得乃加二變體之分以為清濁二均七聲之準復於十四分內取其最清音四釐之厚而各半之為最濁音四磬之度而十四分內最清二音在所不用於是十六磬之制全爰以配排簫之一十六管而與編鐘並列為雅樂焉各磬相生之法亦以倍體為損益之原上下相生以得十有二分至於倍清濁二均之一十四聲亦取第十二分還生不及原體之一變分與此變分轉生再得之十二分用之其變磬之一十有六則亦取清濁二均下羽至正羽之隂陽各八而用應二倍律二倍吕之四體故取倍體所生之第四分第三分第二分及第十三分變體半之用此四分並倍體所生之第三第四以至第十二再變體所生之第十二與黃鍾之一正體共為一十有六其倍體所生之第二與第十三之變體在正羽之前故不用律吕正義後編曰編磬十六枚以靈壁石或碧玉為之長濶皆同一制其厚薄則有損益應律與鍾同倍夷則之磬厚六分零六毫八絲倍南吕之磬厚六分四釐八毫倍無射之磬厚六分八釐二毫六絲倍應鍾之磬厚七分一釐九毫一絲黃鍾之磬厚七分二釐九毫大吕之磬厚七分六釐八毫太簇之磬厚八分零九毫夾鍾之磬厚八分六釐四毫姑洗之磬厚九分一釐零二絲仲吕之磬厚九分七釐二毫蕤賔之磬厚一寸零二釐四毫林鍾之磬厚一寸零六釐四毫夷則之磬厚一寸零七釐八毫七絲南吕之磬厚一寸一分五釐二毫無射之磬厚一寸二分一釐三毫六絲應鍾之磬厚一寸二分九釐六毫兩面繪金雲龍中心開孔以黃絨紃繫之十六枚共懸一簨虡趺飾以卧鳬白羽朱喙籍地水紋簨首鳳頭上樹金鳳五上板雕彩鳳餘與編鍾簨虡同明代圜丘磬用玉康熙五十二年制造樂器祈榖壇亦用玉餘俱用靈璧石周禮簨飾以麟今則鍾簨以龍而磬簨以鳳業亦如之大抵我朝樂制多因前明之舊而聲音度數之精則我聖祖仁皇帝所獨得也土之屬塤律吕正義曰管籥諸音全係中空容積之度分初無預乎管體之厚薄塤雖土樂而生聲亦如管籥之含氣其要亦在中空容積之度分而無預乎外體之厚薄也按風俗通寶慶府志所載塤制其內髙三寸五分上下謂古尺度則為今尺之二寸九分上下若謂今尺之三寸五分則與半黃鍾之度為近時用塤內髙二寸二分上下則與半夷則南吕相和之度為近如以半黃鍾三寸六分四釐五毫之數為內髙則中空容積必得三十二倍黃鍾之積為體其形制始合於宜以二寸九分之數為內髙則中空容積必得一十六倍黃鍾之積為體其形制始合於宜以半夷則南吕相和之二寸二分一釐之數為內髙則中空容積必得八倍黃鍾之積為體其形制始合於宜至於取音一以中髙為準依三分損益之法而前後設孔焉八倍黃鍾之塤全體所得聲字適應黃鍾之宫故定為雅樂所用而名之曰黃鍾塤其協大吕一均者則用七倍黃鍾之積為體而諸孔損益之法乃以黃鍾八分之七同形管之律吕相和之分準其度蓋黃鍾八分之七之管實與大吕相應故因以立制而名之曰大吕塤黃鍾塤以八倍黃鍾之積為體其諸孔之度即用正黃鍾所生律吕之分其內髙則半夷則半南吕相和之分為二寸二分一釐七毫其大徑一寸七分二釐二毫底徑一寸一分四釐八毫其頂孔應黃鍾之律宫聲工字是為此塤全體之聲字焉其半無射半應鍾相和之分一寸九分七釐一毫設孔應姑洗之律角聲六字為前三孔居中之第一孔焉其黃鍾大吕相和之四分之一一寸七分六釐四毫設孔應蕤賔之律變徵五字為前三孔之居左第二孔焉其太簇夾鍾相和之四分之一一寸五分六釐八毫設孔應夷則之律徵聲乙字為前三孔之居右第三孔焉其姑洗仲吕相和之四分之一一寸三分九釐四毫計其序宜應無射之律為上字今設孔比無射之律低半音其㽔賔林鍾相和之四分之一一寸二分四釐七毫設孔又比無射之律高半音爰以此二分相併折中得一寸三分二釐設孔乃應無射之律羽聲上字為後二孔之居左第四孔焉其次夷則南吕相和之四分之一為通體之半設孔比半黃鍾之律變宫尺字低半音其無射應鍾相和之四分之一為第一孔之半設孔乃應半黃鍾之律變宫尺字為後二孔之居右第五孔焉較其正半之分則六字之半應尺字為下三音蓋最下第一與最上第五為正半之分而半比正下三音亦如管籥諸器半體以上半分比正分遞下三音之理也至此五孔已畢獨遺應太蔟之律為凡字者而以頂孔應黃鍾之律為工字者代之此黃鍾塤之各孔分也大吕塤以七倍黃鍾之積為體其諸孔之度即黃鍾八分之七同形管所生律吕之分其內高則半夷則半南吕相和之分為二寸一分二釐其大徑一寸六分四釐七毫底徑一寸零九釐八毫其頂孔應大吕之吕清宫髙工字是為此塤全體之聲字焉其半無射半應鍾相和之分一寸八分八釐五毫設孔應仲吕之吕清角高六字為前三孔之居中第一孔焉其黃鍾大吕相和之四分之一一寸六分八釐七毫設孔應林鍾之吕清變徵高五字為前三孔之居左第二孔焉其太簇夾鍾相和之四分之一一寸四分九釐九毫設孔應南吕之吕清徵高乙字為前三孔之居右第三孔焉其姑洗仲吕相和之四分之一一寸三分三釐三毫計其序宜應應鍾之吕為髙上字今設孔比應鍾之吕低半音其蕤賔林鍾相和之四分之一一寸一分九釐三毫設孔又比應鍾之吕髙半音爰以此二分相併折中得一寸二分六釐三毫設孔乃應應鍾之吕清羽高上字為後二孔之居左第四孔焉其次夷則南吕相和之四分之一為通體之半設孔比半大吕之吕清變宫髙尺字低半音其無射應鍾相和之四分之一為第一孔之半設孔乃應半大吕之吕清變宫高尺字為後二孔之居右第五孔焉較其正半之分則髙六字之半應高尺字亦為下三音矣至此五孔已畢獨遺應夾鍾之吕為高凡字者而以頂孔應大吕之吕為髙工字者代之此大吕塤之各孔分也塤之用於雅樂止取五聲而無二變其體亦止得六聲而不能備七聲之全五孔並頂孔為六音即添設一孔亦不能得所遺聲字至於旋宫轉調則以最近一音借用之或隨調而另製一體此所以有雅塤頌塤大小之别也律吕正義後編曰黃鍾塤以八倍黃鍾積為體內髙二寸二分三釐腰徑一寸七分一釐七毫底徑一寸一分六釐八毫頂上一孔前面四孔後面二孔頂孔至底為本體黃鍾之分聲應黃鍾之律得姑洗簫之工字是為全體翕聲六孔皆閉次前左下第一孔為凡字聲字俱以姑洗簫言乃本體大吕之分得二寸零八釐八毫寸分俱自頂孔向下直算凡吹凡字此孔獨開餘俱閉次前右下第二孔為六字乃本體太蔟夾鍾相和之分得下寸九分一釐九毫凡吹六字此孔及左下一孔皆開餘皆閉次前左上第三孔為五字乃本體姑洗之分得一寸七分六釐二毫凡吹五字此孔及下二孔皆開餘皆閉次前右上第四孔為乙字乃本體蕤賔之分得一寸五分六釐六毫凡吹乙字前四孔皆開後二孔閉次後右第五孔為上字乃本體南吕之分得一寸三分二釐一毫凡吹上字此孔及前四孔皆開後左孔閉次後左第六孔為尺字乃本體半太簇之分得九分九釐一毫凡吹尺字六孔皆開體以燒土為之朱漆繪金雲龍垂五彩流蘇為飾大吕塤以七倍黃鍾積為體內髙二寸一分三釐三毫腰徑一寸六分四釐二毫底徑一寸一分一釐七毫頂孔至底為本體黃鍾之分聲應大吕之吕得仲吕簫之工字次前左下第一孔為凡字聲字俱以仲吕簫言乃本體大吕之分得一寸九分九釐八毫次前右下第二孔為六字乃本體太蔟夾鍾相和之分得一寸八分三釐六毫次前左上第三孔為五字乃本體姑洗之分得一寸六分八釐六毫次前右上第四孔為乙字乃本體蕤賔之分得一寸四分九釐八毫次後右第五孔為上字乃本體南吕之分得一寸二分六釐四毫次後左第六孔為尺字乃本體半太蔟之分得九分四釐八毫體飾與黃鍾塤同前編定黃鍾塤大吕塤各按律吕之分開孔取聲隂陽二均無不克諧惟無凡字孔蓋塤之用於雅樂止取五聲而無二變其㫖已明今以句股三角之法立為定率比例求之其形制仍與舊式相同而本體自有律分前編之所審定自與律分相合而容積生聲亦與管音同理爰按分開六孔併吹孔為七五聲二變其音悉協蓋至是而塤制乃為盡善云革之屬建鼓律吕正義後編曰以木為匡面徑二尺三寸零四釐為四倍姑洗之度中徑三尺零七分二釐為面徑三之四長三尺四寸五分七釐為六倍姑洗之度穿徑為方孔以柱貫其中而樹之趺四足飾以卧獅身長一尺七寸二分八釐兩足通長四尺八寸六分濶九寸七分二釐厚一寸九分二釐趺上為座以受柱髙一尺九寸二分座上圓柱二尺四寸三分徑四寸八分六釐圓柱之上為托雲以承鼓縱長二尺五寸六分濶四寸三分二釐橫長一尺五寸三分六釐濶九寸七分二釐中心厚四寸三分二釐柱貫鼓上出以擎蓋上圓下方四尺二寸三分四釐八毫髙一尺五寸三分六釐䝉以繡雲龍黃縀衣蓋上壓梁四角龍首出角外一尺二寸九分六釐中安金頂髙八寸零九釐上植金鸞髙一尺零七分八釐六毫長一尺九寸四分四釐鼓靣繪五彩雲龍緣邊金釘二層繪五彩蓮花鼓匡并柱趺座皆髹以金鼓匡兩旁各二盤龍銜小金環四環及龍首鸞口並垂五綵流蘇為飾明堂位曰殷楹鼓周大射禮用建鼓鄭康成曰植者為楹貫而樹之楹謂之柱貫中上出建猶樹也以木貫而載之樹之跗也隋志曰近代相承植而貫之謂之建鼓又棲鷺於其上不知何代所加唐宋建鼓亦仍隋志元史樹鼓四每樹三鼓中植以柱曰建鼓旁挾二小鼓曰鞞曰應至明㑹典則曰應鼓制與今同顧其所以名應鼓者或以其度小於晉鼓而名之然孔頴達謂應鞞為應和建鼓則建者不當名應仍曰建鼓可也周禮鼓人掌教六鼓四金之音聲以節聲樂今中和韶樂每歌句終即擊鼓衆樂皆止是止之節也鼓再擊少間復一擊乃再歌衆樂復作是作之節也體用皆不失古蓋其制至善其聲至和且革木一聲無容竒巧故古制至今存也搏拊律吕正義曰周禮大師大祭祀率瞽登鼓令奏擊拊下管播樂器令奏鼓􅉧注云擊拊瞽乃歌拊形如鼓以韋為之著之以糠􅉧小鼓也蓋古者登歌堂上拊以先之管在堂下鼓􅉧以引之先擊小鼓乃擊大鼓然後衆樂皆作也拊與􅉧堂上堂下相須為用以成歌奏之節後世􅉧雅舂牘不存而拊僅存焉相傳用熟皮為之長一尺四寸面徑七寸實之以糠是亦革之音也今定制以黃鍾之長為徑倍之為長庶數有所依而法有所立矣律吕正義後編曰搏拊如鼓而小面徑七寸二分九釐為黃鍾之度長一尺四寸五分八釐為倍黃鍾之度腰徑九寸七分二釐為面徑三之四漆繪與建鼓同匡之上面施金盤龍二銜小金環以黃絨縧繫之橫置之趺趺高一尺一寸五分二釐長一尺三寸六分五釐二毫濶九寸一分零二毫凡合樂工人掛於頸以手擊之每鼓一擊則搏拊兩擊以為應和之節搏拊逺古之制不可考元史猶云中實以糠至明㑹典則曰木匡冒以革其器尚存長為面之倍腰徑加面三之一則與鼖鼓制同但形體小耳劉熙釋名曰在後曰應然則今之搏拊又即古應鞞之遺法耶杖鼓律吕正義後編曰杖鼓上下二面木匡細腰匡高一尺九寸四分四釐為三倍太蔟之度腰徑二寸八分八釐為姑洗半度兩端徑八寸一分為黃鍾九分之十上下二面鐵圈徑一尺二寸九分六釐為太蔟倍度冒以革冒縫緑皮掩錢面匡俱黃油地繪五彩雲龍上下鼓邊貼金如意頭鐵鈎各六交錯相對以黃絨綆聨之而緊束其腰紅縀鼓衣緑縀瀝水銷金雲龍以紅漆竹半擊之杖鼓之制始於漢魏而隋唐以來因之今杖鼓有大小二種大者用於丹陛樂小者用於清樂小杖鼓律吕正義後編曰案元史扎鼓制如杖鼓而小左手持而右手擊之蓋後周杖鼓有三等之遺制也今以數考之或為杖鼓三分之二或為二分之一餘俱與杖鼓同俳鼓律吕正義後編曰朝鮮國俳鼓制與鹵簿龍鼓相似但其制微小耳面徑一尺六寸九分六釐為倍太簇之度腰徑一尺三寸六分四釐為倍大吕之度厚四寸三分二釐為南吕之度面粉油匡硃油繪五彩雲龍兩旁各施銅環以黃扁縧繫於項逹卜律吕正義後編曰回樂達卜木匡冒以革靣徑一尺三寸六分五釐二毫高二寸二分七釐五毫又一具面徑一尺二寸二分四釐髙一寸六分二釐以手指擊之那噶喇律吕正義後編曰回樂那噶喇狀類行鼓鐵匡上大下小冒以革面徑六寸四分八釐底徑二寸六分二釐八毫高四寸八分六釐以二木杖擊之大鼓律吕正義後編曰大鼓以木為匡冒以革靣徑二尺六寸四分五釐為五倍黃鍾之度中圍加三之一徑四尺八寸六分為十倍林鍾之度高三尺二寸四分為五倍太簇之度靣黃油匡硃油繪五彩雲龍腹內安銅膽周圍鍍金釘四旁鍍金環半懸架上架高六尺寬五尺五寸油飾彩畫同匡柱頭貼金蹲獅髙一尺一寸油中釘鍍金鈎以掛鼓環紅紵絲鼓衣緑紵絲瀝水銷金雲龍擊以紅漆槌鼓蹈硃油長二尺二寸五分上層高濶各八寸五分下層髙九寸五分底濶一尺七寸按禮器縣鼓在西應鼓在東孔頴逹謂縣鼓為大鼓陳暘謂後世大鼓即古鼖鼓以今考之古之大鼓皆長過於靣而橫縣於簨今則靣過於長而平縣於架然則今之大鼓非古之大鼓也隋唐鼓吹有大鼓其制未詳然用之大駕則非縣於簨虡可知宋有散鼓教坊鼓樂圖皆平置與今大鼓相似元用之宴樂前明乃用於丹陛樂我朝因之至於合樂則以鼓發聲亦猶周禮播樂鼓􅉧之義蓋堂下樂無柷故也龍鼓律吕正義後編曰龍鼓木匡冒以革面徑一尺五寸三分六釐為三倍蕤賓之度腰徑一尺七寸二分八釐為二倍姑洗之度高六寸四分八釐為太簇之度靣粉油匡硃油繪五彩雲龍四旁貼金銅環繫以黃絨縧紅縀鼓衣緑縀瀝水銷金雲龍架用硃紅攢竹三根各釘貼金鐵環以黃絨縧聨之陳則置鼓於架行則掛鼓於項槌二紅油柄緑油槌頭歷代鹵簿鼓名不一制亦不詳宋陳暘謂鐃鼓宜為鼓吹鐃歌之鼓元金鼓隊鼓二十四人明鹵簿樂亦曰金鼓左右各鼓二十四面徑一尺七寸與今制合但樂圖鐃鼓橫懸而有蓋今則平置而有衣蓋因革損益代有不同而我朝鼓制固仍元眀之舊云導迎鼓律吕正義後編曰導迎鼓制如大鼓而小面徑二尺零四分八釐為四倍蕤賓之度腰徑二尺四寸三分為五倍林鍾之度髙一尺六寸二分為二倍半太簇之度面粉油匡硃油繪五彩雲龍腹內安銅膽周圍鍍金釘四旁鍍金環紅漆木杠黃絨綆舉之擊以紅漆槌鼓衣瀝水俱紅縀織五綵雲龍行鼓律吕正義後編曰行鼓一名陀羅鼓木匡上大下小冒以革面徑一尺零八分為二倍半南吕之度腰徑一尺二寸九分六釐為三倍南吕之度髙一尺五寸一分二釐為三倍半南吕之度底徑五寸一分八釐九毫為南吕五分之六面粉油匡硃漆繪金綵雲龍貼金銅釘鈸環繫以黃絨縧跨於馬上架三柱高三尺橫檻各二長九寸硃漆描金雲龍中心以鐵為樞三檻相銜以時闔闢柱上鐧金鐵鈎下馬陳樂則懸鼓於架行鼓上大下小為便跨於馬上耳唐有三靣鼓形如缸首廣下鋭腹廣不過首冒以虺皮下當地則不冒制亦類此手鼓律吕正義後編曰手鼓以木為匡冒以革面徑九寸一分零二毫為倍夷則之度腰徑一尺零二分四釐為倍蕤賓之度厚二寸一分六釐為半南吕之度頂髙二寸柄並托雲共長一尺五寸鼓面粉油匡柄硃油繪五彩雲龍緣邊鍍金釘頂及托雲皆塗金左手持而右手以槌擊之案手鼓之制不知其所自起眀王圻三才圖㑹手鼓制扁而小今清樂用之皇朝文獻通考卷一百六十二
