body:
  text: 欽定四庫全書皇朝文獻通考卷一百十宗廟考四太廟雍正十三年九月己亥皇上登極十一月丁未恭奉册寶上大行皇帝尊諡曰敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝廟號世宗先是九月庚子皇上諭禮部自古聖帝明君功德大成必有顯號徽稱所以昭垂萬世典至巨也我皇考大行皇帝乘乾建極撫御萬邦錫福諴民德化翔洽虔恭寅畏昭事蒼穹郊祀祈年必親必敬欽承祖烈光大前猷至孝肫誠千古未有當皇祖上賔時盡制盡哀喪儀隆備親送梓宫屢謁陵寢嵗時瞻拜御容舉念常伸孺慕繼顯謨之盛推錫類之仁宸衷祇敬則朝乾夕惕厯久彌勤親政憂勞則盛暑祁寒未嘗稍間整綱飭紀眀目達聰施措咸宜德威並用篤宗室則立學以隆教育惠八旗則賜帑以備吉凶厚臣工而加俸養亷眷忠良而建祠賜祭勵廉能以察吏宏薦拔以羅才廣藉田以重農桑定品式以崇節儉重道則經筵嵗舉愛士則科目頻加隆先師五代之王封新闕里千秋之廟貌修明典禮懷柔百神厚植綱常旌揚節孝蠲逋減賦不惜億萬之帑金開墾築堤永享萬年之樂利備賑則廣行積貯養兵則優贍身家律例則釐定科條讞決則特詳咨酌廣開言路詳示硃批洞矚羣情慮周六合大閲以詰戎兵訓練以修武備睿謨獨運而小醜立奏蕩平聖武布昭而荒徼永圖綏靖開天明道聖學髙深覺世牖民宸章炳煥闡聖賢之精藴宣心性之圎機函蓋古今彪爍宇宙天心協應有感必通德盛化神諸瑞畢至古帝王之良法善政至皇祖而集其大成我祖宗之駿烈鴻猷逮皇考而益彰善述眇豫沖子寅奉丕基仰惟功德之隆宜備尊崇之典敬循禮制恭上尊諡廟號爾部詳察典禮具奏是日禮部奏謹查康熙六十一年恭上聖祖仁皇帝尊諡廟號奉大行皇帝諭旨以追崇大典攸關理宜僉謀共協令諸王大臣等會同九卿詹事科道文官六品以上武官四品以上詳考舊章從公確議今大行皇帝尊諡廟號禮制崇重臣等謹遵舊典仍請會同諸王大臣齊集廷臣詳慎公議昭垂萬世得旨是敬謹確議具奏是月乙巳諸王大臣會同九卿詹事科道文官六品以上武官四品以上諸臣等議上自古帝王撫御寰區功德隆盛有博厚髙明之實則必有隆爍顯懿之名是故於堯曰欽明文思於舜曰濬哲文明所以著盛德之形容而垂萬年之軌則也欽惟大行皇帝丕冒八埏曲成萬物有與天同體之德有敬天行健之功祗奉郊壇必親薦享端居宫禁亦凛明威暘雨偶愆齋心而默禱嘉祥屢告讓美而弗居昭事存乎旦明感通捷於影響當天庥之滋至綿景運之方隆撫列聖式廓之版章益漸之以聲教馭四海咸熙之臣庶更霈之以恩膏安愈求安聖不自聖惟精惟一建中於民克儉克勤表正自上執權衡以御物偏黨之習潛消定模範以示人仁讓之風溥洽官常於是而肅士品於是而端民俗於是而淳物情於是而暢嘉禾芝草醴泉慶雲之瑞充塞於寰中荷蘭日本暹羅蘇祿之琛輻輳乎闕下凡此運會之彌昌彌熾皆由聖德之可法可傳至乃學貫天人辭成典詰敷治平之大道闡性命之微言歲舉經筵首詣太學新闕里千秋之廟貌隆先師五代之王封廣勵膠庠修明典禮定宗學之制開國書之科博訪鴻儒遍立書院大行皇帝之誕敷文教有如此者惟仁必勇不怒而威選將悉有用之材練兵於無事之日天戈所指青海獻俘帝命甫申西陲納疑化蠻荒為郡縣靖蕃落於邊隅大行皇帝之布昭聖武有如此者志邁百王心通庶務事無難易鋭若發機人有忠邪洞如觀火謀略出羣工之上照臨周六合之遙大行皇帝之英姿天挺明睿夙成有如此者坦懷應物博愛為心不以一眚棄材不使一夫失所惇敘九族容保萬方厚百官而倍豫廪糈惠八旗而時加恤賚閭井必豫謀其樂利兵丁各優贍其身家減賦蠲逋不惜帑金之億萬詳刑讞獄允釐令典之三千盛暑而曲貸囚徒小祲而遍賙貧户大行皇帝之寬則得衆仁以長人有如此者道循物而無違德有常而不息本實心以宣為政令春溫秋肅儼如四序之罔愆由定力而發為憂勤旰食宵衣不以片時而少斁大行皇帝之信必由中毅以持久有如此者經曰聖人之德無以加於孝我大行皇帝昔在藩封晨昏盡禮及傳丕緒哀敬竭情親送梓宫屢謁陵寢三載始還吉服四時恆拜御容體聖祖之心以為心法聖祖之政以為政耕藉著為定例爰奉太廟之粢盛賢良建有專祠尤眷先朝之耆舊德教加於百姓孺慕極於終身大烈光前貽謀昌後孔子稱虞舜曰大孝惟大行皇帝足以當之若夫誠者天之道也成已成物之全德也我大行皇帝以此享帝享親以此盡心盡性以此用人行政以此覺世牖民諸臣敬奉之硃批萬國共聞之諭旨固已言之諄復莫不凛為典章暨夫龍馭上賔特頒遺詔敬聆至誠之訓仰思無間之功聖學髙深渾然一理神明沖穆儼在重霄子思曰惟天下至誠為能經綸天下之大經立天下之大本知天地之化育惟大行皇帝足以當之夫中以宅心正以體政文以敷化武以定功英以決機明以燭理寬以居之仁以行之信以成之毅以守之而皆本之於大孝運之以至誠此洵聖德之全與天同體可為萬世法者也臣等謹按虞書曰率作興事慎乃憲書傳曰憲法也説命曰惟天聰明惟聖時憲又曰監於先王成憲周禮疏云懸法以示人曰憲中庸亦曰憲章文武蓋惟憲天立教之聖人然後能慎法度興政事俾萬世奉為成憲守而不忘若虞舜商湯周之文王武王皆是也竊謂大行皇帝尊諡於憲為宜又按禮記祖有功宗有德是故有虞氏祖顓頊而宗堯夏后氏祖顓頊而宗禹商人祖契而宗湯周人祖文王而宗武王周公作無逸則稱商有三宗而周文武之廟並稱世室公羊傳曰世世不毁也中庸曰君子動而世為天下道行而世為天下法言而世為天下則竊惟大行皇帝廟號宜稱世宗與太祖太宗世祖聖祖並為百世不祧之廟臣等公擬敬上尊諡曰敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝廟號曰世宗天下萬世稱曰世宗憲皇帝庶足以顯揚大德表著巍功與日月而齊光偕山河而並永矣謹奏奉諭曰諸王大臣公同議上皇考大行皇帝尊諡曰憲皇帝廟號世宗於我皇考至德鴻猷實相符合禮稱祖有功宗有德廟號之稱祖稱宗均屬尊崇之極而象功昭德惟期允當方協至公昔我皇祖聖祖仁皇帝久道化成身兼創守平定逆藩掃清朔漠神功駿烈自古莫與比隆廟號定應稱祖皇考大行皇帝善繼善述敬天勤民十三年來宵旰憂勞咸熙庶績貽萬年之景福固百代之丕基廟號世宗正合古宗有德之義上配烈祖百世不祧此乃天下萬世之定論非在廷諸臣尊崇君父敷揚稱頌之私情尤非朕一人哀感隆恩表彰盛德之私願所能強置一詞也在我皇考神謨垂於宇宙厚澤洽於臣民即罄竭揄揚難盡萬一今據所奏敬擬上尊諡廟號詳慎公當足以昭示萬年朕心深為慰愜所有應行典禮該部敬謹查議具奏是日辰時皇上素服於太和門恭閲大行皇帝尊諡册寶行禮畢回宫更縞素預詣雍和宫大門外東配殿恭候已時册寶至雍和宫皇上詣大行皇帝梓宫前恭獻册寶行禮册文曰臣聞至德同天裕鴻模於萬世深恩浹地垂駿烈於千秋揚顯號以薦徽稱考彝章而崇殷禮光昭寶册輝映瑶圖欽惟皇考大行皇帝道協清寧功隆位育敬天而虔昭事孚精意於郊壇法祖而篤顯承致孝忱於廟祏紹中天之景運開奕代之昌期精一傳心建大中而出治蕩平立極居至正以表邦敷文則重道尊師宏作人之雅化振武則安邊懷逺恢保泰之神謨天亶聰明坐照靡遺於庶物性成英睿淵衷逺徹於萬方御衆以寬而蠲賦省刑共沐仁恩之浩蕩示民有信而敦化善俗咸欽毅力之甄陶蓋本大孝不匱之思善繼以成夫善述且運至誠無息之用實政而體以實心乃至瑞集苞符海宇之禎祥畢至誠輸職貢梯航之琛賮胥來而乃謙抱彌深憂勤並勵朝乾夕惕弗釋一二日兢兢業業之心旰食宵衣用成十三載蕩蕩巍巍之治樹百王之模範言言寶鑑丹書傳百代之章程事事金科玉律有典有則永垂裕於後昆是訓是行敬率由於成憲兹博詢夫公議期允愜於輿情尊諡憲皇實符盛烈載稽往籍式考禮經宗堯宗禹宗湯廟貌宗尊於有德世道世法世則蒸嘗世承於不祧殷美三宗宜肇禋宗之典周崇世室爰開卜世之祥配列祖於在天薦世宗之新廟合朝野僉謀而悉協揆古今通義而交孚謹奉册寶恭上尊諡曰敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝廟號曰世宗惟耿光大烈之常昭冀景福純禧之茂介伏祈昭格俯賜鑒臨謹言實文曰世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝之寶丙辰恭奉册寶上孝敬皇后尊諡曰孝敬恭和懿順昭惠佐天翊聖憲皇后先是九月癸卯皇上諭禮部朕惟至治莫先於崇孝徽稱首重於易名天地之覆載同功帝后之尊親一體欽惟孝敬皇后作配皇考懋著坤儀孝德夙洽於宫闈仁惠久孚於壼掖朕躬承顧復備荷恩慈兹恭上皇考大行皇帝尊諡宜並追崇恭上尊諡以展孝思以昭萬世爾等詳查典禮具奏十一月戊戌總理事務王大臣會同禮部議上竊惟尊親之典帝后同稱孝慕之忱顯揚並切溯有娀於殷世祥祉攸凝紀太姒於周詩徽音永炳矧係聖代之母儀宜有加崇之顯號欽惟孝敬皇后功符坤載德協乾元篤誠孝於宫庭動循禮則懋勤勞於壼掖翊贊謨猷溫恭備著夫嘉徽和慎聿昭其淑德丕宣閫教化啓肅雍共被仁慈恩推鞠育慶升平而佐理帝治彌昭貽福祉以垂庥孝思倍摯臣等恭遵諭旨敬考彝章謹擬恭上尊諡曰孝敬恭和懿順昭惠佐天翊聖憲皇后伏俟命下之日一切應行典禮交與該衙門敬謹辦理謹奏得旨是依議是日辰時皇上素服於太和門恭閲孝敬皇后尊諡册寶行禮畢預詣田村享殿大門外東邉幄次恭候已時册寶至田村享殿皇上詣孝敬皇后梓宫前恭獻册寶行禮册文曰慈徽永慕垂懿範於千秋茂典追崇耀鴻聲於萬葉晉瑶函而展孝溯淑德以揚休欽惟皇妣孝敬皇后體順承天含章應地性成純孝重闈之奉養備得歡心化洽肅雍朱邸之贊襄久彰令則逮正中宫之位益宏內治之功躬節儉以表率宫庭履敬順而分憂宵旰溫恭示教茂昭愷悌之風惠愛覃敷咸頌寬和之德顧惟沖眇夙荷恩暉蘭殿瞻依緬訓言之如在雲軿長往愴歲序之頻遷兹當繼序之初倍切顯揚之願敬循彞典祗奉尊稱敬奉册寶恭上尊諡曰孝敬恭和懿順昭惠佐天翊聖憲皇后伏冀慈鑒丕昭錫蕃禧而昌後鴻庥垂庇貽介福以流徽永懷罔極之恩佑啓無疆之祚謹言寶文曰孝敬恭和懿順昭惠佐天翊聖憲皇后之寶乾隆元年正月命修太廟是月戊申諭國家式崇太廟並奉先殿妥侑列祖神靈嵗時祗薦明禋典禮允宜隆備今廟貌崇嚴而軒櫺榱桷年久未經增飾理宜敬謹相視慎重繕修以昭黝堊示新之敬著該部會同內務府詳議具奏三月丙申以加上列祖列后尊諡恭修飾太廟神牌遣官祗告乙巳恭奉册寶加上太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝孝慈昭憲敬順仁徽懿德慶顯承天輔聖髙皇后太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝孝端正敬仁懿哲順慈僖莊敏輔天協聖文皇后孝莊仁宣誠憲恭懿至德純徽翊天啓聖文皇后世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝孝惠仁憲端懿慈淑恭安純德順天翊聖章皇后孝康慈和莊懿恭惠溫穆端靖崇天育聖章皇后聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝孝誠恭肅正惠安和淑懿儷天襄聖仁皇后孝