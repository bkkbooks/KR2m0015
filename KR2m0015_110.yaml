參三才而正位至誠立極周庶物以成能緯地經天卜世之功日永民胞物與肇基之迹方新聲教訖於四方仰同光被神武昭於九有望切來蘇合謳頌以歸心集賢才而佐治國書初設製字母以諧音軍制新頒按卦圗而取義際天與人歸之會肇建邦啓土之勳造草昧而大經綸發祥自逺首庶物而膺圖籙裕後方長緬維垂統之隆宜極尊崇之禮祗承丕緒敬考彝章謹奉册寶增上尊諡曰太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝伏冀聖鑒長昭皇圖永固益啓綿長之澤彌臻熙皥之風謹言寶文曰太祖承天廣運聖德神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝之寶孝慈髙皇后加上尊諡册文曰功隆贊助溯開創於前猷誼重尊親表肅雍於顯號仰資生之大德昭裕後之光儀欽惟孝慈昭憲敬順仁徽慶顯承天輔聖髙皇后合撰坤元膺符宸極璇閨育德早傳淑慎之風蘭室觀型夙著安貞之範歸我太祖髙皇帝順乃承天仁能逮下奉神靈而理萬物肇作邦作對之休昌後嗣而燕皇天啓卜世卜年之運式荷慈闈之謙裕應地無疆毗成王業之崇隆發祥有本敬嗣徽音於百世丕昭鴻號於萬年謹奉册寶增上尊諡曰孝慈昭憲敬順仁徽懿德慶顯承天輔聖髙皇后伏冀慈鑒式憑繁禧載錫永啓萬方之景福長綏奕世之洪庥謹言寶文曰孝慈昭憲敬順仁徽懿德慶顯承天輔聖髙皇后之寶太宗文皇帝加上尊諡册文曰神謨丕顯瞻陟降於在天帝德誕敷仰光華於復旦長垂啓佑逺樹儀型欽惟太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏隆道顯功文皇帝乾健偕行離明普照道兼作述繼鴻業以開太平化洽寬仁慰羣黎而均覆幬任英賢而圖治一德一心定法制以宜民同倫同軌文思光被耀海隅出入之鄉聖武布昭震漠外無雷之域決策而平遼右龍起雲從移師以討朝鮮風行草偃三十五部咸抒貢琛獻賮之誠億萬斯年永奉受籙膺圖之緒大勳丕集皇哉迹廓肇基景命維新赫矣功先定鼎鴻猷偉績崇太室於不祧厚澤深仁覺徽稱之莫罄式遵彝典爰合僉謀謹奉册寶增上尊諡曰太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝伏冀耿光俯燭繁祉鴻綏鑒繩武之微忱介錫齡之遐福謹言寶文曰太宗應天興國𢎞德彰武寬溫仁聖睿孝敬敏昭定隆道顯功文皇帝之寶孝端文皇后加上尊諡册文曰配天贊化萬年昭雍肅之儀應地含章奕葉仰安貞之德載隆顯號遙頌徽音欽惟孝端正敬仁懿哲順莊敏輔天協聖文皇后位正坤寧功參乾始溫恭成性關雎傳藹吉之心敬慎流徽䄖翟仰端凝之度貴而能儉猶時御乎弋綈尊不忘勤每自成夫絺綌警六宫之傳漏恆襄問夜於未央欽九廟之薦馨克佐孝思於不匱玉階金戺聿宣仁惠之風椒殿珠宫益溥和平之化際文皇開創之日久著贊襄當世祖臨御之年備崇尊養顧惟沖藐遙荷恩暉膺纘緒於惟新緬流芳於弗替謹奉册寶增上尊諡曰孝端正敬仁懿哲順慈僖莊敏輔天協聖文皇后伏冀慈愛昭垂純僖點佑永啓鴻基於奕世長綿餘慶於萬年謹言寶文曰孝端正敬仁懿哲順慈僖莊敏輔天協聖文皇后之寶孝莊文皇后加上尊諡册文曰範高蘭掖逺垂內則之芳型德冠珠宫遙溯母儀之令望肅瞻玉几虔捧瑶函欽惟孝莊仁宣誠憲恭懿至德翊天啓聖文皇后柔順流徽安貞作則宏綏福履璇閨傳樛木之仁茂著臧嘉綺殿被葛覃之化正位乎內克佐櫛風沐雨之勳長發其祥爰徵繞電流虹之瑞誕我世祖章皇帝鍾靈育秀受籙膺圖敷天蒙聖善之庥率土頌仁慈之澤洎乎聖祖彌資鞠育深恩逮及世宗備舉欽崇巨典統兩朝之孝養受福綿長極三世之尊親垂光奕葉顧惟沖藐丕纘鴻基緬懷懿德於千秋載頌徽音於九廟謹奉册寶增上尊諡曰孝莊仁宣誠憲恭懿至德純徽翊天啓聖文皇后伏冀慈靈垂裕純嘏凝禧永綿佑啓於萬年長篤阜安於百世謹言寶文曰孝莊仁宣誠憲恭懿至德純徽翊天啓聖文皇后之寶世祖章皇帝加上尊諡册文曰聖人首出開景運於萬年至德光昭享鴻稱於百世式九圍而立極大一統以垂庥禮重顯揚業崇簡册欽惟世祖體天隆運定統建極英睿欽文大德𢎞功至仁純孝章皇帝道冠百王功垂奕世照臨六合亶成性之聰明表正萬邦錫自天之智勇敷同軌同倫之治肇造鴻基萃來王來享之忱長貽燕翼敬天而虔昭事允秉精誠法祖而篤顯承聿彰仁孝奉慈闈而侍養備極隆儀恤宗族以敦倫頻施曠典深仁厚澤率土均沾善裕宜民敷天共戴擴祖宗之宏業統華夏以歸心受命則惕厲憂勤圖治於十有八載啓後則親賢樂利衍慶於億萬斯年緬懷締造之謨欽承丕搆莫罄頌揚之願敬薦徽稱謹奉册寶增上尊諡曰世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝伏冀鑒觀有赫默佑無窮恭承列祖之庥永篤曾孫之慶謹言寶文曰世祖體天隆運定統建極英睿欽文顯武大德𢎞功至仁純孝章皇帝之寶孝惠章皇后加上尊諡册文曰儷乾作則啓萬年有道之長體巽流徽衍奕世無疆之慶晉金函而煥彩崇鴻號以揚芬欽惟孝惠仁憲端懿慈淑純德順天翊聖章皇后柔靜凝庥溫恭著範佐世祖而勤內治式贊太平事文母以展孝思聿隆尊養潔蘋蘩於九廟念切精誠親瀚濯於六宫身先節儉撫聖祖於幼沖之日竭慈覆於顧復之餘六十四年備恩勤之至德千八百國合愛戴之歡心惟和氣以致祥畢臻諸福信仁人之多夀克享大年當淑景方長皇考猶獲瞻夫色笑今恩暉遙荷眇躬正合致夫尊崇典禮維新顯揚益切謹奉册寶增上尊諡曰孝惠仁憲端懿慈淑恭安純德順天翊聖章皇后伏冀慈靈降鑒厚澤貽庥綿百世之本支佑萬邦之安阜謹言寶文曰孝惠仁憲端懿慈淑恭安純德順天翊聖章皇后之寶孝康章皇后加上尊諡册文曰懿德丕昭今則常垂於百世聖慈廣被鴻名永耀於萬年播彤管以增輝奉瑶函而煥彩欽惟孝康慈和莊懿恭惠溫穆崇天育聖章皇后道協坤元功符乾健勤修壼政早起化於宫庭懋著母儀永流徽於禁掖九廟之蘋蘩致潔克秉精誠重闈之問視時殷聿彰仁孝躬行節儉深宫成浣濯之風親贊太平厚德啓綿長之瑞篤生我聖祖仁皇帝誕應苞符育成聖德萃愛載於億千萬國享升平者六十餘年洎眇躬纂緒之初正巨典崇徽之日福垂善慶緬懿訓於無窮禮重顯揚體孝思於不匱謹奉册寶增上尊諡曰孝康慈和莊懿恭惠溫穆端靖崇天育聖章皇后伏冀純禧孔固慈佑彌隆永貽昌熾之祥長啓和恆之福謹言寶文曰孝康慈和莊懿恭惠溫穆端靖崇天育聖章皇后之寶聖祖仁皇帝加上尊諡册文曰聖德同天駿烈常垂於百世仁恩浹地鴻稱永著於千秋萬方之元化周流五紀之太和洋溢光昭啓佑禮重顯揚欽惟聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信功德大成仁皇帝道備中和功隆化育勵精圗治統經文緯武以宣猷久道化成兼繼往開來而立極邁百王而獨盛廣運彌神超千古以加隆大成集聖敬天立政時時弗釋夫憂勤法祖諴民事事務歸於寬大定三逆而平絶塞克成百世之膚功蠲舊賦而緩新征疊沛無窮之惠澤六十一年宵衣旰食總萬幾而日昃不遑千八百國樂業安居熙庶績而耄期不倦溯自眇躬之沖幼即蒙鞠育於宫闈聖訓親承憶音容而如昨祖庭逺隔瞻色笑以何從敬紹丕基貽孫謀於盡善緬懷盛德崇顯號於方新式考典章肅將忱悃謹奉册寶增上尊諡曰聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝伏冀神靈陟降緒業昭融永貽昌大之祥長享升平之福謹言寶文曰聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝之寶孝誠仁皇后加上尊諡册文曰功同厚載襄治化於昌朝禮重鴻稱耀徽音於寶册夙合二儀之撰聿垂奕葉之光欽惟孝誠恭肅正惠安和儷天襄聖仁皇后性秉溫恭範垂莊肅潔蘋蘩於九廟齋祀加虔奉􅎵瀡於重闈晨昏致謹孝慈育物椒庭之令則宏昭誠敬持躬蘭殿之芳徽允播勞心閫閾常分宵旰之憂勤贊化宫闈克佐升平之治理溯仁風之已逺彤管方輝緬懿誨之長垂瑶函正煥欽承丕緒值典禮之維新式考彝章方顯揚之莫罄謹奉册寶增上尊諡曰孝誠恭肅正惠安和淑懿儷天襄聖仁皇后伏冀淑靈式庇嘉德惟馨永貽昌熾之庥益佑和恆之福謹言寶文曰孝誠恭肅正惠安和淑懿儷天襄聖仁皇后之寶孝昭仁皇后加上尊諡册文曰功符坤厚貽燕翼於萬年德合乾元表鴻名於奕葉義必先於報本禮莫重乎尊稱欽惟孝昭靜淑明惠正和欽天順聖仁皇后性成淑慎範著溫恭華胄鍾祥頌芳聲之早播椒塗正位垂內則以長昭慰色笑於慈闈晨昏盡養佐憂勤於黼座夙夜加虔盛德方新翟茀遽辭於丹禁仁恩永戴針銘並著於彤編溯藹吉之令儀千秋煥彩緬孝慈之懿行百世流徽洎及眇躬實切顯揚之願欽承鴻業益深崇報之思考彞典以揚芬進瑶函而煥彩謹奉册寶增上尊諡曰孝昭靜淑明惠正和安裕欽天順聖仁皇后伏冀厚蔭長垂慈恩默佑介無疆之景福開有象之太平謹言寶文曰孝昭靜淑明惠正和安裕欽天順聖仁皇后之寶孝懿仁皇后加上尊諡册文曰儷天立極垂令範於千秋應地含章享隆名於奕世廟庭增煥典册維新欽惟孝懿溫誠端仁憲穆奉天佐聖仁皇后育瑞髙閎騰芬戚畹贊顯承之偉烈內則勤修篤慈愛之深仁母儀茂著晨昏有恪盡孝養於彤闈夙夜維虔佐憂勞於宸扆溯宫庭之佑啓撫皇考於沖齡十載劬勞備荷生成之德終天哀痛常懷髙厚之恩洎自眇躬欽承丕業體孝思於不匱尊禮宜崇熙鴻號於無窮頌揚莫罄謹奉册寶增上尊諡曰孝懿溫誠端仁憲穆和恪奉天佐聖仁皇后伏冀慈眷加隆純禧益懋貽阜安於四海綏昌熾於萬年謹言寶文曰孝懿溫誠端仁憲穆和恪奉天佐聖仁皇后之寶孝恭仁皇后加上尊諡册文曰慈範丕昭奕世衍無疆之慶徽音光被萬年垂至德之光稽巨典以加崇奉鴻名而致頌金函煥彩玉册增輝欽惟孝恭宣惠溫肅定裕贊天承聖仁皇后順應乾行厚同坤載佐憂勞於夙夜克贊宸猷樹肅穆於宫庭聿宣壼教執謙為度共傳溫惠之風秉恕居心羣荷寬仁之澤恪勤內職精誠而潔治蘋蘩孝養重闈愈婉而躬親問視篤生我世宗憲皇帝誕應昌期育成至德正集萬方之愛戴俄驚一旦之遐升爰奉徽稱敬昭令則暨眇躬之纂緒彌追痛於含飴仰體孝思方當尊禮攸隆之日緬懷懿訓益切顯揚莫罄之忱謹奉册寶增上尊諡曰孝恭宣惠溫肅定裕慈純贊天承聖仁皇后伏冀陟降在兹鑒觀不逺永佑綿長之祚式開昌熾之符謹言寶文曰孝恭宣惠溫肅定裕慈純贊天承聖仁皇后之寶乾隆二年三月癸巳恭奉世宗敬天昌運建中表正文武英明寬仁信毅大孝至誠憲皇帝神主孝敬恭和懿順昭惠佐天翊聖憲皇后神主升祔太廟是日神主黃輿由永定門正陽門入隨從王大臣官員朝服隨行在京文武大臣官貟朝服於大清門外跪迎鹵簿設端門內不作樂皇上預詣太廟街門外幄次恭候辰時黃輿至皇上率諸王貝勒貝子公等朝服跪迎於端門外隨黃輿入太廟街門至甎城門外皇上詣世宗憲皇帝黃輿前跪行三拜禮和親王𢎞晝詣孝敬憲皇后黃輿前行禮畢皇上恭捧世宗憲皇帝神主和親王𢎞晝恭捧孝敬憲皇后神主隨後由甎城門戟門東門入升正面東階進太廟東槅扇預設世宗憲皇帝拜褥於中孝敬憲皇后拜褥於右稍後皇上恭捧世宗憲皇帝神主向上立和親王𢎞晝恭捧孝敬憲皇后神主右次向上稍後立贊引官跪奏世宗憲皇帝孝敬憲皇后升祔太廟行參拜禮皇上恭捧世宗憲皇帝神主跪安於拜褥上和親王𢎞晝恭捧孝敬憲皇后神主亦跪安于拜褥上和親王𢎞晝由西槅扇退出門檻外立皇上就位行三跪九拜禮畢皇上恭捧世宗憲皇帝神主奉安於世祖章皇帝神位之次第一位寶座上和親王𢎞晝進西槅扇恭捧孝敬憲皇后神主奉安第二位寶座上和親王退出歸班次皇上行三拜禮畢復位行升祔太廟致祭如時享儀乾隆三年二月甲申興工修太廟先期正月庚辰皇上親詣祗告恭奉後殿四祖四后神牌中殿列祖列后神牌暫安前殿六月後殿工竣戊申恭奉四祖四后神牌還御前一日親詣祗告九月中殿工竣甲戌恭奉列祖列后神牌還御前一日親詣祗告四年九月庚午前殿工竣上親詣太廟致祭先是丁卯前殿懸匾遣官祗告上復親詣敬謹瞻視尋以親祭太廟御齋宫致齋三日壬申恭進太祖髙皇帝孝慈髙皇后太宗文皇帝孝端文皇后孝莊文皇后世祖章皇帝孝惠章皇后孝康章皇后聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后世宗憲皇帝孝敬憲皇后玉册玉寶奉安太廟先二日庚午奉諭旨孟冬太廟時享朕已有旨親詣行禮因日來體中微覺畏風欲稍避清晨寒氣屆期著和親王𢎞晝恭代二十八日恭進册寶係選定辰時朕仍親詣行禮臣等謹按遵雍正六年例恭進太祖髙皇帝册十頁青玉修八寸九分廣三寸九分厚四分孝慈髙皇后册十頁青玉修廣厚同太宗文皇帝册十頁青白玉修廣同厚三分孝端文皇后册十頁青玉修廣厚同孝莊文皇后册十頁青玉修廣厚同世祖章皇帝册十頁青玉修廣同厚三分孝惠章皇后册十頁青玉修廣厚同孝康章皇后册十頁青玉修廣厚同聖祖仁皇帝册十頁青玉修廣同厚三分孝誠仁皇后册十頁青玉修廣厚同孝昭仁皇后册十頁青玉修廣厚同孝懿仁皇后册十頁青玉修廣厚同孝恭仁皇后册十頁青玉修廣厚同鐫字皆深二釐面底二頁皆鐫升降龍寶十三方皆改鐫加上尊諡世宗憲皇帝册十頁青玉修廣厚同寶白玉方四寸二分厚一寸六分紐髙三寸三分方三寸九分孝敬憲皇后册十頁青玉修廣厚同鐫字皆深二釐面底二頁皆鐫升降龍寶白玉方同厚一寸八分紐髙二寸五分修四寸廣三寸一分乾隆三十八年六月庚寅恭修列祖神牌遣官祗告先是四月甲午上詣圜丘行常雩禮預期詣皇穹宇拈香仰瞻列祖神牌見有字色糢糊之處諭交太常寺查辦嗣太常寺奏神牌靛色糢糊之字請交該部敬謹修理恭候指示奉諭不但太宗文皇帝神牌顯字糢糊即聖祖神牌神位二字色亦淺淡著一併交該部敬謹修理至是太常寺復奏恭修天壇祈榖壇地壇太廟神牌奉移還御應遣王行祗告禮奉旨派出裕親王信郡王理郡王四十年七月戊午恭修太廟神牌托座龕帳是月太常寺奏天壇祈榖壇地壇太廟神位下泥金托座年久金色淡薄請交工部修理并添製木匣仍用綿袱包貯以昭慎重又太廟後殿中殿龕帳均請交造辦處換造從之四十二年三月壬午恭奉册寶上大行皇太后尊諡曰孝聖慈宣康惠敦和敬天光聖憲皇后先是正月辛邜奉諭旨大行皇太后坤元協德懋著徽音四十二年母儀天下尊養兼隆福德備至實古今史册所未有今忽邅仙馭升遐朕心哀痛不能稍釋敬稽典禮宜隆諡號以表尊崇苐至德難名實非臣下擬議所能切當朕欲親尊為孝聖憲皇后其令大學士九卿公議可否如是所有節次晉加徽號其中或有按例應行酌減及應增加字樣仍著敬謹詳議具奏嗣大學士舒赫德等議奏臣等伏考厯代母后尊諡自東漢明帝始建光烈之稱厥後典制相仍著於史册而所上諡號類皆出於臣下由其徽音令德雖有不同而考禮定名尚易比擬故也欽惟大行皇太后誕育皇躬母儀天下備福夀者八十六載受孝養者四十二年合九州萬國以尊親萃五世一堂而頤樂鴻稱疊晉慶典便蕃扶輦環億兆之臚歡款關集鰈鶼之來賀蠲租錫類而感洽羣黎偃武集勳而威宣諸徼凡我皇上之功德巍盛悉由聖母之美善崇隆敬仰懿徽與天無極洵非尋常諡號所得形容萬一惟我皇上本至孝以定典章宣示諭旨以至德難名親尊為孝聖憲皇后仍令臣等集議具奏臣等謹案鄭樵通志所載上諡百三十有一字首以神聖並列考之宋代有慈聖光獻曹后宣仁聖烈髙后雖以聖為諡尚屬鋪張揚厲之文而於大行受大名之義均有未當今大行皇太后之至德實為史牒所未有誠如諭旨難以名言惟欽定為孝聖乃克崇闡洪儀昭示奕祀揆之古來諡議允為式協輿論詢之在廷臣寀莫能復贊一詞至歷年恭晉徽號奉旨有按例酌減及應增加字樣臣等謹查孝莊文皇后徽號二十字孝惠章皇后徽號十六字於恭上尊諡時俱敬列十二字今大行皇太后徽號係十八字臣等遵旨詳議於徽號擬用六字又照例增加四字恭上尊諡曰孝聖慈宣康惠敦和敬天光聖憲皇后以符禮制謹合詞具奏伏候欽定奉諭旨是依議至是日上詣太和門恭閲大行皇太后尊諡册寶行禮畢上先詣暢春園幄次祗候午刻恭迎册寶陳設於九經三事殿正中黃案上上詣正中拜位跪大學士捧册寶在左傍跪進上祗受恭獻授右傍大學士跪接宣讀官跪捧宣讀畢上行三跪九叩禮册文曰崇儀告備薦玉册以伸虔懿行垂光勒琅函而闡實報劬勞之厚德禮洽馨聞嚴對越之鴻名義隆睿作欽惟皇妣大行皇太后順體天經化彰人極萱庭示範仰宫中之有聖人瑶甸歸仁臨天下而為大母自流徽於京室荷篤慶於藐躬億兆騰歡萃萬方為尊養曾元衍瑞裕五世以融怡緬義訓之常昭洵揚言之莫罄賁鳳綸而賜復澤及葭蓬扶翟輅以觀民呼兼嵩岱益圗旅賀來庭之鶼鰈駢臻偃伯承禧絶徼之干戈並戢是皆慈暉普照覃嶽澥以含和用能純履康綏麗乾坤而集福憶昨者金泥絇祝十八字疊衍箕疇冀來兹寶琰鐫華億萬齡重增姬算惟愛景情殷顧復依旬之臚頌何窮宜慈躬祉懋升恆晉册之揚庥未艾何升遐之忽覯竟攀慟之難追率土纒悲終天銜恤肇尊稱於殷禮念形容無得而名稽上諡於周書極擬議於斯為盛有孝實原有德本百行於地天乃聖即協乃神嫓獨隆於堯舜一詞莫贊敢慿素悃以追攀萬世為公並詢僉謀而咸翕爰遵彞典請命於天謹奉册寶上尊諡曰孝聖慈宣康惠敦和敬天光聖憲皇后於戲溯璇闈徽音大行宜特隆冠古之聲頌清廟昌後燕天庶稍展崇親之悃伏冀神靈式妥陟降在兹文琬貽型抒慕誠之岡極彤毫述德荷申錫於無疆宏啓嘉符茂昌景祚謹言寶文曰孝聖慈宣康惠敦和敬天光聖憲皇后之寶五月乙丑恭奉孝聖慈宣康惠敦和敬天光聖憲皇后神主升祔太廟是日皇上具禮服出宫詣太廟街門外幄次祗俟諸王貝勒貝子公等咸朝服以從在京文武大臣官員俱朝服於大清門外恭候鹵簿全設於午門外樂設而不作卯刻黃輿入正陽門大臣官員跪迎至端門外皇上率諸王貝勒貝子等南向跪迎隨黃輿入太廟由街門中門至戟門外黃輿止皇上詣孝聖憲皇后黃輿前行一跪三叩禮畢恭捧神牌由戟門左門入升正面東階進太廟東槅扇執事官預設孝聖憲皇后寶座於孝敬憲皇后寶座之次又預設孝聖憲皇后拜褥於正中北向皇上恭捧神牌向上立贊引官跪奏孝聖憲皇后升祔太廟行參拜禮皇上恭捧孝聖憲皇后神牌跪安於拜褥上皇上恭代行三跪九叩禮畢皇上恭捧孝聖憲皇后神牌奉安於西序東向孝敬憲皇后之次寶座上皇上行一跪三拜禮畢復位行升祔太廟致祭禮如時享儀五月甲戌恭進孝聖憲皇后玉册玉寶奉安太廟上親詣行禮臣等謹案恭進孝聖憲皇后册十頁青玉長九寸寬四寸厚三分鐫字深二釐面底二頁鐫升降龍寶青玉方四寸高三寸鐫字深三釐四十七年十月甲子朔上以時享親詣行禮恭奉重鐫列祖列后玉册玉寶奉安太廟先是七月辛亥諭旨前以太廟尊藏列朝寶册係隨時鐫造玉質顔色不能一律整齊特命英亷福隆安將和闐貢玉慎選良工敬造列朝寶册一分以奉太廟其舊藏之寶册恭送盛京太廟尊藏以昭祖宗功德之成於萬代意深逺也今據將列朝寶册敬謹鐫造完成奏聞請旨朕惟我國家受天庥命列聖相承玉檢金繩虔申對越自朕躬繼緒以來仰荷上蒼眷佑中外蒙庥迄今年踰古稀日理萬幾孜孜不倦無日不以敬天勤民為念皆祗承祖宗之彞訓永維餘慶篤念前徽所有此項鐫成寶册本年孟冬時享閲視祝版之日著禮部堂官敬謹安設中和殿俟朕親加閲視後次日於朕行禮以前先派宗室親王齎捧供奉一切應行儀注俱照升祔之禮並著該衙門先期詳議具奏其舊藏一分寶册仍照前旨於明嵗敬諏吉日再行簡派皇子恭送盛京太廟尊藏以志文謨武烈顯承佑啓之盛嗣禮臣遵旨議覆至是親詣行禮如儀臣等謹案重鐫列朝册寶共十六分册每分計十頁長九寸寬四寸厚三分俱青玉字鐫隂紋深二釐寶十六方俱方四寸髙三寸青玉字鐫陽紋深四釐臣又按是年孟冬既以新鐫列朝册寶安奉太廟明年秋上躬詣盛京恭謁祖陵恭將舊藏列朝册寶一分尊藏盛京太廟親詣行禮皇朝文獻通考卷一百十
