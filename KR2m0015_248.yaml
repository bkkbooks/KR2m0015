body:
  text: 欽定四庫全書皇朝文獻通考卷二百四十八封建考三同姓封爵三鎮國將軍臣等謹按鎮國將軍以一二三等為序輔國將軍奉國將軍倣此顯祖系一等鎮國將軍羅託顯祖皇曾孫多羅貝勒寨桑古子崇徳元年封固山貝子七年坐事削爵順治八年三月封三等鎮國將軍十六年二月以軍功晉一等康熙四年四月卒子降襲詳輔國將軍三等鎮國將軍祜世布顯祖皇曾孫輔國公祜世塔子順治六年十月封三等輔國將軍八年閏二月晉封康熙九年六月卒子降襲詳奉國將軍三等鎮國將軍蘇赫顯祖皇曽孫輔國公祜世塔子順治八年閏二月封十二年三月卒諡懐思無襲原授鎮國將軍品級瑪喀納顯祖四世孫輔國公品級札喀納子康熙四年三月授四十三年三月坐事削級鎮國將軍品級富爾泰顯祖四世孫鎮國公屯齊子初授詳輔國公康熙二十二年三月坐事降授一等鎮國將軍敬順顯祖五世孫和碩簡親王雅布子初封詳鎮國公康熙五十五年四月坐事降封子降襲詳輔國將軍原封一等鎮國將軍楊桑阿顯祖五世孫和碩簡親王雅布子初封詳鎮國公康熙五十五年四月降封乾隆四年十月坐事削爵原封一等鎮國將軍敬儼顯祖五世孫和碩簡親王雅布子康熙五十五年四月封雍正四年三月坐事削爵原封三等鎮國將軍嵩阿禮顯祖五世孫鎮國公楊福子雍正三年十月封乾隆十九年三月坐事削爵三等鎮國將軍噶爾瑪顯祖五世孫鎮國公楊福子雍正二年閏四月封雍正三年八月卒子降襲詳輔國將軍原封三等鎮國將軍輔爾嵩阿顯祖五世孫鎮國公揚福子雍正七年八月封乾隆二十八年九月坐事削爵三等鎮國將軍伊克塔哈顯祖五世孫輔國公瓦三子康熙三十九年四月封雍正十二年六月卒子降襲詳輔國將軍三等鎮國將軍準度顯祖五世孫原封輔國公門度子康熙三十四年四月封雍正六年九月卒子降襲詳輔國將軍一等鎮國將軍永煥顯祖六世孫原封和碩簡親王雅爾江阿子雍正三年十月封乾隆十年六月卒子降襲詳輔國將軍三等鎮國將軍宜鏗額顯祖七世孫和碩簡親王豐訥亨子乾隆四十九年十二月封太祖系二等鎮國將軍阿拜太祖皇三子崇徳四年八月封三等鎮國將軍順治四年九月晉二等五年二月卒贈詳鎮國公鞏安阿拜子順治三年十一月封奉恩將軍五年三月襲六年十月晉輔國公詳輔國公三等鎮國將軍湯古代太祖皇四子崇徳四年八月封五年九月卒諡克潔穆爾察湯古代子初封三等奉國將軍崇徳五年十一月襲順治四年九月晉二等六年七月卒諡恪恭無襲三等鎮國將軍席持庫太祖皇孫二等鎮國將軍贈鎮國公阿拜子初封詳鎮國公順治十七年七月坐事降封康熙十六年七月卒三等鎮國將軍聶克塞太祖皇孫三等鎮國將軍湯古代子初封詳鎮國公順治九年正月坐事降封康熙五年正月卒無襲原封三等鎮國將軍祜錫禄太祖皇孫鎮國公巴布泰子順治十三年九月封康熙三十四年十月以才力不及爵除鎮國將軍巴思哈太祖皇曽孫多羅克勤郡王岳託子原封多羅貝勒詳貝勒尋削爵順治十二年八月授十八年二月卒子降襲原封三等鎮國將軍佛格太祖皇曽孫輔國公灝善子康熙九年封三等輔國將軍三十四年十月以疾罷爵雍正二年八月封三等鎮國將軍十二月坐事削爵三等鎮國將軍輝塞太祖皇曽孫輔國公噶布喇子順治八年閏二月封康熙三十八年八月卒子降襲詳奉國將軍原封三等鎮國將軍白夀太祖四世孫固山貝子彰泰子初封詳鎮國公康熙二十五年二月坐事降二十七年二月坐事削爵原授三等鎮國將軍品級長源太祖四世孫原封固山貝子穆爾祜子順治十六年授康熙三十四年九月以疾削級三等鎮國將軍訥延太祖四世孫輔國公搆莩子康熙五年五月降襲六年十一月卒無襲三等鎮國將軍富宏太祖五世孫輔國公務友子雍正四年三月降襲十三年四月卒子降襲詳輔國將軍原封三等鎮國將軍弼爾特訥太祖五世孫輔國公弼禮克子康熙十六年八月降襲四十三年九月坐事削爵三等鎮國將軍謨雲太祖五世孫和碩康親王巴爾圗子乾隆七年十二月封二十九年四月卒子降襲詳輔國將軍三等鎮國將軍謨亮太祖五世孫和碩康親王巴爾圗子乾隆二十六年十二月封三等鎮國將軍素拜太祖五世孫輔國公素嚴子康熙三十一年十二月降襲三十四年七月卒後無襲二等鎮國將軍永㥣太祖六世孫和碩康親王崇安子乾隆十四年十二月封原封三等鎮國將軍明保太祖六世孫原封鎮國公普貴子康熙四十七年五月封雍正二年四月以罪削爵三等鎮國將軍謙徳太祖六世孫奉恩輔國公九成子乾隆二十五年六月封三十二年三月卒弟降襲詳奉國將軍一等鎮國將軍洞福太祖七世孫和碩謙襄郡王瓦克逹元孫閒散宗室忠端子乾隆四十三年三月奉特㫖襲封二等鎮國將軍克明太祖七世孫多羅順承郡王熙良子乾隆二十一年二月封三等鎮國將軍徳尊太祖七世孫原封輔國公徳明阿子乾隆二十三年四月降襲三等鎮國將軍禄慶太祖七世孫奉恩輔國公法爾善子襲封詳輔國公乾隆二十三年降封倫成禄慶子乾隆二十七年十月襲三等鎮國將軍恒謹太祖七世孫多羅克勤郡王雅朗阿子乾隆四十九年十二月封太宗系三等鎮國將軍蘇爾登太宗皇孫輔國公葉布舒子康熙十四年封五十七年四月卒子降襲詳輔國將軍原封三等鎮國將軍徳寧太宗皇孫輔國公品級常舒子康熙十二年二月封五十四年十一月坐事削爵原封三等鎮國將軍務啟圗太宗皇孫輔國公韜塞子康熙三十四年六月封三十七年十二月以罪削爵容吉務啟圗兄康熙三十二年二月封三等鎮國將軍三十七年十二月改襲封四十四年十月以才力不及爵除子降襲原封三等鎮國將軍釋迦保太宗皇曽孫原封輔國公雲升子雍正六年八月降襲乾隆元年五月坐事削爵二等鎮國將軍𢎞曧太宗四世孫聖祖皇孫和碩莊親王允禄子乾隆二十一年十二月封晉襲詳輔國公三等鎮國將軍徳春太宗五世孫原封多羅貝勒球琳子乾隆二十九年二月以兄徳謹坐事削公爵降襲三十三年六月以病罷爵世祖系二等鎮國將軍亮瑚世祖四世孫和碩裕親王廣禄子乾隆四十年十二月封三等鎮國將軍亮景世祖四世孫和碩裕親王廣禄子乾隆十四年十二月封十七年七月卒子降襲詳輔國將軍三等鎮國將軍亮魁世祖四世孫和碩裕親王廣禄子乾隆二十七年正月封三等鎮國將軍亮慶世祖四世孫和碩裕親王廣禄子乾隆二十七年正月封二等鎮國將軍亮聰世祖四世孫和碩裕親王廣禄子乾隆四十九年封聖祖系一等鎮國將軍𢎞昂聖祖皇孫和碩恒親王允祺子雍正三年十月封乾隆四十年坐事削爵無襲二等鎮國將軍𢎞嵩聖祖皇孫多羅簡靖貝勒允禕子乾隆三十年十二月封四十二年六月卒子降襲詳輔國將軍二等鎮國將軍𢎞旿聖祖皇孫和碩誠親王允祕子乾隆二十八年二月封晉封詳貝子二等鎮國將軍𢎞康聖祖皇孫和碩諴親王允祕子乾隆三十五年十一月封三等鎮國將軍𢎞富聖祖皇孫多羅愉郡王允禑子乾隆十四年十二月封四十九年四月卒子永浡襲封三等輔國將軍一等鎮國將軍永璨聖祖皇曽孫多羅果恭郡王𢎞瞻子乾隆四十年十二月封三等鎮國將軍永杭聖祖皇曽孫和碩怡親王𢎞曉子乾隆三十年十二月封四十二年六月卒無襲三等鎮國將軍永琅聖祖皇曽孫和碩怡親王𢎞曉子乾隆三十年十二月封襲詳親王三等鎮國將軍永珠聖祖皇曽孫和碩諴郡王𢎞暢子乾隆四十九年封三等鎮國將軍永祥聖祖皇曽孫和碩諴郡王𢎞暢子乾隆四十九年封世宗系二等鎮國將軍永璸世宗皇孫和碩和恭親王𢎞晝子乾隆二十二年十二月封二等鎮國將軍永瑍世宗皇孫和碩和恭親王𢎞晝子乾隆四十四年十二月封三等鎮國將軍綿倬世宗皇曽孫和碩和勤親王永璧子乾隆四十九年封以上鎮國將軍輔國將軍顯祖系三等輔國將軍泰䕃布禄顯祖皇曽孫輔國公塔海子順治十五年正月封康熙二十五年十月卒子降襲詳奉國將軍二等輔國將軍徳倫顯祖皇曽孫輔國公塔海子康熙四年正月封四十年六月卒子降襲詳奉國將軍三等輔國將軍伊尚阿顯祖皇曽孫輔國公祜世塔子順治十八年十月封康熙八年十一月卒子降襲詳奉國將軍三等輔國將軍喇克逹顯祖皇曽孫輔國公喇世塔子順治十五年正月封康熙三十二年正月卒子降襲詳奉國將軍原封三等輔國將軍巴爾堪顯祖皇曽孫和碩鄭親王濟爾哈朗子順治十一年十二月封康熙七年六月坐事降二等奉國將軍八年七月復封三等輔國將軍十六年三月坐事削爵贈詳親王原封三等輔國將軍輝蘭顯祖皇曽孫和碩鄭親王濟爾哈朗子順治十一年正月封康熙二十二年四月坐事削爵三等輔國將軍固美顯祖皇曽孫和碩鄭親王濟爾哈朗子順治十六年正月封康熙三十二年八月卒無襲三等輔國將軍武錫顯祖皇曽孫和碩鄭親王濟爾哈朗子康熙六年正月封四十六年十二月卒子降襲詳奉國將軍原封一等輔國將軍富達禮顯祖四世孫一等鎮國將軍羅託子康熙八年封二十五年十月坐事削爵三等輔國將軍塞克圗顯祖四世孫閒散宗室宏科泰子順治八年三月封十一年十月卒諡懐儀無襲三等輔國將軍塞勒伯顯祖四世孫閒散宗室宏科泰子順治八年三月封十一年十月卒諡懐儀子降襲詳奉國將軍三等輔國將軍度爾伯顯祖四世孫閒散宗室宏科泰子順治八年三月封十五年三月卒諡慤厚無襲三等輔國將軍扎三顯祖四世孫固山貝子固爾瑪洪子康熙十四年正月封三十三年九月卒諡敏恪無襲原封三等輔國將軍薩三顯祖四世孫固山貝子固爾瑪洪子康熙二十一年正月封五十四年四月坐事削爵三等輔國將軍塞祜徳顯祖四世孫鎮國公果葢子順治十八年五月封康熙三十年六月卒子降襲詳奉國將軍三等輔國將軍薩克新顯祖四世孫鎮國公果葢子順治十八年正月為鎮國公果賴後康熙十一年正月封雍正十二年正月以病罷爵子降襲詳奉國將軍三等輔國將軍琶帕顯祖四世孫一等鎮國將軍羅託子順治九年十月封十五年二月卒諡懐愍子降襲詳奉國將軍三等輔國將軍巴喀顯祖四世孫一等鎮國將軍羅託子順治九年十月封十五年四月卒諡懐思子降襲詳奉國將軍原封三等輔國將軍墨美顯祖四世孫和碩簡親王濟度子康熙五年正月封二十二年坐事削爵三等輔國將軍阿扎蘭顯祖五世孫和碩簡親王雅布子康熙四十一年三月封五十六年正月卒無襲三等輔國將軍巴禄顯祖五世孫和碩簡親王雅布子康熙四十六年十一月封四十八年九月卒子降襲詳奉國將軍三等輔國將軍忠保顯祖五世孫和碩簡親王雅布子康熙五十三年二月封雍正三年三月以病罷爵乾隆二年九月復封十年七月卒無襲原封三等輔國將軍準保顯祖五世孫原封輔國公門度子康熙四十四年四月封雍正二年六月坐事削爵一等輔國將軍長恒顯祖六世孫一等鎮國將軍敬順子乾隆九年十二月降襲二十二年十一月以病罷爵三等輔國將軍素爾登額顯祖六世孫原封三等鎮國將軍嵩阿禮子乾隆九年正月封二十一年正月卒子降襲詳奉國將軍原封三等輔國將軍徳爾登額顯祖六世孫三等鎮國將軍噶爾瑪子雍正四年二月降襲乾隆四十年十月縁事削爵三等輔國將軍雙麟顯祖六世孫三等輔國將軍伊克塔哈子雍正十二年十