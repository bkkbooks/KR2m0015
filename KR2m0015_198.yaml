  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_198-1a, image: WYG0636/WYG0636-0546a.png}
body:
  text: 刑考四刑制雍正十三年九月皇上御極特諭本年恩詔赦欵甚多但奴僕告家主之案名分攸關情罪可惡毋得援恩赦免嗣後遇有奴僕首告家主者雖所告皆實亦必重治其罪著為令定文武生員犯賭加常人一等治罪例嚴衙役逼詐例凡衙役犯贓除致死人命贓至滿貫仍按律例定擬外如有索詐貧民致令賣鬻男女者亦照蠧役恐嚇詐贓例并妻安插奉天為從各減徒三年發落互見徒流門定發塜盜葬例刑部議奏嗣後貪人吉壤將逺年之塜盜發者子孫告發審實將盜發之人以開棺見尸律擬絞監候但棺久必壞塜久必平如非其子孫又無確據勾引匪類夥告夥證陷害無辜者將為首照誣告人死罪未決律杖一百流三千里為從者照誣告為從律科斷若本人逺祖之墳被人發掘盜葬因將盜葬之棺發掘拋棄者雖同是發塜不必以發塜論應照祖父被人殺子孫不告官而擅殺凶人律杖六十若盜葬者尚無發掘等情止在切近墳旁盜葬而本家即行發掘者應依地界內有死人不報官而輒移他處律科斷如有毁棄尸骸等情應照地界內有死人而移尸毁棄律科斷盜葬之人依本律杖八十責令遷移若非墳地止於田地場園內盜葬而地主發掘之者除開棺見尸照律擬絞外不開棺見尸者照本律減一等科斷其盜葬之人應依本律減二等杖六十亦責令遷移以上皆指凡人而言如兩造本係親屬其墳塜尸骸與本人皆有服制則兩造各照發服內親塜律科斷從之乾隆元年嚴捕四惡之令奉諭朕聞姦宄不鋤不可以安善良風俗不正不可以興教化閭閻之大惡有四一曰盜三代聖王不待教而誅者也二曰賭博干犯功令貽害父兄以視周官之罷民未麗於法而繫諸嘉石收之圜土者罪有甚矣三曰打架即周官所謂亂民孟子所謂賊民也四曰娼妓則自周以前人類中未嘗有此此四惡者劫人之財戕人之命傷人之肢體破人之家敗人之德為善良之害者莫大於此是以我皇考愛民之深憂民之切嚴申糾禁積歲月之久然後道路少響馬及老瓜賊而商旅以寧賭博及造賭具者漸次改業而家室以安聚黨打架者斂迹而城市鄉鎮鮮聞鬬囂娼妓逺藏不敢淹留客店此皇考十有三年政教精神所貫注而海內臣民顯見其功效實享其樂利者也朕嗣位以來增廣赦條惠保良民使得從容休息而無識諸臣誤謂朕一切寬容不事稽察民間訛言諸禁已開風聞直省四惡皆微露其端倪是守土之官敢悖世宗憲皇帝之明旨墮十有三年之成功而戕賊善良傷敗風俗也自後州縣官有政令廢弛使四惡復行於境內者該督撫即行嚴參督撫司道郡守有不能董率州縣殫心捕治者必以溺職治罪與通苞苴受賄賂者等決不輕貸禁止佛戲禮部題嗣後民間喪祭之事誦經禮讖仍聽自便外其加以絲竹管絃演唱佛戲之處應嚴行禁止違者照違制例治罪從之定聚衆械鬬分别首從科斷流徒例詳見徒流門嚴禁仵作妄報匿傷之弊凡事繁州縣設仵作三名中縣二名小縣一名如有招搖賄囑妄報者嚴行治罪嚴私斃人命之禁江西山僻鄉村常有逞凶爭角統衆毒毆且有私立規條貧人有犯並不鳴官或裹以竹簍沉置水中或開掘土坑活埋致斃勒逼親屬寫立服狀靖安新淦信豐等縣尤多奉諭地方官失於化導禁約以致村野凶暴藐法橫行著嚴行禁止倘有仍蹈前轍者嚴拿從重定擬定分别光棍例總理事務王大臣會同刑部議定嗣後除例載比照光棍各條仍照例斟酌定擬外其餘情罪相倣尚非實在光棍者不得混照光棍例定擬申嚴番役嚇詐騙害之禁都察院奏審李長泰誣告劉四因事行賄刑部司員劉琬受贓全屬步軍統領衙門番役等夥匪揑詞供證確鑿並奏番役之白役人等俗名圓扁子並非額役每借名嚇詐生事設計誘人犯法民間甚為擾纍奉諭向來提督衙門番役及內務府番役恣行不法遇事生風其索詐騙害之惡不可枚舉朕又聞番役等竟將京城內外地方各人私自分管且將六部衙門事件各派一人訪查此則可惡之尤甚者部院之事自有該管之大臣與職司稽察之官員番役何人而敢於私自窺伺以持其長短乎著步軍統領嚴行禁止並將白役圓扁子之類盡行革退不許私留一人致滋閭閻之擾嗣後倘有被番役等騙害者準赴刑部都察院控告該部院即據實奏聞朕必將畨役嚴審治罪中定施用刑具之例刑部議準各省州縣所用刑具務照定式不得用短夾棍及大板重枷至徴比錢糧應用小板輕枷薄以示懲下限全完即行釋放又強盜十惡謀故殺人等重犯仍照例用鐡鎖杻鐐各三道其餘鬬殺人命以及軍流徒犯止用枷杻各一道笞杖人犯止用鐵鎖定遣犯逃後為匪之例刑部議準嗣後平常發遣人犯逃後無行凶為匪者仍照例於發遣處枷號兩個月鞭一百交與該管處嚴行管束外其審有行凶為匪者悉照現在所犯分别定擬犯應監候斬者改為立斬犯應監候絞者改為立絞犯應徒以上者改為絞監候至於行凶為匪之事情罪各有輕重如竊盜計贓鬬毆傷人俱有罪止於杖者若一概置之重典似屬未協應照逃回無行凶為匪例枷號兩月之外再枷號一月互見徒流門改定故殺胞弟例奉諭律載兄故殺弟者杖一百流二千里故殺妻者絞朕思兄弟乃手足之親較妻為重今殺妻擬抵而殺弟轉輕其情理未協其如何更定律例之處著九卿會議尋議故殺期親弟妹照故殺大功弟妹律均擬斬監候毆至死者亦改照本律滿徒加一等杖一百流二千里從之互見徒流門更定生監包攬錢糧例凡貢監生員包攬錢糧侵收入已者照常人盜倉庫錢糧例計贓論罪包攬八十兩以上雖無拖欠照不應重律杖八十仍革去貢監生員不及八十兩者仍照攬納稅糧杖六十之律定擬又設立循環監簿刑部奏準嗣後各省各府設立循環監簿飭令所屬州縣將每日出入監犯名姓填注按月申送該府逐一查閲其有不應收監而濫行監禁及懷挾私讐故禁平人者均照律擬罪雖係應監人犯如有吏卒借端需索者以枉法從重治罪該管官照失察衙役犯贓例議處故縱者照縱役犯贓例革職二年定捕役致死犯人例刑部議奏嗣後除犯人脫逃持仗拒捕其捕役實因追擒格鬬而殺死者照律勿論外若罪犯業經拏獲而捕役借稱設法制縛誤傷其命者仍照已就拘執而殺之律以鬬殺論倘捕役受人賄囑將罪人致死者照謀殺人首從律治罪並將捕役誤傷殺死人例停其引用從之定鹽徒十人以下傷一人例三法司改擬山東省拒捕毆傷巡役之鹽徒張漢等分别絞候僉遣并聲明律載鹽徒拒捕者斬監候為從者減一等杖一百流三千里又定例鹽徒聚衆若止十人以下原無兵仗遇有追捕拒敵因而傷至二人以上為首者依律處斬下手之人比照中途打奪罪人因而傷人律擬絞並未議及止傷一人為首與下手之人作何治罪之條今張漢拒捕實止傷及一人若遽照傷至二人為首律擬斬監候下手之張臻等照中途打奪罪人因而傷人例擬絞監候殊未允協請將張漢改照罪人拒捕毆所捕人至折傷以上者律擬絞監候張臻等照為從律減一等僉妻流三千里至配所杖一百并請敕下律例館載入例內從之互見徒流門定停族人致死族匪免抵之例舊例凡同族之中有凶悍不法偷竊姦宄之人倘事起一時合族公憤不及鳴官處以家法致死者報官審明死者應死與不應死將為首者分别定擬免其擬抵至是兩廣總督鄂彌達奏稱族中賢愚不一恐有朋比串害地方豈能洞燭無遺倘民間恃有減等免抵之例相習成風其中難免寃抑應請敕下律例館將此條酌刪從之定本宗為人後者之子孫及異姓義子犯本生尊長例九卿會議律載為人後者為本生親屬孝服降一等又稱乞養異姓義子以亂宗族者杖六十其子歸宗並未將本宗為人後者之子孫及異姓義子未經歸宗以前於本生親屬服制分晰注明恐愚人無知誤罹法網內外法司或間有引斷錯誤之處嗣後凡本宗為人後者之子孫於本生親屬孝服祗論所後宗支本生親屬降服如於本生親屬有犯俱照所後服制定擬其異姓義子與伊所生子孫為本生父母及親屬孝服俱不準降等即已立為嗣原係律應歸宗之人其本身及所生子孫為本生父母親屬孝服亦俱不準降等各項有犯仍係本宗服制科罪照例歸宗從之定圖財害命分首從例奉諭圖財害命原同強盜之例查強盜案尚有分别不盡立決而謀財之案或以數人而抵一人之命於法未免稍重大抵圖財謀命者若無起意為首之人必不能行事今若將起意為首者立置重典其餘改為監候使天下知起意之罪不同於脅從不敢造謀糾約則此等凶惡之事未必不漸次減少其如何定例之處著九卿詳悉定議尋議圖財謀命殺人之犯因欲圖其資財即行殞其性命實屬凶殘請將造意並為從加功者仍依律斬決其為從并未加功者應量加末減至於圖財傷人未死之案雖被害者幸而未死但已預存致死之心於法實難寬宥應將造意為首者亦依律斬決並未加功傷人則照強盜情有可原例減等發遣從之定私越番地之例刑部議奏嗣後臺灣地方倘有民人偷越定界私入番地者照私出外境律杖一百如有偷越深山抽藤採棕等事照越渡緣邊關塞律杖一百徒三年管束不嚴之莊頭照本管頭目鈐束不嚴律杖八十鄉保社長各減一等發落所獲番物入官從之定嚴借盜銷案之禁刑部議覆御史周紹儒條奏嗣後緝拏盜犯限內無獲州縣官希免處分將别案已正法之盜指為盜首或盜數未足作為夥盜互相交結借盜銷案將原審州縣及鄰邑囑託之印官俱照諱盜例處分如係捕役串同盜犯教供妄認將捕役照誣指良民為盜發邊衛充軍例減一等杖一百徒三年互見徒流門如有賄買情弊以枉法論從重治罪定夫匠不法之罪刑部題定嗣後夫役工匠如遇緊要差事喚集公所有為匪不法不遵官長約束逞刁挾制因而率衆揚散以致貽誤要差者為首之人照河工緊要工程如有浮議動衆以致衆力懈弛例為首擬斬監候為從枷號一個月杖一百倘審係無知偶爾違禁干犯賭博等事並無挾制官長揚散誤差者仍按各本律治罪三年定考試聚衆妄擊冒籍為首從者罪禮部奏定凡遇妄攻冒籍於學臣考試之時聚衆橫擊者應將為首者照誣告人杖罪加所誣三等律杖六十徒一年為從者減一等杖一百仍停其考試互見徒流門改定窩逃例刑部議準窩逃之家除旗人仍照例分别罰銀枷責如民人實不知情在六個月以內者仍照例免議外已過六月窩家照違制律杖一百十家長地方鄰佑照不應重律杖八十地方官失察過六個月降一級留任過二年降二級調用武職官員照文職議處如明知其逃故意窩留三個月之內呈首免罪過三個月杖九十徒二年半十家長地方鄰佑照違制律杖一百若過一年窩家及地方鄰佑等分别杖徒有差地方官明知縱容居住者照藏匿重犯例革職武職官員亦照此例議處互見徒流門改定毆斃奴僕例刑部議鑲紅旗滿州三等護衛釋伽保圖姦家人破臉之妻金氏不遂將破臉毒打斃命應擬革職奉諭家主奴僕雖名分攸關而人命至重豈容輕易致斃釋伽保因圖姦僕婦不遂即將伊夫毒毆腿斷骨折立時斃命凶惡已極著革職發往黑龍江定例故殺奴僕者降二級調用恐不肖官員恃有職銜謂打死家人罪不過降調且任內有加級紀録又可抵免遂致恣意殘害此風斷不可長從前定例尚未明晰即以故殺而論惡僕逞凶其主殺之乃故殺也今釋伽保因姦毒殺其僕又豈可同日語哉著九卿分别定議尋議嗣後家主將奴僕之妻妄行占辱或圖姦不遂毒毆致斃審有確據及本主自認不諱者將伊主不分官員平人悉照釋伽保例發黑龍江當差互見徒流門如伊主並無姦占别情而奴僕將圖姦無據之事誣陷其主者仍照干犯名義律治罪至奴僕罪不至死家主起意致斃既照故殺例問擬降調雖有加級不準抵免從之定幫助捆毆事主逼索財物者罪律載強盜已行得財者不分首從皆斬康熙五十四年定造意為首及殺傷人者一二人正法餘俱減等雍正五年定強盜案件將法所難宥情有可原者分别定擬至乾隆二年刑部議準御史周紹儒條奏凡盜案有下手捆縳及架送事主之犯仍擬以法所難宥不得以其並未傷人概從末減至是部臣以盜案有幫助捆毆按捺事主逼索財物者此等雖未傷人實亦法所難宥向例尚未分晰詳明請嗣後除造意為首及拒捕傷人捆縳架送事主者仍照例擬以法無可宥及迫於飢寒誘逼入夥并無逞凶者仍請旨減等外其有幫助捆毆按捺事主逼索財物者無論傷人與不傷人俱擬以法無可宥從之定竊販子女之例定例貴州地方有外省流棍勾通本地玩法之徒將民間子女拐去四川湖廣販賣甚將荒村居住之人硬行綁去販賣為首者照聚衆搶奪路行婦女例立斬在犯事地方正法為從者擬絞監候其窩隱護送分别為首者照例割斷腳筯嗣經本年四月刑部題準捆拐苗民案內將罪應割兩隻腳筋者改為杖一百流三千里應割一隻腳筯者杖一百徒三年至是以拐案內有指引捆拐藏匿遞賣之罪未詳定例請嗣後如留歇販棍之人果有捆拐藏匿遞賣確據者即照開窑為首例同川販首犯皆斬立決在犯事地方正法若無幫同情事有分贓確據者無論贓數多寡照窩藏強盜坐家分贓例不分首從發邊衛充軍其止知情竊留無分贓情事無論人數多寡仍照定例為首者杖流為從杖徒其窩販之鄰佑明知不首者照知而不首例滿杖從之互見徒流門定旗人竊盜三犯枷責後復犯竊之例凡旗人另户正身有犯三次竊盜計贓在三十兩以下者仍照例枷責完結若於發落後復行偷竊者嗣後除計贓在五十兩以上仍照例擬絞外五十兩以下不計贓俱發寧古塔當差互見徒流門定製賣賭具分别刻板描畫科罪之例刑部議奏造賣賭具之案其刋刻印板立時可以刷印多張者輾轉販鬻流毒無窮不得不嚴加懲創若止用筆描寫既非俄頃之功陸續描成出售獲利尚微貽害猶淺較之刋板造賣情罪洵有輕重之差即如偽造印信定例雕刻假印之犯例應擬斬若但描摹印信誆騙財物犯該徒罪以上者發邊逺充軍犯該徒罪以下者計贓以次遞減是偽造假印尚有雕刻描摹之殊則造賣賭具亦應照此例分别定擬凡印板造賣賭具者發邉逺充軍描畫紙牌者減一等治罪從之互見徒流門定捕役誣良不準援赦例凡捕役誣拏良民及曽經犯竊之人威逼承認除所被罪名遇赦尚準援免者其反坐之番捕亦得援赦免罪外若將平民及犯竊之輕罪逼認為謀殺故殺強盜者將捕役照例充軍遇赦不準援免更定隱匿入官財産例刑部議奏向例旗員隱匿侵欺案內家産不分所隱價值之多寡但論原案未完之數在一千兩以上本犯擬斬監候者將伊妻並未分家之子概入辛者庫一千兩以下者概擬枷號漢人則不分侵那概從杖一百之律同一隱匿家産而滿漢輕重不同且侵那亦無分别尚未允協嗣後無論滿漢除隱匿那移案內之家産仍照隱匿本律治罪外如隱匿侵盜案內之家産不論原案未完之數應計所隱家産價值之多寡照坐贓律分别定擬若罪止笞杖徒流係旗人枷責完結所隱家産俱行入官從之定審擬旗民交涉案件之例向例奉天所屬旗民交涉案件由地方旗民官略具案情送刑部審擬應質人犯多屬牽連及刑部提解駁查往返擔延不無滋纍至是奉諭地方官身既親民平日習知人情臨時自易體訪今就近旗民官會同承審定擬止將罪犯解部覆訊定案其餘一切牽連對質之人於審明之日即行省釋定兵丁結交匪類及身為匪者罪兵部題準嗣後凡有兵丁結交匪類漏信脫逃依捕役結交巨盜漏信脫逃例不論曾否得財照本犯治罪若兵丁身自行竊依捕役行竊例除計贓分首從照常人擬罪外各加枷號兩月如勾通竊盜坐地分贓亦照捕役例斷豢竊一二名者照常人竊盜治罪外加枷號三個月豢竊三四名者杖流五名以上發邊衛充軍如勾通之賊係積匪巨猾計勾通名數多寡分發附近邊逺極邊煙瘴充軍互見徒流門該管營官照不實力稽查盜賊例降二級調用徇縱者照諱盜例處分定強姦不遂毆傷本婦致越數日身死者照因姦威逼人致死律擬斬立決定成案未著為例者不得援引刑部議覆御史王柯條奏定擬罪名除正律正例外凡屬成案未著為例者毋得牽引如督撫辦理案件果有與舊案相合可援為例許於本內聲明臣部詳加核議應如所請著為例從之定辦賑侵漁之例御史霍備條奏嗣後辦賑各員如有私徴勒派扣尅侵肥情弊其罪較尋常枉法尤重計贓科罪定擬具題後即照原擬發落不得概準限內完贓減免其應追銀數著落該犯家屬變賠從之四年定運丁潛逃之罪刑部奏定嗣後運丁不拘空重如有私自潛逃棄船中途不顧者將該丁照守禦官軍在逃正律治罪仍於靣上刺逃丁二字示警定非登時殺死姦婦例刑部議奏凡非姦所登時殺死姦婦或聞姦數日殺死姦婦除姦情審無確據者仍將本夫擬絞外其審有確據姦夫到官供認不諱者將本夫照姦夫已就拘執而毆死例擬徒姦夫仍科以犯姦之罪從之定繼母致死前母之子分别定擬之例刑部議奏嗣後如有繼母將前母之子故意凌虐有心殺死者仍將繼母所生偏愛之子擬絞監候外如係毆打傷重以致身死審明委無欲殺之心者將繼母偏愛之子杖流至於肆行凌虐致前母之子情急自盡者實與毆殺有間將繼母偏愛之子杖從之嚴各部書吏需索之禁奉諭各部之弊多由於書吏之作姦外省有事到部必遣人與書吏講求能飽其欲則援例準行不遂其欲則借端駁詰司官庸懦者往往為其所愚而不肖者則不免從中染指至於堂官事務繁多一時難以覺察且既見駁稿亦遂不復生疑以致事之成否悉操書吏之手而若輩肆無忌憚矣在督撫藩臬等止圖事之完結遂樂為應付而不惜甘為容隱而不言無怪乎姦胥猾吏以詐騙為得計視國法如辨髦也內部之書吏索之督撫彼此效尤必至督撫之書吏索之司道司道之書吏索之府縣層纍而降受其害者仍在吾民也嗣後著嚴行禁止藩臬以下經手之案著督撫嚴查禁約倘書吏有仍前需索者督撫即時奏聞如有不遵朕旨私相授受者必將與受之人照枉法贓治罪督撫容隱不奏亦必嚴加議處各省關差鹽政織造提鎮等官俱一體遵行定官役因事受賄完贓減等例刑部議準嗣後除侵盜那移之犯并審無入已坐贓致罪者限內完贓均照原例分别減免外若官吏因事受財貪婪入已審明枉法不枉法及律載枉法不枉法論等贓果於一年限內全完死罪減一等改流軍流以下各減一等發落倘限內不完照原擬監追流罪以下即行發落互見徒流門定停訟時仍行審斷事例刑部議準農忙停訟之時凡有婚姻內覷少艾而謀奪貪財利而改婚田土舊荒新淤搶種爭穫渠塘水利爭引灌溉等事該地方官立刻剖斷不得以停訟藉詞推諉六年又奏準凡墳塋等項遇停訟仍行勘斷禁止道官差法員潛往各省考選道士及開壇傳度受籙犯者照違禁例治罪嚴略賣番仔之禁刑部議準嗣後如有略賣番仔之內地人民照依略誘良人及略賣良人為奴婢律不分首從均杖一百流三千里至安南國夷民有串同通事誘賣出境者行文該國王自行拏究一體嚴禁定年幼被脅為盜例刑部議準凡聲明情有可原之夥盜內如果年止十五以下被人誘脅隨行者無論分贓與不分贓俱擬滿流不準收贖著為例互見徒流贖刑等門定獨子出繼例户部議準民間立繼與人如止一子雖係期功分應得繼之人亦不得以獨子過房為嗣如有圖産不顧宗祀將獨子出繼者除斷令歸宗外將本生父母照不應重律杖八十倘獨子借出繼貪産不念本生父母者除歸宗外仍照奉養有缺例杖一百定殺功服以下卑幼一家非死罪二命例刑部議準如有殺死功服緦麻卑幼一家非死罪二命者俱擬絞決永著為例定盜首自首免死改遣例劫盜未經傷人之首犯於罪未發而自首者僉發充軍聞拏自首者照情有可原例僉遣窩家盜線與盜首同科詳見徒流門五年申定免死人犯為匪計贓科罪例凡免死人犯除在配所殺人及為強盜并逃後復犯行凶為匪者仍照定例遵行外其在配所竊贓至滿貫以上及三次竊盜律應擬絞者俱擬斬立決應擬徒罪以上者擬斬監候應擬笞杖者枷號三月鞭一百詳見徒流門定強奪良家妻女未成姦者例凡強奪良家妻女中途奪回及尚未姦汚者照已被姦占絞監候減一等例杖一百流三千里若因所定之女病亡殘廢輒將女之姐妹用強搶奪者亦照強奪良家妻女已未成姦律科罪互見徒流門定旗差協同緝逃之例刑部議準嗣後該旗果知逃人確實下落即稟明左右司一面密移地方官一靣撥兵勒限赴地方官投驗該地方官即會營添差兵役協拏訊供轉解理事收審其窩家仍不許併解聽地方官審詳倘兵役不實力協拏以致兔脫照疏縱逃人例治罪如旗差不赴地方官驗照徑拿者仍照私自拏逃例定擬旗差兵役有索詐者照例科斷申定毆死胞兄留養承祀及救父毆死大功兄之例九卿議奏弟毆兄死遇有留養承祀者向例枷責完結嗣奉諭旨以倫紀攸關枷責完結過輕改為斬監候正以孝弟本屬一理既不弟其兄雖留養亦必不能孝其親且祖宗亦必不歆其祀徒使凶頑幸免倫紀有乖故改斬監候使拘繫在獄漸化其凶殘之性然後留以養親承祀此仁至義盡之道也請嗣後此等罪犯俱改擬斬監候俟三年後該督撫查明於秋審册內聲明請旨照例枷責留養承祀倘三年內遇有父母病故及有人承祀者仍擬情實再據刑部議救父情切毆死大功服兄照姪毆伯叔之例分别已成傷未成傷及折傷三等科罪查人子當父母被毆死生呼吸之際此時但知有父母不知有大功兄亦但知救父母於急難更不知已之因此而獲罪倉惶失手以致毆斃是以謂之情切若分别三等勢必救父之時先視其大功兄之毆伊父必致折傷然後救之天下固無此人子且先計大功兄之罪至於流絞然後已之毆死可以末減計較瞻顧又豈所謂情切者乎請嗣後救父情切毆死本宗期功親屬者仍擬斬監候援例兩請候旨定奪但監候之後厯年秋審以此等罪犯本應立決改擬監候不復更寬多有入於緩決而連年監候者臣等伏思人子見父母被毆但知父母生死為急不暇詳審非凶狠者比雖改擬監候已邀寬典而長繫囹圄情殊堪憫請於秋審時核明情有可矜者減等則情法似均得其平矣從之定兩家互毆各斃一命例刑部議準凡兩家互毆各斃一命除尊卑服制及兩家死者多寡不同或故殺鬬殺情罪不等仍照本律定擬外其兩家互毆各斃一命的係各凶手本宗親屬將應擬抵人犯免死減等發邊衛充軍互見徒流門至二十六年又定各斃一命案內除均係同居親屬無庸追埋外或一家被殺之人與減軍之犯有不同居共財者各於犯人名下追銀二十兩給付死者家屬定嚴胥役揑充牙行之禁時外省衙役每有更名揑姓兼充牙行倚勢作姦為害商民者上命定例嚴禁尋議不法姦胥有更名揑姓兼充牙行者應照更名重役例杖徒如有誆騙客貨纍商等情即照光棍頂冒朋充霸開統行逼勒商人不許别投拖欠客本久估纍商例枷號一月發附近充軍地方官失於查察及有意徇縱者分别降罰從之互見徒流門定佐二官不許夾訊之例刑部議準御史永夀奏請佐二微員審理批發奉委事件有應夾訊者係上司批委詳明上司改委印官審理係印官批委呈明印官掣回自審其佐二官不得擅用夾訊頒行大清律例先是元年尚書傅鼐奏大清律集解附例一書所刋原例增例欽定例三項非盡見行之條而自刋刻後至今前例又多酌改應請特簡大臣統加檢核增刪應仍照舊例行者亦即酌復舊章除律文律注仍舊外其刋入之例必將某條附載某條之處確切不移纂輯成書恭請欽定刋刻頒示得旨允行又令各省督撫臬司有刑名之責者據實敷陳各抒所見勑交該館以資採擇至是書成凡四十有七卷律文四百三十六條悉仍舊本刪律總注其注內有與律義有所發明實可補律之所不逮者别立一條著為成例附例千有四十二條刪原例增例各名目凡乾隆四年十二月以前奏準通行之例俱逐條以次附例其五年以後之例依元年奏準五年一次陸續增修附律例之後頒行直省永著為例定老瓜賊案內傳授學習各犯條例凡老瓜賊除首從照律定擬外其審有傳授技藝在家分贓者照強盜窩主造意身雖不行但分贓者律擬斬立決跟隨學習之人雖未同行俱照強盜情有可原例免死發遣如無學習確證不過與賊往來熟識照知情不首例杖一百點卯充警六年申嚴貪黷敗檢之戒時山西巡撫喀爾吉善參奏學政喀爾欽賄賣生童布政使薩喀諒酷虐貪婪請革職審擬疏入奉諭朕御極以來信任大臣體恤羣吏且增加俸祿厚給養亷恩施優渥以為天下臣工自必感激奮勉砥礪亷隅實心盡職斷不至有貪黷敗檢以干憲典者不意竟有山西布政使薩喀諒學政喀爾欽穢迹昭彰贓私纍纍皆朕夢想之所不到我皇考整飭風俗澄清吏治十有餘年始得丕變今不數年間而即有蕩檢踰間之事既不知感激朕恩並不知凛遵國法將使我皇考旋乾轉坤之苦𠂻由此而廢弛言念及此朕實為之寒心昔日俞鴻圖賄賣文武生童我皇考將伊立時正法自此人知畏懼不敢再犯今喀爾欽賄賣生童之案即當照俞鴻圖之例而行薩喀諒喀爾欽二案著吏部侍郎楊嗣璟前往會同巡撫喀爾吉善秉公據實嚴審定擬尋經審擬喀爾欽即行正法薩喀諒依律處斬並皆藉沒家産改定販私鹽誣扳例刑部議覆廣東按察使潘思矩奏律載凡販私鹽誣指平人者加三等拒捕者斬又雍正三年定例私販誣扳者即非拒捕亦照拒捕傷人律治罪竊思誣告人死罪未決者照律反坐滿流加徒役三年私販罪止杖徒而誣扳平人即加至斬是反重於誣告人死罪未決者矣查誣告律內誣告人流徒杖罪者加所誣三等請嗣後私販誣扳平人者仍照律加三等杖一百流三千里應如所請從之互見徒流門申嚴誣告越訴例奉諭從來誣告越訴最為良民之害蓋一州一縣之內必有一二狡黠之徒以殷實之家為可擾稍不遂意輒尋釁興訟揑造謊詞拖纍株連以泄私忿更或未控州縣即控府道未控府道即控院司比比皆是深可痛恨嗣後凡駕詞誣控者必按律加等治罪凡未經在下控告者院司道府不得濫準其業經在下控理復行上控者必其情理近實先將原告窮詰然後準理若發審屬虛誣告與越訴二罪並坐其如何酌量定例之處著刑部議奏尋議如越訴審理屬虗除誣告加等治罪外先將該犯枷號一月示衆從之定私鑄小錢例大學士等議覆御史楊朝鼎條奏私鑄砂殼無字小錢應量行末減查私鑄砂殼雖係小錢而攙雜於制錢之內即可行用是以律例內并未開載砂殼無字小錢另有分别定擬之條今如該御史所奏比照偽造印信未成律減等擬流則姦民恃律禁之稍寬幸重罪之可免貪圖微利轉起犯法之漸但砂殼小錢並無年號字樣稍與私鑄大錢有間請嗣後將私鑄砂殼小錢之犯為首及匠人均擬斬監候其例應絞決者概照免死減等例分别發遣應發遣者改為滿流以下依次遞減一等按之情法更得其平從之互見徒流門申定遞回原籍人犯潛逃來京之例刑部議奏查徒罪限滿遞回原籍管束之犯復潛逃來京者拏獲之日俱遵照乾隆二年定例枷責遞回原籍約束疏縱之地方官照例查恭至徒罪以下笞杖枷責遞回原籍之犯復行潛逃來京者例內并未議及地方官亦無處分請嗣後在京問擬笞杖枷責遞回原籍人犯如有復逃來京者除初次二次本犯仍遞回原籍安插免其治罪地方官免其查參外其復逃來京俱仍遞回原籍交與地方官嚴加管束若有犯案者從重歸結其疏縱之地方官照遞回人犯出境例分别議處載入例册通行從之定原毆傷輕保辜餘限因風致死例凡遇原毆傷輕雖過保辜正限後尚在十日之內名曰餘限因風致死者照毆人至廢疾律杖一百徒三年互見徒流門又勑律例毋得輕議紛更奉諭律例一書原係提綱挈領立為章程俾刑名衙門有所遵守至於情偽無窮而律條有限原有不能纎悉必到全然該括之勢惟在司刑者體察案情隨事詳酌不可以一人一事而即欲頓改成法也本朝大清律周詳明備近年以來又命大臣等斟酌重修朕詳加釐定現在刋刻頒行而條陳律欵者尚屬紛紛至奉天府府尹吳應枚竟奏請酌改三條夫以一定之憲章欲以一人之臆見妄思變易究竟不能盡民間之情弊而朝更夕改徒乖政體嗣後毋得輕議紛更如果所言實屬有當該部亦止可議存檔案不得擅改成書嚴捕役分地坐緝之禁刑部議準嗣後各州縣捕役俱不得令其分地坐緝經年盤踞致有斂費護盜之事倘有仍前設立路快坊快區捕等項名色擾纍居民將該捕役治以違例之罪地方官照例查恭定尊長謀殺卑幼為從之例是時雲貴總督張廣泗題奏民人劉四貴等謀殺小功服姪劉光裕首犯劉四貴照例絞候從犯劉三貴無例可援聽候部議嗣三法司核擬劉四貴絞候劉三貴杖流並請嗣後尊長謀殺本宗及外姻卑幼除為首者仍依故殺法定擬外其為從加功之尊長各按服制分别已行已傷已殺三項各依為首之罪減一等定擬若同行不加功及同謀而不同行者又遞減一等事下九卿議奏尋議應如三法司所奏從之更定打死贖身家人非死罪而銼骨燒埋者罪刑部審擬原任鳴贊福海打死贖身家人常德銼骨燒埋依殺奴僕非死罪三人律發遣黑龍江上以常德係福海已贖身之家人非現在服役者可比本人又無過惡福海懷恨立斃其命又復支解其尸殘忍狠毒出於情理之外刑部強引殺奴僕非死罪三人律擬以發邊實屬不倫將滿漢堂官嚴加議處尋改擬絞立決從之七年申明致死婢女分别紅白契買之例刑部議覆侍郎張照等奏請申明致死婢女畫一科斷之例查例載旗人故殺白契所買之人并典當之人俱照故殺雇工人律擬絞監候若毆打死者照律治罪又定例康熙六十一年以前各旗所買白契之人俱不準贖身有逃走者許遞逃牌雍正元年以後白契所買單身及帶有妻室子女之人俱準贖身若買主配有妻室者不準贖是紅契則為家人白契即為雇工而向來問刑衙門科斷惟家主致死白契所買家人則照雇工人例於白契所買婢女俱照紅契定擬殊未畫一請嗣後民人於雍正十三年以前白契所買家人照八旗之例準作家奴倘伊主毆殺故殺俱照紅契一例擬斷若乾隆元年以後除婢女招配者亦照八旗配有妻室不準贖身之例作為家奴外其餘白契所買之人俱以白契定擬至旗民所買婢女已配給紅契家奴者準照紅契辦理從之八年定私鑄鉛錢之例刑部議覆閩浙總督那蘇圖奏私鑄已有定律私造鉛錢作何治罪向無明文應請照國初私鑄銅錢原律為首及匠人擬絞監候為從及知情買使者杖一百不知者不坐從之定盛京驛站餽送之禁時盛京兵部侍郎及正副監督多有私受驛丞餽送及規禮者事聞奉諭嗣後有仍蹈前轍者從重治罪九年定妻過失殺夫妾過失殺家長及正妻例刑部議覆蘇州巡撫陳大受疏稱歐德潤妻丁氏過失撳傷德潤身死查欽頒新例妻妾毆夫條內注有妻過失殺夫當用比律之語但未明言應比何律查妻為夫服斬衰三年應以服制輕重比照科斷應比照子過失殺父母律將丁氏杖一百流三千里係婦人決杖一百餘罪收贖應如所請再查妻妾毆夫條下注云夫過失殺妻妾及正妻過失殺其妾者各勿論若妾過失殺家長及正妻當用比律自應分晰指明使問刑衙門知所遵循查妻為夫妾為家長俱服斬衰三年妻過失殺其夫妾過失殺家長俱比照子孫過失殺祖父母父母律杖一百流三千里妾為正妻服期年妾過失殺正妻應比照過失殺期親尊長律杖一百徒三年俱行決杖餘罪收贖從之互見徒流門至二十七年又定妻過失殺夫妾過失殺家長除照例科罪外均令不許改嫁或有實無內外親屬可依不能自存者該族保人等呈報地方有司查明當官嫁配違者主婚媒人分别治罪申定致死在配發遣為奴人犯例凡強盜免死減等發遣為奴之犯如怙惡不悛不服伊主管束或無故欺凌平人經伊主及平人毆打斃命伊主免罪平人照本罪減等擬徒詳見徒流門定五城御史審事之例巡視西城御史舒敏奉請五城凡有事件必令滿漢二員進署公同審理其私設刑具傳集人犯獨行審斷之處應概行停止從之申定陳亡子孫免死一次分别是否因公之例三法司核擬旗人穆延太圖財扎死民人龔興應擬斬決查穆延太祖父出兵陳亡可否將穆延太照例免死減等發落奉諭例內凡祖父出兵陳亡其子孫準免死一次者原係國家酬功之意其因公事獲罪至死者自應照例寬免今穆延太圖財害命非因公事獲罪其祖父軍功與被殺之人何干僅以枷責完結既不足蔽辜且將使不肖之子孫有所恃以肆惡矣著改為應斬監候秋後處決定尊長毆卑幼至篤疾者斷給財産之例刑部議奏例載故殺期親弟妹照故殺大功弟妹律擬絞監候其毆期親弟妹致死照本律滿徒加一等杖一百流三千里未經議及毆至篤疾照律勿論者斷給財産之條請嗣後有期親尊長歐卑幼外祖父母毆外孫至篤疾者如卑幼實係頑梗觸犯尊長一時忿激以理責打雖至篤疾仍照律毋庸置議外其卑幼並無干犯尊長自恃分尊非理毒毆以致篤疾者應將財産一半斷給被傷之卑幼資其養贍從之停止每嵗矜減五次緩決人犯之例先是刑部議準自乾隆十年為始將五次緩決人犯於本內聲明情罪尚可矜原者另摺奏請著為成例至是奏準於乾隆十年辦理一次嗣後停止俾人知殊恩不得再邀蹈法不得幸免從之定夥盜自首分别定擬之例是時河南巡撫碩色審題盜犯于黑兒行劫五次俱係隨從把風並未下手傷人且事未發而盡行自首應照罪人自首例免罪部議行劫五次本屬立決之犯與行劫一二次者不同若止因其盡數首出即行全免情罪未符請嗣後夥盜除行劫一二次者於事未發之前將行劫次數盡行首出仍照例免罪外其行劫三次以上雖係盡行自首仍照未傷人之盜首事未發而自首例僉妻發邊衛充軍若聞拏投首亦照未傷人之盜首聞拏投首例僉妻發遣于黑兒應僉發邊衛充軍從之互見徒流門又定私鑄鉛錢不及十千者為首及匠人俱照情有可原例於疏內聲明請旨發遣為從及知情行使者依次遞減互見徒流門定流犯脫逃分别原犯流罪及減等為流者按犯逃次數遞加治罪例詳見徒流門十年嚴挂斗送匾之禁奉諭親民之官審理詞訟秉公剖決乃職分所當然在官無可居之功在民亦不必言感朕聞外省陋習有於詞訟審結之後勝者以為得計糾集親友鄰里製斗造匾懸挂公堂無識有司亦恬然受之不以為怪此等阿諛獻媚適以啓好訟生事之端且流為粉飾沽名之弊澆風斷不可長嗣後有仍前挂斗送匾者將徇隱之有司恭處本人一併治罪申定秋決過期行刑之例奉諭向來冬至既屆一應秋決人犯例不行刑若逺省有奉到文書在冬至以後者則留至次年冬至前正法後因此等人犯盡屬凶惡罪無可緩若至一年之久未免别生事端仍于奉到部文時處決但思應決諸犯既無可緩適值冬至亦須稍遲嗣後如有過期接到部文者著於冬至七日以後照例處決定人夫領帑脫逃例工部議準嗣後凡修作工程如有夫頭人等已經領帑私行侵蝕不即照數雇夫以及領帑私逃者均照常人盜倉庫錢糧律計贓治罪定聚衆抗官通行例刑部議覆侍郎秦蕙田奏言例載山陜兩省刁惡頑梗之輩假地方公事迫勒平民約會抗糧斂錢搆訟抗官塞署或有寃抑不於上司控告擅聚衆至四五十人者地方官與同城武職無論是非曲直拏解審究為首者照光棍例擬斬立決為從擬絞監候又福建地方如有借事聚衆罷市罷考打官等事均照山陜題定之例分别治罪定例係專指山陜等處而言向來此等案件别省犯者甚少但人心之淳漓不同如有所犯相同自當一例懲治其情罪稍輕律有正條者仍各照本律科斷應如所請從之定強盜不同居父兄一體處分例刑部議準強盜之父兄果明知子弟為盜縱容貽害者雖不同居亦照同居例杖一百定書吏燒燬册籍之罪御史范宏賔奏各部書吏巧詐營私故於册籍堆積之所暗藏火種因以一炬使營私之案莫可查考本年九月户部貴州司檔案房屋全行焚燬其起火緣由應於該書吏根究明確如有心燒燬即治以故燒公𪠘之罪從之皇朝文獻通考卷一百九十八
