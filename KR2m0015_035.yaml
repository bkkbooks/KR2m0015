body:
  text: 市糴考四糴雍正元年飭直省督撫查核存倉米石刑部尚書勵廷儀言各省存倉米石雖有司道知府盤查不能保其一無徇私當責之督撫嚴加核實造册具奏督撫離任將冊籍交代新任限三個月查核奏聞如有虧空即行題參徇庇者議處仍令分賠從之又動支浙江庫帑買米三萬石運至福建分貯厦門收貯一萬石泉漳二府各貯六千石其餘八千石運赴福州遇米價稍貴奏請平糶又以河北三府艱於粒食議令截留漕米六萬二千五百九十石於衛輝府倉存貯撥運陜州收捐米二萬石於懷慶府倉存貯備用又諭河南巡撫石文焯河南居四方之中地廣民庶素封之家常喜儲藏米穀以收居竒之利比年連遇荒歉民食維艱特遣官往賑該撫即豫為籌畫俾富室之粟皆得流通出糶於官以為賑恤之用又以採買備賑米石敇有司毋得阻遏商販時以北省二麥歉收差員到南省採買米石以備賑貸平糶上聞各省地方官有因差員買米禁止商販不許出境者特諭以浙江及江南蘇松等府皆仰食於湖廣江西令該部速即行文各省凡有米商出境任便放行毋得阻撓二年以江浙沿海地方海潮泛溢令湖廣江西河南山東安徽各省動帑買米運往平糶湖廣買米十萬石江西買米六萬石運交浙江巡撫平糶河南買米四萬石山東買米六萬石安徽買米五萬石運交蘇州巡撫平糶又議定社倉事例先是奉諭湖廣總督楊宗仁湖北巡撫納齊喀湖南巡撫魏廷珍等國家設立常平諸倉蓄穀積粟偶遇旱潦詳報踏勘往返察驗未免後時古人云備荒之倉莫便於近民而近民則莫便於社倉前諭爾等勸導建設蓋専為安民起見也爾等自應轉諭屬員體訪各邑士民中有急公尚義之心者使主其事果掌管得人出納無弊行之日久穀數自增至於勸捐之時須俟年嵗豐熟輸將之數宜隨民力多寡利息從輕取償從緩如值連年歉收即豫展限令至豐嵗完納一切條約有司毋得干預至行有成效積穀漸多該督撫亦秖可具摺奏聞不宜造册題報使社倉頓成官倉貽後日官民之纍朕初意如此孰料該督撫欲速不達令各州縣應輸正賦一兩者加納社倉穀一石且以貯穀之多少定牧令之殿最近聞楚省穀石現價四五錢不等是何異於一兩正賦外加收四五錢火耗耶是為裕國乎抑為安民乎諭到該督撫速㑹同司道府等官確商妥議務得安民經久之法以副朕意嗣復奉諭㫖社倉之設原以備荒歉不時之需然往往行之不善致滋煩擾朕以為奉行之道宜緩不宜急宜勸諭百姓聽其自為之而不當以官法繩之也是在有司善為倡導於前留心稽核於後使地方有社倉之益而無社倉之害爾督撫當加意體察至是議定社倉之法一令地方官開誠勸諭不得苛派米石暫於公所寺院收存俟息米已多建厫收貯所捐之數立冊登明不拘升斗積少成多若有奉公樂善捐至十石以上給以花紅三十石以上奬以匾額五十石以上遞加奬勵有年久不倦捐至三四百石給以八品頂帶每社設正副社長擇立品端方家道殷實者二人果能出納有法鄉里推服按年給奬十年無過亦題請給以八品頂帶徇私者即行革懲侵蝕者按律治罪其收息之法凡借本穀一石冬間收息二斗小歉減半大歉全免秖收本穀至十年後息倍於本秖以加一行息乾隆三年議定每息穀十升以七升歸倉以三升給社長作修倉折耗其出入之斗斛遵照部頒公平較量社長預於四月上旬申報給貸定期支散十月上旬申報受納不得抑勒多收臨放時願借者先報社長計口給發交納時社長先行示期依限完納其冊籍之登記每社設用印官簿二本一社長收執一繳州縣存查登載數目毋得互異其存州縣一本夏則五月申繳至秋領出冬則十月申繳至來春領出不許遲延以滋弊竇每次事畢社長本縣各將總數申報上司凡州縣官止聽稽查不許干預出納如有抑勒那借强行糶賣侵蝕等事許社長呈告據實題參再各方風土不同更當隨宜立約為永逺可行之計令各督撫於一省之中先行數州縣俟一二年後著有成效然後廣行其法於通省三年定各省存倉米麥改易稻穀之制時議南方諸省土脈潮濕米易黴爛不若稻穀可以耐久因定嗣後江安閩浙湖廣江西川廣雲貴各省存倉米一石改換稻穀二石加謹收貯需用之時碾舊貯新除安徽但有稻穀則無貯米及浙江福建倉米有限無庸改易嗣於十一年議准安徽鳳陽亳州等處凡産粟穀之處每逢糶三即准其買粟補倉挨年易换其江西湖北湖南四川四省存貯米皆在五萬石內外令於一年內改易稻穀內惟四川茂州易蕎麥六百石松潘衛存貯軍需米勻作兩年平糶仍買新米貯倉五年更换一次江淮截漕米廣東存倉米皆八萬餘石廣西存倉米十萬餘石分作二年改易稻穀雲南米五十七萬餘石貴州米四十萬餘石一二年內不能盡易每年雲南應給兵糧十四萬九千六百餘石貴州兵糧九萬五千六百餘石即將二省存倉之米支給至秋成時於額徵內收穀補項雲南存倉米限四年貴州限三年盡可改易稻穀嗣後各省易穀既完每年額徵兵餉仍收米給兵餘悉改徵稻穀而山西河南亦令將存倉米麥照例糶賣易穀其民缺及虧空米糧亦令改折追補入倉至􅐘子蕎麥等各處出産不同并飭令各屬確訪時價易穀入倉又以黔省地氣潮濕倉米易致黴爛嗣後將兵米合計共存三年之蓄餘者於青黃不接之時量行減價平糶以濟民食著為定例從總督髙其倬請也又諭户部歸化城土默特地方年來五穀豐登米價甚賤查黃河自陜西黃甫川界入口河之兩岸一屬山西一屬陜西應自歸化城購買米石從黃甫川界黃河運至內地到土拉庫處修建倉厫收貯其歸化城大青山黃河岸口亦建一倉買米存貯又以米價騰貴諭倉場總督將舊貯米石減價平糶并行文直𨽻總督凡近水州縣可通舟楫者俱令赴通倉領運平糶便民又以各省秋成豐稔命督撫等遵行社倉之法并及時買補州縣倉儲又定雲南社倉題報穀數之例從雲南巡撫楊名時請也自雍正二年為始貯穀實數於次年嵗終具題俾每年捐輸里民借支以及有無發賑均得稽核又議准社倉事宜五事江蘇巡撫何天培條奏一社倉借貸散賑預造排門細冊存案凡不務農業逰手好間之人不許借給一正副社長外再公舉一身家殷實之人總司其事一州縣官不許干預出納如有抑勒那借許社長據實陳告一所需紙張筆墨須勸募樂輸或官撥罰項充用不得科斂擾纍一積穀既多恐滋浥爛應於夏秋之交減價平糶秋收後照時價買補俱從之是年湖廣江南浙江秋成豐稔命湖廣動支庫銀十萬兩採買米石於省倉及各州縣加謹收貯如民間米價少昻即行停止江南浙江一面動項採買一面定數具報又令直省倉糧出陳易新之時佐二官公同收放如州縣私自糶賣佐二官扶同隱匿者罪之又定山西常平倉積貯事宜提督山西學政右庶子劉於義言山右當豐亨之時宜預籌積貯每年發銀四萬兩交太原平陽潞安大同四府建倉積貯以備各州縣需用選擇廉幹官董其事如能實心經理三年准豫議敘有挪移虧空嚴加處分每嵗於青黃不接時出糶秋收時買補小歉平糶中歉出借大歉賑濟務定章程以垂永久下該撫實力行之四年令兩淮建鹽義倉兩淮商衆公捐銀二十四萬兩又巡鹽御史噶爾泰奏繳公務銀八萬兩共銀三十二萬兩奉㫖將二萬兩賞給噶爾泰其三十萬兩為江南買貯米穀蓋建倉厫之用所蓋倉厫賜名鹽義即著噶爾泰交與商人經理又奉諭㫖各倉減價平糶原期有益貧民聞清河本裕倉奸胥猾吏串通富户賤買貴賣本倉賣完又賣别倉甚屬可惡倉場侍郎等所司何事向後若再有此弊定將監糶米石之員正法倉場侍郎嚴加治罪又發通倉米二萬五千石運至保定平糶從直𨽻總督蔡珽請也又議定州縣侵蝕那移浥爛倉穀之罪先是三年諭內閣九卿曰積貯倉穀關係民生最為緊要朕屢降諭㫖令該督撫等嚴飭州縣及時買補虧缺之數無如茍且遲延奉行不力昨據月選官陳克復條奏虧空倉穀請支動正項買補一面嚴追本官還項朕已交與九卿議行令直省地方俱著定限三年將一應倉穀買補完足不得顆粒虧缺三年後朕必特差官員前往盤查如有缺項從重治罪倘有不能補足情由著該督撫題奏凡虧空錢糧猶可立限追完無損國帑若虧空倉穀則一時旱潦無備事關民瘼其罪較甚自宜嚴加處分並著九卿確議定例具奏向例虧空倉穀處分止於革職留任限年賠補至是遵㫖議定穀一石比照錢糧一兩科斷侵蝕一千石以下擬斬准徒五年一千石以上擬斬監候不准赦免所侵欺穀石仍著嚴追完項其那移者數止千百石擬徒五千石以上者流一萬石以上者充軍二萬石以上者擬斬限一年內全完免罪二年內追完減二等三年內追完減一等限滿不完照數治罪其實黴爛數止三千石以下者革職留任限年賠補三千石以上者即以那移論疏上諭曰凡倉穀黴爛皆由倉厫不修以致倒塌滲漏虧折米穀此愈當加懲者今若寬其處分則有司平日必不加意修理以便借辭此處著再議於是議令地方官將滲漏不堅全之處需費無多者即時補葺有年久毁爛倒塌者動項修蓋有將倉糧寄貯及露囤者題請添設倉厫嗣後州縣怠玩不修理蓋造以致米穀浥爛者革職勒限賠完限內不完即照侵蝕例按數科律遇赦不宥從之又令山陜各府屬買穀分貯議令山西動帑金四萬兩買穀分貯太平潞大四府各州縣其素無蓄積并向來積貯不多之處務令購足五年之內每年准動四萬兩照數買貯責令知府直𨽻州盤察有力行三年盡善者保題叙功陜西動帑金十二萬兩及本年豐收採買穀石存貯凉州臨洮鞏昌甘州寧夏各府屬以備撥用又令五城設厰平糶以京城米價騰貴特諭發倉米五萬石分給五城平糶俟市價平減即行停止所存剩米即貯該城為將來之用又以五城米厰並在外城城內糴買維艱復諭於內城設厰數處以便窮民又令州縣多設厰平糶并嚴揑借之弊户部覆准御史馮長發奏凡州縣平糶應多設厰以便附近居民赴糴其有奸商豪户囤積射利者訪拿治罪平糶穀石每石准銷一二升以抵耗折有攙和灰沙者題參至借給與民之穀倘吏役揑名虛領秋時追缺無著從重治罪所缺米穀於該州縣名下追還并照失察例治罪其有官役侵剋者該督撫察出題參又令福建廣東貯備米穀時上以福建廣東二省地處極邊應作何貯備米穀令九卿集議因議定閩省則臺灣常運平糶米五萬石之外動正項錢糧運米十萬石存邊海地方備貯若遇臺灣豐年酌量加運廣東則通省府州縣存貯數多者開倉平糶即將價銀交數少之州縣買貯再將廣西捐穀糶三價值仍令採買穀石運交廣東分貯又令江南淮安等處採運麥石至閩省平糶浙閩總督髙其倬言閩省米價騰貴現撥溫台二府倉穀七萬石運往接濟更請於江南淮安等處採買二麥運閩平糶從之又清釐直𨽻各屬借糶倉穀之弊先是直𨽻總督李紱請將倉糧糶借與民有㫖命翰林御史等官㑹同地方官核實監糶務使小民均沾實惠其倉糧果否實貯一并查驗至是奉諭㫖據鄂爾竒繆元奏稱直𨽻借糶倉穀弊端種種無非地方官巧為掩飾虧空之計向來直𨽻倉穀虧缺甚多朕知之甚悉各官惟恐敗露故設計彌縫詳請借糶李紱為其所欺遂代為題請且未經奉㫖即先為散給及派員往查又轉停止覽鄂爾竒等所奏各官情弊顯然凡此等州縣官若仍留原任將來假公濟私那新掩舊必至刻剝小民虧缺正項而地方倉厫始終不得清楚可將巧稱倉穀出借各官悉行解任借出之穀俱著解任之員自行催還以一年為限逾限不還者治以那移虧空之罪又運穀至福建積貯先是奉㫖令江西運米十五萬石往閩濟用至是大學士等議請再截留浙江漕糧十萬石易穀二十萬石就近運往從之又命山東巡撫動用帑銀於青登萊三府購買米石運至濟南三府分貯又令廣東各營建倉貯穀議定廣東邊海之南澳鎮右營澄海二門達濠等營貯穀五千二百石潮州鎮標三營惠來平海大鵬等營貯穀六千二百石提標五營貯穀五千石督標并水師六營肇慶城守營共貯穀七千石計每兵一名存穀一石以備借貸秋收免息徵還又奉諭㫖江南秋雨稍多被水州縣已令確查賑恤入冬以後積水未消秋麥未能及時耕種恐交春米價漸昻況蘇松户口繁多民間食米多取給於外販尤當早為留意查江安糧道有存貯還漕一項計二萬八千餘石安廬鳳淮四府各項共計九萬餘石應差京官一員前往確查分别留運平糶以濟民食但地廣人稠此數未必敷用必設法多貯方覺寬裕著九卿速議具奏因議定令該督撫動帑委員赴産米地方採買再照河工議叙貢監之例將銀兩改為本色輸納分别府州縣之大小酌量應輸米穀之多寡捐足停止所收米穀應用平糶散賑之處該督撫具題動支又令杭州建倉以浙商輸銀買米存貯照兩淮鹽義倉之例隨時平糶五年以清查江西倉穀暫停糶三之例時命署巡撫邁柱清查江西倉糧奉諭㫖聞江西倉儲虧空甚多向來倉穀舊例存七糶三原為青黃不接之時用以接濟民食今裴􅏍度因各州縣虧空竟借此為那補遮掩之計若仍聽其存糶則盤查難於清楚著從雍正五年將糶三之例暫行停止俟各州縣倉穀查清之後奏聞再行又令兩淮近竈之地建倉積穀煎鹽竈户皆居住濱海之地離城最逺每遇歉收之嵗覔食維艱若逺赴鹽義倉運致米石重勞往返奉諭㫖酌立數倉於近竈之地積貯米穀以備貧苦竈户一時緩急之用又令湖廣買貯穀石并開事例以裕積貯湖北湖南現存常平倉穀麥及截留漕米統計止五十餘萬石視他省積貯較少議照江浙二省現開捐納貢監事例飭各府收捐本色實貯在倉以備東南各省撥運平糶之需又撥浙江穀石運往福建協濟先是二月以福建米價昻貴從督臣髙其倬之請撥江蘇米十萬石運往至是浙江巡撫李衛請於溫台二府屬撥運穀七萬石仍令各屬動銀買補閩省解價還項其截留浙江漕米十萬石易穀二十萬石由海運赴閩亦將截留糶價分撥各屬於秋成買穀還倉又增定浙江常平倉捐穀數目先是浙江常平倉捐數止議七十萬石業經捐足撫臣李衛以浙省人民衆多各縣存穀無幾兼以接壤閩省常需海運請於前定捐數外加倍捐至一百四十萬石按大中小縣分别存貯從之又令浙江省採買川米先是四年浙江巡撫李衛請動浙庫公項銀十萬兩委員赴川採買米石以備浙閩兩省緩急得㫖允行至是川米運回正值杭嘉湖價昻之候隨令平糶復允李衛請將糶米歸欵銀借動五萬兩并各商公項銀三萬兩再委員往川採買亦俟運到分欵存貯又定常平倉盤查事例議定各省常平倉每年春間出借秋後徵還務於十月內全完造冊送部嵗底令知府直𨽻州盤查逾限不完或揑造俱行參處仍照數追賠如有影射作弊冒借入己者紳襟黜革牙蠧拿究所缺穀石加倍追還鄉保有無受贓分别治罪再倉穀出糶之時奸商勢豪串通揑名零星糴出囤積射利者地方官嚴禁之州縣以糶借為名掩飾虧空者分别侵那定罪其盤查之道府州并該管之督撫隱匿徇庇照例處分仍將所虧倉穀著落分賠又清查湖廣社倉虧空署湖廣總督福敏參奏虧空社倉各員請分别議處得㫖社倉之設所以預積貯而備緩急朕御極以來令各省舉行曽屢頒訓諭務俾民間踴躍樂輸量力儲蓄不可繩以官法誠以官法相繩則勉强催迫轉滋煩擾惟期設法開導使衆樂從不知一毫擾纍乃為盡善也數年之內各省督撫奉行最力者惟湖廣總督楊宗仁今據福敏陸續盤查具奏前來始至原報甚多而現存無幾此中情弊想因不肖有司侵蝕入已或那移以掩其虧空又或楊宗仁鋭於舉行而各官迎合其意虛報穀數以少為多均未可定總之舉行社倉之法其中實有甚難者我聖祖仁皇帝深知其難是以李光地奏請而未允張伯行暫行而即罷此實事勢使然也以民間積貯言之在富饒之家自有蓄積雖遇歉收而無藉乎倉穀則當輸納之時往往退縮不前至貧乏之家仰給社倉固為殷切而每嵗所收僅供生計又無餘粟可納以備緩急此責諸民者之難也至於州縣官實心視百姓為一體者豈可多得今以常平之穀為國家之公儲關係己身之考成尚且侵欺那用虧空纍纍況民間之社倉安能望其盡心經理使之實貯以濟用乎朕之舉行社倉實因民生起見又諸臣條奏多言之鑿鑿是以令各省酌量試行以觀其成效何如並非責令一概施行也湖廣社倉虧缺之數即交與福敏悉心清查倘穀已如數交倉而州縣侵蝕那移忍以百姓預備之需充一己之私用者著即於原侵那之州縣名下嚴追賠補或民間原未交倉或交倉之數與原報之數多寡不符者若必欲令民間照數完納恐小民力有未敷未免竭蹶非朕曲體民隱之意福敏辦理此事必須至公至當方與吏治民生兩有裨益也自古有治人無治法必有忠信樂善之良民方可以主社倉之出入必有清亷愛民之良吏方可以任社倉之稽查各省官民果能實力奉行而善全無弊朕實嘉之至於繩以官法而好尚虛名則有司奉行之不善負朕本意矣又諭內閣常平倉穀乃民命所關數年以來朕為此事宵旰焦勞諄諄誥誡若地方大小官員茍有人心斷不忍置之膜外查福建通省應貯米穀共一百七八十萬石為數可謂足矣乃上年稍覺歉收米價略長而地方大小官員與兵民之心皇皇以缺米為慮彼時朕即疑閩省積貯之數必有虧空故地方情形若此也近聞閩省各屬倉穀錢糧虛懸者甚多有銀穀兩空者有無穀而僅存價值者至於實貯在倉者則十無三四向來直𨽻江西二省倉儲不實經朕特遣大臣前往逐一清查並遴選人員命往將虧空之州縣官即行更換是以二省倉穀漸次清楚今閩省積弊若此亦當特遣大臣㑹同新任巡撫常賚將通省倉穀秉公據實一一清查如有查出虧空之州縣並失察之知府等官即將伊等解任審追務期徹底澄清不使絲毫朦混以副朕察吏惠民之至意又奉諭㫖福建通省倉穀虧空甚多朕特遣大臣等前往盤查但恐不肖有司等聞欽差將至向紳襟富戶那移借貸以掩飾其虧空之項而紳襟富戶等或畏其威勢或迫於情面不得已代為應付以圖掩飾彌縫於一時均未可定朕此畨之差遣大臣清查斷不容有絲毫之朦混隱匿倘將資財穀米借出便為官物斷斷不能退還用是明白曉諭俾勿墮貪官劣員之術中使地方積弊永除而後任官員亦共知警戒不致仍蹈前轍著將此通行福建郡縣鄉村咸使聞知又命設米穀倉六所於江南泰州通州如臯鹽城海州板蒲附近商竈地方以備賑濟又議定山東社倉事例先是巡撫塞楞額言濟南新建社倉請交與鹽法道經管奉諭㫖以社倉之設應聽民間自便若以官法繩之必致滋擾著另議具奏尋塞楞額議新建社倉交與歷城縣管理令該縣勸諭紳襟士庶量力捐輸臣仍率同司道各官每於秋後量力倡捐無論米穀豆黍隨便糴買新建社倉一百二十間儘可收貯米穀之出入在民捐者令歷城縣收發稽查在官捐者委之濟南府下户部議尋議社倉之設原以鄉居之民離城窵逺不能仰給常平之粟是以於鄉村建立社倉以民間之蓄積濟民間之緩急出入收納聽民自便是社倉所以補常平倉之不及也今於濟南府省㑹之地建立倉厫將民捐米穀委官收發經管是常平而非社倉矣應令該撫飭令府縣官勸諭紳襟士庶量力捐輸於該地方鄉宦士人內擇公正殷實之人二名立為正副社長俾其經理該縣不時稽查如該社長出納有法照例分别奬勵倘有漁利侵那情弊即行黜革治罪至各官所捐米穀應如該撫所奏令濟南府收發稽查飭該府加意經理倘有不肖有司將官捐米石那移侵蝕即指名揭參治罪所建倉厫一百二十間令該撫酌量應用分為二所以民捐者為社倉官捐者為常平倉從之六年奉諭㫖聞兵丁等於京通二倉支領米石時每因腳價之費賣米充用致有不計其米之接續輒以賤價糶及至缺乏又以貴價糴此甚無益於兵丁者也現令旗下俱有官房或按八旗設立八局或按滿洲䝉古漢軍旗分設立二十四局將兵丁欲賣之米以時價買貯及其欲買則以平價賣給如此似於兵丁大有裨益著管理王大臣等公同詳議尋議八旗按滿洲䝉古漢軍旗分設立二十四局通州按左右二翼設立二局京師每局給銀五千兩通州每局給銀八千兩其八旗之二十四局於各旗官房內揀用本旗若無官房就近揀用其通州米局於倉附近處擇內務府官房二所應用八旗米局每局選賢能官二員領催四名令其辦理通州二局每翼委官四員領催八名辦理各局應用寫算之人於兵丁內派委量米之人於旗人內雇用通州每翼挨旗各承查一年設立米局以後禁止在他處私行糶賣每旗各派參領一員令其稽查違禁治罪或被旁人拿獲將稽查之參領及都統等一併議處其管米局之官員等如有作弊侵漁之處令該管大臣等嚴查治罪若果生息有方於應升處列名或該旗大臣等怠玩不以為事致有虧折者將所折銀兩著落派出之員賠補有不能完納者著該管大臣賠補俟至一年將用過銀兩及所得利銀數目算明具奏得㫖如議行又截留浙江漕糧運赴閩省平糶七年定閩省採運米石之例閩省臺屬各縣倉儲向例每年撥粟十萬石碾米五萬石運往泉漳二府平糶至是總督髙其倬言臺屬粟石止可存備全臺并厦門金門等處兵糧請將官莊現存粟四萬九千餘石價銀七萬三千四百餘兩內抽撥採買運到泉漳二府永為定例從之又定潮州城守各營貯穀之法議定廣東潮州城守三營買穀三千石分貯於青黃不接之時借給俟散餉時照數扣除概免加息令各營將備經管倘有侵那缺少照正項錢糧例追賠治罪又頒發社倉諭㫖令陜西督撫勒石宣布先是陜西總督嶽鍾琪遵㫖設立社倉於雍正四五兩年耗羡銀內撥發各州縣十四萬五千八百餘石採買穀麥每社一千石蓋倉收貯以資借放令署督查郎阿巡撫武格按鄉分社公舉倉正倉副經管至是嶽鍾琪言陜西大僚皆不知臣原奉恩諭之由每遇州縣請領社倉銀兩過於慎重戒諭甚嚴州縣亦懷貽纍之憂又畏積貯虧空嚴例處分將所領銀兩不肯交與倉正倉副仍勒令里甲押運又有令胥役家人幕客收放者始而勒買繼而勒借陜省百姓竟呼此項穀麥為皇糧其所以然者祇以因民所利之明詔未頒是以在官在民之界限不定伏祈特頒社倉諭㫖交督撫恭録鐫石每一倉頒發一本張掛曉諭臣又謹擬社倉條約十六事亦請發各社倉使鄉愚共曉則每年收放皆有程式庶可久而弗替上可其奏特諭曰朕惟國家建立社倉原令民間自行積貯以百姓之資糧濟百姓之緩急其春貸秋償及滋生羡息各社自為經管登記地方有司但有稽查之責不得侵其出納之權此社倉之古法也是以各省有請立社倉者朕皆令其聽從民便無得强勒捐輸繩以官法以致便民之舉轉為民纍所以曉諭各省督撫者不啻至再至三矣從前嶽鍾琪在京時請於通省加二火耗內應行裁減每兩五分之數且暫行徵收發與民間採買穀石分貯社倉俟採買數足即行裁減是以暫收耗羡之中隱寓勸輸之法實則應行酌減之耗羡即小民切己之資財而代民買貯之倉糧即小民自捐之積貯此藏富於民之良法最為切實而易行是以俞允所請令其辦理乃陜省官員不知此項穀石本係民資又未識從前嶽鍾琪奏請之由以為收貯在官即是公物不肯付民經管而胥吏司其出納者遂有勒買勒借之弊殊非數年以來朕之周資詳畫多方生養斯民本意矣今特降諭㫖將朕允從嶽鍾琪之請并嶽鍾琪陳奏原委明白曉示著署督查郎阿巡撫武格刋石頒布俾各州縣鄉社小民咸知朝廷經管設法之蓋藏實百姓自為斂散之資用倘地方官有於社倉穀石創議交官不交百姓或指稱原係公項預為公事侵那之地者俱以擾撓國政貽誤民生論從重治罪其嶽鍾琪所擬社倉條約著户部抄録交與該督撫分發各州縣刋刻木榜於各鄉社倉竪立以為永久程式又以右翼四旗通州米局生息定三年查核例署正黃旗都統覺羅伊里布等言右翼四旗通州米局領户部銀八千兩斟酌足用自雍正六年三月起至本年三月共生息銀四百餘兩請將此銀仍留在右翼通州米局內買米生息得㫖米局之事著三年查奏一次又奉諭㫖常平積貯必須倉厫堅固始可為經久之計聞各省中偏僻之邑竟有向來本無倉厫或寄頓寺廟或借放紳士富户之家而黴爛虧折生事滋擾之弊多由此起大非朕慎重民儲之意凡各省未有倉厫之州縣著該督撫即行建造又申明社倉借給貧民穀石之例從監察御史晏斯盛請也凡遇荒歉貧民借領倉穀者每石止收息穀十升遇小歉免取其息仍如本數還倉諭奉天有司勸諭百姓積貯將軍多索禮奏報奉天秋成大稔奉諭㫖奉天地氣乾燥不比南方潮濕之區正當乘此豐收之時以為儲蓄之計著該地方通行曉諭勸導若有穀之家果能留心積貯至於穀多價賤難於出糶者著即奏聞朕當發官價糴買或從海道運至京師俾積穀之家實獲利益必不使有穀賤傷農之歎也又令安西地方動支官銀糴買盈餘穀石署川陜總督查郎阿言招往安西沙州等處屯墾民户所種小麥青稞粟穀􅐘子等項計下種一斗收至一石三四斗不等其餘各色種植亦皆豐厚臣恐口內奸販囤户聞糧多價賤興販射利已令總兵道員嚴行查禁並傳諭民户按一年所需扣存外其餘即在本處糶賣以濟兵丁商民口食得㫖民户盈餘之穀原期糶價以為日用之資若本地糴穀者少則出糶未免艱難不可不為計及著該地方官酌量本地情形不必相强若有將盈餘之穀情願出糶者著動支官銀照時價糴買存貯公所明年倘有需用聽辦理軍餉之大臣及該督撫行文支撥安西現有備用銀即可動用採買再於西安藩庫撥補還項此朕體恤民户俾糶穀得價用度豐裕之至意著地方官善於奉行不可勒令糶賣生事滋擾又增定浙江購米分貯之數浙江總督李衛言足食所以養民有備始能無患近因部臣勵廷儀奏請將米多倉少之處糶出餘銀批發倉多米少之州縣一例買穀存倉此亦酌盈劑虛之善策但止就倉厫之多少以為米穀之去留設遇人口繁多産米稀少又係水陸適中轉輸便易之州縣而因其倉少遂將倉外餘米盡行發糶則有不足之虞若地處偏僻需米無多以倉有空閒必欲購買貯足亦恐徒滋紅朽臣愚以為倉多倉少之處止可計米以定厫未可就厫以定米也即如浙省溫處各屬舊存穀石有一二萬三四萬不等嘉湖寧紹等處少者四五千多亦不過七八千惟省城旗營駐防更為緊要永濟倉捐納補漕案內應購米四十四萬餘石除分貯金衢嚴三府及備借兵米外餘悉貯本倉今酌定應貯穀四十萬石抵米二十萬石其餘共應買穀四十八萬餘石於通省中按縣分大小水陸衝僻或僅為本地之儲積或可備鄰境之轉輸酌定數目除原存外少者添撥每年存七糶三秋成補還則存倉之成色必髙而積久之折耗可減於貯備似為有益事下所司議行議定山東貯穀額數議准山東各府並附郭首縣貯穀二萬石大州萬八千石中州大縣萬六千石中縣萬四千石小縣萬二千石大衛萬石中衛五千石小衛二千五百石大所三千石以此定額其地要民稠或積窪易潦者酌加二三千石如有闕額動帑買補八年准淮商領運湖南倉穀仍令商人即於湖南需米處糶賣先是六年湖南布政使趙成言湖南現貯倉穀六十餘萬石之多又有收捐穀石本省可云有備但地勢卑濕請分撥别省令來楚運往以免黴變下户部議應行文江浙督撫令其詳酌如有應需穀石之處即委員轉運得㫖俞允兩淮巡鹽御史噶爾泰言據兩淮商人黃光德等具呈情願出資將湖南積穀三十餘萬石照依原買之價交納湖南藩庫領運隨地隨時售賣仍將所售價銀交納運庫從之至是湖南總督邁柱言今年湖南嶽常二府微缺雨澤正在動用公項銀一萬兩買米備糶而貯倉之現穀與其照原價以給商不若留俟來年春夏照原價平糶以濟本地之民似應飭商暫停領賣俟明年無需用之處仍聽該商領運奉諭㫖向因湖南撫藩皆言地方積穀甚多難以久貯奏請分撥别省以免黴變是以兩淮商人有赴楚領運效力急公之請今商人既已交價而邁柱又稱楚南需米請飭商暫停領賣是湖廣督撫藩司前後自相矛盾也湖南現貯穀六十餘萬石之多欲分撥别省以免黴變則本省府縣有需米之處正可將此奏聞平糶以濟民食而邁柱乃云正在動用公項銀一萬兩買米備糶是邁柱之奏又自相矛盾也且邁柱又稱此時飭商停運俟楚省不需米穀之時仍聽該商領運是米貴之時則令商人停運而米賤之時則令商人領賣亦甚非情理之平查從前噶爾泰代衆商具奏原有隨時隨地售賣之語今江浙俱獲豐收米價甚賤湖南既有需米之州縣著該商仍照前議領米即於湖南需米之處照時價糶賣不許地方官抑勒商人亦不許商人髙擡價值倘商人獲有餘利聽其自取不許交官如此則淮商領米得以貿易而楚省積穀仍得流通於商民均有裨益湖廣督撫等即遵諭行又令奉天近海州縣運米二十萬石至山東平糶又令東省竈穀交附近倉厫存貯東省十埸二縣存貯竈穀八千三百石零舊無倉厫收貯又從無動用之處至是議令歸併附近倉厫存貯其有相隔州縣稍逺者於明春青黃不接時減價糶賣所賣銀兩俟秋成後照數買交附近州縣倉厫收貯遇有應行賑恤之處同民户一體賑恤又諭户部今年江南河東等省間有被水州縣已降㫖發粟蠲租加意撫恤猶恐明春青黃不接之時不無借資鄰省湖南湖北二省向來積穀甚多今年又復豐收穀價大減民間出糶維艱朕特思酌盈劑虛之道著將從前商捐及耗羡銀存貯藩庫者動支五萬兩遴員分往所屬豐收價平之處糴買新穀暫行收貯俟鄰省需米平糶即令委員來楚照原價先儘倉貯之穀交買運回以濟民食仍將新穀補倉價銀還項如此則鄰省無貴糴之虞而楚省又得出陳之益事屬兩便又添設五城通州米厰內閣奉諭今年直𨽻近河地方雖有被水一二處其餘州縣俱各十分收穫何以米價昻貴著大學士詢問九卿並將如何使米石價平之處詳議具奏尋議目今米價較春間俱屬浮貴五城各厰買米人多每至擁擠請於每城暨通州各添一厰將成色米石廣為減糶至城內八旗及通州左右兩翼米局係收買之好米請照春間市價量加五六分如從前價值稍浮照現議價值發賣並行令步軍統領順天府嚴查窩囤之弊其各處賣米之錢請照户部從前所奏於每月兵餉內量加支放俾錢米價俱疏通至於成色米石價值既賤尤便民間應隨時發糶不必拘定米數俟價平應停之時户部再行奏聞從之九年以山東水患發米二十萬石平糶又發倉米五萬石於五城平糶禁八旗米局糶賣增價從大學士馬爾賽等議也又撥運浙江米穀至淮北山東平糶先是八年夏秋之交淮北山東接壤州縣被水至是以浙省永濟鹽義二倉及附近水次州縣穀石運至該處平糶從浙江總督李衛請也又撥天津奉天等處粟米并截留江西湖廣漕米至山東分貯東省被水州縣賑濟所用之穀令於通省現存新收粟米撥十五萬石再簡科道官二人動支帑銀往天津等處率地方官買粟五萬石運至山東令於德州常豐臨清等倉收貯再於奉天撥粟二十萬石由海運至天津再雇民船運至德州交與山東地方官運送其東昌以下之近水州縣將江西湖廣漕運截留三十萬石令該撫分撥存貯又令直𨽻各屬發存倉米穀平糶上年直屬夏秋間有被水州縣業經議准無論成灾不成灾俱發存倉米穀減價平糶米價漸平而未被水各州縣尚不無米貴之處至是復令將各屬存倉米穀多者糶三留七少者糶五留五有更少者則於鄰邑酌撥以均平糶又定湖南常平倉採買盤查處分湖南各屬常平倉雍正五年存七糶三者三十八州縣盡數減糶者二十五州縣嵗終冊報買補者僅有其半并無府結到司巡撫王國棟言嗣後請將平糶價銀解府州貯庫秋間具領買補倘遇穀賤領價贏餘令其盡數買貯若秋歉穀貴買補之價浮於減糶之價州縣不能賠墊亦令報明具題酌給現今委員遞盤如果顆粒無虧具結詳報倘有缺少虧那或折價抵穀及將行户領狀混行掩飾者立即揭參仍令解任賠補至該管道府亦定限於十月內盤明加結詳司年終據實總冊彚送逾十月不行詳揭者即照徇庇例參處分賠疏下戶部議行又令江蘇各屬增貯倉糧江蘇所屬十三府州地廣人稠需用米穀甚多而備貯倉糧視浙江河東等省獨少至是議令照雍正五年所定數大縣一萬五千石中縣一萬石小縣八千石穀則倍之凡遇青黃不接之際酌量糶賣不必拘定存七糶三仍令秋成領買還倉至江蘇常鎮四府户口尤多令於水路衝要之地另建府倉各貯五萬石以備轉運又以川省積貯數少議增貯至百萬石先是四川總督黃廷桂等言川省存貯米穀通計止四十二萬石請將川省常平倉捐例改穀作銀隨時糴買并酌開事例買穀存貯得㫖川省乃産米之鄉積貯易於為力該督撫請開捐納誤矣況改穀折銀又復將銀買米徒滋弊端但通省積穀止四十萬石為數實少應如何增貯著大學士等詳議於是議除現存米穀外再買貯六十萬石有百萬之蓄度足備用請分作三年約計每年買穀二十萬石每石約價三錢需銀六萬兩於䕫關及鹽茶贏餘銀內動支至各府州縣應分貯若干等事宜令該督撫分别詳定得㫖依議速行但每年穀價貴賤不等如畫定三錢恐價貴時或至抑勒强買價賤時不免侵漁冒銷著再議尋議如遇價賤不及三錢即可過於二十萬石之數或價值甚賤應量加銀兩及時採買倘不止三錢亦可不及二十萬石之數或價值甚貴應停止採買以待來嵗秋成總於三年內通融籌畫買足六十萬石之數從之又議定廣東瓊州等鎮協積貯之數以廣東瓊州鎮瓊協龍門協香山協虎門協廣海寨僻處海外應預籌積貯議定買穀一萬六百石分貯各鎮協營遇青黃不接之時借給兵丁秋收照數買補槩免加息十年令甘凉肅三州改捐米石以備積貯大學士鄂爾泰等言甘凉肅為軍需彚齊之地倉儲緊要請將現行捐納欵項改折本色糧石得㫖依議邊地改折米石於軍需誠為有益但在本地採買恐價值騰貴轉於軍民未便除甘涼肅本地民人准即以所有糧石交納外其他處捐納人等俱應在别處運交不得於甘涼肅採買著署督劉於義等通飭曉諭并稽查禁止又定江蘇崇明縣倉積貯崇明孤懸海外地不産米議准於積貯項內撥米一萬石收貯縣倉十一年飭川省開米禁先是雍正九年巡撫憲德以川省米價稍昻又復碾辦軍糈奏請暫禁商販至十年川省收成豐稔米價平減仍照前禁止未開至是奉特㫖申飭令憲德速弛其禁毋蹈遏糴之戒又奉諭㫖前據顧琮等奏請順天天津等七府五州酌量領運北倉米石以備平糶并將所存倉穀存七糶三以濟民食朕已允行今思目下正當青黃不接之時糧價漸昻各處皆有常平倉穀其存貯萬石以外者准存七糶三萬石以內者於糶三之外酌量加增存貯甚少者或添運北倉漕米或撥領鄰近倉儲務令各處米價得平小民易於糴買又令浙江動支公項於湖廣等省採買米穀先是十年浙省秋成歉薄倉穀不敷接濟議令動支鹽庫銀五萬兩委員分往産米地方採買以資平糶至是總督程元章以杭城五方雜處撥濟仍艱再請動鹽費備公銀五萬兩照例增置從之復議定每年令該督酌定米數於秋收時動項赴湖廣等省採買分貯省城永濟倉及杭嘉湖所屬州縣以備歉嵗平糶之用又令福建分地採買并將臺灣社穀撥運分貯閩省地處山海田産無多雍正五年截留浙漕十萬石併採買米穀共二萬九千餘石節次糶賣存價六萬餘兩至是總督郝玉麟請分地採買以廣倉儲尋議定以一萬兩於楚省買運并將臺灣鳳山縣八社積穀酌撥十萬石赴福興漳泉四府分貯來嵗將平糶銀發交臺屬秋成採買還倉又令直𨽻喜峰口建倉存貯穀石議定喜峰口為蒙古往來之路糧石不可不備令於永平府屬量撥穀八千石運送喜峰口建倉存貯添設巡檢一員以専責成又令直𨽻各屬添建倉厫撥穀分貯順天等十府冀趙等五州現存各項并應買還本色共穀二百一十五萬餘石酌量大中小治勻撥備貯仍令動項添建倉厫又議定江蘇各屬添貯倉穀六十餘萬石動用司庫酌留并捐項銀三十餘萬兩購買存貯又定廣東買補倉穀之例議准廣東每年糶三倉穀自九月以後數在四千石以下者定限兩月內買補足數四千石以上者三月內買補足數九月以前有能先買者聽便又奉諭㫖各省州縣設立社倉原以便民濟用聞直𨽻百姓借領社穀必待督臣咨請部示而後准行往返動經數月小民守候維艱仍不免重利告貸之苦著該督李衛變通辦理咨報存案嗣後遵照施行又令貴州古州都江建倉積貯時黔省新闢苗疆安設重鎮議令於廣西潯州沿河等倉撥穀五萬石分運古州都江古州建倉六十間貯穀三萬石都江建倉四十間貯穀二萬石以資平糶又設四川潘州等營倉並定貯米之數四川潘州達建寺二處新設官兵議於潘州協標貯米三千石達建寺營貯米五百石交營員收管以資兵丁借支平糶之用又議令新設苗疆河西七兒堡建造倉厫貯米二千石交與該同知㑹同營員收管十二年令福建厦門買貯穀石福建水師提督王郡言厦門一島地少人多兵民食米應為籌畫查提督衙門有營房魚池等租銀每年可得五百餘兩請買貯穀石從之又以江蘇地方雨水稍多命將乙卯年漕糧於被水州縣截留平糶十三年准陜西買麥豆備貯陜西巡撫史貽直言陜西倉穀雖統計百餘萬石數年以來運濟軍需已動過西鳳數府州穀六十七萬石現在存貯有限是以節次動項採買貯穀三十四萬二千餘石尚少穀二十餘萬石應俟秋成買補但穀價之低昻難以預料况從前未還及今春借糶之穀均須秋後還倉為數既多一時未易採買現今麥價平賤應乘時動支五萬石價銀買麥存貯俟明春出借仍照一麥二穀之例易穀還倉再陜西豌豆連嵗薄收而軍需孔亟貴買則糜費國帑核減則苦纍小民不若及時買備庶為善策今嵗豌豆豐登價值平減亦應動支五萬石價銀買豆貯倉以備撥濟從之又議行平糶倉穀三事內閣學士方苞條奏一倉穀每年存七糶三設遇穀價昻貴必待申詳定價示期窮民一時不得邀惠請令各州縣酌定官價一面開糶一面詳報俾民均沾實惠一江淮以南地氣卑濕若通行存七糶三恐積至數年必有數百萬黴爛之穀有司懼罪往往以既壞之穀抑派鄉户强授富民請飭南省各督撫驗察存倉穀色因地分年酌定存糶分數其河北五省倘遇嵗歉亦不拘三七之例隨時定數發糶秋收如數買補一穀之存倉則有鼠耗盤量則有折減移動則有腳價糶糴守局則有人工食用春糶之價即稍有贏餘亦僅足充諸費請飭監司郡守嵗終稽查但穀數不虧不得借端要挾倘逢秋糴價賤除諸費外果有贏餘詳明上司别貯一倉以備歉嵗賑濟之用俱從之又令直𨽻買麥收貯時直𨽻二麥豐收准於司庫存公銀內給清河道二萬兩天津道萬兩大名道三萬兩霸昌道萬兩河間府二萬兩分發各屬於麥多價平之州縣盡數採買收存本倉每年易穀積貯又酌定奉天州縣米石採買糶賣之例所存黑豆亦如之以錦縣寧逺州户口殷繁且係沿海地方每可接濟鄰省議令各貯米十萬石蓋平復州海城等處濱海潮濕難以久貯各存米四萬石金州現存米六千餘石無庸議增其不沿海之承德鐵嶺開原三縣各存米四萬石遼陽州廣寧縣各存米五萬石亦無庸多貯以滋潮浥永吉州現存倉穀一萬石仍令照舊收貯義州新設每年徵收地米陸續蓋倉俟有成數再議存留長寧縣雖地僻民稀未便並無積貯酌令建倉貯穀五千石以上凡現存米石不足議存之數飭令買補易換一并貯倉有逾額者悉行糶賣將價銀解部充餉至黑豆一項供應驛站外所需無多除向無貯豆之永吉長寧復州寧海無庸議外餘錦寧等九州縣量為存留三千石二千石不等盈餘不足者亦照米石例辦理又定雲南社倉之法雲南設立社倉道計一省所捐穀麥七萬餘石其中千石以上者僅二十餘處此外皆數百石數十石亦有全無社穀者至是議准雲南各屬皆有常平倉及官莊等穀存貯尚多可酌量暫撥以作社本將社倉存貯未及千石者按地方之大小計存貯之多寡於該處常平官莊等穀內動撥五百石或八百石作為社本令社長一併經管出借窮民秋成加一還倉小歉免其取息歸於社倉項下積貯俟積有千石仍將原動常平等穀歸還原欵皇朝文獻通考卷三十五
