body:
  text: 欽定四庫全書皇朝文獻通考卷二百九十四四裔考二東朝鮮二康熙元年正月棩遣陪臣栁慶昌等進世祖章皇帝上尊諡表文是年命朝鮮表賀冬至萬夀節及進嵗貢與朝正之使偕行九月棩遣陪臣鄭太和等表賀平故明王朱由榔二年五月棩遣陪臣鄭維城等進賀尊上昭聖太皇太后仁憲皇太后慈和皇太后徽號表文七月棩遣陪臣李侯等進孝康皇后香三年三月棩遣陪臣洪命夏等表謝頒給誥命五年三月棩遣陪臣沈益顯等表賀大婚禮成尊上太皇太后皇太后徽號七年正月棩遣陪臣鄭致和等表賀上親政表文八月棩遣陪臣李楨等表賀世祖章皇帝配享天地太皇太后皇太后加上徽號并謝頒賜恩表文十年正月棩遣陪臣李柟等表賀孝康章皇后升祔太廟十一年正月棩遣陪臣鄭致和等進嵗貢物與例不符失恭敬意下禮部議應令該國王自行回奏得旨該王既將彼國困苦情形預為咨明從寬免令回奏十三年九月棩遣陪臣閔點上仁孝皇后香十二月朝鮮國王李棩薨王嗣焞以訃告並貢方物得旨朝鮮國王棩恪守藩封忠慎夙著遽爾薨逝朕心深為軫惻應得恩恤察例議奏所進禮物俱令使臣帶回示朕軫念之意十四年正月諭禮部李棩襲封以來殫竭忠忱克盡藩屏之職可從優給與恤典於常例外加祭一次尋遣內大臣夀西特侍衛桑厄恩克往朝鮮諭祭賜諡莊恪封王嗣李焞為朝鮮國王妻金氏為王妃制曰鴻圖無外敷聲教於海邦寵命維新溥懷柔於東土奕世篤忠貞之美職貢勤修纍朝嘉恭順之誠彛章洊錫當纘服之伊始宜綸綍之重申爾朝鮮國王嗣子李焞器識淵深躬行純茂夙擅岐嶷之譽克紹家聲式遵禮義之風丕承前烈念此象賢之胄爰隆賜爵之文兹特封爾為朝鮮國王屏翰東藩虔共正朔綏安爾宇承夾輔于皇家精白乃心用對揚於天室欽哉勿替朕命八月焞遣陪臣李佖等奉表謝附貢方物却之十五年十一月焞奏言陪臣使還購買前明十六朝紀一書中載本國癸亥年廢光海君李琿立莊穆王李倧事誣以篡逆今聞新命纂修明史特遣陪臣福善君李柟等陳奏始末伏乞刪改以昭信史禮部議不準行其違禁購買史書之處請遣官往訊得旨令焞自行議處具奏十六年五月焞以閩粵蕩平遣陪臣福善君李柟等表賀十七年五月焞遣使上孝昭皇后香十八年正月焞遣陪臣李㮒等進嵗貢㮒等失火燬所貢布匹禮部議交國王察議布匹補進免之十月焞遣陪臣李侃等表謝免議恩附貢方物却之二十年正月王妃金氏故遣官致祭二十一年五月遣內閣學士阿蘭泰册封焞繼室閔氏為王妃九月焞遣陪臣李佖表賀上兩宫徽號并謝頒恩詔二十四年正月朝鮮民人聶那密毁壞邊牆私行入境旋為邉吏執獲訊係瘋病事聞上命付朝正貢使擕歸仍諭焞善為收養五月焞表謝東巡頒恩詔六月焞奏言國內牛多疫死民失耕種請暫停互市禮部議焞託言妄奏不合應令回奏到日再議上曰撫馭外國之道不可太嚴亦不可太寬倘如所請後此恐生玩忽因令禮部另議議上焞應罰銀萬兩得旨外藩小國姑宥一次仍令照常貿易二十五年二月朝鮮民韓得完等二十八人違禁越江採參擅放鳥鎗傷奉差繪畫輿圖官役遣護軍統領佟寶往朝鮮會同國王焞審擬韓得完等二十八人俱擬立斬約束不嚴之咸鏡道節度使尹時達等降革有差國王焞罰銀二萬兩得旨韓得完等為首六人立斬餘二十二人從寬免死減等發落四月朝鮮陪臣鄭載嵩等具呈禮部為焞申辨部議應拏交該國王從重治罪得旨寬免焞疏言臣忝守外藩奉職無狀邊民冒禁採參已罪不容誅况鎗傷官役致煩遣官降敕臣惶恐震越無地自容九月又疏言鄭載嵩等飾詞巧辨恩免嚴拿令臣自行處分今已將載嵩等禠職依律定罪得旨免其革職發配各降四級調用尋復遣使謝罪附貢方物得旨朝鮮國王因謝罪進貢理宜不收但恐發還則人役勞苦且驛遞騷擾可準作年貢嗣後謝罪貢物著停止二十七年四月焞遣陪臣洪萬鐘等進大行太皇太后香十二月焞以曾祖母趙氏之喪告遣官致祭二十八年十二月焞遣陪臣朴泰尚等進孝懿皇后香二十九年八月焞以違例請封側室不識避諱奏請嚴加處分得旨寬免尋遣陪臣李濬等進孝懿皇后册諡禮成貢物三十年七月禮部題朝鮮國貢使違禁私買一統志書內通官張燦應革職發邊界充軍正使李沈副使徐文重等失於覺察應革職得旨李沈徐文重從寬免革職三十二年正月奉旨朝鮮國克殫恭順頃復輸應軍需進鳥鎗三千桿忠順可嘉嗣後年貢內黃金百兩及藍青紅木棉永著停止八月焞遣陪臣李恆表謝免貢恩三十六年七月焞遣陪臣崔錫鼎表賀蕩平朔漠是月封焞子李昀為世子十一月焞疏言請於中江貿易米糧部議不準行得旨朕撫馭天下內外視同一體朝鮮盡職奉貢克效敬慎今聞連嵗荒歉百姓艱食朕心深為憫惻現今盛京積貯甚多著照該國王所請於中江地方貿易三十七年正月遣侍郎陶岱運米三萬石往朝鮮以一萬石賑濟以二萬石平糶七月焞奏謝運米賑濟恩御製海運賑濟朝鮮記曰朕聞救災拯患王政所亟是以夙夜求莫雖在遐荒絶域猶若痌瘝乃身矧屬在藩服茍有疾苦何忍一日置也康熙三十六年冬朝鮮國王李焞奏比嵗薦飢廩庾告匱公私困窮八路流殍相屬於道籲懇中江開市貿榖以蘇溝瘠俾無殄國祀朕深為惻然立允其請遂於次年二月命部臣往天津截留河南漕米用商船出大沽海口至山東登州更用雞頭船撥運引路又分發帑金廣給運值緩征鹽課以鼓勵商人將盛京所存海運米平價貿易共水陸運米三萬石內加賚者一萬石朝鮮舉國臣庶方藜藿不飽獲此太倉玉粒如坁如京人賜之食莫不忭舞欣悅凋瘵盡起後王具表陳謝感激殊恩備言民命續於既絶邦祚延於垂亡蓋轉運之速賑貸之周亦古所未有也朕念朝鮮自皇祖撫定以來奠其社稷綏其疆宇俾世守東藩奉職修貢恩至渥矣兹者告飢不憚轉輸數千里之勞不惜糜費數萬石之粟環國土而户給之非獨一時救災拯患實所以普澤藩封而光昭先德也是烏可以無紀十月焞遣陪臣徐文重等以許布米榖貢方物却之三十九年正月焞遣使表謝發回漂入琉球船隻恩附貢方物得旨朝鮮民人薩瓦等漂入琉球朕一體軫恤令還本國貢物不必收嗣後有若此例者停其進貢四十年十二月王妃閔氏故遣官致祭四十一年遣員外郎鄧德監收中江稅以四千兩為額四十二年二月遣翰林院掌院學士揆敘一等侍衛噶爾圖往封焞繼室金氏為王妃四十三年四月焞奏其國人越界殺傷內地人民請遣大臣往勘上曰李焞敬慎素著不必復遣大臣往勘可即令王審擬具奏焞尋奏請將越界殺人之金禮進等立斬該管人員禠職流徒上以該管官員內有當減宥者下部議尋禮部議上得旨朝鮮越界殺人法不可宥金禮進等立斬其該管官員李有白等俱免罪朴錫昌等革職免流徙十二月焞遣官咨送被風漂失之王富王秋等商船歸內地降諭褒之四十五年十月諭大學士等曰觀朝鮮國王凡事極其敬慎其國人亦皆感戴聞其國有八道北道與瓦爾喀地方土門江接界東道接倭子國西道接我鳳凰城南接海猶有數小島太宗文皇帝定朝鮮之役我兵無處不到以已破之國我朝為之重加營建俾安堵如故其國人於太宗文皇帝駐軍之地樹立石碑備書更生之德纍世感戴以至於今且彼更有可取者明之末年彼始終未嘗叛之猶為重禮義之邦也四十九年五月朝鮮商人髙道弼等被風壞船漂至海州獲救江蘇巡撫張伯行疏請候朝鮮使來帶回本國得旨若候朝鮮使來為日遲久其令朝鮮通事一人將髙道弼等由部給文馳驛歸國五十年正月焞疏報其國人李萬枝等越界殺人劫財上以此事未經該將軍等舉報或係逃往採參之徒特遣司員長泰等往並令朝鮮亦遣官會同確訊九月長泰等奏言李萬枝等誘至中國人二名致死投之江中掠取人參等物屬實得旨交該國王治罪完結聞此案犯內有親弟兄三人者定例弟兄俱擬正法存留一人養親可移會該國王於此親兄弟三人中照例一人留養十月諭禮部朝鮮國王李焞自襲爵以來慎守封圻嵗時貢獻四十餘年未嘗少懈其國中事稍有關係者必奏明仰請定奪於奉差人員小心敬禮且撫恤愛養所屬朕用是深為嘉美既嘗曲示恩誼彼地飢饉又自海洋運米賑濟舉國至今感戴朝鮮貢物朕屢次裁減以至甚輕但國小地隘其年例貢物內有白金一千兩紅豹皮一百四十二張猶恐艱於備辦嗣後將此二項永停貢獻又聞朝鮮國使沿途館舍傾圯難於止宿厯年進貢奏事人員甚為勞瘁可令地方官修葺完固用副朕加惠逺人至意五十一年五月焞奏謝減年貢恩附貢方物得旨謝恩禮物準作冬至元旦貢物八月焞奏請嚴禁往彼國境內海洋捕魚船隻得旨邇來浙省海洋賊冦潛行劫奪官兵被傷至附近朝鮮捕魚船隻曾經申飭盛京將軍及沿海地方官嚴加巡緝今尚違禁潛出是即賊寇也嗣後有此等捕魚船隻潛至朝鮮海面者許本國即行剿捕如有生擒作速解送毋因內地之人致有遲疑五十六年九月焞以目疾來求空青遣翰林院侍讀學士阿克敦鑾儀衛治儀正張廷枚以空青往諭阿克敦等曰朝鮮王李焞安靜奉法人民愛戴四十餘年彼國中享太平之福未有如此久者朕甚嘉之今聞焞疾深為軫念特簡爾等齎空青往賜此係格外之恩凡一應禮節爾等到時令王不必拘於成例隨時可以相見傳諭知之五十七年三月焞遣陪臣朴弼成等表謝賜空青恩附進方物得旨所進儀物留作下次正貢自是凡朝鮮奏謝附貢方物俱準作正貢不備書五十九年十月朝鮮國王李焞薨世子昀以訃告得旨朝鮮王焞襲封五十載自來伊國未有如此厯爵年久者且奉藩敬謹極盡誠欵防禦邉疆克享太平舉國感戴忽聞溘逝朕心不勝痛惻除遣大臣往唁外所貢禮物令使臣帶回以示軫念之意仍下部議以應得恤典賜之十一月遣散秩大臣查克亶禮部右侍郎羅瞻賜祭及故王李焞諡僖順兼册封世子李昀為朝鮮國王繼妻魚氏為王妃及妃誥命文綺等六十一年二月昀疏言臣不幸自幼多病氣甚痿弱嗣續絶望臣弟延成君李昑聰明孝友年又長成臣既無子請錫昑以世弟之號以續宗祧得旨允行四月遣內閣學士阿克敦二等侍衛佛倫為正副使往封昑為朝鮮國王世弟諭王昀曰朕惟父子相傳有國之常經兄弟繼及一時之權道王以嗣續為艱請封親弟情嗣懇至特遣大臣齎捧誥命封昑為朝鮮國王世弟並賜文綺等物惟王朂弟昑敦乃彛倫永懷忠順衍本支之休慶保宗社之安寧王如兆叶禖祥吉占熊夢王其再奏欽哉無替朕命十二月山東漁户楊三等十四人遭風漂入朝鮮審無信票送回內地得旨嗣後漂風船隻人口驗有票文未生事者照舊送回如無票文復生事犯法者令照其國法處治禮部尋議令國王於審擬後咨部具題俟命行文完結仍報部存案報可雍正元年正月昀表謝封其弟昑為世弟恩先是朝鮮國議政金昌集中樞李頥命左議政李健命判中樞趙泰來等謀逆事發伏誅昀疏以聞七月諭禮部朝鮮自歸順我朝以來在太宗文皇帝世祖章皇帝聖祖仁皇帝時屢沛恩施減免貢物今所貢方物尚多爾部可會同內務府再議減免以抒其力尋議減布八百匹獺皮百張青黍皮三百張紙二千卷從之昀遣陪臣李樴等奉表賀上登極賜昀縀匹諸物加賜周易折衷朱子全書各一部及松花石硯琺琅器皿筆墨等物上召見樴諭之曰爾朝鮮國王於我太宗文皇帝時誠心豫附我太宗文皇帝世祖章皇帝視同一家爾國王祖父亦能仰承厚澤百年於兹我聖祖仁皇帝念爾國君李焞幼纘嗣服克紹前猷權不下移惠能撫衆數十年來職貢匪懈用是寵眷有加賚豫便蕃貢物頻減病則賜以珍藥殁則錫以榮名特遣近臣優頒奠弔今朕纘承大統爾嗣王李昀遣爾表賀朕嘉爾嗣王忱悃肫篤又念爾係嗣王宗族特行召見以示優禮爾歸告爾嗣王繼乃祖父之緒夙夜黽勉慎守綱維朕必體列聖怙冒宏仁俾爾逺藩保安全於永久爾其識之昀又遣陪臣李昉等進聖祖仁皇帝香二年二月昀遣陪臣李橈等謝頒賜及減貢恩附貢方物得旨仍準作正貢五月昀遣陪臣李檀等賀上孝恭仁皇后尊諡十一月諭怡親王允祥外藩來朝給以廩食及歸頒賞俱有定制但該管官員未免忽略朝鮮守職恪順百年有餘一切應賞諸物擇其佳者給與務使得沾實惠嗣後朝使所給食物歸時所頒賞賜爾會同禮部辦理或有應行加賞之處酌議以聞十二月朝鮮國王李昀薨世弟李昑以訃告得旨朝鮮國王李昀謹守藩封竭誠盡敬恭順事上慈愛撫民忽聞溘逝朕心不勝軫惻應得恤典察議以賜尋遣散秩大臣覺羅舒魯翰林院學士阿克敦諭祭故王李昀諡恪恭兼封昀世弟李昑為朝鮮國王妻徐氏為王妃敕諭曰爾兄王昀薨逝朕心惻然據僖順王妃金氏奏稱爾聰明孝友寬宏仁恕夙有長人之德為國人所願戴請册承襲朕俯順輿請特允所請遣官齎詔誕告爾國封爾為朝鮮國王繼理國政封爾妻徐氏為國王妃佐理內治并賜爾及妃誥命彩幣等物爾宜永矢靖共懋纘承於侯服迪宣忠順作屏翰於天家爾其欽哉毋替朕命三年七月昑遣陪臣李楫等表謝賜祭諡並襲封又疏請封副室所生子李緈為世子部議王年方壯遽請封其副室子與例不符得旨建儲大事王必萬不得已始懇切具奏可如所請行八月遣官封昑子緈為世子四年五月昑遣陪臣李橈表謝封世子五年正月昑疏請更正先世臣倧誣逆事部議昑四代祖倧故明天啓三年請封明十六朝紀以篡奪書實屬寃誣應如所請更正俟明史告成後以朝鮮列傳頒示其國從之二月昑遣使表謝改正先臣被誣事先是商人胡嘉佩虧帑以朝鮮國民所負銀六萬兩呈抵令赴中江質明辦理部臣以昑咨文支飾請按數追償得旨朕思當日朝鮮故王李焞才幹優長政令嚴肅深蒙聖祖仁皇帝眷注嘉奬焞曾將其國欠負之人正法想見辦事之公明向聞李昑柔懦無能今觀此舉推托牽強必其陪臣所為似此清釐積欠之事王既不能辦理若以委之非朕柔逺之意此案不必質對其應還之銀從寬免追此朕加恩於外藩並非疏法於內地也再者昔年聖祖仁皇帝頒諭朝鮮國王有盜賊前往劫掠即追拏處治解送朕即位以來又降諭旨若飄風船隻內有無票妄行生事者王即照其國律例治罪今內地竊盜之輩潛逃外國王既列藩封當為朝廷盡捕盜安民之職乃柔懦不能遵奉轉使內地人民恃朝鮮為避罪地此風斷不可長嗣後倘有匪類越境生事朝鮮不能擒獲致漏網者王將其國防汛之員參處王亦一并議處以為藩王不能遵旨奉行捕盜安民者戒六年二月減朝鮮貢稻米三十石江米三十石每年止貢江米四十石以供祭祀著為例十月昑請邉境防汛詗察朝鮮盜賊濳入內地者得旨朝鮮國逆犯即朝廷法所應誅之人倘逃入內地自當擒捕兵部可行文盛京山東等處邉界地方官有此等罪犯潛逃者即嚴拏解京或窩留藏匿從重治罪十一月昑遣使奏謝減免貢米恩七年正月諭嗣後朝鮮陪臣有職銜稱君者遇升殿之日照常賜茶如未遇升殿著禮部於使臣起程之前奏聞令其便殿進見賜茶遣回是月世子緈卒遣官諭祭二月朝鮮國有為逆謀者事覺伏誅奏入得旨朝鮮世受朝廷怙冒之德其國凶醜即干犯天討之人王先事覺察不使漏網從此境內無警官民乂安朕心深慰特賜王粧縀等四十匹康熙字典性理精義詩傳彚纂音韻述微各一部賞有功兵丁銀一萬兩十月昑遣陪臣李增等表謝賜祭及賞賚諭禮部朝鮮國王蒙世祖章皇帝軫念藩封所有應進聖夀冬至元旦表貢俱準於元旦併進以彰柔逺至意近於領受賞賚諸事皆特遣使臣表謝朕念其國距京三千餘里貢使往來勞費嗣後凡謝恩章疏與三大節表同時齎奏不必特遣使臣九年五月奉天將軍那蘇圖疏言鳳凰城邉外設立陸路防汛之虎耳山諸處有草河靉河二水俱自邉內發源至邉外之莽牛哨滙流入中江中江之中有洲名江心沱沱西屬鳳凰城管轄東為朝鮮國界嵗有匪類乘船竊糧請於草河靉河滙流入江之莽牛哨設水師防汛得旨議設水路防汛處既與朝鮮連界可行文詢問朝鮮國王有無未便之處俟回奏到日再議尋昑奏請仍遵舊例從之十年三月昑以先臣李倧被誣事業蒙令史臣改正乞早頒發部議俟明史竣後刋發得旨朝鮮國王急欲表其先世之誣陳情懇切可將朝鮮列傳先行抄録頒示十月昑遣陪臣李宜顯等表賀孝敬皇后册諡禮成並謝頒朝鮮列傳稿本十三年九月上登極十月恭上世宗憲皇帝孝敬憲皇后尊諡禮成又恭上皇太后徽號禮成先後遣使詔其國諭禮部曰大臣官員之差往朝鮮者向有餽送儀物之例朕以厚往薄來為念若令使臣照例收受不免繁費若槩不準受恐以使臣逺涉缺餽贐之禮有歉於心其照舊例減半著為令昑尋奉表賀先是朝鮮國人金世丁等擅入內地劫殺昑奏請分别治罪部議昑約束不嚴應與處分得旨寬免昑表謝乾隆元年二月禮部奏朝鮮國恭進元年萬夀表貢應特遣於七月來京至乾隆二年表貢仍照舊例與年貢同進得旨朝鮮國今年所進萬夀表貢照例於十二月偕年貢同進由是嵗以為常七月昑遣正使長溪君李柄副使禮曹判書金始炯入貢時以奉使朝鮮之兆德釋伽保沿習受餽交刑部勘治得旨朕即位以來令朝鮮國餽送使臣禮儀減半以示體恤乃兆德等於正禮之外復受陋規罪固莫逭該國王照陋例應付亦屬不合王若能體朕心自當以恪遵諭旨為恭順不當以私厚使臣為恭順也可行文朝鮮嗣後務宜遵朕前旨凡陋規所有都請别請等項悉行禁革至使臣回京之日奉天將軍及山海關監督查驗倘正禮外多携禮物者嚴劾之若代為隱匿事覺一併議處十二月禮部奏世宗憲皇帝孝敬憲皇后升祔太廟請遣官頒詔其國得旨世宗憲皇帝配天在即所有二次詔書可作一次頒發用省外藩供應二年昑遣正使海興君李橿副使吏曺判書金龍慶入貢四月昑奏請仍中江通市舊例初每嵗二八月間八旗台站官兵齎貨赴中江與朝鮮互市上以旗人有巡守職且不諳貿易恐逺人稽候未便改令內地商民往為市及昑奏入從之十一月昑請封其副室所生子愃為世子附貢方物時愃甫三嵗部議與封例不符奉特旨允行三年昑遣正使吏曹判書趙最夀等入貢正月遣使往封愃為世子昑奉表謝十一月昑奏請印頒朝鮮列傳刻本於其國部議俟明史刋竣日印給得旨朝鮮列傳可先刋刷頒給四年昑遣正使綾昌君李橚副使吏曹判書李匡德入貢五月昑遣使表謝頒朝鮮列傳十一月盛京侍郎德福等疏言朝鮮漁船被風飄至海寧界資送漁户金鐵等由陸路歸國五年昑遣正使洛豐君李楙副使吏曹判書閔亨洙入貢三月福建巡撫王士任疏言莆田縣民陳協順商船被風飄至朝鮮國楸子島資送回籍得旨中國商民出洋遭風王加意資助俾獲安全甚屬可嘉著傳旨嘉奬六年昑遣正使驪善君李壆副使禮曹判書鄭彥燮入貢七年昑遣正使洛昌君李樘副使吏曹判書徐命彬入貢十月昑奏謝國民金時宗等越境犯法屢蒙寬典恩先是五年閏五月朝鮮國人金時宗等潛居內地昑奏請立斬部議尚無劫殺重情擬改絞候從之尋禮部奏言朝鮮無秋審例金時宗等雖蒙寬緩仍罹立決之罪似未足仰副我皇上如天好生至意請照六年秋審緩決例辦理得旨允行朝鮮民西嫩及鄭世弼宣明等復於六年九月越境乞食先後被獲禮部奏請俟其國使臣來京携西嫩等歸鄭世弼宣明等免治罪奏入報可昑以各犯咸邀寬典感激陳謝得旨朝鮮民人越境犯法屢荷寬典乃朕格外柔逺之恩若無知之人見朕屢次從寬漸流縱肆則犯法者轉多非朕保全外藩民人之本意矣王當嚴加約束不時稽查俾各安分不致再罹法網八年昑遣正使綾昌君李橚副使禮曹判書栁復明入貢九月上恭謁盛京祖陵朝鮮遣使表貢從優賞賚並令使臣與諸王大臣宴諭禮部曰朝鮮使臣入貢惟國王族人稱君者始召見餘祇賜宴於禮部此定例也朕明日宴諸王大臣於崇政殿朝鮮使臣亦令與宴俾外藩陪臣得厠朝臣之末用昭格外殊恩九年昑遣正使西平君李橈副使吏曹參判鄭俊一入貢十二月昑咨禮部稱八年春有內地馬尚船户成羣入境經奉天將軍遣兵追捕本年五六月間復有內地人民駕馬尚船六隻前後入境懇轉奏禁止部議請令奉天將軍查明越境船隻有無票文係何地人民由何處越界奏到再議得旨若照部議殊為遲緩况內地人民違禁冒出朝鮮地方生事者原奉皇祖皇考諭旨令國王擒送今此違禁越境之人即應擒送或飛咨奉天將軍嚴拏務獲乃但咨部轉奏以致匪類逺揚殊為不合爾部可傳諭朝鮮王並即行文奉天將軍嚴行查拏務獲毋得忽視十年昑遣正使議政府左參贊趙觀彬副使吏曹參判鄭俊一入貢十一年昑遣正使海興君李橿副使吏曹判書尹汲入貢七月咨送朝鮮國人民李應昌等歸國昑尋奏謝先是奉天將軍達爾黨阿奏請仍於莽牛哨添汛巡查并於鳳凰城外展邉墾土下部議行昑奏其未便得旨據奏鳳凰城樹柵外向留空地百餘里俾內外隔截無滋事之患事屬可行其莽牛哨應否設汛令尚書班第前往察勘及是年八月班第覆奏莽牛哨在我境內與朝鮮無涉汛宜設得旨朝鮮世戴國恩甚為恭順若安設此汛彼國小民有違禁者王即恐獲罪是以奏請停止其地雖有江灘分界而兩岸止距一二里倘所屬不能遵奉禁令致王得罪朕心不忍可如所請將莽牛哨設汛之處停止九月減中江稅額十月福建龍溪人民吕再興等被風飄至朝鮮修船資送回籍十二年昑遣正使洛豐君李楙副使禮曹判書李哲輔入貢十三年昑遣正使禮曹判書鄭亨復副使吏曹參判鄭俊一入貢五月盛京刑部侍郎達爾黨阿等奏言十二年十二月朝鮮陪臣入貢過萬寶橋奴人士還以馬逸失銀詭稱迷路夜入人家誣執宋二等為盜汛明照所誣罪加三等擬杖徒行令該國王發落朝鮮大通官金裕門押物官尹昌履等應分别議處係小國人員未諳政體可否從寬令該國王自行申飭奏入得旨奴人士還等從寬免罪十四年昑遣正使洛昌君李樘副使禮曹判書黃日政入貢正月昑奏奉到册諡孝賢皇后詔五月盛京將軍阿蘭泰等奏言朝鮮人李古魯子於乾隆九年十二月宿浪子山田義隆店失銀縳義隆店五人送部訊無竊銀證據保釋另緝十年十二月朝鮮判事李允芳宿十里河旗人鄭忠家失銀縳忠送部允芳旋歸國忠暫保釋均懸案經年嗣經郎中錫琳等赴鳳凰城偕朝鮮官訊明田義隆鄭忠等無辜請釋李古魯子詭言誣賴及李允芳行賄經皂役王進寶首明之處請交朝鮮王自行辦理完結報可七月阿蘭泰奏言向例朝鮮貢使到邉鳳凰城城守尉帶領官兵偕主客迎送通事等官至關門稽其人馬車輿輜重各數沿途設館舍嗣兵部侍郎鎮國將軍德沛出使其國奏言置館非適中之所貢使人多不敷居住聽來使隨時賃住民居臣查貢使人數衆多若聽其賃住村莊未免滋擾應請嗣後貢使到關驗入後務令合隊行走勿許先後致有疏虞照舊例每站設官一員兵役以二十人護送令地方官先期代備旅舍以資棲止晝則護行夜則巡邏或貢使人役需置食物護行官檢其出入人數兵役隨往如內地人民與朝鮮人役生事兵役拏稟護行官付地方官究治至貢使人役惟迎送官與之相習應専責成倘地方官預備不周許護行迎送通事官揭報府尹衙門照違令律議處迎送通事官沿途約束不嚴致貢使人役滋事許護行官揭報禮部衙門照約束不嚴例議處護行官看守不嚴及兵役不足許迎送通事官揭報將軍衙門照縱軍歇役律議處迎送通事官瞻顧容隱致擾居民或護行官縱容兵丁通同徇蔽地方旗民官各揭報上司衙門照私結外藩例議處奏入報可十四年十一月昑奏謝免治奴人士還誣告罪及準停邉界設汛懇田十五年昑遣正使海春君李栐副使禮曹判書黃梓入貢三月朝鮮土兵金仁述等潛入內地行劫得旨交該國王問擬王應得處分從寬免議昑尋表謝十六年昑遣正使洛昌君李樘副使禮曹判書沈思建入貢十七年昑遣正使海興君李江副使禮曹判書南泰竒入貢正月昑奏謝乾隆十六年隨表方物準作正貢附貢方物得旨此次隨表方物仍準作正貢十八年昑遣正使洛平君李懋副使禮曹判書李命坤入貢正月昑奏謝乾隆十七年隨表方物準作正貢恩附貢方物得旨此次隨表方物仍準作正貢是年朝鮮民人金為泰鄭悅南等先後被風漂入內地給資護送歸國先是朝鮮姦民李云吉越界殺人遣官赴鳳凰城會勘得實擬絞監候及是得旨減等發落十九年昑遣正使昌璽君李炳副使禮曹判書李宗白入貢九月上詣盛京昑遣陪臣表賀得旨王因朕來盛京恭謁祖陵遣使逺迎齎表奏賀敬獻方物著照乾隆八年之例加恩賞賚陪臣亦照例加賞是年朝鮮國人栁得三等被風漂至內地給資護送歸國二十年昑遣正使海蓬君李橉副使禮曹判書鄭光忠入貢三月昑奏謝賜賚恩是年平定凖部上皇太后徽號頒恩詔二十一年正月昑奉表賀遣正使長溪君李柄副使吏曹判書曹命采入貢二十二年昑遣正使海興君李橿副使禮曹判書金尚翼入貢六月昑以其母金氏之喪告王妃徐氏旋卒二十三年昑遣正使長溪君李柄副使禮曹判書李得宗入貢遣官諭祭朝鮮王母金氏及王妃徐氏四月更定通官額數初朝鮮通官於康熙十三年定十二員上三旗六品官三員七品二員八品一員由內務府帶領引見補放下五旗六品三員七品二員八品一員由禮部論俸推補移咨吏部注册遇頒詔封王等事用四員或五員不等赦審及交易諸事用二員為例及是大學士傳恆等奏言朝鮮久為我朝屬國往來禮節語言均已嫺熟所設通官無庸十二員之多請改設為六品二員七品二員八品四員共八員上三旗下五旗各六品一員七品一員八品二員缺出均由禮部帶領引見補放并令禮部嚴禁從前與使臣交接需索之弊違者參處奏入從之是年朝鮮民人趙自永越界行劫得旨交該國王問擬王應得處分從寬免議二十四年昑遣正使海春君李栐副使吏曹判書趙明鼎入貢正月昑奏謝賜祭及發回越界人犯恩是年朝鮮民人金延松金應澤李主等被風漂至內地給資護送歸國二十五年昑遣正使吏曹判書洪啓禧副使禮曹判書趙榮進入貢正月遣官封昑繼室金氏為朝鮮國王妃昑尋奏謝附貢方物却之使臣南泰會歸頒平定回部恩詔昑尋表賀時朝鮮民人鄭世胄金得京等被風漂至內地給資護送歸國二十六年昑遣正使海興君李橿副使吏曹判書南泰會入貢二十七年昑遣正使咸溪君李櫄副使吏曹判書李奎采入貢十一月朝鮮民人金永官等越境採獵被獲交該國王照例治罪二十八年昑遣正使順悌君李炟副使禮曹判書洪名漠入貢昑表謝使臣南泰會回國順頒恩詔停止命使恩是年朝鮮世子愃卒遣官諭祭六月奉旨欽差出使髙麗該國備輿迎候此固屬國敬禮但滿洲大臣素􅈺鞍馬而身膺使命四牡宣勤猶不宜自圖安逸此後行文國王止須預備馬匹其舊用之輿永行停止七月封故世子愃之子祘為世孫昑尋表謝二十九年昑遣正使全恩君李繳副使吏曹判書韓光會入貢三月朝鮮民人金鳳守金世柱等殺死內地披甲常德遣刑部郎中喀寧阿會同盛京將軍社圖肯等審擬奏入部議金鳳守造意應斬金世柱加功應絞請即正法隨行文武官失於鈐束令該國王自行查辦至朝鮮姦民屢次越境生事皆王約束不嚴所致應交部議處得旨金鳳守等從寬改為監候該國王免其議處昑尋以失於鈐束禠平安道觀察道鄭淳等職先是正月二十四日奏旨朝鮮國王咨貢使李炟等坐車進京議請治罪著加恩免其治罪嗣後陪臣進京仍準坐車三十年昑遣正使順義君李烜副使禮曹判書金善行入貢五月朝鮮民人崔三碩金順昌等被風漂至內地給資護送歸國又以越江行竊人犯金順丁等俱緩決及案內疏防各官擬罪從寬及貢使李炟等仍準坐車民人朴厚贊十犯越境滋事秋讞緩決案內疏防各官擬罪從寬皆恭謝天恩三十一年昑遣正使咸溪君李櫄副使禮曹判書尹得養入貢恭領時憲書使臣準於十月初一日午門頒朔之期一體祗領又遭風船户鄭太文等九人資送歸國俱奉表恭謝三十二年昑遣正使全恩君李墩副使吏曹判書李心源入貢三十三年昑遣正使順義君李烜副使禮曹判書具允鈺入貢又朝鮮民人慎必富等二十八名風漂至福建常素銀等十四人風漂至鳳凰城俱蒙資送本國具疏恭謝三十四年昑遣正使禮曹判書徐命膺副使吏曹參判洪梓入貢三十五年昑遣正使慶興君李栴副使禮曹判書宋瑩中入貢三十六年昑遣正使海溪君李􅀈副使吏曹判書趙榮順入貢八月禮部議朝鮮國王李昑奏國內流傳康熙丙子年間朱璘所撰明紀輯略本于明人陳建之皇明通紀載其先世之事因訛襲謬誣妄含寃請將二書中有關小邦之語並行刋去等語查朱璘輯略於乾隆二十二年浙江巡撫楊廷璋奏請銷燬其陳建通紀遍訪京城內外書肆並無售者是二書中國久已不行奚事改削至該國王所稱書中誣衊其國祖康獻王旦世系及其四世祖莊穆王倧事迹二條今恭閲欽定明史朝鮮列傳載其始祖世系及國人廢琿立倧之處考據已極詳明乾隆三年我皇上允該國王所請刷刋頒給該國自當欽遵刋布使其子孫臣庶知所信從若陳建通紀朱璘輯略二書該國尚或有流傳應令該國王于其國中自行查禁焚銷永杜疑竇三十七年昑遣正使順義君李烜副使禮曹判書尹東升入貢又奏恭謝申禁坊刻明紀輯略三十八年昑遣正使樂林君李埏副使禮曹判書嚴璹入貢奏賀乾隆三十六年十一月二十五日恭逢聖母皇太后八旬萬夀崇上徽號又以風漂至鳳凰城小島民金國東等三人風漂至定海縣民洪達源等十七人風漂至蓬萊縣民崔卜伊等八人俱給與衣糧附使歸國皆疏謝三十九年昑遣正使海溪君李􅀈副使吏曹判書趙德成入貢又使臣李烜齎到乾隆三十六年十一月二十五日恩詔內加賞王妃縀匹恭謝一表四十年昑遣正使樂林君李埏副使吏曹判書李海重入貢又以民許億祉等六名在黃海島遇風壞船金州官兵查報救護回國具奏謝恩四十一年昑遣正使錦城尉朴明源副使吏曹判書鄭好仁入貢又奏謝遭風難民卓武先等救護回國七月十四日禮部奏朝鮮國王李昑薨逝請照例致祭給與諡號欽定王昑諡曰莊順又議朝鮮國王妃金氏奏請追賜已故世子李緈爵諡及故世子婦趙氏恩命與例不符應毋庸議一疏奉諭朝鮮國王李昑已故長子李緈前經封為世子因其早逝未及襲爵今該國王妃金氏請以世孫李祘襲封國王為故世子李緈陳請追賜封典照例議駁固是但念其以家統繼序為請情詞懇切揆之禮制事屬可行著加恩照所請給與示朕優恤之意欽定李緈諡曰恪愍又議朝鮮國王妃金氏奏請以世孫李祘承襲國王妻金氏為王妃頒詔誥敕遣使册封四十二年祘遣正使興祿大夫河恩君李垙副使吏曹判書李􅀈入貢四十三年祘遣正使吏曹判書鄭光漢副使禮曹參判李秉模入貢五月奉諭朝鮮國王奏該國有逆臣洪麟漢等結黨謀逆一案罪人業經伏法恐其支黨或有逃匿漏網者懇飭關口官員查拿等因該國臣服多年既恐有餘黨潛逸自應代為查詰不容竄入內地著諭盛京將軍山東巡撫地方與朝鮮接界邉隘海口嚴飭所屬留心察詰如有語言形迹可疑查係朝鮮人民即行盤獲奏聞發交該國自行究治八月奉諭朝鮮國列在外藩乾隆八年及十九年臨幸盛京朝鮮並修朝貢之禮本年以尚在二十七月之內停止宴禮曾預敕朝鮮毋庸遣使朝賀該國王情殷感戴遣陪臣齎表修貢迎駕請安恭順可嘉著照上兩次之例加恩賞賚并御書匾額以賜用昭優眷御書匾額東藩繩美四十四年祘遣正使昌城尉黃仁點副使禮曹判書洪檢入貢四十五年祘遣正使吏曹判書徐有慶副使禮曹參判申大升入貢奏賀皇上七旬萬夀奉旨覽王奏以本年朕屆七旬遣使於春正慶賀具見悃誠所有敬獻禮物著暫行留貯準作正貢又奏謝前蒙賜弓箭鞍馬貂皮錦縀又奏謝朝鮮民尹道俊等九名風漂至崇明救護回國八月十二日賜朝鮮正使錦城尉朴明源等三人茶果奉諭朝鮮國王素稱恭順嵗時職貢祇慎可嘉間遇特頒敕諭及資送歸國等事如琉球等國亦俱奏章陳謝惟朝鮮國王必備具土物附表進呈藉達悃忱向因專事逺來若令齎回徒滋跋涉是以厯次例準留作正貢以示優恤而該國王恪供職守屆應正貢時仍復備物呈獻往來煩復轉覺多一儀文朕推誠守信中外一體何必為此繁縟之節今嵗朕七旬萬夀該國王具表稱賀業已宣命來使前赴行在隨朝臣一體行禮宴賚其隨表貢物此次即準收受以申該國王慶祝之誠嗣後除嵗時慶節正貢仍聽其照例備進外其餘陳謝表章所有隨表貢物概行停止毋庸備進九月禮部奏朝鮮國王李祘蒙恩加賞國王縀十八匹正使縀四匹副使縀四匹書狀官縀三匹大通官縀二匹從人各銀二兩外應請仍照例賞賜國王二等玲瓏鞍韂全備二等馬一匹表緞五匹裏五匹粧緞四匹雲緞四匹貂皮百張賞正副使二員大縀各一匹彭縀各一匹綢各一匹紡絲各一匹絹各二匹銀各五十兩全備三等馬一匹書狀官一員賞大縀一匹彭縀一匹綢一匹絹一匹銀五十兩大通官三員賞大縀各一匹綢各一匹絹各一匹銀各三十兩押物官二十三員賞彭縀各一匹綢各一匹布各二匹銀各二十兩從人三十名每名賞銀五兩以上各等物俱由內務府各衙門領取照例筵宴二次奉旨依議四十六年祘遣正使昌城尉黃仁點副使禮曹判書洪秀輔入貢奉諭前經降旨所有陳謝表章隨進貢物概令停止今該國王奉到此旨具奏稱謝復具表恭謝加賞縀匹仍各具方物隨進本不必收受但既専使逺來若照例留作正貢該國王屆正貢之期仍似向年備物呈獻非所以示推誠而昭體恤嗣後務宜恪遵前旨善體朕柔惠逺人以實不以文之至意四十七年祘遣正使行判中樞府事鄭存謙副使吏曹判書洪良浩入貢奏謝乾隆四十六年正月朝鮮國商民李再晟等男女十二名風漂至琉球附船到閩閏五月朝鮮國人何農華等六名風漂至海邊牛石圈俱救護歸國四十八年祘遣正使昌城尉黃仁點副使禮曹判書栁義養入貢八月奉諭德保等奏據盛京禮部侍郎咨朝鮮國遣使迎駕並慶賀萬夀等因一摺該國王因朕曾降旨七月起程臨幸盛京故遣使進表修貢迎駕請安恭祝八月萬夀自是誠敬可嘉非尋常照例慶賀可比昨據行在禮部奏聞業經降旨令該堂官傳諭嘉奬今在京禮部復為此奏而摺內又牽引該國王向來慶賀萬夀表文俱係隨同冬至元旦於嵗底遣使恭進等語是何言耶此次朕恭謁祖陵原定期在盛京過萬夀該國王敬效悃忱特於常貢外具表祝賀朕方嘉許德保等尚為此無謂之奏甚屬非是所有禮部堂官著傳旨嚴行申飭盛京禮部侍郎玉鼎柱亦著飭行九月奉諭朝鮮厯屆臨幸盛京並修朝貢之禮此次朕恭謁祖陵該國王情殷感戴奉表修貢於七月間即先遣陪臣至盛京祇候迎駕恭祝著照例加賞並賜御製詩一章用昭優眷所有陪臣及隨從人等著照上次加賞之例加倍賞賜以示朕柔惠逺人有加無已之至意御製賜朝鮮國王李祘詩迎鑾祝夀陪臣價按轡蹕途賜謁溫問悉國中逢稔嵗夙知海外得賢藩習經史地心無二遵禮義邦教有源慎守封疆撫黎庶萬斯年永受朝恩十二月奉諭今嵗秋間朝鮮國王因朕臨幸盛京特遣陪臣迎鑾祝夀是以加恩賞賚並賜匾額詩章及古稀説今該國王接奉後具表謝恩兼輸忱進獻方物尤見恪恭所有此次呈進物件俱著收受仍加恩賞賚以昭優眷嗣後如有謝恩表章該國王務體朕意仍遵前旨不必備進方物四十九年祘遣正使行判中樞府事李徽之副使禮曹判書薑世晃入貢九月奉諭禮部奏據朝鮮國王李祘奏稱自守藩封已逾八載年過三十尚未有子前嵗始生子㬀今已齒及三齡懇請賞給封號理合據情轉奏等語朝鮮王因誕育冡嗣懇請封號殊堪欣慶著準其所請俾益綿宗緒永守藩封所有應封典禮察例具奏二十八日奉諭朝鮮國王請封世子正使著𣲖內大臣公西明副使著𣲖翰林院侍讀學士阿肅同日奉諭朝鮮國進獻年貢陪臣向例於嵗底到京明正舉千叟宴中外大小臣工耆庶年逾周甲者咸得預宴用普夀祺朝鮮國比於內臣其陪臣亦應一體入宴以昭寵眷著禮部即速行文該國王所有今嵗年貢正副使內酌𣲖年六十以上者一二員來京俾得預兹盛典共沐光榮以示朕嘉惠逺方優禮耆年之至意十一月奉諭明嵗舉行千叟宴盛典特命朝鮮國王酌𣲖年在六十以上者三人充正副使來京預千叟宴兹據禮部奏接準朝鮮國咨稱遵旨將陪臣年六十以上者専差進賀正副使即日登程進京入宴該國王捧奉前旨即行遴選耆年派充貢使觀光預宴其悃忱甚屬可嘉著加恩特賜該國王澄泥仿唐石渠硯一方梅花玉板箋二十張徽墨二十錠湖筆二十枝即交該國貢使祇領並著禮部行文該國王毋庸進表謝恩五十年祘遣正使安春君李烿副使吏曹判書李致中入貢奉諭朝鮮國臣服最久每遇萬夀元旦冬至年節俱備方物呈進朕鑒其悃忱俱令該衙門收藏仍優加賞賚此外遇有奏賀奏謝及陳奏等事亦均有隨表貢物向例皆不收受準為下次正貢並經降旨令於尋常陳奏事件不必再具貢物而該國王仍前備進以致備抵之物輾轉存積在該國王恪守成規固屬恭順之道但存積日久轉相抵算且仍有餘出者非朕厚往薄來體恤屬國之意所有朝鮮國厯年存留各物竟著該衙門悉行收受仍按照原物從優加賞嗣後該國於嵗正貢及如千叟宴等類特舉曠典自應照舊備物呈進朕亦必收受厚加賞賚此外凡遇尋常奏賀奏謝陳奏等事祇須備具表文其隨表貢物該國王務仰體朕意恪遵諭旨概行停止二月內閣奉諭前遣使西明阿肅回京復命具奏該國王即席賦詩頗知好學並將所賦詩章呈覽朕閲之深為嘉奬著加賞內務府仿宋板五經全部並筆墨等物以示優眷九月朝鮮民人李應春等十二名風漂至新建墩海灘救送進京咨明禮部遣回該國朝鮮全境分八道統郡四十一府三十三州三十八縣七十詳前五朝考其山川尤著者山則有北嶽在漢城府北九都山在漢城府東北龍山在漢城府東南天寶山在漢城府西神嵩山在開城府北平山嶺在開城府西土色赤金堂山在黃州三和縣西北白山在全州南海中其東南有黑山勢甚峻下有澳可藏舟島山在蔚州郡南釡山在東萊縣南濵大海與日本對馬島相望稷山在天安郡北洪州山在忠州西南境海中富用山在洪州海中上有倉榖故名俗訛為芙蓉山九頭山在廣州海中山有九峯蘭秀山在開州西馬邑山在平壤西南蓋馬山在平壤府西魯陽山在平壤府東北葦山在平壤府西南南臨浿水觀門山在土山縣北花山在土山縣東南屈巖山在定逺府東馬頭山在靈州東長花山在鐵州西南天聖山在殷州東北靈山在宣州西南熊花山在郭山郡東北育靈山在宣州郡東南龍骨山在龍川郡城東小鐵山在鴨緑江東岸義州境渡江處也江華島在開州城南海中紫燕島在廣州海中上有客館曰慶源亭和尚島在廣州海中上有葉老寺大青島在廣州海中其傍有小青嶼排島在全州南海中逺望三山並列中一山如垜亦曰排垜山羣山島在全州南海中十二峯連絡其南有官嶼亦謂之案苫白衣島在全州南海中前有小焦附之天仙島在全州南海中又名闌山島竹島在慶州西南濵海間山島在慶州西南朝鮮西海口也為全羅外藩相近者有㓒山島平湖島在慶州南海中唐人島在清州海中與九頭山相近有有馬島亦在清州海中國王牧馬地也舊有客館曰安興亭牛心嶼在清州海中一峯孤起狀類覆盂中稍鋭相近有雞心嶼大月嶼在全州南海中回抱如月其後有小月嶼對峙如門可以通舟菩薩苫在全州南海中小於嶼而有草木曰苫相近者為紫雲苫春草苫苦苫跪苫檳榔焦亦在全州南海中如苫嶼而其質純石者曰焦軋子苫在清州南海中朝鮮語謂笠為軋其山如之故名雙女焦在清州海中蛤窟在廣州海中山脊有龍祠海中往來者皆祀之鳥嶺在慶州西北境西接尚州界廣亘七十餘里懸崖巉峭中通一線朝鮮指為南道雄關竹嶺在忠州東摩天嶺在咸興府東北朝鮮謂之東北雄