body:
  text: 欽定四庫全書皇朝文獻通考卷一百二十二羣廟考四特祀天聰九年三月甲戍太宗文皇帝親臨楞額禮墓及詹墓奠酒時駕巡盛京北山道經固山額真一等按班章京楞額禮墓下馬至墓前以金杯酌酒奠而哭之復至詹墓前奠酒詹本北方蒙古伊蘇忒部落貝勒來歸時太宗知其賢寵眷有加至是追念之亦奠以酒崇德元年六月甲申上命以牛祭和碩穎親王薩哈亷先是己卯太宗文皇帝御翔鳯樓偶寢夢東行至一殿與禮親王代善頴親王薩哈亷坐太宗默念頴親王已故何在此遂避還盛京道遇儀仗左右列有人自後至請曰穎親王乞上賜牛一駕行不數武碩託又自後至奏曰頴親王令臣求賜牛太宗曰已與之矣及覺以問內院大臣希福剛林詹霸瑚球衆奏曰此悼念之切所致耳太宗曰不然當别有故也于是希福等檢會典親王薨初祭賜牛一頴親王初祭未嘗用牛遂以奏至是特命禮部備牛致祭順治六年十月甲午敕賜碑于和碩禮親王代善墓世祖章皇帝御製碑文爾和碩禮親王代善乃太祖武皇帝次子于崇德元年晉封和碩禮親王不幸薨逝當太祖武皇帝征哈達輝發烏拉葉赫諸國時爰整即旅四出比克有明又為國家著勞用是特諭該部式展追痛之思勒石塋前以示顯揚之典七年三月己巳敕建碑于輔政叔德豫親王多鐸墓世祖章皇帝御製碑文爾輔政叔德豫親王多鐸乃太祖武皇帝少子天聰二年戊辰太宗文皇帝征蒙古多羅特國盡有其地賜王額爾克楚虎爾號天聰五年辛未太宗皇帝攻取明大凌河城王擊敗錦州敵兵為太宗皇帝前驅破敵天聰八年甲戍征明大同府王攻克保安州捉生於明錦州時王又擊敗錦州松山二城敵兵崇德元年丙子封和碩豫親王順治元年甲申四月王同叔父攝政王於山海關破流賊李自成兵二十萬取明中原十月命王為定國大將軍統大軍擊敗流賊李自成馬步兵進克潼關及陜西西安府又平河南擊敗各處兵攻克揚州遂平江寧生擒明福王朱由松以平江浙屢建大功進封和碩德豫親王順治三年丙戍蘇尼特吉斯思反命王為揚威大將軍統率大軍追及騰吉斯於衮噶魯台地方擊敗之獲其妻子生畜喀爾喀土謝圖汗碩雷汗率衆迎戰於查濟布喇克地方復敗之多所斬殺自平定中原以來厥功甚茂順治四年丁亥封為輔政叔德豫親王參贊機務順治六年己丑三月十八日不幸薨逝兹命該部勒石墓前用彰追恤至意八年八月戊辰敕賜碑於和碩肅親王豪格墓世祖章皇帝御製碑文爾和碩肅親王豪格乃太祖武皇帝之孫太宗文皇帝長子當征蒙古札魯特東魁察哈爾鄂爾多斯諸國時所在克敵收服其國逮屢征明國所在擊敗敵兵攻克城池甚多封爾為和碩肅親王平定朝鮮時率左翼兵屢敗敵衆下其城同睿王於山海關破流賊二十萬衆克定中原順治三年又統大軍剿除四川逆冦平定郡縣師還之後值睿王専政啓釁遽加以罪名輒行拘繫抑勤致死朕知爾無罪不勝悼念仍追封爾為和碩肅親王用建塜碑傳之後世九年正月壬寅命立碑於三等阿思罕尼哈番安達禮三等阿達哈哈番敦達禮墓臣等謹按我太宗文皇帝上賓安達禮敦達禮朴誠自矢俱以身殉至是世祖章皇帝褒其忠特加追恤十年十月戊子遣官諭祭明殉難大學士范景文等十五人並豫以諡仍于各原籍賜地春秋供祭先是元年八月辛巳順天學政御史曹溶啓睿親王請旌故明殉節諸臣范景文以下二十八人王令俟天下平定再議逮九年十一月乙酉世祖章皇帝諭禮部明末冦陷都城君死社稷當時文武諸臣中豈無一二殉君死難者幽忠難泯大節可風爾部會同各部院詳訪實迹具奏勿遺勿濫於是刑科給事中趙進美疏言明末死節諸臣蒙諭察訪異代忠魂莫不仰沾聖澤伏查順治元二年間亦有未達天心徒抱片節硜硜之志百折靡悔者雖抗順之辜無辭斧鉞而授命之義不忝昔賢仰祈敕部核實表彰以作忠義得旨所司議奏是年六月辛亥禮部奏明末殉難忠臣大學士范景文戶部尚書倪元璐左都御史李邦華副都御史施邦耀太常寺少卿吳麟徵左庶子周鳯翔檢討汪偉都給事中吳甘來御史王章陳良謨左中允劉理順馬世竒主事成德金鉉駙馬都尉鞏永固等應加旌恤得旨范景文等給諡賜祭依議行仍於各原籍賜地春秋致祭至是諡范景文曰文忠倪元璐曰文貞李邦華曰忠肅施邦耀曰恭愍吳麟徵曰貞肅周鳯翔曰文介汪偉曰文毅吳甘來曰莊介王章曰節愍陳良謨曰恭潔劉理順曰文烈馬世竒曰文肅成德曰介愍金鉉曰忠潔鞏永固曰忠烈遣禮部侍郎髙珩致祭十二年九月壬辰遣官諭祭明殉難侍郎孟兆祥等八人其七人姓氏未詳十三年閏五月庚子遣官諭祭明殉難太僕寺丞申嘉允豫諡端愍十四年二月庚寅敕賜碑于和碩武肅親王豪格墓世祖章皇帝御製碑文國家紀功崇德首重懿親茍能宣力王室著有􅈴勞髙爵寵祿以光耀於生前豐碑美諡以流傳於殁後典至巨也和碩肅親王豪格係太宗文皇帝長子朕親兄也智略超羣英雄蓋世其征蒙古札魯特東揆察哈爾鄂爾多斯等國及征明數次平定朝鮮入山海關破流賊兵二十萬諸功前碑載之詳矣順治三年統率大軍往征四川賊冦至陜西立解漢中府之圍所屬州縣盡為平定攻克三寨山張閣老崖等處山寨三座各寨俱就招撫擊敗水陸馬步兵二十二次追殺八次又招撫偽總兵副將參遊以下官百十二員士卒翕然歸命陜中逋冦掃蕩無餘又復入川攻克內江縣擊敗張獻忠一百三十六營斬賊首獻忠及其偽巡撫總兵等官二千三百有竒俘獲無算廣宣德意招徠文武官二百三十五員馬步兵六千九百九十有餘四川大定建此竒功宜膺上賞睿王攝政掩其開疆拓土之功橫加迫脅幽囚之慘忠憤激烈以致薨逝朕念手足之誼不勝悽愴親政之後即令樹立貞珉以紀厥功而加恤豫諡之典闕焉未舉今特重敘前績表王之德業闢土斥境折衝禦侮宜諡曰武追封為和碩武肅親王加以厚賚嗚呼朕追思痛悼弗能自已是用旌爾殊勳揚爾忠義昭朕篤親酬庸之意勒之金石用傳不朽七月癸丑敕賜碑于和碩鄭親王濟爾哈朗墓世祖章皇帝御製碑文朕惟國家膺圖受籙天降英傑以佐鴻業勳庸既著於生前榮名宜彰於殁後故報功昭德勒碑墓道禮也况屬在懿親功髙德茂褒崇之典尤當隆重者乎叔和碩鄭親王濟爾哈朗乃太祖弟莊親王之子忠貞天挺端亮性生秉志精誠夙懷英毅當我太祖武皇帝肇造丕基之時暨我太宗文皇帝底定鴻業之日王以本支之親膺心膂之任躬擐甲胄奮冒矢石始征蒙古札魯特獲把克貝勒多爾機鄂齊爾桑征髙麗攻拔城池收服其國及征明都城攻取大安口入邊之後敗五路援兵招服馬蘭峪諸堡又追蹤叛賊愛塔所在敗其兵而誅之駐守永平又下建昌遷安樂亭諸縣及兼攝司冦秉心忠良行已端誠仰體皇考好生之心以致刑清法平而治兵輔政亦皆克殫靖共因封為和碩鄭親王逮皇考升遐宗室兄弟懷亂各有異謀惟王矢志翼戴永堅一心以定大計此功髙社稷較戰陳之績為尤重矣既而統大兵攻拔明中後所前屯衛中前所諸城後進征湖廣道出山東聞賊據曹縣偏師剿滅之及至楚境恢復寶慶等四府八州四十四縣又遣兵收復貴州五府七縣擊敗賊兵六十四陳誅偽王一偽總督一偽總兵十四文武偽官四十一收降偽總兵一偽官六十九遂定湖南至若佐輔朝政益著勞績睿王忌王忠誠罷輔政叔王改為和碩親王及朕親政復封叔和碩鄭親王王克贊廟謨沃心前席其所裨益朕躬振飭紀綱者匡勷實多方期益殫嘉猷以翊太平遽爾嬰疾遂致屬纊嗚呼若王者忠冠當時功昭後世可謂始終一德生死不渝者矣朕每切哀思用深痛悼念勳名既載於盟府而風烈宜表於隧阡爰述懋功顯揚忠義勒諸貞珉俾奕世垂之不朽云十八年四月壬午聖祖仁皇帝賜一等阿達哈哈番侍衛傅達理祭葬豫諡忠烈臣等謹按我世祖章皇帝上賓侍衛傅達理感報恩遇即以身殉至是特加優恤康熙十年九月辛未遣官祭盛京諸王暨功臣墓時以寰宇一統躬詣太祖太宗山陵行告成禮遣官各致祭十四年十月丙寅上躬詣孝陵遣官奠和碩襄昭親王墓太子太保都統三等精竒尼哈番佟圖賴墓十八年四月辛巳遣官奠輔政大臣一等公索尼墓是日駕出德勝門觀禾路經其墓遣內大臣覺羅武默納以酒奠之十九年正月壬子遣官奠昭勳公圖賴墓是日駕幸鞏華城道經西山之麓遣武默納至其墓奠之二十一年正月敕賜碑於廣西巡撫諡文毅馬雄鎮墓聖祖仁皇帝御製碑文朕惟臣子之誼大節為重然居平無事之時人人侈談忠義一旦臨事而為國捐軀確乎不奪者蓋寡則所稱成仁取義之士國家得之宜如何褒崇焉爾馬雄鎮洊厯禁近簡授節旄恪共之譽有聞綏輯之功斯著豈意叛藩逆命怙惡㺯兵急變起蕭墻之中孤城介桂領之外聲阻援絶形絀勢危爾則以死自持抗詞罵賊遂觸凶怒橫致幽囚然猶志切輸忠力圖滅冦間關遣子萬里來歸慷慨上書一心罔二丹誠既通於王室闔門咸殉於巖疆節挺氷霜厯四年而益厲操堅金石經百折而不撓可云烈矣嗚呼惟見危乃知授命之不易疾風徑草繄爾一身實荷綱常之巨朝廷養士數十年有臣如此庶無負焉朕用既憫且嘉特考彛憲賜諡文毅躋以崇階爰勒貞珉昭示來世几屬臣僚聞風興起咸思自勵爾之為功世道豈淺歟二月戊寅以雲南底定海宇蕩平躬詣盛京祭告陵寢遣官往伯夷叔齊廟行禮是日駐蹕灤州王家店遣領侍衛內大臣舅舅佟國維大學士明珠往祭諭曰伯夷叔齊古之聖人清風可仰爾等前往可焚香展敬三月乙卯遣官祭功臣墓領侍衛內大臣舅舅佟國維祭功臣頴親王薩哈廉墓內大臣都統巴泰祭克勤郡王嶽託墓內大臣伯費揚古祭武勳王揚古利墓內大臣索額圖祭直義公費英東墓內大臣坤巴圖魯侍衛祭𢎞毅公額亦都墓內大臣覺羅烏默納祭忠義公圖爾格墓丙辰遣官祭諸臣墓尚書郭四海祭多羅靖定貝勒飛揚武多羅安平貝勒杜度鎮國公馬占墓侍郎覺羅沙賴祭碩翁科羅巴圖魯圖魯什墓侍郎額星格祭輔國公塔拜鎮國將軍聶克塞墓侍郎郭丕祭都統納穆泰都統楞額禮墓侍郎黨務禮祭大學士達海巴克什大學士雅泰都統達爾哈額駙墓副都御史塞克德祭鎮國將軍湯伍泰墓侍郎溫代祭內大臣伊爾登尚書薩穆什喀墓侍郎阿喇尼祭領侍衛內大臣精竒尼哈畨多爾濟內大臣諾爾布占圖謝土墓侍郎明愛祭二等伯明阿都統覺羅拖博輝墓學士庫勒納祭原列五大臣內碩翁科羅巴圖魯尚書伊孫墓詹事牛鈕祭額駙李永芳都統博爾金侍衛墓通政使席蘭泰祭鎮國將軍慕爾察內大臣宗室額克泰墓大理寺卿恕舒祭盛京按班章京葉克書尚書冀孫墓少詹拉巴祭內大臣公常鼐一等精竒尼哈番巴竒蘭墓太僕寺卿色楞祭精竒尼哈畨侍衛席爾巴墓鴻臚寺卿安太祭三等阿思罕尼哈畨安達禮三等阿達哈哈畨敦達禮墓太常寺卿席爾達祭尚書車爾格墓光祿寺卿鄂哈祭盛京將軍阿穆爾圖墓少卿護穆布祭內大臣覺羅色勒墓司業葛思泰祭尚書馬福塔墓己未遣官祭功臣覺羅祖墓內大臣覺羅塔達祭武功郡王禮敦巴圖魯墓內大臣公福善祭恪恭貝勒塔察篇古墓又內大臣覺羅塔達祭陵寢附近地方覺羅祖墓四月壬午敕賜碑于浙閩總督諡忠貞范承謨墓聖祖仁皇帝御製碑文朕惟朝廷簡畀重臣授以封疆之任平時則竭誠殫力以靖厥職猝逢事變則有凛乎不可犯確然不可奪之節舍生取義流光天壤古所謂不二心之臣如此而已爾范承謨名臣之子奮迹甲科入侍禁林出典節鉞咸有聲績著於當官洎閩疆蒞鎮之年值狂豎盜兵之日冦起門庭禍生肘腋智未及施勇不暇展而爾志恥幸生義無茍免奮身罵賊誓不共天遂致闔室幽囚三年拘繫阻敓其衣食迫脅以甲兵凶𦦨彌張貞操愈徑卒蹈白刃以作完人慷慨從容兼有其美兹者底定疆陲申明命討罪人斯得臣節益昭倍深軫悼之情特厚飾終之禮寵以隆秩諡曰忠貞嗚呼褒忠顯善帝王治世之大權恩命疊頒朕曷有私於爾以培正氣以植人倫庶使選愞之士覩盛典而知興慕義之夫聞休風而加勸勒諸貞石其永有譽於無窮哉五月丁亥遣官奠巴圖魯親王達爾漢墓貝勒卓爾圖墓己亥遣官奠平南親王尚可喜墓十一月辛亥遣官奠和碩純靖親王墓時躬謁孝陵回鑾是日駐蹕邦均南二十二年五月敕賜碑於太子太傅都統三等公議政大臣吏部尚書中和殿大學士佐領贈少保仍兼太子太保諡文襄圖海墓聖祖仁皇帝御製碑文朕撫御方夏勤求治理惟兹丞弼之臣協心毗贊綏靖邦家實依賴焉爾圖海秉資忠慤砥行端勤密勿周旋厯有年所敬以事上誠以持躬淵塞沉幾克膺大任自為都統時嘗平荆楚西山之亂還入綸扉贊襄匪懈乃逆賊吳三桂慿藉寵靈煽動南服一時羣不逞之徒囂然附和察哈爾孤負國恩造釁搆孽爾以將軍副信郡王祗承廟算出關征討膚功立奏東服底平繼以涇原騷動西土震驚命爾為大將軍以乘勝之師回戈西向賊方肆其狂獗思與滇逆併力惟爾以重臣建牙遂得橫截秦隴扼亢搗虛逆勢窮蹙始帖耳垂尾復來效命邇年以來爾鎮撫三秦威略大著能使羣賊膽寒則凡天戈所指建耆定之成功者惟爾勞勩為多爵以上公俾之振旅方將復煩以機務與之講持盈保泰之理共享隆平至治詎圖勤瘁之餘溘然殞逝腹心失倚深用䀌傷雖恩恤有加錫之嘉諡而朕軫悼元老之心則未有已也爰命伐石樹之墓道使後有溯􅈴舊之烈者得以考焉二十三年十一月己卯駕幸曲阜遣官祭元聖周公廟先日戊寅諭大學士明珠周公大聖人制禮作樂垂示萬世今廟在曲阜應行致祭此係重大典禮其遣恭親王常寧及禮部尚書介山偕往以示朕尊崇先聖之至意二十四年二月庚子詔修周公廟立碑給祀田授後裔為五經博士御製碑文御書勒石文曰世運代嬗隔越千載則必有神聖挺生其間以承大統以作名世惟公體上聖之質紹祖考之德孝友篤仁左右寧王厥勳爛矣及乎負扆能以勤勞寅恭惇大忠信之道翼贊其君太和洽而頌聲作焉夫功莫大於致治綏邦業莫隆於制禮作樂公身兼數器開物成務其龎鴻炳爍之烈既已載於詩書志諸史册至於繫爻辭定官禮撰爾雅出言為經又何博奧難窮也昔孟子論列古帝王至於公曰兼三王施四事而韓愈亦厯數堯舜禹湯文武以至公蓋道統之傳如此豈僅以治理之彰彰者歟遙想風徽官公遺嗣俾昭世澤於無窮既命有司新公廟貌希慕之餘勒石頌德而繫之以詩詩曰邃古民朴混混茫茫列聖經綸肇軒迄商敘厥倫紀賁以采章公監二代揆時立制有因有除禮明樂備體國經野成理萬彚集武之勳詔文以孝代成諴民並孔五教為子為臣是則是效宗邦綿厯忠厚所貽貞珉載鐫作頌致思鳬繹同峙億祀為期二十九年十月敕賜碑於一等公內大臣都統國舅諡忠勇佟國綱墓聖祖仁皇帝御製碑文朕惟自昔􅈴舊之臣乃心王室平居恪勤職事左右宣勞一旦奉揚威命忠不辭難勇不避險鴻名駿烈焜耀無窮史册所書良足嘉歎爾佟國綱賦性貞純秉心淵塞親居元舅而敬以持身位列上公而謙能服物入則虔共宿衛出則管領禁軍偉量夙重於巖廊令聞允孚於寮采乃者小醜搆爭近逼邊圉三軍聲討簡佐元戎爾乃慷慨厲兵赳桓敵愾屬賦鋒之既挫將棄壘以潛奔爾猶擐甲直前提戈獨進鋭志彌堅金石壯氣逾薄虹霓誓掃陸梁永清朔漠豈期上將遽殞師中夫爾以肺腑之親心膂之寄秩崇望峻勞久勳髙假令偕衆旋軍亦可從容奏凱而義存憤激甘蹈艱危人盡如斯冦奚足殄易曰君子以致命遂志傳曰殺敵為果致果為毅惟忠生勇爾實兼之循行易名斯無愧矣嗚呼典禮加隆榮哀悉備英風震於邊徼徑節炳若丹青九原有知應無遺憾惟朕眷思懿戚篤念老成身後追褒久而益痛特命所司勒文墓石昭朕無已之懷亦俾後人知所激勸焉三十七年八月甲子上恭奉慈輿詣盛京謁陵駐蹕嘉門蘇賽包地方遙奠發庫山是日諭領侍衛內大臣索額圖等曰皇太后父母所葬在發庫山相去二百里應於道路附近處擇潔淨之地俟皇太后遙為祭奠十月甲寅命奠武功郡王禮敦巴圖魯墓恪恭貝勒塔察墓己未聖祖仁皇帝臨奠武勳王揚古利直義公費英東𢎞毅公額亦都墓前一日戊午諭大臣等開國佐運􅈴臣揚古利費英東額亦都效力甚可嘉尚此三人墓朕祭昭陵日親臨奠酒其餘諸臣效力亦屬可嘉康熙二十一年曾經祭奠者照前舉行頴親王薩哈亷克勤郡王嶽託等墓各遣大臣致祭尋揚古利費英東額亦都之子孫公福善等奏皇上欲親奠臣等祖墓臣等不勝惶懼祈敕停止聖祖仁皇帝諭之曰太祖太宗開國定鼎爾祖輔佐勳勞即爾等亦不能詳悉朕時閲實録知爾等之祖於開創時功績懋著深屬可嘉朕既親來謁陵必當臨爾祖墓奠酒爾等毋庸再奏是日駕臨三勳臣墓設牀偏西北向上坐牀上置奠池各奠酒三巵隨從王大臣侍衛等及􅈴臣子孫皆於墳院內叩頭敕賜碑於開國佐運勳臣武勳王揚古利直義公費英東𢎞毅公額亦都墓聖祖仁皇帝御製碑文朕惟我國家創建丕基開無疆之景運既篤生神聖英武之君以剪除亂逆啓闢疆宇勘定諸邦一統之烈肇於東土其時則有一德一心之佐殫忠戮力經營四方以翊鴻猷而成大業蓋天實挺生異才鍾山嶽之靈挾風霆之氣貞誠不二毅勇無倫名髙百戰之勳位超五等之爵垂聲竹帛配食廟廷以與國家共承休祉子孫世延其澤是豈偶然者哉當我列祖之龍興也一時人材蔚起猛士如雲戰將如雨以藝勇稱以功名顯者不可勝數而功冠諸臣為一代元勳則有開國佐運忠勇王揚古利直義公費英東𢎞毅公額亦都為傑出焉朕嘗恭覽列聖實録考三臣行事折衝行間則戰必勝攻必克平居則矢忠直贊謀畫豐功偉績至今焜耀簡編未嘗不緬想英風興懷往績昔人創造艱難枕戈擐甲櫛風沐雨之勞恆留連往復不能去於懷也嵗在戊寅朕循行舊京展祀陵寢追維祖宗功德隆盛並及當時佐命之臣邱壠所在皆遣官致祭而於三臣之墓特親至奠醊以示優崇仍復専官祭享蓋功在社稷以死勤事古人爰有明禋之典朕篤念􅈴庸用申異數并為文勒諸貞石以昭示於無極焉四十年四月敕賜碑於武英殿大學士兼吏部尚書佐領加二級諡文清阿蘭泰墓聖祖仁皇帝御製碑文朕惟國家之務全賴平章簡我良臣得之匪易其有克副股肱之寄積抒夙夜之勤律已彌見小心佐政能持大體方切倚毗而不假年飾終之禮有加哀往之情恆篤用泐貞石永世有辭爾武英殿大學士兼吏部尚書佐領加二級諡文清阿蘭泰有容之德大受之材自厯百司御史以至為冡卿罔不慎乃在位朕甚嘉之用俾爾弼余一人以襄大政爾能和衷以協力推誠以布公遵國家蕩平直正之途養人心清淨寧一之福十年之久聞眚無間豈惟朕心所素知抑亦羣情所悅服至於潔亷之操尤著美於朝端蕭然故居朕嘗書額示寵且性本謙沖義惟止足每一求退朕輒黯然欲斷來章溫言批答間有微疾賜問頻仍豈期近者卧病一旬遂爾不起輟朝深痛未解朕懷賵馬賻金恤爾身後臨喪祖奠如朕親行加祭易名悉從優異嗚呼緬生平不事聲名之迹惟密勿常多贊助之勞朕無溢辭務傳其實尚俾知我弼臣之遺徽茂烈足以光於邦家風於有位千秋不泯視此豐碑四十一年二月己巳命奠大學士梁清標墓時駕幸五臺是日駐蹕真定府諭大學士馬齊侍郎法良此城十餘里外有大學士梁清標墓朕巡行所及已故大臣墓俱遣大臣致祭爾等其往奠之四十二年二月丁亥命奠大學士宋德宜墓時駕巡視南河是日駐蹕蘇州府城內遣侍衛善射都察院左都御史溫達翰林院掌院學士揆敘至其墓奠酒十一月戊申上西巡遣官奠大學士衛周祚墓戊午命奠提督張勇墓總兵官梁化鳯墓四十四年二月壬午命奠刑部右侍郎諡文恪勵杜訥墓時駕南巡御舟泊靜海縣御書諡故刑部右侍郎勵杜訥文恪二字遣乾清門一等侍衛副都統馬武等錫於其家並令至其墓奠酒四十六年十月壬午上巡幸塞外遣官奠喀喇沁多羅杜楞郡王扎什墓四十九年十一月壬子上謁孝陵遣官奠和碩裕憲親王墓和碩純靖親王墓聖祖仁皇帝御製和碩裕憲親王碑文國家景運龎洪本支百世用惇秩敘懋建屏藩矧兹同氣之最親加以懿行之茂著恩無間於終始禮務盡夫榮哀紀述生平倍增愾嘆惟王為皇考世祖章皇帝之長子朕之親兄也胄既屬尊齒復居長而秉性寬和持身謙牧虛受之量雖疏賤不遺矜慎之衷雖細微必飭而其大者則在因心展孝曲盡慈寧色養之誠視國如家克敦夙夜奉公之義入而預聞大政出而翊贊戎機佐致升平共享清宴豈期偶恙遽遘厥凶當王之初疾也嘗遣醫審藥躬視再三王自謂漸瘳諄辭遜謝及朕時巡塞上哀訃忽聞遂觸冒炎蒸倍道遄返輟朝臨奠制誄抒懷厯喪禮之告竣常涕泗之橫集顧瞻華屋杳隔春暉嵗月不淹頓成陳迹能不悲夫迄今追惟往事溯自齠齡或同侍寢門或偕逰禁苑或𠫭稽圖史或陪扈鑾輿朕日篤家人昆弟之歡而王則益修臣職惟謹四十餘年曽無失德天懷樂善何日忘之經曰髙而不危所以長守貴也滿而不溢所以長守富也王服習斯訓美備厥躬按法旌行豫諡曰憲洵無忝矣兹王之寢園在黃華山麓川回巖抱既固且完朕親加相度乃襄大事嗣子保泰命紹舊封式纘王緒於戲惟王克忠克孝允樹為臣為子之型王之休德朕褒揚之王之後嗣朕佑芘之爰據實摛文勒之貞石用垂令聞於不朽俾後之覽者知所景仰焉康熙六十一年十一月壬寅世宗憲皇帝追封已故大學士三等公圖海為一等公致祭修墓甲辰命修佟國維墓雍正元年三月戊子命追封皇后之父內大臣步軍統領費揚古為一等公致祭修墓五年五月庚申命祭河道總督靳輔時奉諭朕覽治河方略見原任河道總督靳輔昔年修理河工勞績茂著欲加恩澤以奬勳庸該部查奏靳輔於康熙四十六年已蒙聖祖仁皇帝特恩加贈宫保給與世職今著追加工部尚書銜致祭一次以示朕篤念前勞之至意五月庚辰命造怡賢親王塋時於淶水縣境內賜地一區即著管太平峪工之員經理丙戌上以王雖有遺言塋兆悉遵會典然寢園僅循常制則褒德顯功之禮實為缺略特諭大學士九卿悉心詳酌定議具奏六月辛酉大學士等議奏怡親王塋制宜建享堂七間享堂外中門三間內圍墻一百丈中門內焚帛亭祭器亭中門外神厨五間神庫三間東西廂及宰牲房各三間碑亭一外大門三間圍墻二百九十丈大門外奉祀房二十間石橋二石坊一擎天柱二神道碑一得旨怡親王有遺言殯殮用常服一切金玉珠寶之屬不可用王妃及諸子遵遺言只以常服殮即平日所束之帶未曽用朕親臨其喪亦祗以血淚巾帕及所佩香囊附棺中示含玊之意志永訣之哀蓋王天性節儉一生服食愛惜物力不多費絲粟故拳拳身後如此且識見髙明深凛古人寶玊送死之戒是以附身附官皆不忍違其素志至於園寢之制則關係國家典禮德懋懋官功懋懋賞乃古人之通義恐非朕所得私亦非王所可讓者今大學士九卿等詳定悉與典禮符合甚愜朕懷著依議行世宗憲皇帝御製和碩怡賢親王碑文朕惟國家啓昌隆之運則誕降名臣祖宗鍾福慶之貽則篤生賢胄粵若師師虞代稷契為帝室之英濟濟周朝旦奭是姬宗之彥莫不紀諸謨典誦以聲詩前績可稽遺編具在如朕弟怡賢親王則于古有光者也王秉乾坤之清淑萃川嶽之精華爰自幼年早徵至行禁廷奉誨循禮度以持躬內殿承歡篤孝思於繞膝實超出於同氣久默識於中懷是以纘紹之初慎選親賢之寄特加恩命晉授王封正在亮隂俾膺總理當良姦之雜處以鎮靜服羣情遇綱紀之待釐以精明襄萬務成勞既著眷倚逾殷綜中外之訏謨司兵農之大計而王恪勤匪懈兢勵彌深體朕心為已心視國事如家事詳核度支之積竇府藏充盈請蠲吳越之浮糧閭閻康阜興田工於畿內粳稻連疇籌水利於江南河渠順軌至若邊形指掌瞭大勢于川原武略在胸贊成謀于帷幄壯戎容于雁磧組練鮮明裕軍實於龍沙驊騮騰躍蒼黔恬樂罔聞徴發之煩朝省安間莫見運籌之迹是其潛思默算備極精誠故能應變投機不形聲色者矣扶持正直公道於以昭彰薦達猷為人材由兹奮起度維謙挹同事務協于和衷量本寬洪曹官胥歸于涵茹領周廬之環衛訓練維勤定宫府之規模施為悉當凡關於民生吏治知無不言曽經其熟計深圖言皆有效祗慎而不宣於衆退謙而恐居其名皆中禁之密陳豈外廷之能曉心迹則青天白日衾影無慚節操則瑩玊清氷垢塵不染研幾窮理得聖經賢傳之精微輔世寧民具帝佐王臣之藴負道光竹帛恢平章調燮之勳瑞叶星雲樹喜起明良之範朕實賴王治安寰宇王實為朕翌贊升平既厯八年猶如一日斯乃上天降佑列祖垂庥賚良弼於本支作盛時之梁棟於皇考為孝子於朕躬為純臣自昔罕倫在今幸覯惠兹之性宜其克享遐年豈弟之思足以迓承繁祉人情胥願天數難齊詎盡瘁以忘軀遂抱疴之纒體禱神祇而靡應商醫藥而弗瘳王忠愛之忱始終一致沉綿之候遷避而弗敢上聞危篤之期溘逝而慮傷永訣朕將臨視王已飄升望幻影於雲中靈竒示象蛻色身於塵界慧覺超凡生有由來理當可信王幽明感德逺近歸仁錫命每申則日晴紫陌俎筵方徹則風靄青阡虔叩繐帷動舉朝之痛憶競隨素紼溢長路之悲號嘗賜標題略傳梗概忠敬而兼之誠直勤慎而益以亷明禮重易名約一言而該美善義隆加諡冠八字以示寵褒朕親奠郊坰頻紆車駕時陳牲醴每遣臣僚敦儉素之風塋兆本由於自擇議推崇之典經費優給於官兵吉兆既安豐碑宜勒於戲念股肱之誼重雕刻金鏞惓手足之情深鋪揚玉牒功髙德茂享亘古之鴻聲生榮死哀並生人之全福將使斯文炳煥偕星耀以流輝貞石嵯峨與峯巒而並峙云爾八年十二月命祭大將軍嶽鍾琪祖墓於蘭州是月乙未朔諭大將軍嶽鍾琪忠誠體國懋著功勤實由先世積德纍仁是以誕生賢良為國家之柱石查嶽鍾琪晉封公爵以後未遇覃恩尚未領受誥命應加特典以表􅈴勞著照嶽鍾琪公爵給伊曽祖祖父三代及本身封誥聞伊之祖墓在蘭州地方伊明春前赴軍營取道祖營之側著賜諭祭一壇令撫臣致祭以示朕眷禮大臣推恩先世之至意十一年十月辛亥命安徽巡撫徐本祭大學士張英於本籍先是九月辛卯諭朕已降旨諭祭賢良祠大學士張英於本籍大學士張廷玉著給假數月於十月十三日起身回家舉行典禮張若靄著隨去其族中子弟若有在京間散職銜可以暫假者準其隨回襄事江蘇學政張廷璐亦著給假回本縣其學政印務照例交與督臣代管俟事竣仍回本任乾隆元年十月戊寅皇上詣水東村奠怡賢親王墓先是乙丑奉諭旨朕躬送梓宫回時詣怡賢親王墓次奠酒八年九月丙午上詣盛京恭謁祖陵禮成親奠克勤郡王墓武勳王揚古利墓戊申上親奠直義公費英東𢎞毅公額亦都墓十三年二月己卯上東巡躬謁元聖周公廟先是丁丑諭朕蒞止闕里奠先師祀少昊夙誠申矣惟是周公元聖祠咫尺不一瞻拜於心歉然其致祭已照例遣親藩從事今朕欲至祠瓣香瞻拜所司具儀以聞且朕所重者道也豈所論於位乎三月己丑上躬謁帝舜有虞氏廟前一日戊子諭朕詣闕里釋奠禮畢因以祀少皥謁元聖素懷良慰今至厯下聞有虞氏之廟近在城中緬想重華之盛實惟元德之區景仰匪遙儀型甚邇其令所司潔祠宇以俟拜瞻十四年正月命山東巡撫造周公廟及四氏先賢祠祭器是月壬子諭國家崇禮先聖先賢秩祀惟謹闕里文廟祭器皇考世宗憲皇帝時製造頒發宫墻美富穆然見隆古典型乃者各壇廟升馨薦享亦既悉用古制矣惟兹元聖周公廟及四氏先賢祠朕於東巡之次特命修葺今輪奐翼如而器具未備非所以重明禋將誠恪也該撫凖泰其飭有司遵定式敬謹成造俾奠獻几楹執事有恪肅巨典焉十五年八月丁亥聖駕時巡中州遣官祭前代聖賢忠烈祠墓凡祠墓在御道所經三十里內者皆遣官致祭前代名臣以配享帝王廟者為斷先賢以從祀聖廟者為斷本朝勳臣以入祀賢良祠者為斷時祭周文王廟伊尹墓周公廟宋璟墓許逺墓吕蒙正祠范仲淹墓司馬光祠王曽墓韓琦墓嶽飛廟子貢祠韓愈墓程皓祠程頤祠邵雍祠朱子祠許衡墓又奉命特祭殷比干墓漢關帝墓晉嵇紹祠唐顔真卿墓本朝魏裔介墓十六年正月聖駕南巡壬戍遣官山東祭元聖周公廟二月壬申遣官祭河臣靳輔齊蘇勒嵇曽筠祠辛巳遣官祭丹徒縣宋宗澤祠本朝張玉書祠陽湖縣周吳季札祠本朝趙申喬祠丁亥遣官祭長洲縣周言子遊祠宋韓世忠祠本朝湯斌祠張伯行祠陳鵬年祠吳縣周泰伯祠宋范仲淹祠庚寅遣官祭嘉興府唐陸贄祠錢唐縣唐錢鏐祠宋嶽飛墓明于謙墓本朝徐潮墓三月己亥遣官祭山隂縣明王守仁祠乙卯遣官祭上元縣晉卞壺廟宋曹彬廟明徐達墓常遇春墓方孝孺等一百一十八人祠江寧縣本朝于成龍祠傅臘塔祠四月壬申上駐蹕王老口大營詣禹王廟拈香臣等謹按是年遣祭名臣先賢凖十五年中州例二十一年三月聖駕東巡庚午躬詣元聖周公廟拈香先是二月乙丑諭朕躬詣闕里祭告先師禮成後即親詣少昊金天氏之陵及周公元聖祠瓣香瞻拜用申誠悃二十二年聖駕重舉南巡正月乙巳遣官河間縣祭漢毛萇墓辛亥遣官山東祭元聖周公廟壬戍遣官祭河臣靳輔齊蘇勒嵇曽筠祠二月丁卯遣官祭丹徒縣宋宗澤祠本朝張玊書祠陽湖縣周吳季札祠本朝趙申喬祠潘思矩祠己卯遣官祭長洲縣周言子遊祠宋韓世忠祠本朝湯斌祠張伯行祠陳鵬年祠吳縣周泰伯祠宋范仲淹祠乙酉遣官祭嘉興府唐陸贄祠錢塘縣唐錢鏐祠宋嶽飛墓明于謙墓本朝徐潮墓三月乙未以故大學士徐本入浙江賢良祠遣官致祭先是二月庚寅諭昨至浙江省城禮部未奏請遣祭故大學士徐本詢其故則以未入賢良祠例不致祭為對徐本厯事兩朝宣力多年勤勞懋著即如前者過常州時已故之巡撫潘思矩禮部尚猶奏請徐本視潘思矩為何如耶朕巡幸所經郡縣名臣舊輔皆即致祭乃國家念舊酬功之典該部自當慎重辦理何得膠柱鼓瑟乃爾徐本著入本省賢良祠並著該部奏請遣官致祭臣等謹按十六年二十二年皇上南巡至浙江駐蹕西湖皆駕臨唐臣錢鏐表忠觀戊申遣官祭上元縣晉卞壺廟宋曹彬廟明徐達墓常遇春墓李文忠墓方孝孺等一百一十八人祠江寧縣本朝于成龍祠傅臘塔祠二十七年春聖駕三舉南巡遣官祭唐臣許逺張巡祠及本朝大學士陳元龍陳世倌蔣溥等墓奠酒時禮部奏準先儒名臣非嶽鎮海瀆先聖先師可比前於聖駕南巡已於兩次邀恩致祭此次無庸讀文致祭屆期繕扈從大臣名籖恭候欽點拈香奠酒其遣祭之處與二十二年同又奏準唐臣許逺張巡合祠遣官致祭又奉諭大學士陳元龍陳世倌蔣溥等墓俱遣官奠酒三十年春聖駕四舉南巡遣官往大學士史貽直墓奠酒其遣祭之先儒名臣與二十七年同時奉諭朕清蹕時巡所有經過地方大臣祠墓在三十里以內者例俱遣官致祭原任大學士史貽直之墓雖逺在漂陽念其宣力年久亦著加恩一體遣祭以示優恤三十六年聖駕東巡躬謁元聖周公廟遣官至禹王廟仲子祠任子祠拈香周尹吉甫墓奠酒三十八年二月壬戍命修葺睿親王園陵是日奉諭旨睿親王多爾衮當世祖章皇帝沖齡踐祚時攝政有年威福自専不能恪盡臣節身沒之後因其屬人首告經諸王大臣定罪除封成案具在苐念我朝定鼎之初睿親王實先統衆入關肅清京輦檄定中原前勞未可盡泯今其後嗣廢絶而塋域之在東直門外者嵗久益就榛蕪亦堪憫惻著交內務府派員前往視其墻屋傾頽酌加繕葺仍為量植松楸並準其近支王公等以時祭掃用昭朕篤念成􅈴瑕瑜不掩之至意三十九年二月庚戌上謁東陵禮成後詣故大學士公傅恆塋酹酒四十一年二月壬戍上謁泰陵遣官至故大學士公傅恆塋致祭時奉諭旨朕躬謁陵寢俱出派王大臣祭奠沿途王等園寢嗣後原任大學士公傅恆亦著入於祭奠之內一體出派三月丁酉上以金川全境蕩平恭奉皇太后安輿告功闕里詣元聖廟行禮四月壬寅上駐蹕王老口大營詣禹王廟拈香四十三年八月癸未上恭謁盛京祖陵禮畢臨克勤郡王墓酹酒甲申上詣額駙揚古利墓公費英東墓公額亦都墓各酹酒四十五年春聖駕五舉南巡遣官祭已故尚書錢陳羣墓其遣祭之先儒名臣與三十年同時奉諭旨朕鑾輅時巡凡大學士祠墓在三十里內者例俱遣官致祭已故尚書錢陳羣向在內廷行走人品學問俱優著加恩派達椿前往致祭以示眷念舊臣之意四月己巳上駐蹕王老口大營詣禹王廟拈香四十八年九月丙午上詣盛京恭謁祖陵禮畢臨克勤郡王墓酹酒丁未上臨公費英東公額亦都墓各酹酒四十九年春聖駕六舉南巡遣官致祭之先儒名臣祠墓與四十五年同皇帝東巡遣官釋奠元聖周公儀先期行在太常寺奏遣正獻官分獻官各一人預具祝文翰林院隨時撰擬香帛授遣官齎往前期姬氏子孫率祀生潔掃廟宇內外守土官戒辦牲牢器物備執事人司祝司香司帛司爵通贊引贊均以本族祀生及弟子員充先一日遣官至境乃齋其夕守土官公服視割牲如儀越日昧爽率祀生入廟供具陳周公位前羊一豕一登一鉶二簠簋各二籩豆各八爐一鐙二魯公配位前陳設同設案一於中少西供祝文司祝一人立於其南設案一於東陳禮神制帛二色白香盤二尊二爵六冪勺具司香司帛司爵各二人立於案後設洗於階下之東通贊一人立於門左引贊四人俟於廟大門內均服其服質明遣官朝服詣廟引贊二人引正獻官入二人引分獻官隨入詣東階下盥手升東階至階中正獻官在前分獻官在後均北面通贊贊就位引贊分引遣官就拜位通贊贊迎神司香二人各奉香盤進至正位配位前立引贊引正獻官入自闑東詣周公位前引分獻官隨入詣魯公位前贊跪遣官跪贊上香遣官上炷香三上瓣香興贊復位遣官均復位立贊跪叩興遣官均行二跪六叩禮興通贊贊行初獻禮司帛各奉篚跪奠於案三叩興司爵各奉爵獻于案正中皆退通贊贊讀祝引贊贊跪遣官皆跪司祝至祝案前跪三叩奉祝文跪案左讀訖復于案三叩興退引贊贊叩興遣官均三叩興亞獻各奠爵于左三獻各奠爵於右如初儀通贊贊送神引贊贊跪叩興遣官均行二跪六叩禮興執事官各奉祝帛香由中道送燎如儀遣官避立拜位東俟過引贊引遣官視燎禮畢引遣官出執事官皆退皇帝時巡方嶽前代聖賢忠烈祠墓暨本朝賢臣墓在御道三十里內者遣官致祭儀前期翰林院具祝文隨時隨人撰擬太常寺備香帛授遣官齎往祭日守土官于祭所設洗備脯醢果實七盤品物各隨其土産爐鐙具左設一案供祝文右設一案陳香盤一帛一尊一爵三通贊一人引贊二人司祝香帛爵各一人以所在禮生充黎明遣官朝服至所祭地引贊引詣盥洗所盥手畢通贊贊執事者各司其事引贊贊就位引遣官詣拜位前立通贊贊迎神引贊引遣官詣香案前司香奉香跪於左引贊贊上香遣官上香如常儀贊復位遣官退復位贊跪叩興遣官行二跪六叩禮興通贊贊奠帛爵行初獻禮司帛獻篚司爵獻爵如常儀贊讀祝司祝奉祝文立案左宣讀訖安于篚內退亞獻終獻均如初儀通贊贊送神引贊贊跪叩興遣官行二跪六叩禮興通贊贊奉祝帛送燎執事者各奉祝帛香以次送燎通贊贊望燎引贊引遣官詣燎爐前視燎禮畢引遣官退執事者皆退皇朝文獻通考卷一百二十二
