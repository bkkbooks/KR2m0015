body:
  text: 輿地考二十一雲南省臣等謹按雲南居古南交昧谷之間為蠻夷之域自彩雲南見肇啟漢疆所謂度博山而越蘭津者此雲南之始通也兩漢以後稍増置州郡而時没於蠻馬氏四裔考南蠻内所列南詔驃國及東爨西爨諸蠻皆今雲南地而輿地考梁州境内之姚州即今姚安府其戎州都督府之覊縻三十二州又半為今雲南曲靖澂江臨安楚雄諸府地是今雲南一省馬氏輿地四裔二考實互載焉蓋其僻處西南本不在古九州之限雖有覊縻諸州實與中土郡縣不同逮天寶以後且盡為南詔所有則其入之於四裔固宜也自元迄明始開置路府徧設官司然半猶土酋世守元則以同姓諸王董理其事明則以沐氏世為重鎮苐視為藩服而已國家聲教四訖越裳交阯悉貢悉朝是以萬里滇南宛同腹地我皇上徳威逺播綏靖炎荒象譯諸蠻咸思内面近者九龍江外掃蕩莽夷凡猛勇猛竜補哈猛撒整賣景線諸地方從古所視為化外者莫不向風慕義相率輸誠版籍之遥直踰南徼彼前代所為標銅作界畫斧分疆者又豈可同論哉雲南明雲南等處承宣布政使司治雲南府領雲南澂江廣西廣南鎮沅臨安大理楚雄順寧䝉化景東永寧十二府武定曲靖㝷甸元江姚安永昌麗江鶴慶八軍民府北勝一州又置雲南都指揮使司領雲南等十八衛又置瀾滄騰衝二軍民指揮使司領木密闗等處七守禦千戸所本朝初因之設雲南巡撫及布政使司按察使司皆駐雲南府設雲貴總督兩省互駐康熙元年専設雲南總督駐曲靖府四年復為雲貴總督駐貴陽府兼轄雲南八年降㝷甸府為州屬曲靖府二十二年移雲貴總督駐雲南府三十七年升北勝州為永北府以永寧土府屬於永北府雍正二年改威逺土州為直𨽻同知㕔四年改四川之東川軍民府來屬五年又改四川之烏蒙鎮雄二軍民府來屬六年降鎮雄為州屬烏䝉府七年置普洱府又定雲貴總督兼轄廣西八年置開化府九年改烏䝉府為昭通府十三年令雲貴總督停轄廣西乾隆元年定雲貴各分設總督十二年仍為雲貴總督三十年定武定曲靖東川元江永昌等府俱罷稱軍民府三十五年省姚安府入楚雄府省鶴慶府入麗江府改廣西武定元江鎮沅四府俱為直𨽻州改䝉化永兆景東三府俱為直𨽻同知㕔凡領府十四直𨽻州四直𨽻㕔四各衛所俱以次裁改入州縣東西距二千五百十里南北距一千一百五十里東至廣西泗城府界七百五十里西至神䕶闗接野夷界一千七百六十里南至交阯界七百五十里北至四川㑹理州界四百里東南至廣西鎮安府界一千一百四十里西南至天馬闗接緬甸界二千三百十里東北至貴州普安州界四百三十里西北至西藏界二千里在京師西南八千二百里雲南府為省治東西距三百七十里南北距二百九十八里東至澂江府路南州界一百二十五里西至楚雄府廣通縣界二百四十五里南至澂江府新興州界一百五十五里北至曲靖府㝷甸州界一百四十三里東南至澂江府河陽縣界八十四里西南至楚雄府南安州界四百二十二里東北至㝷甸州界二百三十里西北至武定州界一百六十里自府治至京師八千二百里明為雲南府領州四縣九本朝初因之康熙八年省歸化縣入呈貢縣省三泊縣入昆陽州雍正三年又以三泊縣故地改入安寧州凡領州四縣七昆明縣附郭富民縣在府西北七十里宜良縣在府東一百二十里羅次縣在府西北一百三十里晉寧州在府南九十里呈貢縣在府南四十里安寧州在府西七十里禄豐縣在府西北二百十里昆陽州在府南一百二十里易門縣在府西南二百五十里嵩明州在府東北一百三十里曲靖府在省治東北三百里東西距三百九十里南北距六百二十里東至貴州南籠府普安州界一百七十里西至雲南府嵩明州界二百二十里南至廣西州界一百七十里北至貴州大定府威寧州界四百五十里東南至普安州界二百五十八里西南至澂江府路南州界一百三十里東北至威寧州界二百七十里西北至武定州禄勸縣界四百六十七里自府治至京師七千九百里明為曲靖軍民府領州四縣二本朝初因之康熙八年降㝷甸府為州來屬又省亦佐縣入羅平州三十四年増置平彞縣雍正五年増置宣威州乾隆三十年裁軍民府之名稱為曲靖府凡領州六縣二南寧縣附郭霑益州在府北三十里元置霑益州在今宣威州境此為交水縣地本朝順治十六年移今治陸凉州在府南一百二十里元置州舊治今州東北境本朝康熙五年移今治馬龍州在府西南五十里羅平州在府東南二百七十里㝷甸州在府西一百三十里明尋甸軍民府舊治今州東境後移今治本朝康熙八年降為州來屬平彝縣在府東北九十里明置平彞衛縣本朝康熙三十四年改為平彞宣威州在府東北二百三十里雍正五年析霑益州地置州澂江府在省治東南一百二十里東西距二百三十六里南北距一百七十五里東至廣西州彌勒縣界二百里西至雲南府晉寧州界三十六里南至臨安府寧州界一百二十里北至雲南府呈貢縣界五十五里東南至彌勒縣界二百五十三里西南至臨安府㠄峩縣界二百十五里東北至雲南府宜良鄉界七十里西北至呈貢縣界一百三十里自府治至京師八千三百二十里明為澂江府領州二縣三本朝初因之康熙八年省陽宗縣入河陽縣凡領州二縣二河陽縣附郭江川縣在府西南九十里新興州在府西一百二十里路南州在府東一百三十里廣南府在省治東南八百五十里東西距七百二十里南北距四百三十里東至廣西土田州界四百二十里西至開化府廣西州界三百里南至交阯界二百九十里北至廣西西林縣界一百四十里東南至廣西鎮安府界二百九十里西南至臨安府阿迷州界四百里