body:
  text: 戶口考二八旗戶口國初八旗人丁每三年編審一次令各佐領稽查已成丁者增入丁册其老弱幼丁不應入册有隱匿者壯丁入官伊主及該佐領領催各罰責有差凡置買人丁及新成幼丁令編入本佐領初定壯丁三百名為一佐領後改定為二百凡八旗新添壯丁每旗編佐領三十有逃亡缺少者於諸王貝勒貝子等府壯丁內撥補仍將該佐領治罪又定家下壯丁首先登城者準其開戶並將胞兄弟嫡伯叔帶出仍償原主身價順治元年凡旗下漢人有父母兄弟妻子情願入旗者地方官給文赴部不許帶田地投獻三年定漢人投充旗下永行禁止九年內府及諸王府官員有勞績素著者特選數員令其開出府佐領各歸所屬佐領其父子兄弟見有職任者不準帶出十七年定凡官員子弟有職任者不拘定限嵗數準其分户先是旗員子弟年十八以上載部册後方許分居如未及嵗擅分居者議罰至是有此令康熙二年定凡投充人父兄伯叔住種滿洲房地子弟姪看守故土墳塋或子弟姪住種滿洲房地父兄伯叔看守故土墳塋者行地方官察其輸糧在先紅册有名者即斷為民如投充後輸糧者仍斷與旗人四年令滿洲蒙古佐領內餘丁多至百名以上願分兩佐領者聽十三年八旗每佐領編壯丁一百三四十名餘丁彚集另編佐領或所餘丁僅百名以上者該旗王貝勒貝子公等併都統副都統佐領酌驗無誤披甲當差出結送部亦準編作佐領二十三年諭八旗滿洲蒙古每旗均設佐領百員雍正二年禁開檔之人越佐領認户八旗開檔為義子之人係年老無嗣不能當差又無産業故令其披甲養贍伊身若不思原主之恩越佐領自稱正戶者交部從重治罪四年諭上三旗定設漢軍四十佐領下五旗定設漢軍三十佐領是年屆編審之期令八旗都統及直省駐防都統將軍等交與各佐領驍騎校領催將新舊壯丁逐户開明并編審各官姓名保結送部其未成丁及非正身良家子弟并應除人丁驗實開除至烏喇打牲人丁户部派筆帖式前往編審五年申造編審丁册之令凡編審丁册每户書另户某人某官無官者則曰間散某上書父兄官職名氏傍書子弟及兄弟之子及户下若干人或在籍或他往皆備書之其各省駐防旗員兵丁及外任文武各官子弟家屬令各該將軍督撫造册咨送該旗嗣後三年一次編審俱如之七年定八旗正身壯丁年十五以上該管官查無假冒方準入册十三年定八旗壯丁或寓親友或流落鄉屯向未入丁册者限六月首報補入若潛匿私往他所者以逃人論乾隆三年定旗人開戶例凡八旗奴僕原係滿洲蒙古直省本無籍貫帶地投充人等雖有本籍年逺難考均準其開戶不得放出為民四年又議國初俘獲之人年分已逺及印契所買奴僕之中有盛京帶來帶地投充之人係旗人轉相售賣均應開戶不準為民又八旗戶下家人有本主念其世代出力準令開戶者亦準其開戶又議乾隆元年以前八旗家奴經本主放出已入民籍者準其為民若係乾隆元年以前放出至元年以後始入民籍者令歸旗作為原主戶下開戶壯丁至於贖身之戶均歸原主佐領下作為開户六年復定八旗造丁册之例凡編審各佐領下已成丁及未成丁已食餉之人皆造入丁册分别正身開戶戶下於各名下開寫三代履厯其戶下人祖父或係契買或係盛京帶來或係帶地投充或係乾隆元年以前白契所買分别注明正戶之子弟均作正身分造餘俱照舊例又定開戶養子别行記檔之例八旗開戶養子因出兵陳亡及軍功列一等二等改為另戶者别記檔案又國初投充俘獲入旗之人後經開戶及民人之子旗人抱養為嗣或因親入旗或良民之子隨母改嫁入於他人戶下或旗奴開戶及旗奴過繼與另户為嗣已入另戶檔內後經首明者亦别記檔案令該旗造册三本一存旗一咨戶部一咨呈宗人府存案不得與宗室聨婚如别記檔案之人冒入另戶檔內者交部治罪七年諭八旗漢軍其初本係漢人有從龍入關者有定鼎後投誠者有緣罪入旗與夫三藩戶下歸入者內務府王公包衣撥出者以及召募之炮手過繼之異姓并隨母因親等類先後歸旗情節不一其中惟從龍人員子孫皆係舊有功勳無容另議更張其餘各項人等或有廬墓産業在本籍者或有族黨姻屬在他省者朕意欲稍為變通以廣其謀生之路如有願改歸原籍者準其與該處民人一例編入保甲有願外省居住者準其前往居住此內如有世職仍許其承襲不願出旗者聽之所有願改歸民籍及願移居外省者限一年內具呈本管官查奏如此屏當原為漢軍人等生齒日多籌久逺安全計出此特恩後不為例此朕格外施仁原情體恤之意非逐伊等使之出旗亦非為國家糧餉有所不給可令八旗漢軍都統等詳悉曉諭八年諭前降諭旨八旗漢軍人等有願改歸民籍及移居外省者準其具呈本管官查奏原指未經出仕及微末之員而言至於服官既久世受國恩之人其本身及子弟自不應呈請改籍朕亦不忍令其出旗嗣後文職自同知等官以上武職自守備等官以上不必改歸民籍十二年諭曰朕觀漢軍人等或祖父曾經外任置有房産或有親族在外依賴資生及以手藝潛往各省居住者頗自不少按之功令究屬違例與其違例潛居孰若聽從其便亦可各自謀生嗣後八旗漢軍人等願在外省居住者在京報明該旗在外呈明督撫不拘逺近任其隨便散處該督撫咨明該旗每年彚奏一次以便稽察務令安靜營生毋得強橫滋事如此則於功令不相妨礙伊等亦得安居樂業生計有資矣二十一年諭八旗别載册籍之人原係開户家奴冒入正戶後經自行首明及旗人抱養民人為子者至開户家奴則均係旗下世僕因效力年久其主願令其出户凡遇差使必先儘正户正身選用之後方準將伊等選補欲自行謀生則又以身隸旗籍不得自由今八旗户口日繁與其拘於成例致生計日窘不若聽從其便俾得各自為謀著加恩將見今在京八旗在外駐防內别載册籍及養子開戶人等皆準其出旗為民其情願入籍何處各聽其便所有本身田産並許其帶往此次辦理之後隔數年候朕酌量降旨此內不食錢糧之人即令出旗外其現食錢糧之人若一時遽令出旗於伊等生計不無拮據其如何定以年限裁汰出旗之處交與該部會同八旗都統等詳悉定擬具奏嗣戶部八旗都統會議凡在京文武官員其作何調補漢缺之處交吏兵二部定議其外任緑營員辨及文職等官應即令出旗為民至現在捐納候缺人員并間散進士舉人生員翻譯進士舉人生員等亦即準其為民其如何考試録用之處應交吏禮兵等部辦理又間散人等令各該旗詢明願入籍何處由該旗徑咨該地方官入籍仍造册咨送戶部存查至現食錢糧之人除情願退糧為民者一體辦理外其餘現在當差人等俟缺出時裁汰又外省駐防官兵間散內令該將軍大臣等詢明願入何省民籍造册咨送該旗仍咨報戶部轉行地方官又開戶人等內有設法贖身經部辦理作為公中開檔者若準一例為民誠恐漫無區别或給與內務府莊頭名下作為壯丁或應準其為民八旗詳悉查明會同戶部分别請旨又另記檔案人等缺出裁汰後該佐領處並無應挑之人請將佐領下額外當差食餉之人頂補至佐領驍騎校官員仍令在旗當差如係另戶仍以旗缺對品坐補如係另記檔案俟屆應升之期亦交該部辦理奏入得旨允行又諭宗室王公包衣戶口向有因其效力年久咨請撥附旗下佐領者現今八旗另記檔案及養子開戶俱經察明辦理如仍舊準其撥附則旗人衆多伊等不能遽得錢糧生計未免艱窘彼此均無裨益嗣後宗室王公包衣戶口撥附旗下佐領之處著停止再宗室王公等包衣戶口滋生日繁該王公養贍亦恐拮據著該宗室王公等會同各該旗都統等將各包衣戶口察明辦理一次隔數年候酌量降旨庶此項人等均得一體謀生該王公都統等即行遵旨辦理二十五年定清釐旗檔之例一另戶旗人抱養民人之子及家人之子為嗣者從重治罪一民人之子自幼隨母改嫁與另戶旗人者該旗詳記檔案俟成丁後令其為民一另記檔案養子開戶人等業經出旗為民如有復冒入旗籍者從重治罪一旗下家人之子隨母改嫁與另户者民人之子隨母改嫁與旗下家人者及家人抱養民人之子者均以户下造報一八旗投充户口凡旗檔內有名者造丁册一分送部一分發該地方官備案如有事故頂充於比丁册內聲明報部轉行該地方注册備查至伊等之弟兄叔姪不在旗檔者責令地方官逐一清查編入里甲以免混淆又定跟役軍功出户之例凡官兵跟役臨敵時有能超越前進殺賊敗賊者本人及父母妻子俱準出佐領為另户仍給還本主身價其跟役有陳亡蒙恩準其子弟為民者本主係官不給身價係兵照例給價二十六年定漢軍為民之例凡八旗漢軍現任外省自同知守備以上京員自主事以上旗員自五品以上俱不準改歸民籍其父在旗而子願為民子在旗而父願為民者亦不準改籍其餘願改歸民籍者在京報明該旗咨部轉行各省在外呈明督撫咨報部旗編入民籍並準一體考試凡出旗為民年已成丁者該州縣給與印票以便稽查自京入省入籍者該旗給照前往至入籍地方换給印票其願入順天府州縣者該旗交送順天府二十八年定八旗逃人之例凡八旗滿洲蒙古逃走在一月以內自行投回及拏獲者連家屬派往伊犁賞給步甲錢糧當差若仍不悛改復行逃走即於旗檔內將名籍消除如逾一月以外投回將旗檔圈銷照例發遣其漢軍在一月以內投回者免罪拿獲者分别次數照例治罪如逃走至三次及在一月以外不論投回拏獲照民人犯流罪例安插為民同妻削除旗檔二十九年定軍功另戶之例凡八旗另記檔案養子開戶內有現食錢糧未經出旗之人或因在軍營著有勞績或因技藝出衆蒙恩作為另户者其父母子弟及親弟兄俱準作另戶三十一年定迷失幼丁之例凡八旗迷失幼丁在十五嵗以下者該管官取具本家及族長册結咨部知照各旗及步軍統領衙門都察院順天府一體查緝獲日咨旗認領不更治罪如在十五嵗以上照逃人例辦理其十五嵗以前失迷十五嵗以後始行投回者如係素好遊蕩不肖性成亦照逃人例辦理如實係愚蒙幼稚本無惡習者奏明請旨三十三年刑部議覆伊犁將軍阿桂奏伊犁兵丁或自京犯逃發往或由他處移往駐防及既經逃逸復有初次二次之不同且有拏獲投回之互異請通計次數情節分别示懲以昭炯戒得旨允行三十七年將軍增海等具奏盛京各佐領下所有馬甲多寡不等請裁馬甲添設步甲其餘剩錢糧併隨缺地畝入於正項報銷經軍機大臣會同該部覆準具奏諭盛京額設馬甲並隨缺地畝皆為養贍該處滿洲而設今年久生齒日繁若將伊等應得分例裁汰入官於伊等生計殊屬無益如現在京中八旗户口繁盛生計不無拮據經朕特沛恩施另賞鰥寡孤獨錢糧以資生理其派往西安涼州莊浪寧夏兵丁俱照所派之額在京挑補又添兵缺甚多每年帑金不下數萬並無吝惜盛京滿洲皆朕臣僕人丁日盛自宜酌量添給豈有轉將伊等現在應得分例裁汰之理今各佐領下馬甲額設不均固宜均行辦理但此項裁汰錢糧地畝亦宜斟酌養贍多人或添設步甲或作為養育兵俾衆人均沾實惠著將此項裁汰之馬甲三百六十名錢糧交增海等或添設步甲或添設養育兵惟期普被恩施辦理具奏其隨缺三千一百六十晌如何使衆人均有裨益之處並著增海等定議具奏將此通諭中外示朕優恤滿洲至意嗣經將軍增海等奏裁汰馬甲應添步甲三百八十八名仍照原奏添設外餘剩銀二千六百一十六兩請添設每月食五錢錢糧養育兵四百三十六缺分給八旗滿洲蒙古漢軍各佐領下仍按鰥寡孤獨人等之多寡酌量添設以資養贍又請將裁汰隨缺地畝租銀六百三十四兩零每年賞給步甲三百九十六名每名銀一兩六錢置買皮襖穿用共步甲一千一百八十八名三年內可以均沾實惠嗣後隔二年各兵可得皮襖一件又請將現議養育兵內勻出一百四十分錢糧賞給盛京官學生以資學習於造士實有裨益經部議得旨允行三十九年戶部議盛京將軍宗室𢎞晌等奏請將各屬陸續查出遺漏人丁遵照乾隆二十七年恩旨作為另户查現在查出遺漏正身户口與另記檔案遵限自行呈首之人不同日久遷延難免藉端滋弊請旨賞限一年仍交盛京戶部會同該將軍詳慎確查務得實在根據疏入從之臣等謹按編審丁册每户書另户某人某官無官者則曰間散某或在籍或他往皆備書之至八旗正身壯丁年十五以上該管官查無假冒方準入册又八旗壯丁或寓親友或流落鄉屯向未入丁册者準其首報補入惟開户養子則有另記檔案之例如冒入另户檔內罪之凡以慎稽察而杜潛匿法至善也今查出遺漏正身與另記檔案之人不同展限確查庶不遷延而滋弊矣四十三年定編審打牲壯丁之例向例八旗壯丁三年編審一次烏拉打牲人丁户部派出旗員筆帖式前往編審若有假冒隱匿等情將該都統及領催等俱行治罪至是吉林將軍福康安奏請編審打牲壯丁停派京員今該將軍就近編審造册加具保結送部如有隱冒查實題參疏入得旨允行四十四年軍機大臣等議覆盛京將軍福康安奏盛京旗人並旗下家奴攜帶眷口在吉林地方種地共四十户一百八十二名口內除正身旗人仍拿解本處照例辦理其盛京兵部工部內務府之壯丁並王公宗室之家奴及旗下家奴請入於吉林官莊耕種納糧當差并飭該管官嚴加約束毋許滋事如再有犯逃者獲日不論次數刺字發駐防兵丁為奴等因奉旨盛京吉林均係國家根本之地境壤毗連盛京旗人潛往吉林種地謀生本無關礙並非旗逃可比從前𢎞晌奏請解回治罪之處所辦原屬過當伊等皆滿洲世僕盛京吉林有何區别其正身旗人六户即著入於吉林當差毋庸解回盛京辦理餘依議軍機大臣議覆黑龍江將軍富玉等奏黑龍江各城地方厯年由部發遣人犯隨來子女內有聨親生子又旗人內挑取兵丁得力者放出另行居住至今各城滋生共四百三十九户詳訊伊等有情願回籍者四十二户勒催起程有不曉原籍及另住旗人家奴等此二項人若歸一處不能管理難保其不滋事端請於此二項三百九十七户五百三十六名內減半揀選壯丁在於齊齊哈爾黑龍江城墨爾根各官莊每年照例交糧各官莊設立領催一二名餘人入於各城舊官莊册內以便挑補壯丁缺從之四十六年諭向來各省駐防滿洲已安居百有餘年京城並無伊等近族而京城滿洲生齒日繁若準其進京無以為生反為無益是以概不準其來京自開闢新疆分派官兵前往駐劄以來在京滿洲陸續駐防各省者甚多此內亦有派往駐防時因子弟在京當差仍留在京者為伊等在駐防處年老退休並無依倚之人即不免失所朕心深為不忍嗣後各省新派駐防人員內如有年老休退實無依倚之人京中尚有子嗣意欲就養者著該將軍等查明令其回京就養但一概由官辦理回京則不願在彼之人不無借端皆欲回京反非朕愛惜旗人之意其老年退休欲回京就養者著令自備資斧來京不必由官辦理著為令奴婢天聰六年諭家僕訐告伊主二事以上重罪有實據而輕罪虛者不以誣告論準出戶如開列欵內一欵有實據者亦不以誣告論若各欵俱實原告準出戶各欵俱虛及虛實相半者原告俱不準出户訐告二事以上輕罪有實據而重罪涉虛或止告一事而以輕為重者除實欵應坐外其誣告之欵反坐原告不準出户互見刑考崇德元年令家僕告主審實者原告撥與他人為奴順治三年頒行大清律凡收留人家迷失子女不送官司而賣為奴婢者若收留在逃子女而賣為奴婢及自收留為奴婢者若冒認良人為奴婢及冒認他人奴婢者皆有罪凡家長與奴娶良人女為妻及妄以奴婢為良人而與良人為夫妻者俱有罪仍離異改正凡奴婢告家長及家長緦麻以上親者與子孫告祖父罪同若雇工人告家長及家長之親者各減奴婢罪一等凡奴婢毆良人者加凡人一等其良人毆傷他人奴婢者減凡人一等八年諭凡原在盛京編審另分户人有告稱係伊奴僕者勿聽係户籍內人有告稱非伊家奴僕者亦勿聽九年令陳獲人口準其贖回凡有贖人者令嫡親家屬領歸其已經轉賣者身價兩家各取其半先是順治五年議俘獲人口有將其父子夫婦分賣者仍令給還完聚賣主鞭責至是有此令至康熙三十年又定出征所獲之人有親戚情願來旗完聚者不得作為奴婢願回本籍者聽康熙二年定八旗買賣人口兩家赴市納稅記册令領催保結若係漢人令五城司坊官驗有該管官印票準賣永著為例八年諭差遣官員並督撫提鎮大小各官不許買良民為奴及轉相餽送永行禁飭違者照略賣良民例治罪又定旗下買民為僕者令本管官用印違者所買之人釋放為民兩主各鞭責有差至十八年又定用印衙門呈送户部轉行該地方官曉諭里甲有不報部者分别降罰又定有將定例所買之人揑作定例前年月用印者用印官及兩主俱加等治罪十一年申買人用印例凡在順治十年以前買人未用印信中證明白及本人自稱賣身是實者俱斷與買主自順治十年以後買人雖有中保未用印者斷出為民十七年定滿漢違例買賣人罪滿洲蒙古人口不許賣與漢軍民人亦不許私贈違者將人口併價入官仍治買賣之罪其喀爾喀厄魯特人亦照此例滿洲蒙古家人其主準令贖身在本佐領及本旗下者聽若違禁放出為漢軍民人者照買賣例治罪至雍正三年又定滿洲蒙古家下開檔另户人等有懶惰不能度日串通原主賣身賣後又稱滿洲肆行囮詐買主者將伊原主一併治罪仍給後買之主為奴二十一年定旗下印劵所買之人及舊僕內有年老疾病其主準贖者呈明本旗令贖為民若將年壯舊人借名贖出者照買賣例治罪二十六年諭駐防滿洲漢軍將軍以下官員兵丁在本省買人如有不行查原籍勒令地方官用印者著督撫指名題參三十九年禁鹽竈户賣身旗下犯者枷三月杖一百回籍著役仍追還原主身價五十三年準四十三年以前白契所買之人俱斷與買主四十三年以後若給原價仍準贖出為民雍正元年定白契買人例自康熙四十三年起至六十一年止白契所買之人俱不準贖身雍正元年以後若給原價俱準贖為民其妻亦準贖出若賣身後買主配有妻室者不準贖三年申家僕告主之禁凡家僕告主除謀反謀叛隱匿姦細許其首告外其首告他事者所告之事不準行仍杖一百又定旗下奴僕借名買贖罪例旗下奴僕或借别旗名色買贖或自行贖身本旗及州縣册籍俱無姓名者察出即令歸旗其有隨家主出差在外私有積蓄欺壓本主贖身者雖在民籍亦令歸旗若果係數輩出力之人伊主聽其贖身本旗户部及州縣有檔册可據者仍歸民籍舊主子孫不得借端控告四年諭厯來滿洲風俗尊卑上下秩然整肅最嚴主僕之分家主所以約束奴僕者雖或嚴切亦無不相安為固然及見漢人凌蕩之俗彼此相形而不肖奴僕遂生觖望雖約束之道無加於疇昔而向之相安者遂覺為難堪矣乃至一二滿洲大臣潛染漢人之俗亦寬縱其下漸就陵替此於風俗人心大有關係不可不加整飭夫主僕之分一定則終身不能更易在本身及妻子仰其衣食賴其養生固宜有不忍負背之心而且世世子孫永逺服役亦當有不敢縱肆之念今漢人之奴僕乃有傲慢頑梗不遵約束加以訶責則輕去其主種種敝俗朕所洞悉嗣後漢人奴僕如有頑傲不遵約束或背主逃匿或私行訕謗被伊主覺察者應作何懲治與滿洲待奴僕之法作何畫一之處著定擬具奏嗣議定漢人家生奴僕印契所買奴僕並雍正五年以前白契所買及投靠養育年久或婢女招配已生子者世世子孫永逺服役婚配俱由家主仍造册報明地方官存案嗣後漢人買僕及婢女招配併投靠之人俱立契呈明地方官鈐蓋印信其奴僕誹謗家長并雇工人罵家長等欵俱有律例應照滿洲主僕論有背主逃匿者照滿洲家人逃走例雇工人限內逃匿者照滿洲白契所買家人逃走例其隸身門下為長隨者有犯亦照典當雇工人論乾隆三年定自乾隆元年以前白契所買作為印契者不準贖為民四年令奉天買賣人口該管官驗明文契鈐蓋印信注册二十一年定駐防官員買本省民為奴例凡直省駐防各官不許買本省之民為奴違者降二級調用若縱令家人買者處分亦如之該管官失察降一級留任其駐防兵丁量許買人不得過二人違者計口論罪令賣身人親至地方官處取具親供用印存案若未經取有親供文契雖有情願字樣實為勒買者買主枷一月鞭一百若本官囑兵丁買者照本官買人例議處二十四年定八旗户下家人贖身例凡八旗户下家人不論逺年舊僕及近嵗契買奴僕如實係本主念其數輩出力情願放出為民或本主不能養贍願令贖身為民者呈明本旗咨部轉行地方官收入民籍不準求謀仕宦至伊等子孫各照該籍民人辦理倘有借他人名色認買私自出旗或將子孫改姓潛入民籍者照例治罪斷歸本主有鑽營勢力欺壓幼孤贖身為民者倍追身價給主將人口賞給各省駐防將軍副都統為奴如係本身得銀放出潛入民籍者止科其不行呈報之罪仍準為民二十五年令吉林寧古塔伯都訥拉林阿勒楚喀等處旗下家奴之女不許給與民人違者治罪二十八年定入官人口之例凡入官人口年在十嵗以上至六十嵗者每口作價銀十兩六十嵗以上作銀五兩九嵗以下每一嵗作銀一兩未周嵗免其作價三十七年九月定發遣家奴妻室一體同發諭向來旗下家奴有酗酒行凶者一經本主報明該旗即行送部發遣其妻室有年老殘廢及不願隨帶者俱不同發定例未為周密如近日秦璜即有將發遣家奴之妻留占為妾之事不可不另定章程以防流弊蓋家奴犯法其妻亦屬有罪之人自當一體發遣但此等犯罪旗奴自不值官為資送或其中果有實在不能隨帶者或令親屬依棲或聽本婦另嫁自不便仍留服役以杜嫌疑嗣後該旗遇有發遣家奴之案俱照此辦理四十三年刑部議步軍統領衙門咨趙大扎傷雇主文元身死擬斬立決奉諭此案三法司議趙大依雇工人毆家長至死律擬以斬決固屬照例問擬朕詳閲案情該犯之母徐氏雖經立契典與文元家得過身價而典限滿後契已給還嗣因母子仍在文元家得工錢服役又經辭出在外居住究與現在雇工者有間且起釁之由係文元因趙大積有餘資屢次尋閙既搬取其皮箱又復扭住毆打致趙大情急扎傷尚非該犯逞凶干犯趙大著從寬改為應斬監候秋後處決餘依議至八旗家奴及雇工人等經本主放出及辭出之後或積有餘資感念舊恩助其家長亦屬情理所有而為家長者受之似覺有愧若因主僕舊時名分冀其資助多方需索尤屬無恥若此案趙大母子雖仍在文元家服役業已辭出另居即典置房屋亦係其能節省經營所致與舊時雇主何涉乃文元屢次尋釁並因其母子外出踢門搬取箱籠行同無賴更不足齒矣但恐旗人內如此者難保其必無著將此旨曉諭八旗人等各自顧惜顔面無蹈覆轍四十八年諭向來滿漢官員人等家奴在本主家服役三代實在出力者原有準其放出之例此項人等既經伊主放出作為旗民正身亦未便絶其上進之階但須明立章程於録用之中仍令有所限制嗣後此等旗民家奴合例後經該主家放出者滿洲則令該家主於本旗報明咨部存案漢人則令該家主於本籍地方官報明咨部存案經部覆準後準其與平民一體應考出仕但京官不得至京堂外官不得至三品以示限制著為令皇朝文獻通考卷二十
