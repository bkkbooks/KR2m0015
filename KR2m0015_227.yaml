body:
  text: 經籍考十七子雜家臣等謹按雜家一門昉於班史雜之義廣無所不包隋志所謂兼儒墨之道通衆家之意見王化之無不貫也顧名墨縱橫之屬今已無書黃虞稷千頃堂書目雖併入雜家亦寥寥無幾至於兼綜六籍泛濫百家旁及名物象數之細者要皆雜氏之流品也指歸攸别為類綦繁四庫全書酌劑其宜析子目凡六首雜學次雜考次雜説次雜品次雜纂次雜編今從其例以補馬氏之未備焉息齋藏書十二卷裴希度撰希度字晉卿號中菴陽曲人崇禎甲戌進士官監察御史入國朝官至太常寺少卿希度例略曰自一卷至十卷皆古先聖賢之前言往行間出臆見以發攄其底藴十一卷之證可十二卷之麈談摘則同人之書札往來與夫坐談有涉名教者衡書三卷唐大陶撰大陶字鑄采夔州人官長子縣知縣格物問答三卷螺蜂説録一卷聖學真語二卷毛先舒撰先舒見經類臣等謹按先舒主王守仁之説而又過之竟以二氏為儒之根本欲混三教為一蓋末流之失彌巧而彌離其宗即守仁亦不料流弊之至於此極也潛齋處語一卷蒙訓一卷楊慶撰慶見經類理學就正言十卷祝文彥撰文彥字方丈海寧人聖學大成無卷數孫鍾瑞撰鍾瑞字子麟嘉興人臣等謹按是編所引皆講學之語當列儒家類中然其流品混淆如楊起元輩儼然自號比邱者亦厠簡牘不可訓矣故改録於此拳拳録二卷顔巷録一卷晚聞篇一卷李衷燦撰衷燦號梅村含山人官荆門州知州柏鄉魏氏傳家録二卷附家約一卷勸世恆言一卷魏裔介撰裔介見經類萬世太平書十卷勞大輿撰大輿見史類新婦譜一卷陸圻撰圻字麗京號講山錢塘人臣等謹按是編凡五十九條皆詳論為婦承順之道龍巖子集十二卷李丕則撰丕則曲沃人自號龍巖山人順治乙未進士官金溪縣知縣唾居隨録四卷張貞生撰貞生見史類圖書祕典一隅解一卷張沐撰其子煓注沐見經類煓仕履未詳潛書四卷唐甄撰甄字鑄萬達州人僑寓蘇州順治庚子舉人官長子縣知縣臣等謹按宋李覯先有潛書見旴江集甄殆未覩其書故偶同其名五倫懿範八卷不著撰人名氏舊本題曰天台鹿門子天方典禮擇要解二十卷劉智撰智字介亷江寧人回回之裔臣等謹按智嘗搜取回回國經典七十種譯為天方禮經復撮其要為此編蓋智雖宗回教頗習儒書文亦雅贍可觀然以僻謬之根柢欲借文詞以飾之此不可得之數也進善集無卷數張天柱撰天柱字孟高號擎菴秀水人懿言日録一卷二録一卷續録一卷别録一卷附禮闈分校日記一卷七規一卷王哲生撰哲生字素巖崑山人康熙壬戍進士官翰林院編修方齋補莊無卷數方正瑗撰正瑗字引除號方齋桐城人康熙庚子舉人官至陕西潼商道公餘筆記二卷張文炳撰文炳見經類文炳自序曰官浙江安吉州州判時嘗奉檄校刋欽定朱子全書御纂周易折中得益窺聖學之始終全體大用多所發明容膝居集雜録六卷葛芝撰芝字龍仙崑山人苕西答問一卷吳學孔録其師羅為賡講學語為賡號西溪南充人康熙中官烏程縣知縣續箋山房集略十八卷鄭道明撰道明字希濓號松岡懷寧人乾隆丙辰副榜貢生頤菴心言一卷喬大凱撰大凱見經類聖學逄原録十八卷金維嘉撰維嘉號潛川休寧人右雜家類雜學菰中隨筆三卷顧炎武撰炎武見經類義府二卷黃生撰生見經類藝林彚考二十四卷沈自南撰自南字留侯吳江人順治壬辰進士官山東蓬萊縣知縣汪汾序曰彚考所載諸書皆有辨正者閲之足以益智祛疑又所采必載書名令習其書者可一望而知欲觀原文者亦可按籍以求其體例皆非近世類書所能及修潔齋間筆四卷劉堅撰堅字青城無錫人堅自序略曰同邑顧宸有辟疆園習察一書綴輯未竟因刺取數十則以附益之天香樓偶得十卷虞兆漋撰兆漋字虹升嘉興人康熙初諸生言鯖二卷吕種玉撰種玉字藍衍長洲人事物考辨六十二卷周象明撰象明見經類潛邱劄記六卷閰若璩撰若璩見經類若璩孫學林識語曰劄記卷一至六乃大父有疑即録自為問難之書其中有已校訂者有止存舊説而未校訂者或謂已校訂者自當付梓未校訂者乃古人舊説似宜刪去學林以是皆先人疑而未訂之義何敢妄加去取至卷五一册乃仲弟學機竭數年之力尋先人手迹陸續成帙不敢漫為分析惟依原本付梓以成先志臣等謹按是書傳本有二山陽吳玉搢所刪定者條理較善學林所刋之本則一字不遺頗嫌蕪雜故四庫全書録吳本入祕閣而以學林本存目焉天祿識餘二卷高士竒撰士竒見經類杭世駿跋曰錢唐高侍郎著書二册曰天祿識餘意謂延閣廣內之藏有非窮巷陋儒所得窺見者今觀其書則笑䐑言鯖豈足以當天厨一臠也迹其所徴引辨説大半襲前人之舊一二偏解時有抵牾不觀左傳注妄謂窒皇為冢前之闕不觀漢書注妄引後漢紀以證太上皇之名不觀水經文選兩注妄詫金虎氷井以實三臺不觀地理通釋妄分兩函谷關為秦漢其尤蹖駁不可據者青雲二字莆田周方叔以為有四解乃遽以隱逸當之聚頭扇已見之金章宗詞詠乃謂元時高麗國始貢銀八兩為流本漢書食貨志乃引集韻以為創獲八米盧郎既見之齊隋兩書姚寬叢語云蓋關中語嵗以六米七米八米分上中下言在榖取米取數之多也黃山谷徐師川何嘗誤用乃用元微之八米詩成未伏盧為證是知一未知二也古人為學先根柢而後枝葉先經史而後詞章侍郎置身石渠金匱獲窺人間未見之本而所采擷若此可以徴其造詣矣湛園札記二卷薑宸英撰宸英見史類畏壘筆記四卷徐昻發撰昻發字大臨長洲人康熙庚辰進士官翰林院編修古今釋疑八卷方履中撰履中字素北桐城人方以智之子例略曰是編以所聞於父師者自經史禮樂天地人身及律厯音韻書有承誤踵謬者輒通考而求證昔王儉七志一志専收圖譜漁仲見楊佺期京洛圖方省張華知漢宫千門萬戶之由見杜預公子譜方覺武平一知魯三桓鄭七穆之故故此書亦間有圖凡採托諸書諸説必著其書其人之名本非完書姑以所得録之螺江雜記八卷張文檒撰文檒見經類知新録三十二卷王棠撰棠字勿翦歙縣人白田雜著八卷王懋竑撰懋竑見史類義門讀書記五十八卷蔣維鈞編其師何焯校正諸書之文焯字屺瞻長洲人官翰林院編修緣事褫職後以校書復原官贈侍讀學士西圃叢辨三十二卷田同之編同之字在田德州人康熙庚子舉人官國子監學録樵香小記二卷何琇撰琇字君琢號勵菴宛平人雍正癸丑進士官至宗人府主事管城碩記三十卷徐文靖撰文靖見經類掌録二卷陳祖范撰祖范見經類訂訛雜録十卷胡鳴玉撰鳴玉字廷佩號吟鷗青浦人嵗貢生乾隆丙辰薦舉博學鴻詞經史問五卷郭植撰植字于岸古田人乾隆壬戌進士識小編二卷董豐垣撰豐垣字暨之號菊町烏程人乾隆辛未進士官東流縣知縣右雜家類雜考春明夢餘録七十卷孫承澤撰承澤見經類臣等謹按是書體例龎雜不可為典要而於勝國遺刑言之鑿鑿一朝掌故多賴以存頗足為鑒古家資搜採焉棗林雜爼無卷數談遷撰遷見史類讀書偶然録十二卷程正揆撰正揆字端伯孝感人前明崇禎辛未進士官尚寶司卿入國朝授光祿寺丞官至工部侍郎見聞記憶録五卷余國楨撰國楨字瑞人别號劬菴遂安人前明崇禎庚辰進士官富順縣知縣國楨自序曰生平卷帙盡佚兵火兹特偶舉所憶惝恍都如夢境餘菴雜録三卷陳恂撰恂字子木本姓曹海鹽人前明崇禎壬午舉人冬夜箋記一卷王崇簡撰崇簡字敬哉宛平人前明崇禎癸未進士國朝補選庶吉士官至禮部尚書臣等謹按崇簡雜記先正格言軼事及耳目所見聞於小説家頗稱徴實匡林二卷毛先舒撰先舒見經類先舒自序略曰蘇氏論古十三篇不立題統名曰志林蓋擬自成一書者也浩蕩轉掣極筆墨之妙特其持論處稽諸事理時或戾焉因偶為駁正數段更取他作之類似者併録之得若干篇名曰匡林樗林三筆五卷魏裔介撰裔介見經類雕邱雜録十八卷梁清逺撰清逺字邇之號葵石正定人順治丙戌進士官至吏部侍郎蔣説二卷蔣超撰超見史類雲谷卧餘二十卷張習孔撰習孔字念難歙縣人順治己丑進士官至山東提學僉事蒿菴間話二卷張爾岐撰爾岐見經類臣等謹按顧炎武與汪琬書自稱精於三禮卓然經師不及爾岐故原跋以是編為日知録之亞池北偶談二十六卷居易録三十四卷香祖筆記十二卷古夫于亭雜録六卷分甘餘話四卷王士禎撰士禎見史類士禎自序池北偶談曰所居之敝廬西為小圃有池焉老屋數椽在其北書數千卷庋置其中輒取樂天池北書庫之名名之池上有亭曰石帆暇日與客坐其中相與論文章流别析經史疑義至國家之典故歷代之沿革名臣大儒之嘉言懿行時亦及焉記録既多第為一書曰談故談獻談藝談異其無所附麗者稍稍以類相從凡二十六卷又年譜曰康熙己巳十一月赴京師撰池北偶談成二十六卷辛巳秋撰居易録成三十四卷乙酉續成香祖筆記丙戌四月往于兹山别業憩夫于草堂山有古夫于亭取義於此即陳仲子所居抑泉口也己丑在里中著分甘餘話又自序古夫于亭雜録曰是書無凡例無次第故曰雜暑窗臆説二卷王鉞撰鉞見史類鉞自序曰三伏酷毒揮汗之餘取架上書得明人小説百餘種逡巡讀之隨讀隨筆輯為臆説云聽潮居存業十卷原良撰良字鳴喜江西樂安人順治中貢生官寧都縣訓導庸言録無卷數姚際恆撰際恆字善夫徽州人筠廊偶筆二卷二筆二卷宋犖撰犖見史類二樓紀略四卷佟賦偉撰賦偉字青士襄平人官寧國府知府臣等謹按寧國舊有北樓即南齊謝朓之高齋明嘉靖中知府朱大器又起文昌臺設書院其下賦偉更為修治題曰南樓簿書之暇登臨載筆雜録見聞故曰二樓紀略介軒遺筆二卷史既濟撰既濟字若川鄱陽人復堂雜説一卷竹村雜記二卷史白撰白字堅又鄱陽人山志六卷王宏撰撰宏撰見經類尚論持平二卷析義待正二卷事文標異一卷陸次雲撰次雲見史類在園雜志四卷劉廷璣撰廷璣字玉衡號在園鑲紅旗漢軍人廕生官至江西按察使後降補分巡淮徐道妙貫堂餘談六卷裘君宏撰君宏字任逺新建人康熙丙子舉人東山草堂邇言六卷邱嘉穗撰嘉穗見經類蓉槎蠡説十二卷程哲撰哲字聖跂歙縣人王士禎序曰聖跂抱博辨之才具論斷之識無雷同勦説之弊道驛集四卷張祖年撰祖年字申伯湯溪人讀書隨記一卷續記一卷剩語一卷不著撰人名氏自題湖上逸人巵壇對問六卷江德中撰德中見史類經史慧解六卷蔡含生撰含生字天度蕭山人任菴語略無卷數王建衡撰建衡見史類嶺西雜録二卷後海堂雜録二卷王孝詠撰孝詠字慧音吳縣人南村隨筆六卷陸廷燦撰廷燦字秩昭嘉定人官崇安縣知縣枝語二卷孫之騄撰之騄見經類臣等謹按是書大略仿陸佃埤雅一編詮釋花木蔬果之屬詳其名義兼及偏旁形聲似應入農家或小學類中但細核體裁兩俱不類故從四庫書之例附𨽻於此諤崖脞説五卷章楹撰楹字柱天浙江新城人雍正癸丑進士官青田縣教諭書隱叢説十九卷袁棟撰棟號漫恬吳江人然疑録六卷顧奎光撰奎光見經類瀟湘聽雨録八卷江昱撰昱見經類經史筆記無卷數潘繼善撰繼善見經類榴園管測五卷王元復撰元復字能愚號醒齋里貫未詳數馬堂答問二十卷黃名甌撰名甌字馭卜福州人鈍根雜著四卷周池撰池見史類右雜家類雜説韻石齋筆談二卷薑紹書撰紹書字二酉丹陽人臣等謹按宋周密有雲煙過眼録記所見古器書畫略品甲乙紹書是編仿其體例小為異同其辨别黃氏文王鼎河莊淳化帖等皆鑿然有理可資考證者固不少也七頌堂識小録一卷劉體仁撰體仁字公勇諸書或作公勇河南潁川衛人順治乙未進士官至吏部郎中研山齋珍玩集覽無卷數孫炯撰炯字挈菴大興人吏部侍郎承澤之孫研山齋雜記二卷不著撰人名氏臣等謹按研山為孫承澤齋名然書中所引多承澤以後事疑亦孫炯所撰也老老恆言五卷曹廷棟撰廷棟見經類初學藝引二十三卷李仕學撰仕學字亨敏號遜齋揭陽人右雜家類雜品豐暇觀頤四卷不著撰人名氏據自序為順治中人無事編二卷項真撰真字不損秀水人前明諸生入國朝官景陵縣知縣葉書一卷黃生撰生見經類倫史五十卷成克鞏撰克鞏字清壇大名人前明崇禎癸未進士入國朝補選庶吉士官至保和殿大學士多識集十二卷雅説集十九卷佳言玉屑一卷牛戒續鈔三卷希賢録十卷資麈新聞七卷魏裔介撰裔介見經類嗜退菴語存十卷嚴有榖撰有榖字既方歸安人有榖子我斯識曰先君子晚年結廬城東隅顔曰嗜退網羅古名儒碩輔嘉言懿行及隂陽圖緯兵農禮樂百家衆流之書探綜研究成一家言用以娛老名曰語存析為內外編外編卷帙稍多故先梓內編以問世勝飲編一卷郎廷極撰廷極見史類廷極自識曰不飲而勝於飲故名之曰勝飲經世名言十二卷蘇宏祖撰宏祖字光啓湯隂人順治丙戌進士官知縣宏祖自序曰經世名言者關乎身心之學所謂名言禆乎出處之微所謂經世也寄園寄所寄十二卷趙吉士撰吉士見史類擇執録十二卷王家啓撰家啓字誠菴蔚縣人順治辛邜舉人官廣東新會縣知縣聞鐘集無卷數勞大輿撰大輿見史類同歸集十六卷吳調元撰調元字雨蒼石城人國初舉人官教諭夀世祕典十八卷丁其譽撰其譽字蜚公如臯人順治乙未進士官行人司行人遂生集十二卷王晫撰晫字丹麓仁和人晫自序曰豫所纂輯中善惡果報捷於影響無非欲使天下之人不失好生之意天下之物得遂樂生之情故以遂生為名畜德録二十卷席啓圖撰啓圖字文輿震澤人官內閣中書舍人宋稗類鈔八卷潘永因撰永因見史類四本堂座右編二十四卷朱潮逺撰潮逺字卓月揚州人敦行録二卷張鵬翮撰鵬翮見史類學仕要針五卷張圻撰圻字邑翼崑山人徐元文序曰莘田侍御蔣伊集仕學格言圻續為纂輯凡分十類曰存心曰省身曰型家曰處物曰養蒙曰舉業曰居官曰臨民曰仕宦曰慎刑秦氏閨訓新編十二卷秦雲爽撰雲爽見儒家類庸行篇八卷牟允中撰允中字叔庸天津衛人人道譜無卷數閔忠撰忠歸安人讀書樂趣八卷伍涵芬撰涵芬字芝軒於潛人康熙丁邜舉人硯北雜録無卷數黃叔琳撰叔琳見經類孝史類編十卷黃齊賢撰齊賢字敬思嘉興人臣等謹按孝為百行之原所編頗足發人至性以其雜入二氏之言故附録於此經術要義四卷高元標撰元標字琴山嘉興人查浦輯聞二卷查嗣瑮撰嗣瑮字德尹海寧人康熙庚辰進士官至翰林院侍講會心録四卷孔尚任撰尚任見史類尚任自序曰是録不考出處不次前後不分體例間有復訛者亦懶於刪範家集略六卷範身集略八卷秦坊撰坊字表行號儼塵無錫人元明事類鈔四十卷姚之駰撰之駰見史類臣等謹按元代故實載於説部者最少是書搜羅頗博典則可觀至有明一代説部紛繁雖未能採托賅備然萬厯以後門戶紛爭記録之書多不足信之駰殆猶不失闕疑之義間家編八卷王士俊撰士俊字犀川平越人康熙辛丑進士官至河東總督養正遺規一卷訓俗遺規一卷從政遺規二卷教女遺規一卷陳宏謀撰宏謀見儒家類學統存二十四卷宋士宗撰士宗見史類士宗自序曰周有老莊宋有象山明有文成兼之宗杲大鑑輩日與吾黨爭理即濓洛關閩復生不能驟起而勝也權衡一書四十一卷王植撰植見經類植自序曰王充有論衡蘇洵有權書衡論皆為一家之私言而此一書則合古今之嘉言而為之權衡也多識類編二卷曹昌言撰昌言字禹拜新建人昌言兄茂先序曰余弟聞名山勝迹異卉竒葩必周遊歷覽考究本末間從野老農夫詢動植情形得其實歸即筆之於書所著有輿圖輯略多識類編諸書養知録八卷紀昭撰昭見經類昭自序略曰人為利欲所昏習俗所染於是盡失其本心之明豈人本無知哉蓋所以喪其良心者有由然耳特為指其大義以養其良心良能故曰養知間家類纂二卷彭紹謙撰紹謙字濟光長洲人乾隆丁邜舉人官至桃源同知課業餘談三卷陶煒撰煒字賔玉秀水人福夀陽秋無卷數魏博撰博字約之江寧人言行彚纂十卷王之鈇撰之鈇號朗川湘隂人諸儒檢身録一卷令狐亦岱撰亦岱字太峯猗氏人官縉雲縣知縣心鏡編十卷談文光撰文光里籍未詳子苑一百卷不著撰人名氏臣等謹按此書係衍聖公孔昭煥家藏本其中雜托諸子分人倫性行學業政事人事五門雖用意深至而名實多乖如水經注檀弓等總以子苑名之殊為未協右雜家類雜纂學海類編無卷數曹溶撰溶見史類莊屈合詁無卷數錢澄之撰澄之見經類澄之自序曰著易學詩學成思所以翊二經者而得莊子屈原以莊繼易以屈繼詩足以轉相發明楊園全書三十四卷張考夫遺書五卷張履祥撰履祥字考夫桐鄉人臣等謹按履祥初講蕺山慎獨之學晚乃専意於程朱立身端直鄉黨稱之其書凡十二種類多儒家之言然如近古録見聞録等採前明以來嘉言懿行則近於傳記農書詳桐鄉物土又農家之流體例雜糅無可専屬故附𨽻於雜家類焉竹裕園筆語十二卷李曰滌撰曰滌字亦白臨川人前明嵗貢生昭代叢書一百五十卷張潮編潮字山來徽州人臣等謹按是編皆國初人雜著或從文集中摘録或從全書中割取並非著述強以書名中亦時有改竄凡甲乙丙三集各五十卷丹麓雜著十種十卷王晫撰晫見雜纂類檀几叢書五十卷張潮王晫同編政學合一集無卷數許三禮撰三禮見經類鈍吟雜録十卷馮班撰班字定逺號鈍吟居士常熟人檢心集十四卷閔則哲撰則哲字睿先應山人右雜家類雜編皇朝文獻通考卷二百二十七
