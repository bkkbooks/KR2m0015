body:
  text: 郊社考十山川臣等謹按王制天子祭天下名山大川五嶽視三公四瀆視諸侯蓋嶽瀆之為德甚博施甚大故崇禮以報若巡狩則望秩焉後世代有損益得失各殊本朝法古定制祀有常經凡山川之祀皆視其功德協於義法至於時巡望祭一則虞周封襌之文陋而勿舉尤超越千古云順治元年定崇祀嶽鎮海瀆及直省有司春秋致祭之禮定制以五嶽五鎮四海四瀆配享方澤壇見第五卷立地祗壇於天神壇之西北向一成方廣十丈縱六丈髙四尺四出陛各六級壇南立青白石龕五刻山形者三為五嶽五鎮四陵山位詳第五卷刻水形者二四圍鑿池祭則注水為四海四瀆位均髙八尺二寸左設石龕二刻山水形各一為京畿名山大川位右設石龕二製同為天下名山大川位均髙七尺六寸壝方二十四丈嵗遇水旱則遣官祭告祈禱有應則報祭互見第七卷凡嶽鎮海瀆所在地方有司歲以春秋仲月諏日致祭祭東嶽泰山於山東泰安州今升為府祭西嶽華山於陜西華陰縣祭中嶽嵩山於河南登封縣祭南嶽衡山於湖廣衡山縣祭北嶽恆山於直隸曲陽縣移祭見後祭東鎮沂山於山東青州府祭西鎮吳山於陜西隴州祭中鎮霍山於山西霍州祭南鎮會稽山於浙江會稽縣祭北鎮醫巫閭山於遼東廣寧衛今改為縣祭東海於山東萊州府望祭西海於山西蒲州今升為府祭南海於廣東廣州府望祭北海於河南濟源縣移祭見後祭河瀆於蒲州祭江瀆於四川成都府祭淮瀆於河南唐縣祭濟瀆於濟源縣八年正月世祖章皇帝親政遣官致祭嶽鎮海瀆定制恭遇慶賀大典頒布恩詔則遣官致祭以四品以上堂官將事北鎮後兼祭北海遣官一人東嶽東鎮東海遣官一人西嶽西鎮江瀆遣官一人中嶽北海淮瀆濟瀆遣官一人南嶽遣官一人北嶽中鎮西海河瀆遣官一人南鎮南海分遣見後遣官一人諏吉將行先期陳祝文香帛於中和殿皇帝親閲遣之十七年三月改祀北嶽恆山於山西渾源州北嶽之祭向在直𨽻曲陽縣自明孝宗時尚書馬文升議請改祀渾源其疏引據周禮及明一統志立説甚正以格於部議而止後屢有言者皆不行至是以科臣援前議請改祀渾源下禮部議覆從之康熙六年七月聖祖仁皇帝親政遣官致祭嶽鎮海瀆禮儀與順治八年同惟南鎮南海遣官各一人十四年十二月以册立皇太子遣官致祭嶽鎮海瀆十六年九月加封長白山之神定致祭禮先是四月中聖祖命內大臣覺羅武默納侍衛費耀色等詣長白山審驗明白酌行祀禮至是復命奉諭旨長白山發祥重地竒迹甚多山靈宜加封號永著祀典以昭國家茂膺神貺之意禮部奏言考金大定中封長白山為興國靈應王又加封帝號明初悉去封號止稱為神請依嶽鎮之禮封為長白山之神照五嶽例春秋致祭禮儀並同初次往封遣大臣擇地設帳幄立神牌致祭其春秋二祭令寧古塔將軍遣官在烏喇地方望祭遇有慶典亦應一例望祭即令祭北鎮官前往行禮從之十八年五月加封洞庭湖之神遣官致祭時湖南用兵討賊屢捷咸言湖神助順遣官加封致祭敕曰頃者逆氛未靖天討用加地當師旅之屯衆賴精英之佑閲時八月波浪不驚俾我六軍舳艫共濟堅城立拔餘孽宵奔眷言撻伐之竒勳實屬神功之丕顯特申昭報式考彛章封為洞庭湖之神載諸祀典専官告祭惟神鑒之二十一年二月以平定雲南遣官致祭嶽鎮海瀆長白山是歲於所遣承祭官外各遣筆帖式一人典守香帛祭文又各給黃縀繖一御仗二龍旗二牌二三月聖祖東巡盛京望秩長白山是時駐蹕吉林烏拉地方於松花江岸東南設幄次神位致祭行禮二十三年聖祖東巡十月躬祀泰山之神十一月遣官致祭嶽鎮海瀆長白山先是吏科給事中王同祖疏請巡狩燔柴泰山即過孔林觀禮器九卿議當允行於是禮部議奏虞舜東巡至於岱宗燔柴致祭漢髙過魯以太牢祀孔子俱係巡歷所至致祭行禮今皇上聖德神功同符堯舜倣古之制爰事東巡經過泰山闕里亦應致祭從之至是親詣東嶽廟致祭行禮其餘均遣官致祭二十八年東巡致祭禮同嗣是南巡所過名山大川均照例致祭二十五年五月移北海祀典於吉林望祭移祭見後副都御史徐元珙疏言祀典所載致祭北海尚沿宋明舊制於河南濟源縣係在京之南於義未合況北嶽已改祀渾源州則北海應請改祀於混同江庶方位允協下部議行部臣奏言混同江非奉天所轄應照長白山例在附近地方設立幄次神位於祭長白山後行望祭之禮從之二十七年十月以孝莊文皇后升祔太廟遣官致祭嶽鎮海瀆長白山三十二年二月遣皇長子祭西嶽華山詳見第十四卷三十四年以災異遣官告祭嶽鎮海瀆長白山互見第十四卷三十五年建海神廟於大沽海口加封致祭時由天津海道運米盛京以備賑濟海神效靈往來迅駛乃建廟大沽海口封為大沽海口之神遣禮部司官往祭後定祀典用二月八月中戊日致祭三月以親征噶爾丹致祭所過山川之神是嵗聖祖親統六師北征朔漠三月戊午遣官祭居庸關山川之神丁卯祭獨石口山川之神四月命大學士祭風雨之神界外山川之神五月祭克魯倫河之神三十六年二月西巡至保德州及橫城再渡河均遣官致祭黃河之神至寧夏祭賀蘭山之神凡所厯名山大川均遣官致祭與因事遣祭之禮同三十六年七月以平定朔漠遣官告祭嶽鎮海瀆長白山三十七年七月建永定河神廟於盧溝橋先霸州新安等處屢被水災發帑濬河以疏水道至是新河告竣賜名永定河封其神為永定河之神建廟立碑遣官致祭春秋祀之九月聖祖東巡遣大學士致祭松花江之神三十九年六月建海神廟於江南安東縣河道總督張鵬翮疏言遵旨將海口攔黃壩拆去水勢通流自興工以來風潮不作海神效靈請建廟崇祀詔改名大通口封為大通口海神春秋致祭四十二年三月聖祖仁皇帝五十萬壽遣官致祭嶽鎮海瀆長白山十一月聖祖西巡遣官致祭西嶽華山四十三年二月封淮神為長源佑順大淮之神以河道總督張鵬翮請立廟崇祀賜御書靈瀆安瀾匾額與安東縣大通口海神廟皆入春秋祀典四十八年三月以復行册立皇太子遣官致祭山川如初立之禮五十二年三月聖祖仁皇帝六十萬壽遣官致祭山川與四十二年同五十七年十二月以孝惠章皇后升祔太廟遣官致祭嶽鎮海瀆長白山是嵗遣官將事滿漢編檢以上皆通行開列六十年三月以御極六十年大慶遣官致祭山川與萬壽告祭禮同六十一年建江海潮神廟於浙江之尖山時浙江修築石塘工成巡撫朱軾請建廟於江海匯流尖山之麓廟成賜御書協順靈川匾額春秋致祭詳見於後六十一年十一月世宗憲皇帝登極遣官致祭嶽鎮海瀆長白山雍正元年二月以恭上聖祖仁皇帝尊諡遣官致祭嶽鎮海瀆長白山十二月以册立皇后遣官致祭嶽鎮海瀆長白山二年八月加江海大神封號少詹事錢以塏上言請加封江海諸神有功德於民者下禮部議覆從之於是加四瀆封號江瀆曰涵和河瀆曰潤育淮瀆曰通佑濟瀆曰永惠均遣官齎送祭文香帛令督撫布政使大員致祭又加封四海龍神東海曰顯仁南海曰昭明西海曰正恆北海曰崇禮均如四瀆儀令地方官致祭又封大沽海口之神加廣惠二字立廟天津又封浙海潮神為運德海潮之神立廟海寧縣又封洞庭湖神加涵元滙利四字立廟常德府均致祭如儀三年三月封山東臨清州河神為福漕漳河之神館陶縣河神為惠濟漳河之神初禮部議覆錢以塏奏以直省廟祀諸神果有捍禦保障之功者應令請加封號列之祀典於是山東撫臣以漳河濟漕利運請加封號歲以春秋致祭允之是歲致祭衛源之神衛水源出百泉今運河之經流也河南撫臣疏言百泉之上衛源神祠通漕濟運請列祀典從之仍御書匾額令巡撫致祭歲以春秋祀之五年二月以黃河澄清御製祭文遣官致祭黃河之神四年冬督撫諸臣次苐奏報黃河澄清地連四省時逾二旬諸王大臣請升殿慶賀世宗不許諭以河神福國佑民功用顯著宜崇祀典以答神庥乃遣官分詣清河武陟二處新建神廟致祭行禮嗣是每昭靈應必遣官致祭五月重修江南宿遷縣皂河河神廟春秋致祭十二月遣官致祭河源之神於河州口外以黃河澄清及江南淤地利民故也建祀西寧詳見於後七年建江神廟於湖廣武昌春秋致祭內閣奉諭旨山川之神錫福於地方百姓是以自古帝王皆誠心展祀以答神貺湖廣境內西南數省之水匯入大江又為川澤之總匯凡屬土地人民及舟楫行旅皆仗江神默佑保護安寧允宜建修廟宇按時致祭以崇報享著湖廣總督巡撫動帑辦理此朕虔禱神祇護國佑民之意非諂媚以求一己之福也乃建廟於湖北武昌平湖門之外歲以春秋致祭八年建海神廟於浙江海寧縣加封為寧民顯佑浙海之神浙江潮神廟既建於尖山又加封號是歲奉諭旨朕惟古聖人之制祭祀也凡山川嶽瀆之神有功德於民生能為之禦災捍患者皆載在祀典蓋所以薦馨昭格崇德報功也雍正二年浙江海塘潮水沖決發帑修築比年以來塘工完整災沴不作居民安業今年潮汛盛漲幾至泛濫官民震恐幸而水勢漸退隄防無恙此皆神明默垂護佑惠我蒸民者也兹特發內帑十萬於海寧縣敕建海神之廟以崇報享著該督遴委賢員度地鳩工務期制度恢宏規模壯麗崇奉祀事用答明神庇民禦患之休烈乃建廟於海寧之春熙門內中祀運德海潮之神以英衛公伍員誠應武肅王錢鏐配享二神見後其他諸神祀於配殿世宗御製碑文加神封號遣大臣致祭乾隆十六年二十二年皇上南巡皆遣官致祭二十七年後四巡江浙蒞蹕海寧並躬詣拈香又命於杭州建廟崇祀立碑皆如海寧之制詳見於後是年建湘江神廟於湖廣長沙春秋致祭臣等謹按武昌所祀乃江瀆之神長沙之廟在湘江橘洲則湘江之神也又湖南之巴陵亦建廟於城陵磯磯為蜀江洞庭所匯所祀蓋江瀆之神而未列祭典並識於此四月建河源神廟於甘肅河州加封為開津廣濟佑國庇民昭應河源之神先是以黃河澄清遣官致祭是年奉諭旨古稱黃河之神上通雲漢光啓圖書禮曰三王之祭川也皆先河而後海惟神澤潤萬國福庇兆民自古及今功用昭著我朝自定鼎以來仰荷神庥尤為彰顯至於澄清六省之遙閲歷七句之久稽諸史册更屬罕間朕思江南河南等處皆有廟宇而河源相近之處向來未建専祠考河源發於崑崙地隔遙邊人稀境僻其流入內地之始則在秦省之西寧地方朕意於此地特建廟宇専祀河源之神九卿詳議具奏尋議黃河發源西畨枯爾坤山經河州之長寧驛流入中國應於河州口外擇地建廟春秋致祭御製碑文勒石從之十一年十二年皆遣官致祭十二月封直𨽻滹沱河神為長源永濟滹沱河神春秋致祭九年建永定河神惠濟廟於石景山永定河即古之桑乾河源出太原合衆水為流乘髙注下其性湍悍畿南恆被其害聖祖時親加指示導之安流名曰永定加封河神祀之盧溝橋雍正七年世宗以石景山據河上遊工程最要既嚴加捍禦因命擇地建廟廟成遣官致祭賜名惠濟仍御製碑文以紀之十年閏五月建望祭長白山享殿於溫德亨山今名望祭山舊例春秋致祭皆由寧古塔將軍遣官於吉林之溫德亨山設幄次望祭將軍常德奏請於望祭之處為屋五間與長白山相望既不違望祭之義又足以避風雨庶祀事得盡其誠從之十三年令春秋二祀即以寧古塔將軍致祭恭領以上均齋戒陪祀七月建洪澤湖神廟於髙家堰春秋致祭髙堰山盱石工告成奉諭旨洪澤湖賴髙堰以為保障建立石工為久遠之計二年以來風濤恬靜工作易施皆湖神默佑之力宜虔誠展禮以申報享之忱乃令河臣建廟於堰上歲以春秋祀之十三年九月皇上登極遣官致祭嶽鎮海瀆長白山十一月以恭上世宗憲皇帝尊諡遣官致祭嶽鎮海瀆長白山十二月致祭河南開封府河神廟先是河東總督王士俊奏請致祭省城河神至是禮部請遣官齎祭文香帛以往皇上以河神顯異曾奉世宗憲皇帝特旨致祭乃御中和殿閲視祭文香帛齎送總督行禮致祭乾隆元年八月特諭致祭河神海神石景山永定河神禮部奉諭旨南北河工與浙江海塘關繫國計民生最為緊要當朕即位元年咸慶安瀾理宜虔修祀典以答神貺部臣議於清河武陟海寧三處神祠照例齎送祭文香帛令總督致祭又令直𨽻河道總督往石景山致祭從之二年正月釐定洞庭湖神君山廟神致祭典禮二祠春秋致祀祭品向由有司具備是歲奉諭旨洞庭湖神福佑一方靈應顯著君山神廟載在祀典所有春秋祭品禮儀理應動用正項錢糧辦理著照湘江之神之例一體開銷以昭敬禮明神至意四月以恭奉世宗憲皇帝配享南郊遣官致祭嶽鎮海瀆長白山十二月以册立皇后加上皇太后徽號遣官致祭嶽鎮海瀆長白山三月立海神廟於江南寶山縣春秋致祭大海自北而南奉賢寶山南滙上海皆當其衝而寶山三面距洋尤為險要撫臣請築石塘三百餘丈以資捍禦發帑成之即建廟於上以祀海潮之神祀典視淅之海寧御製碑文紀之八年八月皇上東巡盛京遣官致祭北鎮廟長白山十三年二月皇上東巡躬祀泰嶽增用中和韶樂遣官致祭嶽鎮海瀆長白山先是十二年六月諭內閣奉聖母皇太后懿旨泰山靈嶽坤德資生近在魯邦宜崇報享朕不敢違爰遵懿訓親奉鑾輿秩於岱宗旋蹕青齊觀風布澤以昭崇聖法祖教孝省方巨典大學士等會議以聞尋議奏古者因名山以升中原有燔柴之禮聖祖仁皇帝因儀文度數書闕有間議封禪者尤多不經特允廷議以祀五嶽禮致祭今皇上東巡致祭泰山應遵康熙二十三年之禮舉行惟是致祭方嶽向未用樂謹按周禮大司樂奏蕤賓歌函鍾舞大夏以祭山川是山川之祭自古用樂今特舉盛典秩於岱宗請用中和韶樂令儒臣增撰樂章令太常寺協律郎率樂生豫習備用十三年二月壬午至於泰安皇上先詣岱廟拈香於配天門內降輿由仁安門入三上香行一跪三拜禮翼日癸未致祭如康熙二十三年之儀遂奉皇太后登岱所至祠廟皆拈香致敬奉諭稽古巡狩翕河喬嶽典禮攸隆朕兹親祀孔廟有事於泰山其四嶽四瀆皆宜薦馨用申誠敬著該督就近遴委大員前往以崇秩祀尋議準祭文香帛仍由京馳驛齎送十四年四月以平定金川恭上皇太后徽號遣官致祭山川如二年之禮十五年九月以册立皇后恭上皇太后徽號遣官致祭山川如十四年之禮十月庚午朔皇上巡幸中州詣嵩嶽廟拈香越日辛未致祭如東巡祭岱廟之儀是年祭祀山川悉準東巡之例以御道所經遣官致祭黃河之神及衛源神祠十六年二月皇上南巡遣官致祭所過名山大川之神凡巡狩所至禮祀山川是年皇上南巡於山東祀東嶽泰山之神至江南祀清河縣河瀆之神淮瀆之神江都縣江瀆之神皆遣官致祭二月親祭清河河神廟至浙遣官祭海神廟南鎮會稽山凡往返渡河渡江致祭之處皆親詣拈香行禮又詣清口風神廟惠濟祠拈香至泰安詣岱廟拈香蓋於懷柔百神之禮無不舉矣六月加封永定河神為安流廣惠之神遣官致祭十二月以皇太后六旬萬夀恭上徽號遣官致祭嶽鎮海瀆長白山十九年八月皇上東巡盛京望祭長白山渡松花江祭江神九月祭北鎮廟皆親詣行禮二十年六月以平定伊犁恭上皇太后徽號遣官致祭山川如十四年禮是嵗以大兵西征致祭所過山川之神大軍所經之山致祭者四一曰阿勒台山一曰珠爾庫柱山一曰博克達山一曰阿拉克山皆以詔旨讀文致祭二十二年皇上南巡致祭所過名山大川之神如十六年禮是後四巡江浙致祭皆同三月建海神廟於杭州之觀潮樓敕封為平潮利涉浙海之神是月大駕駐蹕杭城奉諭旨浙海之神自雍正八年海塘告成時特加褒封敕於海寧縣地方建廟崇祀邇年以來海波不揚塘工鞏固朕省方浙中親臨踏閲見大溜直趨中小亹兩岸沙灘自為捍禦濵海諸邑得慶安瀾利及生民實資神明顯佑應於杭州省城之觀湖樓敬建海神之廟以昭朕崇德答佑至意應行事宜該部查例具奏禮部奏言雍正八年敕建海寧海神廟規制典禮具有成案今奉諭旨於杭州觀潮樓敬建海神廟應令該督撫敬謹相度擇吉興修工成之日遣官告祭加封神號春秋致祭悉遵雍正八年事宜舉行並請御製碑文勒石廟中從之二十四年十一月以蕩平回部遣官致祭嶽鎮海瀆長白山二十五年定西域山川諸神祀典先是大軍平定西域新疆乾隆二十四年告祭額琳哈畢爾噶鄂拉嵗春秋致祀及是駐劄大臣奏請嵗祭博克達鄂拉格登鄂拉穆素爾達巴伊犁郭勒從之嗣後由駐劄大臣次第奏請嵗祭者於山則塔爾巴哈台鄂拉塔勒竒鄂拉崆郭爾鄂博阿布喇拉鄂拉巴爾魯克鄂拉阿勒坦額墨勒鄂拉博爾圖塔克於水則崆格斯郭勒哈什郭勒察罕烏蘇阿里瑪圖郭勒和爾郭斯郭勒策集郭勒薩瑪爾郭勒奎屯郭勒額彬格遜淖爾賽哩木淖爾阿拉克圖古勒淖爾額敏郭勒裕勒雅爾郭勒俱每嵗春秋令駐劄大臣致祭其祭文香帛由京師齎往行禮二十六年十二月以皇太后七旬萬夀恭上徽號致祭嶽鎮海瀆長白山更定遣官之制先是嶽鎮海瀆遣官七員分七差致祭後分遣八員康熙十六年後增祭長白山特遣一員後與北海同遣共遣官九員乾隆二十六年左都御史金德瑛奏請與厯代帝王陵寢及闕里兼行禮部議言嗣後併為六差長白山北海同遣官一員西嶽華山西鎮吳山江瀆遣官一員東嶽泰山東鎮沂山東海及南鎮會稽山遣官一員中嶽嵩山南嶽衡山濟瀆遣官一員北嶽恆山中鎮霍山西海河瀆遣官一員南海遣官一員其厯代帝王陵寢及闕里之祀即分道兼舉毋容另遣從之是年建楊橋河神祠先是伏汛河溢祥符遂潰楊橋隄乃鑿引渠釃河溜兩匝月而合龍爰建祠並頒額勒碑從大學士劉統勳請也三十六年建白河神廟河挾諸山之水而來至密雲流益壯性益駛其處為巡幸熱河所必經是年七月霖雨積日河驟漲齧坡岸浮橋當水衝不可度乃遣官致禱越日漲陡落丈餘命於河壖構祠壬辰五月成御製詩勒石祠內是年十一月皇太后八旬萬夀恭上徽號遣官致祭嶽鎮海瀆長白山如二十六年之禮三十九年四月封太白山神為昭靈普潤太白山之神建祠祀之四十一年五月以平定兩金川恭上皇太后徽號遣官致祭嶽鎮海瀆長白山四十二年三月恭上大行皇太后尊諡遣官致祭嶽鎮海瀆長白山是年八月命定兩金川山川諸神祀典先是四十一年兩金川平該處名山大川效靈助順應入祀典者上命副將軍明亮具狀以聞尋奏金川之索烏甲索二山小金川之墨爾多山均為畨衆敬奉大軍進勦時頗著靈應又金川大河當官兵攻勦勒烏圍時立柵沿河堅持數日適值陰雨連綿河水旋長旋消於沿灘柵寨並無妨礙及攻克移柵後河水陡發前立柵之處均漫水甚大河神效順實贊成功應請秩祀以彰報功之義爰命載入祀典用垂久逺四十三年八月皇上東巡盛京望祭北海命建北海神廟于山海關並改定望祭處奉諭海神咸有廟祀惟北海自山海關至盛京一帶向未専建廟宇以隆禋祀尚屬闕典著於山海關澄海樓相近處建立北海神廟以妥靈佑九月又諭稽考祀典北海原於河南濟源縣望祭河南地屬中州且非濵海固於事理未協嗣經改於吉林東門外望祭雖屬北境然距海尚遠亦非所宜所有春秋秩祀及遇告祭典禮自應恭移於此以協方位是月上致祭北鎮神廟又奉諭遼河雙源遙引合而為巨流河襟帶神臯恬波涵潤實為陪都境內大川朕恭謁祖陵蹕路所經舟梁利涉緬念河神之功甚溥著専建河神廟以昭妥侑九月命建渾河神廟于盛京城東諭渾河發源遙遠自東北來入英峩邊門西流幾及千里會遼入海縈護三陵滋演萬年靈脈長川襟帶兼衛陪都厥功甚巨自宜虔崇廟祀以答神庥著於盛京城東度地鳩工興建河神廟以昭妥佑是月建松花江神廟諭吉林之松花江導源長白襟帶神臯為本朝發祥之地綿演億萬載景運靈長厥功甚巨自宜虔崇廟祀用迓神庥已諭令於吉林城外濵江處所度地興建其一切祀典即照望祭北海之制載入會典四十五年皇上七旬萬夀遣官致祭嶽鎮海瀆長白山命廟宇有應修葺者守吏以聞五月新建北海神廟成遣親王致祭十二月改定神廟敕賜為敕封時以頒發新建巨流河渾河神廟扁額奉諭建廟神牌扁額均係褒崇神祀沿用敕賜二字未協敬謹之意嗣後如遇有建廟封神等事擬請欽定者廟名著寫敕建其神牌扁額俱著寫敕封字樣四十七年以豫省青龍岡漫口合龍未就命乾清門侍衛阿彌達至青海河源祭告河神是年豫省疏挑引渠自蘭陽至商邱一百七十餘里越嵗癸邜春三月河工告成是年三月諭朕前嵗南巡駐蹕金山即敬書金山靈區安瀾恆佑宏仁廣濟至德尊神牌位供奉神祠及回鑾渡江時雖有風濤而御舟穩渡實賴神佑不可不崇昭秩祀以答靈庥著該部載入祀典嗣後每遇致祭之期著該部封香帛祝文送往交該督撫親詣金山寺行禮四十八年皇上東巡盛京遣官致祭遼陽太子河是年上致祭北鎮神廟四十九年諭此次河水陡長各工險要賴河神協應得化險為平著蘭第錫等親至河神廟虔祀以答嘉庥五十年正月以皇上御極五十年大慶遣官致祭嶽鎮海瀆長白山是年奉諭江南洪澤湖向藉淮水挹注今淮水發源之處經畢沅勘明疏瀹將支港小河一律浚導該處賈魯惠濟二河其下流歸併渦河入淮現在亦加疏濬俾就通暢并於淮瀆廟虔申祭告自當仰邀靈佑泉源湧發衆水會歸下遊湖水日就充足以助清敵黃至淮瀆廟如果嵗久未修或形傾圯即動項興修俟廟工告竣時朕當親書匾額用答神貺將此諭阿桂畢沅知之尋覆奏南河淮瀆廟一在裏河廳屬運口每年隨時修理現在完整臣阿桂親往瞻禮默告一在洪澤湖中盱眙縣境內龜山之上相傳向著靈異年久未修臣等仰體聖主誠敬感孚廣邀靈貺之意亦請一體修葺用答神庥從之皇帝親祭方嶽儀時巡省方禮其方嶽特行親祭之典有司諏吉豫期守土官潔掃廟宇內外備祭品牲牢先一日皇帝乃齋扈從王公百官地方文武官應與祭者畢齋行在太常寺凡祭祀皆贊行在有司具祝文翰林院隨時撰擬內閣舍人恭書於版授太常寺官豫送祭所右具祝版是日昧爽光祿寺卿一人眂割牲守土官於祭所神厨設香案光祿寺卿公服上香宰人牽牲告腯遂及守土官眂宰瘞毛血如儀右眂割牲祭之前夕守土官各因其方為瘞坎於廟門之外工部官張黃幄於廟戟門內之左鑾儀衛官設洗於幄次太常寺卿屬率守土官入廟供具陳神位前牛一羊一豕一登一鉶二簠簋各二籩豆各十爐一鐙一設二案一少西北向供祝版一東次西向陳禮神制帛一色各隨其方香盤一尊一爵三冪勺具樂部率太常協律郎設中和韶樂於廟階上如式乃辨位設皇帝拜位於廟內正中北向司拜褥官二人立於左稍後陪祀王公位階上百官位階下東西序立重行異等均北面司祝司香司帛司爵分立祝案尊案之次司樂協律郎樂工歌工分立樂懸之次記注官四人立西階下東面御史二人禮部祠祭司官二人鴻臚寺官二人分立王公百官拜位左右東西面典儀一人立東