body:
  text: 欽定四庫全書皇朝文獻通考卷二百六十七象緯考十二星雲瑞變臣等謹按馬端臨所誌瑞變或繫以占或著其應大抵仍諸史之本文非謂占與應必如是也其於建隆迄元符毎彚計之而弗詳豈不以占與應未盡符乎本朝定制凡瑞變占辭以觀象玩占書為據順治初由禮部嵗終彚題後改令欽天監隨時具奏凡占而不應者所司輒以今昔不同為説臣竊思惟聖知天亦惟聖能格天占之義備於易皆知天者之言也觀象玩占止據已往之有騐者以為言一遇格天之聖而旋轉有權其占騐自不符矣順治二年冬禮部彚題瑞變稱瑞者三之一世祖章皇帝以變異迭見為諭於所謂瑞者則弗道康熙年間休徴洊至聖祖仁皇帝惟以毋忽變異訓諭臣工雍正七年冬慶雲見曲阜世宗憲皇帝迎迓天休爰抒誠先聖敷錫儒林迨十三年春雲南廣東同日以慶雲告復宣諭曰兩省慶雲何如處處雨暘時若則聖心之兢惕不以瑞變有岐矣我皇上御極以來戒臣工勿言祥瑞雖以日月合璧五星聨珠亘古罕有之祥所司請宣付史館猶未䝉俞允若含譽瑞星五色卿雲之類叠呈符應僅備疇人之筴廷臣未嘗稱賀而因變修省之詔諭薄海内外靡不聽聞誠大易所謂先天而天弗違後天而奉天時者寧占候家所得窺測乎是以兹考所編詳於變而略於瑞而於占家言弗備列云順治二年十二月禮部彚列是嵗瑞變以聞正月丁亥未時日生左右珥上有背氣赤黄色在女宿占曰喜得地三月癸巳辰時日色赤黄黄光照地占曰有旱戊戌未時日生暈周匝赤黄色在奎宿占曰有兵四月壬戌午時日生暈周匝赤黄色在胃宿占曰五榖不成十月壬辰午時日生左右珥上有背氣青赤色在心宿占曰有叛將十一月辛亥巳時日生半暈上有戴氣赤黄色在箕宿占曰喜得地世祖章皇帝諭議政王大臣曰變異迭見朕衷深用兢惕當與大小臣工痛加修省盡心職業共圖消弭毋事虚文九年九月大學士洪承疇等以星變陳言是月乙未辰時太白晝見翼宿三度丙申酉時有流星起中天大如盞赤色尾迹有光入紫㣲垣時世祖章皇帝將巡幸塞外洪承疇陳之遴言日者人君之象太白敢於争明紫㣲垣者人君之位流星敢於突入上天垂象誠宜警惕宗社重大非聖躬逺幸之時疏入得㫖此奏是朕行即停止康熙三年十一月刑科給事中楊雍建以星變陳言先是十月己未朔彗星見東南方其體微小在軫宿右轄星旁丁卯見東方尾迹長七寸餘蒼色指西南丁亥逆行西南其體漸大尾迹長三尺餘指西北在翼宿十一月戊戌尾迹長五尺餘指北在張宿庚子在井宿癸卯逆行西北在昴宿乙巳尾指東在胃宿庚戍在婁宿乙卯楊雍建言星象之異日久未消乞清宫齋戒力圖修省廣求直言詳詢利病有可以惠百姓者立賜舉行並飭内外大小臣工滌慮洗心共修職業疏入聖祖仁皇帝諭議政王大臣曰楊雍建直言可嘉星象示異皆因徳薄敷政失宜所致今惟力圖修省務期允當以答天心四年二月以星變詔内外臣工進言無隠先是三年十二月壬戌彗星移奎宿其體漸小四年正月癸巳不復見二月己巳復見東南方其體㣲小在女宿甲戌見東北尾迹長七寸餘蒼白色指西南丁丒尾迹長一尺餘在虚宿辛巳其體漸大尾迹長八尺餘在室宿乙酉尾迹長五尺餘在璧宿丙戌諭曰異星復見實由徳薄所致上天垂象屢示警戒敢不益圖修省以後凡用人行政務加敬慎以求允當至於闗係國家利弊民生休戚應興應革事宜内而部院及科道官外而督撫其各抒所見以備採擇朕不憚改正七年五月以星變詔内外臣工各盡職業是月甲辰未時太白見午位栁宿三度丙午庚戌同癸丒欽天監以聞諭大學士等曰欽天監職司占候凡有變異應即奏聞今稱㣲暗日久方行具奏殊屬不合嚴飭行又諭曰太白晝見天象屢示儆戒朕甚懼焉今力圖修省彌加敬慎勵精勤政以答天心在内部院官各盡乃職公亷自効在外督撫提鎮以下各綏理地方撫恤軍民咸令得所十六年三月察議監員占奏疎忽諭禮部曰帝王克謹天戒凡有垂象皆闗治理故設立專官職司占候所係甚重理應詳加推測隨時具奏今欽天監於尋常節氣尚有觀驗至霜霧及星辰凌犯並未奏聞疎忽負職即行察議二十一年七月以星變詔臣工議聞是月己巳彗星見東北方白色尾迹長二尺餘指西南在井宿北河北壬申行東北尾迹長六尺餘癸酉諭大學士等曰天道闗於人事彗星上見政事必有闕失其應行應革者令九卿詹事科道㑹議以聞雍正三年二月以日月合璧五星聨珠告祭景陵先是正月欽天監疏言二月初二日庚午卯刻日月合璧以同明五星聨珠而共貫宿躔營室之次位當娵訾之宫從來未有之瑞請勅付史館世宗憲皇帝諭大學士等曰朕惟日月五星運行於天本有常度是以從古厯元可坐算而得然古稱髙陽時五星㑹於營室漢帝時五星聚於東井宋祖時五星聚於奎史書皆紀以為祥葢七政㑹合數雖一定而遭逢其時者實海宇昇平民安物阜之㑹也若以為徳化所致朕方臨御二載有何功徳遽能致此嘉祥皆由我皇考六十餘年聖徳神功蟠天際地為千古不世出之君為上天第一篤愛之子所以純禧駢集厯數綿長錫祚垂光至於今日覩此難逢之嘉瑞朕嗣統以來兢兢業業率由舊章惟以皇考之心為心以皇考之政為政宅衷圖事㒺敢稍越尺寸故邀上天垂鑒仍如皇考之御宇綏猷而錫以無疆之福也朕幸逢嘉㑹不但不敢自居亦不敢自謙總由上天申眷皇考朕與天下臣民同在福祐之中當與天下臣民共慶之至是諸王大臣等請陞殿慶賀諭曰朕惟皇考六十餘年敬天勤民始終如一是以上天申眷至於今日覩此嘉祥在皇考為福鍾善慶之餘在朕躬為迎迓天庥之始惟有兢兢業業竭力盡心永久如一以仰答上天之眷祐以克承皇考之宏猷期與大小臣工矢誠心而敦實政陞殿受賀不必舉行但念天瑞實因皇考而致應遣官告祭景陵以昭祥瑞之自七年十二月以五色卿雲捧日詔躬詣太學祭告時山東巡撫等疏言十一月二十六日丙申午刻慶雲環捧日輪厯午未申三時之久正當曲阜重建大成殿上樑前二日諭大學士等曰雍正二年闕里文廟不戒於火朕心悚懼不寧親詣大學文廟䖍申祭告特發帑金修建䖍格之心數年㒺間今大成殿上樑前二日慶雲呈見或者上帝先師鑒朕悚惕誠敬之心昭示瑞應當躬詣太學文廟祭告以申感慶之衷將明年㑹試額數廣至四百名壬子科各省鄉試毎正額十名加中一名宣付史館乾隆八年十二月以星變諭廷臣修省之實先是十一月己亥彗星見距奎宿第二星二度大如彈丸黄色尾迹長尺餘毎夜逆行指東十二月丁卯上御門聽政畢召大學士等前曰星象見異朕思天心仁愛垂象示儆必政事之間有所缺失我君臣當夙興夜寐勤加修省以回天意惟是應天以實不以文修省之實非徒托之空言也且書不云乎王省惟嵗今嵗序將周正其時矣我君臣必深思所以致此之由缺失何在亟圖悛改庶㡬盡事天之道有以感召和氣而消未萌之眚也癸酉諭曰昨召見大學士陳世倌據奏近日彗星見宜下修省之詔宣示百官朕思人主君臨天下敬天勤民之心必嚴恭寅畏無時不凛上帝之鑒觀念兆人之休戚以期弭咎於未然誠以修省全在乎平日此朕之所以夙夜兢兢者事天以實不以文以誠不以偽也若但托於文告飾為敬慎警懼之辭而無引咎責躬之實徒務臣民之觀聴以塞責是明以示戒而更加粉飾則慢天欺世其過愈大豈能感召天和潛消沴戾乎前日御門時朕面降諭㫖原欲與大臣等交相儆省深思所以致此之由缺失何在亟圖悛改格天之道惟在乎修省之實而不在修省之文我君臣其共勉之二十四年三月甲午彗星見於虛宿之次色蒼白尾迹長尺餘指西南毎夜順行十餘日伏不見四月戊辰復出在張宿體勢甚㣲向東順行至五月初隠伏二十五年十二月欽天監言二十六年正月辛丒朔日月合璧五星聨珠推測得午初一刻合朔日月同在元􅑎宫躔女宿如合璧水星附日月躔牛宿木火土金四星同在娵訾宫躔危室二宿亦與日月附近五星經度既屬相連而其緯度又均在黄道之南如聨珠且其次序水木火土金接續相生諭大學士等曰據欽天監奏明年元旦午時日月合璧五星聨珠繪圖呈覽請宣付史館朕以七政同躔互運凌犯或所時有靈臺占候者轉指為瑞應以飾聽聞則大不是因召諸王大臣及監臣等面詢據勒爾森等稱五緯連貫相生不侵次舎實叶吉占並非以祲為祥等語朕於天文象緯素未深究從不強不知以為知但思日月五星行有常度史傳所載髙陽氏時五星聚於營室年代荒逺已難具論即如漢髙祖元年五星聚東井宋開寳元年五星聚奎殆千有餘年始一遇而其為實為偽亦莫可究及我朝雍正三年日月合璧五星聨珠相距宋時亦已七八百年今自乙巳至辛巳章蔀甫及兩周何以遂應再覯耶據監臣奏稱較前度為尤昭明則安知將來不有議此度之亦不昭明者耶邇日西陲大功底定版圖式廓逺踰二萬餘里海宇晏安年榖順成内外諸臣大法小㢘人民樂業其為祥瑞孰有大於此者乎又如今冬京師風日晴暖正在望雪之際而六花叠降四野均沾直𨽻河南山東山西等省並陸續奏報得雪而諸回城新闢耕屯亦有盈尺告豐之奏此則祥瑞之實而可徴者固不在乎合璧聨珠始足彰上蒼符應也在監臣等職司觀象諒不敢妄相附會以為潤色隆平之舉而揆之於理終難深信即使懸象著明星文表異實為我國家世運亨嘉之盛瑞惟當益加兢業保泰持盈用以上承靈庥以與我天下臣民共享太平之福耳至謂元正嘉兆適逢慈寧七旬大慶之年可徴萬夀延釐之祝朕惟心識之而黙叩乾貺若必宣付史館垂為慶牒則各省文武大吏必競以甘露慶雲等事紛紛入告將日事虛文轉致貽誤實政殊非朕敬天勤民宵旰圖治之至意所奏不必行仍將此宣諭中外知之三十四年七月甲辰彗星見於昴宿之次體如彈丸色蒼白尾迹長二尺餘指正西偏南毎夜順行八月望後伏不見十月復移見西方尋即隠伏三十五年閏五月己酉客星見於斗宿之次毎夜向北行十餘日即隠伏十一月彗星見於栁宿之次色蒼白尾迹長尺餘指南毎夜向北行十餘度七日隠伏皇朝文獻通考卷二百六十七
