body:
  text: 欽定四庫全書皇朝文獻通考卷二百四十帝系考二太皇太后皇太后臣等謹按螽斯衍慶𤓰瓞綿長萬福之原首隆懿範我朝慈宫曼夀色養含飴徽音逺紹家法具存逮我孝聖憲皇后璇闈篤祜履順垂模備福夀者八十六年受孝養者四十二載五世一堂臚歡舞綵尊親愛戴式煥彤編謹按年恭錄以昭母儀之盛於萬古云孝端文皇后博爾濟吉特氏科爾沁貝勒莽古思女崇德元年以嫡妃册立為清寧中宫后八年八月世祖登極尊母后孝端文皇后為皇太后順治六年四月乙巳崩七年二月丁亥恭上尊諡曰孝端正敬仁懿莊敏輔天協聖文皇后雍正元年八月己酉加上尊諡曰孝端正敬仁懿哲順莊敏輔天協聖文皇后乾隆元年三月乙巳加上尊諡曰孝端正敬仁懿哲順慈禧莊敏輔天協聖文皇后恭上孝端正敬仁懿莊敏輔天協聖文皇后尊諡冊文曰壼闈著聖善之儀凝禧未艾典禮重徽懿之報備物宜隆聿示來茲用光前美恭惟皇妣大行皇太后安貞應地敬順承天佐先皇致治之功啓沖子纘承之業方竭誠於奉養忽抱痛於升遐爰考舊章博咨公議用申哀慕式表尊崇謹奉册寶上尊諡曰孝端正敬仁懿莊敏輔天協聖文皇后薦顯號於几筵垂休有永昭鴻名於簡册錫祜無疆恭加上孝端正敬仁懿哲順莊敏輔天協聖文皇后尊諡册文曰配天立極表地道之安貞儷日揚光彰壼儀之雝肅徽音弗替顯號宜加欽惟孝端正敬仁懿莊敏輔天協聖文皇后敬慎温恭含𢎞光大範髙蘭掖邁夏室之塗山德冠璇閨嫓周家之渭涘勤勞成性心罔軼於箴規節儉持身動必遵乎律度鳴雞警戒助當宁之求衣佩帨從容向閟宫而潔藻玉階金戺聿傳温恵之風綺殿珠宫式著齊莊之範承文皇齊家之化業贊時雍逮世祖御極之期禮隆孝養屬當冲眇初荷鴻基追椒壁之遺芳捧瑶函而頌美謹奉册寳増上尊諡曰孝端正敬仁懿哲順莊敏輔天協聖文皇后伏冀慈靈降鑒厚澤凝庥恒衍慶於紫宸永揚名於彤管恭加上孝端正敬仁懿哲順慈禧莊敏輔天協聖文皇后尊諡册文曰配天贊化萬年昭雝肅之儀應地含章奕葉仰安貞之德載隆顯號遥頌徽音欽惟孝端正敬仁懿哲順莊敏輔天協聖文皇后位正坤寧功參乾始温恭成性關雎傳藹吉之心敬慎流徽褕翟仰端凝之度貴而能儉猶時御乎弋綈尊不忘勤每自成夫絺綌警六宫之傳漏恒襄問夜於未央欽九廟之薦馨克佐孝思於不匱玉階金戺聿宣仁惠之風椒殿珠宫益溥和平之化際文皇開創之日久著贊襄當世祖臨御之年備崇尊養顧惟沖藐遥荷恩暉膺纘緒於維新緬流芳於勿替謹奉册寶増上尊諡曰孝端正敬仁懿哲順慈禧莊敏輔天協聖文皇后伏冀慈愛昭垂純禧黙佑永啓鴻基於奕世長綿餘慶於萬年孝莊文皇后博爾濟吉特氏科爾沁貝勒寨桑女崇德元年封永福宫莊妃誕育世祖順治元年尊聖母孝莊文皇后為皇太后八年世祖親政二月戊子恭上聖母尊號徽號曰昭聖慈夀皇太后是年八月乙丑以大婚禮成加上徽號曰昭聖慈夀恭簡皇太后十一年六月己卯以册立皇后加上徽號曰昭聖慈夀恭簡安懿皇太后十三年十二月丁酉以封皇貴妃加上徽號曰昭聖慈夀恭簡安懿章慶皇太后聖祖嗣位康熙元年十月癸夘恭上尊號徽號曰昭聖慈夀恭簡安懿章慶敦惠太皇太后四年九月戊申以大婚禮成加上徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊太皇太后六年十一月丁巳以躬親大政加上徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊康和太皇太后十五年正月甲午以立皇太子加上徽號曰昭聖慈夀恭簡安徽章慶敦惠温莊康和仁宣太皇太后二十年十二月癸卯以滇逆盪平加上徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣𢎞靖太皇太后二十六年十二月己巳崩二十七年十月乙卯恭上尊諡曰孝莊仁宣誠憲恭懿翼天啓聖文皇后雍正元年八月己酉恭加上尊諡曰孝莊仁宣誠憲恭懿至德翼天啓聖文皇后乾隆元年三月乙巳恭加上尊諡曰孝莊仁宣誠憲恭懿至德純徽翼天啓聖文皇后恭上昭聖慈夀皇太后尊號册文曰開國承家道莫先於立愛正名定位禮莫大於尊親子有至情古垂彞憲宜登崇號以表化原恭惟聖母體備含𢎞性成聖善克恭儉而襄大業秉慈惠而諧六宫祜旣篤於家邦祥乃鍾於繼嗣恩勤顧復丕殫鞠子之勞啓廸訓行備示作君之則坤教彰於率土母儀式於九圍至德難名莫罄揄揚之實深恩罔報圖申尊養之誠爰順輿情肇隆盛典謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶上尊號曰昭聖慈夀皇太后伏願凝和履泰燕子詒孫德位兼崇錫鴻禧於四海天人協慶介眉夀於萬年寳文曰昭聖慈夀皇太后之寶恭上昭聖慈夀恭簡皇太后徽號册文曰聖化啓自宫闈肇修嘉禮盛典隆於尊養加上徽稱萬國翔歡羣工胥慶恭惟聖母昭聖慈夀皇太后翼襄皇考篤育眇躬大婚之禮既彰慈訓之恩益懋謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰昭聖慈夀恭簡皇太后伏願太平有象聖夀無疆鼎厯綿延於萬年本支丕承於奕世寳文曰昭聖慈夀恭簡皇太后之寳恭上昭聖慈夀恭簡安懿皇太后徽號册文曰恩深顧復隆聖善之徽音德懋安貞協尊親之大典喜諧宫壼慶溢庭闈欽惟聖母昭聖慈夀恭簡皇太后仁孝為儀含𢎞作則劬勞豫教既開國以承家鄭重好逑俾詒孫而燕子璇宫玉食寧申愛養之誠懿號鴻名庶備顯揚之禮謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰昭聖慈夀恭簡安懿皇太后伏願洪庥滋至眉夀無疆合六宇之臣民同欣厚載衍萬年之鼎祚永介純禧寳文曰昭聖慈夀恭簡安懿皇太后之寶恭上昭聖慈夀恭簡安懿章慶皇太后徽號册文曰慈恩㒺極祇深愛戴之忱盛德難名益肅尊崇之典澤流寰海喜溢宫庭欽惟聖母昭聖慈夀恭簡安懿皇太后道合坤貞功參乾始茂膺純嘏既錫祚於眇躬特簡賢媛俾協襄乎内治問安視膳莫申養志之微誠顯號隆儀用表徽音之備美謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰昭聖慈夀恭簡安懿章慶皇太后伏願福増瑶牒瑞靄萱闈如月之恒燕翼祥開百世唯仁者夀翟褕輝映千秋寶文曰昭聖慈夀恭簡安懿章慶皇太后之寶恭上昭聖慈夀恭簡安懿章慶敦惠太皇太后徽號册文曰昌源茂衍荷慈訓之詒謀景歴初膺奉彝章而晉號歡騰宫籞慶洽寰區欽惟聖祖母昭聖慈夀恭簡安懿章慶皇太后至仁厚德配地承天輔皇祖以式廓丕基懋著肅雝之化啓皇考而載恢大業益隆聖善之規顧眇躬之嗣纘鴻猷賴懿教之恩隆誨迪敬循顯揚之典用抒孝養之忱謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寳加上徽號曰昭聖慈夀恭簡安懿章慶敦惠太皇太后伏願休徴滋至純嘏彌増緜鶴算於無疆耀鴻名於有永寶文曰昭聖慈夀恭簡安懿章慶敦惠太皇太后之寳恭上昭聖慈夀恭簡安懿章慶敦惠温莊太皇太后徽號册文曰肇修内政基風化之大原隆上徽稱著詒謀之有本歡騰朝野慶溢邇遐欽惟聖祖母昭聖慈夀恭簡安懿章慶敦惠太皇太后純德安貞至仁厚載恭勤佐治贊皇祖以式闢丕基聖善垂庥啓皇考以恢𢎞大業顧眇躬之纘承統緒賴懿訓而期致太平爰及嘉禮之成宜進尊崇之典謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊太皇太后伏願慈恩益溥介祉彌増合四海之歡心長欣怙戴庇萬年之鼎祚茂衍昌隆臣不勝惓惓之至寳文曰昭聖慈夀恭簡安懿章慶敦惠温莊太皇太后之寳恭上昭聖慈夀恭簡安懿章慶敦惠温莊康和太皇太后徽號册文曰世德攸垂贊化惟資内治壼儀夙著尊親必上隆稱宫掖歡騰臣民喜溢欽惟聖祖母昭聖慈夀恭簡安懿章慶敦惠温莊太皇太后至仁厚載純德資生佐皇祖以肇基積慶有本啓皇考而纘緒盛業彌光延及眇躬撫有寧成之運溯兹熙洽實為厚德之詒今當親政之時宜晉顯揚之號謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊康和太皇太后伏願鴻禧丕茂眉夀無疆綿厯服於萬年永介升恒之祉敦本支於百世長昭昌熾之祥寶文曰昭聖慈夀恭簡安懿章慶敦惠温莊康和太皇太后之寶恭上昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣太皇太后徽號册文曰徽音錫祚啓萬年昌後之祥顯號揚休合四海尊親之戴慶流寰宇喜溢宫闈欽惟聖祖母昭聖慈夀恭簡安懿章慶敦惠温莊康和太皇太后德協坤元祉隆天祐贊襄祖烈垂奕葉而丕顯丕承燕翼孫謀繼重熙而卜年卜世兹者祗遵慈命建立元儲仰惟垂裕之深恩肅舉顯揚之鉅典謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣太皇太后伏願洪庥洊至景福彌隆長介夀祺茂升恒於有永備膺純嘏緜厯服於無疆寶文曰昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣太皇太后之寶恭上昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣𢎞靖太皇太后徽號册文曰厚德發祥錫中天之景命鴻稱歸美合萬國之歡心宗社凝庥家邦衍慶欽惟聖祖母昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣太皇太后仁恩持載聖則含𢎞澤上際而下蟠運開昌厯化東漸而西被功出慈宸乃者逆賊背恩亂常干紀遂致八年之久重貽聖善之憂賴光訓之昭宣屬兵戈之永戢太平有象彌彰燕翼之勤盛德難名莫罄尊親之戴謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寳加上徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣𢎞靖太皇太后伏願永隆啓佑長享怡愉緜寶祚於重闈福延奕世綏皇圖於函宇夀並兩儀寳文曰昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣𢎞靖太皇太后之寳恭上孝莊仁宣誠憲恭懿翼天啓聖文皇后尊諡册文曰坤順承天懿德肇興夫鴻業萃亨假廟隆稱永式於明禋將崇升祔之儀宜備顯揚之典欽惟皇祖妣大行太皇太后徽音集慶厚德凝符同媯汭以鍾靈並洽陽而著範歸我太宗文皇帝當金璽來嬪之日正琱戈啓土之年内治克襄帝圖式廓格精誠於九廟化洽蘋蘩敷隂禮於六宫祥徵穜稑篤生世祖章皇帝永清四海本胎教之䖍恭協正三辰奉母儀之雍肅每紆睿照睠青原蔀屋之艱實沛洪仁頒紅粟太倉之賜歡騰扶杖惠溢歌衢爰逮眇躬益彰慈訓秉三十年之聖善克致太平溥億兆姓之和恒長開景運懿筐載績勤勞不替於重闈大練垂裳節儉毎先於下土萬國共尊親之戴兩朝備孝養之隆夀考康寧福駢臻於箕範含𢎞光大德莫罄於羲圖方承愛日之歡遽遘升遐之痛終天銜恤率土均哀深維篤祜所由來永念發祥之有自爰咨輿論請命於天謹奉册寶上尊諡曰孝莊仁宣誠憲恭懿翼天啓聖文皇后於戲周室展閟宫之祀禮載升歌漢廷表長樂之儀史傳新注伏冀慈靈可接陟降在茲必得其名垂休聲於琬琰克昌厥後流餘慶於球圖彤管常新瑶函永煥恭加上孝莊仁宣誠憲恭懿至德翼天啓聖文皇后尊諡册文曰道符内則垂芳範於千秋德懋母儀享鴻聲於九廟几筵増煥典册攸新欽惟孝莊仁宣誠憲恭懿翼天啓聖文皇后應地含章配天贊化仁𢎞逮下關雎傳和藹之心禮重正家褕翟仰端凝之度宵衣旰食常參燮伐之勲廣運承乾每佐憂勤之治誕我世祖章皇帝鍾祥啓運善教凝庥八埏歸王㑹之圖四海戴慈闈之澤逮我聖祖仁皇帝神姿睿哲彌資鞠育之深恩至孝感孚丕受綿長之介福備兩朝之尊養運啓羲農裕奕葉之貽謀名髙任姒顧惟冲眇夙荷恩輝兹當繼序之初爰切追崇之義謹奉册寶増上尊諡曰孝莊仁宣誠憲恭懿至德翼天啓聖文皇后伏冀長綏純嘏俯鑒精誠緜百世之本支篤萬年之慶譽恭加上孝莊仁宣誠憲恭懿至德純徽翼天啓聖文皇后尊諡册文曰範髙蘭掖逺垂内則之芳型德冠珠宫遥溯母儀之令望肅瞻玉几䖍奉瑶函欽惟孝莊仁宣誠憲恭懿至德翼天啓聖文皇后柔順流徽安貞作則宏綏福履璇閨傳樛木之仁茂著臧嘉綺殿被葛覃之化正位乎内克佐櫛風沐雨之勲長發其祥爰徵繞電流虹之瑞誕我世祖章皇帝鍾靈毓秀受籙膺圖敷天䝉聖善之庥率土頌仁慈之澤洎乎聖祖彌資鞠育深恩逮及世宗備舉欽崇鉅典統兩朝之孝養受福綿長極三世之尊親垂光奕葉顧惟冲藐丕纘鴻基緬懷懿德於千秋載頌徽音於九廟謹奉册寶増上尊諡曰孝莊仁宣誠憲恭懿至德純徽翼天啓聖文皇后伏冀慈靈垂裕純嘏凝禧永緜佑啓於萬年長篤阜安於百世孝惠章皇后博爾濟吉特氏科爾沁多羅貝勒原封鎮國公綽爾濟女順治十一年六月甲戌册立為皇后聖祖登極康熙元年十月癸卯恭上母后孝惠章皇后尊號徽號曰仁憲皇太后四年九月戊申以大婚禮成加上徽號曰仁憲恪順皇太后六年十一月丁巳以躬親大政加上徽號曰仁憲恪順誠惠皇太后十五年正月甲午以立皇太子加上徽號曰仁憲恪順誠惠純淑皇太后二十年十二月癸卯以滇逆盪平加上徽號曰仁憲恪順誠惠純淑端禧皇太后五十六年十二月丙戌崩五十七年三月辛酉恭上尊諡曰孝惠仁憲端懿純德順天翼聖章皇后雍正元年八月己酉加上尊諡曰孝惠仁憲端懿慈淑純德順天翼聖章皇后乾隆元年三月乙已加上尊諡曰孝惠仁憲端懿慈淑恭安純德順天翼聖章皇后恭上仁憲皇太后徽號册文曰德𢎞寶祚啟萬年顯世之符禮重徽稱合四海尊親之戴喜諧禁籞慶溢寰區欽惟母后皇后柔順承天安貞配地贊襄皇考敷内治而化洽宫庭撫育眇躬紹丕基而恩深訓迪仰慈仁之備至宜尊養之兼隆載考彞章晉崇鴻號謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶上徽號曰仁憲皇太后伏願嘉祥駢集茂祉愈増昭令聞而卜世卜年迓休徵而彌昌彌熾寶文曰仁憲皇太后之寶恭上仁憲恪順皇太后徽號冊文曰本支昌盛遡厚徳於坤儀海宇雍和發休聲於内則宫闈胥慶朝野翔歡欽惟母后仁憲皇太后性篤温恭化彰儉約襄皇考以治内儆戒不遑訓眇躬以臨民恩勤備至兹行嘉慶之禮宜宏聖善之稱謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰仁憲恪順皇太后伏願長凝介祉永錫夀祺徽音似續於千秋隂教欽崇於四海寶文曰仁憲恪順皇太后之寶恭上仁憲恪順誠惠皇太后徽號册文曰聖善垂謨立政宜先孝治徽音克嗣尊親應上鴻名欣洽宫闈頌盈寰宇欽惟母后仁憲恪順皇太后仁慈天植淑惠性成雝肅揚徽相皇考而表儀天下燕詒作訓廸眇躬以寧輯四方今當親政之時宜晉尊崇之典謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寳加上徽號曰仁憲恪順誠惠皇太后伏願永綏多福垂裕後昆長享夀祺鞏千秋之大業永安敬養合萬國之歡心寶文曰仁憲恪順誠惠皇太后之寶恭上仁憲恪順誠惠純淑皇太后徽號册文曰慈徽啓後衍景祚於洪圖懿範垂庥晉隆名於鉅典歡盈朝野慶洽宫闈欽惟聖母仁憲恪順誠惠皇太后德茂安貞仁符厚載勤宣内治佐皇考以詒謀懋著母儀訓眇躬而敷政兹元儲之懋建宜顯號之崇加謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰仁憲恪順誠惠純淑皇太后伏願茂増福嘏益介夀祺彤管揚輝令聞丕光於四海璇宫迪吉彞章永播於萬年寶文曰仁憲恪順誠惠純淑皇太后之寶恭上仁憲恪順誠惠純淑端禧皇太后徽號册文曰慈懿垂裕符泰運於三階鴻號顯揚播徽音於萬國承顔有喜介福無疆欽惟母后仁憲恪順誠惠純淑皇太后德備安貞道偕博厚仁庥錫祉衍家邦昌熾之祥夀域凝和洽海宇清寧之慶乃者逆渠犯順邊徼弗寧仰賴𢎞慈聿臻大定獲際昇平之誕奏爰晉崇顯之隆稱謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寳加上徽號曰仁憲恪順誠惠純淑端禧皇太后伏願純嘏彌増嘉徵洊至共球咸集九州奉尊養之歡文軌來同億載永升恒之頌寶文曰仁憲恪順誠惠純淑端禧皇太后之寳康熙三十六年七月大學士等以平噶爾丹請上皇太后夀康顯寧徽號奉皇太后懿㫖皇帝懋建鴻勲予不勝忻悦際此昌期予心慰矣尊加徽號向雖有例並非斷不可已者著停止我心始安恭上孝惠仁憲端懿純德順天翼聖章皇后尊諡册文曰禮隆祔配將申假廟之誠義極顯揚特重崇親之典奉明禋而有恪熙鴻號以無窮欽惟皇妣大行皇太后儷天體順應地含章鍾渭涘之殊靈繼蜀山之盛軌歸我世祖章皇帝克襄内治每持敬慎之小心允協坤成實禀肅雝之令則訓掖庭以節儉躬曳練衣率嬪御以勤勞心親織室迨乎奉事太皇太后重闈櫛縰日問長信之安内殿羹湯時視大官之膳閱歳年而罔懈繄仁孝之夙成六宫被慈惠之恩感深聖善四海享和恒之福慶衍昇平展祀瑶齋事䖍修夫蘋藻流光玉牒化徧洽於雎麟自惟幼冲備䝉顧復追憶昭隆之德已閱兩朝載懷尊養之忱聿周五紀謂遐齡之永錫詎仙馭之遽升逮及無期哀摧至極緬思懿行欲宣述以何由式奉遺規竭形容而莫罄用咨羣議敬告三靈謹奉册寶上尊諡曰孝惠仁憲端懿純德順天翼聖章皇后於戲考閟宫之樂頌長發其祥嗣京室之徽音克昌厥後伏冀慈靈曲眷神貺斯憑典册常新等球圖而並重隆名罔極與日月以齊懸炳耀琅函輝華彤管恭加上孝惠仁憲端懿慈淑純德順天翼聖章皇后尊諡册文曰懿德垂休美報宜隆於奕世聖慈積慶鴻名自耀於億年禮莫重於追崇義必先於報本彞章式煥典册丕昭欽惟孝惠仁憲端懿純徳順天翼聖章皇后淑慎温恭含𢎞光大佐世祖以敷政内治勤修事文母以承歡孝思維則精誠罔懈潔九廟之蘋蘩謙抑自持率六宫以節儉撫聖祖於沖幼端母教於掖庭歴六十四載之恩勤仁慈備至合千八百國之推戴尊養兼隆緬企前徽彌思厚德宫闈顧復瞻色笑以長依禁籞趨承溯音容而如昨蓋諸福咸備已徵保定之符而慈教長垂愈衍昇平之慶兹丕基之是纘正顯號之宜崇謹奉册寳恭上尊諡曰孝惠仁憲端懿慈淑純德順天翼聖章皇后伏冀坤靈黙佑福履永綏介繁祉於無疆錫𢎞庥於勿替恭加上孝惠仁憲端懿慈淑恭安純德順天翼聖章皇后尊諡册文曰儷乾作則啓萬年有道之長體巽流徽衍奕世無疆之慶晉金函而煥彩崇鴻號以揚芬欽惟孝惠仁憲端懿慈淑純德順天翼聖章皇后柔静凝庥温恭著範佐世祖而勤内治式贊太平事文母以展孝思聿隆尊養潔蘋蘩於九廟念切精誠親澣濯於六宫身先節儉撫聖祖於幼冲之日竭慈覆於顧復之餘六十四年備恩勤之至德千八百國合愛戴之歡心惟和氣以致祥畢臻諸福信仁人之多夀克享大年當淑景方長皇考猶獲瞻夫色笑今恩暉遥荷𦕈躬正合致夫尊崇典禮維新顯揚益切謹奉册寶増上尊諡曰孝惠仁憲端懿慈淑恭安純德順天翼聖章皇后伏冀慈靈降鑒厚澤貽庥綿百世之本支佑萬邦之安阜孝康章皇后佟佳氏少保都統承恩公佟圖賚女為世祖妃誕育聖祖聖祖登極康熙元年十月癸夘恭上聖母孝康章皇后尊號徽號曰慈和皇太后二年二月庚戌崩五月甲午恭上尊諡曰孝康慈和莊懿恭惠崇天育聖章皇后九年五月丙辰加上尊諡曰孝康慈和莊懿恭惠崇天育聖章皇后雍正元年八月己酉加上尊諡曰孝莊慈和莊懿恭惠温穆崇天育聖章皇后乾隆元年三月乙巳加上尊諡曰孝康慈和莊懿恭惠温穆端靖崇天育聖章皇后恭上慈和皇太后徽號册文曰德𢎞寶祚啓萬年顯世之符禮重徽稱合四海尊親之戴喜諧禁籞慶溢寰區欽惟聖母仁稱乾始道合坤貞秉淑範而襄内治化洽宫庭誕眇躬而纘鴻圖恩深顧復仰慈仁之備至宜尊養之兼隆載考彞章晉崇鴻號謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寳上徽號曰慈和皇太后伏願嘉祥駢集茂祉愈増昭令聞而卜世卜年迓休徵而彌昌彌熾寳文曰慈和皇太后之寳恭上孝康慈和莊懿恭惠崇天育聖皇后尊諡册文曰慈恩罔極報莫殫夫追崇厚德難名號宜尊乎顯懿用表無前之美以彰不匱之恩中外咸孚典儀惟備欽惟皇妣大行慈和皇太后淑慎柔嘉温恭慈惠飭躬靜好流藹吉之徽音逮下雍和著肅雝之雅化内承皇考匡贊惟勤上奉重闈䖍恭匪懈眇躬纘緒方申尊養之忱鸞馭升遐遽結終天之慕仰惟盛德宜薦鴻名載考舊章博咨公議謹奉册寶上尊諡曰孝康慈和莊懿恭惠崇天育聖章皇后伏冀慈靈昭格彝典懋膺益𢎞佑啓之仁永衍邦家之慶恭加上孝康慈和莊懿恭惠温穆崇天育聖章皇后尊諡册文曰慈範丕昭厚德衍無疆之慶徽音廣被深仁開有道之長稽鉅典以尊崇奉鴻名而揚扢金函煥采玉册増輝欽惟孝康慈和莊懿恭惠崇天育聖章皇后坤順同符乾元協撰著幽閒之度禁掖流芳建雍肅之儀宫庭起化克宣内治精誠而潔蘋蘩奉事重闈愉惋而勤問視躬節儉以昭令則澣濯成風本愷悌以布𢎞庥慈祥及物篤生我聖祖仁皇帝誕應昌期毓成至德集萬方之愛戴慶五紀之昇平當纘承伊始之年正尊顯宜隆之日仰體孝思於不匱繼述維殷緬懷懿德於無窮顯揚益切謹奉册寳増上尊諡曰孝康慈和莊懿恭惠温穆崇天育聖章皇后伏冀慈眷加隆純禧洊至奠清寧於四海貽昌熾於萬年恭加上孝康慈和莊懿恭惠温穆端靖崇天育聖章皇后尊諡册文曰懿德丕昭令則常垂於百世聖慈廣被鴻名永耀於萬年播彤管以増輝奉瑶函而煥彩欽惟孝康慈和莊懿恭惠温穆崇天育聖章皇后道協坤元功符乾運勤修壼政早起化於宫庭懋著母儀永流徽於禁掖九廟之蘋蘩致潔克秉精誠重闈之問視時殷聿彰仁孝躬行節儉深宫成澣濯之風親贊太平厚德啓綿長之瑞篤生我聖祖仁皇帝誕應苞符毓成聖德萃愛戴於億千萬國享昇平者六十餘年洎眇躬纘緒之初正鉅典崇徽之日福鍾善慶緬懿訓於無窮禮重顯揚致孝思於不匱謹奉册寶増上尊諡曰孝康慈和莊懿恭惠温穆端靖崇天育聖章皇后伏冀純禧孔固慈佑彌隆永貽昌熾之祥長啓和恒之福孝恭仁皇后烏雅氏承恩公威武女誕育世宗康熙十八年十月甲戌封德嬪二十年十二月己亥晉封德妃六十一年十一月世宗憲皇帝登極是月癸夘諭禮部恭上聖母皇太后尊號十二月乙夘禮部㑹同王大臣等恭擬皇太后尊號曰仁夀皇太后奉諭㫖所奏是本日以應行典禮具奏皇太后不允諸王大臣復奏恭請皇太后允上尊號以慰聖主孝思以副臣民仰望奉諭㫖諸王大臣奏請一疏朕親呈皇太后再三叩求奉皇太后懿㫖皇帝及諸王大臣援引舊典懇切求請予亦無可如何知道了雍正元年正月壬寅諭總理事務王大臣等母后誕育朕躬纘承大統謹考彞章請上尊號母后以皇考山陵之禮未畢不忍即受尊稱前據諸王大臣合辭䖍請敬上仁夀皇太后尊號援引舊典敦請再三始䝉慈允今恭上册寶典禮亟應舉行母后聖意仍欲遲遲其應於何時舉行總理事務王大臣㑹同禮部九卿確議具奏尋議奏俟聖祖仁皇帝山陵事畢選擇吉期恭上册寶五月辛丑崩八月己未恭上尊諡曰孝恭宣惠温肅定裕贊天承聖仁皇后乾隆元年三月乙已加上尊諡曰孝恭宣惠温肅定裕慈純贊天承聖仁皇后恭上仁夀皇太后徽號册文曰慈範丕昭四海合尊親之戴鴻稱敬晉萬年啓垂裕之祥宫籞歡騰寰區慶溢欽惟聖母功符厚載道協資生本愷悌之淵衷慈祥逮下秉温恭之令則淑慎持躬至孝至仁奉重闈而晨昏將敬克勤克儉處内殿而澣濯揚休雅化洽於周詩備貞靜幽閒之度令德敷於坤教極恩勤顧復之勞事皇考而内治克勷徽音久著逮眇躬而鴻圖是纘鉅典宜隆聿申尊養之忱特進顯揚之號謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶上徽號曰仁夀皇太后伏願純禧天錫景福川長紫極凝庥與升恒而俱永彤闈集慶並髙厚以無疆寶文曰仁夀皇太后之寶臣等謹案雍正元年世宗憲皇帝率羣臣恭上仁夀皇太后尊號敬遵慈諭下所司議奏俟聖祖仁皇帝山陵事畢諏吉舉行是年五月仁夀皇太后升遐未及舉行典禮而大儀具備册寳煌煌並煥天府天下臣民仰見憲皇帝篤孝之誠而聖母謙尊之德益萬古為昭矣恭上孝恭宣惠温肅定裕贊天承聖仁皇后尊諡册文曰母儀正位仁風誕播於八方壼德流輝寶訓永垂於萬世進徽稱於清廟玉册爰新議典禮於容臺彤編式煥欽惟皇妣大行皇太后華渚炳靈慶都凝瑞秉含宏之淑性應地安貞樹雝肅之芳型儷天作則贊襄内治逮􅉏御以加恩輔佐先皇自宫庭而起化寛仁夙著胥食德而飲和樸素攸崇務去奢而從儉荷生成於聖母誕育眇躬極尊養於慈闈未酬厚載上推崇之號允諧萬國歡心執謙讓之衷堅却百僚敦請音容倐隔戀慕實深兹當升祔之辰莫罄顯揚之悃嘉言懿行永懐至徳於坤元琬刻瑤稜肅薦明禋於閟寢謹奉册寶恭上尊諡曰孝恭宣惠温肅定裕贊天承聖仁皇后伏冀黙扶景祚宏衍慶源啓後人紹衣之圖克承克繼導寰宇龎鴻之祉俾熾俾昌恭上孝恭宣惠温肅定裕慈純贊天承聖仁皇后尊諡册文曰慈範丕昭奕世衍無疆之慶徽音廣被萬年垂至德之光稽鉅典以加崇奉鴻名而致頌金函煥彩玉册増輝欽惟孝恭宣惠温肅定裕贊天承聖仁皇后順應乾行厚同坤載佐憂勞於夙夜克贊宸猷樹肅穆於宫庭聿宣壼教撝謙為度共傳温惠之風秉恕居心羣荷寛仁之澤恪勤内職精誠而潔治蘋蘩孝養重闈愉婉而躬親問視篤生我世宗憲皇帝誕應昌期毓成至德正集萬方之愛戴俄驚一旦之遐升爰奉徽稱敬昭令則暨眇躬之纘緒彌追痛於含飴仰體孝思方當尊禮攸隆之日緬懷懿訓益切顯揚莫罄之忱謹奉册寶増上尊諡曰孝恭宣惠温肅定裕慈純贊天承聖仁皇后伏冀陟降在兹鑒觀不逺永佑綿長之祚式開昌熾之符孝聖憲皇后鈕祜禄氏承恩公凌柱女誕育聖躬雍正元年十二月丁夘封熹妃晉號貴妃十三年九月皇上登極十二月戊寅恭上聖母孝聖憲皇后尊號徽號曰崇慶皇太后乾隆二年十二月甲午以册立皇后加上徽號曰崇慶慈宣皇太后十四年四月乙酉以平金川加上徽號曰崇慶慈宣康惠皇太后十五年八月癸酉以册立皇后加上徽號曰崇慶慈宣康惠敦和皇太后十六年十一月乙酉以皇太后萬夀加上徽號曰崇慶慈宣康惠敦和裕夀皇太后二十年六月己酉以平準噶爾加上徽號曰崇慶慈宣康惠敦和裕夀純禧皇太后二十六年十一月甲午以皇太后萬夀加上徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿皇太后三十六年十一月丙辰以皇太后萬夀加上徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后四十一年五月辛未以平定金川加上徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺寧豫皇太后四十二年正月庚寅崩三月壬午恭上尊諡曰孝聖慈宣康惠敦和敬天光聖憲皇后恭上崇慶皇太后徽號册文曰慈恩垂裕九重隆尊養之儀鴻號揚庥萬國仰崇髙之福歡騰宫壼慶溢寰瀛欽惟聖母皇太后德協坤元功符地載寛仁逮下溥惠愛之宏慈淑慎持躬著温恭之令範承皇考而贊襄内治儉勤昭澣濯之風鞠眇躬而備篤母儀言動示詩書之教屬丕基之肇纘忻福履之方長仰荷恩勤敬稽盛典合四海以致養期永奉夫崇徽總百禄以承歡冀溥沾夫慶澤肅循經禮䖍展悃忱謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寳上徽號曰崇慶皇太后伏願純嘏茂膺夀祺多益彤庭寳册鴻名並髙厚以無疆紫極春暉愛日與升恒而俱永寶文曰崇慶皇太后之寶恭上崇慶慈宣皇太后徽號册文曰慈恩裕慶集介福於璇圖懿德垂庥晉鴻稱於金篆寰區仰戴宫禁騰歡欽惟聖母崇慶皇太后陛下資生合撰厚載同符端萬國之母儀仁風普洽正重闈之慈範惠愛覃敷恭儉流徽嫓漢家之明德恩勤示教邁宋室之慈仁惟隆顯懿之名益煥尊崇之典兹者伏承明訓授册中宫䝉慶澤於彤闈彞章肇舉嗣徽音於蘭殿純嘏彌昌肅展盛儀恭申忱悃謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰崇慶慈宣皇太后伏願愛日凝禧康齡錫福升恒共慶春暉瑞靄堯門慈孝相承坤徳仁周禹甸寶文曰崇慶慈宣皇太后之寶恭上崇慶慈宣康惠皇太后徽號册文曰慈恩垂訓萬方䝉樂利之庥鴻號加崇四海仰尊榮之福歡騰宫掖慶溢寰瀛欽惟聖母崇慶慈宣皇太后陛下德協資生功同厚載禔躬恭儉儀型式播於家邦逮下寛仁惠澤廣宣於中外承歡内殿藐躬久荷恩勤視膳璇宫慈教常殷啓迪近以西川之用武尤煩夙夜之縈懷仰邀懿訓之詳克致膚功之建邊疆永靖實為宗社之光弓矢載櫜允屬生靈之慶我國家無疆之祉其在於斯惟聖母莫大之慈以克臻此兹者合外庭之喜頌祇上崇徽賁中閫之榮封適逢吉日敬稽經禮䖍展悃忱謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寳加上徽號曰崇慶慈宣康惠皇太后伏願純禧茂集多福誕膺煥寶册於彤庭偕日升月恒而並曜藹春暉於紫極與天髙地厚而俱長寶文曰崇慶慈宣康惠皇太后之寶恭上崇慶慈宣康惠敦和皇太后徽號册文曰慈教勤敷厚德普八紘而徧覆崇徽廣播庥光合萬國以同瞻喜溢宫庭歡騰海宇欽惟聖母崇慶慈宣康惠皇太后陛下德洽坤元功符地載持躬淑慎家邦仰懿範之昭逮下寛慈中外沐仁風之被恩勤備至生成荷鞠育之勞訓誨有加樂利錫寰區之福屬中宫之成禮慶典増輝忻長樂之凝祥慈幃有喜問安内殿修常職於晨昏視膳璇宫奉怡顔於盥饋合九州而致養正逢悦豫之期總百禄以承歡宜極尊崇之典肅循經禮䖍展悃忱謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寳加上徽號曰崇慶慈宣康惠敦和皇太后伏願夀愷凝禧升恒介祉寶册共星雲而並煥福履常綏鴻名偕天地以無疆春暉益永寶文曰崇慶慈宣康惠敦和皇太后之寶恭上崇慶慈宣康惠敦和裕夀皇太后徽號册文曰鴻慈式訓一人承啓迪之隆厚德凝祥八表效尊親之戴歡騰中壼慶溢寰區欽惟聖母崇慶慈宣康惠敦和皇太后陛下地道同符坤元合撰化孚宫掖敦禮教而範著璇闈治洽邦家沛仁施而惠周瀛海恩深鞠育仰䝉顧復之勤念切曕依宜備欽崇之典荷春暉之普照序啓陽和欣夀域之宏開律諧長至六旬初度恰六花獻瑞之辰萬福攸同正萬國來朝之候捧霞觴而跪進並申嵩岳之呼侍翠輦以扶趨齊上瑶池之祝合九州而致養永戴慈雲總百禄以承歡溥沾愷澤敬稽經典䖍展悃忱謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰崇慶慈宣康惠敦和裕夀皇太后伏願純禧茂集嘉祉駢臻遐齡綿有道之長寶册偕日星並煥篤祜迓無疆之祚徽章與高厚常昭寳文曰崇慶慈宣康惠敦和裕壽皇太后之寶恭上崇慶慈宣康惠敦和裕夀純禧皇太后徽號冊文曰聖慈衍慶版章式廓於遐方顯號揚庥尊養丕崇於寰海本至德而膺多福保佑自天備純嘏而炳鴻文安貞應地歡騰朝野喜溢宫庭欽惟聖母崇慶慈宣康惠敦和裕壽皇太后陛下德協資生功符厚載肅雍宣化流慶譽於黄裳誠敬垂型懋徽音於蒼籙璇宫視膳長荷洪仁蘭殿承歡恒聆懿訓近以逺夷款附絶塞蕩平萬里犁庭道左有壺漿之獻半年奏凱師中無矢石之勞實邀慈廕之宏敷克致膚功之迅奏鞏萬載不拔之業兵氣都消闢百年未集之圖邊塵胥靖臣民稽首僉謂天家不世之功中外輸誠咸曰聖母無疆之慶合輿情而祝嘏祇上徽稱賁册府之光華敬諏吉日載稽禮制肅展悃忱謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寳加上徽號曰崇慶慈宣康惠敦和裕夀純禧皇太后瑞叶丹圖慈慶滂流於海宇祥徵緑字奎章炳烺於星辰誠亘古之隆規而普天之盛典伏願琅函永煥寶牒常輝崇燕喜於日月山川蕃禧屢錫被鴻名於圭璋琬琰景貺頻臻受百千國來享之文六合均膺晉福垂億萬年無窮之裕八荒咸頌坤儀寶文曰崇慶慈宣康惠敦和裕夀純禧皇太后之寶乾隆二十四年十月壬寅王大臣等以平定回部請加上皇太后徽號上諭敬惟辛巳歳恭逢聖母皇太后七十萬夀慶辰鉅典鴻儀舉行伊邇兹以膚功既奏上慰慈懷已於長至節宣表稱賀推恩展禮稠疊便蕃其崇上尊號宜以普天大慶時敬謹恭擬再行奏請懿㫖諸王大臣其明體朕意恭上崇慶慈宣康惠敦和裕夀純禧恭懿皇太后徽號册文曰瑶樞垂曜普天樂化日之長寶册凝徽薄海仰慈雲之䕃祝九如之純嘏舞效嵩呼合六宇之歡心誠孚葵向恩覃中外慶洽邦家欽惟聖母崇慶慈宣康惠敦和裕夀純禧皇太后陛下德合安貞功符厚載純粹中正垂内教於椒庭富夀康寧集殊祥於箕範大安祇奉羣欽恭穆之型長樂早朝每領寛仁之訓廿六載疇咨政治禀懿訓以維勤二萬里式廓昄章承慈庥以徧被兹屆七旬之大慶恰鄰南至之嘉辰玉琯迎陽三百六旬之干支伊始璇闈廸吉億萬斯年之福禄逾增璧合珠聯紀瑞聿徵於元日天花法雨延釐遥應乎文殊獻益地之瑶圖來從懸圃奏鈞天之廣樂響叶仙韶翠輅親扶荷春暉之久照霞觴跪捧樂湛露之均霑惠澤浹於寰中齊上延洪之頌尊養隆以天下宜加顯懿之稱庸定彞章䖍申忱悃謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿皇太后伏願修齡永茂嘉祉丕膺申錫無疆與清寧而並夀含章有慶昭符瑞以常新寳文曰崇慶慈宣康惠敦和裕夀純禧恭懿皇太后之寶恭上崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后徽號册文曰璇闈錫美德施昭曼夀之徵蘭殿敷慈福集紀鴻名之􅍇際自古希聞之大慶祥軼羲軒晉從今遞積之徽稱音揚任姒孚歡陬澨洽喜清寧欽惟聖母崇慶慈宣康惠敦和裕夀純禧恭懿皇太后陛下厚德頤恬繁禧垂裕禔源昌熾履箕範之歛敷順氣彌綸協坤輿之光大天開聖節景迓長春欣八袠之崇登祝萬年之介祉亹遵懿訓寅奉怡顔依愛日以循陔舞綵逮六旬以上載春暉而負扆垂衣臻三紀於兹膝繞雲礽臚嘉祥於五世野多耄耋開夀宇於八方有慶則兆民同尊親以天下養頌賡徧德叠蠲二稅以阜成雅詠作人聯啓兩闈而彚吉四言下管新苞茂之瑶宫萬歳呼嵩掖省巡之翟輅維錫類承歡之茂集總合羣黎百姓之心凡家慶國瑞之駢臻皆由聖母一人之福載稽舊典式備多儀制更重於祥金禮特隆夫嘉玉用宜延喜珍來西母之琯環矧乃象功貢底闐河之璆璧彞章肇定顯號洊加謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后肅布愉悰䖍申祈頌繹彖辭之應地安乃永貞次詩什於生民祺維介景捧瑶箋而獻籙陳芝牒以迎釐伏願純嘏長綏茀康彌劭律生萬事之本八暢元音籌添億歳之盈十基積數從此京垓演策川長山夀躋悠久於坤元章蔀引年日升月恒並増興於天保寳文曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后之寶恭上崇慶慈宣康惠敦和裕夀純禧恭懿安祺寧豫皇太后徽號册文曰堯門啓瑞樞光昭耆定之模姒幄基祥帡䕃衍昇平之慶頌孚海宇忭集臣鄰欽惟聖母崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后陛下聖裕徽音福徵厚德尊親並戴合萬國以臚歡名夀兼隆臻億齡而履順兹值金川之底績爰陳瑶牒以告勲溯彼蠻觸搆争始猶寛其齊斧繼乃貙狼肆抗終難逭其威弧揚兩路之先聲兵非得已簡八旗之勁旅勇且知方越險摧堅不啻功成百戰擣巢翻穴於斯事蕆五年予小子籌筆辛勤每厪慈訽之垂念師武臣劘旌勞勩克馳捷奏以慰懷兵銷騰日月之光升恒祝嘏樂作叶韶韺之盛美善歸親宜晉鴻稱用崇燕喜精璆聯珏稽朝家隆重之儀嘉璽琱珍抒中外喁于之願謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶加上徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺寧豫皇太后顒捧芝函䖍申葵悃繹箕疇之來備是曰康寧演羲畫之利行實惟豫順懿美式彰夫蒼籙蕃釐允迓乎琅編伏願道契安貞性彌愷樂闡昌符於金石寶琰恒新熙洪號於垓埏蘿圖益煥常來王而常來享共球同紀殷篇莫不興而莫不増川岳常賡周雅寶文曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺寧豫皇太后之寶恭上孝聖慈宣康惠敦和敬天光聖憲皇后尊諡册文曰崇儀告備薦玉册以申䖍懿行垂光勒琅函而闡實報劬勞之厚德禮洽馨聞嚴對越之鴻名義隆睿作欽惟皇妣大行皇太后順體天經化彰人極萱庭示範仰宫中之有聖人瑶甸歸仁臨天下而為大母自流徽於京室荷篤慶於藐躬億兆騰歡萃萬方為尊養曽元衍瑞裕五世以融怡緬義訓之常昭洵颺言之莫罄賁鳯綸而賜復澤及葭蓬扶翟輅以觀民呼兼嵩岱益圖旅賀來庭之鶼鰈駢臻偃伯承禧絶徼之干戈並戢是皆慈暉普照覃嶽澥而含和用能純履康綏麗乾坤而集福憶昨者金泥絢祝十八字叠演箕疇冀來兹寶琰鐫華億萬齡重増姬算惟愛景情殷顧復依旬之臚頌何窮宜慈躬祉懋升恒晉册之揚庥未艾何升遐之忽遘竟攀慟之難追率土纒悲終天銜恤當尊稱於殷禮念形容無得而名稽上諡於周書極擬議於斯為盛有孝實原有德本百行於地天乃聖即協乃神嫓獨隆於堯舜一詞莫贊敢憑素悃以追攀萬世為公並詢僉言而咸翕爰遵彝典請命於天謹奉冊寶上尊諡曰孝聖慈宣康惠敦和敬天光聖憲皇后於戲溯璇闈徽音大行宜特隆冠古之聲頌清廟昌後燕天庶稍展崇親之悃伏冀神靈式妥陟降在兹文琬貽型抒慕誠之罔極彤毫述德荷申錫於無疆宏啓嘉符茂昌景祚謹言臣等謹按馬端臨通考上皇太后尊號儀注載皇太后門五朝續通考則以此類禮儀皆王禮也仍王圻本移入王禮考今從之皇朝文獻通考卷二百四十
