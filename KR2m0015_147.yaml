body:
  text: 欽定四庫全書皇朝文獻通考卷一百四十王禮考三十三國恤臣等謹按慎終追逺古典所先儀禮止有士䘮既夕士虞三篇而大夫以上闕焉黄榦續儀禮經傳通解據周禮禮記諸書綴緝次第以補其闕而國恤之禮始釐然可考馬端臨述宋一代之制本之九朝史及㑹要其儀注視古稍詳我朝列聖大事一切禮儀周詳賅備誠孝之至通乎神明臣等逖稽在昔哲王慎終之典未有如斯之盡禮盡哀者也謹臚而載之以為萬世法式天命十一年八月庚戌太祖髙皇帝崩恭奉梓宫於宫中正殿辛亥恭移梓宫暫安奉於瀋陽城西北隅天聰三年二月奉移梓宫於福陵奉移後典禮並載山陵門後條俱倣此崇徳元年四月恭上尊諡曰承天廣運聖徳神功肇紀立極仁孝武皇帝廟號太祖康熙元年四月加上尊諡曰太祖承天廣運聖徳神功肇紀立極仁孝睿武𢎞文定業髙皇帝崇徳八年八月庚午太宗文皇帝崩次日奉安梓宫於崇政殿九月壬子奉移梓宫於昭陵順治元年十月辛酉恭上尊諡曰應天興國𢎞徳彰武寛温仁聖睿孝文皇帝廟號太宗順治十八年正月丁巳世祖章皇帝崩恭奉梓宫於乾清宫二月壬午奉移梓宫於景山夀皇殿三月癸酉恭上尊諡曰體天隆運英睿欽文大徳𢎞功至仁純孝章皇帝廟號世祖康熙二年四月辛酉奉移梓宫於孝陵康熙六十一年十一月甲午聖祖仁皇帝崩次日奉安梓宫於乾清宫世宗憲皇帝諭曰皇考教養文武大小臣工六十餘年孰不躬沐深恩今一旦升遐衆心哀痛切至大殮時著令王貝勒貝子公文武大臣皆入乾清門内令其瞻仰得盡哀戀之情又禮部奏儀注内公主福晉咸於乾清宫丹墀齊集奉㫖皇考之女朕兄弟之福晉豈可逺列丹墀著仍入大内親近梓宫使得盡哀朕之兄弟子姪亦皆令入乾清門在丹墀上隨朕行禮嗣後公主近支王福晉大人咸集於几筵殿内是日諸王大臣奏請諒隂之次或御昭仁殿或御𢎞徳殿諭曰朕遭皇考大事哀痛方深何忍安居内殿其以乾清宫東廡為倚廬自後上居乾清宫東廡晝必席地夜必寢苫每日上香奠禮凡五次十二月甲寅奉移梓宫暫安奉於夀皇殿先是十一月命總理事務王大臣修理景山夀皇殿諭曰朕受皇考深恩如天罔極忽升仙馭攀戀無從惟有朝夕瞻仰梓宫稍盡哀慕之忱今王大臣等所議安奉之處或在南海子或在鄭家荘此二處隔越郊外離宫禁甚逺朕心不忍緬惟世祖章皇帝大事時曽安奉景山夀皇殿朕意亦欲安奉於景山夀皇殿庶得朝夕前徃親行奠獻庚申行大祭禮始釋服先是十一月己亥世宗憲皇帝諭諸王大臣等曰朕凡事無不遵奉皇考遺㫖但持服乃人子之道遺詔二十七日釋服朕斷然難從若此事朕不得行其志必至懣恨無已爾等宜體朕意壬寅諸王大臣等以萬幾至重難以久曠請遵遺詔二十七日釋服奉諭釋服之制以日易月雖始於漢文而髙宗諒隂三年獨非古制乎朕不能上比髙宗而思慕之情何能自己揣爾等惟恐過勞朕躬殊不知有服朕尚可稍進饘粥暫眠苫塊若必強朕釋服必至寢食皆廢矣皇考遺命一句一字朕無不拳拳服膺止此二十七日釋服之詔非敢故違而罔極深恩哀思迫切雖蹈違命之愆亦不恤也爾諸王大臣其諒之甲辰諸王大臣等復合詞奏言從來天子之孝與士庶人不同孝經云天子以徳教加於百姓施於四海為孝書稱髙宗諒隂晉臣杜預謂是釋服後心䘮之文蓋以人君一身為郊廟社稷之主祭為吉禮必於除服後舉行若二十七日不即除服則祀典不免有闕大行皇帝聖學淵深若易月之制可以更易豈肯於遺詔中諄諄垂訓伏乞上思郊廟神靈之所倚賴下念中外臣民之所託命勉遵遺詔俛順輿情疏入復叩首固請始奉㫖朕覽諸王大臣所奏引據經書義理明晰朕惟有嗚咽悲痛耳始知為君之難祗此持服一節乃天子第一苦衷轉不如臣庶尚能各盡其心雖勉從所請朕之哀思因兹愈切矣又諭曰諸王大臣僉云二十七日後應居乾清宫朕思皇考六十餘年所御宫殿朕即居住其中心甚不忍朕意欲居月華門外養心殿著將殿内向日一應陳設敬謹収徹葺改務令堊素以備朕居朕不敢謂遵古諒隂之禮然必如此守孝二十七月以盡朕心至是滿二十七日大祭禮成世宗憲皇帝從倚廬移御養心殿齋居素服三年如一日雍正元年二月己巳恭上大行皇帝尊諡曰合天𢎞運文武睿哲恭儉寛裕孝敬誠信功徳大成仁皇帝廟號聖祖癸酉百日致祭世宗憲皇帝詣夀皇殿躬親奠獻哭泣盡哀諸王大臣等奏皇上追念先皇悲思篤切躬襄大事勞悴倍常伏懇強抑哀情仰慰先皇付託之命其詣夀皇殿拜奠之處乞多隔數日得㫖朕因皇考付託鴻基之重故愛惜此身於臣子哀慕之道十分未盡二三朕非強飾以取孝名但朕受皇考四十五載顧復教育深恩今一旦永訣中心悲痛何能自己目今尚可瞻仰梓宫罔極哀思乗此猶可稍展至梓宫暌隔之後何由得再瞻仰皇考乎朕躬尚能自持朕亦儘力强制諸王大臣所奏知道了三月丙午恭移聖祖仁皇帝梓宫於景陵二年九月禮部議奏元旦元夕行慶賀禮及廷臣朝服日期得㫖竢朕素服三年後照所請行三年二月庚辰以聖祖仁皇帝服制期滿祫祭太廟釋服即吉先是二年十二月吏部尚書朱軾奏雍正三年二月十三日服制已滿請祫祭太廟頒示天下臣民即吉釋哀得㫖朕受皇考四十餘年顧復深恩罔極莫報諒隂三年祗以黙盡一㸃私情非謂歴代帝王不能行之事朕能行之欲立法定制以垂令名也且如祭祀朝㑹大典不容久曠者朕亦强循諸王大臣之請照常舉行惟有齋居素服悲哀思慕盡一已之誠於宫禁之中古人云禮之至者無文哀之深者無節朕自嗣統以迄於今撫時生感觸物増悽僾見愾聞潸然出涕情不容以自禁心不能以自覺遑論其合於古制否乎昔世祖聖祖皆以冲齡登極一時禮制容有未備設踐阼之日已若朕躬之年則盡禮盡制必有朕所萬不能逮者今朕抱歉之處尚多敢云盡禮乎至深山窮谷無不哀戀思慕遏宻八音此皇考六十餘年深仁厚澤浹髓淪肌四海臣民哀痛迫切愈乆不忘出於人心之自然非有所禁約而然也夫以薄海内外凡有知識之倫尚且哀慕不忘如此况躬為子臣欲報昊天罔極之徳其終身哀慕復何能己卯至是祫祭禮成次日諭順天府府尹直省督撫曰朕惟古昔帝王以孝治天下誠以孝者天之經地之義民之則也故魯論曰慎終追逺民徳歸厚矣朕以眇躬纘承大統永維皇考聖祖仁皇帝顧復洪慈恩徳罔極中心哀痛什伯恒情以日易月實所不忍特以郊廟大祀朝㑹重典不容久曠時亦勉従諸王大臣之請遵禮奉行惟於宫庭内素服齋居黙盡此心每撫時觸景輒増悽愴僾見愾聞之際哀發於中潸然出涕實非有所倣而行亦非欲以立法定制垂譽於天下後世也終身孺慕寧有巳時今諸臣據二十七月即吉之文合辭公請祫祭釋服朕以禮制情勉允所請於雍正三年二月十二日祫祭太廟釋服即吉伏念皇考聖祖仁皇帝御極六十一年深仁厚澤普遍寰區賔天之日凡京畿直省海澨山陬士農工商白叟黄童莫不呼號哀泣孺慕之誠三載以來有如一日今舉行吉禮應敷告天下朕嗣位以來惟日兢兢嚴恭寅畏不敢怠息庶㡬克荷皇考聖祖仁皇帝付託之重百姓受皇考聖祖仁皇帝教育深恩當勉勵忠誠勤守職業言慈言孝克友克恭農夫盡力於南畝工商致精於器用毋尚奢侈毋事浮偽共期歸真返樸比户可封以無負皇考六十餘年培養漸摩之至徳於朕奉先思孝之心實有賴焉爾該地方官遍行曉諭俾薄海黎民咸悉朕意雍正十三年八月己丑世宗憲皇帝崩奉安梓宫於乾清宫上慟哭失聲擗踊不止竟日水漿不入口羣臣伏地請節哀上悲痛不能自己左右皆弗忍仰視以乾清宫南廊讀書處為倚廬舊制未釋服内批本用藍筆各部院行文皆用藍印奏章竢十五日後再行具奏均用朱印得㫖過十五日以後仍用藍筆又奉諭㫖皇考前奠獻時閑散宗室覺羅亦令入乾清門瞻仰應每次以宗室三十人覺羅二十人輪流入内以伸哀慕甲午諸王大臣等奏請節哀不允是日和碩康親王巴爾圖等合詞奏言皇上至孝性成慕思誠篤每日三次供奠梓宫前盡禮盡哀悲慟迫至臣等瞻仰之下感動悚切伏祈皇上念大行皇帝付託之隆宗社臣民之重俯鑒愚悃稍抑哀情得㫖朕受皇考顧復深恩邅此大故哀痛之情其何能已但念皇考付託之重非徒事哀痛所能盡孝朕亦不敢至於毁瘠有誤政務即諸王大臣均荷皇考教養之恩亦無不思慕悲切者惟當各效公忠共勷國事君臣交勉使天下咸稱皇考付託得人庶幾上慰皇考在天之靈下盡臣子報效之誼此後不必再請節哀九月丁未恭移大行皇帝梓宫暫安奉於雍和宫癸丑定親行三年䘮禮先是八月庚寅奉諭㫖朕受皇考鞠育顧復深恩昊天㒺極今忽邅大故龍馭上賓朕自念生平無纎毫之報答日夜哀泣痛入五中况我皇考仰體聖祖仁皇帝付託之重教養萬國臣民十三年來旰食宵衣苦心逺慮備極勞瘁此朕所親知親見者是以薄海内外共享昇平之福貽及子孫不獨朕心感切仰報無由也若服制一節仍遵定例朕心實為不忍惟有行三年之䘮稍盡思慕之情於萬一天下臣民仍照定例行著諸王大臣即行㑹議具奏至九月庚子復奉諭㫖諸王大臣奏稱三年之䘮難以舉行請朕仍依舊制以二十七日釋服朕受皇考顧復深恩昊天㒺極中心哀慕實不能自己所以欲行三年之䘮稍盡子臣之誼朕承皇考付託之重總期恪守貽謀勉遵先志使天下乂安永享昇平之福乃朕之孝非以持服三年遂為盡孝也自古帝王亦有行三年之䘮者今諸王大臣所引杜預心䘮之説後人多議其非朕自幼讀書與未曾披覽典籍者有間此等議論豈可援以為據耶若以遺詔有二十七日釋服之㫖此乃為天下臣民而言非指朕一人也從前皇祖聖祖仁皇帝冲齡踐阼未得舉行而我皇考大行皇帝即位之時軍國重務速行辦理之處甚多是以俯准廷臣之請然素服齋居三年如一日也今經皇考十三年宵旰勤勞孜孜圗治舉凡大綱小紀莫不悉有章程朕今日遵守成規一如皇考在日朕親承指授一一奉行而已輾轉思維三年之䘮在朕今日實屬可行况昨日大學士等奏稱十五日以後應照例送本辦事朕已允行豈行三年之䘮遂不能辦理一切事務乎至於郊壇祭祀大典原可並行不悖諸王大臣所奏以日易月之説斷不准行朕意已定毋得再請其如何舉行三年之䘮著詳查典禮確議具奏丁未諸王大臣等議三年䘮禮具奏即召入面諭曰諸王大臣所議三年䘮禮援據經傳斟酌典章甚為詳悉朕惟皇考臨御十有三年居心行政念念出於至誠此諸王大臣所共知共見者也皇考總明天亶建極綏猷垂法萬世朕雖不能企仰萬一然誠之一字實欲身體力行黽勉效法以圖善繼善述至持服三年乃朕哀慕至情萬不能已並非欲博行三年之䘮之名也况持服三年亦何足以言孝所願吾君臣同徳同心勤求治理使民物康阜海宇乂安令天下咸頌我皇考付託得人此吾君臣所當共勉者今覽所奏諸王大臣深悉朕廹切苦衷俾得稍展哀忱可謂能諒朕心矣但所議尚有一二宜酌者如元旦朝賀請朕吉服陞殿朝正固國家之吉典然羣臣實為朕一人稱慶在二十七月之内吉服受賀朕心實切不安又稱御門蒞官聽政用素服冠綴纓緯等語朕縞素齋居凡一切引見官員奏事降㫖俱可於便殿隨時舉行非必須御門方可辦理也至郊廟大祀朕自不敢因一已孺慕之私情有缺天祖禘嘗之鉅典所議朕詣行禮甚是但先期齋戒所以潔齊心志對越神明朕意遇齋之日即當素服冠綴纓緯其視祝版亦當照例用禮服以昭敬謹朝日夕月等祀雖係遣官行禮然誠敬之心黙為昭格陟降左右不啻親承朕意於遣祭正日亦應素服冠綴纓緯方與禮意相合又所議朕躬及羣臣諸典制俱屬明備皇后妃嬪及皇子持服之處尚未議及爾等一併詳查典禮再議具奏己酉復奉諭㫖今日將議定持服三年之處奏聞皇太后奉皇太后懿㫖皇帝欲行三年之䘮諸王大臣遵㫖議行悉遵古制予思帝王之孝非臣民可比蓋因國家典禮重大政務殷繁實有至難舉行之處是以當年大行皇帝屢經降㫖欲持服三年比時諸臣奏懇再三雖中心哀慕亦不得不俯從所請今皇帝必欲舉行諸王大臣自應勸阻且國朝服制自有典章亦不便輕為改易在皇帝受大行皇帝付託之重惟當善繼善述勤求上理豈可執意欲行皇考所未行之制諸王大臣亦惟當殫心輔佐俾海宇乂安庻政澄清始為克盡子臣忠孝之道至於持服三年不過盡孝之一端况大行皇帝十三年以來宵旰憂勤惟願四海昇平吉祥善慶為子臣者自應仰體在天之靈紹述纘承共享和平之福以成先志若必欲重服三年以為盡孝上揆大行皇帝聖心亦未必鑒慰也欽此持服一節朕原不敢以為克盡繼述之大猷不過稍盡臣子之私情今皇太后既有此㫖且責朕以行皇考所未行朕何敢當之爾諸王大臣將皇考未行之故并朕今日可行之故分晰開陳俾皇太后閲之而心安則朕意既遂而朕心亦慰矣即日諸王大臣等覆奏言臣等伏思䘮禮古今異宜斟酌務期至當欽奉皇帝諭㫖令臣等議行三年䘮禮敬惟聖祖仁皇帝冲齡御極未經舉行大行皇帝臨御之初疊降諭㫖欲三年持服以展孝思因彼時軍國重務有急需整理之事是以廷臣再三奏懇雖蒙俞允二十七日釋服而聖孝純篤素服三年有如一日今伏覩皇帝至性肫誠哀思廹切屢䝉訓諭以仰承大行皇帝貽緒必行三年之䘮於心始安伏念皇帝為社稷臣民之主羣生之所倚頼皇帝純孝哀慕之心得安即海内臣民之心亦得少安是以遵㫖酌議具奏又奉諭㫖元旦不應受賀聽政不必御門臣等正在議覆間伏讀皇太后懿㫖以國家典禮重大政務殷繁本朝服制舊章不便輕改慈訓諄篤指示周詳臣等謹遵懿㫖再行定議謹議得皇帝服制於百日之内用縞素二十七月之内俱用素服詣几筵前仍用縞素遇郊廟祀典應請皇帝親詣行禮以承大典至陞殿受賀所以肅萬國之觀瞻御門聽政所以綜萬幾之體要俱應循照典禮以時舉行如此則皇帝之孝思既得盡展國朝之典制亦屬相符期以上慰皇太后諄切垂諭之聖心即以副皇上遵奉慈訓之至意而臣庶仰望之忱均慰矣奏入上召見總理事務王大臣面傳皇太后懿㫖諸王大臣議奏持服之禮酌古凖今情理允協知道了至是管理禮部事務多羅履郡王允祹等㑹議言皇上大孝深純斷自宸衷舉行三年䘮制臣等謹考載籍詳慎酌議凖古今之宜揆情文之當仰遵皇太后之慈訓敬體皇上之孝思國朝之典制既符臣庶之輿情均惬謹條列於左一祭祀按禮記王制喪三年不祭惟祭天地社稷為越紼而行事註謂不敢以卑廢尊是天地社稷之祭三年之内於古禮本當親行明吕坤謂祖宗不輕於父母奉祭不緩於居䘮何可乆廢誠以天祖一理宗廟之祭亦當並舉謹議凡遇天地太廟奉先殿社稷大祀皇上親詣行禮或遣官恭代俱禮服行禮作樂先期齋戒用素服冠綴纓緯視祝版用禮服朝日夕月歴代帝王先師孔子先農等祀遣官行禮咸用禮服作樂正祭之日皇上素服冠綴纓緯宫内祭神俟百日後舉行凡報祀之日若皇上親詣行禮具常服冠綴纓緯其承辦祭祀職事人員俱用常服至經筵臨雍耕耤等禮俱俟二十七月釋服之後舉行一朝㑹鉅典體制攸闗元旦朝正共球畢集萬國瞻仰朝儀最重臣等謹議二十七月之内遇元旦朝賀應請皇上具吉服陞太和殿不宣表不作樂常朝陞殿亦用吉服不作樂一御門聽政典制至鉅昔宋仁宗行三年之䘮臨朝改服孝宗於二十七日之後百官請聽政援書經被冕服出應門之禮固請乃許是持服三年不廢臨朝聽政稽之史冊自古為然謹議尋常事件及引見官員俱請於便殿辦理百日後恭請皇上御乾清門聽政一冠服按諒隂之制先儒謂上古本無可考史載魏孝文帝唐徳宗釋服後仍以素服練巾聽政宋仁宗雖用以日易月之制改服臨朝宫中實行三年之䘮蓋縞素不可以臨朝前代行三年之䘮者亦惟宫中素服而已朱子亦云人主不免於視朝聽政豈不可酌輕重而為之權制此不易之論也謹擬百日内皇上服縞素百日外請髪易素服詣大行皇帝几筵前仍服縞素御門蒞百官聽政恭詣皇太后宫俱素服冠綴纓緯遇陞殿受朝俱用吉服祭祀並一切典禮俱用禮服至二十七月服滿照百日禮致祭禮畢皇上釋服一宫中服制帝后齊體服制不容有異皇后持服自應遵照皇上舉行伏惟皇后朝夕侍奉皇太后兼有祭神報祀之禮應於二十七日後在宫中素服遇一切典禮日期俱禮服恭詣大行皇帝几筵前仍用縞素妃嬪於二十七日釋服二十七月之内俱素服遇一切典禮日期俱用禮服皇子與諸王臣工同一在京諸王公大臣文武官員二十七日釋服百日剃頭自釋服後各衙門有應行典禮及朝㑹坐班仍用禮服吉服從事外凡入朝奏事在署辦事俱素服冠綴纓緯恭詣大行皇帝几筵前則冠去纓緯二十七月服滿皇上釋服後俱遵吉禮行一二十七月内門神對聨除太和殿中和殿保和殿坤寧宫仍照常張掛外餘處俱釋服後張掛一各衙門進呈本章於二十七日百官除服後俱用硃印一在京王公大臣文武官員二十七日内不作樂不宴㑹一年之内不嫁娶其外省官員以及軍民人等仍照從前定例行其門神對聫王公以下及有頂帶官員俱於二十七月後張掛軍民人等仍照常例行制可十一月丁未恭上大行皇帝尊諡曰敬天昌運建中表正文武英明寛仁信毅大孝至誠憲皇帝廟號世宗乾隆元年正月丙申朔上詣雍和宫行禮先期王大臣議奏乾隆元年正月初一日皇上若往雍和宫行禮不便具禮服亦不便摘冠纓請於初二日再往行禮得㫖正月初一日朕躬若不往雍和宫行禮朕心如何得安况有雍正元年正月初一日皇考素服往夀皇殿門下行禮之例明年元旦朕往夀皇殿行禮畢在觀徳殿更素服於雍和門下行禮是日雍和宫照常三次奠獻停止舉哀八月甲戌皇上萬夀節上詣雍和宫行禮先期傳諭本月十三日詣雍和宫行禮據禮部奏稱請照今年元旦之例雍和門行禮朕思元旦乃天下臣民公共之大節只得勉從所請今朕一人誕辰非元年嵗朝可比朕仍詣几筵前行禮十月辛未奉移世宗憲皇帝梓宫於泰陵十一月乙酉冬至祭世宗憲皇帝几筵先期諭曰據禮部奏稱本年冬至恭祭列祖陵寢世宗憲皇帝梓宫尚未奉安地宫每日照常供獻應照例不行冬至致祭之禮等語朕思冬至祭祀闗係大典若皇考梓宫前不行冬至祭祀之禮於心不安於理亦屬未協著該部再議具奏禮部議言謹查各陵大祭遇清明中元嵗暮忌辰皆朝服行禮祭畢更素服舉哀冬至日惟朝服致祭不更素服舉哀是以㑹典喪儀内未載有冬至之祭今請於世宗憲皇帝几筵前供牲帛三獻讀祝致祭令贊禮官贊禮但梓宫尚未安奉地宫且在二十七月以内所有承祭執事各官應不綴冠纓素服行禮從之二年十一月壬申上躬詣泰陵行釋服禮列聖大䘮儀疾大漸召嗣皇帝侍側王大臣數人承簡命入恭紀遺詔初崩王大臣奉嗣皇帝正主䘮位去冠纓哭踊皇后皇貴妃貴妃妃嬪咸摘耳環去首飾陳小殮冠服嗣皇帝奉以進哭踊視小殮畢所司恭奉梓宫於宫中正殿嗣皇帝哭踊憑梓宫視大殮畢特簡王公大臣恭理䘮儀嗣皇帝成服截髪辮皇子皇孫隨成服截髪辮皇后皇貴妃以下成服剪髪公主皇子皇孫福晉同時成服剪髪王公百官宗室覺羅及内務府所屬官員皆給白布制服公主福晉以下三等侍衛妻以上及内務府所屬婦女咸去首飾給布制服如之皇帝服三年喪居翼室百日以内上諭用藍筆百日以後素服御門聽政郊廟大祀祭服行禮詣几筵前仍喪服二十七月而除皇后皇貴妃貴妃妃嬪服同皇子皇孫居宫中别室治䘮儀王大臣及殯宫守衛執事官俱百日除服公主福晉以下侍衛妻以上及内務府所屬婦女服同羣臣八旗文武官居闕左門外漢官居各公署服二十七日而除皆百日不剃頭二十七日内奏疏文移皆用藍印京朝官二十七月不作樂期年不嫁娶專司太廟奉先殿祭神殿陵寢祭祀事務男婦内監及出征在軍營官兵家屬咸不必成服右初崩成服既殮乃奠所司於几筵殿内設綴衣中黄左右白供牀南向坐褥具左右各設牀列黼扆十有四南設供案設引旛于乾清門外之左鑾儀衛陳法駕鹵簿於乾清門至太和門外諸執事皆辦辨内外哭位嗣皇帝立殿檐東西向哭衆傳哭皇子皇孫立丹陛東西面皇后立綴衣内東向皇貴妃貴妃妃嬪公主皇子皇孫福晉立於後殿下丹墀右為諸王福晉夫人郡主以下至二品命婦哭位隆宗門外為三四品命婦以下哭位乾清門外為王以下公侯伯子男及二品以上官哭位王公以下二品官以上宗室覺羅哭特命進内瞻仰者入乾清門序景運門外為三品以下文武官哭位非命婦齊集之日右翼官於隆宗門外序立皆分左右翼序立東西面北上内監啟門治喪儀王大臣及執事官率尚茶奉茶尚膳奉膳由中門入至殿前皇帝入殿左門詣几筵前正中立尚茶跪進茶衆皆跪皇帝舉茶奠於案行一拜禮衆隨行禮尚茶徹茶次尚膳進膳掲巾冪皇帝親上食畢執事官進奠几於正中皇帝詣几前跪奉爵王大臣跪進爵皇帝祭酒三爵每祭一拜興衆隨叩興乃徹闔門哭止皇帝還翼室衆各退嗣是朝晡日中三奠朝晡進羮飯肴饌日中進果筵儀均如前右殮奠朝晡日中奠越日恭頒遺詔工部官設黄案於几筵殿内之東内閣學士自閣奉詔書内閣官前引至乾清門大學士奉詔書由中門入至几筵殿檐下皇帝恭受奉安於東案跪三拜興由殿左門出西向立竢大學士入右門詣黄案前跪三叩奉詔書興出殿中門皇帝跪候詔書過興還翼室大學士奉至乾清門外授禮部尚書尚書跪受祠祭司官以雲盤接奉出頒詔於天安門樓王公百官喪服率軍民集外金水橋跪聽宣讀畢舉哀行三跪九叩禮詔下禮部恭鐫謄黄頒於天下順天府府尹率屬制服跪迎於府署開讀在京候選官及教習進士舉貢肄業國子生等咸集朝夕哭臨三日詔至直省將軍督撫率所屬文武官暨薦紳師生耆老素服出郊迎入公廨開讀分駐之提鎮率所屬將弁道府州縣率所屬丞倅掾吏紳士耆老素服跪迎於治所開讀均易喪服北面行禮朝夕哭臨三日喪服二十七日百日不剃頭不嫁娶期年不作樂京師暨直省軍民男去冠纓女去首飾素服二十七日百日不作樂一月不嫁娶遣使頒詔於朝鮮國國王率羣臣素服恭迎止鼔樂使者就館不受燕饗餘如常儀使還國王遣陪臣上表進香納方物其使有在京者給白布制服遣理藩院官分路頒詔外藩䝉古王台吉公主福晉等入京行叩謁禮在二十七日以内令制服後二十七日至者男去冠纓女去首飾各三日右頒遺詔越日諏吉嗣皇帝詣几筵前祗告受命出更禮服御太和殿即皇帝位詳登極門禮畢反䘮服右祗告即位諏日殷奠前期翰林院撰擬祭文至日五鼔工部官設幕於乾清門外之西置奠几陳燎牀於燎所具楮帛九萬設祭文案於殿檐下稍西鑾儀衛官校陳鹵簿王公百官公主福晉命婦各集於其位如前儀侍衛班領導治䘮儀王大臣内務府總管率執事官入陳俎豆於几筵前列祭筵二十有一羊九酒十有一尊於丹陛左右陳設畢侍衛仍導以出司祝奉祭文禮部尚書侍郎二人恭引由乾清門中門入設於案出執事者出入皆導以侍衛班領後仿此内監奉冠服篚設於供牀屆時禮部尚書奏請皇帝自翼室出詣几筵前哭就位衆皆舉哀獻茶上膳如前儀司祝進至案前奉祭文至檐外正中北面跪禮部尙書侍郎二人左右跪展祭文執事官進奠几皇帝於几前跪衆各於其位跪哭暫止讀祭文畢仍復於案退衆舉哀如初奉爵王大臣跪進爵皇帝祭酒三爵每祭行一拜禮衆隨行禮乃徹司祝奉祭文禮部尚書侍郎恭引内監奉冠服篚宫殿監侍二人内大臣十人恭引均由中門出送燎所皇帝由乾清左門出跪候冠服過從行王公内大臣侍衛於乾清門外跪候過隨豹尾槍後從行鴻臚寺豫引三品以下各官於燎所東西跪候過皇帝詣燎位前衆皆跪奉爵王大臣跪進爵皇帝祭酒三行禮如前儀興稍後西向立衆隨叩興奉爵王大臣灌畢哭止皇帝還翼室衆退右殷奠諏日奉移殯宫先期以奉移祗告於几筵行啓奠禮陳設讀文祭文翰林院撰擬奠獻内外集序均如殷奠儀右啟奠屆日五鼓鑾儀衛陳法駕鹵簿治䘮儀王大臣率執事官校入徹綴衣黼扆豫送殯宫工部陳大昇轝於景運門外校尉民夫均服其服分班立竢戒在途執事官役敬謹集事王公百官於梓宫所門外列定班位豫竢皇后妃嬪暨公主福晉夫人命婦豫徃殯宫集竢屆時禮部尚書奏請皇帝詣梓宫前舉哀執事官進奠几皇帝祭酒三爵每祭一拜興立於左治䘮儀王大臣工部鑾儀衛使率執事官校小轝恭奉梓宫啟行皇帝哭從梓宫出乾清門中門直班内大臣侍衛於門外跪哭至景運門外登大昇轝初班校尉恭舁舁轝夫役八班八十人首班末班以鑾儀校尉餘選五城民夫充皇帝西向跪凡換班皆跪後同禮部尚書祭轝奠酒三爵每奠行一叩禮興校尉舁行法駕鹵簿前導皇帝於梓宫左歩行恭送治䘮儀王大臣禮部工部内務府及恭送之王貝勒貝子公等夾道隨行文武百官咸跪舉哀候過興隨行經過門橋内大臣祭酒三爵每祭一叩興靈駕至殯宫大門外大昇轝止皇帝於門外之左跪迎舉哀衆隨跪舉哀校尉恭舁梓宫入中門至殯殿皇帝隨入立於後殿檐東王公至輔國將軍大學士公侯伯子男至副都統副都御史䝉古王至台吉於大門外序立東西面其餘文武百官於旁門外序立治䘮儀王大臣率官校入殿奉安梓宫於殿内正中設綴衣黼扆如初皇帝詣殿位奠爵衆隨叩如前儀既畢徹饌闔門哭止皇帝居側殿苫次二十七日以後還宮倚廬皇后妃嬪以下還宫衆各退既嬪朝夕上食日中進果筵如初二十七日之後皇帝詣殯宫奠酒日一次既周月間日一次再周月間二日一次餘日命皇子諸王分詣恭奠内務府官䕶軍領催等於大門外之東内府官員命婦婦女於大門外之西各更班齊集每日隨朝晡日中三奠舉哀行禮治䘮儀王大臣恭視􅃮飾梓宫凡四十有九次右奉移殯宫諏日行初祭禮前期翰林院撰擬祭文届日工部設冪於殯宫門外之西置奠几設祭文案於殯殿西檐下陳燎牀於燎所具楮幣四十萬鑾儀衛陳法駕鹵簿於大門外治䘮儀王大臣内務府總管率所司陳俎豆於殯殿内列祭筵八十有一羊二十有七酒四十有一尊於丹陛左右設奠几於正中司祝奉祭文禮部尚書侍郎引入設於檐下西案内監陳冠服篚於供牀均如初儀王公百官於大門外分位集竢王妃以下二品命婦以上於二成門内之右集竢在内公主福晉等集於殿内届時皇帝䘮服詣几筵前舉哀衆皆舉哀獻茶上膳讀文畢皇帝奠酒行禮衆隨行禮及送燎皇帝出殿左門跪候冠服過從行至大門外王公以下皆跪候過從行三品以下各官鴻臚寺豫引於燎所左右列跪候過冠服祭文送至燎所恭安於燎牀皇帝詣奠位跪衆皆跪奉爵王大臣進爵皇帝奠爵三每奠一拜興衆隨叩興奉爵大臣灌畢哭止退均如殷奠之儀翼日繹祭遣官行禮陳饌筵十有一羊五酒五尊楮幣三萬不設鹵薄不齊集不讀祝惟治䘮儀王大臣及禮部工部内務府光禄寺官執事餘如儀右初祭諏日行大祭禮前期撰祭文執事諸司供備至日陳設祭筵内外集序讀文哭奠送燎均如初祭次日繹祭亦如之右大祭周月陳饌筵二十有一羊九酒九尊具楮幣十萬皇帝䘮服哭奠行禮王公百官素服去冠飾隨行禮舉哀均如儀期年以内未葬月有奠祭筵十有一羊五酒五尊餘陳設禮儀均與殷奠同不讀文右月奠諏日恭上尊諡制下先期禮部具疏請命總理王大臣内閣九卿暨翰詹科道文六品武四品以上官集議恭擬尊諡廟號進呈欽定工部豫製香冊香寳及宣讀絹冊絹寶於製造所翰林院撰冊文寳文擇良辰恭鐫是日所司豫設案於内閣政事堂中設冊寳亭二香亭一於製造所門外内閣大學士禮部工部尚書侍郎咸素服集政事堂祇竢工部官奉冊寶設亭内鑾儀校舁至内閣門外亭止有司奉冊寶恭設於案退大學士等行三跪九叩禮大學士一人奉冊一人奉寶以授匠人鐫字於潔室恭上尊諡前一日遣官各一人祗告天地太廟奉先殿社稷如常儀至日五鼓鴻臚寺官豫設册寶案各一於太和門正中南向鑾儀衛官設黄亭二於階下南北肆設法駕鹵簿於殯宫大門之外内務府太常寺官設香案於殿内正中左右設宣讀册寶各一案又左設香冊香寳案漏未盡執事官咸入王以下公以上於協和門外集序均素服禮部侍郎二人詣内閣奉宣讀册文寶文於函至太和門階下豫設亭内退大學士二人自閣奉香冊香寶於盝至太和門階上恭陳案上跪三叩興退祗竢於丹墀東質明欽天監官報時届禮部尚書詣乾清門奉請皇帝素服乗輿出宫至太和門北階降輿司拜褥官豫設拜褥於門檻外正中皇帝由太和左門出詣案前立北向閲冊寳訖就拜位立行一跪三拜禮興轉立東旁西向司拜褥官徹拜褥大學士二人進詣案前跪三叩興奉册寶分設亭内跪三叩興禮部尚書奏禮畢皇帝易䘮服豫詣殯宫側殿祇竢鑾儀校恭舁冊亭寶亭以次行禮部官十人前引導以御仗二華葢一奉冊寶大學士暨執事官從王公於所集之位跪候亭過興以次從至殯宫門外公侯伯以下四品官以上皆於大門外按翼序立候亭至跪迎亭由大門中門入至内門止禮部尚書侍郎二人奉宣讀冊文寶文豫陳於殿内左右案大學士二人詣亭前跪三叩興奉香冊香寶禮部尚書侍郎恭引由中門中路進殿中門陳於左案跪叩如初退欽天監報時届禮部尚書詣側殿奏請贊引對引太常寺卿二人恭導皇帝由大門左門入就中正拜位前立鴻臚寺官引王公於階下東西公侯伯以下文武四品官以上於大門外按翼序立典儀贊執事官各共廼職贊引奏就位皇帝就拜位北向立司香奉香合進贊引恭導皇帝詣香案前立司香跪贊引奏跪皇帝跪奏上香司香進香皇帝受香合供舉仍授司香興三上香奏復位皇帝復位立奏跪拜興皇帝率羣臣行三跪九拜禮興贊引奏跪皇帝跪羣臣皆跪典儀贊進冊大學士自東案奉香冊跪進於左皇帝受册拱舉授禮部尚書跪接奉安於案跪三叩興退進寶於右如進册之儀迺宣冊宣册官詣案北面跪恭奉絹册宣訖復於案三叩興退宣寳儀同贊引奏跪拜興皇帝率羣臣行三跪九拜禮興迺奠帛讀祝三獻爵如儀禮畢執事官奉祝帛禮部尚書侍郎二人詣案前跪三叩興奉宣讀絹册絹寳送燎所由中道出皇帝轉立拜位東旁西向竢過復位贊引奏禮成皇帝還宫衆退翼日頒詔天下右上尊諡百日奠獻陳饌筵二十有五羊九酒十有三尊楮幣十有一萬五千内外齊集讀文哭奠如初祭儀右百日祭嵗逢清明中元冬至嵗除日梓宫在殯均以時致奠皇帝親詣行禮先期諸司供備屆日陳祭筵羊酒具楮幣内外齊集讀文清明不用祭文哭奠冬至日不哭餘均如前儀右時薦朞年小祥皇帝躬詣山陵致祭儀載山陵門如梓宫猶在殯宫祭日設禮儀俱如初祭右小祥再朞大祥皇帝詣山陵致祭或遣官行禮如朞年儀三周致祭儀同右大祥二十七月皇帝詣山陵致祭儀載山陵門祭畢皇帝皇后均除服羣臣皆即吉右除服臣等謹案馬考國恤門備載初䘮至殷奠之儀自卜宅以至窆虞作主諸儀則載於山陵門今從此例自營治山陵以至題主虞祭之禮謹别載山陵門惟上尊諡儀恭檢大清通禮例在奉移山陵之前故載於此皇朝文獻通考卷一百四十七
