初一日八旗各運大炮十位至蘆溝橋西每旗立槍營炮營各一每旗都統或副都統一人率參領佐領散秩官驍騎校兵丁炮手前住行文工部修炮車並支火藥火繩木牌每日早八旗各放炮百出記打牌中的數目總記一月每日飯後列陳演放進步連環槍炮餘暇演槍打牌凡赴橋兵丁炮手豫支九月餉為整裝及盤費開操日太常寺奏遣都統一人承祭八旗或都統副都統率參領佐領各官校隨班行禮畢乃發炮越十日兵部奏遣兵部堂官一人驗操是日預設綵棚於八旗之中都統參領先赴炮場差官校導兵部堂官過橋聲炮三至炮場衆迎入綵棚兵部堂官正坐都統副都統旁列坐參領佐領旁侍坐傳令乃放炮各十出兵部司官筆帖式分驗各旗均記中的數目畢乃各乘馬官校仍前導都統隨行至將臺參領等預列陳於臺前兵部堂官登將臺都統副都統參領佐領官校各入本旗隊傳宣官於臺下執令旗傳開操乃鳴海螺嚴鼓而進鳴金而止槍炮均演九進十連環畢乃收陳鳴螺而還立原處以候再演既操畢兵部堂官具題復命三十年奉上諭八旗兵如不每月操演則不能熟練各該管大臣將各該旗官兵操演如遇大雨令其停止五十年定火器營合操陳式八旗炮鳥槍護軍驍騎兵立十六營距將臺百六十丈正中列鑲黃正黃兩旗次六旗按翼列隊每營設帳幕俟八旗官兵齊集距將臺十丈按左右翼各建令纛一為表八旗掌海螺人等分左右立將臺下每旗鳥槍護軍在前次炮手次鳥槍驍騎各序立將臺上初次鳴螺兵背負小旗各整器械二次鳴螺按營結隊三次鳴螺出營向將臺一字排列頭旗放號槍三臺下海螺出距令纛十丈斜接傳令海螺排立將臺鳴螺傳令海螺遞鳴陳內海螺畢鳴螺止乃行陳施放槍炮九次至第十次炮與鳥槍連環施放無間其坐作進止之節均與大閲同雍正四年改定每三年一次赴蘆溝橋槍炮均演一月其赴橋之驍騎校兵丁等每日應用火藥火繩鉛子木牌支杆帳房該旗先期移咨工部領取五年奉上諭火器營甚屬緊要馬上教習熟練方為有益凡屬滿洲以騎射為根本不可專習鳥槍而廢棄騎射兵丁在馬上射箭放槍著加意熟習再兵丁內有自巳養馬學習鳥槍技藝及勤謹效力當差者爾等即當勸勉以優等記名其或行走不及者亦當誘之於善教訓兵丁須如教訓自己子弟不可遽加苛責若有下愚不移之人或經再三教訓仍然行止妄亂者豈可留之京師爾等當即行奏聞發遣是年定驍騎營每月初四初八十三十八二十三二十八等日較射是日停止會議令該都統等親往監視又定前鋒營每月於初二初六十一十六二十一二十六等日較射八年定前鋒營護軍營每年春秋二季驗騎射擐甲胄馬步射一二次三年考驗甄别又奏準八旗操演之日若遇應奏事每旗於副都統內輪班留一人親詣教場較閲除出差直班實有事故外官員一二次不到記過三次議處兵丁一二次不到鞭責三次責革該都統等若不親詣教場或徇庇官兵者察出並論九年奉上諭朕因八旗兵丁不甚整齊曽屢降諭旨命都統等善為訓練俾各兵丁俱成精鋭乃至今觀之尚未整齊此皆都統等未嘗悉心訓練之所致也著降旨與八旗都統前鋒統領護軍統領等於八旗驍騎營兵丁內擇其年少無疾而騎射不堪不能滿洲蒙古語諸事無能極為庸劣之人滿洲蒙古每旗合派一百名共八百名八旗漢軍合派二百名共為一千名或在西厰子或聖化寺等處設立一營令其學習一切技藝更於驍騎營官員內擇其年少而行走怠惰人甚無能者滿洲旗分各派二員蒙古漢軍旗分各派一員令與兵丁一同學習此項官兵務擇實屬無能者挑取若所遺人內仍有不及伊等者朕必將該大臣等治罪俟訓練一年使人人皆成精鋭之時則都統等不悉心教訓之處自顯然畢露矣朕看伊等慚愧否至於八旗前鋒護軍內騎射稍優年力精壯人材可觀而未經服習勤苦之人有情願懇請入於其中學習者亦著挑送一千名另立一營令其學習挑選之時務將情由預行曉諭果能練習一年必不至於有悮可以自保者再行挑取其前鋒參領護軍參領副護軍參領護軍校之內有願與兵丁等一同在彼學習者每旗各派二員設此兩營著將火器營帳房取用伊等所用之弓箭及一應器械俱著官給所需飯食鹽菜等物俱交內務府總管等酌量給與其米石著動用安和橋收貯者支給若或不敷照數運倉內之米補足營內兵丁之奴僕一名不許帶入伊等造飯置買物件等事將內務府佐領下間散人量其足用派往此項兵丁諸處俱不得差遣每日學習騎射騙馬所用之馬由上駟院每營給與連鞍馬百匹令伊親身披卸飼養以習勤苦營內一概不許漢語唯習清語或蒙古語其教習趨走超距及清語等事於索倫新滿洲烏拉齊內挑選好者分為三四班令其教習若仍不勉力勤學伊等寧不自愧至於總管二營不必派委都統等著將領侍衛內大臣散秩大臣職名開列朕酌量派委令其管理又奉上諭操演兵丁步行甚屬緊要若上緊演習一日即可行一百四五十里著八旗都統副都統前鋒統領護軍統領將本旗兵五十歲以下者勤加演習步行給限一年後特指一處令伊等步行若不能至所指之地朕於該管官是問若有步行起衆分别賞賜十年奉上諭兵可百年不用不可一日不備帝王之治天下未有不以武備為先務者而兵丁之演習武藝亦未有不勤加訓練而能有成者從來士農工商各習一業茍不專心竭力則其業必不精况兵丁所司戰鬬之事非膂力剛強不能披堅執鋭非技藝嫻熟不能克敵宣威奈何怠惰茍安虛度歲月不思設兵之本意不念已身之職業乎國家承平日久人耽安逸武備漸覺廢弛今當邊陲用兵是以令勤操演又不令直班俾得專心訓練復給以飯銀資其日用無非體恤勤勞也爾等各宜勉力學習如騎射長槍之類必令純熟精強成國家之徑旅以柔弱怯懦為恥以安逸華麗為戒人之力量用則日增不用日減如出城操練正可演習步行又何必騎馬乘車若此等者一經察出必從重治罪又奉上諭八旗兵丁訓練甚為緊要若仍令直班則未有專功技藝難以純熟是以特加簡選令其每日操演分兩班輪流當差然人果有上進之志何時不可黽勉何地不可學習即如爾等換班時原可練習雖直班之地不便演放槍炮而開弓角扺舞棍趨走等技藝在領班之大臣官員未嘗不可訓練爾等勿以未經入選自甘懦弱不勤加練習也又奉上諭八旗訓練之兵朕從前特降諭旨鼓勵訓誨大臣官員等理宜將此諭旨不時宣讀令兵丁記憶乃兵丁至今尚有未聞朕之諭旨者著交與訓練兵丁之大臣及八旗都統等將朕所降諭旨多行謄録於各旗操演及會操之處宣讀令兵丁聽聞其守衛及直班之處亦著張挂兵丁無事間坐時著該管官教其熟讀記誦兵丁熟習之後互相砥礪各加奮勉而每日熟讀亦可學習國語如兵丁於半年後尚有不能記憶朕之諭旨者將該管大小官員定行治罪十二年覆準八旗漢軍驍騎演習鳥槍每年春季二月十六日為始秋季八月十六日為始各演四十五日本翼四旗仍合操二次每日每兵演鳥槍三出每出用火藥二錢烘藥二釐每季每兵用火藥一斤十二兩烘藥二錢七分火繩二條每季演標凖三次每次用鉛子三枚每季每兵用鉛子九枚每旗木牌五靣均移文工部支領該旗散秩官員均詣教場閲看其居住新營房兵丁照驍騎營每季演鳥槍所需火藥等項管理新營房參領呈該旗都統咨工部支領乾隆元年奏準重修德勝門外既濟廟以祀炮神八旗漢軍輪直歲於春秋仲月上丙日致祭豫移文火器營總統八旗漢軍都統是日詣廟行禮三年定八旗前鋒護軍等騎射兵部三年一次奏請開列領侍衛內大臣八旗都統副都統職名按左右翼每翼恭候欽點四五人會同本翼統領驗看務於十月竣事又奏準每年春秋由兵部行知八旗合操四次內春秋擐甲胄操一次其兵數及選擇地方交八旗都統前鋒護軍火器營各統領臨期請旨四年奏準八旗各營官兵合操向例共用八千七百餘人若於四分內減三分可在兩黃旗教場嗣後每年春季本旗各營官兵於本旗教場分操二次八旗各營官兵於鑲黃正黃二旗教場合操一次至秋季於仰善窪一名楊山窪會八旗各營官兵大操二次其隊伍號令官兵旗纛器械之數均依大閲之制五年奉上諭八旗兵赴蘆溝橋演放槍炮定例三年一次九月舉行雖預領本月錢糧但家中養贍在橋日費不能兼顧朕心軫念著賞一月飯銀再應用帳房亦著赴工部關領俾營制齊一以肅觀瞻仍交該管官於操完日繳部嗣後均照此例行又定蘆溝橋演槍炮每翼欽點都統副都統各一人率官兵赴演六年議準八旗驍騎營每年春秋擐甲步射二次由旗定期報兵部騎射二次由兵部定期通行八年議準八旗漢軍三年一次演放槍炮兵部具奏運炮至蘆溝橋九月初一日為始演放一月鑲黃旗漢軍都統會同各旗列銜奏請簡命都統副都統各二人前往監視管理鳥槍營每旗參領一人散秩官驍騎校各五人隨纛聽差散秩官各一人管鹿角驍騎校二人每佐領下領催二名鳥槍兵十五名棉甲兵三名鳥槍兵每名領火藥三斤十兩烘藥五錢八分火繩四條鉛子四十五枚管理炮營每旗參領散秩官驍騎校與鳥槍營同每佐領下領催一名兵五名每旗炮手除直班外皆令前往每旗炮十位藥信五十根火繩五十條木牌三十靣支杆六十根火藥烘藥鉛彈鐵子數目視炮大小合計出數備往每旗委管火藥官二人先期運炮前往九月初一日黎明祭炮畢樹的於百弓之地每炮日放十出兵部閲操之日每旗演放百出演炮畢槍炮合操其金鼓號令如大閲之制十一年奏準八旗官兵較射日該都統等遇奏事及會議者留副都統前往較閲不得委參領並將較射大臣職名先期送稽察該旗御史聽其往察不遵定例者參奏十七年定八旗漢軍管領藤牌參領四人散秩官驍騎校各十六人領催四十名藤牌兵八百名每年春秋二季四旗合操二次八旗合操一次若遇大閲及八旗諸營大操仍守護炮位入隊演習是年奉上諭朕恭閲太宗文皇帝實録內載崇德元年十一月癸丑上御翔鳯樓集諸親王郡王貝勒固山額真都察院官命𢎞文院大臣讀大金世宗本紀上諭衆曰爾等審聽之世宗者蒙古漢人諸國聲名顯著之賢君也故當時後世咸稱為小堯舜朕披覽此書悉其梗概殊覺心往神馳耳目倍加明快不勝歎賞朕思金太祖太宗法度詳明可垂久逺至熙宗合喇及完顔亮之世盡廢之耽於酒色盤遊無度效漢人之陋習世宗即位奮圖法祖勤求治理惟恐子孫仍效漢俗豫為禁約屢以無忘祖宗為訓衣服語言悉遵舊制時時練習騎射以備武功雖垂訓如此後世之君漸至懈廢忘其騎射至於哀宗社稷傾危國遂滅亡乃知凡為君者耽於酒色未有不亡者也先時儒臣巴克什達海庫爾纒屢勸朕改滿洲衣冠效漢人服飾制度朕不從輒以為朕不納諫朕試設為比喻如我等於此聚集寬衣大袖左佩矢右挾弓忽遇碩翁科羅巴圖魯勞薩挺身突入我等能禦之乎若廢騎射寬衣大袖待他人割肉而後食與尚左手之人何以異耶朕發此言實為子孫萬世之計也在朕身豈有更變之理恐日後子孫忘舊制廢騎射以效漢俗故常切此慮耳我國士卒初有幾何因嫻於騎射所以野戰則克攻城則取天下人稱我兵曰立則不動搖進則不回顧威名震懾莫與爭鋒此畨往征燕兵出邊我之兵威竟為八大臣所纍矣故諭爾等其謹識朕言欽此朕每敬讀聖謨不勝欽凜感慕惟深國家開創之時我祖宗躬親勞瘁勤求治理矩矱相傳罔敢踰越以立萬世之丕基至於今咸受無疆之福者皆仰遵明訓所致也我朝滿洲先正遺風自當永逺遵循守而勿替是以朕嘗躬率八旗臣僕行圍較獵時時以學習國語熟練騎射操演技勇諄切訓誨無非率由舊章期以傳之奕䙫永綿福祚惟是我皇祖太宗聖訓所垂載在實録若非刋刻宣示則纍朝相傳之家法外廷臣僕何由共悉且自古顯謨令典多泐之金石曉諭臣工我皇祖太宗之睿聖時申誥誡昭示來兹益當敬勒貞珉永垂法守著於紫禁箭亭御園引見樓及侍衛教場八旗教場各立碑刋刻以昭朕紹述推廣至意俾我後世子孫臣庶咸知滿洲舊制敬謹遵循學習騎射嫻熟國語敦崇淳朴屏去浮華毋得稍有怠惰式克欽承彛訓冀億萬世子孫共享無疆之庥焉又奉上諭近聞八旗閲兵該大臣等皆在帳幕並不親赴隊伍則進退之規不獲嫻熟嗣後閲兵令該大臣等輪流入隊率領十八年定蘆溝橋開操祭炮日旗漢軍都統皆令前往承祭畢留點出之都統督操餘還京二十一年奉上諭前因武職官員射箭往往有及半即墜或低掠地靣者朕曽降旨訓飭乃今日前鋒統領護軍統領等帶領引見人員內猶有仍前不堪之人甚則明知弓力軟弱故將前手挑高夫射箭之法必矢發徑速而所發之箭不中墜擦地能直逹所指之地乃佳若有意挑高雖至軟之弓亦可及逺此等惡習顯係該前鋒統領護軍統領等平日怠惰漫不經心不勤加訓練所致前鋒統領護軍統領等著交部察議二十二年奏準八旗漢軍向例三年一次運炮赴蘆溝橋演放一月三年之內炮手新舊更換未免斷續疏懈嗣後照滿洲火器營例每歲秋季運炮赴蘆溝橋演放十日奏請簡都統副都統二人統轄至鳥槍按季練習毋庸同往應於演炮之第三年秋季槍炮同赴演放十日仍奏請簡都統副都統四人統轄兵部堂官於演放之第八九日前往察閲分别擾劣具奏餘仍照舊例行祀炮神儀注附載間二歲季秋朔日於蘆溝橋北席地為壇八旗漢軍都統或副都統將事副都統以下至佐領咸陪祀豫日地方官備案太常寺具器陳祀日漢軍辨兵陳八旗炮位於壇內按翼左右序列皆西向前設八案各設神位以紙為之又前設牲案各陳羊一豕一果實五盤盞二十又前設香案各陳爐一燈二壇中少北設一案供祝文左右分設二案各陳香盤四爵十有二尊四羃勺具設洗於壇外之南太常寺司祝司香司爵各立祝案尊案之次承祭官位各香案前東靣陪祀副都統以下以其班序重行異等均東靣典儀一人立於壇左掌燎率燎人立燎爐隅黎明承祭官暨陪祀官咸補服詣壇贊引太常寺贊禮郎各二人分引承祭官至盥洗所盥手畢詣各拜位前立典儀贊執事官各共乃職贊禮郎贊就位承祭官各就位立典儀贊迎神贊禮郎贊詣上香位引各旗承祭官分詣各旗炮位前贊上香司香跪奉香承祭官舉炷香三上瓣香畢贊復位各引復位立贊跪叩興承祭官行三跪九叩禮陪祀官均隨行禮典儀贊行初獻禮有司揭尊羃勺挹酒實爵各進至神位前奉爵立獻於案正中退司祝詣祝案前跪三叩興奉祝文跪案左贊禮郎贊跪承祭官暨倍祀官咸跪典儀贊讀祝司祝讀祝辭曰維某年月日皇帝遣某官某等致祭於司炮之神曰惟神欽天命而無私助揚威武有功國家兹當秋祭之日特以牲醴遣官致祭神其鑒之尚饗讀畢興奉祝文跪安於鑲黃旗炮位前叩如初興退贊禮郎贊叩興承祭官暨陪祀官均行三叩禮興典儀贊行亞獻禮司爵各奉爵獻於左如初獻儀退贊行終獻禮司爵各奉爵獻於右如亞獻儀退典儀贊送神贊禮郎贊跪興承祭官陪祀官俱行三跪九叩禮興典儀贊奉祝文送燎有司各奉神位在前次祝次香由中道恭送燎所承祭都統各避立拜位左右俟過復位立贊禮郎贊詣望燎位引承祭官各詣燎位視燎贊禮畢引承祭官退執事各官皆退直省教閲凡直省緑旗各營總督所屬有督標巡撫所屬有撫標提督所屬有提標總兵所屬有鎮標而總督又節制巡撫提鎮標提督又節制鎮標各以駐劄之督撫提鎮為閫帥每歲秋季霜降日申令本標官兵校閲於演武場前一日各營將辨肅隊伍赴校場豫立軍幕屆日黎明軍士擐甲列陳中軍建大纛於場正中閫帥以牲醴致祭行二跪六叩禮中軍以下將士均隨行禮畢軍門鼓吹節鉞前導閫帥遍閲行陳還登將臺升帳儀衛左右分列諸將擐甲侍臺下中軍詣帳前上行陳圖式請令操兵乃舉旗麾衆合操臺下舉炮三軍中鳴角擊鼓步騎甲士聞鼓聲依式前進鳴金則止行陳中施發鳥槍連環槍並如京營之制餘若長槍藤牌㓲刀短兵之屬各因其地之宜以教士卒皆有成法其為陳有正有變每變陳視將臺號纛為指麾之莭臺上鳴角三軍中乃鳴金振旅而還閲畢試材官將士騎射技勇申明賞罰犒勞軍士各釋甲歸伍漕運總督河道總督屆期教閲本標官兵亦如之其各營將辨隨時訓練本管軍士無常期凡直省水師有內河水師營有沿江沿海水師營各練習於四時其出洋信候各省不同每歲春秋季月或夏秋之季乘戰艦列陳揚帆馭風鳴角發炮具如軍律凡駐防八旗營以將軍都統副都統掌其教閲其訓練八旗士卒及演炮並以時親臨校視第其優劣以為賞罰順治年間定八旗駐防較閲騎射春秋合操均與京營同又定各省八旗水師營每歲春秋二季將軍都統副都統等率官兵駕戰艦操演金州福建乍浦廣東出海口黑龍江齊齊哈爾默爾根江寧出江天津出海每年四月始八月止均擇天氣晴和潮平風順時駕駛出口張帆起碇掌號鳴炮以次演習停操之後各督率官兵講習水務十一年奏準緑營兵每年給操賞銀定期演習騎射優者該督撫提鎮酌量奬賞又奏準武官並不操演或傲慢怠惰託病規避擅離汛地以致廢弛營伍者革職兼轄統轄官不參劾者照不揭報劣員例分别議處康熙五十二年欽命大臣分往直省賞兵會同該督撫提鎮操演騎射以數軍實雍正五年奉上諭浙江緑旗兵懦弱騎射生疏陜西兵人材壯健弓馬嫻熟者頗多將陜西各標營兵揀選一百移駐浙江各標教習訓練浙江兵亦知鼓勵於營伍大有禆益其撥往兵內有能約束教習者即拔補千把總六年奉上諭各省水師兵惟福建最為熟練朕前降旨令藍廷珍揀選五十人發往浙江照陜西兵赴浙之例令其補充營伍教習浙江水師兵查湖北湖南共有水師七營操演亦未精純著照浙江例令藍廷珍揀選純熟之兵五十發往湖廣交與總督提督分撥各營令其教習十一年奉上諭各省營伍必須武職大員平日親行巡察庶可以除怠惰廢弛之弊提督一官節制全省統轄之地甚廣難以親身遍歷至於總兵官分轄地方道里不甚遼闊巡察尚易周遍嗣後各鎮臣有應行巡察者著先期奏聞請旨候朕批示遵行不必拘定限期免各營預備供應致滋擾纍倘有苛纍所屬辨兵者經朕察出定行從重議處尋議準各省總兵官巡察所屬營汛於親標兵內跟隨一二十名自帶帳房鑼鍋若絲毫苛纍辨兵及收受供應並擅役民夫照因公科斂例議處該督提不能察出照不揭報劣員例議處如跟隨兵騷擾地方不能覺察者照失察營兵生事擾民例議處其各營汛騎射是否優嫻軍裝器械是否整齊具結詳送該提督核明報部若有不實者照察報不實例議處乾隆元年奉上諭各省營伍離提鎮遼逺不能親身稽察該督撫酌量地方營制如何令提鎮等隔數年一次親身察閲詳議具奏尋議準直𨽻提督分所屬為三路三歲而遍馬蘭宣化正定三鎮歲各一閲泰寧天津二鎮二歲各一閲山東兖州鎮歲於催漕事竣閲臨清等處其沂州等處委官往閲二歲通一閲登州鎮歲閲東南各處其西南各處委官往閲歲閲西南各處其東南各處委官往閲二歲通一閲山西太原大同二鎮歲各一閲河南南陽河北二鎮歲各一閲江南蘇松鎮所屬係駐劄同城毋庸察閲提督歲一閲狼山夀春二鎮歲各一閲江西南昌南贑二鎮歲各一閲二歲而遍閩浙總督蒞任一閲水師提督一歲閲海壇閩安烽火門等處一歲閲金門南澳銅山等處二歲而遍陸路提督一歲閲興化福州福寧建寧延平等處一歲閲泉州漳州龍巖汀州邵武永春等處二歲二遍海壇金門南澳臺灣四鎮水師歲一閲福寧汀州建寧漳州四鎮陸路歲一閲浙江提督三歲一閲定海黃巖溫州三鎮歲一閲衢州處州二鎮歲一閲湖廣總督蒞任一閲提督歲一閲湖北湖南三歲而遍襄陽宜昌永州鎮筸四鎮歲各一閲陜西總督五歲一閲提督三歲一閲延綏興漢河州涼州寧夏西寧肅州七鎮歲各一閲四川川北重慶建昌松潘四鎮三歲各一閲廣東左翼右翼高州瓊州碣石潮州南澳七鎮歲各一閲廣西提督三歲一閲左江右江二鎮歲各一閲雲南貴州提鎮所屬酌數年內一閲各疏報出巡回任日期及各營汛官兵技藝是否純熟軍裝器械是否齊全以待部核又議準各省營汛總兵官所轄者總兵官親身閲察提督所轄者提督親身閲察至於提鎮駐劄遼逺不能親閲者委附近之副將參將遊擊等官察閲詳報如有苛纍及閲報不實一例議處六年奉上諭武備所關緊要外省營伍整飭者少廢弛者多嗣後各督撫提鎮當盡職守以勵戎行一二年後朕命公正大臣前往驗其優劣如騎射果否嫻熟軍容果否改觀皆顯而易見難於掩藏者倘仍前廢弛朕必將該管大員嚴加處分九年兵部奏應遣大臣前往近省察閲其邊省或即於駐防將軍副都統內命往如有將辨貪縱兵丁闕額技藝生疏器械朽鈍者即據實參奏得旨直𨽻山東武備尚屬整飭先命大臣由河南一路稽察上下江一帶餘省候旨是年奉上諭國家承平日久各省營伍日就廢弛朕早已知之今各處情形大槩甲仗旗幟尚屬鮮明而鳥槍騎射各種技藝則皆屬平常該管大員平日所司何事而輕視武備若此乎該將軍督撫提鎮等各宜痛改舊習勤加訓練俾士皆精鋭戎行改觀務期平時可資捍衛有事可以折衝禦侮孔子曰不戒視成謂之暴今朕與以三年之限著兵部請旨逺省地方亦必差官察閲其就近省分已經閲過者有無整頓亦必再行考驗該管大員等皆朕信任之人於職分所在未能辦理以致營伍廢弛負朕委任之意豈不可愧此次命往查閲及將來所遣之人皆朕親信簡用者自必據實陳奏斷不有代為容隱倘此畨訓諭之後尚不自勉仍復因循怠忽視為具文或經朕訪聞或被欽差察出則曠職之咎不能為該員等寬也十年奉上諭國家設立營伍修明武備以為折衝禦侮之用必訓練精熟於平日斯可奮勇決勝於臨時是以陸路設營汛沿海設水師皆須勤演習收實效者自去年朕命大臣察閲營伍後陸路該管大員頗肯竭力整頓氣象而水師操演則不過將演就陳法塞責了事其操舟破浪之法官辨兵丁茫然不知以為此水手之事漫不留意即至舵工水手其能熟練者亦屬寥寥平日操演之時各船進退尚且參差往來間斷茍其臨敵何以致用夫水師以舟為主出沒風濤去來倐忽必掌舵者能操縱自如而搶風折破浪衝波水手等盡能嫻習即官辨兵丁等亦皆心領神會不待呼應而自靈然後猝然遇敵駕駛輕捷一舟之中臂指相使如一人之身則應變制勝無難向來水師官辨仍以水師用原欲其熟悉情形收得人之效今則視為故套該管者不加察徼幸者茍延玩是育材之善政為容身之捷徑矣著通行申飭沿海將軍督撫都統提鎮等務遵朕旨實心訓練實心甄别毋得仍前玩忽虛應故事十一年奉上諭國家設立營制所以嚴拱衛而固苞桑務在選精鋭以儲干城勤訓練以資捍禦所謂兵可百年不用不可一日無備也從前因各標營日漸廢弛朕命大臣前往山東河南江南等省先行閲看並降旨申飭復於督撫提鎮奏摺中時加批諭令其實力整頓今各省操演之法大扺旗纛戈甲期以飾觀步伐陳圖似為練習其實在技勇精強弓馬嫻熟者甚少在水師營汛亦不過演就水陳聊以塞責而已即軍政薦舉未能盡屬公當徒為具文以是整飭戎行豈能使壁壘一新士氣日奮即如西北稱徑旅而江浙多柔脆不知既以為兵自應鼓其鋭氣使弱者日近於強豈可任其委靡不加振作蓋營伍之中兵馬錢糧甲胄器械皆宜事事留心向來虛冒兵糧私扣朋馬夤緣拔補那借軍裝等弊猶未盡除而教訓演習惟事粉飾因循怠忽尚沿舊習殊非設兵衛民之意是必立定年限專差大臣閲看庶將辨知有責成不敢怠廢而各兵亦知有考驗時時警惕技藝不致生疏於戎行自有禆益朕前旨與以三年之限著兵部請旨並未定有分省察閲之年分今已閲之省則已過二年其餘則未命前往也其如何分年分省差大臣往閲著該部定議俟臨時酌量或自京師命大臣前往或即命本省督撫察閲尋遵旨議定自乾隆十二年為始閲直𨽻山西陜西甘肅四川十三年閲湖北湖南雲南貴州十四年閲福建浙江廣東廣西十五年閲山東河南江南江西周而復始但地方遼闊若止欽命大臣一人勢難周遍至甘肅處極邊安西提標駐塞外若令閲川陜之大臣並閲則廣逺難周請於應閲直𨽻等省之年直𨽻山西差往一人陜西四川一人甘肅一人應閲湖北等省之年湖北湖南差往一人雲南貴州一人應閲福建等省之年福建浙江差往一人廣東廣西一人應閲山東等省之年山東河南差往一人江南江西一人兵部於每年開印後將應閲之省並列領侍衛內大臣滿大學士都統尚書侍郎名奏請或欽點大臣前往或即令該督撫就近察閲恭候欽定再向來各省督撫提鎮原有分年察閲營伍之例嗣後各省如遇欽點大臣察閲之年該省督撫提鎮停其察閲十二年奉上諭國家承平日久各省武備恐致廢弛屢經降旨訓飭未見實力整頓是以上年特令兵部定議分年分省請旨差大臣前往察閲嗣經該部分别議定近聞各省知有察閲之舉無一事不加緊豫備即如操演兵丁應於常時按期練習使各兵技藝嫻熟今則責效於倉卒略無休息不但非愛養士卒之道於此愈見其平日之廢弛矣又如旗幟甲仗號衣等類以分隊伍以壯軍威原繫營制所必需向來動支公項製辦自當按數貯營以備操演之用今則於察閲之時始行修整豫備甚至兵丁衣服等項亦必欲令一色鮮明令其勉力措置此皆徒務外觀不求實際比比皆然是營將不以本務為事惟留心於末節其有項可支者既致虛縻無項可動者勢必有坐扣滋擾等弊在將辨不知大體止圖掩飾於目前而該管大員又為如此豫備可以了此畨之看驗而不顧貽纍兵丁於日後豈朕振勵戎行體恤士卒之本意乎且定議欽差大臣察閲亦以驗其技勇之生熟兵數之虛實糧馬之盈虧以覘該督撫提鎮平時訓練整飭之實政非止於旗幟甲仗衣服之間取其美觀而已也况輪年應閲省分或由京差大臣前往或令該省督撫察閲抑或不必察閲總在臨期裁奪各該管督撫提鎮當統率屬員從容整飭為之以漸而要之以久不當若此急遽粉飾務末而忘其本是不但無益於營伍且有纍於兵丁也著通行曉諭各省督撫提鎮等仰體朕心恪遵朕訓將向來積弊悉加祛除則訓練有實效考驗非具文戎政可望煥然改觀矣十六年奉上諭直省操演武藝不過拘泥成法於安營住宿馳騁奔走無從肄習惟行圍可使辨卒練習勤勞著通行直省提鎮每歲冬季輪選標兵親身督率實力舉行務使嫻熟嚴整以禆實用但既令出圍仍復按期操演兵丁未免過勞著於行圍之時酌停操演又定提督簡閲之年則各鎮停簡閲督撫簡閲之年則提鎮停簡閲特命大臣簡閲則督撫提鎮概停十八年奉上諭騎射國語乃滿洲之根本旗人之要務朕今歲校閲京城世爵其射箭尚可觀及人材英俊者已施恩選取侍衛並分在各處令其學習行走其射箭甚劣不堪教化者察明革職别行承襲至各省駐防亦皆有世爵若不教訓騎射國語伊等近於素餐安逸之習必致學為不善著各省將軍都統等將伊等不時教導務使騎射優嫻國語純熟如有教訓不化騎射甚劣者該將軍都統等即指名參奏革職别行承襲又奉上諭各省標營分年特派大臣查閲及督撫提鎮有統轄操防之責例應以時巡視所以簡軍實嚴武備也是以各兵之漢仗技勇為本至於旗幟衣帽期足以别隊伍整軍容無缺可矣奚事增美焉近來外省營汛每遇大員蒞閲往往先期部署為一切觀美計製造旗幟更易號衣公費不足遂坐扣兵餉以致伊等生計維艱是營伍未有整頓之實而兵丁先被扣餉之纍殊非巡查簡閲之本意嗣後查驗兵丁務核其實毋以旗章衣服粉飾外觀至或有欽差大員經過營汛地方兵丁循例站隊者亦俱無庸張設旗幟總之整飭戎行全在漢仗技勇其緣飾之具皆屬無益之虛文而因以扣餉瘠兵則尤其大不可者著通行各省督撫提鎮咸共知之二十二年奉上諭今日朕至杭州省城其接駕之緑營兵丁有奏簫管細樂者夫身𨽻行伍當以騎射勇力為重戍樓鼓角不過用肅軍容即古者鐃歌鼓吹之詞亦以鳴其得勝之氣耳若吹竹彈絲技近優伶豈挽強引重之夫所宜相效此等緑營陋習各省均所不免可傳諭各該督撫提鎮等轉飭所屬標營嗣後營伍中但許用鉦鼓銅角其簫管細樂概行禁止又奉上諭外省駐防將軍及緑營之提鎮出行則皆乘輿夫將軍提鎮有總統官兵之責若養尊處優自圖安逸亦何以表率營伍而作其勇敢之氣况旗人幼習騎射即緑營中亦必以其弓馬優嫻始厯加升用乃一至大僚轉致狃於便安忘其故步此豈國家簡擢之意耶京師都統副都統既皆乘馬而滿洲侍郎則無論年踰六旬亦俱不得乘輿即朕巡省所至尚每日乘馬而行乃外省武職獨相沿陋習此甚非宜嗣後將軍提鎮概不許乘輿其編設轎夫并著裁革如有仍行乘坐者照違制例治罪可通行傳諭知之二十八年奉上諭常鈞奏查閲河州鎮營伍情形一摺前經降旨遇各省應行查閲營伍之年由兵部奏請或特派大臣或即著該督撫就近巡閲所以並及巡撫者原指山東山西河南三省巡撫兼提督者而言若其餘有總督省分巡撫所轄僅撫標數營此外通省武辨皆非其正屬巡撫本不得操其舉劾也昨鄂弼奏楊應琚逺駐肅州所有陜省營伍難以隨時稽察是以準令該撫巡查今常鈞與總督同在一省情形較鄂弼不同乃亦仿而行之甚屬失當且據奏稱遊擊史自龍高元龍二員年逾六十僅能騎射誠恐暮齒因循致滋貽悮囑令鎮臣張和察看等語常鈞現經查閲而於將辨賢否仍不能示以勸懲於營伍究何禆補恐各省中似此者尚不能免若遇喜事之人或借此越爼干預而似常鈞之虛應故事者又不過潦草塞責毫無實濟殊非整飭戎行之意且所至徒費供億酬應於地方營伍亦有損無益著通諭各督撫嗣後除山東等省仍聽巡撫查閲外其現有總督之省著歸總督辦理或總督不能與巡撫同駐一城如廣西等省相離窵逺一時難於遍厯者亦著隨時酌量會商具奏請旨不得仍前徑行徒滋紛擾四十年奉上諭騎射係滿洲本業前因八旗官兵廢弛本業不肯用心學習經朕屢加訓飭今日閲在京八旗大臣等送到引見人員步箭甚屬不堪且有年歲尚輕所射非不至布把即擦地而去甚至有任意放箭幾至傷人者成何事體此內因應行補放之人步箭平常將擬陪者補放以示懲警外至八旗大臣等所司何事送來引見之人伊等豈未先期驗看如果曽經驗看何以竟將此等人員挑選總由大臣等全不以事為事所致所有此次在京挑選引見人員之都統副都統等俱著交部議處並將此通諭八旗官兵等嗣後若仍有似此者不惟將該管大臣等議處必將伊等從重治罪是年奏準各省緑營俱照京城健鋭火器二營連環鳥槍法式一體演習至各省營分大小不同兵丁亦多寡不等或係獨營專操或應數營會操應交各省督撫酌量情形責成將辨勒限操演務令一律精熟仍令提鎮大員隨時考驗如過期不能嫻熟者該督撫查明參奏將該營員辨照廢弛營伍例議處該提鎮等照不實力稽查例議處四十六年奉上諭國家設兵衛民原應卒伍充實軍紀嚴明使各省精兵徑旅碁布星羅方足以壯聲威而資防禦向來各省督撫提鎮經朕屢加訓飭至再至三此次又經挑補名糧議給養亷各營兵數既充訓練更宜實力所有各省督撫提鎮標兵務宜勤加操演使器械進止一一嫻熟督撫提鎮果能認真通省營員自必觀感振作悉心訓練一洗從前疲玩之習即軍裝馬匹等項軍實所關亦應隨時修驗俾各省營伍壁壘一新馬步兵丁練習純熟有勇知方所謂兵可百年不用不可一日不備者此也朕此畨整飭後如仍有將不習兵兵不賈勇技藝不熟器械不精或經訪聞或欽差大臣查閲必將該管之督撫提鎮從重治罪毋謂朕誡之不早也將此通諭知之五十年奉上諭國家設兵衛民可百年不用不可一日無備陜甘兩省係邊陲要區設兵不為不多乃逆回兩次滋事緑營兵丁懦怯退縮致賊匪得以蔓肆鴟張此皆承平日久督撫提鎮不能實心整飭各營將辨不加操演講習因循怠玩以致兵備廢弛屢經降旨嚴切訓飭若能如福康安加意整頓於各標營內挑出兵丁一半專意訓練俾軍律嚴明士氣徑鋭一變緑營懦怯之習兩省共有三萬餘徑旅設或地方稍有不靖又何患不立時撲滅耶在雲貴四川兩廣福建等省係沿邊沿海重地自應照福康安所辦於各營內挑選壯健勤加訓練使各有數萬徑旅庶平時足以重操防而臨時可以供調遣即腹地亦當如此留心簡練各省皆係總督專主營政而山東山西河南江西係巡撫兼提督銜著將福康安原摺抄寄各省總督及山東山西河南江西巡撫一體留心不動聲色皆有精兵之備亦一致要也又奉上諭鳥槍實為行軍利器著傳諭各省督撫務令兵丁時時操演嫻熟兵役奉差捕賊毋得施放空槍以期共收實效又聞各省營伍槍兵每不得拔補馬戰及外委等以致槍兵心無向上之念甚或以羸弱充數殊不知臨陳殱賊鳥槍弓矢尤為得力自應將熟練槍手一體拔補俾知上進有階則更爭相鼓勵踴躍演習皇朝文獻通考卷一百九十二
