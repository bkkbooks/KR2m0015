body:
  text: 輿地考十五甘肅省臣等謹按禹貢以黑水西河表雍州之界自孔鄭通儒不言黑水所在杜佑以為年代乆逺或至堙涸故無以詳焉盖雍州自夏殷以降西北二邊世為戎翟錯處如西傾積石瀦野弱水三危黑水之區皆沒於外域而禹貢之舊疆遂不可復問秦時築長城界中國然西不過臨洮而止漢武征匈奴始取渾邪休屠王地開置河西四羣史稱其地勢西北邪出隔絶南羌西通西域以斷匈奴右臂至晉代張軌吕光之徒乗時割據五凉相㫁皆自保一隅與中土隔絶隋唐時雖暫置郡縣天寶以後河西隴右全沒於土番大中號稱牧復而名存實亡流傳五代以及於宋河隴復為西夏所據莫能混一惟元代以甘肅與陜西分省並列十一省之中明初以其介在邊陲多改為衛所以陜西行都司領之至於嘉峪関外初設赤金䝉古等衛以為屏蔽嘉靖而還諸畨内徙但以闗為中外之巨防我朝開拓邊疆若寧夏西寧凉甘諸衛並已升為府縣其西自肅州而外安西五衛北接天山乆為列聖撫綏駕馭之地我皇上布昭神武全定金方是以升安西為府改哈宻巴里坤為㕔為闗外之雄封西陲之鎻鑰盖伊吾瓜沙之間宛然腹地焉以視禹貢所謂西被流沙者固逺出乎其外矣甘肅明陜西布政使司共領府八其臨洮鞏昌平凉慶陽四府為今甘肅省地又置陜西都指揮使司於西安領寧夏洮州等衛及鎮羌等千户所又置陜西行都指揮使司於甘州領甘州肅州等衛及鎮夷等千戸所本朝初設甘肅巡撫駐甘州衛設寧夏巡撫駐寧夏衛其總督及布政按察二司則統於陜西康熙三年移陜西右布政使司駐鞏昌又増置按察使司分領鞏昌臨洮平凉慶陽四府四年裁寧夏巡撫五年移甘肅巡撫駐蘭州六年改右布政為鞏昌布政使司八年移布政按察二司俱駐蘭州改鞏昌布政為甘肅布政使司後俱移駐臨洮以臨洮府為㑹城五十七年於嘉峪闗邊外開置靖逆㕔以同知分治領靖逆赤金二衛雍正二年省行都司及諸衛所改置寧夏西寧凉州甘州四府五年又於邊外開置安西㕔以同知分治領安西沙州栁溝三衛于靖逆㕔改置通判七年升鞏昌府屬之階秦二州俱為直𨽻州又改肅州衛為直𨽻州乾隆二年以蘭州為省治改為蘭州府巡撫及布政按察二司俱駐蘭州二十五年以平定西域改安西靖逆二㕔置安西府又於哈宻城設通判分治于巴里坤城設同知分治並直𨽻於安西道二十九年裁甘肅巡撫以陜甘總督自西安移駐蘭州府兼理甘肅巡撫事三十八年増置鎮西府改安西府為直𨽻安西州升平凉府屬之涇州為直𨽻州又増置直𨽻迪化州凡領府九直𨽻州六道所轄之㕔一各衛所俱以次裁改入州縣東西距一千九百八十里南北距二千七百五里東至陜西邠州長武縣界八百六十里西至河州闇門接番界一千一百二十里南至四川龍安府平武縣界一千二百九十里北至邊墻一千四百十五里東南至漢中府略陽縣界一千四百三十里西南至洮州㕔接番界一千一百三十里東北至陜西延安府保安縣界一千二百四十里西北至安西州境外地三千餘里在京師西南四千四十里自安西州西北為哈宻城距安西八百七十里自哈宻西北為巴里坤城距哈宻三百三十里蘭州府為省治東西距一千二百四十里南北距七百六十里東至鞏昌府安定縣界一百五十里西至闇門接西番界一千九十里南至鞏昌府岷州界三百三十里北至凉州府平番縣界四百三十里東南至鞏昌府安定縣界一百四十里西南至鞏昌府洮州㕔界四百六十里東北至寧夏府中衛縣界四百四十里西北至平番縣界一百里自府治至京師四千四十里明洪武初降為蘭縣成化十三年復升為州屬於臨洮府其臨洮府所共領州二縣三本朝初屬陜西省康熙三年分為甘肅省初以鞏昌府為省治復以臨洮府為省治以蘭州屬於臨洮府乾隆三年改蘭州為省治升為蘭州府增置臯蘭縣為府治改舊臨洮府治之狄道縣為狄道州與河州及金縣渭源縣來屬又以鞏昌府之靖逺縣就近來屬凡領州二縣四臯蘭縣附郭乾隆三年升蘭州為府以州地置縣為府治金縣在府東南八十里初屬臨洮府乾隆三年改屬蘭州府狄道州在府南三百十里初為臨洮府治乾隆三年改縣為狄道州屬蘭州府渭源縣在府南二百五十里初屬臨洮府乾隆三年屬蘭州府河州在府西二百里初屬臨洮府乾隆三年屬蘭州府靖逺縣在府東北二百三十里明正統時置靖鹵衛屬陜西都司本朝雍正二年裁衛設同知治此屬鞏昌府八年改置靖逺縣乾隆三年改屬蘭州府鞏昌府在省治東南四百十里東西距二百九十五里南北距八百十里東至秦州界二百二十里西至蘭州府渭源縣界七十五里南至階州界五百三十里北至蘭州府靖逺縣界二百八十里東南至階州成縣界三百八十里西南至岷州境外西番界三百四十里東北至平凉府固原州界七百四十里西北至蘭州府金縣治二百九十五里自府治至京師三千八百里明為鞏昌府領州三縣十四本朝初屬陜西省後分屬甘肅省雍正七年降徽州為縣升階泰二州為直𨽻州以文縣等七縣分屬二州八年改置岷州及靖逺縣乾隆三年以靖逺縣改屬蘭州府十三年改置洮州㕔凡領州一縣八㕔一隴西縣附郭安定縣在府北一百八十里㑹寧縣在府東北二百十里通渭縣在府東北二百里漳縣在府南七十里寧逺縣在府東南九十里伏羌縣在府東南一百九十里西和縣在府東南三百十里岷州在府西南二百四十里明洪武十一年為岷州衛屬陜西都司本朝雍正二年改屬鞏昌府八年裁衛改屬岷州洮州㕔在府西南二百六十里明洪武四年為洮州衛屬陜西都司本朝雍正二年改屬鞏昌府乾隆十三年裁衛以舊駐西固城同知改為撫番同知