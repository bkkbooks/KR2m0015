三百九十里南北距一百五十里東至凉州府張掖縣界三百里西至嘉峪闗外西安府玉門縣界九十里南至番界一百二十里北至邊牆三十里東南至張掖縣界四百五十里西南至番界一百八十里東北至邊牆一百里西北至邊牆六十里本州境東西距一百九十里南北距一百五十里東界髙䑓縣西界玉門縣南至番地北界邊牆自州治至京師五千五百十里明洪武二十八年改置肅州衛屬陜西行都司本朝初因之雍正二年裁衛併於甘州府七年改置直𨽻肅州領縣一髙䑓縣在州南二百七十里明景泰七年置髙䑓所屬肅州衛本朝雍正七年改置縣屬肅州迪化州在省治西北五千七百二十里東至穆壘烏蘭烏蘇接鎮西府台縣界西至安濟哈雅接庫爾喀喇烏蘇界南踰天山接闢展屬界北至額彬格遜淖爾接塔爾巴哈台界自州治至京師八千八百九十里明屬衛拉特本朝初為凖噶爾庫本諾雅特游牧處噶勒丹多爾濟之昻吉乾隆二十年大兵進討凖噶爾噶勒丹多爾濟率其屬迎降地皆内屬有舊城周三里賜名迪化别于舊城北建新城三十八年改設直𨽻化州於城西建鞏寧城為州治領縣三昌吉縣在州西一百二十里綏來縣在州西北三百八十里阜康縣在州東北二百四十里以上三縣並乾隆三十八年置哈宻㕔在省治西北三千二百七十里在安西府城西北八百七十里東西距九百四十里南北距六百餘里東至塔里雅沁通喀爾喀界四百十里西至額什墨克通吐魯番界五百三十里南臨沙磧東南至博羅特口及星星硖半池泉接安西府敦煌淵泉二縣界六百六十餘里北至天山接巴里坤界一百餘里至京師七千一百入十里明永樂時鞥克特穆爾内附封為忠順王兼置哈宻衛即以其頭目領之成化以後屬於吐魯番本朝康熙三十五年内附授以封爵舊有城一五十六年增建哈宻新城為官兵駐防之所乾隆二十五年設通判治此為哈宻㕔直𨽻於安西道其所屬有五堡曰素穆哈拉垓為頭堡在哈宻城西十里曰阿斯塔納為二堡在城西八十里曰托郭齊為三堡在城西一百二十里曰拉卜楚喀為四堡在城西一百四十里曰喀喇都伯為五堡在城西一百六十里臣等謹按哈宻部自元末族子納古爾受封為威武王尋改為肅王其弟鞥克特穆爾嗣於明永樂二年内附改封為忠順王四年設哈宻衛以其頭目瑪哈穆特和卓等為指揮等官忠順王卒其兄子托克托嗣八年又封托克托弟都哩特穆爾為忠義王同守哈宻由是二王並貢其地東去肅州西去吐魯番各千五百里北數百里抵衛拉特以天山為界為西域要道迎䕶朝使統領諸番後又止封忠順一王其地為回回輝和爾哈喇輝三種雜居頭目不相統屬其王不能制至成化後吐魯番强盛數奪其國旋復旋失卒為吐魯番所據嘉靖後居此者為宻克滿克木非忠順王之裔亦後屬於吐魯畨本朝康熙三十五年哈宻回人頭目逹爾漢伯克阿布都拉遣使奉表入貢三十六年阿布都拉遣子敦帕伯克擒獲噶爾丹之子及其官屬來獻聖祖仁皇帝嘉之賜賚有加授阿布都拉為扎薩克一等部長賜印纛以其所屬編旗視各䝉古傳至其子敦帕孫阿敏嗣雍正五年封阿敏為䕶國公七年晉封為固山貝子乾隆五年其子玉素富嗣封䕶國公十年封固山貝子二十三年封貝勒二十四年加郡王品級令管轄回衆皇朝文獻通考卷二百八十三
