body:
  text: 欽定四庫全書皇朝文獻通考卷七十四學校考十二祠祭褒贈録後二雍正元年四月定追封至聖先師孔子五代王爵禮先是三月上諭內閣禮部至聖先師孔子道冠古今德參天地樹百王之模範立萬世之宗師其為功於天下者至矣而水源木本積厚流光有開必先克昌厥後則聖人之祖考宜膺崇厚之褒封所以追溯前徽不忘所自也粵稽舊制孔子之父叔梁公於宋真宗時追封齊國公自宋以後歷代遵循而叔梁公以上則向來未加封號亦未奉祀祠庭朕仰體皇考崇儒重道之盛心敬修崇德報功之典禮意欲追封五代並享蒸嘗用伸景仰之誠庶慰羮墻之慕內閣禮部可㑹同確議具奏尋議奏孔子先世五代應俱封公爵得㫖五倫為百行之本天地君親師人所宜重而天地君親師之義又賴師教以明自古師道無過於孔子誠首出之聖也我皇考崇儒重道超軼千古凡尊崇孔子典禮無不偹至朕蒙皇考教育自幼讀書心切景仰欲再加尊崇更無可增之處故敕部追封孔子先世五代今部議封公上考歷代帝王皆有尊崇之典唐明皇封孔子為文宣王宋真宗加封至聖文宣王封聖父叔梁紇為齊國公元加封孔子為大成至聖文宣王加封齊國公為啓聖王至明嘉靖時猶以王係臣爵改稱為至聖先師孔子改啓聖王為啓聖公王公雖同屬尊稱朕意以為王爵較尊孔子五世應否封王之處著諸大臣議奏至是遵㫖議定自叔梁公以上至木金父公凡五代並追封為王爵木金父公為肇聖王祈父公為裕聖王防叔公為詒聖王伯夏公為昌聖王叔梁公為啓聖王其啓聖祠向係専祀叔梁公故以啓聖為名今合祀五代應更名為崇聖祠國子監之崇聖祠改造匾額添設神牌祭器擇吉入廟遣大臣一員讀祝祭告每年春秋牲牢酒醴籩豆簠簋每神位前俱照啓聖王例陳設將追封字樣通行順天府直省府州縣一體遵行至欽奉上諭二道頒發國子監勒石廟庭以光盛典詔頒五王封冊賜肇聖王冊文曰右文稽古思統緒之相承重道尊師溯淵源於自逺舉千秋之曠典蘋藻維馨超五等之崇封絲綸式煥𬗟維先師孔子之五世祖木金父公系本殷朝居從魯國治維尚質傳朴素之舊風貴而彌恭守謙和之家法積功纍行聿宏育聖之基貽慶鍾祥遂極生民之盛朕初登大寶欽想前規欲伸景仰之誠用議顯揚之制特追封為肇聖王錫之冊命於戲克昌厥後永立人倫之宗有開必先並膺素王之號服兹嘉命垂示無窮賜裕聖王冊文曰道髙聖域宜推師表之源恩浹儒生用廣尊崇之典擬王封而晋秩禮軼古今定鴻號而嘉稱榮增洙泗緬維先師孔子之高祖祈父公系出商宗望隆宋國姓分公族為孔氏之再傳瑞唘聖人逮宣尼而間出溯淵源於纍葉知德盛而世昌鍾靈秀於一人實教尊而功溥朕羮墻至聖寤寐前徽思敬禮之加隆必恩綸之及逺特追封為裕聖王錫之冊命於戲衮衣端冕視躬桓蒲榖而彌尊春禴秋嘗與鳬繹龜䝉而並久膺兹寵命永荷鴻休賜詒聖王冊文曰聖人覺世道有開而必先王者尊師禮必隆於所自備顯揚之典用煥千秋申嚮往之誠特超五瑞緬惟先師孔子之曾祖防叔公殷朝賢裔魯國儒宗潜德彌彰守高曽之矩矱貽謀自逺藴詩禮之淵源聿開天縱之能四科立教爰唘時中之聖一貫𫝊心朕寶位初膺前徽是式溯儀型而景仰加名號以褒崇特追封為詒聖王錫之冊命於戲俎豆常新峻秩與尼山並峙絲綸誕賁恩光與泗水長流永荷寵嘉昭垂無斁賜昌聖王冊文曰化民成俗道首賴乎師資纍行積功誼應推夫祖德閲再傳而誕聖垂裕貽謀超五等而加封創興盛典緬維先師孔子之祖伯夏公東山育秀泗水鍾靈生秉禮守義之邦漸摩既久奉崇信尊賢之訓牖迪尤深集慶在躬早兆四科之教克昌厥後遂開萬世之䝉朕寶厯初膺景行彌切推降祥之有自念顯號之宜加特追封為昌聖王錫之冊命於戲溯尼山之世澤茂績丕昭崇闕里之家聲斯文益振服兹嘉命永式光榮賜啓聖王冊文曰逹天盡性溯道統之攸傳崇德報功體孝思之不匱惟誕生夫睿哲遂永樹乎師模用賁徽章特升峻秩𬗟維先師孔子之父叔梁公望重魯邦業傳鄹邑秉資勇毅垂史傳之盛名積慶攸長衍家庭之令緒感殊祥於闕里兆唘素王徴靈異於尼山運鍾至聖粵從前代顯贈上公兹當纘緒之初更議推恩之典特追封為唘聖王錫之冊命於戲澤惟裕後聿宏作述之規善則歸親宜致尊榮之禮儀型如在嘉命是承命頒文廟崇祀先儒位次及祭器祭品樂器圖於天下學宫十一月衍聖公孔育圻卒遣大臣賜奠茶酒照例祭葬諡曰恭慤命修葺太學文廟及講堂學舍上諭禮部孔子道冠古今為萬世師表薄海內外無不俎豆尊崇國學乃四方表率其制尤重聖祖仁皇帝臨雍釋奠典禮優隆朕纘承大統景仰先型羮墻如見念國學為造士之地聖教所被莫先於此恐歷嵗既久有應加修葺之處爾部㑹同工部詳加閲視凡殿宇廊廡及講堂學舍務須整理周偹俾廟貌聿新以申景慕朕將親詣焉以故衍聖公孔育圻長子孔傳鐸襲爵遣官祭先師孔子於闕里雍正二年遣官告祭先師孔子及崇聖祠時以加封五代王爵神牌入祠故也賜衍聖公孔傳鐸子孔繼溥等宴於禮部先是上欲舉行詣學禮以孔傳鐸有疾且值守制之初諭令其子弟一人來京陪祀至是詣學禮成上御太和殿受賀孔繼溥率五經博士五氏後裔祭酒司業率國子監官員進士舉人廕貢監生等進表謝恩上召孔繼溥等十人入見諭曰爾等是聖賢後裔與衆不同必心為聖賢後裔之心恪守先聖先賢之訓方為不愧朕詣學大典爾等逺來特行召見面諭爾等慎修厥德以繼家聲隨各賜茶賜墨及貂皮有差併賜衍聖公冠服六月闕里大成殿灾上詣太學致祭並遣官告祭闕里文廟至七年闕里文廟告成復親詣太學致祭上以平定青海遣官恭詣太學闕里告祭先師孔子又令各省修理文廟學宫增定文廟從祀諸賢及世襲五經博士之制諭禮部等衙門治天下之要以崇師重道廣勵澤宫為先務朕親詣太學釋奠先師孔子禮畢進諸生於彛倫堂講經論學凡以明道術崇化源非徒設圜橋之觀聼也維孔子道高德厚萬世奉為師表其祔享廟庭諸賢皆有羽翼聖經扶持名教之功然歷朝進退不一而賢儒代不乏人或有先罷而今宜復有舊缺而今宜增其從祀崇聖祠諸賢周程朱蔡外孰應升堂祔享者並先賢先儒之後孰當增置五經博士以昭崇報均關大典九卿翰林國子監詹事科道㑹同詳考定議以聞尋遵㫖議奏古昔聖王制祀凡有道有德施教於學者祀於瞽宗漢文翁立學宫於成都首祀孔子又畫七十子之像於壁此諸賢從祀之始也厥後有功經傳皆得從祀謂之經師自唐至明厯代進退不一而當代賢儒得與於典禮蓋自宋師伏讀聖諭云祔饗廟庭諸賢或有先罷而今宜復者臣等議得明嘉靖時釐定祀典改祠於鄉者七人林放蘧瑗鄭康成鄭衆盧植服䖍范寧罷祀者四人秦冉顔何戴聖何休今俱宜復其從祀也聖諭云有舊缺而今宜增者臣等公同詳考先儒事實請增入兩廡從祀者共十八人孟子門人樂正子公都子萬章公孫丑漢諸葛亮唐陸贄宋韓琦尹焞黃幹陳淳何基王柏元金履祥許謙陳皓明羅欽順蔡清本朝陸隴其允宜增入祀典者也聖諭云崇聖祠或有可升而祔者臣等議得宋張子橫渠之父張迪一人可以祔入崇聖祠聖諭云先賢先儒之後孰當增置五經博士臣等議得孔門弟子冉伯牛仲弓冉求宰豫子張有若六子均宜確訪嫡裔賜以世襲五經博士以昭崇報者也得㫖先儒從祀文廟關係學術人心典至重也宜復宜增必詳加考證折衷盡善庶使萬世遵守永無異議爾等所議復祀諸儒雖皆有功經學然戴聖何休未為純儒鄭衆盧植服䖍范寧謹守一家言轉相傳述視鄭康成之淳質深通似乎有間至若唐之陸贄宋之韓琦勳業昭垂史冊自是千古名臣然於孔孟心傳果有授受而能表彰羽翼乎其他諸儒是否允協以及宰豫冉有增置博士之處著再公同確議務期至當不易具奏至是遵㫖再議從祀孔廟宜復祀者六人林放蘧瑗秦冉顔何鄭康成范寧宜增入祀者二十人縣亶牧皮正子公都子萬章公孫丑諸葛亮尹焞魏了翁黃植陳幹何基王柏趙復金履祥許謙陳澔羅欽順蔡清陸隴其入崇聖祠者一人張迪宜增置博士者四人冉雍冉伯牛子張有若此三十一人或親承訓論遞衍源流或逺契心傳倡明正學升諸從祀之列豫以延世之賞人心公論皆為允合得㫖朕念先賢先儒扶持名教羽翼聖經有關學術人心爰命九卿詳議今諸臣參考周詳評論公正甚合朕心著依議行命擇孔氏子孫之賢者同曲阜縣教官公同訓迪定闕里文廟樂舞及考試五經博士送監之制凡樂舞音節及樂舞生衣冠俱照國子監畫一遵行至先賢之子孫應襲五經博士者送禮部考試劣者送監肄業三年方准承襲三年衍聖公孔傳鐸請頒賜聖諭廣訓朋黨論二書溫㫖諭之諭曰我聖祖仁皇帝教育羣生御製上諭十六條期以厚民風而端習俗朕仰承先志推衍發明著為廣訓使愚氓易曉凡兹作述之間悉本先師孔子之道以為是訓是行之本並無一語出乎聖教之外也卿為至聖後裔果能祇遵祖訓身體力行則修身齊家之道化民善俗之模莫大乎是且植黨為聖人所深戒向來孔氏子孫從無趨附匪黨之事所請二書不必頒發卿其恪遵好學力行知耻之訓能光家乘即廣國華勉之慎之又御書生民未有匾額恭懸大成殿并頒發直省學宫闕里顔子廟曰德冠四科曽子廟曰道傳一貫子思子廟曰性天述祖孟子廟曰守先待後閔子廟曰躬行至孝仲子廟曰聖道干城又賜衍聖公孔傳鐸及六賢後裔御書匾額聖裔曰欽承聖緒顔子裔曰四針常領曽子裔曰省身念祖孟子裔曰七篇遺矩閔子裔曰門宗孝行仲子裔曰勇行遺範又詔避至聖先諱改用邱字讀為期音上諭內閣九卿等古有諱名之禮所以昭誠敬致尊崇也孔子德髙千古道冠百王正彛倫端風化為往聖繼絶學為萬世開太平自天子以至於庶人皆受師資之益而直省郡邑之名有聖諱字在內者古今相沿未改朕心深為不安爾等㑹議凡直省地名有同聖諱者或改讀某字或另易他字至於常用之際於此字作何回避一併詳議具奏尋遵㫖議覆先師孔子聖諱理應回避惟祭天於圜丘丘字不用回避外凡係姓氏俱用偏旁為邱字如係地名則更易他名至於書寫常用之際則從古體􅉌字得㫖今文出於古文若改用􅉌字是仍未嘗回避也此字本有期音查毛詩及古文作期音甚多嗣後除四書五經外凡遇此字並用邱字地名亦不必改易但加偏旁讀作期音庶乎允協足副朕尊崇先師至聖之意四年八月上親釋奠於先師孔子行讀祝跪獻禮先是議准向來春秋二祭均遣大學士行禮未載有親詣儀注特㫖親詣行禮為尊師重道之曠典謹擬陳設犧牲籩豆仍照春秋丁祭禮儀請照雍正二年視學釋奠行二跪六拜禮立獻帛爵一次不讀祝文不飲福受胙四配位前遣尚書四人分獻十一哲及兩廡從祀位前遣侍郎四人各分獻復又奏准視學釋奠舊儀不讀祝今親詣行禮實屬曠典請照康熙二十三年親祭先師闕里例讀祝文行禮至是上親詣行禮畢諭禮部太常寺儀注內開奠畢獻爵皆不跪朕今跪獻非誤也若立獻於先師之前朕心有所不安將此諭衆知之爾衙門可記載嗣後照此遵行五年二月令至聖先師誕日禁止屠宰諭內閣三月十八日為皇考聖祖仁皇帝萬夀聖莭舊例於是日䖍誠齊肅禁止屠宰今應永逺遵行至聖先師孔子師表萬世八月二十七日為聖誕之期亦應䖍肅致敬朕惟君師功德恩被億載普天率土尊親之戴永永不忘而於誕日尤當加謹以展恪恭思慕之忱非以佛誕為比擬也著內閣九卿㑹同確議具奏尋議准先師聖誕應致齊一日不理刑名禁止屠宰永著為例六年二月仲丁上詣太學釋奠先師孔子御製詩一章勒碑國學并頒發直省府州縣學宫扶植綱常百代陳天將夫子覺斯民帝王師法咸隆治兆庶遵由臻至淳道統常垂今與古文明共仰聖而神功能溯自生民後地闢天開第一人授先賢冉雍六十七代孫冉天琳五經博士世職定簡補文廟樂舞童生之例於衍聖公所屬户人子弟簡補如不足額仍於曲阜縣童生內簡補七年賜衍聖公御纂書籍諭禮部昔年聖祖仁皇帝御纂各種書籍及朕年來陸續刻成之書雖未通行頒賜而內外臣工亦多有受賜者因衍聖公不在廷臣及封疆大臣之列是以未曾頒賜著大學士等將應行頒發之書奏聞頒賜衍聖公藏之闕里明示來兹命建立闕里聖廟碑亭闕里文廟上梁以慶雲現告上親詣太學致祭先師孔子八年衍聖公孔傳鐸請以兖州府屬屯莊集稅銀兩解部充餉奉上諭目今他省有清查稅務之事蓋因稅課一項向無定額地方官吏每多侵蝕欺隱高下其手刻薄小民是以令將實數查出凡舊額之外所有贏餘即留為本地官民之用並未將絲毫歸入公項也兖州屯莊集稅銀兩向充書院林墓嵗修之費正是闕里之公用而孔傳鐸忽請解部充餉是將此項稅銀視為私槖也朕於文廟工程敬謹辦理一切動用帑金所費不下數十萬孔傳鐸豈不知之而為此卑鄙之陳奏甚屬不合嗣後著將此項集稅銀兩核實支給為書院林墓之用遣皇五子及淳郡王前往闕里告祭先師孔子增設聖廟執事官員上以聖廟執事之員向來未加爵秩所當廣置官僚以光祀典特諭設聖廟執事官三品者二員四品者四員五品者六員七品者八員八品九品者各十員各按品級給與章服每逢聖廟祭祀之時䖍肅冠裳駿奔趨事凡此人員著衍聖公於孔氏子孫內選擇人品端方威儀嫻雅者報部充補每年各給俸祿銀二十兩其孔氏子孫內有願充補之人或曽經出仕而退休在籍者或身有職銜而未曽出仕者以及貢監生童等皆可入選若届鄉試之期有情願入場者准以監生入場應試命修闕里孔林享堂墻垣九年命孔廣棨襲衍聖公爵時衍聖公孔傳鐸以沉疴難起上疏乞休特恩豫告以長子孔廣棨襲封衍聖公世爵十年五月以御製重修闕里聖廟碑文御筆賜衍聖公孔廣棨收藏御製文曰朕維上天垂佑蒸民篤生至聖先師孔子以仁義道德唘迪萬世之人心而三綱以正五倫以明後之繼天御宇兼君師之任者有所則效以敷政立教企及乎唐虞三代之隆大矣哉聖人之道其為福於羣黎也甚溥而為益於帝王也更宏宜乎尊崇之典與天地同其悠久也曲阜廟庭為孔子里宅育聖鍾靈之地神爽式憑廟貌甚偉由周而來久且加盛我皇考聖祖仁皇帝德符元化悟徹性天自羲農堯舜禹湯文武周公之道集成於孔子者一一體於身心宣為政治道統在上應運而承康熙甲子東巡狩臨幸闕里謁奠廟林殷禮隆儀漢唐莫及朕恭膺丕緒志切羮墻即位之初加封先師五代王爵詣雍釋菜題額歌詩佩德報功之願夙夜罔釋於懷雍正二年闕里聖廟不戒於火有司奏告朕悚惕靡寧詣廟致祭旋發帑興修命大臣専董厥役殿廡規模悉準宫闕製器偹物亦令繪圖呈式裁酌協宜數年來諄諭執事臣寮經營周至纎毫無憾始愜朕衷七年冬有司具奏大成殿上梁前二日慶雲見於曲阜合詞稱瑞朕以天人感應理固不爽而誠敬微忱詎能邀上帝先師之垂鑒用是祗將祀事倍增試額俾普天率土被聖人之德化者同心感慶庶足以廣教澤而答嘉休而撫躬警勉恆朝夕凛凛焉朕嘗謂帝王之尊聖尊其道也尊其道貴行其道居行道之位而能擴充光大達之政令修齊平治得其要紀綱法度合其宜禮樂文章偹其盛舉凡聖道之未行於當時者悉行於後世雖去聖久逺而心源相接不啻親授於一堂之上默證於千載之前如是欽崇褒顯悉由於中心之誠服而治化日盛聖道斯尊且夫聖人之道一天道也天以牖民之責屬之聖人刪定贊修代天宣教彛倫惇敘禮法彰明後之帝王奉其道以治世師承罔斁資益良多然則尊天尊聖理原合一兹之崇禮至聖正所以欽若昊天而於修建廟庭之重典有不至誠至敬者哉朕勤求上理宵旰孜孜冀以仰述皇考之鴻模丕揚先師之厚澤爰敬推上天篤生聖人與聖人承天立教垂憲奕世之意勒文碑石以昭示臣民於無極而繫以辭曰天心覺世聖治承天治法道法聖聖相傳三五之隆以道致治峻德宏昭豐功逺被聞知續統至聖挺生中天復旦文教昌明經緯三才陶融萬象體具中和功侔參兩表揚六籍程式五常如㑹滄海若揭秋陽惟我皇考聰明睿知包藴圖書滙宗洙泗德與聖合禮為道崇升堂容肅過里思隆纘緒朕躬勤圗紹述至聖煌煌針銘宥密惟皇建極惟聖時中古今雖邈心理攸同作帝王師與天地配開闢一人神靈如在奕奕新廟輝映尼防金絲在御車服盈堂煥乎天文五雲示慶錫祜者天承庥者聖敢云瑞應鑒厥微忱普祈洪貺永福編氓文治光華日星晶麗木鐸揚聲垂億萬世定直省文廟崇聖祠神位式順天府學政吳應棻疏言崇聖祠追封五世王爵而新置之牌位各處舛錯未能畫一請照國子監所書肇聖王木金父公之位裕聖王祈父公之位詒聖王防叔公之位昌聖王伯夏公之位啓聖王叔梁公之位字樣通行直省遵照成式改製安奉從之頒文廟祭器法琅銅香鼎一燭臺二花瓶二內安松竹梅花二樹香盒一金龍朱漆几五帛篚七銅爵二十六登一鉶六簠二十一簋二十一籩八十六豆八十六皆有蓋衍聖公孔廣棨以孔林工程告竣率其族人來京謝恩賞賚有差上諭孔廣棨曰爾為至聖先師後裔當存聖賢之心行聖賢之事一切秉禮守義以驕奢為戒且爾年齒尚少尤宜勤學讀書敦品勵行凡爾同族之人亦當共相勸誡共相砥礪為端人正士爾等果能遵朕訓諭學問日進品行諄謹不墮家聲即所以報國恩也旋賜孔廣棨松花石硯一方蟒錦縀七匹其族人縀各一匹十一年二月仲丁上親釋奠行三上香禮命直省肅修文廟祀典時外省州縣中有因荒裁減文廟公費者事聞上以公費既減必至祭品簡略或轉𣲖纍民間特諭各省督撫查明所屬若有因荒減費之州縣即於存公銀內撥補以足原額務令粢盛豐潔以展肅將禋祀之誠十三年豫故衍聖公孔傳鐸祭葬如例又授先賢冉雍六十五代孫冉士朴世襲五經博士皇朝文獻通考卷七十四
