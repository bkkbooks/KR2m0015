body:
  text: 職役考四乾隆元年設立河南沁河長夫免民夫修築堤工并革各處攤派之纍先是雍正十三年皇上御極特頒諭㫖凡各河防堤岸閘壩等工程向於民田按畝派捐者槩豫革除如山東挑挖運河派幫民夫工食江南嵗修海塘挑挖運河四川嵗修堤堰直𨽻運河挑淺亦皆按畝派幫合計需銀十餘萬兩悉令動用正項錢糧不得仍舊苛派至是復奉諭㫖河南武陟縣木欒店沁河堤工關係居民廬舍每年定為民夫修築以防水患里民按畝攤錢計二千四百餘緡頗為地方之纍若設立長夫三十名嵗支工食銀三百六十兩即可省民間二千餘金著河南總督照此辦理又孟縣地方小金堤亦係民修民築每嵗攤派銀錢令改為官修支銷正項又浙江紹興府屬沿江沿海堤岸工程向係附近里民按照田畝派費修築亦令停止攤派動支正項又江南儀徵縣江口三汊河向例三年大濬一次撈淺一次需銀一萬餘兩俱係商民三七分派捐輸經管里甲不無苛索滋擾亦令永行停止統於運庫動支臣等謹按小金堤以下三條與沁河相類皆寬恤民力之事故以類載於此又令永定河工民夫物料實發價值奉諭㫖直𨽻永定河每夏秋間時有衝決修築堤岸夫役物料不能不取辦於民間胥吏朋比作奸其人工物料價值肆意中飽毫無忌憚且將物料令民運送工所往返動經百里或數十里不等腳價俱係自備種種擾纍吾民其何以堪嗣後河工諸臣皆宜嚴行稽查凡民夫物料應給價值務照實數給發不得聽任胥吏絲毫扣尅以至貽纍百姓如有仍蹈前轍者必從重處分又禁革直省大小衙門吏役之弊州縣書役之有貼寫各項衙役之有幫役雖有明禁不能盡革不肖之徒䝉官作弊實里甲之害即役法之蠧上特降諭㫖朕惟州縣為親民之吏自宜亷平不擾懋著循聲乃訟獄催科之際官民情意易致暌隔百姓潛受苦纍而無由自訴者則以書役之害為甚劇州縣官不知所以振刷而剔除之也朕聞直𨽻州縣衙門經承之外必有貼寫正役之外每多白役聚此數十輩無賴之徒假托公務橫肆貪叨其為小民擾纍何可勝言故有獄訟尚未審結而耗財於若輩之手兩造已經坐困矣額糧尚未收納而浮費於催徵中飽於蠧胥已什去二三矣其餘勾緝命盜因緣舞弊遇事風生株連無辜賄縱要犯大底貼寫白役之為害居多各省督撫務宜嚴飭各該州縣將所有吏役按籍鈎考其有私行冒充者悉行裁革設正額書役實不敷用不妨於貼寫幫役中擇其淳謹者酌量存留亦必嚴加約束毋得非時差擾至於經承正役務須時刻稽查倘有壞法擾民之事立即按律重懲庶使若輩知所顧忌不得肆其伎倆倘或明知故縱姑息養奸又或喜其巧於趨承受其䝉蔽此則不愛百姓而愛吏役即屬戕害吾民之甚者也為民父母其忍出此乎且胥吏之為害不止州縣衙門已也凡徵解錢糧上司書吏輒向州縣書役索取費用因而縣吏假借司費紙張名色派索花户又如徵解漕糧糧道衙門書吏需索縣吏規禮因而縣吏遂勾通本縣家人盤踞倉厫於正額外多收耗米稍不遂意百般留難逺鄉小民以得收為幸守候為艱不得不飽其貪壑又聞司院衙門凡州縣申詳事件每先發各房書吏擬批送簽書吏從此作奸射利遲速行駁之間得以上下其手蓋衙蠧之為擾自上及下正不自州縣始也是在為督撫者整肅紀綱立闔省之表率而監司守令各奉厥職互相糾正則弊絶風清民安袵席朕惠養元元之意得以周洽閭閻矣嗣是御史周人驥復切言其弊略云州縣衙門舞弊莫如書吏然官若嚴明尚知畏法此外額設衙役如斗級禁卒民壯捕役門子各管一事且名數無多尚易稽查約束惟快手皂𨽻二項人役定額原止數名州縣向俱於額外收用現在多至二三百名不等其中原係安分民人投充衙門以圖體面避差徭者固有之大半皆土棍遊民呼朋引類州縣習而不察來者不拒盡以公門為巢穴且常用應役盤踞把持瞞官作弊如賭博流娼私販私銷諸奉禁之事惟衙役勾串瓜分包攬護庇小民乃公然違禁官即清查先令躲避稽查愈嚴愈得借端勒索是上而阻撓功令之弊也凡有差票到手視為竒貨可居登門肆橫索酒飯講差錢稍不遂意百般恐嚇鄉民畏事莫敢聲言是下而剝削小民之弊也吏治之不肅民生之不厚率由於此快手皂𨽻舊止數名固屬太少而約略衝僻地方量增名數可以敷用請敕下直省督撫酌定成額分别去留其餘各役悉照皂快例行違者查參至督撫司道等衙門承差各役盈千纍百多係掛名倚勢欺壓平民挾制官長所在多有亦應一體定額事下王大臣九卿㑹議如所請行又嚴禁江浙地方當官役使工匠之纍直省地方工匠人等各以其業為生遇各衙門有事工作皆給工食私役之弊律有明禁沿習既久仍有差派應官者是嵗奉諭㫖聞江浙地方一應百工技藝奉官役使名為當官久經嚴禁而地方官並不遵照功令更兼吏胥從中舞弊凡有工作不論公私總以當官為名短發工食并有竟不給發者如匠役不能親身應差則暗中斂錢相助為貼費官則狥私吏則中飽種種弊規纍民實甚夫百工勤手足之力一日所得仰事俯畜僅足資給何堪私役滋擾督撫應嚴行禁止除公事照例給發工食不得短扣外總不許以當官名色擾纍斯民倘不肖有司陽奉陰違或經訪聞或經題參朕必將大小官員分别處分又裁减陜西暫役屯丁陜西總督查郎阿奏言從前公務浩繁應役需人故於州縣屯丁內暫留二千名以為看守城樓倉庫及滿漢各衙門應用每名受旱地一頃將額徵糧銀作為應役口食今差務暫减請裁一千名歸農其存留應役者每名酌添盤費銀二兩於公項內支給從之二年令甘肅屯田地方設立屯長總甲渠長甘肅所屬栁林湖等屯田之處地方遼濶屯户衆多督撫奏言其地止有通判等官數員管理耳目難周請酌留熟諳屯務之生監農民並設立屯長總甲渠長分理下部議從之又革除里甲地保看守城門之役先是御史楊嗣璟疏言直省州縣城門應用門軍或派里甲或派地保窮民苦纍請一槩革除下部議行凡城門現有兵丁看守者如故其向派里甲地保及雇覔應役者皆除之於額設民壯內派撥二名輪流看守其未設城垣之倉庫監獄亦令民壯看守不得派及里甲地保永逺為例嗣於二十六七年江蘇按察使蘇爾德河南布政使輔德屢以門禁言部議令存城兵少之州縣協撥民壯共相看守一體稽察四年嚴禁各省工作扣尅侵蝕之弊奉諭㫖國家興修工作雇募人夫原欲使小民實受價值以為贍養身家之計至於荒歉之年於賑濟之外修舉工程俾窮民赴工力作不致流移更非平時可比其安全撫恤之心亦良苦矣凡為督撫大吏及地方有司自當承宣德意敬謹奉行使閭閻均沾實惠方不愧父母斯民之稱朕聞各省營繕修築之類弊端甚多難以悉數或胥吏侵漁或土棍包攬或昏庸之吏限於不知或不肖之員從中染指且有夫頭扣尅之弊處處皆然即如挑濬河道民夫例得銀八分者則公然扣除二分應作一丈者則暗中增加二尺或分就工程用夫一千名者實在止八九百人以國家惠養百姓之金錢飽貪官汙吏奸棍豪强之欲壑其情甚屬可惡是不可聽其積弊相沿而不加意釐剔者嗣後凡有興作之舉著該督撫轉飭該管官員實力稽查務使工價全給民夫無絲毫扣尅侵蝕之弊倘該管官員稽查不力督撫即行嚴參如狥庇屬員或失於覺察朕必於督撫是問又准湖南各屬添設民壯斗級署湖南巡撫張璨以各屬捕役民壯斗級鋪司等役有未經設立者請行添設下户部議部臣言捕役向無經制之例不准添設鋪司一項不無虛糜應令確查到日再議其民壯斗級應准添設從之臣等謹按捕役之名不載賦役全書不編徵工食故部議云無經制之例前於雍正四年兵部議覆江撫張楷請革捕快一條與此正同然考㑹典律文所載如雍正元年議准州縣捕役能盡心訪緝經年無事者有賞不肖捕役誣指良民為盜者發邊衛充軍又雍正三年律例館奏准舊律應捕弓兵俱改為捕役汛兵是捕役實有其名也又載州縣捕役募定名數遇有盜賊責令緝獲又載各省州縣務於本衙門額設公食內每捕役一名將他役工食量為併給使其養贍充裕若拏獲盜首者令州縣官從優給賞如不獲將承緝捕役家口監禁勒比豈非應捕之役即為捕役律文所載名實照然矣五年禁胥役兼充牙行互見市糴考奉諭㫖民間懋遷有無官立牙行以平物價便商賈其頂冒把持者俱有嚴禁近聞外省衙門胥役多有更名揑姓兼充牙行者此輩倚勢作奸壠斷取利必致魚肉商民被害之人又因其衙門情熟莫敢申欣其為市㕓之蠧尤非尋常頂冒把持者可比所當急為查禁嗣後胥役人等冒充牙行作何定例嚴禁及失察處分交該部議奏尋議令地方官查革追帖永行嚴禁地方官失察分别降罰載入則例八年禁止襟監認充牙行奉諭㫖定例投認牙行必係殷實良民取有結狀始准給帖充應蓋殷實則有産業可抵良民則無護符可恃庶幾顧惜身家凜遵法紀不敢任意侵吞為商人之害乃聞各省牙行多有以襟監認充者每至侵蝕客本拖缺貨銀或恃情面而曲為遲延或藉聲勢而逞其掯勒以致羈旅逺商含忍莫訴甚屬可憫從前外省衙門胥役有更名換姓兼充牙行者已經降㫖敕部定議嚴行禁革積弊始除而襟監充認其弊與胥役等應將現在牙行逐一詳查如有襟監充認者即行追帖令其歇業永著為例又令山陜邊外種地人民設立牌頭總甲部臣議奏山西陜西蒙古地方種地人民甚多其間奸良難以分晰應設立牌頭總甲令其稽察即於種地人民內擇其誠實者每堡設牌頭四名總甲一名如種地民人內有拖缺地租並犯偷竊等事及來厯不明之人即報明治罪如通同狥隱將該牌頭一併治罪十年定各省城垣工程一千兩以下者酌用民力修築工部議覆川陜總督慶復奏請西省各屬城垣分别緩急動帑興修其工程在一千兩以內者飭令州縣合力捐修司道共襄其事奉諭㫖朕思大小各官所領飬亷原以資其用度未必有餘可以幫修工作倘名為幫修而實派之百姓其弊更大轉不若名正言順以民力襄事之為公也此議不准行自古有力役之征庶人有赴功之義况城垣為地方保障正所以衛民而使之安堵即如人所居者廬舍耳而必環以牆垣為籓籬之計其事甚明其理易曉且官民原為一體上下所以相維今則漫無聨屬恐日久相忘卒有用民之事必且呼應不靈臣工為此奏者頗多亦不無所見朕再四思維凡有修建重大功程小民力不能辦者國家自不惜帑金為之經理至於些小工程補葺培護使之不致殘缺傾圮則小民農隙之所能為而有司之所當善為董率者也十一年奉諭㫖以城垣多有殘缺令各督撫督率有司留心整飭尋以巡撫碩色奏請一千兩以下者令各州縣分年修補土方小工酌用民力其餘於公項下支修奉㫖令各督撫倣照辦理善為經紀勿致纍民又總督鄂彌達奏言若按田起夫誠恐占田之户必派之佃田之家不若暫借稅銀生息備用奉㫖此奏甚屬錯誤城垣為國家保障其責専在地方官員所以酌用民力者上下相維之意並非令其按田起夫竟成賦額之外多一力役之征也恐各省督撫亦錯㑹朕㫖或致辦理未善致有纍民之處特頒此㫖曉諭各督撫知之二十二年更定江西豐城修隄力役之法江西撫臣胡寶瑔疏言江省隄工惟豐城最關緊要自唐宋始建隄掃迄今綿亘一百二十里非僅為低下田廬保障實為闔邑捍蔽全省中權除石隄係動帑官修外所有民修土隄向來俱按照通縣圖甲額設里夫每甲出夫十名十年一周行之已久逮後黠者避役貧者誤工因於乾隆四年間改為折徵法雖少變役仍未均蓋圖甲有盛衰而丁數不一均令出夫十名漫無區别且論甲不論田則有田富户多值空間無田貧民難免派纍又有墟長經胥包攬侵肥工鮮實際衝决屢見至乾隆十九年撫臣查明情形大興修築乃通起闔邑十年之夫并力合作復仿照按田均隄之法將無田之户概行除免且將髙鄉有田之户亦行免役惟近墟低鄉令將修成之隄均分承管培護但髙鄉居十之七低鄉居十之三除免户多歸併户少事巨力微日久必致貽誤是以闔邑均願公修屢經呈請懇照新例除去無田之户其餘仍循舊例闔邑均攤並請夫從糧徵聽官按隄撥分募夫修築復加詢訪均無異議查從前按甲出夫之制既經革除則誤工之弊已去今俾按田均堤貧民得免派纍而業户共願輸將且夫從糧徵並杜侵冒更屬妥協奉諭㫖如所議行又釐直省保長保甲奉諭㫖州縣編查保甲本比閭什伍遺法有司自當實力奉行乃日久生玩類以市井無賴之徒承充保長保甲雖課最內有力行保甲之條不過具文從事著各督撫就該地情形詳悉議奏嗣經各督撫上奏户部彚議略言保甲之設所以弭盜安民今各省奏到情形其中如慎選保甲一條議令該地士民公舉誠實識字及有身家之人承充保正甲長不得以市井無賴濫厠其一切户婚田土催糧拘犯等事另設地方一名承值至支更看栅等役民間以次輪充惟紳襟及衰廢幼丁量免俱應准行至所請减設牌頭免㸃甲長二條查十户立一牌頭十牌立一甲長原使分任責成若經減免則保正耳目難周稽查恐有不密又添設約正約副設立保甲房書吏二條未免滋擾又十户輪充甲長一條仍恐無賴之徒濫厠俱應議駁從之二十七年禁止生監充當雜役先是八年奉㫖不許襟監認充牙行永著為例至是浙江學政李因培復言其弊禮部議覆略言士子身列膠庠一切公私雜役不得仍與名頂充例禁已久今浙省士子竄身經商里役者不一一曰莊書管田糧底冊推收過户等事一曰墟長㘰長塘長管水田墟岸修葺堵禦等事此専係浙省名色各省如此類者皆鄉民公推老成明白之人經理其事生監自不應攙越管理請一概禁止一曰埠頭一曰牙行此二項江浙等處多有祖父相傳世業應令另報無頂帶之人領帖充當生監不得濫充至社長一役専司社倉出納應以殷實農民承充乃生監中之貧無聊賴者謀充此役惟以侵蝕為務州縣官强令殷實生監為之又每視為畏途殊失立法本意應遵例務令農民充當不得濫報生監嗣於三十年安徽布政使程燾言社長社副與牙行埠頭莊書墟長不同伏查莊書管造民間推收田産完缺錢糧數目墟長管墟埝堤埂坍卸修築之事牙行代客買賣貨物埠頭代人雇船雇夫此等賤役誠足潰裂坊檢至社長社副職司積貯止當論其家道殷實人品端謹與否不當論其是否生監也且生員嵗科應試原不宜他務相妨至鄉民捐監不過支持門户頂帶榮身應考之人百不得一而社倉設在四鄉村落逺近不齊必與倉榖附近之人庶可就近經理今一鄉中殷實之户除經營貿易而外其務農置産者不過數家又于此數家中開除生監既限于地復限于人辦理實多掣肘嗣後應將不應試之生員及鄉民捐納貢監不應試者仍照舊例選充社長社副下部議行二十八年令民間捐修之城工如坍卸不必責其經理修補奉諭㫖託庸奏亳州懷寧二城現在修竣將來如續有坍卸即照今次捐修之例聽民自為經理修補等語城垣所以衛民如遇應修之時士民中有急公任事出資承修者原有議叙之例以示鼓勵至現在工竣之處自在工員與地方官為之保固使竟定為民修不惟在事之員得以藉口且恐不肖官吏因緣苛派所關非淺設於現修城垣時附近居民私竊磚料自宜嚴為禁約犯者治以應得之罪可耳何得竟定為閭閻認修之例以滋弊纍其通諭各督撫知之二十九年裁直𨽻岱船􅙳夫先是乾隆二年總河顧琮以東西兩淀為西南衆水之滙擁泥挾沙日漸就淤奏准設岱船二百隻衩夫六百名九年尚書劉於義等以永定各道屬應用􅙳夫者甚多奏准添設岱船二百隻􅙳夫六百名嗣因岱船內有牛舌頭船八十隻窄小不能適用復請裁汰并裁􅙳夫八十名至是總督方觀承奏言岱船用在撈泥然水深五尺以下即難著力而船泥載重行滯且運泥淀外嘗數里數十里之遙一日之中撈運無多遇有工作調撥不敷仍須另雇民船民夫而岱船修造油艌添補器具􅙳夫嵗給工食效少費多應將岱船三百二十隻全行裁汰其􅙳夫一千八十名本屬水鄉民夫悉令散歸漁業嗣後河淀工程如有需用船夫之處應令臨時價雇照例報銷其原設之管船千總外委等酌為裁撥下部議行又嚴軍籍揑冒民籍之禁漕運總督楊錫紱言軍民户籍不同既隸軍籍即應聽僉辦運乃各衛所宦家富户或將本有屯田轉售于人而専置民産或應試報捐俱冒民籍進身或將族譜老軍之名預行移改或將衛所舊存案卷曾斷為軍者潛行抽減歷年既久不復報簽即經同運軍丁上報而紛紛辨訴州縣等官或礙情面或辦理粗疏斷為是民非軍衛所官辨莫可如何伏查漕運各丁除應得隨運屯田外造船則有官價在家則有月糧在途則有行糧兼有漕贈漕截等銀資其辦運况宦家富户即使承認一丁原可令族中子姪或知事家人代辦不必己身親行今有力者以計免僉而所僉皆無力之疲丁殊未平允應請嗣後凡隸軍籍之宦家富户徑行僉報如有揑控狡辨者治以應得之罪得㫖允行三十年嚴河工買料運料交料之法河南黃河工料向由沿河三十二州縣採買至是巡撫阿思哈言民間辦料多由地方官派買在料多之户猶能自運抵工至小户出料無多離工路逺雇裝盤攪業曠費繁遂有包辦之人名曰料頭講定價費折乾何啻數倍雖經屢禁而民間謂與自已運交究為省便甘心折虧若輩愈行無忌請于秋成料平之時委佐雜幹員領項採辦運交工所以十六兩凖稱稱收不得藉上司鋪墊燈燭薪米名色致有浮收下部議行三十一年定盛京木場丁辦商辦之制盛京有砍木山場曰大那彔曰東昌溝曰鶯窩背曰梨樹溝曰小夾河曰那爾吽曰鍋鐵峪曰大石湖曰英額河砬子向由臺丁領票砍科以資生計乾隆八年將軍阿蘭泰以搭橋商人拖項無完請將各場酌撥商辦以清缺項二十四年將軍清葆請將各場撥還臺丁如臺丁不願承領募商砍伐科稅二十七年因鶯窩背臺丁承辦貽誤募商另充頗見成效至是臺丁復以為請工部尚書託恩多請定章程經大學士等議以丁辦現有誤公之案而商人多費資本開就山場承辦尚無貽誤若因臺丁覬覦遽爾撥還設將來或需募商必致裏足不前請將商辦之大那録等三場仍歸商辦如無商辦即令六邊衙門將殷實臺丁保送承領丁辦之梨樹溝等六場仍歸丁辦如無丁辦即行募商從之又裁揚州衛二幫抵撥漕船揚州衛二幫輪減漕船二十四隻向以備大造輪運及抵補本衛三幫缺船之用乾隆十年漕臣顧琮以江淮興武等幫有疲船二十四隻無丁可僉題請裁汰即以此項輪減之船抵撥至是總漕楊錫紱言抵撥額船其月銀月米較少於江興二幫而每年例赴松江府屬兊運致多拮据請將此船裁汰所有應運糧米分灑江興二幫照給應得銀米計每船加裝四十餘石而揚州二幫疲丁可免逺撥之苦下部議行三十二年諭據髙晉定長等奏勘湖北黃梅等縣董家口以上界連江西德化境內一帶江隄潰缺之處應行修築估需銀一萬七千九百餘兩請借動公項照例交民自修分年徵收還欵一摺該處地濵江湖所有堤工自應及時修補以資保障但念黃梅等縣頻年偏被水災閭閻不無竭蹶况借項鳩工按年攤扣民力終多拮据而一切派委重事仍令紳襟承辦勢必仍蹈黎明五等故轍於事更無裨益所有此項隄工著加恩即動用公項交地方官實力妥辦毋庸借帑扣還俾貧民得以赴工糊口是於捍衛田廬之中推廣以工代賑之法實屬一舉兩得該部即遵諭行三十三年諭前因進勦緬匪官兵所過各省一切例支正項外所有夫馬運送不無或需民力且據河南湖廣等省查奏具有各州縣公同協濟之事閭閻急公踴躍固屬可嘉而朕之本意則不肯使一絲一粟有纍於民也當即傳諭各該督撫令將各屬實需民力若干奏聞候朕加恩今據貴州巡撫良卿奏稱民間所用夫馬銀數多寡參差無從核數開呈等語不獨辦理模棱且於飭屬安民之本義大相刺謬地方偶遇辦差供頓悉支官帑其正欵不能賅備之處即些微有資民力亦當官為檢核使出納多寡一一按籍可稽則官吏無由滋擾而小民得以沾恩其法實為盡善若督撫大吏猥以此等欵項悉由鄉保人等自行措辦遂爾置之不問上司首倡下屬效尤民瘼將何所仰賴在州縣官潔已自愛者已難槩見下此如吏役等因無慿查核藉端滋弊且又何所不至耶良卿由布政使署理巡撫於此等事務豈得諉為不知思以顢頇了事鄂寶調任未久曾經承辦此事亦竟漫無稽核著一併交部嚴加議處貴州民苗急公效力之處俟朕酌量加恩先將此通諭知之又諭昨嵗大兵進勦緬匪所有經過各省儲偫供億一切動支帑藏絲毫不纍閭閻第以沿途夫馬運送不無稍資民力疊經降㫖將滇省兵丁及各土司應徵銀糧分别蠲免復將湖北湖南貴州三省軍行所過地方錢糧全行緩征以示體恤繼思各省民人感戴國恩深明急公大義踴躍效力自當格外加恩用示奬勵因令該省督撫詳悉確查將各屬軍行所需除正項開銷外實在所資民力若干核明具奏候朕酌量施恩嗣據陸續奏到惟阿思哈稱河南實數八萬六千餘兩而良卿則以貴州所有幫貼夫馬銀數多係鄉保措辦地方官無從核算為詞意在顢頇了事甚屬非是已經交部議處後覽方觀承所奏直屬所有幫銀亦數止有一萬五千餘兩恐亦事後約舉民車一項而言尚非實數於朕優恤民隱屏除弊端之本意均未能實心體㑹在民人等既殫心竭力以佐軍行其悃忱深有足嘉則推恩亦倍當優渥然所在有司必先於辦理之時悉心查核使茅簷一絲一粟皆有數可稽經理方為妥協否則牧令付之不知胥役安得不因緣蠧蝕督撫置之不問州縣又安保無恣意侵牟將吏治奚以澄清恩澤何由下究耶著將直隸河南湖北湖南貴州等五省一例從優加賞於藩庫地糧銀內每省給銀十萬兩交各該督撫酌量情形視其欵項數目妥協分給毋得草率摸棱致小民不得均沾實惠臣等謹按古者大兵大役丁夫車馬無不取給於民惟我朝法制盡美盡善雖寸絲粒粟不以纍民是以輿情踴躍自願效力少罄微忱非敢藉邀恩賚乃荷䝉皇上撙節愛飬之仁特施恩於格外且惟恐各省情形或有不能上達之處責成大吏奏聞伏讀聖諭精詳誠為千古之曠典矣諭前據方觀承奏寶直局淘洗餘銅請照京局之例變價賞給因經户部以各省鼓鑄工價原題給錢並無以銀給發之案議駁今念保局開鑄之初原即與京局相同且爐匠雇自京師而目下錢價又為較賤其但願領銀不願領錢亦屬情理所應有著加恩將寶直局所有淘洗餘銅准照京局之例一體變價賞給爐匠俾得寬裕辦公以示體恤臣等謹按㑹典載寶源局每鑄錢萬串支給匠工物料錢二千二百串有竒又奏准嗣後每串折銀一兩由户部按季於扣存兵餉銀內頒發又奏准仍令爐頭領錢照市價易銀給發匠人是給銀給錢原可通融辦理部議以各省鼓鑄向無給銀之例執守成規今變價賞給出自睿裁所以體恤之者周矣諭進勦緬匪一切解運糧石軍裝並需內地夫馬接遞護送所有應支腳價若仍照定例給發不足以示鼓舞著加恩將解運糧石不論夫馬每日每石給銀三分其抬運軍裝人夫准照黔省之例每日每夫給銀八分該督等其務飭所屬悉心經理俾小民均沾實惠用昭體恤又兵部奏各省驛站應付夫馬酌量裁減其在任病故官員例應馳驛歸葬者及時請領火牌如遲延過限概不准給以禆郵政疏入從之又禁各省學政不許濫用夫馬先是鄂寶奏梅立本按試各屬較前任學政通計多用夫七百名諭令各督撫一體查奏嗣奉諭昨以錢度議學政事有意寬備夫船沽名邀譽已降㫖改補雲南布政使以觀後效夫各省學政厚給養亷原以供其任所用度按臨時行李僕從之費本應自備即敕印文卷等項應用夫馬亦屬無多如同日富尼漢奏到山東學政每次用馬不過四五匹夫不過十名其幕友家人書役厯係學政發價自雇車騾並無動用驛站夫馬之例雖坦途山徑各省情形不同而官用私用之分其理則一山東既係自雇車騾廣西獨不可自雇夫船乎錢度雖經降用尚不足以示警著交部議處朱丕烈乃乘巡撫㑹商任意多開數目冀省養亷著交部嚴加議處臣等謹按驛站夫役原以豫備公事之需故學差有敕印文卷等項凖其動用而為數無多地方自無擾纍如山東學政自雇車騾並無動用驛站夫馬斯為恪遵功令兹復恭奉聖訓不特各省學臣無敢濫用夫役凡有欽差例準給夫者亦咸知遵守焉三十四年諭前據御史紀復亨奏貴州苗民僉派官差一摺內稱苗民承值差使任勞倍于民力而地方官委之胥役發價則扣剋分肥遇事則鞭笞肆虐勞逸不均咿嚘莫訴欺淩不恤往往而有請嚴加查察等語當經降㫖該撫加意體察毋使不法官吏苛纍苗民旋據該撫覆奏以苗民受值樂從並無勞勩之怨朕尚未之信也今經略大學士𫝊恆將沿途見聞入奏據稱苗民等每遇差使爭先恐後較內地民人尤為小心恭順並於道旁喚問無不歡欣鼓舞皆以應雇給值視耕種所得較優役使一項實所盼望貪求之事此皆得之𫝊恆目擊口詢較該撫之言尤為可信前此該御史入告果何所據𫝊恆摺並發臣等謹按㑹典載苗彊地方一例編排保甲以便稽查又載如有塘汛兵丁及各衙門差役經由苗寨擅動苗夫科斂索詐該管官員故縱者罪之是平日體恤苗民至詳且悉一遇差使受值樂從自無不爭先恐後較之內地民人尤為小心恭順蓋聖化之所撫綏者逺矣又諭據富明安奏兵部覆准范宜賓條奏東省運河煞壩期內裁減水夫工食一案查該省水夫向係長養在驛每日僅得工食銀二分七釐若裁去四月工食每日僅得銀一分八釐零窮民口食不敷勢必散逸偶有要差臨時雇覔倍多糜費且煞壩實在日期每年不過兩月餘而銅鉛守凍船隻均需撥役看守非因煞壩而虛費錢糧請照舊存留等語所奏是東省水夫工食難於裁減該撫既將實在情形入告自無庸瑣屑裁扣使民口食拮据轉致貽誤公事所有德州等十四處水驛人夫工食毋庸扣減之處著照該撫所請行臣等謹按㑹典載東省運河額設淺溜橋閘等夫除嵗給役食銀外每嵗又量給器具銀八錢蓋用民之力務令口食充裕法至善也今水夫工食復奉㫖毋庸裁減所以優恤之者至矣又諭辦差備用車輛從前原係順天府之事後因經理不善改為內務府莊頭承應又經內務府奏請改歸順天府雇覔以省莊頭専辦之勞且伊等既隸居順天府各州縣所拴車輛即與民車無異遇有差務自應一體受雇若云莊頭之車地方不當過問則莊頭等且將暗中取利代隱民車包攬影射諸弊無所不至幾於境內無可雇之車矣設順天府袒護民人専雇莊頭之車則咎在順天府一經發覺自必重治其罪今閲摺內所叙內務府咨稱原奏只言民車則莊頭車輛不應一體受雇可知之語顯係內務府官員曲庇莊頭巧為開脫現交內務府大臣查明辦理嗣後遇有官用車輛著順天府於民間雇用十分之七於莊頭雇用十分之三俾免偏枯而協平允三十五年諭前據竇光鼐奏民人佃種旗地之户請一體撥夫撲蝗蝻一摺因其所奏近理即批交部照所請行並諭地方偶遇撲蝗不獨旗田與民田通力合作即大糧莊頭亦應一體派撥其直𨽻向來作何辦理著楊廷璋查明具奏及派往撲蝗之侍衛索諾木策淩等回京詢其實在情形據稱所到之處不獨旗佃出夫辦公即王公所屬旗人亦悉力協撲等語旋據該督奏覆自方觀承任內設立護田夫一項不拘旗民均令出夫現仍照舊辦理因節次令竇光鼐明白回奏今竇光鼐到京回奏則以前此所設護田夫未經奏明不能一體遵照為詞其說支離更甚試問總督舊定章程通行闔省順屬官民豈能獨不遵條教府尹亦豈得諉為不知近京旗民交涉事件在國家初定鼎時或有旗人强占民田及將各項差派専委居民承辦者今閲百數十年屢經整飭政紀肅清無論旗莊各户不敢不安分守法即王公大臣亦不敢怙勢庇佃國家法在必行又豈肯聽其縱越理法少為曲徇乎將此通諭知之臣等謹按㑹典所載州縣官撲蝗不力者治罪由府道上至督撫俱嚴加處分蓋以蝗蝻最易蔓延務在及時撲滅而所需人力自不應有旗民之分此護田夫之設不拘旗民均令出夫法至善也欽奉聖諭煌煌洵大公至正為萬世所當法守矣三十七年工部議署河東河道總督姚立德奏東省各處泉源有資運道應一概修砌石池准將泰安等州縣雇夫挑河每工日給銀六分之數酌減一分以為砌石工費疏入從之諭川省現在辦理軍務一切饋送轉輸俱係內地雇用民夫前往執役所有西路站夫運糧章程尚屬妥協其南路日給銀米雖已寬裕第此一路食物較昻伊等負戴逺行僅堪果腹不免衣履無資情殊可憫從前進勦金川時曾允該督所奏於回空無分本日次日均給口糧今伊等正當踴躍赴公之時自應優為贍給以示體恤所有南路站夫著加恩照前例給與回空口糧打箭爐以內每日折給銀五分打箭爐以外每日折給銀八分俾伊等口食並得寬裕挽運自倍加出力並著文綬嚴飭糧運官員悉心核實妥協經理務令均沾實惠又諭前因川省南路軍營食物價值少昻站夫負戴逺行僅堪果腹情屬可憫曾降㫖加恩照從前進勦金川給與回空口糧以示體恤今西路官兵漸逼賊巢站夫運送軍糧其口食亦未免稍艱著加恩照前南路例無論本日次日分别口內口外折給回空口糧俾伊等口食寬裕自更踴躍赴公著文綬嚴飭糧運官員悉心確核妥辦務令均沾實惠三十九年諭新彊工程均係派撥兵丁砍伐木植築打土房支給該處兵丁耕種所收米麵青稞等項較之採買物料雇覔匠夫本屬減省今烏魯木齊新建滿兵城房工程統較內地應用銀數有減無浮又何必復照內地之例核算所有用過銀兩即著照數准銷毋庸再行交部查核嗣後新彊等處工程派撥兵丁砍伐木植修建者俱不必照依內地定例核銷四十年諭據郝碩奏據雪山根站員具報崇慶州兩次撥往北路換班站夫共四百餘名到站後俱陸續逃散現止存夫八十餘名由該州原撥時並未認真取保押差所致除稟知文綬查辦外請將逃夫沿途所支口糧著落崇慶州賠補並請將該州交部議處等語所辦甚是著交文綬查明崇慶州知州現係何人即行據實參奏交部嚴加議處並查明逃夫沿途所支口糧著落該州照數賠補以示懲警四十一年諭前據阿思哈等奏山東夏津縣地方有常州幫王益周糧船被盜之事旋據楊景素奏拏獲首夥盜犯段老等九名訊出俱係沿河短縴糾夥行劫現今審明按律定擬分别斬梟矣沿河短縴多係無業窮民羣聚覔食晝則隨幫受雇夜則乘機為匪其中最易藏奸而漕艘經行上下遇有頂風淺水添雇幫縴人夫亦屬必不可少莫若令沿河州縣酌量安設縴夫並選派夫頭照管以供受雇其各幫雇覔縴夫並令押運千總督率旗丁㸃查稽核按站交替不許攜帶過站亦不許中途私雇庶各有責成不致滋事其應如何酌定章成之處著直隸山東江南江西浙江湖廣各督撫㑹同漕運總督確商妥議具奏嗣經軍機大臣奏據江南山東直𨽻等省各該督撫按照地方情形奏請添備短縴分段設夫並設立夫頭管束均給腰牌編列字號以杜奸匪亦有不設短縴只設夫頭臨時責成雇覔其沿河文武員辨選派兵役稽察巡邏則匪類自不能混迹而漕運更得迅速併著為令四十四年諭據鑾儀衛奏民人充當校尉之榮志禮等呈控順義縣差役人等派令貼補老人差使索詐錢文各情節一摺於吏治甚有關係本朝丁歸糧辦民間一切差徭久經停免即遇緊要工程如河工城工之類亦俱官給雇值不令絲毫纍民何至順義縣復有派當老人差使貼補錢文之事不可不徹底查辦至如州縣民人充當校尉或係國初相沿明末陋習未及更定章程致令濫竽現在包衣閒散樂食錢糧之人尚多儘可令其挑補校尉充當差使兼資養贍何必令各州縣挑送鑾儀衛假手胥吏輾轉滋弊乎此案著派軍機大臣㑹同英亷程景伊并順天府詳加審訊務得其實情秉公定擬具奏如有干涉該縣事件應行質訊之處即行文楊景素令將該縣管押來京㑹同審訊亦無不可至該縣因何設有老人名目及民人充當校尉作何停止挑補改用包衣閒散之處著一併查明詳悉定議具奏嗣據鑾儀衛奏民人充當校尉又諭此項民尉除應行酌留外其籍隸大宛兩縣者遇有缺出鑾儀衛大臣及順天府送補甚便不致滋弊且使輦轂之人不失世業可仍照舊例行其籍𨽻外州縣者陸續出缺改補四十六年諭兵部議覆薩載等奏抽撥南河樁掃兵丁移設河東以供要工力作各緣由一摺已依議行矣各省武職名糧現在交各督撫查明俟奏齊交部另行核辦議給養亷其所扣兵餉俱當挑補實額歸伍當差但河南為腹裏近省今所有之原額似足敷差防而南北兩岸河堤道路綿逺著多增汛兵防守於河務甚有禆益所有豫省名糧改歸實額兵丁或盡行增入河營或撥十分之七八以資不足於防護河工實為有益至山東河道關係亦屬緊要其名糧改歸實額應在緑營添設若干河營添設若干兹阿桂現在儀封工次著國泰前往河南公同商酌悉心核議具奏嗣據大學士公阿桂等奏查江南總河所屬二十一河營額設河兵一萬零五百餘名河東總河所屬懷河豫河黃運三河營額設河兵止一千七百名多寡懸殊是以前河東總河李奉翰奏請於江南各河營內抽撥二百名移設河東工作並請先撥樁掃兵三十名酌給盤費即令赴豫其餘一百七十名陸續抽撥充補續經部議以現在奉㫖核辦武職名糧挑補實額河標各營亦在查辦之內所有樁掃兵丁三十名應如該督等所議撥往其餘一百七十名毋庸抽撥即令河東河臣自行召募等因奉㫖允行在案查河東總河所屬各河營扣存養亷名糧改補河兵現有一百四十七名而南河二十一河營將辨名糧則有六百五十四名就現在江南河兵額數尚可抽減數百名若又增添六百餘名既無工作又不差操實屬虛糜廩餉請將河東總河所屬河營名糧一百四十七名中左右標營空出名糧三百一十八名南河各河營扣存養亷名糧六百五十四名除添設都司二員協辦守備二員千把總各二員扣留名糧九十八分以備改給俸薪飬亷外其餘九百八十七分一並添入豫東兩岸各汛實額河兵合之原設河兵之數共可得二千一百七十四名至山東運河有額設閘淺等夫雖止設兵四百名而補還名糧三十四名足資應用毋庸再添如此裒多益寡實於防守大有裨益下部議行臣等謹按河兵之設原以防守堤工顧工有大小則額有多寡必衆寡適均斯為盡善乃江南河兵多至萬餘名而河東則僅有一千七百之數以從前總河本止一員三省河兵皆可調撥逮分設總河即就所管汛地改𨽻則豫省額兵遂至不敷應用兹䝉聖鑒因核辦名糧實額即為斟酌損益以增河兵既無虛糜之費亦足防守之資可仰見睿慮之周詳矣四十七年諭據大理寺少卿劉天成奏稱督撫兩司以及道府公出請限定人役名數督撫限以三十二人兩司限以二十二人道府十六人等語督撫司道等因公出巡所帶僕從人役全在本官嚴行管束時刻留心稽查一切供應照例發價自不致騷擾滋弊設若劉天成所奏限以人役名數如果本官不能鈐束即一二人亦能作弊况此數十人中豈能保其不滋事乎空言無補徒滋煩瀆而已四十八年諭據李世傑奏豫省堵築青龍岡漫工及築堤濬渠厯次酌增夫料價銀九百四十五萬三千九百餘兩請分作三十年攤徵以紓民力一摺豫省自辦理大工以來厯次部撥及動用司庫千餘萬兩無非為百姓保護田廬輯寧家室所有採辦料物雇募人夫俱於例價之外寬裕給值俾小民踴躍赴事以期迅速蕆工其例價外酌增銀兩自應分年均攤代徵還欵在百姓等依限輸將亦屬分內之事但此次為數甚多而上次漫工案內又尚有攤工未完銀九十餘萬兩若按年帶徵民力未免拮据朕自御極以來勤恤民依覃敷愷澤普免天下地丁錢糧者三次普免各省漕糧者二次不惜萬萬帑金俾閭閻並臻康阜又何靳此千餘萬庫項而令小民每年於正賦外多此徵輸耶况現在仰荷上天孚佑大工告蕆自應廣澤推仁與斯民咸慶盈寧之福所有此次該撫等所請分年攤徵銀九百四十五萬三千九百二十餘兩以及上次攤徵未完銀九十四萬五千餘兩俱著加恩普行豁免以仰答昊蒼嘉貺並示朕愛惠黎元為民藏富至意該撫其遍行曉諭茅簷蔀屋咸使聞知俾均沾實惠毋任不肖官吏從中滋弊該部即遵諭速行又兵部議令順天府府尹轉交大興宛平兩縣嚴飭各鋪司以後輪流遞送不得專委一人凡有一切公文到鋪逐一上號除各府州縣自相申送文移向給回照可查者仍常遞送外其咨行在京各部院衙門公文務須按日彚送各州縣另登號簿將某日送某衙門公文幾件係某鋪司承送一一注明即交該鋪司送至各衙門領取回照旋取繳縣核對銷號如無回照及送繳遲延該縣刻即嚴查辦理如此則逐日皆有稽查無從延擱仍令該縣十日一次調驗各鋪號簿查對是否符合有無遺漏按月申送順天府查核其朝陽鋪司接收東三省事件繁多原設鋪司與别路衝途均係五名稍覺不敷應交順天府於事簡原設四名之處抽撥一名安設該鋪以資遞送著為令四十九年諭據李侍堯奏肅省安西等處雇覔出口車輛向例每百里以一兩六錢核給經海祿查奏止須給銀一兩續經核奏每百里止須給銀六錢應查明厯任報銷車價浮冒之州縣一體核辦但此項車價原係照例給發其咎在明知例價有餘不行據實呈出尚與舞弊侵冒者有間可否罰令加倍賠繳勒限嚴追暫免革職治罪等語所見甚是雇用出口車輛從前給價稍優俾小民運費之外略得盈餘以資糊口相沿既久已視為固然海祿遽請減去銀一兩並將厯任經手各員一體革職治罪之處所奏未免過當前已據烏什辦事大臣綽克托奏哈喇沙爾以西戈壁頗多車輛甚少若照新定六錢之例實難雇覔請仍照從前一兩六錢銀數支給而塔爾巴哈台辦事大臣惠齡亦復咨請到部是新定車價减省過多各該處勢有難行紛紛咨奏自係實在情形理應通盤籌畫核實酌中定價方可行之永久著交李侍堯綽克托惠齡及各城駐劄大臣各按該處實在情形有無必需仍舊發給車價之處詳籌妥議據實具奏至此項車價其咎在始定例之人其厯任不過照例給發並未從中侵蝕其過在明知有餘不行據實呈出請減較之揑災冒賑慿空舞弊者輕重略别此項人員俱著免其革職治罪並毋庸罰令加倍賠交即照減定之例按數追出已足示警該部知道又諭阿桂福康安奏上届勦捕撒拉爾逆回案內軍需報銷屯練降畨兵丁所支鹽菜白麵部覆准銷其老教土司兵丁因在本省經部議駁止照緑營兵丁之例支給此次該土兵復經調赴日支口食等項若照部議核給實有不敷等語此等老教土兵經檄調隨征爭先奮勉自當從優支給以示體恤况該土兵等與屯練降畨相仿而屯練等月支獨為優厚辦理殊未畫一所有此次檄調隨征之老教土司兵丁應得分例著加恩照屯練降畨之例一體支給其上届給過之項經部議駁者並著一律准豫開銷用昭朕軫念土兵優加體恤之至意又諭據保寧奏川省屯土各兵如遇鄰省檄調請照緑營征兵之例酌給夫馬一摺所奏是已於摺內批示矣川省屯練降畨兵丁因從前甘省蘇四十三滋事及本年勦滅石峯堡逆回兩次俱經檄調㑹勦該兵丁等由松潘一帶逺赴軍營俱能踴躍抒誠急公趨事但因向來檄調係在口外地方程站不逺一切背負騎駝自行備辦未經議給夫馬今既由鄰省檄調該兵丁等跋涉維艱自應照緑營兵丁之例一體給與夫馬以昭體恤現在軍務告蕆該兵丁等俱整旅回川嗣後若遇有鄰省調派之事著給與夫馬俾利遄行以示優恤屯畨之至意又諭據福康安奏山丹縣有押車縣役劉國臣被毆身死訊據安西營兵馬國棟等有兵丁鄧喜因索車價拉去差役劉國臣之供乃該參將路德沛飾詞屢稟代兵狡辨經節次嚴批始將兵丁鄧喜等交縣訊辦請㫖將路德沛革審等語各省驛站向來原有額設車輛如遇差使緊要不敷應用並准其開銷雇辦此次安西營兵赴涼州駐守係官為護送既有車可乘兵丁等又何由向縣役索取車價此必地方官辦理不善或車輛短少有折價情弊以致兵丁得以藉詞訛索著福康安即查明據實具奏至兵丁等遇有征調自當安分遄行如果車輛不敷亦應禀明該管將領代為辦理何得額外多索擅自毆斃差役若似此行凶滋事不嚴行懲治其何以申軍紀而肅戎行著福康安於審明後即將毆弊縣役之兵丁一面正法一面奏聞以示懲警其參將路德沛既不能約束兵丁致有毆斃差役之事又不即時查出行凶之犯送交地方官審訊似此狡詐回護之劣員其罪已不止於革職路德沛如果審無别項情弊亦當發往伊犁充當苦差以為營員飾詞揑稟者戒又諭本年豫省睢州下汛三堡漫口築壩挑河工程緊急前經何裕城奏請照青龍岡加價之例於司庫墊銀發給仍於里下分年攤徵還欵現在豫工奏報合龍但念夫料加價為數自多分年攤扣民力究恐拮据方今部帑充盈朕為捍衛民生起見從不靳惜帑金俾閭閻共享盈寧之福從前青龍岡加價銀兩既降㫖寬免此次漫工所用加價銀兩事同一例亦著加恩一體免徵該撫出示曉諭咸使聞之以副朕惠愛黎元有加無已之至意該部即遵諭行五十年諭外省兵役緝捕要犯往往有施放空鎗恐嚇者夫兵役等如果藉端索詐拘拏無辜致斃自當重治其罪如本係應捕重犯而該犯不服拘執至於抗拒即鎗傷致斃亦屬罪由自取其各縣捕役民壯亦同此例嗣後各督撫通飭所屬將辨州縣曉諭兵役毋得仍前施放空鎗以期共收實效又河南撫臣畢沅奏查得距省城十餘里向有賈魯惠濟兩河㑹集泉流下達安省商旅攸賴今久失濬疏河身日就淤淺應請及時開濬於水旱年可資蓄泄且現在河南開封等處旱荒貧民轉徙傭工甚多趁此鳩工酌給口糧以資力作是此舉不但於民食商販有禆而以工代賑無業窮黎亦可藉資糊口實為一舉兩得疏入得㫖允行又直𨽻總督劉峩等奏稱漕運重船每遇水淺行走不能迅速請備造剝船濟運但事屬創始一切召募船户應給剝價等項必須通盤籌畫使行有成效得垂永久經軍機大臣議定覆奏得㫖允行一附近州縣收管船户備造剝船一千二百隻每船召募誠實船户一名其舵工水手人等應聽船户自行雇覔各船空閒時仍發回各州縣收管無論商貨鹽斤准其在附近地方攬載營生一編定字號查禁出境此項剝船於船頭船尾略加綵畫按子丑寅卯十二地支編列字號每一字自一號起至一百號止再用火烙印直𨽻官剝船字樣轉飭臨清州如遇直省剝船抵關即令其全數起卸另行攬載北上不得放其南下致有偷漏出境之弊一剝船分運酌定派撥如南漕與銅鉛及奉天麥豆一齊抵津同時須剝即將剝船撥給一百號發交天津縣聽其分别剝運其餘一千一百號准其專剝漕運均無貽誤一按照水程酌給工食向來民船剝運漕米自楊村至通州每百石俱給飯米一石二斗制錢六千剝運銅鉛每萬斤給銀六兩九錢剝運奉天麥豆每百石給銀四兩八錢今除剝運銅鉛麥豆仍循舊例外其剝運漕糧自楊村至通州仍給該船户飯米一石二斗所有例給制錢六千文減半發給船户三千文以為水手人等工食其餘三千文扣錢一千文存為嵗修油艌之用二千文給還旗丁如遇水勢充裕視運船所至之處按程遞減剝價一按照號次輪流剝運先將子字號船一百隻定期調集次將丑字寅字等號陸續調撥照所編字號挨次輪剝若冇一船過期不到即著地方官查拿責罰以示懲警一鈐束船戶照管船隻令承管剝船之各州縣嚴飭各船户小心照管不得任意磕碰除每年酌給修艌銀兩外各有滲漏即令該船户自行粘補倘遇風火事故准於失事處報明地方官查明免其賠補其不小心之船户即行責革另募妥人認領其餘條例詳漕運門不備載皇朝文獻通考卷二十四
