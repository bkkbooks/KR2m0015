body:
  text: 欽定四庫全書皇朝文獻通考卷王禮考十三巡幸乾隆六年七月上奉皇太后巡幸避暑山莊諭曰朕初次行圍所有經過州縣前經屢降諭㫖不令絲毫擾累但安營除道未免有資民力朕心軫念著將該地方本年應徵額賦蠲免十分之三以昭朕體恤閭閻至意嗣後方皆巡幸所過地凖此例臣等謹案山莊之建始於康熙四十二年每嵗車駕避暑於此至秋則舉大獮之典而藩部以時覲謁焉皇上繼述志事於詰戎綏逺之猷遵循罔替自是年始巡行塞外校獵木蘭一如聖祖故事兹謹誌熱河行幸之初而圍獵之制則别見於大狩門十年七月上奉皇太后巡幸多倫諾爾諭曰朕向來巡幸所過地方曾派員嚴查隨從官兵人等不許蹂躪農田滋擾百姓此次啓行之時正值秋成在望禾稼尚未登塲誠恐約束不嚴以致踐踏禾黍有妨農務著都統阿蘭泰䕶軍統領法諸那管理多派官兵沿途察㸔嚴加鈐轄其隨從官員兵丁亦令將家人跟役自行管束如有不遵禁令傷及田禾者即行查㕘并行令該督提等遴委員弁一體稽查毋得玩忽十一年九月上奉皇太后巡幸五臺山諭曰朕臨幸五臺觀風問俗葢欲周知閭閻利病舉登之袵席之安也山西地方風俗向為淳朴朕此次巡行親見民情頗屬寧輯但敦龎之質在民而教養之責在上尤當加意拊循化導俾登上理撫臣乃通省之表率藩臬乃師帥之大員府州縣等皆有父母斯民之責其各仰體朕心力行實政教養兼施惟日孜孜罔或怠佚而在小民亦應敦行孝弟崇習禮讓共為良民毋蹈澆漓獷悍之風以成熙皞盈寧之治朕有厚望焉囘鑾閲滹沱河堤工改慶都縣曰望都諭曰朕自真定囘鑾固城祁水之間有縣焉與堯母同名雖述古之意也觸目踟躇於意弗安其易之仍為望都十三年二月上奉皇太后東巡先是十二年六月諭大學士等朕㓜誦簡編心儀先聖一言一動無不奉聖訓為法程御極以來覺世牖民式型至道願學之切如見羮墻辟雍鐘鼓躬親殷薦而未登闕里之堂觀車服禮器心甚歉焉仰惟皇祖聖祖仁皇帝巡幸東魯親奠孔林盛典傳於奕禩皇考世宗憲皇帝崇聖加封重興廟貌嘗遣朕弟和親王恭代展祀未以命朕意者其或有待歟朕寅紹丕基撫兹熙洽思以來春孟月東巡狩因溯洙泗陟杏壇瞻仰宫牆申景行之夙志復奉聖母皇太后懿㫖泰山靈岳坤徳資生近在魯邦宜崇報饗朕不敢違爰遵慈訓親奉鑾輿秩於岱宗用答鴻貺旋蹕青齊觀風布澤以昭崇聖法祖教孝省方鉅典所有應行典禮大學士㑹同該部稽考舊章詳悉具議以聞至行在一切所需悉出公帑無得指稱供頓儲偫絲毫貽累閭閻羽林衛士内府人役等各該管大臣嚴行稽查約束並令扈蹕文武臣僚嚴飭傔從無或侵踐田疇致妨宿麥如有騷擾地方指名需索者立即㕘奏從重治罪通行曉諭知之至是年二月駕發京師至曲阜縣躬詣文廟至大成門下輦步入行三跪九叩禮駕至詩禮堂升座令孔氏後裔講周易中庸一章以御前曲柄黄葢留設先聖廟庭遣親王致祭崇聖祠大臣分獻四配十哲禮畢上詣少皥金天氏陵元聖周公廟致祭復謁孔林奠酒賜衍聖公及孔氏子孫十二氏子孫官員恩賚有差至泰安上恭詣岱嶽致祭至濟南府閲兵上校射連發皆中復親詣舜廟行禮上囘鑾十五年二月上奉皇太后巡幸五臺山先是十四年十二月諭曰朕前經降㫖於來年秋間巡幸五臺由晉入豫省覽中州迴蹕畿輔近日嚮導人員囘奏稱自太原一路至河南境由太行山麓甚為﨑嶇狹隘朕省方巡幸惟取便民若因修治道途重煩民力非朕觀風問俗本意應於春間即詣五臺至秋間百穀登塲後再幸中州至是駕發京師諭扈從大臣等曰時届春融正秋麥紐芽之後幸自去冬至今瑞雪頻沾土膏滋潤漸已青葱入望所有經過地方車馬僕從俱著嚴加誡飭毋得踐踏八月上奉皇太后巡幸中州諭大學士等朕時巡中嶽所有直𨽻河南二省預備道路營盤等項俱係案款銷算惟是經過地方不無隨時修葺恐致少有拮据著於直豫二省公項錢糧内各賞銀一萬兩交與督撫通融辦理以示體恤駕至河南府親詣中嶽致祭遣官致祭河瀆衛水周漢帝王陵寢至開封府閲兵諭曰朕舉行秋狩覲岳省方葢欲周覽民情懋登治理凡地方之利弊官吏之賢否與夫政令之得失清蹕所至日切疇咨河南地宅土中素稱淳朴今值雨暘協應禾應告登巡行之次親見閭閻望幸童叟歡欣而俗尚敦龎室廬寧輯朕懷深為欣慰顧惟因時保治之方其權實操之自上撫臣表率通省藩臬任寄旬宣以至郡守牧令與民愈親則導民尤切應仰體朕心力行善政敦本訓俗除慝安良教養兼施屏虛文以求實政其在小民亦當敦禮讓務農桑從儉去奢力田孝弟以期共享昇平之福朕於該省臣民有厚望焉上囘鑾十六年正月上奉皇太后南巡先是十四年十月諭大學士等江南督撫以該省紳耆士庶望幸心殷合詞奏請南巡朕以鉅典攸闗特命廷臣集議今經大學士九卿等援据經史且仰稽聖祖仁皇帝六巡江浙謨烈光昭允宜俯從所請朕軫切民依省方問俗郊圻近省不憚躬勤鑾輅江左地廣人稠素所厪念其官方戎政河務海防與凡閭閻疾苦無非事者第程途稍逺十餘年來未遑舉行屢嘗敬讀聖祖實録備載前後南巡恭侍皇太后鑾輿羣黎扶老攜㓜夾道歡迎交頌天家孝徳心甚慕焉朕巡幸所至悉奉聖母皇太后游賞江南名勝甲天下誠親掖安輿眺覽山川之佳秀民物之豐美良足以娱暢慈懷既詢謀僉同應允從所請但朕將以明年秋幸五臺經太原厯嵩洛趙魏囘鑾已涉冬令南巡之舉當在辛未年春正我聖母六旬萬夀之年也將見巷舞衢歌歡騰獻祝稱朕以天下養之至愛上以廣承歡之慶下以慰望幸之忱益深嘉悦屆期諏吉以聞嚮導人員朕酌量先期簡派前往清蹕所至簡約儀衛一切出自内府無煩有司供億至行營宿頓不過偶一經臨即暫停亦不踰旬日前嵗山左過求華麗多耗物力朕甚弗取曽經降㫖申飭明嵗晉豫等省以及江南俱不可倣傚至名山古蹟南省尤多亦祗掃除潔浄足備臨觀而已毋事崇飾倘有頽圯隨宜補葺悉令動用官項但當據實不得任有司浮冒其民間張燈結綵聖祖嘗以為戒載在方冊宜共恪遵其慎勿以華侈相尚所司通行曉諭其一切應行典禮著照所議行十五年十二月諭曰明嵗恭逢聖母皇太后萬夀之年朕於新正恭奉鑾輿巡幸江南浙江省方觀民入疆考績式遵祖烈慶典斯行東南父老共効嵩呼洵昇平之盛事惟念江浙二省襟帯江湖程途稍逺自皇祖聖祖仁皇帝南巡以來異數隆恩昭垂史冊迄今四十餘年朕俯從望幸之忱倍切勤民之隱前扵大學士九卿等議准兩江總督黄廷桂等一摺已降㫖諄切曉諭又特遣嚮導大臣兆恵努三等前往面傳諭㫖務從儉約一切供頓絲毫不擾民間凡地方大吏職在旬宣自能仰體朕心遵㫖辦理但恐地方有司奉行不善或窮鄉僻壤未及周知是用再行申諭各該督撫及所屬官民人等尚其凛遵前㫖共期撙節以敦善俗以導淳風如所在行宫與其逺購珍竒雜陳玩好不如明牕淨几灑掃潔除足供信宿之適也經過道路與其張燈懸綵徒侈美觀不若蔀屋茅簷桑麻在望足覘盈寧之象也闤闠通衢人烟稠宻正以見懋遷有無之樂不得因道路湫隘俾遷移㕓舍或致商民失業也朕翠華所至念切民依惟期宣達羣情勤求治道上以奉慈顔之悦豫下以答黎庶之瞻依凡屬虚文浮費概宜實力屏除用光鉅典其扈從滿漢文武大臣官員侍衛等皆當奉公守法不得與地方官往來交際潜通餽遺兵丁以及隨從人等著該管大臣各嚴加約束經行所至不得稍有滋擾春苗遍野無得踐踏違者察出從重治罪務令白叟黄童普沾膏澤共樂恬熙副朕問俗觀風行慶施恵之至意至是年駕發京師至山東遣官祭東嶽先師孔子元聖周公廟至江南境遣官祭河瀆淮瀆江瀆駕至淮安閲髙家堰堤工至蘇州府諭督撫等朕命駕時巡周覽風俗觀民察吏惟日兢兢三吴尤素所厪念也粤自我皇祖聖祖仁皇帝巡幸東南先後六舉厯今四十餘年盛典昭垂衢謡在耳頃者入境以來白髪黄童扶攜恐後就瞻愛戴誠意可嘉朕已叠沛恩膏廣敷渥澤惟念大江南北土沃人稠重以百年休養户口益增習尚所趨葢藏未裕紛華靡麗之意多而樸誠之風轉有未逮夫去奢崇實固閭閻生計之常經而因時訓俗以宣風而布化則官兹土者之責也其尚勵乃實心以行實政無忝教養斯民之任凡兹士庶更宜各敦本業力屏浮華以節儉留其有餘以勤勞補其不足時時思物力之艱難事事惟侈靡之是戒將見康阜之盛益臻父老子弟共享昇平之福朕清蹕所至有厚望焉至浙江上躬詣禹陵致祭遣官祭南鎮海神廟御試浙江進獻詩賦士子中選者三人特賜内閣中書至江寧府躬詣明太祖陵致祭禮畢諭督撫等併地方官加意毋許樵牧御試江蘇安徽二省進獻詩賦士子中選者六人特賜内閣中書過淮安諭增築城北䕶城石堤閲視黄河南北岸堤埽各工上囘鑾臣等謹按江浙為東南重地百數十年來休養生息土沃民稠洪惟聖祖仁皇帝六巡江浙徳意深厚昭兹史冊我皇上克繩祖武所其無逸自乾隆十六年以來亦復翠華六莅闓澤汪濊以次逓加史不勝書其在乙酉嵗以前則皆恭奉聖母皇太后問安視膳凡名勝所在親掖金根以承歡豫海内咸頌天子之孝焉經過地方蠲免額賦有差而省㑹駐蹕之區則悉免本年正供留漕艘以平市直免逋租以省催科清理庶獄自軍流以下咸予曲宥海内咸頌一人之仁焉學校所以儲才也增博士弟子之額廣選拔貢生之途諸生之進獻詩賦者親試之其入髙等者特授以官樂育人才之典古未有也召見地方官吏問民疾苦察其賢否而黜陟之閲視八旗駐防及水陸標營騎射文武員弁咸晉秩一級有以公事詿吏議者令其開復凡以飭官方而崇實政也舊臣之予告里居者加銜晉秩優賜之俸加恩子孫俾列賢書其餘皆賞賚有差八旗駐防及各州縣老民老婦並有恩賜篤舊優老之典有加而靡已焉念河渠海塘為東南數省要務躬親相度審地形之髙下量水勢之緩急增築隄防講求宣導發帑興工費逾鉅萬以為民生籌一勞永逸之計至於所過名山大川先代陵廟或遣官展祀或親詣行禮以將誠敬名臣忠烈皆遣官奠酒懐柔之典洽于神人又如此臣等謹按古稱天子所至曰幸蔡邕獨斷云車駕所至見令長三老官屬親臨軒作樂賜以食帛民爵有級或賜田租故謂之幸惟我聖祖仁皇帝垂憲于前皇上紹述于後省方展義慶賜遂行厯考百王未有倫比凡在山陬海澨莫不喁喁然望幸惟殷而三吴之民瞻雲就日被恩尤渥其為欣幸洵有名言之莫罄者矣諸典禮有應分見者則于他門互見詳之二十一年二月上東巡先是二十年六月諭曰平定準噶爾㨗聞以數十年逋冦迅就廓清荒服敉寧中外蒙福迺我國家無疆之庥緬惟皇祖聖祖仁皇帝削平三孽於康熙二十三年諏吉東巡親祭闕里武功文徳彪炳簡冊朕仰承先烈集此大勲保泰持盈彌深兢業先師孔子闕里理應恪循成憲躬詣行禮用申誠敬且自瞻謁林泉已逾六載仰止之念時切於懐擬於明嵗春月自京起鑾恭謁曲阜翠華所經亦以體察吏治清問閭閻行慶施恵以稱朕法祖尊師之至意至是年駕至山東躬詣孔廟行釋奠禮畢至少昊金天氏陵周公廟致祭復詣孔林奠酒遣官祭顔曾思孟専祠上囘鑾二十二年正月上奉皇太后南巡先是二十年六月諭大學士等奏稱江浙士庶望幸情殷請於明嵗再舉南巡一摺朕自乾隆十六年巡幸呉越迄今已閲五載該督尹繼善喀爾吉善等均曾具摺奏請朕因西師尚未凱旋未經允准現今膚功迅奏荒服敉寧南省吏治民風時厪予懐而髙堰堤工尤數郡生靈攸闗上年告竣以後正當親加察勘前降旨於明嵗春月展謁孔林著允大學士等所請於禮成之後敬奉聖母皇太后鑾與順道前往江浙以抒勤民之隱而慰望幸之忱朕省方觀民入境考績惟期勤求實政宣達羣情一切供頓皆出内府絲毫不以擾民地方官毋得指名儲備令衆商捐輸及扣各屬養亷察出定行嚴加究處前者巡南省時屢飭各督撫務從簡樸而所至尚覺過於華飾喧溷耳目此次行宫及名勝憩游之地悉仍舊觀但取灑掃潔除毋得增一椽一瓦毋陳設玩器城市經途毋張燈演劇踵事增華巡覽所及各督撫等果能綏輯井疆康乂蒸庶俾人敦禮讓俗慶豐寧朕自深為嘉悦若其徒事華靡致飾觀美耗有用之財侈無益之費適以自滋咎戾甚無取焉各督撫及所屬官民人等尚其善體朕心以副朕觀風問俗行慶施恵之至意二十一年九月諭曰昨嵗江浙督撫等據士民呈詞籲請南巡朕已降㫖俞允後因江蘇所屬偶被災祲地方各官皆有應辦賑務朕恐伊等因除道清塵之役轉於民事稍有妨誤則殊非朕眷顧羣黎之本意復經特諭停止今據兩江浙省督撫諸臣合詞奏稱西成有慶臣民望幸實深請以明嵗再舉巡幸之典南省民風吏治時厪朕懐兹當嵗美人和之候省方觀民入疆考績正可抒朕勤民之隱而髙堰堤工告竣後亦當親加察㸔著允該督等所請於明春時巡至於一切供帳頓次絲毫不以累民地方官承辦差務寧樸勿華從前所降諭㫖甚明該督撫等其善體朕心以副朕觀風問俗加恵斯民之至意至是車駕發京師至山東遣官祭東嶽先師孔子闕里元聖周公廟至江南境遣官祭河瀆淮瀆江瀆駕渡河閲視河防至杭州遣官祭禹陵南鎮海神廟閲兵御試浙江進獻詩賦士子中選者四人特賜内閣中書至江寧府親詣明太祖陵奠酒仍遣官致祭閲兵御試江蘇安徽進獻詩賦士子中選者七人特賜内閣中書囘鑾復閲洪澤湖堤工至徐州閲黄河形勢指授方畧至山東曲阜縣親詣先師孔子廟行禮復詣孔林奠酒至泰安詣岱廟行禮上囘鑾二十六年二月上奉皇太后巡幸五臺山先是二十五年八月諭曰明年恭逢皇太后七旬萬夀欽奉懿㫖五臺顯通寺為文殊師利道場梵宇琳宫夙昭靈應謁陵成禮後順道前詣拈香欽此所有應行各事宜著該衙門及地方有司照例敬謹預備至是年上奉皇太后謁泰陵禮成取道幸五臺山諭曰從前兩次巡幸五臺帳殿周廬隨常頓宿今春恭奉皇太后前詣臺山巡幸該撫於菩薩頂側建葢行宫並於臺麓寺旁添設坐起數楹以備安憩雖臣子之誼各盡其誠而詢其工料所費乃出自伊等養亷夫朕既不許派累百姓而各官養亷原為辦理公務及薪水之資今以之捐建行宫則甚不可著於存公項内撥賞銀二萬兩以供鳩工飭材之用二十七年正月上奉皇太后南巡先是二十三年九月諭曰兩江總督尹繼善等以河工告竣年嵗豐収臣黎望幸情殷請以庚辰之嵗載舉南巡令典合詞具奏朕惟東南河道民生時縈宵旰前者翠華再莅每切咨詢不敢自逸兹當大工既蕆澤國安瀾于焉攬轡觀風上以慰曩時往來指畫之勤下以考在事大臣宣化承流之績理亦宜之顧各督撫等前後奏報工程披章如睹而嵇璜裘曰修等又以親承訓示甫經復命囘京條晰敷陳情形頗悉乃者大江南北年榖順成民氣和樂封函叠至仰見上蒼福佑額手為南黎稱慶此意與封疆諸大吏共之猶念積潦初除汙萊日闢正宜乗時勸諭俾瘠土並化膏腴以培元氣已降㫖各督撫勘明濵河地畝有秋穫雖登而小民牛犁籽種不能接濟致曠土尚有未耕者並予格外加恩官為借給使得資東作而厚西成其果盈寧之象與嵗俱增則機杼倉箱熙恬滿目其足以佐時巡風景者不更多耶且明嵗車駕臨幸索約爾濟又再定伊犁後若左右哈薩克東西布魯特及囘部各城以次平定歸降不無覲謁宴賚之典車馬之煩所當少恤且嵗屆辛巳即恭逢聖母皇太后七旬大夀普天同慶如於此年敬奉安輿重臨江浙庶幾省方問俗嘉地利之畢登喜民生之益懋於以仰悦慈懐夀祺康豫當推恩錫福俯慰元元望幸之忱俟臨期另行降㫖所有庚辰年南巡之奏暫停舉行毋庸具摺固請先將此通行曉諭知之二十五年八月諭大學士等獻嵗恭逢皇太后七旬萬夀擬於新春敬奉安輿時巡南服俯慰士民顒祝之忱并順道閲視徐州石堤及海寧塘工今嵗大江以南在在豐収惟夏間雨水稍多河湖盛長髙寶興泰一𢃄低窪處所頗有漫溢恐地方有司承辦南巡差務轉於賑恤事宜不能盡心經理是以諭令該督將實在情形確查具奏今據奏到髙寶等處被水較重該處既現已成災亟宜以賑務為切要所有南巡應辦差務暫行停撤改於壬午春敬奉慈輦以慰輿情仍可攬民風而昭盛典大差既經停止自可専心辦理賑務該督等務宜仰體朕懐董率僚屬確案災地情形實力妥辦勿使窮黎稍有失所以副朕痌瘝在抱之意至是車駕發京師至山東遣官祭東嶽先師孔子闕里元聖周公廟至江南境遣官祭河瀆淮瀆江瀆駕渡黄河閲清口東壩木龍登舟巡厯河堤過揚州渡江閲水操諭曰向來巡幸所至地方大吏豫備燈船烟火頗覺繁俗頃在揚州適以哈薩克陪臣入覲聊示民情和樂之意是以聴其豫備倘蘇杭等處悉仿而行之原屬不必朕省方觀民勤求治理即以幾暇適情則山水名勝儘足以供吟眺之資又何事徒滋繁費為耶自蘇州至海寧閲海塘御製觀海塘誌事詩示督撫諸臣至杭州遣官祭禹陵閲兵御試進獻詩賦士子中選者四人特賜内閣中書還至江寕府親祭明太祖陵閲兵御試江蘇安徽二省進獻詩賦士子中選者八人特賜内閣中書諭督撫等朕車駕所經惟橋梁道路葺繕掃除為地方有司所宜修補其綵亭燈棚一切飾觀文具屢經降㫖斥禁今江浙兩省塗巷尚有踵事因仍者此在蘇揚鹽布商人等出其餘資偶一㸃綴本地工匠貧民得資力作以霑㣲潤所謂分有餘以補不足其事尚屬可行若地方官専欲仿而效之以為增華角勝則甚非奉職之道嗣後督撫等其實力禁止一切屏去浮縻以崇實政如有仍蹈故習者將惟該督撫是問駕至淮安閲髙家堰命增築堤工五百餘丈上命莊親王允禄等恭奉皇太后由水程囘鑾上登陸閲視埽工至徐州府閲黄河岸新堤遣官祭河神廟至鄒縣上詣孟子廟拈香至曲阜縣詣文廟行禮遂詣孔林酹酒至泰安府詣岱宗行禮上囘鑾皇朝文獻通考卷一百三十七
