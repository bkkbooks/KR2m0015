body:
  text: 欽定四庫全書皇朝文獻通考卷九十七郊社考七日月星辰順治八年六月定春分秋分朝日夕月之禮初定祀典以日月從祀天壇罷春秋二分祀事至是禮臣請照舊典以春分秋分日致祭於從祀天壇外仍立朝日壇於東郊立夕月壇於西郊從之朝日壇在朝陽門外東郊西向一成方廣五丈高五尺九寸面甃金甎舊制用青色琉璃白石四出陛各九級圓壝周七十五丈正西三門東南北各一門西門外有燎爐鐘樓北門外東為神庫神厨宰牲亭井亭北為祭器庫樂器庫西北為具服殿外垣前方後圓西北各三門垣之西北有石坊曰景升街舊曰禮神街雍正二年改今額夕月壇在阜成門外西郊東向一成方廣四丈高四尺六寸面甃金甎舊制用白色琉璃陛六級方壝周二十四丈正東三門三方各一門餘如朝日壇而皆在南具服殿在東北外垣正方石坊曰光恆街舊名同前凡祀日月為中祀祀朝日壇以春分日卯時值甲丙戊庚壬年皇帝親詣行禮餘年遣官承祀祀版赤質朱書玉用赤璋制帛用紅色樂用七奏太蔟為宫樂章曰曦舞用八佾牲用太牢爵用陶舊制用玉豆登簠簋鉶尊同皇帝祭服用赤祀夕月壇以秋分日酉時值丑辰未戌年皇帝親詣行禮祝版白質墨書禮神用白玉白色制帛樂用六奏南吕為宫章名曰光佾舞牲器與朝日壇同舊制用金爵皇帝祭服用玉色以北斗七星木火土金水五星二十八宿周天星辰共為從壇位北南向無玉用制帛十有一白七青紅黑黃各一餘同正位十一年二月癸亥春分朝日於東郊世祖章皇帝親詣行禮康熙三年二月丙辰春分朝日於東郊聖祖仁皇帝親詣行禮九年八月甲午秋分夕月於西郊聖祖仁皇帝親詣行禮臣等謹按聖祖仁皇帝親祭朝日壇者十夕月壇者四雍正二年二月庚午春分朝日於東郊世宗憲皇帝親詣行禮八月丁丑秋分夕月於西郊亦親詣行禮臣等謹按世宗憲皇帝親祭朝日壇者五夕月壇者二乾隆三年二月甲申春分朝日於東郊皇上親詣行禮八月庚寅秋分夕月於西郊亦親詣行禮是年秋七月壬申奉諭㫖今年夕月壇舊例係遣官之年但朕即吉之後初次舉行朕親詣行禮以展誠敬十一年二月丙寅春分皇上親祭朝日壇以次日日食不乘輦不設鹵簿不奏樂四十二年正月定祭朝日壇夕月壇御用禮服及陪祀執事官服色詳見王禮考自乾隆元年至五十年皇上親祭朝日壇者六親祭夕月壇者三五十年後敬俟續纂天神太嵗臣等謹按馬端臨以風師雨師諸祀附見星辰門蓋本周禮槱燎之文鄭氏箕星畢星之說伏考我朝定制初立天神壇於地祇壇之東壇制詳本卷川地祇又互見山門合祀風雲雷雨天神又奉世宗聖諭特於都城和㑹之地崇建專祠俾雨暘時若協應休徴典至巨也至太嵗之祀明初禮臣建議援引嵗星應十二辰一周天為說謂即十二辰之神今則祈雨報祭恆恪恭將事傳曰日月星辰之神則雪霜風雨之不時于是乎禜之稽其義類蓋為相近謹仍次星辰之後以見國家稽合古制明禋祈福凡以溥利蒼黎亦洪範從星之義也順治元年定每嵗致祭太嵗壇之禮太嵗殿在先農壇之東北正殿七間祀太嵗之神兩廡各十有一間祀十二月將之神前為拜殿東南燎爐一每年正月初旬諏吉及十二月嵗除前一日遣官致祭三年正月遣官祭太嵗月將之神嵗暮遣祭同自是年以後遣祭並同十四年五月以旱遣官致祭神祇壇甘霖有應遣官告謝神祇壇在先農壇內垣外之東南東為天神壇南向一成方五丈高四尺五寸五分四出陛各九級壇北立青白石龕四均鏤雲形高九尺二寸五分為雲師雨師風伯雷師之位西為地祇壇北向祀五嶽五鎮四陵山今為第五五陵山詳卷四海四瀆京畿名山大川天下名山大川詳山川門嵗遇水旱則遣官祭告祈禱冇應則報祭同日行禮自是年以後祈謝並同康熙三十五年二月聖祖仁皇帝親征噶爾丹遣官致祭太嵗之神行軍之禮皇帝親征豫日告祭遣官致祭太嵗凱旋祗告如之雍正元年建時應宫於西苑以祀龍神是年奉世宗憲皇帝諭㫖以西苑紫光閣前後殿改建時應宫前殿奉四海四瀆龍神後殿中奉順天佑畿龍神兩旁左右奉十有七省龍神後諭各省督撫迎奉直省龍神立廟致祀增建後殿以中殿奉京畿龍神後殿奉八方龍神每嵗以六月十三日致祭用素羞香燭遣內務府官行禮六年七月建風神廟於都城內東北隅二月奉諭㫖朕惟風雨時若百物繁昌皆由誠敬感格天心用能福佑下民時和嵗稔而司天號令長養阜成風神之貺厥功尤懋頻年以來朕䖍祀龍神有祈必應歷有明驗因思風神巽順和煦茂時育物亦宜特隆祀典以答洪庥考之周禮大宗伯以槱燎祀風神虞書禋於六宗劉歆鄭康成之說咸謂六宗之內風神其一也歷代各置壇兆至宋祥符間曽立風伯廟近代及本朝俱列南郊四配之中典禮具備今欲於都城和㑹之地特建廟宇因時禱祀以展朕為民祈福之誠應如何考據禮儀相度營建之處禮工二部㑹同內務府詳議具奏部臣奏言伏查周禮以槱燎祀風師注鄭康成以風師為箕星即虞書六宗之一孔安國蔡沈洪範傳皆云箕星好風而馬端臨郊社考亦謂周制以立春後丑日祭風師於國城東北蓋東北為箕星位次丑亦應箕星之位也漢劉歆等議立風伯廟於東郊而東漢縣邑常以丙戌日祀風伯於戌地唐開元禮則遵周制就箕星之位為壇祭之宋仍唐制祥符間建風伯廟逮元及明亦各有祀典臣等㑹同詳議於都城內東北擇得景山東邊當東北箕星之位建廟甚宜其廟宇規制倣時應宫酌量營建每年於立春後丑日致祭由內務府敬謹備辦奏上允之內閣以封號廟名請詔封為應時顯佑風伯之神廟曰宣仁廟前殿奉風伯之神後殿奉八風之神是年敕封江南清口風神河臣齊蘇勒疏言淮安府清河縣清口地方乃洪澤湖水出口敵黃之所從前建有風神廟官民行旅皆致祭禱至於洪澤一湖諸水總滙全賴高堰大堤以為保障惟此堤工最忌西風鼓浪自昔傳有日費斗金之說比年每逄大汛從無西風湖工平穩轉險為安皆由我皇上念􅋀民生懷柔百神感召天和之所致也伏查水道河神凡有捍灾禦患者俱䝉敕賜爵號以彰神庥惟兹風神福國佑民潛維默護神功既懋褒錫宜隆伏乞一體敕封以崇祀典禮部議覆從之尋詔封為清河宣惠風伯之神世宗御中和殿閲視祭文香帛禮部遣官齎往令河道總督致祭七年二月世宗憲皇帝親祭先農壇詣太嵗殿上香七年十月建雷師廟於都城內之西建雲師廟於都城內之東是年二月奉諭㫖朕惟雲雨風雷之神代天司令俾百昌萬寶普含膏澤以錫福於蒸民厥功並懋朕恭承天眷恪修祀典為四海蒼黎仰祈嘉佑已經特建廟宇崇祀龍神風伯而雲師雷師尚闕專祀嘗考虞書禋於六宗之文漢人以乾坤六子釋六宗震雷巽風均列禋祀而易曰雷以動之風以散之則風雷之發生萬物功實相等禮記曰天降時雨山川出雲周禮亦以五雲辨年嵗是雲與雨皆運行造化同昭天貺者也前代及本朝南郊大祀雲雨風雷俱列從壇之次式隆配享典禮亦既備矣邇年以來雲物兆祥雷行應候茂育庶彚宣暢陽和庇國佑民之德靈應顯然今欲特建廟宇䖍奉雲師雷師之神因時禱祀敬迓洪庥以展朕為民祈福之意禮工二部詳議具奏部臣奏言伏查尚書洪範五行傳曰雷首長萬物為出入又論衡曰雷出地則養長華實發揚隱伏宣盛陽之德易乾卦曰雲行雨施品物流形左傳凡分至必書雲物以辨年嵗是雲師雷師錫福蒼生厥功甚著唐天寶五載增雷師於雨師之次每嵗於立夏後申日致祭宋元因之大明集禮增雲師於風師之次郡縣立雷雨壇於稷壇西風雲壇於社壇東明㑹典載秋分後三日合祭雲雨風雷壇今雷師廟宇應建於西方立夏後申日致祭雲師廟宇應建於東方秋分後三日致祭從之尋擇地營建其規制祭儀俱倣宣仁廟內閣以封號廟名請乃封雲師為順時普䕃雲師之神廟曰凝和廟雷師為資生發育雷師之神廟曰昭顯廟十三年封廣東邊海郡縣廟祀風神為宣仁昭泰風伯之神春秋致祭封甘肅蘭州府廟祀雷神為顯仁應瑞之神春秋致祭皆從撫臣請也乾隆元年十二月嵗暮祭太嵗壇遣親王行禮舊制例遣太常寺堂官主祭是年太常寺照例題請奉諭遣諴親王允祕行禮又以次年孟春致祭請奉諭遣和親王𢎞晝行禮七年五月祈祀神祇壇增用樂章互見禱水旱門十六年增定致祭太嵗壇上香之儀舊例春冬致祭不上香是年禮部議奏太嵗月將同屬天神則升馨求陽不應與他祭異況偶逄祈雨致祭儀注見載上香其春冬二祭應行上香禮兩廡分獻並同從之十八年定太嵗殿供奉神牌之禮舊例祭時以黃紙書年建神牌祭畢與祝帛同焚至是禮部奏請於殿廡內供奉神牌神龕前列神座祭時請神牌奉安神座祭畢復龕恭遇皇上上香時不請神牌出龕庶於禮意允協奉諭㫖太嵗月將神牌照所奏安奉天神地祇先農神牌亦俱應安奉於正屋嗣是遵行永為定制是嵗改定太嵗壇祈雨樂章禮部奏言太嵗殿見在樂章乃新正嵗除通用與祈禱雨澤之義全不相涉應交樂部别撰照神祇壇皆用豐字以昭畫一從之互見雩考二十年定太嵗壇遣親王郡王行禮舊例遣太常寺堂官行禮及是㑹典館奏請改遣親王郡王以昭誠敬從之二十一年定太嵗壇兩廡分獻遣太常寺堂官行禮舊例太常寺派㕔員行禮及是太常寺奏言承祭之官既改遣親王郡王而兩廡分獻仍派㕔員於體制未協請嗣後用臣寺堂官分獻臨時奏派從之四十三年四月致祭風神命皇子行禮皇帝親祭朝日壇儀遣官儀附甲丙戊庚壬年春分之朝皇帝親詣東郊朝日先二日禮部尚書一人至犧牲所眂牲如儀右眂牲是日太常寺卿率屬進齊戒牌銅人恭設於乾清門如儀皇帝乃齊於大內王公百官齊於邸第右致齊書祝版眂祝版儀均與同北郊祀前一日黎明太常寺官設香案於宰牲亭外光祿寺少卿一人朝服上香御史禮部祠祭司官眂宰宰人瘞毛血如儀右眂割牲是日太常寺官潔壇上下藉以棕薦設神座於壇上西向工部官張皇帝拜次於西階上如儀右設神座張次將祀之日夜分太常寺卿率屬入壇具器陳牛一羊一豕一登一鉶二簠簋各二籩豆各十盞三十爐一鐙二中設一案少北東向供祝版南設一案北向陳赤璧一禮神制帛一色赤香盤一尊一爵三並設福胙加爵一凡牲陳於俎凡玉帛實於篚凡尊實酒承以舟疏布冪勺具鑾儀衛設洗於具服殿外樂部率太常協律郎設中和韶樂及樂舞於壝門內南北分列器數與北郊同右陳設陳設畢太常寺博士引禮部侍郎一人升壇眂玉帛齍盛及籩豆登俎之實如儀右省齍辨行禮位西階上幄次正中為皇帝拜位東向陪祀王公位壇下左右各二班百官位壝門外左右各五班重行異等均東面左班北上右班南上辨執事位壇上太常寺司拜牌拜褥官各一人立於皇帝拜位左右司祝司香司玉帛司爵各一人光祿寺卿二人侍衛二人太常寺贊答福胙一人侍儀禮部尚書侍郎都察院左都御史副都御史樂部典樂各一人位南北序分立祝案尊案之次如常儀太常寺典儀一人司樂一人立於階下之左面北記注官四人立於壝門外之右面南糾儀御史四人禮部祠祭司官四人引禮鴻臚寺官四人分立王公百官拜位之次協律郎歌工樂工舞佾分立樂懸之次傳贊二人循壝門內墻西立位均南北序南北面掌燎官率燎人立於壝外西南隅右辨位其日五鼓步軍統領飭所部清蹕除道左右塗巷皆設布幛鑾儀衛陳法駕鹵簿不陪祀王公百官朝服祗候日出前八刻太常寺