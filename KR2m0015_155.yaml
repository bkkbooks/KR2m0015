body:
  text: 欽定四庫全書皇朝文獻通考卷一百五十五樂考一臣等謹按古帝王徳盛者樂盛太古之樂如雲淵咸英尚矣而獨稱韶為美善之盡雖其聲與容與器後世靡得詳焉而時或散見於傳記考古者要不能舎是三者以别求所為盛徳之形容也伏讀聖祖仁皇帝御製律吕正義一書首明黄鍾度分體積倍半相生相應之理較古尺九寸得今尺七寸二分九釐以定黄鍾徑圍長短之數而八音之屬或繪圖立説以昭法守我皇上重輯律吕正義後編又續定丹陛導迊鐃歌凱歌鼓吹及四夷諸樂器圖説歳在乾隆己夘冬江右得古鎛鍾十一圜以獻當西師告捷之時式彰瑞應上廼釐定其名復詔樂部依式仿鑄御製銘詞鐫垂永乆鍾成上允臣工請採和闐之玉琢為特磬以儷鎛鍾而特懸乃備此我朝樂之不可及者器其一也世祖章皇帝御宇之元年定郊社宗廟社稷樂章錫名曰平聖祖仁皇帝御極之十有六年二十有二年兩加增定而樂章備矣又以古隔八相生之法寖乆失傳定為濁調従陽清調従陰而五音正矣世宗憲皇帝御製三十六禾詞被之聲歌於是耕耤之樂具焉至我皇上定南郊北郊之樂以黄鍾林鍾為宫定慈寧坤寧之樂以南吕為宫定朝㑹中和丹陛之樂則順十二律吕以為宫而律通於厯兼得置閏之法焉推之行幸鐃歌出師郊勞臨雍釋奠鄉飲酒禮靡不審比樂音章曲大備至若牧馬歌如意寶鳯凰鳴乗驛使等曲藩服逺夷之音咸登樂府藻金石而絣萬禩洋洋乎盛矣此我朝樂之不可及者聲又其一也文舞羽籥武舞干戚郊廟社稷及中祀皆用之先武後文従古制也增定大雩童子舞元衣羽翳歌御製雲漢詩八章軫民瘼也恭遇皇上賜宴羣臣外藩並陳慶隆舞而髙麗國俳瓦爾喀樂回人樂伎莫不畢進詠仁蹈徳美備詳明此我朝樂之不可及者容又其一也臣等學愧膚庸職司編纂謹依馬端臨考分為十三門按類記載垂諸無窮昭法式焉樂制一天命元年定上尊號建元行禮慶賀樂制是年元旦諸貝勒大臣文武羣臣進表恭上尊號曰一覆育列國英明皇帝上焚香告天行受寶禮以是年為天命元年禮畢陞御座諸貝勒羣臣行慶賀禮陳設鹵簿奏樂八年定凱旋拜天行禮筵宴樂制時台吉阿巴㤗等征蒙古還至都城上出城迊之遇於古城堡南因破敵竪纛八鳴角拜天禮畢御帳殿出征台吉大臣等朝見設大宴慶勞奏樂天聰六年定宣捷拜天行禮筵宴樂制時喀爾沁部落古魯思轄布查薩衮杜稜具筵進獻陳設樂舞適和碩鄭親王濟爾哈朗等奏報錦州䝉古貝勒諾木齊吳巴什等歸降上大悦命八門擊鼔召衆於崇正殿宣捷翌日上至演武亭率諸王貝勒羣臣行拜天禮畢陞御座諾木齊吳巴什等率部衆朝見行禮畢設樂舞大宴令諾木齊等較射又令侍衞大臣等較射選力士為角觝之戲八年定出師謁堂子拜天行禮樂制時出師征明上率大貝勒代善左翼超品公楊古利䕶軍統領等出盛京撫近門謁堂子列八纛鳴角奏樂行拜天禮畢大軍西行定元旦朝賀樂制是日陳設鹵簿奏樂九年停止元旦雜劇梅勒章京張存仁奏言元旦朝賀大體所闗雜劇戲謔不宜陳於殿陛臣亦知皇上未嘗好此不過因䝉古所無者聊與觀之何不於歳前二三日設宴迊春而佐以各項雜劇以示慈惠之意至元旦之辰百官慶賀既畢仍應照舊例八旗設宴止用雅樂使君臣共樂太平従之十年定上尊號改元建國號行禮慶賀筵宴樂制諸貝勒大臣文武羣臣進表恭加上尊號曰寛溫仁聖皇帝陳設鹵簿奏樂拜天行受寶禮建國號曰大清改元崇徳羣臣行慶賀禮筵宴備陳樂舞崇徳元年定致祭太廟樂制時肇建太廟追尊列祖凡四孟時享歳暮祫祭並奏樂定鹵簿樂器内院官奏請定御前儀仗内樂器上命酌量裁減尋議准鑼二鼓二畫角四簫二笙二架鼓四横笛二龍頭横笛二檀板二大鼓二小銅鈸四小銅鑼二大銅鑼四雲鑼二嗩呐四樂人緑衣黄褂紅帶六瓣紅絨帽銅頂上插黄翎定命將出師謁堂子拜天行禮樂制時命和碩睿親王多爾衮和碩豫親王多鐸等帥師征明上率諸王貝勒大臣出撫近門謁堂子吹螺鳴角奏樂行拜天禮畢聲礟啟行定冬至萬夀聖節朝賀樂制與元旦同定元旦上元穿朝服作樂之制元旦前三日起至第九日止上元十四日起至十六日止俱作樂各官皆朝服定册封公主行禮用樂定諸王家廟致祭用樂凡宗室封王者立於廟歳時祭祀用樂二年定受降用樂之制時臣服朝鮮國王李倧率羣臣獻明國所給勅印自南漢山城来朝上出宫旗纛森列奏樂渡漢江登壇李倧率羣臣伏地請罪臣等謹按國初之制命將出師有祭纛拜天之樂凱旋慶賀有郊勞宴筵之樂宣捷受降有鹵簿鼓吹之樂凡所以肅軍威而作士氣者聲容美盛創制宏深非僅如前古鐃吹鼓角之制已也自後列聖相承平定中原親征朔漢西師克㨗青海歸誠我皇上御極以来臣服金川蕩平西域天威震叠聖武光昭駿烈崇勲焜燿史册者不可勝紀皆以欽承祖制潤色鴻庥葢開國之規模即有以定萬年之法制者矣謹録征蒙古平朝鮮行軍奏凱諸樂制而凡後此之陳師獻馘相因用樂者胥視此焉順治元年定郊廟社稷樂章名用平字大學士馮銓等奏言郊廟及社稷樂章前代各取嘉名以昭一代之制本朝削平冦亂以有天下擬改用平字郊社九奏宗廟六奏社稷七奏従之十月朔世祖章皇帝駕至京師行受寶禮用樂時定鼎燕京禮部奏准聖駕至京禮儀先期令錦衣衞設鹵簿儀仗旗手衞設金鼔旗幟教坊司設大樂俱於行殿西候駕至前導是日上至京師祇告天地御寳座陳設鹵簿用大樂臣等謹按教坊司名目仍前明之舊至雍正七年始改教坊司為和聲署詳俗部樂門定慶賀暨筵宴樂制時羣臣行慶賀禮筵宴鹵簿大駕陳設於午門外奏中和樂定頒詔樂制時欽頒恩詔於天下上御皇極門陳設鹵簿大駕奏樂定圜丘大祀樂制皇帝出宫午門鳴鐘不作樂致祭燔柴迊神樂奏始平之章奠玉帛樂奏景平之章進俎樂奏咸平之章初獻樂奏夀平之章亞獻樂奏嘉平之章終獻樂奏雍平之章徹饌樂熙平之章送神樂奏太平之章望燎樂奏安平之章禮畢教坊司導迊樂奏祐平之章午門鳴鐘皇帝還宫定方澤大祀樂制皇帝出宫午門鳴鐘不作樂致祭瘞毛血迊神樂奏中平之章奠玉帛樂奏廣平之章進俎樂奏咸平之章初獻樂奏夀平之章亞獻樂奏安平之章終獻樂奏時平之章徹饌樂奏貞平之章送神望瘞樂奏寧平之章禮畢教坊司𨗳迊樂奏祐平之章午門鳴鐘皇帝還宫定祈穀壇樂制皇帝出宫午門鳴鐘不作樂燔柴迊神樂奏中平之章奠玉帛樂奏肅平之章進俎樂奏咸平之章初獻樂奏夀平之章亞獻樂奏景平之章終獻樂奏永平之章徹饌樂奏凝平之章送神樂奏清平之章望燎樂奏太平之章禮畢教坊司𨗳迊樂奏祐平之章午門鳴鐘皇帝還宫臣等謹按是年定大祀樂制嗣後恭奉列聖配享兩郊暨祈穀壇致祭用樂之制並同定太廟時享樂制皇帝出宫午門不鳴鐘不作樂致祭迊神樂奏開平之章奠帛初獻樂奏壽平之章亞獻樂奏嘉平之章終獻樂奏雍平之章徹饌樂奏熙平之章送神還宫樂奏成平之章望燎樂同禮畢教坊司𨗳迊樂奏禧平之章午門鳴鐘皇帝還宫臣等謹按是年定時享樂凡恭遇追尊列祖加上尊諡升祔太廟致祭用樂之制並同定社稷壇樂制皇帝出宫午門鳴鐘不作樂致祭瘞毛血迊神樂奏廣平之章奠玉帛初獻樂奏夀平之章亞獻樂奏嘉平之章終獻樂奏雍平之章徹饌樂奏熙平之章送神望瘞樂奏成平之章禮畢教坊司導迊樂奏祐平之章午門鳴鐘皇帝還宫定太歳壇樂制迊神樂奏保平之章奠帛初獻樂奏安平之章亞獻樂奏中平之章終獻樂奏肅平之章徹饌樂奏雍平之章送神望燎樂奏寧平之章定祭先醫廟闗帝廟俱教坊司作樂定朝㑹宴享中和丹陛導迊各樂之制凡三大節及常朝皇帝陞殿還宫俱奏中和韶樂羣臣行禮奏丹陛大樂親祭壇廟乗輿出入用導迊樂樂章均用平字宴享清樂以樂詞之首句為章名定進慶賀表箋樂制禮部備表亭香亭教坊司作樂導引定隨鑾細樂之制用太監十八名皇帝祭祀行幸内傳承應定部宴鄉宴俱教坊司作樂定迊春樂制每歳直省府州縣官豫造芒神土牛於東郊立春日各官朝服迊春設酒果致祭行禮畢舁芒神土牛香亭鼔樂前導各官隨後至署陳於堂前各官執綵杖環立擊牛三樂工撃鼓二年定厯代帝王廟樂制迊神樂奏雍平之章奠帛初獻樂奏安平之章亞獻樂奏中平之章終獻樂奏肅平之章徹饌樂奏凝平之章送神望燎樂奏夀平之章臣等謹按厯代帝王廟定制遣官致祭嗣於順治十二年禮部奏准如遇特行崇祀之典親祭行禮照例陳設鹵簿用導迊樂定文廟樂制迊神樂奏咸平之章奠帛初獻樂奏寧平之章亞獻樂奏安平之章終獻樂奏景平之章徹饌樂奏咸平之章送神望燎樂奏咸平之章八年重定頒詔樂制時上親政頒詔天下禮臣奏定禮儀是日鹵簿大駕全設御太和殿午門鳴鐘鳴鞭奏樂詔書設龍亭内校尉舁亭御仗前列導迊樂作至天安門外橋南奉詔書設髙臺黄案上衆官跪聴宣制行禮畢仍奉詔書設龍亭内作樂前導至禮部謄黄頒行天下臣等謹按嗣後恭遇大慶典欽頒恩詔均照是年定制用樂定樂舞樂章樂器之數禮部請定享廟禮樂言大樂向作於門上今應作於廟内文武二舞俱應全備樂章俱應全歌樂器俱應全用樂舞生向定五百七十名今缺一百三十六名應請補足従之定朝日壇樂制迊神樂奏寅曦之章奠玉帛樂奏朝曦之章初獻樂奏清曦之章亞獻樂奏咸曦之章終獻樂奏純曦之章徹饌樂奏延曦之章送神望燎樂奏歸曦之章定夕月壇樂制迊神樂奏迊光之章奠玉帛初獻樂奏升光之章亞獻樂奏瑶光之章終獻樂奏瑞光之章徹饌樂奏涵光之章送神望燎樂奏保光之章臣等謹按兩壇祀典如遇親祭並照例陳設鹵簿導迊大樂定祭真武廟東嶽廟城隍廟均教坊司作樂定皇太后三大節慶賀樂制是日皇太后宫儀仗全設皇太后陞座皇上行禮皇后暨公主和碩福金以下行禮皇太后還宫俱用丹陛大樂定皇后三大節慶賀樂制是日皇后陞座公主和碩福金以下行禮皇后還宫俱用丹陛大樂定大㛰行禮樂制是日鹵簿大駕樂懸全設上御太和殿陞座奏樂内院官奉册寶授使臣設綵亭内鑾儀校舁亭御仗前列作樂至皇后邸皇后禮服同后父母迊接行禮畢皇后陞輿册寶綵亭前列儀駕鼓樂導引至協和門儀駕鼓樂止女官奉册寶前引皇后輿至太和殿降輿入宫上詣皇太后宫行禮畢御太和殿午門鳴鐘鼔奏樂賜后父親屬及王公百官燕畢上還宫皇后率后母朝皇太后行禮畢皇后還宫皇太后賜后母燕畢禮成上御太和殿王公百官行慶賀禮奏樂臣等謹按康熙十一年恭遇大㛰盛典照是年定制用樂定恭上徽號行禮樂制時以大㛰禮成恭上皇太后徽號上詣皇太后宫行禮奏樂臣等謹按嗣後遇大慶典恭加上太皇太后皇太后徽號皇帝御殿閲册寶進册寶行禮均照定制用樂定廵幸樂制鹵簿樂器照常陳設定謝恩見朝樂制禮部奏准凡授官出師凱旋受賞遇慶賀頒賞及貢使見朝是日御殿陳設鹵簿鳴鐘鼔奏樂九年定常朝樂制是日陳設鹵簿午門鳴鐘鼓陞殿中和韶樂奏隆平之章王公百官行禮丹陛大樂奏慶平之章外藩行禮丹陛大樂奏治平之章還宫中和韶樂奏顯平之章定尊封太妃行禮樂制臣等謹按嗣後每逢尊封典禮均照定制用樂定幸學釋奠樂制是日駕出宫鹵簿大樂前導至櫺星門降輦詣先師廟行釋奠禮迊神樂奏咸平之章奠獻樂奏寧平之章送神樂奏咸平之章禮畢幸彞倫堂講書賜茶畢駕還宫鹵簿大樂前導次日衍聖公等恭進謝表御殿奏樂臣等謹按我朝重道崇儒尊禮先師孔子首定廟諡繼備宫懸恩禮之隆有加靡已兹復臨幸太學躬親奠獻展羮牆之景慕極禮數之優崇法制照垂度越前古嗣後恭遇臨雍釋奠行禮用樂之制並同十年定教坊司樂人服色之制禮部奏准教坊司樂人服色中和樂用紅補服丹陛樂用紅百花袍十一年定祭先農壇行耕耤禮暨筵宴樂制前期順天府官進耒耜及穜稑種上御太和殿閲畢順天府官捧出午門外安於綵亭作樂送至耕耤所至日駕出宫午門鳴鐘不作樂駕至壇致祭先農瘞毛血迊神樂奏永豐之章奠帛初獻樂奏時豐之章亞獻樂奏咸豐之章終獻樂奏大豐之章徹饌樂奏屢豐之章送神樂奏報豐之章望療樂奏慶豐之章祭畢駕至耕耤所行耕耤禮教坊司作樂承應耕耤禮成御齋宫導迊大樂奏天下樂陞座大樂奏萬歳樂羣臣行禮丹陛大樂奏朝天子筵宴進酒大樂奏三月韶光進饌清樂奏太清歌宴畢鹵簿導迊樂作駕還宫定直省迊接詔書樂制恭遇詔書至地方官員具龍亭儀仗鼓樂出郭迊接至展讀畢行禮時仍奏樂定册立中宫行禮樂制臣等謹按嗣後恭遇册立大典均照定制行禮用樂定建造修造告祭門神司土司工等俱教坊司作樂十三年定册立皇貴妃行禮樂制臣等謹按嗣後舉行册立皇貴妃貴妃妃嬪典禮均照定制用樂十四年定奉先殿樂制禮部奏准迊神樂奏開平之章初獻樂奏夀平之章亞獻樂奏嘉平之章終獻樂奏雍平之章徹饌樂奏熙平之章送神還宫樂奏成平之章以後親祭俱行家人常禮其太常寺贊禮官樂舞生俱不用應令内府官贊禮作樂立春上元四月初八端陽重陽係尋常節忌辰清明霜降十月朔係哀慕日期俱不贊禮不作樂飭部修整祭祀樂器諭禮部祭祀樂器必考辨精良始足肅將誠悃朕觀近來各壇廟所用樂器其中尚有敝壞非朕祗事天地宗廟社稷及致敬古帝王聖賢之意爾部即詳加察驗應行修整者節次開列奏請以便内府修理換給十五年飭典樂官演習樂舞聲容儀節諭禮部祭祀大典必執事人員通曉嫻熟始克肅將誠敬近見太常寺樂舞生聲容儀節多有未諳皆該衙門平日教演不精以致如此爾部即遵諭嚴行申飭是月辛亥上親行祈穀禮畢還宫復謂大學士等曰各處祭祀太常寺所奏樂俱未和諧樂乃祭祀之大典必聲容儀節盡合歌章始臻美善其召太常寺官嚴飭之此後須責令勤加肄習毋致違忽定䇿士樂制殿試日鹵簿大駕樂器全設御太和殿鳴鐘鼔奏樂讀卷後一日設鹵簿大駕御殿奏樂傳臚後五日狀元率諸進士上表謝恩仍設鹵簿大駕御殿奏樂定㑹試部宴樂制文武會試有上馬宴進士傳臚後有恩榮宴各於禮部兵部衙門陳設教坊司鼓樂承應定鄉試宴樂制文武鄉試開榜後有鹿鳴鷹揚等宴俱教坊司鼔樂承應十六年定太廟祫祭樂制迊神樂奏貞平之章奠帛初獻樂奏夀平之章亞獻樂奏嘉平之章終獻樂奏雍平之章徹饌樂奏熙平之章送神還宫樂奏清平之章十七年飭太常寺精熟樂歌音韻諭禮部祭祀樂歌所以歆格神明理宜䖍恪今太常寺奏樂人員平日怠於肄習以致樂章音韻多不中節該寺各官演習不勤殊為疎玩爾部即嚴加申飭以後務演習精熟聲調協和以副朕誠敬祭典之意定大享殿合祀樂制燔柴瘞毛血迊神樂奏元和之章奠玉帛樂奏景和之章進俎樂奏肅和之章初獻樂奏夀和之章亞獻樂奏安和之章終獻樂奏永和之章徹饌樂奏協和之章送神樂奏泰和之章望燎瘞樂奏清和之章臣等謹按合祀之禮嗣後未經復行是以樂章尚用和字至乾隆十六年改大享殿為祈年殿每歳行祈穀禮改用樂章見前康熙二年換造樂器時禮臣奏請換造中和丹陛等樂器従之定祭火神廟教坊司作樂七年定太皇太后皇太后三大節筵宴樂制是日陞座還宫進筵俱用丹陛大樂八年定三大節朝賀樂章元旦皇帝陞座中和韶樂奏遂平之章還宫中和韶樂奏和平之章冬至皇帝陞座中和韶樂奏遂平之章還宫中和韶樂奏允平之章萬夀聖節陞座中和韶樂奏乾平之章還宫中和韶樂奏太平之章羣臣行禮丹陛大樂俱奏慶平之章外藩行禮丹陛大樂俱奏治平之章定太皇太后三大節朝賀樂章是日太皇太后陞座中和韶樂奏升平之章還宫中和韶樂奏恒平之章行禮丹陛大樂奏晉平之章定皇太后三大節朝賀樂章是日皇太后陞座樂奏豫平之章還宫樂奏履平之章行禮樂奏益平之章俱用丹陛大樂定皇后三大節朝賀樂章是日皇后陞座樂奏淑平之章還宫樂奏順平之章行禮樂奏正平之章俱用丹陛大樂臣等謹按三大節朝會樂章俱訂定於是年惟皇后千秋令節樂章則奏准於康熙十一年也十年定幸盛京樂制時恭謁祖陵幸盛京御清寧宫陳設鹵簿奏樂定恭進玉牒樂制是日鹵簿大駕全設宗人府官奉玉牒設綵亭内校尉舁行黄葢御仗前列教坊司作樂導引由大清門進皇帝御中和殿閲畢御太和殿鳴鐘鼔奏樂總裁等官行禮畢皇帝還宫樂止總裁官奉玉牒設綵亭内御仗鼓樂前導送皇史宬尊蔵臣等謹按嗣後纂修玉牒其告成恭進樂儀均照是年定制十一年飭典樂官練習音樂諭太常寺祀典闗係重大理宜敬慎嫻習近見爾衙門典禮俱未諳練又所奏音樂多未合節殊非慎重禋祀之義以後著勤加練習勿仍前怠忽䙝越祀典定恭進實録樂制是日鹵簿大駕鼓樂全設皇帝御太和殿鳴鐘鼓奏中和韶樂進實録時奏丹陛大樂次日羣臣行慶賀禮御殿奏樂臣等謹按是時恭纂世祖章皇帝寶録先成擇吉恭進嗣後纂輯列祖實録告成恭進用樂之制並同十二年幸南苑大閲鳴金鼔用樂裁減祭祀執事樂舞人數諭禮部太常寺壇廟禋祀理宜䖍肅今觀祭祀執事之人過多殊為煩雜應酌量裁減務令肅清尋禮部太常寺議覆凡祭祀執事之人及樂舞生均酌量裁減禁迊春大張鼓樂禮部議准直省府州縣迊春止用鼓吹綵亭其裝潢故事臺閣排列金珠張鼓樂樹旗幟並科派提取車馬優伶等項嚴行禁止定册封諸王樂制是日王府陳設儀衞樂器正副使自太和殿持節鑾儀校舁册寶綵亭鼓樂前導王率本府屬官跪迊受册寶行禮作樂正副使持節復命王率屬官跪送作樂十四年定謝恩見朝樂章禮部奏准王公羣臣謝恩見朝行禮丹陛大樂奏慶平之章外藩謝恩見朝行禮丹陛大樂奏治平之章其詞與三大節丹陛樂同定日月食救䕶樂制救䕶日食在禮部衙門月食在太常寺衙門教坊司設鼔樂於露臺下日月初食至復圓救䕶各官俱朝服上香行禮鳴鼓作樂定册立東宫行禮陳設鹵簿奏樂十八年定祭窑迊吻樂制時改建奉先殿遣官祭琉璃窑之神教坊司作樂迊吻用金花紅縀御仗鼔樂前導二十一年釐正朝會宴享樂章先是左副都御史余國柱奏請釐正郊廟朝會宴享樂章上曰享祀樂章一代制作所係禮部翰林院集議以聞至是禮臣等議奏自古廟樂原以頌述祖功宗徳本朝郊壇廟祀樂章曲名曰平現今遵奉已久太祖太宗世祖同在太廟致祭不便分廟另撰宜如舊惟朝會宴享等樂曲調風雅未備宜勅下所司酌古凖今求聲律之原定雅奏之節進呈請定嘉名以昭盛典従之二十三年定致祭闕里文廟樂制時上東廵親詣闕里致祭先師孔子是日上御輦陳設鹵簿樂器至大成門降輦入殿行釋奠禮畢陞輦還行宫鹵簿𨗳迊大樂作致祭時所用樂章樂舞生先期令太常寺委司樂官前徃指示肄習與太學文廟同并將太學樂舞生袍服擕徃搆用二十六年定恭送御書至闕里樂制禮部奏准御書聖廟碑文遣官齎送闕里設黄盖御仗鼓樂迊送二十九年會閲用樂時以額爾喀新附數十萬衆必訓以法度俾知禮儀特行㑹閲禮奏樂三十四年定大閲鳴角擊鼓鳴金之制臣等謹按大閲會閲之禮舊制並用鼓樂兹復定金鼓之節嗣後凡遇舉行大典均照是年用樂定制四十九年正月皇太后七十萬夀上親行起舞進爵用樂先是諭禮部蟒式舞者乃滿洲筵宴大禮至隆重歡慶之盛典向來皆諸王大臣行之今歳皇太后七旬大慶朕亦五十有七𣣔親舞稱觴是日於皇太后宫進宴奏樂上近前進爵起舞臣等謹按順治初年定三大節朝賀筵宴樂制嗣後慶賀聖節均照定制行禮用樂是年恭遇孝惠章皇后七旬大慶我聖祖仁皇帝大孝純仁尊飬承歡盡誠竭敬宫庭慶溢合萬國之歡心典禮尊隆展一人之孺慕雖古虞舜之盛徳至孝無以加諸迨後乾隆二十六年十一月恭逢皇太后七十萬夀皇上侍宴慈寧宫捧觴上夀親行起舞復命和親王果親王皇子皇孫額駙等以次進舞慈顔悦豫聖孝光昭洵乎先聖後聖其揆一也謹特誌起舞稱觴用樂之制仰見天家慶典繼繼承承實千古未有之盛事云五十二年詔修輯律吕數理諸書并考定壇廟宫殿樂器五十三年考訂中和樂章聲調諭南書房翰林等向来陞殿所奏中和樂章皆仍眀代所撰句有長短體制類詞後因文體不雅命大學士陳廷敬等改撰其章法皆以四字為句而奏樂人未習聲調仍以長短句法凑合歌之是雖文法易而聲調未易也今考察舊調已得其宫商節奏甚為和平必得歌章字句亦隨詞調則章法眀而宫商諧此事所闗最要著南書房翰林同大學士等詳考定議務使章法與聲調協和歸於允當定律吕書名和碩誠親王允祉等以御製律吕正義進呈得㫖律吕厯法算法三書著共為一部名曰律厯淵源五十四年十一月冬至躬祀圜丘用新定樂律臣等謹按是時考正律吕審定元音凡樂制樂器樂歌皆經親定宫商悉協制度得中以是月南郊大祀為始嗣後各祭祀朝會典禮並用欽定雅樂五十五年頒中和韶樂於直省文廟禮部奏准欽定樂章皆平字之義各州縣文廟未經頒發仍用和字著通行直省儒學春秋丁祭一體遵行雍正元年定直省祭器樂器圖式禮部遵㫖議定直省各州縣祭祀壇廟一應祭器樂器逐一繪圖著為成式釐為定數刋刻頒示遵行定祭時應宫教坊司作樂定官民婚嫁樂制凡有品級官員各用伊執事鼓樂人不得過十二名生監軍民不得僭用執事鼓樂人不得過八名二年定耕耤禾詞是日教坊司領樂官四員鑼鼔板樂工六名歌禾詞樂工十二名綵旗樂工五十名於耕耤所排列祭先農畢行耕耤禮樂工鳴鑼鼔歌三十六禾詞拈颭綵旗唱和隨行禮畢樂止重定耕耤筵宴樂制進筵丹陛樂奏雨暘時若之章進酒管絃樂奏五穀豐登之章進饌清樂奏家給人足之章皇帝陞座還宫俱奏𨗳迊樂羣臣行禮奏丹陛樂定祭風伯廟教坊司作樂令闕里樂工赴太常寺演習禮部奏准文廟樂舞奉聖祖仁皇帝頒賜中和韶樂今闕里所奏音節未合由無指授所致令闕里選工赴太常寺演習純熟轉相傳授至樂舞生亦令擇人充用毋致參差不齊其衣服等項均照國學定式畫一製備七年定祭雷師雲師和聲署作樂十二年遴選各省樂舞生禮部奏准通行各省將現在樂舞生詳加考驗擇其寔係本籍俊秀子弟通曉音律嫻習禮儀者仍行存留如有冒濫悉行斥退皇朝文獻通考卷一百五十五
