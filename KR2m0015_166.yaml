body:
  text: 樂考十二樂器六竹之屬排簫律吕正義曰排簫之制其來最古律吕十二管備具其中金石八音由此而定所以簫韶九成而以簫為主也上古排簫之制寖失其傳者蓋因近代不用律吕損益倍半之法故排簫别為一器而與律吕不相交涉惟朝賀郊祀大樂中用之不過較工尺以備器數耳其制則十六管為一具長者張兩旁參差漸短若羽翼然其用單吹無旁出孔其管之最長者得今尺九寸五六分上下其次八寸四五分上下遞至最短則四寸餘十六管之徑亦微不同樂工相傳謂最長第一管為合字依次漸髙此時用排簫之大略也夫古人制禮作樂極其精微斷制裁成咸有深意况排簫為諸管樂之首彚聲音清濁之大成豈可不以律吕定其準則耶論排簫之制大之亦可小之亦可大之則用黃鍾倍積或二倍或三倍或四倍各具本體所生之十二律吕小之則用黃鍾半積或幾分之幾亦各具本體所生之十二律吕但同其徑加二倍律二倍吕共成一十有六則皆可以取音而備用然推原古制必用十二律吕之正加以二倍律二倍吕始為適中也今以十二律吕正聲排簫之制言之陽律陰吕平分二翼左則用黃鍾之律為濁均之宫以太蔟姑洗蕤賔夷則無射為濁宫之商角變徴徴羽右則用大吕之吕為清均之宫以夾鍾仲吕林鍾南吕應鍾為清宫之商角變徴徴羽其變宫若用黃鍾大吕之半則音太髙而諸樂難和故取二變宫於二正宫之前以倍無射為黃鍾宫之變宫以倍應鍾為大吕宫之變宫又取二下羽於二變宫之前以倍夷則為黃鍾宫之下羽以倍南吕為大吕宫之下羽此所以備旋宫轉調之用而為諸樂之綱領也夫夷則南吕無射應鍾實本均徴羽之聲但倍之而用於宫聲之前則為變宫下羽正古人宫逐羽音之義也以黃鍾宫之半應變宫之理推之正夷則乃倍夷則之半正夷則為黃鍾宫之徴而倍夷則為黃鍾宫之下羽則是下羽之半變而為正徴矣正無射乃倍無射之半正無射為黃鍾宫之羽而倍無射為黃鍾宫之變宫則變宫之半亦變而為正羽矣此即正黃鍾宫之半變而為變宫之理也同徑之十六管分陰陽二均徑各二分七釐四毫二絲其左以黃鍾之律宫聲工字立低音均之主為第三管長七寸二分九釐而以倍夷則之律下羽低上字為第一管長九寸一分零二毫以倍無射之律變宫低尺字為第二管長八寸零九釐以太蔟之律商聲低凡字為第四管長六寸四分八釐以姑洗之律角聲低六字為第五管長五寸七分六釐以蕤賔之律變徴低五字為第六管長五寸一分二釐以正夷則之律徴聲低乙字為第七管長四寸五分五釐一毫以正無射之律羽聲低上字為第八管長四寸零四釐五毫此左翼之八管也其右以大吕之吕清宫髙工字立髙音均之主為第三管長六寸八分二釐六毫而以倍南吕之吕下羽髙上字為第一管長八寸六分四釐以倍應鍾之吕變宫髙尺字為第二管長七寸六分八釐以夾鍾之吕清商髙凡字為第四管長六寸零六釐八毫以仲吕之吕清角髙六字為第五管長五寸三分九釐三毫以林鍾之吕清變徴髙五字為第六管長四寸八分六釐以正南吕之吕清徴髙乙字為第七管長四寸二分二釐以正應鍾之吕清羽髙上字為第八管長三寸八分四釐此右翼之八管也觀此二均聲字具備宫調遞遷正變互易旋轉用之無所不可然黃鍾大吕自統一均陽律陰吕各從其類所謂陰陽分用而不相紊者此也律吕正義後編曰排簫陽均吹左八管隂均吹右八管管皆用竹其架用木形如几兩肩濶一尺一寸六分一釐兩足濶一尺一寸三分三釐五毫肩至足九寸四分七釐七毫厚一寸零九釐三毫虛其中以受十六管口濶六寸九分九釐八毫下肩八分一釐管出口上一寸九分六釐八毫架下如兩翼中髙而兩邊俱下中至口三寸八分四釐兩邊至口七寸二分九釐通體漆繪金龍垂五綵流蘇為飾雅樂之簫蔡雍及三禮圖皆主二十四管十六管隋宋元志及明㑹典又皆止十六管然則今之排簫蓋古簫之小者歟十六管備陰陽二均足旋宫之用與編鍾編磬相應然用十二正律四半律者其聲失之過髙而用十二倍律四正律者其聲又失之過低今用十二正律四倍律則其聲得中允為善制若夫簫之有架所以成器古人編竹為之則用木為架而膠漆之不失為慎重自宋以來相沿已久其制可從以為陋者過也精義簫圖自黃鍾大吕以次漸短狀如單翅又曰長管當在左手夫翼必有兩古人所為象鳯翼與簫字篆文之象形者是也陽律八管在左翼而執之實右手陰吕八管在右翼而執之實左手執簫者靣向外自其靣視之則右手乃所謂左左手乃所謂右也至於簫管之體質當以用竹為是陳暘參用玊姑備一說耳若簫管之長短則當各用本律若長過於律者則其徑亦必過於律所為倍積同形管是也其或同長或有底者則必依律開竅以出音如笙簫笛管是也前人諸說但言管長未及管徑不知其徑而徒較其短長辨論雖多而其實終不可得前編云論排簫之制大之亦可小之亦可然推原古制必用十二律吕之正加以二倍律二倍吕始為適中黃鍾大吕自統一均陽律陰吕各從其類宫調遞遷正變互易旋轉用之無所不可誠萬世之通論或增而大或減而小無不可因是類推也古今聚訟由兹定矣簫律吕正義曰簫笛竹音尤當以律吕為本黃鍾元聲之積加分減分比例所生同形諸管既得聲應十二律吕之正矣其餘律吕之加分減分仍得應於本律本吕之聲者惟八倍與八分之一也八倍黃鍾之管三分損益所生同徑之十二管仍為各律各吕之八倍審其音亦與十二律吕相協即十二律吕之同形大體管也若以此八倍黃鍾為全分之長從下至上按本管十二律吕之分各開一孔乃與律吕本音不甚相協按清濁二均開孔其聲亦不相應蓋以一管按分開孔氣自一孔旁出難同通管直出之音故取分難同而生聲之理則異也若取黃鍾元聲加分所生同形諸管以其陽律陰吕各自所得度分相併折中而設諸孔始得協音韻之正而備聲字之用焉今制簫以八倍黃鍾之積為準則以八倍黃鍾之徑為徑其本體黃鍾大吕相和之分立出音孔上第一孔之位聲應黃鍾之律宫聲工字其通長得夷則南吕相和倍之之分聲應倍夷則之律羽聲上字因其本體黃鍾大吕相和之分聲應黃鍾之宫因名之曰黃鍾簫以四倍黃鍾之積為準則以四倍黃鍾之徑為徑其本體黃鍾大吕相和之分立出音孔上第三孔之位聲應姑洗之律角聲六字其通長得姑洗仲吕相和倍之之分亦應倍夷則之律羽聲上字因其本體黃鍾大吕相和之分聲應姑洗之角律因名之曰姑洗簫黃鍾簫姑洗簫皆應陽律一均之聲而姑洗簫音韻清和於新定排簫之黃鍾一均尤為相協蓋古長笛皆用角律今用四倍黃鍾之體正所以用姑洗角律之音四倍黃鍾大吕相和之分立於角位而生簫徑實為一管之主其通長為四倍姑洗仲吕之倍即八倍角律角吕相和以成者故四倍宫積之音又成八倍角律之體也夫八倍黃鍾之管得聲應黃鍾之律四倍黃鍾之管得聲應姑洗之律其制為簫也用本體陽律之分和以陰吕皆得應黃鍾一均之聲則七倍黃鍾之管得聲應大吕之吕三倍半黃鍾之管得聲應仲吕之吕者以之為簫而用其本體陽律之分和以陰吕其得聲應大吕之一均有必然已以七倍三倍半黃鍾之積立一簫之準其定分取音用正用倍一如八倍四倍之法則排簫之陰吕一均得相和而為用矣夫用七倍黃鍾之積即如用八倍大吕之積其本體黃鍾大吕相和之分得應大吕之吕故名之曰大吕簫用三倍半黃鍾之積即如用四倍大吕之積其本體黃鍾大吕相和之分得應仲吕之吕而通長又為八倍角吕之體故名之曰仲吕簫要之竹音之樂必以黃鍾實積為主大者八之小者四之而長短周徑隨焉八之四之即八倍四倍之謂皆指實積而言也若不知倍其實積而徒倍律吕之長則必至於過長而不可用矣明於此義然後以之制體而有本以之取聲而得其全也黃鍾簫用八倍黃鍾之體其徑五分四釐八毫其黃鍾之分一尺四寸五分八釐大吕之分一尺三寸六分五釐三毫太蔟之分一尺二寸九分六釐夾鍾之分一尺二寸一分三釐六毫姑洗之分一尺一寸五分二釐仲吕之分一尺零七分八釐七毫蕤賔之分一尺零二分四釐林鍾之分九寸七分二釐夷則之分九寸一分零二毫南吕之分八寸六分四釐無射之分八寸零九釐應鍾之分七寸六分八釐以黃鍾大吕之分相併折中得一尺四寸一分一釐六毫聲應黃鍾之律宫聲工字而為此簫之出音孔上第一孔焉此孔而上用本體律吕之正此孔而下用本體律吕之倍故無射應鍾之分相併折中倍之得一尺五寸七分七釐聲應倍無射之律變宫尺字而為此簫之出音孔焉以夷則南吕之分相併折中倍之得一尺七寸七分四釐二毫聲應倍夷則之律下羽上字而為此簫之通長焉以太蔟夾鍾之分相併折中得一尺二寸五分四釐八毫聲應太蔟之律商聲凡字而為此簫之第二孔焉以姑洗仲吕之分相併折中得一尺一寸一分五釐三毫聲應姑洗之律角聲六字而為此簫之第三孔焉以蕤賔林鍾之分相併折中得九寸九分八釐聲應蕤賔之律變徴五字而為此簫之第四孔焉此四孔以下皆得本管律吕位分之正自此以上夷則南吕相和之分為簫體通長之半比通長宜下一音而應徴聲乙字無射應鍾相和之分為出音孔之半比出音孔宜下一音而應羽聲上字半黃鍾半大吕相和之分第一孔之半比第一孔宜下一音而應變宫尺字但因簫笛皆不設上字孔而取乙字孔於乙字分上字分之間故夷則南吕相和之分與無射應鍾相和之分皆虛其位以為伏孔而别取半黃鍾半大吕相和之分與蕤賔林鍾相和之分相併折中得八寸五分一釐九毫聲應夷則之律徴聲乙字乃為此簫之第五孔焉其次則半黃鍾半大吕相和之分七寸零五釐八毫為第一工字孔之半聲應半黃鍾之律變宫尺字此正黃鍾下一音與出音孔相應同聲其孔居最上後出而為此簫之第六孔焉至此則簫之七孔已備七孔者兼出音孔而言也至於取羽聲上字以後出尺字孔併第三六字孔而得聲應倍夷則之律為低上字者蓋以六字孔為姑洗仲吕相和之分後出孔為半黃鍾半大吕相和之分相併得一尺八寸二分一釐一毫適合本管倍夷則低上字之分也以第一工字孔第二凡字孔代髙工髙凡而合以第五乙字孔得聲應無射之律為髙上字者蓋以工字孔為黃鍾大吕相和之分凡字孔為太蔟夾鍾相和之分今取髙工字則應於半太蔟半夾鍾相和之分取髙凡字則應於半姑洗半仲吕相和之分以此二數相併折中得五寸九分二釐五毫復與乙字分相併折中得七寸二分二釐二毫適合本管半黃鍾之度在後出孔髙尺字之下而為髙上字之分也此簫聲應陽律一均其理最為明顯故特備其制以見凡簫之體必推本於此而後明焉姑洗簫用四倍黃鍾之體其徑四分三釐五毫其黃鍾之分一尺一寸五分七釐二毫大吕之分一尺零八分三釐六毫太蔟之分一尺零二分八釐六毫夾鍾之分九寸六分三釐二毫姑洗之分九寸一分四釐三毫仲吕之分八寸五分六釐二毫蕤賔之分八寸一分二釐七釐林鍾之分七寸七分一釐四毫夷則之分七寸二分二釐四毫南吕之分六寸八分五釐七毫無射之分六寸四分二釐一毫應鍾之分六寸零九釐五毫以黃鍾大吕之分相併折中得一尺一寸二分零四毫聲應姑洗之律角聲六字而為此簫之出音孔上第三孔焉此孔雖非宫聲之位然為四倍黃鍾所生是故其餘諸孔皆以此度為準自此孔而上皆四倍律吕之正分自此孔而下乃四倍律吕之倍分故自倍分計之則以姑洗仲吕之分相併折中倍之得一尺七寸七分零五毫聲應倍夷則之律下羽上字而為此簫之通長焉以蕤賔林鍾之分相併折中倍之得一尺五寸八分四釐二毫聲應倍無射之律變宫尺字而為此簫之出音孔焉以夷則南吕之分相併折中倍之得一尺四寸零八釐一毫聲應黃鍾之律宫聲工字而為此簫之出音孔上第一孔焉以無射應鍾之分相併折中倍之得一尺二寸五分一釐七毫聲應太蔟之律商聲凡字而為此簫之第二孔焉其太蔟夾鍾之分相併折中得九寸九分五釐九毫聲應蕤賔之律變徴五字而為此簫之第四孔焉其第五孔乙字之分亦應取於乙字分上字分之間故此管之姑洗仲吕相和之分蕤賔林鍾相和之分皆虛其位以為伏孔乃取夷則南吕相和之分與太蔟夾鍾相和之分相併折中得八寸五分正應夷則之律徴聲乙字而為此簫之第五孔焉其次則夷則南吕相和之分七寸零四釐為第一孔宫聲工字之半聲應半黃鍾之律變宫尺字與出音孔相應同聲居最上後出而為此簫之第六孔焉其取下羽低上字以後出尺字孔併第三六字孔者蓋以黃鍾大吕相和之六字孔分併以夷則南吕相和之髙尺字孔分為一尺八寸二分四釐五毫適合本管倍姑洗低上字之分也其取羽聲髙上字借工字凡字以代髙工髙凡而合以乙字者蓋以髙工字應無射應鍾相和之分髙凡字應半黃鍾半大吕相和之分二數相併折中為五寸九分三釐復與乙字分相併折中得七寸二分一釐五毫適合本管夷則之分在後出尺字孔之下是為髙上字也此簫配之排簫陽律一均極為協和故𨽻在樂官而郊廟朝廷雅部俗部咸用之也大吕簫用七倍黃鍾之體其徑五分二釐四毫其黃鍾之分一尺三寸九分四釐五毫大吕之分一尺三寸零五釐八毫太蔟之分一尺二寸三分九釐五毫夾鍾之分一尺一寸六分零七毫姑洗之分一尺一寸零一釐八毫仲吕之分一尺零三分一釐八毫蕤賔之分九寸七分九釐四毫林鍾之分九寸二分九釐六毫夷則之分八寸七分零五毫南吕之分八寸二分六釐三毫無射之分七寸七分三釐八毫應鍾之分七寸三分四釐五毫以黃鍾大吕之分相併折中得一尺三寸五分零二毫聲應大吕之吕清宫髙工字而為此簫之出音孔上第一孔焉以無射應鍾之分相併折中倍之得一尺五寸零八釐四毫聲應倍應鍾之吕清變宫髙尺字而為此簫之出音孔焉以夷則南吕之分相併折中倍之得一尺六寸九分六釐九毫聲應倍南吕之吕清下羽髙上字而為此簫之通長焉以太蔟夾鍾之分相併折中得一尺二寸零一毫聲應夾鍾之吕清商髙凡字而為此簫之第二孔焉以姑洗仲吕之分相併折中得一尺零六分六釐八毫聲應仲吕之吕清角髙六字而為此簫之第三孔焉以蕤賔林鍾之分相併折中得九寸五分四釐五毫聲應林鍾之吕清變徴髙五字而為此簫之第四孔焉其乙字孔亦取於乙字分上字分之間故此管之夷則南吕相和之分無射應鍾相和之分皆虛其位以為伏孔而别取半黃鍾半大吕相和之分與蕤賔林鍾相和之分相併折中得八寸一分四釐八毫聲應南吕之吕清徴髙乙字乃為此簫之第五孔焉其次則半黃鍾半大吕相和之分六寸七分五釐一毫為第一工字孔之半聲應半大吕之吕清變宫髙尺字比大吕下一音與出音孔相應同聲其孔居最上後出而為此簫之第六孔焉其取羽聲上字以後出尺字孔併第三六字孔而得聲應倍南吕之吕為低上字者蓋以六字孔為姑洗仲吕相和之分後出尺字孔為半黃鍾半大吕相和之分二數相併得一尺七寸四分一釐九毫適合本管倍夷則之分故為低上字也以第五乙字孔併第一工字孔第二凡字孔而得聲應應鍾之律為髙上字者亦借工字凡字代髙工髙凡而合以乙字也其髙工字則應半太蔟半夾鍾相和之分髙凡字則應半姑洗半仲吕相和之分二數相併折中得五寸六分六釐七毫復與乙字分相併折中得六寸九分零七毫適合本管半黃鍾之分在後出孔髙尺字之下故為髙上字也此簫應陰吕一均而與黃鍾簫之理可以互相發明者也仲吕簫用三倍半黃鍾之體其徑四分一釐六毫其黃鍾之分一尺一寸零六釐八毫大吕之分一尺零三分六釐四毫太蔟之分九寸八分三釐八毫夾鍾之分九寸二分一釐三毫姑洗之分八寸七分四釐五毫仲吕之分八寸一分八釐九毫蕤賔之分七寸七分七釐三毫林鍾之分七寸三分七釐八毫夷則之分六寸九分零九毫南吕之分六寸五分五釐九毫無射之分六寸一分四釐二毫應鍾之分五寸八分三釐以黃鍾大吕之分相併折中得一尺零七分一釐六毫聲應仲吕之吕清角髙六字而為此簫之出音孔上第三孔焉以姑洗仲吕之分相併折中倍之得一尺六寸九分三釐四毫聲應倍南吕之吕清下羽髙上字而為此簫之通長焉以蕤賔林鍾之分相併折中倍之得一尺五寸一分五釐二毫聲應倍應鍾之吕清變宫髙尺字而為此簫之出音孔焉以夷則南吕之分相併折中倍之得一尺三寸四分六釐八毫聲應大吕之吕清宫髙工字而為此簫之出音孔上第一孔焉以無射應鍾之分相併折中倍之得一尺一寸九分七釐二毫聲應夾鍾之吕清商髙凡字而為此簫之第二孔焉其太蔟夾鍾之分相併折中得九寸五分二釐五毫聲應林鍾之吕清變徴髙五字而為此簫之第四孔焉其第五孔乙字之分亦取於乙字分上字分之間故此管之姑洗仲吕相和之分蕤賔林鍾相和之分皆虛其位以為伏孔乃取夷則南吕相和之分與太蔟夾鍾相和之分相併折中得八寸一分二釐九毫正應南吕之吕清徴髙乙字而為此簫之第五孔焉其次則夷則南吕相和之分六寸七分三釐四毫為第一孔宫聲工字之半聲應半大吕之吕清變宫髙尺字與出音孔相應同聲居最上後出而為此簫之第六孔焉其取下羽低上字以後出尺字孔併第三六字孔者蓋以黃鍾大吕相和之六字孔分併以夷則南吕相和之髙尺字孔分為一尺七寸四分五釐適合本管倍姑洗之分為低上字也其取羽聲髙上字借工字凡字以代髙工髙凡而合以乙字者蓋以髙工字應無射應鍾相和之分髙凡字應半黃鍾半大吕相和之分二數相併折中為五寸六分七釐二毫復與乙字分相併折中得六寸九分適合本管夷則之分在後出尺字孔之下是為髙上字也此簫應排簫之陰吕最為協和故與姑洗簫各備一均之用焉律吕正義後編曰姑洗簫用四倍黃鍾管為體其第三孔之位聲應姑洗之律故名姑洗簫仲吕簫用三倍半黃鍾管為體其第三孔之位聲應仲吕之吕故名仲吕簫體用紫竹朱漆繪金龍出音孔垂五綵流蘇為飾臣等謹按簫笛之制古法皆用角律黃鍾者陽律一均之正宫而姑洗其正角也大吕者陰吕一均之清宫而仲吕其清角也前編有黃鍾簫大吕簫者所以發明簫體按分生聲一定之理而𨽻在樂官雅俗並用之器則惟姑洗簫應陽均仲吕簫應陰均蓋以其配排簫之音最為和協而又合乎角律之制也笛律吕正義曰今之橫笛古稱橫吹樂府有鼓角橫吹曲亦名短簫鐃歌夫曰橫吹又曰短簫則非邱仲之長笛可知矣宋李宗諤樂纂云橫笛小箎也有觜者謂之義觜笛今之笛皆橫吹而無義觜是或箎之變制乎其音每髙於簫由於本體之分短於簫也夫欲考笛制必推本於黃鍾方為有據然而舍今時用笛則亦無所取證焉今笛空徑四分上下自吹口至出音孔得一尺少歉自吹口右盡通長則一尺二寸有餘出音孔與通長之間復有兩孔其出音孔之上第一為工字孔第二為凡字孔第三為六字孔第四為五字孔第五為乙字孔第六為髙尺字孔其取上字亦以第三六字孔併第六髙尺字孔為低上字以第一工字孔第二凡字孔併第五乙字孔為髙上字此今笛立體取音之大概也其出音孔為尺字出音孔外兩孔一應髙上字一應低上字而通長為乙字考其體正與四倍黃鍾之管相侔簫之用四倍黃鍾者實用八倍姑洗仲吕角音之義古人所謂長者八之也今橫笛為短簫則所謂短者四之非用四倍姑洗仲吕之角音乎以四倍黃鍾之積為準故以四倍黃鍾之徑為徑其諸孔皆以四倍黃鍾所生律吕之分為本其本體黃鍾大吕之分則為此笛之出音孔外二孔之度得黃鍾之分者聲應姑洗之律得大吕之分者聲應仲吕之吕然此二分雖各設一孔實皆應於角音之分亦即一律一吕相和之理也此笛之體與姑洗簫同得四倍黃鍾之徑故生聲取分得以互相應和為用如簫之工字孔應黃鍾之律為四倍黃鍾管夷則南吕相和倍之之分其聲即與本體無射應鍾相和之分相應而此笛之五字孔即四倍黃鍾管無射應鍾相和之分亦應黃鍾之律故簫之工字孔與笛之五字孔相應也簫之凡字孔為四倍黃鍾管無射應鍾相和倍之之分笛之通長乙字亦四倍黃鍾管無射應鍾相和倍之之分故簫之凡字孔與笛之乙字孔相應也簫之六字孔為四倍黃鍾管黃鍾大吕相和之分而笛之出音孔外兩孔為上字者正四倍黃鍾管之黃鍾大吕分也簫之五字孔笛之出音尺字孔皆四倍黃鍾管太蔟夾鍾相和之分故此二聲相應也至於簫之乙字分應於笛之工字孔皆為四倍黃鍾管姑洗仲吕相和之分故簫之乙字與笛之工字相應簫之上字分應於笛之凡字孔皆為四倍黃鍾管蕤賔林鍾相和之分故簫之上字與笛之凡字相應簫之後出尺字孔應笛之六字孔皆為四倍黃鍾管夷則南吕相和之分故簫之尺字與笛之六字相應至此則簫之孔已盡而笛之五字孔為四倍黃鍾管之無射應鍾相和之分者實又為簫之髙工字分焉蓋笛之與簫取音之理本一但設孔而命名者不同初不可以名之不同而遂以為音之異也此笛與姑洗簫同為四倍黃鍾所生故名之曰姑洗笛其為用也亦與姑洗簫同協排簫陽律一均之聲字焉若夫協排簫陰吕一均之聲字者亦用三倍半黃鍾之管立體按法取音名之曰仲吕笛與仲吕簫相協為用要之黃鍾加分之同形管簫體得其本管律吕之倍與正而笛得其本管律吕之正與半其倍半正聲相應一如律吕之倍半正聲相應蓋緣其徑之同故得其聲之相應為準也姑洗笛用四倍黃鍾之積為體其徑即四倍黃鍾之徑為四分三釐五毫其所用十二律吕之分亦自本體黃鍾之長損益以生其黃鍾之分一尺一寸五分七釐二毫為出音孔與通長之間下一孔其大吕之分一尺零八分三釐六毫為出音孔與通長之間上一孔此二孔皆為笛之上字而應姑洗仲吕角聲律吕之音與簫之六字同聲此二孔者實一笛之主宰也其通長無射應鍾相和倍之之分一尺二寸五分一釐七毫聲應太蔟之律商聲凡字以笛而言乃乙字分實與簫之凡字孔同聲也其出音孔則太蔟夾鍾相和之分九寸九分五釐九毫聲應蕤賔之律變徴五字於笛為尺字而與簫之五字孔同聲焉其出音孔上第一孔則姑洗仲吕相和之分八寸八分五釐二毫聲應夷則之律徴聲乙字於笛為工字而與簫之乙字孔同聲焉其第二孔則蕤賔林鍾相和之分七寸九分二釐一毫聲應無射之律羽聲上字於笛為凡字而與簫之上字同聲焉其第三孔則夷則南吕相和之分七寸零四釐聲應半黃鍾之律變宫尺字於笛為六字而與簫之後出尺字孔同聲焉其第四孔則無射應鍾相和之分六寸二分五釐八毫為通長之半聲應黃鍾之律宫聲工字於笛為五字而與簫之工字孔同聲焉其第五孔則取乙字於乙字分上字分之間亦如簫取乙字之法故乙字分之黃鍾大吕相和之半上字分之太蔟夾鍾相和之半俱虛其位以為伏孔乃取無射應鍾相和之分與姑洗仲吕相和之半相併折中得五寸三分四釐二毫聲應太蔟之律商聲凡字與通長同為乙字而與簫之凡字孔同聲焉其最上第六孔則姑洗仲吕相和之半四寸四分二釐六毫為第一孔之半聲應蕤賔之律變徴五字與出音孔同為尺字而與簫之五字孔同聲焉其取低上字以最上尺字孔併第三六字孔者亦以夷則南吕相和之六字孔分併以姑洗仲吕相和之半髙尺字孔分為一尺一寸四分六釐六毫適合本管黃鍾之分乃出音孔與通長之間下一孔故為低上字也其取髙上字以工字凡字代髙工髙凡而合以乙字者亦以髙工字應蕤賔林鍾相和之半髙凡字應夷則南吕相和之半二數相併折中為三寸七分四釐復與乙字分相併折中得四寸五分四釐一毫通合本管半姑洗之分在最上尺字孔之下故為髙上字也夫笛之與簫橫吹直吹雖各不同而聲之髙低自有律吕以界其倍半之分故與姑洗簫同協排簫陽律之一均焉仲吕笛用三倍半黃鍾之積為體其徑即三倍半黃鍾之徑為四分一釐六毫其所用十二律吕之分亦自本體黃鍾之長損益以生其黃鍾之分一尺一寸零六釐六毫為出音孔與通長之間下一孔其大吕之分一尺零三分六釐四毫為出音孔與通長之間上一孔此兩孔皆為本笛之上字一應仲吕之吕一應蕤賔之律二孔合之與仲吕簫之六字同聲實此一笛之主宰也其通長為無射應鍾相和倍之之分一尺一寸九分七釐二毫聲應夾鍾之吕清商髙凡字以笛而言乃乙字分實與仲吕簫之凡字孔同聲也其出音孔則太蔟夾鍾相和之分九寸五分二釐五毫聲應林鍾之吕清變徴髙五字於笛為尺字而與仲吕簫之五字孔同聲焉其出音孔上第一孔則姑洗仲吕相和之分八寸四分六釐七毫聲應南吕之吕清徴髙乙字於笛為工字而與仲吕簫之乙字孔同聲焉其第二孔則蕤賔林鍾相和之分七寸五分七釐六毫聲應應鍾之吕清羽髙上字於笛為凡字而與仲吕簫之上字同聲焉其第三孔則夷則南吕相和之分六寸七分三釐四毫聲應半大吕之吕清變宫髙尺字於笛為六字而與仲吕簫之後出尺字孔同聲焉其第四孔則無射應鍾相和之分五寸九分八釐六毫為通長之半聲應大吕之吕清宫髙工字於笛為五字而與仲吕簫之工字孔同聲焉其第五孔取乙字於乙字分上字分之間者亦以乙字分之黃鍾大吕相和之半上字分之太蔟夾鍾相和之半俱虛其位以為伏孔而取無射應鍾相和之分與姑洗仲吕相和之半相併折中得五寸一分零九毫聲應夾鍾之吕清商髙凡字與通長同為乙字而與仲吕簫之凡字孔同聲焉其最上第六孔則姑洗仲吕相和之半四寸二分三釐三毫為第一孔之半聲應林鍾之吕清變徴髙五字與出音孔同為尺字而與仲吕簫之五字孔同聲焉其取低上字以最上尺字孔併第三六字孔者亦以夷則南吕相和之六字孔分併以姑洗仲吕相和之半髙尺字孔分為一尺零九分六釐八毫適合本管黃鍾之分乃出音孔與通長之間下一孔故為低上字也其取髙上字以工字凡字代髙工髙凡而合以乙字者亦以髙工字應蕤賔林鍾相和之半髙凡字應夷則南吕相和之半二數相併折中為三寸五分七釐七毫復與乙字分相併折中得四寸三分四釐三毫適合本管半姑洗之分在最上尺字孔之下故為髙上字也此笛與三倍半黃鍾體積之簫皆以仲吕名而同應排簫陰吕之一均焉律吕正義後編曰姑洗笛用四倍黃鍾管為體與姑洗簫同仲吕笛用三倍半黃鍾管為體與仲吕簫同體用蘆竹間纒以絃前加龍頭長二寸四分後加龍尾長二寸二分九釐雕木為之通體硃漆繪金蓮出音孔垂五綵流蘇為飾陳暘樂書簫管之制六孔或謂之竪笛或謂之尺八元史長笛猶是竪笛簫則曰如笛龍笛則别之曰橫吹明時乃直曰簫不復有竪笛今簫長一尺八寸弱從上口吹有後出孔笛橫吹無後出孔則今之簫乃古之笛信矣晉東廂長笛用八倍律列和以為不可吹後世用二倍律故名短笛二倍黃鍾為角故名尺八短之又短者故名中管笛有橫者故名竪笛橫者曰笛故竪者曰簫單者曰簫故編者曰排簫此亦名實沿革之可想而知者至於度數古今不一晉志曰凡笛體用角律長者八之短者四之空中實容長者十六是為制笛之本意晉去古未逺必有所受也今之簫笛則以體積為準黃鍾簫用八倍黃鍾管是長者八之也姑洗簫用四倍黃鍾管是短者四之也黃鍾簫得黃鍾八倍積長者用倍度至於倍黃鍾則得十六倍積是空中實容長者十六也以黃鍾簫明其義而以姑洗簫制為器是用角律也大吕簫用七倍黃鍾積猶之用八倍大吕積也仲吕簫用三倍半黃鍾積猶之四倍大吕積也不用大吕而用仲吕亦用角律也笛短於簫而體積無異直吹橫吹其理一也有姑洗又有仲吕者備陰陽二均也開孔於律吕之間者又以一器俯仰吹之而足二均之用法之尤便者也陳暘樂書及稗編王圻續通考所載則與時用簫笛全不相符今時所用固仍前明舊制也蓋儒者不諳聲律徒襲舊聞訛載失實往往如此推原其故則祗因以全體為黃鍾合字耳不知黃鍾原非合字而簫笛之全體又非黃鍾故所記聲律皆不合也箎律吕正義曰今禮部太常所用箎徑約九分上下體長雖一尺四寸而吹口至管末止九寸餘管末設底底中心開孔近底又並開二小孔如簫笛之出音孔計此孔與吹口共八自下遞上命之則底孔為第一出音孔為第二向外最下一孔為第三次上為第四次上為第五次上為第六最上向內一孔為第七至於諸孔逺近則管末第一至出音第二其分甚近第二至第三其分獨逺第三至第四第四至第五第五至第六其度均而第六至向內第七第七至吹口此二分亦逺然皆未按律吕相生之度也夫四倍黃鍾管之徑四分三釐五毫倍之得八分七釐乃與時用箎徑相侔是為三十二倍黃鍾管之徑也三十二倍黃鍾管之徑比四倍黃鍾管之徑大一倍其長亦大一倍故得聲與四倍黃鍾管同應姑洗之律是故此箎用三十二倍黃鍾管之徑為徑而通長與各孔則用三十二倍黃鍾管之律吕相和之分因其本體所生聲字與四倍黃鍾之管同故制為箎亦得與姑洗簫姑洗笛相應而協排簫陽律一均之聲字因名之曰姑洗箎至於協陰吕一均之箎則用二十八倍黃鍾管為體蓋二十八倍黃鍾管體為三倍半黃鍾管之八倍而徑與長皆為三倍半黃鍾管之倍故所生聲字與三倍半黃鍾之管同而與仲吕簫仲吕笛相應為用因名之曰仲吕箎要之箎或上古之笛而笛或為箎之變制法皆橫吹然箎尤為雅樂之要器必使協於律吕始備旋宫轉調之用而可以宣大樂之和焉姑洗箎用三寸二倍黃鍾管為體其徑即三十二倍黃鍾管之徑為八分七釐自吹口至管末得三十二倍黃鍾管之太蔟夾鍾相和之半為九寸九分五釐九毫次姑洗仲吕相和之半為八寸八分五釐二毫次蕤賔林鍾相和之半為七寸九分二釐一毫次夷則南吕相和之半為七寸零四釐次無射應鍾相和之半為六寸二分五釐八毫又次即黃鍾大吕相和之四分之一為五寸六分零二毫其吹口至管末之分管末不設底其音通出則應姑洗之律而得簫之六字笛之上字設底開孔則比通出音底二音而應於黃鍾之律得簫之工字笛之五字乃為此箎底孔之聲字焉其姑洗仲吕相和之半應太蔟之律商聲凡字蕤賔林鍾相和之半應姑洗之律角聲六字因時用箎無凡字故以此二分相併折中得八寸三分八釐六毫加底六字之分而為此箎之出音孔焉其夷則南吕相和之半得聲應蕤賔之律變徴五字而為此箎之向外最下第一孔之分焉其無射應鍾相和之半得聲比夷則之律徴聲乙字少下而黃鍾大吕相和之四分之一得聲應南吕之吕清徴髙乙字以此二分相併折中適應夷則之律徴聲乙字而為此箎之向外第二孔之分焉其太蔟夾鍾相和之四分之一乃通體之半得聲應無射之律羽聲上字即為此箎之向外第三孔之分焉計其全半所應聲字底孔既為工字應黃鍾之律而此孔為上字應無射之律為下二音蓋因前孔開於二分之間較之倍體之音為下一音半此分仍依前孔之例則比本分應得之音復下半音而較之倍體則為下二音此又依次遞遷相應之類也其姑洗仲吕相和之四分之一得聲應半黃鍾之律變宫尺字而蕤賔林鍾相和之四分之一得聲應黃鍾之律宫聲工字此二分甚近如皆設孔則孔多而手不及按即如簫笛不設上字孔之理故不取尺字之分而取工字之分為此箎之向外第四孔之分焉此孔之聲與底孔相應為準而此孔之分乃五字第一孔外六字分之半六字之半得工字亦為下二音也欲用尺字之音則以乙字向外第二孔工字向外第四孔合而取之亦如簫笛之合尺字孔六字孔取上字之理也次夷則南吕相和之四分之一為五字第一孔之半聲應大吕之吕清宫髙工字此分不得聲字之正故不用次無射應鍾相和之四分之一得聲應太蔟之律商聲凡字而黃鍾大吕相和之八分之一得聲應夾鍾之吕清商髙凡字以此二分相併折中乃乙字第二孔之半而為此箎之向外第五孔之分焉乙字之半取凡字則為下三音矣其太蔟夾鍾相和之八分之一乃上字第三孔之半聲應姑洗之律角聲六字即為此箎之向內最上一孔之分焉上字之半取六字亦為下三音也其出音孔為低六字而此向內最上一孔為髙六字二孔相應為準又即簫笛出音孔之低尺字與最上一孔髙尺字相應之理也夫竹樂生聲之理總以倍半見其體用之妙蓋笛得四倍黃鍾之正體故較其全半相應止一聲之分而箎得三十二倍黃鍾之半體若較其全半相應則下二音或至三音四音此又因徑之大小而體之全半隨焉是以管籥諸器以徑為至要也仲吕箎用二十八倍黃鍾管為體其徑即二十八倍黃鍾管之徑為八分三釐二毫自吹口至管末得二十八倍黃鍾管之太蔟夾鍾相和之半為九寸五分二釐五毫其姑洗仲吕相和之半為八寸四分六釐七毫蕤賔林鍾相和之半為七寸五分七釐六毫夷則南吕相和之半為六寸七分三釐四毫無射應鍾相和之半為五寸九分八釐六毫至黃鍾大吕相和之四分之一為五寸三分五釐八毫其吹口至管末之分不設底其音通出則應仲吕之吕而得仲吕簫之六字仲吕笛之上字設底開孔則低二音而應於大吕之吕得簫之工字笛之五字乃為此箎底孔之聲字焉其姑洗仲吕相和之半應夾鍾之吕清商髙凡字蕤賔林鍾相和之半應仲吕之吕清商髙六字以此二分相併折中得八寸零二釐一毫乃本體低六字之分而為此箎之出音孔焉其夷則南吕相和之半得聲應林鍾之吕清變徴髙五字而為此箎之向外最下第一孔之分焉其無射應鍾相和之半得聲比南吕之吕清徴髙乙字少下而黃鍾大吕相和之四分之一得聲應無射之律羽聲凡字以此二分相併折中適應南吕之吕清徴髙乙字而為此箎之向外第二孔之分焉其太蔟夾鍾相和之四分之一乃通體之半得聲應應鍾之吕清羽髙上字而為此箎之向外第三孔之分焉其姑洗仲吕相和之四分之一得聲應半大吕之吕清變宫髙尺字蕤賔林鍾相和之四分之一得聲應大吕之吕清宫髙工字因此二分太近手不及按故不取髙尺字而取髙工字為此箎之向外第四孔之分焉此孔之聲亦與底孔相應為準也然用尺字之音亦以乙字向外第二孔工字向外第四孔合而取之次夷則南吕相和之四分之一為五字第一孔之半聲應太蔟之律濁商低凡字此分不得本體聲字之正故亦不用其無射應鍾相和之四分之一得聲應夾鍾之吕清商髙凡字而黃鍾大吕相和之八分之一得聲應姑洗之律濁角低六字以此二分相併折中乃乙字第二孔之半而為此箎之向外第五孔之分焉其太蔟夾鍾相和之八分之一乃上字第三孔之半聲應仲吕之吕清角髙六字而為此箎之向內最上一孔之分焉夫三倍半黃鍾應仲吕之角吕而二十八倍黃鍾即三倍半之八倍亦應仲吕之角吕以之制箎故與仲吕簫仲吕笛相協為用也律吕正義後編曰箎體用竹間纒以絃吹口之上塞之令氣不上泄通體硃漆繪金雲龍出音孔垂五綵流蘇為飾前編本黃鍾加倍同形管之度定姑洗箎仲吕箎之內徑一孔上出五孔向外一孔向內一孔在底近底下出並開二孔統而計之則為十孔以二小孔同分為一孔或除吹孔不數則為九孔除二小孔不數則為八孔除吹孔與二小孔皆不數則為七孔並底孔亦不數則為六孔觀古今之㑹而協還宫之宜可不謂制作盡善者乎若夫孔之應聲全以孔分之長短為度以管徑掣音之理推之半黃鍾之律比正律下一音箎長為太夾之半當下一音又十分音之三今比正律下三音則是徑掣一音三而低掣一音七蓋不設底則徑濶而難吹設底開孔則氣緩而音下故底雖非掣而以底收氣猶之徑小而管長此底之所生而各孔之所同也乂以底徑掣音之理參互推之管無底氣從管末通出故以管長與全徑為比例其氣線外為內之幾倍即掣幾音詳後管說箎有底氣從底孔中出故以管長與半徑為比例半徑為氣線內之幾倍即掣幾音而底之半徑原掣一音三則又當以一音三為掣音之率此徑掣音之法所以立也又以管長掣音之法推之大管姑洗半律為一音小管徑小比例同形其半管之長已過一音之分故以半長自掣之分與下半所掣之分相加為半長被通長掣音之率箎管徑大比例同形其一音之分已過半箎之長故以一音之分除半長為半長被通長掣音之率徑小則長之所掣者多徑大則長之所掣者少此長掣音之法所以立也逐孔按法分推併之為共掣音數悉與前編合益知聲與數俱而前編所審定信而有徴矣求箎徑掣音法以本管黃鍾之分二尺三寸一分四釐四毫為大股為一率全徑作十分為大勾為二率箎之通長九寸九分五釐九毫為小股為三率求得四率四分三為小勾與全徑十分相減餘五分七為餘勾以小勾除餘勾得一音三為徑掣音率乃以箎長九寸九分五釐九毫為大股為一率半徑作十分為大勾為二率孔長分為三率求得四率為小勾以小勾除大勾得數為掣音率相乘得徑掣音分數求箎長掣音法以黃鍾管徑二分七釐四毫為一率姑洗半律二寸八分八釐為二率姑洗箎徑八分七釐為三率求得四率九寸一分四釐四毫為一音之分以除姑洗箎半長四寸九分七釐九毫得十分音之五為半管被全管掣音之率乃以孔長為正音分孔長與通長或半長相減餘為掣音分掣音分與正音分相等為掣半音四分之一為掣一音掣音分不及正音分者以掣音分為實以正音分為法除之得數與掣音率相乘得掣音小餘纍加之得長掣音共數箎音分通長工字孔本管太蔟夾鍾相和之半正律本為五字底掣一音七徑掣一音三共掣三音故為工字下出低六字孔本管姑洗仲吕相和之半與蕤賔林鍾相和之半相併折中正律本為低上字底掣一音七徑掣一音四長掣十分音之一共掣三音凡過七半分者作一整音不足者去之餘倣此故為低六字五字孔本管夷則南吕相和之半正律本為尺字底掣一音七徑掣一音八長掣十分音之二共掣三音故為五字乙字孔本管無射應鍾相和之半與黃鍾大吕相和四分之一相併折中正律本為凡字底掣一音七徑掣二音長掣十分音之三共掣四音故為乙字上字孔本管太蔟夾鍾相和四分之一正律本為五字底掣一音七徑掣二音六長掣十分音之五共掣五音故為上字工字孔本管蕤賔林鍾相和四分之一正律本為上字底掣一音七徑掣三音一長掣十分音之六共掣五音故為工字凡字孔本管無射應鍾相和四分之一與黃鍾大吕相和八分之一相併折中正律本為凡字底掣一音七徑掣四音三長掣十分音之八共掣七音故復為凡字六字孔本管太蔟夾鍾相和八分之一正律本為五字底掣一音七徑掣五音二長掣一音共掣八音故為六字皇朝文獻通考卷一百六十六
