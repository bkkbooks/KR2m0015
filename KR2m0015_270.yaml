  text: 輿地考二直𨽻省保定府在京師西南三百五十里東西距二百七十里南北距四百九十里東至河間府任邱縣界一百十里西至定州曲陽縣界一百六十里南至冀州新河縣界三百里北至順天府房山縣界一百九十里東南至冀州治三百四十里西南至正定府晉州治二百二十五里東北至順天府霸州治二百十里西北至宣化府蔚州治一百里明保定府共領州三縣十七本朝初因之康熙八年以直𨽻巡撫自正定移駐於此雍正二年改為直𨽻總督設布政使司按察使司皆駐此為省㑹之地又以深澤縣改屬定州十二年升易州為直𨽻州以淶水縣及山西之廣昌縣屬之凡領州二縣十五清苑縣附郭滿城縣在府西北四十里安肅縣在府北少東五十里定興縣在府北少東一百二十里新城縣在府東一百五十里容城縣在府東北九十里雄縣在府東北一百二十里完縣在府西七十里唐縣在府西少南一百二十里望都縣在府西南九十里舊慶都縣乾隆十一年改名望都博野縣在府南九十里蠡縣在府南少東九十里祁州在府南少西一百二十里束鹿縣在府南少西二百五十五里安州在府東少北六十里髙陽縣在府東南六十里新安縣在府東少北八十二里永平府在京師東五百五十里東西距三百四十里南北距二百二十里東至盛京錦州府寧逺州界一百八十里西至遵化州界一百六十里南至海岸一百六十里北至桃林口邊牆六十里東南至海一百四十里西南至海一百八十五里東北至邊牆一百九十里西北至遵化州邊牆二百二十里明洪武初為平灤府四年改為永平府共領州一縣五本朝初因之雍正三年增置臨榆縣以順天府屬之玉田豐潤二縣來屬乾隆八年以玉田豐潤往屬遵化州凡領州一縣六盧龍縣附郭遷安縣在府西北四十里撫寧縣在府東七十五里昌黎縣在府東南七十里灤州在府西南四十里樂亭縣在府南一百二十里臨榆縣在府東一百七十五里明洪武初改建山海關十四年置山海衛本朝雍正三年改置臨榆縣正定府在京師西南六百十里東西距四百六十五里南北距三百七十里東至河間府景州界二百七十五里西至山西平定州盂縣界一百九十里南至順德府唐山縣界二百里北至保定府唐縣界一百七十里東南至山東東昌府武城縣治三百四十里西南至平定州樂平縣治二百五十里東北至保定府祁州治二百里西北至山西代州五臺縣治四百五十里明為真定府共領州五縣二十七本朝初因之順治十六年省阜平縣康熙二十二年復置雍正元年改名正定府二年升冀趙深定晉五州為直𨽻州以南宫等十七縣分屬之十二年以晉州及所屬無極藁城二縣與定州之新樂縣並還屬府凡領州一縣十三正定縣附郭舊名真定名本朝初仍明舊雍正元年改正定為府治獲鹿縣在府西南六十里井陘縣在府西南一百三十里平山縣在府西少北七十里靈夀縣在府西北五十里行唐縣在府北七十里阜平縣在府西北二百十里順治十六年省入曲陽行唐二縣康熙二十二年復置欒城縣在府南六十里元氏縣在府西南九十里贊皇縣在府西南一百二十里晉州在府東少南九十里初屬正定府雍正二年升為直𨽻州十二年還屬府無極縣在府東南六十里初屬正定府雍正二年分屬晉州十二年還屬府藁城縣在府東南六十里初屬正定府雍正二年分屬晉州十二年還屬府新樂縣在府東北九十里初屬正定府雍正二年分屬定州十二年還屬府順德府在京師西南一千里東西距二百八十里南北距一百五十里東至廣平府威縣界一百二十里西至山西遼州和順縣界一百六十里南至廣平府永年縣界六十里北至趙州臨城縣界九十里東南至永年縣界九十里西南至河南彰德府武安縣界一百二十里東北至冀州新河縣界二百里西北至正定府贊皇縣界一百五十里明順德府本朝因之領縣九邢臺縣附郭沙河縣在府南三十五里南和縣在府東南四十里任縣在府東北三十五里平鄉縣在府東八十里廣宗縣在府東一百二十里巨鹿縣在府東北一百二十里唐山縣在府東北八十五里內邱縣在府北六十里廣平府在京師西南九百五十里東西距一百七十里南北距一百三十三里東至山東東昌府臨清州界一百里西至河南彰德府武安縣界七十里南至彰德府臨彰縣界八十三里北至順德府南和縣界五十里東南至大名府治一百二十里西南至彰德府林縣治三百里東北至順德府廣宗縣治一百四十里西北至順德府治九十里明廣平府領縣九本朝初因之雍正四年以河南彰德府之磁州來屬領州一縣九永年縣附郭曲周縣在府東北四十里肥鄉縣在府東南三十五里廣平縣在府東南六十里成安縣在府南六十里邯鄲縣在府西南五十里雞澤縣在府東北六十里威縣在府東北一百十里清河縣在府東北一百八十里磁州在府西南一百二十里初屬河南彰德府雍正四年改屬廣平府大名府在京師西南一千一百二十里東西距一百二十里南北距三百四十里東至山東東昌府冠縣界四十里西至河南彰德府臨彰縣界八十里南至河南開封府儀封縣界二百九十里北至東昌府館陶縣界五十里東南至山東曹州府定陶縣治三百里西南至彰德府內黃縣治九十里東北至東昌府臨清州治一百五十里西北至廣平府成安縣八十里明大名府共領州一縣十本朝初因之雍正三年以內黃縣改屬河南彰德府以濬滑二縣改屬河南衛輝府凡領州一縣七元城縣附郭大名縣在府南少東八里魏縣在府西少北四十里南樂縣在府東南五十里清豐縣在府南九十里開州在府南一百二十里東明縣在府南二百二十里長垣縣在府西南二百五十里臣等謹按古冀兖豫三州