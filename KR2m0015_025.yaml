body:
  text: 欽定四庫全書皇朝文獻通考卷二十五職役考五臣等謹案復除之法有除其征役者有除其租賦者前史所載除役為多馬氏云漢世以後不復聞有除租之事矣宋代助役法行悉令等第輸錢則除役之義亦鮮考本朝役法歸入地丁田糧其間復除不一而恩澤之普未有如滋生人丁之永不加賦者若並復田租則祭田一欵之外亦間有之至於蠲免租稅或詳於田賦或見於國用者皆不復載天聰四年免諸宗室及內外親屬之家徭役是歲七月太宗文皇帝與諸貝勒議太祖庶妃所生之子阿拜等又弟之子吳達海等族叔吳霸席庫等又戚屬子孫柏爾肯等又勒克舒子孫及顔布魯等俱免徭役臣等謹案國初歸附諸國有令世世子孫免其驛騎及諸徭役者詳於藩封兹不備載五年免巴圖魯薩木哈圖等一應差徭巴圖魯薩木哈圖等皆於攻永平遵化時先登有功時以家貧無應役之人具奏命自城工大役外一應差徭俱免之八年定功臣無嗣免其丁徭之例先是逰擊祝邦成出征陳亡因無兄弟子嗣停其襲職其妻控告以寡婦求免數丁差徭管吏部貝勒具奏以其為功臣之妻准免八丁以後凡功臣而無兄弟子嗣承襲者准照官職免其丁之半其妻故後方令應差著為令又初考取舉人各免四丁先是三年九月考試儒生分别一二三等俱免二丁差徭是歲禮部考取通滿洲蒙古漢書文義者為舉人免四丁差役九年免功臣拜尹圖等徭役崇德元年定滿漢官員及看守郊壇陵廟人員各免丁徭及舉人生員官學生吏員甲兵優免丁徭有差又免各官壯丁徭役先是按班章京以下撥什庫以上俱照品級免其壯丁官糧至修築城池及雜差仍令應役至是以上受尊號覃恩自公按班章京以下至小撥什庫及一應在官人役并兵丁以上俱照品級免其壯丁徭役又以歸附生員劉奇遇兄弟為副理事官各免三丁先是陳獲官生皆給以莊田免其徭役是歲佟三牛録下生員劉竒遇兄弟以歸附求免徭役令大臣考試之以為內院副理事官各免三丁三年定優免人丁例凡無世職固山額真承政准免十丁梅勒章京內大臣參政免八丁甲喇章京一等侍衛理事官免五丁牛録章京二等侍衛副理事官免四丁三等侍衛免三丁多羅貝勒三等侍衛免二丁順治元年敕賜山東曲阜等處聖賢後裔免糧地畝並免灑掃户雜泛差役山東巡撫方大猷奏言前明舊制賜孔氏祭田二千餘頃撥佃户承種専辦籽粒以供祭祀請依舊制賜給又洪武中特置灑掃户一百一十五户免其雜泛差役亦請依舊制蠲免皆從之臣等謹案會典所載衍聖公祭田二千一百五十七頃五十畝聖林地一十八頃二十七畝廟宅基三頃二十七畝五分佃户五百户灑掃户一百一十五户顔氏後裔祭田五十頃墓田三頃三十三畝一分廟宅基九十二畝五分佃户十户門子四户廟户七户灑掃户二十五户又孔氏後裔祭田五十一頃六十畝墓田十頃一十五畝七分廟宅基三十九畝一分廟户三十七户孟氏後裔祭田五十一頃一十五畝墓田七頃三十一畝四分廟宅基一頃三十畝七分五釐佃户三十二户廟户二十五户門子五户仲氏後裔祭田六十五頃三十八畝墳地九頃五十畝廟宅基六十八畝護丁四十六户皆免其丁糧至康熙二十四年聖林地於原額外增擴一十一頃一十四畝九分除免錢糧又撥給周公後裔東野氏祭田五十頃以曲阜附近州縣無糧地給之又考各省凡先代陵墓皆設有陵户以司巡查灑掃例免差徭至乾隆元年復奉特㫖飭查增設又各地方先賢祠宇凡有祭田例免丁糧皆所以昭國家之曠典著復除之渥澤也逮沿習既久懷私忘公恃優免之條昧趨功之義則與隱蔽差役者等是以乾隆二十一年衍聖公庇其户人與鄒縣知縣大章相難輒稱例應免差冒昧瀆奏奉諭㫖據衍聖公孔昭煥奏至聖廟户在廟納丁供差一切本身徭役俱䝉恩優免厯來遇地方官額外派辦派買事件難以隨心呼應每事調劑殊屬非易請將現存户丁酌留五十户其餘户丁改歸民籍交地方官編審與民籍一體當差等語我朝輕徭薄賦凡屬編氓本無公旬徭役地方偶有興作亦皆動帑豫直初非額外差派不知其所奏派辦派買者何事或東省尚有此陋習則概當嚴行禁止不獨廟户為然著署撫白鍾山查明據實具奏旋據該撫覆奏並無派纍之事奉諭㫖申飭云朕親祭曲阜即衍聖公尚當躬自却掃豈有轉庇廟户歸咎有司之理今據白鍾山查明有糧之家依托廟户影射居奇及飭該縣退還價買糧石等事孔昭煥本應交部治罪姑念其為聖人後裔著加恩免其交議又奉諭㫖白鍾山查覆孔昭煥所奏鄒縣知縣大章私毁遵例免差碑碣一摺我朝百年以來從無公旬徭役所有守夜開溝栽樹修堰等事乃民間自為保護相友相助之誼如江西湖廣等省沿江堤堰民間自為修防者甚多何得謂之差徭若併此而倚藉樂舞廟户名色概不承應是一鄉之中祗令無業貧民數户専任其勞而依託附名之徒安坐而享其利有是理乎孔昭煥既袒護陳奏於前仍復巧辭掩飾於後朕雖欲曲宥而不能矣孔昭煥著交部嚴加議處以為居鄉多事者戒自是廟户等不得借端隱蔽地方差役得以均平云又恩詔軍民年七十以上者許一丁侍養免其雜泛差役臣等謹案定例凡恩詔中應及養老一欵者悉如順治元年之例後不復載又令京城遷徙之家分别免其賦役凡明末遭寇遷徙之家免賦役三年房屋被毁者免一年又定京城行商車户等役永停僉派又定各旗壯丁差徭糧草布匹永停輸納二年免徴直省京班匠價已見前卷時因免山東章邱濟陽二縣京班匠價并令各省匠籍俱除為民又定優免丁糧之例禁革冒濫先是保定巡撫王文奎言各府州縣明季舊習優免太濫致虧正額取盈攤派最為厲民宜嚴加禁革至是巡撫郝晋又疏請定優免畫一之規下户禮二部議之尋議定品官及舉貢生員雜職吏典應免丁糧其廢官黜辨粟監資郎俱與民間一例當差有冒濫優免者令撫按劾治從之四年定編審人丁凡年老殘疾並逃亡故絶者悉行豁免五年定直省紳襟優免例在京官員一品免糧三十石人丁三十丁二品免糧二十四石人丁二十四丁三品免糧二十石人丁二十丁四品免糧十六石人丁十六丁五品免糧十四石人丁十四丁六品免糧十二石人丁十二丁七品免糧十石人丁十丁八品免糧八石人丁八丁九品免糧六石人丁六丁外任官員各減其半教職舉貢監生員各免糧二石人丁二丁雜職吏承各免糧一石人丁一丁以禮致仕者免十分之七閒住者免其半犯贓革職者不准優免如本户丁糧不及數者止免實在之數丁多糧少者不許以丁准糧丁少糧多者不許以糧准丁疏逺族屬不得濫免十四年部臣議請自一品官至生員吏承止免本身丁徭其餘丁糧仍徴充餉九年令直省州縣置社學師免其差徭已見前卷十八年以江南江都如臯海州三州縣修理烽墩馬路各免差徭一年康熙元年免盛京居民工役奉天府尹徐繼煒疏言新投盛京居民生計未遂應暫免一切工役下部議行四年免湖廣西山軍前運餉人夫亡故者同居父子兄弟一年丁差三十九年免河工河夫雜差河工挑河築堤例用雇夫河臣疏言河工雇夫動至數千寒暑風雨極其勞苦工成之日應給印票令該地方查驗免其雜項差役以酬其勞從之五十二年欽奉恩詔嗣後增益人丁永不加賦是歲恭遇聖祖仁皇帝六十萬夀欽奉恩詔嗣後編審增益人丁止將實數奏聞其徴收辦糧但據五十年丁冊定為常額續生人丁永不加賦五十四年定社倉捐輸分别免差之例時議社倉勸輸應加奬勵乃定例富民能捐穀五石者免本身一年雜泛差徭有多捐一倍二倍者按年遞免雍正四年詳定紳襟優免之例署四川巡撫羅殷泰疏言川省州縣多屬以糧載丁紳襟貢監等盡皆優免差徭請將優免之名永行禁革與民一例當差下户部議言川省以糧載丁之州縣紳士原無丁銀無庸優免奉諭㫖羅殷泰所奏禁革紳士優免之處固屬太刻部議亦屬䝉混著九卿詳議具奏尋議紳襟祇許優免本身一丁其子孫族户冒濫及私立儒户宦户包攬詭寄者查出治罪從之五年令保甲內紳襟免充雜役及分别應免充役者部臣議覆條奏凡紳襟之家一體編次聽保甲長稽查如不入編次者照脫户律治罪惟是保甲之法有充保長甲長之役又有十家輪值支更看柵之役紳襟既已身列仕籍肄業膠庠並齊民內衰老疾及寡婦之家子孫尚未成丁者俱免充役又定各省藉田擇農夫二名看守免其差役乾隆元年申舉貢生員免派雜差之例奉諭㫖任土作貢國有常經無論士民均應輸納至於一切雜色差徭則紳襟例應優免乃各省奉行不善竟有令生員充當總甲圖差之類者殊非國家優恤士子之意嗣後舉貢生員等著概行免派雜差俾得専心肄業倘於本户之外别將族人借名濫免仍將本生按律治罪二年免雲南軍屯丁銀雲貴總督尹繼善疏言滇省軍丁一項從前未經攤入地畝除厯年查出軍地抵補外尚有應徴丁銀一萬二千二百餘兩惟按老丁名字徴收或已無寸土而追比無休或已絶後嗣而波及同伍請議查免奉諭㫖滇省軍丁一項從前既未曾攤入地畝而現在完納丁糧之人又係無田之户著將應徴軍丁銀兩自乾隆三年為始概豫豁免俾無業屯民永釋苦纍三年免雲南麗江府夷丁丁銀先是麗江新增夷丁二千三百餘丁業經編入正額至是奉諭㫖朕聞雲南麗江府原屬土府改設流官比時清查田地户口有土官莊奴院奴等類並無田糧皆願自納丁銀以比於齊民共徴丁銀一百五十四兩七錢零逮滇省民丁改為隨糧派納而此項夷丁不得與有糧之户一例攤派至今照舊徴收著該督撫查明概豫豁免俾邊地夷民永無催科之擾部臣議上所增夷丁並免之十二年免福建閩縣先賢祠祭産地丁錢糧奉諭㫖福建閩縣地丁項內有先賢二十三祠祭産田糧一項本朝初年優免後於雍正五年該地方官清查溢額錢糧之時誤將此項作為溢額報解歸公現在追徴充餉朕思祠宇祭産供俎豆牲牷之用厯來優免以恤奉祠後裔原屬國家曠典著該督撫查明豁免永著為例十六年免江南武進陽湖二縣開抵役田租銀奉諭㫖朕聞常州府屬武進陽湖二縣開抵役田租銀一項原係前明時虛田領價後因本户逃亡株連親族各將己産開抵實非前明原置之田亦非當日領價之户小民條糧役租力難並輸以致積年拖缺朕省方所至民隱勤求清蹕既周備深軫念著將二縣開抵役田除應辦條漕仍照民田一例完納外其新舊租銀概豫豁免以除民纍凡爾百姓尚其永承樂利各相勉於孝弟力田以仰副朕格外加恩之意焉三十七年諭李瀚奏請停編審造冊所見甚是編審人丁舊例原因生齒繁滋恐有漏户避差之弊是以每届五年查編造冊以備考核今丁銀既皆攤入地糧而滋生人户又欽遵康熙五十二年皇祖恩㫖永不加賦則五年編審不過沿襲虛文無裨實政况各省民穀細數俱經督撫於年底専摺奏報更無藉五年一次之另行查辦嗣後編審之例著永行停止三十八年諭據陳輝祖奏請將該省民屯新墾丁銀隨年攤征批交該部議奏旋經户部覆准并請行查各督撫就本省情形酌籌妥議具奏嗣據直隸等省先後入奏大概請仍舊制者居多則陳輝祖所奏及該部所議皆未得當國家承平休飬百有餘年閭閻生齒日繁嵗有增益向來編審人丁按丁科則自康熙五十二年我皇祖特頒恩詔永不加賦即以是年丁糧之數作為定額朕臨御以來無時不以愛養斯民為念詎肯於丁糧區區毫未之賦稍存計較乎若以新墾民屯田畝復將丁銀隨年攤納是與小民較及錙銖尤非惠下恤民之道所有各省辦理丁糧一事無論己未覆奏俱著悉仍其舊毋庸另議更張皇朝文獻通考卷二十五
