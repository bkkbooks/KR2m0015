body:
  text: 欽定四庫全書皇朝文獻通考卷二百五十六象緯考一臣等謹按宋鄭樵作天文畧自謂漢唐諸儒所不得聞後之論者疑其矜詡過甚然馬端臨象緯考頗依據之其大指欲學者識垂象授時之意絶其誕妄之源故舉術家沿襲之辭史遷所稱禨祥不法凌雜米鹽者悉與芟除而獨推句中有圖言下見象之步天歌於以紬繹而闡明之可為後代言天者之彀率矣我聖朝憲天齊政靈臺推步之法視昔加詳聖祖仁皇帝御製考成上下編世宗憲皇帝御製序文殫晰源流頒賜欽天監肄業我皇上增定後編重志儀象俾凡古法之失傳與西法之積嵗參差者隨時釐正所以揆天察紀明時正度俾象緯昭然耳目至纎至悉矣臣今仿馬端臨之書為象緯考兼取義於鄭樵並擇其體例之善者從之首時憲次兩儀七政恒星總論次儀器皆列聖相承之制作為推步之法源次三垣二十八宿次日月行道次極度偏度中星次五星皆近今實測之數理與前代有異者次日食次月食次月五星凌犯次星雲瑞變則皆監臣史臣之所紀載各區分其條目以著於編時憲臣等謹按推步之法遞改而益密自黄帝迄秦凡六改漢凡四改魏迄隋十五改唐迄五代十五改宋十七改金迄元五改明大統法即元之授時本西域扎瑪里鼎所撰書而郭守敬等參改者也回回法相傳為西域瑪哈穆特所著元之季世其書始行有回回司天監之官明初以其法與大統參用時稱精密自成化迄隆慶推交食不符紛紛議改迨西洋人利瑪竇入貢而龎迪峩熊三拔湯若望等㩦其圖籍先後至五官正周子愚請譯其書禮部言徐光啟李之藻可與龎迪峩等同譯越數年李之藻言西法所論天文不僅詳度數又能明其所以然之理乞敇禮部開局盡譯之徐光啟依其法預推悉驗修正成書李天經繼之更製儀器測交食凌犯俱密合以世方多故終未頒行我太宗文皇帝時亦用大統法世祖章皇帝定鼎燕京考驗西法最善即用以推時憲康熙初習大統回回法者咸觝排之聖祖仁皇帝博訪廷臣屢命㑹同測驗惟西法所推一一符合於是交相讓能焉自御纂數理諸書折衷指歸闡晰􅀢窔而渾圓撱圓之㫖嵗差里差之説既不悖於古而有驗於今西法之善彌顯其日躔月離恒星經緯諸表俱以實測為憑隨時修改故占候無違而協紀授時益用精密邇者皇猷逺播式廓西疆從古聲教不通之地咸奉天朝正朔而北極高度東西偏度悉實測之以推晝夜節氣時刻各分列於時憲書則又章亥以來算步之所未及者也兹序述之為象緯之綱領云崇徳二年十月乙未朔頒滿洲蒙古漢文厯時初用大統法順治元年十月乙夘朔頒順治二年時憲書用西洋新法以太宗文皇帝天聰二年戊辰天正冬至為法元定周天三百六十度度法六十分毎日九十六刻刻法十五分晝夜節氣時刻京師與各省皆依北極高度東西偏度推算先是六月壬午西洋人湯若望言臣於明崇禎二年來京曾用西洋新法製測量日月星晷定時考驗諸器用以推測近遭賊燬臣擬另製進呈今先將本年八月初一日日食照西洋新法推步京師所見日食分秒並起復方位圖象與各省所見不同之數開列呈覽及期大學士馮銓同湯若望㩦窺逺鏡諸器赴觀象臺測驗其初虧食甚復圓時刻分秒及方位大統回回法俱有差誤惟西洋新法脗合云七月丁亥禮部言欽天監改用新法推註已成請易新名頒行和碩睿親王曰宜名時憲昭朝廷憲天乂民至意甲辰湯若望言敬授民時全以節氣交宫與太陽出入晝夜時刻為重若節氣之時日不眞則太陽出入晝夜刻分俱謬矣大統回回舊法所用節氣止泥一方且北直之節氣春分秋分前後俱差一二日况諸方乎新法之推太陽出入地平環也則有此晝而彼夜此入而彼出之理舊法以一處而概諸方故日月多應食而不食當食而失推五星當疾而反遲應伏而反見差訛難以枚舉今以臣局新法所有諸方節氣及太陽出入晝夜時刻俱照道里逺近推算請刋列時憲書從之至是告成頒行十一月以湯若望掌欽天監事時湯若望疏言臣等按新法推算月食時刻分秒復定每年進呈書目重複者刪去以免混淆得㫖欽天監印信著湯若望掌管所屬官員嗣後一切占候選擇悉聽舉行十四年十一月命内大臣及部院大臣登觀象臺測驗先是四月回回科秋官正吳明烜疏言臣祖黙沙亦黑等本西域人自隋代來朝授官經一千五十九載専管星宿行度吉凶推算太隂五星凌犯天象占驗日月交食即以臣科白本進呈著為例順治三年本監掌印湯若望諭不必奏進其所推七政書水星二八月皆伏不見今水星於二月二十九日仍見東方又八月二十四日夕見皆關象占不敢不據實上聞并上順治十四年回回科推算太隂五星凌犯書日月交食天象占驗圖象七月又言湯若望推算天象舛謬三事一遺漏紫炁一顛倒觜參一顛倒羅計至是内大臣等測驗水星不見議吳明烜詐妄之罪援赦得免康熙四年三月廢西洋新法用舊法時徽州府新安衛官生楊光先進摘謬論選擇議各一篇言湯若望新法十謬及選擇不用正五行之誤下議政王大臣等集議將湯若望及所屬各員罷黜治罪於是廢西洋新法用大統舊法七年八月因舊法不密用回回法時欽天監監副吳明烜疏言現用舊法不無差謬與五官正戈繼文等所進書暨回回科七政書三本互有不同宜令四科詳加校正以求至精下禮部議尋議五官正戈繼文等推算七政金水二星差誤監副吳明烜之七政書與天象相近理應頒行主簿陳聿新推算己酉年時憲已頒各省止於本年暫用其七政經緯躔度月五星凌犯等書及日月交食自康熙九年以後俱交吳明烜推算從之九月欽天監監正楊光先言候氣之法不驗先是五年正月楊光先疏言候氣之法乆失其傳十二月中氣不應乞敇禮部採取宜陽金門山竹管上黨羊頭山秬黍河内葭莩備用從之至是疏稱取到律管秬黍葭莩照尺寸方位候過二年未見效驗得㫖候氣之法自北齊信都芳取有效驗之後經千二百餘年俱失其傳能行修正之人可得與否詳問再議尋議據楊光先稱律管尺寸雖載在司馬遷史記而用法失傳今博訪候氣之人尚在未得應仍令延訪從之八年三月復用西洋新法先是七年十一月命大臣傳集西洋人與監官質辯至午門測驗正午日景西洋人南懷仁言監副吳明烜所造康熙八年七政時憲閏十二月應是康熙九年正月又有一年兩春分兩秋分之誤命大學士圖海李霨等赴觀象臺測驗八年正月丁酉是日立春南懐仁預推午正太陽依象限儀在地平上三十三度四十二分依紀限儀離天頂正南五十六度十八分依黄道經緯儀在黄道線正中在冬至後四十五度零六分在春分前四十四度五十四分依赤道經緯儀在冬至後四十七度三十四分在春分前四十二度二十六分在赤道南十六度二十一分依天體儀於立春度分所立直表則表對太陽而全無影依地平儀所立八尺有五寸表則太陽之影長一丈三尺七寸四分五釐於是六儀並測一一符合圖海等言測驗南懷仁所指皆符吳明烜所指不實應將康熈九年時憲交南懷仁推算得㫖前時議政王大臣以楊光先何處為是議行湯若望何處為非議廢及今日議復之故向馬祐楊光先吳明烜問明再議尋議傳問監正馬祐等亦言南懷仁所指皆合天象每日百刻雖前代行之已乆但南懐仁推算九十六刻之法既合應將九十六刻推行又南懷仁言羅㬋計都月孛星係推算所用其紫炁星無象不闗推算應自康熙九年始將紫炁星不入七政書至候氣係古法現今推算亦無用處俱應停止從之三月南懷仁言雨水為正月中氣吳明烜於康熙八年十二月置閏是月二十九日值雨水即為康熙九年之正月置閏當在九年二月從之十五年八月令欽天監官員學習新法諭曰欽天監専司天文厯法任是職者必當學習精熟向者新法舊法是非争論今既知新法為是滿漢官員務令加意精勤此後習熟之亽方準陞用未習熟者不準陞用十七年八月預推七政交食表告成掌欽天監事南懷仁接推湯若望所推法為書三十二卷名曰康熙永年表二十一年八月增製盛京推算表南懷仁疏言新法照北極之高度另有推算日月交食表名為九十度表惟盛京無本地之表今春隨駕測得盛京北極之高較京師多二度應製九十度表以憑推算從之三十一年三月令欽天監將䝉古晝夜節氣時刻增載頒朔其增載之名二十有三曰科爾沁曰杜爾伯特曰扎賚特曰郭爾羅斯曰阿嚕科爾沁曰烏珠穆沁曰浩齊特曰巴林白扎嚕特曰阿巴哈納爾曰阿巴噶曰柰曼曰克什克騰曰蘇尼特曰翁牛特曰敖漢曰喀爾喀曰四子部落曰喀喇沁曰茂明安曰烏喇特曰歸化城土黙特曰鄂爾多斯四十二年三月增衍䝉古諸處推算表欽天監疏言各䝉古東至野索西至雅爾堅自北極高四十四度之巴爾庫爾河及北極高六十八度之武地河宜照四十四度之表式推至六十八度從之五十二年四月令欽天監將䝉古及哈密晝夜節氣時刻照新圖推算增表禮部議科爾沁等二十三處䝉古節氣太陽出入自康熙三十二年照理藩院舊地圖推算今新地圖係用御製新儀測得北極高低經緯度數絲毫不爽㢠非舊圖可比嗣後俱照新圖推算又欽天監推算各省皆以省城為準今新向化諸䝉古及哈密應以有城池及有房屋之地為準推算增列從之其增載之名一十有五曰布嚨堪布爾噶蘇台曰額格色楞額曰桑錦達賚曰肯特曰克嚕倫巴爾城曰圖拉河汗山曰喀爾喀河克勒和碩曰鄂爾坤額爾徳尼昭曰􅬃格扎布堪曰推河曰翁吉曰薩克薩克圖古哩克曰固爾班賽堪曰哈密曰阿拉善五十三年十月測暢春園北極高度黄赤距度先是五十年十月諭曰天文厯法朕素留心西洋法大端不誤但分刻度數之間乆而不能無差今年夏至欽天監奏聞午正三刻朕細測日景是午初三刻九分此時稍有舛錯恐數十年後所差愈多也尋命製中表正表倒表各二具均高四尺銅象限儀二具半徑均五尺至是諭和碩誠親王允祉等曰北極高度黄赤距度於厯法最為𦂳要著於澹寧居後每日測量尋奏測得暢春園北極高三十九度五十九分三十秒比觀象臺高四分三十秒黄赤大距二十三度二十九分三十秒比舊少一分三十秒十一月命學習算法官員分往各省測北極高度及日景和碩誠親王允祉等疏言昔郭守敬修授時法遣人各省實測日景故得密合今除暢春園及觀象臺逐日測驗外於里差之尤較著者如江南浙江河南陜西四川雲南廣東七省遣人測量北極髙度及日景則東西南北里差及日天半徑皆有實據從之五十六年二月御定星厯考原告成先是二十二年十一月諭九卿等曰隂陽選擇書籍浩繁吉凶禍福多相矛盾且事屬渺茫難以憑信若各據一書偏執已見揑造大言恣相告訐將來必致誣訟繁興作何立法永行無弊尋議取欽天監所定通書大全内二十四條附入選擇通書彚為一部遵行名欽定選擇通書五十二年十月命大學士李光地將曹振圭所著書重加考訂賜名星厯考原至是刋刻告成頒發欽天監諭曰厯日内所列九宫以上元為中元傳誤已乆宜悉依朕所定星厯考原更改之於是以康熙二十三年甲子為上元起一宫自後中元甲子起四宫下元甲子起七宫一百八十年週而復始五十七年四月御定七政四餘萬年書告成始順治元年至康熙六十年按年排列節氣日時日月五星交宫入宿度分自後準式增續六十一年六月御製律厯淵源告成内厯象考成四十二卷分上下編有圖有表以康熙二十三年甲子天正冬至次日壬申子正初刻為法元七政皆從此起算雍正三年三月頒發厯象考成令欽天監教習推算時聖祖仁皇帝御製律厯淵源刋刻告竣世宗憲皇帝御製序文以考成為推步之模命監臣學習遵守八年六月命欽天監修日躔月離表以推日月交食並交宫過度晦朔弦望晝夜永短五星凌犯續於考成諸表之末時欽天監疏言日月行度積乆漸差法須旋改始合天行臣等欽遵御製考成推算時憲七政覺有微差蓋考成按西法算書纂定而其法用之已乆是以日月行度差之微芒漸成分秒若不修理恐愈乆愈差今於雍正八年六月初一日日食臣等公同在臺敬謹觀候實測之與推算分數不合伏乞敕選熟練人員詳加校定修理從之乾隆二年正月令天下舉精通天象之人上諭大學士等曰在璣衡以齊七政視雲物以驗嵗功所以審休咎備修省先王深致謹焉今欽天監於節度時刻固已推算不爽而星官之術占驗之方天文家互有疎密非精習不能無差海内有精曉天文明於星象者直省督撫確訪試驗術果精通咨送來京該部奏聞請㫖六年十一月欽定協紀辨方書告成先是五年七月大學士伯鄂爾泰等疏言選擇吉日三代以上祗論干支之剛柔絶少拘忌後世論説日多術家遞衍增設神煞本一日而吉凶頓殊本一星而名號雜出以致民間趨避無所適從現在算書館奉㫖重修選擇通書萬年書先據監臣將應改條目及神煞俗論應行刪去者奏請敕部定議今和碩莊親王等請將羅㬋計都依古改正按羅㬋計都生於日月交行謂之天首天尾天首屬羅天尾屬計自古而然應依改正再七政古有四餘紫炁其一應請添入其選擇通書牴牾重複應删應改及未該者令率同館員詳考編輯進呈御覽恭候欽定仍將舊有名目附載卷末以示傳疑以備博考從之至是告成命名協紀辨方書御製序文弁於卷端十二月御定萬年書告成始天命九年下元甲子按年排列節氣時刻冠以前代三元甲子編年自黄帝上元甲子始七年六月御製厯象考成後編告成先是三年四月和碩莊親王允禄等言欽若授時為邦首務堯命羲和舜齊七政尚矣三代以後推測寖疎至元郭守敬本實測以合天行獨邁前古明大統法因之然三百餘年未加修改乆而有差我朝用西洋法數既本於實測而三角八線立法尤密但其推算皆用成表學者鮮知其立法之意聖祖仁皇帝御製考成一書其數惟黄赤大距減少二分餘皆仍西人第谷之舊自西人噶西尼法蘭徳等製墜子表以定時千里鏡以測逺爰發第谷未盡之義大端有三其一謂太陽地半徑差舊定為三分今測止有十秒其一謂清䝉氣差舊定地平上為三十四分髙四十五度止有五秒今測地平上止三十二分髙四十五度尚有五十九秒其一謂日月五星之本天舊説為平圓今以為撱圓兩端徑長兩腰徑短以是三者則經緯度俱有微差臣戴進賢等習知其説而未有明徴未敢斷以為是雍正八年六月朔日食按舊法推得九分二十二秒今法推得八分十秒驗諸實測今法果合蓋自第谷至今一百五十餘年數既不能無差而此次日食其差最顯所當隨時修改以合天也數象首重日躔日與天㑹以成嵗也次月離月與日㑹以成月也日月同度而日為月揜則日食日月相對而地隔日光則月食皆以日月行度為本今依日躔新表推算春分比前遲十三刻秋分比前早九刻冬夏至皆遲二刻然以測髙度惟冬至比前髙二分餘夏至秋分僅差二三十秒蓋測量在地面而推算則以地心今所定地半徑差與地平上之䝉氣皆與前不同故推算毎差數刻而測量所差究無多也至其立法以本天為撱圓雖推算較難而損益舊數以合天行頗為新巧臣等按法推詳闡明理數伏乞親加裁定顔曰御製厯象考成後編與前書合成一帙得㫖頒刻書凡十卷先數理次步法次日躔月離交食表以雍正元年癸夘天正冬至次日丁酉子正初刻為法元七政皆從此起算至是告成請御製序文諭曰朕志殷肯構學謝知天所請序文可勿庸頒發宜將厯降諭㫖及諸臣原奏開載於前則修書本末巳明十七年十一月御製儀象考成志表告成先是九年十月欽天監監正戴進賢等疏言康熙十三年聖祖仁皇帝命南懷仁製造儀器及纂成靈臺儀象志一書有解有圖有表乃天文科推測星象所常用者其志中原載星辰循黄道行每年約差五十一秒合七十年則差一度今為時已久運度與表不符理宜改定再康熙十三年時黄道赤道相距二十三度三十二分今測得相距二十三度二十九分志中所列諸表皆據曩時分度所當修合天行又三垣二十八宿以及諸星今昔多寡不同應以本年甲子為元釐輯增訂以資考測下王大臣議從之至是告成和碩莊親王允祿等疏言漢以前星官名數今無全書晉志載吳太史令陳卓總巫咸甘石三家星官著於圖錄凡二百八十三官一千四百六十四星今亦不見原本隋丹元子步天歌與陳卓數合後之言星官者皆以步天歌為準康熙十三年監臣南懷仁修儀象志星名與古同者總二百六十一官一千二百一十星比步天歌少二十二官二百五十四星又於有名常數之外增五百一十六星又多近南極星二十三官一百五十星監臣戴進賢等據西洋新測星度累加測驗儀象志尚多未合又星之次第多不順序臣何國宗恭奉聖訓釐正臣劉松齡鮑友管等詳加測算著之於圖臣允祿等復公同考定總計星名與古同者二百七十七官一千三百一十九星比舊儀象志多十六官一百零九星與步天歌為近其中次第顛倒凌躐臣等順序改正者一百五官四百四十五星其尤彰明較著者二十八宿次舍自古皆觜宿在前參宿在後其以何星作距星史無明文儀象志以參宿中三星之西一星作距星則觜宿在後參宿在前今依次順序以參宿中三星之東一星作距星則觜前參後與古合又於有名常數之外增一千六百一十四星按其次序分註方位以備稽考又近南極星二十三官一百五十星中國所不見悉仍西測之舊共計恒星三百官三千零八十三星編為總紀一卷黄道經緯度表赤道經緯度表各十二卷月五星相距恒星經緯度表一卷天漢黄赤經緯度表四卷共成書三十卷伏乞欽賜嘉名御製序文冠於卷端刋刻以垂永久從之命名儀象考成十二月改正時憲書觜參二宿次序大學士忠勇公傅恒等議周天躔度以二十八宿為經星經星之數多寡不一所占之度亦廣狹不一而前後相次總以各宿之第一星為距星此天象之自然古今所不易也其間惟觜參二宿相距最近觜止三星形如品字其所占之度狹參有七星三星平列於中四星角出於外其所占之度廣古法以參宿中三星之東一星作距星則觜前參後康熙年間用西法算書以參中三星之西一星作距星遂改為參前觜後故時憲書内星宿值日亦依此序鋪註以星度考之古以觜在前則距參一度而分野之度狹以參在後則距井十度三十六分而分野之度廣若如西法以參在前以觜在後則參反距觜一度而參宿距井之十度三十六分移而歸觜似不如古法為優今莊親王等既稱奉命重修儀象志恒星經緯度表順序改正參宿在後觜宿在前乾隆十九年之七政書即用此表推算應如所請以乾隆十九年為始時憲書之值宿亦依古改正以觜前參後鋪註則與恒星經緯度表相合而四方七宿分配木金土日月火水七政之序亦合矣從之二十年六月命測量新闢西疆北極高度東西偏度諭曰西師奏凱大兵直抵伊犁準噶爾諸部盡入版圖其星辰分野日出入晝夜節氣時刻宜載入時憲書頒賜正朔其山川道里應詳細相度載入皇輿全圖以昭中外一統之盛左都御史何國宗素諳測量同五官正明安圖副都統富徳帶西洋人二名前徃各該處測其北極高度東西偏度及一切形勝悉心考訂繪圖呈覽所有坤輿全圖及應需儀器俱酌量帶往二十二年丁丑十月庚申朔頒乾隆二十三年時憲書增列新闢準噶爾部回部及新附外藩晝夜節氣時刻並分列盛京東北諸方於首其增列之名二十曰巴里坤曰穆壘曰濟木薩曰烏嚕木齊曰安濟海曰珠勒都斯曰崆吉斯曰哈什曰伊犁曰博囉塔拉曰哈布塔克曰拜達克曰齋爾曰塔爾巴噶台曰吐魯畨曰魯克沁曰烏沙克塔勒曰哈喇沙爾曰庫爾勒曰哈薩克其分列之名五曰三姓曰黑龍江曰吉林曰伯都訥曰尼布楚二十五年庚辰十月壬申朔頒乾隆二十六年時憲書增列回部及新附外藩晝夜節氣時刻其增列之名二十有六曰布古爾曰庫車曰賽哩木曰阿克蘇曰烏什曰喀什噶爾曰鄂什曰巴爾楚克曰英阿雜爾曰葉爾羌曰和闐曰伊里齊曰玉隴哈什曰哈喇哈什曰克里雅曰色哷庫勒曰喀楚特曰三珠曰鄂囉善曰什克南曰拔達克山曰斡罕曰博羅爾曰安集延曰那木干曰霍罕曰塔什罕三十五年庚寅十月癸酉朔頒乾隆三十六年時憲書將後頁紀年加編至一百二十嵗先是本年正月奉上諭國家熙洽化成薄海共躋夀宇昇平人瑞實應昌期是以每嵗題報直省老民老婦年至百嵗及百嵗以上者不可勝紀因思向來所頒時憲書後頁紀年祇載花甲一周為斷殊不知周甲夀所常有而三元之序數本循環成例拘墟未為允協著交欽天監自乾隆三十六年辛夘嵗為始於一嵗下添書六十一嵗仍依干支以次載至一百二十嵗則開袠犁然期頤並登正朔用符紀嵗授時之義三十九年甲午十月辛巳朔頒乾隆四十年時憲書増列土爾扈特等處晝夜節氣時刻其增列之名二十有四曰阿勒坦淖爾烏梁海曰汗山哈屯河曰唐努山烏梁海曰烏蘭固木杜爾伯特曰額爾齊斯河曰齋桑淖爾曰阿勒台山烏梁海曰阿勒輝山曰科布多城曰烏里雅蘇台城曰布勒罕河土爾扈特曰巴爾噶什淖爾曰烏隴古河曰赫色勒巴斯淖爾曰和博克薩哩土爾扈特曰扎哈沁曰齋爾土爾扈特曰吹河曰晶河土爾扈特曰庫爾喀喇烏蘇土爾扈特曰塔拉斯河曰和碩特曰那林山曰特穆爾圖淖爾四十三年戊戌十月丁巳朔頒乾隆四十四年時憲書増列兩金川各土司等處晝夜節氣時刻其増列之名十有三曰三雜谷曰黨壩曰綽斯甲布曰金川勒烏圍曰金川噶拉依曰瓦寺曰革布什咱曰布拉克底曰小金川美諾曰巴旺曰沃克什曰明正曰木坪皇朝文獻通考卷二百五十六
