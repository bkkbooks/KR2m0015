  text: 欽定四庫全書皇朝文獻通考卷二百六十八
  hash: sha256:b79b410de6b2f57372d28dca427a0a927ed5b2b54e8dacb49718df3d915d69bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_268-1a, image: WYG0638/WYG0638-0222c.png}
body:
  text: 物異考臣等謹按馬氏通考於通典之外增五門物異其一也為卷二十為類五十有七其例以物之有妖有祥者標題曰異以物之但為妖者標題曰禍曰孽曰妖大抵濫采稗官喜談變怪所言既多龎雜失實而支離蔓衍旁及雨暘水火嵗凶地震之類是災而非異者亦一概濫載體例尤為不純夫傷於人者謂之災兆于物者謂之異唐書五行志曰災者被于物而可知者也水旱蝗螟之類是已異者不可知其所以然者也五石六鷁之類是已今考洪範庶徴于極偹極無皆謂之凶不謂之異而春秋鸜鵒來巢之類傳言異而不言災然則商羊兆雨肥􅖆兆旱樞星解而兆地震謂之曰異可也至于已雨已旱已震則其災既成宜列賑恤之條不屬占驗之科矣既以物異名考而博引諸災非其倫也至于河清井溢是水異也飛鳥信幡是火異也若波濤偶決失或在于防堤竈突不戒釁或生於婢媪而凡有水火皆稱物異有是理乎螟螣蟊賊周雅是詠非不經見之物故螽由天雨春秋異之書曰雨異雨非異螽也蝝以冬生春秋異之書曰生異生非異蝝也其餘書螟書螽傳皆不言記異而蜚不為災經即不書明其物之非異也馬氏以蝗螟之屬與豕禍蛇妖並列非經義矣他若造作圖讖宣布歌謡皆桀黠不軌之徒襲篝火狐鳴之智本無關于天道乃強附于鬼謀詩妖訛言並登物異又何其傎耶其尤悖者物異之例本妖祥並載者也而凡五色之氣皆謂之眚則周禮以五雲之物辨吉凶何必兼言吉乎又獨標嵗凶之名而不列豐登之目則春秋書無麥無禾足矣何必又書大有乎至其總敘之內既厯引歐陽修蘇洵鄭樵之説破漢志強配五行之謬妄而所列五十七目乃衍舊説而加詳炫博貪竒自相矛盾猶其小失矣二十四門之內此門實最不足遵然河圖載易鳳凰載書嘉徴既聖人所必致太戊祥桑武丁雉雊微眚亦治世所不諱古帝王視日書雲蓋誠凛凛我朝自列聖相承以來明天察地敬謹尤深實不可闕而不載故仍馬氏之名而不用馬氏之例謹就實録及各省通志所紀見聞稍異信而有徴者著于篇至符瑞之説久為聖朝所不尚故史館多不備書而國家重熙纍洽太和洋溢亦無所謂變怪之徵如前史所種種臚陳者故但以年月先後為次不復如馬氏瑣列門目必求其事以實之庶幾信以傳信共仰見欽崇天道之至意焉太祖高皇帝壬子十月辛酉朔大軍征烏拉告天祭纛有青白二氣指烏拉城北癸丑九月辛酉大駕至古勒城之野日兩旁有青赤二色祥光對照如門隨駕而行乙卯三月甲戍寅刻有黃氣亘天映徹上下至辰刻乃散四月戊申卯刻大駕駐蹕於牧竒地方有紅緑祥光二道夾日又有藍白光一道映日上如門隨駕而行天命元年八月黑龍江結氷成橋時逹爾漢侍衛扈爾漢碩翁科羅巴圖魯安費揚古統兵征東海薩哈連部駐營黑龍江南岸之佛多羅衮寨每嵗黑龍江及松阿哩烏拉河九月始冰是日丁巳我營對岸橫結冰橋一道長二里許廣六十餘步將士皆驚以為天助遂取薩哈連部內十一寨兵還前氷已解其西偏復如前結氷成橋我兵既渡而解三年正月丙子黎明黃氣貫月四月壬子夕有青黑氣二道東西亘天五月乙卯大軍征明有青赤白氣三自天下垂覆營左右上圓如門隨軍而行五十里方散九月甲寅寅刻東南有白氣亘天形如刀尾細而卷長十五丈廣丈餘凡十六日乃滅十月丙寅白氣見于東方尾指明國凡十九日而滅六年三月癸丑大軍征明夜行有青白二氣自西而東繞月暈之北至南而止天聰五年九月丁卯大軍征明錦州有青氣自天衝入敵營擊敵敗之天聰七年鵽鳩集於遼東遼東素無此鳥乃西北蒙古所産其色淡黃形如鴿爪如人足而有毛國人皆曰蒙古之鳥來至我國必蒙古歸順之兆云臣等謹按唐時鵽鳩入邉識者以為突厥入冦之兆既而果然所謂禽鳥得氣之先者也而是時鵽鳩集遼東後察哈爾額哲果來歸同一事而異其應可知天象靡常惟人所召在無德者則為妖在有德者則為祥天人感召之理有非可以術數推測者而自來五行諸志分别名目確謂某物為妖某物為祥若可按圖而索者非通方之論矣九年十一月拉木倫河獲黑狐有土默特者于拉木倫河遇黑狐獲之以獻黑狐産長白山迤東濱海赫哲費雅哈之地土人嵗以進貢非國內産十二月大內供佛水盂內氷結高盂寸許形如細箸崇德二年三月虎勒湖南平地湧泉是日壬午太宗文皇帝大駕駐蹕上都河源已刻上都河西虎勒湖南平地泉湧高五尺六年六月朝鮮國獲地中黃金朝鮮國慶尚道咸陽郡新溪書院之側每夜有光怪掘地得瓦罌一貯黃金二十四斤內有金片刻宜春大吉字罌蓋上刻一千年三字國王遣使進獻奉諭旨還之臣等謹按藏金出土本非物異然其光氣自騰銘文叶吉則實有若或啓之者蓋天佑聖朝上以示卜年之慶而下以堅屬國忠順之忱地合靈契非偶然也故敬録於篇以昭眷顧是年九月乙亥有白虹自巽至乾其形如雲又有黑虹自艮至兌其形如煙辛巳寅刻東方有金光大如斗內復有金光一道形如椽沖天而起順治元年六月庚午有白氣自西南至東北二年正月河南孟縣黃河清二日二月山西交城縣牛産犢遍生鱗甲又榆次縣産靈芝又江西廬山生瑞芝九本五月山西陵川縣新鄭書院産紫芝二莖又河道總督楊方興進瑞麥麥産山東濟寧州有三四岐至十岐者得旨時和年豐人民樂業即是禎祥不在瑞麥地方官當益知撫輯惠養元元副朝廷愛民德意臣等謹案嘉禾之篇見諸書序蓋孔子刪定所録也馬氏纂成周以後北宋以前嘉禾瑞麥之類凡三十四事總題曰榖異而竹米野穀附見焉皆前代史書稱為上瑞者也我世祖撫臨函夏亭育寰區導元氣之太和滌前朝之餘沴即位二載瑞麥旅生地寶天符響然丕應而宸𠂻謙抑却而勿居軫念民依倍申咨警煌煌寶訓垂示萬年是以列聖以來克承家法每逢嘉應謹凛彌深從無鋪張揚厲之事而四海臣庶亦皆仰見聖心一切瑞麥嘉禾草野或不盡聞于官司官司或不盡登于章奏其紀于史册者不過千百之一二職是故也然一莖一穗物理之常麥至兩岐禾逾九頴異乎常矣異乎常者固考物異者所不容略也故恭録諭旨見聖朝不崇符瑞之意而其事則仍從馬氏之例據實備載焉閠六月浙江錢塘江潮連日不至定國大將軍和碩豫親王多鐸既定南京進取浙江駐營江岸敵兵見之以為潮至必淹沒乃江潮連日不至驚為神助相率納欵八月浙江杭州府梅花大放栁生桃如栗十月木生介是年江南通州甘露降又降於蕭縣臣等謹按江南通志載此事不書月分敬附書此年之末後凡月分無考者皆倣此三年正月壬戍夜北方有赤光如火影良久乃散五月錢塘江水淺可涉大軍征浙東偽帥等營于江東岸我軍未能渡江忽江沙暴漲水淺可涉都統圖賴等䇿馬徑渡遂敗賊兵是年江南和州學宫産芝三十六莖又浙江餘姚縣甘露降於松又湖廣黃安縣山石驟長四年正月芝草生于河南嵩山巡撫吳景道表賀奉諭旨政教修明時和年稔方為祥瑞芝草何必稱竒五月庚戍有白氣起于西南長二丈餘七月福建延平府飛虎入城隍廟十一月山東濟陽縣獲文豹是年山西臨縣城堞火光熖發以物擊之即燃視之不燬又陜西咸陽縣渭水清又福建甌寧縣梅岐里桐樹葉化刀劍形臣等謹按順治初年朱聿鍵僣號延平新經戡定而明季土寇嘯聚者尚多餘孽未盡削平故餘沴猶為變怪飛虎見延平樹化刀劍見甌寧皆其地也然桐葉望秋先隕最易凋零實為不久之象示其兆于桐葉變亂之易平神告之矣五年陜西興平縣獲異獸興平河得一物色青黑頭角如鹿尾如馬而秃目下别有二竅深寸餘是年福建建陽甌寧二縣竹生米又江南蕭縣産芝三本六年九月陜西岐山縣潤德泉復見泉在縣西北十五里即古卷阿水相傳世治則出唐時嘗湧見于表奏明初復見後久涸至是湧出八年四月山西絳州泮池水香氣如龍腦五月江南丹陽縣麥秀雙岐十一月陜西靜寧州黃河清九年湖廣竹結實味甘可食十年二月山東曹縣夜有火光燭天大小不一三月乙亥午刻日有黃光照地四月浙江杭州府巨獸食虎餘杭諸鄉多虎患一日太􅀈山有巨獸高八尺長丈餘紫鬛白身黑尾逐虎食之虎患遂息是年江西贑州府産靈芝高二尺又江南含山縣生嘉禾一莖五穗十二年六月庚午北方有青黑雲氣變化如龍是年湖廣江華縣甘露降又直𨽻所屬榖多雙穗又湖廣辰州府鳥異辰州有鳥萬計色黑大如鳩自北而南所下處草為之赤時辰州尚為黔寇所據識者以為滅賊之兆又騶虞見於甘肅靜寧州有異獸遊於西北野白質黑文時謂騶虞十三年二月河南寧陵縣隕石時日方午空中有聲不絶黑氣如斗光芒如燈墜於寧陵如石硯重五十三兩撫臣以聞臣等謹按春秋僖公十六年隕石於宋五周內史叔興以為是陰陽之事非吉凶所生故物異之徴有異則兆災者彗孛出之類是也有災即為異者穀洛鬭之類是也有災而不為異者計倪論太陰所處金穰水毁木康火旱之類是也有異而不兆災者即叔興所論隕石之類是也蓋二氣摩蕩偶然凝結而下隕事非常見不得不謂之異而實非人事所關漢儒以讖緯説經務欲一一穿鑿舉天下之事悉歸於咎徴則謬且妄矣九月湖北黃州府教軍場有白氣起平地蜿蜒如龍向空而沒湖南有白光自東射西長數丈是年福建建陽縣井水自溢又雲南昆明縣竹結實如稻十七年河南新鄭縣生白雀又冬鴻雁至于雲南雲南舊無鴻雁至是千百為羣皆西去自後年年見之十八年雲南臨安府小白蝶羣飛蔽天月餘乃止是年雲南安寧縣甘露降于學宫古柏形如貫珠味如飴又江南定逺縣民家牛産麟康熙元年雲南師宗州白蝶羣飛如臨安是年江南建德縣學宫枯樹復生又雲南寧州田禾遍生雙穗三年八月福建邵武府學宫銀杏樹生火以水沃之不滅是年夏山東兖州府有蒼諸蟲蟲飛蔽天聲如流水形如蜣螂而差小色如金識者以為蒼諸臣等謹按蒼諸之名古書罕見通志稱識者以為嵗凶之兆蓋田家占驗之言也然聖朝欽若昊天勤求民寞察禨祥而偹豐凶恆不遺于昆蟲草木之細而是嵗兖州實有旱災其説亦似有徴者故謹録于篇凡篇中以微物而登載者例皆倣此四年湖廣永州府竹實如麥民以為食是年浙江永嘉縣露凝樹枝其甘如蜜五年四月江西南昌縣民家牛産麟是年鳯凰見于河南唐縣七年福建泉州府學宫榕樹生芝八年四月四川茂州麥秀七岐六月山西絳州夜見流火光明如晝飛入學宫明倫堂棟間更許乃隱是月樂平縣鳯凰山神泉自湧土人名靈瑞泉十一月河南寶豐縣楊公渠氷成梅花形九年正月朔廣東信宜縣儒學有五色祥光是年春山西榮河縣黃河清又山東濟南府趵突泉溢十年五月雲南有異鳥來大鳥見于昆明是年大水又見於劍川州其喙如鋤張喙則小鳥飛於喉中以炮擊之不動數日而去二十四年見於廣通縣足高四尺翼倍之十一年二月丁丑朔宣化府東山廟山泉自湧成河時大駕駐蹕東山廟廟舊有井易涸水不足用是日山泉忽湧成河人馬皆給十二年四月山西靜樂縣流火西行有聲是年江南鎮江府有大鳥如鳳毛羽五色羣鳥從之又山西長治縣生嘉禾一莖五六穗十三年五月甘肅寧逺縣有聲如雷墜地化為石十四年山西陽城縣鑿石得石龍陽城人侍郎張爾素家鑿石中有石龍一鱗甲頭角宛然刻畫長丈餘是年廣西慶逺土司家馬頭生兩肉角身有炎焰十六年三月四川順慶府甘露降味如飴四月又降秋又降十七年山西平陸縣木棉花如牡丹臣等謹案實録載是年八月逆藩吳三桂將死有犬升其案而坐三桂悖逆亂常自干天討當豕突將踣之日有犬妖為禍之形於逆藩為覆族之徴於國家即為平賊之兆用附識其事以見助順殄逆天道彰彰云二十年雲南有異象由普洱入思茅舊道甚險辛酉嵗有異象出于普夷人逐之象從一高嶺行人步從之遂成通道今尚有象迹是年江南蒙城縣麥秀五岐二十一年陜西平涼縣産芝高尺餘大如盤盂五色俱偹是年江西瑞金縣甘露降徑一里許閲四十餘日二十二年六月師征臺灣有鹿耳門潮湧之異大軍進取臺灣鹿耳門險隘難入兵至潮湧舟隨潮進遂平之十一月山西蒲州至平陸黃河清十有五日是年福建臺灣水始冰臺灣土氣炎熱從無霜雪是嵗八月始入版圖遂見雪冰傳為異事是年江南貴池縣竹實如麥又雲南蒙化府有異鳥鳥頭如鴿項有紅毛尾如帚火光星落二十三年江南崇明縣海一日三潮二十四年山西廣靈縣民家牛産麟又山東厯城等縣生嘉禾一莖五六穗是年黑龍江有羣鹿之異是時征雅克薩城之兵駐黑龍江糧食匱乏忽有鹿數萬自山趨下軍人取之獲五千餘以為奏功之兆二十六年貴州畢節縣白蛾羣飛有鳥啄食之又河南寶豐縣鸇雀食蝗二十八年四月雲南曲靖府李樹菜花皆結豆是年浙江鎮海縣民家牛生犢遍體肉鱗二十九年七月貴州婺川縣陸地生蓮花又生樹杪三十年正月朔江南武進縣木介七日三十一年正月朔江南木介三十二年江南合肥縣民家牛産麟三十三年秋福建漳浦縣晚稻方插吐穗結實三十五年正月江西雩都縣學宫桂樹盛花是年大軍西征有靈泉忽湧之異是嵗大駕親征噶爾丹四月至塔爾竒喇掘井無水及駕至清泉忽湧導成巨流人馬資用不竭衆皆大悅五月至燕圖庫列圖地方乏水侍衛等過一平山忽泉源湧出水極甘美充用有餘次年二月駐驆李家溝地方溝水甚少是日水從山溝湧出俄頃深二三尺鄉人驚異次日至輦鄢村山嶺險峻僅有二井大駕甫之南山之下見有水痕衆趨視之地中各處泉湧頃刻洋溢衆咸歡呼曰如此神異誠所以佑聖主也三十七年十一月福建龍巗州甘露降三十八年江西贑縣産紫芝七莖高三尺餘又江南石埭縣學宫古檜結毬大逾斗三十九年秋直𨽻巡撫疏進嘉禾四十一本是年甘肅鎮畨州之白亭海水潮丈餘井水皆溢又江南武進縣黑雕集于郭外形如人翅廣丈餘四十二年春山東濟南府舜井水溢四十三年雲南嶍峩縣生嘉禾四十四年江南六合縣古松結毬如斗者二團圞玲瓏經年不朽四十五年陜西靜寧州白楊開花如蓮四十七年五月四川綿竹縣麥穗六岐七月山西交城縣署牡丹盛開是年山東濰縣牛産麟是年山東巡撫奏進嘉穀自二三穗至十穗不一四十九年夏江西興國縣官舍桑樹生黃芝大如盤徑二尺閲三年每年長一臺五十年秋山東滋陽縣産瑞榖雙穗成畝五十一年夏山西臨汾縣瑞麥遍野一莖多至八九穗又秋山東闔省進嘉禾雙穗者三千六百本是年雲南劍川州竹花結實甘淡可食五十二年夏山西平陽府産瑞芝五十三年江南徐州麥秀四五岐自是連年皆稔五十六年四月陜西固原州黃河清又湖南産嘉禾五十八年江南涇縣竹生實民採食之六十年浙江臨海等縣箭竹結實為粉可食是年湖廣益陽縣署甘露降于叢竹又湖南長沙府湖湘縣書院産芝雍正元年四月孝陵蓍草生總兵官范時繹奏進傳示廷臣宣付史館大學士等奏孝陵新産蓍草由皇上孝治之感請宣付史館上諭曰孝陵新産蓍草皆由世祖聖祖功德隆盛所致非朕孝思所能感格諸臣陳奏剴切著照所請行八月河南山東二省麥榖兩岐雙穗蜀黍一幹四穗又內池蓮房同莖分蒂諸瑞疊呈宣付史館是年湖廣江華縣學宫生瑞芝雲南新興縣産五色芝二年七月江南松江府飛鴉食蝗八月藉田産瑞榖一莖二三四穗者十八本豐澤園御種稻田生瑞稻一莖二三四穗者二百餘本大學士等奏藉田內既見瑞榖之登今御苑中復覩嘉禾之獲此皆皇上敬誠所感仁孝所孚上瑞嘉祥請宣付史館從之三年春江南安東縣黃河清是年藉田産瑞榖又湖廣永州府甘露降於松上四年藉田瑞榖一莖雙穗至九穗者共五十本豐澤園稻榖雙穗至四穗者二百九十餘本五年所産亦同皆命宣付史館內閣奉諭旨國以民為本民以食為天朕即位以來舉行耕藉之禮殫竭精誠為民祈榖于上帝乃雍正二年三年藉田特産嘉禾有至一莖九穗者朕心亦以為偶然之事今據府尹劉於義進呈今嵗藉田所産自一莖雙穗三穗以至八九穗皆碩大堅好異於常榖朕見之心甚慰悅特令宣示廷臣並非以此為祥瑞誇耀於衆也蓋實有見於天人感召之理捷於影響朕以至誠肫懇之心每嵗躬耕藉田以重農事即蒙上天降鑒疊産嘉榖以昭休應似此八穗九穗之榖豈人力所能強為亦豈人君所能強之使有乎十二月陜西河南山東江南各省黃河澄清守臣先後奏報宣付史館河道總督齊蘇勒副總河嵇曽筠漕運總督張大有河南巡撫田文鏡山東巡撫塞楞額陜西巡撫法敏等先後奏報黃河自陜西府谷縣厯山西河南山東至江南之桃源縣河水澄清上下三千一百餘里綿厯三旬有餘陜西山西始自四年十二月初八日至五年正月十三日凡三十有六日河南山東始自四年十二月初九日至五年正月十日凡三十有一日山東單縣亦始于十二月初九日至二十二日凡十四日江南始自十二月十六日至二十三日凡七日俱以漸復舊其清自上而下復舊自下而上諸王大臣奏稱為從來未有之瑞懇請升殿受賀欽奉諭旨以數年之中休徴疊見稽諸史册咸稱福慶而受寵若驚不以為喜實以為懼惟有君臣益加勉朂一德一心以承天眷若允行慶賀則沿襲頌美之虛文大非誠敬之素志専遣祭告景陵遣大臣致祭河神內外大小官員各加一級羣臣恭請宣付史館御製碑文勒石奉諭允行是年河南産瑞榖有多至十三穗者五年景陵地方産嘉穀又蜀黍一莖十一穗是嵗十月浙江進瑞穀大同鎮臣奏鄂爾坤岡地方産瑞麥一莖十五穗特諭停止進奏六年十月景陵寶城生瑞芝羣臣表賀宣付史館諸王大臣等奏言臣等敬觀景陵寶城所産瑞芝五本光彩輝燦五色鮮潤仰惟聖祖仁皇帝盛德崇功超越隆古深仁厚澤普被羣生我皇上純孝性成至誠昭格今兹景陵寶城特産芝英宣付史館昭示萬世奉諭旨朕以實心實政為本不言符瑞但今芝草生於景陵寶城此我聖祖仁皇帝昭示嘉祥景象朕心不勝感慶準照所請宣付史館是年冬江南松江府甘露降七年七月浙江歸安縣民家萬蠶同繭浙江總督性桂疏報湖州府歸安縣民王文隆家育蠶二十七筐有九筐萬蠶同結瑞繭一幅長五尺八寸寬二尺三寸自然成就不由人工八月奉諭旨前據浙江署督性桂署撫蔡仕舢奏進湖州居民家萬蠶同織瑞繭一幅父老稱為從來未有之竒朕恐小民圖利望恩或用人工造作而成因令體訪確實勿為所欺昨性桂蔡仕舢等於本地詳加驗看訪察實係自然成就具摺覆奏廷臣等以蠶桑織絍乃衣被之大原養民之切務今浙江有此瑞應則小民溫暖可期咸為國家稱慶朕素不言祥瑞數年以來每遇休徴必倍加乾惕警戒所頒諭旨至再至三朕愛育元元務期普天率土之人同沾實惠一時希有之物不足以禦飢寒倘蒙上天俯鑒悃誠錫福黎庶蠶桑普盛衣食充盈乃朕心之所謂祥瑞也十月景陵聖德神功碑儀柱之右瑞芝産於石上總理陵寢事務大臣等具奏奉諭旨朕從來不言祥瑞惟是建立景陵聖德神功碑甫經勒石告成而瑞芝即産于碑亭之右仰見上天特賜嘉祥以表揚我皇考功德之隆盛朕心不勝慶慰是年貴州都勻府苗疆芝草叢生又貴州新闢苖疆産嘉禾一莖十五六穗刋圖頒示天下又雲南趙州白巗地出甘泉八年正月鳳凰見於房山縣直𨽻總督唐執玉奏報奉諭旨上年據散秩大臣尚崇􅘙奏稱天台山民李萬良等呈報十一月十三日黎明見山中有一神鳥高五六尺毛羽如錦五色俱偹所立處羣鳥環繞北向飛鳴等語朕以邉地居民所見事屬渺茫將所奏發還未曽宣示廷臣昨據總理石道事務散秩大臣常明侍郎宗室普太奏稱石工監督司官田周呈報正月二十日在房山縣石梯溝山中見瑞鳳集於峯頂五色俱備文彩燦然工匠樵木居民人等約千有餘人莫不共見又據總兵官管承澤及順天府府尹孫嘉淦等所奏亦皆相同朕亦俱未宣示廷臣可以知朕心矣今據總督唐執玉繕本具奏朕思古稱鳳凰乃王者之嘉祥朕撫躬自問功德涼薄不足以致鳳儀之上瑞此事猶疑而未信也是月景陵寶城山上産靈芝三本羣臣表奏宣付史館諸王大臣奏上奉諭旨景陵寶城山上首春産瑞芝三本諸王大臣等奏為朕純孝之所感孚朕撫躬自問生平事我皇考不敢當純孝之名但誠敬之心數十年如一日自御極以來不但一言一事仰體聖心而後見諸行事即夢寐之中一念舉發從無有知其不合聖意而敢存胸臆者諸王大臣等稱朕以皇考之心為心此實朕之悃忱至云朕以皇考之政為政朕之才力逺不逮我皇考舉凡宣猷敷政之間雖黽勉效法究不能企及於萬一何能致芝草之嘉祥諸臣以此歸美于朕朕不居也實因皇考之聖德神功際天蟠地深仁渥澤積厚流光上天特欲顯示天下臣民是以數年之中三見芝英於陵寢以今之厯霜雪而挺生當首春而呈瑞稽之史册更屬罕聞朕感上天照示之洪恩叨皇考貽謀之景祿慶幸歡欣不敢不宣布於衆庶使天下後世臣民知上天之眷佑皇考與皇考之垂裕萬年者即瑞芝一事明顯昭著信而有徴固如是也著照所請行宣付史館是年湖南産嘉禾萬餘本九年六月雲南昭通府赤蟲食稻羣鴉啄之是年四川南川縣生瑞榖一本十二莖一莖三穗又浙江杭州府獲白鹿十年山東巨野縣民家牛産麟山東巡撫嶽濬疏報奉諭旨山東地方前嵗被水百姓不獲寧居去夏今春雨復愆期朕遣官發粟賑恤多方幸未致流離失所即京師去夏今春晴雨亦不均調西北兩路不得已用兵征戍將士露處于外偹極勞苦朕心戒懼修省但知感上天垂象示警之恩不敢望嘉祥之誕錫今聞瑞麟産於東省實增愧悚該撫奏請詔付史館宣示中外皆屬虛文將朕朝乾夕惕對越上天之悃誠曉諭天下臣民共知之十一年春廣西鬱林州瑞泉見詳見羣祀考十二年夏山西介休縣瑞泉見詳見羣祀考是年湖廣鎮筸紅苖地方瑞榖遍野又陜甘邉外高臺地方生瑞榖一穗之上重生五六穗十三年八月直𨽻遵化州及保定縣瑞穀生內閣奉諭旨據直𨽻總督李衛奏遵化州陵寢垣外地畝及保定縣藉田所産瑞榖多種並有一本九穗者朕覽之不勝欣慶朕常言地方年穀之豐歉在乎督撫居官之感召十餘年留心體察厯厯不爽至於京師畿輔之地則內觀刑部讞獄之公私外觀督撫政令之得失以為雨暘休咎之本總之感召之責固在督撫而用人之責則在於朕此中是非得失朕實與督撫共之所望內外大臣官員等時時警戒刻刻提撕信天道之昭垂凛鑒觀之不逺則豐亨有慶災沴潛消萬民共受其澤矣朕素不言祥瑞久已降旨不令各省進獻嘉禾今因瑞穀産於陵寢地方感天祖皇考之昭示福應信而有徴特賜廷臣共觀並將朕敬慎乾惕之意重加宣諭期與諸臣共勉之乾隆四年陜西西安鳳翔漢中同州等府産嘉禾五年六月河南巡撫奏進榖穗盈尺七月直𨽻總督奏進如河南御製詩記之十一年七月直𨽻總督奏進穀穗長尺餘宣示廷臣是年浙江杭州府野蠶成繭十二年正月內閣奉諭旨浙江巡撫常安奏杭州諸府桑間自生蠶繭可取以織紬名曰天蠶蓋以為瑞也朕謂此范成大詩所謂野蠶可繅而常安未之知者然不假人力用佐女紅則信乎授衣之助十四年九月山東巡撫進瑞穀圖十六年春國子監古槐重榮國子監西講堂前古槐一株為元臣許衡所手植嵗久已枯是嵗重榮枝葉鬱茂大學士蔣溥繪圖以進御製詩紀之臣等謹按百穀草木麗乎土故草木之榮悴視乎地氣之盛衰和氣所鍾生機普暢固位育之實理也我朝自列聖以來不言祥瑞我皇上欽崇永保昭受天申惟期實政實心敬承眷祐尤不尚鋪張揚厲之虛文故不特瑞麥嘉禾視為恆事即古槐重茂廷臣所動色稱異者亦惟因事賜題俯答慶忭而未常稍存矜詡之心然謙沖者聖帝之懷紀載者史臣之職信而有徴之事不可闕略而不書故備紀其實敬著於篇焉是年秋蒙古台吉畢力衮逹賴獻瑞麅麅色純白如雪目睛如丹砂按抱朴子稱鹿夀千嵗滿五百嵗則色白此殆其類次年秋復獲于巴顔和羅圉中均有御製詩紀之二十七年七月嘉峪關外地湧靈泉嘉峪關外路多戈壁從前並無水泉大兵經過鑿井俱得甘泉水勢騰湧普濟軍行奉旨照康熙年間拖犁建廟之例春秋祀之詳見羣祀考四十年冬粵東總督李侍堯奏進平定合符御製詩紀之臣等謹按玉符質瑩而製巧上下各一鐫小篆文上曰平定下曰合符逺自南交浮海而至先是安南王城之西南界有地名順化久為阮姓竊據稱順化王與奉朔受封之黎姓國王為世仇是嵗粵民有私越邉界至彼乘亂劫其王子財貨逃回內地者有司執之籍其家因得此玉隨牘奏進適當王師濯征金川刻日奏凱之時而斯符適至仰惟睿謨廣運炳燭幾先寰海效珍丕應徯志先事之徴有昭然不爽者矣四十一年夏六月山東巡撫楊景素奏進泰安縣雙穗榖御製詩紀之臣等謹按大有書於春秋屢豐咏于周頌凡以六府孔修則九榖咸殖固自然之徴應况當萬寶告成之時有瑞榖嘉禾之異實堅實好充溢倉箱豐樂之符非偶然也洪惟列聖相承無逸作所溥美利於寰區皇上懷保羣生九功惟敘慶盈寧於海寓是以太和翔洽上而雲物呈祥下而動植咸若而九穗雙岐疊呈瑞應尤田夫野老皆知為瑞者歡騰四野章奏九重蓋猶是吹豳鼓蠟之淳風非襲頌揚之故事也謹具載於篇亦以著休徴之協應云皇朝文獻通考卷二百六十八
