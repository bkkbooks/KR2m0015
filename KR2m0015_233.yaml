body:
  text: 欽定四庫全書皇朝文獻通考卷二百三十三經籍考二十三集别集正誼堂集十二卷張伯行撰伯行見史類臣等謹按伯行踐履篤實持守醇正其服官清節具著一時故能仰邀宸契平生傚法大抵以陸隴其為歩趨惟學問則尚有未逮耳鶴侣齋集三卷孫勷撰勷字子未一字予未號峩山又號誠齋徳州人康熙乙丑進士官至大理寺少卿終通政司叅議寶宸堂集四卷張希良撰希良見經類崑崙山房集三卷張篤慶撰篤慶見史類匡山集六卷王沛恂撰沛恂字書巗諸城人官兵部主事綺樹閣稿一卷安䈯撰䈯字書士夀光人東湖文集三卷朱璘撰璘字青巖常熟人官至南陽府知府懐清堂集二十卷湯右曾撰右曾字西崖仁和人康熙戊辰進士官至吏部右侍郎兼翰林院掌院學士臣等謹按國朝以來浙右之以詩名者朱彛尊後即推右曾雖學問根柢未能方駕于朱然才足肩随誠近時之嶄然獨出者康熙五十二年仰䝉聖祖仁皇帝垂問其詩掌院學士揆敘録右曾所作文光果詩上呈睿覽並䝉賜和宸章至今輝煌簡首詞臣謳詠得邀特達之知實為千古之至幸矣紺寒亭文集四卷詩集十卷趙俞撰俞號蒙泉嘉定人康熙戊辰進士寒村集三十六卷鄭梁撰梁字禹梅慈谿人康熙戊辰進士改庶吉士官至髙州府知府梁自述曰陳師道年三十一見黄魯直盡焚其稿而學焉梁見黄梨洲先生時亦三十一故詩文皆以見黄稿為冠雙雲堂文稿六卷詩稿六卷范光陽撰光陽字國雯號筆山鄞縣人康熙戊辰進士改庶吉士官至延平府知府藜乘初集一卷二集二卷劉以貴撰以貴字滄嵐濰縣人康熙戊辰進士王道炷跋曰以貴文語意獨造刻鑿揉深嶢山文集四卷詩集一卷田從典撰從典字克五陽城人康熙戊辰進士官至文華殿大學士諡文端儲大文序曰文端文多散佚此乃其子暨族屬所蒐輯者故僅止于此潘中丞集四卷潘宗洛撰宗洛字書原號巢雲又號垠谷宜興人康熙戊辰進士官至湖南巡撫臣等謹按卷末附儲大文所作宗洛傳稱其古文詞上宗史記詩由玉溪詣少陵皆以千古第一人推之是亦揚人之善而過其實已時用集無卷數陳訏撰訏見史類訏自序曰家塾署聯用東坡語云春秋古史乃家法詩筆離騷亦時用故手訂正續集遂以時用標題善卷堂四六十卷陸繁弨撰呉自髙註繁弨字拒石錢塘人自高字若山桐城人官翰林院待詔臣等謹按國朝以四六擅長者陳維崧吴綺最為著名考王晫今世說曰繁弨自計儷語為海内少雙葢自時陳吳謝世罕有與之争長者耳湖海集十三卷孔尚任撰尚任見史類王士禎序曰尚任從工部侍郎孫在豐治下河時得漢銅尺一上有文曰慮虒銅尺漢初六年八月十五日造後又得一尺定為司馬文正布帛尺其自作漢銅尺記周尺考極精核幸趺草三卷黄百家撰百家見子類釀川集十三卷許尚質撰尚質字又文山隂人宋祖昱序曰尚質少業詩亦喜飲指邑中所謂沈釀川者自號因以名集鈍齋文鈔七卷楊兆嶦撰兆嶦字又平瑞金人兆嶦自序曰生平著文三百餘首汰其三之二授諸梓焉臣等謹按兆嶦自定其所著文陶汰謹嚴今觀其文尚不免冗襍之弊則張尚瑗序中稱其文似歸有光亦未免阿好矣笏峙樓集五卷張祖年撰祖年見子類恕谷後集十卷續集三卷李塨撰塨見經類臣等謹按集首第一篇為送黄宗夏序後有題曰此王崑繩改本也恕谷初學八大家崑繩言當宗秦漢章法訂此恕谷後謂唐宋不如秦漢秦漢不如六經於文法一宗聖經題曰後集云在陸草堂集六卷儲欣撰欣見經類道榮堂文集六卷陳恪勤集三十九卷陳鵬年撰鵬年字北溟號滄洲湘潭人康熙辛未進士官至兵部侍郎河道總督諡恪勤孫勷序曰滄洲自為牧令即受聖祖仁皇帝特達之知著述甚富有詩若干卷行世既殁其子學田等又取其文刋布之咸齋文鈔七卷查旭撰旭字咸齋海寧人康熙癸酉副榜貢生氷齋文集四卷懐應聘撰應聘字莘皋秀水人清端集八卷陳璸撰璸字又焕一字眉川海康人康熙甲戍進士官至福建巡撫諡清端冶古堂文集五卷吕履恒撰履恒字元素號坦庵河南新安人康熙甲戌進士官至戸部侍郎雪鴻堂文集四卷李鍾璧撰鍾璧號鹿嵐通江人康熙丙子舉人官平南縣知縣臣等謹按鍾璧之父名蕃有雪鴻堂集十八卷今鍾璧復以是名其例實為剏見嘗考文獻通考載吕本中吕祖謙俱稱東萊集然祖謙集别加太史字又洪巗虎及其子希文俱名軒渠集而希文亦别加續字非竟全無區别者也克念堂文鈔二卷雷鐸撰鐸字伯覺浦城人康熙丙子舉人陜西通志曰鐸事繼母孝負米他郡以養遇水幾溺嘗終日不食不致母缺于供家雖貧養從兄弟及寡姊妹不少懈朔望聚族人習禮講法以相勸勉臣等謹按鐸至性過人事母之外偶渉筆墨故著述寥寥然其篤行足以自傳不必以文重也湛園集十卷湛園未定稿六卷真意堂文稿一卷姜宸英撰宸英見史類臣等謹按宸英未入明史館以前自輯者為湛園未定稿大興黄叔琳重編為十卷其文閎肆雅健有北宋人之遺風澄懐園全集三十七卷張廷玉撰廷玉字衡臣號硯齋桐城人康熙庚辰進士官至保和殿大學士諡文和東山草堂文集二十卷詩集八卷續集一卷邱嘉穗撰嘉穗見經類古劍書屋文鈔十卷吴廷禎撰廷禎字山掄長洲人康熙癸未進士官至左春坊左諭徳臣等謹按廷禎恭逢聖祖仁皇帝南巡以舉人召試䝉賜御書古劍篇敬以名屋其孫士端刋是集成因即取以名之績學堂文鈔六卷詩鈔四卷梅文鼎撰文鼎見史類臣等謹按文鼎精於推算詩文非所擅長而測騐之餘亦能兼及著述輯成是編嘗于康熙乙酉聖祖仁皇帝南巡恭迎道左荷䝉召對並御書績學叅微四字賜之因以名堂并名其集則其詩文足垂不朽疇謂一藝之微不足膺千古之榮遇乎望溪集八卷方苞撰苞見經類苞自述曰周秦以前文之義法無一不備唐宋以後歩趨繩尺而猶不能無過差是以所作上規史漢下仿韓歐不肯少軼於規矩之外集虚齋學古文十二卷方楘如撰楘如見楚詞類蓼村集四卷王苹撰苹字秋史厯城人康熙丙戌進士雪鴻堂文集二卷李鍾峩撰鍾峩號芝麓通江人李蕃之子康熙丙戌進士官翰林院檢討臣等謹按是編亦如其兄鍾璧以父集為名首也剏見之例殊不可解王石和文集無卷數王珻撰珻字石和又字韞輝盂縣人康熙丙戌進士官翰林院檢討十峰集五卷徐基撰基字宗頊華亭人由貢生官訓導臣等謹按是集自詩賦古文及填詞凡洋洋纚纚多至數千言者皆集前後赤壁賦中字以成文竒巧之思亘古未有末卷仿古迴文諸體亦錯綜盡變海昌陳元龍集聖教序中字以序之可謂勁敵然基以畢生之力成此一集敝精神于無用之地固大雅所弗尚若元龍之序不過偶一為之以示才人狡獪之技則亦何不可之有二希堂文集十二卷蔡世逺撰世逺字聞之漳浦人康熙己丑進士官至禮部侍郎諡文勤臣等謹按世逺學詣深醇踐履篤實平日究心理學不以文藝為專門而文亦理醇詞正具有本原觀其自作二希堂記云學問未敢望朱文公庶幾其真希元乎事業未敢望諸葛武侯庶幾其范希文乎則務以古賢自期不規規於淺近之業可見卷首有雍正庚戌皇上在藩邸時親製序文一篇仰見聖主賢臣結契在學問精微之際有非偶然者迨我皇上踐阼以來眷念舊學特舉其文以示凖繩其他著述並命録入四庫全書以垂久逺每䝉詔諭字而不名寵禮之隆實為前古所未有是集凡序四卷記一卷傳一卷論說書共二卷墓表志銘行状共一卷祝文祭文共一卷雜著一卷其耕耤賦等六萹所以志榮遇故冠于簡端不入卷數云退谷文集十五卷詩集七卷黄越撰越字際飛康熙己丑進士改庶吉士圭羙堂集二十六卷徐用錫撰用錫字壇長宿遷人康熙己丑進士官翰林院編修吾廬遺書無卷數陶成撰成見子類改堂文鈔二卷唐紹祖撰紹祖字次衣江都人康熙己丑進士由庶吉士改刑部主事官至湖州府知府入為刑部員外郎師經堂集十八卷徐文駒撰文駒字子文鄞縣人康熙己丑進士墨瀾亭集無卷數帥我撰我字備皆號簡齋奉新人康熙辛卯舉人二水樓文集十卷詩集十八卷李如旻撰如旻字覆如臨川人康熙癸巳進士官中書舍人朱圉山人集十二卷鞏建豐撰建豐字子文號渭川又號介亭伏羌人康熙癸巳進士官至翰林院侍讀學士練溪集五卷傅米石撰米石字立元鉅野人康熙癸巳舉人若庵集五卷程庭撰庭字且碩號若庵歙縣人嗜退山房稿五卷帥仍祖撰仍祖字宗道號介亭山人奉新人空明子文集六卷又二卷詩集十卷又八卷襍録一卷詩餘一卷張榮撰榮字景桓華亭人榮自序曰生平共得古文襍作六百餘首詩三萬餘首詩餘一千五百餘首歌謡三百餘首康熙甲午檢出盡付祖龍僅存三十分之一雲溪文集五卷儲掌文撰掌文字曰虞一字越漁宜興人康熙丁酉舉人官四川納溪縣知縣臣等謹按是集又名雲溪随筆雲溪者納溪之舊名也近道齋文集六卷詩集四卷陳萬策撰萬策字對初一字謙季安溪人徙居晉江康熙戊戌進士官至詹事府詹事終侍講學士白田草堂存稿二十四卷王懋竑撰懋竑見子類莊元仲集一卷荘亨陽撰亨陽見史類緑蘿山房文集二十四卷詩集三十三卷胡浚撰浚字希張號竹巖會稽人康熙庚子舉人存硯樓文集十六卷儲大文撰大文字六雅宜興人康熙辛丑進士官翰林院編修蓄齋初集十六卷二集十卷黄中堅撰中堅字震生吴縣人冷士嵋序曰震生少負文名志期逺大有不可一世意中嵗遭無妄厯艱危憂患幾十年所雖困于時然年未艾即以明經荐人勸之仕謝不應耑心古學惟以著述自娱秋塍文鈔十二卷三州詩鈔四卷魯曾煜撰曾煜字啟人别號秋塍會稽人康熙辛丑進士改庶吉士乞養親歸最古園二編十八卷羅人宗撰人宗字紫蘿湖南桃源人康熙辛巳進士官至監察御史陸堂文集二十卷詩集十六卷續詩集八卷陸奎勲撰奎勲見經類􅝓堂集六十一卷黄之雋撰之雋字石牧號􅝓堂華亭人康熙辛丑進士官至右春坊右中允臣等謹按之雋才華富贍記誦亦淹博其持論之正則排陸王而尊程朱然好為游戲之文又往往不能割愛譬之陸機大有才多之患其號􅝓堂者嘗游浯溪愛􅝓亭之勝取以名堂而因自號焉小蘭陔集十二卷謝道承撰道承字又紹號古梅閩縣人康熙辛丑進士官至内閣學士兼禮部侍郎崇徳堂集八卷偶存草無卷數王植撰植見經類墻東雜著一卷王汝驤撰汝驤字雲衢一曰云劬又自書曰耘渠金壇人貢生官通江縣知縣臣等謹按汝驤制藝為世所推重是編乃所作古文凡二十一首節取後漢王君公事故以墻東為名改庵偶集十卷仲宏道撰宏道字開一桐鄉人康熙中舉人官知縣與梅堂遺集十二卷佟世思撰世思字儼若正藍旗漢軍人䕃生官思恩縣知縣金闇齋集十二卷金敞撰敞字廊明號闇齋武進人前溪集十四卷唐靖撰靖字聞宣武康人康熙中諸生有懐堂詩文集一卷田肇麗撰肇麗字念始號蒼厓徳州人由䕃生官户部郎中静便齋集十卷王曾祥撰曾祥字麐徴仁和人康熙末諸生青嶼稿存無卷數張安絃撰安絃字琴父烏程人蔗尾詩集十五卷文集二卷鄭方坤撰方坤見經類臣等謹按方坤之文根柢於六朝喜作儷體其詩洋洋纚纚凌厲一切尤喜屢疊澁字險䪨以見出竒無窮才多之患所不免焉涵有堂詩文集四卷游紹安撰紹安號心水福清人雍正癸卯進士官至南安府知府繭甕集八卷續編一卷附録詩餘一卷紀逵宜撰逵宜字肖魯文安人雍正癸卯進士官至刑部員外郎逵宜自序曰所作有集圜集閩游集龍城集楚江集甌越集辟雝集見山樓集閒雲集晩年刪定為此編已山文集十卷别集四卷王歩青撰歩青見經類臣等謹按是集原名竹里草堂遺稿雷鋐督學江蘇從其子士鼇取而刪定之即其别號改題今名為文集十卷其别集四卷皆時文選本之序論乃士鼇所附録司業文集四卷陳祖范撰祖范見經類果堂集十二卷沈彤撰彤見經類松泉文集二十卷詩集二十六卷汪由敦撰由敦號謹堂錢塘籍休寧人雍正甲辰進士官至吏部尚書諡文端臣等謹按由敦遭際昌期矢音賡唱每于簮筆之餘仰承指授故其文具有本原詩格亦進而彌上兹集為其子户部侍郎承霈所編荷蒙御製詩章弁冕簡首榮傳藝苑實千古詞臣所罕匹者已王艮齋集十四卷王峻撰峻字次山常熟人雍正甲辰進士官至江西道監察御史笠洲文集十卷瞿源洙撰源洙字時夏荆溪人雍正甲辰副榜貢生授當塗縣教諭源洙與湯學海書曰㒒拈題下筆時意多而不能割行文往往散緩無力閒常取古人之文而熟思之其高處在能棄棄之也精則出之也粹矣鹿洲初集二十卷藍鼎元撰鼎元見史類小山全稿二十卷王時翔撰時翔字臯謨一字抱翼號小山鎮洋人雍正戊申由諸生薦舉授晉江縣知縣官至成都府知府就正草一卷徐璽撰璽號雷溪進賢人雍正己酉㧞貢生松源集無卷數孫之騄撰之騄見經類四焉齋文集八卷曹一士撰一士字諤庭號濟寰上海人雍正庚戌進士官至兵科給事中花語山房詩文小鈔一卷附三重賦一卷燕京賦一卷金管集一卷顧成天撰成天見楚詞類臣等謹按雍正庚戌辛卯二年成天侍值内廷時得詩六十八首文二十三首輯為是集花語山房者苑外直廬之名附賦二卷則其未通籍以前所作内三重賦一篇嘗於聖祖南巡恭録進獻金管集者蔡嵩所摘選皆有闗世教之作冠豸山堂文集三卷童能靈撰能靈見經類桑􅌢甫集八十四卷桑調元撰調元見經類柯椽集一卷周宣猷撰宣猷宇辰逺長沙人雍正癸丑進士官至浙江鹽運通判松桂讀書堂集八卷姚培謙撰培謙字平山華亭人芝壇集二卷張鵬翼撰鵬翼見史類慎獨軒文集八卷劉青霞撰青霞字嘯林襄城人雍正中諸生王心敬序曰青霞愛司馬遷班固書未嘗釋手故文頗似之孱守齋遺藁四卷姚世鈺撰世鈺字玉裁號薏田歸安人全祖望跋曰薏田之學私淑義門墨守太堅在亭叢藁二十卷李果撰果字碩夫號在亭長洲人果自述曰弇州北地文古而患乎似義烏延陵文真而患乎淺欲救似與淺之病惟在讀書窮理二須堂集二卷丁詠淇撰詠淇字瞻武號菉濵居士錢塘人香域内外集十二卷釋敏膺撰敏膺蘇州花山翆巗寺僧敲空遺響十二卷釋如乾撰如乾字憨休四川人主陜西興善燉煌等寺月湖賸稿一卷王樑撰樑見子類後海書堂遺文二卷王孝詠撰孝詠見子類藍户部集二十六卷藍千秋撰千秋字長青宜黄人官至盛京户部員外郎豐川全集二十八卷豐川續集三十四卷王心敬撰心敬見經類凡例曰康熙丙申刻有正續集二十八卷自丙申至乾隆戊午與當代大人君子相酬答及與門人子弟講說辨論者視前刻倍多今裒成三十四卷臣等謹按凡例既云丙申已刻有正續集是三十四卷乃再續之本矣然二十八卷實無正集續集之分則未審其故也萬青樓詩文殘編一卷邵昻霄撰昻霄見子類隠拙齋集五十卷沈廷芳撰廷芳見經類黄静山集十二卷黄永年撰永年字静山江西廣昌人乾隆丙辰進士官至常州府知府史復齋文集四卷史調撰調字匀五號復齋晩號雲䑓山人華隂人乾隆丙辰進士官仙遊縣知縣趣陶園集十五卷魯之裕撰之裕見史類臣等謹按是編目録為式馨堂集與所作急溺瑣言同葢式馨堂乃集之總名此則其分題之名耳玉芝堂集九卷邵齊燾撰齊燾字荀慈昭文人乾隆壬戌進士官翰林院編修燕川集六卷范泰恒撰泰恒字無厓河内人乾隆乙丑進士改庶吉士外補崇義縣知縣凝齋遺集八卷陳道撰道字紹洙號凝齋江西新城人乾隆戊辰進士浩波遺集三卷鄭際熙撰際熙字大純侯官人乾隆丙子舉人際熙自述曰能詩者未嘗先言法而自中法且神而明之變化以自成其法未有按一定之科條而譜之舍其性情才力俯首以從法也强恕齋文鈔五卷張庚撰庚見史類西澗草堂集四卷閻循觀撰循觀見經類放鶴村文集五卷張侗撰侗字同人一字石民諸城人臣等謹按侗文乙乙冥冥不離乎公安竟陵之窠白然方邁作侗傳稱其有孝行多竒節則其人足以自傳矣古雪堂文集十九卷王令撰令字仲錫渭南人㧞貢生官至廣東按察使薪槱集四卷許昌國撰昌國字仔賡原字一清荆溪人嵗貢生璞堂文鈔十一卷許重炎撰重炎字少來荆溪人昌國之子臣等謹按昌國之子皆篤行好修之士故集中多講學之文亦頗切實近理迥異空談性命者流于忠孝節義言之尤切可謂務本之學固不必以詩文見長也彚書六卷王鳯九撰鳯九仙遊人鳯九自序畧曰是集倣笠澤叢書之例故以彚書名之天門文集六卷詩集六卷吴盛藻撰盛藻字觀荘和州人㧞貢生官至廣東按察使副使皇朝文獻通考卷二百三十三
