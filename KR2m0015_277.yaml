body:
  text: 輿地考九江西省臣等謹按禹貢揚州一則曰彭蠡既瀦再則曰三江既入而於導漢又曰東滙澤為彭蠡於導江又曰東迤北㑹於滙鄭康成謂左合漢為北江右合彭蠡為南江岷江居中為中江盖惟揚州之地江漢為彭蠡参㑹故有三江之目然則今之江西固三江之衝而禹畫揚州時所首先致力之地也夫揚境以淮海為界江水實中貫其間而豫章全地並在大江以南與上下江之兼控江北者形勢又自各異故自古所稱江西多指江北地言之三國志以蘄春廣陵之境為江西則今自湖北蘄州歴安徽境以逹於揚州府是也晉書以合肥夀春之境為江西所謂江西五郡者則今廬州諸府是也自唐開元時分江南為東西二道其後遂以江南西道節度為江西節度江西之名所自昉歟若夫處吴楚閩粤之交北以長江為巨防而南又以五嶺為門戸山川之險兼而有之前代以南贛之區界隣嶺表别設巡撫都御史與南昌諸郡分閫而理自入本朝以來四境承平遂罷南贛巡撫之設盖十三府之建置沿革雖畧存元明之舊而提封寧謐物阜民康則固我朝之所獨也江西明江西等處承宣布政使司治南昌府領南昌饒州廣信南康九江建昌撫州臨江瑞州袁州吉安南安贛州十三府又置江西都指揮使司領南昌等四衛及吉安等十一守禦千戸所本朝初因之設江西巡撫及布政使司按察使司皆駐南昌轄南昌等十一府又設南贛巡撫駐贛州轄南安贛州二府與江南共一總督順治九年設江西總督亦駐南昌康熙四年裁南贛巡撫歸併江西巡撫又裁江西總督十三年復設總督二十一年仍裁江西總督歸併江南總督乾隆十九年升贛州府屬寧都州為直𨽻州凡領府十三州一各衛所俱專司漕運不治民事東西距九百七十里南北距一千八百里東至安徽徽州府婺源縣界六百里西至湖南長沙府瀏陽縣界三百七十里南至廣東恵州府和平縣界一千二百三十里北至湖北黄州府界五百七十里東南至福建建寧府崇安縣界五百八十里西南至湖南郴州宜章縣界九百五十里東北至安徽池州府東流縣界五百六十里西北至湖北武昌府興國州界五百七十里在京師西南四千八百五十里南昌府為省治東西距三百八十里南北距四百十里東至饒州府餘干縣界一百四十里西至瑞州府新昌縣界二百四十里南至撫州府樂安縣界二百三十里北至南康府星子縣界一百八十里東南至撫州府治二百里西南至瑞州府治一百二十里東北至南康府都昌縣治二百六十里西北至湖北武昌府通山縣界五百里自府治至京師四千八百五十里明初洪都府尋改為南昌府本朝因之領州一縣七南昌縣附郭治府東南境新建縣附郭治府西北境豐城縣在府南少西一百二十里進賢縣在府東南一百十里奉新縣在府西一百二十里靖安縣在府西一百六十里武寧縣在府西北三百八十里寧州在府西北三百五十里饒州府在省治東北三百里東西距五百三十里南北距三百七十里東至浙江衢州府開化縣界三百七十里西至南康府都昌縣界一百六十里南至撫州府臨川縣界二百里北至安徽池州府建德縣界一百七十里東南至廣信府治四百五十里西南至南昌府治三百里東北至安徽徽州府治六百里西北至九江府彭澤縣治三百二十里自府治至京師五千二十里明初為鄱陽府尋改為饒州府本朝因之領縣七鄱陽縣附郭餘干縣在府南少西一百二十里樂平縣在府東一百二十里浮梁縣在府東北一百八十里德興縣在府東二百四十里安仁縣在府南少東二百十里萬年縣在府東南一百二十里廣信府在省治東南六百里東西距三百五十里南北距二百五十里東至浙江衢州府常山縣界一百三十里西至饒州府安仁縣界二百二十里南至福建建寧府崇安縣界一百二十里北至饒州府德興縣界一百三十里東南至建寧府浦城縣界一百五十里西南至建昌府瀘溪縣界二百五十里東北至衢州府開化縣界二百十里西北至饒州府萬年縣界二百六十里自府治至京師五千七百五十五里明為廣信府本朝因之領縣七上饒縣附郭玉山縣在府東北一百里弋陽縣在府西一百二十里貴溪縣在府西一百九十里鉛山縣在府西南八十里廣豐縣在府東南四十五里舊永豐縣雍正九年改名廣豐興安縣在府西北八十五里南康府在省治北二百四十里東西距二百十里南北距一百十里東至饒州府鄱陽縣界一百六十里西至九江府德安縣界五十里南至南昌府新建縣界六十里北至九江府德化縣界五十里東南至饒州府治二百五十里西南至南昌府奉新縣治二百六十里東北至九江府彭澤縣治二百五十里西北至九江府瑞昌縣治一百二十里自府治至京師四千六百七十五里明初改西寧府尋改為南康府本朝因之領縣四星子縣附郭都昌縣在府東八十里建昌縣在府西南一百二十里安義縣在府西南二百里九江府在省治北三百二十里東西距三百四十里南北距一百十里東至安徽池州府東流縣界二百里西至湖北武昌府興國州界一百四十里南至南康府星子縣界九十里北至湖北黄州府黄梅縣界二十里東南至饒州府治四百三十里西南至南昌府武寧縣治二百三十里東北至安徽安慶府宿松縣界一百四十里西北至黄州府蘄州縣治二百二十里自府治至京師四千六百里明為九江府本朝因之領縣五德化縣附郭德安縣在府西南一百二十里瑞昌縣在府西九十里湖口縣在府東六十里彭澤縣在府東少北一百四十里建昌府在省治東南四百里東西距二百二十里南北距三百八十里東至福建邵武府光澤縣界一百八十里西至撫州府宣黄縣界四十里南至贛州府石城縣界三百四十里北至撫州府臨川