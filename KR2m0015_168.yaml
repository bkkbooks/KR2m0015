body:
  text: 欽定四庫全書皇朝文獻通考卷一百六十八樂考十四樂縣臣等謹按周禮春官大司樂凡樂事大祭祀宿縣遂以聲展之小胥正樂縣之位冬官梓人為簨虡葢金石為衆音之綱領故工師所掌並以樂縣賅之我朝樂制凡朝祭宴享鐃吹凱樂用各不同器無不備金聲玉振崇牙樹羽之飾輝映宫縣謹依樂部臚陳條次作樂縣考圜丘樂縣祭日樂部率太常寺恊律郎設中和韶樂於三成階下黄鍾鏄鍾一編鍾十有六在東黄鍾特磬一編磬十有六在西皆縣以虡業東建鼓一柷一麾一西敔一東西分列琴十瑟四簫十笛六排簫二箎六壎二笙十摶拊二旌二節二干戚羽籥各六十有四司樂恊律郎樂工序立東西樂縣之次咸北面歌工立樂工之次樂舞生文武八佾分行序立東在歌工之左西在歌工之右皆東列西上西立東上凡樂作止舞進退均恊律郎執麾引之凡祈榖雩祭大雩樂縣並同皇帝躬祀南郊鹵簿鼓吹導迎樂器前部大樂大號四小號四金口角四和聲署史十有二人鼓吹大樂金二金鉦四鈸二鼓二有架㸃二笛四雲鑼二管二笙二金口角八大號十有六小號十有六金鉦四畫角二十有四掆鼓二十有四横笛十有二拍板四杖鼓四金二掆鼓二十有四署史六十有八人民尉百七十有六人畫角前掆鼓後導迎樂戯竹二管六笛四笙二雲鑼二鼓一板一方澤樂縣祭日樂部率太常寺協律郎設中和韶樂於二成階下林鍾鏄鍾一編鍾十有六在西林鍾特磬一編磬十有六在東皆縣以虡業西建鼓一柷一麾一東敔一琴瑟笙簫笛壎箎摶拊旌節及干戚羽籥歌工樂工樂舞生依數東西分立均與南郊同皇帝躬祀北郊鹵簿鼓吹導迎樂器前部大樂大號四小號四金口角四和聲署史十有二人鼔吹大樂大號八小號八金鉦四畫角二十有四掆鼓二十有四横笛十有二拍板四杖鼓四金二掆鼓二十有四署史六十有八人民尉百六十有四人畫角前掆鼓後導迎樂戯竹二管六笛四笙二雲鑼二鼓一板一臣等謹按凡恭遇皇帝親祭太廟暨社稷等各壇廟陳設鹵簿鼓吹導迎大樂均與祀北郊同太廟樂縣祭日樂部率太常寺協律郎設中和韶樂於殿外階上太蔟鏄鍾一編鍾十有六在東太蔟特磬一編磬十有六在西建鼔柷敔琴瑟壎箎摶拊之屬東西分列陳武功文徳二舞於樂縣之次器數歌工樂舞並與南郊同奉先殿夀皇殿安佑宫樂縣並與太廟同天神壇樂縣祭日樂部率太常寺協律郎設中和韶樂於階下之南黄鍾鏄鍾一編鍾十有六在東黄鍾特磬一編磬十有六在西東建鼓一柷一麾一西敔一琴瑟笙簫壎箎摶拊東西分列陳樂舞於樂縣之次器數歌工舞佾並與南郊同地祇壇樂縣祭日樂部率太常寺協律郎設中和韶樂於階下之北林鍾鏄鐘一編鍾十有六在西林鍾特磬一編磬十有六在東西建鼓一柷一麾一東敔一琴瑟笙簫壎箎摶拊東西分列陳樂舞於樂縣之次器數歌工舞佾並與北郊同朝日壇樂縣祭日樂部率太常寺協律郎設中和韶樂於壝門内左右太蔟鏄鍾一編鍾十有六太蔟特磬一編磬十有六建鼓柷敔琴瑟笙簫壎箎摶拊之屬南北分列歌工舞佾依縣序立均東面器數並與北郊同夕月壇樂縣祭日樂部率太常寺協律郎設中和韶樂於壝門内左右南吕鏄鍾一編鍾十有六南吕特磬一編磬十有六建鼓柷敔琴瑟笙簫壎箎摶拊之屬南北分列歌工舞佾依縣序立均西面器數並與北郊同社稷壇樂縣祭日樂部率太常寺協律郎設中和韶樂於壝門内左右鏄鍾一春用夾鍾秋用南吕特磬同編鐘十有六特磬一編磬十有六建鼓柷敔琴瑟笙簫壎箎摶拊之屬東西分列歌工樂舞依縣序立均南向器數並與北郊同先農壇樂縣祭日樂部率太常寺協律郎設中和韶樂於壇下姑洗鏄鍾一編鍾十有六姑洗特磬一編磬十有六建鼓柷敔琴瑟笙簫壎箎摶拊之屬東西分列歌工舞佾依縣序立器數並與北郊同皇帝耕耤樂器是日樂部典樂一人和聲署署正二人署丞二人立於耤田南北面司金司鼓司板司笛司笙司簫各六人工歌禾詞者十有四人魚貫東西序立先蠶壇樂縣祭日樂部率掌儀司内監設樂於壇下建鼓一在東琴四瑟四簫六笛六笙六杖鼓二方響十有六雲鑼二板二東西分列樂工歌工以童内監為之序立於東西樂縣之次皇后躬桑樂器是日内侍率童監歌採桑詞者十人司金司鼓司板司笛司笙司簫各四人於臺前東西序立太嵗壇樂縣祭日樂部率太常寺協律郎設中和韶樂於殿内太簇鏄鍾一編鍾十有六建鼓一柷一麾一在東太簇特磬一編磬十有六敔一在西琴四瑟二簫四笛四排簫二笙四壎二箎二摶拊二東西分列樂工歌工樂舞八佾序立東西樂縣之次歴代帝王廟樂縣祭日樂部率太常寺協律郎設中和韶樂於殿外階上鏄鍾一春用夾鍾秋用南吕特磬同編鍾十有六特磬一編磬十有六建鼓柷敔琴瑟笙簫壎箎摶拊之屬東西分列器數歌工舞佾並與北郊同先師孔子廟樂縣祭日樂部率太常寺協律郎設中和韶樂於殿外兩階鏄鍾一春用夾鍾秋用南吕特磬同編鍾十有六在東特磬一編磬十有六在西皆縣以虡業東建鼓一柷一麾一西敔一東西分列琴六瑟四簫六笛六排簫二笙二壎二箎四摶拊二旌二羽籥三十有六樂工歌工文徳之舞六佾於階上樂縣之次東西序立闕里臣等謹按直省敔琴瑟笙簫壎箎歌工舞佾之數並與太學同惟備編縣不設鏄鍾特磬皇帝時巡致祭方嶽樂縣祭日樂部率太常寺協律郎設中和韶樂於廟階上編鍾在東建鼓一柷一麾一編磬在西敔一東西分列琴四瑟二簫四笛四排簫二笙四壎二箎二摶拊二樂工歌工分立於東西樂縣之次不設舞佾景惠殿顯佑宫火神廟東嶽廟闗帝廟城隍廟黑龍潭玉泉山龍神門神司土司工礟神窑神各羣祀樂器祭日和聲署設樂於西階上鼓一笙一管二雲鑼一笛二板一日月食行救䕶禮樂器鼓二十有四金鉦二畫角十有二掌以民尉救䕶日食在禮部月食在太常寺俱設於衙門甬道左右皇帝御太和殿樂縣是日樂部和聲署設中和韶樂於殿檐前鏄鍾一正月至十二月各按十二律吕特磬同編鍾十有六在東特磬一編磬十有六在西皆縣以虡業建鼓一在鍾東琴四瑟二簫四笛四壎二箎二排簫二東西分列器各一人皆北向立笙八左右各四摶拊二左右各一麾一柷一在東敔一在西器各一人均東西向立歌生四人左右各二在笙前立設丹陛大樂於太和門檐下大鼓二架方響二虡東西各一雲鑼二簫二笙管笛各四杖鼓拍板各一俱在東器各一人均北向立司戯竹二人夾丹陛中階東西向立鑾儀衛率官校設鹵簿鼓吹大樂於午門外掆鼓二十有四金二杖鼓四拍板四横笛十有二掆鼓二十有四畫角二十有四金鉦四小號大號各八署史六十有八人民尉百六十有四人畫角前掆鼓後乾清宫重華宫盛京崇政殿熱河避暑山莊正殿樂縣器數陳設並與太和殿同皇太后御慈寧宫樂縣是日内監設中和韶樂於慈寧宫檐下設丹陛大樂於長慶門檐卞中和樂設南吕鏄鍾一南吕特磬一皆縣以虡業東西分列其餘樂器暨丹陛樂均與太和殿同皇后御交泰殿樂縣是日内監陳設中和韶樂於宫檐前設丹陛大樂於宫門内中和樂設南吕鏄鍾一南吕特磬一皆縣以虡業東西分列其餘樂器暨丹陛樂均與太和殿同皇帝筵宴樂縣是日中和韶樂丹陛大樂陳設如朝㑹儀設清樂二部每部笛二笛二管二雲鑼二杖鼓一手鼓一拍板一一部在中和樂東後立一部在丹陛樂東後立慶隆舞樂琵琶八三絃八奚琴一筝一節拍各十六司抃十六人世徳舞徳勝舞樂噐並同笳吹樂笳一胡琴一筝一口琴一番部合樂筝琵琶三絃火不思番部胡琴笙管笛簫雲鑼二絃月琴提琴軋筝拍各一髙麗國俳笛一管一鼓一瓦爾喀部樂觱篥四阮四回部樂達卜一那噶喇二哈爾扎克一喀爾奈一塞他爾一喇巴卜一巴拉滿一蘇爾㖠一均俟於殿外東隅皇太后筵宴樂縣器數陳設均與皇帝筵宴同皇帝巡幸鐃吹樂器大銅角八小銅角八金口角八雲鑼二龍笛二平笛二管二笙二金二銅鼓四銅㸃四鈸二行鼓二蒙古角二皇帝親征鼓吹大樂器金二金鉦四鈸二㸃二鼓二笛四雲鑼二管二笙二金口角八小號八大號八親征祭纛樂器䝉古角十有六海螺二百凱旋郊勞鐃歌樂器金四大銅角四小銅角四鑼二銅鼓二鐃四鈸四小鈸二金口角八花腔鼓四得勝鼓四海笛四管六簫六笛六笙六箎六雲鑼四人各一器司鐃歌二十人凱歌樂器方響一鈸二杖鼓二管十二㸃二笛四星二笙四鐋二簫四大鈸二雲鑼四司樂器共四十八人司凱歌十二人大閲樂器是日樂部陳設鐃歌鼓吹大樂於行宫門外御營左右設䝉古畫角十鳴角軍二十有一人其前設五旗諸王蒙古畫角十鳴角軍二十人承傳鳴螺親軍十有二人漢軍驍騎火器營金五鳴金兵十人鼓一舁鼓兵四人擊鼓兵二人號螺五鳴螺兵五人漢軍鳥鎗營金五鳴金兵十人鼓一舁鼓兵四人擊鼓兵二人號螺十有三鳴螺兵十有三人䕶軍鳥鎗營號螺十鳴螺兵十人驍騎鳥鎗營號螺十鳴螺兵十人前鋒營號螺五鳴螺兵五人驍騎營號螺十鳴螺兵十人䕶軍營號螺六鳴螺兵六人皇朝文獻通考卷一百六十八
