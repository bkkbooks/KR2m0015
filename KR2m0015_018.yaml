  text: 欽定四庫全書皇朝文獻通考卷十八
  hash: sha256:b10942436a71c2445db705ed6a4995b1eeda97ecffddd3e373f0992b5f3e69e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_018-1a, image: WYG0632/WYG0632-0384c.png}
body:
  text: 錢幣考六乾隆三十二年停運京局鉛斤先是貴州每年辦解京局白鉛四百三十九萬餘斤又辦解湖北漢口售供直𨽻等八省鼓鑄白鉛三百萬斤俱由該省之大定府等府州雇馬運至永寧交委員接收轉運至是巡撫鄂寶以大定等處現在辦理雲南軍需馬匹該處産馬有數䭾運缺乏請將應辦漢口鉛停運一年經户部議以直𨽻等八省本地俱不産鉛今若停運勢必仍買商鉛恐商鉛亦辦運不前必多貽誤查京局現存白鉛尚多不如將運京鉛斤暫請停運半年以京局緩運半年之期撥抵運解漢口之數已可通融接濟從之又貴州巡撫鄂寧言本年加運京銅定限於明年二月自瀘州開運現在牛馬缺乏請緩至明年八月同三十三年頭運一齊開幫又稱大小各厰因兩年辦理軍務油米炭到厰者少以致辦銅短縮貴州等省赴滇採買自上年至今未發者共髙銅二百餘萬斤金叉厰銅一百九十餘萬斤請移咨各省自行查核酌辦經户部議以户工二局現存銅斤及本年解到並起運在途共計有一千六百六十萬有竒與其令各省委員在滇守候不如將該省本年加運展限並明年頭運第一起京銅截留撥給各省通融辦理從之又令寶直局餘銅鑄錢充餉先是寶直局鼓鑄每爐每卯應發各匠工食向照京師寶泉局之例按制錢八百三十文作銀一兩交爐頭易銀給發保定錢賤賠纍不資至是直督方觀承請以每卯銅渣銅屑加意淘汰一年計出餘銅三千餘斤約可鑄錢三百餘千文分賞爐頭補苴賠墊經部議以該省鼓鑄工價原係題明核給錢文每年報銷亦係開造錢數且該省止設爐五座各匠同在一厰稽察易周原無須易銀給發以致輾轉虧折藉口賠墊嗣後將前項餘銅歸公搭同正欵鑄錢按年造報充餉其賣獲渣土銀兩俟滿五年另行試淘如有多餘將確數奏明留局公用臣等謹按各省鼓鑄內有節省及淘出餘銅如四川之盈餘銅鉛山西之爐底渣末貴州之稱頭銅斤俱將鑄出錢文留充公用三十五年户部議查滇省辦運京銅每年六百二十九萬餘斤該省鼓鑄及各省採買共需銅五百餘萬斤昨據該督彰寶以滇銅不敷請暫停採買經部議駁在案今據該撫明德奏稱雲南錢價每銀一兩易錢一千一二百文市價已屬太賤向於六府設爐一百一十六座實屬過多應將東川新設爐二十五座大理廣西各十五座臨安順寧各八座暫為裁減嵗可省銅一百四十五萬餘斤再陜西廣西貴州湖北四省嵗需滇銅額數均屬過多亦可酌減銅五六十萬斤加以現在廣開子厰一二年間外省委員均可挨次領運而銅斤亦可從此日加充裕應如所奏辦理至稱減爐七十一座嵗省白鉛一百二十餘萬斤黑鉛十萬餘斤板錫八萬七千餘斤應運赴漢口供各省採辦之用從之三十六年酌減貴省搭放兵餉錢文貴州寶黔局鼓鑄錢文搭放俸餉等項例均以每兩一六搭放本年三月內户部議准雲貴總督彰寶言貴州安籠鎮七營官兵俸餉錢文該處錢賤又離省窵逺請停止搭放四月內又議准該撫李湖稱移查各營除提標古州鎮標等二十一處仍照舊搭放外其撫標貴陽營近在省城無需運腳鎮逺等鎮三協二營市販無多錢價易昻均請減半搭放威寧等鎮協營十處該地方錢價平賤又逺道運回每致虧損請全數停搭至文員俸廉及書役工食事同一例亦一體減半搭放又護山西巡撫朱圭言晉省鼓鑄自乾隆十四年安爐十座十八年減去四座二十三年復添爐五座每年鑄錢四萬九百串有竒除按月搭放兵餉外餘錢儘平市價數年以來錢價日趨平賤民間不必以官錢為利請酌減從前加增五爐止留原舊六爐嵗可鑄錢二萬二千餘串於兵民並無不便而錢法仍足流通從之又減江西寶昌局爐座先是江西省錢價昻貴於乾隆七年經撫臣陳宏謀設爐十座旋於八年復增四座共成十爐逮十五年因庫貯錢文充裕經撫臣阿思哈減去四座十七年又因庫錢減少前撫鄂昌仍添四爐共成十爐鼓鑄至是江西巡撫海明奏稱市錢價賤官錢不能銷售現在積存十萬餘串加以鑄至嵗底除搭放兵餉外共應存庫錢十三萬餘串陳積稍多更難出易請自乾隆壬辰年為始減去四座仍以六爐鼓鑄户部議如所請行三十七年令貴州省局存餘錢搭放兵餉户部議查寶黔局原設爐二十座嵗鑄六十九卯三十五年前撫宫兆麟以錢價平賤奏減二十三卯三十六年又據調任巡撫李湖請減爐五座仍以四十六卯分爐配鑄通計減爐鼓鑄除搭放俸餉等項外嵗尚餘錢二萬三千餘串行令易銀解司各在案今據該撫圖思德奏稱黔省錢價平減商販無多鋪戶領錢出易從中侵蝕差吏賄串拖延種種滋弊現在滇銅未旺局存無幾而市價又現值平減請全提解司留為搭放兵餉之用應准其將府存未易錢文一萬五百餘串並將來鑄出息錢均無容出易以備搭放從之三十八年定銅運抵津後不許開報守凍之例大學士于敏中等奏銅運攸關鑄務例限綦嚴運員任錫紱陳希澤黃斌等守凍與抵通或同時而行阻互異或一運而咨報各殊且一人所運之銅或兩地守凍其中顯有徇隱揑飾情弊奉上諭銅運船隻既抵天津一帶距京已近銅斤非米糧可比即屬凍河之候原可改從陸運皆因運員等恃有守凍之例遂爾藉詞遷延嗣後銅運抵津後概不准開報守凍如遇凍河即令其陸運進京則支吾守凍之弊不除自絶著為例又戶部奏准寶泉局各厰匠役工食原定每卯給制錢一千二百四十串有竒交爐頭易銀開發嗣於乾隆四年議准改給銀兩由部支領給發其時因錢價昻貴每銀一兩僅合制錢八百三十文匠役按卯計工不敷日用復經定議擇其工價稍浮者酌減七十三串淨給錢一千一百七十三串八百文改令爐頭照市價易銀開發逮至二十八九年以來錢價日就平減匠役等但知按例索銀不問錢價貴賤每年實不敷銀一萬三千三百兩有竒俱係爐頭設措添補現在錢價更屬有減無增辦理實為竭蹶自不如仍舊改給庫銀謹公同籌議酌中定價每年七十五卯計開發銀十萬二千三百兩有竒由本局出具印領令爐頭赴銀庫按季支領存貯局庫按月給發三十九年湖南巡撫覺羅敦福言寶南局錢文積至十七萬四千四百餘串皆因官價貴於市價無人承買局錢壅滯餘息無歸現在巴陵縣城工奏請借欵莫若減價易銀取息供用經戶部議將局存錢文照依原定易銀官價核給興修巴陵距省本係一水之地裝運既便即照銅鉛事例酌給運費亦屬無多一轉移間而數年壅滯錢文可銷去十分之三餘息亦無虧短之慮從之四十年開伊犂鼓鑄局錢幕用寶伊字伊犂為準部總滙之區乾隆二十年王師平定遂𨽻版圖既有重兵駐守兼多商販貿易需用錢文較葉爾羌更為緊要上年䝉皇上軫念新疆籌及錢源利用有㫖交伊勒圖查酌妥議旋據奏稱烏什改解之銅僅止三千斤此外尚有回部各處餘糧折納銅三千餘斤共可辦獲銅六千四百餘斤即就現獲銅數開鑄搭放於軍民兩有禆益戶部議如所請除庫車沙雅爾派回子赴厰開挖既非餘糧折納且有衣履器具牛騾之費僅獲銅一千餘斤煩費過多無庸派辦實止得銅五千三百斤有竒嵗計鑄錢九百二十餘串臣等謹按伊犂素不産銅其各處以糧折納紅銅每斤約銀四錢九分有竒又採挖黑鉛每斤約銀四錢合計銅鉛二項每鑄錢一千約需銀三兩八錢有竒但均非動項採買至白鉛必須由西安逺赴湖北漢鎮搭買遞運陜西轉運哈密又由驛站遞解伊犂核計腳價所費頗重今以體質堅硬之紅銅配以柔軟之黑鉛微加㸃錫輪郭肉好即可適用因照內地常行制錢每文一錢二分重用紅銅八分四釐黑鉛三分四釐八毫㸃錫一釐二毫督匠試鑄色樣大略相等自可無庸調運其㸃錫按照紅銅五千餘斤搭配每年只須八十斤為數無多即令西安代買遇便搭解仍令京局鑄成錢模交該將軍照式鼓鑄四十一年署雲貴總督覺羅圖思德等言滇省近年大小各厰嵗獲銅一千二百三四十萬斤除京外鼓鑄年需髙銅九百餘萬斤外其寧臺戶蒜金叉等厰尚積存低銅五百餘萬斤並收回一分通商一百二十餘萬斤已足敷復爐加鑄之用請於東川局增爐十五座曲靖府安爐十八座廣西州復爐十五座保山局增爐四座大理局增爐三座省局添爐一座共五十六爐統成一百四十一爐內東川先經加卯帶鑄之二十五爐未便再議加卯其餘一百十六爐每年每爐於正鑄外一律加鑄三十六卯半計可獲息十六萬四千八百兩有竒查湯丹大碌等四厰年辦蟹殼銅五百五十餘萬斤工費不敷每百斤加價一兩五錢大功厰係新開費用稍省年辦蟹殼銅一百餘萬斤每百斤加銀一兩二錢此外中小各厰共計年獲銅五百七十餘萬斤每百斤加價一兩足敷工費統計加價共需銀十五萬三千餘兩核之所鑄餘息尚有存剩而搭放兵餉之外加搭各厰鹽井工本薪食銀兩以利民用又可無錢多價賤餘息虧短之虞從之先是湯丹等厰積缺工本銀十二萬餘兩九渡箐等新厰虧缺工本銀五萬六千餘兩部議於增給銅價內以十分之八發給厰民扣留二分以歸舊缺分作六年扣完又滇省解交京銅六百餘萬斤由尋甸東川兩路分運瀘州其中牛䭾馬載腳價尚屬敷用唯自威寧州至鎮雄州所屬之羅星渡計程十站山路﨑嶇近年馬匹稀少俱係雇夫背運兩夫背運一碼重一百六十斤給腳銀二兩往返一月食用不敷夫役每多逃匿今酌議每銅一碼加增銀四錢八分約需加腳九千餘兩亦請於加給銅價內每兩扣銀五分八釐零即可如數扣增不必另籌欵項均得㫖允行又戶部議運京銅鉛經吏部以運員開行以後定有逾限處分而開行以前遲逾向無定例伏思處分之輕重總以限朝為權衡其未經開行與既經開行責任各有攸歸自應分晰酌定以昭畫一查向來運銅委員抵瀘州領兑過稱打包雇船裝運定限五十五日者原因在永寧瀘州兩地分領豫限是以寬餘今既在瀘州一處領兑較便應酌減二十日止准扣限三十五日作為開行以前之定例至鉛運委員自永寧領兑裝運赴瀘州向來豫限三十日自瀘州至重慶豫限二十日在重慶鎔鉛按照每日鎔化二萬餘斤計算照舊每運限三箇月又在重慶雇船開行限二十五日應請均作為開行以前之定例合計前後限期雖分而於舊例仍無增減嗣後運員任意逗遛以致開行逾限者即照違限議處不准扣除定限如此則各該員自顧考成益加迅速儧辦於京運實屬有禆從之貴州巡撫裴宗錫言近年滇銅豐旺現又增給厰價商民採挖踴躍除供京省外應有餘剩而黔省自減爐以後不惟鑄息缺額而官錢既少市價增昻請撥滇銅之有餘補黔局之不足將原減爐五座復加安設在滇省每年只加撥銅十一萬一千斤為數無多亦屬易辦戶部議如所請從之臣等謹按寶黔局向設爐二十座年鑄四十六卯額用滇銅四十八萬八千四百斤黔銅三萬二千四百斤嗣因黔厰産銅甚旺續加二十三卯逮乾隆三十五六兩年黔省錢價平賤鑄錢艱於銷售又值銅厰漸衰滇省亦以産銅不旺減撥銅十一萬一千斤經前撫宫兆麟李湖先後裁去二十三卯復裁爐五座仍照四十六卯分鑄至是始補足二十爐之數嗣於四十四年滇省産銅稍少議減貴州省額買滇銅十分之三將該局四十六卯減鑄十卯四十二年署雲貴總督圖思德言滇省局存錢文自三十九年起至四十一年十月底止僅存錢四千八百餘串自應仍照向例以三成搭放但查省局原設爐二十五座今又新添爐一座約計每年鑄獲錢文除驛站鞭祭等項及搭放三成兵餉外尚餘錢三萬二千串有竒别無需用久貯易致貫朽請自本年為始俱以銀錢對半搭放戶部議如所請從之臣等謹按雲南省局鑄出錢文向例用銀七錢三搭放兵餉嗣以局錢壅滯經前督吳達善等節次奏明以銀五錢五各半搭放至三十八年又因局錢積至十八萬餘串之多復經督臣彰寶奏請全數支給錢文至是仍循乾隆二十七三十等年之例各半搭給尋於四十三年督臣李侍堯又以錢價平賤兵丁暗中虧折奏請如錢價在一千二百文以內照例搭放如在一千二百文以外悉給銀兩四十四年雲貴總督李侍堯言滇省所籌銅數只有一百九十餘萬斤不敷各省採買謹就三迤地勢民情悉心酌核除省城東川府需錢較多未便議裁外請於大理局減去一座只留三座將省局二十五爐內減去五座移設大理共成八爐廣西局裁去四座將東川局二十爐內減去四座移設廣西各加鑄半卯其臨安曲靖保山三局復設十三座盡數裁去以節銅斤統計滇省共存四十八爐年共需銅一百一十餘萬斤較上次節省銅七十一萬餘斤連前次餘存節減銅共獲銅二百四十萬餘斤合之各省鼓鑄實用銅數止不敷銅二十餘萬斤寧臺厰現有舊存銅斤儘可凑撥加以現在廣跴子厰多開􅨇硐已有可望撙節籌辦自可源源接濟從之至四十五年又以各厰採銅竭蹶且距省稍逺稽察難周將大理府所設八爐遵㫖移歸省局其東川府只留十座餘六座與廣西局爐四座一併裁撤又減廣西省爐座先是廣西省鼓鑄十六爐年用銅三十八萬三千餘斤上年以滇省近年出銅較少將廣西省年買額銅減十分之三經巡撫吳虎炳奏請減爐三座今請於四十四年夏季起再減一爐共減銅九萬五千九百餘斤除本省金雞頭厰獲銅抵補應用外尚應買滇省高低銅二十五萬八千斤有竒計比從前減銅十二萬五千斤有竒其遇閏之年仍請加買至減存十二爐年止鑄錢五萬七千六百串其爐匠工料薪水雜費概以銀兩給發從之臣等謹按是年湖北寶武局亦以滇銅短縮減買十萬斤除添買漢鎮商銅五萬九百斤有竒抵補外仍不敷年需四十萬斤之數議准於二十四卯之中酌減三卯四十五年戶部議查直𨽻等設局鼓鑄均係派委府㕔州縣等官司道大員唯總理稽查即雲南東川等局亦係派委府州等官經管責成該管道員稽查獨寶雲局以臬司自為管辦耳目稍有未周弊端即難盡絶且與各省成規不能畫一應如該督所奏即以雲南府知府職司鼓鑄局務每年奏銷即由該府造冊轉報以専責成而昭畫一仍令臬司不時詳察倘有夾帶等弊一經查出即將局員嚴參並將總理之臬司一併勘究四十六年戶部議查四川寶川局新舊設爐四十座嵗需本省銅一百四十萬斤嗣因該省銅斤不敷接鑄奏減新舊爐鑄十二卯今據該督文綬奏近來各厰産銅嵗止七八十萬斤請再停十二卯連前共省銅六十萬斤核計近年出銅之數足供配鑄其每年應用黑鉛四十九萬八千斤以供正鑄近年本省各厰産鉛四五十萬斤除供加卯應用外尚餘二十餘萬斤請嗣後存積三四年核計足敷舊爐正鑄一年之用即將黔鉛停買一年現在局存黔鉛一百五十九萬餘斤足敷兩年鼓鑄所有本年應買黔鉛緩至來嵗秋間再行酌辦得㫖允行四十九年四川總督李世傑奏稱欽奉諭㫖銅鉛一到川省即係該督應辦要件此項船隻著交沈清任率屬妥辦以専責成等因沈清任止能於所轄之重慶地方照料其自永寧至瀘州瀘州至重慶自應一體専派大員督同地方官代為雇備查永寧道駐劄瀘州銅鉛兩運所過地方皆其専管應請即責令該道督同永寧縣知縣瀘州知州按照定價代為雇辦倘有疏虞即將船戶柁水送至所在地方官追出原領腳價枷示河干其經過漢口儀徴兩處均應换船裝運亦應查照此例一律辦理請敕下湖北江蘇各巡撫嚴飭各地方道員督屬代為雇辦以昭慎重户部議如所請行五十年户部議寶泉局每年鼓鑄七十五卯需用黑鉛五十萬一千餘斤向係貴州湖南兩省辦解鉛四十六萬七千餘斤嗣因貴州産鉛不足於乾隆四十年暫改歸湖南代辦四十八年又以楚省産鉛漸少黔省現存鉛一百餘萬斤請自四十九年起與湖南各半分運在案今據寶泉局監督請每年添辦三萬二千九百五十二斤以敷每年需用之數應令黔省於餘積鉛內自乙巳年起每年添辦解京以供鼓鑄至稱寶泉局庫存黑鉛無餘請於該局額運之外添辦二十五萬斤先行委員趕運查顔料庫黑鉛現存至八十九萬餘斤應即於餘存鉛內撥給二十五萬斤以濟急需而運腳又大可節省從之又定各省錢局交代之例諭據陳用敷奏黔省向例臬司經管錢局收支數目按月造報年底由藩司盤查詳報彚入藩庫實存銀數於臬司新舊交代時並不造冊移交新任亦不具結造報如接任之員查有未清即將上次盤查之藩司具奏之巡撫參處辦理似未平允等語局庫關係錢糧自應一體交代方為詳慎嗣後各省錢局無論藩臬及道員經管者於新舊交代時俱著前任造冊移交新任並具結造報巡撫倘有欵項未清即將前任經管之員參處庶足以専責成而昭鄭重皇朝文獻通考卷十八
