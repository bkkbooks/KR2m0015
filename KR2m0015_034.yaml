body:
  text: 欽定四庫全書皇朝文獻通考卷三十四市糴考三糴臣等謹按市糴相為表裏國家法制精詳凡常平義社各倉已於本門首卷序述領要兹謹按年隷事如左至於另倉貯備或以山海僻逺藉應急需或以資鄰近協撥皆特行於常法之外各省不必皆有有之亦無定額其稱名錯出見存多寡悉依各典冊所録類著於篇崇徳元年上命户部承政英俄爾岱馬福塔傳諭曰米榖所以備食市糴所以流通有糧之家輒自收藏必待市價騰貴方肯出糶此何意耶今當各計爾等家口足用外有餘者即往市糶賣勿得仍前壅積致有榖貴之虞先令八家各出糧一百石詣市發賣以充民食二年令固倫公主和碩公主和碩格格及官民富饒者凡有藏榖俱著發賣六年定杜塞囤積并納粟之例都察院㕘政祖可法等上言二事一杜塞囤積之弊有糧之家或賣或借俾得有無相濟賣則從市平糶借則從時起息不許坐擁多儲妄希長價一請開納粟之例或論罪之大小限以米數捐贖或無罪之平人有急公輸粟者量加奬録因荒而用轉移之法遇饑而沛權宜之令俟秋成豐稔即行停止得㫖所奏俱是我國人民偶值歉年著暫止估酒待豐年仍許沽賣獲罪之人無銀納贖願輸糧者准依時價算收有餘糧願助者量給奬賞願賣者許其自糶順治四年以江西水旱發倉米三千餘石減價平糶從巡撫章于天請也十一年令旌奬捐榖百姓諭賑濟直𨽻大臣巴哈納等曰近京地方米價騰貴饑民得銀猶恐難於易米殷實之家有能捐榖麥或減價出糶以濟饑民者爾等酌量多寡先給好義匾額及羊酒幣帛以示旌表饑荒地方人民有往豐收處糴買米糧者不許恃强之徒遏閉攔截犯者拿問情重㕘處又議常平義社各倉以積榖多寡定有司功罪時各府州縣俱有常平義社各倉責成各道員専管稽察舊積料理新儲應行事宜聽呈督撫具奏每年二次造冊報部部臣按積榖多寡分别議奏以定該道功罪十三年令各省修葺倉厫先是十二年將各州縣自理贖鍰春夏積銀秋冬積榖悉入常平倉備賑由布政司彚報督撫嵗終冊送户部如有假公潤私隠匿漏報者查㕘其紳民樂輸者地方官多方鼓勵勿勒定數勿使胥吏侵剋及加耗滋弊至是令各省修葺倉厫并印烙倉斛選擇倉書糴糶平價不許别項動支十七年定常平倉榖糶糴之法議定春夏出糶秋冬糴還平價生息務期便民如遇凶荒即按數給散災户貧民并飭有司實力奉行俾沾實恵康熙四年令山東地方官通糴以便民户部議覆禮科給事中黏本盛奏言山東州縣禁糴以致衙役土棍借端詐害請令地方官通糴便民嚴禁蠧棍詐害應如所請從之六年令甘肅將積貯米石變易新榖並禁地方官借端擾民户部議覆甘肅巡撫劉斗疏言積貯米石恐年久浥爛請變價另糴新榖以備賑濟得㫖依議但舊榖變價另糴新榖恐地方官借端擾民令該撫曉諭申飭如有此等情弊即行㕘奏七年陜西西安等四府積榖變價詔停止生息户部議准陜西巡撫賈漢復疏請將西安等四府積榖變價生息上曰出陳易新原以為民若將利息報部反累百姓著停止生息十八年以江寧各屬報災借撥庫銀往湖廣糴米平糶從巡撫慕天顔請也十九年令常平義社各倉積榖永留各境内以備賑濟先是十八年題准地方官整理常平倉每嵗秋成勸諭官紳士民捐輸米榖照例議敘鄉村立社倉市鎮立義倉公舉本鄉敦重善良之人出陳入新春月借貸秋收償還每石取息一斗嵗底州縣將數目呈詳上司報部儲榖多者管倉人給與頂帶有官吏掊克者照侵欺錢糧例處分强派抑勒借端擾民者罪之至是諭户部積榖原備境内凶荒若撥解外郡則未獲賑濟之利反受轉運之累人皆憚於從事必致捐助寥寥嗣後常平積榖留本州縣備賑義倉社倉積榖留本村鎮備賑永免協濟外郡以為樂輸者勸以浙江杭州等府上年旱災恐米價騰貴命動支庫銀四萬兩往湖廣江西糴米平糶建備米倉厫奉天等處城守征收雜税令於米價賤時購貯内府修造倉厫名曰備米遇有𦂳急以資撥用二十年以福建旱災令於廣東浙江糴米平糶户部議覆福建總督姚啟聖疏言福州等府夏秋亢旱米價日増請於廣東之潮州浙江之平陽買米平糶查海禁未開恐有不肖之徒借端販賣應不准行得㫖閩省被災准其赴潮州等處買米接濟如有借端通海者事覺將該督撫及押運官一併治罪二十一年命州縣衛所官員勸輸常平各倉米石定議敘之例奉諭㫖各省常平等倉積貯米數甚屬要務有此積貯倘遇年榖不豐彼地人民即大有禆益雖先經奉㫖通行恐有名鮮實一遇水旱議賑之時未能接濟致民生艱困今將某省實心奉行某省奉行不力其逐一察議具奏尋議令州縣衛所官員設法勸輸一年内勸輸米二千石以上者紀録一次四千石以上者紀録二次六千石以上者紀録三次八千石以上者紀録四次萬石以上者加一級如定有處分之例恐有畏罪過派苦累小民之弊是以未便預定從之二十四年議山海闗古北口張家口等處積貯米石以備䝉古饑荒令户部官監視運送盖造倉厫二十五年令黑龍江墨爾根葢倉貯米二十九年奉諭直省官員實力勸輸常平義社各倉米榖諭户部朕念食為民天必葢藏素裕而後水旱無虞曽經特頒諭㫖著各地方大吏督率有司曉諭小民務令多積米糧其各省編設常平及義倉社倉勸諭捐輸米榖亦有㫖允行其後復有㫖見今某省實心奉行某省奉行不力著再行各該督撫確察具奏朕于積貯一事申飭不啻再三藉令所在官司能俱體朕心實有儲蓄何至如直𨽻地方偶罹旱災輒為補苴之術嗣後直省總督巡撫及司道府州縣官員務宜恪遵屢次諭㫖切實舉行俾家有餘糧倉庾充牣以副朕愛養生民至意如有仍前玩愒茍圖塞責漫無積貯者將該管官員及總督巡撫一併從重治罪又令奉天錦州等處積貯米榖奉天錦州開元遼陽葢州諸處應積蓄米榖議令將奉天錦州二府地丁錢糧每年存剰銀五千餘兩酌量米價賤時陸續採買其部員所收牛馬税銀三千餘兩交與倉官亦酌量買米收貯其倉内出陳易新交與奉天將軍管理并著盛京户部侍郎稽察收貯米榖每年仍將出入數目報部又准山東紳衿士民捐糧備貯先是上諭九卿曰足民之道宜裕葢藏從來水旱靡常必豐年恒有積儲庻歉嵗不憂饑饉如康熙二十七年頗稱嵗稔誠使民間經營樽節早為儲偫何至二十八年偶遇旱祲室皆懸磬總因先時無備遂至餬口維艱比蠲除正賦特發帑金分行賑濟被災之衆始獲安全今零雨時降可望有秋惟恐愚民不知愛惜物力狼籍耗費祗為目前之計罔圗來嵗之需應行各督撫飭令及時積貯度終嵗所食常有餘儲用副朕軫念民依綢繆區畫至意是秋山東豐熟正賦先蒙蠲免紳衿士民咸及時樂輸巡撫以聞議准不論膏粱榖石每畆捐出三合合省計得二十五萬餘石在各州縣適中大鄉之内各保殷實敦厚之人敬謹收貯以備荒年止本年舉行一次三十年令直𨽻各州縣分别存貯米石議直省所捐米石大縣存五千石中縣存四千石小縣存三千石儻遇荒災即以此項散給其留倉餘剰者俱於每年三四月照市價平糶五月初旬將平糶價銀盡數解貯道庫九月初旬仍令各州縣買新榖還倉嗣又令直屬捐榖每州縣再加貯一倍其捐米内有髙粱交春易紅令即糶賣買粟補倉以備賑濟令江寧京口等處官兵駐防之地各截留漕米十萬石建倉存貯三十一年詔陜西省預備積貯米榖并令各省覈實積數申報諭大學士等曰去嵗陜西西安等處年榖不收罔有積貯以致閭閻困苦已極已遣官賑濟之矣直𨽻所轄地方素有儲蓄或州縣稍有不登即以所儲米榖從均贍給是以民生獲濟良多今年豐歉尚未可知陜西省府州縣見存米榖之數應行察明先行預備至各省府州縣皆令積貯米榖數千石則禆益黎庻者大矣可下該督撫等令各府州縣積貯米榖其所積數當逐一繕冊報部又以永平等處米價騰貴詔發各莊屯米榖轉糶直𨽻巡撫郭世隆言永平所屬及豐潤玉田等處去嵗薄收米價騰貴奉天地方屢登大有頗稱豐盈請令山海闗監督許肩挑畜䭾者進闗轉糶從之并諭大學士等曰各皇莊及王等之莊屯所積米榖必多如無伊主之言則莊屯何敢轉糶通州以東至山海闗所有皇莊及王等之莊屯米榖數目爾等與户部㑹同内務府總管并辦理王府事務官員等公同查明照時價轉糶又以山西平陽府等處麥收價賤命兵部右侍郎王惟珍徃糴麥備貯又命有司勸諭捐輸諭大學士等曰時届麥秋令地方官勸諭百姓量力樂輸委積貯偫州縣將捐助者姓名與米數註冊秋成之後亦倣此行焉其春時乏食者貸與之至秋照數收入以為積蓄每年於麥榖告登後勸勉捐輸則數嵗之間倉廩充裕即罹災祲民食自不虞匱乏矣又命轉運湖廣米石至西安平糶奉諭㫖聞西安米價仍貴流民還原籍者稀少朕為陜西地方民生常縈於懐聞自湖廣襄陽至陜西商州水路可逹應將目下運到襄陽米二十萬石水路運至商州自商州運至西安照湖廣價值止加算所運脚費與之貿易則米價即平於百姓大有禆益所得價賫至湖廣復買米糧依法轉輸平糶俟陜西流民悉還本籍米價既賤之後方行停止又令江西常平倉糶米易榖春間概行出陳秋成每米一石收買榖二石還倉又議定各省常平倉俱照直𨽻分貯各州縣有陞遷事故離任者照正項錢糧交代有短少者以虧空論又定山東等處捐榖例向例山東夏秋二季每畆應捐米麥秋成後即令易榖今併作一次每畆共捐榖四合除原有倉厫外其無倉厫之州縣地方官酌量修葢加謹收貯時復令西安鳯翔二府照此例勸輸均貯福建濱海之地多收稻榖并令勸輸至明年復因浙省産麥無多亦令照山東捐輸之例擇地備貯選誠實紳耆管理耕種之時以一半聽民借貸限十月還倉三十二年令商人買米至西安發糶以西安米價尚貴諭令户部招募身家殷實富商給以正項錢糧並照驗文據聽其於各省地方購買糧米運至西安發糶所得利息聽商人自取之待西安米價平後但收所給原銀又發通倉米減價平糶并禁止順永保河四府蒸造燒酒諭大學士等今嵗畿輔地方歉收米價騰貴通倉每月發米萬石比時價減少糶賣止許貧民零糴數斗富賈不得多糴轉販又蒸造燒酒多費米榖著户部速移咨該撫將順永保河四府屬蒸造燒酒嚴行禁止三十三年令將山東運至盛京之米於金州等處減價發賣先是以盛京地方歉收令運山東省米石至三岔口以濟軍民至是侍郎阿喇彌言山東運來之糧由金州等處海岸經過請酌量截留減價發賣再遼陽秀岩鳯凰城三處之人向來俱在牛莊買米亦應照金州等處將糧米截留行文各該管官令其到三岔河購置運去從之又以霸州等州縣水災詔發霸州文安等處貯倉米榖十萬餘石除散賑外皆減價平糶併截留山東漕米於景州等處發糶以平米價諭大學士等曰據户部查奏霸州等十州縣存貯米五萬七千五百餘石榖八百石天津衛存貯米一萬石榖四萬四千一百餘石此米榖現在倉與否足以賑給與否若足用則以餘米平價糶與百姓可行與否山東漕糧截留數萬石平價糶賣則榖價不貴於民生大有禆益令輓至何州縣平價以糶應截留米若干萬石即遣户部司官一員至巡撫郭世隆處令其逐一迅速詳議繕摺付伊賫奏直𨽻巡撫郭世隆等遵㫖㑹同户部員外郎雍泰查霸州文安等州縣及天津衛現在貯倉米榖共十萬餘石將此米賑濟霸州等處饑民需用三萬石所餘米榖應減價糶賣其景州等州縣將山東漕米截留平糶得㫖霸州等被水災地方所有積榖除散賑外餘著減價發糶其沿河一帶景州等各州縣衛所著將山東漕米每處截留二千石亦發糶以平米價復奉諭㫖恐不肖地方官員或増價發糶或糶與發賣之人以致百姓不沾實恵著巡撫郭世隆不時巡察又以直𨽻賑濟餘米視時價減糶吏部右侍郎安布禄工部右侍郎常綬等遵㫖查直𨽻安州等十一州縣貧民十萬餘人應賑米四萬餘石上諭大學士等曰朕思直𨽻米價騰貴小民艱苦若僅照數給米仍恐無益著將此米一半散給百姓一半照目前米價折銀給與貧民所餘之米著視時價減糶則百姓既得銀兩而糴米又易庻民沾實恵以宻雲順義附近地方米榖未收命將轉運積貯之米每月發千石平價出糶遣户部賢能司官各一員監視三十四年以盛京亢旱詔動支海運米二萬石以一萬石散給一萬石平糶副都統齊蘭布等言今嵗盛京亢旱米價翔貴雖市有鬻粟窮兵力不能糴奉諭㫖令侍郎朱都納學士嵩祝等馳驛迅往㑹同盛京將軍副都統諸臣清察窮乏者於去嵗海運米二萬石中動支一萬石散給令食可至秋成餘一萬石平價糶之兵民均有禆益如二萬石不足散給發糶其速以聞又運通倉米至宻雲順義各一萬石貯倉備用癸巳上駐蹕宻雲縣諭大學士等去嵗朕見此處髙粱結實者少粃者多米價騰貴髙粱一斗幾三百錢故将通倉米令運一萬石至此處五千石至順義縣減時價發糶米價稍平一斗百錢民以不困北地寒冷米榖多至失收今河水方盛著將通倉米運至宻雲順義各一萬石令貯倉備用又於霸州雄縣香河寳坻各發米一萬石減價平糶時直𨽻順天保定河間永平四府所屬地方水潦傷稼已將四府康熙三十五年地丁銀米全與蠲免其霸州雄縣香河寳坻四處皆有水道可以轉輸每處發米一萬石各差司官一員賫往照彼地時價減值發糶以資民食三十五年令江南倉榖出陳易新先是三十四年議准江南積榖以七分存倉備賑以三分發糶至是議將江南舊榖於本年為始輪年挨次出陳易新其各屬糶三銀内酌提四萬石價銀解省俟秋成買榖為下年存七糶三之用又發盛京倉儲米榖五千石運至莫爾渾阿敦積貯以黑龍江吉林烏拉地方頻嵗不登故也明年仍自天津運米至盛京補完倉儲三十六年令榆林等處衛堡積貯米榖諭大學士等州縣已各論其地方大小積貯米榖兵丁所駐沿邊衛堡亦屬𦂳要其榆林等處衛堡亦照州縣例將米榖積貯預備又以山西米價騰貴令扈從船隻載米至保徳州平糶時上親征噶爾丹駐蹕喀喇蘇巴克行在諭大學士伊桑阿前山西巡撫倭倫以去嵗山西數州縣歉收今米價甚貴奏聞朕聞之中懐軫惻扈從大臣侍衛官員執事人自船站坐來之船現有水手若至湖灘河朔後將此船逆流牽挽回至寧夏甚難前曽諭總督吳赫就此船將湖灘河朔積米或五千石或再加多量行裝載交巡撫倭倫派賢能屬員轉運順流而下至保徳州比時價減糶於民大有禆益著學士黄茂率同部院司官二員前往侍郎安布禄留此監發米石命將湖廣三十五年分各官捐輸之榖貯各屬常平倉以備賑濟三十七年截留山東河南漕糧於直𨽻沿河州縣積貯遣户部司官二員於被水災沿河之保定霸州固安文安大成永清開州新安等州縣截留山東河南漕糧每處運致一萬石積貯俟米價騰貴時平價糶賣又定直𨽻四川貯榖變價并出借之例以直𨽻捐輸米麥髙粱久貯倉中恐有浥爛令變價解貯道庫以備賑濟四川松潘等處積貯雜糧改為三分以二分存貯以一分遇糧貴時借給兵民將此榖按年出易周而復始永著為令三十八年截留漕糧於江南髙郵等處減價發糶時淮揚所屬地方米價騰踊命截留漕糧十萬石於髙郵寳應興化泰州鹽城山陽江都七州縣各留一萬石悉照時價減值發糶餘米三萬石於邳州留八千石宿遷桃源清河安東四縣各留五千五百石亦照時價減糶又截留米十萬石於揚州淮安各收貯五萬石四十年截留湖廣漕糧存貯江寧省倉議定楚省漕糧二十萬九千餘石盡數截留存於江寧省倉以六萬四千石充給兵食將採買兵米價值照數扣留以四萬五千石分發淮安等處平糶以濟民食秋成後將所糶之價并兵米扣留價值買補歸倉其餘存剰米石仍俟下年給兵發糶四十一年令直𨽻山東山西陜西河南江北預備倉儲奉諭㫖阜民之道期於有備去冬北地少雪今春雨澤尚未霑足誠恐蝗蝻易生有傷農事亟宜先時預防直𨽻山東山西陜西河南江北地方厯年積貯倉糧果否足額該督撫確加稽覈務使倉有餘儲不致匱乏其一切應行預備事宜須悉心講求料理以紓朕宵旰勤民之意四十二年截留漕米二萬石運至濟寧州兖州府等處州縣減價平糶又令陜甘積貯倉榖是年陜省年榖豐收奉諭㫖山陜不通水路若稍遇災即至艱窘今值糧米充裕之時無有急於各地方積貯者令督撫等將預備之處盡心究議嗣議定陜西人口衆多之州縣貯米三千石次二千石又次一千石交與地方官採買存貯動西安司庫兵餉銀十四萬兩以十萬兩照時價買米以四萬兩葢造倉厫甘屬既無倉厫應動常平倉糧内十分之一葢造將此項用過糧石照數填還再陜甘二處照依應徴地丁銀一錢米一斗者令捐輸粮三合以為備災之用歉嵗停捐令直𨽻立社倉時直屬各州縣雖設有常平倉收貯米榖遇饑荒之年間或不敷賑濟諭於各村莊設立社倉以備饑荒如直𨽻設立社倉果有益於民生各省亦照此例嗣廷臣等議定社倉之榖於本鄉捐出即貯本鄉令誠實之人經管上嵗加謹收貯中嵗糶借易新下嵗量口發賑嗣於三年内直屬勸捐米榖共七萬四千九百七十石有竒出借窮民得息米一千五十一石有竒又四十四年永保二府陸續捐榖四百三十五石有竒巡撫以聞議准俱令於各屬社倉存貯四十三年以京城米貴命每月發通倉米三萬石運至五城平糶又議定州縣官霉爛倉榖處分州縣倉穀霉爛者督撫題㕘革職留任限一年賠補賠完免罪復職逾年不完解任二年外不完定罪著落家産追賠補完之日令府道出具印結申繳藩司督撫存案以杜扶揑之弊如再有虧空府道亦分别議處又命截留漕米二萬石收貯河間沙河橋地方以備平糶又以山東歉收命從江南買榖運往收貯又議定各省倉穀存留發糶數目定例各省積貯米榖大州縣一萬石中八千石小六千石其餘按時價易銀解存藩庫其存倉米榖每年以三分之一出陳易新至是又議准直𨽻各屬現存米榖無多令照舊收貯值歉年詳明題請發糶山東大州縣貯榖二萬石中州縣萬六千石小州縣萬二千石山西之民别無他業惟資田畆積貯榖少一時購買維艱令大州縣存榖二萬石中一萬六千石小一萬二千石江西州縣大者止存榖一萬二千石暫停糶三江蘇所屬令大州縣貯榖五千石中四千石小三千石其江寧倉捐米八萬七千餘石久貯恐致浥爛照常平倉每年糶三秋成買補四川人民稀少大州縣貯穀六千石中四千石小二千石無庸糶三廣東常平倉米榖照例存貯多餘易銀按逺近分貯司庫府庫遇有荒年將庫貯銀兩遣官赴鄰省採買運至被災之處照時價糶賣至存倉米榖照例出易惟潮郡僻處山陬或遇荒歉米價騰踊令存貯榖四萬八千七百餘石以備不虞雲南糶三銀兩令州縣官就近解存俟秋領銀買補河南現存榖石每年將一半留倉備賑一半借給窮民福建現在捐輸榖二十七萬餘石常平倉榖約五十六萬餘石其内地積榖仍按原存州縣之額數存留其常平榖照依時價盡數發糶至臺灣一府三縣孤懸海外現在捐榖八千六百餘石常平倉榖一十一萬餘石除每縣應存穀石其餘盡糶貯銀遇荒賑濟所存榖石仍照例出易而臺灣鳯山諸羅三縣共存粟米七十餘萬石為數既多積貯日久令留二十萬石為臺郡預貯三年兵需其餘一概變銀收貯府庫即充本地兵餉盛京地方與各省不同無庸分别大小定數其九州縣積貯米糧多寡不等自四十三年起將現在數多之寧逺州錦州應徴米豆改徴銀兩解交數少之承徳七州縣買糧葢倉以資積貯貴州各府州縣常平倉現貯米一千二百餘石稻蕎麥共一十八萬餘石内惟貴安等地方俱係衝要且官兵駐劄自宜多貯貴陽府存貯稻一萬一千餘石貴筑縣存貯稻一萬四千餘石安順府存貯稻八千石其餘各府屬有六千石及三四五千石不等俱不足大中小州縣應存之數俟捐貯贏餘之日再請糶賣又命自明嵗正月為始於京師及通州地方發倉米照本年例平糶四十四年議令河南各屬建倉積榖以河南府居數省之中宜積榖以備賑濟山陜之需議令將四十三年漕米每米一石易榖二石共榖四十六萬五千六百八十二石於河南府收貯榖二十三萬五千六百八十二石造倉厫二百九十三間貯之其餘二十三萬石於近汴近洛之祥符貯三萬石中牟貯二萬五千石汜水貯二萬石鞏縣貯二萬五千石澠池貯二萬石偃師貯二萬八千石陜州貯二萬七千石靈寳貯二萬八千石閿鄉貯二萬七千石共造倉厫三百六十四間加謹收貯每年青黄不接之時出陳易新照依三分之一借給農民秋後還倉四十六年以江蘇旱災動支藩庫銀至湖廣買米平糶從巡撫于準請也四十七年以江南米貴截留湖廣江西漕米四十萬石分撥江寧蘇州松江常州鎮江揚州六府減價平糶又令福建採買米榖存貯以福建去嵗被災各處商販稀少米價漸昻借藩庫銀於他省採買存貯備賑又以江蘇久雨米貴令各州縣將截留分貯米石平糶并勅各省督撫聽商人販米出境又定州縣官經理倉榖議敘議處之例議定州縣官於額貯積榖之外買榖貯倉照盤查贏餘例准其議敘或捐榖本倉以少報多或將現貯之米揑作捐輸以邀議敘後遇本官任内有虧空事發除知府分賠外原報之督撫一併議處至職官將倉榖私借與民計贓以監守自盜論所少榖石著落追賠又截留漕糧於江浙被災各州縣減價平糶江蘇截留十萬石安徽截留五萬石浙江杭嘉湖三府截留八萬石俱令減價平糶價銀貯庫於來嵗收獲後買米還項四十八年命江浙二省有司勸諭紳民於秋收時遵行捐輸之法又以江浙米價騰貴清查收買囤積之弊時湖廣江西稻榖豐收沿江販米甚多而江浙米價愈貴縁富豪之家廣收囤積於中取利勅廷臣詳議尋議應檄各該督撫選委亷能官員凡有名馬頭令其嚴行察訪如有富豪人等將市米囤積者即令在囤積之處照時價發糶違者以光棍例治罪其有販米私出外洋者令沿途文武官弁嚴查禁止使湖廣江西販買之米俱入江南浙江地方則米價自平上諭大學士等曰如照爾等所議則胥役借此稽察徒滋需索而已朕意以為必於本源之地清查自無收買囤積之弊湖廣江西之米或江浙富商或土著人民某人於某處買米石若干清查甚易應行文湖廣江西督撫委賢能官將有名馬頭大鎮店買賣人名姓及米數一併查明每月終一次奏聞併將奏聞之數即移知浙江督撫湖廣江西之米不往售於江浙更將何徃此米衆所共知則買與賣不待申令而米之至者多即大有利於民也四十九年議陜甘存貯米石發糶陜甘存貯米石已厯年久恐有浥爛議定糧貴之年存五糶五糧賤之年存七糶三又令湖南鎮筸地方積貯平糶湖南鎮筸地方自改協為鎮之後兵民聚處生齒日繁至是署巡撫王度昭言請酌借帑銀三千兩買榖貯倉榖貴之時平價發糶秋成榖賤之時買補還倉預備賑濟每年將餘剰價銀於六年之内補還所借之項從之嗣户部議定將買貯榖石責令鳯凰營通判専管辰沅靖道兼轄年終盤查出結如有虧空那移道員照知府例通判照知縣例議處准浙江開例捐監定額貯倉先是江南開例捐監定額貯倉捐足奏明停止至是浙江巡撫黄秉忠言江浙二省財賦之地人民繁庻止於江省開捐則湖廣江西之米俱聚集江南而浙省捐納之人亦必將米運赴江南浙米勢必騰貴民食愈艱請亦照江南捐監例各府議定貯倉米榖額數捐足即行停止從之五十一年議准山東省分貯捐榖大縣一萬石小縣八千石仍於沿河等處酌留數十萬石以備鄰省撥運五十二年詔發米一萬石於京城減價平糶又命都察院左都御史趙申喬徃廣東發常平倉榖平糶廣東米價騰貴發常平倉榖三十萬石平價糶賣交與趙申喬等前徃辦理尋奉諭㫖俟八九月北風起時從江浙兩省撥米二十萬石用水師營戰船裝載由海運徃若廣東豐收將此運至米石一半存貯粤省一半分運閩省備賑嗣以浙省歉收十萬石俱留備本省之用撥江南米五萬石運至福建五萬石運至廣東到日即行平糶又飭江西省嚴查出糶倉榖江西巡撫佟國勷言入夏以來米價漸長小民籲請發粟臣已將所貯倉榖令有司糶賣俟秋後買補還倉上諭大學士等曰去年江西省年榖甚熟或因地方官虧空倉榖借此抵銷亦未可定著户部詳議具奏尋議佟國勷題報發糶倉榖原疏内並未聲明係何州縣及所糶倉榖若干應行令該撫嚴查其現在糶榖州縣中有浥爛虧空借此開除等弊即著指名題㕘從之五十四年以宻雲古北口闗隘要地各運米石存貯又議定直省社倉勸輸之例凡富民能捐榖五石者免本身一年雜項差徭多捐一二倍者照數按年遞免紳衿能捐榖四十石令州縣給匾捐六十石知府給匾捐八十石本道給匾捐二百石督撫給匾其富民好義比紳衿多捐二十石者亦照紳衿例次第給匾捐至二百五十石咨部給以頂帶榮身凡給匾民家永免差役五十五年發熱河倉米減價糶賣時上駐蹕熱河諭領侍衛内大臣等聞熱河米價甚貴每石至一兩七錢扈從人等復行齊集採買則米價愈加騰貴官兵每月既得錢糧若復給口糧未免重複但以所給錢糧買米又恐不敷著將熱河之倉及唐三營倉所貯之米發出設立一厰每石定價銀一兩賣與隨駕官兵令各該管之人查視不許多買自無轉賣之弊而於官兵亦大有禆益矣又暫開山海闗米禁户部議覆直𨽻巡撫趙宏燮疏言永平府屬艱食臣聞得山海闗外米榖頗多向因奉禁不敢入闗請暫開兩月之禁俾闗外之民以榖易銀益見饒裕闗内之民以銀易粟得賴資生應如所請從之又以京師米貴發米三萬石減價平糶又飭查河南山東商賈販賣麥榖數目禁止囤積大學士九卿等遵㫖議定河南山東與京師甚近兼之連年豐收乃京師麥價未見甚減者皆由商賈富户等預行收買所致應行文河南山東巡撫查明由水路北來買與商賈麥榖數目每月繕摺奏聞仍行文直𨽻巡撫凡本處商賈及沿途富户有多買者俱嚴行禁止從之五十六年發通倉積米分運直𨽻各府州縣存貯平糶五十七年禁湖南遏糴廣東廣西總督楊琳疏言粤東之米資藉粤西粤西之米又資藉湖南湖南販米至粤必由永州府經過彼地奸民每借禁糶名色攔阻勒索商販不前請令湖南督撫如有奸民阻截取利者行令該地方官查拿治罪從之五十九年於河南截留漕米内撥十萬石運至西安存貯六十年以京師米貴發京通倉米石并内務府莊頭榖石減價平糶以陜西嵗歉撥運河南米石平糶再撥河南湖廣米各十萬石運徃存貯備用是時陜西歉收上念陜省富户積藏米石甚多復發内庫銀五十萬兩令左都御史朱軾光禄寺卿盧詢徃陜省勸諭富户照時價糶賣米石議令直省督撫嚴查各州縣現在存倉米石諭大學士等曰古人云三年耕則有一年之蓄九年耕則有三年之蓄言雖可聽行之不易如設立社倉原屬良法但從前李光地張伯行曽經舉行終無成效至於各省積貯榖石雖俱報稱數千百萬實在存倉者無㡬即出陳易新之法亦不為不善苐春間僅有所出秋後並無所入州縣官侵蝕入已急則以折銀掩飾此等積弊朕知之甚詳其報荒之真偽虛實朕亦無不洞悉如熱河所積榖石每年減價平糶秋收糴補還倉數目無多稽查頗易所以每有餘糧爾等㑹同詳議具奏於是議定各省州縣現在存倉米麥榖石令該督撫嚴查如有虧空勒限補足又令直𨽻山東河南山西四省將常平倉榖平價糶賣直𨽻山東河南山西陜西被旱除陜西已差大臣賑濟外現查常平倉米榖直𨽻一百六十萬五千二百七十石零山東四百七十三萬石零河南一百三十四萬七千石零山西四十八萬二百石零令四省巡撫遣官分賑并平價糶賣又令浙江運米三萬石至福建厦門收貯以福建地方需米孔殷勅浙江巡撫提督於乍浦地方嚴禁私買不許出海動帑買米三萬石預備海船裝載派官兵䕶送押運從海運至厦門收貯其福建販賣米石不必禁止又以山西建立社倉經奉差山西左都御史朱軾疏請晉省建立社倉用備荒歉奉諭㫖建立社倉之事李光地任巡撫時曽經具奏朕諭以言易而行難爾可姑試李光地行之數年並無成效民多怨言張伯行亦奏稱社倉頗有禆益朕令伊行於永平地方其果有成效禆民之處至今未奏且社倉有益無益朕久已留心採訪凡建立社倉務須選擇地方敦實之人董率其事此人並非官吏無權無役所借出之米欲還補時遣何人催納即豐收之年不肯還補亦無可如何若遇歉收更誰還補耶其初將衆人米榖扣出收貯無人看守及米石缺空之時勢必令司其事者賠償是空將衆人之米棄於無用而司事者無故為人破産賠償矣社倉之設始於朱子其言具載文集此法僅可行於小邑鄉村若奏為定例屬於官吏施行於民無益今朱軾以建立社倉具奏此事不必令他人辦理即令伊久住山西鼓勵試行六十一年諭户部趙宏燮奏將收貯正定順徳各州縣四萬石米平糶其餘各州縣有米貴之處亦將倉米平糶十分之三俱俟秋收後買補還項等語去年各州縣收貯荘頭等所交米石部内曽遣司官㑹同地方官糶賣其糶米銀兩至今尚未完繳據此各州縣收貯倉米俱無實際平日積貯原為備荒而設今值青黄不接之時固應平糶但地方官虧空倉米即借此掩飾虧空究竟倉米既虧百姓從何糴買於民生並無禆益也現在存倉米榖如果足數即照該督所請糶賣倘朕遣大臣查看時州縣並無米榖黎庻不得糴買將州縣官即行正法該管上司從重治罪皇朝文獻通考卷三十四
