body:
  text: 經籍考四經禮臣等謹按馬端臨通考三禮次序儀禮在前周禮在後故續五朝通考倣其例以仍馬氏之舊兹纂皇朝通考恭繹欽定三禮義疏御製序文列周禮於儀禮之先自應謹遵詮次並恭録御製序文於周官義疏之前俾讀者知周禮乃一代治天下之典而儀禮為經禮記為傳各以類從庶不失本末綱領之次焉欽定周官義疏四十八卷乾隆十三年大學士鄂爾泰張廷玉等奉敕撰皇上御製序曰三禮之傳逺矣周禮六官河間獻王上之儀禮十七篇禮記四十九篇高堂生戴聖傳之漢唐以來箋疏訓釋無慮數十家考其義或相抵牾先儒嘗譏其聚訟要其掇拾灰燼之餘傳先王制作之舊得什一於千百好古者所為鄭重而愛惜之也我皇祖聖祖仁皇帝表章羣經既御纂周易折中而詩書春秋則以分授儒臣纂輯義疏頒布海內惟三禮未就朕御極之初儒臣上言今當經學昌明禮備樂和之會宜纂輯三禮以蕆五經之全爰允其請開館編校越十有一年冬告竣夫禮之所為本於天殽於地達之人倫日用行于君臣父子兄弟夫婦朋友之間斯須不可去者天不變道亦不變此其本也其制度品節服物采章隨時損益屢變以適其宜者禮之文也三代去今數千年矣修其教而教明循其道而道行謂三代至今存可也何則其本得也若其用之朝廷邦國名物器數之具周旋進退之儀雖先王處此必將變通以適其宜而不泥於其迹故言禮者惟求其修道設教之由以得夫禮之意而已顧其教之不泯道之所由傳未嘗不賴於經好學深思之士讀其書有惜不能俯仰揖讓於其間者先王制作之精意尚可想見於抱殘守闕之餘則經傳之為功也大矣鼎彝鈎劒之遺篆籀之迹流傳有自尚摩挲而寶護之況制作之精意所賴以傳者歟獨其貿於衆説無所取𠂻爰命校纂諸臣芟煩截浮約文申義敷暢厥旨至其説之不可強同者稍為辨正而仍其舊蓋其承傳各異必牽合附會比而同之則其惑也滋甚故無取焉刻既成為之敘論以發其端俾隆禮者有所考云臣等謹按義疏例略有七其直詁經義確然無疵者曰正義其後儒駮正舊説至當不易者曰辨正或以本節本句參正他篇比類以測義或引他經與此經互相發明者曰通論或雖非正解而依附經義於事物之理有所推闡者曰餘論各持一見義亦可通又或已經駮論而持此者多未遂偏廢者曰存疑名物象數久逺無傳難得其真或創立一説雖未愜人心而姑存以資考辨者曰存異本節之義已經訓解又合數節而論之曰總論七條之後或辭連義貫難以折斷則附於最後一條之末三書凡例雖各不同而編纂之義大抵如一是編首列聖祖仁皇帝御論次列綱領次列總敘八條至御撰序文包羅萬有綜覽百家揭三禮之宏綱成一篇之巨製兹恭録於是編之前以見部雖區而為三類則仍統於一云周禮訂釋古本無卷數王芝藻撰芝藻見易類高注周禮二十二卷高愈撰愈字紫超無錫人順治中歲貢生臣等謹按江南通志載愈著周官集解十六卷當即此本今是編分卷不同或傳寫互異耳周禮惜隂録六卷徐世沐撰世沐見易類周官辨非一卷萬斯大撰斯大字充宗鄞縣人陸元輔曰四明諸生萬斯大從學於黃梨洲究心經學以周官為非周公之書舉其可疑者辨駮之凡五十五則或舉吳氏之説或獨抒己見皆持之有故言之成理梨洲極稱許之黃宗羲曰充宗不為科舉之學湛思諸經以為非通諸經不能通一經非悟傳注之失則不能通經非以經釋經則無由悟傳注之失所為書曰學禮質疑曰周官辨非曰儀禮商曰禮記偶箋臣等謹按是編斯大取周禮一書條舉件繫詳稽博考極辨其非凡五十餘節蓋斯大於經學頗有根柢而於禮經疑義尤所究心故能直抒己見言之鑿鑿周禮述注二十四卷李光坡撰光坡字耜卿號茂夫安溪人大學士光地之弟杭世駿曰光坡家居不仕潛心經學著有三禮述注此即其一臣等謹按光坡受三禮於其兄以周官闕誤獨多乃根柢注疏兼採諸儒經解閲丙寅至甲申始得成書周禮問二卷毛竒齡撰竒齡見易類周禮輯義十二卷薑兆錫撰兆錫見易類周禮節訓六卷黃叔琳撰叔琳見易類叔琳自序曰經之有三禮也周禮其大綱學士大夫經生小子誠講明而切究焉則考古即所以知今也叔琳屏居無事薈萃先儒成説旁採時賢新義掇其菁英剃其繁復參互考訂間附愚管名為周禮節訓周禮訓纂二十一卷李鍾倫撰鍾倫字世得安溪人康熙癸酉舉人臣等謹按是書前有李紱林令旭二序末有其子廣平知府清馥跋稱鍾倫初受三禮於叔光坡鄉薦後日侍其父光地於京邸及光地視學順天巡撫直𨽻隨行十餘年深得指授又與宣城梅文鼎長洲何焯宿遷徐用錫河間王之鋭同里陳萬策等往復討論故是書詮釋具有本源曰訓纂者纂其父光地之訓也周官集注十二卷周官析疑三十六卷考工記析疑四卷周官辨一卷方苞撰苞字鳳九號靈臯亦號望溪桐城人康熙丙戌進士官至內閣學士兼禮部侍郎後落職修書特賜侍講銜致仕苞自序周官集注曰朱子既稱周官遍布周密乃周公運用天理爛熟之書又謂頗有不見其端緒者學者疑焉是殆非一時之言也蓋公兼三王以思四事於人事之終始百物之聚散思之至精而不疑於所行然後以禮樂兵刑食貨之政散布六官而聫為一體其筆之於書也或一事而諸職各載其一節或舉下以賅上或因彼以見此其設官分職之精意為文字所不載迫而求之誠有茫然不見其端緒者久而相説以解然後知其首尾皆備而脈絡自相灌輸竊嘗析其疑以示生徒並纂録一編指在發明端緒故凡名物之纎悉推説之衍蔓者概無取焉禮説十四卷惠士竒撰士竒見易類臣等謹按士竒貫串三禮能補鄭康成所未備而不悖其旨講漢學者多宗之周禮集傳六卷李文照撰文照見易類文照自序略曰朱子曾稱周禮為天理爛熟之書表章雖明而訓釋未逮諸儒之説不能有醇無疵因逺稽博採上推列聖之因革下鑒列代之興衰以竊附於詩書集傳之後周官翼疏三十卷沈淑撰淑字季和常熟人雍正癸卯進士周禮會要六卷王文清撰文清號九溪寧鄉人雍正甲辰進士官至宗人府主事周禮質疑五卷劉青芝撰青芝見詩類周禮拾義無卷數李大濬撰大濬安溪人周禮三注粹鈔二卷高宸撰宸字北侍福建人雍正中諸生周官祿田考三卷沈彤撰彤見書類彤自識曰彤嘗研求本經勤覽傳記得其端於載師之都邑以為凡內外官之祿皆可得辨析整齊之又曰自宋以來之稽官有未及鄉遂屬吏者今乃并郊野之吏而補之其稽田有不去山林川澤城郭等三之一者今更通不易一易再易上中下之率而二夫當一夫則官益多而田益少宜祿之不給尤甚也然以縣都已下數等之田食公卿大夫士數等之爵非獨相當且供他用而有餘是田祿與官爵之數在本經未嘗抵牾也周禮疑義舉要七卷江永撰永字慎修婺源人臣等謹按是書多申明古義其釋考工記較賈公彥疏更為明析右禮類周禮欽定儀禮義疏四十八卷臣等謹按乾隆十三年敇撰三禮義疏此其第二部也首綱領一卷次釋宫一卷俱不入四十八卷之數經文分四十卷末附禮器圖四卷禮節圖四卷儀禮一經疑義奧詞至為難讀唐韓愈已嘗苦之故宋元以來李如圭敖繼公之外率多不傳湮晦者四五百年先王舊禮數典而茫如矣是編訂訛補闕斷自宸𠂻賈鄭之精微畢録宋元之論述旁搜巨目宏綱條分縷析仰見聖學邃深經綸博物所由昭然大著於世也儀禮鄭注句讀十七卷附監本正誤石經正誤二篇張爾岐撰爾岐見易類爾岐自序略曰庚戌歲年五十九勉讀儀禮六閲月取經與注章分之定其句讀疏則節録其要取足明注而止或偶有一得亦附於末以便省覽顧炎武曰濟陽張君稷若作儀禮鄭注句讀一書根本先儒立言簡當以其人不求聞達故無當時之名而其書實似可傳使朱子見之必不僅謝監嶽之稱許也儀禮惜隂録八卷徐世沐撰世沐見易類儀禮商二卷附録一卷萬斯大撰斯大見周禮類儀禮述注十七卷李光坡撰光坡見周禮類光坡自序曰言禮如聚訟此諸儒不分經傳之失也三代之禮存者惟周官儀禮為經耳三傳禮記及子史言禮者皆傳也如郊社左氏公羊曲禮皆言不卜穀梁言卜而冢宰有卜日則言卜得矣晏子春秋言四時祭祀皆用孟月而大司馬明著四仲則仲月得矣若誣周官為莽歆竄入指其隂雜病儀禮推士以及天子小其不完則非所知也儀禮訓義十七卷不著撰人姓氏原序自題康熙庚申儀禮析疑十七卷方苞撰苞見周禮類儀禮章句十七卷吳廷華撰廷華初名蘭芳字中林仁和人康熙甲午舉人官至福建海防同知廷華子夀祺識略曰儀禮一經句讀不明則句可移綴上下往往賔主易位東西乖方其失者一章次不明則禮之始終度數散無條貫其失者二是書定為章句如士冠禮筮日戒賔雖仍賈疏及儀禮經傳通解所分之次而更按其節奏分為六章令讀者知某事在某禮之前某事在某禮之後十七篇節目瞭如指掌其訓釋多本鄭賈間採他説附按以發明之補饗禮一卷諸錦撰錦見詩類臣等謹按儀禮十七篇獨無饗禮元吳澄有補經補傳十八篇於饗禮僅附見於聘覲篇中亦未有特著夫饗有祭帝祫祭之大饗又有天子享元侯兩君相見以及凡享賔客之各異原非聘覲之所得而該錦因取周官春秋傳禮記諸書中猶可考見者輯而補之雖篇帙無多而典章可據正不得而少之也禮經本義十七卷蔡德晉撰德晉字仁錫無錫人雍正丙午舉人官司務宫室考十三卷肆獻祼饋食禮三卷任啓運撰啓運見易類臣等謹按宫室考一書於李如圭釋宫之外别為類次分目十三條理秩然可與鄭注相為參考肆獻祼饋食禮則取三禮中之有關王禮者推之不得於經則求之注疏其名本乎周禮每篇各為節次每節先已説而自注其説之所從出博稽逺證較之黃幹所續祭禮更加密焉儀禮小疏一卷沈彤撰彤見書類儀禮釋宫增注一卷儀禮釋例一卷江永撰永見周禮類儀禮易讀十七卷馬駉撰駉字德淳山隂人儀禮集編四十卷盛世佐撰世佐秀水人官龍里縣知縣右禮類儀禮日講禮記解義六十四卷聖祖仁皇帝御製序曰朕聞六經之道同歸而禮樂之用為急孔子曰安上治民莫善於禮又曰上好禮則民莫敢不敬誠以禮者範身之具而興行起化之原也天之生人品類紛綸莫可紀極聖人起而整齊之法於天則於地順於人逹於時協於鬼神斟酌損益以定其品節限制俾天下化其好逸惡勞之心而豫以從善棄惡之道蒸蒸焉日蹈履於中正而不敢越蓋非有以強之也率乎其理之所安而已其綱有三百其目有三千大者在冠婚喪祭朝聘射燕之規小者在揖讓進退飲食起居之節循之則君臣上下賴以序夫婦內外賴以辨父子兄弟婚媾姻婭賴以順而成反是則尊卑易位等殺無章家未有能齊而國未有能治者故曰動容中禮而天德備矣治定制禮而王道成矣嘗遐觀三代禹湯文武惇敘彝典以倡導天下而其時之諸侯秉禮以守其國大夫士遵禮以保其家下至工賈庶人畏法循紀以世其業嗚呼何風之隆哉朕企慕至治深惟天下歸仁原於復禮故法宫之中日陳禮經講習紬繹蓋不敢斯須去也慨自嬴秦焚燒典籍禮乃滅亡漢興崇尚儒學禮經始顯傳之者十三家而戴德戴聖為尤著聖所傳四十九篇即所謂禮記者是已逮程子朱子出表章學庸遂開千古道學之統其餘四十七篇雖雜出於漢儒亦皆傳述聖門格言有切身心要旨朕熟之復之靡間寒暑積有講義裒成全部辨以敘言用以無忘斯勤然豈徒效儒生呫嗶云爾哉務佩服其訓辭而實體諸躬修措之邦國使百爾懷恭敬遜讓之誠兆庶凜撙節防間之則德化翔洽上嫓隆古庶乃愜朕敦崇禮教之意也夫皇上御製序曰皇祖聖祖仁皇帝稽古右文命儒臣日直講筵五經通鑑以次進講薈萃羣言發明旨要臚為解義積有成編譯以國書頒示中外各製序言辨其端而授諸梓易書詩三經先竣春秋若干卷刻於雍正年間惟禮記卷帙浩繁藁本存翻書房久之未竟厥業朕御極之初允儒臣請纂修三禮義疏因取日講禮記解義原本參校同異歸於一是并命翻譯授梓以備五經之全敬刋皇祖御製原文於前而略述大概以志成書嵗月惟禮記出自漢儒然多本於七十子之所傅習如大學中庸二篇既經有宋大儒定為孔氏遺書訓釋而列於學官其他精言奧義往往與易書詩春秋相發明非董仲舒揚雄輩所及蓋其來有自去聖人之教固未逺也雖月令王制附益其間有以啓後人疑議而先王之制所傳各異事之不可考而説之不可強同者亦已多矣依文立訓以存舊觀説經之通例也抑班固有言六經之道同歸而禮樂之用為急經禮三百曲禮三千豈惟其文而已蓋將以章志貞教大其防與天下臣民共之仰惟聖祖序言所謂體諸躬修措之邦國者禮之實而明經之大用也因言以求其義因義以達其用夫豈章句訓詁之足云敢申言之以闡至訓臣等謹按是編為聖祖仁皇帝講筵御論未及成帙乾隆元年命承修三禮諸臣大學士鄂爾泰張廷玉等重加參校告成刋布聖祖仁皇帝聖敬日躋動容中禮日進儒臣講論禮經斯須不去我皇上服膺至訓夀梓頒行本善述之心垂淑世之範是以德化翔洽天下歸仁猗歟休哉斯誠萬世一時之嘉會已欽定禮記義疏八十二卷臣等謹按乾隆十三年敇撰三禮義疏此其第三部也區經文四十九篇為七十七卷附載圖五卷禮記自陳澔集説行而古義寖微是編仰承指授衡鑒至精於集説則棄瑕録瑜於羣言則兼收並採他如百家雜説有裨諸儒未備者亦必博採以備參稽而後鄭注之精奧孔疏之博贍衛湜集説之詳明粹然集其大成矣深衣考一卷黃宗羲撰宗羲見易類禮記提綱集解四卷邱元復撰元復字漢標號嵋菴諸城人禮記疏略四十七卷張沐撰沐見易類沐自序略曰他經皆疏略五經闕一不可故采托纂輯并會同志而屬之以分注云臣等謹按是編沐所輯者僅禮運禮器樂記學記四篇餘則武進王渭登封馮五典上蔡李範世及其從子煓所共成者故自序有屬以分注之語然自古説經貴抒己見専門亦可名家夫何闕一不可之有大學翼真七卷胡渭撰渭見書類臣等謹按大學中庸二篇本戴記舊文自陳澔集説以朱子編入四書遂刪除不載伏讀欽定四庫全書雖列入四書類中而欽定禮記義疏則備録全文以復古今之舊今謹遵編次凡大學中庸之單行者仍入禮類且以從馬氏舊例焉禮記惜隂録八卷徐世沐撰世沐見易類大學古本説一卷中庸章段一卷中庸餘論一卷李光地撰光地見易類光地大學古本説識略曰大學舊本二程子各有更定朱子因之又加訂為今本五百年來羣疑朋興光地讀朱子之書凡如易之卜筮詩之雅鄭周子無極之旨邵氏先天之傳皆能灼然不惑獨於此書亦勉強應和而非所謂心通默契者陳其所得待方來之朱子而折𠂻焉又自序中庸章段曰讀章句五十年知近代講解之誤蓋自宋元之間而已失之是編於章段離合之間雖頗有所連斷然其義所自來則皆竊取朱子平生之意也禮記偶箋三卷萬斯大撰斯大見周禮類陳氏禮記集説補正三十八卷納喇性德撰性德見易類臣等謹按方苞望溪集謂此書本陸元輔所撰徐乾學刻經解時改題性德撰禮記述注二十八卷李光坡撰光坡見周禮類光坡自序曰始讀陳氏集説疑其未盡及讀注疏又疑其未成如序內稱鄭氏祖讖孔氏唯鄭之從不載他説以為可恨鄭氏祖讖莫過於郊特牲之郊祀祭法之禘祖宗而孔氏正義皆取王鄭二説各為臚列其他自五禮大者至零文單字備載衆詁在諸經注疏中最為詳核何妄詆歟又禮器篇斥後代封禪為鄭祖緯啓之秦皇漢武前鄭數百年亦鄭注啓之乎又多約注疏而成鮮有新意而指注疏為舊説凡此之類抵冒前人即欺負後人何以示誠乎抑譏漢唐儒者説理如夢此程朱進人以知本吾儕非其分也今於禮運則輕其出於老氏樂記則少其言理而不及數其他多指為漢儒之附會逐節不往復其文義通章不鉤貫其脈絡而訓禮運之本仁以聚亦曰萬殊一本一本萬殊仲尼燕居之仁鬼神仁昭穆亦曰克去已私以全心德欲以方軼前人恐未能其退舍也又曰朱子教學者看注疏自宋末有陳氏集説學者祧注疏而崇焉今本朱子之教而陳氏雜合諸儒説為文亦或仍之曽子問講録四卷大學證文四卷大學知本圖説一卷大學問一卷中庸説五卷毛竒齡撰竒齡見易類臣等謹按蕭山連山門外講堂即宋儒楊時講學之所有以曽子問首章請業於竒齡者借講堂側講此凡一百三十九條又嘗論列石經本石經改本及程子朱子改本元明諸人改本以成證文知本圖説則竒齡自謂於嵩陽廟市得大學古本闡悟徹然自畫一圖後二十年述而為之説大學問者因門人邵廷采之問而答之中庸説則其門人子弟輩所編次而各附已説者也禮記章義十卷薑兆錫撰兆錫見易類大學傳注一卷中庸傳注一卷李塨撰塨見易類禮記詳説無卷數冉覲祖撰覲祖見易類覲祖自序略曰坊本諸講其標宗旨剔字句順口吻聨脈絡化板為圓亦足醒人心目故編檢而分載之附先儒後大學講義一卷中庸講義一卷楊名時撰名時見易類校補禮記纂言三十六卷元吳澄原本朱軾重訂軾見易類臣等謹按是書篇目注釋一仍吳氏之舊其於澄注後問以軾按二字别之者則其以己見辨定者也考定石經大學經傳解一卷邱嘉穗撰嘉穗字實亭上杭人康熙壬午舉人官歸善縣知縣禮記析疑四十六卷方苞撰苞見周禮類中庸本旨二卷朱謹撰謹號雪鴻崑山人大學本文一卷大學古本一卷大學困學録一卷中庸本文一卷中庸困學録一卷王澍撰澍見書類臣等謹按澍取夫學中庸本文及朱子章句原序各為評論大意欲以章法句法闡求書理其古本一卷則與朱子改本並相尊奉困學録兩卷發明學問之功不徒以尋繹語脈順文詮解蓋勝乎坊孰詁本多矣成均講義無卷數孫嘉淦撰嘉淦字錫公興縣人康熙癸巳進士官至吏部尚書協辦大學士諡文定臣等謹按是編專疏聖經一章以發明章句之義其講致知格物深中學者之弊大學偶言一卷張文檒撰文檒字風林又字樹聲蕭山人康熙甲午舉人官成都縣知縣成均課講無卷數崔紀撰紀見易類紀自識略曰大學以慎動為宗故所言多顯中庸以主靜為宗故所言多微究則體用一原顯微無間者也學者惟是微大學之顯而闡中庸之幽庶有以得其源流指趣之一矣禮記類編三十卷沈元滄編元滄字麟洲仁和人康熙丁酉副榜貢生官文昌縣知縣元滄自序曰小戴禮篇帙繁賾讀者未易得其要領辨索有年乃為一書先之以五典次之以五禮冠之以通論廣論殿之以儀節文繁者分刋之繁甚者更細分之注仍漢之鄭氏音義仍唐之陸氏戴記緒言四卷陸奎􅈴撰奎勳見易類奎􅈴自序曰元儒衛正叔集説百有六十卷採托大備丹黃一過始知陳氏説之醇粹者悉本朱子其餘集解不免偏駮爰舉曲禮四十六篇每篇作一小序辨其為周為秦為漢凡先儒之説有足正陳氏舛訛者亟為録存尚有遺義則就己見論定焉中庸解一卷任大任撰大任字鈞衡吳江人檀弓疑問一卷邵泰衢撰泰衢字鶴亭錢塘人明於算術官欽天監左監副學禮闕疑八卷劉青蓮撰青蓮字華嶽襄城人臣等謹按青蓮所撰自曲禮至奔喪七篇末一卷尚闕其弟青芝續成之鼇峰講義四卷潘思矩撰思矩見易類臣等謹按思矩嘗官福建巡撫鼇峰書院為巡撫所掌此其與書院生徒講大學中庸之語而諸生編次付梓者也檀弓論文二卷孫濩孫撰濩孫字邃人高郵人雍正庚戌進士官至監察御史禮記章句十卷任啓運撰啓運見易類禮記彚編八卷王心敬撰心敬見易類禮記訓義擇言八卷深衣考誤一卷江永撰永見周禮類臣等謹按擇言者永取檀弓至雜記諸注中異同者擇其一是而折𠂻之也持論精審足資參核深衣考亦援據精詳讀大學中庸日録二卷康吕賜撰吕賜字復齋别號一峯又自稱南阿山人武功人古本大學解二卷劉醇驥撰醇驥字千里號廓菴廣濟人右禮類禮記夏小正注一卷黃叔琳撰叔琳見易類臣等謹按夏小正一書原載大戴禮中隋志始别為一卷宋傅嵩卿作注朱子嘗仿其例復加訂定附於儀禮經傳通解元金履祥未見傅氏書以為朱子舊本采附通鑑前編夏禹元年下句為之注與傅多有異同國朝張爾岐合傅注輯為一編以已説附之叔琳刪其重復而作是編其自為之説者則稱案以别之大戴禮刪翼四卷薑兆錫撰兆錫見易類兆錫孫奭跋曰刪翼者因舊本而刪其繁冗翼其義理者也刪其繁冗如保傅篇刪去魏公子無忌等文翼其義理如禮三本篇據荀子利爵以正利省之誤是也有注在家語而從略者如王言五義五帝德盛德等篇是也有注在禮記而從略者如哀公問禮察曾子大孝朝事投壺等篇是也有注在儀禮外編而略互見其義者如夏小正武王踐阼等篇是也有舊本無注而箋解者如曾子立事本孝制言天圓與少間本命等篇是也夏小正詁一卷諸錦撰錦見詩類右禮類附録大戴禮三禮合纂二十八卷張怡撰怡一名遺字自怡初名鹿徴號瑶星江寧人前明登萊鎮總兵官可大之子以難蔭錦衣衛千户學禮質疑二卷萬斯大撰斯大見周禮類斯大自序曰大自丁未學禮以來取其大者條而説之首取戴記諸篇相對次取儀禮與戴記對次取易詩書春秋及左穀與二禮對用因所得竊著於篇黃宗羲序曰吾友萬充宗為履安先生叔子鋭志經學於三禮則條其大節目前人所聚訟者甲乙證據摧牙折角軒豁呈露昌黎所謂及其時而進退揖讓於其間者也此在當時顧人人所知者於今則為絶學矣其友魏方公為之先刻數卷充宗以為質疑者欲從余而質也余老而失學方欲求海內諸君子而質之又何以待質充宗亦姑以其所得參考諸儒必求其精粗一貫本末兼該鑿然可舉而措之無徒與衆説爭長於黃池則所以救弊其在此夫讀禮志疑六卷陸隴其撰隴其見書類臣等謹按隴其以漢儒採輯三禮所述古制互相考校多有未合因取孔鄭以來諸家注疏折𠂻於朱子之書並旁採春秋律吕與夫天時人事可以闡發禮經者成為是編其疑而未決者則仍闕之故名曰志疑讀禮竊注一卷孫自務撰自務字樹本號立菴安邱人嵗貢生稽禮辨論一卷劉凝撰凝字二至南豐人貢生官崇義縣訓導郊社禘祫問一卷廟制折𠂻三卷大小宗通釋一卷學校問一卷明堂問一卷毛竒齡撰竒齡見易類臣等謹按郊社禘祫問十八條答門人李塨問南北分祀及有禘無祫之説廟制折𠂻凡七廟五廟三廟二廟一廟夏五廟商六廟昭穆廟位列儒先諸説於前而以已説定之大旨宗王而駮鄭大小宗通釋以天子宗法無考祇諸侯公子略見於喪服小記及大傳二篇而説又不詳鄭孔亦無所折𠂻宋以後立説倍多愈不可信因取小記大傳言宗法者為條解焉學校問前答門人張希良問學校之名繼答門人吳鼎問廟學中先師設主因及鄉飲養老之禮又因門人薑垚問九室五室之辨故復著明堂問一篇禮學彚編七十卷應撝謙撰撝謙見易類郊社考辨一卷李塨撰塨見易類儀禮經傳內編二十三卷外編五卷薑兆錫撰兆錫見易類兆錫自述曰右儀禮經自士冠至少牢凡十四篇內士喪禮少牢禮又各離為二篇凡十六篇并今所採補之經傳若干篇是為儀禮內編而喪服一篇則與所採補之若干篇别為儀禮外編編之分內外何也本儀禮而分之也古無周禮儀禮之名漢藝文志稱古經五十六卷經十七篇是為經而記百三十三篇王史氏二十二篇曲臺后蒼九篇明堂隂陽説五篇是為傳皆不名儀禮也又周官六篇為經而周官傳四篇為傳亦不名周禮也永嘉張淳謂漢未有儀禮之名疑後世學者見十七禮儀遂因以名之是則儀禮之得名本於升降揖讓動作威儀之所發而為名故十六篇及凡所補之屬為內編而喪服篇及凡所補之屬乃所以行是儀禮之具而與其發見於升降揖讓動作威儀之間者則有間矣故為外編也禮樂通考三十卷胡掄撰掄字應麟武進人禮書綱目八十五卷江永撰永見周禮類五禮通考二百六十二卷秦蕙田撰蕙田字樹峯金匱人乾隆丙辰進士官至刑部尚書賜諡文恭參讀禮志疑二卷汪紱撰紱一名烜字燦人號雙池婺源人臣等謹按是書取陸隴其讀禮志疑於各條之下以己意參之故曰參讀禮志疑其所考論亦多得經義實可與隴其之書相發明耳三禮約編十九卷汪基撰基字警齋休寧人三禮會通二卷張必剛撰必剛字繼夫潛山人乾隆壬戌進士重刋朱子儀禮經傳通解六十九卷梁萬方撰萬方字廣菴絳州人臣等謹按朱子通解楊復序文謂朱子嘗稱黃幹所續喪祭二禮規模甚善欲依以改定全書而未暇萬方援據此語遂以幹之體例更定朱子之書名曰重刋實則改修也右禮類總禮皇朝文獻通考卷二百十四
