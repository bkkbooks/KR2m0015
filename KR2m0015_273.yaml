  text: 輿地考五山西省臣等謹按禹貢叙冀州於九州之首而晉陽平陽之間伊耆氏實先後都之所謂惟彼陶唐有此冀方者也冀州三靣距河當時闢龍門鑿吕梁至於壺口既載而西河以治此施功之最大者然則今之山西固禹迹所首經之地矣周禮職方氏河内曰冀州正北曰并州其霍恒二山及諸州浸多在今山西境内地利之勝自古而然戰國時趙韓魏以三晉遺墟争雄大國逮乎十六國南北朝時諸雄並起割據相尋率以此為用武之地葢其界隣朔塞東據太行而西薄大河形勢最為險要明代自邊墻以外為元裔所逼處築城架屋號曰板升侵軼之患無歳無之終明之世大同宣府之間倚為重鎮又以雁門寧武偏頭為外三闗列戍分屯控防孔亟我朝邊境敉寧各衛所之地俱已改為朔平寧武等郡縣至於長城之外䝉古各部久為臣僕若歸化城綏逺城及豐鎮寧逺諸㕔並以王官臨治其奉令禀敎視内地無異焉於以拱䕶帝京峙為右輔固不僅區區焉畫郊圻固封守之為矣山西明置山西等處承宣布政使司治太原府領太原平陽潞安大同四府汾澤沁遼四州又置山西都指揮使司領太原左右等七衛保徳等四守禦千戸所又置行都指揮使司領大同等十三衛二所萬厯中又升汾州為府本朝初因之設山西巡撫及布政使司按察使司皆駐太原府復仍明制設宣大總督駐大同府之陽和城順治十三年裁宣大總督改置山西總督康熙四年併為山陜總督駐西安府兼轄山西十四年復専設山西總督十九年裁山西總督雍正元年增置歸化城同知㕔分理邊外蒙古民人交涉事務二年升太原府屬之平定忻代保德四州平陽府屬之蒲解絳吉隰五州俱為直𨽻州三年增置朔平寧武二府六年升蒲州澤州俱為府乾隆四年増置綏逺城同知㕔與歸化城㕔並直𨽻於歸綏道二十五年於歸化城綏逺城所屬地方又増置五通判㕔分理邊外事務三十五年升平陽府屬之霍州為直𨽻州仍以吉州還屬府凡領府九直𨽻州十道所轄之㕔七各衛所俱以次裁併入州縣東西距九百三十五里南北距一千七百八十三里東至直𨽻正定府贊皇縣界四百三十里西至陜西綏德州呉堡縣界五百五里南至河南陜州界一千二十三里北至殺虎口邊墻七百六十里東南至河南衛輝府輝縣界八百五十里西南至陜西同州府朝邑縣界一千一百五里東北至直𨽻宣化府懐安縣界六百七十里西北至陜西榆林府府谷縣界八百八十里在京師西南一千二百里其北自得勝口邊外為豐鎮寧逺二㕔界東西距二百七十餘里南北距二百八十餘里自殺虎口邊外為歸綏七㕔界東西距四百餘里南北距三百七十里太原府為省治東西距五百七十里南北距七百三十里東至平定州夀陽縣界一百七十里西至汾州府永寧州界四百里南至沁州沁源縣界四百七十里北至代州崞縣界二百六十里東南至遼州榆社縣界二百四十里西南至汾州府平遥縣界二百五十里東北至忻州定襄縣界一百八十里西北至保徳州界五百里自府治至京師一千三百里明太原府共領州五縣二十本朝初因之雍正二年升平定忻代保徳四州俱為直𨽻州以樂平等九縣分屬四州乾隆二十八年省清源縣入徐溝縣今領州一縣十陽曲縣附郭太原縣在府西南四十里榆次縣在府東南六十里太谷縣在府東南一百二十里祁縣在府南少西一百四十里徐溝縣在府南八十里交城縣在府西南一百二十里文水縣在府西南一百六十里岢嵐州在府西北三百二十里嵐縣在府西北二百六十里興縣在府西北四百十里平陽府在省治西南五百六十里東西距二百三十五里南北距三百六十里東至澤州府沁水縣界一百五十五里西至隰州蒲縣界八十里南至絳州界一百十里北至汾州府介休縣界二百五十里東南至絳州垣曲縣界一百九十里西南至絳州稷山縣界一百十五里東北至沁州沁源縣界一百五十三里西北至隰州界一百五十里自府治至京師一千八百里明平陽府領州六縣二十八本朝初因之雍正二年升蒲解絳吉隰五州俱為直𨽻州以臨晉等十七縣分屬五州乾隆三十五年仍以吉州及鄉寧縣還屬升霍州為直𨽻州以趙城靈石二縣屬之凡領州一縣十臨汾縣附郭洪洞縣在府東北五十五里浮山縣在府東南八十里岳陽縣在府東北一百二十里曲沃縣在府南一百二十里翼城縣在府東南一百二十里太平縣在府西南九十里襄陵縣在府西南三十里汾西縣在府西北一百八十里鄉寧縣在府西南二百二十里十本朝雍正二年分屬吉州乾隆三五年還屬吉州在府西一百七十里舊屬府縣本朝雍正二年升為直𨽻州領鄉寧蒲二九年以蒲縣改屬隰州乾隆三十五年還屬蒲州府在省治西南一千一百里東西距九十五里南北距二百二十里東至解州界九十里西至陜西同州府朝邑縣界五里南至同州府潼闗㕔界六十里北至絳州河津縣界一百六十里東南至解州芮城縣界一百十五里西南至潼闗㕔界六十里東北至絳州稷山縣界一百二十里西北至朝邑縣界三十里自府治至京師二千二百里明為蒲州省河東縣入州屬平陽府本朝初因之雍正三年升為直𨽻州以臨晉等四縣来屬六年升為蒲州府増置永濟縣八年増置虞鄉縣凡領縣六永濟縣附郭明初省入蒲州置本朝雍正六年升州為府以州地改永濟縣為府治臨晉縣在府東七十里虞鄉縣在府東六十里元省入臨晉縣本朝雍正八年復置猗氏縣在府東北一百十里榮河縣在府東北一百二十里萬泉縣在府東北一百六十里汾州府在省治西南二百二十里東西距四百三十里南北距一百里東至太原府祁縣界一百四十里西至陜西綏德州呉堡縣界二百九十里南至霍州靈石縣界六十里北