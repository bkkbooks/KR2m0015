body:
  text: 欽定四庫全書皇朝文獻通考卷二百五十八象緯考三儀器臣等謹按虞書在璿璣玉衡以齊七政儀器之重由來尚矣自漢而後代有制作洛下閎造渾天儀張衡造候風地動銅儀晉陸績造渾象吳王蕃造渾儀後魏有候部鐵儀梁有重雲殿銅儀隋有觀臺渾儀唐有凝暉閣渾儀開元黃道游儀武成殿水運渾天宋太平興國及祥符皇祐元祐各製渾儀皆所以察三光分宿度著天體布星辰也乃馬端臨象緯考俱不之載蓋以其制不皆可考且或適於一時之用而不能經逺或合於一事之宜而無當全用耳國家整一函夏西法諸器畢萃觀臺列聖相承折衷至當創制靈臺六儀及璣衡撫辰諸儀彰數理之精密集占候之大成以視王圻續考所載簡儀仰儀景符儀玲瓏儀窺几燭漏之屬如日月出而爝火難以為光矣兹先序創制新規詳其體用而凡舊法及西法諸器藏於天府可備參驗者臚列於後焉康熙八年六月令改造觀象臺儀器先是七年七月欽天監監副吳明烜言推厯以黃道為驗黃道以渾儀為凖今觀象臺渾儀損壞亟宜修整又地震方向各有所占請造滚球銅盤一座並設臺上儀器備則占驗始為有據疏入下禮部議尋以取到元郭守敬儀器於江南不果行至是南懷仁為監副疏請改造從之十三年正月掌欽天監事南懷仁以新製天體儀黃道經緯儀赤道經緯儀地平經儀地平緯儀紀限儀告成將製法用法繪圖列說名新製靈臺儀象志疏呈御覽得㫖儀象告成製造精密南懷仁勤勞可嘉下部優叙天體儀以銅為球徑六尺面刻黃赤二道平分十二宫布列星漢以肖穹象中貫鋼軸露其兩端以屬於子午圈之南北極其外為子午圈周圍各浮天體球五分兩面刻去極度南北極各作半圓合伏半圓以受天體之軸其下為地平圈周與子午圈同面寬八寸環渠為界外刻四象限度及諸曜出入地平時刻方位下施四足承以圓座髙四尺七寸設螺柱以取平子午正對處向西少闕以受子午圈半入地平下半出地平上自天頂設髙弧帶地平遊表以察諸曜地平經緯度以時盤定於子午圈設遊表於北極樞令自轉以定日度又能隨天體旋轉以指時座下設機輪運轉子午圈使北極隨各方出地度升降則天象隱現之限皆可究觀黃道經緯儀以銅為之凡三重四圈其外正立為子午圈徑六尺規面厚一寸三分側面寬二寸五分兩面皆刻去極度兩極側面各貫鋼軸以伏半圓合而固之次內為過極至圈外徑五尺五寸規面寬二寸五分側面厚一寸三分兩面亦刻去極度貫於南北赤道極之兩軸象天左旋又從南北赤道極各距二十三度三十一分三十秒定黃道極去極九十度橫置黃道緯圈與過極圈交徑及寬厚亦同陷其中以相入四面皆刻黃道經度象七政右旋又從黃道南北兩極貫黃道經圈外徑五尺一寸四分規面寬九分側面厚二寸三分四面皆刻黃道緯度象黃道四遊兩極施直軸徑一寸中半施橫表長三寸於緯圈上加遊表對直軸以測黃道經度於經圈上設遊表對橫表以測黃道緯度下為半圓雲座升龍二承之赤道經緯儀以銅為之凡二重三圈其外正立為子午圈制與黃道經緯儀子午圈同距兩極各九十度橫置赤道經圈與子午圈交陷其中以相入外徑五尺九寸規面寬二寸五分側面厚一寸三分內規面及上側面鐫晝夜時刻外規面及下側面鐫周天度分南極旁承以兩象限弧又從南北兩極貫赤道緯圈外徑五尺六寸規側面寬厚與經圈同四面刻赤道緯度內為通軸設橫表遊表俱與黃道經緯儀同下為半圓雲座升龍承之地平經儀以銅為之平置地平圈徑六尺二寸寬二寸四分厚一寸二分上面側面皆刻四象限度上面自南北起初度側面自東西起初度以立龍四承之圈下立柱其高相等適當圈心上出圓軸圈上東西二龍柱結橫梁中穿孔為天頂與圈心對施立表長四尺四寸上應天頂下應地心表末結十字橫表與圈相切尺寸與圈徑同立表頂左右結二線斜貫橫表兩端成兩三角形旋轉橫表令三線與所測參直視表所指以測各曜之地平經度地平緯儀一名象限儀以銅為之直角為心兩方皆為半徑各長六尺寬二寸一分厚一寸一分正面鐫九十度分外規面鐫度數字其數自上而下以紀地平髙度自下而上以紀距天頂度聨以雲龍東西立柱縱八尺八寸上下梁橫七尺八寸飾以雲龍梁中各穿圓孔以受立軸軸與儀之立半徑平行長九尺七寸寬二寸一分厚一寸七分東西運之直角施橫軸長二寸一分軸本加遊表寬二寸一分厚二分有竒長與半徑等遊表末設立耳以測地平緯度紀限儀一名距度儀以銅為之其制一弧一幹弧為圓周六分之一通六尺面寬二寸五分從中線起左右各列三十度幹為圓之半徑長亦六尺末有柄以便運旋上端為圓心設立柱加遊表長與幹同遊表末設立耳為測一曜之用弧背左右各設窺表為另測一曜之用又於幹兩旁設立柱相距應弧背之十度以為借測之用儀面聨以流雲背以樞低昂之承以半圓有齒立軸旁加小輪可使平測其下立柱入於儀座以左右之座髙四尺寬三尺繞以立龍臣等謹按靈臺儀象志言天體儀之用凡六十黃道經緯儀之用凡十赤道經緯儀之用與黃道經緯儀同者凡五異者凡九地平經儀緯儀之用凡十八紀限儀之用凡六要之天體儀乃渾天之全象為諸儀之用所統宗七政恆星之經緯宫次度分與先後相連之序相距之逺近俱於斯見焉黃道經緯儀赤道經緯儀地平經儀緯儀所以推七政恆星之行及所躔之度分也紀限儀則旋轉盡變以對乎天或正交或斜交定諸星東西南北相離之度分焉此六儀者用各有異而又可互用相參故能測驗精密而分秒無差也歟二十年二月製簡平儀以銅為之徑一尺凡上下二重各分天地盤上地盤外列周嵗十二月及餘分內列日分中心為北極東西弧界為北地平天盤外列朔策內列赤道十二宫三百六十度更內列二十四節氣中為赤道北恆星斜帶為春分後半周黃道度下所列亦如之為南地平為赤道南恆星為秋分後半周黃道度上盤向北視故皆左旋而月數節氣右旋下盤向南視故皆右旋而月數節氣左旋下盤連地平為橢形盤當天盤之半橫列節氣線十二道縱列日出入五更攢㸃線八道以上盤宫度對日分求交節之日知閏月以遊表加太陽黃道經度轉天盤與地平交知日出入時刻以太陽赤道經度對時刻視午正則知中星以午正之星驗太陽赤道經度知星中之候以日加時視遊表所指知月之方位以表加節氣與日出入更線之交知五更時刻製地平半圓日晷儀以銅為之凡二重地平盤長四寸三分寬三寸五分中施指南針外畫時刻線正北當午正正西卯正正東酉正後直立方盤上加半圓通徑中為中心兩旁各為半徑半徑上穿孔地平中心線入之視線影以知時刻半圓中心施遊表表兩端立耳穿中線對太陽驗遊表與通徑距度以凖太陽高弧三十二年四月製三辰簡平地平合璧儀以白金為之如櫝形正方徑七寸九分上下啓之凡六重第一重為三辰公晷外盤列十二時初正二十四節氣內遊盤列十二時初正三十日及恆星星名等次第二重為日行時刻度分下列度數上以遊盤羃之測時旋轉使當其空處第三重為指南針盤上帶遊表環以地平方向第四重為地平儀外列九十度中施指南針上帶遊表內畫矩度第五重為簡平儀地盤外為赤道列十二時初正中心為北極內橢圓心為天頂圓線為經圈徑線為緯圈天盤小圓為黃道列十二宫上帶遊表第六重為象限儀弧線為圓度弧內外方線為矩度以合諸儀之用各如其法五十二年二月命監臣紀利安製地平經緯儀以銅為之其制平置地平圈徑五尺寬七寸七分周圍鐫四象限度下設四柱圓座承之東西立柱高一丈一尺上結曲梁中為立軸下端貫以圈心螺柱上端以梁中圓孔受之中加象限儀直角在下半徑六尺寬二寸七分正面列九十度分中聨方圓及弧矢形背結於立軸以運之直角施遊表長八尺本設橫耳末設橫柱以備仰窺臣等謹按地平經緯儀合地平象限二儀而為一凡測諸曜則旋象限儀以遊表低昂合之令與諸曜參直其橫半徑所指即地平經度遊表所指即地平緯度測一器而經緯胥得也五十三年二月製星晷儀以銅為之凡二重有柄地盤徑四寸二分列十二時初正天盤徑三寸三分列二十四節氣上帶直表兩端書帝星勾陳以中心墜線當孔中轉天盤直表兩端當兩星使相參直視節氣對時分以知時刻下盤外列夜刻內橫為節氣線縱為更線按節氣以定每更時刻製四遊表半圓儀以銅為之通徑二尺四寸線長二尺作二千分其半為圓心施立耳能旋又施遊表二各長一尺二寸作一千二百分表端各有立耳半周外一百八十度為心角度通徑線兩端各施遊表表兩端各有立耳面穿線有比例弧以指分數內圓線二界每界十重列邊角度表中心各有小半圓通徑七寸五分以取邊角半周一百八十度其圓心又施小遊表各一長四寸五分取每度斜線之長作二十分與斜線相交成二十格自邊角中心取半圓為心角度之半左邊角度畫於圓線內界右邊角度畫於外界測量法以兩遊表相距度為所測之角量算法三角俱鋭者以通徑二千分與所知一邊為比例以邊角度施所測之二角使邊遊表相交成三角形察其交處距角若干分仍以所知比例如一角鈍者以半徑一千分為比一心角一邊角施之法如前如兩邊夾一角者以中兩遊表之度施之各按二邊丈尺察兩遊表分數以邊遊表之分數比量之承以直柱下岐三足製矩度象限儀以銅為之半徑五寸四分象限之周九十度內畫方矩縱橫各九十分兩半徑線末立耳為定表圓心施遊表二相連其末各有立耳下帶弧一段作六十分當外周三十度半以比例分秒圓中亦有立耳旋之與四立耳皆相對遊表直邊與方矩之分等四表間弧度數為矩度比例之分外有銅三角稜施墜線以取平直承以直柱三足能升降製方矩象限儀以銅為之半徑八寸五分象限之周九十度圓線十重以斜線相交成十格象限外畫方矩線斜直相交亦成十格象限內亦畫方矩線平半矩施立耳為定表圓心施遊表表兩端有立耳中為指南針盤前施二墜線測量法以遊表直邊指度數兩表相距度分為所測之角承以銅軸攢木為三足能升降乾隆九年二月製三辰公晷儀以銅為之通高二尺一寸凡二重四圈正立為子午圈列周天度上應天頂下應地心兩軸為南北極與子午圈十字交而常定不動者為天常赤道圈列晝夜時刻天常圈內層為遊旋赤道圈列十二宫以南北極為樞而東西旋轉者為過極遊圈座心表末與天頂地心相對後施指南針前施墜線表四足施螺旋以中腰表耳測赤道經度以對南北極直距中窺衡測赤道緯度以遊表加遊旋赤道上測時刻製看朔望入交儀以銅為橫尺兩端木座如几形橫一尺八寸縱七寸八分凡三重下為黃道中為白道各十五度三十分上為時刻表左右直距以白道距黃道南北緯度為凖正中為黃道位日食以日體月食以地影加黃道上月體加白道上皆按度分以其相掩知入交為日月食以相掩之分知食之淺深以時刻表中心對白道表端施直表對月行距日度視所指知食之時刻製六合驗時儀以銅為兩球下球徑六分有竒重二十四銖上球減十之二貫以鋼鋌長四寸六分有竒近上三之一為兩軸橫梁承之前後亦為橫梁前梁下鍵以銅葉一往一還為一秒七秒為五里候凡發聲時撥之使動驗秒數以知聲之逺近製方月晷儀以銅為之徑五寸五分上下二盤下盤外重列十二時次內初正各四刻次內