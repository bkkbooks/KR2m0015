赤極經圈則測得日月星之赤道經緯度即黃道經緯可推且黃道與赤道之相距古逺今近或日久有差而儀器可無改故不用黃道圈也其最內者即古之四遊儀大略相同焉隋志述渾天儀謂揆正宿度凖步盈虛既動靜兼狀以效二儀之情又周旋衡管用考三光之分信有徴矣二十五年二月製地球儀規木為球圍四尺五寸兩端中心為南北極貫以鋼軸腰帶赤道斜帶黃道平分三十六分每分占十度布列地名外正立為子午圈面刻三百六十度座面為地平圈列地平度外列十二時九十六刻皆鑄銅為之承以圓座髙二尺四寸七分北極上加時盤以京師為凖旋之知各處時刻及日出入地平度臣等謹按地球儀之制所以象地體與天體儀相配亦仍西法惟布列地名舉凡新闢西疆及新向化䝉古回部靡不咸具驗皇輿之無外前此所未有也渾天合七政儀以銅為之徑一尺二寸高一尺三寸五分凡三重外二環平者為地平圈上列西洋書十二宫十二月立者為子午圈子午圈上天頂垂銅葉為地平高弧北小圈為時刻盤次內五環兩軸為南北極貫二極為二至經圈腰帶赤道斜帶黃道黃赤道交處為二分相距最逺處為二至二極軸上小圈為負黃極圈其最內平面圓環為黃道十二宫中心為日體圓邊為地球對地球立表以指日行宫度日與地各為盤地盤有月體日盤有金水二星體日外大盤有火木土三星體皆以璣璇之月旋以地為心五星旋以日為心座面旁施指南針以測太陽緯度及出入地平時刻方位七政儀以銅為之徑一尺六寸五分高二尺五分凡二重外重平圈為黃道列周嵗十二月周天十二宫斜圈為赤道十字圈為赤道子午卯酉經圈內重為七政盤列十二宫與黃道左右相應中心為日體最近日為水星次金星次月與地次火星次木星最逺土星木星旁四小星土星旁五小星土星上圓環平之則星正圓側之則星長圓日體旁為瓶置燈以取日影對日處映以玻璃盤內皆有機輪其旁以小盤之軸挈諸輪轉之承以半圓十字下岐三足座心設指南針十二宫上施遊表表轉一周為一日視諸體之旋轉以測七政晝夜隱見之象地平赤道公晷儀以銅為之徑七寸八分地平盤分內外外方盤施露管二螺柱四內圓盤列地平三百六十度施指南針中帶銅弧弧上九十度赤道環在圓盤北銅弧入之以定各處北極高度環面施大遊表表近上加立表中有直線環上端小圓盤內有小遊表及半環環上穿小孔以大遊表對日景從小孔透立表中線視大遊表下端所指知時刻小遊表所指知分數地平經緯赤道公晷儀以銅為之通高一尺地平盤分內外外盤畫子午線三角植螺柱內盤列地平三百六十度施指南針縱橫置露管盤上正立為赤道經圈上環中線為天頂斜倚為赤道中施直表列節氣宫度表中縫加遊表上穿孔使透日光經圈上平赤道施兩表耳測日影內盤九十度線與外盤子午線凖以赤道經圈按度對天頂以遊表小孔對節氣日數視日影所臨知時刻以赤道經圈對日上下轉之日影從上表耳孔透下表耳之兩㸃視赤道距天頂度與九十度相減知太陽距地平髙度視內盤距子午線度知太陽距午正東西偏度以外盤分數線與度數線對知時刻八角立表赤道公晷儀以銅為之地平盤長二寸二分寬一寸八分前施指南針後為赤道盤橫軸上下之盤周畫時刻線正北當午正西南起寅正東南止戌正盤上施日影表以指北極右帶髙弧表角與弧皆髙六十度驗影以知時刻方赤道地平公晷儀以銅為之地平四寸二分中施指南針後為赤道盤外方內圓兩面畫時刻線正北當午正西南起卯初東南止酉初盤底有機上下之地平右施螺旋表環列度數以表指之赤道盤中施直表指南北極春分後向北秋分後向南驗表影以知時刻遊動地平公晷儀以銅為之圓座徑二寸一分髙一寸八分內遊環三層繫日晷地平盤於三層環內中施指南針周圍時刻線三層依北極高三十度四十度五十度北有弧表畫線亦如之自地平中心出斜線對弧表線以指北極視線影以知時刻為舟行測驗之器提環赤道公晷儀以銅為之外環為子午圈徑七寸二分內環為赤道上環為天頂赤道北九十度為北極其對為南極中施直表列節氣宫度及距緯度表中縫施遊表上穿孔以透日光以上環對子午圈度數以遊表孔對節氣日數手提上環旋直表使影入赤道內視所臨以知時刻赤道地平合璧日晷儀以銅為之長一尺三寸寬八寸六分前為地平盤列二十四節氣圓盤加直表其上按節氣進退以就日行黃道度外橢圓形列時刻西起寅初東盡亥初外列周天度中施斜表表下施垂線以指北極髙度承以半圓以輪齒低昂之兩盤相合定南北視表影以知時刻定南針指時刻日晷儀以銅為之地平盤長一尺三寸五分寬一尺一寸一分中為指南針外畫時刻線七重第一重為二分第七重為二至以次順逆數之線各分十二時初正兩端立表耳中線對日兩耳影相對驗指南針所指以知時刻圓盤日月星晷儀以銅為之圓盤徑四寸一分下有柄上為日晷兩立耳相距二寸四分各穿孔以透日光兩旁直線為時刻線之起止中為半圓其半為北極畫節氣線十九道當北極為二分線間二線為一中氣往來數之左盡夏至右盡冬至一線占一旬自北極上橫分六十度為北極高度下分十二時右起丑未初左盡子午正中施遊表以表末對北極高度及節氣線表末施墜線穿小珠對太陽所躔宫度使兩耳孔日光正對驗珠影以知時刻背為月晷星晷外分三百六十六日內分十二宫中心第一重圓盤徑二寸二分外分十二時初正午正出直表以指太陽內分三十日自直表起朔第二重圓盤徑一寸七分周穿圓孔中出直表表所指之日數圓孔下驗晦朔弦望自第一重對太陽宫度表起午正數之