body:
  text: 欽定四庫全書皇朝文獻通考卷一百九十七刑考三刑制康熈六十一年十一月世宗憲皇帝御極定援赦人犯罪之例奉諭赦罪一欵徒開惡人徼倖之門於政治甚無裨益朕即位之初諸臣援例陳請姑用允行實則此等罪人皆其自取並非治之以不應得之罪也此番援赦豁免人等如仍不悛改干犯法紀必加等治罪定沿海民人越境生事之例禮部議定山東等處沿海地方人民被風飄至朝鮮國境内若並無票文私自越境生事者不必送回許該國王緝拏照伊國之法審擬咨明禮部具題請㫖行文該國於伊處完結更定䝉古盜牛治罪之例定例䝉古偷竊四項牲畜俱擬立絞至是得㫖改為擬絞監候詳見詳讞門定偽造假銀之例為首者擬絞監候為從及知情買使者枷號兩個月杖一百定捕盜處分窩盜之罪九卿議覆尚書盧詢條奏捕盜官役設立賞格其窩主發遣黒龍江得㫖此議尚未詳盡從來盜案内盜首脱逃報稱病故者甚多如何使盗首必不漏網盜案不致稽延之處應再詳議至於窩主有窩强者有窩竊者有知情者有不知情者有分贓者有未分贓者律内分别立决監候斬絞以至杖笞開載甚明今概行議遣黒龍江可乎又議獲盜過半免其治罪過半之外拏獲一名賞銀十兩等語夫獲盜過半免其治罪足矣過半之外拏獲一二名即加賞賚不過地方官酌量行之以示鼔舞又何得預定數目援為定例乎著再詳議尋議承緝各官不獲盜首者雖獲盜過半仍按限分别議處如盜首果係病故查有實據方准免其議處捕役拏獲盜首令州縣官從優給賞其不獲者將家口監禁勒比至窩盜之家知情存留分别定以杖流存留三人以上者充發三姓地方永著為例從之互見徒流門二年定私刨人參審結之例先是私刨人參不論已得未得俱解送刑部嗣於康熈五十七年定每嵗七月自京派部院堂官一員前徃㑹同該將軍府尹究審至是奉諭私刨人參俱係圖利窮民春夏被獲監至九月十月方得審結延挨月日身受寒暑多至疾病死亡甚為可憫寧古塔有將軍辦事御史盛京有將軍刑部併副都御史嗣後將各地方所獲者即行審理完結年底彚奏部院堂官免其差徃定銷毁刺字治罪之例刑部議准竊盜等犯銷毁刺字者枷責補刺其用藥代為銷毁之人一併枷責嚴運丁爭鬬傷人及搶奪之禁先是糧船運丁因私忿爭鬬持戈放箭致有殺傷又有竟行搶奪民間衣物者至是奉特㫖令嗣後有似此者該督撫即行奏聞於彼處正法又命刋刻毆殺律頒示儆衆諭刑部朕披覽奏章其中故殺謀殺者尚少而以鬬毆傷人者甚多或因口角相爭或因微物起釁揮拳操戈一時殞命及至抵罪雖悔何追此等愚賤鄉民不知法律因一朝之忿貽身命之憂可為憫惻古人有月旦讀法之典聖祖仁皇帝上諭内又有講律法以儆愚頑之條欲使民知法之不可犯律之無可寛畏懼猛省遷善而改過也但律法包舉甚廣一時難以遍喻今將毆殺人命等律逐條摘出疏解明晣令地方有司刋刻散布處處張掛俾知鬭毆之律尚如此則故殺謀殺更可知矣時存提撕警覺之心以化其好勇鬬狠之習庶命案可以漸少以副朕好生慎罰之至意更定逃人例九卿議覆侍郎覺羅塞徳奏言逃人之例甚嚴而限期又廹地方官懼罪隠匿反得潛藏應如所奏嗣後逃人在該地方居住已過一年地方官不行拏獲者降一級留任十家長里長鄰居及窩主俱照不應重律責三十板完結不及一年者免議倘過二年發覺仍照從前定例治罪所居之家不知情者免議其逃人在逃所置有産業者將一半入官在逃之單丁男婦年過六十或原有廢疾即未及六十而伊主願令為僧道者俱免照逃人例治罪若逃後自改為僧道及故將其身殘毁者照逃人定例從之禁止强盜滚案之弊奉諭刑部向來盜案有滚案之弊强盜被獲審實定罪者於别府州縣或鄰省未結案内賄屬他盜供稱同夥州縣官即關提質審一案甫畢一案復起名曰滚案輾轉相連動經年嵗或更中途脱逃遂使已結之案終歸未結刼殺大盜借此支延無所畏懼而州縣官專喜此等供扳可為獲盜過半之地附㑹了事此弊不除無以除莠安民爾部定例議奏尋議盜犯審實之後陸續狡供又於某案行刼者概不准行至其扳出夥盜在别處已經審實定罪者不必提審對質但行文問取口供查兩案輕重從重歸結以杜藉案遷延脱逃等弊從之定八旗毆死家僕處分之例奉諭向來八旗官軍人等待家人過嚴微小之失甚至毆責斃命奴僕雖賤彼亦人子何得任意茶毒朕於刑部成獄畧有可恕者俱行寛免朕大君也於有罪者尚不忍輕加刑戮為臣下者乃可毆死無辜之奴僕乎即有酗酒冐犯之處應加懲治亦不宜致於死地以逞一時之憤嗣後遇毆斃家人詳其情罪分作三等定例議奏尋議凡旗下奴僕違犯教令家主依法决罰致死及過失殺者仍照例不論外其官員違法責打奴僕致死及持刀殺死者分三等定以罰俸降革鞭責平人犯者分三等鞭責枷號至官員平人有致死族中家僕者各從重擬從之定命案留養追銀給屍親之例奉諭律例内雖有父母年老家無次丁應留養親之條但兇徒恃此有意傷人殊未可定已死之人亦屬可憐嗣後此等留養之犯作何飭令出銀給與死者之家若不給與仍照原擬治罪之處該部定議尋議嗣後除謀殺故殺不准留養外凡戲殺誤殺例應留養者令地方官酌量情罪輕重如係有力之家情重者追銀五十兩情輕者三十兩貧難無力之家情重者追銀三十兩情輕者十兩給死者之家資其養贍如不給仍照原擬治罪從之定一人犯兩案之例官員人等有一人而兩案犯罪者前案輕罪先行題結俟後案審明仍將前案所擬輕罪叙入然後就本案所犯重罪按律定擬如前案已擬重罪後案罪輕於前亦將前案所犯重罪聲明仍歸前案定擬如有數案犯罪者將各案所擬應得之罪俱簡明叙入本内具題請㫖申定那移錢糧之罪刑部議奏官員那移錢糧有多至數萬兩者或以罪止擬流而任意那用或以罪無遞減而有意不完請嗣後那移一萬以上至二萬兩者發邊衛充軍互見徒流門二萬兩以上者照侵盜例擬斬俱限一年全完免罪二年完者減二等三年完者減一等三年限滿不能全完查未完之數照例治罪從之嚴私開奏摺之禁奉諭嗣後督撫大吏所奏摺子若有子弟親朋在京私開者必將私開之人正法督撫照溺職例革職申定命案留養之例奉諭殺人之犯因親老家無次丁奏請留養然亦須查被毆之家有無父母是否獨子若親老又是獨子一旦被殺以致無人贍養而殺人之人反得免死留養於情理未協應行文直省督撫務將被殺之人有無父母以次成丁之處一併聲明三年申定侵盜錢糧之例先是侵盜錢糧人犯例限一年追比不完者本犯本身妻及未分家之子流徙財産入官至是奉諭内外文武官員歴年虧空甚多聖祖仁皇帝寛大如天不忍加之以法伊等罔知儆畏朕臨御以來即欲嚴懲恐化誨未施遽行執法近於不教而殺是以屢降諭㫖諄諄警誡又因國帑重大條奏虧空者紛紛朕從其請令委曲設法搜其宦囊查其族黨親戚平日分用宦資者多方為彌補之計以寛本人之誅今化誨三年不為不久自雍正四年以後凡遇虧空其實係侵欺者定行正法無赦搜其宦囊查及親黨之事俱不必行矣定例侵欺至三百兩者斬然毎遇勾决多有寛宥今立法既期必行則三百兩即斬之例似覺過嚴應計數目之多寡酌定罪名之重輕著九卿詹事科道㑹同詳議尋議官員虧空係那移者仍照雍正二年定例計銀數分别徒流充軍至二萬兩以上者照侵盜例擬斬俱限一年追完免罪二年完者減二等三年完者減一等至侵欺之員請自雍正四年正月為始一千兩以下者仍照監守自盜律擬斬准徒五年一千兩以上者擬斬監候秋後處决遇赦不准援免從之嚴地方士民保留離任官員之禁奉諭凡官員離任毎有地方士民保留如果該員在任實有惠愛在人愛戴出於至誠理應赴上司具呈陳請即或清亷之官寃抑被劾百姓為之抱屈者亦可赴闕申理乃爾來積習借保留為名輙鳴鑼聚衆擅行罷市顯然狹制其中買囑招搖種種弊端斷不可縱容使長嗣後官員離任士民有擅行鳴鑼聚衆者除分别首從從重治罪外其被保之員亦必加倍治罪定被逼行竊而將强逼之人殺傷者分别流徒之例詳見徒流門定苗彊禁例兵部議覆雲貴總督高其倬條奏一黔省境接川楚姦棍頑苗互相勾結販賣人口一事最為地方之害嗣後定例地方官於一年之内有能拏獲積棍頑苗者計人數分别議叙倘不能查緝為别處官弁拏獲者亦計人數降革至窩藏䕶送及牽合之人亦分别嚴加懲治其外省客民有買貧民子女者令報官用印不許買至四五人違者仍照興販例治罪一黔省與楚滇粤接壌多民苗互相讐殺搶刼之事嗣後定例夷人越界未曾為非者拏送本省如係偷搶及助人讐殺者即在拏獲之省審明發落又黔省有拏白放黑之習如被人刼殺力不能復將無干之家奪其人口牛馬投以寃單令代為報復如不能代其報復則勒索銀兩取贖嗣後定例照應得之罪加一等究擬應如所請從之嚴僧人犯法之例先是奉諭朕覽犯案内多有僧人不法者釋氏之教不外清心寡慾戒惡行善四端為其徒者雖有為律為講為持誦之不同然莫不以四端為本至於混跡僧徒實乖僧行飲酒食肉專為不法有應赴馬流鏖頭掛搭闖棍江湖揑怪煉魔潑皮等名色嗣後凡遇緇流犯法須按何名色僧人入案呈奏若既稱戒僧干犯法紀必嚴加治罪至是又奉諭嗣後凡僧人犯法問擬斬絞發遣軍流充徒枷號等罪者俱勒令永逺還俗至戍所令該管官嚴行稽查其釋罪回籍者地方官嚴行稽查不許復為僧人著為例定笞杖輕犯及牽連人速結之例刑部遵㫖議覆嗣後京城八旗提督衙門五城等處解部案件審係無干即行釋放笞杖人犯先行懲責發落至直𨽻山海關古北口等處應解部完結之案笞杖人犯并証佐干連之人俱免解部釋放取保倘必須審訊再行拘提命案屍親亦止申送口供免其解部直省州縣案件必須申解上司者笞杖等犯亦取供保釋不得濫行監禁差押著為例從之又頒行大清律集解附例先是康熈二十八年奏准律例書内有仍襲前代舊文而於本朝法制不相蒙者有明載律文實非通行令甲者請勅三法司諸臣詳覈將律例之分刋者合之新舊之不符者通之輕重之可疑者酌之務期盡善勒成定本永行遵守三十四年纂成律書名例四十條共六本四十六年纂成大清律例四十二本至雍正元年奏准自康熈四十七年起六十一年止見在遵守定例並前纂成四十二本一併交與九卿互相㕘酌考訂畫一繕冩進呈至是書成頒行中外凡三十卷通計律文四百三十六條毎篇正文後有總註或標舉大意或逐節分疏或釋正文而兼及小註或詮本條而旁及别義異同條貫眉目井然律後附例共八百二十四條分為三項曰原例繫累朝舊例凡三百二十一條曰增例繫康熈年間現行例凡二百九十條曰欽定例繫欽奉上諭及内外臣工條奏凡二百有四條是日奉諭㫖朕覽律例舊文載有八議之條其詞曰議親議故議功議賢議能議勤議賞議賔歴代相沿已久我朝律例雖仍載其文而實未嘗照此行者蓋有深意焉不可不察也夫刑罰之設乃天下之至公至平無容意為輕重者也若於親故功賢等人故為屈法以示優容是可意為低昻而律非一定者矣尚得謂之公平乎且親故功賢等人或以効力宣勞為朝廷所倚眷或以勲門戚畹為國家所優崇尤當秉禮守義為士民倡率乃不知自愛而致罹於法是其違禮而蹈愆尤非蚩蚩之民無知犯法者比倘執法者又曲為之宥何以懲惡而勸善乎如所犯果出于無心而情有可原則為之隨時酌量特予加恩未為不可若欲著為律是於親故功賢等人未有過之先即以不肖待之名為從厚其實乃出於至簿也且使恃有八議之條或任意為非漫無顧忌必有自干大法而不可止者是又以寛恤之虛文而轉䧟之於罪戾姑息之愛尤不可為優恤矣今修輯律例各條俱詳加斟酌以期至當惟此八議之條若概為刪去恐人不知其非理而害法故仍令載入特頒示諭㫖俾天下曉然於此律之不可為訓而親故人等亦各知儆惕而重犯法是則朕欽恤之至意也四年定官犯侵欺錢糧一千兩以下者照監守自盜律擬斬准徒五年定収書侵蝕漕米之例奉諭蘇松二府漕米虧空案内一經承名下侵蝕至二三千石不可不嚴立條例嗣後収書有侵蝕漕米者按其米數照監守自盜例治罪並將簽派収書之員題恭議處定捕盜無分疆界之例奉諭安民必先盜而捕盜之法在於速拏聞有交界地方失事盜賊竄匿鄰境有司官以地非管轄不便徑拘必用文移關提挂號添差方許緝拏以致需遲時日聞風逺颺即日後拏獲而贓已花銷懸案不結嗣後交界地方失事探實贓盜藏匿之處無論隔府隔省一面差役持票密拏一面移文關㑹拏獲之後仍報明所在該管地方官添差移解倘捕役借端誣害良民照例從重治罪嚴糧船私帶火礟鳥鎗之禁本犯照私藏烏鎗例治罪該管官照失察銃礟鳥鎗例治罪從漕運總督張大有請也定盜犯越獄之罪刑部疏奏未殺人之首盜與傷人之夥盜原擬斬决者若越獄脱逃被獲請照殺人之首盜於犯事地方斬决梟示其未殺人之夥盜係免死發遣者如越獄脱逃照未殺人之首盜於犯事地方斬决若因越獄殺傷兵役者擬斬梟示從之申定滿洲互相殺傷之例奉諭滿洲殺死滿洲即行正法當日定例甚善自定例後此等事件甚少可見立法稍嚴而全活轉多但此中有故殺謀殺者亦有鬬毆致死者所犯之罪有斬絞之不同其中宜加分别嗣後將應斬者定為立斬應絞者定為立絞著為定例定弟毆兄死存留承祀之例奉諭一家兄弟二人弟毆兄死而父母尚在則有家無次丁存留養親之請倘父母已故而弟殺其兄已無留養之例一死一抵必致絶其祖宗禋祀此處甚宜留意若因爭奪財産及另有情由又當别論嗣後如何定例著九卿確議尋議除爭奪財産謀殺故殺按例正法外倘係一時角爭互毆致死胞兄而父母已故别無兄弟又無承祀之人應令地方官據實查明取結疏内聲明如䝉恩准其承祀將該犯免死減等從之定騐傷之例上以凡鬬毆傷人例將兩造並拘傷重之人一經移動冐風或致殞命令三法司詳議定例通行尋議凡京城内外有鬬毆重傷者該衙門即委員親詣驗傷取供定限保辜其擡越衙門驗傷永行禁止違者將該管各官治罪從之申嚴賭博之禁奉諭賭博最壞人品行下等之人習此必致聚匪作奸放僻邪侈之事多由此起讀書居官之人必致廢時悞事志氣昏濁何能立品上進乃屢申禁飭而此風未息深可痛恨若不嚴賭博之具究不能除賭博之源内外地方各官將紙牌骰子悉行嚴禁不許再造違者重治其罪嘗有窩賭之家誘人入門以取其利嗣後准輸錢之人自首免罪仍追所輸銀錢還與之庻使賭博之人有害而無利則其風可以止息矣又見漢軍惡習嘗以工于馬吊相誇借此為消閒解悶之具既以居官則應辦之事甚多安有閒功為此無益之戯且聞上司與屬員鬬牌為樂尤非體統大玷官箴嗣後著該管上司及該督撫指名題叅至禁止賭博作何定例該部議奏尋議凡賣紙牌骰子為首者發邊逺充軍為從及販賣為首者杖一百流二千里為從販賣者杖一百徒三年該地方保甲知而不報者杖一百地方官失察罰俸三月若設計誘人入局將自己銀錢放頭抽頭者俱杖流互見徒流門至於滿漢官員無論賭錢賭飲食之類犯者革職永不叙用若上司與屬員鬬牌為樂者不分内外文武均革職永不叙用仍杖枷不准折贖得㫖依議嗣後緝拏一切賻博所獲銀錢俱著賞給拏獲之人定毆死逃人例凡迯人在外生事被人毆死者不用擬抵之例俾知儆戒著為令定漢人奴僕犯家主之例奉諭滿洲風俗尊卑上下秩然整肅最嚴主僕之分今漢人奴僕乃有傲慢頑梗不遵約束加以訶責則輕去其主種種敝俗朕所深悉嗣後漢人奴僕如有頑傲不遵約束或背主逃走或私行訕謗應作何懲治與滿洲奴僕畫一之處著大學士九卿詳議尋議漢人奴僕有不遵約束及訕謗逃匿者俱照滿洲家人例治罪如典當雇工及身𨽻門下為長隨者照滿洲白契所買家人例治罪定老𤓰賊於監禁地方正法仍於原行刼處出示諭衆定包攬錢糧之禁刑部遵㫖議覆貢監生員非本身錢糧包攬摧收入已拖欠國課者應行黜革發黒龍江當差雖無拖欠而身為衿監包攬錢糧亦應黜革至里民不自封投櫃聼人包攬者照不應重律治罪仍追包與之數完官互見徒流門五年嚴稽察兇苖漢姦之令奉諭狆苗素稱兇悍加以漢姦販棍潛匿其中引誘為惡以致燒殺刼掠毒害善良朕聞滇黔蜀粤四省接攘之區猺猓雜處不時統衆越境讐殺攪害鄰封地方文武官員徃徃以責任不專彼此推諉以致塵案莫結况各省所設汛防在於腹内而猺猓則環居腹外防範難週必待事事禀報始行追捕徃返躭延兇徒已逺遁矣四省督撫提鎮宜各勘明界址凡猺猓販棍徃來要路設立營汛倘有越境讐殺刼掠之事即行擒解嚴勒索外地人財物例奉諭内地居民受地方苛索便於申訴故易敗露若苖蠻黎獞等僻處外地知識庸愚倘加凌虐更可憫惻嗣後此等外地之人併改土歸流地方如該管官有騷擾逼勒等情其治罪當加内地一等九卿詳議定例尋議苗蠻黎獞改土歸流地方官弁兵役有勒索財物者應分别數目治罪贓銀追還給主得㫖此等應追入官銀兩即限内全完亦不寛免其罪永著為例定虧空錢糧官吏一同監追之例凡州縣虧空錢糧經承不行禀阻將經承一同監追減本官一等治罪申定苗疆禁例兵部議覆雲貴總督鄂爾㤗疏言一苗民逞兇皆由兵器嗣後苗民出入止許佩數寸小刀所有一切軍器悉令繳出如有私造者即行正法一營汛兵丁不得踐踏禾苗生事擾害如該汛文武官弁不加鈐束照溺職例治罪一兇苗刼殺原非三五塘兵所能擒獲應令防汛各員一面申報督撫提鎮一面率兵擒拏所獲賊犯文武官㑹同審結從之定監犯病斃獄官處分之例刑部遵㫖議奏監犯病斃向例不分本犯情罪輕重司獄官一例處分誠為未協嗣後應將死罪軍流及杖徒以下分為三等按監斃人數分别議處從之嚴匪類惑民之禁奉諭京城内有揑造謡言誆騙愚民遊方僧道自粧神仙聚集多人做㑹者似此匪類著即拏究治罪遞解回籍嚴莊頭旗人窩藏逃盗及酗酒生事之禁嚴犯人脱逃及藏匿犯人律刑部遵㫖議覆律載犯罪事發逃走於本罪上加二等罪止杖一百流三千里凡知他人事發而藏匿在家者減罪人所犯一等不知者勿論立法過輕以致任意潛逃朋比隠匿請嗣後負罪潛逃之犯除笞杖等罪仍照律行外其徒流斬絞等罪皆加等定擬其藏匿之家除不知情者仍照例行外知情者民人照本犯原罪治罪若係職官革職仍照本犯原罪治罪不准折贖從之申嚴事主報盜不實及有司諱盜之禁奉諭緝盜之例最難斟酌盡善如立法過嚴恐人巧圖脱卸必有誣䧟寃濫之事立法稍寛又恐州縣官漫不經心捕役玩法養奸盜風愈熾此緝盗設法之難也至於失事之家徃徃張大其詞或以少為多或以竊為强此又報盜之弊也但思若嚴報盜刁誣者固知歛迹恐謹良者必至不敢報盜矣必斟酌得宜使官吏皆盡緝盜之責而不敢任意輕重事主得申被盜之苦而不敢借端生事大學士九卿科道酌議尋議如無知愚民以奸報盜情有可原者照不應重律杖八十如以人命鬬毆等事揑報為盜視其本罪輕重定擬至有司抑勒諱盜除革職外仍嚴加治罪該管督撫司道府廳分别降調從之定兇人為尊長族人致死免擬抵償之例奉諭從來兇悍之人偷竊奸宄怙惡不悛以致伯叔兄弟重受其累本人所犯之罪在國法雖未至死而其尊長族人翦除兇暴治以家法使不法之子弟知所儆懼情非得已不當按律治罪嗣後凡遇兇惡經官懲治不悛准其族人鳴之於官將伊流徙逺方以除宗族之害或以家法處治至死免其抵罪著定議具奏尋議嗣後族人不法倘事起一時動合族公憤不及鳴官處以家法至死者即報明該地方官審明死者所犯劣蹟確有實據照罪人應死而擅殺律治以杖罪若罪不至死將為首者照應得之罪減一等免其擬抵從之嚴旗下家奴結黨生事之禁八旗都統奉諭嗣後文武大臣等各將家僕嚴行約束稽查使之各安本分勿得縱容結黨妄行倘玩忽不禁仍有羣聚結黨生事亂行者朕必將此等惡僕即行正法定凡罪犯關係軍機兵餉事俱不准援赦定田主苛虐佃户及佃户欺慢田主之例吏部議覆河南總督田文鏡疏言嗣後紳衿苛虐佃户者鄉紳照違制例議處衿監吏員革去職御得㫖立法貴其平倘有奸頑佃戸拖欠租課欺慢田主何以並未議及著再議尋議嗣後奸頑佃户拖欠租課欺慢田主者照不應重律論杖所欠之租勒追給主從之更定本夫止殺姦婦律奉諭律載止殺姦婦者照毆妻致死律擬絞蓋恐姦情不實將此杜借名殺妻之弊若姦情是實而姦夫此時脱逃拏獲到官承認者亦照此例擬絞殊未允協著九卿議奏尋議本夫於姦所獲姦將妻殺死姦夫走脱後被拏獲到官審實不諱者將姦夫擬絞監候本夫杖八十著為例嚴演習拳棒之禁奉諭外間常有演習拳棒之人自號教師召誘徒衆甚有害于民生風俗此等原係游手好閒不務本業而强悍少年投之學習尚氣角勝以致酗酒賭博鬬狠打降之類徃徃從此而生且有以行教為名窺探村莊虛實因而勾引刼盜者各省督撫轉飭地方官嚴行禁止如有自號教師及投師學習者即行拏究定强盜拒捕傷死官兵之例諭刑部凡强盜拒捕將官兵傷死之案除同夥傷人之時該犯不在一處者仍照例議罪外其同在一處或三五成羣雖非下手之人既在旁目睹即係同惡共濟法所難寛嗣後應照舊例立决定因姦殺本夫復設計娶姦婦為妻者立斬至七年又定姦夫殺死本夫之後將姦婦拐逃嫁賣並帶逃㓜小子女賣與他人為奴婢者皆斬决六年定發遣人等犯法之例奉諭披甲人查書夫妻父子弟妹及叔祖母九人俱被賞伊為奴之紀二殺死甚可駭異凡屬免死發遣為奴之犯皆係本性兇惡之徒遣發之後徃徃恣意妄行不服管束此等人已犯死罪格外寛免嗣後若仍有兇暴者不論有應死不應死之罪伊主便置之於死不必治罪但將實在情節報明該管官咨部存案其發遣當差之犯不守法度被該管官打死者該管官亦免議但將情由報部存案若當差為奴人等與平人鬬毆被打身死者平人從寛減等則兇惡之徒有所畏懼不敢為非矣互見徒流門定故殺卑㓜誣賴他人者罪福建省民魏華音勒死親姪魏樟茂部議依故殺姪律擬罪得㫖尊長殺死卑㓜律内定罪從輕者原為倫常名分起見今魏華音因犯偷割稻穀恐被告發輙將已故胞兄之獨子年僅十三嵗勒死以為誣告圖賴之計似此兇惡已在倫常之外安得尚論尊卑長㓜之名乎朕意凡因家務及卑㓜有過而致死者仍照舊例其將卑㓜致死以卸己罪及誣賴他人者應另治罪著九卿定議尋議照親伯叔奪兄弟之子房産等情故殺例擬絞監候從之定假冐官職之罪河道總督題叅監生火政升假冐州同職銜効力河工部議杖徒援赦寛免得㫖大小官職皆國家名器所關假冐之人欺君罔上盜竊名器但擬杖徒不足示懲火政升著發邊衛充軍不准援赦嗣後除偽造憑劄詐為假官等情仍照例應斬外其有假冐官職者俱照火政升例互見徒流門嚴旗兵買民為奴之禁定斬絞等犯父母年未七十者不准援請留養申盜賊自首免罪之令奉諭凡各省盜賊未經緝獲者其中為首造意及傷人之犯若未行陳首朕酌其情稍可原者量從寛減若被人誘脅跟隨為盜之犯自行出首則將伊應得之罪予以寛宥俾得改除舊惡永為良民若此㫖既到之後盜賊不自行首及已經自首免罪而復為盜賊者加重治罪倘官員因盜案不結賄買無賴冐認為盜自首者將賄買之官及代認之人俱即正法嚴考職債代頂冐之禁刑部尚書勵廷儀奏請除監生考職債代頂冐之弊得㫖各省監生每於考職之時託在京之親戚朋友代為應考而本人安坐原籍濫叨職銜陋習相沿已久今准其自行出首代考之人酌量寛免託代考者但革監生不治其罪隠匿不首者一經發覺即行正法八月定同城官代行監决之例刑部議奏凡遇决不待時之犯部文到日正印官因公出境即令同城之州同州判縣丞主簿等官㑹同本城之武職兵弁代行監决其無佐貳官之地方吏目典史官職卑㣲不便令其監决應令該知府派委府屬之同知通判經厯等官星速至該州縣㑹同本城之武職官弁代行監决著為定例從之改定奴婢盜家長財物例舊例奴婢盜家長財物者減凡盜一等至是刑部遵㫖議覆奴婢自行偷竊家長財物者請照竊盜律分别贓數定擬不准減等仍刺字其奴婢起意勾引外人同竊者照凡竊盜律分别贓數遞加一等治罪贓數滿貫至一百二十兩以上者照例擬絞監候三百兩以上者照監守自盜三百兩例擬斬俱不准援赦其被勾引之外人仍照竊盜律分别定擬從之嚴訟師硬證之禁刑部議奏州縣官考取代書給以圖記原以杜訟師之弊乃劣衿莠民藐法唆訟陽假代書之圖記實係訟師之揑詞嗣後應令地方官嚴飭代書務照本人情詞據實開冩其有教唆増減者照律治罪外如有將訟師底稿囑其謄冩者許令代書出首按律治罪如代書容隠不首濫用圖記一體治罪劣衿挑唆詞訟應加倍治罪又律載證佐不言實情故行誣證致斷罪出入者罪減本犯二等若並非實係証佐受賄徇私挺身硬証者應與誣告人一體治罪不准減等受贓者計贓以枉法從重論從之定永逺枷號人犯令大理寺年底彚奏七年申定犯人脱逃例廣西廵撫金鉷奏擬絞監候人犯蘇英中途脱逃應加等擬絞立决得㫖凡擬罪潛逃之犯應絞者改為立决應斬者改為立斬必該犯本案情罪可惡秋審時無可寛緩而又有脱逃之罪方改為即行正法若所犯情罪尚有可原或因愚昧無知或因不知新定之例一時起意懼罪潛迯仍照本罪擬為監候申嚴符咒之禁兵部議准楚俗熟習符咒有作奸犯科惑世誣民者照光棍例治罪自雍正八年為始犯者為首立斬為從擬絞監候從之更定盜竊鞘銀罪例刑部議覆江西按察使胡瀛條奏起解鞘銀徃徃被奸匪偷竊向例照常人盜倉庫例自一兩以下杖七十遞加至八十兩擬絞係雜犯准徒五年贓數雖多亦不過照律定擬請嗣後偷竊鞘餉除贓至八十兩者仍照例定擬外多至一百兩以上者擬以立絞應如所請從之申定盜犯親屬禁例時山東觀城縣盜犯林琳拘禁在獄因伊妻入監探視給銀該犯賄卒越獄脱逃事聞奉諭强盜罪應立斬防範更當嚴𦂳今乃許其妻子家口入監探視滋弊種種不可枚舉嗣後當嚴行禁約不許徃來再如積慣為盜與屢次行刼之人其妻子嫡屬應如何分别治罪之處著九卿定議具奏尋議各省監獄如從前縱令盜犯妻子入監探視者除提牢司獄官吏照例恭處外將入監家口枷號兩月責四十板不准収贖凡積慣為盜屢次行刼之犯其妻子并同居父兄伯叔與弟如果據實出首准其免罪將盜犯照律減等如不行出首照窩盜坐家分贓律𤼵邊衛充軍互見徒流門盜犯有妻無子者將伊妻照入監探視例枷責不准収贖諭極刑斬絞之犯照三覆奏例進呈三次嚴官員互掲之禁奉諭近來官員彼此互掲之案甚多如上官揭屬員屬員即揭告上司知縣揭教官教官即揭告知縣若果出于公道則何不控告于未揭之前而乃報復于既揭之後其為挾仇反噬情弊顯然從庚午年為始凡挾私互揭之案如所揭審實則照定例歸結倘數欵之中有一欵審虛仍照誣告例治罪若皆虛將挾私互揭之人嚴加治罪定歸旗人員逾限逗留之例凡逾限逗留在外一年即枷號一年按其年月之多寡以為枷號之限期其别有生事犯法者從重歸結改定繼母毆死前子及凌逼自盡之例奉諭嘗見繼母於前母之子其相待之刻有在尋常情理之外者或顯加之以凌虐或隂中之以計謀以致其子不得其死甚至絶其夫之宗祀而不恤是不但母子之恩已絶並視其夫如仇讐矣向以名分所在故律無擬抵之條事既出情理之外所當酌量立法以防人倫之變朕意若繼母於前母之子凌逼謀害至死者以其所生之子擬抵若未生子者令歸母家不得承受夫家産業則兇悍之婦人有所儆戒消其殘忍之心而保其母子之誼著九卿詳議尋議嗣後如繼母將前母之子毆殺故殺致令其夫絶嗣者仍照律擬絞外如有父故之後繼母將前母之子任意凌虐毆殺故殺者不必坐以收贖之虛罪即將所生偏愛之子議令抵償擬監候如凌逼前母之子致自盡者將繼母之子杖一百流三千里未有生子者勒令歸其母家不得承受其夫之産業從之互見徒流門嚴刼囚例凡行刼監囚不論曾否得囚有無傷人將為首之人擬斬立決有傷人者將傷人夥犯亦擬斬立決如有殺人者將殺人夥犯及首犯俱擬以斬梟其餘為從未經殺傷人者仍依律擬斬監候在中途刼奪人犯因而殺人者將為首者擬斬立决下手致命者擬絞立决餘仍照律分别坐罪更定盜案條例二欵刑部議准浙江按察使方覲條奏凡積匪猾賊緝獲審實不論曽否刺字俱照應發遣之例發邊衛充軍一强盜為首傷人問擬斬决者其同居親屬照例杖流其夥盜未曽傷人行刼未至三次問擬發遣者親屬減等杖流互見徒流門八年飭議罪毋得擅用加倍字様奉諭向有特用人員深負朕恩則有加倍治罪之㫖然必其所犯之罪果係貪婪不法不可寛宥方行加倍懲治非謂因公詿誤一切叅罰案件概行加倍也至於盜案越獄亦有加倍治罪之㫖蓋因奸宄兇惡之徒徃徃乘間越獄冀脱重罪又有罪本不致於死亦乘間脱逃者尤為逞奸玩法藐視憲典是以有加倍治罪之條以上二條係朕曾經降㫖者乃内而法司外而督撫徃徃比照此例定擬又有將本犯輕罪議以加倍而抵之于死者尤非平允之道嗣後議處議罪之條俱照本律定擬其應從重者必須折𠂻平允不得擅用加倍字様開䝉混苛刻之端九年定捕役為盜及與盜暗通消息之罪刑部議覆給事中唐繼祖條奏捕役為盜較之常人尤為可惡請嗣後捕役為盜雖非造意為首應照造意為首律擬斬立决本官不行覺察照例革職如捕役為盜事發而本官抑勒夥盜改供或現充捕役而謊稱革役該上司不能查出者並從重處分又江湖巨盜徃來地方捕役知情交結遇有緝捕走風漏信令其逺颺雖非得財賣放與伊承緝之案但審有交結漏信確情應照本犯治罪均應如所請從之定誣告謀死期親致屍遭蒸檢之例刑部議廣西武生韋尚英誣告伊弟韋養被打身死經官蒸檢屬虛應將韋尚英依誣告人謀死人命致屍遭蒸檢為首例擬絞監候再查兄姊故殺弟妹律止杖流是蒸檢已死親弟之屍其罪反重於故殺親弟之條自宜照倫序之尊卑並服制之逺近分别量減始為允協請嗣後期親以上尊長凡律内不應抵命者若誣告人謀死人命致蒸檢卑㓜身屍仍照誣告人死罪未决律擬流加徒治罪其餘親屬尊長律有應抵之條者如誣告致蒸檢卑㓜之屍及卑㓜誣告致蒸檢尊長之屍者照定例擬絞從之嚴廢鐡出境之禁刑部尚書勵廷儀疏言向例鐡貨不許出外境而廢鐡不在禁例近聞射利之徒專取廢鐡鎔化運至近邊近海地方貨賣此風漸不可長請將廢鐡潛出邊境及海洋貨賣者照越境販硝磺之例科斷從之嚴私出口外之禁奉諭廣西道通交趾聞有無知愚民抛棄家業潛徃交趾地方開礦更有奸匪潛逃異域以致追緝無跡者似此違禁妄行漸不可長著廣西巡撫提鎮于徃來隘口及山僻可通之處撥兵添汛加謹巡查倘有私行出口之人務押解原籍治罪定瘋病命案罪及親屬鄰佑例刑部議覆四川總督黄廷桂疏言嗣後各省及八旗凡有瘋病之人其親屬鄰佑即報明該地方官該佐領處令伊親屬嚴行鎻錮看守如無親屬即責鄰佑鄉約地方族長人等嚴行鎖錮看守倘容隠不報不行看守以致瘋病之人自殺者照不應重律杖八十殺他人者照知人謀害人不即阻當律杖一百從之定流犯脱逃例凡流犯脱逃分别原犯流罪及免死減等為流者按脱逃次數遞加治罪原犯流罪者初次脱逃照例枷號兩個月責四十板加徒役三年二次枷號三個月責四十板加徒役四年三次發邊衛充軍若係免死減等流犯初次脱迯者枷號兩個月責四十板加徒役四年二次發邊衛充軍三次照軍犯三次脱逃例擬絞監候互見徒流門十年定應决人犯冬至後仍决之例定例秋審應决重犯如因文書遲悞已過冬至者俟下次秋審一併處决至是刑部議遲悞處决之犯若待下次秋審則時太久且恐别生事端應令該督撫查明不停刑日期即行處决仍將遲悞各官照例議處從之定奉天人命盜案事例兵部議覆奉天府府尹楊超曾疏言奉天地方旗民雜處住址参錯每遇强刼重案地方官互相推諉嗣後旗員所轄地方有民人失事者請將該管旗員查参疏防限年緝獲民官免其查叅仍令與該員協緝其民官管轄地方有旗人失事者亦照此例處分至人命等案請令旗民官員㑹同查驗仍照該管地址分别議處應如所請從之十一年復直𨽻省盜案分别首從例先是直𨽻盜案多於他省奉諭自雍正八年為始將直𨽻盜案不分首從皆行正法至是盜案漸少特頒恩諭仍照各省分别首從審擬嚴邪術避刑之禁刑部議奏嗣後奸徒以邪術避刑相𫝊習者為首教授之人杖一百流三千里若事犯到官以邪術架刑者犯該流徒以下等罪俱從重照為首例擬絞監候其犯該斬絞者俱擬立决本犯僱人作法架刑者照規避本罪律遞加二等罪止流二千五百里三千里者俱發邊衛充軍其犯該斬絞者仍照本罪科斷並嚴訊本犯究出代為架刑之人申定强竊盜同居親屬處分例刑部議准嗣後强盜之同居父兄伯叔與弟不分贓而實係知情者仍照例杖一百其知情而又分贓者照本犯各減一等分别流徒互見徒流門其雖經得財而實係不知情者照本犯減二等發落至竊盜滿貫擬絞及應擬流徒者同居父兄等不分贓而實係知情照不應重律杖八十雖經得財而實係不知情者照本犯罪減三等其知情而又分贓者照本犯罪減二等如竊盜罪止杖刺者同居兄弟等不分贓而知情照不應輕律笞四十其不知情而分贓及知情分贓者各照本犯遞減發落定孀婦獨子留養例刑部議准嗣後凡守節孀婦即年非老疾如實係獨子凡犯死罪非常赦所不原者開具所犯罪名請㫖定奪若犯軍流徒罪者照例决杖一百餘罪依律収贖免死減等之犯枷號兩個月杖一百俱准存留養親如該犯之母已經再醮假揑孀婦或留養後改適人者一經查出本犯仍照原擬問罪申定書役偽造印信例凡内外大小衙門吏役偽造本官印信誑騙財物其自行雕刻者仍照原律定擬外其債人雕刻銀不及十兩錢不及十千者俱杖一百流三千里銀十兩以外錢十千以外者俱發遣黒龍江互見徒流門銀至五十兩以上照枉法贓應流二千里者俱擬絞監候餘人仍照舊例更定律例四欵尚書張照條奏一夫毆妻死審無故殺别情者如家無承祀之人准留承祀以枷責完結一竊盜至三次通計贓在五十兩以下罪止滿杖者從重擬遣互見徒流門五十兩以上罪應擬徒者從重擬絞監候一承審官輙用重刑將笞杖人犯疊夾致死二命以上徒流人犯疊夾致死四命以上者以故勘平人論斬監候一斬絞人犯監禁在獄仍强横不法及賭博等事照原擬即行正法提牢官議處禁卒治罪從之定因姦致死本婦律奉諭因姦致死本婦向來例無正條俱引因姦威逼人致死之律擬斬監候但其間情事不同如係强姦既成本婦羞忿自盡者擬以斬候固屬允當若强姦不遂將本婦立時殺死如此滛兇之犯非立决不足蔽辜至於强姦未成或但經調戱本婦即羞忿自盡者非引照擬抵固無以慰貞魂而一概擬斬監候又覺未為平允應擬絞監候至秋審時俱以情實請㫖如此庻為輕重得宜改定竊盗誣扳例先是雍正七年定竊盗有誣扳良人者應加等比照三犯竊例分别贓數多寡擬罪至是改定凡積匪慣盜有意䧟人者仍照本犯贓數自一兩至九十兩俱發邊衛充軍外如係初次為匪畏罪混扳者計其贓數一兩至四十兩俱加等徒三年其五十兩至九十兩罪應擬徒者俱加等發邊衛充軍互見徒流門十二年嚴强行雞姦律刑部議准嗣後凡有惡徒將良人子弟强行雞姦者無論殺人與未殺人俱照光棍例為首擬斬立决為從擬絞監候雖未夥衆實因姦而致死良人子弟及至良人未至十嵗之㓜童誘出强行雞姦者亦照光棍為首例擬斬立决如强姦十二嵗以下十嵗以上㓜童者擬斬監候和姦者照强姦㓜女雖和同强論律擬絞監候若止一人而未夥衆又未傷人者擬絞監候傷人未死者擬斬監候未成姦者杖一百流三千里其二人强行雞姦並未殺人者照輪姦是實依光棍例分别首從定擬從之申定以財行求説事過錢例刑部議覆湖北巡撫徳齡疏言向例以財行求無禄人俱照有禄人減一等而説事過錢者或照有禄人減一等或照本律遞減二等殊不畫一嗣後以財行求説事過錢照例與受同科有禄概不減等倘承審官不依例擬斷仍將説事過錢之無禄人照律減二等照故出入人罪議處再行求説事亦有首從請將為首者照例科斷為從者再照有禄無禄遞減一等倘所許財物立議封貯官吏雖未收受亦應向許財之人追取入官將聼許之人議處應如所請從之申定竊盜律刑部議覆廣東按察使張渠疏言直省竊盜之案分别夥黨之多寡併有無執持器械以定情罪嗣後三人以下手持兵器行兇雖不得財杖六十徒三年得財一兩以下計贓遞加一等至滿貫論絞其中有不持兵器者仍照本律科斷四人以上雖不得財亦無器械為首徒一年為從各杖一百得財一兩以下亦計贓以次遞加如加至流三千里為首發邊衛充軍為從仍流三千里若夥衆至六人以上不論曾否得財首從皆徒三年計贓重於徒三年者為首流三千里為從各減一等贓至滿貫為首者絞為從發邊衛充軍至十人以上不分首從並發邊衛充軍互見徒流門贓滿貫者仍絞再竊盜至十人以上地方官難辭咎戾其疎防諱盜等項處分俱照强盜例應如所請從之改定宗室覺羅犯罪例奉諭宗室犯枷責罪者俱准折贖覺羅犯枷責罪者照平人例完結朕思覺羅亦係宗室照平人例則宗室覺羅逈然各别如概令折贖伊等亦不知儆懼嗣後宗室覺羅犯枷責之罪應酌其罪犯輕重即在宗人府或拘禁或鎖禁分别年限期滿釋放以抵其罪其如何酌定年限之處著宗人府㑹同該部定議尋議有職宗室覺羅犯笞杖罪者仍照例降罰治罪其閑散宗室覺羅犯鞭笞等罪者分别鞭笞之數革去毎月應領錢糧以抵其罪犯徒罪者均照旗人應折枷號日期在宗人府分别拘禁犯軍流罪者照旗人折枷號日期在宗人府鎖禁統俟滿日釋放以抵其罪從之互見徒流門嚴苗疆硝磺之禁凡有興販硝磺之犯除與苗疆蠻界相距五百里以外者仍照定例行外其附近五百里以内之民人煎穵窩頓興販事發者從重治罪以每磺十斤為一等十斤以上者杖一百計等遞加多至百斤以上發邊衛充軍其熖硝每二斤仍照舊例作硫磺一斤科斷互見徒流門嚴强姦服親例凡强姦無服親屬仍照凡人科罪外如有强姦内外緦麻以上者親及緦麻以上親之妻若妻前夫之女同母異父姊妹未成而本婦羞忿自盡者俱擬斬監候已成而本婦羞忿自盡者俱擬斬立决定因姦傷人未死者罪凡因姦致死人命除以手足行强者已成未成仍照凡姦本律如執持金刄兇器戳傷本婦及拒捕致傷旁人已成姦者擬斬監候未成姦者擬絞監候定熱河及八溝地方命盜事例直𨽻總督李衛條奏一口外幅員甚廣凡遇盜案請令該汛武職㑹文員協力緝拏一熱河監獄請專歸承徳州管理併添設吏目一員以資督捕一八溝同知原專管三處喀喇沁民人事務而設應將該地方人命盜案令該同知自行驗審如有關渉䝉古之事令㑹同值年章京驗審一命盜等案民人事件關渉䝉古者該章京行令扎薩克等交與所轄地方查緝解送一熱河理事同知通判等所管案件向例先報内部定擬人犯由古北口提督轉解今既立知州同知等官請嗣後除在外法司難以定者仍㑹同審徑行解部外一切旗民命盜照例申解該上司審擬具題從之改定遣犯逃後為匪之例刑部議准向例免死減等人犯與平常遣犯逃後為匪被獲者俱於發遣處正法此等逃犯既被拿獲自知萬無生理若必解遣所正法恐有中途復脱之事請即於拿獲處正法仍行文發遣處曉示從之互見徒流門定搶奪財物例凡白晝搶奪人財物者杖一百徒三年計贓重於徒三年者加竊盜二等贓至一百二十兩以上者照竊盜滿貫律絞監候定保舉賢良方正出身人員犯軍流以下罪名加等科斷例詳見徒流門申定因姦同謀殺死本夫例凡因姦同謀殺死親夫之案有姦夫起意殺死本夫者無論有無設計謀娶將起意之姦夫擬斬立决姦婦知情同謀殺死本夫本夫不知通姦情事即雖知通姦情事迫於姦夫之强悍非係有心縱容者姦婦仍照例凌遲其有縱容抑勒妻妾與人通姦審得確據人所共知者或被妻妾起意或知情同謀姦婦擬絞立决嚴另户旗丁潛匿之例漢軍副都統髙起奏八旗另户壯丁人等有任意潛徃關東居住者請令各旗移咨奉天將軍等衙門確查如有在彼處多年情願永逺居住者令其自行呈首即於該處入冊當差有仍行潛匿及嗣後不呈明該旗私住他處者照逃人例治罪該管恭佐領並失察之地方官議處從之定逃兵拐帶餉糧馬匹及知情容隠者分别邊衛附近充軍例詳見徒流門申嚴捕役誣良例刑部議准嗣後如有無証據之盜案捕役奉差緝拏到官雖審非此案正盗但其人素行不端曾犯竊案者原與誣良有間應照誣良為盜充軍例減一等擬徒若其人本係良民捕役揑稱蹤跡可疑指為素行不軌及雖犯竊有案業已改惡為善人所共知仍復妄行緝拏拷打嚇詐逼勒認盜者均照誣良為盜治罪互見徒流門十三年嚴官兵盜取䝉古馬匹之禁奉諭官兵駐劄外邊原為防衛蒙古而設若盜取䝉古馬匹是不得防衛而轉行擾害應加重懲嗣後官兵及跟役等有偷盜䝉古馬匹者訊實即在本地正法嚴兵丁犯竊例兵丁有犯竊盜案件既經審確即移回本營令該管官綑打挿箭遊營之後再送有司照例發落定刨墳夥犯計次數加重之例除起意刨墳為首為首者已經擬絞外為從夥犯偷刨墳墓開棺三次已外者照三犯竊盜律擬絞監候二次者照三犯竊盜贓不多例改遣一次者照定例發附近充軍互見徒流門定因戱誤殺旁人例九卿議奏陜西民人馬路飛因與張成章戱謔誤殺白令玉將馬路飛免死減等僉妻流三千里至配所杖一百仍追埋𦵏銀二十兩付給屍親著為定例從之互見徒流門嚴官吏賑災不力之令時黔省逆苗掠入内地旋經勦戢上念逼近苗疆州縣不無被其荼毒特勅辦理苗疆事務大臣竭力撫綏勿惜公帑並諭若稽查不力董率無方以救災之資飽汚吏貪官之腹不令窮民得霑實惠朕必將大小官員在該省即時正法以示衆皇朝文獻通考卷一百九十七
