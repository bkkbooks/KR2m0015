body:
  text: 欽定四庫全書皇朝文獻通考卷一百五十一王禮考二十七山陵世祖章皇帝陵曰孝陵孝康章皇后端敬皇后合葬在遵化州西北七十里昌瑞山本名豐臺嶺亦曰鳳臺山山脈自太行來重岡疊阜鳳翥龍蟠嵯峨數百仞前有金星峯後有分水嶺諸山聳峙環抱左有鮎魚闗馬蘭峪右有寛佃峪黄花山千巖萬壑朝宗迴拱左右兩水分流夾繞俱滙於龍虎峪崇隆鞏固為國家億萬年鍾祥福地康熙元年三月庚戌朔建世祖章皇帝陵稱曰孝陵先是順治十八年詔建世祖章皇帝饗殿地宫精選識地理人等令内院禮部工部都察院科道官員率徃會擬至是工成設内侍官員兵丁守䕶二年四月辛酉奉移世祖章皇帝寳宫至孝陵五月乙未奉移孝康章皇后寳宫至孝陵六月壬寅奉安世祖章皇帝孝康章皇后端敬皇后寳宫於孝陵前一日遣輔臣文武三品以上官詣陵致祭屆日恭奉世祖章皇帝寳位安設地宫石牀正中孝康章皇后寳位安設於左端敬皇后寳位安設於右畢輔臣跪祭酒衆隨行禮舉哀各退癸夘奉安世祖章皇帝孝康章皇后端敬皇后神位於饗殿致祭是時饗殿告成稱曰隆恩殿中一間寢室奉安世祖章皇帝神位居左奉安孝康章皇后神位居右右一間奉安端敬皇后神位均南嚮門為隆恩門樓為明樓上懸孝陵牌匾行奉安致祭禮世祖章皇帝神位居正中孝康章皇后神位居左端敬皇后神位居右均南響讀祝奠獻一如時饗儀是年封孝陵山曰昌瑞山從祀方澤七年正月庚戌恭建孝陵神功聖徳碑聖祖仁皇帝御製文曰我國家肇基東土祖功宗徳昭格皇天恢𢎞景運於萬年篤生我皇考皇帝睿聖首出奄有萬邦大孝𢎞仁武功文徳配兩儀而軼千古既奉冊寳恭上尊諡惟陵寢宜有功徳之碑謹撰述大概鐫諸貞珉用傳永乆叙曰皇考世祖體天隆運英睿欽文大徳𢎞功至仁純孝章皇帝太宗應天興國𢎞徳彰武寛温仁聖睿孝隆道顯功文皇帝第九子也母昭聖慈壽恭簡安懿章慶敦惠温莊康和太皇太后皇考未誕之先太皇太后嘗有紅光繞身女侍驚以為火近則不見衆皆大異之又夢異人授一子曰此統一天下之主也次日皇考誕生宫内紅光照耀香氣瀰漫經乆不散皇考生而神靈英異非常六齡讀書不假師資一目數行俱下太宗甚鍾愛焉甲申嗣登大寳是時流冦肆逆明祚已終國亡君殉萬姓無歸爰整六師一戰而破百萬之強冦乃建都燕京齊晉秦豫傳檄底定靖冦救民王師南下金陵僭號者其臣下執之以降由是下楚蜀平浙閩兩粤滇黔數年之内以次掃蕩遂成大一統之業治本愛民師出則嚴紀律毋敢殺掠百姓知民苦賦重盡除明季加𣲖又停江浙督催織造官免陜西皮張羢褐之貢罷各省柑橘鰣魚石榴等物之進停止邊外城工蠲𣲖徵民間助工之餉已臨清燒磚之役减朝鮮進貢之數定賦役全書修大清律令各衙門規制事例祗奉太祖太宗成法治具畢張敬天尊祖饗祀親䖍孝事太皇太后晨興問安長跪受教披閲章奏每至夜分勤學好問擇滿漢詞臣充經筵日講官於景運門内建直房令翰林官直宿備顧問經書史策手不釋卷遂知性知天洞悉至道兼綜天文地理禮樂兵刑賦役古今因革利病之源旁及諸子百家莫不博涉得其要領素衣菲食不興土木之工親視太學釋奠先師發帑金崇其廟貌雖太平不弛武備立賢無方丁亥己亥再舉會試間廣額數以羅人才科塲作弊者從重治罪視滿漢如一體遇文武無重輕破故明人臣朋黨之習尚亷正斥貪邪時時甄别廷臣以示激勸下詔求言虚懐納諫外官入覲面諭以愛民勤職詳慎刑獄大辟覆奏再四駁審命官恤刑各省寃濫者皆得免又停秋决一年閹寺不使外交立鐵牌示禁命儒臣修祖宗聖訓順治大訓通鑑全書孝經衍義等書以教天下臣民詣先農壇躬耕耤田勸農以足民四方水旱災荒頻發内帑多金賑濟雲貴初平頒發帑金溥賑軍民焦心勞思惟念軍民疾苦至於故明諸陵設䕶衛禁樵採憫崇禎帝死難頒諭祭誄其臣之殉難者予贈䘏其宗室投順者令畜養樂業其厚待如此我皇考以精明理政務以仁厚結人心法制則細大無遺徳百則遐邇咸徧故使山陬海澨莫不覃被恩膏東至使鹿使犬等國西至厄魯特吐魯畨等國北至喀爾喀俄羅斯等國南至琉球暹羅荷蘭西洋海外等數百國見海不揚波咸曰中國有聖人出焉梯山杭海莫不重譯來王我皇考惟是兢業祗慎無一日自暇逸也順治十八年正月不豫於丁巳日上賓嗚呼哀哉聖壽二十有四在位十八年葬孝陵陵豫定於昌瑞山皇考遺命山陵不崇飾不藏金玉寳器嗚呼故明政亂乆矣太祖高皇帝太宗文皇帝誕膺景命定亂無難特以尚徳緩兵故也至我皇考當流冦殘破明室生民塗炭大兵西下掃平逆冦統一寰宇非神武不能開基非至聖不能致治謨烈於昭道法具在雖堯舜之徳湯武之功何以尚兹謹拜手稽首而陳頌曰天佑下民眷於有徳大清受命奄有方域太祖肇基太宗𢎞業皇考纘緒亶生睿質運協禎符懋建皇極大武布昭剪除冦賊王師西下一戰而克定鼎燕京綏懐反側指日蕩平一統萬國怙冒烝民仁恩洋溢罷貢停工以甦民力立綱陳紀利興弊革成憲周詳有典有則圖治勵精憂勞日昃萬幾畢理大猷允塞崇儉去奢克勤無逸敷政優優居心翼翼丕承遺緒永言孝思先意順志恭事慈幃好學不倦悟道淵㣲博綜經史百事周知戒勵臣工首在勿欺賢奸立辨黜陟咸宜纂成文籍洋洋訓詞金匱是寳萬世可師慎刑薄賦賑救荒災勸農興學富之教之帝王道貫覆載功齊聲教四訖遐邇不遺殊方重譯入貢京師治化溥洽道法昭垂休徵駢集洪烈長貽巍巍孝陵神爽憑依山苞川拱祥䕶靈祗鏤詞貞石億禩歌思孝恵章皇后陵曰孝東陵在孝陵之東康熙五十七年三月壬申奉移孝惠章皇后梓宫徃山陵四月乙酉奉安孝惠章皇后梓宫於寳城地宫是月奉安孝惠章皇后神位於饗殿時孝惠章皇后山陵禮成並擇吉安葬皇考諸妃及諸宫人於各墓隆恩殿中寢室奉安孝惠章皇后神位左室奉安悼妃恭妃恪妃端順妃神位右室奉安貞妃淑惠妃寧慤妃神位均南嚮祭日奉孝惠章皇后神位居中南嚮四妃神位居左西嚮三妃神位居右東嚮奠獻行禮與孝陵同諸妃奠獻咸用内監十二月丙辰聖祖仁皇帝詣孝惠章皇后陵行期年致祭禮五十八年二月甲子尊孝惠章皇后陵曰孝東陵禮部等衙門言古來帝后有不合葬而自為陵者俱就方位定名今孝惠章皇后陵在孝陵之東不必另立陵名臣等恭擬尊稱為孝東陵得㫖是聖祖仁皇帝陵曰景陵孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后合葬敬敏皇貴妃從葬在孝東陵之東康熙十五年二月壬戌建仁孝皇后地宫興工臣等謹按孝誠仁皇后於康熙十三年上尊諡曰仁孝皇后雍正元年六月始改上尊諡曰孝誠恭肅正惠安和儷天襄聖仁皇后二十年二月陵寢地宫成癸邜奉移仁孝皇后孝昭皇后梓宫於陵寢三月辛酉奉安仁孝皇后孝昭皇后梓宫於陵寢地宫二十八年十月甲戌奉移孝懿皇后梓宫於陵寢癸未奉安孝懿皇后梓宫於陵寢地宫雍正元年二月丁夘尊聖祖仁皇帝陵曰景陵大學士等恭擬聖祖仁皇帝陵名進呈世宗憲皇帝哀慟不勝親刺指血圈出景陵兩字三月丙午奉移聖祖仁皇帝梓宫於景陵先是正月總理事務王大臣等議言謹按宋明之禮梓宫至山陵嗣帝皆不親送宋時以親王宰相充之明時或以王子親王主之祈聖上思宋明定制之深意念宗廟社稷之重任以慰臣民之心得㫖凡事當遵奉祖考已行典禮方為盡善前曽祖母太皇太后發引時皇考親自躬送至祖母皇太后發引時皇考聖躬違和並有足疾尚且親送梓宫啓行諸王大臣豈能勸止乎親送皇考梓宫至山陵朕意已定大臣等勿再強奏四月辛亥聖祖仁皇帝梓宫至景陵暫安奉享殿世宗憲皇帝諭扈從諸王大臣曰朕親送梓宫沿途於大禮雖獲免闕遺而思慕未有窮期朕欲留住山陵數日然後回京諸王大臣務體朕意王大臣等合辭奏言聖駕奉皇太后在此若不回鑾皇太后亦必愈加哀慟所闗甚重懇請仍照原議於祭畢回京乃從之八月乙丑奉移孝恭仁皇后梓宫於景陵辛未孝恭仁皇后梓宫至景陵暫安奉享殿是日世宗憲皇帝謁暫安奉殿孝陵孝東陵行禮舉哀畢遂詣景陵望見陵門即長慟至享殿祭酒行禮舉哀傳諭諸王大臣悉至聖祖仁皇帝梓宫前衆皆感慟良乆乃出至黄幄内祗候孝恭仁皇后靈駕至世宗憲皇帝跪迎於碑亭前歩從入奉安梓宫於饗殿之左蘆殿内列几筵世宗憲皇帝祭酒行禮舉哀畢傳諭曰皇太后素性謙謹事聖祖仁皇帝數十年未嘗少懈今暫安奉梓宫於蘆殿饗殿内見奉聖祖仁皇帝梓宫仁壽皇太后前一應供獻及祭文不可由中門出入皆應於西門行走以仰體我皇妣謙冲至意九月丁丑朔奉安聖祖仁皇帝孝恭仁皇后梓宫於景陵前期一日行告祭禮世宗憲皇帝詣饗殿於聖祖仁皇帝几筵前讀文致祭奠獻行禮次詣孝恭仁皇后几筵前讀文致祭奠獻行禮畢乃暫出至隆恩門外幄次竢徹祭品少頃復入於聖祖仁皇帝梓宫前祭酒奉移時聖駕前行至明樓前蘆殿恭奉聖祖仁皇帝梓宫奉安於龍輴畢復至孝恭仁皇后梓宫前祭酒舉哀奉安於聖祖仁皇帝梓宫之右均北嚮冊寳各設於梓宫兩旁行奠獻禮命凡聖祖仁皇帝諸皇子皇孫及向日親近大小臣工皆得入蘆殿瞻仰梓宫畢乃出至是日世宗憲皇帝詣景陵行奠獻禮欽天監奏吉時屆迺於聖祖仁皇帝梓宫前祭酒三爵次於孝恭仁皇后梓宫前祭酒三爵各行三拜禮畢至陵寢門外向北跪哭以竢諸臣恭率校尉先奉聖祖仁皇帝龍輴入地宫次奉孝恭仁皇后龍輴入地宫奉安梓宫於寳牀陳冊寳於各石案次請敬敏皇貴妃金棺從葬掩閉元宫石門世宗憲皇帝於祭臺前祭酒三爵行禮舉哀衆隨行禮舉哀畢乃出是時諸王大臣及各官仰見五色祥雲自西北起覆於景陵繚繞不㪚僉謂聖祖峻徳宏功之瑞應世宗至誠大孝之感格焉是日大學士等恭題聖祖仁皇帝孝恭仁皇后神主畢行虞祭禮世宗憲皇帝恭奉神主回京升祔太廟先是三月乙巳禮部奏言臣等欽奉上諭詳察題主禮儀今考禮書既葬藏明器下誌石復土堅築乃題主奉神主升車反室葢未葬之前事以生禮既葬之後奉以神道謹議於梓宫奉安地宫之後恭題太廟神主禮成奉安黄輿令親王大臣等敬奉回京奉㫖明季帝王皆不親送梓宫故令親王大臣奉主回京朕既親往若不親奉神主而歸於心何安竢山陵事畢題主禮成朕親奉皇考神主還京八月乙亥升祔太廟屆期命大學士嵩祝等恭奉神主填青諭之曰填青典禮所闗最重古人必取名望素著徳行純粹學問淵深者以充此任今爾等位既貴顯人品皆優是以特加簡命爾等當體朕敬恪之誠潔誠齋戒屏除塵慮儼如聖祖在天之靈陟降上下誠意所孚洋洋如在方副朕一片孝思爾等不必有意於哀痛不必有意於儀文只以一誠感格為是是月奉安聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝恭仁皇后神位於隆恩殿禮部議隆恩殿中一間寢室奉安聖祖仁皇帝神位居中孝誠仁皇后神位居左孝昭仁皇后神位居右孝懿仁皇后神位居左次孝恭仁皇后神位居右次敬敏皇貴妃神位於右一間均南嚮明樓上懸景陵牌匾每年清明孟秋望冬至嵗暮行大饗禮恭請帝后神位南嚮敬敏皇貴妃神位東嚮奠獻行禮均與孝陵禮同二年三月乙酉清明節世宗憲皇帝躬詣陵寢致祭行上土禮五年閏三月丁丑恭建景陵聖徳神功碑遣官告祭世宗憲皇帝御製文曰皇天眷佑我國家顯謨盛烈世世相承太祖太宗肇基東土締搆鴻圖世祖混一寰瀛克成駿業篤生我皇考皇帝亶神聖之姿立君師之極大徳廣運健行不息至明如日至仁如天集皇王之大成亘古今而首出書契以來罕有倫比以揚列聖之耿光以裕我無疆大歴服予小子纘承基緒既奉冊寳恭上尊諡山陵禮畢宜建穹碑頌揚功徳欽惟我皇考臨御六十餘年厚徳崇功布濩宇宙盈溢簡牒巍巍乎蕩蕩乎不可殫述謹掇大概鐫勒貞珉用昭垂於億萬祀叙曰聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信功徳大成仁皇帝世祖體天隆運定統建極英睿欽文大徳𢎞功至仁純孝章皇帝第三子也母孝康慈和莊懿恭惠温穆崇天育聖章皇后在妊時孝莊文皇后見孝康章皇后衣裾若有龍繞知為毓聖之祥逮降誕之辰異香盈室經日不散五色光華與日並耀宫人内侍咸所瞻仰天表竒偉耳大聲洪雙瞳日懸隆凖岳聳膚理瑩白皎然玉質舉止嚴重性度恢宏敦敏聰明出言中理辛丑正月嗣登大寳時甫八齡孝莊文皇后問所欲對曰惟願天下乂安兆人樂業共享太平之福孝莊文皇后動容嘉嘆知能荷神器為生民主也自初讀書十行俱下畧不遺忘講幄既開日與儒臣論難往復雖烈暑沍寒未嘗暫輟焚膏繼晷常至中宵遜志覃思好古敏求勤篤甚於儒素譚經評史發揮道奥流覽之功編於七畧爰及緯象聲律算數百家之書莫不觸類洞徹得其精要故知性知天察人倫而明庶物雖一名一物皆研究精㣲而一以貫之敬天尊祖禋祀必親齋明盛服率禮無怠至踰六十頗艱拜起冬至上辛祫祭羣臣懇請遣官恭代猶必詣郊廟省視陳設行迎神之禮退居齋幄黙致精誠俟禮畢然後旋輅天性純孝事孝莊文皇后垂三十年致愛盡誠委曲周至從幸時乗馬不離左右道路少仄即下馬扶輦踰嶺則扶掖升降彌加恭謹康熙二十六年冬孝莊文皇后聖體不豫皇考親嘗湯藥席地而坐目不交睫衣不解帶者三十五晝夜逮疾大漸自撰祝詞步禱南郊請减已算以延慈壽伏地誠懇涕泗交頥至居廬時哀瘠過甚不盥沐者數十日釋服後仍處偏殿衣布素恭送龍輴毎日必步隨數里朝夕慟戚如初喪終身思慕每一言及聲淚俱發事孝惠章皇后垂六十年備極孝養省方江南避暑塞外必奉鑾輿以行康熙四十九年孝惠章皇后壽躋七旬皇考亦年近六旬矣正月元夕宫中張燈設宴躬親起舞稱萬壽塲中外傳為天家盛世事友愛裕親王等同問安慈寧宫每序家人之禮親親之誼乆而彌篤其疾也屢親視之薨也屢親臨之宗室中用其才俊而禮其高年無爵位者亦有常廩自康熙六年始親政事未明求衣日昃忘食數御門延見公卿詳論得失綜理萬幾日有常程靡所稽滯嘗於廵幸之次章奏未至秉燭以俟或於四鼓披覽達旦遂忘寢息孜孜圖治不自暇逸歴六十餘年終始惟一虛已求言以廣視聴片詞之善必䝉采録或星象示異水旱為沴即命羣下直陳休咎所起無有隐諱又命督撫諸臣宻奏地方利弊所宜興罷者雖在萬里之外周悉情狀視若目前審官班禄必惟其當内自六卿之屬外自縣令以上臨軒召見觀其可否然後命之其以清修苦節著聞者立行甄擢以勸有位介胄之士無大小必親試其能開霽天顔從容詢問寸長㣲績並加奬勵人皆感激自奮聖性天授一經覲謁歴乆不忘故文武之選程材使器官得其人人稱其職皇考智勇天錫廟算如神三逆未叛之前即燭其終為悖亂宜早定大計遣大臣趨召之呉三桂果反耿精忠繼之乃宣睿畧簡禁兵守荆州安慶鎮江為聲勢命諸王大臣為大將軍分道並進三桂自出至衡州湖南皆陷王師扼之於岳州用戰艦據江湖㫁賊餉道三桂憂怖死遂拔岳州盡收湖南地由陜西取漢興定四川明年定貴州又明年定雲南逆孽自焚餘黨悉平精忠兵出仙霞旁擾温台大兵遏之衢州屢摧其鋒逐北入仙霞順流而下精忠自縳軍前温台賊悉破散尚之信最後反王師北自韶州東自潮州蹙之之信束身乞降其間孫延齡陸梁於桂林王輔臣潰亂於寧羌戈鋋所指不乆就俘當賊勢之熾大江以西五嶺以南悉為賊踞烽火幾半海内皇考黙運神謨不動聲色八載之間再定寰宇廓清氛翳耿精忠之亂鄭經自厦門盜踞下游三府精忠敗大兵乗勝復三府經遁歸厦門越二年克厦門經遁歸臺灣以海舟守澎湖為門户皇考决策命師治艨艟以六月乗北風攻澎湖再戰破之臺灣震讋乞降遂以其地為郡縣海氛起於明季自鄭成功巢穴兹島傳子經及其孫歴三世出没為閩南患至是悉靖察哈爾部布爾尼者元之遺裔其先世納欵獻傳國璽故荷特恩尚主封王父阿布柰漸為狂恣皇考不忍置之法覊諸盛京俾布爾尼襲封召之不至遂以所部叛遣將率禁旅討之兩月之内殱厥魁渠招撫其衆北藩以寧俄羅斯夙慕徳化奉職貢乃其邊人羅刹踞雅克薩城納我逋逃以擾索倫興師徂征拔其城縱其俘振旅而還會俄羅斯之國王遣使上疏謝罪命大臣往定邊界東北數千里延及海邊胥𨽻版圖厄魯特者元之牧牲人也其頭目噶爾丹梟桀習戰鬭刦服諸番殘回部數百餘城復與喀爾喀搆難潛刦其衆故喀爾喀七旗數十餘萬皆稱臣内附皇考親巡塞外受其朝謁錫之名爵頒諭兩部落息兵寧人噶爾丹顧頑梗弗率以追喀爾喀為名闌入邊界皇考計安藩服躬申天討以康熙三十五年春親統六師由中路直抵克魯倫料賊必逸而西别遣大將由西路進兵土喇噶爾丹聞天兵至棄其輜重連夜西奔恰遇西師於昭木多大破之噶爾丹收合餘衆竄伏窮荒其冬車駕再出至鄂爾多斯遺使招附明年春又出寧夏循賀蘭山哈宻擒其子以獻其族類丹濟拉等潛輸誠欵師次狼居胥山天兵四布噶爾丹勢孤援絶仰藥自盡丹濟拉攜其遺骸及其子女人口來歸朔漠蕩定其兄子策妄阿喇布坦素與噶爾丹有隙乘其南發潛據其地誘致逋逃種類漸滋因圖青海諸部及西域諸番暗遣人攻拉藏殺之掠據藏地皇考以太宗文皇帝時班禪額爾徳尼逹賴喇嘛知東土有聖人遣使歸命追念厥誠不可以勿救於是分遣諸將率西寧諸路之兵自青海入四川雲南之兵自拉里入整旅前驅不遺一矢遂定藏地復達賴喇嘛之位安西域之衆其他西番諸國無不欣喜感戴委贄恐後軫念東西水患屢勤翠華躬視河淮每歩長堤或駕小舟周迴觀覽高下險易瞭若指掌授策河臣罔不奏效開中河以避黄河百八十里之險治下河則疏人字芒稻河注之江濬蝦鬚諸溝注之海治清淮則培高堰塞六壩以蓄其勢開張福口裴家場以暢其流治黄河則浚雲梯闗以通海口築挑水壩開陶莊引河以導其北向築減水壩修鹽河以洩其旁溢於是淮不東漫而北敵黄黄不南灌而東趨海下河七州縣化浸為沃農桑徧野漕艘啇舶上下數千里安若衽席其在畿輔之内則隄子牙而漳滏滹沱無泛濫開栁坌口而蘆溝不横决皆皇考頻年巡省面授經畫用迄於成績勤民求瘼凡所在暘雨之期封疆大吏隨時奏聞偶有旱澇無不周知賑恤之恩不稽旬日籌畫詳盡溥遍優渥故雖有愆伏而民忘其災逺至䝉古諸籓並厪睿慮分遣使臣教以網罟耒耜之利俾知鮮食艱食每聞積雪荒歉即賜之牲畜米糧咸獲贍給康熙三十六年朝鮮以大饑告截河南漕米由登州汎海發盛京倉貯合水陸運致數萬石平糶賜賚凋瘵盡起舉國忭慶蠲租之詔無嵗不下所在災傷見告即與减除積年逋負輙免追征積算無慮億萬計人用底於殷阜四十八年特勅逓免天下地丁錢糧三嵗而徧八埏之内次第霑被寛仁之澤浹於黎烝隆冬停流遣之期盛夏鮮囹圄之禁法司奏讞多所矜釋和氣薫陶萬方康泰至於三藩之亂所全宥不可勝紀明降勅諭尚之信耿精忠罪大惡極法應及族但念尚可喜耿仲明航海歸誠著有勞績其兄弟俱從寛免罪屬下人有父兄子弟在賊中者一無所問又如噶爾丹子女赦弗誅俾子有室女有家仍官其子自秦漢以降叛逆之條蔓及宗族横枉無辜皇考𢎞曠蕩之恩遂除二千年誅戮慘酷之弊慎兹祥刑復於三代興行教化申之以告誡御製訓飭士子文刋於學宫聖諭十六條頒於州縣訓詞深厚丁寧周至士習民風於焉丕變崇敬先師表章前賢東巡守至於兖州親詣闕里致祭孔子拜跪之儀有加於往代廣賢裔博士之封宋儒周邵二程張朱皆稱子而不名升朱子祀於堂壽考作人開鄉㑹試者各二十有二科髦俊蔚興相繼輩出増江浙入學名數廣直省鄉試解額文思光被苗猺之秀𨽻籍黌宫島上君長遣子弟就業辟雍窮山越海靡然嚮風右文稽古命儒臣纂修周易折中圖象卦爻之藴親加論定又修書詩春秋傳説彚纂性理精義朱子大全經籍之道煥然大明又親授詞臣考訂律歴歴得合天律諧真度誠萬世不易之法按北極之高測地理南北東西差得皇輿全圖其他所編輯卷帙繁富充於内府聴政之暇喜操翰墨文成典誥詩為雅頌書蹟神運天矩為百代模楷闓五鈞之弓射大鏃之矢發則必中中必洞貫文事武備並臻其極所謂天縱之聖又多能也致敬前代禮踰常典自夏啇以迄元明帝王膺歴服者咸入廟而享祀焉前後南巡親祭明孝陵者三又欲封其後裔俾承世祀予小子祇奉遺言錫之侯爵公卿大臣戎行將帥多服官至四五十年皇考眷待耆舊恩禮優渥凡朝㑹讌享龎眉皓齒濟濟盈庭三代而下誠為盛典皇考自幼齡奉孝莊文皇后慈訓凡飲食起居視聴言動皆有矩度盛徳自然周旋中禮端扆涖政天顔肅穆雖宫庭閒讌一言一笑不以假人太和元氣充於四體冬不爐而自温夏不扇而手足未嘗濡汗正衣冠尊瞻視終日儼乎若思逮於耄齡聖敬日躋敦尚儉素衣不辭澣濯食不取珍異宫掖人數至少光禄寺一嵗所費較之前代僅十之一服御器用歴乆不易未嘗以故弊棄遺巡幸所至不煩民間一物宫室舟舫純用樸斵無丹青之飾秉徳謙冲自平定三逆肅清朔漠凱旋告功及五旬六旬萬壽節五十六十年寳厯國家大慶諸王公文武臣僚太學生徒京兆耆老屢請恭上尊號雲集闕下備陳丹懇皇考頻下諭㫖讓而弗居於戲惟我皇考躬備聖徳乆道化成風教翔洽錫福烝人胥躋於仁壽乃至鳥獸草木咸若守成之業恢於創造拓開疆宇廣袤各數萬里在昔未賓之國重譯踵至戴天履地含生負氣之倫莫不尊親自有生民葢莫盛於斯日者然且兢兢業業緝熙單心敬上天之明威察下民之視聴焦勞萬務未嘗以天位為樂憂勤惕厲以迄於終身是所以接堯舜禹湯文武孔子之心傳優入聖域而仁覆天下也康熙六十一年冬十一月甲午崩聖壽六十有九雍正元年九月丁丑葬景陵謹拜手稽首而作頌曰維我皇清上天眷命二儀凝祉三朝篤慶皇考紹烈建中表正亶聰亶明乃神乃聖翼翼昭事仰格高穹化將道贊祭以誠通䖍承九廟孺慕兩宫大孝備矣至徳光融爰在冲年夙成睿智致泰之基徵乎言志日就月將古訓是嗜理數兼該窮源抽秘萬幾在御八表君臨克勤於政無逸為箴晨赮欲起宵漏已深慮周禹迹事厪堯心廣聴並觀樹旌建鼓靡善不揚有闕斯補四門攸闢庶官式叙既採珪璋亦羅貔虎苞有三孽怙勢悖恩黙運神機載奠乾坤斾麾峰熄弩指鯨奔提封式廓截海為藩元裔速辜不修厥職禁旅一臨兇渠伏殛羅刹擾邊邊帥討賊拔城縱俘感恩懐徳維彼雄梟搆難比隣比隣内附稽顙稱臣敢抗明詔怙惡不悛天子三征掃蕩邊塵蠢兹遺孽搆氛西徼自恃荒遐狂跳縱暴堂堂天兵何幽不到底定三危恩同再造瑶池之水崑崙之岡窮域絶漠越海踰洋書傳所記咸我昄章敷天率土無不來王睠念河淮頻乗四載既安二瀆亦通百𣲖一授成功萬世永賴胥樂憂同仁膏遍沛周詩時邁虞典嵗巡省方詢俗輦路生春蠲租賜復嵗有恩綸恵心溥渥益道平均暘雨偶愆恩澤已布朔漢朝鮮同霑膏露象魏既懸鷄竿屢樹貫索其空桁楊可厝徳惟善政道在遺經紆御東魯親奠兩楹禮明樂備檜柏増榮光華復旦天下文明覃心四府研精儒術典籍大興英髦踵出爰在璣衡協時正日玉振金聲審音調律海涵地負大哉王言鸞鶱鳳翥煥乎宸翰文經武緯異用同源道高能博藝備徳尊歴代帝王祀典彌厚備列几筵光延籩豆修敬前朝親臨鍾阜三恪垂封烝嘗有後功勲耆舊恩禮優容龎眉皓首濟濟雍雍撝謙克讓川受谷冲穆穆其敬安安其恭六幕啟宇八垓肇域維我皇考憂勞靡極三靈集祐五紀膺歴維我皇考兢勤不息貽我臣庶食徳難忘貽我子孫卜世無疆昌瑞之山峰峙川長功徳穹碑天日同光先是以景陵建聖徳神功碑遣大學士工部欽天監堂官相度立碑方位諭諸臣曰世祖章皇帝碑文字似小聖祖仁皇帝在位六十餘年功徳隆盛文章字數甚多一碑不能盡載建立二碑一刻清字一刻漢文其碑若比世祖章皇帝碑亭寛展恐有未安即或加寛必不可加高爾等詳議具奏尋議應依孝陵碑亭之式建立二碑俟鐫刻告成擇吉建立從之皇朝文獻通考卷一百五十一
