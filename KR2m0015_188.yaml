  text: 兵考十直省兵陜西甘肅八旗駐防西安將軍一人駐劄西安府副都統一人統轄滿洲蒙古協領兼佐領四人佐領三十二人防禦三十二人驍騎校三十二人委前鋒校八人前鋒一百二十名領催一百六十名驍騎二千四百十二名炮驍騎三十二名步軍三百名養育兵七千四十名弓匠箭匠鐵匠共九十六名寧夏將軍一人駐劄寧夏府副都統一人統轄協領五人佐領二十四人防禦二十四人步軍防禦二人驍騎校二十四人八旗滿洲蒙古委前鋒校十六人前鋒一百十四名鳥槍領催四十八名鳥槍驍騎九百五十二名炮領催八名炮驍騎九十二名領催七十二名驍騎七百二十八名鳥槍步軍四百名步軍二百名養育兵六百名弓匠箭匠鐵匠各二十四名兼轄涼州副都統一涼州副都統一人駐劄涼州府統于寧夏將軍統轄協領兼佐領二人佐領六人防禦八人驍騎校八人前鋒四十名領催四十名驍騎共七百六十名步軍八十名炮驍騎十六名養育兵一百二十名弓匠箭匠鐵匠共二十四名兼轄莊浪駐防一莊浪城守尉一人駐劄莊浪縣統于涼州副都統佐領四人防禦四人驍騎校四人前鋒二十名領催二十名驍騎三百四十名步軍四十名炮驍騎八名養育兵六十名弓匠箭匠鐵匠共十二名順治二年設西安駐防協領四人正黃正紅鑲紅鑲藍右翼四旗滿洲蒙古兵二千名弓匠二十八名鐵匠五十六名十五年增設西安駐防佐領驍騎校各二十八人又增驍騎一千名十八年增設西安駐防副都統二人又增步軍一千名康熙十年增設西安駐防防禦十二人十三年增設西安駐防佐領驍騎校各十二人又增驍騎一千名十五年設寧夏駐防將軍一人左右翼副都統二人協領六人防禦二十八人佐領驍騎校各二十四人八旗滿洲蒙古領催一百四十四名驍騎二千五十六名步軍六百名弓匠二十四名鐵匠四十八名二十二年撥西安駐防佐領驍騎校各十二人右翼四旗兵一千名及步軍三百名往駐荆州府增設左翼四旗滿洲蒙古兵二千名弓匠二十八名鐵匠五十六名八旗漢軍兵二千名弓匠八名是年設西安駐防將軍一人增定滿洲左右翼設副都統各一人漢軍左右翼設副都統各一人八旗滿洲協領八人佐領防禦驍騎校各四十人八旗蒙古協領八人佐領防禦驍騎校各十六人八旗漢軍協領八人參領八人防禦驍騎校各四十人八旗滿洲兵三千五百八十六名蒙古兵一千四百十四名漢軍兵二千名滿洲蒙古步軍共七百名弓匠鐵匠共一百五十六名於滿洲蒙古額兵內分設委前鋒校十六人前鋒一百八十四名又於寧夏駐防額兵內分設委前鋒校十六人前鋒一百八十四名三十年於寧夏駐防驍騎額內分設鳥槍領催四十八名鳥槍驍騎九百五十二名炮領催四名炮驍騎一百九十六名領催七十六名驍騎七百二十四名步軍額內分設鳥槍步軍四百名步軍二百名三十一年增設西安駐防漢軍炮驍騎八十名四十二年於西安駐防額兵內分設滿洲領催二百四十名驍騎三千三百四十六名蒙古領催九十六名驍騎一千三百十八名漢軍領催二百名驍騎一千八百名五十六年調西安駐防驍騎出征增設駐防步軍滿洲蒙古七百名漢軍三百名又於滿洲蒙古額兵內分設前鋒一百名五十八年於西安駐防滿洲蒙古額兵內分設前鋒一百名雍正三年增設西安駐防炮驍騎一百六十名五年西安出征兵還歸駐防其增設步軍一千名遇缺開除並裁炮驍騎八十名又增設寧夏駐防步軍六百名七年裁西安駐防前鋒二百名入驍騎額內存委前鋒校三十二人前鋒三百六十八名九年調西安駐防驍騎出征增設滿洲蒙古驍騎一千名合新舊兵共八千六百六十名匠役一百五十六名十二年以西安寧夏駐防額內鐵匠之半改為箭匠十三年西安出征兵還歸駐防其增設驍騎一千名遇缺開除乾隆元年定西安駐防額兵內分設鳥槍兵四千名又增步軍三百名合新舊步軍共一千名內滿洲五百六名蒙古一百九十四名漢軍三百名二年設涼州駐防將軍一人副都統一人滿洲協領四人蒙古漢軍協領各一人滿洲佐領防禦驍騎校各十六人蒙古漢軍佐領各四人防禦各四人驍騎校各四人滿洲步軍尉二人蒙古漢軍步軍尉各一人八旗驍騎二千名內滿洲一千三百二十八名蒙古三百三十六名漢軍三百三十六名分設委前鋒校十六人前鋒一百八十四名鳥槍領催五十二名鳥槍驍騎八百四十八名領催五十二名驍騎八百四十八名炮驍騎五十二名步軍六百名內滿洲三百二十名蒙古一百名漢軍一百八十名弓匠箭匠鐵匠各二十四名又設莊浪駐防副都統一人滿洲蒙古漢軍協領各一人佐領各四人防禦各四人驍騎校各四人滿洲步軍尉一人蒙古漢軍步軍尉一人八旗驍騎一千名內滿洲三百三十六名蒙古三百三十二名漢軍三百三十二名分設委前鋒校八人前鋒九十二名鳥槍領催二十六名鳥槍驍騎四百二十四名領催二十六名驍騎四百二十四名炮驍騎二十八名步軍四百名內滿洲一百八十名蒙古一百名漢軍一百二十名弓匠箭匠鐵匠各十二名是年裁西安駐防驍騎一千名改為養育兵內滿洲七百二十名蒙古二百八十名四年裁寧夏駐防步軍六百名改為養育兵二十六年裁西安駐防副都統二人二十八年撥涼州莊浪駐防滿洲蒙古兵三千餘名往駐伊犂定分為三年前往又令漢軍一千餘名悉陸續出旗分别改補緑旗營裁涼州將軍一人止留副都統管轄裁莊浪副都統一人改設城守尉管轄並各裁定駐防官兵額數三十二年撥天津水師營議裁兵一千名充涼州兵額又以餘兵八十一名統撥涼州陸續充補三十四年裁西安駐防滿洲協領四人佐領二十四人防禦二十四人驍騎校二