千萬嵗右帝圖鞏一章十二句平西凱旋郊勞凱歌樂章睿謨獨運武功成天柱西頭奏永清候月占風傳自昔試聽今日凱歌聲其一往嵗伊犁振旅回名王尺組就俘來天西月竁咸星拱戎索遙戎昧谷開其二狼狽相兼弟與昆膚庭久縶兩花門九天忽遇王師下破械先施再造恩其三賜歸舊部寵榮多俾撫殘戎釋網羅但使祁連山作礪不教蒲類海揚波其四何期鷹眼終違化翻肆梟音煽逆塵朔草並霑天上露黃沙偏負塞垣春其五恢恢天網本來寬稔惡誅鋤務欲殫宵旰從容宏廟略偏師重進取凶殘其六梯衝烈烈庫車垣逋寇倉皇竟欲奔那識降人曾獻欵亡巢僥幸漏遊魂其七虎符伸命下丹霄壁壘旌旗煥一朝頓覺三門新氣象元戎更拜霍嫖姚其八一軍早定沙雅爾百堵旋收阿克蘇萬早風馳還電掃大兵直壓賊城孤其九蟻結蜂屯三閲月熊蹲虎踞一當千如山軍勢原難撼醜類空教倒戟旋其十槖囊不待褁糧行早喜因糧在敵城奇應何須驚雨粟地留火米待神兵其十一天漿那挹斗杓盈陸海茫茫疏勒城忽報靈泉隨井泄滿營歌舞拜王明其十二鼯鼠從知技已窮著林飛炮響隨風鉛丸拾得還殱寇翻為天朝助火攻其十三天廄飛騰萬騎來追風已過拂雲堆更蕃士卒符神算恰作奇兵援壘回其十四六城唇齒振和闐一夕降旗因壘傳五里何妨迷涿野轉乘霜霧靖狼煙其十五羣畨秉令盡從風聮步扶携厥角同重譯獻來回字表喜為臣僕象胥通其十六繡旗乍捲鋭師分戈壁風沙結暮雲半夜賊營齊破膽驚從天上下將軍其十七腹背交攻攻並力爪牙盡挫挫安逃天風吹蕩蚍蜉陳伏穴潛藏似犴牢其十八葉爾奇木門洞達哈什哈爾城崔嵬此間風景古未識祇今惟有天兵來其十九纒頭夾道拜旌旗涸澤揚沙久赫曦最是神奇回造化雨師今亦迓王師其二十久傳婦子望雲霓今聽歡呼應鼓鼙跪捧雕盤爭獻果葡萄蒟醬比難齊其二十一殊方何幸戴堯天從此坤城列市㕓薄賦但教供苜蓿同文先為易金錢其二十二徑師分道襲刀環轉戰經時草木殷入夜窮追聲影絶山頭明月一弓彎其二十三萬衆爭先虜氣消呼聲天半落盤雕至今人過伊西洱猶覺轟霆撼碧霄其二十四舊聞天宇原知向今讋神鋒不可攖一一顤䫜盡泥首夜來刁斗靜無聲其二十五陳合將軍飛羽箭戰酣勇士掣雕戈降戎奉檄皆鷹犬兔走山前得脫麼其二十六殘生暫保齊那爾狡窟難尋罕布孩白鵲旗高函逆首都丸親奉凱書來其二十七蟣胏蜣肱自不支親離衆叛欲何之輕刀斫陳蹂輕騎又報分張二負尸其二十八奏捷星馳絶域書御園雲物小陽初葭灰未動春先到應瑞花爭四照舒其二十九送喜璇閨晝正長共邀慈福樂時康武成敬頌無疆壽錫類同瞻日月光其三十山川競説方輿記風土爭傳王會圖此日西維逾二萬崑崙猶自在東隅其三十一默伽樂國舊曾誇豈謂還成井底蛙自此天方增喜色真教土宇屬天家其三十二旭日曈曨元象開八紘七政在璇臺嚕斯納默知欽若同向蓂階奉朔方其三十三萬古氷山雪巘間盡教職貢附朝班落梅何處春風笛一路筠沖接玉關其三十四獻馘膚功紀泮林天章更勒逺山岑祇看雲漢昭中外字字唐虞二典心其三十五功成始仰廟謨神測海捫盤見未真崇論昭宣聾昧覺共欽至理析天人其三十六泰壇琮璧陳天貺清廟圭璋告大猷盛典輝煌羣祝嘏皇心肅穆自凝庥其三十七日麗風暄敞鳳樓九霄丹詔瑞雲浮敷天湛露恩施溥奏凱聲中愷澤流其三十八駿烈都從睿斷成登三咸五總難名只今尺箠收天外嵗籥才看第五更其三十九舞羽櫜弓偃六師策勛飲至拜丹墀小臣願譜鳴笳曲珥筆慙無朱鷺詞其四十御製平定兩金川凱歌乾隆四十一年定草四中秋夜丑時木蘭營裏遞紅旗本來不寐問軍報孰謂今宵宛見之其一七千里外路迢遙向十餘朝兹八朝可識衆心同一志嘉哉行賞自宜昭其二賊巢最是勒烏圍甲雜小連噶喇依破竹勢成應不日速傳捷信願無違其三行營半夜那來喧却是紅旗到敘門五載勤勞同上下鴻勳集總沐天恩其四紅燈一點引紅旗頃刻行營人盡知舊部新藩同賀喜古來報捷可如斯其五成言原有付兒行一見紅旗即奏將雖是慈心早知喜更馳侍衛報山莊其六一破賊巢飛騎馳未遑詳悉盡陳之將軍宣力應優賜先示端倪加勉宜其七前次受降惟戢斧今畨報捷乃犁庭敬承天眷能無慰未至武成心未寧其八宵衣惟吾理合然喜而不寐那能眠乃知屐齒事誠有較彼殊猶高下懸其九三捷盼來一月間此時軍務正相關執渠掃穴歌耆定佇待郊臺奏凱還其十甲午桃花寺蹕停軍書正此俯窗櫺幸哉今日仍憑處緑桞中飛一點星其十一勒圍報捷夜行營重值上陵晝返程一刻萬人齊色喜光明日月永銷兵其十二三穴猶延一月餘六軍奮勇豈饒渠周遭火器熾攻處早爛區區釡底魚其十三旬餘棧驛八朝至一片旗紅萬馬飛來路羣畨喜且懼國之慶也國之威其十四險惡山川靖梟獍邪深機阱絶根株從今畨部都安堵強食姦欺自此無其十五蠶叢絶險隱妖氛百戰功成古未聞鼜鼓冬冬聲凱獻羌兒稽首送將軍其十六堅碉林立萬重山破險衝鋒厯盡艱奏績都資軍將力紅旗一道入桃關其十七薑維征處號維州艷羡戎人謡語留今日勒圍為內地無憂城果是無憂其十八盼捷經冬復入春垂成偏覺意厪頻今宵料得方安枕明告慎哉用武人其十九流離此日穴巢傾耆定從兹可罷兵歌凱莫教容易聽五年功幸一朝成其二十郊臺仍是此郊臺何幸重修盛事來漫謂數年經契濶精神注似日相陪其二十一勳臣率拜列靈旗軍士鳴螺赫武儀樂奏鐃歌行抱見詰戎家法萬年垂其二十二己巳班師本受降庚辰郊勞典鴻厖放牛歸馬豫素志凱獻何期此見雙其二十三準部回城定五年金川小冦亦如前嘉豫將士久敵愾不覺對之增惻焉其二十四地險加之衆志堅林碉步步戰而前小於昔事難過倍慰意恆因意􅍀然其二十五鑿穴而居避火器終於面縳出蕃城貪生螻蟻固如此聚族將焚語豈誠其二十六倐經于役五春秋棧道﨑嶇似坦郵夾路花紅復栁緑阿誰致悔覔封侯其二十七脫却戎衣换吉衣龍章示奬特恩稀同心戮力還掄最便解天間賜六飛其二十八兵洗金川永不波潢池跋扈竟如何良鄉近逺多黎庶歡喜都來聽凱歌其二十九凱歌亦豈易為聞五嵗辛勤勞衆軍我實未曾安五夜幾多憂慮與平分其三十平定兩金川凱旋郊勞鐃歌聖略宣皇威鬯風行電激物震蕩物震蕩聲靈馳靡堅不破髙不摧曩西域版圖廓二萬餘里我疆索兩金川敢抗干自作不靖適自殘五載底績除凶頑春風吹鐃入桃關奏凱還虎臣羆士皆歡顔右皇威鬯一章十六句索諾木僧格桑貙生羆狽附狼始蠻觸相尋奚事斧斨越數嵗益蠶食鄰境遂各罹其殃矧聞維州之謡禍心包藏浸假約束是偕恩德是忘勢在不得已而我戎行師出以慎動罔勿臧用乃聲厥罪懲厥狂右慎行師一章十七句赫斯怒雨軍指巴朗拉從風靡取達圍克資哩西路角之南路犄約咱既得卡了敉革布什咱復其疆里險如達烏安足恃鉦擊析應俾狂魄震禠夾擊威洊雷駛右犄角攻一章十五句小金之屏曰僧格宗猱攀不度堅碉如叢我軍先登摧枯振籜罙入其阻直抵美諾布朗底木追圍窮林厥子喙走厥父就擒汗牛板昭傳檄帖伏儹拉悉平軍聲赫濯右儹拉平一章十六句促浸酋為逋逃藪罪惡尤鞠旅移指討厥比周徑阻雪積我軍遲留彼潛伺徼􅓈逞其狡謀降畨應之紛相投屹然南路整衆還輈新璧壘厲鋋矛遂進次乎日隴之陬右討促浸一章十四句簡我禁旅勇且健七千其衆一敵萬統以將軍旗鼓建定西印授西路進南路是副聲並震奬率趫材馳敢戰搴旗摩壘士氣奮履險如夷兵不頓有若熊虎懾鼯鼹儹拉全境剃株蔓曾不旬日收復遍虩虩如霆一何迅右迅霆復一章十二句八旗兵來如風西路入谷噶通南之隘克馬尼去聲拉窠卡大如礪釃三路心力齊一阻險功在西喇穆山日則口據默格斷其後八旗兵勇可賈緑營衆悉鼓舞右八旗勇一章二十句我軍馳先聲醜徒志以離竄渠伏冥誅械獻二負尸七圖及蒙固縳之如連雞系孥側纍來檻致於京師咄哉窮猿僵禍速焚林貽右窮猿僵一章十句北路險曰宜喜賊死守限尺咫絨布移兵循塗西指綽斯請留願效驅使出竒制勝賊披靡冒雨揚兵兵為洗扼山梁築吾壘右扼宜喜一章十二句乘勝攻賊拒遏堅碉矗重壕掘康薩爾山徑險且崒鹿角如麻憑阻轇輵我軍薄之若排闥曷深曷巍一躍而越踞厥巔蹂厥穴木思工噶取如掇臨髙壓之下視巉巖蒙茸氣吞力隨拔右越重壕一章十六句河之西穢棘不可窮元戎決勝合力攻俾賊顛不得顧趾不得容日旁以右羅寨柵棄而逃羸豕蹢火其崖垠照熻赫五十里間地為赤賊潛喘餘燼灰飛將軍從天來右河之西一章十四句夾河陳軍相望風雲通氣益壯噶爾丹既攻建瓴注之扼彼衝清後路勝算雄狙伏為患惟遜克爾宗梯牆研穴如抉藂後路清賊勢窮世臣繼勇勳名崇右後路清一章十四句昆色爾髙騎脊危拉枯下瞰烈焰飛災則大海鞭一揮竒謀百出克勒圍八月中夜半時月光鏡膽寒妖魑狡有三窟一窟固已摧磨盾木木蘭八日來紅旗右一窟摧一章十一句西里既剗卡角斯折彼頑不靈螳斧當轍索隆科布屢摧其堅安布魯木迅掃其孱舍齊暮搗雍中朝搴盡撤藩以入巢幕岌焉賊境日蹙百才一存釜底羣聚逰魂曷延右釜底魂一章十六句賊負固噶喇依困獸猶鬭四面圍批其腹心外不支甲離獨松潰河西馬邦拾芥彼自隳陸罝水罟會我師環以巨炮焦灼期計窮乞命俘渠魁罪人斯得逮旄倪穴蟻迅掃無留遺定以百戰誠若斯右穴蟻掃一章十二句武功蕆珠邱告禮成駐蹕露布適報䇿勳懋賞下明詔遂奉慈輦東狩還舉郊勞儀獻纍俘於社廟崇善歸美尊上徽號親製紀功碣勒太學第功臣次宴紫光圖其貌屯師設鎮洽聲教億千萬祀安笮徼右武功成一章十六句皇朝文獻通考卷一百七十一
