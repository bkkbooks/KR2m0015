body:
  text: 郊社考八社稷儀注附臣等謹按古者建國之制右社稷左宗廟于祀典為尊重誠以非土不立非穀不食王者以土榖為重為天下求福報功故親祭社稷有事則告焉祈焉報焉其義達于上下故令郡縣皆祀社稷而民間亦有里社自三代以下雖頗有異同其義率凖諸此國家稽古定制典禮周詳享祀䖍恪誠千古不易之典也順治元年定祭社稷壇之禮定制每嵗春秋仲月上戊祭太社太稷之神同壇同壝社主用石半埋土中今全埋稷主用木祭則恭設神牌太社位右太稷位左均北向以后土勾龍氏配東位西向以后稷氏配西位東向壇在午門之右制方北向二成皆白石上成以五色土如其方色分築之内壝甃以琉璃甎如其方色覆瓦同門四面北瘞坎二壇北拜殿五間㦸門五間列㦸七十二均覆黄琉璃前後各三出陛西南神庫神厨各五間井一壇垣内外丹雘覆以黄琉璃西門外宰牲亭一井一北門外東北為正門門三南門外東南為社稷街門東北為左門均東向凡祀社稷壇為大祀皇帝親詣行禮先于中和門閲眂祝版用白質墨書玉用方珪用禮神制帛牲用太牢樂用七奏春以夾鐘為宫秋以南吕為宫舞用八佾配位無珪祭日如遇風雨則在北拜殿行禮八年二月戊戌祭太社太稷世祖章皇帝親詣行禮先是定制以来或皇帝親祭或遣官恭代皆先期奏請是嵗世祖親祭如儀進福酒胙肉如圜丘例其秋八月值太宗文皇帝忌辰陪祀各官行禮畢仍易素服九年秋復值忌辰禮部以改期請奉諭不改自是年至十八年正月親詣者八以告祭親詣者二康熙元年二月戊申祭太社太稷聖祖仁皇帝親詣行禮十六年二月戊申親祭社稷壇遇雨照常行禮定制祭日如遇風雨皇帝于拜殿内門檻南行禮從祀王公在殿外中甬路兩旁各官在王公後行禮是日雨賛引官以舊例請聖祖命照常行禮遇雨在拜殿行禮之例盖未經行云二十一年二月戊子親祭社稷壇前期齋戒恭值太皇太后聖節于行禮之後補行慶賀自元年以後凡親祭社稷壇者三十有八餘皆遣官雍正元年二月戊午祭太社太稷世宗憲皇帝親詣行禮先是康熙六十一年十一月世宗憲皇帝以祭官遣官告祭社稷雍正元年仲春上戊親詣行禮自是年至十三年春親祭者十有七二年閏四月以平定青海告祭社稷行獻俘禮詳見禮考十年三月詔直省郡縣修社稷壇敬謹行禮先是定制直省府州縣均設壇壝以祀社稷雍正二年定各直省社稷祭品刋圖通行是月奉諭㫖直𨽻各府州縣設立壇墠致祭社稷及風雲雷雨山川城隍之神毎嵗春秋展祀以崇報享典至重也從前初建之時有司或視為具文規制未必周備又未必及時修葺是以僻逺之郡縣規模簡畧禮儀草率者往往有之甚非肅将禋祀之本意也著禮部行文各省督撫飭府州縣敬謹修理以重祀典乾隆元年二月戊辰祭太社太稷皇上親詣行禮二年閏九月詔各直省社稷山川風雲雷雨等壇令督撫大員率屬行禮總理事務王大臣奉諭㫖大清律載各府州縣社稷山川風雲雷雨諸神所在有司以時致祭所以肅祀典而迓休和禮至重也省㑹之地督撫司道駐劄同城向不與祭専屬府縣官行禮督撫司道等官均有封疆守土之任自當䖍奉明禋為民祈報凡春秋致祭督撫應率闔屬文武大小官員敬謹行禮提鎮道員駐劄之地一體率屬陪祭其如何分别班次派員監禮及修整壇壝祭器之䖏該部詳議具奏奏上通飭行之八年七月以貴州布政使陳惪榮奏并頒發各省壇廟祝文二十年六月以平定凖噶爾獻俘社稷壇十月冄行獻俘禮俱遣親王将事二十一年五月増社稷壇望瘞樂章詳見樂考二十四年五月辛丑禱雨于社稷壇皇上御製祝文歩行詣壇薦玉行禮互見雩考先期奉諭朕此次親詣社稷壇祈求雨澤禮部所開儀注内無薦玉之禮詢其原委則係相沿舊規並無義意可考夫玉以庇䕃嘉穀使無水旱之灾載在傳記且于答隂之義更為相稱著飭所司敬謹用玉将事並載入㑹典御製祝文曰臣聞人事失于下天變應于上兹亢陽之示警洵賛化之無䏻言念昨年秋霖缺而冬雪乏逮至今嵗春望霈而夏未霑厯四時之久矣嗟三農其如何常雩歩禱弗蒙矜不敢冄三之凟羣祀親藩徒致籲益増宵旰之憂敬念右壇為祈穀之所載稽祭義司土穀之精蠲吉䖍齋攄忱躬懇為民請命願代萬姓之灾責己惟誠奚啻六事之舛重舉答隂之典冀施甘雨之滂雲作雷隨毋俾箕伯侵軼犧成粢潔尚敷帝里休和殷佇神歆立霈祥􅉈謹告正祭日皇帝戴雨纓冠素服自右門由右路至御輦䖏歩行詣壇行禮二十五年正月以平定囬部獻俘社稷壇如二十年之禮四十一年二月定祭日若遇風雨神位移奉拜殿儀是月戊申祭日雨奉諭社稷壇之有拜殿原以備致祭之日或有風雨也今年偶值雨所司移拜位香案于殿中餘仍列于壇上是朕獨得蔽棟宇而神位牲醪並皆露設非所以昭妥侑朕心深切不安雖社稷之制不設棟宇以承天陽祗就壇壝而言至神牌平日原係尊藏神庫未嘗不在屋宇之内則祭享時偶因風雨移奉殿内又有何嫌忌乎且拜殿甚寛想當締造之初未必不預為臨時移奉計嗣後祭時或遇大風雨所有神位祭器樂簴應如何移就拜殿之䖏著大學士九卿㑹同太常寺詳議具奏尋議如祭日請駕前十刻值風雨太常寺将祭品樂簴移設拜殿奉安神牌于殿内致祭若驟遇風雨謹用神龕覆䕶神位另設香案于拜殿奏請皇帝于拜殿行禮從之四月以平定金川告祭社稷行獻俘禮四十二年二月定祭社稷壇御用禮服及陪祀執事官服色詳見王禮考自乾隆元年至乾隆五十年皇上親祭者三十九因事親祭者一五十年後敬俟續纂皇帝親祭儀嵗祭社稷壇之禮以春秋仲月上戊先三日禮部尚書一人詣牲所眂牲如儀右眂牲致齋書祝版眂割牲眂祝版北郊儀均與同先一日太常寺卿率屬掃除敷五色土于上如其方色恭設神座如式右敷土設神座祀日五鼓太常寺卿率屬入壇然炬明鐙具器陳于案各以其序太社太稷皆牛一羊一豕一豋一鉶簠簋各二籩豆各十有二鑪一鐙二配位同壇下設三案一少西南向供祝版一東次西向陳香盤二一西次東向陳香盤二方珪二色一黄一青禮神制帛四色黑尊二玉爵二陶爵四又陶爵六壺一實福酒盤一實胙肉凡牲陳于俎凡玉帛實于篚凡尊實酒承以舟疏布冪勺具工部張幄次于㦸門内少東鑾儀衛設洗于次外樂部率太常協律郎設中和韶樂于壝門内左右分東西懸均南向陳舞佾于樂懸之次如北郊儀右陳設陳設畢太常寺博士引禮部侍郎一人升壇詣正位前省眂齍盛及籩豆豋俎之實以次詣配位前周眂如儀右省齍辨行禮位壇壝門外正中為皇帝行禮拜位南向拜殿之前夾甬道左右為陪祭王公拜位左翼居東右翼居西拜殿前東西隅為百官拜位文官郎中以上武官叅領世爵輕車都尉以上東西各五班重行異等東位西上西位東上辨執事位壝門外司拜褥鑾儀衛官二人分立于皇帝拜位左右東西面太常寺司祝一人立祝案西東面司爵四人司玉帛二人司帛二人司香二人光禄寺卿二人太常寺賛賜福胙一人序立西案之西東面司香二人序立東案之東西面侍儀禮部尚書侍郎各一人立東案之南西面都察院左都御史副都御史各一人樂部典樂一人立西案之南東面司樂協律郎樂工歌工舞佾立位與北郊同太常寺典儀一人在樂工之北西位東面接福胙侍衛二人立于壝門外東司拜褥官之次記注官四人立于侍衛之次均西面糾儀御史四人禮部祠祭司官四人分立于陪祀王公百官拜位前引王公百官行禮鴻臚寺官二人分立于御史禮部官之次均東西面掌瘞官率瘞人立壝外西北隅右辨位其日五鼓鑾儀衛陳法駕鹵簿于午門外陳金輦于太和門外陪祀王以下公以上按翼集壇門外候駕至隨行百官序立于壝門外左右祇竢均東西面司祝恭奉祝版安于祝案日出前四刻禮部尚書一人率太常寺卿屬詣神庫上香行禮恭請神位以次奉安于神座如儀右請神位太常寺卿赴乾清門奏時皇帝御祭服乗禮輿出宫至太和門外降輿乗金輦鑾儀衛官納陛奉輦内大臣侍衛前引後扈如常儀提鑪官執鐙官左右列行午門鳴鐘鼓導迎樂陳而不作不陪祀王公百官咸朝服跪送駕出闕右門至壇北門外神路東降輦右賛引左對引太常寺卿二人恭導皇帝入自北門之右至幄次少竢太常寺卿告奉安神位畢奏請行禮皇帝出次盥洗鑾儀衛官跪奉盥巾如儀賛引對引恭導皇帝由拜殿出至壝北門外就拜位前南向立前引内大臣侍衛執鑪鐙官至拜殿外止立後扈大臣隨侍鴻臚寺官引陪祀王公百官各就拜位序立典儀賛樂舞生登歌執事官各共迺職武舞執干戚進賛引奏就位皇帝就位立右鑾輿出宫就次盥洗就位典儀賛瘞毛血迎神司香二人升東西階分詣正位前祗候司樂賛舉迎神樂奏登平之章協律郎舉麾工鼓柷樂作賛引奏陞壇暨對引官恭導皇帝陞北階詣太社位前對引官至北階上止立司香跪賛引奏跪皇帝跪奏上香司香進香皇帝上炷香次三上瓣香興詣太稷位前上香儀同賛引奏復位暨對引官恭導皇帝復位立司香二人由東西階升分詣后土勾龍氏后稷氏位前跪上香畢各退賛引奏跪拜興皇帝行三跪九拜禮王公百官均隨行禮協律郎偃麾工戛敔樂止右迎神典儀賛奠玉帛行初獻禮司樂賛舉初獻樂奏茂平之章樂作司樂舉節舞干戚之舞有司掲尊冪勺挹酒實爵司玉帛奉玉帛司帛奉篚司爵奉爵均由北階升司玉帛分詣正位前司帛分詣配位前各跪獻篚奠于案三叩興司爵分詣神位前各跪獻爵奠于墊中畢自西階退司祝至祝案前跪三叩興奉祝版升北階左就壇中少西跪樂暫止賛引奏跪皇帝跪羣臣皆跪賛讀祝司祝讀祝辭曰維某年月日皇帝御名敢昭告于社稷之神曰惟神賛輔皇天皇祗發生嘉榖粒我烝民萬民永頼兹當仲春秋曰仲秋謹以玉帛牲醴庻品致祭秋曰報謝配以后土勾龍氏后稷氏尚饗讀畢興奉祝版跪安于太社位前篚内三叩興退自西階降樂作賛引奏拜興皇帝率羣臣行三拜禮樂止武功之舞退文舞執羽籥進右奠玉帛初獻典儀賛行亞獻禮司樂賛舉亞獻樂奏育平之章樂作舞羽籥之舞司爵奉爵分詣神位前跪奠爵于左如初獻儀樂止右亞獻典儀賛行終獻禮司樂賛舉終獻樂奏敦平之章樂作舞同亞獻司爵奉爵分詣神位前跪奠爵于右如亞獻儀獻畢樂止文徳之舞退右三獻既終獻太常寺賛禮郎一人詣祝案前東面立賛賜福胙光禄寺卿二人奉福胙升階至神位前拱舉退降北階左祗立于皇帝拜位之右侍衛二人進立于左賛引奏跪皇帝跪左右官皆跪奏飲福酒右官進福酒皇帝受爵拱舉授左官奏受胙右官進胙皇帝受胙拱舉授左官奏拜興皇帝三拜興又奏跪拜興皇帝率羣臣行三跪九拜禮典儀賛徹饌司樂賛舉徹饌樂奏博平之章樂作司玉帛詣案前跪叩奉方珪以退樂止右受福胙徹饌典儀賛送神司樂賛舉送神樂奏樂平之章樂作賛引奏跪拜興皇帝率羣臣行三跪九拜禮樂止右送神典儀賛奉祝帛香饌送瘞司祝司帛分詣神位前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香司爵跪奉饌興以次恭送瘞所典儀賛望瘞司樂賛舉望瘞樂奏徴平之章樂作賛引奏禮成恭導皇帝由壇北門出樂止右望瘞祀畢禮部尚書太常寺卿率屬恭請神位復御儀與迎神同皇帝至北門外神路東陞禮輿導迎樂作奏祐平之章午門鳴鐘皇帝還宫一應儀節均如常儀右乗輿回宫乾隆三十七年遵㫖議准社稷壇儀注有司先設幄次于拜殿内皇上乗輦由闕右門入東北門至社稷壇外門外御禮轎入右門循㦸殿東行至拜殿東階下降輿升階詣壇行禮禮成升輿亦如之社稷壇祈報儀孟夏常雩後嵗間不雨既祈天神地祇太嵗越七日乃禱于社稷遣官一人将事文武官應陪祀者咸與祈禱致齋三日前期具祝文潔器陳備脯醢果實祭日陳玉帛樂懸樂舞執事官依次序立與常祀同遣官暨陪祀官素服就位行禮樂章曰豐迎神奏延豐之章初獻奏介豐之章亞獻奏滋豐之章終獻奏霈豐之章徹饌奏綏豐之章送神奏貽豐之章望瘞奏溥豐之章凡典儀司樂唱賛舞生進舞與常祀同得雨則報用牲牢遣官暨陪祀官朝服行禮若雨潦祈晴冬旱祈雪禮亦如之直省祭社稷儀直省府州縣各建社稷壇皆社右稷左異位同壇嵗以春秋仲月上戊致祭省㑹以總督若巡撫主之有故則布政使攝事在城文武官縣丞千總以上咸與祭眂割牲省齍盛以布按二司副使等官糾儀以教官司香帛爵祝饌以丞倅賛引以學弟子員嫻禮儀者充之前期主祭陪祭執事官于公廨致齋三日掃除壇壝内外祭之前夕掌饌潔備品物置案于神厨設香燭眂割牲官公服上香三叩宰人牽牲告腯遂割牲瘞毛血祭之日雞初鳴執事人入設案一于壇上正中北向陳鉶二實和羹簠二簋二實黍稷稻梁籩四實形鹽棗栗鹿脯豆四實菁菹鹿醢芹菹醢若不能備各就土所有以其類充案前設俎陳羊一豕一又前設香案一陳祝文香盤鑪鐙左設一案東向陳篚一實帛二尊一爵六又設福胙于尊爵之次司祝一人司香帛二人司爵二人位案西東面階下之東設洗當階為主祭官拜位其後為陪祭官拜位文東武西班與外朝賀禮同通賛二人立階下左右糾儀官二人分立陪祭官左右均東西面漏未盡各官皆朝服畢集壇外引賛二人引省齍官入徧眡牲器酒齊饌者告潔退左右引班二人引陪祭官入東西序立東西面引賛二人引主祭官入至階下盥手通賛賛執事者各司其事賛就位引賛引主祭官引班引陪祭官咸就拜位立賛迎神引主祭官升詣香案前跪司香跪奉香主祭官三上香興賛復位引主祭官降階復位立賛跪叩興主祭官暨陪祭官行三跪九叩禮賛初獻引主祭官升詣神位前跪司帛跪奉篚主祭官受篚恭獻仍授司帛興奠于案司爵跪奉爵主祭官受爵恭獻仍授司爵興分詣社稷位前各奠正中皆退賛讀祝引主祭官詣香案前跪陪祭官皆跪司祝三叩興奉祝文跪于右讀曰維某年月日某官致祭于社稷之神曰維神奠安九土粒食萬邦分五色以表封圻育三農而蕃稼穡恭承守土肅展明禋時屆仲春秋敬修祀典庻丸丸松栢鞏磐石于無疆翼翼黍苗佐神倉于不匱尚饗讀畢三叩興以祝文復于案退賛叩興主祭官暨陪祭官三叩興賛復位引主祭官降階復位立賛亞獻引主祭官升詣神位前獻爵于左賛終獻獻爵于右均如初獻儀賛賜福胙引主祭官升詣香案前跪司爵跪進福酒于右主祭官受爵拱舉司爵接爵興司饌跪進豆肉于左主祭官受豆拱舉司饌接豆興各退賛叩興主祭官三叩興賛復位引主祭官復位立賛送神賛跪叩興主祭官暨陪祭官行三跪九叩禮賛徹饌執事官徹饌賛瘞祝帛執事官奉祝次香次帛次饌詣瘞所禮畢各退若監司分駐各府者各主其地社稷之祭其他府州縣皆以長官主之長官有故則佐貳以次攝在城文官丞史武官把總皆與祭眂割牲省齍盛府州以佐貳縣以丞若史糾儀均以教官二人執事均用掾史賛相禮儀均于學弟子員内選充祭期牲帛器數行禮儀節均與省㑹同右直省祭儀皇朝文獻通考卷九十八
