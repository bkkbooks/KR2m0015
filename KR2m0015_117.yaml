body:
  text: 欽定四庫全書皇朝文獻通考卷一百十七宗廟考十一奉先殿享奉先殿儀日獻食月薦新朔望朝謁時節展拜出入啟告恭遇列祖聖誕列祖列后忌辰及諸令節慶典則於後殿上香行禮恭遇皇太后萬夀皇帝萬夀元旦冬日至及國有大慶則恭奉列祖列后神位於前殿祭饗恭遇親饗前期三日皇上齋執事各官咸致齋前一日内務府掌儀司官進祝版祝文隨事撰擬於神庫割牲瘞毛血潔治祭品各如儀屆日昧爽内監啟寢室神龕執事官公服入殿然炬明鐙具登鉶簠簋籩豆之實陳於案各以其序殿中少西北向設祝案東西序各設尊案分陳香盤奉先制帛饗用皇后祔素帛尊爵篚冪勺具均如太廟時饗儀司祝司香以内務府官充司帛司爵以侍衛充各以其職為位樂部率太常協律郎陳中和韶樂於殿階上分東西懸樂舞在其次司祝詣神庫祝案前跪三叩恭奉祝版興贊禮郎二人引由奉先殿中門入殿中門跪安於祝案三叩興退内務府官省齍畢分詣後殿寢室前跪上香三叩興恭奉列聖列后神位以次行如遇皇后祔饗内務府上香行禮恭奉神位隨行内監執鐙左右導引至前殿入中門以次奉安於寶座列聖列后位均南向皇后祔位東位西向奉安畢詣各香案前跪叩如初儀司拜褥官豫布皇帝拜褥於殿門内正中及各神位前内監設盥盤於奉先門左階下屆時掌儀司官詣乾清門告時侍衛轉奏皇帝補服乗輿出宮前引後扈如常儀出景運門至誠肅門降輿贊引對引太常寺卿二人恭導皇帝入奉先左門内監跪奉盥盤帨巾如儀皇帝盥畢贊引對引恭導皇帝陞左階入殿左門詣拜位前北向立豹尾班侍衛止立階下前引大臣止立階上均東西面後扈大臣隨入僉立於皇帝拜位後左右典儀贊樂舞生登歌執事官各共迺職武舞執干戚進贊引奏就位皇帝就位立典儀贊迎神司香奉香以次進至各案前祗竢司樂贊舉迎神樂奏貽平之章樂詞與同後倣太廟時饗此樂作贊引奏詣香案前暨對引官恭導皇帝詣太祖髙皇帝香案前對引官至祝案前止立司香跪贊引奏跪皇帝跪奏上香司香進香皇帝上炷香三上瓣香興以次詣列聖案前上香如前儀畢贊引奏復位暨對引官恭導皇帝復位立贊引奏跪拜興皇帝行三跪九拜禮興贊引恭導皇帝詣皇后香案前司香進香跪皇帝立上香畢恭導皇帝復位立樂止典儀贊奠帛爵行初獻禮司樂贊舉初獻樂奏敉平之章樂作舞干戚之舞有司掲尊冪勺挹酒實爵司帛司爵以次進至各神位前司帛跪獻篚奠于案三叩興司爵立獻爵奠於墊中各退樂暫止司祝詣祝案前跪三叩興奉祝版跪案左贊引奏跪皇帝跪贊讀祝司祝讀祝畢興奉祝版跪安神位前篚内叩如初退樂作贊引奏拜興皇帝三拜興樂止武功之舞退文舞執羽籥進典儀贊行亞獻禮司樂贊舉亞獻樂奏敷平之章樂作舞羽籥之舞司爵詣各神位前獻爵於左如初儀樂止典儀贊行終獻禮司樂贊舉終獻樂奏紹平之章樂作舞同亞獻司爵詣各神位前獻爵於右如亞獻儀樂止文徳之舞退典儀贊徹饌司樂贊舉徹饌樂奏光平之章樂作徹畢樂止贊禮郎一人趨至神位前北面跪奏禮畢請還寢室三叩退司樂贊舉還宮樂奏又平之章樂作贊引奏跪拜興皇帝行三跪九拜禮畢樂止典儀贊奉祝帛送燎司祝司帛咸詣神位前跪三叩奉祝帛興司香跪奉香興以次恭送燎所皇帝轉立拜位東旁西向司拜褥官徹拜褥竢祝帛過仍布拜褥皇帝復位立贊引奏禮成暨對引官恭導皇帝出殿左門降階由奉先左門出至誠肅門外陞輿還宮導從如來儀内務府官恭奉神位還寢室上香行禮與迎神同所司徹祭器内監闔門各退右親饗若遣皇子祭饗前殿祭前諸儀屆日殿内外陳設均與親饗同皇子拜位在殿檻外正中設盥盤於右階下皇子夙興補服步行至誠肅門掌儀司贊禮郎二人前導皇子由奉先右門入至西階下盥手升階諸拜位前行禮迎神上香出入殿右門祝帛送燎皇子避立西旁東面禮成仍自西階降出誠肅門還宮各退遣王公内大臣祭饗儀節均與皇子同右遣官饗奉先殿上香儀每月朔望列聖聖誕列聖列后忌辰及上元清明霜降嵗除日恭遇皇帝親詣後殿上香行禮是日所司詣後殿寢室前陳酒脯果實鑪鐙具司香官執事殿内掌儀司官請駕如儀皇帝補服忌辰素服乗輿出宫内務府總管前導至誠肅門降輿入恭導皇帝詣後殿各案前上香行禮儀與前殿上香同禮畢恭導皇帝還宮各退右親詣上香立春端陽重陽等節掌儀司官入後殿眀鐙内監啟寢室神龕案陳酒脯果實掌儀司官一人補服詣各案前上香行三跪九叩禮如儀四月八日七月望日陳素果不設酒脯餘同贊禮以内務府贊禮郎升降出入均于右右遣官上香列聖列后升祔奉先殿儀前期内務府敬製神主於神庫既成内務府總管上香行禮如儀欽簡奉后主大臣一人前三日掌儀司官入後殿陳設寢室前神龕香案寶椅寶牀楎柂及帷幔衾枕鑪擎供器如事生之儀屆日掌儀司官詣前殿陳設寶座每案陳祭器設香帛尊爵罏鐙具樂部陳樂懸樂舞奉后主大臣及執事官皆公服祗竢内監設盥盤於神庫門外之東司拜褥官豫布后主祗見拜位於殿中布皇帝拜位於稍後其日升祔太廟禮成皇帝還宮釋禮服更補服禮部尚書詣乾清宮奏請皇帝乗輿出宮前引後扈如常儀掌儀司官詣後殿寢室前上香行禮恭奉列聖列后神位奉安於前殿寶座跪叩如儀駕至誠肅門降輿贊引對引太常寺卿二人恭導皇帝詣神庫門外東盥手如儀詣帝主后主神位前上香行三拜禮奉后主大臣於門外隨行禮皇帝近前跪恭奉帝主興前行奉后主大臣趨入神庫門詣前跪恭奉后主興隨行贊引對引恭導皇帝入奉先左門前引大臣止陞東階後扈大臣侍衛均止進殿中門奉安帝主於寶座上退及案前跪三叩興贊引對引恭導皇帝就位立贊引北面跪奏皇后恭宣尊諡后主升祔奉先殿祗見皇帝恭宣尊諡帝主奉后主大臣恭奉后主跪安於祗見位興趨出殿西門贊引奏跪拜興皇帝恭代行三跪九拜禮興進前跪恭奉后主興奉安於寶座退及案前跪三拜興復位乃行大饗禮迎神上香讀祝奠獻望燎諸儀節均與常饗同禮畢贊引對引恭導皇帝出奉先左門至誠肅門外陞輿還宮引扈如來儀掌儀司官恭請神位還御寢室上香行禮如初迎儀執事官徹藏祭器内監闔門衆各退皇后升祔奉先殿儀前期所司敬製神主於殯宮配殿製寶座龕案於神庫既竣諏吉行題主禮以神輿恭奉回京升祔前一日皇帝親詣奉先殿祗告如儀屆日神輿由東華門入皇子從王公以下文武百官朝服㑹門外跪迎侯過興内務府官豫詣前殿陳設寶座具案陳恭請列聖列后神位奉安行禮均如儀司拜褥官豫布祗見拜褥於殿中神輿至誠肅門止贊引對引官二人導皇子詣神輿前跪行三叩禮興恭奉神主由奉先左門入進殿中門奉安於祗見位少退立贊引跪奏皇后恭宣諡尊升祔奉先殿祗見列聖列后皇子恭代行三跪九叩禮畢進前跪恭奉神主興贊引贊賜座皇子奉神主奉安於寶座跪三叩興乃行大饗禮畢恭請神位還御寢室神主御寢室上香行禮均如常儀右升祔薦新儀正月薦鯉魚青韮鴨卵二月薦萵苣菜菠菜小葱芹菜花鱖魚三月薦王𤓰蔞蒿菜蕓薹菜茼蒿菜水蘿葡四月薦櫻桃茄子雛雞五月薦杏李蕨菜香𤓰子鵝桃桑椹六月薦杜梨西𤓰葡萄蘋果七月薦梨蓮子菱榛仁藕野雞八月薦山藥栗實野鴨九月薦柿鴈十月薦松仁軟棗蘑菇木耳十一月薦銀魚鹿肉十二月薦蓼芽菉豆芽􅊵鱏鱑魚其豌豆大麥文官果或奉㫖特薦鮮品皆遣内監供獻行禮順治十四年定每日供獻湯飯果五盤肉三盤上香行禮康熙十三年定早晚㸃香燭停止每日供獻每月薦新掌儀司官詣後殿上香行禮具常服遇吉期具補服其祭品内監於神厨恭造皇朝文獻通考卷一百十七
