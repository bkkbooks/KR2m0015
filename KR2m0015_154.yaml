body:
  text: 欽定四庫全書皇朝文獻通考卷一百五十四王禮考三十山陵陵上雍正十三年十月更定列祖列后忌辰致祭陵寢儀是月戊寅皇上諭王大臣等曰據禮部以十一月十三日恭遇皇祖聖祖仁皇帝忌辰或照陵寢忌辰祭祀禮致祭或照四時大祭禮致祭之處具奏朕思皇考誠孝純篤哀慕無窮三年之後每遇聖祖仁皇帝忌辰於景陵祭祀之禮特加隆備並降諭旨謂此禮惟朕躬特行之於皇考後世子孫不得奉為成例但朕仰體皇考孝思於皇祖聖祖仁皇帝忌辰祭祀之禮意欲仍照舊例舉行至於率親率祖理本同原孝饗明禋不容或異嗣後恭遇列祖列后忌辰應否遵照致祭景陵之禮一體舉行以展報本追逺之意王大臣會同禮部定議具奏尋王大臣集議享祀固在備物而典禮尤貴酌中謹按各陵寢四時大祭牲用太牢獻帛爵讀祝文致祭於隆恩殿具朝服行禮從前聖祖仁皇帝於孝莊文皇后忌辰此禮行之最久原與各陵忌辰祭祀之禮不同至遇聖祖仁皇帝忌辰致祭景陵乃奉大行皇帝諭旨於定例外仍照周年禮致祭是以又有不得奉為成例之旨謹詳酌典禮今十一月十三日聖祖仁皇帝忌辰應照陵寢四時大祭用太牢獻帛爵讀祝文遣官承祭其承祭官暨執事官照例具朝服行禮陪祀大臣官員停其由京遣往在陵官員咸令陪祀祝文交翰林院撰擬進呈永逺遵行嗣後恭遇列祖列后忌辰均照陵寢四時大祭禮舉行從之乾隆元年正月癸亥上恭謁昭西陵孝陵孝東陵景陵行禮奠酒舉哀賜總管及文武大臣官員兵丁等縀匹銀兩有差諭王大臣等曰朕恭謁祖陵敬瞻廟宇規模崇整妥侑攸昭惟是榱題丹雘多閲年所似應重加藻飾以肅觀瞻但陵寢關係重大宜詳稽典制敬謹酌議方可舉行朕思祖宗福祚綿長萬年垂裕山陵廟貌靈爽式憑為子孫者以時修葺庶足以展孝思如典制應行則追逺崇先誼當均切永陵福陵昭陵殿宇並應一體修繕著總理事務王大臣敬謹定議具奏二年十月辛卯上以修理陵寢工程告竣恭謁昭西陵孝陵孝東陵景陵行禮壬辰遣官祭昭西陵孝陵孝東陵上親詣景陵致祭三年二月戊戌上以清明節恭詣泰陵展謁行禮是日未至碑亭即降輦慟哭步入隆恩門至寶城前行禮奠酒哀慟良久次日躬祭泰陵未至碑亭即下輦步入隆恩門至隆恩殿行禮畢復詣寶城前奠酒舉哀嗣後祭陵聖駕謁儀同陵更定清明上土儀禮臣議言清明山陵增土因沿前明舊制但負土十三擔往來二十餘次似覺煩數且十三擔並無取義恭擬每年清明於各陵皆增土一擔由西磴道升至石柵并為一筐但令承祭官一人敬謹奉筐而升祗跪上土於寶頂仍由西磴道降庶踐履不致多人而保護鞏固之意益昭誠敬矣從之四年九月庚申上奉皇太后恭謁昭西陵孝陵孝東陵景陵行禮先是三年十一月庚午諭王大臣九卿等曰上年修理三陵工程告竣朕特降諭旨躬親展謁經王大臣九卿等議於來年秋間前往嗣奉皇太后懿旨朕詣盛京時皇太后亦親往恭謁祖陵正擬降旨交王大臣等會議今思近年畿輔收成歉薄雖行營一切所需俱係官辦絲毫不以纍民而沿途經過地方預先購備如米糧草來之類恐致價值髙昂於民間未便應俟豐稔之年朕另降諭旨前往展謁至是年九月庚戌諭曰朕奉皇太后懿旨欲叩謁祖陵以展誠切朕奏奉天路逺且俟一二年之後今年請先謁孝陵景陵行禮已蒙俞允其起程日期著欽天監選擇具奏一切應行事宜著各該衙門先期備辦至是上奉皇太后展謁如謁泰陵儀八年七月上奉皇太后駕往盛京恭謁祖陵先期大學士等議言永陵殿宇稍狹拜褥照例鋪設殿外其降神之初應請皇上躬親上香以展誠孝以達馨聞再舊例祭昭陵因帛案前隙地狹窄原有跪獻帛畢擇隙地行三拜之例似與典禮未協恭按各陵隆恩殿大祭原與太廟禮同會典載躬饗太廟獻帛官跪獻帛三叩獻爵官立獻畢各退並未載有親獻禮儀此次皇上躬謁祖陵請遵照太廟親祭典禮行從之啓行前一日親詣奉先殿祗告啓鑾日陳騎駕鹵簿車駕經過沿途文武官各常服於道右跪迎如儀九月乙未駕至興京恭謁永陵儀與康熙二十一年禮同次日丙申行大饗禮如儀禮畢頒賞守陵官員兵丁等有差是日永陵內附葬之武功郡王禮敦巴圖魯恪恭貝勒塔察篇古墓各遣官致祭附近之覺羅等祖塋皆遣官往奠辛丑駕至盛京恭謁福陵儀與康熙十年禮同次日壬寅行大饗禮畢即往謁昭陵儀與謁福陵同夀康太妃宸妃懿靖大貴妃康惠淑妃並公主園寢各遣官致祭皇太后謁陵儀與康熙三十七年禮同躬謁祖陵禮成擇日親臨功臣之墓奉旨朕親奠克勤郡王等園寢據禮部援引皇祖聖祖親奠功臣墳墓之例隨駕之皇子王等皆隨行禮此次隨駕之皇子王貝勒等應隨行禮具奏朕已降旨依議竊思從前之隨駕皇子王等皆係皇祖子孫是以均隨行禮此次隨行之王貝勒內有朕之叔輩或朕之兄弟輩非從前之隨駕皇子王等可比每祭酒時亦隨行禮似屬未便朕親臨祭酒功臣即為榮寵之至克勤王園寢王貝勒等仍隨往功臣揚古利等墳墓不必隨往此後朕之子孫若隨來朕降旨遵行再蒙古王額駙王大臣墳墓皆不必隨往著令禮部記載是日親臨克勤郡王功臣揚古利費英東額亦都之墳各祭酒三爵又親王貝勒以及大臣等墓以次遣官往奠翼日禮部奏請遣官往祭長白山北鎮醫巫閭山及遼太祖陵回鑾次日皇上親詣奉先殿告祭越二日禮部奏請行慶賀禮儀與三大節朝賀同臣等謹按國家創業遼瀋祖功宗德積纍發祥聖祖仁皇帝三謁祖陵典禮丕昭皇上紹衣先德以八年秋吉祗奉皇太后鑾輿展謁三陵禮成慶洽自啓行迄回鑾百有八日德音善政美不勝書敬奉慈闈躬進甘旨問安視膳歷四月如一日則孝飬之隆也駕幸塞外諸藩部落奔走恐後賜豫便蕃慰勞周至則懷逺之恩也飭隨行軍士毋踐田禾經過州縣賜復一年則愛民之惠也念隨從官軍及商賈等行騎或至疲乏輒停鑾休息復慮行營米糧或缺發倉米三千石分賜扈從則逮下之仁也沿途設臺站三十郵遞章奏閣本三日一發隨時批閲曾無停晷勤於政事如此經葉赫遺墟追維高皇帝肇基服衆之所賦詩紀事盛京奉貯太祖太宗遺留弓矢捧玩移時永懷先澤又如此每駐蹕之後與禁衛較射發無不中大獮合圍獲禽無算親撰世德舞辭十章授之工歌為陪京賜宴之用御製盛京賦三千餘言志沮漆之土宜述豳岐之王業奎章炳蔚上嫓典謨至十有九年載舉展謁祖陵之典一如故事四十三年及四十八年又復躬謁祖陵以申誠孝他如葺壇廟繕城垣凡所舉行前兩巡皆未及大孝所推益宏逺矣臨御五十年來計已四詣盛京熟覽川原之形勝回思開創之艱難吟咏成詩垂為法守此誠歷考帝王繼志述事未有若斯之盛者也十四年三月甲子上以金川平定恭謁昭西陵孝陵孝東陵景陵行禮次至朱華山端慧皇太子悼敏皇太子園寢酹酒癸酉恭謁泰陵行禮先是二月癸巳諭曰金川大兵奏捷畨酋歸城皆蒙列祖皇考在天之靈默佑朕躬致此嘉慶理宜展謁陵寢以告成功擬於三月十三日起程恭謁孝陵景陵禮畢即由馬蘭峪前往易州恭謁泰陵所有應行一切事宜各衙門照例敬謹預備十五年八月庚寅上以册立皇后禮成奉皇太后恭謁昭西陵孝陵孝東陵景陵行禮九月壬寅奉皇太后恭謁泰陵行禮先期諭曰朕恭承慈命繼册中宫慶典既成禮宜躬率皇后祗謁先陵以展孝忱以資福佑兹於八月十七日自京師啓程恭詣景陵行禮旋由海子西至泰陵行禮畢取道保陽巡幸豫省所有應行典禮所司敬謹預備十七年十月壬子上恭謁昭西陵孝陵孝東陵景陵行禮畢次至孝賢皇后梓宫前奠酒甲寅奉安孝賢皇后梓宫於陵寢嗣後西陵聖駕恭謁孝陵孝昭東陵孝賢皇景陵禮畢至同后陵奠酒儀十九年七月上奉皇太后駕往盛京恭謁祖陵是月壬午自避暑山莊啓行八月乙卯駕至吉林溫德亨山望祭長白山至松花江祭江神九月辛巳至興京謁永陵次日行大饗禮賞守陵官員兵丁遣官致祭祔葬之武功郡王恪恭貝勒墓暨附近之覺羅等祖塋丙戌駕至盛京先謁福陵次謁昭陵於次日行大饗禮賞守陵官員兵丁遣官致祭夀康太妃宸妃懿靖大貴妃康惠淑妃並公主園寢禮儀均與八年同皇太后謁三陵行禮並如八年儀又遣官致祭克勤郡王功臣揚古利費英東額亦都墓親祭北鎮醫巫閭山遣官祭遼太祖陵禮成回鑾御太和殿行慶賀禮如儀是年議準展謁祖陵之日皇上素服行禮大祭日皇上禮服陪祀及執事大臣官咸朝服二十年五月以平凖噶爾遣皇子代行祭告山陵是月壬辰諭曰平定凖噶爾捷聞此皆仰蒙皇祖皇考謨烈顯承福貽宗社故得膚功迅奏荒服敉寧理應敬詣橋山躬申告祭因今春甫經展謁而目下青苖彌望農事方殷車駕所經恐滋踐踏然朕仰慰先靈之意實切於衷告廟之典宜躬詣行禮孝陵著遣皇子永璋景陵著遣皇子永珹泰陵著遣皇子永琪前往代行告祭所有應行預偹事宜著各該衙門速行預備癸巳諭曰凖噶爾用兵一事上年朕詣盛京恭謁祖陵時具已虔誠默禱今仰邀列祖福佑迅奏膚功荒服敉寧慶洽中外實我大清萬年宗社無疆之福理應告祭三陵躬申謝悃惟是東巡尚未逾嵗不欲以清塵除道重煩我邠岐父老永陵著派皇子永璋福陵著派皇子永琪昭陵著派皇子永珹代行告祭禮今秋諸皇子隨侍熱河即就近取道前往俾其周歷遼瀋仰思祖宗肇興之烈禮成後並可於奉天行圍較獵用習武事而昭家法所有應行預備事宜著行文各該衙門照例辦理二十五年二月丙戌上以回部平定恭謁昭西陵孝陵孝東陵景陵行禮次至孝賢皇后寶城前奠酒己亥恭謁泰陵行禮先是二十四年十月諭曰將軍富德等奏報拔達山汗素爾坦沙將小和卓木霍集占逆尸獻出並生擒之俘馳送京師殊勳克奏茂典應修恭惟盛京三陵理宜親謁叩謝但以序屆冬寒恐勤屬車之衆特遣親王前往恭代東陵西陵即擬恭赴展謁而計程往返適屆慈寧萬夀慶辰以明年獻嵗諏日親詣行禮二十六年二月甲申上奉皇太后恭謁泰陵行禮先是二十五年八月諭曰明年恭逢皇太后七旬萬夀欽奉懿旨來嵗春和虔諏吉日祗謁泰陵用申誠悃欽此所有應行典禮著該衙門照例敬謹預偹三十一年二月上恭謁昭西陵孝陵孝東陵景陵禮成詣孝賢皇后陵寢酹酒是月謁泰陵行禮三十三年二月上恭謁泰陵行禮三十五年二月上以是年六旬萬夀慶節恭謁昭西陵孝陵孝東陵景陵行禮謁夀祺皇貴太妃溫惠皇貴太妃孝賢皇后陵寢酹酒三月謁泰陵行禮三十八年三月上以奉皇太后巡幸天津恭謁泰陵行禮三十九年二月上恭謁昭西陵孝陵孝東陵景陵行禮詣孝賢皇后陵寢酹酒四十一年二月上以金川蕩平用展告功之禮謁昭西陵孝陵孝東陵景陵行禮詣孝賢皇后陵寢前酹酒四十二年九月上恭謁泰陵泰東陵行禮四十三年七月上東巡盛京恭謁祖陵先是四十二年九月諭曰盛京乃我朝定都創業之地永陵福陵昭陵巍然在望皇祖聖祖仁皇帝御極六十一年曾經三次展謁孝思追逺常切欽承朕自乾隆八年及十九年恭謁祖陵以來迄今已二十餘年遙企橋山每深依戀常時恭閲太祖太宗實録敬惟開創艱難佑啓萬年統緒兹際重熙纍洽之庥溯念前勞輒不禁愀然淚下而松雲蔥鬱向惟再蒞瞻仰心甚歉焉朕現在精力如前尚堪逺涉擬於明嵗秋間前詣盛京恭謁祖陵以申積悃所有駐蹕往來俱由內地出山海關而行於置頓安營較為妥便尚在二十七月之內途次不行圍至盛京時不升殿不筵宴朝鮮國毋庸遣使朝賀其札薩克蒙古王公等亦毋庸朝覲至啓鑾日期屆時再降諭旨將此通諭知之至是年二月諭曰朕於今秋恭謁祖陵因至盛京時不升殿不筵宴曾降旨令朝鮮國毋庸遣使朝賀今據禮部奏該國王以舉國臣民瞻依倍切欲仍照往例遣陪臣袛候陳請轉奏情辭懇切恭順可嘉著準其遣人至盛京請安毋庸進貢不必差遣多人亦不賜宴也該部咨該國王知之五月諭曰朕前詣盛京恭謁永陵福陵昭陵於七月二十啓鑾所有一切應行事宜各該衙門敬謹預備至是啓鑾四十三年八月己未諭曰海為衆水朝宗最昭靈應乃各處海神咸有廟祀惟北海自山海關至盛京一帶向未専建廟宇以隆禋祀尚屬闕典朕此次詣盛京恭謁祖陵蹕途循海而行瞻望甚近宜先申虔祭以迓靈庥著該部于濵海地方擇地望祭派莊親王永瑺行禮所有應行事宜各該衙門即速照例備辦並著周元理於山海關澄海樓相近處所度地建立北海神廟即行繪圖呈覽候朕降旨發帑興工俾廟貌崇閎以妥神佑乙丑諭曰盛京為本朝王迹肇基之地朕恭謁祖陵道出山海關經過各處城垣多有坍塌殊不足以壯觀瞻而資捍衛著軍機大臣會同將軍𢎞晌查明何處最為緊要應行修築妥議具奏候朕發帑興工并派員稽查督辦甲戌上恭謁祖陵乙亥上致祭永陵行禮畢閲興京城垣己卯上恭謁福陵庚申上致祭福陵行禮畢恭謁昭陵辛巳上致祭昭陵行禮壬午諭曰朝鮮列在外藩世篤忠貞謹守侯度乾隆八年及十九年臨幸盛京朝鮮並修朝貢之禮本年以尚在二十七月之內停止宴禮曾預敕朝鮮毋庸遣使朝賀而該國王情殷感戴遣陪臣賫表修貢迎駕請安藉抒忱悃恭順可嘉著照上兩次之例加恩賞賚并御書匾額以賜用昭優眷其陪臣亦著一併照例加賞又奉諭曰向凡巡幸所至一切經行橋道俱報部核銷以寓體恤官民之意惟盛京一帶止計橋梁不計道路未為畫一非所以廣惠也所有此次自山海關以外至興京往來道路並著加恩照關內之例一體報銷癸未上臨克勤郡王墓酹酒賞賜進獻詩册者四人各小卷縀一匹乙酉閲盛京官員射丙戌閲吉林官員射九月丁亥上詣清寧宫祀神行禮召扈從王公大臣等食祭肉是日諭曰朕此次詣盛京恭謁祖陵蹕路出山海關而行憑覽關城形勢屹然雄鎮明季於此置大員設重兵以防我朝而大軍每從沿邊諸隘口直入如踐無人之境可見險固不足恃也然以當時盛京而論有此關抗扼其中內外氣脈不能貫注即由他路入邊而彼終得撓我之後所以天聰三年太宗文皇帝親統大軍征明進圍燕京仍復釋之而去聖謨深逺未嘗不籌慮及此逮後攻克永平灤州遵化皆留將督兵駐守或欲藉以為內外夾攻山海關之策乃代鎮之貝勒阿敏乖張怯懦竟棄已得之各城而歸太宗憤甚數其罪而責之雖貸其死而全親親之誼遂不復躬總六師入邊亦深以山海關中隔為難也泊乎闖賊陷闕明社遂墟吳三桂乃開關迎請王師為之復仇戡亂於是我睿親王即率徑旅入關一戰而殱賊衆追逐李自成至京城而遁克集大勳恭奉我世祖章皇帝定鼎燕京統一寰宇用奠我萬世丕丕基夫同此山海關也前則屢圖之而不得其機後則直入焉而無所於阻蓋上天眷佑我國家誠非意計所能預及而所謂在德不在險者於此益見迄今追思更不禁感鴻貺而凛景命矣且自出關後途中所經城郭則寧逺錦州廣寧等處山川則松山杏山大凌阿薩爾滸尚夾崖渾河等處悉我太祖太宗艱辛百戰之地歷歷在目自興京肇迹遼瀋遷都業基於勤而謀成於斷皆世世子孫所當深念者朕自臨御以來每間日恭閲列祖實録一册周而復始於創業垂統之迹敬識之弗敢忘前此癸亥甲戌再臨陪都展謁陵寢所厯川原形勝因見徴聞並為詩篇以紀而薩爾滸一戰破明四路之兵二十餘萬逺近承風震讋尤為締造鴻規向曾親製書事長篇昭示來許昨嵗為全韻詩於太祖太宗大烈耿光咸志述成什端委畢該洪纎具備實足以垂法守非僅託為吟咏而已兹戊戌秋三蒞斯土境之履者益以習迹之著者益以晰其或地名今昔傳訛介於疑似顯晦間者復周􅓪而深考之乃得曉然於心而無所惑夫以朕之景仰前型勤懇若是必三至乃得曉然於心凡我子子孫孫紹登大統者可不體朕志以為法眷懷遼瀋舊疆再三周厯蘄於祖宗遺緒身親而目覩哉至於朕叩謁永陵福陵昭陵每至必淚隨聲湧瞻戀不忍去此非可以強致也夫太宗為朕之髙祖而自太祖以上至肇祖雖遞推遞逺然溯水源木本一脈相承則固甚親而甚近且奕祀之升平景運皆昔日艱難開創之留貽永言思之豈能不痛理也亦情也我後世子孫誠能遵朕此旨處尊位而常緬前勞覽當年原巘而興思拜舊里松楸而感愴自必凛然於天眷之何以久膺憬然於先澤之何以善繼知守成之難兢兢業業永保勿墜則我大清纍洽重熙之盛洵可綿延於億萬斯年矣非然者或輕視故都而憚於逺涉或偶詣祖陵視同延攬古迹而漠不動心是則忘本而泯良設有其人即為國家之不幸實不願我後嗣之若此也子孫可不恪奉朕訓而知警懼乎歷代事迹湮逺姑不具論即如勝國洪武草昧初開未嘗不得之艱苦而中葉以後罔念厥祖若正德之荒淫蕩佚恬不為怪嘉靖萬厯天啓之昏庸逸樂阿柄下移以致權臣姦官相繼而擅威福亂政害良此數君惟知蒙業而安於國是懵然罔覺雖未及身而喪不數傳而馴致滅亡使有能奮然振興追念洪武之舊圖勵精求治未必不可救藥自覆厥宗殷鑒甚近尤足為炯戒耳或我子孫尚知遵朕此旨欲蒞陪京而其時無識之臣工妄以為人主當端處法宫綜理庶政不宜輕出關外此即我朝之亂臣賊子當律以悖命之罪誅之毋赦蓋盛京為根本重地發祥所自後世不可不躬親閲厯昔我皇祖曾三舉斯典朕今亦三次矣如升殿祀神閲射行賞之類仍循成例而於三陵之察紅椿移近居及葺盛京舊有之壇廟沿途之繕城垣以至檢核各庫諸事則皆前兩巡所未及而今悉舉而行之益可見臨幸之有益矣十餘年後朕躬若尚如今日之康強仍當再修上陵之禮然尚須有待嗣後每閲三年即派皇子二人恭謁祖陵每次於秋冬間啓行途間既不煩修治橋道之勞而傔從無多更可不預安營頓俾之厯覽舊京風土自皆惕然動念感天佑而仰祖功無負朕諄切垂訓之意欽承毋忽將此通諭中外並録一通交上書房存記其三年一次簡派皇子之事屆期著軍機大臣請旨又奉諭曰渾河發源遙逺自東北來入英額邊門西流幾及千里會遼入海縈護三陵滋演萬年靈脈長川襟帶直衛陪都厥功甚巨自宜虔崇廟祀以答神庥著交邁拉遜德成會同將軍府尹於盛京城東度地鳩工奏聞請帑興建河神廟以昭侑妥四十五年九月壬午上恭謁昭西陵孝陵孝東陵景陵聖水谷酹酒辛卯上恭謁泰陵行禮先是八月諭曰朕於本月二十八日自熱河啓鑾恭謁東陵回由南苑恭詣西陵展謁所有應行典禮各該衙門照例敬謹預備四十六年閏五月將軍索諾穆等奏修理福陵隆恩殿並昭陵明樓等工其大脊中應行恭貯各物除現有之金錢金銀銅鐵錫錁寶石外尚有五色縀塊五色線經篇藥材等件請另行補辦奉諭曰此項應行補辦物件著交內務府照單備辦四十七年九月諭曰前因工部奏銷摺內有更換昭陵隆恩殿龍毯及昭西陵隆恩殿寶座褥二項諭令慶桂剛塔查明將更換緣由據實覆奏兹據剛塔奏稱此項座褥間有破損經貝子允祁奏明照例行工部成做等語盛京陵寢及東陵西陵供奉陳設各件有應更換者由承辦事務衙門咨行工部成做其應用物件工部又轉向內務府咨取輾轉咨行辦理未免多費周折且題銷時轉難查核嗣後盛京陵寢及東陵西陵事件除應行咨請工部辦理者仍照例咨請外其更換陳設如龍毯座褥等項由工部轉行內務府者各該總管徑咨內務府辦給確核題銷不必更咨工部轉行四十八年八月上東巡盛京恭謁祖陵先是三月諭曰朕於五月二十四日啓鑾至熱河避暑山莊七月十一日即由熱河至盛京恭謁祖陵所有應行典禮各該衙門照例敬謹預備六月又奉諭曰朕於本年前往盛京恭謁祖陵業經降旨定於七月十一日啓鑾但念今年節氣較晚若於七月雨水正盛炎暑之時啓鑾不惟預備駐蹕尖營橋梁道路人等拮據即當溽暑逺行馬匹牲畜亦屬難堪今已降旨改於八月十六日啓鑾既已展期月餘則沿途預備一切事宜甚覺裕如著傳諭卓索圖盟長喀喇沁郡王拉特那錫第等將朕經過喀喇沁土默特一帶駐蹕尖營橋梁道路等項均著從容預備其應赴熱河之蒙古王公等毋庸於七月初間前來仍照每年進哨之例令於七月下旬前來熱河看戲俟朕萬夀節後其應扈從者著令扈從其應回逰牧者即令各回遊牧所有更換啓鑾日期並交盛京將軍永瑋等將山海關外盛京所屬一切豫備事宜及駐蹕尖營橋梁道路均著從容妥協豫備辦理七月又奉諭曰盛京為王迹肇基之地朕御極以來敬惟祖宗開創艱難佑啓萬年統緒于癸亥甲戌戊戌暨今癸卯四詣盛京恭謁祖陵以申積悃所歷川原形勝因見徴聞並為詩以識而於太祖太宗締造鴻規耿光大烈咸恭紀成篇實足以垂法守非僅託為吟詠所有四詣盛京御製詩著皇子等分年按次每人各録一分裝成四卷彚貯一匣以昭覲揚垂裕之至意至是自熱河啓鑾九月朔己丑閲吉林射癸巳閲盛京射戊戌上恭謁永陵己亥上致祭永陵行禮畢閲興京城垣癸卯上恭謁福陵甲辰上致祭福陵行禮畢上恭謁昭陵乙巳上致祭昭陵行禮丙午上臨克勤郡王墓酹酒丁未上臨公費英東墓額亦都墓各酹酒戊申御崇政殿升座扈從皇子王公大臣官員並蒙古王公貝勒額駙台吉以及盛京文武大臣官員朝鮮國使臣等行慶賀禮畢御大政殿賜宴賞賚有差己酉祀神行禮賜食祭肉庚戌上回鑾十月癸酉上謁景陵詣孝賢皇后陵寢酹酒皇帝親謁列聖列后陵寢儀先期命下遍布諸司供備諏吉起鑾前一日遣官只告奉先殿如常儀謁陵前期有司潔除陵內外屆日皇帝御素服乘輿出行宫羣臣素服隨從駕至陵於隆恩門外降輿王以下各官至下馬碑稍逺咸降騎禮部尚書侍郎二人導駕由隆恩門左門入陵寢門左門奉爵大臣暨欽命隨入之大臣扈從王公百官止立門外皇帝至寶城祭臺前西向立司拜褥官豫布拜褥於臺北正中禮部尚書侍郎恭導皇帝就位北向行三跪九拜禮不贊鴻臚寺官引王公百官於陵寢門外按左右翼列班重行北面隨行禮畢有司設奠几酒罍於拜位正中皇帝詣几前北向跪羣臣皆跪奉爵大臣跪進爵皇帝三奠酒每奠率羣臣行一拜禮興西向舉哀羣臣東西面序立咸舉哀畢禮部尚書侍郎導駕出隆恩門左門升輿還行宫扈從如來儀羣臣皆退凡詣陵展謁儀並同皇太后皇后謁陵儀是日皇太后至降輿處降輿皇后妃嬪公主以下隨降輿守陵女官二人恭導皇太后皇后至寶城明樓前北向行六肅三跪三拜禮妃嬪公主等位皇后之後隨行禮興執事女官進奠几於正中皇太后正中跪奠酒三爵每奠行一拜禮西向舉哀皇后妃嬪公主以下隨行禮舉哀畢女官恭導以出乘輿還行宫隆恩殿大祭儀嵗清明中元冬至除夕列聖列后忌辰及國有大慶皆大饗於隆恩殿恭遇皇帝親謁行禮前期陵寢奉祀官潔備牲帛器數翰林院具祝文隨事撰擬授太常寺官奉安潔室屆日工部官張幄次於隆恩門外之東執事官素服入隆恩門西門詣隆恩殿燃炬明鐙具器陳於案帝后皆同案每案牛一羊二尊四爐鐙具每位奉