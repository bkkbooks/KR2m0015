神龕尚茶於中門外獻茶內監接奉茶奠於案屆祭時引贊官二人引承祭官就拜位司香內監奉香盤進引贊引承祭官至殿右門引贊官止承祭官入右門引贊趨至中門外左右贊上香畢承祭官出殿右門引贊仍引至拜位行三跪九叩禮初獻內監奠帛獻爵如儀司祝進至中門之左跪內監詣祝案前三叩奉祝版跪授司祝司祝三叩接奉讀畢仍授內監跪安於篚內三叩司祝隨行禮亞獻三獻如初獻儀祝帛送燎內監二人詣案前司祝司帛於門外各行一跪三叩禮內監奉祝授司祝奉帛授司帛咸接以興恭送燎所禮成奉請神位還御寢室乃徹餘均如各陵祭儀清明節敷土於寶城儀先一日陵寢工部官進懸楮錢寶樹一座奉安於隆恩殿內東旁嵗暮舁出焚燎取潔土貯筐以俟屆日遣官素服將事贊禮郎二人一人導引一人荷土簣隨行至方城前衆皆止遣官荷土循明樓西磴道升方城至石欄西以土合於一筐恭升寶頂跪敷土於正中降以筐授贊禮郎引出易朝服詣隆恩殿致祭如儀若恭遇皇帝親詣行禮是日祭前二刻皇帝素服禮部尚書太常寺卿導駕入陵寢左門後扈內大臣隨侍王公大臣二人恭荷土筐從行皇帝進至方城前工部尚書侍郎恭進護履皇帝納履恭荷土簣扈從王公大臣前後翼衛導駕官恭導皇帝由明樓東磴道升至方城石攔東王公大臣以土合於一筐跪進皇帝受筐衆皆止皇帝奉筐升寶頂跪敷土正中畢降授筐脫履導駕官恭導皇帝出隆恩門入大次俟奉安神位畢行時饗禮朔望謁奠陵寢儀月朔望日執事人夙興詣陵拂拭神龕展幄幔每案陳熟羊一果十有二盤每位爵三守陵王公大臣及內府掌關防官將事奉祀禮部贊禮郎前引上香奠獻行三跪九叩禮十月朔唱贊餘不贊畢徹退萬夀聖節致祭列聖陵儀恭遇萬夀聖節守陵各王公大臣分詣行禮每案陳果十有二盤每位爵三帛一讀祝奠獻唱贊行禮同時饗儀列聖誕日詣陵上香儀每逢列聖誕日奉祀官詣陵掃除拂拭陳列酒果上香行三跪九叩禮因事告祭陵寢儀凡因事祗告陵寢遣官各一人將事帝后同案每案陳果實十二盤羊一每位爵三奠獻讀祝行禮與時饗同皇子謁陵儀凡皇子奉命祗謁陵寢至下馬碑降輿馬奉祭祀禮部官導引至隆恩門外升左階行三跪九叩禮不贊畢立門東西面舉哀不奠酒哀止引退如來儀若展謁於陵寢門外禮部官引至隆恩右門止內務府奉祝官導引皇子入至陵寢右門外行禮西立東向舉哀祭陵日皇子朝服由隆恩門右門進至階上虛中位於左行禮陳設贊引奠獻如遣官時饗儀親王以下恭謁陵寢儀凡親王郡王貝勒貝子宗室公謁陵奉祀禮部官引詣隆恩門階上按左右翼行三跪九叩禮不贊王公有生母在妃園寢內者行禮畢內府官引由左右門生母墓在左由左在右由右進琉璃花門至墓前月臺上設奠几內府官進爵祭酒舉哀行禮如儀公主皇子福晉謁陵儀是日啓陵寢門公主福晉至下輿處下輿本陵女官二人導引由神道西進隆恩門右門至陵寢門外虛中位於右旁行六肅三跪三叩禮退立門西東向舉哀畢女官仍由原路引出至妃園寢於琉璃花門外行禮畢女官引進至墓前月臺上設奠几女官進爵祭酒舉哀行禮如儀羣臣恭謁陵寢儀凡文武三品以上官奉命出使道過陵寢由奉祀禮部官引至大門外北面行三跪九叩禮不贊遇時祭則入陪祀官之列按翼隨行禮歸時展謁亦如之園寢祭奠儀凡妃園寢及皇太子園寢四時遣官祭奠行二跪六叩禮不贊出入殿左門於階上正中行禮餘讀祝奠獻諸儀節與陵寢時饗同皇朝文獻通考卷一百五十四
