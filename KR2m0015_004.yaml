body:
  text: 田賦考四田賦之制雍正十三年皇上即位之初諭曰各直省開闢荒地以廣種作以資食用俾無曠土遊民原係良法美意然必該督撫董率所屬官吏實力奉行毫無粉飾俾地方實有墾闢之田民間實受耕耰之利以此造報升科方於國計民生有所裨益乃朕見各省督撫題報開墾者紛紛不一至於河南一省所報畝段尤多而閩省繼之經朕訪察其中多有未實或由督撫欲以廣墾見長或由地方有司欲以升科之多迎合上司之意而其實並未開墾不過將升科錢糧飛灑於見在地畝之中名為開荒實則加賦非徒無益於地方並貽害於百姓也嗣後各該督撫宜仰體皇考愛民至意誠心辦理凡造報開墾畝段務必詳加查核實係墾荒然後具奏不得絲毫假飾以滋閭閻之擾纍若不痛洗積弊仍蹈前轍經朕訪聞必從重處分不稍姑貸乾隆元年豁免江南宿遷睢寧桃源三縣新淤地糧諭曰朕聞江南淮安府屬之桃源徐州府屬之宿遷睢寧濵臨黃河沿河地畝潦涸靡常雍正五年因朱家口潰決之水復循故道其舊潦田地始得涸出而河臣為地棍所欺遂以此地為新淤之腴産睢寧縣報升地五千三十九頃宿遷縣報升地四千七十二頃桃源縣報升地三千八百四十二頃嗣蒙皇考世宗憲皇帝特頒諭旨以淤地勘報不實令河臣會同督臣委員查勘共豁地七千二百餘頃所有存留地五千七百餘頃俱照各縣成例折算實地三千五百餘頃科則亦經減輕乃比年以來應納錢糧仍催徴不前蓋此淤出之地畝即舊有之良田是以民力維艱輸將不繼也朕以愛養百姓為心既洞悉其中情事自當加恩開除以紓民力著將宿遷睢寧桃源三縣現存新淤科徴銀六千五百四兩全行豁免其雍正十三年淤地未完錢糧亦免徴收至水沈地畝仍照例歸於每年冬勘該部即遵諭行豁免江南泗州新淤地糧諭曰朕查江南泗州地方前經河臣齊蘇勒升報新淤地畝九千八百餘頃嗣蒙皇考察知辦理之員勘報不實諭令督臣再加確勘隨開恩豁免八千六百餘頃止存淤地一千二百七十四頃入額升科今朕聞泗州地方濵河臨湖地勢極低凡虹縣桃源之水皆歸入泗州安河洪澤湖而此等淤地即在安河兩岸每年水勢漲發淹涸靡常收成無定小民不免賠糧之苦著照淮安府阜寧等縣之例將泗州安河兩岸水淹之淤地一千二百七十四頃九十七畝額徴錢糧一千二百二十二兩三錢麥一百一十石八斗自雍正十三年為始盡豫豁免以示朕減賦恤民之意豁免河南鄭州臨河之鹻鹵飛沙地額徴錢糧河南鄭州臨河之姚店等保自雍正元年楊橋河口衝決以後地畝變成鹻鹵民人有賠糧之纍上令撫臣察勘得鹻重不可耕種地三百九十頃八十七畝八分四釐沙深不可耕種地六十六頃八十三畝九分七釐共額徴三千八百八十兩五錢三分四釐零令户部即與豁除仍飭地方官毋得私自徴派又將祥符等四十二州縣查出鹽鹻飛沙河坍水淹地二千三十餘頃應徴糧銀漕米永行豁免又諭直隸督臣確勘懷來縣墾荒地糧分别減除宣化府之懷來縣向有保字號墾荒地七十一頃徴糧八百六十餘石始於前明募兵戍守以近山地畝令其耕種每軍士一名種地五十畝者準作半年糧六石種地一頃者準作一年糧一十二石歷年既久有地荒而糧存者有地少而糧多者官民不免賠纍又該縣徴糧科則上地每畝五升六合中地三升六合獨此頃每畝徴一斗二升民力尤難輸納至是令該督委員確勘將山坡地不可耕者奏聞豁免其可耕之地則按本縣科則納糧毋令偏重減山東益都縣更名地租額諭曰山東之益都縣有前明廢藩更名地當時為藩封之産不納課糧召人承種輸租止更姓名無庸過割謂之更名地較之民糧多二倍至四倍不等在當日居民投靠藩勢借佃護身積漸增加沿為陋例今則同為民田而納糧尚仍舊額名為欽租地糧多賦重小民輸納維艱朕心軫念著將欽租名色裁革照該縣上等民地按畝承糧大畝納銀二錢一分小畝納銀六分四釐歸入民糧項下一體徴收俾循惟正之供永除偏重之纍又諭曰朕聞濵海之鄉坍漲不常田無定址於是豪強得恣侵占而爭端日興其責在地方有司熟悉土宜按制定法弭釁於未然而平其爭於初發則可為良吏矣夫州縣有司非盡不知愛民者特以田土情形未能稔悉不得不寄耳目於吏胥而猾吏姦胥又往往與土豪交通變亂成法豫奪任意弱肉強食為厲無窮獄訟繁興端由於此至若沿海所漲之沙灘鄉邑互爭有司又各袒所屬益滋紛擾此皆徇私而未識大體者朕以天下為一家而州縣官各膺子民之責亦當體朕之心以為心又焉忍伸此屈彼長其姦而導之攘奪哉前此海濵要地增設大員彈壓果其秉公察看經理得宜應即令界址劃然各歸其産不得遷延嵗月仍假姦民之便而使窮黎失業也夫豪強不懲則無以安良善經界不正則無以杜爭端該督撫應飭所屬親民之員毋以姑息怠緩從事庶令民業各正而爭訟自少息矣豁免山東各屬水沖地畝應徴地糧沂州府之郯城蘭山沂莒濟南府之歷城章邱淄川長清長山兖州府之滋陽寧陽泗水鄒汶上青州府之益都樂安夀光臨朐安邱博山臨淄萊州府之昌邑濰武定府之惠民泰安府之泰安東平肥城新泰凡二十八州縣自雍正八年大水後水退沙存沖壓地一千三百六十二頃有竒應徴地丁銀五千兩有竒米麥一百五十六石有竒令永行豁除又免山東章邱縣缺額銀糧章邱縣有缺額糧銀三千九百一十餘兩因從前地方官揑報墾荒以致糧無抵補令將已攤入地畝者查明開除其未攤入者悉行豁免又減江南崑山新陽二縣沿江濵湖地浮糧崑山新陽二縣沿江濵湖之地蘆葦榛蕪不堪樹藝原編科則時有誤列上則者特諭查核釐正減浮糧以紓民力又免福建建陽縣虛糧福建建寧府屬之建陽縣有虛糧六百三十一兩六錢久為民纍令查明豁免其虛糧項下應勻入地丁口銀及應派本色米續於乾隆十四年令永行免徴二年諭昔者虞廷咨牧食哉惟時而百揆奮庸之後即命棄以播時百穀禮樂兵刑皆在所後良以食為民天一夫不耕或受之飢一女不織或受之寒而耕九餘三雖遇荒年民無菜色今天下土地不為不廣民人不為不衆以今之民耕今之地使皆盡力焉則儲蓄有備水旱無虞乃民之逐末者多而地之棄置者亦或有之縱云從事耕耘而黍髙稻下之宜水耨火耕之異南人尚多不諳北人率置不講此非牧民者之責抑誰之責歟朕欲驅天下之民使皆盡力南畝而其責則在督撫牧令必身先化導毋欲速以不達毋繁擾而滋事將使逐末者漸少奢靡者知戒蓄積者知勸督撫以此定牧令之短長朕即以此課督撫之優劣至北五省之民于耕耘之術更為疏略是以一穀不登即資賑濟斯豈久安長治之道其應如何勸戒百姓或延訪南人之習農者以教導之牧令有能勸民墾種一嵗得榖若何三嵗所儲若何視其多寡為激勸毋輕率劾去使久于其任則與民相親而勸課有成將見俗返淳朴家有蓋藏然後禮樂刑政之教可漸以講習著該部即會同九卿詳悉定議以聞户部議準倣周禮遂師之制於鄉民之中擇熟諳農務素行勤儉為閭閻信服者每一州縣量設數人董率勸民地方官考績之法必寬以嵗月庶久道化成而無欲速不達之弊如勸戒有方境內地闢民勸穀豐物阜該督撫於三年之後據實題報官則交部議敘老農量加奬賞倘有教導無方強勒滋擾以及希圖奬賞揑辭妄報者指名題參又諭農為致治之本我皇祖聖祖仁皇帝嘗繪耕織圖以示勸農德意皇考世宗憲皇帝屢下勸農之詔親耕藉田率先天下所以敦本計而即田功意至厚也朕思為耒耜教樹藝皆始於上古聖人其播種之方耕耨之節與夫備旱驅蝗之術散見經籍至詳且備後世農家者流其説亦各有可取所當薈萃成書頒布中外庶三農九穀各得其宜望杏瞻蒲無失其候著南書房翰林同武英殿翰林編纂至六年書成凡七十五卷名曰授時通考又諭州縣所管地方大率不過百餘里最廣者二三百里周遍巡歷為時亦不甚多至于農田為養民要務春耕秋斂之時各宜下鄉察其勤惰稽其豐歉倘有應先事圖維臨時酌辦者悉心計議申詳上司定議舉行減浙江桐廬縣官抄秋租浮額浙江之桐廬縣有官抄秋租二項額徴條銀較之民産科則多至三五倍不等令於戊午年為始減去浮多之數照民産一例徴收豁免江南鹽城阜寧二縣濵河升科地糧諭曰朕聞江南鹽城阜寧二縣有濵河田地三千五十一頃應納糧銀四千四百餘兩此地與水相鄰淹涸靡定從前有司經理不善誤報水涸升科究竟荒多熟少小民納賦甚覺艱難以致纍年積欠未清甚可軫念著該督撫即行確查將應徴錢糧悉行豁免其從前未完之舊欠一并赦除豁免雲南昆明縣老丁田地歸公米石昆明縣有老丁田地一項原係督撫兩標牧放營馬之區坐落省會昆海之濵額收租米一千五百六十八石除完納稅糧條編並給發老丁口糧共需米九百二十三石尚餘歸公米六百四十四石此項租額乃照豐收之年科定者若遇水大歉收之時則小民完納甚艱除老丁米石及糧條照舊完納外其歸公米永行豁免減湖南湘鄉瀏陽二縣糧額湖南長沙府之湘鄉瀏陽二縣錢糧較之長沙醴陵湘潭寧鄉等縣每畝重二三分不等特諭照長沙科則徴收又湘隂縣糧銀比湘鄉瀏陽尤重亦令確核減免是年定承墾荒地之令凡荒地開墾應先行呈報如土著呈報在先即準土著承墾流寓呈報在先亦如之三年諭山西屢年首報欺隱地畝八千頃有零皆經題報升科但聞從前首報時有畝數浮多情願報出升科者亦有地方官奉行不善按照原額荒闕勒令灑派者著該撫曉諭從前首報欺隱人等如果畝數浮多應行升科再令據實首報照數輸將倘地畝並無欺隱浮多而地方官勒令灑派者亦著據實呈明該撫委員確核題請豁免又諭州縣收錢糧有私增火耗者嚴加治罪時上聞江南州縣徴收錢糧有加火耗之弊傳諭督撫嚴查所屬果有劣員暗地加耗立即題參治罪復諭曰從前火耗未經題解州縣恣意橫徴飽其溪壑苦纍百姓是以皇考允各省提解火耗之請而優給各官養亷令不得額外巧取所以懲貪風而紓民力用意誠善即養亷稍薄之州縣當時亦必就其所辦事務酌豫足用該員量入為出自無不敷何得暗地重耗刻剝小民以為自潤之計情罪至為可惡該督撫不時體訪如有不肖州縣于應收火耗外絲毫加重者立即題參嚴加治罪如不行覺察經朕訪聞確實必將該督撫嚴加議處斷不姑容豁免直隸正定府河淤缺額租銀諭曰朕聞從前直隸正定府城河水深之時原有魚藕之利河岸淺灘兼可種稻每年額編租銀六百兩後因滹沱河水漲流沙淤漫漸至缺額俱係府屬之十州縣公捐起解雍正五年間雖經營治稻田合計新舊田畝之數僅得六頃九十餘畝而藕地亦不過二頃一十餘畝每嵗所收租銀只有一百八十餘兩較之原額尚不敷數其雍正十二年以前舊欠已經豁免今特加恩自雍正十三年後不敷銀兩槩行豁除以紓官民派墊之纍又諭向來四川火耗較他省為重我皇考暨朕陸續降旨裁減已去其半今聞該省耗銀雖減而不肖有司巧為營私之計將戥頭暗中加重有每兩加至一錢有餘者彼收糧之書吏傾銷之銀匠又從而侵漁之則小民受剝削之纍不小矣川省如此他省可知著該省督撫轉飭布政司遵照徴收錢糧之天平法馬制成畫一之戥飭令各州縣確實遵行仍不時密行稽查倘有絲毫多取者即行嚴參治罪清丈江南靖江縣坍漲田地江南常州府屬靖江縣田賦漲則均減坍則均增五年清丈之例從未舉行以致一户報升而通邑減一户報坍而通邑增糧無定額至是令遴員履畝確察升免實數造册題報定甘肅中衛縣新墾地科則甘肅中衛縣屬白馬寺灘新墾升科地畝勘明定則上地每畝徴糧一斗二升中地六升全鹻地每畝徴銀一分三釐半鹻地六釐五毫永著為令四年減浙江湖州府屬墟田糧額湖州府之烏程歸安德清三縣有墟田賦額獨重至是諭令酌減自乾隆四年為始嵗減賦銀四萬二千二百兩有竒豁免陜西醴泉縣丈出餘地糧額陜西醴泉縣舊額實徴糧二萬四十二石有竒順治十三年清丈時因弓口窄小積有餘地加算糧二百五十六石二斗一升有竒其實有糧無地至是除之除江南髙淳縣草場田租髙淳縣有草場田五千六百餘頃前明分給馬戶以供芻牧後改照民田起科舊徴租銀五百餘兩一半攤入民户代輸一半仍責馬户承納此項田地久非馬户承辦小民既輸田賦又納場租至是特令除之五年諭曰從來野無曠土則民食益裕即使地屬竒零亦物産所資民間多闢尺寸之地即多收升斗之儲乃往往任其間曠不肯致力者或因報墾則必升科或因承糧易致爭訟以致愚民退縮不前前有臣工條奏及此者部臣以國家惟正之供無不賦之土不得概免升科未議準行朕思則壤成賦固有常經但各省生齒日繁地不加廣窮民資生無策亦當籌畫變通之計向聞山多田少之區其山頭地角間土尚多或宜禾稼或宜雜植即使科糧納賦亦屬甚微而民夷隨所得之多寡皆足以資口食即內地各省似此未耕之土不成邱段者亦頗有之皆聽其間棄殊為可惜嗣後凡邊省內地零星地土可以開墾者悉聽本地民夷墾種並嚴禁豪強首告爭奪俾民有鼓舞之心而野無荒蕪之壤其在何等以上仍令照例升科何等以下永免升科之處各省督撫悉心定議具奏續經各省遵旨議奏下户部覆準直隸零星地土數在二畝以下不成邱段者悉聽民間墾種免其升科山東所屬山頭地角以及河濵溪畔地畝在中則以上不足一畝及下則以下一畝以外者均免升科山西所屬膏腴上地中地無論開墾畝數均照水田旱地之例升科其瘠薄下地開墾至十畝以上者亦照例分别水旱按則升科如僅止十畝以下為數竒零不成邱段者永免升科河南所屬凡繫村頭隰畔髙阜平原人力便宜即稍遇潦旱亦有收穫是為上等其數在一畝以上已成邱段者各依水旱田之例照本地中則輸賦其山坡上嶺土薄力微人力既倍收穫無多是為中等有成邱段在五畝以上者各依水旱之例照本地下則輸賦其上地不足一畝中地不足五畝者均免升科至南岡砂磧之地雨多之年尚有薄收稍旱即至失望下隰低窪之地乾旱之年略有收成稍潦即至荒歉此等地畝實屬下等毋論邱段畝數均免升科江南江蘇所屬山頭地角磽瘠荒土未經開闢者聽民耕植其溝畔地塍竒零隙地不成邱段者亦聽附近居民隨宜墾種並給執照免其升科安徽所屬凡民間開墾山頭地角竒零不成邱段之水田不及一畝旱田不成二畝者概免其升科江西所屬山頭地角開墾地畝數在二畝以下及山巔水涯髙低不齊砂石間雜坍漲不一者均免其升科福建所屬竒零田地不及一畝者免其升科如雖及一畝或地角山頭不相毗連者亦免升科其有經界聨絡一畝以上者仍照例分别水旱年限升科浙江所屬臨溪傍崕零星不成邱段者磽瘠荒地聽民開墾免其升科湖廣湖北所屬山頭地角磽瘠之地止堪種樹髙阜之區止種雜糧及旱地不足二畝水田不足一畝者均免升科湖南所屬竒零土地可以開墾及溪澗之旁髙灘阪隰零星種植禾稻不及一畝種植雜糧不及二畝者均免升科其餘峯嶺湖澤之隙尚有不成邱段之處亦聽民栽樹種蔬並免升科陜西甘肅所屬地處邊陲山多田少凡山頭地角欹斜逼窄砂磧居多聽民試種永免升科至平原空地如開墾未及起科之年地或鹻鹵許其據實呈報地方官察勘取結停種免科四川所屬地處邊徼山多田少田賦向分上中下三等如上田中田不足五分下田與上地中地不足一畝以及山頭地角間石雜砂之瘠地不論頃畝悉聽開墾均免升科廣東所屬如山梁岡陀地勢偏斜砂礫夾雜雨過水消聽民試墾者槩免升科廣西所屬如地屬平原田成片段係上則中則水田在一畝以上旱田在三畝以上者仍按則升科在一畝三畝以下者永免升科其下則田地及桑麻花米等項田地開墾水田在三畝以上旱田在十畝以上者照例升科其在三畝十畝以下者亦永免升科雲南所屬山頭地角尚無砂石夾雜可以墾種稍成片段在三畝以上者照旱田例十年之後以下則升科砂石磽角不成片段水耕火耨更易無定瘠薄地土雖成片段不能引水灌溉者均永免升科其水濵河尾田土淹涸不常與成熟舊田相連人力可以種植在二畝以上者亦照水田例六年之後以下則起科如不成片段竒零地土以及雖成片段地處低窪淹涸不常不能定其收成者永免升科貴州所屬凡山頭地角竒零土地可以開墾者悉聽民夷墾種免其升科山石攙雜工多穫少依山傍嶺雖成片段而土淺力薄者亦聽民夷墾種永免升科如有水源可引力能墾種者一畝以上照水田例以六年升科不及一畝者亦免升科至無水可引地稍平衍可墾為旱田二畝以上亦照旱田例以十年升科不及二畝者亦免升科清查江南錢糧雜辦項內缺額實數諭曰朕聞江省嵗額錢糧地丁漕項蘆課雜稅之外又有名為雜辦者不在地丁項下編徴仍入于地丁彚作分數奏銷其款目甚多沿自前明迄今賦役全書止編應解之款未開出辦原委即有開載出辦之處亦未編定如何徴收則例於是有缺額纍官者有徴收纍民者有纍在官而因以及民者有纍在民而因以及官者種種不一朕心軫念特頒諭旨除有款可徴積久相安無纍官民之項仍照舊徴解但須查明則例立定章程明白曉示以杜浮收隱混等弊其實在額缺有纍官民者著督撫詳確查明請旨豁免以示加惠地方之意免福建閩縣丈出溢額地糧福建閩縣鼓山里舊有學田一千八百四十八畝因田久荒蕪租無所出於康熙三年招民墾復改為民業五十三年以丈出通縣田地溢額銀詳抵學租至雍正五年該縣誤將已抵學租之項復報溢額詳請升科又將康熙三年墾復之民田加徴學租以滋擾纍至是令督撫查明將從前詳抵學租之項即行豁免又諭河南民人願將旱田改為水田者錢糧仍照原定科則免其加賦但各州縣地形不同土性逈别其不便改種者地方官不得抑勒河南巡撫雅爾圖言豫省旱田可改水田者尚多祇以旱田賦輕水田賦重一經改種必須題請加賦小民既費工本又增糧額未免因循觀望遂有是諭是年又準湖北旱田願改水田者田賦亦照豫省之例行定直隸承墾官民地之例凡官地承墾者以具呈之先後為定民地先令業主墾種如業主無力始許他人承墾墾成之後業主不得追奪六年諭國家愛養黎元莫先于輕徭薄賦朕御極以來加惠閭閻凡所以厚其生計而除其弊者無不留心體察次第舉行近聞各州縣徴糧一事尚有巧取纍民之處每至開徴之際設立滚單將花户名及應完條銀數目開列單內散給鄉民原使鄉民易知得以照數完納前人立法本善而無如姦胥蠧役日久弊生視各户銀數之多寡于額糧之外或多開數錢至數分不等鄉民多不識字且自知糧額甚少既見為官府所開遂照數完納即有自核算者又以浮開為數無幾不肯赴官控告結怨吏胥且恐匍匐公庭廢時失業往往隱忍不言其多收之銀或係書役先將别户錢糧侵收那用而以此彌補其數或通縣錢糧正額業經報完而于捲尾之時兜收入已更有不肖有司暗中俵分以餉私槖其申送上司册籍則仍似按額造報並無浮多至于一州縣滚單之多動以萬計而上司難以稽察無從發覺其為民間之害固不減于重耗也朕聞此弊各省有之而江浙為甚用是頒此旨通行曉諭是在各省督撫仰體朕心時加訪察如有仍蹈此弊者即行嚴參不稍寬貸則官吏不得假公行私而小民共受其惠矣定陜西招民開墾例户部議定陜西無主荒地官為插標招墾給發為業俟升科之年核明等則酌定糧額題報若本地人力無餘準令鄰近無業之民承墾給照之後即編入土著保甲之內令該管保長等稽察其平衍易收之地每一壯丁授地五十畝山岡沙石難收之地每一壯丁授地百畝如父子兄弟均係壯丁酌量加增又議陜省荒地全無出産者始招民開墾其見在割漆砍竹採取木耳等項聽民自便地方官不得目為荒地強令墾種亦不得以見獲微利勒報升科凡文武官及紳士將新墾地及熟地隱匿一畝以上至一頃以上者分别議處軍民隱地一畝以上至一頃以上者分别責懲所隱地入官所隱錢糧按年行追至七年又議陜甘各屬開墾之始小民畏懼差徭藉紳襟報墾自居佃户逮相傳數世忘其所自業主子孫輒欲奪田换佃而原佃之家忿爭越控靡有底止嗣後如佃户係原墾之子孫業主不得擅更業主子孫欲自種者準將肥瘠地畝各分一半立劵報官若業主他徙承種之户久已應差納課即業主子孫回籍亦不全令給還計其拋荒年分酌量分給如過三十年以外者概不分給或業主回籍在一二年之內將當年所獲籽種全給承種之户承辦糧差次年仍歸業主七年蠲除福建崇安縣揑報墾復田加徴錢糧崇安縣有荒缺田額一千二百五十一頃零係坍缺年久並無可墾之土雍正七年清查地畝分别限墾歷任知縣揑報墾復共加徴銀二千二百兩米二百六十石各有竒俱灑派里户代完至是特諭除之又諭曰周禮太宰以九職任萬民一曰三農生九穀二曰園圃育草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸其為天下萬世籌贍足之計者不獨以農事為先務而兼修園圃虞衡藪牧之政故因地之利任圃以樹事任牧以畜事任衡以山事任虞以澤事使山林川澤邱陵之民得享山林川澤邱陵之利夫制田里教樹畜岐周之善政管敬仲亦云積于不涸之倉者務五穀也藏于不竭之府者養桑麻育六畜也如果園圃虞衡藪牧之職以次修舉於民生日用不無裨益國家承平日久生齒日繁凡資生養贍之源不可不為急講夫小民趨利如騖亦豈甘為惰窳舉山林川澤天地自然之利委為棄壤哉良以疏闢之初豪強既羣起而爭管業之後姦民又多方戕賊地方有司每視為資産細故不為申理此所以寧荒其業耳督撫大吏身任地方所當因地制宜及時經理其已經開墾成産者加意保護或荒墟榛壤以及積水所滙有可通闢者多方相度籌畫俾地無遺利民無遺力以成經久優裕之良法至于竭澤焚林並山澤樹畜一切侵盜等事應行禁飭申理轉飭地方官實力奉行該督撫不時稽察務令從容辦理毋絲毫滋擾毋日久因循以仰副朕惠養斯民之至意又諭錢糧之有耗羡蓋經國理民事勢之必不能已者未歸公以前耗羡無定制有司之賢者兢兢守法不敢踰間不肖者視為應得之項盡入私囊一遇公事或強民輸納或按畝派捐濫取橫徴無所底止且州縣以上官員養亷無出于是收受屬員之規禮節禮以資日用而上官下屬之間時有交際州縣有所藉口恣其貪婪上官瞻徇而不敢過問甚至以餽遺之多寡為黜陟之等差吏治民生均受其弊我皇考俯允臣工之請定耗羡歸公之法就該省舊收火耗之數歸于藩司酌給大小官員養亷有餘則為地方公事之用小民止各循其舊有之常有輕減無加溢也而辦公有資捐派不行有司之賢者固無所用其矯亷而不肖者亦不得肆其貪取此愛養黎元整飭官方之至意並非為國用計為此舉也且以本地之出産供本地之用度國家並無所利于其間然通天下計之耗羡敷用之處不過二三省其餘不足之處仍撥正供以補之此則臣民未必盡知者此十數年中辦理耗羡之梗槩也朕御極以來頗有言其不便者朕思古人云琴瑟不調甚者則解而更張之此事若宜變通何可固執是以留心體察並于今年廷試時以此策問諸生乃諸生奏對不過敷衍成文無當實事旋降旨詢問九卿翰林科道並各省督撫等今據諸臣回奏大抵皆以為章程一定官民久已相安不宜復議更易衆論僉同朕再四思維耗羡在下則州縣所入既豐可以任意揮霍上司養亷無出可以收納餽遺至於假公以濟私上行而下效又不待言矣則向日朕所聞者未必不出于願耗羡之在下以濟其私者之口傳曰作法于涼其弊猶貪作法于貪弊將若之何朕日以亷潔訓勉臣工今若輕更見行之例不且導之使貪重負我皇考惠民課吏之盛心乎此事當從衆議仍由舊章特頒諭旨俾中外臣民知之定陜西新墾地折徴科則陜西新墾之地淹浸不常嵗收十之一二定以五畝折徴一畝土方磽薄之地每耕種後必須休息以四畝折徴一畝極邊寒冷之地山多地少收成尤薄以三畝折徴一畝八年諭朕維養民之本莫要于務農州縣考成固應用是為殿最而向來公令不專以此課吏者因其事甚朴無可炫長其迹似迂驟難見效又或上司之察勘難周有司之條教易飾不似催科聽斷捕盜等事之顯而有據也督撫察吏每於此等本計轉視為老生常談漠焉不甚加意以致州縣之吏趨承風旨專以簿書期會為先而農事反居其後不知為治之道本舉而末自隨之如果南畝西疇人無餘力于耜舉趾日無暇時則心志自多淳朴風俗自鮮囂凌人知急公而閭閻無待追呼矣人知畏法而盜賊因以寢息矣本計既端末事亦次第就理如此則州縣之考成似疏而實密即督撫之察核可簡而不繁日計不足月計有餘民生大有裨益即治道亦漸致郅隆若夫朝令夕申意非不美束縛馳驟適以擾民為督撫者當善體朕意毋視為具文毋事於塗飾誠實心化導其屬俾屬吏亦實心勸課其民庶幾野無遊惰之風家有蓋藏之樂各省督撫其共勉之又諭前漕運總督顧琮奏請舉行限田之法每户以三十頃為限以為如此則貧富可均貧民有益朕深知此事名雖正而難行因諭云爾以三十頃為限則未至三十頃者原可置買即已至三十頃者分之兄弟子孫每人名下不過數頃未嘗不可置買何損于富民何益于貧民况一立限田之法若不查問仍屬有名無實必須户户查對人人審問其為滋擾不可勝言夫果滋擾于一時而可收功于日後亦豈可畏難中止今輾轉思維即使限田之法地方官勉強奉行究于貧民無補是不但無益而且有纍也而顧琮猶以為可行請率領地方官先于淮安一府試行之朕令其再與尹繼善熟商今據尹繼善陳奏難行之處與朕語不約而同則此事之斷不可行斷不能行實出人人之所同然又豈可以嘗試特降旨曉諭顧琮此事著停止并令各督撫知之九年諭臺灣大小武官創立莊産開墾草地永行禁止至十一年又以臺灣地綿亘二千餘里近山有水之處皆屬膏腴種植之獲倍于內地歷經禁止內地民人不許私買畨地但日久法弛姦民趨利如騖嗣後如有姦民私買告發之日將田歸畨仍照律計畝治罪荒地減一等其潛入生畨界內私墾者照律嚴治更定臺灣墾田科則臺灣自雍正七年之後升墾田園俱照同安則例後經部議以同安則例太輕改照本地舊額至是諭令地方官確勘田園肥瘠照同安則例分别上中下定額徴收令直隸課民種植果木時議以直隸天津河間各屬土性宜棗深冀亦産桃李至于榆栁之類河窪鹻地各有所宜應令民間隨宜廣種如有旗地可種樹木之處該管各官勸諭旗人亦多為栽種下部行之十一年諭廣東高雷亷等府屬勘出可墾荒地大抵山岡磽瘠者居多開墾非易小民未霑收穫之益先慮升科之纍是以未墾者聽其荒蕪即已經承墾者亦生畏縮之意朕思各省生齒日繁地不加廣貧民資生無策今高雷亷三府荒地既與平埔沃壤不同即聽該地民人墾種一槩免其升科永為世業十五年申弓尺盈縮之禁户部議準自順治十二年部鑄弓尺頒行天下康熙年間復行嚴禁如有盈縮定以處分逮後各省弓尺多有不齊乾隆五年行令直省各將該地方見行弓尺式樣報部惟直隸奉天江西湖南甘肅四川雲南貴州並兩淮河東二鹽場俱遵部頒弓尺並無參差不齊此外或以三尺二三寸或以四尺五寸或以六尺五寸或以七尺五寸為一弓或二百六十弓或三百六十弓或六百九十弓為一畝均未遵照部頒之式今若令各省均以部定五尺之弓二百四十弓為一畝倘部頒弓尺大于各省舊用之弓勢必田多缺額正賦有虧若小于舊用之弓又須履畝加徴于民生未便且經年久逺一時驟難更張已據各該撫開明不齊緣由報部存案毋庸再議嗣後有新漲新墾升科之田務遵部頒弓尺丈量不得仍用本處大小不齊之弓如有私自增減盈縮照例處分十六年豁免江南武進陽湖二縣開抵役田租銀諭曰朕聞常州府屬之武進陽湖二縣開抵役田租銀一項原係前明時虛田領價後因本户逃亡株連親族各將已産開抵實非前明原置之田亦非當日領價之户小民條糧役租力難並輸除應辦條漕仍照民田一例完納外其新舊租銀槩豫豁免以除民纍十八年諭廣東瓊州為海外瘠區貧民生計維艱查有可墾荒地二百五十餘頃照高雷亷之例召民開墾免其升科是年總計天下土田七百八萬一千一百四十二頃八十八畝賦銀二千九百六十一萬一千二百一兩糧八百四十萬六千四百二十二石各有竒草五百十有四萬五千五百七十八束直隸民田六十五萬七千一百九十一頃八十七畝賦銀二百四十一萬一千二百八十六兩糧十萬一千二百二十九石各有竒草九萬四千四百四束糧草均留充本省經費奉天民田二萬五千二百四十三頃二十一畝賦銀三萬八千百有十兩糧七萬六千二百六石各有竒糧充本省經費江南江蘇民田六十八萬九千八十四頃四十五畝賦銀雍正三年蠲除四十五萬兩乾隆二年蠲除二十萬兩實徴三百三十七萬一千三百三十四兩糧二百十有五萬五千二十一石各有竒嵗漕京師百七十一萬六千八百八十九石留充本省經費四十三萬八千百三十二石各有竒安徽民田三十三萬八千百二十頃九十三畝賦銀百六十八萬八千兩糧八十四萬五千二百四十八石各有竒嵗漕京師五十六萬六千二百七十六石留充本省經費二十七萬八千九百七十一石各有竒山西民田三十二萬九千五百八十六頃二十一畝賦銀二百九十七萬二百六十六兩糧十有六萬九千二百四十六石各有竒糧充本省經費山東民田九十七萬一千五十四頃七畝賦銀三百三十四萬六千二百五十七兩糧五十萬七千六百八十石各有竒嵗漕京師三十四萬八千七百七十八石留充本省經費十有五萬八千九百二石各有奇河南民田七十二萬二千八百二十頃三十六畝賦銀乾隆三年蠲除百六十兩實徴三百三十萬三千八十兩糧二十四萬八千八百六十五石各有竒嵗漕京師二十一萬九千八百七十四石留充本省經費二萬八千九百九十一石各有竒陜西西安民田二十五萬二千三百七十一頃三畝賦銀百五十三萬九百七兩糧十有六萬八千四百五十三石各有竒糧充本省經費甘肅民田十有七萬七千八百三十一頃三十三畝賦銀二十五萬七千七百二十三兩糧五十萬三千四百七十六石各有竒草五百五萬千一百七十四束糧充本省經費浙江民田四十五萬九千七百八十七頃七十畝賦銀雍正五年蠲除八萬七千二百兩乾隆三年四年蠲除四萬五百四十兩實徵二百八十一萬二千四十九兩糧一百十有三萬四百八十一石各有竒嵗漕京師八十五萬六千七百三十九石留充本省經費二十七萬三千七百四十二石各有竒江西民田四十七萬九千二百七頃六十二畝賦銀雍正三年蠲除七萬五千五百四十九兩乾隆三年蠲除三萬七千七百七十四兩實徴百八十七萬九千八百十兩糧八十九萬九千六百三十二石各有竒嵗漕京師七十七萬百三十二石留充本省經費十有二萬九千四百九十九石各有竒湖廣湖北民田五十六萬六千九百十有三頃四十九畝賦銀節年蠲除十有八萬二千四百五十四兩實徴百有十萬八千一百五十三兩糧二十八萬六千五百五十四石各有竒嵗漕京師十有三萬二千四百三石留充本省經費十有五萬四千一百五十石各有竒湖南民田三十一萬二千二百八十七頃九十八畝賦銀節年蠲除十有八萬五百五十三兩實徴一百十有六萬三千六十三兩糧二十七萬七千六百四十一石各有竒嵗漕京師十有三萬三千七百四十三石留充本省經費十有四萬三千八百九十七石有竒四川民田四十五萬九千四百十六頃六十七畝賦銀六十五萬九千七十五兩糧萬四千三百二十九石各有竒糧充本省經費福建民田十有二萬八千二百七十頃八十七畝賦銀一百十有七萬七千八百九十九兩糧十有六萬八千四百五十三石各有竒糧充本省經費廣東民田三十二萬八千八百三十二頃九十三畝賦銀百二十五萬七千二百八十六兩糧三十四萬八千九十五石各有竒糧充本省經費廣西民田八萬七千四百頃六十畝賦銀三十八萬二千五百九十七兩糧十有三萬三百七十五石各有竒糧充本省經費雲南民田六萬九千四百九十九頃八十畝賦銀十有五萬三千七百五十兩糧二十三萬八百四十八石各有竒糧充本省經費貴州民田二萬五千六百九十一頃七十六畝賦銀十萬一百五十六兩糧十有五萬四千五百九十石各有竒糧充本省經費臣等謹按以上據會典所載是年奏銷實數以雍正二年奏銷數較之增田二十四萬三千二百二十八頃六十一畝賦銀三百二十四萬八千六百六十兩糧三百六十七萬五千二十二石草五百四萬一百五十九束十九年定地方官勒包都圖及貢監生員包攬錢糧罪例福建道監察御史胡定言地方官徴收錢糧或有自顧考成恐錢糧拖欠勒令富户包都圖等弊應令該督撫即行參處部議應如所請并議定貢監生員包攬錢糧罪例從之二十年定蘆洲地畝坍卸撥補之例江西巡撫胡寶瑔言蘆洲地畝坍漲靡常定例將新淤地畝撥補惟是有課蘆洲先由水影沙灘積漸而成頗費工本自應將新淤之地撥補至水影沙灘等類原無工本例不升課乃豪強之徒往往以無課沙灘與有課報坍之户混爭撥補以致案牘塵積部議令嗣後新漲地畝儘有課坍户補足尚有餘地即將無課坍户按照先後酌量撥補再有餘剩始行召墾從之蠲減江南上元等州縣額糧江蘇巡撫莊有恭言上元等十四州縣衛田地一千三頃八十餘畝下産難供上賦請減原科則正銀五千三百六十六兩米豆六千二百五十四石下部議行二十一年豁免江南邳州被水地畝額徴地糧江南邳州被水沖沙壓廢田地八十九頃三十餘畝應徴地漕等項銀二百六十八兩有竒米麥六十石四斗有竒令永行豁免二十二年減除山東海豐縣黎敬等莊地畝糧額諭山東武定府屬之海豐縣地處海濵其地北鄉之黎敬等五莊尤為低窪易潦以致積欠三千五百餘兩加恩概豫豁免至該處地既瘠薄若仍用舊則恐輸納維艱未免重困民力著該撫勘明窪下地畝其糧稅並照下則徴收所有不敷糧額銀兩按數開除嗣據巡撫鶴年勘明黎敬等五莊照該縣大糧下則地例每畝一分一釐徴糧共豁除不敷糧額銀八百五十二兩有竒二十三年豁除江南靈壁縣五湖水沈地額徴錢糧靈壁縣五湖田地最低極窪波淹之區水深難涸應納糧地二千五百七十八頃五十餘畝額徴折色銀二千八百九十五兩有竒米三百一十石有竒令永行豁除令州縣錢糧隨徴隨解不得久貯庫內户科給事中黃登賢言州縣錢糧應隨徴隨解勿令久貯庫內致有那移之弊并令布政司於奏銷册內將各屬批解月日逐一詳細開載以便稽核下部議行刪除地丁錢糧奏銷項下折徴顔料等款目户部議準户科給事中黃登賢條奏各省採辦顔料原就土産所宜若已經停辦折徴價銀奏銷册內復臚列各項名色實屬繁冗應將各省奏銷册造折徴顔料款目概行刪除以歸簡易至河南省之宗祿唐府瑞府匠班陜西省之秦府王駙馬勳田直隸省之膳人膳軍常兊操賞等名色皆係明季流傳凡有似此開載者應行令各督撫一體刪除統歸地丁條造報二十四年準陜西郃陽縣黃河新漲灘地照該縣下地起科陜西巡撫鐘音言同州府屬之郃陽縣黃河新漲灘地三百七十五頃有竒應照依該縣下地科則每二畝折中地一畝每畝照部價折銀二分八釐徴解司庫下部議行豁免山東濟寧魚臺二州縣水淹地畝額徴錢糧濟寧魚臺二州縣被淹地畝水深難涸者共九百七十六頃六十餘畝應徴銀二千五百三十九兩有竒米二百八十石有竒令悉行豁免二十五年豁免山東海豐等縣被水地畝額徴錢糧海豐利津霑化陽信樂陵冠縣水沖沙壓地畝共九百八十二頃應徴銀三千六百三十四兩有竒米麥五百八十九石有竒令悉行豁免二十六年募民承種肅州威魯堡地畝肅州威魯堡向安插吐魯畨回人是年移歸故土所遺熟地一萬五千三百六十餘畝陜甘總督楊應琚奏請募民承種按則升科從之準山西大青山土默特十五溝民人開墾地畝照歸化五廳中地科則山西巡撫鄂弼奏報大青山喀爾欽喀爾吉爾等十五溝民人二百四十餘户所墾熟地四百四十三頃七十五畝部議令給租票以為定額仍照歸化等五廳中地科則每畝完本色米二升九合六勺共一千三百一十三石五斗有竒由歸化城通判徴收二十九年準安西府屬招民認墾地畝照水田例六年升科陜甘總督楊應琚前後奏報安西府屬玉門淵泉二縣招民認墾地畝一萬二千一百畝有竒俱照水田例六年升科準四川屏山縣大竹堡等處荒地招民開墾分别水旱按年升科四川總督阿爾泰言敘州府屬屏山縣大竹堡等處邊荒勘明可墾地共十萬六千六百餘畝請將敘州府通判移駐馬邊廳招民開墾並將已墾田地分别水旱照例升科下部議行嗣據奏報大竹堡等處開墾地畝成熟未熟上中下地共一千一百八十三頃應徴丁條糧銀一千四百五十兩有竒分别年限起科其川秧蕎壩上下溪等處已墾承糧田地七十六頃應徴丁條糧銀二百一十五兩有竒請撥入馬邊廳通判徴收從之三十年減除江南泰州屬丁溪廟灣二場墾荒地折徴課銀泰州分司所屬范公堤外舊墾熟地六千四百餘頃地土瘠鹵江蘇巡撫陳𢎞謀奏請照梁垜場折價之例每畝完銀二分五釐嗣因丁溪廟灣二場所報墾熟地內有沮淤斥鹵不堪耕種地三千六十餘頃經兩江總督尹繼善等查勘會議請減除課銀四千六百九十兩有竒仍照本場原額科則下部議行三十一年諭滇省山多田少水陸可耕之地俱經墾闢無餘惟山麓河濵尚有曠土向令邊民墾種以供口食而定例山頭地角在三畝以上者照旱田十年之例水濵河尾在二畝以上者照水田六年之例均以下則升科第念此等零星地土本與平原沃壤不同倘地方官經理不善一切丈量查勘胥吏等恐不免從中滋擾嗣後滇省山頭地角水濵河尾俱著聽民耕種概免升科以杜分别查勘之纍且使農氓無所顧慮得以踴躍赴功力謀本計該部遵諭即行嗣經户部遵旨議定凡內地及邊省零星地土悉聽該處民人開墾種植直隸江西為數不及二畝福建及江蘇之蘇州等屬不及一畝浙江及江蘇之江寧等屬不及三畝陜西不及五畝安徽湖南湖北貴州水田不及一畝旱田不及二畝河南上地不及一畝中地不及五畝下地不論頃畝山東中則以上地不及一畝中則以下地不論頃畝山西下地不及十畝廣東中則以上水田不及一畝旱田不及三畝下則水田不及五畝旱田不及十畝四川上田中田不及五分下田上地中地不及一畝下地不論頃畝雲南不計畝數廣東之畸零沙礫地畝及高雷亷三府山場荒地俱永逺免其升科奉天十畝以下尚宜禾稼者減半徴租山岡土阜傍河濵海窪下之處僅宜雜植不成丘段者永免升科又諭據楊應琚奏新定整欠孟艮地方請倣照普洱邊外十三土司之例酌中定賦於丁亥年入額徴收等語整欠孟艮業經附入版圖願輸糧賦其酌定徴額之處俱著照所請辦理但念該處地方連年經莽匪擾害今雖得安耕作而元氣尚難驟復若遽於丁亥年責令輸將恐夷民生計未免拮據所有應徴錢糧著加恩緩至戊子年入額徴收以示優恤邊黎至意改定湖北漢川縣垸糧科則湖廣總督定長等言湖北漢川縣汈汊垸連接諸湖圈築長堤七千五百餘丈卑薄殊甚必須加髙培厚但民修力有不能借帑難以徴補况垸內嵗徴各則銀不及一千三百兩米僅八十餘石而節年賑貸反多於額徴之數莫如改糧廢堤將垸內上八總民田紅糧三則均改為漁糧上則其軍田科則改為漁糧下則下八總民田內應徴南米請照上八總南米一併減免庶幾無水之年以地為利有水之年以水為利下部議行又諭銀庫所奏月摺內地丁款下開寫絲毫忽微等細數緣各省徴收之時必須先有散數方可合併計算彚成總數是以照例開寫但此等名目既已極其纎悉而稱兊時並不能將此絲毫忽微之數分晰彈收徒屬有名無實於政體亦多未協嗣後各省徴收錢糧及一切奏銷支放等事俱著以釐為斷不必仍前開寫細數定四川石砫廳墾荒田地科則四川夔州府屬石砫廳地方東西寬五百里南北長三百三十里自改置流民以來田地徴糧仍循土司舊習總督阿爾泰奏請報墾田地上田中田丈量在五分以上下田上地中地在一畝以上者比照附近之酆都縣科則下部議行是年總計天下土田七百四十一萬四千四百九十五頃五十畝有竒賦銀二千九百九十一萬七千七百六十一兩糧八百三十一萬七千七百三十五石各有竒草五百十有四萬四千六百五十八束直隸民田六十八萬二千三百四十三頃九十畝有竒賦銀二百四十六萬三千七百八兩糧九萬五千二百十九石各有竒草九萬四千四百三十六束糧草均留充本省經費奉天民田二萬七千五百二十五頃二十七畝有竒賦銀四萬五千五百四十四兩糧七萬六千九百四十四石各有竒糧充本省經費江南江蘇民田六十五萬九千八百十七頃二十畝有奇賦銀三百二十五萬五千二百三十六兩糧二百八萬五千四百五十一石各有竒嵗漕京師百七十六萬二千六百一石留充本省經費三十二萬二千八百五十石各有竒安徽民田三十六萬四千六百八十頃八十畝有竒賦銀百七十萬七千一百二十三兩糧六十九萬四千三百十六石各有竒嵗漕京師五十二萬五千九百三十六石留充本省經費十有六萬八千三百八十石各有竒山西民田五十三萬五千四百八十一頃三十五畝有竒賦銀三百六萬九千三百二十五兩糧十有二萬三千五百四十六石各有竒糧充本省經費山東民田九十六萬七千一百四十頃三畝有竒賦銀三百三十三萬二千八百七十九兩糧五十萬六千九十五石各有竒嵗漕京師三十四萬七千九百七石留充本省經費十有五萬八千一百八十七石各有竒河南民田七十三萬一千七百三十五頃六十三畝有竒賦銀三百三十二萬二千二百十六兩糧二十萬二千三百十三石各有竒嵗漕京師十有七萬三千一百七十七石留充本省經費二萬九千一百三十六石各有竒陜西民田二十五萬九千五百七十九頃四十七畝有竒賦銀百五十五萬五千五百十三兩糧三萬一千九百四十八石各有竒草六千五十一束糧充本省經費甘肅民田二十三萬六千三百三十頃九十五畝有竒賦銀二十八萬七千四百八十六兩糧五十二萬一千七百四十六石各有竒草五百四萬四千一百七十束糧充本省經費浙江民田四十六萬二千四百頃有竒賦銀二百八十二萬一千四百八十三兩糧百三十八萬六千七百石各有竒嵗漕京師九十四萬一千六百八十三石留充本省經費四十四萬五千十六石各有竒江西民田四十六萬一千六頃二十畝有竒賦銀百九十三萬九千一百二十六兩糧八十九萬九千八百三十六石各有竒嵗漕京師七十七萬三百十石留充本省經費十有二萬九千五百二十六石各有竒湖北民田五十六萬八千四百四十三頃九十畝有竒賦銀百十有二萬一千四十三兩糧二十八萬六千五百三十七石各有竒嵗漕京師十有三萬二千三百九十六石留充本省經費十有五萬四千一百四十一石各有竒湖南民田三十一萬三千八十三頃四十二畝有竒賦銀百十七萬八千三百五十七兩糧二十七萬七千九百四十九石各有竒嵗漕京師十有三萬三千七百五十三石留充本省經費十有四萬四千一百九十六石各有竒四川民田四十六萬七十一頃二十六畝有竒賦銀六十六萬八百一兩糧萬三千四百四十石各有竒糧充本省經費福建民田十有三萬八千四十七頃三畝有竒賦銀百二十七萬八千五百七十兩糧三十一萬三千九百十三石各有竒糧充本省經費廣東民田三十三萬六千九百六十二頃五十三畝有竒賦銀百二十六萬九百三十三兩糧三十四萬八千一百七十四石各有竒糧充本省經費廣西民田九萬九千七百五十二頃四十四畝有竒賦銀三十九萬一千三百五十二兩糧十有三萬四百二十石各有竒糧充本省經費雲南民田八萬三千三百六十三頃五十一畝有竒賦銀十萬五千七百八十四兩糧十有六萬七千九百三十八石各有竒糧充本省經費貴州民田二萬六千七百三十頃六十二畝有竒賦銀十有二萬一千二百八十二兩糧十有五萬五千二百五十石各有竒糧充本省經費三十三年户部議盤驗丈量京通新舊糧額之法每屆五年派員查辦一次徒滋糜費應請停止如議行三十六年諭聞臨清及陵縣有經水沙壓鹽鹻地一千餘頃屢年試種不能墾復農民完賦無資著加恩將該州縣所有沙壓鹽鹻地畝錢糧漕米概豫豁除以示體恤民隱至意該部即遵諭行令民墾種吳縣等地户部議江蘇巡撫薩載奏吳縣吳江婁縣金山無錫丹陽寶山七州縣地方實有可墾之地應令該州縣勸民陸續耕種照例題報升科如議行三十七年諭各督撫凡有瀕水地面除已墾者姑免追禁外嗣後務須明切曉諭毋許復行占耕違者治罪若仍不實心經理一經發覺惟該督撫是問山西巡撫三寶奏助馬口外沙磽瘠水沖沙壓不堪耕種地共九十七頃四十畝零請照例豁除下部議行令民墾種黃州衛荒地户部議準湖北巡撫陳輝祖奏黃州府黃州衛等處荒地應勸民陸續耕種三十八年定通州崇明沙地額賦大學士劉統勳等議奏江蘇省通州崇明二處沙地新歸移駐海門同知管理詢之巡撫薩載現在錢糧仍照原例通州加一崇明五分徴收並未將崇明舊額照通賦加增請嗣後原歸廳官管理將來遇有新漲再照通崇二邑賦額酌中定例如議行諭户部奏荒地招民佃墾定限起租一摺所辦尚無實濟前以荒蕪地畝及低窪之處每易滋生蝻孽曽令裘曰修親往履勘並令英亷等酌量可墾者令業主佃户墾種成熟其實係沮洳之區即為開掘水泡以杜蟲孽而資瀦蓄數年以來尚未辦及此事於畿輔農田最有關係著交周元理專派明幹妥員逐加踏勘將實可施工民間樂於認墾者聽從其便其荒蕪低窪之區即酌開水泡以期日久利賴湖北巡撫陳輝祖奏漢陽縣自乾隆二十九年以來積年坍沒田地共五百五十一頃六十六畝零所有應徴錢糧請照例豁免從之三十九年定廣東三水新安等縣報墾荒地照旱田例起科四十年户部議江蘇巡撫薩載奏鎮洋縣築塘占廢田地應繳銀米準分别扣蠲四十一年江蘇巡撫薩載奏清河縣於雍正十三年修閘築堤挖廢田地應徴銀糧請準豁免從之四十二年免喀喇河屯水沖沙壓地畝額徴四十三年查長洲縣濵臨太湖等處坍沒地畝除其租賦四十四年户部議甘肅西寧縣添建倉厫置買民地額徴糧草應準造册豁除四十五年户部議廣西巡撫姚成烈奏鎮安府屬開墾水田準於乙巳年起科俟起科之年將前項地畝糧銀造入奏銷并編入全書送部令甘肅平畨碾伯二縣荒地永除租賦四十六年豁免阜寧衛河灘地租四十七年閩浙總督陳輝祖奏浙江仁和場等處坍沒存減則地共九百二十畝零請自乾隆四十五年為始準其停收下部議行陜西巡撫畢沅題朝邑縣水沖沙壓地三百四頃八十四畝又灘地一百八十二頃咸寧等縣濵臨渭壩等河節年坍沒地六十八頃所有均徭糧銀舊額應準豁免下部議行又準仁和漲沙田地六千四百餘畝升科四十九年山西巡撫農起題渾源州勸民開墾荒地查定例地方實有可墾荒地令該地方官勸墾陸續耕種旱田以十年題報今大同府所屬渾源州開墾旱地每畝徴銀一分三釐零遇閏之年每兩加徴閏月銀三分請於乾隆四十八年為始至五十八年升科從之五十年户部議直屬原報官荒地一千二百三十六頃零旗荒地五百五十三頃零內除民房占用地基與有主墳地俱應徴租外實淨存難墾荒地共一千七百八十七頃零內查出可墾官荒地三百四十二頃零旗荒地一百四十二頃零俱於難墾之中擇其尚可試墾成熟者飭令該州縣召民認墾按照八年限滿交租但同係荒地土性髙低不齊翻犁播種一切牛具籽粒所需工本人力又多寡不一除施工較易仍照八年舊限外所有鹽鹻沙壓傍山瀕河草根蟠結之地約計數年所獲之利與所費不敷應加展二年以寬其限俟正展限滿令地方官勘明情形量其收成酌定租數將官租分别征收至實餘難墾荒地或鹽鹻不毛或沙石積壓或附近山根雖此次查勘實屬難墾但土脈之轉移不一地勢之燥濕無定仍令各州縣隨時查勘或經水涸沙揚泥淤鹻退轉為可墾之地即行召佃設法墾復以期地無遺棄奉諭旨依議所有各州縣歷年報荒官旗各項地畝經此次派員履勘查辦即查出可墾地八百餘頃分别年限召墾輸租於旗民均有裨益足見從前荒廢地利地方官不實力查辦所致但恐此後地方官因循日久又復視為具文日漸廢弛仍屬有名無實著交該督董率所屬認真辦理愷切曉諭務令小民踴躍從事以期沃壤日增至地利轉移無定或有此時可耕而日後或至水沖沙壓者或此時難墾而日後漸成膏腴者並著該督隨時察看於此次查辦後續有可耕者若干續行報荒者若干每屆年終彚奏一次以專責成又諭畢沅奏開封府屬之鄭州有因堤壓水沖不能耕種地畝共一百五十頃有零核計無著糧銀一千二百七十七兩零小民艱於輸納等語地畝既因水衝堤占錢糧無著若仍令輸將民力未免拮據所有此項廢地錢糧一千二百七十七兩零著加恩概豫豁除以示朕惠愛黎元體恤民隱之至意皇朝文獻通考卷四
