body:
  text: 經籍考二十五集詩集鬲津草堂詩集無卷數田霡撰霡字子益號樂園又號香城居士德州人康熙丙寅拔貢生官堂邑縣教諭臣等謹按霡與兄需雯並以詩名雖材力富健較遜於雯而娟潤深秀令人得之於恬吟密咏之餘與王士禎同郡同時格律實與相近蓋舍其兄而趨新城者生平以七言絶句自負故所作為獨多箐庵遺稿一卷汪筠撰筠字禹吹蘇州人編修琬之子學古堂詩集六卷沈季友撰季友字客子平湖人康熙丁卯副榜貢生半庵詩稿無卷數勞巁撰巁字貞著陽信人藥亭詩集二卷梁佩蘭撰佩蘭字藥亭番禺人康熙戊辰進士改庶吉士鉢山堂詩集十九卷陳阿平撰阿平字獻吉東莞人康熙中諸生枤左堂詩集六卷詞四卷續集三卷孫致彌撰致彌字愷似嘉定人康熙中被薦以太學生賜二品服出使朝鮮採詩戊辰成進士改庶吉士官至翰林院侍讀學士臣等謹按致彌書法為世所推得董其昌之遺意初未嘗以詩名而詩亦跌宕流逸張鵬翀朱厚章得鈔本於戴璣家選而刻之峇㠠山人集無卷數謝乃實撰乃實字華函福山人康熙戊辰進士官興寧縣知縣過江集四卷史申義撰申義字叔時號蕉飲江都人康熙戊辰進士選庶吉士散館改給事中楝亭詩鈔五卷附詞鈔一卷曹寅撰寅見子類眺秋樓詩八卷高岑撰岑字峴亭商邱人官豐城縣知縣赤嵌集四卷孫元衡撰元衡字湘南桐城人康熙中官至東昌府知府王士禎序曰湘南赤嵌集可追蹤建安躡跡長公四香樓集四卷范纘撰纘字武功婁縣人臣等謹按纘嘗館陳元龍家故元龍稱其長於堪輿然纘實記問淹博相傳元龍所輯格致鏡原即出其手舟車初集二十卷陶季撰季原名澄字季深後以一字為字又以字行寶應人燕堂詩鈔八卷朱徑撰徑字恭亭寶應人集古梅花詩無卷數張吳曼撰吳曼字也倩上海人根味齊詩集二十卷徐志莘撰志莘字任可一字商農德清人工部尚書元正子由蔭生官順天府通判觀樹堂詩集十四卷朱璋撰璋字鹿田錢塘人由舉人官至澤州府知府息廬詩一卷陶爾穟撰爾穟字頴儒華亭人顔光敏跋曰頴儒七古似青蓮長吉近體不專一家而各盡其妙固哉叟詩鈔八卷高孝本撰孝本字大立號青華嘉興人康熙辛未進士官績溪縣知縣葛莊詩鈔十三卷葛莊編年詩無卷數劉廷璣撰廷璣見子類夢月巖詩集二十卷吕履恆撰履恆見别集類例略曰詩或經嵗一改或一月數改如洛陽秋思河上寓目詩之頷聯嫌其調近七子輒加竄易金陵雜感之結句嫌其涉於怒罵亦復易之又曰盛朝詩選所載秦中懷古詩洛陽秋思詩懷公毅詩字句皆有所竄亂今悉從原本殘本賦清草堂詩鈔六卷張棠撰棠字吟樵華亭人康熙丙子舉人官至桂林府知府加銜太僕寺少卿山舟堂集十二卷周士彬撰士彬字介文婁縣人康熙丙子副榜貢生菀青集無卷數陳至言撰至言字山堂一字青崖蕭山人康熙丁丑進士官翰林院編修華鄂堂集二卷周彞撰彞字䇿銘婁縣人康熙丁丑進士官翰林院編修栁堂詩集十二卷吳祖修撰祖修字慎思吳江人祖修子大庚跋曰曩時曾板行五七言古詩已而悔之謂詩當以編年為次不當分體今所編詩十二卷其半猶出手定也畏壘山人詩集四卷徐昂發撰昂發見子類超然詩集八卷張逺撰逺字超然侯官人康熙己卯舉人官祿豐縣知縣杭世駿榕城詩話曰張逺領康熙己卯鄉薦第一游京師與竹垞初白諸人倡和甚富有集梓行初嘗挾策游四方未有所遇登滕王閣題詩一達官嗟賞為之延譽詩名遂振其詠松濤有月明何處雨風定數聲鐘亦佳句也雲存詩鈔九卷查祥撰祥字星南海寧人康熙辛巳進士官翰林院編修秋江詩集六卷黃任撰任字莘田永福人康熙壬午舉人官至四㑹縣知縣杭世駿榕城詩話曰任工書法好賓客詼諧談笑一座盡傾罷官歸里壓裝惟端溪石數枚詩柬兩牛腰而已其詩源出溫李往往刻露清新别深懷抱如楊花絶句云到底不知離别苦後身還去作浮萍春日雜思云夕陽大是無情物又送墻東一日春所為緣情綺靡殆於近之秋葉軒詩四卷張琳撰琳字佩嘉一字玉田錢塘人黑蝶齊詩鈔四卷沈岸登撰岸登字覃九號惰耕村叟平湖人樓村集二十五卷王式丹撰式丹字方若寶應人康熙癸未進士第一官翰林院修撰敬業堂集五十卷查慎行撰慎行見經類王士禎序曰黃晦木比其詩於陸劒南若論其竒創之才則遜於陸綿至之思則勝之至其五七言古體有陳師道元好問之風緯蕭草堂詩六卷宋至撰至字山言商邱人吏部尚書犖之子康熙癸未進士官翰林院編修淡初詩稿八卷附見山堂詩鈔一卷沈翼機撰翼機字西園號淡初海寧人康熙丙戌進士官至翰林院侍讀學士見山堂詩鈔其子廷薦撰廷薦字澄懷雍正壬子舉人未仕早卒絸齊詩選二卷張謙宜撰謙宜號稚松膠州人康熙丙戌進士法輝祖序曰全稿三千餘首暮年自訂僅存詩四百餘篇蓬莊詩集六卷沈虹撰虹字渭梁長洲人雄雉齊選集六卷顧圖河撰圖河字書宣江都人康熙己丑進士官翰林院編修青溪詩偶存十卷蔣錫震撰錫震字契潛宜興人康熙己丑進士青要集十二卷吕謙恆撰謙恆字天益河南新安人康熙己丑進士官至光祿寺卿臣等謹按青要山名見山海經所謂帝之密都也謙恆嘗讀書是山因以名集性影集八卷王時憲撰時憲號褉亭太倉人康熙己丑進士官翰林院庶吉士石川詩鈔三卷方覲撰覲字近雯江都人康熙己丑進士官至西安布政使殘本雲川閣詩集九卷杜詔撰詔字紫綸無錫人康熙乙酉聖祖仁皇帝南巡迎鑾獻詩命供奉內廷壬辰㑹試欽賜進士改庶吉士閭邱詩集六十卷顧嗣立撰嗣立字俠君長洲人康熙壬辰進士由庶吉士改補中書舍人江南通志曰嗣立博學有才名尤工詩所居秀野草堂常集四方知名士觴詠無虛日風流文雅照映一時朴學齊詩集十卷林佶撰佶見子類今有堂詩集六卷附茗柯詞一卷程夢星撰夢星字午橋號香溪江都人康熙壬辰進士官翰林院編修三華集四卷梁機撰機字仙來泰和人康熙癸巳進士約園詩鈔二卷郭雍撰雍字仲穆一字書禪號約園福清人康熙癸巳舉人雍自述曰前後所作多屬近體於古體歌行間存一二樂府則有待而未及瓦缶集十二卷李宗渭撰宗渭字秦川嘉興人康熙癸巳舉人挹青軒詩稿一卷華浣芳撰浣芳蘇州女子龍溪草堂集十卷王世睿撰世睿字道存章邱人康熙乙未進士官上海縣知縣陳玉几詩集三卷陳撰撰撰字楞山號玉几鄞縣人據梧詩集十五卷管掄撰掄見史類滋蘭堂詩集十卷沈元滄撰元滄見經類元滄孫廷芳識曰是編凡六集康瓠集為家居侍親及為查氏贅壻時作灌畦集為移居龍山時作今雨集為入直武英殿時作紫貝集為官文昌時作勞薪集為罷官後自京赴粵時作西征集為由粵赴京謫居銀州時作樊榭山房集二十卷厲鶚撰鶚見史類寒香閣詩集四卷鄧鍾嶽撰鍾嶽見子類墨麟詩十二卷馬維翰撰維翰字墨麟海鹽人康熙辛丑進士官至四川川東道香屑集十八卷黃之雋撰之雋見别集類臣等謹按之雋記誦博洽才華富贍是編皆其集唐之作卷首集唐四六序尤為工絶桐村詩九卷馮詠撰詠字䕫揚金溪人康熙辛丑進士官翰林院編修南園詩鈔十卷尤世求撰世求字念修長洲人官南充縣知縣華林莊詩集四卷姚孔􅀈撰孔􅀈字梁貢號于巢桐城人康熙中諸生瓠尊山人詩集十七卷夏熙臣撰熙臣字無易孝感人七嵗補諸生由嵗貢生官安陸府教授道腴堂詩集四卷曹煜曾撰煜曾號麓蒿上海人康熙中貢生王延年序曰麓蒿詩懶不自惜多散佚今所傳者皆其孫口授長嘯軒詩集六卷曹煐曾撰煐曾字祖望號春浦上海人煜曾之弟康熙中貢生放言居詩集六卷曹炳曾撰炳曾字為章號巢南上海人康熙中諸生隨村遺集六卷施􅀈撰􅀈號隨村宣城人鍾水堂詩三卷顔肇維撰肇維字次雷曲阜人官臨海縣知縣帶月草堂詩集一卷顔懷禮撰懷禮字約亭曲阜人襲世職為五經博士桐乳齊詩集十二卷梁文濓撰文濓字溪父錢塘人大學士詩正之父杭世駿序曰文濓嘗南浮衡湘北抵碣石踐歷嵩華回旋宋衛之郊頗耽懷山水故紀游之詩為多橡村集四卷朱緗撰緗字子青號橡村歷城人候補主事蒼雪山房稿一卷朱綱撰綱字子驄歷城人官至福建巡撫吾友于齊詩鈔八卷張錫爵撰錫爵字擔伯號中巖嘉定人樹人堂詩七卷帥念祖撰念祖字宗德號蘭臯奉新人雍正癸卯進士官至陜西布政使緣事謫戍南陔堂詩集十二卷徐以升撰以升字階五號恕齊雍正癸卯進士官至廣東按察使江聲草堂詩集八卷金志章撰志章字繪卣仁和人雍正癸卯舉人官至口北道謙齊詩稿二卷補遺一卷曹庭樞撰庭樞字六薌嘉善人雍正癸卯副榜貢生乾隆元年薦舉博學鴻詞司業詩集四卷陳祖范撰祖范見經類祖范自序曰詩之作出於無心則其情真又必各有所為則其義實故一國之事係一人之本而匹夫匹婦之歌吟可以察治忽也後之詩人既以詩自命人亦以詩相屬於是外物為主而詩役焉詩為主而心役焉於是無真性情真比興然而情實彌隱詞采彌工義理彌淆波瀾彌富而又格律以繩之派别以嚴之時代以區分之回視詩教之本來其然乎其不然乎鋤經餘草十六卷王文清撰文清見經類明史雜詠四卷嚴遂成撰遂成字海珊烏程人雍正甲辰進士官雲南知州絳跗閣詩稿十一卷諸錦撰錦見經類餐秀集二卷黃千人撰千人字證孫餘姚人宗羲之孫官泰安縣丞賜書堂詩選八卷周長發撰長發字蘭坡號石帆山陰人雍正甲辰進士選庶吉士散館外補廣昌縣知縣改樂清縣教諭乾隆丙辰召試博學鴻詞授檢討官至侍講學士降補侍講春及堂詩集四十三卷倪國璉撰國璉見史類四焉齊詩集六卷附梯仙閣餘課一卷拂珠樓偶鈔二卷曹一士撰一士見别集類梯仙閣餘課一士繼室陸氏鳯池作拂珠樓偶鈔一士女錫圭作寒香草堂集四卷劉元燮撰元燮字孟調湘潭人雍正庚戌進士官至山西道監察御史緣事降廣西布政司經歷雪舫詩鈔八卷周宣猷撰宣猷見别集類栁漁詩鈔十二卷張湄撰湄字鷺洲錢塘人雍正癸丑進士官至給事中秋水齊詩集十五卷張映斗撰映斗字雪子烏程人雍正癸丑進士官翰林院編修寧逺堂詩集一卷朱成㸃撰成㸃字司衡寧鄉人成㸃自述曰向因遷徙流離至庚子疾中閉門却軌始多作詩以自遣因成是編舒曉齊存稿三卷黃溶撰溶字涪逺鄆城人雍正中貢生桐隱書屋集二卷朱崇勳撰崇勳字彞存號怡園歷城人湖上草堂詩一卷朱崇道撰崇道字帶存歷城人蠶桑樂府一卷沈炳震撰炳震見經類臣等謹按是集凡七言長句二十首始於護種迄于賽神蓋擬報賽蠶事之曲故名曰蠶桑樂府無悔齊集十五卷周京撰京字西穆一字少穆錢塘人雍正中諸生實懶齊詩集四卷張時泰撰時泰字平山號六可嘉興人官桐城縣知縣亦廬詩集二十八卷湯斯祚撰斯祚字衎之號亦廬南豐人雍正中嵗貢生官江西新昌縣訓導江湖閒吟八卷王道撰道字直夫漳浦人官金山縣知縣藴亭詩稿二卷金綎撰綎字連城吳縣人錢維城序曰藴亭詩派出自嶺南少年至京師秋日游靈佑寺有高雲不礙靜晴日自知寒之句為新城王士禎所賞翰村詩稿六卷仲是保撰是保字羮梅號翰村常熟人臣等謹按是集如唐時進士以所業投贄當路之式皆題曰行卷究之是保終老山林未審其何所取義前四卷以辛壬癸甲為序第五曰後甲皆是保自編蓋放陸龜䝉笠澤叢書以甲乙分卷之例而又不順序十干之次亦莫解其故末一卷曰遺集則其友趙念所續編也梧江雜咏一卷劉雲鋒撰雲鋒字秋冶南昌人朴庭詩稿十卷吳爚文撰爚文字璞存一字朴庭山陰人孤石山房詩集六卷沈心撰心字房仲仁和人雍正中諸生抗言在昔集一卷沈氷壺撰氷壺字心玉山陰人貢生臣等謹按是集皆七言絶句為其咏古之作頗能考證文史自抒學識非僅評論事迹之末然有意駭俗遂至流於放誕至其所品評詩人文人悉加排詆隱然以第一人自命則亦狂妄之甚矣梯青集無卷數項大德撰大德字立上漢陽人臣等謹按大德嘗因母病刲股療母不愈旋以哀毁卒年僅二十有六蓋其孝行有過人者詩則未能成家也雙樹軒詩鈔一卷僧湛性撰湛性一名湛汛字藥根又曰藥菴居揚州之祇園菴夢村集二卷朱緯撰緯字義俶歷城人嵗貢生官邱縣訓導薇香集一卷燕香集二卷燕香二集二卷方觀承撰觀承字遐穀號問亭又號宜田桐城人由監生薦授中書舍人官至直𨽻總督諡恪敏臣等謹按觀承宣力封疆克承恩眷公退之暇每拈毫賦詩述本堂集中載有東園剩稿入塞詩懷南草豎步吟叩舷吟宜田彚稿看蠶詞松漠草等八種後為直𨽻總督復成此三集蓋其遭遇聖時宣猷多暇故優游吟咏著作裒然雖其性嗜詩篇亦足見治理之裕如也晚晴樓詩草二卷曹錫淑撰錫淑字采荇上海人一士之女適同里舉人陸正笏緑筠軒詩四卷張元撰元字殿傳淄川人雍正丙午舉人官魚臺縣教諭竹香詩集四卷席鏊撰鏊字景溪常熟人雍正已酉舉人官內閣中書質園詩集三十二卷商盤撰盤字蒼雨又號寶意㑹稽人雍正庚戌進士官翰林院編修改授同知終沅江府知府氷壑詩鈔六卷朱令昭撰令昭字次公歷城人鵝浦集六卷朱懷璞撰懷璞字素存歷城人菱溪遺草一卷蔣麟昌撰麟昌字靜存陽湖人乾隆己未進士官翰林院編修松泉詩集六卷江昱撰昱見經類閨房集一卷陳珮撰珮字懷玉天長人江都諸生江昱之妻白雲詩集七卷别集一卷盧存心撰存心原名琨字玉嚴别字敬甫錢塘人恩貢生乾隆元年嘗薦舉博學鴻詞隨園詩集十卷附録一卷邊連寶撰連寶字趙珍刋本别作肇畛任邱人雍正乙卯拔貢生臣等謹按連寶嘗於乾隆丙辰辛未一薦舉博學鴻詞一薦舉經學雖俱未入選而其學問有足多者戈濤嘗稱之晚年耽於禪說故以禪家公案頌一卷附録於後東山草堂集六卷潘安禮撰安禮字立夫南城人乾隆丙辰召試博學鴻詞官翰林院編修産鶴亭詩集七卷曹庭棟撰庭棟見經類山隂集一卷歸田遺草一卷林其茂撰其茂字培根乾隆丙辰進士官山陰縣知縣瑜齊詩草一卷郭趙璧撰趙璧字名瑾侯官人乾隆丙辰舉人卓山詩集十二卷帥家相撰家相字伯子奉新人乾隆丁巳進士官至潯州府知府臣等謹按是編又名三十乘書樓集乃家相手定之本故中間塗乙之處甚多瓠息齊前集二十四卷凌樹屏撰樹屏字保釐烏程人乾隆己未進士官咸陽縣知縣改補嘉興府教授秋崖遺詩一卷李國柱撰國柱字金甌德州人乾隆辛酉拔貢生臣等謹按國柱所著有槐陰草廬稿拒霜齊稿棗村集寄村集文英集瀛海集呻吟集等編後因里人宋弼以其詩與李基塙曹昕金英編為廣州四子集國柱不以為然乃手自刋除僅存十之一二合為是集問羲軒詩鈔二卷賸草一卷莊綸渭撰綸渭字對樵號葦塘武進人乾隆壬戌進士官定海縣知縣詠史六言一卷周宣武撰宣武字燮軒長沙人乾隆壬戌進士臣等謹按六言一體頗為難工故古今作者偶一為之今是編以六言咏史事不分門目不叙時代後先如論贊之體衍至百首亦可謂好為茍難者矣月坡詩集四卷郭植撰植見子類中田閒吟二卷曹昕撰昕字麗天號綺莊景州人懶真初集詩選八卷張用天撰用天字用六號誠菴婁縣人敝帚集二卷附蘆中集一卷趙秉忠撰秉忠字景先號秋墅興化人乾隆乙丑進士改庶吉士柘坡居士集十二卷萬光泰撰光泰字循初秀水人乾隆庚午舉人汪孟鋗序曰循初計偕北上以病卒方病中薈自定詩十二卷一緘寄余有可存則付令子存之不者毁之之說又曰刻既成取循初别字題曰柘坡居士集其古文詩餘極夥聞手自毁去外雜著十六種則皆其自定緘寄者俟他日續刻焉觀光集五卷蔡以封撰以封字桐川嘉善人優貢生官桐鄉縣訓導臣等謹按以封嘗監敷文書院恭逢聖駕南巡率諸生迎鑾道左所賦諸作都為是集故命之曰觀光云緑杉野屋集四卷徐以泰撰以泰字陶尊德清人官陽曲縣知縣冬心集四卷金農撰農字壽門錢塘人臣等謹按農詩以竒逸自喜兼以書畫著亦如其詩客於揚州寥落不偶因取崔國輔語以名其集㠣崌山人集八卷汪舸撰舸字可舟婺源人流寓揚州睫巢集六卷後集一卷李鍇撰鍇見史類石閭詩一卷陳景元撰景元號石閭鑲紅旗漢軍人臣等謹按是編舊附李鍇睫巢集後然景元生平作字效晉作詩效漢命意豪上與鍇名亦相亞未應在附綴之列故析而録之南阜山人詩集七卷高鳯翰撰鳯翰字西園晚號南阜山人又曰歸雲老人膠州人以縣丞署鹽大使鳯翰晚年自跋曰盲子頑孫篋笥誰付不知後來所作尚復幾許亦不知得成卷與冊否尚有人拾取於蛛絲蠧腹之餘以少得流傳於人世否露電茫茫老病日篤而猶惓惓於此故紙窠中物愚哉南阜不直達人一笑矣拙齊集一卷李逺撰逺字君宏益都人密娛齊詩稿一卷鄧汝功撰汝功字謙持聊城人乾隆乙未進士未釋褐而卒李文藻序曰謙持詩古體出於韓蘇近體似錢郎東坪集八卷胡慶豫撰慶豫字雍來號東坪平湖人嵗貢生六湖遺集十二卷張文瑞撰文瑞字雲表號六湖蕭山人官青州府同知念西堂詩集八卷王令撰令見别集類有蘭書屋存稿四卷石球撰球字鳴虞嘉定人徐樹紳序曰鳴虞以生平踪迹少所涉歷無瑰偉竒特之觀故亦罕沉博絶麗之作寒玉屏集二卷碎金集二卷閔南仲撰南仲字湘人號石漁湖州人天香閣詩集十卷唐之鳯撰之鳯字武曾烏程人笑門詩集二十五卷戚玾撰玾字後升泗州人優貢生官知縣偶存草詩集六卷林之蒨撰之蒨字素園寓籍孝感人皇朝文獻通考卷二百三十五
