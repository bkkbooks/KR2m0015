body:
  text: 欽定四庫全書皇朝文獻通考卷八十職官考四臣等謹按馬端臨通考所載職官俱本宋制五朝考依類編入今謹依㑹典各衙門序次敬輯以昭本朝制度云文職宗人府宗人府掌皇族之屬籍以時修輯玉牒辨昭穆序爵祿均其惠養而布之教令凡親疏之屬胥受治焉宗令一人左右宗正各一人左右宗人各一人並以宗室王公為之臣等謹按國初於篤恭殿前列署為諸王議政之所順治九年設宗人府以親王總領府事貝勒貝子為左右宗正鎮國公輔國公為左右宗人厥後不拘一格擇賢能者任之府丞一人用漢人掌校理漢文册籍左右二司設理事官各二人副理事官各二人主事各二人分掌左右翼宗室覺羅之籍並書其子女適庶生卒婚嫁官爵名諡以備玉牒紀載凡承襲次序秩俸等差及養給貧幼優恤婚喪之事時為稽核綜理焉經歷二人掌出納文書宗室滿洲分半用初設漢經歷一人康熙三十八年裁堂主事二人掌奏疏稿案宗室滿洲分半用堂主事漢人二人掌漢文册籍雍正二年增設筆帖式二十四人掌翻譯清漢文書宗室滿洲分半用臣等謹按初設有啓心郎覺羅漢軍各一人康熙十二年裁凡天潢宗𣲖以顯祖宣皇帝本支為宗室伯叔兄弟之支為覺羅宗室束金黃帶覺羅束紅帶生子女周嵗書其年月日時母某氏詳其適庶次第具册送府宗室載入黃册覺羅載入紅册宗室以罪黜為庶人者束紅帶覺羅以罪黜為庶人者束紫帶所生子女備録送府如前法各附黃紅册後凡纂修玉牒每十年由府題請開館以宗令宗正內閣禮部大臣為正副總裁官本衙門及內閣翰林院禮部官分纂內閣中書等官繕寫按每年黃册紅册所紀彚入於牒以帝系為統以長幼為序存者朱書故者墨書設同名改卑者及幼者每三年書成乾隆三十一年改定一年告成皇史宬本府盛京各尊藏一部三公三孤太師太傅太保少師少傅少保太子太師太子太傅太子太保太子少師太子少傅太子少保俱為文武大臣加銜及贈銜無專職內閣殿閣大學士滿洲漢人各二人兼各部尚書銜協辦大學士滿洲漢人各一人掌贊理庶政奉宣綸音內外諸司題疏到閣票擬進呈得報轉下六科鈔發各部院施行以副本録㫖送皇史宬存貯如原疏折出未定處分俟御門聽政時滿學士一人敷奏折本大學士面奉諭㫖如前施行凡恭上皇太后徽號奏書册寶立皇后皇太子册寶尊封皇貴太妃皇太妃册寶封皇貴妃貴妃册寶妃册印嬪册俱由內閣撰擬文篆進呈欽定敕下禮部施行皇太子皇子皇孫命名大學士承㫖擬奏王公公主號亦如之封外藩王以下及公侯伯以下誥命亦如之其子孫襲封即於原奉誥敕內開注人名年月加用御寶給還中外文武各官遇覃恩封贈五品以上者誥命六品以下者敕命宗室自鎮國公以下用為大臣侍衛者封贈與文武官同外任官督撫學政鹽政織造提督總兵等官撰給坐名敕書布政使按察使道員運使及副將參游等官止給傳敕凡覃恩肆赦大學士承㫖擬恩詔應行事欵恭請欽定凡纂修實録史志諸書為監修總裁官經筵領講官㑹試充考試官殿試充讀卷官凡起居注記載每嵗終送內閣大學士學士監視加封入庫收藏凡每月欽奉諭㫖於次月彚録進呈各部院奉㫖特交之事覆奏後具册送內閣其有未結者聲明緣由送核月終則㑹計具奏凡壇廟陵寢神牌由工部送內閣中書敬書清文翰林官敬書漢文命大學士行禮凡尊諡册諡大學士承㫖恭擬奏請欽定敕下禮部奉行册文寶篆由翰林院撰擬大學士恭閲進呈諸王以下及文武大臣諡法均由大學士奏定諸王以一字為諡貝勒以下及大臣以二字為諡凡陵山封號大學士承㫖恭擬封各山川神祇亦如之凡祭告祝文由翰林院撰擬大學士恭閲進呈壇廟祝版由太常寺送內閣中書繕寫大學士敬書御名凡命將征討大將軍經略將軍敕書內閣撰擬大將軍經略將軍或給印或關防並諏出師吉日皆奏請欽定仍遣內閣官隨行管理凡勾决京外重囚刑部以秋朝審情實姓名册送內閣於冬日至前六十日次第奏請勾决皇帝素服大學士學士及刑部堂官起居注官咸常服祗候召入滿學士一人跪奏囚册漢大學士一人秉筆遵㫖勾訖密封下所司施行凡擢任大學士膺簡命後奏請殿閣名及各部兼銜學士兼禮部侍郎銜滿洲六人初設三人順治元年後增減不一康熙九年定二人十年復增四人漢人四人初設漢軍三人順治元年後漢人增減不一康熙十年定漢軍二人十二年以漢軍併入漢缺共四人掌敷奏本章侍讀學士滿洲四人初設三人康熙九年定四人蒙古二人初設三人康熙九年定二人漢軍漢人二人初設漢軍三人後改二人乾隆十七年改為漢缺漢軍漢人序資用掌收發本章總稽翻譯其屬侍讀滿洲十人初設漢文五人滿漢文六人共十一人康熙三十八年裁滿漢文二人尋復增二人䝉古漢軍漢人各二人掌勘對本章檢校票籖典籍滿洲漢軍漢人各二人初俱各設三人康熙九年改各二人掌收貯圖籍出納文移中書滿洲七十人初設七十五人康熙三十八年裁十一人後復增六人䝉古十六人初設十九人康熙三十八年裁三人漢軍八人初設十三人康熙三十八年裁五人漢人三十人初設三十六人康熙三十八年裁四人乾隆十三年裁二人貼寫中書滿洲四十人蒙古六人掌撰擬翻譯繕寫之事內閣承辦本章有五所曰滿本房司繕寫曰漢本房司翻譯曰䝉古本房司翻譯外藩屬國文字曰滿票籖曰漢票籖司繕寫票籖記載諭㫖撰文之事俱以侍讀學士侍讀司其事中書分任之批發紅本曰紅本房以內閣翰林等官司其事凡請用御寶先知㑹內務府轉行宫殿監至期學士率典籍赴乾清門驗用如遇行幸駐蹕以內務府總管一人監視之中書科職專繕寫册寶誥敕凡册封則充副使大朝㑹則隨駕而供事焉內閣學士滿漢各一人掌之中書舍人滿洲二人漢人四人筆帖式十人臣等謹按初設漢中書舍人十二人尋省八人順治九年設滿記事官同掌科事康熙九年改為滿中書舍人皇史宬尉滿洲三人文淵閣文淵閣自昔為大學士兼銜而非職掌所繫我皇上文治聿隆輯録四庫全書多人間未見之籍浩如淵海集古今之大成特于文華殿後建文淵閣崇構鼎新琅函燦列於是設官兼掌以副其實折𠂻宋制設提舉閣事領閣事總其綱其次為直閣事同司典掌又其次為校理為檢閲分司注册㸃驗每嵗三六九月提舉閣事大臣㑹同領閣事大臣奏請曝書令直閣校理檢閲各員咸集公同啓閣翻晾雖閣中收藏書籍責之內府官屬而一切職掌事宜提舉閣事領閣事以下任之于內閣翰詹衙門內揀選兼用華資賅偹實效責成垂館閣之宏規懋文明之盛治不特逺軼麟臺故事實生民以來所未有云提舉一人以內務府大臣充之掌提舉閣事總理大綱逢曝書之期則㑹同領閣事奏請翻晾祕籍領閣事二人大學士兼學院學士充之掌管領祕籍如翰林及大臣官員內欲觀中祕書者别藏副本于翰林署告領閣事請閲願就抄録及須行參校者領閣事酌派校理等員就閣中檢對直閣事六人以內閣學士充之掌直祕閣書籍同司典守曝書之期㑹同翻閲校理十六人以庶子侍讀侍講編修檢討充之檢閲八人以科甲出身之內閣中書充之分掌注册㸃驗值曝書之期一同按籍校閲吏部吏部掌中外文職銓叙勳階黜陟之政釐飭官常以贊邦治焉尚書滿洲漢人各一人順治五年定滿漢尚書各一人七年增滿洲尚書一人十年裁雍正元年以來常以大學士兼理部務與尚書率其屬以叙正羣吏焉左右侍郎滿洲漢人各一人臣等謹按初制吏部右侍郎兼翰林院學士銜其非翰林出身者不兼禮部侍郎亦如之尋俱罷兼銜又初制各部院俱設有啓心郎順治十五年裁其屬有四清吏司曰文選曰考功曰稽勳曰驗封文選清吏司郎中滿洲三人䝉古漢人各一人員外郎滿洲漢人各二人初設一人雍正五年增一人主事滿洲一人漢人二人掌官吏班秩均平選法官分九品有正有從為級十有八不及九品曰未入流選人出身之途曰科目曰貢監曰廕生曰薦舉曰吏員咸登資簿以序階次其遷秩改除在京四品以上及翰林詹事官列名請特簡郎中道以下分雙單月循例遷選序俸遷者曰推升不序俸遷者曰即升至降調署職試俸開復起復改補回避告假皆按成例行其揀驗及選員考試胥𨽻焉考功清吏司郎中滿洲三人漢人一人員外郎滿洲二人䝉古漢人各一人主事滿洲一人漢人二人初設一人雍正五年增一人掌官吏考課之事三載考績在內曰京察察以四格曰守曰政曰才曰年在外曰大計計以八法曰貪曰酷曰罷軟無為曰不謹曰年老曰有疾曰浮躁曰才力不及各聽察於其長而著跡於册凡京察合格一等官自內閣侍讀學士翰詹開坊以上外列加一級不入等者或降或罷與應加級官俱候引見欽定二三等皆仍供職凡大計不入舉劾者為平等上等卓異者優叙推升干八法者分别降革休致有差至內外官之處分各按則例别公罪私罪以定議焉稽勳清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌更名改籍終養服制兼稽在京文官俸廪焉驗封清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲蒙古漢人各一人掌百官之封爵誥敕贈廕承襲之事凡世爵之等有九曰公曰侯曰伯曰子曰男曰輕車都尉以上各分三等曰騎都尉曰雲騎尉曰恩騎尉其受爵之法則自雲騎尉始而纍加焉積雲騎尉二十六為一等公皆據兵部敘績之等次定之以及推恩外戚聖賢後裔明後延恩皆按典詳議奏行嵗計其承襲之爵編為皇册藏之內府凡封贈各視其品凡廕叙正一品子正五品敘從一品子從五品敘其下以是為差凡內外諸司之書吏並掌其名籍以資叙用臣等謹按初設滿洲郎中四人順治十二年增四人初設漢軍郎中二人雍正五年裁初設䝉古員外郎八人康熙六年並裁五十七年復設一人初設漢軍員外郎八人康熙三十八年裁四人雍正四年並裁初制凡滿洲䝉古漢軍司官自為額數不論司分悉聽堂官調撥嗣後各司雖設有定缺其隨宜酌撥仍聽之堂官惟漢司官仍論司分後各部院俱同堂主事滿洲二人掌文案滿洲二人漢軍一人掌章奏司務滿洲漢人各一人掌出納文書稽察書吏初設漢人司務二人順治四年裁一人十五年定滿洲漢人各一人後各部院司務建革同筆帖式滿洲五十七人蒙古四人漢軍十二人分𨽻各司掌翻譯清漢章奏文籍皇朝文獻通考卷八十
