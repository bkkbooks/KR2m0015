body:
  text: 田賦考八水利田乾隆十二年直𨽻總督那蘇圖奏霸州豐潤二處營田宜設專員以收實效上曰古有田畯之官巡行阡陌勸稼課耕宣布德化該督所奏專員經辦營田尚得古人遺意著照所請令管理之員親身督率加意經理如三年之後果能著有成效該督奏聞送部引見十三年諭江南淮海一帶州縣近年屢被災傷推原其故皆由山東沂郯等處上游雨水盛漲建瓴而下河道不能容納遂直注駱馬湖衝决六塘河兩岸子堰淹浸民田以海沭為歸宿小民蕩析離居甚屬可憫但查從前淮海所屬不盡失收即山東亦非盡無雨水盛漲之事何以至今為患愈劇而山東之以旱潦見告者亦迄無寧嵗必係該省水道所在梗塞蓄泄機宜久廢不講以致本處既告漫溢鄰境俱受淹傷相因為害至於如此上年阿里衮奏請開濬沂蘭等河朕命大學士高斌前往㑹勘查辦是否通盤籌畫可以永免兩省災傷抑係暫為一隅補救之計細閲伊等前後奏摺大槩加意修築堤埝而於該省全局及淮海一帶相因受害應作何疏濬料理未據詳悉議及著傳諭大學士高斌左都御史劉統勳㑹同該撫阿里衮將山東全省水道窮源竟委廣咨博訪躬親履勘務將近年所以致患之由并將來作何查辦毋致再被浸漫延及鄰省之處悉心定議該省見在加恩賑恤倘前項工程之外有應舉行者即照以工代賑之例隨宜興作俾災黎稍資生計亦一舉兩善之道也高斌等言山東登萊青曹四府見無宣泄機宜可言濟南東昌泰安兖沂五府境內皆有運河而武定各海口則分泄運河盛漲入海之尾閭也運河受漳衛汶泗沂之水兩旁承以諸湖水小則開湖以濟運水大則藉湖以受水其間山泉支港閘壩涵洞橋梁斗門皆有關於蓄泄今議德州哨馬營滚水壩宜落低以消漳衛之盛漲海豐之馬頰河聊城之徒駭河宜疏導以分運河之漲東平之戴村二壩宜落低以减運河漲溢之水濟寧之董家口宜引入白馬河歸湖濟運以衛民田沂州之江楓口宜築堤壩使入湖歸運以免旁溢至於沂河以南下注江南之駱馬湖但使山東之運道泉湖安流順軌即下游淮海之地亦可减免水患矣疏入下廷臣集議從之又諭據直𨽻總督那蘇圖奏稱正定府屬之平山令郭殿正於河旁度地勸諭居民自備工本營治稻田共九十二頃餘又阜平縣境內有大沙河濁流該令羅仰鑣沿河查勘督令居民實力墾營田五十餘頃於河道無所妨礙郭殿正羅仰鑣殫心民事朕甚嘉焉宜交部議叙朕自即位以來於凡開墾水利以及樹萟孶畜之事無不諄諄誥諭而至今未有牧令董勸有方如今那蘇圖所奏者則是各督撫及羣有司尚未明曉朕意也且此平山阜平二邑之民處山區瘠土而能不惜辛苦墾荒成熟至萬有餘畝是民亦知謀生加以勸導無不風行著各省督撫實力勸諭有司懋勤本圖無俾怠緩其有成效優敘例此茍或以熟作荒及將河湖灘地留以瀦水者妄行開墾致盛漲無所容納反受漫溢之患則國法具在不假借也十五年敕河臣督臣㑹議淮北修築墟岸事宜御史胡蛟齡言江南之邳宿贛沭諸州縣皆淮水下流而海州上承東省來源下鄰海浦每春夏之交栽植甫畢水患隨至有種無收率以為常宜倣江南墟田之法多為溝洫使足容水查乾隆十一年議海州等屬令有司勸民修築墟岸數年以來作何辦理情形乞下督撫諸臣確切定議疏入上令總河高斌總督黃廷桂㑹議尋據高斌等議言臣等查得海州及沭陽安東宿遷三縣築墟挑溝已經工竣阜寧贛榆二縣亦已勘明興修桃源清河二縣四鄉均係旱地並無水田墟岸有費無益竊思水利農田相為表裏墟岸之制誠為良法惟是地勢不同難以一律而論海州上承駱馬湖之水由六塘沭山兩河分注入海從前民間自築墟堰後經奏請動帑加築費至數十萬然遇山水盛漲之年民田無論有無墟岸均不免於水患誠以來源甚多下流甚窄容泄不及勢必橫溢不能强與水爭也至於墟岸之制惟宜於蘇松常鎮等屬其次則高寶興泰山鹽諸縣行之亦有成效蓋上游無異漲之水故墟岸得以施功若海州等八州縣在黃河以北一望平衍土性浮沙不宜禾稻民間惟恃春麥向有一麥抵三秋之諺一交夏秋則上游山水泛溢六沭交漲非墟岸所能禦臣等思水性地利之宜不容穿鑿而補偏救弊之方不可不盡所有各州縣已成之墟岸仍令有司督率民夫歲修至沙高土鬆并卑窪容水之地均不能强行修築如此則淮徐海各州縣春麥既可嵗獲豐稔秋成則合計數年之內亦可一二年有收庶沮洳之地隨時補救水患可漸减矣十六年諭曰朕經過淮安見城北一帶內外皆水雖有土堤為之防而人煙凑集之區設經異漲其何以堪亟應改建石工以資保障著確勘詳估及時建築毋忽令於高梁橋迤西營治水田大學士傅恆等言高梁橋迤西近河地畝俱可營成水田請交順天府并派內務府官勘定經理從之詔疏濬京城內外水道又諭曰朕今嵗南巡浙江見蕭山㑹稽一帶河道淺窄復聞夏旱之時河流淤涸舟楫難行朕思疏濬河道本以便民若乘此時以工代賑開通深廣足垂永久之利該督撫即行相度估計奏聞辦理外此或有當疏濬興工之處該督撫次第酌量修舉俾貧民得資糊口二十一年諭據楊錫紱奏荆山橋河身淤淺出水甚少以致滕嶧等縣積水難以宣泄今歲孫家集黃流漫溢淤墊河身致荆山橋下過水不能通暢自宜設法疏浚俾附近田廬永免淹浸著總河白鍾山悉心查勘奏聞辦理二十二年命侍郎夢麟勘視荆山橋工程築駱馬湖隄河道總督白鍾山等言微山昭陽諸湖逺承豫東二省之積潦近受黃河北岸之漲水見已疏通荆山橋上下河道由王母山入運而來源既大運河盈滿勢必歸入駱馬湖湖北受沂州諸山之水西受微山湖水其尾閭居六塘河之上游今湖隄在在殘缺亟請修築以資捍禦從之敕建海神廟於杭州省城詳見郊社考以江海大溜直趨中小亹兩岸沙灘日長瀕海諸邑無水患故也又諭山東之濟寧金鄉魚臺滕嶧五州縣上年被水地畝見已涸出補種者不過十之二三其餘或雖已涸出而泥濘難於耕種且積水一二尺至五六尺不等者此時若能亟為疏濬尅日消退晚禾荍豆尚可乘時布植使再延至五六月間則大雨時行愈難經理矣頃巡撫愛必達自江南來奏稱荆山橋至小梁山一帶水勢通溜無阻徐州城東狼矢溝積水一百六十餘頃已經開放四五日內即可涸出是下游既已疏通積水即當宣泄何以此五州縣內尚有水深至五六尺者耶著鶴年速赴荆山橋一面知㑹夢麟白鍾山同至工所㑹同查勘速為妥協籌辦務使農民得以補種晚禾以慰朕念江南山東地界毗連救災恤患事屬一體兩省大吏不可稍分畛域沛縣等處亦應一律查辦又諭六塘河以下為沂沭諸水下游見有餘潦停積桃源宿遷諸縣阻黃臨運為堤堰所隔積水無由宣泄窪地多成巨浸農民失業堪憫或應添建滚壩或應酌建涵洞或開導溝渠瀦為陂澤水减一分則民間受一分之益著侍郎夢麟率該道吳嗣爵等速行確勘次第妥協辦理至下河高寶諸湖之水入江入海各有分途小港支渠排比行列但或淤或淺以致水無所歸不特沿海興鹽七邑被其患而高寶首當其衝城垣廬舍亦重為可慮當使近江者入江近海者歸海條理井然深通暢達不致泛濫田畝則所全實多嵇璜請於昭關設滚壩一座滚壩之下復開支河南關舊壩改建滚水石壩此項工程并一應支河即著嵇璜率同何煟董其事又諭曰朕此次南巡親涖河工為積嵗被災羣黎籌疏泄之方捍禦之䇿者宵旰靡寧冀收實濟近據山東巡撫鶴年奏報山東之金鄉魚臺等州縣未涸地畝尚有一千餘莊因思此方積潦再經伏雨秋霖將益苦泛濫而上江之宿虹靈壁等處河南之永城夏邑等處在在皆有積水計漫淹地界不下數百里此其受病非一朝一夕驟致蔓延蓋其始皆由於地方官漫不經心偶遇水災不亟為籌度日復一日因循釀害積水日益增淹地日益廣以致高下田廬盡成巨浸及至受害既深自非大動帑項厚資工力不能奏效而大小各官又莫能深悉受害之由確得祛患之術惟恐議疏議築虧帑遺纍遂爾噤口束手坐視其民為魚而莫展一籌見今水患已不可勝言若不及時徹底籌辦將來何所底止著侍郎裘曰修馳驛前往山東河南上江積水各州縣往來周視寬以時日熟察情形咨詢輿論勿憚再三其在山東者與鶴年㑹商在河南者與圖爾炳阿㑹商在上江者與高晉㑹商其地方官有熟悉水道之員聽其酌量差委務在通盤籌辦無分疆域凡可以登民衽席計安全而謀樂利者果歸實用毋惜多費帑金朕痌瘝一體南顧疇咨輾轉憂勤之思皆諸臣所共悉其深體而共勉之以副委任令江南督臣等辦理湖河修濬各工程嵇璜言淮揚運河東隄减入下河之水自邵伯以北者皆歸海邵伯以南者皆歸江下河入海之路從前所建各閘丁溪小海地勢外高不能泄水其草堰劉莊伍祐新興等場分注鬬龍港新洋港等口歸海皆得地勢之宜今請於伍祐場之蔡家港添建五孔石閘二座挑引支河歸新洋港入海又石䃮閘天妃越閘裏頭塌卸應請修補各閘下支河年久淤淺應請挑濬射陽湖形勢灣曲應引使徑直趨海泰州之孔家涵鹽城之岡溝河皮坌河皆應浚治運河東堤之郎兒閘子嬰南閘邵伯三閘年久傾圮應請拆修此皆下河歸海之路也但湖河水勢歸江近而歸海逺歸海紆回而歸江徑直多一分入江之路即少一分歸海之水運河入江之路芒稻閘董家溝石羊溝廖家溝四處閘壩共寬八十六丈邵伯以南運河東堤舊設金灣六閘金灣滚壩東西滚壩東西灣壩鳳凰橋壁虎橋灣頭閘諸處共寬九十餘丈上下相應以導水入江今止有金灣六閘并灣頭閘過水合計七閘口門僅寬十二丈八尺尚不如芒稻東西二閘之寬應將金灣滚壩金灣北閘改低一尺東灣壩改低二尺五寸鳳凰壁虎二橋下淤灘挑深東灣壩添寬十二丈壁虎橋之上另開河頭十二丈滙入壁虎橋引河內又邵伯諸湖遞注之引河亦多淺阻應將湯家絆引河改向西南王家莊東首另挑引河引朱家湖入尤家窪下接挑新河一道由蕪城墩引入越河此皆湖河歸江之路也至於宣泄機宜惟在冬春初夏若六月以後江面既高潮汐又大雖盡開閘壩而泄减無多且山旴五壩寬三百三十丈又益以蔣家壩十八丈而歸江閘壩止八十餘丈來水幾五倍於去水必須長年開放寸寸泄减俾高寶諸湖豫留過水之地斯不至壅溢為患而芒稻閘河為鹽艘必由之路閉閘以濟鹽運則河工坐誤啓閘以利湖河則鹽船或阻查灣頭至丁堰之運鹽河道淺深不一甚有淺至尺許者應請一律挑深以芒稻西閘底水深五尺為度使鹽河長存五尺之底水則鹽船可以遄行而沿江閘壩可以長啓矣疏入諭曰嵇璜奏湖河宣導機宜并應疏應修各工一摺頗中肯綮運河减泄之水歸海路逺歸江路近然亦有不能歸江之處此皆南巡得之目擊者今分别緩急因勢利導俾田畝資其灌溉水漲不受淹浸所言頗合朕意但向來地方各官州縣局守一隅不能通盤籌畫而大吏又因循草率憚於動帑興工每致臨時竭蹶節節補苴迄無成效今㑹全局而熟籌之綢繆於先事其中改紆為直移逺為近濬淺為深所奏應疏應修各工具有條理不必更行交議著照所請交與尹繼善白鍾山普福等㑹同嵇璜於應動工時次第興舉所需帑項照例分别動支該督等其董率屬員悉心辦理俾下河民生永有禆益又諭曰今日召見陳𢎞謀詢及各省水災據云皆因上游為衆水所滙而下游無所歸宿必當㑹同通盤籌畫方為有益其言頗中肯綮江南山東河南壤地相接數年以來頻罹水患而今年為最朕早見及此於閲河時即已諄切訓諭并分命欽差及督撫河臣相度籌辦而時已首夏不及措施竣事者荆山橋上下百餘里及清河積水而已豫兖之境則被災之地較廣人户田廬撫恤者不下數十州縣南望為之惄然傷懷轉瞬秋冬正工作可施之候若不先事而亟圖之徒坐視其年復一年橫流四出直至臨時張皇補苴何所底止耶山東之水滙於淮徐河南之水達於鳳潁該督撫等雖各守封疆要不得各分畛域况此嗷嗷災黎皆朕赤子大臣公忠體國之謂何而忍稍存分别見乎在今日言之㑹三省之全局而川澮以疏之隄防以禦之工費誠屬浩繁然一舉而使千百里之田疇民舍可以永獲安全則生民之利孰大於是即多需帑金所不當惜况統屢年賑恤所用計之為數果孰多孰寡耶在國家蠲賑未嘗不動盈數百巨萬而小民已先受蕩析之苦即使為督撫者皆能體朕愛民之心郡縣之吏又悉良有司撫恤極其周經理極其善而災黎所得日才以升合計度命而已何如無災而得中歲蓋藏稍裕之為自能樂其生耶且水非旱比赤地千里待澤上蒼非人力所及有吁嗟籲禱而已水則治之專藉人工所難者治之當得要領及任事當求忠實勇往之大臣耳前曾以此諭尹繼善伊於地方情形非不熟悉惟恐辦之或無成效動曰地處窪下而治之亦不能保其不被水患夫治之而仍受水患此自未得治之之道耳豈終不可治耶乃以是藉口而委之不治是正因噎而廢食矣江蘇巡撫陳𢎞謀安徽巡撫高晉山東巡撫鶴年河南巡撫胡寶瑔皆能任事之大臣所有三省積年被水之由應如何相度形勢從長計議俾可永弭水患之處著該撫等各於所屬境內悉心查勘仍復彼此㑹同詳籌妥辦侍郎裘曰修夢麟往來查閲隨時商酌其有應㑹兩總河者亦著㑹閲詳議諸臣膺茲委寄務各矢實心和衷共濟以慰朕念切民瘼宵旰憂勞之至意又諭豫省之衛輝等府屬被水田畝見據侍郎裘曰修奏令地方官督率民夫開挖淤沙引入大河其距河逺者即於原有坡河就近開通俾田水有所歸以期普行涸出不誤春麥等語疏濬溝塍原係民間自理之事但該處當被災之餘民力殊堪軫惻著通飭各屬於派撥民夫每日按名量給飯錢亦屬寓賑於工之意該部即遵諭行又諭尹繼善奏酌籌沛縣疏泄事宜一摺內稱山東湖口閘與韓莊閘相近雖為蓄水濟運實亦泄水尾閭而該閘僅寬丈餘不足宣泄又沂河自北而南流入駱馬湖近因水大於邳州之盧口向西散漫入運與荆山橋泄下之水相阻以致不能通暢皆為沛縣受病之由此言頗中近日形勢而沂水不使入運尤為切要蓋諸湖向以濟運而邇年運河之水不患其少惟患其多良由橫决之水散漫入湖以致湖不能容溢而入運運益不能容併為巨浸運艘阻滯旁邑為災皆緣於此不可不急為籌辦其應如何設法堵築使沂水各歸駱馬湖及湖口一閘應如何添建滚壩俾得暢為宣泄而不致橫流微山入運之處著該督等通盤詳加勘閲繪圖具議以聞又諭江南督臣所勘水利各工速行興修時尹繼善言南陽昭陽微山等湖宣泄之路有二一由荆山橋至王母山入運一由山東湖口閘入運請於湖口閘添設滚壩及河清河定河成三閘越河俱挑寬五尺使湖水得以宣泄又請堵築王家溝草壩口門使駱馬湖水不得由此入運疏入諭曰尹繼善奏稱湖口閘應添滚壩及河清河定河成三閘應挑越河各工見已咨商白鍾山張師載等次第籌辦等語所奏并圖中所指工段於該處情形頗中肯綮惟是近年受患全因湖流宣泄未暢所有關係宣泄機宜既經查勘明確該督即當㑹同欽差及河督等速行相度興工蓋此數百里中久遭泛濫災黎待拯刻不可緩雖籌畫不厭精詳而興修不容濡滯咨商往返坐耽時日轉不免築室道謀圖中應舉工程甚多轉瞬冬令必須乘此時動工庶可於歲前竣事稍或遲延則明年春水方生又妨工作且該處民田久被淹浸無西成可望更無慮傷及秋禾亦復何所瞻顧而不亟亟為之耶著裘曰修夢麟尹繼善白鍾山嵇璜張師載及各該撫等凡有先後勘明各工權其輕重緩急就中最要者速即同時並舉餘亦次第興修均於嵗內告成以收實效總之各工早竣一日則水患早弭一日諸臣其同心協力奮勉趨事以副朕奠安民生至意尹繼善等又言沂河源出山東至邳州盧口地方正流由駱馬湖入六塘河旁流由盧口壩入運緣舊壩口門寬至八十丈年久刷深旁流過多有礙運河宣泄但沂水來源甚大若遽行堵閉不但暴漲之時全注六塘為桃宿清沭之患倘遇運河水小之年亦無以接濟擬將石壩口門祗留三十丈壩底填碎石以為節制使沂水大半歸湖仍留二三分濟運至目下運河之水惟患其壅滯無需接濟應於盧口築草壩堵截使沂水不得涓滴入運又六塘河處駱馬湖下游為宣泄沂水之要道應加挑浚其入海之武障義澤東門白蜆牛墩六里等河間有淺阻俱應挑治并請開小冲河五圖河俾下游多增入海之路俱從之又諭裘曰修高晉等奏㑹勘宿靈虹積水情形籌辦疏浚事宜一摺於水勢之來源去路頗為明晰所言歷年受病之由及目前利導之法已俱得其要領見奏疏浚各工應興舉者即行興舉不必㑹商往返致稽時日朕為百姓生計並不惜費惟期用之於實永逺消患而已至毛城鋪為濉河上游欲濉河之無淤墊計惟有堅閉毛城鋪茍非盛漲不得開放萬不得已如今歲之自行漫溢即當於斷流之後將淤沙盡力挑浚若少因循則今年淤一尺明年即淤二尺河身墊高節節阻礙年復一年其淤更甚故逐年挑濬深通是為要務其濉河下游皆達於洪澤湖而洪澤湖以清口為出路前經指授河臣於汛前將草壩拆卸俾得暢流已有成效嗣後即以此為法不待盛漲一遇水勢長發隨時酌量拆卸草壩預為减水之地從前惟恐運河水少故須蓄以濟運今則惟患其多所當因時審度不可執一而論也所有見議應開支河趕辦竣工去纍年淤阻泛濫之患不特宿靈虹等州縣漸有起色上游豫東諸積水皆有所歸民生利賴所關甚巨諸臣其共勉之時裘曰修等言宿靈虹諸州縣被水之田緣豫省商虞夏永四邑之水畢滙於宿州所恃以宣泄者惟濉河一道而濉河自徐淮口至符離集七十餘里因上年毛城鋪諸閘减泄黃水太多沙於平岸河形全失濉河既不能容納則豫省諸水及宿州諸山水散流漫衍遂於徐淮口南北分為二股南一股自張家溝至猪羊山冲斷驛路下至時村由唐溝歸入濉河北一股自牛家樓至大頭山高里壩於時村迤下三村歸入濉河臣等議濉河上段已成平陸難以施工擬即就兩旁冲出之河形因勢利導分一河為兩河至符離以下仍入於舊河俾上游散漫之水得以順軌分流自符離至靈壁之霸王城百數十里河身亦間有淤墊應加挑深通以暢去路至霸王城以下為靈壁之五湖從前楊疃土山陵子崔家孟山五湖原各為一湖今則連而為一其地最窪即多開溝渠亦屬無益不若捐之於水以為瀦蓄之道其水沈地糧題請豁除至虹縣之板橋各小河口則濉河之入五湖者至此復露河形分為二支一由謝家溝經古汴河一由烏鴉嶺經歸仁閘下安河俱入於洪澤湖此兩支亦宜開浚以免阻礙其他支河之在宿州者有彭家溝河柏山河在靈壁者有斗溝拖尾河沱河在虹縣者有荀家溝嶽家河皆須挑浚以暢分流之勢虹縣又有潼河年久淤塞宜改從潘家山南達於董家溝較為徑捷此三州縣應修之水道也惟是下游之下復有下游洪澤一湖以清口為去路前䝉聖明指示河臣將草壩拆卸以暢其流若每嵗皆應期開放俾上游之水隨來隨去則來者雖多而去者能速不致壅閼於一時矣巡撫高晉又請浚治潁州府屬之兩河口急三道河茨河明河淝河武家河宋湯河鳳陽府屬之柏家河裔溝河黑濠河濕泥河俱報可令疏浚河南幹支各河裘曰修胡寶瑔等言豫省自滎澤以下北阻大河南則連山橫亘諸水所經惟以正東及東南兩面為去路正東則江南宿州之濉河向因徐溪口等處梗塞以致豫省之巴河響河豐樂河皆無出路下阻則上淤此商虞夏永四邑被水之由也東南則以江南潁州府之阜陽太和亳諸州縣為出路淮水之大本能宣泄而兩省犬牙相錯之處淺阻亦多豫省之水濡滯而不下則豫省受其患繼之則極漲而潰奔流四溢其患又且及於上江此開封陳州迤下及於歸德之柘城鹿邑汝寧迤下及於西平下蔡水患之由也今濉河已奉㫖興挑而潁亳一帶亦且次第疏導則去路可以無阻夫而後水之在中州者可得而治也豫省東面之幹河在商邱則為豐樂河在夏邑則為響河在永城則為已溝實即一河而旁受惠民溝陸鄰溝毛家河虬龍溝岐河諸水河身既窄深不過四五尺亟宜大加挑治東南一面之幹河以大沙河為大即古之潁水見在深通毋庸疏治其他則賈魯河歷祥符尉氏扶溝西華淮寧五縣入於大沙河自尉氏以下宜加挑濬又有惠濟河在開歸陳三府之中分賈魯河之水以達於淮向皆淤阻宜通身浚治又有渦河經通許太康柘城鹿邑諸縣入亳州界以達於淮下游淤阻自鹿邑以上漫口甚多亦當挑濬此外如永城之漕溝夏邑之毛家河小引溝觀音閣引河白河三汊河虞城之惠民溝商水之北沙河大澗溝鹿邑之清水河汝寧府之洪河汝河均有間段窄淺之處亦宜遍加疏濬如此由引河以達於支河由支河以達於幹河其不能歸河者或於田間多作溝渠以為導引或窪地聽為藪澤以資停蓄總使有源之水既得下注而潢汙野潦亦有所約束而不至於散溢則水道治矣疏入得㫖報可浚山東之伊家河從巡撫鶴年等議以泄微山湖之水使由梁王城入運也又裘曰修等請挑兖州之府河洸河及改金口閘涵洞為減水閘改楊家壩為石閘俱從之又諭嵇璜奏高郵運河東隄添建石壩已竣并請酌定水則如上游五壩過水漸多車邏南關二壩過水至三尺五寸開放五里中壩若車邏南關二壩過水至五尺再開放新建石閘視水勢之大小以為啓閉自無壅潰之虞此所見深得蓄泄機宜蓋湖河水勢以五壩為來源以江海為去路而歸江之路近於歸海况下河一帶地本卑窪必視歸江諸閘壩實有宣泄不及之勢始可以次啓放今春南巡時親臨指示令將車邏南關二壩常行開放俾湖河得以隨時减泄而又早闢歸江之路以達其流下河田畝遂獲豐收此已試之明效自當酌定水則以時啓閉著照嵇璜所奏過水尺寸立志壩旁以垂久逺嵇璜又言高郵南關車邏二壩下引河應切去灘嘴俾過水順暢不致漫溢民田高郵之官河南澄子河北澄子河均有淺阻應挑濬以導兩壩之去路再寶應湖下之小新河廟基港蔣家壩下之金叉澗高郵湖下之越河王家港俱應疏挑深通庶冬春水小之時得以遞相灌輸騰空湖面以多留山旴五壩過水之地諭速為之二十三年浚芒稻閘越河尹繼善等言芒稻閘為湖河歸江最要之尾閭宜常行啓放使湖水分泄於冬春水落時早為騰空以備伏秋容納之地但芒稻河乃鹽艘必由之路若徹底啓放則礙鹽運查鹽艘向由芒稻閘出灣頭河今改由芒稻閘迤東越河直走金灣北閘則泄水與運鹽分為兩途實於水利有益惟越河水勢淤淺應再挑深五六尺并請將金灣北閘底改低二尺四寸以利挽運從之又諭豫東黃河大隄相隔二三十里河寬隄逺不與水爭乃民間租種灘地惟恐水漫被淹止圖一時之利增築私埝以致河身漸逼一遇汛水長發易於衝潰滙注隄根即成險工不知隄內之地非隄外之田可比原應讓之於水者地方官因循積習不加查察名曰愛民所謂因噎而廢食者也著河南山東巡撫飭該地方官曉以利害嚴行查禁俾小民知所顧忌不許再加培築又諭夢麟奏微山湖水漸次疏消其湖口泄入荆山橋河所有分引支河三道近來疏消已暢是以湖底漸涸出路亦漸逺隨經接挑引河三百餘丈源源導引見在湖流自不致壅滯但將來非得專員查看隨涸隨挑恐日久又成淤墊著傳諭尹繼善白鍾山等派道員專司其事不時查勘如有水涸沙屯即陸續挑挖俾永逺疏通足資宣泄母使已成之功復致堙塞也又諭尹繼善奏查勘宿桃等屬工程情形摺內有將駱馬湖尾閭商之河臣早行開放使湖面騰空以待汛水之語此湖河第一緊要之務也湖雖所以瀦衆水而不為之及時宣泄則停蓄既多鮮有不致漫溢者向來治河諸臣不思達其去路而惟恃湖隄以相捍禦及湖漲難容終至泛溢不收而逺近田廬胥受其害矣駱馬湖之水由六塘河下泄而東流入海其河之兩岸則宿桃安清海沭六州縣田廬在焉伏秋大汛民生攸繫若使湖面早為騰空則汛水之來有所容納盈科後進源源下注湖水無泛漲之虞而六塘河兩岸亦斷不致潰决四出矣豈惟此六州縣之利其瀕河一帶運道民生亦咸奏安瀾之慶尹繼善既已商之河臣早為開放尾閭以為預騰湖面之計應如所奏速行此後每嵗大汛之前應行開放時著總河㑹同該督先期奏聞以免因循觀望并將此㫖勒石湖濵俾後之司河務者永逺遵守焉又諭陳𢎞謀所奏籌辦溝洫墟圍情形已於摺內批諭矣淮揚各屬水利見經相度挑浚大工告竣其溝洫墟圍乃係隨時葺治禆益農田之事雖當悉心經畫然須次第從事若以意在保護民田而與水爭地轉貽日後之患此又不可不為顧慮者所謂修廢舉墜亦當隨宜籌度者此也如高寶海州等處從前舊有墟田自應隨時酌量修理以資生計若所云湖蕩可為墟田遽欲勸導興築恐此等窪下之區原皆留以瀦水今若任民圍田設遇水勢盛旺不溢而為上游之患即漫墟而過冲潰必多又安在其為利民耶雖謂附近居民原所樂從並非强令興舉但小民惟知占地之近利豈能深計全局况今年甫獲豐收民力未甚寬裕地方官正宜體恤未便槩責以力從趨事此於數郡民生甚有關係其實在情形非詳加體勘難以懸定著交與尹繼善㑹同該撫再行悉心查看酌議奏聞請㫖尹繼善等議言溝洫墟圍之工原以資蓄泄備旱潦但若任民圍築阻礙水道必為上游之患臣等遵㫖督率各屬因地制宜或開溝以泄水或築墟以衛田舊墟之殘缺者補之舊溝之淤塞者疏之凡低窪湖蕩仍留為瀦水之區不許圍築其通湖蕩之水路並令酌量留寬寧讓地與水不與水爭利各處挑浚溝洫務與新浚之河道脉絡灌注新舊墟溝各别緩急以三年內全完庶民力舒徐而積歉之區元氣可以漸復從之皇朝文獻通考卷八
