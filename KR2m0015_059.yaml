body:
  text: 欽定四庫全書皇朝文獻通考卷五十九選舉考十三考課臣等謹按虞書三載考績黜陟幽明周官六計弊羣吏以亷為本重有守也漢法刺史以六條察二千石唐以四善二十七最課其屬分九等定考金制十七最視唐為簡易矣宋遼元明代有考課之法然如明末邱蕣所奏八事請託公行貪墨不禁徇資格以判等差結私交而忘公義則察吏之典固已蕩然我國家定鼎之初懲明季之舊習重為掃除京察大計時內而六卿外而督撫或加銜或鐫級或竟罷斥之莫不指其優劣立示勸懲凡朝覲官員召對殿迋申嚴戒飭至再至三我聖祖仁皇帝御極六十餘年每優擢亷吏皆至顯官世宗憲皇帝吏治肅清小亷大法乾隆七年廷試進士制策有云康熙年間有清官雍正年間無清官非無清官也夫人而為清官也治化重熙垂于今日我皇上春溫秋肅上繼列聖之鴻規去繁文而求實效考試詞垣澄清臺省督撫藩臬定朝覲之期守牧令丞拜章服之賜兼以六飛巡幸所至入疆循覽褒擢時加昔之以勸課農桑觀風問俗為殿最者至是而得其實焉臣等謹按年編纂我朝選舉之法于斯大備矣天命八年奉諭㫖朕于八和碩貝勒設大臣八人副之者欲察于心也誰則以己之事人之事視為一體而公以持論誰則于己之事非是不自引咎而變色拒諫爾八大臣公察之知其非即直言責之不受以聞朕設爾等之意此其一至于國事之何以成何以敗當深為經畫有輔弼帝業者則稱其堪任而舉之有才不勝任者則指其無能而劾之此其二總兵以下及諸武臣凡行軍之事宜謀其何以得何以失若野戰須何器具若攻城須何器具凡應用者修治之能將兵者則稱其能不能將兵者則指其不能此其三若不肖者不降不革則惡無以懲賢者不舉不用則善無以勸爾等果能經理國事各得其宜則朕之心自泰然而愈快矣天聰五年奉諭㫖朝廷黜陟以昭勸懲而人才亦宜矜惜向日官員獲罪不論應贖與否槩行削職似覺未當嗣後自總兵官以下備禦以上功績茂著者或宜超升或宜叙升量加遷擢若犯罪應坐者或宜削職或宜降級亦量罪處分六年定城守官員考課例滿洲耀州鞍山牛莊東京薩爾呼鐵嶺甜水站析木城威寧營張義營等處並有城守官員三年任滿者令赴瀋陽考察功過有功者賞有罪者革職仍令留任供職三年再行考察各遣還駐守原地八年考察管轄漢民各官時考察各官以撫養之善否户口之繁減分别優劣參領殷廷輅所轄耗損甚多更改冊籍詭稱逃亡病故所司察核知屬揑造事聞上以其不善撫恤既致民數耗損且素行詭譎遂誅之筆帖式席喇布為廷輅改造冊籍亦鞭一百貫耳鼻崇德八年各部尚書侍郎等奉諭㫖爾等誠能擔任部務克矢公忠有見即行勤勞罔懈三載考績即行擢用倘獲罪愆亦必降黜决不爾貸都察院奉諭㫖爾等俱係朝廷風紀之官向來諸王貝勒貝子公等辦理國政及朝謁勤惰原屬吏部稽核今官員聽之吏部王貝勒等應爾衙門稽察有事應糾參者須據實奏聞方為稱職若瞻狥隱匿有負總憲之任三年考核必不少貸順治元年順天巡按栁寅東疏言察吏務清其源吏部掌銓衡統百官吏治之源也若監司守令各當其職自然政治亷平太平可致近見升除各官凡故明犯贓除名流賊僞官一槩録用雖云寬大為治然流品不清奸欺得售非慎加選擇之道其為民害不可勝言是所當亟清其源也攝政和碩睿親王報以經綸方始治理需人凡歸順官員既經擢用不必苛求此後官吏犯贓審實立行處斬二年四川道監察御史張濩疏言盜賊竊發皆因有司惟知善事上官不暇軫恤民瘼今有司殿最宜以守已端潔實心愛民者為上考撫按注冊達部久任責成三考奏績不次擢用若僅幹理簿書惠鮮無策雖有才能止注中考下部議行三年吏部奏言朝覲考察之期定于次年正月舉行其應行事宜首重五花冊臣部即照舊式頒發各撫按令其䟎造齎送朝覲官員姓名起程日期限十月到部其應朝覲官員俱限十二月到京違限者參奏不許私自馳驛分外科擾賢否考語一惟撫按定注考語止用才守政年四格須按人指事明白直書不許鋪叙繁文如有毁譽狥情是非顛倒者論如法從之四年奉諭㫖天下人民困苦極矣朕既出之水火而隨與監司守令共圖治平蓋四載于兹奈明季之積弊難除頽風猶煽有司則貪婪成習小民之疾痛誰憐司道則賄賂薰心屬吏之貞邪莫辨瘡痍未起朘剝彌工流離顛連未見何方招撫萑苻嘯聚不聞何道消弭朝廷之德意時勤郡邑之沮格如故優遊日月夤覬升遷雖婪墨間有糾彈而姦滑每多賄脫朕甚憤憤兹當大計已嚴飭所司貪酷重懲闒冗罔貰爾等姑准留任仍服舊官尚思祓濯前愆勉圖後效滌穢濁以清亷易煩苛為寬大于以助流愷澤永保治安庶稱朕奉天子民至意嗣是每遇大計入覲之年必嚴切訓諭之吏部奏言計典三年一舉乃舊例也目今廣輿大勢漸次盡入版圖請以三載考績為定制自順治五年至七年合天下之羣吏而大計之庶大典畫一易為遵守填注考語用才守政年四格才則或長或平或短守則或亷或平或貪政則或勤或平或怠年則或青或中或老督撫按考定咨達部院衙門嚴核造報不實者指參其八法處分貪酷革職提問罷軟不謹革職年老有疾休致才力不及浮躁者酌量降調雖有加級紀録不准抵銷大計處分官員不准還職八年都察院甄别臺員分為六等擬應差用者二十二人應內升者二人應外升者十一人應外調者四人應降用者五人應革者八人疏入報可又奉諭㫖國家設官圖治必公忠自持殫力報效方能禆益民生共襄盛治若藉權行私肥已蠧國不知開代紀綱不念民生疾苦此等不肯自愛之人徒取備員毫無實效皆由用人無定衡之故朕自親政以來屢下詔諭嘉與更始近見部院諸臣因仍前弊未能滌洗肺腸托名熟練持祿養交習為固然其有年屆懸車貪戀爵祿豈真有心報國不過假借朝廷之官為養身之計朕今令吏部具列各部院堂官職名親行更定與天下見之又奉諭㫖邇來吏治敝壞不肖者脧剝民財營求升轉稍知自愛愛民者因上官舉薦不公不覺操守頓易至于不識文義之人益不勝任文移招詳全憑幕友代筆轉換上下與吏役通同作弊貽害百姓督撫不行糾察大乖法紀嗣後應嚴行甄别有德有才兼通文義者著保奏其不識文字聽信吏役害民者立行參劾不得姑留地方如督撫狥情隱蔽不行糾參即為溺職事發一併治罪至于銓選之時爾部考試告示文移等項優者選用劣者除名澄清吏治大端在此內外各官著遵諭實力舉行都察院議巡按在差事跡宜核每一差為一冊自出都以及入境一應條陳舉劾勘報等事按日登記差回之日公同考核三日內議定優劣具疏奏請分别勸懲從之九年吏部奏言朝覲計典三年一行舊例府州縣正官入覲勢必委署但署官害民反為地方之纍今議止令藩臬各一員各府佐一員代覲從之吏部奏言京察應以皇上親政辛卯年為始六年一次遇寅申年舉行嗣是兵部奏准舉行軍政年分與京察同從之十年上幸內院閲大計疏謂大學士范文程等曰貪吏何其多也此輩平時侵漁小民兹當大計之年亦應戒懼文程奏曰彼平居未仕時亦知貪吏不可為一登仕籍則見利智昏矣上曰此由平素不能正心之故也茍識見既明持守有定安能為貨利搖動乎臣等謹按洪範之稱好德也有猷之後繼以有守蓋人苟不能自堅所守則所求取者既多動多窒礙雖見地未嘗不明才力未嘗不裕而為利所餌不能自展其用則一變而摸稜再變而阿附而人品遂不可問故明積弊貪墨成風我朝定鼎之初每朝覲官員必嚴切警戒之兹當世祖章皇帝親政之始首嚴墨吏之罰天語從容以正心定守為諭㫖簡而意該操約而行逺聖有明訓即為萬世官針奕祀臣工所當奉而弗失者夫飭各衙門事件依限注銷六科奉諭㫖朕惟內外本章關係民生國計豈宜遲延時日如往年部臣稽遲事件朕察出罰治而科臣竟不預行摘參又不具疏認罪已職不盡何以糾人著六科將六部都察院從前奉㫖應銷事件挨順年月各造清冊逐月進呈以後俱照舊例嚴行注銷應催完者催完應摘參者摘參務使各衙門承行事件刻期注銷其行各督撫按者亦定限報完內無留滯外無推諉若曕狥容隱罪必不宥定大計年科道糾察拾例故事三年大計冊報在撫按考察責在部院糾拾責在科道順治四年科道拾遺被處者多科臣魏象樞疏奏拾遺緊要得㫖以後科道糾拾官員照大計一例處分科道官有挾私妄糾者著吏部都察院指實參奏又奉諭㫖國家設翰林院衙門原為儲養人材以充侍從之選故特選教習滿書官員令伊等兼習滿語滿文以資奏對講讀選授之時惟擇少年以其易于學習也今計三科之內有經六七年者有經三四年者朕親臨內院面試若不加分别伊等何由激勸今將通滿洲文義者三人不拘資俸以應升之缺用其次可造者十二人仍各照原銜責令勉力習學俟再試分别其全未通曉不能成文者五人理應調外念伊等曽入詞林數內姑著調六部用又奉諭㫖朕稽往制每科考取庶吉士入館讀書厯任編檢講讀及學士等官不與外任所以咨求典故撰擬文章充是選者清華寵異過于常員然必品行端方文章卓越方為稱職乃者翰林官不下百員其中通經學古與未嘗學問者朕何由知今將親加考試先閲其文繼觀其品再考其存心持己之實據豫求其學備朕異日顧問自吏禮兩部翰林侍郎及三院學士詹事府詹事以下各候朕㫖親試分别髙下以昭慎重詞臣之意尋經考試御筆親定去留其留原衙門者照舊供職少詹事王崇簡侍讀學士喬廷桂侍讀王炳昆侍講法若真韋成賢諭德張爾素中允王一驥傅維鱗王紫綬贊善喬映任李培真編修宋杞傅作霖王大礽張宏俊張天植胡亶張道湜安煥髙光䕫檢討李廷樞俱從優外轉因諭吏部國家官人內外互用在內者習知紀綱法度則內可外在外者諳練土俗民情則外亦可內內外敡厯方見真才朕親試詞臣量為分别有照舊留任者有改授外任者其外任編修以上官照詞臣外轉例優與司道等缺如年衰病弱者聽其請告朕仍優遣之吏部都察院奉諭㫖朕惟內外官員佐理天下外官計典十年內已三舉行京官殿最亦當察核除吏部侍郎及學士詹事等官朕親行考試區别外其六部等衙門有年老疾病不能任事及素行不孚衆論或才力可外任者俱令各部堂官自行詳察嚴核彚送吏部都察院同吏科河南道議奏其通政司大理寺太常寺太僕寺等衙門堂官開送吏部都察院同吏科河南道察核具奏嗣據各衙門甄别具奏照八法例分别辦理考試歸旗遼人柯汝芝等六十九名上上卷授知縣上卷授通判吏部奉諭㫖總督管轄兩省巡撫専任一方得其人則事治民安非其人則叢姦滋弊民受其害如不行考核賢否無辨何以示勸懲著以順治十一年起爾部㑹同都察院矢公矢慎將各地方總督巡撫嚴加考核分别確議具奏不許通賄行私朦蔽狥縱向來推用督撫但止舉侍郎布按嗣後遇有督撫員缺不拘品級務從公㑹推擇其品行才猷素著者將政蹟事實詳注㑹推本內毋得聽受鑽營濫舉匪人朕以澄清吏治責之督撫考核督撫責之部院如推舉不公著都察院科道指實糾參旋甄别各直省督撫稱職者加銜加級不稱職者降級革職分别處分以示勸懲十一年吏部奉諭㫖朝廷設立言官原為矢忠進諌糾彈不法近來言官未見有建白切當及糾參顯要者皆因懼被論之人反脣仇訐遂爾緘口自今以後凡被論者如有辨處止許就所參事款據實剖白不許反脣仇訐有乖法紀言官亦不得挾私誣揑自取咎戾其參奏公私當否或現任或升任考察京官之時該部分别核奏以為勸懲爾部即行嚴飭十二年飭考選軍政照文官例卓異者賜服旌勸從兵科給事中張文光請也內三院奉諭㫖考選庶吉士原欲儲養真才以備任用必須懋勉學問時加策勵乃能練習典故博通文章無負朕親行簡拔之意除照舊教習館試院試外今後滿漢庶吉士同讀書一甲翰林每二月朕必面試一次以辨勤惰髙下每嵗六試著為令定官員考滿議叙例初次考滿大學士六部尚書有應加宫保銜者俱候上裁學士侍郎及通政使司大理寺等衙門正卿有注優考者作何加銜亦候上裁二次考滿仍列優等者加一級照舊供職二等者紀録三次考滿一二等者照前議加級紀録啓心郎侍讀學士理事官初次考滿注優等者加正卿銜漢啓心郎副理事官內閣侍讀初次考滿注優等者加正卿銜俱照舊供職吏部奏言內外官員有加一級及從優升轉者若止照應得職銜升轉非所以旌勸賢勞今議于各官應升職銜之上俱實加一級升用至其俸次先後仍照常叙論著為定例從之十三年大計天下官員副使崔成名等二百九十二員各革職降調休致有差奉諭㫖翰林為儲才之地鼎甲庶常皆使兼習滿漢文字以俟將來大用期待甚殷乃今習滿書者將及一年頃經親試語句生疏皆因不肯専心工夫怠惰若不分别勸懲何以激勵此次考試十名俱加賞賚後四名各罰俸三個月嗣後俱當精勤䇿勵無負朕惓惓作飬諄諄教誨至意嗣以右春坊右庶子王熙精通滿書以御服貂褂賜之又吏部奉諭㫖國家考績之典所以辨功能昭勸懲不可無畫一之程自今以後部院滿官除有事故罪過外三年俸滿者三品以上自行具疏爾部分别議奏四品等官各衙門咨呈爾部分别議奏朕悉核其優劣定為勸懲其六年一次㑹行京察之例三品以上自陳爾部㑹同都察院察議具奏四品等官各衙門咨呈爾部爾部仍㑹同都察院察議具奏朕皆親核優劣以定去留考察之時加升者有罪者及才能不及老疾等項詳細開列永為定例遵行部院滿官今年即照此例考滿奉諭㫖朕所與共圖治安者惟監司守令是賴厯年考績責望甚殷何爾等之泄泄從事也朕親政六載于兹勵精圖治不敢懈逸振飭官方未嘗寬假今又當大計之年而治猶未進民猶未安錢糧逋缺盜賊竊發大者仍不法小者仍不亷致上之德意無由下究民之疾苦無由上聞非爾等失職之故與已嚴飭所司重懲貪酷俱如例降革外姑准爾等仍服原官毋謂塗飾可以久施毋謂僥幸可以常恃宜各正直存心清亷持己勉圖後效吏部奏言凡考滿官員稱職者准復其職仍給與應得誥命平常者止准復職不准給與永著為例報可吏部奏言滿官京察則例凡三品以上滿洲官俱于考察之前具本自陳有出征奉差者事竣之日補陳四品以下不論出征奉差俱由堂官詳加考核注明賢否密送部院內三院四品以下官吏部都察院㑹同內三院考核六科掌印官聽部院考核其餘俱由各科掌印官開列實蹟注明考語彚送部院其考核事宜俱照八法處分從之吏部奏言巡方各官職銜不同其有忠亷稱職者應照各原銜分别升用原係御史者照例考核升轉外其理事官在內應升侍郎在外應升左右布政使副理事官內升理事官外升按察使郎中內升通政司參議外升布政使司參議員外郎內升鴻臚寺少卿外升布政使司參議主事內升太僕寺寺丞外升按察使司僉事中書行人評事博士內升光祿寺寺丞外升按察使司僉事以上或應內升或應外轉伏候上裁得㫖巡方各官稱職俱著內升十五年奉諭㫖翰林讀書作文是其職業不加考試何以分優劣别勤惰除三衙門學士外其餘翰林官員朕親行考試應用等項俱照例備辦是年考課清書庶吉士其未習熟者罰俸一年定督撫按臣舉劾例督撫按舉劾各官其庸碌者許不時查參不得狥庇貽誤地方薦舉大省不過十人小省不過三四人不得充數濫舉其有舉無劾者不准注考仍聽該部院察處定加級功過相抵例凡紀録二次或薦二次者准免降一級其應加級之官如有級可加仍照例加級無可加者遇應加一級改為紀録二次十六年奉諭㫖翰林院自乙未科以後所選翰林庶吉士令習清書俱期有禆實用恐其自謂已熟將向來所習或致遺忘朕今先加考試一次以後翰林院堂官仍不時考課務令純熟副朕簡拔之意十七年考核在京官員吏部奉諭㫖國家政務委任庶官必大小臣工咸得其人乃可共襄化理在京各衙門官員宜加澄叙以勵官常大學士尚書等俱著自陳侍郎以下俱著開列職名候朕親行甄别嗣以吏部甄别京官開列各衙門職名進呈得㫖三品以上各官開列職名候朕親加甄别四品以下各官吏部甄别具奏尋以外省各督撫任內功過稱職與否飭該部詳加甄别都察院左都御史魏裔介疏請行糾拾之法以補甄别之所未及內而京官外而督撫不拘現任丁憂告假飬病應悉照京察事例令科道各官遇有見聞即據實糾劾下部知之十八年定考核御史立為上中下三等其在地方清慎端嚴恪遵上諭潔己愛民奬亷去貪興利除害聽斷明恪鋤蠧捍患軫恤民瘼察核錢糧招撫流移墾荒興學等事無不修舉又能大破情面糾察地方惡宦劣襟者照例酌量分别加級紀録回道管事其次謹慎奉法察吏安民者准其回道管事其行事碌碌無實政及民者參送吏部降調外用至于有狥情貪賄等弊即訪確據實糾參革職治罪奉諭㫖國家政務委任庶官分理必大小臣工各稱其職乃可收得人之效近見在京部院各衙門官員有稱職者有不稱職者宜速加甄别以示勸懲內三院滿漢大學士學士各部院尚書侍郎等官俱著自行陳奏其滿郎中向來亦係自陳今同漢郎中以下至筆帖式俱著部院各該衙門堂官實心詳加考核稱職與否應去應留開送爾部再嚴加考核如將不稱職者草率狥情姑留倘事後發覺將當日考核之官即以狥庇治罪以後京察考滿郎中不許自陳永著為例吏科給事中雷一龍疏言三年大計國典攸關民生所係勿得遺大吏而摘微員懲去位而寬現任請飭部定議閲冊之日令該藩臬兩司赴部面同指實按冊詳察如大計之後或有敗類貽害地方者即治兩司以狥庇之罪再藩臬入覲例有條奏本省應行應革事宜據實敷陳不許浮泛塞責下部議行康熙元年吏部議嗣後大計布政使按察使俱停其入覲布政使以參政或參議道一員按察使以副使或僉事道一員代覲從之奉諭㫖向來京察考滿各官由本衙門堂官注定考語有注稱職者有注平常者及至升轉時全不察照殊非鼓勵盡職之意今後京察考滿俱著堂官詳加察議注定考語日後升轉即將稱職者照考語次序先令升轉仍注明厯俸年月其各衙門堂官須于京察考滿之時矢公矢慎以副倚任之意不許瞻狥又吏科都給事中嚴沆疏言在京三品以上及督撫等官自陳宜將任內何事加級何時紀録何事曽經鐫罰何日曽被糾彈何項應罰而蒙恩寬宥一一開列以明悉無遺為凖不宜侈張勤勞任事之浮詞以混干澄叙官方之大典臣見近時督撫諸疏竟有鋪張纍幅稱詡不已者殊大失陳告之體請敕部嚴行申飭下部議行奉諭㫖內外大小官員厯俸三年考滿視其稱職與否即可分别去留以示勸懲此外又有京察大計之例實屬故套且考察之時多有營求狥庇被處之官縱有屈抑不准申辨無罪被誣者甚多今思澄肅官方祇在實行勸懲不在踵襲繁文多立名色以後官員貪酷昭著及不能稱職者在外督撫不時參劾在內各衙門堂官及科道糾察其京察大計應行停止內外大小官員俱著三年考滿之時在外責成督撫在內責成各衙門堂官矢公矢慎開注事蹟考語移送部院嚴加考察分别去留以昭勸懲如開送不公併原衙門考察之官糾察治罪爾部院詳議定例以聞尋議三年考滿滿漢三品衙門堂官以上及在外督撫俱各自陳其餘官員應立五等考語一等稱職者加一級二等稱職者紀録一次後緣事降級准其抵銷辦事平常者仍留原任辦事不及者降一級調用不稱職者革職以後升轉照考語次序一等者先用又在京四品僉都御史卿員國子監祭酒六科滿漢都給事中中書科行人司上林苑掌印官並在外兼僉都御史銜之巡撫任滿三年咨送部院注考語此外各官在京者各部院堂官注考語在外者各督撫注考語仍咨送部院核覆如注考語官員狥情不公及明知屬員俸滿不考或地方盜案錢糧未清冒稱考滿及各官厯俸已滿規避不考者在內部院在外督撫及本官一併治罪從之旋奉特㫖改定一等稱職者紀録一次分别賞給表裏有差嗣是兵部奏直𨽻各省總督所屬武職應依文職例按照年限總督提督㑹同舉劾紀録給賞得㫖允行户科給事中俞之琰疏陳考滿之典四條一外吏之實俸難滿宜三年冊報以稽政蹟一升轉之遲速不同宜通俸併考以免遺漏一優考之名實難副宜詳加事實以杜冒濫一賢否之評隲貴詳宜公同考核以昭大公下部知之二年吏部都察院遵㫖議覆文武大小官員惟遇覃恩准給封贈誥敕其文官以考滿給誥敕之例應行停止從之三年吏部都察院議覆河南道御史張沖翼薦舉向來卓異薦舉皆有定額今考滿官員大省應定一等若干名二等若干名中省小省一等二等若干名仍必實指某人以何政績無愧一等某人以何政績無愧二等如定額之外濫冒一人及優考之人别經發覺將督撫一併議罪即在內各部院亦當以員數之多寡定一二等之多少庶令內外大小臣工爭自濯磨當考滿之際咸知自審材分永息奔競之風應如所請再行部院直𨽻各省嚴加考核得㫖近日內外文武各官考滿一等二等甚多豈無一才力不及不稱職者此後各部院直𨽻各省文武官員考滿將三年之內某官所辦某事奉㫖改正者某事駮行者某事處分者某事察明保奏若考過一等二等官員非係賢能及不稱職事發之日將考核時具保之官一併治罪餘如議行奉敕太常寺衙門仍聽禮部考核吏部奏京察大計已經停止內外官員俱三年考滿其參劾各官或酌量罪之輕重處分或仍照八法處分奉㫖著酌量罪之輕重處分刑科給事中張惟赤疏言六部郎中例升道府但一體掣籖曽無分别則考核竟為虗文嗣後或道或府有一項缺出者除仍照舊例將內外應升各官推升外若道府兼出應將考核一等者以道缺籖補二等平常者以府缺籖補若有應補道缺而考核一等之人不足仍將考核二等者以道缺一體籖補若二等不足即考核平常者亦一體籖補若考核一等之人數多道府員缺俱籖補一等之人經吏部議准從之奉諭㫖近見考滿內外各衙門具奏吏部等衙門又行覆題以致事多繁冗賢否甚難甄别內外大小文武各官除今年考滿外以後每三年彚考一次其到任未經三月者不必考向來自陳等官仍照舊例自行陳奏候㫖定奪事下吏部兵部議覆在外各官每人一本具題事務繁多今定考一等二等平常及辦事不及不稱職者各一疏每省㑹齊具題其辦過事件功過亦造冊送部院部院官仍照例覆考從之四年山西道御史季振宜條陳停止考滿三疏一言自行考核以來臣見部院大臣上疏自陳不過鋪張履厯功績博朝廷表裏羊酒之賜至堂官考核司屬朝夕同事孰肯破情面秉至公其中鑽營奔競弊不勝言况今自尚書以下悉按品升補與考滿全無關涉且是正月至四月皆自陳考滿之日一人一疏以數千計加之六部覆奏殷繁諸務叢脞弊從此生請停考滿之法申飭羣工循名責實安心辦事止照俸序升轉庶息躁進之風一言外官考滿改八法科條以五等為優劣數年以來其弊尤大即如州縣官由府㕔至督撫經五六衙門各上司豈盡不受賄賂不狥情面一憑公道品隲優劣者乎若層層剝核州縣力不能堪勢必侵欺公帑刻剝小民以賄屬上官希圖越俸升轉相習成風莫可挽回請嗣後直𨽻各省不肖官員止責督撫不時糾劾其任內無參罰詿誤者吏部照俸滿轉一言武職考滿副將以下莫不營謀優等武官無錢糧侵那勢必扣尅窮兵糧餉設有意外盜賊緑旗窮兵精力銷于饑寒器械罄于典鬻貽誤封疆不無隱憂請嗣後凡厯俸深功次多者兵部按籍升轉其生事擾民不修營伍侵蝕兵餉者令提督不時糾參得㫖考滿之典原欲分别賢否以示勸懲近因內外文武各衙門考核各官多係優等劣等甚少故有㫖改為三年彚考據奏各官狥情鑽營等弊且章奏繁擾實于勸懲無禆下議政王貝勒大臣等議覆嗣後各官升轉照舊例論俸部院滿漢官有不稱職者各堂官查參直𨽻各省文武官有不稱職者該督撫提督不時題參其自陳各官均應停止得㫖允行吏部奏康熙三年分山西額徴錢糧一年內全完請議叙巡撫等官得㫖先以山西太原等處地方人民饑饉不預行奏請賑濟將督撫各官從重治罪時值頒赦從寬留任豈可仍以錢糧全完為功巡撫布政使俱不准加級太原等處官員不准紀録其未曽饑饉地方官照例紀録六年吏部兵部都察院奉諭㫖國家政務委任庶官內外大小臣工咸得其人乃可共襄治理京察大計軍政俱應于今嵗舉行將內外大小各衙門滿漢文武官員分别澄叙以勵官方應行事宜爾部院察例議奏旋議覆舊例三年一次大計六年一次京察自康熙元年停止大計京察內外官俱行考滿至康熙四年停止考滿今應照舊例舉行京察大計從之定舉行軍政事宜各衙門所屬武職官員各該管官詳核填寫考語開明四柱一曰操守或亷或平或貪一曰才能或長或平或短一曰騎射或優或平或劣一曰年嵗或壯或中或老並將各該員履厯及有無在軍前行走受傷得功之處注明分别應去應留造冊送部其堪膺薦舉必有行止端方弓馬嫻熟管轄嚴肅當差勤慎不擾害該屬給餉無虗等考語方准薦舉其應行糾參之員必有貪酷不謹罷軟年老患病才力不及浮躁者始行糾參又敕各直省提督仍聽總督注考京察各部院自陳官員原品解任革職降級隨旗行走有差吏部議覆御史田六善疏言卓異之員宜以清亷為首列若非潔己愛民不得濫叨大典應如所請督撫開報卓異先論守次論才凡司道以下推官以上必開某官不派節禮不索餽送不借端詐官不生事擾衆知府以下知縣以上必開某官不派雜差不重火耗不虧損行户不强貸富民即以清吏之有無定督撫之賢否從之給事中李宗孔請復薦舉經部議考滿停止現行大計既有三年卓異之官毋庸又行薦舉其所舉卓異之員不論本任及升轉任內一有不職應將從前申詳薦舉等官分别降革得㫖前卓異薦舉原係並用後因舉行考滿將薦舉停止舉劾關係勸懲大典今考滿既經停止薦舉仍著復行其卓異官原任有事舉薦官理宜處分至後任有事仍將前薦舉官處分永塞薦舉之路又所擬處分之例太過著再議尋議督撫司道等官薦舉不實降級調用其卓異官于薦舉之後在本任內有不稱職者免原舉官處分七年吏部議覆左副都御史折庫納金世德等疏言督撫原有撫綏百姓之責近例處分止有貪墨缺賦并違限錯擬等罪而百姓失所地方未治並無處分之例請敕部議定如有百姓困苦流離拋棄田地地方毫無治理者將該督撫革職從重治罪應如所請從之吏部奏各部院甄别才力不及滿漢官共三十七員得㫖才力不及滿洲䝉古漢軍各官不必于部院衙門調用俱著降二級隨旗行走漢官不必調外用俱著以所降二級頂帶致仕停總兵官軍政自陳聽總督提督考核其無總督地方聽提督巡撫考核准軍政卓異並加一級升用從左都御史王熙請也八年奉諭㫖部院等衙門滿漢各官應行澄叙以示勸懲大學士尚書三品以上堂官俱著自陳三品司官及四品以下各官吏部㑹同都察院詳加甄别具奏在外總督巡撫係封疆大臣著部院查明任內功過稱職與否詳加甄别具奏于是甄别部院堂官禮部尚書布顔等七人督撫莫洛等九人或隨旗行走或年老休致或降級或革職或降二級留任內陜西總督莫洛巡撫白清額俱以輿情乞留免其降革仍還原任九年吏部議覆左副都御史鄂善等疏言查罰俸之法有升任之官原任有事應行罰俸不照原任即照升任罰俸者或被降之官有事應行罰俸不照所降之級仍照原任追銀者一升一降即為互異請畫一法制便于遵守嗣後原任有事應罰俸者升任官員于新任罰俸降調官員如已補任者照所降之級罰俸其未補任之員併裁缺給假丁憂等官于補官日罰俸從之十一年議准功加武辨選用例武職由行伍出身者因功加銜順治初題准經制千把總及無職任效用官員內有因功加至府銜並副將署副將者以逰擊缺用加至參將逰擊者以都司僉書缺用加至都司僉書守備者以守備缺用加守備以上各官如係未補千把總者咨部照功加官例用至是又題准已補千把總功加守備以上職銜不論千把總俱照功加例用現任把總銜大者仍拔補千總其功加千總准補營千總至功加各官咨部選用時原領劄付令夲辨赴部親繳至二十四年以功加逰擊守備等官人多壅滯願告降補用干把總者聽十二年山西道御史馬大成疏言康熙元年吏部奏准各省大計年分令道員代藩臬入覲但藩臬總理一省錢糧刑名熟悉地方利弊嗣後請仍令藩臬親身朝覲從之吏部奉諭㫖國家設言官専司耳目凡政治得失民生利弊必須詳切條陳直言無隱斯為稱職若但敷衍虗文浮冗剿襲或以不急之務草率塞責非廣開言路之意今將科道官親加考試其留用各員著益加勉勵殫心盡職以副委任內石文郁范時起何名揚才庸無文不稱言職著革職十七年都察院右副都御史劉楗疏言連年以來軍興旁午大計暫停今漸次蕩平又屆二年舉劾之期請嚴飭各該督作速舉行其中或有改行易節者該督一體嚴參不得狥縱下部議尋議行令直省速行其保舉各官亦一體嚴察如有情弊經科道糾察照例處分從之十八年江南道御史范承勳疏言定例降調官員果係清亷良吏許督撫題請留任原為愛惜人材起見故雖降調以示懲而又題請留任以示勸職與降調雖稍有重輕同一詿誤請將詿誤革職之員果有潔己愛民者督撫核實許與降調官員一體題留若離任具題者不准從之十九年吏部議覆都察院左副都御史郝洛疏言各部院司官賢否不一請令各堂官留心查驗每嵗終舉劾一人舉者照薦舉注冊劾者照例處分以昭勸懲吏部奉諭㫖科道為耳目之官關係最要必選用得人方能稱職漢官皆由行取考選補授惟滿官論俸叙升著吏部都察院將見在滿洲給事中監察御史㑹同選擇堪用者仍留原任不稱職者對品調于部院衙門用旋經㑹議將滿洲六科滿洲漢軍監察御史等分别留任去任具奏得㫖吏科給事中蘇拜等六員滿御史單璧等十五員漢軍御史祝鍾靈等二員俱著留任吏科給事中勒色黑等五員滿御史哲備等八員漢軍御史郎廷秀等五員俱著革任吏部奉諭㫖言官職司耳目必學識優長練達政務乃克勝任近以科臣孫纘條奏應加考選因將現任科道各官俱行親試觀其才品以昭澄叙姚締虞王曰溫李逈條奏詳明克稱言職并張鵬等俱著留任其益加勉勵殫心職業以副任用傅廷俊和鹽鼎孫纘才識庸常不稱言職俱著降三級調用不准以加級紀録抵銷吏部等衙門㑹議直省學臣試卷停其解部磨勘俟三年期滿督撫以稱職薦舉者照例以參議道用以公明尤著保舉者照例內升京堂若有狥情溺職等弊應聽督撫查參督撫狥情不參被科道糾參或别官首出將督撫一併議處從之二十年吏部都察院奉諭㫖國家設官分職各有専司必勤勵辦事乃克勝任近見各衙門官員有虗糜俸祿懶惰不上衙門者有老疾孱弱不能任事者應分别勤惰以示勸懲堂上官員爾等開列具奏所屬官員㑹同各該堂官分别議奏旋議甄别各部院司屬官員年老懶惰不稱職者共十一員均應照例處分得㫖翰林李來泰從寬免革職仍留任二十一年兵部議覆工科給事中碩穆科疏言滇逆蕩平軍政大典應仍舉行各官事故履厯應從康熙十一年軍政後開起九門千總等今設有九門提督應聽該提督填注考語造冊開送舊例止有現任總兵官自陳今候補總兵官等均令其自陳副將以下候缺官員仍照例各原任考察從之二十二年內閣及各部院衙門遵㫖糾察才力不及等官二十六員分别降革二十三年大學士等奉諭㫖各司官內雖有一二糾參皆係末員其實庸劣無能専恣行事各部院中有朕所明知而不參者可嚴諭指名題參尋經內閣及各部院衙門糾參才力不及暨狂妄行事王三省等三十六員分别各降革有差吏部奉諭㫖州縣官遇事竟不完結者甚多應行罷斥以疏出身之路尋議遲延不結一月二月者照舊例處分外三月者絳三級調用四月者革職二十四年吏部奏漢軍官員既與漢人一體升轉內外員缺必須通曉文義應行考試見任漢軍侍郎學士以下有無品級筆帖式以上及候選候補內外員缺官員俱概行考試其文義通者仍留任補用不曉文義者停其以文職用如無品級者即行罷斥得㫖漢軍內旗缺官員著考試翻譯有願作漢文者准其作漢文漢缺官員著考試漢文有願翻譯者准其翻譯餘如議以五月考試于太和門前分别等第去留優者照常供職補用劣者處分有差惟難廕子弟仍令學習俟文義通曉之日奏請録用其曽經效力行間者以武職補用奉諭㫖內閣用通曉漢文善翻譯者其自卿員以下部院筆帖式以上及滿洲䝉古廢員暨閒散人曉習漢文能翻譯滿文者統加考試計其文理用之吏部奉諭㫖督撫藩臬官資相近請託易行每逢大計各省督撫多以藩臬舉報卓異不無結納狥情之弊著通行禁止二十五年直𨽻各省朝覲官員行禮畢上諭之曰國家三載考績原以崇奬亷善擯斥貪殘必吏治澄清庶民生安樂今當大計已嚴飭所司重懲貪酷餘俱如例降革其有衆論不孚是非失實者特黜一二以警積玩外姑准爾等仍服原官爾等平日官評賢否公論昭然若值㑹推輒鑽營奔競以圖僥幸居心先已不肖何以率屬涖民且凡朝覲之期每因仍陋習借端科派大小相循私通交際是察吏本以安民而反以擾民甚非朕激揚清濁至意嗣後務須洗滌肺腸勉圖自新毋貌承心違蹈常習故國憲俱存决不爾貸吏部等衙門議覆左都御史佛倫疏言三年大計令各省藩臬齎冊入覲既將地方情形及興革利弊具疏陳奏查藩臬専理一省錢糧刑名伊等來京朝覲之後委員代理或致錢糧刑名舛錯稽遲亦未可定雖有條奏不過細事塞責况道途供應或不肖官員借端私派嗣後大計請將各省藩臬及各府佐二官員入覲之例通行停止照慶賀萬夀表章例每省委道官一員齎冊入覲至官員賢否去留止以督撫文冊為憑造五花冊三本分送吏部都察院吏科其藩臬二司所造冊籍分送各部院科道司等項亦請停止以省無益繁費均應如所請從之二十六年奉諭㫖設官分職原以為民所在得一良吏則民遂其生今觀各官雖有品行清潔者但畏國法而然如直𨽻巡撫于成龍之真實清亷者甚少若不從優褒奬何以勸衆可令九卿集議尋㑹議直𨽻巡撫于成龍實心任事並無勉强虗假之處應奬勸以勵官方其優加宫保出自特恩至督撫各官內如雲南貴州總督范承勳山西巡撫馬齊四川巡撫姚締虞居官皆優上曰范承勳等居官果善但伊等尚有勉强之意于成龍則出自誠心毫無瞻顧今人不往來大臣之家則恐其意有不悅如于成龍介然自守無所交逰為大臣者其奈于成龍何著加太子少保銜以為亷能稱職者勸召試廷臣于乾清宫上召尚書陳廷敬湯斌侍郎徐乾學少詹事耿介侍讀學士髙士竒德格勒侍講學士孟亮揆侍講徐元夢諭德徐潮中允徐嘉炎編修熊賜瓉勵杜訥等至乾清宫內考試上閲諸臣試卷畢諭曰朕政事之暇惟好讀書始與熊賜履講論經史有疑必問樂此不疲繼而張英陳廷敬等以次進講大有禆益德格勒每評論時人學問朕心以為不然故召爾等面試妍媸優劣今已判然總之人之學問原有一定分量真僞易明若徒肆議論則不自量矣二十八年吏部等衙門議覆山西巡撫葉穆濟疏言大計不謹罷軟等官雖經具疏必俟部文到日方行委官署理交代離任誠恐此等官員自知被劾官針民瘼益罔顧恤且致衙役乘機滋弊請嗣後計參之官及督撫不時題參之官于拜疏之日即行遴官署理再武職官有不職者其被劾之後亦照文職例舉行應如所請從之又吏部議覆工科給事中談瑄疏言各省大計所參年老一條多開教職充數臣思教職専司訓飭生員無刑名錢榖之責若果衰邁聾瞶者仍令照例題參其年紀雖老而精力未衰尚能課士者停其開列年老應如所請從之三十一年奉諭㫖朕思所參才刀不及官員仍補授部院衙門殊未允當著照伊等所降之級隨旗行走伊等曽在部院辦事自能稱旗下之任至因公詿誤降級之員應俟復用三年無過准算前俸則官員方知鼓勵有過者得少分别矣吏部等衙門議覆河道總督靳輔疏言河官之賢否得失惟總河知之最確嗣後大計如係管理河務兼有錢糧之責者總河督撫各行考核其専係河官令總河自行考核具題應如所請從之三十四年甄别部屬官先是上諭大學士及部院各衙門堂官等各將屬員賢能者揀選保舉其才力不及年老有疾者亦甄别引見至是大學士九卿等以保舉郎中員外等官四十七員及甄别者四十二員引見上曰此次參革官員皆由部院年久原非罪過老病者著解任餘皆以旗缺補用此保舉郎中係朕親用之員朕皆知之其員外主事之中有年少堪任用者爾等可再行揀選尋大學士又保舉九十五員引見得㫖此次參革郎中員缺以揀選員外郎開列員外郎缺以揀選主事開列俱視其出缺之先後厯俸之淺深以次升補其主事員缺著將筆帖式揀選補用再各省有操守清亷愛飬百姓練達吏事之官亦著該督撫各舉二員或三員咨送到日奏聞引見大學士等奉諭㫖從前科道內升之員有仍令兼管科道者條奏盡職並無一人言官極屬緊要此後科道內升可即出缺不必更令兼管四十三年吏部奉諭㫖教職官員必文義明通方稱厥職近見直𨽻各省教職官內不諳文義者甚多如此何以訓士著行文各該撫將各屬教職官通行考試分别具題嗣後俱照此例不時考試四十四年奉諭㫖嗣後薦舉卓異務期無加派無盜案無虧空民生得所日有起色其他所開虗文俱不必入五十二年大學士奉諭㫖翰林官自講讀學士以下編檢以上滿洲漢軍由進士選入翰林者其中或有不修行檢日事飲博于詩文書法全不究心又或督學典試分校聲名不好者爾等㑹同九卿詳查舉出即行黜退各省皆有翰林九卿豈無聞見毋容狥隱其現在散館庶吉士及教習進士內有此等人亦舉出革退五十四年奉諭㫖朕前日考試翰林竟有不能詩文之人詩中有用習坎等字者此因朕素講易經故皆濫用不計切題與否彼皆以荒疏已久為辭部院司官有辦理之事猶可云荒踈翰林理應讀書亦云荒疏可乎今之翰林逈不如昔如熊賜履張玉書張英陳廷敬徐乾學徐元文徐秉義王士正等學問俱佳又如內廷行走及武英殿修書翰林亦較在外翰林不同詩文皆大方總由每日纂修校對之故也禮部奉諭㫖教習進士已滿三年今加考試其優者以月選官內黜退之缺即用餘令回籍候補六十一年奉諭㫖在京武職官員亦當照外省武職官員例五年一次考選軍政其如何考選之處著定議具奏尋議在京武職官員如領侍衛內大臣八旗都統前鋒統領護軍統領副都統步軍統領等俱係近御大臣不必令其自陳遇五年考選軍政時各將屬員詳核填注考語照外省薦舉及八法例分别具奏各省駐防將軍都統副都統等照提鎮例自陳其屬員俱照京城之例舉行至德州等處之城守尉協領𣲖大臣前往考選其屬員即㑹同城守尉協領等詳核填注考語具奏從之皇朝文獻通考卷五十九
