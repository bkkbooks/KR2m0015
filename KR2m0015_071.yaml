body:
  text: 學校考九直省鄉黨之學三雍正十三年九月皇上初登大寶恩詔各省入學額數大學加七名中學加五名小學加三名吏部奏請欽點各省學政奉上諭各省學政有訓導士子校閲文藝之貴關係甚重非才守兼優素有學問者不克勝任朕即位之初於諸臣之才學品行未能深知難以降旨簡用著大學士尚書侍郎於翰詹科道部屬內各據所知保舉一二員開列送部彚奏請旨加給各省教官品級先是直省教職未入流品至是奉上諭各省教職乃師儒之官所以訓迪約束為多士之表率也若不能給品秩則與雜職無異恐本人遂以冗散自居不知殫心課士以盡職任其應如何加給品級以示鼓舞責成之意著吏部議奏尋議準京府教授四氏學教授各府衛儒學教授為正七品官各州學正各縣教諭為正八品官各府州縣衛訓導為從八品官更定河南陳州府學許州學及新設淮寧石梁二縣學廩增生員各額數陳州許州各設學照例各取進文童二十名武童二十名廩增各額設四十名自乾隆元年嵗考為始新設淮寧石梁二縣學並取進文武童生各十五名額設廩增之處仍照縣學例定貴州苗學及廩增額數新進苗生大學五名中學三名小學二名均附各學肄業苗籍廩增大學各三名中小學各一名更定山東益都縣及分設博山縣各學文武生員額數益都文童取進十五名武童取進十二名分設之博山縣照小學例取進文武童生八名令黔省畢節縣屬之赤水河北地方童生撥歸永寧縣籍者統歸川省考試不得兩地冒考赤水河北地方應考儒童自永邑歸川之後即赴永寧考試入學已逾三年而文武生員嵗科兩試仍赴黔省隔省多有未便故有是令定粵省各衛所屯軍籍童生照直𨽻河間等衛裁併歸縣考試例以軍籍童生額多人少且軍民兩籍混冒控訐不已也凡各衛所屯軍籍童生一併歸入現在住居辦糧之州縣民籍內應試乾隆元年命免舉貢生員雜色差徭是時各省有令生員充當總甲圖書之役者奉上諭嗣後舉貢生員等著槩行免派雜差俾得専心肄業倘於本户之外别將族人借名濫免仍將本生按律治罪又恩準直省抗糧續完未清遇蠲之革生仍豫開復定例士子倚恃青襟抗欠國課者褫革追比至革後清完者仍豫開復先是上初登大寶恩詔將直省所有雍正十二年以前舊欠錢糧俱行豁免至是復念革生內容有所欠錢糧亦已陸續完納祗緣尾欠未清未曾循例開復而所欠又奉豁免之恩詔遂令所革衣頂永無開復之期情殊可憫特諭各省督撫轉飭各州縣查明開復俾得改過自新並將姓名登記檔册倘將來再有抗欠著該督撫嚴參治罪增定恩詔加廣奉天等處滿合字號及遼陽州儒童入學額數禮部奏準奉天府學滿字號照中學例加五名錦州府學復州學合字號照小學例加三名其遼陽州等學原額七名五名者加額二名四名二名者加額一名舉行一次不著為例敕各省通行御纂諸經并諭士子誦習成熟者聽學臣考試優録先是聖祖仁皇帝御纂周易折中尚書彚纂詩經彚纂春秋彚纂等編及朱子全書性理精義諸書頒行直省世宗憲皇帝敕直省布政司敬謹刋刻準士子赴司呈請刷印嗣各省士子以赴司遞呈必俟批發既多守候且一生所請不過一部不能特為發板開刷是以刷印寥寥至是特諭直省撫藩諸臣加意招募坊賈人等聽其刷印通行嚴禁胥吏阻撓需索之弊諭各省學臣每科嵗按臨時預飭各該學確訪生童中有誦讀御纂諸經者或専一經或兼他經開明册報俟考試文藝之後該學政就四經中斟酌舊説有所别異處摘取數條另期發問只令以義條答不必責以文采有能答不失指者所試文稍平順童生即豫入泮生員即豫補廩以示鼓勵又欽頒聖祖仁皇帝御製律書淵源於直省學宫并令禮部招募坊賈刷印聽其翻刻定廣東改𨽻府州各縣取進文武童生額數嘉應州屬之興寧長樂二縣前𨽻惠州平逺鎮平二縣前𨽻潮州至是四縣改屬嘉應州轄將惠州府學文武童生各減三名歸興寧長樂二縣潮州府文武童生各減二名歸平逺鎮平二縣撥入州學其嘉應州武童原額止十二名取進原未加增準於潮州府學武童內再減二名撥歸嘉應州學又連州改為直隸州學額進八名準再於廣州府學內撥取文童一名歸連州學定河南復設南召縣學廩增生員增額照中學例文武入學各額取十二名廩增各額設二十名更定廣東普寧潮陽二縣學取進文武童生額普寧縣文童取進十名武童九名潮陽縣文童十八名武童十四名定陜西同州府縣各學廩增生員各額時改同州為府嵗科兩考取進文武童生各二十名廩增各四十名大荔縣學取進文童二十名武童十五名廩增各二十名原減西安府額內撥歸白水朝邑蒲城三縣之文童三名仍歸西安府學定額取進文武童生各二十名定湖北新設宜昌府縣各學廩增生員各額數府學額取文武童生二十名廩增各四十名彛陵州改為東湖縣準照州學原額取進文武童生十五名廩增各二十名嚴定貢監生員包攬錢糧例侵收入已者革去衣頂照常人盜倉庫錢糧律并贓論罪係八十兩以上照不應為而為之律杖八十仍斥革如不及八十兩以上仍照攬納稅銀杖六十之例定擬收贖奉上諭書院之制所以導進人才廣學校所不及我世宗憲皇帝命設之省會發帑金以資膏火恩意至渥也古者鄉學之秀始升於國然其時諸侯之國皆有學今府州縣學並建而無遞升之法國子監雖設於京師而道里遼逺四方之士不能胥會則書院即古侯國之學也居中講習者固宜老成宿望而從遊之士亦必立品勤學爭自濯磨俾相觀而善庶人材成就足備朝家佐使不負教育之意該部即行文各省督撫學政凡書院之長必選經明行修足為多士模範者以禮聘請負笈生徒必擇鄉里秀異沉潛學問者肄業其中其恃才放誕佻達不羈之士不得濫入書院中酌倣朱子白鹿洞規條立之儀節以檢束其身心倣分年讀書法豫之程課使貫通乎經史有不率教者則擯斥勿留學臣三年任滿咨訪考核如果教術可觀人材興起各加奬勵六年之後著有成效奏請酌量議敘諸生中材器尤異者準令薦舉一二以示鼓舞又上以各省學政有衡文育材之責人文繁盛應試衆多者莫如江南而江南學政養亷江蘇二千兩安徽一千五百兩較他省為少以此養贍家口延致幕客未免不敷特諭從今秋後為始上下兩江學政養亷各賞銀四千兩使伊等用度從容益得盡心於職業以副朕任官課士之至意更定舉報優劣例定例學政嵗科二試並行舉報優劣於三年任滿彚題至是改定於嵗試時隨場舉報優劣一次造册送部仍俟任滿彚題從前科試舉報之例停止停止五生互結之例先是嚴禁生監抗糧唆訟行止有虧令各該學教官嵗底責取各生甘結以五生互結為例至是部議生監並隸黌宫如有不法該學自可詳革若惟以五生互結為憑良善者固氣類相投不肖者豈不能朋比掩飾應將互結之例停止從之禁地方官擅行斥責生員凡生員偶有過愆止應戒飭者地方官會同教官在明倫堂撲責有擅自叱呵斥責者聽學臣察參以違例處分其有肆行不法等事該地方官察稟即行申詳督撫學臣革退審理如挾私妄報者照例參處令順天府尹修葺義學飭大興宛平二縣清理義學舊址酌量修葺慎選文行兼優之士延請為師不論鄉城老幼願就學者皆聽肄業其中有貧乏無力者酌給薪水其修建學房師生膏火需費統於存公銀內奏請動撥飭黔省設立社學禮部奏準黔省地處偏僻其有未經設立社學之處令該督遵照雍正元年定例飭令州縣官酌量舉行更定月課三次不到者詳革之例定例月課不到者戒飭三次不到者詳革至是改定三次不赴課者該學教官嚴傳教飭其有並無事故終年不到者詳請禠革二年禁止各學教官率領文武生員迎送官司之習減定河南南陽縣學廩增額數原設廩增各三十名至是減去十名以是時分設南召縣别設廩增故也增設山西朔平寧武等處各學廩增額數原設廩增二十名時以改府已久人文漸盛議準照州學例各加十名神池五寨二縣學與寧武縣均設廩增各二十名是年冬初制臺灣試院巡視臺灣給事中兼理學政單德謨奏稱臺灣考試生童向來未建考棚止就海東書院之便而地方湫隘難容遂别開門徑通文廟戟門外塔蓋棚厰未免雜沓喧囂鄰於褻慢且慮關防不密易滋弊端請照內地之例建立考棚以昭嚴肅得旨向因臺灣應試人少故未建立考棚今人文日盛生徒衆多著該督撫轉飭地方有司相度地方情形修造試院俾宫墻肅靜考試謹嚴以重造士育才之典定安徽潁州府縣各學取進生童額數潁州學升為府學取進童生二十名新設阜陽縣學取進十五名定奉天永吉州學取進生童額數長寧縣裁歸永吉州額進童生四名三年定賑給貧生例定例各省學田銀糧原為散給各學廩生貧生之用但為數無多或地方偶遇歉年貧生不與貧民一例散賑至是奉上諭凡遇地方賑貸之時著該督撫學政飭令教官將貧生名籍開送地方官核實詳報視人數多寡即於存公項內量撥銀米移交教官均勻散給資其饘粥如教官開報不實給散不均及為吏胥中飽者交督撫學政稽察即以不職參治嚴直省教官勒索生員贄儀舉報優劣不公之罰照借師生名色私相餽送例革職申嚴優生改行之條凡優行生員如舉優注册之後該生改行易轍實有劣迹可指者該府州縣官及教官仍應據實申詳該學政咨部黜革改甘肅蘭州學為府學狄道縣學為州學新設臯蘭縣學府學取進童生二十名狄道十五名臯蘭十二名定湖廣慈利永定二縣學廩增額數慈利各十四名永定各十二名定湖南沅州府縣等學廩增及取進童生各額數沅州升府所屬祗三縣府學廩增仍照州學例各三十名府學取進童生十五名蕊陽縣學十五名苗童三名又增定廣東嘉應州廩增額數舊額各二十名至是加十名停止外省入籍廣西考試例先是粵西本地應試者少準令各省及本省異府之人入籍考試至是冒籍紛紛有妨土著議準停止四年上以浙江敷文書院生童衆多每嵗帑金租息銀僅四百餘兩不足以敷餼廩特命加賜帑金一千兩交與該撫經理定取息銀以資諸生膏火增定貴州南籠府學廩增各額數廩增各三十名取進童生各十二名增定廣東商籍廩增各額數照直隸天津府學例設商籍廩增各十五名撥附廣州府學又定申嚴劣生聚衆抗官之律時各省劣生有聚衆抗官者奉上諭朝廷之所以優待士子者以其讀書明理立品修身足為庶民之坊表且備登進之選為國家有用之材也今則恃列膠庠藐視憲典以安分為恥以抗法為榮平時號為讀書明理者尚且如此愚民無知羣相則效其為風俗人心之害何可勝言且此等人伏處牖下即不自愛將來幸登仕籍必至乖戾縱肆傲上虐民尚望其慎守官方砥礪亷隅為國家循良之吏乎古稱稂莠不剪則嘉禾不生朕之嚴斥劣生者正所以培植端人正士也各省學政當深知此意時時訓誡俾頑劣生童改行率德以受國恩其蕩間踰檢有玷宫墻者即行黜革毋得姑容督撫大吏亦當極力化導嚴加約束以端士習而厚民風著將此旨刋刻頒布咸使聞知尋刑部等衙門議準除聚衆抗官按首從分别治罪外凡童生於臨考時不待聨謀羣相萃集或偶與市民爭訟輒喧播觀看雖未有不法情事實屬囂凌陋習令學政分别革懲俾知畏法自守定直省生員補行嵗考之法凡欠考各生挨次補考者學臣於彚報嵗科册內分别詳注如有將數次只補一次及徑行附等之處咨部者照徇情例議處定雲南宣威州學廩增額數仍照縣學例廩增各二十名定直𨽻撫寧縣學及新設臨榆縣學廩增額數撫寧縣學取進文童十八名武童十五名其新設之臨榆縣學設廩增各二十名取進文童十五名武童十二名定福建霞浦分設之福鼎縣廩增各額數霞浦福鼎每學廪增各十名取進童生霞浦八名福鼎七名定廣西泗城鎮安等府各學廩增額數泗城鎮安俱設廩增各四名歸順州學設廩增各二名定湖北宣恩來鳯利川咸豐四縣取進童生額數四縣各酌取二名暫歸恩施縣學定雲南威逺土州改𨽻鎮沅府取進童生額數前附考元江府於元江府加額二名至是改𨽻鎮沅將加額二名撥歸鎮沅府學定各省拔貢生應試經解例學政考試拔貢將御纂諸經中摘取先儒異同之説令其條方縷晰詳對一道解部定各省舉報優生注明經解例除將實行注册外仍將通曉何經或五經或三經並行注明將考試經義一道一併解部磨勘五年定廣東新設之豐順縣廩增各額數廩增各二十名取進童生八名增定浙江長興蕭山二縣學取進童生額數照府學例取進二十五名增定福建永春州德化縣各學取進童生額數永春原額十五名至是增三名德化原額十四名至是增四名定陜西樂山三臺二縣學廩增各額數樂山三臺原繫州學額設廩增三十名後改縣學廩增尚仍其舊至是樂山升嘉定府三臺升潼川府均酌撥縣學三十名之十名歸入府學餘仍留縣學其兩府學取進童生額設各十五名六年上以近來教職多衰老庸劣不但不能以道德禮義化導齊民並課士之職亦不克舉特諭督撫會同學政嚴飭所屬教官務以實心實力勸學興文恪盡課士之責其有年力衰頺貪戀祿位及庸劣無能不稱師儒之席者秉公甄别咨部罷黜七年上以粵東俗尚澆漓每遇生童齊集考試之時或赴攤鋪短價強買什物或與市人扭結稟官稍不遂意即恃衆喧囂挾制罷考地方有司視以為常每多寬縱至是石城電白等縣考試武童有不遵禮教之武生恃襟抗法事聞特諭該督撫學政董率有司教官嚴切訓諭務令士子等洗心滌慮痛改前非倘冥頑不靈仍不率教即按律懲治不稍寬貸如官員等有徇隱姑縱者一經查出定行分别處分又命剔除直省童生營私入學之弊時江西巡撫陳宏謀奏江省積棍每年尾隨學臣按臨各郡假冒學臣親戚內幕哄誘士民營求入學講定謝儀若干靣同包封仍存士民之手俟案出有名方來取銀營求之人見其不先取銀以為有益無損遂將銀兩付伊包封畫押棍徒預用錢文假作銀封臨時同夥設計掩飾調换銀兩潛逃名曰掉包逮至案出無名士民啓視銀封方知墮計而棍徒早已逺揚此風各處多有不能杜絶上以一省若是他省諒亦相同特諭各該督撫等於學臣按試之前將此等掉包串騙之弊詳明曉諭凡有指稱營求考取將銀封貯出案收取者無論真假立即嚴拿究處並許被騙之人報官查拿則應考生童識破機關自不致墮其術中而棍徒知有法紀亦不敢公行無忌亦肅清學政之一端該部即遵諭行又左都御史劉統勳等奏考試拔貢公同校閲分别進呈其山西毛清竒誤認題旨不準拔貢奉上諭山西毛清竒不準拔貢發回本學肄業該學政交部嚴加議處夫拔貢乃造就人才之典今所取淺陋若此何以振起文風司衡鑒者不得辭其責嗣後務矢公慎遴選出衆之材以鼓勵多士毋得茍且塞責自干嚴譴定貴州永豐州學廩增額數自雍正十二年建學至是設廩增各二名定江西改土為流之各土司子弟準照湖廣苗猺例入籍考試更定河南許州學取進童生額數許州府改為直𨽻州取進童生仍照府學二十名八年申定選取樂舞生之例先是五年定府州縣學樂舞生每學例用六佾額設三十六名外加四名以備事故更替各州縣考選本籍俊秀通曉音律嫻習禮儀者充補每遇學臣按臨免其府縣兩試由教官册送府縣敘入考案之後申送院試憑文録取至是更定各州縣於與考童生內略知文義者取具鄰族甘結會同選官選補送學臣察核至學臣按臨時飭令提調官按名考驗實係應試儒童略知文義者方準充補若係目不識丁者即詳明黜革别行選取仍將濫選州縣學官察參議處申定考試童生覆試仍用小學論題例康熙三十六年定例考試童生用小學論三十九年改用性理太極圖説通書西銘正蒙一併命題四十五年仍定用小學論雍正六年改定論題用孝經乾隆元年定論題一道孝經與小學兼出至是復定各省學政嵗科兩試及府州縣試於覆試時用四書題作時文一篇外仍用小學命題作論一篇必通曉明順方準録取增設安西衛教授一員甘肅口外安西沙州靖逆桞溝赤金五衛生員向𨽻肅州學至是以去肅千有餘里稽察難及改定於五衛適中之安西衛增設教授一員管轄九年命各省州縣考取童生送院應試者不必拘定額數舊例州縣考取童生送學政衙門考試定有額數康熙三十九年改定不必限額本年禮部奏請仍照每學入學額數限定録送之多寡以杜冒濫得旨允行至是復奉上諭各處赴試童生多寡不等若限以録送數目恐有浮多於額外而擯棄不取者即有不足於額中而強取充數者未必俱當况府州縣録送去取全在學政並無關於入泮之數應稍寬其途以鼓舞之亦廣育人材之道嗣後仍照舊例不必限定考送之額但將文理不通者擯棄不録至二十三年又飭直省府州縣考試毋得濫行録送俱著酌量按照地方人數核實取録以昭慎重定甘肅安西等五衛廩增額數廩增各三名定直𨽻遵化州學取進童生額數遵化州升為直𨽻州取進文童生十八名武童生十五名定山東商籍廩增額數廩增各五名定雲南昭通等府州縣學廩增額數雲南昭通二府學鎮雄州學永善縣學並設廩增各八名十年令直省考驗教職及應選教職人員勿以限年勒休先是九年大學士九卿遵旨議準以甲子年為始每遇鄉試之後令各省督撫學政將應選教職人員除學業堪以司教者仍注册備選外其精神衰憊無用者槩給以應得職銜勒令休致至該員輪選之時仍令督撫照例驗看考試其不堪選用者亦給以應得職銜勒令休致若年至七十精力既衰學業荒廢斷難勝任古人原有七十致仕之義所有現任教職令學政確查年嵗清册七十以上即知會督撫咨部令其休致嗣巡撫晏斯盛以嵗貢年已七十應否扣選請旨奉硃批古來申公伏生老而傳經人之可用與否未可以年齒論譬如年逾七旬而強健者亦不可銓選乎未至七十而病憊龍鍾者亦可姑容乎惟當視其人之可用與否以為去取不當以七十為限總在督撫學政秉公實心辦理庶有禆益至是上以此旨未曾頒布各省恐皆未會聖意又上年鄉試後驗看教職老邁者業去大半特諭嗣後此例不必每科舉行候朕因時制宜酌量降旨其恩拔嵗副及挨貢應用教職者驗看之處仍照舊例行至該員臨選時給發文憑到日仍加考驗必精力文藝足勝司教之職方準領憑赴任又奉上諭國家設制科取士首重者在四書文蓋以六經精微盡於四子書設非讀書窮理篤志潛心而欲握管揮毫發先聖之義藴不大相徑庭耶我皇考有清真雅正之訓朕題貢院詩曰言孔孟言大是難乃古今之通論非一人之臆説也近今士子以科名難於猝獲或故為艱深語或務為俳儷語爭長角勝風簷瑣院中偶有得售彼此倣效為奪幟爭標良技不知文風日下文品日卑有關國家掄才大典非細故也夫古人論文以渾金璞玊不雕不琢為比未有穿鑿支離可以傳世行逺者至於詩賦掞藻敷華雖不免組織渲染然亦必有真氣貫乎其中乃為佳作今於四書文採掇詞華以示淹博不啻於孔孟立言本意相去萬里矣先正具在罔識遵從習俗難化職此之故自令其令各省督撫諸臣時時訓飭鄉會考官加意區擇凡有乖於先輩大家理法者擯棄不録則詭遇之習可息士風還淳朕有厚望焉該部通行曉諭中外知之定散給學租之法舊例學臣散給學租於各處考試事竣始據各學册報給發其中易滋弊端至是奉上諭散賑於考試事竣之日何如散給於士子雲集之時嗣後學政學官確查極貧次貧造具細册於按臨之日投遞學臣核實即於三日內逐名靣賑則貧生均沾實惠該教官等如有濫開混報等弊亦易查出參處申嚴童生頂名冒考之弊向來江蘇陋習童生應試率皆彼此通融互考甚且有一人冒考數處或多做重卷數名以為院試時售賣之地者事聞奉上諭各府州縣皆有煙户册籍誠於州縣考試之時童生報名查對煙户無訛方許廩保填結府考院考俱令原保廩生識認則冒籍頂名之弊可除著督撫轉飭所屬實力奉行學政亦不時稽查如有仍蹈前轍者按律究治至十二年併議準寄籍之恩拔嵗貢及由俊秀寄籍之捐納監生並勒限三月自首改歸本籍其現任教職內有係本邑及鄰邑之人亦令呈明改歸本籍違者參革又命順天府大宛兩縣寄籍者改歸本籍並申定儒童考試認保審音之例凡現任京官及候選中式之進士舉人貢監生與廩膳增附生員等除入籍二十年並無原籍可歸者不議外統以一年為限具呈順天府咨歸本籍仍報明吏禮兩部注册其生員食餼挨貢悉照本生年分次序倘逾限不改京官照規避例革職進士舉人貢監生員即行黜革如該管官奉行不力住俸一年其直省大小官員由冒大宛兩縣籍貫出身者亦呈明各該上司改歸原籍仍咨吏部存案逾限者照例議處至每逢考試大宛兩縣童生令知縣教官將素行優謹之廩生申送府丞查核方準臨期認保於府試審音前該府丞移咨都察院滿漢御史各一員會同審音如有不合究出情弊即將本生廩保照變亂版籍律杖革如受財冒保計贓從重教官婪贓者革職交刑部計贓定罪申嚴直省生員欠考積弊凡係病假生員其上屆開報者下屆果係遊學未歸患病未痊該教官查驗確實再行詳請展限一次俟病痊回籍即送補考如欠至三次以外俱不準展限竟行黜革倘有扶同揑報不行詳請展限者該學政嚴查將教官參處以専責成十一年定彚報開復除名案由册例十二年定四川嶽池縣學廩增各十名額數十三年上謁孔林廣山東通省入學額數奉上諭國家崇儒重道尊禮先師朕躬詣闕里釋奠廟堂式觀車服禮器用慰仰止之思念魯國諸生素傳禮教應加恩黌序廣勵人才山東通省入學額數著格外加思增廣一次府學大學增取三名中學二名小學一名以廣聖澤以光文治定湖南永順府縣等學廩增各額數永順府學廩增各十名永順龍山保靖桑植四縣學俱設廩增各六名定雲南鎮沅等府縣學廩增各額數鎮沅府學廩增各十名普洱府學恩樂縣學黑白琅三鹽井學均設廩增各八名十四年頒御製平定金川告成太學碑文於直省學宫詳見太學門十五年增定廣東鶴山縣廩增額數原設各十名至是各增五名十六年上南巡江浙命增本年江蘇安徽浙江等處府州縣學儒童入學額數大學增取五名中學增取四名小學增取三名舉行一次至二十二年二十七年三十年南巡盛典並如初例又奉上諭經史學之根柢也會城書院聚黌庠之秀而砥礪之尤宜示之正學朕時巡所至有若江南之鍾山書院蘇州之紫陽書院杭州之敷文書院各賜武英殿新刋十三經二十二史一部資髦士稽古之學又定裁肇髙學政歸併廣韶學政考試又命各省甄别教職所遺員缺即以應授教職之選拔貢生充補減定山東膠州學取進靈山衛童生額數原定衛籍童生八名至是減去三名增定四川綿州等學取進童生額數綿州取進十名德陽羅江各六名新津雙流新繁彭郫崇寧各八名十七年減定廣西永寧州學廩增各額數原額各三十名至是裁減各十名增定四川眉州等學廩增各額數舊定眉州學各十四名青神彭山二縣學各八名至是均改設各三名眉州取進童生十名青彭二縣學取進童生各六名定考試生員儒童卷靣用經解印記之例各學政按臨之初即將該提調册報能對經解之生童分别考試其答不失指者即於正試卷靣加以經解印記以便閲卷時照例辦理十八年申定直省甄别教官例定例各省教職六年俸滿該督撫學政公同甄别堪􅈾薦舉者保題送部引見其年力衰邁者咨部休致至是奉上諭嗣後教職除有劣迹者隨時參劾外至六年俸滿堪膺民社者保題其年尚強壯精力未衰可以留任者出具考語送部引見若準留任俟六年再滿仍如是甄别如年老人員即著咨部休致有願來京引見者照大計之例該督撫聲明給咨引見至訓導甄别之例與教職同著為令至二十二年又定雲貴川廣福建湖南甘肅等省教職改為八年一次甄别保題至來京亦不必専檄獨行聽其從便結侣請咨送部引見餘近省分仍照舊例行十九年定安徽臨淮鄉學例先是江蘇海門縣裁歸通州以海門縣學改為鄉學童生另額取進至是安徽裁汰臨淮縣歸并鳯陽縣援照海門鄉學例將臨淮縣生童另編為臨淮鄉學字樣取進額數及廩增出貢之處悉照舊例辦理二十年奉上諭楊迋璋奏武生監生俱令教官督課約束一摺言雖是而行之則無實濟不肖生監或倚恃青襟武斷滋事原屬法所必懲向來何嘗不著為定例令該教官一體管束然以生監之衆安能責之一二司鐸微員即文生係其専管尚有防檢不周者是即屢定科條仍屬有名無實何益之有惟在該督撫等平時督率屬員留心化導一遇有作姦犯科之事即隨時黜究以示懲警况生監等既為凡民之秀果其讀書自愛自當優以禮貌若乃干犯教令甘蹈罪網則其情視蚩蚩者為更重又豈得専委司教而不力為振刷耶近有縣令徇縱劣襟加以處分者正以地方官有整齊士習之責也嗣後各督撫其嚴飭所屬地方無論文武生監俱令悉心體察倘有不遵約束恃符生事者即行按法究治毋徇私邀譽視為具文頒御製平定準噶爾告成太學碑文於直省學宫詳見太學門二十一年減定江南金山衛學取進童生額數原額二十名至是減四名定湖南衡陽分設新縣儒學各額數衡陽原額取進童生二十名今分設新縣將衡陽縣學定為取進十名原額廩增亦各分其半出貢之年兩學輪貢一人衡陽縣學訓導改為新縣訓導二十二年清釐順天冒籍生員禮部議準順天學政莊存與條奏查出冒籍各生暫請停其南北嵗科兩試照定例一年令本生自首至咨查原籍取結往返難以一年為限除已為查確取結者聽嵗科鄉試外餘並停其鄉試以杜冒濫奉上諭此等冒籍生員即永停鄉試亦不為過若未經杳明遽準與試必致仍多弊混著將冒籍各生停鄉試一科以便清釐永杜冒濫定廣東西寧信宜兩縣學取進生童額數時西寧懷鄉司屬之定康信豐感化從善等四都既經改𨽻信宜縣管轄減去西寧學額二名帚入信宜因定嵗科二試各以十名為額又申定蔚州訓導管理鄉學例直𨽻總督方觀承題宣屬文風兩蔚為盛今蔚縣裁歸蔚州管轄而讀書士子不減于前請將原住蔚縣生童另編鄉學字號嵗科兩試取進額數及考補廩增出貢之處照舊辦理所有蔚州學正仍管本學事其訓導一員専司鄉學另頒學記以専責成部議應如所請從之二十三年又定江南阜寧山陽鹽城等縣學取進童生各額數江蘇學政李因培條奏將居住山鹽二縣現充阜寧縣學諸生及應試子弟清查改歸本籍外應將阜寧縣學取進文童定為八名武童六名其阜寧原額應改撥山陽鹽城文童各二名武童各一名廩增亦應撥還山陽二名作實廩實增鹽城毋庸改撥所有阜邑改歸本籍廩增作虛廩虛增照考案挨補部議應如所請從之定考試貢生改判為詩之例先是二十一年奉旨將鄉會二場試題改去表判易用五言八韻詩至是御史陳大復條奏各省選拔貢生二場亦應改判為詩部議應如所請并議各省嵗貢亦應改判為詩從之改定嵗科兩試文藝之例向例生員嵗試作四書文二篇經文一篇冬日一書一經科試作四書文一篇經文一篇時務䇿一篇至是御史劉龍光奏請嵗試用一書一經科試用一書一策不論春夏秋冬考試俱增試律詩一首五言六韻學臣命題遵照鄉試題定之例期於中正雅馴不許引用僻書私集其應用韻本令學政官備辦臨期給發以便士子檢閲部議應如所請從之改定大名元城等學取進童生額數及魏縣為鄉學各例直𨽻魏縣裁缺就近改併大名元城二縣管轄魏縣原額十八名武童十五名內撥文武童生各二名大名縣原額文童十八名武童十五名內撥文武童生各一名俱歸入元城縣將元城縣學額定文童二十一名武童十八名大名縣學額定文童十七名武童十四名其撥剩之魏縣原額文童十六名武童十三名另編鄉學字樣考試取進大名縣訓導一員専管鄉學事務增定江西寧都直𨽻州學取進童生額數定例瑞金石城增額三名內各減一名撥給寧都州學以寧都升縣為州不得仍分贛郡學額也二十四年設簿稽查生監詞訟按季立簿由學政印發各州縣於自理詞訟及上司批查事件內有生監屬原告或係被告者將兩造姓名簡明事由已結未結按月登記兩季申繳一次聽學政查核如生監為人作證係他人牽連許本生辨明免其開注若係無故多事出身作證即屬不守學規令地方官詳明學臣分别戒飭停止捐納貢監歸各學教官管束之例向例捐納貢監照依生員之例一併歸學舉報優劣嚴加約束至是以捐納貢監其途本雜教官職司訓課不能董率稽查仍責成州縣官約束除犯細事應行戒飭者仍會同教官靣行撲責外其餘事件教官例不得干預府州縣仍遵例將犯案緣由申報督撫學政杳核至舉報貢監優劣學政臨按時仍行照例揭報義奉上諭前因磨勘順天等省鄉試卷見其中詞句紕繆者不一而足甚至不成文義如飲君心於江海之語於文風士習深有關係已降旨宣諭中外俾衡文作文者知所警惕苐念别裁偽體以端風尚固在考官臨時甄拔公明而平時之造就漸摩使士子皆知崇實黜浮不墮揣摩撏扯惡習則學政責任尤重鄉會兩試乃士子進身階梯而學臣於三年之前嵗科考校評隲甲乙者此日之生童即可為他日之舉人進士所云正本清源舍是無由也為學政者果能以清真雅正為宗一切好尚竒詭之徒無從幸售文章自歸醇正否則素日趨向紛岐一當大比為試官者鎖闈校拔不過就文論文又何從激勸而懲創之且學政按臨謁廟講書原與士子相見非考官易書糊名暗中摸索者可比文字一道人品心術即於此見端自應隨時訓勵整頓務去佻巧僻澀之澆風將能為清真雅正之文亦可望為醇茂端謹之士由此賢書釋褐足備國家任使斯士子無負科名而學臣亦不負衡文之任但不得因有是旨徒以字句疵戾易為磨勘指摘遂専取貌似先正之文於傳注無所發明至相率而歸於空踈淺陋此又所謂矯枉過正救弊適以滋弊不獨輿論難誣一經朕鑒察亦惟於該學政是問今嵗正學政受代之始諸臣皆朕特簡各宜勉副興賢育才至意著將此旨録於學政公署并各府州縣學明倫堂用資觸目警心而凡我多士亦皆得審所就範朕實有厚望焉二十五年禮部議覆江蘇學政李因培條奏清查屯衛事宜一查明該衛勳軍屯軍户口及坐落各縣責成該衛守備彚造戶口清册分送學政司府三處存貯將來童生應試持此核對如有不符即行剔除一從前民籍冒進生員即令改歸民籍其子弟俱隨父兄之籍考試不得轉輾混冒一衛籍考試宜歸衛守備報名録送提調轉送學政衙門該衛弊端即令松江府查察以専責成一童生既歸録送應令守備在該衛適中之地考試以免童生跋涉之艱均應如所請行至金山衛學廪增二十名既經將冒籍各生改歸應將原額二十名內撥出華亭婁縣上海南滙四學各一名外再酌減四名出貢年分酌議三年一貢其取進童生先經二十一年裁定十六名今應再酌減四名以十二名為定額從之申嚴邊省生童寄籍冒考之弊先是粵西本地應試無人準其令外省及本省異府人入籍嗣經冒籍紛紛議準停止至是學政鞠愷奏粵西應試生童多係冒籍現在嚴行查辦并請將已經冒籍入學各生準照順天冒籍生員罰停鄉試一科例辦理事下部議並諭此等冒考弊竇在江浙等處尚少他如雲貴川廣偏僻州縣文風稍陋他省人或因父兄作幕或因親友貿易遂爾乘便混考皆所不免并著各該學政留心查察毋使滋弊尋議冒籍各生照例停科以示警戒並行知雲貴川廣學政遵照辦理從之新設湖南永綏廳學先是二十四年湖南學政鄭虎文奏辰州府屬之乾州鳯凰永綏三廳皆新闢苗疆乾鳯二廳已於雍正十年設學取士人文日開比隆內地惟永綏建治稍後未經設學請照乾鳯二廳之例一體設學經部議督撫會同學政查明實在情形詳悉妥議至是查覆該地民苗童生肄業義學頗通文義堪以應試者二百餘人應一體設學其教職一員以辰溪縣訓導管理部議應如所請從之改定考試童生文藝之例向例四書文二篇經文一篇至是裁去四書文一篇增試排律以一書一經一詩命題定直省學臣考試無得割裂命題并停止試卷解部磨勘之例二十六年定義學歸學臣考核之例雲南學政李中簡奏請嗣後各府州縣義學教習如係舉人副榜拔貢嵗貢文理本優者聽各屬延請册報外其生員飭令該教官將文理優通品行純篤者保送地方官該印官覆加訪核親試然後延請仍令教官不時稽查如有荒廢學課生徒遊蕩者即行更换其别途初學之輩不許延請得旨允行頒御製平定回部碑文於直省學宫詳見太學門改併甘肅華亭所屬生員入固原州學以是時甘肅華亭縣屬之瓦亭驛何家大堡改𨽻固原州因將瓦亭驛何家大堡等處文武生員俱改歸固原州學二十七年增減四川茂州等州縣童生入學額數原定茂州取進童生十二名保縣十二名松潘八名越嶲八名資州八名眉州八名新寧四名至是學臣以茂州松潘越嶲保縣應考之人稀少請將茂州保縣各減四名松潘越嶲各減二名酌加資州四名眉州二名新寧二名尚有二名俟松潘等處人文稍盛奏請增給部議應如所請從之更定四川茂州等州縣廩增額數茂州原額廩增三十名減去十名松潘越嶲二十名各減去二名保縣二十名減去六名量加資州五名眉州五名新寧五名餘五名加於新寧所分之梁山縣學增設貴州荔波縣廩增額禮部議準學臣湯先甲條奏荔波縣由廣西改入黔省尚未開設廩增以致現在童生並無保結應額設廩增二名自乾隆二十八年為始定考列下等武生罰贖對讀之例禮部議準江蘇學政李因培條奏武生考列四等全無文理以之對讀文生之卷伊等亦自揣不能每多規避請照文生不願對讀者一體準其罰贖銀三兩解交藩庫雇覔對讀至二十九年更定五等武生亦照五等文生罰贖之例罰銀六兩仍令解交藩司照例辦理二十八年定江西棚民入學悉歸土籍之例先是雍正九年定棚民另額取進之例至是議準均歸土籍考試毋庸另立棚籍以杜冒占二十九年定四川嘉定等府縣學廩增生員各額先是議準川陜總督尹繼善題請新設嘉定潼川二府學各取進文童十五名樂山三臺二縣原係州學今改縣學應將原額廩增各三十名內撥十名入府學至是學政博卿額奏請嘉定潼川二府各添廩增十名部議應如所請從之更定生員補考之例嗣後隨棚補考生員即令本地府廳同教官嚴加考試將原卷鈐印封送學政毋令本生親賫另差門斗伴送補考其隨棚提調考試補送并徑由教官補送之處概行禁止又頒發周易述義詩義折中春秋直解於直省學宫裁併山西清源縣改為鄉學例裁清源歸併徐溝縣管理其清源縣學改為清源鄉學考試生童另編鄉學字樣考試事宜照舊辦理其考試武生亦照文生童一例辦理徐溝縣訓導移駐清源鄉學頒給徐溝縣訓導管理清源鄉學鈐記定督撫委署教官咨明學臣例嗣後教官缺出毋論暫署委署督撫均於委署時咨明學臣存案該員仍將到任日期報明學臣備案定生員承襲土司規避考試之禁嗣後土司由生員承襲者自揣不能應試準其告退其願應試者飭令如期應試不得托故避考違者黜革銷燬刪本禮記湖南學政李綬奏嗣後専習禮記生童須讀全經不得仍以刪本自欺其現在坊間所刻刪本禮記飭令地方官出示銷燬已經刷印者禁止販賣毋許存留部議準行從之裁定山西平順鄉學例裁平順縣歸并潞城黎城壺關三縣管理其原𨽻平順生童準另編平順鄉學字樣裁汰平順學訓導仍留鄉學即𨽻潞城縣管轄仍給潞城縣管理平順鄉學鈐記三十年上南巡詔增本年江蘇安徽二省分縣選拔貢額定例選拔貢生府學二名州縣學一名江蘇安徽二省有分設各縣仍于新舊兩學中彚拔一人貢入成均肄業至是上念分設各邑版籍既繁膠庠亦盛兩學合取一人懷才者未免拘於常格特加恩將分設各縣於本年選拔時每學各取一人又頒發御製詩初集二集御製文初集各一部於直省減定四川夔州府學廩增額數先是雍正十二年額減取進生童名數廩增額缺未經議裁至是學政以該學人文與四十名廩增額缺不能相稱請定為三十四名其餘六名裁汰部議應如所請從之陜甘總督楊應琚奏甘省蘭山書院延請丁憂在籍之府丞史茂來主講席上以回籍守制之員竟居省會書院教授生徒與地方官應酬則與居官無異微特人子之心難安亦無以為多士表率諭曰督撫有維持風教之責縉紳積學砥行之儒足備師資者諒不乏人何必令丁憂人員靦居講席是應聘者固不能以禮自處而延請之地方大吏亦復不能以禮處人於風化士習微有關係恐他省不無類此者特為明切曉示通諭之皇朝文獻通考卷七十一
