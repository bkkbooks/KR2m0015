body:
  text: 欽定四庫全書皇朝文獻通考卷九十九郊社考九堂子臣等謹按太祖髙皇帝建國之初有謁拜堂子之禮凡每嵗元旦及月朔國有大事則為祈為報皆恭詣堂子行禮大出入必告出征凱旋則列纛而告典至重也順治初年以前堂子在盛京撫順門外迨定鼎燕京即建堂子於玉河橋東祭法明備詳載典禮而内廷䖍祀夙夜寅清即古聖王亦保亦臨之義我皇上詔諸典䇿明示義法然後知天神之祀稽古而合敬考典文與郊社以義相從内廷之祭即以類載制度儀節皆備詳焉天聰九年八月乙巳太宗文皇帝親謁堂子行拜天之禮是嵗征察哈爾奏凱師還太宗率諸貝勒大臣謁堂子鳴角奏樂拜天行禮崇徳元年五月以大軍征明親率王貝勒等謁堂子行禮拜纛出師十二月壬申以親征朝鮮謁堂子行禮拜纛啟行先是於冬至祀天即告出征遂告於廟出師之日設鹵簿吹螺奏樂親謁堂子行禮於堂子外建立八纛吹螺奏樂拜纛啟行次年班師詣堂子行禮臣等謹按崇徳改元在天聰十年四月是時大軍四征皆簡師整旅親率王公大臣詣堂子行禮乃列纛而拜然後親莅軍中誡諭遣行奏凱復行展拜殆無虚嵗武功赫濯此其常典矣七年三月庚辰以克錦州謁堂子行禮是嵗征明之師以錦州㨗聞太宗率王貝勒等陳鹵簿鼓吹謁堂子行禮復行拜纛之禮順治元年四月丙寅世祖章皇帝命王貝勒帥師平定中原親詣堂子奏樂行禮拜纛出師九月建堂子於京師定上香致祭謁告之禮是年既定燕京即建堂子於長安左門外玉河橋東街門北向内門西向正中為祭神殿南向前為拜天圜殿殿南正中設大内致祭立杆石座次稍後兩翼分設各六行行各六重第一重為皇子致祭立杆石座次親王郡王貝勒貝子公各以次序列北向東南為上神殿南向崇徳元年定制每年元旦皇帝率親王以下副都統以上及藩王等詣堂子上香行三跪九拜禮順治二年以元旦或親詣行禮或不行禮令禮部預期題請康熙十一年元旦行禮令鳴贊官贊禮初制皇帝親詣行禮滿漢大臣皆從康熙十二年令漢官勿隨往後惟王公滿大臣一品文武官隨往行禮又元旦有掛錢之禮初制王貝勒得掛後貝勒以下不掛每月朔日親王以下貝子以上各遣一人齋戒一日詣堂子供獻每嵗春秋二季立杆致祭王貝勒祭三杆貝子鎮國公輔國公祭二杆鎮國輔國奉國將軍祭一杆不祭者聴其無爵宗室不祭今自分公大内至入八均祭一杆將軍等不立杆致祭其毎月致祭日期初一日大内致祭以後王貝勒各以次輪一日致祭若遇大内致祭則應祭者停祭貝子公等亦依次致祭凡祭三杆者於定期内祭一杆十一日後再祭二杆其日有兩三家同祀神者以次為先後或應祭之家有事不能祭預告禮部知㑹次祭者致祭有事者以間補祭若為馬羣致祭者王公得祭將軍不得祭若違例多祭并争祀神者有罰凡官員庶民等設立堂子致祭者永行停止毎年四月八日大内並毎旗王貝勒一人依次備供大内及軍民人等不祈禱不報祭不宰牲不理刑名餘詳儀注康熙十三年正月乙亥以遣大將軍王帥師出征聖祖仁皇帝親詣堂子行禮次於纛前行禮是嵗吳三桂叛逆遣寧南靖寇大將軍多羅順承郡王勒爾錦帥師之湖廣安西將軍都統業赫帥師之四川御正殿授勅即詣堂子行禮祭旗纛還至西長安門送之行命王以下副都統以上俱乗馬馳而過十月遣將之江寧廣東行禮皆同十四年閏五月癸夘以平定察哈爾凱旋聖祖迎勞於南苑遂率大將軍王暨諸王大臣詣堂子行禮三十五年二月丙辰聖祖親征噶爾丹率諸王大臣詣堂子行禮祭旗纛啟行六月癸巳凱旋詣堂子行禮五十七年十一月己丑以遣大將軍王帥師出征親詣堂子行禮是嵗大兵進勦䇿旺阿喇布坦以撫逺大將軍帥師聖祖御太和殿設鹵簿出征大將軍王等以下俱戎服不出征者蟒服以從詣堂子行禮次鳴角祭旗纛雍正七年六月乙未以遣大將帥師西征世宗憲皇帝親詣堂子行禮是嵗大軍進勦凖噶爾遣靖邉大將軍出師北路世宗率大將軍以下及諸王大臣詣堂子行禮鳴螺祭纛御東長安門外黄幄親視大將軍等乗馬啟行乾隆十三年十一月癸丑以遣大臣經畧金川皇上親詣堂子行禮先是四川金川畨族逆命特命大學士傅恒經畧軍事出師之日皇上率經畧大學士及王公大臣等詣堂子行禮祭纛禮畢御長安門外黄幄賜經畧大學士酒及馬親視乗馬啟行次年凱旋祗告如初告之禮嗣是乾隆二十年平定凖噶爾二十四年平定回部四十一年平定兩金川出師及凱旋並祗告如禮十四年五月詔定出征凱旋告祭堂子之禮議政王大臣等奉諭㫖堂子之祭乃我朝先代循用通禮所祭之神即天神也列祖膺圖御宇既稽古郊禋而燔柴典重舉必以時堂子則舊俗相承遇大事及春秋季月上旬必祭天祈報嵗首最先展禮定鼎以來恪遵罔怠且不易其名重舊制也考諸經訓祭天有郊有類有祈穀祈年禮本不一兵戎國之大事故命遣大將必先有事於堂子正類祭遺意而列纛行禮則禡也我祖宗於行營中或别有征討不及歸告堂子則望祭而列纛行事其誠敬如此朕思出師告遣則凱旋即當告至乃天地宗社俱已祝冊致䖍且受成太學而堂子則弗之及祠官疎畧如神貺何祀典攸闗彛章宜備著議政王大臣詳議具奏朕親為裁定王大臣等遵㫖議上大兵凱旋皇帝告祭堂子之禮請載入㑹典從之十九年四月更定王公致祭堂子建立神杆之制諭禮部等衙門王公等建立神杆理應按照爵秩等次設立整齊以肅觀瞻著毎翼作為六排毎排六分以未分封皇子等列於前其次則親王郡王貝勒貝子公等分為六層設立神杆皇子内已受封爵者其神杆視所封爵立於應立之處所有石座不必移動神杆各按爵次更换毎年修整一次交禮部會同内務府總管查看繪圖進呈著為例尋禮部等衙門議奏謹遵諭㫖神杆石座每翼為六排毎排為六分皇子神杆列於前其次親王郡王貝勒貝子公各按排建立但查左翼親王現有七位今一排建立六杆應將第七位親王神杆列於次排郡王之首其郡王貝勒貝子公俱按次接續右翼親王四位郡王六位貝勒二位貝子二位公十七位人數多寡不一不能每排俱得六人之數應将親王列於前其次郡王貝勒貝子公按一排六分之數通融接續叙列奏入従之四十七年正月元旦皇上親詣堂子行禮導迎如儀是年正月初四日上辛祭祈穀壇禮臣奏請初一日皇上未詣齋宫之前拜神行禮均可各昭誠敬毋容改期並奏禮成還宫時尚在未入齋戒以前仍導迎作樂以昭大典從之堂子祀儀凡嵗正元旦皇帝率王公滿一品文武官詣堂子行拜天禮禮部尚書奏請是日内務府官設皇帝拜位於圜殿外甬道正中鴻臚寺卿率鳴贊官夾道東西面序立有司陳香鐙内務府總管一人率諸王一等䕶衛各一人預詣圜殿内進楮帛鑾儀衛陳法駕鹵簿詳見鹵簿於午門外日出前十刻禮部堂官詣乾清門奏請詣堂子行禮皇帝禮服乗禮輿出宫前引大臣十人後扈大臣二人豹尾班執槍佩刀侍衛二十人佩弓矢侍衛二十人翊衛如儀駕發警蹕午門鳴鐘鹵簿前導不與行禮之百官及外藩䝉古王公台吉朝鮮諸國使臣咸朝服跪送導迎鼓吹設而不作皇帝由堂子街門入禮部堂官二人恭導至内門降輿皇帝由中門入至圜殿前就拜位南向立鴻臚寺官引王公位丹陛上各官位丹陛下均南向按翼序立東位西上西位東上鴻臚寺官奏跪拜興皇帝率羣臣行三跪九拜禮奏禮成禮部堂官恭導皇帝出内門陞輿鹵簿前導導迎樂作奏祐平之章辭見樂考皇帝回鑾王公從各官以次退不與行禮之百官等跪迎如初儀午門鳴鐘王公隨駕入内至金水橋恭候皇帝還宫王貝勒貝子赴乾清門竢入坤寧宫祭神殿行禮右元旦謁拜嵗以季春季秋月朔日或二四八十月或上旬諏吉祭神於堂子前一日所司立杆於圜殿南正中石座祭日懸黄旛繫綵繩綴五色繒百縷楮帛二十有七備陳香鐙由大内恭請神位安奉於祭神殿内南向陳餻餌九盤酒琖三圜殿陳餻餌三盤酒琖一楮帛如前數設御座於祭神殿檐下西旁鑾儀衛陳法駕鹵簿如儀日出前十刻禮部堂官詣乾清門奏時皇帝御龍袍衮服乗禮輿出宫警蹕扈從百官跪送皆如元旦儀禮部堂官朝服自街門恭導皇帝至内門降輿由中門入至祭神殿陞階至檐下就御座東向坐諸王貝勒於丹陛上貝子入八分公於丹陛下均按翼北上東西面相向坐贊祀二人先於祭神殿次於圜殿内均九酌獻三致禱司俎官率執事奏樂舉和畢所司設御拜位一於祭神殿一於圜殿禮部堂官恭導皇帝詣祭神殿圜殿拜位立贊祀各致祝辭皇帝各行一跪三拜禮王公序立丹陛下兩傍不隨行禮禮畢恭導皇帝至檐下就御座南向坐王公等各就原處列坐司俎尚膳徹餕尚茶徹酒皇帝命分賜王公各祗受訖降丹陛下序立禮部堂官跪奏禮成恭導皇帝由中門出陞輿奏樂回鑾百官跪送王公隨入至内金水橋均與元旦同恭奉神位還御如皇帝不親行禮王公百官不齊集以贊祀致辭行禮越日為馬祭如儀右立杆致祭王公等致祭日立杆於各班位石座至街門外下馬自内門右門入坐於西檐前階下東面右王公致祭每嵗孟春上旬三日餘月朔日大内遣司俎官率堂子官吏於圜殿奠獻餻酒楮帛贊祀六酌獻三致禱司俎官率執事奏樂舉和贊祀祝辭行禮如儀是日内管領一人於上神殿獻餻酒楮帛親王郡王各遣䕶衛一人於上神殿獻楮帛凡執事者均先期齋戒右月祭每嵗孟夏上旬八日司俎官率執事人等自大内請佛至堂子祭神殿陳香鐙獻餻酒王公各遣人獻餻執事設盥盤贊祀二人浴佛畢六酌獻三致禱如儀禮畢奉佛還御右浴佛凡出師展拜堂子皇帝親征屆日鑾儀衛陳騎駕鹵簿詳見鹵簿於午門外列䝉古畫角十六海螺二百於堂子街門外左右兵部設御營黄龍大纛於堂子内門外之南列各旗纛於後屆時皇帝御征衣佩刀出宫乗騎前後翊衛駕至長安橋軍士吸角吹螺駕入堂子街門王公以下跪迎隨入螺角止皇帝降騎禮部尚書侍郎恭導由中門入就圜殿外拜位南向鴻臚寺官鳴贊皇帝行三跪九拜禮王公等隨行禮畢螺角齊鳴恭導皇帝詣旗纛前望纛行三跪九拜禮不贊王公等隨行禮畢螺角止皇帝乗騎作樂啟行右親征展拜凡遣將出師祗告堂子出師之日兵部建八旗大纛各一於堂子南門外之南軍士執螺角列於街門外從征軍士按翼分列於甬道左右皇帝駕至長安橋軍士吸角吹螺大將軍以下暨王公大臣等跪迎於街門之内螺角止禮部尚書侍郎恭導皇帝降輿就位行禮羣臣咸隨行禮恭導皇帝出堂子内門螺角鳴皇帝至纛前行禮大將軍以下均隨行禮畢皇帝回鑾至東長安門外張黄幄升座賜大將軍酒大將軍率將士謝恩行禮畢皇帝命乗馬啟行百官餞送如儀右遣將祗告皇帝親征既克有罪諏吉凱旋至日鑾儀衛陳法駕鹵簿自郊外至堂子門外駕至堂子内門禮部尚書侍郎恭導皇帝致祭堂子並如出師祭告之儀大將軍奏凱而還禮部請㫖諏吉陳設如儀屆時禮部尚書奏請皇帝詣堂子行禮凱旋將帥大臣及王貝勒大臣俱從禮部尚書恭導皇帝行禮均如出師祭告之儀右凱旋大内祭神儀凡大内祭神奉晨祀神位於祭神殿西位東向奉夕祀神位於西北南向日昧爽於晨祀神位前設餻餌九盤尊一琖一鑪三寅刻進二豕於庭贊祀就神位前酌獻祝禱司俎官率所屬奏樂舉和畢贊祀跪致辭迺刲牲先薦血次熟而薦於俎贊祀酌獻致辭行禮畢徹饌分爼如儀申刻於夕祀神位前陳琖五鑪五不酌獻祝禱時伐鼓餘俱與朝薦同皇帝恭祭壇廟齋戒日忌辰清明禁屠日不祭餘日皆祭月朔之翼日昧爽立杆於庭陳豕一以祀天司祝致辭畢刲牲先薦血次倫膚為膾並炊穀飯以薦司祝致辭如前每嵗四孟月均用馬牛金幣祗薦於神贊祀致辭如儀皇朝文獻通考卷九十九
