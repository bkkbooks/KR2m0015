司樂贊舉終獻樂奏恬平之章樂作舞同亞獻司爵獻爵於右兩廡隨分獻均如亞獻儀畢樂止文德之舞退右三獻既終獻太常寺贊禮郎一人少前西面立贊答福胙光祿寺卿二人奉福胙至太昊伏羲氏位前拱舉退祗立於皇帝拜位之右侍衛二人進立於左贊引奏跪皇帝跪左右官皆跪奏飲福酒右官進福酒皇帝受爵拱舉授左官次受胙如飲福之儀奏拜興皇帝三拜興又奏跪拜興皇帝率羣臣行二跪六拜禮典儀贊徹饌司儀贊舉徹饌樂奏淳平之章樂作徹畢樂止右受福胙徹饌典儀贊送神司樂贊舉送神樂奏匡平之章樂作贊引奏跪拜興皇帝率羣臣行二跪六拜禮興樂止右送神典儀贊奉祝帛饌送燎司祝司帛詣各神案前咸跪三叩司祝奉祝司帛奉篚興司香跪奉香司爵跪奉饌興以次由中道出恭送燎所皇帝轉立拜位旁西向司拜褥官徹拜褥俟祝帛過仍布拜褥皇帝復位立兩廡香帛饌均送焚燎太常寺贊禮郎引分獻官退鴻臚寺官引陪祀王公百官均退立拜位東西旁樂作樂章與上並為一闋贊引奏禮成恭導皇帝仍由景德門中門出升輿法駕鹵簿前導導迎樂作奏祐平之章不陪祀王公百官仍朝服祗候駕至跪迎午門鳴鐘樂止王公隨駕入內至內金水橋恭候皇帝還宫各退太常寺官徹乾清門齊戒牌銅人送寺右禮成回鑾遣官致祭先二日視牲如儀承祭官分獻官暨文官郎中武官參領世爵輕車都尉以上均於邸第致齊先一日太常寺以祝版送內閣恭書受而藏諸神庫光祿寺少卿御史禮部祠祭司官朝服視割牲瘞毛血有司供具並如儀及祀之日雞初鳴承祭官及分獻官朝服祗俟於廟禮部侍郎入廟省齍畢質明承祭官王公入景德左門領侍衛內大臣尚書等入右門升左階位於階上領侍衛內大臣尚書等位階下北面迎神贊就上香位出入殿左門承祭官分獻官及陪祀官行三跪九叩禮不飲福受胙王公不陪祀贊引以太常寺贊禮郎祝帛送燎避立西旁東面餘均如儀右遣官儀皇朝文獻通考卷一百十九
