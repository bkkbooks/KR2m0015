body:
  text: 欽定四庫全書皇朝文獻通考卷一百十九羣廟考一臣等謹按臣等恭纂皇朝文獻通考內宗廟考稿本於乾隆二十七年閏五月十八日進呈恭候欽定十九日奉上諭續文獻通考館纂進稿本朕閲宗廟考一門內附入致祀歷代帝王及本朝臣下家廟顧名思義於輯書體例何居蓋既以宗廟冠部則惟太廟時祫典有專崇方稱經常不易至奉先殿之禮重家庭夀皇殿安佑宫永佑寺之䖍奉神御於宗廟考中敬從附載尚為不失禮以義起之文若托入歷代及臣下非惟其制絶不相䝉揆之分門本義亦復何取即云承用宋臣馬端臨原編舊式而往代儒生之識於大典未克折衷盡善類此者正復不少又豈得違禮而曲泥之朕意當於宗廟考專門備詳定制外其餘不應附入者别立羣廟考一門𨽻之俾名義既得所安而其書亦足垂逺館臣可録朕㫖並登卷中臣等恭繹諭㫖仰見皇上聖裁超越明禮辨分即一書之改定而於禮之大典秩然其有序書之大體犁然其各當惟勿雜而勿遺乃允歸於至善今敬遵訓示專輯宗廟考既重加修飭别立羣廟考以列於後首載歷代帝王廟次歷代帝王陵次諸臣祠蓋自列聖以來崇德報功褒勳恤節馨香溥薦於百王恩施宏被於庶職昭千秋之公論發異代之幽光所以景仰前徽風示有位者固已禮從其隆澤極其厚矣我皇上紹緒之初上承列祖肇舉彞章即詔以明恭閔惠皇帝入享廟祀至大至公允足垂訓千古近復敬體聖祖仁皇帝諭㫖增祀兩晉南北朝後五代創守各主而前明諸陵不靳百萬帑金重加修復我皇上以聖祖之心為心以天地之量為量折衷百代褒貶悉當自有帝王之祀於斯為極至於崇奬忠貞闡揚節義不獨當時僚庶幸際聖明均䝉褒録即勝國遺臣皆得上邀天鑒概為表章沛格外之深仁扶倫常之正氣典至巨也若夫先代聖賢忠烈與夫聖朝勳臣良弼恭遇時巡方嶽或親臨奠酌或遣官馨薦總曰特祀用昭殊禮又次載京師王廟京師功臣宗祠亦猶古諸侯之有家廟也而親王世子郡王貝勒貝子宗室品官家廟與夫庶士庶人家祭皆備録其儀文而大夫士庶之禮胥在統之於一王守之於萬世夫乃得窺聖天子議禮精意俾我臣庶於羣廟考識禮之所以大則益於宗廟考識禮之所以尊矣謹編至乾隆五十年成六卷以敬俟續録歷代帝王廟皇城之西阜成門內南嚮廟門三間左右門各一前石梁三內景德門五間崇基石闌前後三出陛中十有一級左右各九級左右各一門正中景德崇聖殿九間重檐崇基石闌南三出陛中十有三級左右各十有一級東西一出陛各十有二級兩廡各七間燎爐各一殿東御碑亭一後祭器庫五間均南嚮景德門外東為神庫神厨宰牲亭井亭各一西為承祭官致齊所東南鐘樓一圍垣周百八十六丈三尺八寸門外東西下馬碑各一凡正殿門廡俱覆黃色琉璃瓦門楹塗丹梁棟五采順治二年三月增定歷代帝王廟祀典是月甲申朔禮部言三月三日例祭歷代帝王按故明洪武初立廟元世祖入廟祀而遼金諸帝皆不與焉但稽遼則宋曾納貢金則宋曾稱姪當日宋之天下遼金分統南北之天下也帝王廟祀似不得遺應以遼太祖及功臣耶律赫魯金太祖世宗及功臣完顔尼瑪哈完顔沃里布俱入廟祀元世祖之有天下功因太祖未有世祖入廟而可遺太祖者則元世祖之上應追崇元太祖其功臣穆呼哩巴延應從祀焉至明太祖及功臣徐達劉基並宜增祀用彰皇上追崇至意從之丙戌遣官祭歷代帝王廟時增定祀典遣户部尚書英俄爾岱祭太昊伏羲氏炎帝神農氏黃帝軒轅氏帝金天氏帝高陽氏帝高辛氏帝陶唐氏帝有虞氏夏禹王商湯王周武王漢高祖光武唐太宗宋太祖元世祖及增入遼太祖金太祖世宗元太祖明太祖共二十一帝禮部尚書覺羅郎球工部尚書星訥梅勒章京吳拜兵部侍郎朱嗎喇分祭配享功臣風后力牧皋陶龍伯夷䕫伯益伊尹傅說周公旦召公奭太公望召穆公虎方叔張良蕭何曹參陳平周勃鄧禹馮異諸葛亮房元齡杜如晦李靖李晟郭子儀張巡許逺曹彬潘美韓世忠張浚嶽飛及增入赫魯尼瑪哈沃里布穆呼哩巴延徐達劉基共四十一臣諸帝王祀以太牢筵各一品俱二十四功臣祀以少牢二位筵共一品俱十八月丙午遣官祭歷代帝王廟自後嵗以春秋仲月諏吉遣官致祭著為定典十四年正月癸未定親祭歷代帝王廟儀二月丁酉世祖章皇帝親祭歷代帝王廟先是十三年十二月己亥世祖章皇帝諭禮部古來聖帝明王皆有大功德于民者所以纍代相因崇祀不替今歷代帝王廟祭典雖已修舉但十三年來俱係遣官致祭朕今欲於明春親詣行禮以抒景仰前徽至意爾部即酌議禮儀具奏是年正月癸未允禮部奏至是親詣行禮儀注詳後時禮部議覆山東道監察御史顧如華疏帝王廟創建於故明及我朝增定金太祖世宗遼太祖元太祖明太祖共二十一帝皆係開創不及守成但守成不乏誼辟如商之中宗高宗周之成王康王其行事見於詩書誠為守成令主漢之文帝史稱其節儉愛民海內家給人足宋之仁宗恭儉忠厚培有宋三百年之基明之孝宗仁恭節用任賢圖治始終不渝應否入廟並祭仰候睿裁至從祀功臣似應照舊惟宋臣潘美雖平南漢有功然斜谷之敗不能制護軍王侁擅離陳家谷口致楊業父子無援而死宋之不能復征契丹實由此敗又宋臣張浚三命為將而一敗於富平關陜淪亡再敗於淮西酈瓊叛命三敗於苻離而中原不可復且劾李綱殺曲端與嶽飛議不合奏飛欲專兵柄觀史書所載未可與韓世忠嶽飛同日並論此二臣宜皆罷其從祀得㫖商中宗高宗周成王康王漢文帝宋仁宗明孝宗俱入廟並祭遼太祖金太祖元太祖原未混一天下且其行事亦不及諸帝王不宜與祭著停止康熙元年二月乙巳復定歷代帝王廟祀典時大學士㑹同禮部議覆歷代帝王祀典如遼太祖金太祖元太祖俱係開創之主仍宜入廟從祀至商中宗高宗周成王康王漢文帝宋仁宗明孝宗守成七帝應照㑹典在各陵廟致祭宋臣潘美張浚已經罷祀無庸議從之三年三月丙午詔修歷代帝王廟六十年四月詔增定歷代帝王廟祀典是月丙申諭大學士等朕披覽史册於前代帝王每加留意書生輩但知譏評往事前代帝王雖無過失亦必刻意指摘論列短長全無公是公非朕觀歷代帝王廟崇祀者每朝不過一二位或廟享其子而不及其父或配享其臣而不及其君皆因書生妄論而定甚未允當况前代帝王曾為天下主後世之人俱分屬臣子而可輕肆議論定其崇祀與不崇祀乎今宋明諸儒尚以其宜附孔廟奏請前代帝王既無後裔後之君天下者繼其統緒即當崇其祀典朕君臨宇內不得不為前人言也朕意以為凡曾在位除無道被弒亡國之主外應盡入廟崇祀爾等公同從容詳議具奏至六十一年四月辛酉禮部㑹議自伏羲氏以逮有明應入廟崇祀帝王及從祀功臣詳開一摺偏據一方不入正統及不應崇祀者詳開一摺疏覆上諭大學士等曰此所議應從祀處皆是但其中尚有宜詳細斟酌者從前所定配享功臣大概開國元勳居多如明之徐達不過一草莽武夫劉基係元之進士遭遇成功遂以元勳配享其治安之世輔佐太平有功軍國者反不得與配享列是皆未為允當也又如有明天下皆壞於萬厯泰昌天啓三朝愍帝即位未嘗不勵精圖治而所值事勢無可如何明之亡非愍帝之咎也朕年少時曾見故明耆舊甚多知明末事最切野史所載俱不足信愍帝不應與亡國之君同論萬厯泰昌天啓實不應入崇祀之內爾等㑹同九卿分别確議具奏六十一年十二月丁丑增設歷代帝王廟牌位遣履郡王允祹致祭是月壬戌禮部遵大行皇帝諭㫖議覆歷代帝王廟原祀伏羲氏神農氏軒轅氏金天氏高陽氏高辛氏陶唐氏有虞氏夏禹王商湯王周武王漢高祖世祖唐太宗遼太祖宋太祖金太祖世宗元太祖世祖明太祖二十一位今擬增夏啓仲康少康杼槐芒泄不降扄厪孔甲臯發商太甲沃丁太庚小甲雍巳太戊仲丁外壬河亶甲祖乙祖辛沃甲祖丁南庚陽甲盤庚小辛小乙武丁祖庚祖甲廪辛庚丁太丁帝乙周成王康王昭王穆王共王懿王孝王夷王宣王平王桓王莊王僖王惠王襄王頃王匡王定王簡王靈王景王悼王敬王元王貞定王考王威烈王安王烈王顯王慎靚王漢惠帝文帝景帝武帝昭帝宣帝元帝成帝哀帝明帝章帝和帝殤帝安帝順帝冲帝桓帝靈帝昭烈帝唐高祖高宗睿宗元宗肅宗代宗德宗順宗穆宗文宗武宗宣宗懿宗僖宗遼太宗景宗聖宗興宗道宗宋太宗真宗仁宗英宗神宗哲宗高宗孝宗光宗寧宗理宗度宗端宗金太宗章宗宣宗元太宗定宗憲宗成宗武宗仁宗泰定帝文宗寧宗明太宗仁宗宣宗英宗景帝憲宗孝宗武宗世宗穆宗愍帝凡一百四十三位其從祀功臣原祀黃帝臣風后力牧唐虞臣臯陶䕫龍伯夷伯益商臣伊尹傅說周臣周公旦召公奭太公望召虎方叔漢臣張良蕭何曹參陳平周勃鄧禹馮異諸葛亮唐臣房元齡杜如晦李靖郭子儀張巡許逺李晟宋臣曹彬韓世忠嶽飛遼臣耶律赫魯金臣尼瑪哈沃里布元臣穆呼哩巴延明臣徐達劉基三十九人今擬增黃帝臣倉頡商臣仲虺周臣畢公高吕侯仲山甫尹吉甫漢臣劉章魏相丙吉耿弇馬援趙雲唐臣狄仁傑宋璟姚崇李泌陸贄裴度宋臣吕䝉正李沆寇凖王曾范仲淹富弼韓琦文彥博司馬光李綱趙鼎文天祥金臣呼嚕元臣博果密托克托明臣常遇春李文忠楊士竒楊榮于謙李賢劉大夏凡四十人世宗憲皇帝諭是依議速行至是增設牌位遣履郡王允祹行禮世宗憲皇帝御製祭文於赫上帝降衷下民維后綏猷繼天立極大統肇開於三古丕基遞嬗於纍朝崇祀帝王廟者凡二十有一君厥惟舊矣皇考大行皇帝一中允執兩大兼參彚治功道量之全極武烈文謨之盛俗盡躋於上理情彌軫乎前光定諸史之公評抒千秋之卓識謂興王創業既多戡定鴻勳即令辟守文不乏綏和美化歷年多寡不必同符致治淺深原難一轍履至尊而制六合聮寰宇以為一家萬方共戴尊親億兆胥依父母即當奕世維新之治追念勝朝式廓之疆曾經食土踐毛尚有先疇舊德豈得以拘儒苛論妄潔短長更難以稗乘鮮聞恣慿褒貶特頒明諭遍採羣言豆登溥薦於百王榱桷永光夫萬祀亦有熊羆之士宣力旗常不無鼎鼐之臣勞心輔弼股肱一體生前獲荷天休廊廡列筵身後仍陪廟享於戲彞章隆重仰惟志事以䖍遵至治馨香尚冀神靈之默佑式孚冥漠庶克居歆御製歷代帝王廟碑文歷代帝王崇祀之制肇於唐天寶七載始置廟京城止及三代以前而已明洪武六年始於金陵立廟嘉靖十年乃建於京師阜城門內當明初定制時議禮之臣不能通知大體崇祀祗創業之君從祀惟開國之臣自兹以後闕焉我皇考聖祖仁皇帝秉大公之道折衷百代深惟祀典之宜修康熙六十一年特頒諭㫖命廷臣詳悉從容確議具奏逮朕紹緒之初迋議始上舊崇祀帝王二十一位今增一百四十三位舊從祀功臣三十九人今增四十人朕遵奉先志重書牌位諏吉入廟行祭告之禮仰惟聖祖皇帝用意之厚立論之正敻乎不可及也夫三代以上若夏啓之能敬承殷之太甲太戊武丁周之成王康王宣王頌美詩書光耀史牒三代以下英君哲后或繼世而生則德教纍洽或間世而出則謨烈重光胥能致海宇之乂安躋斯民於康阜嘉言傳於信史善政式為良規至凡蒙業守成之主即或運㑹各殊屯亨不一茍無聞於失德咸帝命所寵綏爰及歷代名臣亦皆川嶽鍾靈為時輔佐功在社稷德協股肱比諸從龍之彥何多讓焉而尚論未詳明禋久曠其為缺略也大矣夫欽崇往哲景企前徽明德可懷羮牆興慕眷流風之所被洵歷世而勿諼若乃擴追逺之鴻規破拘墟之臆見自非忠厚立心寬仁為量卓識超於千古盛德冠於百王未有能論及此者典禮修明有待今日然則聖祖皇帝之重加釐定公當周詳誠千萬世莫及之仁心而千萬世不易之定論也廟貌既新敘述本末鐫於青珉用昭示久逺焉御製歷代帝王廟碑亭告成祭文繼天立極勳華光被於寰區撫世誠民功德丕昭於宇宙緬懷前烈知創業之維艱歷溯芳徽念守成之不易我皇考聖祖仁皇帝綜百王之盛德定萬世之公評特沛綸音𢎞修毖祀敬承先志祗薦明禋廟貌增崇既布筵而列坐豐碑式建爰灑翰以摛文備舉彝章用垂曠典於戲皇猷炳煥纍朝之統緒相承至治馨香百代之英靈如在尚祈昭鑒來饗苾芬雍正二年三月丁丑世宗憲皇帝親祭歷代帝王廟是日甘雨應時而降扈從諸王大臣侍衛等衣皆霑濕恩賜有差越日戊寅以御製三月三日得雨詩一首宣示迋臣七月戊寅諭禮部嗣後親祭歷代帝王廟日鹵簿大駕俱由廟門映壁外行三年九月丙午親祭歷代帝王廟四年二月辛卯親祭歷代帝王廟五年三月丁酉親祭歷代帝王廟七年二月壬午親祭歷代帝王廟乾隆元年九月詔以明恭閔惠皇帝入祀歷代帝王廟先是六月辛未奉諭㫖易名以諡古之制也自周公定為諡法後世帝王未有無諡者明建文為太祖之嫡孫纘承大統在位四年固儼然天下共主矣及成祖既有其天下并去其年號而史官所書則仍稱為建文元年二年三年四年此國之所賴有信史也然不係之以諡而稱曰建文皇帝此俗稱非史體也傳之後世殊為闕典考之太祖有元之天下而諡元主為順帝我世祖章皇帝代明之天下而諡明主為愍皇帝雖更姓改物之君尚且追諡而無所嫌忌况當其世者乎𢎞治以來如楊循吉諸人屢以為請迄寢不行皆以後世子孫席有成祖之業故不敢變亂舊章而不慮其貽議來世也我國家諡崇禎而不諡建文者以明史未竣非當時所急今史書既成若不及此追諡良為遺憾大學士九卿㑹議確擬具奏候朕親加裁定尋大學士九卿遵㫖議追諡明建文皇帝謹擬二條恭候欽定得㫖用恭閔惠皇帝諡至是命入廟祀遣官致祭皇上御製祭文自古帝王統緒相承建元以紀年易名以垂後大義所存不容或泯惟明建文皇帝之繼洪武大統也長孫紹緒本天地之常經失德無聞實臣民之共主屬以遭家不造遂致靖難興師既慘迫於焚宫且削除其年號雖數傳而紀元始復究相沿而諡法未修今方明史告成期在千秋傳信仰承列祖之意特加追諡之文薦以豆籩升諸祠祀彝章肇舉爰因秋季以告䖍名義長昭統冀神靈之垂鑒三年九月乙卯皇上親祭歷代帝王廟先是正月辛酉諭禮部二月十五日祭歷代帝王廟因節近清明正值朕躬謁泰陵是以未及親祭俟秋祭帝王廟朕當親詣行禮六年二月命和親王𢎞晝代祭歷代帝王廟甲辰諭本月二十日祭歷代帝王廟朕已降㫖親詣行禮查是日節屆清明朕詣夀皇殿雍和宫行禮歷代帝王廟著和親王𢎞晝致祭九年二月己巳皇上親祭歷代帝王廟二十七年詔重修歷代帝王廟並詔改蓋黃瓦以崇典禮三月己酉遣官祗告奉請神牌供於祭器庫至二十九年二月正配殿工竣丁未遣官祗告奉請神牌還位三月癸丑皇上親祭歷代帝王廟重修歷代帝王廟碑文乾隆二十九年歷代帝王廟之祀其凖古遷廟觀德遺意而推而放之者歟書曰七世之廟可以觀德疏家謂以世祧者迭遷德盛者弗毁蓋就一朝為言而周禮鄭氏四類注稱三王五帝九皇六十四氏咸祀之繁露引為自近溯逺之明證斯正合食所權輿然漢魏已來有司具儀率求之肇跡建都而不聞立廟洎唐迄明廟立而代以專祀開創為常其制又闕焉未備我皇祖聖祖仁皇帝康熙六十一年敕諭禮官增祀茍非失德失器即䝉業守成者皆得與饗我皇考世宗憲皇帝丕纘先型詳定位次臨御伊始親詣禮成著於奎文者綦悉間考舊史所紀創守難易之辨鮮有折衷定論以是對揚曩昔所為法施於民者不克兼既其實獨斤斤於殿於門於坊具顔之曰景德景德焉爾德固若是其偏而不舉耶寅惟祖宗懋敬厥德咸秩孔修觀法之所存即知戒之所寓義至深逺大雅不云乎天難諶斯不易維王召公奭迪王祈天永命一則云監于有夏再則曰監于有殷寖假入廟而徴統系由百世之後等百世之王一自昭代觀之皆名之為勝國有不深厪夫屋與墟之警而怵惕動容者哉顧於其間歷選列辟若稽古之化浹蒸人治光往牒者罔不穆穆棣棣式在几筵崇異代同堂之報故于世數之遷而得其示戒于無形抑于世數之屢遷而不遷而得其垂法於有永稔乎此者觀德之意愈以睪然而興矣廟自雍正癸丑繕葺距今且三十載爰以乾隆壬午出內帑金庀而飭之故事瓴甋甃以純緑兹特易蓋正殿黃瓦用昭舄奕工告訖功適届甲申季春吉祀祗承家法躬薦新宫已為長律述事揭言其大指㑹所司請製文並鍥諸牌復詳闡之如此四十年二月壬寅皇上親祭歷代帝王廟四十八年三月甲午皇上親祭歷代帝王廟四十九年七月重定歷代帝王廟祀典時內閣奉諭㫖朕因覽四庫全書內大清通禮一書所列廟祀歷代帝王位號乃因舊㑹典所定有所弗愜於心敬憶皇祖實録有飭議增祀之諭令查取禮部原議紅本則係康熙六十一年十一月內具題爾時諸王不能仰體聖懷詳細討論未免因陋就簡我皇祖諭㫖以凡帝王曾在位者除無道被弒亡國之主此外盡應入廟即一二年者亦應崇祀煌煌聖訓至大至公上自羲軒下至勝國其間聖作明述之君守文繼體之主無不馨香妥侑不特書生臆論無能仰喻高深即歷代以來升歆議禮未有正大光明若此者也乃㑹議疏內聲明偏安亡弒不入祀典而仍入遼金二朝不入東西晉元魏前後五代未免意有偏向視若仰承聖意而實顯與聖諭相背朕意若謂南北朝偏安不入正統則遼金得國亦未奄有中原何以一登一黜適足啓後人之訾議即因東西晉前後五朝有因篡得國擯而不列如曹丕不得為正統之例殊不知三國時正統在昭烈故雖以陳夀三國志之尊魏抑蜀而本不能奪萬世之公評至司馬氏篡竊以還南朝神器數易如宋武帝崛起丹徒手移晉祚自不能掩其篡奪之罪其他雖祖宗得國不正而子孫能繼緒承休即為守文中主亦不可概從缺略况自漢昭烈以至唐高祖統一區夏時之相去三百餘年其間英毅之辟節儉之主史不絶書又安可置而不論至於後五代如朱溫以及郭威或起自冦竊或身為叛臣五十餘年更易數姓中華統緒不絶如線然周世宗承藉郭氏餘業慿有疆域尚不失為令主此而概不列入則東西晉前後五代數百年間創守各主祀典缺如何以協千秋公論他若元魏雄據河北地廣勢强太武道武勤思政理講學興農亦可為偏安英主並當量入祀典以示表章朕前命館臣録存楊維禎正統辨論內詳晰宣諭以維禎所辨正統在宋不在遼金之說為是所以存春秋綱目之義見人心天命之攸歸且檢閲孫承澤春明夢餘録所載明代崇祀古帝王位號原未列遼金二朝今通禮內崇祀遼金而不入東西晉前後五代似此互相入主出奴伊於何底此皆議禮諸臣有懷偏見明使後世臆說之徒謂本朝於歷代帝王未免區分南北意存軒輊甚非皇祖降諭之本意也至明之亡國由於神熹二宗綱紀墮而法度弛愍帝承統時國事已不可為雖十七年身厯勤苦不能補救傾危卒且身殉社稷未可與荒淫失國者一例而論是以皇祖睿裁將神熹二宗撤出而愍帝則特令廟祀褒貶豫奪毫釐不爽實千古大公定論乃諸臣於定議時轉復將漢之桓靈增入豈未思炎漢之亡亡于桓靈而不亡于獻帝乎從前定議未將東漢全局詳審論斷轉使昏暗之君濫叨廟食所議未為允協夫自古帝王統緒相傳易代以後饗祀廟迋原以報功崇德至於嚴篡竊之防戒守成之王或豫或奪要必衷于至當而無容心于其間方協彰疸之義所有歷代帝王廟祀典著大學士九卿更行悉心詳議具奏並著於定議後交四庫館恭録皇祖諭㫖並朕此㫖於通禮廟饗首卷以昭殷鑒歷朝垂示萬年之至意嗣大學士伯伍彌泰等遵㫖議奏臣等跪讀之下仰見我皇上以聖祖之心為心以天地之量為量念為君之實難崇前王之祀典不論其方域之廣狹而綜其政治之盛衰不惟其遭遇之亨屯而核其事功之隆替垂爼豆於千秋示權衡於萬世誠非臣等所見窺測於萬一者也伏查歷代帝王立廟崇祀所以崇德報功垂昭法戒前代列祀祗及開創之君實為缺略仰䝉聖祖仁皇帝特詔迋臣詳議增祀俾歷代守成繼統之君咸得馨香廟食實闡數十年來未發之幽光舉數十朝以來未備之巨典而諸臣莫喻高深致定議尚多疏漏兹蒙皇上指示兩晉南北朝後五代創守各主祀典缺如復命臣等悉心詳議臣等恭繹聖訓所述聖祖仁皇帝諭㫖云帝王曾在位者除無道被弒亡國之主此外盡應入廟煌煌謨訓於大公至正之中嚴篡奪之防著守文之戒蓋人君臨御區宇誠能承先裕後善始令終固足稱為誼辟其或天運有期遭逢不幸非盡由政事之失者如明之愍帝䝉聖祖仁皇帝特豫廟祀允為萬世定評此外或功德光於前烈或基緒貽諸後人皆宜恪遵聖訓詳加酌議竊考前代史評溢美者每多失實責備者或有苛求均未能折衷至當伏讀御批通鑑輯覽一書進退褒貶酌理凖情毫釐不爽實為千古史家繩凖臣等謹就管窺所及按代尋繹如魏代勃興北邊奄甸河洛世有賢君允宜光昭爼豆晉及前後五代雖得國非正而嗣業之君合於聖訓所云繼緒承休即為守文中主者亦宜並膺廟食臣等詳列一單仰邀論定其他以篡竊得國以失德亡國不應入祀者列為一單併呈御覽抑臣等據義引伸兾以推廣我皇上闡揚前王之至意竊見康熙六十一年㑹議本內唐代增入高祖以下十四帝而不及憲宗金代增入太宗以下三帝而不及哀宗但考史載憲宗削平僭叛不惑羣議功業實不可沒而哀宗圖存於亡從容殉國較之明愍帝更為有光臣等謹以此二帝另立為一單可否一體增祀伏候睿裁至於歆報之典寧嚴無濫漢亡於桓靈而不亡於獻帝猶明之亡於神宗光宗熹宗而不亡於愍帝乃明神宗以下三主業奉聖祖仁皇帝諭黜而桓靈二主轉得濫邀入祀誠為未協自應遵㫖將漢桓帝靈帝神牌撤出以昭豫奪之公伏候命下神牌入龕事宜交禮部工部辦理入廟吉期由欽天監選擇告祭典禮交太常寺遵辦祭文由翰林院撰擬所有臣等遵㫖詳議之處謹合詞恭摺具奏奉諭㫖據大學士九卿等㑹議增祀兩晉元魏前後五代各帝王一摺並聲請唐憲宗金哀宗應否一體增祀等語憲宗處唐中葉各鎮節度慿凌跋扈僭叛不臣憲宗命將專征削平淮西厥功頗偉在有唐一代中尚屬英主其末年被弒係禍變猝乘與荒亂失德召變致釁者不同至金哀宗處衰弱之時國勢已不可問推其致敗之由實因熙宗海陵淫虐階厲哀宗自縊殉國與明之愍帝事同一例自應一體增祀餘俱著照所議欽此臣等謹按諸臣遵㫖議覆酌擬增入廟祀單內開列晉元帝明帝成帝康帝穆帝哀帝簡文帝宋文帝孝武帝明帝齊武帝陳文帝宣帝元魏道武帝明帝太武帝文成帝獻文帝孝文帝宣武帝孝明帝唐憲宗後唐明宗後周世宗金哀宗共二十五帝列單呈覽下所司遵照辦理嗣奉諭㫖明春增祀神牌入廟即於春祭前一日安奉祭日照常年春祭儀注舉行不必另議惟祝文內應將增祀之處交翰林院添撰數語欽此五十年二月辛丑皇上親祭歷代帝王廟時以增祀兩晉後五代南北朝各主親詣行禮祭文曰仰惟諸帝應運代興治隆開創業懋繼承報功崇德秩祀肇增聿光前典牲爼香升二十五帝禮殿同登報于仲春神其式慿祭歷代帝王廟禮成恭紀乾隆五十年豫小子既敬遵皇祖聖訓增祀歷代帝王以今年二月春祭之吉奉神主入廟禮以克成祭不欲數於是退而恭紀曰皇祖之聖允符我皇考所尊稱大成有類先師孔子而無以復加也即此增入之㫖實為大公至明乃稱歷代之名義而非有意于其間也夫歷代者自開闢以來君王者之通稱非如配享先師孔子有所旌别彰疸於其間也夫有所旌别彰疸于其間則必有所進退而是非好惡紛然起矣入者主之出者奴之將無所底止且以旌别彰疸言之湯武即有慙德則歷代開創之君湯武且不若審如是三皇五帝之外其宜入廟者有幾是非祭歷代帝王之義也故我皇祖謂非無道亡國被弒之君皆宜入廟者義在此但引而未發豫小子敢不敬申其義乎蓋自洪武建廟南京以來北京祖之而祀者寥寥明洪武六年始建南歷代帝王廟于京崇祀者三皇五帝夏禹王商湯王周文王武王漢高祖光武帝隋高祖唐高祖太宗宋太祖元世祖十九帝而罷周文王隋高祖唐高祖之祀嘉靖九年罷南京廟祀建歷代帝王廟於北京二十四年又罷元世祖之祀及我世祖定鼎燕京幼齡即位百度畢舉爾時議禮之臣於議歷代帝王廟位次亦頗有所出入我因明世祖定鼎燕京代祀典順治元年增祀遼太祖金太祖世宗元太祖明太祖凡五帝而我皇祖之諭亦因近大事之際在康熙六十一年十一月諸臣未能仰遵聖意其出入亦頗不倫㑹典載康熙六十一年道被皇祖諭㫖凡帝王在位除無弒亡國之主外盡宜入廟崇祀爾時迋臣不能仰體數日聖意詳細討論且疏奏在十一月大事前所議增祀夏商以來帝王一百四十三位并漢之桓靈皆入之實不倫矣豫小子於昨嵗閲大清通禮始悉其事因命大學士九卿更議增祀而以仲春躬祀入所增神主於廟昨嵗因閲大清通禮見崇祀闌入歷代帝王位次有不愜於懷者如漢之桓靈而於前後五代全未議及因敕大學士九卿更議增祀晉元帝以來二十五帝而於桓靈則撤出之以昭公論今嵗仲春入述事神主於廟躬禮致祭詳見禮成詩并序豫嘗論之洪武之去遼金而祀元世祖猶有一統帝繫之公嘉靖之去元世祖則是狃於中外之見而置一統帝繫於不問矣若順治初之入遼金而去前五代則爾時議禮諸臣亦未免有左袒之意孰若我皇祖之大公至明昭示千古為一定不易之善舉哉夫天下者天下人之天下也非南北中外所得私舜東夷文王西夷豈可以東西别之乎正統必有所繫故豫於通鑑輯覽之書大書特書一遵春秋不敢有所軒輊於其間豫於歷代通鑑輯覽一書自隆古以至本朝四千五百餘年於南北朝及宋元遼金正統偏安如南天命人心繫屬存亡之際大書特書必公必平宋自德祐以前尚有疆域可慿至臨安既破帝㬎見俘宋統始絶故自丙子三月以前為宋帝㬎德祐二年三月以後為元世祖至元十三年至於元順帝北遷沙漠委棄中原則自至正二十八年八月以後正統乃歸之明為洪武元年我朝世祖定鼎京師在甲申五月維時明福王尚監國南京故通鑑輯覽仍書明以别之直至乙酉五月大清兵下江南福王就執始書明亡折衷義例惟嚴惟謹一遵春秋之法無所容心曲殉于其間也以為一時之議雖權萬世之論不可欺也然則歷代帝王之祀果即非配享先師孔子漠無旌别彰疸於其間乎曰不然也歷代帝王胥祀于景德之殿其有德無德若南若北曰中曰外是一家非一家章章如昭昭如孰可以為法孰可以為戒萬世之後入廟而祀者孰不憬然而思惕然而懼耶是即不明示旌别彰疸而已寓旌别彰疸于無窮矣其有不憬然思懼者則是無道之倫必不能入此廟矣嗚呼可不懼哉可不懼哉雖然豫更有後言焉蓋宜入廟與不宜入誠昭然應知懼而我大清國子子孫孫祈天永命所以綿萬祀無疆之庥者更當以不入斯廟為棘安不忘危治不忘亂用慎苞桑之固思及此者有不忍言而又有不忍不言者世世子孫其尚凛難諶之戒乎親祭歷代帝王廟儀正殿七室中室太昊伏羲氏炎帝神農氏黃帝軒轅氏左室帝金天氏帝高陽氏帝高辛氏帝陶唐氏帝有虞氏右室夏禹王啓王仲康王少康王杼王槐王芒王泄王不降王扄王厪王孔甲王臯王發王商湯王太甲王沃丁王太庚王小甲王雍巳王太戊王仲丁王外壬王河亶甲王祖乙王祖辛王沃甲王祖丁王南庚王陽甲王盤庚王小辛王小乙王武丁王祖庚王祖甲王廪辛王庚丁王太丁王帝乙王次左周武王成王康王昭王穆王共王懿王孝王夷王宣王平王桓王莊王僖王惠王襄王頃王匡王定王簡王靈王景王悼王敬王元王貞定王考王威烈王安王烈王顯王慎靚王次右漢高祖惠帝文帝景帝武帝昭帝宣帝元帝成帝哀帝光武帝明帝章帝和帝殤帝安帝順帝冲帝昭烈帝晉元帝明帝成帝康帝穆帝哀帝簡文帝元魏道武帝明帝太武帝文成帝獻文帝孝文帝宣武帝孝明帝宋文帝孝武帝明帝齊武帝陳文帝宣帝又次左唐高祖太宗高宗睿宗元宗肅宗代宗德宗順宗憲宗穆宗文宗武宗宣宗懿宗僖宗後唐明宗後周世宗遼太祖太宗景宗聖宗興宗道宗宋太祖太宗真宗仁宗英宗神宗哲宗高宗孝宗光宗寧宗理宗度宗端宗又次右金太祖太宗世宗章宗宣宗哀宗元太祖太宗定宗憲宗世祖成宗武宗仁宗泰定帝文宗寧宗明太祖惠帝太宗仁宗宣宗英宗景帝憲宗孝宗武宗世宗穆宗愍帝位均南向凡異代同室者皆隔别之兩廡東風后倉頡䕫伯夷商伊尹傅說周召公奭畢公高召穆公虎仲山甫漢張良曹參周勃魏相鄧禹耿弇諸葛亮唐房元齡李靖宋璟郭子儀許逺李晟裴度宋曹彬李沆王