body:
  text: 欽定四庫全書皇朝文獻通考卷一百十二宗廟考六太廟時享臣等謹按馬端臨宗廟考立祭祀時享門其下旁注薦新二字所謂祭祀者遞詳列代廟禮之名義制度儀器而時享與薦新亦即隨文以錯見至唐及宋始臚親饗之數且時享薦新分録其儀注此固皆廟之正祭也而因事祗告者則上附於郊社考之告祭門兹恭校本朝典䇿仰見我列聖垂模皇上敬勤紹緒每嵗時享必親舉行而禮制之隆隨時酌定廣大精微條理具備至矣哉太廟之禮貽則於萬年億年者矣謹依甲子詳為編次考古未有若斯之盛者馬考具在可覆覈也若夫薦新則順治十四年後恭行於奉先殿一切定禮自歸奉先殿儀備列焉順治元年九月庚戌定宗廟樂章六奏用平字從大學士馮銓謝陞洪承疇等之議也詳見樂考二年正月辛卯定萬壽節祭太廟儀禮部言故明舊例凡遇萬夀節親詣奉先殿上香行禮又遣官祭陵上香燭供酒果不讀祝得㫖祭太廟如奉先殿禮儀讀祝致祭福陵昭陵四祖廟止上香燭供酒果不必讀祝京師建立太廟始以盛京太廟崇稱為四祖廟尋以二月丁巳禮部言凡遇清明等節應令駐防盛京總管分率城守章京徃祭福陵昭陵東京興京祖陵令城守官奠祭盛京四祖廟令守廟總管官獻酒果從之葢追尊四祖考皇帝四祖妣皇后奉安神主於京師太廟實以五年十一月戊辰冬至而是年七月庚戌朔十二月戊申嵗暮三年七月乙巳朔皆遣官詣盛京祭四祖廟云癸丑以萬壽節遣官祭太廟臣等謹按自是年定萬壽節祭太廟儀即以是月遣官祭嗣於三年正月丁丑至十七年正月乙酉每嵗以萬壽節祭太廟皆遣官閏六月癸巳定秋祭太廟盛京四祖廟以七月朔用牛羊禮部言本朝舊例秋祭太廟於七月十五日用牛羊是日福陵獻酒果香燭故明例於七月朔祭太廟用牛羊是日各陵不獻酒果香燭以七月十五日祭陵用牛羊是日太廟不獻酒果香燭得㫖太廟盛京四祖廟俱照故明例以七月朔用牛羊致祭是日陵上不必獻酒果香燭中元節仍用牛羊祭陵是日太廟盛京四祖廟不必獻酒果香燭丙午増設滿讀祝官禮部言請壇廟讀祝停讀漢文止讀滿文仍増設滿讀祝官八員一切典禮俱照本朝舊制行從之十月己亥定親祭儀禮部言圜丘方澤社稷三壇如遇親祭應照故明例增用牛一仍進胙肉福酒其迎神送神令鳴贊官贊唱遣官代祭則止如祭太廟雖親祭亦不增用牛不獻福胙不贊迎神送神以太廟神位前供獻牛肉頒賜諸王貝勒從之三年正月癸卯定盛京祖廟牲凡嵗除清明及慶賀祭如京師例牲用生四年三月丁卯定薦熟牛停止進胙肉内院禮部㑹同議奏我朝享太廟例主祭官舉帛舉爵捧獻官陳設仍以胙牛一進上今祭太廟應薦熟牛在廟門奏樂至於進上胙肉應停止其帛爵仍照例令捧獻官陳設至祭興京五祖神主亦應如太廟儀從之八年二月癸未定親祭太廟進胙肉福酒如祀圜丘儀三月己丑定樂舞從禮部之請也詳見樂考癸卯定齋戒規凡祀太廟齋戒三日上親詣或遣官恭代俱於太和殿設齋戒牌銅人各衙門亦設齋戒牌不理刑名若有𦂳急事務仍辦理大内及宗室并齋戒官家不祀神如上躬饗太廟和碩親王以下陪祀官以上俱於家齋戒如遣官恭代則上齋戒和碩親王以下輔國公以上不必齋戒陪祀官齋戒如前六月乙丑定太廟祀典嵗暮祭大建於二十九日小建於二十八日其清明祭各官不必陪祀祭肉用生十三年三月乙酉定齋戒規禮部言前此清明節享太廟惟主祭大臣併執事官各齋戒三日致祭近查明朝清明節祀典並不齋戒嗣後應令主祭官分獻官禮部太常寺執事官先期齋戒一日著為令從之六月甲辰定祭太廟日駕於黎明出宮十四年十一月乙巳命禮部修樂器詳見樂考臣等謹按順治初年太廟祭祀之禮嵗以正月孟春與萬夀節二三月清明節四月朔七月朔十月朔十二月嵗暮凡七自十六年七月定舉行祫祭其年十二月甲寅以嵗暮祫祭遣官祗告越日乙卯世祖章皇帝親詣行禮實為太廟祫祭之始是十六年以前凡十二月嵗暮之祭皆時享也兹謹彚時享親詣之年月日紀於編世祖章皇帝在位十八年時享太廟親詣行禮二十八順治二年七月庚戌朔三年七月乙巳朔四年十二月丙寅嵗暮五年三月丁未清明節七年七月壬子朔八年十月乙巳朔九年七月庚午朔九年十月己亥朔九年十二月丙寅嵗暮十年正月甲戌孟春十年七月甲午朔十年十月癸亥朔十年十二月庚寅嵗暮十一年正月丁酉孟春十一年七月戊子朔十一年十月丁巳朔十二年十月辛亥朔十三年七月丁未朔十三年十月乙亥朔嵗暮十三年十二月壬寅十四年正月庚戌孟春十四年四月癸酉朔十四年七月壬寅朔十四年十月庚午朔十五年正月丙午孟春十六年正月丁酉孟春十六年七月庚申朔春十七年正月甲子孟康熙十一年正月乙丑飭太常寺習禮樂詳見樂考十二年九月丙申定祭時與齋戒處先是八月丁巳諭禮部壇廟祭祀國家大典必儀文詳備允符禮制乃可肅將誠敬昭格神明其致祭時辰齋戒處所稽諸徃代各有定制爾部詳察典禮酌議妥確以聞至是議覆考太宗文皇帝時祭廟用黎明再考歴代致齋俱於别殿今請皇上於别殿齋戒從之互見郊社考十二月甲寅定執事官及樂舞生先是庚子諭禮部太常寺壇廟禋祀理宜嚴肅今觀祭祀執事之人過多殊為煩雜應酌量裁減務令肅清至是議覆祭廟執事之人及樂舞生今已遵㫖酌量裁減再考㑹典祭時祗有監察御史侍立之例其禮部漢堂官應按班行禮停其侍立得㫖是十八年五月以改營奉先殿恭奉列祖列后神牌暫安太廟遣官祗告太廟二十年正月辛巳飭糾陪祭官諭都察院祭祀以奉上下神祇理宜敬慎近見陪祭各官跡涉慢易班行不整笑語自如殊失執事有恪之道爾衙門職在察核未見指名㕘奏所司何事其嚴飭之二月甲午以奉先殿工竣遣官祗告太廟乙未恭奉列祖列后神牌還御二十一年六月定樂章詳見樂考二十四年正月癸酉命司祝髙讀御名是日孟春聖祖仁皇帝親享太廟禮畢顧内閣學士席爾逹太常寺卿葛思泰曰徃見贊禮郎宣讀祝版至朕名聲輒不揚父前子名前經所載朕對越之次惟懼誠敬稍有未至無以昭格神靈為子孫者通名於祖父豈可渉於慢易嗣後俱應髙聲朗讀無庸顧忌辛巳定執事官奉福胙趨走儀更贊次獻為亞獻是日聖祖仁皇帝祈穀於上帝禮畢顧内閣學士席爾達太常寺卿葛思泰曰前見太廟致祭時執事官奉福胙由兩神位間趨走於尊祖敬宗之意未協爾等曽稽舊例否席爾達等奏太常寺紀書禮部㑹典俱未載上曰對越祖宗典禮甚鉅惟嚴肅不懈始可薦馨在廟奔走之人亦當誠敬將事共襄大禮不應稍有䙝慢且亞獻禮俱唱為次獻亦與漢文不符爾等㑹同内閣禮部察例奏聞尋太常寺等衙門議覆執事各官應從外旁趨走唱次獻應改為亞獻得㫖是二十五年十二月癸亥定陪祭官並飭嚴糾儀先是十一月丙申諭禮部朕敬天奉祖郊祀廟饗必精白厥心竭誠致慎庶幾有孚昭格用洽明禋朕於祭祀壇廟每躬詣行禮未嘗不齋明祓濯實圖感通凡從事於祀典者皆宜表裏精誠䖍盡職掌近見執事陪祭各官間有因循怠忽視為具文不能盡志致慤共效昭事之忱殊為非禮嗣後務俾各秉誠心克恭祀事凡行禮儀節始終整肅毋得慢易用副朕敬天奉祖至意作何再加通飭永可遵行著九卿詹事科道㑹同詳加確議具奏至是議覆其陪祭太廟官員俱不照加級武官公以下㕘領阿達哈哈番以上文官尚書以下郎中以上滿科道漢六科掌印給事中武官㕘將遊擊以上令其陪祭有髙聲喧語失儀者監察御史禮部官員即指名題㕘如壇例行上曰這所議妥當著如議凡祭祀時特遣御史監禮糾劾今觀御史不過左右顧盻聊以充數未嘗糾㕘一人且非特諸臣而已即朕設有不敬處亦當舉奏也三十八年十二月壬午定元旦聖節恭祭四祖即於太廟後殿照奉先殿典禮遣官致祭詳見殿門奉先五十三年正月己未命重修樂器和碩諴親王允祉等董其事六十年三月聖祖仁皇帝萬壽聖節命皇四子和碩雍親王憲皇帝世宗廟諱祭太廟後殿先是戊辰太常寺奏萬壽節請遣官祭太廟後殿得㫖天地太廟社稷俱係大祭理宜敬謹必將知進退之節威儀可觀之大臣遣徃行禮方善著大學士等㑹同禮部將諸皇子及王以下大臣等另行開列具奏庚午大學士等謹將已封諸皇子另開一摺諸王貝勒公内大臣都統等又開一摺具奏上硃筆圈出交太常寺遇祭祀時請㫖尋太常寺以萬夀節遣官祭太廟後殿請上命皇四子和碩雍親王憲皇帝世宗廟諱行禮聖祖仁皇帝在位六十一年時享太廟親詣行禮八十二康熙元年正月乙酉三年十月己未朔四年十月癸丑朔五年四月辛亥朔六年正月乙酉朔六年十月壬申七年正月丁未七年四月己巳七年七月戊戌朔七年十月丙寅朔八年正月癸卯朔八年七月壬辰八年十月辛酉朔九年正月丁酉九年四月丁亥朔九年七月乙卯朔九年十月乙酉朔十年正月戊午十年四月壬午朔十年七月庚戌朔十一年正月乙卯朔十一年七月甲辰十二年正月丁丑朔十二年四月庚子十二年七月戊辰朔十二年十月丁酉朔十三年正月癸酉朔十三年四月乙未十四年正月乙丑朔十四年四月己丑十四年七月丁亥朔十四年十月乙卯朔十五年正月己丑朔十五年四月癸丑十五年七月辛巳朔十五年十月庚戌朔十六年四月丁未朔十六年七月丙子朔十七年正月庚辰朔十七年七月己亥十七年十月戊辰朔十八年正月丙午十八年四月乙丑朔十八年十月壬戌朔十九年正月乙未朔十九年四月庚申十九年七月戊子朔十九年十月丙戌朔二十年正月己未朔二十年十月庚辰二十一年正月丙辰朔二十一年七月丙午二十一年十月甲戌朔二十二年四月癸酉朔二十三年四月丙申朔二十四年正月癸酉二十四年四月庚寅朔二十四年十月戊子朔二十五年正月乙丑朔二十五年四月乙酉二十五年十月壬子朔二十六年四月戊申朔二十六年十月丙午朔二十七年十月庚子朔二十八年四月丁卯朔二十九年四月壬戌朔三十年正月壬辰朔三十年十月壬午三十三年四月戊辰朔三十三年十月乙未朔三十四年四月壬辰朔三十七年正月壬午三十七年四月乙巳朔三十八年十月乙丑朔三十九年四月甲子朔三十九年十月庚申朔四十年四月戊午朔四十年十月甲寅朔四十三年四月庚午朔四十三年十月戊辰朔四十四年十月辛卯朔四十九年十月壬戌朔臣等謹按四時之享聖祖仁皇帝始專以正月孟春諏吉四月朔七月朔十月朔有事於太廟與十二月歳暮大祫而五此則迄今所恭行太廟之正祭垂則於萬年者矣其每嵗遇慶辰令節諸禮皆於奉先殿行雍正元年正月飭嚴糾儀是月己丑命廟祭派王二人散秩大臣御史各二員部屬侍衛各四員稽失儀及扈從人等任意行走著為例八年正月命孟春時享展期是月初三日壬申世宗憲皇帝諭初五日時享太廟但朕頰旁偶長小熱顆二三日即可平復展期初十日至期上親詣行禮十年正月癸亥享太廟上命皇四子上御皇名行禮二月辛丑命齋戒日陪祀官懸齋戒牌時奉諭國家典禮首重祭祀每當齋戒日期必檢束身心竭誠致敬不稍放逸始可以嚴昭事而格神明朕遇齋戒之日至誠至敬不但殿廷供設銅人即坐卧之次亦書齋戒牌存心警惕須臾弗忘至内外大小官員雖設齋戒牌於官署但恐言動起居之際稍有䙝慢即非致齋嚴肅之義查明代祀典凡陪祀及執事之人有懸祀牌之例今酌定齋牌之式令陪祀人員佩著心胸之間使觸目警心恪恭㒺懈并得彼此觀瞻益加省惕其於明禋大典愈明䖍潔著傳諭各部院及八旗并直省文武官員一體遵行十一年三月命増定上香儀是月壬寅諭享祀太廟向無上香之儀朕意應確議増添至奠帛獻爵時恭立拜位無跪獻之儀大學士㑹同禮部酌古準今敬謹定議尋議覆唐以前典制尚用三代􅌊蕭之禮至宋代始有上香之儀並於每位前跪三上香其奠帛獻爵亦如之爵以三獻明洪武定制無上香奠帛之儀爵兩獻亦不跪至嘉靖改從宋制本朝㑹典因明洪武所定而酌増之有奠帛有三獻爵而無上香之儀臣等敬謹詳議大祀莫重於郊壇而孝享莫尊於配天至宗廟之禮宜與社稷壇同若同於郊壇則逾於社稷矣查祭社稷壇時皇上親詣大社大稷前跪上香則太廟上香自應一例至奠帛獻爵太廟社稷俱不親獻是以皇上於拜位前恭立所以亞於郊壇也似應仍照舊儀請嗣後享太廟於迎神奏樂時贊引官對引官恭𨗳皇上詣太祖髙皇帝神位前立司香官奉香盒跪於左贊引官奏跪上跪奏上香上舉炷香上爐内又三上瓣香興太宗世祖聖祖神位前亦如之上香畢奏旋位上旋位立樂止其兩廡分獻官於上香時亦各詣兩廡跪上香祫祭及太廟後殿奉先殿儀亦如之疏入從之九月甲午定太廟供奉神牌暨獻帛爵諸儀時太常奏奉先殿神牌供奉居中太廟神牌供奉居裏伏思如生如存之義居中以御為得其正且祀典理應畫一嗣後太廟請如奉先殿制供奉居中又奉先殿神牌有泥金托座嗣後太廟應如式製造又奉先殿請神牌用内務府官獻帛爵用侍衛太廟請神牌獻爵用侍衛獻帛用太常寺官似屬參差嗣後請神牌應俱用太常寺官獻帛爵俱用侍衛又奉先殿供籩豆案上加紅油爵版太廟籩豆供於黄案上嗣後俱請供黄案上得㫖是依議十二年正月壬午享太廟上命皇四子寶親王上御皇名行禮四月丙午朔享太廟上命皇四子寶親王上御皇名行禮五月定供列祖忌辰牌是月庚子諭列祖忌辰在京則禮部等衙門在外則督撫提鎮及各府州縣懸牌出示曉諭官弁兵民等一體凛遵齋戒朕思懸牌出示列祖廟號直書於上其懸示之地未必悉能潔淨而往來雜遝坐卧喧嘩均非敬謹恪恭之意嗣後應如何使衆共知而又不至於䙝慢該部悉心定例奏聞尋議恭逄列祖忌辰嗣後請製龍邊粉油木牌敬謹書寫倣齋戒牌例設案安奉於禮部大門前令司員看䕶其九門各設於潔淨寺院提督令員看䕶次日將牌繳禮部敬謹收貯其直省大小文武衙門照在京例書牌安設從之十月甲子飭禁止擅入太廟時奉諭壇廟俱當潔淨嚴肅太廟社稷更宜恭敬故派太監專掃除之事又派旗員輪班看守若非祭日一應官員不許擅入原係定例近聞住宿之太監將伊等親友縱令出入看守之旗員亦將朋友入廊院乗涼此皆平日懈弛所致也禮部太常寺嚴查禁止如違拏究割草之人令太常寺酌將老實人選數名敬謹除治並交與内務府御史等不時詳查如容留閒散無用之人推故入者即指㕘嚴罪如仍前懈弛經朕聞知定將禮部太常寺堂官及御史等交部議處十三年四月辛丑朔享太廟上命皇四子寶親王上御皇名行禮世宗憲皇帝在位十三年時享太廟親詣行禮三十雍正元年正月丙戌元年十月丁未朔二年四月甲辰朔二年七月壬寅朔二年十月辛未朔三年正月丁未三年四月戊辰朔三年七月丙申朔三年十月乙丑朔四年正月丙午四年四月癸亥朔四年十月己未朔五年正月丁酉朔五年四月丁亥五年十月癸未朔六年正月癸亥六年四月辛巳朔六年十月戊寅朔七年正月乙卯朔七年四月乙亥七年十月壬寅朔八年正月己卯八年四月己亥朔九年正月甲戌十年十月乙卯朔十一年正月丁亥十一年四月壬子朔十一年十月己酉朔十二年十月癸卯朔十三年正月乙亥皇朝文獻通考卷一百十二
