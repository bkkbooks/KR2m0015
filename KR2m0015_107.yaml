body:
  text: 欽定四庫全書皇朝文獻通考卷一百七宗廟考一臣等謹按天子宗廟之禮所重親饗虞夏商周以來歷代各皆舉行而緣情定制惟我朝為特隆焉唐以太宗貞觀之治親饗廟者二三年正月戊午十七年四月庚寅耳自後合十七宗而親饗三十四馬端臨謂懿宗一王應麟玉海作二咸通元年十一月丙子又四年正月己巳也宋自太祖親饗四合十二宗而親饗者八十五然真宗之十二親郊朝享及告行告謁恭謝均非祫禘時享之正祭仁宗之十三亦朝享及恭謝而親行祫祭者一馬端臨所謂纍朝惟此一親行也蓋宋之朝享太廟皆郊前之祗告故每於十一月行之而正祭則未嘗親行我太宗文皇帝肇建太廟於盛京崇德改元四月丙戍大饗後八年之中親饗二恢恢乎大一統之規模也世祖章皇帝定鼎京師立太廟御宇十八年時享親行二十八方順治十六年始行祫祭而親祫二聖祖仁皇帝御宇六十一年時享親行八十二祫祭親行三十二世宗憲皇帝御宇十三年時享親行三十祫祭親行十一皇帝御極乾隆元年至五十年時享親行六十六祫祭親行四十九是皆正祭而凡因事親告者不在此數於戲至仁至孝至誠至敬之心永傳為家法仰溯成周而後廟禮未有若斯之盛者也至若典制之隆儀文之備雖以時遞增而要皆推本於太宗文皇帝始定之規詳考其時自大饗親饗而外凡遇聖節忌辰元旦清明中元除夕皆以時遣官祗祭其禮已為大備世祖章皇帝撫有天下追尊四祖皇帝嵗七享太廟孟春諏吉清明四月七月十月之朔除夕萬壽節則猶太宗時制也至十三年建奉先殿而日獻食月薦新朔望時節聖誕忌辰元旦冬至萬夀節及諸慶典俱行於奉先殿至十六年始祫而除夕之享乃即大祫矣聖祖仁皇帝世宗憲皇帝繼統以來迄今每嵗四孟享太廟與除夕前一日祫祭而五則固皆崇德所行之精意以遞酌而歸於至中昭其大文焉逮世宗憲皇帝即壽皇殿䖍供聖祖仁皇帝聖容孝思純篤以時瞻拜於是有神御之奉皇上深推世宗憲皇帝聖孝之心重建壽皇殿以並奉太祖髙皇帝太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝聖容暨列后聖容又先即圓明園崇建安佑宫奉聖祖仁皇帝聖容而敬以世宗憲皇帝聖容配於是宫中苑中神御之奉乃上推而胥愜乎情與禮之極則丕哉聖孝繼述佑啓於萬年者也且復即避暑山莊聖祖仁皇帝嵗臨之御苑建永佑寺以䖍奉聖祖仁皇帝聖容仍敬以世宗憲皇帝聖容配則所為齊焉而思其居處思其志意樂嗜禮得其所必備而情得其所必伸蓋皆由夫饗廟親行至仁至孝至誠至敬之一心推之以無乎不達者矣兹恭依列朝實録皇上乾隆元年至五十年起居注册參稽大清會典暨各檔案其儀節謹鈔大清通禮成宗廟考十二卷以昭萬年之巨典云太廟天聰十年四月乙酉太宗文皇帝受尊號建國大清改元崇德於盛京建立太廟撫近門東前殿五室後房六間後殿三室南大門三間東西角門三間周圍廣三十五丈袤四十丈崇德元年四月丙戌奉安列祖太祖神位於太廟追尊列祖王號恭上覆育列國英明皇帝尊諡曰承天廣運聖德神功肇紀立極仁孝武皇帝廟號太祖皇太后尊諡曰孝慈昭憲純德貞順成天育聖武皇后先是天聰十年四月初八日壬午羣臣請上尊號於是祗告天地太宗文皇帝率諸貝勒大臣齊戒三日以十一日乙酉受寬溫仁聖皇帝尊號建國號曰大清改元為崇德元年大祀天地禮成是日遣超品公額駙揚古利固山額真談泰宗室拜尹圖葉克書葉臣阿山伊爾登宗室篇古達爾哈石廷柱馬光逺及外藩貝勒下官員卜庫台吉得類扎爾固齊孟庫孫杭哈爾阿爾珠海泥堪內院官希福剛林羅碩等捧祝文以肇建太廟祗告太祖山陵文曰孝子嗣皇帝文皇帝太宗廟諱敢昭告於皇考神位前曰臣敬遵典禮表揚皇考皇妣功德肇建太廟謹擇吉於四月十二日安設神位以昭上祀之禮又仰體皇考孝心稽諸禘嘗巨典追尊始祖髙祖曾祖祖以下王號安設四代祖考祖妣神位又設伯祖禮敦巴圖魯配位伏祈皇考神靈鑒兹誠悃又設功臣費英東額亦都配位從祀皇考左右惟望皇考垂慈來格來歆丙戌上率諸貝勒大臣詣太廟追尊始祖為澤王髙祖為慶王曾祖為昌王祖為福王追封伯祖禮敦巴圖魯為武功郡王恭上皇考太祖尊諡曰承天廣運聖德神功肇紀立極仁孝武皇帝皇妣太后尊諡曰孝慈昭憲純德貞順成天育聖武皇后廟號太祖追封功臣費英東為直義公額亦都為𢎞毅公前殿安奉太祖太后神位後殿正中安奉始祖始祖妣神位左安奉髙祖髙祖妣神位右安奉曽祖曽祖妣神位次左安奉祖祖妣神位皆南面右末安奉伯祖禮敦巴圖魯神位東向是日各神位前陳設黑色太牢少牢一切祭物畢辰刻太宗文皇帝出內治門將至太廟門西下馬御金椅有頃導引官引上先詣後殿至東側西向立贊禮官贊就位上北向殿正中立諸貝勒大臣左右序立贊禮官贊上香引上升東階至始祖神位香案前跪復起立導引官跪奉香上自始祖暨列祖神位前各三上香畢降自西階復位北向立贊禮官贊跪叩行三跪九叩頭禮贊禮官復贊跪上率衆跪東側捧帛官跪奉獻始祖始祖妣帛二端上受帛獻授西側捧帛官捧帛官跪受置案上遂獻髙祖曾祖祖及伯祖神位前帛以次各二端如儀畢列祖列妣前先令大臣獻酒各一爵東側捧爵官跪奉酒上舉爵獻授西側捧爵官捧爵官跪受置案上列祖列妣神位前各獻爵一畢讀祝官以次跪讀祝祭始祖文曰維丙子嵗四月十二日八世孫嗣皇帝廟諱敢昭告於始祖神位前曰洪惟始祖肇造鴻基克恢大業振豐功而克敵開厯服以詒謀爰致國勢昌隆子孫榮盛兹謹倣古制追揚前烈尊為澤王立廟奉祀丕顯令名貽庥萬世惟望祖靈降鑒俯垂默佑國祚永昌祭髙祖文曰五世孫嗣皇帝廟諱敢昭告於髙祖神位前曰洪惟髙祖肇基王迹垂裕後昆撫衆宏以成都集旅庥而啓聖爰致國勢昌隆子孫榮盛兹謹倣古制追揚前烈尊為慶王立廟奉祀丕顯令名貽庥萬世惟望祖靈降鑒俯垂默佑國祚永昌祭曾祖文曰四世孫嗣皇帝廟諱敢昭告於曾祖神位前曰洪惟曾祖丕啓鴻模式𢎞疆宇征四鄰而讋服綏兆庶以敉寧爰致國勢昌隆子孫榮盛兹謹倣古制追揚祖功尊為昌王立廟奉祀丕顯令名貽庥萬世惟望祖靈降鑒俯垂默佑國祚永昌祭祖考文曰孝孫嗣皇帝廟諱敢昭告於祖考神位前曰洪惟祖考纘承懿緒佑啓宏圖綿福祚於萬年誕神靈而首出爰致國勢昌隆子孫榮盛兹謹倣古制追揚祖功尊為福王立廟奉祀丕顯令名貽庥萬世惟望祖靈降鑒默賜啓迪國祚永昌祭伯祖武功郡王文曰皇帝廟諱敢昭告於伯祖神位前曰惟我伯祖竭誠為國懋著崇勳兹酌倣古制用昭往烈追封為武功郡王配享廟廷永彰令譽讀祝畢奉祝文置案上贊禮官贊跪叩行三跪九叩頭禮讀祝官捧祝執爵官捧爵執帛官捧帛從中階下至西側燔燎所焚之徹饌乃詣前殿導引官引上至西側東向立復引由西側升至東側西向立贊禮官贊就位上正中北向立贊禮官贊上香導引官引上升東階至太祖太后神位香案前跪導引官跪奉香上三上香畢降自西階復位北向立贊禮官贊跪叩上率衆行三跪九叩頭禮贊禮官復贊跪上跪衆皆跪東側捧帛官跪奉帛二端上受帛獻授西側捧帛官捧帛官跪受自中階升至太祖太后神位前跪置案上東側捧爵官以次跪奉酒六爵上舉爵以次獻以次授西側捧爵官捧爵官跪受自中階升捧置神位前贊禮官贊跪叩上率衆行三跪九叩頭禮贊禮官贊跪上率衆跪讀祝官捧祝文跪讀於太祖太后神位前文曰維丙子嵗四月十二日孝子嗣皇帝廟諱敢昭告於皇考皇妣神位前曰臣纘承皇考大業十年以來兢兢業業夙夜乾惕以圖仰副先志是以開拓封疆不辭况瘁撫綏兆庶殫力經營兹以安內攘外收服朝鮮統一䝉古兼獲玉璽符瑞昭應內外諸貝勒大臣僉議宜承天應運勸臣宜進稱尊號爰建國號曰大清改元為崇德元年此皆仰賴皇考皇妣之福䕃也臣緬懷皇考皇妣德備生成功隆覆育應真符而開創輯羣瑞以尊親爰遵古制仰協天心敬上皇考尊諡曰承天廣運聖德神功肇紀立極仁孝武皇帝皇妣尊諡曰孝慈昭憲純德貞順成天育聖武皇后立廟祭享垂庥萬祀伏祈皇考皇妣神靈降鑒俯垂默佑俾子孫綿逺國祚永昌謹告讀祝畢又以追封費英東額亦都告祭太祖神位前曰孝子嗣皇帝廟諱敢昭告於皇考神位前曰臣聞恩隆眷舊典重酬庸既昭嘉績於生前宜享恩榮於身後兹以費英東額亦都上佐皇考勳猷丕著爰倣古制追封費英東為直義公額亦都為𢎞毅公配享皇考神位左右揚厥令名垂之奕代讀畢贊禮官贊跪叩上率諸貝勒行三跪九叩頭禮贊禮官贊復位上復位東側西向立諸貝勒大臣左右序立於是以功臣費英東額亦都木牌入太廟費英東位左側額亦都位右側陳設祭物畢讀祝官入內旁立先宣追贈費英東文曰維大清崇德元年嵗次丙子四月十有二日寬溫仁聖皇帝諭祭功臣費英東之靈曰偉烈懋昭贊經綸於肇迹榮封特晉光爼豆於千秋爾費英東佐我皇考正直報效竭盡忠義雖受寵渥於生前尤宜褒榮於身後今特贈爾為直義公配享太廟永垂令譽次宣追贈額亦都文曰寬溫仁聖皇帝諭祭功臣額亦都之靈曰偉烈懋昭贊經綸於肇迹榮封特晉光爼豆於千秋爾額亦都佐我皇考勇力軼羣殊勳丕著雖受寵渥於生前尤宜褒榮於身後今特贈爾為𢎞毅公配享太廟永垂令譽讀畢捧帛捧爵官各捧帛爵讀祝官捧祝文自中階下西行至西側燔燎所焚祝帛奠酒徹太祖太后神位前祭物徹畢徹直義公𢎞毅公祭物自側下階至燔燎所旁焚祝帛奠酒贊禮官贊復就位上復正中北向立衆復就班贊禮官贊跪叩行一跪三叩頭禮禮成上坐於太廟西側樹鵠令善射者較射射畢陳設儀仗作樂還宫臣等謹按先是天聰六年二月丁丑太宗文皇帝率諸貝勒大臣詣太祖髙皇帝陵行時享禮八年十二月庚戌以除夕率諸貝勒大臣親詣太祖陵寢致祭十年三月丙午朔以清明節親祭太祖山陵蓋我國家當未崇建宗廟之先我太祖髙皇帝山陵卜吉在天聰三年春二月營建工成自是以後每親舉時享除夕之祭於陵寢已灼然立萬世廟禮云五月癸丑薦櫻桃於太廟時有以新櫻桃獻者太宗文皇帝命薦於太廟仍命嗣後凡新進果品五榖先薦太廟然後進御著為令七月辛巳中元節親享太廟十二月癸亥遣官祭太廟時先期齊戒三日三年正月乙丑朔遣官祭太廟每祭太廟必並祭福陵自後元旦之祭四年己未朔五年癸丑朔六年丁丑朔七年辛未朔皆遣官祭七月丙子中元節親享太廟時先期齊戒三日十月戊申萬夀節遣官祭太廟自後五年十月壬申七年十月壬戌恭遇聖節皆遣官祭八年二月癸未清明節亦遣官祭八月庚申以太祖武皇帝忌辰遣官祭太廟十二月乙亥除夕遣官祭太廟時先期齊戒三日自後六年十二月己巳嵗暮七年十二月甲午嵗暮皆遣官祭八年七月丙午中元節遣官祭太廟並告征明山東之捷臣等謹按崇德元年五月癸丑薦櫻桃後凡親詣與遣官依通考例當載入祭祀時享然此固盛京廟禮也敬即制度儀注之次編於首卷用昭我烈祖開創皇圖後之所以大一統而垂萬年禮意之精胥肇乎是焉順治元年十二月庚午遣官恭齎太祖武皇帝孝慈武皇后香冊香寶於福陵太宗文皇帝香冊香寶於昭陵是日固山額真以上內大臣侍衛等俱朝服集武英殿大學士禮部尚書由內院奉冊寶出置黃案上上御殿閲冊寶行一跪三叩禮畢遣官恭齎至盛京尊藏二年二月丁巳定遣官祭四祖廟儀臣等謹按順治元年定鼎京師建立太廟始以盛京太廟崇稱為四祖廟至是禮部言凡遇清明等節應令駐防盛京總管分率城守章京往祭福陵昭陵東京興京祖陵令城守官奠祭盛京四祖廟令守廟總管官上香燭獻酒果不讀祝從之乾隆四十三年命重葺盛京太廟臣等謹按盛京太廟自順治元年崇稱為四祖廟五年更名曰景佑宫至是命重修葺仍尊稱為太廟四十八年九月乙巳上詣盛京謁陵恭奉五朝册寶尊藏太廟親詣行禮先是四十七年十月朔上恭奉重鐫列祖列后册寶安奉京師太廟其舊藏册寶先期命怡親王永琅恭賫盛京至是上致祭昭陵畢親詣尊藏行禮皇朝文獻通考卷一百七
