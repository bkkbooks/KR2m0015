body:
  text: 錢幣考五乾隆十一年議以貴州餘鉛運至湖廣漢口令各省收買以供鼓鑄貴州總督張廣泗奏言黔省威寧州水城廳等處開採白鉛出産旺盛嵗自辦解京局正耗鉛四百數十萬斤之外本省鼓鑄及川省收買又約需一百萬斤計多餘鉛三百萬斤但礦厰衰旺不常請每年額外預辦二百萬斤存貯以備接濟尚有百萬餘斤動藩庫公項銀儘數收買運至四川之永寧下船抵赴漢口發賣以供江浙等省錢局採辦之用大學士等議如所請從之臣等謹按黔省各船厰於乾隆四年議定二八抽課外餘鉛以一半官收一半聽厰民自售九年復以厰民未能廣為售銷定餘鉛全數官為收買自九年以後新開各厰皆照此辦理是年復以鉛斤積産滋盛奏定運往漢口之例至十三年以礦産更旺除解京及黔蜀供鑄并存貯二百萬斤運往湖廣一百萬斤外每年又餘白鉛五百萬斤户部議各省見俱開鑄需鉛甚多令仍動項收買添運至漢口發賣並將鉛本腳費核定價直行知各省畫一買用尋議定撥蓮花厰鉛二百萬斤福集厰鉛一百三十萬斤萬福山厰鉛一百三十萬斤濟川厰鉛二十萬斤天星厰鉛二十萬斤共為五百萬斤各厰工本原有多寡不同均勻配算每百斤厰價一兩四錢八分加以水陸運腳以價銀三兩六錢六釐銷售所售之銀即抵還工本十四年以直𨽻江蘇浙江福建江西湖北等處每年採買白鉛止約用二百萬斤無需五百萬斤之多復議定歲以二百萬斤運至漢口合之前議解京各項約需九百餘萬斤之數黔省歲産鉛一千四百餘萬斤除抽課外餘鉛仍半歸官買半聽商賣儘足敷用嗣後至二十四年復以每年收買厰鉛積存福集等厰者二千餘萬斤積存瑪姑厰者三千餘萬斤壅滯不銷久懸帑本若概由川江至楚恐致擁擠京鉛議開濬省城至平越府河道徑由黔省水程直逹湖廣陸續分運鉛斤仍赴漢口發賣通商其柞子厰黑鉛積存亦多並一體發運又增四川寶川局爐座鑄錢運往陜西先是四川於乾隆七年以寶川局銅鉛俱係赴滇黔採買路逺費重奏請開採建昌地方之會理州冕寧縣等處銅礦是時錢局已專用川銅十年復開樂山縣等處銅礦議定二八抽課外餘銅半歸官買以供鼓鑄各厰歲可獲銅一百餘萬斤至是總督慶復會同巡撫紀山奏言川銅漸盛多所盈餘而陜省素不産銅制錢日貴欲籌轉移以濟民困請於寶川局再增爐十五座共為三十座歲可添錢六萬二千二百串有竒以一半增搭本省兵餉作為銀八錢二之數所餘三萬一千二百串撥運至陜省搭放兵丁月餉仍易銀歸款實為彼此有益户部議如所請從之臣等謹按寶川局額用銅斤採自會理州之迤北沙溝二厰冕寧縣之紫古哵厰者每百斤定價銀九兩採自樂山縣之老銅溝厰者每百斤定價銀十兩其白黑鉛皆由貴州採買至十九年以後以酉陽州鉛厰試採有效議定除抽課外半歸官買每百斤給價銀二兩二錢配搭黔鉛供鑄又定給工部錢法堂關防工部侍郎三和奏言寶源局所辦事宜與寶泉局相倣見在兩局監督俱給有分司關防惟工部錢法堂向未議給請照例一體補給庶文移稽核各専責成尋議定寶泉局錢法堂印文係督理京省錢法關防今寶源局錢法堂應鑄工部督理京省錢法關防以昭畫一十二年增湖北寶武局爐座令仍鼓鑄大錢先是十一年以髙低二項滇銅將次用完滇省各厰不敷採買銅斤無從接濟未便停爐請收買漢口鎮商銅改鑄每文重八分之小錢仍照大錢之價配餉既以節省局銅且可冀除盜銷之弊部議令試行一年至是湖廣總督塞楞額奏言官局改鑄小錢與大制錢同價計其工料毁大制錢二千即可鑄小錢三千盜銷與私鑄弊且相因而起應循照定制仍鑄每文重一錢二分之大錢至所鑄錢文向止議配兵餉每銀百兩搭錢六串五百文各營散錢有限亦不足以平市價近日漢口商販銅斤甚多若預行給價按月交銅每年買銅四十萬斤配入鉛錫尚可增爐五座為二十座鑄錢除增搭兵餉之外發交江夏漢陽二縣設立官局按照市價酌減出易於兵民均有禆益俟委員辦運滇銅及官商分交洋銅到日仍搭配鼓鑄户部議如所請從之臣等謹按嗣後以滇洋之銅陸續解到即議定錢局額銅四十萬斤將滇銅洋銅及漢口商銅均勻配鑄各十三萬三千三百餘斤後以商交洋銅漸次減額於十九年以後歲增買湖南銅十萬斤以補洋銅之不足至二十七年户部以漢口銅價在十八兩之外較該省所辦雲南大興厰銅定價十一兩金叉厰銅定價九兩者數目懸殊令添用滇銅以節縻費尋滇省議撥寧台山厰毛銅加耗煎鋉揭成淨銅合計每百斤祇需價六兩五分有竒令湖北採買應用嗣是停配漢口銅十三年復開山西寶晉局鼓鑄先是以山西錢價昻貴特諭晉省巡撫將鼓鑄用銅之處悉心籌議尋以購用銅斤惟有招商承辦議定照從前官商辦銅完帑之例支銷價直并行知各關免其納稅至是以商人辦到紅銅五十萬斤并委員採買漢口鉛錫巡撫準泰奏請復開寶晉局設爐十座每年開鑄十二卯用銅鉛錫三十四萬八千斤鑄青錢四萬二千三百二十四串除去工價等項實存三萬五千一百七十五串於配給兵餉之外並隨時減價平賣以資民用户部議如所請從之又更定雲南辦銅分路起運之例雲貴總督張允隨奏言滇省辦運京銅先經議定由尋甸東川兩處陸路運至永寧交長運官由水路接運至京尋甸威寧一路每年運正耗餘銅三百十六萬五千餘斤每百斤需腳價銀二兩六錢有竒東川昭通一路每年運正耗餘銅三百十六萬五千餘斤每百斤需腳價銀二兩五錢有竒後因昭通一路係新闢苗疆馬匹雇募不敷已奏開鹽井渡河道將東川額運銅內酌分一半改由鹽井渡水運至瀘州每百斤較昭通陸路節省銀三錢二分有竒復因威寧一路與黔鉛同運馬匹仍屬不敷奏開羅星渡河道將尋甸額運銅內酌分一半改由羅星渡水運至瀘州每百斤較威寧陸路節省銀一錢八分有竒嗣後自尋甸東川以下遂分為四路每路各運銅一百五十八萬二千餘斤厯年辦運無誤見在滇省開修金沙江直通四川已疏濬完工舟行無阻請將威寧一路陸運銅斤改由金沙江之小江口水運至瀘州交長運官轉運京局較之陸運每百斤節省銀七錢二分有竒俟將來船隻日增再將昭通一路陸運銅斤悉改由水運户部議如所請從之又開陜西鼓鑄局陜西巡撫陳宏謀奏言陜省錢價日昻前經部派官商辦交洋銅三十萬斤見已運到其黑鉛一項業經在本省開採所需白鉛點錫已委員赴漢口採買請開局於省城西安府設爐十座錢幕滿文鑄寶陜二字每年開鑄二十四卯用銅鉛錫六十萬斤鑄青錢七萬二千八百串除去工價等項實存六萬二千餘串至本省配給兵餉已有四川每歲協濟錢文向定每百兩搭錢四串仍照舊例辦理其所鑄新錢應設局聽民易換以平市價户部議如所請從之十四年停雲南撥運廣西錢減省城及臨安府局爐座雲南總督張允隨奏言滇省歲運粵錢六萬二千串前於乾隆七年粵西已請開局以錢文尚未充裕仍撥滇錢近年以來馱運艱難官民多纍且粵西開鑄已久制錢諒已流通請將運粵錢即行停止至停運之後雲南鑄額尚可酌減應於省城局減爐十座存留二十五座臨安府局減爐八座存留八座每年已可敷用户部議如所請從之又禁南洋商船私販銅器浙江巡撫方觀承奏言南洋自雍正五年開禁以來商民皆得前往市易而紅黃銅與銅器皆不在禁例緣南洋地不産銅各船販往者甚多查各省鼓鑄以銅斤為急務見在東洋之銅運歸內地者甚難不應獨任南洋為漏巵請通行查禁經户部議定凡商船有將紅黃銅器私販至南洋圖利者百斤以下為首者杖一百徒三年百斤以上發邊逺充軍為從及船户各減一等治罪貨物銅器皆入官各關汛文武官辨不行搜查拿報者革職賄縱者計贓從重論失於覺察者降一級調用又令廣東寶廣局增額鼓鑄廣東巡撫嶽濬奏言粵東各礦出銅有限而外洋夷船載至者亦少惟有取給滇銅見在已辦回湯丹厰金叉厰銅共四十萬斤請加辦鉛錫不必再添爐座每年按原定之卯加倍鑄錢以湯丹金叉二厰銅各半配用從前各鎮協營兵餉未經搭錢者一例配給户部議如所請從之臣等謹按嗣後寶廣局以收買洋銅議於十分中以湯丹厰銅五分金叉厰銅二分洋銅三分配鑄至二十一年以後復改大銅厰與金叉厰銅對搭分買又奉上諭刑部議奏參革雲南解銅官吳興逺等虧缺銅斤一案該解官等始以漫不經心致銅斤沈失侵損逮撈獲才及得半輒以全獲呈報復於沿途將銅斤輾轉售賣玩視官物一至於此即此一案虧缺銅七萬有餘其他侵蝕之案更不知凡幾向來劣員侵漁之習大率類是該上司或明知而姑聽之俾得任意欺朦釀成積弊但已往之事姑不必問此案該督撫不能慎選賢員辦理不善著傳旨申飭其所有侵虧銅斤銀兩部議該管上司按股分賠著即勒限完繳以資鼓鑄仍將如何分賠抵補之處具摺奏聞嗣後運銅事宜務須加意慎重其沿途經過各省督撫朕已傳諭令其將委員守風守凍及有無事故之處奏聞至銅鉛船隻於雲貴省起運何日出境亦著該督撫隨時摺奏如仍蹈前轍濫行差委致有前項情弊惟該督撫是問又奉上諭雲貴運送銅鉛一事辦理日久諸弊叢生經朕於營私虧缺之委員嚴加懲處並令該部詳議定例沿途督撫自當實力遵辦但向來銅鉛運京原有定例委員往往逾違及至抵京交部又復挂欠纍纍總由委員揑報事故所至停滯以便作弊而各該省督撫以事不關己雖有催趲之例不過行文查報了事遂至委員任意朦混肆無忌憚不思銅鉛有資鼓鑄本屬公事凡運送船隻由該省起程於何日出境之處已傳諭雲貴督撫奏報其沿途經過各省分督撫大吏均有地方之責雲貴督撫既鞭長莫及而各該督撫復視同膜外殊非急公之道嗣後銅鉛船隻過境出境日期及委員到境有無事故並守風守凍緣由俱應詳查明確隨時具摺奏聞一面飭屬督催毋令仍蹈前轍至運送官物其小者仍照常辦理他省餉鞘木植之類悉宜留心查催不得任其遲滯致滋弊端著一併傳諭各督撫知之臣等謹按嗣後雲貴運解銅鉛經户部定議抵通程限並嚴定逾限處分至領運各官起運日期及沿途過境出境有無事故逗留直省督撫俱遵例隨時督催奏報又定京局黑鉛盡歸湖南辦解户部議言京局額用黑鉛自湖南協解以來黔省止辦四十萬五百七十一斤近因􅨇硐漸空仍不敷額數惟楚省各厰歲産黑鉛百萬餘斤除撥協三十萬斤之外尚多盈餘應盡歸湖南辦運至該省從前協解之時係運赴漢口交黔員帶運交局今既全數承辦應分上下兩運委員解京從之尋復議定每百斤價銀三兩六錢自湖南運京水腳銀一兩歲以為例臣等謹按湖南桂陽州郴州鉛厰自乾隆七年以後復行開採是年增定解京黑鉛之額逮二十九年停開郴州礦厰其額鉛全歸桂陽辦運至於各厰所産亦有白鉛點錫以供本省鼓鑄惟白鉛一項後以出産漸微歲向貴州廣西及漢口等處採買應用又增廣西寶桂局爐座先是十一年以粵西厰銅所出有限議歲買滇銅十五萬斤配用並增爐二座為十二座至是巡撫舒輅奏言雲南見在停運廣西錢必須在本省增鑄方不致缺乏請再添爐八座為二十座其原議每一爐鑄正銅鉛錫六百斤為一卯每卯出錢八十串今應增添以每爐鑄一千斤為一卯加耗在外共用銅鉛錫七十九萬一千二百十斤有竒鑄青錢九萬六千串除去工價等項每年仍以六萬二千串配給通省俸餉以每百兩搭錢十二千六百文為例其餘尚存錢二萬餘串於錢價昻貴之時或發省城鋪户領換或設官局易換隨宜酌辦以利民用户部議如所請從之臣等謹按嗣後粵西本省礦銅祇以預備接濟其寶桂局額銅歲買雲南湯丹厰銅三十九萬五千六百斤供鑄至二十一年滇省以湯丹厰銅不敷撥給議以金叉厰銅各半對搭二十三年又以湯丹厰銅全歸京運改為大銅金叉二厰對搭二十七年以金叉厰銅搭鑄之錢每串不能足部定七斤八兩之數請於十分內止配用金叉銅三分經户部議定金叉厰銅每百斤價銀九兩加耗二十三斤較之雲南發賣他厰之銅價銀十一兩加耗五斤者數目相懸原可通融抵算令將原額應用一半金叉銅內提出七萬九千一百二十斤之數另行添買耗銅煎鍊作為大銅厰銅五分鍊淨金叉銅二分未鍊金叉銅三分配搭鼓鑄又申定雲南運銅限期户部議言雲南解運京銅向令長運官由四川接運至京自川至漢口定限四月漢口抵通州定限五月至於漢口儀徵例須換船一切搬運過載於漢口定限四十日儀徵定限二十日通計自領銅抵通定限十有一月如逾限一月照例將領運官革職戴罪管解委解上司官降三級留任如遇守凍之時地方官察明咨部照例扣除至守風守水日期均不準扣算再每運銅均有正協領運官二人沿途或有沈失打撈等事即令一人先運其每船準裝銅七萬斤不得減船重載及私帶貨物所過之境令地方官辨照漕船之例按站催趲並將入境出境日期報部察核倘無故停留及有盜賣等弊地方官不實力催行及私隱不報照𧾱庇例降三級調用督撫一併議處其交銅之後自京回滇以九十九日為限至加運銅向係雜職官二人管解未免職卑任重嗣後亦照正銅例委府佐州縣一人為正運雜職一人為協運從之十五年令江浙二省錢局加銅鼓鑄時以明年辛未春聖駕巡幸江浙正商民雲集之時特命截留滇銅於江蘇浙江二局預行加卯開鑄屆期設立官局減價出易以平市價臣等謹按嗣後恭遇南巡盛典皆照例加卯鼓鑄又定沈失銅鉛處分户部議定運京銅鉛偶遇中途覆溺限以一年撈獲運員於限內遇有升遷事故仍留沈失之處打撈俟事竣之日分别赴任回籍如限滿無獲及獲不及數即題參革職限一年內照數賠補準豫開復所失銅鉛仍聽其自便撈取報官給價收買如逾年始賠完者免罪不準開復二年不完照例治罪嚴追至運銅之船令地方官雇覔倘以不諳行船之人塞責致有覆溺者將地方官罰六月俸照漕船失風例仍停升轉一年責令協同運官實力打撈限內獲半者免議全無撈獲與數不及半者各罰一年俸又開雲南廣西府局鼓鑄雲南巡撫圖爾炳阿奏言從前廣西府鑄運京錢時雖未搭放兵餉但支給一切工料等項錢文俱係就近行使故制錢尚為充裕逮停鑄之後迄今十載錢價日昻請復行開局設爐十五座每年開鑄三十六卯所需銅斤由東川屬各厰撥往照大理局鼓鑄之數共用正額帶鑄外耗銅鉛錫五十五萬八百斤鑄青錢六萬七千三百三十串二百文有竒除去工價等項照銀七錢三之例配給曲靖開化二鎮標廣羅協廣南營兵餉户部議如所請從之十六年令寶泉寶源二局每年各開鑄七十一卯户工二部議定寶泉寶源兩局歲收銅鉛錫除額鑄之外尚有餘剩應各加鑄十卯為七十一卯每年合計二局比原額可添錢十六萬九千八百餘串如遇錢價昻貴即發八旗米局照市價酌減出易又定解局盈餘銅鉛聽運官報稅自行售賣奉上諭户部所議銅鉛交局盈餘之處奏稱滇省運銅每百斤給有餘銅三斤以供折耗之用額銅交足外餘剩令其儘數交局餘鉛亦照此例看來從前成例似是而非解局銅鉛既有定額不足者責令賠補則盈餘者即當聽其售賣蓋盈餘已在正額之外即不得謂之官物如應儘解儘收則從前竟可不必定以額數矣正額已完又誰肯儘文餘數聽其自售以濟京師民用未嘗不可但以官解之餘而私售漏稅則不可行而且啓弊惟令據實納稅足矣尋户部議定凡交局所餘銅鉛及點錫令運員據實報明移咨崇文門照數納稅户部即將餘剩數目行知經過各關核算稅銀轉行各督撫俟委員差竣回省之時於應領養亷項內扣留解部如有以多報少隱匿等弊一經察出即照漏稅例治罪又定鉛錫自張家灣運局限期户部議定照運銅之例亦以兩月全行交局又議改撥川銅增寶陜局爐座停四川鑄運陜西錢川陜總督尹繼善奏言川省歲撥陜省錢三萬一千二百串分作四季發運每以馱腳艱難不能如期運到見在四川厰銅旺盛請改撥川銅二十五萬斤由水路運陜於寶陜局見鑄洋銅之外另增設爐十座加配鉛錫每年所鑄除去工價等項可得錢四萬八千六百餘串既省運腳之煩又可增塔兵餉實為兩便應於乾隆十七年為始川省裁爐七座停鑄運陜錢令陜西委員按年領銅供鑄户部議如所請從之臣等謹按嗣後寶陜局以商交洋銅漸次減額於十九年以後每年添買四川銅十萬斤配搭鼓鑄其所需黑鉛自乾隆十三年奏開華隂縣之華陽川地方鉛礦試採有效即議定每百斤內抽課二十斤又官買餘鉛二十五斤每斤給價銀五分至二十年以鉛厰工本不敷復增定每斤給價銀六分收買解局供鑄又更定沉失銅鉛處分之例户部議定額運內沉失銅鉛原議一年撈獲有正協二員者留協運官在沈失之處無協運者留親屬家人並令境內文武官會同辦理限內無獲及獲不及數如不在險隘之地即將運員題參賠補倘實係瞿塘三峽長江大湖及黃河諸險準地方官出結報該管督撫移咨原辦銅鉛本省督撫會疏保題將沉失銅船照數辦解免運官參處分賠其地方官不慎選船户以致沉失者照例罰俸如實係風水驟發非人力所能防護者該管官申報將雇船之官免議十七年暫停山西寶晉局鼓鑄又令雲南東川府增設新局鼓鑄雲南巡撫愛必達奏言滇省歲需官兵俸餉銀九十萬二百餘兩向於本省地丁商稅及他省分撥銀兩支給而存留司庫暨各府庫者僅五十萬兩有竒倘有緊要需用必待腹地各省協濟地處邊逺緩不及事見在各厰礦銅旺盛鉛錫亦産自境內不必外求查湯丹大碌等厰皆在東川地方出銅尤多而每當發給工本之時錢價頓貴厰民稱纍東川府舊已設爐二十座専搭兵餉應請於就近增開新局設爐五十座亦開鑄三十六卯共用正額帶鑄外耗銅鉛錫一百八十三萬六千斤鑄青錢二十二萬四千四百三十四串二百文有竒除去工價等項即以搭放銅鉛工本腳價每銀一兩仍照兵餉例以一千二百文發給每年扣存息銀四萬三千兩有竒以備存貯俟十年之後合之原存之數可得一百萬兩庶庫項日見充足户部議如所請從之又增湖南寶南局爐座先是以金叉厰銅易致折耗而湖南本地礦銅亦漸次採獲已議於十分中用滇銅八分楚銅二分配鑄至是以銅産日旺巡撫范時綬奏請全用本省桂陽州郴州厰銅增爐五座共為十座加鑄一倍錢文增搭兵餉以每百兩給錢十串作為一成之數餘錢仍交官局以時易換户部議如所請從之十八年定雲南運銅官給照回省之例户部議言滇省每年解銅需正協運官十二員事竣回滇雖原定有九十九日之限但在京收銅補耗遲速不齊該員藉端逗遛或於起程後沿途停滯皆所不免嗣後交完銅斤將回滇日期報明户部給發實收即將起程日期填給執照行知雲南督撫兼知會吏部如入京時在途有沉失未獲之銅應赴原處打撈者即知照該處督撫飭地方官驗明執照協同撈取并將運員入境起程日期先後移咨滇省如有遲延據實參處從之又令湖北寶武局增額鼓鑄時以湖北議修城工湖廣總督開泰奏請每年添買漢口商銅四十萬斤配入鉛錫照原定之卯加倍開鑄除工料外歲添錢八萬六千九百串設局出易歸還鑄本以所得餘息銀備充公之用户部議如所請從之又定雲南運銅官按程支給養亷雜費之例户部議定雲南解銅正協運官養亷雜費銀自雲南至永寧瀘州準支二十三日自領銅起至通州準支九月在漢口及儀徵換船準支兩月自通州打包運局準支兩月自京回滇準支九十九日其在途守凍日期減半支給又開山西寶晉局鼓鑄減設爐座先是以銅斤用完巡撫阿思哈奏請暫行停爐得旨錢文為民間日用必需自宜即行設法採辦銅斤源源接鑄其如何定以官價遴選殷實商人具領承辦之處著傳諭阿思哈速行辦理尋議定招商辦銅七十萬斤聽赴漢口及蘇州購買分作五年交局先發價銀三分之一其餘陸續支領其鉛錫另行委員採辦至是巡撫胡寶瑔奏請復行開局較從前酌減爐四座止存六座鑄錢已足敷用其各營官兵俸餉以銀七錢三配給户部議如所請從之十九年議以湖南餘銅運往湖北供鑄湖南巡撫范時綬奏言桂陽郴州二銅厰開採之始歲止獲銅三萬餘斤尋增至十萬斤自十七年以後加意調劑現在歲可辦獲銅三十餘萬斤除寶南局鼓鑄用銅十九萬六千二百斤之外尚有盈餘查湖北鑄局每年需銅不下四十萬斤近聞漢口銅採買甚艱請將湖南所餘銅歲運十萬斤協濟湖北之用一水可逹實為便益至於銅價於上年議定除二八抽課外餘銅官買每百斤給銀十三兩應令湖北亦照定價撥銀還項户部議如所請從之又增定寶源局錢放餉額數工部奏言寶源局按卯鑄錢解交節慎庫者歲共四十萬二千二十八串有竒除給發各工及移交户部放餉錢二十四萬串之外每年遞加存積見在貯庫者三十七萬餘串正宜及時流通查搭放兵餉每月約以二成計需錢七萬餘串户部用至五萬餘串工部協放者僅二萬串為數較少請嗣後工部餉錢每月以三萬串為例令户部核明八旗應領款項即於節慎庫給發庶庫錢不至壅積從之尋議定每屆領餉之期户部票傳寶泉局爐頭除分放本部錢文外即令前赴工部庫領錢如數散給至二十六年以一局爐頭辦放兩處餉錢未免顧此失彼且錢文遇有短少易至互相推諉更定工部餉錢令寶源局爐頭赴庫放給又增雲南收買厰銅價值雲南巡撫愛必達奏言東川府屬湯丹大碌等厰所産銅斤歲以解運京局定例每百斤以價銀九兩二錢報銷原係合算耗銅餘銅及銅厰雜費在內其厰民實得之價向係每斤給銀六分查雍正四年開採以來奏定於百斤內抽課十斤例不給價餘銅官為儘數收買尋復議課銅之外再抽耗銅五斤至乾隆四年復題定東川所屬各銅厰地逺費多每百斤除抽課及加耗外餘銅準照每斤銀六分收買其在各屬地方者新開之厰照新例每百斤抽課二十斤餘銅每斤給價五分收買舊有之厰照舊例每百斤抽課九斤餘銅每斤給價自三分八釐至四分二釐收買嗣後俱遵照辦理但湯丹大碌二厰銅質最髙厰民採銅百斤除去抽收十五斤實止得工本銀五兩一錢開採年久􅨇硐日深費用加重所給工本實屬不敷請每百斤增銀九錢以足六兩之數經户部議該處舊定銅價已較多於他厰未便再行議增得旨著加恩照請增之數給豫一半餘厰不得援以為例臣等謹按嗣後至二十一年以東川局加卯鼓鑄餘息於每百斤續添銀四錢五分為價銀六兩收買二十七年以工本較重復議每百斤再增銀四錢又令四川以存積餘銅解京四川總督黃廷桂奏言成都錢局存積銅一百四十餘萬斤建昌各厰存貯未運局者又有八十餘萬斤川省每年需銅止六十萬斤請酌留八十餘萬斤以備通融接濟尚有一百四十餘萬斤可以解京經户部議準運至京局以充鼓鑄但専員領解需用腳價甚多令先如數運貯重慶俟滇省運銅路過之便每運帶解二十萬斤分作七運附解交局又議以廣東鹽斤與雲南銅斤互易供鑄廣東巡撫鶴年奏言粵東鼓鑄歲需正耗銅十四萬一千二百六十四斤見在雖有存局餘銅仍應每年辦銅十萬斤以備接濟查滇省産鹽不敷亦歲需粵鹽一百六十六萬一千三百三十三斤已咨商滇省彼此抵換可免委員齎價之煩嗣後兩省按年輪值遇廣東辦銅之年即運鹽而往遇雲南辦鹽之年即運銅而來惟粵鹽之價較滇銅尚有不敷仍扣算補足實於公務有益户部議如所請從之嗣後至二十五年以存局銅斤將完復議於鹽銅互易之外每年再動帑添買滇銅五萬斤應用又議定雲南各局配鑄黑鉛價直雲南巡撫愛必達奏言滇省黑鉛出産衰旺不常自鼓鑄青錢以來俱於各屬地方零星購買本無一定之厰厯來各局報銷每百斤勻算工本腳費銀二兩二錢今就現在情形核定省城局黑鉛應用祿勸州甸尾厰所出每百斤價銀一兩五錢自厰至局運腳六錢臨安府局黑鉛應用建水州銀厰所出每百斤價銀一兩四錢八分自厰至局運腳九分有竒大理府局黑鉛應用順寧府銀厰所出每百斤價銀一兩五分有竒自厰至局運腳一兩一錢四分有竒廣西府局黑鉛應用羅平州平彞縣白鉛厰所出每百斤價銀一兩四錢八分自厰至局運腳五錢東川新舊兩局黑鉛應用會澤縣阿那多厰所出每百斤價銀一兩六錢八分有竒自厰至局運腳五錢一分有竒飭令管厰各員按年據實報銷二十年定江浙採買洋銅商額先是江浙承辦京局銅斤各洋商皆預先領帑至乾隆三年停止辦運而商人積欠甚多未能清繳嗣因江蘇開鑄另招白攜資本之新商即給與舊商所用倭照出洋採銅俟辦回時與浙江分買供鑄至是江蘇巡撫莊有恭奏言舊商欠項尚有一十二萬七千餘兩年久無完昔年各商初往東洋時倭人設立倭照每張約費銀八九千兩不等今新商楊裕和等即承頂其照出洋獲利情願代完舊欠分年抵補查乾隆十四年議採辦洋銅每年額定十五船除官商范清注銅船係領帑辦銅外民商自辦者共十二船應請即以見辦十二人為商額每年發十二船置貨出洋約需自備銅本銀二十八萬八千餘兩辦銅一百五十萬斤仍照舊定官收一半之例江浙二省分買其代完舊欠銀即於司庫發買銅價內按年扣收於乾隆二十年為始增給布政司印照以為海口稽查符驗其有他商情願辦銅者悉附十二額商名下如引鹽散商附入甲商之例不得私自越販其銅船有在浙省收口者一體辦理知會至閩粵洋商向不辦銅仍照舊例毋許私販户部議如所請從之至二十五年禁止絲斤出洋復奏定額商楊裕和及官商范清注等每年出洋者十六船共辦銅二百萬斤除置帶糖霜藥材等貨外每船應配帶紬緞三十三捲以重一百二十斤為一捲毋許浮多責成江南海關及浙江乍浦二處官員照例稱驗輸稅二十九年以弛絲斤出洋之禁復令每船準配帶湖絲照原定紬緞之數抵算出口易銅以供鼓鑄臣等謹按採買洋銅例往東洋日本自康熙二十二年設立海關是時洋銅即已流通內地逮三十八年以京局額銅交商辦解尋改為八省分辦復改為江浙總辦皆取給於東洋至乾隆三年京局改用滇銅而江浙等省仍用洋銅配鑄自是年奏定商額以後各船歲往日本之長﨑澳易銅以還分供鑄局鯨波萬里來往不驚蓋由聖世承平商民樂業以東鯷逺産而歲致中邦宛如內地官山之利焉猗與盛哉又增四川寶川局爐座先是十六年以停鑄協濟陜西錢減爐七座十九年以厰銅存貯有餘復照舊額開爐三十座至是以川省議修城工總督黃廷桂奏請於原額之外再增爐三十座加鑄銅鉛錫一百二十萬斤歲添錢十二萬四千餘串設局出易以餘息存充公用户部議如所請從之又定貴州湖南辦解鉛斤鎔成整塊之例户工二部議言京局額鉛俱由貴州湖南辦運當其鎔化出厰每塊多寡輕重原不畫一緣局內兌收法馬以百斤為準是以運員接領之後另加鏨鑿配搭成包每包作為一百斤多有零星碎塊水陸轉運易於虧折且鏨鑿之時人役偷減諸弊難保其必無每至到局平兌斤數不足俱需餘鉛添補或有挂欠補解者嗣後請令鉛厰煎鍊之時預行較定五十斤為一塊每二塊為一包以足百斤之數不許運員私行搭配可免折耗之弊從之二十一年議定雲南各局配鑄白鉛價直先是雲南局白鉛俱係卑淅塊澤二厰所出乾隆十四年以建水州新開普馬山厰産有白鉛距省城臨安道路較近奏定照例抽課收買運供二局鼓鑄尋復議大理廣西二局亦就近撥用以省腳費其舊厰每年但收買二十五萬斤存貯其餘聽商自行銷售至是厰民呈請每百斤減價一錢八分仍照舊例撥用經署巡撫郭一裕奏定新舊厰並行開採除東川局向用卑淅塊澤厰鉛外嗣後省城臨安二局用普馬厰鉛每百斤照例厰價二兩大理廣西二局用卑淅塊澤厰鉛每百斤厰價一兩八錢二分按額分運又令寶源局以存貯餘銅加卯鼓鑄工部錢法侍郎夢麟奏言寶源局額鑄銅鉛錫每年尚有餘剩存積日多請於正額七十一卯之外加鑄十卯歲可添錢五萬六千六百餘串以廣流通俟餘銅用盡再行停止從之嗣後至二十七年以舊銅將次用完仍照原額為七十一卯又增山西寶晉局爐座山西巡撫明德奏言晉省近因錢價昻貴將庫存錢文發市平賣但歲鑄之錢為數無多不能源源出易現在川省餘銅足敷採買請動帑辦運五十萬斤按年配搭商銅鼓鑄增爐五座為十一座歲可添錢一萬七千五百餘串照例減價聽民易換户部議如所請從之又令雲南東川府新局加卯鼓鑄雲南巡撫郭一裕奏言滇省每年出銅千餘萬斤以供鼓鑄所獲息銀亦歲收二三十萬兩留備一切公用關係甚重查迤東迤西地方各小厰數十處産銅不一惟東川府之湯丹大碌二厰歲辦獲銅七八百萬斤較他厰尤為緊要近年以來礦産漸逺物料加昻前已議每百斤添給價銀四錢五分而厰民仍為竭蹶應酌量調劑之法請於東川府新局內加鑄十八卯即令湯丹大碌等處厰民於常額之外加辦餘銅照厰價收買供用歲可添錢十一萬二千二百十七串有竒核計鑄出錢文歸還鑄本之外將息銀增給各厰工本以本厰銅斤加鑄之餘息即為該厰添補工費之不足既不至縻費正帑而於銅務有益户部議如所請從之又增湖南寶南局爐座湖南巡撫陳宏謀奏言桂陽州郴州各厰礦砂加旺歲可獲銅四五十萬斤錢局又有存貯舊銅其配鑄鉛錫各厰所産亦足敷用請再增爐十座為二十座共用銅鉛錫七十八萬四千八百斤鑄出錢文應於搭放兵餉之中稍為變通查湖廣各營兵糧多支本色米石惟提標及衡永鎮筸辰州沅州永順桂陽澧州臨武常德九溪龍陽保靖永定等各鎮協營向支折色銀兩每米一石折價六錢七錢不等因米價日昻實不敷買即以局錢每串作銀一兩給發其各營餉銀搭放一成錢之數悉照舊例所餘之錢仍按市價酌減出易户部議如所請從之又定各衙門公費給錢之例户部奏言寶錢局歲鑄錢文於額用之外餘錢八萬餘串逐年遞積見存庫錢約六十萬串查在京各衙門每月應支公費除工部各官業經該部奏明給發寶源局錢外其餘俱由户部支領銀兩每月需銀九千四百餘兩不等而各衙門領銀之後又需赴市易錢應用請嗣後一體改給制錢則庫項既不至壅滯而錢價又可漸平從之二十二年定分别收換廢錢之例奉上諭前代廢錢流傳至今已屬無幾攙和行使相沿已久若盡行查禁轉使吏役得借端滋擾如唐宋元明之舊錢不妨仍聽民便至偽號錢文則當嚴行禁革但辦理不善恐小民無知以見有錢文官為收禁情有不願著該督撫等出示曉諭準民間檢出官為收換所換錢文即供鼓鑄之用二十三年更定雲南辦解京銅併為四運先是户部奏言雲南解銅多有沈失總緣川江之險甚於他處而其風狂水急每在四五六月間滇省第二運銅抵川正當其時宜令分攤以為避險之計請飭該省督撫妥議尋四川總督開泰會同雲南巡撫劉藻議奏滇銅解京向分為正加六運每隔兩月即令一運起程故雖遇川江盛漲之時不得不依限前行致有覆溺之患自應酌量變通但正運銅斤係運官沿途雇船直抵通州而加運之銅自漢口以下即撥地方站船遞送若將正運之銅分派與加運官帶解則報銷水腳未免參差請將四正運併作三運二加運併作一運共為正加四運每歲七月內開頭運九月內開二運十一月內開三運次年二月內開加運每正運仍係相隔兩月起解加運銅數較多寬豫一月之限亦屬均勻既可避夏漲之險而正運加運各歸原欵一切打包換船諸事亦可以次辦理户部議如所請從之又定貴州辦鉛起運限期貴州巡撫周人驥奏言黔省辦鉛向例分上下兩運上運以四月起解本年十月到部下運以十月起解次年四月到部自川省重慶府開行沿途一切換船搬載分别定限抵通如逾限一月以上照例查參見因川江夏漲難行應照滇銅例設法避險請嗣後上運於二月內起程三月即可出峽仍定限本年十月抵通下運於八月內起程九月即可出峽仍定限次年四月抵通如此則重運不至冒險而抵通之期更為寬裕户部議如所請從之二十四年移貴州畢節縣局於省城加卯鼓鑄貴州巡撫周人驥奏言畢節縣設局之始原因就近可運銅鉛但每歲所鑄錢文解至省城安順二處仍須開銷腳價而知縣有地方之責委令管局亦有顧此失彼之虞應移局於省城貴陽府専委大員管理至銅鉛各厰雖距省稍逺若將安順以下河道開通改為一半水程可以節省運費並將加鑄二十六卯歲可添錢五萬七千三百五十五串有竒增搭兵餉仍以所餘錢流通出易以平市價其所需銅斤見在積存厰內者有八十餘萬將來陸續採出可接濟二年之用户部議如所請從之尋復奏定每年六十九卯除去工價等項實存錢十七萬二千餘串內搭放兵餉及俸工役食等錢十萬餘串以六七萬串令官錢鋪發賣每串照市價易銀一兩四分至二十六年以錢價日平復議定每串易銀一兩以便民用臣等謹按嗣後至二十六年以積銅用完復奏定每年除本省出銅一半外仍採買滇銅四十餘萬斤添補議以大銅金叉二厰銅髙低對搭各二十餘萬斤又開西域葉爾羌城鼓鑄局回部之葉爾羌喀什噶爾和闐城舊有錢文市易通用名曰普爾質以紅銅為之重二錢制小而厚外有輪郭中無方孔每錢五十文謂之騰格回部舊服屬於準噶爾以普爾為歲賦在策妄阿拉布坦時錢面鑄其名用準噶爾字背鑄回字噶爾丹䇿凌時復易名更鑄準夷既征回賦即以回地普爾資用至是以西域蕩平回城悉定皇上從將軍兆惠之請開局於葉爾羌城改鑄錢文特命户部頒發錢式仍用紅銅每文重二錢形如內地制錢較厚文為乾隆通寶用漢字其幕鑄葉爾羌城名左用國書右用回字先以預備軍營之銅開爐鑄錢五十萬易回部舊錢銷毁更鑄以資回衆之用嗣後仍於各城産銅之地陸續採銅加鑄臣等謹按前史載西域諸國錢品不同各就其土俗為之從未有模範圜函悉奉一王之制者也大抵西域之錢多以金銀為質惟唐書載泥婆羅國以銅為錢不穿孔宋三朝國史載天竺國用銅錢圓徑如中國之制但實其中心不穿貫西域之錢又多以人物為形惟洪遵泉志列吐畨國屋馱國錢稱其肉好不異中國以銅為之字如梵書不可識所謂泥婆羅吐畨等國皆為今西藏左右之境實當回部之南然則回地之舊普爾錢鑄以赤銅而有字或即其遺制耶夫回部居天山之南多係古西域三十六國地唐書西域傳謂龜兹于闐置女肆以征錢後周書異域傳稱髙昌國稅銀錢樂史太平寰宇記稱龜兹國稅銀錢而皆不詳其錢式洪志載龜兹疏勒國有五銖錢又稱其地近西涼為張氏遺制然則其為市易之流傳與本國之自鑄亦莫得而考也惟是史稱龜兹國能鑄冶有鉛又疏勒姑墨難兜諸國多出銅鐵今回地之阿克蘇烏什庫車沙雅爾諸城即其故境蓋其饒於礦産自昔而然我皇上德威廣被綏定遐荒月竁天西並遵制度於回城設局開鑄冠以天朝年號而附識其城名於幕以同文之治為利用之資洵乎貨幣之流通迄於無外已至於回部田賦若葉爾羌喀什噶爾和闐諸城皆以糧與錢並納舊以五十普爾為一騰格每騰格直銀一兩自登版籍以來錢價日就平減諸城伯克等請加納普爾以次遞增乾隆二十六年定以百普爾為一騰格凡田畝之供輸與市鄽之貿易皆以此為準繼自今六府孔修百工咸理定丱人之職官山逺過乎祁連頒泉賦之規任土直周乎蒙汜斯固肇興刀布以來所未有之盛烈矣又撥四川湖廣局錢運往甘肅先是以甘肅制錢缺少民用未便已議將楚蜀餘錢酌撥協濟至是奉上諭甘肅錢價昻貴見在大兵凱旋及一應屯田事務并民間日用錢文在所必需著於四川省每歲協濟錢十二萬串湖廣省每歲協濟錢八萬串按數分起解甘濟用其所需工本物料價值以及水陸運費該省俱作正項報銷又增湖南寶南局爐座時以協濟甘肅錢文四川及湖北皆於加鑄數內撥往惟湖南所鑄有搭餉及折給兵糧定額餘錢不敷解運巡撫馮鈐奏請以本地厰銅於舊爐二十座外增設爐二十座歲添錢八萬四千三百七十九串有竒以八萬串運至甘肅户部議如所請從之至二十六年停解甘省錢以本省興修城垣奏定仍照增添之數鼓鑄將鑄出錢八萬餘串設局平賣以餘息充城工之用二十五年令廣東湖南收買廣西餘鉛以供鼓鑄護廣西巡撫葉存仁奏言粵西鼓鑄需用白鉛向係委員赴黔省採辦嗣因思恩縣屬之幹洞厰出有白鉛奏明抽課之外餘鉛每百斤以價銀二兩四錢收買供鑄遞年積存局內者共有一百六十四萬餘斤上年又增開盧架一厰採鉛日多已議定每百斤減價一錢作為二兩三錢收買但本省鼓鑄鉛斤毋庸再為預備而礦産旺盛厰民銷售不及未免工本拮據查廣東湖南與廣西接壤雖各開有鉛厰而白鉛出産甚少寶廣局每年需用白鉛十三萬五千斤係照依時價採買每百斤價銀四兩九錢有竒寶南局每年需用白鉛二十萬斤係黔省撥運每百斤腳價銀三兩六錢有竒如由桂林轉運至二省合計運腳較原數皆有節省請嗣後將餘鉛收買存貯省域錢局令二省委員赴粵西陸續買運易銀歸款户部議如所請從之至二十八年以出鉛數減議令湖南復買黔鉛其廣東所需額鉛仍赴廣西採買又令寶泉局每年開鑄七十六卯户部奏言寶泉局鼓鑄七十一卯得淨錢八十萬五千三百餘串每年搭餉及給發公費需錢八十三萬餘串向因庫貯有餘酌量添用今前項貯錢五十餘萬串已令各工程處陸續支領自應預籌增鑄請再加五卯為七十六卯歲可添錢五萬六千六百餘串其紅銅及黑鉛點錫存局俱屬有餘毋庸添辦惟白鉛一項所剩無多應令黔省於正額之外再添辦三百萬斤分作三年帶解約可供添鑄十五年之用從之二十六年停四川湖廣撥運甘肅錢甘肅巡撫明德奏言自楚蜀協濟錢文以來將四川錢撥運河西湖廣錢截留河東搭放兵餉及減價出易上年至今約共撥到錢四十餘萬串現在甘省每銀一兩約可易錢八百八九十文市價大平應請停止撥運下部知之又開西域阿克蘇城鼓鑄局先是回地惟葉爾羌喀什噶爾和闐各城以錢交易其阿克蘇諸城向不用錢或以銀買賣或以田地及貨物牲畜互換自平定以後以其地向有銅礦仍於阿克蘇屬地方置七品伯克二員管理採銅回户至是參贊大臣尚書舒赫德以各城阿竒木伯克之請奏定於阿克蘇城歲徵紅銅四千二百五十斤烏什城歲徵紅銅三千一百九十斤庫車城歲徵紅銅八百十五斤沙雅爾城歲徵紅銅三百五十斤賽哩木城歲徵紅銅三百五十斤拜城歲徵紅銅三百四十斤哈喇沙爾城歲徵紅銅七百五斤共為一萬斤彚解阿克蘇城開局鑄乾隆通寶錢其錢幕鑄阿克蘇城名餘俱如葉爾羌城之制臣等謹按自二十六年以後銅産日旺復陸續增定阿克蘇屬採銅伯克為三員添置庫車屬採銅伯克二員沙雅爾屬採銅伯克一員哈喇沙爾屬採銅伯克二員其各城歲徵銅額亦以次加增以為阿克蘇局添鑄及撥供葉爾羌局接鑄之用又更定雲南辦解京銅仍分八運罷協運官户部奏言滇省承辦京局正加四運銅斤向定每運委正運官一人協運官一人一同起程在途一切雇船搬載俱係正協二員會同辦理厯年各運依限解到者固多而到京遲滯者亦復不少總由二員合運責任不専未免互相推諉應請將額解京銅仍分為八運作為六正運兩加運每運俱委同知通判知州知縣等官管解以專責成不必再委雜職官為協運每年仍避出川江夏漲之期將八運均勻起解從之又令貴州湖南起運京鉛罷協運官並定貴州辦鉛仍分四運户部奏言貴州湖南承辦白黑鉛斤向係分派正運協運官各自領鉛先後開船其正運所領鉛斤雖多於協運然正運係府佐等官沿途足資彈壓即遇舟車需費亦易於應辦協運既係雜職微員一切每多竭蹶於公事不免貽誤請照雲南運銅之例専委同知通判知州知縣等官管解其廣東辦解點錫向無協運之例嗣後仍毋得委雜職等官至於鉛斤分運宜酌量均派湖南所解黑鉛為數較少應照舊為上下兩運貴州所解白鉛原額四百四十萬餘斤近又有添辦之數仍應分為四運從之又令湖南收禁小錢先是於乾隆九年巡撫晏斯盛請將湖廣所行小錢概行禁止交官給與價值經大學士等議以楚省使用錢文大小不等民間有以三小錢當一者有以兩小錢當一者原係舊有之錢非私鑄可比見在錢少價昻若遽為查收恐於兵民未便俟制錢充足再行定限至是巡撫馮鈐奏稱湖南自節次加爐鼓鑄以來錢價大平小錢自應禁革户部議定除古錢一項仍聽民便康熙年間之小制錢亦照舊行使其餘一概小錢令地方官申禁並照例收買又增設户部錢法堂司官二人裁寶泉局筆帖式二人户部奏言錢法堂官原為稽察寶泉局而設一應文移往來向因書吏具稿未協令監督主稿錢法侍郎核定以稽察錢局之文案即由本局監督辦理殊非體制查寶泉局向派筆帖式四員翻寫文移而事務無多請酌裁筆帖式二人添派滿漢司官各一人專司主稿於各司員中公同選委仍照監督之例二年更代從之二十七年令解京鉛錫運局車價皆預行撥解户部奏言貴州湖南廣東承辦鉛錫俱由張家灣陸運至局其車價銀向係運官攜帶臨時交張灣巡檢代雇車輛往往有交價濡遲巡檢借端推諉以致不能速運必得部中督催始克運竣者蓋緣車價既入運官之手即不免沿途挪用而巡檢因係私相交兌亦遂任意遷延應請嗣後解運鉛錫除一切途中必需之費仍發運官隨帶備用其自張灣運局請照運銅車價預解坐糧廳之例行令貴州等省計一年所需預行撥解通永道庫存貯俟運船抵灣該道核算應用之價照數發張灣巡檢雇車起運一面將發價日期呈報錢法衙門扣限查催從之又定雲南辦解銅斤整碎分包之例先是户部奏準將額運京銅倣照運鉛之例令先酌定斤數鎔作整圓每包合成一百斤不許運員鏨鑿碎銅搭配以免沿途折耗即遇有沈失亦便於按數撈取至是雲南巡撫劉藻奏言向來滇省解京俱係蟹殼銅嗣因大興厰所産之銅成色與蟹殼相同即奏明以餅銅配解均係整碎分搭每百斤為一包蓋在厰之銅係將礦砂錘碎鎔化於洪爐之內提取而出本不能輕重適均其蟹殼一項乃成色最髙之礦當煎鍊之時以米湯澆潑乘其凝結然後揭取水火相薄亦易激成碎塊非盡由於解官鏨鑿之故也嗣後應令將滇銅整圓者與碎小者各自分包整圓者每包不必拘定百斤碎小者必足百斤之數其塊數斤數用一木牌詳悉開明釘於封包之外過稱時連包稱對不許逐處拆動亦可杜偷竊而防遺失下部知之又定京局交收銅鉛錫限期户部奏言向例銅斤到局監督呈明錢法侍郎驗定成色即令交收俟全數兌完之後給發回批乃運官每易遷延時日不能作速交清嗣後請定限兩月全收如有斤數短少勒限十日令赴局補交其各省解到鉛錫亦照此一體辦理仍將局內收清日期先行知照該撫以便飭令運官回任報銷從之二十八年令湖北寶武局添買雲南銅配鑄先是寶武局加鑄錢文原議専用漢口商銅尋以四川礦銅旺盛歲買川銅二十萬斤合漢口銅二十萬斤對搭鼓鑄至是以川銅不敷採買湖北巡撫輔德奏請照例買漢口銅經户部議漢口銅每百斤需銀十九兩價直較昻應令添買滇銅以節縻費嗣後湖北委員赴滇於正鑄需用之外另行加辦其漢口銅每百斤復減價至十七兩五錢暫行收買以供每年滇銅未到之先隨時接濟從之二十九年定滇銅運京守風守水及封閘封峽程限户部議言滇銅自四川瀘州運至通州以十一月為期或遇途次守凍例準扣除並無守風守水及封閘封峽等一定程限承運各官往往任意耽延查滇銅至京程途原非一日途中風水順逆既難逆計當川峽盛漲更難冒險前進至運河閘座所以蓄泄水勢以濟漕運及封閉之日各項船隻例不開放而銅船至京又無他道可以繞越兼旬守候勢所不免應交沿途督撫遇有銅船到境實係封閘封峽及遇水淺起剝查明屬實取結報部以便扣限其有風信驟發水勢暴漲事出偶遭一併準其照例扣除如平水河道人力可施不得藉端逗遛各船分起解運應令節次抵通亦不得任意後先稽延時日違者查核從之又議定湖南運解京局黑鉛仍歸貴州湖南分辦先是京局所需黑鉛七十萬五百七十斤有竒厯交貴州辦運嗣因湖南郴州開採桃花壠等處及桂陽州等厰黑白鉛砂出産甚旺乾隆十一年議將貴州所辦京鉛一半改歸湖南代辦復於乾隆十四年將貴州應解京鉛全交湖南代辦至是湖南巡撫喬光烈奏言湖南所辦京鉛本由桂陽郴州兩厰分運今郴厰因開採日久硐老砂竭已請封禁而京鉛為鼓鑄所必需未便闕額聞貴州柞子等厰所産黑鉛自停運以來頗有積存鉛斤今據貴州巡撫劉藻覆稱貴州每年可辦京局黑鉛三十五萬斤自乾隆二十九年為始照數委員解京供鑄其餘三十五萬二百八十五斤有竒仍須湖南辦運請改於桂陽厰採辦作為一運於九月全數解京仍分交户工二部收納供鑄至所需顔料庫黑鉛一萬七千六百六十九斤有竒向亦係郴桂兩厰分辦今統歸桂厰辦解户部議如所請從之又定廣東湖南運京鉛錫程限廣東布政司胡文伯奏言雲貴辦運京局銅鉛均經議定程限其餘省分解京鉛錫未經定期恐委運各員沿途任意逗遛或致誤公經户部議言直省辦解鉛錫由本省前至張家灣抵京其間經涉江湖實在需日若千應令直省各自核計定限嗣經廣東巡撫明山議定廣東辦解點錫自廣州前至通州之張家灣中間多係灘河逆流南雄而上俱由陸運山路亦復﨑嶇運解原非易易應酌定程期以十閲月解京為限湖南巡撫喬光烈議言長沙領運黑鉛直自漢口運抵張家灣原照貴州運銅之例定限五閲月其自長沙前抵漢口中隔洞庭水寬風逆勢難冒險前進應酌以一月為期中途遇有守風守凍日期仍準沿途地方各官結報核辦户部議如所請從之又開雲南順寧府鼓鑄局雲貴總督吳達善奏言滇省辦銅各厰除湯丹大碌兩大厰之外其次即賴大興大銅二厰自乾隆二十一年奏開之後歲辦獲銅百餘萬斤至三四百萬斤不等兼之銅質甚髙大興厰添撥京局大銅厰分供省局每年二厰所餘銅仍以給各省配搭採買之需但該二厰地勢低窪每被水淹厰民以有虧資本採辦不前應及時調劑擬歲給官本八千兩以為宣泄積水備料興工之用查順寧府之寧台山厰並附近蘆塘等處近年礦砂旺盛積銅甚多若加耗煎淨儘堪適用其鼓鑄所需鉛錫亦易撥運請開局於順寧府城設爐八座每年開鑄三十六卯並照東川新局之例加鑄十八卯錢幕仍鑄寶雲二字共用正額帶鑄外耗銅鉛錫四十四萬六百四十斤鑄青錢五萬三千八百六十四串二百文有竒除去工價等項就近配給永順鎮標官兵俸餉并搭放順寧永昌二府公用所餘錢文核計歸還鑄本將息銀八千八百餘兩添補大興大銅厰經費户部議如所請從之又撥雲南彌勒州厰白鉛運廣西府局供鑄雲南巡撫劉藻奏言廣西府局鼓鑄每歲需白鉛二十三萬九千五百餘斤有竒向於羅平州卑塊二厰買運每百斤並運費給價二兩七分今彌勒州野豬厰産鉛旺盛應自丙戌年為始照例給價收買撥運廣西府局供鑄每百斤減價一錢八分由野豬厰運廣西府局合計運腳亦有節省供鑄之外如有餘鉛仍抽正課聽商銷售户部議如所請從之又減陜西鑄錢銅數增買滇銅運陜供鑄先是陜西寶陜局鼓鑄需銅三十八萬斤向赴四川採辦因川省出銅減少停其採買更向雲南撥給三十五萬斤以供鼓鑄髙低各色配解至是雲南以髙銅漸少祇撥給五萬斤更撥金叉厰低銅三十萬斤交委員領運陜西巡撫和其衷奏言陜省厯年銅斤年運年銷並無餘存而官商辦運洋銅不過五六萬斤運局每無定期不能及時應用見在存貯陜銅止可供一年之鑄陜滇相去遼逺銅斤往返約須二年有餘誠恐一時不能接濟必致停爐歇卯請將陜局鼓鑄每爐兩卯酌減五百斤以一年為率今年減存之銅即可待次年供鑄俟滇銅運到仍行照舊鼓鑄再採運滇銅既難刻期而至請自丙戌年為始於三十五萬斤正額之外預買五萬斤仍照髙低各色配解以備陸續接鑄之需户部議如所請從之三十年議以四川重慶夔州二營生息銀兩交鑄局加卯鼓鑄四川總督阿爾泰疏言川省各營需用賞恤曽經於鹽茶項下支銀一萬四千五百餘兩交寶川局每年加鑄二卯扣還銅鉛錫等工價可得息銀七千七百餘兩為陸續賞恤之用惟重慶夔州二處仍係營中領本四萬一千九百餘兩自行開典生息充賞每年獲息僅五千三四百兩較之錢局加卯鼓鑄相去懸殊且當店官為經理雜費既多兵辨差操多誤或恐有私漸挪移之弊不若將官典概行停止所獲息銀及房間什物盡行變價歸本解司以一萬九千餘兩仍照例交鑄局隨卯帶鑄除歸還價本之外所餘銀兩餘息既多足敷添補賞項之用事簡易行亦於政體協宜得旨允行三十一年減雲南順寧局加卯鼓鑄增省城臨安鼓鑄卯期雲貴總督劉藻奏言大興大銅等厰􅨇硐日深修費更多經前督吳達善奏請於順寧府設爐八座每旬每卯加鑄半卯支放兵餉所獲息錢歸併大興大銅等厰為工本經費嗣慮兩厰支給官本歸款無期又請於大理局各爐內加卯鼓鑄獲息清款至寧台厰厯年辦獲銅斤止能供順寧局正鑄之用其加卯鼓鑄之銅難以辦供應將三十一年順寧局停止加卯鼓鑄其順寧局每年正加各卯原係撥還大興大銅等厰預支動工泄水之項厯年清還惟現在三十一年所動興工泄水原本八千兩本年正鑄局錢止得其半不敷抵補應於省城臨安等局酌量加卯籌辦餘息歸補户部議如所請從之又議定雲南開採礦厰地界併停各省預買加買借買銅斤及本省各局加鑄之例大學士雲貴總督楊應琚奏言滇省近年礦厰日開砂丁人等聚集每處不下數十萬人耗米過多搬運日衆以致各厰糧價日昻一日且有無業之徒藉言某山見有礦引可以採銅具呈試採呼朋引類羣向有米之家借食糧米名曰米分以米分之多寡定將來分礦之盈縮往往開採數年無益又復引而之他有米之家希圖加借前後併還終致礦歸烏有米復徒耗更或預向厰員借用銀米前後挪掩重利借還負纍殊深查滇銅關係鼓鑄不容闕乏已開各厰不便議停未開各厰正宜示以限制請將舊有之老厰子厰存留限於各厰四十里內開採四十里以外不得任意私開厰有定數則厰內砂丁可無虞日漸加增耗費米石至各厰所獲銅斤比年解運京局及本省鼓鑄外省採買所餘不過數十萬斤如儘各省加買勢至入不敷出似應及時籌劑請將各省乾隆二十九年以前奏定之額聽其按年買運如有請預買一運及加買至借買數十萬斤之處概不準行舊厰既有界限開採年久衰歇堪虞應留有餘以補不足滇省省城臨安東川各局正鑄之外已足敷搭放兵餉接濟民用其加鑄各項亦應酌量停止得旨允行皇朝文獻通考卷七十八
