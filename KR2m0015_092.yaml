body:
  text: 欽定四庫全書皇朝文獻通考卷九十二郊社考二郊順治十八年十一月丙子冬至聖祖仁皇帝大祀天於圜丘親詣行禮是年正月己未聖祖仁皇帝登極以即位遣官告祭昊天上帝尋以諸臣詳議祀典各祀如舊其禁中上帝壇及大享殿合祀太廟階下合祭皆請停罷從之是月首舉冬至之典親祭如儀康熙六年十一月丁未冬至大祀天於圜丘奉世祖章皇帝配享御史周季琬疏言世祖章皇帝以創業垂統之君文德武功光昭萬世應同太祖高皇帝太宗文皇帝配享郊壇乃合嚴父配天之義下禮臣議卜日行禮尋允所奏於丁未冬至大祀之日舉行其配享方澤即於丙辰日舉行正祭日聖祖仁皇帝親詣行禮恭奉神位奉安於上帝神位之左太祖高皇帝之次第二青幄內前期祭告一應禮儀俱與順治十四年同九年正月辛丑祈穀於上帝奉世祖章皇帝配享十二年八月定祭祀時辰及别殿齊戒之例禮部奉諭㫖議奏歷代祭祀壇廟時辰俱未畫一詳定請照太宗文皇帝時壇廟用黎明夕月壇用酉時又言歷代致齊俱於别殿今凡遇祭祀皇上應於别殿齊戒從之二十五年十二月定陪祀官員例向例大祀陪祀官員俱照加級四品以上人員衆多以致失儀不敬至是禮臣議請不照加級止論職掌有失儀者監察御史及禮部官指名題參其他中祀亦如此例行疏上從之二十九年正月辛丑祈穀於上帝御製祝文親詣行禮先是二十八年十二月諭內閣朕意於祭祈穀壇文欲更製焉祈穀壇或有一代祀之亦有不祀之者輔臣時輟其祀矣朕以為民祈穀之故肇舉祀事每嵗祭文皆因舊詞比年穀未大登民艱於食夫特為民生致祭祈穀宜悉陳其情愫更製新詞此事內閣九卿等官會同詳議奏聞至是親詣行禮御製祝文曰臣纘承鴻業撫育蒸黎惟貴粟重農先務是亟荷天之眷歷紀順成率土元元久沾樂利頃者嵗行在已旱暵為憂畿甸之間阻饑尤甚臣覩災饉閔此窮簷宵旰省惟中情惶惕殫心賑救罔敢暇寧顧時閲三冬同雲鮮應側席減膳倍篤焦勞兹者候届上辛田功肇始伏念天心仁愛必軫民力艱難苟非錫以豐穰何由共登康乂敢因祈嵗展竭悃誠冀昭事之精䖍荷穹蒼之鑒格謹率臣僚以玉帛牲醴粢盛庶品恭祀上帝仰祈右兹將享時若雨暘用觀百穀之登溥洽三農之慶尚饗御製祈穀壇頌有序嘗觀古之明王必嚴於敬天隆於尊祖誠於養人惟其敬天故饗帝尊祖故崇配養人故重農而上辛祈穀厥義備焉蓋隂陽順風雨調災沴不生五穀咸熟斯比户可封然後寬刑簡賦導以禮樂躋之仁壽茍隂陽失序風雨不時則五穀傷矣五榖傷而民饑至矣修粢盛而奏馨聞將何藉焉豫肅將禋祀每遇薦享大典備極誠敬期於孚格蒼穹為羣黎禔福幸海內穡事浹嵗順成即間遘微祲而補助旋施有秋洊至豈非上天粒我蒸民而默佑豫一人以無疆之休哉仰戴帝慈莫可名喻聊攄感忱作為頌曰皇矣上帝仁覆萬國靡物弗懷鑒於有德古聖聿修昭事建極元日殷薦爰祈粒食藐躬受命精意以禋泰圻體方郊丘象圜屋而大享典禮均䖍外至必主本祖本天巍巍三聖陟降攸格盡志對越百神其懌曰潔籩豆曰崇圭璧匪祝一身為民請澤惟天監觀愛我兆人宜夏而夏宜春而春和風應節甘雨司辰災螟罔作瑞穗含醇豈止郊畿式暨五服畇畇疆理何土不淑薿薿黍稷何産不熟造化靳施伊誰能育啓蟄而耕納稼而場于耜于趾我倉我箱詎曰農夫實豫之慶上下交裕藉此豐穰民則不知豫敢忘賜湛恩汪濊頌思奚匱歲歲吉蠲竭誠肆類庶其眷之永錫樂利四十四年正月辛丑祈穀於上帝親詣行禮御製唯天為大頌并序康熙乙酉正月六日初辛有事於南郊是夜瑞雪清塵光風拂面瞻拜之際不覺䖍密精誠筋力彊健所以不揣無文敬賦唯天為大頌一篇聊記其事云爾唯天溥澤唯大涵𢎞無微不照億兆攸同至誠感神豈曰高崇玉帛鐘鼓禮云表衷為民請命祈穀神功潜施默化密運罔窮惟豫小子潔䖍齊戒對越昊蒼匪敢少懈食乃民命時若是快念兹邦本無逺弗届履薄臨氷敬勤作誡宵旰縈縈夙夜何解東風拂淑庚日布雲玉花遍野萬姓欣欣占年自慶望澤先殷愆多德寡恐塞上聞一日二日萬幾紛紜休戚相關乃寐夜分猗猗娭娭須臻風化熙熙皥皥所賴春夏惟德動天編氓趨下燠寒以時蕃廡禾稼三季苦辛至冬少暇穀黍登場子女敬迓紫壇紺席殷薦成田欽若昭事四十四年求端可畏鑑之在天慎終如始寸隂斡旋作民父母正直無偏前後念兹庶幾保全四十六年十一月丁丑冬至大祀天於圜丘羣臣請遣官恭代弗許諭內大臣大學士九卿等郊祀大典諸臣以天時嚴寒請朕勿親詣行禮朕身體彊健步履安和毫不知倦若果稍有患苦即遣皇太子或大臣代行典禮何不可之有今身既無恙可欺妄乎况年齒漸增正欲乘未老之時躬親行禮耳四十八年正月辛巳祈榖於上帝遣官行禮御製祝文曰臣仰承眷命撫育萬方念切民生亟圖康乂兩年以來江浙地方遭罹水旱民失生業去嵗山東河南亦因被旱田禾歉收又去冬至今乾暵無雪臣雖抱病心切靡寧遡自順治二年以迄今日垂七十載承平日久生齒既繁野無曠土縱當大穫之嵗猶慮民食不充倘或一遇旱潦則臣雖竭力殫思蠲租散賑而窮鄉僻壤豈能保無轉於溝壑之人在臣憂國憂民之念即始終不渝而雨澤應期實惟上天仁愛愚氓是賴兹者時届上辛春耕將舉臣理應躬詣齊次祗修祀事但今幸荷天佑疾漸痊愈而肅將大禮尚未克勝身雖未能致齊而為萬民懇切禱祈之誠敢用攄布仰籲洪庥特命臣僚潔蠲敬戒䖍備玉帛牲醴粢盛庶品恭祀上帝伏冀昭鑒俾雨暘時若百穀用成三農𢎞濟尚饗五十年十一月戊戌冬至大祀天於圜丘親詣行禮初臣僚以聖躬違和請遣官恭代報可尋奉諭㫖朕躬安好如常必親祭方展誠心朕今年已六十行禮時兩旁人少為扶掖亦可正祭日遂親詣行禮五十四年正月祈穀於上帝用立春後辛酉日祈穀例用上辛是年正月十日上辛尚未立春諭諸臣詳議之乃以正月三十日下辛行禮十一月己未冬至大祀天於圜丘用御定雅樂詳見樂考五十七年十一月乙亥朔冬至大祀天於圜丘遣官恭代仍照常齊戒定制大祀之前致齊三日是月諭大學士等曰十一月冬至祀天明日即應齊戒朕因足乏力來至湯泉身雖在此瞻望郊壇不能釋懷爾等傳諭太常寺令將齊戒銅人照常送至乾清門朕在此照常齊戒其祭祀人員齊戒務令恭敬五十六年十一月庚辰冬至大祀天於圜丘命親王恭代仍親往瞻拜行禮先是冬至將届諭大學士等敬天尊祖所關重大年來因多病足痛不能親往遣大臣恭代今冬至齊戒之時朕足雖不得力潔誠之念有餘擬於祭祀之前升壇瞻仰省視俎豆量力跪拜退處幄次俟恭代親王行禮畢然後回宫此係創行之禮如漢大臣以從無此典引據書史為言朕年已老在位六十年矣豈易得此例乎諸臣覆奏以聖體初愈天氣嚴寒請停親祭又奉諭㫖朕必親往前者偶未親祭王以下公以上俱不齊戒此次著照常齊戒隨朕前往不必隨朕行禮朕行禮不必贊禮作樂俟拜畢至更衣幄次派出親王偕衆行禮禮畢朕乃回宫將朕親詣之處著祝文內正祭前一日御太和殿視祝版香帛如儀正祭日升壇先拜拜畢命皇子和碩諴親王允祉行禮六十一年十一月丙申冬至大祀天於圜丘是月十五日冬至前期五日聖祖仁皇帝命世宗憲皇帝恭代行禮十三日聖祖疾大漸命世宗嗣皇帝位改遣大臣恭代行禮十四日祝版恭填世宗御名太常寺堂官由內閣恭捧安設十五日承祭官行禮時各官不陪祭雍正元年正月辛卯祈榖於上帝世宗憲皇帝親詣行禮前嵗之冬世宗憲皇帝登極以即位遣官告祭天地宗廟社稷逾嵗改元以壇廟祭祀典禮重大命派王二人散秩大臣御史各二員部員侍衛各四員稽查失儀及扈從人等任意行走著為例是月辛卯親行祈穀之禮十一月辛丑冬至大祀天於圜丘奉聖祖仁皇帝配享先是九月辛巳諭禮部自古祖功宗德制在不祧饗帝饗親理應並舉報本之情罔極配天之典宜隆我皇考聖祖仁皇帝允宜崇祀郊壇克配上帝以後冬至祈榖祭天祗奉聖祖仁皇帝同太祖高皇帝太宗文皇帝世祖章皇帝配享夏至祭地亦如南郊祈穀禮祗奉配享其詳議以聞至是冬至大祀世宗憲皇帝親詣行禮恭奉神位奉安於上帝神位之右太宗文皇帝之次第二青幄內前期祭告一應禮儀俱與康熙六年同二年正月辛巳祈穀於上帝奉聖祖仁皇帝配享七年正月詔嚴壇廟演禮之禁是嵗既行祈穀禮越日奉諭㫖壇廟之中最宜嚴肅聞祭祀之先即在其中演禮非潔齊䖍享之義其議之部臣議奏會典開載凡祭祀執事等官當在凝禧殿演禮嗣後宜仍遵行如有特加祭典先期於神樂觀演習從之八年正月祈穀於上帝以初二日上辛行禮停止朝賀筵宴上辛在初二日例用次辛前十二月奉諭㫖定例正月上辛日祈穀於上帝若上辛在初五日以前則於次辛行禮雍正三年五年俱以次辛祈穀仍舊章也但思元旦朝賀者朕躬之禮儀上辛祈穀者祀天之大典也明年正月初二日上辛禮部請於十二日中辛行祈穀禮朕思以正月而論則十二日為中辛若以立春後而論則為下辛矣因朝賀筵宴而展祈穀之期朕心深有未安著於初二日上辛行禮先期照例敬謹齊戒停止朝賀筵宴嗣後若逢元旦上辛則於次辛祈穀如在初五以前或值初七日世祖章皇帝忌辰著兩奏請㫖正月初二日辛未親詣行禮十三年正月祈穀於上帝以次辛行禮是嵗正月初十日上辛尚未立春前十二月奉諭㫖前太常寺奏請於雍正十三年正月初十日恭祭祈穀壇今順天府尹奏於雍正十三年正月十二日進春朕思祈穀乃新春典禮似不應在立春以前其定議以聞部臣請以次辛二十日行禮從之臣等謹按禮以義起義之所在即大中至正之禮也然惟能執中行權乃克各當其義我世宗憲皇帝於雍正八年正月初二日上辛祈穀部臣請改期不允是年以尚未立春特諭改用次辛蓋一則敬天之誠一則重時之義云太宗文皇帝在位十七年親郊二崇德元年四月乙酉元年十一月乙丑世祖章皇帝在位十八年親郊十五順冶元年十月乙邜元年十一月丁未三年十一月丁巳四年十一月癸亥五年十一月戊辰七年十一月戊寅九年十一月己丑十年十一月甲午十一年十一月己亥十三年十一月庚戌十四年正月辛亥十四年三月己酉十五年正月辛亥十七年正月辛酉十七年四月己酉聖祖仁皇帝在位六十一年親郊八十三順治十八年十一月丙子康熙元年十一月辛巳二年十一月乙酉三年十一月壬辰四年十一月丁酉五年十一月壬寅六年十一月丁未七年十一月癸丑八年十一月戊午九年正月辛丑九年十一月癸亥十年正月辛酉十年十一月戊辰十一年正月辛酉十一年十一月甲戌十二年正月辛巳十二年十一月己卯十三年正月辛未十三年十一月甲申十四年正月辛未十四年十一月己丑十五年正月辛卯十五年十一月乙未十六年正月辛卯十六年十一月庚子十七年正月辛巳十七年十一月乙巳十八年正月辛亥十八年十一月庚戌十九年正月辛丑十九年十一月丙辰二十年正月辛巳二十年十一月辛酉二十一年正月辛酉二十一年十一月丙寅二十二年十一月辛未二十三年正月辛卯二十四年正月辛巳二十四年十一月辛巳二十五年正月辛巳二十五年十一月丁亥二十六年正月辛卯二十六年十一月壬辰二十七年十一月戊戌二十八年十一月癸卯二十九年正月辛丑二十九年