body:
  text: 欽定四庫全書皇朝文獻通考卷五十七選舉考十一舉官乾隆二年奉諭㫖道府等官皆屬親民要職必才幹素著亷潔自持者方克勝任是以皇考當日曾令督撫兩司各行保舉今朕仿照此例著於各省道府官內令督撫藩臬各舉所知保舉一二員或二三員俱各密封具奏不得會同商酌如所保之人不當日後劣蹟敗露將從前保奏之上司一并懲治三年奉諭㫖國家宣猷敷政首重得人而以人事君公爾忘私者乃人臣之大義况身列九卿受恩深重彼徇情妄舉者固不足言而視為具文茍且塞責者亦大虧薦賢為國之道也昔我皇祖皇考延攬羣材常降九卿保舉之㫖其濫舉非人劣蹟敗露者每加嚴譴以示懲警朕臨御以來亦間有所咨訪冀收得人之益目今各省督撫皆出朕心斟酌簡用其藩臬二司陸續調來引見亦知其大槩至於道府等官乃方面大員職任緊要目前為州縣之表率將來即可遞進於兩司所當留意於平日以備擢用於臨時者著九卿將可為道府之人各舉所知秉公舉出一二人或二三人用露章啓奏不必密封大凡論人之道才品兼長固屬甚善但二者不可得兼若才勝於品雖一時塗飾可觀而心志不誠根本不固將來蕩檢踰間必至難於駕馭若品勝於才雖一時肆應不足而心術端方操守亷潔將來擴充歷練必能不愧循良九卿既受國恩又奉朕㫖特行詢問其所舉之員將來除因公詿誤情有可原者不將保舉官處分外若以劣款被參審實治罪定將保官照濫舉非人例處分不稍寬貸又奉諭㫖科道為朝廷耳目之司關係甚重向來俱係各部院堂官將合例司員揀選保送翰林院編修檢討亦在揀選保送之列由吏部帶領引見朕親加揀拔用為科道此定例也但思部院司員及翰林編檢人數甚多各堂官保送皆就伊等所見舉出統計一衙門官員不過十之二三其餘衆員朕未經遍覽此中或有可任科道而不在保送之列者亦未可定朕意欲將例應考選翰林院部屬等官一槩通行引見司員每日在本衙門辦事其才品之長短賢否該堂官皆所熟悉著逐名出具考語有由州縣行取補用者亦著注明即著該堂官帶領引見至編檢官員職司文墨其辦事之能否未經試驗無庸出具考語著掌院學士帶領引見朕自有鑑别現在御史員缺應行考選且記名之人即可備將來考選之用至於考選人員著各衙門於圓明園該班奏事之日帶領引見翰林院編檢人多分作三班部院酌量人數分班每班以二三十人為率記名之後陸續交與吏部俟有御史缺出按其品及俸次開列引見候㫖補授補用將完之日吏部再將如何考選之處另行請㫖又奉諭㫖守令為親民之官最關緊要而邊疆之地民夷雜處撫綏化導職任尤重查雲貴諸苗向在王化之外為害於地方近來改土設流漸次安輯然瘡痍初起元氣未復必得循良之員恩信兼著調劑咸宜者令其心志帖服然後可以久安於無事近時督撫於苗疆重地多擇能賢以資彈壓殊不知矜才喜事之輩飾文貌以欺耳目圖聲譽以求升遷非有實心實政以為撫綏化導之本究於苗疆無所禆補夫苗夷雖極頑悍然亦具有人心非不可至誠感動者果得亷靜朴質之有司視同赤子勤加撫恤使之各長其妻孥安其田里俯仰優游一無擾纍諒無有不可以革面革心者嗣後遇有苗疆要缺應令該督撫慎選賢員以居其任三年之後察其漢夷相安羣情愛戴者保題升擢以示優奬其有恃才貪功者雖有才幹不得輕任以滋事端四年吏部奏請照例行取直隸等省知縣二十一員奉諭㫖朕恭閲皇祖實録內載康熙二十九年吏部以行取知縣事照例具奏欽奉諭㫖行取知縣以科道用者甚多科道職任關係緊要著九卿各將平昔所知學問優長品行可用者秉公舉奏尋據尚書都御史侍郎等於部屬知縣內舉出十二人時彭鵬邵嗣堯陸隴其趙蒼璧俱著以科道用此次考選至今稱為得人今屆行取之年各部屬州縣內如陸隴其彭鵬等治行卓越者諒不乏人著尚書都御史侍郎遵照康熙二十九年之例各將平日確知之員秉公保舉候朕簡用此外例應行取之處仍照常舉行五年奉諭㫖從來為治之道首在得人故書美闢門籲俊之風易著拔茅連茹之盛詩曰濟濟多士禮曰或以德進或以事舉或以言揚蓋自古郅隆之世君若臣所以加意於興賢育才者固如此其切也朕臨御以來時以得人為念不憚再三咨訪而所謂出衆之才足以慰側席之求者則未嘗槩見昔在皇祖時如湯斌陸隴其輩學術純正言行相符陳璸彭鵬輩操守清亷治行卓越此數人者允為一時之望至今稱之夫以天下之大人才之衆豈無有與此數人頡頏者旁招俊乂朕心惟殷舉爾所知廷臣是賴況大學士九卿等受國家股肱耳目之寄自當留意於平時盡以人事君之義其有真知灼見者秉公舉出以備朕採擇焉六年揀選八旗護軍前鋒分發補用凡八旗護軍前鋒人等除候本佐領下護軍校驍騎校等缺補用外向曾於此等人內揀選補用録旗守偹千總兹奉諭㫖著八旗護軍統領前鋒統領於護軍前鋒內每旗各揀選四名帶領引見內務府總管於內務府三旗護軍內每旗亦各揀選一名帶領引見分發步軍統領及兩處陵寢總兵官令其在千總上效力行走又奉諭㫖直隸山西沿邊地方緑旗員缺補用滿洲官員原議五年期滿調回京城於伊等應升旗缺補用但年滿回京所習營務盡皆廢棄嗣後此等人員內有賢能者於伊應升缺出聽該督撫提督保題補用其所遺員缺由京補授旗員前去則伊等俱各鼓勵奮勉而後人升路不致壅滯又奉諭㫖各省知縣保舉行取皆係居官素優者始膺此選若專以主事升用缺少人多未免遲滯嗣後此等人員各省督撫有以同知題補者亦准兼用七年奉諭㫖朝廷定有行取一途原欲州縣內升使知部務部屬外用使知民事且此等人拔置言路亦能通達事體有所獻納近來因行取人員升補無期令其在任候升於單月補用主事究之缺少人多得用部屬者甚屬寥寥自應酌量疏通其見在由行取在部之司官著該堂官秉公保舉候朕分别簡用至從前行取人員內大率拘謹守分之人多而明通幹濟之才少蓋由該督撫止照例將無參罰者咨送即有揀選保舉者亦不過以該省次等州縣塞責甚非國家立法之本意嗣後各省督撫當行取時務將有守有為聲名卓越者舉出其有因公參罰者亦准其入選以收得人之效又奉諭㫖近年以來外省保送年滿千總似覺過多伊等一時不能得缺未免轉致壅滯嗣後著各省督撫提督於保送時留心揀擇如果有才具優長及有軍功勞績者方可咨部引見毋得濫行保送八年敕大學士於編修檢討人員內有能勝知府之任者保舉引見又給事中陳大玠奏滿漢選用御史將各衙門合例人員咨取彚齊考試從之以時值溽暑難以考試敇吏部於立秋後請㫖又監察御史李清芳奏選用御史應令吏部將合例人員奏請考試引見不得專重保舉得㫖允行又奉諭㫖武舉內有隨幫效力年滿人員應以衛千總用者其選用之法按其從前揀選等第分班銓選一等人數無多選期尚速其二等者有數十人三等者多至二百餘人每年選用不過三四人甚為壅滯朕思衛千總與營千總雖屬有間但武職人員俱尚技勇亦當及其強壯之時而用之且此項武舉既係隨幫年滿非閒散武舉可比若遲至二三十年之久方得録用未免精力就衰難為國家宣力所當酌量疏通著該部詳悉妥議具奏尋議一等者人數無多補用亦速自應無庸置議請將另班移於二捐班之上改用二等隨幫人員所有二班均請借與三等隨幫人員補用其本班援例人員倘有赴部投供者則先儘本班人員補用如無赴部投供者仍以三等人員補用從之九年奉諭㫖向例官員告終養者俟養親事畢方得補用但旗人回京與漢人回籍不同或在旗或在部皆可補用以備驅策永泰到京著該處帶領引見請㫖嗣後旗員告終養者悉照此例行又准武職因病解任照文職之例回籍調理病痊之日令原籍督撫驗看送部上念此例未定之先亦有因病不能留於本省照例告休者其中或有年力壯盛屢次出兵著有勞績病痊之後坐致廢棄行文各省將從前因病告休之遊都守備等官回籍調養今已痊愈而年力尚壯曾經隨師顯著勞績領有部劄議叙者俱令原籍督撫驗看一體送部引見十二年奉諭㫖從來親民莫切於縣令而知府表率一郡職任尤重欲望其政平訟理易俗移風非久於其任不可漢宣帝詔曰太守吏民之本也敷改易則下不安民知其將久不可欺罔乃服從其教化誠至言也朕臨御以來念保安元元守令最要曾向直省督撫屢降諭㫖但未定有成例俾得遵循是以未見實效即如州縣中才具稍優者督撫或奏請調繁或題補升用知府則薦擢監司在督撫為官擇人練達之員試有成效駕輕就熟自較初任為可觀究之缺有繁簡職守則一繁地固需能員簡地獨無民人社稷之寄乎知府賢則屬縣各修其職監司體制雖隆而所職不過分巡轉核或專司鹽糧轉不若知府之責有專成與屬縣較為親切今以能勝繁劇之知府擢任監司反若置之閒地不得盡展才猷且此題升題調不過幹辦敏捷一時見長未必皆古所謂悃愊無華日計不足月計有餘循良之選也即果係循卓人地相宜而此地得一良吏即彼地失一良牧孰非赤子孰不當善為撫字而顧數數更易乎況能員既得優加升調則熱中躁進之員惟事逢迎上司要結取譽以祈速化又安望其留心實政盡父母斯民之道也但榮進之念人情不免若非定有成規示以奬勵則嵗月淹久必致自隳志氣而吏民無識亦謂其不為上司所物色或啓疲玩之習不足以鼓舞人才振起治術漢時守令治行優異輒以璽書勉勵增秩賜金寵以車服有爵至關內侯者兩漢循良冠越唐宋今或仿其意而行之守令實能為地方興起教化勸課農桑興利除弊發奸摘伏阜安閭里者定以年限或豫以紀録或加級或加銜食俸仍留原任在恬靜自守者既得從容展布以收績效即躁進之人亦知格於成例不致視一官為𫝊舍並可潛消奔競陋習於吏治人心不無禆益嗣後直省守令除特㫖擢用暨該地方情形不得不奏請調用者許其酌量聲明保奏外其如何酌定年限示以優叙俾可久於其任下大學士九卿議行尋議嗣後應題缺出必本任內歷俸五年以上方准揀選調補如此則守令自知歷俸有年方能題調不致粉飾目前希圖躁進而本任之事可以實心實力從容展布日積月纍官與民相習民與官相安矣然寬其嵗月固得收報最於循良而罔示旌揚又無以樹風聲於有位洵如聖諭賢能守令宜加優叙以示鼓勵并請嗣後知府直𨽻州知州府屬知州知縣應令該督撫每於年底細加訪察將曾經升調各員在任又滿三年才守兼優政績卓著保題到部知府加副使道銜直𨽻州加州加知府銜知州加同知銜知縣加通判銜注冊遇有應升缺出准其即行題升十三年奉諭㫖現在應升三品之京堂滿漢人員可膺升擢者甚少應廣為儲備以資簡任著滿漢大學士尚書侍郎秉公據實各就平日所知指名保舉具摺奏聞吏部彚齊帶領引見候朕簡用如無真知確見之人不必勉強塞責十四年奉諭㫖各部侍郎職二六卿必須預選勝任之員以備臨時簡用從前曾降㫖令大學士尚書各舉所知密行保奏朕思登明選公何以密為著滿漢大學士尚書再將能勝侍郎及三品京堂人員侍郎等將能勝三品京堂人員均各舉一二人不必過拘資格務須克知灼見毋濫毋隱又奉諭㫖從前降㫖令各省督撫提督於所屬副將內保舉堪勝總兵之員經各督撫等陸續保奏朕調來引見人皆平常並無傑出之才朕於其中簡擢數員亦祗將就録用總兵為將領之統率必須才具出衆乃能勝任今遇有缺出一時難得其人著該督撫提督等再於所屬副將內擇其實在堪勝總兵者各保二三人倘副將內乏人即於參將內揀擇亦可該督等不得以中平之人濫膺兹選亦不得因朕有此㫖遂委之無人以圖規避務須實心遴擇據實保舉具摺奏聞送部引見俟朕酌量簡用又奉諭㫖朕御極之初曾令查辦廢員許於都察院具呈核明情由彚奏帶領引見至乾隆元年一年之間已及三千餘人經大學士徐本奏請停止朕思廢員內不無才堪驅䇿之人十餘年來未經查辦應將因公罣誤內外滿漢人員照例降革未經引見者吏兵二部查明情節奏聞請㫖朕另派王大臣察核驗看分别帶領引見其降調人員未經得缺守候年久不得及時效力者亦著一體查辦尋經吏部奏明文官布按以上并京官京堂翰詹科道兵部武職副參以上及八旗武職大員俱不在查辦之內旋奉特㫖一體查辦十五年奉諭㫖朕前令督撫提臣保舉堪勝總兵人員冀得良材以備名將之用今於引見時觀其人材弓馬勇力頗少當意大都不過因其資俸可到遂以充數幸而擢用則可邀其感激以搪塞應故事耳總兵統率一鎮豈容輕授如目今所舉不特不能十得七八并不及五六豈朕所望耶督撫身任封疆辦理一切政務無論大小必當以實心從事即如年滿千總一項類多猥瑣不足入目蓋充伍之初以及揀拔外委該營辨未能一一秉公雖經督撫考驗率以其微末也而忽之且或以其年久姑容遂不加駮正獨不思今之年滿千總非即異日之將辨乎國家擢用武職營伍實為正途拔補將辨不選之若輩更何從挑選乎由千總而守備而都司遊擊緣次而升膺干城腹心之重寄要皆自年滿千總始則欲以儲養人材慎重將辨亦當於送部引見時早為留心折衝禦侮之用必預籌於升平無事之日不可視為緩圖漠不經意也十六年奉諭㫖向來分發各省人員由吏部堂官揀選引見雖該部職掌所在然未足以示慎重嗣後除特㫖交部於次日即行引見者仍由該堂官揀選外其餘凡有揀選之處該部將滿漢大學士九卿并該部堂官一同開列候㫖特派大臣揀選交該部帶領引見著為例又奉諭㫖向例直省知縣三年行取一次吏部按期奏請康熙雍正年間少舉多停當朕臨御之初臣工中有援引成規入告者朕以舊制可循敕部議覆旋經准行由今觀之此特相仍故套而於吏治人材毫無禆益所當永行停止蓋此制始於前明其時專重資格按俸轉遷不得不以部用一途疏通壅滯而亦銓部漁利之一途也今則直省州縣定缺升調其途甚廣凡有才能傑出之員督撫無不保題擢用常有要缺懸待一時不得合例之人而越格奏請者在此時之州縣實無壅滯之嘆督撫於地方能員亦無不欲其駕輕就熟收臂指之功遇有隔省升調往往為之懇切奏留未肯令其遽離原任且繁劇之任參罰必多凡所謂無事故合行取之例者大率庸流居中簡之缺尋常供職幸免處分者耳即以銓補部曹多屬迂疏潦倒了無出色在該部又無得力之處況縣令身膺民社百里之寄任既非輕才亦可展使其果屬賢員方議令久任以責成效而部曹分局一司遇事簡之缺無所表見長才處此轉覺用違其材若謂司員當由邑令升用深知民生利弊於部務有益此又不然部務責成自有尚書侍郎夫尚書侍郎亦惟視其才識勝任否耳何必曾任邑令方知民生利病豈非所謂學養子而後嫁者耶若必待行取之人敡歷多年方授以總理部務之任此尤事勢所難行試觀我朝九卿無論滿員即漢大臣中多由翰苑升用起家縣令者幾何人外而督撫起家縣令者又幾何人可指數而知其為拘墟之論矣此實向來沿襲具文揆之當今之務亟須改絃無庸守轍所有直省知縣三年行取一次之處著永行停止至科道近列臺垣優絀尤為易見自可不時擢用而定例內升外轉給事中則一年一次御史則一年兩次每逢奏請時自康熙雍正年間以至今日亦率降㫖停止者多每年徒增此題奏繁文於治理亦復無益嗣後內升外轉著三年舉行一次著為例十七年奉諭㫖從前保舉副都統人員陸續補用今將次用完著照前保奏此次保舉不得仍前自行題奏如領侍衛內大臣處則於該旗侍衛內公同保舉都統副都統則於該旗參領內㑹同保舉左右翼及護軍統領處則按翼在於前鋒章京護軍參領內公同保舉圓明園健鋭營章京則令該大臣保舉如本旗不得其人於别營别旗內有深知真切者亦可保奏其保舉人員於奏聞後該部彚齊帶領引見臣等謹按八旗滿洲蒙古揀選補放侍衛成例凡領侍衛內大臣缺出將內大臣散秩大臣八旗滿洲䝉古都統前鋒統領護軍統領外省將軍職名開列具奏補放內大臣缺出將散秩大臣職名開列具奏補放散秩大臣係奉特㫖補放至侍衛班領委署侍衛班領侍衛什長缺出俱於侍衛內揀選補放頭等侍衛缺出於二等侍衛內揀選補放二等侍衛缺出於三等侍衛內揀選補放三等侍衛缺出於四等侍衛藍翎侍衛上三旗閒散官員閒散覺羅大臣子弟護軍校驍騎校等揀選補放四等侍衛於藍翎侍衛內揀選補放仍入於藍翎侍衛額數藍翎侍衛缺出於領侍衛內大臣衙門筆帖式執事人前鋒親軍護軍等揀選補放宗室侍衛缺出行文宗人府於所送宗室內揀選補放我朝滿洲䝉古大臣多由簡選侍衛薦躋巍班若宗室子弟若勳舊故家以及閒散人員中英傑蔚興賢材輩出其入侍宿衛特膺簡畀外而任封疆內而資輔弼者後先相望謹詳識其選補次第如此又奉諭㫖吏部以此次各部院保送道府滿洲郎中僅止三員輪用滿班不敷銓用請以滿郎中升用道員滿員外升用知府一摺固屬因時通變之道然國家用人內外一體在外則地方為重在內則曹務攸司何必亟資外補始足展其才力近年滿員送保外任者多以致各部院諳練出色之司員漸少其見任同知通判知縣內俸滿而未得升用者則不乏其人當酌為疏通嗣後除特㫖除授外滿洲司員保送道府之例著暫行停止俟數年後朕酌量滿司員應外用之處照所議行十八年奉諭㫖前經降㫖令各省督撫將同知直𨽻州知州能勝知府之任者秉公保薦奏聞引見據該督撫前後奏到摺內往往有保舉一人塞責者此特慮將來罹濫舉之咎自為地耳如薦賢為國之義何或因前㫖有在任三年一語難得合例人員今不妨稍寬其途從前皇考時遇才猷傑出之員竟有由知縣逾格升用知府者其令各督撫再通行保舉一次如同知直𨽻州內果有可勝知府者不妨不拘年限設又不得其人即於所屬知州知縣內擇其才猷出衆能勝知府之任者據實秉公保舉送部引見以廣儲用又奉諭㫖從前將八旗滿洲人員選用外省文武等官其蒙古旗人分用部院者員缺本少是以外任未經議及朕思滿洲䝉古均屬本朝世僕伊等於外任分缺銓選之處亦宜量豫疏通見在滿洲司員升用道府既經暫行停止其文職同知以下著將䝉古人員與滿洲一體揀選引見選用武職副將以下著就滿洲應得缺內酌豫十分之二其分班輪選之處下吏部議行又奉諭㫖武職兼銜乃沿明代舊制其中升銜升任條例紛繁即以叙録軍功不可不留此勳階以為奬賞之地然與見任職事何與焉徒使胥吏得以高下其手且外省參遊遇升銜調任畏其遷移繁費至有營求督撫保奏留任者是升銜本以鼓勵戎行而日久轉為苦纍亦何用此虛文為也嗣後武職中之大銜小銜應作何刪除更定著該部詳議其軍功給劄及漕運河工議叙之處一并酌定具奏尋議參遊都守各缺悉按等級以次推升必須多寡相稱庶不至於壅滯查各省參將共一百六十三缺遊擊共四百五十缺都司共三百四十八缺守備共八百一十八缺向例加署都司銜以上之守備即升遊擊是遊擊都司雖分階級在守備上尚兩途升用今加銜既議刪除守備止應升補都司未免遲滯無如於遊擊守備內酌改都司八十缺則守備之缺倍於都司都司之缺多於遊擊約計一二人守候一缺升途寬展於營員實為有益至內河水師人員止於水師人員內自行較俸升轉不必加銜其外海水師及河營官員嗣後仍應聽各督提酌量題補無庸與陸路較俸其軍功議叙人員無庸給與虛銜所有軍功加等次入於劄內遇應升時仍以一年作年半較俸其有功加守備應儘其先行升補以示勳階優異之意至運糧衛辨定例逺省計運加銜近省計運紀録今請將加銜改為加級准其隨帶餘如舊例至營衛各官照缺食俸一切劄付自應按缺頒給其千把兵丁得有軍功亦止開明功加等次給與劄付應行令各督撫提鎮將原頒兼銜各劄􅌳部查銷另行换給以昭畫一從之十九年奉諭㫖各省保舉堪勝知府記名人員陸續簡放見在所餘無幾而道員缺出亦須請㫖補放著於滿漢翰林科道部屬內令各該堂官將堪勝道府之員秉公保舉交與吏部帶領引見以備簡用又大學士傅恆等奏國子監八旗期滿教習保列一等以知縣用仍留教習之員遇有揀發之處請與二等在部候選之員一體報名挑選得㫖允行二十一年吏部議覆山東巡撫白鍾山所奏曲阜縣知縣改為題缺一本得㫖闕里為育聖之鄉自唐宋以來率以聖裔領縣事夫大宗主鬯既以爵列上公而知縣一官專以民事為職奉法令則以裁制傷恩厚族黨則以偏私廢事甚至因緣為奸簠簋不飭者有之且亦非古人易地而官之道我國家尊崇先聖逺邁前朝延恩後葉有加無已豈於此而有靳焉但與其循舊制而致瘝官有乖政體何如變通宜民俾吏舉其職民安其治於邑中黎庶孔氏族人均有裨益著照該部所議行其見任世職知縣既已謝事若歸部改銓不過恩及其身而止於朕心猶有未慊著加恩授為世襲六品官仍令揀選充補用副重道崇儒至意二十二年奉諭㫖總兵一官有表率營伍彈壓地方之責每遇缺出甚難其人前經降㫖令各省督提將堪勝總兵之副將各保數員以備簡用年來漸次升擢所餘無幾再著各省總督提督於見任副將內歷俸五年以上勝任總兵之員各保一人或二人亦可其參遊都守等官如果才略出衆足膺專閫之寄不拘資格並各保舉一人一體送部引見以儲將材二十四年奉諭㫖見在西陲大功告成所有軍站各員已令該督撫等查明咨部議叙至此次遞送紅旗之千把外委各辨自軍興以來均屬按刻飛馳勤勉無誤應量為優擢以示鼓勵著直𨽻山西陜甘各該督撫照各本省道里逺近於沿途各辨中分别選擇內有行走奮勇人材可觀者以五人中拔取一人為率出具考語送部引見候朕酌量録用二十五年奉諭㫖吏部引見揀發人員內捐班入選者居多雖為伊等年力壯盛堪供差委起見但専以此為去取則其餘科目挨班需次人員因此轉難與選人材不無淹滯嗣後遇各省請發人員時所有應挑各班內如服闋赴補人員原係曾膺民社者自宜先儘揀用至各項班次亦應隨才酌選每班各挑數人以備簡擇庶各員不致向隅而掄選益昭詳慎又奉諭㫖前令各省保舉堪勝知府曾經保送記名而未經擢用者雖在引見時其人未必遽見出色但念人之才具不齊或非可一覽而盡在該督撫等試看有年自必知之甚悉此內如有真知灼見信其可勝知府之任者不妨聲明仍列薦剡以副奬拔人材之意二十六年奉諭㫖西陲新疆初闢屯務方興現駐辨兵服勤率作殊可嘉尚況於政務尤所熟諳遇本處缺出即以補授在該員自必益加奮勉而公事亦屬有裨嗣後遇缺需人應令管理屯務大臣即於所轄人員內揀選升用不必移咨該督另行揀補三十年奉諭㫖舉人選用知縣需次動至三十餘年其壯嵗獲售者既不得及鋒而用而晚遇者年力益復就衰每為軫惜朕常中夜思維籌所以疏通壅滯之法因查每科中額一千二百九十名統十年而計加以恩科則多至五千餘人而十年中所銓選者不及五百人除各科會試中式外其曾經揀選候選者尚餘數千經久愈多隨成壅積而直省知縣員缺本祗有此數即使一時槩行銓用亦屬缺少人多不能使人人皆紆墨綬此固必然之勢也而不知者或歸咎於捐班之占缺因復核計捐班所選每嵗亦不過三四十人縱令盡豫舉班仍屬無幾見在捐例已停自可無虞占缺即或將來再議開捐其知縣一條不必載入捐款至向來吏部截取舉人例由各省督撫咨送往往意存姑息不加甄别及至部選得缺經九卿驗看始以衰庸改補教職是督撫徒欲博寬厚之名使此等衰邁之人僕僕道途終歸無益所謂愛之實適害之也嗣後各省督撫於舉人截取領文時留心驗看如果實在精力就衰難膺民社者或該員情願就教即於本省呈改以省跋涉之勞其有自揣耄齡不願就銓者並令彚冊咨部請㫖酌給職銜以慰其寒窗績學之志明嵗丙戌春闈各省舉人雲集當於會榜後特派大臣分别揀選引見量其年力才具及時録用其有科分已深非因丁憂事故自分年老材庸不願赴京會試者亦聽其自便其作何給豫職銜如何挑選録用及選班中更有如何可以疏通之處著大學士九卿㑹同詳議以聞副朕體恤寒畯及時登進羣才至意尋議嗣後截取舉人令各督撫秉公據實驗看其堪膺民社者給咨赴部候選如果精力已衰情願就教者准其在本省呈改教職至年在七十以上衰邁尤甚自問不堪供職者免其調取驗看督撫核實查明開列姓名年嵗造冊具題恭候恩㫖賞給職銜此等舉人已經揀選原係候選知縣應請從優將小京官品級相當之中書科中書大理寺評事太常寺博士三項職銜由吏部分别掣定奏明請㫖給豫伊等以京銜榮身至庚辰科以上准其挑選惟見任教職無庸赴挑請按照前次大省四十員中省三十員小省二十員之數大省再加二十員共六十員中省再加十五員共四十五員小省再加十員共三十員𢃄領引見分别以知縣教職録用其中分發以知縣試用者約計亦不過十之五六在各省可以陸續請署請補不致壅滯久候以教職用者數年內亦均可得官所有未經挑選之員其有年在七十以上精力已衰難以入選者伊等科分既深轉不能一體沾恩亦屬可憫此內如有情願得受京銜者應請一併交與派出大臣令自行呈明查其實在年嵗開列清單請㫖交部分别掣定給與中書科中書等項職銜查舉人應選班次有知縣直𨽻州州同鹽庫等大使三項銓例內知縣雙月用五甲五舉四捐三升單月用四補四捐四甲四舉共計雙單月各班內舉人應得九缺捐班無人原以舉人抵補今既奉㫖將來再議開捐其知縣一條不必載入捐款除已捐人員按班用完之後將捐班全用舉人是知縣既無捐班其舉人抵捐名色應即改為舉抵班仍不積舉人之缺統計雙單月內即可多用八員又直𨽻州州同鹽庫等大使遇有缺出即酌量以舉人間補從之三十一年奉諭㫖向來各省知縣內有拿獲盜犯等案送部引見者朕加恩令回原任以本省同知知州升補其無回任字樣者係一時降㫖所未及並無分别於其間而該部即泥成例祗令在部候選將原缺另行銓補不知此項人員原因其居官能事是以調取擢用俾得及時自效若如該部所辦是徒有空銜而需次久淹非所以示鼓勵嗣後此等知縣引見時以同知直𨽻州知州用者俱著回原任遇有本省缺出補用其從前在部候選之員均著發往原省以應得之缺即行題補至知縣十年俸滿引見以同知等官升用者一體辦理又奉諭㫖昨因舉人壅滯特行揀選酌用此內有會試已經中式而於新進士引見時歸班者其曾選入一等人員著照新進士分發之例發往各省以知縣用二等人員著先以教職用仍按進士原班銓選又考選國子監學正學録之制國子監學正學録先於乾隆二十六年准御史范棫士奏於會試薦卷中量取録用至是學正學録缺出無合例應用之員侍郎兼理國子監事陸宗楷以聞部議仍派大臣考選引見録用從之三十三年奉諭㫖向來外省請簡文職各員俱特派大臣揀發而武職則止交兵部揀選引見嗣後遇有請發參將以上人員著兵部臨時奏派大員會同該部揀發帶領引見發往著為令皇朝文獻通考卷五十七
