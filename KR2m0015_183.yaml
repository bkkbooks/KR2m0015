  text: 兵考五直省兵直𨽻八旗駐防良鄉縣防守尉一人屬在京稽察大臣管轄防禦二人驍騎校一人正紅旗滿洲蒙古領催五名驍騎十五名寶坻縣防守尉一人屬在京稽察大臣管轄防禦二人驍騎校一人鑲白旗滿洲䝉古領催五名驍騎十五名固安縣防守尉一人屬在京稽察大臣管轄防禦二人驍騎校一人鑲紅旗滿洲蒙古領催五名驍騎十五名東安縣防守尉一人屬在京稽察大臣管轄防禦二人驍騎校一人鑲藍旗滿洲䝉古領催五名驍騎十五名霸州防守尉一人屬在京稽察大臣管轄防禦二人驍騎校一人正黃正紅二旗滿洲䝉古領催五名驍騎十名采育里防守尉一人屬在京稽察大臣管轄防禦二人驍騎校一人正藍旗滿洲蒙古領催五名驍騎四十五名保定府城守尉一人屬在京稽察大臣管轄防禦四人驍騎校四人筆帖式一人正紅鑲紅二旗滿洲䝉古驍騎校八人領催三十二名驍騎四百六十名養育兵十一名弓匠鐵匠四名雄縣防守尉一人屬在京稽察大臣管轄防禦二人驍騎校一人鑲紅鑲藍二旗滿洲䝉古領催五名驍騎四十五名滄州城守尉一人屬在京稽察大臣管轄防禦四人驍騎校四人筆帖式一人正白鑲白滿洲蒙古副驍騎校八人領催二十三名驍騎四百八十名養育兵十一名弓匠鐵匠四名山海關副都統一人駐劄山海關統轄協領二人佐領八人防禦八人驍騎校八人筆帖式三人八旗滿洲䝉古領催四十名前鋒四十名驍騎六百二十名兼轄駐防七永平府防守尉一人屬山海關副都統防禦二人驍騎校二人筆帖式一人鑲白正藍二旗滿洲䝉古領催十名驍騎九十名玉田縣防守尉一人屬山海關副都統防禦二人驍騎校二人筆帖式一人鑲黃正白二旗滿洲蒙古領催十名驍騎九十名三河縣防守尉一人屬山海關副都統防禦二人驍騎校一人筆帖式一人正白旗滿洲䝉古領催十名驍騎九十五名順義縣防守尉一人屬山海關副都統防禦二人驍騎校二人筆帖式一人鑲黃旗滿洲䝉古領催五名驍騎十五名喜峰口防守尉一人屬山海關副都統防禦二人驍騎校四人筆帖式二人八旗滿洲蒙古領催十六名驍騎一百八十四名羅文峪防禦一人屬喜峯口防守尉統於山海關副都統驍騎校二人筆帖式二人八旗滿洲䝉古領催八名驍騎九十二名冷口防守尉一人屬山海關副都統防禦二人驍騎校三人筆帖式二人八旗滿洲䝉古領催十二名驍騎一百五十八名察哈爾都統一人駐劄張家口副都統一人統轄游牧察哈爾八旗總管八人參領八人副參領八人佐領一百九人理事員外郎十六人親軍校四人護軍校一百七人驍騎校一百五人每佐領下設親軍二名前鋒二名護軍二十五名領催六名驍騎三十五名共兵八千一百五十二名兼轄駐防四臣等謹按察哈爾為元小王子後裔自天聰八年太宗文皇帝親征察哈爾林丹汗走死其子孔果爾額哲率餘衆來降封為親王即其部編旗駐義州傳至布爾尼兄弟于康熙十四年謀叛復討平之移其衆分處宣化大同邊城外後從征準噶爾有功增給其軍餉復以降順及俘獲之厄魯特部人編為佐領附入正白旗下其八旗分左右二翼東四旗曰鑲黃旗又東為正白旗又東為鑲白旗最東為正藍旗西四旗曰正黃旗又西為正紅旗又西為鑲紅旗最西為鑲藍旗凡鑲黃旗駐蘇門峯正黃旗駐木孫忒克山正紅旗駐古爾班托羅海山鑲紅旗駐布林泉並在張家口外正白旗駐布爾噶台鑲白旗駐布雅阿海蘇默正藍旗駐扎哈蘇台泊並在獨石口外鑲藍旗駐阿巴漢喇喀山在殺虎口外其部衆習于游牧與扎薩克䝉古同俗其旗務則掌之都統制與內八旗相等都統所駐之地在張家口故類敘于直𨽻駐防張家口協領三人屬察哈爾都統佐領六人佐領兼雲騎尉一人防禦十人驍騎校十人雲騎尉一人筆帖式二人八旗滿洲蒙古領催四十名前鋒四十名驍騎六百名步軍一百六十名養育兵一百六十名箭匠鐵匠二十名獨石口防守尉一人屬察洽爾都統防禦二人驍騎校二人筆帖式二人八旗滿洲領催四名驍騎九十名千家店防禦二人屬獨石口防守尉統于察哈爾都統驍騎校一人滿洲領催四名驍騎三十六名昌平州防守尉一人屬察哈爾都統防禦二人驍騎校一人正黃旗滿洲䝉古領催五名驍騎四十五名熱河副都統一人駐劄熱河統轄協領四人佐領十四人防禦十四人驍騎校十四人筆帖式二人滿洲䝉古領催前鋒驍騎共一千三百四十名弓匠箭匠鐵匠四十二名兼轄駐防二喀喇河屯協領一人屬熱河副都統佐領四人防禦四人驍騎校四人滿洲領催驍騎共四百名弓匠箭匠鐵匠十二名樺榆溝協領一人屬熱河副都統佐領二人防禦二人驍騎校二人蒙古領催驍騎二百名弓匠箭匠鐵匠六名密雲副都統一人駐劄密雲縣境統轄協領四人佐領十六人防禦十六人驍騎校十六人八旗滿洲領催八十名前鋒一百二十名委前鋒一百名驍騎一千五百八十名養育兵一百二十名兼轄駐防一古北口防守尉一人屬密雲副都統防禦二人驍騎校四人筆帖式二人正黃鑲白正紅正藍四旗滿洲領催十二名驍騎共一百八十八名順治元年設獨石口防禦二人鑲黃正白鑲紅三旗滿洲兵十二名張家口防禦一人八旗滿洲兵八名二年設山海關防禦二人八旗滿洲䝉古兵四十六名喜峰口防禦二人正紅鑲紅二旗滿洲䝉古兵八名古北口防禦二人正黃鑲白正紅正藍四旗滿洲兵四名采育里防守尉二人防禦四人鑲白正藍二旗滿洲蒙古兵一百名固安縣防守尉一人防禦二人鑲紅旗滿洲䝉古兵五十名五年設滄州城守尉一人防禦驍騎校各四人正白鑲白二旗滿洲䝉古兵三百十一名弓匠鐵匠各二名大名府城守尉一人防禦六人驍騎校八人正