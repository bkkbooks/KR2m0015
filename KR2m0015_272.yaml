body:
  text: 輿地考四山東省臣等謹按自禹貢區州為九後世分省不能盡依古州之限或兼及他州邊境而止若乃跨越兖青徐三州而又錯出於豫州者惟山東為然古兖州之界曰濟河徐州之界曰海岱及淮而青州居兖徐之中大約兖以河為北界徐以淮為南界濟水自菏澤而下中絡其間以會汶而入海故兖徐與豫之交又必以濟分界自大河屢徙已南合於淮而溢滎之濟水支脈久湮三瀆之分流者俱經更易他如九河之既道大野之既瀦故迹沈淪迄無定處是禹迹之難詳在東省為尤甚鄭樵所謂山川千古不易者又未可概論矣夫山東以一隅而兼唐虞數州之地則其田野之闢與民生之聚固自古而然春秋齊魯之間稱為上國兩漢而下仍分置兖徐諸州而疆理各殊至唐時河從千乘入海故以此為河南河北道宋時建都於汴故以此為京東路至金改為山東路厥後遂有山東之名蓋其負山踞海當水陸孔道以環衛神京實為南北之鎖鑰至於巡方之典首重岱宗崇聖之儀獨隆闕里地鄰畿甸霑被光華此尤左輔之勝區非他省所得而同者矣山東明山東等處承宣布政使司治濟南府領濟南兖州東昌青州登州萊州六府又置山東都指揮使司領濟南等十六衛東平等五所本朝初因之設山東巡撫及布政使司按察使司皆駐濟南順治五年定山東與直𨽻河南共一總督十五年裁三省總督康熙四年復設三省總督仍駐直𨽻之大名府八年復裁雍正二年分濟南府之泰安武定濵三州兖州府之沂曹濟寧三州為直𨽻州四年設河東總督駐河南開封府兼轄二省八年以濟寧還屬兖州府又分兖州府之東平州東昌府之髙唐州濮州青州府之莒州為直𨽻州十二年升武定州沂州為府以濵州改屬武定府以莒州改屬沂州府仍以髙唐州還屬東昌府十三年升泰安州曹州為府以東平州改屬泰安府以濮州改屬曹州府又裁河東總督專以山東巡撫管理乾隆三十九年復升兖州府之濟寧州東昌府之臨清州並為直𨽻州凡領府十直𨽻州二各衛所以次裁併入州縣其存者俱專司漕運不治民事東西距一千六百四十里南北距八百十里東至海一千三百里西至直𨽻大名府元城縣界三百四十里南至江蘇徐州府沛縣界五百七十里北至直𨽻河間府寧津縣界三百四十里東南至江蘇海州界六百八十里西南至河南歸德府商邱縣界六百八十里東北至海四百二十里西北至直𨽻冀州南宫縣界三百十里在京師南八百里濟南府為省治東西距三百六十里南北距二百八十里東至青州府臨淄縣界二百五十里西至東昌府髙唐州界一百十里南至泰安府泰安縣界一百四十里北至武定府商河縣界一百四十里東南至青州府博山縣界二百三十里西南至東昌府荏平縣界一百三十里東北至武定府惠民縣界一百八十里西北至直𨽻河間府景州界三百里自府治至京師八百里明濟南府領州四縣二十六本朝初因之雍正二年升泰安武定濵三州為直𨽻州以長清新泰萊蕪三縣往屬泰安州以陽信海豐樂陵三縣往屬武定州以利津霑化蒲臺三縣往屬濵州雍正八年又分平原禹城臨邑陵四縣往屬直𨽻髙唐州十二年升武定州為府以濵州及所屬縣𨽻焉又分青城商河二縣往屬武定府十三年升泰安州為府復分肥城縣往屬改長清縣還屬濟南府其直𨽻髙唐州改屬東昌府以平原等四縣還屬濟南府凡領州一縣十五歷城縣附郭章邱縣在府東一百十里鄒平縣在府東一百六十五里淄川縣在府東少南二百二十里長山縣在府東一百九十里新城縣在府東北二百十六里齊東縣在府東北一百五十里濟陽縣在府東北七十里齊河縣在府西四十里德州在府西北二百六十里德平縣在府北二百五里平原縣在府西北一百八十里雍正八年分屬髙唐州十三年還屬濟南府禹城縣在府西北一百十里雍正八年分屬髙唐州十三年還濟南府臨邑縣在府北一百四十里雍正八年分屬髙唐州十三年還屬濟南府陵縣在府西北二百里雍正八年分屬髙唐州十三年還屬濟南府長清縣在府西南七十里雍正二年分屬泰安州十三年還屬濟南府泰安府在省治南一百八十里東西距四百三十里南北距一百七十里東至青州府博山縣界一百八十里西至兖州府陽榖縣界二百五十里南至兖州府寧陽縣界六十里北至濟南府長清縣界一百十里東南至沂州府蒙陰縣界二百十里西南至兖州府汶上縣界一百里東北至博山縣界一百九十里西北至東昌府荏平縣界一百八十里自府治至京師一千二百里明初以泰安州屬濟南府以州治奉符縣省入降東平路為州屬兖州府本朝初因之雍正二年升泰安州為直𨽻州以長清新泰萊蕪三縣屬之八年又升東平州為直𨽻州以東阿平陰陽榖壽張四縣屬之十三年升泰安州為府增置泰安縣以東平州及所領東阿平陰二縣𨽻焉其原領之陽榖壽張二縣仍還屬兖府又以濟南府之肥城縣來屬泰安府以長清縣還屬濟南凡領州一縣六泰安縣附郭元以前為奉符縣明省入州縣本朝治雍正十三年升州為府以州地置為府新泰縣在府東南一百五十里初屬濟南府雍正二年分屬泰安州十三年屬府萊蕪縣在府東一百二十里初屬濟南府雍正二年分屬泰安州十三年屬府肥城縣在府西七十里初屬濟南府雍正十三年分屬泰安府東平州在府西一百四十里初屬兖州府雍正八年升為直𨽻州十三年改屬泰安府東阿縣在府西北二百十里初屬兖州府雍正八年分屬東平州十三年改屬泰安府平陰縣在府西北一百九十里初屬兖州府雍正八年分屬東平州十三年改屬泰安府臣等謹按古青州西南據岱其與徐分界處説者以為當自齊之長城故址管子謂長城之陽魯也長城之陰齊也括