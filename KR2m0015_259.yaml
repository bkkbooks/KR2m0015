body:
  text: 象緯考四三垣二十八宿臣等謹按漢書仿史記天官書之體作天文志後代史家咸襲其名然三垣列宿獨分晰於晉隋宋三史而他史皆從略焉豈不以次舍有常無復詳求歟馬端臨通考肇上古迄宋嘉定而其詳三垣列宿也據丹元子步天歌鄭樵通志宋兩朝中興諸志蓋又以測驗之密後勝於前也我聖朝璣衡精審數理周詳康熙十三年監臣南懷仁撰恆星經緯度表以十二宫臚一千八百七十餘星皇上御極之九年命監臣戴進賢等據新測以證舊經名同步天歌者一千三百十九星增列一千六百十四星並近南極一百五十星積數三千有八十三星凡黃赤經緯去極入宿之度釐然可考視昔益密矣馬氏謂古今志天文者名義大略相同但能言其去極入宿度為異兹依馬氏之例紀去極入宿度並詳黃赤道十二宫俾稽天者通其條貫云紫微垣北極五星一曰太子二曰帝三曰庶子增星三四曰后宫五曰天樞黃道在鶉火鶉首宫赤道在大火壽星宫太子星去極十四度四十七分入柳宿十一度十一分帝星去極十七度二分入栁宿二度五十六分庶子星去極十八度三十五分入鬼宿二度三十六分后宫星去極十九度三十分入井宿二十七度二十五分天樞星去極二十二度五十七分入井宿十一度二十六分四輔四星增星一黃道在鶉首宫赤道在鶉尾鶉火宫距西星去極二十五度九分入井宿三度十七分勾陳六星增星十黃道在鶉首實沈宫赤道在星紀析木大火實沈降婁娵訾宫距大星去極二十三度五十六分入參宿三度五十三分天皇大帝一星黃道在實沈宫赤道在娵訾宫去極二十一度五十八分入畢宿十二度十六分天柱五星增星六黃道在實沈大梁宫赤道在元枵星紀宫距南星去極十八度二十六分入畢宿五度五十八分御女四星增星一黃道在鶉首實沈大梁宫赤道在星紀析木宫距西星去極九度二十分入胃宿八度八分女史一星增星一黃道在鶉首宫赤道在析木宫去極五度三十分入參宿八度五十九分柱史一星增星二黃道在實沈大梁宫赤道在星紀宫去極五度九分入畢宿二度四十八分尚書五星增星二黃道在壽星鶉尾鶉火宫赤道在析木宫距西北星去極三度九分入栁宿十六度一分天牀六星增星二黃道在鶉尾鶉火宫赤道在析木大火宫距西南星去極二十度四十八分入栁宿十五度二十一分大理二星增星一黃道在鶉火鶉首宫赤道在壽星鶉尾宫距西星去極二十五度四十八分入井宿二十四度十分隂德二星增星一黃道在鶉首宫赤道在鶉尾宫距西星去極三十一度四十九分入井宿二十一度十二分六甲六星增星一黃道赤道在鶉首實沈宫距中星去極三十三度四十二分入參宿九度五帝內座五星增星二黃道在實沈宫赤道在大梁降婁宫距中星去極三十二度十三分入畢宿七度十一分華蓋七星黃道在大梁宫赤道在降婁宫距東北星去極三十四度三十五分入昴宿二度二十二分杠九星增星一黃道在實沈大梁宫赤道在大梁降婁宫距東南星去極四十度二十六分入畢宿六度九分右垣墻七星一曰右樞二曰少尉增星二三曰上輔增星二四曰少輔增星一五曰上衛增星三六曰少衛增星一七曰上丞增星三黃道在鶉尾鶉火鶉首實沈宫赤道在壽星鶉尾鶉火鶉首實沈大梁宫右樞星去極二十三度三十九分入張宿一度三十九分少尉星去極二十八度十七分入栁宿五度五十三分上輔星去極三十二度四十七分入鬼宿四度三十四分少輔星去極三十八度四十六分入井宿二十一度四分上衛星去極四十四度入井宿一度五十二分少衛星去極四十六度四十分入畢宿十二度二十七分上丞星去極四十四度四十九分入昴宿八度二十七分左垣墻八星一曰左樞二曰上宰三曰少宰四曰上弼五曰少弼六曰上衛增星三七曰少衛增星八八曰少丞增星一黃道在壽星鶉尾大梁宫赤道在元枵星紀析木大火降婁娵訾宫左樞星去極十八度五十六分入翼宿十一度六分上宰星去極十五度三十四分入軫宿五度五十八分少宰星去極十一度三十三分入軫宿三度二十八分上弼星去極五度十三分入翼宿九度十二分少弼星去極六度四十八分入胃宿三度三十二分上衛星去極十四度四十一分入胃宿四度二分少衛星去極二十四度二十七分入胃宿六度三十九分少丞星去極三十度十九分入昴宿十分天乙一星黃道在鶉尾宫赤道在壽星宫去極二十四度三十八分入星宿七度三十三分太乙一星黃道在鶉火宫赤道在壽星宫去極二十五度四十七分入星宿一度五十三分內厨二星增星二黃道在鶉火宫赤道在壽星宫距西星去極二十八度五十六分入栁宿十二度三十三分北斗七星一曰天樞增星三二曰天璇增星八三曰天璣四曰天權增星三五曰玉衡六曰開陽增星二七曰搖光黃道在鶉尾鶉火宫赤道在壽星鶉尾鶉火宫天樞星去極四十度二十分入栁宿四度五十一分天璇星去極四十四度五十四分入栁宿九度五分天璣星去極四十二度五十三分入星宿三度五分天權星去極三十八度二十分入星宿三度四十三分玉衡星去極三十五度四十分入張宿三度九分開陽星去極三十三度三十七分入張宿九度五十四分搖光星去極三十五度三十五分入翼宿三度七分輔一星增星三黃道在鶉尾宫赤道在壽星宫去極三十二度十九分入張宿十一度二十三分天槍三星增星四黃道在壽星鶉尾宫赤道在太火壽星宫距西星去極三十一度五分入翼宿六度十分元戈一星增星二黃道在壽星宫赤道在大火宫去極三十五度二十一分入翼宿十三度十一分三公三星黃道在鶉尾宫赤道在壽星宫距東星去極三十九度八分入翼宿三度三十六分相