body:
  text: 封建考九異姓封爵五漢軍王義王孫可望漢軍正白旗人順治十四年十二月歸順封薨諡恪順孫徵淇孫可望子順治十七年十一月襲孫徵淳孫可望子順治十八年八月襲薨諡順愍後降襲詳公爵以上正白旗定南王孔有徳漢軍正紅旗人崇徳元年四月自山東登州航海歸順封恭順王順治六年五月以從征旅順朝鮮等軍功及山海闗擊流㓂平江南湖廣功改封九年十月鎮守廣西全家盡節諡武壯無嗣以上正紅旗臣等謹案漢軍封王爵者國初有靖南王耿仲明係正藍旗人襲至伊孫耿精忠以叛誅平南王尚可喜係鑲藍旗人襲至伊子尚之信以事削原封平西王吳三桂于康熙十二年叛亡其子亦伏誅或則身罹國法或則坐事削爵罪由自取均不應載惟義王孫可望之恭順定南王孔有徳之全節載在祀典足以承恩澤而光史册爰備列之以昭我國家善善惡惡之大義云以上王爵公原封一等公年遐齡漢軍鑲黄旗人雍正二年三月以子年羮堯軍功封原封一等公年羮堯漢軍鑲黄旗人雍正元年三月封三等公十月以平郭羅克賊畨功晉二等公二年三月以平青海功晉一等公三年七月坐事降二等公㝷降三等公八月降一等精竒尼哈畨㝷降一等阿思哈尼哈畨以罪死以上鑲黄旗續順公沈志祥漢軍正白旗人崇徳四年十月自石城島航海歸順封無嗣沈永忠沈志祥從兄子順治六年二月襲以罪削爵沈永興沈永忠從弟順治十二年六月襲沈瑞沈永忠子康熙九年四月襲二十年十一月以臺灣兵變全家盡節沈熊昭沈瑞從姪康熈二十四年十月襲沈之義沈熊昭子康熙五十九年七月襲沈鐸沈之義子雍正三年三月襲沈定文沈鐸子乾隆二十年十二月襲縁事革職沈廣文沈定文親弟乾隆三十三年十二月襲徳通沈廣文子乾隆三十九年十二月襲承恩公白文選漢軍正白旗人康熙元年十一月歸順封子降襲詳子爵慕義公孫徵灝漢軍正白旗人義王孫可望子康熙十一年七月降襲卒諡清端子降襲以上正白旗海澄公鄭成功漢軍正紅旗人順治十年五月自福建歸順封以叛削爵鄭克塽鄭成功子康熈二十二年十二月歸順仍封海澄公無襲以上正紅旗以上公爵侯一等侯馬得功漢軍鑲黄旗人順治十三年二月以平河南江南福建軍功封一等精竒尼哈畨十八年五月復叙軍功晉三等侯康熙四年陣亡贈一等侯諡㐮武乾隆十四年八月贈一等順勤侯世襲馬三竒馬得功子康熈四年襲一等侯以罪削爵馬爾瑛馬三竒弟子雍正三年五月襲馬國鍾馬爾瑛子雍正十年五月襲乾隆十四年八月襲一等順勤侯以罪削爵馬國銘馬國鍾從弟乾隆十五年七月襲馬官正馬國銘子乾隆四十年十二月襲善慶馬官正子乾隆四十九年十二月襲二等侯田雄漢軍鑲黄旗人順治二年平江南歸順封一等精竒尼哈畨十八年五月復叙擒獻福王功晉封卒諡毅勇乾隆十四年八月贈二等順義侯世襲田象坤田雄弟子康熙四年襲二十五年七月以平江西湖廣軍功晉一等侯田存徳田象坤子雍正十年閏五月襲田國恩田存徳子乾隆十二年五月襲十四年八月襲一等順義侯坐事削爵田國榮田國恩弟乾隆十八年十二月襲三等靖海侯施琅漢軍鑲黄旗人康熙七年三月以密陳靖海事宜封伯二十二年九月平臺灣晉封世襲卒諡㐮壮施世范施琅子康熙三十五年五月襲施廷皋施世范子乾隆二年十二月襲施純愷施廷皋子乾隆二十四年十二月襲施錪施純愷子乾隆四十一年十二月襲施秉仁施錪子乾隆四十七年十二月襲建義侯林興珠漢軍鑲黄旗人無襲以上鑲黄旗一等侯朱之璉漢軍正白旗人明太祖第十三子代簡王桂後雍正二年十二月特㫖加恩封一等侯奉嵗祀乾隆十四年八月贈一等延恩侯世襲朱震朱之璉子雍正九年四月襲朱紹美朱震子乾隆十一年二月襲十四年八月襲一等延恩侯縁事革職朱儀鳯朱紹美姪乾隆四十年十二月襲臣等謹按書紀虞賓詩歌殷恪繼周以後厥制罕聞粤稽史冊流傳所矜而誦者獨周子南君一詔耳顧蒼姬炎漢隔世無猜繄遥胄之紹封匪勝朝之永譽大抵鼎新革故鮮有不因改歩之嫌殄其宗嗣者即幸而銜璧餘生守珪没齒僅如元之於宋亦云厚矣然而小侯歸命曽不得延及苖裔以奉其園寢嵗時之祀是以南宋諸陵冬青剪伐而元弗問也惟我國家應天順人統壹海宇所以定明之亂而加厚於明者蓋珥筆已莫能備矣復遇我世宗憲皇帝肇稱曠典特沛隆施載訪明裔列於侯爵我皇上御極之十四年申錫延恩之號俾世世㴠濡闓澤綿厥蒸嘗近又大發帑金重葺明陵之就圯者異數茂昭至優極渥此誠史册之所未覯而詩書之所為揚厲無前者也竊循馬氏述事綴辭之例以志盛軌云以上正白旗同安侯鄭芝龍漢軍正紅旗人順治五年八月自福建歸順封一等精竒尼哈畨十年五月晉封無襲以上正紅旗三等侯墨爾根侍衛李國翰漢軍鑲藍旗人初襲詳男爵順治元年二月以克取前屯衛功晉三等昻邦章京三年四月以取太原府平流㓂功晉二等四年改為二等精竒尼哈畨五年六月以陜西四川軍功晉一等九年正月遇恩詔晉二等伯又以恩詔晉一等伯十年閏六月以四川山西軍功晉三等侯卒諡敏壯海爾圖李國翰子康熈元年二月襲李廷燮海爾圖孫康熙二十一年八月襲伊爾拜李廷燮弟康熙三十四年十二月襲以罪削爵後降襲詳伯爵以上鑲藍旗以上侯爵伯三等伯馬思文漢軍鑲黄旗人初襲詳子爵順治九年正月遇恩詔晉封馬世斌馬思文子康熈二十五年七月襲子降襲詳子爵二等昭信伯李侍堯本正藍旗漢軍乾隆四十年正月改入鑲黄旗縁事革職李奉堯李侍堯親弟乾隆四十五年十二月襲以上鑲黄旗承恩伯周全斌漢軍正黄旗人康熙三年四月率水師歸順封三等伯五月改封卒諡恪順周公仁周全斌子康熈十一年七月襲後降襲以上正黄旗三等伯石廷柱漢軍正白旗人積軍功封三等副將天聰八年五月以征察哈爾軍功晉三等縂兵官崇徳七年八月以克錦州功晉二等順治三年四月以山東山西等䖏軍功晉一等七年三月遇恩詔晉三等伯八年正月以克渾源左衛等城功晉二等伯九年正月遇恩詔晉一等伯十四年八月坐事降三等伯卒諡忠勇石文炳石廷柱子順治十八年八月襲富逹禮石文炳子康熙三十四年十一月襲坐事削爵後降襲詳子爵慕恩伯鄭纉緒漢軍正白旗人康熙二年八月自福建歸順封二等伯十二月改封鄭修典鄭纉緒子康熙六年六月襲後無襲忠誠伯馮希范漢軍正白旗人康熈二十二年自臺灣歸順封無襲以上正白旗三等伯線國安漢軍正紅旗人初封二等阿思哈尼哈畨順治十一年九月以軍功晉封無襲三等伯王之鼎漢軍正紅旗人二等精竒尼哈畨王世選子初封詳子爵康熙九年二月以駐守福建取厦門等處功晉封後征四川盡節諡忠毅乾隆十四年八月贈三等誠武伯王毓秀王之鼎子康熙二十二年四月襲王釴王毓秀子康熈三十四年六月襲乾隆十四年八月襲三等誠武伯子降襲詳子爵奉化伯鄭鴻逵漢軍正紅旗人順治十年五月自福建歸順封無襲以上正紅旗三等忠勤伯黄廷桂漢軍鑲紅旗人乾隆二十三年十二月以縂督陜甘理西師粮餉功封卒諡文襄黄嘉黄廷桂孫乾隆二十四年六月襲黄文燝黄嘉子乾隆三十三年十二月襲以上鑲紅旗一等伯霸彦漢軍正藍旗人初襲詳子爵順治九年正月以軍功晉三等伯遇恩詔晉二等伯又以恩詔晉一等伯乾隆十四年八月贈一等昭信伯世襲釋伽保覇彦子順治九年四月襲長生釋伽保子康熈二十二年十月襲天保長生從叔康熈二十三年十二月襲李䋲宗天保叔父康熈四十七年正月襲以罪削爵李淑忠李䋲宗兄子雍正三年六月襲乾隆十四年八月襲一等昭信伯縁事革職李侍堯李淑忠族孫乾隆三十三年十二月襲二等昭信伯四十年正月改入鑲黄旗三等伯六十漢軍正藍旗人初封詳子爵順治九年正月遇恩詔晉封佟國瑶六十子順治十七年五月襲卒諡忠慤海福佟國瑶子康熙二十九年六月襲子降襲詳子爵以上正藍旗原襲三等伯李杕漢軍鑲藍旗人原襲三等侯伊爾拜從叔雍正七年六月降襲坐事削爵黒格李杕從姪孫雍正十三年閏四月襲坐事削爵李坦黑格從弟雍正十三年十二月襲坐事削爵李境李坦再從兄乾隆十三年十二月襲十四年八月以髙祖三等侯李國翰功勲晉號三等懋烈伯世襲慶壽李境子乾隆四十五年十二月襲以上鑲藍旗以上伯爵子一等昂邦章京馬光逺漢軍鑲黄旗人天聰八年五月率建昌軍民歸順封卒諡誠順馬思文馬光逺弟子順治四年十二月襲是年改為一等精竒尼哈畨晉封詳伯爵馬元熙馬思文孫三等伯馬世斌子雍正二年十二月仍襲一等精竒尼哈畨乾隆元年改為一等子坐事削爵馬文凱馬元熙弟乾隆五年十二月襲馬肇永馬元凱子乾隆三十七年十二月襲一等精竒尼哈畨祖澤洪漢軍鑲黄旗人崇徳元年六月自大淩河歸順封一等梅勒章京順治四年改為一等阿思哈尼哈畨順治八年正月以取太原圍大同攻渾源左衛等城功累封三等精竒尼哈畨九年正月遇恩詔晉二等又恩詔晉一等祖良棟祖澤洪子康熙五年四月襲祖良璧祖良棟弟康熙九年八月襲子降襲詳男爵一等精竒尼哈畨范文程漢軍鑲黄旗人順治三年二月以定鼎功勲封三等梅勒章京四年六月晉二等是年改為二等阿思哈尼哈畨五年十一月晉一等九年正月遇恩詔晉二等精竒尼哈畨又以恩詔晉一等卒諡文肅范承斌范文程子康熙六年正月襲范時㨗范承斌子康熙三十四年四月襲乾隆元年改為一等子子降襲詳男爵二等精竒尼哈畨劉良佐漢軍鑲黄旗人順治五年八月自臨淮率屬歸順封劉澤㴠劉良佐子康熙五年六月襲劉俊傑劉澤涵子康熙十八年八月襲坐事削爵常柱劉良佐孫雍正五年五月襲坐事削爵無襲三等精竒尼哈畨張大猷漢軍鑲黄旗人順治三年五月以克太原平河南江南功封三等梅勒章京四年改為三等阿思哈尼哈畨七年三月遇恩詔晉二等九年正月遇恩詔晉一等又以恩詔晉三等精竒尼哈畨張應庚張大猷子順治九年七月襲張華國張應庚姪孫康熙十七年六月襲張正興張華國子康熙三十八年正月襲後降襲詳男爵三等精竒尼哈畨劉之源漢軍鑲黄旗人初以白衣從圍錦州取前屯衛攻太原功累封順治七年三月遇恩詔封三等阿思哈尼哈畨九年正月遇恩詔晉一等十一月以平湖廣功并晉三等精竒尼哈畨坐事削爵尋復封劉光劉之源子康熙二十年四月襲劉邦柱劉光弟康熙二十二年六月襲尼雅哈劉邦柱弟康熙三十二年三月襲後降襲詳男爵以上鑲黄旗一等精竒尼哈畨左夢庚漢軍正黄旂人順治五年八月率屬歸順封卒諡荘敏左元䕃左夢庚兄孫順治十一年三月襲左世永左元䕃子康熙四十二年八月襲左宏鋭左世永子雍正五年閏三月襲乾隆元年改為一等子左淵左宏鋭子乾隆二十一年十二月襲一等精竒尼哈畨董學禮漢軍正黄旗人順治五年八月以破流㓂功封董永蕃董學禮子康熈十九年六月襲董斯教董永蕃子雍正九年十二月襲乾隆元年改為一等子董官董斯教子乾隆二十八年十二月襲一等精竒尼哈畨祖澤潤漢軍正黄旗人崇徳元年六月自大淩河歸順封三等昻邦章京順治元年二月以克前屯衛功晉二等四年改為二等精竒尼哈畨以罪削爵後以軍功復封九年正月遇恩詔晉一等祖植松祖澤潤子順治十八年正月襲祖興邦祖植松子