body:
  text: 欽定四庫全書皇朝文獻通考卷一百三十三王禮考九册立册封附臣等謹按納后之禮著於春秋臨軒册命載於後漢志東晉升平初講求納后禮儀始詳唐開元禮有納后及册命皇后儀後世多采用之馬端臨以納后册后禮儀附見帝系考今據本朝會典通禮所述大婚册立之儀載於王禮考而册封妃嬪儀注以次附見焉崇德元年四月册立中宫嫡妃為皇后是日設黃幄於清寧宫前設黃案於幄內王公百官朝服序立崇政殿前太宗文皇帝御殿閲册寶命正副使持節至清寧宫宣讀册文行册立禮禮成正副使持節復命皇后率公主王妃命婦於太宗文皇帝殿前行六肅三跪三拜禮諸妃率公主王妃命婦詣中宫行六肅三跪三拜禮上御殿諸王大臣進滿洲蒙古漢字三種表文次第宣讀行慶賀禮賜王公百官宴順治八年八月戊午册立科爾沁卓禮克圖親王吳克善女為皇后行大婚禮前期題定大婚納采用馬十匹玲瓏鞍十副甲胄十副緞百匹布二百匹金茶筒一銀盆一大徵用金二百兩銀萬兩金茶筒一金盆一銀桶一銀茶筒一銀盆一緞千匹布二千匹馬二十匹玲瓏鞍二十副馱甲二十副常甲三十副賜后父母金百兩銀五千兩緞五百匹布千匹金茶筒一銀桶一銀盆一上等鍍金玲瓏鞍二副常等玲瓏鞍二副漆鞍二副馬六匹冬夏朝衣各一襲冬夏衣各一襲貂裘各一領上等玲瓏帶一刀一撒袋一副弓矢具甲胄一副大婚前一日遣官一人祭告天地太廟屆日質明設皇后儀仗於卓禮克圖親王邸設黃案一於院中一於東側以受册寶蓋置中黃案大駕鹵簿全設太和殿前設黃案一於殿中置册寶綵亭二於太和門外階下內院禮部官俱朝服以次捧册寶由中道入置殿中黃案上上朝服出御太和殿視册寶畢內院官捧册寶授册封使臣使臣跪受自殿中由中道捧出禮部官前導至太和門外置册寶於綵亭校尉舉綵亭册亭在前寶亭在後由協和門出詣皇后邸是日先遣兩親王奏請皇太后至位育宫皇太后乘輦出宫設儀仗作樂至協和門儀仗停止皇太后輦由中道入上出宫步迎至太和門內皇太后由太和殿入宫册封使臣既至皇后邸卓禮克圖親王等朝服出迎置册寶綵亭於門外皇后同母妃及格格等朝服迎於院中序立內院禮部官捧册寶由中道入置東側黃案上讀册內院官於東側西向立讀册寶文畢以册寶授女官二女官跪受獻皇后皇后跪受授侍立女官跪受置中黃案上皇后興望闕行六肅三跪三叩禮畢皇后升輦女官捧册寶蓋仍置綵亭內儀仗鼓樂前導至協和門儀仗停止二女官捧册寶前行皇后輦由中道入至太和殿階下皇后降輦由中道入宫和碩親王以下有頂帶官員以上朝服集朝會所固倫公主和碩福晉以下一品命婦以上悉集宫內已刻禮部堂官奏請上御中和殿多羅郡王以上於太和殿階上立多羅貝勒階下立固山貝子以下有頂帶官員以上俱於太和殿丹陛內排立上率諸王入宫於皇太后前行三跪九叩禮畢上復御中和殿諸王出立殿外階上皇后率諸王妃朝見皇太后行六肅三跪三叩禮畢還宫諸王妃入侍皇太后上出御太和殿賜諸王及察哈爾額駙阿布鼐親王土謝圖親王卓禮克圖親王等並貝勒文武羣臣宴畢上回宫皇太后乘輦還宫上送至太和門內乃還次日御太和殿諸王貝勒文武羣臣上表行慶賀禮頒詔天下詔曰朕惟聖化始於二南作配協鳯鳴之盛天庥垂於萬世于歸廣麟趾之祥正位中宫勤宣風教朕纘承鴻緒祗荷丕基慎擇淑儀覃延後嗣邇者昭聖慈夀皇太后特簡內德用式宫闈仰遵睿慈謹昭告天地太廟於順治八年八月十三日册立科爾沁國卓禮克圖親王吳克善之女為皇后貞順永昭奉尊養之令典敬恭匪懈應天地之同功爰合德於隂陽期錫類於仁孝詔告天下咸使聞知十一年六月甲戌册立科爾沁鎮國公綽爾濟女博爾濟錦氏為皇后行大婚禮前期諭禮部諏吉日擬定儀注及大婚之日御太和殿閲册寶宣制命正副使持節詣皇后邸行册立禮有司具儀駕鹵簿奉迎皇后升輦入宫大婚禮成次日上御太和殿文武羣臣上表行慶賀禮賜宴頒詔天下詔曰帝王應天顯命洪敷化理必肇自宫壼乃達家國以訖於萬方即躬備令德恆資內助弼成雍穆故慎簡厥始用介有終所以承宗廟敦孝養崇化源茂本支也朕祗纘鴻緒篤敬彛倫聖母昭聖慈夀恭簡皇太后深惟內治期遴懿淑以襄朕躬必得賢媛乃正中宫俾儀天下兹欽遵慈命虔告天地宗廟於順治十一年六月十六日册立科爾沁鎮國公綽爾濟之女博爾濟錦氏為皇后惟朕躬暨后克迪厥德邦其永孚於休用紹徽我聖善邇睦宫庭乃錫祉於爾多方丕協熙治布告天下咸使聞知康熙四年九月辛卯聖祖仁皇帝大婚册立內大臣噶布喇之女赫舍里氏為皇后前期一日行大徵禮屆日上御太和殿閲册寶畢授册封使臣捧册寶至皇后第宣讀皇后謝恩行禮畢鑾儀衛陳儀仗車輅鼓樂前導皇后由大清中門行御道入中宫上具禮服詣太皇太后宫皇太后宫行禮還宫行合卺禮畢上升太和殿賜皇后親屬及諸王百官筵宴皇后詣太皇太后宫筵宴諸王以下免行禮公主王妃以下免會宴次日皇后詣太皇太后皇太后宫行朝見禮癸巳御太和殿王以下文武各官上表朝賀頒詔天下詔曰帝王承天立極作民父母使四海同倫萬方向化匪獨外治蓋亦內德茂焉故政教𢎞敷肇先宫壼所以共承宗廟助隆孝養綿本支睦九族甚巨典也朕祇纘鴻基篤念倫紀兹者聖祖母昭聖慈夀恭簡安懿章慶敦惠太皇太后深惟婚禮為天秩之原王化之始遴選賢淑俾佐朕躬正位中宫以母儀天下欽遵慈命虔告天地宗廟於康熙四年九月初八日册立內大臣噶布喇之女赫舍里氏為皇后朕躬暨后允修厥德夙夜敬勤期克紹於徽音庶俾薄海內外丕協倫常洽被仁恩聿臻上理布告天下咸使聞知十六年八月丙寅册立妃鈕祜祿氏為皇后前期遣官祗告天地太廟後殿聖祖仁皇帝親詣奉先殿告祭屆日設節案於太和殿正中設册寶案於左右上御太和殿閲册寶王公百官咸朝服按翼序立乃宣制命正副使持節行册立禮正副使至景運門內監接奉節册寶入宫皇后受册寶行禮如儀行貴妃册封嬪各禮內監出至景運門以節授正副使正副使還至後左門復命上率王公大臣詣太皇太后皇太后宫行禮次日皇后禮服詣太皇太后皇太后宫皇帝前行禮各如儀公主福晉命婦免隨行禮越三日上御太和殿王公百官上表行慶賀禮如儀免公主福晉命婦詣中宫行禮頒詔天下詔曰帝王仰膺天眷撫育羣生爰溯治理之隆莫不肇自宫闈達於海宇故必慎選賢媛用資內助承宗廟之重敦風化之原甚巨典也朕祇纘丕基篤念倫紀兹者聖祖母昭聖慈夀恭簡安懿章慶敦惠溫莊康和仁宣太皇太后深惟內治攸關特遴淑德作配朕躬正位中宫母儀天下欽遵慈命虔告天地宗廟於康熙十六年八月二十二日册立公遏必隆之女妃鈕祜祿氏為皇后惟朕躬暨后共勗敬勤克迪厥德庶其上紹徽音敷宣盛化以貽子孫臣民億萬年無疆之祉布告天下咸使聞知二十八年七月癸卯册立皇貴妃佟氏為皇后是日遣官告祭天地太廟行册立禮頒詔天下詔曰帝王受天明命撫御萬方莫不端本宫闈化行海宇矧承奉宗廟敦睦本支皆於內助是賴兹者聖母仁憲恪順誠惠純淑端禧皇太后以坤教不可久虛壼政必資懿德皇貴妃孝敬性成淑範素著鞠育衆子備極恩勤宜立為皇后正位中宫母儀天下欽遵慈命虔告天地宗廟於康熙二十八年七月初九日册立領侍衛內大臣舅舅佟國維之女皇貴妃佟氏為皇后尚其聿修令範益篤教勤仰嗣徽音永綿福祉肇化原於倫紀溥仁惠於寰區布告中外咸使聞知雍正元年十二月丁卯册立嫡妃那拉氏為皇后前期遣官告祭天地太廟社稷至是日行册立禮御太和殿宣制命正副使持節將事皇后受册寶行禮俱如儀惟慶賀典禮得旨俟三年後補行次日頒詔天下詔曰朕惟乾施坤成乃布和於四序日明月儷並臨照於萬方故王者建邦必正宫庭之位聖人作則先隆册命之文所以理敘人倫輔修內治也朕丕纘鴻基欽承大業奉皇妣孝恭仁皇后諭旨以嫡妃那拉氏誕秀髙門稟貞華胄淑恭中度懿範性成孝敬盡於晨昏承顔養志柔嘉著於宫壼惠下肅躬令德克全徽章允稱宜册立為皇后洎慈闈失恃典禮久稽而宗事聿嚴正名斯亟兹敬遵慈訓載考舊儀祗告天地太廟社稷於雍正元年十二月二十二日册立那拉氏為皇后俾承光於軒耀式正號於長秋大禮既成湛施應溥於戲祉貽璇室宏昭式榖之原福備椒庭廣錫敷恩之典布告天下咸使聞知三年十月庚午御太和殿王以下文武大臣官員進表補行慶賀册立皇后禮禮畢御乾清宫皇后率妃嬪行六肅三跪三叩禮次妃嬪率公主王妃命婦詣皇后宫行慶賀禮均如儀乾隆二年十二月丁亥册立嫡妃富察氏為皇后先是雍正十三年十二月癸未諭禮部欽奉皇太后懿旨倫常攸重肇始坤元風化由基恆資內輔禮昭王制聿隆褕翟之儀詩首關雎爰啓肅雍之治典至巨也皇帝嫡妃富察氏恭淑性成柔嘉素著宫庭視膳篤敬順以承歡壼掖傳徽昭勤儉而宣敬動符禮度化洽賢慈宜正位於中宫用光襄夫宸極應立為皇后以崇內治以裕嘉祥欽此朕祗遵慈命立嫡妃富察氏為皇后應行典禮爾部詳察具奏乾隆元年二月禮部擬定典禮具奏得旨册立皇后典禮著於二十七月後舉行及二年十二月始行册立禮前期遣官告祭天地太廟社稷至是日御太和殿宣制遣使皇后受册寶行禮均如儀次日上率王公大臣詣皇太后宫行慶賀禮畢御太和殿王公百官上表稱賀如儀皇后率貴妃妃嬪詣皇太后宫行慶賀禮畢內監請皇帝御內殿皇后率貴妃妃嬪行禮畢還宫貴妃率妃嬪及公主王妃命婦詣皇后宫行禮是日頒詔天下詔曰朕惟位明天地乾行與坤順同功治洽家邦壼政與朝章並肅詩紀睢麟之盛禮隆䄖翟之榮所以秩彛倫而承禋祀也燦乎巨典炳有成規朕纘紹丕圖統綏羣服御極之初恭奉聖母崇慶皇太后懿旨以嫡妃富察氏秀育華門禮嫻內則柔慎秉于粹性溫恭著于令儀殫誠敬以事庭闈孝同孺慕抒恪勤而式禁掖德懋純修和平敷芣苡之仁浣濯比葛覃之儉淑儀咸備景福維新允宜册立為皇后時值永懷方切大禮有稽兹當即吉之辰用定中宫之位祗遵慈諭載考鴻章謹告天地宗廟社稷於乾隆二年十二月初四日册立嫡妃富察氏為皇后俾得敬承璽紱並佑清寧璇宫之慶典斯彰寰宇之恩施宜沛於戲日明月儷祥徵泰祉之符巷舞衢歌喜協敉寧之瑞布告天下咸使聞知十五年八月壬申册立攝六宫事皇貴妃那拉氏為皇后先是十三年七月癸未諭大學士等朕躬攬萬幾勤勞宵旰宫闈內政全資孝賢皇后綜理皇后上侍慈母皇太后承歡朝夕純孝性成而治事精詳輕重得體自妃嬪以至宫人無不奉法感恩心悅誠服十餘年來朕之得以専心國事有餘暇以從容册府者皇后之助也兹奉皇太后懿旨皇后母儀天下猶天地之相成日月之繼照皇帝春秋鼎盛內治需人嫻貴妃那拉氏係皇考向日所賜側室妃人亦端莊惠下應效法聖祖成規即以嫻貴妃那拉氏繼體坤寧豫心乃慰即皇帝心有不忍亦應於皇帝四十嵗大慶之先時已過二十七月之期矣舉行吉禮嘉兒嘉婦行禮慈寧始愜豫懷也欽此朕以二十餘年伉儷之情恩深誼摯遽行册立於心實所不忍即過二十七月於心猶以為速但思皇后大事上軫聖母懷思久而彌篤嵗時令節以及定省溫凊朕雖率諸妃嬪及諸孫問安左右而中宫虛位必有顧之而愴然者固宜亟承慈命以慰聖心且嬪嬙內侍掖庭之奉職待理者甚衆不可散而無統至王妃命婦等皆有應行典禮久曠不舉亦於禮制未協册立既不忍舉行可姑從權制考之明太祖淑妃李氏寧妃郭氏相繼攝六宫事國朝順治十三年册立皇貴妃皇曽祖世祖章皇帝升殿命使翌日頒詔天下典至崇重今應倣效前規册命嫻貴妃那拉氏為皇貴妃攝六宫事於以整肅坤儀上奉聖母襄助朕躬端模範而迓休祥順成內治有厚望焉至是年七月壬子奉諭旨朕恭奉皇太后懿旨皇貴妃攝六宫事那拉氏孝謹成性德著椒塗乾隆十三年值孝賢皇后大事內治需賢即諭皇帝宜敬循祖制以嫻貴妃那拉氏繼體坤寧皇帝秉禮準情不忍遽行册立粵從權制册命嫻貴妃那拉氏為皇貴妃攝事六宫閲今二載嬪嬙效職壼政茂修兹逢皇帝四十大慶所當舉行册立皇后典禮以愜豫懷以符成命欽此朕惟宫庭為基化之原人倫攸始皇貴妃攝六宫事那拉氏自皇考時賜朕為側室妃二十餘年以來持躬淑慎禮教夙嫻暨乎綜理內政恩洽彤闈用克仰副皇太后端莊惠下之懿訓允足母儀天下既臻即吉之期宜正中宫之位敬遵慈命載考彛章册命皇貴妃攝六宫事那拉氏為皇后於以承歡聖母佐孝養於萱闈協贊坤儀儲嘉祥於蘭掖所有應行典禮大學士會同禮部內務府詳議以聞尋大學士等擬定儀注具奏得旨報可册立之前一日遣官告祭天地太廟社稷至是日御殿遣使受册寶暨慶賀行禮諸儀均與乾隆二年同大婚儀凡大婚之禮制下禮部偏布諸司供備諏納采大徴奉迎吉日以聞會工部製金册金寶翰林院撰制册文進呈欽定送內閣恭鐫如儀詳后儀册右諏日鐫册寶納采之禮內務府官備文馬十鞍轡具甲胄十幣百布二百以俟將屆期禮部奏請命尚書一人充納采使內務府總管一人充副使屆日黎明禮部鴻臚寺官設節案一於太和殿內正中東西肆內閣官自閣奉節陳於案退內務府官以龍亭分載甲胄布帛陳于丹陛上左右陳文馬于丹陛下左右正副使入祗俟於丹墀東鴻臚寺序班二人立使者之右少後授節大學士一人立殿東簷下宣制鴻臚寺官一人立大學士之右少後均朝服西靣鳴贊二人朝服分立殿外東西柱前東西靣欽天監官報吉時屆鳴贊贊齊班序班引使者就丹墀東班拜位立北靣西上贊進少進贊跪叩興行三跪九叩禮興序班引使者升東階至丹陛北靣立鳴贊贊有制使者跪宣制官進至殿中門之左西靣宣制曰皇帝欽奉皇太后懿旨納某女某氏為后命卿等持節以禮納采宣畢大學士進殿左門詣案奉節由中門闑左出至丹陛以授正使受節偕副使興前行降中階左內務府官率校尉舁禮物龍亭隨降衛士牽文馬從御伏前導由太和中門出詣皇后邸第右傳制遣納采是日后父飭子弟潔掃邸第有司豫設案於廳事正中南向左右案各一東西向使者持節至邸將及門下馬后父朝服出迎於大門外道左跪候過興使者入中門升中階登堂陳節中案偕副使退就案東西面立龍亭隨入至儀門外止內務府官奉甲胄布帛入登堂陳於左右各案衛士以馬入陳於庭左右訖后父升自西階詣中門外北靣跪使者少進西面傳制納采復位后父聽制行三跪九叩禮興受諸禮物使者詣案奉節出副使從后父跪送於大門外如初內務府官皆出使者乘馬復命還節有司右使者傳制納采納采禮成有司詣皇后邸設燕皇帝特命公主大臣命婦燕后母於內命內大臣侍衛八旗公侯以下滿漢二品以上官燕后父於外外燕朝服后父為賓席東上內燕常服后母為賓席西上序坐行酒三巡如常燕儀右納采筵宴次行大徴禮所司備黃金二百兩白金萬兩黃金茶器一白金茶器二盆二幣千文馬二十鞍轡具間馬二十馱甲二十備賜后父后母黃金百兩茶器一白金五千兩茶器一盆一帛五百布千馬六鞍轡具甲胄一弓一韔矢一服朝服各二襲衣各二稱皆冬一夏一貂裘各一帶一備賜后兄弟及從人服物有差屆日有司陳大徴禮物於丹陛上陳賜物於丹陛下禮部奏請命使傳制授節於太和殿儀如納采使者承制持節詣皇后邸執事官陳禮物於堂陳賜物於階上陳馱馬於庭中使者傳制后父聽制行禮如納采之儀傳制訖后父降階率子弟詣庭東向節行三跪九叩禮畢豫往大門外祇俟后母率諸婦出詣庭西向節行六肅三跪三叩禮畢退使者持節出后父以下跪送使者復命還節退右大徴及大婚前一日遣官各一人祗告天地太廟奉先殿如常儀右祗告屆日行册迎禮禮部奏請命大學士一人充册迎使尚書一人副之所司豫疏列內外執事官奏請命內大臣十人侍衛十人充扈從官命二品以上命婦四人充前導七人充後扈十人充恭侍其日內鑾儀衛設皇太后儀駕鹵簿樂懸於慈寧宫常次如儀禮部鴻臚寺官設節案册寶案於太和殿內設龍亭於內閣門外鑾儀衛陳法駕鹵簿樂部和聲署陳樂懸各依常次如式又陳中宫車輅於太和門階下陳儀駕鹵簿於午門外內務府官陳冠服於車輅之南黎明內閣禮部官自閣奉金册金寶及宣讀册文寶文分設龍亭內禮部侍郎奉節同詣太和殿恭陳各案王公文武百官記注糾儀執事各官朝服陪位册迎使序立於丹墀東扈從內大臣侍衛在其後授節大學士宣制鴻臚寺官舉册寶案內閣禮部官序立於殿簷下均朝服欽天監官報吉時屆禮部尚書侍郎詣乾清門奏時遂前導駕皇帝禮服乘輿出宫前引後扈如常儀由隆宗門至永康左門降輿入立於慈寧門外東位西向內監轉奏皇太后升慈寧宫寶座禮部尚書侍郎恭導皇帝就正中拜位北向行三跪九叩禮畢皇太后還宫皇帝自永康左門乘輿仍入隆宗門由保和殿北門出御太和殿午門鳴鐘鼓作樂鳴鞭序班引正副使就拜位行禮畢升東階北面跪宣讀官宣制詞曰皇帝欽奉皇太后懿旨納某氏為皇后兹當吉月令辰備物典册命卿等以禮奉迎宣大學士授節於正使偕副使興執事官舉册寶案隨降中階設龍亭內以次出太和門皇帝還宫鳴鞭作樂並如册后遣使之儀册迎使出扈從內大臣侍衛從出至太和門外册迎使持節在前次册寶亭次中宫車輅冠服儀駕鹵簿遂行詣皇后邸右臨軒遣使册迎是日步軍統領飭所部清蹕除道自大清門至於后邸宫殿監督領侍率內監備交泰殿內外鋪陳恭侍命婦朝服豫詣殿外祗俟導從命婦贊引侍儀宣讀女官朝服及給事后邸內監彩服均詣皇后邸祗俟有司設節案一於邸第內堂正中南設香案均南向設册寶案於東西各一東西向設皇后拜位於香案前北向宣讀女官二人立東案之南西面侍儀女官四人立拜位左右東西面內監於外堂階下承應使者持節至邸下馬后父率子弟朝服出迎於大門外如前儀使者入升巾階立於外堂之東副使在其左均西面册寶亭隨入權設於外堂左右內務府官奉冠服授內監齎入轉授女官以進皇后內鑾儀校陳鳳輿於階上正中陳車輅儀駕鹵簿於階下左右至大門內樂部和聲署陳導迎樂於大門左右后父升自西階詣外堂中門外正中北面跪使者西面傳制復位后父聽制行三跪九叩禮興退至階西內監入轉奏皇后御禮服贊引女官恭導出閣門外道右俟后母及諸婦朝服詣外堂門內道右正使授節於內監副使自龍亭奉册寶以授內監均奉自中門入后母以下跪候過興皇后立候過隨入內監奉節册寶陳於各案退贊引女官引皇后就拜位跪宣讀女官次第宣册宣寶皇后受册受寶行禮均如宫中册立儀內監奉節出授使者皇后及母祗送如初贊引導皇后入閣少憩女官奉册寶仍授內監分設於龍亭右受册寶册禮既成欽天監官報升輿吉時屆內鑾儀校進鳳輿於內堂階下正中南向前導命婦恭導皇后出閣後扈命婦翼擁降階后母率諸婦送至輿前皇后升禮輿后母及諸婦少退册迎使持節出乘馬先行后父跪送如初興少退次導迎樂陳而不作次儀駕鹵簿車輅次册寶亭次皇后鳳輿啓行出大門命婦乘騎導從內監步行左右持輿內大臣侍衛在後乘騎護從由大清門中門入至金水橋册迎使下馬持節入皇后輿至午門外鳴鐘鼓儀駕鹵簿止九鳳曲蓋前導執事命婦下馬步行導從內大臣侍衛於金水橋步從由午門太和門中門入中左門後左門至乾清門龍亭止册迎使復命還節偕內大臣侍衛各退內監奉册寶於亭前行恭導命婦導鳳輿入乾清中門至乾清宫階下轉啓皇后降輿詣交泰殿導從命婦退恭侍命婦祗迎皇后入中宫內監奉册寶授守寶內監退合卺吉時屆宫中設合卺燕監督領侍具奏皇帝禮服御中宫行合卺禮給事宫人恭侍命婦皆退右合卺翼日尚膳潔具皇后盥饋皇太后御席又具皇太后醴饗皇后御席內監侍豫設朝見拜位於慈寧宫內正中北向又設醴位於東西南向質明皇太后儀駕鹵簿樂懸陳設如常儀內監轉啓皇后行朝見禮皇后禮服出中宫乘輿導從如儀詣慈寧宫降輿引入丹陛上西位東向立內監轉奏皇太后禮服出內宫中和韶樂作升座樂止贊引命婦引皇后詣正中拜位行六肅三跪三拜禮興少退立尚食進席於皇太后前皇太后舉酒嘗食贊引命婦引皇后復行二肅一跪一拜禮興引詣醴位坐尚食進席於皇后前皇后舉酒嘗食畢興內監侍徹贊引引詣拜位行禮如初少退西向立皇太后降座作樂還宫贊引引皇后出乘輿還中宫執事命婦皆退右朝見越日皇帝率羣臣詣皇太后宫行禮乃御太和殿王公百官上表稱賀頒詔宣示天下直省文武官各進表箋稱賀皇后詣皇太后宫行禮詣皇帝前行禮公主福晉命婦詣皇后宫行禮均如册后之儀午刻樂部和聲署陳樂懸於太和殿常次尚膳供御膳羞光祿寺備燕席皇帝御太和殿賜后父及其族屬燕王公百官咸與后父布席於殿內王公之末其族屬按翼於本旗序品列坐駕升寶座時王公以下陪位如常后父率其族屬詣丹墀東北面行三跪九叩禮畢均引入班就位坐陳席奏樂行酒如太和殿筵宴儀皇太后御慈寧宫賜后母及其親屬燕公主福晉夫人大臣命婦咸與內監陳樂懸內務府官供饌具后母布席於夫人之末其親屬按品布席於命婦之位皇太后升寶座時公主以下陪位后母率其親屬詣丹墀東北面行六肅三跪三拜禮畢均引就位坐陳席奏樂行酒如慈寧宫筵宴儀右禮成慶賀筵宴册立皇后儀凡册立之禮制下禮部尚書一人赴內閣承制乃諏吉以聞遍布諸司供備豫期禮部工部官會製册寶於內務府恭送內閣鐫册文寶文內閣大學士學士禮部工部尚書侍郎朝服行禮如儀右諏日具册寶屆期禮部奏請命大學士充册立使尚書充副使右命使前一日遣官各一人祗告天地太廟後殿奉先殿如常儀右祗告至日五鼓所司詣太和殿內正中設一案南向左右各設一案東西向設龍亭二於內閣門外鑾儀衛陳法駕鹵簿仗馬步軍五輅馴象鼓吹常朝象樂部和聲署陳樂懸各依常次王公文武百官記注糾儀執事各官朝服陪位如常儀漏未盡工部官以節送內閣禮部自內閣奉金册金寶及宣讀册文寶文各陳於亭內禮部侍郎奉節鑾儀校舁亭禮部官十人前引導以繖仗由中路降升至太和殿階下亭止導引官皆止內閣禮部官奉金册金寶隨節升中階入殿中門陳節中案陳册左案陳寶右案退鑾儀校回亭南向質明册使副使只俟於丹墀東鹵簿之南大學士一人立殿東簷下西面宣制鴻臚寺官一人立大學士後舉册寶案內閣禮部官分立東西簷下東西面均朝服欽天監官報吉時已屆禮部尚書侍郎詣乾清門奏時遂前導駕皇帝禮服乘輿出宫前引後扈如常儀午門鳴鐘鼓至太和殿後階降輿入中和韶樂作奏隆平之章樂辭與常朝同後仿此皇帝升座樂止鑾儀衛官贊鳴鞭丹墀內三鳴鞭丹陛大樂作奏慶平之章鴻臚寺鳴贊官贊齊班序班引正副使就丹墀東班拜位立北面西上贊進少進贊跪叩興行三跪九叩禮興樂止序班引正副使升東階至丹陛北面立鳴贊官贊有制正副使跪宣制官進至殿中門之左宣制曰某年月日册立某妃某氏為皇后命卿等持節行禮如奉奉曰欽皇太后懿旨則皇太后懿旨宣畢大學士進殿左門詣中案奉節由中門闑左出至丹陛以節授正使正使受節偕副使興內閣禮部官進殿左右門舉册寶案出中門正使持節前行副使從以次降中階內閣禮部官奉册寶設龍亭內鑾儀校舁行導引如初由太和門出皇帝賜王公大臣茶如常儀畢皇帝降座鳴鞭如初中和韶樂奏顯平之章皇帝還宫樂止王公百官咸退右臨軒遣使是日內鑾儀衛陳儀駕鹵簿於皇后宫階下及宫門外內監設丹陛樂於宫門內設節案一於宫內正中南為香案均南向設册寶案於東西各一東西向設皇后拜位於香案前北向女官四人立拜位左右東西面宣讀女官二人立東案之南西面宫殿監率內鑾儀校豫候於景運門册使既受命出由協和門至景運門外西面立正使奉節授內監內監持節內鑾儀校接舁册寶亭至皇后宫門外亭止內監奉册寶詣皇后宫皇后具禮服出內宫丹陛樂作贊引女官二人引皇后迎於宫門內道右候過隨行入宫內監奉節陳於中案奉金册册文金寶寶文陳於東案退贊引女官引皇后就拜位北向立樂止贊跪皇后跪贊宣册宣册女官就案奉宣讀册文西面立宣畢授侍右女官跪接贊受册女官以册奉皇后皇后受册授侍左女官女官跪接奉以興陳於西案次宣寶受寶亦如之樂作皇后行六肅三跪三拜禮畢少退東向立樂止內監進至中案奉節出贊引女官引皇后送於宫門內道右候過還宫內監奉節至景運門授册使正使持節副使從詣後左門復命册立禮成還節有司各退右受册翼日皇帝率羣臣詣皇太后宫行禮乃御太和殿受賀如三大節之儀頒詔宣示天下皇后詣皇太后宫行禮詣皇帝前行禮貴妃妃嬪公主福晉命婦詣皇后宫行禮均如三大節儀右禮成朝賀册封皇貴妃儀凡册封皇貴妃命下禮部諏吉以聞乃遍布諸司供備先期工部製册禮部製寶均以金送內閣鐫字行禮如儀右諏日具册寶屆期禮部奏請命正副使各一人正使以大學士尚書充副使以侍郎內閣學士充右命使先一日遣官各一人祗告太廟後殿奉先殿如常儀右祗告至日五鼓禮部鴻臚寺官設節案於太和殿正中設册案於左寶案於右鑾儀衛官設采亭於內閣門外內閣禮部官奉節册寶出陳於亭內鑾儀校舁行導以繖仗禮部官前引至太和殿階下亭止奉册寶隨節以升設於殿內各案質明大學士一人朝服立節案之東正副使朝服立丹墀之東均西面欽天監官報吉時已屆正使由東階升副使從至丹陛左北面跪大學士詣案奉節由殿中門出授正使正使受節偕副使興所司舉册寶案從降中階仍設亭內導引如初以次設皇貴妃宫右遣使發册是日內鑾儀衛設皇貴妃儀仗於本宫門外內監設節案香案於宫內正中設册寶案於東西正副使既受命由協和門至景運門外正使西面授節內監內監奉節舁册寶亭至宫門奉册寶隨節詣皇貴妃宫皇貴妃禮服出迎於宫門內道右立候過內監奉節册寶陳於各案退引禮女官引皇貴妃就拜位北面跪女官宣讀册文寶文皇貴妃恭受册寶行六肅三跪三拜禮畢送節於宫門內道右均如皇后受册之儀內監持節出景運門授正使正使持節副使從詣後左門復命册封禮成還節有司各退右受册翼日皇貴妃詣皇太后宫行六肅三跪三拜禮乃詣皇帝前行禮次詣皇后前行禮並如儀右禮成朝見册封貴妃儀命下所司供備製册寶均以金既諏吉奏請命使遣官祇告太廟後殿奉先殿至日遣使發册並如册封皇貴妃之儀是日內鑾儀衛設貴妃儀仗於本宫門外宣册寶受册寶及朝見儀與皇貴妃禮同册封妃儀命下所司製册印均以金奏請命使祗告太廟後殿奉先殿至日遣使發册如册封貴妃之儀是日內鑾儀衛設妃采仗於本宫門外宣册印受册印及朝見儀俱與貴妃同册封嬪儀命下所司製册以金奏請命使不遣官祇告至日發册不設印案如册妃儀是日內鑾儀衛設嬪采仗於本宫門外設册受册暨朝見儀均與妃同皇朝文獻通考卷一百三十三
