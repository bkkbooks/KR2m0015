body:
  text: 職官考五戶部戶部掌天下户口土田之籍一切經費出入悉統理焉尚書滿洲漢人各一人順治七年增滿一人十年裁康熙六年復增八年裁左右侍郎滿洲漢人各一人右侍郎兼管錢法其屬有十四清吏司曰山東曰山西曰河南曰江南曰江西曰福建曰浙江曰湖廣曰陜西司四川曰廣東曰廣西曰雲南曰貴州山東清吏司郎中滿洲二人漢人一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽山東布政使司及盛京民賦收支奏册兼核長蘆等處鹽引疏銷臣等謹按十四司職掌與舊會典互異今據現行則例編入山西清吏司郎中滿洲漢人各一人員外郎滿洲蒙古漢人各一人主事滿洲漢人各一人掌稽山西布政使司民賦收支奏册兼核遊牧察哈爾地畝河南清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽河南布政使司民賦收支奏册兼核遊牧察哈爾及圍場捕盜官兵俸餉江南清吏司郎中滿洲漢人各一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽江寧蘇州安徽三布政使司民賦收支奏册兼核江寧蘇州織造支銷奏册江西清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽江西布政使司民賦收支奏册福建清吏司郎中滿洲二人漢人一人員外郎滿洲五人漢人一人主事滿洲蒙古漢人各一人掌稽直𨽻福建二布政使司民賦收支奏册兼核直屬內府莊田及遊牧察哈爾地畞浙江清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽浙江布政使司民賦收支奏册兼核杭州織造支銷奏册湖廣清吏司郎中滿洲二人漢人二人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽湖北湖南二布政使司民賦收支奏册陜西清吏司郎中滿洲蒙古漢人各一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽西安甘肅二布政使司民賦收支奏册并行銷茶引兼核在京漢官俸廪外藩俸幣及巡捕五營俸餉各衙門經費四川清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽四川布政使司民賦收支奏册兼核本省關稅及在京入官户口廣東清吏司郎中滿洲漢人各一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽廣東布政使司民賦收支奏册兼核八旗繼嗣歸宗更正戶口廣西清吏司郎中滿洲漢人各一人員外郎滿洲四人漢人一人主事滿洲漢人各一人掌稽廣西布政使司民賦收支奏册兼核京省錢局運銅鼓鑄及內倉支放供應芻豆雲南清吏司郎中滿洲二人漢人一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽雲南布政使司民賦收支奏册兼山東河南江南江西浙江湖廣等省嵗運漕糈京通倉及江寧水次六倉收支考核貴州清吏司郎中滿洲漢人各一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽貴州布政使司民賦收支奏册兼核各關各口徴收稅課臣等謹按蒙古郎中初設四人康熙三十八年俱裁五十七年復設一人漢軍郎中初設二人康熙三十八年裁蒙古員外郎初設五人康熙三十八年俱裁五十七年復設一人漢軍員外郎初設六人康熙三十八年裁滿漢主事每司初各設三人順治十一年各裁一人康熙六年復裁江南浙江江西湖廣福建河南陜西廣西四川貴州司各一人三十八年復裁山東山西廣東雲南司各一人堂主事滿洲二人掌八旗編審滿洲二人漢軍二人掌酌撥賞銀校勘奏章司務滿洲漢人各一人筆帖式滿洲百人初設一百三十五人乾隆十三年裁三十五人蒙古四人漢軍十六人分𨽻各司視事之繁簡為額寶泉局監督滿洲漢人各一人無専員於司官內揀任掌鑄造制錢收納銅課大使滿洲五人於筆帖式遴委分理匠役工料總理三庫大臣於大臣內員簡用無定總稽庫藏節制出納銀庫郎中一人員外郎二人大使二人司庫一人段匹庫郎中一人員外郎二人大使一人司庫二人顔料庫郎中一人員外郎二人大司一人司庫二人分掌銀幣物料解納收支堂主事一人掌稽核文移筆帖式十五人庫使二十六人分𨽻三庫三庫各官俱滿洲缺臣等謹按雍正元年以親王大學士兼理部務鑄管理三庫銀印責有専重所以慎國用也三年復增設稽察按卷滿主事一人司庫三人總督倉場侍郎滿洲漢人各一人總稽嵗漕之入以均廩祿以儲軍餉各省漕艘京通倉廪悉𨽻焉所屬坐糧廳滿洲漢人各一人掌通濟庫收支錢糧兼核漕船程限大通橋監督滿洲漢人各一人分掌掣驗漕糧京通十四倉監督滿洲漢人各一人分掌漕白糧出納筆帖式四人收掌文書內倉監督滿洲二人掌支放外藩朝貢及各學教習官役廩粟坐糧廳於各部司官內揀任大通橋京通各倉監督於各衙門屬員內揀任內倉監督専𨽻本部於司員內揀任臣等謹按順治九年五月設漢軍倉場侍郎一人尋裁去康熙七年裁漢侍郎止設滿侍郎一人八年定滿漢侍郎各一人禮部禮部掌五禮之秩序學校貢舉之法尚書滿洲漢人各一人左右侍郎滿洲漢人各一人其屬有四清吏司曰儀制曰祠祭曰主客曰精膳儀制清吏司郎中滿洲二人漢人一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌嘉禮軍禮凡朝廷典禮具上其儀頒式於諸司學校貢舉並𨽻焉祠祭清吏司郎中滿洲二人漢人一人員外郎滿洲三人蒙古漢人各一人主事滿洲漢人各一人掌吉禮凶禮凡祭祀其列在祀典者則稽其實日月交食移諸司救護有災異則奏聞喪祭貴賤有等皆定其程則頒行凡術數醫卜音樂及僧道並籍領之主客清吏司郎中滿洲蒙古漢人各一人員外郎滿洲二人主事滿洲漢人各一人掌賔禮凡貢必省閲之然後登內府若藩國嗣封則遣頒册於