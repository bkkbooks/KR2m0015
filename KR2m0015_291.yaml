body:
  text: 欽定四庫全書皇朝文獻通考卷二百九十二輿地考二十四喀爾喀臣等謹案大漠之野號稱瀚海此漠南漠北所自分也漢唐盛時兵力或能至於漠南若漠北則固荒逺矣自元初起自西北建都和林其後混一天下遂于和林置行中書省列於十一行省之中其後裔於明初復退保於此位號相傳終明之世自成強國聖朝功德隆盛遐邇咸賓當開國之始蒙古北部喀爾喀三汗即同時納貢至康熙年間喀爾喀與準噶爾搆難舉國內屬我聖祖仁皇帝親整六師三臨朔漠天戈所指威震龍沙絶域之遙如履户闥逮乎準夷敗竄朔塞蕩平於是喀爾喀全部列爵分旗庇我宇下承平以來綏懷益逺凡內附之厄魯特部人亦分駐焉其封爵會盟諸典禮隸於理藩院典屬司及柔逺司來享來王奔走恐後與漠南諸部無異焉蓋懷柔之化訖於無外矣喀爾喀東西袤延五千里南北距三千里東至黑龍江將軍界西至阿勒坦山接西域新疆界南至瀚海接漠南諸蒙古界北至俄羅斯國界戰國時為丐奴地漢初冒頓強盛併有漠南武帝時纍嵗征伐胸奴始退保漠北後漢時分為南北二單于此為北單于地漢末胸奴衰弱烏桓鮮卑遞有其地元魏初蠕蠕強盛其主始稱可汗常與後魏為敵國東至朝鮮西至燉煌張掖之北境南臨大磧北渡沙漠窮瀚海皆為所有西魏以後蠕蠕破而突厥興盡有西北之地其主亦稱可汗北齊後周爭結婚姻傾府藏事之至大邏便沙鉢略分為二國大邏便之後别為西突厥在今天山北路境此為東突厥地唐初又有薛延陀自稱可汗於漠北貞觀時頡利被擒突厥破亡薛延陀與回紇並強盛至薛延陀既滅回紇並有其地其後內附以其地遙置瀚海燕然金微幽陵龜林盧山六都督府又置臯蘭髙闕雞田榆溪雞鹿蹛林置顔等七州即以其部長為都督刺史長史司馬皆隸燕山都護府後更併有九姓諸部盡突厥故地其東境又兼為室韋部地五代至宋回紇始衰與室韋諸部散居其地羈屬於遼金時蒙古諸部始盛元太祖十五年定諸部建都於此名和林初置元昌路後改和林轉運使司自太祖至世祖初五朝並都焉世祖遷都大興於和林置宣慰司都元帥府大德十一年設和林等處行中書省罷宣慰司都元帥府置和林總管府皇慶元年改嶺北等處行中書省改和林路為和寧路明初元順帝殂於應昌其子阿裕實哩達喇嗣立徙和寧依王巴拜於此改元宣光傳其次子托果斯特穆爾改元天元駐捕魚兒海於洪武二十一年為明將藍玉所敗走至圖拉河為其下伊蘇岱爾所弒部落多潰其族烏納實哩收散亡居和寧之西復為明都督劉真等所破自托果斯特穆爾後五傳至昆特穆爾皆被殺逺族郭勒齊篡位稱汗始去國號稱韃靼其下以非順帝裔不附酋長阿嚕台等殺郭勒齊而迎元後布尼雅實哩立以為汗永樂六年以書諭之不報命淇國公邱福統五將軍出塞擊之師殱焉八年明文帝親征布尼雅實哩懼欲與阿嚕台俱西阿嚕台不從君臣始各自為部布尼雅實哩西奔明師追敗之于鄂諾河還師遇阿嚕台復破之十年布尼雅實哩為衛拉特馬哈木所殺時阿嚕台強盛與衛拉特相攻元裔益微其後阿嚕台為衛拉特所蹙內附封為和寧王尋復入冦興和二十年明文帝復親征阿嚕台遁去遂擊降烏梁海而還仁宗時阿嚕台數敗於衛拉特乃率其屬東走烏梁海駐牧遼塞宣德中為衛拉特馬哈木之子脫歡所殺乃求元後托克托布哈立之脫歡自為丞相居漠北脫歡死子額森嗣為太師衆益強後疑其主托克托布哈與中國通攻殺之額森自稱汗尋亦為其下所殺諸部共立托克托布哈之子號小王子其後數傳至卜赤嗣為小王子徙帳東方為察哈爾其留漠北部落曰喀爾喀為西北強國共為七部有三汗中曰土謝圖汗東曰車臣汗西曰扎薩克圖汗本朝天聰七年瑪哈薩嘛諦車臣汗遣使來貢崇德三年三汗並遣使入朝定各貢白馬八白駝一謂之九白之貢嵗以為常後因其國西接烏嚕特部每與搆兵康熙十六年詔諭兩國和好時尼魯特噶爾丹方雄驁西北喀爾喀之三汗內自相殘二十八年噶爾丹興兵攻破其國七部舉族奔潰欵塞內附三十年四月聖祖仁皇帝親巡邊外受其朝大會於多倫諾爾之地安輯其衆於卡倫邊內仍留其三汗之號其諾顔濟農等封以王貝勒貝子公台吉等爵並世襲分為三路共三十七旗與內扎薩克同列噶爾丹既并其地遂沿克魯倫河南牧窺伺邊塞三十五年駕親征至克魯倫河賊衆駭遁還遇大兵擊之盡殱其衆明年噶爾丹竄死漠北悉平喀爾喀諸部始歸故地其從征有功者晉封爵增編旗分為五十五旗又有善巴自為一部曰賽音諾顔部雍正九年固倫額駙䇿淩以奮擊準噶爾功詔授為扎薩克分轄各旗共四部為七十四旗今增至八十二旗設阿爾台軍營駐定邊左副將軍及參贊大臣以經理之設庫掄互市處駐司員以經理之其朝覲貢道由張家口共分為四班其會盟則土謝圖汗部之二十旗為一會其盟所曰罕阿林車臣汗部之二十三旗為一會其盟所曰克魯倫巴爾和屯扎薩克圖汗部之十七旗為一會其盟所曰扎克畢賴色欽畢都哩雅諾爾賽音諾顔部之二十二旗為一會其盟所曰齊齊爾里克每會設盟長一人副盟長一人恭載聖祖仁皇帝御製平定朔漠告成太學碑文惟天盡所覆海內外日月所出入之區悉以畀豫一人自踐祚至今蚤夜殫思休養生息冀臻熙皥以克副維皇大德好生之意庶幾疆域無事得以偃兵息民乃厄魯特噶爾丹阻險北陲困此一方人既荼毒塞外輒狡焉肆其凶逆犯我邊鄙虐我臣服人用弗寧夫蕩冦所以息民攘外所以安內邊冦不除則吾民不安此神人所共憤天討所必加豈憚一人之勞弗貽天下之逸於是斷自朕心躬親朔漠欲使悔罪革心故每許以不殺彼怙終不悛我師三出絶塞朕皆親御以行深入不毛屢涉寒暑勞苦艱難與偏禆士卒共之逮彼狂授首脅從歸誠荒外君長來享闕下西北萬里灌燧銷烽中外乂謐惟朕不得已用兵以安民既告厥成事乃蠲釋眚災潔事禋望為億兆祈升平之福而廷臣請紀功太學垂示來兹朕勞心於邦本嘗欲以文德化成天下顧兹武略廷臣僉謂建威消萌宜昭斯績于有永也朕不獲辭考之禮王制有曰天子將出征受成於學出征執有罪反釋奠於學以訊馘告而泮宫之詩亦曰矯矯虎臣在泮獻馘又禮王師大獻則奏愷樂大司樂掌其事則是古者文事武事為一折衝之用具在樽爼之間故受成獻馘一歸於學此文武之盛制也朕嚮意於三代故斯舉也出則告於神祇歸而遣祀闕里兹允廷臣之請猶禮先師以告克之遺意而於六經之旨為相符合也爰取思樂泮水之義為詩以銘之以見取亂侮亡之師在朕有不得已而用之之實或者不戾於古帝王伐罪安民之意云爾銘曰巍巍先聖萬世之師敬信愛人治平所基煌煌聖言文武道一禮樂征伐自天子出朕臨域中逾兹三紀嘗見羮牆寤寐永矢下念民瘼上承帝謂四海無外盡隸候尉維彼凶醜瀆亂典常既梗聲教遂窺我疆譬之於農患在螟螣秉畀不施將害稼穡度彼遊魂險逺是怙震以德威可往而取朕志先定龜筮其依屬車萬乘建以龍旗祝融驂鸞風伯戒途宜㿩而㿩利我樵蘇大野水涸川瀆效靈泉忽自湧其甘如􅌬設為犄角一出其西一出其東中自將之絶域無人獸羣自掩五日窮追彼狂走險大殱於路波血其孥剪其黨孽俘彼卒徒衆烏晝號單馬宵遁恐久駐師重為民困慎固戍守還轅於京自夏徂冬雨雪其零載馳載驅我行至再蠢兹窮冦昏惑不悔我邊我氓以休以助爰寧其居爰復其賦籓落老稚斯恬斯嬉嵗晏來歸春與之期春風飄翩揚我斾旓我今于邁如涉我郊言秣我馬狼居胥山登髙以眺閔彼彈丸天降凶罰孤雛就羈三駕三捷封狼輿尸既臘梟獍既獮豺貙大漠西北解甲棄殳振旅凱入澤霈郊卜明禋肆赦用迓景福昔我往矣在泮飲酒陳師鞠旅誓屈羣醜今我來思在泮獻功有赫頌聲文軌來同采芹采藻頌興東魯車攻馬同亦鐫石鼓師在安民出非得已古人有作昭示斯旨緬維虞廷誕敷文德聖如先師戰勝必克惟兵宜戢惟德乃綏億萬斯年視此銘詞喀爾喀中路土謝圖汗部駐圖拉河左右境東至肯特山接車臣汗部界西至喀魯特哈河接賽音諾顔部界南至瀚海接蘇尼特四子部落諸部界北至俄羅斯國界康熙二十八年土謝圖汗察渾多爾濟為噶爾丹所敗率其部衆來降三十年許仍其舊號增封王貝勒等爵共為十七旗三十二年以後增至三十五旗雍正年間增至三十八旗尋分二十旗屬於賽音諾顔部此為十八旗乾隆元年以後復增二旗共二十旗於本旗外分十九扎薩克掌之仍統領於土謝圖汗其封爵無定員今為汗一人和碩親王二人多羅郡王一人多羅貝勒一人固山貝子一人輔國公七人一等台吉八人喀爾喀東路車臣汗部駐克魯倫河左右境東至庫倫諾爾接黑龍江將軍地界西至察罕齊老山接土謝圖汗部界南至瀚海接阿巴哈納爾阿巴噶諸部界北至俄羅斯國界康熙二十八年故車臣汗阿拉布坦之子烏巴什率其部衆來降三十年許仍其舊號增封王貝勒等爵共為十二旗三十五年以後增至二十一旗乾隆十四年增一旗二十二年又增一旗共二十三旗於本旗外分二十二扎薩克掌之仍統領於車臣汗其封爵無定員今為汗一人和碩親王一人多羅郡王一人多羅貝勒二人固山貝子二人鎮國公三人輔國公三人一等台吉十三人喀爾喀西路扎薩克圖汗部駐杭愛山左右境東至鄂爾渾河接賽音諾顔部界西至塔爾巴哈台山接西域新疆界南至賀蘭山厄魯特界北至俄羅斯國界康熙二十八年扎薩克圖汗兵敗為噶爾丹所害三十年其弟䇿旺扎卜率其部衆來降初封為和碩親王後仍許其襲扎薩克圖汗之號增封貝勒等爵共為八旗三十三年以後增至十二旗雍正年間增至十五旗乾隆十三年增一旗二十二年又增一旗共十七旗於本旗外分十六扎薩克掌之仍統領於扎薩克圖汗其封爵無定員今為汗一人多羅貝勒一人鎮國公三人輔國公六人一等台吉九人喀爾喀賽音諾顔扎薩克親王部駐翁金河北境東至土謝圖汗部界西至扎薩克圖汗部界南至茂明安烏喇特諸部界北至俄羅斯國界初喀爾喀內附時有信順額爾克戴青諾顔善巴自為一部及固倫額駙䇿凌征準噶爾有功於雍正元年封多羅郡王九年晉封和碩親王授為大扎薩克十年賜號超勇親王於土謝圖汗部內分轄二十旗乾隆元年以後復增二旗共二十二旗於本旗外分二十一扎薩克掌之仍統領於大扎薩克親王其封爵無定員今為大扎薩克和碩親王一人和碩親王一人多羅郡王二人世子一人多羅貝勒二人鎮國公二人輔國公八人一等台吉九人附駐牧喀爾喀境內厄魯特烏蘭烏蘇厄魯特部共二旗其一旗舊駐喀爾喀河康熙二十五年準噶爾綽羅斯部台吉阿拉布坦來降封為郡王後傳至其子朋楚克降襲貝子乾隆二十六年移駐鄂爾坤之烏蘭烏蘇地方其一旗舊駐達拉爾河康熙二十五年準噶爾綽羅斯部台吉丹濟拉來降封為輔國公後其子多爾濟色布騰晉封貝子乾隆二十六年移駐烏蘭烏蘇地方臣等謹按烏蘭烏蘇厄魯特二旗屬喀爾喀賽音諾顔部管轄其駐牧地即在賽音諾顔疆理內賀蘭山厄魯特臣等謹按厄魯特部種類各殊在國初時駐牧河套西者謂之套夷駐牧青海者謂之西海諸台吉其駐牧天山北境者謂之北厄魯特各有部長當青海盛時並統屬於顧實汗其後青海套西二部並來歸順其北厄魯特恃其荒逺終於覆滅惟其部衆之先來降附者在青海境則有遊牧之綽羅斯輝特土爾扈特各旗在喀爾喀境則有烏蘭烏蘇厄魯特旗在西域新疆境則有都爾伯特旗皆北厄魯特之裔云賀蘭山厄魯特在河套以西東至寧夏府邊外界西至甘州府邊外界南至邊墻北至瀚海接喀爾喀界至京師五千里漢北地郡西境及武威張掖二郡北境地晉時為前涼張軌後涼吕光北涼沮渠蒙遜所有唐時屬河西節度使廣德初入於吐蕃宋景德中入於西夏元屬甘肅行中書省明為邊外地國初有厄魯特部落駐牧套西稱為套夷其部長鄂齊爾圖汗及阿巴賴諾顔隨顧實汗內附於順治四年即遣使入貢嗣是朝貢不絶後噶爾丹強盛侵併套夷害鄂齊爾圖汗其孫濟農巴圖爾額爾克等竄至近邊於康熙二十五年上書求給牧地詔於寧夏甘州邊外畫界給之自寧夏所屬玉泉營以西至賀蘭山隂自甘州所屬鎮畨塞口以北至額濟內河俱以離邊六十里為界三十六年奏願以所部編置佐領為旗一其封爵無定員今為親王一人鎮國公二人賀蘭山厄魯特部駐賀蘭山之博羅沖竒克地方康熙三十六年封巴圖爾額爾克為多羅貝勒後其子阿寶晉封郡王其孫羅卜藏多爾濟仍襲貝勒乾隆二十二年以功復封多羅郡王三十年晉封親王世襲掌本旗扎薩克事額濟內土爾扈特臣等謹按土爾扈特之本國在西北極邊本準噶爾四衛拉特之一與準噶爾有隙遂徙國與俄羅斯接境康熙年間其國王阿貴齊之弟阿拉布珠爾自西藏還以準噶爾道梗不能歸遂乞內屬今居甘肅邊外自為一部云額濟內土爾扈特東至古爾鼐西至肅州邊外南至三岔河北至坤都楞河至京師五千里漢武威張掖二部北境唐入吐蕃宋入西夏元屬甘肅行省明為邊外地本朝康熙四十三年土爾扈特部阿拉布珠爾來降於甘肅邊外給與牧地後編為一旗其封爵為貝勒一人臣等謹按額濟內土爾扈特部與賀蘭山厄魯特部疆理相接其境內山川不别載額濟內土爾扈特部駐額濟內河之黨色爾騰地方康熙四十三年封阿拉布珠爾為固山貝子其子旦永於雍正七年晉封為多羅貝勒世襲掌本旗扎薩克事青海臣等謹按禹貢雍州終之以西戎即敘孔傳謂在荒服之外流沙之內羌髳之屬鄭康成以為衣皮之民居於崑崙析支渠搜之野者皆西戎也諸儒以崑崙為在臨羌西以析支為在河關西皆在今西寧邊外然則青海之地固為當日雍州西徼矣周秦以還諸羌繁衍罕歸聲教厥後一變而為吐谷渾再變而為吐蕃至明代入於蒙古而後復為厄魯特所有部落之居此者已經屢易我國家開創之初其部顧實汗即輸誠歸附逮雍正初年平定青海編旗之後餘衆畏服朝貢惟謹實與內扎薩克相等抑又論之青海介處西陲鄰接甘肅全境自漢置河西四郡史稱其隔絶南羌為斷胸奴右臂明初建重鎮於甘肅以北拒韃靼南捍諸番中葉以後北部得越境闌入與番族相通遂世為邊患聖朝威武丕彰撫有萬宇若北部之四十九旗久歸臣僕至於安西境外地盡西蒙所謂河西諸郡已為甘肅之內地長駕逺馭之略固非前代之規模所得擬其萬一者也青海古曰西海東至甘肅西寧洮岷邊境西至西藏南至四川松潘界北至甘肅安西府界袤延二千餘里至京師五千七十里本禹貢西戎地夏殷周皆屬西羌漢為武威張掖金城隴西四郡之西徼外及蜀郡之北徼外屬先零燒當等諸羌地王莽時置西海郡歷後漢魏晉皆諸戎所居東晉以後又為吐谷渾所據隋大業五年平吐谷渾置西海河源等郡隋末吐谷渾復據其地唐初擊破之龍朔三年吐蕃滅吐谷渾盡有其地宋亦為吐蕃地元置吐蕃宣慰司於河州又封駙馬章古為郡王鎮西寧並統治畨衆明為西畨地洪武初遣官招諭凡西寧河州諸衛指揮僉事等官並即以畨酋為之以畨地産馬嵗與之互市其後又以畨僧入貢加以國師禪師等封號永樂以後諸番僧及諸衛番族各許其嵗時朝貢西番之勢益分率不相統屬正德四年有蒙古部酋額布勒等襲破青海番人多逼徙其留者不能自存反為所役屬屢為甘肅西寧邊患名曰海冦嘉靖時額布勒為河套酋濟農所破收其部落大半而去惟布爾噶一部斂衆自保其後北部諳達又貪青海饒富襲據其地布爾噶竄走已而諳達引去留其子丙圖居青海隆慶中諳達受封順義王西寧亦安自丙圖據青海後諳達之從孫車臣台吉及兄子永邵卜等同居之萬歷中又時時犯邊後漸衰弱國初有厄魯特顧實汗者自西北侵有其地於崇德二年即遣使修貢嗣是朝貢不絶順治十年詔封為遵文行義敏慧顧實汗其後顧實汗之子留駐西藏為汗於青海不復稱汗自分其地為左右二境部落散處其間謂之西海諸台吉康熙三十六年既平噶爾丹青海台吉扎什巴圖爾等咸內附封以王貝勒貝子公台吉等爵並世襲雍正元年扎什巴圖爾之子羅卜藏丹津誘衆犯邊世宗憲皇帝命官兵進勦平定其地惟不從逆者仍其封號以軍功增封世爵三年於各部落編設旗分自青海厄魯特外為遊牧之綽羅斯輝特土爾扈特喀爾喀皆分置佐領共為旗二十有八乾隆十一年增設一旗又有大喇嘛察罕諾們汗所屬蒙古分為四佐領不統於各旗即令喇嘛管轄其封爵朝貢隸於理藩院之典屬司及柔逺司凡簡稽軍實巡閲邊防之事設西寧駐劄大臣以經理之置互市於西寧之地其朝覲貢道由西寧分為三班恭載世宗憲皇帝御製平定青海告成太學碑文我國家受天眷命撫臨八極日月所照罔不臣順遐邇乂安兆人蒙福乃有羅卜藏丹津者其先世顧實汗自國初稽首歸命當時使臣建議卑以駐牧之地其居雜番羌密近甘涼我皇考聖祖仁皇帝睿慮深逺每厪於懷既親御六師平定朔漠威靈所加青海部落扎什巴圖爾等震讋承命聖祖仁皇帝因沛殊恩封為親王兄弟八人咸賜爵祿羈縻包容示以寬大而狼心梟性不可以德義化三十年來包藏異志朕紹登寶位優之錫賚榮其封號尚冀克輯寧部衆而羅卜藏丹津昏謬狂悖同黨吹拉克諾木齊阿爾布坦溫布藏巴扎布等實為元惡謂國家方宏浩蕩之恩不設嚴密之備誕敢首造逆謀迫脅番羌侵犯邊城反狀彰露用不可釋於天誅遂令川陜總督太保公年羮堯為撫逺大將軍聲罪致討以雍正元年十月師始出塞自冬涉春屢破其衆凡同叛之部落戈鋋所指應時摧敗招降數十萬衆又降其貝勒貝子公台吉等二十餘人朕猶憫其愚蠢若悔禍思愆束手來歸尚可全宥而怙惡不悛負險抗違乃決剪滅之計以方略密付大將軍羮堯調度軍謀簡稽將士用四川提督嶽鍾琪為奮威將軍於仲春初旬禡牙徂征分道深入搗其窟穴電掃風驅搜剔巖阻賊徒倉皇糜潰窮蹙失據羅卜藏丹津之母及逆謀渠魁悉就俘執擒獲賊衆纍萬牲牽軍械不可數計賊首逃遁我師逾險窮追獲其輜重人口殆盡羅卜藏丹津孑身易服竄匿荒山殘喘待斃自二月八日至二十有二日僅旬有五日軍士無久役之勞內地無轉輸之費克奏敷功永清西徼三月之朔奏凱旋旅鐃鼓喧轟士衆欣喜四月十有二日以唱逆之吹拉克諾木齊等三人獻俘廟社受俘之日臣民稱慶伏念聖祖仁皇帝威靈震於遐方福慶流於奕業用克張皇六師殄滅狂賊行間將士亦由感激湛恩厚澤為朕踴躍用命斯役也芟夷凶悖綏靖番羌俾烽燧永息中外人民胥享安阜實成先志以懋有丕績廷臣上言稽古典禮出征而受成於學所以定兵謀也獻馘而設奠於學所以告凱捷也宜刋諸珉石揭於太學用昭示於無極遂為之銘曰天有雷霆聖作弧矢輔仁而行威逺寧邇維兹青海種類實繁錫之茅土列在藩垣被我寵光位崇祿富負其阻遐禍心潛搆恭惟聖祖慮逺智周眷念荒服綏撫懷柔朔野既清西陲攸震爵號洊加示之恩信如何凶狡造謀逆天鼓動昏憝冦侵於邊惟彼有罪自干天罰桓桓虎貔爰張九伐王師即路冬雪初零日耀組練雪響鼙鉦蠢兹不順敢逆戎旅奮張螳臂以當齊斧止如山嶽疾如雨風我戰則克賊壘其空彼昏終迷曾不悔戾當剪而滅斯焉決計厲兵簡將往搗其巢踰歷嶔嶇坦若坰郊賊棄其家我縶而獲牛馬谷量器仗山積蹇失窟何所逋逃枯魚遊釡假息煎熬師以順動神明所福旬日凱歸不疾而速殪彼逆謀懸首藁街獻俘成禮金鼓調諧西域所贍此惟雄特天討既申羣酋惕息櫜戈偃革告成辟雍聲教遐暨萬國來同惟我聖祖親平大漠巍功煥文邁桓軼酌流光悠久視此銘辭繼志述事念兹在兹青海厄魯特部本顧實汗之後康熙三十六年諸台吉內附授以封爵雍正元年以羅卜藏丹津叛逆出師平定三年編為二十旗乾隆十一年增設一旗共為旗二十有一各設扎薩克掌之其封爵為親王一人郡王二人貝勒一人貝子三人鎮國公一人輔國公二人一等台吉十一人其遊牧地諸部散處不分畛域青海遊牧綽羅斯部本準噶爾綽羅斯部台吉為噶爾丹之族遊牧青海地方舉所部來降雍正三年編為二旗各設扎薩克掌之其封爵為郡王一人輔國公一人青海遊牧輝特部本準噶爾輝特部台吉遊牧青海地方舉所部來降雍正三年編為一旗設扎薩克掌之其封爵為輔國公一人青海遊牧土爾扈特部本準噶爾土爾扈特部台吉遊牧青海地方舉所部來降雍正三年編為四旗各設扎薩克掌之其封爵為一等台吉四人青海遊牧喀爾喀部本喀爾喀台吉遊牧青海地方舉所部來降雍正三年編為一旗設扎薩克掌之其封爵為一等台吉一人西藏臣等謹按吐蕃之部通自唐時史稱其國西南與婆羅門接壤則其俗之信奉釋教固宜也元時西藏之地皆領於番僧若大寶法王帝師之號尊禮特殊明代因之自宗喀巴肇興黃教數傳之後為諸畨所尊信於是有達賴喇嘛班禪喇嘛更在各番王之上自本朝崇德年間謂東土有聖人即遣使經數國之地踰年而至當大統之方集識歸化之獨先國家以其恭順有年錫之封號俾得以世次相繼逮康熙年間為準夷侵擾經王師平定以來藏地諸番皆登樂土於焉闡揚善教同我太平所謂因其教不易其俗齊其政不易其宜者蓋懷柔撫馭之道即於是寓焉矣西藏在四川雲南徼外東西六千四百餘里南北六千五百餘里東至四川界東南至雲南界西至大沙海北至青海界至京師一萬四千餘里古西南徼外諸羌戎地兩漢魏晉間種落無聞自吐蕃始祖鶻提勃窣野居析支水西並諸羌據其地歷周及隋猶未通中國其君長稱為贊布唐貞觀八年始遣使來朝十五年妻以宗室女文成公主既而滅吐谷渾盡臣羊同黨項諸羌幅員萬餘里唐末漸衰弱宋時亦號吐蕃朝貢不絶元憲宗始於河州置吐蕃宣慰司都元帥府又於四川徼外置碉門魚通黎雅長河西寧等處宣撫司世祖時置烏思藏以吐蕃僧帕克斯巴為大寶法王帝師領之嗣者數世其弟子號司空司徒國公皆佩金玉印明洪武六年以攝帝師拉木監巴藏卜為熾盛佛寶國師給玉印置烏思藏朵甘二指揮司又置宣慰司三招討司六萬户府四千户所十七以元國公那木喀思丹巴監藏等為都指揮同知宣慰使元帥招討等官永樂中復封番僧為大寶法王大乘法王大慈法王闡化王贊善王闡教王輔教王護教王凡八王並給印誥比嵗或間嵗朝貢其徒以次封西天佛子大國師國師禪師諸號者不可勝紀明之中葉有宗喀巴者居拉薩始興黃帽之教相傳其二世始立第巴以治國事其三世始稱達賴喇嘛有異術能知三生事諸番莫不從其教正德時遣中使至其地往迎所謂活佛者所費以巨萬計其僧卒匿不出見所攜寶貨器械皆為番人所奪其後達賴喇嘛與班禪喇嘛並為諸番所奉凡大寶法王及闡化諸王亦皆俯首稱弟子本朝崇德七年達賴喇嘛首先入貢至順治九年來朝十年世祖章皇帝賜以金印遣使封為西天大善自在佛領天下釋教普通斡齊喇達喇達賴喇嘛嗣後與班禪喇嘛各遣使貢獻不絶其部落號圖伯特前藏則達賴喇嘛主之後藏則班禪喇嘛主之其代喇嘛理事者曰第巴又有汗則蒙古部長為之康熙初年有藏地之藏巴汗威虐部下第巴乞師於青海顧實汗擊破之遂留其長子達賴為汗三十二年封第巴為圖伯特國王賜金印時達賴喇嘛已殁第巴匿不以聞潛與厄魯特噶爾丹相通及召班禪喇嘛來京第巴又阻之不至四十四年達賴汗之子拉藏誅第巴以聞聖祖嘉之賜金册印封為輔教恭順汗遣大臣安撫其地復立第六世達賴喇嘛五十二年封班禪胡圖克圖為班禪額爾德尼依達賴喇嘛之例錫以册印五十三年準噶爾䇿妄阿喇布坦興師侵藏害拉藏汗焚毁寺廟迫逐僧衆五十八年遣大兵討平之世宗憲皇帝嗣位撤回官兵封康濟鼐為貝子總理其地雍正五年西藏噶隆阿爾布巴等叛殺康濟鼐後藏辦理噶隆事務之扎薩克台吉頗羅鼐走避以聞遣兵進𠞰明年頗羅鼐率衆部落入藏阿爾布巴等伏誅藏地安輯如故封頗羅鼐為固山貝子九年晉封多羅貝勒辦理衛藏噶隆事務乾隆四年晉封多羅郡王給印轄衛藏等處十二年其子珠爾默特那木扎爾襲封十五年以謀逆伏誅今設輔國公三人一等台吉一人並因其俗設噶隆第巴等職其地有四曰衛曰藏其東境曰喀木其西境曰阿里共轄城六十餘衛與喀木諸城皆統屬於達賴喇嘛藏與阿里諸城皆統屬於班禪喇嘛别設駐藏大臣二人鎮撫其地封爵承襲及入貢之事𨽻於理藩院之典屬司及柔逺司置互市於四川西徼打箭爐之地其貢道由打箭爐分為二班凡喇嘛道行最髙者曰胡土克圖轉世者曰呼畢爾罕其秩之貴者曰國師曰禪師次曰扎薩克大喇嘛曰扎薩克喇嘛又次曰大喇嘛曰副喇嘛自扎薩克喇嘛以上皆頒給印信其徒之分處喀爾喀及內扎薩克部落者皆為蒙古所尊奉仍遙屬於達賴喇嘛班禪喇嘛恭載聖祖仁皇帝御製平定西藏勒銘碑文昔者太宗文皇帝之崇德七年班禪額爾德尼達賴喇嘛顧實汗謂東土有聖人出特遣使自人迹不至之區經讐敵之國閲數年始達盛京至今八十載同行善事俱為施主頗極安寧後達賴喇嘛之殁第巴隱匿不奏者十有六年任意妄行拉藏滅之復興其法因而允從拉藏庫克淖爾羣衆公同之請中間䇿妄阿喇布坦妄生事端動準噶爾之衆肆行姦詐滅壞達賴喇嘛並廢第五輩達賴之塔辱衊班禪毁壞寺廟殺戮喇嘛名為興法而實滅之且欲竊據圖伯特國朕以其所為非法爰命皇子為大將軍王又遣朕子孫等調發滿洲蒙古緑旗兵各數萬歷煙瘴之地士馬安然而至賊衆三次乘夜盜營我兵奮勇擊殺賊皆喪膽逺遁一矢不發平定西藏振興法教賜今呼畢爾罕册印封為第六輩達賴喇嘛安置禪榻撫綏圖伯特僧俗人衆各復生業於是文武臣工咸謂王師西討歷瘴癘險逺之區曾未半載輒建殊勳實從古所未有而諸蒙古部落及圖伯特酋長亦合詞奏曰皇帝勇略神武超越往代天兵所臨邪魔掃蕩復興蒙古向所尊奉法教喀木藏衛等部人衆咸得拔離湯火樂土安居如此盛德大業非臣下頌揚所能宣罄請賜御製碑文鐫勒招地以垂永久爰紀斯文立石西藏俾中外知達賴喇嘛等三朝恭順之誠諸部落纍世崇奉法教之意朕之此舉所以除逆撫順綏衆興教云爾衛在四川打箭爐西北三千餘里即烏思藏居諸藏之中亦曰中藏東自穆魯烏蘇西岸青海部落界西至噶木巴拉嶺藏界一千五百三十三里南自鄂木拉岡沖嶺北至崖魯藏博江二千二百餘里衛地所屬諸城拉薩城在打箭爐西北三千四百八十里即唐吐蕃建牙之所今為達賴喇嘛所居德沁城在拉薩東南三十八里耨東城在拉薩東南二百二十里桑里城在拉薩東南二百五十一里吹扎爾普朗城在拉薩東南二百六十里恪噶爾城在拉薩東南三百里里古城在拉薩東南三百十里裕勒佳阿雜城在拉薩東南三百三十里濟古城在拉薩東南三百四十里捫磋納城在拉薩東南四百四十里拉巴隨城在拉薩東南四百四十里佳木達城在拉薩東五百四十里達木城在拉薩東南五百六十里衮米納木佳勒城在拉薩東南六百二十里碩勒噶城在拉薩東南六百四十里卓莫城在拉薩東南七百五十里多木純城在拉薩東南七百七十里則布拉岡城在拉薩東南八百七十里達克博奈城在拉薩東南九百六十里德摩城在拉薩東南九百八十里東噶爾城在拉薩西二十五里日噶努布城在拉薩西南三十里楚舒爾城在拉薩西南一百十五里日噶公噶爾城在拉薩西南一百四十里雅爾博魯克勒巴底城在拉薩西南三百里多城在拉薩西南四百二十里僧格城在拉薩西南四百三十里得巴達克則城在拉薩東北九十二里倫珠布城在拉薩東北一百二十里薩木珠布公喀爾城在拉薩東北一百五十里盆多城在拉薩東北一百五十里臣等謹按西藏之俗凡有官舍民居之處建造樓居依山為塹即謂之城量地之大小人之多寡各設宗布木管理民事設丁布木管理兵丁藏在衛西南五百餘里東自噶木巴拉嶺衛界西至瑪爾嶽木嶺阿里界一千八百八十二里南自坡巴朗城之扎木拉嶺北至們巴部落之北達魯克裕木磋淖爾一千三百餘里藏地所屬諸城扎什倫博城在拉薩西南五百六十里其先藏巴汗居此今為班禪喇嘛所居日喀資城在扎什倫博東三十里林綳城在扎什倫博東二百二十里納噶爾城在扎什倫博東二百八十里堆朋城在扎什倫博東三百六十里巴納木城在扎什倫博東八十五里佳勒則城在扎什倫博東南一百二十里烏裕克林噶城在扎什倫博東南三百八十五里定集城在扎什倫博西南三百九