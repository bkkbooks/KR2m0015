body:
  text: 欽定四庫全書皇朝文獻通考卷六十選舉考十四考課雍正元年奉諭旨國家養育人材首重翰苑既讀中祕之書必當立品端方居心敬慎方不愧官針聞有僥幸之徒平昔結黨營私互相援引轉為請託此風甚不可長急當甄别以示勸懲著大學士張鵬翮尚書田從典徐元夢左都御史朱軾侍郎張伯行李級會同滿漢掌院學士將翰林院詹事府等官不安本分有玷官針者勒令解退回籍無得徇情總理事務王大臣等奏準八旗滿洲蒙古漢軍內前鋒護軍另户領催披甲間散人等有能翻譯書寫清字者從前並無升用之路請通行查詢如有長于翻譯書寫清字情願考試者開其人數奏請考試選擇進呈吏兵二部遵旨議奏嗣後大計軍政除卓異八法照舊例舉行外其平等官員文職自知縣以上武職自守備以上俱於大計軍政之年令督撫提鎮注明考語送部察核從之吏部議覆廣西總督孔育珣奏言廣西南太慶思四府缺出舊例將桂平梧潯栁五府屬內人員選擇調補歷俸三年具題報滿今改為揀選之員五年報滿與由部掣選之員仍通省較俸升轉遲速不均請將揀選人員仍照夲省調補之例三年報滿由部掣選者五年報滿應如所請從之議準運辨升調例一守備千總酌量繁簡保題調補一押運千總完運一次二次俱準加銜三次押運全完者準其議敘即升一部發效力武舉領運事竣赴淮考核後咨部推用從漕運總督張大有請也吏部議準內閣滿洲漢軍侍讀學士侍讀中書俱有翻譯之任嗣後侍讀學士缺出請將漢字出身郎中等官俸深者十員考試翻譯選擬正陪題補侍讀缺出將中書內辦事敬慎之員題補中書缺出將本旗進士舉人與現任筆帖式及應升人員內考試翻譯選擬正陪題補舉行軍政考選在京武職官員奉諭旨此係初次考選爾等秉公考驗內有出兵效力行走年老俸深者諸事尚堪坐理仍著留任再人雖年老衰頽不宜留任而出兵效力之處甚多將伊即行革退致令無以度日深屬可憫應另行分晰具奏朕自加恩其雖無效力行間之處而供職年久者伊等身逢太平之世何由經歷戰陳爾等亦宜留心驗看二年奉諭旨三年一次舉行大計軍政此內有應革職者若俟部議具題奉旨之後方行解任其地方逺者為日甚久劣員預知被革恐其恣肆妄為嗣後舉行大計軍政之時有應革職者即令解任若具題之後或應免其革職者仍可再行補授奉諭旨嗣後文官在軍前效力者即著兵部議敘永著為例兵部奉諭旨各省副將以下遊擊以上官貟除地方有緊要事及曾經引見之貟外將人材可觀素有聲名者每省陸續保送輪流來京朕親視其漢仗弓馬即可知其優劣至伊等操守如何訓練如何之處各省將軍督撫提鎮於咨部引見時據實密奏三年吏部奏請差湖南山東學政得旨從前學政主考皆就其為人謹慎者泒往並未考試文藝其中竟有不能衡文者著查奏應差之翰林並進士出身之各部院官貟俟朕試以文藝再行差委至三月考試於太和殿奉諭旨保舉卓異乃該旗大貟要務非升進官階可比必將漢仗好曾經效力應保之人薦舉方為合宜其人平常不應保者伊等或受請託入於其間朕必將徇情薦舉之人治罪吏部議覆左都御史江球條奏考試月官履歷摺子止須簡明直敘無用繁冗履歷之後請增一條議以觀其才識應如所請從之兵部奉諭旨部院官之兼武職者但由該旗保舉其在部院衙門行走如何之處該旗大臣並不得知俱令部院衙門於京察時察核左都御史尹泰奏言定例監察御史試俸一年不稱職者以按察司經歷改補請嗣後一年限滿未能深信者再試一年庶賢否可以詳察從之議準功加辨員分别録用是時以功加人員甚多遊擊都司守備不能盡補遇該省有把總缺出準其三缺內將功加人貟補用一貟又覆準功加人員既有職銜不便令千把管轄該督撫提鎮收入標下效力差操給與兵糧如果差操勤慎給與外委把總名色率兵巡防地方以觀後效再令督撫提鎮會同考驗分為三等其人材超羣技藝純熟或經血戰帶傷者為第一等保題送部引見以應得之缺用候缺之際或令侍衛上行走或發巡捕營當差其人材技藝尚屬可觀者為第二等造册報部以把總用如技藝精熟許再保題引見以應得之缺用其技藝尚須學習營伍尚未諳練可以保題者亦許其保題可以拔補把總者許其拔補至功加人員內現任之千把總有人材超羣技藝純熟者概不論俸令其保題引見以應得之缺用稍次者千總六年俸滿以守備用仍帶功加職銜把總照常拔補千總其人材弓馬不堪録用者咨部注册飭考試月官摺子密封進呈選人得缺之後順治年間令吏部當堂考其身言糊名考其書判分為三等進士舉貢不論甲第考案前後總以考試等第為次其法未久輒停至康熙年間令寫履歷以三百字為限又有九卿驗看之例月官內有行止不端出身不正者各據見聞陳奏後又定月選各官所得地方繁簡難易必預為籌畫何以治民何以厚俗以及催科撫字之術讞獄聽訟之方令各出己見詳陳一二事於繕寫履歷之後以觀其才識其補任升任之貟令其將舊任地方利弊明白敷陳至是奉諭旨月官條奏原欲觀其人之存心今漸有將地方關係事務條奏者伊等新進小臣恐或受人囑託或將條奏事件在外聲揚以沽虗名或刻入文集此等情弊一經查出必治以重罪爾等即明白傳諭嗣後月官考試履歷令其密封進呈吏部右侍郎福敏條奏官貟升任時其不隨帶之加級漢官每一級例改紀録一次滿官無改紀録之例一概削去請嗣後亦照例遵行以昭畫一從之吏部都察院奉諭旨安民必先弭盜盜風不息皆由有司官諱盜不報之故不但江南地方盜賊素多近聞河南湖廣路上有過往官貟被劫者州縣官賄賂事主通同隱匿司道既無覺察督撫亦受蒙蔽以致盜賊無忌貽害不小不可不嚴行稽察朕思巡按御史久經裁汰自不可復今或於滿漢御史內揀選賢貟酌量於湖廣江南浙江福建山東河南等處每省各差二員或一員或兩省差一員兼理令其専司稽察盜賊併巡查驛站煙燉倘有縱容盜賊隱諱不報者許據實題參一切地方事宜差貟不得干預若生事滋擾從重治罪奉諭旨朕體恤臣工凡官貟辦事著有勞績者無論大小俱敕部議敘其有過誤致干例議者亦照例處分夫一人之身有功有過一官之級有降有加舊例官貟降級留任停其升轉必三年無過方準開復降級後雖有恩詔加級不準抵銷殊非以功補過開人自新之路嗣後降級留任官貟遇有恩詔其議敘加級者俱準以加一級抵銷降一級庶使人皆奮勵勉圖後效亦鼓舞吏治之一道也至於降級後捐納加級者不得抵銷前案四年奉諭旨部院大臣以司官為臂指今各部院司官筆帖式內有行走懶惰經年不到衙門者有庸劣不能辦事者有不能寫字雇人翻譯者有奔競鑽營招搖生事者其本衙門堂官不能盡知即有見聞或因瞻徇掣肘姑且優容今著爾等司官將本司之筆帖式分别勤惰優劣據實奏明所舉當否許筆帖式公同面質吏部議定計典官貟除貪酷外其參劾等官交代清楚給咨赴部引見慮有寃抑及避重就輕等弊也其舉薦卓異官貟吏部會同都察院考核合例者引見如果才品兼優準卓異注册回任候升降級罰俸者不準卓異奉諭旨倉差甚有關係小京官未有人御史亦有職掌漢監督著將候補候選道府同知知州有情願效力者報名吏部户部會同九卿揀選引見如任內果能效力以應升之缺即用滿監督著部院挑選筆帖式保送引見如能實心效力以主事即用若係中等仍留原職下等者革退奉諭旨嗣後遇京察之年著內閣滿漢大學士吏部都察院吏科河南道公同閲看著為例吏部兵部奉諭旨凡因寃抑被參復職者皆係朕特恩超拔之人該貟自應益加奮勉以報格外之恩嗣後此等人員除因公詿誤外若居官仍有貪酷不法者應重治罪題參虧空革職之貟補完開復與捐復者亦如之著行文各直省將軍督撫提鎮一體遵行定隨征護衛官貟議敘例原任長史額爾德黑曾在軍前立功未經議敘伊子噶爾弼請辭本身進藏議敘追請諡法下部定議尋議向例隨王等出征護衛人貟功册無名嗣後應令領兵將軍將功績據實造册報部分别等次照出征官兵議敘如有遺漏及冒開者將該將軍題參治罪奉諭旨居官立身之道自以操守清亷為本但封疆大吏職任甚巨洪範所稱冇猷有為有守三者並重則是操守者不過居官之一節耳安民察吏興利除弊其道多端倘但恃其操守博取名譽而悠悠忽忽於地方事務不能整飭經理茍且塞責姑息飬姦貽害甚大蓋此等清官無所取於民而善良者感之不能禁民之為非而豪強者頌之故百姓之賢不肖皆稱之無所取於屬貟亦不能禁屬貟之不法故屬貟之賢不肖者皆安之大臣之子弟親戚犯法則姑容而不行參革地方之強紳劣襟生事則寬待而不加約束故大臣紳襟皆言其和平而望其久留甚至胥吏作姦而不能懲盜賊肆行而不能察故自胥吏至於盜賊皆樂其安靜而不欲其去任及至事務廢弛朝廷訪聞加以譴責罷斥而地方官民人等羣然歎息以為去一清亷上司為之稱屈此則平日模稜悅衆違道干譽之所致也且操守平常者其心既不敢自恃心懷畏懼頗能整頓經理事務不致曠廢朝廷又時時留心訪察一有不善即加懲戒而在朝之官貟及伊屬下之官吏紳襟人等皆伺察其過不肯為之隱諱是以此等之人貽纍於地方者尚輕而潔已沽譽之巧官貽纍於地方者更甚朕深望爾等為明體達用之全材而深惜爾等為同流合俗之鄉願勉之勉之奉諭旨古者射御居六藝之中聖人所重本朝開國以來騎射精熟歷代罕有倫比旗人凡少長貴賤皆專心練習未有一人不嫻熟弓馬者士之應試必先試其騎射合式方準入闈蓋恐其専習文藝或致騎射生疏故先以此試之即今部院堂司官亦每月如期在本旗教場該管都統佐領看練弓馬所謂有文事者必有武備創制立法之意誠深逺也近來文官外任之人漸不習於騎射若聽其因循怠惰將來必致騎射生疏豈國家創制立法之意乎凡旗人外任文官六十歲以下者該督撫即行參劾若督撫徇隱經朕察知將督撫一併治罪內閣奉諭旨向來邊省地方或煙瘴難居或苗蠻頑桀官斯土者與內地不同是以邊俸較腹俸之升為最速今太平日久亦有煙瘴漸消風俗漸淳之處仍照舊例題補升轉亦覺太濫著九卿將各邊俸之缺或係瘴癘未除宜令督撫等題補或係風氣已轉可照內地選用至文武原屬一例武職官貟亦應照文官遷轉之例著一併議奏尋議凡文武邊俸非保題調補之缺俱與內地一體較俸升轉從之奉諭旨月選各官考試履歷條奏原以觀其學識即知將來之趨向今考試各官內將所進履歷條奏詢問本人竟有不能奏對者明係倩人代作甚屬不合嗣後如有預倩親友代作者一經查出將代作之人與本人俱以違旨例治罪九卿等奉諭旨各部漢司官實能辦事者不過一二人其餘庸碌無能之人偷惰安間實屬冗濫朕即位以來其賢能司官或升道府或選科道擢用甚衆而平庸之人若一概升用必致曠官廢事然尚不忍多行黜退蓋以各司人衆兼有堂官辦理事無貽悮故今春京察止將甚不堪者革退數人其餘概為優容此朕寬大之恩也乃汪景祺查嗣庭等妄謂郎中貟外主事等官壅滯不得升轉至有白首為郎十年不調等語此必司官中有不感朕寬容之恩而以不得升用私相怨望者此等之人既不能為國家效力而反以不得即升為怨又復多占貟缺阻塞後人升補之路甚非整飭官方之道著各部堂官將所屬司官詳加甄别有才具平常目前不能辦事將來不堪升用者盡行舉出與應留辦事人貟一同帶領引見請旨各部堂官不得瞻徇情面稍有容隱奉諭旨向來革職留任官貟從前無開復之例但年久奉職無愆亦應示以鼓勵嗣後革職留任之員如四年無過該督撫等題明準其開復著為例定各省教職考課例凡補用教職例由撫臣考校其考試四等五等者俱令解任學習三年再行考試六等者革職所屬文武生貟抗欠錢糧揑詞唆訟該教官不行申詳縱容徇庇者革職如六年之內士子無前項過犯該督撫學臣將該教官保題以應升之缺即用五年奉諭旨向例千把總俱由督撫提鎮拔補往往以其家人長隨及私自效力請托夤緣之人補用而兵丁內年力精壯技勇可觀者轉不能得一官職甚為可憫千把總為行伍出身之途若聽其因循冒濫何以整飭戎政今定半年之限令該督撫提鎮將所轄千把總內凡有老弱不堪不能稱職者秉公細加看驗考試盡行沙汰不可姑容一人其所出之缺從公選擇拔補不得仍蹈故習奉諭旨漢司官屢經侍班朕得以認識滿司官中有不甚認識者嗣後凡遇御門理事之日著滿司官四員漢司官四員一體輪流侍班引見若有條奏之事即於侍班時密封具奏止許條陳一事不得以數事並奏如此則司官之賢否優劣可知矣奉諭旨各省副將參將著該省之督撫提鎮會同分别列為一等二等三等出具考語密咨兵部添寫履歷年齒鄉貫繕寫進呈副將參將中有經特用及該上司題升者亦仍分别等次出具考語一體咨部奉諭旨朕因盛京各官習氣不好是以揀選京貟調補原欲其悉心辦理事務若到任未久即以京城貟缺升用於盛京部務無益嗣後由京補授盛京滿漢司官歷俸三年方行升轉如三年內遇伊應升之時爾部奏聞以升銜留任仍以升銜較俸六年奉諭旨據山西太原總兵袁立松奏稱平垣營守備梁玉年已六十八歲雖干八法而精力不衰且操守亷潔辦事敏練等語夫八法內開列年老者蓋謂其衰老不能辦事故令罷斥並非限定年逾若干即入於八法之內若限定年歲以為處分則年齒未老而早衰不能辦事者又將姑容之乎况年老諳練事務之人尤為難得倘精力可用該上司當優待以為後進之表式今袁立松將伊填入八法參劾之內殊非體朕愛惜人才之意梁玉著仍留原任并令袁立松酌量梁玉既年老歷練若可勝遊擊之任遇有缺出著即題補奉諭旨國家舉行大計乃三年考績之大典其中卓異人員皆加以特恩不次擢用誠以該管上司為國家薦拔人材必深知灼見然後列為卓異斷非徇私受託草率冒濫以負國恩而辱巨典而到任未久之上司不能深知屬員之賢否又準其題請展限以俟確訪如此則屬員人品之邪正自無有不能辨晰之理乃見從前卓異之員而後任內竟至貪贓枉法罹於重罪夫以三年之久數百屬員之多保舉數人以光大典則非一時應詔薦舉可比也其人既犯貪贓枉法之條則平日必係行止姦邪之輩又非尋常詿誤及才力不及之類可比也督撫提鎮等專以察吏為務而乃以此等之人列為卓異及至敗露之後尚可藉口於知人之不易不能保其將來乎此等若不定以處分恐相沿日久必有濫舉失實之弊嗣後文武卓異官員有犯贓不法之款而審訊確實者將從前列為卓異之上司一并議處倘於該員未敗露之先有能查出參奏者免其處分其如何定例之處著九卿詳議具奏尋議嗣後文武卓異之員原任內有濫行貪酷不法之處原薦舉卓異之上司不行揭報題參者督撫提鎮降五級調用司道府副將遊擊等均行革職若文武官貟卓異之後或復回本任或升轉他省别犯貪贓不法之款其原薦舉之各上司分别降級調用不準抵銷從之奉諭旨知府一官管理通郡有察吏之責內有循分供職不能察吏而又素無過犯不至於參劾者著各省督撫甄别具題以在京部屬改補仍令該貟暫留夲任辦事一面於本任同知以下知縣以上等官內揀選能勝知府之任者保題引見如所保人貟可用準其補授俟伊到任後著前任知府交代清楚來京以部屬之缺改用若所保人貟到京引見時朕察其才具亦屬中平則仍將前任知府留於原任各省督撫宜秉公詳擇以副朕澄敘官方之至意定湖廣南北二省千把人貟分𨽻考試舊例湖廣鎮標協標考拔千把先行咨送提督轉送總督再加考試方行補用但湖南湖北路途遙逺又隔洞庭之險微辨往返艱難資斧不易且致久曠泛守嗣後湖北二十四營千把専𨽻總督考定咨知提督俾微辨得省逺行之費而泛守亦不至于久曠若新任總督提督到楚之時南北各標武職等官仍聽總督提督通行調試分别優劣七年奉諭旨士子者百姓所觀瞻士習不端民風何由得厚是以考課士子設立舉優黜劣之典以為移風易俗之道所關亦綦重矣無如教官愚懦無能學臣因循茍且往往視為具文奉行不力每當學臣按試之時教官輒以無優無劣具文申詳草草塞責嗣後若教官沽名邀譽縱容劣生不行舉報者經學臣察出立即指參將教官照溺職例革職若學臣不行糾參一經發覺照徇庇例降級調用著將此永著為例八年奉諭旨朕愛惜人才不忍聽其限於考成遂致放廢而外任各官案件繁多往往易罹參罰是以數年來因公詿誤之貟例應降革者多於覆本之內降旨令該上司出具考語送部引見若其才具稍有可用必再試以職任而成全之雖片善寸長亦不肯輕棄也今思在京部院司官及旗貟等雖參罰之案不多亦有因公詿誤者所當一體加恩豫以贖過自新之路嗣後在京文武各官有因公詿誤至于降革而任內無錢糧不清及治罪之案者準照外貟之例令該堂官該旗大臣出具考語奏聞帶領引見或將該貟仍留原任或另行試用或照例降革候朕降旨定奪大學士等議覆署福建總督阿爾賽疏言臺灣道府廳縣等官舊例到任一年後督撫揀選內地之貟赴臺灣協辦俟半年以後將舊貟調回補用統計前後不過年半而獨當其任者不過半年為期太近該貟未必不以任事不久草率塞責諸務諉延請嗣後調臺各貟俟到任二年該督撫選貟赴臺協辦仍照例於半年後調回舊貟則在臺各貟既得盡心辦事又可免交盤頻疊及草率諉延之弊應如所請從之十二年奉諭旨各省卓異人員俱有現任地方之責每當大計之年理應先行具夲候旨敕交部院查議其與例相符應準卓異者奏聞令其進京引見其與例不符不準卓異者候朕酌量應令引見與否再降諭旨如此則地方事務不致廢弛而與例不符之貟亦不徒費往返將此永著為例正藍旗漢軍副都統祖魯奏言文職旗貟內有才具平庸難勝部屬州縣之任者準以旗缺對品補用但此等人員弓馬既屬生疏旗務又不諳練若非指定銜缺補用恐有任情愛憎髙下其手之弊請敕下該部就其品級擬定銜缺如科道郎中道府等官以副參領公中佐領補用貟外郎同知知州等官以步軍校副佐領補用主事通判知縣等官以驍騎校補用其司道府之首領州縣之佐二以及筆帖式等官俱以副驍騎校補用該旗大臣留心試看其技藝生疏行走怠惰者即行參奏治罪若果奮志黽勉著有勞績一年之後遇有應補缺出據實出具考語與該旗應升之貟擬定正陪引見恭候簡用從之皇朝文獻通考卷六十
