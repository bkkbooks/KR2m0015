body:
  text: 欽定四庫全書皇朝文獻通考卷一百三郊社考十三告祭臣等謹按馬端臨立告祭門於郊社考而告宗廟者亦附載又於後畧述告陵及告岳瀆山川宫觀神祠之儀葢告祭云者因事而告其舉也無常期故别為一門而告郊為告禮之所先系告祭於郊社考義固可順而賅且於宗廟則先事以起例也我國家定制有大典必先期祭告於圜丘方澤太廟奉先殿社稷及陵寢或親詣或遣官列聖以來事天事地事祖之心隨時協宜聿昭誠敬夫固有愈備而愈盛者矣兹恭紀於編至祭告嶽鎮海瀆歴代帝王陵寢先師闕里則自具本門天命元年正月壬申朔太祖高皇帝受覆育列國英明皇帝尊號行焚香告天禮天聰十年四月壬午太宗文皇帝以乙酉受寛温仁聖皇帝尊號建國號曰大清改元崇徳先期祭告天地崇徳元年十一月癸卯以征明克城敗敵遣官祭告太廟是月乙丑冬至以太牢祀天於圜丘並告征朝鮮之由復祭告太廟二年六月丙辰以再征朝鮮臣服其國及克明皮島㨗音親告太廟四年五月乙丑以征明大㨗親告太廟七年七月癸未以克取明錦松塔杏四城並擊敗援兵大㨗遣官祭告太廟八年正月丙申朔太宗文皇帝聖躬違和遣官祭告太廟八月丙戌世祖章皇帝即位遣官祭告圜丘太廟九月辛亥以大行皇帝山陵寳城宫殿告成擇日梓宫發引奉安遣官祭告圜丘太廟順治元年四月甲子以出師征明遣官祭告太廟並告大行皇帝七月癸巳以中原平定遷都於燕遣官祭告圜丘太廟福陵越日甲午月祭大行皇帝並告遷都十月乙卯朔世祖章皇帝登極祭天地太廟社稷是日世祖章皇帝以定鼎燕京親詣南郊祭天地即皇帝位仍用大清國號順治紀元遣官祭告太廟社稷辛酉以恭上大行皇帝尊諡遣官祭告圜丘方澤太廟社稷並祭告大行皇帝甲子以加封宗室諸王遣官祭告太廟十一月甲辰以冬至大祀天於圜丘親詣太廟祗告丁未以南郊禮成還告太廟二年六月己未以平定江南遣官祭告圜丘方澤太廟社稷閏六月辛夘以蕩平流冦遣官祭告三年十一月戊辰以平定浙東全閩遣官祭告四年正月丁卯以平定四川遣官祭告四月丙子以平定廣東遣官祭告右皆如二年六月禮五年十一月乙丑以冬至恭奉太祖武皇帝配享圜丘追尊肇祖原皇帝興祖直皇帝景祖翼皇帝顯祖宣皇帝恭奉神主奉安太廟遣官祭告圜丘方澤太廟社稷七年二月丙戍以恭上大行皇太后尊諡及諏吉發引奉安梓宫於昭陵遣官祭告圜丘方澤太廟社稷八年正月丙寅以恭奉孝端文皇后神主升祔太廟遣官祭告圜丘方澤太廟社稷二月丁亥以親理大政恭上昭聖慈夀皇太后尊號遣官祭告圜丘方澤太廟社稷八月丁巳以大婚遣官祭告圜丘方澤太廟甲子以大婚禮成加上昭聖慈夀皇太后徽號曰昭聖慈夀恭簡皇太后遣官祭告如二月禮後皆同九年十月丙寅以尊封皇考懿靖大貴妃康恵淑妃遣官祭告太廟十年閏六月甲戌以昭聖慈夀恭簡皇太后臨御慈寧宫遣官祭告太廟十一年六月癸酉以册立皇后遣官祭告圜丘方澤太廟己卯以冊立皇后禮成加上昭聖慈夀恭簡皇太后徽號曰昭聖慈夀恭簡安懿皇太后遣官祭告如禮十二年正月丙午以營建乾清宫景仁宫承乾宫永夀宫遣官祭告圜丘方澤太廟社稷十一月己酉祭告圜丘是月乙巳冬至郊祀畢奉諭朕自即位凡郊祀大典必誠必敬問有遣代亦必如禮致齋今冬至祀天遣額爾克戴青恭代但因駐蹕南苑致齋日期爾部未經題明内院諸臣亦未奏知偶失記憶忽然猛省不勝悚惕朕為天之子昭事當䖍既有疎忽何敢自隱即選擇吉日祗申祭告於是以後四日己酉遣官申告十三年七月辛亥以臨御乾清宫遣官祭告圜丘方澤太廟社稷十二月戊寅以冊封皇貴妃遣官祭告太廟丙申以冊封皇貴妃禮成加上昭聖慈夀恭簡安懿皇太后徽號曰昭聖慈夀恭簡安懿章慶皇太后遣官祭告如禮十四年正月丁未以初行祈榖壇禮奉太祖武皇帝配享遣官祭告圜丘方澤社稷戊申遣官祭告太廟庚午以營建奉先殿遣官祭告圜丘方澤太廟社稷三月戊申以恭奉太宗文皇帝配享圜丘祈穀壇遣官祭告圜丘方澤太廟社稷辛亥以恭奉太祖武皇帝太宗文皇帝配享方澤遣官祭告如戊申禮十五年正月以昭聖慈夀恭簡安懿章慶皇太后聖體康豫親行告謝禮先是十四年十二月世祖章皇帝諭禮部皇太后聖體違和荷䝉天地祖宗社稷眷佑今已康寧朕心欣慶應躬行告謝禮爾部擇吉以聞尋部臣議奏於是以正月戊午謝圜丘己未謝方澤辛酉謝太廟社稷十六年九月丁夘以滇黔底定遣官祭告如禮十七年正月以省躬親行祭告先是戊午諭禮部朕荷天眷佑纘承祖宗鴻緒統御天下夙夜乾惕圖所以乂安海内永底昇平十有七年于兹乃民生尚未盡遂貪吏尚未盡改積習相仍未臻丕變且滇黔雖入版圖而伏莽未靖征調猶繁焦思竭力治效未孚負上天之簡畀愧祖宗之寄托虚皇太后教育之恩孤四海萬民之望非朕未嘗勵精求治實由涼徳所致反覆循省罔敢即安兹欲引咎自責祭告天地太廟社稷布告中外爾部即擇期具奏庚申禮部奏擬正月十一日甲子奉諭宜間日行禮於是以丙子告圜丘丁丑告方澤己夘告太廟社稷四月戊申以大享殿合祀遣官祭告壇廟十八年正月己未聖祖仁皇帝登極遣官祭告圜丘方澤太廟社稷三月壬申以恭上大行皇帝尊謚遣官祭告圜丘方澤太廟社稷十月甲子以恭上皇曽祖夀康太妃尊號遣官祭告太廟先是順治十七年十月庚戌世祖章皇帝諭禮部仁夀宫太祖妃年長行尊向來未進名封禮宜舉行所有應封名號應行典禮爾部即詳察具奏至是聖祖仁皇帝登極始舉行十一月戊戌以恭奉世祖章皇帝神主升祔太廟奉先殿遣官祭告圜丘方澤太廟奉先殿社稷康熙元年三月乙酉以明桂王朱由榔就擒親告世祖章皇帝遣官祭告圜丘方澤太廟社稷福陵昭陵四月乙夘以恭改上太祖武皇帝孝慈武皇后尊謚加上太宗文皇帝尊謚親告圜丘遣官祭告方澤社稷十月壬寅以恭上聖祖母昭聖慈夀恭簡安懿章慶皇太后尊號加上徽號曰昭聖慈夀恭簡安懿章慶敦惠太皇太后恭上母后皇后尊號曰仁憲皇太后母后尊號曰慈和皇太后遣官祭告圜丘方澤太廟社稷二年四月戊午以奉移世祖章皇帝梓宫於孝陵遣官祭告圜丘方澤太廟社稷五月癸巳以恭上大行慈和皇太后尊謚遣官祭告如禮六月己亥以奉安世祖章皇帝梓宫於地宫孝康章皇后梓宫同日奉安遣官祭圜丘方澤太廟社稷四年九月庚寅以大婚遣官祭告如順治八年禮丁未以大婚禮成加上昭聖慈夀恭簡安懿章慶敦惠太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊太皇太后仁憲皇太后徽號曰仁憲恪順皇太后遣官祭告如元年十月禮後皆同六年十一月丙午以恭奉世祖章皇帝配享圜丘遣官祭告圜丘方澤太廟社稷乙夘以恭奉世祖章皇帝配享方澤遣官祭告如丙午禮丙辰以親理大政加上昭聖慈夀恭簡安懿章慶敦惠温莊太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊康和太皇太后仁憲恪順皇太后徽號曰仁憲恪順誠惠皇太后遣官祭告如禮八年十一月壬子以修建太和殿乾清宫告成遣官祭告如順治十二年禮九年正月戊戌以上辛親祭祈穀壇遣官祭太廟庚子以恭奉世祖章皇帝配享祈穀壇遣官祭告如六年禮四月以五月丙辰朔恭奉孝康章皇后神主升祔太廟奉先殿癸丑遣官祭告圜丘方澤太廟社稷乙夘遣官祭告奉先殿八月丙申以恭奉太皇太后恭謁孝陵親詣太廟祭告壬子駕囘京親詣太廟告至十年二月戊戌以經筵開講親詣奉先殿祭告嗣後嵗或遣官九月庚戍以寰宇一統恭謁福陵昭陵展祭行告成禮親詣太廟祭告十一月庚戍駕囘京親詣太廟告至十一年二月乙未以耕耤遣官祭告奉先殿嗣後嵗以為常十三年六月己未以册諡仁孝皇后遣官祭告太廟十四年正月戊寅以仁孝皇后神主升祔奉先殿遣官祭告奉先殿十二月乙丑以册立皇太子允礽遣官祭告圜丘方澤太廟社稷十五年正月癸巳以建儲加上昭聖慈夀恭簡安懿章慶敦惠温莊康和太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣太皇太后仁憲恪順誠惠皇太后徽號曰仁憲恪順誠惠純淑皇太后遣官祭告圜丘方澤太廟奉先殿社稷以次尊封皇考恭靖妃淑恵妃端順妃寧慤妃同告太廟奉先殿十六年八月乙丑以册立皇后遣官祭告圜丘方澤太廟奉先殿以次册封貴妃同告太廟奉先殿十七年閏三月庚申以册諡孝昭皇后遣官祭告太廟五月庚戌以修皇穹宇兩廡拜臺遣官祭告圜丘方澤太廟社稷十八年四月壬申以孝昭皇后神主升祔奉先殿遣官祭告奉先殿五月以改營奉先殿遣官祭告圜丘方澤太廟社稷二十年三月仁孝皇后梓宫孝昭皇后梓宫自沙河殯宫奉移至陵戊午以奉安地宫遣官祭告圜丘方澤太廟奉先殿社稷孝陵十二月丁酉以蕩平滇逆遣官祭告圜丘方澤太廟社稷時將申祗告内閣翰林院撰擬寰海昇平告祭文以進聖祖諭曰吳三桂反叛以來勞師動衆兵民困苦已極若以為推枯拉朽容易成功則辭過其實惟此艱難之故全賴天地鴻庥祖宗覆庇乃能奏績其以此意撰擬朕將親覽焉戊戌以册封皇貴妃貴妃惠妃宜妃徳妃榮妃遣官祭告太廟奉先殿壬寅以滇逆蕩平加上昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠温莊康和仁宣𢎞靖太皇太后仁憲恪順誠惠純淑皇太后徽號曰仁憲恪順誠惠純淑端禧皇太后遣官祭告如禮二十一年二月壬辰以雲南底定海㝢蕩平恭謁永陵福陵昭陵遣官祭告奉先殿二十二年十二月庚戌以平定海逆遣官祭告圜丘方澤太廟社稷又遣官祭告陵寢二十七年四月奉移大行太皇太后梓宫至陵享殿遣官祭告孝陵奉安梓宫於孝陵之南為暫安奉殿遣官祭告孝陵十月甲寅以恭上大行太皇太后尊諡遣官祭告圜丘方澤太廟奉先殿社稷庚申以恭奉孝莊文皇后神主升祔太廟奉先殿遣官祭告如禮二十八年七月癸夘以册立皇后遣官祭告如禮九月甲寅以册諡孝懿皇后遣官祭告太廟十月己夘以奉安孝懿皇后梓宫於地宫遣官祭告如二十年三月禮十一月庚申以孝懿皇后神主升祔奉先殿親詣奉先殿祭告十二月乙丑以寧夀宫成恭奉仁憲恪順誠惠純淑端禧皇太后臨御新宫遣官祭告太廟三十四年二月丁巳以崇建太和殿遣官祭告圜丘方澤太廟奉先殿社稷六月丁酉以冊封皇太子妃遣官祭告太廟奉先殿三十五年二月癸丑以親征噶爾丹遣官祭告圜丘方澤太廟奉先殿社稷三十六年七月乙丑以平定朔漠大功告成遣官祭告如初禮丙申以太和殿成丁酉臨御新殿遣官祭告如初禮三十九年十二月甲戌以册封貴妃遣官祭告太廟奉先殿四十七年九月辛夘以廢皇太子允礽遣官祭告時聖祖仁皇帝親撰告天文告方澤太廟社稷文略同四十八年三月庚辰以復册立皇太子允礽遣官祭告圜丘方澤太廟社稷五十一年十一月乙未以復廢皇太子允礽遣官祭告如前五十二年聖祖仁皇帝六十萬夀聖節遣官祭告圜丘方澤太廟社稷五十七年三月庚申以恭上大行仁憲恪順誠惠純淑端禧皇太后尊諡遣官祭告如禮庚午以奉移孝惠章皇后梓宫至陵享殿遣官祭告圜丘方澤太廟社稷至陵日遣官祭告暫安奉殿孝陵四月辛巳以奉安孝惠章皇后梓宫於孝東陵地宫遣官祭告如禮十二月戊午以恭奉孝惠章皇后神主升祔太廟奉先