body:
  text: 欽定四庫全書皇朝文獻通考卷二百九刑考十五贖刑臣等謹按虞書金作贖刑孔安國傳𫝊誤而入刑出金以贖其罪孔頴達疏謂意善功惡則令出金贖罪蓋於矜疑之外别察其意之善否定罰贖以通法律之權爾本朝初制鞭斬以下罰贖並行定鼎而後更詳收贖折贖納贖之令而王公百官罪議罰銀者改為罰俸於是議贖之制别於議罰矣聖祖世宗矜恤罪囚贖款頻開我皇上御極之元年即詔行贖罪之舊例誠以罪疑惟輕罰懲非死皆足廣聖慈而閎徳網也至若衡量罪情酌劑時事申不准援贖之條停斬絞捐贖之例則又仰見國家法外施仁不為倖免者濫及之至意云天命六年定有功之人犯罪當死者贖當罰者免天聰二年定殺降罰例奉諭敖漢柰曼諸貝勒曰聞各處來降者爾等毎殺之嗣後若明知而殺者罰民十户爾諸國可周圍遍置哨卒違者罰牛五如哨卒不聴遣者罰牛一三年三月定出師違令罰例凡征察哈爾管旗諸貝勒年七十以下十三以上俱從征違者罰馬百駝十遲三日至者罰馬十軍出入敵境有不至者罰馬百駝十凡征明國毎旗大貝勒各一員台吉各二員以精兵百人從違者罰馬千駝百遲三日至者罰馬十軍出入敵境有不至者罰馬千駝百所至輒行擄掠者罰馬百駝十定私娶䝉古部落女罰例時貝勒阿濟格私娶蒙古喀喇沁部落女議罰銀千兩上命免其三分之二定越界駐牧罰例時柰曼扎嚕特部落貝勒等越界駐牧定議各罰馬百駝十上命各罰馬一五年定縱畜入田罰例凡豕入人田者令送還本主毎次計豕罰銀五錢過三次許赴告該牛彔額真即以其豕給之羊入人田者計毎隻罰銀三錢駝牛馬驢騾入人田者計毎頭匹罰銀一兩仍償其禾定諸貝勒犯罪罰例凡諸貝勒擅殺人命者罰銀千兩姦屬下婦女者罰銀六百兩屬下有効力戰士隠匿不報以私人冒功濫薦者罰銀三百兩定諸貝勒罰例奉諭國家立法不遺貴戚斟酌罰鍰以示懲儆凡諸貝勒審事枉㫁人死罪者罰銀六百兩枉斷人杖贖等罪及私遣人與外國交易或怠忽職業或擅取民間財物馬匹或將本旗人女子不行報部短價收納在家者均罰銀二百兩七年定獵罰例凡行獵處有擅入圍中者貝勒罰良馬一甲喇額真罰銀十五兩旗長罰銀十兩閒散人罰銀九兩離伍退後者與入圍同八年定䝉古諸貝勒罰例時上召集外藩各䝉古貝勒諭之曰向因法制未備陋習不除今與諸貝勒約凡貝勒奪有夫之婦配他人者罰馬五十駝五其納婦之人罰七九之數給與原夫姦有夫之婦拐投别貝勒如貝勒不執送者罰馬五十駝五崇徳七年定圍獵誤射罰例凡諸王貝勒貝子公等誤射王者罰銀三千兩與被射之王誤射貝勒罰銀二千兩與被射貝勒誤射貝子公等罰銀千兩與被射貝子公如王貝勒貝子公等誤射以下之人視受傷輕重給銀若致死者除償身價外仍罰銀二百兩給被射之家傷未致死者除照常給銀外罰銀百兩給被傷之人無傷痕者罰銀五十兩給被射之人八年定失誤朝會罰例凡常朝之期有一次不到者和碩親王罰大牛一多羅郡王罰中牛一多羅貝勒罰中次牛一固山貝子罰小牛一公等罰大羊一順治元年定罰贖無完免追之例時沿舊例有追比罰贖致牋人命或罰贖不完扳引代納者至是一切禁止並奉詔贖鍰之設原開罪人自新之路嗣後有力不能完者速與免追歸結二年定審擬狥庇罰例按班章京譚泰訐告按班章京索尼罪狀公塔瞻鰲拜俱徇庇索尼前後口供不符塔瞻應削公爵降為按班章京罰銀一百兩鼇拜革職罰銀二百兩三年定五刑贖罪例先是國初罰贖之令行於軍旅朝會田獵遊牧及王公大臣各貝勒而已餘則未經定制也至是始頒行五刑贖罪之圖凡贖刑輕者為收贖若年七十以上十五以下及廢疾犯軍流以下罪者若樂戸象奴及習業已成之天文生罪止杖笞者若過失殺傷人自笞罪至絞罪者並准收贖次輕者為折贖若命婦正妻例難的決者杖罪餘罪並准贖免重者為納贖分有力稍有力二等若軍民有力若舉監生員冠帶人犯非姦盜詐偽者流徒以下並聴納贖凡笞杖徒流雜犯死罪在京俱令其做工及運米炭磚石等計數准銀各有差此例至雍正三年停止外省照例分别有力稍有力依數逓加折贖増定老幼篤疾重犯分别請㫖收贖例凡八十以上十嵗以下及篤疾者犯殺人死罪擬奏取自上裁盜及傷人者收贖五年定官員罪應鞭笞杖責者俱依律折贖免責例八年定軍營罰例凡行軍擅離旗纛者罰銀三兩馬匹無印罰銀二兩箭上無姓名者罰銀十兩如不能出銀鞭三十十一年定拏獲逃人不即起解及隠匿逃人罰贖例凡拏獲逃人不即起解該管官革職仍罰銀一百兩給與出首之人凡滿洲家人隠匿逃人鞭一百罰銀五兩其本主不論官民罰銀十兩或另户人隠匿逃人鞭一百罰銀十兩宗室公以上家下莊頭等人窩隠逃人鞭一百罰銀五兩管莊撥什庫罰銀十兩逃走二次或三次如本主不行報明被旁人首告平人鞭一百有頂帶官員鞭一百折贖十二年定先叅婪賍審無入已止擬那移加派坐賍罪者既經革職免其杖徒收贖定官員贖罪例刑部題准文武官員犯罪除實犯死罪外餘俱准納贖衙蠧犯罪不准折贖十三年定滿州䝉古漢軍武職官員犯罪除案情重大交部審擬外其情輕應贖身者免其贖身名色照漢官例改為罰俸定贖罪奏報例給事中孫光祀奏請嗣後各省撫按監司及府縣守令一應大小罰贖俱當作欽件奏報其不經奏聞者毫釐不得私罰部議應如所請從之定旗員贖罪例凡滿洲䝉古漢軍官員有祖父伯叔兄弟陣亡及本身出征負傷者除死罪外餘准折贖定旗員本身及妻子兄弟犯軍流徒罪例應鞭責枷號者俱照例准贖十五年定三品以上官兄弟子姪犯杖罪准折贖定直省賍贖銀兩逐項造冊送臬司按季清查例十六年定貪官犯賍應杖責者實予的決不准折贖之例増定折贖例凡在京軍民人等犯徒罪以下照律例分别折贖旗下婦女除犯姦逃盜走外餘罪亦准收贖更定杖罪贖鍰之例奉諭向來贖鍰太輕以致奸頑玩視犯者愈衆今自杖一百者贖銀三十五兩逓減至二十兩而止爾部分别定議尋議杖一百者應贖銀三十五兩九十者三十一兩二錢五分八十者二十七兩五錢七十者二十三兩七錢五分六十者二十兩著為例從之嗣又議准官民人等犯杖六十徒一年者折銀二十三兩七錢五分杖七十徒一年半者二十九兩三錢七分五釐杖八十徒二年者三十五兩杖九十徒二年半者四十兩六錢二分五釐杖一百徒三年者四十六兩二錢五分杖一百流罪准徒四年者五十兩雜犯死罪准徒五年者五十三兩七錢五分十八年聖祖仁皇帝御極定無力民人杖罪不折贖之例定官員認工贖罪之例舊例有罪之人修蓋城樓准其贖罪至是刑部題准官員有犯流徙籍沒等罪情願修造城樓營建贖罪者議奏請㫖定奪申定箭上不書名罰例國初定例箭不書姓名者罰銀十兩至是復定箭上不書姓名或書他人姓名者杖八十仍罰銀十兩康熙元年定革職官員杖罪准收贖四年定官員贖罪例凡革職官員犯罪在原任内者准其折贖革職後又犯别罪者不准折贖文武見任官員犯流罪以上者照應得之罪的決徒罪以下准其折贖六年停認工贖罪之例先是順治十八年定官員認工贖罪例嗣康熙二年刑部又奏定軍民犯罪有願認工贖罪者移咨工部查核奏請修建工程至是左都御史尼滿奏犯人家産籍没工費何所從來恐有挾詐逼勒苦累良民嗣後應請停止從之申不能折贖而強令折贖之禁奉諭前因無力小民納贖難完反致苦累故令懲決但律内開載有力折贖無力的決原聴從民便非強逼令其折贖以後通著照律行如有不能折贖而強令折贖者該督撫指名叅處定旗人犯雜犯死罪以下有力願贖者照民人例一體折贖定王公縱容家人累商罰例王公等縱容家人強占闗津要地不容商民貿易者王罰銀一萬兩公罰銀一千兩嗣又定凡内外王公以下官員家人有領本霸占闗津要地者除本犯立斬外若係内務府人佐領革職係宗室王公家人親王罰銀一萬兩郡王罰銀五千兩貝勒罰銀二千五百兩貝子罰銀一千三百兩公罰銀七百兩仍交宗人府議處若係在外王等家人親王罰銀一萬兩降為郡王貝勒貝子請㫖定奪郡王貝勒貝子罰銀五千兩降為公若係大臣官員家人伊主皆革職七年申隠漏贖鍰之禁先是順治十二年定犯人贖罪春夏納銀秋冬二季收銀糴穀貯倉備賑年終彙造清冊咨報户刑二部查核十八年又定贖鍰銀兩由督撫按批行者承問官通詳互相稽核解部司道府州縣自理贖鍰亦全數報部查核至是又議覆御史徐旭齡奏請州縣自理贖鍰嵗底申報臬司藩司自理贖鍰嵗底申報督撫督撫嵗底彙題報部查核以杜折多報少隠漏等弊應如所請得㫖允行并諭罰贖之人姓名及罰數著承問各官明晰書寫告示于該地方曉諭如有隠漏即以貪賍治罪定賭博案内軍流以下等罪槩不准折贖例十年改定王公以下及各官員罪應罰贖為罰俸之例宗人府等衙門遵㫖議覆王公以下及文武各官有應得之罪例應罰贖者各量其罪之重輕改為罰俸自一月逓增至一年從之十一年飭刑官詳定贖罪刑部奏准律例折贖内有開載未盡之條問刑官臨時詳審情罪應准贖而出自本犯情願者准其折贖不應准者仍的決如濫准折贖并多取肥已者叅處十五年定軍絞以上不准贖罪例户部議奏律内流徒以下原有收贖之條軍絞以上情罪重大不應准贖得㫖允行十六年定出征之處殺人贖例刑部議准有出征之處殺人奉㫖免死者鞭一百追銀二十兩給死者之家枷號兩月存案令軍前効力贖罪其口外蒙古等有犯亦鞭一百追銀二十兩折牲口一九給死者之家令軍前効力贖罪若不行効力仍追牲口三九給死者之家臣等謹按効力贖罪于罰金贖鍰及做工䭾運等例外别為一條皆國家矜全罪人開以自新之路也凡軍臺効力贖罪軍前効力贖罪屯田効力贖罪隄工城工効力贖罪及革職餘罪人員或留該省効力贖罪或發往他省効力贖罪等名色並按罪重輕酌量時事特奉恩綸事無定例是以不槩入贖刑一門二十九年定邊口輸米贖罪例凡死罪現監人犯除十惡强盜及殺人人犯外米一穀二聴其捐輸死罪如内外三品以上堂官與兼堂官職銜之人捐米一萬石在外實係二品三品文職官員捐米七千石道府官捐米二千五百石在内四品堂官及司官捐米一千五百石在外同知通判知州知縣叅將遊擊捐米一千五百石筆帖式佐貳雜職守備千總及文武進士舉人監生人等捐米五百石生員及平人捐米二百五十石皆免死釋放再考職候缺人等照伊等品級令其捐納凡捐贖死罪如有因家産盡絶免追及家産已經入官者捐納數目各減一半此例以一年為限於三十年四月初一日停止捐輸以具呈後三月為期逾期槩不准行三十年復定軍流人犯捐贖例刑部議准御史邵嗣堯奏死罪重犯已令捐贖軍流人犯亦應准捐除叛逆干連並強盜及殺人等犯内有免死減等流犯并山海闗以外等處發遣安插與各直省安插等犯俱不准捐贖外其餘軍流等罪内外三品以上堂官及兼堂官職銜之人捐米三千三百石在外實係二品三品文職官員捐米二千三百石道府官捐米八百石在内四品堂官司官及在外同知通判州縣叅遊捐米五百石其州同縣丞守備千總各項雜職文武官員進士舉人監生人等捐米一百五十石生員平人捐米八十石皆以米一穀二計算准其免罪此例亦以一年為限于次年四月初一日停止三十三年定修理邊牆捐納贖罪例先是部定西安等處捐納事例有流犯納銀贖罪給照還籍之條至是川陜督臣佛倫奏修理秦省三邊牆垣請照西安納贖辦公例凡各省已遣流犯除死罪減等之犯外其已流三千里者納銀五百四十兩流二千五百里者納銀四百五十兩流二千里者納銀三百六十兩給照還籍其已遣徒罪五年者納銀五十兩五年以下按年逓減銀數免其配驛部議應如所請從之至三十九年十一月部議停止定因賍審擬流徒賍銀全完方准捐贖之例三十四年定通倉運米捐贖例凡死罪在外道府運米五百五十石在内司官運米三百五十石在外同知通判知州知縣叅將遊擊運米三百五十石筆帖式州同縣丞守備千總雜職等官進士舉人監生運米一百石生員運米五十五石俱免死釋放考職候缺人等照依品級捐運免死減等人犯亦准捐運流犯運米四十石徒犯運米三十石俱免罪回籍三十八年停河工捐贖例先是刑部會同工部議准河工捐贖例除内外十惡外三品以上死罪捐工五百丈流罪捐工二百丈五品以上死罪捐工八十丈流罪捐工四十丈九品以上死罪捐工六十丈流罪捐工三十丈庶民死罪捐工二十丈流罪捐工十丈俱免罪以修完日為始保固三年至是奉㫖停止三十九年定那移倉庫錢糧銀至五千兩以上米至六千石以上者滿流不准折贖之例定永定河工捐贖例凡内外除十惡及重罪不准原赦外三品以上死罪捐銀三千三百兩軍流罪捐銀一千三百二十兩徒罪捐銀六百六十兩五品以上死罪捐銀五百二十八兩軍流罪捐銀二百六十四兩徒罪捐銀一百九十八兩九品以上死罪捐銀三百九十六兩軍流罪捐銀一百九十八兩徒罪捐銀一百三十二兩庶民死罪捐銀一百三十二兩軍流罪捐銀六十六兩徒罪捐銀三十三兩俱以修築完日為始保固三年准其免罪五十二年定福建開捐事例軍流人犯除發山海闗外者不准捐納外其餘不論巳未發配捐穀五百石徒犯不拘年限捐穀三百石俱免罪發回原籍六十年定河工捐贖例凡死罪監禁人犯照二十九年邊口捐輸贖罪例行凡軍流人犯捐駝五隻徒罪人犯捐駝四隻俱准免罪回籍凡罪人并妻子發遣奉天寧古塔船厰打牲烏喇白都訥黒龍江墨爾根三姓地方者除犯人本身現在不准捐免外本身已故者其妻子家口存留彼處捐駝十二隻准其回籍雍正二年停止捐贖例是時奉諭將戸部與陜西各案捐例即行停止捐贖條例槩不准行三年重定贖罪例先是順治三年頒定五刑贖罪之圖至是部臣以舊例做工運炭運磚等項今已不行但照有力稍有力納贖所有從前做工運炭等項條例俱改為納贖充徒字様其官員犯罪俱以罰俸降級處分不入贖例奏准改定頒發遵行定婦女贖罪例凡婦女犯雜犯死罪以下該決杖一百者與命婦正妻一體折贖五年定營田贖罪事例凡不論旗民罪擬斬絞非常赦不原者原任三四品官營田四十頃五六品官營田三十頃七品以下進士舉人營田十五頃貢監生員營田十頃平人營田八頃准其免罪其軍流罪犯各減十分之六徒罪以下各減十分之八俱准免罪仍記檔案倘有再犯徒罪以上者前後通論從重治罪定盜案賊犯毋論年逾七旬俱不准折贖例定毆斃人命案犯不准捐贖例七年定盜犯妻子入監探視者枷責不准収贖例詳見刑制門九年増定營田贖罪事例户部奏准照營田原例四品官以下死罪各酌加十頃平人酌加四頃俱准免罪軍流罪犯原例各減十分之六今定減十分之四徒罪以下原例各減十分之八今定減十分之六再有所犯軍流以下之罪情重法輕者按所定之數再加十分之六准其免罪十一年定孀婦獨子犯軍流徒罪者照例杖一百餘罪收贖例十二年定預籌糧運捐贖事例凡不論旗民罪擬斬絞非常赦不原者三品以上官捐銀一萬二千兩四品官捐銀五千兩五六品官捐銀四千兩七品以下進士舉人捐銀二千五百兩貢監生捐銀二千兩平人捐銀一千二百兩俱准其免罪其軍流罪犯各減十分之四三品以上官捐銀七千二百兩四品官捐銀三千兩五六品官捐銀二千四百兩七品以下進士舉人捐銀一千五百兩貢監生捐銀一千二百兩平人捐銀七百二十兩俱准其免罪徒罪以下各減十分之六三品以上官捐銀四千八百兩四品官捐銀二千兩五六品官捐銀一千六百兩七品以下進士舉人捐銀一千兩貢監生捐銀八百兩平人捐銀四百八十兩俱准其免罪凡罪人并妻子發遣奉天寧古塔船厰打牲烏拉伯都訥齊齊哈爾黑龍江墨爾根三姓地方除十惡強盜光棍等犯不准捐免外其餘發遣罪犯一二品官捐銀六千兩三四品官捐銀四千八百兩五六品官捐銀三千六百兩七品以下進士舉人捐銀二千四百兩貢監生捐銀一千二百兩無祿人捐銀六百兩准其本身及妻子家屬回籍如本犯已死其子係冊内有名並家口存留彼處者酌議捐銀各減十分之六准其妻子家屬回籍其軍流徒罪已經發遣者流犯捐銀六百兩徒犯捐銀四百八十兩准其免罪回籍俱照例請㫖定捐贖條例舊例捐贖事隸户部先是雍正九年户部以罪名案件俱在刑部往返咨查必滋弊竇奏歸刑部辦理刑部以事屬創始其收呈查案交銀給照隔礙難行未即承辦是以營田事例報捐贖無多至是刑部奏准凡贖呈詞一槩本部收受特派清慎司員専司其事凡一呈必兩擬准贖不准贖看語呈堂酌定不准贖者奏定之後將呈詞發還准贖者摺内聲明可否准其捐贖請㫖即將逓呈之人發取的保行文户部令其上庫如一月不能完納照本犯應得之罪減三等治罪十三年定直省自理贖鍰銀兩造冊題報之例署湖南巡撫鐘保奏外省自理贖鍰一項向由外結部内無案可稽毎年但以並無自理贖鍰一語題覆積習相沿因循隠匿湖南如此他省可知仰懇勅部通行直省嗣後贖鍰銀兩按年造冊報解其隠匿不報者嚴加議處得㫖允行乾隆元年復行贖罪舊例奉諭前因官爵有闗名器仕途不宜冒濫是以降㫖停止捐納至於贖罪一條原古人金作贖刑之義況在内由部臣奏請在外由督撫奏請皆屬斟酌情罪有可原者方准納贖其事尚屬可行嗣後贖罪一條仍照舊例辦理二年定婦女枷號准贖例四年定脅從夥盜年未及嵗者不論曽否分賍流罪不准收贖互見徒流門五年増定老幼實犯死罪減流收贖之例湖南按察使彭家屏奏定律凡十五以下實犯死罪減等為流者不准收贖查秋審冊内幼童所犯多係無知始予可矜若照例減流擬以實遣似與壯年罪犯矜減為流者無别請嗣後犯死罪時在十五以下蒙恩減等為流者俱收贖部議應如所請並奏秋審可矜人犯有年逾七十而罪情可原已邀矜減為流者亦請准其收贖從之定過失傷人收贖銀數例刑部奏准查例内止載過失殺人銀數並無過失傷人若干銀兩之文按過失殺人絞罪收贖銀十有二兩今將收贖過失傷人銀數其致傷輕重應得罪名不成傷笞二十贖銀三錢五分四釐手足傷笞三十贖銀五錢三分二釐他物傷笞四十贖銀七錢九釐拔髮方寸以上笞五十贖銀一兩四錢一分九釐折人一齒一指眇一目者杖一百贖銀一兩七錢七分四釐折人二齒二指者杖六十徒一年贖銀三兩五錢四分八釐折肋墮胎眇人兩目及刃傷者杖八十徒二年贖銀五兩三錢二分二釐致成廢疾者杖一百徒三年贖銀七兩九分七釐成篤疾者杖一百流三千里贖銀十兩六錢四分五釐六年定限内完賍減流為徒之官犯不准折贖例詳見刑制門九年定命案贖罪者倍追給埋葬銀兩刑部議准查贖罪條内凡斬絞命犯准贖罪者原款無追給埋葬之文請嗣後照常例倍追埋葬銀四十兩給屍親收領定各省贖罪銀兩改收稻穀貯倉例定妻過失殺夫妾過失殺家長及過失殺正妻者杖罪的決流徒等罪收贖例詳見刑制門十五年定監司分賠屬員侵欺錢糧未完者杖徒不准折贖例詳見刑制門十七年定笞杖捐贖例先是雍正十二年奏准預籌糧運事例内載徒罪以下有犯笞杖者貢監生捐銀八百兩平人捐銀四百八十兩俱准其免罪蓋因律載杖笞等罪原有收贖納贖之條其不准贖之人核其情罪尚輕者始准其捐贖是以議照徒罪援贖之例不分多寡一例辦理至是西安布政使張若震奏請分别酌減刑部議覆如貢監生犯杖罪者捐穀四百石納銀二百兩笞罪者捐穀二百石納銀一百兩平人犯杖罪者捐穀二百石納銀一百兩笞罪者捐穀一百石納銀五十兩又凢官員革職後有餘罪者三品以上犯杖罪者捐穀二千四百石納銀一千二百兩犯笞罪者捐穀一千二百石納銀六百兩四品官犯杖罪者捐穀二千石納銀一千兩犯笞罪者捐穀一千石納銀五百兩五六品官犯杖罪者捐穀一千六百石納銀八百兩犯笞罪者捐穀八百石納銀四百兩七品以下官及進士舉人犯杖罪者捐穀一千二百石納銀六百兩犯笞罪者捐穀六百石納銀三百兩得㫖允行定笞杖贖罪分别題結外結例定例請贖事案不論罪之重輕並請㫖定奪乾隆九年安徽布政使范璨條奏平人徒杖等罪例係督撫自行完結若逐案查明未免煩瑣可否量為區别部議笞杖贖罪如係題結之案該督撫附疏聲明刑部核議請㫖儻係例得外結有情願捐贖者督撫將犯案並贖罪緣由咨部部臣遵例核覆請㫖至是復經奏定笞杖贖罪在京具呈刑部查辦按季彙題外省笞杖贖罪令地方官詳報督撫核明批允辦理案係題結附疏聲明事若外結咨報户刑二部由部造冊按季彙題二十三年停止斬絞捐贖例御史葉啓豐奏請斬絞人犯即情稍可原寧于秋審時量加矜減其捐贖之例應行刪除部議以贖罪之法第按其情之故誤不拘夫罪之重輕自古迄今從無死罪不准納贖之說應不准行得㫖該御史所言未嘗不是著將斬絞緩決各犯納贖之例永行停止俟遇有恩赦減等時其憚於逺行者再准收贖而贖鍰則仍照原擬罪名不得照減等之罪著為令二十五年定捕蝗不力擬杖的決不准納贖例奉諭褚廷章捕蝗不力事闗農田民食非尋常因公罪犯可比所擬杖罪不應准其納贖二十七年定誘拐案内婦人為首者所犯軍流等罪一槩的決不准收贖例詳見刑制門三十一年嚴定問刑官多取贖鍰之例定例承問官濫准納贖並多取肥己者交部議處至是刑部奏定應計賍科罪不應與濫准納贖槩止議處著為例三十六年定援赦減等人犯准其收贖例時廣東巡撫徳保奏流犯四㑹等呈請納贖刑部議乾隆二十三年奉㫖斬絞各犯納贖之例永行停止俟遇有恩赦減等其憚於逺行者准收贖而贖鍰則仍照原擬罪名不得照減等之罪又定例平人犯死罪遇減等者仍照原犯罪名捐銀准其免罪應如所請得㫖允行三十八年定徒罪納贖凡在各省具呈者均由督撫具奏例雲南巡撫李湖咨部稱恩安縣民杜鎮逺情願捐贖徒罪查乾隆十七年刑部議覆陜西布政使條奏内稱杖笞人犯原係輕罪若槩行奏請未免煩瑣應令地方官將犯罪情節並可否應贖原由詳報督撫核明批允辦理限一月内繳准其免罪如係題案附疏聲明若事由外結咨報户刑二部由部造冊按季彚題等因查滇省歴年並未辦過徒犯捐贖之案今杜鎮逺係平人毆妾致死罪止滿徒例得外結今願捐贖如専摺具奏未免煩瑣應咨部核覆等因嗣經部查向來本部辦理贖罪案件如係笞杖罪者三四品官以下按季彚題至徒罪以上無論職官平人槩行専摺具奏若在外具呈者由督撫自行具奏本部核議今杜鎮逺係毆妾致死擬徒之犯本部並無原案未便據咨辦理仍令該撫自行具奏並將原案送部再議三十九年増定圍場内因射獸傷平人致死者追埋葬銀兩例刑部遵㫖議定圍場内射獸兵丁因射獸而傷平人致死者照比較拳棒戲殺擬絞監候仍追銀給付死者之家如係前鋒䕶軍親軍領催及甲兵等追給銀一百兩係跟役追銀五十兩若傷而未死前鋒等項及甲兵頭等傷者將本犯鞭一百罰銀四十兩二等傷者鞭八十罰銀三十兩三等傷者鞭七十罰銀二十兩如係跟役所罰銀數各減十兩給與被傷之人定凡民人捕獵誤殺人命追埋葬銀兩例凡民人捕獵遇有施放鎗箭打射禽獸不期殺人者比照捕户於深山曠野安置窩弓不立望竿因而傷人致死律杖徒仍追埋葬銀一十兩給與死者之家定軍流以下罪犯在部呈請收贖均令開具案由分别准贖不准贖按月彚題刑部奏稱辦理贖罪一條除斬絞各犯已於乾隆二十三年奉諭㫖俟減等後再准收贖外其餘軍流徒罪官常各犯無論旗民于具呈後臣部檢查原案核其情節輕者逐案専摺具奏情重者即指摘批駁罪應笞杖官犯四品以上亦照徒罪以上例辦理四品以下官犯及常犯即由臣部核定准贖仍于年底彚題至發遣新疆烏嚕木齊伊犂等處之犯有核其情節可憫情願破格捐贖者開具事由據呈轉奏久經遵照在案伏思贖鍰各案原係皇上格外加恩予人悔過自新之路本非臣下所可專是以一切准贖者固無不仰邀聖鑒共沐矜全至于情節較重未能准贖之犯向例即由臣部議駁未經與准贖各犯一體奏明誠恐其中未必悉歸平允請嗣後外遣軍流以下罪犯如有在部呈請贖罪者應准應駁俱開載案由分别似應准贖不准贖兩項按月彚題具奏如一月内僅止一件即歸入下月彚題俟命下之日將不准贖者原呈發還准贖者照例辦理如此則准駁總由欽定不特事歸覈實而辦理亦昭詳慎上如其請皇朝文獻通考卷二百九
