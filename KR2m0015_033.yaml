body:
  text: 欽定四庫全書皇朝文獻通考卷三十三市糴考市舶互市臣等謹按宋以前互市之制其詳靡得而記自宋開寶後始置市舶司榷場博易場沿革詳略具載馬端臨考至前明末代抽稅過重防奸則疏以致大啓海氛公行抄劫吳越瀕海州郡數被其害臣等纂前五朝續考已備言之我國家威德逺播四裔咸賔受命之初髙麗琉球率先表貢暨平臺灣島夷失其故巢懸命中國聖祖皇帝因包荒而撫有之歸化寖衆東南舟楫之區商漁樂業鯨波不驚沙鳥雲帆目極無際各島如吕宋噶喇吧日本紅毛紅毛之種數十向所謂出沒烟濤莫知其蹤跡者皆已按圖可指就中佛朗西荷蘭暹羅等國矯首面內不憚超數十更以來其他小弱附景希光者又不在此數於是緣其職貢以通其貨賄立之期㑹以均其勞逸寬減稅額以豐其生息厚加賞賚以作其忠誠而又核驗官符譏禁內匪弛張互用畏慕滋深此今日市舶之所以盛也若乃西北茶馬之市行之已久强無凌弱衆無暴寡邉氓畨族胥享其利蓋百餘年於此矣皇上綏懷萬方廓清大幕耕犂遍於寰中泉布流於域外大宛善馬弗求自徠于闐良玉不脛而走初非與為市而得之者近則准哈薩克之請開烏嚕木齊之市先之以官辦次之以招商時地交宜逺邇利賴繼自今航浮索引四瀛相望大一統之閎規至是蔑以加矣臣等謹如前目隨事編排列於市門之次用昭聖世大同之治焉順治二年設張家口古北口章京時命哈克薩哈駐張家口滿都布賚駐古北口諭之曰爾等駐防之地凡外藩各䝉古來貿易者俱令駐於邊口照常貿易毋得阻抑其喀爾喀部落來市馬者令駐於口外申報户部又定陜西以茶易馬之例先是元年定與西畨易馬例每茶一箆重十斤上馬給茶箆十二中馬給九下馬給七至是年差御史轄五茶馬司户部言陜西地方召商茶以易畨馬向有照給金牌勘合之制備查前明詔諭通接西番關隘處所撥官軍巡守不許私茶出境凡進貢番僧應賞食茶頒給勘合行令四川布政司撥發有茶之倉照數支放不許於湖廣等處收買私茶違者盡數入官仍將伴送人員等依律問罪此舊例所當遵行者若金牌一項係明初事例至永樂十四年已經停止今我朝定鼎各畨慕義馳貢金牌似不必用但以茶易馬務須酌量價值兩得其平無失柔逺之義從之康熙四十四年停止中馬雍正九年奏准復行十三年仍行停止三年議令吐魯畨貢使置買器物照舊例額數禮部言舊例吐魯番國進貢來使於京師置買器物額數每人茶五十斤磁碗碟五十雙銅錫壺五執各色紗羅及緞共十五匹絹三十匹青白布三十匹夏布三十匹棉花三十斤花毯二條紙馬並各色紙共三百張各色顔料五斤糖果薑每樣三十斤藥材三十斤烏梅三十斤黑白礬共十斤照此定例置買其龍鳳黃紫各色之物及鞍轡弓箭刀不許置買所應買諸物兵馬司差役同通事監視買賣兩從其便如盜買違禁之物買賣並監視人役一併治罪㑹同館許開市五日自京起程後牛羊犁鏵鐡鍋至臨洮府蘭州與本處軍民交易亦買賣各從其便仍令監視護送官兵加意謹防送至關上其至蘭州交易者亦不許置熟鐵及各項兵器令照舊例交易從之四年議佛朗西國互市人禁止入省户部議覆兩廣總督佟養甲疏言佛朗西國人寓居濠鏡澳以攜來番貨與粵商互市蓋已有年後深入省㑹至於激變遂行禁止今督臣以通商裕國為請然前事可鑒應仍照前明崇禎十三年禁其入省之例止令商人載貨下澳貿易從之十三年准荷蘭國貢使在館交易禮部言荷蘭國從未入貢今重譯來朝誠朝廷德化所致念其道路險逺准五年一貢貢道由廣東入至海上貿易已經題明不准應聽在館交易照例嚴飭違禁等物得㫖荷蘭國慕義輸誠航海修貢念其道路險逺著八年一次來朝以示體恤逺人之意是年八月其貢使歸國特降敕諭賜其國王曰惟爾荷蘭國墨投為也甲必丹物馬綏掘僻在西陲海洋險逺歷代以來聲教不及乃能緬懷德化效慕尊親擇爾貢使杯突髙嚙惹諾皆色等赴關來朝䖍修職貢地逾萬里懷忠抱義朕甚嘉之用是優加錫賚大蟒緞二匹粧緞二匹倭緞二匹閃緞四匹藍花緞四匹青花緞四匹藍素緞四匹帽緞四匹衣素緞四匹綾十匹紡絲十匹羅十匹銀三百兩以報孚忱至所請朝貢出入貿易有無雖灌輸貨貝利益商民但念道里悠長風波險阻舟車跋涉閲歷星霜勞勩可憫若朝貢頻數猥煩多人朕皆不忍著八年一次來朝員役不過百人止令二十人到京所攜貨物在館交易不得於廣東海上私自貨賣爾其體朕懷保之仁恪恭藩服慎乃常職祇承寵命又准吐魯畨貢使在館交易諭吐魯畨阿布都拉哈曰朕膺兹大命綏定萬方凡所屬外國無不輸誠臣服來貢方物爾吐魯番國早識時數貢賦維謹今又遣使入貢誠篤之意實可嘉悅念爾國逺隔山河跋涉不易宜加賞賚用勸忠誠特賜爾緞三百三十八匹絹七百二十三匹自此以後著互年一次來貢入關不得過百人不許攜帶婦女進京止許三十人餘留駐甘肅俟進貢人歸時即令一齊出關不得久留內地至所帶貨物許在京㑹同館照例貨市無得沿路借端遷延騷擾其進貢西馬四匹䝉古馬十匹外不必多貢用體朕優恤逺人之意十四年遣官察審朝鮮國人私買硝藥朝鮮國王之弟李㴭回國隨行員役違禁擅買硝藥行至鳳凰城為城守章京搜獲李㴭不肯縛送私買之人反為哀求容隱奉諭㫖遣內大臣阿魯哈大學士額色黑都察院左副都御史能圖吏部左侍郎禪代往朝鮮同該國王察審議罪十五年諭禮部曰朕撫御萬方中外臣民皆同一視朝鮮恭順有年尤厪體恤聞遣使該國多員貿易滋擾朕心殊為不忍嗣後凡有事差往使臣止用正副使各一員務擇諳習禮儀任事謹恪者其八分人員隨往及貿易俱行停止以昭朕字愛藩服至意十八年達賴喇嘛及干都台吉請於北勝州互市以馬易茶從之康熙二年停止朝鮮國王開送貨物印文凡外藩貨物有該國王印文開送者准其貿易朝鮮陪臣下人應山等帶貂皮一百張印文內並未開載經禮部奏聞得㫖免其議罪交易貨物聽其隨便攜帶至日報部於㑹同館交易該王印文著停止應禁之物回時令邊關官員詳細嚴察七年議外國人貨物非貢期不准貿易凡外國人非進貢方物之期來邊界處所貿易者㑹典並未開載惟康熙二年准荷蘭國貿易一次康熙三年准暹羅國貿易一次隨於康熙五年永行停止至是兵部言請嗣後非係貢期槩不准其貿易從之八年以廣南國船貨仍給來使先是廣東都司劉世虎等駕舟巡海遇風飄至廣南境內廣南國王差趙文炳等送歸并帶來貨物船隻奉有確查議奏之㫖至是禮部議劉世虎等帶去之兵尚有十九名未回應降二級其趙文炳等雖奉廣南國印文差遣而實係中國之人或留或遣請㫖定奪現在禁海其帶來之物不便貿易應交送户部得㫖廣南國差趙文炳等送劉世虎等歸粵殊為可嘉著該督給以照驗遣歸廣南船貨不必入官仍給來使為修理船隻之用劉世虎等風飄是實著免罪十八年禁兵民販米出海浙江沿海兵民販賣糧米因內地利少出海利多越界貿易特遣戶部郎中布詹等巡海如將軍督撫提鎮所屬人員有犯禁者令其不時訪緝杜絶以靖海氛二十二年令厄魯特噶爾丹博碩克圖來使往張家口歸化城交易上諭大學士等近觀厄魯特噶爾丹博碩克圖來使較前漸多每一次常至數百人聞其沿途遇邊外游牧䝉古肆行擾害外國之人若行痛懲又恐失柔逺之意彼處遣來人員當有定數不可聽其意為多寡嗣後正使頭目酌量數人令進關口其餘人等或令在張家口外或在歸化城交易事畢應即遣回又令馬喇等領庫帑於軍前市易時阿達哈哈畨馬喇等以茶布往征羅剎軍前市易上諭茶布不必攜往可於户部支銀四千兩量買諸物馳驛抵彼換取牛羊糧米以備軍需勿得脅制民間各任其便二十三年議浙江沿海地方聽百姓海上貿易九卿等議覆工部侍郎金世鑑疏言浙江沿海地方請照山東諸處見行之例聽百姓以裝載五百石以下船隻往海上貿易捕魚預行禀明該地方官登記姓名取具保結給發印票船頭烙號其出入令防守海口官員驗明印票人數至收稅之處交與該道計貨貴賤定稅輕重按季造冊報部至海口官兵請於溫台二府戰船內各撥二十隻平定臺灣所獲哨船撥八十隻令其分泊防守巡邏俱應如所請從之又議暹羅國貢船貨物准其於虎跳門貿易暹羅國王言貢船到虎跳門地方官阻滯日久逮進至河下又將貨物入店封鎖候部文到時方准貿易每至毁壞乞敕諭廣省嗣後貢船到虎跳門具報之後即放入河下俾貨物早得登岸貿易又本國採辦器用乞諭地方給照置辦部議應如該國王所請從之又詔開海禁其硝磺軍器等物仍不准出洋內閣學士席柱陳奏福建廣東兩省沿海居民情形上曰百姓樂於沿海居住原因海上可以貿易捕魚先因海冦故海禁不開今海氛廓清更何所待下九卿詹事科道議尋議今海外平定臺灣澎湖設立官兵駐劄直𨽻山東江南浙江福建廣東各省先定海禁處分之例應盡行停止若有違禁將硝磺軍器等物私載出洋貿易者仍照例處分從之二十四年嚴飭開洋貿易滿漢人民議政王大臣等言今海內一統寰宇寧謐滿漢人民俱同一體應令出洋貿易以彰富庶之治得㫖開海貿易原欲令滿漢人民各遂生息倘有無藉棍徒倚勢橫行借端生事貽害地方反為不便應嚴加禁飭如有違法者該督撫即指名題參又免外國貢船抽稅禮部議覆福建總督王國安疏言外國貢船請抽稅令其貿易應如所請上以進貢船隻若行抽稅殊失大體悉免之又令朝鮮國照常貿易朝鮮國王李焞言國內牛多疫死民失耕種請暫停互市禮部奏李焞託言妄奏不合應罰銀一萬兩得㫖此事本當如議但係外藩小國姑宥此一次仍令照常貿易又酌減洋船丈抽之例先是二十三年特開海禁令福建廣東沿海民人許用五百石以下船隻出海貿易地方官登記人數船頭烙號給發印票防汛官驗放撥船巡哨如有大船出洋夾帶禁物者罪之其海口內橋津舟車等物停止徵收江浙二省亦照此例至是監督宜爾格圖言粵東向有東西二洋諸國來往交易係市舶提舉司徵收貨稅明隆慶五年以夷人報貨奸欺難於查驗改定丈抽之例按船大小以為額稅西洋船定為九等後因夷人屢請量減抽三分東洋船定為四等國朝未禁海以前洋船詣􅓝照例丈抽但往日多載珍竒今係雜貨今昔殊異十船不及一船請於原減之外再減二分東洋船亦照例行至江浙閩廣俱經開海若不畫一恐啓外夷趨避之端應照粵省量減此等丈抽船隻裝載回國或因風水不順飄至他省查驗印票即便放行其四省印烙船隻往外國貿易者亦照此例從之二十五年禁止土司畨蠻交界處販賣軍器禁物兵部議覆四川陜西總督禧佛疏言川省地廣民稀土司畨蠻雜處恐有私收軍器禁物及射利奸徒勾串賣給等弊請嚴行禁止定例處分應如所請嗣後土司畨蠻交界處有將軍器禁物販賣者杖一百發邊逺充軍該管官知情故縱者一例治罪如失於覺察州縣官并専汛武職俱降四級調用府道及兼轄武職官俱降二級該管總兵官降一級督撫提督各罰俸一年從之又定厄魯特各部落互市例時厄魯特土哈爾台吉噶爾丹台吉等遣使互市上諭理藩院厄魯特部落如噶爾丹等四大台吉應令來京互市其餘小台吉俱於張家口互市著為定例二十八年准鄂羅斯通行旅貿易先是領侍衛內大臣索額圖等與鄂羅斯來使費要多羅額禮克謝議定分界事宜至是遣官立碑於界凡一切行旅有准令往來文票者許其貿易不禁又暫開寧夏等處互市喀爾喀達爾漢親王諾內等言扎薩克信順額爾克戴青善巴扎薩克丹津額爾得尼台吉等請於寧夏橫城平羅等處准其貿易理藩院議此等地方向來並不令䝉古貿易請行文總督提督詳議上曰信順額爾克戴青善巴等既稱寧夏等處地方准其貿易甚有益於窮人不必行文且暫令貿易不為例俟來年再議三十三年禁商人在外國造船私帶軍器九卿㑹議浙江巡撫張鵬翮疏言定例出洋貿易船隻地方官印烙給以票照禁帶軍器出洋乃有內地商人在外國打造船隻帶有軍器出入關口既無印烙可據又無票照可憑地方官難以稽查請一槩禁止至暗帶外國之人偷買犯禁之物者并嚴加治罪應如所請從之三十五年令海洋商船往天津海口運米至奉天免其貨物雜費內閣學士陶岱往奉天賑濟并以天津海口運米至奉天事請訓㫖上曰從天津海口運米以新造船與商船轉運尚恐船少應遣人往福建督撫處勸諭走洋商船使來貿易至時用以運米仍給以雇直其裝載貨物但收正稅槩免雜費又以大軍征噶爾丹軍營貿易衆多奉諭㫖隨軍貿易之人固不可少若縱其貿易又至紊亂應於某營相近即令某營之夸蘭大派出章京於一里外駐扎准其貿易嚴禁喧譁火燭并戒沽酒倘貿易人不遵法禁偷盜馬匹米糧者亦即正法帶往之人一併治罪軍士或將米私售貿易之人或强買搶奪者定加重罪又理藩院言大兵經行䝉古地方應令䝉古等沿途販賣駝馬牛羊等物得㫖爾院可另設一營其販賣駝馬牛羊人等即在爾營內貿易大軍十六營中每營派官一員専司貿易之事如有指稱貿易行竊者不分首從梟首示衆妻子家産籍沒入官三十六年准鄂爾多斯於定邊花馬池平羅城貿易鄂爾多斯貝勒松阿喇布言向准臣等於橫城貿易今乞於定邊花馬池平羅城三處令諸䝉古就近貿易上命大學士户部兵部及理藩院㑹同議奏尋議應俱如所請令貝勒松阿喇布等及地方官各自約束其人勿致爭鬬從之又准朝鮮國於中江地方貿易米穀朝鮮國王李焞言請於中江地方貿易米糧奉諭㫖朕撫馭天下內外視同一體朝鮮國王世守東藩盡職奉貢克效敬慎今聞連嵗荒歉百姓艱食朕心深為憫惻今盛京積貯甚多著照該國王所請於中江地方令其貿易是月遣户部侍郎貝和諾往奉天督理朝鮮糶米事務尋户部遵㫖議言奉天米石運至中江貿易應令殷實誠信之人取具地方官印結前赴奉天領米挽運照時價交盛京户部所賣米不許過倉石二萬石其朝鮮進貢來使有貿穀帶去者聽又鹽商張行等呈稱情願前往朝鮮貿易應令將銀買倉米二萬石運往俟朝鮮嵗稔時停止此時運往米石令伊國將所産之物酌量兌换從之明年正月遣吏部右侍郎陶岱將運往朝鮮米三萬石以一萬石賞賚朝鮮國以二萬石平糶其商人貿易米二萬石交與户部侍郎貝和諾監視尋朝鮮國王李焞奏皇上創開海道運米拯救東國以蘇海澨之民饑者以飽流者以還目前二麥熟稔可以接濟八路生靈全活無算下所司知之御製海運賑濟朝鮮記曰朕聞救災拯患王政所亟是以夙夜求莫雖在遐荒絶域猶若痌瘝乃身矧屬在藩維茍有疾苦何忍一日置也康熙三十六年冬朝鮮國王李焞奏比嵗荐饑廩庾告匱公私困窮八路流殍相續於道籲懇中江開市貿穀以蘇溝瘠俾無殄國祀朕深為惻然立允其請遂於次年二月命部臣往天津截留河南漕米用商船出大沽海口至山東登州更用雞頭船撥運引路又頒發帑金廣給運值緩徵鹽課以鼓勵商人將盛京所存海運米平價貿易共水陸運米三萬石內加賚者一萬石朝鮮舉國臣庶方藜藿不充獲此太倉玉粒如坻如京人賜之食莫不忭舞欣悅凋瘵盡起該王具表陳謝感激殊恩備言民命續於既絶邦祚延於垂亡蓋轉運之速賑貸之周亦古所未有也朕念朝鮮自皇祖撫定以來奠其社稷綏其疆宇俾世守東藩奉職修貢恩至渥矣兹者告饑不憚轉輸數千里之勞不惜糜費數萬石之粟環國土而户給之非獨一時救災拯患實所以普澤藩封而光昭先德也是烏可以無記臣等謹按市之有海舶有關市有在館交易皆以通商旅而柔逺人糴之有截漕有採運有平糶皆以籌積貯而裕民食我聖祖仁皇帝特允朝鮮國王之請運米穀於中江濟艱鮮於八路不特市易溥遍而且賑糶兼行天庾之澤無逺弗屆誠補助之極功綏柔之曠典也三十九年准哈密人於甘肅等處貿易准鎮筸苗民互市兵部議覆湖廣總督郭琇等疏言鎮筸紅苗撫剿事竣其善後事宜每月三日聽苗民互市限時集散應如所請從之四十一年遣官偕喇嘛監督打箭爐貿易喇嘛達木巴色爾濟郎中舒圖員外鐵圖等往打箭爐地方監督貿易上諭之曰爾等至彼即將奉差情由移文第巴須文辭明悉令彼速遣大喇嘛來監督貿易倘若遲滯將我等撤回永逺不得貿易矣其稅銀不取於彼就我國商人征之不可専以稅額為事若立意取盈商賈不至與禁止何異此項錢糧不多勿以此注念又諭達木巴色爾濟曰爾移文第巴其辭須云爾等務遵㫖行事倘若有違不但無益爾等即我喇嘛亦無益處達木巴色爾濟奏曰倘第巴不將厄爾德尼濟農解至則臣不令其人貿易濟隆胡土克圖與青海人衆係我朝之人令其照常貿易上曰俱令照常貿易四十六年令出洋漁船式改造大學士馬齊等言閩浙總督梁鼐請將出洋漁船照商船式樣改造雙桅臣等遵㫖詢問梁鼐據稱飄洋者非兩桅船則不能行且漁船人户所倚為生者非但捕魚而已亦仗此裝載貨物甚便於民得㫖如議行四十七年禁商販米出洋都察院僉都御史勞之辨言江浙米價騰貴皆由內地之米為姦商販往外洋之故請申飭海禁暫撤海關一概不許商船往來庶私販絶而米價平户部議自康熙二十二年開設海關海疆寧謐商民兩益不便禁止至姦商私販應令該督撫提鎮於江南崇明劉河浙江乍浦定海各海口加兵巡察除商人所帶食米外如違禁裝載五十石以外販賣者其米入官文武官辨有私放者即行參處得㫖如議並著部院保舉賢能司官前往巡察五十三年編刻商船漁船巡哨船字號并船户人等各給腰牌兵部議准江蘇巡撫張伯行疏言商船漁船與盜船一並在洋行走難以識辨以致剽盜時作商船被害嗣後商船漁船前後各刻商漁字樣兩傍刻某省某府某州縣第幾號商船漁船及船戶某人巡哨船隻亦刻某營第幾號哨船商漁各船户舵工水手客商人等各給腰牌刻明姓名年貌籍貫庶巡哨官兵易於稽查至漁船出洋時不許裝載米酒進口時亦不許裝載貨物違者嚴加治罪從之五十五年議給甘肅地方出口印票聽其貿易議政大臣等議覆尚書福寧安疏言甘肅地方今年田禾茂盛秋收可期各處民人俱具呈欲往口外併哈密地方及駐兵之處貿易者一百四十餘起請令地方官給與出口印票以便前往從之又議定福建商船出洋往臺灣澎湖貿易者臺厦兩汛撥哨船護送五十六年禁止商船往南洋吕宋噶喇吧等處貿易酌定造船印烙結單并船户商人食米額數其賣船與外國及留在外國者立法究治先是五十五年上諭大學士等曰朕訪聞海外有吕宋噶喇吧兩處地方噶喇吧乃紅毛國泊船之所吕宋乃西洋泊船之所彼處藏匿盜賊甚多內地之民希圖獲利往往於船上載米帶去并賣船而回甚至有留在彼處之人不可不預為措置也復諭大學士九卿等曰朕南巡過蘇州時見船厰問及咸云每年造船出海貿易者多至千餘回來者不過十之五六其餘悉賣在海外齎銀而歸官造海船數十隻尚需數萬金民間造船何如許之多且有人條奏海船龍骨必用鐵梨竻木此種不産於外國惟廣東有之故商人射利偷賣即加查訊俱揑稱遭風打壞此中情弊速宜禁絶海外有吕宋噶喇吧等處常留漢人自明代以來有之此即海賊之藪也官兵出哨或遇賊船四五隻官兵船止一二隻勢不能敵舵工又不奮力向前將領亦無可如何不過尾追而已何能𠞰滅邪張伯行曽奏江浙之米多出海販賣斯言未可盡信然不可不為預防出海貿易海路或七八更逺亦不過二十更所帶之米適用而止不應令其多帶再東洋可使貿易若南海商船不可令往第當如紅毛等船聽其自來耳且出南洋必從海壇經過此處截留不放豈能飛渡乎又沿海炮臺足資防守明代即有之應令各地方設立往年由福建運米廣東所雇民船三四百隻每隻約用三四十人通計即數千人聚集海上不可不加意防範臺灣之人時與吕宋人往來亦須預為措置朕令廣州將軍管源忠浙閩總督滿保兩廣總督楊琳來京陛見亦欲以此面諭之爾等俟管源忠等到京後㑹同詳議具奏至是議凡商船照舊令往東洋貿易外其南洋吕宋噶喇吧等處不許前往貿易於南澳地方截住令廣東福建沿海一帶水師各營巡查違禁者治罪其外國夾板船照舊准來貿易令地方文武官嚴加防範嗣後洋船初造時報明海關監督地方官親驗印烙取船戶甘結并將船隻丈尺客商姓名貨物往某處貿易填給船單令沿海口岸文武官照單嚴查按月册報督撫存案每日食米人各一升并餘米一升以防風阻如有越額之米查出入官船戶商人同罪小船偷載米糧剝運大船者治罪如將船賣與外國者造船與賣船之人皆立斬所去之人留在外國將知情同去之人枷號三月該督行文外國將留下之人令其解回處斬沿海文武官如遇私賣船隻多帶米糧偷越禁地等事隱匿不報從重治罪從之五十七年議定來往臺灣各船取具保結赴厦門盤驗并嚴偷渡之禁兵部覆准浙閩總督覺羅滿保疏言海洋大弊全在船隻混淆商販偷運應將客商責之保家商船水手責之船戶貨主漁船水手責之澳甲同䑸各取保結限定人數出入盤查并嚴禁漁船不許裝載貨物接渡人口至各省往來之船雖新例各用兵船護送其貪迅速者俱從各處直走外洋不由厦門出入應飭行凡往臺灣之船必令到厦門盤驗一體護送由澎而臺其從臺灣回者亦令盤驗護送由澎到厦凡往來臺灣之人令地方官給照單身游民無照者不許偷渡犯者官兵民人分别治罪船隻入官如有哨船私載者該管官一體參處從之又議外國夷商聽照常貿易令沿海官不時防衛兵部議覆兩廣總督楊琳疏言據原任碣石總兵官陳昻條奏臣詳察海上日本暹羅廣東噶喇吧吕宋諸國形勢東海惟日本為大其次則琉球西則暹羅為最東南番族最多如文萊等數十國盡皆小邦惟噶喇吧吕宋最强噶喇吧為紅毛市泊之所吕宋為西洋市泊之所而紅毛一種奸宄莫測其中有英圭黎干絲蠟和蘭西荷蘭大小西洋各國名目雖殊氣類則一惟和蘭西一族凶狠異常且澳門一種是其同派熟悉廣省情形請令督撫關差諸臣設法防備或於未入港之先查取其火炮方許進口或另設一所關束夷人每年輪流貿易不許多船並集查外國夷商利與中國貿易而夷商懾服有素數十年來沿習相安應聽其照常貿易將該總兵所請查取火炮另設一所關束輪流貿易之處無庸議請於夷船一到之時令沿海文武官辨晝夜防衛使其懾服無致失所應如所請從之又禁止澳門夷商帶內地人偷往别國貿易例禁商船往南洋貿易以兩廣總督楊琳言澳門夷船往南洋及內地商船往安南不在禁例如有澳門夷人夾帶中國之人并內地商人偷往别國貿易者查出仍照例治罪又免增厦門關稅浙閩總督覺羅滿保疏言各省商船往來臺灣經臣題明必令到厦門盤驗護送但查從前自臺灣往各省貿易者俱從外洋直至停泊之處赴本處海關輸稅至於中途經過之所不便一貨兩徵嗣後各省商船遵例來厦就驗除所泊厦港者照舊報稅如收泊江浙各省貿易者仍聽彼處海關報稅其中途經過之厦門關稅免其增添從之五十八年議定䝉古及西藏茶禁議政王大臣等議覆都統法喇疏言䝉古地方及西藏人民皆藉茶養生我皇上憫念青海與裏塘巴塘人衆非茶難以度日將作何定數分晰禁止之處令臣等詳議臣等思唐古忒之人皆為賊所迫脅難禁其養生之物但松潘一路茶價甚賤青海一帶積茶必多應暫行嚴禁俟其懇請時再酌定數目令其買運至打箭爐外最近者為裏塘應遣官招撫令營官造具所管畨寨戶口清冊酌量定數許其買運巴塘以外亦照此例其打箭爐一路當視畨情之向背分别通禁應如所請從之五十九年又禁止出洋商船攜帶炮位軍器六十一年詔暹羅國分運米石至福建廣東寧波等處販賣又大學士等奉諭暹羅國人言其地米饒價賤二三錢銀即可買稻米一石朕諭以爾等米既甚多可將三十萬石分運至福建廣東寧波等處販賣彼若果能運至於地方甚有裨益此三十萬米係官運不必收稅雍正二年准暹羅國運來米石照粵省時價發賣并免壓船貨稅廣東巡撫年希堯言暹羅國王入貢稻種果樹等物應令進獻并運米來廣貨賣得㫖暹羅國王不憚險逺進獻稻種果樹等物最為恭順殊屬可嘉應加奬賚其運來米石令地方官照粵省時價速行發賣不許行戶任意低昻如賤買貴賣甚非朕體恤小國之意嗣後且令暫停俟有需米之處候㫖遵行其壓船隨帶貨物概免徵稅三年禁止各邉及邊外商人在出兵處販賣重價之物諭兵部理藩院曰聞阿勒台出兵處買賣人俱圖重利將豬鵝雞鴨燒酒之類販運彼處一豬價銀十數兩鵝與小豬四五兩雞鴨數兩酒一斤亦數兩必索重價方賣因此官兵花費錢糧以致窮乏出兵處官兵每月給有錢糧米石食用不為不足牛羊野獸之肉得食足矣何必重價買貴物以恣口腹乎爾部應將各邊與邊外人通行曉諭除布帛茶烟應用等物許賣外凡豬鵝燒酒等嚴行禁止嗣後若有偷賣者許出兵人等任其取用又議令青海諸部落移於河州松潘西寧等處隨時貿易議政王大臣等覆准奮威將軍嶽鍾琪疏言大將軍年羮堯奏定前例青海與內地之人每年於二八月貿易兩次擇定納喇薩喇地方為交易之所經議政大臣議改四季交易已覺寬容今查親王察罕丹津公拉扎卜等諸台吉部落居住黃河之東切近河州去松潘亦不甚逺向來原在河州松潘兩處貿易今若令於納喇薩喇二處恐不足供黃河東西兩翼䝉古易賣莫若仍令在河州松潘貿易終覺穩便河州定於土門關附近之雙城堡松潘定於黃勝關之西河口此二處俱有城堡房屋地方寬濶水草俱好利於互市可為永久再查郡王額爾德尼額爾克托克托鼐郡王色布騰扎勒等諸台吉部落住牧黃河西邊相近西寧請將貿易之地移在西寧口外當噶爾寺至䝉古貿易全藉牲畜每在六月以後請每年不定限期仍聽不時貿易則䝉古商販均獲利益矣從之五年議開閩省洋禁兵部覆准福建總督髙其倬疏言閩省福興漳泉汀五府地狹人稠自平定臺灣以來生齒日增本地所産不敷食用惟開洋一途藉貿易之贏餘佐耕耘之不足貧富均有裨益從前暫議停止或慮盜米出洋查外國皆産米之地不藉資於中國且洋盜多在沿海直洋而商船皆在橫洋道路不同又慮有逗漏消息之處現今外國之船許至中國廣東之船許至外國彼往此來歷年守法安靜又慮有私販船料之事外國船大中國船小所有板片桅柁不足資彼處之用應復開洋禁以惠商民并令出洋之船酌量帶米回閩實為便益得㫖如議並令該督詳立規條嚴加防範又嚴飭閩越守口官稽查洋船照票其從前逗留外洋之人不准回籍奉諭㫖昔年曽奉聖祖仁皇帝諭㫖海外噶喇吧乃紅毛國泊船之所吕宋乃西洋泊船之所彼處藏匿盜賊甚多內地之民希圖獲利往往留在彼處不可不預為措置隨經廷臣與閩廣督撫議令內地之人留在外洋者附洋船帶回准行在案此乃聖祖仁皇帝綏靖海疆且不忍令內地之民轉徙異地實仁育義正之盛心也但數年以來附洋船而回者甚少朕思此輩多係不安本分之人若聽其去來任意伊等益無顧忌輕去其鄉而飄流外國者益衆矣嗣後應定限期若逾限不回是其人甘心流移外方無可憫惜朕意不許令其復回如此則貿易欲歸之人不敢稽遲在外矣將此交與髙其倬楊文乾常賚悉心酌議並如何定例年月之處一併詳議具奏尋議康熙五十六年定例出洋貿易人民三年之內准其回籍其五十六年以後私去者不得徇縱入口久已遵行在案又現住外洋之船或去來人數不符或年貌互異者即係頂替私回應嚴飭守口官於洋船回時㸃對照票細加稽查如有情弊將船戶與汛口官員分别治罪至閩粵洋船出入總在厦門虎門守泊嗣後别處口岸概行嚴禁得㫖康熙五十六年定例之時隨據福建等省奏報回籍者幾二千餘人是出洋之人皆已陸續返棹而存留彼地者皆甘心異域及五十六年以後違禁私越者也方今洋禁新開禁約不可不嚴以免內地民人貪冒飄流之漸其從前逗留外洋之人不准回籍餘依議又以朝鮮國人逋負內地商銀六萬餘兩奉諭㫖前商人胡嘉佩等虧空帑銀開出朝鮮國人賒缺銀六萬餘兩以抵公項朕恐胡嘉佩等開報不實纍及外國令行文詢問並令內地貿易之人與朝鮮缺賑之人在中江地方質對明白使不得互相推諉以息擾纍今據盛京禮部奏朝鮮國王李昤咨文朕見其辭甚支離意多巧飾據此則該國人缺銀之處顯然矣本應照議政所議令中外之人質對明白按數追還朕思當日朝鮮國已故國王李焞才幹優長政令嚴肅深䝉聖祖仁皇帝眷注嘉奬李焞曽將伊國負缺之人正法想見其辦事之明向聞李昤柔懦無能權移於下觀此咨文推託牽强之語必其陪臣所為非該國王口氣蓋因不得自主之所致似此清查積缺之事該國王必不能辦理今若以不能辦理之事委之甚非朕柔逺之意此案不必質對其國人應還之銀著從寬免追此朕加恩於外藩並非疏法於內地也六年准暹羅國商人運載米石貨物在厦門發賣免其納稅禮部議覆福建巡撫常賚疏言暹羅國王誠心嚮化遣該國商人運載米石貨物直達厦門請聽其在厦發賣照例徵稅委員監督嗣後暹羅運米商船來至福建廣東浙江者請照此一體遵行應如所請得㫖依議米穀不必上稅著為例又定洋船出入海口期限并酌帶米石貨物之數從福建總督髙其倬請也每年出口船隻今於四月內造報入口船隻於九月內造報如入口之船有畨賑未清不便即回者准俟來年六七月間回港有遭風飄泊他省者准取其該地方官印結齎回有舟行被溺無憑查據者飭取飄回餘人或鄰船客商等確供詳核倘故意遲延并徇私揑報分别究處每船所帶米石暹羅大船三百石中船二百石噶喇吧大船二百五十石中船二百石吕宋等處大船二百石中船一百石仔等處中船各一百石如有偷漏以接濟外洋例論罪油釘棕麻等物准其量帶仍注明數目以憑查驗七年准浙江洋船視福建例與南洋貿易兵部議准浙江總督李衛疏言內地商民船隻向例禁止出洋嗣因閩省産米不敷食用令與南洋貿易查浙江洋面接連閩省恐奸商冒險前往而沿途洋汛以非閩船反失稽查請照閩省准其一體貿易得㫖允行又定苗疆貿易例户部議定湖南地方民人往苗土貿易者令將所置何物行戶何人運往何處預報明地方官給與印照知㑹塘汛驗照放行不得夾帶違禁之物如有官吏兵役借端需索者一併查究其苗人至民地貿易於苗疆分界之地設立市場一月以三日為期互相交易不得越界出入該州縣派佐二官監視又許暹羅國貢使購買駝馬并動用內庫銀給以價值至十一月該國貢使復以採買京弓銅線上請奉㫖著採買賞給又諭內閣私販硝磺禁約甚嚴聞湖廣永順之耶里等處與川省連界素産焰硝土人以煎熬為業外省小販多以布鹽雜物零星換易運至梅樹地方而私販者即於此雇船裝載分往各處發賣以致附近苗人得以偷買私製火藥此皆州縣有司疏忽怠玩之故著四川湖廣督撫等轉飭地方官嚴行查禁犯者按律治罪若地方官仍玩忽疏縱即題參議處九年禁止洋船販賣鐵鍋先是本年二月工部議准刑部尚書勵廷儀疏請凡有將廢鐵潛出邊境及海洋貨賣者照越販硝磺之律科斷至是廣東布政使楊永斌言定例鐵器不許出境貨賣而洋船私帶禁止尤嚴粵東所産鐵鍋每連約重二十斤查雍正七八九年造報夷船出口冊內每船所買鐵鍋少者自一百連至二三百連不等多者買至五百連併有至一千連者計算每年出洋之鐵約一二萬斤誠有關係應請照廢鐵例一體嚴禁違者該商船戶人等照廢鐵出洋例治罪官役通同徇縱亦照徇縱廢鐵例議處凡遇洋船出口仍交與海關監督一體稽查至商船煮食器具銅鍋砂鍋俱屬可用非必盡需鐵鍋亦無不便外夷之處得㫖鐵斤不許出洋例有明禁而廣東夷船每年收買鐵鍋甚多則與禁鐵出洋之功令不符矣楊永斌所奏甚是嗣後稽察禁止及官員處分商人船户治罪之處悉照所請行粵東既行查禁則他省洋船出口之處亦當一體遵行永著為例十年奉諭㫖楚南山嶺重復産鐵之處甚廣採取最易凡農民耕鑿器具窮黎之衣食皆取資於此歷年飭禁而刨挖難以杜絶但廢鐵出洋例有嚴禁楚南地方産鐵既多外來射利商販每於就近設爐錘鍊裝船運赴湖北漢口發賣或由漢口轉運兩江遞販以致出洋不得不立法查察以防其漸著湖廣督撫㑹同悉心妥議本地應否准其刨挖關口如何嚴行稽查務期民用有資而弊端可杜庶公私兩有禆益尋議設爐開採處所飭令地方官止許雇覓土著良民協同保鄰户首出具並無隱匿奸商匪類印甘各結詳齎存案不許招集外來之人并嚴禁土苗不許裝運出境交易貨賣其本省商販在各屬産鐵處所收買轉運者令該商將鐵斤數目販賣地方逐一呈明該地方官驗明給與印照沿途經過關津隘口驗照放行如有照外夾帶私鐵據實報究從之又令外藩置買軍器分别辦理理藩院奉諭著行文外藩扎薩克伊等有來京置買軍器者若所買數少或係常物該部即發給部照令其出口若所買軍器甚多著該部請㫖再令置買十三年議東省豆船出口給票查驗戶部覆准兩江總督趙宏恩河東總督王士俊山東巡撫嶽濬等㑹奏米糧出洋例禁甚重惟東省青白二豆素資江省民食因內河路逺必由海運不在禁例但船隻出進須加查閲令兩省地方官互給印票照驗以杜偷買夾帶等弊因議定東省海口各州縣衛設立兩聨印票查明客商姓名船隻字號梁頭丈尺豆石數目出口月日逐一填注一存本署一給商船海運到江由大關上稅者聽海關驗票相符即填到口日期蓋用關印仍交商進口回東時將票繳銷在劉河收口者海關另立豆船進口印票發存口岸俟船進口收稅即驗填進口日期印票並將東省來票截角同交商船亦俟回東統繳其江省商船在東買豆回江亦令東省給票俟到江將票存關口一月彚移東省核銷如無印票即照販米出洋例究治仍令東省州縣每月將驗過票號造冊咨送江省江省關口亦按月將驗過到江票號豆數造冊申齎東省如有匿票偷賣等弊立即根拿懲處各地方官及關口員役不得藉端需索違者查參又令寧夏市口貨賣鐵器給票查驗從陜西總督劉於義請也寧夏鎮屬之平羅橫城花馬池三處市口凡䝉古人等每月入口貨買鐵器者令該扎薩克預報夷情衙門給以印票填明件數斤兩每逢開市之期監視營員驗明印票方許置買其民人貨買鐵器不得私入集場亦令營員驗票當官交易仍將原票彚繳夷情衙門查核又詔許吕宋以榖易麥令有司照時價均平糶糴福建提督王郡言吕宋國以麥收歉薄附洋船載穀二千石銀二千兩海參七百斤來厦賣銀糴麥多則三千石少則二千石臣查五穀出洋律有明禁可否准其以穀易麥候欽定得㫖朕統御寰區內外皆為一體吕宋雖隔重洋朕心並無歧視著該督撫提督等轉飭有司按照穀麥時價均平糶糴不許內地之人抑勒欺詐俾畨船載麥回國以濟其用并將朕㫖傳諭來商知之乾隆元年暹羅國請採買銅斤命賞給八百斤禮部言暹羅國昭丕雅大庫呈稱伊國造福送寺需用銅斤奉禁之後無從採辦懇請准其赴粵採買查銅斤關係鼓鑄禁止出洋定例已久今若准其採買恐日後奸商藉此為由越境滋弊應毋庸議得㫖暹羅逺處海洋抒誠納欵採買銅斤一項該國王稱係造福送寺之用部議照例禁止不許令其採買固是今特加恩賞給八百斤後不為例又奉諭㫖朕聞外洋紅毛夾板船到廣時泊於黃埔地方起其所帶炮位然後交易俟交易事竣再行給還至輸稅之法每船按梁頭徵銀二千兩左右再照則抽其貨物之稅此向例也乃近來夷人所帶炮位聽其安放船中而於額稅之外將伊所攜置貨現銀另抽一分之稅名曰繳送亦與舊例不符朕思從前既有起炮之例此時何得改易至於加添繳送尤非朕嘉惠逺人之意著該督查照舊例按數裁減並將朕㫖宣諭各夷人知之又准山西省口外聽民攜帶日用鐵器巡撫石麟言熟鐵為軍器所資邊口與外夷相接是以廢鐵鐵貨潛出邊境及海洋貨賣者例禁綦嚴苐查晉省沿邊關口東係出至察哈爾西係出至土默特今察哈爾地方現已設立豐州寧朔二衛鎮寧懷逺二所百姓挈眷居住備辨徵收地糧土默特地方設有歸化城同知等官自開殺虎口迄今數十年商賈農工趨負貿易內地民人難以數計近又築城招墾將來駐防官兵相聚益衆此二處口外雖地屬邉徼而較之别部落情形逈異內地民人遷居在外炊爨必用鐵鍋耕種必用鐵器建蓋房屋以及一切日用什物有非鐵不可者仰懇聖恩將晉省沿邊殺虎口一帶關隘嗣後除鳥鎗腰刀等項及鐵條鐵塊廢鐵可造軍器者仍嚴禁外其餘民間一切需鐵之日用什器聽民攜帶出口但不許在該地方私行改造軍器責成該衛所各官及歸化城同知實力稽查如有違犯仍照例治罪則民用既便而禁令亦昭矣從之二年命朝鮮仍循舊例在中江地方與兵丁交易先是八旗臺站官兵嵗於二八月間往中江與朝鮮國人交易相沿已久元年十二月上以旗人等有看守巡查之責停其前往令內地商民赴彼貿易即著中江稅官查察至是禮部奏該國王咨請仍照舊例遵行得㫖朕前因臺站官兵每年二八月間攜帶貨物前往中江與朝鮮國貿易兵丁既不諳貿易之事且不無需索擾纍誠恐逺人到邊守候羈遲殊多未便是以降㫖令內地商民前往均平交易內地商民即指附近臺站之百姓而言並非於京師關內另有派遣此朕體恤逺人之意也今該國王既請仍如舊制著照所請可傳諭該國王知之又定外國被風船隻撫恤例本年夏秋間有小琉球國中山國裝載粟米棉花船二隻遭風飄至浙江定海象山地方經大學士嵇曽筠等查明人數資給衣糧交還貨物並修整船隻器具咨赴閩省附伴歸國奉諭㫖沿海地方嗣後如有似此被風飄泊之人船著該督撫督率有司加意撫恤動用存公銀兩賞給衣糧修理舟楫并將貨物查還遣歸本國永著為例五年以資助遭風商船諭奬朝鮮莆田縣民人陳協順自置商船行至山東洋面遭颶風飄流至朝鮮國楸子島島民扶救該國王給以薪米衣服又為修整船隻加給食米三十石俾得回籍福建巡撫王士任以聞得㫖中國商民出洋遭風朝鮮國王加意資助俾獲安全甚屬可嘉著該部行文嘉奬之七年免暹羅國商船貨稅十分之三福建將軍兼管閩海關事務新柱奏報本年七月內有暹羅國商人方永利一船載米四千三百石零又蔡文浩一船載米三千八百石零并各帶有蘇木鉛錫等貨先後進口查該畨船所載米石皆不足五千之數所有船貨稅銀未便援例寬免得㫖該番等航海運米逺來慕義可嘉雖運米不足五千之數著免船貨稅銀十分之三以示優恤八年奉諭㫖上年九月間暹羅商人運米至閩朕曽降㫖免徵船貨稅銀聞今嵗仍復帶米來閩貿易似此源源而來其加恩之處自當著為定例著自乾隆八年為始嗣後凡遇外洋貨船來閩粵等省貿易帶米一萬石以上者免其船貨稅銀十分之五五千石以上者免十分之三其米聽照市價公平發糶若民間米多不需糴買即著官為收買以補常社等倉或散給沿海各標營兵糧之用俾外洋商人得沾實惠不致有糶賣之艱該部即行文該督撫將軍并宣諭該國王知之十三年福建巡撫陳大受言閩商赴暹羅國買米該國木料甚賤請聽其造船運回給照查驗從之十八年議定商船赴暹羅國買米之例先是十六年奉諭㫖朕閲潘思矩摺內稱本年六月內收入厦口暹羅商船一隻買回米四千石等語閩浙各處現在需米孔殷若官為辦理豈不於民食更有裨益但慮官辦或致外人多疑或聞內地官為購覓即乘勢居竒多方掯勒必致價值日益昻貴并使商船來往亦不能隨便攜帶著傳諭喀爾吉善潘思矩令其㑹同酌量若無此慮可於暹羅等國産米之處官為購運或先行試買看其嗣後可以源源接濟不致啓畨人掯勒之弊抑或應仍聽商人陸續運帶一一詳籌奏聞尋總督喀爾吉善等言該國地土廣不過百餘里户口無幾每年餘米有無多寡並無一定官赴採買番情趨利如騖難免居竒昻價止宜聽商自行買運尚可資其緩急官為購運未便舉行得㫖俞允至是喀爾吉善復言暹羅地方近年雖有商船帶回米石於民食不無禆濟但欲採買補倉勢須委員領帑前往買運若向商船招買過洋之米止可隨到隨糶不能日久貯倉今復加籌酌與其官買補倉不如仍聼商販帶運隨其多寡皆足有濟民食從之嗣自乾隆十九年以後該督等將節年南洋回厦各商船入口帶運米石奏請就厦糶賣分散漳泉二郡接濟民食并運米之商人酌量議叙經部議行令照依時價出糶仍不時巡察勿使奸民囤積射利有妨民食凡內地商民有自備資本領照赴暹羅等國運米回閩糶濟數至二千石以上者按數分别生監民人賞給職銜頂帶二十二年議定甘省口外哈薩克交易事例先是本年十月將軍兆惠富德等言阿布賚請將馬匹赴烏嚕木齊貿易經大學士等議以烏嚕木齊路程窵逺商販稀少難以聚集且初次辦理未能熟悉夷情莫若官為經理俟試行一二年後定有章程再行招商承辦至是陜甘總督黃廷桂言烏嚕木齊距內地窵逺腳費浩繁重於貨本查烏嚕木齊與吐魯畨相近此地運貨既便又有屯種官兵彈壓照料不須多派交易之處似應於土魯畨為妥再明嵗交易止换馬匹哈薩克人等逺來所帶如有駱駝牛羊亦係軍營需用請一體收買其應需縀匹內府撥解絲色精良而官辦之後仍須招商恐成色略減現請於陜甘採買各色縀二三千匹已足敷用至茶封則哈密現存茶七萬八千餘封為數頗多布匹則巴里坤現存自哈密購買之雜色梭布三百對京莊布一千七百匹即可運往選委道員同知各一員并派副將酌帶備辨挑派兵丁一百名押運如有小本經紀願隨前往各聼其便下軍機大臣議尋議准烏嚕木齊距巴里坤雖逺而以哈薩克之至烏嚕木齊計之則又不啻數倍前據阿布賚所請業經奉㫖酌定准其在該處貿易似不應又行更易地方以失信於逺人且臣等原議原因烏嚕木齊商販難至是以暫令官辦即云運費倍於貨本原可按其運費加定價值况哈薩克越在荒服而吐魯畨近接邉陲建有城堡屯田較之烏嚕木齊之地方空濶可以隨處開列市集者不同若令貿易夷人往來於土魯番恐吐魯番回民或有私相交易等事未免轉致滋擾應照原議仍在烏嚕木齊貿易用昭大信至於收换馬匹專為軍營備用如騸馬之外或有隨帶騍馬亦可酌量准收至駝牛二項哈薩克出産本少或有隨帶羊隻等畜足供軍需者自應一體收買其餘疲瘦牲畜及一切雜貨雖不應准其貿易但念夷人攜帶逺來或量為減價收留以示節制縀匹一項應如所奏辦理茶封布匹尤係哈薩克人衆必需之物自應即於現存內酌量運往餘均應如所奏行惟是明嵗係哈薩克夷人初次貿易雖不必過於遷就致使將來援以為例但一應價值交易之際必宜仰體皇上柔逺之恩示以公平俾遐荒夷衆咸知天朝大體畏服感悅方為妥協應交該督轉飭派往之道協各員善為經理尋黃廷桂覆奏道員范清洪同知范清曠二人向曾承辦軍需其於貿易之事自必有熟練可委之人仰請欽定一員俾之帶領舊時商夥先期來肅臣將交易各事宜與之講論明白届期前往承辦較之素不曉習經紀之員實屬有益惟是烏嚕木齊相距遙逺如哈薩克貿易人等先期已至而我處貨物未到則逺人有守候之纍若我處貨物先到而哈薩克或愆其期亦不免稽延時日致滋糜費並請敕下將軍兆惠富德曉諭哈薩克將明秋何日起程約於何時可至烏嚕木齊先行通知咨㑹到臣以便依期齊至兩無守候更為妥協下軍機大臣議尋議此次貿易各事宜誠非熟諳經紀者不能辦理應如所請將范清洪等於甘肅現任內調補一員令其酌帶熟練人員前往至所請交將軍兆惠曉示該夷先行咨㑹以便依期齊至等語查哈薩克初次貿易原與從前貿易者不同前既定以貿易之期該夷程途窵逺難以再令行文曉示應令該督一面咨詢將軍兆惠酌量計算程期先行知㑹一面辦運貨物總在七月初間齊赴該處如果彼此如期齊至固可即為交易即哈薩克因路逺稍遲數日諒亦不致久費守候議入從之嗣於二十三年三月黃廷桂言本年七月內哈薩克在烏嚕木齊交易事宜臣遵照廷議一切先為備辦其陜省辦解縀三千匹業將二千匹運赴巴里坤收貯惟巴里坤現貯布匹恐為數尚少亦經酌量在甘涼肅辦解梭布三百對京莊布一千五百匹陸續運往收貯備用茲侍衛努三遵㫖自軍營回京抵肅臣思努三前在軍營於哈薩克情形最為熟悉因將交易事宜詳悉詢問據稱哈薩克各部人皆散處凡有調遣㑹合之事俱各隨所願不能派定將來貿易人數或多或寡難以預定內地茶葉一項非其所好不必備往即粧蟒縀匹等類逺運來甘腳價繁重雖伊等心愛之物宜酌量配搭不可專用過多致為成例惟各色姑絨褐子氈片毯子印花布等物夷地所無購運亦易若攙搭换易似為至便再伊處女人皆以白布纒頭用處最多似宜寬裕備辦等語臣查烏嚕木齊道路遙逺需用之物若臨時備辦即緩不濟急姑絨褐子氈片係西寧蘭州等處出産臣擬分飭該布政司將此三項各辦一二千匹再辦氈子五百條印花布三百對添辦京莊白布一千匹以各屬所車徐徐運送到肅雇車轉運赴巴里坤收貯届期一併䭾運前往以備交易從之二十四年以商人舊例禁往蒙古各部落貿易奉諭㫖向來前往䝉古部落貿易商人由部領給照票稽核放行懋遷有無彼此均為便利近因貨市日久不無爭競生事是以議令禁止殊不知商販等前往烏里雅蘇臺等處亦必由該部落經過若中途一切貨物抑令不得通融易换未免因噎廢食嗣後凡有領票前赴貿易人等所過喀爾喀各旗仍照舊隨便交易俾內地及各部落商貨流通以禆生業其一切稽察彈壓地方官及各扎薩克留心妥協經理毋任巧詐奸商逗遛盤踞以滋事端又兩廣總督李侍堯言外洋夷船絲禁請以乾隆庚辰年為始其本年各夷商已買絲貨准其載運出口從之又議定防範夷商規條從兩廣總督李侍堯請也外洋夷船向係五六月收泊九十月歸國即間有因事住冬亦在澳門寄住乃近來多有藉稱貨物未銷潛留省㑹難免勾結生事嗣後夷船至粵賣貨後令其依期回國即有行缺未清亦令在澳門居住將貨物交行代售下年順搭歸國再夷商等既依期歸棹其一切銷貨歸價責成殷實行商公平速售按期歸楚不得任意拖缺即有零星貨物未經銷完伊等交易年久自不無一年通融搭銷帶還之處但能信實相安彼此不致苦纍原可無庸繩以官法若不肖行商知其勢難久待或有意掯留壓滯者按律處治其夷商有因行貨未清情願暫留澳門居住者聽其自便一厯來夷商至廣俱寓歇行商館內近來嗜利之徒多將房屋改造華麗招誘夷商圖得厚租任聽漢奸出入以致私行交易走漏稅餉無弊不作嗣後非開洋行之家槩不許寓歇其買賣貨物必令行商經手方許交易如有故縱夷商以致作弊者分别究擬一向來夷商到粵貿易祇許將帶來貨物售賣置買别貨回國其一應禁止出洋之貨槩不得私行販運近來內地行店民人多有借夷商資本貿販冀沾餘潤以致滋事嗣後倘有違禁借貸勾結者照交結外國借貸誆騙財物例問擬所借之銀查追入官至夷商所帶番厮人等足供役使原不得多雇內地民人此後除設立通事買辦外如民人貪財受雇聽其指使服役者應交地方官飭諭通事行商實力嚴查禁止一夷商購買貨物分遣多人前往江浙等省不時雇覔千里馬往來探聽貨價低昻以致內地奸商往來交結嗣後有似此者即將代為覔雇及遞送之人一并嚴拿究治一夷船進口之後收泊黃埔地方每船夷稍多至百餘名或二百名均應防範向例酌撥廣州協標外委帶兵搭寮防守但外委職分卑微不足以資彈壓嗣後於督標候補守備內酌撥一員督同稽查并令於附近之新塘營酌撥槳船一隻與該處原設左翼中軍槳船㑹同稽察巡邏彈壓俟洋船出口即行撥回二十五年議定銅船准帶紬縀數目先是絲斤出洋經大學士等議准御史李兆鵬條奏禁止尋江蘇巡撫陳宏謀言採辦洋銅向係置辦紬縀絲斤并糖藥等貨前往日本易銅回棹分解各省以供鼓鑄今絲斤已禁若將紬縀一槩禁止所帶粗貨不敷易銅請將紬縀紵絹等准其買辦尋部議令將該商等額辦洋銅共需銅本若干應需配搭紬縀若干裝載船隻若干并經由何口出洋何地輸稅查明具奏再議至是議定該商每年共辦銅二百萬斤需銅本銀三十八萬四千餘兩除雜費并置買藥材糖貨外應於每船配搭紬縀三十三捲分裝十六船每捲照向例計重一百二十斤毋許浮多每船三十三捲計額船十六隻應攜帶五百二十八捲責成浙江之乍浦江南之上海二處官員照例稱驗輸稅出口辦銅供鑄仍彼此隨時知㑹以杜重復影射并將糖藥紬縀各數出口日期及所收稅銀一面呈報該管上司轉詳報部并令該撫轉飭實力稽查如有夾帶偷越及守口官員徇隱情弊即行嚴參治罪二十六年議准哈薩克等處貿易縀匹酌量顔色辦解并縀綾等項寬為預備先是哈薩克等處貿易縀匹經部議准各色縀匹飭令三處織造分股勻作兩年辦解至是陜甘總督楊應琚言伊犂阿克蘇等處咨取貿易紬縀內惟綾紬需用紅緑藍月白真紫等色其縀匹一項回人惟喜青藍大紅醬色古銅茶色棕色駝色米色庫灰油緑等色其月白粉紅桃紅小紅黃緑之縀俱不易换所有乾隆二十六年應辦縀匹請行令織造悉照所開顔色辦解再伊犂咨取之紅素倭縀青素倭縀白紡絲白串紬及阿克素咨取之紅緑藍月白真紫花綾等項現俱行文西安購買但各處需用甚多應寬為預備請於二十六年帶辦紅素青素倭縀各二百五十匹白紡絲白串紬各一千匹紅緑藍月白真紫花綾共五百匹計共三千匹同應辦解縀匹一併解送來肅部議應如所請從之臣等謹按甘肅口外新疆自闢展庫車阿克蘇烏什和闐葉爾羌喀什噶爾等處均有市集交易謹據乾隆二十七年甘肅布政使造冊開報大略附載於左闢展向無市集近日或用貨物易换或用銀錢糴買米麵因時貴賤無定價所用斗每一斗合京斗二斗稱一斤十六兩庫車城中有買賣街往來客商並各處回民交易阿克蘇凡買賣貿易俱七日一集城市鄉村男婦咸集彼此以有易無近亦有用銀交易者如米糧牛羊布匹等物各鄉村運至本城買賣設有牙行名逹勒拉勒其稅十分抽一如本城人運至各城界上買賣亦憑經紀而不征其稅别有密圖瓦里伯克專管買賣田産諸務如回部各城至外番貨買物件無稅無定期攜至本城方起稅有巴濟吉爾伯克管理烏什每七日在城中空處設集貿易一次城鄉男婦俱入集場以馬牛羊雞等畜及布匹衣服糧石菜蔬一切雜物彼此交易葉爾羌以稻麥大麥髙粱豆黍并絹布馬牛驢羊等物定價交市和闐以麥蕎麥髙粱黍并絹布馬牛驢羊等物定價交市諸物雜糧及馬畜俱用錢買馬畜俱由葉爾羌喀什噶爾販賣喀什噶爾之市名曰巴雜爾七日為期各村男婦聚其貨物相交易無經紀牙行其糧則麥牟髙粱糜黍其貨則牛馬驢羊布匹價亦因時增減糧之多寡以查拉克計數查拉克者內地十斤也貨之貴賤以大小長短為衡如瓜果蔬菜草束柴薪之屬均倣此交易其錢名曰普兒五十之數為一騰格折銀一兩後定為滿百普兒以銅為之其制小而厚中無方孔一面鑄回字一面鑄凖噶爾字乾隆二十四年大功告成於葉爾羌設局開爐銷其普兒改鑄制錢以十萬騰格為度現在回民以普兒向葉爾羌城易制錢新舊兼用越數年普兒銷盡則回地所用悉為國朝之制錢矣互見錢幣考又喀什噶爾俗以織布為業常以布與布魯特安集延霍罕等處貿易馬牛驢羊諸畜二十七年奉諭㫖蘇昌等奏􅟖咭唎夷商囒等以絲斤禁止出洋夷貨艱於成造籲懇代奏酌量准其配買情詞迫切一摺前因出洋絲斤過多內地市值翔踴是以申明限制俾裕官民織絍然自禁止出洋以來並未見絲斤價平亦猶朕施恩特免米豆稅而米豆仍然價踴也此蓋由於生齒日繁物價不得不貴有司恪守成規不敢通融調劑致逺夷生計無資亦堪軫念著照該督等所請循照東洋辦銅商船搭配紬縀之例每船准其配買土絲二千斤二蠶湖絲三千斤以示加惠外洋至意其頭蠶湖絲及紬綾縀匹仍禁止如舊不得影射取戾又命開奉天海禁并定給票互查之例奉諭㫖奉天直𨽻海船往來運販米豆雜糧向有例禁今夏近京一帶雨水過多市價未免稍昻而奉屬連年豐稔若令商販流通於小民生計甚有禆益著暫開海禁一年俟明嵗秋收後再行停止至商販船隻出入應行驗票稽查其由京往奉省者令於步軍統領衙門給票由奉省來京者於奉天將軍衙門給票各州縣往奉省者於直𨽻總督衙門給票庶彼此察核有憑可杜冒濫諸弊著直𨽻總督奉天將軍府尹㑹同酌定章程妥協經理尋直𨽻總督方觀承議言直𨽻商民往奉省者俱由天津出口應將印票發交天津縣查明船户鄉貫姓名編列字號填入票內給該商收執並取具不致偷漏出洋互保各結存案該商前赴奉省將印票呈驗地方官報明所買糧石數目由將軍衙門給發回票於回棹之日天津縣查其數目將回票仍送奉天將軍衙門查核奉天將軍社圖肯等議言奉天商民往直𨽻者由將軍衙門預頒印票給發海口州縣確查糧石數目船隻字號商人船户姓名籍貫開載票內並取具不致偷漏出洋互保各結存案該商運至直省呈報州縣確查相符即聽出糶仍將原票送回查核其由京城來奉省者令該商將步軍統領衙門所領印票呈驗該地方官與直省來奉者一體辦理俱從之二十八年准東省豆船照運往江南之例由海販運浙江先是山東青白二豆聽商由海運赴江南發賣以濟民食至是閩浙總督楊廷璋言浙省惟有奉天豆石聽商人由海運到發賣至東省素産豆石未有運浙之例但江省之上海劉河與浙省之寧波各海口同屬內地准其運江亦可准其運浙况奉天豆石運浙止赴寧郡進口在鄞發賣未能遍及他郡各商從內河赴江買運路途迂回腳價增重常慮缺乏請令東省豆石照運赴江南例聽商由海販運來浙以資接濟所有商船進口如運寧波府者則由鎮江關直抵鄞港如運杭州嘉興府者則由乍浦收口如運台州府者則由海門汛收口如運溫州府者則由東關汛收口令東省發給聨票將商客船户年貌籍貫船隻字號梁頭丈尺豆石數目出口月日逐一填注船到浙時該口驗明人船即於票內填明到口日期蓋用關口印信報明存案交商進口賣畢回東呈送原給衙門驗銷如海道風信靡常改收浙省别口亦即於該口將商人所攜印票驗填截角聲叙改收别口緣由回東呈繳仍令東省每月將給過豆船票號造冊咨浙浙省亦按月將到口驗過票號豆數造冊移咨東省并飭守口員辨實力稽查毋致米麥雜糧夾帶偷漏從之又准琉球國配買絲斤琉球國中山王尚穆奏請市買絲絹以飾冠服部議該國王奏內並無請買定數恐啓奸商影射之弊應不准行得㫖琉球國疏請配買絲斤部臣議駁自屬遵循例禁苐念該國為海澨逺藩織絍無資不足以供章服據奏情詞懇切著加恩照􅟖咭唎國例准其嵗買土絲五千斤二蠶湖絲三千斤用示加惠外洋至意餘悉飭禁如舊所有稽查各關口岸及出入地方仍加意核查以杜影射二十九年准咖喇吧等國夷商配買絲斤兩廣總督蘇昌等言粵省本港船户林長發等呈稱咖喇吧暹羅港口安南嗎㖘叮嘰呶舊港東埔寨等處各國夷民呈懇配買絲斤紬縀請令每船酌帶土絲一千斤二蠶湖絲六百斤紬縀八折扣算疏下部議尋議內地絲斤外洋勢所必需而海外銅斤可資內地應用應照商船採辦銅斤之例准其配買絲斤紬縀隨帶出洋易銅既使海外屬國同沐皇仁而於內地鼓鑄亦有禆益其酌定數目并立法稽查之處行令該督等詳議具奏到日再議從之又弛絲斤出洋之禁并定江浙閩廣各省商船配絲數目先是奉諭㫖據尹繼善等奏覆議弛洋禁絲斤以便民情一摺前因內地絲斤紬縀等物價值漸昻經御史李兆鵬等先後條奏請定出洋之禁以裕民用乃行之日久而內地絲價仍未見減且有更貴者可見生齒繁衍取多用宏蓋物情自然之勢非盡關出洋之故曾降㫖江浙閩廣各督撫令其各就該省情形悉心體察將應否即行開禁之處詳悉妥議具奏今尹繼善等籌酌定議奏請弛禁而莊有恭並稱前撫浙時體察杭嘉湖三府民情亦以絲斤弛禁為便等語江浙之情形如此則餘省亦可概見蓋緣出洋絲斤本係土絲及二三蠶粗糙之絲非腹地紬縀必須精好物料可比徒立出洋之禁則江浙所産粗絲轉不得利是無益於外洋而更有損於民計又何如照舊弛禁以天下之物供天下之用尤為通商便民乎况所産粗絲既不准出洋勢不得不充雜於頭蠶好絲之內一體售買於民間組織尤多未便且􅟖咭唎咖喇吧等國先後以織絍不供懇請賣給貨買俱已特㫖准其酌帶配用是外洋諸國取給於蠶絲者正復不少亦宜一視同仁曲為體恤現在新絲將届收成所有出洋絲斤既著弛禁仍遵照舊例行其中各省情形或微有不同應作何酌定章程及設法稽查之處俟各該督撫奏齊時該部詳悉妥議具奏尋議採辦洋銅之官商范清洪額商楊裕和等每年出東洋額船十六隻應請每船准配二三蠶糙絲一千二百斤按照紬縀舊額每一百二十斤抵紬縀一捲扣算如願照舊攜帶紬縀者亦聽其便其非辦銅商船仍不得援例夾帶其由江蘇省往閩粵安南等處商船每船攜帶糙絲准以三百斤為限不得逾額多帶閩浙二省商船每船准配土絲一千斤二蠶粗絲一千斤其紬縀紗羅及絲綿等項照舊禁止至粵省外洋商船較他省為多其配往各洋絲斤亦較他省加廣請令每船於舊准帶絲八千斤外再准加帶粗絲二千斤連尺頭總以一萬斤為率其頭蠶湖絲縀匹等項仍嚴行查禁不得影射夾帶滋弊從之四十九年多羅質郡王等議覆尚書福康安兩廣總督舒常㑹奏洋行代監督及本省督撫備辦物件蟄補價值積弊相沿不可不嚴行查禁嗣後督撫及監督俱不准令洋行備辦物件並嚴禁地方官如有向洋行買物短發價值者即指名嚴參至鐘表等物備驗時刻聖意本視為無足重輕此後督撫監督等自效悃忱購買鐘表等物督撫准其每年呈進一次監督准其於正貢內備辦俱令照時發價毋許復有墊補之事一經發覺即從重治罪查各省地方官令行商代辦物件短發價值例禁綦嚴粵省洋行因獲利獨厚遂有代督撫監督墊補價值之事而督撫監督等以出自商人情願遂致積習相沿自應如所奏嚴行查禁至鐘表雖産自外洋聚集粵東原非拘定每次必應呈進况督撫監督等身受渥恩即備物抒悃所費亦屬無多豈得藉詞復令商人墊價代購應如所奏俱令照時給價一經發覺從重治罪但商賈唯利是圖或恃有清查嚴禁恩㫖遂任意開值居竒亦不得不防其漸如該督撫等土貢內購買洋貨若有暗中故增價值及藉詞勒掯情事一經查出亦即嚴行究治又稱洋行商人潘文嚴等情願將洋貨內如鐘表等類可以呈進者每年備辦籲懇監督代為呈進查該商等仰荷聖明體恤清查弊端感激格外恩施情願備物籲懇監督呈進自屬該商等心殷頂戴之意惟是伊等不過微末商人豈得越分呈進貢物即經此次清查之後將來該商等獲利倍多亦應藏富於民俾商力益資寬裕所有該尚書等所奏洋商備物監督代為呈進之處無庸議又稱行商銷售貨物宜隨時稽察每恐富商倚恃資厚居竒把持疲乏之行拖缺價本因循日久難保無壟斷之弊查夷商投行每向本厚者託銷原圖先墊價值不致拖缺但恐洋行本厚者可以倚恃把持居竒昻貴本乏者勢必勉强受貨漸致拖缺查戶部先於乾隆四十五年議奏洋商顔時英等借缺夷人銀兩案內其買賣貨物令各行商公同照時定價貸銷至夷商之有無勾串評價之是否公平已飭令該督嚴加查察在案今該尚書等稱令各行每年照依時價公平交易自應如所奏辦理仍令該督並監督不時查察以杜弊端又稱洋珠寶石珊瑚等物報稅者均係細小不堪自係夷商夾帶大件進口奸猾鋪户先於洋面截買希圖漏稅分肥查粵海關商稅則例如各色珍珠寶石抽稅本屬無多而仍不免偷漏之弊者總緣內地奸商以此等物件本無定價易於居竒遂哄誘夷人不令報明希圖多得價值甚而迎至洋面勾通藏匿以致偷漏日多自應設法稽查以昭慎重但此等物件易於隨身攜帶非逐加搜檢難免透漏而搜查過嚴又非體恤夷商之道更恐不肖胥役長隨藉端滋事亦不得不防其漸其如何辦理妥協之處應令新任總督等悉心籌酌隨時調劑以期永久無弊得㫖留京辦事王大臣議覆福康安舒常等籌酌粵省洋行事宜內稱該督撫及監督等土貢內購買洋貨鐘表等物務令洋行各商公同定價又洋行貨內珍珠寶石等項抽稅易於偷漏應令新任總督監督等悉心籌酌以期永久無弊等語國家撫馭外洋不貴異物每嵗畨民與內地洋行交易貨物俾沾利益原所以體恤商夷至洋貨內鐘表等項不過備驗時刻向來粵海關原有官買之例而廣東督撫監督等往往於土貢內亦有呈進者今內務府造辦處皆所優為更無事外洋購覔既經查明自應嚴諭裁禁嗣後督撫等於鐘表一項永不准再行呈進至珍珠寶石等項原無需用之處向來粵海關抽稅亦屬無多况此等物件本難定價易至居竒且便于攜帶藏匿難保無偷漏分肥否則過於吹求若設法嚴禁逐項搜查實屬不成事體現在京師及各處關隘商稅則例內本無此項稅課不如聽商人等自行交易免其收稅則諸弊悉清更無庸多為防範嗣後粵海關珍珠寶石概不准征收稅課著為令臣等謹按中外商民本同一體聖朝仁恩覃洽舉凡通商旅柔逺人之道莫不詳盡靡遺所由慕義嚮風爭先恐後互市之設百數十年來如一日猶復時厪皇上聖懷體恤周至既裁禁進呈洋行鐘表以昭不貴異物之風復因洋珠寶石價易居竒若設法稽查益恐藉端滋擾大哉王言聽商人等自行交易免其收稅則諸弊悉清誠優恤番民至計溥利賴於無窮也皇朝文獻通考卷三十三
