body:
  text: 欽定四庫全書皇朝文獻通考卷二百四十一帝系考三后妃皇始祖肇祖原皇帝皇始祖妣原皇后順治五年十一月戊辰恭上尊號尊諡興祖直皇帝直皇后順治五年十一月戊辰恭上尊號尊諡景祖翼皇帝翼皇后順治五年十一月戊辰恭上尊號尊諡顯祖宣皇帝宣皇后喜塔喇氏都督阿古女為宣皇帝嫡妃誕育太祖順治五年十一月戊辰恭上尊號尊諡次妃哈達納喇氏完汗養女庶妃李佳氏古魯禮女太祖高皇帝孝慈高皇后葉赫納喇氏貝勒揚吉努女戊子九月歸太祖為皇后誕育太宗癸卯九月庚辰崩崇德元年四月丙戌恭上尊諡曰孝慈昭憲純德貞順成天育聖武皇后康熙元年四月丙辰加上尊諡曰孝慈昭憲敬順慶顯承天輔聖高皇后雍正元年八月己酉加上尊諡曰孝慈昭憲敬順仁徽慶顯承天輔聖高皇后乾隆元年三月乙巳加上尊諡曰孝慈昭憲敬順仁徽懿德慶顯承天輔聖高皇后恭加上孝慈昭憲敬順仁徽慶顯承天輔聖高皇后尊諡冊文曰義重顯揚懿範聿昭於開創功𢎞贊助隆稱宜奉於纘承緬令則之長垂識凝休之有自欽惟孝慈昭憲敬順慶顯承天輔聖高皇后承乾育物應地資生媯汭觀型早著幽閒之度洽陽作合夙嫺貞靜之風歸我太祖高皇帝克勤克儉襄櫛風沐雨之勞至孝至仁佐天與人歸之業著慈祥於樛木𢎞愷悌於螽斯景運誕膺本慈闈之垂裕輿圖式廓推至德之淵源緬懷雝肅徽音傳諸奕世永被雎麟雅化貽及萬年用展微忱敬加鴻號謹奉冊寶增上尊諡曰孝慈昭憲敬順仁徽慶顯承天輔聖高皇后伏冀慈鑒丕昭繁禧懋錫萃日升月恒之福介民安物阜之休恭加上孝慈昭憲敬順仁徽懿德慶顯承天輔聖高皇后尊諡冊文曰功隆贊助遡開創於前猷誼重尊親表肅雝於顯號仰資生之大德昭裕後之光儀欽惟孝慈昭憲敬順仁徽慶顯承天輔聖高皇后合撰坤元膺符宸極璇閨毓德早傳淑慎之風蘭室觀型夙著安貞之範歸我太祖高皇帝順乃承天仁能逮下奉神靈而理萬物肇作邦作對之休昌後嗣而燕皇天啟卜世卜年之運式荷慈闈之謙裕應地無疆毗成王業之崇隆發祥有本敬嗣徽音於百世丕昭鴻號於萬年謹奉冊寶增上尊諡曰孝慈昭憲敬順仁徽懿德慶顯承天輔聖高皇后伏冀慈鑒式憑繁禧載錫永啟萬方之景福長綏奕世之洪庥元妃佟佳氏塔本巴晏女妃富察氏莽塞杜諸祜女大妃烏拉納喇氏貝勒滿泰女側妃伊爾根覺羅氏扎親巴晏女側妃葉赫納喇氏貝勒揚吉努女妃博爾濟吉特氏科爾沁貝勒明安女妃哈達納喇氏貝勒祜爾翰女妃博爾濟吉特氏科爾沁炳圖郡王孔果洛女順治十八年十月尊封皇曾祖壽康太妃庶妃兆佳氏喇克達女庶妃鈕祜禄氏博克瞻女庶妃嘉穆瑚覺羅氏貝渾巴晏女庶妃西林覺羅氏奮杜里哈斯祜女庶妃伊爾根覺羅氏察弼女太宗文皇帝孝端文皇后博爾濟吉特氏科爾沁貝勒莽古思女崇德元年以嫡妃冊立為清寧中宫后世祖登極尊為皇太后尊諡恭載皇太后門關雎宫宸妃博爾濟吉特氏科爾沁貝勒寨桑女崇德元年封六年十月諡敏惠恭和元妃麟趾宫貴妃博爾濟吉特氏諾顔阿魯阿巴海額齊克女崇德元年封順治九年十月尊封皇考懿靜大貴妃衍慶宫淑妃阿魯阿巴海博第賽楚祜爾塔布囊女崇德元年封順治九年十月尊封皇考康惠淑妃元妃鈕祜禄氏巴圖魯公額亦都女繼妃烏拉納喇氏貝勒博克鐸女側妃葉赫納喇氏貝勒阿納布女側妃扎嚕特博爾濟吉特氏巴雅爾圖戴青女庶妃納喇氏英格布女庶妃竒壘氏察哈爾諤勒濟圖固英寨桑女庶妃顔扎氏布顔女庶妃伊爾根覺羅氏安塔錫女庶妃氏未詳拜祜女庶妃氏及所生父俱未詳世祖章皇帝孝惠章皇后博爾濟吉特氏科爾沁多羅貝勒原封鎮國公綽爾濟女順治十一年六月甲戌冊立為皇后聖祖登極恭上尊號曰皇太后恭載徽號皇太后尊諡門冊立皇后冊文曰朕惟兩儀作配后德肇於坤承百世延禧王化基於内則義偕資始位正安貞咨爾博爾濟吉特氏乃科爾沁鎮國公綽爾濟之女川岳鍾祥雎麟嫓美柔嘉成性允符天俔之禎淑慎為儀式兆月恒之慶兹仰承懿命以冊寶立爾為皇后其尚助隆孝養克叶雝和茂衍昌熾於本支共薦馨香於宗廟欽哉寶文曰皇后之寶孝獻皇后棟鄂氏内大臣鄂碩女順治十三年十二月己卯封皇貴妃十七年八月壬寅薨甲辰追封皇后諡孝獻莊和至德宣仁温惠端敬皇后靜妃博爾濟錦氏科爾沁卓哩克圖親王烏克善女順治八年八月戊午冊立為皇后十年八月降為靜妃謹據恭纂實録妃博爾濟吉特氏科爾沁和碩達爾漢親王曼珠錫禮女順治十五年三月追封悼妃妃棟鄂氏輕車都尉巴度女順治十八年二月追封皇考貞妃妃石氏侍郎石申女康熙六年十二月追封皇考恪妃妃浩齊特博爾濟吉特氏多羅額爾德尼郡王博羅特女康熙十二年十二月尊封皇考恭靖妃妃科爾沁博爾濟吉特氏多羅貝勒綽爾濟女康熙十二年十二月尊封皇考淑惠妃妃阿巴海博爾濟吉特氏一等台吉布達希布女康熙十二年十二月尊封皇考端順妃庶妃棟鄂氏長史喀濟海女康熙十二年十二月追封皇考寧慤妃庶妃穆克圖氏雲騎尉伍喀女庶妃巴氏庶妃陳氏庶妃唐氏庶妃鈕氏庶妃楊氏庶妃烏蘇氏庶妃納喇氏聖祖仁皇帝孝誠仁皇后赫舍哩氏領侍衛内大臣承恩公噶布拉女康熙四年九月辛卯冊立為皇后十三年五月丙寅崩六月庚申諡仁孝皇后六十一年十二月追上尊諡曰仁孝恭肅正惠安和儷天襄聖皇后雍正元年四月改上尊諡曰孝誠皇后九月庚辰加上尊諡曰孝誠恭肅正惠安和儷天襄聖仁皇后乾隆元年三月乙已加上尊諡曰孝誠恭肅正惠安和淑懿儷天襄聖仁皇后冊立皇后冊文曰朕惟乾坤德合式隆化育之功内外治成聿懋雍和之用典禮於斯而備教化所由以興兹爾赫舍哩氏乃内大臣噶布拉之女也世德鍾祥崇勲啟秀柔嘉成性宜昭女教於六宫貞靜持躬應正母儀於萬國兹仰承太皇太后懿命以冊寶立爾為皇后其尚𢎞資孝養克贊恭勤茂本支奕葉之休佐宗廟維馨之祀欽哉寶文曰皇后之寶仁孝皇后尊諡冊文曰朕惟王化肇於閨門洵藉内庭之助陰教成於宫壼尤資皇后之賢故皇英嬪而帝道興任姒歸而皇圖永緬稽淑行載籍攸存惟翬服之有光斯彤管其紀盛聿彰令聞爰著徽稱皇后赫舍哩氏毓自名門躬全懿範作朕元配正位中宫慈惠本乎性成柔嘉維則温恭篤於天賦禮度攸嫻主雅化於閨闈表芳型於海宇勤兩宫之孝養嫻以承顔遇九御以寛和恩能逮下蘋蘩時飭克佐精誠澣濯常衣允昭節儉箴規之益贊宵旰而彌勤貞順之風御家邦而式化方期永綏福履詎意頓隔音容月掩椒塗鑑亡蘭殿朕心傷悼率土悲哀懷哲思賢惓徽音於靡盡揚休宣譽垂鴻號於無疆彞典式遵崇褒用錫特以冊寶諡曰仁孝皇后於戲聖善𢎞宣奕世頌褘褕之盛母儀備美千秋耀琬琰之輝靈其有知膺兹光寵恭加上孝誠恭肅正惠安和儷天襄聖仁皇后尊諡冊文曰道協坤元樹母儀而作則化隆内治揚聖淑以垂休晉千秋有耀之榮稱奉萬世無疆之寶冊欽惟皇妣孝誠皇后慶鍾厚載德嫓皇家當先帝勅天凝命之辰乃中宫應地含章之會䖍奉重闈之滫瀡曲慰慈顔潔承九廟之蘋蘩克襄孝治仁能逮下推惠澤於掖庭恪以持身贊勤勞於旰食椒塗緬企芳型閲乆以長存彤管昭垂懿誨如新而未逺期當升配兩儀均健順之功事極尊崇奕葉著肅雝之範刻瑤函而煥采彝典丕彰依玉几以薦馨徽音允協謹奉冊寶恭上尊諡曰孝誠恭肅正惠安和儷天襄聖仁皇后伏冀慈恩黙佑錫介祉以熾昌壼教永新致協和於悠逺極顯揚之微悃庶靈爽之式憑恭加上孝誠恭肅正惠安和淑懿儷天襄聖仁皇后尊諡冊文曰功同厚載襄治化於昌朝禮重鴻稱耀徽音於寶冊夙合二儀之撰聿垂奕葉之光欽惟孝誠恭肅正惠安和儷天襄聖仁皇后性秉温恭範垂莊肅潔蘋蘩於九廟齋祀加䖍奉滫瀡於重闈晨昏致謹孝慈育物椒庭之令則宏昭誠敬持躬蘭殿之芳徽允播勞心閫閾常分宵旰之憂勤贊化宫闈克佐昇平之治理溯仁風之已逺彤管方輝緬懿誨之長垂瑤函正煥欽承丕緒值典禮之維新式考彝章方顯揚之莫罄謹奉冊寶增上尊諡曰孝誠恭肅正惠安和淑懿儷天襄聖仁皇后伏冀淑靈式庇嘉德惟馨永貽昌熾之庥益佑和恒之福孝昭仁皇后鈕祜禄氏太師果毅公遏必隆女康熙十六年八月丙寅由妃冊立為皇后十七年二月丁卯崩閏三月辛酉諡孝昭皇后六十一年十二月追上尊諡曰孝昭靜淑明惠正和欽天順聖皇后雍正元年九月庚辰加上尊諡曰孝昭靜淑明惠正和欽天順聖仁皇后乾隆元年三月乙巳加上尊諡曰孝昭靜淑明惠正和安裕欽天順聖仁皇后冊立皇后冊文曰朕惟道法乾坤内治乃人倫之本教型家國壼儀實王化之基資淑德以承庥宜正名而惇典咨爾妃鈕祜禄氏乃公遏必隆之女也鍾祥世族毓秀名門性秉温莊度嫺禮法柔嘉表範夙昭令譽於宫庭雍肅持身允協母儀於中外兹仰承太皇太后慈命以冊寶立爾為皇后爾其誠孝以奉重闈恭儉以先嬪御敬襄宗祀𢎞開奕葉之祥益贊朕躬茂著雍和之治欽哉寶文曰皇后之寶孝昭皇后尊諡冊文曰朕惟正兩儀之位資始允藉夫資生端萬化之原治外必先於治内故壼政修而家邦永賴坤貞著而品物咸亨緬懷懿淑之隆益念匡襄之德徽音尚在盛典宜崇咸由紀美於休稱始克流光於奕世皇后鈕祜禄氏夙承華閥聿茂令儀暨正宫闈作朕良配履和思順端恪本於天懷體巽居謙温莊發乎至性奉兩宫之定省愉婉彌殷襄九廟之馨香敬共加篤衣疏服澣首𢎞儉樸之風夜寐夙興克佐旰宵之治惇五常而仁能逮下循四教而慎以禔躬覽史披圖既嫓徽於彤管含章藴美洵叶吉於黃裳何圖掖殿之旋虚深痛儀型之永逝載考追崇之典式稽節惠之文諡以尊名表慈惠愛親之實詞難罄媺兼聖聞昭達之休懿德聿彰鴻名無忝特以冊寶諡曰孝昭皇后於戲炳丹青於百代至行堪師垂琬琰於千秋芳規丕著哀榮斯極寵命宜承恭加上孝昭靜淑明惠正和欽天順聖仁皇后尊諡冊文曰襄治化於昌朝夙合二儀之撰耀徽音於典冊聿垂萬葉之光勲華之盛烈丕彰任姒之芳規益播欽惟皇妣孝昭皇后性含柔靜範表温莊華閥鍾祥協坤貞而作則椒塗正位偕帝德以交輝侍膳慈闈克謹晨昏之奉勞心中壼每分宵旰之勤箴銘茂著於彤編褕翟久辭於丹禁溯淑恭之懿行茂典流光揚藹吉之仁風貞珉煥采兹值纘承之始彌深崇報之思清廟森嚴考彝章而合祔寶函鄭重列俎豆以升馨謹奉冊寶恭上尊諡曰孝昭靜淑明惠正和欽天順聖仁皇后伏冀在天靈爽永貽奕世之安裕後儀型長介億年之福進鴻稱而允協垂琬刻以光昭恭加上孝昭静淑明惠正和安裕欽天順聖仁皇后尊諡冊文曰功符坤厚詒燕翼於萬年德合乾元表鴻名於奕葉義必先於報本禮莫重乎尊稱欽惟孝昭靜淑明惠正和欽天順聖仁皇后性成淑慎範著温恭華胄鍾祥頌芳聲之早播椒塗正位垂内則以長昭慰色笑於慈闈晨昏盡養佐憂勤於黼座夙夜加䖍盛德方新翟茀遽辭於丹禁仁恩永戴箴銘並著於彤編溯藹吉之令儀千秋煥采緬孝慈之懿行百世流芳洎及眇躬實切顯揚之願欽承鴻業益深崇報之思考彝典以揚芬進瑤函而煥彩謹奉冊寶增上尊諡曰孝昭靜淑明惠正和安裕欽天順聖仁皇后伏冀厚蔭常垂慈恩黙佑介無疆之景福開有象之太平孝懿仁皇后佟佳氏領侍衛内大臣承恩公國舅佟國維女康熙十六年八月丙寅封貴妃二十年十二月己亥封皇貴妃二十八年七月癸卯冊立為皇后甲辰崩九月乙卯諡孝懿皇后六十一年十二月追上尊諡曰孝懿温誠端仁憲穆奉天佐聖皇后雍正元年九月庚辰加上尊諡曰孝懿温誠端仁憲穆奉天佐聖仁皇后乾隆元年三月乙巳加上尊諡曰孝懿温誠端仁憲穆和恪奉天佐聖仁皇后冊立皇后冊文曰朕惟德協黃裳王化必原於宫壼芳流彤史母儀用式於家邦秉令範以承庥錫鴻名而正位咨爾皇貴妃佟佳氏乃領侍衛内大臣舅舅佟國維之女也系出高閎祥鍾戚里矢儉勤於蘭掖展誠孝於椒闈慈著螽斯鞠子洽均平之德敬章翬翟禔身表淑慎之型夙著懿稱宜膺茂典兹仰遵慈諭命以冊寶立爾為皇后爾其祗承景命善保厥躬化被蘋蘩益著徽音之嗣榮昭璽紱永期繁祉之綏欽哉寶文曰皇后之寶孝懿皇后尊諡冊文曰道𢎞地載六宫資陰教之修化始人倫萬國仰母儀之重壼闈擅媺音足嗣於前徽圖史流馨德常新於奕禩皇后佟氏英鍾戚畹瑞衍名宗克秉淵心協女箴之婉娩式昭玊度本天賦之温莊自媯水以嬪虞比周京之纘女佐晨昏而將敬勤著雞鳴溥鞠育以宣慈慶貽麟定仁能逮下木樛曲以堪縈志在進賢荇參差而必采世方逢乎豐豫儉德滋彰名已冠乎宫庭謙懷彌篤珮環有節恒贊宵衣織紞維勞允師内職二南之風繼軌九御之屬傾心乃正坤維洵推哲配褘褕初御方期延祉於長秋繐帳旋陳遽悼韜輝於永夜雖此日之芳華易謝而千年之令譽彌窮考古彝章稱兹顯諡聿煥丹青之采丕揚金石之光特以冊寶諡曰孝懿皇后於戲溯淑型於桂館嫓美姜任播嘉則於瓊章垂聲穹壤榮哀具備寵渥祗承恭加上孝懿温誠端仁憲穆奉天佐聖仁皇后尊諡冊文曰儷乾作則坤元彰厚載之功體巽流徽廟祀舉尊親之典賁瑤函於有耀熙鴻號於無窮欽惟皇妣孝懿皇后毓粹高門騰芬戚畹佐顯承之𢎞烈壼政勤修篤慈愛之盛心母儀懋著履和思順致仁孝於彤闈尚儉懷謙翼昇平於黼座撫沖齡而顧復備䝉鞠育之仁溯十載之劬勞莫報生成之德緬宫庭之佑啟翟茀如存感歲月之遷流萱幃久閟追惟慈覆彌懷高厚之恩誕紹丕基倍切顯揚之願安貞令範洵應地以無疆炳曜徽音長配天而不冺謹奉冊寶恭上尊諡曰孝懿温誠端仁憲穆奉天佐聖仁皇后伏冀淑靈式庇茂膺天禄之熾昌嘉德惟馨永廓聖圖之廣大潔苾芬而肅薦耀金石以長垂恭加上孝懿温誠端仁憲穆和恪奉天佐聖仁皇后尊諡冊文曰儷天立極垂令範於千秋應地含章享隆名於奕世廟庭增煥典冊維新欽惟孝懿温誠端仁憲穆奉天佐聖仁皇后毓瑞高閎騰芬戚畹贊顯承之偉烈内則勤修篤慈愛之深仁母儀茂著晨昏有恪盡孝養於彤闈夙夜維䖍佐憂勞於宸扆溯宫庭之佑啟撫皇考於沖齡十載劬勞備荷生成之德終天哀痛常懷高厚之恩洎自𦕈躬欽承丕業體孝思於不匱尊禮宜崇熙鴻號於無窮頌揚莫罄謹奉冊寶增上尊諡曰孝懿温誠端仁憲穆和恪奉天佐聖仁皇后伏冀慈眷加隆純禧益懋貽安阜於四海綏昌熾於萬年貴妃鈕祜禄氏太師果毅公遏必隆女康熙二十年十二月封貴妃三十四年十一月諡温僖貴妃貴妃佟佳氏領侍衛内大臣承恩公國舅佟國維女康熙三十九年十二月封貴妃雍正二年六月尊封皇考皇貴妃乾隆元年十一月尊封皇祖壽祺皇貴太妃八年七月諡皇祖慤惠皇貴妃慧妃科爾沁博爾濟吉特氏三等台吉阿郁錫女康熙九年五月追封惠妃納喇氏郎中索爾和女康熙十六年八月封惠嬪二十年十二月晉封惠妃宜妃郭囉羅氏佐領三官保女康熙十六年八月封宜嬪二十年十二月晉封宜妃榮妃馬佳氏員外郎葢山女康熙十六年八月封榮嬪二十年十二月晉封榮妃平妃赫舍哩氏領侍衛内大臣承恩公噶布拉女康熙三十五年六月追封敏妃章佳氏叅領海寛女康熙三十八年七月追封雍正元年六月諡皇考敬敏皇貴妃宣妃博爾濟吉特氏科爾沁達爾漢親王和塔女康熙五十七年十二月封和妃𤓰爾佳氏三品協領祜滿女康熙三十九年十二月封和嬪五十七年十二月晉封和妃雍正二年六月尊封皇考貴妃乾隆元年十一月尊封皇祖温惠貴妃八年十一月尊封皇祖温惠皇貴太妃成妃戴佳氏司庫卓竒女康熙五十七年十二月封良妃衛氏内管領阿布鼐女康熙三十九年十二月封良嬪後晉封良妃安嬪李氏總兵官剛阿岱女康熙十六年八月封敬嬪章佳氏䕶軍叅領華善女康熙十六年八月封端嬪董氏員外郎董達齊女康熙十六年八月封僖嬪赫舍哩氏賚山女康熙十六年八月封定嬪萬琉哈氏郎中拖爾弼女康熙五十七年十二月封雍正二年六月尊封皇考定妃密嬪王氏知縣王國正女康熙五十七年十二月封雍正二年六月尊封皇考密妃乾隆元年十一月尊封皇祖順懿密太妃勤嬪陳氏二等侍衛陳閔女康熙五十七年十二月封雍正四年二月尊封皇考勤妃乾隆元年十一月尊封皇祖純裕勤太妃貴人納喇氏監生常素保女雍正二年六月尊封皇考通嬪貴人兆佳氏叅領塞克塞赫女貴人郭囉羅氏佐領三官保女貴人袁氏貴人納喇氏那丹珠女貴人陳氏陳秀女貴人納喇氏驍騎校昭格女庶妃高氏高廷秀女康熙六十一年十二月尊封皇考貴人乾隆元年十二月尊封皇祖襄嬪庶妃色赫圖氏員外郎多爾濟女康熙六十一年十二月尊封皇考貴人乾隆元年十二月尊封皇祖謹嬪庶妃石氏石懷玉女康熙六十一年十二月尊封皇考貴人乾隆元年十二月尊封皇祖靜嬪庶妃陳氏陳玊卿女康熙六十一年十二月尊封皇考貴人乾隆元年十二月尊封皇祖熙嬪庶妃陳氏陳岐山女康熙六十一年十二月尊封皇考貴人乾隆元年五月追封皇祖穆嬪庶妃鈕祜禄氏員外郎晉寶女庶妃張氏庶妃王氏庶妃劉氏世宗憲皇帝孝敬憲皇后納喇氏承恩公費揚古女雍正元年十二月丁卯以嫡妃冊立為皇后九年九月己丑崩十二月己亥諡孝敬皇后十三年八月皇上登極十一月丙辰恭上尊諡曰孝敬恭和懿順昭惠佐天翼聖憲皇后冊立皇后冊文曰朕惟道原天地乾始必賴乎坤成化洽家邦外治恒資乎内職既應符而作配宜正位以居尊咨爾嫡妃納喇氏祥鍾華胄秀毓名門温惠秉心柔嘉表度六行悉備久昭淑德於宫中四教𢎞宣允合母儀於天下兹奉皇太后慈命以冊寶立爾為皇后爾其承顔思孝務必敬而必誠逮下為仁益克勤而克儉恪共祀事聿觀福履之成勉嗣徽音用贊和平之治欽哉寶文曰皇后之寶孝敬皇后尊諡冊文曰地宏厚載承乾道以時行月炳陰暉助曦輪而垂照正位彰母儀之盛化茂周南禔躬備婦德之全名高媯汭式稽令典宜表徽稱皇后納喇氏毓質粹和秉心柔順蘭閨佩訓蹈女史之規型朱邸來嬪嫺天潢之禮度問安内殿盡孝敬於先皇侍宴禁闈奉懽愉於母后逮登大寶爰陟坤寧處貴逾謙居尊彌懋深懷恪敬凜夙夜於椒庭永念兢勤贊儆咨於黼座恩流九御頒樛木之慈仁儉率六宫敦葛覃之澹約褘衣肅穆方期福履之綏璜佩渺茫忽感音容之隔乃頒綸命聿詔近臣考諡法之相符詢僉謀而惟允特以冊寶諡曰孝敬皇后於戲播鴻聲於萬國采煥金函揚媺行於千秋光騰瑤牒祗膺寵賁用具哀榮恭加上孝敬恭和懿順昭惠佐天翼聖憲皇后尊諡冊文曰慈徽永慕垂懿範於千秋茂典追崇耀鴻聲於萬葉晉瑤函而展孝溯淑德以揚休欽惟皇妣孝敬皇后體順承天含章應地性成純孝重闈之奉養備得歡心化洽肅雝朱邸之贊襄久彰令則迨正中宫之位益宏内治之功躬節儉以表率宫庭履敬慎而分憂宵旰温恭示教茂昭愷悌之風惠愛覃敷咸頌寛和之德顧惟沖眇夙荷恩暉蘭殿瞻依緬訓言之如在雲軿長往愴歲序之頻遷兹當繼序之初倍切顯揚之願敬循彝典祗奉尊稱謹奉冊寶恭上尊諡曰孝敬恭和懿順昭惠佐天翼聖憲皇后伏冀慈鑒丕昭錫蕃禧而昌後鴻庥垂庇貽介福以流徽永懷罔極之恩佑啟無疆之祚皇貴妃年氏湖廣巡撫年遐齡女雍正元年十一月封貴妃三年十一月晉封皇貴妃十二月諡敦肅皇貴妃齊妃李氏知府李文熚女雍正元年十二月封裕妃耿氏管領耿德金女雍正元年十二月封裕嬪晉號裕妃乾隆二年九月尊封皇考貴妃寧妃武氏知州武柱國女雍正十二年五月追封懋嬪宋氏主事金柱女雍正元年十二月封謙嬪劉氏管領劉滿女雍正十一年六月封乾隆二年九月尊封皇考謙妃今上皇帝孝賢皇后富察氏承恩公李榮保女乾隆二年十二月丁亥以嫡妃冊立為皇后十三年三月乙未崩五月甲辰冊諡冊立皇后冊文曰朕惟乾坤定位爰成覆載之能日月得天聿衍升恒之象惟内治乃人倫之本而徽音實王化所基茂典式循彝章斯舉咨爾妃富察氏鍾祥勲族秉教名宗當親迎之初年禮成渭涘應嫡妃之正選譽藹河洲温恭嫺圖史之規敬慎協珩璜之度承歡致孝問安交儆於雞鳴逮下流恩毓慶茂昭於麟趾允賴宜家之助當隆正位之儀兹奉崇慶皇太后慈命以金冊金寶立爾為皇后爾其祗承懿訓表正壼儀奉長樂之春暉勗夏凊冬温之節布坤寧之雅化贊宵衣旰食之勤恭儉以率六宫仁惠以膺多福螽斯樛木和風普被於閨闈繭館鞠衣德教覃敷於海宇永綏天禄懋迓鴻禧欽哉寶文曰皇后之寶孝賢皇后尊諡冊文曰内治丕昭夙播周南之雅化坤儀懋著宜揚媯汭之芳聲稽茂典於容臺易名綦重備鴻章於閟寢命冊攸崇琬刻初成瑤緘永煥惟皇考之慈命作配朕躬䝉皇妣之褒稱深嘉至性聿自坤寧正位每宵旰之相資常偕萱殿承歡實凊温之是代奉神靈之統克嗣徽音端宫府之型宏宣令問禮修繭館儉勤則躬曳練衣恩洽椒塗仁恕則澤均樛木綜平生之懿行莫罄揄揚薦壹惠之鴻名用垂久逺式循彝典爰布明綸在昔黔婁諡定於其妻亦越展禽誄傳於乃婦葢由伉儷之篤匪朝伊夕以相從斯能纎悉無遺有美而文之備至追思皇后之淑德惟朕知之為最深疇咨諡典之隆稱自朕衡之而允協惟賢與孝實乃兼優惟孝與賢詞無溢美兹以冊寶諡曰孝賢皇后於戲闡揚至行寸心可信於千秋約舉大端兩字實該夫衆善金章龍紐蘭宫之寶器猶新香檢鸞書黼帳之琅函肇設祗膺寵賁黙鑒追思皇后納喇氏佐領那爾布女乾隆二年十二月丁亥封嫺妃十年十一月甲申晉封貴妃十四年四月壬午晉封皇貴妃攝六宫事十五年八月壬申冊立為皇后三十一年七月壬午薨癸未奉諭㫖據留京辦事王大臣奏皇后於本月十四日未時薨逝皇后自冊立以來尚無失德去年春恭奉皇太后巡幸江浙正承歡洽慶之時皇后性忽改常於皇太后前不能恪盡孝道比至杭州則舉動尤乖正理跡類瘋迷因令先程回京在宫調攝經今一載餘病勢日劇遂爾奄逝此實皇后福分淺薄不能仰承聖母慈眷受朕恩禮所致若論其行事乖違即予以廢黜亦理所當然朕仍存其名號已為格外優容但飾終典禮不便復循孝賢皇后大事辦理所有喪儀止可照皇貴妃例行交内務府大臣承辦著將此宣諭中外知之冊立皇后冊文曰朕惟乾始必賴乎坤成健順之功以備外治兼資於内職家邦之化始隆惟中壼之久虚宜鴻儀之肇舉爰稽茂典用協彝章咨爾攝六宫事皇貴妃納喇氏秀毓名門祥鍾世德早從潛邸含章而懋著芳型晉錫榮封受祉而克嫺内則禔躬淑慎洵堪繼美於蘭幃秉德温恭信可嗣音於椒殿往者統六宫而攝職從宜一準前規今兹閲三載而屆期成禮式遵慈諭恭奉崇慶慈宣康惠皇太后命以金冊金寶立爾為皇后爾其祗承懿訓表正掖庭䖍修温凊之儀洽歡心於長樂勉効蘋蘩之職端禮法於深宫逮螽斯樛木之仁恩永綏後福覃繭館鞠衣之德教敬紹前徽顯命有光鴻庥滋至欽哉寶文曰皇后之寶皇貴妃高氏大學士高斌女乾隆二年十二月封貴妃十年正月晉封皇貴妃四月諡慧賢皇貴妃皇貴妃富察氏佐領翁果圖女乾隆元年十月追封哲妃十年四月諡哲憫皇貴妃皇貴妃金氏上駟院卿三保女乾隆二年十二月封嘉嬪六年十一月晉封嘉妃十四年四月晉封貴妃二十年十二月諡淑嘉皇貴妃皇貴妃蘇氏蘇召南女乾隆二年十二月封純妃十年十一月晉封貴妃二十五年四月晉封皇貴妃五月諡純惠皇貴妃皇貴妃魏氏内管領清泰女乾隆十年十一月封令嬪十四年四月晉封令妃二十四年二月晉封貴妃三十一年六月晉封皇貴妃四十年正月諡令懿皇貴妃忻貴妃戴佳氏總督那蘇圖女乾隆十九年閏四月封忻嬪二十八年九月晉封忻妃薨以貴妃禮殯慶貴妃陸氏陸士隆女乾隆十六年六月封慶嬪二十四年二月晉封慶妃三十三年六月晉封慶貴妃愉妃珂里葉特氏員外郎額爾吉圖女乾隆六年十一月封愉嬪十年十一月晉封愉妃舒妃葉赫納喇氏侍郎永綬女乾隆六年十一月封舒嬪十四年四月晉封舒妃穎妃巴林氏都統兼輕車都尉納親女乾隆十六年六月封穎嬪二十四年十二月晉封穎妃豫妃博爾濟吉特氏寨桑根敦女乾隆二十四年十二月封豫嬪二十九年七月晉封豫妃容妃和卓氏台吉和扎賚女乾隆二十七年五月封容嬪三十三年六月晉封容妃惇妃汪氏都統四格女乾隆三十六年十月封惇嬪三十九年九月晉封惇妃順妃鈕祜禄氏總督愛必達女乾隆三十三年六月封順嬪四十一年六月晉封順妃怡嬪柏氏柏士彩女乾隆六年十一月封怡嬪婉嬪陳氏陳廷璋女乾隆十四年四月封婉嬪恂嬪拜爾噶斯氏德穆齊賽音察克女乾隆二十七年五月封恂嬪慎嬪霍碩特氏台吉烏巴什女乾隆二十七年五月封慎嬪誠嬪鈕祜禄氏二等侍衛兼佐領穆克登女乾隆四十一年十一月封誠嬪循嬪伊爾根覺羅氏總督桂林女乾隆四十一年十一月封循嬪臣等謹按凡册封后妃諸儀注馬端臨通考列后妃門五朝續通考則仍王圻本移入王禮考今從之皇朝文獻通考卷二百四十一
