body:
  text: 兵考二禁衛兵臣等謹案自古天子端居法宫必有期門羽林之士環衛而擁䕶是故周廬千列執㦸百重入守禁廷出司警蹕職綦重矣周禮太宰所屬宫正掌宫中之官府宫伯掌王公之士庻子各辨其次舍之職而後世於是乎有郎衛司馬所屬虎賁氏有虎士八百人掌先後王而趨以卒伍視朝則在路門之右而後世於是乎有兵衛漢唐以來名號雖殊規制相仿前考所述具詳我朝以八旗統兵不襲古制而自與古合侍衛之職選三旗中材武出衆之子弟及各執事効力人等之可任者為之分班入直其優者擢為御前侍衛乾清門侍衛而統以三旗領侍衛内大臣即所謂郎衛也前鋒統領所轄之前鋒䕶軍統領所轄之䕶軍掌宿衛清蹕及宫禁傳籌内禁門啟閉内府三旗所轄之前鋒䕶軍驍騎掌守衛隨從八旗都統所轄之驍騎掌各處直班巡徼步軍統領所轄之步軍掌禁城汛守外禁門啟閉即所謂兵衛也兵衛之中專衛禁苑者為圓明園八旗䕶軍營及内府三旗䕶軍營其演習槍礮者别為火噐營演習雲梯者别為健鋭營專備行狩者别為虎槍營而禁衛之兵備矣夫自古禁旅之虗實尤為戎政所亟明代置侍衛上直軍領以錦衣及金吾諸衛置京軍三大營及四衛營所謂郎衛兵衛者其制未嘗不具尋以狃於晏安威漸不振及其究也軍多隠占尺籍久虚而兵事遂不可問我國家建旗之制包舉無外諸營並列棊布星羅而悉統之以八旗其稽覈有法其選擢有方其番直有期其訓習有道分職設官練材于素有事則收折衝之效無事則備翊衛之班所以上應勾陳環拱宸極者所由來逺矣領侍衛府領侍衛内大臣六人鑲黄正黄正白三旗毎旗各二人内大臣六人㪚秩大臣無定員一等侍衛六十九人二等侍衛一百六十八人三等侍衛三百三十三人初制設三旗一等侍衛六十人二等侍衛一百五十人三等侍衛二百七十人康熙三十七年増設宗室侍衛無定員雍正七年定宗室侍衛一等九人二等十八人三等六十三人共設九十人并入三旗隨班行走四等侍衛無定員四等侍衛雍正三年増設藍翎侍衛九十人三旗侍衛每十人設什長一人即於什長及兩翼班領署班領内定以十二人隨印恊理事務御前侍衛乾清門侍衛皆於三旗侍衛内簡用及漢侍衛漢侍衛康熙三十七年增設亦有一二三等及藍翎之分於武進士内簡用皆無定員主事一人筆帖式十二人貼寫筆帖式十五人親軍校七十五人鑲黄旗十五人又下五旗移入十人正黄旗十五人又下五旗移入十一人正白旗十五人又下五旗移入九人親軍九百九十五名三旗滿洲䝉古每佐領下親軍二名鑲黄旗二百二十四名又下五旗移入一百三十名正黄旗二百三十四名又下五旗移入一百三十五名正白旗二百三十名又下五旗移入一百十七名内以七十五人為親軍校此三旗親軍每旗選六十名隨侍衛班入直餘皆随三旗䕶軍營䕶軍校䕶軍一體直宿差遣凡宿衛之制更番輪直三旗侍衛分六班班分兩翼鑲黄旗為左翼正黄旗為右翼正白旗半為左翼半為右翼各設侍衛班領二人署班領二人侍衛三十人宿衛乾清門為内班晝坐門禁夜守扃鑰㪚秩大臣一人侍衛親軍十人宿衛中和殿侍衛什長三人侍衛親軍三十人宿衛太和殿為外班以領侍衛内大臣一人總統之内大臣㪚秩大臣二人隨班入直凡扈從之制後扈二人於領侍衛内大臣内簡用前引十人於内大臣㪚秩大臣暨統領副都統内簡用豹尾班侍衛於三旗侍衛内選功臣後裔六十人日以二十人直後左門每乗輿出入以十人執豹尾槍十人佩儀刀侍於乾清門階下左右駕出豹尾班侍衛殿於後以領侍衛内大臣一人侍衛班領二人統之駕還宫隨至乾清門退歸直皇帝御太和殿受朝前引侍衛二人自乾清門後左門導至殿後止後扈大臣二人自乾清門扈從如係宫内御前大臣則自隨出後並同前引大臣十人候於殿北階下駕至按翼前導進殿由兩旁趨至寳座前北上東西靣立後扈大臣於寳座左右僉立豹尾班侍衛於寳座後左右南嚮序立皇帝詣皇太后宫行禮前引侍衛二人自乾清門導至永康左門止前引大臣候於隆宗門内駕至按翼前導至慈寧門階止豹尾班侍衛至門階下左右牆角止立後扈大臣隨升階稍後僉立駕還宫引扈如前遇御門聴政屆時直班侍衛引有事各官由後左門入日常入奏官亦均由侍衛引進豹尾班侍衛於乾清門階下左右牆角立領侍衛内大臣直班内大臣侍衛於階下立侍衛班領每翼一人於階上左右楹前立御前侍衛隨駕出暨乾清門侍衛於御座兩旁立駕還宫御前侍衛隨入餘各退歸直御經筵日侍衛二人前導至文華門止後扈大臣隨至寳座左右立御前侍衛乾清門侍衛於寳座後兩旁豹尾班侍衛於殿外階下均左右立如御箭亭侍衛二人前導至降輿處止豹尾班隨行遇外藩來朝及召見外藩使臣或於便殿或於駐蹕行宫前引後扈大臣皆侍班御前侍衛乾清門侍衛直日侍衛班領豹尾班侍衛均於殿内按翼序立皇帝躬祀郊壇前引侍衛二人自乾清門前導至午門外止前引大臣候於太和門北階下駕至按翼前導後扈大臣隨行各自午門外乗馬至壇門外下馬均佩刀引扈御輦前後執燈侍衛四人輦前執提爐侍衛二人皆步從輦後豹尾班執槍侍衛十人佩儀刀侍衛十人佩弓矢侍衛二十人以領侍衛内大臣一人侍衞班領二人統之次後㪚秩大臣一人侍衛班領一人署班領一人侍衛什長二人次建黄龍大纛二率以領侍衛内大臣或内大臣㪚秩大臣一人司纛侍衛什長二人及壇前引大臣在圜丘壇於三成階上立方澤壇及日壇月壇於二成階下立後扈大臣隨升壇於駕後立豹尾班侍衛於壇内壝門外立祀祈年殿饗太廟前引大臣由左階升駕入殿門於中門外一成階上立後扈大臣隨入於駕後立豹尾班侍衛於三成階下立祀社稷壇前引大臣立於内壝門外豹尾班侍衛立於拜殿南門外展拜堂子前引大臣立於甬道北豹尾班侍衛立於祭神殿兩旁祀先農壇前引大臣立於階下豹尾班侍衛立於樂懸南遇駕耕耤御具服殿前引大臣立於殿前階上駕御耤田引至耕所三推禮成引由觀耕臺午階升立於御座前凡序立均按翼分左右後扈大臣均隨升降於駕後左右僉立遇大閲日前引後扈大臣均甲胄引扈豹尾班侍衛甲胄殿後御前大臣侍衛等均甲胄隨行其次黄龍大纛行三旗親軍甲胄按次行駕御帳殿豹尾班侍衛按翼排列左右建黄龍大纛三旗侍衛親軍按翼環衛遇皇太后皇后妃嬪出入以乾清門侍衛四人暨侍衛十人前導如出郊外前引侍衛二十人其餘侍衛在豹尾班後扈從凡行在宿衛扈從遇車駕巡幸御前大臣侍衛暨乾清門侍衛皆從其六班輪直之侍衛以一班或二班隨徃遇恭奉皇太后巡幸則三班隨徃日行以侍衛二十人前導二十人左右翊衛均屬櫜鞬豹尾班侍衛二十人後從以領侍衛内大臣一人侍衛班領二人統之以領侍衛内大臣或内大臣㪚秩大臣一人侍衛什長二人率黄龍大纛行餘侍衛暨扈從各官均列隊按次行仍分令侍衛稽察踰越喧嘩者御前擎蓋以乾清門侍衛更番執事駐蹕行營以内大臣一人㪚秩大臣二人入直御前大臣侍衛暨乾清門侍衛於御營兩廂分宿御營黄幔城旌門以侍衛班領一人署班領一人内班侍衛二十人前東西隅以侍衛班領各一人内班侍衛各十人後東西隅以署班領各一人内班侍衛各十人網城門内以侍衛什長三人外班侍衛親軍三十人環拱宿衛遇㳟奉慈輿行幸皇太后輿前均以侍衛前導翊衛後從如儀皇太后行營正門以侍衛班領一人侍衛十人後隅以署班領一人侍衛十人宿衛臣等謹案侍衛班内有上駟院侍衛每旗七人司轡司鞍侍衛無定員𨽻上駟院其兼尚虞鷹鷂房鶻房狗房十五善射善騎射善射鵠善强弓善撲等侍衛各有専管統在三旗額内均無定員又案鑾儀衛亦係侍從武職設有掌衛事内大臣一人鑾儀使三人滿洲二人漢軍一人冠軍使十人滿洲七人漢軍三人雲麾使二十八人滿洲二十人漢軍八人治儀正四十二人滿洲二十人漢軍二十二人整儀衛二十九人滿洲十三人漢軍十六人專司乗輿鹵簿凡分掌各儀制具詳王禮考兹不複列其所屬軍尉儀刀弓矢殳㦸用親軍豹尾槍仗馬用䕶軍蒙古畫角用䝉古鳴角軍其奉輦擎執儀仗各校尉由内府選充者為旗尉由五城選充者為民尉奉輦旗尉一百六十八人民尉六十人各執事旗尉二百四十六人民尉三百二十二人左右中前後五所民尉計一千三百二十八人馴象所民尉二百六人八旗漢軍司更兵四十人凡鐘神武門鼔樓譙漏毎夕委官率校尉直更凡更亦如之遇大閲前夕於行巡幸駐蹕直宫前鳴角鼓鼜均𨽻在軍數謹附載於比八旗驍騎營滿洲八旗都統每旗各一人副都統各二人驍騎㕘領各五人副驍騎㕘領各五人康熙三十四年於每旗㕘領下增設委署㕘領雍正元年改名副㕘領䝉古漢軍八旗並同佐領無定員随人户編設每佐領下驍騎校一人領催五名初制滿洲及蒙古每佐領下設領催六名康熙四十三年酌裁一名驍騎二十名弓匠一名鞍匠或鐡匠一名䝉古八旗都統每旗各一人副都統各二人驍騎㕘領各二人副驍騎㕘領各二人佐領無定員每佐領下驍騎校一人領催五名驍騎二十名弓匠一名鞍匠或鐡匠一名漢軍八旗都統毎旗各一人副都統各二人驍騎㕘領各五人副驍騎㕘領各五人佐領無定員毎佐領下驍騎校一人領催五名鳥槍驍騎四十一名每旗藤牌兵一百名雍正二年設漢軍每佐領下藤牌兵四名乾隆元年定漢軍每旗設藤牌兵一百名六年定藤牌兵歸并大營每旗百名於鳥槍手額内選取並簡選㕘領一人㪚秩官驍騎校各二人領催五人令其管轄天聰年間設阿禮哈超哈即驍騎營為驍騎營之始順治初詳定營制凡八旗序次鑲黄正黄正白為上三旗鑲白正紅鑲紅正藍鑲藍為下五旗行軍蒐狩以鑲黄正白鑲白正藍四旗居左為左翼正黄正紅鑲紅鑲藍四旗居右為右翼凡八旗方位雍正六年奏定鑲黄滿洲䝉古漢軍三旗自鼔樓嚮東至新橋自新橋大街北口城根嚮南至府學衚衕東口與正白旗接界正黄滿洲蒙古漢軍三旗自鼓樓嚮西至新街口自大街北口城根嚮南至馬狀元衚衕西口與正紅旗接界正白滿洲䝉古漢軍三旗自府學衚衕東口嚮南至大市街豹房衚衕東口與鑲黄旗接界自皇城根嚮東至大城根與鑲白旗接界鑲白滿洲䝉古漢軍三旗自豹房衚衕嚮南至就日坊與正白旗接界自皇城根嚮東至大城根與正藍旗接界正紅滿洲蒙古漢軍三旗自馬狀元衚衕東口與正黄旗接界自皇城根嚮西至大城根與鑲紅旗接界鑲紅滿洲䝉古漢軍三旗自羊肉衚衕嚮南至瞻雲坊與正紅旗接界自皇城根嚮西至大城根與鑲藍旗接界正藍滿洲䝉古漢軍三旗自就日坊至崇文門由金水橋嚮東至大城根與鑲白旗接界鑲藍滿洲䝉古漢軍三旗自瞻雲坊至宣武門由金水橋嚮西至大城根與鑲紅旗接界凡城門直班之制内城九門安定徳勝東直西直朝陽阜成崇文宣武八門各按官兵居住方位以八旗滿洲䝉古漢軍分直正陽門以八旗滿洲䝉古輪直外城七門以鑲黄旗正白旗直東便門廣渠門以正黄旗正紅旗直西便門廣寧門以正藍旗鑲藍旗鑲白旗鑲紅旗直永定門左安門右安門均以漢軍雍正六年於八門城外増建營房仍按八旗方位每旗委滿洲䝉古漢軍官四人驍騎校四人驍騎滿洲一百二十名䝉古四十名漢軍四十名各旗均分為四班每班以委官一人驍騎校一人驍騎五十名令其更