body:
  text: 經籍考十一史奏議雜史傳記臣等謹按馬端臨通考以章奏自為一門次於集部别集之後然論事之文有闗國政且與記傳互考為易自應歸入史部抑考漢志奏事十八篇附載春秋末列入戰國策史記之間此其證也爰遵四庫全書之例易其名曰奏議而改𨽻于此御選明臣奏議四十卷乾隆四十六年奉敕編臣等謹按治亂之迹倚伏相循勝國之所以亡即本朝之所以興蓋國是之臧否繫于羣臣而羣臣之賢不肖徵諸奏牘故時代雖近而闗繫彌殷是編纂輯之初我皇上特命皇子司選録而尚書房入直諸臣預繕校每一卷成即恭呈御覽誠重之也蓋明自再傳以後賢奸雜進綱紀漸弛君子小人分門植黨迨其後奄豎擅權一人守府臺諌之伏闕上書者何當于補衮道學之分流標異者相習而成風以至國是日非一敗而不可復振然而三百餘年間豈無名臣碩輔讜論嘉猷足資匡濟者唯識見不無偏私即議論未免純駁故其中瑕瑜互不相掩仰䝉睿裁訓示辨别精詳涇渭之分昭然共見所謂羣言必衷諸聖真萬古是非之準也張襄壯奏疏六卷張勇撰勇字飛熊上元人積軍功官至靖逆侯靖逆将軍提督甘肅軍務加少傅兼太子太師臣等謹按我朝開創之後底定秦隴勇之宣勤最著故勇之受知亦最深前後四十餘年戮力行間不遑宴息後以箭創病足肩輿臥理有古名将之風集中諸疏凡一百二十篇皆洞中機宜言無不盡宜乎兩朝之委畀獨隆而勲業爛然至今猶在人心目也龔端毅奏疏八卷龔鼎孶撰鼎孶號芝麓合肥人前明崇禎甲戌進士授中書舍人入國朝官至禮部尚書諡端毅兼濟堂奏疏無卷數魏裔介撰裔介見經類文襄奏疏十五卷附年譜一卷李之芳撰之芳字鄴園武定人順治丁亥進士官至文華殿大學士諡文襄郝㳟定集五卷郝惟訥撰惟訥字敏公霸州人順治丁亥進士官至吏部尚書奏議稽詢四十四卷曹本榮編本榮黄崗人順治己丑進士官至侍講學士西臺奏議一卷京兆奏議一卷楊素藴撰素藴字筠眉宜君人順治壬辰進士官至湖廣巡撫臣等謹按素藴居御史時疏糾逆藩吳三桂擅用方面大員事屬非體迨三桂謀逆素藴即蒙擢用今遺編具在讀之有古藎臣風宜其望重西臺終邀簡拔也大觀堂奏疏三卷余縉撰縉字仲紳號浣公諸暨人順治壬辰進士官至河南道監察御史疏稿一卷胡文學撰文學字卜言鄞縣人順治壬辰進士官至福建道監察御史存菴奏疏無卷數徐越撰越字山琢山陽人順治壬辰進士官至監察御史遷兵部督捕左理事官仍留御史任江南通志曰越在臺垣十有三年所條奏皆有闗時政之大者言漕河事先後凡十六疏厯陳淮黄分合變遷及兩河衝決狀尤悉楊黄門奏疏無卷數楊雍建撰雍建字自西一字以齋海寜人順治乙未進士官至兵部侍郎雍建自識曰余以内陞復入垣署章奏及西臺諸疏原稿失㪚無存賴吾姪存理中發留心蒐輯得以續梓清忠堂奏疏朱宏祚撰宏祚字徽䕃高唐人官至浙閩總督文襄奏疏八卷靳輔撰輔字紫垣鑲紅旗漢軍人官至總督河道兵部尚書諡文襄于山奏牘七卷附詩詞一卷于成龍撰成龍永寜人副榜貢生官至兩江總督賜諡清端平岳疏議一卷平海疏議一卷附平海咨文一卷師中小札一卷萬正色撰正色號中菴晉江人官至福建水師提督督漕疏草二十二卷董訥撰訥字兹重號黙菴平原人康熙丁未進士第三官至江南總督華野疏稿五卷郭琇撰琇字華野即墨人康熙庚戍進士官至湖廣總督臣等謹按琇初入諌垣即劾罷大學士明珠余柱等迨洊擢左都御史復劾奏王鴻緒高士竒徐乾學黨援交通亦皆譴退仰見聖祖仁皇帝知人之哲而從諌之明後以紅苖搶掠一事禠職放歸此真鑑空衡正黜陟至公我皇上復命於五朝國史明珠王鴻緒高士竒徐乾學諸傳中載琇劾疏全文無庸刪削隠諱千萬世下益知琇之進退㫁自乾綱準其功罪非有人能從旁報復排擠之者今四庫全書㳟録諭㫖冠于此編之首所以垂示方來者益深切矣奏議稿無卷數江蘩撰蘩湖北漢陽人官至太常寺少卿兼提督四譯館事撫豫宣化録四卷田文鏡撰文鏡字抑光正黄旗漢軍人官至河東總督諡端肅河防疏畧二十卷朱之錫撰之錫字孟九號梅麓義烏人康熙壬辰進士官至兵部尚書河道總督右奏議綏冦紀畧十二卷吳偉業撰偉業字駿公號梅村太倉人崇禎辛未進士入國朝官至國子監祭酒明書一百七十一卷傅維鱗撰維鱗初名維楨字掌雷靈夀人順治丙戍進士官至工部尚書維鱗自述曰搜求明代行藏印鈔諸書與家乘文集碑志聚書三百餘種九千餘卷叅互實録以考訂異同云陸隴其序曰維鱗以張孚敬桂蕚置佞倖傳張居正置權臣傳李贄置異教傳劉基置雜傳立例甚嚴明史紀事本末八十卷谷應泰撰應泰字𢋫虞豐潤人順治丁亥進士官至浙江提學僉事邵廷采跋曰山隂張岱嘗輯明一代遺事為石匱藏書應泰作紀事本末以五百金購請得之又曰明季稗史雖多體裁未偹罕見全書惟談遷編年張岱列傳兩家具有本末應泰並採之以成紀事滇考二卷見聞隨筆二卷馮甦撰甦字再來臨海人順治戊戍進士官至刑部侍郎繹史一百六十卷馬驌撰驌見經類例畧曰彚集周秦以上事蹟紀事則詳其顛末紀人則備其始終一曰太古三皇五帝計十篇二曰三代夏商西周計二十篇三曰春秋十二公時事計七十篇四曰戰國春秋以後至秦亡計五十篇五曰外録紀天官地志名物制度等計十篇凡百六十篇篇為一卷王士楨池北偶談曰驌生而清羸博雅嗜古尤精春秋左氏傳又著繹史其書最為精博時人稱為馬三代康熙癸丑嵗卒官靈璧人皆為制服云二十二史紀事提要八卷吳綏撰綏字韓章無錫人交山平㓂本末三卷附詩一卷夏駰撰駰字宛來湖州人臣等謹按此紀交城知縣趙吉士勦賊事蓋駰嘗客吉士幕中故記其本末最詳末又附詳文書牘二卷則吉士平㓂時手筆而餘姚邵以發輯之者也平閩記十三卷楊㨗撰㨗字元凱鑲黄旗漢軍人官至昭武将軍江南提督讀史津逮四卷潘永圜撰永圜字大生金壇人封白長山記一卷方象瑛撰象瑛字渭仁遂安人康熙丁未進士官至翰林院侍講戰國䇿去毒二卷陸隴其編隴其見經類隴其自記曰戰國䇿一書其文章之竒足以悅人耳目而其機變之巧足以壊人心術如厚味之中有大毒焉故今舉文士所共讀者指示其得失庶幾嚌其味而不中其毒也故以去毒名平叛記二卷毛霦撰霦字荆石掖縣人霦自述曰是編之作使當時文武諸臣誰為黙守誰為血戰誰為痛哭而乞師誰為選愞而縱㓂為功為罪靡不昭然臣等謹按此紀崇禎四年叛兵李九成等攻圍萊州始末蓋明季軍政敗壊賞罰不明霦故纎悉備述以彰知府朱萬年總兵楊御蕃叅将彭有謨巡撫御史徐從治謝璉守城之功而著孫元化劉宇烈余大成誤國之罪云師中紀績一卷王得一撰得一字種龍螺陽人武宗外紀一卷後鑒録七卷毛竒齡撰竒齡見經類竒齡自序外紀曰是編仿漢武外傳而為之漢武外傳與本紀不同是故外之今所紀皆實録中事而亦以為外者竒齡觀同館所為明武宗紀凡實録所載皆軼而不録夫史以垂鑒不諱好惡本身所行事而皆軼之是本也而外之矣因題曰外紀又序後鑒録曰昔建溪謝給舍作後鑒録大抵輯明代治盜始末以示鑒戒竒齡少承故老舊聞由李自成張獻忠而上徧採二百餘年間所記羣盜彚積成帙将以備史文之擇而承乏編纂頗見搜録因仍故本而襲以給舍舊名臣等謹按竒齡武宗外紀採摭軼事頗詳然本紀自有體裁事涉猥𤨏固不便纂入正史至後鑒録承前人之舊而刪潤之于明末政弛餉缺諸弊尚能徵實故正史採之者居多左傳紀事本末五十四卷高士竒撰士竒見經類例畧曰補逸則雜採諸子史傳與左氏相表裏者考異則與左傳異詞可備叅訂者辨誤則糾其傳聞失實蹖駁不倫者考證則取其事有依據可為典要者又時附己意謂之發明後漢書補逸二十一卷姚之駰撰之駰字魯斯錢唐人康熙己丑進士官至監察御史之駰自序曰後漢史自謁者僕射劉珍校書郎劉騊駼等撰東觀漢記後作者或記或書凡十餘家范蔚宗書最後出集諸家之成迨後以范書為正史而諸家漸佚矣之駰檢閱羣書鈔撮成帙東觀漢記第一謝承後漢書第二薛瑩後漢書第三張璠漢記第四華嶠後漢書第五謝沈後漢書第六袁崧後漢書第七司馬彪續漢書第八校以范史其闕者半其同者半其闕者可以傳一朝之文獻其同者且可以叅其是非較其優劣間以巳意按語附之康熙五十三年梓行之春秋戰國異詞五十四卷通表二卷摭遺一卷陳厚耀撰厚耀見經類辨苖紀畧八卷俞益謨撰益謨字嘉言號澹菴寜夏人官至湖廣提督臣等謹按康熙四十二年辰州紅苖為亂詔遣吏部尚書席爾達督荆州駐防兵及廣西貴州湖南三省漢土兵勦平之益謨率湖南兵從征故作是編詳紀其事春秋紀傳五十一卷李鳳雛撰鳳雛字梧岡東陽人康熙中拔貢生官曲江縣知縣遜代陽秋二十八卷余美英撰美英字璈伯錢塘人二申野録八卷孫之騄撰之騄見經類臣等謹按是編専輯有明一代妖異之事始洪武元年戊申終崇禎十七年甲申故名二申衡湘稽古五巻王萬澍撰萬澍字霍霖别號勉亭常寧人平臺紀畧一卷附東征集六卷藍鼎元撰鼎元字玉霖號鹿洲漳浦人由貢生官至廣州府知府鼎元自序曰有市靖臺實録者惜其未經身厯目覩得之傳聞其地其人其時其事多謬誤舛錯乃詳述其實為是編焉臣等謹按鼎元兄廷珍時為南澳總兵官與福建水師提督施世驃合兵進討臺灣逆㓂朱一貴七日而恢復之旋擒一貴世驃俄卒于軍廷珍勦平餘逆並經理善後事宜鼎元在其兄軍中得之親見故記載為最詳三藩紀事本末四卷楊陸榮撰陸榮見經類季漢五志十二卷王復禮撰復禮字需人錢塘人半牕史畧四十二卷龍體剛撰體剛號鐵芝永新人尚史七十二卷李鍇撰鍇字鐵君鑲白旗漢軍人晉紀六十八卷郭倫撰倫字凝初號酉山蕭山人乾隆丙子舉人倫自序曰讀晉書荀朂傳至高貴鄉公欲為變一語以為大悖于理又如宣景文及身不帝而列諸本紀孫旗牽秀助亂之徒乃與繆播閻鼎同列賈充姚萇傳述鬼神事竟如優俳諸國載記不年不月複襍而無章譙登許肅之忠義闕而不載潘岳諸人之文無闗治亂乃皆臚之本傳其間謀臣碩士如張華羊祜杜預王濬劉琨祖逖陶侃王導温嶠謝安之謨猷以及劉石諸人之雄武而本傳蕪冗曽不足發其不可磨滅之概至清言娓娓乃司馬氏所以亂亡而縷述不衰皆取舍失衷是非瞀亂因重為刋定勒成此編其中唯諸志稍有可觀悉仍舊貫其餘刪其冗瑣更易舊文為世系一本紀三内紀一志列傳四十一十六國録十四積十五年乃成右雜史臣等謹按傳記之始昉于晏子春秋及孔子三朝記魏晉以來著録日繁體例參錯馬氏通考傳記一門最為繁襍欽定四庫全書列為五目首聖賢次名人次總録次雜録次别録繁簡得中斟酌盡善五朝續通考已仿其例今亦謹遵編次云聖門志考畧二卷不著撰人姓氏臣等謹按書中自稱其名曰淐又稱康熙八年廷對留京今攷康熙庚戍科進士題名碑録並無名淐者意其為貢生也闕里廣志二十卷宋際宋慶長同撰際字峩修慶長字簡臣俱松江人三遷志十二卷孟衍泰王特選仲藴錦同撰衍泰孟子六十五代孫世襲五經博士特選滕縣人藴錦濟寜人孟子生卒年月考一卷閻若璩撰若璩見經類若璩自述曰孔子生平出處年月具見史記孔子世家而孟子獨畧璩嘗以七篇為主參以史記等書然後厯厯可攷蓋鄒人晚始逰梁繼仕齊為卿乆之歸鄒又如宋以樂正子故至魯終至滕道不能行歸而作書七篇卒當為赧王之世卒後書為門人所叙定故諸侯王皆加諡焉孔子年譜五卷楊方晃撰方晃字東陽號鶴巢磁州人别本朱子年譜二卷附録一卷黄中撰中舒城人朱子年譜六卷朱世潤撰世潤朱子十八世孫世襲五經博士朱子年譜四卷考異四卷附録二卷王懋竑撰懋竑字予中寶應人康熙戊戍進士授安慶府教授雍正癸卯特召入直内廷改翰林院編修王安國序曰懋竑以明李黙所定朱子年譜多刪改原編與其晚年所定論道編陽為表章而隂移其宗㫖乃取語類文集及諸儒緒論折衷于黄氏所作行狀以證年月之後先指歸之同異為年譜四卷其辨論之迹為考異四卷又朱子自謂讀程子書渙然氷釋自乾道己丑後論學切道之語為附録二卷考訂朱子世家一卷江永撰永見經類朱子文公傳道經世言行録八卷舒敬亭撰敬亭字孝徵銅山人至聖編年世紀二十四卷李灼黄晟同撰灼字松亭嘉定人晟字曉峯歙縣人右傳記類聖賢姑山事録八巻吳肅公杜名齊同撰肅公見經類名齊未詳謝臯羽年譜一卷徐沁撰沁字埜公㑹稽人寧海将軍固山貝子功績録一巻不著撰人姓氏臣等謹按是編紀康熙十五年惠獻貝子富拉塔奉詔討逆藩耿精忠統兵在温州擊賊及暫囘處州所録僅四月之事首尾亦未全具保台實績録一卷不著撰人姓氏臣等謹按此紀台州兵巡道楊應魁政績應魁字斗垣射洪人時耿逆犯浙圍台州應魁拊循兵民條畫守禦頗著惠愛郡人作此志其功績云楊公政績紀一卷黄家遴撰家遴奉天人官至嘉興府知府忠武誌八卷張鵬翮撰鵬翮字運青遂寜人康熙庚戍進士官至大學士諡文端周忠介公遺事無卷數彭定求撰定求字訪濓長洲人康熙丙辰進士第一官至翰林院侍講王文成集傳本二卷毛竒齡撰竒齡見經類梅里志四卷吳存禮撰存禮奉天人官至江南巡撫臣等謹按存禮自謂吳泰伯之裔泰伯居梅里在常州無錫縣東南說見史記吳世家張守節正義存禮述其祖徳故作是編陸象山年譜二卷李紱撰紱字巨來號穆堂臨川人康熙己丑進士官至内閣學士兼禮部侍郎羅江東外紀三卷閔元衢撰元衢字康侯烏程人自號歐餘生賀監紀畧四巻聞性善性道同撰性善字與同性道字天迺寜波人左忠毅年譜二卷左宰編宰桐城人臣等謹按左光斗事跡具載明史本傳宰為光斗之曽孫故蒐羅㪚失叅以家乗及文集所載同難諸人所述編輯此譜較明史為更詳胡忠烈遺事四卷史珥編珥鄱陽人乾隆甲戍進士官吏部主事曹江孝女廟志十巻沈志禮撰志禮字範先㑹稽人官至廣東按察使志禮自序曰孝女曹娥事有同里印文學君素初編張明經噩續纂俱未成志禮乃因舊志重輯云右傳記類名人欽定宗室王公功績表傳十二卷乾隆四十六年大學士公阿桂等奉敕撰臣等謹按乾隆二十九年初命宗人府内閣考核宗室王公功績傳派親疎採定成帙乾隆三十年六月告成嗣因間有叙述未詳語涉不經者復詔國史館重為纂輯體例人數一仍舊本而事綜端委語斥神竒㫁以宸裁輯成善本蓋我國家肇基鴻業名世之佐首在宗盟勲伐之多至盈巨帙我皇上眷懐舊績特命表章詳慎之心再煩易稿于以垂奕世而篤宗親帶礪山河共固金甌於萬䙫已欽定勝朝殉節諸臣録十二卷乾隆四十一年奉敕撰臣等謹按有明末葉守土諸臣頗有抗拒王師身攖鋒鏑者雖皆昩于天運猶有疾風勁草之遺我皇上量涵天地澤沛泉淵軫念遺忠錫之褒諡至因靖難之師流冦之亂捐軀殉節者咸予表章凡三千六百餘人分専諡通諡祠祀三等特命綜覈羣書各為立傳並製宸章弁之簡首仰見聖人之心渾融彼我自書契以來未聞加禮勝朝如我皇上之仁至義盡者蓋不特為諸臣揚砥節之名實為萬世示教忠之極也欽定䝉古王公表傳十二卷乾隆四十四年大學士公阿桂等奉敕撰臣等謹按是編體例與宗室王公表傳同蓋開國之初羣藩效順惟察哈爾林丹汗恃其強暴自外生成餘如科爾沁郭爾羅斯都爾伯特扎賚特等並于天命天聰年間以次來歸執殳供衛仰見列聖威徳兼施無逺弗屆我皇上特命録其勲伐著之簡編誠前史所未聞而當日諸王公忠悃丹誠亦與是編同垂不朽矣中州人物考八卷孫竒逢撰竒逢見經類臣等謹按是編載河南人物分為七科一理學二經濟三忠節四清直五方正六武功七隱逸後一卷曰補遺曰續補人各為之傳賛不以詳畧為褒貶大㫖恕于常人而責備賢者持論頗為嚴謹雖瑜或未能掩瑕要非他郡邑傳記無足重輕者可比崇禎五十宰相傳一巻曹溶撰溶字潔躬號秋嶽秀水人前明崇禎丁丑進士官至監察御史入國朝官至户部侍郎出為廣東布政使左遷山西陽和道臣等謹按崇禎十六年間輔臣多至五十人輕進易退卒至傾亡溶總論謂其私心朋比門户相承邪正雖殊植黨則一其說切中時弊深探本原所録實事亦足與明史叅證檇李曹氏又有五十輔臣編年録殘本一卷疑即溶舊稿也孔庭神在録八卷胡時忠撰時忠原名時亨字慎三無錫人崇禎丙子舉人畿輔人物志二十巻四朝人物畧六卷益智録二十巻孫承澤撰承澤見經類大成通志十八卷楊慶撰慶見經類臣等謹按是編摭拾厯代制度不盡闗於聖門且末二卷乃慶講學之書故不以之入聖賢類檇李往哲續編一卷項玉筍撰玉筍字和父秀水人金華徵獻畧二十卷王崇炳撰崇炳字虎文東陽人聖學知統録二卷聖學知統翼録二卷魏裔介撰裔介見經類裔介知統録自序畧曰見知聞知之說具載于此又翼録序畧曰以之羽翼聖道鼓吹六經亦猶淮泗之歸于江海龜鳬之倚于岱宗也希賢録五巻朱顯祖撰顯祖號雪鴻江都人順治丙戍副榜貢生洛學編四卷湯斌撰斌字孔伯號潜菴睢州人順治己丑進士官至工部尚書諡文正續表忠記八卷趙吉士撰吉士字恒夫號漸岸又號寄園徽州人順治辛夘舉人官至户科給事中吉士自序曰鄞人盧宜倣錢士升遜國表忠記義例采輯明季天啓改元迄崇禎甲申諸臣之死閹禍死國難者或一人獨立一傳或數人共立一傳因出寄園襍録相與叅考而増損之天中景行集無卷數邵燈撰燈字無盡一字薪傳常熟人順治壬辰進士官至河南河道中州道學編二卷補編一卷耿介編介初名沖璧字介石號逸菴登封人順治壬辰進士官至直𨽻大名道以湯斌薦特授詹事府少詹事古懽録八卷王士禎撰士禎字貽上號阮亭又自號漁洋山人順治乙未進士官至刑部尚書諡文簡臣等謹按士禎原名下一字與世宗憲皇帝廟諱相同故傳刻其書者皆改為士正乾隆四十二年特命追賜今名是編倣皇甫謐高士傳之意而間及近人至其取文選古詩之義命名曰古懽未稔何觧續高士傳五卷高兆撰兆字雲客侯官人陶徵序曰始晉皇甫士安㫁於有明之穆廟中間千餘年共得一百四十三人微顯闡幽循名責實起辛丑八月至壬寅二月始告成王晫今世說曰高雲客讀書稽古自江左還舊鄉布衣蔬食塊處蓬室中采摭隱逸輯為續高士傳鍳别精嚴論者謂其才識不讓士安厯代循良録一巻孫蕙撰蕙字樹百號泰巖又號笠山淄川人順治辛丑進士官至給事中古人幾部六卷陳允衡撰允衡字伯璣南昌人允衡自序曰平湖陸叔度著古人幾部始管夷吾終史天澤凡八十一人古之成大功定大策者咸在焉而其人亦有功成而身死名立而毁至者定是不變無以語權因更集古人顔曰幾部厯代黨鍳五卷徐賔撰賔字用王常熟人理學備考三十四卷范鄗鼎撰鄗鼎字彪西洪洞人康熙丁未進士勝朝彤史拾遺記六卷毛竒齡撰竒齡見經類竒齡自序曰幼時得家藏宫闈記聞一卷自洪武至萬厯凡十三朝可謂小備苐事未確而文不雅承乏為史官修明史嘗􅍐題起草得順成𢎞正四朝后妃列傳因厯探史宬但得詳冊封年時及崩薨喪塟諸禮節而他無所有乃仍收取外史所記與實録稍有不符者草成應之而拾其餘雜之舊藏復為斯編東林列傳二十四卷陳鼎撰鼎字定九江隂人儒林宗派十六卷萬斯同撰斯同見經類明儒林録十九卷張恒撰恒字北山松江人雒閩源流録十九卷張夏撰夏見名人類臣等謹按是書以程朱之派為主而於陸氏之派亦節取所長用意頗能除門户之見然以明太祖為理學開國直接唐虞之統未免善諛而不顧所安又凡例稱人品自人品學術自學術如趙南星楊漣繆昌期李應昇諸人可謂之忠臣不可列之于儒林立說殊謬文天祥正氣歌云孔曰存仁孟曰取義讀聖賢書所學何事豈聖賢之外别有儒林一派乎錫山宦賢考畧三卷張夏胡永禔同撰永禔字鴻儀與夏同里吳越順存集三卷外集一卷吳允嘉撰允嘉字志上錢塘人吳越王之裔道南正學編三卷錢肅潤撰肅潤見經類肅潤自序曰所録從祀東林書院諸人不拘世代不叙年數不論地位不限科目率以入祠之先後為次第焉又尚集二卷何屬乾撰屬乾字不息江西廣昌人副榜貢生官永新縣訓導聖宗集要八卷費緯祹撰緯祹字約齋鄞縣人道統録二卷附録一巻道南源委六卷伊洛淵源續録二十巻張伯行撰伯行字孝先儀封人康熙乙丑進士官至禮部尚書諡清恪嘉禾徵獻録四十六巻盛楓撰楓秀水人人瑞録一卷孔尚任撰尚任號東塘又號雲亭山人曲阜人官至户部郎中臣等謹按是編記康熙二十七年天下奏報夀民自七十至百嵗以上者三十七萬有竒仰見列聖以來休養生息聖祖仁皇帝徳澤涵濡醲化懿鑠率土熙春胥登夀域故一嵗之中有如是之極盛者尚任輯而録之不特一時之瑞正盛世萬年之瑞也史傳三編五十六卷朱軾撰軾見經類卓行録四卷黄容撰容字叙九吳江人容自述曰集中體例主于表彰潜徳蒐輯逸事其事跡赫赫在天壤他書具載者反不多録荆門耆舊紀畧三卷列女紀畧一卷胡作柄撰作柄荆門人學統五十六卷熊賜履撰賜履字敬修孝感人康熙戊戍進士官至大學士明儒言行録十卷續録二卷沈佳撰佳字昭嗣號復齋仁和人康熙戊戍進士官安化縣知縣修史試筆二卷藍鼎元撰鼎元見雜史類曠敏本序曰鼎元欲修宋史而以此試筆先叙有唐名臣擇其忠節經濟之炳著者列為傳云道學淵源録一卷王植撰植見經類節婦傳十五卷楊錫紱撰錫紱字方來清江人雍正丁未進士官至漕運總督黌祀紀蹟十卷康偉然撰偉然字中江漳州人拔貢生官羅源縣教諭遷興化縣教諭闗學編五卷王心敬撰心敬見經類蜀碧四卷彭遵泗撰遵泗字磬泉丹稜人乾隆丁巳進士官翰林院編修臣等謹按是書記蜀亂始末備及死節士女姓名體例冗雜語多不經取萇宏血三年化碧之意故名蜀碧閩中理學淵源考九十六卷閩學志畧十七卷李清馥撰清馥字根侯安溪人大學士光地孫以䕃授兵部員外郎官至廣平府知府太學典祀彚考十四卷張璿撰璿字玉衡宛平人官國子監典簿循良前傳約編四卷張先嶽撰先嶽字北拱晉江人學宫輯畧六卷余炳撰炳字敬捷禹州人吉州人文紀畧二十六卷郭景昌編景昌字旭瑞奉天人孝史五卷錢尚衡撰尚衡字雲林烏程人右傳記類總録南征紀畧二卷孫廷銓撰廷銓字伯度又字次道益都人前明崇禎庚辰進士入國朝官至大學士諡文定臣等謹按順治辛夘廷銓奉命祭告禹陵及南海此其紀程之書多因古蹟以追論史事并載同時酬贈諸詩焉滇行紀程一卷續鈔一卷東遷紀程一卷續鈔一卷許纉曽撰纉曾字孝修號鶴沙華亭人順治己丑進士官至雲南按察使李贅一卷胡文學撰文學見奏議類臣等謹按文學嘗為真定推官推官古稱司李故題曰李贅篇中自叙政蹟凡十八事多先列古人遺蹟而後自叙識者病其近于自譽焉蜀道驛程紀二卷南來志一卷北歸志一卷王士禎撰士禎見總録類粤遊日記一卷王鉞撰鉞號任菴諸城人順治己亥進士官廣東西寜縣知縣治禾紀畧五卷盧崇興撰崇興字斗瞻廣寜人官至台州巡道粤西偶記一卷陸祚蕃撰祚蕃字武園平湖人康熙癸丑進士官至貴州貴東道海岱日記一卷張榕端撰榕端字樸園磁州人康熙丙辰進士官至内閣學士兼禮部侍郎何御史孝子祠主復位録一卷毛竒齡撰竒齡見經類滇行日記二卷李澄中撰澄中字渭清號漁村又號雷田諸城人原籍成都康熙己未召試博學鴻詞官至翰林院侍讀塞程别紀一卷余寀撰寀字同野山隂人閩越巡視紀畧六巻杜臻撰臻秀水人順治戊戍進士官至工部尚書扈從西巡日録一卷松亭行記二卷塞北小鈔一卷高士竒撰士竒見經類王士禎序曰嵗壬戍滇南蕩平駕幸盛京謁二陵癸亥幸五臺山巡畿輔士竒以法從侍行在因所見聞成日録明道書院紀蹟四卷章秉法撰秉法字程叔號惺村㑹稽人由諸生以軍功開墾官江寜都司滇遊記一卷附記一卷畢曰澪撰曰澪字秋岐益都人由貢生官任縣知縣南征記程一卷黄叔璥撰叔璥號玉圃大興人康熙己丑進士官至常鎮揚通道鹿洲公案二卷藍鼎元撰鼎元見雜史類念貽賸記一卷周宣智編宣智自號鏡亭老人長沙人臣等謹按是編紀其曽祖繼聖聚鄉勇拒獻賊始末獻賊招繼聖授以偽官不從被賊㫁腕潜逃母妻等四人皆罵賊死繼聖卒伺隙破賊復讐湖廣總督何騰蛟上其功授教授事詳湖廣通志乾隆壬午宣智裒其行狀墓銘及遺詩十二首共成一編東遊紀畧二卷張體乾撰體乾字確齋浮山人官刑部郎中右傳記類雜録劉豫事蹟一卷曹溶撰溶見總録類臣等謹按宋楊克弼有偽豫傳溶本其說復雜采他書輯成是編考訂較為詳悉又按豫乃逆亂之臣不應與諸傳比故書雖一卷必另為一門今從四庫全書之例以入于别録類焉右傳記類别録皇朝文獻通考卷二百二十一
