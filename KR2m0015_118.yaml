body:
  text: 欽定四庫全書皇朝文獻通考卷一百十八宗廟考十二壽皇殿臣等謹按舊制在景山東北恭閲聖祖仁皇帝實録順治十八年二月壬午奉移大行皇帝梓宫於壽皇殿蓋密近紫宸崇嚴清閟歷稽大事之禮皆即殿以行世宗憲皇帝登極初元敬於中殿奉聖祖仁皇帝神御嵗時詣奉先殿行禮畢即詣壽皇殿行禮或以日専詣焉孝思垂則禮展宫壼我皇上繼述心䖍追隆世德敬於東室安奉世宗憲皇帝神御既復命所司諏吉移建殿於正中南對景山鬱葱輪奐恭繹御製碑記曰安佑視壽皇之義壽皇視安佑之制煌煌巨典篤祜萬年矣兹恭紀壽皇殿之禮於前復恭紀安佑宫永佑寺之禮於後蓋惟聖人為能享親宫中苑中皆得以時殷對越愛敬之誠情文之備無地弗崇兹謹載制度儀注以志永言惟則於無窮焉雍正元年四月甲子世宗憲皇帝恭奉聖祖仁皇帝御容於壽皇殿中殿先是康熙六十一年十二月丙寅諭朕受皇考深恩四十餘年未嘗逺離皇考升遐無由再瞻色笑今追想音容宛然在目御史莽鵠立精於寫像昔日隨班奏事常覲聖顔皇考有御容數軸收藏內府今皇考高年聖顔微異於往時著莽鵠立敬憶御容悉心薰沐圗寫戊寅御史莽鵠立恭繪聖祖仁皇帝御容成捧進於養心殿世宗憲皇帝瞻仰依戀悲慟不勝命俟梓宫發引後敬謹恭奉於壽皇殿至是親詣行禮悲愴瞻仰儼如神爽式憑云於是定壽皇殿每日香燈供獻供淨水九碗諸色米九碗紅花水九碗香九碗乾果九碗茶九碗密果九碗乳餅九碗絹花九碗每月朔望更換每日獻餑餑案一每月朔望供重十兩茜紅白蠟一對十一月己丑黎明以聖祖仁皇帝忌辰詣奉先殿聖祖仁皇帝神位前行奠獻禮辰時詣壽皇殿瞻拜聖祖御容是日世宗憲皇帝哀痛過甚製為詩章以志思慕自後每嵗恭遇聖祖仁皇帝忌辰必先詣奉先殿復詣壽皇殿著為定禮四年正月甲午朔詣奉先殿行禮畢詣壽皇殿行禮自後元旦必先詣奉先殿復詣壽皇殿著為定禮臣等謹按康熙六十一年十二月甲寅恭移大行皇帝梓宫安奉壽皇殿庚申二十七日大禮後每日黎明世宗憲皇帝詣壽皇殿奠獻雍正元年九月丁丑朔山陵禮成庚辰升祔太廟禮成辛卯詣壽皇殿行禮自後月必瞻拜或月至三詣焉或是日奉先殿行禮後或親享太廟禮成後或親祫太廟禮成後或是日兼詣恩佑寺以時奠獻猶必以時依戀聖容帝心愛敬之誠十三年如一日洵所云大舜五十而慕者也五月甲寅孝恭仁皇后三周忌辰世宗憲皇帝詣壽皇殿行禮臣等謹按是年四月諭壽皇殿乃供奉皇考皇妣御容之處則五月甲寅之行禮蓋實瞻依孝恭仁皇后聖容用伸孺慕八月丙戌世宗憲皇帝諭我皇考聖祖仁皇帝三年大禮已滿朕追念罔極深恩欲於皇考忌辰每嵗遵照三年以內祭祀之禮永逺舉行恭讀祝文用伸誠悃朕受皇考教育慈恩至深至厚終身永慕無有窮期豈三年禮制之所能限况天下憶萬臣民感戴皇考深仁厚澤六十餘年自古帝王罕能比並一切禮儀亦非定制所得拘也朕舉行此禮乃朕自展其思慕誠切之衷至與舊制相合與否朕皆不遑計及此禮亦惟朕躬持行之於我皇考後世子孫勿得奉為成例乾隆元年正月丙申朔皇上詣奉先殿行禮復詣夀皇殿行禮臣等謹按元旦皇上瞻拜壽皇殿之禮自御極以來嵗如世宗憲皇帝時恭行十月丁亥供奉世宗憲皇帝御容於壽皇殿東室皇上親詣行禮是月定每日香燈供獻俱與中殿儀同十一月壬寅聖祖仁皇帝忌辰皇上詣夀皇殿行禮先詣先殿奉臣等謹按十一月聖祖仁皇帝忌辰親詣壽皇殿行禮嵗如世宗憲皇帝時恭行二年八月己卯世宗憲皇帝二周忌辰皇上詣壽皇殿行禮畢復詣雍和宫御容前瞻拜行禮臣等謹按前二日丁丑皇上詣雍和宫供奉世宗憲皇帝御容至己卯詣御容前行禮蓋以本朝定禮饗太廟及告祭親詣御朝服恭遇列祖列后忌辰親詣奉先殿御素服是年修奉先殿恭請列祖列后神牌暫安奉太廟中殿兹恭遇世宗憲皇帝二周忌辰既不可以素服入廟爰有雍和宫特供御容之禮至十一月丁丑三年禮終祫祭太廟即吉自後専奉御容於壽皇殿三年八月己亥皇上以二十三日世宗憲皇帝三周忌辰恭奉皇太后慈輿詣泰陵致祭午時詣壽皇殿行禮啓鑾臣等謹按恭遇謁陵省方啓蹕回鑾皆行禮於壽皇殿四年八月丁酉世宗憲皇帝忌辰皇上詣壽皇殿行禮先詣先殿奉臣等謹按八月世宗憲皇帝忌辰親詣壽皇殿之禮嵗如聖祖仁皇帝忌辰恭行五年八月辛亥皇上萬壽聖節詣壽皇殿行禮先詣先殿奉臣等謹按恭遇萬壽聖節暨諸令節行禮於壽皇殿蓋自元年元旦以來月必瞻拜或恭遇郊廟禮成後或奉先殿行禮後或是日兼詣恩佑寺或是日兼詣安佑宫或月至三四詣焉七年十二月定每年除夕壽皇殿供九如燈一對十三年三月命重建壽皇殿是月丁未諭內務府移建壽皇殿於正中照安佑宫欵式尋呈樣覽定擇吉興工經營於己巳孟春以是冬告成大殿九室㦸門一座五間配殿二各五間碑亭二神厨庫二各五間焚帛爐二井亭二四柱九樓寶坊三正中寶坊匾額南面顯承無斁四字北面昭格惟馨四字東寶坊匾額東面紹聞祗遹四字西面繼序其皇四字西寶坊匾額西面世德作求四字東面舊典時式四字月臺一石碑二石獅二甎城門三琉璃花門六直房二各七間嗣又增建大殿東西歇山耳殿二各三門御製重建壽皇殿碑記豫小子既敬循壽皇殿之例建安佑宫於圓明園以奉皇祖皇考神御重垣廣墀㦸門九室規模略備而嵗時朔望來禮壽皇聿瞻殿宇嵗久丹艧弗煥且為室僅三較安佑翻遜巨麗豫心歉焉蓋壽皇在景山東北本明季遊幸之地皇祖常視射較士於此我皇考因以奉神御初未擇山向之正偏合閟宫之法度也乃命奉宸發內帑鳩工庀材中峯正午甎城㦸門明堂九室一仿太廟而約之蓋安佑視壽皇之義壽皇視安佑之制於是宫中苑中皆有獻新追永之地可以抒忱可以觀德傳不云乎歌於斯哭於斯則壽皇實近法宫律安佑為尤重若夫敬奉神御之義則見於安佑宫碑記兹不復述惟述重建本意及興工始末嵗月蓋經營於己巳孟春而落成於季冬上浣之吉日云敬作頌曰惟堯巍巍惟舜重華祖考則之不競不絿仁漸義摩祖考式之𢎞仁皇仁明憲帝憲小子職之是繼是繩曰明曰旦小子恧之天遊雲殂春露秋霜豫心惻之考奉祖御於是壽皇豫仍即之制廣向正爰經爰營工勿亟之陟降依憑居歆攸寧羮墻得之佑我後嗣綿祀於萬匪萬億之觀德於兹無然畔援永欽識之乾隆十有四年嵗在己巳冬十有二月之吉孫臣御名敬製并書碑陰恭刋乾隆十五年五月初十日上諭一道十五年七月定壽皇殿祭聖容禮先是五月初十日內閣奉上諭壽皇殿恭奉皇祖聖祖仁皇帝皇考世宗憲皇帝聖容朕以時躬詣行禮愾聞僾見得伸逮事之忱仰惟太祖太宗世祖聖容列后聖容向於體仁閣函奉尊藏未獲修嵗時展謁之禮粵稽前代安奉神御或於宫中别殿或於寺觀淨宇本無定所國家緣情立制宜極明備周詳敬念列祖創垂顯承斯在永懷先澤瞻仰長新式衷廟祫之儀期協家庭之制應即於壽皇殿增修丹雘恭迎列祖列后聖容敬謹奉安於嵗朝合請懸供肅將祼獻以昭誠慤所有應行典禮著內閣大學士㑹同內務府王大臣等詳悉具議以聞欽此嗣和碩莊親王等議覆恭查太廟四孟時享嵗除祫祭俱用太牢籩豆奉先殿前殿朔望用籩豆奉先殿後殿節令用果品今壽皇殿恭懸聖容暨恭收聖容之日請如奉先殿後殿節令果供例致祭大祭之日如奉先殿前殿朔望獻磁器籩豆供品致祭每嵗除夕內監詣壽皇殿恭請列祖列后聖容恭懸每案供乾鮮果品十二羊豕肉二清醬一碟酒三爵上香行禮元旦大祭獻磁器籩豆供品上香行禮作樂獻帛爵不樂舞不讀祝初二日如除夕供上香行禮畢恭收聖容即殿尊藏元旦皇上詣堂子奏先殿行禮畢詣壽皇殿王公隨行禮內務府前期請除夕初二日俱令皇子輪班行禮掌儀司前期請樂章用奉先殿前殿朔望樂章掌儀司太監預習嵗除元旦初二日既供獻果品籩豆其年例宴餑餑不必復供上元節每日供餑餑如常儀嵗秋季開晾聖容飭宫殿監督領侍等預派內監敬謹執事祭日司香司帛司爵陳設祭品樂器內監執事如儀贊禮典儀司樂掌儀司贊禮郎執事如儀十二月十八日恭繪列祖聖容成大祭壽皇殿皇上親詣行禮是日親詣儀卯正初刻內務府大臣奏時皇帝御龍袍補服乘輿前引後扈如常儀出神武門由北門上景山東門至壽皇殿甎圈門外藉棕薦處降輿隨從大臣侍衛於甎圈門外立前引大臣次贊引大臣對引大臣恭導皇帝入甎圈門內監跪奉盥盤帨巾如儀盥畢司拜褥太監預布於殿門內正中贊引對引恭導皇帝升月臺入殿左門就拜位前北向立前引大臣止立月臺上後扈大臣隨入僉立於皇帝拜位後左右隨行禮王公入甎圈門之翼門於月臺東西旁序立北面典儀贊樂舞生登歌執事官各共乃職贊禮奏就位皇帝就位立典儀贊迎神司香太監奉香盤以次進至各案前祗俟司樂贊舉迎神樂奏貽平之章樂辭與同後仿太廟時享儀此樂作贊引奏詣香案前暨對引恭導皇帝詣太祖高皇帝聖容香案前司香跪贊引奏跪皇帝跪奏上香司香進香皇帝上炷香三上瓣香興贊引對引恭導皇帝詣太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝聖容香案前上香如前儀畢贊引對引恭導皇帝至正中前立司香跪進大紅香皇帝恭奉大紅香供獻香爐畢贊引奏復位皇帝復位立贊引奏跪叩興皇帝行三跪九拜禮王公均隨行禮樂止典儀贊奠帛爵行初獻禮司樂贊舉初獻樂奏敉平之章樂作有司揭尊羃勺挹酒實爵司帛司爵太監奉帛爵以次進至各聖容前司帛跪獻篚奠於案三叩興司爵立獻爵奠於墊中各退樂止典儀贊行亞獻禮司樂贊舉亞獻樂奏敷平之章樂作司爵奉爵詣各聖容前獻爵於左如初獻儀樂止典儀贊行終獻禮司樂贊舉終獻樂奏紹平之章樂作司爵奉爵詣各聖容前獻爵於右如亞獻儀樂止典儀贊徹饌司樂贊舉徹饌樂奏光平之章樂作徹畢樂止贊禮郎一人進前北面跪奏禮畢請還宫三叩退司樂贊舉還宫樂奏乂平之章樂作贊引奏跪拜興皇帝行三跪九拜禮興樂止典儀贊奉香帛送燎司帛詣各聖容前跪三叩奉帛興司香奉香以次恭送燎所樂作贊引對引恭導皇帝轉立拜位東旁西向司拜褥太監撤拜褥王公亦稍後東立西向俟香帛過仍布拜褥皇帝復位立焚香帛贊禮郎數帛贊引奏禮成暨對引恭導皇帝出殿左門降月臺出甎圈門升輿還宫王公等隨出遣王恭代儀屆期卯刻王蟒袍補服贊引官對引官導王由甎圈門㦸門西旁門入於月臺西階稍後立典儀贊樂舞生就位執事官各供乃職贊引贊就位王就位典儀贊迎神司香太監奉香盤以次進至各案前祇俟司樂贊舉迎神樂奏貽平之章樂作贊禮贊詣香案前暨對引導王入殿西門詣太祖高皇帝聖容香案前司香跪贊引贊跪王跪贊上香司香進香王上炷香三上瓣香畢興贊引對引導王詣太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝聖容香案前上香如前儀畢贊引贊復位王復位贊引贊跪叩興王行三跪九叩禮興樂止典儀贊奠帛爵行初獻禮司樂贊舉初獻樂奏敉平之章樂作司帛司爵太監奉帛爵以次進至各聖容前司帛跪獻篚奠於案三叩興司爵立獻爵奠於墊中各退樂止典儀贊行亞獻禮司樂贊舉亞獻樂奏敷平之章樂作司爵奉爵詣各聖容前獻爵於左如初獻儀樂止典儀贊行終獻禮司樂贊舉終獻樂奏紹平之章樂作司爵奉爵詣各聖容前獻爵於右如亞獻儀樂止典儀贊徹饌司樂贊舉徹饌樂奏光平之章樂作贊禮官一員進前北面跪贊禮畢請還宫三叩退司樂贊舉還宫樂奏乂平之章樂作贊引贊跪叩興王行三跪九叩禮興樂止典儀贊奉香帛送燎司帛詣各聖容前跪三叩奉帛興司香奉香以次送燎所贊引對引導王於西旁立俟香帛過王復位立焚香帛贊禮郎數帛贊引贊行禮畢導王由原入門出每嵗除恭懸聖容正月初二日恭收聖容遣皇子致祭儀是日皇子蟒袍補服贊引官對引官由甎圈門西旁門導皇子入㦸門西旁門升月臺西階入殿西門詣太祖高皇帝聖容香案前贊禮不贊皇子跪上攢香三次畢導詣太宗文皇帝世祖章皇帝聖祖仁皇帝世宗憲皇帝聖容香案前各跪上攢香三次畢導皇子由原入門出於月臺上行三跪九叩禮畢贊引對引導皇子由原入門出安佑宫乾隆五年四月丙戌命重建安佑宫是日諭內務府營建安佑宫照壇廟深逺欵式尋奏准以七月興工至八年十一月告成大殿九室重樓玉石欄杆月臺一上設香爐三銅鶴鹿各二東西配殿二各五間碑亭二焚帛爐二鐡海六安佑門一座五間左右角門二花瓶二㦸六十枝鐡海二東西朝房二各五間井亭二筒子河一道石橋五垣門五門外正中寶坊一匾額南面羮牆愾慕四字北面雲日瞻依四字東西寶坊二東匾額西面謨烈重光四字東面勳華式煥四字西匾額東面功隆作述四字西面德配清寧四字月牙河一道石橋三前寶坊一匾額南面鴻慈永佑四字北面燕翼長貽四字西角天柱四東致孚殿一三間致孚門一御製安佑宫碑文序昭穆以祀其先祖有功而宗有德建報本之義為萬古之經者宗廟之制三代以上即有之繼人之志述人之事者所當謹也設衣裳以如其生朔有酌而望有獻盡事親之禮抒不匱之思者原廟之制西漢以來始有之繼人之志述人之事者弗敢廢也後世神御殿亦猶漢原廟之義耶然漢之原廟不過月出衣冠一逰耳至宋之時乃有神御之名蓋奉安列朝御容所也上元結燈樓寒食設秋千其視漢為已備矣而崇建遍郡國奉祀或禪院識者多議其非禮焉我皇祖聖祖仁皇帝在位六十餘年恩澤旁覃僻邑窮谷圓頂方趾之衆飲其德而不知子孫臣庶躬被教育者宜其謳歌慨慕而無已思也是以雍正元年我皇考世宗憲皇帝謹就大內壽皇殿奉安御容朔望瞻禮牲新時薦而於皇祖所幸暢春園亦陳薦如禮非輕為此創舉也我皇祖有非常之澤及天下是以皇考合天下之情亦以非常之禮報之有漢宋備物備禮之誠而無宋代遍及郡國祀繁致褻之譏也豫小子嬛嬛在疚顧諟皇考之陟降敕明旦凛紹庭良法美政布在方策者謹守而弗敢失既就壽皇殿東室䖍奉皇考御容以配皇祖念兹圓明園我皇考向日遊觀在囿在沼之地也其何忍恝視爰擇爽塏之地具殿廡之規為室九敬奉皇祖御容於中奉皇考配東一室匪惟豫小子罔極之思羮牆之慕藉以稍抒亦欲使後世子孫凜覲揚之志勤堂構之基所為禮以義起有其舉之莫敢廢也鳩工於乾隆庚申而蕆事於癸亥所司以碑文請乃序其事如左而繫之以詩懿兹苑囿皇考所作土階茅茨遵堯之約匪誇丹雘有窅溪壑匪沸管絃有唳雲鶴詎羮之求惟聖所樂我龍受之中心惕若宅是廣居九有是度祖武斯繩宏規敢略爰相其地載斟載酌爰創其模載經載落廟貌巖巖堂皇綽綽有間旅檻有梴松桷周之以郛其郛嶽嶽環之以池其池㶁㶁其水何有鳶飛魚躍其宇何有網軒珠箔神御孔安心乎莫莫來覲來齊曰望曰朔於萬斯年豫誠永託乾隆八年嵗在癸亥秋八月嗣皇帝臣御名敬志八年十一月辛卯定安佑宫供享儀內務府奏考前恩佑寺奉聖祖仁皇帝御容時是日獻大宴並餑餑案嗣後每日供餑餑案一其大宴案上供淨水九碗諸色米九碗紅花水九碗香九碗乾果九碗茶九碗密果九碗乳餅九碗絹花九碗今安佑宫安奉神御請照例敬謹備供得㫖是臣等謹案每嵗春正月皇上幸圓明園駐蹕之初詣安佑宫行禮上元日必詣行禮恭遇大駕謁陵省方秋獮自苑啓鑾及還駐蹕皆詣安佑宫行禮戊戌恭請聖祖仁皇帝御容安奉中室世宗憲皇帝御容安奉東一室先是雍正三年四月乙酉世宗憲皇帝追慕聖祖仁皇帝敬即暢春園建恩佑寺工竣奉安聖祖仁皇帝御容親詣行禮自後月必展拜或兩詣三詣焉至是安佑宫成內務府大臣率屬蟒袍補服赴恩佑寺清淨地恭備彩亭駕衣從恩佑寺預備龍旗御仗鼓樂恭迎聖祖仁皇帝御容進圓明園西南門過清淨地恭請世宗憲皇帝御容同進安佑宫辰時安奉恭引皇上供享行禮如儀臣等謹按雍正元年世宗憲皇帝既推奉先殿之禮敬奉聖祖仁皇帝御容於壽皇殿顧猶未足以罄思慕之誠而復有恩佑寺御容之奉蓋苑中則詣恩佑寺宫中則詣壽皇殿瞻依聖容之心與起居而時切我皇上御極元年十月即敬奉世宗憲皇帝御容於壽皇殿東室三年二月丁丑復敬奉世宗憲皇帝御容於安佑宫猶我世宗憲皇帝純孝之聖心也至五年擴安佑宫制八年迎聖祖仁皇帝御容於恩佑寺䖍供於安佑宫中室奉世宗憲皇帝御容䖍供於東室於是苑中瞻仰聖容始専禮於安佑宫至十三年重建壽皇殿十五年恭繪聖容成大祭蓋初既推世宗憲皇帝聖心迎聖祖仁皇帝御容以世宗憲皇帝御容配而崇安佑宫之奉兩朝神爽臨御一殿聖慈聖孝之心安矣繼復推世宗憲皇帝孝事聖祖仁皇帝之聖心恭安太祖高皇帝太宗文皇帝世祖章皇帝聖容列后聖容而益崇壽皇殿之奉五朝神爽同饗玉筵至是而神御之禮大備恭繹壽皇殿安佑宫御製兩碑文至矣哉聖天子之孝無乎不逹矣斯皆廣宗廟事生事存無已之孝思以允協於家庭之禮者也乾隆四十二年二月丁酉上以大行皇太后升遐親詣安佑宫於聖祖仁皇帝世宗憲皇帝神御前行告哀禮先是正月丙申恭移大行皇太后梓宫於九經三事殿前期王公大臣奏向例奉移之日即回原處居住伏思圓明園係世宗憲皇帝皇上久居之處與宫中無異仰懇於敬移禮成後即回圓明園居住奉諭㫖朕本意俟皇太后梓宫於九經三事殿奉安禮成即在暢春園之無逸齊居住以申哀悃兹據王公大臣等合詞具奏向例奉移之日應回原處居住既舊例如此著照所請行至朕遭聖母大故理應於皇祖皇考前告哀但壽皇殿在城內二十九日步送梓宫後自揣實不能再行禮且應即往暢春園恭候奉迎因思安佑宫係皇祖皇考神御所在與壽皇殿相同擬於二月初一日躬詣祗告臣等謹按是年冬敬建恩慕寺於暢春園仰志慈恩以為薦福重地故但供奉佛像時申瞻禮恭遇聖誕令辰及除夕上元節日大內則壽康宫寶座前行禮至暢春園之長春仙館避暑山莊之松鶴齊為孝聖憲皇后舊御寢宫亦惟恭詣寶座前行禮不復供奉神御伏讀戊戌年御製正月十四日作詩注云禮緣義起豫惟恪奉前規不敢稍有過不及如壽皇殿向奉皇祖皇考御容而皇祖妣皇妣御容惟於除夕元旦同列祖列后神御敬奉瞻拜至圓明園之安祐宫則祗奉皇祖皇考御容未及列后惟養心殿及圓明園之東佛堂皇考時曽恭奉孝恭仁皇后神位因亦遵奉聖母神位至壽康宫雖尊奉慈闈頤慶年久但其地宜留為萬萬年奉養東朝所居奕祀所當敬守若於此安奉聖母御容神位何以示垂貽久逺之圗是以不敢輕率議加以協舊典又讀御製恩慕寺瞻禮詩云慕而未敢奉神御恩以難忘建梵宫御製長春仙館禮佛有感詩云未敢頻興神御屢因之潔治佛筵崇仰見聖心純篤思慕之誠無有窮極而緣情定制允合乎禮以義起之文兹謹敬識於此使天下萬世共仰大中之盛軌焉永佑寺寺建於避暑山莊湖北岸之東即御題山莊三十六景中之甫田叢樾地也我皇上敬承聖祖仁皇帝巡邊講武家法嵗駐山莊孝思純篤爰躬度平敞地特崇寶構䖍奉聖祖仁皇帝神御名曰永佑以志祖恩鳩工於乾隆十五年至十六年秋告成明年增建後樓至十八年夏工竣御製永佑寺碑文昔如來以法王御世宏濟人天遍現十方虛空不住顧其安立道場必在靈山寶地鷲峯鹿苑精舍莊嚴蓋聖蹟所留尤福祐之所聚矣我皇祖聖祖仁皇帝以無量壽佛示現轉輪聖王福慧威神超軼無上省方覽勝乃眷熱河建山莊為清暑地因巖壑自然之勢示茅茨不剪之規養性怡神從容綜理而風雷之所鼓動雨露之所涵濡神化周通不疾而速猶佛之林間燕坐灑落安禪而說法則聲震大千慶生則施洽羣有也豫小子蚤年隨侍仰見我皇祖清晏娛遊無逸乃逸對時育物天地同流至於今彈指三十餘年秋獮之餘時復稅駕於此松雲如舊榱桷翹瞻感陟降之在庭思報恩而薦福遂即山莊內萬樹園之地創立精藍爰名永佑固不特鐘魚梵唄足令三十六景借證聲聞我皇祖聖日所照千秋萬嵗後子孫臣庶無不永如在之思是即釋迦之耆闍崛山金剛法座天龍擁護相好依然而朕之繩武寧親祝釐養志者於是乎託庶其無忝前志云爾乾隆二十七年秋恭奉世宗憲皇帝神御於寺樓之東室先是即寺建樓既䖍供聖祖仁皇帝御容於中室至是以比嵗秋中駐蹕山莊八月二十三日屆世宗憲皇帝忌辰皇上思慕齊居時殷僾愾爰恭奉神御於東室至日上䖍詣瞻拜用申依戀樓西偏精藍三楹顔曰寫心精舍每嵗上謁神御時臨憩於此乾隆四十四年秋上詣松鶴齊孝聖憲皇后御榻前行禮臣等謹按松鶴齊為我皇上恭奉慈輿避暑夏凊之所皇上恪守前規不敢屢奉神御故惟於御榻前申依戀之忱自是每嵗駐蹕遇薦新及節日皆親詣瞻禮臣等謹按熱河避暑山莊康熙四十二年建聖祖仁皇帝嵗臨避暑遂秋獮於木蘭用綏拊䝉古四十八藩之部我皇上紹承家法每秋嘗駐山莊嵗乙亥平定準噶爾己卯平定回部先後諸藩之新臣附者皆來朝於山莊湛露優霑中外禔福蓋益以昭聖祖仁皇帝留貽之厚於無疆矣恭讀己卯秋駕臨山莊御製詩有永佑寺瞻禮皇祖神御感成長句曰靈臺經始庶民攻逐處奎章仰聖蹤神御肇禋思所喜祖恩如昨報何從恬文嬉武戒常凜揚烈覲光志益恭三十七年舂鼓夢凉風白日感重重天藻謂三十七年者敬誦初集丁卯避暑山莊百韻詩序曰豫小子自十二嵗蒙皇祖恩養育宫中侍奉左右扈蹕至此臣等謹按是年為康熙六十一年壬寅則由己卯上溯雍正元年癸卯三十七年矣聖心思慕之誠蓋常如一日且百韻詩序曰繼序以來敬惟昔日時巡之意更值四方寧謐之時實不敢使文恬武嬉以隳聖祖家法顧兹者瞻禮神御已越十三年而仍復凜戒於文恬武嬉恭惟孝德之純以成武功之大即此可紬繹聖心之報祖恩於無已焉夫以聖祖仁皇帝嵗臨之御苑寶構崇閎神御式憑而復於寺樓東室䖍奉世宗憲皇帝御容恭繹辛巳秋御題寫心精舍詩曰每至思皇祖今朝皇考思益深悲序繼實恐負謀貽武幸臻耆定豐惟祈屢綏向誰寫心是無我息肩時蓋自是每嵗躬謁紀以詩章兩聖神御瞻對同申聖人之孝如侍起居如親陟降義廣肇禋情殷繩武典禮之隆允宜垂則於萬年億年者矣皇朝文獻通考卷一百十八
