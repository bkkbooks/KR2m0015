body:
  text: 欽定四庫全書皇朝文獻通考卷二百十刑考十六赦宥寛恤臣等謹按刑罰者經國之大權赦宥者欽恤之曠典也罪人逃戮則廢法矜疑弗釋則失情義正仁育要各以時而已我朝初造革故鼎新滌瑕蕩穢舊染汚俗從風丕變自時厥後列聖繼承惟以刑期無刑辟以止辟者飭紀綱而彰成憲凡不在三刺三宥之列者先著不赦之條其餘或遇慶典則肆赦或遇𤯝災則肆赦矜宥減免特恩寛大之詔嵗輒屢下或間嵗而一下湛濡汪濊浹髓淪肌自開國以迄於今未之有改也然而吏民觸法觝禁者無倖免之患脅從過誤連坐逮問者無久淹之慮至於奸宄肅清獄訟衰息囹圄無輕繫小罪而嵗決重囚不過數十人猗歟盛哉唐虞三代之隆莫是過矣臣於詳讞一門既備載慎刑訓㫖兹考赦宥凡省刑停刑諸條有闗于矜恤庶獄者例得謹敬特書以昭曠典云天命六年釋遼陽繫獄官民十年詔赦國中死罪以下人犯十一年赦漢官漢民罪奉諭漢官漢民從前有潛逃及與姦細往來者事屬已往雖舉首不論天聰元年命寛盜犯時以嵗饑盜賊刼殺所在多有諸臣請按律嚴懲上惻然曰彼皆不得已而為盜耳緝獲者鞭而釋之可也遂命是嵗讞獄姑從寛典十年以受尊號禮成大赦除十惡不赦外餘悉原之崇徳二年皇子生大赦五年以萬夀聖節大赦七年以聖躬違和大赦凡重辟及械繫人犯俱令集大清門外宣諭曰爾等衆犯有罪應死者有應責應罰者今俱釋爾罪其各改過自新毋再干國典八年上不豫大赦又世祖章皇帝御極大赦順治元年定鼎京師頒詔中外大赦天下設恤刑官五年一差慎選廉明者居之又赦偽官土冦前罪自流賊作叛以來民間毎將擄殺不赦等罪紛紛互告是以特諭凡偽官投誠及明降賊官員併土冦為亂改過自新者咸赦前罪二年飭内外刑官毋得淹滯獄犯御史趙開心奏言監犯淹滯可憫請勅刑部遣司官五日一查速行審結並令直省撫按通飭有司除重罪宜加詳審外其餘十日即與結案從之又以陜西平定詔赦該省罪犯定盜賊分别免罪御史馬兆煃奏轂輦之下盜賊竊發及至捕獲少長盡置之法臣以為殲厥渠魁脅從罔治其老稚不能彎弓操刀者望加矜宥以廣罪人不孥之意又以江寧平定詔赦河南江南江北等處罪犯定争訟小事毋濫行監禁從山東巡撫丁文盛請也三年以四川平定詔赦該省罪犯四年以浙閩平定詔赦兩省罪犯又以廣東平定詔赦該省罪犯申定赦例凡犯十惡殺人盜官財物及強盜竊盜放火發塚受賍詐偽犯姦畧人畧賣和誘人口姦黨讒言左使殺人故出入人罪知情故縱聴行藏匿説事過錢之類雖遇赦不原其過悞犯罪及因人連累官吏有犯公罪並從赦宥赦書臨時欽定其特免及降減從輕者不在此限徒流人在道遇赦計程無故過限者不得以赦放若會赦在逃雖在程限内亦不放免其逃者身死所隨家口願還者聴遷徙安置人準此其徒流遷徙安置人已至配所及謀反叛逆造畜蠱毒採生折割人殺一家三人緣坐應流者不在此限五年恭奉太祖髙皇帝配天並追尊四祖考妣禮成詔赦天下定矜恤獄囚之例毎日給倉米一升冬給綿衣一襲夜給燈油有患病者令醫生診視給藥並酌寛刑具八年上親政詔赦天下定熱審減等之例時以天氣漸熱飭刑部通察五城司坊順天府京縣各監犯分别減釋嗣於順治十年定毎年小滿後十日内外直省一體舉行十年詔赦土賊等罪凡嘯聚山林刼掠道路曽為土賊者無論人數多寡罪犯大小但能自首投誠盡赦前罪又矜免死罪重犯時朝審重辟有張學者傷人應抵伊子玉兒泣請代死法司以聞上矜其請特免死遣戌遼陽仍諭後不為例十一年以大婚禮成恭上皇太后徽號詔赦天下増定熱審減等之例定例各省犯案在熱審之先到部者准行減等至是刑部奏准各省在熱審之時具題到部者雖過熱審之期亦准減等發落又上以災異修省詔赦天下十二年定卹刑事例凡卹刑官審錄罪囚有死罪可矜疑及事無證佐可結者具奏處置流徒以下減等發落充軍人犯除已經發解外其餘不分曽否詳允及雖經定衛尚未起解者逐一闗送審錄内有應釋應減者會同巡撫酌量發落又軍罪有不用全律摘引例文及不分首從濫坐者如未發遣即附入矜疑疏内題請開釋雜犯死罪准徒五年者並已徒而又犯徒總徒四年者各減一半例應枷號就近釋放其餘徒流等罪各減等發落笞罪放免其賍犯除侵盜官銀五十兩糧一百石以上者照舊監追如應還官銀不及五十兩並入官給主百兩以上各賍監追至五年或正犯身故逮及子孫勘無家産者奏請豁免其各處盤查坐賍追賠銀兩草束亦聴查勘正犯存亡家産有無具奏裁奪停止秋決以直省卹刑官審錄未竣也嗣准左都御史龔鼎孳奏毎遇卹刑年内外一體停決十三年以乾清宫成詔赦天下又停在京秋決奉諭朝審秋審係刑獄重典朕必詳閲招冊始末情法允協令死者無寃今決期伊邇朝審甫竣招冊繁多尚未詳細簡閲驟行正法朕心不忍今年著暫停秋決至明年九月上以内外刑辟宜同一視命各省秋決亦暫停一次定旗下官民死罪援免例滿洲䝉古漢軍官員有祖父伯叔兄弟陣亡及身出征負重傷者皆免死一次罪不至死者折贖強盜重犯不得援免又以冊封皇貴妃禮成詔赦天下除十惡不赦等罪外其餘死罪皆減等軍罪以下咸赦除之在京朝審候決重犯及直省秋決重犯皆與減等發落十四年恭奉太宗文皇帝配天禮成詔赦天下十五年以皇太后聖體康豫詔赦天下十七年以地震嵗祲上省躬詔赦天下定正月停刑之例左都御史魏裔介奏正月係萬物發生之初應停止行刑以廣皇仁從之又命監候各犯概從減等停止秋決以明年辛丑恭過皇太后萬夀節因有是㫖遂撤恤刑各官定赦罪減等例刑部議覆給事中楊鼐疏言臣伏讀上諭凡秋決各犯俱令減等第按律減死一等皆為流罪而邇來則例不同法曹聚訟或主内流或主逺徙未有定論若概遵新例悉流邊逺非所以仰體皇上矜宥生全之意請勅法司各照定例減等以廣皇仁從之十八年上大漸諭京城内除十惡外其餘死罪以下悉行放釋又聖祖仁皇帝御極詔赦天下又命刑部審擬案内凡係現任官員應援赦者交吏兵二部議奏著為例又免被擄下海後投誠死罪刑部奏徐勝等下海旋經投誠仍按律治罪上宥之並令凡有下海後投誠者照此例免罪康熙二年免海賊案内罪犯刑部奏海賊入犯江南案内罪犯奉有諭㫖除康熙元年以前審結外餘從寛免今有先結案内干連緝獲人犯及未獲人犯應否一併寛免得㫖不論已結及告發者俱著寛免四年詔赦廣東地方官罪時廣東逆賊蘇利反叛地方官多罣罪戾上以亂起倉卒與外來賊寇失於防禦者不同且該省旋即將逆賊𠞰滅地方蕩平凡大小各官之罪俱著寛免又以星變地震上省躬詔赦天下四年恭上太皇太后皇太后徽號禮成詔赦天下六年上親政詔赦天下又恭奉世祖章皇帝配天並加上太皇太后皇太后徽號禮成詔赦天下七年以天旱寛釋輕罪御史黄敬璣疏言刑獄上闗天心今雨澤愆期請勅内外刑官除重囚外其餘輕罪即行保釋從之八年申定各省熱審減等之例時以停遣䘏刑官諭各省熱審時有非實犯死罪者量予減等如在京法司例九年定軍流減等例凡軍罪遇熱審亦准減等軍流以下已經具題未奉㫖發落者皆准減等至十年又定直省罪犯在熱審之先具題到部之案遇熱審仍行減等其在熱審時具題之案雖過熱審之期到部者亦仍減等發落又孝康章皇后升祔太廟詔赦天下定各衞軍犯赦後到配所者察明釋放在途遇赦者即行請題從給事中王曰温請也定徒罪援赦例刑部奏准旗人犯徒罪枷號日期未滿遇赦即行放釋其民人徒犯已到配所遇赦者亦免徒釋放定流徒人犯六月及十月正月俱停發遣十年以天旱命刑部清理現禁現審人犯如有可矜疑者即予減等發落尋免斬絞人犯死罪十一人十一年定免死流犯有祖父母父母老疾家無次丁者照旗人例折枷存留養親之例十二年詔赦逆賊吳三桂屬下散處直隸各省不知逆情官員親族人等罪至十三年復勅刑部將逆案干連人等情罪稍可矜疑者概行省釋十三年詔赦逆賊孫延齡所管人員親族人等罪又詔赦逆賊耿精忠屬下現任直隸各省文武官員罪十四年復正月停刑之例先是順治十七年定正月停刑康熙元年此例停止至是給事中彭之鳳復請照例行從之又勅刑部速行審結罪囚上以時值嚴冬不忍罪人久繫故有是命十五年詔赦逆賊尚之信親屬及屬下人員罪十六年以冊立皇后大禮將行命停秋決十七年停秋審重提質對之例舊例直省秋審必重提犯人家屬及失事牽連之人質對由縣府遞解跋渉道路守候審結為累不淺至是御史蔣鳴鳳奏請停止從之十八年詔赦吳逆案内滇黔各省從逆人員罪二十年定交六月節停刑之例刑部奏立決人犯請交六月節停刑得㫖六月節若在五月内即以交節日起停刑若六月方交節即以六月初一日起至立秋在六月内必俟七月初一日方令行刑又停止秋法又以吳逆蕩平詔赦天下二十一年命山海闗以外及寧古塔等處人犯死罪減等軍流以下赦免又特赦流犯回籍時上謁陵有尚陽堡流犯王廷試子王徳麟叩閽稱伊父以窩逃充發今年老懇發回籍願以身代督捕議不准行上以情實可憫著一併發回原籍仍諭後不為例臣等謹按曲宥之典列祖偶一行之然不以此開倖免之門也先是順治十年世祖矜子代父死之請特免斬犯死罪遣戍遼陽即諭後不為例又康熙七年浙江嘉善縣民郁之章有罪當徙尚陽堡㑹有認工贖罪之例其子候選知縣郁褒請修刑部衙署贖父還里迨限滿尚未訖工郁之章例當復徙郁褒叩閽願棄官代父之從所郁褒弟生員郁廣亦叩閽言已當代徙留其兄郁褒侍父疾部議子代父徙非例仍以衝突儀仗論上並矜而宥之至是復有是赦並諭後不為例蓋皆於矜宥之中防廢法之漸仁至義盡所謂垂萬世而可守者也又省釋拘禁人員時以天旱科道等官遵諭會議請暫釋江西出兵官拘禁者俟大兵還日議罪上曰省釋拘禁人員亦寛政之一端也俱令暫釋又停止秋決並勅部將可矜人犯免死減等二十二年命刑部存恤獄囚刑部題在獄病故四十餘人上諭大學士等曰人命重大無辜枉死上干天和朕念獄中罪犯恐死於非命曾經命御醫給與藥物療治有疾之人今嵗獄囚患病者多何故不將現給醫藥療治此皆該部怠忽之故爾等傳諭刑部嚴加申飭令伊等不時巡視仍令該管官員加意存䘏無致監斃二十三年停止秋決定嚴寒停遣之例奉諭軍流人犯甫離刑獄一綫僅存嚴寒發去恐致死亡之患朕心不忍嗣後著過嚴寒之時發遣二十五年赦受賍行賄人員奉諭各案枉法得賍行賄與受人員免擬重辟照例追賍其未經發覺者悉予寛免二十六年以天旱詔赦天下又命内外現監重犯除十惡及貪官光棍外概予減等先是本年停止内外秋審至是太皇太后聖躬違和因有此㫖二十七年停止内外秋審二十八年上南巡赦山東江南浙江經過地方死罪以下人犯除十惡外餘悉寛釋停止秋決二十九年以天旱命釋拘禁枷號人犯又停止秋決情可矜疑者照例具奏三十一年停止秋決奉諭朕閲秋審冊内各省情實人犯甚多除可矜者照例減等發落其情實各犯今年停其正法定酌減陜西秋審人犯罪時以秦省嵗饑特恩加宥凡秋審情實緩決人犯除十惡外餘悉減等發落三十二年停止秋決三十四年詔赦天下時以直省旱潦晉省地震特恩赦宥除貪官汚吏行間犯罪與十惡外一切罪犯減等發落又停止秋決三十五年停止朝審秋審三十六年寛宥言官妄陳赦款之罪時給事中鄭昱條奏平定噶爾丹慶賀大禮頒詔款項奉諭凡頒赦詔皆人立之事非人臣所宜言自古不以頒赦為善政者以其便于惡人而無益於善人也鄭昱妄以詔款陳奏念係言官特從寛宥著大學士嚴行申飭又以平定噶爾丹值太和殿成詔赦天下三十七年免死罪五百餘人刑部議山西寧鄉山賊安守榮等聚衆五百餘名刧掠村莊安守榮等十四名應立斬梟示餘犯一百九十四名應照律立斬未獲各犯二百十二名嚴緝另結得㫖安守榮等於該撫兵到即率衆迎降俱從寛免死發往奉天安插賀之榮等一百九十四名俱從寛免死李霧等二百十二名俱免緝又命停止烏拉及盛京應決人犯上以親臨烏拉諭大學士㑹同將軍查明罪犯應正法者停其處決可緩法者仍監候可矜者即行完結並諭至盛京時亦照此例行三十八年赦山東江南浙江三省死罪以下人犯時上南巡經山東江南恩赦兩省死罪以下及駐蹕浙江赦通省罪犯如前例又免茶陵叛賊黄明案内為從人犯九十六人死罪發往黑龍江定寛免監禁緩決人犯死罪奉諭監禁緩決人犯甚多今又增一年人犯秋審朝審亦甚冗劇若久禁囹圄死者必多皆從寛免死各枷三月鞭一百分别發黑龍江當差三十九年停止秋決都察院以秋審事奏請上曰若停秋審此内矜疑人犯又致多監一年將可矜疑者照常審理即行減等完結其情實人犯今年停決免盜案為從者死罪刑部議覆廣東巡撫蕭永藻題強盜楊三等不分首從盡行處斬應准行上曰此案同謀者六十餘人盡誅之則人命甚多可將為首者即行正法為從者俱從寛免死發往黒龍江四十一年寛減内外緩決人犯奉諭罪犯一經緩決即皆冀望生全而長困桁楊淹流嵗月自新無路朕甚憫之今方春始和用沛矜釋之仁現在刑部及直隸各省監禁人犯凡經康熙四十年秋審奉㫖緩決者通行減等又停止秋決奉諭今年内外秋審情可矜疑者照例發落其情實緩決各犯著於明年秋審具題四十二年以萬夀聖節四海奠安河工告成詔赦天下又停止秋審以本年三月已奉恩詔所有罪犯無㡬因有是命寛恤罪犯因親老廢疾者准其留養四十四年赦福建浙江江南山東等省死罪以下人犯時上閲視河工特恩寛減浙江福建江南三省死罪以下並四十三年秋審緩決人犯及回鑾次山左赦通省罪犯如前例又命停決朝審情實罪犯可矜疑者照例減等四十五年諭刑部緩決人犯至三四次者免死減等又命免直省緩決人犯死罪時刑部歴年緩決人犯凡二百二十五人俱免死減等並著通行各省照例行定大臣廕襲子孫犯死罪家無次丁者許妻妾入監相聚刑部議准凡經恩賜祭葬之子孫難廕出身之人不可使宗祀斷絶如審擬大辟家無次丁者令其妻妾入監相聚生有子息再行正法四十六年以各省重犯甚少命停秋審四十七年停止秋決緩決者減等矜疑者照例發落四十八年命停止江南浙江秋決以兩省嵗祲疾疫故也四十九年停審情實人犯奉諭本年朝審秋審可矜可疑罪犯照例審奏其情實罪犯停審五十年免喀喇沁盜賊逃人罪五百六十餘人時緝獲喀喇沁地方盜賊逃人甚多上命將盜首二人正法餘令各歸原籍又酌減刨參人犯罪奉諭偷盜人參等案為從者俱照例完結其為首之人擬絞罪在獄者甚多此等人到秋審時亦應赦之時值立夏天氣漸熱監犯易於染病致斃著刑部酌量減等發落又免海賊死罪五十餘人刑部題福建海賊鄭盡心等俱擬即行正法上以正法人犯五十餘名多迫於饑寒搶奪財物並未與官兵拒抗且俱熟諳水性特㫖從寛免死發往黑龍江寧古塔等處充水手當差又停止秋決五十二年以萬夀聖節詔赦天下又停止朝審秋審恩詔頒行所餘案件甚少故也五十三年停止秋審可矜疑者減等並諭現審人犯罪不至死者亦著減等發落以是年三月萬夀聖節從大學士九卿之請也又寛恤在京監犯時上駐蹕避暑山莊軫念在京獄囚恐盛暑致疫命加寛恤多置氷水以解鬱暑其九門鎖禁人犯亦寛其鎖條枷號人犯暫行釋放至明年六月以天氣炎熱命照此例行又明年六月以時漸大暑命將監禁人犯暫寛拘繫又矜恤命盜案内牽連人犯奉諭直省命盜案内牽連之人雖笞杖輕罪不免羈禁淹留深可憫惻嗣後杖罪以下審結日即行發落不必羈候部覆務使無知罣悞之民早得脱身寧家以副朕哀矜體恤之意又恤旗民詞訟解部候質之累御史周祚顯疏言近京畿輔之地旗民雜處一切鬭毆賭博田産細事例應解部候質以致牽連拖累者甚多請嗣後不必令其解部交理事同知審理詳報巡撫完結得㫖允行五十四年停止秋決奉諭今年京師情實人犯甚少此内猶有可矜者再宥數人其應勾者十四五人而已即至來年亦不過二三十人今年停刑亦無不可將此情實緩決案内折角處記檔來年審奏時聲明五十五年停止秋決先是法司奉命查緩決人犯年分久逺者分别減等至是復奉諭今年朝審情實人犯止七十餘名迨三次覆奏後勾決者不過二三十名著停止處決五十六年命停決情實人犯緩決者仍監禁可矜疑者減等五十七年命刑部減釋枷鎖人犯又停止秋決奉諭凡人命事朕必詳看方肯完結此次朝審情實各案朕欲一一詳看覺精力不支若俟從容看過批出照例覆奏三次冬至以前總不能決前數年俱曽停決今年亦停止又命各省緩決人犯分别減等完結五十八年停止朝審秋審以本年重犯無㡬因命停審五十九年停止秋決六十年命暫釋枷鎖人犯毎年暑熱時將枷鎖人犯暫行釋放上以是年未經降㫖該衙門亦未奉請故有是命又停止秋決六十一年停止秋決又世宗憲皇帝御極詔赦天下雍正元年恭上聖祖仁皇帝尊諡升祔太廟禮成詔赦天下又酌免臺灣叛賊親屬死罪刑部議奏臺灣叛賊鄭文逺等家口應分别定罪得㫖凡謀反大逆按律凌遲處死正犯之親屬皆斬但此案事起倉卒逺隔海洋親屬有身在臺灣者亦有身在内地者若概從誅戮情堪憫惻除身在臺灣者依律正法外其在内地者從寛免死給與功臣之家為奴又酌減枷杖輕罪人犯笞罪寛免又恭上孝恭仁皇后尊諡升祔太廟禮成詔赦天下又恭上孝誠仁皇后孝昭仁皇后孝懿仁皇后尊諡升祔太廟禮成詔赦天下又恭奉聖祖仁皇帝配天禮成詔赦天下又停止秋決二年停止秋決時以各省豐稔特諭刑部朕君臨天下常願無一夫不獲其所今年直隸河西務堤水雖畧有泛溢江西一二縣水發江南海嘯典浙江起蛟之處亦皆不成災其餘直省各州縣以及口外用兵地方俱田禾茂盛五穀豐收億兆樂生遂性咸受和平之福而秋審朝審情實重犯罹于政典雖罪無可赦然朕心深為軫惻爰順上帝好生之心著將今年情實人犯停其處法以副朕欽恤至意三年以時值盛暑命王大臣㑹同三法司詳讞現審人犯應釋放者即行釋放其部議枷號送門之人亦著保釋俟處暑後補枷四年命酌量保釋輕罪監犯又寛釋命案罪犯奉諭各省命案内或緣細事起爭或因䕶親情急或本意恐嚇而悞傷莫救按律抵罪法所當然但念愚氓因一朝之忿頓罹重罪朕心不忍現在各省具題案内除情由可惡者不准寛免外其餘一百七十七名俱著釋放此朕格外生全之恩為舊例之所未有凡兹小民當體朕省刑宥過之意又命各省修繕監獄時以各省獄多倒敝遇嚴寒酷暑毎有監斃者特飭各省逐加修葺地勢低窪者改在髙阜之處狹隘者展寛葢造又停止秋决並酌減情實緩決人犯五年免隠匿開墾地税之罪定限一年内令各省官民自行出首其從前隠糧漏科之罪悉從寛免定援赦審釋之限凡恩詔赦款内應免罪囚逐一查明登明釋放如情罪可疑者限赦到一月核明釋放如耽延時日濫行拘禁者問官議處又停止秋決六年停止秋決並酌減情實人犯七年停止秋決可矜疑者寛減又諭八旗包衣發遣人犯三年無過酌予赦宥八年停止秋決九年寛減監犯時以亢旱命法司將監禁枷號輕犯暫行保釋其擬絞監候賊犯已經三年者酌量釋放減等並諭將外省輕罪人犯已經到部有問擬徒杖而准其折贖者悉行寛免又定流犯年逾六十者准入養濟院給與口糧十年免侵帑官吏罪奉諭侵蝕錢糧之官吏應加重罪今施恩法外分年帶徵若有不拘年限先行完納者准其開復依限完納者寛免其罪胥吏中有先期及依限完納者亦加恩免罪是時以天旱命法司省釋輕罪監犯又寛減八旗緩決人犯又寛免孀婦獨子鬭毆殺人死罪時安徽巡撫程元章題報毆死陳小厮之石兆林應絞監候聲明石兆林係孀婦獨子陳小厮並非獨子奏請留養經部議駁具奏上以石兆林之母青年守寡苦節撫孤而屍親亦呈請免抵特加恩准其存留養親仍追埋葬銀兩給付死者之家又停止秋決定夫毆妻死審無故殺别情如家無次丁者准留承祀例申定額設囚糧之例定例繫獄囚犯俱給口糧時上因各省額設囚糧有無多寡不同且慮有扣剋等弊特諭督撫藩臬悉心詳查若該府州縣額設之外嵗有餘糧則當分給于不足之府州縣若本地原無額設之項或額數不敷則應支動存公銀兩核實散給令各處監禁之犯日食有資不至饑餒倘有刑書禁卒扣剋等弊將該管官一併議處十三年皇上御極詔赦天下乾隆元年釋銅案遣犯時銅禁已弛命將從前發遣在配者釋放回籍又飭應赦人犯速行審結奉諭恩詔之頒期以息事寧人使逺邇咸知遷善改過共為良民乃各省于一切案件仍行提審嚴刑酷夾恣意株連使無辜之人困于囹圄含冤負屈所在多有夫罪名既非犯在不赦則㫁讞亦易成招若使合于赦款之人不得即邀赦免之澤而以酷刑斃命或因拖累破家後即審明援赦亦已無及是朝廷已生全之而有司故戕害之藐視功令殘害民生莫此為甚著該督撫嚴飭各屬立即查明歸結省釋刑部所有案件亦即速為剖晰勿致沈擱以副朕哀矜庶獄之意又寛減年乆緩決人犯奉諭秋審冊内有自康熙五十三年至雍正三年以前皆係緩決者此等案犯遇赦不准援免論法本無可寛而長繫囹圄瘐斃獄底亦屬可憫此次秋審著將積年俱擬緩決之犯悉心簡閲應否減等酌議請㫖嗣經九卿科道等酌擬應減等者一百九十九名得㫖准其減等定發遣人犯分别援赦回籍刑部奏寧古塔黑龍江等處發遣當差人犯可否援赦分别情罪令其回京得㫖爾部詳查各犯情罪如所犯尚輕可以回京者行文各將軍詢問該犯有情願回京者令其回京不願者另行報部定軍流人犯之妻老病不能隨行者聴免其僉遣定軍流身故妻子願回籍者計程逺近毎名日給米一升又停止秋決二年恭奉世宗憲皇帝孝敬憲皇后升祔太廟禮成詔赦天下軍流以下悉予寛免又恭奉世宗憲皇帝配天禮成詔赦天下時以天旱命清理滯獄先是三月雨澤愆期命免緝應赦各犯并省釋枷責輕罪至是復諭刑部詳覆雍正四年以後十三年以前所有不赦各案及屢經秋審緩決之犯如果有一綫可原應行減等即著請㫖又赦釋配所年老人犯向例軍流已到配所者遇赦不准放回是嵗四月恩詔内令情罪稍輕已過三年者准其回籍至是復諭從前發遣之人其中有年逾七十雖原案較重而在外年久國法已伸著查明所犯情罪具奏請㫖命發遣在外安置當差罪犯本身已故者妻子准回旗籍又申定熱審減杖之例刑部議覆福建巡撫盧焯條奏熱審事宜稱律文無八折之條地方有司或將笞杖之罪概行八折嗣後毎遇熱審不必復行八折得㫖犯杖責者其罪本輕而盛暑之中量減其敲撲之數亦國家寛恤之仁八折之例由來已久不當輕為改易著另行妥議尋議凡一應杖責之犯時遇熱審于減等之中仍照舊八折發落從之又停止行刑以是月恭遇萬夀聖節自初一日至三十日止一月不行刑又停止秋決三年以天旱命寛減監犯又定犯人患病分别留養之例凡秋審人犯于起解時患病者除係初次解審之犯仍照例提解外如已經秋審一次者該州縣即報明上司委員驗實取具印甘各結准其留養又定旗人命案有親老丁單者照民人例准其存留養親承祀減等發落又恤旗民詞訟應質人犯牽連之累向例奉天所屬旗民交涉案件由地方旗民官累具案情送刑部審擬應質人犯多屬牽連及刑部提解駁查道路往返擔延時日不無滋累至是奉諭令就近旗民官會同承審定擬止將罪犯解部覆訊定案其餘一切牽連對質之人于審明之日即行省釋互見刑制門四年以天旱命法司將杖徒以下等罪查明請㫖減等釋放又命朝審秋審緩決五次情罪稍輕者比照兇盜免死減等例發邊逺烟瘴充軍定奉天獄囚及解審人犯一體矜恤刑部議准奉天府屬獄囚綿衣煤炭藥餌棺木等項從前未經額設應於賍罰各項銀内給發其解審人犯均照逓解例一體給發口糧五年以天旱命酌減輕重各犯又停止秋決又飭各省清釐監獄奉諭各省監獄毎有一案人犯證佐未齊以致經時累月囚繫不釋者或有事涉牽連有司不分輕重概與正犯同繫囹圄者屋既湫隘人復衆多濁氣薰蒸疾病𫝊染因此致斃者不一而足著各督撫嚴飭所屬逐一清釐有牽涉多人者速為開豁並將牢獄不時掃除以免疫癘𫝊染倘有奉行不力者即行查叅六年命朝審秋審照例辦理其情實人犯停止勾決七年以天旱命刑部省釋輕罪直隸山東江南照例行并諭各直省遇有災𤯝之年該督撫將清理刑獄之處奏聞請㫖又命江蘇安徽秋審減等時以上下兩江被水特諭兩省秋審人犯中或情有可矜及多年緩決者皆減等完結以示因災恤刑之意又命照乾隆四年例酌減緩決罪囚並諭情實未勾人犯内有情罪稍輕者亦著分别具奏八年減釋徒罪以下並加恤重囚奉諭今嵗天氣炎熱甚于往年省刑之典允宜舉行著刑部于在京徒杖以下輕罪查明減釋其重犯雖法無可寛際此炎天著添蓋席棚給與氷湯藥餌無致病暍又以山東河南禱雨命照例省刑又停止秋決又定孀婦獨子聲請留養之例凡孀婦獨子有犯戲殺誤殺等案如伊母守節已逾二十年者該督撫查明被殺之人並非孤子取結聲明具題法司核請留養其鬭毆殺人者審無謀故别情該犯之母守節二十年而又年逾五十者亦准其照例聲明法司夾簽入本恭候欽定至軍流徒罪果係合例聲明報部照例分别減等發落互見刑制門又上恭謁永陵福陵昭陵禮成赦奉天等處人犯奉天府寧古塔黒龍江等處罪犯除十惡外其餘死罪減等軍流以下俱寛釋九年以天旱炎熱省刑恤囚如八年例又停止秋決時以甲子再週國家承平百年本年朝審秋審情實人犯停其勾決十年以雨澤愆期命減釋徒杖以下罪犯十一年詔赦天下奉諭朕臨御以來愛育黎庶惟日孳孳於兹十年矣惟念各省獲罪之犯其中輕重亦有差别國家赦宥之典或因行慶施惠或因水旱為憂間一舉行今朕哀矜庶獄不忍令其淹滯圜扉所有刑部及各省監禁人犯除情罪重大外餘著分别減等發落軍流徒杖以下人犯一併分晰減等完結俾同沾肆赦之恩勉圖自新以副朕協中欽恤至意又命軍流人犯到配已過十年者分别奏請省釋回籍又命各省羈禁人犯經督撫審題部駁未結及各省未經審題案犯事在恩㫖以前者俱酌分别減免請㫖又上巡幸五臺命寛減直隸山西二省軍流以下罪犯停止秋決十二年以天旱命減免緩決五次及徒罪以下人犯十三年上巡幸山東命寛減直隸山東兩省緩決五次及軍流以下罪犯又停止秋決十四年以平定金川詔赦軍中獲罪枷號人員十五年寛恤聲請留養未邀減免之犯諭國家定有獨子留養之例凡屬情輕俱已邀免惟是愚民無知輕身鬬狠不知留養為格外之仁或轉恃此為倖免之路以致罹于法網因於案情稍重或理曲尋釁金刃重傷雖經督撫聲請仍以原罪定擬不准留養固屬該犯罪所應得但聲請之案不過尋常鬬毆等類㫁不至入于情實徒使淹禁囹圄不得侍養而窮老孤孀無所倚賴深可軫惻朕思此等罪犯本非有謀故重情為常赦所不原既經定擬拘繫逾時已足馴其桀驁之氣應量為末減俾得自新上年秋審經九卿定議矜減者止有二起餘仍監候著該部查明各犯祖父母父母現存果無次丁侍養俱以可矜減等請㫖發落嗣後獨子犯罪未邀寛減者該督撫于秋審朝審冊内聲明九卿覆核時照此辦理以昭軫恤無告之意至十九年三月并諭十五年以前此等親老丁單之犯間有原題内未經聲叙者亦著各督撫查明准其一體入于另冊量予末減又以天旱減釋徒罪以下人犯又以冊立皇后恭上皇太后徽號禮成詔赦天下本年内外秋審情實人犯俱停處決其緩決五次以上者量予減等婦人犯罪除十惡外餘俱赦免又上巡幸河南命寛減該省軍流以下罪犯十六年酌減緩決三次以上人犯又停止秋決十七年命展熱審減等限期向例熱審減等以立秋日為止立秋在六月内者以七月朔日為止至是上以天氣炎熱著展至處暑日為止越旬日雨澤尚未霑足復諭刑部仍行減等俟雨足後照舊辦理十八年以天旱減釋徒罪以下人犯又命酌減緩決三以上人犯并諭各犯有情罪本重歴年查辦未經寛減而定案在康熙雍正年間緩決十餘次至數十次内有一綫可原者亦著查明分别請㫖互見詳讞門十九年矜恤尋常鬬毆未經聲請留養之犯奉諭從前各省鬭毆情罪稍重之案經部定議不准留養後因此等人犯秋審時原不至入情實乾隆十五年特頒諭㫖令各該督撫秋審時另冊辦理但十五年以前此等親老丁單之犯間有原題内未經聲叙者遂不得一例邀恩情亦可憫著各該督撫將從前未附聲明確有成招原案可憑者准其一體入冊量予末減以示欽恤又上恭謁三陵禮成赦奉天等處人犯又停止秋決二十年以平定伊犂詔赦天下除謀殺故殺外如原無仇隙偶因一時忿激相毆傷重致死者將兇犯免死決杖一百照例追銀給死者家屬軍流以下槩予減等二十一年上東巡命寛減山東現在軍流以下罪犯二十二年上南巡命寛減江蘇安徽浙江等處軍流以下罪犯二十三年以天旱減釋徒罪以下人犯又以天旱酌緩尋常處決案犯二十四年以天旱減釋徒罪以下人犯又以平定回部詔赦天下流徒人犯在配身故妻子准回原籍現在軍流以下人犯槩行減等發落二十五年酌停秋審解勘女犯凡斬絞監候婦女業經解勘一次情罪顯然無可改擬者下次即停其解審其外省定擬可矜具題經九卿㑹核緩決者次年秋審核其無異亦即停其解審以昭矜恤二十六年恭逢皇太后萬夀聖節詔赦天下先是七月以今嵗恭逢皇太后七旬萬夀舉行慶典特諭刑部將朝審秋審各犯緩決至三次以上者核其情罪分别減等至是恩准部議減免死罪以下五千一百八十餘人又停止秋決二十七年上南巡命寛減江蘇安徽浙江三省軍流以下人犯八月分别寛減可矜人犯命刑部會同九卿于可矜人犯内有情切天倫一時義忿所激與尋常鬭狠不同者量為區别照免死減等例再減一等發落互見詳讞門二十九年命緦麻服屬人犯照期功以上例于停勾二次後著大學士會同該部一體省核改入緩決互見詳讞門又勅部詳定論功免死例綠營官兵一體矜恤詳見刑制門三十年上南巡命寛減江蘇安徽浙江三省軍流以下人犯又命刑部將朝審秋審各犯緩決至三次以上者分别情罪減等發落恩准部議減免死罪以下六千二十五人并寛減緩决十次以上者三百三十三人三十二年上巡幸天津命寛減直隸軍流以下人犯三十四年命刑部將朝審秋審曾經三次緩決者核其案情分别請㫖減等詳見詳讞門三十五年上巡幸天津命寛減直隸省軍流以下人犯又以京師雨澤愆期命刑部寛減軍流以下人犯及因事牽涉拘繫者速予省釋三十六年上巡幸山東命寛減山東省軍流以下人犯悉予減等發落又以雨澤愆期命清釐庶獄又恭逢皇太后八旬萬夀聖節詔赦天下先是五月以雨澤愆期奉命寛減軍流罪犯並諭秋審冊犯内有經三次緩決者其情罪俱尚可原今嵗恭逢萬夀慶典此等人犯亦當在恩詔寛減之例又何必令其久繫囹圄著刑部查明分别減等具奏以清庶獄而召和甘三十七年勅查逓年未勾情實人犯改入緩決諭朝審情實人犯内有屢次未經予勾者所積漸多著刑部將已閲五年之官犯常犯查明具奏下次即改入緩決冊内三十八年上巡幸天津命寛減直隸省軍流以下罪犯三十九年以近畿微旱命刑部寛減軍流以下等罪勅直隸總督周元理一體遵行又命酌減緩決人犯時以雨澤愆期諭刑部將自乾隆三十六年以來至本年秋讞時應入緩決三次以上罪犯並緩決一二次者查明奏聞分别減等以昭欽恤互見詳讞門又命查秋審朝審未勾人犯改入緩決諭嗣後秋審朝審情實人犯有經十次未勾者著刑部查明于下次改入緩決但不得擅改可矜著為令又以朝審情實官犯舊案餘存者太多復命查明有經五次未勾者即改入緩決四十一年以兩金川全境蕩平上巡幸山東告功闕里命寛減直隸山東軍流以下人犯又恭上皇太后徽號冊寶詔赦天下又命寛減緩決人犯自三十九年查辦之後秋讞擬入緩決者積有六千餘名刑部遵㫖分别奏請減等發落四十二年以雨澤愆期命清釐滯獄又孝聖憲皇后升祔禮成詔赦天下直省軍流以下人犯分别減等四十三年命省釋在配軍流人犯上以直省軍流人犯自乾隆十一年省釋之後歴時已久到配漸多諭各省督撫查明已過十年者咨部照前例核議省釋其在配自能謀生不願回籍者聴又以河南旱禱雨命寛減開封彰徳衞輝懷慶河南五府屬軍流以下人犯尋又奉諭通省一體酌減並清理庶獄以召和甘又以京畿雨未霑足命刑部寛減罪囚又上恭謁祖陵禮成赦奉天等處人犯四十四年命刑部寛減緩決人犯其官犯另列清單恭候諭㫖著為令四十五年皇上七旬萬夀正月詔赦天下又上南巡命寛減江蘇安徽浙江三省恩詔後軍流以下人犯又停止秋決四十七年秋審朝審三次緩決人犯八千五百餘名命刑部分别減等發落四十八年京畿雨澤愆期命清釐庶獄又上躬詣盛京恭謁祖陵禮成赦奉天等處人犯如前例四十九年上巡幸江浙命寛減軍流罪犯照歴次南巡之例四月以山東直隸旱並諭二省軍流人犯一體加恩各予減等又命酌減秋讞緩決人犯六千三百七十二名五十年皇上以紀元五十覃慶元正詔赦天下又省釋監禁緩決人犯在七十以上者諭本年舉行千叟宴盛典官民耆老咸被恩施軍流人犯亦概予減等其監禁緩決人犯年在七十以上者著加恩分别減免釋放又免柘城縣民王金等聚衆抗差案内為從人犯六十七名死罪發往伊犁黑龍江等處為奴皇朝文獻通考卷二百十
