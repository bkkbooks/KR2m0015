body:
  text: 選舉考七孝廉方正臣等謹按馬端臨選舉考於舉士一門首列科目凡明經進士諸科備焉次賢良方正則漢以後凡天子特詔曰制舉又曰制科是也次孝廉則所稱興廉舉孝是也西京以前賢良文學令其對策而孝廉無策試者賢良以言揚而孝廉以行舉設科之初意有分重自不得并為一途聖代教澤涵濡里俗龎厚加以風勵多方自雍正元年至乾隆元年曠典以時秩舉寰宇内外蒸蒸式化竊惟孝廉方正一科採古賢良方正之號合之孝廉所期於應此舉者甚厚爰専録之而以力田諸科附焉至博學鴻詞各科係奉特㫖舉行與常行科目不同應入制科但皆屬以文藝奉試膺選今已於舉士條依次編載不復另立専門順治十五年吏部議覆憲臣魏裔介條奏舉用孝子授官從未有例但孝行闗係風紀若有司呈報果有真正孝子許撫按具題禮部覆核勅臣部考試選授縣正佐貳等官如有冐濫揑報原舉官㕘處從之康熙六十一年命八旗詳察孝行素著者以聞雍正元年詔舉孝廉方正先是康熙六十一年詔各直省毎府州縣衛各舉孝廉方正暫賜以六品頂帶榮身以備召用至是奉諭㫖國家敦勵風俗首重賢良前所頒恩詔内有舉孝廉方正一條距今數月未有疏聞豈通都大邑之中海澨山陬之逺遂無潜修砥操克稱俊乂可應詔㫖者與誠恐有司怠於採訪雖有端方之品無由上達殊負朕殷殷延攬之至意著各省督撫速遵前詔確訪舉奏二年引見浙江直𨽻福建廣西孝廉方正各二員俱以知縣用五十五嵗以上者以知州用又奉諭㫖朕惟四民以士為首農次之工商其下也漢有孝弟力田之科而市井子孫不得仕宦重農抑末之意庶為近古今士子讀書砥行學成世用國家榮以爵禄而農民勤勞作苦手胼足胝以供租税養父母育妻子其敦龎淳樸之行雖寵榮非其所慕而奬賞要當有加其令州縣有司擇老農之勤勞儉樸身無過舉者嵗舉一人給以八品頂帶榮身以示鼓勵三年諭果郡王允禮順承郡王錫保八旗漢軍内有平居孝友守分讀書之人考試既不獲中式而又不能别就者爾二人查明分别挑選其上三旗包衣旗鼓佐領下人令内務府總管保奏王等包衣旗鼓佐領下人令各該王保舉五年奉諭㫖朕即位以來加意旁求如現任官員及候補候選科目諸人每特令薦舉遴選引見廣開録用之途冀收羣策之力又念各省學校原以養育人材令學臣保舉賢能以備任使乃直省學臣所舉人數不多又或草率塞責不能副得人之實夫十室之邑必有忠信古者取人之法惟鄉舉里選合於三代之制今直省府州縣學貢生生員多者數百人少亦不下百餘人其中豈無行誼醇篤好修自愛明達之士乎著州縣官㑹同該學教官將貢生生員内居家孝友行止端方才可辦事而文亦可觀者秉公確查一學各舉一人於今年冬底申報該上司奏聞請㫖朕因廣攬人材舉此曠典所以黜浮華而資實用州縣教職為一方師長選賢薦能乃其専責倘敢虛應故事濫舉非人照溺職例革職或狥情受賄則當重治其罪八旗之滿洲蒙古亦照此例將人品端方通曉漢文者著該佐領各舉一人庶使潜修篤行之士得以表見而國家亦收得人之效矣尋經吏部帶領各省學政薦舉生員引見以知縣用者三員餘以國子監助教學正學録補用七年奉諭㫖朕廣收人材以資吏治每年保舉引見覺豫省之人較少大約豫省士風器量謹厚有餘而才具明通不足今欲加以策勵以備國家之用著田文鏡通行所屬選其材猷可供任使者不拘人數資格秉公舉出該督再加遴選奏聞送部引見又念中州之民務本力田勤於耕作著該督於常例嵗舉老農外令所屬各舉一人給以八品頂帶以示優奬乾隆元年吏部議准凡府州縣衛保舉孝廉方正悉由地方紳矜耆庶隣佑里黨合詞具呈該州縣採訪公評詳稽事實所舉或係生員㑹同該學教官查核造具清冊加具印甘各結申詳該督撫核實保題照恩詔内開事例給以六品頂帶榮身如其中果有徳行才識兼優堪備任用者准破格保薦倘所舉不實除本人斥革追究外其濫行出結各官照濫舉匪人例分别議處五十年諭福建巡撫雅徳奏侯官縣職貢生許王臣自曽祖許友承至伊孫曽同居七世丁衍百餘洵為盛世庥徴請㫖旌表許王臣家庭順聚雍穆可風宜推旌淑之恩益廣型仁之化兹特親製詩章御書匾額以賜仍賞給縀疋建坊旌表武舉臣等謹按周禮賓興三曰六藝而較射之典古人尤重之容比於禮節比於樂藉以觀徳後世武選即以是超家又兼試以内塲策論必習韜鈐知書數者乃膺其選其於藝事畧備固亦舉士之一端我世宗憲皇帝於雍正五年御瀛臺紫光閣閲視武舉外場復命親軍䕶軍等步射時八旗人士能開數石弓以技勇稱最者總萃林立各直省中式者見其挽强執鋭驚為神勇此皆漢六郡良家羽林期門之選及唐時翹闗負重之倫特以技勇為滿洲所素具飫聞而習見未曽設科目之名是以無從紀述我朝舉士文武並重命學政取士膠庠每鄉試屆期則巡撫大臣校閲外場然後扃闈試之拔其尤者分列禁門入侍宿衛可謂榮矣大要武舉一途西北諸省擅長而東南閩廣邉地次之凡出膺節鉞任提鎮者不乏人國家培養訓習之效亦於此徵盛云順治元年定武舉㑹試於辰戌丑未年各直省武鄉試於子午夘酉年凡京衛武學官生遇子午夘酉鄉試年准一體赴試二年准於十月舉行各直省武闈鄉試定直省武舉名數俱照舊額又定各直省武生鄉試例京衛武生在兵部鄉試直𨽻各府在保定府鄉試各省在本省布政司鄉試大同府在大同府鄉試西延漢鳳及榆林鎮在西安府鄉試平慶臨鞏暨兩河等處在甘肅鄉試十六年大同府武生歸山西省合試京衛及直𨽻各府奉天府武生俱歸順天府鄉試三年定武㑹試事宜内三院官二員為主考官科臣二員部臣二員為同考官御史二員為監試官其受卷彌封謄録對讀闗防及巡視等官俱於兵部各司官内差委初九日試騎射十二日試步射十五日試策論是時外省以巡按為監臨官後歸巡撫㑹同布按各官監射同知以下知縣以上正途出身者四員為閲卷官康熙八年以學政為閲卷官旋罷之仍以本省總兵官一員㑹同巡撫監射又定武進士衣頂第一甲一名武進士照題定例賞甲胄撒袋刀弓矢鞾帶等物諸武進士衣頂照文進士一體穿帶並給折鈔銀十兩又定武進士出身授官例一甲一名授㕘將二名授逰擊三名授都司二甲授守備三甲授署守備著為令八年併合畿南畿北兩武闈於真定府兵部奏言直𨽻巡按既已歸併一差則畿南畿北兩武闈亦應歸併一闈查真定府為畿南畿北適中之地且場屋寛敞便於考試請嗣後武闈於真定舉行從之又歸併上下江武闈鄉試兵部奏言江南改直為省其武闈不應分上下江應照各省事例統於省城鄉試從之十二年兵部奉諭㫖國家選舉人才共襄治理文武允宜並重今科中式武舉一百二十名應照文進士一體殿試朕親行閲視先視馬步箭後視策文永著為例屆期讀卷官用大學士學士及吏户禮刑工五部都察院通政司大理寺堂官各一員提調官用兵部尚書侍郎二員監試受卷彌封掌卷巡綽寫榜各官及光禄寺備宴俱與文同武舉人各於天安門就試試畢以卷送午門外東直房讀卷官公閲進呈俟御批一甲三名畢各赴内院公同填榜從之又兵部奉諭㫖國家用人文武並重今科武進士俱照文進士殿試大典一體舉行朕思文進士有考選庶吉士作養教習之例武進士亦應簡選教習隨侍衛學習騎射定武進士授官品級兵部奉諭㫖今科武進士經朕親試選取于國柱等二十三名武藝可觀且係本朝初行殿試宜加優異第一名著授副將品級第二名著授㕘將品級第三名著授逰擊品級第四名以至二十三名俱照例授以應得品級伊等在京習學騎射贍養需資俱著先行照品級給俸禄頂帶俟滿一年爾部題請選授十五年准部議武進士殿試讀卷𫝊臚俱照文場例十六年都察院左副都御史袁懋功奏言用人之途文武並重直𨽻文場合八府之士於順天府而彚試之乃武場在内者兵部主之在外者巡撫主之一事兩分與文場殊異請於八府武生鄉舉之年令各道臣試其弓馬策論合式者冊送按臣按臣彚送兵部合試於京師其試録亦如文場進呈御覽以重大典上是其言下所司詳議尋議直𨽻八府武生與京衛武生總屬畿輔人才允宜歸併合試其中額應酌量共取二百名京衛一百名外州縣衛所一百名用翰林官二員為主考小京職四員為同考官順天府堂官為提調御史二員為監試其頭場二場監射馬步箭考騐技勇仍照舊例臣部滿漢右侍郎考試報可又奉諭㫖今年文闈已再行㑹試至將材為詰戎飭備所需亦宜預儲以備任使著於明年令天下武舉再行㑹試十七年奉諭㫖武科取士拔其韜畧諳通弓馬嫻熟者以備將才至於開弓舞刀掇石俱屬虛文無益以後俱不必試是年兵部再舉㑹試命内大臣及大學士監射永著為例兵部又以第二場步箭合式者不及取中之額請酌減得㫖取一百名又兵部奉諭㫖武闈取士原以遴拔將才以資實用向來考試馬步箭沿習舊例用髙大之的較射以致軟弓小箭易於倖中其用滿式弓矢者反不得合式殊非收羅材勇之意以後鄉㑹考試馬箭用滿洲例射帽步箭亦照滿洲例射尋常小的爾部即通行𫝊諭遵行至四月上親試㑹試中式武舉馬步射於南苑十八年兵部議准吏科給事中何澄條奏武闈考試之法請照舊例以馬步射箭數詳註卷面以便閲卷分别名次不得専憑策論得㫖武闈著先試策論後試馬步箭又兵部奏請殿試天下武舉得㫖武闈已考過步箭及策論又經内試選定著停止殿試康熙三年兵部議覆禮科給事中廖丹疏言邉省投誠官員應於各省分用其武進士候推選者甚多請暫停武闈㑹試查㑹試大典不便停止應於本科武進士減去一百名中額止取百名從之又停止京衛武生武童部試歸併順天學政考試五年舉行雲南省武鄉試照文闈額數取中二十七名又舉行貴州省武鄉試照文闈額數取中二十名六年河南道御史朱裴疏言國家開科取士文武相等查順治十五年以後厯科武舉武進士未經選用者甚多因部科効力及提督劄委之人混淆雜進躐等先用而科目反不得與較遲速非制科取士之本意也請將外委効力等項與武進士武舉等較人數多寡倣二八分缺之例使科目人員量行先選其外委各弁雖有戰功及捕盗績不可止憑該衙門一概咨送選補下部議行八年六月定四川省武鄉試中額照文場例取中四十二名二十二年兵部遵㫖議准衞官缺出向以掌房貼案人等補授今應停止於漢軍漢人世職並武進士内選擇輪用二十七年定武進士挨次選補營衛守備舊例武進士推選守備分别名次在前半者候選營缺在後半者候選衛缺至是以營缺多而衛缺少嗣後不拘營缺衛缺將武進士挨次補用二十八年兵部議准御史錢三錫請定武闈條例以馬箭中三步箭中二者為合式奉㫖馬箭弓刀等項俱已合式惟因步箭中不及兩箭不准合式似屬屈抑著再議尋議步箭雖未中式其射法精善者亦准考取至比箭時應令内大臣都統内閣大臣與臣部公同監試庶善射者不致遺漏得㫖嗣後武鄉㑹考試馬箭以中四箭為合式步箭以中一箭為合式又發各省候選武舉分屬督撫提鎮標下効用如果騎射嫻熟即以千把總題補三十二年奉諭㫖武鄉㑹試舊例射的以八十步為則太逺善射者不能多中人材或致遺棄嗣後改為五十步以中二箭為合式又停本年粤西武鄉試以巡撫王起元奏粤西武生甚少故也三十三年奉諭㫖朕閲今年武闈試録江浙人中式者多山西河南兩省各中一人如此恐致遺失人材武進士之文不過熟記成語抄寫舊套而已論文取中必致不均而人材亦多遺失必以馬步箭俱優人材出衆者為佳耳又奉諭㫖天下武舉㑹試者或其人材可用騎射亦優而以不合式之故遺而不録者有之朕意殊為憫惜令兵部宣示有願効力與再試者具呈候該部請㫖再行考試遴選交火器營令其服習戎事於㑹試時照常考校既悉知其人亦便於拔取有超羣者即與録用三十六年復試下第武舉上御瀛臺紫光閣閲武舉騎射上發五矢皆中諭曰今科落卷内安知無騎射俱佳而被遺者乎如其回籍則已若有留此者令兵部察明復試四十年開粤西武科鄉試從廣西巡撫彭鵬請也四十一年兵部議准武闈考試立空白印冊二本第一場馬箭合式武生於面上用印時即令本生親註姓名籍貫年貌於印冊第二場合式者亦如之至第三場策論取中即將印冊字跡磨對以杜冒替之弊四十八年奉諭㫖考試武舉當擴其典以備録用即今在内部院司官筆帖式兼武職而厯陞堂官者不少在外總督總兵由行伍出身者甚多何地無才現今八旗監生為䕶軍驍騎者俱有入文場考試之例直𨽻各省緑旗營兵千把總及年滿千總不但人才壯健善馬步箭其中有通文藝願入場就試者可分别令就武鄉㑹試即於其充伍為弁之地就近鄉試不必令回原籍如此則緑旗官兵内有才力者俱得入彀而武舉進士内亦得實有才力之人矣尋議直𨽻各省緑旗營兵有通文藝願應武鄉試者於充伍地方該營將弁申送巡撫一體鄉試於原額内取中不中仍令歸伍又各營千把總及年滿千總門衛所千總有願應武㑹試者該督撫提鎮給咨赴部一體㑹試於原額取中不中仍歸原職兵丁千把總鄉㑹中式後願歸職伍者聼又奉諭㫖漢軍人等一體考試武舉武進士尋議定八旗漢軍内務府無品筆帖式庫使由官學生補授之外郎閑散人等有願考武生者該旗移送順天府考取八十名鄉試時所取武生并中書及部院衙門筆帖式廕生監生及監生之披甲䕶軍領催執事人員願應武鄉試者亦移送鄉試取中四十名如不中仍令當差㑹試取中八名照文場編合字號四十九年兵部議覆陜西肅州總兵路振聲疏請増陜西武舉額數應不准行上諭大學士等曰陜西人材壯健者甚多又令兵丁一體鄉試武舉額數若少則有才者不免遺漏以致壅滯著將武舉中額照原數増二十名又太原總兵馬見伯疏言武經七書註解互異請選定一部頒行經部議駮上諭大學士等曰武經七書朕俱閲過其書甚雜未必皆合於正所言火攻水戰皆是虚文若依其言行之斷無勝理且有符呪占騐風雲等説適足啟小人邪心昔平三逆取臺灣定䝉古朕料理軍務甚多亦曽親身征討深知用兵之道七書之言豈可全用孟子云仁者無敵又云天時不如地利地利不如人和今日若欲另纂一書此時又非修武書之時李光地奏曰令習武者讀左𫝊即佳上曰左傳浮誇昔人曽議之孟子有言可使制挺以撻秦楚之堅甲利兵矣若知此意而用兵方是總之仁者無敵此是王道與其用權謀詐偽無稽之言不若行王道則不戰而敵兵自敗矣王道二字即是極妙兵法從古窮兵黷武皆非美事善戰者皆時至事迫不得已而後用兵也昔吳三桂反時江南徽州所屬叛去一縣將軍額楚往征之有人獻策於賊云滿洲不能步戰若令人誘至稻田中即可勝之矣豈知滿洲兵强勇爭先未及稻田已將誘者盡殺之此獻策之人亦為我兵所殺用武經七書之人皆是此類今於武經七書内作何分别出題及論語孟子一併出題之處著九卿定議具奏尋議武經七書惟孫子吳子及司馬法議論近正嗣後考試武生武童論二篇一題出論語孟子一題出孫子吳子及司馬法舊例鄉㑹試論一篇策二篇今改出論題二策題一從之五十二年上御暢春院内西厰閲試武舉騎射技勇選宋如栢等十五人再試以騎步射令善射侍衛等射畢上親射二次每發皆中大學士等奉諭㫖近見直𨽻各省考取武進士額數或一省偏多或一省偏少皆因不知其弓馬武藝止憑文章取中以致騎射嫻熟諳習韜畧之人多有遺漏嗣後考取武進士不必拘定額數俟天下㑹試武舉齊集京師令該部將各省赴試到部武舉照例考試弓馬將合式武舉等實數查明預行奏聞朕計省之大小人之多寡照考取文進士例按省酌定取中額數則學習武藝弓馬優長者不致遺漏矣五十六年定武鄉試日期自十月初九日至十三日試騎射技勇十四日入闈從府尹俞化鵬請也五十九年兵部奏定將在部効力之武生及官員子弟停其取用専取武舉其武進士内有情願効力者亦准收録宗人府鑾儀衛兵科俱照兵部一體取用効力三年後考試武進士一等者以營守備推用二等者以衛守備推用武舉一等者亦以營守備推用二等者以守禦所千總推用雍正元年定滿洲武鄉㑹試中額八旗滿洲等照漢軍例考取武舉二十名武進士四名編滿字號至十二年停止又命賞㑹試中式武舉銀兩為整理衣服賃取馬匹之用又兵部奉上諭今科中式武進士係元年所取狀元授為一等侍衛榜眼探花授為二等侍衛二甲十三名授為三等侍衛令戴孔雀翎三甲記名三十六人俱授藍翎餘照例揀選補用二年奉諭㫖陜西地屬雍凉人材壯健强勇者多騎射嫻熟勝於他省每科鄉試取中不過三十名而入學額數亦與他省不相上下額少人多不無屈抑自雍正四年鄉試為始西安甘肅武舉各加中十名其武童入學額數若通省俱加恐有冒濫照文童改學例令督撫㑹同學臣查明技勇最優之州縣酌量奏請加額又立武闈好字號取中外場兵部議覆吏部侍郎史貽直條奏武闈直省鄉試請照㑹試例擇其弓馬嫻熟技勇出羣者另立好字號以便取拔應如所請得㫖考試武舉議定編好字號在京武鄉試朕派信用大臣考試嗣後各省武鄉試或以好字號取中或以文章好取中之處著於解部武鄉試録内註明以便㑹試時查對至雍正四年定鄉㑹試外場弓馬技勇好者另編好字且分别雙單好字移送内簾先於好字號卷内選取如不足數乃選取餘卷又兵部遵㫖議准每科武進士前半以營守備用後半以衛守備用今衛守備之缺既經裁減嗣後將衛守備用之武進士内再分十五名以營守備用於雙月營守備各班之末另立一班推補守禦所千總裁減之外存缺無幾舊例糧船回空隨帮千總以衛千總推用此等人員總漕稱為明季世職子孫今既非世職應停其頂補將揀選之武舉候推守禦所千總人員内頂補推用又定補授管門千總人員京師外城七門内九門每門額設千總二員嗣後千總缺出停止補授漢人將滿洲漢軍武舉並漢軍捐千總者補授又賞給㑹試下第武舉回籍路費如文㑹試例五年定武進士授官例一甲進士照元年例補授侍衛二甲挑選十名授三等侍衛三甲挑選十名授藍翎侍衛俱俟補授營缺時照侍衛品級兼銜其三甲武進士候選守備者兵部奏請欽㸃大臣㑹同兵部揀選一等二等者以營守備註册三等者以衛守備註冊得缺之日俱兼以署守備管事如有弓馬生疎者令其回籍學習俟騎射可觀再行赴部考騐又勅浙江武舉照舊㑹試時停止浙江文㑹試兵部奏浙江武舉㑹試應一併停止得㫖士習澆漓不干武途况浙省文有餘而武不足武科著照舊㑹試又八旗都統奉諭㫖厯來滿洲技勇罕與比倫前令八旗查得親軍䕶軍内能開硬弓者現有一萬八千餘人昨在瀛臺令八旗人等校射衆武舉等咸驚異以為從來罕覩朕心深為喜悦著分别賞給銀兩伊等藝勇超羣是其盡心學習所致嗣後務更加勉勵不可以弓力相爭尚將此通諭八旗知之又兵部奉諭㫖前科武進士大半皆授為侍衛餘亦依次俱得選用今科進士朕恐其多選侍衛反不能盡心學習所以揀選侍衛者甚少但伊等未得一時録用置之閑散殊為可惜今特廣為加恩將未選侍衛之滿洲䝉古進士授為藍翎交與領侍衛内大臣効力行走漢軍進士交與該旗以驍騎校補用其餘漢進士有人材可用者分發各省賞食千總俸令督撫提鎮試看如果材力壯勇効力勤謹者以守備題補七年奉諭㫖向例武舉在本省學習之後遇有千把總缺出未免鑚營倖進且該管官之秉公拔補與否亦無從考騐嗣後將隨標差操學習之武舉等令該撫等看其材技優嫻曉習營伍者照年滿千總例送部考騐分發别省遇有千把缺出即行補授則人材既可造就而拔補亦得公平將此永著為例又兵部遵㫖議定滿洲武舉補授内九門千總者遇㑹試之年仍准入場考試平時令步軍統領考騐限以三年材技優長者補授巡捕營守備中平者補授本佐領下䕶軍校并本旗驍騎校等缺平常者留門當差學習有成再行保送至滿洲武進士除選授侍衛外其餘仍以京營守備與驍騎校䕶軍校等缺補授又兵部奉諭㫖各省每科武鄉試例用巡撫為主考官朕思各省巡撫多有未曽習學騎射技勇者何以定優劣從今科為始各省著就近省城之提督總兵一員同考外場秉公拔取若駐劄路逺或因公他出則令派委副將一員代之九年大學士等奉諭㫖各省督撫著於所屬地方召募揀選人材壯健技勇可觀者百餘人咨送兵部奏聞候朕㨂派官員訓練教習以備軍旅之用武生童生及鄉勇民壯等俱可入選每人本籍額外給與守糧一分以養贍其家口本人進京之時著督撫動支公用銀兩賞給路費十年奉諭㫖向因落第武舉其中不無才力可用之人是以令本省督撫提鎮秉公考騐將年力精壯弓馬可觀者留營給與額外馬糧一分令其差操學習俾得熟練營伍以備將來將弁之用原令該管大臣慎重遴選使人材有所造就也今聞外省庸劣無能之人頗有濫充者著該部通行各省將技勇可用之武舉令其充補經制馬糧其不願留營及騎射生疎材力不及者令其回籍自行學習不得留營虛佔額糧之數又奉諭㫖凡分發各省試用之武進士原令其學習營務必須弓馬優嫻熟諳營伍方可題補近見爾部於武進士題補守備時不計科分之淺深弓馬之優劣概以為合例以致督撫提鎮因一時營員内不得合例之人遽將科分尚淺營伍未諳之武進士題補轉不如用久厯行伍之人於營務有裨益也嗣後武進士題補守備若科分不及應選之期即屬不合例可𫝊諭各省知之又兵部奉諭㫖朕看滿洲武舉等於緑旗營不甚相宜嗣後將如何補用及如何陞轉之處詳議具奏尋議八旗武舉有人材出衆者除特恩選用外其餘俱請交各該處以應得之缺補用但伊等品級不同則陞用亦宜分别嗣後應照漢人例請派大臣騐看分别等次交與該旗於䕶軍驍騎等缺挨次委署試用入於應陞人員内帶領引見補授平常者駮回學習以圖上進内有願在旗當䕶軍前鋒効力之人亦著挑取令其當差行走挨次補用行走三年諳練稱職者入於應陞人員内帶領引見再此等人員係實授者自有應得之俸其委署給與錢糧米石所服頂帶悉照委署之例現任内九門滿千總應請改補以昭畫一嗣後内九門千總缺出請照外七門千總例將漢軍武舉及捐納人員補用從之十一年奉諭㫖武場鄉㑹兩試原期選俊儲材所以人材壯健技勇兼優者外場考試另編好字號並分别雙單令入内場再考試文藝比較取中以杜冒濫倖進諸弊本年武㑹試有頂替進場作弊者當經查出交部治罪又有人材技勇皆屬平常而考試大臣濫列好字號入場取中者現在查㕘黜革議處俾各知儆戒至於各省學臣考試聞有弓馬平庸文理粗通之人混入内場越號換卷𫝊遞代筆賄囑倩代揆厥所由總由府州縣考試時每以廣收博取市寛大之名無論騎射優劣悉行録送遂令技藝不堪漢仗猥𤨏之輩混入内場種種作弊嗣後府州縣官考試武童倘不悉心校閲濫行録送者著該學政題㕘議處其學政校閲外場尤當加意選擇若將平常懦弱之人濫列好字號入場取中亦著督撫查㕘乾隆元年奉諭㫖今科武舉殿試照該部所擬日期舉行朕在三年服制之内其考試弓馬等項著派王大臣在紫光閣閲看將擬在前列者帶至養心殿候朕親定掲曉之日照今年文殿試之例𫝊臚朕不陞殿五年准武進士隨營差操各省兵丁應鄉試者於中式武舉之後仍准食本身馬糧隨營差操若中式武進士除選取侍衛外餘皆離營候選開除名糧奉諭㫖伊等開糧之後衣食匱乏未免拮据且恐離營日久漸疎技藝應酌量變通辦理嗣後兵丁中式武進士之後有情願回營効力者准仍留本身馬糧隨營差操遇有署事之處准一體酌量委署學習八年疏通武舉隨帮効力人員定例漢軍漢人武舉及各省世職隨帮於㑹試之年赴部報名足有百人之數兵部奏請恭候欽㸃大臣㑹同兵部堂官考試馬步箭分别等第其馬步箭俱優者列為一等馬箭尚優步箭平常步箭尚優馬箭平常者列為二等馬步箭俱平常者列為三等均註冊歸入各班内選用衛千總如弓馬生疎者列為四等令其回籍學習下次再行揀選其弓馬甚劣人衰老不堪者列為五等黜退至是奉諭㫖武舉内隨帮効力年滿人員應以衛千總用者其選用之法按其從前揀選等第分班銓選一等人數無多選期尚速其二等者有數十人三等者多至二百餘人每年選用不過三四人甚為壅滯朕思衛千總與營千總雖屬有間但武職人員俱尚技勇亦當及其强壯而用之且此項武舉既係隨帮年滿非閑散武舉可比若遲至二三十年之久方得録用未免精力就衰難為國家宣力所當酌量疏通下部議行二十一年安徽巡撫髙晉奏武闈鄉試頭二兩場合式舉子例於左右兩頰用以印記以杜頂替代倩之弊法誠善也第首場印面之後計至三場㸃名之時將及經旬之久始則一面有印繼則兩頰皆然日則不能盥洗夜則難以就枕旬日之内必致糢糊臣愚以為與其印面不若即以印面之印印記於各舉子左右小臂面臂雖更例實相符從之二十四年御史戈濤奏武闈應試之人必弓刀石三項技勇有一項在頭號二號者方准合式令入内場列於甬道西號房其雙單好字號者列於甬道東號房以絶代倩之弊再武場以武經為重應裁汰四書論題止存武經論及策問題一道下部議行二十五年更定外場事宜外場向例馬箭連射三回共九箭中四者為合式試技勇合式後復射地毬一回又例載逺把以五十步為程髙七尺寛五尺每人各射九箭中二者為合式試技勇後復射近把又應試弓力硬軟向聽自便至是江蘇巡撫陳宏謀奏請馬箭止射二回共六箭再射地毬一回三回共中三箭者為合式其試技勇後再試地毬之例應行停止又逺把酌改三十步每人各射六箭以中二者為合式射把不得隨意損益其試技勇後再試近把之例應併停止至馬弓以三力為率步弓以五力為率其不及者不准合式有能加重者聽下部議行二十七年兵部議覆侍郎王際華奏武科取中原以弓馬技勇為主至内場文藝祗以㕘核去取並非専重是以考試外場定有雙單好及合式字號密印於監箭冊籍之上内場閲文先就雙好中儘數取擇始及單好如中額不敷方及合式字號其實雙單好字號中挑選之數視中額原自有餘其文理平順之卷儘數中式以致合式字號幾成虛設就中文理稍優之人為他人代倩罔利弊竇叢生應如所請竟行裁去合式字號庶可以慎考核而肅場規從之三十三年改定江南武鄉試令總督主考例從兩江總督髙晉請也設立武鄉㑹試内場監試兵部議覆江南道御史覺羅敦岱疏稱武鄉㑹試内場應設立監試専司其事嗣後鄉㑹試臣部咨取滿漢御史職名開列具題恭候欽㸃滿漢各一員令其入場監試其場外墻垣俱照文場之例派弁兵員役晝夜巡查以昭嚴密從之三十六年停現任官員子弟入伍食糧應試兵部議覆兩江總督髙晉疏言現任官員子弟既准其入伍食糧復准其入場應試有佔武舉名額嗣後籍𨽻他省官員隨任子弟概不准其就現任本省應試併不准其入伍食糧有佔該省兵額至籍𨽻本省員弁子弟俱令各歸本縣不准於現在任所地方入伍應試從之又兵部議覆署雲南巡撫諾穆親條奏武闈内場主考等官改用筆色請嗣後武闈鄉㑹試内場閲卷房考官定以紫筆主考官定以赭黄其印卷戳記及一切應用藍色之處俱照文闈之例改用紫色以歸畫一從之又兵部議工部尚書兼步軍統領忠勇公福隆安奏巡捕營馬步兵丁由大宛兩縣之人挑補後情願考試者令其與武童一體應試果能取中再准鄉試其馬兵准鄉試之例永行停止至營員子弟拔補弁兵令改調營汛不屬父兄考核管轄均應如所請從之又順天府尹裘曰修等奏武闈鄉試嚴飭各州縣將應解鄉厨鄉皂雜夫等役造具年貎清冊面用印記填給腰牌再查外場監試御史向例十月十一日外場事竣十三日始行入闈應請嗣後令該御史等於外場完竣後即日先入内闈將應進各項夫役由該御史騐明腰牌印記搜檢放入其中倘有印記糢糊及並無印記者立時查究至㑹試事同一例所有厨皂等役應請照鄉試畫一辦理從之三十八年諭馬步兵均屬行伍馬兵考取武生既准其仍留原糧則步守兵丁原可毋庸歧視至向例武生不准入伍食糧必須註銷武生方准充補不過以武生名列膠庠稍存優異甚屬無謂况武生鄉㑹試中式後其所得官職亦不過緑營弁員則以武生在營學習當差尤屬有益嗣後如武生有情願入伍食糧者准其呈報學政即令兼充毋庸將武生註銷著為令四十年兵部議覆鴻臚寺卿江蘭奏請㑹試武舉於試期前一日酌量各省人數多寡分為四冊繕籖封固於宣㫖後分圍考試再於考試之後將六部滿漢堂官開列奏請欽㸃二三員𫝊集中式武舉按照㑹試原冊弓刀石觔重號數令其逐一演試如有前後參差者即行㕘奏將該武舉照文㑹試磨勘之例罰停殿試仍將原挑之監射大臣交部議處從之又兵部議覆江南道御史李廷欽條奏監射大臣各圍箭冊俱係自行登記毋庸假手官員應請概不准隨帶至隨帶跟役概不得過四名之外其監射大臣及兵部堂官宣㫖後即不准歸私宅亦不准在外圍附近武舉之處居住武闈鄉試亦照此辦理從之又尚書公福隆安奏嗣後每遇武㑹試時監射大臣較准弓力即親畫押外場事畢將原弓存貯兵部俟殿試後再交本處領回如此似覺更為詳慎從之四十五年諭向來武鄉㑹試考試技勇内硬弓一項原以十二力為頭號如果從容滿引可以中式即力量較優亦不過多加二三力足以見長近來士子每多熱中競勝且得失之念太重輒填註十七八力及至較試時類皆勉强從事并竟有不能者殊屬無謂嗣後考試武場硬弓務以滿足入彀為度其註考冊内有能過頭號弓十二力以上者亦不得出十五力著為令四十七年兵部議覆山東道御史楊九思奏武鄉㑹試内場出題之日令監試御史偕同提調等官親入號舍照例挨查倘有坐號不對立即究治至水火夫役於白晝差使完畢即扄閉空房外加封鎖不許擅行出入其圍墻以外嚴飭巡綽員弁多派兵丁晝夜巡邏以肅場規從之臣等謹按中樞政考直省武鄉試中額順天一百五十一名内漢軍四十名奉天三名江南六十三名浙江五十名江西四十四名湖北二十五名湖南二十四名福建五十名山東四十六名山西四十名西安五十名甘肅五十名四川四十名廣東四十名河南四十七名雲南四十二名貴州二十三名廣西三十名皇朝文獻通考卷五十三
