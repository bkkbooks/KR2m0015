body:
  text: 職官考十二準部新疆職官臣等謹按設官分職隨地異宜我皇上徳威逺播蕩平準部撫定回疆天山南北二萬里而遥悉禀廟謨創立經制凡夫建城邑置官守廣屯種諸務皆以次秩舉條理粲如矣其間官司或間有更調員額或頻有増减又皆睿慮周詳酌損益之宜視繁簡之數因時施設未嘗以成例拘也謹據奉㫖裁定現有名額可紀者按其體制序次於左伊犁將軍一人叅贊大臣領隊大臣俱由簡派特㫖印務糧餉司官筆帖式委署筆帖式以上各官隨時酌派三年更代坐卡倫侍衞三年更代管理各營事務委署筆帖式各營滿兵内委署永逺駐防分轄移駐八旗兵協領八人每旗一人佐領四十人每旗五人防禦四十人每旗五人驍騎校四十人每旗五人領催一百六十人委署前鋒校三十二人委署筆帖式二人分轄移駐錫伯兵總管一人副總管一人佐領六人驍騎校六人領催二十四人委署筆帖式二人分轄移駐索倫兵總管一人副總管一人佐領六人驍騎校六人領催二十四人委署筆帖式二人分轄移駐察哈爾兵左右翼總管二人副總管二人佐領十二人驍騎校十二人領催四十八人委署筆帖式二人分轄移駐厄魯特兵總管二人副總管二人佐領十二人驍騎校十二人額外總管一人額外副總管一人額外副章京一人額外佐領九人雲騎尉一人額外驍騎校四人藍翎侍衞三人領催二十四人委署筆帖式二人以上各官俱係永逺駐防専司屯田副將逰擊都司守備千總把總外委以上各官隨時酌委五年更代三品阿竒木伯克一人統理城村諸務四品伊沙噶伯克一人協理城村諸務五品噶匝納齊伯克二人典守糧賦五品商伯克二人徴輸糧賦六品哈子伯克一人職理詞訟六品宻喇布伯克五人管理灌田水利七品都官伯克一人職司驛遞廩給七品明伯克五人係千人頭目督催千戸糧賦七品什呼勒伯克一人職同都官伯克七品羣竒由布伯克一人専教回童經典雅爾叅贊大臣領隊大臣均由簡派特㫖印務章京筆帖式委署筆帖式以上各官俱係隨時酌派三年更代管理糧務官由陜甘總督于同知通判内酌派三年更代坐卡倫侍衞佐領章京防禦驍騎校以上各官隨時酌派三年更代分轄移駐索倫兵營總一人委署叅領三人章京一人驍騎校二人分轄移駐察哈爾兵佐領一人驍騎校二人分轄移駐厄魯特兵佐領一人驍騎校二人以上各官俱係永逺駐防分轄移駐緑營兵副將守備千總把總外委専司屯務逰擊守備千總把總外委以上各官隨時酌委五年更代烏嚕木齊理事大臣㫖簡特任總理糧務道陜甘總督于内地道員内酌派同知一人通判一人倉大使一人巡檢二人提督一人叅將一人逰擊一人都司二人守備四人千總七人把總十四人外委二十一人以上提標分設四營兼司昌吉羅克倫等屯務軍臺筆帖式隨時酌派三年更代専司昌吉羅克倫屯務逰擊守備千總把總外委専司庫爾喀喇鳥蘇屯務逰擊都司把總専司瑪納斯屯務守備千總把總専司晶郭勒屯務都司把總以上各官俱隨時酌派五年更代分理各屯糧務官或通判或縣丞或典史隨時酌派三年更代臣等謹按伊犂雅爾烏嚕木齊為天山北路總滙之區建設將軍統轄各新疆又設理事大臣統理地方屯務悉由特㫖簡派量期輪替侍衞等官聽將軍大臣量地繁簡隨時奏請簡發分管卡倫經理糧務則由陜甘總督酌委道員同知以下等官均照西藏駐防之例三年更代駐防滿洲及䝉古索倫錫伯察哈爾緑旗等官兵有移眷永署其地者備載員額以照經制有隨時派駐員額無定者更代率以五年為準其間官各有司事各有統逺邇相屬大小相維制度犁舉矣其有伊犂分駐各處防守官員本無定額不另編載至回民之移駐伊犂等處屯種者有伯克為之統轄即以回人簡任而區分其品秩于撫馭之中收䇿遣之用所以規為措置者葢亦因地而置其宜也回部新疆職官烏什理事大臣兼轄阿克蘇賽哩木拜城協理大臣俱由簡任特㫖領隊侍衞坐卡倫侍衞印務章京筆帖式軍臺委署筆帖式以上各官俱隨時酌派按年更代管理糧務官于内地通判内酌委按年更代専司屯務副將逰擊都司署守備千總署千總把總外委分轄移駐健鋭營兵翼長前鋒叅領副前鋒叅領委署前鋒叅領前鋒校分轄移駐緑旗兵逰擊都司守備千總把總外委以上各官俱隨時酌派按年更代五品阿竒木伯克一人六品哈子伯克一人七品明伯克三人七品巴濟吉爾伯克一人専司税務阿克蘇理事章京分轄移駐緑旗兵逰擊把總外委以上各官隨時酌派按年更代三品阿竒木伯克一人四品伊沙噶伯克一人五品噶匝納齊伯克一人五品商伯克一人六品哈子伯克一人六品巴濟吉爾伯克一人六品伯克一人専司查臺七品都官伯克三人七品木窪里伯克三人専司地畝質劑諸務七品納克布伯克一人七品茂特色布伯克一人教習回人經典禮拜以祈福佑七品阿爾巴布伯克一人職司派遞鄉城差務七品帕察沙布伯克一人職司夜巡及提牢諸務七品伯克一人管理採銅事務七品什呼勒伯克一人七品宻喇克布伯克一人七品明伯克十四人分理穆素爾六品伯克一人分理阿勒品六品阿竒木伯克一人七品哈子伯克一人分理多蘭六品伯克一人分理諾伊古特四品伯畢一人職同伯克葉爾羌理事大臣㫖簡特任印務主事委署主事于筆帖式内酌委筆帖式以上各官隨時酌派三年更代坐卡倫侍衞聴差侍衞軍臺委署筆帖式以上各官俱隨時酌派三年更代辦理糧餉官于内地同知通判内酌派三年更代領轄移駐八旗兵副都統㫖簡特任侍衞一年更代分轄移駐健鋭營兵前鋒叅領副前鋒叅領委署前鋒叅領前鋒校以上各官隨時酌派四年更代分轄移駐緑旗兵