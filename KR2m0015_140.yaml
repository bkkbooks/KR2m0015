body:
  text: 欽定四庫全書皇朝文獻通考卷一百四十王禮考十六大狩臣等謹按承平之時不忘武事天下所以久安長治也我皇上智勇天錫臨御五十餘年以來秋獮大典嵗嵗舉行誠以順時布令協天道之嚴威柔逺綏來紹祖功之駿肅是以平西域奠金川師惟以整而以暇將皆知守而知攻無不有勇知方膚功立奏者良由臨事之機宜亦縁平時之訓練也臣等備員扈從毎嵗皇上巡幸木蘭躬行較獵自藩服以至兵民罔不震懾天威欽瞻神武仰見聖朝家法懲宴安習勞苦作士氣靖疆隅永成鞏固之業云乾隆六年七月上幸木蘭行圍是嵗二月監察御史叢洞奏皇上念切武備巡幸行圍誠安不忘危之至意第恐侍從以狩獵為樂臣工或以違逺天顔漸生怠安所闗匪細方今紀綱整肅營務罔弛伏祈漸息行圍頤養天和得㫖古者春蒐夏苗秋獮冬狩皆因田獵以講武事我朝武備超越前代當皇祖時屢次出師所向無敵皆因平日訓肄嫻熟是以有勇知方人思敵愾若平時將狩獵之事廢而不講則滿洲兵弁習於宴安騎射漸至生踈矣皇祖每年出口行圍於軍伍最為有益而紀綱整飭政事悉舉原與在京無異至巡行口外按歴蒙古諸藩加之恩意因以寓懐逺之畧所闗甚鉅皇考因兩路出兵現有徵發是以暫停圍獵若在撤兵之後亦必舉行况今昇平日久弓馬漸不如前人情狃於安逸亦不可不加振厲朕之降㫖行圍所以遵循祖制整飭戎兵懐柔屬國非馳騁畋遊之謂至啟行時朕尚欲另降諭㫖加恩賞賚令其從容行走亦不至苦累兵弁朕性躭經史至今手不釋卷遊逸二字時加警省若使逸樂是娛則在禁中縱所欲為罔恤國事何所不至豈必行圍逺出耶朕廣開言路叢洞胸有所見即行陳奏意亦可嘉但識見未廣將此曉諭知之三月工部奏今次大駕進哨行圍經由橋梁道路應飭地方官如式修墊其口外橋梁道路向係各䝉古修墊者令理藩院轉飭遵行得㫖國家武備不可廢弛朕於本年秋月出口行圍原以訓練兵丁仿古獮狩之禮昔我皇祖每嵗舉行所經由道路及一切事宜俱有章程朕今歳踵行悉遵舊制但恐歴年已久地方官員或借端派累隨從之人或冇恣意需索及强買物件不按時價者著總督孫嘉淦不時查㕘毋得容隠七月戊子上奉皇太后啟行降㫖免所過州縣今年額賦十分之三嗣後每年出口行圍蠲免例並同壬辰出古北口八月辛丑入圍塲九月回鑾王公大臣等恭迎如儀臣等謹按木蘭者圍塲之總名也周一千三百餘里南北相距二百餘里東西相距三百餘里周遭設卡倫守之每歳白露後鹿始出聲而鳴效其聲呼之可至謂之哨鹿國語謂之木蘭今即為圍塲之通稱矣凡圍塲之名曰塔里牙圖曰永安莽喀曰巴顔喀喇曰威遜格爾曰温都里花曰額爾滚果曰巴顔布爾哈蘇台曰巴顔溝曰岳樂曰朱勒曰巴顔木墩曰得爾吉曰達顔得爾吉曰必圖舍里曰阿濟格鳩曰多們曰厄勒素西那曰額倫索活圖曰庫爾圖察罕曰西拉得布僧曰厄爾吉圖察罕曰永安拜色欽曰巴顔圖庫馬曰鄂爾吉呼哈達曰永安拜曰英圖曰哈里牙拉曰喀拉馬拉喀曰赤老圖得爾吉色欽曰明安阿巴圖曰得勒格楞歸鄂博曰孟魁色欽曰巴顔托羅海曰布克曰漢特木爾曰庫庫哈達曰愛里色欽曰喀喇楚古素曰克勒曰古爾板西那曰察罕札布曰西那腦海曰噶海圖曰布歸圖曰莫爾根烏里雅素台曰胡魯蘇台曰巴拉圖曰色拉曰扎喀烏里雅素台曰都呼代曰哈達圖扎布曰土門索各圖曰們都阿魯曰坡賴曰莫爾根精竒尼曰古爾板古爾板曰森吉圖曰布都里曰朱爾噶代曰哈朗歸曰和來果爾曰搜吉曰空果勒鄂博曰阿魯布魯克曰巴顔莽喀曰沙爾當曰圖爾根衣扎爾凡六十餘所毎歳車駕大獮或十八九圍多或二十圍盖於講武中寓好生之徳與成湯三面觧網之意同一揆也九月庚寅諭諸王大臣等曰朕行圍回京之後恭讀太宗皇帝實録内載昔太祖時我等聞明日出獵即豫為調鷹蹴毬若不令往泣請隨行今之子弟惟務出外遊行閒居戲樂在昔時無論長㓜争相奮勵皆以行兵出獵為喜爾時僕從甚少人各牧馬鞁鞍析薪自爨如此艱辛尚各為主効力國勢之隆非由此勞瘁而致乎今子弟遇行兵出獵或言妻子有疾或以家事為辭者多矣不思勇往奮發而惟躭戀室家偷安習玩國勢能無衰乎此等流弊有闗於滿洲風氣是以蒙太宗皇帝諄切訓諭朕此次行圍諸王大臣中竟有躭戀室家託故不願隨往者朕已為姑容亦不必明指其人夫行圍出獵既以操演技藝練習勞苦尤足以奮發人之志氣乃滿洲等應行勇往之事若惟事偷安不知愧恥則積習相沿實於國勢之隆替甚有闗係嗣後倘有不知悛改仍蹈前轍者朕斷不輕為寛宥可徧行傳諭諸王大臣及官兵等知之七年三月庚辰諭曰御史叢洞奏稱請停修理熱河一帶行宫以節帑金而昭聖徳等語夫熱河等處行宫為當年皇祖巡幸駐蹕之所雍正年間皇考未經出口行圍是以各處行宫皆置之閒曠然亦未嘗不畧為繕補以免傾圯今朕仰承祖制欲舉臨邊講武之禮舊日所有行宫酌加修葺此亦事理之不得不然者我朝土木之工甚少偶有興作亦皆不煩編户之差徭不動司農之經費斷不至於勞民傷財為盛徳之累但念人主一心於土木上多一分即於政治上減一分此理甚明乃朕時用以省察者修葺不比營造雖難盡廢其工作有可緩者著該管官此時緩之十二年七月更定隨圍䝉古王貝勒貝子公等賞賜之例凡親王郡王賞上用蟒縀一疋大縀二疋彭縀二疋貝勒貝子公賞官用蟒縀一疋大縀一疋官用縀二疋額駙賞官用蟒縀一疋官用縀二疋扎薩克台吉塔布囊等賞官用蟒縀一疋官用縀一疋御製避暑山莊百韻詩勒石於永佑寺御製避暑山莊百韻詩序云我皇祖建此山莊於塞外非為一已之豫遊盖貽萬世之締構也國家承天命撫有中外於古未有之地盡入版圖未服之國皆受封爵而四十八旗諸部落屏蔽塞外恭順有加毎歳入朝錫賚燕享厥有常典但其人有未出痘者以進塞為懼延頸舉踵以望六御之臨覲光欽徳之念有同然也我皇祖俯從其願歳避暑於此鱗集仰流而來者無不滿志以歸且也三代以上無論矣三代以下享國最久者莫如漢唐宋明然四姓皆一再世而變亂生焉是豈天心之怠眷亦人事之偷惰實致之我皇祖有鑒於此故自三逆底定之後即不敢以逸豫為念巡狩之典或一嵗而二三舉行耗財勞衆之論夫豈不慮然而凜天戒鑒前車察民瘼備邊防合内外之心成鞏固之業習勞苦之役懲宴安之懐所全者大則其小者有不必恤矣使誠以逰冶是尚即深居九重厭見百辟恣聲色怠政事誰其禁之而必往來沙塞風塵有所不避飲食或致不時以是為樂固未見其樂也予小子自十二嵗䝉皇祖恩養育宫中侍奉左右扈蹕至此親見皇祖髙年鬚白允宜頤養尚且日理萬㡬暇則校射習網閲馬合圍雖天心之健自强不息亦聖度之恢與時偕行也故繼序以來敬惟昔日時巡之意更值四方寧謐之時實不敢使文恬武嬉以隳聖祖之家法而每駐蹕山莊羮牆之見雲日之瞻惻然有不能自已者敬成百韻畧識皇祖卷阿之遺志并申孫臣孺慕之悃誠云爾十六年十月甲辰申諭各省陸路提鎮於冬月照例行圍諭兵部曰四川提督岳鍾琪奏稱向來直省督撫提鎮均有行圍之例擬於冬三月内農事已畢之時查照往例於成都附郭不近田園之地帶領官兵前往圍獵往返數日親加訓練等語直省營伍操演武藝不過拘泥成法於安營住宿之道馳騁奔走之勞無從肄習於行陣未有實濟惟行圍可使將弁士卒練習勤勞岳鍾琪所奏甚為有益著通行各省陸路提鎮仍照舊例毎歳冬季輪派標兵親身督率實力舉行務使嫻熟嚴整以禆實用但既令出圍若仍復按期操演兵丁未免過累著於行圍之時酌量停止操演日期以示體恤并嚴加約束不得蹂踐田圍佔宿廬舍致滋騷擾並不可日久復致廢弛該部即遵諭行十七年七月上幸木蘭行圍御製行圍四詠塞山萬壑糾獵士五更行蒙古管圍諸王公毎以五更率獵士先往撒圍撒陣常衝黑成行始質明蠶叢度袵席魚麗辨徽旌曽不言勞苦嘉哉奉上情右撒圍兩旗合帳殿設布城為看圍所奉此為始皇太后觀覧兩翼首旗各馳至合則衆騎以次徐進云千騎列雲涯試看止齊勢端稱左右宜彌縫休欲速磬控尚需時勒馬平岡待斐然立就詩右待圍周阹笑繁重善御信何稱豈有車從獸何殊屠命僧詭馳我所戒連中衆多能佗藉無須亟留資嵗嵗仍右合圍地不傷農事情還聨衆歡陳牲蔽芳甸頒獲逮儒冠漢大臣隨圍者頒獲毎及之習武毋忘業暢遊亦戒盤控弦教憇息西日在槍竿右罷圍御製虎神鎗記勒石於岳樂圍塲御製記曰虎神鎗者我皇祖所貽武功良具用以殪猛獸者也國家肇興東土累洽重熙惟是詰戎揚烈之則守而弗失皇祖嵗幸木蘭行圍諸䝉古部落雲集景從予小子雖不敏纘承之志其敢弗蘉故數年以來巡狩塞上一如曩時䝉業藉靈四十九旗及青海喀爾喀之仰流而來者亦較前無異焉若輩皆習射重武使無以示之非所以繼先志也圍中有虎未嘗不親往射之弓矢所不及則未嘗不用此鎗用之未嘗不中壬申秋於岳樂圍場中獵人以有虎告而未之見也一蒙古云虎匿隔谷山洞間彼親見之相去盖三百餘步朕約畧向山洞施鎗意以驚使出耳乃正中虎虎咆哮而出負嵎跳躍者久之復入復施一鎗則復中之遂以斃焉盖向之發無不中乃於谿谷叢薄目所能見之地斯已竒矣而兹岳樂所中則隔谷幽洞並未見耽耽闞如之形於揣度無意間馥焉深入不移時而殪猛獸則竒之最竒其稱為神良有以也夫萬乗之尊詎宜如孟克特庫之流誇一夫之勇哉孟克喀爾沁䝉古人特庫滿洲今為内大臣皆能獨搏猛獸如馮婦者而習武示度必資神器以效竒而愉快則是鎗也與兊戈和弓同為宗社法守不亦宜乎二十年八月上幸木蘭行圍時大兵平定準噶爾綽羅斯台吉噶爾藏多爾濟等入覲賜觀圍二十一年八月上幸木蘭行圍時都爾伯特台吉伯什阿噶什來覲及土爾扈特台吉敦多卜達什之使臣吹札布入貢皆賜觀圍二十二年七月上幸木蘭行圍時哈薩克汗阿布賴使臣肯集哈拉等入貢賜觀圍二十三年七月上幸木蘭行圍時布魯特使臣車里克齊等先後入貢皆賜觀圍上以西域諸部降附來朝自乙亥丁丑戊寅三年皆適㑹於布呼圖口地靈佳兆若有神異改其地名曰伊綿峪伊綿者國語㑹極歸極之義也十二月癸丑朔副都御史孫灝奏請停止巡幸索約爾濟上諭曰孫灝奏請停止明年巡幸索約爾濟一摺朕初閲其辭以為無知罔識事體付之不問而巳繼思孫灝此奏其所闗於本朝家法及我滿洲風俗人心者甚大有不得不明白宣諭者我皇祖聖祖仁皇帝臨御六十一年惟恐八旗之衆承平日久躭於安樂不知以講武習勞為務是以省方問俗較獵行圍之典歳頻舉行聖夀既髙猶不肯稍自暇逸其所以為萬世子孫計者意至深逺迨我皇考世宗憲皇帝十三年中朕與和親王等日聆庭訓毎諄諄以皇祖之定制貽謀永當效法而深以未遑舉行為憾朕臨御以來思紹前徽早夜兢兢罔敢少懈如比年來戡定準夷兩路用兵我滿洲大臣官兵等皆能踴躍奉命克奏膚功亦由躬親整率習之有素是以臨事赴機人思自効即此亦其明騐矣如徒以恭已養安藉口於文恬武嬉之説朕豈少御園别館足供覽憩而必親御鞍馬時勤弓矢轉以此為自娛計耶朕今日適閲聖祖仁皇帝實録有天下雖太平武備斷不可廢如滿洲身厯行間隨圍行獵素習勞苦故能服勞若漢人則不能矣雖由風土不同亦由平日好自安逸所致之諭恭讀之餘凜然悚惕豈敢一日忘之今孫灝摺内以為索約爾濟地在京師直北逺與俄羅斯接界一似輕車前往不無意外之慮者此語尤為笑柄今額駙色布騰巴爾珠爾及喀爾沁貝子呼圖靈阿扎拉豐阿俱在朕前試問索約爾濟非即伊等之部落家室耶伊等非國家教養之子孫臣僕耶以伊等恭誠望幸迎請猶恐不及而謂有意外之慮當亦夢囈所不應出此者矣摺内乂稱索約爾濟非江浙勝地可觀等語其言更為荒誕且南巡之舉豈僅為山水觀覽之娛上年朕臨徐邳淮泗沮洳之地為之相視求瘼䟽洩修防次第興舉今嵗農事倍收孫灝寧不聞之乎且果如孫灝所言南方為勝賞之地則索約爾濟之習勞練武所為固勝於彼益不可中止矣至稱隨從侍衛官員人等長途費重生計艱難則從前皇祖時獮狩之典嵗率二三舉行彼時大臣中或有外來之助至於侍衛兵丁何嘗不以為苦然正所以教之節用知艱也且今預借俸餉額外賞給較昔實厚豈至苦累轉甚於前者若如孫灝之意將使旗人盡忘淳樸服勤之舊俗而惟漸染漢人陋習人人頽廢自安文既不文武亦不武如此而後快於孫灝之心則其心為何心乎至近年來朕毎秋獮木蘭恭奉聖母皇太后安輿竊念聖躬或致勞勤懇請駐輦山莊猶未蒙慈允且屢垂懿訓示以大義謂祖制不可少違安逸不可少圖惟恐朕之稍有廢弛此亦諸王大臣所共知者而孫灝顧以長途往返藉詞縁飾謂足聳動衆聴耶孫灝以上書房行走之員而識見舛謬害事如此若侍諸皇子教讀耳濡目染豈獨貽悮養正之功而已哉副都御史職佐風紀斷非謬妄之人所可濫竽孫灝著以三品京堂改用將此㫖通行曉諭知之二十四年三月諭今嵗暫行停往索約爾濟諭曰朕今嵗將幸索約爾濟行圍已於上年降㫖令所司預備馬匹牲畜事宜嗣因將軍兆惠等進勦逆回相持固守逆渠和卓木等尚未授首今年正當厚集兵力一舉勦滅方欲暫停巡幸専事軍儲乃當宵旰等維未頒明㫖而孫灝不知從何處得此信遂以停止巡幸索約爾濟凟奏夫索約爾濟乃䝉古部落習勞講武之地朕躬巡幸亦為加恩衆䝉古及簡習兵丁校閲材藝計耳孫灝不知大體妄謂勞民動衆往可畏之地朕轉定欲今嵗前往者以此近據科爾沁親王阿拉布坦奏到該處圍場曾被野燒因遣額駙色布騰巴爾珠爾等前往看視今據奏稱圍場雖有被焚之處青草繁蕪無恙蒙古等望幸甚殷惟圍場野獸不無因火逸出稀少等語往索約爾濟本為行圍今圍場牲畜既少則轉不如木蘭之可以肄習蒐獮矣今嵗可停往索約爾濟俟一二年後酌量降㫖秋時前往木蘭照例預備所省牲畜用濟軍需亦覺有益此非返顧却慮依孫灝所奏也將此通行曉諭知之建濟爾哈朗圖行宫自波羅河屯入圍場有二道東道由崖口西道由濟爾哈朗圖毎嵗行圍多從崖口出入至是建行宫於濟爾哈朗圖二十七年復於濟爾哈朗圖之北建阿穆呼朗圖行宫制俱朴素取其道里適均往來駐頓不煩供億也嗣後車駕行圍若由崖口入則回鑾由濟爾哈朗圖若由濟爾哈朗圖入則回鑾由崖口率以為例二十五年八月上幸木蘭行圍時哈薩克汗阿布賴使臣都勒特赫勒等入覲賜觀圍御製塞宴四事詩詐馬詐馬為䝉古舊俗今漢語俗所謂跑等者是也然元人所云詐馬實咱馬之誤䝉古語謂掌食之人為咱馬盖呈馬戲之後則治筵以賜食耳所云只孫乃馬之毛色即今蒙古語所謂積蘇者是亦屬魯魚兹扎薩克於進宴時擇名馬數百列二十里外結束鬉尾去覊韀馳用㓜童皆取其輕捷致逺以鎗聲為節遞施傳响則衆騎齊騁驫駥山谷騰躍争先不踰畧刻而達掄其先至者三十六騎優賚有差所以柔逺人講武事也名王詐馬存遺風獻筵備陳表敬恭廿里以外列駿驄置郵傳命聴發縱宣教施銃星火紅連聲遞令頃刻通砰磕萬雷忽落空翩若驚鴻逸若龍雲屯飈歘倒吕洪旁唐閃霍復舂容振陵駭谷躪阜嵏平沙草軟净壒塳駃騠束尾纒其鬉輕方致逺騎以童捷足獨出傑且雄選三十六惟良駥按第行賞務從豐只孫古俗想像中和樂還因寓詰戎什榜什榜䝉古樂名用以侑食今俗所謂十畨或因此楊萬里詩有全畨長笛横腰鼔一曲春風出塞聲之句盖樂曲名畨本塞外語而傳譌耳其器則笳管筝琶絃阮大不思之類將進酒輙於筵前鞠􅎽奏之鼓喉而歌龢囉赴節有太古之遺音焉平原擇向圓幕張駱酥乳酒湘黄羊名王捧觴起上夀較漢公卿禮數詳渾撥四火不思曲長朔管如鞭吹鳴羽發徵氣内運叩角動商響外披初奏君馬黄大海之水不可量曲首句繼作善哉行無貳無虞式榖友朋誰云朔漠無古樂絶勝鄭衛為新聲我惟中外一家用聨上下情亦不侈談有虞氏四裔之樂舞於庭相撲相撲之戲䝉古所最重筵宴時必陳之國朝亦以是練習健士謂之布庫蒙古語謂之布克脱帽短褠兩兩相角以搏踤仆地决勝負勝者勞以巵酒厄魯特則袒裼而撲雖蹶不釋必控首屈肩至地乃為勝彼嘉其壯賜之羊臛則拱臂探掬顧盼呿吞聲若飲歠其舊俗如此因以示惠云健兒揎袖短後衣席前相撲呈雄嬉捭拖拗拉矜扲掑跮踱踞蹋蹍且䠑乗間伺怠出以竒恧然躓蹶力不支勝者賜酒跽飲之别有厄魯均新附其撲法乃異舊部露身赤脚惟著袴撇捩􅞶踔空拳赴失計忽撲伏地據騰跳翻作康王跨兩肩著地頸倒䜿方得謂之决勝負勝者揚揚意實歡負者反求惟靦顔宣傳典屬呼來前上方肥羊出厨盤長胾大臛如舉山七箸不設俾恣餐誰識不足君所言快哉大嚼真壯觀豈對屠門空望懸跪振雙臂攫且摶左哆右噏直下咽倐似長鯨吸百川意氣自若殊昻軒均令染指異腹便小哉食肥張齊賢是盖衛拉舊俗傳示恩奬勇一試旃食罷命前面詢焉弗如兹食閲十年據云準噶爾自喇嘛達爾扎搆釁以來日就凋敞不得如此飽啖者十年於兹矣教駣教駣攻駒周禮全載然後世僅知攻駒而不知教駣䝉古則熟習其法謂之騎額爾敏達駻馬三嵗以上曰達駻額爾敏則未施鞍勒者也毎嵗扎薩克於所部驅生馬多羣至宴所散逸原野諸王公子弟雄傑者執長竿馳縶之加以覊鞴始則怒騁駥趯或豨突人立嘶齧靁殷馭者騰踔而上控掣自如須臾調良率得良馬一嵗為駒不勝鞍三嵗為駣始堪教夏官庾人早失傳未若朔漠存古調扎薩獻宴必備觀分羣别色陳平原氊廬賜食較撲罷按轡一覽同名藩名藩子弟皆吉服上馬執竿好結束馭生馬者必馳騎逐之襭衣綰帶持尋文竿繫革絙其上以為控縶俗云套馬竿敺來萬錦歘披前光采陸離紛奪目薄言駉者有驈皇騂騏駵駱駰騢黄縶之維之取傑驁紲絆未及先跳梁齕草飲水本天性鞿鞚乍拘自覺病驚軼狂擲詎能無處之以暇堪力勝牽來蹀躞人争騎驀跨那待覊馽施擢足軒立忽落地翻身騰騗捷于飛盡態極變不可狀駻突雄驅若翻浪毛龍逸虎旋就馴人有餘閒據馬上馳驟寧供耳目娛駃騠騄耳中掄諸慿閲考牧悟至理不教而成事所無二十七年七月上幸木蘭行圍是嵗哈薩克汗阿布賚遣陪臣蘇爾統都勒特赫勒等入覲賜觀圍三十二年八月上幸木蘭行圍時哈薩克陪臣公品級杜勒克勒等入覲上宣見賜以櫜鞬裘服并令隨圍從觀三十五年八月上幸木蘭行圍時喀爾沁郡王拉特那錫第等於行營南門外設大氊廬進上膳三十七年八月上幸木蘭行圍是年定圍塲數為十五臣等謹按恭逢皇上大獮或十八九圍或二十圍馳射之事所以示衆䝉古也今圍塲定為十五九月朔已獵十圍恭讀御製有曰減期圖速返臨樂戒淹留仰見聖夀已逾六旬恭承皇太后懿㫖不復久駐行圍聖孝性成真越千古矣三十八年八月上幸木蘭行圍上自行營度齊爾伯庫嶺甫七里即停蹕傳膳因賜扈從近臣及隨圍蒙古王公并入覲之土爾扈特等朝餐饔入調味親為指授劑和俾皆饜飫御製恭題皇祖御用韘恭録御製序我朝家法相承肄勤尚射皇祖神勇天錫臨御六十一年秋獮冬狩之典嵗必舉行往往親御威弧殪禽服猛鑠乎偉哉余髫年䝉被恩眷養育宫中幸得隨侍木蘭行圍仰瞻聖武追念祖徳迄今不敢忘兹恭閲舊藏御用韘十有二或革或角規制樸堅撫思鉤弦闓體之精想見壹發參連之妙夫書策手澤所存尚且守而弗斁矧為法先詒後之良謨勵繼繩而彰赫濯其寳重更當何如敬合弆箧衍什襲用珍并係長言以識永久今和闐嵗貢嘉玉中韘材者不一而足雖琛賮徠遐瑞符延喜詎若此觀徳示儉之昭垂萬世哉四十年九月上幸木蘭行圍凡近崖口處獸尚少是時上初入崖口祗射一箭即中一麅駐行營後適將軍阿桂等奏至現已合圍勒烏圍指日可克既批答諭示即以所射之麅賜阿桂豐昇額明亮俾均愷恵是年皇曾孫奕純九嵗即隨圍四十一年八月上幸木蘭行圍臣等謹按上幸木蘭向無乗輿之事近因聖夀已逾六旬數年來自行營至看城始乗肩輿以避曉凉若上圍則仍乗馬如前扈獵諸藩部同聲歡忭真千古所未有也御製蒐苗獮狩説傳論春蒐夏苗秋獮冬狩各具時義言固引而未發至所稱皆於農隙以講事吾不能無疑焉夫秋冬或有農隙至於春夏則自播種以至刈穫其間耘耨灌溉較晴量雨炙背胝足苦哉耕夫盖無一時之安心息力而謂之有農隙可乎嘗思蒐苗從草獮狩從犬古人制字盖有深意杜注苗為苗除害是矣而所云蒐索擇取不孕者猶未免以辭害義夫禽獸固族聚而類處使擇牡而驚其牝則孕者不能無傷豈育物之仁哉則所為蒐索者亦以蒐索其害苗為當至於獮狩皆從犬則誠守而取之順殺氣而獮之是則春夏之取獸繫乎田秋冬之取獸繫乎獸而義明矣雖然更有説焉古時地廣人稀故田或游獸而有蒐苗之事以除其害今及腹裏以及邊壤地無不耕安得有禽獸害苗之事乎若夫圍場之地原自不耕則所為蒐索其不孕而肥者與夫初生如苗者以嘗新繹其義亦未嘗不通而實非古人所解者矣四十五年五月諭曰今年係朕七旬萬夀辦理班禪額爾徳尼前來熱河朝覲筵宴念經等事過朕萬夀後始念濟爾嚕經俟念完時再行進哨未免太遲今嵗不必進哨將此曉諭各該處所有進哨俱著停止四十六年八月上幸木蘭行圍臣等恭讀御製雜詠注云從獵䝉古王公内扎薩克四十九旗又喀爾喀四部及四衛拉特再青海等部落各扎薩克不下百餘旗仰見我朝中外一家實史冊所未睹云木蘭行圍儀凡秋獮設圍場於古北口外曰木蘭以總管掌其地政嵗遇皇帝行圍既奉㫖總理行營王大臣奏請嚮導官一人先莅圍場於鑾輿所經之地除道清軌行文所司儲備宗人府内閣部院奏請欽命扈從王公各官八旗䕶軍統領請命統領一人營總三人其㕘領以下及䕶軍由八旗酌委奏聞先期由兵部行文駐防將軍都統副都統各選所屬官兵材藝優長者分班遣赴京師隨圍學習理藩院行文扎薩克王公等選獵士一千二百五十人從喀喇沁翁牛特共一千名敖漢五十名科爾沁一百名巴林克西克騰共一百名又喀喇沁派圍場夥計槍手六名隨圍槍手六名哈嘛爾三十名打鹿槍手四十名喀喇沁土黙特翁牛特派嚮導一百名長槍手一百二十名蒙古諸王公台吉應隨圍請安者令其至波羅河屯祗竢先期一日遣官祗告奉先殿至日皇帝御征衣乗馬出宫翊衛諸臣前引後扈百官采服跪送均如巡幸儀行營駐蹕䕶軍統領營總各一人率䕶軍㕘領䕶軍校䕶軍先涖其地度地廣狹以立御營禁隨駕官兵踐禾稼擾吏民營總巡警嚴譏察止夜行違者論如法既至行在兵部頒行圍禁令欽命統圍大臣數人先涖圍場按旗為隊分兩翼斜行成列各建纛以為表前哨左右用藍兩協左白右紅中軍用黄前哨馳而進則後隊以次隨發繞圍塲蟬聨環匝由逺而近毋差池毋間斷行圍之日五鼔管圍諸王公率獵士先往撒圍所司設幔城於圍所奉皇太后觀覽皇帝臨圍場親御弓矢圍合獸突皇帝發矢殪之御前大臣侍衛皆射軼於圍外者從官追射遇大獸虎鎗官兵從之既獲獸各比次其類以獻駕還行營以所獲獸分頒扈從諸臣大獮禮成賜宴賞賚有差南苑行圍儀凡田於近郊設圍場於南苑以奉宸苑領之統圍大臣督八旗統領等各率所屬官兵先莅圍場布列鑲黄正白鑲白正藍四旗以次列於左正黄正紅鑲紅鑲藍四旗以次列於右兩翼各建纛以為表兩哨前隊用白兩協用黄中軍用鑲黄駕至圍場合圍校獵與前制同巡幸所至行圍儀凡巡幸所至各備圍場車駕東巡由兵部移文盛京等處將軍經行䝉古諸部由理藩院行知扎薩克王等各率所屬官兵以從命統圍大臣分翼合圍均如前制䝉古王公等隨圍例凡内扎薩克四十九旗王貝勒貝子公台吉塔布囊分三班毎年輪班朝賀後仍往木蘭隨圍御前行走之貝子公等乾清門行走之公台吉額駙等分兩班毎年輪班朝賀後仍往木蘭隨圍閒散行走之額駙分三班毎年輪班隨圍木蘭後即入京朝賀喀爾喀青海汗王貝勒貝子公台吉分四班來京其未出痘者祗往木蘭請安未分班之厄魯特王公等聴其自行來京或往木蘭請安又喀爾喀四部内未出痘之王公毎年以十人隨圍由定邊左副將軍酌派駕幸木蘭行圍外藩進宴儀凡車駕行圍木蘭䝉古卓索圖召烏達二盟長例進宴一次設蒙古帳房六座白駝十八鞍馬十八驏馬一百六十二牛十八羊一百六十二酒八十一罈食品二十七桌撲跌人二十名歌䝉古曲人九名生駒一千匹騎生駒人二十名賽跪馬二百五十匹先期呈行在理藩院奏聞並列各䝉古王公職名具奏請㫖派一人進爵屆期武備院官將所進蒙古帳房設一架於皇太后看城内餘設行營月牙城内所進駝馬牛羊等俱列於道傍駕至理藩院官引䝉古王公台吉等在月牙城外跪迎駕陞帳殿寳座理藩院官引帳殿内應坐之䝉古王公等入列坐於左右其餘分坐於兩旁所設帳房内皇帝進茶諸王公等俱興行一叩禮次賜諸王公茶復叩飲畢坐皇帝進膳有司恭捧御爵實酒進爵者出班跪接爵恭進御座前退復位跪一叩衆皆跪叩進爵者興詣御座前受虛爵退有司承㫖賜進爵者酒進爵者跪飲畢復叩首興復於原坐處賜蒙古王公台吉等食侍衛等分遞酒於䝉古王等各以次徧是時綽爾濟人及歌䝉古曲人以次入侑皇帝進膳畢獻茶乃陳相撲之戲次觀䝉古王公子弟騎生駒宴畢皇帝還行宫諸王公台吉等於原接處跪送如儀御製哨鹿賦有序賦者古詩之流詩以言志其有不能盡言之志則賦可以中之我皇祖昔喜哨鹿朕冲齡隨侍習聞其事年來乃親試為之嘉其有合於聖經顧古人無賦之者故不愧無文其辭曰伊白露宵中之候正伊尼孶尾之時生不息焉洪均運而誰測物雖蠢也氣機至而咸知故三序春夏冬則牝牡各從其類謂牝隨牝羣壯逐牡侣惟中去聲秋斯牝牡各嫓其妃謂牝各分羣而匹牡强有力者不惟挾兩而累十弱無能者或乏獨匹以相隨或依林而命侣或據嶺而分畿或悍害而傲衆或謹守而自持或豪敓而攘彼或竊取以私其萬態紛其莫窮一以音而宣之於是虞人善因聲以察情爰體情以斆聲喜金風之颯爽值玉字之晶明霜重而不言其冷露濃而那覺其零陵嶮巇而如登袵席冒蒙茸而不異户庭慮吾遊之宴起虞原獸之怠鳴鹿迨晨則懶鳴哨亦不進故哨鹿者恒於未曙前即往夙戒僕而奚從欣戴月而披星舍彼寛衣宜兹短服荷長哨於左肩以木為哨鹿之具呦呦以鳴出象首於右簏象鹿之首人戴之則鹿不疑躐嶒陟嵕沿谿穿谷攀蘿兮豈辭胼手履石兮何妨馗足盖以暢兹心神詎惟饕其口腹於焉蹵乎崔嵬軼彼㟥嵳上干丹楓之巘下視白雲之隈上風餮切之避忌陽林晃耀則紆迴就叢薄之蔽翳反獺裘而毰毸衆條理焉畢㑹乃得傑雄之争匹者呦踉蹌而徐來角八义兮嶷嶷耳雙聳兮濕濕挺强項兮莫攖矗靈鼻兮善䶋始嚇侣兮自閑乃妬異兮矜急既漎漎兮疾赴復䳮䳮兮少戢盖屢試兮絶猜遂鋭志兮直入爾其動林無形匪風有響適其將至撇爾懼往奮角思觸瀏晲争長則在夫能哨者善達變以隨機比用中而執兩或激其怒兮使進或示以弱兮令放惟察情之喜怒乃應聲為低仰盖用心於既専斯通靈而不爽既然矣無動無慮不徐不遽驀黶合之前陳陡應叱而少住屏營收息量卑揣髙傍斗窺星鎗上施星斗所以審髙低度分以毫審度發機馥焉中膏命處擇肥登於大庖若夫多疑旁剔既進中止膽劣心狷狐猜狼視未交戰而長跳敺叢樾而如駛則亦比之窮寇之莫追又何必焚林而盡取哉盖嘗研精哨鹿之理而知五徳焉取一以新匪二以頻仁也逆者斃之去者寘之義也爰登簠簋爰嘏福履禮也招之即至獲之即遂智也呼哨以進射宿凜訓信也如是者盖有合於聖人之洪道而又豈潘岳耽盤流遁之所誡相如子虛上林之所嘲也哉御製後哨鹿賦或問哨鹿之時之法之義盖已藴賅前賦矣若夫冒凛冽之霜晨衝䝉翳之林薄踐岝㠋之巉峯涉沮洳之幽壑十哨未必一來十來未必一獲獲乃心忻失斯興索多見其勞鮮聞其樂則何不張堂堂之圍按徐徐之度收藉藉之富免皇皇之謔而故為是寒征而曉作者何哉曰吁是何言耶是何言耶見土障葛燈而嗤為已過者非忘其先也耶逸則淫而勞則思季氏之婦猶聞之固可弛其惕乾耶或曰惕乾者盖不若是矣意者慎大寳居法宫屏九御接三公劭農政熙天工豈謂當即鹿於隍中耶曰子知其一未知其二坐吾語汝賦以見兹若夫髙談堯舜深處廊廟文恬武嬉内弱外强孰不喜夫逸體而庸詎知其頽綱也哉且也身歴其難者告之以人之難而知而不知人之餒者方謂何不食肉糜也是以神區天闢後法先垂詰戎習衆謹度節時圍以示正哨以出竒得之艱者趣斯永躬其勞者樂亦隨盖理境之當窮可絜矩而深思也於是秋本蕭辰寒猶凄所宵風定兮林静曉月上兮山岨儦儦者妬羣俟俟者攜侣遵彼􅜓􅜓之蹊如或殷殷而佇吹長哨以通情似應聲而答語去亦弗追來亦弗拒則有强者捍捩弱者趦趄猜者飄瞥怯者踟蹰慷慨者恲性昬瞀者糢糊隨人情之萬能心亦奚有以異諸縁輳物來獲一勝百其求也亦惟去之是慮其獲也夫何失之足惜去與來固難期之儻然失與獲亦無定之屢易吾因以㕘如幻於現前愛景光而為適也爾其問夜宵衣據鞍䇿馬萬帳燈明七萃聲寡是則始出營而覽離竒晃耀之狀也若夫炬影漸逺夜色猶暝峯嶺纔分林樹未形乍如夢遊玉樓十二仙人京乃其曉蟾初吐或半或圓隔葉瀲露度水翻瀾又如虹橋可躡徑欲造廣寒髙山出雲雲去山在變幻頃刻步移觀改則何異夫黄山之海赤烏扶桑霧斂氛開枚瑰靺鞈熊熊回回又奚數其初陽之臺於焉入深樾凌崇巒密容單騎踈見線天千年落葉鱗裓谷填色作黄金風吹不翻臭如沉水履若罽氊㣶徊乎静真乎忽訝夫身入布地之園而伊尼之羣方且左右前後與人周旋失兮獲兮勞兮樂兮率已相忘於無何有之禪矣問者茫然不知所謂懡㦬跼蹐唯唯而退臣等謹按哨鹿之法於古未聞遼史營衛志秋捺鉢曰伏虎林每嵗車駕至皇族而下分布濼水側伺夜將半鹿飲鹹水令獵人吹角效鹿鳴既集而射之謂之䑛鹻鹿又名呼鹿殆即其遺法歟我朝嵗舉校獵之典而哨鹿亦兼行之圍場稱木蘭者因哨鹿而得名也㑹典未載哨鹿之法恭讀御製哨鹿二賦體鹿情之聚散狀哨法之精微至理之該括靡遺辛苦之形神曲繪發宣祖徳如見宵衣問夜之勤雅合聖經不忘文恬武嬉之戒大哉王言蔑以加矣謹載於篇以昭典故焉皇朝文獻通考卷一百四十
