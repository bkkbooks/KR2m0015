body:
  text: 經籍考二十一集臣等謹按馬端臨通考集類六曰楚辭别集詩集歌詞章奏總集粵自劉向裒屈宋諸賦定名楚辭隋志集部即别為一門厯代因之别集門部舊本最繁凡載道之辭言志之什與夫敷奏之鴻猷倚聲之末技胥附焉逮馬氏析為四類而後詩與章奏歌詞之獨行者秩然以分總集之內别析一子目曰文史蓋總集在薈萃菁英文史則品題臧否雖同居一類而流别攸殊五朝續通考一仍馬氏之舊惟是章奏一門已遵欽定四庫全書之例改為奏議隸史部則此自不應復見謹列其目凡五首楚辭次别集次詩集次歌詞次總集而文史則仍附總集之後集楚詞别集欽定補繪離騷全圖二卷蕭雲從原圖乾隆四十七年奉敕補繪雲從見經類臣等謹按宋李公麟等多以離騷事物寫摹情狀然不過一篇一章未能賅備雲從始因章句廣為此圖一時詫為神品然考原圖九歌凡九天問凡五十四而目録凡例所稱離騷經逺遊諸圖俱已散佚香草圖亦未之逮我皇上念其用意之勤而掛漏之多也爰詔羣臣參考成編補為全帙於是體物摹神粲然大備仰見幾餘游藝不遺繪事之微俾讀者按圖索句得以博物辨名此誠萬世汲古之資而非僅雲從一人之私幸矣楚辭燈四卷林雲銘撰雲銘字西仲侯官人順治戊戍進士官徽州府通判雲銘自述曰惜誦為懷王見疏之後又進言得罪而作時但見疏而未嘗放本傳所謂不復在位者以不復在左徒之位未嘗不在朝也且思美人抽思乃懷王置之於外時作然此時在漢北尚與江南之野無涉惟涉江橘頌悲回風惜往日哀郢懷沙六篇始是頃襄放之江南所作如此說來既與本傳使齊及諫釋張儀諫入武關數事不相礙且與思美人抽思章稱造都為南行朝臣為南人及來集漢北等語哀郢章仲春東遷逍遙來東西思故都等語一一印合臣等謹按王逸注以九章皆屈原放江南時作雲銘取其篇次盡易其舊以為創解然觀其自述諸語實以明黃文煥楚辭聽直為藍本也離騷經注一卷九歌注一卷李光地撰光地見經類天問補注一卷毛竒齡撰竒齡見經類離騷經解一卷方楘如撰楘如字文輈淳安人康熙丙戍進士官豐潤縣知縣山帶閣注楚詞六卷楚詞餘論二卷楚詞說韻一卷蔣驥撰驥字涑塍武進人驥自述曰宋洪慶善朱晦菴考定原賦止於漁父篇今採黃維章林西仲語并載招魂大招以正漢志二十五篇之數其作文次第首惜誦次離騷次抽思次思美人次卜居次大招次哀郢次涉江次漁父次懷沙次招魂次悲回風次惜往日惜誦至卜居皆作於懷王時大招以下作於頃襄王時若九歌天問橘頌逺遊文辭渾然弗敢强為之說離騷解一卷楚詞九歌解一卷讀騷列論一卷顧成天撰成天字良哉婁縣人雍正庚戍進士官翰林院侍講嚴文在序曰離騷九章逺遊天問招魂大招卜居漁父析其大㫖而已足也九歌訛而戾於義理非條分縷析不可得正得其意者足為人臣教忠之書興學士感發無窮之意離騷中正無卷數林仲懿撰仲懿見子類臣等謹按仲懿謂屈原以執中為宗𣲖主敬為根柢其賦直與四子書相表裏又釋名余曰正則字余曰靈均至牽引天命之性率性之道以相附合曽謂騷人作賦而有是迂論乎屈騷心印五卷夏大霖撰大霖字用雨號梅臯衢州西安人楚詞新注八卷屈復撰復字見心號悔翁蒲城人楚詞章句七卷劉夢鵬撰夢鵬見經類右楚詞聖祖仁皇帝御製文集一百七十六卷臣等謹按康熙五十年大學士張英等恭編凡三集第四集則雍正十年和碩莊親王允祿等恭編洪惟聖祖仁皇帝寶祚延洪大文丕煥萬幾之暇寓志藝林故前後所編凡敕諭奏書表論辨解序記說跋碑頌贊銘祭文雜著詩賦各體自癸亥以前為初集四十卷丁丑以前為二集五十卷辛卯以前為三集五十卷壬辰至壬寅為四集三十六卷通一百七十六卷聖人之著作日新貫絡綱維包涵宇宙闡事物難窮之義濬古今未盡之藏允宜昭示萬年炳光二曜具徵聖學髙深洵非末學之士所能仰窺睿裁於萬一已世宗憲皇帝御製文集三十卷臣等謹按文凡二十卷分十三體詩十卷前七卷為康熙壬寅以前作曰雍邸集後三卷則御極以後作曰四宜堂集欽惟世宗憲皇帝至孝本乎性成典學務乎時敏當潛邸之初龍樓視膳夙夜躬親而燕息餘閒即覃精藝苑洎乎膺圖御宇宵旰勵精十三年之中宣諭批答逾數百卷而奎藻所抒復成巨帙迄今册府尊藏仰見聖人著作之精誠非占畢儒臣所能仰贊一詞也御製樂善堂文集定本三十卷乾隆二十三年協辦大學士户部尚書蔣溥等奉敕重編皇上御製序曰朕少讀尚書見二帝三王以及繼世之哲后君臣咨警惟是身心性命之本原其敷政命官亦惟根柢道德而不規規於事為之末及考詩易四子之言凡論政者皆與書所稱同其指歸互為表裏其後博涉諸史則雖明盛之世所殫心竭慮者大概詳於事功而略於本原教化之升降治象之崇卑其分岐實判於此用是日有孜孜求所以取道入德之門䝉皇考示以明理立誠之大訓而略得其統貫又念修辭必本乎誠故凡見於古文詩辭者咸以是為宗而不敢有二焉往者嵗庚戍曽録數年中所作序論書記雜文詩賦次為十有四卷置諸几案時就所言以自檢其行嗣是所作蓋四倍前繼序以來躬理萬幾兢兢業業惟恐一事失宜負皇考付屬之重思如曩時從容文墨之娛不可復得然少有餘閒未嘗不考鏡經史以自觀省爰取庚戌文鈔所載存十之三續作未訂入者存十之七總為一編共若干卷非欲以文辭自表著蓋是集乃朕夙昔稽古典學所心得實不忍棄置自今以後雖有所著作或出詞臣之手真贋各半且朕亦不欲與文人學士爭巧以轉貽後世之譏則是集之輯有不得已者記曰本諸身徵諸庶民曩豫自檢所行以勉副所言者乃日用酬酢之常今兹所行事無大小莫非政教之平陂生民之苦樂相倚不可以中立者也因此益自警惕而克艱天位顧畏民碞庶幾明理立誠之學參前倚衡永永勿替也夫臣等謹按樂善堂文集於乾隆二年五月頒行至是復命校擬簽貼進呈重訂定本凡文十三卷詩十七卷御製文初集三十卷皇上御製序曰于敏中排次數年來所為御製文初集成而以序為請夫序者所以叙陳經㫖故孔子作書序子夏作詩序未聞自序其文也自序其文蓋漢唐以後之事乎為天子者所以修己治人必當以三代以上自朂豈可以漢唐以後自畫此正務也至於文乃其餘事耳然亦豈可以漢唐以後為法哉如是則敏中之請序可以不允既而思之向之樂善堂全集及御製詩初集不既有序乎於凡惕已敬天本身徵民憫農桑驗今昔蓋已言之悉矣例以向不可以不序而以向之言之悉則又可以不必序矣雖然不欲與文人學士爭長亦向之本意也則今之裒然成集者與向之言為合乎為否乎以之自問抑又不能措一辭云臣等謹按御製文初集凡五百七十餘篇分十有九類每類各以年月為次乾隆二十八年户部侍郎于敏中奏請編刻奉㫖如所請行三十年復允浙江學臣錢維城之請許直省布政使司照式刋布欽惟我皇上德隆千古學貫三才擷百氏之菁英潄六藝之芳潤文集所垂己逾數百其中包含廣大考索精深庶物庶名兼該道器實心實政原本敬誠譬之元化斡運宰制樞機而日月星雲大文彌煥所謂與天合撰者道在是也至於體黜雕鏤㫖探刪定萬幾餘暇典學日勤天縱聖神迥非臣下所能觀法於萬一臣等循環雒誦仰羡摛華之美富繼踵方新益徵臨御之康强延釐未艾也己燕香齊文集四卷詩集六卷劉餘祐撰餘祐字申徵號玉吾又號燕香居士宛平人原籍濵州前明萬厯丙辰進士官兵部侍郎入國朝官至户部尚書金文通集二十卷金之俊撰之俊字豈凡吳江人前明萬厯己未進士入國朝官至中和殿大學士諡文通灌研齊集四卷李元鼎撰元鼎字梅公吉水人前明天啓壬戍進士入國朝官至兵部左侍郎陸廷燦南村筆記曰元鼎家有古研五瓣如梅花質如黃玉相傳為灌嬰廟瓦故以名齊因名集用六集十二卷刁包撰包見經類秀巖集三十一卷胡世安撰世安見經類世安自序曰己卯秋以前稿因罹兵變露電委之頃檢其存者彚録成帙甲申春以前曰秀巖存詠以後曰石芝軒集雜文曰容竹居偶存石芝軒續存淡友軒集十六卷桴庵集四卷薛所藴撰所藴字子展前明崇禎戊辰進士入國朝官至禮部侍郎搜遺稿四卷彭賔撰賔字燕又一字穆如華亭人前明崇禎庚午舉人入國朝官至汝寧府推官青溪遺稿二十八卷程正揆撰正揆見子類王士禎跋曰正揆工畫其江山卧遊圖散在人間者有數百本士禎亦藏其二臣等謹按是集凡詩十六卷文十一卷序一卷附竒夢録一卷集中多題畫論畫之作蓋正揆嘗從董其昌遊故於繪事頗擅其長梅村集四十卷吳偉業撰偉業見史類臣等謹按偉業少時問學賅博文筆瑰麗一時頗有徐庾之目其歌行一體尤所擅長故能仰契宸衷榮傳詞苑至於倚聲末技亦能接跡屯田王士禎嘗稱之惟古文擷魏晉之膏腴於散體之中時參儷偶未免有乖正格耳己亥存稿一卷孫承澤撰承澤見經類浮雲集十一卷陳之遴撰之遴字素菴海寧人前明崇禎丁丑進士官中允入國朝官至宏文院大學士謫戍尚陽堡且園近集四卷且園近詩五卷了菴文集九卷王岱撰岱字山長湘潭人前明崇禎己卯舉人入國朝官隨州學正康熙己未嘗薦舉博學鴻詞岱自記曰康熙丙午七月就隨州任黌宫有隙地宅而園之曰且園因以名集內省齊文集三十二卷湯來賀撰來賀字佐平改字念平號惕菴南豐人前明崇禎庚辰進士官至廣東按察司僉事古處堂集四卷髙爾儼撰爾儼字岱輿靜海人前明崇禎庚辰進士授編修入國朝官至大學士諡文端沚亭文集二卷孫廷銓撰廷銓見史類薪齊集八卷吕陽撰陽字全五無錫人前明崇禎庚辰進士入國朝官至浙江布政司參議讀史亭詩集十六卷文集二十二卷彭而述撰而述字禹峯鄧州人前明崇禎庚辰進士授陽曲縣知縣入國朝官至貴州巡撫終雲南布政使朱彞尊跋曰而述為詩文人所應有盡有人所應無不盡無道山堂前集四卷後集七卷陳軾撰軾字靜機侯官人前明崇禎庚辰進士入國朝官至廣西蒼梧道山圍堂集二十三卷鄭宗圭撰宗圭字圭甫號瞻亭前明崇禎壬午舉人入國朝官烏程縣知縣石雲居士集十五卷詩七卷陳名夏撰名夏字百史溧陽人前明崇禎癸未進士入國朝官至大學士緣事伏誅臣等謹按名夏歸命本朝棄瑕録用後因怙權骩法旋正刑章御製人臣警心録訓誡詳明蓋其立身隳敗他無足觀雖生平著述於典制有可考核然集中顛倒是非多乖公論四庫全書僅附存目俾後之覽者因其集以論其人益共凛然於臣道之防焉誠正齊集八卷上官鉝撰鉝字三立號松石翼城人前明崇禎癸未進士入國朝官至副都御史青箱堂文集三十三卷詩集三十三卷王崇簡撰崇簡見子類東村集十卷李呈祥撰呈祥字其旋一字吉津號木齊霑化人前明崇禎癸未進士改庶吉士入國朝官至詹事府少詹事愚庵小集十五卷朱鶴齡撰鶴齡見經類臣等謹按鶴齡與崑山顧炎武善炎武因其専力詞賦朂以本原之學始研思經義運以心裁作為文章典雅醇實且有資於考證至與錢謙益同郡而薄其為人集中不惟無一語及之且於所作元裕之集後一篇借裕之以責謙益尤能持守大義可謂錚錚矯矯者已東谷集三十四卷歸庸集四卷桑榆集三卷白允謙撰允謙見子類陳士業全集十六卷陳宏緒撰宏緒見史類南雷文定十一卷文約四卷黃宗羲撰宗羲見經類臣等謹按宗羲居餘姚之竹橋有南雷里為唐謝遺塵故居距竹橋僅數里故以名其集其曰文定者蓋取丁廙後世誰相知定吾文語也晚年屢自刋削僅存四卷因名曰文約云紫峯集十四卷杜越撰越字君異號紫峯容城人前明諸生康熙己未薦舉博學鴻詞以老疾未赴蒿菴集三卷張爾岐撰爾岐見經類五公山人集十四卷王餘祐撰餘祐本姓宓字申之一字介祺直隸新城人前明諸生後居易州五公山因號五公山人水田居士文集五卷賀貽孫撰貽孫見經類織齊集鈔八卷李煥章撰煥章字象先號織齊山東樂安人前明諸生燕峯文鈔一卷費密撰密字此度成都人虎溪漁叟集十卷劉命清撰命清字穆叔臨川人彭省廬文集七卷詩集十卷彭師度撰師度字古晉號省廬華亭人省軒文鈔十卷柴紹炳撰紹炳見經類潠書八卷思古堂集四卷東苑文鈔二卷詩鈔一卷小匡文鈔四卷毛先舒撰先舒見經類先舒潠書自記曰是編所作皆雜文諸篇末惟王猷定柴紹炳沈謙三君語略載數條以其為亡友之筆故也學園集二卷續編六卷沈起撰起見經類榆墩集選文九卷詩二卷徐世漙撰世漙見經類安靜子集十三卷安致逺撰致逺字靜子一名如盤字拙石夀光人貢生致逺自序略曰余詩喜摩詰文慕廬陵愛其從容閒雅不事鉤棘懶齊别集十四卷僧通門撰通門字牧雲姓張氏常熟人祝髮於興福禪林尋主古南鶴林天童等寺西北文集四卷畢振姬撰振姬見史類臣等謹按振姬集縱橫疏宕頗有竒氣然渾厚則不足其云西北文者太原傅山所題以東南之人謂之西北之文也涑水編五卷翟鳯翥撰鳯翥字象陸聞喜人順治丙戍進士官至福建布政使祓園集九卷梁清逺撰清逺見子類聿修堂集一卷藍潤撰潤字海重即墨人順治丙戍進士初名滋任侍讀時賜今名厯官湖廣布政使寒松堂集九十二卷魏象樞撰象樞字環極蔚州人順治丙戍進士官至刑部尚書諡敏果臣等謹按寒松堂者象樞乞休時聖祖仁皇帝御賜扁額也象樞學問深醇文筆朴直正色立朝特標徑節仰邀宸翰褒題信不負耳兼濟堂文集二十卷崑林小品三卷崑林外集無卷數魏裔介撰裔介見經類臣等謹按裔介所著述刻之江南者曰兼濟堂集十四卷刻之荆南者曰兼濟堂集二十四卷刻之京師者曰文選二集上下編崑林小品上下編崑林外集一編奏疏四十九篇尺牘存餘七卷刻之歸田後者曰兼濟堂文選十卷嶼舫近草五卷詩七卷樗林三筆五卷又有聖學知統録等書此二十卷乃其子荔彤屬詹明章裒輯諸本選為一編小品外集則雜著諸篇集外别行者也四思堂文集八卷傅維鱗撰維鱗見史類燕川漁唱詩二卷植齊文集二卷傅維橒撰維橒字培公號霄影靈夀人倚雉集十二卷竇遴竒撰遴竒字松濤大名人順治丁亥進士官至僉都御史王文靖集二十四卷附録一卷王熙撰熙字子撰一字胥廷宛平人順治丁亥進士官至大學士諡文靖臣等謹按熙生時所刻者曰寶翰堂集止十餘卷此其全集也林屋文稿十六卷詩稿十四卷宋徵輿撰徵輿字轅文華亭人順治丁亥進士官至都察院左副都御史慎齊遇集五卷蒞楚學記一卷日懷堂奏疏四卷蔣永修撰永修見經類江南通志曰永修在應山有守禦功在平越清丈苗民虗稅八千有竒在湖廣振興文教楚風為之一變潛滄集七卷余一元撰一元字占一號潛滄山海衛人順治丁亥進士官至禮部郎中安雅堂集十卷安雅堂詩安雅堂拾遺詩俱無卷數安雅堂拾遺文二卷附二鄉亭詞四卷宋琬撰琬見史類王士禎池北偶談曰康熙以來詩人無出南施北宋之右宣城施閏章愚山萊陽宋琬荔裳也又曰宋浙江後詩頗擬放翁五古歌行詩闖杜韓之奧又漁洋詩話曰康熙庚辰余官刑部尚書荔裳之子思勃來京師以入蜀集相示亟録而存之集中古選詩歌行氣格深穩余多補入感舊集退菴集二十一卷李敬撰敬字退菴江寧人順治丁亥進士官至監察御史巡按湖南敬自序詩集略曰必深知元氣流行使心口之間律吕相合乃適於喜怒哀樂之正西山集九卷張能鱗撰能鱗見經類文襄公别録六卷李之芳撰之芳見史類春樹草堂集六卷杜恆燦撰恆燦字杜若號蒼舒三原人順治戊子副榜貢生屺思臺文集八卷詩集一卷劉子壯撰子壯字克猷黃岡人順治己丑進士第一授翰林院修撰臣等謹按子壯未及第前困公車者二十年所作制藝雄厚排奡凌轢一切與熊伯龍齊名世稱熊劉至於古學往往失於粗豪則固遜於熊矣熊學士詩文集三卷熊伯龍撰伯龍字次侯號鍾陵漢陽人順治己丑進士官至翰林院侍讀學士學餘堂文集二十八卷詩集五十卷外集二卷施閏章撰閏章見子類閏章語王士禎門人洪升曰爾師如華嚴樓閣彈指即見吾詩如作室者瓴甓木石一一就平地築起臣等謹按閏章之文剗除浮腐不失規矩鶴靜堂集十九卷周茂源撰茂源字宿來號釡山華亭人順治己丑進士官至處州府知府貽清堂集十三卷補遺四卷張習孔撰習孔見子類萬青閣全集八卷趙吉士撰吉士見史類湯子遺書十卷湯斌撰斌見史類臣等謹按斌與陸隴其俱號醇儒隴其篤守程朱於陸王攻擊甚力斌則根柢姚江而亦能持新安金溪之平故二人異趣同歸其生平得力具見語録中其他著述亦皆有體有用通達治體洵不愧國家理學名臣之目也皇朝文獻通考卷二百三十一
