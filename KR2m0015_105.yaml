及典儀掌燎各以其職為位承祭官拜位在香案前正中太常寺贊禮郎各二人贊引承祭官朝服行禮儀節與都城隍廟同凡盛京各直省有奉㫖興修工作之處亦先期照例致祭右祭后土司工凡大工迎吻祭琉璃窑神並經由一路門神各遣官一人將事豫日工部官設壇於琉璃窑及迎吻所經之各門結綵棚祭日五鼓和聲署設樂於各壇前設導迎樂於窑門外太常寺官具祝版設神位陳設牲牢祭品器具設洗均與祭司工儀同承祭官暨禮部太常寺有職事官工部内務府管工各官咸朝服簪花披紅乃陳吻於窑前樂作太常寺贊禮郎引琉璃窑承祭官詣窑神位前行禮引各門承祭官詣門神位前行禮均與祭司工儀同祭畢導迎樂作鑾儀衛校舁吻禮部太常寺官前導承祭官從所經諸門承祭官迎於門前及工所管工官列班恭迎以入俟安吻事竣各退右祭窑神門神順治十六年以織造局設機致祭司機之神遣禮部堂官行禮一應禮儀均與祭司工之神同臣等謹按順治中所祭有司輦之神製造庫之神又舉司牲神祀典今太常寺犧牲所祀犧牲之神是亦祀之一端可以附識若西山大小青龍之神康熙年中祈雨嘗祀之今則不列祀典矣雍正七年勅封各倉司倉之神國家漕運之利逺軼前代儲積盈溢分建各倉以貯之倉中或舊有神祠未列祀典司事者以請下禮部議以通州三倉惟西倉舊有倉神祠在京城内七倉惟右翼興平倉舊有太倉神祠俱應重加修葺左翼擇於海運倉城外五倉擇於新建之儲濟倉各建廟宇設司倉神位每嵗春秋致祭勅加封號封通州倉為均調顯佑司倉之神左翼倉為豐儲裕餉司倉之神右翼倉為佑農廣惠司倉之神新建二倉為凝禧阜衆司倉之神各賜御書匾額載入祀典致祭儀嵗春秋諏日祭司倉之神通州以倉場侍郎主祭各監督陪祀京倉以本倉監督主祭各監督分行陪祀祀用帛一羊一豕一果實十盤壺一爵三鑪鐙香盤具主祭官朝服質明行事率陪祀官行二跪六叩禮上香三獻爵燎楮帛如儀右倉神五祀八蜡臣等謹按五祀之禮惟順治年中行之即於十八年停止縁當時以太廟階下合祭既停因並罷其專祀也敬謹備列以存掌故至於罷祀八蜡聖諭煌煌折中盡善實足闢千古儒説之謬仍恭載於後云順治八年定制每嵗致祭五祀之神禮臣議奏以正月祭司户之神於宫門外道左南向以四月祭司竈之神於大内大庖前中道南向以六月祭中霤之神於文樓前西向以七月祭司門之神於午門前西角樓東向以十月祭司井之神於内府大庖井前南向中霤門二祀太常寺掌之户竈井三祀内務府掌之先是於嵗暮合祭是年停止十五年復嵗暮合祭五祀之禮是年復行合祭於太廟西廡階下神位俱東向遣太常寺堂官致祭前此六月祭中霤之神於太和殿階下之東西向陳爵三羊一豕一果品五禮神制帛一遣太常寺堂官一人奠帛三獻讀祝致祭七月祭門神於午門外西旁與六月同至是合祭禮並同十八年奉聖祖仁皇帝諭㫖户竈井神停其祭祀又諭中霤門神停其祭祀時議政王大臣奏罷太廟階下合祭之祀從之雍正二年立劉猛將軍廟將軍未詳所始相傳神能驅除蝗蝻頗著顯應雍正三年奉世宗憲皇帝諭㫖舊嵗直𨽻總督李維鈞奏稱畿輔地方每有蝗蝻之害土人䖍禱於劉猛將軍之廟則蝗不為災朕念切痌瘝凡事之有益於民生者皆欲推廣行之且禦災捍患之神載在祀典即大田之詩亦云去其螟螣及其蟊賊無害我田穉田租有神秉畀炎火是蝗蝻之害古人亦未嘗不藉神力以為之驅除也因以此意曾宻諭數省督撫留意以為備蝗之一端今兩江總督查弼納奏稱江南地方有為劉猛將軍立廟之處則無蝗蝻之害其未曾立廟之處則不能無蝗此查弼納褊狹之見諷朕専恃祈禱以為消弭災祲之方也其他督撫亦多有設法祈雨祈晴之奏者夫天人之理感應不爽凡水旱蝗蝻之災或朝廷有失政則天示此以警之或一方之大吏不能公正宣猷或郡縣之守令不能循良敷化又或一郡一邑之中風俗澆漓人心險偽以致陰陽沴戾災祲洊臻所謂人事失於下則天道變於上也故朕一聞各直省雨暘愆期必深自修省思改闕失朝夕乾惕必誠必敬冀以挽回天意爾等封疆大吏暨司牧之官以及居民人等亦當恐懼修省交相誡勉改愆悔過崇實去偽人事既盡自然感召天和災祲可消豐穰可致此桑林之禱所以捷於影響也蓋惟先之以恐懼修省誠敬感格至於祈禱鬼神不過借以達誠心耳朕實有見於天人感應之至理而斷不惑於鬼神巫禱之俗習故不惜反覆明晰言之内外臣工黎庶其共體朕意四年封山東沂山廟神為佑民捍禦之神山東撫臣奏言沂山有神驅蝗顯靈請加封致祭下禮部議允之臣等謹按祈禳之典載於古訓自昔聖王側身修省祗以勤求治理為弭災致祥之要而不欲委於鬼神之難知若禦災捍患有功於民則王政祀之矣考周禮春秋祭酺鄭氏謂漢時有蝝螟之酺神宋太常因革禮亦詳酺祭皆所以驅蝗蝝芘嘉榖義至廣也萬世臣民伏讀世宗憲皇帝聖諭於幽明感應之理深切著明洵所謂先成民而後致力於神者矣乾隆十年以臣工請行蜡祭奉諭㫖不必舉行諭大學士等國家崇報之文明禋肇薦考議周詳凡祀典所闗羣神咸秩即如雩祭諸禮事繫農桑近復議行有舉無廢皆以為民也邇年以來諸臣工每以蜡祭為請朕追維舊制酌古準今有宜於詳慎者考大蜡之禮昉於伊耆三代因之所以報萬物之成也雖咏于詩詳于禮記周官而古制夐逺傳註㕘錯難以折衷所謂八蜡配以昆蟲後儒謂其害稼不當與祭月令祈年於天宗蜡祭也註云日月星辰則所主又非八神至謂合聚萬物而索饗之其神甚多尤難定位且蜡與臘冠服各殊有謂臘即蜡者有謂蜡而後臘者是古制已不可考終無定衡至於後世自漢臘而不蜡此禮已湮魏晉以來迄於唐宋時行時止或溺於五行之説甚且天帝人帝及於龍麟朱鳥多至百九十二座議者以為失先王之禮逺矣蘇軾曰迎猫則為猫之尸迎虎則為虎之尸近於倡優所為是以子貢觀於蜡言一國之人皆若狂以其沿習日乆迹類於戲也蓋祀於南郊已不合於古制而蜡於四郊則惟順成之方始祭較量區别叢雜𤨏細于義有乖于禮未洽于神為褻自元明以來停止此典實有難于舉行之處况蜡祭諸神如先嗇司嗇日月星辰山林川澤今皆祀於各壇廟原于典文無闕即民間秋成之後休息農功祀神報賽大抵借蜡之遺意以盡其閭井歡洽之情猶有吹豳擊鼓之風亦皆聴從民便未嘗禁止是蜡祭原行於民間但田夫萃處雜以嬉戲各隨其鄉之風尚初不責以儀文若朝廷議祀潔蠲䖍享必嚴肅整齊何至有一國若狂之論可知此祭即古亦閭閻相沿之舊俗詎可定以為郊廟典禮如以為有祈無報則方春而祈榖冬又有事於圜丘禮謂郊之祭為大報天又云萬物本乎天大報本也豈得謂之有祈無報乎况二仲薦馨並崇社稷班固所謂為天下求福報功者具在陳祥道所謂大社國社農之所報在焉今社稷壇春秋兩祀祈報之禮已備至義近於重複事涉於不經者即下之禮臣亦難定議因諸臣但泥古制多未深考是以特降此㫖俾共知之皇朝文獻通考卷一百五
