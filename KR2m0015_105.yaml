body:
  text: 羣祀考上京師崇祀五祀八蜡附臣等謹按我朝定制大祀中祀而外厥有羣祀皆溥利垂庥布五行而䕃兆庶及於民有捍禦功者方冊所存命祀咸秩謹依會典所列羣祀並据通禮所載别為羣祀考首列京師而直省並祀者附焉專祀于直省者次之考其由來詳厥典禮大者不誣小者不遺周禮所謂以吉禮事邦國之鬼神示於兹備矣順治元年定祭先醫之神之禮毎年春冬祀先醫於景惠殿在太醫院署内之左門曰咸濟左右有更衣室正殿南向左右歩廊東西廡廟門南燎鑪一正殿門廡覆以㼧瓦門楹丹雘梁棟五采正殿内太昊伏羲氏位居中炎帝神農氏位居左黃帝軒轅氏位居右南向配位勾芒風后東位西面祝融力牧西位東面東廡僦貸季天師岐伯伯高少師太乙雷公伊尹倉公淳于意王叔和皇甫謐抱朴子葛洪藥王韋慈藏錢乙劉完素李杲皆西向西廡鬼㬰區俞跗少俞桐君馬師皇神應王扁鵲張機華陀巢元方真人孫思邈啓元子王冰朱肱張元素朱彦修皆東向正殿以禮部尚書一人主祭兩廡以太醫院堂官二人分獻先期由禮部題請遣官行禮今由太常寺雍正十二年令太醫院御醫吏目等官咸齋戒陪祀致祭儀致祭先醫之禮嵗以春冬仲月上甲遣官將事豫日太常寺官具祝版眡割牲太醫院官潔蠲殿廡内外拂拭神座均如儀祀日五鼓太常寺官具器陳正殿正位前各設一案毎案鉶二簠二簋二籩十豆十共牛一羊一豕一前設香案各一陳鑪一鐙二配位東西各設一案毎案鉶二簠一簋一籩十豆十羊一豕一鑪一鐙二殿中設一案少西北向供祝版東設一案西向陳禮神制帛三色白香盤三尊一爵九西設一案東向陳素帛二色白香盤二尊一爵六凡牲陳於俎帛實於篚尊實酒承以舟疏布冪勺具東廡分設三案毎案簠一簋一籩四豆四琖十豕肉二統設一案陳鑪一鐙二設案一於南北向陳素帛一香盤一尊一爵三篚冪勺具西廡陳設同太常寺官設洗於咸濟東門内和聲署設樂於西階下自祭和聲先醫以後均為小祀皆用署樂詳見樂考後同承祭官拜位在殿階上讀祝拜位在殿内正中兩廡太醫院分獻官位甬道左右太常寺司祝司香司帛司爵分立祝案尊案之次典儀立殿外東階西面掌燎率燎人立於燎鑪南昧爽司祝奉祝版安於祝案承祭官暨分獻官咸朝服豫竢於太醫院鴻臚寺官引陪祀太醫院官入咸濟門内左右祗竢至時太常寺贊禮郎二人引承祭官入咸濟東門分獻官隨入贊盥洗承祭官盥畢引至拜位前立典儀贊執事官各共廼職贊禮郎贊就位承祭官暨分獻官陪祀官均就位立典儀贊迎神樂作贊禮郎引承祭官由殿左門入詣正中香案前贊跪承祭官跪贊上香司香跪奉香承祭官上炷香三上瓣香興以次詣左右正位前上香如儀配位司香官分詣各案前跪上香兩廡贊禮郎引分獻官分詣兩廡位前上香畢贊復位承祭官復位分獻官各復位贊跪叩興均行三跪九叩禮典儀贊奠帛爵行初獻禮有司揭尊冪勺挹酒實爵司帛奉篚司爵奉爵以次詣各神位前司帛跪奠篚於案三叩興司爵立獻爵奠於墊中皆退贊禮郎贊詣讀祝位引承祭官就讀祝位立司祝至祝案前跪三叩興奉祝版跪案左樂暫止贊禮郎贊跪均跪贊讀祝司祝讀祝辭曰維某年月日皇帝遣某官某致祭於太昊伏羲氏炎帝神農氏黃帝軒轅氏曰古昔聖人德澤深宏創制醫藥拯濟斯世仁壽庶民兹當仲春冬曰仲冬謹以牲醴致祭惟神慈惠蠲除疾疢篤佑朕躬致和天下配以勾芒氏祝融氏風后氏力牧氏之神尚饗讀畢奉祝版跪安太昊伏羲氏神位前篚内叩如初退樂作贊禮郎贊叩興均行三叩禮贊復位引承祭官復位配位及兩廡執事生奠帛奠爵畢各退典儀贊行亞獻禮正位司爵配位及兩廡執事生各奠爵於左如初獻儀典儀贊行終獻禮各奠爵於右如亞獻儀典儀贊徹饌有司徹畢贊送神贊禮郎贊跪叩興均行三跪九叩禮樂止典儀贊奉祝帛饌送燎有司奉祝帛香饌以次恭送燎所如儀贊禮郎引分獻官鴻臚寺官引陪祀官皆退承祭官避立拜位旁西面竢祝帛過復位立典儀贊望燎贊禮郎引承祭官由咸濟東門出詣望燎位眡燎贊禮畢樂止承祭官退執事各官皆退右先醫廟順治元年定祭關帝之禮初定制致祭於地安門外之西白馬關帝廟嗣是屢加崇修廟南向三門正殿三間三出陛各五級東西廡東廡南燎鑪一廡北各有齋室後殿五間東西廡燎鑪如前殿殿後祭器庫治牲所皆具凡正殿門廡覆以緑琉璃餘均㼧瓦門楹丹雘棟梁五采圍垣周六十丈前殿之西有御碑亭一初定祭禮嵗以五月十三日遣官致祭由太常寺先期題請即遣本寺堂官行禮九年勅封忠義神武關聖大帝雍正三年勅封關帝三代公爵定春秋祭禮置五經博士以奉祀事給事中李蘭奏請追封關帝祖父爵號下禮部議行禮臣議蘭原奏所稱聖蹟圖志乃近時盧湛所撰與正史不合尊崇正神理宜詳慎亞聖孟子之父未詳名諱止稱先賢孟孫氏所以闕疑也應照此例追封關帝三代俱為公爵牌位止書追封爵號不著名氏於京師白馬關帝廟後殿供奉遣官告祭其山西解州河南洛陽縣塚廟并各省府州縣擇廟宇之大者置主供奉後殿春秋二次致祭從之於是封曾祖為光昭公祖為裕昌公父為成忠公又以後裔之在洛陽者授為世襲五經博士以奉祀事四年以山西巡撫伊都拉言於原籍解州置博士奉祀如洛陽五年以關帝廟重修告成定春秋致祭之儀前殿牲用太牢遣大臣將事行三跪九叩禮後殿牲用少牢遣太常寺堂官行二跪六叩禮餘儀皆同五月十三日致祭用牲牢果實七年定直省祭關帝廟嵗三祭皆用太牢十年以湖北巡撫王士俊言於當陽縣增置博士以奉塚墓之祀十一年世宗憲皇帝御製後殿崇祀三代記文立碑建亭告成之日今上皇帝以親王奉命致祭乾隆二十五年易關帝原諡為神勇先是山東按察使沈廷芳奏言關帝封號雖尊諡法未協請議更易以光典冊詔是之乃以二字易原諡三十三年加封關帝為忠義神武靈佑關聖大帝四十一年詔易關帝原諡為忠義奉諭關帝在當時力扶炎漢志節凛然乃史書所諡並非嘉名陳壽於蜀漢有嫌所撰三國志多存私見遂不為之論定豈得謂公夫以神之義烈忠誠海内咸知敬祝而正史猶存舊諡隱寓譏評非所以信萬世也今當抄録四庫全書不可相沿陋習所有志内關帝之諡應改為忠義著將此㫖刊載傳末用垂久逺致祭儀毎嵗春秋仲月致祭關聖大帝太常寺諏吉日奏聞遣官將事是日昧爽廟祝潔掃殿宇内外太常寺官具祝版備器陳神位前牛一羊一豕一登一鉶二簠簋各二籩豆各十鑪一鐙二殿中設一案少西北向供祝版東設一案陳禮神制帛一色白香盤一尊一爵三牲陳於俎帛實於篚尊實酒冪勺具和聲署設樂於西階上太常寺設洗於東階上承祭官拜位在階上正中司祝司香司帛司爵典儀掌燎各以其職為位質明承祭官朝服詣廟贊引太常寺贊禮郎二人引承祭官由廟左門入至東階上盥手引詣拜位前立典儀贊執事官各共廼職贊禮郎贊就位引承祭官就位立典儀贊迎神樂作贊禮郎贊詣上香位引承祭官入殿左門就香案前立贊上香司香跪奉香承祭官上炷香三上瓣香贊復位引承祭官復位立贊跪叩興承祭官行三跪九叩禮典儀贊奠帛爵行初獻禮有司揭尊冪勺挹酒實爵司帛奉篚司爵奉爵各進至神位前司帛跪奠篚於案三叩興司爵立獻爵於案正中各退司祝詣祝案前跪三叩興奉祝版跪案左樂暫止贊禮郎贊跪承祭官跪典儀贊讀祝司祝讀祝辭曰維某年月日皇帝遣某官某致祭於關帝之神曰惟神秀毓山河名垂今古英風正氣世歴久而彌新大節純心史相傳而莫匹念神靈之顯著命典禮以優隆兹當仲春秋曰仲秋用昭時饗尚其歆格鑒此精䖍尚饗讀畢興以祝版跪安於篚内叩如初退樂作贊禮郎贊叩興承祭官行三叩禮典儀贊行亞獻禮司爵獻爵於左贊行終獻禮司爵獻爵於右均如初獻儀典儀贊徹饌有司徹畢贊送神贊禮郎贊跪叩興承祭官行三跪九叩禮樂止典儀贊奉祝帛饌送燎有司奉祝帛香饌以次送燎如儀贊望燎贊禮郎引承祭官詣望燎位眡燎贊禮畢樂止皆退同日祭後殿以太常寺卿一人將事光昭公位中裕昌公左成忠公右均南向位各異案毎案羊一豕一鉶二簠簋各二籩豆各八鑪一鐙二殿中設一案少西北向供祝版東西各設一案分陳禮神制帛三色白香盤三尊三爵九俎篚冪勺具設洗於後垣門之内甬道東承祭官位殿檐下正中司祝帛香爵典儀贊禮郎掌燎各以其職為位質明承祭官由前左門人後垣中門盥手升階就位迎神引詣正位前上香以次詣左右位前上香復位行二跪六叩禮初獻讀祝如儀祝辭曰維某年月日皇帝遣某官某致祭於關帝之曾祖光昭公祖裕昌公父成忠公曰惟公盛德相承令儀足式歴數傳之積累遂鍾河嶽精靈儲曠代之威名堪作巖廊矩矱殊恩既沛於三世時饗宜錫於上公兹當仲春秋曰仲秋用昭祀事籩豆致潔典禮加隆尚饗凡行禮儀節均與前殿同嵗五月旬有三日致祭前殿牲太牢無豋鉶諸器陳果實五盤祝辭曰惟神純心取義亮節成仁允文允武乃聖乃神功高當世德被生民兩儀正氣歴代明禋英靈丕著封號聿新敬修嵗事顯佑千春同日祭後殿牲少牢陳果實司爵以執事生不贊徹饌祝辭曰禮隆報祀誼重推恩當崧生嶽降之期溯木本水源之始煇煌棟宇慿依已妥於上公修潔豆籩將享告䖍於仲夏惟神昭鑒尚其歆格其前後殿行禮諸儀并同春秋祀禮各直省祭關帝廟均以春秋仲月及五月十三日致祭前殿主祭以地方正官一人後殿以丞史執事以禮生祭日陳設禮儀並與京師同右關帝廟順治二年致祭都城隍之神定嵗祭之禮是年以八月二十七日遣太常寺堂官致祭行禮自後嵗以為常廟在都城宣武門内南向廟門順德門闡威門凡三重左右有門前殿五間東西廡迴廊連檐通脊甬道西燎鑪一後殿五間闡威門外東為治牲所井亭門之左右為鐘鼓樓周垣二百十有三丈雍正四年重修御製記文立碑建亭於殿前之東命親王致祭行禮八年定萬壽聖節致祭之禮是嵗禮部會議祀典請於萬壽聖節仍照舊例遣官致祭東嶽真武城隍之神祭之前期由太常寺題請遣官雍正三年令太常寺開列大臣職名請㫖欽㸃致祭雍正四年建禁城城隍神之廟九年建皇城城隍神之廟一在禁城之西北隅一在西安門内曰永佑宫嵗以萬壽聖節及季秋遣内務府總管各一人致祭如祭都城隍廟之禮致祭儀毎嵗萬壽聖節遣官致祭都城隍之神是日廟祝潔掃廟宇内外太常寺具祝版備器陳牛一羊一豕一果實五盤鑪鐙具設案一於殿中少西北向供祝版設案一於東西向陳禮神制帛一色白香盤一尊一爵三設洗於東階下和聲署設樂於西階上承祭官拜位在階上正中太常寺司祝司香司帛司爵分立尊案祝案之次典儀立殿外東檐下掌燎率燎人立燎爐之前均如常儀黎明承祭官朝服詣廟贊引太常寺贊禮郎二人引承祭官由左側門入贊盥洗承祭官盥訖引升東階至拜位前北面立典儀贊執事官各共廼職贊禮郎贊就位承祭官就位立典儀贊迎神樂作贊禮郎贊就上香位引承祭官入殿中門至香案前立贊上香司香跪奉香承祭官上炷香三上瓣香贊復位引承祭官復位贊跪叩興承祭官行三跪九叩禮典儀贊奠帛爵行初獻禮司帛跪獻篚於案三叩興司爵立獻爵於正中皆退司祝詣祝案前三叩興奉祝版跪案左樂暫止典儀贊讀祝贊禮郎贊跪承祭官跪司祝讀祝辭曰維某年月日皇帝遣某官某致祭於