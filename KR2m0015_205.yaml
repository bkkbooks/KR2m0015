body:
  text: 刑考十一徒流乾隆三十一年申定問擬旗人㝷常罪名及因公獲譴仍行折枷鞭責例定例八旗人等遇有流徒罪名均折枷責完結嗣因旗人漸染惡習有甘為敗類者特㫖令將旗人流徒案件滿洲則按罪輕重分别問遣折抵漢軍則均斥令為民照所犯定例發遣至是問刑衙門有將内務府漢軍㝷常案犯因公獲罪之人援例概斥為民者諭曰内務府漢軍皆係世僕向無出旗為民之例與八旗漢軍又自有别不應混行援引嗣後問擬旗人罪名務詳核案情如實係寡亷鮮恥有玷旗籍者不但漢軍當斥令為民依律發遣即滿洲亦當削其名籍投畀逺方其餘㝷常罪犯及因公獲譴者無論滿洲漢軍仍照定例折枷鞭責完結㝷刑部奏定䝉古旗人有犯亦如此例行更定發遣烏嚕木齊人犯概行僉妻例先是甘肅廵撫呉逹善以甘省軍務未竣兼逢嵗歉請將僉解人犯暫停發徃刑部議准嗣後一應軍流遣犯均毋庸僉配至是辦理屯田大臣阿桂奏烏嚕木齊地畆甚多請將應行發遣之人並僉妻發徃其罪不至僉妻而情願攜𢃄者官給與路費車輛資送大學士等議應如所請從之是月刑部又奏准應發烏嚕木齊等處人犯除伊妻實係殘廢篤疾或年逾六十及該犯父母老病應留侍養者准其免僉外其餘概僉妻發配軍流人犯改發烏嚕木齊等處者並同此例定改發烏嚕木齊等處人犯限年無過編入民籍例軍機大臣議准改發烏嚕木齊等處人犯如果悔過悛改視其原犯情罪輕重定限或三年或五年編入該處民户册内給與地畆令其耕種納糧若未經到配中途身故其妻或因到配已近不願回籍或子年長成堪勝力作情願到配為民者仍行發徃即入各該處民籍安揷耕種不必令其為奴如寡妻弱子不勝力作或自願回籍者照例遞回原籍至已經到配年限未滿本犯身故其妻子即照年限已滿例編入民籍安揷不為奴増定發遣烏嚕木齊等處人犯解至陜省雖遇隆冬盛暑不准停遣例定遣發各例刑部奏准凡旗人犯發遣者分發黒龍江寜古塔吉林烏拉等處當差旗人家奴發遣黒龍江等處為奴若民人犯發遣者民人詐稱賣身在旗者謊稱八旗逃人者假稱逃人具呈行詐者賣逃買逃者俱發黒龍江寧古塔等處給披甲人為奴若窩留强盗三人以上者發雲貴兩廣極邉烟瘴地方其行刼數家止首一家者竊盗臨時拒捕殺人為從者發雲貴兩廣烟瘴少輕地方嚴行約束仍照例分别刺字詳定私鹽拒捕傷一人為從例定例聚衆十人以上帶有軍噐興販私鹽拒捕傷一人者為首擬絞監候下手者發邉衛充軍為從滿流至是刑部以從犯之中原有兩項一係下手傷人者故擬軍一係未曽傷人止於随從附和故擬流自應以下手傷人為從之犯改發黒龍江為奴至豪强鹽徒拒敵官兵傷一人為從較此條更重不應仍照舊例發邊衛充軍應一併改發黒龍江從之六月増定流徒人犯脱逃條例定例原犯流罪者初次脱逃枷號一月責四十板加徒三年二次脱逃枷兩月責四十板徒四年三次脱逃改發邉衛充軍至是刑部奏定此等罪犯不論次數原犯流二千里者改二千五百里二千五百里者改三千里三千里者改附近充軍各照例枷責發落又免死减等流犯定例計初次二次三次論枷責徒役及邉衛與極邉衛充軍枷兩月責四十板至是亦改不論次數俱改發邉衛充軍又定例徒役限内脱逃者一日笞五十每三日加一等罪止杖一百仍發配所照犯徒年分從新拘役中途在逃者亦如之至是改定中途脱逃被獲者各於本罪上加一等如徒一年者加為徒一年半以次遞加至准徒五年徒五年者改為杖一百流二千里定遣犯身故家屬回籍不准官為資送例定例遣犯身故家屬回籍地方官按程給與口糧至是部議新例僉遣人犯情願擕帶子女官為資送者惟發徃烏嚕木齊一項人犯其餘内地人犯妻子概不資送又本犯身故妻子情願回籍者亦不與資送請著為例從之三十二年定差役疎縱新疆人犯改發伊犁等處例定例差役疎縱遣發新疆人犯脱逃問絞監候一年不獲請㫖正法至是奉諭改定為首情重者發伊犁等處其由新疆改烟瘴及黒龍江等處人犯脱逃兵役疎縱亦照此例詳見刑制門定改發新疆人犯仍發内地條例大學士忠勇公傅恒㑹同刑部定議前因伊犁烏嚕木齊等處列屯耕收力作需人於内地軍流人犯内酌其情節較重者改發種地兵丁為奴定例以來各省改發積乆人多恐滋擾害請於原例應發内地改發新疆人犯内如三次犯竊計贓五十兩以下至三十兩者搶竊滿貫擬絞秋審緩决一次者竊盗三犯贓至五十兩擬絞秋審緩决一次者積匪猾賊並囬民犯竊結夥三人以上及執持繩鞭噐械者發遣雲貴兩廣烟瘴刨參人犯在配脱逃者仍照原例所定地方發遣强盗窩主造意不行又不分贓者竊盗臨時拒捕傷非金刃傷輕平復者搶奪傷人為從者發掘他人故塜見棺槨為首及開棺見屍為從者竊贓數多罪應滿流者三次犯竊計贓三十兩以下至十兩者前項人犯從前已照原例應配地方充發在配為匪脱逃者殺一家非死罪三人之妻子並未同謀加功者俱照各本例加等改定地方充發行竊軍犯在配復行竊者改發極邉烟瘴充軍姦婦抑媳同䧟邪滛致媳情急自盡者盛京旗下家奴為匪逃走犯至二次者俱酌發駐防兵丁為奴俱停止發徃新疆其兇徒因事忿争執持軍噐毆人至篤疾者偷盗圍塲木植牲畜犯至二次三次者旗下正身犯積匪者拿獲逃人不將實在窩留之人指出再行妄扳者移住拉林閑㪚滿洲有犯二次逃走尚未出境者派徃各省駐防滿洲兵丁臨行及中途脱逃者六條仍行發徃從之互見刑制門三十三年定流犯在配脱逃按配所定地充發例先是三十一年定例流犯脱逃照軍犯脱逃之例逓行改發至流三千里者發附近充軍免死减等流犯改發邉衛充軍至是廣西按察使圖桑阿奏言附近充軍計程止二千里邉衛充軍止二千五百里以流三千里之犯因逃加等充軍乃按道里較近未免欲重反輕㝷經部議凡此等脱逃流犯改發附近及邉衛充軍者俱就其現配地方計程發配若現配地方應配之所即係原籍相近之處而又地處邉境再無别處可以改發者仍從其原籍改發倘原籍改發之所又較原配相近則視其拿獲地方改發均各照例枷責互見刑制門三十四年定房主窩留造賣賭具分别乆近問擬徒流例凡容留製造賭具之房主在一年以外者發邉逺充軍一年以内杖一百流二千里半年以内杖一百徒三年詳見刑制門定新疆改發内地人犯面刺改遣字例如應刺事由者并刺事由若犯事到官年在五十以上及成殘廢者仍照本例刺字臣等謹按三十九年六月刑部奏改罪犯五十以上十五以下及成殘廢者毋庸刺改遣字應刺事由者仍刺事由定改發烟瘴賊犯在配復犯竊盗例廣東按察使富勒渾條奏凡改發極邊烟瘴充軍之竊盗在配復犯行竊如審係一時掏摸計贓無㡬及偷摘蔬果罪止杖責者即於遣所枷號三個月計贓復犯徒罪者枷號一年復犯流罪者枷號二年復犯軍罪者枷號三年令地方官按月㸃邜騐封發市示衆若計贓滿貫復犯死罪者擬以絞决改定尊長被殺子孫受賄私和例刑部議准御史成徳條奏無論贓數多寡俱擬杖一百流三千里詳見刑制門改定娶親屬妾擬流例舊例收伯叔兄弟之妾者减妻罪二等滿徒至是御史成徳條奏請照姦伯叔兄弟妾律减妻一等杖一百流三千里從之互見刑制門改定比照大逆罪犯之祖父分晰减流例刑部遵㫖議定該犯之父實不知情並不同居無從覺察審有實據者照謀叛之犯父母流二千里律改為流三千里安置其比照反逆縁坐之祖父及伯叔父亦一體分晰减流詳見刑制門増定已聘未娶之妻犯姦本夫殺死姦夫分别徒流例詳見刑制門三十五年定誣告人為竊盗者發邊逺充軍例凡將良民誣指為竊及寄賣賊贓捉拿拷打嚇詐財物或以起贓為由沿房搜撿搶奪財物滛辱婦女除實犯死罪外其餘不分首從俱發邉逺充軍若誣指為强盗而有前項拷詐等情節者俱發極邉烟瘴充軍互見刑制門増定偷竊衙署未得財擬徒例凡已行而未得財者照盗倉庫錢糧未得財例杖一百徒三年仍分别首從問擬定竊盗脱逃致事主身死審無拒闘情形贓少罪輕不至滿徒照因姦釀命例杖一百徒三年詳見刑制門改定偷刨人參各條例凡身充財主雇人刨採及積年已過三冬者不論參數多寡俱發雲貴兩廣烟瘴地方管束若係各出資本及受雇偷採或隻身潛徃得參者均杖一百流三千里未得參者杖一百徒三年旗人犯該軍流者銷去旗檔照民人問擬犯該徒罪者仍免其充配折枷號兩個月如有再犯不分刨參已得未得俱銷去旗檔問擬附近充軍旗下家奴發駐防兵丁為奴定内務府所屬莊頭鷹户海户人等犯軍遣流徒等罪照民人一體定擬例詳見刑制門三十六年増定閩省金刄傷人問擬杖徒之犯再犯金刄傷人發近邉充軍例詳見刑制門定八旗發遣人犯在配病故妻子分别回旗例刑部奏定凡八旗發遣人犯内如搶奪殺人下手為從者竊盗臨時拒捕殺人為從者竊盗三犯計贓五十両以下至三十両者旗人三犯竊盗折枷後又犯竊計贓五十兩以下者攔路截袋穵越倉牆偷米不至死罪者偷採人參人至四十名以上參至五十兩以上為從者兇徒生事行兇者誘拐婦人子女被誘之人不知情及迷拐㓜小子女為從者夥衆開窑誘取婦人子女藏匿勒賣為從者圖財害命不行而分贓及傷人未死不加功而已得財者夥衆搶去良人子弟强行鷄姦之餘犯問擬發遣者兇徒圖財放火因而焚壓致斃人命情有可原者强姦十二嵗以下㓜女未成者指稱鷄姦誣告人至死罪未决者此等情重各犯在遣所病故所有妻子概不准擕骸回旗其餘本犯身故妻子情願擕骸回旗者該管將軍詳叙原案情罪咨部核議辦理改定偷刨人參計數治罪例凡旗民人等偷刨人參人至四十名以上參至五十兩以上為從人犯發雲貴兩廣烟瘴地方詳見刑制門刪改邉外為民條例詳見刑制門嚴押解人役凌虐罪囚罪犯徒罪以上發烟瘴充軍例詳見刑制門定越訴誣告主唆充軍例凡奏告機密重事不實並全誣十人以上者發邉逺充軍其不干己事别無冤枉並究追主使之人一體問罪俱發近邉充軍定川省嘓匪在野攔搶止二三人者犯該徒罪以上不分首從俱發雲貴兩廣極邉烟瘴地方嚴行管束例詳見刑制門定以妻女典雇騙財行兇邀搶例刑部奏定將妻妾作姊妹及將妻女并姊妹嫁賣與人作妻妾使女名色騙財之後設詞托故公然領去者照誆騙例治罪若瞰起程中途聚衆行兇邀搶人財者除實犯死罪外其餘俱發近邉充軍媒人知情罪同増定充軍道里例凡問該充軍者附近發二千里近邉發二千五百里邉逺發三千里極邉烟瘴俱發四千里定地發遣充軍人犯在京兵部定地在外廵撫定地仍抄招知㑹兵部増定解送軍營馬匹倒斃例三十匹以上者杖六十徒一年三十五匹以上者杖七十徒一年半四十匹以上者杖八十徒二年四十五匹以上者杖九十徒二年半五十匹以上者杖一百徒三年詳見刑制門定奉天所屬民人有犯軍流徒罪者俱照各省民人犯罪例一體問發不准折枷完結定民人於新疆犯事不准改發内地例詳見刑制門定僉發軍流人犯聽各省廵撫均匀撥發州縣安挿例刑部奏定各省僉發軍流人犯俱按照軍流道里表内應發省分照改發遣犯之例毋庸指定府州悉解廵撫衙門聴該撫按其所犯罪名倣照軍流道里表酌量州縣大小逺近均勻撥發起解省分將解發軍流人犯於起解之先預行咨明該撫先期定地飭知入境首站州縣隨到隨發毋使壅積三十七年定旗人發徃黒龍江新疆及各處駐防當差人等限年無過編入本地丁册例定由新疆條欵改發雲貴兩廣烟瘴地方人犯無論在四千里内外均編發有烟瘴省分安置其籍𨽻烟瘴人犯於隔逺烟瘴省分調發定由烟瘴改發極邉人犯面刺烟瘴改發四字例定軍民人等逼廹本管官致死為從發近邊充軍例詳見刑制門定旗下家奴發遣俱行僉妻例詳見刑制門増定姦夫起意謀死姦婦本夫前妻子女其本夫尚别有子嗣者本婦發伊犁給與兵丁為奴例増定親母因姦謀死子女發伊犁給與兵丁為奴例詳見刑制門定軍流徒罪起解不得過百日例浙江按察使郝碩奏准凡軍流徒罪以奉文日為始定限兩個月起解如實係患病逾限不能起解准將縁由詳明督撫咨部查核其病限不得過百日若過限不行發解者將州縣官及未經行催之上司分别議處三十八年増定囬民結夥搶奪分别人數情罪定擬例詳見刑制門定烏嚕木齊伊犁為奴人犯分别减限為民例烏嚕木齊辦事大臣索諾木䇿凌奏准凡發遣烏嚕木齊伊犁為奴人犯在鉛鉄兩厰打礦挖採果能實心出力例應五年為民者准其减去二年三年為民者减去一年永逺當苦差者五年後即准為民均免其挖採若為奴人犯業已為民及當差種地之人有情願在厰効力幫貼實心出力者定限八年該處大臣查其所犯原案尚屬較輕叙明情由奏聞應否發回原籍之處㳟候欽定定改發新疆人犯期滿應否囬籍請㫖例諭遣發新疆人犯其情罪較軍流為重軍流各犯既到配所雖遇赦不准赦還今以軍流不足蔽辜之犯改發新疆期滿後仍得奏請回籍是名為從重轉視軍流减輕嗣後發徃新疆効力人犯如其本罪不至軍流到戍後尚知奮勉自効者仍著該管官酌量奏聞請㫖若其情罪較重由軍流加等改遣者即不當復令回籍著交刑部另行詳悉具奏㝷議定限十年具奏一次其應否准另囬籍之處㳟候欽定從之臣等謹按四十年六月刑部奏准凡兵丁閑㪚人等原犯軍流因情重改發新疆不准回籍者即於擬罪摺内聲明永逺不准回籍定私入盛京圍場分别問擬軍徒例詳見刑制門定民人毆死贖身放出奴婢及奴婢之子女者杖一百徒三年毆死族中奴婢杖一百流三千里互見刑制門三十九年定㰱血訂盟為從軍流例凡異姓人但有㰱血訂盟焚表結拜弟兄為首者絞監候為從減一等若聚衆至二十人以上為首擬絞立决為從發雲貴兩廣極邊烟瘴充軍其無㰱血焚表事情止序齒結拜衆至四十人以上為首者絞監候為從減一等若年少居首即屬渠魁首犯絞决為從發雲貴兩廣極邉烟瘴充軍如序齒結拜數在四十人以下二十人以上為首者杖一百流三千里為從減一等詳見刑制門定私拆軍營文移滿流例凡軍營來徃文移札禀有闗軍需糧餉調遣兵馬及陞調恭革官員等項書吏人等私自拆閱問擬滿流詳見刑制門定打射禽獸不期殺人擬徒例刑部奏定凡民人捕獵遇有施放鎗箭打射禽獸不期殺人者比照捕户於深山曠野安置窩弓不立望竿因而傷人致死律杖一百徒三年仍追埋塟銀一十兩給與死者之家定莊屯居住旗人及各處莊頭并駐防無差使者犯軍遣流徒照民人一例辦理互見刑制門四十年改定大逆縁坐有職人員仍發為奴例刑部遵㫖改定凡實犯大逆之子孫縁坐發遣為奴者雖係職官及舉貢生監應與强盗免死減等發遣為奴人犯俱不准出户倘逄恩赦亦不得與㝷常為奴遣犯一體辦理詳見刑制門定毆死為奴遣犯妻子擬徒例凡發遣黒龍江為奴人犯有自行擕帶之妻子跟隨本犯在主家倚食服役被主責打身死者照毆死雇工人例擬杖一百徒三年其妻子自行謀生不隨本犯在主家倚食者仍以凡論定親屬犯姦至死罪者若强姦未成發近邊充軍例定新疆等處滿漢屯兵有犯脱逃即從新疆立限留屯例烏嚕木齊辦事大臣索諾木䇿凌奏准凡派徃烏嚕木齊伊犁等處换班種地滿漢屯兵遇有脱逃除依現行之例按照初次二次投回拏獲分别辦理外從新留屯五年折磨差使如果别無過犯該處辦事大臣查明准其回籍互見刑制門定厄魯特人犯發遣例烏什辦事大臣綽克托奏准凡生事之厄魯特犯該發者俱停發伊犁解京轉發烟瘴地方充軍四十一年定拏獲軍營脱逃餘丁遣發例凡附近新疆陜甘二省之人改發雲貴兩廣極邊烟瘴充軍其餘各省俱發伊犁烏嚕木齊安揷面刺脱逃餘丁字様詳見刑制門改定男子拒姦殺人減等杖流例詳見刑制門定另户旗人逃走例凡另户滿洲蒙古逃走一月以内投囬及拿獲應發伊犁之犯如於刑部審結交旗起程時復犯逃走被獲者擬絞監候自行投回者枷號三個月仍發伊犁交該管官嚴行管束定軍營逃兵投首在軍務未竣以前者發烏嚕木齊等處給種地兵丁為奴例詳見刑制門増定殺一家四命以上妻女改發伊犁給厄魯特為奴例詳見刑制門増定互毆致死多命案内紏衆傷人之餘人杖流例舊例餘人不論多寡已未傷人概杖一百至是改定如有輾轉紏人助勢及執持金刄噐械傷人者比照原謀滿流律減一等杖一百徒三年詳見刑制門増定毆故殺人案内聴從擡屍浬藏杖徒例在塲幫毆有傷律應滿杖者照棄屍不失律杖一百徒三年未經傷人者照里長地鄰棄屍水中為首律杖六十徒一年詳見刑制門定救親情切毆傷伯叔杖徒减等例實係情切救䕶者照律擬以杖一百徒三年刑部夾簽聲明量減一等互見刑制門改定强娶孀婦致死發近邊充軍例詳見刑制門四十二年申定呈告忤逆事實即行發遣例凡祖父母父母呈首子孫懇求發遣及屢次違犯忤逆顯然者即將被呈之子孫發烟瘴地方充軍旗人發黒龍江當差詳見刑制門嚴回民結夥行兇問擬軍徒例時山東定陶縣回民沙振方聚衆逞兇毆傷多人刑部奏准嗣後遇有回民結夥三人以上執持兇噐毆人之案除致斃人命罪應擬抵之犯仍照民人定擬外其餘紏夥共毆之犯發雲貴兩廣極邉烟瘴充軍如結夥雖在三人以上而俱徒手争毆並未執持兇噐者於軍罪上減一等杖一百徒三年結夥在十人以上雖無執持兇噐而但毆傷人者仍照三人以上執持兇噐之例定擬互見刑制門定滇省出口私販為從之罪共夥人數在一二十人以上為首絞决為從及數在四人以上不及十人者俱發遣黒龍江等處若止三人以下者僉妻流徙三千里詳見刑制門定新疆罪犯年老酌量當差例伊犁將軍伊勒圖奏准凡犯罪發徃伊犁等處種地人犯如年老力衰不能耕種納糧者令該將軍等酌量該犯年力應當差使責令承充官給與半分口糧以資養贍仍令該管處管束四十三年定遣發駐防兵丁為奴人犯停止賞給將軍都統例先是三十三年發遣寧夏為奴人犯格圖肯經將軍傅良調任帶徃西安後傅良進京又將格圖肯等帶至京城致格圖肯於是年四月挈妻逃走旋經該旗兵部恭奏奉諭此等發遣駐防省城為奴之犯並非賞給功臣之人自應賞給該處官兵從前賞給將軍副都統等及可以隨帶别省之處均屬不合嗣後賞給為奴人等内除應例賞功臣之外所有發遣各處駐防者俱著賞給彼處官兵人等為奴其賞給將軍副都統之處永行停止著為令互見刑制門定厄魯特為奴人犯滋事發徃烟瘴賞給兵丁為奴例刑部奏准凡新疆及内地遇有為奴之厄魯特酗酒滋事俱發徃烟瘴地方交與該營鎮協在兵丁内揀選力能管束之人賞給為奴嚴加約束定大夥私梟案内私售窩頓人等發遣為奴例大夥梟徒拒捕傷差案内凡私售之竈丁及窩頓之匪犯俱發徃伊犁烏嚕木齊等處為奴互見刑制門定白役詐贓逼命正役分别問擬遣發杖流例詳見刑制門定州縣武職官員僉差不慎致斬絞立决重囚脱逃杖七十徒一年半例詳見刑制門四十四年増定問擬五軍及總徒准徒於擬罪處添入杖一百折責發落字様大理寺少卿虞鳴球奏定律内五徒三流各載明杖數至五軍及發遣較重於流即雜犯三流總徒四年雜犯斬絞總徒五年其罪亦較五徒更重均應滿杖乃律内俱未載應决杖數是以軍遣及雜犯准徒外省題咨案内多不聲明應杖迨議覆到配該配所州縣見文内未載杖數亦止安揷收管是重於㝷常流徒之犯轉得從輕倖免杖决請於律内軍遣及總徒准徒項下逐一載明庶可辦理畫一㝷經部議凡問擬五軍及總徒准徒罪名者於逐案題稿引律出語内添入仍依名例至配所應杖之數折責例杖一百折責發落語句從之定閩省花㑹分别首從問擬例起意為首者發邊逺充軍夥同紏人者杖一百流二千里在場幫收錢文等犯杖一百徒三年詳見刑制門改定殺一家非死罪四命將兇犯父子照數擬抵其有浮於所殺之數以㓜者同妻女改發伊犁給厄魯特為奴例詳見刑制門更定改發内地十六項人犯仍發新疆例先是三十二年因新疆遣犯聚集過多遵㫖議定將應發新疆條内按其情節以六條仍發新疆以一十六條均改發内地分别烟瘴等項充軍至是烏嚕木齊都統索諾木策凌奏巴里坤屯田缺額請將從前新疆改發人犯仍行發徃擇其情節輕者種地當差情節較重者給與兵丁為奴㝷經部議於改發内地十六條内應發極邉烟瘴等項八條仍發徃伊犁烏嚕木齊等處給與兵丁為奴其應發附近近邊邊逺等項八條發徃新疆交該都統酌撥種地當差從之定傷人夥盗自首發遣例如係聞拿投首者發黒龍江等處給披甲人為奴詳見刑制門定乗火搶奪為首杖一百流二千里為從杖一百徒三年例詳見刑制門四十五年定匪徒明知竊情説合贖贓分别徒流例時廣西廵撫李世傑題奏桞城縣民葛精怪紏夥肆竊牛馬羊隻葛應鉅葛應彩姚英士包庇賊匪勒贖分贓分别問擬絞决發遣經刑部奏定兩廣兩湖及雲貴等省凡有匪徒明知竊情並不幫同鳴官反表裏為奸逼令事主出錢贖贓俾賊匪獲利以至肆無忌憚深為民害者照為賊探聴事主消息通線引路者照强盗窩主不行又不分贓杖流律减一等杖一百徒三年如有貪圖分肥但經得贓者不論多寡即照强盗窩主律杖一百流三千里定盛京圍場處所偷伐木植問擬徒流例詳見刑制門定軍流徒犯無論應否留養於到案日供内叙明有無祖父母父母兄弟子孫及年嵗例詳見刑制門増定盗砍他人墳樹例刑部奏定砍他人墳樹除犯案僅止一二次所竊株數無多者仍照本例擬以枷責外如犯案至三次者即照竊盗三犯本例計贓分别擬以流遣其紏黨成羣旬日之間疊次竊砍至六次以上而樹數又在二三十株以上情同積匪者無論從前曽否犯案即照積匪猾賊例擬遣如連竊砍在三次以上而始犯案者照積匪例量減擬徒仍各按竊盗本例刺字互見刑制門増定積匪猾賊分别次數問擬遣徒例詳見刑制門定發遣黒龍江等處為奴人犯在配行竊四次永逺枷號例刑部奏定發遣黒龍江等處為奴人犯行竊犯案在三次以下者仍照本例辦理外如有在配犯案至四次者即擬以永逺枷號遇赦不准援免四十六年定行營地方金刄傷人發伊犁給厄魯特為奴例詳見刑制門定調姦未成和息後羞忿自盡該犯發遣例凡調姦婦女未成業經和息之後如有因人恥笑其夫與父母親屬及本婦復追悔抱忿自盡致死二命者將調姦之犯發烏嚕木齊等處充當苦差詳見刑制門定邪教案内遣犯停止發徃奉天新疆等處例各省邪教為從之犯罪應擬軍及照名例發遣者俱改發雲貴兩廣烟瘴地方充軍其雲貴兩廣四省邪教從犯發徃四川福建二省安揷此等人犯内如有情節較重者各於到配後再加枷號六個月所有奉天吉林及伊犁烏嚕木齊各處均停止編發嚴嘓匪在野攔搶加重治罪例四人以上至九人者不分首從改發伊犁給厄魯特為奴數至十人以上為首擬斬立决為從擬絞監候被脅同行者發遣為奴詳見刑制門四十七年定情重改發新疆之犯年滿發交應配地方安揷例時有改發伊犁人犯要俊卿當差年滿經將軍伊勒圖奏請回籍奉諭要俊卿一犯因圖避處分誣禀上司居心險詐情節較重本擬按律杖流從重改發伊犂今以年滿釋回則較原擬流罪不准限年囬籍者轉輕是雖嚴而實寛不足以昭平允嗣後遇有此等發徃新疆之犯年滿時仍將該犯發交應配地方定地安揷遇有恩釋再行回籍著為令㝷經部議凡情節較重改發新疆者十年期滿該將軍遵例奏聞將該犯解交陜甘總督查明原籍按軍流道里指定應配地方即轉解該省交該督撫酌量安揷遇有恩赦再行奏請釋回至旗人改發期滿之犯奏聞後將該犯解交刑部按應得罪名折枷滿日鞭責釋放從之改定誤執傷㾗誣告人命致尊長卑㓜屍遭蒸檢分别治罪例詳見刑制門定奉天省發遣人犯停止解京轉發例奉天省應發黒龍江等處人犯即由盛京刑部奉天府按照人數多寡定地刺字徑交盛京兵部發遣毋庸觧赴在京刑部轉發定旗人犯刺字者照民人辦理例諭嗣後旗人犯刺字者削去旗檔照民人一例辦理四十八年定和姦後悔過拒姦殺死姦夫杖一百流三千里例詳見刑制門改定用藥迷人未經受害發遣為奴例凡甫經學習及雖已合藥即行敗露或欲迷之人當時知覺未經受累者均發徃伊犁給厄魯特為奴如到配之後將藥方傳授與人及復迷人並脱逃者請㫖即行正法詳見刑制門増定旗人竊逃並犯仍照逃罪改發邊逺例凡旗人犯竊犯逃並發核其搶竊贓數在流徒以下律應刺字者無論逃在一月内外俱照旗人犯走發徃當差在配怙惡不悛之例改發雲貴兩廣邊逺地方令地方官與民一體嚴加約束至漢軍正身旗人犯應刺字者亦即削除旗檔其逃竊治罪之處仍照漢軍本例定擬互見刑制門詳定拏獲黒龍江等處為奴脱逃人犯即行正法例强盗案内情有可原免死減等發遣者未傷人之盗首聞拿自首者窩家盗線聞拿投首者夥盗行刼二次以上聞拿投首者夥盗有供出盗首逃匿在於一年限内拏獲者在配脱逃拏獲一面正法一面奏聞毋庸請㫖其餘東三省㝷常發遣之犯如有脱逃被獲均不在正法之例詳見刑制門酌定遣發新疆人犯各條欵伊犁將軍伊勒圖奏定遣犯過多請遵前例酌發停止刑部議覆從前將情重軍犯改發新疆原因伊犁等處疆土式廓需人屯耕如因一時人多僅將原定六條發徃其餘一并改𤼵内地恐將來種地缺額復議更張請將從前原發之六項仍行發徃外其三十二年改發内地之十六條又四十七年廣西廵撫朱椿條奏搶奪傷非金刄又傷輕平復一條内將約束較易者五條如强盗窩主造意不行又不分贓者殺一家非死罪三人之妻子並未同謀加功者發遣雲貴兩廣烟瘴刨參人犯在配脱逃者姦婦抑媳同䧟滛邪致媳情急自盡者盛京旗下家奴為匪逃走犯至二次者仍發徃伊犁等處其餘十二條應如所奏停止遣發至烏嚕木齊情形與伊犁相同亦照此辦理從之四十九年定犯該没入家産兄弟未經分析者按分給予例時廣西永安州知州葉道和與岑照科場舞弊家産應查抄入官江西廵撫郝碩奏訊本犯與伊兄撫州府照磨葉道中兄弟並未分家應將葉道中署内財物查封奉諭從來縁事獲罪之人兄弟本不相及如因一人獲罪將其兄弟貲産盡行查抄辦理未免過當若以未經分析盡免入官則應行查封者皆得托詞未分任意隐匿使貪吏子孫仍復坐擁厚貲亦復何以示儆嗣後如有縁事獲罪應行查抄而兄弟未經分産者將所有産業按其兄弟分股計算祗將本犯名下應得一股入官其餘兄弟名下應得者概行給予以昭平允著為令五十年増定遣發黒龍江等處人犯添差押解例向例部發黒龍江等處遣犯自通州起僅由營員駐防撥兵觧送並不㑹同地方官添差押解至是直𨽻總督劉峩奏請無論當差為奴人犯均令知㑹地方官每犯一人添差幹役二名恊同營弁押解如有疎虞將地方官與弁兵一體查察治罪部議應如所奏從之改定莊屯居住旗人犯事分别枷號實發例詳見刑制門定遣發各省駐防當差人犯改遣雲南等省停止解部轉發例定例旗下另户人等有犯逃人匪類發遣黒龍江等處並奉天寧古塔黒龍江等處旗人發遣各省駐防當差人等復犯罪者均解刑部改發雲南等省至是部臣以黒龍江等處改發雲南等省京師為必經之路解部轉發事屬至便至各省駐防改發雲貴等省各省相通驛路若俱解部轉發不惟徃返長途徒勞解送且恐稽延時日易致疎虞嗣後除黒龍江等處發遣當差人犯復行犯罪者仍照舊例解部轉發外其各省駐防所有應改雲南等省之犯即由將軍都統移交該省督撫轉發起解無庸解部從之増定軍罪脱逃人犯拿獲由配所定地改發例向例流罪人犯如有中途在配脱逃被獲改發者均就其現配地方計程發配又免死減等流犯脱逃被獲者亦就其原配地方計程發配至附近改發近邉近邊改發逺邉逺邊改發極邊應由配所定地之處例無明文至是刑部議奏請將軍罪脱逃改發人犯均照流罪脱逃就配所改發之例由配所定地若現配地方應配之所即係原籍相近之處而地處邉境再無别處可以改發者仍從其原籍改發倘原籍改發之所又較原配相近則視其拏獲地方改發從之皇朝文獻通考卷二百五
