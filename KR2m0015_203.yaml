body:
  text: 欽定四庫全書皇朝文獻通考卷二百三刑考九徒流配沒臣等謹按虞書流宥五刑曰五宅三居周禮以嘉石役罷民曰三年二年一年而後舍蓋皆量罪人所犯而分地定期以懲艾之至於竄殛放流郊遂寄棘則投畀遠荒終身不齒所自昉也馬端臨考歷代以迄臣等續纂五朝刑考徒流配沒各有等差本朝國初風淳政簡律令所著鞭責以上遂至大辟經列聖遞為折𠂻我皇上隨時損益凡不忍麗於法而懲其害於民者五徒三流及準徒發遣諸條釐然大備臣等考刑制已詳載前卷矣兹考所載自順治年始若夫酌罪重輕量地遠近或因革舊例或改發新疆使徒𨽻有全軀自新之門無聚處為匪之患而國家收耕屯防禦之益則窳民皆遷其地而為良所為聖天子明刑弼教簡不肖以絀惡而成虞周之盛治者於是乎在臣等謹條繫類纂於篇順治二年定籍沒毋得濫及給事中孫襄奏言犯人家口入官婦女至於給配漸恐亷耻道喪節義風微嗣後除叛逆強盜外均宜及身而止從之臣等謹按國初律無成書故籍沒無正條用是特允孫襄之奏逮順治三年頒行大清律惟載謀反重犯家産人口入官並強盜亦不在此例也七年定隱匿錢糧者本犯正法仍籍沒家産人口互見刑制門八年定投充旗人生事害民者本犯正法妻子家産人口入官詳見刑制門十二年定改發寧古塔之例寧古塔地方嚴寒發往人犯易致斃命是時給事中魏裔介奏請於遼東地方量其遠近酌罪輕重流之不必専發寧古塔從之定發尚陽堡之例凡一應流罪皆照律例所定地方發遣其解部流徙者改發尚陽堡定徒犯發遣屯田之例酌其年分以定開墾之多寡開完釋放其願留者即永為已業從江西興屯道翟鳯翥請也十三年定旗人犯軍流徒罪折枷責之例軍罪枷三月流罪枷兩月徒罪枷一月仍責以應得鞭數詳見刑制門至十八年又議準旗人犯徒一年者枷二十日一年半者枷二十五日二年者枷三十日二年半者枷三十五日三年者枷四十日流二千里者枷五十日二千五百里者枷五十五日三千里者枷六十日旗人犯附近軍折枷七十日邉衛七十五日邉遠八十日極邉煙瘴九十日十四年定窩逃犯人免死責四十板面刺窩逃字家産人口入官詳見刑制門定興販攙和私錢者流徙尚陽堡詳見刑制門十六年定官員犯貪贓杖流之例先是十二年定官員犯貪贓至十兩以上者不分枉法不枉法俱籍産入官至是免其籍沒責四十板不準折贖流徙席北地方定誣告人死罪未決者本犯杖一百發邉衛充軍詳見刑制門定民人自首身係逃人借端行詐者責四十板妻子家産人口入官十七年定姦民刁訟持刀抹項希圖幸準者本人按法究治妻子流徙尚陽堡定應徙席北者俱改徙寧古塔十八年聖祖仁皇帝御極是年定叛逆案內應徙者改徙寧古塔之例康熙二年定流犯身死妻子免遣之例先是流徙人犯分别應行僉妻及止遣本身嗣於康熙元年將妻室未分家之子一併流徙令其室家完聚至是以該犯妻子本係無罪諭嗣後除反叛緣坐干連人犯仍照例遵行外其餘流罪身死妻子皆免遣三年刑部又奏定流徙人犯夫死其妻免流若有子或無子有僕仍遣僅乳子者免若妻家冀免伊女致死其壻以謀殺論若惡棍冀得犯人妻設謀致斃者照光棍例立斬互見刑制門至四年仍定本犯已死者妻子槩行免遣至二十年又定叛案牽連流犯身死其妻子有子者仍遣無子者免遣定窩逃鄰佑及干連人犯向例徙寧古塔者俱改徙尚陽堡三年禁止私贖遣犯家屬凡發遣盛京寧古塔等處逆犯家屬有私行買贖者係官革職旗人枷鞕民人杖流互見刑制門四年定家産盡絶追贓無完之流徒笞杖等犯應行入官者原罪的決免其入官身故産絶者仍照元年定例贓銀免追妻子亦免入官互見刑制門定寧古塔流徙民人有嫁女旗下者聽妻子家屬毋許賣與旗人其家奴聽從主賣定外省流遣人犯起解限期凡起解流遣限期除解部發落入官人犯照定例行外若在各省地方軍流人犯以刑部咨文到日計限一月即行起解該犯限日行五十里若三千里限二月二千五百里限五十日餘準是俱限內至發遣處所其有應追贓項限內不能追完起解者該督撫先行題明如地方官遲延不起解及押解中途遲延者並照違限例治罪五年定婪贓衙役赦免後仍行充役者流徙寧古塔六年定不俟原問官審結徑行叩閽者旗人枷號兩月鞕一百民人責四十板流三千里互見刑制門七年定賭博禁例凡開場賭博抽頭放頭者旗人枷責民人充軍在場賭博者旗人枷責民人流徙詳見刑制門定窩逃流犯未發身故者妻子免遣從左都御史王熙請也九年更定停遣之例定例流徙尚陽堡寧古塔罪人於六月十二月停遣至是特諭刑部自十月至正月及六月俱勿遣定隱匿入官人口至五名財物至五百兩者流徙寧古塔詳見刑制門定遣犯在途遇赦應免者題請釋放之例十一年定流徙罪犯在配窩逃之例督捕侍郎折庫納奏窩隱逃人例有處分至流徙處所窩隱逃人者未經定例今尚陽堡寧古塔等處流徙人等如窩隱逃人不便復擬流徙應枷號三個月責四十板從之互見刑制門十六年定誘取典賣良人子女者民人杖一百流三千里旗人枷責完結詳見刑制門定旗人犯入官罪例凡旗人犯入官之罪者俱入各旗辛者庫其辛者庫人有犯入官之罪者枷責完結定侵盜錢糧一年不完者僉妻及未分家之子流徙家産入官例詳見刑制門十八年定衙役詐贓十兩以上者僉妻安插奉天例詳見刑制門定爐頭匠役包攬買銅交納者枷責并妻子流徙尚陽堡互見刑制門定軍罪及免死流犯妻子仍僉之例凡軍流及免死擬流人犯皆僉妻及未分家之子交户部安插如分家之子有情願隨往者聽十九年定軍流分别發配之例先是十八年議定凡軍罪及免死擬流者俱發烏拉地方其照常流罪發奉天等處地方至是左都御史郝浴奏請死罪減等者仍照例發遣烏拉其餘軍流俱充發奉天等處從之定貪贓官役發配例死罪減等者仍照例安插烏拉其罪不至死而擬流者徙尚陽堡二十年定旗人詐害平民者流徙凡上三旗及八旗中有刁惡棍徒橫行非法詐害良民者該旗嚴查送部即行奏聞發往寧古塔二十一年改定發烏拉之例奉諭烏拉地方風氣嚴寒由內地發遣安插人犯水土不習難以資生念此輩雖干憲典但既經免死原欲令其全生若仍投畀窮荒終歸踣斃殊非法外寬宥之初心以後免死人犯俱發往尚陽堡安插其應發尚陽堡人犯改發遼陽安插至反叛案內應流人犯仍發烏拉地方當差不必與新披甲人為奴定民人假稱逃人具告行詐者發寧古塔給披甲人為奴互見刑制門二十二年改定發遣罪例凡三次逃人三次竊盜免死減等及誘賣人口藥餌迷拐各為從者并和同被誘知情應擬流者俱改發寧古塔與披甲人為奴二十三年定誣陷平民為盜嚇詐銀兩者照竊盜三犯例發寧古塔旗人發遣本身民人僉妻俱追銀入官互見刑制門定強盜自首者免死充發凡強盜殺人案內如無下手主謀情由者準其自首發邉衛充軍互見刑制門二十五年閏五月定私賣軍器者充軍凡邉界地方有姦徒私將軍器賣於土司番蠻之人者不論官民兵丁俱杖一百發邉衛充軍該管官知情故縱者與軍民一例治罪詳見刑制門定軍犯定配之例凡充軍人犯在京兵部定衛在外巡撫定衛仍鈔招知會兵部其問邉外為民者鈔招送户部定邉口禁例凡蒙古擅殺內地民人及盜牲畜論擬斬絞外妻子牲口皆入官其擕帶家口牲畜私自入邉遊牧者不論幾户皆入官民人私自入邉口者僉妻發山海關外遼陽等處安插詳見刑制門二十六年定流犯查提妻室例凡應查提審擬流之妻將犯人先發順天府羈候行文該地方查取妻室候解到後發順天府夫妻一同發遣至三十九年議準軍犯亦照此例二十七年定借口子報父仇擅殺人者流徙刑部議覆御史趙廷圭疏言律載子報父仇不告官而擅殺者杖六十蓋為未經審擬寃抑無伸者言之也如仇家已經審擬或遇赦宥復有借口報仇者不得概引輕條應如所請流三千里著為令從之互見刑制門定官員過贓未受者照聽許財物律杖徒二十八年命察流犯發遣之弊奉諭流徙人犯遇有勢力者每羈禁不嚴及至發遣又展轉遷延其貧苦無力營求者即肆行凌虐瀕於死亡向來此弊甚多嗣後如遇有勢力之人即行發遣不得遲延其貧困之人毋許凌虐致斃著户刑二部堂官不時稽察如有前項情弊指恭從重治罪互見刑制門定強盜事發自首者分别論戍擬徒凡事發後查拏時自首之強盜內如有傷人不死者照律擬戍如不曽傷人者照知人欲告而自首減二等律擬徒互見刑制門定強盜年未及嵗被誘同行贓無入已者免死杖流互見刑制門三十九年定那移銀至五千兩以上糧米至六千石以上者毋論已完未完革職仍擬滿流例詳見刑制門四十一年改定僉妻流犯在京發配之例順天府府尹錢晉錫疏言各省民人有在京定擬流罪及免死減罪人犯舊例於順天府發遣但其中僉妻流犯必俟該犯之妻從本省押解至京始行發遣曠日稽延且單身女流長途押解易受解役凌辱殊為可憫請嗣後在京發配者先發回本省照各省發遣例僉妻解往從之定僉妻人犯在配身故家屬回籍之例先是二十八年兵部奉諭軍罪犯人身故無子其孤寡之婦仍留配所情實可矜著令回籍至是順天府府尹錢晉錫疏請嗣後流犯在配身故者妻子俱準回原籍從之定稽察流犯脫逃例刑部議準黑龍江寧古塔發遣人犯逃者甚衆皆由該管官不行查察之故應令各該將軍打牲總管等將發遣人犯每月收領者若干逃走者若干拏獲者若干未獲者若干查明造册咨部至年終將總數具奏按其逃走之多寡治伊主及該管官之罪更定免死人犯仍發黑龍江逃者嚴處刺字之例定遣犯脫逃拒捕者即行正法四十七年嚴流犯逃後犯法之例奉諭凡減等流徒者俱係死罪豁免之人理當安靜守分若仍不改過逃回作惡情殊可惡嗣後流所逃回不犯罪者仍照例完結外逃後又復犯罪不論罪之輕重并將舊案查出立時正法著為令互見刑制門定充發人犯在配毆死人者即行正法互見刑制門四十八年定兩次竊盜發遣例奉諭嗣後如有兩次竊盜俱發黑龍江應當差者著當差應給披甲為奴者著給與為奴互見刑制門五十二年定發遣人犯俱發三姓地方之例五十三年定造賣淫詞小説者杖一百流三千里市買者杖一百徒三年詳見刑制門五十五年定紏衆搶奪稻榖者發遣刑部議準凡地方米價騰貴為首寫帖知會衆人將稻榖搶奪應僉妻送部照例刺字發三姓等處給與披甲人為奴互見刑制門五十六年定強盜為從者免死發往黑龍江等處詳見刑制門五十七年改發遣黑龍江三姓地方例奉諭發往黑龍江三姓地方之人俱因凶惡發遣若發在一處人犯日多必致生事此後停其發往著發喀爾喀科布多烏蘭固木地方彼處水土甚好著築城安插令其開墾耕種八旗每佐領𣲖護軍披甲各一名於八月內馬匹肥壯之時前去駐扎看守二年一換其沿途驛站應備車輛毋致犯人勞苦五十八年定沿江濵海用鎗棍格鬭者分别首從流徒例詳見刑制門五十九年定鹽梟就撫復行私販者將本犯解部充發科布多烏蘭固木地方互見刑制門六十年定造言訛詐者發遣刑部題準凡揑造無影之言妄行訛詐銀兩者發科布多烏蘭固木地方係民人僉妻互見刑制門雍正元年定窩盜之家知情存留三人以上者充發三姓地方詳見刑制門二年定下五旗王等屬下發配之例奉諭下五旗王等屬下問罪發遣者部擬俱發往各打牲處數年之後該王等每有私令回京者嗣後因公事犯罪發遣者不得發往該王門上打牲各量其罪之輕重發往三姓黑龍江地方定軍罪人犯發布隆吉爾地方開墾總理事務王大臣議奏布隆吉爾地方現在修築城垣請將直𨽻山西河南山東陜西五省軍罪犯人除賊盜外盡行發往該處令其開墾從之定旗人因重罪發遣復從配所逃回之例枷號三月鞭一百發三姓等處定官犯那移一萬兩以上者發邉衛充軍詳見刑制門三年改定配之例上以盛京為開基之地寧古塔黑龍江三姓等處俱為接壤向來遣犯安插於此日積漸多恐引誘漸染廢壞風俗且將來發遣之人多於本地兵丁亦有未便因命嗣後遣犯分發內地邉遠之區令地方官嚴加管束又諭嗣後年逾七十之人有犯發遣者另行具奏定被逼行竊因而殺人者分别徒流之例刑部議準如竊盜已經改過被夥盜強逼同竊者從之恐罹法網不從又恐扳害將強逼之人殺死未經自首者審有挾制實情免死擬流如殺死後即行自首者減二等擬徒互見刑制門四年定官犯侵欺一千兩以下者照監守自盜律擬斬準徒五年互見刑制門定漢軍人犯發遣之例大學士八旗都統九卿遵旨議覆滿洲蒙古營生之道與漢民迥異有犯軍流罪者概行發遣恐難以圖存請仍照舊例枷責完結其漢軍人等有犯軍流罪者一體照例發遣申定造賣賭具分别首從發遣流徒例詳見刑制門改定刨參人犯發遣之例奉諭偷刨人參遣犯發黑龍江等處則與伊等犯罪之處相近凶犯不知懲戒嗣後偷參發遣之犯係滿洲蒙古發往江南荆州西安等處有滿洲駐防之省城當苦差係漢人漢軍發往煙瘴地方當苦差定貢監生員包攬錢糧催收入已者黜革發黑龍江當差例詳見刑制門五年定徒犯本身發遣及徒滿仍回本籍之例刑部奏向例在京問擬徒罪人犯無論本地及外省人民俱送順天府衙門充發限滿仍回京京師首善之地豈容姦徒雜處請嗣後順天府屬州縣仍送該府尹發遣其餘各省民人俱遞回各該處督撫衙門發遣限滿交於本籍地方官管束不許再至京師如有私自來京者拏獲枷責遞回得旨此等匪類豈但不宜再令來京即往别省亦生事妄行嗣後交地方官嚴行管束不許出境倘有私自出境及在本處生事者將該犯擬流遠省地方官管束不嚴嚴加處分定土司家口遷徙安插之例九卿遵旨議覆雲南貴州四川廣西湖廣五省改土為流之土司有犯斬絞重罪者其家口應遷於遠省安插犯軍流罪者應遷於近省安插飭令地方文武官稽查不許踈縱生事從之定奉天遣犯發配之例奉諭奉天習俗不好凡犯罪發遣之人若發往相近邉地必致逃回生事嗣後犯法應枷責發遣者著解送來京照例枷責滿日發與西安荆州等處滿洲駐防兵丁為奴定旗下另户犯流及在逃流犯例向例旗下另户之人犯罪發遣者俱不為奴至是刑部遵旨議準嗣後奉天等處人犯有應枷責發遣者照例枷責外若滿洲另户正身發往西安等處駐防當差其卑汚下賤原同奴僕及奴僕開户而為另户者發給西安等處駐防兵丁為奴又從前在逃之犯已奉旨寬免令其自首若過限不行投到獲日將減等盜犯於原發遣處正法平常發遣之犯有行凶為匪者亦於原發遣處正法如無為匪之處枷號兩個月鞭一百仍交原發遣處安插若旗下家人私自逃走者加逃罪一等從之諭嗣後枷責之犯奉旨改為發遣者俱免枷責有情罪可惡仍應枷責者臨時請旨六年嚴遣犯不法之例奉諭披甲人查書夫妻父子弟妹及叔祖母九人俱被賞伊為奴之犯紀二殺死甚可駭異凡免死發遣為奴之犯皆稟性凶惡遣發之後往往恣意妄行不為管束嗣後若仍有凶暴者不論有應死不應死之罪伊主便置之於死不必治罪但將實在情節報明該管官咨部存案其發遣當差之犯不守法度被該管官打死者該管官亦免議但將情由報部存案若當差為奴人等與平人鬭毆被打身死者平人從寬減等則凶惡之徒有所畏懼不敢為非矣互見刑制門定假冒考職發邉外充軍不準援赦之例詳見刑制門定漢軍犯軍流查其祖父奏明之例奉諭嗣後漢軍除犯死罪外其犯軍流者將其祖父或係從龍舊人或有軍功陳亡之處查明奏聞定漢軍犯軍流杖責之例時漢軍犯軍流等罪已奉旨照例發配故其杖責亦照民人例七年更定軍流人犯停遣之例刑部議奏各省軍流人犯有隆冬停遣之例其已發遣在途距充配之處雖道里無多一交冬令亦為留住而隨行妻女不得不一并收監致淹禁四月之久方得脫離就道殊為可憫請嗣後各省軍流人犯除廣東起解福建於冬月仍照常發遣並人犯在本地未經起解者仍照例停遣外若已至中途初冬十月尚未嚴寒經過州縣應照常接遞至十一月初一日方準停遣俟次年開印即為起解如計抵配所不遠即時值隆冬亦當訊明本犯情願前進者移明前途州縣一體接遞仍將緣由查明報部再軍流人犯自配所逃回者照逃人例分别刺字押解配所治罪雖遇隆冬亦不準其停遣從之定盜犯同居伯叔與弟不行出首者照窩盜坐家分贓律發邉衛充軍詳見刑制門定繼母凌逼前母之子致自盡者將繼母之子杖一百流三千里詳見刑制門定積匪猾賊不論曽否刺字俱發邉衛充軍從浙江按察使方覲請也詳見刑制門八年申定土司家口遷徙安插之例刑部議準嗣後犯罪改土歸流土司之妻妾子女照例遷徙外其父母兄弟係附和該犯為匪犯法本案有名或平日倚恃土司聲勢素行凶橫生事擾民者俱無論同居分居一并遷徙安插如本案內並無附和該犯為匪犯法平日又屬安靜者均應免其遷徙再斬絞監候之土司若該犯止有妻妾並無子及子嗣幼小又無應遷之父母兄弟即將伊妻妾幼子免徙安插於本省省城令地方官稽查管束至犯軍流之土司家口無論有子無子照例隨同本犯遷徙外如本犯未遷之先身故並無子及子嗣幼小者亦將伊妻妾幼子免徙安插省城俱令地方官稽查管束從之九年定流犯年逾六十者撥入養濟院給以口糧改定流犯脫逃之例凡流犯脫逃分别原犯流罪及免死減等為流者按脫逃次數遞加治罪原犯流罪者初次脫逃照例枷號兩個月責四十板加徒役三年二次枷號三個月責四十板加徒役四年三次發邉衛充軍若係免死減等流犯初次脫逃者枷號兩個月責四十板加徒役四年二次發邉衛充軍三次照軍犯三次脫逃例擬絞監候互見刑制門十年改遣應發黑龍江人犯先是奏準應發黑龍江罪犯改發扎克拜逹里克等處令其開墾耕種嗣經停止九年準噶爾賊人犯扎克拜逹里克時所有罪人跟隨官兵守護城垣竭力捍禦上嘉憫之加恩除其罪名令充兵入伍效力因諭嗣後應發黑龍江人犯遣往北路軍營附近可耕之地令其開墾效力又停覺羅僉遣之例軍機大臣議準覺羅與平民不同罪至發遣必其情罪重大若發遣身故又令伊妻子回京殊為煩擾嗣後免其僉妻發遣永遠拘禁髙墻之內以示懲警十一年改定刨參人犯發遺之例定例偷穵人參之犯滿洲蒙古發往江寧荆州有滿洲駐防之省城當差漢軍漢人發往廣東廣西雲南貴州煙瘴地方當差上念廣東崖州陵水等處水土最惡每致染病令改發內地之饒平欽州等處當差其雲貴廣西等處地方風土有類此者亦著改發定軍流徒犯孀婦獨子聲請留養例詳見刑制門停旗人改發扎克拜逹里克等處種地例奉諭凡應發黑龍江者改發扎克拜逹里克等處種地效力朕思滿洲漢軍人等不諳耕種之事發往彼處甚屬無益著仍遵舊例發往黑龍江嚴定邪術避刑分别軍流之例凡姦徒以邪術避刑相傳習者為首杖一百流三千里本犯雇人作法架刑者照規避本罪律遞加二等罪止流二千五百里三千里者俱發邉衛充軍詳見刑制門申定竊盜同居親屬分别徒流之例詳見刑制門定書役偽造印信分别杖流發遣之例凡衙門書役偽造印信誑騙財物除自行雕刻照例定擬外其倩人雕刻誑銀不及十兩錢不及十千者俱杖一百流三千里銀十兩以上錢十千以外者俱發遣黑龍江詳見刑制門定竊盜三犯計贓在五十兩以下罪止滿杖者從重改擬發遣詳見刑制門定竊盜誣扳分别軍徒例刑部議準嗣後除積匪慣盜有意陷人者仍照本犯贓數自一兩至九十兩俱發邉衛充軍如係初次為匪畏罪混扳者計其贓數一兩至四十兩者俱加等徒三年其五十兩至九十兩罪應擬徒者俱加等發邉衛充軍互見刑制門十二年分别盜夥發遣流徒之例凡盜夥三人以下手持兵器者雖不得財杖六十徒三年得財一兩以下計贓遞加一等至滿貫論絞四人以上雖不得財亦無凶器為首徒一年為從杖一百得財一兩以下亦計贓遞加如加至流三千里為首發邉衛充軍為從流三千里六人以上不論曽否得財首從皆徒三年計贓重於徒三年者為首流三千里為從減一等滿貫為首者絞為從發邉衛充軍十人以上不分首從並發邉衛充軍贓滿貫者絞詳見刑制門定宗室覺羅犯軍流徒罪之例凡間散宗室覺羅犯徒罪者在宗人府拘禁犯軍流罪者在宗人府鎖禁俱照旗人應折枷號日期滿日釋放詳見刑制門定附近苖疆民人煎穵硫磺百斤以上者發邉衛充軍互見刑制門改定遣犯逃後為匪解配所正法之例向例免死遣犯與平常遣犯逃後為匪被獲者俱仍解遣所正法至是改定即於拏獲地方正法仍行文發遣處曉示詳見刑制門定搶奪殺人傷人案內分别發遣軍徒罪例刑部議準嗣後搶奪殺人下手為從之犯照竊犯拒捕殺人為從分發吉林烏拉等處給披甲人為奴搶奪傷人下手為從之犯亦照竊盜拒捕傷人為從例發邊衛充軍仍俱照例刺凶犯二字其有傷非金刃又傷輕平復者亦照竊盜拒捕例將為首者發邉衛充軍為從及自首者杖一百徒三年定賢良方正出身人員犯軍流加等之例凡保舉賢良方正出身人員如犯貪婪不法等事除死罪仍按律定擬外儻應笞杖徒流者照名例開載加減罪例於本罪上按其等次遞加如應滿流者加等附近充軍應極邉煙瘴充軍者加等發遣黑龍江等處當差互見刑制門定逃兵拐帶餉糧馬匹及知情容隱者充軍刑部議準嗣後兵丁有拐帶餉米盜騎馬匹脫逃者俱照守禦軍人在逃再犯律杖一百邉衛充軍其知情之同居父兄及知情容隱之窩家俱照知情窩藏律杖一百附近充軍詳見刑制門定捕役誣拏分别軍徒例先是定例捕役緝盜未獲將素行不端之人或曽經犯案蹤迹可疑者􅌉詰拏獲及到官訊非真盜均照誣良為盜例充軍至是改減擬徒其本係良民及雖犯竊有案業已改惡為善人所共知妄拏私拷者均照誣良為盜例充軍詳見刑制門定流罪里程刑部覆準安西按察使何師儉條奏嗣後流罪僉發三等里數應自該犯原籍府屬至應流省分一并核算如未及應流本數者將該犯分别遠處之府屬安插如己逾應流本數應即於本省府屬內計里足數之地方安插再請令各該督撫將原籍府屬至應流府屬道里實數彼此移查明確照軍犯定衛之法按三等所限道里將該犯係某府屬者應於所流之省某府屬安插逐一酌定造册報部彚送律例館詳核刋刻頒發遵行十三年定留養人犯枷號之例軍流徒犯應留養者除應得杖數外仍將軍流人犯枷號四十日徒罪人犯枷號一個月定刨墳夥犯分别發遣充軍之例除為首及夥犯三次開棺照律擬絞外二次者照三犯竊盜贓數不多例改遣一次者發附近充軍詳見刑制門定因戲而誤殺旁人者僉妻流三千里至配所杖一百仍追埋葬銀兩給付尸親詳見刑制門皇朝文獻通考卷二百三
