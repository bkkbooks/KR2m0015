租銀自四錢八分至二錢四分不等折中每晌租銀三錢六分約計每年共徴租銀十有一萬四百兩有竒冬圍兵丁恩賞銀兩即於此項内撥給餘銀解交盛京户部另款存貯聽候撥用下部議行三十七年諭將軍增福等具奏盛京各佐領下所有馬甲多寡不等請裁馬甲添設步甲其餘剰錢糧併隨缺地畝入於正項報銷一摺經軍機大臣㑹同該部覆准具奏所辦非是盛京額設馬甲併隨缺地畝皆為養贍該處滿洲而設今年久生齒日繁若將伊等應得分例裁汰入官於伊等生計殊屬無益國家一切用度固應節儉然亦止宜酌減無益糜費並查核不肖人員使不得從中侵蝕至於正項應支之處豈可節省盛京滿洲皆朕臣僕人丁日盛不敷養育尚宜酌量添給豈有轉將伊等現在應得分例裁汰之理今各佐領下馬甲額缺不均固宜均匀辦理但此項裁缺錢糧地畝亦宜斟酌養贍多人惟期普被恩施示朕體恤滿洲至意四十年定偷墾地畝入官納租之例户部議岫巖城五塊石各兵丁牧馬官厰内有山東流來民人偷墾地畝私造房間不必拆毁令其入官仍著伊等居住耕種納租并令交納地畝租銀米石若有不願耕種者即行另召耕種如議行四十六年定懲匿報之令盛京吉林民人私墾地畝續經查出者每畝嵗徴銀八分仍在旗倉納米二升六合五勺五抄以懲匿報之弊著為令四十八年總計實在退圈七十七萬二千四百七畝八分有竒四十九年總計實在民地一百八十八萬八千八百七十畝六分有竒凡撥給八旗官員兵丁盛京土田内務府三旗包衣佐領下壯丁地畝鑲黄旗在盛京興京開原遼陽界内共地一百六十四頃八十四畝四分正黄旗在盛京興京開原界内共地九十九頃一畝四分正白旗在盛京興京開原遼陽界内共地二百五頃六十三畝一分内務府三旗包衣佐領下園丁地畝在盛京開原遼陽界内共地一千三百三十四頃八十畝盛京禮部六品官所屬各項壯丁地在盛京興京遼陽鐡嶺秀巖界内共地五百頃九十九畝三分盛京工部五品官所屬壯丁地在盛京興京遼陽牛莊秀巖界内共地五百六十一頃九十六畝六品官所屬壯丁地在盛京興京開原遼陽界内共地一百八十九頃四畝九分製造庫匠役人等地在盛京界内共地二十二頃三十二畝盛京户部倉官莊頭樓軍庫軍地共四百一十一頃九畝四分領催莊頭地共二千八百一十三頃一畝六分盛京禮部莊頭丁地共四十七頃五畝六分盛京兵部站丁地共六十二頃七十四畝八分盛京工部莊頭壯丁地共七十六頃五十六畝三分興京界内八旗所屬諸王貝勒貝子公大臣等地共一千二百二頃三十六畝官員兵丁閒散人等地共五百八十頃八十六畝五分撫順界内右翼四旗所屬王貝勒貝子公大臣等地共一千二百九十八頃九十九畝七分官員兵丁閒散人等地共七十五頃二十畝六分鹻場汪清二門官兵台丁地共三百二十八頃三十畝開原界内八旗莊屯地二千八百頃零七十九畝遼陽城界内八旗官員兵丁地共八百八十八頃五十五畝鐵嶺界内左翼四旗莊屯地共八千六百五十七頃四十四畝二分法庫邊門莊屯地六百七十八頃五十八畝威逺堡邊門莊屯地二百二十八頃八十七畝英額邊門莊屯地一百二十六頃七十二畝二分鳳凰城八旗巴爾呼地一千九百四十八頃六十四畝又正黄旗屯地共六十頃九畝愛呼邊門分種地共二十四頃七十四畝四台四屯地六十一頃五十九畝復州界内八旗分撥地共一千七百二十九頃四十畝熊岳城界内八旗滿洲䝉古巴爾呼漢軍莊屯地二千八百八十三頃三十九畝金州界内八旗滿洲䝉古漢軍官員兵丁地三千三百四十一頃零四畝水師營地二十六頃十八畝山海闗官員兵丁寡婦閒散人等在山海衛寧逺州界内共地一百三頃五十七畝七分零又正白正紅鑲紅旗下閒散人等地共三頃六十七畝零秀巖界内八旗官員兵丁地二千一百二十一頃零二畝七分蓋州界内各旗官員兵丁地四萬六百三十八畝牛莊界内八旗官員兵丁地共二千九百二十三頃廣寧城所屬巨流河白旗堡小黒山閭陽驛彰武台邉門等界内八旗官員兵丁閒散人等地共一萬五千一百九十四頃九十六畝二分錦州界内王貝勒貝子公宗室額駙官員莊頭閒散人等地共二千七百十七頃零七畝八分八旗兵丁閒散人等地共一千五十四頃五十畝四分義州界内八旗莊屯地五千四百七十一頃二十五畝清河邊門莊屯地五百三十四頃二十三畝九闗台邊門莊屯地二百三十二頃十八畝吉林烏拉界内官員兵丁開墾地鑲黄旗三百七十四頃五十二畝正黄旗二百九十五頃二十六畝正白旗二百六十六頃一十畝正紅旗二百五十二頃七十八畝鑲白旗二百八十八頃四十八畝鑲紅旗二百二十一頃七十六畝正藍旗二百六十一頃二十四畝鑲藍旗二百六十七頃二十四畝水師營二百六十五頃五十六畝又各莊頭開墾地二百五十二頃六畝寧古塔界内官員兵丁開墾地鑲黄旗三百四十七頃四畝正黄旗二百三頃七十畝正白旗三百三十五頃一十畝正紅旗四百二十頃鑲白旗四百七十頃五十四畝鑲紅旗三百二十六頃七十畝正藍旗二百八十頃一十四畝鑲藍旗二百一十九頃六十六畝又各莊頭開墾地共三百三十三頃四十二畝琿春界内官員兵丁開墾地鑲黄旗一百一十七頃一十八畝正黄旗九十九頃五十四畝正白旗三百一十六頃九十二畝三姓地方官員兵丁開墾地鑲黄旗一百八十一頃五十畝正白旗五十九頃四十六畝正紅旗四百一十九頃六十四畝伯都訥界内官員兵丁開墾地鑲黄旗一百一十六頃五十八畝正黄旗七十三頃六十八畝正白旗二百三十五頃四十四畝正紅旗一百二十五頃五十二畝鑲白旗八十頃