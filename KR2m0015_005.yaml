body:
  text: 田賦考五八旗田制臣等謹按國家建邦設都務崇根本是以盛京畿輔設有官莊一時從龍翼運羣䇿羣力莫不授以土田俾聚室家長子孫王以下官員兵丁以上迄各省駐防俱有規制至於口外田地漸次墾闢得膏腴數百萬頃由是八旗人民内有莊屯可以資生外有草地可以墾種又為之正其經界使旗民各安其業咸得我所百數十年來分撥相度之宜調劑經久之法無不裁成盡善兹别立八旗田制一門考稽國史分年排纂以彰昭代開創之宏規用垂示萬萬世焉内務府官莊順治元年設立官莊是時近畿百姓帶地來投設為納銀莊頭願領入官地畝者亦為納銀莊頭各給繩地毎四十二畝為一繩其納蜜葦棉靛等物者附焉計立莊百三十有二不立莊者仍其户計二百八十五户分隸内務府鑲黄正黄正白三旗坐落順天保定河間永平天津正定宣化等府州縣奉天山海闗古北口喜峯口亦令設立康熙八年編各莊頭等第以其田土編為四等至二十三年題准每十年編定一次二十四年設立糧莊每莊各給地千八百畝舊例每莊壯丁十名選一人為莊頭給田一百三十晌每六畝為一晌場園馬館另給田四晌壯丁蕃衍則留於本莊缺則補足給牛八頭量給房屋田種口糧器皿免第一年錢糧至是設糧莊每莊地三百晌其頭等二等莊頭不准給牛又山海闗内古北口喜峯口外糧莊每一所納糧百石合倉石三百六十石山海闗外糧莊每一所納糧百二十石合倉石四百三十二石至二十六年題准於交納銀二百之莊頭内改為糧莊增壯丁為十五名停止莊頭報糧溢額給賞向例莊頭收糧畢時於定額外多納一石者賞銀二錢缺額一石者責二鞭鞭責不過一百至是停止溢額給賞三十九年復停缺額鞭責之令二十五年定莊田報災之例凡莊田報災定例於七月二十日以前莊頭呈報㑹計司委員察勘於定額内酌量豁免至是題准莊頭報災勘災得餘剰好地六十五晌以下者給與養贍家口六十五晌以上者照舊當差四十八年令莊頭地畝不足額者准其補給薄鹻沙壓者准其换給五十年定糧莊給糧之數山海闗内古北口喜峯口外頭等莊報倉石二百五十石二等莊二百二十石三等莊一百九十石末等莊一百二十石每石折小米五斗其明年又定山海闗外頭等莊報倉石三百二十二石二等莊二百九十二石三等莊二百六十二石末等莊一百九十二石又領種入官地畝莊頭四名每名報糧七十石帶地納糧莊頭一名報糧六十四石五十五年定給莊頭頂帶之例莊頭内當差四五十年不欠錢糧者給八品頂帶二三十年無欠者給九品頂帯雍正元年設總理大臣官員専司口外報糧編審諭山海闗内莊頭等所欠陳糧俱令豁免所欠新糧限三年内交完内務府議定一二年内全完者賞給品級及加級有差三年不完者罪之二年定莊田勘災例以被災地畝編作十分按分數免差仍計口給糧有揑報者罪之三年令口内莊頭交倉所餘之糧折銀交廣儲司口外莊頭糧米運交熱河倉其雜糧秫稭等項亦折銀交廣儲司四年更定山海闗外糧莊地數一等莊給地五十四頃二等莊五十一頃三等莊四十五頃四等莊三十九頃十三年定承催官奬勸例完六年者加一級三年者紀録乾隆元年停止承催官令屯領催辦至四年復設四年准凡投充人地如有薄鹻勘實退出補給二十年四月准各莊頭薄鹻沙漥地畝在附近州縣入官地内撥换又定入官地畝莊頭撥换之例直屬入官地畝例准八旗官兵閒散人等赴部呈買旋經内務府將莊頭撥换地畝奏明亦在入官地内揀選户部議定嗣後凡莊頭有應撥换地畝其未經准人認買者聴其撥换已經認買者另行查辦再入官册或經本部出示召買莊頭等已在外撥换如内務府册結送部在未經交價之先准令莊頭撥换在交價之後准官兵閒散人等認買凡内務府所領官莊地曰糧莊曰豆稭莊曰半分莊曰稻莊曰菜園曰瓜園曰果園又有蜜户葦户棉靛户豆稭莊設壯丁五名後增為七名選一人為莊頭給田六十五晌場園二晌牛四頭其納糧照糧莊之數減半康熙四十五年每莊給地一百五十晌五十年定納糧六十石雍正二年以廐館飼馬不用豆稭將豆稭莊頭三十名暫編為半分莊頭半分莊設壯丁七名選一人為莊頭給牛四頭照豆稭莊納糧又每莊交黒豆二十五石二斗草千束秫稭百四十束康熙四十七年每莊給地百五十晌五十年定納糧六十石稻莊在房山玉田涿州及玉泉山稻田厰各處按水旱田分别徴糧菜園設壯丁五名選一人為園頭給種菜田十九晌口糧田各五晌牛二頭康熙五十一年又立豐臺菜園園頭各給田四頃内畦地一頃八十畝牛四頭五十四年每園增壯丁五名六十年園頭各給旱地九頃瓜園設壯丁五名選一人為園頭給種瓜田三十晌口糧田各五晌牛四頭康熙五十四年每園增壯丁五名六十年園頭各給旱地九頃果園設園頭一名園内舊丁各給口糧地每年徴銀三兩新丁按地每畝徵銀三分草二束折徵銀二分康熙三十九年定每園納糧壯丁不得過六丁餘丁免其徵銀凡蜜户按丁給地徵銀每地一晌徵收蜜五觔每觔折算銀七分康熙四十九年以烏拉捕牲蜜丁所進蜜已足用嗣後蜜户俱按地徴銀每畝徴銀五分凡葦户按丁給地每畝徴銀一分至五分八分不等所進葦每觔折算銀三釐五毫零每年額徴葦四萬三千七百五十二斤其餘按畝徵銀凡投充棉靛户每丁給地五十六畝徴棉花五十觔水靛百觔交廣儲司十六年總計官莊田共五千七百四十八頃三十畝銀共三萬八千九百二十四兩草十二萬一千七百九束各有竒右據是年奏銷總數三十二年總計莊頭六百八名應交本年糧石等項折價銀四萬四千九百八兩有竒各圈草六十一萬八千一百四十五束四十年定莊頭承種額撥官地不准藉稱薄鹻沙壓退交兑换其有悞差不能承充莊頭者内務府大臣查勘確實另派莊頭承種四十七年内務府奏所屬莊園人等承種官地如遇旱澇災歉俱照民地之例一分至四分者不准報災其應得口糧之處槩行停止應一併咨行户部轉行直督等一體遵照辦理從之臣等謹按國初設立官莊或在奉天或在畿輔領之内務府會計司此外尚有部寺官莊分隸於禮部光禄寺各衙門自行徵收支放以給公用皆不屬户部宗室官員兵丁莊田順治元年諭户部曰我朝定都燕京期於久逺凡近京各州縣無主荒田及前明皇親駙馬公侯伯内監殁於冦亂者無主莊田甚多爾部清釐如本主尚存及有子弟存者量口給與其餘盡分給東來諸王勲臣兵丁人等蓋非利其土地良以東來諸王勲臣兵丁人等無處安置故不得已而取之可令各府州縣鄉村滿漢分居各理疆界以杜異日争端今年從東來諸王各官兵丁及見來在京各部院官著先撥給田園其後至者再酌量撥給是年順天巡按栁寅束䟽言清查無主之地安置滿洲莊頭誠開創宏規第無主地與有主地犬牙相錯勢必與漢民雜處不惟今日履畝之難恐日後争端易生臣以為莫若先將州縣大小定用地多寡使滿洲自住一方而後以察出無主地與有主地互相兑换務使滿洲界限分明疆理各别而後可蓋滿人共聚一處阡陌在於斯廬舍在於斯耕作牧放各相友助其便一也滿漢疆理無相侵奪争端不生其便二也里役田賦各自承辦滿漢各官無相干涉且亦無可委卸其便三也處分當經界明漢民無竄避驚疑得以保業安生耕耘如故賦役不缺其便四也可仍者仍可换者换漢人樂從且其中有主者既已歸併其餘自不容無主者隠匿其便五也䟽入下部議行又諭王公等於錦州各設莊一所蓋州各設莊一所其額外各莊均令退出二年定給諸王貝勒貝子公等大莊每所地四百二十畝至七百二十畝不等半莊每所地二百四十畝至三百六十畝不等園每所地六十畝至百二十畝不等又内府總管給園地四十八畝親王府管領三十六畝郡王以下府管領三十畝各府給事人員俱給地有差又定王以下各官所屬壯丁計口給地三十六畝停支口糧諭户部民間田房有為旗人指圈改换他處者視其田産美惡速行補給務令均平倘瞻顧徇庇不從公速撥從重處分户部尚書英俄爾岱等言臣等奉命圈給旗下地畝查得易州安肅等州縣軍衛共三十六處無主田地盡數撥給旗下猶苦不足其未查地方如滿城慶都等二十四州縣尚有無主荒地若撥給旗下則去京漸逺兵民雜處多有未便議將易州等處有主田地酌量給旗而以滿城等處無主田地就近給民庶幾兩利至於清查事緒繁多應差亷幹官員前往從公撥給務令滿漢兵民各有寧字疏入命遣給事中四員御史四員同户部司官八員前往撥給准民間墳墓有在滿洲地内者許其子孫隨時祭掃其應給滿洲及應留民間地畝令地方官早行曉示毋妨東作三年諭京城内外無主園地酌量撥給諸王府又議准直隸民人田地被圏者以各州縣連界地畝撥補其不願往他處者以未圈之民房地均分居住耕種户部言民間田地撥給滿洲已經於隣近地方補還但廬舍田園頓非其故又有遷徙之勞請照被撥地數一應錢糧全免一年其地土房舍雖未經撥給滿洲而與近村被撥之民同居分種亦請照分出地數將錢糧量免一半凡故明公侯外戚屯地既經撥出其錢糧請照數永免從之四年令㕘領以下官員各給地六十畝凡撥給兵丁地畝有告稱不能耕種者不准所圈地内如有集場仍留給民以資貿易凡撥給地畝以見在為凖嗣後雖增丁不加減丁亦不退各官雖陞遷不加已故降革不退户部言去年八旗圈地止圈一面内薄地甚多今年東來滿洲又無地耕種若以逺處府州縣屯衛故明勲戚等地撥給又恐孤貧者無力運送應於近京府州縣内撥换去年薄地並給今年東來滿洲其被圈之民以未圈州縣屯衛田撥補仍照遷移逺近豁免錢糧四百里者准免二年三百里者准免一年以後無復再動民地庶滿漢兩便䟽入從之五年定親王給園十所郡王給園七所每所地一百八十畝六年定凡加封王貝勒貝子公等各照本爵撥給園地襲封王貝勒貝子公等其祖父所遺園地除撥給應得之數外其餘地畝不必撤出仍留本家定撥給官員園地公侯伯各三頃精竒尼哈畨各二頃四十畝阿思罕尼哈畨各一頃八十畝都統尚書阿達哈哈畨各一頃二十畝副都統侍郎拜他喇布勒哈畨各六十畝一等侍衛䕶衛㕘領各四十二畝二等侍衛䕶衛各三十畝三等侍衛䕶衛拖沙喇哈畨各二十四畝凡官員致仕者督撫布按總兵各給園地三十六畝道員副將㕘將各給園地二十四畝府州縣遊守等官各給園地十八畝又新來壯丁每名給地三十畝至次年令八旗舊壯丁每名撤出地六畝撥給新壯丁又以各旗撥换地土將完餘剰房地俱交地方官辦理嗣後各旗有呈請撥换者概行禁止七年給公主園地各三百六十畝郡主園地各百八十畝縣主郡君縣君園地各百五十畝又撥給親王園八所郡王園五所貝勒園四所貝子園三所公園二所每所地百八十畝嗣後凡初封王貝勒貝子公等俱照此例撥給鎮國將軍園地二百四十畝輔國將軍園地百八十畝奉國將軍園地百二十畝奉恩將軍園地六十畝凡給過園地者停給家口糧米十年令圈撥民間房地永行停止十一年令撤出壯丁地量加錢糧月米都察院言滿洲兵丁雖有分地每年並未收成窮兵出征必需隨帶之人致失耕種之業往往地土空閒一遇旱澇又需部給口糧且以地瘠難耕復多陳告而民地又不便再圈請查壯丁四名以下地土盡數退出量加錢糧月米其退出之地擇其腴者許令原得瘠地之人更换餘則盡還民間在滿洲有錢糧可望樂於披甲而又無瘠地之苦至民間素知地利復不至於荒蕪下部議行十五年申滿洲置買民地之禁户部言民間地土房屋禁止滿洲置買已於順治七年定例遵行後於十三年奉有未禁以前所買房地入官户部給發原價之㫖臣等議未禁之前所置房地請從寛免其入官七年禁止以後所買房地發覺仍照定議入官買賣一併治罪從之康熙二年定新來佐領給地三十畝領催給地十八畝三年給守衛孝陵官員園地有差先是康熙二年給守衛孝陵内大臣園地九十畝至是議給總管地七十二畝副總管六十畝防禦及郎中各三十六畝員外郎尚茶尚膳讀祝贊禮等官及内監各三十畝筆帖式驍騎校佐領下執事人各二十四畝驍騎禮工二部執事人六畝嗣後守衛陵寢官員俱以此為例八年諭民間房地圏給旗下嗣後永行停止今年所圈房地悉令給還民間至旗人無地者應否以古北等口邊外空地撥給令貝勒大臣確議諸臣會議言圈撥民間田房屢經停止嗣有因旗下退出荒地復行圈補者有遊牧等處投來人丁復行圈撥者有因圈補時復圈接壤民地者百姓失業堪憫今張家口殺虎口喜峯口古北口獨石口山海闗外各有曠土如宗室官員及兵丁有願將壯丁地畝退出取口外閒地耕種者該都統給印文咨送按丁撥給得㫖報可至九年又議以喜峯口獨石口外既無閒地正紅旗又無赴邊外領地之人不必撥給請以古北口外地撥與鑲黄旗正黄旗羅文峪外地撥與正白旗冷口外地撥與鑲白旗正藍旗張家口外地撥與鑲紅旗鑲藍旗從之九年令官員兵丁地畝不許越旗交易其兵丁本身種地不許全賣二十年定滿洲新歸旗者停給園地二十三年定民地被圈撥補之例順天等府民地撥給旗下者將别州縣衛所額外開墾官屯等地補還其應輸糧課考成之責歸受補州縣徵比之事委被撥州縣二十四年令直𨽻州縣百姓墾荒田地停止圈撥時議准各處壯丁及新滿洲應給地者將上三旗官莊并八旗禮部光禄寺丈量所餘地畝撥給俟此項地畝撥完時另請定奪三十年新滿洲退出地畝令給民耕種輸租四十五年更定撥給例先是撥給地畝自康熙十三年後俱係將八旗退出地方官收存地畝撥給遵行已久至是以春二三月内已經耕種應俟秋成後始行撥地臨撥即移咨内務府奉宸院轉付八旗司并行直撫大宛二縣知照已撥給之地不准更换其初次應行給地之新滿洲於八旗餘地内支給五十三年定撥給莊頭地畝在各屬旗退輸地租内匀撥不得指圈民地雍正二年於直𨽻之新城固安二縣制井田選八旗人户往耕都察院副都御史塞徳請設立井田户部議准以内務府交出餘地及户部所收官地内撥新城縣一百十六頃固安縣一百二十五頃八十九畝制為井田令八旗挑選無産業之滿洲五十户蒙古十戸漢軍四十户前往耕種自十六嵗以上六十嵗以下各授田百畝周圍八分為私田中百畝為公田其公田之榖俟三年後徵收於耕種所餘地内立村莊造廬舍四百間每名給銀五十兩以為一年口糧及牛種農具之用設管理勸教二人俟有成效分别議敘至五年議定將八旗滿洲䝉古内欠糧及犯法革退官兵無所倚靠者并伊妻子發往井田每户給田三十畝五户共給牛三頭購買牛具籽粒等物及每年口糧每戸給十五兩交與管理井田官員酌量人口多寡苫蓋土房俾其居住並嚴行約束有怙惡生事者咨回加倍治罪嗣後每年一次查出發往其開户人内犯法枷責革退者發往井田給與効力良善之人為佃丁不許擅賣令其出力三年定州縣所收旗退地畝錢糧考核例凡州縣收過八旗所交地畝并内務府交出餘地所收銀錢糧米另立一案以定奏報考成自雍正三年起每年按數徵完銀錢解部糧米存貯各州縣備用仍於嵗底造册具題如有未完令該督題㕘議處六年清查直𨽻旗地時以直屬旗民雜處有互争田土之事議令内務府宗人府八旗都統將旗莊圈賞投充各項地覈明坐落四至造具清册一送户部一送直𨽻總督照式造册鈐印發各州縣收貯如有旗民互争田土即據册察勘審結其帶地投充人户或有隠漏地畝令一併清察七年於順天之霸州及永清縣設井田諭八旗地畝原係旗人産業不准典賣與民向有定例今竟有典賣與民者但相沿已久著從寛免其私相授受之罪各旗務將典賣與民之地一一清出奏請動支内庫銀照原價贖出留在各該旗給限一年令原業主取贖如逾限不贖不論本旗及别旗人均准其照價承買十三年遣官清丈察哈爾西四旗及東四旗地畝又諭八旗欺隠餘地俱令自首免罪倘仍欺隠不首一經發覺加倍治罪是年令清杳園頭牲丁壯丁人等典賣當差地畝户部議凡園頭牲丁壯丁人等官給當差房地例禁典賣但彼此授受相沿已久倘不勘明撤回在旗丁固無以為當差之資而概行撤回又恐鄉愚失業應令逐細察勘如紅册内開載之房地及其餘地本屬官物均應撤回其紅册所不載本為私業不應强撤至典賣有紅契白契之别撤時又有應追價不應追價應治罪不應治罪之殊應遣官前往各州縣照内務府紅册徹底清釐仍將地畝數目四至村莊造册四本一存本州縣其三分呈户部内務府並該督以備考稽從之乾隆元年改井田為屯莊時以井田試行十年咨回者已九十餘户令地方官確查實力耕種者改為屯户於附近州縣按畝納糧令各屬防禦管轄時井田改屯地共百五十四頃九十八畝有竒定古北口外旗地折銀之例古北口外熱河東西兩河各項旗地分别上中下三則上則每畝納銀一分四釐中則納銀七釐下則納銀三釐五毫免其徵收本色以省輓運之艱二年諭八旗都統等曰從前入官旗人之地理應賞還旗人俾得資生之計但旗地與民田不同是以特交爾等八旗大臣辦理今爾等議稱入官地畝從前所定租額本輕徒致州縣吏胥中飽請派員前往秉公更定等語見在入官地畝之租較之民人佃種旗地之租為數實少而此項入官之地原屬旗地與民人納糧之地不同雖經官定租額而百姓不知仍納重租以致胥吏中飽今因地定租固為允協但愚民不明事理或妄生疑意謂增添租額亦未可定夫旗人民人均我赤子朕一視同仁並無岐待著直督出示曉諭若無從前弊端即令該督保題停止增添又議稱此一定之後交與地方官按年照數收租解部等語夫年嵗之豐歉不齊如遇歉收之嵗仍照定數徵租則百姓不免受累其旱澇之年作何減收豐稔之年作何補納之處著各該州縣官隨嵗之豐歉酌量辦理報明該旗仍報部存案以備稽察倘有藉端朦混不據實辦理者即著該旗該督查㕘三年諭朕前以旗人生計貧乏者多令王大臣議將八旗入官地畝立為公産收租解部按旗分給以資養贍此等地畝内有定鼎之初圈給八旗官兵將田賦悉行開除者亦有與百姓自相交易出銀置買仍在州縣納糧者兩種原屬不同若以入官之後一概定為公産不准民買殊非朕軫念畿輔黎赤之本懐嗣後除原圈官地不准民間置買外其旗人自置有糧之地見在入官者不論旗民准照原估買值變賣將銀解部交各旗料理生息分給旗人俾沾惠澤四年諭從前降㫖令將入官地畝仍賞與八旗以為恒産隨經八旗大臣議稱借支庫銀於京城空地蓋屋賞無房人居住將公産地租陸續補庫其續收地租作何賞給永逺接濟别議具奏等語朕思此項地畝均係旗人舊業有因拖欠錢糧入官者有貪婪官吏抵應賠款項入官者既賞還八旗人等仍留公官辦不但所得地租分散之時勢難均齊而地畝租銀官收之數亦必少於私收分賞衆人則人多數少無濟於事勢必隨手化費此項地畝仍令八旗官兵或指俸餉或交見銀承買為業則八旗人等各得立産於生計自有裨益承買價銀即交部以補蓋房之項其餘銀作何辦理及見有地畝作何視其肥瘠酌量等第别定價值令其認買該部會同八旗大臣等詳晰議奏户部八旗都統㑹議凡一等地三十畝作價四十八兩二等地三十畝價三十八兩三等地三十畝價二十八兩四等地三十畝價十八兩荒地三十畝價十二兩令官兵承買價銀限五年交完其指俸餉抵買者亦於五年内坐扣至此次公産地價之餘銀應交地方官將民典旗地贖回報部先令原業主照原價取贖不願者聽他人承買疏入諭户部曰我朝定鼎之初將近京地畝圈給旗人在當日為八旗生計有不得不然之勢其時旗人所得地畝原足以資養贍嗣因生齒日繁恒産漸少又或因事急需將地畝漸次典與民家為業閲年久逺輾轉相授已成民産今欲將從前典出旗地陸續贖回必須於民全無擾累始為妥協再此項地畝官員内尚須扣俸認買貧乏兵丁食餉有限無從措價勢必盡歸富户富户即肯周濟親族亦豈能多為分給則贖地一事恐未必於貧乏旗人有益可將此㫖行文直𨽻總督詳悉妥議五年議定取贖民典旗地及旗人下鄉種地之例户部議准直隸督臣奏一取贖民典旗地百姓不苦於得價還地實懼其奪田别佃應令地方官於贖地之時將見在佃户及見出之租數造册備案嗣後無論何人承買仍令原佃承種其租銀照舊如莊頭土豪無故增租奪佃者罪之民有從前造房立墳墓於旗地内者令丈明所占地畝照例交租不許勒令遷移違者罪之一貧乏兵丁無力措價買地即買亦不能多查八旗公産及入官地及此項贖回民地不下數千萬畝應勘明八旗閑散人内有正户正身居家勤儉者上地給與百畝中地給百五十畝下地給二百畝令攜其妻子下鄉耕種初種之年官給牛種房舍之資於貧乏旗人生計實為利賴從之九年定民典旗地減價取贖之令凡民典旗地不論契載年限總以十年為率在十年之内者照原價十年以外者減原價十分之一二十年以外減十之二三十年以外減十之三四十年以外減十之四五十年以外者半價取贖至十一年復定取贖旗地自十年以外每年遞減至五十年以外仍以半價取贖又令八旗官兵承買公産地者亦照官贖減價十一年八旗公産地准編設莊頭時以八旗公産地内有未經承買以及存退餘絶地畝共六千四百餘頃於乾隆七年酌留千頃為各案撥補之用每年官收租息為數既輕吏胥包攬侵漁之弊皆所不免議令履畝詳勘量地之肥瘠定出租若干如地美租多整分莊頭仍照例給地十八頃半分莊頭給地九頃如地瘠租少酌量加增其新設莊頭令免差一年十八年令嗣後旗下奴僕及開户人典買旗地定限一年内自首官為回贖照民典旗地例分年限減價取贖如係其主之地十年以内即減原價十分之一十年以外減十之二以次遞減若原主不能贖即交八旗内務府作為公産官為收租嵗終將收過租息數目奏聞請㫖賞給貧乏旗人以資養贍又定嗣後民典旗地停其召買交與該旗為公産所收租息為養贍貧乏旗人之用十九年清查遺漏沉没旗地軍機大臣等會議現今八旗查送旗人原圈地畝自置地畝内典賣與民前此清查時未經報出此次共報出一萬四千七百五十九頃零但此等多係原業主子孫年㓜其地畝數目坐落村莊典地民人名姓不能記憶是以未經報出查直隸各屬除民地外俱係旗人原圈地畝若將現納錢糧民地開除挨村清查即遺漏沉没旗地俱得清楚從之二十一年諭八旗另記檔案及養子開户人等俱准其出旗為民所有本身田産并許帶往至二十二年户部奏請出旗為民另記檔案人等凡契買民地並開墾地畝係伊本身田産應遵㫖准其帯往為業至於老圈並典買八旗地畝不便將旗地帶入民籍應查明動官帑贖回從之定旗人舊典房地不准回贖之例户部奏准八旗房地在康熙年間典賣者俱係白契或典或賣真偽難分概不准其回贖停止新滿洲丈撥地畝照地給與租銀新滿洲人等來京當差向例於直屬存退餘絶地内按品級大小分别撥給至是以領地有肥瘠之異且滋侵隠掯租之弊户部奏准嗣後每畝酌給租銀一錢五分核計一名壯丁地每年給租銀四兩五錢即在直屬徵解部庫旗租銀内動給至二十九年户部奏各旗逺年得地之新滿洲人等以不得租息呈請退地領租應俱照二十一年奏准之例從之二十二年准民奴典賣旗地分别減價先行發帑贖回照旗地旗租之例收租户部議近據直𨽻督臣查清候贖旗地一萬四千五百十八頃若照旗地旗租每畝一二錢至三四錢不等而現在民人承種每畝官租銀最多者不過錢許請將候贖地畝懇恩先行發帑照數贖回交八旗都統等照旗地旗租之例收取租銀按年解部俟歸清帑項後應作何遵照原奉恩㫖辦理之處再詳議奏請從之准八旗存退餘絶地照例安放莊頭户部議二十一年奏銷册報存退餘絶地三千二十八頃有竒應酌留一千頃為撥補官用其餘照乾隆十一年之例安放莊頭從之准八旗入官地照原額租數徵收户部議入官地畝現存三千四百九十一頃有竒應交與該旗查明原業原收租數行令地方官照數徵收按年解部疏入諭入官地畝交與該旗查明原業原收租數行令地方官照數徵收之處此等地畝以加惠小民而論即租額再為輕減亦無不可但向來官地租額雖輕而民佃多不沾實惠蓋地租一項既不在官又不在民則不肖官吏轉得視為利藪該部請照原納租數徵收自為杜絶弊端所奏是但旗人原收租數或係市平市斛而官為收納勢必用庫平官斛則租數雖屬相符而貧民所加已屬不少嗣後入官地畝地方官照原數徵收著即照原收平斛令其輸納庶俾承佃各户交租不致畸重而官吏亦不致中飽矣二十三年諭出旗為民之漢軍内所有向日承種井田屯田者俱久頼地畝為生一旦將此項地畝撤出未免失其生業著將伊等現在承種地畝加恩即行賞給耕種直隸總督方觀承言漢軍出旗為民人等内有原領井田並屯種官地䝉恩賞給耕種𢃄入民籍請將此二項地畝勘明村莊段落填給印照註明賞種官地字樣交本人收執庶不致混入民産又領種井田定額每畝徵糓一斗應仍照舊徵收其屯種官地定為三等徵租上地徵銀六分中地四分下地三分均歸州縣徴收解部下部議行二十五年定違禁私行長租之例違禁私行長租者業主租户各治以違禁罪外由業户名下將租價追出入官由租户名下將地畝追出給還本人使業主租户兩失長租之利以示懲警查丈熱河道屬四旗通判地方旗人增墾地畝按則陞科方觀承言熱河道屬四旗通判地方東西兩河丈出墾熟未陞科旗地三千九百三十三頃六十四畝有竒應照該處上則一分四釐起科下部議行二十七年諭户部所有八旗積存地畝一項摺内酌議分設莊頭之處著照所請行但安放莊頭需地不過三四千頃所餘尚有一萬頃之多此等皆係老圈旗地且發帑贖回者十居七八原係應存入官地畝著將此項交内務府派員經理徵收俟原帑按數歸清之後即將地畝賞給八旗作為恒産其將來如何算定章程妥協辦理之處臨時著該部㑹同内務府八旗大臣悉心詳議具奏二十八年諭上年因八旗回贖旗地積至一萬餘頃之多降㫖令户部會同内務府八旗大臣定議以三千頃安設莊頭餘俱賞給八旗作為恒産第念此項田畝雖係旗人世産現在貧民耕種日久藉以滋生若改歸莊頭於傭佃農民未免失業所有分設莊頭管理之處不必行其如何按則交租并酌定章程之處著軍機大臣會同方觀承詳悉妥議具奏軍機大臣等議言現在回贖地畝各該業主每畝所收若干雖無從一一查核而各該處田畝之前後左右自必有現在旗民執業應即按照隣近田畝租數一體徵收以復舊額并核計佃户交官添補平色之數量為酌減令與輸租業主相仿請㫖特派大臣前往會同督臣逐一履畝查勘並將租額分别上中下則實數填註册内以憑查核奉㫖派英亷錢汝誠會同方觀承查辦嗣節經英亷等奏此項回贖地畝應照所勘地畝之厚薄隣租之重輕並查明原典價值之多寡就實在情形酌量更定使租與地兩相適稱無庸拘泥原租之數臣等履畝查勘直屬六十五州縣㕔地畝租銀均已查辦完竣凡分佃之花户姓名一一填註册中按名分給執照照内將村名地數及每畝徴租若干細數開冩統計地一萬四千五百三十四頃六十二畝有竒原徵租銀二十萬二千二百六十七兩酌復租銀十有一萬三千二百二十五兩每年共應徵租銀三十一萬五千四百九十二兩有竒照例解交藩庫彚總解部從之三十二年申典買旗地之禁户部議准内務府所屬一切鷹户炭軍炸軍灰軍并銀兩莊頭等嗣後如有再行典買旗地及代伊等在民之親族借名頂冐等弊或經查出告發均照民典民買之例分别治罪定回贖墳地不論段落仍與限制户部定例墳塋地畝不准入官如已入官數在三頃以内者查明給還三頃以外者給還之數不得過三頃又直屬人民典買旗地官給價值回贖徴租但其間有原業於未經典賣旗地以前𦵏有祖父墳塋者不為分别辦理殊於墳地不得入官併已入官者查明給還之例有礙是以先經户部酌議准令原業回贖如三品以上大員贖不過二頃四品以下不過一頃兵丁閒散不過五十畝嗣因各旗人所贖之地間有塊段錯落與墳塋不相干涉者恐啓混冒之漸復經户部詳細咨查惟是一段地畝或佃户認種劃分或業主分契出典致成數段地方官按段開造者所在多有行查徒滋案牘况自二頃至五十畝已按品級而定若其數目既符即與定例脗合且查各旗縁事入官之地若有祖塋尚准予世守而官贖之産若拘於塊段則旗人以例得回贖之地反致有虧自非原定回贖墳地本意應咨各該旗内務府查照原定二頃一頃五十畝之數辦理毋庸分别段落以昭平允三十四年停止旗員查丈定租之例户部議直𨽻總督楊廷璋奏本旗委員查丈直屬入官地畝定租之例永行停止自屬防弊之法應如該督所奏嗣後報出入官地畝即由該督於户部文到之日飭司遴員會同地方官履勘酌租其六十八州縣從前有照原租短少者令其檢舉自首疏入奉諭㫖此後入官地畝停止旗員查丈定租之例著照所議行至於舊案令地方官於一年限内自行詳查酌復原租由府道藩司轉詳該督覆核咨部之處尚未妥協此等入官旗地歴年久逺地方官原定租額時大率不能詳核者多若仍令伊等自行查改難保無迴䕶徇情朦混草率諸弊或僅將不能掩飾者舉出更正一二仍屬有名無實自應特派幹員通行履畝會勘確核方為徹底清釐之道著户刑二部㨂選明幹滿漢司官各四員其餘各部揀選滿漢司官各二員交户部帶領引見候朕簡派前往會同府尹及各該府秉公悉心查辦三十六年定西四旗地畝額徵户部議吏部侍郎袁守侗會同山西巡撫鄂寳奏原徵察哈爾西四旗地畝并清水河徴收米石改折銀兩畫一辦理其應州等八處悉照内地州縣成例從之定旗地抵給之例大學士劉統勲等議八旗荒蕪地畝酌量墾種并開挖泡子奉諭㫖此項開挖泡子低窪田畝雖荒蕪已久在業户原不能收藝穫之利但伊等究未免少此産業殊堪軫念著加恩將應行開挖之地查明畝數交户部於官贖旗地及入官地畝内酌量減半抵給俾得耕種取租足資永業以示體恤三十七年定典賣旗地追價之例户部議旗人將地畝違例典賣與民人及旗下家奴者所有應追地價若本人業經物故及家産全無之人向祇咨部年底彚題請豁嗣後此等銀兩若數至五百兩以上者請専案具題以昭慎重從之三十八年定左右兩翼送部徵收地税冊内將州縣村莊一併造入户部議八旗有地之家不下數萬户向祇右翼報部並未轉行各州縣而左翼並不開報若令舊有地畝盡查造冊未免紛擾嗣後旗人置買地畝應飭令左右二翼開列旗籍人名地畝段落四至并原買價銀一體按季報部由部照造地册轉行直督順天府存案在八旗買地之人不過於照例投稅之便據實呈明即左右二翼四季冊報本係現行常例亦無另有更張之處而行之既久凡旗人地畝各州縣均冇冊檔可稽不特塵案可以速清而争端亦可漸息如議行三十九年令旗人抵帑入官地畝按照租數作價户部議向例召買公産旗地按租作等按等定價此係將在官地畝散給旗人永為世業是以租重價輕以副皇上惠養八旗之意至旗人未完官帑將地畝議價入官抵項情節本不相同似應租價相當方為允協且户口繁滋地價頓增數倍應請嗣後八旗官兵人等有地畝報抵入官者將原契原價原佃原租各數由旗查實報部行文直𨽻總督委員履勘相符咨覆即計租定價統以三分三釐之息為斷則完帑不至拮据而議租亦不能意為重輕胥役無從滋弊如議行申旗民私開地畝之禁户部議大凌河馬厰牧場水草内旗民人等私開地畝建蓋房屋全行拆毁私開人等照例治罪將督率不力之地方官咨部議處並令總管等每年春秋二季親身詳查如議行四十年嚴偷墾私造之禁户部議大孤山地方所有閒空地畝即作該城兵丁馬厰其五塊石地方偷墾地畝私造房間民人交與該地方官治罪如議行四十四年諭近以八旗贖回入官老圈地畝從前俱准八旗官員兵丁認買後不肖之徒有偷行典賣與民人等弊始改為不准官員兵丁認買俱官為取租今旗人生齒較前有加此項地畝倘仍官為取租必致旗人産業漸少於伊等生計大無禆益是以降㫖將官為贖出入官老圈地畝仍准官員兵丁分買交户部八旗詳悉定議具奏今復詳為籌畫八旗人丁浩繁此内有家奴者固多而無家奴者亦復不少其認買地畝若離京稍近尚易於取租倘或在數百里之外必又紛紛告假取租不惟徒費資斧又起民人勒掯之端其地租能否全得尚在未定而每月反將所得錢糧先行坐扣地價於伊等生計反無禆益實不能仰副朕愛養旗人之至意朕意不如將此項地畝仍官為取租將每年所得之租解送户部分給八旗賞賚兵丁如此辦理既不費伊等之力而錢糧又毫無坐扣於伊等生計更為有益著交户部八旗均匀分給仰體朕愛養旗人至意四十六年諭户部議覆索諾木䇿凌等杳丈流民私墾地畝仿照山東科則定賦一摺自應如此辦理流民私墾地畝於該處滿洲生計大有妨礙是以照内地賦則酌增以杜流民佔種之弊且撤出地畝並可令滿洲耕種不特於旗人生計有益並可習種地之勞不㤀舊俗原非為加賦起見至吉林與奉天接壤地糧自應畫一今據户部查奏吉林所定額賦又係照直𨽻辦理與奉天查照山東科則者互異是和隆武専似為言利起見殊非均平額賦加惠旗人之意所有吉林地畝錢糧應收賦則著交和隆武會同索諾木䇿凌詳悉熟籌酌中畫一定額妥議具奏尋經和隆武等覆奏户部議准四十二年以前陳民耕種地畝照奉天陳民例分為上中下三等銀米各半徵收以後續行查出私開地畝亦照奉天查出流民地畝加增糧額之例銀米並徵是辦理既有等差亦酌中定賦不致畸重畸輕尚屬可行應如所奏辦理從之四十七年禁民人典賣旗房軍機處會同八旗議准御史西成條奏民人不許典買在京旗房如有陽奉隂違一經發覺即照民典旗地之例辦理並在屯旗房亦應一律辦理未便兩歧並行文一體遵照四十八年定旗租照正項錢糧例户部議旗地租銀與正項錢糧