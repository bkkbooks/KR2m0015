body:
  text: 經籍考二十四集詩集臣等謹按馬端臨於别集外復輯詩集一門凡無文而獨有詩及有文而詩仍獨行者胥隸焉伏讀我皇上御製樂善堂文集並御製文初集奎藻騰輝裒成巨帙而御製詩自初集以至四集篇逾三萬騰誦寰瀛不特為歷代帝王之所無即上下千餘年望重詞壇著述浩博者亦疇能仰希萬一自今以往富有日新更不知以幾千萬億計是非分門恭輯曷由見典謨賡咏各極其隆有如是之空前軼後者爰仍端臨舊例别輯是門而以臣下之單行詩集敬附於後其已見别集類者亦不復更載焉御製詩初集四十四卷目録四卷二集九十四卷目録十卷三集一百卷目録十二卷四集一百卷目録十二卷皇上御製初集序曰向叙樂善堂集云夙昔典學所心得不忍棄置後雖有作或出詞臣之手真贋各半且亦不欲與文人學士爭長故十數年來臣工以編次詩文集為請者概弗許然幾務之暇無他可娛往往作為詩古文賦文賦不數十篇詩則托興寄情朝吟夕諷其間天時農事之宜涖朝將祀之典以及時巡所至山川名勝風土淳漓罔不形諸咏歌紀其梗概積至今以數千百首計矣而較晴量雨憫農疾苦之作為多觀其詩可以知憂勞而驗今昔使閲嵗逾時或致殘缺失次其不忍棄置較先為甚因取丙辰以迄丁卯所作略加編定都為四十四卷古今體計四千一百五十首有竒命翰林中字畫端楷者分卷鈔録裝為一集不付剞劂猶初志也臣等謹按御製詩己刻者凡四卷皆合古今諸體編年為次自乾隆元年丙辰至乾隆十二年丁卯為初集計詩四千一百五十餘首自乾隆十三年戊辰至乾隆二十四年己卯為二集計詩八千四百七十餘首皆大學士蔣溥恭校自乾隆二十五年庚辰至乾隆三十六年辛卯為三集計詩一萬一千六百二十餘首大學士于敏中恭校自乾隆三十七年壬辰至乾隆四十八年癸卯為四集計詩九千七百餘首協辦大學士梁國治恭校通三萬三千八百七十餘首三百七十二卷極古今詩集之富無有過於我皇上者仰見敬天法祖勤民愛物之念殷於宵旰者五十年猶如一日故宣為歌詠者三萬篇如出一源至於覽蹟考器陟巘觀泉宸翰昭垂罔非道妙蓋天章富有積萬首始彚成編而海澨情殷閲一紀始窺新製故當四集奏竣在大聖人沖懷謙抑猶是不令付梓之初心而中外臣庶益思進覩鴻篇方冀剞劂氏之雕鋟無已也矣靜惕堂詩集四十四卷曹溶撰溶見史類橘洲詩集六卷范士楫撰士楫字箕生定興人前明崇禎丁丑進士入國朝官至吏部郎中臣等謹按士楫是集皆順治乙酉以後所作諸詩卷首有自序一篇述其作詩梗概詞多奧澀尚沿明季風氣故其詩亦未能湔除餘習戞然自造棲雲閣詩十六卷拾遺三卷高珩撰珩字䓤佩號念東晚號紫霞道人前明崇禎癸未進士入國朝官至刑部侍郎臣等謹按王士禎居易録曰珩生平撰著不減萬篇今觀其詩多不經意之作蓋揮寫有餘而凝鍊不足也蕉林詩集無卷數梁清標撰清標字玉立清苑人前明崇禎癸未進士改庶吉士入國朝官至保和殿大學士九山游草一卷梅花百咏一卷李確撰確見史類二槐草堂集無卷數王翃撰翃字介人嘉興人王晫今世說曰翃少失學論孟不卒讀識字而已弱冠偶覽傳竒即欣然㑹意曰此無難吾亦能之即據案唔唔學填詞竟合調自後學不稍懈工詞曲又進攻詩然貧日甚抱膝苦吟落落不問家人産直木堂詩集七卷釋本晝撰本晝字天嶽號寒泉子居紹興平陽寺李鄴嗣序曰天嶽詩非有人作序幾不知為曲彔座上人也黃宗羲序曰天嶽五律上入王孟之室次不落大復以下南耕草堂詩稿無卷數曹亮武撰亮武字渭公號南耕宜興人雲龕遺稿一卷梁春暉撰春暉號淑三福建長樂人春暉孫澄漪跋曰初名雲龕吟稿嘗謀鋟板而力未逮藏弆既久不幸為蟲鼠所戕剝蝕斷爛至不可讀細加檢録得其首尾完具者僅十之一二裒為一卷顔曰雲龕遺稿云茂緑軒集四卷顧夢游撰夢游字與治江寧人前明諸生苧菴二集十二卷吳懋謙撰懋謙字六益松江人徐太拙詩稿無卷數徐振芳撰振芳字太拙山東樂安人蘧廬詩無卷數韓純玉撰純玉字子蘧别號蘧廬居士歸安人毛先舒序曰子蘧詩悲凉沈逺矯然不羣朱彛尊序曰子蘧五古詩波瀾老成南北行旅諸篇尤為竒崛張秦亭詩集十三卷張丹撰丹字祖望原名綱孫錢塘人蕊雲集一卷晚唱一卷毛先舒撰先舒見經類筠溪集七卷范青撰青字筠堅上海人橘苑詩鈔十一卷諸匡鼎撰匡鼎字虎男錢塘人完玉堂詩集十卷釋元璟撰元璟字借山浙江天童寺僧臣等謹按元璟居武陵曽結西溪吟社一時名流皆相過從推服者頗衆王士禎居易録亦摘録其句雖根抵未深而落筆清新絶無一㸃塵俗之氣冬關詩鈔六卷釋通復撰通復字文可嘉興人蘭雪堂詩集三卷謝賓王撰賓王字起東臨淄人順治丙戌進士官南康府推官黃山詩留十六卷法若真撰若真字漢儒號黃石一字黃山膠州人順治乙酉以五經特賜中式授中書舍人丙戌成進士改庶吉士官至南康府知府心逺堂詩集十二卷李霨撰霨字坦園高陽人順治丙戌進士官至大學士諡文勤臣等謹按霨詩舂容和雅不為呌囂之音故能黼黻升平導揚雅化際一時交泰之盛荷九重特達之知所謂和聲以鳴盛者誠不同乎瓦缶之響也且亭詩集無卷數楊思聖撰思聖字猶龍巨鹿人順治丙戌進士官至四川布政使夢吟集一卷續集一卷王天春撰天春字魯源濟寧人順治丙戌進士官至兵部侍郎佳山堂集十卷馮溥撰溥字易齊益都人順治丁亥進士官至大學士馮定逺集十一卷馮班撰班見子類臣等謹按班與其兄舒皆以詩名稱海虞二馮然舒之論詩講起承轉合最嚴班則欲化去此法微有不同要其所作俱淵源於才調集玉臺新咏二書則其風格猶未能進而益上也志壑堂詩十五卷唐夢賚撰夢賚字濟武淄川人順治己丑進士官翰林院檢討姜宸英序曰讀其經世之言所謂籌餉積穀銅鈔改漕之法訏謨碩畫鑿鑿皆可見之施行王士禎序曰夢賚文近於䝉莊詩近於東坡慈溪前集二十四卷後集八卷今選定為十五卷寶綸堂集五卷許纘曾撰纘曾見史類臣等謹按纘曾集中樂府規倣舊文七言古詩多學初唐四傑之作頗能不為宋體所惑漫餘草一卷王庭撰庭見子類臣等謹按庭所為詩有秋間三仕二西諸草是集刻於康熙戊辰乃其晚嵗所訂大約近體多於古體七律一種又多於諸體循寄堂詩稿無卷數朱廷燝撰廷燝字山輝富平人順治己丑進士官至河南布政使參政容菴詩集十卷辛卯集一卷孫爽撰爽字子度錢塘人萬山樓詩集二十四卷許虬撰虬字竹隱長洲人順治辛卯舉人官至思南府知府林卧遙集三卷趙吉士撰吉士見史類臣等謹按是集凡詩一千五百餘首題雖不一皆疊金壇于漢翔所貽四首之韻初名疊韻千律尋又續得五百餘首名曰千疊波餘合為是集夫和詩而至千餘首之多亦古今所創見以云能工則未之信也張康侯詩草十一卷張晉撰晉字康侯狄道人順治壬辰進士官丹徒縣知縣憗齊存稿四卷白乃貞撰乃貞字亷叔號蘂淵順治壬辰進士官翰林院檢討堪齊詩存八卷顧大申撰大申字震雉一字見山華亭人順治壬辰進士官至户部郎中陳伯璣跋曰大申七律高華可追王李天延閣詩前集十六卷後集十三卷花果㑹唱和詩一卷贈言集四卷瞿山詩略三十三卷梅清撰清字潤公號瞿山宣城人順治甲午舉人涑亭詩略一卷林堯光撰堯光字覲伯莆田人順治中拔貢生官行人司行人浣亭詩略二卷浣亭歸來吟一卷附山䕬花埡長短句一卷林堯華撰堯華字開伯莆田人堯光之弟順治甲午舉人官榆次縣知縣鄭王臣序曰堯光伯仲詩各臻妙境堯光尤秀拔當為馬氏白眉鶴嶺山人詩集十六卷王澤宏撰澤宏字涓來黃岡人順治乙未進士官至禮部尚書綿津山人詩集十八卷附楓香詞一卷緯蕭草堂詩一卷宋犖撰犖見史類劉榛序曰綿津集如種樹然方初植雖一病葉不忍摘久之而繁枝芟焉又久之而歧幹斫焉臣等謹按是集合子目十有四種大抵其初旋出放刻故瑕瑜互見後撫江右時屢自刪削併為是編而諸集之目如舊後又自訂西陂類稿悉取此集中詩而去之則學問愈深故盡悔其少作耳漁洋詩集二十二卷續集十六卷南海集二卷雍益集一卷精華録十卷王士禎撰士禎見史類盛符升序雍益集曰先生自言再使秦蜀往返萬里得詩才百餘篇皆寥寥短章無復當年蜀道南海豪放之格臣等謹按士禎詩正續集三十八卷皆其生平刻意之作蓋士禎官詹事以前文章聲譽遍滿騷壇方與天下作者馳逐矜名故是二集為菁華所聚至南海集則其奉使祭告南海往還之作趙執信謂其開卷二詩似羈臣遷客之語雍益集則為奉使祭告西嶽西鎮江瀆時所作嘗自言老耽禪寂遇事短吟略放西竺氏偈頌不應作文字觀矣精華録十卷乃士禎刪掇諸集手定成帙其子啓汧以為曹禾盛彥升所録蓋託辭也掄山集選一卷王士禧撰士禧字禮吉山東新城人閒居草一卷董含撰含字榕菴華亭人秋笳集八卷吳兆騫撰兆騫字漢槎吳江人順治丁酉舉人緣事戍寧古塔䝉恩赦還嵩菴集五卷馮蘇撰蘇見史類行素堂詩集一卷李如淓撰如淓字仲淵高陽人順治己亥進士官鄷都縣知縣臣等謹按如淓之祖父均遭明末之難如淓間關冒險尋訪遺踪扶櫬歸里鄉人至今稱其孝行云笠山詩選五卷孫蕙撰蕙見史類王士禎序曰蕙工五七言詩雖古作者無以加之谷口山房詩集十卷李念慈撰念慈字屺瞻號劬庵涇陽人順治辛丑進士官河間府推官改補新城縣知縣緣事禠職後以運餉有功再授天門縣知縣證山堂集八卷周斯盛撰斯盛字屺公鄞縣人順治辛丑進士官即墨縣知縣以事繫獄後放歸時一吟詩四卷黎耿然撰耿然字介菴晉江人始為諸生後從軍積功至雲南總兵官積書巖詩選無卷數劉逢源撰逢源字津逮廣平人稽留山人集二十卷陳祚明撰祚明字允倩錢塘人浙江通志曰祚明博學善屬文以貧傭書京師歿於客邸所著有詩二十卷詞一卷古文尤富臣等謹按詞與古文今皆未見此其詩集也亦名敝帚集性學吟二卷徐世沐撰世沐見經類臣等謹按是編以詩講學皆拈太極仁義之類為題又時附夾注數語定峯樂府十卷沙張白撰張白原名一卿號定峯江陰人葭里集六卷葭里二集六卷葭里三集五卷周鐈撰鐈字若柯南和人順治中諸生魏裔介序曰鐈詩溫潤清脫唐人中項斯馬戴可以伯仲突星閣詩鈔十五卷王戩撰戩字孟榖漢陽人戩從子楠識曰前五卷阮亭付梓後九卷朱愷仲董養齊所鐫末一卷則許謙次諸人所刻杏村詩集七卷謝重輝撰重輝字千仭號方山德州人大學士升子由䕃生官至刑部郎中蕭亭詩選六卷張實居撰實居字賓公號蕭亭鄒平人王士禎序曰肅然之隂其東面曰大谷谷中二十四村皆隱逸之奧區實居得靈芝五色於山麓泉上因作採芝山堂詩千餘首樂府古選尤有神解為擇其最者三百篇為此集云後圃編年稿十六卷李嶟瑞撰嶟瑞字蒼存盱眙人王士禎序曰嶟瑞詩縱橫有竒氣丁野鶴詩鈔十卷丁耀亢撰耀亢字西生號野鶴諸城人順治中由貢生官至惠安縣知縣吾好遺稿一卷章靜宜撰靜宜字湘御吳縣人順治中諸生菜山堂集八卷遺稿五卷章金牧撰金牧字雲李歸安人官柏鄉縣知縣江泠閣詩集十四卷冷士嵋撰士嵋見别集類澄江集無卷數陸次雲撰次雲見史類臣等謹按尤侗序曰次雲尚有玉山集附此以傳今未之見恕齊偶存七卷方士頴撰士頴字伯陽淳安人諸生耐俗軒詩集三卷申頲撰頲字敬立廣平人副榜貢生一溉堂詩集一卷余光耿撰光耿字介遵婺源人康熙初諸生江南通志作舉人陽山詩集十卷陳炳撰炳字虎文長洲人黃中堅跋曰炳詩有松頂紅裙拖緑上山腰白鳥破青飛之句由是知名黃葉村莊詩集十卷吳之振撰之振字孟舉石門人貢生官中書科中書璇璣碎錦二卷萬樹撰樹字紅友宜興人臣等謹按是集皆回文詩圖組織頗巧然敝精神於無用之地固大雅所弗尚也彊恕堂詩集八卷高之騱撰之騱字仲治淄川人重知堂詩二卷趙善慶撰善慶字怡齊德州人貢生官至金華府知府王士禎序曰怡齊之詩妙在本色寵夀堂詩集三十卷張競光撰競光字覺菴杭州人雪菴詩存二卷丁嗣徵撰嗣徵字集虗嘉善人尺五堂詩刪六卷嚴我斯撰我斯字存菴歸安人康熙甲辰進士第一官至禮部左侍郎珂雪詩無卷數曹貞吉撰貞吉字升六號實菴安邱人康熙甲辰進士官至禮部員外郎臣等謹按王士禎嘗選十子詩略貞吉其一也詩格遒鍊為世所推惜稿多散佚故士禎感舊集所選登望海樓吳山晚眺金山諸詩是集中皆未之見焉戒菴詩存一卷邵逺平撰逺平本名吳逺字戒三仁和人康熙甲辰進士官至光祿寺少卿己未召試博學鴻詞授翰林院侍讀歷遷詹事府少詹事逺平自序曰己未再入京五載內所作多典禮紀頌之章雪園詩集六卷梁圭撰圭字至鋐號雪園福建長樂人樂圃詩集七卷顔光敏撰光敏字遜甫一字修來曲阜人康熙丁未進士官至吏部考功司郎中栁村詩集十二卷董訥撰訥見史類張希良序曰訥有别墅在城南二里曰栁村取以名集今上四十一年冬法駕時巡幸栁村之南樓御書眷念舊勞四大字以旌其墓又命其子思凝繕寫遺集上之石屋詩鈔八卷補鈔一卷魏麟徵撰麟徵字蒼石溧陽人康熙丁未進士官至邵武府知府慎修堂詩集八卷廖騰煃撰騰煃字占五號蓮山將樂人康熙己酉舉人官至户部侍郎玉巖詩集七卷林麟焻撰麟焻字石來莆田人康熙庚戌進士官至貴州提學僉事古鉢集選一卷王士祜撰士祜字叔子一字子側號東亭又號古鉢山人山東新城人康熙庚戌進士計東跋曰三王並工詩西樵阮亭早達故聲譽起若東亭之才詎肯作蜂腰哉世恩堂集三十五卷王頊齡撰頊齡號瑁湖華亭人康熙丙辰進士己未召試博學鴻詞授編修官至大學士諡文恭臣等謹按頊齡遭遇昌時荷䝉特拔從容館閣洊陟台衡故其詩雍容和雅多太平黼黻之音昔人所謂臺閣文章蓋如是也寶嗇堂詩稿四卷河上草二卷蘭樵歸田稿一卷張榕端撰榕端見史類龎塏序寶嗇堂稿曰榕端詩和而不迫秀而不纎逸而不肆宛轉纒綿一寫其胸中之趣而未嘗借以宣其喜怒不平之氣宋犖序河上草曰榕端泥塗攆橇楗石沈薪卒以塞決乃不見其有歌咏勤苦之勞而往往道其達天適性之學彭椒巖詩稿二十二卷彭開祐撰開祐字孝緒號椒巖婁縣人康熙丙辰進士官至武岡州知州翠滴樓詩集六卷馮雲驌撰雲驌字懿生代州人康熙丙辰進士官翰林院編修清芬堂存稿八卷胡會恩撰會恩字孟綸德清人康熙丙辰進士官至刑部尚書西澗初集六卷劉然撰然字簡齊江寧人受祺堂詩集三十四卷李因篤撰因篤字子德又字天生富平人康熙己未召試博學鴻詞授翰林院檢討深秀堂近草五卷潘鍾麟撰鍾麟字層峰華亭人因園集十三卷趙執信撰執信號秋谷晚號飴山老人博山人康熙己未進士官至左春坊左贊善門人丁際隆跋曰辛酉秋重謁秋谷先生於因園時先生病目彌甚不作詩者六年矣從仲君羮梅得先生手定詩稿分十三集録副未及校而羮梅遂索原本以去嵗寒無事乃校一過曩見手書濟南竹枝及宿法慶寺二律皆不在蓋所刪多矣艮齊倦稿十五卷尤侗撰侗見史類臣等謹按侗詩除已載全集及鶴棲堂稿外此其晚嵗之作故曰倦稿野香亭集十三卷李孚青撰孚青字丹壑合肥人大學士天馥子康熙己未進士官翰林院編修雪石堂詩草無卷數劉爾􅀈撰爾􅀈字敬又宜君人康熙己未嘗薦舉博學鴻詞蓮洋詩鈔十卷别本蓮洋集二十卷吳雯撰雯字天章本遼陽人寄籍蒲州康熙己未嘗薦舉博學鴻詞晚樹樓詩稿四卷吳震方撰震方見經類臣等謹按震方以御史罷歸康熙癸未恭逢聖祖南巡進所輯朱子論定文鈔䝉恩復職復御書白居易詩賜之因摘詩中晚樹二字名其樓徐都講詩一卷徐昭華撰昭華字亦曰昭華駱加采之妻臣等謹按昭華之父咸清嘗與毛竒齡游逮竒齡里居年已垂暮昭華以詩請業稱女弟子故有都講之目是編即附刻西河集後陳維嵩序之山曉閣詩十二卷孫琮撰琮字執升嘉善人香草居集七卷李符撰符本名符逺字分虎號耕客嘉興人寶菌堂遺詩二卷趙執端撰執端號緩菴益都人臣等謹按執端為執信之從弟王士禎之甥執信著談龍録以指摘士禎執端獨舍兄而從舅字摹句擬間亦得其形似所過士禎舊居詩為其兄談龍録而作在執信負氣之過誠所不免然執端竟以羣兒謗傷詆之是亦可謂已甚已友柏堂遺詩選二卷馮協一撰協一字躬暨益都人大學士溥第三子以溥䕃官至臺灣府知府雙溪草堂詩集十卷附遊西山詩一卷汪晉徵撰晉徵字涵齊休寧人康熙己未進士官至户部侍郎老雲齊詩刪十卷沈不負撰不負字集九一字次山平湖人陸奎勳序曰康熙己卯不負刪其詩存十之五編年而不分體以授其子方蕙曰汝他日力能開雕當名之曰老雲齊詩刪不必更有增入馮舍人遺詩六卷馮廷櫆撰廷櫆字大木德州人康熙壬戌進士官中書舍人艾納山房集五卷王九齡撰九齡字子武華亭人康熙壬戌進士官至都察院左都御史臣等謹按九齡之詩純以情韻勝蓋挹何李之流波而加以富艷者嶺南二紀二卷茅兆儒撰兆儒號雪鴻錢塘人臣等謹按是編皆其紀遊之詩二卷共三百八十題每題皆以絶句一首系之愛日堂詩二十七卷陳元龍撰元龍見子類臣等謹按愛日堂者聖祖仁皇帝御書匾額也其詩編年分集多鳴盛之和聲倚雲閣詩集一卷汪灝撰灝字文漪一字天泉臨清人康熙乙丒進士官至貴州巡撫􅔩老編年詩鈔十三卷金張撰張字介山錢塘人皇朝文獻通考卷二百三十四
