body:
  text: 國用考七蠲貸下災蠲順治三年以江西頻年旱澇其今年漕米之未兑運者罷免之直𨽻成安等七縣水湖廣興國等十州縣旱免今年田租四年陜西西安延安平凉臨洮慶陽漢中六府雹免今年田租五年山東夏津蝗免今年租朝城罹土賊之患除其逋糧六年直𨽻真定順徳廣平大名四府水免今年田租山西太原平陽汾遼澤五府州被水免租亦如之是年定凡遇災蠲免於起存項下均减如存留無餘即减起運之欵若有司藉無項可免使民不霑實恵者論八年湖廣倉焚其被燬米豆勿責是年定遇災題請蠲免州縣官以蠲免數目刋刻免單頒發其已入者明年以實除之官吏不給免單者以違㫖計贓論十年直𨽻之房山湖北之襄陽黄州荆州徳安湖南之常徳岳州永州江蘇之揚州淮安安徽之鳳陽廬州山東之濟南東昌各府並免今年災田額賦是年定州縣被災八分九分十分者免十分之三五六七分者免二四分者免一有漕糧州縣衛所准改折康熙十七年增定災地除五分以下不成災外六分者免十之一七分八分者免二九分十分者免三雍正六年諭改免被災十分者七九分者六八分者四七分者二六分者一乾隆元年諭被災五分之處亦准免十分之一永著為例十一年直𨽻八府山東二十一州縣江南五州縣浙江二十二縣衛旱並免今年田租湖廣石門蝗陜西漢隂雹免租亦如之十二年直𨽻夏蝗雹秋水旱被災者三十六州縣衛免今年田租江南浙江江西山東河南湖廣水旱山西陜西夏雹秋霜殺禾皆偏災免租亦如之是年西安延安平凉慶陽鞏昌漢中五府地震凡被災之兵民丁徭田賦悉予放除十三年直𨽻新樂河南彰徳蝗河南衛輝湖北武昌湖南常徳水山西大同陜西清水洛川二縣靖逺洮岷鳳翔等衛所雹並免災田租其陜西被雹之延綏鎮神木縣被蝗之山西和順縣免田租十之三是年除江西逋賦十四年直𨽻霸薊等七州寳坻等二十一縣保安等三衛梁城一所雹免今年田租武清漷二縣水免租如之江西浙江湖南廣東間遇水旱免災田租亦如之十五年湖北水免災田租直𨽻蠡雄等八縣山西五臺縣陜西潼闗辛莊各屯衛雹免租亦如之河南朴縣被雹災田免秋糧十之三浙江紹興寧波颶風按災分免賦有差十六年江西旱被災者四十五縣免今年賦銀糧並蠲貴州貴陽等六府湖南澧州等七州縣衛旱直𨽻趙州等六州縣河南睢州等十四州縣衛江蘇淮安徐州揚州安徽鳳陽湖北天門等六縣衛水並免今年田租河南湯隂縣雹免租亦如之其被雹之直𨽻慶雲唐縣按災分蠲免有差十七年河南河決睢杞虞城柘城永城夏邑六州縣災免今年租彰徳府屬旱免租如之江南邳蕭宿遷沭陽四州縣湖北蘄州廣濟縣直𨽻曲陽縣水免租亦如之其直𨽻被水之新安豐潤免十之二被旱之江南睢寧宿州鹽城按災分蠲免有差十八年浙江旱被災者二十九縣免今年田租江西鄱陽等四縣湖北沔陽州直𨽻霸州保定新城水免租亦如之其湖北被水之黄梅廣濟免十之三被雹之直𨽻新河免亦如之陜西同州臨潼岐山扶溝郿縣雹山東金鄉定陶旱各按災分蠲免有差是年山東淄川等四縣蝗十八年江南青浦等二十七縣衛旱康熈元年福建閩縣十二縣四川建昌等衛陕西西鳯興安等府水至是奏免其年各災田賦額有差康熈元年直𨽻江南山西河南四川水江西浙江旱湖北水旱偏災各免災田額賦有差二年直𨽻雲南四川貴州水江南湖南旱浙江江西湖北水旱甘肅雹偏災免災田額賦有差三年江西四十一州縣旱按分免賦有差直𨽻江南浙江福建湖廣陜西間被水免災田賦亦如之是年戸部言凡遇災傷之地將應徴額賦停徴十之三以竢題免庶民霑實惠從之四年山東山西旱免今年田租其山西舊逋以及山東寧海棲霞被兵疲之各州縣衛荒亡諸賦悉予放除其餘直𨽻江南浙江江西湖廣河南陜西間遇水旱雹災各免賦有差是年左都御史郝惟納言凡災地田賦免若干丁賦亦應免若干庶貧民恩澤均霑下部知之五年江南桃源贛榆蝗湖北沔陽黄岡十二州縣衛旱陜西鎮原雹並免今年田租其餘三省州縣被旱蝗雹及間遇水之處各按分免賦有差江西西寧等三十五州縣旱浙江象山等六縣水甘肅霜免災田賦亦如之六年福建龍溪等五縣旱免今年田租甘肅寧州等六州縣疫田租丁賦並免一年其直𨽻江南浙江山東山西陜西湖廣間遇水旱蝗雹各免災田額賦有差是年定凡蠲免有司官將應免者取每圖里長結状分送部科察覈如已徴在官不流抵次年及不扣除應蠲分數一概徵比侵蝕或經題定蠲數後不即出示曉諭或稱止蠲起運不蠲存留或由單内扣除不及蠲數者州縣衛所官均以違㫖侵欺論上司不行詳察使災黎無告者道府降三級督撫司降一級均調用又定蠲免流抵如蠲本年者填明次年由單之首流抵次年者填明第三年由單之首州縣衛所官不開載實數者論入年又定災傷不得以闔邑地畝通算分數仍按區圖村莊地畝被災分數蠲免七年直𨽻水凡五十州縣衛災其被災十分九分者諭除其租七分八分者免十之四餘如例行被水之江南淮揚二府屬各按分加免一分河南之安陽臨漳給復三年浙江之臨海天台二縣衛及甘肅被旱之莊浪等五縣並除今年田租其餘安徽湖廣間遇水旱各免額賦有差是年山東地震免災民額賦準水旱例行八年陜西水免南鄭田賦糧亦如之郿縣地為砂石所壓不能耕者永除其賦餘免租十之三其餘江南河南水山西雹直𨽻水且雹並免災田額賦有差是年以陜西平凉臨洮鞏昌三府屢被災荒除逋賦銀七萬八千三百兩糧十六萬三千石各有竒九年直𨽻博野等二十九州縣水開州等十四州縣旱山東濟陽等二十九州縣旱濰縣雹濟寧州水各免額賦有差其餘被水之州縣江蘇二十四安徽八浙江五被旱者河南九湖北六免賦亦如之其織造局種藍田之災者免今年靛時以淮陽數被水罷本年漕其康熙六年以後逋漕銀米皆勿收責又以山東康熙七年地震免災地賦銀二十二萬七千三百兩有竒是年定遇災蠲賦並令免田戸之租從吏科給事中莽佳之請也十年江南淮安揚州水除二府康熙元年至六年逋賦江寧徐海等府州蝗鳳陽等府旱直𨽻文安安肅等州縣夏旱秋水以及山東河南浙江湖廣陜西被水旱蝗雹蟲災者各免本年田租有差是年浙江巡撫范承謨以臨海太平平陽石門烏程五縣温州一衛頻年遭值饑饉其康熙元二三年隨漕行月逋賦請援康熙八年恩詔蠲免地丁逋賦之例亦予赦免從之明年又奏免石門縣康熙三年輕齎銀平陽縣康熙元二三年月粮各隨漕逋賦亦如之十一年江南災邳州等五州縣按災分各加免二分並免沐陽漕贈銀興化等五縣大河一衛全免今年租其去年今年漕賦銀米亦予放除餘免災田嵗租各有差時直𨽻山東河南山西陜西湖北間遇水旱蟲蝗霜雹之處按分蠲免亦如之是年除各省逋賦凡康熙元年三年江南之儀徴衛三四五年湖南之常寧縣四五六年陜西之西安鳳翔漢中六年浙江之太平松陽景寧湖南之衡州衛七八九年湖南之各屬九年江南之泰州江都山陽十年高郵之湖地山東之兖州各田租之未入入或未偹者悉除之十二年直𨽻霸州寳坻等十三州縣衛江南六安贑榆等七州縣河南輝縣水湖南瀏陽等三縣浙江仙居縣旱各免今年田租有差又以江南蘇松常鎮淮揚六府屢災諭免明年租十三年山東泰安等五十二州縣旱棲霞等六州縣水各免賦有差其餘被水州縣直𨽻十江南十有五江西十有二被旱者河南六免賦亦如之江南沐陽縣旱免十之一直𨽻霸州水陜西莊浪衛雹並免十之三是年除免浙江臨安等四縣逋賦銀三萬五千兩錢二千七百緡米六千石各有竒十四年江南淮揚徐鳳四府屬水免災田賦各有差其直𨽻江西湖北河南間被水旱免亦如之十五年江南河決淮陽災免災重者田租十之三餘各有差又以閩陜被兵除其賦其陜西之各宿逋並勿收責是年定凡蠲免銀增減造冊者州縣衛所官降二級調用司道府都司罰俸一年督撫罰俸六個月如被災未經題免之前報冊填入蠲免者州縣衛所官罰俸一年該管上司罰俸六個月十六年免江西廬陵贛州等四十一縣衛被兵荒田今年租其被旱之新建浮梁等十六州縣各按災分蠲免時江南淮徐二府水免亦如之直𨽻任縣水陜西寧夏衛蟲免賦十之三十七年以浙江近閩各縣衛首罹寇災其去年田租諭勿收責是年直𨽻河南江南浙江湖廣江西間被水旱之處各免田租有差十八年直𨽻地震免通州三河平谷今年田租香河武清永清寳坻免十之三薊州固安十之二山東河南安徽江西湖廣旱山西雹各免災田賦有差其安徽之安慶鳳陽廬州漕贈銀米亦予放除又以江西福建湖北罹寇災厯年逋賦令勿收責是年定凡賦税應蠲已徴者給印票次年按數抵免又定蠲賦而官侵蝕者照貪官例革職提問上司官狥縱者均革職十九年直𨽻山東山西旱雹免災田賦各有差是年除廣西去年田租二十年直𨽻山東江南浙江江西湖北間被水山西遼州榆社縣雹免災田賦各有差二十一年直𨽻山東江南浙江江西湖廣廣西陜西間遇水旱蟲雹免災田賦各有差是年以山西太原大同災民多流亡除逋賦二萬四千四百兩有竒以今年為始准給復三年又以福建候官等二十六州縣被兵之後其康熙十八年以來逋賦悉予放除二十二年山西崞縣忻州定襄五臺代州振武衛地震免明年田租山東新城縣水甘肅慶陽衛安化縣旱均免賦十之三二十三年直𨽻邢臺等二十州縣湖北江夏等十五州縣衛江南宿遷縣旱免災田賦各有差河南磁州安陽湯隂雹免賦亦如之上年江西分宜等十七縣衛旱至是奏免額賦有差二十四年直𨽻新安等五縣災命部員往勘除其賦山東河南山西江南江西湖廣間被水旱各免災田賦有差是年諭直𨽻獻縣河間縣河間衛江南宿遷縣興化縣邳州髙郵州鹽城縣山東郯城縣魚臺縣地方今年重罹水災小民艱苦所有康熙二十四年下半年二十五年上半年地丁各項錢糧俱與豁免二十五年直𨽻浙江湖北甘肅水江南蝗雹免今年災田租各有差時江南徽州廬州鳳陽三府康熙十七年逋負銀萬九千五百兩米千一百九十八石各有竒至是悉除之二十六年直𨽻豐潤縣山東博興縣水山西沁州雹江西宜春等十縣旱各免賦有差二十七年江南水免興化縣今年田租十之二亳州等三州縣各按災分蠲免有差江西宜春等十二州縣湖廣崇安等七州縣浙江宣平縣雲南開化府旱免賦亦如之二十八年春聖祖仁皇帝南巡諭免邳州淹田今年地漕額賦及厯年逋懸秋邳州等九州縣復被水仍按災分各如例免租是年湖北江西旱諭免武昌等四府屬二十州縣四衛所明年春夏額賦荆州安陸二府屬九州縣四衛今年未徴及明年春夏額賦其江西之寧州袁州等三十二州縣衛所均按災分免今年田租有差二十九年直𨽻災諭免順天保定河間真定順德廣平大名及宣化各府屬去年未徴並今年春夏額賦銀五十七萬五千兩粮八萬六千百有十石各有竒是年河南開封彰徳衛輝懐慶四府甘肅凉州衛古浪所旱江南六合等十五州縣衛浙江餘姚等五縣雲南新興河陽二縣水各按分免賦有差三十年陜西旱蝗命大臣往勘免西安鳳翔二府屬明年民屯各賦銀米並蠲時被旱之州縣直𨽻七十有七河南二十有三江南七被水者湖南三雲南十江西一被蝗者河南二十六山西七各按災分免租江南被蝗之興化縣今年田租則全除之是年除康熙十八年至二十八年廣東髙州瓊州二府二十八年直𨽻保安州各逋賦三十一年江南六合等十三州縣旱沭陽縣水山西臨晉滎陽二縣雹各免賦有差時以陜西西安連嵗荒疫諭免今年額賦米亦如之明年上猶念西安鳳翔二府災民其康熙三十三年額賦復諭除之三十二年直𨽻順天保定河間真定四府水各按災分免今年租旋又諭免明年額賦銀米並除厯年逋懸山西十八州縣水間被雹及江南浙江江西湖北偏沅遇水旱偏災之處並免災田今年租各有差三十三年以山西平陽澤州沁州所屬前被蝗旱民氣未蘇免康熙三十三十一年逋賦銀五十八萬一千六百兩米豆二萬八千五百八十石各有竒是年直𨽻安州等十一州縣災免明年租山東邱縣水免今年租廣東南海等三縣福建閩清等三縣水各按分免賦有差三十四年直𨽻宣化府霜災其今年明年田租悉予放除山西河津滎河水江西新淦建昌南康旱各免賦有差是年除江南邳州康熙二十四至二十七年逋賦三十五年直𨽻三十二州縣江南三十三州縣湖北九州縣衛水免災田今年租各有差三十六年直𨽻霸州等十七州縣旱江南山陽髙郵泗州水免今年田租又以山西平定等十一州縣嵗比不登免租亦如之其浙江宣平縣雹江西星子等九縣水各按災田免賦有差是年免去年順天府密雲縣豆二千石有竒其江南淮徐揚三府未入各賦悉諭除之三十七年直𨽻豐樂縣旱免賦十之三其餘被旱州縣浙江四湖北七被水州縣江蘇八安徽陜西各十有二福建三並免賦有差是年除江南髙郵等六州縣去年丁賦四萬五千兩有竒旋又諭淮安揚州鳳陽等處比年水患頻仍屢賑屢蠲被災地方頼以安堵但念久歉之餘恐致資生匱乏著将海州山陽安東鹽城髙郵泰州江都興化寳應夀州泗州亳州鳳陽臨淮懐逺五河虹縣蒙城盱眙靈璧等州縣並被災各衛所康熙三十八年一切地丁銀米及漕糧盡行蠲免三十八年江南督撫以去年淮安揚州二府屬災奏請蠲賦戸部議免三分奉諭淮安府屬之海州山陽安東鹽城揚州府屬之江都髙郵泰興興化寳應九州縣並淮安大河二衛康熙三十七年未完地丁漕項等銀十有九萬兩米麥十萬石各有竒著全予蠲免旋又免鳳陽府屬十一州縣及泗州衛去年地漕銀米亦如之是年江南浙江江西湖廣直𨽻間被水各免災田今年租有差其淮安揚州明年地漕銀米並予放除又以山西十一州縣歉收除逋賦三十九年江南水免泗州盱眙今年田租髙郵清河等十一州縣免十之三上江頴上等六州縣下江邳州等十六州縣各按災分免賦有差其淮安揚州鳳陽三府去年地漕各賦令勿收責是年直𨽻浙江西安間被水旱免災田賦有差四十年陜西旱免甘肅明年田租以巡撫喀拜匿不以聞削職其西安被旱之二十六州縣衛所各免今年田租有差江南泗州盱眙五河及泗州衛水免賦並除淹田逋租是年河南永城縣旱直𨽻廣平縣廣東南海等七縣水免災田賦有差又以直𨽻霸州文安大城三州縣地窪易澇其厯年逋負諭悉除之四十一年山東河南水免今年災田租各有差又諭山東萊蕪新泰東平沂州蒙隂沂水河南永城虞城夏邑被災州縣康熙四十二年地丁錢粮通行蠲免是年江南亳沛五州縣衛湖北沔陽州衛水浙江縉雲縣旱各按災分免今年租四十二年山東大水凡九十四州縣災各按分免賦有差其餘間被水旱之州縣衛直𨽻二十六河南十九山東十六江南三浙江十三江西六湖北五湖南七免災田賦亦如之時江蘇巡撫宋犖奏言徐州睢寧縣頻遭水患其康熙三十七八九年未入額賦請每年止帶徴一年得㫖除免並除四十年嵗租四十三年諭山東比年歉收朕焦勞宵旰未嘗晷刻稍釋于懐今嵗幸二麥畢登秋禾稔穫但念被災之後若非大敷恩澤終不能遽底盈寧著將康熙四十四年地丁銀米通行蠲免又以直𨽻順天河間二府米價稍昻諭免明年地丁銀米亦如之是年湖北京山湖南武陵桃源廣東南海等六縣肇慶一衛水免災田今年賦有差四十四年江南水上下江三十州縣衛災免今年田租有差時被水州縣直𨽻二江西四湖廣十有七廣東二免租亦如之福建臺灣鳳山諸羅三縣旱其今年額賦諭悉除之是年諭嗣後蠲免錢粮如并免積欠則帶徴俱免如止蠲本年錢粮則所有舊欠俱於次年徴收蠲免之年概不得開徴永著為例四十五年江蘇海州等十二州縣安徽頴州及頴州衛水免災田租有差其被水之縣江西清江新淦直𨽻武清東安免租亦如之四十六年江南浙江旱各按災分免租旋諭免兩省明年丁銀六十九萬七千七百兩田賦安徽七州縣三衛江蘇二十五州縣三衛共銀二百九十七萬五千二百兩糧三十九萬二千石浙江二十州縣一衛銀九十六萬一千五百兩糧九萬六千石各有竒又諭免康熙四十年以前江蘇漕項銀六十八萬七千兩米麥三十一萬一千八百石各有竒是年直𨽻霸州等六州縣山東章􅏀等七縣水江西新喻等四縣福建臺灣等三縣旱各免賦有差四十七年諭去年江南浙江俱被旱荒多方軫恤民力稍蘇今嵗復被潦災旋經照例蠲賑但嵗再不登生計益匱欲令辦賦力必難供康熙四十八年江南通省地丁銀四百七十五萬四百兩浙江通省地丁銀二百五十七萬七千兩有竒著全行蠲免是年湖南北間被水旱之處各按災分免租有差四十八年江南河南水山東旱各如例免租旋又諭免災田明年額賦淮揚徐三府屬十九州縣銀五十九萬三千入百兩歸徳府屬六縣銀二十萬二千四百兩兖州府屬四州縣銀十有四萬六千六百兩各有竒又以浙江災後民力未裕其緩徴漕米勿收責是年直𨽻湖北間被水免災田租有差四十九年直𨽻霸州慶雲等七州縣江南舒城縣水各按災分免今年田