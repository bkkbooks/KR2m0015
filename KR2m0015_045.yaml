將各項悉行豁免再江浙二省尚有未完漕項銀米豆麥向來不在豁免之例今既蠲除各項著將漕項一並免徵七年諭江南上下兩江今年水漲逾常該督撫陸續奏報者不下數十州縣朕每一覽奏宵旰靡寕已屢降諭㫖令該督撫加意撫綏毋使失所又特命大臣前往㑹同該督撫等拯救目前之災荒永除將來之水患但念此等被災之地夏已無收秋更失望小民困苦其何以堪况此數十州縣有今年被災特甚者有今年稍輕而連年被災者現有水漲未消亟待賑䘏其流離顛連之狀時在朕心目中所有本年應納錢糧著該督撫勘明被災各州縣先行緩徴次第將確數分别具奏請㫖蠲免尋遵㫖奏准蠲江蘇所屬江浦等二十九州縣衛地丁嵗賦蘆課學租等銀二十四萬九千三十三兩本色米八千一百九十四石又山陽等二十六州縣衛漕項銀三萬三千五十三兩五錢九分米麥豆十有二萬八千八百三石一斗六升各有竒安徽所屬夀州等二十州縣衛地丁漕項銀十有七萬八百十兩四錢米麥豆千八百三十六石三斗五升八合各有竒明年又續免江蘇安徽各災地蠲餘帶徴之賦以蘇民困是年湖北荆州安陸漢陽襄陽徳安五府湖南長沙岳州常徳澧四府州江西贛州吉安南安三府水被災州縣各按分免今年田租有差八年春直𨽻山東少雨長蘆場地災按分免賦秋山東臨邑縣霜災免今年租江蘇水旱溧水等十五州縣衛災免租如之沭陽贛榆鹽城溧陽學租銀米免亦如之是年甘肅皐蘭金靖逺平畨靈碾伯髙臺七州縣災免額賦糧草如之並除臯蘭等十三州縣乾隆六年逋賦九年直𨽻水免天津河間覇州三十一州縣災民所貸種食浙江水旱凡三十二州縣二衛三所八場災免各賦銀米是年又免陜西西寧縣乾隆元年未完馬糧髙臺平羅二縣乾隆五年災民所貸種食十年除逋賦江蘇海安東蕭碭山四州縣雍正十三年至乾隆元年未入地漕各賦三年寧夏寧朔平羅地震所貸耕具五年七年咸寧等縣水民屯地及更名地未入銀米八年臯蘭金靖逺平畨靈碾伯髙臺七州縣未入賦銀糧草悉予放除是年江西玉山縣旱免今年田租有差十一年江南水江蘇山陽等二十四州縣衛災免民屯地漕河租各銀米其去年以前海沭陽贛榆三州縣未入地漕銀米板浦等六鹽場未入折價銀悉予放除安徽二十三州縣災免額賦米麥如之是年免直𨽻宣化府屯糧三分之一福建臺灣官莊租十分之三十二年山東水雹凡被災者九十八州縣衛免賦銀二十五萬三千八百九十九兩有竒江南崇明縣潮災免災田今年租是年除江南山陽等二十六州縣乾隆七年蠲餘未完地丁銀米及諸雜賦又以去年吉林嵗不登諭蠲額糧江南泗州災除學租銀米長蘆越支場水按災分免租有差十三年浙江海寧縣潮災免漕賦銀米是年上念去年崇明縣災甚其蠲餘各賦諭悉除之又念直𨽻慶雲鹽山縣地瘠民貧乾隆九年貸種令勿收責十四年安徽夀州鳳陽臨淮泗州鳳臺懐逺五河霍邱八州縣鳳陽鳳中長淮泗州四衛水按災分免今年田租有差十五年諭曰朕廵洛祀嵩甫經豐樂鎮即已降㫖蠲免經過州縣十分之三其地年嵗順成是以照例蠲除數日所過州縣體察農功夏麥告豐晚禾覺歉秋牟播種亦復待時深為軫念其歉收之處著再加恩統前蠲免十分之五令該撫詳悉勘明分别辦理是年江寧淮安揚州徐州海州五府州水免災田地漕銀糧浙江永嘉樂清瑞安平陽四縣玉環㕔温州衛永嘉場水免賦銀米榖淳安蟲按災分免租有差又去年山西之太原蒲縣直𨽻之薊州十七州縣被偏災至是大吏循例奏蠲額賦諭將蠲餘之賦各再免十分之三十六年聖駕南巡諭曰朕清蹕南巡道由山左攬轡觀風知連嵗有秋視戊辰東巡之時閭閻大有起色為之慶慰尚念該省有積年緩徴帶徴未完米榖皆因災出借之項雖叠遇有收而按年催比民力不免拮据著將鄒平等屬帶徴未完榖共九十七萬五千餘石概行蠲免又諭曰朕車駕南巡乘時布澤蠲除積欠叠沛恩施更念江蘇之宿遷等州縣上年被水稍重雖經格外加賑可以接至麥秋著再加恩將經過之宿遷清河桃源三縣被災貧民上年借出耔種銀悉行免其徴還又諭江南揚州府屬之興化縣積淹荒廢田畝錢糧於乾隆九年起按年勘報豁免其元年至八年原緩未完賦銀米麥仍應分别催輸荒戸殊為拮据著將此項賦銀米麥一併勘明豁免又諭徐州府屬沛縣濱湖地畝近年以來屢被水災所有應徵租銀自乾隆十年起按年勘報蠲豁而九年以前積欠未完租銀以不在勘豁之例仍須照數輸納貧民未免拮据著將乾隆九年以前應徴未完租銀三千一百餘兩一併加恩豁免是年山東嶧縣等七州縣江南徽寧池鳳和廣六府州浙江海寧等州縣㕔衛所場湖南善化縣間遇偏災各按分免災田銀糧有差十七年甘肅耀州等三十九州縣㕔旱免今年田租有差其餘浙江山東湖北甘肅間被災免災田賦亦如之十八年江南水免安徽二十五州縣衛江蘇三十二州縣今年租浙江仁和縣鹽場災按分免賦有差十九年安徽泗盱眙等州縣水免今年租二十年浙江水免仁和等州縣場所額賦銀米二十二年聖駕南巡諭江南淮徐海等屬受水患有年矣朕翠華南涖周覽土風所過桃源宿遷邳州睢寧諸州縣鶉衣鵠面相望於道而徐屬較甚朕心為之惄然增戚國家所恃以拯患䘏災者惟賑濟一事現在徐屬七州縣已降㫖加展賑期可至五月並截留本處漕糧以資借糶所以為斯民計者不遺餘力而目擊情形於心實有所不忍所見如此未見者亦復可知著再加恩將淮徐海三屬各州縣所有積年借欠籽種口糧不分新舊概予豁免以紓痌瘝一體之念惟是恩澤所施非得賢守令實力奉行無由下究况在積歉之區尤資良牧必得慈祥公正實心任事之人以父母斯民為己責竭力區畫經營撫循培養庶㡬日有起色若任其因循闒冗漠不闗情假手書吏視為故事年復一年積疲重困即使厚費帑金蒼生何能免溝壑流離之慘是以此方州縣視他處更重該督撫當慎加遴選務得有猷有為悃愊愛民者以膺斯任仍時時留心體察有暇即親行諮詢使窮鄉僻壤民隠畢達守令賢否自不能掩惟期於地方有益該督撫其善體朕懐毋僅以簿書期㑹為課吏先務也其數府現任守令各官著該督撫各出考語具摺奏聞或有如所諭賢明之吏宜留任者或有不能勝此而可以調他處事簡者其悉心詳酌一二年後朕將親臨考察若仍入其疆而田野不治則非守令之罪將該督撫是問矣著將此通行曉諭知之是年河南夏邑商邱虞城永城四縣水免積負除田租二年又以山東去年被水淹田未涸令將濟寧魚臺金鄉滕嶧五州縣田賦倉榖貸種悉予蠲除濟寧魚臺之屯户及兩淮竈户各逋懸勿收責二十七年江蘇浙江災免清河崑山等十一州縣民屯田租仁和等十七州縣漕賦二十八年山東濟寧等八州縣衛水秋禾災免今年田租二十九年甘肅鞏昌等府屬旱免今年租其雲南江川通海等五州縣去嵗地震江蘇江浦海州旱江西徳化縣封一等三鄉水并直隸蔚州萬全縣山東濟寧等七州縣衛各按災地蠲免有差三十年湖北漢陽七州縣衛湖南益陽縣江西南昌三縣安徽安池五府州屬懐寧等十六州縣三衛水均免租如例又免直𨽻霸州固安永清屯戸二十六年以前被災積欠租榖八百石有竒三十一年甘肅河東西去秋旱間被雹水風霜之災免靖逺等一十四㕔州縣厯年逋銀三十七萬四千餘兩糧一百二十四萬五千餘石并免陜西延安等三府州屬逋糧四萬六千餘石銀一萬一千餘兩其山東章邱一十八州縣衛水直𨽻獻縣十八州縣各被水旱霜雹等災各如例蠲免有差三十二年免綏逺城拒門保安二處口外庄頭災地賦并免江蘇上元等十一縣及揚州衛地丁屯折草場蘆課租糧三十三年伊犁屯田回人應還三十年未及交倉被雪潮濕霉變糧并三十一年被災未納糧共七萬餘石除上年業經寛免帶徴一萬餘石外尚應帶交五萬餘石上以回人等生業未裕免之三十六年以甘肅比嵗叠被偏災免各㕔州縣積欠糧四百四萬餘石又臯蘭二十八㕔州縣上年夏旱偏災地畝並予免租是年山西薩拉齊通判所屬之善岱里安民等七村庄水免租亦如之三十七年免甘肅臯蘭等二十五㕔州縣旱災地畝銀糧三十八年江南水安東山陽阜寧清河沭陽海州大河衛宿逋令勿收責三十九年安徽夀州鳳陽等十州縣衛水分别蠲緩有差又因黄水驟溢免山陽清河鹽城阜寧明年租并淮安大河二衛漕賦其直𨽻霸州二十五州縣旱甘肅臯蘭等㕔州縣夏秋俱被偏災各按分蠲賦是年以逆匪王倫滋擾臨清酌免新舊城居民正賦四十年江蘇河南湖北安徽浙江雲南各有水旱偏災均按災地分數蠲免四十一年江蘇上元等四十六州縣衛甘肅臯蘭等三十一州縣安徽合肥等州縣災並分别蠲賦四十二年安徽宿州等州縣衛災免其輸賦甘肅臯蘭等二十九㕔州衛夏秋俱被偏炎免賦亦如之四十三年河南旱免被災較重之汲淇臨漳三縣緩徴地丁銀十分之四是年以河南山東雨澤稀少民力拮据將四十五年輪免錢糧即于本年普行蠲免其已徴收者准作明年正供四十四年免湖南長沙十五州縣炎田額賦有差四十五年湖北江蘇直𨽻偏災蠲免如例四十六年浙江紹興金華府屬災免賦有差又江南崇明縣風潮成災免今年租是年以甘肅蘭州河州等處猝被逆回焚掠諭免今年租賦四十七年免直𨽻霸州等州縣宿逋四十八年江蘇銅山等州縣山東鄒縣利津等縣災諭免其租并免山東永阜場江南沛縣竈課雜税四十九年河南直𨽻旱衛輝府屬九縣懐慶彰徳開封府屬十六縣大名府屬七州縣災並免四十八年逋賦又上年陜西延榆綏三府州屬災其四十七八兩年逋賦諭免亦如之五十年諭河南衛輝府屬五縣并附近災區之延津九縣逋者概勿收責并免今年租受旱較重之開封彰徳府屬祥符内黄等十一縣免今年正賦十之五次重之杞縣通許十州縣免十之三其厯年積逋各按災分蠲免有差是年安徽旱諭將五十一年輪免錢糧之年先於本年蠲免其已徴收者准作明年正賦右災蠲貸粟康熙三十年諭山西平陽府岳陽等八州縣被災人民將五臺崞縣儲米借給是年貸山西平陽府屬十五縣又貸太原大同二府捐米三十一年山東貸給貧民榖二十八萬九千石有竒以濟春耕是年山西夏聞等縣災將各州縣分貯米價分貸窮民又陜西西鳳二府旱貸民種價三十五年諭直𨽻寳坻等州縣被水今年錢糧業已免徴無可蠲䘏該撫責成賢能地方官確察實係窮民借支倉米務令均霑實惠不致流離失所三十八年直𨽻賛皇縣向因土賊為害民多流亡今漸歸鄉里失業已乆資生無術貸倉糧以給牛種四十一年西安饑運西寧米以貸貧民是年山東海豐等州縣水將積貯米榖借糶並行以濟窮民四十二年以盛京所貯米榖貸給捕牲烏喇虞人四十三年定河南現存倉榖每年將一半存倉偹賑一半貸給貧民四十五年畿輔米貴減糶常平倉米榖十之三其窮民無力買者於三分中酌貸一分四十七年定河南各州縣常平倉米穀毎年三分之一出陳易新令將新貯倉榖照常平倉例不必限數隨民便貸給六十年黄沁水溢直𨽻大名府長垣等四州縣秋禾災以存倉米榖貸貧民之乏食者不給於截留漕米内動支是年黑龍江災貸兵丁水手等口糧又陜西甘肅去年災撥解戸部庫銀二十萬兩貸給籽種以濟春耕雍正三年山東黄水溢曹縣魚臺縣災以常平倉榖量貸貧民是年定直省貧乏兵丁有需貸粟者該管官申督撫報部隨行州縣騐實取該管官弁印領貸給又定出貸米榖各州縣官必按名面給秋熟後責入貸數若吏胥詐冐領給致逋懸者胥吏論如法其逋數即于州縣官名下責入並論以失察之罪七年廣東城守饒平平鎮三營准於青黄不接時以倉榖貸給窮兵八年陜西西寧縣蔚州蔚縣嵗饑貸民社倉榖蔚州即以存貯山西兵米酌貸乾隆二年諭各省出借倉榖於秋後還倉時有每石加息榖一斗之例如地方本非歉嵗循例出陳易新則應照例加息若值歉收之年國家方賑䘏之不遑非平時貸榖者可比至還倉時止應完納正榖不應令其加息將此永著為例三年定廣東貸粟停止加息嵗熟每石加耗三升嵗歉免耗又定各省貸粟仍照舊例分别年嵗豐歉收息免息至廣東福建向不收息者如舊例行至四年増定凡年嵗収成九分十分及八分者所貸粟每石仍收息榖一斗五分六分七分者免又定本年收成五分者緩至明年秋後責入六分者本年責入其半次年全入七分者本年秋後責入免息八分九分十分者本年秋後責入仍加息六年諭自上冬及新正以來直𨽻山東山西河南陜西五省陸續奏報均得瑞雪春日載陽土膏滋潤播種不可後時著五省督撫轉飭有司勸導小民努力東作其有貧乏之家耔種不足者量為借助七年諭上江潁鳳泗三屬連年被潦民困為甚著將三屬已賑貧民再借與口糧一月其正月止賑之處去麥秋尚逺最貧之民借與口糧兩月至五分災不賑者定例於春日酌借口糧統于秋成還倉若近處米榖不敷由逺處撥用恐緩不濟急即照例用銀折借是年江蘇之江浦六合山陽阜寧清河桃源安東淮安大河興化銅山沛蕭邳宿遷睢寧海沭陽共十八州縣衛麥苗災貸民種食又鳳陽臨淮等二十四州縣衛水貧民不能麥種於附近豫省買二麥貸給豐收後分兩年責償又諭貸民草價以資牧養八年諭江南淮揚徐鳳潁泗等五府一州上年水災甚重兵丁食用艱難准在司庫借支一季餉銀於今年分作四季扣還今朕聞各省糧價漸增若再扣還借項則食用更苦著將前借一季餉銀緩至本年秋成後散給冬餉時扣起作四季扣還九年四川西昌縣水瀘寧縣雹貸榖秋後責入南江縣雹貸榖來嵗秋後責入均免息冕寧縣水不成災來嵗青黄不接時量貸倉榖十年江南鳳臺潁上蒙城三縣雹貸種食如倉榖不敷即折貸是年以直𨽻天津府屬慶雲縣地瘠民貧被災後耕牛甚少令天津府知府用銀三千兩委官赴張家口買牛交慶雲縣散給無力貧民田多者戸給一牛田少者兩三户共給一牛以資播種十一年諭直𨽻鹽山慶雲寧津三縣原屬上年災重之地先經借給耔種口糧此時想已告匱著照大小戸口再借口糧一月以資接濟按畝借給耔種粟米四升以資耕作是年定西安榆林葭州等七州縣每嵗于糶三榖内將貸餘糧米盡數出糶價貯府庫為次年貸給出口種地窮民牛具之需十三年上軫念山東萊州府屬之髙密平度膠昌邑即墨五州縣災民耕牛不敷犂種諭官買耕牛給民以資力作如十年慶雲縣例行十六年諭今嵗浙省被旱成災米糧昻貴著加恩將浙省被災各標協營緑旗兵丁每名借給米二石竢各省協濟米運到及截有漕米之日該督撫分次借給於十七十八兩年内扣餉歸欵又諭曰朕因浙省寧紹等屬歉收米貴曽降㫖將被災各標協營兵令借給米粮以資接濟念該省今年旱災稍重各屬米糧一例昂貴著再加恩將浙江通省兵丁每名借給一季餉銀於司庫内動項借給竢明年夏季後分作四季扣還十七年定災民所貸種食夏災貸者秋後責入秋災貸者次年麥熟後責入均免息率限一年自十七年為始畫一造報十九年山東兖州沂州東昌府屬及濟寧州東昌衛臨清衛等處積水未涸如例酌借又江蘇沛縣之千三千六等里查明未涸村莊將各貧民加借兩月口糧是年臺灣澎湖等處風災酌借災戸乏食貧民二十年因上年滇省易門石屏兩處地震以常平谷濟災民又江南淮徐海三府州屬水其涸出地畝尚可補種秋禾者即行借給籽種速令補種務使口食有資二十一年諭上年江省被災米價昻貴所有江寧駐防旗兵月支餉銀或不敷買食著按名借給一月餉米以資接濟秋成後於應支月米内分月扣還又諭晉省岢嵐等處因上年收成歉薄先後借出常平倉榖三十三萬二千餘石今嵗秋收豐稔例應徴收還項但念該處承上年歉收之後若與各項錢糧一時並徴民力不無拮据所有借出常平倉谷分作兩年徴還以紓民力二十二年上江所屬之宿靈虹三州縣及長淮一衛去秋被水於例借口糧外加借一月口糧是年河南直𨽻偏災甘肅碾伯㑹寧三十八州縣㕔江蘇山陽十六州縣衛安徽宿州十州縣衛均災貸籽本口糧如例二十三年諭山西交城等四十州縣上年秋收稍歉其借出社義倉榖石雖係民捐例亦官為催納該處商販稀少本地産榖僅供民食若依限責令還倉小民未免拮据著將借出乾隆二十一年分榖石緩至今嵗麥熟後徴收二十二年分榖石緩至今嵗秋成後徴收此外八州縣亦照此一體分别緩徴是年諭山東之濟寧魚臺各州縣江南之徐州鳳陽所屬河南之歸徳陳州所屬其中有實在窮民牛具籽種不能接濟者即行借給又福建福州泉州漳州各府屬歉收於社倉内借給麥本來年秋收後免息還倉二十四年甘肅臯蘭等三十六州縣衛旱量借口糧銀兩又諭甘省連年歉收明嵗春耕一切籽種口糧皆須酌借向來原有折銀借給之例但該處糧價稍昻若照常例折給不敷購買著河西每石折借銀一兩四錢河東折借銀一兩三錢嗣於本年十一月再各加給銀三錢是年山東海豐等十六州縣衛水山西陽曲等三十九㕔州縣旱均貸種如例二十六年諭直𨽻各屬秋來雨水稍覺稠密固安永清等被淹地畝其早能涸出尚可及時佈種秋麥有地無力之戸按畝借給倉榖五升仍寛期俟明年秋成後免息還官至消涸稍遲之地僅可佈種春麥者屆期一例借給又諭文安大城霸州保定等屬因漫口被淹各村莊照前㫖一體查辦至同時被淹之寧河寳坻薊州等屬雖所損不過十之一二現在天晴水涸正可乘時補種晚稼及明年春麥並酌量給借倉榖俾貧民力作有資以禆生計是年山東齊河等四十五州縣衛水涸出地畝酌借麥本令其播種二十七年宿遷一帶州縣向來嵗收歉薄諭從優酌借是年甘肅靖逺等十五縣暨栁林湖屯田等處旱借貸亦如之二十八年直𨽻各屬上年水本年交河蝗蔚州萬全雹旱貸籽種口糧是年山東濟寧八州縣衛湖北沔陽天門二州縣衛水甘肅狄道河州十二㕔州縣所屬各村莊災分别酌借接助三十年貸海州等六州縣災民三十一年甘肅蘭州等六府屬直𨽻獻縣等十二州縣災並借給籽種以資接濟三十三年江蘇鹽城泰州東臺興化四州縣災借一月口糧并籽種又雲南鄧川浪穹鶴慶劍川四府州縣水一體酌貸三十五年諭今嵗古北口被水較重該處駐防及緑營兵丁等所居房屋雖已賞銀繕葺完整而衣食之需尚恐未免拮据著再加賞借一季錢糧分作兩年扣還又以今嵗熱河被水較重熱河駐防及緑營兵丁照古北口之例賞借三十六年古北口水其駐防及緑營兵丁照上年之例於存倉兵米内賞借一季兩年扣還是年陜西寳鷄縣水被淹灘地毎畝借社糧五升明年免息還倉三十七年甘肅臯蘭等㕔州縣偏被水旱雹霜等災令隨時體察情形酌量借給三十八年安徽鳳陽泗州盱眙五河江蘇山陽阜寧海州直𨽻天津青縣静海武清並水如例貸之三十九年貸江蘇東臺興化等二十一州縣衛災民四十二年陜西咸寧等二十九㕔州縣旱於常平倉内借給極貧者口糧兩月次貧者一月四十三年河南去嵗缺雨諭臨河三十六州縣存倉積榖各按縣大小儘數出借其開封彰徳衛輝懐慶河南五府屬貧民酌借一月口糧并每畝借給籽種銀六分又以歸徳府屬九州縣陳州府屬三縣並許汝二州情形畧同照開封五府之例出貸四十六年諭本年山東章邱等十縣衛又鄒縣等七州縣衛被黄水淹浸查明應行補種麥田照例酌借籽種歸入來春借案造報四十八年從四川總督特成額奏酌留未經變價之義榖存貯民間照舊夏借秋還毫不加息以資接濟四十九年山東兖州曹州濟寧三府州屬去秋缺雨又東昌臨清二府州屬上冬得雪未足查明地在三十畝以下無力之户照例出借倉糧外每畝再借給籽種銀五分又河南旱其距河較逺之處及祥符等三十三州縣貧民酌借一月口糧畝借給籽種銀六分是年直𨽻大名府屬各州縣旱照四十三年辦理成案先儘社義二倉次動未經買補之常平榖價及旗租平飯銀兩按戸計口於五月先行借給一月口糧大口三斗小口半之計元城等七州縣共給榖八萬八千二百餘石飭令秋後免息追還五十年諭豫省附近災區之延津濬等九縣農民酌借一月口糧畝借給籽種銀六分又借給江蘇被旱最重之銅山豐縣等十一州縣貧民口糧三月次重之清河鹽城等五州縣貧民兩月上念淮徐倉儲頻年賑貸所存糧石無多其淮安一屬著該督撫就近酌撥調濟又於邳宿一帶水次截留漕米十萬石以八萬石分撥徐州各屬二萬石分撥海州各屬偹用是年山東青州府屬之益都等五縣沂州府屬之蘭山等四縣災查明地在五畝以下貧民戸借給榖五斗右貸粟皇朝文獻通考卷四十五
