body:
  text: 欽定四庫全書皇朝文獻通考卷一百六十樂考六度量衡臣等謹按虞書同律度量衡邱濬謂同律而必及於度量衡誠以其受法於律三者之制皆與律同斯為同矣故曰黃鍾為萬事根本我聖祖仁皇帝妙契元音得黃鍾真度爰製五金木石之表度量權衡互相立法載在會典頒示遵行時巡省問既考市㕓之同異而觀其會通庭訓煒煌復順時俗之便安而統歸畫一前民利用昭示大同斯誠逺紹虞廷而垂法萬世者矣謹次度量衡考順治五年頒定斛式户部較準斛樣照式造成發坐糧廳收糧又定工部造鐵斛二一存户部一存總督倉場再造本斛十二頒發各省十一年飭遵部定法馬私自增加者罪之十二年重定鐵斛頒發各省時題準較製鐵斛存户部一發倉場總漕各一頒發直省各一布政司照式轉發糧道各倉官較製收糧永逺遵行十五年定各關稱尺時議準各關量船稱貨務使稱尺準足不得任意輕重長短康熙元年頒定新法馬四十三年議定斛式并停用金斗關東斗時奉諭旨朕見各省民間所用等稱雖輕重稍殊尚不甚相懸絶惟斗斛大小迥然各别不獨各省不同即一縣之內市城鄉村亦不相等此皆牙儈評價之人希圖牟利之所致也又升斗面寬底窄若稍尖量即致浮多若稍平量即致虧額弊端易生職此之故於民間甚為未便嗣後直省斗斛大小作何畫一其升斗樣式可否底面一律平準以杜弊端至盛京金石金斗關東斗亦應一併畫一著九卿詹事科道詳議具奏尋遵旨議定直𨽻各省府州縣所用斛面俱令照户部原頒鐵斛之式其升斗亦照户部倉斗倉升式樣底面一律平準盛京金石金斗關東斗俱停其使用鑄鐵斗鐵升各三十發盛京户部順天府五城倉場總漕直𨽻各省巡撫今轉發奉天府寧古塔黑龍江等處及各該布政司糧道府州縣倉官通行曉諭遵行五十二年御製律吕正義定度量衡律吕正義曰黃鍾為聲氣之元象數之本度量權衡皆於是受法焉律吕新書審度篇曰度者分寸尺丈引所以度長短也生於黃鍾之長以子穀秬黍中者九十枚度之一為一分十分為寸十寸為尺十尺為丈十丈為引嘉量篇曰量者籥合升斗斛所以量多少也生於黃鍾之容以子穀秬黍中者一千二百實其籥以井水準其槩以度數審其容合籥為合十合為升十升為斗十斗為斛謹權衡篇曰權衡者銖兩斤鈞石所以權輕重也生於黃鍾之重以子穀秬黍中者一千二百實其籥百黍一銖一籥十二銖二十四銖為一兩十六兩為斤三十斤為鈞四鈞為石又新書載周禮典瑞璧羡以起度玉人璧羡度尺好三寸以為度易緯通卦驗以十馬尾為一分孫子算術以蠶所吐絲為忽又載周禮考工記栗氏為量改煎金錫則不耗不耗然後權之權之然後準之準之然後量之量之以為釜深尺內方尺而圓其外其實一釜其臀一寸其實一豆其耳三寸其實一升重一鈞聲中黃鍾之宫注周釜容六斗四升實一千二百八十籥計一百零三萬六千八百分漢斛容十斗實二千籥計一百六十二萬分今置釜積以深一尺分之得面冪一萬零三百六十八分約之以尺得正方一尺零三寸六十八分然則所謂內方尺者非釜之圓面冪容正方一尺耶若求釜徑則置面冪用平圓求徑定率推之得徑一尺一寸四分八釐九毫有奇再以釜積六斗四升分之每升得一萬六千二百分以十合分之每合得一千六百二十分以二籥分之每籥得八百一十分與黃鍾籥數同漢斛積以十斗分之每斗得一十六萬二千分以十升分之每升得一萬六千二百分與周釜所容升數同自升而下亦得黃鍾之籥數焉夫黃鍾之積有古今尺度為數之不同而就黃鍾本律之分而言則周釜漢斛皆可以相證也權衡之數始於銖古之一籥為十二銖重五錢今所定之籥以現行權衡考之止二錢五分強五量之數終於斛古之十斗為一斛今則五斗為一斛權衡與量今比古皆加一倍矣推原其故古尺乃橫黍所纍本小今尺乃縱黍所纍本大小尺所制黃鍾之籥必小故量與權衡亦隨之而小大尺所制黃鍾之籥必大故量與權衡亦隨之而大使不審尺之大小則黃鍾幾無定體之可憑矣即今所定黃鍾之籥而論之則古尺之八百一十分與今尺之四百三十分數雖不同而體則一若但執一尺而論則八百一十分與四百三十分其體幾差一倍此今之量與權衡所以加古一倍也要之量與權衡之大小皆由於尺度之短長尺度之短長原於定黃鍾之各異定黃鍾之各異又係於纍黍之不同然則度量權衡皆起於黃鍾而驗黃鍾者可不取證於度量權衡耶是知一本而萬殊者由於萬類之難齊萬殊而一本者無非一理之所貫故古聖人同律度量衡為經國宜民之要務也聖祖仁皇帝庭訓曰書云同律度量衡論語曰謹權量蓋為禁貪風除欺詐所以平物價而一人情也今市㕓之上閭閻之中日用最切者無過於丈尺升斗平法其間長短大小亦或有不同而要皆以部頒度量衡法為準通融合算均歸畫一則不同而實同也蓋以大同者定制度而以隨俗者便民情斯為善政自上古以迄於今幾千百年度量權衡改易非一茍一旦必欲強而同之非惟無益於民生亦且有妨於治道此又不可不留心講究者也御製數理精藴定度量衡表營造尺以分兩定尺寸之準赤金一十六兩八錢白銀九兩紅銅七兩五錢黑鉛九兩九錢三分各鑄為寸方髙廣六面悉均皆可得部頒營造尺一寸法馬形圓以寸法定輕重之準赤金方寸白銀方寸紅銅方寸黑鉛方寸與前分兩相符即得部頒法馬等稱輕重之準鐵升斗斛形方以寸法定容積之準升方三十一寸六百分斗方三百一十六寸斛方一千五百八十寸兩斛為石方三千一百六十寸如為升面底方三寸深三寸五分一釐為斗面底方六寸五分深七寸四分七釐九毫為斛面底方一尺深一尺五寸八分為十斗斛面底方一尺四寸深一尺六寸一分二釐皆與右寸數相符即得部頒鐵升斗斛容量之準乾隆六年奏覆同律度量衡刑部侍郎張照奏蒙天語垂問律度量衡之曷由同臣竊惟黃鍾為聲氣之元象數之本度量權衡皆於是受法我聖祖仁皇帝心通天矩學貫神樞既以斗尺稱法馬式頒之天下又凡省府州縣皆有鐵斛收糧放餉一準諸平違則有刑又恐法久易湮且古法纍黍定度度立而量與權衡準焉度既不齊黍數即不符合躬親纍黍布算而得今尺八寸一分恰合千二百黍之分符乎天數之九九於以定黃鍾之律尺既定矣又恐不寓諸器則法不可明乃以金銀製為寸方著其輕重而度與權衡之準瞭如指掌列之為表載入會典頒行天下皇上以度量權衡天下猶有未同勤惓垂問仰見平鈞四海之至意臣以為在今日非法度之不立在奉行之未能請命有司按表成造尺稱法馬斗斛頒行天下再為申明違式之禁務使畫一併令直省將會典內權衡表刋刻頒布使人人共曉或亦同之之一法也夫五方風氣不齊民俗所便各異然在官者有一定之法則能以我之至齊者齊彼之不齊而不齊者亦齊其所不齊亦無害臣昔聞於聖祖仁皇帝者如此今蒙聖諭虞舜巡狩同律度量衡惟其時亦有不同者是以同之若其皆同何同之有然而在我者安可不同至哉聖言信乎先聖後聖其揆一也臣又謂立法固當深講而用法自在得人度量權衡雖同而官司用之入則重而出則輕以為家肥更甚者轉以此為國利行之在上如此百姓至愚必以為度量權衡國家本無定準浸假而民間各自為制浸假而官司轉從民制以為便此歷代度量權衡所以不同之本也夫期民間之恪守先從官司之恪守始上是之七年御製律吕正義後編定權量表權制形圓以寸法定輕重之率黃銅方一寸重六兩八錢量制形方以寸法定容積之率升方積三十一寸六百分面底方四寸深一寸九分七釐五毫斗方積三百一十六寸面底方八寸深四寸九分三釐七毫五絲斛方積一千五百八十寸面方六寸六分底方一尺六寸深一尺一寸七分臣等謹按此權量寸法均遵聖祖仁皇帝欽定營造尺度其升斗斛之制雖與前表尺寸不同而中容實積則一也特形式微異耳九年御製嘉量并銘嘉量方圓各一範銅塗金列之殿廷其上為斛其下為斗左耳為升右耳為合籥其重二鈞聲中黃鍾之宫親為之銘并刻方圓度數於其上備清漢文銘曰皇豫聖祖建極憲天度律均鍾洞契元聲微顯闡幽何天衢亨小子纘緒寰區撫臨協時月正日同律度量衡製兹法器列於大廷匪作伊述大猷敬承遵鍾得度率度量成量為權衡律諧六英猗聖合天天心聖明七政是齊為萬世法程如衡無私如權不凝如度制節如量祇平律得環中紹天明命永寶用享子孫繩繩我日斯邁而月斯征中元甲子乾隆御銘圓制時得東漢嘉量按其度數中今太蔟乃倣其式用今律度合黃鍾焉嘉量斛積八百六十寸九百三十四分四百二十釐容十斗深七寸二分九釐羃一百一十八寸九分八十釐徑一尺二寸二分六釐二毫嘉量斗積八十六寸九十三分四百四十二釐容十升深七分二釐九毫羃一百一十八寸九分八十釐徑一尺二寸二分六釐二毫嘉量升積八千六百零九分三百四十四釐二百毫容十合深一寸八分二釐二毫五絲羃四百七十二分三十九釐二十毫徑二寸四分五釐二毫嘉量合積八百六十分九百三十四釐四百二十毫容二籥深一寸零九釐六毫羃七十八分五十三釐九十八毫徑一寸嘉量籥積容深為合之半羃徑與合同方制唐太宗時張文收造嘉量形方亦倣其制而用今律度嘉量斛積八百六十寸九百三十四分四百二十釐容十斗深七寸二分九釐羃一百一十八寸九分八十釐方一尺零八分六釐七毫嘉量斗積八十六寸九十三分四百四十二釐容十升深七寸二分九釐羃一百一十八寸九分八十釐方一尺零八分六釐七毫嘉量升積八千六百零九分三百四十四釐二百毫容十合深一寸八分二釐二毫五絲羃四百七十二分三十九釐二十毫方二寸一分七釐三毫嘉量合積八百六十分九百三十四釐四百二十毫容二籥深八分六釐零九絲羃百分方一寸嘉量籥積容深為合之半羃方與合同圓方嘉量寸法並依工部營造尺為縱纍百黍之度營造尺九之九即律尺為橫纍百黍之度右圓方度數倣漢斛之制斛與升合皆正書斗籥皆倒書蓋翻舉斗籥視之則皆正也清丈從左起律吕正義後編曰案周釜漢斛皆云深尺內方尺而圓其外度同而容積不同故先儒皆遷就以為之説究其所謂方尺者實不止方尺故曰旁有庣焉則其度數亦未為定法也今以律尺起量而以營造尺命度則古今度量權衡同異之致瞭然可見斛積八百六十寸九百三十四分四百二十釐即律尺一千六百二十寸也斗積八十六寸九十一分四百四十二釐即律尺一百六十二寸也升積八千六百零九分三百四十四釐二百毫即律尺一萬六千二百分也合積八百六十分九百三十四釐四百二十毫即律尺一千六百二十分也籥積為合之半即律尺八百一十分也斛深七寸二分九釐為黃鍾之度即律尺九寸也斗深七分二釐九毫為黃鍾十分之一即律尺九分也升深一寸八分二釐二毫五絲為黃鍾四分之一即律尺二寸二分五釐也以深除積得羃而圓徑方邉數各不同若以圓徑方邊求面羃而以深乘之其積仍一也至於合籥則圓徑方邊俱為營造尺一寸在律尺則為一寸二分三釐四毫五絲六忽七微九纖即古尺今尺之異也圓徑一寸者面羃七十八分又萬分分之五千三百九十八方邊一寸者面羃百分圓方之定率也斛深七寸二分九釐斗深七分二釐九毫并底厚八釐一毫共八寸一分律尺之全度也析尺為寸而古之寸法在是纍寸為尺而今之尺法亦在是則古今度法之同異可見矣從度起量斛容二千籥其實十斗以今量法準之止二斗七升二合餘以十析之則斗之容積為今二升七合餘升之容積為今二合七勺餘則古今量法之同異可見矣從量起衡斛容二百四十萬黍重一千兩以今之權法準之止重五百三十一兩餘嘉量之體重二鈞計九百六十兩以今權法準之止重五百十兩餘則古今權法之同異可見矣推原其故則權量皆自度始蓋律尺為橫纍百黍之度營造尺為縱纍百黍之度而橫黍尺十寸當縱黍尺之八寸一分古之權量以橫黍之度起籥尺小故權量亦隨之而小今之權量以縱黍之度起籥尺大故權量亦隨之而大今律尺雖亡而營造則未之有改明冷謙制律用營造尺其律固失之長而權量之法大率由是而起試以營造尺九寸制為黃鍾之管命其所容為一籥則二斛十斗之積當為營造尺三千二百四十寸命其一籥之重為五錢則律尺一籥之重當為二錢六分五釐七毫二絲零五微而律尺十斗二千籥之重當為五百三十一兩四錢四分一釐我朝權量之制大抵皆仍前明之舊今考戶部量法二斛十斗之積為三千一百六十寸比之營造尺起籥者少八十寸而權法則與營造尺起籥者相合然則今之權量其亦有所本矣自世祖章皇帝以來部頒定制昭示天下聖祖仁皇帝親加考定既以大同者定制度又以隨俗者便民情今天下之大兆民之衆所用丈尺斗斛等稱雖長短大小輕重或有不同而要皆以部頒定制為凖通融合算均歸畫一則不同而實同也我皇上敬紹先猷製兹法器備具四物垂憲萬年其與虞廷同律度量衡之意不後先一揆歟今將古今度量衡比例法并今民間所用度量衡長短大小輕重之率悉列於左古今度量衡比例法律尺十寸為營造尺八寸一分置律尺之數以八十一乘之或九因二次得營造尺之數置營造尺之數以八十一除之或九歸二次得律尺之數其長皆相等營造尺十寸自乘得一百寸律尺當營造尺八寸一分自乘得六十五寸六十一分以此為比例率置律尺羃數以六十五寸六十一分乘以百寸除之得營造尺羃數置營造尺羃數以百寸乘以六十五寸六十一分除之得律尺羃數其羃皆相等營造尺十寸自乘再乘得一千寸律尺當營造尺八寸一分自乘再乘得五百三十一寸四百四十一分以此為比例率置律尺積數以五百三十一寸四百四十一分乘以千寸除之得營造尺積數置營造尺積數以千寸乘以五百三十一寸四百四十一分除之得律尺積數其積皆相等置律尺權法重數以五百三十一寸四百四十一分乘以一千寸除之得今户部權法重數置今户部權法重數以一千寸乘以五百三十一寸四百四十一分除之得律尺權法重數亦相等律尺斛十斗為營造尺方八百六十寸九百三十四分四百二十釐今户部量法一斗為營造尺方三百一十六寸以今斗積除律尺斛積得二斗七升二合四勺以此為比例率置律尺量法容數以二斗七升二合四勺乘以十斗除之得户部量法容數置户部量法容數以十斗乘以二斗七升二合四勺除之得律尺量法容數其積亦相等今官民度量衡比例率營造尺八寸一分為律尺一尺裁衣尺九寸為營造尺一尺裁衣尺七寸二分九釐為律尺一尺律尺一尺二寸三分四釐五毫為營造尺一尺律尺一尺三寸七分一釐七毫為裁衣尺一尺户部倉斛十二斗五升為洪斛十斗洪斛八斗為倉斛十斗關東斗五斗為倉斛十斗關東斗六斗二升五合為洪斛十斗倉斛二斗七升二合四勺為嘉量十斗洪斛二斗一升七合七勺為嘉量十斗關東斗一斗三升六合二勺為嘉量十斗部法五兩三錢一分四釐四毫為律法十兩京市法五兩四錢七分三釐八毫為律法十兩錢法五兩五錢八分零一毫為律法十兩京市法十兩三錢為部法十兩錢法十兩五錢為部法十兩皇朝文獻通考卷一百六十
