body:
  text: 四裔考八北俄羅斯俄羅斯國東北至海南接喀爾喀準噶爾哈薩克土爾扈特西接西洋諸國秦時為渾庾屈射丁靈諸國匃奴冒頓單于始北服之漢時郅支單于北降丁令并有其地北魏時為烏洛侯國有于巳尼大水所謂北海也唐為骨利幹國居瀚海北其地北距海元時為阿羅思吉利吉思昂可新地元史稱吉利吉思南去大都萬有餘里其境長一千四百里廣半之有謙河西北流注于昂可剌河北入於海今俄羅斯有昂噶喇河即元史昂可剌河也昂可剌者元史謂即唐之骨利幹也今名俄羅斯即元阿羅思轉音也相傳其國舊無汗號處西北近海計由之地其酋名依畨瓦什黒魚赤者因族姓擾亂求助于西費耶斯科國假其兵力服屬諸族自立為汗厯三百餘年今其酋皆稱察罕汗云其地寒多隂蕃林木稀人烟分八道曰西畢爾斯科曰喀山斯科曰佛羅尼使斯科曰計由斯科曰司馬連斯科曰三皮提里普爾斯科曰郭羅多阿爾哈連斯科曰莫斯窪斯科一斯科所屬城堡名柏興多者至百餘少或一二十餘蒙古語謂民居為拜甡俄羅斯與䝉古隣接疑即其轉音又即明人所云板升者也官制汗左右近侍官四得専政每斯科設總管官一彼中名噶噶林每柏興設頭目田則什一而税凡業打牲者納貂䑕狐狸銀䑕灰鼠其不打牲者嵗納銀錢二百法律凡叛逆犯上者肢解遇敵敗北者斬刼奪人及殺人者俱斬傷人者斷手偷盜倉庫官物者視贜之多寡有劓刵者有以火灼之而發遣者私鑄錢者鎔銅灌口内以殺之私賣烟酒者重責籍其家遣其人因姦殺死本夫者本婦則埋于地露其首以殺之姦夫則懸于樹以殺之犯姦者本婦重責不離異姦夫重責又罰銀入官其幼童與女子姦者重責之配為夫婦俗尚天主教不知朔望或二十九日或三十日或三十一日為一月十二月為一嵗每嵗按四季大齋四次或四十日或三十餘日以冬季大齋完日為嵗初平時皆逢七齋戒知節儉厭兵戎性矜誇貪得喜詼諧好詞訟每逢吉日男子相聚會飲醉則詠謌跳舞婦女不避生客争相炫飾遊戲為隊行歌于途卑賤見尊者免冠立地而叩尊長不免冠平等相遇皆免冠立地而叩男子與婦人遇男子免冠婦人立地而叩以去髭髯為姣好髮卷者為美觀婚嫁亦用媒妁聘娶之日往叩天主堂誦經畢方合巹殯殮有棺俱送至堂内塟埋不飲茶服氊褐苧布以麥麫為餅餌不為飯每食用匙及小义無箸俗尚貿易務農者少知種而不知耘不以牛耕居河濱者善泅用𤓰種大小銀錢有值三文十文五十文百文者亦有紅銅錢與小銀錢通用以十六寸為尺十二兩為斤千步為里後改五百步為里其木則有杉松馬尾松楊樺叢桞櫻薁榆剌玫其榖則有大麥小麥蕎麥油麥及稷其蔬則有蘿蔔蔓青白菜王𤓰芫荽倭𤓰葱蒜獸畜則有駝馬牛熊狼堪達韓野猪鹿狍黄羊狐狸兎貂鼠銀鼠灰䑕磎鼠磎鼠行地中遇陽氣即死身大有重萬斤者骨色白潤類象牙性最寒食之可除煩熱骨可成器彼中名麻門槖窪禽則有鷹鵬鷂鵏海青鴉鴨鷄又有聶木沁鷄大如鵝脚髙尾短有蒼黒色而花紋者有白色青斑者其冠色不時變幻人稍侵之即鳴翅立冠下垂比户畜之俄羅斯稱西費耶斯科國為聶木沁云魚則有鮰鯺􅳬鯉石斑鯽魴鰱􅀈鴨嘴哈打拉他庫木舒爾呼松阿禪勾深牙魯四帖里烈帖鄂莫裏樂則有鐘鼓喇叭木笛哨呐銅絃箏胡琴其土宜風俗物産大略如此明時阻于朔漠未通中國本朝順治十二年其國察罕汗始遣使來朝貢方物上嘉其誠款降敇及恩賜令來使齎回國勅曰爾國逺處西北從未一達中華今爾誠心向化遣使進貢方物朕甚嘉之特頒恩賚即俾爾使臣賫回昭朕柔逺至意爾其欽承永效忠順以副恩寵十三年遣使奉表來朝貢方物以來使不諳朝儀却其貢而遣之還十四年復遣使奉表進貢途經三載以十七年五月至表稱俄羅斯一千一百六十五年語多矜夸廷臣咸謂其不遵正朔宜逐之奏入得㫖察罕汗雖恃為酋長表文不合體制然外邦從化宜加㴠容以示懐柔俄羅斯逺處邊陲未沾教化乃能遣使奉表而至亦見慕義之忱來使著該部與宴貢物查收察罕汗及其使量加恩賞但不必遣使報書爾衙門可即以表文矜詡不令陛見之故諭而遣之康熙十五年五月察罕汗又遣陪臣尼果頼罕伯里爾鄂維䇿進貢方物奏言俄羅斯僻處逺方從古未通上國不諳中華文義及奏疏禮儀兩次抒誠致多缺失今特敬謹遣使奉貢仰祈矜宥得㫖准其通貢初順治間俄羅斯部落曰羅刹者竊據黒龍江築城雅克薩之地侵擾索倫達呼爾等及是諭察罕汗嚴禁羅刹毋擾邊陲而羅刹仍復潜侵凈理溪等處遷延不返二十一年八月遣副都統郎談公彭春率兵往達呼爾索倫覘羅刹情形將行上面諭曰羅刹犯我黒龍江一帶侵擾民人昔發兵進討未獲翦除近聞蔓延至赫哲費雅哈侵掠不已爾等此行可聲言捕鹿沿黒龍江行圍徑薄雅克薩城下勘其形勢度羅刹斷不敢出戰爾等還時其詳視自黒龍江至額蘇里水程并訪自額蘇里至寧古塔道里偕薩布素往勘以聞十二月郎談彭春等自達呼爾索倫還以羅刹情形具奏上諭議政王大臣等曰據郎談等奏攻取羅刹甚易朕意亦以為然第兵非善事宜暫停攻取於黑龍江呼瑪爾二處建木城遣寧古塔將軍巴海副都統薩布素以烏拉寧古塔兵千五百戍之相幾集事二十二年四月巴海等奏言黑龍江呼瑪爾距雅克薩城遼逺若駐兵兩處勢分道阻倘羅刹増兵儲粟更難為計宜乘其積儲未偹速行征𠞰上以所議未合機宜令巴海留守烏拉以副都統瓦禮祐偕薩布素統兵往俟抵彼相度形勢於可進之時奏請進兵又經王大臣等議請將建城駐兵之處移於黑龍江呼瑪爾中間額蘇里之地并設四驛從之尋復於黑龍江建城以薩布素為將軍領之設堠於呼瑪爾自黑龍江至烏拉置十驛由水路輓運至黒龍江為永戍地時羅刹之衆有過黑龍江者降其兵目三十餘人赦不誅並安揷之九月上諭理藩院尚書阿穆呼郎曰俄羅斯國羅刹等無端犯我索倫邊境匿報特穆爾等逃人朕不忍加誅屢行曉諭令歸故地還逃人廼執迷不悟轉肆焚掠因特遣重兵駐守其地頃者羅刹遇我將卒降其三十餘人朕體好生之德皆加豢養今彼若悔過則已否則必干天討或路逺難歸傾心投誠者朕亦納之加恩撫䘏使得其所爾院可遵㫖具文遣來降番人宜番米海羅莫羅對再行往諭彼有何言令其回奏時羅刹屬人多來歸者令編為一佐領使彼此相依有資二十三年正月薩布素等奏言宜乗四月冰解時遣官兵先徃招撫不即降則進兵滅之尋報遣夸蘭達鄂羅舜等於正月十一日抵羅刹境令宜番等造其居開諭之因以鄂羅春留質之子三人來并招撫米海羅等二十一人送京安揷五月遣徃軍前之輕車都尉瑪喇奏言羅刹之在雅克薩尼布楚二城者各止五六百人於額爾古訥河口至布爾瑪台河口十餘處築室耕田以自給喀爾喀與尼布楚人亦時與交易資生請令喀爾喀車臣汗禁止交易再令黒龍江將軍水陸並進作攻取雅克薩狀因取其田禾則羅刹不久自困量遣輕騎𠞰滅似易時將軍薩布素等亦以收取羅刹田禾為宜隨降㫖令薩布素等酌議由水陸路進兵孰便并諭車臣汗知之㝷以薩布素請停進𠞰坐失事機得㫖申飭十二月徵福建籐牌兵二十四年正月以瑪喇為副都統㕘贊軍務先是上以薩布素上疏引罪命都統公瓦山侍郎郭丕往會薩布素等詳議應否攻取之處至是瓦山等與薩布素會奏我兵於四月水陸並進先撫後𠞰如不克則毁其田禾以歸上因命都統公彭春督師命左都督何佑等率福建籐牌官兵五百人往發盛京兵五百人代黑龍江兵守城種地再令降勅諭曉羅刹使送回雅庫以息兵爭三月達呼爾頭目倍勒爾等往偵雅克薩情形擒羅刹噶瓦力喇等七人以歸噶瓦力喇等偹述其酋約束所屬禁持兵器往來並􅋏懼求援狀上命人給時服一襲俟大兵進𠞰時示以寛大之意而釋之五月都統公彭春等率師抵雅克薩城下遵㫖宣諭促令歸巢羅刹遷延不還乃分水陸兵為兩翼急進攻城中大驚頭目額里克舍等窮迫詣軍前乞降彭春等復宣上恩徳額里克舍率所部咸垂涕望闕稽顙受命遷歸雅庫彭春等復雅克薩城並以逃人還捷奏至上諭王大臣曰羅刹擾我黑龍江松花江一帶三十餘年其所竊據距我朝發祥之地甚近應速為翦除是以命將行師深入撻伐今收復雅克薩地得遂初心至於撫綏外國在使之心服不在震之以威近遣侍衞闗保等往軍前諄諭之曰朕以仁治天下素不嗜殺爾其嚴諭將士毋違朕㫖以我兵力羅刹勢不敵必獻地歸誠爾時勿殺一人俾還故土宣朕柔逺至意兹一一奉行朕甚嘉焉七月釋羅刹宜番等四人歸國十月以都統公彭春等為頭等第一軍功二十五年正月羅刹復來城雅克薩地上命將軍薩布素等率所部兵二千往𠞰八月諭薩布素等河冰將結熟籌防禦之法薩布素奏言於城三面掘壕築壘壕外置木樁鹿角分汎防禦城西對江另設一軍復派𠞰禦之兵於東西兩岸偹江路來援之羅刹為持久計時荷蘭國入貢使臣稱與俄羅斯接壤因諭議政王大臣等向者羅刹犯雅克薩尼布楚地曾諭察罕汗來使尼果賚等撤回其衆竟不覆奏意尼果賚未達前㫖於察罕汗復令被擒羅刹持書從喀爾喀地宣諭亦不復奏因發官兵招撫羅刹不戮一人令其頭目額禮克舍等持書歸去羅刹聞我師歸復據雅克薩朕思本朝頻行宣諭曽未一答而雅克薩羅刹又死守不去或尼布潮諸地阻隔前書未達或雅克薩羅刹皆彼有罪之徒不便歸國俱未可知其以屢諭情節為書付荷蘭國使臣轉發察罕汗處令其收回雅克薩尼布潮羅刹於何處分立疆界則兩界人民均得寧居不失永相和好之意再依此作書發西洋國轉達之八月命副都統博定率築城官兵二百人赴薩布素等軍前參贊軍務九月察罕汗遣使上疏言皇帝所賜之書下國無通解者及尼果賚歸始悉情節以下國邊民搆釁請察明作亂之人收回正法除遣使議定邊界外謹先齎書以獻並乞撤雅克薩之圍上諭大學士等曰俄羅斯以禮通好馳使請解雅克薩之圍朕本無屠城之意其令薩布素等解圍近戰艦立營城内羅刹聽其出入俟俄羅斯後使至定議二十六年正月遣太醫院官二人往視軍士之患疾者令雅克薩城羅刹就醫無禁十月遣兵部尚書鄂爾多等往黒龍江籌議儲糧永戍之䇿二十七年三月察罕汗遣費岳多羅等至上命領侍衞内大臣索額圖都統公佟國綱尚書阿喇尼左都御史馬齊䕶軍統領瑪喇等往二十八年十二月㑹議於尼布楚歸我雅克薩尼布楚諸城定議邊界一以北流入黒龍江之綽爾納即阿倫穆河相近格必爾齊河為界循河上流以至於海凡山南一帶流入黒龍江之溪河盡屬中國山北一帶之溪河屬俄羅斯一以流入黒龍江之額爾古訥河為界河之南岸屬中國北岸屬俄羅斯凡獵户人等不許越界犯則擒治一切行旅有准往來文票者許貿易勿禁不留逃人議定乃盟立碑界上釋兵而還三十二年十月察罕汗遣使進貢嗣是遣使通市無間四十四年十一月俄羅斯貿易來使至上閲其文字曰此喇提諾托忒烏珠克俄羅斯三種文也外國之文有三十六字母者亦有三十字五十字母者源與中國同但不分平上去而尚有入聲其兩字合音甚明中國辨四韻極精以兩字合音不甚𦂳要故知者漸少若中國所有之字外國亦有之特不全耳五十一年兵部職方司郎中圖理琛使土爾扈特國假道俄羅斯奉㫖此役於俄羅斯國人民生計地理形勢均須留意歸而悉其山川風俗為異域録以獻其略曰嵗在壬申五月二十日出都城宿沙河行六日出張家口六月初二日越興安嶺又十餘日至巴顔布拉克當興安嶺上又二日至西拉布里度十六日至瀚海南界之阿爾哈林圖枯布爾十七日至瀚海中朱爾輝地十八日至瀚海北界之哈囊布拉克又四日至那拉特勞赤又三日至達布蘇台又三日地勢漸下七月初三日自鄂什欣布里度下興安嶺北至汗山東枯爾布里度其東南二十里許即𠞰滅噶爾丹之招木多地也初五日至土喇河岸宿三日土喇河自根特山右發源向西流入發源杭愛山之鄂爾渾河又魯倫河自根特山左發源向東流入呼倫河又東流為額爾古訥河又東北流入黒龍江其鄂爾渾河環布隆汗山向西北流入色楞格河自此而北至俄羅斯國界皆山又十日至博拉兩旁皆山色楞格河自西南來向東北流入俄羅斯境又一日至蘇布克圖為俄羅斯分界處又二日至楚庫柏興近色楞格河南岸河寛五丈水清流溜楚庫河自東南來至柏興南十里入色楞格河二河交滙處又色楞格河東岸民皆樓居無城垣四面皆山俄羅斯與䝉古人雜處俄羅斯官衣番薩非翅遣官兵列旗幟鎗礟鼓吹迎導至公署後凡至館驛儀衞悉如之且言我國人每年來中國貿易屢蒙至聖大皇帝深恩天使此來一切輿馬供頓豈敢遲悞謹已馳報察罕汗矣張宴饋食執禮甚恭五十二年正月十四日有厄爾庫城頭目費多爾伊番訥翅准托波爾總管噶噶林移會遣俄羅斯官温多里卧畨那非翅以察罕汗命來迓乃啓行至烏的柏興在楚庫柏興東北二百餘里山髙大多林藪濱河有田疇色楞格河自此折而西北流烏的河自東南來遶柏興之西入色楞格河山有石大如掌層疊相附質薄而明如玻璃然可飭牕牖其頭目出妻子獻酒張樂跳躍以為娛越三日至柏海爾湖南岸之博索爾伊斯科其間小柏興六七處間有田疇柏海爾湖在烏的柏興西北三百餘里南北百餘里東西千餘里色楞格河自西南來巴爾古西木河自東南來昂噶拉河自東北來俱入於湖别一河從湖西北流出亦名昂噶拉湖内有地曰鄂遼漢洲寛五十餘里長二百餘里洲上有山岡産杉松榆栁多野獸布拉特䝉古五十餘户居之湖内多魚及獺十二月下旬冰始堅三月盡乃解周迴諸山環抱林木蒼鬱煙波渺瀰極目無際二十二日至柏海爾湖北岸之果落烏斯那越三日至厄爾庫城沿途山不甚髙昂噶拉河自東南來遶城向西北流厄爾庫河自西南來入昂噶拉河無墉垣有市井民樓居皆俄羅斯族少䝉古人跡矣凡附近小柏興皆厄爾庫城所屬號稱雄鎮頭目費多爾伊畨訥翅以前途迎候官未至乞少留則相與騎射捕魚為樂二月二十二日迎候官愽爾科泥册班訥非翅至自托波爾云河未泮陸行多泥陷不可行至五月初四日始乗舟下昂噶拉河河西北流厄爾庫河東入之水清溜急大於色楞格河兩岸髙峯絶壁激浪如矢有五伯克八破落克九西費喇境絶竒險俄羅斯語懸崖謂伯克瀑流謂破落克水石相激成湍溜處謂西費喇所謂五伯克者曰滅提别西曰巴達爾滿斯克曰多達爾斯克曰滅費斯克曰費達木克所謂八破落克者曰博合滅爾訥曰皮牙乃曰巴敦曰多爾規曰沙滿斯克曰阿普林斯克曰木爾蘇克曰四鐵烈洛什所謂九西費喇者曰鄂標木索斯奈曰洛什曰柏格曰郭洛活瓦曰郭費殷斯克曰噶什那曰鄂費夏那曰鄂爾吉那曰郭薩牙也昂噶拉河流千餘里水漸濁伊里木河自東北來入之濵河積雪有嵯峨至丈餘者間有田疇把鋤而耕者順流十九日水程三千里至伊聶謝柏興西為伊聶謝河昂噶拉河西流入焉又東北流入北海者也伊聶謝柏興居民千户俗多畜鹿以供乗載名曰俄倫其地去北海一月程夏至前後夜不甚暗雖日落猶可弈棋不數刻東方即曙而日出矣駐伊聶謝柏興五日乃舍舟而陸過麻科佛斯科嶺越宿至麻科斯科一小村落也在伊聶謝柏興西北二百五十餘里西傍揭的河河自麻科佛斯科佛落克嶺發源環流麻科斯科向西北流入鄂布河寛六七丈多紆曲水色赤多蚊䖟土燕巢於河崖之間有鄂斯提牙斯科者其人别一種類散處揭的河濱林莽間捕貂作貢又有西洋將軍雅那爾者為俄羅斯所擄伊里木城頭目喇法林帖携之來謁見中國衣冠不勝仰慕叩頭獻酒而去初五日登舟順河流晝夜行水程二千五百里十二日至那里木柏興即揭的河入鄂布河處也鄂布河西北流一千四百餘里入額爾齊斯河又西北流入北海大於伊聶謝河水濁溜緩衍波四溢洲渚甚多濵河地勢平坦多林木由那里木柏興放舟之次日颶風大作波濤洶湧舟楫傾欹俄羅斯人頗不諳操舟㡬至危殆二十四日至蘇爾呼忒柏興越二日行六百里至薩馬爾斯科額爾齊斯河自南來向西北流河東岸有土山設驛站那里木柏興蘇爾呼忒柏興薩馬爾斯科地俱窪下無田疇從托波爾托木斯科挽運以供食云由額爾齊斯河遡流而上越六日至狄木演斯科在薩馬爾斯科西南六百餘里額爾齊斯河至此東北流漸濁而大越二日頭目葛禮果禮者同舟赴托波爾城越九日至其地噶噶林馬提飛費多里魚翅遣所屬俄羅斯官衣畨鄂畨那西赤迎候自河岸至公署儀衞尤肅噶噶林隨趨至執手叩請中國至聖大皇帝萬安云我國人民時往中國貿易屢沐大皇帝深恩今天使到此有干預我國之事否因諭之云我大皇帝萬邦畏懷中外一體加恩愛恤不止俄羅斯一國也兹特命使臣齎勅往諭土爾扈特國汗阿玉竒因傳詢爾國商人哈密薩爾言沿途輿馬供億不敢違悞是以取道爾國前爾國商人乞請准送能通經典之人入中國我大臣轉奏荷蒙恩准使者囘京可以携去噶噶林曰其人現在預偹至我察罕汗聞中國天使大人辱臨不勝忻悦特飭我等敬謹䕶送毋敢違慢又曰中國承平日乆想天使受大皇帝恩享用安樂復諭之曰我大皇帝不嗜殺戮是以時和年豐臣民禔福我輩優㳺極樂難以殫陳噶噶林曰中國聖人仁愛國家殷富四方寧謐聞之已久我先察罕汗在時上下無事當時臣宰俱享逸樂今察罕汗幼時好與兒童為戰鬬戲從前同戲諸兒今皆為將二十年來我國戰甲不少解即如沙漳汗恭喀爾汗費頁斯科國厄納特赫國哈薩克國哈拉哈爾巴國䇿旺阿喇布坦阿玉竒諸國皆互相爭競惟中國河山清晏洵為極樂因問土爾扈特貝子阿拉布珠爾事甚悉越日有衣畨鄂畨那西赤者求見曰我國有近侍大臣四員可以専擅行事遇大政君臣往來會議中國亦如是乎諭之曰中國事無巨細皆具題請㫖遵奉施行豈敢云擅且至尊固無往會臣議之禮也駐托波爾八日城内天主堂二十餘駐兵二千前後所過諸柏興皆有教堂設官兵此為都會故尤盛額爾齊斯河繞城之西濱河有庫車回人流離至此俄羅斯人名之曰塔塔拉自額爾齊斯河西南遡流入托波爾河九宿至圖敏途中皆以塔塔拉供挽運受笞楚禁之乃止時有西費耶斯科國人被擄於俄羅斯乃來舟中鼓吹絃歌以為娱由圖敏西北遡土拉河舟行五百餘里至鴉班沁多田疇不駐兵自是復捨舟而陸地勢漸下越九宿至費耶爾和土爾斯科城在鴉班沁西北四百餘里土拉河自西北來繞城東南流東岸石山嶻嶪止二宿過費耶爾和土爾斯科佛落克嶺在城西北二百餘里嶺不甚大而峯巒競秀泉脈爭流野花爛然土拉河發源嶺東托波爾河發源嶺西别有喀穆河發源嶺北水色赤溜急折而西南流入佛爾格河嶺西北有山名帕付林斯科髙出羣峰土人云冬夏積雪不消人跡罕至越七宿至索里喀木斯科在嶺西南二百餘里沿途皆山藪值大雪巖壑積素喀木河自東北來向西南流有烏索爾科河自東北入焉西北境有方木鹽井四十餘越三宿至改郭羅多在索里喀木斯科西北四百餘里喀木河自西北繞而東南流有别爾馬羈人雜處其地與俄羅斯言語不通盖又一部落附俄羅斯有年者多田疇不駐兵自此西北行至莫斯科窪城二千二百餘里自改郭羅多越四日至索羅博達有西費耶斯科國人五千餘户舊以被擄居此又一日至黑林諾付在改郭羅多西南四百餘里有費牙忒喀河遶而西南流入喀木河地勢彌下沿途小柏興甚稠密田疇亦廣遥望林木鬱然俄羅斯全境凡八道自入俄羅斯界至此皆屬西畢爾斯科道噶噶林馬提飛費多爾魚翅所轄境也越六日至喀山在黒林諾付西南五百餘里佛爾格河喀木河夾左右而流有木城凡八門一面得二里周圍八里有郭外環以木為鹿角置城隅别有車爾米斯及土爾扈特人居之車爾米斯人皆削髪言語殊異亦别種也地設管理喀山斯科道總管顧比爾那忒費多爾薩馬落費赤統之又三日至西木必爾斯科在喀山南三百餘里有舊城形勢略如喀山城佛爾格河遶而西南流又西南五百餘里至薩拉托付為俄羅斯土爾扈特接壤處時康熙五十二年十一月十六日也佛爾格河東北來繞而南流水漸濁溜緩土爾扈特人名之曰額濟爾河有巨艘寛二丈長十餘丈亦有寛一丈長七丈餘者四五艘時俄羅斯博爾科尼冊班諾費赤遣通事及頭目馳告土爾扈特國汗阿玉竒於五十三年六月至土爾扈特國使事告蕆旋返斾渡河七月下旬至喀山十一月初七日至托波爾十二月初五日噶噶林來見曰我察罕汗近在三皮提里普爾城而此城舊屬西費耶斯科國地為我國所有隨以我汗之名名之今嵗我汗與西費耶斯科國戰勝之擄其䕶船二十一將軍一兵八百今付蘭楚斯諸國俱來援以是堅守不即下曩時我國又與圖里耶斯科國王拱喀爾汗搆兵取其阿藻城近復議和倂還其城自阿藻城東北盡隸我疆矣又云我汗春秋四十一歴事二十八年曩時我國並未稱汗自依畨瓦什里魚赤始稱汗至今二十三傳計三百五十餘載第十三代汗始征取喀山托波爾阿斯塔爾汗諸地今已百六十年矣十二月二十二日乃啟行越七宿至塔喇斯科在托波爾東南一千二百餘里額爾齊斯河自東南來西北流塔喇河自東南來入額爾齊斯河越十四宿至托木斯科在塔喇斯科東南二千五百餘里為俄羅斯準噶爾哈薩克哈拉哈爾巴四國接壤處鄂布河自東南來西北流托木河自東南繞西而西北流至百里外入鄂布河有塔塔拉與巴爾巴忒人雜處夏秋飲行潦冬春食冰雪俄羅斯準噶爾兩國徵其税入焉自托木斯科至伊聶謝一千六百餘里有楚里木河自麻科佛斯科山發源西南流入鄂布河又十日至伊里木城在伊聶謝東南二千餘里四面皆山林伊里木河自東北環流其城入通古斯河自伊里木城往厄爾庫城東南行千有餘里由昂噶拉河舟行陸路亦可達餘略如來程所歴不復書云圖理琛于五十一年奉使至五十四年三月二十七日歸京師初凡通市諸物有噶噶林印記者准市餘則否五十六年七月俄羅斯邊城頭目以文來請于將軍托留欲私行貿易上命托留移文切責之雍正五年三月察罕汗遣使表賀上登極附貢方物八月遣郡王額駙䇿凌伯四格侍郎圖理琛等與俄羅斯使臣薩瓦定議自額爾古訥河岸至阿魯哈當蘇阿魯竒都勒齊克達竒林俱為我斥堠應以相對之楚庫河為界自此以西沿布爾古特山等處以博木沙畢鼐嶺為界立石以誌不許越境滋事及容留逃盜人等犯者互相查挐並以恰克圖口為常互市所人數不得過二百定例遣理藩院司官一員照料修京城俄羅斯館來京讀書幼童及教習等官給養贍願回者聽隨召見薩瓦等賞賜有差並優賜察罕汗尋遣薩瓦歸國十月理藩院奏俄羅斯頭目郎喀呈請以商人馬匹牛羊留張家口外牧放從之令郎喀嚴約所屬毋許滋事遣司官一員照料並飭附近張家口諸總管如俄羅斯貿易商人馬匹牲畜遺失為查而歸之勿俾困于行旅乾隆二年監督俄羅斯館御史赫慶奏言俄羅斯互市止宜在於邊境其住居京城者請禁貿易止令以貨易貨勿以金銀相售在京讀書子弟不可任其出入使知内地情形輿圖違禁等物禁勿售與七年八月俄羅斯人越界斫柴得㫖申飭黒龍江將軍伯第務竭力巡察勿得仍前怠玩二十二年準噶爾平六月侍衞順徳訥窮追阿睦爾撤納至額爾圗拉與俄羅斯喀比潭相見於額爾齊斯河上索阿睦爾撒納未得取喀比潭印狀歸七月俄羅斯頭目來言曰阿睦爾撒納近以二人徒步投我國濟河無踪疑死於水矣參贊大臣富徳率順徳訥等往偵虚實時有達瓦齊屬人自俄羅斯境脱出者為言本年七月初遇阿睦爾撒納攜八人入俄羅斯境被獲將軍兆恵等以聞特命理藩院移咨令遵不納逃人之例擒獻二十三年正月俄羅斯遵奉行移不敢諱匿述阿睦爾撒納避罪闌入我界渡河幾斃於水旋以痘死且出其尸於邊界之恰克圖城迺遣親王齊巴克雅蘭品爾等驗而歸之俄羅斯西北境有數小部落曰西費耶斯科曰圖耶斯科曰博爾托噶里牙曰付蘭楚斯曰雅爾馬尼牙曰宜大里牙曰宜斯巴尼牙曰狄音曰和爾斯提音曰布魯斯竒曰博爾斯竒曰别穆斯竒曰賽薩林木斯竒曰昂假爾斯竒曰賀蘭斯竒曰博玻林木斯竒西費耶斯科者前以兵助俄羅斯汗依畨瓦什里魚赤遂有俄羅斯之那爾瓦城後察罕汗索歸其城不許連兵不解者數嵗卒為俄羅斯所敗二十六年土爾扈特汗渥錫以俄羅斯征調不息又徴其子入侍與合族台吉挈全部來歸中國土爾扈特者凖噶爾四衞拉特之一也渥錫之曾祖阿玉竒與䇿妄不睦竄歸俄羅斯居額濟勒之地至是歸附或謂不宜納俄羅斯之屬部皇上謂逺人來歸不可不納且舍楞即我之叛臣歸俄羅斯者一再索取訖未與我如以此折俄羅斯彼將何辭以對卒納之俄羅斯卒不敢以此為言三十年十一月奉諭㫖恰克圖貿易一事近因俄羅斯不遵舊制違背禁約甚且多收貨税苦累商人是以降㫖停止原以俟其自知悔過抒誠祈請再准其通商貿易恐桑齊多爾濟身係蒙古未能深曉事宜復派大臣前往稽查彈壓協同辦理其所以責成者甚重當桑齊多爾濟起意私通交易時丑達係特派大臣理應正言阻止阻之不從即應據實㕘奏乃不惟不行阻止參奏並且通同舞弊貿易多次核其賘私竟至數千兩之多藐法營私殊出情理之外及經挐解來京尚敢冀免顯戮在路延捱負恩喪心實屬可惡此斷不可以一日容留丑達巳依議正法至額爾經額係隨往司員若丑達等恰遵禁令嚴絶貿易則額爾經額決不敢自行罔利其情較丑達稍輕是以改為應斬監候此中輕重權衡朕惟一秉至公毫無成見期協乎情罪之至當而已可將此曉諭中外并軍營辦事大臣知之四十六年正月奉諭據車登多爾濟等奏俄羅斯之固必爾那托爾等呈稱遵伊主之令將現在住京之俄羅斯喇嘛學滿漢話之俄羅斯學生照例派出喇嘛學生前往更换請㫖允准等語俄羅斯喇嘛學生住京已屆十年著施恩即照車登多爾濟等所奏准固必爾那托爾遣人更换臣等謹按俄羅斯地處極北據使臣圖理琛所録夏至前後不甚暗日落猶可奕棋不數刻即曙而日出正與唐史所載骨利幹國事相符又圖理琛所録俄倫地去北海一月程而荷蘭入貢使臣稱與俄羅斯接壤又其俗皆奉天主教與西洋諸國同豈其國近北海而又接西海歟在北魏時為烏洛侯國疑侯字乃俟字之悞即俄羅斯轉音耳然地雖荒逺亦不應使臣三四年而後歸伏讀御製土爾扈特全部歸順記定為俄羅斯故為紆繞其程觀土爾扈特之來祗八月而已至益可見矣其國自羅刹歸誠以後恪守分界且遣使入貢幼童來京讀書洵所謂聲教四訖臣古來未臣之國非甚盛徳何以致此哉左哈薩克左哈薩克在準噶爾西北境西為右部哈薩克北為俄羅斯東去塔爾巴哈台南去伊犁皆千里其部曰鄂爾圖玉斯駐伊什爾河傍無城郭全境東西千里南北六百里環璄皆山山脈自西而東其南境之山曰喀拉巴克喀爾海又東為喀爾克圖哈薩拉克山又東為扎拉圖哈薩拉克山又東為勒克楞山踰山而南入準噶爾境齋爾界又東為鄂綽沁吉斯山又東為阿爾津沙拉什保台山又東北為阿爾輝西里接準噶爾境額敏界自喀拉巴克喀爾海山西北行折而東為厄勒伊們山伊什爾河源出焉又北為尼雅克圖山又東為尼滿哈濟蘭山又東北為喀爾瑪竒爾哈山又東為阿克竒拉山又東為巴顔山又東為毫哈薩拉克山將軍哈達哈曽敗阿布賚於此又東南為阿巴拉爾山又東至塔爾巴哈台而止羣山内外源泉經絡其自喀拉巴克喀爾海山出者為綽多爾圖郭勒由是而東為克巴什博爾濟爾郭勒又東為哈薩拉喀泉又東為博爾格得克泉又東為額特倫泉又東北為什納噶泉沮洳渙散燦若列星又東為奎蘇泉又東為阿爾齊圖泉又東為青吉斯泉又北為阿林泉又東為阿濟蘇泉又東為烏爾圖泉又東為色爾格郭勒又東為罕拉海圖泉又東北為薩嘉爾郭勒又東為楚庫魯克郭勒又東南踰山入塔爾巴哈台界其西北境為伊什爾河沿河西北行二百里為哈薩克春吉索波藍地苦寒自是以西地益曠𣺌折北而西行二千里為依底克山當搭拉斯河東南境其汗族為首領者名蘇爾統居無常處盛夏常在伊什爾河平時逐水草事㳺牧地廣人稠甲於他部其頭目首戴髙頂冠其頂或紅或白頂尖有孔正面用氊一幅旁二幅兩縫當前一縫當後俱嵌黄皮或用氆􅀈邊飭以皮狐貉貂䑕之屬衣錦衣寛而長帶用五色絲縧有流蘇足穿紅黒皮履頭目之婦辮髪雙垂耳貫珠環服錦鑲長袖衣冠履與頭目同其民人首戴氊帽正面開口不飾以皮衣毼束布帯履革鞮男婦皆同其風俗物産及文字大略與準噶爾同言語稍異境西北隅有獨樹五株盤拏䕃廣可容二百騎名鄂哷引噶克察黙多年代莫紀為西域神物哈薩克過其下者必膜拜供獻而不敢稱其名舊傳其地為古大宛今詳考之盖漢康居國也晉魏以降康居國西遷其地屬今右部哈薩克詳右部傳其國久阻中華聲教乾隆二十年二月準噶爾平詔遣使往諭其汗阿布賚言於使臣侍衞順德訥達永阿曰向聞大皇帝臨御中土以山川之故貢譯不通今天威逺播掃伊犂興黄教實無疆之福敢以誠心歸於徳化九月順徳訥以其使博落布拜等歸伊犂適阿睦爾撤納以伊犂叛明年走哈薩克阿布賚納之詔遣將軍達爾黨阿由西路哈達哈由北路先後以大軍進阿布賚遣和集博爾根以兵從阿睦爾撒納走努拉自率千騎西行㑹於毫哈薩拉克山下以待我師七月將軍達爾黨阿兵至於雅爾拉與和集博爾根前隊罕巴巴諾羅斯等二千餘兵遇賊設伏佯敗我師分阿里衮鄂寳哈寜阿明瑞為左右翼將軍達爾黨阿副將軍扎拉豐阿執纛以中軍進齊努渾瑪瑺特通額爾登分部從之風馳雷動鋒鏃並發賊倉猝不及顧潰於山麓斬首五百七十級餘敗去我兵進努拉擒大頭目楚魯克是時和集博爾根引二千騎西行我軍逼之列而陣出入鏖戰良久獲其纛礟斬首三百餘級賊遁初順徳訥歸自哈薩克以阿布賚恭順狀聞詔復遣賚敕書賜蟒服七月至博爾喀爾綽濶為哈薩克所阻不得達時將軍哈達哈方别遣扎薩克三都布等擊阿布賚兵於毫哈薩拉克山下斬首百餘級奪其馬匹輜重無算阿布賚敗走師從之復斬百餘級獲大頭目昭華什由是三戰三捷師至於伊什爾伊什爾者阿布賚巢也於是達爾黨阿哈達哈兩軍合楚魯克昭華什既獲而見将軍極陳阿布賚之欲内附也將軍縱之還俾往諭曰大皇帝命將討叛爾從賊則死若擒以來臣僕無二於時阿睦爾撒納懾我軍威已濳竊哈薩克馬十餘騎逃回博囉塔拉等處二十二年將軍兆恵㕘贊大臣富徳等復將兵西征阿睦爾撒納知大兵且至倉皇北走我師急躡之適阿布賚以兵來㑹遣其弟阿布勒比斯等為前隊與我軍遇陳情請罪願受約束於是兆恵等復遣使往諭阿布賚乃遣亨集噶爾等奉良馬四表請内附其文曰自臣祖額什木汗楊吉爾汗以來未通中國聲教今祗奉大皇帝諭㫖加恩邊末部落臣暨臣屬靡不懽忭感慕皇仁願率全部歸於鴻化永為中國臣僕聞於朝詔受之秋阿布賚使臣來朝賜宴熱河之萬樹園觀燈火及迴鑾皇上較射於圓明園大西門外得與觀焉阿布賚既臣於我遣兵來助擒賊導我師行而自以計擒阿睦爾撒納於阿爾察圖不獲阿睦爾撒納奔俄羅斯執其從賊阿布濟齊巴罕來獻初努拉之役和集博爾根以殘兵遁及是聞阿布賚降乃與喀拉巴拉特者親率其屬三萬户款於軍門曰外臣不識文字謹以身詣降將軍兆恵為啟帳命東向坐將軍南向坐列筵食之牲體哈薩克俗必持咒破戒始食於是乃言為大皇帝臣豈敢稱禁因共飽食引觀花馬射懸鎻子甲射之徹其裡益大駭服叩首去左部咸服十二月定哈薩克貿易之地於烏嚕木齊二十三年五月哈薩克拜濟格特部拜布拉克等獲台吉布庫察罕六月哈薩克哈爾津等獲厄魯特和碩皆獻於軍械送京師二十四年阿布賚偕其兄阿布勒巴木比特弟阿布勒比斯爾與其頭目伯克訥等來朝貢方物賜宴並勅書文綺玉磁等物二十五年六月阿布勒巴木比特阿布賚阿布勒比斯遣使呼圖拜阿塔等來朝九月阿布賚遣使杜勒特合特來朝貢方物賜冠服二十七年六月阿布賚遣使貢馬二十八年正月遣使臣來朝上御紫光閣賜宴與觀大閲賞賚有加七月明瑞奏言阿布賚之弟阿布勒比斯稱前成衮扎布為將軍時曽諭哈薩克有彼此不納逃人之約上以成衮扎布雖經還彼逃人並無嗣後彼此不留之約阿布勒比斯因縁前事妄生冀幸特飭止之二十九年三月左哈薩克阿布爾色伊木畢忒遣使臣肯濟哈拉等十二人來三十年左部鄂托爾濟使臣等十七人來召見錫賚三十四年左部汗阿布賚遣子幹里蘇爾統及陪臣雅拉爾噶布氏等十五人來賜幹里蘇爾統雙眼翎寳石㡌頂兩團龍補掛蟒袍荷包陪臣雅拉爾噶布氏冠服有差三十八年左部汗波羅特使臣阿克台里克及阿布爾比斯之子阿第爾蘇爾坦及其使達伊爾十五人來貢四十一年閏十月奉諭多敏奏烏梁海塔奔等盜薩哈克馬匹甚多著即正法為從之阿穆爾巴圖貝克著發烟瘴充軍四十六年阿布賚蘇爾坦使臣哈喇托霍來四十九年左哈薩克阿布賚使臣鄂托爾齊八人來朝臣等謹按漢書西域傳烏孫東與匈奴西北與康居西與大宛南與城郭諸國相接今準噶爾部為漢烏孫回部為天山南城郭諸國哈薩克在準噶爾西與漢書所云烏孫西北與康居接者相合盖左部哈薩克在準噶爾北合右部哈薩克而言正當西北二境也又史記云康居東羈事匈奴漢書云匃奴殺漢使者西阻康居又云烏孫北附康居是匃奴之西烏孫之北為康居地明甚康居國王冬治樂越慝地馬行七日至王夏所居蕃内顔師古曰王每冬寒夏暑則徙别居不一處今哈薩克汗阿布賚夏則居伊什爾等處冬則居哈薩拉克固斯古爾班察爾等處所謂冬夏别居者其俗亦正相類則是康居之為哈薩克証諸史傳無可疑者若以哈薩克産馬甚良謂即大宛汗血之種則西北諸部産馬處多且史稱大宛為城郭之國今左部哈薩克逐水草無城郭風俗與大宛殊至右部哈薩克境内間有城郭與康居五小王所治窳匿等城方位相符說見後右部哈薩克篇内右哈薩克齊齊玉斯諤爾根齊附右哈薩克東與左部接東南與準噶爾接南與布嚕特安集延納木干諸部接西南踰塔什干西六百餘里其部曰齊齊玉斯烏拉玉斯其山川最著者西南為格根河又西南為納穆爾河又南為雅哈爾斯河又西南為錫爾河又西為薩哈斯河又北為塔拉斯河格根河西近塔拉斯者為哈喇庫勒為達布遜淖爾其薩哈斯錫爾兩河之間岡巒綿亘為移呼扎爾山為哈喇綽克多嶺為奔阿錫魯嶺為柯格納斯嶺嶺北大澤為騰吉斯周圍數百里葢小海也海之東南崖有部名沙爾又薩哈斯河南有達拉什城噶拉楚克城錫爾河西北有波拉克城其東有那穵喀忒城又南有蒿達克城由蒿達克西踰錫爾河為塔什干其城寄居右哈薩克部内不相統屬而别自為部右部之汗曰阿北里斯其巴圖爾三曰圖里拜曰輝格爾徳曰薩薩克拜而圖里拜實専政阿比里斯駐塔什干城不事事受成而已其俗大略與左部等其地為古康居西境乾隆二十一年左部降其汗阿布賚告於順徳訥曰哈薩克之有三玉斯如準噶爾之有四衞拉特也鄂爾圖玉斯則我為政矣他如齊齊玉斯烏拉玉斯者皆族兄為之當與偕來作中土臣乃使其弟阿布勒比斯往而㕘贊大臣富徳方以兵索逆賊哈薩克沙喇至右部遣䝉固勒岱赫善等往撫次軍於莽格特城外是時圖里拜等方與塔什干回人圖爾占戰䝉固勒代等單騎入兩陣間指揮宣檄即解甲聽命於是圖里拜等詣軍門納款奉馬進表以降其文曰伏念臣者久思内附逺處邊末與左部阿布賚各長一方為準噶爾阻絶末由自通近聞左部輸服被恩優渥恭惟天賜恵臨祗領宸訓得均隸臣僕誠懽誠忭謹遣臣子弟入覲瞻仰天顔如天覆育之聖人在上臣願竭衰駑奮勉自効永無二心倍於左部二十三年圖里拜遣其子卓蘭及輝格爾徳之弟博索爾滿朝行在賜宴避暑山莊與觀大閲二十七年十一月齊齊玉斯部之努爾里汗巴圖爾汗各遣使臣來朝貢馬同時諤爾根齊部哈雅布汗遣使塞徳克勒偕來貢馬上御紫光閣賜宴諤爾根齊部亦哈薩克别部云二十八年右哈薩克使及齊齊玉斯使臣呼巴什波羅特諤爾根齊使塞德克勒俱賜宴三十四年右哈薩克阿布勒比斯遣子卓爾齊及各部落使人入覲賞卓爾齊雙眼翎寳石帽頂兩團龍補服蟒袍荷包四十六年西部努喇里之子並哈薩克汗阿布勒比斯之子噶岱等迎駕四十八年右哈薩克努喇里之子並哈薩克汗阿布勒比斯之子噶岱等入覲於賢良門五十年五月右哈薩克阿布額之子塞徳克蘇爾坦等八人来朝上於太平莊行宫慰問臣等謹按漢書所云烏孫西北與康居接者當今準噶爾西北兩面應兼左右哈薩克而言畧見前傳矣更以歴代史傳考之漢書西域傳康居有小五王一曰蘇王治蘇城二曰附墨王治附墨城三曰窳匿王治窳匿城四曰罽王治罽城五曰奥鞬王治奥鞬城凡五王屬康居晉書西域傳康居國其王居蘇城風俗衣服略同大宛唐書西域傳或曰柘支曰柘折曰赭時漢大宛北鄙也西南五百里康居也王姓石治柘折城故康居小王窳匿城地據此則康居小五王所居為大宛北鄙當屬漢康居全部之西境也今哈薩克右部偏西應屬康居小五王地又小五王境接大宛是以建有城郭略與大宛同俗今右部駐塔什干城與左部之逐水草無城郭者稍異知即唐書所謂康居小五王故地為大宛北鄙者而以相傳哈薩克即大宛之説㕘之或與右部為近是爾皇朝文獻通考卷三百
