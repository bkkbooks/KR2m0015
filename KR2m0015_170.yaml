body:
  text: 樂考十六樂歌二皇帝三大節慶賀樂章康熙二十二年定元旦皇帝陞座中和樂奏元平之章於穆元后敬授人時四始和令三陽肇基鸞路蒼龍載青其旗迎氣布徳百工允釐行慶施恵及我烝黎皇帝還宫中和樂奏和平之章有奕元㑹天子穆穆蹡蹡羣公至自九服正朔所加海外臣僕率土懐恵萬民子育千齡億祀永綏茀禄諸王百官行禮丹陛樂奏慶平之章三大節常朝並同皇覆萬㝢品物咸亨九賓在列百譯輸誠濟濟卿士式造在廷帝仁如天帝明如日親賢任能愛民育物禮備樂成聲教四訖外藩行禮丹陛樂奏治平之章三大節常朝並同天盡所覆以畀我清我徳配命涵濡羣生萬國蹈舞來享來庭俁俁蹲蹲視彼干戚天威式臨其儀不忒冬至皇帝陞座中和樂奏遂平之章乾符在握道轉鴻鈞天心見復物始資元景長舜日紀恊堯春玉琯應瑞寶厯肇新衆正在位輔翼一人皇帝還宫中和樂奏允平之章萬國在宥一陽斯溥淵黙臨朝天職修舉君子道長駢珪聮組占日書雲産祥降嘏宜暘而暘宜雨而雨萬夀聖節皇帝陞座中和樂奏乾平之章二儀清寧三辰順則維帝凝命函冒區域仁恩廣覃至於動植久道化成隆功駿徳聖人多夀年世萬億皇帝還宫中和樂奏太平之章鑒觀惟徳丕命惟皇肇兹夀域薄海要荒物性茂育民俗樂康冠帶之國望斗辨方曰惟萬年同於昊蒼乾隆七年重定元旦皇帝陞座中和樂奏元平之章維天眷我皇四海昇平泰運昌嵗首肇三陽萬國朝正拜帝閶雲物奏嘉祥乘鑾路建太常時和化日長重九譯盡梯航皇帝還宫中和樂奏和平之章聖人延俊英鈞天樂奏繞彤庭華夷一統寧士庶歡忻樂太平寶鼎御香盈祥烟裊瑞靄生簫韶喜九成齊慶祝萬千齡諸王百官行禮丹陛樂奏慶平之章三大節常朝並同鳯凰在藪麒麟在郊坰不如國士充陛庭野無遺賢宗有英夙夜在公在公明明外藩行禮丹陛樂奏治平之章三大節常朝並同我清世徳作求若天行天盡所覆畀我清萬方悦喜來享庭曰予一人業業兢兢内廷行禮丹陛樂奏雝平之章三大節並同闗雎四教邦家作孚先黄裳元吉地承天六宫仁順化穆宣麟之趾兮萬福之原皇帝前元旦進表導迎樂章元旦朝享臨御萬方閶闔通啟太平呈象旅貢陳軒樂張徧海隅瞻帝光冬至皇帝陞座中和樂奏遂平之章陽回黍谷春萬國衣冠拜紫宸旭日耀龍鱗雲物呈祥福禄臻堯階蓂莢新熙庶績撫五辰九服共來賓調元化轉鴻鈞皇帝還宫中和樂奏允平之章皇心克配天玉琯葭灰得氣先彤庭臚唱宣四海共球奏御筵珠斗應璣璿金鏡朗麟鳯鶱人間景福全咨屢省懋乾乾皇帝前冬至進表導迎樂章黄鍾應律玉琯迴陽書雲薦瑞迎日履長共球集韶濩張奉金函來萬方萬夀聖節皇帝陞座中和樂奏乾平之章祥雲扈紫㝠四海臣民祝聖齡淑氣轉階蓂堯籙羲圖燦御屏嵩呼徧在庭天呈瑞地効靈南極拱台星億萬載頌康寧皇帝還宫中和樂奏太平之章皇躬福禄宜永紹鴻圖丕丕基彤陛長仙芝樂奏箾韶丹鳯儀南山獻夀巵人心悦天意隨為徳徧羣黎歌樂愷萬年斯皇帝萬夀進表導迎樂章神聖文武提挈六符綏以眉夀罄宜多祜邁斗維呈瑞圖萬嵗聲山應呼臣等謹按朝㑹宴饗樂歌俱重定於乾隆七年其奏樂章名則乾隆十年奉御筆更定也平定回部冬至慶賀頒詔増撰武成慶語中和樂章二十四年十一月定皇帝陞座中和樂奏遂平之章陽迴玉琯春華闕晴暉映紫宸聲教訖無垠烽燧長清玉塞塵絶域盡王臣安作息荷陶甄奉贄獻靈珍超三古懋經綸皇帝還宫中和樂奏允平之章淑氣轉瑶閶緹幕葭飛啟百昌恩威亘八荒雪嶺天山道里長納欵向明堂三足鳥暨鳯凰乾珍普降祥彌顧諟勑㡬康常朝樂章順治九年定皇帝陞座中和樂奏隆平之章赫矣天鑒眷求惟聖保佑我清既集有命假樂大君天位以正涖下有容鑒於萬方念兹崇功駿命孔常皇帝還宫中和樂奏顯平之章於昭四后誕降世徳亹亹我皇克艱衮職治定功成中和建極龍飛在天鳯儀於庭式奏王夏垂億萬齡乾隆七年重定正月皇帝陞座中和樂奏隆平之章敷天恊氣鮮新又蒼龍正晨萬國歡心仰紫宸皇天錫嘏懿純陳充庭華瑵金根扇春風風兆人澤如春睿周萬品化洽無垠皇帝還宫中和樂奏顯平之章淵然至道遊神恊天行地文照㝢騰華若早輪清明廣大和誾恩滂洋葭葦霑仁念民生生此辰酌于民瑞惟大有寶則賢臣二月皇帝陞座中和樂奏隆平之章所無逸恭已巖廊萬㝢恊嘉祥吹律圜鐘諧舜琯負扆當陽栁風初轉芽黄翠甸輕雷蘇百昌發生心皇奉若寛大詔播天常皇帝還宫中和樂奏顯平之章肅羣后鳴佩鏘鏘拜手仰顒卬初日曈曨奎字麗明庶風翔普天和氣休穰浹化鷹成鳩眼良躬清明基宥密恩溥洽達要荒三月皇帝陞座中和樂奏隆平之章日麗風和徧寰區新榆改火龍旂荏苒晃鸞坡赫如曦皇陞座羣辟集瑶珂拂花茵垂佩多天門蕩蕩無偏頗純嘏詠卷阿皇帝還宫中和樂奏顯平之章瑞靄祥颷映彤墀紅雲繚繞一人淵黙徳光昭百花中千門曉銅鶴篆烟飄奏仙音駕退朝促耕布穀飛靈沼盈耳説農勞四月皇帝陞座中和樂奏隆平之章玉宸旦婺中天王御法宫乘朱路曵長虹六六泠簫諧女鳯萬物被薫風阜財解愠福禄來同皇帝還宫中和樂奏顯平之章麥秋滿野登桑農繭已成玉衡正泰階平上下交孚寰海靜婦子樂盈寧罄天亘地茂豫桐生五月皇帝陞座中和樂奏隆平之章禁林清反舌無聲登進忠良佞不行南風假大而宣平坐明堂賞五徳法乘離以持衡皇帝還宫中和樂奏顯平之章槿初榮旉與朱明天稷星邊漢影萌紅輪照九神嘉生念農芸夏暑雨穆皇心以靡寧六月皇帝陞座中和樂奏隆之章鼔含少黄宫諧鳯伏庚光赤帝騎龍嘒彼三星正昏中茂對乘時穆聖𠂻陳金奏宣景風明光覲辟公皇帝還宫中和樂奏顯平之章彌六合黎元祝頌奉三無帝念淵冲蓊鬱元雲渰宸楓大雨時行黍稷芃虞琴奏皇在宫勤思劇月農七月皇帝陞座中和樂奏隆平之章金井桐飄大火流夷則聲清律應秋天行轉蓐收黄茂滿田疇曉光閶闔浮搏拊戞鳴球玉殿千官咸拜手仰宸旒皇帝還宫中和樂奏顯平之章鷹祭蟬鳴届白藏御廩初登榖始嘗秋回禁陛涼皇居奠總章恩光正溥將零露浥瀼瀼六合顒顒齊所卬挈珠囊八月皇帝陞座中和樂奏隆平之章乾坤爽氣澄序宫殿清光静安設九賓而法見叶九和於天端晻靄揚雲罕􅌑瓏動玉鑾列徽猷兮萬世肅纓冕兮千官皇帝還宫中和樂奏顯平之章雲髙漢逈參見露白颷清蛚寒汔告成夫萬寶祗祝釐於三壇瑞榖岐而秀玉粢好且完喜盈寧兮百室納嘉慶兮天歡九月皇帝陞座中和樂奏隆平之章鴻依銀渚菊有黄花隴雲飛木葉下百穀登場罷芳辰逢令嘉黄麾列正衙豹竿移龍鱗射日上朱霞天錫吾皇多稼皇帝還宫中和樂奏顯平之章鞭鳴鐘動簾捲烟斜漾金風香衣駕天屣言還暇黄雲香滿車村村書響耞處深宫心區夏重恤民家黼扆豳風圖畫十月皇帝陞座中和樂奏隆平之章時合黄純熙修司職顓皇執坎持權聴彤庭珮響玉琯風宣懐黄綰白趨丹陛皇儀展於穆同天光華舜日罘罳煥彩暄到齊編皇帝還宫中和樂奏顯平之章寰海豐穰農夫之慶深宫理化揮絃念艱難稼穡不敢游畋琳琅萬卷環天禄三餘愛清晏探研時㡬勑命明良喜起所寶惟賢十一月皇帝陞座中和樂奏隆平之章七日陽來天地仁萬物一中分人從心上起經綸綱紀三才屬大君答陽臨玉宸無私學化鈞包元履徳日勞勤品類盛荷陶甄皇帝還宫中和樂奏顯平之章順氣祥風翺九垠太史正書雲沉㡬先物福生人淵黙雷聲秉道真八風依序均天根月窟循昭乎若日正三辰不逺復以修身十二月皇帝陞座中和樂奏隆平之章斗柄將東四序周佳氣滿皇州嘉平吉日諏翠輅充廷立九斿吾皇御大裘法座侍王侯服舊徳布新猷穆若天儀福禄遒皇帝還宫中和樂奏顯平之章太室黄雲紫氣蒙時雪報年豐天闗槖籥充臘鼓催春大地通皇家寶緒隆契合動昭融月西朓日生東萬載回環不息同廷試臚傳樂章乾隆七年定皇帝陞座中和樂奏隆平之章啟文明五色雲呈珊網宏開羅俊英梧桐彩鳯雝喈鳴氣如珠河似鏡集賢才於蓬瀛皇帝還宫中和樂奏顯平之章海榴舒木槿初榮宣賜宫衣最有名薰來殿角微凉生鳯棲梧麟在囿致皇風於昇平丹陛樂章賢闗大啟五緯麗霄光九苞彩鳯鳴髙岡日華五色舜衣裳濟濟鏘鏘多士思皇又定廷試武臚傳樂章皇帝陞座中和樂奏隆平之章寶殿雲開朱檐日近甲袍金鎻玲瓏看敦詩説禮國士之風王朝楨幹資英俊參帷幄克詰兵戎雲臺繪畫勲名偉績嫓美前縱皇帝還宫中和樂奏顯平之章玉燭光調金甌綏靖兩階干羽雍容念求賢渭水兆恊飛熊中林罝多賢士資心腹雲起風從龍韜豹畧後先疏附鵬翼搏風丹陛樂章鷹揚鶚薦厲翮九霄清兔罝在野維干城龍韜豹畧蜚英聲肅肅赳赳王克生又定殿試送榜導迎樂章賢綱寛整才俊畢登疏附先後一人惟聖教澤長多士盈景運開龍虎蒸命將出師樂章乾隆七年定皇帝陞座中和樂奏隆平之章臨軒策將聖武恢仙仗挾風雷龍驤虎賁羣英來専閫正藉勒銘才神機翊上台恩隆轂是推揚威邊徼圖雲臺承廟畧往欽哉皇帝還宫中和樂奏顯平之章絳霄瑞靄六龍迴寰㝢靖氛埃天戈遥指閶闔開敦忠秉信閫外裁風雲列陣該崇墉計日摧鋒車電掣天馬徠軍聲歡騰九埃丹陛樂章金殿宸開銅龍啟推轂恩隆典儀九重上爭歌喜起敷聖教盡仰天威出師祭堂子導迎樂章維文武畧勲業攸崇欽承睿算往征不恭扇仁風在師中月三㨗奏膚功又定凱旋樂章皇帝陞座中和樂奏隆平之章慶溢朝端靄祥雲河山清宴鈴旂迢遞送歸鞍赫元戎繄良翰靖獻寸誠丹載干戈和佩鸞功成萬里勒銘還遐邇共騰歡皇帝還宫中和樂奏顯平之章雉扇徐迴徧堯封齊銷烽燧依依楊栁六師歸逮春耕修農耒論賞策勲隨九重深五絃揮敷天率土裒時對日月耀明威丹陛樂章决勝從容籌上將師行肆靖遐方宣武畧更敷文徳垂衣治端拱明堂平定回部凱旋謝恩行禮丹陛樂章二十五年定紫霧氤氲浮彩仗丹階虎隊鵷行敷文徳虞徽接響靖邊徼來享來王平定兩金川凱旋慶賀樂章乾隆四十一年定皇帝陞座中和樂奏隆平之章扇薰風六幕祥融共解征衣拜舞同雲開玉壘昭膚功頌聲靈赫以濯喜韜戈績銘鐘皇帝還宫中和樂奏顯平之章慶天中凱奏勲隆笮徼煙銷化雨濃磨崖紀勒銘重重壯皇猷沛帝澤聽歡聲徧堯封丹陛樂章逺播皇威鯨鯢掃瘴雨蠻烟盡消看振旅歡聲載道瞻天處樂奏簫韶實録告成進書導迎樂章乾隆七年定昭示無坱謨烈聿皇垂布方策日星輝朗配典墳揚耿光永繹思綏萬邦又定玉牒告成進書導迎樂章瓜瓞滋長椒實衍昌公姓千億福疇維嚮定角仁朱芾皇錫類洪咸樂康又定頒時憲書導迎樂章欽若誠亶皇正朔頒分杪無忒玉衡齊貫敬授時宜暑寒穡事明民庶歡又定頒詔書導迎樂章申命重巽綸下九閽勾出萌達百昌咸振象魏懸鞀鐸巡徳意宣天地春太皇太后三大節朝賀樂章康熙二十二年定太皇太后陞座中和樂奏升平之章嘉樂聖母慈徽穆穆恊徳坤元以涵以育以天下養永綏天禄皇情展慶禮明樂淑億萬斯年受兹介福太皇太后還宫中和樂奏恒平之章天祐皇家景命洊申宫幃重慶繁祉川臻如南山夀集嘏斯純我皇樂只燕及臣民薄海内外㒺不尊親太皇太后宫行禮丹陛樂奏晉平之章彤庭景麗旭日祥風繽紛綵仗奕奕璇宫鴻慈燕喜歡洽聖衷萬方一軌來賀來同千官拜舞樂胥有融維夀維祺天地並隆又定皇太后三大節朝賀樂章皇太后陞座丹陛樂奏豫平之章有懿慈闈惟天下母厚徳之符含𢎞九有式嗣徽音以昌厥後寵綏受之遐不單厚福禄來求如山如阜皇太后還宫丹陛樂奏履平之章百禮既洽燦然其章瑞雲承輦麗日舒長萬方玉食怡愉未央言旋彤幄凝祉儲祥一人有慶萬夀無疆皇太后宫行禮丹陛樂奏益平之章品物咸亨景光清泰展禮孔偕式瞻嘉㑹金石相宣貫珠編貝思媚思齊徳音四沛以介繁禧萬年保艾曰夀而臧曰昌而大乾隆七年重定皇太后陞座中和樂奏豫平之章慈闈福履昌瑞雲承輦獻嘉祥徽流寶册光玉食歡心萃萬方旭日正當陽綏眉夀樂且康瑶池蓂葉芳如山阜永無疆皇太后還宫中和樂奏履平之章璿宫瑞靄霏翬翟山河上衮衣寶籙慶璇幃萬國歡愉頌徳徽長日麗晴暉青鸞舞鳯在墀康强福禄宜億萬載祝期頤皇太后宫行禮丹陛樂奏益平之章皇家燕喜福夀協慈徽千官拜舞萬國瞻依靄璇宫聖日輝皇太后萬夀進表導迎樂章昭受天貺鍾慶發祥文母禔祉福隆尊養錫類蕃慈訓彰億萬年臨夀康平定回部冬至慶賀皇太后宫中和樂章二十四年十一月定皇太后陞座中和樂奏豫平之章慈寧集慶長坤元叶徳煥嘉祥晴暉轉一陽玉食承歡福履昌西極盡來王同稽首頌夀康堯階蓂葉芳受兹福永無疆皇太后還宫中和樂奏履平之章璿宫靄紫烟日麗彤幃百福全徳範播堯天文笥珠璣晉九邊翬翟耀瓊筵添宫線玉戺前綏和兆萬年永樂愷恊璣璇册尊典禮樂章乾隆七年定皇帝閲皇太后册寶中和清樂奏海上蟠桃之章海上蟠桃乍熟日邊紅杏初芳慈幃履慶承天貺景福正綿長一解啟蓬萊排仙仗露漙漙凝仙掌褘衣翟服爛明璫耀金鋪日擁扶桑喜風和駘蕩鑪薫百和香太平有象孝徳光昌二解殿當中雲光瀁駕臨軒金閨敞孝思不匱重天常展瑶函寶册輝喜風和駘蕩鑪薰百和香太平有象孝徳光昌三解紫霞杯葡萄釀九華燈芙蓉桁流霞紺雪酌天漿頌期頤地久天長喜風和駘蕩鑪薰百和香太平有象孝徳光昌匹解玉衡平金波朗湛露濃階蓂長雲璈法曲奏清商奉慈徽長信傳芳喜風和駘蕩鑪薰百和香太平有象孝徳光昌五解萬方玉食尊親養孝治蒸蒸天下仰敬歌萬夀無疆趨辭皇太后陞座還宫中和樂章與三大節同行禮丹陛樂章與三大節同皇后三大節朝賀樂章康熙二十二年定皇后陞座丹陛樂奏淑平之章乾資於坤儷尊宸極皇化攸宜母儀萬國履順含章茂明内徳福履永綏迺燕迺翼皇后還宫丹陛樂奏順平之章椒宫奕奕隂教修明褘衣有耀環佩和鳴禮容孔恪萬福來成闗雎之徳流美風聲皇后宫行禮丹陛樂奏正平之章采章有蔚禮備樂宣令儀令徳率履無愆型家而國實惟承乾既淑且和景福綿綿乾隆七年重定皇后陞座中和樂奏淑平之章承天地道光嗣徽音兮儷我皇椒宫壼教彰萬國為儀燕翼昌彤管紀芬芳春雲渥環珮鏘安貞徳有常敷内政應無疆皇后還宫中和樂奏順平之章瑶樞煥上台椒殿風和麗景開晴旭上蓬萊佳氣氤氲徧九垓祥雲䕶燕禖培麟趾毓蘭荄雉尾影徘徊看瑞靄集宫槐皇后宫行禮丹陛樂奏正平之章正坤維兮儷皇極母儀昭萬國福履永綏將六宫承法則皇后千秋進箋導迎樂章坤徳柔靜隂教順承螽羽麟角允惟嘉應寶册鐫天慶膺永嗣徽如月恒皇帝幸盛京朝賀樂章乾隆八年定皇帝陞座中和樂奏元平之章維天眷我清一統車書四海寧法駕蒞陪京祠謁珠丘展孝誠陟降舊宫庭思祖徳答天明佳氣繞龍旍暾聖日海東升皇帝還宫中和樂奏和平之章文思洽九瀛神孫繼治洊昇平皇初七徳成締造艱難景命膺撫序惕中情凝旒竚若奉盈昭兹萬億齡列祖武敬其繩諸王百官行禮丹陛樂奏慶平之章重熙累洽紘瀛被仁風穆如神孫臨鎬豐橋山禮成御故宫零露瀼瀼有來雍雍外藩行禮丹陛樂奏治平之章萬方合敬同愛所親尊思木有本水有源東西朔南咸駿奔純固恪恭日子雲孫皇帝親詣辟雍殿講學樂章乾隆五十年定皇帝陞座奏盛平之章辟雍建規矩圓方復古自吾皇先聖宫牆千仭近講學升堂於論鐘鼓鏗鏘春水圜橋流浩湯作君師時萬億隆禮樂煥文章皇帝還宫奏道平之章聖人出天下文明玉振叶金聲日月江河昭法象自古經行講筵雝肅和平熙事純常茂典成覺羣黎敷五教彞倫敘萬邦寧行禮奏慶平之章禮成典樂辟水監姬章中天日月瞻顒卭宸儀有肅拜舞行夀考遐昌聖化汪洋皇朝文獻通考卷一百七十
