body:
  text: 兵考七直省兵江南江西八旗駐防江寧將軍一人駐劄江寧府副都統一人統轄恊領兼佐領八人佐領三十二人防禦四十人驍騎校四十人八旗滿洲委前鋒校十二人前鋒一百三十二名領催二百四十名驍騎二千五百二十八名步軍五百七十二名養育兵五百名弓箭鐵匠各四十名兼轄京口副都統一京口副都統一人駐劄鎮江府統於江寧將軍統轄協領兼佐領二人佐領十六人防禦十六人驍騎校十六人八旗蒙古委前鋒校四人前鋒五十二名領催九十六名驍騎一千十四名步軍二百二十八名養育兵一百五十名弓匠箭匠鐵匠各十六名順治二年設江寧駐防將軍一人副都統二人協領八人佐領防禦驍騎校各四十一人鑲黄正白鑲白正藍左翼四旗滿洲䝉古兵二千名弓匠鐵匠各五十六名兼轄標下緑旗營官兵十一年設京口駐防總管一人管轄八旗官兵十六年改設京口駐防鎮海將軍一人副都統二人協領㕘領各八人防禦八十人佐領驍騎校各四十人八旗漢軍領催四百二名驍騎一千五百九十八名礮驍騎四十名弓匠鐵匠各八名兼轄標下左右前後四營緑旗官兵是年設京口左右兩路緑旗水師總兵官統轄水師官兵歸京口將軍兼轄十七年撥山東徳州駐防兵四十九名山西太原府駐防兵五十名充江寧駐防兵額十八年増設江寧駐防步軍一千名康熈十三年増設江寧駐防驍騎一千名京口駐防步軍一千名二十一年改京口左右兩路緑旗水師官兵屬提督管轄二十二年撥江寧駐防左翼四旗兵一千名往駐荆州府増設右翼四旗滿洲䝉古兵一千名合新舊八旗驍騎共四千名於額兵内分設委前鋒校十六人前鋒一百八十四名二十三年裁江寧駐防步軍三百名又裁京口駐防防禦四十人是年裁京口將軍標下緑旗前後二營官兵惟設左右二營二十四年裁京口右路緑旗水師總兵官改左路總兵官為京口水師總兵官以裁存官兵歸併左路分中左右三營三十年於江寧駐防驍騎額内分設鳥槍領催五十六名鳥槍驍騎七百四十四名領催二百八十名驍騎二千七百二十名京口駐防驍騎額内分設鳥槍領催二百名鳥槍驍騎八百名領催二百名驍騎八百名步軍額内分設鳥槍兵四百名弓箭兵二百名長槍兵二百名藤牌兵二百名三十六年裁京口緑旗水師總兵官改設京口協副將分左右二營各設遊擊以下將領八人兵共一千九百名五十八年調江寧駐防滿洲兵一千名往赴西藏仍於駐防餘丁内選補原額六十年以調赴西藏兵還歸駐防其増設兵一千名遇缺開除雍正元年増設江寧駐防協領二人佐領防禦驍騎校各十六人又増步軍一百名合新舊步軍共八百名四年増設江寧駐防礮驍騎七十八名京口駐防礮驍騎三十二名五年設江寧駐防水師營協領四人佐領防禦驍騎校各十二人水師一千名即於駐防官兵原額内充補於鎮江將軍標下撥沙船二十給江寧水師又於鎮江水師營撥緑旗守備一人把總二人水手三百二十四名與江寧駐防兵配駕操演尋定江寧駐防兵四千名一併學習水營事務官員等輪班撥𣲖管理將八旗兵四千作為五班操演毎半月更换一次春秋二季合操二次七年裁江寧駐防礮驍騎四十八名八年撥江寧駐防兵八百名往駐乍浦仍於駐防餘丁内選補原額十年設江寧駐防養育兵十二年以江寧駐防額内鐵匠之半改為箭匠乾隆三年増設江寧駐防礮驍騎六十名十六年裁江寧駐防水師營仍作陸路營制以營船及原設之緑旗守備把總水手暫歸鎮江水師副將管轄陸續遇缺裁汰二十二年裁京口將軍一人留副都統駐鎮江管轄駐防官兵歸江寧將軍兼轄令將軍間月一次至京口查閲營伍其原屬京口將軍之緑旗左右營官兵改𨽻江寧將軍管轄二十八年令京口駐防漢軍兵悉陸續出旗分别改補緑旗營更定官兵額數移江寧駐防八旗蒙古兵一千五百九十二名充京口額三十二年改京口水師協以下將領十六人兵一千八百六十二名歸入總督標管轄三十三年裁京口將軍標左右二營緑旗官兵是年改髙資營都司以下將領三人兵一千二百三十四名歸入總督標管轄三十四年裁江寧副都統一人緑旗營兩江總督一人駐劄江寧府統轄本標官兵及分防各營兼節制撫標三提標一鎮標五臣等謹按順治二年設江南江西河南總督駐江寧府五年改為江南江西總督停轄河南九年改為江南總督又分設江西總督駐南昌府康熈四年仍併為江南江西總督十三年江南與江西又各分設總督二十一年復裁江西總督併歸江南為兩江總督督標中營中軍副將一人中軍都司一人千總一人把總四人兵五百八十四名左營遊擊一人中軍守備一人千總二人把總四人兵五百八十二名江寧城守協副將一人駐劄江寧府兼轄竒兵營及浦口溧陽瓜州三營左營都司一人中軍守備一人千總二人把總四人兵六百八名右營都司一人中軍守備一人千總二人把總四人兵五百八十名兼轄竒兵營遊擊一人駐劄儀徵縣兼轄青山營中軍守備一人千總二人把總四人兵七百名青山營守備一人駐劄儀徵縣屬於竒兵營把總一人兵一百名浦口營都司一人駐劄浦口千總一人把總二人兵三百七十六名溧陽營都司一人駐劄溧陽縣千總一人把總二人兵三百一名瓜州營守備一人駐劄瓜州千總一人把總二人兵三百四十九名京口水師協副將一人駐劄江隂縣兼轄髙資營左營逰擊一人中軍守備一人千總二人把總四人兵九百三十一名右營逰擊一人駐劄江都縣中軍守備一人千總二人把總四人兵九百三十一名兼轄髙資營都司一人駐劄鎮江府千總一人把總一人兵一千二百三十四名安慶協副將一人駐劄安慶府兼轄游兵營潛山