front:
  text: 欽定四庫全書皇朝文獻通考卷一百七十五
  hash: sha256:b1ff8c30a6abd3ea118408784f53e79c47b2dfd18ad2713e2b76bdc7aa9ad166
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_175-1a, image: WYG0635/WYG0635-0822c.png}
body:
  text: 樂考二十一散樂百戲臣等謹按秦有角觝之戲漢有魚龍曼延之戲而後之踵事増竒詭怪百出大都聲容器數均非部伍之正故馬端臨考以散樂百戲賅之國家筵宴之候亦有散樂百戲然雅俗二部而外初未嘗有駭觀驚俗之竒也自平定西陲囘紇内附獻其樂伎始有尋橦髙絙承盌轉碟諸戲攷西域前史載其俗多幻術如跳丸胡旋倒行足舞並皆騰踏蹻㨗眩惑非常是其俗伎流傳由來已久兹既向化歸誠亦使之列於殿廷𨽻之樂府與諸蕃樂伎並陳於燕饗非徒昭逮下之情而亦所以示覆幬之廣也他如火戲氷戲之屬隨時行之要非無事而舉者謹考定制亦附紀焉耕耤筵宴散樂百戲進菓桌管絃樂奏朝天子安桌畢樂止領樂官一員樂工二名領舞童五名四時和隊舞承應樂奏望吾鄉舞畢樂止領樂官一員樂工六名百戲變碗承應進酒領樂官一員樂工二名領㓜童十三名呈瑞應承應樂奏黄薔薇舞畢樂止領樂官一員鼓板三名領老人一名探子二名承應唱商調集賢賔進饌領樂官一員樂工八名清樂奏太清歌徹饌樂止領樂官一員領莊家老四人舞童八名老人四名攛掇四名黄童白叟鼓腹謳歌承應樂作換莊農舞畢次文士九名感天地承應樂奏啄木耳次武士九名感祖宗承應樂奏黄薔薇次進寳囘囘五名頌得勝承應樂奏紅衲襖次香斗老人三名黎民歡樂承應樂奏調笑令次五方夜义五名承應樂奏鬼令次五海龍王承應樂奏清江引次三官五方彩旗承應樂奏看花㑹俱用大樂以次陳伎火戲毎嵗正月幸圓明園奉皇太后觀火戲例於十三十四十七十八毎日晚刻設放吉祥盒子燈或二座或三座十五十六毎日午刻設放日間盒子各一座晩刻設放吉祥盒子燈或二座或三座及萬國樂春臺火戲各一座氷戲每嵗十月咨取八旗及前鋒統領䕶軍統領等處毎旗照定數各挑選善走氷者二百名内務府預備氷鞋行頭弓箭毬架等項至冬至後駕幸瀛臺等處陳設氷嬉及較射天毬等伎分兵丁為二翼每翼頭目十二名服紅黄馬褂餘俱服紅黄齊肩褂射毬兵丁一百六十名㓜童四十名俱服馬褂背小旗按八旗各色以次走氷較射陳伎畢恩賞銀两頭等三名各賞銀十两二等三名各賞銀八两三等三名各賞銀六两其餘兵丁各賞銀四两俱由内府廣儲司支給走馬伎乾隆十二年起奉㫖交與内府三旗前鋒人等挑選學習解馬花馬箭共一百二十名至乾隆十三年冬奉上諭南苑紫光閣圓明園及木蘭熱河等處呈用預備所有預備之處花馬箭照常衣服解馬皆用短襖其閱伎之時與閱伎之地盡照㫖遵行笳吹樂司笳一人司胡琴一人司筝一人司口琴一人司章四人皆服蟒服跪一膝奏䝉古樂曲番部合樂筝一琵琶一三絃一火不思一番部胡琴一笙一管一笛一簫一雲鑼一二絃一月琴一提琴一軋筝一拍一毎器各一人與笳吹同入共二十人為四班皆蟒服跪一膝奏蒙古樂曲髙麗國俳笛伎管伎鼓伎各一人戴烟氊㡌鏤金頂服藍雲縀袍棕色雲縀背心藍綢帯俳長一人戴面具青縀㡌紅纓服紅雲縀袍白綢長袖緑雲縀虎補背心十字藍綢𢃄擲倒伎十四人服紅短衣在丹陛兩旁立俳長從右翼上於氊南立北面致辭係髙麗語笛伎管使鼓伎各一人從右翼上於氊西南立東北向擲倒伎從左翼上自東向西各呈其伎囘部樂伎銅繩伎用銅繩一根徑二寸長一丈餘或用麻繩一根徑二寸長三丈餘横於架木之上架木髙二丈五尺又用麻繩一根斜墜於地拴於橛一邊立桅木一根髙六丈囘人服綵衣兩手執木一根赤足自地登繩斜上履繩而走往返逰躍於繩上既而又服其靴足掌下加一銅盤踏銅盤而履繩亦可往返行之或去銅盤踏一立木徑二寸許髙五寸許逰於繩上亦可或履或行或跳或躍或跨而騎或坐而起如履平地然下立囘人一亦服綵衣擊鼓而喧於下戲躍既畢左懸弓右挾矢抱桅木而直上至桅頂地設㡌毬一枚援弓而射之皇朝文獻通考卷一百七十五
