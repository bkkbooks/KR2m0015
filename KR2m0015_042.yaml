銀五百兩縀十匹鎮國公銀三百兩縀九匹輔國公銀二百兩縀七匹扎薩克一等台吉銀百兩縀四匹各台吉一等銀百兩二等八十兩三等六十兩四等四十兩子一等二百有五兩二等一百九十二兩五錢三等百八十兩男一等百五十五兩二等一百四十二兩五錢三等百三十兩二等輕車都尉九十二兩五錢騎都尉五十五兩雲騎尉四十二兩五錢一等侍衛百三十兩八品官達爾漢各二十兩王之女銀百兩縀八匹貝勒之女銀五十兩緞六匹公之女銀三十兩緞四匹王之壻銀五十兩緞五匹貝勒之壻銀四十兩縀四匹回部係住京者之俸郡王秩米三百八十石輔國公九十五石內大臣四十二石七斗五升台吉一等四十七石五斗二等三十八石三等二十八石五斗四等十九石侍衛一等六十二石三等三十八石藍翎二十八石五斗厄魯特之俸內大臣銀九十兩副都統秩七十七兩五錢散秩大臣六十五兩三品總管及烏梁海總管亦如之順治十四年定外藩王貝勒貝子公俸銀縀匹各有差雍正七年諭從前扎薩克䝉古王等之俸比在內王等少給者並非以內外輕重分别因蒙古王等人多在䝉古地方居住費用有限國帑不足故少給伊等之俸今䝉上天恩庇聖祖仁皇帝遺惠天下無事數年來豐收國帑尚屬有餘䝉古王等以下扎薩克一等台吉以上皆著增添一倍再尋常一等台吉原不給俸今亦照前扎薩克一等台吉等食俸之例賞給此朕特加之恩亦未便遽定為例嗣後嵗終户部理藩院㑹同將應否倍賞之處奏聞再降諭㫖十年諭八旗察哈爾䝉古駐牧近邊與內地人相同效力有年原定例察哈爾官內有職任者給與半俸無職任散秩官給與俸祿四分之一念其皆國家效力舊人特沛恩澤將有職任官給與全俸其無職任散秩官給與半俸乾隆二十年定頒給杜爾伯特王貝勒貝子公扎薩克台吉各俸銀俸縀如喀爾喀例行部議杜爾伯特扎薩克王公台吉等各俸銀俸縀每年令各差官乘𫝊赴京師户部關支右外藩俸祿之制兵餉之制八旗兵餉京師前鋒親軍護軍領催弓匠長月給餉銀四兩驍騎銅匠弓匠月給銀三兩皆嵗支米四十八斛步軍領催月給餉銀二兩步軍一兩五錢鐵匠一兩至四兩皆嵗支米二十四斛炮手月給銀二兩嵗支米三十六斛由覺羅補前鋒親軍護軍者月加餉銀一兩教飬兵月給銀一兩五錢不給米官畜馬駝每馬駝月給豆草折價銀三兩各省駐防弓匠鐵匠家口五名馬三匹餉銀驍騎炮手月給二兩弓匠鐵匠一兩水師營兵與陸路兵同水手艌匠二兩至一兩不等緑旗兵餉京師巡捕三營馬兵月給銀二兩步兵一兩皆月給米三斗每馬一匹月給豆草銀二兩五錢各省鎮兵馬兵月給銀二兩步兵一兩五錢守兵一兩皆月支米三斗馬兵每名給馬一匹春冬月支豆九斗夏秋六斗草均三十束八旗官親隨兵坐糧領侍衛內大臣滿洲都統各八名蒙古漢軍都統前鋒統領護軍統領各六名步軍統領五名滿洲副都統四名䝉古漢軍副都統各三名步軍翼尉一名前鋒參領護軍參領驍騎參領各二名副護軍參領副驍騎參領前鋒侍衛上三旗內府參領各一名有半以上親隨兵每名月給銀三兩米折銀一兩八旗佐領上三旗內府佐領各於本佐領額兵內食糧一分民公四名侯伯各三名大學士尚書左都御史內大臣子各二名侍郎學士副都御史通政使大理卿詹事散秩大臣男王府長史各一名以上親隨兵每名月給餉銀一兩米二斛步軍協尉給坐糧二分步軍副尉捕盜官各二分步軍尉一分均於額設步軍內撥給各省駐防官丁糧馬乾將軍家口四十名馬五十匹副都統家口三十五名馬四十匹協領家口三十名馬三十匹佐領家口二十名馬二十匹防禦家口十有四名馬十有五匹驍騎校有品級筆帖式家口十有二名馬十匹未入流筆帖式領催驍騎家口七名馬六匹直省緑旗官親丁名糧提督八十分總兵官六十分副將三十分參將二十分均馬步各半遊擊十五分馬七步八都司十分守備八分均馬步各半千總五分馬一步四把總四分馬一步三沿革事例詳見兵考右兵餉之制臣等謹按本朝逮下之恩於在廷諸臣常祿之外龍光下被舉凡御書之寶天府之珍固已錫豫便蕃矣至於撫恤禁旅自康熙年間設立官庫貸餉以資其生至四十五年免未完銀至三百九十五萬餘兩旋罷官庫復設總庫至五十六年又免未完銀至一百九十六萬餘兩我皇上登極之初復借支餉銀至乾隆三年仍盡免其所未完者他若發帑取息以待兵丁吉凶之事則由京師而及駐防由八旗而及緑旗靡不周遍而且遇巡幸則有賞遇出征則有賞遇灾歉則有賞渥澤殊恩醇醲溥浹宜乎士飽馬騰度越千古也至於吏胥匠役各給餼廪猶古者代耕之義然而其人微矣乃恭閲記注乾隆三年上諭外省有荒闕賦銀之處向例在於知府以下等官俸工內扣除抵補朕念佐雜微員力量單薄不應在扣除之內已於乾隆元年三月內降㫖諭令在督撫之司道大員及府縣正印官俸工內酌量均攤以抵所闕之數今思官有崇卑役無大小微員俸工既經免其均攤其餘各衙門人役皆當差效力之人工食數兩藉以飬贍其家若因荒闕扣除則糊口無資情有可憫此項共計十二萬餘兩著於乾隆三年為始各省大小衙門人役工食皆凖於地丁項下照額定之數全行支給免其扣荒使執役之人均沾恩澤臣等伏讀之下念以吏役之微上厪宸衷古聖人痌瘝饑溺未有若斯之詳且盡也苐內外吏役繁多數目零雜不能備登謹於俸餉篇末附著萬分之一焉皇朝文獻通考卷四十二
