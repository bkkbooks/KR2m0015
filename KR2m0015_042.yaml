body:
  text: 國用考四俸餉宗室王公之俸親王嵗給銀萬兩世子六千兩郡王五千兩長子三千兩貝勒二千五百兩貝子千三百兩鎮國公七百兩輔國公五百兩鎮國將軍一等四百十兩二等三百八十五兩三等三百六十兩輔國將軍一等兼一雲騎尉者三百三十五兩不兼者三百十兩二等二百八十五兩三等二百六十兩奉國將軍一等兼雲騎尉者二百三十五兩不兼者二百十兩二等一百八十五兩三等一百六十兩奉恩將軍兼一雲騎尉者一百三十五兩不兼者一百有十兩宗室雲騎尉八十五兩宗室雲騎尉品級八十兩以上每銀一兩均給米一斛順治元年初定王公俸銀有差嵗給親王銀一萬兩郡王五千兩貝勒二千五百兩貝子一千二百五十兩公六百二十五兩三年更定宗室公俸銀六百二十兩七年定王公俸米並更定郡王以下各俸銀親王俸銀如舊例米六千石郡王四千兩米二千石貝子一千兩米八百石公五百兩米六百石將軍八十兩八年更定王公俸米及郡王以下各俸銀郡王五千兩貝勒三千兩貝子二千兩公一千兩其王公俸米視其俸銀每二兩給米三斛九年定親王世子嵗給俸銀六千兩郡王長子嵗給俸銀三千兩十年更定貝勒以下俸銀及王公等各俸米貝勒二千五百兩貝子一千三百兩鎮國公七百兩輔國公四百兩鎮國將軍一等三百兩二等二百七十五兩三等二百五十兩輔國將軍一等二百二十兩二等二百兩三等一百七十五兩奉國將軍一等一百五十兩二等一百二十五兩三等一百兩奉恩將軍七十五兩其王公俸米視其俸銀每銀一兩給米一斛右宗室王公俸祿之制公主以下及額駙之俸固倫公主嵗給銀四百兩和碩公主三百兩郡主二百五十兩縣主二百二十兩郡君一百九十兩縣君一百六十兩鄉君一百三十兩固倫公主額駙二百八十兩和碩公主額駙二百五十五兩郡主額駙二百三十兩縣主額駙一百八十兩郡主額駙一百五十五兩縣君額駙一百三十兩鄉君額駙一百有五兩以上每銀一兩給米一斛順治七年初定公主以下祿米有差嵗給公主郡主各一千石縣主三百石郡君二百石十一年定嵗給公主俸銀二百五十兩十二年定給郡主俸銀二百兩縣主一百五十兩郡君一百兩十四年定額駙銀幣各有差固倫公主額駙俸銀三百兩縀十匹郡主額駙銀一百兩縀八匹縣主額駙銀五十兩縀五匹十八年更定俸幣在內固倫公主俸銀四百兩和碩公主三百兩郡主二百五十兩縣主二百二十兩郡君一百九十兩縣君一百六十兩鄉君一百三十兩下嫁外藩公主俸銀二百兩縀十二匹縣君四十兩縀五匹鄉君三十兩縀四匹和碩公主額駙俸銀二百兩縀九匹郡君額駙四十兩縀五匹縣君額駙三十兩縀三匹鄉君額駙二十兩縀三匹右公主以下及額駙俸祿之制世爵之俸公一等七百兩二等六百八十五兩三等六百六十兩侯一等兼一雲騎尉者六百三十五兩不兼者六百十兩二等五百八十五兩三等五百六十兩伯一等兼一雲騎尉者五百三十五兩不兼者五百十兩二等四百八十五兩三等四百六十兩子一等兼一雲騎尉者四百三十五兩不兼者四百十兩二等三百八十五兩三等三百六十兩男一等兼一雲騎尉者三百三十五兩不兼者三百十兩二等二百八十五兩三等二百六十兩輕車都尉一等兼一雲騎尉者二百三十五兩不兼者二百十兩二等一百八十五兩三等一百六十兩騎都尉兼一雲騎尉者一百三十五兩不兼者百有十兩雲騎尉八十五兩恩騎尉四十五兩間散公二百五十五兩侯二百三十兩職官伯品級二百有五兩子品級一百八十兩男品級一百五十五兩輕車都尉品級一百三十兩騎都尉品級百有五兩雲騎尉品級八十兩以上每銀一兩給米一斛順治七年定嵗給世爵俸銀有差十年更定世爵銀米各有差嵗給異姓公一等俸銀七百兩二等六百八十五兩三等六百六十兩侯一等兼一拖沙喇哈畨者六百三十五兩不兼者六百十兩二等五百八十五兩三等五百六十兩伯一等兼一拖沙喇哈畨者五百三十五兩不兼者五百十兩二等四百八十五兩三等四百六十兩精竒尼哈畨一等兼一拖沙喇哈畨者四百三十五兩不兼者四百十兩二等三百八十五兩三等三百六十兩阿思罕尼哈畨一等兼一拖沙喇哈畨者三百三十五兩不兼者三百十兩二等二百八十五兩三等二百六十兩阿達哈哈畨一等兼一拖沙喇哈畨者二百三十五兩不兼者二百十兩二等一百八十五兩三等一百六十兩拜他拉布勒哈畨兼一拖沙喇哈畨者一百三十五兩不兼者一百十兩拖沙喇哈畨八十五兩拖沙喇哈畨品級官八十兩其俸米每俸銀一兩支給一斛右世爵俸祿之制百官之俸在京文武官一品俸銀一百八十兩二品一百五十五兩三品一百三十兩四品百有五兩五品八十兩六品六十兩七品四十五兩八品四十兩以上正從同九品三十三兩一錢有竒從九品三十一兩五錢有竒自一品至九品恩俸如其正俸之數俸米視其俸銀每銀一兩給米一斛其銀有竒者以米之升合凖之在外文官俸銀與京官同不給祿米武官俸銀一品正九十五兩八錢一分二釐從八十一兩六錢九分四釐二品正六十七兩五錢七分六釐從五十三兩四錢五分八釐三品三十九兩三錢四分四品二十七兩三錢九分四釐五品十八兩七錢六釐六品十四兩九錢六分四釐八毫七品十二兩四錢七分一釐均正從同薪銀一品一百四十四兩正從同二品視一品三品一百二十兩四品七十二兩五品四十八兩六品三十三兩三分五釐二毫均正從同七品視六品順治元年定文武官俸薪祿米各有差百官俸祿令仍照故明例正一品文官俸銀二百十五兩五錢武官九十五兩從一品文一百八十三兩八錢武