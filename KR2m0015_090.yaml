body:
  text: 職官考十四封階文職正一品光禄大夫從一品榮禄大夫正二品資政大夫從二品通奉大夫正三品通議大夫從三品中議大夫正四品中憲大夫從四品朝議大夫正五品奉政大夫從五品奉直大夫正六品承徳郎從六品儒林郎吏員出身者宣徳郎正七品文林郎吏員出身者宣議郎從七品徵仕郎正八品修職郎從八品修職佐郎正九品登仕郎從九品登仕佐郎武職正一品建威將軍從一品振威將軍正二品武顯將軍從二品武功將軍正三品武義都尉從三品武翼都尉正四品昭武都尉從四品宣武都尉正五品武徳騎尉從五品武徳佐騎尉正六品武略騎尉從六品武略佐騎尉正七品武信騎尉從七品武信佐騎尉正八品奮武校尉從八品奮武佐校尉正九品修武校尉以下新増從九品修武佐校尉臣等謹案初制武職正二品稱驃騎將軍從二品驍騎將軍正三品昭勇將軍從三品懐逺將軍正四品明威將軍從四品宣武將軍正五品武徳將軍從五品武略將軍正六品昭信校尉從六品武顯校尉正七品奮力校尉八品九品則級所無焉嗣更定初例一品至四品俱稱大夫五品以下則皆改稱為郎略參宋制武功大夫武功郎之意乾隆五十一年特奉上諭舊例武官正從一品俱封榮禄大夫正二品至從五品俱封將軍既未為允當嗣更定新例則皆稱大夫因思將軍為専閫主帥大夫係文臣之稱乃舊例則封將軍而今又更封大夫名義殊覺混淆嗣後武職正一品至從二品俱應封為將軍正三品至從九品應分别酌與都尉騎尉校尉等字様遞為差等以示區别旋是遵㫖定議一二品俱封為將軍三四品俱封為都尉五六七品俱封為騎尉八九品俱封為校尉經進呈睿鑒准行於是武職封號較舊制彌盡美盡善矣至文武邀封之期初制恭遇覃恩及三年考滿均給封贈康熙九年停考滿封贈之例遇覃恩始按品頒給至封贈命婦一品妻為一品夫人二品妻夫人三品妻淑人四品妻恭人五品妻宜人六品妻安人七八九品妻孺人命婦但論品級不分正從一品封贈三代二三品封贈二代四品至七品封贈一代八九品止封本身凡一品至五品皆授以誥命六品至九品皆授以勅命文職𨽻於吏部武職𨽻於兵部今依㑹典所載並新定章程輯大要以備考云乂謹案乾隆五十年正月初一日恩詔條款内開内外大小官員除各以現任品級已得封贈外凡陞級及改任者俱照新銜封贈嗣部議查核㑹典酌定四條一本宗貤封宜定以品限一二品官不得貤封髙祖父母四品及五六品官均不得貤封曽祖父母以符體制一外姻貤封宜嚴以限制凡貤封外姻止許遵㑹典貤封外祖父母其餘外姻概不准請以杜冒濫一京官八品以下加級請封宜區以差等㑹典載京官有加級者得進階受封級多限以制七品以下不得逾五品五六品不得逾四品三四品不得逾二品推原義例殊為允當但五六品官不越四品而七品至從九品未入流人員俱得照加級請領五品封典亦覺太優請於㑹典内添七品不得逾五六品八品以下不得逾七品於封典益昭詳慎一重封條例宜晰如司員調部道府州縣調任雖署新銜而職既仍舊級亦未増豈得前後一官兩請封典請凡衙門地方調易而職階相同者不准重封再京官請除官階級數與上次相同者不准重封外所有加級既増晉階較大各員俱照向例給封級多者仍限以制如八品以下不得過七品之類其捐納各級概不准計算庶重封之弊絶而於例亦昭畫一奉硃批所議是依議斯又酌定章程並載入㑹典則例者謹因官階而附輯封典之制如此禄秩臣等謹案我朝量能授官因官制禄銀米兼支視前代折米折鈔之制允為優厚世宗憲皇帝定養亷増禄米皇上御極之初即加賜京官恩俸所以示體恤而勵亷隅者靡所不至恩至渥也謹依馬考之例書現在正支數於前而以歴年増減之數附後作禄秩一篇又按馬考及五朝考禄秩後復有職田一門國初勲臣皆給莊田以代廩禄尋即按品給禄其莊田之數詳見田賦不另載世職俸銀俸米臣等謹案五朝考禄秩俱載王公及公主駙馬都尉以下奉恩將軍儀賔以上所支之數今據國史職官志及㑹典文武官制俱自一等公以下有品級官員作為考故禄秩亦祗載一等公以下其奉恩將軍以上廩禄俱不載一等公嵗給銀七百兩米三百五十石二等公嵗給銀六百八十五兩米三百四十二石五斗三等公嵗給銀六百六十兩米三百三十石閒散公嵗給銀二百二十五兩米一百二十七石五斗一等侯又一雲騎尉嵗給銀六百三十五兩米三百一十七石五斗一等侯嵗給銀六百一十兩米三百五石二等侯嵗給銀五百八十五兩米二百九十二石五斗三等侯嵗給銀五百六十兩米二百八十石閒散侯嵗給銀二百三十兩米一百一十五石一等伯又一雲騎尉嵗給銀五百三十五兩米二百六十七石五斗一等伯嵗給銀五百一十兩米二百五十五石二等伯嵗給銀四百八十五兩米二百四十二石五斗三等伯嵗給銀四百六十兩米二百三十石伯品級官嵗給銀二百五兩米一百二石五斗一等子又一雲騎尉嵗給銀四百三十五兩米二百一十七石五斗一等子嵗給銀四百一十兩米二百五石二等子嵗給銀三百八十五兩米一百九十二石五斗三等子嵗給銀三百六十兩米一百八十石一等男又一雲騎尉嵗給銀三百三十五兩米一百六十七石五斗一等男嵗給銀三百一十兩米一百五十五石二等男嵗給銀二百八十五兩米一百四十二石五斗三等男嵗給銀二百六十兩米一百三十石一等輕車都尉又一雲騎尉嵗給銀二百三十五兩米一百一十七石五斗一等輕車都尉嵗給銀二百一十兩米一百五石二等輕車都尉嵗給銀一百八十五兩米九十二石五斗三等輕車都尉嵗給銀一百六十兩米八十石騎都尉又一雲騎尉嵗給銀一百三十五兩米六十七石五斗騎都尉嵗給銀一百一十兩米五十五石雲騎尉嵗給銀八十五兩米四十二石五斗恩騎尉嵗給銀四十五兩米二十二石五斗八旗世爵俸禄由都統咨部支領曾經効力行閒致仕者或給半俸或給全俸由兵部奏請凡八旗武官皆同漢世爵由本省支給咨部察核漢世爵擢用京營外省及選用侍衛者均食全俸其發標効力未經受職及自願効力非命往者均給半俸實授始支全俸其奉㫖令其回籍及不能供職并未及嵗承襲在家閒住者均停給俸雍正十三年定八旗世爵授外省文職者如世爵之俸浮於外俸於任所支領外任之俸所餘世爵俸銀并世爵禄米仍留京支領若與外俸相等及外俸浮於世職者俸銀均在任所支領世爵禄米仍準留京乾隆三年定八旗世爵授外省武職者其世爵禄米照文官例留京支領乾隆四年定在京滿漢文武官員俸銀禄米臣等謹案在京文武官員俸銀滿洲漢人俱一例按品頒發禄米即照俸定數每俸銀一兩支米一斛正從一品嵗給俸銀一百八十兩俸米九十石正從二品嵗給俸銀一百五十五兩俸米七十七石五斗正從三品嵗給俸銀一百三十兩俸米六十五石正從四品嵗給俸銀一百五兩俸米五十二石五斗正從五品嵗給俸銀八十兩俸米四十石正從六品嵗給俸銀六十兩俸米三十石正從七品嵗給俸銀四十五兩俸米二十二石五斗正從八品嵗給俸銀四十兩俸米二十石正九品嵗給俸銀三十三兩一錢一分四釐俸米一十六石五斗五升七合從九品嵗給俸銀三十一兩五錢俸米一十五石七斗五升未入流俸銀禄米與從九品同雍正三年奉諭㫖朕體恤臣工時深軫念每思經理區畫以贍其俯仰之資今見漢官擕帶家口者多若俸米仍照舊數食用或有不敷居官者難免内顧之憂嗣後在京大小漢官著按俸銀數目給與俸米俾禄糈所頒足供養贍以示朕加恩羣臣之至意五年議准盛京户部及守䕶陵寢文武各官俸銀照京官正俸一體頒給十二年議准凡内府及王公府屬佐領照八旗佐領一體頒給俸禄乾隆元年奏准七品筆帖式嵗支俸銀三十八兩八品二十八兩九品二十一兩米照俸支給臣等謹案初制自順治元年定漢文官正一品嵗實支俸銀二百一十五兩五錢有竒從一品一百八十三兩八錢有竒正二品一百五十二兩一錢有竒從二品一百二十兩五錢有竒正三品八十八兩八錢有竒從三品六十六兩九錢有竒正四品六十二兩有竒從四品四十八兩七錢有竒正五品四十二兩五錢有竒從五品三十七兩六錢有竒正六品三十五兩四錢有竒從六品二十九兩有竒正七品二十七兩四錢有竒從七品二十五兩八錢有竒正八品二十四兩三錢有竒從八品二十二兩七錢有竒從九品一十九兩五錢有竒漢武官正一品嵗實攴俸銀九十五兩八錢有竒從一品八十一兩六錢有竒正二品六十七兩五錢有竒從二品五十三兩四錢有竒正三品三十九兩三錢有竒從三品二十九兩五錢有竒正四品二十七兩三錢有竒從四品二十一兩五錢正五品一十八兩七錢有竒從五品一十六兩五錢有竒正六品一十五兩二錢有竒從六品一十二兩四錢有竒又定漢文武官嵗額給柴薪銀一品二品一百四十四兩大學士加宫銜者加柴薪銀二十四兩三品一百二十兩四品七十二兩五品六品四十八兩七品三十六兩八品二十四兩九品一十二兩在俸銀之外八年定滿洲䝉古漢軍都統尚書嵗給銀一百四十兩副都統侍郎一百三十兩㕘領等官一百二十兩佐領等官一百兩䕶軍校驍騎校六品官六十兩七品官四十兩八品官二十兩每銀二兩給米三斛十年更定滿洲䝉古漢軍都統尚書嵗給銀一百八十兩副都統侍郎一百五十五兩㕘領一等侍衛郎中一百三十兩佐領二等侍衛員外郎一百五兩三等侍衛主事八十兩䕶軍校驍騎校六品官六十兩七品官四十五兩八品官四十兩至十三年始議定文武俸禄不論滿漢一例照品支給並裁漢官柴薪銀兩在京官員恩俸臣等謹案凡官員於正俸外加倍給賞曰恩俸其數與正俸同敬録前後恩㫖於左雍正五年諭乾清門侍衛著照品級加給俸銀一倍米石不必加給嗣後凡令在乾清門行走之侍衛俱照此給與六年諭吏户兵刑工五部堂官今皆各殫厥職贊勷政治共相黽勉矢勤矢慎端方自持剔除情弊杜絶請託甚屬可嘉朕深許之夫大臣者果能亷潔自守其用度必不敷朕因國家政事資藉大臣之力而使之分心家計朕心不忍五部大臣内除差往外省署印外俸銀俸米著加倍給與其署理之大臣亦照此賞給若遇罰俸案件將朕分外所給之俸不必入議乾隆元年諭禮部堂官照五部堂官例給與雙俸又諭從前在京文員俸入未足供其日用時厪皇考聖懐是以雍正三年特㫖增添漢官俸米而各部堂官又加恩給與雙俸其餘大小各員原欲次第加恩俾得均沾渥澤今朕仰體皇考加恩臣工之意彷佛雙俸之例將在京大小文員俸銀加一倍賞給令其用度從容益得専心官守所給恩俸著自乾隆二年春季為始在京旗員養亷領侍衛内大臣嵗給養亷銀九百兩滿洲都統嵗給養亷銀七百兩䝉古都統漢軍都統前鋒統領䕶軍統領嵗各給養亷銀六百兩滿洲副都統步軍統領嵗各給養亷銀五百兩䝉古副都統漢軍副都統歩軍翼尉内大臣散秩大臣鑾儀使上駟院卿奉宸苑卿武備院卿嵗各給養亷銀四百兩㕘領嵗給養亷銀六十兩副㕘領前鋒侍衛印房官嵗各給養亷銀四十兩臣等謹案八旗官員養亷之設自雍正五年奉諭將兩淮鹽課羡餘銀每旗賞給一千兩分撥都統副都統等員各有差又將兩浙鹽課餘銀賞給一萬兩分撥前鋒統領䕶軍統領等員各有差至乾隆十年奉特恩議定今制至八旗武大臣及官員俱給親兵隨糧另詳兵考兹不載在外文官俸銀直省大小文官俸銀俱照在京文官正俸按品支領乾隆元年諭舊例教職兩官同食一俸未免不敷著從乾隆元年春季為始照各官品級給與全俸永著為令臣等謹案初制於順治四年定在外文職按品支俸外復給薪銀蔬菜燭炭銀心紅紙張銀案衣什物銀四項自督撫至佐貳雜職各有等差嵗為常額嗣於順治九年裁案衣什物銀十三年裁薪銀康熙九年裁心紅紙張銀在外武職俸薪正一品嵗給俸銀九十五兩從一品嵗給俸銀八十一兩各有竒薪銀各一百四十四兩正二品嵗給俸銀六十七兩從二品嵗給俸銀五十三兩各有竒薪銀與一品同正從三品嵗給俸銀三十九兩有竒薪銀一百二十兩正從四品嵗給俸銀二十七兩有竒薪銀七十七兩正從五品嵗給俸銀一十八兩有竒薪銀四十八兩正從六品嵗給俸銀一十四兩有竒薪銀三十二兩正從七品嵗給俸銀一十二兩有竒薪銀與六品同臣等謹案緑旗武職自順治五年定俸薪之外復給蔬菜燭炭銀心紅紙張銀案衣什物銀俱按品有差詳在㑹典至於武職定品不一故支領俸薪亦時有異同初制在外武官給俸至五品止其營千總把總止支廪給銀康熙元年定千總六品把總七品初制都司支三品俸薪守備支四品俸薪康熙二十五年改都司正四品守備正五品俱按品支俸至乾隆十八年議定緑旗營武職向係照銜食俸今既將小銜刪除則自提督以至守備所食俸銀自當一例更定應將提督定為從一品食俸八十一兩六錢總兵官定為二品食俸六十七兩五錢各有竒其副將以下各官俱照品給俸如額直省文職養亷臣等謹案養亷之設自各省耗羡存公以備公用即其贏餘定為各官養亷雍正二年山西巡撫諾岷始行之嗣後各省大吏俱奏請仿效其法䝉世宗憲皇帝次第允行盖以外官事務較繁故於俸薪常額之外酌給養亷明立規制使不得需索以擾民逮我皇上御極之初復増定佐雜各官養亷其制尤為大備俾直省羣工顧名思義大法小亷誠不易之善則也今恭録恩諭於左仰見我國家加惠臣工及杜止貪墨之至意若夫酌耗羡之多寡分差務之繁簡同一省而官有等差同一官而數有等差自督撫司道以至佐貳雜職為數遞減不等皆核其籍於户部兹不具載雍正六年諭曰錢糧之加耗羡原非應有之項朕勤求治理愛養黎民本欲將此悉行禁革而博採輿論留心體訪知州縣地方官實有萬不得已公私兩項之用度若全革耗羡其勢必不可行為有司者果能減輕收納不苛取於民在民亦所樂從此耗羡所以未盡裁革之故也州縣既有耗羡而上司官員無以養亷勢不得不收州縣之餽送是上司冒貪贓之罪以為日用之資在謹慎小心者則畏懼而不敢行必至過於窘迫而貪取濫用者又因無所限制借規禮之名恣意横索弊端種種州縣公私之用既有不敷必致加派巧取為害於民况上司既收屬員之規禮則必有瞻顧回䕶之處而下屬反得操上司之短長於察吏之道大有關係所以雍正二年間山西巡撫諾岷請以通省耗羡提解存公將闔省公事之費及上司下屬養亷之需咸取於此上不誤公下不累民無偏多偏少之弊無苛索横征之擾實通權逹變之善策朕是以降㫖允行此提解火耗之所由來也向來山西虧空之員革職留任以為彌補之計夫以不肖之徒令其留任還帑是以虧空為䕶官之符不但無益於國計亦且有害於民生而德音在任又借彌補虧空之名提火耗以肥私櫜及諾岷接任潔已奉公實心辦理將虧空劣員悉㕘革州縣火耗嚴行裁減而酌留羡餘以補無著之虧空既不累及於閭閻而有司亦免㕘罰又為官員定養亷之資為公事留辦理之費諾岷此舉為國計民生上下公私均有裨益然伊當始行之時不但晉省屬員怨望而内外臣工皆有異詞朕比時降㫖曰此事惟如諾岷之督撫方能行之耳葢朕之意原聽各省督撫自為之而至於不能行之督撫不便行之地方則朕並未强之使行也諾岷舉行之後隨有數省倣傚其意提解十分中之二三以備公用亦以地方公務繁多若不預為計畫則一時需費仍至累及小民然此亦皆督撫自行奏請者非由朕諭也伊都拉接諾岷之任曾奏稱山西虧空漸次清楚將來耗羡便可充餉朕嚴切訓飭曰本地之羡餘只應作本地之用度若歸公充餉斷無是理且恐相沿日久遂成公項不肖官員竟有重複徵收之事矣田文鏡亦曾奏稱豫省虧空彌補已清火耗尚有贏餘等語朕批示之曰此項耗羡原係豫省官民之物假使果有贏餘則當增添官員養亷之資使其用度寛裕倘再有贏餘則當再減民間火耗之數使其儲蓄充贏葢朕之准其提解耗羡者原為愛養官民之苦心若以支給地方公用之外尚有餘資即請收作公項朕必不為也今魏廷珍又以上江提解火耗之事具摺陳奏恐外人不知以為出自朕意故特頒此㫖明白曉諭盖提解火耗之舉若行之果善亦督撫分内之事不得居功倘行之不善實足為伊身家性命之患無所逃罪總在伊等自行度量其願行者朕不拒阻其不願者朕亦不强也乾隆元年諭曰聞江南佐雜等官向來未議養亷該省事務繁多差遣絡繹倍於他省微員俸少力薄未免衣食維艱查江蘇有不充餉之鹽規銀兩安徽司庫有存公耗羡銀兩著總督趙宏恩巡撫顧琮趙國麟公同查核仿照江西湖廣之例酌定數目每年賞給以為養亷示朕體恤㣲員之至意二年諭曰向來浙江等省佐雜㣲員未曾議給養亷朕聞江南地方事務頗煩差遣絡繹已於上年特頒諭㫖賞給養亷以資日用今思浙省事務差遣亦屬繁多微員等俸少力薄所當一體加恩著將應給各官查照江南之例從乾隆二年為始五十年奉諭各省州縣官於耗羡内有自行動支抵算養亷者耗羡歸公原為各官養亷之費但官員自收自支其中恐滋影射冒混情弊此後應一併禁止令儘數解司後再行由司庫動支給發以杜弊混並令該督撫於年終分晰報部查核臣等謹案耗羡自雍正年間清釐之後用給各官養亷即禄以馭富之良法也我皇上加意整頓優厚臣工務俾儘數報解動支實於常法之中更寓防弊之道近又因在京官員非如外任養亷優厚者可比是以向於俸銀之外兼支俸米特降恩㫖凡有降級革職留任者止將俸銀分别停減其應得俸米仍准照原品支領因奉行在五十一年以後謹附識禄糈條仰見我國家匪頒之制所以勸勵官聨者至優且渥云武職禄糈十年户部奉特㫖賞給八旗大臣官員養亷嵗支銀八萬六千兩計領侍衛内大臣九百兩八旗滿洲都統七百兩前鋒䕶軍統領䝉古漢軍都統各六百兩歩軍統領滿洲副都統内務府總管各五百兩内大臣散秩大臣䝉古漢軍副都統兩翼翼尉内府三旗統領内務府奉宸苑上駟武備院卿各四百兩健銳火器營翼長圍塲總管各二百兩圍塲翼長一百兩其自八旗滿洲䝉古漢軍各㕘領印務章京圓明園三旗各㕘領八旗䕶軍各㕘領兩翼前鋒㕘領侍衛健銳火器營營總㕘領八旗察哈爾總管等官每年俱按大臣養亷支剰銀兩儘數分給四十六年奉諭向來各省提鎮以下至將弁等俱有分扣兵丁名糧作為得項者此例定自何年其每員應得若干係何名目各省是否一例按照地方情形品級大小酌定數目多寡又或各省參差不同著交各該部將定例年月及現在款項數目分晰查明分單具奏至此事因循已久恐又於定數之外私自尅扣增添者若每員任内私扣一名後任積漸加增侵扣無所底止督撫姑息不加查察久之即為虚額空糧之弊尤不可不徹底清查著傳諭各督撫將各省提鎮以下武職現在分扣名糧實數及有無私添之處查明據實具奏又奉諭國家設兵衛民簡核軍實期於營伍整齊兵額充足如兵丁等紅白事件從前設有生息惠濟銀兩以資賞恤後因生息名色有闗國體特飭停止昨陜甘添兵案内籌及賞恤聲請酌復恵濟銀兩朕以國家賞兵之費藉商生息支給究屬非宜已傳諭令其動用正項開銷各省兵丁紅白銀兩原係加恵行伍格外施恩若因此裁扣口糧致額不足殊非核實行伍之道所有各省營賞恤兵丁紅白銀兩自乾隆四十七年為始俱著於正項支給造冊報部核銷至各省提鎮以下武職員弁俱有應得坐糧馬乾等項令軍機大臣會同該部核辦照文員之例議給養亷其所扣兵餉即可挑補實額核計添給養亷嵗支亦及二百萬兩官員既無拮据而各省又添兵力於行伍大有裨益所有辦理添補兵額紅白賞恤銀兩及名糧裁添養亷縁由明晰曉諭中外知之嗣據直省各將武職應得養亷名糧數目陸續具奏經户部酌核章程統歸畫一以垂永久按各武職品級大小通同比較定額提督每員給飬亷銀二千兩總兵一千五百兩副將八百兩𠫭將五百兩逰擊四百兩都司二百六十兩守備二百兩千總一百二十兩把總九十兩經制外委千把總毎員十八兩毎年照文職養亷例於耗羡項下動支又以在京巡捕五營員弁管轄地方處分較重並非省營専事操防者可比所有歩軍統領向係部旗大臣兼理應得養亷名糧銀八百八十兩照舊支給外其副將核給養亷銀九百兩𠫭將六百兩逰擊五百兩都司三百兩守備二百四十兩千總一百四十兩把總一百兩外委二十兩又以甘肅之烏嚕木齊等處雲南之騰越鎮龍陵協四川之崇化綏寧靖逺懋功撫邊五營或係新疆或在邊境亦與腹地情形逈異酌給甘肅省烏嚕木齊提督養亷銀二千八百兩伊犁巴里坤總兵各二千一百兩瑪納斯哈密副將各一千二百兩其㕘將各八百兩遊擊六百兩都司三百八十兩守備三百二十兩千總一百八十兩把總一百二十兩外委二十八兩雲南騰越鎮總兵一千六百兩龍陵協副將九百兩其遊撃四百五十兩都司三百兩守備二百二十兩千總一百四十兩把總一百兩外委二十二兩四川崇化等五營遊擊五百二十兩都司三百四十兩守備二百六十兩千總一百六十兩把總一百二十兩外委二十八兩通計直省大小員弁原扣名糧銀一百三十六萬八千四百七十六兩改給養亷銀一百三十二萬五千七百十六兩仍節省銀四萬有竒其雲南省之提督總兵福建省之臺灣鎮總兵舊有額外動支耗羡公件銀兩廣東水師各營舊有額外加增草乾銀兩一併刪除毋庸重給再各省緑營兵丁紅白賞恤銀兩既遵奉恩㫖動支正項所有各省原動用之裁扣節省各款應查明分别正閒款項另行提解及存為武職養亷支銷之用等因具題奉㫖依議雲南提督總兵及福建臺灣總兵或地當烟瘴或逺隔重洋均與腹地不同著加恩於議給養亷外雲南提督加賞銀五百兩雲南總兵及福建臺灣總兵各加賞銀二百兩以示朕軫念巖疆加恵戎行之至意著為令皇朝文獻通考卷九十
