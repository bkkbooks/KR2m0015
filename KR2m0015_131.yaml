body:
  text: 欽定四庫全書皇朝文獻通考卷一百三十一王禮考七上尊號徽號臣等謹按帝王踐阼之始尊崇母后帝母稱皇太后祖母稱太皇太后漢時設立官屬或因所居宫為號如長樂長信之類是也宋天聖中始上皇太后應元崇德仁夀慈聖之號遼金元明皆有上徽號儀馬氏以上尊號禮儀附見帝系考今從王圻續考之例載入王禮考伏惟列聖以孝治天下奉事璇闈孝思誠至每遇大慶典則舉恭上徽號之儀孝莊文皇后於順治朝上徽號者四康熙朝加上徽號者五孝惠章皇后於康熙朝加上徽號者五孝康章皇后於康熙朝上徽號者一孝恭仁皇后於雍正朝上徽號者一皇上至孝至誠奉事聖母崇慶慈宣康惠敦和裕夀純禧恭懿安祺寧豫皇太后恭遇慶典晉上崇稱者凡九上稽前典下順輿情備極尊崇之隆禮若夫尊封太妃列代厥有故事國朝定制尊封太妃太嬪或遣官將事或至尊親自行禮悉據會典通禮所述儀注附列於後以垂億萬年之定制焉崇德八年世祖章皇帝嗣位尊聖母皇后為皇太后聖母為皇太后順治八年世祖章皇帝親政二月戊子恭上聖母皇太后徽號曰昭聖慈夀皇太后前期一日遣官祭告天地太廟社稷屆日設皇太后儀仗於宫中內院禮部官進宫設黃案於正中親王以下公以上俱朝服於午門內序立滿洲漢軍蒙古都統尚書子副都統侍郎等官在在翼門外序立文武百官在午門外排班鑾駕大樂全設皇太后册寶綵亭在左翼門內陳設世祖章皇帝出宫册寶綵亭起行內院禮部官前導駕詣皇太后宫王以下公以上進太和殿丹墀隨駕行册寶綵亭從左翼中門出侍立官皆跪候過隨駕行駕至皇太后宫門外降輦請皇太后升座皇太后具禮服升座册寶綵亭至宫門外止捧册寶官捧册寶由正中進宫內立於左側引禮官導駕進宫門內至拜位王以下公以上在宫大門限外序立都統尚書以下侍郎副都統以上在宫大門外序立鴻臚寺官奏跪世祖章皇帝率諸王衆官皆跪鴻臚寺官奏進册寶左側捧册寶官跪授册寶世祖章皇帝受册寶恭獻右側官跪接置於黃案上鴻臚寺官奏宣册寶宣讀官跪宣册寶訖鴻臚寺官奏叩頭世祖章皇帝率諸王衆官皆三跪九叩頭訖午門外侍立各官亦隨行三跪九叩頭禮鴻臚寺官奏禮畢皇太后還宫引禮官導世祖章皇帝還宫諸王衆官俱退次日御太和殿諸王率文武百官上表行慶賀禮固倫公主和碩福晉以下都統子尚書以上命婦詣皇太后宫行慶賀禮質明皇太后儀仗全設公主王妃以下一品命婦以上俱朝服齊集於皇太后宫門外分翼排立隨從皇太后女官先進宫內於皇太后前行禮次公主王妃等及大臣命婦皆進宫門內立內監奏請皇太后升座皇太后禮服御內殿樂作升座樂止四女官引公主王妃等及大臣命婦前進行六肅三跪三叩禮畢皇太后還宫命公主王妃等及大臣命婦俱進宫內賜茶畢衆皆出是日頒詔天下詔曰帝王統御寰區撫綏億兆莫不正名彰德致隆於所生乃仁孝之至情尊養之彞憲也欽惟我聖母協贊皇考勤修內則克諧宫壼以御於家邦誕育眇躬劬勞啓迪纘承洪緒混一多方揆厥本原實惟聖庇王公臣庶咸謂宜崇上尊號以孚中外之心協古今之禮察兹公議允愜朕衷謹告天地太廟社稷於順治八年二月初十日率諸王貝勒文武羣臣恭奉册寶上尊號曰昭聖慈夀皇太后隆儀備舉愷澤覃敷於戲立愛惟親孝思不匱惟我聖母丕隆名夀於萬斯年王公臣庶偕兹大慶其各祇乃身裕乃心勤乃事敬迓天庥以共臻於郅理布告天下咸使聞知八月乙丑以大婚禮成加上昭聖慈夀皇太后徽號曰昭聖慈夀恭簡皇太后前期遣官祭告天地太廟社稷屆日世祖章皇帝御太和殿奉册寶率諸王貝勒文武大臣詣昭聖慈夀皇太后宫加上徽號行禮如儀次日御太和殿諸王貝勒文武羣臣上表行慶賀禮如儀皇后詣皇太后宫行慶賀禮質明皇太后儀仗全設公主等先齊集於皇太后宫隨從皇太后女官先於皇太后前行禮王妃郡主以下郡國輔國公夫人及民公都統子尚書等官命婦以上在在翼門外齊集候皇后升輿由太和殿中左門出至左翼門王妃等俱隨後至皇太后宫門外皇后降輿率王妃等進至門內奏請皇太后升座皇太后禮服御內殿樂作升座樂止皇后率公主王妃等前進四女官前引行六肅三跪三叩禮畢皇太后還宫樂作進宫樂止命皇后公主王妃郡主等大臣命婦進宫賜茶畢皇后出乘輿還宫王妃等及王大臣等婦隨至左翼門外候皇后進宫衆俱退是日頒詔天下詔曰朕惟帝王孝治天下尊養隆備鴻章顯號因事有加乃人子之至情古今之通義也朕丕承大命奄有萬方揆厥所由實承懿訓至於玉成兹為朕慎擇淑配端範宫闈嘉禮之始深惟聖母洪慈靡極是以參稽典禮合布歡心謹告天地太廟社稷於順治八年八月二十日率諸王貝勒文武羣臣恭奉册寶加上聖母昭聖慈夀皇太后尊號曰昭聖慈夀恭簡皇太后允協羣情覃敷愷澤所有恩宥事宜條列於後布告天下咸使聞知十一年六月己卯以大婚禮成加上昭聖慈夀恭簡皇太后徽號曰昭聖慈夀恭簡安懿皇太后前期一日遣官祭告天地太廟社稷屆日世祖章皇帝恭奉册寶率諸王貝勒文武羣臣詣昭聖慈夀恭簡皇太后宫加上徽號行禮如儀次日御太和殿諸王貝勒文武羣臣上表行慶賀禮頒詔天下詔曰在昔成周閨門敦睦治化翔洽祈天永命以克昌厥世皆文母之德也朕以涼薄纘承祖宗丕緒統御海內賴我聖母昭聖慈夀恭簡皇太后恩勤誨迪是訓是行十有一年於茲矣深惟風教之源始於宫壼遴求淑德作配朕躬嘉禮既成慈徽益著宜晉尊崇𢎞彰聖善謹擇順治十一年六月二十一日之吉祗告天地太廟社稷率諸王貝勒文武羣臣恭奉册寶加上聖母尊號曰昭聖慈夀恭簡安懿皇太后名夀克全於大德尊親覃慶于多方所有恩赦事宜開列於後布告天下咸使聞知十三年十二月丁酉以册封皇貴妃禮成加上昭聖慈夀恭簡安懿皇太后徽號曰昭聖慈夀恭簡安懿章慶皇太后前期一日遣官祭告天地太廟社稷世祖章皇帝禮服詣皇太后宫恭上奏書屆日世祖章皇帝恭奉册寶率諸王大臣詣昭聖慈夀恭簡安懿皇太后宫加上徽號行禮如儀次日以恭上皇太后徽號禮成諸王羣臣及公主福晉併命婦等行慶賀禮頒詔天下詔曰自古帝王統御天下首重尊親故嘉禮告成必晉崇顯號推厥𢎞澤洽於四海所以廣孝思昭錫類之仁甚盛典也朕承聖母昭聖慈夀恭簡安懿皇太后慈訓撫輯萬方於今踰紀兹更遴選賢淑俾佐壼教弼成內治仰惟至德髙厚難酬非藉鴻稱曷申孝悃是用祗告天地宗廟社稷於十二月二十四日率諸王貝勒文武羣臣恭奉册寶加上聖母尊號曰昭聖慈夀恭簡安懿章慶皇太后隆儀爰舉湛惠斯覃所有應行事宜條列於後布告天下咸使聞知康熙元年十月癸卯加上聖祖母太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠太皇太后恭上母后皇太后徽號曰仁憲皇太后恭上聖母皇太后徽號曰慈和皇太后前期遣官祗告天地太廟社稷是日黎明直班內大臣侍衛內院禮部官俱朝服齊集設太皇太后兩宫皇太后册寶綵亭六座校尉舉亭內院禮部官前引太皇太后册寶綵亭至太和殿正中陳設仁憲皇太后册寶綵亭設於東旁慈和皇太后册寶綵亭設於西旁俱稍後陳設畢禮部官奏聞聖祖仁皇帝禮服升殿閲册寶畢內院禮部官導綵亭次第先行乘輿隨後內大臣侍衛各官隨駕出右翼門至太皇太后宫門外降輿捧册寶官從綵亭內捧太皇太后册寶進宫置黃案上禮部官恭導聖祖仁皇帝於丹陛正中跪大學士捧册寶跪進聖祖仁皇帝受册寶次第恭獻乃上奏書畢大學士依次跪接仍置各案上女官舉册寶案進宫畢聖祖仁皇帝出升輿率內大臣侍衛內院禮部官至仁憲皇太后宫進獻册寶上奏書如前儀次至慈和皇太后宫進獻册寶上奏書如前儀是日太皇太后兩宫皇太后皇帝鹵簿儀仗俱不設免諸王大臣官員朝賀次日頒詔天下詔曰朕惟自古帝王統御寰區首崇孝治溯宫闈之世德備尊養之彝章隆號推尊甚盛典也欽惟我聖祖母昭聖慈夀恭簡安懿章慶皇太后佐皇祖太宗文皇帝肇建丕基啓皇考世祖章皇帝宅中定鼎母后皇后克嗣徽音母儀四海母后溫恭淑惠誕育藐躬朕嗣纘鴻圖並承慈訓仰惟恩德愛戴彌殷爰稽古今之典儀用協臣庶之誠悃謹告天地宗廟社稷於康熙元年十月初三日率諸王貝勒文武羣臣恭奉册寶上聖祖母皇太后尊號曰昭聖慈夀恭簡安懿章慶敦惠太皇太后母后皇后尊號曰仁憲皇太后母后尊號曰慈和皇太后盛典告成爰頒恩賚於戲詒孫翼子綿介祉於千秋大德顯名合歡心於六宇布告天下咸使聞知戊申禮部題尊上太皇太后仁憲皇太后慈和皇太后尊號大禮既成詔告天下各藩王併直隸各省文武官五品以上諸司例應齎進慶賀表文嗣後凡遇元旦聖夀冬至各進表入賀得旨是四年九月戊申大婚禮成加上昭聖慈夀恭簡安懿章慶敦惠太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠溫莊太皇太后加上仁憲皇太后徽號曰仁憲恪順皇太后前期一日上太皇太后皇太后奏書質明太皇太后皇太后儀仗全設宫門前禮部鴻臚寺堂官預赴太皇太后皇太后宫各設黃案一於宫前丹陛正中又設黃案一於隆宗門外又設黃案一於中和殿內正中大學士捧奏書置匣內由中道之左至中和殿案前設太皇太后奏書匣於正中皇太后奏書匣於東旁稍後預捧奏書出匣陳設畢禮部堂官奏請聖祖仁皇帝具禮服升殿至案前北面立閲奏書畢仍置匣內大學士二員捧奏書禮部堂官導引前行駕升輿由右翼門出皇太后奏書暫設於隆宗門外案上駕至永康左門外降輿禮部堂官導引捧奏書大學士前行由慈寧門之中階入至中門西旁東向立禮部堂官導駕由東旁上階至丹陛上東旁立禮部堂官傳內監奏請太皇太后升座太皇太后禮服御內殿樂作升座樂止大學士捧奏書進丹陛上東旁立禮部堂官導駕詣正中拜位立鳴贊官奏跪聖祖仁皇帝跪大學士二員一員捧奏書跪於在一員跪祗候於右聖祖仁皇帝受奏書恭獻授右旁大學士接置正中案上鳴贊官奏宣奏書宣讀官由案上捧起跪宣訖仍置案上鳴奏官奏叩興樂作聖祖仁皇帝行三跪九叩首禮樂止鳴贊官奏禮畢禮部堂官導駕還東旁立內監奏請太皇太后還宫樂作進宫樂止駕出升輿詣皇太后宫行禮禮部堂官導捧奏書大學士前行至夀昌門西旁東向立聖祖仁皇帝獻奏書行禮一應儀注俱與太皇太后前行禮同禮畢駕還宫至日禮部鴻臚寺堂官預赴太皇太后宫皇太后宫各設黃案一於宫前丹陛正中又各設黃案一於左旁又各設黃案一於門正中太皇太后皇太后儀仗全設於宫門前設大駕鹵簿於太和門前王以下入八分公以上俱朝服於常朝處齊集未入八分公以下鎮國將軍以上內大臣侍衛都統子滿漢大學士尚書等官俱朝服於熙和門外齊集文武各官俱朝服于午門外齊集內閣禮部堂官設册寶綵亭四座校尉舉亭自內閣起由中路至太和門內設太皇太后册寶綵亭于正中設皇太后册寶綵亭于東旁稍後鴻臚寺官引王以下入八分公以上至太和門丹墀分翼排立禮部堂官奏請聖祖仁皇帝具禮服鳴鐘鼓御太和殿閲册寶畢內閣禮部堂官捧置亭內校尉舉亭次第前行駕升輿禮部堂官前導詣太皇太后宫作中和樂王貝勒貝子公等隨後行至熙和門齊集諸大臣侍衛跪候駕過隨行至永康左門皇太后册寶綵亭二座以次各暫設於隆宗門外少