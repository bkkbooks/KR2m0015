太后宫行慶賀禮質明公主王妃以下縣君鎮國將軍夫人以上民公侯伯都統子內大臣大學士尚書等官命婦以上俱朝服在永康右門齊集其引禮前引後隨大臣命婦俱朝服在右翼門齊集禮部引至隆宗門禮部堂官傳內監奏請皇貴妃等詣太皇太后宫行禮皇貴妃貴妃諸妃禮服升輿依次出隆宗門赴慈寧宫其引禮大臣命婦前導公主王妃以下大臣命婦等隨至永康左門降輿入慈寧門內丹陛上西旁立引禮命婦傳內監奏請太皇太后升座太皇太后禮服御內殿樂作升座樂止皇貴妃等前進皇貴妃在左貴妃在右諸妃分左右立稍後率公主王妃以下大臣命婦依次排立行六肅三跪三叩禮樂作禮畢樂止皇貴妃等復原位立內監奏請太皇太后還宫樂作進宫樂止皇貴妃等出宫乘輿引禮命婦前導赴皇太后宫行禮與太皇太后行禮同禮畢皇貴妃等還宫公主王妃以下大臣命婦等皆退是日頒詔天下詔曰朕惟帝皇纘承鴻緒首重尊親顯號洊加彞章具在矧式遏禍亂耆定厥功實稟誨育之恩應極尊崇之典比者逆賊吳三桂反叛煽動多方朕夙夜靡寧肆張天討仰惟聖祖母昭聖慈夀恭簡安懿章慶敦惠溫莊康和仁宣太皇太后聖母仁憲恪順誠惠純淑皇太后懿訓次第翦滅克奏蕩平上慰宗廟之靈下拯生民之厄非藉慈庇曷克臻此兹用晉休稱載揚盛德謹告天地宗廟社稷於康熙二十年十二月二十四日率諸王貝勒文武羣臣恭奉册寶加上聖祖母昭聖慈夀恭簡安懿章慶敦惠溫莊康和仁宣太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠溫莊康和仁宣𢎞靖太皇太后聖母仁憲恪順誠惠純淑皇太后徽號曰仁憲恪順誠惠純淑端禧皇太后禮既備於兩宫澤宜敷于四海於戲慶洽宫闈聿展因心之孝恩覃中外丕昭錫類之仁布告天下咸使聞知三十六年七月以朔漠平定請加上仁憲恪順誠惠純淑端禧皇太后徽號懿旨不允是日癸未大學士等擬尊上皇太后夀康顯寧徽號聖祖仁皇帝命滿大學士等奏知皇太后皇太后不允上復令大學士奏請奉皇太后懿旨皇帝懋建宏勳豫不勝欣悅際此昌期豫心慰矣尊加徽號向雖有例並非斷不可已者著停止豫心始安大學士等回奏上命大學士集議甲申大學士等復奏請皇太后皇太后諭曰皇帝既不受尊號這加徽號不必行大學士等乃議言皇太后不受徽號懿旨已經三頒相應謹遵懿旨上從之六十一年十一月世宗憲皇帝嗣位尊聖母為皇太后恭上徽號曰仁夀皇太后是月辛丑世宗憲皇帝諭禮部朕惟君國之道必崇孝理化民之本務重尊親欽惟我聖母仁承天德順協坤儀恭儉溫慈懋昭淑範恩勤顧復誕育藐躬朕纘荷鴻圖恭承懿訓顯揚聖善儀典宜隆式考舊章恭上皇太后尊號爾部詳察典禮具奏十二月乙卯禮部奏恭上皇太后尊號禮儀奉皇太后懿旨豫自幼入宫蒙大行皇帝深恩備位妃列幾五十年雖夙夜小心勤修內職未能圖報萬一龍馭升遐即欲相從皇帝再三諫阻情詞懇至勉慰其心未伸豫志今諸王大臣援引舊典請上尊稱此時梓宫大事正在舉行凄切哀衷何暇他及尊崇典禮實非豫心所安况豫戒慎居心謙沖訓子但願豫子體先帝之心永保令名諸王大臣體先帝之心各抒忠悃則兆民胥賴海宇蒙休豫躬大有光榮勝於受尊稱逺矣諸王大臣復叩請再三始蒙慈允禮部衙門恭擬上徽號曰仁夀皇太后製造册寶儀仗於雍正元年聖祖山陵事畢之後諏吉舉行典禮從之雍正十三年九月皇上御極尊聖母為皇太后十二月戊寅恭上聖母皇太后徽號曰崇慶皇太后先是九月壬寅諭禮部朕惟致治之本孝道為先尊養之隆鴻稱首重欽惟皇太后順德承天坤元應地溫恭慈惠懋著徽音誕育朕躬恩深鞠育兹者母儀萬國福履茂膺當申顯懿之隆名以展尊崇之巨典爾部詳察典禮具奏大學士等恭擬徽號曰崇慶皇太后諏吉上躬進册寶行禮前期一日遣官各一人祭告天地太廟後殿奉先殿社稷其日恭上皇太后奏書所司設皇太后儀駕陳樂懸設黃案於慈寧門正中又設案於中和殿陳奏書於案上上禮服御中和殿北向立祗閲奏書大學士捧奏書先行上乘輿從至永康左門外降輿入立於慈寧門東皇太后升慈寧宫座上詣案前跪恭獻奏書陳於案宣讀官奉奏書北面跪宣訖上行三跪九叩禮禮成復位立皇太后還宫乃退至是日陳鹵簿樂懸設皇太后儀駕樂懸設黃案於太和殿內陳册寶於案上設册寶亭於黃案左右上禮服御殿閲册寶畢奉册寶官安於亭內鑾儀校舁行上升輿從至永康左門外降輿入立於慈寧門東奉册寶官陳册寶於黃案皇太后升慈寧宫座上詣拜位跪恭獻册寶次宣讀官宣册文寶文畢內監捧册寶案由中門入陳於慈寧門外正中上行三跪九叩禮王公百官皆隨行禮禮畢皇太后還宫乃退是日皇后率貴妃妃嬪及公主王妃大臣命婦詣慈寧宫慶賀行禮如儀次日頒詔天下不御殿受賀詔曰朕惟自古帝王膺圖御宇溯風化之有基教由慈壼展顯揚之夙志禮重隆稱堯母紀美於陶唐太姒表徽於姬室彝倫巨典熙代鴻規欽惟聖母皇太后德協乾元恩侔坤厚溫恭秉性聿彰藹吉之音儉約持躬並贊肅雍之化奉庭闈而篤孝孚鑒天心居宫掖以宣勤恪襄內治佐我皇考重華之盛烈啓豫國家奕葉之休嘉誕育藐躬備勞撫鞠恩施覃厚推仁惠以垂謨牖迪維周本詩書而示訓疇昔感深母教長黽勉於一心今兹仰答慈徽共尊親者萬國矧升平之永慶喜福祉之懋膺億兆嵩呼近依殿陛梯航雲集逺貢共球用抒臣子之誠敬效尊隆之典禮儀具肅咨考僉同祇告天地宗廟社稷於雍正十三年十二月十三日率諸王貝勒大臣文武羣臣謹奉册寶恭上皇太后尊號曰崇慶皇太后歡愈並洽於宫庭膏澤宜均於海宇於戲隆名丕峻銘琬琰以揚庥純嘏靡增溥垓埏而錫福布告天下咸使聞知乾隆二年十二月甲午以册立皇后禮成加上崇慶皇太后徽號曰崇慶慈宣皇太后先是十一月丁丑諭禮部朕惟王化攸基事先敦本典章有慶誼重尊親矧恩慈宜盡夫顯揚而崇號允符乎仁善欽惟聖母崇慶皇太后德涵愷悌功贊升平恭儉垂模壼掖咸欽內則肅雍成化邦家羣奉母儀福祿加綏臣黎共戴朕紹承丕緒恪秉彝章祗遵懿訓之頒爰定中宫之位念徽音之有嗣佑啓多方荷教育之時勤貽安奕祀用伸敬悃恭晉隆稱加上聖母皇太后徽號曰崇慶慈宣皇太后鴻名紀盛于瑶齋純嘏增輝於寶册寰輿式仰巨典宜昭其應行典禮爾部敬謹詳議具奏至是恭奉册寶加上徽號前期一日遣官祭告天地太廟後殿奉先殿社稷上詣慈寧宫恭進奏書至日上率王公大臣詣皇太后宫躬進册寶行禮畢皇后率貴妃妃嬪以下詣皇太后宫行慶賀禮如儀次日上御太和殿王公百官進表行慶賀禮頒詔天下詔曰朕惟禮隆報本感慈德而難名誼重崇親遇慶儀而倍篤瞻肅雍之令範式嗣徽音念啓佑之多方永貽燕翼榮稱宜晉彝典維昭欽惟聖母崇慶皇太后合撰乾元應符坤極宣勞贊治和恆同四海之風敦儉持躬仁讓溥六宫之教當夫藐躬誕育備荷恩勤逮夫大業丕承每殷牖迪錫福多而兆民賴貽謀逺而萬國寧極尊養之兼隆殫敷揚而莫罄兹承慈訓爰立中宫政治修明清寧協應效敬承於夏啓塗山之烈彌彰衍昌熾於姬宗太姒之謨聿著敬加懿號用洽輿情祗告天地宗廟社稷於乾隆二年十二月十一日率諸王貝勒大臣文武羣臣恭奉册寶加上崇慶皇太后徽號曰崇慶慈宣皇太后炳嘉名於宫掖推錫類於臣黎於戲寶牒揚庥奕葉被春暉之照瑶階志忭寰區沾闓澤之施布告天下咸使聞知十四年四月乙酉以金川平定册立攝六宫事皇貴妃禮成加上崇慶慈宣皇太后徽號曰崇慶慈宣康惠皇太后先是二月癸卯諭禮部朕惟君臨天下隆儀首重乎尊親化起宫庭盛世莫先於崇孝矧膚功之克奏悉藉慈徽而吉日之方諏適逢嘉慶歡心允洽茂典宜遵欽惟聖母崇慶慈宣皇太后德範光昭恩暉廣被升平贊化欽壼則之宏敷教育垂仁仰母儀之懋著頃金川鞠旅運籌殫宵旰之勞每玊戺承顔啓迪荷再三之訓遂得蠻氛綏靖喜邊徼之永寧從此海宇乂安遍蒸黎而蒙福且萬里成功之日正中宫協吉之期覩嘉祉之駢臻沐鴻慈之普庇敬展顯揚之悃用伸歸美之誠加上聖母皇太后徽號曰崇慶慈宣康惠皇太后輝增寶册純禧茂集於萱幃慶溢寰輿景福常凝於蘭殿式崇顯號聿舉彝章其應行典禮爾部敬謹詳議具奏至是恭奉册寶加上徽號前期一日遣官告祭天地太廟後殿奉先殿社稷上詣皇太后宫恭上奏書至日上御太和殿閲册寶率王公大臣詣皇太后宫恭上册寶行禮次日上詣皇太后宫率王公大臣行慶賀禮百官於午門外隨行禮次皇貴妃率貴妃妃嬪公主王妃命婦詣皇太后宫行慶賀禮上御太和殿王公文武羣臣上表慶賀行禮均如儀頒詔天下詔曰帝王恭膺景命寅紹丕基內正家邦外寧邊境起宫庭之雅化播海宇之休風必原垂裕之隆以著懋昭之盛所以顯親教孝榮號歸尊載考前徽實多慶典欽惟聖母崇慶慈宣皇太后仁垂教育德普生成啓泰運以貽謀體坤儀而立極頃以中宫虛位內佐需人乃眷柔嘉俾宏繼體嫻貴妃那拉氏禔躬淑慎秉性端莊克承慈顧之恩允協順成之義雖正位之禮尚待於三年而統攝之儀當循乎往制於乾隆十四年四月初五日册命那拉氏為皇貴妃攝六宫事問安蘭殿表範椒塗永敬奉乎徽音以穆宣乎壼政至於遐荒綏靖中外乂安丕承不戰之功益荷無疆之庇方當元勳專閫嘉勇略之宏抒禁旅揚威奏先聲之大振審機宜於宵旰時切憂勤承慈誨於再三深蒙訓迪仰體好生之念用開祝網之恩金川土酋莎羅奔狼卡等稽首來降革心效順兵戎載戢蠻服敉寧淳化殷流太和翔洽凡此嘉祥之並集實惟佑啓之多方宜晉鴻稱以彰盛德謹告天地宗廟社稷於乾隆十四年四月初八日率王公文武羣臣恭捧册寶加上聖母崇慶慈宣皇太后徽號曰崇慶慈宣康惠皇太后尊養兼隆彌衍鴻圖之瑞顯揚共戴永昭燕翼之祥盛典聿光湛恩用溥於戲廣聖慈而錫福萬邦共樂乎升平昭德範以承庥四海覃敷乎愷澤布告天下咸使聞知十五年八月癸酉以册立皇后禮成加上聖母崇慶慈宣康惠皇太后徽號曰崇慶慈宣康惠敦和皇太后先是七月丙辰諭禮部朕惟王化本於尊親盛治必先崇禮矧徽音之有嗣佑啓多方仰至德之難名顯揚曷罄欽惟聖母崇慶慈宣康惠皇太后恩覃海宇化洽宫庭慈範宏昭普萬民而錫福母儀懋著綿百世以延禧朕虔秉彝章躬承懿旨爰定中宫之位聿隆繼册之儀當兹吉禮之既成悉荷聖慈之垂裕用伸誠悃恭晉隆稱敬加上聖母皇太后徽號曰崇慶慈宣康惠敦和皇太后綏茀祿於璇宫鴻名紀盛耀光華於寶册燕喜增輝巨典攸昭寰輿共戴其應行典禮爾部敬謹詳議具奏至是恭奉册寶加上徽號前期一日遣官告祭天地太廟後殿奉先殿社稷上詣皇太后宫恭上奏書至日上御太和殿閲册寶率王公大臣詣皇太后宫恭進册寶行禮次日上詣皇太后宫率王公大臣進表行慶賀禮百官於午門外隨行禮次皇后率貴妃妃嬪公主王妃命婦詣皇太后宫行慶賀禮上御太和殿王公百官上表慶賀行禮次皇后率貴妃妃嬪於皇上前行禮次貴妃妃嬪公主王妃命婦於皇后前慶賀行禮是日頒詔天下詔曰朕惟君臨天下首重懿倫化洽邦家式資內助用協順承之義以符元吉之占佐政教于宫闈廣禔福於中外懋昭有自尊顯宜崇當嘉禮之觀成必隆儀之並舉徽章具在慶典彌光欽惟聖母崇慶慈宣康惠皇太后化啓鴻圖澤敷燕翼荷生成之大德蒙教育之深仁懿訓頻頒恩勤備至念中宫之虛位已循統攝之儀欣繼體之得人爰舉册立之典攝六宫事皇貴妃那拉氏孝謹性成溫恭素著嬪嬙效職壼政茂宣允克紹嗣徽音欽承慈顧是用仰遵成命俾正坤儀祗告天地宗廟社稷於乾隆十五年八月初二日册立攝六宫事皇貴妃那拉氏為皇后承歡蘭殿表範椒塗勷孝治於朕躬覃仁風於海宇天庥茂集德教彌昭慶祉方臻鴻稱遹駿謹於乾隆十五年八月初三日率王公文武羣臣恭捧册寶加上聖母崇慶慈宣康惠皇太后徽號曰崇慶慈宣康惠敦和皇太后丕著尊親之禮聿端王化之源人紀肇修篤純禧而有永顯揚曷罄綿景福以無疆特沛湛恩以彰巨典於戲播宫庭之雅化益洪垂裕之謀衍奕祀之嘉祥彌啓升平之運布告天下咸使聞知皇朝文獻通考卷一百三十一
