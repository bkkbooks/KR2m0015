body:
  text: 田賦考凡十二卷卷一至卷十二錢幣考凡六卷卷十三至卷十八户口考凡二卷卷十九至卷二十職役考凡五卷卷二十一至卷二十五征𣙜考凡六卷卷二十六至卷三十一市糴考凡六卷卷三十二至卷三十七土貢考凡一卷卷三十八國用考凡八卷卷三十九至卷四十六選舉考凡十六卷卷四十七至卷六十二學校考凡十四卷卷六十三至卷七十六職官考凡十四卷卷七十七至卷九十郊社考凡十四卷卷九十一至卷一百四羣祀考凡二卷卷一百五至卷一百六宗廟考凡十二卷卷一百七至卷一百十八羣廟考凡六卷卷一百十九至卷一百二十四王禮考凡三十卷卷一百二十五至卷一百五十四樂考凡二十四卷卷一百五十五至卷一百七十八兵考凡十六卷卷一百七十九至卷一百九十四刑考凡十六卷卷一百九十五至卷二百十經籍考凡二十八卷卷二百十一至卷二百三十八帝系考凡七卷卷二百三十九至卷二百四十五封建考凡十卷卷二百四十六至卷二百五十五象緯考凡十二卷卷二百五十六至卷二百六十七物異考凡一卷卷二百六十八輿地考凡二十四卷卷二百六十九至卷二百九十二四裔考凡八卷卷二百九十三至卷三百臣等謹按皇朝通考三百卷乾隆十二年奉勅撰初與續文獻通考共為一編乾隆二十六年以前朝舊事例用平書而述昭代之典章録列朝之詔諭尊稱鴻號禮應敬謹抬行體例迥殊難于畫一遂命自開國以後自為一書其續通典續通志皆古今分帙即用此書之例也其二十四門初亦仍馬氏之目嗣以宗廟考中用馬氏舊例附録羣廟因而載入勅建諸祠仰䝉睿鑒周詳綸音訓示申明禮制釐定典章載筆諸臣始共知尊卑有分名實難淆恍然于踵謬沿訛之失乃恪遵諭㫖分立羣廟一門又推廣義例於郊社門内分羣祀一門増為二十六門其子目於田賦増八旗田制錢幣増銀色銀直及回部普兒户口増八旗壯丁土貢増外藩學校増八旗官學宗廟増安奉聖容之禮封建増䝉古王公皆遵今制所有而加於市糴刪均輸和買和糴選舉刪童子科兵考刪車戰皆以今制所無而省在馬考所叙宋事雖以世家遺䕃多識舊聞然計其編摩實在入元以後故典章放失疎略不詳今則聖聖相承功成文煥實録記注具録于史官公牘奏章全掌于籍氏毎事皆尋源竟委賅括無遺故卷帙繁富與馬氏原本相埒夫尚書兼陳四代而周書為多禮記亦兼述三王而周禮尤備葢監殷監夏百度修明文獻足徴蒐羅自廣有不必求博而自博者矣皇朝文獻通考總目欽定四庫全書皇朝文獻通考凡例一是編恭載國朝體國經野規模宏逺列聖奎章宸翰照耀簡編皇上聖訓及御製詩文凡有闗典章政治悉依類備書冠於各篇之首用示典則昭垂為萬代致治保邦之成式一我朝田賦之制自世祖章皇帝除明季加派之弊定賦役全書嗣是列聖相承勤恤民隠蠲浮賦慎丈量所定科則至詳至當至八旗王公以下各有莊屯田地其圈揆之制交糧之額載在㑹典謹備書以彰昭代之洪規焉一自國家龍興東土創鑄錢文以資民用嗣是寳泉寳源之設輕重協宜圜函精好各省局鑪座或設或停隨時調劑邇者西陲底定復頒錢式於回部各城開鑄乾隆通寳錢俾荒服之氓咸昭法守按馬考叙錢幣以刀布為下則秦漢以後皮幣龜貝皆滯于行使兩宋兼用楮幣其制起於交子㑹子元明則沿用寳鈔國家錢貨充盈無藉鈔法之用故順治年間雖暫時行用旋即停止則有錢無幣實為我朝良法若白金之用始于漢武之白選六朝迄唐交廣之域兼用金銀金時鑄銀名承安寳貨此以銀為幣之始前明中葉始令税糧得収納白金其用益廣我朝銀錢兼權為上下通行之幣兹纂於銀色之高下銀直之輕重均按類備載一馬考户口一門備載厯代户口丁中賦役附以奴婢我國家初立編審法以稽人民之數後定為五年一舉丁増而賦亦隨之聖祖特頒恩詔自康熙五十年以後滋生人丁永不加賦其直省丁徭多寡不等沿明代之舊有分三等九則者有一條鞭徴者有丁隨地派者有丁隨丁派者後皆次第改隨地派俾無業之民永免催科之累至八旗壯丁日益繁庶編審之規載於㑹典謹備書以昭豐鎬之隆一續文獻通考内市糴考因宋元猶沿市易司平凖庫之遺是以仍依舊目編列今則通商恵工至周至悉並無所謂均輸和買和糴之事自合刪去舊目悉依昭代實政按年謹書較若畫一一外夷職貢馬考並未詳載我朝肇基東土徳威逺播漠南䝉古諸部歸附最先嗣是東至朝鮮西至畨藏朔南暨訖奔走偕來莫不測海占風享王畢至皇上布昭聖武用迪前光平定凖回兩部拓地二萬餘里並令嵗輸貢賦他若左右哈薩克東西布嚕特諸藩亦俱稽顙來朝奉表入貢邇者兩金川底定土司等分班入覲人無定員物無定額總期于厚往薄來綏靖邉隅實為亘古所未有兹纂於中土貢物謹遵户工兩部則例其需用物件悉由各直省地方官支欵置辦者具列于篇至外藩諸國梯航所屆効悃輸忱度越千古敬稽成例依類備陳以見大一統之治云一馬端臨選舉考内有童子科一門我朝人崇實學並無童子科之設無從載入謹刪除不列一我朝雅化作人首崇學校自宗室以逮八旗京邑以達直省下逮重譯要荒靡不漸仁摩義因地因人俾之講肄有業跅弛有禁至於明考校之條申衡取之例定制義之凖革沿襲之弊選教職以慎司訓頒經書以宏文教尚騎射繙譯以遵祖制飭監臣學臣及守土有司新士習以端化俗之本謨訓煌煌實足昭教思於無窮若夫臨雍講學重道尊師養老引年示民孝弟之意皆惟其實不惟其文則又列聖相承移風易俗逈非三代以下所可㡬及兹纂謹依馬考而變通其例用以徴教化之實云一是編宗廟考稿本於乾隆二十七年恭進奉上諭續文獻通考館纂進稿本朕閲宗廟考一門内附入致祀厯代帝王及本朝臣下家廟顧名思義於輯書體例何居葢既以宗廟冠部則惟太廟時祫典有専崇方稱經常不易至奉先殿之禮重家庭夀皇殿安佑宫永佑寺之䖍奉神御於宗廟考中敬從附載尚為不失禮以義起之文若摭入厯代及臣下非惟其制絶不相䝉揆之分門本義亦復何取即云承宋臣馬端臨原編舊式而往代儒生之識于大典未克折衷盡善類此者正復不少又豈得違禮而曲泥之朕意當于宗廟考専門備詳定制外其餘不應附入者别入羣廟考一門𨽻之俾名義既得所安而其書亦足垂逺館臣可録朕㫖並登卷中臣等恭繹諭㫖仰見皇上聖裁超越明禮辨分至當至精今敬遵訓示於宗廟考外别立羣廟考首載厯代帝王廟次厯代帝王陵次諸臣祠葢我列祖崇徳報功褒勲䘏節馨香溥薦典禮攸隆皇上特命以明恭閔恵皇帝入廟享祀近復敬體聖祖仁皇帝諭㫖増祀兩晉南北朝後五代創守各主至前明諸陵亦不靳百萬帑金重加修葺仰見大聖人之用心實與天地同量至特輯殉節諸臣録勝國遺臣皆得上邀天鑒概為表章沛格外之深仁扶倫常之正氣尤為簡冊所未有云一恭繹聖祖仁皇帝御製律吕正義一書首明黄鐘度分體積倍半相生相應之理較古尺九寸得今尺七寸二分九釐以定黄鐘徑圍長短之數而八音之屬咸繪圖列説以昭法守我皇上重輯律吕正義後編考律審音論倫悉協乾隆己卯冬江右得古鏄鐘十一圜以獻皇上釐定其名復令樂部依式仿鑄御製銘詞鐫垂永久鍾成復令採和闐之玉琢為特磬以儷鏄鍾宫懸遂備他若鼓吹鐃歌臨雍釋奠鄉飲酒禮靡不審此樂音章曲大備以復古一字一音之法兹纂謹按類記載用彰昭代雅樂之盛一馬考于兵制内列車戰一門雖意在遵用古法苐按之事理實猶井田封建之不可復行且我朝八旗之設經武馭兵飈馳電舉既斷不事此虛文自無庸更仍舊目兹纂亦削而不列一自欽定四庫全書裒集宇内典籍定為著録存目兩類兼命排入聚珍刋播遐邇洵冊府之鉅觀藝林之盛事兹纂謹遵四庫成規分為經史子集四門列聖御製御纂欽定之書皇上御製詩文集欽定各書並恭列本朝成書之首至著述諸臣仍載其姓氏官閥或前人論斷有禆本書考訂者亦約載數家畧符馬考之例一馬考論封建之不可行者其語極詳顧封建之制不可行而封爵之制不可廢自唐宋以来大抵祇存封爵之名馬氏仍列封建一門且引魏徵柳宗元蘇轍之説用著於冊葢存封建之名即以示封建之戒實其用意所在我朝折衷成法封而不建為萬禩不易之常經兹纂雖仍依馬考舊名至卷中按條標目則别稱封爵以紀其實一我朝憲天齊政靈臺推步之法視昔加詳聖祖仁皇帝御製考成上下編世宗憲皇帝御製序文殫晰源流頒賜欽天監講肄我皇上増定後編重製儀象凡古法之失傳與西法之積歳參差者隨時釐正所以揆天察紀明時正度俾象緯昭然耳目至纎至悉兹纂仿馬考舊第取近今實測之數理與前代逈異者備著於篇一我朝丕基式廓分土辨方自不得拘牽成例以古州郡名號取冠輿圖兹纂自京師盛京而外為省一十有八分置各府以領諸縣諸州則參列其間或直𨽻如府或分治如縣至各邉外之地北自大清山左右為蒙古諸部至喀爾喀地南自五嶺外為廣東廣西及各土州地東北自盛京境外為吉林黒龍江等地西南自四川境外為雲南及青海西藏地正西則自安西境外至於流沙而禹迹已盡其在天山北路則有烏魯木齊伊犁等地天山南路則有喀叶噶爾葉爾羌和闐等地自昔所稱近有龍堆逺則葱嶺天所以界别區域者今則建官授職因地屯田耕牧方興邉氓樂業故凡地名之因革増省皆以見今為凖以示棊置星羅之盛焉一我國家統一凾夏四裔賓服皇上繼承鴻烈平定凖夷囘部闢疆二萬餘里皆𨽻版籍東西南朔固已跨越四瀛廣逺綿邈什百前代兹纂凡獻琛奉朔及互市諸國悉詳其山川風俗總分四正方位以符馬考舊例視王圻續考内増東南西南二面分𨽻之處悉多牽率者實大相逕庭矣皇朝文獻通考凡例
