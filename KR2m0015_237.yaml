body:
  text: 欽定四庫全書皇朝文獻通考卷二百三十七經籍考二十七集總集臣等謹按總集一門為類至夥蓋以網羅放佚薈萃菁英誠為著作之淵藪前考於一代總集中復以詔令奏疏詩文等分次前後於是有一人而屢見者於例究為未協今恭載聖祖仁皇帝暨我皇上選定各集辨冕於前凡詩文詞賦統以選定之年月為次而臣下選注諸集亦悉視其人之後先不復以所選所注之集更為析類至文史舊附總集之後今仍其例而以臣下所注一家之集間雜評㸃於義不當入總集者亦附隸焉御選古文淵鑑六十四卷康熙二十四年聖祖仁皇帝御選內閣學士徐乾學等奉敕編注聖祖仁皇帝御製序曰夫經緯天地之謂文文者載道之器所以彌綸宇宙統括古今化裁民物者也是以乾苞坤絡非文不宣聖作賢述非文不著其為用也大矣書契以後作者代興載籍充盈體製不一約而論之靡不根柢於羣經權輿於六籍如論說之類以疏解為主始於易者也奏啓之類以宣述為義始於書者也賦頌之類以諷喻為指始於詩者也傳叙之類以紀載為事始於春秋者也引而伸之觸類而通之雖流别各殊而鎔裁有體於是能言之士抒寫性情賁飾詞理同工異曲以求合乎先程皆足以立名當時垂聲來葉彬彬郁郁稱極盛焉然而代不乏人人不一製著作既富篇什遂繁不有所裒輯慮無以觀其備也不有所詮擇慮無以得其精也古來采獲之家載在四部名目滋多類皆散佚其流布人區者自蕭統文選而外唐有姚鉉之文粹宋有吕祖謙之文鑑皆限斷年代各為一編夫典章法度粲然一王之制前不必相師後不必相襲此可限以年代者也至於文章之事則源流深長今古錯綜盛衰或通於千載損益無關於一朝此不可限以年代者也諸家之選雖足鳴一代之盛豈所以窮文章之正變乎朕留心典籍因取古今之文自春秋以迄於宋擇其辭義精純可以鼓吹六經者彚為正集即間有瑰麗之篇要皆歸於古雅其綺章秀製弗能盡載者則列之别集傍采諸子録其要論以為外集煌煌乎洵秉文之玉律抽牘之金科矣夫帝王之道質文互用而大化以成聖賢之業博約並施而性功以備是書也雖未足以盡文章之勝於聖人遊藝之旨亦庶乎其有當也夫臣等謹按是編所録上起左傳下迄宋人俱有關風教有禆世用之文仰承睿藻親揮品題甲乙凡百家之工拙具著御評洞鑒之中洵乎玉律金桴為萬世摛文之矩矱矣御定列代賦彚一百四十卷外集二十卷逸句二卷補遺二十二卷康熙四十五年詹事陳元龍等奉敕編聖祖仁皇帝御製序曰賦者六義之一也風雅頌興賦比六者而賦居興比之中蓋其敷陳事理抒寫物情興比不得並焉故賦之於詩功尤為獨多由是以來興比不能單行而賦遂繼詩之後卓然自見於世故曰賦者古詩之流也班固又謂登高能賦可以為大夫言感物造端材智深美可以與國政事故可以為列大夫也是則賦之於詩具其一體及其閎肆漫衍與詩並行而其事可通於用人書曰敷奏以言夫敷奏者有近乎賦之義使堯舜而在今日亦所不廢則豈非文章之可貴者哉朕嘗於幾務之暇博觀典籍見古者諸侯卿大夫交接鄰國時稱詩以喻志不必其所自作皆謂之賦如晉公子重耳賦六月魯文公賦菁菁者莪鄭穆公賦鴻雁魯穆叔賦祈父之類皆取古詩歌之以喻其志即詠吟之遺音得心意之所存使聞之者足以感發興起而因以明其如相告語之情猶之敷布其義而直陳之故謂之賦也春秋之後聘問詠歌不行於列國於是羈臣志士自言其情而賦乃作焉其始創自荀況宦逰於楚作為五賦楚臣屈原乃作離騷後人尊之為經而班固以為屈原作賦以諷諭則已明其為賦矣其後宋玉唐勒皆競為之漢興賈誼枚乘司馬相如揚雄張衡之流製作尤盛三國兩晉以逮六朝變而為排至於唐宋變而為律又變而為文而唐宋則用以取士其時名臣偉人往往多出其中逮及元而始不列於科目朕以其不可盡廢也間嘗以是求天下之才故命詞臣考稽古昔搜采缺逸都為一集親加鑒定令校刋焉為叙其源流興罷之故以示天下使凡為學者知朕意云臣等謹按正集凡三十類皆有關於經濟學問之大者區分類别以次畢登其他緣情抒感之作别為外集八類通三千四百六十五首至於碎璧零璣搜羅殆盡則裒為逸句二卷雜書僻典採録靡遺又續為補遺三百餘篇正變兼陳洪纎畢具洋洋乎極千古賦苑之大觀矣御定佩文齊咏物詩選四百八十二卷康熙四十五年大學士張玉書陳廷敬等奉敕校聖祖仁皇帝御製序曰昔者子夏序詩謂正得失動天地感鬼神莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗若是乎詩之道大矣哉而周公纘述唐虞宗翼文武制禮以導天下著爾雅一篇後之序之者謂爾雅所以通詁訓之指歸叙詩人之興詠疏之者曰爾雅所釋遍解六經而獨云叙詩人之興詠者以爾雅之作多為釋詩是則一物多名片言殊訓凡以蟲魚草木之微發揮天地萬物之理而六義四始之道由是以明焉故夫詩者極其至足以通天地類萬物而不越乎蟲魚草木之微詩之咏物自三百篇而已然矣孔子曰邇之事父逺之事君多識於鳥獸草木之名夫事父事君忠孝大節也鳥獸草木至微也吾夫子並舉而極言之然則詩之道其稱名也小其取類也大即一物之情而關乎忠孝之旨繼自騷賦以來未之有易也此昔人詠物之詩所由作也歟朕自經帷進御覃精六籍至於燕暇未嘗廢書於詩之道時盡心焉爰自古昔逸詩漢魏六朝洎夫有唐訖於宋元明之作博觀耽味搴其蕭稂掇其菁英命大學士陳廷敬尚書王鴻緒校理之翰林蔡升元楊瑄陳元龍查升陳壯履勵廷儀張廷玉錢名世汪灝查慎行蔣廷錫編録之名曰佩文齊詠物詩選蓋搜采既多義類咸備又不僅如向者所云蟲魚鳥獸草木之屬而已也若天經地志人事之可以物名者罔弗列焉於是鏤板行世與天下學文之士共之將使之由名物度數之中求合乎溫柔敦厚之指充詩之量如卜商氏之所言而不負古聖諄復詁訓之心其於詩教有禆益也夫編修高輿進表校刻略曰上自古初下迄勝國詩成物類若五色之相宣選以體分猶四時之成序大則觀文察理取象高深細則喙息跂行肖形毫末其間包羅衆品薈蕞羣材服食器用之需皆歸逸響律吕權衡之事並入妍詞農牧樵漁恍見野人之趣圖書藥物足抒大雅之襟以及仙釋之遐踪將帥之行陳異卉名花之悅性纎鱗弱羽之遂生莫不次第臚陳後先區别既潄芳而傾液復按部而就班羣服宸衷藻鑑之精亦見作者經營之善乃者荷九重之綸綍畀全部以雕鐫拜命悚惶捧函戒謹訂魯魚之異字尚懼承訛正朋鳯之同文惟求無舛謹校定六十四冊為類四百八十有六古今各體詩一萬四千五百九十首御定全唐詩九百卷康熙四十二年翰林院侍講彭定求等奉敕校聖祖仁皇帝御製序曰詩至唐而衆體悉備亦諸法畢該故稱詩者必視唐人為標準如射之就彀率治器之就規矩焉蓋唐當開國之初即用聲律取士聚天下才智英傑之彥悉從事於六義之學以為進身之階則習之者固已専且勤矣而又堂陛之賡和友朋之贈處與夫登臨宴賞之即事感懷勞人遷客之觸物寓興一舉而託之於詩雖窮達殊途悲愈異境而以言乎攄寫性情則其致一也夫性情所寄千載同符安有運㑹之可區别而論次唐人之詩者輒執初盛中晚岐分疆陌而抑揚軒輊之過甚此皆後人强為之名非通論也自昔唐人選唐詩有殷璠元結令狐楚姚合數家卷帙未為詳備至宋初撰輯英華收録唐篇什極盛然詩以類從仍多脫漏未成一代巨觀朕兹發內府所有全唐詩命諸詞臣合唐音統籖諸編參互校勘搜補缺遺略去初盛中晚之名一依時代分置次第其人有通籍登朝嵗月可考者以嵗月先後為斷無可考者則援据詩中所咏之事與所同時之人繫焉得詩四萬八千九百餘首凡二千二百餘人釐為九百卷於是唐三百年詩人之菁華咸采擷薈萃於一編之內亦可云大備矣夫詩盈數萬格調各殊溯其學問本原雖悉有師承指授而其精思獨悟不屑為茍同者皆得殫其才力所至沿尋風雅以卓然自成其家又其甚者寧為幽僻竒譎雜坐於變風變雅之外而絶不致有蹈襲剽竊之弊是則唐人深造極詣之能事也學者問途於此探珠於淵海選材於鄧林博收約守而不自失其性情之正則真能善學唐人者矣豈其漫無持擇泛求優孟之形似者可以語詩也哉是用製序卷首以示刻全唐詩嘉與來學之㫖海內誦習者尚其知朕意焉臣等謹按是編聖祖仁皇帝以胡震亨所輯唐音統籖多所舛漏特命刪補其書勒為全帙凡目録十二卷帝后宗室諸王公主宫嬪詩九卷郊廟樂章七卷樂府十三卷王圭以下一千三百九十四人詩七百三卷五代詩三十三卷無爵里世次可考者二十一卷聯句七卷逸句二卷名媛九卷釋子四十六卷道士四卷神仙鬼怪十三卷諧謔四卷判歌䜟記語諺謎謡酒令占詞蒙求各一卷補遺七卷詞十二卷共詩四萬八千九百餘首搜羅精核纎悉不遺正變源流燦然大備滙總集之大觀洵無過於此書者矣御定厯代題畫詩類一百二十卷康熙四十六年翰林院編修陳邦彥奉敕編聖祖仁皇帝御製序曰粵考有虞氏施采作繪而繪事以起周禮冬官采有設色之工典畫繢之職傳所稱火龍黼黻昭其文三辰旗旗昭其明者是也至漢世圖寫功臣用示褒異則又人物之肖象粲然著見於史册者矣嗣是工繪事者日衆自天文地輿鳥獸草木以及宫室器用與一切登臨遊覽之勝皆假圖畫以傳於世晉宋而後莫盛於唐五代迄宋作者輩出金元明間亦代有聞人方其詣精入理足以體隂陽含飛動為稽古博物者之所取證不僅以丹青擅長而已而能搜抉其義藴發攄其旨趣者則尤藉有題畫之詩歷代各體題咏以萬計散置諸集無所統紀翰林陳邦彥裒輯彚鈔得八千九百餘首分為三十類編次一百有二十卷繕本呈覽朕嘉其用意之勤命授工鋟梓兹刋成裝潢來上萬幾餘暇時一披閲凡兩間之名象庶類之棼錯無不該載於中且不踰几席而得流觀山川險易之形近在目前而可考鏡往代留遺之蹟以至農耕蠶織纎悉具陳雞犬桑麻宛然如覩庶幾於昔人豳風無逸之圖有互相發明者焉夫圖繪藝事也而近於道題畫詩之一類也而通於治杜甫詩謂繪事功殊絶幽襟興激昻讀是編者可以觸類而知所務矣爰製序題於卷端以識始末云臣等謹按是書仿孫紹逺聲畫集之例以歷代題畫之作分類編次然紹逺書止八卷分二十六類配隸多有舛漏此則分天文地理山水名勝古蹟故實閒適古像寫真行旅羽獵仕女仙佛神鬼漁樵耕織牧養樹石蘭竹花卉禾麥蔬果禽類獸類鱗介花鳥合景草蟲宫室器用人事雜題等凡三十類詩八千九百六十二首條理分明包舉簡括胥由睿裁精審故雖藝事之末而即物寓道洞見本原洵乎聖人之心能見其大也御定厯代詩餘一百二十卷康熙四十六年翰林院侍讀學士沈辰垣等奉敕編聖祖仁皇帝御製序曰詩餘之作蓋自昔樂府之遺音而後人之審聲選調所由以緣起也而要皆昉於詩則其本末源流之故有可言者古帝舜之命䕫典樂曰詩言志歌永言聲依永律和聲可見唐虞時即有詩而詩必諧於聲是近代倚聲之詞其理固已寓焉降而殷周孔子删而為三百五篇樂正而雅頌得所考其時郊廟明堂升歌宴饗以及鄉飲報賽莫不有詩以叶於笙簫琴瑟之間自詩變為騷騷衍為賦雖旨兼出乎六義而聲弗拘於八音至漢而郊祀房中鐃歌鼓吹琴曲雜詩皆領於樂官於是始有樂府名迄於六代操觚之家按調屬題徴辭赴節日趨婉麗以導宫商唐興古詩而外創為近體而五七言絶句或傳於伶人顧他詩不盡協於樂部其間如李白之清平調憶秦娥菩薩鬘劉禹錫之浪淘沙竹枝詞洎溫庭筠韋莊之徒相繼有作而新聲迭出時皆被諸管絃是詩之流而為詞已權輿於唐矣宋初其風漸廣至周邦彥領大晟樂府比切聲調篇目頗繁栁永復增置之詞遂有専家一時綺製可謂極盛雖體殊樂府而句櫛字比亷肉節奏不爽寸黍其於古者依永和聲之道洵有合也然則詞亦何可廢歟朕萬幾清暇博綜典籍於經史諸書有關政教而禆益身心者良已纂輯無遺因流覽風雅廣識名物欲極賦學之全而有賦彚欲萃詩學之富而有全唐詩刋本宋金元明四代詩選更以詞者繼響夫詩者也乃命詞臣輯其風華典麗悉歸於正者為若干卷而朕親裁定焉夫詩之揚厲功德鋪陳政事固無論矣至於桑中蔓草諸什而孔子以一言蔽之曰思無邪蓋蕙茝可以比賢者嚶鳴可以喻友生苟讀其詞而引伸之觸類之範其軼志砥厥貞心則是編之含英咀華敲金戛玉者何在不可以思無邪之一言該之也若夫一唱三歎譜入絲竹清濁高下無相奪倫殆宇宙之元音具是推此而沿流討源由詞以溯之詩由詩以溯之樂即簫韶九成其亦不外於本人心以求自然之聲也夫臣等謹按是編以調之多寡為次每一調之中又以時代為序自十六字至二百四十字凡一千五百四十調九千餘首分為百卷後附詞人姓氏十卷自唐至明凡九百五十七人詞話十卷凡七百六十三則一洗舊本之陋獨集詞選之成所以為倚聲之律者洵乎其博且精已御選四朝詩二百九十二卷康熙四十八年右庶子張豫章等奉敕編聖祖仁皇帝御製序曰生民之始禀二儀之精含五常之性而其理具於一心人心之靈日出而不窮詩大序謂在心為志發言為詩其闡明虞廷言志之意而歸本於心者其意深矣蓋時運推移質文屢變其言之所發雖殊而心之所存無異則詩之為道安可謂古今人不相及哉觀於宋金元明之詩而其義尤著焉世之論詩者謂唐以詩賦取士故唐之詩為獨盛夫唐之詩誠盛矣若夫宋之取士始以詩賦熙寧専主經義而罷詩賦元祐初復詩賦至紹聖而又罷之其後又復與經義並行金大略如宋制元自仁宗罷詩而存賦明則詩賦皆罷之士於其時以其餘力兼習有韻之言専之則易美兼之則難工而其至者亦往往嫓北宋而追三唐豈非人心之靈日出而不窮者歟此又可見古今人不甚相逺也朕夙興夜寐永圖治安念養士育才國家盛典考言詢事曩代良規亦既試之制藝使通經術兼以論表判䇿俾達古今而於科目之外時以詩賦取人每當省方觀民之㑹士之所進詩賦古文止輦受觀停舟延問親試而拔其尤者亦多矣蓋舉斯世而措之禮陶樂淑之中被以溫柔敦厚之教故所以奬勸之者靡弗至焉近得全唐詩己命儒臣校訂刋布海內由唐以來千有餘年之久流傳自昔未見之書亦可謂斯文之厚幸矣遂又命博采宋金元明之詩每代分體各編自名篇巨集以及斷簡殘章罔有缺遺稍擇而録之付之剞劂用以標詩人之極致擴後進之見聞譬猶六代遞奏八音之律無爽九流並遡一致之理同歸然則唐以後之詩又自今而傳矣夫詩之日逺而日新如此而皆本於人之一心孔子云詩三百一言以蔽之曰思無邪子之言詩法也即心法也子夏味絢素之章子貢悟琢磨之句二子者一以文學列於四科一以多識得聞一貫朕於是有以見夫天之所以畀於人者此心此理隨在流通願學者謹其所存而審其所發將以上達夫大本大原而充廣乎萬事萬物豈惟詩之為道也哉臣等謹按是編凡宋詩七十八卷金詩二十五卷元詩八十一卷明詩一百二十八卷每代之前各系以作者之姓名爵里首帝製次四言次樂府次歌行次古體次律詩次絶句次六言次雜言以體分編合四朝七百餘年之著作裒為巨帙網羅繁富持擇精嚴良由我聖祖仁皇帝遊心藝苑乙覽無遺故能集四代之巨觀垂萬世之矩矱匪特詩家正變源流燦然具備即歷朝盛衰治亂之原亦昭然共著也已御定全金詩七十四卷康熙五十年中書郭元釪奉敕編聖祖仁皇帝御製序曰金有天下武功文治燦然昭明人材之萃多在大定明昌之間駸駸乎盛矣然北元南宋終金之世爭伐聘問殆無暇日其典章名物湮沒於當時而不傳於後者不知凡幾矣太原元好問撰中州集以人屬詩以事屬人後世有詩史之目而渾源劉祁亦著歸潜志可與中州集相參互證焉蓋其人文之可考者猶賴此兩書之存也朕嘗覽金史多采用好問中州集益信所謂詩史不虛也因是亦欲得金詩之全以補金史之所未備卓然成一代之書㑹有全金詩之進遂命更加搜輯凡金人集之斷簡殘篇有可存者皆令附以入及諸山經地志川澤之紀聞綴托薈藂巨細不遺使觀者弗厭其詳而皆有以自擇焉夫金世德久逺涵濡蒸育才俊輩出迄今反覆斯編可以見邦國之光與篤生之富矣顧金去今垂六百年其禮樂聲明載在藝林之詠言者若非中州歸潛二書後之人亦烏從而知之也況夫兼二書之所未備可不永其傳也哉中書郭元釪奏略曰臣嘗讀金人元好問所選中州集清真淡宕有宋詩之新而無其鄙俚有元詩之麗而無其纎巧文質得宜正變有體而好問所作小傳詞意斐亹足為史氏採擇然所載詩未備紀事與劉祁歸潜志往往不合元郝經稱好問著中州集一百卷而今存者止十卷未為全書臣竊念金有天下一百一十七年大定明昌承平底定文治之盛不減於他代今唐宋元明詩皆有備本而金獨無之使不薈萃表章則河嶽菁英久愈散失不揣愚陋留意收拾採輯遺逸漸成卷軸小傳之下參以歸潜志及金元人銘表題跋並說部諸書凡金人入元不仕者皆附入其末而即終之以元好問劉祁期於一代文獻歷歷可考臣弇鄙無學金人遺集恐有未見或致疏漏伏乞賜之刋正將一代人文千載如見不惟存詩而已臣等謹按元釪所增之詩視舊加倍所增之人視舊三倍金源一代之歌詠搜輯殆盡然猶有疏漏之處荷䝉聖裁指授薈萃排纂始極精詳而卷端仍留元釪銜名尤仰見片長必録之至意焉御選唐詩三十二卷附録三卷康熙五十二年聖祖仁皇帝御定聖祖仁皇帝御製序曰古者六藝之事皆所以涵養性情而為道德之助也而從容諷詠感人最深者莫近於詩故虞廷典樂依永和聲帝親命焉成周時六義領在樂官而為教學之先務自三百篇降及漢魏六朝體製遞增至唐而大備故言詩者以唐為法其時選本如河嶽英靈中興間氣御覽才調諸集其所收擇各有意指而觀者每有不遍不該之歎朕萬幾餘暇留意篇什廣搜博採已刻全唐詩集而自曩昔披覽嘗取其尤者彚為一編古風近體各以類相從計三十二卷蓋討索貴於詳備而用以吟咏性情則當挹其精華而潄其芳潤每當臨朝聽政巡行獮狩之餘展卷留連未嘗不悠然而有得也因命儒臣依次編注朕親加考訂一字一句必溯其源流條分縷析其有徴引訛誤及脫漏者隨諭改定逾歲告成因付開雕以示後學孔子曰溫柔敦厚詩教也是編所取雖風格不一而皆以溫柔敦厚為宗其憂思感憤倩麗纎巧之作雖工不録使覽者得宣志達情以範於和平蓋亦用古人以正聲感人之義記有之君子在車則聞鸞和之音行則鳴佩玉是以非辟之心無自而入也審此而朕之寄意於詩與刋布是編之指俱可得而見矣是為序臣等謹按自明以來選唐詩者屢變大抵視其人性之所近各持偏見鮮得其平我聖祖仁皇帝權衡六義陶鑄三唐既敕編全唐詩九百卷以滙其大觀復親定此編以示夫正則博收約取辨别瑕瑜至於注釋則仿李善注文選例但釋訓詁名物而不及作者之志蓋優而遊之使自得之俾自來說唐詩家附㑹穿鑿之弊悉為湔除也已欽定四書文四十一卷乾隆元年內閣學士方苞奉敕選臣等謹按是編所録者前明之文化治以上為一集正嘉為一集隆萬為一集啓禎為一集凡四百八十六篇國朝文總為一集其人現存者不與焉凡二百九十七篇通七百八十有三夫經義代聖賢立言義理同功於傳注矩矱溯源於古文自揣摩家藉以弋取科名遂至流為末技不知宋劉安上諸人皆載入集中原未岐而外之也是編凛遵聖訓以清真雅正為宗所録之文皆足以傳世行逺而别裁精審則更仰禀宸裁易曰君子以教思無窮又曰觀乎人文以化成天下聖人之心所以端士習而正文風俾千萬世永垂法守者不具著於斯編也哉御選唐宋文醇五十八卷乾隆三年皇上御定皇上御製序曰不朽有三立言其一言之無文行而不逺若是乎言之文者乃能立於後世也文之體不一矣語文者說亦多矣羣言淆亂衷諸聖當必以周孔之語為歸周公曰言有序孔子曰辭達而已矣無序固不可以達欲達其辭而失其序則其為言奚能雲粼波拯而與天地之文相似也然使義則戔戔而言有枝葉妃青嫓白雕琢曼辭則所謂八代之衰已其咎同歸於無序而不達抑又有進焉文所以足言而言固以足志其志已荒文將奚附是以孔子又曰言有物夫序而達達而有物斯固天下之至文也已昌黎韓愈生周漢之後幾五百年逺紹古人立言之軌則其文可謂有序而能達者然必其言之又能有物如布帛之可以暖人菽粟之可以飽人則李漢所編七百篇中猶且十未三四況昌黎而下乎甚矣文之至者不易得也明茅坤舉唐宋兩朝中昌黎栁州廬陵三蘇曾王八大家薈萃其文各若干首行世迄今操觚者膾炙之本朝儲欣謂茅坤之選便於舉業而弊即在是乃復增損之附以李習之孫可之為十大家欲俾讀者興起於古毋祗為發䇿決科之用意良美已顧其識之未衷而見之未當則所去取與茅坤亦未始徑庭朕讀其書嘉其意而亦未嘗不懲其失也夫十家者謂其非八代駢體云爾駢句固屬文體之病然若唐之魏鄭公陸宣公其文亦多駢句而辭達理詣足為世用則駢又奚病日月麗乎天天之文也百穀草木麗乎土地之文也化工之所為有定形乎哉化工形形而不形於形而謂文可有定形乎哉顧其言之所立者何如耳敕幾之暇偶取儲欣所選十家之文録其言之尤雅者若干首合而編之以便觀覽夫唐宋以來名儒碩士有序有物之嘉言固不第十人已也雖然嘗鼎一臠亦足以知道腴之可味況已斟其雉膏哉臣等謹按儲欣初因明茅坤八家文鈔益以李翺孫樵為十家然去取未能謹嚴評論或多偏駁我皇上指授儒臣芟除蕪雜採擷精華定為此集凡聖祖仁皇帝御評以黃色恭書卷端皇上御評則朱書篇後至於諸家評跋及姓名字蹟有資考證者各以紫色緑色識之由是唐宋之矩範具於十家十家之菁英薈於此集睿裁精審醇乎其醇所以垂世而立則者固可以顧名而思義也已皇清文頴一百二十四卷乾隆十二年大學士張廷玉等奉敕編皇上御製序曰我大清受命百有餘年列祖德教涵濡光被海宇右文之盛炳焉與三代同風朕紹聞遜志以是為學亦以是為治矢其文德一紀於兹易曰觀乎人文以化成天下蓋自有天地而人經緯乎其間士君子之一言一行國家之制度文為禮樂刑政布之為教化措之為事功無非文也乃其菁英所萃蔚為國華詞以殽之聲以永之律以和之諧協六同彰施五色典謨作焉雅頌興焉詩不云乎追琢其章金玉其相文之盛也而賡之曰勉勉我王綱紀四方則所謂其風自上也曩我皇祖命大學士陳廷敬選輯皇清文頴儲之延閣未及刋布皇考復允廷臣之請開館編輯隨時附益久之未竣朕因命自乾隆甲子以前先為編次凡御製詩文草四卷臣工賦頌及諸體詩文一百卷録成序其首簡昔之論文以代為次者於漢則有西漢文類唐則有文苑英華唐文粹宋則有文海文鑑元則有文類明則有文衡皆博綜一代著作之林無體不備今是編惟取經進之作朝廷館閣之篇與諸書小異然以觀斯文風尚當有取焉在易涣之象曰風行水上善立言者以為天地自然之文而序卦受之以節言文之不可過也繼之以中孚言有實也節而不流徴之以信有典有則可久之道其在斯乎朕孜孜典學求所以善持之者因以為摛文者鵠俾共勉云臣等謹按先是康熙中大學士陳廷敬奉敕纂輯雍正中續有增修至是乃始成帙卷首恭録聖祖仁皇帝御製詩文六卷世宗憲皇帝御製詩文四卷皇上御製詩文十四卷合二十四卷其餘諸臣所作一百卷仰承聖訓斷自乾隆甲子以前巨製鴻篇無不甄録率皆理醇辭正渢渢乎治世之音至於别擇之精折衷至聖尤足見權衡去取一秉至公彼宋文鑑元文類等編烏可以同日而語哉御選唐宋詩醇四十七卷乾隆十五年皇上御定皇上御製序曰文有唐宋大家之目而詩無稱焉者宋之文足可以匹唐而詩則實不足以匹唐也既不足以匹而必為是選者則以唐宋文醇之例有文醇不可無詩醇且以見二代盛衰之大凡示千秋風雅之正則也文醇之選就向日書窗校閲所未畢付張照所足成者兹詩醇之選則以二代風華此六家為最時於幾暇偶一涉獵而去取評品皆出於梁詩正等數儒臣之手夫詩與文豈異道哉昌黎有言氣盛則言之短長與聲之高下皆宜然五三六經之所傳其以言訓後世者不以文而以詩豈不以文尚有鋪張揚厲之跡而詩則優遊饜飫入人者深是則有文醇尤不可無詩醇也六家品格與時㑹所遭各見於本集小序是編彚成梁詩正等請示其梗概故為之總序如此臣等謹按是編於唐選李白杜甫白居易韓愈於宋選蘇軾陸遊凡六家實已括詩源正變之全示藝苑權衡之準矣蓋詩之大宗莫如李杜而白之平易近情韓之竒闢有法蘇之天才超妙陸之人工精密俱足以輔翼李杜為後學之津梁我皇上萬幾之餘别無嗜好宸章所著積至三萬餘篇故於詩學源流權衡至當是編復以尼山刪定之旨品鑒六家定為正軌俾家絃戶誦奉為玉律金科固非諸家選本所能仰測至於評注仍用别色為識亦略如唐宋文醇之例焉斯文正統十二卷刁包編包見經類太倉十子詩選十卷吳偉業編偉業見史類臣等謹按是編所選乃周肇東岡集王揆芝㕓集許旭秋水集黃與堅忍菴集王撰三餘集王昊碩園集王抃健菴集王曜升東皋集顧湄水鄉集王攄步蟾集凡十人皆偉業同里各采其一集以成是編蓋猶明季詩社餘風也樂府英華十卷顧有孝編有孝字茂倫吳江人有孝自序曰自漢迄唐樂府有數十家而最著者郭茂倩之樂苑左克明之樂府吳兢之樂録郤昻之題解沈建之廣題徐獻忠之樂府各有意見因取而參定之臣等謹按自序所云郭茂倩樂苑吳兢樂録俱訛郭茂倩書名樂府詩集吳兢書名樂府古題要解其名樂苑者乃梅鼎祚所編也至其所分各類多踵郭茂倩舊目於體製無所考訂每章下略加注釋間附評斷蓋其例主於選詩與吳郭諸家用意固不侔耳唐宫閨詩二卷費密編密見别集類牘雋四卷蕭士琦撰士琦字季公泰和人前明貢生臣等謹按是編選自漢至宋尺牘分三十二門然所録往往祗一二語非全文也樂府廣序三十卷朱嘉徴編嘉徴字岷左别號止溪圃人海寧人前明崇禎壬午舉人入國朝官徽州府推官三蘇談十卷高阜撰阜字康生號蘿栖祥符人蕭氏世集無卷數蕭伯升編伯升字孟昉泰和人臣等謹按是集皆録其先世詩文考其自序稱與蕭士瑋春浮圖集并士瑋弟士琦陶菴雜記牘雋諸書同時合刻為蕭氏世集然今所存惟蕭岐之正固先生集岐子遵之垣行自志與蕭烜之雪崕詩集三者而已姚江逸詩十五卷明文海四百八十二卷明文授讀六十二卷黃宗羲撰宗羲見經類詩紀匡謬一卷馮氏校定玉臺新詠十卷馮舒撰舒字己蒼號默菴又號癸巳老人常熟人臣等謹按舒因馮惟訥所輯古詩紀中多謬誤以致李攀龍之詩刪鍾惺談元春之詩歸輾轉沿訛乃作是書以糾之故名曰詩紀匡謬至校定玉臺新詠則以宋嘉定乙亥永嘉陳玉父之本為主而以諸本參核之者也二馮評㸃才調集十卷馮舒馮班同輯班見子類王士禎跋曰趙執信崇信是書鑄金呼佛殊不可解杭世駿榕城詩話曰戚進士􅌢言德清人每為二馮左袒豫跋其才調集㸃本後曰固哉馮叟之言詩也承轉開合提唱不已乃村夫子長技緣情綺靡寧或在斯古人容有細心通才必不當為此迂論右西崑而黜西江夫西崑盛於晚唐西江盛於南宋今將禁晉宋之不為齊梁禁齊梁之不為開元大厯此必不得之數風㑹流轉人聲因之合三千年之人為一朝之詩有是理乎二馮可謂能持詩之正未可謂遂盡其變也桞村詩集十卷陳增新等編增新字子更嘉善人溯洄集十卷魏裔介編裔介見經類高言集四卷田茂遇董俞同編茂遇字佛淵順治戊子舉人俞字蒼水皆華亭人古文輯略無卷數曹本榮編本榮見史類續宛雅八卷蔡蓁春施閏章同編蓁春始末未詳閏章見子類宛雅三編二十四卷施念曾張汝霖同編念曾號竹窗閏章之孫汝霖見史類臣等謹按明梅鼎祚有宛雅十卷蓋載自唐至明宣城之詩故蔡蓁春施閏章因選嘉靖以後至崇禎末年凡六十五家以續之後念曾汝霖又搜采二集所遺前代之詩益以國朝諸作為三編所補較為完備云臨川文獻八卷胡亦堂編亦堂字二齊慈溪人順治辛卯舉人官臨川縣知縣後行取主事臣等謹按是編専輯自宋以來臨川一縣之文每集仍標原名并各系小序於卷首江左十五子詩選十五卷宋犖編犖見史類犖自序詩選曰犖建節撫吳且一紀日以多暇乃得振興風雅後先賞識名人才士於大江南北間凡十五人與友邵長蘅共精選其詩得三之一授之梓詩無甲乙以齒次第臣等謹按犖任江蘇巡撫時甄拔境內能文之士王式丹等十五人各選其詩一卷授諸梓焉詩原二十五卷顧大申撰大申見詩集類宋元詩㑹一百卷陳焯編焯字默公桐城人順治壬辰進士官兵部主事焯自述曰是編蓋散落零鈔或得諸山水圖經或得諸崖碑磨搨以及市坊村孰道院襌宫敝簏殘蹄窮極搜求積纍嵗時成兹巨帙潘江序曰焯曩有古今詩㑹賦㑹之選十年以來復取宋元合金詩而討論之自合稿専集以至山經地志所載稗官野乘所收靡不薈萃攟托既博持擇復嚴且宋史成於托克托元史成於景濓叙勝國名賢事蹟類多荒略稍涉忌諱輒施曲筆兹集於論詩之中寓正史之意仿遺山中州集之體人立一傳不徒詳其爵里而必核其行誼俾誦其詩者可以論世知人焉王士禎香祖筆記曰甲子祭告南海時歲杪抵桐城焯攜所輯宋元詩㑹相商得以縱觀竟日甬上耆舊詩三十卷胡文學編文學見史類滕王閣集十三卷滕王閣續集無卷數蔡士英編士英字伯彥奉天人官至漕運總督宋金元詩永二十卷補遺二卷選聲集三卷附詞韻簡一卷吳綺選綺見史類凡例曰所選諸篇品骨氣味規矩方圓要不與李唐丰格致有天淵之别澄逺堂三世詩存八卷李繩逺編繩逺見史類朱彞尊靜志居詩話曰弇州標榜前後五子而外廣為四十子若似乎此外無遺賢矣說詩者遇隆萬朝士或置不觀不知隆慶諸人已力挽呌囂之習歸於平淡而定陵初年人皆修辭琢句出入風雅之林若李伯逺輩尤卓然名家未見萬厯初之不及嘉靖季也唐賢三昧集三卷二家詩選二卷唐人萬首絶句選七卷古詩選三十二卷十種唐詩選十七卷載書圖詩一卷新安二布衣詩八卷王士禎編士禎見史類士禎自序唐賢三昧集曰康熙戊辰春杪歸自京師居宸翰堂日取開元天寶諸公篇什讀之録其尤雋永超詣者自王右丞而下四十二人為唐賢三昧集合文粹英靈間氣諸選詩通為唐詩十選不録李杜二公者仿王介甫百家例也張曲江開盛唐之始韋蘇州殿盛唐之終皆不録者已見五言選詩故不重出也昭明文選越裁十一卷洪若皋編若皋見别集類若皋自序曰越裁者時避居越城志地亦志僭也姑蘇楊桞枝詞一卷汪琬編琬見别集類樵川二家詩四卷朱霞編浙江通志載朱霞建德人順治乙未進士疑即是人臣等謹按樵川為今邵武縣二家者宋嚴羽元黃鎮成也各分二卷末附滄浪詩話於後十五家詞三十七卷孫默編默字無言休寧人臣等謹按是編載吳偉業梅村詞梁清標棠村詞宋琬二鄉亭詞曹爾堪南溪詞王士祿炊聞詞尤侗百末詞陳世祥含影詞黃永溪南詞陸可求月湄詞鄒祗謨麗農詞彭孫遹延露詞王士禎衍波詞董以寧蓉渡詞陳維嵩烏絲詞黃俞玉鳬詞凡十五家宋四名家詩無卷數周之鱗柴升同編之鱗字雪蒼海寧人升字錦川仁和人楊氏五家文鈔十二卷楊長世及其從子以睿以儼從孫兆鳯兆年合刻稿也長世字延㑹瑞金人官興安縣訓導以睿字維明邑諸生以儼字維莊貢生兆鳯字爾翔官上饒縣訓導兆年字爾逢官宜黃縣訓導宋詩鈔一百六卷吳之振編之振見詩集類之振自序曰自明嘉隆後詩家尊唐而黜宋宋人集覆瓿糊壁棄之若不克盡故今日搜購最難得黜宋詩者曰腐此未見宋詩也宋人之詩變化於唐而出其所自得皮毛落盡精神獨存不知者或以為腐後人喜其說之省事而地位高也則羣奉腐之一字以廢全宋之詩故今之黜宋者皆未見宋詩者也雖見之而不能辨其源流則見與不見等此病不在黜宋而在尊唐蓋所尊者嘉隆後之所謂唐而非唐也唐非其唐則宋非其宋以為腐也固宜宋之去唐也近而宋人之用力於唐也尤精以専曹學佺序宋詩謂取材廣而命意新不勦襲前人一字然則詩之不腐未有如宋者矣今之尊唐者目未見唐詩之全守嘉隆間固陋之本皆宋人已陳之芻狗踐其首脊蘇而爨之久矣顧復取而篋衍文繡之陳陳相因千喙一唱乃所謂腐也譬之膾炙翻故出新極烹芼之巧則為珍美矣三朝三暮數進而不變臭味俱敗猶以為珍美也腐乎不腐乎兹選蓋盡宋人之長使各極其致故門户甚博不以一說蔽古人非尊宋於唐也欲天下黜宋者得見宋之為宋如此或由是而疑此數百年中文臣老學遊居寢食於唐者不翅十倍後人何獨於嘉隆之說求一端之合而不可得因忽悟其所以然則是集也未必非唐以後詩道之巫陽也夫翠樓集三卷劉之份編之份字平勝里籍未詳詩苑天聲二十一篇范良撰良字眉生徽州人皇朝文獻通考卷二百三十七
