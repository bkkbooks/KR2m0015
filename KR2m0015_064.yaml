body:
  text: 欽定四庫全書皇朝文獻通考卷六十四學校考二旗學臣等謹按我朝龍興東土以武事開基其時佐命功勳英賢俊傑自宗室懿親外八旗滿洲類皆應運篤生初不盡讀儒書而恭敬朴誠之性忠義勇敢之氣竒傑卓犖之才翼聖效命以建非常之績古之名臣儒將有不逮焉逮入關大定釋甲􅌢弓從龍子弟日以繁昌後乃稍趨於文矣然文皇帝初令讀書惟以講明義理忠君親上為訓不廢武事也開國時始敕八旗子弟入監讀書設立官學考録通文義者附入順天府學與漢人同應鄉會試而國書國語步射馬射輒令兼習其有偏尚文學怠於習武者必奉旨嚴飭焉列祖愛養裁成至周且渥矣世宗憲皇帝以旗下生童多出勳閥而肄業又兼騎射制義順天司鐸者往往不能董率特詔立滿洲儒學集八旗科目出身者試於廷而充其任月課文於貢院較射於太學於是學者咸知文武並重而握槧操觚之士悉抱彎弓躍馬之能而有成德逹材之用蓋我朝家法先實行而後文藝以植綱扶倫為本以經方致用為要以弧矢之利威天下不汲汲於敷華馳藻而文運彌隆以故淳龎茂美之化藴蓄纍積迄於今而彌盛也我皇上以聖繼聖重念肇基慮八旗之漸染浮薄也時為洗除而懲艾之疊頒訓諭以尊君親上之義敦本務實之行諄諄教誡將挽浮華而復古初遵舊章以收實效所謂勸學修禮崇化勵賢以風四方為太平之原者其在斯乎至若景山與咸安宫並崇官學蒙古及漢軍學兼設教習兵丁子弟世職幼童近而盛京逺而船厰黑龍江官學義學規制具備此又聖朝教育八旗垂一視同仁之意於無己者也臣等謹類列於左方天聰三年考試生員文藝上欲振興文治特諭諸貝勒府以下及滿漢蒙古家所有生員俱令赴考各家主毋得阻撓尋命諸臣公同考校分别優劣一等者賞緞二匹二等三等青布二匹俱免二丁差徭五年命諸貝勒大臣子弟十五歲以下八歲以上者俱令讀書互見宗學門崇德六年考試滿洲蒙古秀才賜一等秀才各緞一匹青布二匹二等秀才各緞一匹青布一匹三等秀才各青布二匹順治元年命滿漢官員子弟入監讀書詳見太學門又立八旗官學八旗分為四處各立官學一所用伴讀十人勤加教習每十日赴國子監考課一次春秋演射五日一次詳見大學門又酌取京省生員教習八旗子弟月給米二斛以資養贍至十二年令禮部會同國子監於監生中嚴加考試選補教習至十七年定八旗教習用恩拔副歲貢生其準貢例貢不準考取又定官學生分滿漢書學習之例初令八旗每佐領下各取官學生一名以十名習漢書餘習滿書至是又各增取一名於原額習漢書外加用十名餘俱習滿書詳見太學門八年吏部奏言八旗子弟率多英才可備循良之選但學校未興制作未行耳先帝在盛京愛養人才開科已有成效今日正當舉行臣等酌議滿洲蒙古漢軍各旗子弟有通文義者提學御史考試入順天府學鄉試作文一篇會試作文二篇優者準其中式照甲第除授官職則人知向學進取有階矣尋定滿洲蒙古漢軍子弟共取生員三百名內滿洲一百二十名蒙古六十名漢軍一百二十名其滿洲蒙古子弟令內院禮部會同考試通滿漢文者翻譯漢字文一篇通滿文者作滿文字一篇漢軍子弟令順天學院考試與民童一同出題又定考試滿洲蒙古翻譯秀才之制凡滿洲蒙古考試能通漢文者翻漢文一篇未能漢文者作清文字一篇童生名册俱由國子監造送順天府轉送內院會同在貢院考取九年定漢軍廩增及歲貢各額廩生二十名增生二十名不論旗分聽學院考取歸併順天府學照例每歲起送貢生二人其漢軍廩生俱有圈撥地畝不給廩餼十一年定察驗官學生之例八旗每佐領下選官學生各一名禮部會同監臣詳加察驗如學業無成者各歸本旗仍於本佐領下選擇頂補以後三年一次著為定例互見太學門十二年禮部議準吏部啓心郎苗澄韓世琦疏言八旗子弟應選兼通滿漢文義者各一員令其教習三年考核一次如果教習有成將該員升遷紀録如不盡心聽吏部議處互見太學門十三年減定考取生員額數滿洲減四十名存八十名蒙古減二十名存四十名漢軍減二十名存一百名十四年奉上諭我國家創興全賴治兵有法今見八旗人民崇尚文學怠於武事詳究其原皆由限年定額考取生童鄉會兩試即得升用各部院衙門考取博士及筆帖式徒以文字由白身優擢七品官得邀俸祿未幾又升副理事主事等官得免從軍之役各部院衙門一事數官以致員缺居多無不樂於部用今後限年定額考取生童鄉會兩試俱著停止停止考試滿洲蒙古翻譯秀才令八旗滿洲漢軍每佐領下出一人讀書蒙古合兩佐領下出一人讀書詳見太學門至十八年又定滿洲漢軍每佐領下各增官學生一名各出二人讀書一習清書一習漢書康熙六年復定考試滿洲蒙古漢軍生童先是順治八年定滿洲蒙古考試生員舉人進士者能通漢文翻漢文一篇不能者作清文字一篇十四年停止考試至是復定八旗有願作漢文考試者各都統開送禮部移送順天學院以滿洲蒙古另編一號漢軍與漢人同場考試文優者即入順天府漢生員數內其清文翻譯停止又停舉人考補八旗教習例至十二年仍用恩拔副歲貢生停止舉人官廕考用九年吏兵二部遵旨議定內務府一品官子弟許其承廕二品至四品各廕一子入監讀書詳見太學門又選八旗官學生各十名交欽天監分科學習詳見太學門復定八旗取進生員額數順治八年定滿洲生員一百二十名蒙古生員六十名漢軍生員一百二十名嗣經改定滿洲八十名蒙古四十名漢軍一百名至是復定滿洲蒙古生員各四十名漢軍生員四十名至二十六年復減漢軍生員二十名更定開送官學生之例先是順治十八年止令武官及甲兵子弟開送官學生至是題準不論文武官員子弟皆令本佐領開送選補十一年裁各佐領下官學生一名十六年題準官學生以生員俊秀選補如本佐領下無生員俊秀始補間散人詳見太學門令滿洲蒙古漢軍應試者禮部先行轉劄順天府府丞録取移送學政考試十年定滿洲蒙古生員廩增歲貢之例時漢軍照舊例出貢滿洲蒙古既作漢文一體考試亦應照漢軍例設廩生二十名增生二十名每年出貢二名又令選拔八旗生員詳見太學門於新舊生員內通行選拔文行兼優者滿洲蒙古各起送二名漢軍二名二十四年令滿洲蒙古選拔二名漢軍選拔一名三十六年亦如之十一年裁定八旗官學生額數滿洲漢軍先經奉旨每佐領下各裁一名至是議準蒙古仍於二佐領下合留一人十二年賜八旗官學大學衍義各一部又定盛京旗下子弟得與盛京民童一體考試生員例滿洲蒙古編滿字號漢軍編合字號考取滿洲蒙古生員三名漢軍生員二名定八旗照漢人生童歲科兩考例向例於鄉試前一年八月考試一次至是改定歲科並行十五年議政王大臣等議覆禮部疏言朝廷定鼎以來雖文武並用然八旗子弟尤以武備為急恐専務習文以致武備懈弛今值用武之際若令八旗子弟仍與漢人一體考試必偏尚讀書有誤訓練現今已將每佐領下子弟一名準在監肄業亦自足用除現在生員舉人進士録用外嗣後請將旗下子弟考試生員舉人進士暫令停止應如所請從之二十五年設立景山官學先是二十四年奉上諭看來內府竟無能書射之人應設學房簡選材堪書射者令其學習視其所學簡選好者録用不及者即行革退其學房著在朕常見處設立學習人等自然盡心應何處設立著即議奏至是議定建於北上門兩旁共給官房三十間滿官學三房漢官學三房清書每房設教習三員漢書每房設教習四員挑選內佐領內管領下官學生三百六十六名入學肄業生員內有願為教習者選擇移送令教習三旗子弟又將內廷執事人間散人內老成堪為師長者不分滿洲蒙古漢軍人員著挑選九名教習滿書滿教習食執事俸米漢教習給銀米衣服等物六年限滿分别勤惰議敘授官二十六年詔八旗子弟準與漢人一體考試互見太學門滿洲蒙古取進童生照舊例四十名漢軍減去二十名盛京八旗滿洲蒙古取進生員三名漢軍取進生員一名至三十年又增奉天滿洲蒙古生員各三名共六名漢軍生員二名共三名二十八年令考試滿洲生員并試騎射並諭考取舉人進士亦令騎射倘將不堪者取中監箭官及中式人一併治罪復定漢軍生員補廩出貢例定例漢軍設廩生二十名增生二十名每年出貢二名至是改設廩生十名增生十名每年出貢一名二十九年嚴八旗童生考試馬步箭法凡八旗子弟讀漢書者由童生考取生員時仍令射馬步箭能者方準入場㨂選內閣中書善書射者三名於景山官學教滿書行走食中書俸仍照常升轉三十年設立盛京官學於左右兩翼各設官學二所各旗選取俊秀幼童十名每翼四十名滿學內各二十名教讀滿書漢學內各二十名教讀滿漢書并習馬步箭盛京禮部堂官稽察操演其滿學內設滿文助教一員漢學內設通滿漢文助教一員俱由吏部考授其漢學於盛京生員內才學優長者今奉天府府尹各選二名令其教讀學舍由盛京工部撥給至漢學取生員教習如係廩生既充教習停其支給廩糧照京師八旗教習之例給倉米十二石由盛京户部支給設立八旗義學凡八旗子弟十歲以上者各佐領於本佐領內各選一人滿洲幼童教習滿書滿語蒙古幼童教習滿洲蒙古書滿洲蒙古語漢軍幼童教習滿書滿語並教習馬步箭仍令各佐領驍騎校稽查又定奉天府滿洲蒙古漢軍考取生員者先行驗射馬步箭照京師八旗之例於未入場之先令奉天將軍副都統等考驗能者方準應試三十一年增選官學生二十五年挑選內佐領內管領下官學生三百六十六名至是又於新添內佐領內管領下增選官學生定為三百八十八名至三十四年又奏準於新添滿洲佐領七員漢軍佐領六員內管領三員下挑選如額三十三年增定八旗滿洲蒙古漢軍入學額數舊定滿洲蒙古原額取生員四十名至是鑲黃等三旗內府滿洲佐領管領并五旗王府內滿洲佐領俱歸併八旗滿洲蒙古考試將八旗滿洲蒙古生員量增二十名共取進六十名八旗漢軍原額取生員二十名至是鑲黃等三旗內府漢佐領并五旗王府內漢佐領俱歸併八旗漢軍考試將八旗漢軍生員量增十名共取進三十名三十四年定黑龍江將軍所轄兩翼設立官學例鎮守黑龍江等處將軍所轄官兵內有新滿洲西伯索倫逹呼爾等於墨爾根地方兩翼各設官學一所設教官各一員將新滿洲西伯索倫逹呼爾及上納貂皮逹呼爾等每佐領取俊秀幼童各一名教習書義應補教官之人該將軍選擇學問優長者將姓名咨送吏部其教官照京師例稱為助教學舍由該將軍撥給又增盛京八旗取進生童額數先是三十年增取滿洲蒙古六名今增四名共十名漢軍原增取三名共五名三十五年定盛京千丁家子弟考試生員例千丁家有佐領官品級者有監生部用年滿考職者其子弟俱準在八旗漢軍內一同考試三十六年停止盛京八旗內府佐領子弟考取生員例其三十四年添取滿洲蒙古生員四名漢軍生員二名額數俱行裁減四十四年賜八旗官學古文淵鑑各一部四十八年命八旗漢軍包衣人等考試武生凡八旗漢軍包衣無品級筆帖式烏林人由官學生補授之外郎間散人等有嫻習弓馬願考試武生者該旗移送順天府照例考取八十名準應鄉試四十九年增廣奉天八旗廩增額數除府學廩增十名不必加外滿洲額設廩增一名各加三名漢軍額設廩增一名各加一名五十年以八旗官學生分撥國子監助教詳見太學門五十二年選取新科進士老成者三名教習景山官學生期滿升用內閣中書初設算學館選八旗世家子弟學習算法以大臣官員精於數學者司其事特命皇子親王董之五十五年定福陵千丁子弟入學例時禮部題昭陵副關防西蘭泰等咨稱昭陵千丁效力七十餘年懇照福陵千丁子弟例一體考試入學應如所請又奉天合字號童生額進三名今漢軍人數漸多又福陵昭陵千丁子弟準與漢軍一體考試應將漢軍取進之額量增一名從之至五十七年并定永陵千丁子弟亦準照例行雍正元年命八旗滿洲蒙古生員有在護軍執事人披甲上行走者俱著退回讀書月給銀二兩米二斛選拔八旗貢生照康熙三十六年例行七年十三年亦如之恩詔滿洲蒙古照兩大學廣額十四名漢軍照一大學廣額七名其奉錦二府滿合字號六名者加六名四名者加四名後不為例又定滿洲童生照漢軍考武之例先是康熙四十八年初令八旗漢軍考試武生至是併遵旨議準滿洲童生亦照漢軍例額取武生四十名至十二年四月停止定景山官學生俱於佐領內管領下間散人挑取每月給紙筆銀兩增設盛京滿洲蒙古漢軍儒童入學及廩增生額數時以八旗內府佐領下子弟復同滿洲蒙古漢軍一體考試議準照康熙三十四年加額例滿洲蒙古於原額外再增四名共取十名漢軍於原額外再增二名共取五名合康熙五十五年所增千丁子弟入學一名共取六名向例盛京八旗考試滿字號入學六名其廩增額各四名合字號入學四名其廩增額各二名今添入內府佐領下子弟考試既滿字號加四名共取十名合字號加二名共取六名其廩增額亦著照前二名取一之例將滿字號加補二名合字號加補一名至二年以奉天滿合字號應試者多其滿字號再增一名共取十一名合字號再增二名共取八名又定教習期滿例先是康熙五十二年以新進士老成者選補景山教習期滿以內閣中書用至是定內廷教習以進士考補八旗教習以進士與恩拔副歲貢生分缺間補六年期滿進士照扣缺進士例即用貢生仍照舊例以知縣揀選尋議進士教習升授中書甚速不待更換難覩成效嗣後雖補中書仍令在學教習六年期滿以中書應升之缺即用臣等謹按是年恩科進士教習至乙巳三年期滿有照庶吉士散館例授編修檢討者餘授主事中行評博知州知縣等官此出自特恩非定例也定舉人及恩拔副歲貢生考取教習之例三年期滿咨送吏部以應升缺補用復行考試滿洲蒙古翻譯秀才之制上諭八旗滿洲等除照常考試漢字秀才舉人進士外在滿洲等翻譯亦屬緊要應將滿洲另以翻譯滿文考試秀才舉人進士尋議定滿洲蒙古能翻譯者三年之內考取秀才二次臨期視應考人數多寡請旨以滿洲翰林侍讀部院郎中等官由清漢文出身精通翻譯者欽點學政其考試之童生都統備送旗分佐領三代履厯年貌清册咨送禮部考試馬步箭送學政於貢院內考試將四書直解內限三百字為題翻滿文一篇又以新奉特恩恐學習之人尚少於本年十月考取生員一次二年五月再行考取生員一次又立八旗教場官學八旗都統等議覆教場內居住兵丁人等無力延師教訓子弟者請於各教場俱設一學選擇老成善清書清話能教騎射者二人令其教習各都統等揀擇地方交與該部造房五間以為學從之又設立八旗蒙古官學每旗設立一學揀選能蒙古書話者教習子弟於每佐領下擇可學者一人令其肄業其助教員缺交吏部會同理藩院考取引見補授再於八旗前鋒護軍領催馬甲內擇其能蒙古書話者令協同助教教習其協同教習之人遇助教缺出由理藩院揀選考取擬定正陪送吏部引見補授其肄業人等準其考試以蒙古筆帖式補用又設立八旗學堂恩詔養育人材首以學校為要宗室內有俊秀情願讀書及八旗秀才童生內或有家貧不能延師讀書者宜各設立學堂一概教育尋禮部議得八旗設立學堂分左右翼每翼各於公所設立學堂二所各設漢書教習二員滿漢書教習二員旗人內有家貧不能延師之秀才童生情願讀漢書者令入漢學堂學習情願讀滿漢書者令入滿漢學堂學習其漢書教習於吏部咨取守部舉人於國子監咨取恩拔副歲貢生其滿漢書教習於八旗咨取恩拔副歲貢生臣部奏請簡命大臣考選才學優長清漢精通者充職三年期滿咨送吏部舉人照留京進士教習之例以應升之缺即用貢生照國子監教習之例以應補之缺補用其學堂於兩翼現有官房由該管處奏聞撥給四所由工部修理書桌椅凳等項亦由工部置辦臣部派司官二員専管臣等亦不時稽查學習生童內有不肯専心誦讀不聽教誨者即行懲責不許復入學堂教習內有不肯盡心教導或行止不端者指名參革其教習照內教習之例每月給錢糧二兩每年給米二十四斛奉旨依議其稽查與翰林院衙門會同嚴查不可推諉二年建先師孔子廟於歸化城遂設滿學左右兩翼各置教官一員嚴考校八旗生員法該旗都統於歲考前將領錢糧各生備造清册咨部轉送學政照考漢生員例考居前等者照常領給居四等以下者停其給發遇下次考居一二三等照漢廩生開復例仍給原領錢糧如四等不願再考即將學册除名聽其復歸護軍驍騎當差又辦理船厰事務給事中趙殿最條奏船厰地方應設學校令滿漢子弟讀書考試上以烏喇寧古塔兵丁不改易滿洲本習忠孝廉節之行勝於漢人之讀書而不能行者今若崇尚文藝恐武事既廢文事又未能通特諭爾等宜専令兵丁人等各務實行勤學武略以敦儉朴之習勿強其所不能而徒事虛名也并諭在京八旗人員子弟雖教以讀書亦不可棄置本習定盛京八旗官學教習兼考恩拔副歲貢生充補舊例於奉錦二府屬生員內考取今以各學生員就考者少將奉錦二府屬恩拔副歲貢生併生員一體考補三年期滿照舊咨部敘用增設八旗生員廩增額數時以滿洲蒙古入學六十名廩增各二十名漢軍入學三十名廩增各十名入學數多廩增額少且八旗人文日盛學者甚多因定於原額外滿洲蒙古加廩增各四十名漢軍加廩增各二十名又定八旗文武生員規避歲考之罰凡八旗生員歲考行文該旗都統交各佐領催赴考試如有告假患病緣事及隨任等情令其預行呈明該教官詳查確實申報學臣照例補考若有無故不考者革退其八旗滿洲蒙古漢軍武生亦照文生員歲考例舉行至年老有疾者俱準其告休給與衣頂注册三年更定奉天府滿字號廩生出貢之例向例補廩補增俱按考試名次奉天府滿字號額設廩生六名五年一貢積三十年方能出貢實為淹滯今改為三年一貢以示鼓勵定考取景山官學教習例由禮部移咨吏部國子監將候選舉人并監中恩拔副歲貢生人等具奏欽點大員考取三年期滿授官又定盛京滿洲蒙古漢軍生員月課季考例時以幅􅊷廣濶其滿合生員共一百十九名俱𨽻奉天府學實則諸生散處千里之內教官無從稽察令嗣後移咨將軍衙門查明該生居址撥相近之州縣儒學官月課季考報舉優劣與本學民籍生員一體約束遇歲考之年令該學申送府丞衙門考試一案發落託故不到者除名定盛京八旗童生考試例先令該將軍查明各童生居址咨送府丞取進撥歸附近州縣等學四年設八旗學滿洲教授訓導官於滿洲進士舉人貢生內考試擇其文理優通者擬定正陪咨部引見補授係進士舉人以為教授係副榜貢生以為訓導令其每月考試文章兼考騎射如生員有文理不通行止不端者令該教授即詳學臣革退如教授等有懶惰溺職者令學臣順天府府丞題參又設船厰等處地方教職船厰地方添立永吉州設學正一員寧古塔地方添立泰寧縣白都納地方添立長寧縣各設教諭一員俱𨽻奉天府管轄裁汰武學漢武生屬之儒學八旗武生屬之滿洲儒學五年奉上諭士子讀書應試須専心講習方可望其成就八旗舉人生員內在護軍執事人行走者朕念其用度艱難恐致紛心是以於雍正元年特加殊恩令其退回仍賞給錢糧養贍俾得専心讀書勉勵上進庶國家可收得人之益今已三年有餘其中或有年力衰邁及不肖之人徒領錢糧無志上進虛糜國帑者亦未可知若不加考課分别勤惰無以鼓勵人材著查弼納查郎阿於會試後將八旗滿洲蒙古舉人生員漢軍舉人查明人數請題考試其考試官將應行開列人員請旨派出分别等第並驗其人品優劣具奏又定旗員帶十八歲以上子弟隨任之禁旗員十八歲以上子弟留京習學弓馬如可以習文者入官學讀書廣各旗官學學舍先是每旗官學共十三四間不等至是議準每旗别給官房一所二十餘間可容百人誦習者著該旗修理俾諸生肄業其中六年定蒙古及唐古忒官學生各例蒙古官學生以各部院蒙古筆帖式補用唐古忒官學生由理藩院考試翻譯蒙古唐古忒字話唐古忒升至主事員外方許出學其蒙古唐古忒官學生補用中書之例停止蒙古監生內有學習漢文情願考試滿漢翻譯者令其考試仍以筆帖式補用七年設立咸安宫官學先是六年上諭咸安宫內房屋現在空間看景山官學生功課未専於內府佐領管領下幼童及官學生內選其俊秀者五六十名或百餘名委派翰林等即著住居咸安宫教習彼處房屋亦多且有射箭之處其學房住房爾等酌量分隔修理著令居住再挑選烏拉人幾名於伊等讀書之暇令其教授清話弓馬伊等皆係幼童有欲帶僕人者準其各帶一人幾日後著回家看往一次如是訓導其上進之子又加勤學庶可得收堪用之材至伊等所需飲食紙筆弓箭並騎射之馬作何官給之處爾等妥議具奏至是總管內務府議奏於景山官學生佐領管領下自十三歲以上二十三歲以下之俊秀幼童可以學習者選得九十名於咸安宫酌量修理讀書房屋三所每所各分給三十名令其讀書其教習著翰林院於翰林內㨂選九人每所分派三人令其勤加督課其教授清話弓馬之人於烏拉人及舊滿洲內挑選九人每所分派三人於諸生讀書之暇教授諸生清晨入學日暮散歸如遇雨水祁寒之際有情願在內者即著居宿其教習等如果教授有方三年將翰林等奏請咨送吏部議敘將教授清話弓馬之人升用疏玩者題參學生內有懶惰不肖者革退其教習給與銀米衣服及諸生膏火與需用一切俱倣照景山官學之例又令八旗佐領世職人員子弟得入義學肄業八旗滿洲蒙古漢軍內有未及年歲尚未上朝之佐領世職人員俱令入各該旗義學肄業其不在本旗地方居住之員令該都統將伊之佐領並職名移咨現任之旗分都統處即著就近入彼旗義學又定八旗參領佐領考試童生之例旗下考試童生向來參領佐領無考取之例只據本人所具之呈轉呈都統咨送學院至是改定凡旗下考送童生亦照外省考試之例先於本佐領考取送本管參領該參領考取轉呈本旗都統咨送學院俟入場之日令各該管佐領率同領催送考搜撿入場以杜頂名代考夾帶等弊從之至十年又定八旗童生遇考試之年由部行文各該旗參領造册申送本旗都統擬定考試日期行文翰詹衙門取科甲出身滿官一員在該旗公所會同參領佐領考試應試童生聽該佐領點名識認以杜頂冒試竣仍將録取童生數目呈都統造滿漢清册送禮部轉送兵部考試騎射又定清查八旗童生考試騎射名册及臨期驗看之法八旗遇考試生員舉人進士之時俱令射馬步箭禮部行文該旗咨取考試人等名册該旗即將姓名年貌清查造册送至禮部禮部即會同兵部將應試人等之旗分姓名年貌明白查對若該旗故意遲延有逾定限者禮部即據實參奏若係該旗遺漏錯誤者監箭大臣等查明參奏其遺漏之人仍令考試再凡遇考箭及入場考試之時每旗派參領一員每甲喇派章京一員令每佐領渾托和下之領催等將考試之人帶往參領前認識驗看再將派出之參領章京領催等職名及考試人等名册一同送往禮部禮兵二部查對檔案之時亦將伊等傳往公同查對俾不得遺漏錯誤射完入場之時亦令原派出之參領章京領催等驗看送入若派出之員有不去者該部即行題參治罪停止八旗童生十五歲以下者考試馬射舊例十五歲以下者俱令考試騎射至是以年未及壯力不勝馬者甚多祗令考試步箭其情願兼試騎射者聽設立漢軍清文義學正藍旗漢軍副都統條奏漢軍子弟宜學習清書請每旗各設義學一所令該旗滿洲都統會同漢軍都統於滿洲間散官並筆帖式或因公降革人員內擇其精通清文者充補教習并於漢軍本旗內揀選善射者一二人教習弓箭其教習人員每月給與公費糧米仍令該旗派章京一員稽查課業其肄業子弟如有文理精通願考翻譯者不拘間散俱準赴吏部考取筆帖式其文理粗通弓箭可造者聽其在本旗挑補領催兵丁以備抄録檔案之用有志上進情願在學肄業者聽三年之內教習勤者將教習人員分别議敘從之又立滿洲蒙古清文義學除八旗漢軍餘丁入滿洲義學教訓外其滿洲蒙古旗分俱於旗下官房內每甲喇選擇五間令為學舍若該旗無房於他旗附近之房選擇五間立為學舍於每旗前鋒護軍領催馬甲內挑人老成通曉清文能教訓者二人令為師長除大臣官員子弟入官學義學讀漢書及在家學習之人員外其佐領下十二歲以上餘丁俱令伊等教訓清文清語每甲喇或章京或驍騎校派出一員令其教導倫理騎射其蒙古旗分亦照此設立學舍並教以蒙古語九年上諭內閣今見蒙古旗分人能蒙古語言翻譯者甚少沿習日久則蒙古語言文字必漸至廢棄應照考試清文翻譯例考試取中生員舉人進士以備理藩院之用如有學習漢書願就試漢文者照常準其考試於别部補用著內閣會同理藩院議奏尋議三年內考取生員二次舉人進士各一次其考試生員派蒙古提督學政一員於清字日講四書內視漢文三百字為準出題一道考試其額數著試官選擇應取試卷臨期奏請從之又選拔順天八旗生員詳見太學門十年定滿洲教習期滿分别優劣之例大學士遵旨議定滿洲教習三年期滿行走勤謹教導有成者列為一等係舉人以小京官即用貢生生員以筆帖式即用已補筆帖式之貢生生員照舉人例用列為中等者再留教習三年如教導有成帶領引見照例咨部選用不稱職者禮部查參又改設奉天府漢軍義學奉天將軍那蘇圖疏言奉天八旗漢軍設立清文義學業經三年有餘而讀書子弟不盡通曉書義良由事非專設兼未得善教之人所致請將奉天八旗漢軍二十四佐領內每兩旗合為一學共立義學四所每學設清文教習一員以司訓課事下部議尋議準每旗選取漢軍子弟十五名兩旗一學計每學各三十名選學官教習滿漢書及馬步箭奉天將軍司其事立教場漢書官學上以圓明園兵丁氣象甚優特諭果親王等賞給教習令伊等子弟學習漢書尋議覆八旗及內府三旗營房向因地勢建造故相隔逺近不一今當視營房之逺近建造查得鑲黃正黃正白鑲白四旗營房相近應造學舍一所設教習二名正紅鑲紅營房相近應造學舍一所設教習一名正藍鑲藍營房相隔較逺不便設立一學應每旗各造學舍一所各設教習一名其內府三旗既同一營房應造學舍一所設教習一名共造學舍五所挑取教習六名其教習於八旗及內務府生員內擇其能訓誨者六名令為教習著四年一換每月給伊等錢糧二兩每年三季共給米二十一斛二斗其中如有善於教訓誠屬優等者咨行吏部即以筆帖式補用其平常者駁回該旗其教誨甚劣者將生員革退其缺另行挑取得旨允行十二年禁八旗生員遇考規避之弊凡係駐防隨任及患病不能赴考者本旗查明知照學臣飭發教官造册稽查倘有規避照例除名該管各官扶同隱徇者議處其旗人有借端需索髙下其手或現在京師混稱駐防隨任或已經考試仍不放回原處者該都統即行糾參又定咸安宫景山官學生限年考試分别勤惰之例先是六月翰林院侍讀學士保良奏咸安宫官學自雍正七年開學以來迄今五載除新補學生外內有中式舉人副榜者四人有考中生員補廩者二十三人有兼習清書稍知翻譯者十三四人其餘雖質學不等然皆略明大義弓箭俱有可觀但諸生學習日久年紀漸長二十以外者十有四五若不限以年分考試别其優劣無以示勸懲查宗學有五年一次考試之例今立學已屆五年伏祈定限派員考試著為永例得旨內務府總管等議奏至是議覆除陸續後進學生內不能應考者不令考試外其應考之學生令管理官學翰林官員等查明開送其考試官由吏部開列職名奏請派大臣一員司官一員內務府司官一員分為三日考試第一日考試漢文擬以四書二題第二日考試翻譯楷書清字擬以上諭各一段第三日考試騎射步箭考試清漢文義擬於掌儀司衙門考試騎射步射擬於正黃旗侍衛教場其監察官員派內務府護軍統領一員護軍參領二員酌量派出護軍查看考試之學生定為三等一等二等者由考試官具奏將伊等作何録用之處臣衙門請旨定奪三等者仍留學讀書肄業其年紀長大資質愚鈍不能上進者即行革退請以此著為定例五年一次派員考試永逺遵行再查景山官學亦請照此例行從之設咸安宫翻譯教習原設清話騎射教習九缺內扣除三缺改補翻譯教習由部考取助教三員令其教習翻譯清書五年期滿交部議敘增設算學教習十六員每旗官學擇資質明敏者三十餘人令精於數學者教授算法定以未時起申時止選拔八旗生員嚴外省駐防子弟入京考試頂冒之弊凡外省駐防人等赴京考試令各省駐防之將軍城守尉等預先取具本人三代年貌造具滿漢清册聲明係某旗某佐領下人出具保結咨送該旗再將該生之年貌注明出具印文給發本人親齎投遞在京該旗該旗憑印文查對造册報部考試十三年定八旗童生考試取具廩生認結例各該童生報名旗分照漢學例取具本旗廩生認結都統將名册一齊送部及學臣考試時令滿學教官二員帶領各廩生當堂識認倘有頂替將廩生一體治罪乾隆元年恩詔滿洲蒙古漢軍童生照雍正元年廣額例取進其奉天八旗滿字號加取五名合字號加取三名增定八旗官學生事宜八旗世爵年二十以下者分撥各旗官學一同教習三年期滿該旗大臣考試分别等第引見録用每學增漢教習一人各撥騎射教習一人其應給月費照例支領二年頒發欽定四書文各五部於八旗官學復定簡選新進士充補咸安宫教習之例向例於舉人貢生內考取充補至是遵旨議定令新進士願充者報名禮部會同吏部簡選引見記名充補三年期滿該總管將稱職之員分别等第引見授為主事及即用知縣恭候欽定至二年又定咸安宫漢教習仍於新進士內考選充補不足令舉人考選充補期滿分别引見進士以主事知縣即用舉人以知縣教職即用三年停止官學生學習算法之例詳見太學門定年未及歲留學讀書之例凡八旗世爵在官學教習三年期滿而年未及二十歲者仍留學讀書四年命考試八旗童生馬步箭設景山官學稽察官於兼管官學司官五人內専委二人令其每日在學稽察停其外差官學生按月支給膏火三年一次奏委官考試一二等者以筆帖式庫使用三等留學四等黜退定八旗義學師生月給茶炭銀兩例每學師生每月各給銀三兩以為茶水煤炭之費定咸安宫官學事例凡選官學生於內府三旗及外八旗各滿洲貢監生員官學生與間散人內擇其俊秀者充補其肄業無年限至成進士及挑取侍衛考得中書等官方出學在學者三年一朝考清漢文各分三等一二等帶領引見以七品八品筆帖式補用數名外其餘考列一二等者賞緞匹筆墨有差仍歸學肄業定八旗欠考生員補試注册例八旗生員如有患病事故欠應歲考定限科試補考仍有事故下次嵗試補考統令該管官詳察嚴催限內補試至各省駐防隨任之生員有來京應試者即令補行歲試其因路遙及有事故不能鄉試者仍令該教官造具清册注明某生駐防某省某生駐防某處加結申詳學政存案至隨任回旗仍按欠考次數照例補考嚴定八旗義學課程除委禮部司官每月稽考外仍令諸生每季到部考課翻譯經義背書寫字皆詳注等第册籍歲終分優劣以定去留清釐滿洲漢軍籍貫嗣後內府王公府屬人員考試之時內務府及八旗滿洲都統務嚴飭該管官逐一稽察其投充莊頭子弟及內管領下與下五旗王公府屬旗鼓佐領內之舊漢人均别册送部歸入漢軍額內考試有將應歸漢軍考試之人造入滿洲册內咨送者將該管都統佐領照蒙溷造册例治罪六年選拔八旗貢生嗣後定十二年舉行一次定八旗開户停考試例先是雍正十三年定八旗開户人等準其考試至旗下纍世家奴實屬出身微賤其本身及子孫考試永行停止至是又定八旗投充養育俘獲人等曽在主家服役開户之後究有主僕之分其子孫應不準考試至别載册籍人户奉旨準其居官考試及抱養人民本係良家者均準考試外其餘概停考試八年令八旗各學教習填注功課册凡官學漢教習每員給印册二本該教習將三年內所教學生若干名並學業功課詳細填注俟期滿時一册交新教習收存照例填注一册呈送該管大臣察核如實心訓課著有成效者列一等其訓課勤謹稍獲成效者列二等出具考語繕單引見分别録用十年增定奉天漢軍考試例盛京工部所屬五六品官及司匠所屬之千丁與四品所屬之千丁俱準其入於奉天漢軍內考試定甄别蒙古教習之例五年一次考核蒙古教習其不能教導者斥令歸旗當差其為人明白能實心訓課者分别等第填注考語引見恭候簡用十一年定考取滿洲教習之例欽點大臣考試翻譯題一道漢文論題一道清漢文兼優方準録取充補十六年定選拔八旗生員條例順天學政選拔八旗生員於鄉試前奏請欽命大臣會同覆試驗看奉天由府丞選拔會同府尹在公所覆試驗看裁八旗官學增設之漢教習一員禮部奏言八旗世爵既經於兩翼設立官學教導將見在官學肄業之世爵子弟咨回各旗外所有八旗官學增設之漢教習各一員相應裁汰教射教習亦咨回本旗行走從之定選取教射教習例禮部奏定教射教習既經咨回則每學教習未有専員蒙古教習每學見設二人但蒙古學生止二十人內有他處行走例不開缺嗣後止以一人教習國書國語以一人教習騎射行文該旗遴選語音嫺熟弓馬可觀者充補二十年上以近來滿洲漸染漢人習氣稍解章句即妄為詩歌語言誕謾且有忘本矯誣失忠敬朴誠之素者特諭滿洲未嘗讀書素知尊君親上之大義即孔門以詩書垂教亦必先以事父事君為重若讀書徒剽竊浮華而不知敦本務實之道豈孔門垂教之本意况借以詆訶諷刺居心日就險薄不更為名教罪人耶著通行傳諭八旗務崇敦朴舊規倘有託名讀書無知妄作哆口吟詠自蹈囂凌惡習者朕必重治其罪二十二年更定出旗為民子孫準入民籍考試例是時八旗開户人等奉旨俱令出旗為民部議應將另記檔案之文武舉人生員貢監翻譯舉人生員等仍照從前舊例原係另戶抱養民人為子者歸入民籍後仍準考試如本係家奴開户另記檔案者其本身係文武舉人生員貢監翻譯舉人生員止許頂帶終身不準再行考試再此項人等既經出旗為民所有子孫應各照民人例辦理從之又定考取咸安宫翻譯教習之例咸安宫滿教習例由八旗翻譯進士舉人考取補用嗣經停止鄉會試將從前翻譯進士舉人陸續就選不敷考試至是奏準將各部院筆帖式內精通翻譯者一體考取充補期滿照翻譯進士充補教習之例議敘其現任筆帖式充補教習者仍食原俸又定八旗考試生員舉人停止監試看閲騎射上以考試生員舉人幼子頗多臨考之時苟且演習監試大臣亦不甚詳加閲看徒屬具文特諭嗣後停其看閲考試人等騎射由舉人考試進士時俱係成丁之人而旗人之騎射係伊等熟習之事著監試馬步箭若馬步箭不好即將名開除不準考試二十三年御史湯世昌參奏學政莊存與考試滿洲蒙古童生因不能傳遞擁擠閙堂上以滿洲蒙古童生皆世受豢養之人乃不知遵奉教約恣效外省惡習此於八旗風俗大有關係不可不嚴行根究而派出查審之大臣不能不有意瞻徇當經親臨覆試隨獲懷挾夾帶諸弊因復親加鞫詢遂得包攬傳遞倡議閙場及附和各犯實情除將狂悖無禮之首犯降旨正法外其附和閙場及搜出懷挾又復強辨之犯俱著發往拉林種地至隨從閙場及夾帶草稿字片之童生四十人責訓示懲著在旗披甲不準考試滿學教授臨時既不能約束而大臣等詢問伊尚含糊不肯吐實著發往熱河披甲至代倩作文骩法網利之犯胡君治等並按律重擬奉上諭滿洲風俗從來淳朴八旗子弟務以學習國語専精騎射為事即欲學習漢文亦當潛心誦讀量力應考若自揣不能成文而徒以傳遞懷挾妄冀僥幸功名是方其學習漢文時已視為玩法舞弊之具人品心術尚可問耶以後滿洲蒙古現任三品以上大臣之子孫及親兄弟子姪有應試者俱令自行奏聞必國語騎射皆有可觀方準入場考試並照鄉試之例請派監試御史及監場都統各員前往彈壓裁禮部義學是時御史閻循琦參奏稽察義學之禮部堂官殊屬疏忽義學師生曠功廢業請旨議處奉諭國家設立學校原以教育人才乃自設立義學以來不過僅有設學之名而無教育人才之實且設有咸安宫國子監官學復加恩於左右兩翼各設教訓世職官學則八旗有志讀書者儘可於此等官學內肄業似此有名無實之義學適足為貽誤旗人之地所有義學著即行裁去仍交管理咸安宫等處官學及世職官學之大臣官員務期實力教育人才以國語騎射技藝為訓課之要即有讀書者亦必責實務本其浮華陋習俱令嚴切屏除斷不可僅務虛名而忘實效該部堂官交部察議又定盛京八旗子弟考試例三品以下官員及間散人之子弟俱由該佐領保結轉送將軍衙門先考國語騎射俱有可觀再送治中考試漢文嚴加甄别録送除府丞照例咨明將軍派協領彈壓外並咨禮部侍郎派司官一員將軍禮部侍郎仍親身前赴學院衙門會同府丞搜檢彈壓二十四年初設考試八旗童生監試彈壓官學政預期行文都察院奏請欽點滿漢御史各一員監試兵部題請欽點副都統各一員參領章京各二員入場彈壓各員於考試日淨場後俱各散歸不必留宿二十六年更定咸安宫滿漢教習向設翻譯教習三員漢教習十二員至是因翻譯學生倍於往日奏準裁去漢教習三員所裁之缺即增補翻譯教習三十年奉上諭前經降旨八旗三品以上大臣子弟果有嫻熟國語練習弓馬者遇考試之期該父兄自行奏明準其入闈原因八旗淳朴素風近來未免沾染虛浮艷心詭遇且從而釣弋其名淵藪其弊是以示之節制俾知崇實黜華非概從禁制遏其進取之途也乃邇年來八旗大臣竟無奏請子弟應試者未免多生顧慮因噎廢食伊等既不潛心力學而國語騎射又未見専攻嫺習頓覺出色自不如兼收並進猶可為造就之資也嗣後所有八旗大臣子弟仍準一體考試毋庸奏明請旨倘伊等仍不以實學就考如前懷挾或進身之後仍蹈虛浮陋習託名斯文無俾實用朕又何難隨時懲治俾知所警惕乎三十一年禮部議準御史積善條奏考選八旗教習照拔貢朝考例書藝一篇五言八韻排律一首定近京屯居及各省駐防文武生員就近考課約束例禮部議準順天府尹竇光鼐疏請在京八旗文武生員仍貴滿洲教授督課管束其在外屯居及各省駐防文武各生照民籍例即令所在州縣學教官就近考課約束至生員告給衣頂後教官造册申送地方官會同理事同知就近管攝又大學士等議覆祭酒宗室良誠奏八旗官學生百名內習翻譯及清書者約居大半以助教二員教此數十人翻譯清書多未周遍應如所請裁汰漢教習一員增設滿洲教習一員協同助教専司翻譯及清書課程其日給等費即以所汰漢教習缺應得之數給與又各旗官學生定例蒙恩免挑差使但不立定年限則無志者或借此延避使令應如所請酌定年限嗣後選取八旗童生自十八歲以下者皆入學肄業統以十五為率習漢文者不能入泮習翻譯及清書者不能考取中書筆帖式庫使概令咨回本旗當差從之三十三年設下五旗包衣官學生附入國子監官學是年兼管國子監事尚書陸宗楷奏準咸安宫官學八旗子弟及上三旗包衣子弟俱得選補八旗官學専補八旗子弟景山官學専補上三旗包衣子弟俱有定缺禮部八旗義學無定額聽有志讀書無力延師者投呈充補下五旗包衣得入此學自乾隆二十三年部議裁去禮部義學各學生俱有可歸之學惟下五旗包衣無學可歸請嗣後每旗各設官學生八名滿洲六缺漢軍二缺附入國子監官學得旨允行三十四年管國子監事尚書蔡新奏八旗官學滿教習人員嗣後缺出行文禮部於考取人員內補用不由國子監奏考從之三十五年管國子監事侍郎德保奏準八旗官學生考取中書筆帖式庫使等官未經得缺之前向來俱準在學候補但伊等既獲寸進若仍留在學候補恐讀書未必専心反屬有名無實請嗣後八旗官學生有候補各官者即令出學另行挑取得旨允行禮部議奏準八旗廢員一體考補咸安宫滿教習舊例咸安宫官學滿教習由八旗翻譯進士舉人部院筆帖式考補其廢員人等既得考補宗學覺羅學則咸安宫教習亦可一體準考以備選用教習期滿應照廢員充補各學教習期滿之例列為一等者該員係革職主事知州以上等官給以七品職銜係革職小京官知縣以下等官給以八品職銜如再留學教習三年期滿後仍列為一等者係七品職銜以七品京官用八品職銜以筆帖式用較奉旨日期先後選用其列為二等者仍留教習三年如果教導有成再行奏請議敘得旨允行三十六年恭上皇太后徽號恩詔國子監貢監生及各官學教習俱免坐監期一月三十八年禮部議準考試翻譯生員照學臣録取文童之例先由該本旗都統嚴行扄試奏派大臣覆考録取點名時加派御史二員於東西兩磚門分旗點進並派王大臣逐加搜檢圍牆以外責成步軍統領衙門加意巡邏從之又議準凡遇考試中書筆帖式及繕本貼寫筆帖式時恩監例監皆得一例收考至各學教習一項向無準考之例是以人數愈少選取愈難嗣後考取各學教習八旗恩監例監俱準一體送考從之四十一年平定兩金川大功告成恭上皇太后徽號恩詔國子監貢監生及各官學教習俱免坐監期一月四十二年孝聖憲皇后升祔太廟恩詔國子監貢監生及各官學教習俱免坐監期一月禮部議準兼管順天府尚書袁守侗等條奏嗣後八旗貢監生員應鄉試者先由順天學政及國子監行文各該旗造册移送録科後徑送順天府準其投卷入場其由禮部查取旗册轉發之處應行停止至八旗童生歲科兩考亦毋庸由部取册轉發即由該府丞查取旗册辦理再查考試翻譯舉人生員各册并請由各該旗徑送順天府核辦以昭畫一從之四十五年皇上七旬萬夀恩詔國子監貢監生及各官學教習俱免坐監期一月四十八年皇上詣盛京恭謁祖陵恩詔盛京滿合二號及奉天所屬各學歲考廣額一次其向取進六名以上者增額三名四五名者增額二名二三名者增額一名五十年皇上親詣文廟釋奠臨新建辟雍講學禮成恩詔國子監貢監生及各官學教習俱免坐監期一月皇朝文獻通考卷六十四
