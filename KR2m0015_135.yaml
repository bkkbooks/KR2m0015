body:
  text: 王禮考十一皇子親王以下婚儀公主以下下嫁儀臣等謹按馬氏帝系考子公主門載下嫁儀而皇子門不及婚禮今考唐開元禮有親王納妃儀宋政和中儀禮局上皇子納夫人儀而馬氏俱未收入似嫌缺略今據大清㑹典通禮所述皇子親王以下婚儀公主以下下嫁儀著於王禮考皇子婚儀凡皇子指婚內務府豫劄欽天監諏吉日並列大臣命婦中偕老者奏襄婚事既得㫖以告于福晉家届期贊事大臣偕福晉父蟒袍補服詣乾清門東階下福晉父北面跪贊事大臣西面稱有㫖今以某氏女作配與皇子某為福晉福晉父承㫖訖行三跪九叩禮退右指婚乃􅓪吉納幣內務府備黃金項環一叉六珥六均以珠飾釧四黃金衣鈕百白金衣鈕二百黑貂皮三貂皮百有四十狐皮二百有五十黑獺皮七采幣表裏各百棉三百斤賜福晉父母黃金十兩白金七百兩貂冠狐裘佩帶刀帨鞾襪具馬二匹鞍轡具屆日內務府以采亭載諸禮物如福晉家福晉父朝服迎于大門外內務府官入陳幣于堂陳馬于庭陳賜物於階上以納幣告福晉父祗受訖率其子弟序立庭東福晉母率諸婦出序立庭西望闕行三跪九叩禮內務府官退福晉父送於大門外如初迎禮右納幣是日所司備伶樂一部燕席五十餑餑卓五十張酒五十瓶羊三十有六詣福晉家設內外筵燕外燕于㕔事東西布席相向北上福晉親族職官及不入直之公侯伯內大臣侍衛一二品官朝服畢㑹午刻鴻臚寺官引入升堂福晉親族及本旗大臣侍衛東位西面各旗公侯伯等官西位東面就席一叩序坐司茶奉茶衆受茶飲茶皆一叩司筵奉果食酌酒伶工入奏衆獻酬樂闋興出司筵徹果食衆易蟒袍補服仍入就位司筵奉饌酌酒奏樂獻酬交錯樂闋興鴻臚寺官引衆官詣堂下望闕北面序立聽贊行三跪九叩禮興退內燕於中堂福晉親屬諸婦及一二品命婦咸㑹內務府管領妻量人給事行酒如外堂燕儀右納幣燕㑹及婚前一日福晉家豫以妝奩送皇子宫鋪陳屆日質明皇子蟒袍補服詣皇太后皇帝皇后前行禮若妃嬪所出並於妃嬪前行禮各如儀內務府選隨從女官八人豫詣福晉家閣前祗俟贊事命婦豫詣皇子宫內别室祗候自宫門至于福晉家步軍統領飭屬灑掃清道鑾儀衛備儀仗采輿內務府總管一人官屬二十人蟒袍補服護軍四十人偕如福晉家奉迎及大門主人迎入如納幣禮升輿吉時屆內鑾儀校奉采輿陳於中堂福晉禮服出閣隨從女官翊升輿母送于閣門外姑姊妹戚屬送于輿前俟下簾退父率子弟送于門俟過退內校舁采輿行鐙八炬十為前導女官隨從出大門乘馬前列儀仗內務府總管率屬及護軍前後導護行至紫禁城門外衆下馬步入及儀仗止于宫外女官隨采輿入至皇子殿前降輿女官導福晉出輿引入宫合巹吉時屆贊事命婦上合巹酒設燕皇子與福晉行合巹禮執事者皆退是日于皇子宫近處張幕結綵燕福晉父母戚屬羣官如納幣之儀右奉迎合巹婚禮既成翼日皇子及福晉夙興朝服內務府管領妻二人導詣皇太后皇帝皇后前行朝見禮皇子三跪九叩福晉六肅三跪三叩若妃嬪所出次詣所出妃嬪前行禮如遇聖駕行幸駐蹕俟回鑾擇吉行禮右朝見既婚之九日行歸寧禮皇子偕福晉至福晉家福晉第設宴畢皆還率不過午右歸寧皇孫皇曾孫婚儀凡皇孫皇曾孫指婚由內務府辦理㑹同禮部具奏後禮部傳行齊集既分府即傳行於府第齊集皇孫娶福晉初定禮用金約領一大金簪三小金簪三金珥六金釧四金衣鈕百銀衣鈕二百製衣貂皮一百有四十製帽貂皮三衾褥狐皮二百有五十緣朝服海龍皮七采幣表裏八十棉二百五十斤皇曾孫娶福晉初定禮用金約領一大金簪三小金簪三金珥二金釧四金衣鈕六十銀衣鈕百三十製衣貂皮一百有四十製帽貂皮三製衾褥狐皮二百有五十緣朝服海龍皮七采幣表裏五十棉一百七十斤皇孫婚禮初定日設宴三十席餑餑卓三十張酒四十瓶羊二十六成婚日設宴四十席餑餑卓四十張酒四十瓶羊三十五皇曾孫婚禮初定日設宴十六席餑餑卓十四張酒十六瓶羊十二成婚日設宴二十席餑餑卓二十張酒二十瓶羊十六其餘均如皇子儀親王婚儀為未分家之子娶同凡親王將及冠訪朝臣女或外藩王女年齒相當者奏聞請㫖命下以次行禮如奉㫖賜婚者是日王朝服詣太和殿前謝恩如儀初定王府備燕五十席酒五十尊若聘外藩女用鞍馬甲胄白金器七九牲五九使官屬之長齎如女家禮請親王以下輔國公以上公主福晉以下郡君貝子夫人以上禮部轉傳公侯伯以下侍郎男以上畢㑹燕男布席于外堂女布席于內堂獻酬行酒如皇子初定婚燕儀右定婚次行納幣禮王府備黃金項飾一金珥一具金叉大小各三指環十均綴以珍珠采繒衣裳九襲衾褥七具黃金二十兩白金千兩給女父母朝衣一冠帶鞾具采衣裳各一金珥一具鞍馬二若聘外藩親王女用鞍馬十有二甲胄十有二間甲二十有四繒六十布六百白金器三具聘郡王貝勒台吉女白金器同鞍馬甲胄各減二間甲減四繒十布減百餘物與上同王府官公服齎詣福晉家主人公服迎入使者陳禮物于堂有馬則陳于庭以納幣告主人拜受使左右徹之送使者如禮右納幣婚前一日女家豫以妝奩送王府鋪陳至日王禮服俟于次使其長史率官屬備儀仗禮輿如福晉家迎升輿吉時屆納禮輿于中堂福晉禮服出閣送女者翊升輿母送于閣門外姑姊妹戚屬送于輿前父送於外堂子弟送于門外燈炬前導送女者升車從詣王府由中門入及堂前降輿王出次俟于堂送女者導福晉出輿王揖先入福晉從入室行合巹禮其日王府設燕席六十酒六十尊聘外藩女用牲五九親王以下侍郎男以上公主福晉以下郡君貝子夫人以上咸㑹如定婚燕禮饋贈外藩王貝勒台吉及福晉夫人等送女來者冬夏衣各一襲貂裘一帶一弓一䩨矢一服甲胄各一鞍馬二采繒三十布二百白金器三具女之兄弟時衣一襲給隨從男婦三十人衣服有差右成婚若奉㫖賜婚者成婚之明日王及福晉夙興朝服詣大內謝恩行禮如皇子婚儀右謝恩世子郡王婚儀凡世子郡王納幣用指環八采繒衣裳八襲衾褥六具黃金十兩白金七百兩初燕席四十酒四十尊婚燕席五十酒五十尊餘物與親王同若聘外藩親王女鞍馬甲胄繒帛白金器如親王聘外藩郡王女之數婚禮既成饋贈外藩親王郡王及福晉送女來者並女之兄弟及隨從男婦衣服均如親王例外藩貝勒台吉及夫人送女來者給采繒二十有五布百有五十白金器二具餘如親王例給隨從男婦二十有五人衣物有差凡婚儀與親王同長子貝勒婚儀凡長子貝勒婚禮納幣用指環六采繒衣裳七襲衾褥五具黃金五兩白金五百兩給女父母繒衣不綴采鞍馬一間馬一餘物與郡王同初燕席三十酒三十尊婚燕席四十酒四十尊郡王以下尚書子爵以上郡主郡王福晉以下郡君貝子夫人以上咸㑹燕儀同郡王若聘外藩女定婚用鞍馬甲胄繒布白金器五九筵燕用牲三九納幣用鞍馬八甲胄各八間甲十有六繒四十布四百白金器二具婚燕用牲五九婚禮既成饋贈外藩親王郡王及福晉送女來者並女之兄弟及隨從男婦衣服均如郡王例貝勒台吉夫人送女來者給采繒繒合二十有五布百有五十白金器二具餘如郡王例隨從男婦二十人給衣物有差凡婚儀與郡王同貝子婚儀凡貝子婚禮納幣用指環四叉大小各二衣裳六襲不綴金珠衾褥四具白金四百兩給女父母視貝勒減間馬一餘衣物數同初燕婚燕席酒各減十貝勒以下公以上暨本旗官屬郡君貝勒夫人以上縣君輔國公夫人以上咸㑹燕儀同貝勒若聘外藩女定婚鞍馬甲胄繒布白金器三九筵燕用牲二九納幣鞍馬六甲胄各六間甲十有二繒三十布三百白金器二具婚燕用牲三九饋贈親王郡王及福晉送女來者女之兄弟及隨從男婦衣服均如貝勒例貝勒台吉夫人送女來者給采繒繒合十有五布七十白金器一具餘如貝勒例隨從男婦十有五人給衣服有差凡婚儀與貝勒同宗室公婚儀凡鎮國公婚禮納幣用衣裳五襲白金三百兩初燕十有八席酒十有八尊婚燕二十有八席酒二十有八尊貝子以下奉國將軍以上貝子夫人以下奉國將軍淑人以上及本府官屬㑹燕餘並同貝子若聘外藩女定婚鞍馬甲胄繒布白金器二九筵燕用牲數如之納幣鞍馬五甲胄各五間甲十繒二十有五布二百五十白金器二具婚燕用牲三九饋贈送女來者衣物如貝子例輔國公納幣衣裳減一襲衾褥減一具無白金初燕十有六席酒十有六尊婚燕二十有六席酒二十有六尊貝子貝子夫人不㑹燕餘儀物與鎮國公同若聘外藩女定婚行一九禮初燕用牲二九納幣甲胄各減一間叩減二繒減五布減五十白金器二具婚燕用牲三九饋贈送女來者衣物如鎮國公例凡婚儀均與貝子同宗室將軍婚儀鎮國將軍納幣用衣裳繒三襲布一襲衾褥繒二具布一具金項飾一叉二珥二初燕用牲六婚燕席十有五餘儀與輔國公同輔國將軍納幣衣裳衾褥各減繒一初燕減牲一婚燕減五席奉國將軍納幣禮物如輔國將軍初燕復減一牲婚燕減二席餘如鎮國將軍之禮儀同間散宗室婚儀凡間散宗室納幣數如奉國將軍減金叉二初燕牲二婚燕六席間散覺羅婚燕五席餘同宗室婚儀均與奉國將軍同公主下嫁儀凡公主係皇后所生為固倫公主壻為固倫額駙品級與固山貝子同係妃所生為和碩公主壻為和碩額駙品級與超品公同本部於指婚後奏請欽定額駙品級並分别用帽頂朝服坐褥等項行文該旗知㑹額駙若外藩行理藩院知㑹行內務府備公主帽頂朝服首飾行工部備儀仗轎車知㑹宗人府吏部户部兵部一體遵照凡固倫公主初定日成婚日筵宴二次和碩公主初定日筵宴一次其初定成婚各事宜均同乾隆四十年正月諭曰下嫁䝉古王公之公主等所生之子本各有應得品級毋庸另為辦理嗣後在京公主所生之子至十三歲時如係固倫公主所生即給豫伊父固倫額駙品級和碩公主所生即給豫伊父和碩額駙品級著為例七月又奉諭曰三阿哥之格格指與丹巴多爾濟為婚完姻在邇恐伊等念係朕之孫女於一切典禮俱按公主一體舉行亦未可定朕之孫女較之公主又隔一輩自不應按照公主仍行主僕之禮即如扎拉豐阿所尚係皇祖之孫女伊於姑前如何行禮之處三阿哥之格格自應仿照而行如果能按家禮克盡婦道朕方為之欣悅倘必欲固執以為朕之孫女應照公主禮相待反與朕之施恩指婚本意不合再羅卜藏多爾濟之子旺親巴穆巴爾曾將五阿哥之格格指與為婚俟完姻時亦應一體遵行嗣後朕之孫女指婚後俱照宗室格格禮行毋違朕諭凡公主下嫁之禮內務府豫劄欽天監􅓪指婚吉日並列大臣命婦中偕老者奏襄婚事既得㫖禮部以告于額駙家屆期贊事大臣偕額駙蟒袍補服詣乾清門東階下額駙北面跪贊事大臣西面稱有㫖今以某公主擇配某人額駙祗受命行三跪九叩禮興退右指婚初定諏日額駙家備駝一馬八羊八十有一酒九十尊屆期詣午門前恭進得㫖分納所司是日光祿寺官備筵燕武備院官張黃幔於中和殿北階下內務府陳金器反坫禮部理藩院尚書侍郎內務府總管光祿卿同視布席設御筵于保和殿寶座前正中殿內東西布席各五行前引大臣一行內外親王世子固倫額駙二行郡王貝勒貝子公和碩額駙三行內大臣一等台吉四行都統副都統二等台吉五行相向北上寶座後東西為豹尾班侍衛席又西為記注官席均南向殿門外檐下東為侍衛席西為三等台吉席禮部尚書侍郎席黃幔左內務府總管席黃幔右均東西向樂部陳中和韶樂于保和殿檐下陳丹陛樂于中和殿後階均北向午刻欽命入燕之王大臣侍衛及執事各官蟒袍補服畢㑹保和殿前按翼序立理藩院尚書侍郎率額駙父額駙及其族人朝服詣慈寧宫門外鴻臚寺官引至東階下北面行三跪九叩禮畢引詣保和殿前入班序立禮部尚書侍郎赴乾清門奏時皇帝龍袍補服乘輿出宫前引後扈如常儀御保和殿升座鴻臚寺官引額駙父等出班北面聽贊行三跪九叩禮興王公以下就位額駙父等均引入班就位跪叩坐賜茶畢進爵大臣進皇帝酒跪叩如太和殿燕禮額駙父等出殿外北面隨跪叩興復位遍爵作樂升歌行酒儀注均與太和殿燕禮同燕畢引額駙父等詣丹陛拜位行禮如初皇帝還宫衆退理藩院尚書侍郎鴻臚寺官引額駙父等至乾清門西階下序列行三跪九叩禮退是日內監設中和韶樂及丹陛樂于慈寧宫常次如儀尚膳女官設皇太后筵于寶座前南向設皇后筵于東西南向又以次設皇貴妃貴妃妃嬪席于東西少後僉南向額駙母及其族中諸婦席于嬪席之下少南西位東面進爵命婦席于丹陛下東位西而午刻皇后率皇貴妃貴妃妃嬪詣慈寧宫皇太后升寶座筵燕賜茶進觴遍爵作樂升歌行酒額駙母及諸婦行禮各如儀燕畢皇太后還宫皇后皇貴妃貴妃妃嬪皆還內宫內監引額駙母及諸婦詣皇后宫行六肅三跪三叩禮退右初定㑹燕下嫁前一日額駙蟒袍補服率族人詣皇太后皇帝皇后宫門前行三跪九叩禮各如儀內務府官率鑾儀校以公主妝奩詣額駙邸第內管領命婦二人偕女侍隨往鋪陳至日黎明額駙家備九九禮物文馬十有八鞍轡具䭾甲十有八馬二十有一駝六羊八十有一酒九十尊詣午門恭納午刻筵燕于保和殿慈寧宫如初定禮是日所司豫奏請王福晉貝勒貝子夫人中結髮偕老者欽命陪送內務府大臣命婦二人內管領命婦十人充導從皆盛服于宫門外别室祗候贊事命婦豫詣額駙邸别室祗候自公主所出宫門至額駙邸步軍統領飭屬灑掃清道鑾儀衛備仗采輿內務府總管一人官屬四人內管領二人護軍參領二人護軍校二人蟒袍補服偕護軍二十人于所出宫門前祗候升輿吉時屆公主吉服詣皇太后皇帝皇后前行禮若妃嬪所出並于妃嬪前行禮各如儀畢命婦翊升輿下簾內校舁輿行出宫儀仗前列鐙八炬十前導陪送福晉夫人及隨從命婦乘車隨行內務府總管內管領乘騎稍逺導從參領及護軍乘騎護行詣額駙邸第及門衆下馬步入儀仗止及儀門各官止輿入至㕔事正中降輿命婦階下降車升堂導公主出輿福晉夫人降車隨公主入室額駙父乃禮賔于外堂額駙母禮女賔于中堂遍饗諸執事者各如禮合巹吉時屆贊事命婦上合巹酒設燕額駙與公主行合巹禮衆退右于歸合巹下嫁禮成翼日行朝謝禮公主額駙夙興朝服公主詣皇太后皇帝皇后及所出妃嬪前行禮額駙詣慈寧門外東階下乾清門外內右門外行禮各如儀畢還邸第右朝謝至於九日歸寧欽天監選擇吉日內務府具奏事宜禮部具奏儀注乾隆十二年正月奏准向例公主九日歸寧後欽天監另擇吉行謝恩禮伏思歸寧之日係釐降後初次瞻仰應謝恩嗣後公主九日歸寧時即行謝恩禮右歸寧郡主出嫁儀凡格格嫁朝臣者額駙不進初定禮進成婚禮由禮部具奏嫁外藩者應進初定禮物成婚禮物由理藩院具奏均於午門前納進交該衙門接收凡王公之女匹配外藩者准其請封並給與俸祿銀縀其住居京城匹配八旗世家者惟世祖章皇帝天潢支派准其照王公品級封給郡主縣主及郡主額駙縣主額駙等按品食俸至逺派王公之女俱照例封給虛銜毋庸復給銀米凡皇孫女及王公之女大內聘嫁者內務府奏請格格品級及初定禮成婚禮日期知㑹禮部轉行該衙門知㑹額駙家預備成婚前期禮部奏請額駙品級郡主視郡王福晉額駙視武職一品縣主視貝勒夫人額駙視武職二品郡君視貝子夫人額駙視武職三品縣君視鎮國夫人額駙視武職四品鄉君視鎮國將軍夫人額駙視武職五品若郡主額駙官爵在一品以上則從其爵郡主額駙以下同王公之女自行聘嫁其品級同得㫖知㑹該旗户部並㑹同內務府具奏成婚事宜郡主出嫁儀凡郡主將及笄訪外藩蒙古王子年齒相當者奏聞請㫖命下以次行禮若奉㫖賜婚者額駙先詣乾清門謝恩如公主指婚之儀初定額駙家備燕五十席酒五十尊若外藩王貝勒台吉等尚郡主用駝馬羊七九牲五九遣人納于王府王受之其日㑹燕如納福晉初定燕儀右定婚次行納幣禮額駙家備鞍馬七甲胄七若外藩王等之子用馬六十牛六十羊六百遣人齎以獻于王王納之如定婚禮右納幣婚前一日王使人以妝奩張陳額駙室至日額駙朝服祗候邸第王使其官屬備儀仗禮輿送郡主于歸升輿吉時屆郡主禮服侍女引出閣詣王前辭次詣福晉前辭均行四肅二跪二叩禮執事官進輿于中堂侍者引郡主升輿王府護衛官前導鐙炬前輿侍婢八人男婦五户媵如額駙邸第額駙出迎于門外輿至導入至內堂降輿媵導郡主出輿額駙偕入室行合巹禮其日額駙第設婚燕如親王納福晉之儀右成婚若奉㫖賜婚者成婚之明日額駙偕郡主夙興朝服詣大內謝恩行禮如親王納福晉儀右謝恩縣主出嫁儀凡縣主出嫁納幣視郡主鞍馬甲胄各減二初燕婚燕儀凖郡王若嫁于外藩王貝勒台吉等納幣視郡主馬減十牛減十羊減百媵婢七人男婦四户餘同郡君縣君鄉君出嫁儀凡郡君出嫁納幣鞍馬四甲四胄四初燕婚燕凖貝勒若嫁于外藩定婚行七九禮初燕用牲三九納幣馬四十牛四十羊四百婚燕用牲五九媵婢六人男婦四户縣君納幣鞍馬甲胄各三初燕婚燕凖貝子若嫁于外藩定婚行七九禮初燕用牲二九納幣馬三十牛三十羊三百婚燕用牲三九媵婢五人男婦三户鄉君納幣鞍馬甲胄各二初燕婚燕凖宗室公若嫁于外藩定婚行七九禮納幣馬二十有五牛如之羊二百五十初燕婚燕用牲如縣君媵鎮國公女婢四人輔國公女婢三人男婦皆二户凡婚儀皆與郡主同皇朝文獻通考卷一百三十五
