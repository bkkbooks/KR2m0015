body:
  text: 市糴考六糴乾隆十五年山東麥收豐稔巡撫準泰請於沿河麥價平減之處採買麥十五萬石分運徳州臨清二處抵穀貯倉奉諭㫖若因收買數多致市價騰踊是民間並未有被旱之形而先有麥貴之苦不可不為致慮著傳諭該撫諸事應隨宜措置非至穀賤傷農之時未可輕言採買以明春巡幸江浙命兩省各截留漕糧十萬石以資平糶時復准兩江總督黄廷桂請再截留五萬石俾糶用充裕尋復奉㫖將浙省漕糧再截留五萬石凡截留二十萬石又停止八旗米局收買米石并令八旗五城設厰平糶奉諭㫖八旗設立米局收買米石原視市價之低昻以備平糶之用今米價既不無稍昻若再行收買恐目下未受平糶之益轉滋食貴之虞著暫行停止如明春應需平糶之時令管理米局大臣酌量需用米數由倉支領旋復奉諭㫖近来京師米價稍昻時届隆冬小民艱於餬口著將八旗米局現在收買存貯米石照時價酌減發糶如有不敷著於京倉支領五城由京倉各領米一千石照八旗定價一體設厰平糶交該御史等嚴行稽查毋令囤户乗機射利察出從重治罪十六年於京外四鄉每厰撥米四千石接續出糶五月復撥米十萬石分發各厰照前所辦章程辦理以裕民食又撥倉貯黒豆八萬石交與八旗減價平糶又以浙省温台等屬米價昻貴命撥運平糶時温台等屬本地存倉米穀不敷平糶之用諭江浙二省督撫於稍近州縣常平倉穀内酌量應需數目作速動撥碾米運往温台等屬接濟平糶其常平所缺之額即於浙省冬間兌運漕糧内照數截留撥補還倉嗣又撥閩省穀數萬石楚省穀碾米二十萬石赴浙以備賑糶之用復奉諭㫖本地有穀之家或能出其所餘照官價一體平糶該撫計其所糶之數照樂善好施例優加議叙嗣復命將浙江應運漕糧截留五十萬石并截留江蘇漕糧三十萬石運赴浙省以資賑糶其各州縣倉儲有應酌補者於本省截留五十萬石内通融撥補又議定八旗米局通融酌辦之法奉諭㫖八旗米局原因舖户乗賤收買居竒擡價有妨民食起見但現設二十四局不能盡得妥協之人經理其事以致辦理多有未善或任聴奸民赴局私買囤積漁利轉滋弊竇應將現在米局酌量裁併或八旗共立八局分為左右二翼特派大臣綜理其在局辦事人員亦俱慎為遴選所有一切收支數目俱由該處自行銷算於年終奏明交部查核責成既専自可隨時調劑以平市價於京師民食似為有益其應如何裁併之處著八旗大臣議奏㑹副都統朱倫瀚言米局之米本出自京通兩倉而兩倉之米發局出糶者暫也用為官俸甲米者常也其米僅老米稄米二色乃各省輸將漕運以供天庾俱係預年徵收運交通倉並無闗於本年近地之旱澇現在收成之豐歉既非由商賈販載所致更非同北直産植所出不識何故而遽為在京之行市舖販得以操其定價良以官兵支領俸糧甫經出倉或以急用需銀或以車脚未便立即轉賣以致盡落行販之手私囤暗聚平時既藉稱豐歉低昻價值又復窺伺將及闗米之時故為大減其價以賤買現闗之米一過闗米遂任意騰貴五城内外大小行舖同風相應兼之通衢僻巷多設碓房既收舂斛之利更為歛囤之區雖米局例只許一人斗米而伊等以多人更畨輪替循還往来使人莫辨更或因辦理未善致滋弊竇臣愚以為附京逺近旗民以及外来之游食百工官丁諸色人等並非買食黍粟菽米俱係日食老米稄米此二色米於在京行舖市價絶無闗涉乃伊等並無越疆隔省水陸運載之勞只於官兵轉行售賣之米盤取剥利尤為官米局之大蠧仰懇皇上勅下該管大臣一面嚴行明白曉諭令其及早改悔收心不許任意長價一面飭令倣照官米局議定二色米價無論賣出買入除量留車脚微利外作一定例價值通行飭遵如有仍敢盤踞抗違者治以重罪奉㫖此摺著軍機大臣㑹同八旗大臣歸於裁併米局案内一併議奏尋議八旗原設二十四局隨時糴糶以平市價嗣因米價漸減乾隆元年二月議將二十四局併為八局乾隆三年三月復經臣舒赫徳等奏照舊分為二十四局惟是每局分𨽻一旗經管多員並無綜理之人責成不専未免意見㕘差彼此觀望一切派員分辦因時糴糶之處稍未合宜即難免滋弊但京師内外户口繁多官局米石必多收廣貯以資調濟一局之中為地窄狹收貯無多且糴米人衆易至擁擠轉恐市商囤販得以混迹其中從前各旗辦理未善原因經管人衆責任不専所致嗣後八旗官局應遵㫖分為左右二翼不必拘定旗分其應裁之局仍舊存留交派出綜理大臣通融酌辦如該局坐落地方户口繁盛需米數多即於原額五千石之外多為收貯若需米較少之局即酌量減少不必拘定原額則舊設每旗雖有三局仍同一局辦理至朱倫瀚奏請倣照官局二色米價作一定例價值通行查行户囤積居竒實為民害但官兵闗領俸甲米石轉為售賣亦勢所不免每放米之時倉内所出官兵留食者約三四分官局收買者約二三分餘俱在外流通民間藉以接濟京師輦轂之下商民雲集每年所出倉粟不敷食用尚賴各項雜糧添補是以年穀順成雜糧價賤則老米稄米不能獨昻倘年成稍歉四外雜糧運赴京師者少則老米稄米亦必長價市肆商民輾轉糶賣億萬之衆欲遍行稽核令其遵守定價實屬勢有難行今奉㫖派有専管大臣一切稽查自必較前嚴密凡局内出糶米石務絶商販私買之弊以資貧民餬口并交步軍統領一體嚴查如有違犯私買囤積者查出嚴行究治從之又奉諭㫖今嵗恭遇聖母皇太后六旬萬夀海宇臣民願效祝釐者甚衆現在輻輳京師各城米價或致少昻著於京倉撥米二萬石分給五城減價平糶十七年命京倉撥米四萬石分給左右翼米局交該管王大臣等倣照時價酌減平糶又停止八旗米局奉諭㫖設立米局原為便益旗民自設立米局以来米價並未能平且勒買米石反累旗人嗣後米局停其買米將近今恩賞出倉平糶米石糶賣完後米局即行停止如後来米價昻貴應需平糶該部奏聞酌量平糶至五月管理通州米局公豐安言通州左右兩翼米局於乾隆九年設立每季開倉收買官員出賣之米遇價貴平價出糶今八旗米局俱已停止又賞借王公滿漢大臣官員一年半俸米此數季並無應買俸米如仍留通州兩翼米局每月徒費人夫工食等項而米局所有本銀二萬兩並無應用之處應請亦照京城米局一體裁汰所得息銀數目與存貯本銀一併奏銷交部歸還原項軍機大臣等議應如所請從之十八年直𨽻總督方觀承奏報經理義倉告成以各州縣村莊里數繪圖呈覽是年直𨽻義倉現貯穀共二十八萬餘石嗣又覆准直𨽻士民捐輸義倉積穀及數應予奬賞者照例具題其捐穀數目每年一次専摺具奏凡上年報捐及出借動用之數於次年二月内奏明存案以備稽察又諭四川總督黄廷桂酌撥倉穀二三十萬石運往江南俟秋成後該督再行酌量買補還倉先是江南淮揚被水截留該省漕糧四十萬石以備賑糶至是復有是命又准湖北採買加貯湖北為江浙上游界連秦豫各省偶有缺乏俱藉資於楚米而湖北額穀止五十二萬石有竒較之各省尚不及額多者三分之一議令於舊額之外加貯四十萬石存為鄰省協撥之用但儲蓄必須採買而尅期取足又恐有妨民食本年該省收成豐稔現在穀價平減令於新穀登場各處市集出糶之際飭可通水次之各州縣確查時值動司庫銀及時採買不拘數目價平則買價貴則停徐徐辦理足額而止如所司短價派累以及浮開冒銷者罪之二十年又以淮揚各屬秋潦成災動湖南倉穀二十萬石碾米十萬石運至江南接濟平糶從湖南巡撫陳宏謀請也又議撥倉貯豆石平糶大學士等議覆倉場侍郎雙慶奏言各倉現貯豆石積有五十餘萬應酌加籌畫疏通以免陳積除貯倉未久之豆令王公大臣官員等各按品級承買外其餘存貯年久成色稍減者應令該倉場等酌定數目分給五城照時價量行酌減平糶庶倉豆不致陳積而市價亦可平減從之又以江浙所屬偏災米糧價長申嚴遏糴之禁二十一年命江西湖南二省各撥米十萬石運交江蘇湖北省撥米十萬石運交浙江以備平糶又以明春巡幸江浙諭將該二省漕糧各截留五萬石減價平糶嗣復截留五萬石分貯備糶二十二年命撥江西湖北倉糧運交河南以備賑借平糶是月令通飭各省督撫籌補常平倉穀奉諭㫖吉慶奏請勅下直省督撫籌補常平倉穀一摺所稱州縣視為畏途因循延諉地方大吏又不悉心辦理此種弊病現在各省實皆有之地方水旱不齊國家所藉以撫䘏災黎所待以仰給者惟倉儲是賴一有缺額自應亟為籌補然籌補之法不待更立章程惟在督撫實心整飭而已前因各省争議採買一時米糧翔踴是以議立定額邇年以来市價不致過昻此其效也然額定而缺者不補則緩急其奚恃焉督撫身任封疆民瘼所闗自當詳加覺察時時留意豈可因循玩視而不為先事計耶截漕自出特恩原不為例非可屢邀也可將此通行傳諭各督撫知之命減直𨽻魏縣等處糶價時直𨽻魏縣元城大名等處猝被水災業經動撥倉穀平糶上以若僅照市值畧為減價則閭閻未必受平糶之益特命照現在市價每石減銀三錢俟通行米粮充裕即行停止二十三年奉諭㫖據劉慥奏州縣出借倉穀每年秋收後不能催完至春輒揑報還倉旋即詳請出借不過令舊借之户換一新領等語各省倉貯向例春借秋還青黄不接之時貧民既得資其接濟而秋收後即照數徵收穀石可以出陳易新兼不至侵蝕懸欠至次年又可查核貧户再行借給若不如期催令完納而以舊欠作新領則出借之項年復一年胥役得從中影射侵蝕更有欠户逃亡事故日久遂致無著者具舊時領借之户尚欠而現在待借之戸甚殷倉貯既虛勢不能另為籌給是名雖設倉備借仍屬有名無實大非慎重儲積賑䘏困乏之意晉省既有此弊他省諒亦皆然嗣後各督撫務當嚴飭所屬實力奉行除緩徵州縣外所有民欠倉穀各令依限還倉勿得仍前玩視其有揑欠作還以欠作領即查明㕘處庶俾借欠不致久懸蠧弊可清而緩急有備可通行傳諭知之又命五城設厰平糶至七月裘曰修等言臣等奉命於五城地方平糶六月二十九日開糶成色米石本月初六日開厰糶京倉米當青黄未接之時市儈未免居竒得此項米石減價平糶數日以来市價望風平減據五城日報臣等復詳加採訪現今各項米價較前每石約減數十文至百文不等臣等前次奏明老米官糶一千四百五十文稄米一千二百五十文粟米一千文以次遞減今應遵照原奏於十一日起各減一百文數日之後市價再平則官糶之價亦再為遞減臣等隨時斟酌俟減至老米一千二百文稄米一千文粟米八百文與平時價值低昻適中即奏聞停止再查市中錢價亦覺稍昻若即將糶米之錢文交舖户發賣實可兼平錢價臣等即傳集錢舖經紀當面給發令其兌換銀兩交投戸部不經司坊書役之手亦可無侵尅挪移之弊而錢米價值皆得平減矣得㫖允行又准旗丁餘米在通州出糶奉諭㫖今年各省糧艘抵通約早一月該運丁等除交倉全完外所餘食米尚多此等餘米俱由坐糧㕔衙門給與照票俟回空時於天津一帶沿途售賣而通州水次則例應嚴禁私糶蓋因通倉為兌米之地恐夾雜影射致滋弊端也若漕米均已不致掛欠而例應官買之餘米亦皆交倉事畢其所有餘剰食米自可聴其在通出糶不必過為苛禁在各運丁等既可免領照驗票之煩而通州米石充裕於京師民食亦屬有益該部即遵諭行嗣於二十四年至二十八年並准糶賣如例二十四年命減甘肅臯蘭各屬糶價奉諭㫖甘肅臯蘭省㑹之地以及平畨古浪武威靖逺張掖肅州等屬糧價較貴而闗外之安西五衛價值尤昻雖該督等現在減價平糶然照常例酌減恐仍不足以平市價並著加恩將粟米每石減糶銀二兩四錢小麥每石減糶銀二兩二錢庶貧民不致艱於買食該督撫等其董率屬員悉心查辦務使農民普霑實惠三月又以京師米價稍昻於京倉内撥米五萬石在五城適中地方設厰平糶并令河南巡撫胡寳瑔於河南麥收豐稔之處購麥来京分撥米厰以平市價又命截留漕糧四十萬石存貯天津北倉以備賑糶又命於景州以北水次州縣二次截留漕糧共四十萬石酌量分貯又撥通倉米於良鄉等處減價平糶奉諭㫖今京城内外發倉平糶米石充裕著倉場侍郎查明所有各倉成色米石交與方觀承運至良鄉等處平糶以贍民食再直𨽻各屬現在雨澤未能霑霈近京州縣平糶常平倉穀僅照定例每石減銀五分貧民仍恐買食維艱並著方觀承酌量地方市價每石減糶銀二三錢俾閭閻均霑實惠嗣復奉諭㫖京通各倉成色米每石核計不過四五成而輓運脚價反致虛費朕念切民依不若竟給通倉好米一萬石在貧民尤霑實惠而地方官亦便於接辦其成色米石仍就近交與京城米厰照例減糶又定雲南社倉免收息穀之例巡撫劉藻言滇省社穀自雍正二年至乾隆二十三年共存五十餘萬石為數甚多不能盡行出借霉變折耗在所不免且社倉例係社長社副經管祇許力田之家領借耔種而無藉之徒每生覬覦如遇借放有餘更將乗機逞强勒借頻年拖欠本息虛懸同里效尤漸成虧缺雖經地方官查究治罪而若輩多係赤貧只得著落社長副代為賠補每至傾家是以社長副一役民皆視為畏途總縁社穀過多流弊遂至於此查社倉之設所以接濟農民俾免重利稱貸原屬良法美意乃因存積太多致以折耗賠補貽累社長則是惠民之舉反為厲民之階亟宜酌量變通查社倉仿於宋儒朱熹其法於斂散十四年之後不復收息只收耗穀三升盖亦慮多積之為累也滇省社倉行於雍正二年至今三十餘載子母相生數逾十倍更應因時定制且此項穀石只供農民耔種之需非同常平倉穀以備平糶宜多為積貯者比請照常平額數七分為率其已經足額及較額有餘者請以乾隆二十四年為始儘數存貯按年斂散永不收息每石只收耗穀三升其未經足額之處仍照例收息俟足額之日一體免收只收耗穀倘不肖社長及該州縣等私行收息挪移侵虧等弊立即嚴㕘究處分别追賠治罪至官紳士民好義樂輸者仍聴赴倉捐輸嵗底另册報部以備修建社倉之用從之又以麥豆發厰平糶并發賣草束以平市價奉諭㫖近聞京城内外米糧價值照常惟麥麫豆草各項未能平減須隨時調劑從前五城平糶麥石現在餘剰存倉者尚多而接運進京之米麥又有山東五萬石江蘇十萬石將次抵通足供平糶接濟其黒豆一項各倉存貯除酌量寛裕留備支放需用外所有餘豆或准官員承買或發厰一併平糶俱有益於民用至南苑羊草繁蕪向来採刈儲備足敷供用即量為發出變價俾出售數饒市值自當日減著各該衙門詳悉查明數目其麥豆仍交五城及原派之侍郎等督率平糶草束交總管内務府奉宸院辦理二十五年奉諭㫖上年因得雨稍遲糧價易致増長是以節次酌設五城各厰米豆草束多方籌畫出糶以平市價而麥麫一項至今源源接濟現在河南麥石將次糶完而山東五萬石已經續到江南十萬石亦已連艘北上且商販以時轉運流通當此冬雪優霑春膏叠沛秋苗青葱暢茂所有現在麥價尤當日就平減乃據順天府尹奏報現今時價較上半月每石加増三錢此必其中姦商市販巧為牟利以致翔貴若此國家立法調劑原屬因時制宜非可援為定例且前經降㫖將官員俸禄先行借放原期米石倍為充裕而商販等乗時落價收買存積及至支放已停則乗機昻貴獲利在在有之京城重地設官糾察彈壓至為詳備顧任一二刁民乗間居竒甚至齊行把持累及閭閻口食而莫之懲儆可乎著步軍統領衙門㑹同五城御史順天府嚴行飭禁如有藉此多收囤積髙擡市值者即行查拿究處以為逐利病民者戒又准廣東社穀仍行收息之例兩廣總督李侍堯等言粤東社穀向准每石收息穀一斗遇歉免息乾隆二年經前署撫臣王謩奏請停止豐收之年每石收耗穀三升遇稍歉免交但未分别收成分數應收應免之條以致借領各户藉口收成歉薄概無耗穀而經管之社長畏懼出入盤量虧折並舖墊册報等費倉厫損壊隨時粘補勢所不免而經費無資辦理掣肘請仍循舊例以乾隆二十五年為始每石加息一斗收成不及七分者免其加息其耗穀三升應請停止所收息穀責成州縣稽查每年每石准銷耗穀一升其所餘息穀如在五千石以上者變價解繳存貯以為本地賑䘏之用不及五千石之數者即將餘息併入額穀之内以充儲備至領借社穀雖不必盡有田産之家而佃田力作亦必實係耕農庶秋成有穀償還其技藝傭工商賈貿易以及游手無藉之徒自不便一概濫行借給以致無從催補如此區别查辦庶社長耗費有資不至復虞賠累從之二十六年令甘肅省設立府倉巡撫明徳言郡城地方非省㑹重地即四達通途居民既衆商賈尤繁必積貯充盈始稱有備各郡附郭首邑雖設有縣倉然一官經理為數不能甚多且所屬州縣環列郡城附近府倉儲備有資於屬邑撥用亦便故各省多有建設府倉者況甘省偏處西陲舟楫不通附近鄰省止有川陜二省撥運糧石皆係陸運脚價既繁民力亦多勞瘁兼以路逺往往運送後時緩不濟急是甘省郡城之積貯較之他省尤闗𦂳要而甘屬各府多係裁衛改設均未設有府倉查甘省地土髙燥積貯倉糧不慮陳腐即如小麥一項各省俱不能久貯惟甘省存貯一二十年並不霉變況甘省地廣民稀土無他産農民收穫之糧除完賦養家外大都赴市出糶以資一切用度屢豐之後市糧壅滯糴買無人往往又有穀賤傷農之虞臣以為甘省多籌積貯不惟無礙民食抑且有益農工現在甘省州縣俱收捐監糧若令各府與州縣一體收捐不需動用帑項另為籌辦而各府之積貯俱得漸次充實以資儲備查蘭州為省㑹要地甘凉乃河西衝途兵民聚處食指浩繁俱應廣為儲蓄蘭甘凉三府應請各定額收捐京斗監糧十萬石平凉鞏昌寧夏三府路當中邊南三路衝要且屬邑較多亦應廣為貯蓄應請各定額收捐京斗監糧八萬石西寧慶陽二府地處偏僻應請各定額收捐京斗監糧六萬石安西一府界在闗外屬邑無多應請定額收捐京斗監糧四萬石以上九府共定額收捐京斗監糧七十萬石其各府收捐糧數倉費等項即照各該府首邑收捐事例收納毋庸另議所需倉厫亦照例動用捐監倉費銀兩修建造報俟收有成數每年平糶出借等項均與首邑一體並行以便出陳易新應設倉書斗級照例添設仍責令該管道員嚴加督率照例盤查毋致侵虧滋弊部議應如所請從之又議令安徽省將社本還官之穀歸補常平即於糶價内撥為修倉之費巡撫託庸言安徽省現需修建倉厫無欵可動請酌撥社倉息穀變價以濟工需疏下部議尋議社倉之設出自里民較之常平官為出納者不同即使息穀日漸充盈而春借秋還多所接濟於耕作農民更為有益該撫請以社息之有餘籌補常平倉費之不足是以民間輸納之息穀修建在官之常平雖於公務有裨而揆之官民之别究屬未便應毋庸議查安省社倉原案係於乾隆元年前任督臣趙𢎞恩議安徽布政使晏斯盛以民捐本穀甚少不敷借給奏請動支省倉監米七萬六千六百八十石歸入社倉為社本節年出借息穀積至四十六萬四千三百四十餘石是息穀既已充盈所有原借社本自應還官以一米二穀核算可得穀一十五萬三千三百六十石查二十四年常平奏銷册報未買糶價存銀尚多此項銀兩原係應行買補之項應將此項社本還官之穀歸補常平即於糶價内劃出此數存貯司庫撥作修建常平倉房屋之費其餘剰糶價仍令作速買補常平缺額從之又以明春巡幸江浙命照丁丑年例將兩省漕糧各截留十萬石在水陸駐蹕處分厰平糶至二十九年九月以明春巡幸江浙如之又申嚴行户冒糴之禁御史毛永燮言本年直𨽻附近被水之地欽奉諭㫖先後截漕撥粟共四十萬石以資賑糶直屬奉撥米石既屬充裕除應賑䘏之外自必兼行平糶平糶一事必嚴行户冒糴之禁但顯然之行户設法可稽而影射之行户滋弊尤易向例地方官辦理平糶赴糴者俱限以升斗祇許零星糴買雖有巨商挾重資以圖倍利者亦無所施其技立法綦嚴矣惟是不肖行户聞有誘買無賴窮民給予零星價值令其赴糴糴得之米仍入行舖之手聚少成多重利可致糴係貧民而利歸商販狡獪之術禁遏宜嚴至若串通經手胥役朦混官司致滋冒濫尤不可不防其漸請勅下直𨽻督臣嚴飭地方官於平糶時如有前項情弊察出照例治罪如有胥吏串通尤必嚴行懲治至所用斗斛務準官頒出糶多寡必遵定額均須司事者親身經理不得専委代辦員役人等經管該管上司亦不時查察庶易滋之弊自除而逾格之恩普被矣疏入得㫖著照所請速行又令山西省乗豐收採買穀石還倉時山西豐收巡撫鄂弼言晉省四面環山不通外運惟通省積儲在在充盈斯可緩急有備晉省常平額儲乾隆十三年經部定額一百三十餘萬石臣於上年奏准増定一百八十萬石永以為額然自乾隆十八年以後連年歉收且值旱災動賑出借平糶撥運殆無虚日又因連嵗秋成未豐賑糶撥運者不能買補出借者節經停緩遂致處處額貯虚懸盈千累萬上年秋成雖亦稍豐又因積欠之後民間十室九空止擇其萬不可緩者畧為收買補額未能通籌買補是以二十五年嵗底奏報常平現存倉穀僅止一百八萬石有竒懸額㡬及一半此外尚有應買還大有倉借撥軍需米豆并另案應儲太原府倉額穀通盤合計共應買補米穀豆八十二萬餘石若不乗此豐收之嵗亟籌充盈積貯年復一年虛懸額數設有緩急何恃以無恐但通省㕔州縣雖有一百餘處一時全行收買至八十餘萬石又慮有礙民食今將各㕔州縣應買之項悉心籌酌分别緩急如一㕔州縣内有必不可緩買之米穀又有尚可緩買之額穀則先令儘數買補必不可緩之項而停可緩之額穀如一㕔州縣内並無急應買補之米穀則應乗此豐年買補尚可緩之額穀以裕積儲臣督令布政使宋邦綏詳加分晰通省共應收買米穀豆六十萬九千餘石應暫停買補額穀一十九萬三千餘石仍令道府州親加察看若該處米穀充裕市價長平即買足應行收買之數外不妨再將停買補額之穀酌量接買報貯倘收買時市集米穀日減糧價漸昻即買不及現定之額亦據實詳明暫停收買總以無礙民食而有裨積儲部議應如所請從之二十七年五城設厰平糶先是奉諭㫖去年近畿秋雨過多收成分數少減現在京城米價雖未至甚昻但恐青黄不接之時市價易致増長應豫為籌畫以裕民間口食著在京總理王大臣於啟鑾後酌量市肆情形於應行平糶時一面具奏一面循照舊例於京倉内量撥米石給五城地方設厰平糶令派出之徳保五吉觀保書山阿永阿錢維城納世通范時紀廣成赫爾景額㑹同該城御史督率妥協經理無使牙儈從中囤積居竒滋弊俾閭閻得霑實惠尋王大臣等以正月中旬各色米價較去年臘月不相上下兼以甲米官俸支放在即市價未至昻貴奏請暫緩平糶至是王大臣等言據順天府每五日呈報各色米糧雖未増長但節届清明正小民東作方興之候且甲米官俸俱已陸續支竣誠恐市價或至稍貴小民買食維艱擬於三月初十日遵㫖設厰平糶請照平糶黒豆之例於京倉内酌撥三色米五萬石分給五城糶賣一面咨㑹户部撥送一面咨㑹欽派大臣㑹同該城御史親赴各厰實力稽查其平糶官價照往例每石各減市價大制錢一百文俟市價稍平官價亦量為遞減所糶錢文交送戸部撥放兵餉庶㡬價亦不至昻貴得㫖允行閏五月又令甘肅添建鄉倉先是九年布政使徐杞言甘肅幅􅊷廣濶鄉城相距遙逺請四鄉添建倉厫就近出納經大學士㑹同户部議令巡撫黄廷桂查明題覆旋據黄廷桂查河州鹽茶㕔等處統計應添厫座七百二十九間又奏請於甘州等處城工銀兩内動項先建鄉倉二百六十四間並聲明各鄉土堡髙厚居民稠密有官兵斗級看守不致疎虞部議准行至是巡撫明徳言從前添盖鄉倉除固原州鹽茶㕔已於四鄉建設厫座足敷就近支用外其餘各州縣如靖逺古浪髙臺所屬村堡並未議建鄉倉又臯蘭河州㑹寧岷州西寧等州縣所建鄉倉不敷積貯又金縣等三十七處雖議設鄉倉未經估建今甘省收捐監糧每石收倉費銀四分為州縣修倉之用現在甘省連登大有生俊報捐踴躍倉費較前日多採買漸充均需厫舎堆積請將前項倉費銀兩添建鄉倉現在委員通行確查擇其最要者於今秋儘現存倉費先為添建嗣後即以每年所收倉費分别緩急次第撙節辦理部議應如所請從之又命五城米厰以豆石平糶奉諭㫖京師閏五月以来雨水稍多近雖晴霽而道路泥濘商販駝運未免紆遲豆價現在増長官員兵丁等日所必需自宜酌量調劑著户部於預備支放豆石内通融籌撥陸續交與五城米厰以資平糶現已降㫖令奉天山東二省一面速運豆石接濟京倉支放之用該部遵諭速行命以豫東二省運到麥石發交五城平糶奉諭㫖今夏因雨水過多恐畿輔一帶麥收分數不無少減是以前經降㫖令河南山東二省各採買麥石運京平糶昨據阿爾泰奏報東省麥石已於六月十三日起運在途今胡寳瑔奏報豫省麥石現亦分起催䟎前進合計均可刻日抵通著傳諭倉場侍郎等於二省麥石將到水次即預備接遞運京以便交發五城米厰陸續平糶仍即一面妥酌規條隨到隨辦俾市價日減而民食益充副朕軫念閭閻至意該部遵諭速行又令奉天加貯米石并於沿海各倉加貯黒豆署將軍印務刑部侍郎朝銓等言盛京地方向稱米糧充裕是以稍遇水旱毋庸仰之於官近年生齒日繁偶遇災荒即應籌辦現在旗倉除支用外所存不過十餘萬石民倉不過三十餘萬石如再為照例糶賣所存無多似應加貯以廣倉儲今酌量地方衝要簡僻並近海沿邊情形如盛京城旗民雜處省㑹要地除民倉外旗倉應請添貯粟米六萬石錦州牛莊蓋州三城均係沿海商船積聚之地而錦州尤屬衝要應加貯粟米三萬石牛莊蓋州各加貯粟米二萬石山海闗相近之寧逺地方遼濶之廣寧遼陽並臨邊之義州均請各加貯粟米一萬石其熊岳復州寧海縣秀巖鳳凰城等五城俱係偏僻開原距省亦近此六城應各加貯粟米五千石以上十四城共請加貯粟米二十萬石并隨時查訪價貴則發糶以濟民食價賤則糴補以免傷農至沿海各倉加貯黒豆亦可備運赴通倉接濟之需請於沿海之錦州加貯黒豆二萬石盖州牛莊各貯黒豆一萬五千石共貯五萬石以備取用可免臨時採辦之繁其不需運赴之年隨時糶糴以免霉爛部議應如所請從之令安慶省㑹加貯倉穀布政使許松佶言安慶府城濱臨大江凡江廣商賈往来船隻順流而下素少停泊以故客貨米糧向少屯聚即本地所産糧食僅敷民食每當青黄不接之時猶賴倉穀平糶以資接濟撫標城守三營兵丁雖有本色月糧偶遇糧價昻貴向例亦於府縣平糶倉穀内酌量借給於冬春二季應支本色兵糧内照數扣還在兵丁雖免食貴於前而冬春扣還之後仍不免買食之艱況臣藩司衙門今移駐安慶所有江寧原有之書役皆遷移於此且外州縣解司錢糧并秋審人犯亦改歸安省審録凡此䕶解兵役往来亦復不少食指既繁則物價易増雖有府縣二倉額貯穀六萬四千石但例應存七糶三以新増人口計之恐有不敷似宜酌盈劑虛以備緩急請將各屬溢額倉穀内所存糶價撥出穀價一萬兩乗今嵗秋成豐稔及時分地採買每年於青黄不接之時照糶三之例一體平糶如遇米價昻貴之年本城各營詳明即於此項額穀内碾米借給仍照平糶之價於兵餉内分月扣還買補所需倉厫於現在通省添建常平倉動用社本案内辦理部議應如所請其穀石交與安慶府知府及附郭之懐寧縣知縣管理從之又以山西豐鎮寧逺二㕔應解綏逺城駐防兵米充本地常平穀先是九月從巡撫明徳請於歸化城和林格爾薩拉齊清水河四通判地方各添設常平倉穀三萬石動用耗羨銀兩採買備貯其大同府屬之豐鎮㕔朔平府屬之寧逺㕔原係衛所改設是以常平倉未經設立至是明徳言豐鎮寧逺二㕔自裁衛改設以来地方遼濶刑名錢穀事務與州縣無異而常平倉尚未設立遇有需用俱逺運鄰邑緩不濟急查該二㕔地畆向係徵收銀兩前撫臣鄂弼因綏逺城滿營兵米不敷奏准將應徵租銀改徵米石運送綏逺城交收今查綏逺城同知倉内現存滿營粟米一十二萬餘石嵗支米四萬八千餘石以各㕔原徵改徵每年共徵米五萬一千餘石支放兵糧之外嵗有盈餘以致前者未放新者又陳不特兵丁常食陳糧且恐雨水霉變與其動用脚價運往不若留貯豐寧二㕔以為本地常平之需查豐鎮㕔每年應徵米一千四百七十石零寧逺㕔每年應徵米五千一百六十七石零以十年計之共得米六萬六千餘石以之匀貯二㕔作為常平額糧雖二㕔額徵糧數多寡不一該㕔等本屬聨壤即以寧逺之糧撥貯豐鎮照例按里給價亦屬無多應需倉厫動用耗羨陸續添建其存倉米石每年春耕時查明缺乏耔種之户照例借給遇糧價昻貴之年減價平糶均俟秋收買補還倉部議應如所請從之二十八年奉諭㫖現在存倉黒豆計各項備用外為數甚屬充裕著該部即於存貯豆石内每城分撥八千石以資各厰平糶接濟之用又以熱河糧價昻貴發中闗米石平糶大學士公傅恒等言熱河地方上年收成稍歉兼之商販搬運以致糧價昻貴每米一倉石值銀二兩二三錢不等每豆一倉石值銀二兩五六錢不等邇日市儈奸商一聞聖駕經臨之信居竒擡價日漸加増隨從官兵買食不無艱窘查中闗買存備撥米一萬石零查原價每石價銀八錢照時價僱車運送熱河每石需銀一錢合算共銀九錢若以此價賣給官兵恐不肖之徒因其價賤致有串通代買情弊臣等酌定每倉石價銀一兩五錢交地方官僱備車輛運送熱河臣等即將隨從大臣官員兵丁數目查明酌加分别量其一月需用米數造册交與地方官照數發給價銀按照庫平交納下月届期仍照此辦理則商販無由居竒而隨從官兵得以賤價買食亦不致有轉售罔利之弊兼之人資食用餘者並可飼養馬匹即豆價亦必平減俟秋收價平之日交熱河道飭令地方官照依時價買補還倉從之又以倉庾民食經常不易之道詔諭中外先是六月戸部侍郎英㢘言京師為四方都㑹倉糧積貯最宜充裕皇上軫念民瘼凡遇賑恤之事恩施稠叠即漕運之重亦不惜截留散施動以億萬計間遇京師糧價昻貴輒發内倉米石廣為平糶即以乾隆十八年至二十七年此十年中統計截留漕米五百四十餘萬石平糶米四十六萬餘石十八年以前所截者不在此數其他煮賑之米亦不在此數臣伏念京通倉貯國計所闗今截留之數既多則儲積之數豈免稍減計惟立定章程使嗣後遇有截留即續為彌補但使漕運之年額運無虧則京倉自日益充裕臣再四籌酌惟捐納貢監一項可收本色蓋貢監每名糧數無多力田之家耕穫有餘即可投納實屬便民湖廣江西江南浙江均為産米之區嵗當豐稔米穀有餘臣愚以為莫若即將此項事例開於該省令其收捐本色或以三年五年為度捐有成數另行收貯如遇截漕之年即於次年照所截之數補運京倉或分為二年補運亦可如無截留之年即無庸補運仍行貯備如此則京倉所入有缺必補既免積久日虧之虞而又𨼆為皇上預儲一施恩黎庶之備似兩得其裨益疏下九卿議尋議如該侍郎所請令各省督撫將現在穀價酌中定議并一應年限撥運事宜酌定具題至是安徽巡撫託庸言京師倉貯甚闗𦂳要截漕平糶之數自應急為籌補但籌補之道必米石數多又能迅速方克有濟查安省各州縣常平倉積穀除賑糶未經買補米石外現在實存穀通省共有一百六十二萬二千餘石安省地處各省之中周圍鄰省皆舟楫可通湖廣江西原在長江上流販米商船相繼而来如遇安省米貴集米更多不但歉嵗即尋常年分商販絡繹不絶實由湖廣江西河南山東等省皆出産米麥省分又有長江黄淮各水流通乃自然之勢非人力所致故安省之常平倉不似各省之倉甚闗𦂳要即被災散賑之年不過就近各州縣之米始行撥運濟用稍逺即行停撥多以折色散給臣察看情形現在存倉穀一百六十餘萬石不俟開捐儘可碾米附於漕船搭運進京以補倉貯查糧船搭運每年不過數萬石本省如遇用米之嵗其未經搭運存倉米仍可動用春間青黄不接之時仍可平糶又現有開捐貢監本色之米可以接濟數年後一百六十餘萬石之穀搭運全完則開捐本色自必積聚已多如此一為轉移於太倉積貯不無小補而安省倉貯亦仍不致缺乏疏入上諭曰託庸奏江浙等四省現議貢監收捐穀石運補京通倉貯請將安省常平倉穀一百六十餘萬石先行碾米分附糧艘帯運一摺雖其酌濟積儲頗見勇往然朕熟籌此事於倉庾民食實在有無裨益情形即九卿覆准侍郎英廉條奏本案并可無庸亟事舉行也陳編所載餘三餘一之文固為足食本計第在當時原屬地曠人稀又列國各守其封域持籌者可以隨宜措置耳以今幅􅊷之廣生齒之繁嵗即屢豐而三農生穀祇有此數採購於官庾捐輸於紳士條欵雖殊其為地方所産則一與其輾轉挹注名異實同又何如即以此留之民間俾饔飱倍為饒給乎朕御極以来曽議直省倉儲寛裕買補旋聞市價増長即令停罷盖以小民未獲將来糶貸之利而先受目前食貴之艱譬諸日食四鬴者先奪其一二而語之曰吾將為爾他日待哺計也彼不生感而生怨矣此中先後得失其理較然不爽況朕念切民依偶值偏災即截漕動以億萬計向年来糧艘正供自足太倉之粟可預備二三年而贏此亦足矣計臣即鰓鰓較量朕皆不以為然國家昇平富庶内府外府均為一體凡官廩兵糈嵗支之數豈闕於供若以補漕糧而議捐穀又因議捐穀而先運常平不獨徒費輸輓之勞且他省聞風踵事地方因縁壟斷必致米價踴騰閭閻轉滋弊累即云不動聲色似此多立規條轉相仿效其為聲色更何待言揆之經常不易之道惟為民食留其有餘國用自無不足居今承平日久户口増而産米祇有此數倘民間或遇必資通融協濟之處亦不過臨時善為補偏救弊耳無他一勞永逸之計也至執三十年制國用之說拘文牽義更制而事不可行譬之封建井田諸舊法又豈可復議於今日哉所有託庸碾運常平穀石之奏不必行其江浙四省貢監收捐本色之例並著停止將此通諭中外知之三十年令減安徽捐監穀數兼收粟穀巡撫託庸以所屬常平倉額撥賑後缺至四十萬石近年穀價稍昻核之報部每米一石併脚價銷銀一兩二錢之數買補維艱請於各屬捐監酌量減收本色以補倉儲尋議准令減三報捐至徽寧地處山僻准令減四粟穀兼收俟額足後即行停止外省營販寄居者不准報捐本省人亦不准收折色從之又令直省各府倉改歸首邑經理河南巡撫阿思哈言豫省州縣倉糓之外設有府倉貯穀自萬五千至二萬石不等每常買補之時大都委之州縣州縣極意趨承或減開價值或浮交穀石而家人書役刁難需索舟車守候斗斛髙尖其弊靡所不至請將各府倉穀責成各首邑經管知府祇許照例查盤毋庸涉手尋議知府為知縣表率州縣之倉貯糶買全賴知府查察知府身自作弊則州縣勢必效尤若將府倉改歸首縣經理則知府稽查體制既合而於倉貯定額原無更改凡借糶買補酌撥協濟事宜責成各該府於每年奏銷時照縣倉之例就近盤查結報直省與豫省事同一轍均應改歸首邑以昭畫一從之又截江西漕米四十萬石於天津其各漕船餘米一體准糶奉諭㫖今年漕船北上稍遲恐未能如常年八月中旬全兌著於江西尾帮漕船截留四十萬石收貯天津北倉俟来春再行運通俾得及早回空無悞冬兌其各船所帯餘米仍准其一體糶賣三十一年停止陜甘捐監事例以崇積貯實政奉諭㫖陜甘捐監事例原因籌補倉儲以備緩急聞近日本色者少折色者多遇有需用穀石之處仍不敷給且以本地折色即向民間採買恐不免勒派滋累及挪移侵蝕之弊現在發帑三百萬兩存留甘省如遇穀值平減時即於此内陸續酌撥購足則當嵗收豐稔既無慮穀賤傷農即偶有歉收亦復足支賑糶如庫項買穀間有未敷之處該督隨時奏聞務使積貯裕如帑歸實用所有陜甘捐監事例著即停止嗣於本年九月將直𨽻安徽山西河南等省捐例一體停止均令赴部報捐至各省倉穀倘有缺額俱即動項買補如庫項不敷採買者許令隨時奏聞撥給又奉諭㫖向来奉天糧石充裕准令直𨽻山東就近販運今夏因該處雨少或恐市集昻貴曽諭暫禁商販今續經得雨糧石必充且現在山東稍歉直𨽻又以鄰省運販糧價未免稍増所有二省商民販米奉天者無庸禁止臣等謹按各省常平倉額貯穀石先於乾隆十三年據各該督撫奏報經部議核定額數嗣或節經變通抑且不無撥貸而每年彚報可備㕘考謹將乾隆三十一年以前各省節次奏報現存穀數詳載於左其社倉義倉之數亦附見焉直𨽻常平倉乾隆三十一年奏報實存穀一百九十七萬五千二百七十五石有竒社倉實存穀三十九萬六千五百二十四石有竒義倉實存穀四十八萬四千七百石有竒奉天常平倉乾隆三十一年奏報實存米二十四萬一千六百十八石有竒社倉豆穀雜糧共九萬三千六百十四石有竒奉天無義倉後凡不載義倉者同江蘇常平倉乾隆三十年奏報蘇松布政司屬實存穀并米抵穀五十六萬三千五百十三石有竒江淮布政司屬實存穀并米麥豆抵穀七十萬八千三百四十四石有竒社倉乾隆三十年奏報蘇松布政司屬實存穀二十三萬一千八百八十九石有竒乾隆二十九年奏報江淮布政司屬實存穀九萬一千八百六十二石有竒兩淮鹽義倉乾隆三十年奏報實存穀四十七萬五千八百五十石有竒凡奏報之期俱准乾隆三十一年如三十一年之報未至則以前一年二年所報為准安徽常平倉乾隆二十九年奏報實存穀米雜糧共一百二十三萬五千七百八石有竒社倉乾隆三十年奏報實存穀米雜糧共五十萬五千二百八十五石有竒江西常平倉乾隆三十一年奏報實存穀一百三十四萬一千九百二十一石有竒社倉實存穀七十三萬一千七百六十八石有竒闗義倉實存穀五千三百五十八石有竒浙江常平倉乾隆三十一年奏報實存穀二十七萬六千三百五十三石有竒又米十三萬一千十石有竒永濟倉實存米五萬六千七十二石有竒社倉實存穀并米抵穀二十六萬四百八十一石有竒鹽義倉實存米六千六十石福建常平倉乾隆三十年奏報實存穀二百二十八萬九千七百十八石有竒臺灣府實存穀四十萬石社倉實存穀四十九萬二千六百五十七石有竒湖北常平倉乾隆三十一年奏報實存穀并小麥抵榖七十四萬八千石有竒又米一萬五千五百七十九石有竒社倉實存穀六十五萬四千三石有竒義倉實存穀二萬四千石湖南常平倉乾隆三十一年奏報實存穀一百四十三萬八千三百四十九石有竒社倉實存穀五十三萬二千五百三十七石有竒河南常平倉乾隆三十年奏報實存穀二百三十九萬一千六百石有竒社倉實存穀六十四萬三千一百十一石有竒漕倉實存穀六十四萬一千九十石有竒山東常平倉乾隆三十年奏報實存穀二百五十六萬三千三百五石有竒社倉實存穀十八萬六千四十八石有竒山西常平倉乾隆三十一年奏報實存穀米豆共二百三十萬三千二百六十三石有竒社倉實存穀五十七萬九千六百四十三石有竒又歸化等㕔預備軍需平糶穀十九萬七千三百三十九石有竒陜西常平倉乾隆三十年奏報實存穀并雜糧抵穀二百十五萬六千六百十石有竒社倉實存穀六十二萬八百七十石甘肅常平倉乾隆二十八年奏報實存穀一百八十三萬一千七百十一石有竒社倉實存穀三萬一千六百七十七石有竒四川常平倉乾隆三十一年奏報實存穀雜糧共一百八十五萬六千四百三十七石有竒社倉實存穀雜糧共九十萬五百十八石有竒廣東常平倉乾隆三十年奏報實存穀二百九十萬一千五百七十六石有竒社倉實存穀四十二萬二千四百七十一石有竒廣西常平倉乾隆三十一年奏報實存穀一百三十八萬一百二十一石有竒社倉實存穀二十五萬八千二百七十六石有竒雲南常平倉乾隆三十年奏報實存穀麥共八十四萬四千三百五十五石有竒社倉乾隆二十九年奏報實存穀雜糧五十六萬九千八百九十六石有竒貴州常平倉乾隆三十一年奏報實存米八十八萬一千八百四十八石有竒社倉實存穀二萬九千八百二十六石有竒米一千八十六石有竒三十二年奉諭節年以来屢經降㫖准令旗丁在通州變賣餘米以資日用現在各該省漕艘陸續抵通於兌足正供後旗丁餘多米石如有情愿出售者仍著加恩准其在通州糶賣旗丁既屬便宜而地方糧石益加充裕於民食更有裨益該部遵諭速行嗣於三十三年至五十年並准糶賣如例又諭裘曰修等奏京師道途泥濘通州交倉餘米商販等艱於輓運是以上月米價少昻請將八月甲米移前數日開倉等語八月甲米原係官兵等應支之項今豫為開放京價自可就平於兵民自為有益著即將八月甲米於本月二十五日開倉支放該部遵諭速行三十三年户部左侍郎王際華言各省向設常平捐監事例行之日久不無折色浮收侵挪諸弊業將陜甘等省捐例停止查福建廣東雲南三省報捐甚少應請概行停止從之三十四年奉諭上年直𨽻近水州縣窪地間被偏災業經加恩分别賑䘏新正又經降㫖將霸州等十二州縣極次貧民均予展賑自可不致失所但各該處需用米石頗多而借種平糶亦需米接濟著再加恩撥運倉米二十萬石以為各該處加賑糶借之用該督其董率所屬實力辦理務使小民均沾實惠又雲南巡撫喀寧阿言滇省倉貯常平兵糧米穀因撥運軍糧現在缺額業經奏請按照時價買補兹查禄豐等四縣有永折米八十餘石尋甸等十七州縣有改折米二萬餘石阿迷等十二府州縣有抵條米二萬餘石請自本年起悉徵本色抵補可省採買之煩得㫖允行又兩江總督髙晉等奏江蘇各屬常平倉穀缺額現在時價昻貴應暫停採買但缺額過多之處来春借額不敷請將司倉存貯捐監米撥補江寧髙淳等縣其餘倉儲不足州縣請在鄰近州縣酌撥從之三十五年奉諭頃三和自熱河回京據奏古北口地方於本月十六日午後山水漲發兵民房産被淹人口亦間有傷損者王進泰現在彼處查勘繕摺具奏賫摺人在後未到等語古北口此次被水情形較重朕心深為軫念著即派侍郎烏諾璽帶内庫銀二萬兩速行馳驛前往㑹同王進泰實力查勘被水各户不拘兵民人等一體撫䘏照二十四年之例加倍給與如所攜之項不敷支用即行據實奏聞續行撥發再聞街市米舖現俱被沖閭閻或致艱食該處義倉向有存貯米石若由地方官按例轉詳具奏給發未免稽延時日烏諾璽等即開倉酌量賑䘏平糶居人口食有資現已傳諭霸昌道定敏星馳前往烏諾璽等即率同該道詳細確查實心經理務使災民均沾實惠又奉諭今嵗適届夏閏秋成節候少逺而距官員等領俸之期亦遲一月市肆米糧未免不敷接濟所有王公大臣官員秋冬二季俸米該部作速行知各處上𦂳造册送部即於七月十五日起開倉支放俾官員早得常糈市值自可藉以平減於民食亦屬有益三十六年奉諭京城及近畿地方自春入夏雨澤較稀麥收不免歉薄幸有官麥平糶市值未致加昻但現届青黄不接之時米價或恐因而増長此尤小民口食所資自應豫為籌畫以期充裕著照乾隆二十七年之例於京倉内量撥米石給五城平糶仍令原派監糶麥厰之大臣并該城御史就近經理其應撥米石若干作何酌定章程之處即著該監糶大臣等㑹同該部詳悉妥議速奏並著步軍統領衙門派委員役嚴查奸商販買囤積俾閭閻均沾實惠三十七年奉諭前因徐績奏報糧價單内各屬多註價昻當即批諭今年山東既獲豐收何以米價尚昻令其查明覆奏據奏因乾隆三年前䕶撫黄叔琳奏准將貴賤昻平分為等則厯年以次酌定所奏太屬拘泥徐績平日尚屬明曉吏治者何以不通事理若此朕令各督撫按月奏報糧價原以米穀為民食所闗期於市糴貴賤時得周知若如該撫所辦尚以三十年前定價為率又安用此虛文為耶米糧價值贏縮固視夫嵗收豐歉及閲嵗既久生齒日繁則用物廣而需值自増乃一定之理即各省買補倉糧屢請増價可知矣況天下無不食米之人米價既長凡物價夫工之類莫不準此遞加誠以民愈庶富愈難不得不於豫大之時切持盈之儆非朕厭聞米價之貴嗣後當飭屬周咨市價率以三五年前後為準核實詳明列單具奏不得蹈襲積年陋習三十八年直𨽻總督周元理奏請令遵化州應糶薊糧即行撥抵常平缺額並貯薊米石就近平糶以濟民食得㫖允行三十九年奉諭據周元理奏天津府屬七縣偶被偏災該處倉貯米穀因從前屢經賑借且疊䝉恩㫖蠲免現在常平社義等穀僅存五萬餘石不敷今冬賑借明春平糶之用等語天津府屬七縣因夏秋雨澤未普收成稍歉雖係一隅偏災恐冬春之際民力未免拮据朕心深為軫念著加恩於通倉内撥米十萬石交周元理即行領運酌備被災各屬冬春賑借平糶之用該督務董飭所屬妥協經理副朕優恤畿民之至意又奉諭前因淮安一帶今秋被水節經降㫖加意撫䘏俾災民不致失所今據奏稱災地需用米糧一項恐尚不敷撥用等語著該督等於江蘇各屬漕糧内截留米二十萬石酌量災地逺近或全數撥留或按屬派撥並令該督等迅即妥協經理以備明春賑糶之用四十年奉諭上年直𨽻天津河間等府各屬倉穀因賑動用者例應補買但恐一時官買過多致市間糧價少昻於民食有礙著加恩截留豫東二省漕米十萬石暫貯北倉交該督周元理酌量領運撥糶俾民間多留盖藏以示優惠又奉諭近日京師糧價較上年四五月間少増自因昨秋天津河間一帶地方歉收所致現届青黄不接之時宜使市糴價平俾閭閻不虞穀貴著照向例於京倉内量撥米石給五城設厰平糶以裨民食又奉諭八旗兵丁甲米閏月例不支放第念京師五方聚集食指浩繁兵丁所得甲米自給之餘或將剰米出糶尚可潤及數十萬户現在正逢閏月未免拮据著加恩賞給閏月甲米即於本月十五日開放其十一十二兩月放米之期並著移於每月十五明嵗新正以後仍循其舊則市價可藉以益平於兵民生計有裨嗣後凡遇閏月俱照此例又奉諭據文綬奏川省所産雜糧現飭䕫闗一併截留禁止販往楚省一摺所辦非是川省産米素稱饒裕近年因辦理軍需購糧較多經該部奏准暫停䕫闗出米以供軍儲而資民食尚屬可行至各項雜糧仍當聴商販流通俾從民便不應在禁止之例今大功指日告成軍儲充盈採買較前漸少何以轉加飭禁況本年江蘇安徽俱被偏災米價不免昻貴若得上游糧食源源販運兩省之民更可接濟應將川省米石聴其出闗販賣無許再行禁遏各省商民均沾利益四十三年奉諭前因河南省開封彰徳衛輝懐慶河南五府春雨愆期曽降㫖將本年錢糧緩至秋徵常平社倉民欠穀石緩至麥收後徵並令將存倉社穀隨時借糶尤念五屬極貧下户更為拮据加恩於社穀内酌給月糧以資餬口至本年社穀出借較多如屬不敷著於漕穀項下借動撥給又奉諭現在將届夏令京師尚未得有透雨市間糧價恐未免稍昻自宜豫為籌畫俾民食益加充裕著照向例於五城設厰酌撥米麥平糶又奉諭前據三寳陳輝祖奏湖北今夏得雨少遲米價漸長遇有川米過境催截運售等語此非遏糴而何朕以該督撫為楚省民食計則得矣不知江南向每仰給川楚之米今嵗亦間有偏災更不能不待上游之接濟且楚米既不能販運出境若復將川米截住不令估舶運載順流而下則江南何所取資該督撫止就本省籌核所見殊小豈朕一視同仁之意隨即傳諭訓飭如川省米船到楚聴其或在該省發賣或運赴江南通行販售總聴商便勿稍抑遏嗣又據文綬因楚省有買川米之咨奏稱川西川南雖獲豐收恐商賈紛集争糴或致米價騰湧擬將水次州縣各倉内撥穀二三十萬石碾米運楚應用等語名為設法調劑實欲藉此塞責禁止商糴也所見與三寳等相同隨即飭令不必將倉穀碾米運楚聴商販源源糴運䕫闗騐放不得稍有留難在該督撫皆國家大臣自當以朕之心為心豈宜意存畛域如川省米船運載流通固屬其善但恐川船到楚僅敷該省之用不能分運則江南糧價或至増長深為厪念著傳諭文綬將擬撥楚省之倉穀二三十萬石即速就各水次碾米運赴江南備用並諭薩載等酌於何處接運分發需米之各地方隨時出糴以平市價而裕民食一面知照文綬辦理一面奏聞至川省動撥倉穀俟明嵗穀賤時再行買補該督撫速為遵照委辦該部即遵諭行臣等謹按遏糴為古昔所禁況天下一家尤不可意存畛域我皇上徳施溥博務使含生之倫無不得所是以於川米至楚既飭禁抑遏復令分運江南俾彼此之見不存而源源得以相濟允宜光天之下被潤澤而大豐美如登春臺也四十六年奉諭本年六月江蘇崇明縣猝遇風潮被災較重貧民口食未免拮据著加恩於蘇屬本年應行起運漕糧内截留十萬石以備賑濟平糶副朕軫恤災黎至意又以明春巡幸江浙命將二省冬兌漕糧内截留十萬石以資平糶又奉諭安徽省所屬亳州蒙城暨下游鳳陽泗州各處低窪地畆本年秋間被水前經諭令該撫等按照災分輕重分别給賑但念本年被水處所即係上年被災之地昨曽撥運川米十萬石分給平糶是以米價不致過昻今該處仍復被水恐明嵗青黄不接之時災地窮黎究不無拮据該省潁州鳳陽泗州三屬及六安霍山二州縣今嵗俱多豐熟與各災地相距最近著該撫即於各處應徵漕米内加恩截留三萬五千石豫備明春減價平糶以濟民食又奉諭本年江蘇徐州府屬沛縣睢寧豐縣銅山邳州宿遷等州縣被災較重已屢經降㫖准撥藩庫糧道銀五十五萬兩現又據薩載奏准其於兩淮鹽課應解部銀内再行動撥銀五十萬以資賑䘏第念該處米穀尚不敷徵糶著再加恩於淮徐各屬本年應行起運漕糧内截留五萬石以備賑濟平糶之用該督等務須督飭所屬查明災地情形分别賑糶實力妥辦俾小民口食有資無使一夫失所以副朕意該部遵諭速行四十七年奉諭本年直𨽻承徳府各屬雨澤未溥糧價稍昻現在平糶存倉餘米二千石以資接濟數日以来雖己甘霖疊沛而青黄不接之時恐民食未免拮据著再加恩將存倉餘米平糶三千石以副朕軫念民艱有加無已之至意又奉諭承徳府屬平糶餘米業經展糶三千石以資接濟兹恐民食尚有不敷著再加恩平糶一千石以副朕軫恤至意又署直𨽻總督英㢘言直省各倉因賑䘏之後儲穀未能足數請將天津北倉截存漕米九萬二百三十二石零賞撥直省以補缺額得㫖允行四十八年署四川總督成都將軍特成額奏請酌留未經變價之義穀存貯民間以資接濟得㫖允行又奉諭朕明春南巡著照從前之例於江浙二省冬兌漕糧内各截留十萬石在水陸駐蹕地方分厰平糶即令漕運總督及各該督撫妥協辦理該部遵諭速行四十九年山東巡撫明興言東省乾隆四十八年通省秋禾收成雖八分有餘但時值春月青黄不接現據各屬開報每穀一石價銀七錢五分至一兩三錢二分不等買食貧民未免餬口維艱謹循照歴年奏請平糶之例隨時酌減總不得過三錢至鄉村設厰平糶所需脚費照例動支司庫充公銀兩事竣核實報銷其耕作貧農有需酌借口糧以助春耕者悉照歴年成例先動社穀次及常平雜糧穀石核實給領秋後徵還抑臣更有請者去秋至今唯登萊青三府雨雪調匀濟泰武沂四府屬於上年十二月暨本年正二月據報得有雨雪尚可無礙田工照例糶借兼行可敷接濟其兖曹濟三府州屬本係積歉之後民力未紓又東臨二府州屬於上年得雪未足並未再有雨雪未種春地望澤甚迫若僅照常借糶將来一得透雨即須趕種秋禾凡耔種等項恐無力農民難以措備懇將兖曹東濟臨五府州屬查明地在三十𤱔以下無力之户除照例出借倉糧外每𤱔再行借給耔種銀五分以資耕作所需銀兩於耗羨存公司庫銀内動支如有不敷再於司庫酌留備用項下凑支秋後徵還歸欵得㫖如所議速行又奉諭前因甘省逆回不法擾害地方曽降㫖令福康安查明被難良民酌量撫䘏並將該省本年應徵錢糧概行豁免本日據福康安奏現在該省市集糧價較昻其伏羌一縣已據該縣開倉減價出糶其餘静寧隆徳等州縣曽經賊人經過處所亦應一體核實酌減出糶等語向来出糶倉糧每以年戌豐歉照市價量為酌減今該省因賊人滋擾小民糴食維艱安可復拘常例辦理福康安即將應行出糶各地方一體核查照市價大加酌減出糶期於民食有濟又奉諭據保泰等奏本年到通漕糧二百四十三萬石又北倉截留三十二萬餘石較之上年多收二十二萬石等語前因漕艘抵通稍遲將江廣重船於北倉截留俾得迅速回空今據查明本年漕糧較上年尚多二十餘萬石所有前項截留米石現於北倉存貯著即將多出之二十二萬石存於北倉作為直省買補倉糧之用五十年山西巡撫農起言太原汾州沁州遼州隰州平定州所屬各州縣從前雖俱缺雨嗣於四月五月連得透雨數次甚為優渥麥收尚少秋糧播種俱已出土數寸並未成災惟查各屬地方前次借糶倉糧將己辦竣目下雖經得雨秋收尚早所有太原汾州等屬應請照歉年減價二錢之例再將常平倉穀酌量續糶得㫖允行又奉諭據特成額等奏湖北省江夏等四十七州縣因入夏以来未得透雨早中二禾鮮有收穫糧價未免稍昻等語江夏等州縣因缺雨歉收糧價加昻民食自不免拮据著即照歉收地方之例將倉穀減價多糶該督撫其督飭各州縣實心經理務期小民均沾實惠又兩江總督薩載等言淮安江寧常州鎮江揚州等五府屬本年被旱收成不無歉薄糧價漸昻請於現在截留黄河以南江西漕米二十八萬餘石酌撥十萬石分給淮安等五府屬平糶接濟民食所有糶價提貯司庫俟来嵗秋收豐稔照數買補抵通交納得㫖允行又奉諭書麟奏安省桐城廬江等處紳士或出餘米減糶或醵金禀縣請票前赴江西販米至本籍減糶等語安省安慶廬州等府屬被旱成災該處紳士誼敦任䘏減價出糶甚屬可嘉至江西四川二省節據李世傑舒常覆奏俱已設法調劑俾商販通行無滯各災區自當米糧滙集市價日平小民口食足資接濟畧紓朕南顧之憂矣又奉諭李世傑奏現在將附近水次各州縣常平等倉穀先碾動三十萬石令其收貯俟楚販到境設市集不敷應糶即將倉米按照每月報部時價發糶等語所辦甚好前因江浙等省皆仰給川米惟恐湖北商民赴川販運該省産米或有未敷特諭李世傑即將常平等倉穀先行開糶以資接濟今據該督奏到已遵㫖將倉穀碾動三十萬石俟楚販到境按照時價發糶又同日據舒常奏楚省商船過境已有一千三百餘隻從江西販去米穀約有數十萬石等語是楚省米糧已經滙集四川江西二省自必將餘米運往江浙販賣安徽江蘇浙江各災區既有兩省之米源源接濟小民口食有資覽奏為之稍慰又奉諭特成額奏酌撥湖南倉穀碾運湖北俾下游民食得資接濟又督催川南米船由湖北速下江浙兼恐商賈趨利見湖北米糧價昻就近糶賣不即東下江浙即將官穀撥往糶濟以平市價庶商賈見糧價減落多趨江浙更可獲自然之效現在飛飭鄰近水次州縣各倉内動穀碾米並於兩省各派道府大員迅速妥辦等語所辦甚好該督能如此存心不分畛域仰體朕節次降㫖一視同仁至意方得大臣之體甚屬可嘉湖北米石既有湖南接濟而江西四川各商販又可源源而下是湖北江浙災歉之區均可無虞缺乏商販流通自可以平市價而裕民食又奉諭向来京師需用麥石俱藉豫東二省接濟本年春夏之間該二省雨澤短少收成歉薄未必更有寛裕以資商販糴運恐京中麥石入市稀少價值或致昻貴不可不預為調劑今嵗奉天各屬雨水調匀麥收豐稔永瑋鄂寳等查照向例採買麥二萬石委員運京以備支放糴糶之用皇朝文獻通考卷三十七
