  text: 欽定四庫全書皇朝文獻通考卷五十八
  hash: sha256:2a2393a980db6732c8e481ed5769e287b66d96d9a267013e5a68b601d828f243
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_058-1a, image: WYG0633/WYG0633-0425c.png}
body:
  text: 選舉考十二舉官乾隆三十四年准學正學録留監題補助教吏部議覆管國子監事侍郎德保奏稱國子監學正學録等員向例厯俸期滿准其咨部以各衙門典簿司務等官補用原以䇿勵微員俾上進有階各知黽勉但其中有文理優長訓課有方著有成效者或遇推升别缺伊等在各衙門仍不過循分辦公於本監轉失一稱職之員似於公務未見禆益嗣後遇有應升人員准臣等酌量請㫖留監俟助教缺出照例題補得㫖允行又諭朕在京月選州縣有掣籖後告病者准附於下月引見如下次尚未病痊該部即行開缺至遇朕巡幸之前兩月有託病不即引見冀歸下月驗放者一經具呈告病即和除開缺將來另選得缺仍著該部於帶領引見時將該員原選缺分之逺近繁簡事樣一併注明候朕定奪如此則詭避之技無所施而詮選尤為澄肅著為令三十五年諭御史蔣曰綸奏請禁督撫指名揀發人員一摺所奏頗為近理督撫等差委需人既經奏請揀發則揀發之人儘可供其隨材委用何必於侯補人員內指名請揀况伊等是否在京督撫何由預知形迹之間易招物議日久且恐漸滋流弊嗣後各省督撫請揀人員不得於摺內指名附請又諭吏部將髙晉奏請改教之陽湖縣知縣鄧世讓帶領引見看其人甚平庸實應改教及檢閲該員履厯從前係由教職保舉堪􅈾民社是以補授縣缺此與别項由知縣改教職者不同人之心術操守雖不易知然量其材質可否試以民社督撫等稍能留心察看不難立辨何至一人之身前後判然竟至如出兩人之理總由該上司並未實心甄核徒以姑息市恩虛應故事不惜貽誤地方所致倘不將原舉之人加以處分誰復知所懲警嗣後由教職六年俸滿保舉知縣人員內如有復行改教者即將原保之督撫學政等一併議處著該部定例具奏其從前保舉鄧世讓之督撫學政等並著查明即照新例行尋議嗣後由教職俸滿保舉知縣復請改教者將原保舉之督撫學政照保薦不實例降二級調用申詳之司道府州縣等官降三級調用加級紀録不准抵銷從之又諭據總管內務府大臣奏兼攝茶庫之兵部員外郎五十三現升禮部郎中請仍留兼攝庫務所奏不可行前因內務府人員習氣不好是以令六部選𣲖誠幹司員引見兼管六庫俾相牽制此等兼攝之員若令久於其任則不但不能糾察轉恐沾染積習彼此聯為一氣殊非派員監理之本意嗣後六部人員兼管六庫者並定限三年更換一次其有升任等事總管內務府大臣概不准留著為令三十六年諭前諭各省督撫將州縣升授京職人員填注切實考語送部另班引見原欲為外省留熟練之員期於吏治有益第思此例行之日久恐不免有流弊昨曾諭吏部將現任京員中由卓異等項內升者查明帶領引見並豫甄録記名備用自無慮其終滯曹司亦可無庸預為别擇所有月選內升人員督撫出具考語送部之例可不必行嗣後吏部將此項人員每三年查辦一次列名帶領引見候朕量加録用著為令定各衙門小京官保送同知通判例吏部議太常寺卿謝溶生奏贊禮郎讀祝官由監生官學生出身保送撫民同知通判請照親軍校出身保送理事同知通判例俱厯俸三年經京察一等方准保送請嗣後讀祝官贊禮郎鳴贊及各衙門小京官凡遇咨取撫民同知通判時該堂官於京察一等人員先儘保送此外實有能識文義辦事明白之員厯俸在三年以上者不拘等第一體保送寧缺毋濫從之又諭向來翰林院侍讀侍講學士及侍讀侍講中允贊善等官有需次候補者例俱坐補原官不得通融借用此等詞曹清秩額缺有數一經回籍至來京應補時輒格於成例未免守候需時因思讀之與講繫銜雖殊品秩相等而漢缺中允贊善亦非若滿員之銓用殊途分别五六品頂帶者可比從前坐補之例未免過於拘泥即稍為變通於體制亦無妨礙嗣後此等候缺人員讀講中贊准其各自通融補用著為令又諭嗣後如朕巡幸時遇有預保千總咨送到部即著留京辦事之王大臣照外省送到年滿千總之例驗看分别注冊給咨令其即回本任毋庸在京守候三十七年酌定挑取中書學正事宜先是三十四年刑部侍郎錢維城奏准考取內閣中書前經御史條奏吏部定議於己丑科㑹試薦卷內及欽取朝考引見未用人員內挑取薦卷挑取字畫須憑墨卷而墨卷省分坐號向係彌封榜發之後下第舉子坐號及曾經得薦不難查知或生希冀請於發榜日主考房官填榜後先行出場知貢舉及內簾監試率同彌封官將各房薦卷查出墨卷逐一彌封封固奏請欽㸃大臣閲取先行奏聞俟朝考引見後一併挑足帶領引見欽定名數挨次録用又禮部奏准考取學正學録原議於㑹試薦卷內與中書一同辦理今中書既另請欽派大臣録取其選擇學正學録之處請一併交欽派大臣於㑹試薦卷録取中書額數內酌量寬取十數名帶領引見恭候欽定又禮部奏准內閣中書有撰文繕寫之責文理固宜明通字畫尤須端楷前議於薦卷挑取亦屬慎重之意苐查各房薦卷原以硃卷為憑字畫之工拙本不能知多有落卷內字畫堪以録取因一二文藝小疵未經呈薦者今僅將薦卷一項挑取殊覺未盡請將各舉人墨卷不分曾否呈薦俱交知貢舉彌封省分紅號一併交主考官於出榜次日赴宴謝恩後仍即入闈將各墨卷校閲按數選取從之又諭昨兵部將揀發雲南武鄉人員帶領引見內由緑營漢官揀用者止有一員詢之該部因向來遇有揀選漢員內合例者甚少未經保送到部是以多將各處保送之滿洲人員揀補但思緑營將領雖屬滿漢參用亦必須所占員缺多寡適均方合體制若似此概將滿員揀發行之日久勢必緑營盡成滿缺非所以廣掄選而勵人材即或成例稍有礙窒難行亦何妨斟酌變通俾武臣登進之途益昭公允即交兵部將揀選武職人員詳悉議行三十八年定商籍回避寄籍之例廣東升任布政使姚成烈條奏嗣後商籍中式之員咨回各本省照寄籍之例於截取赴選文結內聲明咨部注冊俟銓選時查核回避下部議行改設巴里坤府州縣各官大學士九卿㑹議巴里坤遵㫖改為鎮西府宜禾縣烏嚕木齊改為迪化州俱係邉逺緊要滿缺令該督於陜甘兩省滿員內揀選調補其安西一府地近嘉峪關較巴里坤更居內地應改為安西直𨽻州并州同州判等官俱定為邉缺於內地對品調補五年俸滿以應升之缺即用從之謹按嗣後陜甘改設各官均照此例定翰林考選御史唐淮奏考選御史選御史所有翰林院編修檢討均俟散館授職後厯俸已滿三年方准保送從之又諭朕駐蹕熱河月選知縣內有經驗看大臣擬改教職者每改一員祗於正備中帶領二員引見若擬改兩員即帶備班四員其餘毋庸概令前赴熱河至冉備人員更不必令其逺涉即引見時有經特㫖改教者其缺歸入下另行銓補其現今擬改教職之員如情願前來引見者固聽其便否亦無庸勉强著為令吏部議覆給事中富爾敏疏奏府尹一官管轄二十四州縣凡屬員升調參罰緊要事件與直𨽻總督㑹辦尤多請嗣後順天府尹府丞缺出凡籍𨽻直𨽻省人員概行扣除開列從之定候補教職效用例吏部議准嗣後各省教職凡病痊終養以及丁憂起復人員有情願自效者准其赴省呈明聼候該督撫委用遇有缺出先儘二等舉人冉委候補教職又准湖南巡撫梁國治條奏道府員缺緊要嗣後道府升遷事故懸缺需員署理者俱一靣遴選妥員委署一靣隨時奏聞從之又諭嗣後八旗升遷官員如實係親老不能逺離者得缺後准其呈報該部聲明緣由帶領引見候朕臨時酌量或以旗員或以部缺改用自無不可俟該員養親事畢仍照伊原得之缺坐補其預為地步巧行規避之例永著停止著為令又諭現在記名以副都統補用人員甚少副都統缺出頗難其選從前曾有㫖令領侍衛內大臣八旗都統等於各該管侍衛章京內將堪膺副都統職任者各就所知保舉一人著仍交領侍衛內大臣八旗都統等照前降諭㫖保舉於三日內封章具奏若該管處無可保之人即所知他處行走者亦可毋得狥情濫行保舉更定推升通判調取引見給事中何曰佩條奏在外推升通判向例停其調取引見通判職居府佐有督率屬員之責請嗣後通判一項亦令調取引見恭候欽定從之三十九年諭向來陵寢總管原係京城應升之人揀選帶領引見補授續因朕憐念陵寢翼長等俱係應升之人而又無多升缺令其來京與此處應選之人一同帶領引見是以本地翼長升授居多但伊等俱係本地之人補授後不無瞻徇庇護之處轉屬無益嗣後各陵寢總管員缺仍著照舊例以京城應升之人揀選帶領引見定本省鹽場批驗大使祗令商籍回避浙江巡撫三保條奏鹽場大使批驗所大使如止籍𨽻本省並非商籍者仍照舊毋庸回避若係商籍之員於起文赴選時在文結內聲明某省商籍咨部注冊以憑查核回避從之令內閣中書由吏部帶領引見御史穆精阿條奏嗣後內閣中書一項該衙門查核合例後由吏部帶領引見從之定福建晉江等縣教職繁缺福建巡撫余文儀學政汪新㑹題請將閩省泉州府屬之晉江安溪同安及漳州府屬之龍溪漳浦平和詔安七縣學教職照知縣繁缺分别調補從之四十年定設揀選投供簿吏部議覆御史邱日榮所奏各省請員揀發應以到部投供及供限已滿人員方准揀選嗣後凡應投供人員另設揀選投供簿未經投供者概不准預挑從之定各部主事遇四缺後截留一缺吏部議主事一項因各部學習散館并奏明題補人員為數較多遇有缺出扣留題補未免多占選缺請嗣後各部主事缺出以六部通計題補至第四缺後即截留一缺歸選奉㫖依議又諭向來馬蘭泰寧二鎮標遇有千把總員缺俱由各該鎮擬定正陪送部引見候㫖簡補其未經補用之擬陪各員下次雖得擬正亦尚須赴京引見今思此等微辨既經挑選擬陪原係可供録用之人若下次遇缺擬陪冉令來京師引見未免復勞跋涉嗣後馬蘭泰寧二鎮升補千把總所有擬陪未用之員著該部記名下次遇有應補缺出即按次補用毋庸冉行送部著為令更定中贊升轉例吏部奏查詹事府中允贊善二項例由修撰編修檢討升任向無分别現在正五品之庶子例由從五品之讀講等官具題滿洲中允亦例由贊善升用所有漢中允員缺請仿照滿中允之例由右轉左並將左右贊善按次升轉開列具題從之陜西布政使富綱奏請定直𨽻州員缺不准於所屬知縣內題補得㫖允行四十一年諭朕向來駐蹕熱河所有月選文武各員令該堂官帶至行在引見如遇巡幸各省則月選之文員通判州縣等官武員驍騎校千總等官即令留京辦事王大臣驗放不使選員久羈旅食以示體恤第王大臣驗放除照九卿等所驗衰頽者照例改教外並未見有所更調固屬不敢擅專之意但缺之繁簡不同人之能否不一若人地或不相宜當官即不免於叢脞是以朕於月官引見時每慎重甄核有年力强壯人尚明白而掣得簡缺亦有人本平庸齒復就衰而掣得繁缺者必為斟酌對調以協量材授官之意今王大臣於驗看月官惟恐更調易招物議遂為依樣葫蘆倘用違其才於吏治未為有益嗣後王大臣等驗看月官見有人缺不相當者即為悉心商確酌議對調仍令派出之九卿科道覆看如意見相同即一體聨銜具奏請㫖遵行若九卿科道中有言尚未允協者著吏部將所言之人記明并將擬調之員扣存候朕回鑾後引見定奪其武職內有應分别營衛者亦一體酌核妥議即自此次巡幸山東為始著為令又諭各部郎中員外俸滿截取知府時令該堂官酌量堪勝繁簡分别出具考語保送引見其有不勝外任者即行聲明留部各該堂官自應慎重甄别以副因才器使之意乃相沿日久各部堂官於俸滿人員率多徇情取悅惟户部近日尚有列為簡缺及不勝外任者留部亦不過一兩人其餘各部則多以繁缺保送殊非核實辦公之道知府為方面大員於吏治民生實有關係豈容以不堪勝任之員濫竽貽悮况各部保送人員遇有貪黷等事原舉之堂官處分甚重該堂官即欲瞻徇情面寧不知自顧考成乎嗣後各部堂官於俸滿截取人員務須秉公察核分别宜繁宜簡及不勝外任據實辦理不得仍前濫送又各部院司員補放御史向曾禁止不令仍兼本衙門辦事嗣因各部院欲得諳練人員仍准該堂官保留兼原衙門行走誠以公務為重特通融酌辦乃近年以來凡各部院司員補放御史者該堂官率以熟手奏留兼辦竟似成例相沿漫無區别且御史有稽察部務之責一經留部則兼吏部者必不肯糾參吏部之事兼户部者必不肯糾察户部之事其他可以類推久之恐致流弊嗣後由部院改補御史者非實係練習部務必不可少之人該堂官不必擅行奏留著為令臣等謹按向來部員俸滿截取知府皆以繁缺保送又司員升授御史仍兼辦部務經聖明酌定庶薦不致濫邀而政體益昭慎重矣又諭嗣後吏部查明滿洲䝉古人員有府道丁憂回旗已滿百日在部行走者俱於每年十月內帶領引見一次即自今嵗為始又諭滿洲蒙古人員由道府丁憂回旗已滿百日在部行走者曾降㫖於每年十月內該部查明帶領引見至滿員內曾任丞倅州縣丁憂回旗在原衙門行走者伊等曾膺外任於地方事務自較諳習著吏部一併查明照道府回京人員之例亦於每年十月內帶領引見一次臣等謹按四十二年奉諭兵部武職滿員副將以下丁憂俸滿病痊等事回京改用京職者照吏部例每年年終帶引見一次又四十六年諭內務府官員擢用道府者丁憂回旗於百日滿後照例帶領引見其包衣漢軍未曾為內務府司員者照八旗漢軍人員俟服滿歸部銓選俱著為令謹附識又諭吏部議奏嗣後直𨽻州知州一項請於各部院京察保送引見准其一等之主事等官內出具切實考語保舉引見按班升用所議尚未允協六部主事分辦部務有年事多諳練京察時保列一等以之升補直𨽻州知州自堪勝任至太僕寺等衙門主事及與主事升轉相同之經厯都事寺丞署正等官平日本無事可辦實非六部主事可比一旦驟膺直𨽻州之選必致竭蹶貽悮嗣後直𨽻州知州缺出應於六部京察一等滿漢主事內保舉引見記名銓用其小衙門之主事等官如有京察保列一等者止可令其改用六部主事設其中果有才具出衆之員在部復經保列一等者原未嘗不可録用庶於慎重吏治甄拔人材之道均為有益四十二年諭兵部奏請陜西西鳯協副將伸泰母老終養一摺旗員本無終養之例我滿洲從來淳朴之習但知尊君效力家計有所弗顧即外任有因親老情願回旗者原不妨據實呈明該上司回京當差候朕酌用京職若照緑營終養之例回京閒住轉屬非是而其人不得俸祿亦必致艱窘如因該員養親事畢仍得外用則旗人更不應如此存心計圖便宜伊等外用原係朕特恩豈可因此希圖戀職設使奉派出差出兵伊等亦得因親老呈請終養乎所有嗣後旗人終養之例著停止其有親老情願回京者准其具呈督撫奏明送部引見文員以部屬用武員或用侍衛或用旗職候朕酌量降㫖伸泰即照此例行定理藩院郎中員外郎題留咨選各事宜吏部議覆理藩院奏稱滿洲郎中滿洲䝉古員外郎缺出將一缺留題續出二缺咨部銓補應如所奏辦理但郎中員外郎內有滿洲䝉古之别請嗣後滿洲郎中滿洲員外郎䝉古員外郎如出三缺准其一缺留題二缺咨選應以各積各缺計算庶不致混淆從之又諭吏部議請從六品之州同及布政使經厯理問等官概不准其題升知縣應如所議但此等人員內或有才猷出衆者若限於成例未免可惜嗣後著各該督撫於此等人員留心察看如才具果堪膺民社人地實在必需者准其專摺奏請四十三年奏准承德新改府州縣為題缺吏部奏熱河同知遵㫖改為承德府知府其八旗等㕔改為知州知縣均定為在外題補之缺從之定州縣以上酌改繁簡缺不得與佐雜互易吏部言各省州縣以上選缺改繁而佐雜調缺改歸部者近日漸多請嗣後各省酌改缺之繁簡按缺分大小互相更換不准以州縣上之缺與佐雜互易從之又諭在京各部院堂司等官雖非外任上司屬員可比亦有管轄考核之責而外姻親屬中如翁壻甥舅之類戚誼最為親近向例概不回避究未妥協著該部另行定議具奏尋議得嗣後京官外姻親屬中母之父及兄弟妻之父及兄弟己之女壻嫡甥若在同衙門令官小者回避其同衙門同官者令後進者回避從之吏部將丁酉科八旗及直省一二等入選拔貢帶領引見奉㫖以知縣試用者特通阿等十五人以部員用者蘇保等九人餘交吏部以教職佐二等官用吏部奏蘇保等以部員用者向無成案若照新科進士分部學習之例未免太優請照雍正八年湖北拔貢楊可鏡之例在七品小京官上學習行走從之四十四年諭三寶奏福建臺灣道張棟三年届滿應遴選更調請將興泉永道俞成調補其興泉永道係由部請㫖之缺請調簡員補用俞成遺缺既請員揀放而張棟回至內地又復空閒待補仍須另請題缺與其多此周折何如即令對調之為直捷乎所有興泉永道員缺著即令張棟補授嗣後如有臺灣道府期滿調回者即照此辦理著為令四十五年停員外郎俸滿截取吏部言前因郎中不敷升用於乾隆三十二年十一月奏請將員外郎二年俸滿截取知府現查各部郎中截取者已不乏人所有員外俸滿截取之例應請停止從之又諭申保於賽哩木沙雅爾兩處所遺阿竒木伯克員缺並未揀人奏請補授阿竒木乃統理一城事務之人一經缺出即當揀人奏請補授如內地道府朕尚知其賢否有記名者至於回部伯克之賢否朕安得知之向來阿竒木缺出該城大臣於衆伯克內揀選數人奏請補授其中開注誰優朕即准令補授回部各城駐防大臣當揀其好者保奏不可稍有瞻徇若將不肖之人瞻徇妄保日久事出較內地妄保府道者加倍治罪著將此通諭駐防烏什葉爾羌喀什噶爾哈喇沙爾庫車哈密等回城大臣等務遵朕㫖行又諭昨因袁守侗奏請將文安縣知縣資原庚改教朕閲該員出身係在教職任內由舉人本班截取經該撫給咨赴選得缺後又經特派大臣驗看何以復行改教因令軍機大臣詳查原驗之督撫大臣併降㫖交吏部酌定處分隨據查明資原庚甫於本年二月經該撫李湖驗看給咨四月選授文安縣後係派出之綽克托等驗看則資原庚係屬近日之事其年力衰壯可以一望而知非數年後漸覺衰頽始請改教者比嗣後教職截取選授知縣人員其到任五年後督撫以衰老甄别者則原驗之督撫大臣竟毋庸置議若未屆五年即以衰老被劾則距驗看時甚近何至遽行衰邁其察驗之不實可知即將該督撫及派出驗看之大臣均照例議處著為令又諭嗣後各邉省烟瘴苗彊厯俸未滿離任各漢員除告病終養仍照舊例坐補外其丁憂服闋各員著歸入起復應補班內由部照例銓補所有仍發原省交該督撫酌量題補之例著停止定議叙人員輪流間補吏部議凡捐餉修書優叙即用之員遇各項應得缺出先用即用一人次用正班一人輪流間補從之又諭向來各部院司員保送三庫稅差錢局坐糧㕔等項每有將曾經得差之人員未隔數年復行保送者不知在京滿漢司員人數本多此等得項較優之差自應令其均霑普及若出差未久復豫保送則從未得差者未免向隅嗣後保送此等差使之員其已經派過者著以十年後方准再送如堂官等違例朦混保送經朕查出及被人參奏者即照徇庇例議處著為令又諭向來各部院司員升調别處者有准留原衙門行走之例固為􅌻練事務起見但部院人材不乏斷無少此一二人即不能辦事之理所有現在各部院奏留人員俱不准仍兼行走至刑部為刑名總滙必得諳悉律例之員理藩院有外藩事件必係䝉古旗員能習䝉古文語者奏留之例尚屬可行然亦必帶領引見候朕欽定方可准其仍兼行走著為令四十六年護軍出身讀祝等官不准保送理事同知禮部尚書德保奏向例揀選撫民同知通判如讀祝官贊禮郎鳴贊三項內有由護軍親軍前鋒及拜唐阿挑補者不准保送今揀選理事同知通判均係外任請即照撫民同知通判之例將由護軍人等出身之讀祝等官均不准其保送從之又諭和珅等奏請將內務府現任筆帖式歸併八旗應考現任筆帖式內届期統由吏部請派大臣一體考試等語固屬酌歸簡易自應如此辦理但各部院衙門筆帖式甚多內務府筆帖式較多若一體考試勢必內務府人員考居下等者多嗣後內務府筆帖式著歸各部院筆帖式一體考試並仿照鄉㑹試之例分别字號另列等第以昭平允四十七年諭嗣後朕駐蹕熱河時補放世襲佐領祗令正陪人員前來引見其列名人員毋庸前來四十八年諭昨福建建寧鎮總兵缺出軍機處將記名之副將各員名單進呈已簡用王炳矣查閲此外記名者共五員俱係滿洲旗員推原其故皆由各省奏請揀發將備人員而在部候補候選漢員本少是以向來多由侍衛章京滿員保送發往兼之鑾儀衛滿洲漢軍人員又有應得額缺原議未免過優以致各省參將副將等缺滿員居多各該督撫保送亦多滿員外省緑營習氣自不若滿洲之淳朴嫻習弓馬足以整頓營務但不定以限制行之日久各標營均係滿員於緑營升遷之途必致壅滯殊非滿漢一視之道所有各省武職自守備以上及鑾儀衛滿洲漢軍額缺並酌量調劑俾漢員升途得免壅滯旗員亦不致濫冗軍機大臣㑹同該部分晰議行又諭各部院司員升調别處奏留原衙門行走之例業經降㫖停止因刑部為刑名總滙理藩院有䝉古事件必得熟悉之員是以准其仍兼行走但思奏留人員內如京堂翰林等官本屬間曹兼各部行走尚無關礙至科道有糾劾之責未便令其仍兼各衙門辦理司員事務即刑部理藩院之􅌻悉部務司員本部留以辦事有何不可何必又送科道博升職之虛名資掣肘之浮議乎嗣後刑部理藩院概不准兼科道其果能始終出力該堂官據實奏聞帶領引見候朕以四五品京堂酌量補用仍可兼部行走四十九年更定滿漢從六品以下佐雜議叙人員輪選班次吏部言向來各館修書及各處捐輸議叙人員酌量分班選用於正班應用人員並無窒礙近年以來各館奏請優叙者愈積愈多漸至各項正班應用筆帖式及外任佐二人員得缺無期於銓政未為平允應請將滿漢人員議叙選法另為更定庶議叙與正班均得輪流補用一各部院滿洲䝉古漢軍筆帖式定例各按旗分用考取三人捐納一人議叙一人繕本一人降調一人遇有議叙即用者均應先儘補用乾隆四十五年十一月內臣部因議叙即用人多侵占正班奏明即用一人後仍用正班一人輪流間用今查數年以來各處議叙人員又數倍於前現在正班補期較難今請更定議叙即用一人後用正班三人其有各館夾片奏明不論旗分即用人員亦請仍按旗分入於即用班內統較奉㫖日期先後補用議叙即用者既經如此更定其議叙正班三缺後用者亦應更定為正缺後用一專用理藩院䝉古筆帖式定例正班貼寫一人考取一人議叙一人近年議叙即用與議叙各班之前先用者多計正班止用三人而議叙者竟用至六人正班得缺較難應請更定議叙即用人員用一人後將正班三項各用一人冉准議叙先用者用一員冉用正班三項各一人輪流補用以昭平允一外任從六品以下佐雜至從九品未入流等官原定議叙即用一人後用正班一人輪流間用今查漢員議叙向係各積各缺正班止用一人各項議叙皆得到班計正班用一人而議叙者竟至倍蓰正班竟無得缺之日今請更定照滿員議叙之例無論何項議叙即用先用分缺簡用正班幾缺後用與正班幾班後用凡議叙班次相同者各併作一班到班時統較奉㫖日期先後即用分缺簡用正班幾缺後用正班幾班後用者止准各用一人冉到班時將其次奉㫖之人各用一人周而復始庶議叙與正班均得補用不至偏枯從之五十年諭向來各省副將缺出兵部於由部推升者將本省之合例應升參將同各省俸深反一等卓異人員開單進呈而於應題之缺外省如無合例人員兵部開列請㫖則止將記名及一等卓異者繕單進呈其本省參將及各省俸深人員並不開列雖係向例如此但條例繁多轉易啓吏胥髙下其手之弊嗣後各省副將缺出兵部開列時無論部推題補等缺著將本省合例應升參將及各省俸深人員與記名及一等卓異者概行開單進呈候朕簡放以昭畫一著為令又湖南巡撫陸耀疏稱定例官員父母年七十以上家無以次成丁或年至八十雖家有次丁俱准呈請終養至人子出仕有年其父母先已迎養在署自可朝夕承歡公私兼盡若父母初未隨任在外者不肯言歸在家者轉出求仕於名教大有關係查有試用知州李永埰據稱伊父年已八十止有子姪侍奉又試用知縣胡宗定有嫡母在家現年亦八十該二員俱例應呈請終養今在省候補正需時日乃皆背棄老親逺來待缺雖其年力均可委用然方今人才甚多並不少此兩人即候終養事竣冉出報效亦未為遲臣為風俗人心起見現在勒令回籍終養并通查所屬如有例應告歸之員即令呈請歸籍侍養請敕下各直省督撫不論現任及試用人員凡親年八十以上及獨子之親年過七十以上者通飭自行呈明聼其終養似於皇上孝治天下之至意不無小補得㫖所奏是該部如議行嗣後吏部議奏地方正佐各官父母年老先已迎養在署者准該員呈明袛停其升轉不必概令離任回籍奉㫖此議是依議又經兵部奏向來武職丁憂雖有副將以上回籍守制參將以下在任守制之别而親老改補近省及呈請終養俱係與文職一體辦理今文職親年八十以上及獨子之親年七十以上者既應呈明終養武職亦未敢兩歧應請自千總以下多係本省人員仍遵照舊例外其守備以上亦照陸耀所奏辦理奉㫖兵部具奏武職守備以上各官親年凡八十以上及獨子之親年七十以上者應否照陸耀所奏呈請終養一摺文武雖無岐視而職任各有不同文職以教孝為先武職則以教忠為重是古人於兵革之事不妨奪情而武職當出兵打仗時雖遇私艱仍在軍營宣力情形又殊原不必與文職官員一體辦理也嗣後應丁艱之副將以上著照文職一例行其參將以下如有因親老呈請終養者照舊例辦理其餘親老者不必概令離任回籍又諭現在記名堪勝知府者漸次用完將來遇有缺出不敷簡放著傳諭劉峩薩載富勒渾福康安閔鶚元畢沅農起明興何裕城於所屬同知直𨽻州內秉公揀選堪膺郡守者二三員具奏並出具切實考語送部引見候朕酌量簡用即或督撫現屬內難得其人其從前屬員有在别省為同知直𨽻州者如果熟悉其才具可勝知府亦准一體保送又諭前據何裕城奏請將丁憂知縣王垂紀留辦西安城工一摺已批所奏不可行並諭該撫即飭該員回籍守制昨又據富綱奏請以丁憂雲州知州宋昌琤接辦寧臺厰務亦批不必令另選合例之人具奏矣奪情起復非所以教孝敦倫古人惟於軍旅之事偶一行之若地方遇有不情如撤拉爾逆回等事軍務緊要其承辦軍需之各州縣設遇丁憂該督撫自不妨奏請權令在任守制至城工厰銅非軍務可比有何必須一人始終經理而為此破例之舉設遇其人病故又將如何豈必起死回生而後可不致乏員辦事耶大抵該督撫之為此奏非徇情市恩即係該員干求請託並非専為地方政務起見徒令此等在任守制之員坐擁廉俸戀職忘親轉藉王事羈留不得稍盡人子之禮資為口實於官方政化俱有關係著通飭各省督撫嗣後非遇軍務不得以丁憂人員奏請留任著為令又工部議准街道㕔管理街道向例由工部步軍統領衙門各選派司官二員都察院選派御史二員帶領引見恭候欽㸃每衙門各一員工部司員既有部務難以兼顧步軍統領衙門又止有滿員其本衙門事務亦繁即所派之御史若専止滿員恐該員等住居內城不能常赴外城查閲應請嗣後保送管理街道之御史兼派滿漢各一員俾住居城外之漢御史更得就近不時稽查併查照舊例責成巡城御史各按所管地方協同管理又街道􅈦向係一年為滿恐更換太速未免責任不專嗣後併請仿照巡城之例統以兩年為滿方請更换至管理街道之司員御史及協理之巡城御史如不認真督辦致有道路不平惰民索詐等弊參奏議處似此立定章程庶外城街道整頓有方可以肅觀瞻而便行旅從之辟舉臣等謹按漢初諸王列侯之國惟相命於天子其御史大夫以下皆自置至州郡别駕長史以及掾吏皆刺史太守自辟是猶沿襲三代封建時諸侯薦人於天子二卿命於天子一卿命於其君之制不知既舉封建而郡縣之又使其長得自辟僚屬不惟啓大權旁落之漸亦殊非官方畫一之規我朝無辟舉之令一命以上皆歸於吏部或外省督撫陛辭之日自請擕帶人員隨往委用嗣即停止我世宗憲皇帝許督撫保舉幕賔限年奏請録用亦不數行至於保舉堪任言職及經學分别補用其白首窮經癃老不能至都者並蒙異數給與職銜附辟舉卷內以備我朝之掌故云順治二年詔舉秦中山林隱逸并録用故明文武進士舉人十二年科臣朱徽奏請飭督撫無論前代遺紳與山林隱逸果有才堪理民學足輔世者核實具奏該部覆核即加擢用其不願仕者亦准其原官休致庶四方向風人才輩出下所司議行十七年四川道御史楊素藴奏言臣閲邸報見平西王吳三桂恭請升補方面一疏以副使胡允等十員俱擬升雲南各道并奉差部曹亦在其內臣不勝駭異夫用人國家之大權惟朝廷得主之從古至今未有易也即前此經略用人奉有吏兵二部不得掣肘之㫖亦惟以軍前效用各官或五省中人地相宜資俸應得者酌量具題從未聞以别省不相干涉之處及見任京官公然坐缺定銜如該藩今日者也且該藩疏稱求於滇省既苦索駿之無良求於逺方又恐叱馭之不速即如所言湖南蜀省去滇稍近猶可計日受事若京師山東江南等處距滇省萬里不知所謂逺更何在也况該藩用人皇上所以特假便宜者不過欲就近調補無誤地方耳若盡天下之官不分內外不論逺近皆可擇而取之則何如歸其權於吏部照常銓授尤為名正言順也即雲貴新經開闢料理乏人諸臣才品為該藩所知亦宜先行具題奉㫖俞允然後令吏部照缺銓補猶不失權宜之中計乃徑行擬用無異銓曹不亦輕名器而䙝國體乎夫古來人臣忠邪之分其故莫不起于一念之放肆在該藩敡厯有年應知大體即從封疆起見未必别有深心然防微杜漸當慎於先機伏乞天語申飭令該藩嗣後惟力圖進取加意綏輯一切威福大權俱宜禀命朝廷則君恩臣誼兩得之矣疏入報聞康熙十九年雲南巡撫伊闢奏請將隨行人員坐名題補上諭大學士等曰此等坐名隨行人員果堪用者亦復何害乃一時倉卒奏請往往不能盡當如知府知縣等官俱將此輩補授徒誤地方此後坐名題補各員概為停止吏部仍照例銓補雍正元年吏部奉諭㫖各省督撫衙門事繁非一手一足所能辦勢必延請幕賓相助其來久矣但幕賓賢否不等每有不肖之徒勾通內外肆行作弊黜陟屬員則清濁混淆申理訟獄則曲直倒置敗督撫之清操誤督撫之功名彼則置身事外飽槖而去殊屬可限夫今之幕賓即古之參謀記室凡節度觀察等使赴任之時皆徴辟幕僚功績果著即拜表薦引彼愛惜功名自不敢任意茍且嗣後督撫所延幕客須擇厯練老成深信不疑之人將姓名具奏如效力有年果稱厥職行文咨部議叙授之職位以示砥礪該部詳議具奏尋議各省督撫應將幕客姓名造冊報部勤慎無過者照應得職銜即用無職銜者量給職銜特疏舉薦者從優議叙如狥私保舉照狥庇例議處從之六年內閣奉諭㫖向來督撫赴任之時有奏請將平日所知人員帶往以備委用者朕因督撫事務甚繁欲得素所熟悉之人以收臂指之效事屬可行是以允從所請令其帶往酌量題補近聞督撫等帶往人員在地方不甚相宜或羣相趨奉而指為上司之腹心或妄生議論而以為上司之偏袒其中弊端日生以致流言不少朕思所帶之二三人其得力者有限而阻衆人效力之心且督撫等果公正精明善於察吏則闔屬中豈無有亷幹之員可相信以心相資為理者何必帶往之一二人是賴而啓衆口之疑議乎除已經到任之後因本地要缺奉㫖題補不必解任外如楊文乾陳時夏莽鵠立及各省督撫大吏從前所請帶往之人目今見在屬下者俱著回京請㫖另用乾隆元年奉諭㫖尚書楊名時奏薦進士莊亨陽舉人潘永季蔡德峻秦蕙田吳拔貢生官獻瑶監生夏宗瀾等七人皆留心經學可備録用楊名時見管國子監事務所薦莊亨陽等七人著該部調來引見為該監屬員聼楊名時等分委辦事以收成均課士之益二年詔地方有才品優長山林隱逸之士著該督撫核實具奏酌豫録用七年奉諭㫖朕御極以來廣開言路虛心納諫其言是者不次超擢未是者亦曲豫優容科道官當體朕心於國家綱紀政事利弊官吏賢否民生休戚一一據實指陳方為無忝厥職乃黽勉盡言者固不乏人而或者以訐為直務自取為名髙而朝廷卒不獲其益者亦復不少此皆用匪其人官不稱職朕亦不能辭其咎也夫言官為風紀所關止為身謀則將來或因以分門樹異或因以植黨營私必致惑人心而搖國是史冊所垂足為殷鑒古者諫無專官故進言之路廣三代而下始設官而責之以言然如馬周陽城之起布衣而為御史其事猶可風也兹特降諭㫖著大學士九卿擇以素所深知其人有骨鯁之氣直朴之風而復明通內外政治者不拘資格列名封奏朕將量加録用焉其外而督撫於各屬員中有深知灼見可備糾繩之任者亦准列名封奏十六年選舉經學人員先是乾隆十四年奉諭㫖聖賢之行本也文末也而文之中經術其根柢也詞章其枝葉也翰林以文學侍從近年來因朕每試以詩賦頗致力於詞章而求其沈酣六籍含英咀華究經訓之閫奧者不少槩見豈篤志正學者鮮與抑有其人而未之聞與夫窮經不如敦行然知務本則於躬行為近崇尚經術良有關於世道人心有若故侍郎蔡聞之宗人府府丞任啓運研窮經術敦朴可嘉近者侍郎沈德潛學有本源雖未可遽目為巨儒收明經致用之效而視獺祭為工剪綵為麗者逈不侔矣今海宇升平學士大夫舉得精研本業其窮年矻矻宗仰儒先者當不乏人奈何令終老牖下而詞苑中寡經術士也內大學士九卿外督撫其公舉所知不拘進士舉人諸生以及退休閒廢人員能潛心經學者慎重遴訪務擇老成敦厚純朴淹通之士以應精選勿濫稱朕意焉至是大學士九卿等保舉經學人員遵㫖冉加核實奏上奉諭㫖保舉經學之陳祖范吳鼎梁錫璵顧棟髙既據大學士九卿等公同覆核衆論僉同其平日研窮經義必見之著述朕將親覽之以覘實學在京者俱交送內閣進呈其人著該部帶領引見在籍者行文該督撫就取之朕觀其著述另降諭㫖或願赴部引見或年老不能來京者聽嗣於八月奉諭㫖據王師摺奏保舉經學之陳祖范顧棟髙年力老邁不能來京陳祖范顧棟髙俱著賞給國子監司業職銜以為績學之勸所有著述留覽尋授吳鼎國子監司業梁錫璵額外司業三十八年諭前據辦理四庫全書總裁奏請將進士邵晉涵周永年余集舉人戴震楊昌霖調取來京同司校勘業經降㫖允行但念伊等現在尚無職任自當豫以登進之途以示鼓勵著該總裁等留心試看年餘如果行走勤勉實於辦書有益其進士出身者准其與壬辰科庶吉士一體散館舉人則准其與下科新進士一體殿試候朕酌量録用四十五年諭原任陜西巡撫畢沅保奏之關中書院掌教進士戴祖啓著加恩以國子監學正學録用皇朝文獻通考卷五十八
