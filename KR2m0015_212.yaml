body:
  text: 經籍考二經易周易清解無卷數江見龍撰見龍字夀水杭州人康熙中諸生臣等謹按是編列繫辭説卦雜卦序卦於上下經之前分為二卷名曰孔子讀易傳見龍之意殆欲以是尊孔子而不知後經先傳漢晉以來未之前聞者爾周易傳注七卷附周易筮考一卷李塨撰塨字剛主號恕谷蠡縣人康熙庚午舉人官通州學正塨自序曰易為人事而作也乾坤索而為雷風水火山澤本天道也伏羲因而重之而蒙需訟師謙履等卦即屬人事文王彖辭於乾繫元亨利貞猶天道人事兼言也至坤利牝馬之貞君子攸行等辭專言人事周公象辭則勿用利見大人朝乾夕惕無非人事者以下六十二卦即復姤泰否明屬天道而利有攸往勿用取女小人大人必歸人事乃知教人下學不言性天自伏羲文王周公以來皆然塨弱冠受易於顔習齋惟以人事為教及壯謁許酉山毛西河一言易卦象數一辨河洛太極歸而玩易一一與向所傳人事者近焉周易本義述藴四卷周易藴義圖考二卷薑兆錫撰兆錫字上均丹陽人康熙庚午舉人乾隆初薦充三禮館纂修官周易劄記二卷楊名時撰名時字賓實江隂人康熙辛未進士官至禮部尚書諡文定臣等謹按名時本大學士李光地所取士故其詮解經傳多本師説純以義理為宗又撫雲南時嘗與夏宗瀾論易問答具載宗瀾書中硯北易鈔十二卷黃叔琳撰叔琳字崑圃大興人康熙辛未進士第三官至詹事府詹事乾隆辛未蒙恩加銜吏部侍郎宋元周易解提要附易解别録無卷數不著編輯者姓氏前有黃叔琳私印署曰養素堂纂本周易淺解四卷張步瀛撰步瀛字瀚先河南新安人康熙辛未進士易經詳説無卷數冉覲祖撰覲祖字永光中牟人康熙辛未進士改庶吉士周易傳義合訂十二卷朱軾撰軾字可亭髙安人康熙甲戌進士官至大學士諡文端乾隆二年兩廣總督鄂彌達校付剞劂恭呈御覽皇上御製序曰易之為書以竒耦明隂陽之象以隂陽闡健順之德以卦爻該事物之變以易簡盡天下之理潔淨精微而廣大悉備天德王道一以貫之故曰易者五經之源也顧自漢魏以來考象變者泥於術數而不足以通幽明之故談義理者淪於空寂而不足以研倫物之幾至程子易傳朱子本義出而義理象數始歸於一於是四聖人作易垂教之旨煥然復明於萬世我皇祖聖祖仁皇帝御纂周易折中探源河洛直接心傳而綜括儒先首列程朱傳義誠以傳義者羲經之樞鑰而易道之通津也故大學士髙安朱文端清修正學品重當代曩在講席啓沃良多平生所學專於儀禮小戴記而易春秋周官亦旁及焉所著傳義合訂一編探二子所以云之意發揮而引伸之簡而當博而不支鈎深探賾而不鑿蓋玩之熟故擇言也精體之深故析理也密可謂善言易者矣文端以兩粵督臣鄂彌達舊為曹屬手授是書鄂彌達梓而傳之刻成進覽披閲之下當日勤勤懇懇嘉惠來學之苦心恍乎若接不禁愴然爰援筆而為之序例略曰遺象言理自王輔嗣始然易者象也有象斯有理理從象生也孔子彖象二傳何嘗非言象雷風山澤以及乾馬坤牛皆象也即卦之剛柔上下應比承乘亦何莫非象乎舍是而言理不知所謂理者安在又曰卦有對易反易反易之義先儒言之已備來知德謂之卦綜謬矣又曰講易以程傳朱義為宗二書互有同異而止録一説宋元來易圖概不甄録止以所見縷晰朱子篇首各圖之義而圖仍不載並以經傳文合於一處使經旨易於瞭然易學參説二卷馮昌臨撰昌臨字與肩嘉興人易象二卷王明弼撰明弼字亭二陝西人官鳯翔府教授易宫三十八卷讀易管窺五卷吳隆元撰隆元號易齋歸安人康熙甲戌進士官至太常寺少卿讀易約編四卷朱江撰江字東注江都人孔門易緒十六卷張德純撰德純字能一號松南長洲人康熙庚辰進士官常山縣知縣德純自述略曰經本無隂陽剛柔之名及天地風雷水火山澤之象皆夫子所顯示以闡經故曰孔門易緒易韋二卷朱襄撰襄無錫人臣等謹按易韋别有全書此特其卷首圖説及字義二卷觀其自序曰命之曰易韋而撮取大傳中之字推明其義冠於易韋之前可見周易闡理四卷戴虞臯撰虞臯號遁軒崑山人周易玩辭集解十卷查慎行撰慎行字悔餘號初白海寧人康熙癸未進士官翰林院編修慎行自序曰慎行童而讀易白首而未得其解也則仍於聖人之辭求之始而玩卦辭爻辭繼而玩彖傳大小象辭務於聖人之辭字字求著落詮釋其求諸經文而不得必先考之注疏復參以諸儒之説不敢偏徇一解亦非敢妄立異同也臣等謹按慎行為黃宗羲弟子故能不牽引圖書之説其闡發經義簡潔明淨而無駁雜之弊於宋學頗有所得焉易蕩二卷方鯤撰鯤字羽南桐城人易説要旨二卷李寅撰寅字東崖吳江人易象數鈎深圖三卷張文炳撰文炳字明德絳州人康熙中由供事議敘官至泗州知州臣等謹按是書捃拾宋元經解詞頗龎雜且於纂述體例亦多未洽然近世胥吏之能著書者泰安聶鈫而外文炳一人而已周易象義合參十二卷吳德信撰德信字成友九江人易説六卷惠士竒撰士竒字仲儒吳縣人康熙己丑進士官至翰林院侍讀臣等謹按士竒長於三禮之學其説易皆有依據推闡實義與諸經相貫通周易通義十四卷方葇如撰葇如字藥房淳安人周易本義晰無卷數胡良顯撰良顯字忠遂别號得岑漢陽人康熙辛卯舉人官武城縣知縣周易函書約存二十四卷約注十八卷别集十六卷胡煦撰煦字滄曉光山人康熙壬辰進士官至禮部侍郎臣等謹按是書原本一百十八卷簡帙浩繁有正集續集别集之分後因正集未刻稿已散佚而續集之名亦無緣起其子季堂重為校訂取論易之語分原圖原卦原爻原占者編為約存取詮釋經義者編為約注而以篝燈約旨易解辨異易學須知編為别集其持論酌於漢學宋學之間與朱子本義頗有同異易説十卷田嘉穀撰嘉穀字樹滋陽城人康熙壬辰進士官翰林院編修先天易貫五卷劉元龍撰元龍字凝焉饒陽人易箋八卷陳法撰法字定齋貴州安平人康熙癸巳進士官至直隸大名道易經纂言無卷數王士陵撰士陵字阿瞻武邑人康熙癸巳舉人官翁源縣知縣周易本義拾遺二卷李文照撰文照字朗軒長沙人康熙癸巳舉人文照自序略曰本義於辭多得之而於象未深考因為補葺釋經則以象數為主釋傳則以義理為歸各條載本義全文而以已説附於後易經釋義四卷沈昌基撰昌基字儒珍烏程人易鏡無卷數戴天章撰天章字漢文湖州人心易一卷戴天恩撰天恩字福承蕭山人易經粹言三卷應麟撰麟字囿呈宜黃人康熙丁酉舉人易互六卷楊陸榮撰陸榮字采南青浦人成均課講周易無卷數崔紀撰紀原名珺字君玉後更今名字南有永濟人康熙戊戌進士官至副都御史臣等謹按紀于周易四書均有論述而易及學庸均被以成均課講之名蓋其官祭酒時所與諸生講説之本也楚蒙山房易經解十六卷晏斯盛撰斯盛字一齋新喻人康熙辛丑進士官至湖北巡撫周易孔義集説二十卷沈起元撰起元字子大太倉人康熙辛丑進士官至光祿寺卿臣等謹按是書因明髙攀龍周易孔義之名復加纂集大旨謂孔子作十翼上契羲文垂教萬世故凡先儒傳説惟擇其不悖於孔傳者取之於先天後天方圓諸圖焦京陳邵之説概從刪汰焉索易臆説二卷吳啓昆撰啓昆字宥函江寧人康熙辛丑進士官翰林院編修陸堂易學十卷陸奎勳撰奎勳字坡星平湖人康熙辛丑進士官翰林院檢討奎勳自序曰奎勳少嵗讀易遍覽先儒理解始由朱子本義知有孔子之易繼即孔子十翼知有伏羲神農黃帝堯舜禹湯文武周公九聖人之易祇説卦一篇足該全易之旨人知天地定位章為羲卦之象不知坤以藏之章為歸藏象帝出乎震章為連山象也又不知商之歸藏本於神農夏之連山本於黃帝也人知畫卦重卦皆由伏羲而不知蓍數起於黃帝乾坤八卦之名亦起於黃帝也又不知屯蒙五十六卦名增加於堯舜時也人知文王有彖辭而不知文王序卦之妙也人知周公有小象而不知説卦傳中凡言乾坤八卦之象皆周公所集成與夫象傳之上下兩象亦本諸文王周公而作非孔子所自取也既得其象於義自達於辭自通矣周易録疑無卷數陳綽撰綽字文裕福安人臣等謹按是編每條之下間有標湜附二字者湜字亦徵綽之子也易義隨記八卷易卦劄記四卷夏宗瀾撰宗瀾字起八江隂人由拔貢生薦授國子監助教大易擇言三十六卷易説辨正四卷程氏易通十四卷程廷祚撰廷祚字綿莊號青溪上元人臣等謹按廷祚於諸經皆有撰述其講易則專宗程傳闡發義理多自得之言學易闡微四卷羅登標撰登標字子建寧化人康熙中舉人官松溪縣教諭讀易質疑二十卷汪璲撰璲字文儀號默菴休寧人周易會輯無卷數吳映撰映字沐日晉江人大易闡微録十二卷劉琯撰琯字獻白棗強人周易詳説十九卷劉紹攽撰紹攽三原人易翼述信十二卷王又朴撰又朴字介山天津人雍正癸卯進士官至廬州府同知周易原始六卷范咸撰咸字貞吉號九池錢塘人雍正癸卯進士官至監察御史咸自序曰易原始於畫有畫而象成有象而理寓咸敬遵御纂折中本以釋經凡諸儒舊解之合者悉著於篇間附已見而象傳未暇及焉曰原始者原經之所以始即原畫之所以始也周易淺釋四卷潘思矩撰思矩字補堂陽湖人雍正甲辰進士官至福建巡撫白瀛序略曰思矩點勘通志堂所刋易解四十二家竭畢生之力以成此書缺乾坤二卦未注故此本所説惟六十二卦其彖傳象傳則用注疏本附經併釋而文言繫辭説卦序卦雜卦則未之及周易撥易堂解二十卷劉斯組撰斯組字斗田新建人雍正甲辰舉人官知縣周易摘抄五卷顧昺撰昺號虛莊南滙人雍正甲辰舉人學易大象要參四卷林贊龍撰贊龍字雲澤侯官人雍正丙午舉人經義管見一卷饒一辛撰一辛字冶人江西廣昌人周易解翼十卷上官章撰章字暗然乾州人東易問八卷魏樞撰樞承德人雍正庚戌進士官永平府教授乾隆元年薦舉博學鴻詞未及赴而卒例略曰樞生長遼東日與東人相問答故敘其原委而集之以示初學名之曰東易問易貫十四卷張敘撰敘字鳯岡太倉人雍正壬子舉人周易緯史無卷數錢偲撰偲號堅瓠老人錢塘人雍正壬子副榜貢生臣等謹按是書以卦爻分配史事故曰緯史然所引史事殊未考核周易洗心九卷任啓運撰啓運字翼聖荆溪人雍正癸丑進士官至宗人府府丞啓運自序略曰讀易者當先觀圖其要不外論語五十以學易之言文周卦畫自羲圖出羲圖自河洛出五十者圖書之中也學易不以五十失其本矣易經理解一卷郜煜撰煜字光庭汝州人雍正癸丑進士官中書科中書空山易解四卷牛運震撰運震字階平號真谷滋陽人雍正癸丑進士官平畨縣知縣運震自識曰學易之法本之繫辭説卦以括其綱證之乾坤二卦以比其例考之六十二卦以盡其變參之彖象以指其歸通之大象半象虛象實象以廣其類然後求之揲著占事以定其向周易剩義二卷童能靈撰能靈字龍儔號寒泉連江人雍正中貢生易象圖説會通八卷易象圖説續聞一卷周易輯説存正十二卷附易説通旨略一卷楊方達撰方達字符蒼武進人方達圖説會通自序略曰尋繹宋元經解及近代名家纂述見其精研象數或著為圖或著為説有禆易學者類而録之左圖右説集成八卷周易蛾術七十四卷倪濤撰濤字昆渠錢塘人嵗貢生官遂安縣訓導臣等謹按是書原名四尚四尚者即尚辭尚變尚象尚占每節首列本義次以四者為綱而采綴諸説於後又次則卦主體用性理引證四條其他如納甲卦氣圖書方位亦備列之易説一卷吳汝惺撰汝惺字匪席德州人易經一説無卷數王俶撰俶字善思彭山人周易彚解衷易十五卷許體元撰體元字御萬靈武人易象援古無卷數申爾宣撰爾宣字伯言河南人臣等謹按此編乃爾宣述其父舒坦命意書中多引古事以證易理故曰援古然其間逐爻取譬如師之六爻謂如宋伐江南泰之二爻如狄仁傑事周之類大率多擬不於倫云大易合參講義十卷朱用行撰用行字翼承新建人周易粹義五卷薛雪撰雪字生白號一瓢蘇州人易著圖説十卷潘咸撰里居未詳咸自序曰讀易者當自知蓍始易有三蓍亦有三周易大衍蓍用四十九䇿以四為揲內含六百八十七萬萬一千九百四十七萬六千七百三十六卦共用四千九十六卦以彖爻二辭占左傳繇辭皆四千九十六之卦詞也邵子皇極經世為連山蓍用九十七䇿以八為揲正卦一千一十有六互卦一千一十有六變卦三萬二千五百十有二以數斷不以辭斷其吉凶一定而不可易後周衛嵩元包為歸藏蓍用三十六䇿以三為揲以飛伏世應渾天納甲五行生剋占吉凶用十二支十干為千有二百兆讀易自識無卷數金綎撰綎字絲五吳縣人易觀十二卷凌去盈撰去盈號旭齋爵里未詳周易小疏十四卷虞楷撰楷字孝思號蓼園里籍未詳豐山易説十卷王心敬撰心敬字爾輯􅀈縣人乾隆元年薦舉賢良方正以老不能赴心敬自述曰學易可以無大過是孔子明易之切於人身即是可以知四聖人繫易之本旨並可以識學易之要領又曰易是道人之書隂陽消長只是借來作影子耳故曰易者象也象者像也於隂陽消長處看得不明是影子不真若徒泥隂陽消長而無得於切已之人事亦屬捕風捉影又曰置象言易是謂懸空執象舍義是謂泥迹象義雙顯則體用一源微顯無間易準四卷曹庭棟撰庭棟字六吉號楷人嘉善人乾隆丙辰薦試博學鴻詞例略曰第一卷明河圖圖出希夷與世所謂圖者中位則異第二卷明洛書書有本象與世所謂書者實數則虛竭其一得闡抉務該間有前人所已言者托而並録第三卷明大衍圖大衍有十圖皆為洛書傳者既罕言者絶少則抒獨見以發明之第四卷明蓍法蓍法所由來見之易傳而疏解舛訛乃求得挂一歸竒之旨凡以求合於圖書之數而已周易述二十三卷易漢學八卷易例二卷增補周易鄭注一卷惠棟撰棟字定宇號松崖元和人士竒子臣等謹按棟謂西漢明易者少京房易傳只有積算法而佚其章句東漢可考者有數家惟虞翻獨冠羣儒荀爽又虞翻之先河也而不及虞之精密是編專用虞説兼及荀氏而恭以九家諸説蓋以漢猶近古故述荀虞二家之注凡散見於六經周秦諸書中及略見於資州李鼎祚集傳者皆為疏定漢學八卷又取孟喜虞翻京房鄭玄荀爽五家之説散見諸書者釐為七卷各系已見其第八卷則棟所自為辨説易例二卷凡九十類皆考據漢儒之傳以發明易之本例內有十三類有録無書故原跋稱為未成之本增補鄭注則廣王應麟所未備也易經貫一二十二卷金誠撰誠字間存華亭人易象約言無卷數吳鼐撰鼐字大年無錫人乾隆丙辰進士官工部主事易經提要録六卷徐鐸撰鐸字令民鹽城人乾隆丙辰進士官至山東布政使易讀無卷數宋邦綏撰邦綏字逸才號况梅長洲人乾隆丁巳進士官至兵部左侍郎邦綏自述略曰是編專為課子而作故以行文之體為講書使孺子易於記誦書中詮解取之方氏時論者十之二三不敢隱其所自大易理數觀察二卷朱如日撰如日字洞彝號荷軒蓮花廳人來易增刪八卷張祖武撰祖武長安人乾隆戊午舉人易象大意存解一卷任陳晉撰陳晉字似武號後山興化人乾隆己未進士官徽州府教授周易輯要五卷朱瓚撰瓚字䅻霑全椒人周易辨畫四十卷連斗山撰斗山字叔度潁州人官太平府訓導周易圖書質疑二十四卷趙繼序撰繼序號易門休寧人乾隆辛酉舉人周易讀翼揆方十卷孫夢逵撰夢逵字中伯常熟人乾隆壬戌進士官宗人府主事夢逵自述曰詞以繫象翼以述經故以大傳率辭揆方之意名其書易深八卷許伯政撰伯政字惠棠巴陵人乾隆壬戌進士官至山東道監察御史易經講義八卷萇仕周撰仕周字穆亭汜水人乾隆壬戌進士官宜君縣知縣周易析疑十五卷張蘭臯撰蘭臯初名一是字天隨武進人易説存悔二卷汪憲撰憲字千陂錢塘人乾隆乙丑進士官至刑部陝西司員外郎易義便覽三卷向德星撰德星字雲路漵浦人周易集解增釋八十卷張仁浹撰仁浹秀水人周易曉義九卷唐一麟撰一麟宜興人貢生官江寧府學訓導易例舉要二卷十家易象集説九十卷吳鼎撰鼎字尊彝號易堂金匱人乾隆辛未薦舉經學授國子監司業官至翰林院侍講學士後降補侍講臣等謹按舉要二卷遵御纂周易折中之例而述之凡一百四十八條又因漢唐宋儒説易已略備於李鼎祚周易集解及董楷周易會通惟元明未有專書因採元俞琰龍仁夫吳澄胡一桂明來知德錢一本唐鶴徵髙攀龍郝敬何楷十家之説彚為一書以繼李董二書之後云周易井觀十二卷周大樞撰大樞字元木號存吾山隂人乾隆壬申舉人官平湖縣教諭大易近取録無卷數邵晉之撰晉之字叔階仁和人乾隆丙子舉人周易觀瀾無卷數喬大凱撰大凱字頤菴濟寧州人乾隆癸酉舉人易經觀玩篇無卷數朱宗洛撰宗洛字紹川無錫人乾隆庚辰進士官天鎮縣知縣臣等謹按宗洛酷信圖書故多引恭同契以解經是書謂用費直本實則自定本也易解拾遺七卷附周易句讀讀本二卷周世金撰世金字仲蘭衡山人周易章句證異十一卷翟均亷撰均亷字春沚仁和人乾隆乙酉舉人官內閣中書周易集注十一卷圖説一卷王琰撰琰渭南人易圖疏義四卷劉鳴珂撰鳴珂字伯容蒲城人易見九卷貢渭濱撰渭濱字羡溪丹陽人易象圖説二卷吳脈鬯撰脈鬯字灌先蓬萊人周易後天歸圖四卷黎由髙撰由髙字鵬翥通城人易經輯疏四卷黃家杰撰家杰臨川人易經會意解無卷數王芝蘭撰芝蘭伊南人仕履未詳臣等謹按是編序六十四卦專取兩卦相對相反之義分上下二格上格文自前左行列一卦之辭下格文自後右行列相對相反之卦自來經典中未有若斯之體類回文者其繫辭傳以下亦分篇次名目撰有開宗明義篇綱領篇彌綸篇四道篇尚辭尚變尚象尚占諸篇先後天圖辨又有徵時篇終意篇亦前所未聞不知其何所本也河洛先天圖二卷劉天真撰天真字汝迪號去偽興國州人嵗貢生官安仁縣訓導周易象訓十二卷姚球撰球字頤真無錫人易經辨疑四卷鄭國器撰國器湘鄉人周易剩義四卷黃磷撰磷字暘谷湘潭人易經告蒙四卷圖注三卷趙世逈撰世逈字鐸峰湘潭人周易懸象八卷黃元御撰元御字坤載號研農昌邑人諸生易經本義翼十二卷不著撰人名氏卷首題籖曰蘇州府附學生曹澐手輯吳敬菴羲經本義二十本敬菴亦未詳其人讀易隨鈔無卷數不著撰人名氏卦爻遺稿演一卷不著撰人名氏臣等謹按是書前有小引述其父於易頗多詮論迄未成書是編乃其所類次間附已説自稱曰覲姓亦無考周易觀彖疑問二卷大傳章指二卷不著撰人名氏右易皇朝文獻通考卷二百十二
