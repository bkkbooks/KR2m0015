body:
  text: 征榷考二征商闗市乾隆元年革除龍江西新闗衙規驗票等項銀兩户部覆准兩江總督趙宏恩等奏稱龍江西新闗務舊有衙規茶果照驗单票等項在正額盈餘加一火耗之外應令一概革除如織造衙門承辦各項差務養亷不敷准在盈餘内支存一萬兩酌量動用毎年將動用欵項並餘存銀兩報解内務府查核從之又定閩省征収漁船課稅例閩浙總督郝玉麟奏閩省漁課一項分𨽻侯官等三十六縣征収出諸各澳漁户其原始於五代相沿至今新增漁稅一項分𨽻閩縣等十五縣南澳軍民一㕔非獨征諸捕漁為業之船即出海小商船亦在其内定例樑頭七尺以上折算五尺二寸歸闗輸稅五尺以下歸縣輸稅又有船規一項分𨽻侯官等十三縣征収此合歸闗歸縣之大小商漁船隻按照征収陋規也查漁課係應征之項相沿已久毋庸裁革但澳有漲荒船有歇業請照田地之例分别漲荒豁除其有澳之新開船之新造仍復按年辦理至漁稅一項嵗有常額船無定數不以船之大小定稅而以船之多寡均徴胥吏得以髙下其手請照田房稅銀之例分别上中下三則起科不拘定額數儘収儘解其有已完漁課之船並小船渡船等概行豁除至於已經輸納稅課之船又取給照船規殊屬額外重徴應請革除如有不肖官吏私収入己者論如法從之又以江南水災免各闗米麥額稅户部議准御史王文璿條奏江南被水各屬皆係濵江濵河之地轉運甚易應請特頒諭㫖勅部查明隣近災屬之闗口將米麥等額稅以奉文之日起暫行寛免兩月扣算期滿照舊征収但江省水路乃南北通衢商販徃來絡繹不絶誠恐米船過闗免稅之後商人隨處售賣不至被災地方應令該督撫轉飭管理闗務各員凡有米船過闗即詢明該商如果前徃被災各邑售賣者免其納稅給與印票責令到境之日呈送該地方官鈐盖印信以便回空查銷如有免稅米船偷運别省并未到被災地方先行糶賣者將寛免之稅加倍追出庶商販流通市價不致昻貴疏上得㫖依議速行又定甘省稅課則例頒示通行甘肅布政使徐杞奏言各省應納稅課例應刋刻木榜大書設立闗口使商賈一目了然經户部議請通行各省臣遵即通飭各屬大書設立并納稅串根與造報底冊逐一查對内有比冊征収短少者亦有比冊浮多者更有比坊刻通行則例浮減不一有無不同者且有府與府異縣與縣異一稅而數處各别者縁各屬並無部頒則例各憑照破爛舊本按物収稅伏查甘省稅課除牙帖等項外有商畜二稅内有過稅坐稅之分過稅係販徃别地貨物應納過路之稅坐稅係置買别地貨物到店發賣即為落地稅銀稅名不一輕重各别必須逐條刋刻大張曉諭方免濫収脱漏今甘省既失部頒條例輸納自無準則未便因其相沿已久苟且從俗仰懇勅部查照逐條抄發刋示通行部議應如所請行文甘撫將該省應征各稅查照節年奏銷定數即行刋刻木榜大張曉諭倘各該州縣陽奉陰違仍有濫収脱漏之處即行指名題㕘嚴加議處得㫖允行二年以闗稅既輕物價未減申諭各省督撫奉諭㫖據原任江西巡撫俞兆岳奏報乾隆元年九江贛州兩闗稅課盈餘銀兩較前任共減収九萬有餘此事交與該部及新任巡撫岳濬查核奏聞朕前因各省闗稅於正額之外毎多無名之費恣意科索苦累商民是以降㫖釐剔弊端將應行減除者概令禁止全在督撫大臣等督率司𣙜之員潔已奉公實力遵行以副朕輕徭薄賦加惠商民之至意今就江西一省言已少収銀十萬兩推之各省則約計百有餘萬矣如果商民得沾實惠即更逾此數亦朕所樂聞有何吝惜但從來闗榷稅務與百物價值原係相為表裏如果闗稅減輕則物價亦必平賤若稅輕而價仍不減是各闗所减課銀商民並未沾被恩澤徒飽吏胥之囊槖耳我皇考臨御以來澄清吏治凡此等官侵吏蝕之習久已弊絶風清今督撫諸臣如不能稽查屬員被其朦混則庸懦無能有忝封疆之任若或已身少有染指則名節有虧朕一經擯斥之後斷不復加録用也可將此㫖傳諭各省督撫令其各行稽察深自警省若錯會朕釐剔弊端藏富於民之意又欲多報贏餘以致商民受困識見鄙陋其罪更不可逭矣又免天津臨清二闗糧稅船料總理事務和碩莊親王允禄等議准四譯館少卿蔣炳疏奏雨澤愆期正需糧米若將闗稅暫免俾商賈趨利輓輸源源接濟甚屬有益應如所奏將天津臨清等闗裝載米麥豆榖雜糧之車輛船隻到闗驗明並無夾帶私貨即令放行暫免其抽稅并免其交納船料毋得藉端稍有留難阻滯俟得雨後行文征収從之又以臺臣條奏各省稅務宣示内外臣工奉諭㫖御史舒赫徳奏請將各省稅務歸併旗員管理不知國家設立闗隘原以查察奸宄利益商民並非為収稅之員身家之計也若以旗員貧乏而差遣之是導之使貪矣朕日以砥礪亷隅訓勉臣工尚恐其不能遵奉而可以謀利之見為之導乎且各省委辦稅務率多道府等官並無滿漢之别如滿洲有任道府而亷潔自愛者何嘗不可派委而必定以為例乎朕御極之初圖理琛即為此奏總理事務王大臣亦以為可行朕並未俞允後此陳奏者紛紛朕概不准行亦未交議今舒赫徳又條奏及此可將朕㫖宣示於外使咸知朕意又免淮安沿河口岸等處經過米糧雜物納稅奉諭㫖今冬挑濬淮揚運河大工齊舉所有員役人夫不下數十萬日用薪米食物所需甚多恐將來物價漸至增長查淮闗則例除本地所収米麥雜糧不収稅課其外來客商販賣者按石征収舊例如此朕思目下興工之時若裁去一分稅銀自可平減一分物價於沿河居民及在工夫役均有禆益着管理淮安闗稅内務府員外唐英將淮安大闗并沿河口岸經過之客販食米豆麥雜糧以及煤炭葦柴等物悉免稽查不必納稅俟明年工竣之後照舊征収又聞河南固始縣素稱産米之鄉毎年客販運至清江浦地方缷賣其價頗賤今運口築埧固始米船不能直達清江浦而相近清江有老埧口地方可以缷賣着將此地米稅亦照淮闗之例暫行寛免又定淮安滸墅各闗經費以杜吏役濫征之弊淮安闗監督唐英條奏各項經費及書役飯食不敷請動盈餘一案部議應行令江南總督慶復㑹同該監督熟籌妥議奉諭㫖朕思商民皆為赤子輕徭薄賦俾人人實沾惠澤乃朕愛養黎庶之本懐但恐官吏不能實力奉行仍多巧取以飽私槖則徒於國課有虧而於商民無益即如年來各省闗稅較前額數大減矣其取之商民者仍似未減若闗稅減輕則商貨價值亦應平減今京師貨物騰貴仍復如前可知商民未得實沾減賦之益至江南淮安等闗或因胥吏添設過多以致工食不足則當量行裁汰且查管闗官員養亷之數亦覺太豐可通融分給如有不敷則動用盈餘以補之可寄信慶復諭知朕意經江南總督等會議查得滸墅闗上年共支費用養亷八萬七千八百七十三兩有奇今遵㫖議裁衙役酌減工食養亷銀兩毎嵗經費預定額數約需銀七萬九千七百六十八兩有奇統由該闗報銷淮闗遵㫖議裁人役工食銀四千九百七十六兩四錢有奇又書役飯食等項約需銀六萬五千五百二十八兩一分有奇如収數盈縮據實報銷疏上從之三年暫免臨清天津二闗米豆納稅及通州張家灣登陸處所落地稅銀奉諭㫖上年畿輔之地収成歉薄米價日漸昻貴今聞近省商賈米船陸續漸至所當格外加恩俾其踴躍從事着將臨清天津二闗米豆之船免其納稅至通州張灣等登陸處所舊有米豆雜糧落地稅銀亦着免征俟二麥収成之後米價平減再照舊例征収并嚴禁不肖官吏暗中需索等弊以副朕通商惠民至意嗣因二麥有収經督臣覆奏開徴復因沿河地方被水米價加昻海運既開商販雲集將内河前項米糧各稅一併暫停征収並江南浙江歉収之處俱免其収稅又以江南米船過闗免稅給照繳銷之法行知各處闗差時江蘇嵗旱歉収凡商販米船前徃被災各邑給照免稅者到境鈐印回空驗銷難免守候稽延滸闗監督海保與巡撫許容議詢明運往災邑米船行知該邑印官到境申報至所給過闗免稅照票不必鈐印聼其隨便回空繳銷並以面商辦理之處奏聞奉㫖覧海保所奏與許容商酌辦理之處甚是各處闗差凡有商販米船至被災之州縣者俱照此例行至於商船先報前徃某州縣若此地販運者多米糧足用即不妨轉移隣邑總之歉収之地乏食之民皆吾赤子不容歧視也四年定滸墅闗口岸船柵裁撤事宜先是御史舒赫徳㕘奏滸闗監督海保於離闗百里及二百里之常熟無錫江陰等縣私立柵座濫設巡船宻行江督蘇撫將該闗私設各口相度情形報部據該督那蘇圖奏稱滸墅闗在長洲縣境最為衝衢所轄湖河海道支港紛繁易於透漏從前崇福等三橋望亭等七港十處口岸設役守巡報部有案厯任監督恐稽查難周添設蠡口港等一十三處船柵以佐三橋七港之不及後又添設板橋等二十九處通共五十二處口岸雍正八年前蘇撫尹繼善將續後增設之板橋等二十九處盡行裁撤另於王莊等十處立柵及顧二房廊下等五處設船統計現在口岸三十八處今臣遵照部文就現在各口詳酌查有原報部之轉水柏凟二港既扵毛塘九里二處添設柵巡則二港可以毋庸複設又南北角各減去巡船一隻其各處口岸應請暫為存留仍不作報部經制如有應行納稅之船俱令直赴大闗報稅不許各口擅立稅房私自征収亦不許混指透漏濫行究罰至於本地土貨非捆載貿易逺方者原不征課其附近鎮集船載米麥不及十石者免其収稅農民交租辦粮質當米麥皆不論石數放行章程久定仍應遵照辦理經部議駁飭另議得㫖照該督所請行又准江蘇撫臣所奏以兩淮鹽政管理瓜州由閘稅務揚州鈔闗及瓜州由閘稅務自歸併巡撫例於道府内遴員代管是年以揚州知府髙士鑰查災辦賑未能帶管榷務撫臣奏鹽政近在同城稽查便易可否照織造管闗之例就近令其帶管於𣙜務實有禆益從之又勅蕪湖鳯陽闗稅務專差管理户部議原任安徽巡撫孫國璽奏蕪湖鳯陽兩闗税務請專差監督管理應如所請從之五年以塼板閘稅務歸併臨清闗管理先是山東巡撫岳濬奏稱臨清州有二闗一為户部闗係巡撫衙門管理収稅解交户部一為工部塼板閘闗報納短載紙價稅銀係管河道管理収稅由河道總督奏銷解交工部各船既向大闗報納貨稅船料似毋庸一地兩闗經河道總督議奏請將工部一闗裁去其應征銀兩移歸臨清大闗征収從之又嚴禁揑名討闗積弊戸部議覆御史陸尹耀奏稱會典内開過闗船隻如有指稱内外官員及旗下商人夾帶私貨者該闗報部㕘處是榷闗定例遵行已久近復有執持科道名帖赴闗免稅者查京員科道等官供職京師自無經營貿易之理即或子弟偶有在外經商者豈容揑寫父兄名帖討闗希圖透漏恐在外奸商或揑名影射希免稅料亦未可定應通行管闗各督撫監督嗣後在京及在外官員眷口船隻過闗除無貨物照常驗放胥吏人等毋得任意需索外如有假揑京員科道名帖或有京員子弟執持父兄名帖討闗夾帶貨物希圖免稅者遵照定例查㕘如明知瞻狥一併議處從之六年清查外省闗榷私增口岸奉諭㫖外省闗榷皆久經該督撫就近稽查除現設口岸報部有案者照舊設立外其有私行增添之口岸逐一詳查題報應留者留應革者革此畨清查之後司榷之員若再有違例苛索者胥役嚴處官吏嚴㕘該督撫不行查察經朕訪聞必於該督撫是問至滸墅北新二處係江浙大闗尤為𦂳要交與楊超曾徳沛照此稽查辦理又免官辦米榖過闗稅銀户部議覆署理兩江總督楊超曾奏言設闗之意不專在於取盈盖以準百物之權衡而平其市價故厯來但有征商之令而不兼及於官物况米榖一項係民間食用所必需發帑採買原為接濟民食起見與商賈之射利逐末者不同今既征其船料又責其完納稅銀取之司庫以輸闗庫此絀彼盈國課毫無增益應如該督所請將各屬委員採買賑濟及糶三補倉米榖經過各闗税口仍照臣部題准之例止納船料可也疏上如議行又議定武昌厰闗口岸稅額並除宗闗収稅耗羡户部議覆湖廣總督那蘇圖奏武昌厰闗正額盈餘之外所収口岸銀兩並正額盈餘項下征収加一耗銀先於雍正十年據撫臣咨報征収餘銀二千九百餘兩今據奏稱毎年征収共計銀一萬餘兩除例應支銷外毎年約可餘銀七八千兩是較之厯年報収銀數盈餘㡬及加倍即將此項為地方辦理利濟軍民之事如標營兵丁應建營義倉厫武昌漢陽應設義渡船隻管闗之員既徹底報出亦應酌給公費至各闗口岸銀兩因非正項既不収耗則宗闗同一口岸自不應獨収耗羡應據督臣所奏准其免収從之又飭各闗盈餘增減據實造報考核具題奉諭㫖各省闗稅定有正額而儘収儘解日有盈餘此不過杜司榷者侵蝕之弊並無有累於商民也但各省年嵗之豐歉不同貨物之多寡亦異其盈餘原不能毎年畫一近見各闗報滿之時如盈餘浮於上年則部中不復致議如減於上年之數則部中即行駁查司榷者惟恐部駁必致逐嵗加增年復一年將何所底止苦累商民事有必然之勢朕思闗稅盈縮相去本不致懸殊若乙年所報盈餘之數稍不及甲年原可不必駁查若過於短少亦必有情由惟應令督撫確查則地方實在情形自難逃於公論總之查核過嚴則額數日增其害在於衆庶查核稍寛則司榷侵蝕其損在於國帑此中輕重固有權衡著大學士會同該部詳議具奏經部臣議定嗣後各闗盈餘銀兩如與上年數目相倣者户部即行考核具題如本年所報盈餘與上年數目大相懸殊令各該督撫就地方實在情形詳細確查如無侵隐等弊據實聲明覆奏倘該督撫查奏不實扶同狥隐别經發覺將該督撫等一併交部議處著為定例七年免乾隆三四兩年渝闗缺額追賠銀兩四川巡撫碩色奏重慶渝闗木稅與别項雜稅不同抵渝木料皆伐自深山窮谷年豐水漲則木筏順流而下一嵗之中可以發數年之木若遇嵗旱水涸不能漂出則已伐之木常積於深溝淺溪未能到渝是年嵗之旱澇不齊木料之多寡難定則稅銀盈縮亦理勢之必然也渝闗木稅自乾隆二年三年皆不敷原額奉部行追而乾隆五年時值米賤水漲木多稅盈扣此補彼更有盈餘奏請免其賠補從之又免直省各闗米豆稅奉諭㫖朕御極以來直省闗稅屢次加恩減免毎遇地方歉収天津臨清滸墅蕪湖等闗口商販米船概給票放行免其上課皆以為民食計也但係特恩間一舉行未能普遍夫以養民之物而榷之稅轉以病民非朕已饑已溺之懐也今特降諭㫖將直省各闗口所有經過米豆應輸額稅悉行寛免至各闗口征収則例不一有征商稅者有征船料者有商稅船料並征者今既蠲免米稅其船料一項若不分晰明確著為規條恐致混淆滋弊應如何辦理之處著交該部詳查妥議具奏經部議詳查各闗米豆雜糧等稅有按樑頭丈尺納料者有収納船户空船料銀及無論有載無載按年抽单納課者又有計石征稅不収納船料者各闗則例有殊故征収未能一致應令各闗監督查明定議報部旋據御史李清芳沈廷芳並奏部議船料事件俱發九卿議奏未上得㫖朕愛養黎元特沛殊恩將闗榷米豆等稅悉行蠲免以為充裕民食之計但船料一項議論不一朕思向日征収船料者應照例征収向不征船料者豈可因免米豆之稅而轉加征料該部即速行文各闗知之又奏准麥石稅課一體免徴署福州將軍兼管閩海闗事䇿楞奏豆稅既經免征部文並未指明麥石字樣應否一體寛免奉諭㫖自應一體免征下所司知之又禁革爐地裡塘等處私収畜稅打箭爐地方公出雅納二卡向有達賴喇嘛使人収稅并於裡塘等處収取鞍子錢毎年約得稅銀不過六七百兩雍正三年欽奉諭㫖毎年賞給達賴喇嘛茶葉五十觔班禪額爾徳尼茶葉二千五百觔并運茶脚費銀二百兩今將収取鞍子錢停止隨經達賴喇嘛將在裡在爐収稅之堪布等一併撤回嗣扵雍正十三年達賴喇嘛自泰寕回藏後有留住惠逺廟之徒弟帕朋喀庫圖克圖羅卜藏格隆復安人於公出雅納二卡収取畨民所賣騾馬牛羊稅銀四川巡撫碩色請勅達賴喇嘛將私収畜稅之處永行禁革并在爐之藍占巴等一併撤回部議應如所奏得㫖允行八年免淮闗監督私免稅銀賠項淮闗監督伊拉齊私自免征酒麯絹粉等稅銀部議應令賠補特㫖免之又免征山東臨清闗船料奉諭㫖山東臨清闗向征銅補商補相沿已久報部則統名之為船料前撫臣岳濬改為計石上稅而將銅補商補歸入石頭征解是名革而實存也今朕既降㫖蠲免各省米糧之稅此項亦應一體邀恩豁免著該部即行文山東巡撫知之又定暹羅國運米船隻酌免船貨稅銀有差先是乾隆七年暹羅商人運米至閩曾奉特㫖免征船貨稅銀至是嵗仍復帶米來閩貿易上念外洋運米源源而來其加恩之處自當著為定例自乾隆八年為始凡遇外洋運米閩粤等省貿易帶米一萬石以上者免其船貨稅銀十分之五帶米五千石以上者免其船貨稅銀十分之三九年定湖南寳慶府口岸收稅則例湖南巡撫蔣溥奏言寳慶府征收商稅向例按照貴賤價值酌中定數毎兩三分之外不得多取絲毫一切零星貨物俱不許濫行抽取刋刻簡明木榜䜿立曉諭其書役票錢向係稅銀一兩取銀一錢今酌減五分不及一兩者不許苛索數浮一兩者亦不得過五分之多此外陋規一概嚴禁部覆准行又飭各省奏報闗課核實辦理奉諭㫖江南滸墅闗乾隆六年十一月至七年十一月稅銀缺少一案經户部行查巡撫覆奏稱係按月計算未經減少並無絲毫欺隐等語朕之裁減各闗稅課並免米麥稅銀無非惠念商民之至意從前有㫖盈餘減少户部不必過於苛察惟令督撫就近查奏乃自有此㫖之後各處所報盈餘無不減少者而督撫之查奏亦不過虛應故事並無實力查出畧有異同者故自減免稅課以來米豆價仍然昻貴而於商民未見有益於稅課日見有虧用頒此㫖通行訓飭朕既寛免稅課數百萬兩之多豈較量此些小盈餘之數各督撫及司稅官員毋錯會朕意以報増盈餘為念嗣後務須核實辦理無欺無隐不得視為具文十年復開馬白稅口大學士伯鄂爾泰等議覆雲南總督張允隨奏稱馬白稅口前因該國都竜厰被賊佔踞商旅裹足稅課無出是以題請封閉今厰民漸次復業應於明春撤回臨廣官兵之日照舊開闗收稅儘收儘解據實填報至徃來商旅責令該同知嚴加盤詰照例填給腰牌親身驗放不容奸匪混行出入應如所請得㫖依議行又禁止宿遷闗通船一載徴稅之例宿遷闗舊有通船一載之例如船實能受載百擔而所裝之貨乃在七十擔以下者仍照現徴之數按擔征收若有數滿七十擔者遂援通船一載之例令輸百擔錢糧其船隻之受載數百擔以至千餘擔者所裝貨物雖有多寡之殊而稅銀俱按此例征收至船頭船梢及平坂上跨俱為剔除不入簽量見數之内即有貯貨於此者亦不征其稅至是監督倭赫奏稱近有狡黠船户毎計貨船已滿七分即將貨物分貯頭梢上跨以避一載之例而奸猾吏胥亦伺船貨之在七分上下者即髙下其手以逞其隐漏勒索之技應如所請將散裝貨物不拘頭梢艙跨悉照成包成捆貨物一例簽查見數按擔征收將通船一載之例即行禁止從之又豁免福建浦城闗稅缺額銀兩奉諭㫖朕聞福建浦城闗稅從前題定額征銀二千七百餘兩後於乾隆三年更定稅則委員監收一年以為定額缺少銀五百四兩零嗣後連年短征葢因該闗長脚難於雇覔以致商貨稀少經征各員無力墊補遂成懸欠著將此項稅銀加恩豁除令其儘收儘解其乾隆三年以後節年缺額銀兩一併加恩免其賠解該部即遵諭行十一年以米糧免稅價值仍昻勅督撫示諭商賈平價江蘇布政司安寕奏言自免米豆稅銀以來弊竇叢生國課日少而米價之貴較甚於前應請仍照舊征收上念衆商乃無知愚人當先加以化導勅各該督撫愷切訓諭俾各商感發天良悉除私弊督撫等仍設法查察妥協辦理庶㡬足食便民閭閻均受其福又免暹羅國商人船貨稅銀十分之二福州將軍新柱奏報本年七月内有暹羅國商人先後載米入口皆不足五千石之數並各帶蘇木鉛錫等貨所有船貨稅銀未便援例寛免奉㫖該畨等航海運米逺來慕義可嘉雖不足五千之數着加恩免其船貨稅銀十分之二以示優䘏十二年又改溪雅稅館於懸鐘地方並定䑩仔頭船之禁先是福州將軍新柱奏請將溪雅稅館移至懸鐘經户部行文撫臣周學健議稱溪雅地方逺距懸鐘三十里稅館設在溪雅船隻俱泊懸鐘在闗則有鞭長莫及之虞在商則有乘機偷漏奔走守候之弊部覆應如所請將溪雅稅館准其改設懸鐘又該將軍奏稱厦門等處有奸民置造䑩仔頭船雙篷雙艣傍用四槳非商非漁專為包攬偷漏貨物請行飭禁經户部行知該撫議覆請嗣後䑩仔頭船式樣永行禁止所有現在之船毋許加用四槳多添柁水并十船編甲互結部議應如所請從之勅内地人民徃暹羅造船未載回米糧者倍罰船稅大學士伯張廷玉等議覆福建巡撫陳大受奏閩省赴暹羅買米造船運回請給印票進口之日繳銷仍另給牌照歸澳安揷葢徃暹羅造船本為買米而設如或該商並無米石載回只造船而歸者應令倍罰船稅示警得㫖允行又免失風洋船官買銅觔稅課福州將軍新柱等奏商人陳天元船隻遭風銅觔全數交官照部定價值收買仰懇免其銅稅從之又以户工二部奏報蕪湖闗稅贏縮足敷抵補免其駁查蕪湖闗報部户闗盈餘較去年有餘毋庸置議工闗盈餘較去年不足行令查覈奉諭㫖此案户工二部所報足敷抵補如將有餘者毋庸置議不足者再加行查於考核功過之意未合即使行查亦徒多徃返登答工部再行查核之處不必行嗣後着該部照此辦理如一人而兼兩闗其比較上年盈餘之處俱有不足再令該督撫據實查核十三年定廣東太平闗收稅則例廣東巡撫岳濬疏稱太平闗則例内未經開載之九十五條查照粤贛兩闗稅則斟酌征收統按其中因與海闗同屬初次抽稅及貨物貴重應照海闗定例者則有珍珠玉器錦繭布楠木因先由粤海征稅次及内地分販應照贛闗定例者則有氆氌琥珀蜜蠟瑪瑙哆囉嗶嘰因粤贛兩闗未載按照貴賤科稅者則有布帳黄楊器黄楊木因原稅本屬平允即用着為正條者則有毛布水晶玻㼈松線布刀石紅木因貨物初經收稅者則有姑絨花生甘草梅海石茶子桐子因各處出産價值不同適中損益者則有棉器布器油菜子因稅則籠統復加分别者則有哆囉器緞器氊器児帽祖帽因物同名異即倣本例者則有氊底桌氊紫香香粉麻包泥碗其浛光各條内因與太平橋正例開載相符應令一體遵收者則有廢銅香蕈洋青石青石緑八角金針菜紫檀紫榆木骨角器皮器鐵器布棉器各色糖菓綢綾器絲緞器哆囉器嗶嘰器錦絲線帶布帳薯茛鹽㰖良薑柯子楓子草仁石蓮子石决明因下水已經輸稅上水應予輕減者則有紗羅包頭帽緯毛布氊片姑絨氆氌又木稅各條内因原稅本屬適宜即擬著為正條者則有土杉枋杉板松板紅木大杉木樟木枋板床板門枋因料大稅輕量子加增者則有松木因料同稅重較正酌減者則有長薄板松筒杉木因論剪恐滋夾帶改作論根者則有遇仙橋之小杉木至遇仙橋浛光厰欵目與太平橋相同者均應畫一抽收共計擬定貨稅七十三條木稅二十二條俱屬因地制宜斟酌允當反覆確核委無偏重偏輕一併刋載例内並䜿榜三闗厰曉示商民俾有遵循而稅則益歸盡善部議應如所奏從之臣等謹按太平闗征稅比照粤贛兩闗因時因地以定稅額重輕如珍珠毎觔纔收課銀二錢玉已成器者纔收課銀四分未成器者毎觔收銀一分七釐有奇即使珠玉價值極㣲亦數十百分而取一矣其餘哆囉嗶嘰蜜蠟琥珀俱毎百觔纔收稅銀一二兩香楠及黄楊俱毎百觔收稅銀自一分至五分而止葢通工恵商儉於取民超軼前代非可數計特以我國家休養生息百有餘年幅員廣濶亘古無比凡舟車商賈所達西北及於天山外裔東南及於閩粤重洋積少以成多未始不足以資國用若分析計之則至㣲至薄矣夫征商之令見於周官孟子所述惡商賈之罔利故從而征之其詳不可得聞大約周人田賦以什一為制至扵重本以抑末則征榷之數諒必加於計畆秦漢以後稅額逓增征榷之輕未有如我聖朝者兹所臚列貨稅共九十五條按名定數未可以羅縷備書附識於此以見薄征之大概焉又以廣西梧潯等府稅務歸該管道員查核户部議覆廣西巡撫鄂昌奏粤西梧潯二府闗稅及桂平南慶等府富川賀縣懐集等縣各雜稅銀兩皆為凑充兵餉及支給通省大小各官養亷之用向係該管府縣自行征收分别正額盈餘按季造册解司並無專事稽查抽收之員則疎漏自不能免查粤西蒼梧左江右江三道俱有統轄地方之責且其該管之府州縣例應按季巡厯一切稽查甚屬便易應請將各處稅務分𨽻各道就近稽查查桂林平樂蒼梧三府并富川賀縣懐集三縣俱係蒼梧道所轄其稅務即𨽻蒼梧道稽查南寕府係左江道所轄其稅務即𨽻左江道稽查潯州慶逺二府係右江道所轄其稅務即𨽻右江道稽查飭令各府縣將逐日抽收貨稅銀兩數目按月造報該轄道查核并於按季巡厯之時親赴收稅之所飭取存厰抽收底簿與月報冊逐一核對應如所請從之又以米豆免稅市價未平仍依原額征收户部議覆江蘇滸墅闗監督圖拉條奏直省各闗米豆稅銀厯來按額征收乾隆七年皇上特恩寛商稅以平糧價乃自豁免以來奸商大賈惟知㒺利不顧民艱近年各省米豆價並未少減甚且有比舊加昻者徒使奸商飽槖市儈居奇窮黎究未得沾實惠誠屬無益况現當軍需浩繁之際亦宜酌量籌辦應如圖拉所奏將直省各闗米豆稅銀仍復舊額奉諭㫖依議朕降㫖蠲免各闗米豆稅銀本以食為民天闗稅優免則市價可減是以不惜千萬正課為小民謀饔飱寛裕計當時内外臣工屢有以但利商賈無益民生為言者概未允准朕意欲試行數年果否於民食有禆再行酌量乃數年來稅免而米豆之價不惟不減而昻貴時或有加明係奸商不知免稅之恩專利自封轉以有限之帑項肥三倍之囊槖無裨閭閻久宜仍復原額且地方偶有偏災即將該處闗口應征米豆稅額加恩寛免則估舶聞風雲集市價自平駔儈不得居奇窮黎均霑實惠轉得操權自上朕意不專為軍需起見也如既復之後奸商藉端長價弋利妨民該地方官即應嚴行查察究處至淮闗因寛免米稅後倭赫奏准加征船料今既征米稅仍循舊例行臣等謹按米豆納稅向例征收皇上念食為民天特降温綸免其征課以所去之額稅減糧價於市中則貧民日糴斗升計數加贏不啻分太倉之粟粒乃米稅既免而糧價日昻則減稅之效不著於常年當收於歉嵗所以俯允廷臣之請仍依舊例俾偏災郡邑可以鼓勵轉輸葢出疆興販者本非南畆之民用其心計坐列市門既仰虧稅額於征商復力争細民之價值其載米似知本務之重而罔利實為逐末之尤從古征斂之法即縁此輩而起我國家正供賦額嵗有蠲除而利權贏縮則仍操之自上因事轉移留榷政之有餘補征斂之不足亦具見平施稱物之妙用焉又以東省歉收特開海運接濟免收米稅山東巡撫凖泰奏本年五月内經大學士髙斌等以東省之登萊青三府地處東隅别無河道連年歉薄不但民間絶無葢藏即倉儲亦因賑濟鮮有積貯請將奉天米石聴商民糴買由海運徃山東售賣流通商販權宜補救誠為目下萬全急務欽奉諭㫖允行今赴奉天販運各商陸續抵東請將此項米石行令免征稅銀飭地方官遵照辦理從之十四年勅直省各闗稅額視雍正十三年分數為準户部奏各闗征收盈餘銀兩比較上屆短少至一分以上者各按數定以處分奉諭㫖此摺所見雖是但盈餘究在正額之外然非額外别征餘盈縁照額征收儘收儘解其溢於成額者即謂之盈餘是名雖盈餘寔課帑也亦即正供也當康熙年間闗差各有專員恣意侵蝕不但無盈餘并不敷正額然至任滿之時未嘗不量其所入派工派差無得飽其私槖者而當時風氣俱視缺額為分所當然是以有雍正年間一畨清理凡官侵吏蝕僕使中飽舉燭照而數計焉於是各闗之以盈餘報者相屬而缺額者從未之聞矣可見嵗額本敷盈餘本有向之有缺無盈其弊自在漏巵耳自朕御極而中外人心舉知政尚寛大希圖欺隐時則盈餘嵗減一嵗又將漸開虧損正額之端用是曾降諭㫖所有較前減少之員交部嚴行察議令其少知法紀而朕意又恐查核過嚴則各闗自顧考成必求溢羡或致借端横索因令數目相倣者該部即行核題迄今年復一年較前有減無增部臣請比較上屆短少至一分以上者各按數定以處分此雖為慎司國計起見然所稱與上屆比較不無流弊有如甲盈一萬則下屆之乙必思盈及萬有五千再下屆之丙又將增加二萬至丁而三萬似此相競不已又將無所底止必至病商歛怨非理財之正道也夫盈餘無額而不妨權為之額朕意當以雍正十三年征收盈餘數目為定其時正諸弊肅清之時而亦豐約適中之會也自雍正十三年而上下二三十年之中嵗時之殷歉相若也賈舶之徃來相若也民風之奢儉相若也則司𣙜之征收又何至大相懸殊哉嗣後正額有缺者仍照定例處分其各闗盈餘成數視雍正十三年短少者該部按所定分數議處永著為例十五年定各闗征收稅課成數扣足一年彚報户部奏各闗征收稅課有一年期滿者有未及年滿離任者亦有管理一年餘數月者是以奏報盈餘向係按照管闗月日各清各任惟是各闗稅課統年征收則貨物之出産皆齊商賈之徃來畢集較之上年銀數自應相倣如係征收數月則貨物有衰旺之分商賈有多寡之異管闗官員或數月内正值貨物豐盛或數月内適值貨物儉少若概照周年足月之數勻算比較未免碍難查辦請嗣後各闗管理稅務日期凡接任征收無論兩任三任俱令扣足一年為滿其管闗一年餘數月者將一年盈餘奏報其奇零月數歸於下屆統俟扣足一年再行彚奏以昭畫一得㫖允行又定古北口征收斗稅額銀户部覆准直𨽻提督布蘭泰奏古北口斗稅贏縮原出於商販之多寡乾隆十二年二月内歸營試收適遇口外豐收口内糧價較貴糧車進口雲集按例征收據實儘報是以收稅較增至乾隆十三年而口内地方糧價平減商販不前市集鬻糧無㡬即斗稅亦無從征取是以收稅較少應准仍照原定斗稅銀二千兩之數作為正額如遇糧價昂貴販運者多征收盈餘據實儘數具報從之十六年免浙省各闗口米稅奉諭㫖浙東府屬雨澤愆期該撫預籌民食請弛海禁著照所請江閩二省商販赴浙屬之温台寕處四府者准其暫開海禁仍令該撫飭屬給予印票沿途實力稽查嚴禁奸商等借端偷買透漏其浙省各闗口並着加恩免征米稅以示招徠務俾商販流通米糧充裕該部遵諭速行十七年以鎮雄州購運川鹽脚價彌補畢莭稅課雲南巡撫愛必達奏言鎮雄新闢夷疆本無額稅因畢莭稅羡不敷議撥代征自雍正七年設立州城古芒部却左毋亨牛街五處稅口兩省官員互相稽查迨後歸鎮雄州征收不能敷額臣查鎮雄州銅運馬匹因無回頭貨物脚户等退縮不前現在議令承運官毎嵗購辦川鹽一百萬觔令䭾銅之馬運回鎮雄州行銷毎年擬酌收稅銀以補畢莭稅羡之不敷於鹽價尚未昻貴而畢莭稅課有着鎮雄商民無擾疏上勅部議覆准行十八年勅各闗奏報盈餘數目經部臣覆核無庸復交督撫查奏奉諭㫖各省奏報闗稅盈餘數目較上屆短少部議俱交督撫查明情由該督撫不過據監督及管闗委員所報取結聲明具覆從未有察出侵蝕情莭據實查㕘者章奏徃返竟成故套朕思闗稅時贏時絀勢所不免若該監督等無故短少或任意侵肥該督撫自應隨時查察奏聞治罪如其果無情弊何必重複聲明徒滋案牘嗣後各省奏報闗稅盈餘數目該部覆核時無庸復交督撫查奏十九年免髙堰堤工運石應追船料奉諭㫖髙堰堤工需用石料辦運船隻甚多俱官為雇覔已按給水脚銀兩其例征船料自應照數完納但此畨工程𦂳要更畨迭運無悮工程加以石貨粗重挽載維艱所有從前運石過闗船隻應征料稅着加恩免其追繳二十二年更定浙江海闗洋船稅例户部覆准閩浙總督喀爾吉善兩廣總督楊應琚奏稱設闗分榷原以裕課通商而因地制宜亦湏權衡公當如外洋紅毛等國畨船向俱收泊廣東少至浙江是以浙海闗稅則畧而不詳今自乾隆二十年以來外洋畨船收泊定海舍粤就浙嵗嵗來寕若不將比較則例更定章程必至私扣暗加不特課額有虧亦與畨商無補臣等悉心㑹商將粤海闗征收外洋船隻入口出口貨物現行徵稅則例及比例規例併外洋船出口貨物估價科征各册逐一查核除比例一冊縁天下之物類繁多稅則未能備載以此例彼比照征收原無軒輊其規例一項原係從前陋例嗣經查出歸公征收報解以上二項浙海闗循照征收均毋庸另議增減惟正稅一項未便仍照粤海闗科則一例征收葢向由浙江赴粤販買之貨今就浙置買稅餉脚費俱各輕減而外洋進口之貨分發蘇杭亦屬便易該畨商既比在粤貿易獲利加多則浙海闗之稅則自應酌擬加征其中有貨物産自粤東原無規避韶贛等闗稅課者悉仍舊則概不議加正稅之外仍照加一征耗其粤海闗估價一項係將該商出口貨物估計價值按貨本一兩征收銀四分九釐名為分頭今應遵照辦理但如湖絲磁器茶葉等各種貨物現就浙江時值多與粤海闗原例不符似應按照時值增估更定其中有時價相符者仍循其舊至船隻樑頭之丈尺及貨物進口出口之担頭悉照粤海闗則例征收奉諭㫖依議此摺内所稱若不更定章程必致私扣暗加課額有虧與商無補等語尚未深悉更定稅額本意向來洋船俱由廣東收口經粤海闗稽察征稅其浙省之寕波不過偶然一至近來奸牙勾串漁利洋船至寕波者甚多將來畨舶雲集留住日久將又成一粤省之澳門矣於海疆重地民風土俗均有闗係是以更定章程視粤稍重則洋商無所利而不來以示限制意並不在增稅也將此明白曉諭該督撫知之臣等謹按舊例海舶貿易外洋者給之照以稽察出入其出洋歸港皆慿照為信因按其照稅之有藏匿奸匪私帶違禁之物者論如法良以外洋紅毛諸國畨船向皆收泊粤東國家張官置吏分駐營伍以資彈壓凡定例所查禁者嚴明約束垂諸令甲是以海口肅清民不滋擾至扵浙省寕波向非洋船聚泊之地邇年奸牙市舶狃於稅額之輕㣲自乾隆二十年及二十一年外洋夷船嵗至定海轉運寕波於是督撫大吏據浙闗科則比較粤海課額更定征收我皇上聖謨深逺念海疆重地多一利端即增一弊藪洋船嵗至寕波徑途日熟勢將與粤省之澳門無異而商舶頻仍則有奸牙之勾串吏胥之需索及其易貨歸棹則有絲粟之出洋鐵器之渡海日久弊生難以盡杜津會既成夷商叢雜之區必湏重為經理夫昌國寕海松門澉浦皆浙省濵海之藩籬也推而至於金山乍浦海門崇明又南省濵海之門户也風濤出没持貨賄以懋遷既可騖趨寕波亦可轉移他郡利之所在瑕釁易滋聖天子所以經畫於未然而杜其端於始事者職此之由葢自章程更定以來外洋市舶知違例紆道之無所利不復收泊寕波内無禁令之煩而夷艘自逺無事巡查之宻而海口敉寕我皇上潜移宻運之權誠有握要於㡬先者矣又免湖北撥運豫省米石回空船料奉諭㫖湖北撥運豫省米石抵豫交缷後原船回過各闗例應輸納船料但各船户回棹時如已攬載客貨其船料自當征收若僅原船回空船户未免拮据着加恩免其征收船料以示優䘏嗣是二十三年復奉特㫖以川米原船回空時如查無攬載者一體加恩免其征收船料二十四年定葉爾羗喀什噶爾二處貿易抽稅例回部商稅舊制凡本地回民徃外貿易帶回物件者抽稅十分之一外處回民販來物件抽稅二十分之一於乾隆二十四年經定邊將軍兆惠奏聞仍照舊例辦理是年又據㕘贊大臣舒赫徳奏稱葉爾羗喀什噶爾二處牲畜價貴請減收商稅分數奉㫖允准嗣是本地貿易帶回之牲畜改為抽稅二十分之一其緞布皮張則十分抽一外畨商人販來牲畜改為抽稅三十分之一其緞布皮張則二十分抽一若牲畜貨物不及抽分之數馬一匹抽一騰格大牛一頭則二十五普爾小牛一頭半之大羊一牽稅十二普爾小羊一牽亦半之雜項物件視其值之貴賤折收騰格普爾回地錢名曰普爾以銅為之五十之數為一騰格至乾隆二十八年駐劄喀什噶爾大臣永貴奏布嚕特回民到烏什貿易物件請照喀什噶爾之例收稅報可二十五年議除粤海等闗一切規禮名色户部覆准兩廣總督李侍堯等奏言查粤海闗外洋本港商船貨物出入向來除按照則例征收船鈔之外另有官吏家人通事巡役人等規禮以及分頭担頭等項銀兩莭經奏報歸公而則例冊内仍照從前開報各項名色分别臚列誠於體制未協兹彚併核算統作進口出口歸公銀兩各若干將一切規禮火足開倉驗倉放倉押船貼冩小包等名色悉行刪除改正至大量領牌原與收稅章程無碍毋庸過為更易其分頭担頭等項統作一條造報至於各口規則皆查明厯年收稅冊檔分别等次開造以杜弊竇又查省城大闗以及虎門潮州雷州瓊州各口向有書役家人收作飯食舟車等費悉作歸公造報統俟核覆奏准刋刻頒發各口永逺遵守繁冗既刪名目亦正洵足清稅欵而杜弊端應如該督等所奏悉行更定仍將更定條欵刋榜曉示畫一征收從之二十七年嚴禁𣙜闗漏稅積弊大學士公傅恒等議覆兩江總督尹繼善等奏言各闗𣙜務定有則例凡一應官民船隻但有應行納稅貨物俱循照定則征收其討闗陋習久經嚴禁但行之日久不無懈弛應再行各闗監督實力奉行至各省貢物船隻闗口向不查驗其間家人船户不無藉端私攬客貨冀圖漏稅情事該督等請將貢物開單用印文知會闗口查驗此外貨物均令納稅亦應如所請辦理從之又准江蘇撫臣所奏清釐滸闗積弊四條户部覆准江蘇巡撫陳宏謀條奏滸墅闗近日情形清釐積弊四條一滸闗向有舖户代客完稅包攬居奇莭經禁革乃旋革旋復陽奉陰違現且派定地方如江西湖廣上河下河船由何處開來稅由何舖户包納與在闗之家人書役通同一氣遂致正稅串改罰項舞弊無窮應請將包攬舖户盡行列榜禁革仍令商人自行完納按簿親填一各處闗口貨船抵闗官役到船簽驗按則納稅方許過闗惟滸闗先不簽驗多寡聼其自報納稅之後船已過闗方始簽驗名曰倒住因而舖户奸商僥倖漏稅營求免罰分肥者亦復不免嗣後貨船到闗令委員帯同丈量人役查驗簽量令其赴闗納稅給票之後始准過闗以杜偷漏一江南各闗口俱有坐闗之員遴委佐雜半年一换惟滸闗委員四人向係久管不换相習日久漸滋弊竇應請嗣後將滸闗委員已過半年即遵照乾隆十七年前撫臣莊有恭原奏更换不得任其戀缺致啓弊端一督撫於闗稅監督原應相助為理惟是毎月所征闗稅數目各處監督均不咨明督撫及至缺稅交查事在一年之後客商四散簿籍難慿多寡之數無從稽核應令管闗監督按月知會督撫仍於年滿奏報時將一年總收數目統行咨會至龍江淮安兩闗歸兩江總督稽查滸墅闗歸蘇州巡撫稽查辦理庶就近分查責成益專於闗務更有禆益從之二十八年飭天津各闗口稅則畫一辦理户部議覆天津闗監督達色奏稱各闗分設口岸原以防奸商之遶道漏征其一切稅則自應遵照大闗部頒條例畫一征收以免避重就輕之弊今天津苑口等十三口岸毎貨百觔毎布百疋較大闗稅則互異自應俱按津闗部頒則例改正征收以昭畫一從之又議准山東豆石由海運赴浙販賣山東各屬産豆素多向例許從海口運赴江南久經奏准遵行其淅省未據奏明一體辦理是以東省豆石從前並無運進浙江海口販賣之例至是浙閩總督楊廷璋等奏稱黄豆一項浙省需用甚廣應照運江之例一體通商接濟俾兵民均有禆益部議應如所請准其將東省豆石聼商由海運浙發賣以資接濟其商船運到各府即准其由鎮海闗乍浦海門汎東闗汛等處收口所有經過闗口應納稅銀應令一體照例輸納填入該年部頒印簿送部查核至出口進口驗票繳票一應設法稽查之處均應如該督撫等所請從之定伊犂地方舖面房間分等收稅將軍明瑞奏伊犂地方舖面房間分等收稅從之又定哈喇沙爾地方舖面收稅例駐劄哈喇沙爾大臣達桑阿奏該處商民開設舖面共四十間量大小作為三等收稅從之又定闢展地方收稅例闢展辦事郎中徳爾格奏闢展吐魯畨魯克沁等處地方凡售買馬匹牲畜照内地例給票毎銀一兩上稅銀三分奉㫖照所請行二十九年定烏嚕木齊市易上稅例駐劄烏嚕木齊大臣旌額理奏烏嚕木齊地方買賣馬匹牲畜請照闢展之例俱行給票毎兩上稅銀三分奉㫖允行又阿克蘇地方奏買賣牲畜亦照此例毎普爾一百文收普爾三文報可又更定臨清闗商稅征鈔名色山東巡撫崔應階奏稱臨清闗稅務自雍正六年部頒則例各項貨物應征稅銀俱開征鈔㡬貫字樣如緞疋毎疋鈔二十八貫船料毎丈鈔七十五貫如此等類分别數千百條僅於則例尾頁註明鈔毎一貫折銀三釐一毫七絲三忽字様一時頗難明晰商客過闗不能通曉則例即目覩則例亦不知㡬十萬貫需銀若干必須按數折算經書有意模糊藉此可啓多收侵没之弊臣愚擬將商稅論鈔論貫之數概行刪去其各項貨稅照毎貫折銀若干核定應征銀若干確數載入例册送部較正刋刻木榜設立闗口庶商客易遵經胥不致弊混從之三十年更定吉林等處征收稅額户部議吉林等處稅銀自乾隆十六年題定吉林額征馬畜雜稅銀一千六百五十兩木稅銀三百七十兩寕古塔額征稅銀二百八十兩遇放參票之年征稅四百五十兩伯都納額征稅銀二百七兩至拉林阿爾楚喀二處乾隆二十五年奏准試收毎年征收稅銀二百四五兩不等今據吉林將軍恒魯奏以吉林寕古塔生齒日繁貿易益盛派委旗員協同同知徴收稅銀較多於前分别酌定稅額應如所請吉林雜稅以一千七百八十兩為額木稅仍三百七十兩寕古塔添收木稅以一百五十八兩為額雜稅毎年儘收儘解遇放參票之年以九百十二兩為額伯都納稅銀仍以二百七兩為額拉林稅銀定以七十二兩為額阿爾楚喀稅銀定以三百三十八兩為額從之又裁潘桃口監督缺所有稅務歸併張家口監督管理其潘家口所管六小口改歸通永道征收三十一年以潘桃口木稅令多倫諾爾同知管理直𨽻布政使觀音保奏大河口地方距張家口五百餘里張家口監督不無顧此失彼之虞可否將稅務就近交多倫諾爾監督或交多倫諾爾同知兼管抽收工部議以領票商人係多倫諾爾居民該同知身任地方撫綏勸導商情易協應請將潘桃口木稅事務交於多倫諾爾同知征收從之三十四年奉諭自來硫磺出入海口俱有例禁原為磺觔係火藥所需自不便令其私販若奸商以内地硫磺偷載出洋或外來洋船私買内地硫磺載歸者必當實力盤詰治罪乃定例於洋船進口時亦不許其私帶殊屬無謂海外硫磺運至内地並無干碍遇有壓艙所帶自可隨時買備於軍資亦屬有益何必於洋舶初來多此一畨詰禁乎嗣後於海船出口時切實稽查不許仍帶磺觔以防偷漏之弊違者究治其各省洋船入口禁止壓帶硫磺之例概行停止著為令臣等謹按軍資火藥最重磺觔慮奸民私販儌利自不得不嚴加譏察故凡商船出口及畨船歸洋時與絲粟銅鐵同一例禁其由海外運至内地者向亦為之嚴詰不許其携載入口於市舶情形殊多未便我皇上聖謨深逺准其壓帶禁令則弗使煩苛商販則咸資利益法良意美斟酌盡善防奸之道無不至柔逺之政蔑以加矣四十二年户部言打箭鑪界近邊陲嗣後税差請照山海等闗之例於宗人府正副理事官及各部院郎中員外郎等官内㨂選保送庶於𣙜務彈壓有禆得㫖允行又奉諭户部奏查核揚闗征收稅銀較雍正十三年短少三萬二千六百餘兩請着落經管之道員孫栝賠補一摺因命軍機大臣交户部查該闗厯年盈餘之數較雍正十三年多寡若何今閲單開各年盈餘數目惟乾隆十四十七兩年較雍正十三年有贏無絀其餘各年則莭次短少並非始自近年各闗稅課盈餘例與上屆相比較朕御極之初本不知各處所收闗稅多寡之數因諭部臣即以雍正十三年為凖使胥吏不敢例外苛求監督不能征多報少且使毎年比較不致嵗漸加增加減無所底止實於體恤商民之中寓司闗稅者不致作弊剋減之意並非因雍正十三年闗稅獨多使各闗稅必足其數也乃行之未久部臣因各闗奏報盈餘較雍正十三年有贏者居多若置上屆於不問恐監督以比舊已多即可從中侵隐易滋流弊請仍與上屆相比較又復通行日久昨嵗考核淮闗鳯陽闗較上屆屢形短絀因令復照雍正十三年比較則所短之數更多自係辦理不善今揚闗亦復莭年短少且通計短少最甚者惟此三闗若因此而徧及諸闗未免窒礙且恐無識之徒疑朕於闗稅必欲從其多者相核實不知朕體恤商民之本意矣朕有意於帑項增多則不三次通免天下錢糧其所増益不較此百倍乎又思乾隆二十八年臨清闗征收盈餘較二十七年短少朕曾諭户部令與二十五六兩年再行比較嗣經部臣奏稱該闗盈餘之數雖較上屆少銀三萬餘兩而較之五六兩年尚多銀一萬五千餘兩即予免議葢課稅盈縮率由於年嵗豐歉固難免參差不齊而通計三年即可得其大槩若多寡不甚懸殊原可無庸過於拘泥此法最為平允嗣後各闗征收盈餘數目較上屆短少者俱著與再上兩年復行比較如能較前無缺即可核准若比上三年均有短少再責令管闗之員賠補彼亦無辭夫朕以雍正十三年為凖者本屬美意今既有此求全之毁嗣後此例不必行所有揚闗本年比較盈餘交該部照此例另行核議具奏並將此通諭知之四十五年奉諭向來荆闗打箭鑪兩處征收稅務俱派部院司員前徃管理一年報滿更换但派徃之員人地生疎又或經理不善徃徃易致缺額按例既不可不令其賠補而該員等因一二年小差以致折變房屋賠繳官項非所以示體恤雖該員等賠項毎加恩豁免而於帑項公務究屬無濟所有此兩處稅務由京派員前徃之處竟可不必其業派徃者俱着撤回嗣後着交該督撫照臨清等闗之例派委妥員奏明管理四十九年免粤海闗珍珠寳石等稅詳見市糴考皇朝文獻通考巻二十七
