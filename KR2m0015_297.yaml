body:
  text: 四裔考六南意達里亞厄勒祭亞羅瑪尼亞翁加里亞波羅尼亞莫斯哥未亞大尼亞諾而勿惹亞雪際亞鄂底亞附意達里亞在歐邏巴州南境其地周一萬五千里三面環地中海一面臨高山土田饒沃州郡繁多其最大者凡六城曰羅瑪曰勿搦祭亞曰彌朗曰納波里曰熱孥亞曰福楞察羅瑪城周一百五十里地有大渠曰地白里由城外百里入於海四方商舶軿集於此相傳天主耶蘇亡後其徒名伯多祿寶祿者於羅瑪城衍教嗣後常有教王居之列國咸致敬禮凡有大事必請命焉其左右嘗簡列國王侯至戚五六十人分領教事城中有七山其大者曰瑪山人煙稠密舊無泉造一高梁長六十里梁上立溝接逺山之水近地曰羅勒多其西北為勿搦祭亞城建海中有一種木植為樁入水千年不腐其上鋪石造屋備極精巧城內街衢俱引海水環流兩傍可通陸行城中有橋梁極濶上列三街俱有民居不異城市橋高可下度風帆有勿里諾湖在山巔從石峽㵼下聲如迅雷聞五十里有異泉出山石中物墜其內半月必生石皮又有沸泉高丈餘不可染指投畜物於中頃刻糜潰其南為納波里地極豐厚其地名哥生濟亞有兩河一河濯髮則黃濯絲則白一河濯絲髮俱黑從納波里至左里城有石山相間國人穴山通道廣可容兩車其四周皆小山山洞甚多入內可療疾每洞各主一疾因有百洞遂名曰一百所云其名島有三曰西齊里亞有大山噴火不絶山四周多草木積雪不消常成晶石石沸泉如醋物入即黑國人最精天文造日晷法自此地始曰摋而地泥亞亦廣大有草名摋而多泥人食之輒笑死曰哥而西加有三十三城産犬能戰一犬當一騎國人布陳騎間以犬此意達里亞山川形勢之大較也其俗尊奉天主自國郡至閭井咸設天主堂有掌教者専主教事稱為神父其堂一切供億皆國王大臣民庶轉輸不絶每七日瞻禮一次名曰彌撒此日百工悉罷通國往焉聽掌教者講論經典勸善戒惡女婦則别居以聽其婚娶臨時議婚不預聘通國皆一夫一婦無二色者土肥饒産五榖米麥為重果實更繁出五金以金銀銅鑄錢為幣衣服有天鵝絨織金縀毯罽之屬又有利諾草可為布質細而滑敝可搗為紙極堅韌君臣冠服有差等相見以免冠為禮男子二十以上槩衣青色兵士勿論女人飾金寶服羅綺佩帶諸香至年四十及未四十而寡者則否釀酒以葡萄不雜他物可積至數十年有樹頭果曰阿利襪熟可為油生最繁味美而用多其核可為炭滓可為鹻葉可食牛羊凡國人畜大小麥為上戶葡萄酒次之阿利襪又次之畜牛羊者為下會客不盡飲偶犯醉者終身以為垢食用金銀玻璃及磁器用桌椅如中國屋有三等最上者純以石其次磚為墻柱木為棟梁其下土為墻築臺最高纍六七層至十餘丈下一層入地中可藏窖瓦用鉛或輕石板或陶瓦歷久不壤工作極精巧羅瑪城有名苑中有流觴曲水銅鑄羣鳥遇機一發鼓翼而鳴各具本類之聲造舟預庀物料指顧可成西齊里亞島有天文師名亞而幾墨得者嘗遇敵駕數百艘臨其島則鑄一巨鏡映日注射敵艘光照火發一時燒盡又其王命造一極大舶舶成將下海牛馬駱駝不能運幾墨得用巧法苐令王一舉手舟如山嶽轉動須臾下海又造一自動渾天儀十二重層層相間七政各有本動凡日月五星列宿運行遲疾與天無異以玻璃為之重重可以透視其駕車國王用八馬大臣六馬次四馬二馬戰馬皆用牡騸則弱不堪戰矣尚文學設學校郡國有大學中學鄉邑有小學各選學行最優之士為師生徒多至數萬人小學曰文科有四種一古賢名訓一各國史書一各種詩文一文章議論學者自七八嵗至十七八學成師儒試之優者進於中學曰理科有三家初年學落日加譯言辨是非之法二年學費西加譯言察性理之道三年學默達費西加譯言察性理以上之學總名斐録所費亞學成試之優者進於大學乃分為四科聽人自擇一曰醫科主療病疾一曰治科主習政事一曰教科主守教法一曰道科主興教化皆學數年而後成又試之然後入官凡試士法師儒羣集於上生徒北靣於下一師問難畢又當一師一日止試一二人一人遍應諸師之問如流乃取中凡讀書以天主經典為宗専設檢書官詳看羣書母或異説設書院日啓門二次聽士子入內抄寫誦讀云大學四科之外别有度數之學曰瑪得瑪苐加専究物形之度與數度其完者為幾何大數其截者為幾何多二者或脫物而空論之則數者立算法家度者立量法家或體物而偕論之則數者在音相濟為和立律吕家度者在天迭運為時立厯法家亦皆設學立師但不以取士耳隨處皆有貧院養鰥寡孤獨及殘疾有幼院育小兒有病院養病者各城邑遇豐年多積米麥飢嵗以常價糶之國中有天理堂選盛德鴻才無求於世者主之凡有舉動征伐必先質問合天理否以為可然後行賦稅皆自輸無徵比催科之法詞訟極簡小事里中和解大事乃聞官官府設三堂凡訟先訴第三堂不服訴第二堂終不服則上之國堂凡判事不先加刑俟事明罪定然後刑之封內略無戰鬬惟世族英傑嘗合數千人名義會皆一可當百遇警則成師旅焉其國人來者自述其政教風俗之槩如此元以前未通中國明萬厯九年有利瑪竇者始泛海抵廣州二十九年遂入京師中官馬堂以其方物進獻嘉其逺來給賜甚厚利瑪竇安之遂留不去嗣後來者益衆皆祖述其説略言天下有五大州一曰亞細州自中國至日本安南西域等國是也二曰歐邏巴州南至地中海北至氷海東至阿比河西至大西洋即利瑪竇所生本國也三曰利未亞州南至大浪山北至地中海東至西紅海西至阿則亞諾海是也四曰亞墨利加州地分南北中有一峽相連峽南曰南亞墨利加南起墨瓦蠟泥海峽北至加納達峽北曰北亞墨利加南起加納達北至氷海東盡福島是也五曰墨瓦蠟泥加州相傳歐邏巴屬之伊西巴泥亞國王念地為圜體西往可以東歸命其臣墨瓦蘭者往訪沿亞墨利加東偏展轉經年忽得海峽亘千餘里以墨瓦蘭首開此區遂即其名命曰墨瓦蠟泥加也又盛誇天主之教為天地萬物主宰時禮部侍郎沈㴶給事中晏文輝等斥其邪説惑衆乞加驅逐崇禎初厯法疏舛禮部尚書徐光啓請以其國新法相參校開局纂修報可書成未用會本朝建元始採取其説先後命西洋人湯若望南懷仁等為欽天監官先是欽天監按古法推算康熙八年十二月置閏南懷仁言雨水為正月中氣是月二十九日值雨水即為康熙九年之正月不當閏置閏當在明年二月上命禮部詳詢欽天監官多直懷仁言乃改閏二月並許自行其教餘凡直𨽻各省開堂設教者禁康熙九年六月國王阿豐肅遣陪臣瑪訥撒爾達聶等奉表進貢金剛石飾金劔金珀書箱珊瑚樹珊瑚珠琥珀珠伽南香哆囉絨象牙犀角乳香蘇合香丁香金銀乳香花露花幔花氊大玻璃鏡等物得旨西洋地居極邊初次進貢具見慕義之誠可從優賞賚尋遣瑪訥撒爾達聶等歸國行次山陽縣瑪訥撒爾達聶以病故加恩諭祭十七年八月阿豐肅遣陪臣本多白壘拉奉表貢獅子并奏言凡在西洋所屬瞻仰巍巍大清國咸懷尊敬願率諸國永逺沾恩等日月之無窮時天主降生一千六百七十四年也上召見於太和殿宴賚遣歸五十六年廣東碣石鎮總兵官陳昻疏言天主一教各省開堂聚衆在廣州城內外者尤多加以洋舶所滙同類招引恐滋事端乞循康熙八年例再行嚴禁毋使滋蔓從之五十七年兩廣總督楊琳疏言西洋人開堂設教其風未息請循康熙五十六年例再行禁止五十九年西洋人德里格以妄行陳奏獲罪得旨從寬禁錮雍正元年恩詔釋德里格於獄時浙閩總督覺羅滿保疏言西洋人於內地行教聞見漸淆請除送京效力人員外俱安置澳門其天王堂改為公廨奏入得旨西洋逺夷住居各省年久今令其遷移可給與半年之限並委官照看毋使地方擾纍沿途勞苦二年十二月兩廣總督孔育珣疏言西洋人先後來廣東者若盡送澳門安置濱海地窄難容亦無便舟歸國請令暫居廣州城天主堂內年壯願回者附洋舶歸國年老有疾不能歸者聽惟不許妄自行走衍倡教説其外府之天主堂悉撒為公廨內地人民入其教者出之三年二月育珣又言廣東香山澳有西洋人來居此二百餘年户口日繁至三千餘丁邇年常從外洋造船回澳已及二十五艘請著為定額毋許添置彼處頭目以瓜期來代者許留餘悉隨船歸國俱報可三年八月意達里亞國教化王伯納第多遣陪臣噶達都易德豐等表謝聖祖撫恤恩并賀上登極貢方物使臣歸國令齎敇諭其王曰朕纘承大統勉紹前徽王地處極逺特遣使賫章陳奏感先帝之垂恩祝朕躬之衍慶周詳懇至詞意虔恭朕甚嘉慰使臣逺來已加禮優待至西洋寓居中國之人朕以萬物一體為懷教以謹飭安靜果能慎守法度行止無愆自當推愛撫恤兹以爾使臣歸特頒斯敕並賜粧縀錦縀大縀二十次緞四十王其領受悉朕惓惓之意又加賜國王貂皮人參洋漆器芽茶紙墨絹扇并文綺四年六月釋西洋人畢天祥計有綱於獄初天祥等於康熙間以罪繫廣東獄及是教化王伯納第多請援德里格之例釋天祥等從之乾隆五十年十月奉諭前因西洋人吧吔哩咉等私入內地傳教經湖廣省查拿究出直𨽻山東山西陕西四川等省俱有私自傳教之犯業據各該省陸續解到交刑部審擬定為永逺監禁苐思此等人犯不過意在傳教尚無别項不法情事如呈明地方官料理進京者原屬無罪因該犯等並不報明地方官私在各處潛藏暗相傳引如鬼蜮伎倆必致煽惑滋事自不得不嚴加懲治雖坐以應得之罪朕仍憫其無知僅豫圈禁今念該犯等究係外夷未諳國法若令其永禁囹圄情殊可憫所有吧吔哩咉等十二犯俱著加恩釋放如有願留京城者即準其赴堂安分居住如情願回洋者著該部𣲖司員押送回粵以示矜恤逺人法外施恩至意傳聞意達里亞旁有八九國西洋人艾儒為職方外紀道諸國山川風俗略言由意達里亞東行為厄勒祭亞當歐邏巴極南境地分四道凡制度文字皆為西土之宗其人喜啖水族東北有羅瑪尼亞都城周環三層生齒殊衆城外居民綿亘二百五十里一聖女殿門開三百六十以象周天附近有高山名阿零薄有河水一名亞施亞白羊飲之變黑一名亞馬諾黑羊飲之成白有二島一名厄歐白亞海潮一日七至一名哥而府出油蜜極美遍島皆橘柚香櫞之屬由厄勒祭亞東北行為翁加里亞物産極豐牛羊可供歐邏巴一州之用有四水甚竒其一從地中涌出即凝為石其一冬月常流至夏合為氷其一以鐵投之即如泥再鎔又成精鐵其一水色沈緑遇凍則成緑石永不復化由翁加里亞東北行為波羅泥亞國分四區區居三月一年而遍地甚冷冬月海凍行旅常於氷上厯幾晝夜望星而行其屬國波多理亞地易發生種一嵗有三嵗之獲海濱出琥珀從石隙流出初如油出穴便凝由波羅尼亞東行為莫斯哥未亞東西經五千里南北經八千里中分十六道有窩爾加河最大支河八十皆為尾閭以七十餘口入北髙海部內兵力甚強日事吞併其地夜長晝短冬至日止二時氣候極寒雪下則凝室宇常用火溫行旅為嚴寒所侵驀入溫室耳鼻輒墮于地八月四月皆衣皮裘惟國王許習文藝餘雖貴戚大臣亦禁學有大鐘不撞惟王即位及誕日以三十人搖之造大銃長三丈七尺用藥二石可容二人入內掃除又有蜜林其樹皆為蜂房國人各界其樹為恆産厄勒祭亞羅瑪尼亞翁加里亞波羅尼亞莫斯哥未亞五國皆在意達里亞東境其在西北境者有四大國曰大尼亞曰諾而勿惹亞曰雪際亞曰鄂底亞大尼亞沿海産菽麥牛羊最多海中魚蔽水靣不藉網罟隨手取之諾而勿惹亞寡五榖山多材木鳥獸海多魚鱉人性馴厚喜接逺方賓旅雪際亞地分七道屬國十二多五榖五金財貨市中貿易以物相抵鄂底亞在雪際亞南亦繁庶此四國者與熱爾瑪尼亞相隔一海套道阻難行西史稱為别一天下其南夏至日長六十九刻其中長八十二刻其北夏至日輪橫行地靣半年為一晝夜蓋意達里亞南際地中海而四國則北際氷海云臣等謹按西洋去中國水程八萬里其道由地中海西出大洋南行過福島東南行泛利未亞海過大浪山折而東行過西南海東北行過小西洋又東行至吕宋入廣東境逺泛重洋傾誠慕義我朝接待錫賚之典亦不與他國同其貢使來時用內務府司員佐以彼國供職中朝者送逆廣東境上貢物無定額亦無定期但船不得過三隻每船不得過百人正副使來京者不得過二十人餘俱留廣東聽賞凡賜敕書俱令本使自賫歸不遣朝使與海洋諸國同蓋念海道險逺使臣孤危故也至意達里亞人所稱天下為五大洲蓋沿於戰國鄒衍裨海之説第敢以中土為五洲之一又名之曰亞細洲而據其所稱第五洲曰墨瓦蠟泥加洲者乃以其臣墨瓦蘭輾轉經年忽得海峽亘千餘里因首開此區故名之曰墨瓦蠟泥加洲夫以千餘里之地名之為一洲而以中國數萬里之地為一洲以矛刺盾妄謬不攻自破矣又其所自述彼國風土物情政教反有非中華所及者雖荒逺狉獉水土竒異人性質朴似或有之而即彼所稱五洲之説語涉誕誑則諸如此類亦疑為𠞰説躗言故其語之太過者今俱刋而不紀云博爾都噶爾亞伊西巴尼亞熱爾瑪尼亞博厄美亞拂朗察法蘭得斯附博爾都噶爾亞在歐邏巴極西境周七百里西濱大洋地分五道四方商船皆聚都城有大河曰德若經都城西入海通海大市凡六水泉二萬五千國有二學曰厄物􅀈曰哥應拔歐邏巴髙士多出此學有耶蘇會士蘇氏者著陡祿日亞書最精土産果實絲綿多水族善釀葡萄酒即過海至中國不壞園囿有周數十里者禽獸充牣異國名王過其地往射獵焉俗有仁會恤孤寡煢獨商舶至或有死無主者收行李訪其戚屬還之國王隨處遣官為孤子治家長則還所有且加益焉明以前未通中國入本朝西洋諸部落向風內面雍正五年四月其國王名若望者遣陪臣麥德樂表貢方物上優加宴賚賜敕書於國王令麥德樂賫歸國乾隆十八年三月遣陪臣巴哲格等表貢方物命欽天監監正劉松齡前途導引至京召見巴哲格等賜宴並賜敕書諭博爾都噶爾雅國王曰覽王奏并進方物具見悃忱洪惟我聖祖仁皇帝世宗憲皇帝恩覃九有光被萬方因該國王慕義抒誠夙昭恭順是以疊沛溫綸並加寵錫今王載遴使命逺涉重瀛感列祖之垂慈踵闕庭而致祝敬恭式著禮數彌虔披閲奏章朕心嘉悅既召見使臣遂其瞻仰之願復親御帳殿優以宴賞之榮西洋國人官京師者晉加顯秩慰王逺念茲以使臣歸國特頒斯敕其錫賚珍綺具如常儀加賜彩縀羅綺珍玩器具等物王其祗受悉朕眷懷先是雍正五年朝貢於常賞外特賜國王人參四十斤庫縀二十五匹磁器一百三十件洋漆器六十六件紙三百張墨二十匣字畫絹一百張及荔枝酒哈蜜瓜松糕茶糕芽茶香餅燈扇香囊等物又加賞來使倭縀磁器漆器紙墨扇絹等物至乾隆十八年又特賜該國王龍縀四匹粧縀花縀線縀各八匹百花粧縀十二匹綾紡絲各二十二匹羅十三匹杭綢七匹册頁一付瑪瑙玉器六件琺琅器二種漆器十九種磁器三十三種及紫檀木器畫絹香袋香餅紙墨扇茶又加賞正使畫絹紙墨扇茶及文綺又隨敕書賜國王龍縀片金各二匹蟒縀倭縀各三匹粧縀七匹花縀六匹閃縀花縀青花縀藍縀青縀帽縀線縀各四匹綾紡絲各二十二匹羅十三匹絹七匹又因端陽節加賞國王紗四十匹葛百匹及香囊香串宫扇藥錠等物并正副使紗葛香串藥錠宫扇等物念其逺來從優錫豫焉二十五年廣東南海縣民林六因緣入教至於變易服飾娶妻生子經兩廣督臣李侍堯等奏準比照左道惑衆為從例治罪以維風俗部議從之其國東境為伊西巴尼亞又東北為拂朗察又東北為法蘭得斯又東北為熱爾瑪尼亞博厄美亞彼中紀載盛稱諸國山川風俗可得而略述云伊西巴尼亞有二大名城曰西未利亞近地中海曰多勒多城在山巔有巧工製一水器能盤水至山城晝夜轉動不煩人力有河名寡第亞納伏流地中百餘里其上穹窿若橋梁舊為牧場又有塞惡未亞城乏甘泉從逺山遞水架一石梁上作水道擎以石柱綿亘數十里又一都城皆火石砌成故其國相傳有三絶謂一橋萬羊牧其上一橋水流其上一城以火石為之也有渾天儀大如屋各重天轉動度數悉與天合製此象者注想十七年造作三年曽未重作一輪多勒多城中有銀殿髙丈餘濶丈餘內有一小金殿髙數尺近又造一瞻禮堂有黑白玉琢成古王像六髙一丈八尺堂內三十六祭臺中臺左右編簫二座各三十二層每層百管管各一音合三千餘管凡風雨波濤謳吟戰鬬與夫百鳥之聲皆備國人極好學有共學二所在撒􅀈蔓加與亞而加􅀈古有名賢曰多斯達篤者著書最多每日得三十六章盡屬奧理其遺像兩手各持一筆又又有王名亞豐肅者好天文厯法撰厯學全書制圖象為今西法之宗初博爾都噶爾亞國君乏嗣伊西巴尼亞之君為其昆仲乃權署其國事後復自立君長不相統云博爾多噶爾亞國人傅作霖以天文家來仕中朝與劉松齡同官而松齡為熱爾瑪尼亞人在博爾都噶爾亞東北五千里其國王不世及或用本國臣或用列國君請命教王立之其土人散處各國為兵極忠實各國護衛宫城皆選此國人充之工作精巧能於戒指內納一自鳴鍾所屬有法蘭哥地人質直易信行旅過者輒詈之或不答則喜延入具酒食為計緩急謂已嘗試可信托也多葡萄善造酒常沽往他處又有屬國名博厄美亞者地生金掘井恆得金塊有得羅林日亞者最侈汰其王一延客堂四周皆列珊瑚儼如屏幛由博爾都噶爾亞東北行踰伊西巴尼亞法蘭得斯拂朗察乃至其地云拂朗察地周一萬一千二百里分十六道屬國五十餘其都城名巴理斯其國王能以手愈人􅐇瘡每嵗一日療人疾法蘭得斯地不甚廣人居稠密臣等謹按西洋人尊奉天主謂之陡斯言天主始制天地萬物而主宰之使無尊主斡旋其間則日星何以循次萬物何以托命是所謂天主者蓋懸指所以然之理自以耶蘇為扶世立教之人而其説益堅今審其致力之端大約以保全性靈為亞尼瑪之學亞尼瑪譯言性靈也以私為惡之根以欲富貴欲逸樂為私之幹以驕傲嫉妬貪吝忿爭叨餮淫欲怠惰為欲之枝於是有伏傲平妬解貪熄忿塞叨坊淫䇿怠之七克以自守其亞尼瑪亦似與聖賢克己之意符者至所云欲知正性當觀人已不殊事而推親屬於路人齊死生為一致其心漠然無復有疾痛苦癢之相關則自成一説與老佛之意同矣意達里亞博爾都噶爾亞為歐邏巴二大國久仰盛朝風聲抒誠稱貢餘國之人亦多筮仕中華寄居閩廣百餘年來不可殫述其山川風土隨地異形自利瑪竇始為全圖流傳中國厥後龎我迪翻刻西洋地圖衍為圖説艾儒略輯為職方外紀其言未免夸張正莊子所云存而不論者若其幾何原測量法義諸書籍以考核天文獨為精審而又勤於測驗巧製彛器本朝璇玉所窺亦資其用俾殊方異能之士服官専司實足補郭守敬諸家所未備惟天主一説則但使自沿厥俗勿俾流傳致淆聞見屢奉聖明飭禁意至深逺此誠我朝仁育義正之懷收其人必盡其用安其俗不存其教而羈臣旅客來庇仁宇者又靡不體恤周詳內外一視所由獻玉貢琛重趼疊迹無間於八萬里而遙也英吉利英吉利一名英圭黎國居西北方海中南近荷蘭紅毛畨種也距廣東界計程五萬餘里國中土地平衍宜麥禾果豆有一山名間允産黑鉛民為開採輸稅入官國人出入處左有那村右有加釐皮申村皆設立炮臺二村中皆有大海駕船往來海邊多産火石王所居名蘭侖有城距村各百餘里其俗信奉天主每七日一禮拜誦經不食齋不理事男女不問年少長以相悅而成婚姻或有以媒合者女率贅男而居婦亡則更贅於女不置妾媵男戴三角帽具鞋襪衣制窄小男下體著褌女則施裙而已色以紅緑白為吉青為凶相見脫帽握手為禮多佩刀飲食用金銀器人有喪即日營殯葬所親送葬相與掩土而歸男女閉户號泣不設位斷煙火所親饋之食則食七日後始開門舉火王姓名世系逺者不可考其近者為弗氏京也治傳子昔斤京也治昔斤京也治傳子非立京也治即今之王也我朝康熙間英吉利始來通市後數年不復來雍正七年後互市不絶初廣東碣石鎮總兵官陳昻奏言臣遍觀海外諸國皆奉正朔惟紅毛一種姦究莫測其中有英圭黎諸國種族雖分聲氣則一請飭督撫關部諸臣設法防範乾隆七年十一月英吉利巡船遭風飄至澳門海靣遣夷目至省城求濟廣東總督䇿楞令地方官優給資糧修整船隻令俟風便歸國先是其互市處所或於廣或於浙二十二年部議英吉利不準赴浙貿易於是皆收泊廣東每夏秋交由虎門入口其土産則有大小絨嗶嘰羽紗紫檀火石及所製玻璃鏡時辰鐘表等物精巧絶倫二十四年方嚴絲斤出洋之禁兩廣總督李侍堯奏近年英吉利夷商屢違禁令潛赴寧波今絲斤禁止出洋可抑外夷驕縱之氣惟本年絲斤已收請仍準運還奏入報可是年英吉利夷商洪任輝妄控粵海關陋弊訊有徽商汪聖儀者與任輝交結擅領其國大班銀一萬三百八十兩按交結外國互相買賣借貸財物例治罪二十七年英吉利夷商白蘭等求仍照前通市兩廣總督蘇昌請照東洋銅商搭配綢縀之例酌量配買得旨每船準買土絲五千斤二蠶湖絲三千斤其頭蠶湖絲及紬綾縀匹仍如舊禁止不得影射取利自是英吉利來廣互市每船如額配買嵗以為常其明年并準帶綢縀成匹者二千斤所屬有亞齊國臣等謹按絲斤綢縀向無明禁乾隆二十四年御史李兆鵬奏請禁止絲斤出洋嗣後凡私販絲斤出洋者照偷運米榖例治罪是年九月兩廣總督奏綢縀綿絹出洋應否與絲斤一并定議處分亦經奏準照例科斷惟銅商不在禁例旋因英吉利夷商籲請每船準配買土絲二蠶絲共八千斤此皇上加惠英吉利之特恩也二十九年三月兩江總督尹繼善江蘇巡撫莊有恭合詞請弛絲禁上諭曰絲斤出洋之禁行之日久絲價未減抑有更貴者可見生齒繁衍取多用宏物情自然之勢其故非盡由出洋也今尹繼善等議請弛禁莊有恭並稱前撫浙時體察杭嘉湖三郡民情亦以絲斤弛禁為便浙江情形如此餘省亦可概見蓋緣出洋絲斤本係土絲及二三蠶者非內地綢縀必須精好物料可比况英吉利噶喇巴等俱已特旨準其酌帶配用外洋諸國亦宜一體弛禁其如何立定章程及設法稽查之處俟各督撫奏到該部詳議以聞旋據兩江總督尹繼善江蘇巡撫莊有恭奏商人范清洪楊裕如等船如願帶絲斤者每二三蠶絲一百二十斤抵綢縀一捲其帶多者以此抵算每船總不得逾一千二百斤浙閩總督楊廷璋浙江巡撫熊學鵬福建巡撫定長奏商船每船準配土絲一千斤二蠶絲一千斤兩廣總督蘇昌奏請於二十七年恩旨八千斤外再加增粗絲二千斤總以萬斤為率其往噶喇巴暹羅安南等處之本港洋船約三四十隻一年可往來一二次每船亦準帶粗絲一千六百斤前後均經户部彚奏請旨遵行仰見皇上體恤民瘼無微不至始則慮絲價日昻官為禁止逮行之無效隨時變通廣商人之利益裕閭閻之生計而仍於寬大之中示以節制令地方大吏悉心稽察毋使姦商於成額外影射增加斯內外兩利行之久逺而無弊矣干絲臘干絲臘在西北海中與英吉利相近風俗與英吉利同其國王姓名傳國世次無考每嵗駕夾板船來廣東互市據吕宋速巫等處為貿易之處干絲臘國常分遣小王鎮守吕宋云臣等謹按佛朗機在明時既襲據吕宋今干絲臘亦分守吕宋蓋舊國已空島夷互據難以實稽也荷蘭荷蘭俗稱紅毛畨亦曰紅夷在西北海中西北與佛朗機接去中國水程五萬餘里其國有大山名那蘭山山麓建城名那蘭城其人深目長鼻鬚眉髮皆赤足長尺二寸其國受朝敇稱王名列外服其臣下官爵見於奉使者亦有户部官總兵官等名俗奉天主教與英吉利同性強悍好爭雄所恃惟巨舟大炮舟長三十丈廣六丈厚二尺餘樹五桅後為三層樓旁設小窗置銅炮桅下置二丈巨鐵炮發之可洞石城震數十里世所稱紅夷炮即其製也柁後置照海鏡徑大數尺能照數百里其所役使名烏鬼入水不沉走海靣如平地然舟用夾板重大難轉或遇淺沙即不能動而其人亦不善戰故挫衄每多其土産有馬珊瑚哆囉絨嗶嘰丁香檀香自鳴鐘氷片琥珀鳥鎗火石皆充貢物又産禾麥豆及金銀瑪瑙玻璃大絨羽紗縀花氊胡椒所製刀劍可屈伸縈繞如帶國土既富遇中國貨物不惜厚資故華人樂與為市明萬歷中荷蘭來侵吕宋泊香山澳入澎湖嶼尋據臺灣時本朝天命初年也天命三年荷蘭與噶喇巴合將入澎湖求互市明發兵擊敗之崇德二年復為明將鄭芝龍所破餘衆猶據臺灣教習土畨耕作築平安赤嵌二城以自固順治九年鄭成功冦鎮江敗歸謀取臺灣會荷蘭通事何斌逋夷負遁鹿耳門説成功以水師從鹿耳門入與荷蘭相持久荷蘭戰屢敗棄臺灣走十年廣東巡撫奏報荷蘭願備外藩謹修職貢十三年六月國王墨投為也甲必丹物馬綏極遣陪臣杯突髙嚙惹諾皆色齎表朝貢并請貢道經禮部議奏荷蘭從未入貢今重譯來朝誠我朝德化所致應五年一貢貢道由廣東入得旨荷蘭慕義抒誠航海修貢念其道路險逺可八年一朝以示體恤逺人之意八月貢使歸國賜敕諭曰惟爾荷蘭國墨投為也甲必丹物馬綏極僻在西陲海洋險逺歷代以來聲教不及乃能緬懷德化效慕尊親擇爾貢使赴闕來朝虔修職貢朕甚嘉之用是加賚文綺白金以報孚忱至所請朝貢出入貿易有無雖灌輸貨貝利益商民但念道里悠長風波險阻若貢期頻數猥煩多人朕皆不忍著八年一次來朝員役不過百人令二十人到京所擕貨物在館交易爾其慎乃常職祗承寵命康熙三年大兵渡海攻鄭錦等進克厦門荷蘭國率舟師助𠞰以夾板船乘勢追擊斬首千餘級遂取浯嶼金門二島事由靖南王耿繼茂奏聞上嘉其功賜國王文綺白金等物先是二年三月荷蘭遣其户部官老磨軍士丹鎮總兵官巴連衛林等朝貢六年五月國王噶嘍吧王油煩馬綏極再遣陪臣奉表入貢有刀劍八皆可屈伸馬四鳳膺鶴脛迅速異常二十五年六月國王耀漢連氏甘勃氏遣使賔先吧芝表獻方物請定進貢限期五年一次又貢船例由廣東入但廣東路近而泊地險福建路逺而泊地穩嗣後請由福建入部議應如所請是年定減荷蘭貢額賜敕諭曰朕惟柔逺能邇盛代之嘉謨修職獻琛藩臣之大節輸誠匪懈寵賚宜頒爾荷蘭國王屬在遐方克抒丹悃遣使齎表納貢忠藎之忱良可嘉尚用是降敕奬諭并賜王文綺白金等物王其祗承益勵忠貞以副朕眷由是職貢彌謹雍正初年通市不絶夏秋交來廣由虎門入口至冬乃回嵗以為常乾隆元年特命裁減荷蘭稅額諭曰朕聞外洋紅毛夾板船到廣時泊於黃浦地方輸稅之法海船按梁頭征銀二千兩左右再按則抽其貨物之稅此向例也近於額稅之外將伊所擕置貨現銀另抽加一之稅名曰繳送與舊例不符非朕嘉惠逺人之意著該督查例裁減並宣諭各夷人知之荷蘭故居西北地號西隴去中國絶逺自通市後常占居噶喇吧地六年為羣畨所擾以漢人有罪遣居西隴者禦之捷則徙還噶喇巴後連戰輒捷將以無辜漢人投西隴代遣者還衆不受命荷蘭乃殺漢人事詳噶喇巴傳二十七年準荷蘭國夷商每船配買土絲五千斤二蠶湖絲三千斤是年十月其商人許力等呈稱彼國無織紉之工求量帶綢縀經兩廣總督蘇昌奏準每絲千斤扣帶綢縀入百斤著為例云臣等謹按明史載鄭和七下西洋歷諸番國獨未至所謂荷蘭者厥後高帆巨艦東來市易而其本國在西洋者相去固絶逺也乾隆六年浙閩總督䇿楞奏稱西隴為荷蘭祖家去噶喇巴甚逺所謂西隴者當即西洋故地荷蘭雖占居噶喇巴而荷蘭之名久通朝貢綸錫頻邀故仍其故號以著聖化之逺云佛朗機佛朗機一名和蘭西亦紅毛番種也東與荷蘭接其國都地名巴離士至中國水程五萬餘里從羅令山峽出口境絶險國王姓無盧蒙名雷士堅治父名雷士吉多治祖名雷士爹利治逺代世次不可考其人長身高鼻貓晴鷹嘴卷髮赤鬚恃強陵轢諸國無所不往衫袴垂至脛皮屨服用瑣袱西洋布貴者冠賤者笠見尊長輒去之飲食不用匙箸富者食麵貧與奴僕食米婚娶無媒妁佛前相配以僧為證謂之交印國有大故亦多與僧謀人死貯布囊以葬土産有象犀珠貝市易但伸指示數雖纍千金不立約契有事指天為誓不相負餘風俗略同和蘭英吉利諸國我朝順治四年八月廣督佟養甲疏言佛朗機國人寓居壕鏡澳與粵商互市於明季已有歷年後因深入省會遂飭禁止請嗣後仍準畨舶通市上從之自是每嵗通市不絶惟禁入省會其族類有居吕宋者詳吕宋傳來粵互市或從其本國或從吕宋國至云臣等謹按佛朗機在前史為佛郎機其番人巨炮大艦肆掠諸國橫行海島今皆安帖洋靣與倭人之震懾天威同一致矣瑞國瑞國在西北海中達廣東界俱係海洋計程六萬餘里國中土地平衍有大山三一曰庇髙天牙禮花閲三四年輒有光燭天望之若煙火四靣巉巖壁立千仭人迹不能到一曰布農故巴梨自山麓達於頂俱白沙童然無一草一木一曰化倫仕髙勞華山中産紅銅民為開採納於王王所居土名仕的哥盧國人會聚之地土名乙頓巴梨距王居七百餘里國中四靣皆大澤汪洋千頃國人之散處者非駕船不能往來乙頓巴梨蓋泊船總滙處也凡大市鎮當國人貿易之期則有官司至若古司市者故市鎮皆設館舍以供駐宿置班衙以供使令其人信奉天主俗同英吉利通市始自雍正十年後嵗嵗不絶每春夏之交其國人以土産黑鉛粗絨洋酒葡萄乾諸物來廣由虎門入口易買茶葉瓷器諸物至初冬回國乾隆二十七年特旨準配買絲片是年十月瑞國商棉是呾等呈稱夷等外洋各國雖有絲斤不諳織作以不能自織之國若止準帶絲斤仍屬無由服用現在瑞國已缺乏綢縀二三年懇先準帶綢縀成匹者二千斤由兩廣總督蘇昌代奏以聞并請嗣後每絲千斤止準帶綢縀入百斤毋得額外多求至現在瑞國懇先帶綢縀二千斤之處為數無多臣等仰體皇上優恤逺夷至意業準其帶往奏入上從之其國王姓名世系逺者無考近而可知者曰土的亞多傳子非里地力非里地力傳子亞敦非里地力是為今瑞國王云嗹國嗹國地居西北方凡厯海洋六萬餘里始達廣東界國中土地平衍山澤少著名者有一山土名士嗹國人皆從此出入前臨大海左右設炮臺距王城五十里王所居土名顛地墨王名非釐德歷王父為奚成王祖為奚釐成其逺者無考其國人風俗則信奉天主多同英吉利土産黑鉛琥珀白金及大青葡萄乾之屬自雍正間有夷商來廣通市後嵗以為常每夏秋之交由虎門入口至廣東易買茶葉瓷器絲斤至冬初風信到時駕船而歸本港商人無至其國者皇朝文獻通考卷二百九十入
