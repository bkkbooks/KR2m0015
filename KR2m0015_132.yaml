body:
  text: 欽定四庫全書皇朝文獻通考卷一百三十二王禮考八上尊號徽號尊封附乾隆十六年十一月乙酉以皇太后六十萬夀加上崇慶慈宣康惠敦和皇太后徽號曰崇慶慈宣康惠敦和裕夀皇太后先是九月辛卯諭禮部朕惟合九州以致養非徒問視之常儀統列服以尊親曷罄顯揚之至願矧宫庭集慶欣盛典之宏昭而海宇騰歡思鴻聲之遹晉式稽茂禮允洽徽章欽惟聖母崇慶慈宣康惠敦和皇太后德懋安敦功符厚載恩垂教育朂一人宵旰之勤化起修和錫兆庶升平之福懿徽允著廣敷及物之仁茀履常綏彌篤受天之祐兹以一陽之月恭逢萬夀之期值花甲之初周際芳辰之正永前者親扶玉輅見東南父老共效嵩呼今則慶溢璇宫與中外臣民同登夀域河清海晏幸際昌期巷舞衢歌悉惟慈福用伸誠悃恭晉隆稱敬加上聖母皇太后徽號曰崇慶慈宣康惠敦和裕夀皇太后蘭殿稱觴奉天顔之有喜萱闈迓祉祝聖夀以無疆奉册寶而騰輝合四海之歡心共載映金甌而靄瑞與萬年之景祚俱長其應行典禮爾部敬謹詳議具奏至是恭奉册寶加上徽號前期一日遣官祭告天地太廟後殿奉先殿社稷上詣皇太后宫恭上奏書至日上御太和殿閲册寶率王公大臣詣皇太后宫恭上册寶行禮越三日上率王公大臣詣皇太后宫恭祝萬夀宣表行慶賀禮上御太和殿王公百官上表行慶賀禮頒詔天下詔曰帝王寅紹丕圖首隆尊養恭承泰運洽慶邦家鴻名彰至德之符上夀錫敷天之福際升平於六宇祝純嘏於重闈所以宣播徽猷敦崇愛敬必儀文之大備庶典禮之聿昭恭惟聖母崇慶慈宣康惠敦和皇太后運啓升恆化符悠久贊軒圖而立極翊舜日以重光荷教育之恩勤慈仁懋著敕幾康於密勿保治彌隆厚澤洽於羣生祺祥光於九有頤顔長樂苞元氣之彌綸介祉承歡布太和之洋溢兹值辛未仲冬之月恭逢六旬聖夀之期福自天申躬膺慈眷集鴻禧之美備廣運難名順率土之尊崇徽稱遹駿祗告天地宗廟社稷於乾隆十六年十一月二十二日率王公文武羣臣恭捧册寶加上聖母崇慶慈宣康惠敦和皇太后徽號曰崇慶慈宣康惠敦和裕夀皇太后福履優遊彌衍淳熙之緒泰符昌熾式敦敷錫之源盛典特隆湛恩用溥於戲播徽音而錫類萬年樂有道之長綿景祚以凝庥四海沛無疆之澤布告天下咸使聞知二十年六月己酉以伊犁平定大功告成加上崇慶慈宣康惠敦和裕夀皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧皇太后先是五月己亥諭禮部朕惟德威逺播必揚義問於無窮懿範昭宣聿展孝思於不匱敬承啓佑遐方之文治覃敷備極顯揚萬國之歡心普洽膚功迅奏茂典宜崇欽惟聖母崇慶慈宣康惠敦和裕夀皇太后教育推恩安貞垂裕載萬物以應地盡仰慈暉斂五福以錫民咸登夀域兹遇西陲平定紹祖功宗德以綏猷是皆慈訓周詳配大烈耿光而並懋慶舒長之愛日遐增介福於無疆扇廣莫之仁風益鞏皇圖於有永從此邊氛肅靖海宇乂安繼列聖之鴻謨澤流宗社慰文母之燕翼善溢庭闈敬抒歸美之忱用篤尊宗之典加上聖母皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧皇太后輝騰瑶册嘉祥遍耀於八紘瑞集璇宫繁祉常增於萬夀謹增顯號允協彛章其應行典禮爾部敬謹詳議具奏至是恭奉册寶加上徽號前期一日遣官祭告天地太廟後殿奉先殿社稷上詣皇太后宫恭上奏書至日上御太和殿閲册寶率王公大臣詣皇太后宫恭進册寶宣表行慶賀禮皇后率貴妃妃嬪公主王妃命婦詣皇太后宫行禮上御太和殿王公百官上表行慶賀禮皇后率貴妃妃嬪於皇上前行禮貴妃妃嬪公主王妃命婦詣皇后宫行禮是日頒詔天下詔曰朕寅紹丕基統御中外痌瘝念切宵旰勤求惟期綏靖邊陲乂安黎庶俾享升平之福益增康阜之風若乃絶域歸誠膚功迅奏纘祖宗未竟之緒綿社稷無疆之庥固事會之所期實懋昭之有自彛章式著慶典彌光凖噶爾部落僻處荒陬未膺朝命妄思雄長淩擾諸畨昔我皇祖聖祖仁皇帝勤三駕以親征皇考世宗憲皇帝命六師而致討逮朕御極正及撤兵聊示羈禁準通貿易詎包荒之既久乃骨肉之自殘而逆豎達瓦齊篡弒相尋人心瓦解始則車楞伍巴什等欵關請附繼則阿睦爾撤納等率衆來降既不忍拒之遐方自當為登之袵席是用揆幾度勢命將出師因其向化之誠寄以前驅之任該將軍等同心戮力布德宣威大軍所至自噶爾丹多爾濟以及諸部各台吉喇嘛回民等莫不拜舞輸忱歡迎載道壺漿夾路耕牧不移遂直抵伊犁收其部衆撫綏安輯咸慶更生無血刃遺鏃之勞奏掃穴犁庭之勝計自始事以逮捷聞曽未數旬迅成偉績歷稽往牒實所希逢在於朕心倍深兢業此皆沐蒼穹之默眷列祖之鴻庥故能暢播逺猷光昭駿烈已分遣皇子恭叩祖陵代行告祭謹於乾隆二十年六月初一日親詣太廟躬申祗告并遣官祗告天地社稷暨先師孔子用申謝悃至朕日侍璇宫親承懿訓溥慈暉於海宇錫厚澤於生民仰惟垂裕之恩宜晉顯揚之號兹於本月初七日率王公文武羣臣恭奉册寶加上聖母崇慶慈宣康惠敦和裕夀皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧皇太后兩階之文德覃敷鞏皇圖於有永萬國之歡心允洽介純嘏以彌增用溥覃恩聿光盛典於戲廣仁恩於茂育逺敷熙皥之隆崇光烈之覲揚永慶綏和之治布告天下咸使聞知二十六年十一月甲寅以皇太后七十萬夀加上崇慶慈宣康惠敦和裕夀純禧皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿皇太后先是九月諭禮部朕惟夀共福臻宜懋祝釐之典名因德顯聿崇歸善之文矧兹四海之升平悉蒙慈蔭爰合萬方之歌頌肅晉隆稱慶節宏開徽章式煥欽惟聖母崇慶慈宣康惠敦和裕夀純禧皇太后厚德凝禧深仁錫福協安貞而應地道備坤儀朂宵旰以勤民治登泰運春暉遍煦九州之民物恬熙愛日常懸萬國之冠裳忭舞兹以一陽之月恭逢萬夀之期進花甲之初周更逢十稔喜履長之叶慶駢集千祥當鶴算之頻增正鴻圖之益壯梯山航海望金闕以抒誠東賮西琛奉璇闈而祝嘏爰稽典禮用展悃忱敬加上聖母皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿皇太后寶册輝騰龍文光耀鞏金甌而氷祚占玊晷以迎和垂裕方隆欣太平之有象承庥未艾祝聖夀以無疆其應行典禮爾部敬謹詳議具奏至是恭奉册寶加上徽號前期一日遣官祭告天地太廟後殿奉先殿社稷上詣皇太后宫恭上奏書至日上御太和殿閲册寶率王分大臣詣皇太后宫恭進册寶行禮越二日上率王公大臣詣皇太后宫恭祝萬夀宣表行慶賀禮百官於午門外隨行禮上御太和殿王公百官上表行慶賀禮頒詔天下詔曰帝王恭膺景命孝治當先肅奉徽儀恩施用溥際太平之上理溯源必始於宫闈昭尊養之隆文行慶聿周於海宇萬國被咸寧之福千秋揚頌禱之聲顯號遐宣蕃釐茂集欽惟聖母崇慶慈宣康惠敦和裕夀純禧皇太后仁心篤慶懿德凝庥含章允洽於坤元厚載常昭於泰運恩垂啓迪朂宵旰以惟勤業廣敷施敕幾康於無逸托慈雲之普覆闓澤羣霑仰愛日之長懸陽和遍煦夀域開而版圖式擴春臺陟而嘉應駢臻兹逢辛巳之仲冬恭慶七旬之聖夀自天申命聿昭保定之符率土騰歡特著尊崇之義爰祗告天地宗廟社稷於乾隆二十六年十一月二十日率王公文武羣臣恭捧册寶加上聖母崇慶慈宣康惠敦和裕夀純禧皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿皇太后茀祿永綏光啓夀昌之運彛章具舉化敦敷錫之原巨典攸昭隆恩式展於戲介慈釐而錫福萬年之景祚彌長崇慶典以推恩四海之歡心畢協布告天下咸使聞知三十六年十一月丙辰以皇太后八十萬夀加上崇慶慈宣康惠敦和裕夀純禧恭懿皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后先是三十四年十二月諭曰朕尊養璇闈展愛承歡一切務臻隆備前者每逢慶典加上聖母皇太后徽號悉遵會典成規敬製金册金寶以為凖儀昭度程式宜然近稽體仁閣尊藏法物則孝莊文皇后玉册玉寶具存皆康熙年間皇祖厯次加奉太皇太后徽號所進者乃知册寶原有刻玊之制因思國家傳寶質皆瑑玊而下逮親藩封爵册寶亦得以範金是嘉玊較視良金尤為寶貴越嵗辛卯恭遇聖母八旬萬夀朕將躬率羣臣恭加徽號用洽彛章所奉册寶自宜備極珍崇以稱朕尊親茂慶之志尋禮部遵旨議奏恭奉皇太后册寶皆用嘉玊以隆慶典奉旨依議至是躬奉册寶加上徽號前期遣官祭告天地太廟後殿奉先殿社稷上詣皇太后宫恭上奏書丙辰上御太和殿恭閲册寶率王公大臣詣皇太后宫躬上册寶行禮恭進皇太后八旬萬夀加上徽號册文璇闈錫羡德施昭曼夀之徴蘭殿敷慈福集紀鴻名之􅍇際自古希聞之大慶祥越羲軒晉從今遞積之徽稱音揚任姒歡孚陬澨喜洽清寧欽惟聖母崇慶慈宣康惠敦和裕夀純禧恭懿皇太后陛下厚德頤恬繁禧垂裕禔源昌熾履箕範之斂敷順氣彌綸協坤輿之光大天開聖節景迓長春欣八袤之崇登祝萬年之介祉疉遵懿訓寅奉怡顔依愛日以循陔舞綵逮六旬以上戴春暉而負扆垂衣臻三紀于兹膝繞雲礽臚嘉祥於五世野多耄耋開夀宇於八方有慶則兆民同尊親以天下養頌賡遍德疊蠲二稅以阜成雅咏作人聨啓兩闈而彚吉四言下管新苞茂之瑶宫萬嵗呼嵩掖省巡之翟輅維錫類承歡之茂集總合羣黎百姓之心凡家國慶瑞之駢臻皆由聖母一人之福載稽舊典式備多儀制更重於祥金禮特隆夫嘉玊用宜延喜珍來西母之琯環矧乃象功貢底闐河之璆璧彛章肇定顯號洊加謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶上徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后肅布愈悰虔申祈頌繹彖辭之應地安乃承貞次詩什於生民祺維介景捧瑶箋而獻籙陳芝牒以迎釐伏願純嘏長綏茀康彌卲律生萬事之本八暢元音籌添億嵗之盈十基積數從此京垓演䇿川長山夀躋悠久於坤元章部引年日升月恆並增興於天保臣誠歡誠忭稽首頓首謹言率酉上率王公大臣詣皇太后宫恭祝萬夀宣表行慶賀禮上御太和殿王公百官上表行慶賀禮頒詔天下詔曰朕惟宫庭集祉聿閎起化之原海宇抒忱晉效臚歡之祝矧際盛希聞於自古福備箕疇而延禧兼懋於方來慶餘羲畫既揆辰而稽典宜申命以用庥爰洽彛章式敷愷惠欽惟聖母至德儲祥深仁篤祜坤成厚載萬方崇養志之忱泰運光亨三紀荷特盈之訓當紫籞觴稱八帙正黃鍾管叶一陽六旬舞綵躬親五世聨吟繼晉班分九老番番同會觀酺賜逮百年衮衮並叨晉秩掖輦而東皇獻録天門修望岱之儀倍筵則西旅輸琛月􅒸預呼嵩之列先辛與先庚迭應景祚駢臻式金將式玊尤珍鴻章特備十六字為序為頌述德方長億萬年得夀得名承歡允協祗告天地宗廟社稷於乾隆三十六年十一月二十日丙辰率王公文武羣臣恭奉册寶加上聖母崇慶慈宣康惠敦和裕夀純禧恭懿皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后安著頤和之永愜應地德以無疆祺徵福履之恆綏迓天庥于滋至用溥尊親之紀彌宏錫類之恩布告天下咸使聞知四十一年五月辛未以金川平定加上崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺寧豫皇太后先是二月乙卯諭曰將軍阿桂等奏金川全境蕩平逆酋兄弟及助惡頭人悉皆擒獲大功告成紅旗報捷此皆仰賴昊蒼鴻佑朕惟益凛敬寅而邊徼輯寧從此銘勳偃武實由聖母福庇詒慶滋長歸善顯揚尊崇宜備謹擬加上皇太后徽號朕率王公大臣等共申慶賀以昭慈闈燕喜所有應行典禮著內閣博考彝章交各衙門敬謹承辦具儀以聞癸未大學士等奏加皇太后徽號恭擬加尊字樣請定奉諭旨加上寧豫二字至是恭奉册寶加上徽號前期遣官祭告天地太廟後殿奉先殿社稷上詣皇太后宫恭上奏書是日辛未上御太和殿閲册寶率王公大臣詣皇太后宫恭上皇太后徽號册寶宣表行禮百官俱于午門外隨行禮上恭上皇太后册文上言堯門啓瑞樞光昭耆定之模姒幄基祥帡蔭衍升平之慶頌孚海宇忭集臣鄰欽惟聖母崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后陛下聖裕徽音福徴厚德尊親並戴合萬國以臚歡名夀兼隆臻億齡而履順兹值金川之底績爰陳瑶牒以告勳溯彼蠻觸搆爭始猶寬其齋斧繼乃驅狼肆抗終難逭其威弧掦兩路之先聲兵非得已簡八旗之徑旅勇且知方越險摧堅不啻成功百戰搗巢翻窟于斯事蕆五年豫小子籌筆辛勤每厪慈詢之垂念師武臣劘旌勞勩克馳捷奏以慰懷兵銷騰日月之光升恆祝嘏樂作叶韶韺之盛美善歸親宜晉鴻稱用崇燕喜精璆聨珏稽朝家隆重之儀嘉璽雕珍抒中外喁于之願謹告天地宗廟社稷率諸王貝勒文武羣臣恭奉册寶上徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺寧豫皇太后顒捧芝函虔申葵悃繹箕疇之來備是曰康寧演羲畫之利行寶惟豫順懿美式新夫蒼録蕃釐允迓夫琅編伏願道契安貞性彌愷樂闡昌符於金石寶琰恆新熙洪號於垓埏蘿圖益煥常來王而常來享共球同紀殷篇莫不興而莫不增川嶽長賡周雅臣誠歡誠忭稽首頓首謹言是日上御太和殿王公百官上表行慶賀禮頒詔天下詔曰朕懋膺景命寅紹丕基殫夙夜以勤求準仁義而並用惟期遐邇嚮化海宇乂安益臻熙洽之隆長享升平之福兹當殄靖蕃落掃蕩蠻氛定一勞永逸之模際偃武敷文之會鴻勳既集慶典宜申兩金川者錯居蜀徼久𨽻土司毒實等於虺蛇惡更甚於梟獍懷以德而不知感藏其姦而無所懲索諾木則貙又生羆僧格桑則蛩還附蟨始猶諒爭其蝸角尚無庸取彼鯨鯢乃敢違約以噬鄰浸至偝恩而拒命無可赦當正其罪不得已斯加以兵爰收鄂什之侵疆倒懸是解遂入美諾之深穴傳􅊾而平凶渠竟喙走以潛逋逆豎敢顔行之顯抗輒爾逞謀於射影公然徼􅓈於僨轅尤覆載之所不容誠神人之所共憤於是申命元戎俾專薄伐簡八旗之徑旅分兩道以徂征勇勵則所向無前算勝則有攻必克梯峻若從天而降履險或絶地以登賊衆每悉力以負嵎我軍屢出竒而扼隘殱厥徒醜非竄即誅摧乃卡碉靡堅弗破勒烏圍先翻其狡窟噶喇依旋搗其窮巢諸寨因次第翦除羣凶亦駢聨就縛是役也帑藏幾費七千餘萬閭閻未煩粒粟寸絲師武臣厯百戰之辛勤余一人經五年之籌畫仰賴昊蒼昭貺列祖洪庥事恆集於因難幸兹揚武功克底於可久願永洗兵入桃關而星弧載櫜謁橋山而露布適奏遂乃祗奉安輦言舉東巡禮岱宗而祝慈禧告闕里而宣鴻捷郊臺循勞還之典午門行受俘之儀紫閣酬庸第勳績而膺懋賞璇闈送喜歸美善以晉尊稱謹告天地宗廟社稷於乾隆四十一年五月初一日率王公文武羣臣恭奉册寶加上聖母崇慶慈宣康惠敦和裕夀純禧恭懿安祺皇太后徽號曰崇慶慈宣康惠敦和裕夀純禧恭懿安祺寧豫皇太后寧常受福符來偹於箕疇豫永延和叶利行於羲畫用光大禮特沛覃恩於戲帡鴻禧於六幕揚徽昭耆定之祥頒鳯詔於十行會極溥平康之治布告天下咸使聞知恭上皇太后尊號徽號儀凡國有大慶加晉崇稱制下禮部尚書一人赴內閣承制諏吉以聞乃遍布諸司供備豫期禮部工部官會製册寶於內務府既辦擇良辰恭鐫册文寶文是日所司豫設案於內閣政事堂中設册寶亭二香亭一於製造所門外內閣大學士禮部工部尚書侍郎咸朝服集政事堂祗俟至吉時工部司官奉册禮部司官奉寶設亭內鑾儀校舁行香亭在前次册亭前列御史二華蓋一禮部官屬前導至內閣門外亭止有司奉册寶恭設於案册東寶西退閣部大臣均行三跪九叩禮大學士一人奉册一人奉寶以授匠人鐫字於潔堂右諏日具册寶屆期前一日遣官各一人祗告天地太廟後殿奉先殿社稷如常儀右祗告是日內閣具奏書書詞隨時撰擬盛於函黎明鑾儀衛豫陳皇太后儀駕鹵簿於慈寧門外至長信門外內監陳中和韶樂於慈寧宫簷下陳丹陛大樂於長慶門內禮部鴻臚寺官豫設案一於慈寧門外又設案一於中和殿內均正中南向武備院卿豫設皇帝拜位於慈寧門案南北向大學士一人朝服奉奏書函中書舍人前導至中和殿階下導者止大學士以奏函入中和殿陳於案外其緘展書加函上退俟於東簷禮部尚書侍郎二人詣乾清門奏時遂前導駕皇帝禮服乘輿出宫內大臣侍衛前引後扈如常儀至中和殿北階降輿詣殿內案前北向閲奏書畢轉立東次西向大學士一人進納書函內恭奉由殿中門出禮部尚書侍郎導引前行皇帝乘輿從至永康左門外奉奏書大學士由中門入至慈寧門東階下導者止奉奏書大學士進陟中階近案前折旋就左門之東負序西面立皇帝降輿入左門禮部尚書侍郎恭導以下行禮皆恭導升慈寧宫東階循南牖西向立後扈內大臣從升凡行禮進退皆從立于後前引十大臣領侍衛內大臣豹尾班侍衛至東階下止立如三大節儀大學士一人由西階升就立西簷下宣讀官一人從升少後立均東面鴻臚寺鳴贊一人立于東楹西面一人立于西楹東面禮部尚書轉傳內監奏請皇太后御慈寧宫皇太后禮服出宫中和韶樂作樂章與三大節同升座樂止皇帝詣拜位北向立奉奏書大學士暨西簷大學士咸進至案前左右立鳴贊奏跪皇帝跪大學士跪進奏書于右興退皇帝受奏書恭獻大