  text: 職官考十一八旗駐防臣等謹按順治二年遣八旗官兵駐劄順徳濟南徳州臨清徐州潞安平陽蒲州等處此設駐防之始也厥後鎮守險要増派駐防特設將軍都統大臣専轄之職任綦重厯年更置増設員額不等今依現行經制而類次之將軍奉天吉林黒龍江山西綏逺城兼轄右衛江南江寧兼轄京口初京口江寧各一人乾隆二十二年裁併福建福州浙江杭州兼轄乍浦湖廣荆州陜西西安寧夏廣東廣州各一人都統烏嚕木齊一人察哈爾一人直𨽻天津一人副都統奉天三人吉林六人黒龍江三人山海闗熱河各一人察哈爾一人直𨽻天津一人山東青州一人山西歸化城一人右衛一人江寧二人京口一人福建福州二人浙江杭州一人乍浦一人湖廣荆州二人陜西西安二人寧夏二人凉州一人四川成都一人廣東廣州二人臣等謹按伊犁等處亦設有副都統因係新疆自為一門故此不載城守尉奉天八人黒龍江直𨽻保定滄州山東徳州山西太原河南甘肅荘浪各一人臣等謹按太原河南等處城守尉乾隆二十一年五月改歸巡撫節制管轄協領奉天十三人吉林十七人黒龍江十六人山海闗二人熱河六人直𨽻天津六人山東青州四人山西綏逺城十人右衛五人江寧八人京口二人福州九人杭州九人乍浦五人荆州十人西安十四人寧夏六人凉州二人成都六人廣州九人總管黒龍江十人察哈爾八旗各一人張家口一人㕘領吉林黒龍江各一人察哈爾八旗各一人西安八人副㕘領察哈爾八旗各一人總管黑龍江十人熱河圍塲一人察哈爾八人副總管黑龍江二十六人防守尉奉天三人昌平良鄉寳坻固安東安霸州雄縣采育里永平順義三河玉田古北口獨石口冷口喜峰口各一人佐領奉天一百三十人吉林一百十三人黑龍江二百四十八人察哈爾一百有九人山海闗八人熱河二十人直𨽻天津三十二人山東青州十六人山西綏逺城二十人右衛十人河南十人江寧三十二人京口十四人福州十八人杭州二十三人乍浦十一人荆州四十六人西安三十八人寧夏二十四人凉州六人四川十八人廣州十八人防禦奉天百有二人吉林六十三人黒龍江二十四人山海闗八人直𨽻保定四人天津三十二人滄州四人昌平良鄉寳坻固安東安霸州雄縣采育里永平順義三河玉田冷口喜峰口古北口獨石口千家店各二人張家口三人熱河二十人圍場八人山東青州十六人徳州四人山西太原四人綏逺城二十人右衛十人歸化城二人河南開封十人江寧四十人京口十六人福州十人杭州二十人乍浦八人荆州五十六人西安八十八人寧夏二十六人凉州八人荘浪四人成都二十四人廣州三十四人驍騎校奉天二百有六人吉林一百二十人黒龍江二百三十三人山海闗八人察哈爾八旗一百有五人直𨽻保定四人天津三十二人滄州四人昌平良鄉寳坻固安東安霸州雄縣采育里千家店順義各一人永平三河玉田羅文峪獨石口各二人張家口六人古北口喜峰口各四人冷口三人熱河二十人圍場八人山東青州十六人徳州四人山西太原四人綏逺城二十人右衛十人歸化城六十四人河南開封十人江寧四十人京口十六人福建福州二十二人浙江杭州三十二人乍浦十六人湖廣荆州五十六人陜西西安八十八人甘肅寧夏二十四人凉州八人莊浪四人四川成都二十四人廣東廣州三十八人䕶軍校黒龍江二人察哈爾一百有七人前鋒校山西歸化城二十人管水手官吉林六人黒龍江十三人京營臣等謹按八旗禁旅已詳載九門提督下舊設中南北三營管轄緑旗官軍原屬督捕衙門兼理康熙三十年改歸九門提督統轄復於三營中分撥兵弁巡防禁苑等處乾隆四十六年七月將巡捕三營添改五營設二十三汛茲據新改經制序列於左提督九門步軍統領所屬中營副將一人遊擊一人圓明園汛副將兼管中軍都司一人千總二人把總四人外委六人暢春園汛守備一人千總二人把總四人外委六人樹村汛守備一人千總二人把總四人外委六人静宜園汛守備一人千總二人把總四人外委六人樂善園汛守備一人千總二人把總四人外委六人南營㕘將一人遊擊一人西珠市口汛都司一人千總二人把總四人外委六人㕘將中軍守備兼管東珠市口汛一人千總二人把總四人外委六人東河沿汛守備一人千總二人把總四人外委六人西河沿汛守備一人千總二人把總四人外委六人花兒市汛守備一人千總二人把總四人外委六人菜市口汛守備一人千總二人把總四人外委六人北營㕘將一人遊擊一人徳勝汛都司一人千總二人把總四人外委六人㕘將中軍守備兼管安定汛一人千總二人把總四人外委六人東直汛守備一人千總二人把總四人外委六人朝陽汛守備一人千總二人把總四人外委六人左營㕘將一人遊擊一人左安汛都司一人千總二人把總四人外委六人㕘將中軍守備兼管河陽汛一人千總二人把總四人外委六人東便汛守備一人千總二人把總四人外委六人廣渠汛守備一人千總二人把總四人外委六人右營㕘將一人遊擊一人永定汛都司一人千總二人把總四人外委六人㕘將中軍守備兼管阜城汛一人千總二人把總四人外委六人西便汛守備一人千總二人把總四人外委六人廣寧汛守備一人千總二人把總四人外委六人臣等謹按舊中營海子墻守備等員今更改營汛裁汰直省提鎮臣等謹按緑旗兵陣列之法訓練之方詳載兵考茲謹詳載官爵職守次第直省督撫司一省之軍政所轄標員悉彚載以昭體制河標之司汛工統於總河漕運之司趲運統於總漕所轄副將員弁悉從武職編次直省駐防將軍都統所轄協領以下係旗員載八旗駐防中副將以下係漢缺亦