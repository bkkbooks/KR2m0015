body:
  text: 欽定四庫全書皇朝文獻通考卷一百四十八王禮考二十四國恤臣等謹案典禮孝莊文皇后自世祖章皇帝時正位慈寧聖祖仁皇帝踐阼尊號太皇太后奉事二十餘年孝思純篤太皇太后違豫聖祖仁皇帝親侍左右衣不解帶者一月有餘禱于南郊親製祝文願減已算以增慈夀及遇大事哀毁盡禮欲持服二十七月中外臣民陳奏再三始允所請而釋服以後御偏殿衣布素如故洵所謂終身之慕也㑹典列為太皇太后喪儀今遵其例康熙二十六年十二月己巳太皇太后崩奉安梓宫於宫中正殿臣等謹按是時禮部奏言本朝后喪俱不割辮且太皇太后不豫時曾向皇太后諭云我病若不起皇帝斷勿割辮應謹遵行得㫖太皇太后教育恩深朕自盡其心仍行割辮又諭禮部云朕孝服用布舊制國有大喪自宗室公以上服素帛今孝服俱改用布聖孝誠篤有加於常禮如此庚午諸王大臣合詞奏請節哀不允是時上在大行太皇太后梓宫前晝夜號痛不止水漿不入口天顔癯瘠諸王貝勒貝子公等皆跪奏請節哀得㫖親在則竭心盡力以盡孝親歿則思報教育之恩終身不忘為子孫者誼所當然太皇太后髙厚之恩可一刻忘乎諭畢復大慟不已次日內閣翰林院九卿詹事科道等齊集慈寧宫門奏請節哀得㫖朕忽遭大故五中憒迷非不知恪遵遺誥守身為重勉自抑哀强進飲食但悲從中來情實痛切莫由自主以至昏迷即欲少餐饘粥亦不能下咽非故却不御覽奏具見誠悃朕當强支自愛卿等無須過慮二十七年正月乙亥朔聖祖仁皇帝暫駐慈寧宫前院幕次令王以下輟哭一日先是諸王大臣等奏元旦乃吉祥之日今聖躬不離喪次臣等甚為不安請于除夕回宫停止哭泣得㫖數日以來朕心甚覺憒迷今據爾等所奏稍有關係元旦日太皇太后梓宫前令宫人照常上食慈寧宫前院內諸皇子所住幕次朕當于此暫居一日諸王大臣等復再三叩請諭曰人主宫殿原多可以因時駐蹕若在庶民遭此大故所居止於一室又遷避何所回宫斷不可行諸王大臣等復叩首奏曰臣等焉敢求皇上回宫休息但以元旦乃嵗首之辰扃閉乾清宫所係甚大得㫖朕不幸當此大故設太皇太后之變恰遇於二十九三十日將若之何亦惟有聚集此處豈可他避也爾等再三奏勸止於元旦暫移少忍哀慟是亦從爾等之請矣諸臣敦請再四終不允是日聖駕暫移前院幕次次日仍居喪次慟如初乙酉奉移大行太皇太后梓宫暫安於朝陽門外殯宫先是欽天監擇二十六年十二月二十九日發引聖祖仁皇帝令别擇吉日諸臣言舊制喪事不令踰年上曰爾等念朕躬勞苦朕豈不自知但二十九日發引為期太近兩皇后梓宫尚遲至多日若以太皇太后梓宫拘舊例謂踰年不便速行發引於大義不合舊例有可從者有不可從者朕意在正月十七十八日方可發引著另行選期具奏諸王大臣等又奏曰本朝向行之例踰年為忌似宜仍請於二十九日發引得㫖爾等所云忌諱祗為朕躬朕殊不避忌朕前禱天壇尚欲減朕年以增太皇太后之夀豈以梓宫踰年發引乃有避忌乎如有所忌朕躬當之否則忌諱之說虛誕不足信亦可以破後人之疑使皆以朕為法乃改期於正月十一日發引上居大行太皇太后殯宫旁倚廬不還宫三日始設褥戊子諸王大臣屢請還宫聖駕乃還幕居於乾清門外之左諸王大臣百官懇請回宫調攝諭曰朕遭太皇太后崩逝欲持服二十七月立意甚堅諸王大臣及百官士民再三陳奏情辭懇切不得已勉從所請中心歉仄因幕居乾清門外今乃又請回宫不過以朕躬為念身為天子豈不自愛但人孰無祖父母父母為子孫者皆當盡孝何分貴賤朕孝治天下思以表率臣民垂則後裔今距釋服之期為時甚近若從所言以致異日稍留遺憾恐非諸臣愛君之意卿等其仰體朕心勿復言乙未行大祭禮釋服先是二十六年十二月諭諸王貝勒貝子公內大臣大學士九卿詹事科道等自漢以來帝王居喪持服以二十七月易為二十七日惟魏孝文帝欲行三年之喪朕平日讀史至此常稱贊之今非欲邁古賢君祗念朕八歲世祖皇帝賔天十一歲慈和皇太后崩逝全賴聖祖母太皇太后鞠養教誨以至成立遽遭大故實增痛傷哀疚靡盡今定持服二十七月少慰罔極之痛朕獨持於宫中幾政毫無曠廢不令臣民持服一切俱不禁止如此可以遂朕本懷諸王大臣等合詞奏稱帝王之孝與臣民不同願以禮節哀易月之典守而勿更得㫖朕事太皇太后三十餘年竭盡哀誠無稍違拂近者聖體違豫三十餘日衣不解帶必誠必敬朕之此志期在必遂否則貴為天子富有四海亦奚以為諸王大臣等聞諭皆感悚嗚咽復奏言祭為吉禮必除服後舉行若使郊廟神靈少有弗歆即太皇太后在天之靈亦必不安且君臣兆姓本屬一體若皇上持服宫中聽臣民即吉甚非一體之義况皇上奉侍慈寧三十餘年晨昏侍養罔不承順意㫖今於慈闈遺命若不曲遵恐有虛太皇太后惓惓之意臣等不揣愚賤敢以固請得㫖朕意已定不必更奏於是王公羣臣公疏跪奏於慈寧門不聽諸王大臣往復數次固請聖意益堅內閣九卿翰林詹事科道或公疏或特奏力陳不可國子監官率太學生五百餘人伏闕上書諸王大臣復免冠叩首固請乃諭曰朕以薄祜幼失怙恃幸依聖祖母膝下如見皇考妣音容今遭遐棄痛念慈恩悲哀并集欲持服二十七月仰答聖祖母鞠育深仁兼報皇考妣劬勞大德諸王大臣及各官等援引厯代成例堅請再三並稱郊廟祀典不宜久輟升祔大禮及時舉行且士民赴闕披瀝衆情謂國恤淹久有妨民業朕反覆思維不得已以禮抑情勉從衆請該部知道己酉奉移太皇太后梓宫於暫安奉殿奉移後禮並載山陵門後條俱仿此十月乙卯恭上大行太皇太后尊諡曰孝莊仁宣誠憲恭懿翊天啓聖文皇后聖祖仁皇帝親詣暫安奉殿行禮臣等謹按我朝典禮孝端文皇后孝康章皇后孝惠章皇后孝恭仁皇后大事皆在尊稱皇太后之後㑹典另為一門載於皇后喪儀之前今遵其例謹將孝聖憲皇后喪儀詳悉記載以垂萬世之大典焉順治六年四月乙巳孝端文皇后崩奉安梓宫於宫中正殿七月二月丁亥恭上大行皇太后尊諡曰孝端正敬仁懿莊敏輔天協聖文皇后戊子奉移孝端文皇后梓宫於昭陵康熙二年二月庚戍慈和皇太后崩次日恭奉梓宫於宫中正殿庚申奉移梓宫於壩上饗殿五月甲午恭上慈和皇太后尊諡曰孝康慈和莊懿恭惠崇天育聖章皇后乙未奉移孝康章皇后梓宫於孝陵五十六年十二月丙戌仁憲皇太后崩恭奉梓宫於寧夀宫正殿丁酉奉移梓宫於朝陽門外殯宫五十七年正月辛酉恭上仁憲皇太后尊諡曰孝惠仁憲端懿純德順天翊聖章皇后壬申奉移孝惠章皇后梓宫於山陵雍正元年五月辛丑仁夀皇太后崩恭奉梓宫於寧夀宫正殿甲辰恭移梓宫奉安於夀皇殿八月己未恭上仁夀皇太后尊諡曰孝恭宣惠溫肅定裕贊天承聖仁皇后乙丑奉移孝恭仁皇后梓宫於景陵三年八月丙戌孝恭仁皇后三年服闋世宗憲皇帝詣奉先殿祭告行釋服禮先是五月聖祖仁皇帝服闋世宗憲皇帝以孝恭仁皇后服制未滿仍齊居養心殿素服涖事總理事務王大臣等奏請遵制舉行吉禮得㫖國家大禮皇考皇妣雖有輕重之别而朕之私衷則不容分視外邊吉禮今照國家典制舉行已有諭㫖朕於宫中務期獨盡人子之禮况今二十七月並非勉强從事沽取孝名以為觀美祗求朕心之安耳禮盡則朕心自安朕意已定諸王大臣毋得再奏七月內閣九卿詹事科道議奏八月二十三日為孝恭仁皇后服闋之辰應照前聖祖仁皇帝服闋典禮擇日行祫祭禮并行令順天府尹及直省各督撫出示曉諭以慰輿情奉㫖朕疊遭皇考皇妣大事追念罔極恩深莫由仰報三年以來祗於宫禁之中齊居素服默盡思慕哀戚之忱非敢自謂遵循古禮更不欲宣播於衆也父母之喪人子之心則一而帝后之禮國家之制則殊今屆皇妣孝恭仁皇后釋服之期擇日於奉先殿祭告自行家禮至於頒諭中外著不必行及是日祭畢聖駕回宫諸王大臣齊集乾清門世宗憲皇帝召諸臣入諭曰父母之恩鞠育顧復為人子者終身仰報不盡而朕荷皇考皇妣之恩尤為至深至厚誠所謂欲報之德昊天罔極也三年之中如祭祀朝㑹國家大禮不可曠缺朕亦照例舉行不過於宫中持服默盡其心究未能盡此心於萬一也日月易邁已屆三載禮制有定而朕心無窮此一件素衣朕衣著三年今日更換不勝悽愴朕之一念豈但三年固結於中即終身之久斷不能忘也諭畢天顔慘戚諸王大臣仰見聖孝誠篤莫不感動涕零乾隆四十二年正月庚寅皇太后崩奉安梓宫於慈寧宫上哀慟號呼劈踊無數摘冠纓易素服哀搶倍至上至含青齊苫次王公大臣懇請還宫上不允是日諭曰朕䝉聖母皇太后鞠育恩慈情深罔極臨御四十二年承歡奉養深荷慈愈且見聖母動履康强不煩扶掖私心慶慰第夀日益髙萬年豈真可祝欣喜之餘并不敢存孔子一則以懼之想惟有誠祈天佑益算延祺而朕愛日之悃忱實無能一刻稍置今春恭奉皇太后幸御園初九日於九州清晏侍膳觀燈五世一堂同伸歡忭是日慈顔康豫不減常年朕方慶幸以望七之齡得侍望九聖母實從來史册所未有及十一日進宫齊戒十四日祈穀禮成回御園請安知聖母偶爾違和旋進參藥調治體亦稍安不意疾尋反復聖母猶不欲令朕知慈躬病劇恐朕憂煩然勢日以增急難平復朕兩次詣寢宫問安聖母言笑如常惟氣力稍覺疲倦諭朕云頤養數日可即就痊朕亦冀可克副慈諭詎意將及夜分痰忽上湧遂至大漸遽於二十三日丑時仙馭升遐奄棄朕躬一何迅速昨日未時請安以後竟無由再仰懿顔呼天搶地痛何能極至於孝服日期皇太后遺誥令朕穿孝二十七日然追憶雍正十三年遭皇考大故朕欲持服三年因奉聖母慈諭止令穿孝百日朕即遵從今值皇太后之事朕仍當依前諭穿孝百日其餘王公大臣官員等並照例二十七日而除辛卯諭曰朕自登極以來即尊養皇太后於暢春園迄今四十二年視膳問安承歡介景所以奉懿娛而盡愛敬為時最久今奄遭大故遵例於慈寧宫辦理喪儀痛深罔極因念奉安梓宫於陵寢地宫􅓪吉鳩工尚需時日稽諸舊典理宜殯宫移奉以展哀誠與其另擇暫安奉殿自不若暢春園為皇太后頤和娛志之地神御所安最為妥適業於九經三事殿易蓋黃瓦敬設几筵謹涓本月二十九日舉行奉移禮所有應行事宜各該衙門即速敬謹豫備是日王公大臣奏竊惟皇太后慈馭上賓我皇上孝思罔極呼號劈踊盡禮盡哀第朝夕居於苫次聖夀已髙恐或稍失調攝未免毁瘠過甚非所以仰答皇太后平素慈愛之忱即臣等意實難安况妃嬪主位等均在慈寧宫居住日夜不離聖母几筵承侍左右聖心亦可稍釋臣等不揣冒昧仰懇皇上少節哀情暫請還居養心殿稍加調攝以副天地祖宗眷顧之重以慰皇太后在天之靈臣等無任哀悚待命之至奉諭曰知道了朕心不忍移居且過明日再定又奏竊臣等於本日奏請皇上稍節哀情暫請還居養心殿奉㫖知道了朕心不忍移居且過明日再定欽此仰見皇上孝思肫篤追慕無窮臣等何敢復行瀆請但恭閲實録世宗憲皇帝居仁夀皇太后喪次因念宗廟社稷之重恐失調攝曽在宫內居喪齊宿况慈寧宫內素為閒空而今日天氣甚寒皇上因哀毁深至偶患頭痛若再居喪次非所以仰體皇太后在天慈愛之心且妃嬪主位均在慈寧宫奉侍皇太后几筵則皇上暫還養心殿既可以略資調養而每日駕至慈寧宫奠醊亦足以伸不匱之孝思臣等謹再行瀝誠合詞具奏仰懇皇上即於今日暫還養心殿實不勝哀切待命之至又奉諭曰朕猝遭聖母大故哀慟方深不忍移居宫內今王公大臣等援据典禮再三懇籲勉從所請於今日午奠後暫居養心殿壬辰上詣大行皇太后梓宫前行殷奠禮悲傷號泣哀慟不止是日諭曰朕於本月二十九日敬移皇太后梓宫於九經三事殿安奉朕即在暢春園之無逸齊居住以便朝夕侍奠几筵用伸哀悃又奉諭曰雍正十三年皇考龍馭上賓朕欲持服三年羣臣請循以日易月之制朕皆未允嗣奉聖母慈諭令朕持服百日因即遵行然百日釋服後仍素服滿二十七月今遭聖母大故自應仍遵懿㫖持服百日昨已明降諭㫖矣其素服二十七月亦照前例惟遇壇廟大祀行禮及致齊三日閲視祝版先期詣壇並視朝聽政諸事朕從前惟凖理而行並未載在㑹典此時當詳議及之又如王公大臣官員持服二十七日而除素服則滿百日至百日後用何服色及陪祀齊戒常朝坐班並一切典禮應如何定制亦當酌定章程頃檢閲雍正十三年王大臣等條欵頗為該括著將原摺交軍機大臣㑹同辦理喪儀王大臣等悉心詳議具奏癸巳上詣大行皇太后梓宫前行朝奠禮悲傷號泣哀慟不止是日王公大臣奏查滿洲向例奉移之日即回原處居住伏思圓明園係世宗憲皇帝皇上久居之處與宫中無異仰懇於敬移禮成後即回圓明園居住奉諭曰朕本意俟皇太后梓宫於九經三事殿奉安禮成即在暢春園之無逸齊居住以伸哀悃兹據王公大臣等合詞具奏滿洲舊例奉移之日應回原處居住且稱圓明園係皇考及朕久居之處即與宫中無異請於是日即回圓明園等語既舊例如此著照所請於二十九日奉安皇太后梓宫禮成仍回圓明園居住至朕遭聖母大故理應於皇祖皇考前告哀但夀皇殿在城內二十九日步送梓宫後自揣實不能再行禮且應即往暢春園恭候奉迎因思安佑宫係皇祖皇考神御所在與夀皇殿相同擬於二月初一日躬詣祗告初二日仍至暢春園之無逸齊設苫次居住以伸哀戀乙未王公大臣奏請皇上於初二日詣九經三事殿申奠後仍回圓明園居住聖躬可稍資調攝亦足以慰聖母在天之靈且與滿洲向例相合奉諭曰皇太后梓宫於二十九日安奉九經三事殿朕於初二日恭詣几筵申奠後即在暢春園之無逸齊居住於心始得稍安王公大臣所請不准丙申奉移大行皇太后梓宫上自隆宗門至慈寧門降輿入詣梓宫前奠酒呼搶劈踊痛哭盡哀左右皆哀泣不忍仰視梓宫啓行出永康左門升大輿上西向跪哭攀掖步送王公大臣等再四叩懇准於第二次舁夫換班時先赴暢春園宫門外祗候午刻梓宫至上跪迎奉安於九經三事殿號泣良久奠酒禮畢上駐圓明園二月丁酉上詣安佑宫聖祖仁皇帝世宗憲皇帝神御前行告哀禮是日上居無逸齊苫次戊戌王公大臣等奏無逸齊屋院無多且俱淺窄前後又無寢室止有小殿數楹暫時駐蹕尚覺非宜辦事久居實為不便在皇上誠孝肫篤盡禮盡哀苫凷之中固不肯自求安適而臣等實因聖夀已髙寢興寒燠不可不加意調護以副天地祖宗眷顧之重今初二日已在無逸齊居住聖心亦可稍安若長此倚廬倘起居略有失調實非所以仰體皇太后平素慈愛之意臣等愚昧倣徨倍增憂懼為此瀝誠合詞再請仰懇皇上於初三日朝奠行禮後仍回圓明園居住几筵甚近聖駕常詣奠獻仍足以伸哀慕而展孝思與在無逸齊無異伏惟慈鑒奉諭曰王公大臣等屢勸朕仰體皇太后聖心善為調攝朕不得不勉從所請於初三日朝奠後仍回圓明園甲辰諭曰軍機大臣等查奏二十七月內御殿視朝儀注查乾隆元年元旦已過百日後奉聖母皇太后懿㫖以御極之初應受百官朝賀且朕應恭詣皇太后宫行禮是以升殿受賀至此後二十七月內均未經舉行兹乾隆四十三年四十四年元旦非元年可比又尚在二十七月內所有升殿受賀之處不必行至尋常御殿視朝恭查皇考世宗憲皇帝時曽於二十七月內舉行數次蓋尋常升殿與御門聽政無異若隔至二十七月之久於體制似有未協自應遵照舉行所有百日後升殿之處著該衙門屆期奏請候朕降㫖三月壬午恭上大行皇太后尊諡曰孝聖慈宣康惠敦和敬天光聖憲皇后上親詣九經三事殿行禮先是正月辛卯諭曰大行皇太后坤元協德懋著徽音四十二年母儀天下尊養兼隆福德備至實古今史册所未有今忽遭仙馭升遐朕心哀痛不能稍釋敬稽典禮宜隆諡號以表尊崇第至德難名實非臣下擬議所能切當朕欲親尊為孝聖憲皇后其令大學士九卿公議可否如是及所有節次晉加徽號其中或有按例應行酌減及應增加字樣仍著敬謹詳議具奏尋復奏臣等謹查孝莊文皇后徽號二十字孝惠章皇后徽號十字於恭上尊諡時俱敬列十二字今大行皇太后徽號係十八字臣等遵㫖詳議於徽號擬用六字又照例增加四字恭上尊諡曰孝聖慈宣康惠敦和敬天光聖憲皇后以符禮制謹合詞具奏伏候欽定奉㫖是依議四月戊申奉移孝聖憲皇后梓宫於泰東陵四十四年四月癸酉孝聖憲皇后三年服闋皇上詣泰東陵行釋服大祭禮列后喪儀初崩恭受遺誥命王大臣恭理喪儀皇帝成服截髮辮諸王之為子者皆成服截髮辮皇子皇孫隨成服皇后成服剪髮諸王福晉為子婦者皆成服剪髮妃嬪暨皇子皇孫福晉皆成服王公百官宗室覺羅及內務府所屬官員皆給白布制服公主福晉以下二品命婦以上及內務府所屬婦女給布制服如之皇帝居翼室喪服二十七日上諭用藍筆二十七日外易素服御門聽政詣几筵前仍喪服二十七月而除皇后服如之皇子皇孫及治喪儀王大臣殯宫守衛執事官員百日除服羣臣二十七日除服皆素服百日不剃髮奏疏文移用藍印十有五日內外各官百日不作樂不嫁娶餘儀與列聖初崩同右初崩制服其日殮奠所司於奉安梓宫殿內正中施黃幔左右素帷內鑾儀校陳儀駕于宫門外諸執事皆辦皇帝立殿檐東西向哭皇子皇孫立丹陛西皇后率妃嬪公主及在內福晉立几筵殿內王公以下文武二品官以上立宫門外三品以下官立外門之外王公福晉夫人郡主以下二品命婦以上立宫門內丹墀西三品以下命婦立宫門外之西皆傳哭內務府總管命婦率尚茶女官奉茶尚膳女官奉膳由中門入皇帝詣几筵前跪衆皆跪尚茶女官跪進茶內監奉茶轉進皇帝舉茶奠于案行一拜禮衆皆隨行禮尚茶女官徹茶尚膳女官進膳揭巾幕皇帝視上食畢執事官進奠几于正中皇帝詣几前跪奉爵王大臣跪進爵皇帝祭酒三爵每祭一拜衆隨叩興乃徹饌哭止皇帝還翼室衆各退嗣是朝晡日中三奠朝晡進羮飯肴饌日中進果筵餘儀均與列聖殮奠同右殮奠朝晡日中奠越日禮部尚書侍郎一人率祠祭司官詣內閣祗領遺誥恭鐫謄黃頒于直省遣使齎諭朝鮮國王理藩院遣官分路往諭外藩䝉古均如頒遺詔儀誥下之日順天府府尹率屬制服跪迎奉安于公署直省文武官率屬素服郊迎入公廨奉安畢易制服均朝夕哭臨三日二十七日釋服百日內不剃髮不作樂不嫁娶京師暨直省軍民男摘冠纓女去首飾素服七日二十七日不作樂不嫁娶朝鮮國王遣陪臣上表進香其使臣在京者給白布制服外藩䝉古王台吉公主福晉等至京行叩謁禮在二十七日以內皆制服後二十七日至者男去冠纓女去首飾各三日右頒遺誥諏日殷奠工部設祭文案于殿檐下之東內鑾儀校陳儀駕宫殿監侍導恭理喪儀王大臣內務府總管率執事官入陳饌筵羊酒畢仍導以出內務府總管命婦率內管領妻奉冠服篚後奉篚均仿此豫設于供牀皇帝詣几筵前哭內外齊集者傳哭奠茶上食讀文三祭酒衆隨行禮徹奠皇帝避立于左祭文送至燎所首領內監接奉內務府命婦內管領妻奉冠服篚出皇帝跪候過興從行公主及在內福晉咸出隨行王公百官皆退避齊集之福晉命婦各于其位跪候過興隨行皇帝至燎所跪衆咸跪皇帝祭酒三爵每祭行一拜禮衆隨拜興畢哭止餘儀與列聖殷奠同右殷奠啓殿如殷奠儀奉移殯宫初祭大祭月祭以上禮儀均如列聖喪儀諏日恭上尊諡廟號先期內閣進擬尊諡進呈欽定恭上尊諡禮成翼日頒詔布告天下儀與恭上列聖尊諡同右上尊諡百日祭時薦朞年小祥再朞大祥終喪除服以上禮儀均如列聖喪儀皇朝文獻通考卷一百四十八
