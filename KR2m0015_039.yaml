body:
  text: 欽定四庫全書皇朝文獻通考卷三十九國用考一臣等謹按經國之用博矣而足用之要術有三焉曰生之有道取之有制用之有禮而已本朝自開國以來崇本抑末敦實去華無徴發期會以病農無竒技淫巧以病工無加征重稅以病商賈即偶有征伐而民不餉間遇水旱而民不飢省方問俗清蹕經臨頓宿供帳絲粟不擾用是民得寬其手足盡力生産田無曠土市無間㕓衣食既裕輸將亦輕所謂本富為上者此也則生之為道得矣臣恭讀實録崇德三年太宗文皇帝諭曰朕蒙天垂佑各國臣服財用饒裕當此之際我國新舊人等若不急加恩養更於何時養之大哉聖謨此真天地父母之心肇開鴻業之本也嗣是纍朝繼述彌迪前光求所以惠我民者惟恐不及世祖章皇帝甫定中原凡故明加派以及荒闕諸賦亦既除洗無餘矣聖祖仁皇帝御極之五十二年詔天下丁賦據五十年丁册為額永不加增世宗憲皇帝念江南之蘇松浙江之嘉湖賦額較重清釐減免我皇上善繼善述先後蠲除共六十餘萬兩乃若際左藏之充盈嘉民生之悅豫暢兹偕樂益茂隆施則若康熙三十年五十年雍正八年乾隆之十有一年三十一年三十五年四十三年賜復蠲租普周四海他如恭遇國家慶典鑾輅時巡隨地隨時除逋免賦古之所稱為曠典者今直以常例循之故沐浴膏澤帝力幾忘歌衢擊壤之風豈獨堯民為然歟至於小遇災傷蠲賑並舉痌瘝飢溺列聖一心我皇上念切民依發帑動輒數千百萬此皆耳目所親見婦孺所能言者至於宫府之內服御之具莫不躬行儉德用率臣民聖聖相承訓謨具在不吝於用而又不輕於用如此蓋惟生之有道取之有制而又用之以禮宜乎財用足而藏富於民久逺無弊也按馬端臨考惟漕運賑恤蠲貸各為一門餘均以厯代國用統之未為明晰臣等恭循昭代典則分列九門首節用次庫藏次賦額次用額次會計由兹五者而制用之道備矣於是舉其用之大者則又有俸餉漕運蠲貸賑恤謹述其制以次類敘良法美意燦然秩然以視周官九用之式不啻彼列其綱此詳其目焉易曰節以制度不傷財不害民此之謂也然則若漢之均輸唐之租庸區區小補之術皆無足比數者矣節用崇德元年諭羣臣曰國家崇尚節儉毋事浮華凡鞍轡等物不許以金為飾雖家不少藏金止許造盤盂七箸蓋此等之類或至匱乏尚可毁為他用若以之塗飾則零星耗折豈能復取而用之今後著永行禁止至於陳獲縀帛用之亦當節儉勿以獲取之易奢費無度而忘其紡織之勞也順治八年諭各處織造所以供朝廷御服賞賚之用勢不可廢但江寧蘇州杭州已有專設官員又差滿洲官并烏林人役督催不但往來糜費抑且騷擾驛遞朕心深為不忍嗣後著停止差催陜西織造絨褐粧蟒殊屬無謂至買辦皮張之處亦屬煩擾著一併停止時江西進額造龍碗得旨朕方思節用與民休息燒造龍碗自江西解京動用人夫苦纍驛遞以後永行停止十一年諭工部江寧蘇杭等處地方連年水旱小民困苦已極議賑則勢難周屢蠲又恐國用不足朕用是惻然於中念織造衙門原供御服賞賚之用前此未能俱罷近聞甚為民纍夫民既苦賦稅又苦織役何由得安民既不安朕豈忍被服美麗不為之所乎嗣後織造除祝帛誥敕等項著巡撫布政織解外其餘暫停二年爾部即行傳諭康熙二十九年大學士等奏曰前者皇上以前宫殿樓亭門名開載一摺并慈寧宫寧夀宫乾清宫及老媪數目摺子發出令臣等觀看並鈔録存貯衙門又奉諭旨朕以天旱𣣔省減宫人及所用器物詳加查察因自來未嘗有餘故不能再減爾等將故明宫中所用銀兩及金花鋪墊銀兩數目亦為察閲臣等查故明宫內每年用金花銀共九十六萬九千四百餘兩今悉已充餉又查故明光祿寺每年送內所用各項錢糧二十四萬餘兩今每年止用三萬餘兩每年木柴二千六百八十六萬餘斤今止用六七百萬斤每年用紅螺等炭共一千二百八萬餘斤今止用百萬餘斤各官牀帳輿轎花毯等項每年共用銀二萬八千二百餘兩今俱不用又查故明宫殿樓亭門名共七百八十六座今以本朝宫殿數目較之不及前明十分之三至故明各宫殿九層基址墻垣俱用臨清甎木料俱用楠木今禁中修造房屋出於斷不可已非但基址未嘗用臨清甎凡一切墻垣俱用尋常甎料所用木植亦惟松木而已臣等以所查各條并皇上發下摺子令九卿詹事科道官員遍觀諸臣皆曰我皇上百凡撙節儉約臣等向所共知但未能詳悉令觀事事減省至矣極矣四十五年諭戶部國家錢糧理當節省否則必致經費不敷每年有正額蠲免有河工費用必能大加節省方有禆益前光祿寺一年用銀一百萬兩今止用十萬兩工部一年用二百萬兩今止用二三十萬兩必如此然後可謂之節省也四十九年諭大學士曰明季事迹卿等所知往往皆紙上陳言萬厯以後所用內監有在御前服役者故朕知之獨詳明朝費用甚奢興作亦廣一日之費可抵今一年之用其宫中脂粉錢四十萬兩供應銀數百萬兩至世祖皇帝登極始悉除之紫禁城內砌地甎橫竪九層一切工作俱派民間今則器用朴素工作皆現錢雇覓明季宫女至九千人內監至十萬人飯食不能遍及日有餓死者今則宫中不過四五百人而已明季宫中用馬口柴紅螺炭以數千萬斤計俱取諸昌平等州縣今此柴僅天壇焚燎用之爾等亦知所謂馬口柴乎大學士等奏曰不但不知亦所未聞上曰其柴約長三四尺淨白無點黑兩端刻兩口故謂馬口柴又明季所行多迂濶可笑建極殿後階石厚數丈方整一塊其費不資採買搬運至京不能舁入午門運石太監參奏此石不肯入午門乃命將石捆打六十御棍崇禎嘗學乘馬兩人執轡兩人奉鐙兩人扶鞦甫乘輒已墜馬乃責馬四十發苦驛當差馬猶有知識石何所知如此舉動豈不發噱總由生於深宫長於阿保之手不知人情物理故也雍正四年戶部奏言恩詔內賞各直省七十以上至百嵗以上老民老婦共百四十二萬一千六百二十五名上諭曰此皆由我皇考聖祖皇帝六十餘年深仁厚澤休養生息所以期頥耄耋之人至數百餘萬之多但生齒日盛食指繁多則謀生之計不可不講爾等百姓當重農桑以順天時勤開墾以盡地利務本業以戒遊惰謹蓋藏以裕久逺而且節省日用愛惜物力毋縱奢侈毋競紛華毋任意糜費以耗有用之財毋但顧目前而忘經久之計朕以勤儉先天下宫禁之中於食餘之物皆不忍棄必令人檢取收貯之數年以來所貯米粟已至數十石之多朕臨御萬方尚多方撙節愛養以為加惠元元之本爾等小民安可縱口腹之所𣣔而忘物力之艱難乎爾等誠能體朕諄諄訓諭之意敦善行則心體安務本計則俯仰足惜財用則家室裕人心和樂風俗淳美同為夀考之人長享升平之福豈非朕之所厚望哉著該部將朕此旨轉發直省督撫通行所屬郡邑鄉村咸使聞知五年諭管理旗務諸王滿洲文武大臣等自古人生以節儉為本蓋節儉則不至于困窮糜費則必至於凍餒此理所必然者也本朝滿洲素性淳朴凡遇出兵行圍俱係自備並無違誤而生計各足近來滿洲等不善謀生惟恃錢糧度日不知節儉妄事奢靡朕屢曾降旨諄諄訓諭但兵丁等相染成風仍未改其糜費之習多有以口腹之故而鬻賣房産者即如每飯必欲食肉將一月所得錢糧不過多食肉數次即罄盡矣又將每季米石不思存貯備用違背禁令以賤價盡行糶賣沽酒市肉恣用無餘以致闔家匱乏凍餒交迫尚自誇張謂我從前曾食美物服鮮衣並不悔悟所以致此困窮者乃以美食鮮衣之故也今漢人謀生尚知節儉殷實之家每日肉食者甚少其貧乏之人孳孳謀食僅堪糊口若滿洲等果能節儉將每月所得錢糧少使留餘則日久習成生計自裕産業可立矣或有不肖之輩不守本分妄行糜費既至貧乏惟希恩賞從前皇考軫念兵丁效力行間致有債負曾發帑金五百四十一萬五千餘兩一家獲賞俱至數百如此厚賚未聞兵丁等置有産業生計滋益者悉由妄用於衣食徒令貿易之人得利一二年間蕩然無餘心愈奢侈而生計較前更加窘乏其後又發帑金六百五十五萬四千餘兩賞賜兵丁人等亦如從前立時費盡朕自即位以來除特行賞賜外賞給兵丁一月錢糧者數次每次所賞需銀三十五六萬兩此銀一入兵丁之手亦不過妄用於飲食不及十日悉為烏有亦何禆益且庫帑俱係國家之正項天下百姓之膏脂豈可無故濫行賞賚以纍百萬之帑項徒供伊等數日口腹之費乎若不將惡習改除朕即有施恩之意亦不可舉行兵丁等果將朕訓諭之意曉然明晰實心遵行痛改妄行糜費之習朕加恩賞賜衆亦可得永逺均沾至生計各遂之時始知朕所以愛養滿洲之恩為至深且切也王大臣等亦宜各從儉約以為下人之表率行之既久自可挽此惡習滿洲乃國家根本朕知之既深豈有不教之理朕自即位以來衆人有論朕為太嚴者由朕𣣔衆人痛改惡習進於善良恐其奢靡使知儉約凡朕意慮所及之處悉申禁令而不肖匪類不得肆行其意或妄加議論如朕曾有禁酗酒禁止賭博赴園館鬬雞及䳺鶉蟋蟀雇人當差放印子銀兩典錢糧米石用黃銅器皿等諭旨悉為兵丁等身家計也如此訓誨不已衆人咸應體朕苦衷且此等訓誡咸係皇考從前禁止之事並非創始於朕但當時之臣工未能實意奉行是以一應惡習未得盡改今王大臣官員內仰體朕旨加意奉行者不過十居其五大半未愜朕懷而無知之人遂論以為過嚴如欲使若輩稱為寬仁之主何難之有但不知約束任其種種糜費則不但坐視滿洲等漸流至於不得衣食毫無顔面即以國家全力養贍伊等亦且不能給足朕意實有所不忍勢亦必不可也爾等其仰副朕意各將所屬官兵及間散人等剖析情理不時詳加訓誡是年又諭前織造等衙門貢獻物件其所進御用繡線龍袍曾至九件之多又見燈幃之上有加以綵繡為飾者朕心實為不悅比即切加戒諭近因端陽佳節外間所進香囊宫扇等件中有粧飾華麗雕刻精工甚至於有繡扇者此皆糜費於無益之地開風俗奢侈之端朕所深惡而不取也外省諸臣凡有進獻方物土宜朕留於宫中服用者所需實不多每隨便頒賜諸王內外大臣等所以推廣恩澤也如黃龍繡縀之類既不可以頒賜諸王大臣不過收貯於宫中耳其餘華燦之物在朕用之心中尚覺不安若賜諸王大臣在伊等亦覺非分豈非糜費於無益之地乎况朕素性實不喜華靡一切器具惟以雅潔適用為貴此朕撙節愛惜之心本出於自然並非勉強數十年如一日者凡外臣進獻惟應量加工價異於市肆之物即可見諸臣恭敬之忱何必過於工巧而後見其誠悃乎工匠造物之情喜新好異無所底止見一靡麗之式樣初則競相慕效後必出竒鬭勝以相誇此雕文纂組之風古人所以斥為竒邪豈可導使為之而不防其漸乎蓋治天下之道莫要於厚風俗而厚風俗之道必當崇儉而去奢若諸臣進獻之物以奢為尚又何以訓民間之儉約乎朕觀四民之業士之外農為最貴凡士工商賈皆賴食於農以故農為天下之本務而工賈皆其末也今若於器用服玩之物爭尚巧華必將多用工匠以為之市肆之人多一工作之人即田畝之中少一耕稼之人此逐末之所以見輕於古人也且愚民見工匠之利多於力田必羣趨而為工羣趨為工則物之製造者必多物多則售賣不易必至壅滯而價賤是逐利之人多不但有害於農而並有害於工也小民舍輕利而就重利故逐末易而務本難茍為官者遽然繩之以法必非其情之所願而勢有所難行惟平日留心時刻勸導使小民知本業之為貴又復訓飭閭閻崇尚朴實工作之間不為華巧如此日積月纍遂成風俗雖不必使為工者盡歸於農然可免為農者相率而趨於工矣至於士人所業在乎讀書明理以為世用故居四民之首然父兄之教子弟亦當觀其才質如何若果聰悟恂謹可望有成則當使之就學而為士若愚濁中下之資讀書難通即當早令改業歸農使之盡力於南畝以為仰事俯畜之資誠恐讀書不成又粗識數字曠廢間遊必至非分妄為越禮犯法是浮慕讀書之名而不得其道其傷農而害本者為尤甚亦不可不知戒也朕深揆人情物理之源知奢儉一端關係民生風俗者至大故欲中外臣民黜奢禁末專力於本人人自厚其生自正其德則天下共享太平之樂矣昔人云由儉入奢易由奢入儉難不知奢者取用少而費力多儉者取用多而費力少則由奢入儉乃人人行之甚便者不可謂難也中外臣民其深體朕意朕自身體力行諸王內外大臣文武官辨與鄉紳富户當欽遵朕諭其共勉之乾隆元年諭八旗為國家根本從前敦崇儉朴習尚淳龎風俗最為近古逮承平日久漸即侈靡且生齒日繁不務本計但知坐耗財求罔思節儉如服官外省奉差收稅即不守本分恣意花消虧竭國帑及至干犯法紀身罹罪戾又復貽纍親戚波及朋儕牽連困頓而兵丁間散人等惟知鮮衣美食蕩費資財相習成風全不知悔旗人之貧乏率由於此朕即位以來軫念伊等生計艱難頻頒賞賚優恤備至其虧空錢糧已令該部查奏寬免入官之墳塋地畝已令查明給還因獲罪革退之世職亦令查明請旨似此疊沛恩施者無非欲令其家給人足返朴還淳共享升平之福也見在日與王大臣等籌畫久長生計次第舉行惟是曠典不可數邀亦不可常恃而旗人等蒙國家教養之厚澤不可不深思猛省自為室家之謀即如喜喪之事原有恩賞銀兩自應稱家有無酌量經理乃無知之人止圖粉飾虛文過為縻費或遇父母大故其意以為因父母之事即過費亦所不惜不知蕩盡家産子孫無以存活伊等父母之心其能安乎否乎他如此等陋習不可悉數在己不知節省但希冀朝廷格外之賞賚以供其揮霍濟其窮困有是理乎嗣後務期恪遵典制謹身節用勿事浮華勿耽遊惰交相戒勉惟儉惟勤庶幾人人得所永逺充裕可免窘乏之虞況旗員內之老成謹慎者可望擢用外任上為國家效力辦公下亦可得俸祿飬亷以贍給家口儻伊等不知痛改前非仍蹈覆轍驕奢侈靡虧帑誤公則是伊等下愚不移自取罪戾不惟恩所不施且為法所不貸朕必仍前按律懲治不少姑息且朕今日所寬者即向日虧空官帑驕泰自恣之人也若不痛自改省謹遵法紀則將來不於伊身必於伊等之子孫又復罹追比之苦矣又何樂於目前數日之花費乎凡朕之所以諄諄訓誡者總為伊等豫謀久逺生計八旗大臣等可通行曉諭官兵人等其各敬聽朕言熟思審計以無負朕之期望又諭厚生之道在於務本而節用節用之道在於崇實而去華朕聞晉豫民俗多從儉朴而户有蓋藏惟江蘇兩浙之地俗尚侈靡往往家無斗儲而被服必極華鮮飯食靡甘淡泊兼之井里之間茶坊酒肆星列碁置少年無知遊蕩失業彼處地狹民稠方以衣食難充為慮何堪習俗如此民生安得不愈艱難朕軫念黎元期其富庶已將厯年各項積欠盡數蠲除小民乘此手足寬然之時正當各勤職業尚朴去奢以防匱乏豈可習於侈靡轉相倣效日甚一日積為風俗之憂也地方大吏及守令有臨民之責者皆當遍行化導宣朕德音縉紳之家尤宜躬行節儉以率先之布帛可安不必文綺也粗糲可食不必珍羞也物力可惜毋滋浪費終身宜計毋快目前以儉素相先以撙節相尚必能漸返淳朴改去積習庶幾唐魏之風焉又聞吳下風俗篤信師巫病不求醫惟動禱賽中産以下每致破家病者未必獲痊生者已致坐困愚民習而不悔尤屬可憫地方官亦當曲加訓誨告以淫祀無福嚴禁師巫勿令蠱惑亦保民之一端也凡此皆不用嚴峻迫切立法繁苛反致擾民惟誠心訓諭漸以嵗月自應遷善而不自知朕保民念切不憚諄切言之官吏士民其皆敬聽勿忽十六年皇上南巡諭朕命駕時巡周覽風俗觀民察吏惟日兢兢吳越尤所厪念也粵自我皇祖聖祖仁皇帝巡幸東南先後六舉厯今四十餘年盛典昭垂衢謡在耳頃者入境以來白叟黃童扶携恐後就瞻愛戴誠意可嘉朕已疊沛恩膏廣敷渥澤惟念大江南北土沃人稠重以百年休養户口益增習尚所趨蓋藏未裕紛華靡麗之意多而朴茂之風轉有未逮夫去奢崇實固閭閻生計之常經而因時訓俗以宣風而布化則官兹土者之責也其尚勵乃實心以行實政無忝教養斯民之任凡兹士庶更宜各敦本業力屏浮華以節儉留其有餘以動勞補其不足時時思物力之維艱事事惟侈靡之是戒將見康阜之盛益臻父老子弟共享升平之福朕清蹕所至有厚望焉二十四年諭曰各鹽政織造等夏節貢物以備賞賚之需雖行之已久但邇來絺繡太求精巧既害女紅長此焉窮非朕敦尚朴素之意也甚至華藻被於葛褥天中五日以外無所用之迎涼適凊亦不宜於憩息也其禁之互見土貢考二十七年皇上南巡諭朕奉皇太后安輿涖兹南服所以省方觀民勤求治理其各處舊有行宫清蹕所駐為期不過數日但須掃除潔淨以供憩宿足矣固無取乎靡麗適觀也而名山勝迹尤以存其舊規為得自然之趣從前屢降諭旨至為明晰乃今日渡淮而南凡所經過悉多重加修建意存競勝即如浙江之龍井山水自佳又何必更興土木雖成事不説而似此踵事增華伊於何砥轉非朕稽古時巡本意且河工海塘為東南民生攸繫朕厪懷宵旰時切紆籌地方大吏果加意修防永資捍禦則兹之親臨閲視其欣慰當何如者而田疇豐潤井里恬熙即所以博朕愜覽不在彼而在此也嗣後每屆巡幸之年江浙各處行宫及名勝處所均毋容再事增葺徒資糜費即圬墁裱飾不至年久剝落亦可悉仍其舊此實不僅為愛惜物力起見也該督撫等其各善體朕諭敬相遵守又諭朕巡幸所至凡地方豫備一切飾觀之具殊覺繁俗已屢降旨概行斥禁因念回鑾直𨽻時節令適近端陽恐地方官不無點綴節景或於趙北口有供備龍舟之事著方觀承先期實力飭禁毋得稍踵靡文以副朕意三十五年皇上巡幸天津奉諭朕因淀神祠工落成親詣瞻禮并恭奉皇太后安輿巡幸天津地方官於淀祠旁及左格莊二處添建行宫工作未免煩費雖伊等義效尊親朕實不欲其過耗物力著將此二處行宫各賞銀二萬兩於鹽課應解內務府銀兩項下撥給並諭嗣後毋得稍有增飾及新建行宫以副朕體恤崇朴至意又諭今嵗巡幸天津山東撫臣富明安以明嵗恭逢皇太后八旬萬夀奏請登嶽祝釐朕亦以闕里久未臨謁便道往蒞來年巡蹕所至非但畿甸境內不宜復事繁文即東省入疆以後亦不當綴景增華致滋縻費朕省方問俗念切觀民惟以閭里恬熙羣情愛戴為樂若備陳彩飾炫耀川途不足美觀而徒耗物力實所不取該督撫其善體恪遵毋違朕命三十六年皇上東巡奉諭今日至寶稼營登舟見所設水營外圍席牆概行羃以黃布甚屬非是向來巡幸所經水程營盤外牆率以葦席代之今乃於葦席之外復加布襲且髙逾數仭儼如大牆其意何取布匹為小民被服所需豈宜妄為耗費若留此布為貧民襦袴之用資衣被者不知凡幾顧置有用為無用使不知者幾擬於土木被文繡詎朕省方觀民之意前途有似此者著即撒去所有布匹聽民間買用庶不至成棄物山東毗連直𨽻恐亦聞風效尤並著速行除撒此次巡幸山東所重在問民疾苦嘉惠羣黎實不欲絲毫耗及閭閻物力猶恐地方大吏踵事增華屢經諄諭一切務從儉約毋飾浮靡不啻三令五申楊廷璋何竟不知仰體朕意著傳旨申飭并將此通諭知之又諭前於寶稼營登舟見所備水營外圍席牆羃以黃布又添設坐落板房均為過當布匹為民間衣被所需詎宜妄費因即令沿途槩行撤去而板房則成工難於遽毁然每日駐蹕閲之輒為不懌夫水營不過為艤舟一宿而設從前四巡江浙及年來再蒞天津規制未嘗增易朕甚安之亦衆所共知者何今次獨藉此板屋數楹為憩息乎且又位置廊軒增華飾美心益增厭是以所至之地竟有不登岸寓目者搆此何為朕巡幸所經供頓儲備絲毫不欲纍及官民每一水營準令開銷數千金俾之承辦寬裕今乃不知撙節轉事此無益之耗費實所不取嗣後或有安設水營悉遵舊規不得稍有點綴致干咎戾此次著賞給鹽庫銀一萬兩以償其費並為明白宣諭使知朕禁奢崇實之至意四十一年皇上東巡奉諭此次巡蹕所經直𨽻山東兩省每日俱有戲臺承應甚或間以排當殊屬無謂朕啓鑾前再三申諭勿務繁文而地方官總不能實心仰體朕於道旁老幼扶攜瞻覲每顧而樂之至於沿途點綴飾為巷舞衢歌之象從未嘗攬轡停輿一為聽覽亦何必為此無益之煩費乎前次恭奉皇太后巡幸江浙臚歡祝釐所至或綴陳燈綵音樂以奉慈娛因兩淮蘇杭地本殷阜且俗尚如斯遂爾不加斥禁然亦初不以為美觀若北方風氣淳朴豈可效其所為又從而踵事增華乎朕行事期為天下後世法方今綱紀肅清朕巡省周咨並不以遊觀為事誥諭諄諄督撫等尚且不能深喻朕意我子孫若能恪守朕訓庶不致為奢靡所移設或稍不自持略涉流連遊覽督撫因而曲意逢迎其流弊伊於何底此於國運人心所繫甚巨可不共知警懼乎將此通諭知之四十五年正月皇上南巡諭曰朕因東南黎庶望幸情殷爰舉舊章五巡江浙所以省方觀民勤求治理清蹕所經各處舊有行宫祇令掃除潔淨以供憩宿毋得踵事增華致滋縻費屢經降旨諄切曉諭封疆大臣自能仰體朕心遵旨辦理苐念直省行館近京數程屢經駐蹕即圬墁裱飾為費尚屬無多其自山東以至江浙所有行宫則自乙酉南巡至今未經臨蒞閲時既久不免舊剝落地方官修理葺治不無所費且山東江蘇二省俱有添建座落此項用度聞各省俱係捐廉辦理在地方大吏養廉豐厚分年扣捐以抒忱悃尚屬可行况朕又復加恩賞給庫銀用示體恤伊等辦理儘足敷用若更因此派纍閭閻致滋苛擾則斷不可且非朕念切民依行慶施惠之至意也苐恐不肖有司或有借辦差為名暗中科斂而窮鄉僻壤未及周知亦有幫貼差費者一經察出必將該督撫等重治其罪以昭警戒其各凛遵朕旨慎勿自干嚴譴也將此通諭知之又諭朕清蹕時巡臨蒞江浙原因厪念河工海塘親臨閲視兼以省方問俗順時行慶非為遊觀計也前屢經降旨所有經過地方止須掃除蹕路一切供頓毋庸踵事增華今浙省仍有添建屋宇點綴燈彩之事兼多華褥未免徒滋繁費朕心實所不取三寶王亶望均著傳旨申飭嗣後如再有似此過費者朕必加以嚴譴不能寬貸也又諭朕自三十年南巡以後迄今十有五年東南土俗民風易趨華靡每朂督撫大吏諄諄化導務期反朴還淳以臻郅治乃自啓蹕以來所過直𨽻江南一切行營供頓不過就舊有規模略加修葺辦理尚為妥協而從事浮華山東已開其端至浙江為尤甚朕心深所不取現在陶莊及海塘各工經朕親臨指示將來工程完竣朕自當再行親蒞閲視恐後任督撫見此次所辦差務已多粉飾未免踵事增華從而加甚勢將伊於何底著再通飭各督撫以後務宜黜奢崇儉於地方諸大政實心經理毋得徒事繁華致滋浮費以稱朕惠愛東南黎庶之至意又諭朕於明春二月草二日啓鑾巡幸五臺蹕路所經已降旨止就舊有行宫量加修葺無許再行添建該督撫務宜妥協辦理不得踵事增華致滋縻費以副朕省方觀民之至意四十九年正月奉旨於乾隆四十九年正月諏吉啓鑾祇謁孔林巡幸江浙順道親閲河工海塘所有各處行宫座落俱就舊有規模略加葺治毋得踵事增華致滋繁費御製南巡記舉大事者有宜速而莫遲有宜遲而莫速於宜速而遲必昧幾以無成於宜遲而速必草就以不達能合其宜者其惟敬與明乎敬者敬天明者明理敬天斯能愛民明理斯能體物千古不易之理也豫臨御五十年凡舉二大事一曰西師一曰南巡西師之事所為宜速而莫遲者幸賴天恩有成二十餘年疆宇晏安兹不絮言若夫南巡之事則所為宜遲而莫速者我皇祖六度南巡子藐躬敬以法之兹六度之典幸成亦不可以無言我皇祖蕩蕩難名豫藐躬瞪乎景仰述且弗能作於何有然而宜遲莫速之義則不可不明示豫意也蓋南巡之典始行於十六年辛未是即遲也南巡之事莫大於河工而辛未丁丑兩度不過敇河臣慎守修防無多指示亦所謂遲也至於壬午始有定清口水志之諭丙申乃有改遷陶莊河流之為庚子遂有改築浙江石塘之工今甲辰更有接築浙江石塘之諭至於髙堰之增卑易磚徐州之接築石隄並山無不籌度咨諏得宜而後行是皆遲之又遲不敢欲速之為夫臣之事君其有知不可而強諍者鮮矣河工關係民命未深知而謬定之庸碌者惟遵旨而謬行之其害可勝言哉故余之遲之又遲者以此而深懼豫之子孫自以為是而後之司河者之隨聲附和而且牟利其間也與其有聚斂之臣寧有盜臣在他事則可在河工則不可河工而牟利宣泄必不合宜修防必不堅固一有疏虞民命繫焉此而不慎可乎然而為君者一二日萬幾胥待躬親臨勘而後剔其弊日不暇給焉則仍應於敬天明理根本處求之思過半矣豫之舉兩大事而皆幸以有成者其在斯乎其在斯乎若夫察吏安民行慶施惠羣臣所頌以為亟美者皆人君本分之應為所謂有孚惠心勿問元吉豫嘗以此自朂也至於克己無欲以身率先千乘萬騎雖非扈蹕所能減而體大役衆俾皆循法而不擾民亦亟其難矣斯必有振其綱而挈其要然後可以行無事而胥得宜實總不出敬明兩字而已故兹六度之巡攜諸皇子以來俾視豫躬之如何無欲也視扈蹕諸臣以至僕役之如何守法也視地方大小吏之如何奉公也視各省民人之如何瞻覲親近也一有不如此未可言南巡而西師之事更不必言矣敬告後人以明余志皇朝文獻通考卷三十九
