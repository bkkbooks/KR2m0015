body:
  text: 封建考一臣等謹案列爵曰封分土曰建建國之制固不可行於三代以後而三代之初亦既不勝其弊禹一傳而有甘之誓再傳而有羲和之征夫有扈羲和之所以獲咎者曰怠侮曰沈湎而已此在郡縣之時朝下詔而夕就逮一法吏足以議其罪而必命六師以征之則以其有土地甲兵之可恃而建國之弊已略可覩矣馬端臨撰封建考所以論建國之不可行者其語極詳顧建國之制不可行而封爵之制不可廢以展懿親以酬勳閥率是道也自唐宋以後大抵皆封爵之制而馬氏概因之為封建厯引魏徵栁宗元蘇轍之說以著於冊蓋存封建之名即所以示封建之戒後之考者統觀而析辨之則知封而不建實萬祀不易之常法而迂儒之矜言復古者直不通事理之論耳今臣等奉命纂輯皇朝文獻通考所列二十四門悉依馬氏之例是以封建考亦仍舊名至卷中按條標目則别稱封爵以紀其實焉同姓封爵一臣等謹案國家庸勳展親優崇爵秩自太祖肇基即以國語定爵號其最尊者稱曰貝勒逮我太宗崇德改元始定王公等爵以封顯祖子孫洎乎燕都定鼎創制顯庸列爵十等榮施益溥纍朝以來封爵之制日加詳密典至盛恩至渥也至於六祖子孫有德善勳勞者量其等而錫之爵王貝勒僅屬追封其身受爵者在國初則授昂邦章京梅勒章京繼改精竒尼哈番阿思哈尼哈番皇上乾隆元年視其品秩定號為子男覺羅封爵所以别於宗室也其功封罔替恩封遞降之制實定於三十九年逮四十二年我皇上恭閲列祖實録逺惟佐命之鴻猷申雪流言之誣獄丕視功載爰紹勳封同時宣力之諸王仍昔寵膺之美號惇宗將禮克敉前勞諭㫖煌煌至公至正上以善述我列祖在天之志下以悉教夫藎臣篤弼之忠猗歟盛哉此誠千古以來庸勳展親之極軌也所奉諭㫖按年恭録俾億萬斯年式時聖訓懋昭興仁之巨典以繼繼繩繩於勿替云崇德元年四月始定王公以下九等爵以封宗室一等和碩親王二等多羅郡王三等多羅貝勒四等固山貝子五等鎮國公六等輔國公七等鎮國將軍八等輔國將軍九等奉國將軍叙兄弟子姪軍功封親王郡王貝勒有差臣等謹案此定爵級錫封之始其時襲封降封則例猶未備也定鼎以後列聖頒制條分縷析或補或更按次考稽釐然畢舉我皇上御極之十三年欽定封爵表及考試授封表載在會典萬祀永遵俾列在宗盟者咸知激勸以善承爵賞焉是卷所紀以編年之例詳其沿革故上溯崇德之創制以迄乎現在遵奉之規條云是年定庶子受封例凡皇子係庶妃生者封鎮國將軍親王側室妾媵子封輔國將軍郡王側室妾媵子封奉國將軍四年八月封宗室為固山貝子鎮國公輔國公鎮國將軍奉國將軍等爵有差臣等謹案此大封宗室之始八年定親王以下九等爵授封年嵗親王至奉國將軍子年二十列名具題請㫖授封是年定親王以下九等爵襲封例親王至奉國將軍有薨故者其子弟即准承襲不必俟其嵗滿若年及二十未襲封者先與餘子同授封爵至襲封時仍豫以襲封之爵如應襲之爵與前封爵相等即改授封為襲封換給誥冊臣等謹案此襲封例之始順治六年定宗室列爵十等親王一子封親王餘子封郡王郡王一子封郡王餘子封貝勒貝勒子封貝子貝子子封鎮國公鎮國公子封輔國公輔國公子授三等鎮國將軍鎮國將軍子授三等輔國將軍輔國將軍子授三等奉國將軍以上鎮國輔國奉國將軍初封俱三等後遇加封至二等一等奉國將軍子授奉恩將軍郡王以上准襲封貝勒以下不准襲封臣等謹案此降封例之始九年定王爵襲封例王爵必以適妃子承襲若適妃無子方准次妃子承襲臣等謹案前所定親王郡王襲封降封未及適妃次妃所生受封之差等至是增定十年定軍功所封郡王嵗滿所封郡王襲爵例軍功封授郡王已經子孫承襲者如無親生子孫准親兄弟及親兄弟之子襲封至親王之子嵗滿照例封郡王者有親生子孫准豫承襲如絶嗣不准承襲臣等謹案此旁支入襲之始是年定諸王授爵封號凡諸王授封以素行為封號以後嗣王襲爵換給新冊暫用舊寶印賜封號後換給寶印是年定親王一子封世子嗣親王郡王一子封長子嗣郡王輔國公一子世授輔國公奉恩將軍子孫世襲罔替臣等謹案前此親王郡王一子各襲封其未襲以前未有封也至是始於候襲之年豫以封爵恩禮益優渥矣至於輔國公之一子世襲奉恩將軍之子孫世襲罔替亦自此始十八年更定嵗滿所封郡王襲爵例嵗滿所封郡王原係世襲王爵如有絶嗣者應否襲封奏請欽定臣等謹案此更定十年所定嵗滿郡王襲爵例是年定王以下等爵庶子襲封例王貝勒貝子公將軍等有適室所生子照例襲封如適室無子准以庶出之子襲封臣等謹案崇德元年定庶子受封未及庶子襲封至是增定是年定貝勒貝子庶夫人子授奉恩將軍臣等謹案崇德元年定庶子受封至郡王而止貝勒貝子庶子至是始定康熙九年詔諸王襲封者即稱其祖父封號凡襲封之子孫即稱其祖父封號冊寶俱無庸更換但將承襲之名於原冊內增注二十三年定親王一子封世子候襲親王餘子皆授貝勒郡王一子封長子候襲郡王餘子皆授貝子臣等謹案自順治六年定親王一子封親王郡王一子封郡王其時親王餘子封郡王郡王餘子封貝勒至是宗人府議減等授封奉諭㫖改定二十七年定王貝勒至奉恩將軍之子年至二十考試封奉諭㫖自古帝王展親睦族列爵錫封原欲選賢建能旌别淑慝俾咸知勸勉慶流奕世此國家之常經奬勵之至意也朕篤念親親恩禮罔替年至十五即行授封但誼屬本支必皆飭躬砥行端良醇謹益自刻勵動不踰則始無忝於宗潢今親王以下奉恩將軍以上不問賢否概豫封爵以致視為故典罔知激勸嗣後親王以下奉恩將軍以上子孫應俟其年至何嵗作何辨其賢否定其品級等第始應授封著議政王貝勒大臣及親王以下奉恩將軍以上會同確議具奏尋遵㫖議奏親王以下奉恩將軍以上子年十五概豫封爵恐致視為故典罔知激勸此後應停止此例俟年至二十辨其文藝騎射之優者列名引見請㫖封惟親王以下奉恩將軍以上有薨逝者即准一子襲爵不俟嵗滿奉㫖依議如人材超卓者不拘年嵗特豫封是年復定王貝勒至奉恩將軍之子嵗滿考試優者襲爵平劣降授王貝勒以下至奉恩將軍之子年至二十應封者考試國語及馬步射優者照例封應得之爵平者降一等劣者降二等封臣等謹案上條考試受封但指言優者至是列為優平劣三等雍正三年暫停考試宗室降等封之例奉㫖今年係朕初次考試其降封處暫行停止照各應得品級封八年定王公以下適子考授例親王郡王適福晉子考試授封將一子封世子長子外親王適福晉子考授鎮國公不入八分先是天命年間立八和碩貝勒共議國政各置官屬凡朝會燕饗皆異其禮是為八分天聰以後宗室內有特恩封公及親王餘子授封公者皆不入八分其有功加至貝子准入八分如有過降至公仍不入八分郡王適福晉子考授一等鎮國將軍貝勒適夫人子考授二等鎮國將軍貝子適夫人子考授三等鎮國將軍鎮國將軍適夫人子考授一等輔國將軍輔國公適夫人子考授二等輔國將軍鎮國將軍適妻子考授三等輔國將軍一等輔國將軍適妻子考授一等奉國將軍二等輔國將軍適妻子考授二等奉國將軍三等輔國將軍適妻子考授三等奉國將軍奉國將軍適妻子考授奉恩將軍至奉恩將軍無等可降將奉恩將軍適妻子皆封舊例停止祗以一子考襲餘子考試優者給雲騎尉俸臣等謹案此條所定專詳適子若庶子考授則定自乾隆八年至於世子長子之適子庶子考授例則定自乾隆十三年是年九月禮部遵㫖議奏宗室等公加封奉恩字乾隆八年定王公以下庶子考授例親王側福晉子考授二等鎮國將軍郡王側福晉子考授三等鎮國將軍貝勒側室子考授一等輔國將軍貝子側室子考授二等輔國將軍鎮國公側室子考授三等輔國將軍輔國公側室子考授一等奉國將軍親王妾媵子考授三等輔國將軍郡王妾媵子考授三等奉國將軍貝勒貝子妾媵子均考授奉恩將軍十一年定奉恩將軍子承襲考試應降等者停俸三年奉㫖應封宗室特定考試之法其學業平庸者降等封授原期示以懲勸若因奉恩將軍無級可降獨得照例授封必恃此不知自勉嗣後奉恩將軍考試應降等者仍授為奉恩將軍停俸三年十三年欽定親王以下封爵表凡爵十有四等和碩親王世子多羅郡王長子多羅貝勒固山貝子鎮國公輔國公不入八分鎮國公不入八分輔國公鎮國將軍輔國將軍奉國將軍奉恩將軍凡親王適子特恩封世子候襲親王如未封與餘子同考授不入八分公世子適子授爵視親王餘子餘子考授一等鎮國將軍郡王適子特恩封長子候襲郡王如未封與餘子同考授一等鎮國將軍長子適子授爵視郡王餘子餘子考授二等鎮國將軍貝勒適子降襲貝子餘子考授二等鎮國將軍貝子適子降襲鎮國公餘子考授三等鎮國將軍鎮國公適子降襲輔國公餘子考授一等輔國將軍輔國公適子仍襲輔國公餘子考授二等輔國將軍不入八分鎮國公適子降襲不入八分輔國公餘子考授三等輔國將軍不入八分輔國公適子降襲三等鎮國將軍餘子考授三等輔國將軍一等鎮國將軍適子降襲一等輔國將軍二等鎮國將軍適子降襲二等輔國將軍三等鎮國將軍適子降襲三等輔國將軍餘子均考授三等輔國將軍一等輔國將軍適子降襲一等奉國將軍二等輔國將軍適子降襲二等奉國將軍三等輔國將軍適子降襲三等奉國將軍餘子均考授三等奉國將軍一二三等奉國將軍適子均降襲奉恩將軍餘子考授亦如之奉恩將軍適子仍襲罔替餘為閒散宗室欽定考試授封表凡宗室應封考試馬步射翻譯三項皆優者以應得之爵授封兩優一平者降一等一優兩平兩優一劣降二等三項皆平及一優一平一劣降三等一優兩劣兩平一劣一平兩劣及全劣皆停封令學習再行考試是年定世子長子之子授封例凡世子適子恩封不入八分公如未恩封與餘子同授封爵餘子考授一等鎮國將軍側福晉子考授三等鎮國將軍妾媵子考授三等奉國將軍長子適子恩封一等鎮國將軍如未恩封亦與餘子同授封爵餘子考授二等鎮國將軍側福晉子考授一等輔國將軍妾媵子考授奉恩將軍是年定奉國將軍奉恩將軍考試降等停俸例凡應封奉恩將軍有考試應降一等者停俸二年降二等者停俸三年降三等者停俸四年其應封二等奉國將軍有降三等應封三等奉國將軍有降二等三等者除降至奉恩將軍外仍有應降之等每等亦停俸一年有半二十六年十二月奉㫖定例降等遞封至奉恩將軍雖無可降之等然未經出缺以前其適妻所生之子年已及嵗即考試封奉恩將軍是多一奉恩將軍矣殊覺太優嗣後此等奉恩將軍之子應封時暫行賞給五品虛銜仍食原錢糧俟應襲之奉恩將軍缺出再行承襲永著為例三十九年十二月初九日上諭閣臣曰向來王等襲爵惟軍功勳舊諸王例應世襲罔替此外如怡賢親王之公忠體國經皇考特恩有世襲罔替之㫖亦應遵守勿替其餘恩封諸王襲爵時例應以次遞降蓋承恩封爵宜有親疏之别若不限以等差則國家延祚奕世王爵愈積愈多既不免於冗濫且與勳多世及者無所區别亦非所以昭奬勸此展親之恩不得不示之節制也即如和勤親王永璧襲爵已應降襲郡王朕念其為和恭親王嫡長子朕之親姪不忍降封是以仍襲親王逮至綿倫則不得不遞減為郡王矣今繼綿倫襲爵者於例應降封貝勒但朕究念其為和恭親王之孫今若照例改為貝勒則是和恭親王薨後未五年而王爵已失於心實有所不忍此次仍著加恩襲封郡王將來再遇應襲時即照例遞行降襲義念諸王遞降之例自貝勒貝子公以下至奉恩將軍不過六七傳即至奉恩將軍世襲罔替朕心仍有所不忍嗣後著加恩凡親王以次遞降者至鎮國公而止郡王以次遞降者至輔國公而止其公爵均著世襲罔替俾我大清億萬斯年親王郡王之子孫均得永延世澤恪守恩封以稱朕篤厚宗親至意著為令是月十五日上諭閣臣曰昨曾降㫖將恩封之親王郡王襲次遞減至鎮國輔國公者即令世襲罔替以昭展親恩誼至於貝勒貝子公承襲之例若何未經議及著軍機大臣㑹同宗人府查明妥議具奏嗣經臣永瑺等奏查貝勒貝子公承襲之例凡恩封者向來皆以次遞降不過數傳即例降奉恩將軍今臣等仰體皇仁應請嗣後貝勒遞降者至不入八分鎮國公而止貝子至不入八分輔國公而止鎮國公至一等鎮國將軍而止輔國公至一等輔國將軍而止並令世襲罔替無庸再降奏入上從之四十一年十月初四日上諭閣臣曰諸王襲爵經朕酌定由軍功封晉者世襲罔替其餘恩封諸王襲爵時皆應以次遞降又念親王郡王以下不過六七傳即至奉恩將軍心有不忍曾經降㫖凡親王以次遞降者至鎮國公而止郡王以次遞降者至輔國公而止其公爵均著世襲罔替蓋錫爵延恩若不定以等差則國家億萬年之久王爵愈積愈多又不免於冗濫昨四庫全書薈要處呈進繕本宋史朕幾餘披閲見宗室世系表內其燕王楚王之子即降為公公之後降為三班奉職是其再傳而後即已下同齊庶視現今所定恩封之親王郡王以次遞降者仍得世膺公爵其厚薄為何如耶且朕於諸子中惟皇長子皇五子皆因病劇時始加封親王至於皇四子皇六子則以出嗣諸叔得襲郡王爵餘尚未有特豫册封者非朕沽名而薄待己子正因理當然耳所以昭示久逺之道無有大於此者我世世子孫所當遵守勿替將此㫖録示阿哥書房並諭令宗室王公等知之四十三年正月初十日上諭閣臣曰睦親彰善王政宜先繼絶昭屈聖經所重朕自臨御以來間日恭閲列祖列宗實録一冊因得備知祖宗創業艱難及爾時懿親藎臣勤勞佐命底定中原偉伐殊功實為從古所未有而當時䇿勛錫爵榮號崇封所以酬答者本從優厚逮其後或有及身緣事旋被降削者或有子孫承襲更易封號者逮今平情準理若不為之溯述闡揚追復舊恩於心實有所未愜因念睿親王多爾衮當開國時首先統衆入關掃蕩賊氛肅清宫禁分遣諸王追殱流冦撫定疆陲一切創制規模皆所經畫尋即奉迎世祖車駕入都定國開基以成一統之業厥功最著顧以攝政有年威福不無專擅諸王大臣未免畏而忌之遂致殁後為蘇克薩哈等所搆授款於其屬人首告誣以謀逆經諸王定罪除封其時我世祖章皇帝實尚在沖齡未嘗親政也夫睿親王果萌異志則方兵權在握何事不可為且吳三桂之所迎勝國舊臣之所奉止知有攝政王耳其勢更無難號召即我滿洲大臣心存忠篤者自必不肯順從然彼誠圖為不軌無難潛鋤異已以逞逆謀乃不於彼時因利乘便直至身後以斂服僭用明黃龍衮指為覬覦之證有是情理乎况英親王阿濟格其同母兄也於追捕流賊回京時誆報李自成身死且不候㫖班師睿王即遣員斥責其非並免王公等往迎之禮又因阿濟格出征時脅令巡撫李鑑釋免逮問道員及擅至鄂爾多斯土默特取馬會議其罪降為郡王平日辦理政務秉公持正若此是果有叛志無叛志乎又實録載睿王集諸王貝勒貝子公大臣等遣人傳語曰今觀諸王貝勒大臣但知諂媚於豫未見有尊崇皇上者豫豈能容此昔太宗升遐時嗣君未立英王豫王跪請豫即尊位豫曰爾等若如此豫當自刎誓死不從遂奉皇上纘承大統似此危疑之時以豫為君豫尚不可今乃不敬皇上而媚豫豫何能容自今以後有盡忠皇上者豫用之愛之其不盡忠不敬事皇上者雖媚豫豫不爾宥也且云太宗恩育豫躬所以特異於諸子弟者蓋深信諸子之成立惟豫能成立之每覽實録至此未嘗不為之墮淚則王之立心行事實能篤忠藎感厚恩深明君臣大義為史冊所罕覯使王彼時如宋太宗之處心積慮則豈肯復以死固辭而不為邪說搖惑耶乃令王之身後久抱不白之寃於泉壤心甚憫焉假令當時之逆跡稍有左驗削除之罪果出於我世祖聖裁朕亦寧敢復翻成案乃實由宵小奸謀搆成寃獄而王之政績載在實録者皆有大功而無叛逆之跡又豈可不為之昭雪乎昨於乾隆三十八年因其塋域久荒特敕量為繕葺並准其近支以時祭掃然以王之生平盡心王室尚不足以慰彼成勞朕以為應加恩復還睿親王封號追諡曰忠補入玉牒並令補繼襲封照親王園寢制度修其塋墓仍令太常寺春秋致祭其原傳尚有未經詳叙者並交國史館恭照實録所載敬謹輯録添補宗室王公功績傳用昭彰闡宗勛至意又如豫親王多鐸從睿親王入關肅清京輦即率師西平流寇南定江浙實為開國諸王戰功之最乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勛績超邁等倫自應世胙原封以彰殊眷豈可以風影微眚輒加貶易乎朕以為應復其原封又諸王中披堅執鋭拓土開疆共成一統之業者如禮親王代善後改封康親王鄭親王濟爾哈朗後改封簡親王肅親王豪格後改封顯親王克勤郡王嶽託後改封平郡王當時俱茂著壯猷克昭駿烈載在宗盟今其子孫所襲均非始封之名外人不知妄疑宗藩當國家締造時有大勳勞而後裔均不得長延帶礪似為闕典即其本支承家襲慶以去祖漸逺幾忘其先世錫封之由弗克顧名奮效所係於宗室子孫者甚重况功臣世封內如揚古利之英誠公費英東之信勇公額亦都之果毅公但以本號相傳其子孫承襲者各能溯勛閥以宣偉績不失故家喬木之遺今以親賢世胄竟改其初封嘉號何以垂詒奕祀示酬庸追本之義乎朕以為應復其原號著交軍機大臣會同宗人府悉心妥議具奏其餘宗室諸王貝勒等如有顯著功績其封爵後經降奪者除本人身罹重譴自不當復邀優典若係承襲之子孫獲咎議處者僅當斥其本身而不當追貶其祖宗世爵方為平允亦著一併會查議奏嗣經臣永瑺等奏稱伏惟我皇上恭閲實録軫念宗藩於睿親王則褒忠雪枉繼絶酬勳於禮親王等則或復舊封或仍原號凡以闡揚功業嘉惠宗盟真庸衆夢寐所難期實曠古希逢之盛事臣跪誦恩綸仰見聖天子準理平情正大光明之至意謹遵諭㫖公同酌議分晰列款一睿親王當我朝定鼎之初首先統衆入關掃除流寇綏靖燕京復恭迎世祖章皇帝踐位開基創制立國實為一代功宗之冠且始則力拒諸王之推戴繼復嚴斥同列之諂諛且飭同母兄英親王之罪愆俾知警戒尤為忠誠不二公正無私乃於其薨逝之後忽搆流言誣為叛逆指斂衣為左證成寃獄以難明又乘世祖未嘗親政之年遂致諸人得逞矯誣之事除封削爵歷久莫伸今蒙聖諭明示平反悉為昭雪命復還睿親王原爵豫諡曰忠並復其宗支仍令襲爵又為修葺園寢并令配享太廟聖恩優渥以有加衆情感服而難喻謹查睿親王本無子嗣從前曾將豫親王之子多爾博承繼為嗣後因定議罪案業令歸宗今睿親王既以復其宗支應仍令多爾博一支繼嗣所復睿親王爵應即令多爾博之四世孫淳穎承襲罔替至淳穎承襲之公爵毋庸另襲一豫親王屢建竒功所向克捷入關以後即率師追𠞰流賊李自成復平定江南兩浙於諸王中戰功最著原封和碩豫親王嗣子多尼承襲後改號曰信旋以睿親王母弟追削王爵順治年間僅降封信郡王應遵㫖追復親王還號為豫一體配享太廟其豫親王爵即遵㫖令現襲信郡王之修齡承襲亦世襲罔替一禮親王誠心推戴功德茂昭鄭親王肅親王克勤郡王皆忠冠一時勛垂奕世其原封爵號自應永紹嘉名勿令改易俾諸王子孫得知承家襲慶之由咸勗繼祖效忠之志所有現襲之康親王仍復號為禮親王現襲之簡親王仍復號為鄭親王現襲之顯親王仍復號為肅親王現襲之平郡王仍復號為克勤郡王至改復舊號之親王郡王止就現在襲爵者為始向後永逺遵循其從前原襲已故之康親王等封號俱無庸追改奏入上從之四十三年三月初二日上諭閣臣曰朕因我朝開國時宗室懿親勤勞佐命其殊勳茂績實為史册罕有如睿親王多爾衮受誣黜爵豫親王多鐸緣事降封朕為核其生平事蹟昭雪加恩復還原封世爵又禮親王代善鄭親王濟爾哈朗肅親王豪格克勤郡王嶽託等並令稱其原號用昭惇叙酬庸渥典其餘諸王貝勒內如饒餘親王阿巴泰及其子安親王嶽樂俱屢著功績其子孫內止有奉恩將軍一人不足以酬勞閥著加恩賞封輔國公一人又敬謹親王尼堪功勳頗顯且以力戰捐軀其子孫內現在止有一輔國公亦著加恩晉封鎮國公至謙郡王瓦克達巽親王滿達海鎮國公屯齊從前亦均著有功績現無承襲之人並著加恩瓦克達子孫賞給一等鎮國將軍滿達海子孫賞給一等輔國將軍屯齊子孫賞給一等奉國將軍此次加賞之公爵世職俱著世襲罔替臣等謹案古者分土建國衣食租稅故封建前考詳紀國邑至頒祿之制則或著或不著焉我朝封爵而不建國膺封者皆受祿於朝視其爵以為等次祿制不可不考也以詳見國用考俸餉門中故不復載臣等謹案封爵等級每以功罪為升降故一人之身或升降遞見是卷書爵凡身受者以玉牒書綱之爵為據或升或降以次叙入其子孫襲爵縱有升降亦照所襲之爵載入俾世襲者瞭如指掌惟降襲者則分條紀載以章别也他若追贈者則從五朝續通考例從後附載追降者則以沒時之爵為斷而以追降之爵附入至於削爵者亦得按爵備載以原封二字冠之若夫一爵之中叙次先後並遵玉牒世系不更以封爵編年云宗室和碩親王臣等謹案宗藩先後之序首親王次郡王以逮奉恩將軍蓋序爵也同爵則以系之逺近為序同系則以屬之尊卑為序同屬則以所自出者之長幼為序先逺而後近先尊而後卑先長而後幼各從其序庶秩然可考焉顯祖系和碩鄭親王濟爾哈朗顯祖皇孫贈和碩親王舒爾哈齊子初封貝勒崇德元年四月以軍功晉和碩鄭親王順治元年十月晉信義輔政叔王五年三月坐事降多羅郡王閏四月復晉和碩鄭親王九年二月晉叔和碩鄭親王十二年五月薨諡獻濟度濟爾哈朗子順治八年閏二月封多羅簡郡王九月封世子十四年五月襲和碩親王仍號簡十七年七月薨諡純德塞濟度子順治十八年二月襲康熙九年三月薨諡惠無嗣喇布濟度子康熙七年正月封三等輔國將軍九年九月襲二十年十月薨二十二年坐事追削爵雅布濟度子康熙十一年封三等輔國將軍二十二年四月襲四十年九月襲諡修雅爾江阿雅布子康熙三十六年十二月封世子四十一年正月襲雍正四年二月坐事削爵神保住雅布子康熙五十五年四月封三等奉國將軍雍正四年三月襲乾隆十三年九月坐事削爵德沛顯祖五世孫贈和碩簡親王福存子雍正十三年五月封鎮國將軍乾隆十三年九月襲十七年六月薨諡儀竒通阿顯祖五世孫贈和碩簡親王巴賽子雍正四年八月封三等輔國將軍九年十二月襲不入八分輔國公乾隆十七年十月襲二十八年六月薨諡勤豐訥亨竒通阿子乾隆八年二月封三等輔國將軍二十八年十月襲四十年十二月薨諡恪積哈納豐訥亨子乾隆四十年四月授頭等侍衛四十