誠親王允祉子康熙五十九年十二月封雍正二年十一月坐事削爵世子品級𢎞昆聖祖皇孫和碩履親王允祹子乾隆十五年三月薨以世子禮殯葬附贈世子贈世子𢎞普太宗四世孫聖祖皇孫和碩莊親王允祿子封詳鎮國公乾隆八年三月卒追贈諡恭勤以上世子臣等謹案封世子者他日承襲自有封爵故於襲爵附載始封毋致重出此條所載皆封世子而未承襲者也長子倣此多羅郡王顯祖系多羅敏郡王勒度太祖皇曾孫和碩鄭親王濟爾哈朗子順治八年閏二月封十二年十二月薨諡簡無襲太祖系多羅饒餘郡王阿巴泰太祖皇七子天命八年封多羅貝勒崇德元年四月封多羅饒餘貝勒順治元年四月晉封三年三月薨贈襲並詳親王多羅順承郡王薩哈璘太祖皇孫和碩禮親王代善子天命十一年屢從征伐有功封貝勒崇德元年四月晉封是年五月薨贈諡詳親王勒克德渾薩哈璘子順治元年十一月封多羅貝勒五年九月晉封多羅順承郡王九年三月薨諡恭惠勒爾錦勒克德渾子順治九年八月襲康熙十九年十一月以罪削爵勒爾貝勒爾錦子康熙二十年六月襲二十一年二月薨揚竒勒爾錦子康熙二十一年十二月襲兄爵二十六年四月薨寵保勒爾錦子康熙二十六年十一月襲兄爵三十七年九月薨布穆巴勒爾錦子康熙三十八年正月襲弟爵五十四年五月坐事削爵諾羅布勒克德渾庶子康熙五十四年五月襲五十六年二月薨諡忠錫保諾羅布子康熙五十六年十一月襲晉封詳親王雍正十一年七月坐事削爵乾隆七年八月卒以多羅郡王禮殯葬熙良錫保子雍正三年十月封輔國公五年七月晉鎮國公十年正月封世子十一年七月以父罪削爵十二月襲多羅順承郡王乾隆九年四月薨諡恪泰斐英阿熙良子乾隆九年九月襲二十一年七月薨諡恭恆昌泰斐英阿子乾隆二十一年十月襲四十三年二月薨諡慎倫柱恆昌子乾隆五十一年五月襲多羅謙郡王瓦克達太祖皇孫和碩禮親王代善子順治三年正月封三等鎮國將軍四年三月以軍功晉鎮國公八年二月以軍功晉封九年八月薨諡襄襲詳鎮國將軍乾隆四十三年三月奉特㫖謙郡王瓦克達從前著有功績現無承襲之人著加恩瓦克達之子孫賞給一等鎮國將軍世襲罔替多羅信郡王多尼太祖皇孫追降多羅郡王多鐸子初襲詳親王順治九年三月降襲十八年正月薨諡宣和鄂扎多尼子順治十八年六月襲康熙四十一年十月薨董額鄂扎叔父順治十八年正月封多羅貝勒康熙十六年二月坐事削爵四十二年三月襲四十五年六月薨德昭鄂扎子康熙四十五年十月襲乾隆二十七年二月薨諡慤如松多鐸五世孫輔國恪勤公贈多羅信郡王功宜布子初封詳輔國公乾隆二十七年閏五月襲三十五年十一月薨諡恪多羅衍禧郡王羅洛宏太祖皇曾孫贈多羅克勤郡王嶽託子崇德四年九月以嶽託由親王降貝勒仍襲多羅貝勒七年三月坐事削爵八年五月復封多羅貝勒順治元年十月以軍功晉多羅衍禧郡王三年八月薨諡介羅可鐸羅洛宏子順治五年閏四月襲八年二月改號多羅平郡王康熙二十一年七月薨諡比訥爾都羅可鐸子康熙十八年正月封長子二十二年正月襲二十六年四月以罪削爵訥爾福羅可鐸子康熙二十四年正月封固山貝子二十六年五月襲四十年七月薨諡悼訥爾蘇訥爾福子康熙四十年十月襲雍正四年七月以罪削爵乾隆五年九月卒以多羅郡王禮殯葬富彭訥爾蘇子雍正四年七月襲乾隆十三年十一月薨諡敏慶寧富彭子乾隆十四年三月襲十五年九月薨諡僖慶恆固山貝子品級福秀子乾隆六年三月為伯父富彭後十五年十二月襲二十七年閏五月坐事降封詳固山貝子四十年閏十月復授郡王四十三年正月追復克勤郡王始封之號奉特㫖命現襲之平郡王復號克勤郡王四十四年四月薨子雅朗阿襲多羅郡王精濟太祖皇曾孫贈和碩親王祜塞子順治三年六月襲鎮國公尋晉封六年五月薨諡懷愍無襲原封多羅郡王塔爾納太祖皇曾孫原封和碩端重親王博洛子順治十四年正月封是年三月薨以父罪追削爵多羅安郡王瑪爾渾太祖皇曾孫和碩安親王嶽樂子康熙十六年正月封世子二十九年二月降襲多羅安郡王四十八年十一月薨諡慤華玘瑪爾渾子康熙四十九年二月襲五十八年九月薨諡節無襲原封多羅僖郡王嶽希太祖皇曾孫原封和碩安親王追降郡王嶽樂子康熙二十一年正月封三十九年十二月以父追降郡王降封鎮國公詳鎮國公原封多羅勤郡王嶽端太祖皇曾孫原封和碩安親王追降多羅郡王嶽樂子康熙二十三年正月封二十九年二月以父爵不世襲降封固山貝子詳貝子太宗系多羅溫郡王猛峩太宗皇孫和碩肅親王豪格子順治十四年正月封康熙十三年七月薨諡良佛永輝猛峩子康熙十三年九月襲十七年正月薨諡哀延壽猛峩子康熙十七年四月襲三十七年四月坐事降貝勒詳貝勒原封多羅惠郡王博翁果諾太宗皇孫和碩承澤親王碩塞子康熙四年正月封二十三年五月坐事削爵球琳博翁果諾孫雍正元年二月封多羅貝勒六年正月襲降削詳貝勒世祖系多羅裕郡王亮煥世祖四世孫裕端親王廣祿子乾隆五十一年降襲聖祖系原封多羅直郡王允禔聖祖皇長子康熙三十七年三月封四十七年十一月坐事削爵卒葬詳貝子多羅誠郡王允祉聖祖皇三子康熙三十七年三月封三十八年九月降多羅貝勒四十八年三月晉和碩誠親王詳親王雍正八年五月坐事削爵十年閏五月卒以多羅郡王禮殯葬乾隆二年十二月追諡隱原封多羅敦郡王允䄉聖祖皇十子康熙四十八年十月封雍正二年四月坐事削爵卒葬詳貝子多羅恂郡王允禵聖祖皇十四子康熙四十八年十月封固山貝子雍正元年五月晉多羅郡王三年十二月降固山貝子四年五月坐事削爵乾隆二年二月授奉恩輔國公品級十二年六月封多羅貝勒十三年正月晉多羅恂郡王二十年正月薨諡勤多羅愈郡王允禑聖祖皇十五子雍正四年五月封多羅貝勒八年二月晉封九年二月薨諡恪𢎞慶允禑子雍正九年六月襲乾隆三十四年十二月薨諡恭子降襲詳多羅貝勒多羅慎郡王允禧聖祖皇二十一子雍正八年二月封固山貝子五月晉多羅貝勒十三年十一月晉多羅慎郡王乾隆二十三年五月薨諡靖襲詳貝勒多羅理郡王𢎞㬙聖祖皇孫贈和碩禮親王允礽子乾隆元年二月封奉恩輔國公四年十月晉封四十五年薨襲詳貝勒多羅淳郡王𢎞暻聖祖皇孫和碩淳親王允祐子雍正五年四月封長子八年九月降襲乾隆四十二年七月薨諡慎子降襲詳多羅貝勒多羅寧郡王𢎞晈聖祖皇孫和碩怡親王允祥子雍正八年八月封乾隆二十九年八月薨諡良原封多羅泰郡王𢎞春聖祖皇孫多羅恂郡王允禵子初封詳貝子雍正十一年二月晉多羅泰郡王十二年八月降固山貝子詳貝子多羅諴郡王𢎞暢聖祖皇孫諴恪親王允祕子乾隆四十八年坐事降諴郡王多羅質郡王永瑢聖祖皇曾孫今上皇帝皇六子為多羅慎靖郡王允禧後乾隆二十四年十月封多羅貝勒三十七年十月晉封多羅恆郡王永皓聖祖二世孫和碩恆親王𢎞晊子乾隆四十年十月降襲世宗系多羅果郡王𢎞曕世宗皇六子為和碩果毅親王允禮後初封詳親王乾隆二十八年五月坐事降多羅貝勒三十年二月復封郡王是年三月薨諡恭永瑹𢎞曕子乾隆三十年六月襲多羅和郡王綿倫世宗皇曾孫和碩和親王永璧子乾隆三十七年九月降襲三十九年十一月薨諡謹綿循綿倫弟乾隆四十年正月奉特㫖襲今上皇帝系多羅履郡王永珹今上皇帝皇四子乾隆二十八年十一月襲封多羅履郡王四十二年二月薨諡端子降襲詳多羅貝勒多羅儀郡王永璇今上皇帝皇八子乾隆四十四年封多羅定郡王綿恩今上皇帝皇孫贈和碩定親王永璜子乾隆四十一年正月奉特㫖襲附贈多羅郡王贈多羅通達郡王雅爾哈齊顯祖皇四子順治十年五月贈贈多羅克勤郡王嶽託太祖皇孫和碩禮親王代善子封詳貝勒崇德四年四月贈贈多羅信郡王蘇爾發太祖皇曾孫多羅貝勒多爾博子封詳貝勒乾隆二十七年八月以曾孫如松襲封信郡王追贈塞勤蘇爾發子封詳輔國公乾隆二十七年八月以孫如松襲封追贈功宜布塞勤子封詳輔國公乾隆二十七年八月以子如松襲封追贈贈多羅循郡王永璋今上皇帝皇三子乾隆二十五年七月薨追贈四十一年正月奉㫖以綿懿嗣詳貝勒以上郡王長子聖祖系原封長子𢎞曙聖祖皇孫和碩淳親王允祐子雍正元年正月視其父初封郡王例封五年四月坐事削爵以上長子皇朝文獻通考卷二百四十六
