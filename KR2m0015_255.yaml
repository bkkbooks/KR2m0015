  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_255-1a, image: WYG0637/WYG0637-0879a.png}
body:
  text: 封建考十外藩封爵臣等謹按我朝聲教四訖幅員之廣超越前古蒙古内扎薩克以及喀爾喀青海厄魯特西藏回部咸以親王以下等爵爵之所以柔逺也間有仍留汗號者因其土俗以示寵異視王爵尤優特以冠諸卷首恩澤普汜大無外以翼戴中朝猗歟盛哉馭貴馭富之典侔於天燾地載矣若夫量材而授進退驅䇿裁自宸衷俾夫殊方逺徼既荷生成之帝徳兼凛震叠之皇威所由中外禔福以成億萬年無疆之休也天命十一年蒙古歸順其尊者賜號汗崇徳元年定諸藩爵六等一和碩親王二多羅郡王三多羅貝勒四固山貝子五鎮國公六輔國公秩視在内王公世襲罔替順治十三年八月勅諭䝉古四十九旗王貝勒貝子公等曰爾等當太祖太宗開創之時誠心効順結為姻婭請為屛藩太祖太宗嘉爾勲勞崇以爵號恩至渥焉朕荷祖宗鴻庥統一寰宇念爾等効力年久戰伐多功雖在寤寐未之有斁朕方欲致天下於太平爾等毋忘太祖太宗恩寵我國家世世為天子爾等亦世世為王享富貴於無窮垂芳名於不朽豈不休乎康熈三十年喀爾喀全部歸順土謝圖車臣扎薩克圖特賜留汗號餘封親王郡王貝勒貝子鎮國公輔國公等爵世襲三十五年覆准喀爾喀郡王有軍功者晉親王貝子有軍功者晉郡王雍正四年奉諭㫖厄魯特之官爵原因歸順聖祖仁皇帝特恩加授雖無世襲之㫖而伊等各有効力之處嗣後俱著降一等承襲如承襲人員或能守分勤謹克盡職業者仍將所降品級賞給乾隆二年奉諭㫖䝉古王扎薩克等當日襲封根源修譜奏聞理藩院議奏蒙古王扎薩克等原係太祖太宗時輸誠向化率屬歸附各論其所著勞績封為王貝勒貝子公編設旗分佐領其科爾沁等十旗之王以下在聖祖時皆因繫太皇太后皇太后婣戚曽將世次具奏今重加考訂其餘五㑹扎薩克等均俟造册奏聞並令外藩之喀爾喀青海厄魯特等覈明錫封根源襲爵世次造冊奏聞十七年奉諭㫖䝉古親王之長子賞給公品級郡王貝勒之長子賞給頭等台吉貝子公之長子賞給二等台吉將來承襲父爵如長子不稱襲爵欲於餘子内擇其優者以備將來襲爵著即報理藩院將朕加恩増賞之爵移授永著為例喀爾喀青海以下諸部封爵例喀爾喀以下王貝勒貝子公等其子孫或襲封原爵或減一等承襲由理藩院具奏候㫖襲封或降封臣等謹按外藩禄制亦如同異姓例詳見國用考俸餉門中汗科爾沁土謝圖汗奥巴天命十一年歸順賜號子詳親王喀爾喀土謝圖汗察琿多爾濟康熙二十八年歸順三十年五月賜號敦多布多爾濟察琿多爾濟孫康熙三十九年三月襲阿喇布坦多爾濟敦多布多爾濟叔父康熙四十一年六月襲旺扎爾多爾濟阿喇布坦多爾濟子康熙五十六年七月襲敦丹多爾濟旺扎爾多爾濟子雍正十年十月襲敦多布多爾濟敦丹多爾濟弟乾隆九年襲雅木丕勒多爾濟敦多布多爾濟兄乾隆十一年襲車登多爾濟雅木丕勒多爾濟弟乾隆二十四年襲喀爾喀車臣汗烏巴什康熙二十七年十二月歸順三十年五月賜號衮臣烏巴什子康熈四十八年三月襲車布登拜音珠爾衮臣子雍正六年十月襲垂扎布車布登拜音珠爾叔祖初襲詳郡王雍正十一年二月襲達瑪林衮臣子雍正十三年閏四月襲瑪尼巴達喇達瑪林子乾隆十六年襲車布登扎布瑪尼巴達喇弟乾隆三十二年襲喀爾喀扎薩克圖汗䇿旺扎布康熈三十五年五月歸順封和碩親王賜號汗雍正十年以罪削號格勒克雅木丕勒䇿旺扎布族弟初封多羅郡王雍正十年九月襲扎薩克圖汗巴勒達爾格勒克雅木丕勒子乾隆六年襲多羅郡王七年襲扎薩克圖汗齊旺巴勒齊巴勒達爾子乾隆三十五年襲青海遵文行義敏慧顧實汗順治十年封子詳親王杜爾伯特汗車凌乾隆十九年挈所部歸順封和碩親王二十一年賜號特古斯庫魯克達賴汗索羅木衮布車凌子乾隆二十三年襲瑪克蘇璘布索羅木衮布子乾隆三十四年襲舊土爾扈特扎薩克卓哩克圖汗渥巴錫乾隆三十六年來歸封䇿琳納木扎勒渥巴錫子乾隆三十九年襲西藏輔教恭順汗拉藏康熈四十四年封五十三年以準噶爾侵藏被害嗣絶以上汗和碩親王科爾沁和碩卓哩克圖親王呉克善崇徳元年四月封畢爾塔噶爾呉克善子康熈五年十一月襲鄂齊爾畢爾塔噶爾子康熈七年十月襲以罪削爵杜爾巴鄂齊爾叔父康熈二十一年襲巴特瑪杜爾巴子康熈二十七年三月襲阿爾坦格勒爾巴特瑪子雍正三年五月襲扎木巴爾扎木素阿爾坦格勒爾子乾隆二年襲貢格喇布坦扎木巴爾扎木素子乾隆二十六年襲科爾沁和碩土謝圖親王巴達禮土謝圖汗奥巴子崇徳元年四月封巴雅斯呼朗巴達禮子康熈十一年五月襲阿喇善巴雅斯呼朗子康熈十三年八月襲以罪削爵沙津阿喇善叔父初封詳貝勒康熈二十七年二月襲以罪削爵四十一年五月仍以阿喇善襲鄂爾齋圖阿喇善子康熈五十一年二月襲阿喇布坦鄂爾齋圖子康熈五十九年七月襲垂扎布阿喇布坦子乾隆十四年襲那旺垂扎布子乾隆三十二年襲拉什那木扎勒那旺弟乾隆三十三年襲諾爾布林沁拉什那木扎勒子乾隆四十七年襲科爾沁和碩達爾漢親王滿珠習禮崇徳元年四月叙從征功封多羅巴圖魯郡王順治十六年五月晉封和塔滿珠習禮子康熈四年七月襲班第和塔子康熈十年三月襲羅布藏衮布班第子康熈四十九年十一月襲色布騰巴爾珠爾羅布藏衮布子初封詳輔國公乾隆十七年七月襲二十年九月坐事削爵二十三年四月以軍功特恩復封和碩親王色旺諾爾布色布騰巴爾珠爾兄乾隆二十年九月襲旺扎勒多爾濟色旺諾爾布子乾隆三十九年襲烏珠穆沁和碩車臣親王多爾濟崇徳六年八月封察罕巴拜多爾濟孫順治三年十二月襲蘇達尼察罕巴拜子順治十五年九月襲色登敦多布蘇達尼兄子康熈三十年襲阿喇布坦那木扎勒色登敦多布子雍正十二年七月襲朋楚克拉布坦阿喇布坦那木扎勒子乾隆十三年襲瑪哈索哈朋楚克拉布坦子乾隆四十一年襲喀爾喀右翼和碩達爾漢親王本達爾順治十年三月歸順封諾内本達爾子康熈九年八月襲子降襲詳貝勒喀爾喀和碩三音諾顔親王善巴康熈三十年五月歸順封多羅郡王三十五年六月以軍功晉封達什敦多布善巴子康熈四十六年襲喇嘛扎布達什敦多布子雍正四年六月襲坐事削爵徳沁扎布喇嘛扎布弟雍正十一年二月襲諾爾布扎布徳沁扎布子初封固山貝子乾隆二十七年襲五十一年告休子車登扎布襲喀爾喀和碩親王敦多布多爾濟多羅郡王噶爾丹多爾濟子康熈三十一年襲多羅郡王晉和碩親王四十一年降多羅郡王雍正元年二月以軍功仍晉和碩親王額林沁多爾濟敦多布多爾濟子乾隆八年十一月襲坐事降固山貝子襲詳貝子喀爾喀和碩智勇親王丹津多爾濟多羅貝勒西達什里子康熈四十五年襲多羅貝勒雍正元年二月以軍功晉多羅郡王八年以軍功晉和碩親王十年九月賜號智勇十一年七月坐事降多羅郡王乾隆元年以軍功仍晉和碩親王三齊多爾濟丹津多爾濟孫乾隆三年十一月襲多羅郡王二十年以軍功晉和碩親王三十年坐事削爵復封詳郡王喀爾喀和碩超勇親王策楞雍正元年二月以軍功封多羅郡王九年十月以軍功晉和碩親王十年九月賜號超勇薨諡襄成衮扎布䇿楞子乾隆元年封固山貝子四年封世子十五年襲和碩親王三十六年卒子固倫額駙拉旺多爾濟襲喀爾喀和碩親王齊巴特雅喇木丕勒多羅郡王成衮扎布子詳貝勒乾隆十二年十一月襲多羅郡王二十一年以軍功晉和碩親王四十一年卒子齊巴克多爾濟襲喀爾喀和碩超勇親王品級多羅郡王車布登扎布雍正十年以軍功封輔國公乾隆十九年以軍功晉固山貝子品級二十年以軍功晉多羅貝勒二十一年以軍功晉多羅郡王二十三年以軍功晉和碩親王品級四十七年卒子薩木品爾多爾濟襲喀爾喀和碩親王衮楚克扎布郡王車木楚克扎布子乾隆四十六年晉封青海和碩親王扎什巴圖爾顧實汗子康熈三十七年正月歸順封羅布藏丹津扎什巴圖爾子康熈五十五年十二月襲雍正二年以叛削爵準部平偕二子就俘免罪官其子青海和碩親王戴青和碩齊察罕丹津康熈四十年正月歸順封多羅貝勒五十八年三月晉多羅郡王雍正元年二月以西藏軍功晉和碩親王旺楚克戴青和碩齊察罕丹津族孫雍正十三年襲旺丹多爾濟帕勒瑪旺楚克子乾隆十四年襲三十六年卒無嗣伊姪降襲郡王杜爾伯特和碩親王車凌烏巴什乾隆十九年歸順封多羅郡王二十年晉封和碩親王阿拉善厄魯特和碩親王羅布藏多爾濟多羅郡王阿寶子乾隆四年襲多羅貝勒二十二年以擒巴雅爾功晉封多羅郡王三十年以軍功晉封旺親班穆巴爾羅布藏多爾濟子乾隆四十九年襲舊土爾扈特和碩布延圖親王䇿伯克多爾濟乾隆三十六年來歸封竒哩布䇿伯克多爾濟弟乾隆四十四年襲附察哈爾和碩特班珠爾拉藏汗孫乾隆十九年來歸封郡王晉親王尋以叛誅臣等謹按厄魯特部内之綽羅斯汗達瓦齊自乾隆二十年大兵致討全部内屬獻俘闕下聖恩寛大宥罪錫封優以親王爵號所謂除逆奬順以風逺人也降王入侍不列外藩特附諸異姓封爵之末其子郡王羅布扎以及回部之郡王品級霍集斯以下諸人亦附焉以上親王世子喀爾喀原封世子多爾濟色布騰和碩智勇親王丹津多爾濟子雍正十年十月封十一年七月削爵喀爾喀世子占楚布多爾濟和碩親王成衮扎布子乾隆二十二年封二十九年卒停封喀爾喀世子拉旺多爾濟和碩親王成衮扎布子乾隆二十九年封三十六年襲親王以上世子多羅郡王科爾沁多羅氷圖郡王孔果爾崇徳元年四月封額森孔果爾子順治三年三月襲額濟尹額森子康熈五年九月襲達達布額濟尹子康熈三十五年襲伊什班第達達布子康熈四十六年十一月襲拉特納扎木素伊什班第子乾隆十一年襲桑對扎卜拉特納扎木素子乾隆四十一年襲子羅布藏彰三乾隆四十七年襲科爾沁多羅扎薩克圖郡王布達齊崇徳元年四月封拜斯噶爾布達齊子順治二年九月襲鄂齊爾拜斯噶爾子順治十四年襲薩胡拉克鄂齊爾子康熈五十七年九月襲沙津徳爾格爾薩胡拉克子雍正九年六月襲納旺色布騰沙津徳爾格爾子乾隆十四年襲子拉什端羅布乾隆四十九年襲科爾沁多羅郡王竒塔特順治六年九月封額爾徳尼竒塔特子順治十年八月襲畢禮克圖額爾徳尼子康熈十五年六月襲諾們額爾赫圖畢禮克圖子康熈四十九年十一月襲阿旺藏布諾們額爾赫圖子乾隆八年襲拉什噶爾丹阿旺藏布子乾隆二十四年襲科爾沁多羅郡王彰吉倫贈多羅貝勒棟果爾子初襲鎮國公順治五年四月晉多羅貝勒七年三月晉多羅郡王布達禮彰吉倫子康熈三年七月襲扎噶爾布達禮子康熈二十三年九月襲岱布扎噶爾子康熈二十四年十月襲阿喇布坦岱布子康熈四十九年十二月襲羅布藏喇什阿喇布坦弟康熈五十五年九月襲齊黙特多爾濟羅布藏喇什子乾隆三年襲巴勒珠爾齊黙特多爾濟子乾隆四十七年襲索特納木多布濟巴勒珠爾子乾隆四十八年襲敖漢多羅郡王班第崇徳元年四月封墨爾根巴圖魯温布班第子順治四年七月襲扎木素墨爾根巴圖魯温布子康熈十一年十二月襲垂木丕勒扎木素子康熈四十七年十一月襲垂濟拉什垂木丕勒子乾隆十五年襲巴特瑪喇什垂濟拉什子乾隆三十三年襲巴