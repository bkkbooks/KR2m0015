body:
  text: 選舉考四舉士乾隆元年議准㑹試與順天鄉試內簾主考同考官除同姓無服者與郎舅中表等戚不必回避外其有服之同姓與翁壻甥舅皆令回避不行開出者革職奉特㫖考試回避卷自雍正二年暫行之後不著為例至是禮部奏請今科㑹試其內外簾執事官員子弟應否准令一體考試將試卷另封進呈得㫖內外簾官子弟應行回避者著另行考試乾隆元年㑹試及鄉試恩科准於常額之外寬餘取中以示鼓勵其作何另行考試出榜之處著禮部速行妥議具奏尋議回避子弟應請仍於闈中一體考試另編坐號歸於一處以便稽查其試題㑹試由禮部堂官鄉試由順天府府尹先期奏請欽定四書三題於初八日密封轉交場內刋刻給散經題及二三場仍用闈中之題一體考試至彌封之後另編字號滿洲蒙古漢軍卷面上俱列旗字其餘各省分照鄉試之例於卷面上分别南北字樣禮部奏派大臣校閲所取試卷恭候欽定於出榜之前發㑹試由禮部堂官鄉試由順天府府尹捧入場內轉交內簾主考官酌量名次叙入榜內又兵部尚書傅鼐奉諭㫖朕聞今科㑹試遺卷內尚有佳卷今場事已竣應如何加恩增中爾可㑹同大學士鄂爾泰朱軾議奏尋議請派大臣再行校閲棟選進呈又奏請今科㑹試各省年老舉人八十嵗以上劉振起等三人七十五嵗以上馬應龍等五人七十嵗以上李琬等十五人七十嵗宋士正等二十人謹繕清單請將各卷查閲有可入選者檢出進呈並得㫖報可大學士鄂爾泰等遵㫖校閲㑹試闈中未經取中之薦卷擇其尚可續取者共計三十卷暨年老舉人試卷內選出五卷一并進呈奉諭㫖交禮部照所擬名次出榜又禮部議准翻譯科鄉㑹試題於欽奉諭㫖內選擬日久易於重復嗣後翻譯鄉㑹試令主考於性理精義及小學內選擇數行俱不得過三百字密封進呈恭候欽定為題其考試生員並於性理小學內出一題考試其蒙古翻譯科鄉㑹試及考試生員亦於清文性理小學內照例出題但以翻譯性理小學坊間廣有若平時記誦或懷挾抄寫以圖僥幸則士子不知究心文理終於翻譯未能精通殊非拔取真才之意嗣後翻譯鄉㑹試主考㑹同房官於性理精義小學每一題後括其大義總論數語令士子一同翻譯又禮部奉諭㫖雲南貴州廣東廣西四川福建六省舉人赴京應試未經中式者著照雍正十一年之例揀選奏聞其上次記名二十一人一并入於此內請㫖旋於五月內引見發往各省以知縣試用再行題請實授以主事用者一人以教職用者四人又奉諭㫖今嵗八月舉行恩科鄉試其正副考官必人品端方學問醇正者始足膺衡鍳之寄朕即位之初不能深知諸臣之底藴著張廷玉鄂爾泰朱軾徐本邵基任蘭枝徐元夢福敏孫嘉淦楊名時於翰林科道部屬內各據所知多舉數員於五日內交送內閣彚奏候朕考試簡用庶得才品兼優之員以副掄才之典嗣經考試一二等人員皆引見記名兼以道府同知補用數員又准捐納候選之貢監得與鄉試舉人得與㑹試又奉諭㫖向來進士候選但於雙月銓補嗣因人多壅滯准於單月亦立班選用近來進士已經疏通不過需次二三年即可得缺惟舉人選班壅積日久現今猶需次至二十年方可得缺以致中年登科者至精力就衰之時方膺民社難收實效朕思進士已經疏通應仍照舊例但於雙月銓補其進士單月班次應改用舉人銓選亦屬疏通舉人之一法交吏部查議尋議銓選舊例知縣員缺雙月用進士五人舉人五人捐納四人推升三人單月用應補四人捐納四人舉人四人續於雍正二年九卿議覆原任侍郎沈近思條奏進士選用知縣止於雙月十七缺內選用五人往往候至十餘年尚多壅滯請將進士入於單月分內選用四人叙於舉人之前以十六缺為一班照科分名次銓選近年進士已得疏通惟各省舉人每科中式者必待二十餘年方可得缺未免壅滯臣等悉心酌量現在癸丑丙辰進士候選知縣者已有四百餘名且丁巳年恩科㑹試在邇候選進士為數亦復不少若將進士單月班次改為舉人銓選則一年內所用進士不過二十餘名恐積至數年後又未免於壅滯查銓選知縣班次雙月用捐納四人單月用捐納四人今捐納條例已經奉㫖悉行停止雙單月捐納知縣為數無多請嗣後現在雙單月捐納人員不敷班次之數即以舉人抵補一二年間捐納人員用完之後則捐納班次盡歸舉人選用總計雙月知縣十七缺之內舉人可選用九缺單月十六缺之內舉人可選用八缺如此則舉人選用知縣已倍於進士自可及時效用於銓法既得均平而科甲兩途俱無壅滯矣從之加年老下第舉人以國子監助教學正及內閣中書職銜又議准順天鄉試皿字號分南皿北皿中皿字號取中順天鄉試除北皿南皿字號照舊額各取三十九名外其雲南貴州四川廣西另編中皿字號十五名取中一名如零數過半者亦准加中一名如人數不及十五名仍附入南皿無庸另編中皿字號臣等謹按順天闈中分編字號名目以辨省分曰貝字號則直𨽻之生員也曰北皿字號則奉天直𨽻山東山西河南陜西之貢監生也曰南皿字號則江南江西浙江福建湖廣廣東之貢監生也曰中皿字號則雲南貴州四川廣西之貢監生也曰夾字號則奉天是也曰旦字號則宣化是也曰鹵字號則天津商籍之赴試者也而山東省闈中有耳字號則孔顔曾孟四氏也陜西省闈中有丁字號謂寧夏府也有聿字號謂甘肅也福建闈中有至字號謂臺灣也於試卷送入內簾時畫疆分界因地取材以平解額庶不致豐兹嗇彼贏絀懸殊有得失偏枯之患也又定揀選咸安宫教習例向例內廷教習將考取之新進士與恩拔嵗副貢生分缺間補至是議准咸安宫教習應於新科進士內𫝊問有願充內官學教習者令其報名禮部㑹同吏部揀選引見陸續充補三年期滿該總管將稱職之員分别等第引見或授為主事或授為即用知縣恭候欽定乾隆二年奏准嗣後咸安宫漢教習仍於新進士內加以考試選用如新進士不敷用於明通榜舉人及各省舉人內考取咨送充補其所選進士俟三年期滿詳加分别等第帶領引見咨部仍照禮部原議以主事知縣即用舉人以知縣教職即用定博學鴻詞試題之例吏部議覆御史吳元安奏言薦舉博學鴻詞原期得湛深經術敦崇實學之儒始足副淹雅之稱膺著作之選蓋詩賦雖取兼長而經史尤為根柢若徒駢綴儷偶推敲聲律縱有文藻可觀終覺名實未稱應如該御史所請考試博學鴻詞定為兩場首場試以經解一篇史論一篇二場照例試以詩賦論三題皆許自辰至酉夜則准其繼燭以盡其長疏上如議行又禮部揀選八旗直𨽻各省拔貢生一百四十四名引見分别録用知縣佐二教官又考試博學鴻詞欽取十五人分别選授翰林院官先是雍正十一年四月奉諭㫖朕惟博學鴻詞之科所以待淹通之士俾之膺著作之選備顧問之任聖祖仁皇帝康熙十七年薦舉博學鴻詞召試授職迄今數十年來未嘗廣為搜羅以示鼓勵朕延攬維殷闢門籲俊敦崇實學諭㫖屢頒宜有殫見洽聞足稱博學鴻詞之選者所當特修曠典嘉與旁求在京著滿漢三品以上各舉所知彚送內閣在外督撫㑹同該學政悉心體訪遴選考驗保題送部轉交內閣朕將臨軒親試優加録用至是內外諸臣保薦陸續到部凡考試事宜俱如康熙十八年例經大學士鄂爾泰等奏請考取一等五名授以翰林院編修二等十名內由科甲出身者授以翰林院檢討未經中舉者授以翰林院庶吉士奉諭㫖依議次日帶領引見劉綸潘安禮諸錦于振杭世駿俱授編修陳兆崙劉藻夏之蓉周長發程恂俱授檢討楊汪度沈廷芳汪士鍠陳士璠齊召南俱授庶吉士次年又補試博學鴻詞一等一名二等三名萬松齡張漢授為檢討朱荃洪世澤授為庶吉士二年吏部議准御史程盛修奏言翰林地居清切所以備顧問司紀載任綦重也然欲得通才務端始進自保舉之例行而呈身識面廣開請託之門額手彈冠最便空疏之輩臣愚以為亟宜停止查近科以來新進士於榜後先令九卿保舉然後帶領引見選用庶常原為慎重之意但新科進士俱係未經出仕之人九卿等原不能深知不過就其有志讀書堪以造就者即行舉出行之既久其中或有冒濫亦未可定應如所奏嗣後新進士停其保舉從之又吏部議准御史程盛修奏請停榜後額外主事之用以杜冗濫查向例新進士引見時除選用庶吉士外其餘俱歸吏部以中書知縣等官銓選嗣奉特㫖分發各部令在額外主事上學習行走現在各部主事之學習者甚多銓補未免壅滯應如所請嗣後新科進士除選用庶吉士外俱令歸吏部以應得之官按班次銓選無庸分發各部從之又以恭逢恩詔凡貢生監生每年仍派大臣官員考定職銜照舊例送吏部注冊又奉諭㫖汪漋所奏考試新進士時應令其將本處當行之事各據所見明白陳奏王大臣等議以歷科考試進士具有成式無庸更張朕思古來帝王為治不棄芻蕘況伊等既成進士皆係讀書之人於地方利弊或有確見亦未可定今年考試進士仍照舊例出題若伊等有願將地方事件敷陳者准其據實條奏閲卷大臣等擇其言有可採者進呈朕覽又奉諭㫖滿洲進士選授庶常向例俱學習漢書去年因徐元夢條奏滿庶吉士復令分習清書朕思滿語係滿洲自幼所習只須漢文通順人人皆能翻譯且受職之後自可令辦翻譯之事清文亦不致荒廢何必於選館之時専令學習乎嗣後滿洲庶吉士習清書之例著停止又奉諭㫖從前世宗憲皇帝軫念八旗滿洲蒙古漢軍前鋒護軍另户領催披甲間散內有能翻譯及繕寫清書之人例不准考無有進身之階承特降恩㫖考試著交吏部照前考試內有最優者揀選具奏請㫖三年上詣太學行釋奠禮大學士鄂爾泰等奉諭㫖觀禮三十一人俱准入監讀書國子監本科鄉試照雍正二年例廣額十八名又議定翻譯鄉㑹兩試欽命翻譯一題外再於清文書內欽命一題令士子作清文一篇其試題仍照例由正副主考官選擬數條密封進呈恭候欽定其清文體式照依漢文論體又奉諭㫖朕聞各省現任教職若中進士現任訓導若中舉人副榜則有應用之缺便離原有之任以待銓補而銓補往往遲延動輒數載是一中之後轉令退居間散矣推求其故蓋以從前品級相懸故定例令其離任今教職品級既已加增則離任之例亦應酌量變通以示鼓勵嗣後現任教諭㑹試得中進士例應歸班者仍令回原任以教授銜管教諭事現任訓導鄉試得中舉人副榜者仍回原任以教諭管訓導事若遇該員本班應選時仍照常銓選遇卓異薦舉亦照銜升轉將此永著為例又大學士伯鄂爾泰等奏臣等衙門滿洲中書每旗額設九員八旗共七十二員內分𨽻滿本房四十員専司繕寫清字上諭敕書奏摺本章各壇廟祝版及匾額碑文分𨽻漢本房三十二員専司翻譯上諭奏摺本章滿漢本房事務繁多額設中書不敷應用是以屢經諸臣條奏滿本房增設貼寫中書二十四員例由臣衙門㑹同吏部堂官於貢監生員官學生義學生內考試能清字者補用漢本房增設貼寫中書十六員例由臣衙門㑹同吏部堂官於翻譯記名人員內考試能翻譯者補用至滿漢本房中書缺出即於滿漢本房貼寫中書內挨次補用今吏部以文舉人翻譯舉人及各部院筆帖式升遷壅滯請於每旗中書九缺內分出四缺按旗論俸補用文舉人及翻譯舉人出身之筆帖式其餘五缺仍用貼寫中書其貼寫中書缺出停其考取貢監生員官學生義學生人等於各部院現在有品級筆帖式并閒散文舉人翻譯舉人內揀選咨送內閣㑹同該部堂官選補查得滿漢本房中書所司之事關係緊要若不考試清字翻譯只按旗論俸挨次補用恐才不稱職轉致有誤臣等請將應用旗分之文舉人翻譯舉人出身之筆帖式公同揀選能翻譯繕寫清書用為滿本房中書能翻譯者用為漢本房中書如此則仍於吏部原奏相符而補用人員各稱其職從之又吏部奏舊例各項貢監生考職於每年四月內投文五月內考試續因各省考職人數甚少間有遲至二三年考試一次者嗣後應請於鄉試之年仍照舊例定期於五月內考試行令各省督撫如有情願赴考貢監生給咨務於三月內到部則各省赴考貢監既有定期可免守候之虞矣從之又大學士伯鄂爾泰議覆御史程盛修奏請中式進士之京官歸班銓選一條查七品以下京官中式進士或以內用或以知縣即用者該衙門即移㑹吏部開缺其歸班選用者仍留原任之處尚未著有定例應如該御史所奏嗣後七品以下京官中式進士除選授庶常外俱令仍留原任從之又奉諭㫖武英殿寫字需人著尚書趙國麟等在國子監肄業之正途貢生內看其年力精壯字畫端楷情願效力者選取十人送武英殿以備謄録繕寫之用俟行走數年該管王大臣秉公具奏酌量議叙四年陜西學政嵩夀奏嵗科兩試於四書經義外摘録本經四五行令生童作講義一段以定優劣如童生中有能背誦五經兼能講義者書藝即屬平通亦量行録取以示鼓勵得㫖允行定補行殿試例監察御史霍備奏補行殿試人員應將試卷一體進呈御覽毋庸分别從之又奉諭㫖向來新科進士於殿試之前有呈送頌聨之陋習近來此風又覺漸熾夫士子進身之始即從事於請託奔競則將來服官尚安望其有所樹立以備國家之用而大臣等亦宜精白乃心絶請託之私為國家培正材該部出示曉諭嚴加禁止倘有違㫖仍蹈故轍者經朕訪聞或科道官參奏必將與受之人一體從重治罪尋以士子進身之始即習為獻諛之詞尤非導之以正古人對䇿中無此體裁殿試之期上親製䇿問試題不拘舊式以免諸生預先揣摩諸生䇿內不許用四六頌聨但取文理明通敷陳切當不必泥於成格限於字數因此次試期已近倘有不畫一處亦不以此為去取又賜翻譯人員進士出身以主事等官分别録用先是禮部題准翻譯鄉試已厯六科文舉人能翻譯者亦准入場人數衆多請於乾隆己未年八月舉行㑹試其㑹試事宜照題定則例辦理請派御史四員専司巡察至是取中翻譯進士滿洲二十名蒙古二名奉諭㫖今年翻譯㑹試取中二十二人雖從前有照例殿試之議但此科人數甚少不必舉行殿試俱著賜進士出身吏部帶領引見候朕酌量録用其優者以六部主事即用次者在主事上學習行走該堂官照例題補又次者照滿洲進士例選用內有現任者即在任候升不必出缺六年奉諭㫖滿漢進士原屬一體嗣後滿洲進士亦著照依甲第名次選用知縣俾其漸悉民瘼學習外任之事又奉諭㫖科場懷挾之弊例禁甚嚴今鄉試在邇聞得外間不肖士子故智復萌預先賃倩善寫細字之人鈔録文藝為入場夾帶之具若不嚴行禁止則僥幸獲售者必多而真才轉致黜落於掄才大典甚有關係著步軍統領五城御史出示曉諭並密行查拏至入場之時監試御史等必須嚴加搜檢不可虛應故事臨期朕或另遣人看視倘有寬縱疏漏之弊必將該管官員從重議處又定順天鄉試同考分校例先是給事中朱鳳英奏請順天鄉試同考官照㑹試分省回避之例北籍祇閲南卷南籍祗閲北卷經部議以房官南北籍人數不一分閲之卷多寡不齊難以均派未便准行兹奉諭㫖部議祗將南北二皿較論固難分派若將通場滿漢生員貢監各卷併數合算自無不均之處且立法必期無間而防範不嫌過周與其留滲漏以滋弊端無寧嚴界限以絶物議嗣後順天鄉試同考官南省人概令回避南皿卷北省人概令回避北皿卷邊省人概令回避中皿卷滿洲漢軍概令回避滿字合字卷如此分别可以清弊竇而息浮議亦防微杜漸之道也七年奉諭㫖國家於科目取士之外又有拔貢一途所以收未盡之人材以廣備用之數也我朝教澤㴠濡人文日盛又復屢開恩科加添中額是以所取進士濟濟多人而舉人皆日積日衆竟有需次多年而不得一官者此亦事勢之必然無足怪者朕為此時厪於懷屢籌疏通之䇿若又添取拔貢以分其缺數年一次舉行則人愈多而缺愈少舉人銓選更遙遙無期矣朕思拔貢乃係生員中之優者夫既為文學華瞻之清襟則應科舉時自可脫頴而出又不専籍選拔以為呈身之路也查從前選拔或數十年一舉或二十年一舉今則六年一舉為期太近理應酌量變通嗣後著定為十二年選拔一次永著為例再者各省應試生員貢監由學臣録送入場向例每舉人一名額取科舉三十名嗣後加至一百名亦不為不多矣且學臣等博寬大之名於科舉之外遺才大收一概録送且有督撫好行其德普收送考者以致文理荒疏之人皆得濫冒入場試卷太多不但於試官倉猝之中難於别擇即浮薄之士子將以觀光為游戲而不復攻苦於寒窗於賔興大典甚有關係嗣後學臣各宜留心慎重辦理毋得濫溢永著為例又大學士等奏本月考選中書請派閲卷大臣四員照吏部考試貢監例咨行都察院派滿漢監試御史二員臣等派侍讀典籍各一員俱先一日同閲卷大臣入貢院請題散卷扄試至一切供應人役物件并令順天府備辦事竣報銷從之八年奉諭㫖考取之宗室玉鼎柱達麟圖福喜俱准作進士與乙丑科㑹試中式之人一體殿試引見或選入翰林或以部屬等官補用候朕臨時降㫖嗣後俱照此例行又准八旗進士考試教習滿洲文進士翻譯進士向無考試八旗教習之例至是禮部奏請准其一體考試又奉諭㫖朕聞修書各館謄録人員內竟有不能繕寫之人夤緣而進及上館之後轉行倩募以致承修各書不能刻期告竣夫國家開館纂修典制綦重書成之日謄録人員亦有議叙録用之例何得將不能繕寫之人濫行充補從前滿洲翻譯謄録亦由各館自行挑補後御史觀音保條奏請簡派大臣考試選取送館經部議行嗣後各館漢謄録需人亦應另派大臣秉公考取送館録用下部定議嗣後各館需用漢謄録人員亦照考取滿洲翻譯謄録人員之例將舉人恩拔副嵗貢生及捐納貢監情願考試者行文禮部國子監送部考取挨名頂補九年監察御史錢度奏貢監考職向例不論文字優劣盡行録取殊為未協請敕下考試大臣務擇其文理優通者酌量録取寧少無多水著為例從之又奉諭㫖向來莊考同考官之子俱令回避雍正年間准其一體應試亦未著有定例朕看來各科回避生多寡不一若遇人少之年則入彀甚易於科場條例亦不畫一嗣後不必一體考試又奉諭㫖順天府尹蔣炳條奏外省覆試一事朕已降㫖允行但如何覆試之處未曾奏及各省難以奉行科場取士首重四書文士子之通與不通總不出四書文之外應令該督撫㑹同學政出閒冷二題當面考試聽其盡一日之長試畢即將原卷與中式卷一併解部聽候磨勘又命減直省中額十分之一十月上幸貢院周覽號舍賦詩四首翰苑瓊筵酌令辰棘闈來閲鳳城闉百年士氣經培養寸晷簷風實苦辛自古曾聞觀國彥從今不薄讀書人白駒翽羽𫝊周雅佐我休明四海春盡道文章接上台菁莪樂育濟時才千秋得失非虛也咫尺雲泥亦幻哉若有淚眶啼桂落那無笑口對花開鳳池多少簪毫者都向龍門燒尾來萬里扶搖正翮搏飛龍利見豈為干志賢聖志應須立言孔孟言大是難見說經綸推國士從來桃李屬春官但令姓氏朱衣㸃那惜三條燭淚殘周遭闈棘院沉沉景物當前總入吟才擬圭璋方特達文歸雅正薄艱深禹門魚變辭凡水喬木鶯遷出故林寄語至公堂裏客莫教氷鑑負初心臣等謹按禮部有貢院自唐開元始我朝鄉試由京師至各省為試院凡十有五而京師首善之地且天下人文所㑹集也每當貢舉之期恭請欽定試題鄉試則順天府尹㑹試則知貢舉官恭捧黃匣扄鐍封識甚嚴至聚奎堂門外考官跪接以進仰黃封之下賁不啻咫尺天顔已為榮幸自古迄今未聞有親幸試院賦詩題壁俾海內窮簷白屋之士咸得仰誦天章撫臨而慰勉之者惟我皇上右文養士夀考作人自翰院賜宴羣臣鑾輅回鑣駕臨貢院親灑宸翰賦詩四章朂多士以志聖賢之志言孔孟之言從此海宇士子當風簷握管時凛然謹遵聖訓皆時有重規疊矩在其心目間夫鈎章棘句既非承平雅頌之音而縟綵膚詞亦乖先正清真之義屢蒙諭㫖諄諄又欽定四書文為之正鵠撤棘以還即加磨勘然後知體㑹聖賢語氣之難誠有如御製詩中所示者近年以來鄉㑹試卷稍知檢束爭自濯磨皆我皇上御製鴻章有以感動警發持斯文之風㑹潛移密運不知其然而然彼夫九轉丹成三條燭盡唐人篇什載之通考中豈得與咸英韶濩之音卿雲糾縵之辭相比儷哉臣等編次所及謹拜手稽首而敬志之敕文武鄉㑹試外考取中書筆帖式謄録教習及貢監考職俱於午門考試十年奉諭㫖三載賔興國家舉賢右文之大典必諸弊悉去然後可以拔取真才所謂稂莠不剪則嘉禾不生其理顯然厯來查弊之法不得不嚴者此正慎重科名厚待良士之道昨嵗朕親臨貢院遍觀堂所周覽號舍矮屋風簷備極辛苦深可軫念比賦四詩令刋堂壁可以知朕心矣今嵗㑹試已展期三月以待春溫嗣後即以為例兹特預降㫖命禮部侍郎楊錫紱知貢舉俾得先期計議從容料理楊錫紱可仰體朕心當嚴則嚴當寬則寬於釐剔弊端之中寓優恤士子之意二者相成不相悖也即如蠟燭一事因有燭中夾帶之弊是以改為官給若向舉子多索價值則不可或蠟少而蠟質不堅則更不可朕姑舉一節以類其餘知貢舉者其善為之尋以搜檢懷挾例去皮衣禓襲而㑹試風簷之下非衣裘不足以禦寒停止皮衣去面氊衣去裏之例停止榜後㨂選舉人例先是大學士九卿等定議於每科㑹試發榜之後揀選年力强健質地明白者列為一等以縣令用若年力精神堪司教職者列為二等以正諭銓選其應用訓導者與嵗貢分缺選補至年力衰邁者以應得之缺休致奉諭㫖人材難以預料若一經驗看即為定衡則入選者焉保其必稱循良更恐逾時或又不堪任用況才具尚不能一望而知而心術又豈能外觀即定所可知者不過年嵗狀貌耳與其定於數年之前不若審於選官之日今當㑹試之年士子雲集初次揀選人數必多恐汰除者衆此等舉子未免絶其上進之望兼非鼓舞人材之意向來月選之後原有九卿驗看之例引見之時朕又量材改調或補教職或令休致臨時自可區别毋庸預為揀擇著將新定㑹試榜發揀選之例停止嗣後惟令九卿秉公驗看詳慎去取勿狥情面勿事姑容俟朕於引見時再加酌定自不使庸材濫司民社而吏治亦可收得人之效矣又奉諭㫖三月㑹試已著為定例則殿試之期自應酌量變通著自今科為始於四月二十六日殿試五月初一日𫝊臚該部即通行曉諭知之又奉諭㫖雍正五年㑹試榜發之後下第舉人曾蒙皇考恩㫖派出大臣檢閲落卷將其文理明通者各省取數十人再驗看人材年齒發往以教職補用朕即位以來亦曾舉行今科㑹試舉人較多往嵗且積習一除士風丕變應加恩以示鼓勵著出榜後將落卷封貯該部請㫖派出大臣秉公閲看選取發往各省畀以司鐸之任其有年逾八十以上者該部帶領引見朕將優惠也又奉諭㫖國家設制科取士首重者在四書文蓋以六經精微盡於四子書設非讀書窮理而欲握管揮毫發先聖之義藴不大相徑庭耶我皇考有清真雅正之訓朕題貢院詩云言孔孟言大是難乃古今之通論非一人之臆說也近今士子以科名難以幸獲或故為艱深語或矜為俳儷詞爭長角勝風簷鎖院偶有得售彼此倣效為奪幟爭標良技不知文風日下有關國家掄才大典非細故也古人論文以渾金璞玉不雕不琢為比未有穿鑿支離可以𫝊世行逺者至於詩賦不免組織渲染亦必有真氣貫乎其中乃為佳作今四書文採綴詞華以示淹博於孔孟立言相去萬里矣先正具在罔識遵循習俗難化職此之故嗣後令各省學政時時訓飭鄉㑹考官加意區别凡有乖於先輩大家理法者即擯棄不録則詭遇之習可息士風還淳朕有厚望焉該部通行曉諭中外知之又吏部帶領本年中式滿洲蒙古翻譯進士安福等十九員引見分别録用有差十二年奉諭㫖向來鄉㑹試之年不准條陳科場事務蓋欲使士子心誦讀不便分更成例以擾其心且亦防弊之一端立法甚善夫三年之內何時不可言而必待場期已近紛紛陳奏耶孫宗溥摺交部暫存俟科場事畢另行議奏嗣後如有似此違例條奏者必交部察議並𫝊諭科道等知之又廣各直省鄉試録科額數故事學臣科試之後復取遺才録遺之後督撫又有大收取送甚濫是以議有科舉定額每舉人一名大省録取八十名中省録取六十名小省録取五十名上以前議但就正榜定額尚有副榜未經議及著再加恩准於每副榜一名大省加取四十名中省加取三十名小省加取二十名令各學政於考試遺才時不論生員貢監亦不拘縣分大小但就文理明通者照數録送入場十三年奉諭㫖朕此次東巡加恩士類已令增廣入學名數復念十三氏子孫逺承世緒濟濟膠庠其中當有文學可觀讀書立品之彥宜加甄拔以廣恩施其令該學政考驗其文行兼優者數人咨送禮部貢入成均示鼓勵焉其引駕官孔繼汾朕看其人尚可造就著加恩以內閣中書用十五年定房考分經之法房考入闈照舊掣籖分經其一經之內房考有籍同省者主考官臨時酌量對調閲看他經十六年奉諭㫖朕省方觀民南巡江浙羣黎士庶踴躍趨迎就瞻恐後紳士以文字獻頌者載道接踵愛戴之忱有足嘉者朕已疊沛恩膏隨時賞賚昔皇祖聖祖仁皇帝時巡所至優奬士類一時碩學通才多䝉鑒拔方䇿所載稱盛事焉兹之于于而來皆棫朴作人久道所貽也夫膠庠之秀志切近光其積學有素文采潁異者加之甄録良合於陳詩觀風育才造士之道顧工拙既殊真贋錯出理應試之無使魚目砆碔得混珠玊尋經分别考試派大臣閲卷進呈取中人員准作舉人授為內閣中書學習行走其原係進士者授內閣中書遇缺補用嗣是乾隆二十二年二十七年三十年四十五年四十九年南巡省方凡進獻詩賦人員皆考試選取録用如之又奉諭㫖庶吉士分習清書例由翰林院掌院學士分派惟量其年力不拘省分舊時清漢各半自雍正年間以來分習清書者漸少每科尚有十四五員十七八員不等朕思邊省之人選館本少聲律亦素所未嫻既習國書自必専意殫精惟清文是務非天分優而學業勤者不能兼顧漢文日就荒落逮散館時或以清書優等授職而留館後遇通行考試往往拙於詩賦列入下等改令别用究其所肄清文自散館一試外别無職分應用之處微獨邊省即此五省庶吉士類然翰苑中江浙人員較多而逺省或致竟無一人者非所以均教育而廣儲才也嗣後雲南貴州四川廣東廣西等省庶吉士不必令習清書直𨽻山東河南山西陜西等省亦視其人數若在三四員以上酌派年力少壯者一二人其江浙等省人數在五六員以上者酌派二三員率以三十嵗以下者充之每科通計在十人內外寧缺無濫循舉舊章備國朝典制足矣該衙門即遵諭行又奉諭㫖今嵗恭逢聖母皇太后六旬萬夀慈福霑被海宇同之敬稽皇祖聖祖仁皇帝萬夀特開鄉㑹恩科廣作人雅化蓋國家遇大慶則必有殊常之恩朕思以紹籲俊之鴻規溥承歡之渥澤於壬申年舉行萬夀恩科三月鄉試八月㑹試俾兹多士共樂觀光以昭盛典該部即遵諭行又奉諭㫖各省選拔貢生經朕降㫖以十二年舉行一次計至癸酉年即屆選拔之期唯是來京朝考揀選引見劄監讀書或以知縣等官試用或以教職即用或以教職歸班序選條例屢經更定朕思選拔於數十百人中拔取一二人且不糊名易書可以驗其人才核其素行自當精擇以充其選應令該學政於試列前茅之士舉其文行兼優才品出衆者㑹同該督撫秉公掄採以杜濫觴至庠序為陶育人材根本今教職率多昏耄龍鍾濫竽戀棧雖定以六年甄别而上官以閒曹多方寬假非國家設官敷教本意應分以年限詳加澄汰所遺員缺即以應授教職之選拔充補於士風當有禆益所有選拔貢生赴部驗到作何定限及朝考録用一切規條俱應詳悉酌定永著為令大學士九卿集議以聞尋議嗣後各該處復設教諭并訓導各缺凡係月分推升及别項事故出缺者俱照定例銓選如係三年澄汰開缺者即將癸酉年揀選引見之拔貢照依朝考名次先後充補其補授訓導者以教諭銜管訓導事照依原銜升轉俟揀選引見之人用完即照舊例銓選從之十七年奉諭㫖今嵗萬夀恩科各省計偕雲集而中額所收列有定數其下第舉子中年力才具可以及時録用者特豫格外加恩㨂選引見分别以知縣試用教職銓補俾得早列仕版目今巡幸塞外若俟回鑾再行揀選未免守候需時著在京總理事務王大臣協辦大學士阿克敦尚書舒赫德劉統勳孫嘉淦於㑹試揭曉後即行㑹同揀選大省四十人中省三十人小省二十人俟朕回鑾以次引見其年在七十以上難以復圖進取者並著該部查明具奏候朕酌量加恩仍預行曉諭各舉子知之十八年奉諭㫖內廷行走之縣丞張宗蒼監生徐揚楊瑞蓮效力皆已數年甚屬黽勉安靜張宗蒼年已及暮著加恩賞給户部額外主事徐楊楊瑞蓮著加恩賞給舉人一體㑹試又停止五經取中之例十九年奉諭㫖場屋制義屢以清真雅正為訓前命方苞選録四書文頒行皆取典重正大足為時文程式士子咸當知所宗尚矣而浮淺之士競向新竒即如今科於榜前𫝊首題文有用九回腸之語者其出自漢書腸一日而九回大率已莫能知不過𠞰襲纎巧謂合時尚豈所謂非法不道選言而出者乎不惟文體卑靡將使心術佻薄所關於士習者甚大朕曩云言孔孟言大是難職是故也著將欽定四書文一部交禮部順天府存貯內簾令試官知衡文正鵠再䇿問時務用覘士子學識主試官不當以己見立說上年順天鄉試問黃河北行故道今春㑹試問黃河下流皆孫嘉淦陳世倌一己私見究亦空言無補若以此為去取將啓士子窺探迎合附和之弊其漸尤不可長即如宋元以來辨析朱陸異同初因講學而其後遂成門户標榜攻擊甚為世道人心之害嗣後有似此者必治其罪又奉諭㫖㑹試榜後下第舉人歷科以來間有格外加恩之典今科㑹試所有下第舉子亦著加恩於薦卷內選取文理明通者驗看揀選帶領引見畀以司鐸之任其奏請簡派大臣閲卷驗看及按省酌定員數分班選用之處該部察例具奏至年七十以上者並著該部帶領引見酌量給與職銜又定考取國子監學正學録例山東道御史陳大化奏國子監學正學録等官請照內閣中書之例考取録用從之皇朝文獻通考卷五十
