body:
  text: 欽定四庫全書皇朝文獻通考卷一百七十八樂考二十四徹樂臣等謹按樂以導和吉禮用之若夫凶喪烖異則徹而弗縣或縣而不作故虞書曰遏密八音周禮曰弛縣曰去樂本朝亦仍古制凡遇凶喪典禮素服徹縣水旱潔齊停止作樂蓋以致哀慕而展孝思敬天威而重民命所謂情動於中而禮制行焉者也謹次徹樂考天聰元年正月元旦徹樂舊制元旦設大宴備陳樂舞時以太祖初喪停止筵宴徹樂崇德七年正月元旦徹樂時以敏惠恭和元妃喪停止筵宴徹樂十月萬夀聖節不作樂時以國中避痘停止作樂定忌辰不作樂是日大內及宗室各衙門官員人等不筵宴不作樂八年八月庚午太宗文皇帝崩徹樂諸王以下文武官員不祈禱祭祀不宴㑹作樂凡百日止軍民人等凡十八日止外省官員二十七日止丙戍世祖章皇帝即位上御殿不陳設鹵簿不作樂順治元年定致祭太廟遇齊期不作導迎樂每嵗四孟及嵗暮致祭太廟如孟春時享日遇祈穀前齊戒期內駕出還宫導迎樂設而不作六年四月乙巳孝端文皇后崩徹樂王以下各官百日不宴會作樂外省官民二十七日不宴㑹作樂八年正月世祖章皇帝親政不作樂時禮部奏親政儀注上命照常陳設鹵簿不鳴鞭不鳴鐘鼓樂設而不作恭奉孝端文皇后升祔不作樂時升祔太廟致祭駕出還宫不鳴鐘鼓不作導迎樂十四年四月祈雨不作樂時以亢旱躬詣圜丘行祈禱禮不除道不設鹵簿不作導迎樂遣官祈雨不作樂九卿詹事科道等步禱於天壇地壇神祗壇社稷壇太嵗壇致祭不奏樂十八年正月丁巳世祖章皇帝崩徹樂王以下內外文武官員軍民人等百日內不宴㑹作樂己未聖祖仁皇帝即位上御太和殿升座鳴鐘鼓樂設而不作辛酉致祭太廟不作樂是日孟春時享太廟遣官素服行禮不奏樂十一月恭奉世祖章皇帝升祔不作樂時升祔太廟致祭駕出還宫陳設鹵簿不鳴鐘鼓不作導迎樂康熙元年正月恭上太皇太后皇太后徽號不作樂時以世祖章皇帝喪服未滿惟進冊寶停止行禮不設儀仗不作樂二年二月庚戍孝康章皇后崩徹樂王以下內外文武官員二十七日不宴㑹作樂軍民人等七日不宴㑹作樂九年八月恭謁孝陵不作樂是日駕發照常陳設行幸儀仗導迎樂設而不作臣等謹按嗣後凡遇恭謁祖陵乘輿出宫並照例陳設鹵簿樂器設而不作十一年二月耕藉不作樂是日值祭朝日壇齊戒期內停止筵宴不作樂十三年五月丙寅孝誠仁皇后崩徹樂王以下內外文武官員二十七日不宴㑹作樂軍民人等七日不宴㑹作樂十七年二月丁邜孝昭仁皇后崩徹樂王以下內外文武官員二十七日不宴㑹作樂軍民人等七日不宴㑹作樂二十六年五月祈雨不作樂時躬詣圜丘致祭雨纓素服不設鹵簿不作導迎樂十二月己巳孝莊文皇后崩徹樂王以下內外文武官員軍民人等二十七日不宴㑹作樂二十七年十月恭奉孝莊文皇后升祔不作樂是日升祔太廟致祭駕出還宫陳設鹵簿不鳴鐘鼓不作導迎樂二十八年五月遣官祈雨不作樂時以亢旱命九卿詹事科道步禱於神祗壇太嵗壇並遣官致祭圜丘方澤社稷壇不奠玉不奏樂王公文武官員軍民咸素服致齊三日七月甲辰孝懿仁皇后崩徹樂王以下內外文武官員二十七日不宴㑹作樂軍民人等七日不宴㑹作樂五十六年十二月丙戍孝惠章皇后崩徹樂王以下內外文武官員二十七日不宴㑹作樂軍民人等七日不宴㑹作樂六十一年十一月甲午聖祖仁皇帝崩徹樂王以下內外文武官員一年不宴㑹作樂軍民人等百日不宴㑹作樂辛丑世宗憲皇帝即位上御太和殿升座鳴鐘鼓樂設而不作恭上皇太后尊號是日皇太后宫不設儀仗停止行禮不作樂雍正元年五月辛丑孝恭仁皇后崩徹樂王以下內外文武官員百日不宴㑹作樂軍民人等二十七日不宴㑹作樂九月恭奉聖祖仁皇帝孝誠仁皇后孝昭仁皇后孝懿仁皇后孝恭仁皇后升祔不作樂太廟致祭駕出還宫陳設鹵簿不鳴鐘鼓不作導迎樂二年三月臨雍不作樂時值祭歷代帝王廟齊戒期內駕出還宫不作導迎樂四月祈雨上詣黑龍潭行祈禱禮不設鹵簿不作樂六月闕里聖廟灾親詣國學祭奠不作樂奉諭㫖朕惟孔子道高德厚為萬世師表所以維世教立人極者與天地同其悠久朕臨御以來思極尊崇之典以申仰止之忱今闕里聖廟被灾豈朕尊師重道之誠有未至歟朕在諒暗之中素服齊居無庸更事减膳徹樂謹擬親詣國學文廟䖍申祭奠宣讀告文以展朕局蹐不安之誠先期齊戒二日於十七日不設鹵簿朕素服前往諸王大臣官員陪祀者亦皆常服從事九年九月己丑孝敬憲皇后崩徹樂王以下內外文武官員二十七日不宴㑹作樂軍民人等七日不宴㑹作樂十月致祭太廟不作樂十三年八月己丑世宗憲皇帝崩徹樂王以下內外文武官員一年不宴㑹作樂軍民人等百日不宴㑹作樂九月己亥上即位上御太和殿鳴鐘鼓樂設而不作祭歷代帝王廟遣官致祭雨纓素服行禮不奏樂尋禮臣奏准二十七月之內凡遇壇廟社稷皇上親詣致祭或遣官恭代俱禮服行禮作樂朝日夕月歷代帝王廟先農先師等祀俱遣官行禮用禮服作樂凡遇升殿受朝俱吉服不作樂在京王公文武官員三十七月內不宴㑹作樂外省官員軍民仍照從前定例行十二月恭上皇太后徽號是日皇太后升慈寧宫寶座儀仗全設樂設而不作乾隆元年十一月尊封聖祖仁皇帝四妃位曰皇祖夀祺皇貴太妃皇祖溫惠貴太妃皇祖順懿密太妃皇祖純裕勒太妃以世宗憲皇帝服制不慶賀不作樂甲寅皇太后萬夀是日上詣慈寧宫行禮皇太后升寶座樂設而不作二年三月恭奉世宗憲皇帝孝敬憲皇后升祔不作樂太廟致祭是日鹵簿陳設於端門內不作導迎樂三年三月祈雨上詣黑龍潭行祈禱禮不設鹵簿不作樂十月端慧皇太子薨不作樂時禮部議奏喪禮得㫖在京官員軍民人等初祭以內停止嫁娶作樂直省於文到日為始三日內停止嫁娶作樂九年四月雩祭不作樂奉諭㫖雩祭之典所以為百榖祈膏雨也從前大臣等定議一應禮典悉照恭祀圜丘之制行朕思目下畿輔雨澤愆期此次舉行雩祭正望恩迫切之時非每夏常雩可比其先期詣齊宫及祭畢回鑾朕俱御常服不乘輦不設鹵簿不作樂以示䖍誠祈禱為民請命之意可傳諭各衙門知之十一年二月祭朝日壇不作樂時奉諭㫖三月朔日食二月三十日節届春分朕親祭朝日壇是日乘禮轎前往不必設鹵簿大駕還宫亦不必作樂以昭敬畏之意著傳諭各該衙門知之十二年五月躬祀方澤不作樂時奉諭㫖此次親祭現在望雨之際届期不乘輦不設鹵簿不作樂十三年三月乙未孝賢皇后崩徹樂王以下內外文武官員二十七日不宴㑹作樂軍民人等七日不宴㑹作樂尋奉諭㫖孝賢皇后大事一切典禮朕皆斟酌古今務協其宜據大學士等議奏禮儀內如升殿作樂一節凡屬大朝祀典自當照例朕意今年內尋常升殿但鳴鐘鼓樂懸而不作庶為合宜至來年正月將届期年一切典禮著如常儀十四年五月定齊宫宵漏不鳴鼓角時奉諭㫖朕於兩郊大祀先御齊宫以齊一思慮聞之祀曰齊者耳不聼樂孔子曰三日齊一日用之猶恐不敬二日伐鼓何居言不敢散其志也今齊宫宵漏下鳴畫角嚴鼓以為節雖異於宫懸合樂而吹角鼓鼜軍中之容豈所謂專致其精明者歟此蓋相沿前明弊典未更後此嚴更鼓角不當用之於齊次大學士㑹同該部定議以聞載入㑹典二十四年四月雩祭不作樂時以農民望雨前期詣壇齊宿不設鹵簿不設導迎樂是日由齊宫步行至幄次行禮五月辛丑祭社稷壇不作樂時以禱雨上自午門內步行詣壇致祭雨纓素服不設鹵簿不作導迎樂丁未躬祀方澤不作樂時以亢旱有㫖照九年十二年之例不乘輦不設鹵簿不作樂由景運門前往六月大雩不作樂上自齊宫步禱於圜丘行大雩禮雨纓素服不設鹵簿不設導迎樂四十二年正月孝聖憲皇后崩徹樂王以下內外文武官員期年不宴會作樂軍民人等百日不宴會作樂尋奉諭旨昨據禮部奏大行皇太后喪儀二十七日之內所有社稷壇等祭祀援照雍正九年孝敬憲皇后喪儀素服致祭樂設而不作等語朕以郊廟大祀典禮綦重似不應因大喪而稍略其禮因命軍機大臣查明具奏兹據會典所載康熙年間列后之事遇大祀典祭日穿朝服作樂禮部此奏未將逺年舊例細查僅引雍正九年乾隆十三年之例所辦原未周到今會同酌議二十七日內如遇郊廟大祀典仍作樂穿朝服行禮其餘尋常祭祀均用素服致祭樂設而不作等語所奏甚是著照軍機大臣所議二十七日內如遇郊廟社稷及日壇諸大祀雖係遣官致祭仍當作樂穿朝服行禮其餘尋常祭祀均用素服致祭樂設而不作方為允當著交禮部照此辦理其從前誤辦之案不必存稿即以此著為令典皇朝文獻通考卷一百七十八
