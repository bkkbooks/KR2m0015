body:
  text: 欽定四庫全書皇朝文獻通考卷一百五十王禮考二十六山陵臣等謹按漢時始有山陵之名諸陵皆有園寢四時致祭後代因之馬端臨王禮考於國恤之後立山陵一門自初喪至殷奠則入之國恤門自卜宅至虞祭作主則入之山陵門蓋以典禮重大義當分見也我朝尊祖敬宗之典超軼往古而於山陵大禮尤為隆備興京永陵敬奉肇祖衣冠之所而興祖卜兆正中景祖顯祖昭穆序列天鍾福地允為發祥所自盛京則福陵在東北昭陵在西逺拱長白山近帶遼水鬱鬱蔥蔥佳氣所聚世祖定鼎燕京預定山陵於遵化州之昌瑞山是為孝陵而景陵在其東重巒疊嶂四面環抱用啓佑我萬年有道之長焉泰陵在易州之永寧山脈厚力豐堪與昌瑞並峙遵化在京東故稱東陵易州在京西故稱西陵云至於合葬之義昉自成周唐臣嚴善思又言尊者先葬卑者不得入以卑動尊術家所忌故合葬與不合葬惟義所在各因乎時我朝列聖山陵循古合祔之制而昭西陵孝東陵泰東陵之建則仰承先志憲古凖今允堪垂法萬世者也若夫謁陵之禮與廟享相表裏大清通禮列在吉禮今恭載於後以彰聖朝誠孝之至焉肇祖原皇帝興祖直皇帝景祖翼皇帝顯祖宣皇帝陵曰永陵原皇后直皇后翼皇后宣皇后各合葬在興京西北十里啓運山自長白山西麓一幹綿亘層折至此層巒環拱衆水朝宗萬世鴻基實肇於此天命九年四月建都東京奉移皇祖考皇考孝慈皇后陵於東京是時遼陽既定太祖高皇帝命族弟鐸弼王善貝和齊往至祖居呼蘭哈達之赫圖阿拉地謁祖陵及皇后陵以太牢告祭畢乃奉皇祖考皇考孝慈皇后梓宫舁以黃輿日祭以太牢將至太祖率諸貝勒大臣軍士出城迎二十里外至皇華亭太祖及諸貝勒大臣軍士悉俯伏道左俟皇祖考皇考孝慈皇后靈輿過乃起至東京城東北四里之揚魯山預建寢殿以安葬焉設太牢焚楮幣太祖親詣二祖陵奠酒行禮祝文曰吾征明復祖父仇已得遼東廣寧祇移寢園永安斯土惟我祖考仰達天地垂福祐焉臣等謹按國家肇基興京肇祖原皇帝興祖直皇帝景祖翼皇帝顯祖宣皇帝陵共一山在興京城西北十里至是奉移景祖顯祖陵於東京在盛京城東南百二十里稱東京陵順治八年十一月乙丑封肇祖原皇帝興祖直皇帝陵山曰啓運山景祖翼皇帝顯祖宣皇帝陵山曰積慶山均從祀方澤遣多羅貝勒吞齊固山貝子吳達海等祭告是日祭時日初出啓運山有黃赤青三色雲見從山陵直沖霄漢十五年九月壬寅奉移景祖翼皇帝顯祖宣皇帝陵於興京罷積慶山祀典先是十三年六月議政大臣巴圖魯公鰲拜等言興京景祖翼皇帝顯祖宣皇帝陵自克取遼東後遷至東京原以便展謁申祭享也今據欽天監地理官奏稱興京皇陵風水實係第一福地請仍遷景祖顯祖陵於肇祖原皇帝興祖直皇帝陵傍庶與風水有合等語夫果旺氣所鍾福祥攸萃宜如所請將各陵界內墳墓房屋俱應遷移被圍地畝應交戶部撥補得旨東京二陵自太祖太宗時擇吉恭遷安奉已久展謁致祭孝慕可申今以地理之言又議遷移恐未合理况本朝誕膺天眷國運昌隆移陵東京之後肇基一統垂裕萬年言乎福地允為至善至於周圍界內臣民墳墓安集已久議令改遷亦屬未協其另議以聞久之諸大臣等復言陵寢風水所在今議將東京二祖陵遷祔興京於理為協詔從之至是恭移景祖顯祖陵改祔興京祖陵安奉地宫十六年九月辛巳尊興京祖陵曰永陵御製肇祖原皇帝碑文曰粵稽書稱觀德詩詠發祥莫不由本支而溯厥初生祇享假以垂夫來葉既隆報本之典亦昭受命之符洪惟我肇祖原皇帝暨原皇后德合天地功配陰陽似后稷聿始周模同帝嚳肇開唐業啓迪列祖雄圖衍百祀家傳默祐沖人大統懋九圍帝業顧瞻陵廟彌嚴祇敬之心鐫勒碑銘益篤靈承之慶卜年卜世光華宣著千秋以祀以禋繼述遐昌奕代昭垂有永申錫無疆御製興祖直皇帝碑文曰稽承家之遐慶溯開國之鴻圖積德纍仁發祥有自肇基垂統錫祉無疆洪惟我興祖直皇帝暨直皇后誕樹厥德聿宣乃武雖大勳未集而經綸已建當草昧初開而謨烈允光令緒昭垂皇圖式啓逮豫沖人承兹丕緒涖九土之率從合萬邦之愛戴陵原重建洽篤祜之歡心廟貌鼎新彰開天之盛烈永錫遐祚萬祀承庥御製景祖翼皇帝碑文曰粵稽祖德攸崇爰啓承家之緒宗功有永益隆篤祜之恩蓋追盛業以溯開天宜紀鴻勳以昭受命既彰發祥之有自更申錫福之無疆洪惟我景祖翼皇帝暨翼皇后𢎞謨大烈厚澤深仁雖未集耆定之勳而丕宣有象實始建經綸之業而式廓用光令緒丕昭已見六州歸命皇圖肇造先占率土傾心原廟重新弓劍衣冠皆起羮牆之慕山陵永奠子孫臣庶咸蒙佑啓之仁爰勒豐功作本支之百世載揚休烈錫嘉祉於千秋繼述遐昌昭垂不替御製顯祖宣皇帝碑文曰蓋聞天肇一代之運必著開先啓後之勳聖垂百世之模必有積德纍仁之實丕基方建締造惟勤大業式𢎞駿鴻宜勒用申報本之典益彰受命之符洪惟我顯祖宣皇帝暨宣皇后文謨丕顯武烈載揚星流華渚已秉赤日之祥電繞辰樞更兆神龍之瑞雖皇猷肇啓大勳未遍於寰區而帝緒昭垂聖德實留於奕祀橋山載闢百千載無斁明禋原廟重新億萬年用鐫令烈承庥有永祐祚無疆壬午以尊稱四祖陵為永陵遣官告祭十八年尊稱永陵饗殿曰啓運殿門曰啓運門立景祖翼皇帝顯祖宣皇帝永陵廟碑康熙元年奉安四祖四后神牌於啓運殿臣等謹按永陵寶城周十有五丈四尺前饗殿三間曰啓運殿東西配殿各三間外為紅門繚垣四十二丈七尺碑亭四陵內肇祖原皇帝惟謹藏衣冠興祖直皇帝奉安龍脈正中景祖翼皇帝顯祖宣皇帝列昭穆左右興祖寶鼎前坐瑞榆一株輪囷盤鬱圓覆佳城皇上謁陵時御製神樹賦紀之太祖高皇帝陵曰福陵孝慈高皇后合葬在盛京城東北二十里天柱山近則渾河環於前輝山興隆嶺峙於後逺則發源長白俯臨滄海洵王氣所鍾也天聰三年二月丙申建太祖高皇帝山陵工成遣官詣東京奉安孝慈高皇后梓宫合葬初太宗文皇帝諸貝勒大臣敬卜吉壤建造山陵太祖高皇帝梓宫安葬至是定議卜吉於瀋陽城東二十里渾河北石嘴頭山遣官詣東京奉遷孝慈高皇后梓宫合葬己亥奉移太祖高皇帝孝慈高皇后梓宫安奉山陵是曰清明節丑刻太宗文皇帝率諸貝勒大臣詣太祖高皇帝梓宫前行告祭禮奠酒舉哀焚楮幣讀祝畢太宗與諸貝勒親奉太祖高皇帝梓宫出殿諸大臣奉安靈輿列鹵簿奏樂八旗諸臣以次恭舁龍輴至山陵奉孝慈高皇后梓宫合葬葬畢焚楮幣以祭設官敬謹守護陵東西兩傍立下馬坊八年十月己丑建造太祖山陵寢殿崇德元年四月丙戌尊太祖高皇帝陵曰福陵順治元年二月戊子以太妃博爾濟錦氏祔葬福陵十二月庚午恭上太祖武皇帝孝慈武皇后册寶於福陵八年十一月乙丑封福陵山曰天柱山從祀方澤康熙二年九月癸酉改遣福陵地宫十二月辛酉工成安奉太祖高皇帝寶宫設寶座神牌於享殿隆恩殿內供奉神牌及神龕寶牀衾褥帷幔楎柂均照太祖成式製造三年正月癸巳恭鐫太祖高皇帝尊諡於福陵前石碑二十七年十二月甲辰恭建福陵神功聖德碑聖祖仁皇帝御製文曰帷天眷佑下民綏靖方域篤生我皇曾祖太祖高皇帝肇興東土奮師一旅式闢皇圖大武布昭深仁洋溢用造我國家萬億年丕基駿德鴻功於爍顯懿駕軼亘古豫小子纂承洪緒既奉册寶崇上尊諡載輯徽猷炳垂方策惟陵寢宜有功德之碑敬述大略永勒貞珉敘曰太祖承天廣運聖德神功肇紀立極仁孝睿武𢎞文定業高皇帝姓愛新覺羅氏諱廟諱先世發祥長白山之陽禎符神貺歷著休徵至皇始祖肇祖原皇帝式廓舊業寖熾寖昌又五傳至顯祖宣皇帝世濟其勤流長積厚景運懋集神器攸歸誕啓我太祖高皇帝顯祖之長子也宣皇后娠十有三月乃生龍顔鳳目豐頤大耳天表玉立舉止非常少不飲酒嬉戲稱為聰睿貝勒及長騎射絶倫雄略蓋世用兵無敵而又至誠御物大度容人先是有望氣者言滿洲將生聖人統一諸國至是滿洲長白山及東海扈倫諸部落爭相雄長癸未春蘇克蘇滸河部圖倫城有尼堪外蘭者陰搆明軍首逞大難於我時太祖皇帝年二十有五泣血誓師枕干問罪以遺甲十三副攻尼堪外蘭克圖倫城復攻之於甲板誅諾米納奈哈達取薩爾滸城時異已猜忌包藏禍心伺間竊發天威所懾罔弗獸驚鳥散遂俘兆佳城長李岱取馬兒墩平定棟鄂哲辰渾河等部丙戌秋擒斬尼堪外蘭於額爾渾城戎首服辜先聲震疊環境諸國相繼削平既而葉赫哈達烏拉輝發科爾沁國錫伯封勒察珠舍哩訥殷路九姓之國合兵三萬人分道來侵偵者夜告太祖皇帝安寢達旦蓐食濟師殱其渠首餘部皆潰斬級四千獲馬三千匹鎧胄千副羣方讋服乃增築城墉修飭法制創制國書開金銀礦鐵冶所産蠙珠織皮通厥貿易財用殷阜肇立軍制師律精嚴國勢日盛丙午冬蒙古五部落尊太祖為神武皇帝嵗時朝貢絡繹相望而哈達輝發烏拉數渝盟先後征討悉定其地每當行軍輒見五色雲亘天祥光四塞立奏巨功逺邇翕服益四旗為八設固山梅勒甲喇牛録額真遞相統轄命佐領下各出牛種屯田積榖貯倉置理政聽訟大臣緩刑慎獄野無剽竊路鮮拾遺國中大治帝業已成貝勒大臣集議勸進丙辰春王月恭上尊號曰覆育列國英明皇帝建元天命時年五十有八越二年定策征明明政久弛棄絶和好援我仇讐蕩搖我邊陲於是誓告有衆類帝禡旗而行遂入拔撫順降臺堡五百所繼下清河明大舉稱兵會於瀋陽號四十七萬張左右翼左翼以杜松王宣趙夢麟張銓由渾河出撫順關馬林麻岩潘宗顔由開原合葉赫兵出三岔口右翼以李如松賀世賢閻鳴泰由清河出鴉鶻關劉綎康應乾合朝鮮兵出寬奠口向棟鄂四路來侵太祖皇帝分精騎奮擊大破其衆五日而悉殱之城界凡取開原破鐵嶺滅葉赫五年克遼陽瀋陽定議建都始築東京尋取廣寧拔撫順十年遷都瀋陽由是東漸海西訖遼南及朝鮮北暨嫩烏龍江以至使犬諾落諸路罔不臣服太祖皇帝神武天錫決幾制勝變化若神每戰輒單騎深入裹創斬馘神色不動善駕馭雄材推心置腹撫納降附棄捐忿隙恆豫擢用法所當坐雖親昵罔所私攻拔城邑嚴禁軍士安輯居民是以羣策競奮率土思歸御極以後拓地開疆日不暇給而躬勤於聽覽留神於載籍修德納諫親賢逺姦建二木於門俾下情欲達者書之以進尚寬大崇節儉睦宗親厚風俗重農桑賑窮乏垂示典訓蕩平正直允為萬世法程猗歟盛哉天命十一年八月庚戌崩聖壽六十有八在位十有一年天聰三年二月己亥葬福陵天柱山崇德元年四月上尊諡曰承天廣運聖德神功肇紀立極仁孝武皇帝廟號太祖康熙元年四月加上今諡於戲有明德衰海宇板蕩之時生民顛隮之會我太祖皇帝應運蹶生手提天戈披榛辟萊櫛風沐雨掃邊陬如破竹定遼左若建瓴戡亂求寧非富天下功極於配天道隆於昌後歷稽曩代創業垂統之君未有邁此締造憂勤經綸宏逺者也瞻赫濯之如新撫承平之永賴歌思先烈曷罄名言謹拜手稽首而作頌曰天造大邦勃興東極長白山高苞符開闢􅜈鳥生商履武誕稷奕葉炳靈肇基王迹太祖龍飛旋乾轉坤齊徽炎昊比烈羲軒時惟草昧陟巘降原一成奮起雷動雲屯蠢爾仇方敢作牙孽赫斯一怒恭行天罰寢甲枕鞍神勇迅發巨憝授首戎心式遏竒謀倜儻逺略深沈內搆者挫外訌者擒單師十百摧彼強鄰九邦潰糜四路掃塵攜二則誅歸誠則撫義問宣昭仁施恩普大畏小懷實揚我武來庭來王日闢疆土疆土既闢厯數在躬膺圖受籙響應景從三才協軌百靈潛通指麾蕩滌振落發蒙覘敵烏集濟師氷泮夾日貫月卿雲糾縵不義是征功成為斷秉鉞稱干帝心厭亂環山負海風靡雲披朱旗疾捲汗馬爭馳後我斯恫歌舞迎師紀元頒朔建策開基爰定軍營森羅鵝鸛步伐止齊井牧相扞爰建國都屹峙屏翰扼吭拊背皇居攸煥爰命分職朂哉臣鄰爰慎折獄恤哉祥刑爰達民隱鞀鐸重陳爰制國書科斗更新訏謨孔彰風規渾噩禹誓湯征千秋繼作聲靈覃敷東西南朔大統乃膺新命乃廓既詒既翼如鎬如豐九圍是式萬國來同卜年卜世惟太祖功巍巍蕩蕩昭格蒼穹右享郊壇敷時思繹炳耀圖書輝煌球璧景瞻福陵神邱是宅百川縈朝羣山拱揖蔥蘢王氣松楸鬱蒼玉衣永鎮弓劍長藏億載顧慕春露秋霜樹兹穹碑錫嘏無疆太宗文皇帝陵曰昭陵孝端文皇后合葬在盛京城西十里隆業山自城東北疊巘層巒至此而寬平宏敞有包羅萬象統御八荒之勢遼水右回渾河左繞輪囷蔥鬱洵永固之丕基也崇德八年九月建太宗文皇帝山陵工成壬子奉移太宗文皇帝梓宫安奉山陵寢殿順治元年八月丙寅尊太宗文皇帝陵曰昭陵恭奉寶宫安葬昭陵十二月庚午恭上太宗文皇帝册寶於昭陵七年二月戊子奉移孝端文皇后梓宫合葬昭陵八年十一月乙丑封昭陵山曰隆業山從祀方澤康熙二年九月癸酉改造昭陵地宫十二月甲寅工成安奉太宗文皇帝寶宫設寶座神牌於饗殿三年正月癸巳恭鐫太祖文皇帝尊諡於昭陵前石碑二十七年十二月甲辰恭建昭陵神功聖德碑聖祖仁皇帝御製文曰天以神器畀我國家洪惟皇祖太宗文皇帝智勇神聖光昭太祖高皇帝丕緒帝紘皇綱是廓是恢幹不庭方搆造鴻業垂裕皇考世祖章皇帝大一統之基貽億萬祀無疆之休惟豫小子纘承聖緒念陵寢宜有功德之碑敬勒貞珉昭示無極敘曰太宗應天興國𢎞德彰武寬溫仁聖睿孝隆道顯功文皇帝諱太祖承天廣運聖德神功肇紀立極仁孝睿武𢎞文定業高皇帝第八子也母孝慈昭憲敬順慶顯承天輔聖高皇后生而神靈徇齊明敏龍行虎步顔如渥丹嚴寒不栗舉止非常太祖皇帝特鍾愛焉既長英武豁達孝弟恭敬慈愛和順秉心寬𢎞好觀書史一有聞見終身不忘沈幾果斷羣望攸屬天命十一年八月太祖皇帝升遐諸貝勒大臣咸推我皇祖才德冠世宜纘承帝業以九月朔嗣登大位建元天聰時年三十有五踐阼之後愛養人民撫綏中外崇儉務本修政任賢仁聲義問無逺弗屆除慝討二用整六師乃擊蒙古執一十四貝勒奏凱八纛下乃征朝鮮克義州進拔漢山城入安州抵平壤朝鮮王李倧遁江華島遣其弟覺來行成遂盡反所收地與盟而還乃征察哈爾剪多羅特部落編俘獲為氓乃伐明自遵化臨北京略良鄉斬其將滿桂孫祖壽擒其將黑雲龍麻登雲還拔永平乃收大凌河降其將士於是孔有德耿仲明等航海來歸乃征黑龍江瓦爾喀下之察哈爾舉國來附獲歷代帝王傳國之寶天聰九年冬羣臣勸進尊號皇祖辭讓再三明年四月表上尊號曰寬溫仁聖皇帝建國號大清改元崇德告於皇天后土追王列祖上太祖高皇帝高皇后尊諡羣臣咸上表賀乃錫宴肆赦是年朝鮮毁盟討之拔其都載飛舸於車凌江華島李倧自縳請為臣釋之還并歸其俘獲朝鮮感服勒石南漢以銘勳德遂率水師渡海克皮島既而大出師遣將毁關入分左右翼由涿州界地至山西界復自臨清渡河破濟南克城四十有九降者八與明兵五十七戰皆捷六年圍錦州入其郛洪承疇以兵來援皇祖陳師於松山杏山之間明兵號十三萬望見皇祖張黃蓋往來指揮皆懼謀夜遁我師分道急擊連大破之擒承疇降祖大壽錦州松山杏山悉下又命將入關破兖州東抵寧海克城八十有八降者六陳敗明兵者三十九於是天戈所指罔不率俾黃河之源青海之濱使犬役鹿之國來賓恐後野駝竒獸黑狐紫貂重譯來獻聲教之逺功烈之盛古未有也於戲惟我皇祖克配天心誕膺景命聰明睿知神武不殺懷柔以德燮伐以威大勳用集大猷是程無有內外乃罔不即敘親九族正百官修明典章誕敷政教隆郊丘廟祀之儀定頒厯朝會之禮辨鹵簿旗章服御之制聲名文物炳然𢎞備釋奠孔子以四子配立文館譯書史於翔鳳閣俾儒臣記注得失開科目取士諭臣下盡言無隱論功封兄弟子姪為諸王貝勒外藩蒙古亦論功封爵有差優禮降臣寄以心膂賞罰詳明斷獄平允綱舉目張仁至義盡至於審制度定律令斥邪術禁喪祭踰禮者務農桑廣漁獵以豐民食皆可為萬世法凡勤勞國事者賜與必優渥召近臣入宫日至再三講論政事以賓禮遇之諸國新附之人入見必詢其姓名世系慰勞如舊識天語藹然以故雖至難馴者無不悅服如薩哈爾察卦勒察瓦爾喀呼爾哈諸國素不習禮法亦貢獻稱臣其貝勒大臣至俱恩遇之如子弟故其部落降者相繼常念中原生民塗炭欲與明和好惟務修德不樂觀兵屢移書明邊帥曰朕意在講和不忍無辜赤子慘罹鋒鏑明之君臣置若罔聞致煩天討然每出師必諭諸將授以兵律嘗曰明之土地人民天以與我是民即我民也故師行雖嚴寒不入屯堡士卒死傷弔問不遺每戰勝攻取符瑞駢集必曰上天眷佑惕然祇懼克敵必祇告於廟蓋敬天尊祖勤民若是其至豐功厚澤與天地同久大有國史所不能盡者矣崇德八年八月庚午崩聖壽五十有二在位十有七年九月壬子葬昭陵隆業山於戲八音遏密萬國感痛實惟至德深仁為生民主以𢎞我國家之大寶命愾僾見聞陟降庭止謹述盛概拜手稽首而系之以頌曰於赫皇祖纘太祖之緒誕敷乃文孔奮厥武整我師干拓我疆土東奠朝鮮西讋蒙古二者獲之服則釋之降則憐之賢則臣之有言遜志則必遏之有言逆耳則必納之治分六曹職統三院筆簪史臣書譯文館與神為謀以古為鑑制禮明刑儀章是憲一人有慶肇域四方四方來王自天降祥和鸞鏘鏘旗旐央央聿昭茂祉焞耀章光乾符效珍坤儀開奧既協靈圖誕升顯號濟濟師師羣工舞蹈厯數攸歸謳歌前導乃禋乃祀於廟於郊乃燕乃射於野於朝乃赦乃宥於犴於牢乃漁乃獵於狩於苗乃命紫宫清寧正中麟趾在右關雎在東崇政篤恭翔鳳飛龍文德武功以綏萬邦松山之陰杏山之下戰士連營崇墉百堵取彼元戎繫之以組肅將天威救民水火屹屹榆關王師所經而幽而并而冀而青而兖而徐克其百城涉河踰濟及於東溟時乘以乾帝出乎震罔有遐邇民莫不信或獻其琛或輸其賮河源海壖協靈效順有典有則貽萬子孫言為邱墳績嫓農軒佑我皇考大啓幅員允皇祖之德皇祖之勳瞻仰昭陵在盛京之北雲霞所棲松柏斯植有穹者碑昭宣世德茀祿來崇時萬時億孝莊文皇后陵曰昭西陵在遵化州昌瑞山孝陵之南康熙二十七年四月己酉奉移大行太皇太后梓宫於暫安奉殿先是二十六年十二月壬申聖祖仁皇帝諭大學士內務府總管等曰太皇太后疾大漸時諭朕曰太宗文皇帝梓宫安奉已久不可為我輕動况我心戀汝皇父及汝不肯逺去務於孝陵近地擇吉安厝則我心無憾矣諄諄降旨朕何敢違伏思慈寧宫之東新建宫五間太皇太后在日屢曽向朕稱善乃未及久居遽爾升遐今於孝陵近地擇吉修建暫安奉殿即將此宫折運所擇吉處毋致缺損著揀選部院賢能官員前往敬謹料理天氣甚寒務期基址堅固工程完備爾等即傳諭行乃於孝陵之東南建造饗殿後殿諏日安奉太皇太后梓宫稱暫安奉殿辛酉奉安太皇太后梓宫於暫安奉殿十月上恭謁暫安奉殿行禮舉哀乙卯恭上大行太皇太后尊諡册寶於暫安奉殿先是正月內閣翰林院詹事府會議恭擬大行太皇太后尊諡曰孝莊仁宣誠憲恭懿翊天啓聖文皇后聖祖仁皇帝諭曰太皇太后遐升未久祭文內遽改稱尊諡朕心深為不忍應俟梓宫奉安昌瑞山後始稱尊諡以祭至是諏吉行恭上尊諡禮雍正二年二月恭定孝莊文皇后暫安奉殿為陵寢是月諭諸王大臣九卿等欽惟孝莊文皇后躬備聖德天錫純禧誕育世祖章皇帝瑞應昌期君臨萬國逮我聖祖仁皇帝繼聖嗣統久道化成立萬世無疆之業皆我孝莊文皇后福德兼隆之所啓佑也康熙二十六年十二月慈馭升遐先期面諭我聖祖仁皇帝曰我身後之事特以囑汝太宗文皇帝梓宫安奉已久卑不動尊此時未便合葬若另起塋域未免勞民動衆究非合葬之義我心戀汝父子不忍逺去務必於遵化安厝我心無憾矣再四丁寧言之懇切我聖祖仁皇帝涕泣受命爰諭諸王大臣集議僉同於康熙二十七年四月安奉梓宫於孝陵之南為暫安奉殿迄今三十餘年矣朕惟禮經曰合葬非古也先儒又云神靈有知無所不通是知合與不合惟義所在今昭陵安奉日久若於左近另起山陵究非合葬之義且自孝莊文皇后安奉以來我聖祖仁皇帝厯數綿長海宇乂安子孫蕃衍想孝莊文皇后在天之靈極為安妥遺命諄諄聖祖仁皇帝遵奉三十餘年今朕身任付託之重山陵典禮理宜斟酌盡善以垂世者莫大於此著諸王大臣九卿等會同確議具奏辛未和碩康親王崇安等遵旨議奏暫安奉殿自聖祖仁皇帝親受孝莊文皇后遺命奉安三十餘年景運綿長子孫蕃衍海宇乂安誠希有之吉兆稽考古禮無必當合葬之文應即暫安奉殿定為陵寢得旨是著即擇日興工十一月辛酉尊孝莊文皇后陵曰昭西陵三年二月辛巳以昭西陵興工遣官告祭永陵福陵昭陵孝陵孝東陵景陵先是翰林院撰擬祭告諸陵文啓奏得旨暫安奉殿建為昭西陵乃朕仰體皇考祇承慈命之孝思也應令撰文詳陳本末達朕繼述之意以告祭景陵祭文曰欽惟孝莊文皇后躬備聖德貽慶垂庥隆兩朝之孝養開萬世之鴻基及大漸之際面諭皇考以昭陵奉安年久不宜輕動建造兆域必近孝陵丁寧再三我皇考恭奉慈旨擇地於孝陵之南為暫安奉殿歷三十餘年我皇考厯數綿長子孫蕃衍且海宇升平兆人康阜世宗憲皇帝廟諱祇紹丕緒夙夜維思古合葬之禮原無定制神靈所通不間逺近因時制宜惟義所在即暫安奉殿建為昭西陵以定萬年之宅兆卜吉於雍正三年二月初三日辛未動土興工十六日甲申恭移孝莊仁宣誠憲恭懿至德翊天啓聖文皇后梓宫安奉享殿恪遵聖母之遺命仰體皇考之孝思驗吉兆於已彰考舊章而允合天開地設儲悠逺之休徵巒聳川回裕繁昌之慶祚伏乞聖鑒謹告甲申恭移孝莊文皇后梓宫安奉昭西陵享殿遣官致祭十一月丙午世宗憲皇帝詣昭西陵躬奠舉哀丁未復詣昭西陵行安奉地宫告祭禮先是諸王大臣等奏本月十三日聖祖仁皇帝三周忌辰皇上親詣景陵行禮十二月初十日為孝莊文皇后梓宫安奉地宫之期皇上若又親往當此冬令嚴寒一月之內聖駕兩次往還臣民之心實有未安又今年近京州縣稍多雨水皇上正在施恩賑恤之際恐地方官民不無迎候供役請於躬詣景陵祭奠之日即於昭西陵先期行大祭禮孝莊文皇后梓宫奉移寶城之日遣諸王大臣前往祭奠得旨十二月初十日皇曾祖妣孝莊文皇后安奉地宫朕本欲親往祭奠但皇考聖祖仁皇帝三周祭期去十二月初十日甚近一月之內兩次往還天氣嚴寒沿途官民迎候供役未免勞苦朕意正在躊躇覽諸王大臣所奏援引典禮請於十一月十三日先期祭奠於禮既盡於心亦安所奏是著照此行十二月癸酉奉安孝莊文皇后梓宫於昭西陵皇朝文獻通考卷一百五十
