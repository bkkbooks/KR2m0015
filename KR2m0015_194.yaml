body:
  text: 欽定四庫全書皇朝文獻通考卷一百九十四兵考十六軍器臣等謹案軍器為武備所必需周考工記所載至纎至悉漢有武庫唐有軍器監歷代相因勿替然弓矢戎兵固為禁暴遏亂之具而必以核實為先茍徒有其名則亦與無器等明時有兵仗軍器諸局屬內庫掌以中官有盔甲局屬兵部掌以郎官而諸司衛所又俱有雜造局軍資器械名目繁夥幾不可枚舉其後有器而不能用豈非緣飾觀聽名存而實亡者乎我朝以武功開國弧矢之利精強無敵列聖相承皆身先教閲俾折衝禦侮者咸嫻習騎射至於八旗之士分演鳥槍而火器又别設專營百餘年來稽核精嚴力振惰窳之習皇朝聖明天縱留心制作武備器什會典未經臚載者皆進御審定是範是程一切軍器皆歸實用是故制度有定式給發有定數簡閲有定期年久朽損或出征殘闕者以時修補贏餘者令官兵典守以備用私賣私典者皆論如法可謂詳且盡矣若夫戰船一項馬氏列於車戰之後今水師營制既隨各省載入直省兵內其所用戰船亦即附見此門云天命十一年奉上諭弓矢矛刀行軍之要器三大貝勒以下入八分諸貝勒以上凡遇蒙古諸貝勒遣來之人毋得私與若與則必奏聞至外藩諸貝勒大臣以下小民以上遇蒙古諸國雖經歸順者亦不得私鬻與彼違者罪之天聰七年奉上諭元帥孔有德總兵耿仲明興師在即恐兵丁有私賣馬步器械者急為修整卿等擕來紅衣炮及大小火炮即以付卿槍炮弓矢教演不得間斷崇德二年奉上諭水軍船艦須用遮牌給發軍器凡軍器金鼓以示進退之節海螺以定朝昏之聚散旗纛以一瞻視甲胄以衛身各器械以制敵各營兵之専習者為弓箭為鳥槍為炮為藤牌兼習者為長槍為大刀為挑刀水師則有排槍鈎鐮槍標槍火箭之屬水陸異用險異異宜習者期純熟教者期専一大炮以兵千名設十炮為率郡邑城守沿海沿邊及水師戰艦各貯炮於其所若兵少及非要隘營汛貯炮於督撫提鎮駐劄之地需用乃發仍以時演放如法順治初年定軍器由兵部定式移文工部製造按名給發仍令該管官隨時稽察有損闕者修整補製如有盈餘器械留營以備增補敝壞者悉行銷毁五年奏準馬兵每名給甲一胄一櫜鞬一弓一箭四十腰刀一步兵每名給甲一胄一腰刀一其步兵之弓箭兵給弓一箭三十長槍兵給長槍一鳥槍兵給鳥槍一直省兵均照此給發是年定八旗兵需用甲胄軍器移交工部製給或給銀令其自製直省兵丁鎧仗動支本地錢糧造給報部核銷其守護陵寢兵丁及八旗新滿洲寧古塔新滿洲人等應給軍器該管大員奏準咨部弓箭由兵部給發甲胄等項由兵部轉行工部造給康熙六年奏準八旗世爵暨文武官各備甲一胄一弓二櫜鞬一腰刀一其箭數視品秩之大小公五百五十侯五百伯四百五十子四百男三百五十輕車都尉二百五十騎都尉二百雲騎尉百五十武官一品至五品視子男至雲騎尉六品以下均一百文官一二品視子男三品京堂視武職二品四品京堂科道郎中視武職三品員外郎視武職四品營兵護軍前鋒領催各七十驍騎各五十世爵中官大於爵者照官職箭數爵大於官者照世爵箭數直省督撫提鎮及副將以下官應備弓矢甲胄各按品級定數與八旗武職同三十年設八旗火器營每佐領下設鳥槍前鋒一名鳥槍護軍三名鳥槍驍騎校四名每名各給鳥槍一滿洲八旗每旗各設子母炮五位其餘大小銅鐵炮位均貯漢軍八旗炮局內又定八旗護軍營驍騎營每佐領下護軍二名各給長槍一驍騎二名合給長槍一護軍營八旗每旗各設海螺三十六前鋒營左右翼各設海螺八火器營八旗每旗各設隨炮海螺五八旗鳥槍護軍鳥槍驍騎每旗各設海螺十四驍騎營每佐領下各設海螺一每參領下各設海螺二漢軍鳥槍營每旗設鼓一金五炮營每旗設鼓一金五藤牌營每旗設海螺五每旗設藤牌兵一百名每名各給藤牌一㓲刀一每旗設挑刀兵五十名每名各給挑刀一漢軍八旗每佐領下各設鹿角一架連耞棍四副每鹿角一架設棉甲兵四名每名給連耞棍一副直省標營金鼓海螺鹿角藤牌挑刀等項視營之大小兵之多寡隨地酌設是年荆州將軍奏湖廣總督巡撫提督總兵官標有火器而滿洲兵無火器應於四千兵內每旗派一百名習鳥槍其所用八百桿鳥槍於荆州庫內取用火藥槍子亦於武昌荆州庫內支用奉旨八百鳥槍手仍令將軍都統管轄兩翼各協領一員每旗佐領一員防禦一員分管又江南將軍奏請添設火器奉旨即於四千馬兵內每旗挑百名教習鳥槍將軍等於駐防官內酌派章京管理雍正五年奉上諭各處營伍所用器械向來原無一定之例是以武辨到任往往以己所好尚及素所熟習者操演所屬兵丁間或學習未久而接任官又别有意見將從前所習者更改調換是兵丁之技藝每視該上司之去留以為轉移非訓練専精之道也凡事久則熟熟則生巧宜令各省將軍督撫提鎮因地制宜酌定規制永逺遵奉除騎射最為緊要天下通行學習外其餘各種學習悉著該上司會同通省官辨細心斟酌應用何軍器詳悉定議奏聞令各營永逺遵行接任官不得擅自更改倘將來有應變通之處具題請旨如此則兵丁各精其業且使一省之中彼此畫一將來或有調遣會集之處正可相資為用於營伍大有裨益是年覆準官兵遇升遷事故其本人舊有軍器係官銀置備者留給頂補之人若自備者除官員軍器聽其自便外兵丁軍器該管官視其器械之利鈍酌量定價給新補之兵即將新補兵應領錢糧扣給原主又議準官兵所用軍器內鳥槍一項能衝鋭折堅最為便利如腹內省分地勢平坦利用弓矢至沿海沿邊省分利用鳥槍應將腹內省分每兵千名設鳥槍三百桿沿海沿邊省分每兵千名設鳥槍四百桿又議準山東省各營軍器如弓箭鳥槍炮藤牌長槍大刀均係通設之械每兵百名分作十分弓箭三分鳥槍五分藤牌一分長槍一分此外别設炮手専演發炮不得擅為更換又議準河南省各營軍器駐防八旗設馬步弓箭兵鳥槍兵子母炮兵長槍兵督標左右兩營設馬步弓箭兵鳥槍兵炮兵藤牌兵大刀兵河北鎮標九營各設馬步弓箭兵鳥槍兵炮兵護炮片刀兵南陽鎮七營各設馬步弓箭兵鳥槍兵炮兵護炮片刀兵藤牌兵各營軍器雖不同而緊要通行者已無不備仍令永逺演習不得更換六年議準直𨽻省各營軍器有弓箭馬槍炮及三眼槍藤牌長槍大刀之屬均隨時演習但地勢之險夷不同兵器之利用各别除騎射鳥槍炮永逺畫一操練外至藤牌於宣化鎮平陽之地最利應以該鎮向設之三眼槍長槍大刀改換藤牌兵紫荆關鳥槍甚少應以該鎮向設之大刀改換鳥槍兵又議準山西省各營地屬沿邊每兵百名分作十分弓箭六分鳥槍四分别設炮兵専演大炮惟殺虎協舊有藤牌兵三百名仍令演習其餘長槍㓲刀之屬悉令改為弓箭鳥槍兵又議準江南江西省水師各營軍器除弓箭鳥槍炮外如藤牌大刀鈎鐮槍過船槍鉞斧標鐵彈弓為水師營利用之器毋庸議改其陸路各營有設三眼銃長鎗而無藤牌者按三眼銃不能致逺長槍遇險狹之地不能旋轉任意應將三眼銃改為鳥槍長槍改為藤牌兵又議準福建省陸路各營每兵千名分作二十隊弓箭馬兵四隊弓箭步兵二隊鳥槍兵十隊炮兵一隊藤牌兵一隊長槍兵一隊大刀兵一隊各營兵數多寡不齊照此遞為增減水師戰船大趕繒船設兵八十名設排槍四十二桿中趕繒船設兵六十名設排槍三十桿小趕繒船設兵五十名設排槍二十五桿大艍船設兵三十五名設排槍十六桿中艍船設兵三十名設排槍十六桿小艍船設兵二十名設排槍十桿仍各備火藥彈子火罐火箭之屬又議準浙江省各營每兵千名分作二十隊弓箭兵三百名為六隊鳥槍兵四百名為八隊藤牌兵一百名為二隊片刀兵一百名為二隊長槍兵五十名為一隊炮兵五十名為一隊七年議準陜西四川省各營除弓箭鳥槍炮通行演習外其弓箭馬兵兼習槍棒守兵兼習㓲刀又令提標守兵二百名専習藤牌又議準廣東省各營每兵百名設弓箭兵二十名各佩腰刀兼習雙刀鳥槍兵長槍兵共五十名各佩腰刀藤牌兵十名兼習排刀挑刀兵十名炮兵十名又議準雲南貴州廣西三省各營每兵千名設弓箭兵二百名鳥槍兵六百名藤牌兵一百名以炮兵百名兼習牌刀其不足千名營分亦照此數遞減分派十年議準福建省水路則海面遼闊陸路則林深箐密鳥槍一項最為利用於定例每兵千名設鳥槍四百桿外再增鳥槍百桿十一年議準八旗官兵盔甲弓矢櫜鞬等項多不齊備如遇點驗私相那借且初授之官新選之兵亦有不及設立者應令各佐領核明殘闕軍器或繫全無或闕少若干逐細報明補造借給俸餉以為價值工部照依定價按式成造分給該管大臣每年於霜降後點驗一次仍令各佐領稽察倘年久應修亦照此例造給乾隆五年議準雲南貴州二省地多山箐又隂雨不常弓箭一遇潮濕之時險仄之地不能應手施展惟弩弓以木為質其力最徑令弓箭手各兼習弩弓十五年議準湖廣武昌鎮水師二營地界川江水操弓箭技有難施惟鳥槍極為便利照沿海沿邊省分每兵千名設鳥槍四百桿簡核軍器凡京營軍器三年一次由八旗奏請特命王公大臣驗閲駐防八旗軍器各將軍都統副都統於到任後率所屬簡稽軍營鎧仗同城限二月外屬限三月竣事逰牧處官兵軍器由部奏請特命大臣驗閲各察其盈絀利鈍具疏以聞直省各標營軍器以都司守備為専管官副將參將遊擊為兼管官遇有動用修補估價詳報給公項治備嵗終彚送布政使核銷督撫提鎮嵗委官察驗取具册結嵗終彚疏保題以册達部稽核虧闕者論如法順治四年諭兵部兵丁甲胄及一應器械爾部於每嵗春秋二季各簡閲一次五年奏準每年秋季奏請點驗八旗護軍營驍騎營器械春季奏請點驗前鋒營步軍營器械令該管官互相稽察又定點驗軍器若盔甲弓箭等項全無者官革職兵鞭一百革退軍器闕少及箭上無字並書他人姓名者官罰俸一年兵鞭五十軍器朽壞者官罰俸兩月兵鞭二十如所屬官兵盔甲弓箭等項全無及軍器闕少或朽壞者一名至五名該管都統等罰俸三月參領等罰俸六月六名至十名都統等罰俸六月參領等罰俸九月十名以上者都統等罰俸九月參領等罰俸一年二十名以上者都統等罰俸一年參領等降一級留任三十名以上者都統等罰俸二年參領等降一級罰俸一年至佐領驍騎校等所管兵數多多有軍器缺少朽壞一名至三名者罰俸六月四名至六名罰俸一年七名至十名降一級留任內府及王公府屬佐領管領下有十名以上者降一級罰俸一年二十名以上降二級留任十六年覆準緑旗營官兵軍器按季點驗違者扣餉治罪各該督撫時加簡閲自十七年秋季為始兵部奏請差大臣分往各地閲視永為定例三年一舉行雍正元年奏準遊牧八旗察哈爾官兵軍器由部越一嵗疏列滿洲蒙古都統統領副都統職名恭請欽點一人前往稽閲又奏準官兵以軍器質當者官革職兵鞭一百革退軍器追繳還官失察之該管官罰俸一年二年奉上諭八旗軍器年久殘闕不全兵丁無力修整著賞給庫帑各旗核明數目照舊設立三年點驗之時暫行封貯俟各旗驗畢始令發回以杜那借六年奏準官兵私賣軍器者革退交刑部治罪失察之該管官罰俸一年十年議準直省各營軍裝器械屬督撫所轄者督撫委官盤察提督所轄者提督委官盤察皆取本營並無闕少及委官並無揑飾印甘結存案各於年終保題至於各鎮有督提統轄者由該鎮委官盤察取印甘結並加具保結送督提察核於年終保題若無督提統轄各該鎮委官盤查取結亦於年終保題其保題時各將所屬軍裝器械數目分晰標營造册並保結送部察核如保題後仍有闕少將從前盤察官罰俸六月督撫提鎮罰俸三月倘委官明知闕少扶同揑結報稱並無闕少者降三級調用又議準各營軍裝器械以都守為専管官副參遊為兼管官若無故闕少經督撫提鎮題參將専管官罰俸一年兼管官罰俸六月照數分賠係兼管官察出揭報者免議止令専管官獨賠皆限六月賠完如逾限不完將専管官住俸兼管官停升俟賠完日開復若係兵丁闕少經該管官察出揭報追補足額者免議至於新舊各官接任將軍裝器械限一月交代如無闕少新官造册出結詳報督撫提鎮年終報部若交代時舊官推卸不交新官勒索不受皆照交代遲延例分别議處至病故官辨闕少軍裝器械者係兼管官病故著落専管官獨賠専管官病故著落兼管官獨賠倘専管官兼管官一時病故著落從前未經察出之兼専各官分賠其闕少各數果係年久朽壞出師闕損及因公動用者準動公費製備免其議處分賠倘有藉端科纍兵辨製備者照因公科斂例議處又議準督撫提鎮將營中盔甲弓箭鳥槍藤牌刀槍旗幟鍋帳鉛藥鍬棍等項按照題定額數製備一有損闕該管官即詳報隨時修整準其動用公費務期齊全足用如有盈餘擇其堪用者存營以備增補其朽敝者酌量銷毁以免竊賣之弊十一年議準營中一應軍器遇有闕損不按時修整及修整而收貯不謹以致朽爛或將預備鐵木等項堆貯潮濕地方以致鏽蝕者將該管官罰俸六月仍令照數賠補又議準失火燒毁官兵盔甲器械等物者該管官罰俸六月若因公他出者免議又議準營泛兵丁所帶腰刀該管官不時察驗遇有損壞即時修整如損壞不堪使用及有白鐵無鋼者將兵責革該管官罰俸一年乾隆元年議準修補一應軍裝器械該管官估定價值呈報該提鎮察無浮冒準其動公修補完日委官察驗出結申報提鎮該提鎮陸續移會布政使司并詳督撫存案是年議準民間不許私製鳥槍其鄉村險僻之處防盜防虎鳥槍在所必需各省督撫確察州縣內有實在應用地方照兵丁鳥槍式樣製造書鏨姓名具呈地方官編號注册備案如非應用地方有私藏或私造售賣者均責四十板鳥槍入官失察之該管官罰俸一年四年題準各省將軍都統副都統於到任時將所屬同城親標旗營一應軍裝器械限兩月委官盤驗其外屬各營軍裝器械限三月委官盤驗各保題一次仍取具該管官並無虧少印結及委員並無揑飾印結存案於年終保題仍將所屬各營軍器數目造册送部察核倘委盤保題後仍有闕額别經發覺者將盤驗之官罰俸六月將軍等罰俸三月委官扶同揑結者降三級調用十四年議準營兵號衣之外别有聽差衣帽向係坐扣餉銀官辦尺寸有定各兵身材不齊長短不能合式且雇覔縫人費用頗多其中不肖官辨隊長不免扣尅染指嗣後不必官辦令兵自行製備免其坐扣餉銀該上司不時察驗務使潔淨整齊不至闕乏十五年奉上諭八旗官兵器械闕少者均咨部官為造給器械內弓箭尤為緊要惟賴不時整理善為收貯從前兵部八旗都統會議訓飭八旗官兵將器械善為收貯曽經奏準施行今都統等或因日久廢弛不以為事亦未可定著再行傳諭務遵原諭留心訓飭稽察十六年覆準鳥槍為緊要軍器倘有年久不堪適用者令該堂官驗看確實準其重造其舊槍鎔化之鐵加謹收貯以備增造各項軍裝之用十八年奉上諭八旗軍器例應每年特簡王公大臣點驗但一嵗點驗殊覺煩擾嗣後著三年一次點驗既寬點驗之限臨時務宜留心察核不得草率了事若朕親閲時軍器仍有虧闕損壞者必將點驗之王公大臣治罪至點驗之年將八旗前鋒營護軍營驍騎營內府護軍官兵軍器仍照例點驗外其內府佐領下驍騎及王公府屬兵丁軍器皆停其點驗四十一年諭各該處軍器嗣後遇應點驗之期俱著交兵部一體奏派王大臣點驗毋庸自行奏請再旗員內如護軍校筆帖式等微末員辨所有軍器可毋庸點驗以示體恤其應如何酌定章程之處著兵部另議具奏尋議得八旗各營軍器遇應行點驗之年自應彚齊查驗以整武衛而肅軍容向來領侍衛等處相沿舊例俱不由兵部一體奏派辦理原未畫一今欽遵諭旨嗣後俱令造册咨送兵部一體辦理外至旗員內護軍校筆帖式等官一切軍器向係隨同查驗今酌議武職六品以下與護軍校筆帖式品級相同所有各該員一切軍器均一概免其點驗以歸畫一四十二年奏準嗣後每年八旗漢軍演放大小炮位酌定千斤以上炮靶作為三百步五百斤以上炮靶作為二百步四百斤重等炮靶作為一百步其千斤以上炮位演放十五炮中十炮以上五百斤以上炮位演放十五炮中十二炮以上四百斤重等炮位演放十五炮中十三炮以上俱為合式如較定數少中者將管炮位照例議處四十五年奏定演放五百斤及千斤炮位較四百斤炮位立靶稍逺車上演放勢必搖動難以得準嗣後换用土臺演放較炮車實為穩妥其四百斤重等炮仍照舊例四十六年奏準箭枝撤袋腰刀均係緊要器械向由外雇匠役承造難免生疏嗣後八旗及各省駐防凡遇有行取箭枝撤袋腰刀等項請交造辦處武備院製造以期妥協四十八年奏準正陽等內外十六門存貯炮位隨同八旗演放分作四門一次以東直門廣渠門西直門廣寧門為一次朝陽門左安門阜城門右安門為一次崇文門永定門德勝門西便門為一次安定門東便門正陽門宣武門為一次每屆三年每門出演十位共計四十位並將神機神樞等炮每次撥出二十位隨同四門出演之炮一併試演由步軍統領將門千總漢