闕少悉追賠十年奏準直隸山東河南山西每次解硝各十五萬斤山西由山路馱運所有題銷工運價直視三省較昂且硝之成色亦不及三省應將山西例解之硝停其辨運令直隸山東河南各增辦五萬斤解部應用十一年議準各省兵每嵗操演用鉛子準其檢七耗三除拾回抵算外將實用鉛價於公項銀兩開除報銷十二年奉上諭旗營兵演放鳥槍鉛子均不拾回徒然拋棄外省兵演放鉛子既有拾回之例京城所放鉛子作何拾取之處著八旗並操演火器營大臣等會議具奏尋議準嗣後京城官兵演放鳥槍之鉛子各旗委兵用心拾取務將實得數目注册收貯嵗終各營將每月由工部領回數目並拾回數目合算交部是年議準直省各營火藥關係緊要必須預備方為有益督撫提鎮將所轄各營酌量每年應用之數動公費製造潮濕地方預備三年髙燥地方預備五年加謹收貯每年所用火藥即於收貯數內動支仍照動支數目製造貯庫出陳易新按年造册報部該管官如遇升遷事故離任照倉庫錢糧例交代若虧缺及不堪用者責令専管官賠補仍罰俸一年該管上司罰俸六月乾隆七年奏準每逢工部碾造軍需火藥完日奏請欽點大臣驗看如果合式凖其貯庫備用十一年議準兵丁操演所需鉛彈火藥火繩應動用公費但各營議有定數若操演時或施放生踈欲令多放數次則此項鉛藥火繩須兵自備因而該管官恐兵無力不免草率了事終於不能純熟嗣後概動公費製給十八年奏準厰內製造演放火藥每火藥萬斤用硝八千斤硫黃一千有五斤十兩廣膠六斤四兩每烘藥百斤用硝八十三斤十兩八錢硫黃十四斤七兩五錢又奏準從前貯軍需火藥均置油簍荆條脆朽不能經久應在濯靈厰內建木倉五間貯之帳房帳房之制官用藍布為之每架髙六尺五寸下寬一丈二尺深六尺四寸兵用白布為之有堂屋者每架髙六尺五寸下寬一丈二尺深九尺六寸無堂屋者制與藍帳房同欽定工部則例造涼篷帳房式乾隆二十一年定夾頂夾圍大涼篷單頂單圍大涼篷夾頂單圍大涼篷夾頂單圍中涼篷夾頂單圍小涼篷夾頂單圍土地祠涼篷單頂無圍涼篷彩畫單布照壁有堂屋夾帳房無堂屋夾帳房單帳房單堂房單綳子拐角夾帳房拐角單帳房彩畫布城收貯大涼篷皮包收貯小涼篷皮包梅花樁戰船戰船每船長十一丈至一丈九尺闊二丈三尺五寸至九尺六寸各有差天津山東福建船均屬外海江西湖廣船均屬內河江南浙江廣東船分屬外海內河外海定限三年小修六年大修九年再大修不堪修者更造內河定限三年小修八年大修十一年再小修十四年再大修不堪修者更造其修造之費有正價有津貼正價各以其直無定額津貼每正價百兩自加四加六加八至加倍倍半有差由工部準兵部移咨核覆修造各令本省道員會同副將參將等官辨監造工竣報部題銷康熙三十四年奉上諭戰船關係緊要修理銀數核減太過恐臨用之時因船料單薄復行大修以致貽誤著工部會同户兵二部再行確議具奏尋議準令各督撫將軍提鎮將修理戰船銀照各地方工料價直據實確估具題工竣報銷五十二年覆準戰船風篷桅索除應修之年毋庸别給外每嵗於朋扣餘剩銀內給與製辦又議準各營艍犁趕繒等船於船頭船尾刋刻某營某鎮某號捕盜船名雍正六年奉上諭各省修造戰船於成造之時解送總督親驗總督委中軍每向監造文員需索規例為之徇隱是以工料皆屬虛糜其實不能堅固朕思戰船關係緊要嗣後船厰附近省城者著在城之督撫提鎮及布按兩司於承造完工之日公同驗看倘有不能堅固完好及浮冒侵蝕等弊即揭報題恭按律治罪是年議準浙江承造戰船船底木用大號堅固松木每長一丈面梁闊三尺三寸船身正桅均長一丈二尺頭號水艍船闊二丈二尺五寸船身增長八丈九尺倉深七尺九寸板淨厚三寸一分二號趕繒船闊一丈九尺五寸船身減長七丈九尺倉深七尺一寸板淨厚二寸九分三號雙篷䑩船闊一丈七尺五寸船身減長六丈六尺倉深六尺一寸板淨厚二寸五分四號快哨船闊一丈四尺船身減長四丈八尺倉深五尺板淨厚二寸每板長一丈均用釘三又議準奉天戰船身長七丈四尺寬一丈八尺七寸二十一倉八年奉上諭向來外省各標營沙唬趕繒等船原令道員會同副將監督修造道員遴委同知通判承修副將遴委都司守備監修聞承修之人辦料必俟監修驗看自千總以及遊副逐層需索及如式修造赴各標營交收又有驗看勒索之弊逮交收之後一任船置河干雨淋日曬船中器械繩索為頭舵人等竊賣而該管將辨槩不追究夫始則借端勒索後則聽其毁棄豈非以承修専在文員而監修武辨置身局外乎此弊聞各處仍然而京口將軍標下為尤甚嗣後修造標營戰船著道員副將會同領價道員遴委丞倅副將遴委都守協同辦料修造如係將軍標下之船即遴委參領下等官同領辦其船交收之後在汛停泊責令頭舵苫蓋澆洗每嵗該管將辨具結送督撫察核如有升遷事故具結交代至船有小修大修拆造之不同是以工料懸殊今聞船未發厰頭舵人等已將在船什物私行盜賣即屆小修亦必令其拆換加倍甚屬不法嗣後著將什物一并具册移交如有虧闕將該管將辨及頭舵人等分别參追十年議準天津大趕繒船每船用梗木棍十五根舵牙二根水藤一百五十斤竹篾一百五十斤小趕繒船每船用梗木棍十五根舵牙二根水藤一百三十斤竹篾一百三十斤各船收操之後詳加察驗果有損傷照數更換驗無損傷仍責令收貯備用又議準山東登膠南北二汛海口趕繒船照雍正六年浙江題定之例身長七丈三尺板厚二寸七分雙篷䑩船身長六丈四尺板厚二寸五分福建大號趕繒船身長九丈六尺板厚三寸