body:
  text: 羣廟考五京師王廟順治五年定莊親王立一廟禮親王巽親王謙郡王共立一廟肅親王立一廟饒餘親王端重郡王共立一廟頴親王順承郡王共立一廟豫郡王立一廟按乾隆四十三年奉㫖後親王封號克勤郡王衍禧郡王共立一廟雍正九年定怡賢親王立一廟廟立於正寢東正殿臺高二尺一寸院内東西廂大門臺高一尺六寸主高二尺廣四寸朱色刻所封諡號墨書設紅漆龕内外垂紅片金慢祭日以正月四月七月十月嵗暮恭候皇帝祭太廟諸王陪祭禮畢乃各歸其府致祭凡薦新品物太廟未獻之先不許供儀制供品詳後家廟禮臣等謹案宗室封王者立家廟祭崇徳元年所定也迨順治五年世祖章皇帝命宗室封王無嗣者太廟祔享有嗣者令其子孫立家廟十年議定郡王以上祀追封祖父於家廟貝勒以下祀追封祖父於墳墓嗣又以諸王皆在京師離墳墓近可隨時親詣致祭其京城内各立家廟令停止至雍正九年世宗憲皇帝篤念怡賢親王體國忠貞特命立家廟致祭在諸王勲重宗功名登太室禮隆元祀已極褒榮而家庭之間猶復推恩立廟俾得各展霜露之思揆諸古者諸侯廟禮其儀制適符兹特敬謹備録以昭我朝惇叙酬庸之盛典焉京師功臣宗祠順治十一年十月丁丑立定南武壯王孔有徳祠世祖章皇帝諭禮部定南武壯王孔有徳審時率衆航海來歸屢建功績迨朕平定天下有徳剿巨冦靖南服開闢廣西勲勞懋著不意桂林之役衆寡不敵精忠自矢竟以身殉義烈允彰稽考舊典有立祠致祭之例爾部詳察具奏己夘命以二妃陪祀嗣經禮臣議准建祠於廣寧門外中設一案以妃白氏李氏配嵗以春秋仲月諏吉遣太常寺卿致祭祭文曰維某年月日皇帝遣某官某諭祭於定南武壯王孔有徳之靈曰人臣盡忠仗節矢天日而不渝朝廷恤死酬􅈴撫嵗時而増感爾定南武壯王孔有徳膚功早著偉烈常存兹當仲春秋之辰益念忠良之績特頒祭典用慰幽靈王如有知尚克歆享康熙十八年三月己未立宏毅公諡恪僖遏必隆祠聖祖仁皇帝諭禮部自古帝王敦重倫常篤念勲舊必有嘉褒之典以示推恩孝昭皇后徳著椒宫母儀天下懿範如在毎切追思其父遏必隆簮纓世裔宣力累朝忠殫謀猷功存弼亮況篤生賢淑佐理宫闈宜加表揚垂諸乆逺已勅所司特為建立祠堂其妻縣主夙茂温恭克昭家訓宜並祔享朕親製碑文勒之貞珉告成之日應賜諭祭嗣建祠於安定門外中設一案以縣主一品夫人舒舒覺羅氏配嵗以春秋仲月諏吉遣太常寺卿致祭祭文曰維某年月日皇帝遣某官某諭祭於恪僖公遏必隆之靈曰沛隆恩於勲舊國有彝章展時祭於春秋禮逾常格爾恪僖公遏必隆名垂青簡績著豐碑追椒寢於所生宜専祀以有永兹當春秋仲申侑几筵靈如有知尚克歆饗聖祖仁皇帝勅賜一等公遏必隆家廟碑孝昭皇后壼徳攸宣倫情肫篤念父母鞠育之勤思祠宇春秋之祀朕嘉其意遣官督理後二月皇后已崩十七年十二月工作告成因諭内閣詳考明代寔録允符典例特賜碑文勒諸貞石粤稽往代臨御萬邦必敦九族宫闈化洽内輔惟賢眷佑之隆宜崇曠典以篤椒親道至備也孝昭皇后仁孝性成温恭徳著久存屺岵之思毎深霜露之感爾一等公遏必隆同妻縣主敬慎齊家洽謙冲之令望肅雍秉訓誕淑慎之坤儀是當錫以丹堊享以蘋蘩爰命冬官董其興作事方行乎二月哀忽動於六宫未遂之志朕甚悼焉念爾勲戚大臣兼覈歴朝典制落成之日用賜豐碑昭國家不遺故舊之恩示皇后永懐顧復之念光流泉壤堪為戚屬之羽儀名列丹青不愧綸言之奬賚凡爾子孫克保無斁欽哉雍正元年三月癸未立定南將軍一等承恩公諡勤襄佟圖賴安北將軍内大臣一等公諡忠勇佟國綱領侍衞内大臣一等公諡端純佟國維祠奉命春秋致祭祠建於朝陽門外祠内設三案勤襄公居中以一品夫人覺羅氏配忠勇公左以一品夫人他塔喇氏温都氏配端純公右以一品夫人赫舍哩氏配嵗以春秋仲月諏吉遣太常寺卿致祭祭文曰維某年月日皇帝遣某官某諭祭於勤襄公佟圖賴忠勇公佟國綱端純公佟國維之靈曰崇功報徳禮首逮於元臣錫類推恩誼尤敦於懿戚考彞章而立廟因時序以薦觴惟爾一門宣猷累葉效忠貞而體國名著旂常秉孝義以型家芳傳國史望高閥閲蔚為􅈴舊之宗慶衍庭幃光啟聖慈之範兹當春秋仲特遣専官設奠几筵靈其歆饗世宗憲皇帝勅賜一等公佟國賴佟國綱佟國維家廟碑國家𢎞開景運光啟昌期必有佐命元􅈴承家懿戚遞膺時棟蔚作世臣矢奕葉之公忠隆累朝之毗倚帶礪褒封於勿替馨香崇祀於靡窮凡以答殊勞昭盛典也爾佟圖賴挺生華胄翊贊興朝先烈丕承任専閫握樞之寄嘉謨聿著樹名鍾勒鼎之功重闈之毓慶彌光後嗣之貽謀永裕爾佟國綱丹心貫日勁節凌霜愛國忘家乃鞠躬而盡瘁舍生取義實移孝以作忠爾佟國維盛代耆英巍班碩徳靈鍾川嶽誕萬國之母儀誼重股肱荷九重之天眷朕酬庸念切錫類情殷懐篤棐之純忱報豐功以専祀絲綸式賁祠宇維新於戯忠藎萃於一門柱石繫邦家之重苾芬薦於兩世旗常流史冊之徽千秋宗緒綿延克昌厥後累代國恩優渥長發其祥爰泐堅珉用彰懋賞風於有位垂示來兹雍正元年三月癸未立大學士一等公諡文襄圖海祠奉命春秋致祭祠建於徳勝門外中設一案以一品夫人覺爾禪氏鈕祐禄氏配嵗以春秋仲月諏吉遣太常寺卿致祭祭文曰維某年月日皇帝遣某官某諭祭於文襄公圖海之靈曰義重酬勲眷鈞衡之舊徳禮隆秩祀因節序以申恩爾文襄公圖海望高國器功賛王猷表世徳於㦸門生膺茀禄贈崇階於鼎爵殁被榮名煥新綍以建祠遣専宫而致祭時當春秋仲式布几筵靈其有知尚能歆格世宗憲皇帝勅賜一等公圖海祠碑朕惟國家義重酬庸典隆眷舊丹宸錫寵已𢎞配享之文紫綍揚芬更重専祠之祭所以篤純臣旌丕績也爾圖海賦資誠慤奉職公忠入掌樞機允副弼諧之任出麾旌鉞屢成克敵之功運籌而荒服蕩平威宣閫外制勝而西陲底定績奏師中宜示褒揚俾膺特祀輝煌棟宇色映雲霞璀璨絲綸光生碑碣屆春秋之令序薦黍稷之維馨於戲嘉乃壯猷丕著優崇之典念兹元老𢎞敷逾格之恩式克欽承昭兹來許乾隆二年立光禄大夫𢎞毅公額亦都祠奉命嵗祭於其家祠祠在安定門外嵗以春秋仲月諏吉遣太常寺卿致祭祝辭曰維某年月日皇帝遣某官某諭祭於𢎞毅公額亦都巴圖魯之靈曰誼重酬庸茂典聿加於勲舊禮隆展祀嵗時宜備於馨香爾𢎞毅公額亦都巴圖魯開國名臣從龍上佐表成勞於鍾鼎青史楊芬紀偉績於旗常豐碑示寵既叨恩於廟食更賜祭於専祠式賁新綸允符彞憲時當春秋仲用布几筵靈如有知尚其歆格乾隆十四年三月乙夘立太子太保内大臣追封一等承恩公諡恪僖哈世屯户部尚書内務府總管追封一等承恩公諡敏果米思翰一等男兼察哈爾總管追贈一等承恩公諡壯慤李榮保祠皇上諭人子報本之忱必念爾祖國家酬庸之典爰及所生大學士公傅恒夙夜宣猷贊襄機務前因金川番蠻不靖丹誠奮發自請督師維時朕以其世篤忠貞服勞王家鍾慶椒室聨輝懿戚悉由乃祖乃父積厚流光誕兹良弼陛辭之際朕欲加恩賜立祠堂秩於祀典大學士公傅恒奏稱臣仰蒙高厚榮賁先人寔出至願如果憑仗天威肅清荒徼凱旋之日擬當懇請殊恩今威信逺孚番酋效順膚功克奏美著旗常宜考懿章以示優錫其照􅈴臣額亦都佟國維之例勅建宗祠春秋致祭増光俎豆用奬忠勲嗣建祠於東安門内正祠五間内設三案恪僖公居中以一品夫人覺羅氏配敏果公左以一品夫人穆溪覺羅氏博爾濟吉特氏配壯慤公右以一品夫人覺羅氏配嵗以春秋仲月諏吉遣太常寺卿致祭祝辭曰維某年月日皇帝遣某官某諭祭於恪僖公哈世屯敏果公米思翰壯慤公李榮保之靈曰禮隆念舊千秋之俎豆攸光義重酬庸奕代之馨香勿替考彞章而秩祀因時序以申恩惟爾一門夙稱望族忠誠體國數傳紀績於旗常端敬型家累葉垂芳於圖史祥開坤極早錫榮封佑啓勲賢復新廟貌命祠官而陳芬苾落成已賁恩綸隨節候而展几筵嵗薦彌昭懿典兹當春秋仲常祀聿修靈如有知尚其歆格三十五年十月乙巳命大學士忠勇公傅恒入祀哈世屯祠領侍衞内大臣尹徳尚書果毅公阿里衮入祀遏必隆祠時奉諭前以大學士忠勇公傅恒體國公忠鞠躬盡瘁已降㫖入祀賢良祠復念傅恒曩者金川奏績時以其祖父世篤貞忠流光鍾慶曽諭令建立宗祠自其曽祖哈世屯以下官為春秋致祭今傅恒自應令其一體入祀酬庸俎豆至尚書果毅公阿里衮宣力殫忱克彰勞勩昨嵗曽令入祀賢良今思其先世額亦都遏必隆並以崇􅈴建有宗祠得膺祀典阿里衮亦應附食邀榮而其父領侍衞内大臣尹徳尚未列入著一併入遏必隆祠用奬勲藎該部即照例行睿忠親王祠乾隆四十四年奉㫖特建祠立於朝陽門外鷄市口嵗以春秋仲月諏吉遣太常寺卿致祭祝辭曰維某年月日皇帝遣某官某諭祭於睿忠親王之靈曰惟王功懋造邦忠能奉國馳驅盡瘁任隆則實冠親賢篤棐盟忱誣辨而彌彰精白既雪貞心於百載宜酬偉績於千秋鏤簡鐫珉追䘏盡從渥典雕筵翠俎升馨用飭祠官兹以仲春秋特陳時薦靈其來格勿替欽承臣等謹按唐制貴臣立家廟宋制文武官依舊式立家廟詳見於司馬光作文彦博光廟碑記馬端臨所已載入諸侯宗廟者我本朝親王郡王皆令立家廟此固古者諸侯宗廟之制而自王以下勲賢諸臣祖宗朝以來荷䝉恩禮宏推得立廟於京師如右所紀爵膺五等之崇禮及千秋之永仰惟國家教忠教孝深意非僅以埒於古諸侯而崇旌其身後且褒錫其先人也代有興起者生為柱石功在宗社酬報之典其咸視此已皇朝文獻通考卷一百二十三
