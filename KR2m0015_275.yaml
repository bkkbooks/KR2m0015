body:
  text: 輿地考七江蘇省臣等謹按禹貢以揚州次徐州之後而職方氏辨九州之地首列揚州殆以其幅員廣逺有逈越乎他州者歟今之江蘇安徽江西浙江福建五省皆古揚州地所謂北距淮而東南距海者惟江蘇省實兼之其在古者厥土塗泥厥田下下自漢以後財賦漸擴今且為九州之上腴矣其民風土俗在周以前號曰勾吳春秋而降文物肇興今則郁郁彬彬復為海內稱首蓋風氣之轉移其來已久而培養調燮薰陶漸漬因有所以益其盛而美其備者我朝厚澤深仁覃敷遐邇而三吳繁富之地彌切民依自列聖相承殷勤南顧凡夫河渠之奠定水利之疏通靡不備舉至於特免浮糧頻除正賦溫膏稠疊江表之霑被為尤多是以民生日厚民俗日淳為寰宇之名區而國家之奧府實有非他省所得而潔衡者至於每省各一㑹城而兹則江寧與蘇州並為都㑹良由土沃人殷孳殖寖廣故政事條目日以益繁斟酌變通因時立制固經野之道則然矣江蘇明初為應天府嘗置江南行省尋罷永樂時改建北京正統時定北京為京師以建康為南京仍設部科寺院以各府州直𨽻南京共領府十四州四其應天蘇州松江常州鎮江淮安揚州七府徐州一州為今下江地又置南京五軍都督府及中都留守司領諸衛其蘇州松江之蘇州金山等二十一衛十一所又别𨽻於北京之中軍都督府本朝定江南改應天府為江寧府罷南直𨽻改設江南布政使司按察使司駐江寧府設江寧巡撫駐蘇州領江寧蘇州松江常州鎮江五府别設鳯廬巡撫駐淮安領淮安揚州及鳯陽廬州四府徐州一州至安徽等五府三州則又以操江兼巡撫事領之順治四年設江南江西河南總督亦駐江寧府五年令專轄江南江西六年以漕運總督兼巡撫事轄淮揚等四府一州十六年仍設鳯廬巡撫十八年移右布政使司駐蘇州府轄江蘇松常鎮五府其左布政使司仍寄治江寧轄安徽寧池太盧鳯淮揚九府徐滁和廣德四州康熙元年以操江軍務歸並總督専設安徽巡撫三年分設兩按察使司一仍駐江寧轄江蘇等五府及淮揚等四府一州其一移駐安慶轄安徽等五府三州五年裁鳯廬巡撫以淮揚徐二府一州歸併江蘇巡撫以鳯廬二州歸併安徽巡撫其布政按察二司領地各如巡撫之數六年停左右布政之名定為江蘇安徽兩布政使司各不相統十三年總督停轄江西二十一年仍轄江蘇安徽江西三省雍正二年升蘇州府之太倉州揚州府之通州淮安府之海邳二州並為直𨽻州八年移江蘇按察使司亦駐蘇州府十一年升徐州為府仍改邳州為屬州乾隆二十五年定江蘇設兩布政使司一駐江寧領江淮揚徐四府海通二州一駐蘇州領蘇松常鎮四府太倉一州以安徽布政使司還治安慶江蘇省凡領府八直𨽻州三各衛所俱以次裁并入州縣其存者俱專司漕運不治民事東西距九百五十里南北距一千一百六十里東至太倉州崇明縣大海七百七十里西至安徽和州界一百八十里南至寧國府宣城縣界二百五十里北至山東沂州府郯城縣界九百十里東南至松江府金山縣海岸九百三十里西南至安徽太平府當塗縣治一百三十五里東北至山東沂州府日照縣界八百三十里西北至河南歸德府虞城縣界九百四十里在京師南二千四百里江寧府為省治東西距三百四十里南北距三百八十里東至鎮江府丹陽縣界一百六十里西至安徽和州界一百八十里南至安徽寧國府宣城縣界二百四十里北至安徽泗州天長縣界一百四十里南至鎮江府溧陽縣界一百九十里西南至安徽太平府當塗縣界一百三十五里東北至揚州府儀徴縣治一百三十五里西北至安徽滁州界一百四十里自府治至京師二千四百四十五里明初建都於此改為應天府永樂二年以為行在正統六年定為南京置府如故共領縣八本朝改為江寧府初為江南省城後分江蘇省此為江蘇安徽江西三省總督治雍正八年以溧陽縣往屬鎮江府乾隆二十五年分置江寧等處布政使司領江寧淮安揚州徐州四府海通二州治江寧府與蘇州府並為省㑹之地凡領縣七上元縣附郭治府東北境江寧縣附郭治府西南境句容縣在府東九十里溧水縣在府東南一百四十里髙淳縣在府東南二百四十里江浦縣在府西北四十里六合縣在府北一百二十里淮安府在江寧府北五百里蘇州府西北七百五十里東西距四百四十里南北距二百六十里東至海州界二百三十里西至安徽鳯陽府虹縣界二百一十里南至揚州府寶應縣界八十里北至海州沐陽縣界一百八十里東南至揚州府泰州治四百九十里西南至安徽泗州治一百八十里東北至海一百八十里西北至徐州府宿遷縣界一百九十里自府治至京師一千九百七十五里明為淮安府直𨽻南京降安東州為縣共領州二縣九本朝初屬江南省後分屬江蘇省雍正二年升海州邳州為直𨽻州以贛榆沐陽二縣屬海州宿遷睢寧二縣屬邳州九年增置阜寧縣凡領縣六山陽縣附郭阜寧縣在府東北一百六十里雍正九年析山陽鹽城二縣地置縣鹽城縣在府東南二百四十里清河縣在府西少北三十里宋以淮陰縣地置清河縣舊治大清河口元泰定時移治於甘羅城天厯元年復移小清河口明宋又移甘羅城本朝初復還黃河北岸舊治乾隆二十五年移於清江浦為今治安東縣在府東北六十里桃源縣在府西一百二十里揚州府在江寧府東北二百十里蘇州府西北四百四十五里東西距四百七十里南北距三百里東至海岸接通州如臯縣界三百六十里西至江寧府六合縣界一百十里南至大江接鎮江府丹徒縣界四十里北至淮安府山陽縣界二百六十里東南至通州泰興縣界八十里西南渡江至江寧府治二百十里東北至海岸三百里西北至安徽泗州