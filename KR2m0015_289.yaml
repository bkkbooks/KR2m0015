body:
  text: 輿地考二十二貴州省臣等謹按馬氏輿地考於荆州境內備列費思夷播珍溱諸州皆今之貴州地夫古荆州以嶺嶠為限説者謂自巴東踰江而南為四川酉陽州又迤邐而東南經湖南之永順辰州沅州府及靖州西境訖廣西越城嶺而止今貴州全境並在嶺嶠以西自非荆州疆宇所及矣蓋黔省本處梁州徼外於古號為鬼方殷時去夏未逺而有鬼方之伐為化外之域可知隋唐以後開置羈縻諸州而旋或淪陷元初尚稱為羅施鬼國則其荒逺僻陋固與內地之夙登郡縣者不同也以今日黔中形勢論之東楚西滇南粵北蜀實界四省之中居然腹裏之地特以山箐阻深羣蠻錯處故前代率以荒徼視之明時漸治以中土之法增設流官分為一省東西千里南北三百餘里於諸省之中壤地為狹我國家改易衛所俱置州縣又益以四川湖南廣西附近之府州縣南北之境幾與東西埒至於古州八寨諸苖伊古不通聲教自經聖朝戡定以來設官臨治等於齊民黔之四封屹然有截洵所謂文德誕敷有苖來格者歟貴州明洪武初分屬雲南湖廣四川十五年置貴州都指揮使司永樂十一年以思州二十二長官司分置思州石阡黎平新化四府以思南十七長官司分置思南銅仁鎮逺烏羅四府而於貴州設貴州等處承宣布政使司以總八府仍與貴州都司同管貴州宣慰司十三年改普安安撫司為直𨽻普安州宣德九年以新化府省入黎平府正統三年以烏羅府省入思南銅仁二府又改安順州永寧鎮寧州俱為直𨽻州成化十二年置程番府𢎞治七年置都勻府隆慶三年改程番府為貴陽府萬歷二十九年分播地為二郡以關為界關外屬貴州為平越府關內屬四川為遵義府其二府與貴陽府俱加稱軍民府三十年升安順州為安順軍民府後改直𨽻永寧鎮寧普安三州俱屬安順府共為貴陽思州石阡黎平思南銅仁鎮逺都勻安順平越十府以都指揮使司領貴州等十八衛及黃平等守禦千户所本朝初因之順治十五年設貴州巡撫及布政使司按察使司皆駐貴陽府設雲南總督兩省互駐康熙元年專設貴州總督駐安順府四年復為雲貴總督亦駐貴陽時以平定水西改設流官以水西宣慰司之水西城置黔西府以比喇壩置平逺府以大方城置大定府又改四川之烏撤軍民府為威寧府來屬二十二年移雲貴總督駐雲南仍轄二省二十三年改黔西平逺二府為州屬於大定府二十六年又改大定府為州與黔西平逺二州俱屬威寧府雍正五年增置南籠府七年定雲貴廣西共一總督改四川之遵義府來屬復升大定州為府降威寧府為州以屬之乾隆元年設貴州總督兼攝巡撫事十二年仍與雲南共一總督專設貴州巡撫凡領府十三各衛所以次裁併入州縣惟古州台拱清江八寨丹江凱里黃平等衛於乾隆二年開置專理苖疆軍屯事務東西距一千九十里南北距七百七十里東至湖南辰州府界五百四十里西至雲南曲靖府界五百五十里南至廣西慶逺府南丹州界二百二十里北至四川重慶府界五百五十里東南至廣西泗城府西隆州界三百五十里西南至雲南曲靖府界五百三十里東北至辰州府界五百二十里西北至雲南東川府界五百六十里在京師西南七千六百四十里貴陽府為省治東西距一百五十里南北距三百七十里東至都勻府麻哈州界一百二十里西至安順府清鎮縣界三十里南至南籠府永豐州界二百二十里北至遵義府遵義縣界一百五十里東南至麻哈州界一百二十里西南至永豐州界一百二十里東北至遵義縣界二百十里西北至清鎮縣界六十里自府治至京師七千六百四十里明洪武四年置貴州宣撫司六年升為宣慰司𨽻四川永樂十一年始置貴州布政使司以貴州宣慰司及所領地方𨽻之成化十年置程番府在今府南定番州境隆慶二年移府治於今省城改為貴陽府萬歷二十九年改為貴陽軍民府本朝初因之康熙三年平水西宣慰司以所領長官司皆歸府轄十一年改置龍里縣二十六年罷軍民府之名稱為貴陽府又改置貴築縣及修文縣以平越府之貴定縣來屬三十四年省新貴縣入貴築縣雍正四年開置長寨廳凡領州三縣四廳一長官司二十四貴築縣附郭明隆慶六年置新貴縣改本朝康熙二十六年廢貴州貴前二衛置貴築縣與新貴縣並為府治三十四年省新貴縣入貴築縣龍里縣在府東五十里明洪武二十三年置龍里衛本朝康熙十一年改置縣貴定縣在府東一百五十里修文縣在府北五十里明崇禎三年置敷勇衛及修文等四守禦所本朝康熙二十六年改置修文縣開州在府東一百二十里定番州在府南一百里廣順州在府西南一百十里長寨廳在府西南一百七十里本化外狆苖地本朝雍正四年平之設同知治其地中曹長官司在府南十五里白納正副長官司在府北七十里養龍長官司在府北二百二十里大谷龍長官司在龍里縣西北羊場長官司在龍里縣東北新添長官司在貴定縣境平伐長官司在貴定縣南大平伐長官司在貴定縣南三十里小平伐長官司在貴定縣西南五十里底寨正副長官司在修文縣北乖西正副長官司在開州東北六十里程番長官司在定番州東二十五里小程番長官司在定番州西北五里金石番長官司在定番州東二十五里大龍番長官司在定番州東三十里小龍番長官司在定番州東南二十里方番長官司在定番州南八里卧龍番長官司在定番州南五十里羅番長官司在定番州南三十里盧番長官司在定畨州北五里韋番長官司在定番州南五里上馬橋長官司在定番州西北二十里木瓜正副長官司在定番州西七十里麻嚮長官司在定畨州西七十五里思州府在省治東五百十里東西距一百九十里南北距二百六十里東至湖南沅州府芷江縣