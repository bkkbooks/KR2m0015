body:
  text: 欽定四庫全書皇朝文獻通考卷九十五郊社考五祀后土順治元年定制每嵗夏至大祀地於北郊方澤以五嶽五鎮四海四瀆為四從壇配享方澤壇詳見於後八年尊封肇祖原皇帝興祖直皇帝陵山為啓運山景祖翼皇帝顯祖宣皇帝陵山為積慶山十六年以積慶山二陵奉移啓運山停從祀太祖高皇帝陵山為天柱山太宗文皇帝陵山為隆業山附四從壇配享十四年三月壬子世祖章皇帝大祀地於方澤奉太祖高皇帝太宗文皇帝配享自順治元年以來夏至之祀皆遣官恭代是嵗以奉太祖太宗配享於夏至之前特舉大祀前期遣官告祭天地宗廟社稷正祭日世祖親詣行禮恭奉太祖高皇帝神位奉安于東配位黃幄內恭奉太宗文皇帝神位奉安于西配位黃幄內禮畢乃行大祀禮如夏至之儀嗣是以告謝親祀者一以告祭親祀者一合祀南郊者一惟是年為正祀北郊之禮凡祀方澤以夏至日卯時後定以日出前七刻與圜丘祈穀均為大祀皇帝親詣行禮先於中和殿閲視祝版用黃質墨書皇地祇正位用黃琮一黃色制帛一樂用八奏林鍾為宫舞用八佾牲用犢器用陶爵用匏舊制用黃玉列聖配位供品同無玉用奉先制帛各一皇帝禮服用黃從壇五嶽五鎮均制帛五五色各一從祀陵山各白色一牲用太牢四海制帛四青白赤黑各一四瀆制帛四皆黑色牲同康熙元年五月戊寅夏至大祀地於方澤聖祖仁皇帝親詣行禮二年尊封世祖章皇帝陵山為昌瑞山從祀三陵山之次六年十一月丙辰大祀地於方澤奉世祖章皇帝配享正祭日聖祖親詣行禮恭奉世祖章皇帝神位奉安於東配位太祖高皇帝之次第二黃幄內禮儀與順治十四年同自元年以後凡親祭方澤者二十有六餘皆遣官雍正二年五月癸卯夏至世宗憲皇帝大祀地於方澤奉聖祖仁皇帝配享正祭日世宗親詣行禮恭奉聖祖仁皇帝神位奉安於西配位太宗文皇帝之次第二黃幄內禮儀與康熙六年同三年夏至亦親詣行禮乾隆元年五月丙午夏至大祀地於方澤皇上親詣行禮是月尊封世宗憲皇帝陵山為永寧山從祀四陵山之次二年五月辛亥夏至大祀地於方澤奉世宗憲皇帝配享是年特舉世宗憲皇帝配享大典四月甲戌大祀圜丘恭行配享之禮是月夏至大祀方澤皇上親詣行禮恭奉世宗憲皇帝神位參拜皇地祇禮畢奉安於皇地祇神位之右世祖章皇帝之次第三黃幄內禮儀與圜丘同八年五月癸未夏至大祀方澤先期致齋於齋宫定制兩郊皆有齋宫是嵗修葺北郊齋宫齋宿如禮九年五月戊子夏至大祀地於方澤以祈雨不乘輦不設鹵簿是月丙戌奉諭旨去嵗新葺齋宫先期一日住宿但彼地樹木新植尚未成隂天氣炎熱扈從人多不免有病暍者今嵗炎熱勝於舊嵗此次不必前詣壇內齋宫仍在宫內齋宫住宿將來遇親祭之年該衙門兩請旨意俟樹木成隂仍照例齋宿壇內此番前往致祭正當祈雨之時不乘輦不設鹵簿著傳諭各衙門知之十四年五月甲寅夏至大祀地於方澤詣齋宫齋宿詔易皇祇室緑瓦為黃瓦并修北郊壇宇詳見第三卷方澤在安定門外北郊形方象地方折四十九丈四尺四寸深八尺六寸寬六尺澤中貯水方丘北向二成上成方六丈下成方十丈六尺均高六尺上成正中六六方甃外八方均以八八積成縱橫各二十四路二成倍上成八方八八之數半徑各八路以合六八隂數皆甃以黃色琉璃每成四出陛皆白石八級二成上南左右設五嶽五鎮五陵山石座鑿山形北左右設四海四瀆石座鑿水形皆東西相向水形座下鑿方池貯水以祭內壝方二十七丈二尺正北三門東西南各一門北門外東北鐙杆一西北瘞坎一外壝方四十二丈門與內壝同東西門內從壇瘞坎南北各二南門後皇祇室五間北向覆黃琉璃圍垣正方周四十四丈八尺北向一門外壝西門外為神庫神厨祭器庫樂器庫井亭二又西為宰牲亭亭前井亭左右各一又西北為齋宫內垣周五百四十九丈四尺北三門東西南各一門外垣周七百六十五丈西向門三角門一又西有坊一舊曰泰圻街雍正二年改名廣厚街十五年五月己未夏至大祀地於方澤以祈雨不乘輦不設鹵簿與九年同二十四年五月丁未夏至大祀地於方澤以祈雨禮儀與九年同由景運門前往致祭三十八年五月庚申夏上大祀地於方澤行禮如酌定新儀詳見儀注四十八年五月壬子夏至大祀地於方澤前期奉旨夏至北郊進宫齋戒適因氣滯舊患作痛誠恐升降儀節有愆轉不足以昭誠敬此次朕即在御園齋戒派皇六子永瑢恭代行禮若臨期氣體全安朕仍親往肅恭蒞祀乾隆元年至乾隆五十年皇上親詣次數乾隆元年五月丙午二年五月辛亥三年五月丁巳四年五月壬戌六年五月壬申七年五月戊寅八年五月癸未九年五月戊子十年五月癸巳亥十一年五月己十二年五月甲辰十四年五月甲寅十五年五月己未十六年五月乙丑十七年五月庚午十八年五月乙亥十九年五月庚辰二十年五月丙戌二十一年五月辛卯二十二年五月丙申二十三年五月辛丑二十四年五月丁未二十五年五月壬子二十六年五月丁巳二十七年五月壬戌二十八年五月戊辰二十九年五月癸酉三十年五月戊寅三十一年五月癸未三十二年五月己丑三十三年五月甲午三十四年五月己亥三十五年五月甲辰三十六年五月庚申三十七年五月乙卯三十八年五月庾申三十九年五月乙丑四十年五月辛未四十一年五月丙子四十二年五月辛巳四十三年五月丙戌四十四年五月辛卯四十五年五月丁酉四十六年五月壬寅四十七年五月丁未四十九年五月戊午五十年五月癸亥夏至方澤大祀儀夏至大祭地於方澤前期五日遣親王一人眂牲儀與冬至同南郊右眂牲齋戒省牲書祝版眂割牲儀均與冬至同前一日五鼓太常寺卿率屬掃除上下藉以棕薦設皇地祇神座於方澤第一成居中北向列聖東西向設四從神座於第二成五嶽東啓運天柱二山從之五鎮西隆業昌瑞永寧三山從之四海在五嶽之次四瀆在五鎮之次均東西向施黃幄工部官張皇帝拜次於第二成子階上張大次於外壝北門外神路之東太常寺典簿陳牲俎於神厨博士辨簠簋籩豆登鉶之實以次展器於神庫右設神座供張展牲器其日昧爽太常寺設黃案於中和殿中御座之南太常寺卿祇候贊事殿內司祝由內閣奉祝版暫奉於太和殿內初昕太常寺卿率欽天監博士至乾清門奏時皇上龍袍補服乘輿出宫至中和殿後降輿御殿立左楹前西向記注官四人於殿右門夾檻內外立東面司祝奉祝版前列提爐二太常寺贊禮郎十人引至中和殿外階下止司祝奉祝版由中階進殿中門陳於案三叩興退太常寺卿展祝文贊禮郎布拜褥皇帝詣案前恭閲畢行一跪三拜禮興復位立太常寺卿韜祝版有司徹拜褥司祝進至案前三叩恭奉祝版興由殿中門出太常寺卿跪奏禮成皇帝還宫太常寺官恭送祝版至北郊奉安於神庫是日徹乾清門齋戒牌銅人恭設於齋宫右閲祝版厥明步軍統領飭所部清蹕除道鑾儀衛官校陳設法駕鹵簿不陪祀王公百官朝服咸會祇候送駕如儀已刻太常寺卿赴乾清門奏請詣北郊齋宿皇帝龍袍補服乘禮輿出至太和門階下降輿鑾儀衛進金輦掌衛事內大臣一人跪奏請升輦奉輦扶輦納陛均如儀皇帝升輦駕發警蹕午門鳴鐘鼓皇帝由協和門東華門出導迎樂前引不作左右塗巷皆設布幛護軍統領步軍統領率辨校辟除如詣南郊儀右鑾輿出宫駕至北郊由西門入至方澤北門外謹按乾隆三十五年奏準由西門入禮畢仍由西門還宫掌鑾儀衛內大臣跪奏請降輦前引內大臣右贊引左對引太常寺卿二人恭導皇帝由外壝北右門至皇祇室詣皇地祇香案前立司香太常寺少卿一人跪進香皇帝跪受香拱舉仍授司香興三上香畢以次詣列聖前上香如儀皇帝行三跪九拜禮兩廡從位遣分獻官上香行禮皇帝詣方澤升子階第一成恭眂皇地祇位列聖配位贊引官以次跪奏畢恭導皇帝由內壝西右門詣神庫恭眂籩豆贊引跪奏如前儀遂遣官並眂牲牢皇帝由內壝北右門出升輦詣齋宫從祀王公百官分班祇候隨壇齋宿均如祀南郊之儀右眂神位壇位籩豆眂牲齋宿將事之夕夜分太常寺卿率官屬入然炬明鐙具器陳於案各以其序第一成皇地祇幄內犢一登一簠二簋二籩十有二豆十有二金爐一黃鐙金鐙各二爵墊一列聖幄內皆犢一登一簠簋各二籩豆各十有二金爐各一黃鐙金鐙各二爵墊一幄北中設一案少西南向供祝版西設一案東向陳黃琮一郊祀制帛一色黃奉先制帛二白色香盤三尊三匏爵九壺一實福酒盤一實胙肉東設一案西向陳奉先制帛三色白香盤三尊三匏爵九凡牲陳於俎凡玉帛實於篚凡爵實酒承以舟疏布冪勺具第二成四從幄內皆牛一羊一豕一登一鉶簠簋各二籩豆各十盞三十爐一鐙四各設一案陳禮神制帛各一嶽鎮色用青赤黃白黑五山色用白四海色用青白赤黑四瀆色用黑尊一爵三香盤一俎篚冪勺具鑾儀衛冠軍使設洗於大次樂部率太常協律郎設中和韶樂於二成階下與南郊禮同右陳設陳設畢禮部侍郎一人由東階升第一成太常寺博士前引詣皇地祇位前省眂玉帛齍盛及登俎籩豆之實以次詣列聖位前省齍畢仍由東階降至第二成從位前周眂如儀右省齍辨行禮位第一成子階上為讀祝受福胙皇帝拜位第二成黃幄次為皇帝行禮拜位南向第二成階下為陪祀王公拜位左翼東位西上右翼西位東上庭中夾神道東西為分獻官拜位外壝門外為陪祀百官拜位東西各五班均面南重行異等西位東上東位西上辨執事位第一成太常寺官二人立皇帝拜位前一司拜牌東面一司拜褥西面司祝一人立祝案西東面司香三人司玉帛一人司帛二人司爵三人序立西案之西東面司香三人司帛三人司爵三人序立東案之東西面光祿寺卿二人立西司香之後侍衛二人立東司香之後太常寺贊賜福胙一人立西司爵之次均南上侍儀禮部尚書一人侍郎一人立東案之北西面都察院左都御史副都御史各一人樂部典樂一人立西案之北東面均南上階下太常寺典儀一人西立東面第二成司拜褥拜牌官各一人分立黃幄次東西與第一成子階同第二成階下記注官四人東立西面引王公行禮鴻臚寺官二人糾儀御史四人禮部祠祭司官二人分立拜位左右均東西面司樂協律郎樂工序立東西樂懸之次歌工立樂工之次樂舞生文武八佾分行序立西在歌工之右東在歌工之左皆西列東上東列西上太常寺傳贊四人二人循內壝墻立二人循外壝墻立外壝門外糾儀御史四人禮部祠祭司官四人分立陪祀百官之次鴻臚寺序班東西各一人立於糾儀官之次稍後均東西面掌瘞官一人率瘞人立於瘞坎之西北隅右辨位祀日日出前七刻司祝詣神庫恭請祝版設於祝案跪叩如儀禮部尚書一人率太常寺卿屬恭請神位鑾儀衛官校豫設鳳亭一於皇祇室階下正中北向又設鳳亭五於左右稍後均北向鳳亭四於北稍後均東西向至時太常寺官啓神龕禮部尚書詣皇祇室各香案前上香行禮如儀太常寺卿率屬分詣皇祇室及從位前各行一跪三叩禮先請四從位奉至丹墀東西向次請列聖神位於殿內東西向俟請皇地祇神位北向先行乃奉列聖神位以從既出殿乃奉四從神位以從依次奉安於鳳亭內跪叩如初校尉舁亭太常寺官十人前引禮部尚書由方澤南門入至子階亭止皇地祇居中列聖左右稍後均北向從位再後東西向太常寺官詣各亭前跪三叩興恭請皇地祇列聖神