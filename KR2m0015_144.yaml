body:
  text: 王禮考二十乘輿車旗鹵簿臣等謹按王者首出庶物環拱而居備物而動故有儀衛鹵簿之制所以彰物采辨等威也古者黃帝作車有虞氏鸞車夏后氏鈎車殷大輅至周而有玉路金路象路木路掌於巾車之職説文輦從車從㚘在車前引之司馬法云夏后氏二十人而輦殷十八人而輦周十五人而輦而詩稱我任我輦則臣民所乘皆可通稱至秦始去其輪而制乃尊後代遂定為人君之乘焉至於五旗五麾亦昉於軒轅周禮司常掌九旗之物日月星辰龍虎鳥蛇厥象攸殊昭其别也漢代始有周廬陛戟法從屬車千乘萬騎之盛而鹵簿之名興焉三輔黃圖謂天子出車駕次第謂之鹵簿有大駕有法駕有小駕晉宋以後始采古制備五輅之式唐則五輅而外更有輦七屬車十二宋制鹵簿之等有四曰大駕曰法駕曰小駕曰黃麾仗而殿廷立仗則有黃麾大仗半仗角仗細仗之别大駕初用一萬一千二百二十二人宣和增至二萬六十一人可謂繁而失其中矣明洪武初嘗設五輅其後止有大輅玉輅别用馬輦步輦板轎而鹵簿儀仗之等未備國初定大駕鹵簿行駕儀仗行幸儀仗車輅旌旗悉從簡省我皇上憲古宜今折衷定制定鹵簿為大駕法駕鑾駕騎駕四等正五輅之名定玉輦金輦之式旗幟麾幢增加於舊大祀用之以肅明禋朝會用之以尊國體省方用之以光儀衛郁郁彬彬魚魚雅雅典章蓋大備矣稽之古後漢書始有輿服志厯代因之宋史明史則分儀衛與輿服為二馬端臨王禮考有乘輿車旗鹵簿一門今從其例恭依皇朝禮器圖式具詳形制而因造損益之宜並附考焉皇上大駕鹵簿玉輦一導蓋一拂塵二提爐二香合二盥盆一唾壺一水瓶二馬杌一交椅一儀刀三十櫜鞬三十豹尾槍三十殳四戟四九龍曲蓋四翠華蓋二紫芝蓋二九龍蓋二十五色花蓋二十五色龍蓋十方繖八夀扇八雙龍扇二十八單龍扇十六孔雀扇八雉尾扇八鸞鳳扇八長夀幢四紫幢四霓幢四羽葆幢四信幡四絳引幡四豹尾幡四龍頭竿幢四教孝表節旌二明刑弼教旌二行慶施惠旌二褒功懷逺旌二振武旌二敷文旌二納言旌二進善旌二金節四儀鍠氅四黃麾四八旗驍騎纛二十四八旗護軍纛八八旗前鋒纛八五色金龍纛四十儀鳳旗一翔鸞旗一瑞鶴旗一孔雀旗一黃鵠旗一白雉旗一赤烏旗一華蟲旗一振鷺旗一鳴鳶旗一逰麟旗一馴獅旗一白澤旗一角端旗一赤熊旗一黃羆旗一辟邪旗一犀牛旗一天馬旗一天鹿旗一青龍旗一白虎旗一朱雀旗一神武旗一江瀆旗一河瀆旗一淮瀆旗一濟瀆旗一東嶽旗一西嶽旗一南嶽旗一北嶽旗一中嶽旗一土星旗一木星旗一金星旗一火星旗一水星旗一角宿旗一亢宿旗一氐宿旗一房宿旗一心宿旗一尾宿旗一箕宿旗一斗宿旗一牛宿旗一女宿旗一虛宿旗一危宿旗一室宿旗一壁宿旗一奎宿旗一婁宿旗一冒宿旗一昴宿旗一畢宿旗一觜宿旗一參宿旗一井宿旗一鬼宿旗一栁宿旗一星宿旗一張宿旗一翼宿旗一軫宿旗一甘雨旗一乾風旗一坎風旗一艮風旗一震風旗一巽風旗一離風旗一坤風旗一兌風旗一五色雷旗五五色雲旗五日旗一月旗一門旗八金鼓旗二翠華旗二五色金龍小旗四十出警旗一入蹕旗一鉞十六星十六卧瓜十六立瓜十六吾仗十六御仗十六引仗六紅燈六玉輅一金輅一木輅一象輅一革輅一寶象五導象四靜鞭四仗馬十後護豹尾槍十儀刀十櫜鞬二十黃龍大纛二皇帝法駕鹵簿金輦一禮輿一導蓋一拂塵二提爐二香合二盥盆二唾壺一水瓶二馬杌一交椅一儀刀二十櫜鞬二十豹尾槍二十殳四戟四九龍曲蓋四翠華蓋二紫芝蓋二九龍蓋二十五色花蓋十五色龍蓋十方繖八夀扇八雙龍扇十六單龍扇十六孔雀扇八雉尾扇八鸞鳳扇八長夀幢四紫幢四霓幢四羽葆幢四信幡四絳引幡四豹尾幡四龍頭竿幡四教孝表節旌二明刑弼教旌二行慶施惠旌二褒功懷逺旌二振武旌二敷文旌二納言旌二進善旌二金節四儀鍠氅四黃麾四八旗驍騎纛二十四八旗護軍纛八八旗前鋒纛八五色金龍纛二十儀鳳旗一翔鸞旗一瑞鶴旗一孔雀旗一黃鵠旗一白雉旗一赤烏旗一華蟲旗一振鷺旗一鳴鳶旗一逰麟旗一馴獅旗一白澤旗一角端旗一赤熊旗一黃羆旗一辟邪旗一犀牛旗一天馬旗一天鹿旗一青龍旗一白虎旗一朱雀旗一神武旗一江瀆旗一河瀆旗一淮瀆旗一濟瀆旗一東嶽旗一西嶽旗一南嶽旗一北嶽旗一中嶽旗一土星旗一木星旗一金星旗一火星旗一水星旗一角宿旗一亢宿旗一氐宿旗一房宿旗一心宿旗一尾宿旗一箕宿旗一斗宿旗一牛宿旗一女宿旗一虛宿旗一危宿旗一室宿旗一壁宿旗一奎宿旗一婁宿旗一胃宿旗一昴宿旗一畢宿旗一觜宿旗一參宿旗一井宿旗一鬼宿旗一栁宿旗一星宿旗一張宿旗一翼宿旗一軫宿旗一甘雨旗一乾風旗一坎風旗一艮風旗一震風旗一巽風旗一離風旗一坤風旗一兑風旗一五色雷旗五五色雲旗五日旗一月旗一門旗八金鼓旗二翠華旗二五色金龍小旗二十出警旗一入蹕旗一鉞六星六卧瓜六立瓜六吾仗六御仗六引仗六紅燈六玉輅一金輅一木輅一象輅一革輅一寶象五導象四靜鞭四仗馬十後護豹尾槍十儀刀十櫜鞬二十黃龍大纛二皇帝鑾駕鹵簿步輿一導蓋一九龍蓋十雙龍扇十五色金龍纛十五色金龍小旗十鉞四星四卧瓜四立瓜四吾仗四後護豹尾槍十儀刀十櫜鞬二十黃龍大纛二皇帝騎駕鹵簿輕步輿一導蓋一儀刀十櫜鞬十豹尾槍十五色花蓋十雙龍扇六單龍扇六五色金龍纛十五色金龍小旗十鉞六星六卧瓜六立瓜六吾仗六御仗六後護豹尾槍十儀刀十櫜鞬二十黃龍大纛二臣等謹按大祀南郊陳大駕鹵簿大祀北郊陳法駕鹵簿俱設全部大樂於五輅之前