body:
  text: 欽定四庫全書皇朝文獻通考卷一百十六宗廟考十奉先殿順治十三年十二月世祖章皇帝命建奉先殿景運門之東北為奉先殿西門曰誠肅門正門曰奉先門前殿後殿均九間南嚮如太廟寢制中為堂以聨前後繚以周垣左列神庫前列神厨臣等謹按是月戊戌世祖章皇帝諭禮部朕考徃代典制嵗時致享必於太廟至於晨昏謁見朔望薦新節序告䖍聖誕忌辰行禮等事皆另建有奉先殿今制度未偹孝思莫伸朕心歉然爾部即察明舊典具奏嗣經部奏准以明年正月庚午興工十四年正月癸亥定初安奉先殿神位祭儀禮部奏初奉安神位於奉先殿皇上親詣致祭内大臣侍衞内府官隨行禮太常寺贊禮官贊禮樂舞生作樂是日早内府官陳設祭品於各神位前執事官贊禮官樂舞生各司其事内大臣侍衛内府官咸朝服詣奉先殿門外兩傍序立候陳設畢上御禮服陞輿至設立神位處降輿詣各神位前一跪三拜恭請神位捧各神位内府官一跪三叩奉安各神位於亭内畢上行一跪三拜禮捧神位官隨行禮畢内府官舉神位亭前行由中門出詣奉先殿上乗輿隨行内大臣侍衛内府官俱於奉先殿門外跪迎上至奉先殿門外降輿隨神位亭入内大臣侍衛内府官隨上至奉先殿院中分班侍立安神位亭於奉先殿丹陛畢引禮官導上詣神位前行一跪三拜禮恭捧神位内府官隨各詣神位前跪三叩捧神位隨上詣前殿奉安神位畢上行一跪三拜禮捧神位官隨行禮畢退上就拜位立贊禮官贊樂舞生就位執事官各司其事引禮官奏就位導上進前立贊禮官贊迎神協律郎贊奏開平之章樂作引禮官贊跪叩興上行三跪九拜禮興内大臣侍衛内府官隨行三跪九叩禮畢樂止贊禮官贊獻帛行初獻禮協律郎贊奏夀平之章樂作司帛官捧帛詣獻帛案東傍立司爵官捧爵詣各神位東西傍立引禮官贊詣前捧帛官跪上詣帛案前引禮官贊跪上跪贊獻帛上受帛獻於神位前案上興引禮官導上詣獻爵處捧爵官跪引禮官贊獻爵上立受爵獻於神位前案上引禮官贊如獻帛儀次第於各神位前獻畢上復拜位立樂止贊禮官贊行亞獻禮協律郎贊奏嘉平之章其獻爵如初獻儀樂止贊禮官贊行終獻禮協律郎贊奏雍平之章其獻爵如亞獻儀畢樂止贊禮官贊徹饌協律郎贊奏熙平之章樂止贊禮官跪贊禮畢陞宫即跪處三叩退立協律郎贊奏成平之章引禮官贊跪興叩上行三跪九拜禮興内大臣侍衛内府官隨行禮樂止贊禮官贊捧帛詣燎位捧帛官詣神位前跪三叩捧帛送燎引禮官導上退立於東西向捧帛過引禮官導上復位立候帛燎半引禮官贊禮畢導上出殿樂作上出殿立於簷下東傍西嚮内大臣侍衛内府官侍立兩傍樂止俟供獻等物徹畢上復入殿詣神位前跪三拜恭捧神位捧各神位内府官詣所捧神位前跪三叩恭捧神位隨上送至後殿内奉安神位捧神位官亦奉安各神位上行一跪三拜禮捧神位官各於神位前一跪三叩畢上出陞輿還宫以後親詣致祭俱行家人禮内大臣侍衛内府官不與陪祀太常寺贊禮官樂舞生俱不用應令内府官贊禮作樂如前行禮致祭之先上親請神位奉安祀殿祭畢上仍親奉安後殿行禮其元旦冬至嵗暮皇太后萬夀皇上萬夀係大節諸冊封係大禮及月朔望俱應親詣致祭内府官贊禮作樂其供獻應與太廟大祀儀同立春上元四月初八端陽重陽係尋常節親詣致祭不贊禮作樂忌辰清明霜降十月朔係哀慕日期親詣致祭不贊禮作樂七夕不致祭止如常供獻中元中秋係望日常祭日期不必重行每月隨時薦新上躬詣供獻但係常例供獻不必請神位於前殿即於後殿供獻上享太廟或祭畢俱應上香燭於奉先殿行躬告禮上親詣奉先殿行祭禮之期如遇親祭壇廟應遣内府官一員於奉先殿行祭禮如上不親詣壇廟遣官致祭上仍應親詣奉先殿行禮致祭得㫖奉先殿初次行禮宜用祝文餘俱如儀十一月奉先殿告成恭奉太祖承天廣運聖徳神功肇紀立極仁孝武皇帝神主孝慈昭憲純徳貞順成天育聖武皇后神主太宗應天興國𢎞徳彰武寛温仁聖睿孝文皇帝神主孝端正敬仁懿莊敏輔天協聖文皇后神主奉安奉先殿是日世祖章皇帝親詣恭安神位讀祝大饗如正月所定祭儀行十七年三月辛巳定奉先殿祫祭禮先是辛未諭禮部奉先殿祀太祖太宗神位未及併祀四祖於朕孝思未展今稽舊制嵗終祫祭之外有奉先殿祫祭之禮以後元旦皇太后萬夀及朕夀節俱照例祭告奉太廟後殿四祖神牌於奉先殿與太祖太宗合享位次照太廟祫祭禮祀畢仍恭迎神牌於太廟後殿至是禮部議奏奉先殿祫祭禮四祖神位座次照太廟嵗終祫祭禮祭前一日太常寺奏請遣官一員祗告太廟禮儀院奏請遣官一員祗告奉先殿祭日遣官八員恭請四祖暨后神牌自太廟迎入奉先殿祭畢仍恭送神牌還太廟後殿從之五月改建奉先殿是月壬申諭工部奉先殿享祀九廟稽考徃制應除東西夾室行廊中建敞殿九間斯合制度前興工時該衙門未加詳察連兩夾室止共造九間殊為不合今宜於夾室行廊外中仍通為敞殿九間以合舊制爾部即㑹同宣徽院詳議並擇興工日期具奏八月己酉以追封皇貴妃為皇后遣官祗告奉先殿是月壬寅皇貴妃薨甲辰世祖章皇帝諭禮部皇貴妃董鄂氏於八月十九日薨逝奉聖母皇太后諭㫖皇貴妃佐理内政有年淑徳彰聞宫闈式化倐爾薨逝予心深為痛悼宜追封為皇后以示褒崇朕仰承慈諭特用追封加之諡號諡曰孝獻莊和至徳宣仁温惠端敬皇后其應行典禮爾部詳察速議具奏丙午禮部議奏應撰玉册玉寳並造香册香寳諡號裱用黄絹欽天監擇吉遣官祗告奉先殿是日即行追封禮越三日具冊寳追封册文曰朕惟治隆内則史稱淑徳之祥化始深宫詩誦徽音之嗣歴稽徃牒咸有嘉謨若夫睿質夙昭允協符於坤極榮名未偹宜追鍚於瑶編爰展哀悰以彰惠問爾皇貴妃董鄂氏肅雍徳茂淑慎性成克令克柔安貞叶吉惟勤惟儉静正垂儀孝養孔䖍愉惋順慈闈之志恪共彌劭贊襄端椒寢之風方期永式於璇房詎意俄升夫仙馭凡兹九㝢同深月掩之驚矧余一人益重鑑亡之痛嗟掖庭之失助傷令範之云遐露泫風迴感凄清於素節幃虛殿迥悵窅邈於雲程不褒琬琰之章曷著珩璜之度是以慈懷殷眷懿命重申朕仰奉徳音特隆殊典追封為皇后錫之玉冊玉寳載加顯號用表遺徽諡曰孝獻莊和至徳宣仁温惠端敬皇后嗚呼彤史徒馨恫音容之遂隔丹綸用賁顧䄖翟而增悲榮哀之禮斯崇軫悼之思逾切𢎞兹寵制貽厥芳型寳文曰孝獻莊和至徳宣仁温惠端敬皇后之寳臣等謹按孝獻莊和至徳宣仁温惠端敬皇后神位奉安於孝陵饗殿嵗時配食如儀兹特紀追封之祭奉先殿而冊文寳文亦恭録於右十八年正月聖祖仁皇帝定奉先殿祭典是月癸亥諭禮部及議政王貝勒大臣等禁中設立上帝壇奉先殿著查歴代有無舊例定議具奏尋議覆歴代舊制祗有冬至祀天於南郊宫中上帝壇應請罷祭至奉先殿應照前明洪武三年例朝夕焚香朔望瞻拜時節獻新生忌致祭用常饌行家人禮從之十一月己亥恭奉世祖體天隆運英睿欽文大徳𢎞功至仁純孝章皇帝神主升祔奉先殿是日升祔太廟禮成聖祖仁皇帝詣奉先殿奉安神位行大饗禮如儀康熙元年四月丙辰以恭加上太祖髙皇帝孝慈髙皇后太宗文皇帝尊諡修飾神牌安奉聖祖仁皇帝親詣行禮六年十一月己未恭奉孝康慈和莊懿恭惠崇天育聖皇后神主入奉先殿先是七月己未福建道御史常錫印疏言慈和皇太后誕育聖躬既上尊號而神牌猶奉於陵寢廟祀大典未聞議及請勅禮部詳稽舊典崇祀擇吉舉行時禮部尚書黄機同日上請命一併議奏九月乙巳禮部㑹同内院恭議孝康慈和莊懿恭惠崇天育聖皇后神牌奉入奉先殿應於世祖章皇帝神位之右奉安得㫖是是日聖祖仁皇帝親詣行禮九年七月丁夘恭奉孝康慈和莊懿恭惠崇天育聖章皇后奉先殿是日聖祖仁皇帝御禮服恭捧神牌奉安致祭行禮如常儀十四年正月己邜升祔仁孝皇后神主於奉先殿先是十三年五月辛未聖祖仁皇帝諭禮部皇后赫舍里氏作配朕躬已經十載上事太皇太后皇太后克盡誠孝佐朕内治尤極敬勤節儉居身寛仁逮下宫闈式化淑徳彰聞兹於康熙十三年五月初三日崩逝惓懐懿範痛悼彌深宜有稱諡以垂永乆著内閣翰林院㑹同擬奏尋恭議上大行皇后尊諡曰仁孝皇后得㫖是六月己未遣官告廟庚申聖祖仁皇帝素服御太和門遣和碩康親王傑書和碩莊親王博果鐸齎册寳詣鞏華城册諡大行皇后皇帝制曰朕惟王化肇於閨門洵藉内庭之助陰教成於宫壼尤資后徳之賢故皇英嬪而帝道興任姒歸而王圖永緬稽淑行載籍攸存惟翬服之有光斯彤管其紀盛聿彰令聞爰著徽稱皇后赫舍里氏毓自名門躬全懿範作朕元配正位中宫慈惠本乎性成柔嘉惟則温恭篤於天賦禮度攸嫻主雅化於閨闈表芳型於海宇勤兩宫之孝養婉以承顔遇九御以寛和恩能逮下蘋蘩時飭克佐精誠澣濯常衣允昭節儉箴規之益贊宵旰而彌勤貞順之風御家邦而式化方期永綏福履詎意頓隔音容月掩椒塗鑑亡蘭殿朕心傷悼率土悲哀懐哲思賢惓徽音於靡盡揚休宣譽垂鴻號於無疆彛典式遵崇褒用鍚特以册寳諡曰仁孝皇后於戲聖善𢎞宣奕世頌禕褕之盛母儀偹羙千秋耀琬琰之輝靈其有知膺兹光寵寳文曰仁孝皇后之寳臣等謹按册諡皇后之禮升祔奉先殿兹恭録冊文寳文備載是門十八年四月癸酉升祔孝昭皇后神主於奉先殿先是十七年三月癸酉聖祖仁皇帝諭禮部皇后鈕祜禄氏端懿夙著作配朕躬奉事太皇太后皇太后恪恭婉順殫竭孝忱正位宫闈節儉寛仁克襄内治芳型伊始淑徳彌彰兹於康熙十七年二月二十六日崩逝追念壼儀良深痛悼宜有稱諡以垂永乆著内閣翰林院㑹同擬奏尋議上按諡法慈惠愛親曰孝聖聞昭逹曰昭皇后天性純孝睿徳懋昭允足垂範萬世臣等博詢羣議載考彛章謹擬尊諡曰孝昭皇后得㫖依議閏三月辛酉行冊諡禮皇帝制曰朕惟正兩儀之位資始允藉夫資生端萬化之原治外必先於治内故壼政修而家邦永頼坤貞著而品物咸享緬懐懿淑之隆益念匡襄之徳徽音長在盛典宜崇咸由紀美於休稱始克流光於奕世皇后鈕祜禄氏夙承華閥聿茂令儀暨正宫闈作朕良配履和思順端恪本於天懐體巽居謙温莊發乎至性奉兩宫之定省愉婉彌殷襄九廟之馨香敬共加篤衣疏服澣首𢎞儉樸之風夜寐夙興克佐旰宵之治惇五常而仁能逮下循四教而慎以禔躬覽史披圗既嫓徽於彤管含章藴美洵叶吉於黄裳何圖掖殿之旋虛深痛儀型之永逝載考追崇之典式稽節惠之文諡以尊名表慈惠愛親之實詞難罄媺兼聖聞昭逹之休懿徳聿彰鴻名無忝特以冊寶諡曰孝昭皇后於戲炳丹青於百代至行堪師垂琬琰於千秋芳規丕著哀榮斯極寵命宜承寳文曰孝昭皇后之寳十八年五月以改營奉先殿遣官祗告恭奉列祖列后神牌暫安太廟二十年二月甲午以奉先殿工竣遣官祗告太廟乙未恭奉列祖列后神牌還御是日聖祖仁皇帝親詣致祭行禮二十七年十月辛酉恭奉孝莊仁宣誠憲恭懿翊天啟聖文皇后神主升祔奉先殿是日聖祖仁皇帝親詣奉安神位致祭行禮如儀二十八年十一月辛酉升祔孝懿皇后神主奉先殿先是七月己酉聖祖仁皇帝諭禮部皇后佟氏淑徳夙成芳徽懋著侍奉皇太后克盡孝誠撫育諸子悉均慈愛禔躬敬慎御下寛仁式偹儀型宫闈胥化頃遵慈諭作配朕躬尚期内治之永襄何意沉疴之難起兹於康熙二十八年七月初十日崩逝睠懐懿範痛悼良深宜有稱諡以垂永乆著内閣翰林院㑹同擬奏尋恭議上大行皇后尊諡曰孝懿皇后得㫖依議九月甲寅遣官祭告太廟乙夘命和碩簡親王雅布多羅信郡王鄂札齎冊寶上大行皇后尊諡皇帝制曰道𢎞地載六宫資陰教之修化始人倫萬國仰母儀之重壼闈擅媺音足嗣於前徽圖史流馨徳常新於奕禩皇后佟氏英鍾戚畹瑞衍名宗克秉淵心協女箴之婉娩式昭玉度本天賦之温莊自媯水以嬪虞比周京之纘女佐晨昏而將敬勤著鷄鳴溥鞠育以宣慈慶貽麟定仁能逮下木樛曲以堪縈志在進賢荇参差而必采世方逢乎豐豫儉徳滋彰名已冠乎宫庭謙懐彌篤珮環有節恒贊宵衣織紝惟勞允師内職二南之風繼軌九御之屬傾心乃正坤維洵推哲配褘褕初御方期延祉於長秋繐悵旋陳遽悼韜輝於永夜雖此日之芳華易謝而千年之令譽靡窮考古彛章稱兹顯諡聿煥丹青之采丕揚金石之光特以册寶諡曰孝懿皇后於戲溯淑型於桂館嫓美姜任播嘉則於瓊章垂聲穹壤榮哀備具寵渥祗承寳文曰孝懿皇后之寳至是庚申聖祖仁皇帝親詣祗告三十八年十二月壬午重定奉先殿祫祭禮是日聖祖仁皇帝諭元旦諸臣俱齊人衆煩擾從太廟請捧四祖神牌徃來朕心不安内閣㑹同内務府禮部太常寺考明代典禮議奏尋議覆明代奉先殿並無從太廟請捧神牌之儀嗣後請遇元旦聖節奉先殿行禮時恭迎太廟後殿四祖神牌至奉先殿行禮之處停止即於太廟後殿照奉先殿典禮供帛酒籩豆讀祝官遣官致祭從之五十七年十二月乙未恭奉孝惠仁憲端懿純徳順天翊聖章皇后神主升祔奉先殿是日遣和碩誠親王允祉恭代行禮雍正元年七月癸巳以加上列祖列后尊諡恭修飾奉先殿神牌遣官行禮九月庚辰恭奉聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信功徳大成仁皇帝神主孝誠恭肅正惠安和儷天襄聖仁皇后神主孝昭静淑明惠正和欽天順聖仁皇后神主孝懿温誠端仁憲穆奉天佐聖仁皇后神主孝恭宣惠温肅定裕贊天承聖仁皇后神主升祔奉先殿是日升祔太廟禮成世宗憲皇帝更禮服詣奉先殿恭捧聖祖仁皇帝神牌諸王恭捧四后神牌奉安於奉先殿行致祭禮如朔望大祭儀臣等謹按孝誠仁皇后孝昭仁皇后孝懿仁皇后神主前此已先後升祔至是年八月己未恭上大行皇太后尊諡曰孝恭宣惠温肅定裕贊天承聖仁皇后越九月庚辰恭奉聖祖仁皇帝暨四后神主同祔太廟禮成復行升祔奉先殿之禮三年五月丙辰恭修飾奉先殿神牌欽天監敬擇是月十九日申時修飾禮部奏派内務府大臣行禮恭捧神牌交承修官敬謹修飾八月丙戌以孝恭仁皇后大䘮三年禮終世宗憲皇帝躬享奉先殿釋服即吉先是七月己酉諭禮部據奏八月二十三日皇妣孝恭仁皇后服制期滿請照皇考聖祖仁皇帝釋服之禮祫祭太廟頒諭中外等語朕疊遭皇考皇妣大事追念㒺極恩深莫由仰報三年以來祗於宫禁中齋居素服黙盡思慕哀戚之忱非敢自謂遵循古禮更不欲宣播於衆也父母之䘮人子之心則一而帝治之禮國家之制則殊今八月二十三日屆皇妣孝恭仁皇后釋服之期著擇日於奉先殿告祭自行家禮至於頒諭中外可不必行是日禮畢世宗憲皇帝御乾清宫召諸王大臣入見垂淚諭曰父母之恩鞠育顧復為人子者終身仰報不盡而朕荷皇考皇妣教育之恩尤為至深至厚誠所謂欲報之徳昊天罔極也三年之中如祭祀朝㑹國家大禮不可曠缺朕不得已勉從諸大臣之請照例舉行不過於宫中持服以黙盡其心而究未能盡此心於萬一也日月易邁已屆三載禮制有定而朕心無窮此一領素服朕衣之三年今日更換不勝悽愴之至朕之一念豈但三年固結於中即終身之乆亦斷不能忘也九年十二月己亥恭上孝敬皇后尊諡遣顯親王衍潢理親王𢎞晢行禮先是十月甲午世宗憲皇帝諭禮部皇后那拉氏作配朕躬經四十載奉事皇祖妣孝惠章皇后皇考聖祖仁皇帝皇妣孝恭仁皇后克盡孝忱深䝉慈愛服膺朕訓歴乆而敬徳彌純懋著坤儀正位而小心益至居身節儉待下寛仁慈惠播於宫闈柔順發於誠悃昔年藩邸内政聿修九載宫中徳輝愈耀兹於雍正九年九月二十九日崩逝惓惟壼職襄贊多年追念懿徽良深痛悼宜加稱諡以永休光著内閣翰林院擬奏尋議上恭惟大行皇后肅雍徳懋慈惠性成孝道盡於庭闈蒙聖心之慈愛内則修於中閫佐帝治以勤勞至敬允合乎坤儀厚徳祗承夫乾健謹按諡法慈惠愛親曰孝夙興恭事曰敬恭擬皇后尊諡曰孝敬皇后得㫖依議至是行册諡禮皇帝制曰地𢎞厚載承乾道以時行月炳陰暉助曦輪而垂照正位彰母儀之盛化茂周南禔躬備婦徳之全名髙媯汭式稽令典宜表徽稱皇后那拉氏毓質粹和秉心柔順蘭閨式訓蹈女史之規型朱邸來嬪嫻天潢之禮度問安内殿盡孝謹於先皇侍宴禁闈奉懽愉於母后逮登大寳爰陟坤寧處貴逾謙居尊彌懋深懐恪敬凛夙夜於椒庭永念兢勤贊儆咨於黼座恩流九御頌樛木之慈仁儉率六宫敦葛覃之澹約禕衣肅穆方期福履之綏璜珮渺茫忽感音容之隔乃頒綸命聿詔近臣考諡法之相符詢僉謀而惟允特以册寶諡曰孝敬皇后於戲播鴻聲於萬國采煥金函揚媺行於千秋光騰瑶牒祗膺寵賁用具哀榮寳文曰孝敬皇后之寶臣等謹按孝敬皇后册諡之禮時在田村饗殿舉行至十三年九月恭加上尊諡乾隆二年三月始與世宗憲皇帝同升祔奉先殿十二年八月飭嚴稽察是月庚戌内務府總管和碩莊親王允禄等奏奉先殿祭祀之期御史三保等於不應稽察時入殿稽察請交部嚴察議奏奉諭内務府總管此奏甚屬悖謬稽察豈有一定之時不拘何時俱可稽察况三保等入内稽察並非正行祭祀之時據伊等所叅是不欲令監察官稽察也即欲將三保等叅亦不至於嚴加察議著將允禄等交部嚴察議奏十三年命增定上香儀如太廟禮乾隆元年三月丙申以加上列祖列后尊諡恭修飾奉先殿神牌遣官行禮二年三月癸巳恭奉世宗敬天昌運建中表正文武英明寛仁信毅大孝至誠憲皇帝神主孝敬恭和懿順昭惠佐天翊聖憲皇后神主升祔奉先殿是日升祔太廟禮成巳時皇上更禮服御補服由景運門出至誠肅門外降輿至恭修神牌處詣神位前跪行三拜禮和親王𢎞晝於槅扇外隨行禮畢上恭捧世宗憲皇帝神牌和親王𢎞晝恭捧孝敬憲皇后神牌隨後由奉先殿東門入升月臺正面東階進殿東槅扇奉安世宗憲皇帝神牌於西二間南嚮第一位寶座上行禮畢上就拜位立贊引官跪奉孝敬憲皇后升祔奉先殿叅拜世宗憲皇帝和親王𢎞晝恭捧孝敬憲皇后神牌奉安於拜褥上由西槅扇退出上行三跪九拜禮畢恭捧孝敬憲皇后神牌奉安於西二間第二位寳座上行禮畢上就位行升祔奉先殿致祭禮如朔望大祭儀七月乙巳以修奉先殿興工恭奉列祖列后神牌暫安太廟是日皇上親詣奉先殿祗告十月戊申以奉先殿工竣恭奉列祖列后神牌還御是日辰時皇上出景運門外跪迎神牌隨至奉先殿致祭行禮十七年十月乙未升祔孝賢皇后神主於奉先殿先是十三年四月乙夘禮部恭議上大行皇后尊諡曰孝賢皇后一應典禮照例舉行得㫖依議五月甲辰皇上御太和門閲視大行皇后冊寳皇帝制曰内治丕昭夙播周南之雅化坤儀懋著宣揚媯汭之芳聲稽茂典於容臺易名綦重備鴻章於閟寢命册攸崇琬刻初呈瑶緘永煥惟皇后祥鍾勲族教秉名宗柔嘉協圖史之規淑慎表珩璜之度荷皇考之慈命作配朕躬䝉皇妣之褒稱深嘉至性聿自坤寜正位每宵旰之相資常偕萱殿承懽實凊温之是代奉神靈之統克嗣徽音端宫府之型𢎞宣令聞禮修繭館儉勤則躬曵練衣恩洽椒塗仁恕則澤均樛木綜平生之懿行莫罄揄揚薦壹惠之鴻名用垂乆逺式循彛典爰布明綸在昔黔婁諡定於其妻亦越展禽誄傳於乃婦蓋由伉儷之篤匪朝伊夕以相從斯能纎悉無遺有美而文之備至追思皇后之淑徳惟朕知之為最深疇咨諡典之隆稱自朕衡之而允協惟賢與孝實乃兼優曰孝且賢詞無溢美兹以册寳諡曰孝賢皇后於戲闡揚至行寸心可信於千秋約舉大端兩字實該夫衆善金章龍紐蘭官之寳器猶新香檢鸞書黼帳之琅函肇設祗膺寵賁黙鍳追思哀哉寳文曰孝賢皇后之寳至是年七月乙亥和碩莊親王允禄等奏禮工二部合奏孝賢皇后升祔太廟奉先殿一摺臣等伏查本朝康熙十三年孝誠仁皇后山陵禮畢升祔奉先殿未祔太廟縁本朝既建奉先殿與太廟同尊是以孝誠仁皇后大禮酌定升祔奉先殿以安神爽臣等原議孝賢皇后神牌升祔太廟祗係據依戴禮今敬謹詳考具奏伏候訓示奉諭㫖孝賢皇后神主遵照孝誠仁皇后之例奉安奉先殿前一日甲午皇上以孝賢皇后升祔親詣奉先殿祗告四十二年五月乙丑恭奉孝聖慈宣康惠敦和敬天光聖憲皇后神牌升祔奉先殿是日升祔太廟禮成巳時皇上更禮服御補服由景運門至誠肅門外降輿進神庫内詣孝聖憲皇后神位前行一跪三拜禮恭捧孝聖慈宣康惠敦和敬天光聖憲皇后神牌由奉先殿東門入升月臺正面東階進殿東槅扇奉安孝聖憲皇后神牌於孝敬憲皇后之次寳座上行一跪三拜禮畢上就位行升祔奉先殿致祭禮如朔望大祭儀臣等謹按升祔奉先殿之禮屆期内務府執事官預至後殿恭請列聖列后神牌奉安於前殿寶座禮畢仍恭奉還御寢室是日惟孝賢皇后神牌不請御前殿皇上行禮畢派皇子一人恭捧孝聖憲皇后神牌進後殿先時又派皇子一人恭捧孝賢皇后神牌出至穿堂祗竢候孝聖憲皇后神牌至恭捧孝賢皇后神牌跪接候過隨行進右第二間寢室恭捧孝聖憲皇后神牌至中向上立恭捧孝賢皇后神牌東傍西向立贊引官跪奏孝聖憲皇后升祔奉先殿後殿神龕㕘拜世宗憲皇帝孝敬憲皇后皇子恭捧孝聖憲皇后神牌跪安於拜褥上恭代行三跪九叩禮贊引官跪奏請孝聖憲皇后神牌陞寳座皇子恭捧孝聖憲皇后神牌奉安於世宗憲皇帝神牌之右行禮如常儀畢贊引官跪奏孝賢皇后叅拜孝聖憲皇后皇子恭捧孝賢皇后神牌跪安於拜褥上恭代行三跪九叩禮畢贊引官跪奏孝賢皇后神牌還御寢室皇子恭捧孝賢皇后神牌御左第三間寢室行禮如常儀四十八年十月丙子上以四詣盛京恭謁祖陵禮成回鑾告祭奉先殿先是九月己亥奉諭㫖朕於十月十七日回鑾十八日告祭奉先殿在前殿行禮所有祭文交翰林院另行敬謹撰擬至是親詣行禮如朔望大祭儀祭文曰祥開豐鎬景仰垂模禮備苾芬肅將成事昨日以時巡豳館祗謁橋山瞻締造之丕圖抒覲揚之夙悃謹尊藏乎冊寳慶鞏固於金湯臨朝㑹而緬想聲靈撫盈寧而常涵惠澤恪遵彛典還覿閟宫凛億禩之纉承彌殷繩武紹五朝之佑啟特重申禋敬展吉蠲䖍申昭告伏祈聖鑒謹言臣等謹按我朝建奉先殿崇祀列祖列后凡遇聖誕忌辰朔望令節以及冊立冊封謁陵巡狩回鑾諸大慶典莫不以時祭告䖍申拜謁然情展家庭皆於後殿行禮上香故不備書兹恭逢我皇上四詣盛京恭謁祖陵禮成回鑾涓吉昭告特於前殿行禮念前徽而紹先猷覲耿光而揚大烈道隆繼述禮重申禋聖孝之崇允足垂則萬古故恭紀之以昭繩武饗親之盛典焉皇朝文獻通考卷一百十六
