body:
  text: 欽定四庫全書皇朝文獻通考卷六田賦考六水利田臣等謹按古者畫井分田制為溝洫畎澮以逹於川廣深尋丈俱有定式蓋無在而非水利而稻人掌稼下地所謂畜水止水蕩水均水舍水寫水之法即後代言水利者之權輿也自阡陌既開而引渠溉田之利紀於前史爭為美談洪惟我朝列聖相承念切民依廣興水利東南則籌疏導之方西北則資灌溉之益民生樂利及於無窮我皇上御極以來尤以水利為要務淮揚畿輔之地經理宣導厥有成績乃者復以江淮兖豫頻年積潦特命廷臣㑹同守土大吏講求宣泄之要指授方略諄切周詳不惜工不愛帑不勞民遂使沮洳下濕之處皆成沃壤而猶宵旰憂勞有加無已所以為閭閻籌乂安者至深且逺允宜悉著於編以垂示萬世順治九年以工科給事中胡之俊言經理東南水利之俊疏言方今天下財賦半出東南而東南要地莫如江浙蘇松嘉湖地勢汙下舊劉家河吳淞江等處海口壅淤河道成田土豪占據水患屢告請濬吳淞以泄陳澱之水濬劉河以泄巴揚之水庶於國計民生有賴十一年諭東南財賦重地素稱沃壤連年水旱為灾民生重困皆因失修水利致誤農功該督撫責成地方官悉心講求疏通水利以時蓄泄庶水旱無虞民安樂利十六年修浙江海鹽縣海塘禮科給事中張惟赤言杭嘉湖蘇松常鎮七郡皆瀕於海海塘築自唐開元中至明始易以石編立字號并編定夫銀以事嵗修他郡無論即修海鹽一處之塘嵗編銀六千九百九十九兩零自明末至今並未修築此塘不知此項作何支修應請定限嵗修以防水患工部議如所請即於是年修致雨二號石塘二十一丈明年復修閏餘二號成嵗二號石塘共六十丈康熙二年以近畿地方夏潦遣官察看並經理修隄挑淺事宜雲南道御史梁熙言近畿田地分與八旗今嵗夏多雨各處堤岸潰決損壞田禾收成絶少河間一帶莊屯淹沒更甚請遴材幹官周行察看凡堤岸之應修者實行培築淤淺之應疏者實行挑濬庶河流有歸潦不為灾從之十年截留蘇松常三府漕折銀九萬兩杭嘉湖三府漕折銀五萬兩以充水利經費為疏濬吳淞江及劉家河故也十一年濬吳江長橋一帶以泄太湖十二年修河南安陽縣之萬金渠引洹水溉田二十年濬常熟之白茒港武進之孟瀆河二十五年遣官往淮揚下河督率挑濬車路等河并串場河白駒丁溪草堰場等口三十六年諭漕河督臣㑹勘下河積水應作何盡令歸海涸出民田之處一一議奏漕運總督桑格等言下河為泄水入海之區自淮安以至邵伯鎮計運河東岸共有涵洞三十閘十滚水壩八運河及髙郵邵伯等湖之水由諸涵洞閘壩之口歸入射陽廣洋等湖以至白駒岡門等口入海緣下河受水之處甚多而泄水入海之口猶少是以水勢汪洋易於停蓄下河州縣均受水害因議疏浚各口及應建閘壩之所疏入工部議准令將各項工程估計具題從之三十七年諭大學士等曰霸州新安等處水灾旗民莊田皆沒蓋由保定府南之水與渾河會流以致泛濫著原任河道于成龍河督王新命往察令其分流農事方興不可用百姓之力遣旗下壯丁備器械給以銀米令其修築又諭于成龍王新命曰清河發源太行山脈㑹漳河子牙河滹沱河易水諸流其勢雖盛但堅築堤岸遏之即可無虞又漳河支流經大城縣入子牙河其勢湍悍數年以來諸處遭水此河之故爾等宜詳悉查勘至渾河發自馬邑甚微每遇大水之年則橫流泛濫致淹民田其故蓋由渾河淤沙既多春時水乏保安州以下居民又引灌田沙礫壅墊河身積髙淫雨水發遂致田土冲沒爾等惟挑濬淤沙令水暢流當不至於漲溢矣復命廷臣會議開下河漕運總督桑格等又言臣等會勘下河州縣厯被水灾皆由上游受水之處多而泄水入海之處少兼之各邑水道俱多淤澱以成泛溢之患今欲救此灾黎舍開浚故道多分水勢之法别無善䇿臣等前議修芒稻河者欲分髙郵邵伯兩湖之水入江使不至下河也議挑曹家灣湯家絆七節橋者欲開通髙郵邵伯兩湖淤塞之水路使通芒稻河以下江也議挑車兒埠之稻子河者欲使泰州所受之水由苦水洋入海也議挑澗河者欲分運河之水流入澗河由射陽湖下海使不至髙郵也議挑海陵溪者欲使髙郵所受之水通岡門下海也議挑車路白塗海溝三河者欲使興化所受之水由丁溪草堰白駒入海也議挑蝦鬚二溝戛梁河并朦朧河西首淤塞之射陽湖者欲使髙寶興泰鹽山等處之水俱由廟灣下海此海口為下河最窪最寬之地泄各處上流之水尤為宣暢也今臣細加覆勘與前無異惟是九卿會議所云江海有無倒灌之處臣等細察各處海口及江口皆係厯來泄水之舊跡而臣等所議挑浚諸工皆內地淤阻之河道照舊開通使水得逹於口泄之江海自無倒灌之虞又會議所云或係海口髙阜內河低窪以致積水不能出海臣等相度形勢海口較之內河終屬低窪現在泄水而目今水勢尚在汪洋民間被淹田地多未涸出皆由諸河水道淤塞之地若使前議挑浚之工一舉水循故道下流入海民田自當涸出實大有益於生民又諭大學士等曰下河民生攸繫從前命凱音布孫在豐等専司開濬伊等俱奏工程告竣由今觀之止是虛糜國帑水勢並未消減田畝並未涸出所謂有益民生者何在今桑格又奏當行開濬而九卿遽議准行若果如其所請疏鑿開濬而桑格等能必水即消田即出有禆於民以身家保奏則即令開濬之可令九卿詳詢前次督濬者復稽考諸冊籍然後確議以聞三十八年諭下河既有積水不得不引出歸海著將串場河射陽湖蝦鬚沙溝一帶挑通引積水流出歸海至四十年河道總督張鵬翮言髙寶山陽鹽城一帶之水由射陽之蝦鬚二溝入廟灣以逹於海今宜挑蝦鬚二溝淤塞之處約四十餘里引水入朦朧河以逹海髙郵滚水壩下之水由興化縣安豐鎮至白駒場以逹於海今宜挑鮑家莊至白駒地髙水壅之處約八十餘里髙郵之水又自興化車路河至丁溪由潦魚港以逹於海今宜挑潦魚港淤塞之處八十餘里寶應之水由子嬰溝老河口入射陽湖以逹於海今宜挑老河口淤淺之處三里有餘泰州之水由淤溪至車兒埠滔子河以入於海今宜挑滔子河三十二里引水由苦水洋入海得㫖允行四十三年令天津開墾水田時以天津附近荒地開墾一萬畝為水田令各省巡撫將閩粵江南諸處水耕之人出示招徠情願者安插天律諸處計口授田給與牛種限年起科四十六年諭工部曰江南浙江生齒殷繁地不加增而仰食者日衆其風土隂晴燥濕及種植所宜逈與西北有異朕屢經巡省察之甚悉大約民恃田畝為生田資灌溉為急雖東南民稱水鄉而水溢易泄旱暵難支夏秋之間經旬不雨則土坼而苗傷矣濱河低田猶可戽水濟用髙仰之地力無所施往往三農坐困朕為民生再三圖畫非修治水利建立閘座使蓄水以灌輸田疇無以為農事緩急之備江南省蘇州松江常州鎮江浙江省杭州嘉興湖州各府州縣或近太湖或通潮汐宜於所有河渠水口度田建閘隨時啓閉水有餘則宣泄之水不足則瀦蓄以備用其有支河港蕩淤淺者並宜加疏濬使引水四逹仍行建閘多蓄一二尺之水即田髙一二尺者資以灌溉矣多蓄四五尺之水即田髙四五尺者資以灌溉矣行之永久可俾髙下田畝無憂旱潦此於運道無涉而於民生實大有禆益爾部速移文該督撫等令將各州縣河渠應建閘蓄水之處並應建若干座通行確察明晰具奏爾部即遵諭行四十八年濬寧夏之宋澄堡李洋堡二渠引黃水溉田建閘壩十三以時蓄泄五十九年命修築浙江海塘工部議准浙江總督滿保等奏一議築海寧縣老鹽倉北岸石塘以保護杭嘉湖三府民田水利一議開中小亹淤沙以復江海故道以免潮勢北冲一議築上虞縣夏蓋山石塘以防南岸潮患又據浙江撫臣議准海寧老鹽倉等處原議修築石塘但海潮遷徙靡定請於土浮不能釘椿砌石之處改築草塘至六十一年巡撫屠沂疏言海寧縣石塘五百丈草塘一千五十五丈上虞縣石塘二千二百五十六丈先後告竣動用銀十四萬三千六百五十兩其中小亹淤沙應挑之處今北岸石塘已固應停其挑濬從之雍正元年議政王大臣等議准修築海寧塘工諭曰錢鏐所築塘堤中間雖被冲壞至今間有存者數年來督撫等所修塘堤俱虛冒錢糧於不當修築處修築以至隨修隨壞又聞赭山有三處海口今一處淤沙壅塞水不通流若濬治疏通使潮汐不致留沙壅塞則海寧一帶塘工方可保固言之者雖未必稔知然不可不留意抑或地方大臣恐糜費錢糧此等處雖明知而不顧也爾等傳諭該督撫知之二年命尚書朱軾往浙江㑹議修築海塘事宜朱軾㑹同浙江撫臣議言餘姚縣東自滸山鎮西至臨山衛六十里舊有土塘三道內一道為老塘離海三四十里或十餘里即昔時之海岸厯年沙淤百姓開墾報升自築土塘二道是為外塘今議加髙三四尺加厚五六尺又自臨山衛至上虞縣界之烏盆村十五里自村至會稽縣􅅹海所四十五里有石塘二千五百餘丈即康熙五年八年所築其東西兩頭土塘七千丈坍塌甚多擬於塘底開深二尺填築亂石上鋪大石寬六尺髙六尺貼石築土寬二丈髙一丈三四尺又仁和縣之翁家埠起西至海寧縣之陳文港七十餘里舊有石塘無庸議修自陳文港至尖山二十餘里草塘七十四丈亂石砌邊土塘三千七百二十六丈應將土塘加寬一丈五尺髙三尺上鋪條石厚一尺其草塘亦如式改修又塘外原有亂石子塘寬三四尺不等外加排椿年久欹斜剝落應修全完固其原無子塘者亦如式興修又海鹽縣東自秦駐山三澗寨起西至演武場石塘二千八百丈年久塌壞八十餘丈去秋風潮衝潰七十丈應照式修築又自演武場至平湖縣之雅山炮臺一帶土塘見在地方官加修月內可以完工以上估修銀十萬五千七百餘兩又會同江蘇撫臣議言松江府之華亭婁上海等縣沿海二百五十餘里地勢窪下土脈鬆泛捍海塘工較他郡尤要自金山衛城北十里起至華家角止四十餘里土塘六千二百餘丈內最險工一段自漴闕墩至東灣九百六十九丈六尺次險工四段自金山墩至西墩七百六十八丈兵厰至張家舍二百八十八丈倪家路至三岔墩三百六十丈周公墩至華家角一千四百六十八丈八尺俱應易土為石以資保障其餘二千四百餘丈水勢稍緩宜堅築土塘用條石鋪底砌邊外釘排樁自華家角至上海之頭墩十餘里塘外淤沙一二里不等自頭墩至嘉定縣界一百二十里舊有土塘二道內為老塘外為新塘應俱加築髙厚外塘仍密釘排椿以防衝潰以上估修銀十九萬二千九百餘兩疏上令依議速行詔修濬杭州西湖令督撫察勘㑹議總督滿保等議言錢塘仁和海寧三縣田畝數萬頃賴城外上下兩塘河水以灌溉而兩河之水皆源自西湖謹按西湖舊志三十餘里內有民人占為田蕩阻遏水道納於官者每年僅銀三十餘兩米二十餘石其為官民利益甚微而所損於民者實不止於巨萬應請豁除糧額清出歸湖其見存湖址二十二里有竒通計裏外湖面一萬一千三百一十五畝零淤淺硬沙葑灘共三千一百二十二畝應將淺涸者挑深淤塞者開濬芟除葑草以復故址則湖水不至涸竭而三縣民田旱潦有備矣至於城內之河共有數道一為中河一為東河一為小河而小河又有中西北之分昔人設筧鑿溝引西湖之水自湧金水門入城曲折出入凡三十里然後由桃花港響水閘會流於上下兩塘河以溉田畝是城河正所以通西湖之血脈也今當相其淺塞量請開濬庶幾水利可復疏入准部議行於是年興工四年工竣三年諭江浙沿海黎庶全賴堅築海塘捍禦潮汐事關民瘼朕時在念著動支司庫錢糧立限堅築尅期報完務使永保安瀾毋得因循延緩亦不得草率塞責又命怡親王允祥大學士朱軾察勘直𨽻水利繪圖進呈四年諭九卿曰怡親王陳奏畿輔西南水利情形披覽甚為明晰著交與九卿會議具奏怡親王等於去冬今春奉命察看水利前後往返三月餘而於直𨽻地方東西南三面數千里之廣俱身履其地不憚煩勞凡巨川細流莫不窮源競委且因地制宜凖今酌古曲盡籌畫以期有益民生公忠為國甚屬可嘉是嵗設營田水利府以怡親王等董其事初於灤州玉田諸州縣濬流築墟建閘開渠皆官為經理民人願耕者官給帑銀以為工本秋成時嵗收十分之一足額而止募江浙老農課導耕種之法有力之家率先遵奉者以墟田多寡分别奬賞其濬疏墟岸以及瀦水節水引水戽水之法各因地勢次第興修所需農具水車等募江浙工匠如式製造課本地工人習之是秋田之成熟者凡百五十頃有竒而民間自行播種者若霸州文安大成保定新城安肅任邱共七百一十四頃有竒多獲秋登五年分立營田四局一曰京東局轄豐潤玉田薊州寶坻平谷武清灤州遷安自白河以東凡可營田者咸𨽻焉一曰京西局轄宛平涿州房山淶水慶都唐縣安肅新安霸州任邱定州行唐新樂滿城自苑口以西凡可營田者咸𨽻焉一曰京南局轄正定平山井陘邢臺沙河南河磁州永年平鄉任縣自滹滏以西凡可營田者咸𨽻焉一曰天津局轄天津靜海滄州暨興國富國二場自苑口以東凡可營田者咸𨽻焉局各有長有副有效力委員凡相度估料開築建造皆委員與地方官偕而查報地數花名給發工本則専責之地方官水田既成令地方官遵前規而以時逹之水利營田府自五年設局至於七年營成水田六千頃有竒京東局玉田縣袁家莊馬營曲河頭羅畢窩等處營田引小泉暖泉孟家泉黃家山泉藍泉諸水豐潤縣橫估王蘭莊刁家窩曹家泊盧各莊車道鋪望林泊梁家灣胡家泊等處營田引陡河泥河黑龍潭楊家阱諸水遷安縣徐流營三里河泉莊等處營田引徐流河三里河黃山泉諸水灤州冉各莊孟家店黃家莊等處營田引沂河暖泉福山泉諸水平谷縣龍家務水峪等處營田引泃河及山泉之水薊州山岡莊鄭各莊馬伸橋等處營田引大小海子諸泉水泄水於淋河寶坻縣八門城尹家圈下汪各莊等處營田引薊運河潮水寧河縣東窩莊南窩莊嶽旗莊江潢口林家莊張家莊齊家估田家莊等處營田引薊運河潮水武清縣桐林等處營田引鳯河水京西局新安縣大殷淀太平莊趙家莊等處營田引雹河依城河及淀河諸水安州東西壘頭南北馮村等處營田引依城河及淀河之水安肅縣白塔鋪古莊頭髙林莊南梨園等處營田引督亢陂及雹河之水唐縣明伏莊大洋村溫家莊等處營田引唐河水望都縣髙嶺村侯坨村等處營田引隍池北隆建功湧魚諸泉水淶水縣赤土村八坌溝等處營田引淶河水房山縣廣運莊髙家莊南良莊長溝村等處營田引拒馬河挾河水涿州茂林莊毛家屯普利莊北魯陂等處營田引拒馬河胡良河水霸州魚厰村髙各莊臺山平口等處營田引中亭水任邱縣關城村營田引白洋淀水文安縣蒼耳淀李齊淀流河淀等處營田引會同河子牙河水大城縣李齊淀流河淀營田引子牙河水定州吳家莊曹家莊等處營田引小清河馬跑泉水行唐縣河合村歡同村等處營田引蓮花池龍泉諸水新樂縣大流村牛家溝等處營田引海泉湧泉諸水滿城縣一畝泉北竒村等處營田引一畝雞距紅花諸泉水宛平縣蘆溝橋西北修家莊三家店等處營田引永定河水京南局磁州務本村張家莊太平莊杏園營等處營田永年縣張家莊南湖賈村馬道固村等處營田平鄉縣豆二莊周章村油召村等處營田皆引滏陽河水任縣邊家莊牛新寨西北張村等處營田引滏陽并牛尾諸河水正定縣雕橋村王古寺順成關等處營田引大鳴泉小鳴泉方泉班泉諸水平山縣奉良莊川防村等處營田引滹沱河冶河水井陘縣防口村西河村洛陽灘等處營田引冶河水邢臺縣樓下村孔橋村小汪村等處營田引百泉及逹活紫金諸泉水沙河縣北九家莊趙村等處營田引邢臺百泉及小灃諸泉水南和縣豆村河頭郭楊家屯等處營田引百泉水天津局天津州城南藍田及賀家口圍田靜海縣何家圈吳家嘴雙港白塘口辛莊等圍營田滄州葛估盤估二圍營田興國富國二場東西泥沽二圍營田俱引海口潮水雍正九年設天津府改州為縣自何家圈以下圍田皆𨽻天津臣等謹按畿輔水利之議見於古者北魏裴延俊為幽州刺史於范陽漁陽立渠堰溉田萬餘頃唐瀛州刺史盧暉引滹沱溉田五百餘頃寧晉令程處默引洨水溉田平棘令弓志元開畢泓以蓄泄水利又鎮州獲鹿縣有大唐渠有禮教渠引太白渠溉田宋臨津令黃懋請於河北諸州作水利田而制置河北屯田使何承矩於雄莫霸州平成順安軍興堰六百里置斗門引淀水灌溉以足邊食元提舉諸路河渠郭守敬言水利六事一曰順德逹泉引入城中分為三渠灌城東地一曰磁州東北滏漳二水合流處引水由滏陽邯鄲洺州永年下經雞澤合入灃河可灌田三千餘頃明汪應蛟巡撫天津於葛沽白塘種水稻畝收四五石疏請於朝以防海官軍萬人分田墾種而徐貞明水田之議尤詳京東諸州縣皆有其遺跡至我朝雍正三年直𨽻以水患告既賑貸而撫恤之特命怡親王等周履三輔大興營田引水溉田之法旌敘鼓舞之方既詳且悉其所設京東局則徐貞明之遺規也京西局則何承矩黃懋之舊制也京南局則郭守敬之議可循天津局則汪應蛟之跡尚在分命官吏督率營治而民人亦有踴躍從事者數年之間得水田六千頃有竒而灌溉之利被於三輔矣五年諭地方水利關係民生最為緊要江南户口繁庶宜更加修濬時其蓄泄以防旱潦我皇考念切民依康熙四十六年巡省江浙躬親講求將附近太湖及通江潮之處條分縷析特頒諭㫖令江浙督撫於蘇松常鎮杭嘉湖地方疏濬河港以資灌溉修建閘座以便啓閉皆動用公帑錢糧不使絲毫出於民力恩至渥也乃當時督撫諸臣不能實心仰體惟以虛文奉行糜費帑金二十餘萬而無實效深可痛恨今巡撫陳時夏特行奏請且稱費用不過十餘萬兩即可成功著副都統李淑德原任山東巡撫陳世倌會同巡撫陳時夏總河齊蘇勒總督孔育珣悉心踏勘詳加酌議凡建立閘座疏濬河流務期盡除淤塞以杜泛溢之虞廣蓄水泉以收灌溉之益其一應公費俱動用庫帑支給又諭曰朕聞陜西鄭渠白渠龍洞向引涇水溉民田甚廣厯年既久漸致淤塞堤堰坍圯醴泉涇陽等縣水田僅存其名特令該督嶽鍾琪詳酌興修今據奏龍洞亟宜挑穵鄭白渠務當疏濬更須修築堤堰建設閘口以備堅久著動用正項錢糧及時挑濬務期渠道深通堤堰堅固俾民田永賴又諭蘇松地勢稍下特遣大臣㑹同督撫開濬水道太湖之水歸海者經劉河白茒河居多圖志載二河形勢數十里一徑直趨入海年久潮沙堙塞悉成平陸太倉常熟之紳襟土豪占種報科者十無二三今既開濬必盡去新漲地畝以復故道該督撫等當竭力秉公詳勘務為一勞永逸之䇿是嵗陳世倌疏請先挑吳淞江白茒河孟瀆德勝九曲河其餘諸河俟完工之日以次開濬從之議修揚州五塘以溉民田婁江水利告成士民請建萬夀碑亭諭速止之是月水利營田所進瑞稻一莖三穗或一莖二穗召入大學士等賜觀又諭自古治水之法在順其自然之勢而利導之蓋水之為害者大抵由於故道堙塞使水不得徑直暢流以致泛濫為害但徑直之路堙塞年久或民間既已蓋造室廬開墾田畝或且安葬墳墓人情各顧其私不知逺大之計今見欲於此地開濬河道則百計阻撓而司其事者未免惑於浮議遂使遷就紆回茍且從事而不能成一勞永逸之舉昨據嶽鍾琪奏陜西現在興修漢渠但開濬之處不無礙於墳墓故爾遲回朕諭之曰果係民間墳墓所在當給與買地之價令其遷葬民自樂從今江南興修水利著該督撫與欽差官員照此辦理又諭吳淞石塘當日勘估之時於海潮紆緩之處酌量修築土塘蓋因工程浩大諸臣為節省錢糧起見故如此定議但東南財賦之區灌溉田畝保聚室廬全賴海塘捍衛海勢衝激風濤旋轉難定不若一例盡修石塘為百姓萬年之利著將現在土塘改築石塘不得惜費省工茍且塞責兩江總督范時繹奏報估計修濬太倉州河道工料銀兩且言太倉州鎮洋縣士民僉稱境內劉河已蒙發帑開濬其七浦河願依舊例業户給食佃户出力不敢再費帑金上曰國家財用充足朕為地方籌畫萬年之利不惜多費帑金興修巨工養育萬姓若仍用民力以辦公事非朕本心也著將士民捐助之處停止仍動用公帑辦理並曉諭該州縣士民伊等當體朕愛養元元之心於工程告竣之後嵗嵗修濬防護俾地方永受其益則勝於目前之趨事赴功多矣八年諭寧夏地方萬民衣食之源在於大清漢唐三渠之水利定例每年疏濬修理使民田得沾灌溉聞厯年専司之員疏忽怠玩以致閘道堤岸逐漸損壞時有衝決渠身淤泥填塞日見淺窄而三渠之中惟唐渠為尤甚近來其口過低其梢過髙水勢不能逆流而上多誤小民耕種之期雖每春定有嵗修之例然不能以一月之工程整數十年之荒廢也見今兵部侍郎通智開濬惠農昌潤二渠於寧夏水利自然明悉著㑹同太常寺卿史在甲即行查議今嵗預備物料明春動工修補務令三渠堅固俾邊郡黎元灌溉有資永享盈寧之慶九年遣太僕寺卿顧琮稽核直𨽻水田除距水稍逺地勢稍髙須車戽而升者聽民隨便種植外其水足地平無煩汲升之處今地方官具永逺可為水田結狀呈報户部荒廢者如例議處又議設營田觀察使二員分轄京東西督率州縣營治可田地畝無力者貸以牛種秋收扣還設副使二員出資經理以為民倡所有舊田圍渠閘洞時加修治毋致廢壞十年諭寧夏為甘肅要地渠工乃水利攸關朕特遣大臣督率官員開濬惠農昌潤二渠又令修理大清漢唐三渠以溥民利年來惠昌二渠及唐渠工程漸次告竣於民田大有禆益其大清渠漢渠雖未竣工然加謹堵築極力挑濬已足以資灌溉不過湃岸閘座有應行修補之處可以從容經理查寧夏有専司水利之同知著將未竣之渠工交與該員於每嵗春工內分年陸續修理務期工程堅固利濟有資使民田永霑膏澤是嵗又以甘肅所屬之瓜州地肥饒可墾將疏勒河上流築壩開渠引水入河又於安家窩鋪對岸導渠疏濬深通引水溉田至十一年陜西之柔逺堡鎮夷堡口外雙樹墩等地方開墾令開渠溉田十二年甘肅口外栁林湖地屯墾令築壩建隄開渠又陜西之中衛縣白馬寺灘地廣可耕令開渠建槽以資灌溉議濬淮揚下河水道以濟鹽運溉民竈田令松江府之奉賢上海南滙等縣修築捍海土塘江蘇撫臣喬世臣言金山華亭奉賢上海南滙五縣地方西抵浙江平湖縣界東至寶山縣接壤之黃家灣綿亘二百五十餘里舊有土塘以捍潮汐雍正二年議自金山嘴至華家角四十餘里係金山華亭二縣地俱易土為石次第告竣其華家角以東之舊塘未經修築今年七月中海潮漫溢以致南滙上海奉賢三縣被灾較重今議修築土塘在奉賢者由華家角石塘起至南滙縣東界共九千三百二十七丈六尺在南滙者自奉賢縣西界起至上海縣東界共一萬五千四百六十四丈在上海者自南滙縣西界起至寶山縣界之黃家灣共一千二百二十三丈八尺俱底寬五丈面寬二丈五尺髙一丈二尺共需銀九萬八千三百五十四兩零又黃家灣以北至寶山城四千二百二十八丈一尺有竒舊塘亦頽廢並宜增築塘底寬五丈面寬二丈五尺共需銀一萬七千一百一十六兩零疏入命廷臣集議如所請行之十一年詔修揚州之范公堤命內大臣海望等查勘浙江海塘海望等疏言浙江江海之門户有三省城東南龕赭兩山之間名曰南大亹禪機河莊兩山之間名曰中小亹河莊之北寧邑海塘之南名曰北大亹惟中小亹當南北兩岸之中江水海潮若由此出入則兩岸無虞但其地面不及南北兩大亹之半潮過沙淤偶通旋塞不徙而南即徙而北南岸尚有龕常諸山連絡捍衛北岸惟恃一線塘堤而已南大亹久淤成平陸數十年前尚有中小亹出入嗣後漸徙至北大亹今欲遏江海之狂瀾使其仍歸中道恐非人力所能為查海寧東南有尖山聳峙海口其西有小山俗名塌山相去百餘丈水底根腳相連兩山之間向有石壩堵截水道後因修塘人役誤取其石見今江水大溜緊貼北塘直趨尖山塌山之間引入海潮衝激塘身護沙日卸若於兩山之間照舊堵塞使江水海潮仍向外行則北岸護沙可漲而水道亦可望其南徙至於華家弄以東尖山以西一帶塘工有草塘并條石塊石塘不等應改建大石塘庶可垂永逺所需工料約銀一百八十餘萬兩非厯數年之久不能告竣臣等見議塞尖山水口既堵之後果能漲沙護塘則石塘可不必改建如仍無漲沙再行改建似亦未遲也惟翁家埠一段草塘塘內地勢低窪及塘背附土單薄之處即應培補又石草各舊塘僅有一層應請於塘後添築土備塘一道比舊塘再髙五六尺以禦風潮泛溢之害疏入上曰所奏俱屬妥協著照所奏行朕思尖塌之間建立石壩以堵水勢似類挑水壩之意所見固是若再於中小亹開引河一道分江流入海以減水勢似更有益從前雖經開挖旋復壅塞者皆因惜費省工之故今若倍加工力兩工並舉更覺妥備石壩建後即有漲沙而石塘亦當漸次改建以為永久之利其開挖引河著程元章等相度地勢酌量辦理十二年兩江總督趙𢎞恩察勘松江海塘議於石塘外築貼石土塘一道從之十三年閏四月河東總督王士俊言東平州之安山湖地勢低於運河其湖旁涸出之地請開墾以濟民食上令部臣詳議諭曰山東運河之水全賴諸湖停蓄以資灌注所以前人有水匱之名後因諸湖淤墊居民侵占為田以致水少不能濟運朕屢降諭㫖令河道總督等悉心經理近年始無水淺停舟之慮今王士俊此舉乃為開墾起見朕思湖水専資濟運倘經理之初但貪田畝之有餘不計湖水之不足將來田多水少漕運稽遲則顧此失彼未免輕重倒置不可不慎之於始也遂命止之皇朝文獻通考卷六
