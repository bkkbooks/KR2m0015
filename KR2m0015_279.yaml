body:
  text: 輿地考十一浙江省臣等謹按周官職方以會稽為揚州山鎮漢代因之以立郡今之浙東浙西皆古會稽郡地也至東漢而分屬吳郡至吳而分吳興東陽臨海新都至晉而分永嘉至隋而分餘杭至唐而分餘姚信安縉雲至宋而分嘉禾建置代殊繡壤交錯蓋十一郡之所從來漸矣禹貢揚州山水惟震澤實跨嘉湖之境若郭璞以錢唐為三江之一韋昭以浦陽為三江之一雖持論或有岐出要之其為揚州東南境固自昔然也總全浙之形勢北通三吳南引七閩而浙水實中絡其間唐時始分浙江東西二道自元以來遂以浙名省蓋江源發自歙縣至桐江合金華衢州之水曲折而東以歸於海是為由江入海之次第海水自鱉子門入為諸山所束激而為濤逆流數百里至富春而始平是為由海入江之次第故浙水者實全省之鎖鑰也聖朝軫念海疆勤求保障巨塘屹立永奏安瀾我皇上法駕所臨親殷相度審水亹之順逆籌沙土之盈虛伐石楗薪並承睿略洵為萬世之利賴矣若夫濵海之地自嘉興以迄於溫州迢遞千有餘里入我朝而定海置縣玉環設廳並在大海之中南北相望以拱衛全浙鹽䇲亞於淮南桑麻比於吳會又郅治之規模度越乎前代者與浙江明浙江等處承宣布政使司治杭州府領杭州嘉興湖州寧波紹興台州金華衢州嚴州溫州處州十一府又置浙江都指揮使司領杭州等十六衛湖州等五守禦千戶所本朝初因之設福浙總督駐福州府兼轄浙江設巡撫及布政使司按察使司皆駐杭州府順治十五年専設浙江總督亦駐杭州康熙八年裁九年復設二十三年仍併於福建總督為福浙總督雍正五年專設浙江總督兼管巡撫事十二年仍併福浙總督凡領府十一各衛所以次裁併入州縣其存者俱専司漕運不治民事東西距八百八十里南北距一千八十里東至海六百里西至江南徽州府界二百八十里南至福建建寧府界九百六十里北至江南蘇州府界一百二十里東南至福建福寧府界一千一百三十里西南至江西廣信府界七百五十里東北至江南松江府界三百七十里西北至江南廣德州界三百二十里在京師南三千三百里杭州府為省治東西距一百九十五里南北距七十三里東至赭山海口六十里西至嚴州府桐廬縣界一百三十五里南至紹興府蕭山縣界二十八里北至湖州府德清縣界四十五里東南至蕭山縣界二十八里西南至金華府浦江縣界三百四十里東北至嘉興府石門縣界一百二里西北至安徽寧國府寧國縣界二百八十里自府治至京師四千二百里明為杭州府本朝初因之乾隆三十八年升海寧縣為州凡領州一縣八錢唐縣附郭治府西境仁和縣附郭治府東境海寧州在府東北一百七十里明海寧縣乾隆三十八年升為州富陽縣在府西南九十里餘杭縣在府西北七十里臨安縣在府西北一百里於潛縣在府西北一百七十里新城縣在府西南一百二十里昌化縣在府西二百十里嘉興府在省治東北一百八十里東西距一百五十里南北距一百里東至江蘇松江府婁縣界六十里西至湖州府歸安縣界九十里南至杭州府海寧縣界七十里北至江蘇蘇州府震澤縣界三十里東南至松江府金山縣界一百五里西南至杭州府仁和縣界一百里東北至婁縣界六十里西北至湖州府烏程縣界八十里自府治至京師四千二十里明為嘉興府初屬南直𨽻後改𨽻浙江布政使司本朝因之領縣七嘉興縣附郭治府東南境秀水縣附郭治府西北境嘉善縣在府東北三十六里海鹽縣在府南八十里平湖縣在府東南五十四里石門縣在府西南八十里舊崇德縣康熙元年改為石門縣桐鄉縣在府西南五十五里湖州府在省治北少西一百八十里東西距一百八十二里南北距一百三十八里東至江蘇蘇州府震澤縣界七十二里西至安徽廣德州界一百十里南至杭州府仁和縣界一百二十里北至太湖十八里東南至嘉興府桐鄉縣界九十里西南至安徽寧國府寧國縣界二百四十里東北至蘇州府吳縣界六十四里西北至江蘇常州府宜興縣界七十里自府治至京師四千三百里明為湖州府初屬南直𨽻後改𨽻浙江布政使司本朝初因之乾隆三十八年改安吉州為縣凡領縣七烏程縣附郭治府西北境歸安縣附郭治府東南境長興縣在府西北六十里德清縣在府南少東九十里武康縣在府南少西一百十里安吉縣在府西南一百二十里舊安吉州乾隆三十八年改為縣孝豐縣在府西南九十里寧波府在省治東南四百八十里東西距二百二十四里南北距二百八里東至海一百四里西至紹興府餘姚縣界一百二十里南至台州府寧海縣界一百四十六里北至海六十二里越海即江南松江府界東南至海一百十二里西南至台州府寧海縣界一百二十六里東北至海七十二里西北至紹興府餘姚縣界一百五里自府治至京師四千六百四十里明初為明州府洪武十四年改為寧波府領縣五本朝初因之康熙二十六年增置定海縣凡領縣六鄞縣附郭慈溪縣在府西北五十里奉化縣在府西南八十里鎮海縣在府東北六十里舊為定海縣地康熙二十六年别置定海縣於舟山改故定海為鎮海縣象山縣在府東南二百七十里定海縣在府東少北二百六十里舊為昌國廢縣康熙二十六年置定海縣紹興府在省治東南一百三十八里東西距三百二十里南北距二百九十里東至寧波府慈溪縣界一百九十里西至杭州府錢塘縣界一百三十里南至金華府東陽縣界二百五十里北至海四十里東南至台州府天台縣界三百里西南至抗州府富陽縣界一百九十二里東北至慈溪縣界二百二十七里西北至錢唐縣界一百二十五里自府治至京師四千四百五十八里明為紹興府本朝因之領縣八山隂縣附郭治府西境