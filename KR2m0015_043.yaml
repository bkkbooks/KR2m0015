body:
  text: 國用考五漕運漕運規例漕糧各省原額正兑米三百三十萬石改兑米七十萬石今除折改及厯年荒闕開墾報銷不足原額外實徵正兑米二百七十五萬一千二百八十三石改兑米五十萬一千四百九十石各有竒㑹典則例據乾隆十八年奏銷冊約舉其數今採入按每年厯有蠲緩有定額而無定數正兑改兑外有加徵以待耗闕者曰正耗米數以省之逺近為多寡正兑每石正耗四斗至三斗五升改兑四斗至一斗七升各有差有額徵之漕糧而折徵者曰永折米江蘇安徽山東河南湖北湖南共徵米三十六萬一百八十六石六斗六升有竒每石折徵銀八錢至五錢五分有差有改徵漕糧而折徵者曰灰石折米江蘇浙江應徵米共三萬四千四百四十石遇閏加徵二千八百七十石每石連耗折徵銀一兩六錢白糧江蘇蘇州松江常州三府太倉州原額十五萬四百三十八石四斗七升除改徵漕糧外實徵六萬九千四百四十七石浙江嘉興湖州二府原額六萬六千二百石除改徵漕糧外實徵三萬五百五十三石耗米每正額米一石江南加徵三斗浙江四斗共三萬四千五百八十二石九斗五升有竒經費江蘇浙江共徵銀二十三萬二千六十一兩八釐米五萬七千五百四十八石九斗九升四合小麥河南正兑改兑共八千一百十九石四斗加耗與米同黑豆山東河南正兑改兑共十萬五千三百二十三石三斗五升有竒加耗與米同隨漕欵目曰輕齎曰易米折銀曰官軍行月曰贈貼曰紅駁曰蓆木板竹各省共徵銀一百八十五萬三千六百兩遇閏加徵紅駁銀三百兩米六十一萬七千八百七十六石麥萬九千六百八十二石豆五百三十二石各有竒水次六倉江南江寧倉徵米淮安鳳陽二倉徵銀米麥徐州倉徵銀麥豆山東徳州臨清二倉徵銀米共徵銀二十六萬三千六百二十六兩米七萬二千二百四十六石麥五萬四千三百八十三石豆四千三十七石各有竒順治九年定漕糧官收官兑徵贈貼銀米給運軍漕糧向係軍民交兑軍强民弱每多勒索至是定為官收官兑酌定贈貼銀米民輸官給浮費悉除十七年令折徵灰石米解部撥支舊例漕糧内有給軍辦運灰石之米旋停辦灰石米仍運通至是始令折銀解戸部聴工部按年支取備用十八年禁折徵漕糧毋得以兑漕為名價外苛索康熈元年諭漕船經由漕河領運官軍依限抵通回空方為盡職無罪乃有姦頑官役不守成法多有夾帶私販貨物隠藏犯法人口倚勢恃力行凶害人借名阻礙河道毆打平人託言搜尋失物搶刼民船且有盜賣漕糧中途故致船壊以圖貽害地方種種姦惡督漕各官並該地方官一有見聞即行㕘奏務將官員嚴提治以重罪若知而徇隠不奏亦從重處治六年命修漕運議單十七年從河道總督靳輔疏請淮北漕糧例收紅米之州縣准紅白兼收著為令二十二年定漕船載運額數每船載正耗米五百石土宜六十石至雍正七年諭増土宜四十石著為令八年又准頭工舵工人各帶土宜三石水手共二十石每船額帶土宜百二十石乾隆元年定回空漕船所帶食米燒煤江西米四十五石煤四十石湖南米三十六石煤三十二石湖北米三十三石七斗五升煤三十石江南浙江米三十石煤二十五石各闗騐放除其税三年定回空船舵水人等准帶梨棗六十石十年又定首進漕船回空時未及梨棗准帶核桃柿餅抵梨棗之數三十三年禁折徵漕糧耗米違者以改折漕糧罪罪之三十七年江南建平縣漕糧改折秈米從民便也四十九年户部言漕糧掛欠舊例將本帮運官旗丁議罪分賠然每年舊欠未清新糧復欠嗣後追賠漕米應逐帮分計派作十分欠糧之本軍名下仍追賠一半其半令漕運總督糧道監兑押運僉運各官分賠請著為令從之五十四年定封騐様米舊例各州縣交兑漕米取米四升分盛二袋印封解倉場騐收至是每船用米一石糧道親騐印封到淮漕運總督拆騐加封抵通倉場侍郎率坐糧㕔騐明起缷其様米仍作正收雍正元年諭户部江西省有漕米各州縣運糧到省又自省倉搬上軍船故有脚耗扒夫修倉鋪墊等項編載全書厯年支給已久自康熙二十三年部中誤駁不准支給行令追還嗣後一例駁追究無完解至三十四年聖祖仁皇帝特頒諭㫖將從前已經支給者俱免追賠恩至渥也至康熈三十八年部議又以脚耗與扒夫等項分晰未清仍令扣還不知脚耗乃貼運之總名扒夫等項乃支給之細數實一事非兩項也自康熙三十八年至今已二十餘載應追銀五十一萬餘兩米六十一萬餘石積累增多究無完解追比日久官民均受其累特諭爾部將從前積欠盡免追賠向後准其支給是年令漕運總督於開兑開帮之日將糧船各數運軍姓名册送戸部察覈二年以漕運駁淺擾害商船諭地方大吏示禁漕運總督失察者議處又諭禁漕船包攬貨物夾帶私鹽私藏火器下漕運總督安徽巡撫議行六年諭江浙徵收漕米但擇乾圓潔浄不必較論米色准令紅白兼收秈粳並納著為令十一年令河南山東於額徵粟米内改徴黑豆十二萬石運供京師仍如漕行臣等謹按乾隆二年又將粟米改徵黑豆河南二萬石山東四萬石九年河南粟米又改徵黑豆二萬九千三百五十六石六升有竒十六年又改河南粟米徵黑豆二萬石十三年申禁漕船水手擾害居民令漕運總督飭督速領運官嚴加約束違者論罪乾隆元年定各省截留漕船介於起運停運之間行糧月糧應給應追向未定有成例應酌定成規以歸畫一嗣後江蘇安徽浙江截留漕船應支本折月糧三修銀凖其照數全給至行糧盤耗贈銀負重等項各随多寡分作十分自水次抵通按程途逺近亦作十分計算行一分程途給一分銀米如行一兩站未及一分者即按一兩站扣算支給贈米一項如米到州縣半月放清者按已行之程扣給其未行之程追繳半月以外每石給米一升滿一月者給米二升滿二月者給米四升滿三月者全給若幇貼截留本次或全兑全收或數月後收清贈米亦按月計算江西漕船較大米數多每年額領三修銀不敷取辦於行月兼之水次開行逐節淺阻起駁長江守風過淮修艌一應費用較江浙不同遇有截留將原領折耗行月贈銀贈米斛面米均免扣追又每米一石徴耗米四斗為交通倉及沿途折耗之費副耗米一斗三升為水次開行抵淮折耗如在淮安以南截留者將四耗米令其隨正交納副米免其追繳如過淮截留者將四耗米内正兑米隨交二斗五升改兑米隨交一斗七升並每石别交一升贈米外餘米按由淮到通程途作為十分計算行一分程途即給一分耗米湖北湖南漕船灣泊岳州府濵臨洞庭風波不測截留漕船例給一半月糧之外每船酌留頭舵水手四名防䕶每名月給口糧一升減去水手人等每站給盤費銀三分米一升照時價折給至五年又定未兑之船截留者照停運例給與減半月糧已兑未開之船截留者減半月糧之外將三修一項照數全給各省畫一辦理七年又定截留漕船已兑開行照定例扣追運軍多有苦累每船山東河南加給銀五十兩江南浙江六十兩湖廣七十兩江西九十兩其應給之銀即於行月折色銀内扣給所餘行月等銀仍照舊按程分别追給再江西湖廣已過長江者其所餘銀米給與四分之三已渡河至臨徳等處者全給二年諭戸部曰聞得江浙兩省民間輸納白糧較漕糧費用繁重甚屬艱難朕心深為軫念諭令該部詳考據奏兩省嵗運白糧二十二萬餘石太常寺光禄寺各賔館需用二千餘石王公官員俸米需用十五六萬石内務府禁城兵丁及内監食用等項需萬石尚餘五萬石存倉等語朕思光禄寺等處所支原以供祭祀及賔館之用在所必需其王公官員俸米應用白糧者可酌量減半以秔米抵給至賞給禁城兵丁及内監食米亦可將白糧裁減給以秔米如此則每年所需白糧不過十萬石仍照常徵收起運其餘十二萬石著漕運總督㑹同該督撫酌量改徴漕糧其經費銀米均照漕例徴收以紓民力旋遵㫖議行三年恩賞運弁銀人各四兩軍半之是年以湖北通山當陽二縣僻處山陬漕糧難於兑運每石改徴銀一兩二錢五分四年定重運遇淺駁運例凡重運漕船所經遇淺起駁漕運河道總督奏明即飭所在有司官具民船駁運有司官將駁過各帮運軍名船米貨物及駁船雇直各數呈報漕河督撫並巡漕御史其駁船雇直憑有司酌給如有扣尅勒索者罪之七年諭免江西南昌江南興武浙江紹興各帮貸逋銀四千六百四十兩十年諭據工部侍郎范璨奏稱江南下江雜賦重於他省向來徵收弊竇甚多民間每完糧一石借漕費之名或以九折收或以八五折收甚至以八折收至雍正七年䝉世宗憲皇帝軫念窮黎敕令嚴加釐剔其時尹繼善為江西撫臣悉心籌畫酌定每石收漕費六分總令小民平斛响攩額外浮粒不收地方官奉法𦂳嚴彼時府道嘗微行密察諸弊肅清謳歌載道乃久之故智復萌上年下江収漕賢否不等聞有初開倉時印官駐宿倉所親騐米色胥吏尚無間可乗迨至漕糧𦂳兑之時印官不能處處親騐吏胥等即多方刁難小民不能等候情願議扣自九五折至九折不等大漕既畢所徵兵行局恤等米石竟有扣至八折者此雖得之風聞然法久弊生亦不可不再加整頓況一處如此他處即相效尤一省如此他省亦恐難保伏懇特頒諭㫖通飭有漕地方官於開倉之際刋立木榜大張曉示毋許額外需索令糧道知府等員不時密訪如有刁難折扣等弊即將官吏一併揭㕘至於大漕完竣之後徴收兵行局恤等項遴委幹員暗加查察稍有違犯亦即稟究如此則諸弊可以禁止等語徴收漕糧弊竇甚多江南之漕甲於諸省尤為積弊之藪朕亦知之范璨所奏著發出令有漕地方大小官員閲看嚴行釐剔如有仍蹈故轍者經朕聞知或被御史㕘劾必重加處分至於尹繼善既於前江撫任内辦理稱善今節制兩江仍是職任内應辦應查之事何以置若㒺聞一聴有司之變易舊規奸胥猾吏得以高下其手也將此詢問尹繼善其又何辭十一年監察御史沈景瀾請令各甲户應完漕項細數預給一單庶不至於漕項内每户暗加分釐以杜浮派之源從之十七年監察御史陸秩請申禁收漕州縣收兑留難之弊從之十九年諭截漕省分派就近駐劄之道員監看稽察不得但委州縣佐貳以致滋弊著為令二十四年令僱募縴夫聼軍弁自行酌辦時以各省糧艘北上每遇過閘過壩及急溜淺阻必需人力挽拽者沿河兵丁頗有把持包僱之弊至是嚴行查禁嗣後如藉端抑勒以老弱充數而横索雇值者罪之並將失察之該管將弁㕘處二十六年諭直𨽻總督事務繁多所有薊運河挑淺工程著就近令倉場侍郎専管每嵗督率通永道薊州知州隨時相度實力疏濬以利漕運二十九年諭司漕各員不得濫收潮潤米色又漕運總督楊錫紱奏請懲軍籍紳宧富戸規避簽丁詭揑脱漏之積習以禆漕務從之四十一年諭曰沿河短縴多係無業窮民羣聚覔食晝則隨帮受雇夜則乗機為匪其中最易蔵奸而漕艘經行上下遇有頂風淺水添雇帮縴人夫亦屬必不可少莫若令沿河州縣酌量安設縴夫並選派夫頭照管以供受雇其各帮雇覔縴夫並令押運千總督率旗丁查㸃稽核按站交替不許擕帶過站亦不許中途私雇庶各有責成不致滋事著直𨽻山東江南江西浙江湖廣各督撫㑹同漕運總督確商妥議具奏四十七年定管泉各員巡勘章程每年春夏之交管泉人員親駐泉源處所督夫疏導並飭各本管州縣一體實力查辦各本管府州於巡漕查勘之外再行巡查一次分别勸懲右漕運規例漕運限期兑運各省限十一月過淮江北各府限十二月内江南江寧蘇州常州鎮江等府限正月内松江府限二月初十内浙江湖北限二月内江西湖南限三月初十内其不過淮者河南限正月開行山東臨清牐内亦如之其牐外限二月開行到通程限山東河南限三月朔日江北限四月朔日江南限五月朔日浙江江西湖廣限六月朔日通州回空限十日淮安至天津重運限自半日至十二日有差回空於有牐壩處限與重運同無牐壩處逆流限自九日至一日順流限自三時至二日半各有差天津至通州重運係逆流二十里回空係順流五十里均限一日山陽至浙江重運順流四十里逆流二十里回空順流五十里逆流三十里均限一日違者該管官論如法順治十二年奉上諭漕運至為重務年來拖欠稽遲弊非一端漕督固宜盡心督撫亦宜分任責成除湖廣漕船暫留充餉外江南江北江西浙江等處漕糧著該督撫督率所屬各糧道州縣衛所等官恪遵漕規冬兑春開務依限到淮其到淮以後漕督察騐催䟎抵通交納河南山東漕糧該督撫督率所屬各官徵兑開行知㑹漕督察催北上係何地方遲悮者自督撫以至州縣衛所等官應擬何罪屬何省分者應限若干月日户部詳確議奏遵㫖議定各省漕糧徴収限十月内兑運限十一月内過淮江北各府州縣限十二月内江南江寧蘇松等處限正月内江西浙江限二月内其不過淮之山東河南二省限正月盡數開行如有司無糧軍衛船不齊備以致過淮違悞督撫糧道監兑官計違限一月至三月以上者各降罸有差如兑糧及期領運等官沿途違悞者計違限十日至一月責革有差經徵州縣衛所等官船到無米有米無船過十二日至二月者各降罰有差漕督通漕有催䟎之責過淮以後河督亦有催䟎之責如過淮及期而到通遲悞者河漕二督及沿河鎮道將領州縣等官亦照督撫糧道監兑官例議處至康熈五十一年増定違限一二月者如舊例行違限二月以上或七十日者督撫降一級戴罪督催糧道監兑官降二級調用八九十日者督撫降一級留任糧道監兑官降二級調用至雍正十三年題准山東臨清牐内之船照定例行其牐外之船限次年二月兑開乾隆九年又題准江南松江府漕船必由蓴柳澱山等湖湖南經涉洞庭江西必由鄱陽各帮船於過淮原限外寛限十日十六年定漕船回空過淮者責之漕運總督不過淮者責之糧道覈其船原數闕者罪之十七年定押運府倅過淮抵通違悞者如糧道例議罪康熙二年各省漕糧漕運總督刋發全單開列本帮兑糧軍船數目行月修船錢糧及到次開兑開行過淮到通回空違限日期與夫騐米色察夾販款目畢具各弁投到全單嗣後依式填注如有違悞不填及填注不實者在南聴漕運總督在北聴倉場侍郎察㕘四年定漕船回空限期漕船抵通州限十日回空倉場侍郎定立限單責成押運官依限到淮十一年定漕船抵通限期山東河南限三月初一日江北限四月初一日江南限五月初一日江西浙江湖廣限六月初一日到通均限三月内完糧如違限不完押運等官計違限不及一月至二月以上者各降罰有差又定白糧過淮抵通違限者督運官議如督運漕糧例十七年増定重運回空沿途期限各省漕船重運自淮安至天津原有定限今加増定如原限半日而違限一時原限一日而違限兩時原限一日半而違限三時原限二日以上而違限半日原限四日以上而違限半日原限六日以上而違限一日半原限十二日而違限兩日専催督催官各議罰有差原限半日而違限三時原限一日以上而違限半日原限兩日以上而違限一日原限四日以上而違限兩日原限六日以上而違限三日原限十二日而違限四日者専催督催官各降罰有差如違限之期與原限之期相等者降調逾於原限者降革各有差回空自天津至淮安向亦有定限今更定如逆流順流而有牐壩均照重運定期如無牐壩逆流原限十二日者改為九日四日改為三日三日改為二日二日半改為一日順流原限半日改為三時一日改為半日四日改為二日五日改為二日半如致違限沿途文武官並隨帮官皆照催䟎重運例議處天津至通州重運係逆流二十里限一日回空係順流五十里限一日山陽至浙江重運順流四十里限一日逆流二十里限一日回空順流五十里限一日逆流二十里限一日如有違限照例議處至鎮江渡江如因風守候令地方官報明免議再江西湖廣漕船行長江至儀徴者因風挽運難以立限應令地方官作速嚴催出境其自儀徴至天津皆如新定例行二十八年定漕船受兑離次各省巡撫題報期限不得過二月逾限者論三十四年令漕運總督毎年將過淮漕船總數繕造黄冊專疏具題五十一年諭凡事不求根本止務枝葉斷無實效條奏漕糧一事者止以沿途躭閣開兑遲悞陳奏其漕船稽遲根原從無一人言及朕南巡數次河道總運知之甚悉如上江漕船皆入儀徴河口下江漕船皆入𤓰州河口因大江泊船不便而四千餘艘彼此相爭入口灣泊必俟到齊始挨次開行則守候之間甚至遲誤若凡一帮全到在先不必等候各帮隨令起行過淮其續到者亦照此勿令守候止以船到即令起行則全帮得以早行後帮慮其隔絶自然奮勉追行如此則重運回空斷不致遲悞下部議行是年定給漕船限单漕船受兑開帮巡撫給以限单填註開行日期飭令沿河州縣挨注入境出境時日抵淮將单呈繳漕運總督察騐過淮後漕督亦給以限单將經過州縣原定限日刋入单内飭令沿河州縣注明入境出境日期俟抵通將单申繳倉場侍郎察騐回空倉場侍郎刋發限单沿河州縣填注亦如之至淮申繳漕運總督察騐漕督别給抵次限单沿途填注亦如之抵次之限不得過十一月既抵次將单申繳巡撫察騐雍正三年定漕白糧船抵通日期及起卸回空船糧各數並石壩外河水深淺令倉場侍郎五日一次具奏七年定漕船經過濟寕臨清二處令河東河道總督題報舊例漕船經過皂河濟寧臨清三處由河道總督題報時山東河南増設總河故以濟寧臨清歸河東總河題報皂河仍歸江南總河題報乾隆二年定山東自備船回空之例山東自備船令于交糧之日除留頭船一二人在通候領䉡羡完呈等項外其餘各軍給與空身限单勒令回次抵次將單呈繳各衛所察騐仍將限單填明到次日期彚送糧道考察留通運軍事竣回次亦如之七年定山東漕船不由漕運總督給發限單受兑之後即呈報河道總督及巡漕御史稽察催行右漕運限期漕運官司漕運總督一人總理直省糧儲轉漕以輸京師巡漕御史四人掌巡視稽察糧道山東河南安徽江蘇浙江江西湖北湖南各一人分掌漕務督運過淮監兑官山東六人河南三人江南十有五人浙江江西湖南各三人湖北六人以管糧同知通判為之押運官山東河南各一人江南七人浙江三人江西二人湖北湖南各一人以管糧通判為之領運官漕糧直隸千總四人領河南運山東守備一人千總三十六人内領河南運四人薊運四人江南守備八人千總九十八人内領河南運四人浙江守備二人千總十八人江西守備二人千總二十五人湖廣千總二十有二人白糧千總六人浙江千總四人均以衛所官為之每帮武舉一人随帮効力運軍每船一人僉軍籍人充役至於催運則凡漕船所經沿河文武官皆有責焉順治二年定漕運官司一仍明制輓運則設旗甲統領則設運總督押則設漕道糧道提衡巡察則設總漕巡漕七年裁巡漕御史十二年定五年一編審軍丁毋許竄入民籍康熙元年嚴沿途文武官催䟎之責催䟎不力者論二十二年諭漕運總督管理糧船是其専責漕運過淮及回空之時應令總督往來親催自奉諭後漕督親督重運至通嵗以為例二十六年申嚴運軍代運之令定例運軍不親押運以子弟代行者運軍及代運人均發邊衛充軍至是並嚴該管官處分三十五年定出運每船僉軍一名定例每船運軍十名至十一二名不等康熙二十五年改定額設十名至是每船僉軍一名其餘水手九名擇有身家並諳習撑駕者雇充四十五年定僉軍例親僉責在糧道舉報責在衛守備用舎責在運弁保結責在通帮衆軍一軍無保不准僉軍一軍有欠衆軍同賠至五十一年増定令千總結保衛守備府倅親騐結申糧道如有欠糧出結官坐罪五十一年定僉副軍一人随運每年於本軍子弟及兄弟之子再僉一人為副軍随運如抵通欠糧留本軍完欠副軍回空如重運到淮虧缺令本軍駕運北上留副軍買米趕帮雍正元年諭漕船務於本軍内擇其能撑駕者充當水手不得雇募無籍之人四年諭押運同知通判抵通之日著總督倉場侍郎送部引見六年定文學生員准免僉運七年諭朕聞漕船過淮所費陋規甚多嗣後著御史二人前往淮安稽察不許官吏人等向運軍額外需索以致擾累其糧艘中携帶物件除照例許帶外如運軍有夾帶私鹽及違禁等物者亦著該御史稽察但不得過於嚴刻吹求以致糧運滯遲至漕船抵通之時其該管衙門官吏及經紀車戸人等恐有向運丁額外需索陋規者亦著差御史二人前往稽察淮安於二月初差往通州於四月内差往不必拘定滿漢各一人著都察院按期開列請㫖臣等謹按乾隆二年令御史四人分地巡視一人駐淮安自江南江口至山東交界一人駐通州自通州至天津一人駐濟寧自山東臺莊至北直交界一人駐天津自天津至山東交界各按所分之境巡察諸弊乾隆八年令江淮興武二衛黄快船丁歸入民賦以嚴勾考時以江淮興武二衛運軍有竄入黄快船避僉者故令黄快船丁歸入民賦每五年將現運及備僉餘軍勾考一次將本軍及子孫兄弟之子並所居州縣都圖鄉鎮注冊送户部察覈三十七年令糧道親自督運到淮不得轉委丞倅代押四十八年諭向例總督俱兼兵部尚書右都御史銜巡撫俱兼兵部侍郎右副都御史銜但漕運河道總督並無地方之責究與各省總督不同况又有由道員陞署及簡擢初任之員若一例兼銜未免太優不可不量為區别嗣後漕運河道總督該部俱奏請給與兵部侍郎右副都御史銜著為令右漕運官司漕船各省原額萬四千五百五號除改折分載帶運坍荒闕額漕糧裁減船數外實運船數右謹據會典則例恭載苐各省漕糧屢蒙仍不恩免漕艘出運即有增減拘定額直隸三十七號協濟河南山東九百七十五號協濟河南二百四十四號江南江安糧道所屬二千八百八十六號協濟河南一百二十五號協濟蘇松千八百三十五號蘇松糧道所屬四百三十九號浙江五百六十九號江西三百四十八號湖北一百二十號湖南百十有四號河南無漕船直隸山東江南就近協運四百有六號白糧船江南一百三十六號在通省漕船内三年抽調一次浙江六十三號在通省漕船内撥定長運自備船無定額各省漕船缺額運軍雇募民船裝運官給其直催漕船沿河每汛一號垡船六十號順治四年定各省漕船缺額令運軍自備船裝運自備船不支三修料價僅給重運銀令其雇募民船至順治九年定給水脚銀江南蘇州松江安慶廬州並江西浙江等處每石自三錢至三錢五分揚州府每石二錢五分均於随漕項内動給十年以白糧無漕船令攅厰成造十三年定貼造漕船之例凡成造漕船例於州縣民地徵十分之七衛所軍地徵十分之三給備料價其有不敷於江寧各衛屯米每石協濟銀一錢黄快船每丁協濟銀五分官舎餘丁編為三則上則納銀五錢中則三錢下則二錢審定造冊徵收解厰安慶衛以屯田匀配上下兩運公同貼造新安宣州二衛按屯田編徵貼造建陽衛於屯丁銀内加徵貼造廬鳳淮揚徐滁等衛蘇太等衛所及山東各衛均按清出丁舎編徵貼造浙江按清出閑丁每丁徵銀四錢江西每丁徵銀二錢五分湖廣每丁徵銀二錢以供貼造若船多銀少儘數匀攤是年又飭將各衛所舎餘閑丁按年編審納銀為帮貼之費至康熙十九年始定漕船額支官銀成造其清出丁銀概飭解部康熙三年增造浙江白糧船六十四號浙江白糧用漕帶之法需船百二十號除六十二號於漕帮内抽出裝運外増造六十四號并入漕帮僉運十四年定江蘇白糧照浙江例抽選漕船裝運五年更換康熈四十三年浙江運白漕船亦定為五年更換乾隆七年以浙江運白不願更換仍依舊例撥定軍船永逺承運十六年改江南五年更換之期為三年二十六年定各衛所漕船照每年見運之數成造十分之一又定各省嵗修漕船毎出運一船給修費銀七兩五錢雍正二年裁船政同知先是江浙設船政同知至是罷一切修造漕船事冝歸糧道管理令運軍支領料價赴厰成造所有不敷即於道庫減存漕項銀内動支其蕪湖淮安杭州等闗額供造船銀飭令解部五年定催漕船成造嵗修銀數催漕船按汛成造毎船給銀三十七兩六錢三分三釐動支税課銀每嵗給小修銀二兩動支茶果銀十年期滿照例别造八年定漕船裏料銀舊例成造新船將舊船解厰兩充作裏料如無交銀五十一九年諭户部江南江淮興武二衛運軍名下有應追鑚夫底料銀十萬八千一百餘兩此項自康熙四十二年至雍正元年前後共二十載各軍僉替更換不一見今著追之人未必係當日領米之人其力既不能完未免有所拖累且今承追接催各官㕘罰累累有碍考成亦可軫念著將二衛應追夫役及底料銀悉行豁免乾隆十一年増設垡船分國初以漕船至天津起撥運至通設紅撥船六百隻每船給田十頃養贍免其徵科至康熙三十九年裁革紅撥船按原給田所收租額分派各省於漕糧項内徵給運軍雇船撥淺乾隆二年每船給紅撥銀二兩至是北河增設垡船六十號衩夫百八十名淺夫三百名随時疏濬以免丁累其置造垡船器具夫工等費於紅撥銀内動支餘銀仍照數分給運軍以備撥淺之用二十四年漕督楊錫紱奏江西帮船情形與江浙等省不同可以通融裁減且於辦公有益從之右漕船倉庾在京師者十有三倉禄米南新舊太富新興平太平萬安七倉在朝陽門外海運北新二倉在東直門外本裕倉在徳勝門外清河儲濟裕豐二倉在東便門外豐益倉在徳勝門外安河橋又太通橋朝陽門號房二處其在通州者三倉西倉在新城内中倉在舊城内南倉乾隆十八年裁又石壩土壩舊城南門新城南門號房四處専設官管總督倉場侍郎一人總理北河河道及漕船倉庾之事欽簡大臣涖其任坐糧㕔各倉監督咸隸焉坐糧㕔滿漢各一人掌北河疏築督催漕船收運倉米出納庫銀及通州税課之事大通橋監督滿漢各一人掌抽盤督催之事兼騐收隨漕松板京師豐益倉監督滿二人餘十二倉滿漢各一人掌倉糧出納之事稽察官每倉欽命御史一人専司倉房完損糧米侵盜之事率於嵗終更代順治十年製鐵斛頒發倉場永為定式十三年定各倉收米限期京倉限十日通州倉限七日畢印給倉收以坐派紅單即印票到日起限逾限者劾之康熙二年定漕糧完欠分數以嚴考成坐糧㕔經管漕糧除帶運米外將餘米併入正運總作十分考覈未完六釐以上不及一分者罰俸六月一分以上不及二分者罰俸一年雍正二年定運米經紀車户掣欠賠抵之例經紀運米到橋車户運米進倉舊例每米五十袋抽掣一袋一袋短少餘袋例算於各役脚價内扣賠至是定經紀係船運每十萬石定掣欠二百石大通橋車户係陸運每十萬石掣欠二百五十石通倉車户係水陸兼運每十萬石亦掣欠二百石每石秔米作價銀七錢稄米六錢准於脚價内扣抵若欠數多除不准脚價扣抵外照盜賣漕糧例治罪每秔稄米一石作價銀一兩四錢行地方官將家産變賠乾隆三年増定每石准其掣欠八合照七錢六錢之例買餘米賠補若欠數多仍照一兩四錢之例於脚價内扣抵五年諭在京各倉每倉或都統或副都統各一人御史中不分滿漢每倉各委一人専任稽察之責其支放奏銷等事不必經管惟倉房滲漏牆垣損壞與倉内鋪墊及匪類盜竊各弊察出即行文倉場侍郎知之若倉場侍郎不及時辦理妥協即據實奏聞倘不能察出弊端以致虧損倉糧著落稽察之都統副都統御史與倉場監督等官分賠通州三倉即照此例交與通永道通州副將稽察其失察分賠之例與京倉同乾隆三年製鐵尺用積方之法覈算倉糧積方之法二年以内方一尺照三斗一升六合之法三年以外方一尺照三斗四升之法二年以外三年以内者方一尺照三斗二升八合之法丈算鑄鐵尺分頒戸部倉場及各倉嗣後均依尺丈量是年定各倉貯米每厫以萬石為率其竒零之數别貯一厫十七年定稽察各倉官除都統值班御史在城理訟之期均更畨到倉稽察違者令巡漕御史糾㕘是年増定稽察倉庾事例京通各倉每倉差御史一人稽察年終更代將一年有無弊竇奏明交户部存案奏報不實者議處其各倉收漕滿厫倉場侍郎封固御史加封各厫鎖匙倉場衙門收貯每夏冬二季騐封加封新舊監督交代整厫騐封零厫抽盤如有攙和短少揭報倉場侍郎及御史公盤得實治罪勒賠其監督交代限兩月交完出結十八年諭向來旗員承修厫座往往慮及工部料估之數不敷輾轉議増議減以致遲延時日嗣後各倉遇有應修工程著工部倉場該旗各派司官一員會同料估修理是年御史曹秀先奏通倉各厫匙鑰新例交倉場侍郎收執其殘厫用都統御史封條恐隂雨查騐不便請盡交滿漢監督以専責成又收漕甫完倉厫即行封閉恐欝蒸之氣未出以致縻爛請俟深秋始行上板加封使米不受傷下部議行二十七年定監督期滿更代之例京通各倉滿漢監督三年期滿不准留倉如有滿漢同時任滿准倉場侍郎於各倉監督内揀選調補三十三年查倉大臣兵部尚書托庸等奏盤騐京通各倉丈量之法每屆五年查辨一次徒滋縻費應請停止嗣後分年支放按倉分劃新收舊貯作何查騐考覈以杜牽混之處另行會同倉場侍郎詳籌妥議辦理從之四十一年諭各倉厰座應行拔草修理時即著工部堂官揀派司員帶領工匠前往妥協辦理無庸各該倉自僱匠役至太平萬安兩倉地形稍窄嗣後如遇工程即將拆下渣土隨工出運仍造冊送部查核定直省州縣倉庾建於各州縣城内其収兑稽察知州知縣自監之若其地不通水道者則建倉於隣邑水次以便起運右倉庾皇朝文獻通考卷四十三
