body:
  text: 欽定四庫全書皇朝文獻通考卷二百四十二帝系考四皇太子皇子皇始祖肇祖原皇帝子二皇長子充善皇二子禇宴無嗣皇長子子三皇長孫妥羅無嗣皇次孫妥義謨無嗣皇三孫錫寶齊篇古皇三孫子一是為興祖直皇帝興祖直皇帝子六皇四子是為景祖翼皇帝恭載年門帝號歷皇長子德世庫皇二子留闡皇三子索長阿皇五子包朗阿皇六子寶實景祖翼皇帝子五皇四子是為顯祖宣皇帝恭載年門帝號歷皇長子武功郡王禮敦皇二子慧哲郡王額爾衮皇三子宣獻郡王齋堪皇五子多羅恪恭貝勒塔察篇古臣等謹按凡紀載皇子冠以爵號俱遵玉牒提綱大書其封爵年月及始封晉封並詳封建考中兹故不載顯祖宣皇帝子五皇長子是為太祖高皇帝宣皇后誕生恭載年門帝號歷皇二子多羅誠毅勇壯貝勒穆爾哈齊庶妃李佳氏生皇三子和碩莊親王舒爾哈齊宣皇后生皇四子多羅通達郡王雅爾哈齊宣皇后生皇五子多羅篤義剛果貝勒巴雅喇次妃哈達納喇氏生太祖高皇帝子十六皇八子是為太宗文皇帝孝慈高皇后誕生恭載年門帝號歷皇長子廣略貝勒褚英元妃佟佳氏生皇二子和碩禮烈親王代善元妃佟佳氏生皇三子奉恩鎮國勤敏公阿拜庶妃兆佳氏生皇四子三等鎮國克潔將軍湯古代庶妃鈕祜祿氏生皇六子奉恩輔國慤厚公塔拜庶妃鈕祜祿氏生皇七子和碩饒餘敏親王阿巴泰側妃伊爾根覺羅氏生皇九子奉恩鎮國恪僖公巴布泰庶妃嘉穆瑚覺羅氏生皇十一子鎮國將軍巴布海庶妃嘉穆瑚覺羅氏生皇十二子阿濟格原封和碩英親王恭謹按凡原有封爵因罪削奪者照玉牒編載例不大書仍附注明後倣此大妃烏拉納喇氏生皇十三子奉恩輔國介直公賴慕布庶妃西林覺羅氏生皇十四子和碩睿忠親王多爾衮大妃烏拉納喇氏生皇十五子和碩豫通親王多鐸大妃烏拉納喇氏生臣等謹按玉牒末附載太祖高皇帝第五子莽古爾泰第十子德格類俱原封多羅貝勒以本身罪發覺奪爵削籍又第十六子費揚果因獲大罪黜去宗室康熙五十二年五月奉恩旨恐伊等子孫湮沒賜與紅帶為記附入牒末今謹遵此例於本系下不書其名仍附識焉太宗文皇帝子十一皇九子是為世祖章皇帝孝莊文皇后誕生恭載年門帝號歷皇長子和碩肅武親王豪格繼妃烏拉納喇氏生皇二子洛格繼妃烏拉納喇氏生早薨無封皇三子洛博會元妃鈕祜祿氏生早薨無封皇四子奉恩輔國公葉布舒庶妃顔扎氏生皇五子和碩承澤裕親王碩塞側妃葉赫納喇氏生皇六子奉恩鎮國慤厚公高塞庶妃納喇氏生皇七子奉恩輔國公品級常舒庶妃伊爾根覺羅氏生皇八子未賜名敏惠恭和元妃科爾沁博爾濟吉特氏生早薨無封皇十子奉恩輔國公韜塞庶妃氏無考生皇十一子和碩襄昭親王博穆博果爾懿靜大貴妃阿魯阿巴海博爾濟吉特氏生世祖章皇帝子八皇三子是為聖祖仁皇帝孝康章皇后誕生恭載年門帝號歷皇長子鈕鈕庶妃巴氏生早薨無封皇二子和碩裕憲親王福全寧慤妃棟鄂氏生皇四子和碩榮親王未賜名孝獻皇后生早薨皇五子和碩恭親王常寧庶妃陳氏生皇六子竒授庶妃唐氏生早薨無封皇七子和碩純靖親王隆禧庶妃鈕氏生皇八子永幹庶妃穆克圖氏生早薨無封聖祖仁皇帝子三十五皇四子是為世宗憲皇帝孝恭仁皇后誕生恭載年門帝號歷皇長子固山貝子品級允禔惠妃納喇氏生皇二子和碩理密親王允礽孝誠仁皇后生康熙十四年六月癸亥諭禮部曰帝王紹基垂統長治久安必建立元儲懋隆國本以綿宗社之祥慰臣民之望朕荷天眷誕生嫡子已及二齡兹者欽承太皇太后皇太后慈命建儲大典宜即舉行今以嫡子允礽為皇太子爾部詳察應行典禮選擇吉期具奏十二月丙寅册立皇子允礽為皇太子四十七年九月丁丑上召諸王大臣侍衛文武官員等諭曰朕承太祖太宗世祖𢎞業四十八年於兹兢兢業業軫恤臣工惠養百姓惟以治安天下為務今觀允礽不法祖德不遵朕訓似此之人豈可付以祖宗𢎞業俟昭告天地宗廟將允礽廢斥己丑上召集諸王貝勒等副都統以上大臣九卿詹事科道官員宣諭廢皇太子允礽辛卯幽禁咸安宫四十八年三月辛巳復立皇太子允礽行册立禮五十一年九月庚戍諭諸皇子等曰皇太子允礽自復立以來狂疾未除大失人心祖宗鴻業斷不可託付此人朕已奏聞皇太后著將允礽拘執看守朕明日再頒諭旨示諸王大臣十月辛亥朔御筆硃書諭諸王貝勒貝子大臣等曰前因允礽行事乖戾曽經禁錮繼而念父子之恩從寬免宥想伊自應痛改前非晝夜警惕乃自釋放之日乖戻之心即行顯露數年以來朕久隱忍不即發露者因向有望其悛改之言耳今觀其行事即每日教訓斷非能改者況天下乃太祖太宗世祖所創之業傳至朕躬非朕所創立恃先聖垂貽景福守成五十餘載朝乾夕惕耗盡心血竭蹶從事尚不能詳盡如此狂易成疾不得衆心之人豈可付託乎故將允礽仍行廢黜禁錮為此特諭五十二年二月庚戍諭領侍衛內大臣大學士九卿等趙申喬陳奏皇太子為國本應行册立朕自幼讀書凡事留意纎悉無遺況建儲大事朕豈忘懷但關係重大有未可輕立者昔立允礽為皇太子時索額圖懷私倡議凡皇太子服御諸物俱用黃色所定一切儀注幾與朕相似驕縱之漸實由於此索額圖誠本朝第一罪人也宋仁宗三十年未立太子我太祖皇帝並未預立太子太宗皇帝亦未預立太子漢唐以來太子幼沖尚保無事若太子年長其左右羣小結黨營私鮮有能無事者人非聖人誰能無過安得有克盡子道如武王者今衆皇子學問見識不後於人但年俱長成已經分封其所屬人員未有不各庇護其主者即使立之能保將來無事乎且為君難為臣不易古來人君窮兵黷武者有之崇尚佛老者有之任用名法者有之朕御極五十餘年朝乾夕惕上念祖宗遺緒之重下念臣民仰望之殷乾綱獨斷柔逺能邇體恤臣庶毫無私心當吳三桂叛亂時已失八省勢幾危矣朕灼知滿漢蒙古之心各加任用勵精圖治轉危為安是以數十年來海宇寧靖今欲立皇太子必能以朕心為心者方可立之豈宜輕舉即臣僚為國為民念兹在兹先憂後樂者實不易得太子之為國本朕豈不知立非其人關係匪輕朕將允礽從幼教訓逮後長成變為暴虐無所不為不知忠孝不識廉恥行事乖戾有不可言者推其故皆由瘋狂成疾迷惑所致此疾有二十餘載矣凡人醉後傷人醒時知悔伊似長醉不醒所為過惡身不自知伊之儀表及學問才技俱有可觀今一至於此非瘋疾而何自廢而復立以來朕尤加意教訓心血耗盡因伊狂疾終不痊愈故又行廢黜孟子云父子之間不責善責善則離離則不祥莫大焉大學云人莫知其子之惡蓋父之於子嚴不可寬亦不可誠為難事如朕方能處置得宜耳爾諸大臣俱各有子凡人幼時猶可教訓及其長成一誘於黨類便各有所為不復能拘制矣立皇太子事未可輕定特召集爾衆大臣明示朕意趙申喬所奏摺著發還皇三子多羅誠隱郡王允祉榮妃馬佳氏生皇五子和碩恆溫親王允祺宜妃郭囉羅氏生皇六子允祚孝恭仁皇后生早薨無封皇七子和碩淳度親王允祐成妃戴佳氏生皇八子允祀原封和碩廉親王良妃魏氏生皇九子允禟原封固山貝子宜妃郭囉羅氏生臣等謹按玉牒載允祀允禟於雍正四年因罪削爵除名黜去宗室乾隆四十三年正月特旨復其原名收入玉牒仰見我皇上篤念宗親加惠本支至意今附識於此皇十子固山貝子品級允娥溫僖貴妃鈕祜祿氏生皇十一子允禌宜妃郭囉羅氏生早薨無封皇十二子和碩履懿親王允祹定妃萬琉哈氏生皇十三子和碩怡賢親王允祥敬敏皇貴妃章佳氏生皇十四子多羅恂勤郡王允禵孝恭仁皇后生皇十五子多羅愈恪郡王允禑順懿密妃王氏生皇十六子和碩莊恪親王允祿順懿密妃王氏生皇十七子和碩果毅親王允禮純裕勤妃陳氏生皇十八子允祄順懿密妃王氏生早薨無封皇十九子允禝襄嬪高氏生早薨無封皇二十子多羅簡靜貝勒允禕襄嬪高氏生皇二十一子多羅慎靖郡王允禧熙嬪陳氏生皇二十二子多羅恭勤貝勒允祜謹嬪色赫圖氏生皇二十三子奉恩鎮國公允祁靜嬪石氏生皇二十四子和碩諴親王允祕穆嬪陳氏生臣等謹按玉牒載皇子幼齡薨者十一人不以齒序類列於後今遵此恭載皇子承瑞榮妃馬佳氏生皇子承祐孝誠仁皇后生皇子承慶惠妃納喇氏生皇子賽音察渾榮妃馬佳氏生皇子長華榮妃馬佳氏生皇子長生榮妃馬佳氏生皇子萬黼貴人納喇氏生皇子允禶貴人納喇氏生皇子允𢯺貴人郭囉羅氏生皇子允禨平妃赫舍哩氏生皇子允禐貴人陳氏生世宗憲皇帝子十皇四子是為今上皇帝孝聖憲皇后誕生恭載年門帝號厯雍正元年八月甲子上御乾清宫西暖閣召王大臣九卿入諭曰我聖祖仁皇帝為宗社臣民計慎選於諸子之中命朕纘承統緒於去年十一月十三日倉猝之間一言而定大計薄海內外莫不傾心悅服共享安全之福聖祖之精神力量默運於事先貫注於事後神聖睿哲高出乎千古帝王之上自能主持若朕則豈能及此也皇考當日亦曽降旨於爾諸臣曰朕萬年後必擇一堅固可託之人與爾等作主必令爾等傾心悅服斷不致貽纍於爾諸臣也朕自即位以來念聖祖付託之重太祖太宗世祖創垂大業在於朕躬夙夜兢兢惟恐未克負荷向日朕在藩邸時坦懷接物無猜無疑飲食起居不加防範此身利害聽之於命蓋未任天下之重也今躬膺聖祖付託神器之重安可怠忽不為長久之慮乎當日聖祖因二阿哥之事身心憂悴不可殫述今朕諸子尚幼建儲一事必須詳慎此時安可舉行然聖祖既將大事付託於朕朕身為宗社之主不得不預為之計今朕特將此事親寫密封藏於匣內置之乾清宫正中世祖章皇帝御書正大光明匾額之後乃宫中最高之處以備不虞諸王大臣咸知之皇長子和碩端親王𢎞暉孝敬憲皇后生皇二子𢎞昀齊妃李氏生早薨無封皇三子𢎞時齊妃李氏生無封皇五子和碩和恭親王𢎞晝純懿皇貴妃耿氏生皇六子多羅果恭郡王𢎞曕謙妃劉氏生臣等謹按玉牒載皇子幼齡薨者四人不以齒序類列於後今遵此恭載皇子𢎞昐齊妃李氏生皇子福宜端肅皇貴妃年氏生皇子追封和碩懷親王福惠敦肅皇貴妃年氏生皇子福沛敦肅皇貴妃年氏生今上皇帝皇子皇長子和碩定安親王永璜哲憫皇貴妃富察氏生皇二子端慧皇太子永璉孝賢皇后生乾隆元年七月甲子召總理事務王大臣九卿等諭曰朕受皇考付託之重踐阼以來兢兢業業無刻不以敬天勤民為念宵衣旰食日理萬幾務期海宇乂安庶政咸理仰副我皇考付託得人之聖心以綿宗社無疆之慶朕思宗社大計莫如建儲一事自古帝王即位首先舉行所以重國本而定鴻基也朕即位已逾半載而未經降旨者並非不稽古典而視此事為緩圖良以後世人心不古往往有因建儲太早以致别生事端者或本人恃貴驕矜漸至失德或左右逢迎諂媚引誘作非甚且有姦宄之徒窺伺讒搆以搖動之是以皇祖當日於建儲一事大費苦心及授神器於我皇考時一言而定萬世之業我皇考御極之元年聖心即默注朕躬不肯宣布中外而傳集諸王大臣九卿特加訓諭親書密旨收藏於乾清宫內正大光明殿額之後此我皇考監古宜今寶愛玉成之妙用也今朕當春秋方盛之時皇子年齒又尚沖幼揆之事勢雖若可緩而國本攸繫自以預定為宜再四思維惟有循用皇考成式親書密旨照前收藏在我皇考神明化裁創舉於一時而朕繼志述事踵行於今日此乃酌權劑經之道非謂後世子孫皆當奉此以為法則也將來皇子年齒漸長日就月將識見擴充志氣堅定萬無驕貴引誘之習朕仍應布告天下明正儲二之位若夫以建儲為嫌忌而不肯舉行者此庸主卑陋之見朕所深鄙者也今傳集總理事務王大臣九卿等面降此旨非謂諸臣不知朕心必俟朕之諄諄告諭也誠恐天下讀書泥古者以朕不早建儲為疑用是特為宣曉如有拘牽舊制復行奏請者著該衙門將奏章發還今日朕親書密旨著總理事務王大臣親看宫中總管太監謹收藏於乾清宫正大光明匾額之後三年十月辛卯諭曰二阿哥永璉乃皇后所生朕之嫡子為人聰明貴重氣宇不凡當日蒙皇考命名永璉隱然示以承宗器之意朕御極以後不即顯行册立皇太子之禮者蓋恐幼年志氣未定恃貴驕矜或左右諂媚逢迎至於失德甚且有窺伺動搖之者是以於乾隆元年七月初二日遵照皇考成式親書密旨召諸王大臣面諭收藏於乾清宫正大光明匾額之後是永璉雖未行册立之禮朕已命為皇太子矣今於本月十二日偶患寒疾遂致不起朕心甚為悲悼朕為天下主豈肯因幼殤而傷懷抱但永璉係朕嫡子已定建儲之計與衆子不同一切典禮著照皇太子儀注行皇三子多羅循郡王永璋純惠皇貴妃蘇氏生皇四子多羅履端郡王永珹淑嘉皇貴妃金氏生皇五子和碩榮純親王永琪愈妃珂里葉特氏生皇六子多羅質郡王永瑢純惠皇貴妃蘇氏生皇七子悼敏永琮孝賢皇后生早薨皇八子多羅儀郡王永璇淑嘉皇貴妃金氏生皇九子淑嘉皇貴妃金氏生早薨未有名皇十子舒妃葉赫納喇氏生早薨未有名皇十一子永瑆淑嘉皇貴妃金氏生皇十二子永璂皇后納喇氏生皇十三子永璟皇后納喇氏生早薨皇十四子永璐令懿皇貴妃魏氏生早薨皇十五子永琰令懿皇貴妃魏氏生皇十六子令懿皇貴妃魏氏生早薨未有名皇十七子永璘令懿皇貴妃魏氏生乾隆十八年十一月壬子朔諭曰古稱建儲為國本大計朕酌古準今深知於理勢有所難行載在史册者姑置勿論即如理密親王當皇祖聖祖仁皇帝時聖慈鍾愛初無間言嗣以東宫既建狎昵匪人陷於失德再致廢黜其先所置官僚何嘗非一時之選如湯斌即所稱當代醇儒然亦何禆萬一蓋别立宫府則僚屬多人賢否參雜斷難保其不滋事端夫以皇祖之包含宏大尚迫於宗社之重必不可容可見建儲一事亦如封建井田固不可行之近世也是以皇考鑒於前事默定宸衷不事建儲分府惟擇老成宿望大臣如朱軾鄂爾泰福敏張廷玉蔡世逺等勸讀內廷聖謨深逺慈覆如天朕纘承以來恪遵家法今皇子等讀書內廷亦唯慎簡師傅俾之薰陶德性講習詩書日有程課其視出閣就傅有名無實者相去為何如耶要之豫教固所當重實亦存乎其人此則蒼穹之敷祐宗社之貽庥景運靈長有非人力所致者矣四十八年九月戊午諭曰朕閲館臣所進職官表志詹事府一門其按語內稱詹事為東宫官屬我國家萬年垂統家法相承不事建儲册立詹事府各員留以備詞臣遷轉之階等語是書館臣因朕前降諭旨於建儲一事之斷不可行明切訓示故於按語內特為揭出其實書生拘迂之見豈能深計及此且使是書留傳後世安知不又訾議館臣為無奈迎合諭旨非其本懷耶用是不得不再為明白宣諭夫堯授舜舜授禹唐虞固公天下即禹之傳啓亦非於在位時有建立太子之事三代以後人心不古秦漢預立太子其後爭奪廢立禍亂相尋不可枚舉逺而唐高祖立建成為太子至於兄弟相殘建成被害近而明神宗朝羣臣奏請預立國本紛紜擾亂甚至宵小乘間伺釁釀為亂階如梃擊等案神宗召見太子泣為慰藉父子之間至於如此閲之真可寒心可知建儲册立非國家之福召亂起釁多由於此即以我朝而論皇祖時理密親王亦嘗立為太子且特選公正大臣如湯斌者為之輔導乃既立之後情性乖張即湯斌亦不能有所匡救羣小復從而蠱惑遂致屢生事端上煩皇祖聖慮終至廢黜且即理密親王幸而無過竟承大統亦不過享國二年其長子𢎞晳縱欲敗度不克幹蠱年亦不永使相繼嗣立不數年間連遭變故豈我大清宗社臣民之福乎是以皇祖有鑒於兹自理密親王既廢不復建儲逮我皇祖龍馭上賓傳位皇考紹登大寶十三年勵精圖治中外肅清皇考敬法前徽雖不預立儲位而於宗社大計實早為籌定雍正元年即親書朕名緘藏於乾清宫正大光明匾內又另書密封一匣常以隨身至雍正十三年八月皇考升遐朕同爾時大臣等敬謹啓視傳位於朕之御筆復取出內府緘盒密記核對吻合人心翕然此天下臣民所共知者也朕登極之初恪遵家法以皇次子乃孝賢皇后所生嫡子為人端重醇良依皇考之例曽書其名藏於乾清宫正大光明匾額後乃稟命不融未幾薨逝遂命大學士鄂爾泰張廷玉將其名撤出追諡為端慧皇太子是未嘗不立嫡也但不以明告衆耳嗣後皇七子亦孝賢皇后所出秉質純粹深愜朕心惜不久亦即悼殤其時朕視皇五子於諸子中覺貴重且漢文滿洲蒙古語馬步射及算法等事並皆嫺習頗屬意於彼而未明言乃復因病旋逝設依書生之見規仿古制繼建元良則朕三十餘年之內國儲凡三易尚復成何事體是以前於癸巳年復書所立皇子之名藏於匣內常以自隨是年南郊大祀令諸皇子在壇襄事曽以所定皇子默禱於上帝若所定之子克承堂構則祈昊蒼眷祐俾得年命延長倘非天意所屬則速奪其算朕亦可另為選擇毋誤我國家宗社生民重寄本年恭詣盛京祗謁祖陵亦如告天之言默祝於太祖太宗之前仰祈靈爽式憑永垂昭鑒朕非不愛子也誠以宗社為重若朕之子孫皆以朕此心為心實大清國億萬斯年之福也今日召對諸皇子及軍機大臣面降此旨即朕前所默告上帝祖宗之言豈容有絲毫虗飾耶朕於天下一切庶務無不宵旰勤求悉心籌畫寧於繼體付託之重轉不早為定計乎秋間朕於避暑山莊河岸御鎗打鵁鶄失足落水濕衣其時不特御前王公大臣等聞知俱即趨至問安即漢軍機大臣亦接踵前赴該處朕仍率伊等談笑而行並未有因內廷禁地太監等敢於阻止者設朕起居偶有違和大臣等俱可直詣寢所此皆由朕平日君臣一體無日不接見諸臣面承諭旨何至有若前代夜半禁中出片紙之語為杞人之憂乎總之建儲一事即如井田封建之必不可行朕雖未有明詔立儲而於天祖之前既先為齊心默告實與立儲無異但不似往代覆轍之務虛名而受實禍耳故現在詹事官屬雖沿舊制而其實一無職掌祇以備員為翰林升轉之資耳因再明切宣諭我子孫其各敬承勿替庶幾億萬年無疆之休其在斯乎總之此事朕亦不敢必以為是其有欲遵古禮為建立之事者朕亦不禁俟至於父子兄弟之間猜疑漸生釀成大禍時當思朕言耳並諭館臣將此旨冠於是編之首俾天下萬世咸知朕意十月十九日諭曰朕厯覽前代建儲諸弊及我朝家法相承於立儲一事之不可行已明降諭旨宣示中外至史册所載因建立儲二致釀事端者不可枚舉自當勒成一書以昭殷鑒著諸皇子等同軍機大臣及尚書房總師傅等將歷代册立太子事迹有關鑑戒者採輯成書陸續進呈即著皇孫等之師傅為謄録書成名為古今儲二金鑑十二月初八日諭曰朕恭閲康熙三十三年聖祖實録禮部奏祭奉先殿儀注將皇子拜褥設置檻內上諭尚書沙穆哈曰皇太子拜褥應設檻外沙穆哈即行奏請諭旨記於檔案經聖祖降旨交部嚴加議處部議革職一事禮臣安設拜褥未協既經聖祖面諭業已遵奉移設乃沙穆哈胸中即預存畏忌皇太子之見奏請諭旨記檔以為日後卸責地步我皇祖洞燭其隱將伊革職皇祖之仁慈大度皇太子維時年幼尚無縱恣事迹禮臣因關係儲位即心懷顧忌如此厥後日漸失德致遭黜廢夫仁如聖祖册立儲二猶致有理密親王之事設後之人主未能如聖祖之慈愛明哲而為太子者又不能小心謙謹必致漸生嫌隙鮮有能始終獲保萬全之理可見建儲册立之斷不可行也在書生拘墟之見必有竊議其非而後之人不思深慮逺仍踵前轍或啓事端彼時當益信朕言之早經灼見耳前經朕疊頒諭旨明切曉諭並令皇子及總師傅軍機大臣等編輯古今儲二金鑑垂示久逺因恭閲皇祖實録禮臣安設拜褥請旨記檔即此一節益可見朕所慮之不爽並令編入古今儲二金鑑卷首四十九年正月十四日諭曰皇長孫綿德前因與革職禮部郎中秦雄褒往來餽遺書畫革去承襲定郡王嗣復加恩封為公爵綿德為皇長子定安親王嫡長子係朕長孫設如書生拘迂之見若明洪武時懿文太子既歿劉三吾建議謂皇孫世嫡禮宜承統洪武泥於法古遂立建文為皇太孫其後釀成永樂靖難之變禍亂相尋臣民荼毒皆劉三吾一言喪邦之所致也朕惟深鑒於歷代建儲之失是以再三宣諭並令纂輯儲二金鑑一書為萬世法戒若如洪武之泥古立儲封建以祖宗神器之重輕為付託豈我大清宗社萬年之福乎今念綿德之子奕純新嵗可以得子朕慶抱元孫五世一堂實為古稀盛事自應特沛恩施以衍奕祀雲仍之慶綿德著加恩晉封固山貝子嗣後宜益加謹飭常存敬畏以期永承恩澤副朕諄切訓勉之至意此旨並著入於儲二金鑑十二月初六日上召見諸皇子大學士軍機大臣諭曰昨和珅福長安伊齡阿覆審內務府郎中海紹妄斷地畝釀成人命一案訊出海紹曽於上年十月具稿呈堂內務府大臣俱經閲畫而原參摺內未將曽經畫稿之處聲明實屬回護請將內務府大臣交部嚴加議處朕以內務府大臣取巧回護自應嚴議乃述旨時僅寫餘依議字樣竟未聲明敘入經朕硃筆添入蓋因六阿哥兼管內務府欲為之隱諱耳方今綱紀肅清諸皇子皆敬慎小心奉公守法諸臣亦斷無有畏憚迎合者而因有皇子在內形迹之間猶不免稍存瞻顧此甚非也即朕有錯誤處不容大臣及御史等明言乎即如前代之建儲册立其流弊不可屈指數朕近閲皇祖聖祖仁皇帝實録康熙三十六年八月上諭內務府總管海喇孫等膳房人花喇額楚哈哈珠子德住茶房人雅頭伊等私在皇太子處行走甚屬悖亂著將花喇德住雅頭處死額楚交與伊父英赫紫圈禁家中一事其時理密親王尚在年幼皇祖何等英明而膳房人花喇等即敢心存彼此依附覬覦皇祖洞燭先幾將花喇等正法以示懲創厥後羣小復從而蠱惑遂致屢生事端上煩皇祖聖慮終至廢黜自理密親王既廢不復建儲逮我皇祖傳位皇考十三年勵精圖治中外肅清及朕纘承洪業五十年間日理萬幾朝乾夕惕重熙纍洽海宇升平使理密親王及𢎞晳父子繼踐尊位不數年間屢遭事故豈大清宗社臣民之福乎夫以我皇祖之慈愛明哲猶有理密親王之事設後之人主未能如皇祖之仁慈英斷而為太子者又不能小心謙謹必致漸生嫌隙鮮有能始終獲保萬全之理可見建儲册立之斷不可行也又朕偶閲續通志載李林甫搆陷太子瑛一事記載未明因檢查通鑑輯覽稱明皇惑於武惠妃之譖欲廢太子瑛而張九齡犯顔強諫武惠妃密使宫奴謂九齡曰有廢必有興若為之援宰相可長處九齡叱之即以其語奏聞明皇為之動容九齡實賢臣若明皇能斷應立抵武惠妃之罪乃致九齡反罷斥李林甫專國阿附宫闈搆陷太子卒與鄂光二王廢黜同日賜死夫以儲位之故搆煽交乘致明皇一日而殺三子天下銜寃足見儲二一建幻起百端兄弟既多所猜嫌宵小且從而揣測其懦者獻媚逢迎以陷於辜其強者設機媒蘖以誣其過往往釀成禍變遂致父子之間慈孝兩虧而臣工亦必由此身罹刑憲平心而論其事果有益乎無益乎朕即位之初即默告上天若蒙穹蒼眷佑願如皇祖御極六十年之久不敢復有奢望其時朕年甫二十五嵗並未計及六十年當至八十五嵗至過五旬萬夀後始憶及此因暇日侍聖母時面奏及此曽蒙慈諭皇帝如此勤政愛民天下臣民亦必不肯聽皇帝歸政朕因默念若得上天嘉佑聖母夀踰百齡朕即八十五嵗亦何敢即言歸政今既始願不遂追憶斯言實深悲咽朕春秋七十有四距歸政尚十一年自當仰體上天愛養億兆董治百官猶日孜孜不敢自暇逸倘蒙嘉貺將來得歸政頥養親為授受豈非古今稀有之盛事而朕之心亦可明於天下後世朕辦理天下一切大小庶務無不宵旰勤求悉心籌畫即安置一物亦必期其穩妥寧於繼體付託之重轉不早為詳慎定計是朕非不立儲特不肯效立儲之虛名俾衆人有所窺伺致父子之間有責善則離之不樣爾此正朕維持調護之殷衷天地祖宗實鑒朕心若子子孫孫皆能以朕此心為心則我大清億萬年可永承鴻貺於無疆也總之立儲一事如井田封建之必不可行尚有過之將來書生拘墟之見必有心生竊議且謂今日諸臣有意迎合不知此等陽為國家根本之論而隂實遂其鑽營結納之私即億萬年後朕之子孫有泥古制而慕虗名復為建立之事者亦所不禁但人心不古如江河日下之勢父子之間必有為小人搆成覺隙復啓事端彼時始信朕言之不爽然悔已晚矣此事前屢頒訓諭並令皇子及總師傅軍機大臣等編輯古今儲二金鑑垂示久逺兹恭閲皇祖實録處治膳房人花喇等事用是再行明切申諭並著補載入古今儲二金鑑臣等謹按聖朝列祖垂統神器攸歸不事册立我皇上欽遵世宗憲皇帝成式默定宸衷函名禁匾屢降諭旨明切宣示又復酌古準今命纂儲二金鑑一書睿慮精深實足為萬世法守敬謹備載以垂久逺焉臣等謹按册立皇太子册封皇子皇太子納妃皇子婚諸儀注馬端臨通考列皇太子皇子門五朝續通考則仍王圻本移入王禮考今從之公主崇德元年定中宫所生女封固倫公主妃所生女封和碩公主中宫撫宗室女下嫁亦封和碩公主會典同輩者封長公主長一輩者封大長公主順治十七年定郡主縣主郡君縣君鄉君等封號顯祖宣皇帝女一宣皇后生甲申年正月下嫁額駙伊爾根覺羅氏噶哈善哈思太祖高皇帝女八皇長女固倫公主元妃佟佳氏生戊子年下嫁額駙棟鄂氏都統公和和禮皇二女和碩公主側妃伊爾根覺羅氏生下嫁額駙郭囉羅氏都統達爾漢皇三女無考皇四女庶妃嘉穆瑚覺羅氏生戊申年九月下嫁額駙烏拉納喇氏貝勒布占泰皇五女庶妃嘉穆瑚覺羅氏生戊申年下嫁額駙鈕祜祿氏黨竒皇六女庶妃嘉穆瑚覺羅氏生癸丑年下嫁額駙納喇氏尚書蘇鼐皇七女鄉君品級庶妃伊爾根覺羅氏生天命四年十一月下嫁額駙納喇氏騎都尉鄂托伊皇八女和碩公主側妃葉赫納喇氏生天命十年正月下嫁額駙博爾濟吉特氏台吉固爾布錫臣等謹按馬端臨通考五朝續通考凡皇女之未封暨封號未及公主者並詳載今從之和碩莊親王舒爾哈齊第四女福晉瓜爾佳氏生天命年間撫養宫中封和碩公主天命二年二月下嫁額駙博爾濟吉特氏台吉恩格德里多羅克勤郡王嶽託第一女福晉納喇氏生天命年間撫養宫中封和碩公主天聰二年正月下嫁額駙科爾沁博爾濟吉特氏和碩達爾漢巴圖魯親王滿珠錫禮多羅恪僖貝勒圖倫第二女夫人完顔氏生天命年間撫養宫中封和碩公主天命十一年五月下嫁額駙科爾沁博爾濟吉特氏土謝圖汗奧巴太宗文皇帝女十四皇長女固倫公主繼妃烏拉納喇氏生天聰七年正月下嫁額駙博爾濟吉特氏台吉旺第皇二女固倫溫莊長公主孝端文皇后生天聰十年正月下嫁額駙博爾濟吉特氏和碩親王額爾克孔果洛額哲皇三女固倫靖端長公主孝端文皇后生崇德四年正月下嫁額駙科爾沁博爾濟吉特氏郡王竒塔特皇四女固倫雍穆長公主孝莊文皇后生崇德六年正月下嫁額駙科爾沁博爾濟吉特氏親王弼爾塔哈爾皇五女固倫淑惠大長公主孝莊文皇后生順治七年下嫁額駙巴林博爾濟吉特氏郡王色布騰皇六女晉封固倫公主側妃扎嚕特博爾濟吉特氏生順治元年十二月下嫁額駙伊爾根覺羅氏誇扎皇七女固倫公主孝莊文皇后生順治二年正月下嫁額駙博爾濟吉特氏鏗吉爾格皇八女固倫永安長公主孝端文皇后生順治二年四月下嫁額駙科爾沁博爾濟吉特氏和碩土謝圖親王巴雅思祜郎皇九女封無考側妃扎嚕特博爾濟吉特氏生順治五年九月下嫁額駙博爾濟吉特氏哈尚皇十女縣君庶妃納喇氏生順治八年八月下嫁額駙瓜爾佳氏公輝塞皇十一女固倫公主懿靜大貴妃阿魯阿巴海博爾濟吉特氏生順治四年十二月下嫁額駙博爾濟吉特氏噶爾瑪索諾木皇十二女鄉君品級庶妃氏未詳生順治八年八月下嫁額駙博爾濟吉特氏頭等侍衛班第皇十三女封無考庶妃納喇氏生順治九年二月下嫁額駙瓜爾佳氏副都統拉哈皇十四女和碩純恪長公主庶妃察哈爾竒禮氏生順治八年八月下嫁額駙吳應熊世祖章皇帝女六皇長女庶妃陳氏生早薨皇二女和碩恭慤長公主庶妃楊氏生康熙六年二月下嫁額駙瓜爾佳氏訥爾杜皇三女庶妃巴氏生早薨皇四女庶妃烏蘇氏生早薨皇五女庶妃巴氏生早薨皇六女庶妃納喇氏生早薨和碩承澤裕親王碩塞第二女福晉納喇氏生順治年間撫養宫中封和碩和順公主順治十七年六月下嫁額駙尚之隆和碩簡純親王濟度第三女福晉科爾沁博爾濟吉特氏生順治年間撫養宫中封和碩公主康熙九年九月下嫁額駙科爾沁博爾濟吉特氏和碩達爾漢親王班第雍正元年三月封固倫端敏公主多羅安郡王嶽樂第二女繼福晉納喇氏生順治年間撫養宫中封和碩柔嘉公主康熙二年十一月下嫁額駙耿聚忠聖祖仁皇帝女二十皇長女庶妃張氏生早薨皇二女端嬪於氏生早薨皇三女固倫榮憲公主榮妃馬佳氏生康熙三十五年五月下嫁額駙巴林郡王烏爾滚皇四女庶妃張氏生早薨皇五女和碩端靖公主貴人兆佳氏生康熙三十一年八月下嫁額駙噶爾臧皇六女固倫恪靖公主貴人郭囉羅氏生封和碩恪靖公主康熙三十六年十一月下嫁額駙喀爾喀親王敦多布多爾濟雍正元年二月封固倫恪靖公主皇七女孝恭仁皇后生早薨皇八女孝懿仁皇后生早薨皇九女固倫溫憲公主孝恭仁皇后生康熙三十九年九月下嫁額駙佟佳氏舜阿顔雍正元年三月追封皇十女固倫純慤公主通嬪納喇氏生康熙四十五年九月下嫁額駙喀爾喀和碩超勇親王策凌雍正十年十二月追封皇十一女溫僖貴妃鈕祜祿氏生早薨皇十二女孝恭仁皇后生早薨皇十三女和碩溫恪公主敬敏皇貴妃章佳氏生康熙四十五年七月下嫁額駙翁牛特多羅杜稜郡王倉金皇十四女和碩慤靖公主貴人袁氏生康熙四十五年五月下嫁額駙散秩大臣孫承運皇十五女和碩敦恪公主敬敏皇貴妃章佳氏生康熙四十七年十二月下嫁額駙科爾沁多爾濟皇十六女庶妃王氏生早薨皇十七女庶妃劉氏生早薨皇十八女溫惠皇貴妃瓜爾佳氏生早薨皇十九女襄嬪高氏生早薨皇二十女庶妃鈕祜祿氏生早薨和碩恭親王常寧第一女庶福晉晉氏生康熙年間撫養宫中封和碩純禧公主康熙二十九年二月下嫁額駙科爾沁頭等台吉班第雍正元年二月封固倫公主世宗憲皇帝女四皇長女懋嬪宋氏生早薨皇二女和碩懷恪公主齊妃李氏生康熙五十一年九月下嫁額駙納喇氏星德雍正元年三月追封皇三女懋嬪宋氏生早薨皇四女敦肅皇貴妃年氏生早薨和碩理密親王允礽第六女側福晉唐氏生雍正年間撫養宫中封和碩淑慎公主雍正四年十二月下嫁額駙科爾沁博爾濟吉特氏貝子觀音保和碩怡賢親王允祥第四女福晉兆佳氏生雍正年間撫養宫中封和碩和惠公主雍正七年十二月下嫁額駙喀爾喀博爾濟吉特氏世子多爾濟色布騰和碩莊恪親王允祿第一女福晉郭囉羅氏生雍正年間撫養宫中八年十二月下嫁額駙科爾沁博爾濟吉特氏郡王齊默特多爾濟九年四月封和碩端柔公主今上皇帝女皇長女孝賢皇后生早薨皇二女哲憫皇貴妃富察氏生早薨皇三女固倫和敬公主孝賢皇后生乾隆十一年三月下嫁額駙科爾沁和碩親王色布騰巴勒珠爾皇四女和碩和嘉公主純惠皇貴妃蘇氏生乾隆二十五年三月下嫁額駙富察氏尚書公福隆安皇五女皇后納喇氏生早薨皇六女欣貴妃戴佳氏生早薨皇七女固倫和靜公主令懿皇貴妃魏氏生乾隆三十五年七月下嫁額駙喀爾喀親王拉旺多爾濟皇八女欣貴妃戴佳氏生早薨皇九女和碩和恪公主令懿皇貴妃魏氏生乾隆三十七年八月下嫁額駙烏雅氏武毅謀勇公扎蘭泰皇十女晉封固倫公主惇妃汪氏生指婚大學士和珅之子豐紳殷德為額駙和碩和親王𢎞晝第一女福晉烏扎庫氏生撫養宫中封和碩和婉公主乾隆十五年十二月下嫁額駙巴林輔國公德勒克臣等謹按凡册封下嫁諸儀注馬端臨通考列公主門五朝續通考則仍王圻本移入王禮考今從之皇朝文獻通考卷二百四十二
