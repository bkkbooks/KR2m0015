二十名以上加二級三十名以上加三級四十名以上加四級五十名以上不論俸滿即升百名以上越升一級即用拏獲販馬之人將所獲之馬盡行賞給十八年定凡往各省販馬者令於該旗呈明地方並馬數印文咨兵部給印票經過地方官驗票放行若擾害百姓者將伊主一併嚴加治罪十九年定不領印票販馬者旗人枷兩月鞭一百民人責四十板流三千里馬入官二十五年覆准販買馬匹因用兵起見今各處俱已平定撤兵嗣後馬販子往各省販馬永行禁止二十九年又定民人養馬毋庸察禁三十一年奉上諭一應馬匹永行禁止宰殺貨賣交與步軍統領及五城司坊官察拏又題准偷八旗馬者分别匹數治罪牧馬人自盜賣者照偷馬賊論罪屯庒居住旗人賣馬者令上稅准賣民人既准養馬彼此買賣不禁或驛買或兵買報地方官上稅准買賣不上稅者例處又覆准八旗官兵屯莊之馬被偷失主即行報該營汛領兵追緝到交界地方交與鄰近營汛接遞追緝獲賊官每案紀録一次兵於賊名下每匹追銀一兩給賞若失主報該營汛不即領兵追緝鄰境不即接遞追緝者官每案降一級罰俸一年兵責二十板又覆准向來各省買馬先在部領票經過地方官驗票放行若有奸匪將私馬附入票內難於稽察嗣後各省將軍督撫提鎮等買馬先行報部本部暫停給票聽其往各口及京城照數買到由部印烙然後給票注明馬數並所往各省路徑令經過地方官驗放若無印烙及比票內數多者察拿治罪如不察拿文官交吏部議處専汛官罰俸一年又議准京城內外旗民收獲逸失馬駝者即日報該管官送部由部交館所監督餧養有認領者開明逸失日月由毛色口齒係旗人取具佐領印結係民人取具地方官印結由部察對相符准其認領如過一月無人認領交館所監督變價解户部三十二年定買賣馬匹止令買馬人上稅地方官計價收納至於州縣買補驛馬兵丁買補營馬雖屬公用恐有影射亦令照例收稅嵗終入奏銷冊報部察核三十五年定直省購買營驛馬除赴各口及京城由部印烙給票外若赴鄰省該督撫提鎮預移㑹赴買之地方官照例收稅印烙給票以憑沿途稽察三十九年定偷盜之馬經過地方官辨無從知之免其察恭四十二年奏准八旗官兵因公事領騎官馬嗣後該處將官兵及佐領并應領馬數造冊送部由部立印單注明給馬旗分領馬時該處具印領交該管官赴部親投由部察對相符給印單照數領騎回京時將馬交還原給旗分如有未交還者該旗將領馬官兵及佐領開明咨部由部行文該處限兩月交還若倒斃遺失逾兩月限尚未賠補由部參奏官罰俸一年兵鞭八十不追催之都統等及該管各官罰俸六月領催鞭五十仍著本人賠補倘再逾兩月仍不賠補將倒斃遺失之人官降三級留任完日開復兵鞭一百都統及該管各官罰俸一年領催鞭八十仍著本人賠補其因公事領用官駝者照此例行又定八旗官兵因公領馬該佐領别作記號印烙於回京交還時驗收若將好馬留用詐稱倒斃遺失賠補後其原馬認出照偷馬例治罪五十三年定各省販馬人暗結將軍督撫提鎮親屬將疲瘦不堪用之馬索取髙價不肖文武官代為壓勒甚至無驛站之州縣管步兵之頭領亦行勒索令將軍督撫提鎮嚴禁若有此等情弊即指參從重議處雍正八年議准騸馬為營驛所必需除八旗人等及漢文武見任候選候補官文武進士舉人生員武童准其畜養外其餘民人畜養騸馬各令變賣近京二百里以內由户部照時價收買撥與八旗畜養二百里以外各省由州縣官收買以偹營驛闕額均不許假察禁名留難扣尅致纍民人九年奉上諭頃聞不許牧養騸馬民間有不便之處著不必禁止仍照舊畜養該部即通行曉諭並行文各省知之十年定八旗馬駝有私賣與人者官革職兵鞭一百革退該管官不能察出罰俸六月該管都統等罰俸三月十三年定八旗馬駝出場牧放其佐領下留京之馬原備緊要差遣必待本部印文方准撥發若以私事騎載者罰俸九月乾隆六年定大小官辨將自畜馬勒營伍收買多取價直若經營驛詳揭該督撫提鎮不題參者照徇庇例議處詳揭之官以應升即用督撫提鎮失察者罰俸一年十二年奏准盛京地方嚴禁朝鮮收買大馬今朝鮮國人來京往往私買大馬帶回應令左右兩翼嚴禁並令山海關等口察拏若通事人等圖利代為購買察出一并治罪十四年奏准京城八旗所需馬全在兩翼購買關口官辨遇商販人等持有兩翼印票者立即放行毋得禁止皇朝文獻通考卷一百九十三
