例又定營馬倒斃如符年限者准用朋扣銀買補若年限不符除照例賠樁外亦准用朋扣銀買補其價直𨽻每匹九兩山東十兩山西八兩河南八兩五錢江南十三兩九錢七分江西十六兩八錢二分四釐福建二十二兩浙江十六兩湖北湖南十五兩西安八兩廣東二十一兩九錢廣西二十兩雲南二十一兩八錢貴州二十兩二錢二分有奇甘肅四川除以貢馬抵補外其不敷之馬甘肅每匹給價八兩四川每匹給價十二兩七年定各省朋樁銀兩嵗底兵部查核應扣銀兩咨户部撥餉如有營馬闕額開送户部購買十一年定官兵不扣朋銀者該管官罰俸一年提督罰俸六月無提督之省總兵官罰俸六月又定將軍督撫提鎮標下各官請買例馬者不得過四百匹二十四年定山西河南湖北湖南西安四川等省營馬闕額開數報部移咨甘肅巡撫將招中茶馬撥給毋庸動支朋扣銀臣等謹按招中茶馬舊於甘肅設洮岷河州西寧莊浪甘州五茶馬司及開城安定廣寧黑水清平萬安武安七監嵗遣御史一人經理蓋沿明制之舊也明時設御史一人專理馬政茶法二事康熙七年始歸甘肅巡撫兼理然尚行招中茶馬之法至四十四年乃並停之三十七年定四川營馬倒斃停其牽領茶馬准用朋扣銀買補四十年定四川買補營馬照四川土司進貢例每匹價銀十二兩四十四年定湖北湖南營馬倒斃亦停其牽領茶馬准用朋扣銀買補每匹十五兩又定山西河南西安仍准支朋扣銀四十五年定直省營馬倒斃遞年加增必致朋扣不敷買補嗣後如倒斃過多實有冒銷情弊該督撫提鎮即行題𠫭四十七年定營馬倒斃該管官驗明耳尾將日期出結詳報督撫提鎮一面用朋扣銀買補仍將新馬價直毛齒領騎兵姓名按季册報仍於年終奏銷由部察核六十年定川省新設滿兵駐劄差使甚繁馬匹應准其買補倒斃十分之內不許過三分其價亦照茶馬例每匹給銀八兩雍正元年定江南江西福建浙江湖北湖南四川雲南貴州等省營馬騎過三年倒斃者免其賠樁廣東廣西二省减半賠樁騎過三年倒斃者亦免其賠樁直𨽻山東山西河南西安甘肅等省騎過五年倒斃者免其賠樁均准動支朋扣銀買補七年定山西河南西安甘肅四省營馬開報倒斃不得過十分之三十一年定直𨽻山西河南西安甘肅馬價在十兩之內山東亦僅十兩均未便以十兩賠樁應以七兩為額如騎一年倒斃賠樁七兩二年倒斃賠樁六兩以下按年遞减若騎過年限免其賠樁准動支朋扣銀買補又定福建營馬五千七百七十一匹每年准開報倒斃九百三十五匹十二年定營馬除口外差遣及在軍前倒斃者皮臟免其變價外江南督標每匹變價一兩五錢提標一兩安徽撫標一兩二錢蘇松撫標九錢二分有竒湖北湖南一兩其餘直省均五錢發給馬價時將皮臟變價扣除於奏銷冊造報察核又定四川營馬照驛馬例給價八兩又定廣東營馬五千二百六十六匹每年准開報倒斃九百二十一匹又定直𨽻山東江南江西浙江湖北湖南四川雲南貴州開報營馬倒斃數無一定嗣後均不得過十分之三又定四川營馬既將原價减去四兩照驛馬給以八兩所有賠樁銀應照直𨽻等省例以七兩為額按年遞减乾隆元年議准武職官給親丁糧以養亷內有馬糧者若令備馬則養亷不沾實惠遇草料昻貴且多賠墊反致拮据嗣後親丁馬毋庸實備止支領草料以備用度之不足但此馬原係營中額數一旦調遣難免闕乏應令照本身應得親丁馬若干匹備價存營俟需用時購買二年議准親丁馬既備價存營嗣後倒斃止將兵丁現有之馬按額開銷如以存價溷入揑報者降一級調用若存價已給買馬准其照例報銷九年議准外委千把總領馬即供騎操原未令其存價如遇倒斃入營馬數內開報動支朋扣銀買補十五年定廣東馬價每匹减三兩以十八兩九錢作定價報銷廣西馬價每匹减三兩以十七兩報銷是年奏銷營馬直𨽻九千六百六十八匹山東三千三百七十七匹山西五千二百五十五匹河南二千一百一匹江南五千六百三十八匹江西一千三百八十九匹福建四千九百八十三匹浙江三千六百三十四匹湖廣四千四百三十八匹陜西四萬五千二百九十八匹四川五千五百九十九匹廣東五千二百六十七匹廣西一千五百十一匹雲南五千六百二十五匹貴州三千八百十一匹十六年奉上諭滇省各營騎操馬匹定例三年外准報倒十分之三其額外濫倒馬從前該督提等皆於朋扣等項內通融買補並未著賠嗣據該督察出奏聞仍請從寬免其賠樁經軍機大臣等議令照例按數賠補但念邊方水土餧養馬匹與他處情形不同自來通融籌辦今若復令賠樁兵丁未免拮据嗣後滇省馬匹除額定十分倒三按例分别年限著賠外其溢額倒斃馬匹著加恩免賠若兵辨等因有此㫖或致餧養失宜溢倒過多者該督撫等嚴行參處二十年議准營馬價除直𨽻山東山西河南江蘇安徽江西西安甘肅四川等省或僅在十兩以內或據該督撫察核實無溢冒毋庸議减福建酌减三兩准以十九兩浙江减二兩准以十四兩湖北湖南减一兩准以十四兩廣東再减九錢准以十八兩廣西再减一兩准以十六兩雲南减三兩八錢准以十八兩貴州减二兩二錢准以十八兩報銷三十一年兵部核存巡捕三營及直省駐防馬緑旗營經制馬數目巡捕三營經制馬一千四百四十匹直𨽻保定駐防馬二百五十匹實拴滄州駐防馬一百五十匹實拴熱河駐防馬九百二十二匹實拴圍場總管處駐防馬五百二十四匹實拴青州駐防馬四千三百五十九匹內存價二千一百七十一匹實拴二千一百八十八匹德州駐防馬二百五十匹實拴綏逺城駐防馬三千六百一十四匹內官兵共存價一千四十一匹官兵共實拴一千七百八十九匹兵拴駝三百九