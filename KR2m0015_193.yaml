body:
  text: 欽定四庫全書皇朝文獻通考卷一百九十三兵考十五馬政臣等謹按周禮夏官自校人至圉人凡辨馬頒馬阜馬養馬諸制靡不備舉誠以軍政之莫重於馬也顧馬政之得失首視乎牧場唐宋及明或用官牧或用民牧及其究也坊地日削軍民困於孶養於是嵗費不支而流弊遂不可問我朝考牧之政為從古所未有自太宗文皇帝既平察哈爾謂地宜畜牧遂分置各牧場逮定鼎以來又增設總管各官為之經理其掌于太僕寺者則有左翼四旗右翼四旗牧厰其掌於上駟院者則有大凌河及張家口獨石口外諸處牧厰草肥土衍雲錦成羣嵗之蕃衍孶息者以千萬計而內地初無養馬之煩至于諸蕃慕化嵗獻驪黃逺至東西哈薩克諸部入貢天間儼同內廏尚不在常數之內猗歟盛哉視騋牝駉牡歌風獻頌已逺過之彼蒲梢天馬之侈陳更無論矣若夫八旗營馬與各省營馬之政又皆以時損益定立科條馬政之善洵蔑以加已至馬端臨于馬政中附載祭馬祖禮蓋祀天駟房星之神由來已舊前纂五朝續考亦仍其舊題敬稽欽定大清㑹典有禱馬一門即周官甸祝之長所謂為馬禱無疾者也故亦附見焉太僕寺馬政太僕寺卿滿漢各一人少卿滿漢各一人掌兩翼牧場之政均齊賞罰左司員外郎滿洲蒙古各一人主事滿洲䝉古各一人掌䭾載幔城網城之駝隻以備巡幸右司員外郎滿洲䝉古各一人主事滿洲䝉古各一人掌察驗牧場馬匹盈虧以時印烙主簿滿洲一人掌章奏文移筆帖式滿洲䝉古各八人掌翻譯順治元年設太僕寺掌兩翼牧場之政以直𨽻山東河南江南額徴馬價銀六十餘萬兩解太僕寺貯庫嵗終核銷是年十二月裁太僕寺以馬價折徴銀兩歸併户部九年復設太僕寺衙門乾隆六年分設太僕寺左右二司牧場太僕寺左翼四旗牧埸在張家口外東北一百四十里哈喇尼墩井東西百五十里南北百三十里太僕寺右翼四旗牧場在張家口外西北三百十里齊齊爾漢河東西百五十里南北三十二里國初設太僕寺兩翼牧場於張家口外乾隆八年議准兩翼馬埸原各有一定處所恐日後溷淆立界以垂久逺左翼四旗東以布濩衣布拉克為界西以察罕齊老臺為界南以都什山為界北以虎什呼蘭臺山巴顔托羅垓為界右翼四旗東以庫努克拉羅垓努赫圖溝為界西以朱魯臺赫赫爾老為界南以克衣格達瓦都得衣哈喇為界北以布爾噶蘇臺河南岸為界各該翼騍馬騸馬游牧其中彼此不得侵越並不許私自墾種司牧官役統轄兩翼牧埸總管一人兩翼牧場總管二人副管一人防禦二人翼領四人驍騎校三人護軍校八人協領十人護軍三百十四名馬羣百九十二每羣牧長牧副各一人牝馬羣百六十每羣牧丁八名牡馬羣三十二每羣牧丁十四名國初定口外兩翼騍馬羣每羣設牧長一人牧副一人牧丁十名騸馬羣每羣設牧長一人牧副一人牧丁十二名均于䝉古內按各該旗選補牧長等所需鞍轡每人各一副秣馬所需木槽鍁鐝鑹杓等每羣各二件均五年一次咨工部給發兵部撥車運送到場若增設馬羣牧丁每羣各二名康熙三十三年增騸馬羣牧丁每羣各二名四十四年設左右兩翼總管各一人三年更代届均齊時太僕寺堂官往口外察驗該員經管之馬分别孶生及倒斃多寡交部議叙議處又兩翼各設騍馬羣翼領一人騸馬羣翼領一人四十五年定兩翼馬場牧長牧副牧丁月給銀一兩三年連閏共三十七兩一次總給雍正元年議准牧長牧副牧丁月銀停總給每年春秋二季由寺咨户部照數支領又增設兩翼副管共一人兩翼防禦共一人驍騎校共三人護軍校共八人護軍共三百十四名每翼各以護軍五十名專司捕盜其餘入於牧長等內當差凡牧長有年久勤慎者選授為協領每翼騍馬羣協領四人騸馬羣協領一人兩翼共十人又定兩翼總管副管防禦翼領協領俱賞給半俸世爵銜大者食大銜俸護軍月給銀二兩並牧長等月給銀由總管造册送寺覆核咨户部給發八年裁騍馬羣牧丁每羣各二名十年定馬場官員照八旗察哈爾之例賞給全俸乾隆十三年定兩翼馬場照上駟院馬埸有副都統職銜總管一人統轄之例增設太僕寺馬場兩翼統轄總管共一人十五年定兩翼總管令其在騍馬騸馬羣適中之地居住騍馬騸馬兩羣翼領令其各在所管馬羣適中之地居住協領于該旗適中之地居住各就近約束加意牧放兩翼副管及防禦驍騎校護軍校各於本翼本旗不時巡察遇牧丁人等偷馬私賣及私與人騎者立即拿報由總管核明將能察拿多者報部官給紀録護軍記名俟有應升官先補若漫不巡察被别處拿報者官罰俸三月護軍鞭四十牧羣康熙初定兩翼牧場統計見有之馬均勻分酌定為騍馬四十羣騸馬八羣二十三年增騍馬二十四羣嗣後以次遞增隨時添設羣數乾隆五年奏准兩翼馬場騍馬一百五十二羣騸馬十六羣向來在場馬羣足在四萬匹外將孶生者奏明從前因軍營用八旗官馬即將孳生多餘撥補今八旗官馬足額又無别用見在兩翼除四萬匹外孶生多餘七千二百二十四匹騍馬一千五百二匹分八羣統計騍馬一百六十羣騸馬五千七百三十二匹分十六羣統計騸馬三十二羣兩翼均分各在該管場內牧放牧騍嵗春季本寺滿堂官一人往口外將馬駒驗騸秋季往口外撥騸過三嵗之駒入羣三年均齊一次届期奏請欽㸃前往至員外郎嵗春季往口外稽察孶生倒斃各數並訓練馬駒逐一印烙秋季往口外驗視肥瘠並訓練馬駒有未印烙及印烙糢糊者補印烙順治年間定騍馬羣每三年均齊時比原額孶生多者有賞少缺及額者有罰騸馬羣均齊時倒斃少者有賞倒斃多者有罰其馬駒內得調習馴良者進御廄備用又定馬場賞罰于題奏奉㫖後委司官筆帖式㑹同該總管頒給懲治應罰之馬照數追交入羣康熙十七年定太僕寺官員不許擅騎羣內之馬又定騸馬羣訓練不熟不堪騎用在一分以上者該管官罰俸三月在二分以上者罰俸六月在三分以上者罰俸九月在四分以上者罰俸一年在五分以上者降一級留任在六分以上者降二級留任在七分以上者降三級調用至牧長牧副牧丁等訓練不熟不堪騎用在五匹以上至二十匹者牧長鞭一百牧副牧丁鞭八十在二十匹以上者牧長鞭一百降為牧丁牧副牧丁鞭一百若訓練純熟皆堪騎用者牧長賞豹皮端罩一件毛青布十匹牧副牧丁各賞毛青布十匹四十一年定騍馬羣三年之內每三年應孳生一匹于應孳生額外多孶生一百六十匹以上者賞牧長毛青布六十匹牧副四十匹多八十匹以上者賞牧長毛青布四十匹牧副二十匹多一匹以上八十匹以下者賞牧長毛青布二十匹牧副十匹於應孶生額內缺五十匹以下者牧長牧副牧丁各鞭四十牧長仍罰牲畜一五缺百四十下者牧長牧副牧丁各鞭五十牧長仍罰牲畜一七缺百匹以上者牧長牧副牧丁各鞭六十牧長仍罰牧畜一九若于原均齊時所給數內闕少者將牧長牧副牧丁各鞭八十牧長仍罰牲畜二九至該管翼領統計所管馬羣如七羣八羣得賞者賞翼領緣領羊皮縀袍一件毛青布二十匹九羣十羣得賞者賞狼皮或狐皮端罩一件毛青布二十匹十一羣十二羣以上得賞者賞狼皮或狐皮端罩一件緣領羊皮緞袍一件毛青布二十匹如七羣八羣受罰者翼領罰牲畜一九九羣十羣受罰者罰牲畜二九十一羣十二羣以上受罰者罰牲畜三九若所管馬羣賞罰各半者翼領無賞無罰雍正元年定協領所管之馬如十二羣至十四羣得賞者賞毛青布十匹十五羣以上得賞者賞毛青布二十匹十羣至十四羣受罰者鞭五十十五羣以上受罰者鞭六十三年定總管所管馬羣除騸馬羣並兼入騸馬羣騍馬羣之小馬䮘馬馬駒外孶生以五百匹為一分闕少原額以二百為一分孶生一二分者存案三分者加一級三分以上者按其分數存案加級闕少不及一分者免議闕少一分者罰俸六月二分者罰俸一年三分者降一級留任四分以上者革職又定馬場蒙古有犯罪應罰馬者改為罰牛又議准兩翼騸馬騍馬以一百六十八羣為定額騸馬十六羣不過五千匹騍馬一百五十二羣不過三萬五千匹共以四萬為止四萬之外多餘者奏明請㫖四年定每年由寺稽察馬場照例具奏仍交兵部詳覆核奏五年定協領所管十八羣內十二羣以上得賞者賞毛青布十匹若皆得賞者賞毛青布二十匹有因馬羣受罰應鞭五十六十者均停其鞭責罰牲畜一七八年定騸馬羣將原交之數作為十分一年內止倒斃一分者仍准賞給牧長賞毛青布二十匹牧副十匹倒斃二分者無賞無罰倒斃三分者牧長罰馬一五入于馬羣牧副鞭四十若倒斃過多牧長牧副牧丁各鞭一百牧長降為牧丁仍罰馬三九入于馬羣十三年定統轄總管統計兩翼之馬孶生以千匹為一分闕少原額以四百匹為一分其多孶生及闕少者賞罰如三年所定例乾隆十五年定場內馬駝有病者該管協領加意調治若係齒老殘傷倒斃者驗明印烙剝取其皮注冊十日內報翼領翼領報總管總管報統轄總管于夏冬二季造册報寺察核上駟院馬政兼管上駟院事大臣無定員由簡特上駟院卿二人掌在京內廄外廄及邊外各牧埸之政左司郎中一人侍衛員外郎各二人主事一人掌均齊賞罰右司侍衛員外郎各二人主事一人掌各馬廄馬場之俸餉芻菽又主事二人掌章奏文移筆帖式二十五人掌翻譯又侍衛二十一人掌侍直內以八人兼試御馬司鞍長二人司鞍八人司轡二十人又皇子每位司鞍二人司轡八人順治初年設御馬監掌各廄之政令十八年改御馬監為阿敦衙門以大臣侍衛管理均無定員康熙十六年改阿敦衙門為上駟院以管理大臣掌之三十三年分設上駟院左右二司乾隆十四年定上駟院卿二人由侍衛內務府官各簡授仍以大臣兼管院事內廄外廄內廄設於皇城凡御馬及副馬仗馬各一廄川馬一廄公馬五廄駕車馬騾二廄其應差馬附各廄外廄設於南苑御馬及內馬共六廄又安河公馬一廄其應差馬附各廄內外廄司牧官役京師各廄均設廄長一人廄副二人廄丁二十名其草夫御馬廄三十六名副馬廄二十八名仗馬廄三十名川馬廄十四名公馬五廄各四十四名駕車馬騾二廄各三十二名南苑六廄各二十八名安河公馬廄二十四名各草夫內共設百總六人外郎十六人駕車馬騾二廄各設驍騎四十名設醫長䝉古二人醫師䝉古十八人癩醫六人獸醫漢十六人主治馬駝之疾由院行所司支取藥物嵗終㑹計于次年二月奏銷雍正元年裁川馬廄廄長廄副各一人廄丁十名以駝廄廄長兼管乾隆十七年定京師各廄牧羣共設牧長副牧長各十一人牧副二十二人牧丁二百二十名今牧羣既裁减止留牧長副牧長各五人牧副十人牧丁百名充本院備馬等差餘仍食原餉撥奉宸苑充役十八年改駝廄為公馬廄其川馬廄即以公馬廄長兼管內外廄牧羣康熙年間定紫禁城內設御馬及走馬各一廄俱隨時增減無定額御馬廄附應差公馬五匹設仗馬一廄三十匹附應差公馬十匹東安門內設公馬四廄各二百匹設駕車馬一廄七十匹騾三十匹西安門內設川馬一廄無定額駝一廄百匹附應差公馬十五匹南苑御馬及內馬備充及御馬之選皇子乘騎共六廄無定額每廄附巡羣馬三十匹設甕山公馬一廄二百四十匹雍正元年定每廄公馬二百四十匹乾隆二年定紫禁城內走馬一廄改為皇子乘馬五年改內管領所管駕車騾歸院管理設廄于西安門內馬三十匹騾七十匹十一年定南苑六廄內設挏馬一羣騰馬十牝馬八十以備取湩之用十六