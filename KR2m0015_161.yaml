body:
  text: 欽定四庫全書皇朝文獻通考卷一百六十一樂考七樂器一臣等謹按聲音之道由器數以宣器數不凖於律而欲收依永和聲之雅難矣我朝禮明樂備集千古之大成苐郊壇廟祀朝會燕享諸樂器典于伶官藏于內府其見于禮器圖及西清寶鑑等書者又非人間所能窺見易致訛舛今謹詳列其制以補前考所未備庶使審音察理者參稽考索知所辨證云金之屬鎛鐘律吕正義後編曰按周禮春官鎛師注鎛如鐘而大樂器圖鎛鐘十二各應律吕之音凡合樂以某律為宫則擊本律之鐘以宣之孟子所謂金聲是也漢志古之神瞽度律均鐘以律計倍半以為鐘口之徑及上下之數而十二律備焉乾隆己卯冬于西江得古鎛鐘當西師奏凱之時功成樂作式彰瑞應上既為釐定其名正訛辨異復詔樂部稽考仿鑄用備特懸御製銘詞昭示無極昔我聖祖仁皇帝審定元音得古尺九寸為今尺七寸二分九釐以為黃鍾之長而八音制度悉協中和今遵用七寸二分九釐之數參考本律倍半之法鑄就鎛鐘于十二律吕之音自相應合蓋酌古凖今允為宫懸雅樂之定制焉鎛鐘第一圜聲應黃鍾之律兩欒髙一尺八寸二分二釐中髙一尺六寸二分兩銑相距一尺五寸一分八釐橫距一尺一寸三分九釐兩舞相距一尺一寸九分六釐橫距一尺零三分六釐甬長一尺零八分甬上衡徑三寸八分甬下徑四寸三分二釐旋徑四寸八分濶一寸四分四釐蟲長三寸零三釐濶一寸八分二釐厚一寸二分一釐蟲孔長一寸五分一釐濶一寸零一釐乳凡三十六髙一尺四分四釐鐫識處髙九寸一分一釐上濶三寸零三釐下濶四寸零五釐御製銘曰自古在昔功成作樂辨物涓吉鑄此鐘鎛皇祖正音中和大備詎獨自遺或存深意績底西旅瑞出西江考制象器協和萬邦一虡特懸用起律首編鐘繼奏簫韶成九寬橫欒舞必考必精慎遵前憲敢或損增宣陽導隂立均出度萬事本根百王矩矱繄余小子蒙業重熙賴天耆定惟曰際時範器識年悉新已盛銘無溢辭惕乾懋敬鎛鐘第一黃鍾大清乾隆二十有六年嵗在辛巳冬十一月乙未朔越六日庚子鑄成鎛鐘第二圜聲應大吕之律兩欒髙一尺七寸零六釐中髙一尺五寸一分七釐兩銑相距一尺四寸二分二釐橫距一尺零六分六釐兩舞相距一尺二寸一分三釐橫距九寸七分甬長一尺零一分一釐甬上衡徑二寸六分六釐甬下徑四寸零四釐旋徑四寸四分九釐濶一寸三分四釐蟲長二寸八分四釐濶一寸七分厚一寸一分四釐蟲孔長一寸四分二釐濶九分四釐乳凡三十六髙一寸三分四釐鐫識處髙八寸五分三釐上濶二寸八分四釐下濶三寸七分九釐御製銘同前鎛鐘第二大吕年月同前鎛鐘第三圜聲應太簇之律兩欒髙一尺六寸二分中髙一尺四寸四分兩銑相距一尺三寸五分橫距一尺零一分二釐兩舞相距一尺一寸五分二釐橫距九寸一分二釐甬長九寸六分甬上衡徑二寸五分三釐甬下徑三寸八分四釐旋徑四寸二分六釐濶一寸二分八釐蟲長二寸七分濶一寸二分六釐厚一寸零八釐蟲孔長一寸三分五釐濶九分乳凡三十六髙一寸二分八釐鐫識處髙八寸一分上濶二寸七分下濶三寸六分御製銘同前鎛鐘第三太蔟年月同前鎛鐘第四圜聲應夾鍾之律兩欒髙一尺五寸一分七釐中髙一尺四寸四分八釐兩銑相距一尺二寸六分四釐橫距九寸四分八釐兩舞相距一尺零七分八釐橫距八寸六分三釐甬長八寸九分八釐甬上衡徑二寸三分七釐甬下徑三寸五分九釐旋徑三寸九分九釐濶一寸一分九釐蟲長二寸五分二釐濶一寸五分一釐厚一寸零一釐蟲孔長一寸二分六釐濶八分四釐乳凡三十六髙一寸一分九釐鐫識處髙七寸五分八釐上濶二寸五分二釐下濶三寸三分七釐御製銘同前鎛鐘第四夾鍾年月同前鎛鐘第五圜聲應姑洗之律兩欒髙一尺四寸四分中髙一尺二寸八分兩銑相距一尺二寸橫距九寸兩舞相距一尺零二分四釐橫距八寸一分九釐甬長八寸五分三釐甬上衡徑二寸二分五釐甬下徑三寸四分一釐旋徑三寸七分九釐濶一寸一分三釐蟲長二寸四分濶一寸四分四釐厚九分六釐蟲孔長一寸二分濶八分乳凡三十六髙一寸一分三釐鐫識處髙七寸二分上濶二寸四分下濶三寸二分御製銘同前鎛鐘第五姑洗年月同前鎛鐘第六圜聲應仲吕之律兩欒髙一尺三寸四分八釐中髙一尺一寸九分八釐兩銑相距一尺一寸二分三釐橫距八寸四分一釐兩舞相距九寸五分八釐橫距七寸六分七釐甬長七寸九分九釐甬上衡徑二寸一分甬下徑三寸一分九釐旋徑三寸五分五釐濶一寸零六釐蟲長二寸二分四釐濶一寸三分四釐厚八分九釐蟲孔長一寸一分二釐濶七分四釐乳凡三十六髙一寸零六釐鐫識處髙六寸七分四釐上濶二寸二分四釐下濶二寸九分九釐御製銘同前鎛鐘第六仲吕年月同前鎛鐘第七圜聲應蕤賔之律兩欒髙一尺二寸八分中髙一尺一寸三分七釐兩銑相距一尺零六分六釐橫距七寸九分九釐兩舞相距九寸一分二釐橫距七寸二分八釐甬長七寸五分八釐甬上衡徑一寸九分九釐甬下徑三寸零三釐旋徑三寸三分七釐濶一寸零一釐蟲長二寸一分三釐濶一寸二分七釐厚八分五釐蟲孔長一寸零六釐濶七分一釐乳凡三十六髙一尺零一釐鐫識處髙六寸四分上濶二寸一分三釐下濶二寸八分四釐御製銘同前鎛鐘第七蕤賔年月同前鎛鐘第八圜聲應林鍾之律兩欒髙一尺二寸一分五釐中髙一尺零八分兩銑相距一尺零一分二釐橫距七寸五分九釐兩舞相距八寸六分四釐橫距六寸九分一釐甬長七寸二分甬上衡徑一寸八分九釐甬下徑二寸八分八釐旋徑三寸二分濶九分六釐蟲長二寸零二釐濶一寸二分一釐