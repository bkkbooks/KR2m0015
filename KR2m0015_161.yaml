內深一寸二分五釐八豪為南吕十分之三外用木匡鉦邊匡周俱平分三分各穿二孔以黃絨綆繫鉦于匡匡外二銅環以黃絨繫之挂于項歷代鹵簿皆有鉦而形制不詳通典則曰鉦如大銅疉懸而擊之通考則曰形圓如銅鑼明制鹵簿有金又有鉦我朝因之金即鑼鉦則如鑼而有邊然則今之鉦制自唐已然而今之金又即宋之鉦矣大抵金之與鉦名雖異而實則同今金鼓大樂金則提而擊之鉦則設而不擊豈金為宋鉦之遺制而鉦存唐之遺意歟金律吕正義後編曰金以銅為之面徑一尺四寸五分八釐為黃鍾倍度深二寸二分七釐五豪為夷則半度邊穿二孔以黃絨縧繫于木柄左手提而右手擊之大銅角律吕正義後編曰大銅角一名大號以銅為之上下二截形如竹筒本細末大通長三尺六寸七分二釐為八倍半南吕之度下截長一尺九寸四分四釐為四倍半南吕之度下口徑六寸四分八釐為一倍半南吕之度上口徑一寸四分四釐為南吕三之一上截長與下截等其出于下截上口之外者一尺七寸二分八釐為四倍南吕之度上口徑四分三釐二豪為南吕十之一嘴長一寸四分四釐為南吕三之一繫紅黃縧繐小銅角律吕正義後編曰小銅角一名二號以銅為之上截如筒下截如角通長四尺一寸零四釐為九倍半南吕之度下截長一尺九寸四分四釐為四倍半南吕之度下口徑四寸三分二釐為南吕之度上口徑五分一釐八豪為南吕五十分之六上截長二尺三寸七分六釐為五倍半南吕之度其出于下截上口之外者二尺一寸六分為五倍南吕之度上口徑二分一釐六豪為南吕二十分之一繫紅線縧繐大小銅角即長鳴中鳴之遺制或自唐以來名仍其舊而實易之以銅或自元以後始改用銅而因質名角皆不可知然以其聲考之今金鼓大樂陳設端門大銅角奏龍吟小銅角奏虎嘯用之導迎大銅角奏大罕波小銅角奏大得勝則猶是長鳴一曲三聲中鳴一曲三聲之義也用之行營大小銅角同奏拿馬號則猶是唐衛公李靖兵法遺義也蓋古今制不相襲而義實相因如此方響律吕正義後編曰方響十六枚以鋼為之長濶皆一例而厚薄有次第薄者聲濁厚者聲清應十二正律四倍律與編磬意同長皆七寸二分九釐為黃鍾之度濶皆一寸八分二釐二豪為黃鍾四分之一其厚為編磬之半近上三分之一背有橫脊其厚倍之十六枚共懸一架上下各八架髙四尺八寸濶二尺二寸繪五綵寶相花上橫梁中間貼金火焰珠兩端雕貼金龍頭繫五綵流蘇其下又二橫梁上下各實以板梁間鐵條四裹氊鞔黃緞以黃絨繩繫方響于上擊以小銅鎚黃線挽手雲鑼律吕正義後編曰雲鑼以銅為之十面共一木架下右為上字以笛之聲字言厚二釐五豪二絲應姑洗之律下中為尺字厚二釐八豪四絲應㽔賔之律下左為工字厚二釐九豪九絲應夷則之律上左為凡字厚三釐三豪六絲應無射之律中左為六字厚三釐七豪八絲應半黃鍾之律中中為五字厚四釐零四絲應半太蔟之律中右為髙乙字厚四釐四豪九絲應半姑洗之律上右為髙上字厚五釐零五絲應半蕤賔之律上中為髙尺字厚五釐六豪八絲應半夷則之律最上為髙工字厚五釐九豪八絲應半無射之律架髙二尺濶一尺五寸柄長五寸五分架上兩端雕貼金雙龍頭繫五綵流蘇雲鑼元史始見於宴樂我朝乃用於丹陛樂其器小其聲髙也起笛之上字猶笛管用角律也今以律分考定厥制以黃鍾大吕相和之半三寸五分二釐九豪為面之外徑以六倍黃鍾之籥二千五百八十二分八百零三釐二百六十豪為中空容積以無射八分之一五分零五豪六絲七忽九微為內深除之開平圓得二寸五分五釐零一絲為底之內徑六倍黃鍾之管聲應太簇之律為笛之乙字其倍無射之分乃應黃鍾之律為笛之四字故以六倍黃鍾積為體以倍無射十六分之一為深乃以無射百分之一四釐零四絲五忽為黃鍾鑼之厚加于內深得外深加于底內徑得底外徑以此定十鑼之外形皆同一制依編鐘三分損益之法求得一十四分為各鑼之厚黃鍾而下其厚遞減則其容積以漸而多黃鍾而上其厚遞加則其容積以漸而少故黃鍾以下七分得七正聲黃鍾以上七分得七清聲上下各截二聲七正聲從下截去四乙二聲七清聲從上截去凡六二聲餘五正聲五清聲於律則應四正律六半律聲數悉合金口角律吕正義後編曰金口角舊名瑣哪木管本小末大上下金口加蘆哨吹之木管上口內徑三分一釐三豪為一倍半黃鍾管之徑下口內徑三倍之長九寸八分九釐為本管倍南吕之度除上端吹口入管六分三釐餘九寸二分六釐為本管倍無射之度最下第一孔距吹口七寸四分一釐七豪為本管太蔟之度次口第二孔距吹口六寸一分七釐四豪為本管仲吕之度次上第三孔距吹口五寸三分八釐六豪為本管林鍾夷則相和之度次上第四孔距吹口四寸二分八釐三豪為本管應鍾半黃鍾相和之度次上第五孔距吹口三寸三分八釐五豪為本管半夾鍾半姑洗相和之度次上第六孔距吹口二寸四分七釐二豪為本管半南吕之度次上後出第七孔距吹口一寸九分五釐為本管四分大吕之一最上第八孔距吹口一寸四分六釐五豪為本管四分𬎼賔之一管端金口長二寸一分六釐為南吕半度管末金口長四寸八分六釐為林鍾之度口徑四寸三分二釐為南吕之度八孔皆閉為上字于笛為四字開下一孔為尺字于笛為乙字開下二孔為工字于笛為上字開下三孔為凡字于笛為尺字開下四孔為六字于笛為工字開下五孔為五字于笛為凡字開下六孔為乙字于笛為六字開下七孔為髙上字于笛為五字八孔全開為髙尺字于笛為髙乙字瑣哪有似于角又木管金口與金口角名義頗合按黃鍾一倍半同形管其全管黃鍾之分應簫之髙工字則其倍無射之分當應簫之髙乙字即笛之髙上字今通長應笛之低四字為下四音半除設哨加嘴下二音半頭管設哨下三音今不加嘴下三音加嘴止下二音半是加嘴能髙半音故設哨加嘴共下二音半以下皆倣此是因本小末大而掣下二音也末大于本二倍當下二音第一孔太簇之分應簫之髙尺字即笛之髙六字今應笛之低乙字為下五音半除二音半是掣下三音也管愈短則掣之分愈多第二孔仲吕之分應笛之上字掣下三音半也第三孔林鍾夷則相和之分應笛之尺字亦掣下三音半也第四孔應鍾半黃鍾相和之分應笛之工字是掣下四音半也第五孔半夾鍾半姑洗相和之分應笛之凡字掣下五音半也第六孔半南吕之分應笛之六字掣下七音半也第七孔四分大吕之一應笛之五字掣下八音半也第八孔四分林鍾之一應笛之乙字掣下十音半也皆與頭管掣音之理同又按金口角通長實應笛之四字今名為上字者蓋金口角為一倍半黃鍾之管通長本應簫之上字于笛為凡字若頭管加哨則復應笛之上字金口角本小末大又掣下二音乃應笛之四字今欲仍以頭管之字名其分故以上字名古人以頭管先諸樂笛笙聲字皆以頭管而定亦此義也口琴律吕正義後編曰口琴以鐵為之一柄兩股中設一簧柄長三分二釐四豪為太簇二十分之一股長二寸八分八釐為姑洗半度股本相距三分六釐四豪為黃鍾二十分之一股末相距七釐二豪為黃鍾百分之一簧長與股等簧末上曲七分二釐九豪為黃鍾十分之一簧端點以蠟珠銜股鼓簧成音陳暘樂書曰鹿鳴吹笙鼓簧乃笙中之簧君子陽陽左執簧非笙中之簧今民間有鐵葉簧削鋭其首塞以蠟蜜橫之于口呼吸成音乃簧之變體然則所謂鐵簧即今之口琴也皇朝文獻通考卷一百六十一
