body:
  text: 欽定四庫全書皇朝文獻通考卷一百八十二兵考四直省兵臣等謹按郡國之設兵自分置郡國始若漢之輕車騎士材官樓船唐之折衝府兵宋之諸州鎮廂兵皆是也然往往行之未久寖失其初意其後並其制而隳之明初於一郡設所連郡設衛領以都司而統於五軍都督府亦自成一代之制顧自永樂以後邊外諸衛所已盡歸徙廢名存實亡而內地班軍又以疲於畨上軍伍衰耗無他上失其柄而所以馭之者非其道也我朝誕膺天命武烈為昭定鼎以來備立營制兼用八旗及緑旗兵八旗駐防兵由於世籍緑旗各營兵由於召募其制實足垂之萬祀而不易溯自世祖章皇帝車駕入關之初以盛京為發祥重地在直省之上即以內大臣為總管統轄兩翼官兵為駐防所自始嗣是凡直省形勝要地以次分遣八旗兵駐守其緑旗官兵復隨都邑之大小逺近列汛分營立之將帥授以節制於瀕海瀕江又各設水師營以守之凡彈壓控制之道益詳且密至於內地各衛所遞加裁減所存者俱專司漕運不寄以防守之責若近邊諸衛所則皆度地居民改為郡縣此實國家聲教覃敷四封寧謐所致又不僅為設險之守也故自開國以至於今金湯永固卧鼓邊庭閭閻小民享兵之衛而相忘於兵猗歟休哉誠太平極盛之規也其間每有先設後裁彼減此增及移駐改置之不同蓋設兵所以衛民有初稱要塞今日已化坦途舊屬偏隅此時轉成衝會相機宜而揆時勢皆有不得不然者聖朝戢暴安民因時調劑之良法胥於是乎在是不可不詳考而備志也謹以直省見定營制標列為綱而溯國初以來建置沿革之可考者各分載於後以備參稽焉盛京八旗駐防盛京將軍一人駐劄城盛京副都統一人統轄滿洲協領八人蒙古協領一人漢軍協領二人滿洲佐領八人新滿洲佐領二十三人蒙古佐領八人巴爾呼佐領三人漢軍佐領二十四人滿洲防禦十一人滿洲驍騎校八人新滿洲驍騎校二十三人蒙古驍騎校八人巴爾呼驍騎校三人漢軍驍騎校二十四人主事一人筆帖式十一人八旗滿洲蒙古巴爾呼漢軍領催五百二十八名前鋒二百名驍騎四千五百五十二名看守門庫園寺等兵共四十六名步軍領催一百三十二名步軍一千五十六名養育兵三百六十二名捕盜兵二十八名弓匠六十六名箭匠六十一名鐵匠六十六名兼轄分駐副都統二城守尉四防守尉二凡副都統城守尉防守尉分轄之駐防仍統於盛京將軍興京城守尉一人駐劄盛興京城屬京將軍滿洲防禦四人驍騎校四人筆帖式一人八旗滿洲蒙古漢軍領催六十四名驍騎四百十一名鐵匠八名兼轄駐防一撫順滿洲防禦一人漢軍防禦三人駐劄撫順城屬興京城守尉統於軍盛京將席伯及左翼四旗漢軍領催十六名驍騎一百十四名鐵匠二名鳳凰城城守尉一人駐劄鳳凰城屬盛京將軍巴爾呼佐領一人滿洲防禦八人滿洲驍騎校七人蒙古驍騎校一人巴爾呼驍騎校一人筆帖式一人八旗滿洲蒙古巴爾呼漢軍領催六十二名驍騎五百七十三名守倉兵八名鐵匠九名遼陽城守尉一人駐劄遼陽州屬盛京將軍巴爾呼佐領一人滿洲防禦八人滿洲驍騎校八人巴爾呼驍騎校一人筆帖式一人八旗滿洲蒙古巴爾呼領催五十四名驍騎四百九十九名守倉庫兵十一名鐵匠九名開原城守尉一人駐劄開原縣屬盛京將軍新滿洲佐領一人巴爾呼佐領一人滿洲防禦七人滿洲驍騎校七人新滿洲驍騎校一人巴爾呼驍騎校一人筆帖式一人八旗滿洲巴爾呼領催六十八名驍騎七百八十七名守倉兵十名鐵匠十名兼轄駐防二鐵嶺滿洲防禦一人漢軍防禦三人駐劄鐵嶺縣屬開原城守尉統於將盛京軍席伯及左翼四旗漢軍領催十六名驍騎一百八十四名鐵匠二名法庫邊門滿洲防禦一人駐劄開原縣西北之法庫邊門屬開原城守尉統於軍盛京將領催一名驍騎三十四名臺兵二名牛莊防守尉一人駐劄海城縣西之牛莊城屬盛京將軍滿洲防禦三人漢軍防禦一人滿洲驍騎校四人筆帖式一人八旗滿洲漢軍領催四十名驍騎三百三十七名鐵匠二名廣寧防守尉一人駐劄廣寧縣屬盛京將軍新滿洲佐領三人滿洲防禦一人蒙古防禦一人漢軍防禦一人滿洲驍騎校三人新滿洲驍騎校三人筆帖式一人八旗滿洲蒙古漢軍領催四十八名驍騎三百五十二名守倉庫兵十一名弓匠鐵匠各五名兼轄駐防五巨流河滿洲佐領一人漢軍佐領一人駐劄廣寧縣東北之巨流河屬廣寧防守尉統於盛京將軍漢軍驍騎校二人滿洲漢軍領催十六名驍騎一百五十二名鐵匠二名白旗堡滿洲佐領一人漢軍佐領一人駐劄廣寧縣東之白旗堡屬廣寧防守尉統於盛京將軍漢軍驍騎校二人滿洲漢軍領催十六名驍騎一百五十二名鐵匠二名小黑山滿洲佐領一人漢軍佐領一人駐劄廣寧縣東之小黑山屬廣寧防守尉統於盛京將軍漢軍驍騎校二人滿洲漢軍領催十六名驍騎一百五十二名鐵匠二名閭陽驛滿洲佐領一人漢軍佐領一人駐劄廣寧縣西南之閭陽驛屬廣寧防守尉統於盛京將軍漢軍驍騎校二人滿洲漢軍領催十六名驍騎一百五十二名鐵匠二名彰武臺邊門滿洲防禦一人駐劄廣寧縣北之彰武臺邊門屬廣寧防守尉統於軍盛京將筆帖式一人領催一名驍騎三十九名臺兵三名鳳凰城邊門滿洲防禦一人駐劄鳳凰城西南之邊門屬盛京兵部兼統於將盛京軍筆帖式一人領催五名驍騎四十五名靉陽邊門滿洲防禦一人駐劄鳳凰城北之靉陽邊門屬盛京兵部兼統於軍盛京將驍騎校一人領催五名驍騎四十五名鹻厰邊門滿洲防禦一人駐劄屬興京北之鹻厰邊門盛京兵部兼統於軍盛京將驍騎校一人筆帖式一人領催五名驍騎四十五名汪清邊門即邊興京門滿洲防禦一