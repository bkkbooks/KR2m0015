body:
  text: 欽定四庫全書皇朝文獻通考卷二百四十五帝系考七皇族覺羅興祖直皇帝長子大祖系二世大祖恭載皇子門三世以下素赫臣尼揚古以上三世臣等謹按玉牒載大祖三子第一子素赫臣第二子談圖第三子尼揚古今照世派編纂必溯其所自出故三世恭載素赫臣尼揚古其談圖子孫因本門無登載者故不例書後倣此大學士伊圖太子少保都統伊勒們並瓦爾喀子五尼揚古孫以上世侍郎碩穆布三等輕車都尉羅託禮子光度孫素赫臣曾孫副都統席布席圖子揚瓦爾喀孫尼古曾孫三等男布祜輕車都尉布三子以庫爾喀孫尼揚古曾孫上六世布政使額楞布步軍協領扎秦子曾三等輕車都尉卓班孫光度孫素赫臣元孫原任侍郎三寶正卿安寶並三等輕車都尉萬寶子孫三等輕車都尉卓爾會孫光度曾素赫臣元孫原授黑龍江副都統額爾塞三等輕車都尉舜岱嗣子三等輕車都尉羅託禮孫臣光度曾孫素赫元孫三等男額訥布三等男布祜子以上七世鑲藍旗護軍統領兼工部侍郎伯秀原任侍郎三寶子八世原任正藍旗副都統護軍參領行走七十協領外棟子三等輕車都尉瓦爾達孫爾三等輕車都尉蘇賴曾孫三等輕車都尉舒格元孫騎都尉錫翰五世孫喀六世孫瓦爾十世餘詳玉牒興祖直皇帝第二子二祖系二世二祖恭載皇子門三世以下陸虎臣三世都統穆哈廉尚書薩璧翰並索爾和子五陸虎臣孫以上世原授副都統騎都尉又一雲騎尉科爾坤尚書薩璧翰子以上六世原授都統諸滿特思護子孫都統穆哈亷內大臣塔達塔哈納子爾和曾孫圖哈廉孫孫索陸虎臣元副都統吉林烏拉將軍蒙鄂洛散秩大臣佛綸並騎都尉科爾坤子以上七世原任禮部侍郎護軍參領蓀果內大臣塔達子原授滿洲都統阿拉納阿海子孫一等輕車都尉葉思護尚書薩璧翰曾孫副都統長代莫理博子以騎都尉科爾坤孫上八世散秩大臣齊式武查克丹子洛吉林烏拉將軍蒙鄂孫九世餘詳玉牒興祖直皇帝第三子三祖系二世三祖恭載皇子門三世以下履泰務泰綽竒阿注庫龍敦飛永敦以上三世副都統卦勒察都統託博輝並龍敦子以上四世副都統商鑒務巴泰子務泰孫太子太保郎球伊巴理子龍敦孫副都統布爾吉副都統雅布海副都統巴布賴並鐸弼子龍敦孫大學士少師兼太子太師都統巴哈納副都統卦勒察子以上五世原任侍郎沙賴副都統商鑒子副都統阿克善翁阿岱子曾僧額孫務泰孫尚書品級副都統外庫騎都尉又一雲騎尉祜邁子洞峩洛孫務泰曾孫原任山西巡撫阿塔長史龍錫子曾洞峩洛孫務泰孫內大臣務默訥都賴費揚古子曾濟伯禮孫龍敦孫護軍統領跨岱騎都尉嶽塔子曾伊巴理孫龍敦孫左副都御史碩博會騎都尉哈斯祜子孫伊巴理孫龍敦曾副都統杜爾巴副都統布爾吉子原授都統巴爾布副都統巴布賴子尚書雅布蘭赫塞子勒察孫副都統卦以上六世都統德爾錦騎都尉國幹子孫拜塔曾孫拜音達禮履泰元孫原授副都統二等輕車都尉託洛課三等輕車都尉祜鈕子固納孫履索爾果達曾孫泰元孫二等男塞克森副都統阿克善子原授蘭州布政使哲爾金七品官坤度子祜騎都尉乂一雲騎尉邁孫洞峩洛曾孫務泰元孫川陜總督華顯三等輕車都尉圖坦子洛三等輕車都尉圖祿孫洞峩曾孫務泰元孫原授副都統海蘭三等輕車都尉鄂嶽子孫騎都尉嶽塔孫伊巴理曾龍敦元孫原授副都統伊敦三等輕車都尉扎富納子元喀喇孫鐸弼曾孫龍敦孫原授副都統安圖護軍參領阿燕子副都統巴布賴孫杭州副都統塞石圖阿哈禪子額蘇圖孫一等輕車都尉喇岱曾孫龍敦元孫尚書蘇庫務爾喀子飛務喇納孫春曾孫永敦元孫騎都尉克以上七世原授都統戶部侍郎塞德原封二等男巴彥德並二等男塞克森子原授副都統英柱三等輕車都尉鄂色子都三等輕車都尉鄂嶽孫騎尉嶽塔曾孫敦伊巴理元孫龍五世孫原授副都統長史佛保塞赫子博左副都御史碩會孫原授副都統品級赫林三等輕車都尉愛山子孫三等輕車都尉阿爾楚鐸頭等護尉阿爾海曾孫弼元孫龍敦五世孫左副都御史巴彥學原授佐領諾理子子佐領巴錫孫少師兼太太師都統巴哈納曾孫提督巴彥弼佐領禮珠子師佐領巴錫孫曾少師兼太子太都統巴哈納孫黑龍江副都統護軍參領兼騎都尉瑪希納一等輕車都尉納翰泰子曾護軍參領杭竒孫察三等輕車都尉海蘭孫副都統卦勒元孫鑲藍旗副都統石麟尚書蘇庫子以上八世原授護軍統領圖喇七品官瓦爾達子圖護軍參領德爾泰孫邁曾孫尼雅漢元孫六威準五世孫務泰世孫總督圖思德阿爾嵩阿子曾扎克丹孫龍二等輕車都尉阿哈孫長史錫元孫洞峩洛五世孫務泰六世孫原任總兵兼雲騎尉達星阿筆帖式伯啓子車恩特孫三等輕都尉塞爾圖曾孫綽祿克度元孫世阿度巴晏五世孫竒阿注庫六孫湖南衡州營副將二等侍衛常福莽鼐子圖頭等侍衛瑪孫穆臣曾孫世佐領奧塔元孫孫濟伯禮五孫龍敦六世經筵日講官翰林院侍讀學士逢泰總督滿保並僧塞子石二等輕車都尉祜章阿孫騎都尉達禮曾孫都賴費揚古元孫龍濟伯禮五世孫敦六世孫副將蘇昌阿副護軍校衡善子心護軍參領兼佐領伯竒圖孫啓郎布祿曾孫太子太保郎球元孫左都御史吳拜三等輕車都尉祜世巴子尉三等輕車都尉巴弼孫雲騎貴和鐸曾孫世華善元孫六薩哈爾察五孫龍敦世孫侍郎副都統阿揚阿郎中達爾圖子車總尉瑪爾圖孫二等輕都尉竒臣曾孫禮三等輕車都尉瑙德宜元孫克五世孫飛永敦六世孫巡撫巴延三佐領兼雲騎尉布希子喇防禦務禮孫務爾喀曾孫務納元孫騎都尉克春五世孫飛永敦六世孫將軍額爾登魯庫子以尚書蘇庫孫上九世原任總兵西林杭吉圖子禮筆帖式寧格禮孫孫三品官謨普曾孫奧哈元世奧岱五世孫注阿度巴晏六孫綽竒阿庫七世孫都統兼都察院左都御史勒爾森筆帖式元旦子僧塞孫二等輕車都尉祜章阿曾孫濟騎都尉石達禮元孫都賴費揚古五世孫伯禮六世孫龍敦七世孫世以上十玉牒末附見者三人尚書果科副都統嶽博並昂阿喇子以威準孫務泰曾孫上六世護軍統領海蘭騎都尉兼佐領哈達子成格孫昂阿喇曾孫總尉穆八世餘詳玉牒興祖直皇帝第四子四祖系二世四祖景祖翼皇帝恭載帝號歷年門三世恭載皇子門四世以下二等子兼內大臣塞勒博伊和齊子孫武功郡王禮敦巴圖魯五世二等子額爾德二等子內大臣塞勒子都統吉哈禮騎都尉阿賴子博伊和齊孫三等男薩賽二等輕車都尉阿賽子世博伊和齊孫以上六二等子喇祜塔原封二等子噶爾漢並二等子額爾德孫寧夏將軍都統舒淑噶布喇子伊騎都尉阿賴孫博和齊曾孫副都統海都瑪布子賴騎都尉阿孫原任散秩大臣吉禮都統吉哈禮子一等男瓦爾瑪雲騎尉葉穆濟子多阿世布孫勒祜爾哈齊曾孫羅恪恭貝塔察篇古元孫原授都統豁特護軍參領穆成恪子阿世布孫副都統圖爾瑪三等輕車都尉噶思哈子阿世布孫一等男瑪克蘇三等男郎圖並莽嘉子上阿世布孫以七世原任布政使武什二等輕車都尉瑪爾翰子臣瑪爾岱孫二等子兼內大塞勒曾孫七世護軍統領噶爾圖都統阿爾圖並二等輕車都尉噶爾諸子噶布喇孫原授散秩大臣延綬將軍都統舒淑子原封一等男蘇爾瑪一等男瓦爾喀子西路副將軍伊禮布騎都尉聶勒子孫護軍參領穆成恪二等男舒淑佐領薩克蘇嗣子世莽嘉孫以上八散秩大臣兼副都統海格原任佐領喇薩禮子二等子喇祜塔孫副都統散秩大臣萬福道永子塔二等子喇祜孫散秩大臣阿都都統阿爾圖子一等男佛寧額原封一等男蘇爾瑪子副都統同福住副將軍伊禮布子原授盛京副都統福格二等男舒淑嗣子以上九世兵部右侍郎兼鑲白旗漢軍副都統奉寬一等男佛寧額子福州將軍永德城守尉哈克秦子爾六品官書啓圖孫副都統圖瑪嗣曾孫禮部侍郎志信生員喇哈子元洪裕孫世喇克蘇曾孫莽嘉孫阿布五世孫勒祜爾哈齊六世孫貝塔察篇古七世孫多羅恪恭以上十世餘詳玉牒興祖直皇帝第五子五祖系二世五祖恭載皇子門三世以下郎騰三世三等男拜三伯林子郎騰孫一等男穆成格二等男武英殿大學士勒德渾並二等輕車都尉機達席庫子郎騰孫世以上五一等子顧納岱三等男拜三子散秩大臣外山三等侍衛瓦爾達子孫薩哈席庫孫郎騰曾原授副都統佟基原任刑部侍郎法喇原封二等男納泰並二等男勒德渾子以上六世一等子謨洛渾一等子顧納岱子一等子都統席特庫騎都尉顧巴岱子三等男拜三孫原任侍郎察哈喇穆成格子伯林曾孫蘇達喇孫郎騰元孫散秩大臣諾爾遜三等侍衛阿喇密子騰薩哈廉孫伯林曾孫郎元孫布政使齊格散秩大臣外山子以上七世一等子領侍衛內大臣舒祿一等子都統席特庫子原授副都統諾穆齊原授副都統蘇爾泰廣西潯州營副將額爾泰並散秩大臣諾爾遜子以上八世原襲二等子伊靈阿一等子領侍衛內大臣舒祿子副將佛明原授副都統諾穆齊子寧夏將軍永泰原授副都統蘇爾泰子布政使敦福福昌子勒騎都尉諸詹孫車頭等侍衛努赫曾孫一等輕都尉務習談元孫世務巴席庫五世孫郎騰六孫以上九世二等子四保倉庫官安崇阿子侍三等侍衛瑪爾泰孫一等子領衛內大臣舒祿曾孫世十一餘詳玉牒興祖直皇帝第六子六祖系二世六祖恭載皇子門三世以下康嘉阿哈納以上三世護軍統領談濟布阿哈納子四世原授總兵官參領保柱七品官理達子孫一等輕車都尉喀蒙愛屯布祿曾孫七康嘉元孫世原任參贊總辦喀什噶爾回部事務納世通納親子護軍參領代衮孫孫屯布祿元孫一等輕車都尉喀蒙愛曾康嘉五世孫以上八世餘詳玉牒皇朝文獻通考卷二百四十五
