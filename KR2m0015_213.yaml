body:
  text: 欽定四庫全書皇朝文獻通考卷二百十三經籍考三經書詩日講書經解義十三卷康熙十九年翰林院掌院學士兼禮部侍郎庫勒納等奉敕編聖祖仁皇帝御製序曰天生民而立之君非特豫以崇高富貴之具而已固將副教養之責使四海九州無一夫不獲其所也是故古之帝王奉若天道建都樹屏以立其綱設官置吏以張其紀經天緯地以盡其才親親尊賢以𢎞其業黎民阻饑而為之教稼五品不遜而為之明倫為禮樂以導其中和為兵刑以息其爭訟事未然而預為之備患已至而亟為之驅蓋治天下之法見於虞夏商周之書其詳且密如此宜其克享天心而致時雍太和之效也所以然者蓋有心法以為治法之本焉所為敬也誠也中也敬則神明有主而物欲不能搖誠則孚信在中而僞巧不能間中則公正無偏而邪說不能移凡書中曰欽明曰寅恭曰祇懼曰迪畏皆敬之屬也曰允塞曰至諴曰一德曰惇信皆誠之屬也曰義制事禮制心曰沈潛剛克高明柔克曰寬而有制從容以和皆中之屬也性之者為堯舜禹文身之者為湯武高宗困而學之者為太甲成王悖而去之者為太康桀紂嗚呼心法之存亡治道之升降分焉天命之去留繫焉曷其奈何弗鑒朕萬幾餘暇讀四代之書惕若恐懼爰命儒臣取漢宋以來諸家之說薈萃折衷著為講義一十三卷逐日進講兹加鋟梓頒示臣民俾知朕仰法前代聖王志勤道逺然夙夜兢兢思體諸身心措諸政治以無負上天立君之意夫豈敢一日忘哉是為序欽定書經傳說彚纂二十四卷康熙六十年大學士王頊齡等奉敕撰世宗憲皇帝御製序曰朕思六經皆治世之書而帝王之大經大法昭垂萬古者惟尚書為最備蓋自繼天立極精一執中二帝三王之心法遞相授受而治法亦因之以傳今觀書所載成天平地經國造邦建官立教禮樂兵刑之𢎞綱大用與夫賡揚都俞之休風嘉謨嘉猷之陳告凡所為永膺天命而致時雍協和之效者雖去數千年尚可於方策中想見其欽明寅畏之衷敷布經綸之迹後之君臣得奉為楷模以追蹤於唐虞三代之隆詎不於書是賴哉我皇考聖祖仁皇帝聖學淵深治功宏逺存於中者二帝三王之心發於外者二帝三王之治而稽古好學於典謨訓誥之篇沈潛研究融㑹貫通初命講官分日進講著有解義一篇頒示海內復指授儒臣薈萃漢唐宋元明諸家之說參考折中親加正定廣大悉備於地理山川援今據古靡不精核為書經傳說彚纂凡二十有四卷兹值刋校告竣與易詩春秋諸經次第傳布敬製序文勒之卷首夫後世之天下唐虞三代之天下也而治法之垂為典章心法之原於性命者先後同揆百世之聖君賢輔未能易也故為君者必思比德於堯舜禹湯文武而後無忝乎為君為臣者必思嫓休於臯䕫伊傅周召而後無忝乎為臣朕夙夜兢兢冀克守主敬存誠之道以遂覲光揚烈之懷尤冀卿尹百執事共體元首股肱之誼殫協恭厲翼之忱寅亮天工諴和民志俾薄海內外永底乂安於以逺宗聖哲而仰承皇考尊崇經學啓牖萬世之盛心顧不美歟是為序臣等謹按是書有卷首上下卷上卷列引用姓氏書傳圖下卷綱領卷末附書序一卷合正文二十一卷為二十四卷書成恭呈欽定凡典謨訓誥之大山川地理之賾無不精研援据悉禀睿裁仰見聖學淵深心法治法同條共貫其間採輯蔡沈集傳可從者從之不可從者必附録舊說以明之大公至正鑑空衡平彚羣說而折衷至當洵萬世所遵守矣彼袁仁等之故立異同陳櫟等之堅守門户者烏足以窺萬一哉尚書集解二十卷九州山水考三卷孫承澤撰承澤號退谷山東益都人世隸上林苑籍故自稱曰北平前明崇禎辛未進士官兵科給事中入國朝官至吏部侍郎承澤自序曰尚書不獨治統所屬道統寄焉言心言性言敬實開萬古理學之宗視諸經為尤要文有艱澀平易之不一以事非一代作非一手如周易四聖繁簡不一詩之正變不同三頌簡縟之相逺也朱子即不注書而仲默所注或曾面授意㫖况同時有吕東萊書說後百年有金仁山之表注許白雲之叢說其精粹不遜於朱子余舊著集解一編今年屆八旬恐其散佚重加裒益刋之家孰所解多從蔡傳參以東萊其有不合者正以仁山白雲兩先生要歸之明顯暢逹而止又山水考自序曰古今山經水志搜竒者失之荒唐紀逰者但狎其耳目無足取也禹貢一篇不獨紀載成功造化之功用神聖之彌綸俱在焉余反覆讀之仍著其總目於前而分考之於後夫山之所墳水之所湧水之所奔山之所亘動靜相生剛柔互錯先儒謂理一分殊一理之妙不於山水益見乎尚書近指六卷孫竒逢撰竒逢見易類張溍曰此其晚年所論定也書經稗疏四卷尚書引義六卷王夫之撰夫之見易類書經疏略六卷張沐撰沐見易類臣等謹按是書詮解多襲蔡傳其獨出已見者如解無逸篇則知小人之依句曰於是知小民者君子之所依賴以安也幾於不成文義又所載孔安國序於春秋左氏傳句解之曰傳附經左曰左傳是以左氏為左右之左則更駭人聽聞矣古文尚書疏證八卷閻若璩撰若璩字百詩太原人徙居山陽康熙己未薦舉博學鴻詞黃宗羲序曰吳草廬作纂言以伏氏二十八篇為之解釋以古文二十五篇自為卷袠其小序分冠各篇者合置於後歸震川以為不刋之典郝楚望著尚書辨解亦依此例然從來議古文者以史傳考之則多矛盾惟取秦火以前諸書如左氏內外傳孟子荀子墨子之類證之嘉靖初梅鷟著尚書譜取諸傳記之語與二十五篇相近者類列之以證其剽竊稱引極博然終未合於史傳之異同是書謂兩漢時安國之尚書雖不立學官未嘗不私自流通逮永嘉之亂而亡梅賾作僞書冒以安國之名則是梅賾始僞後人可并以疑漢之安國乎中間辨析三代以上之時日禮儀地理刑法官制名諱祀事句讀字義因尚書以證他經史足祛後儒之蔽古文尚書寃詞八卷尚書廣聽録五卷舜典補亡一卷毛竒齡撰竒齡見易類竒齡自述略曰梅賾所上者乃孔傳而非古文尚書其古文尚書本傳習人間而賈馬諸儒未之見又曰漢藝文志書以廣聽向讀宋儒書不能於此外有所推暨而往往以聽而廣其說是廣聽者本於書廣而今乃以聽廣也補亡則取史記為主而以孟子左傳尚書大傳參之朱彞尊曰蕭山毛氏見說經者多攻古文尚書之僞作寃詞八卷為孔安國梅賾訟寃臣等謹按竒齡才辨而博懼拾前人緒餘故反其詞以求勝寃詞之目一曰總論二曰今文尚書三曰古文尚書四曰古文之寃始於朱氏五曰古文之寃成於吳氏六曰書篇題之寃七曰書序之寃八曰書小序之寃九曰書詞之寃十曰書字之寃托名以衛經為詞實則虛辭臆斷罅漏彌甚又嘗語其門人曰尚書事實乖錯如武王誥康叔周公居洛邑成王寧周公周公留召公皆並無此事乃据漢志作廣聽録五卷堅護孔傳不顧其安惟名物典故引据精核於經義實有所禆至托史記以補舜典之缺則是以竄亂古今詆朱子而不知自蹈於竄亂之尤者矣尚書埤傳十七卷禹貢長箋十二卷朱鶴齡撰鶴齡字長孺别號愚庵吳江人鶴齡埤傳自序曰尚書者古帝王之心法治法所總而萃也義解一訛貽害非眇古文孔傳晚出書義稍顯孔頴達為之疏雖正二劉之失未愜學者之心求其條貫羣言闡明奧㫖信無逾於仲默集傳者但其意主於撥棄注疏故名物制度之屬不能無訛讀禹貢者河渠遷改眩若進風陳洪範者九數相乘迷如辨霧安望其酌古準今卓然稱有用之儒哉余竊用愍歎此埤傳之所由作也例略曰經文不全解故不全載昔趙子常說春秋有杜氏補注一書專取杜注之舛闕者補之此書實仿其體漢唐二孔氏名物度數之學多得其真蔡氏訓釋義理而稽古却疏故取注疏為主參以諸儒之說至禹貢一篇於賦稅漕渠田制水利采托特詳又禹貢長箋自序曰自禹迄今陵谷代變山川往蹟難以深求幸漢唐以來諸儒辨論各出以及乘志圖經約略可據雖其間甲乙齟齬往往有之而考證析合亦存其人爰取注疏大全百氏之說條貫而衷斷之體宗訓詁而旁及史家求為通經適用之學惟望博雅君子論定而是正焉禹貢錐指二十卷洪範正論五卷胡渭撰渭見易類李振裕序禹貢錐指曰今乙酉首春振裕校書內廷與禁直諸臣從容言天子崇尚經學搜求遺逸若胡處士渭禹貢錐指一書豈可令伏而不見杳學士升乃以奏呈三月南巡狩渭親賫是書并所撰平成頌一篇以獻賜御書詩扇匾額詳載渭姪禮部侍郎㑹恩恭紀是書卷首有四十七圖皆渭手摹書中先為分列經句其集解亞經一字集解後附録又亞一字首列孔傳孔疏次宋元明諸家之說有雖係經解而不成章者並以已意融綴用渭案二字别之如山海經越絶書吳越春秋吕氏春秋淮南子尚書中候河圖括地象等書所言禹治水事一切擯落渭自序洪範正論曰洪範一書如日月之麗天有目者所共覩而間有晦盲否塞者則先儒之曲說為害也五事本於五行庶徵本於五事不過以雨暘煥寒風之時不時驗貌言視聽思之敬不敬而漢儒五行傳專主灾異固已乖矣而又推廣言之復援春秋及漢事以實之以瞽史矯誣之說亂彞倫攸叙之經害一也洛書之本文具在洪範劉向之言非妄而宋儒乃創為白黑之㸃方圎之體九十之位則書也而變為圖矣且謂範之理可通於易劉牧易數鉤隱以九位為河圖十位為洛書而蔡元定兩易其名害二也洪範元無錯簡而宋儒任意改竄移庶徵王者惟嵗以下為五紀之傳移皇極斂時五福至其作汝用咎及三德惟辟作福以下並為五福六極之傳害三也愚惟是解自甲申迄己丑乃成纂為五卷臣等謹按胡渭殫心著述遭逢聖祖仁皇帝尊崇經術採訪遺編得以上塵睿鑒讀是編者匪特仰聖度如天不遺蕘獻亦以見儒生稽古之榮堪垂不朽也已書經衷論四卷張英撰英見易類尚書解義一卷李光地撰光地見易類臣等謹按是書僅七篇二典三謨及禹貢洪範而外他未之及蓋未竟之本古文尚書考一卷陸隴其撰隴其字稼書平湖人康熙庚戍進士官嘉定靈夀二縣知縣行取御史乾隆元年特命從祀孔子廟廷賜諡清獻尚書體要六卷錢肅潤撰肅潤字礎日無錫人繆泳曰肅潤為馬世竒弟子隱居十峯草堂其說書多本於馬尚書惜隂録六卷徐世沐撰世沐見易類是編乃其七十二嵗時作尚書口義六卷劉懷志撰懷志字貞儒武强人左都御史劉謙之父禹貢正義三卷曹爾成撰爾成字得忍無錫人陸眉序曰是書依經立義於蔡傳多所釐正如曰九州之道非專為貢賦設乃全經之樞紐蓋敷土主於分通道所以合九州九道各為一小成弼成五服至外薄四海為九州一大成君民一體呼吸感通而雍之北道使西人繞河而來即漢武斷右臂之意也又曰導山導川二章首尾腹背相應北條表裏河山自相應也南條係南派之彭蠡於北派已綴表裏為一又與北江中江三方犄角互相應也濟淮以南北相應渭洛以東西相應規畫布置經緯可見又曰河流重濁分殺則勢緩而易填淤合併則勢疾而冲刷有力故不特上導豫之四水盡歸於河又下障濟溢之滎澤與河併行然後河之趨東一往無滯又謂下自濟口以北至二渠九河之分所以牽之使去上自渭汭以東與泗水滎澤之合所以推之使前近世言治河者殆無以易也尚書義疏無卷數蔣家駒撰家駒字千里丹陽人康熙庚午舉人官懷集縣知縣書經參義六卷姜兆錫撰兆錫見易類兆錫自序曰蔡傳遵體遺經功匪淺鮮然其間失檢者不無千百之什一錫不揣固陋反復潛體參訓義者凡十條又參句義二條節義篇義共六條簡義三條并凡義順而文未順者謹體朱子遺訓竊附私淑之義具參於篇書經詳說無卷數冉覲祖撰覲祖見易類禹貢臆參無卷數楊陸榮撰陸榮見易類尚書地理今釋一卷蔣廷錫撰廷錫字揚孫常熟人康熙癸未進士官至大學士諡文肅禹貢譜二卷王澍撰澍字若霖亦號篛林金壇人康熙壬辰進士官至給事中禹貢解八卷晏斯盛撰斯盛見易類今文尚書說三卷陸奎􅈴撰奎勳見易類奎勳自序曰今文尚書有二體其體正而辭顯者如堯典臯陶謨禹貢洪範之類其體變而辭晦者如盤庚大誥多士多方之類古文尚書增多二十五篇文從字順時代之近不辨自明朱子於易有本義毛詩有集傳而尚書獨無定本蔡氏承本師之命撰成書傳六卷惟是禹貢黑水三危之屬生長南疆末由考訂洪範中以五事配五行意在破劉氏曲說專主相生之序不兼相剋之序未免後人滋議昔鄱陽董氏鼎廬山陳氏師凱皆於蔡傳之外别有發明􅈴博採先儒間附已意非故與蔡氏立異亦欲使蔡氏之書成為盡美盡善爾至古文尚書真僞錯出本朱子之意作辨二篇附諸卷末尚書通義十四卷方葇如撰葇如見易類尚書質疑二卷顧棟高撰棟高字震滄晚年始治春秋又自號左畬無錫人康熙辛丑進士乾隆辛未薦舉經學賜國子監司業丁丑又賜國子監祭酒銜禹貢㑹箋十二卷徐文靖撰文靖字位山當塗人雍正癸卯舉人乾隆元年薦博學鴻詞十七年薦舉經學特授翰林院檢討臣等謹按禹貢詮釋諸家自宋以來論說不一至胡渭作錐指而羣言始有所折衷是書因渭所已言而更推尋所未逮故較渭書益為精密惟好古而過信山海經竹書紀年等書是其失耳尚書舉隅六卷徐志遴撰志遴字掄英江西新城人雍正甲辰舉人書經劄記無卷數顧昺撰昺見易類禹貢方域考一卷湯奕瑞撰奕瑞號玉峯南豐人雍正中官福建鹽場大使尚書約㫖六卷尚書通典略二卷楊方達撰方達見易類禹貢約義無卷數華玉淳撰玉淳字師道號淡園金匱人臣等謹按是編乃其隨筆紀載未成定稿之書其論三江主鄭𤣥蘇軾之說極為有識至九江自在潯陽乃以洞庭當之雖與胡渭所見略同終未免踈於考據耳尚書質疑八卷王心敬撰心敬見易類書經提要十卷徐鐸撰鐸見易類尚書小疏一卷沈彤撰彤字冠雲號果堂吳江諸生因修三禮及一統志議叙九品官心園書經知新八卷郭兆奎撰兆奎平湖人尚書讀記一卷閻循觀撰循觀字懷庭號伊蒿昌樂人乾隆丙戌進士官吏部考功司額外主事尚書私學四卷江昱撰昱字賔谷號松泉甘泉人廪貢生尚書注解纂要六卷吳蓮撰蓮字余嘉江都人尚書剩義四卷黃燐撰燐見易類右書日講詩經解義聖祖仁皇帝御製序曰昔者虞廷命后䕫為典樂之官以教胄子首詔之曰詩言志則詩之為教所從來逺矣蓋人性情之發不能無所寄託而詩則兼備六藝諷誦吟咏之間足以觀感而興起者莫善於此故曰溫柔敦厚詩教也自夫子刪定而後三百篇之㫖粲然其採之里巷者則為風陳之朝廷者則為雅薦之郊廟者則為頌觀其美刺而善惡之鑒昭矣觀其正變而隆替之治判矣觀其升歌於廟朱弦象管之所唱嘆而祖功宗德之具在矣千載而下猶得見江漢之遺風豳岐之故俗關雎麟趾之化矇瞍七月之針天保鹿鳴堂陛賡揚之盛清廟閟宫歌雍舞勺之章皆賴此三百篇之存安可不沉酣優渥於其間哉朕嘗思古人立訓之意既有政教典禮紀綱法度以維持之矣而感通乎上下之間鼓舞於隱微之地使人從善逺惡而不知優遊順適而自得則必賴乎詩如天之生萬物也日以暄之雨以潤之露以濡之雷霆以肅之而又必宣暢八風以疏通而條逹之然後萬類咸遂其生養而無促迫矯强之弊故教至於詩而微矣治至於詩而極盛矣朕志慕隆古淳穆之理崇奬詩教爰命儒臣輯成詩經講義日進於坐隅朝夕觀覽凡立說一準於考亭而旁搜義藴兼及注疏博綜名物亦參爾雅又思夫子平日雅言之教稱引誦說惟詩最多如大學中庸孝經篇末必引詩以詠嘆之亦以見古人之斯須不離乎此也朕亦欲四海臣民謹思貞度以揚風扢雅之學偕進於溫厚和平之教故序而頒之此則朕之所深望也夫欽定詩經傳說彚纂二十一卷序二卷康熙六十年户部尚書王鴻緒等奉敕撰世宗憲皇帝御製序曰朕惟詩之為教所以成孝敬厚人倫美教化移風俗其用逺矣自說詩者各以其學行世釋解紛紜而經㫖漸晦朱子起而正之集傳一書參考衆說探求古始獨得精意而先王之詩教藉之以眀國家列在學官著之功令家有其書人人傳習四始六義曉然知所宗尚我皇考聖祖仁皇帝右文稽古表章聖經御纂周易折中既一以本義為正於春秋詩經復命儒臣次第纂輯皆一以朱子之說為宗故是書首列集傳而採漢唐以來諸儒講解訓釋之與傳合者存之其義異而理長者别為附録折衷同異間出已見乙夜披覽親加正定書成凡若干卷名曰詩經傳說彚纂朕惟詩三百篇先王所以明勸懲而行黜陟蓋治世之大經而後世文人學士乃以風雲月露之詞自託風雅學經者又溺於訓詁詞章之陋習烏在其能明先王之道也我皇考指授儒臣勒為是編冀以闡先王垂教之意與孔子刪詩之㫖學於是者有得於興觀羣怨之微而深明於事父事君之道從政專對無所不能則經學之實用著焉所謂用之鄉人用之邦國以化天下者亦於是乎行焉刋校既竣敬述聖意序之簡端臣等謹按是書分二十一卷首列凡例引用姓氏詩傳圖諸國世次圖作詩時世圖綱領大序詩集傳序卷末附詩序辨說皆經聖祖仁皇帝睿裁故凡經義之菁英衆說之同異無不酌斟美善别白瑖瑜視彼前代箋釋諸家奚啻撥雲霧而見日月以故雍容揄揚著於奕世者孰非是編有以和平其心氣歟欽定詩義折中二十卷乾隆二十年大學士公傅恆等奉敕撰皇上御製序曰詩之教大矣古今言詩者衆矣自小序而下箋疏傳注各名其家各是其說辨難糾紛幾如聚訟曩嘗肄業於此流連諷咏豁然心有所得而考之昔人成說往往拘牽扞格不能相通辛未秋間與尚書孫嘉淦論及諸經其所見平實近理因先從事毛詩授以大指命之疏次其義凡舊說之可從者從之當更正者正之一無成心唯義之適視政餘功親為釐定以備葩經之一解編既竣在館諸臣以序請夫詩之道何昉乎其在虞書則曰詩言志志者詩之本也聲與律其後起者也其在魯論則曰一言蔽之思無邪無邪者詩之教也興觀羣怨事父事君其道不越乎此也其在子輿氏則曰以意逆志是為得之此說詩者之宗也逆志而得其志之所在則詩之本得其為教也正矣傳曰衆言淆亂折諸聖用中者聖學之大成也雖不能至心嚮往之爰竊取皇祖周易命名之義命之曰詩義折中而叙其槩以為辨臣等謹按欽定傳說彚纂以集傳為綱而附録舊說以補其缺實昭衡鑒之至公我皇上以聖祖之心為心覃思六義綜覽四家而於諸儒之得失無不澄懷研審務持其平即集傳中有未可盡信者亦必根據毛鄭以訂其訛使事必徵實義必闡微仰見尼山刪定之㫖心源相印而聖朝作述之隆亘古罕覯者已詩經朱傳翼三十卷孫承澤撰承澤見書類承澤自序曰集傳力正毛氏之失而不甚許可詩記當時信者半駭者半明初獨詩主集傳不兼他說治詩者師無異授學有專門嘉隆而後日趨新異蓋詩本於日用屬於人情取義於聲韻之微默寓夫勸懲之㫖大者載焉小者載焉貞者載焉淫者載焉蓋不極乎事之變不足以窮人之情情者性之用也情至於窮而性見矣故曰思無邪思由情反性之路也此聖人教人學詩之要非謂詩盡無邪也毛氏不達其解篇篇必求止乎禮義穿鑿迂滯而不通余取小序與朱子之說並立每篇之首定其是非又就集傳略為推衍以暢其㫖俾學者觀小序朱子之說上合之於經文固有洞然於心而無疑者昔王輔嗣以棄象之說亂易毛氏之罪豈在輔嗣下朱子闢之厥功偉矣故翼朱者翼經也朱彞尊曰退谷孫氏謂毛氏之罪豈在輔嗣下毛氏較齊魯韓三家詩最醇故獨傳其亦何罪之有此由尊朱子之過也未免失言矣詩經稗疏四卷王夫之撰夫之見易類田間詩學無卷數錢澄之撰澄之見易類徐元文序略曰是書非有意於攻集傳於漢唐以來之說亦不主於一人無所攻故無所主無所攻無所主而後可以有所攻有所主錢金甫曰田間詩學一以小序為斷其言曰小序去古未逺雖未可全據要不甚謬若舍序說詩隨意作解泛濫無歸非附㑹即穿鑿矣序如關雎后妃之德也葛覃后妃之本也卷耳后妃之志只此一語是古序此下即其說而引伸之乃東漢衛宏所作不可槩從必考之三禮以詳其制作徵諸三傳以審其本末稽之五雅以核其名物博之以竹書紀年皇王大紀以辨其時代之異同與情事之疑信周之典禮殷之宗祀魯之郊禘其源流度數具載於詩宜為之考詳定正蓋飲光於詩學擇衆說而和調之近代說詩者莫有過焉者也詩說簡正録十卷提橋撰橋字景如號淡如居士河間人前明天啓壬戌進士入國朝官至刑部侍郎詩經通義十二卷朱鶴齡撰鶴齡見書類例略曰通義者通古詩序之義也序乃一詩綱領必先申序意然後可論毛鄭諸家得失後序多漢儒附益者今取歐蘇吕諸說為之辨正又曰古本標序於經文之前今從郝仲輿本移序從經毛鄭歐蘇吕嚴諸本所分章句各有異同今一以集傳為正集傳所叶之音與陳季立顧寧人考證者無甚相逺而四聲不用則四聲通為一音初學多不曉入聲轉韻故仍用集傳所叶毛詩稽古編三十卷陳啓源撰啓源字長發吳江人朱鶴齡序曰余向為通義多與陳子長發商𣙜而成深服其援據精博近乃自成稽古編若干卷悉本小序注疏為之交推旁通余書猶參停今古之間長發則專宗古義宣幽决滯劈肌中理即考亭見之亦當爽然心開欣然頤解世有溯源三百者必能尊奉此書為孔傳未墜長發其俟之而已臣等謹按是書一卷至二十四卷叙關雎至殷武而冠以叙例二十五卷至二十九卷曰總詁分六門曰舉要論小序四始六義詩樂詩人詩傳詩證逸詩也曰正字論字義字形字音也曰辨物辨草木禽蟲也先為總辨曰數典論祀典樂舞禮制土田梁名門室器用旗幟佩玉衣裘也曰稽疑論他注引傳疑誤正義引爾雅疑誤監本經注疑誤釋文疑誤集傳疑誤也三十卷曰附録亦依風雅頌編次古義彬彬言皆徵實一洗明代說經家騁虛剿說之習惟附録牽引佛教橫滋異學是則瑜不掩瑕識者惜之詩問一卷吳肅公撰肅公字雨若號街南宣城人詩經傳說取裁十二卷張能鱗撰能鱗字西山順天人順治丁亥進士官至四川按察使副使毛詩日箋六卷秦松齡撰松齡字留仙號對巖無錫人順治乙未進士改庶吉士緣事罷官康熙己未復舉博學鴻詞官至左春坊左諭德宋犖序曰紫陽毛詩集傳往往不依小序於鄭風皆目為淫奔之詩先儒議之然語録論東山鳲鳩詩云惜注已行不及更改則知集傳乃晚年未定之書是箋雖不盡取小序然能精擇毛鄭舊說以㑹萃於諸儒之言而折衷於朱子間發已意必協於正於近儒郝敬顧炎武諸家皆取節焉獨於明嘉靖時所出之子貢詩傳申培詩說排擯不録一語詩經疏略八卷張沐撰沐見易類詩經比興全義一卷王鍾毅撰鍾毅字逺生華亭人順治中松江府學嵗貢生詩所八卷李光地撰光地見易類光地經書筆記曰詩序世次既不可信則但當味其辭求其意以論其世歡欣交通者必文武成康之詩否則必宣平幽厲之詩故是編論世為多陳萬策跋曰先生嘗論顧炎武音學妙契古先故略吳氏叶韻而載炎武詩本音詩經惜隂録二十卷徐世沐撰世沐見易類毛詩寫官記四卷詩札二卷詩傳詩說駁義五卷續詩傳鳥名三卷白鷺洲主客說詩一卷國風省篇一卷毛竒齡撰竒齡見易類竒齡自述曰昔漢武置寫書之官記其所聞某居壁中有官寫者說詩於主人之堂未能記也久之而纖詞瑣文串見於心於是稍憶其所說雜以成記曰寫官記又曰嘉靖中廬陵郭相奎家忽出子貢詩傳申培詩說二書以為得之黃文裕祕閣石本然究不知所為石本者何如第見相奎家傳本則摹古篆書而附以楷體今文用作音注嗣此則張元平李本寧先後刻之於是一入之百家名書再入之漢魏叢書遂相沿不可去庸罔固陋無少忌憚乃至如此此不可不辨也又曰少時所作毛詩續傳既盡失之祗存省篇寫官記詩札三種康熙乙酉相距六十年鄰人某曾録竒齡傳末鳥名卷而殘脫無所用㑹錢塘姚彥暉攜所著詩識名解請序乃取殘卷重理之并列朱注於行間且辨且正名之曰續詩傳鳥名卷又曰省篇者自省也聞詩而有省也齊魯韓三家已極漫漶而為之說者自漢迄今抑何侈也吾畢去其說而僅取所偶聞者著為篇李塨曰嘗以詩義質之先生先生曰豫所傳諸詩有未能改者數端如以十畝之間為淫奔以鴟梟為避居於東以封康叔為武王以有邰家室為太姜琅琊之駘凡此皆惑也竒齡門人記曰詩札西河少時所作故其立說有暮年論辨所不合者其間校韻數則尤所矛盾行世既久不便更易陸葇曰宣城施侍讀閏章參政湖西時葺白鷺洲書院講學楚人楊恥菴偕其徒為都講大可與之辨淫奔詩并笙詩毛朱詩說一卷閻若璩撰若璩見書類詩識名解十五卷姚炳撰炳字彥暉錢塘人詩傳名物輯覽十二卷陳大章撰大章字仲䕫號雨山黃岡人康熙戊辰進士改庶吉士以毋老乞歸詩藴四卷姜兆錫撰兆錫見易類詩經集成三十卷趙燦英撰燦英字殿揚武進人臣等謹按是編卷帙雖多然為揣摩場屋之用非說經之體詩說三卷惠周惕撰周惕字元龍長洲人康熙辛未進士由庶吉士改密雲縣知縣田雯序曰唐韓昌黎始疑詩序非子夏作而歐陽子因之著詩傳其說與漢儒異矣然猶不廢小序也至朱紫陽刪去小序另為一編又與韓歐異矣然猶不廢注疏也同時鄭夾漈王雪山各自立說并傳注去之然猶間有去取也自是以後學者屏去訓詁而鑿空臆造惠子元龍病之因著詩說三卷其㫖本於小序其論采於六經旁搜博取疏通證據雖一字一句必求所自而考其義類晰其是非蓋有宋儒之博有宋儒之醇庶幾得詩人之意而為孔子所深論者歟汪琬序曰惠子元龍好為淹博之學所著詩說多所發明雖未知於孔子刪詩之意果合與否然博而不蕪質而不俚善辨而不詭於正亦可謂毛鄭之功臣夾漈紫陽之諍子矣詩經劄記一卷楊名時撰名時見易類詩經詳說無卷數冉覲祖撰覲祖見易類詩統說三十二卷黃叔琳撰叔琳見易類讀詩質疑三十一卷附録十五卷嚴虞惇撰虞惇字寶成常熟人康熙丁丑進士第二官至太僕寺少卿臣等謹按是編乃其孫湖南驛鹽道有禧刋刻乾隆十二年曾呈御覽大㫖宗小序而參以集傳亦間附已說於毛朱兩家擇長棄短確有所見頗能破除門户之習復庵詩說六卷王承烈撰承烈字復庵涇陽人康熙己丑進士官翰林院檢討毛詩通義十四卷方葇如撰葇如見易類詩經測義四卷李鍾僑撰鍾僑字世邠安溪人康熙壬辰進士官翰林院編修降補國子監丞鍾僑自述略曰夫子未嘗刪詩特據所得編之而已若謂三千刪為三百則春秋時君卿大夫所賦多三百篇中所有且其人皆在夫子之前豈能預合聖人之意而去取之風雅正變之說亦難據楚茨以下瞻洛諸篇皆承平之作而列之於變平王之孫列在二南編詩不必以正變為低昂正變不必以世代為前後詩經旁參二卷應麟撰麟見易類毛詩類釋二十一卷續編三卷顧棟髙撰棟髙見易類陸堂詩學十二卷陸奎勳撰奎勳見易類詩經廣大全二十卷王夢白陳曾同撰夢白字金孺曾字衣聖皆無錫人韓菼序曰廣大全一書以集傳為主而存毛鄭之足存者又間及周禮儀禮注疏及他名物諸書以資博覽其言曰大全一書采羣經而或割裂片語未備本末引諸家論說而或未有折衷夫是以廣之也二君之於詩也亦勤矣往顧先生亭林嘗語余自五經有大全而經學衰大全者當時奉詔趣成之書殊多闕略且勸余凡宋元說經諸書無論當否宜悉儲之余竊韙之今二君何乃不謀而志與之合也詩經序傳合參無卷數顧昺撰昺見易類毛詩說二卷諸錦撰錦字襄七號草廬秀水人雍正甲辰進士改庶吉士散館外補知縣改補教授乾隆丙辰復舉博學鴻詞授翰林院檢討官至右春坊右贊善學詩闕疑二卷劉青芝撰青芝字芳草襄城人雍正丁未進士改庶吉士詩貫十八卷張叙撰叙見易類毛詩訂韻五卷謝起龍撰起龍字天愚餘姚人嵗貢生臣等謹按起龍自序發明陸德明古人韻緩不煩改字之說詆吳棫韻補之謬然所論古音之外有所謂叶韻但以音屬讀取其順吻而止則是與吳棫均為臆定之書耳詩義記講四卷夏宗瀾撰宗瀾見易類詩經提要録三十一卷徐鐸撰鐸見易類豐川詩說二十卷王心敬撰心敬見易類心敬自述曰自宋至今毛氏之傳廢於朱傳之盛行郝敬云序近古而朱在後不合以後說而反廢前說固為得之然使後說而合經安在不可舍前而遵後且齊魯韓三家盡在毛詩之前而皆以毛傳盡廢安在後之更合者不可獨行又將謂毛序必承傳有自不可改不思三家之傳亦必承傳有自而一廢盡廢何也詩經拾遺十三卷葉酉撰酉字書山桐城人乾隆己未進士官至左春坊左庶子降編修風雅遺音四卷史榮撰榮號雪汀鄞縣人臣等謹按是書謂朱子集傳原本有音未備其音多後人妄加故以集傳與音互相考證詳辨其剌謬之處共二十四類持論頗精然於今音考究甚詳古音則茫無所解至於舊音偶有舛謬輒肆詆諆則亦從來釋經家所未有此體也詩深二十六卷許伯政撰伯政見易類三家詩拾遺十卷詩瀋二十卷范家相撰家相字蘅洲㑹嵇人乾隆甲戌進士官至栁州府知府臣等謹按三家詩拾遺補王應麟詩考所未備所採頗為該博詩瀋則其伸明古義者也詩序補義二十四卷姜炳璋撰炳璋字石貞號白巖象山人乾隆甲戌進士官石泉縣知縣綱領曰詩有詩人之意有編詩之意如雄雉為婦人思君子凱風為七子自責是詩人之意也雄雉為刺宣公凱風為美孝子是編詩之意也朱子順文立義大抵以詩人之意為是詩之㫖國史明乎得失之迹則以編詩之意為一篇之要詩疑辨證六卷黃中松撰中松字仲嚴上海人虞東學詩十二卷顧鎮撰鎮字備九號古湫亦號虞東常熟人乾隆甲戌進士官至宗人府主事臣等謹按是書大㫖在調停小序集傳兩家之說繁稱博引不下數十家而於歐陽修蘇轍吕祖謙嚴粲四家為最多潛心疏解斟酌持平破除門户之見與姜炳璋詩序補義體例雖殊其有禆於讀詩者則一也毛詩廣義無卷數紀昭撰昭字懋園獻縣人乾隆丁丑進士官內閣中書舍人詩經彚詁二十四卷范芳撰芳字令則如臯人詩經正解三十卷姜文燦撰文燦字我英丹陽人右詩皇朝文獻通考卷二百十三
