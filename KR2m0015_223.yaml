body:
  text: 欽定四庫全書皇朝文獻通考卷二百二十三經籍考十三史地理臣等謹按地理一門條目綦繁禹貢所紀職方所掌其書古矣後人著録體例雜糅要其編排不容無次四庫全書所紀宫殿而下首總志次都會郡縣次河渠次邊防次山川次古迹次雜記次遊記次外記部别州居逈殊馬考之叢雜今從其例輯之欽定皇輿表十六卷康熙十八年翰林院掌院學士扎薩哩等奉敕纂四十三年翰林院掌院學士揆敘等奉敇增修聖祖仁皇帝御製序曰粵稽在昔帝王體國經野莫不坐撫輿圖協同倫軌所以禹貢山川繫以州域職方風土辨乃井疆簡牒之所陳詩書之所紀粲然其可覩矣朕萬幾時暇加意問學自經史而外凡可羽翼大猷兼資治理者咸務旁搜博討觸類貫通顧循覽地輿稱名屢易以今準古端緒棼如考鏡之餘不能無遺憾焉從來土壤有定建置無常上溯唐虞下迄勝國閲四千年之久歷二十三代之遙損益廢興難以具舉可證據者莫如正史而正史復有差訛至詳備者莫如通志而通志更多附會一統之世沿革尚殊竊據之秋紛糾益甚異同錯見名實不符非極泝流窮源之力何以規千載於目前臚方輿如掌上哉夫從志體則此詳彼略間有闕遺從表體則地緯時經期于徵信用是特命儒臣仿史表例校讐編輯或始分而後并或暫合而終離郡屬統名縣稽實土總前史以鉤索彚百派於同源信所謂若網在綱有條不紊者也書成進御凡若干卷名曰皇輿表仍製序簡端俾垂永久豈獨畫疆析理較若列眉其間都邑之變更控扼之形勝爭戰之地利設險之遺規固有不踰席而周知一展卷而畢照者則是書佐歷代地志之不逮周資治理其庶幾歟聖祖仁皇帝御製增修皇輿表序曰皇輿表一編肇成於康熙己未製序卷端時置几案歷有年所顧原編紀載沿革於郡縣特詳其地列輿圖而未設有郡縣者概未編入朕惟國家統御方夏覆載之內視均一體外藩蒙古諸屬國自祖宗朝後先收服次第歸誠逮朕臨御以來藩王君長歲時貢琛悉比內地繡壤相錯不啻萬有餘里邇者喀爾喀青海部衆稱臣嚮附土宇益廓計其山川封域斥堠之所屆分野之所屬皆按地而可考也至于山陬海澨新隸職方者二十餘年間建州樹邑往往而有又若朝鮮交趾諸國之奉職惟虔邊徼土目之革心效順亦從來志方輿者所宜備載爰命儒臣更加增輯共十有六卷書成特命刋梓用示來兹於戲幅員延袤亦云廣矣而蕃生息厚風俗之道則實資于廟堂之經理朕開編循覽深念高卑險易形勢不齊燥濕剛柔風氣各異然而秉彝恆性遐邇皆同朕以一身為中外元元主惟是張官置吏以牧民生禁暴設防以禦民患既鞠養之務遍尤教化之宜周早夜孶孶無日不心通乎四海九州之隱書不云乎自朝至于日中昃不遑暇食用咸和萬民凡我後人覩是編者知創造之維艱思懷柔之不易則千百祀無疆之歷服其庶克永荷天庥也夫欽定方輿路程考略不分卷臣等謹按是書無刋本康熙中中允汪士鋐等奉敕撰進以各直省為經以府州縣為緯各直省及各府州縣皆序以次首考至京師路程次考四境壤接之道里逺近兼詳歷代建置沿革旁及山川關梁古迹寺觀祠墓至若皇朝肇建之規模聖製詩文之美富敬謹紀載用昭明備而古今藝文足資考證者亦間録云大清一統志五百卷乾隆二十九年奉敕撰皇上御製序曰惟上天眷顧我大清全付所覆海隅出日罔不率俾列祖列宗德豐澤溥威鑠惠滂禹迹所奄蕃息殷阜瀛壖炎島大漠蠻陬咸隸版圖置郡築邑聲教風馳藩服星拱稟朔內附六合一家逺至開闢之所未賔梯航重譯歷嵗而始達者慕義獻琛圖于王會幅隕袤廣古未有過焉聖祖仁皇帝特命纂輯全書以昭大一統之盛卷帙繁重久而未成世宗憲皇帝御極之初重加編纂閲今十有餘載次第告竣自京畿達于四裔為省十有八統府州縣千六百有竒外藩屬國五十有七朝貢之國三十有一星野所占坤輿所載方䇿所紀憲古證今眉列掌示圖以臚之表以識之書成凡三百五十餘卷夫肇十有二州見於虞典禹貢一篇備列九州疆域山川土田貢賦物産實為方志之權輿周禮大司徒以天下土地之圖周知地域廣輪之數辨其山林川澤邱陵墳衍原隰之名物土訓道地圖誦訓道方志職方氏掌天下之圖辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人與其材用九穀六畜之數漢郡國地志與計書俱上太史厥後寰宇志記列于正史者代數十家蓋將以觀民設教體國經野表皇威之有截明王道之無外匪徒備掌故徵博洽已也撫疆宇則念肇造之難稽制置則念經畫之要采謡俗則念化導之方考循良人物而知治理之效念所以振興而長育之核户口土賦而察登耗之故念所以懷保而蕃殖之書曰皇天既付中國民越厥疆土于先王肆王惟德用和懌先後迷民用懌先王受命我祖宗克明峻德以有九有之師傳緒在豫敢不惟德之勤篤前人成烈其在我內外百職事慎固封守阜成兆民懋相豫修和有夏亦越我後嗣子孫咸敬厥德以昭受丕基萬年惟無斁覽斯編也其善體諸臣等謹按康熙間刑部尚書徐乾學奉敕總裁一統志罷歸之頃奏請設局于蘇州之洞庭山一時稱地理之學如顧祖禹閻若璩黃鴻胡渭等皆與其役而迄未有成世宗憲皇帝敕館修輯至乾隆九年奏竣嗣以我皇上天威震疊勘定西域拓地二萬餘里為自古輿地所未紀而各省添設裁併府廳州縣與職官之增減移駐亦多與舊制異同乃奉詔重修每省皆先立統部冠以圖表首分野次建置沿革次形勢次職官次户口次田賦次名宦皆統括一省者其諸府州縣及直隸州又各立一表而系以所屬皆首分野次建置次沿革次形勢次風俗次城池次學校次户口次田賦次山川次古迹次關隘次津梁次堤堰次陵墓次寺觀次名宦次人物次流寓次列女次仙釋次土産分門二十有一而外藩及朝貢諸國咸附録焉又以乾隆四十年勘定冉駹開屯列戌昄章益廓因並載入簡編蓋我國家土宇宏開德威遐播山河兩戒並隸職方自有書契以來志輿圖者孰有如是之大一統而擴無外者乎天下郡國利病書一百二十卷顧炎武撰炎武見經類增訂廣輿記二十四卷蔡方炳撰方炳見政書類臣等謹按明陸應暘曾作廣輿記方炳取而增訂之然大抵鈔襲明一統志而於前代之規模皆未及考證焉閲史津逮無卷數朱約淳撰約淳字博成餘姚人順治辛丑進士官泰安縣知縣歷代輿地徵信編殘本六卷錢邦寅撰邦寅字馭少丹徒人山河兩戒考十四卷徐文靖撰文靖見經類凡例曰唐書天文志一行大衍厯厯議十篇八曰分野謂天下山河之象存乎兩戒分南北以界之文靖上考分星下稽輿地卷首為圖二十有四書凡十四卷前八卷注唐志也後六卷參考晉隋宋三史文靖所附也其中補春秋列國一百七十有九合一行所分載者總三百一十仍列于各次之下至於三垣五緯雲漢之始終雜星之妖瑞亦别為一條載在卷末古今約説無卷數邵元龍撰元龍松江人右地理類總志皇清職貢圖九卷乾隆十六年大學士傅恆等奉敕撰臣等謹按是編首列朝鮮以下諸外藩次列諸藩諸蠻各以所隸之省為類恭際聖武逺揚平定西域拓地二萬餘里增入各部落三百餘種分圖系説共為七卷乾隆二十三年告成逮二十八年以後愛烏罕霍罕齊齊玉斯諤爾根齊諸部咸奉表入覲土爾扈特全部自俄羅斯來歸雲南整欠景海諸土目又相繼內附乃廣為續圖一卷每圖各繪其男女之狀衣冠之别纖悉畢陳一一徵諸實見於以知我國家威稜震疊德化遐宣河源月􅒸之外重九譯而來者洵非兵革所能致而保泰持盈之意猶具著於御題長律之中宜乎膺景命而申錫無疆者益鞏金甌于萬祀已欽定皇輿西域圖志五十二卷乾隆二十一年大學士劉統勳等奉敕撰皇上御製序曰語云耕當問僕織當問婢志廣輿者不稽之歷代建置沿革將無從數典而志西域則有不能盡稽之歷代者實以幅員所限言語不通雖漢唐盛時亦頗能威行天山迤北建官設都而天山迤北本不能至也即有一二羈縻之國然叛服不常征調弗應又安能履其地而疆索之哉且漢唐之程督異域者仍漢唐人而已其與準噶爾回部人語奚啻粵問而燕答則其所記魯魚亥豕之分不待言而可知茲者叨天佑藉羣力湊時會幸成是役準噶爾回部之人皆在廷執事而國語切音譯外藩語又甚便且易我諸臣馳驅往來其間目覩身歷非若耳聞口傳者比俾司校勘而正其訛傳其真較僕婢耕織之問為尤詳且厄魯特語及回語朕亦因暇而習焉時御丹槧為之改正是西域志之書必應及是時成之用開歷代之羣疑垂千秋之信録間亦涉及諸史以存述古總計分部一十有八分卷四十有六繪圖系説蔚為完書若夫闢地蕆功文臣或有過頌朕所不取惟是籌耕牧計久長圖所以永乾貺奠丕基思日孜孜持盈益凛豫安得有功成無事之説哉欽定日下舊聞考一百二十卷乾隆三十九年奉敕撰臣等謹按是編據朱彝尊日下舊聞原本於十三門外增苑囿官署二門而併石鼓考於國子監刪繁補缺援古證今詳加考核定為此本至於列聖宸章皇上御製涉於神京風土者悉案門恭載以昭垂典實凡原本所托引古書古迹並承聖訓指示精詳正訛補漏一一徵驗有無勘其所在千古輿圖紀述都邑孰能如是之信而可徵者哉欽定滿洲源流考二十卷乾隆四十二年大學士阿桂等奉敕撰臣等謹按是編列為四門一曰部族述肅慎氏以下源流二曰疆域附以宫室建置及古迹三曰山川凡白山黑水諸名勝悉皆採列四曰國俗以官制及文字附焉蓋我朝自白山天作朱果靈彰年祀綿長見聞或異我皇上溯發祥之有自慮傳信之無徵特命纂輯是書援引舊文考驗地理據見聞之實汰史傳之訛本本原原允堪垂示千古洵讀史家所宜奉若球圖者矣欽定蒙古源流八卷蒙古小徹辰薩囊台吉撰乾隆四十二年奉敕譯進臣等謹按是書體例頗與永樂大典中所載元朝祕史相類大旨以佛教為綱而並載蒙古之世系始末興衰治亂之迹其于塞外立國傳授源流以及人名地名語言音韻皆極詳核自非中國史官附會影響者可比惟間及內地之事未能盡確前此我皇上因元戎竒渥溫得姓所自必有傳訛詢之定邊左副將軍喀爾喀親王成衮扎布乃以此書進御而後竒渥溫為却特之誤昭然共明特命以是編宣付館臣譯以漢文排比成帙從前之沿訛襲謬今皆釐訂精詳不特仰窺聖學之神竒且益以見中外一家之盛焉欽定盛京通志一百卷乾隆四十三年大學士阿桂等奉敕撰臣等謹按凡例曰盛京為王迹肇基首隆謨誥我皇上四詣陪京大文彌耀謹志聖製綸音天章辨諸志首考卜興京遷都遼瀋為豐鎬遺規至若壇廟宫殿山陵創制典禮嚴重謹稽實録及會典諸書詳志以彰規制星野建置疆域山川城池皆遵旨訂正悉載舊名並恭録開國戰迹其疆里逺近謹遵欽定輿圖詳核臚識舊志關津於吉林黑龍江邊門多所闕略户口田賦於旗田莊官園場賦則亦多疏漏兹悉詳訂增所未備志職官次官署以專職守志學校次選舉以簡才良武備尤要增志兵防名宦以彰治行人物以勵材能舊志於遼金宗室俱不載又但志遼瀋不及吉林黑龍江未為核備今悉增入至開國功臣事迹謹遵國史傳按其於盛京有治行戰迹者一一臚載其事在入關以後者詳見國史及八旗通志兹不備録忠孝節義文學隱逸流寓方伎仙釋列女皆足以資采訪驗風教悉志如例祠祀有關祭法翠華四蒞遼渾諸河特建專祠古剎精藍亦多搜輯謹志祠祀又古迹舊志繁簡失當兹詳考史傳分隸郡縣名勝各以類次奉天風俗淳朴物産豐饒兹博稽前史謹遵欽定滿洲源流考詳晰編纂志風俗物産並旁采異聞為雜志一卷列朝藝文舊志體例未協兼多遺闕今搜羅史集按照時代分體編輯至國朝藝文凡臣下賦頌及賡紀詩篇俱各依類編次讀是編者撫今考昔展卷瞭如不獨留都典故燦著寰瀛而列聖啓佑之鴻規亦昭垂於無極也已欽定熱河志一百二十卷乾隆四十六年户部尚書和珅等奉敕編輯皇上御製序曰為各省之志書易為熱河之志書難彼其以漢人書內地事且各府州縣本有晉乘楚檮杌薈而輯之其易也不待燭照數計而龜卜也熱河之志則以關外荒略非內地而遼金元之史成於漢人之手所謂如越人視秦人之肥瘠忽然故曰難夫遼金元非若唐宋之興於內地而據有之也又其臣雖有漢人通文墨者非若唐宋之始終一心於其主語言有所不解風尚有所不合且遼金元皆立國不久旋即遜出則所紀載欲其得中得實蓋亦難矣夫遼金元之史紀內地而欲其得中得實尚且難之況紀邊關以外荒略之地乎其不能得中得實亦益明矣當今之時熱河之志不可不成者則以本朝荷天之寵百有餘年纍洽重熙漢人已數世被覆載生育其語言風尚薰陶漸漬不可以遼金元之漢臣例之亦理之必然况我皇祖建山莊於此地非為一己之豫遊實貽萬世之締搆而顧可無書以垂永久乎山莊內本有溫泉出而滙武列之水俗遂有熱河之稱兹雖為府為縣而仍以熱河稱之者存其朔便於衆也皇祖有詩云聚民至萬家蓋篳路之際人煙尚少後乃閭閻日以富耕桑日以闢至于今將百年屹為都會皇祖雖嘗名之曰避暑山莊序詠三十六景而未輯志者其或有待耶抑亦文獻不足徵而遲遲為之耶山川里邑建置沿革與夫古迹人物司事之臣雖捃托遺逸猶有未備未信者其説具見於前而吾之序是書以行世者正所云在此不在彼臣等謹按志以熱河名者行殿所在不得冠以州郡之目也地即古武列水遼金元以來皆陪京重鎮太宗文皇帝泰武宏昭先定其地嗣康熙中喀爾喀納土輸誠益宏文囿聖祖仁皇帝因建避暑山莊於此鑾輿嵗蒞凡以省方奮武答中外之就瞻我皇上紹繩先緒亦以每嵗夏秋翠華行幸攜漿擁篲而迎者率以為常盛典頻仍史不勝紀是編所載首天章次巡典次徠逺次行宫次圍場次疆域次建置沿革次晷度次山次水次學校次藩衛次寺廟次文秩次兵防次職官次宦迹次人物次食貨次物産次古迹次故事次外紀次藝文凡二十四門並考古證今析疑徵信實輿記之大觀為古今所未有也畿輔通志一百二十卷兵部尚書直隸總督李衛等監修臣等謹按北平自元建都以後有析津志諸書明代各省皆有通志而獨闕畿輔至我朝康熙十一年巡撫于成龍等始創成之雍正七年復遵旨重修督臣唐執玉劉于義李衛等遞董其事雍正十三年書成江南通志二百卷兵部尚書兩江總督趙宏恩等監修臣等謹按康熙二十二年部檄兩江總督于成龍江蘇巡撫余國柱安徽巡撫徐國相等創修通志編成凡七十六卷雍正七年署兩江總督尹繼善等遵旨重修其後督臣趙宏恩江蘇撫臣顧琮安徽撫臣趙國麟等相繼董成凡隸上江者安徽藩司主之隸下江者江蘇藩司主之乾隆元年書成江西通志一百六十二卷江西巡撫都察院右副都御史謝旻等監修臣等謹按明嘉靖間參政林庭㭿創為省志其後久不修輯遂至散佚國朝康熙二十二年巡撫安世鼎五十九年巡撫白璜相繼重修名曰西江志雍正七年又遵旨增修十年書成浙江通志二百八十卷文華殿大學士兼吏部尚書兼管浙江總督嵇曾筠等監修臣等謹按明提學副使薛應旗嘗于嘉靖中輯浙江通志七十二卷國朝康熙二十一年總督趙士麟巡撫王安國復因薛志增修為卷五十分門三十有七雍正七年督臣嵇曾筠李衛郝玉麟程元章撫臣王國棟提督李燦等遵旨相繼重修增為五十四門十三年書成福建通志七十八卷兵部尚書浙閩總督郝玉麟等監修臣等謹按福建輿地諸書惟明黃仲昭八閩通志為最善自我朝開國以來建置沿革與昔多異雍正七年命各省纂輯通志督臣郝玉麟撫臣盧焯學臣周學健等遵旨增修舊志凡六十四卷尋以增設臺灣福寧二府永春龍巖二州續十四卷乾隆二年書成湖廣通志一百二十卷總督湖廣等處地方兵部尚書兼都察院右副都御史邁柱等監修臣等謹按前史所載楚中輿記不下數十家其非殘缺散亡即冗雜闕漏本朝康熙二十三年遂創成通志雍正七年復命增輯督臣邁柱並湖北撫臣魏廷珍王士俊德麟湖南撫臣趙宏恩等遵旨重修十一年書成湖南通志一百七十四卷大學士陳宏謀等監修臣等謹按湖廣全省在唐分武安荆鄂二鎮在宋分荆湖南北兩路至明代始合為一國初尚沿其舊至康熙三年析置湖南布政司於是復分為兩省後邁柱等修通志時依上下江之例亦合湖南北為一書乾隆二十一年宏謀巡撫湖南以全志詳於北而略於南遂與藩臬諸臣復為搜輯於全志之所無者則增而有之全志之所缺者則補而全之分類三十有七而卷帙之富反過于全志云河南通志八十卷續通志八十卷總督河南山東軍務兵部右侍郎王士俊等監修巡撫河南兵部侍郎阿思哈等重修臣等謹按中州之地明初惟有各郡縣偏記至嘉靖中始有成書然未為詳悉順治十五年河南巡撫賈漢復令分巡大梁道副使沈荃纂通志五十卷分三十類雍正七年遵旨重修督臣田文鏡王士俊撫臣孫國璽河督嵇曾筠朱藻白鍾山副總河阿蘭泰劉勷學臣吳應棻鄒升恆等相繼代領其事增為八十卷十三年書成逮我皇上御極之三十一年詔重修一統志徵直省通志上諸史館巡撫阿思哈因取原書補其遺闕復增八十卷山東通志三十六卷巡撫山東都察院右副都御史嶽濬等監修臣等謹按舊志始於明嘉靖中巡按御史方逺宜副使陸鉞等為卷四十為目五十有二附目十國朝康熙十二年巡撫張鳳儀藩司施天裔再輯擴前志十之三四雍正七年濬與法敏等又遵旨重修十三年書成山西通志二百三十卷巡撫山西都察院右副都御史覺羅石麟等監修臣等謹按明成化中督學僉事胡謐嘗撰為通志至嘉靖中副使周斯盛萬厯中按察使李維禎嘗兩修之國朝康熙二十一年提督學政劉梅又踵事排纂分類三十有二雍正七年遵旨重修十二年書成陜西通志一百卷署理陜西總督吏部尚書劉於義等監修臣等謹按舊志五十卷為康熙初年巡撫賈漢復所編雍正七年遵旨重修董其事者督臣查郎阿劉於義撫臣史貽直瑪爾泰碩色學臣王蘭生等取原書增為百卷十二年書成甘肅通志五十卷巡撫甘肅都察院右副都御史許容等監修臣等謹按明代甘肅府州即隸陜西至本朝康熙年間始别為一省雍正七年有增修通志之命於是容等遵旨纂修其凡例曰甘肅舊無志統於陜西通志中陜西詳於西安延安鳳翔漢中興安諸郡而略於平鞏臨慶至河西諸衛所則尤在所略今分二省自應詳輯越乾隆元年書成四川通志四十七卷總督四川兵部右侍郎兼都察院右副都御史黃廷桂等監修臣等謹按舊志在明凡四修我朝康熙十二年總督蔡育榮巡撫張德地又續事纂輯是編乃雍正七年遵旨重修十一年書成廣東通志六十四卷巡撫廣東兵部右侍郎兼都察院右副都御史郝玉麟等監修臣等謹按嶺南輿地自漢魏以至明代記載甚多然皆不能詳備至聖祖仁皇帝二十二年始纂成通志雍正七年復遵旨重修而撫臣郝玉麟鄂彌達等踵相採輯乃稱該備九年書成廣西通志一百二十八卷巡撫廣西都察院右副都御史金鉷等監修臣等謹按自史記有桂林象郡之名而粵西輿志乃代有作者然而古今之形勢既殊則建置之更張不一雍正七年命修通志于是督臣鄂爾泰遵旨纂輯歷高其倬尹繼善以至撫臣金鉷相續編輯十一年書成雲南通志三十卷大學士鄂爾泰等監修臣等謹按滇中地志實昉于唐明藝文志載洪武既平雲南諸儒臣定為志書六十一卷今已無存本朝康熙三十年始復輯為成書雍正七年遵旨重修時鄂爾泰總督雲貴因舊志而增損之繼其事者為督臣高其倬尹繼善撫臣張允隨等分為三十卷乾隆元年書成貴州通志四十六卷大學士鄂爾泰等監修臣等謹按貴州為西南僻壤故凡紀載之書自唐宋以前未聞作者明趙瓚始創為新志而謝東山郭子章輩踵而修之國朝康熙初巡撫曹申吉重加釐訂為書三十三卷雍正七年遵旨重修較他省通志最後成凡經督臣鄂爾泰尹繼善張允隨張廣泗撫臣元展成諸人之手而始告竣增為四十六卷乾隆六年書成歷代帝王宅京紀二十卷顧炎武撰炎武見經類臣等謹按是書考歷代帝王所都斷自黃帝終於故明其偏安者各按時代附焉海昌外志無卷數談遷撰遷字孺木一字仲木海寧人西寧志七卷蘇銑撰銑交河人順治丙戌進士官至廣東道續安邱志二十五卷王訓撰訓字敷彝安邱人順治丁亥進士官萬全縣知縣永平府志二十四卷宋琬撰琬字玉叔號荔裳萊陽人順治丁亥進士官至四川按察使杞紀二十二卷張貞撰貞字起元號把園安邱人康熙壬子拔貢官翰林院孔目貞自序曰貞族世居濰河東岸莊號高柯實在把子故域貞涉獵史傳見其有關於把者悉掌記之積紙篋衍漫不省録忽忽十年丙戌夏偶有所觸因憶前事從煙煤蟲篆中檢付兒子在辛釐為二十二卷曰圖考曰星土曰輿地曰山川曰繫年曰沿革曰封建曰年表曰世次曰原古曰分國曰系家曰苗裔曰春秋經傳曰經傳别解曰人物曰遺書曰藝林曰雜綴所引書四百有餘種蕭山縣志刋誤三卷杭志三詰三誤辨一卷毛竒齡撰竒齡見經類臺灣紀略一卷林謙光撰謙光字芝楣長樂人臣等謹按國初明臣鄭克塽竊據臺灣負固梗化康熙二十三年始克平定謙光因作是編分十三篇末附以澎湖之志因初經開闢草創未就故名為紀略而不稱志焉登封縣志十卷張聖誥撰聖誥字紫書號韋菴廣寧人官登封縣知縣琅鹽井志四卷沈鼐撰鼐字枚臣長洲人由貢生官雲南琅鹽井鹽課提舉師宗州志二卷管掄撰掄武進人官師宗州知州遼載前集二卷林本裕撰本裕字益長奉天人本裕自序曰是編折衷於盛京志其前集則仿龍門志乘後集則仿涑水編年揚州府志四十卷張萬壽撰萬壽字鶴秋浮山人官至揚州府知府河套志六卷陳履中撰履中字執夫商邱人官至分巡寧夏兵備道澳門紀略二卷印光任張汝霖同撰光任字黻昌寶山人官至太平府知府汝霖字雲墅宣城人由拔貢生官至澳門同知右地理類都會郡縣欽定河源紀略三十六卷乾隆四十七年皇六子永瑢皇八子永璇皇十一子永瑆大學士公阿桂等奉敕撰皇上御製河源簡明語曰豫既為河源詩並按語既讀宋史河渠志有文命輯河源紀略有諭兹以體大物博考今證古不無費辭雖彼此細勘事則明恐毫釐稍差義乃紊兹為簡明之語庶因提要而便覽蓋河源究以張騫所探蒲昌海鹽澤及漢武所定昆侖為是雖山海經水經注皆略具其説山海經劉歆稱伯益所著本無所據水經注則桑欽酈道元皆張騫後人實祖其説而廣之以至於煩文且昆侖在回部原出玉也獨未明揭伏流至青海於阿勒坦噶達素之天池而出耳歷唐宋以至元乃有鄂敦淖爾為河源之語鄂敦為蒙古語漢語即星宿海也彼時雖未考至天池而中國之河源實由此頗見梗概矣溯伏流以至蒲昌海鹽澤非河源而何星宿海亦鹽澤之伏流至青海而出為清水黃河挾之以流始為微淡後為純黃是二水本一源至中國出地為二色而終歸于一若夫曲折纖細則見近所為詩文及紀略之書獨敘其簡明崖略如此臣等謹按是年春有事豫工上命侍衛阿彌達祭告西寧河神因西溯河源繪圖具奏言星宿海西南三百餘里有阿勒坦郭勒水色獨黃又西有阿勒坦噶達素齊老流泉百道入阿勒坦郭勒是為黃河真源為自古探索所未及皇上因考徵實驗參訂舊文御製河源詩一章並讀宋史河渠志一篇闡河出昆侖之實古今訛誤曠若發蒙復命諸臣綜覽史文旁稽字説撰定是編綜為一書首卷冠以御製詩文次曰圖説三卷曰列表五卷曰質實五卷曰證古六卷曰辨偽六卷曰紀事六卷曰雜録四卷由是河源脈絡摹繪精詳一展卷而瞭如指掌蓋由帝德廣運無逺弗周是以星使宣勞奉職克稱數百年沿訛襲謬始得真源豈張騫篤什之流粗陳梗概者所可同日語哉河紀二卷孫承澤撰承澤見經類承澤自跋曰此非如史家河渠蓋漕政也漕之通塞視乎河河安則漕安河變則漕危重漕故重河所紀者治之人治之事治之言具區志十六卷翁澍撰澍字季霖吳縣人兩河清彚八卷薛鳳祚撰鳳祚見經類北河續記八卷閻廷謨撰廷謨孟津人順治丙戌進士官工部主事河防芻議六卷崔維雅撰維雅新安人順治丙戌舉人官至布政使治水要議一卷孫宗彝撰宗彝見經類新劉河志一卷婁江志二卷顧士璉撰士璉字殷仲太倉州人今水經一卷黃宗羲撰宗羲見經類山東全河備考四卷葉方恆撰方恆字學亭崑山人順治戊戍進士官至山東濟寧道水經注集釋訂訛四十卷沈炳巽撰炳巽字繹旃歸安人臣等謹按酈道元水經一書傳寫既久輾轉沿訛炳巽乃博取各史志中異同之詞及諸家考訂之説據明嘉靖中黃省曾所刋注本詳加校定歷九年而成是書其用心亦良苦矣水經注釋四十卷刋誤十二卷趙一清撰一清字誠夫仁和人全祖望述曰余嘗得先世舊聞謂道元水經注中有注本雙行夾寫今混作大字幾不可辨明江南治水記一卷陳士礦撰士礦號宿峯秀水人康熙初以貢生閣試授主事湘湖水利志三卷毛竒齡撰竒齡見經類崑侖河源考一卷明代河渠考無卷數萬斯同撰斯同見經類東南水利八卷沈愷曾撰愷曾歸安人康熙壬戌進士官至山東道監察御史居濟一得八卷張伯行撰伯行見經類臣等謹按是編乃伯行為河道總督時相度形勢録之以備參考於諸水利病條分縷析疏證頗詳切於實用治河奏績書四卷靳輔撰輔見奏議類張大有序曰輔開白洋清河以東引河水開清爛泥淺諸引河開雲梯關出海故道築周橋六壩堤工置減水壩濬中河以避黃河之險改挑皂河以避駱馬湖之淤墊皆其仰遵廟算悉心籌畫者也臣等謹按輔遭逄聖祖仁皇帝平成天地故能于隄防規畫言所欲言凡所入告俱蒙俞旨其論築堤岸疏下流塞決口有先後而無緩急具見綱領十六年間三膺總河之任成勞懋著迄今兖豫之間猶馨香弗替云直隸河渠志一卷陳儀撰儀字子翽號一吾文安人康熙乙未進士官至翰林院侍講學士充壩州等處營田觀察使行水金鑑一百七十五卷傅澤洪撰澤洪字稚君鑲紅旗漢軍人官至分巡淮揚道按察副使澤洪自序曰四瀆古運河也沿江達淮亂河浮濟禹貢具載之矣今之運河用以轉荆揚諸州數十百萬之糧於京師不猶古之江淮河濟哉四瀆治運河亦治相因之勢也顧黃河湍悍為中州病淮水渟蓄為高堰危黃強淮弱為清口梗山左泉涸水匱濟汶諸水俱不足以濟運而運河淺阻澤洪為水官二十年用是逺稽經史近述訓旨凡四瀆運河興廢之由及疏築塞防之宜皆備載焉首繪圖次河淮漢江濟運河次兩河總説次官司次夫役次河道錢糧次隄河彚考次閘壩涵洞彚考次漕規次漕運太湖備考十六卷金友理撰友理字玉相吳縣人水道提綱二十八卷齊召南撰召南字次風台州人乾隆丙辰召試博學鴻詞授翰林院編修官至禮部侍郎治河前䇿二卷後䇿二卷馮祚泰撰祚泰字粹中滁州人乾隆壬申舉人水鑑六卷郭起元撰起元閩縣人官至宿虹同知安瀾文獻一卷沈光曾撰光曾秀水人官高郵州知州光曾自序曰潘季馴稱河不兩行乃泇河未創中河未開以前以黃河為運道故有是説今則運道自清河桃源以上已無藉於黃自宜隨時籌畫海塘録二十六卷翟均廉撰均廉見經類右地理類河渠海防述略一卷杜臻撰臻見傳記類臣等謹按康熙二十二年臻奉詔往閩粵定疆理目擊沿海險要及往來䇿應諸形勢乃作是編其于海防事宜言之甚鑿鑿可據延綏鎮志六卷談吉璁撰吉璁字丹石嘉興人由內閣中書官至登州府知府蠻司合志十五卷毛竒齡撰竒齡見經類竒齡自序曰蠻司踞湖廣貴州四川雲南廣東廣西六省曰犵曰狑曰獠曰獞凡數十種歷代各有大姓為領袖明踵元舊事遍設官吏盡布籍屬凡土官名號曰宣慰司曰招討司曰安撫司曰長官司初皆隸吏部驗封而後以土兵相制半隸武選每襲替必奉朝命其無子弟者即妻女皆得襲替嘉靖九年令該府州縣正二經歷巡檢驛傳三百六十隸驗封宣慰招討安撫長官一百三十三隸武選隸驗封者布政司領之隸武選者都指揮使司領之故自洪武暨崇禎一十六朝二百七十餘年之間凡沿革向背大征大役或得或失稍見史乘者略輯其大凡彚為一編江防總論一卷海防總論一卷薑宸英撰宸英字西溟慈溪人康熙丁丑進士官翰林院編修秦邊紀略四卷不著撰人名氏右地理類邊防皇朝文獻通考卷二百二十三
