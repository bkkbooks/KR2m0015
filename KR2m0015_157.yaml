body:
  text: 欽定四庫全書皇朝文通考卷一百五十七樂考三製造律吕臣等謹按造律始於黃帝司馬遷述之頗詳嗣後纍黍候氣聚訟紛如而京房之六十律錢樂之之三百六十律尤非音律之正我聖祖仁皇帝審定古今尺度製十二正律以和八音復廣為同形管六百九十有六凡笙箎管籥悉符乎長短倍半之體以成旋宫之用而後律吕之制始備兹謹考定尺造律長短圍積之數以明夫製造之本原而辨調旋宫之法則詳於律吕制度考康熙五年欽天監奏請定律五十三年御製律吕正義定尺造律黃鍾律分篇曰黃鍾之律有長與圍徑則有尺度有尺度然後數立焉黃鍾元聲原未絶於世而造律之尺獨難得其真然尺者所以度律而黍者所以定尺古今尺度雖各不同而律之長短自不可更黍之大小又未嘗變故黃鍾之分參互相求而可得其真也通志載夏尺十寸商尺十有二寸周尺八寸今黃鍾之長九寸非夏尺商尺亦非厯代諸尺乃本造律度十分之九也夫以夏尺商尺之度制為黃鍾之籥其容受逾於千二百黍固不必言嘗以今尺之八寸為周尺立法制為黃鍾之籥其容黍又少歉更以今尺之八寸一分立法乃恰合千二百黍之分始知古人定黃鍾之律蓋合九九天數之全以立度也且驗之今尺縱黍百粒得十寸之全而橫黍百粒適當八寸一分之限前漢志曰黃鍾之長以子榖秬黍中者一黍之廣度之九十分黃鍾之長一為一分夫廣者橫之謂也九十分為黃鍾之長則黃鍾為九十橫黍所纍明矣以橫黍之度比縱黍之度即古尺之比今尺以古尺之十寸即橫黍一百之度為一率今尺之八寸一分即縱黍八十一之度為二率黃鍾古尺九寸為三率推得四率七寸二分九釐即黃鍾今尺之度也依今所定之尺造為黃鍾之律考之於聲既得其中實之以黍又適合千二百之數然則八寸一分之尺豈非古人造律之真度耶定黃鍾縱長體積面羃周徑篇曰置黃鍾古尺積八百一十分以九十分歸之得面羃九方分用比例四率相求表內面線相等面積不同定數為比例以圓面積一十萬為一率方面積一十二萬七千三百二十四為二率今面羃九方分為三率推得四率一十一分四十五釐九十毫為圓面羃徑線相等正方面積以開平方得三分三釐八毫五絲一忽乃黃鍾古尺之徑數也求周則以周徑相求定數為比例以徑一百一十三為一率周三百五十五為二率今徑三分三釐八毫五絲一忽為三率推得四率十分零六釐三毫四絲六忽為黃鍾古尺之內周數也較以時尺則黃鍾古尺之積比今尺之積即古尺自乘再乘之數比今尺自乘再乘之數以古尺一百分自乘再乘得一百萬分為一率今尺八十一分自乘再乘得五十三萬一千四百四十一分為二率黃鍾古尺積八百一十分為三率推得四率四百三十分四百六十七釐二百一十毫乃黃鍾今尺之積也如求面羃則以今尺長七寸二分九釐歸之得面羃五分九十釐四十九毫如法求徑得二分七釐四毫一絲九忽是為黃鍾今尺之徑數也定律吕之長損益相生篇曰自古論律吕者必先考黃鍾之長黃鍾之長定而十一律吕皆由此定以古尺通之今尺比例推求然後真數可得以古尺言之黃鍾九寸得六寸為林鍾八寸為太蔟五寸三分三釐三毫三絲三忽三微三纎有竒為南吕七寸一分一釐一毫一絲一忽一微一纎有竒為姑洗四寸七分四釐零七絲四忽零七纎有竒為應鍾六寸三分二釐零九絲八忽七微六纎有竒為𬎼賓八寸四分二釐七毫九絲八忽三微五纎有竒為大吕五寸六分一釐八毫六絲五忽五微六纎有竒為夷則七寸四分九釐一毫五絲四忽零九纎有竒為夾鍾四寸九分九釐四毫三絲六忽零六纎有竒為無射六寸六分五釐九毫一絲四忽七微四纎有竒為仲吕仲吕三分益一得八寸八分七釐八毫八絲六忽三微三纎有竒比之黃鍾九寸不足一分二釐一毫一絲三忽六微六纎有竒以今尺言之黃鍾七寸二分九釐則林鍾得四寸八分六釐太蔟得六寸四分八釐南吕得四寸三分二釐姑洗得五寸七分六釐應鍾得三寸八分四釐𬎼賓得五寸一分二釐大吕得六寸八分二釐六毫六絲六忽六微六纎有竒夷則得四寸五分五釐一毫一絲一忽一微一纎有竒夾鍾得六寸零六釐八毫一絲四忽八微一纎有竒無射得四寸零四釐五毫四絲三忽二微有竒仲吕得五寸三分九釐三毫九絲零九微四纎有竒至仲吕上生比黃鍾原數不足九釐八毫一絲二忽零六纎有竒夫古尺之度為數多今尺之度為數少數多者橫黍之所生數少者縱黍之所纍數之多少雖異而管之長短則同今尺之七寸二分九釐正古尺之九寸也至於仲吕不能還生黃鍾乃數之使然蓋十二律吕上下相生損之漸少而益之不足故仲吕上生之變黃鍾雖不及黃鍾一分上下而其數仍與黃鍾相近不得自成一律其聲亦與黃鍾相近不能自成一音細繹其理下生而損上生而益損益之間數有消長亦如氣盈朔虛之有閏分此古人所以以律吕配之十二月也定律吕之積損益相生篇曰制律吕之法以積實容黍為要得黃鍾之真積然後中聲可定但古今尺度不同則縱長周徑因之而積實之數亦異必考核古今積數之異而驗以容受之同然後律吕之真分可辨也黃鍾積實古尺之八百一十分與今尺之四百三十分四百六十七釐二百一十毫為數不同而體之積分籥之容黍實未嘗異故十二律吕之積損益相生皆本於此黃鍾古尺之積八百一十分得五百四十分為林鍾七百二十分為太簇四百八十分為南吕六百四十分為姑洗四百二十六分六百六十六釐六百六十六毫有竒為應鍾五百六十八分八百八十八釐八百八十八毫有竒為𬎼賓七百五十八分五百一十八釐五百一十八毫有竒為大吕五百零五分六百七十九釐零一十二毫有竒為夷則六百七十四分二百三十八釐六百八十三毫有竒為夾鍾四百四十九分四百九十二釐四百五十五毫有竒為無射五百九十九分三百二十三釐二百七十三毫有竒為仲吕若夫今尺之積黃鍾之四百三十分四百六十七釐二百一十毫則林鍾得二百八十六分九百七十八釐一百四十毫太蔟得三百八十二分六百三十七釐五百二十毫南吕得二百五十五分零九十一釐六百八十毫姑洗得三百四十分一百二十二釐二百四十毫應鍾得二百二十六分七百四十八釐一百六十毫𬎼賓得三百零二分三百三十釐八百八十毫大吕得四百零三分一百零七釐八百四十毫夷則得二百六十八分七百三十八釐五百六十毫夾鍾得三百五十八分三百一十八釐零八十毫無射得二百三十八分八百七十八釐七百二十毫仲吕得三百一十八分五百零四釐九百六十毫夫製管取聲皆由于積實則十一律吕之積宜與黃鍾並詳而言律者多未及焉蓋因其所定之長與面羃相乘積數有未合耳至於黃鍾之籥積八百一十分容千二百黍蓋所積之分方分也所容之黍圓粒也以方分度圓粒則必有空隙故合八百一十分之方適容千二百黍之圓乃為虛實相應之凖則焉然論者亦止及黃鍾之容其他俱未載夫積分猶恐虛數之難慿而容粒則有實黍之可證故容黍之分亦當用三分損益以核之黃鍾容千二百黍得八百黍為林鍾一千零六十七黍為太蔟七百一十一黍為南吕九百四十八黍為姑洗六百三十二黍為應鍾八百四十三黍為𬎼賓一千一百二十四黍為大吕七百四十九黍為夷則九百九十九黍為夾鍾六百六十六黍為無射八百八十八黍為仲吕仲吕三分益一得一千一百八十四黍凡餘分過大半者進一黍不及半者不計古人制律有積分以驗實體有容受以驗積分所以互相比較務得律吕之真度故並著其同異俾觀者得取𠂻焉黃鍾加分減分比例同形得聲應十二律吕篇曰凡審樂音必協之十二律而制樂器則一本於黃鍾即黃鍾一徑别其長短為十二律吕復助以倍半而得五聲二變之全乃律吕之體即黃鍾本積加分減分比例成同形管而得各等黃鍾之長與徑又每一等黃鍾本形內各具十二律吕之分各有五聲二變之音是為律吕之用今以正黃鍾之積為本大而加分小而減分皆用黃鍾之長與徑相比成形故曰同形其大者加至八倍則長與徑各加一倍大凡圓體積加八倍則徑與長各加一倍小者減至八分之一而長與徑各減一半其餘諸管因用黃鍾本積加分減分之不同故長與徑亦隨之而各異至于求徑之法黃鍾本積與黃鍾加分減分積數之比即如黃鍾之徑與黃鍾加分減分徑數之比也故以正黃鍾之積為一率正黃鍾之徑自乘再乘為二率以今或加分或減分之積為三率推得四率立方開之為所求之徑求長之法黃鍾本積與黃鍾加分減分積數之比即如黃鍾之長與黃鍾加分減分長數之比也以正黃鍾之積為一率正黃鍾之長自乘再乘為二率以今加分減分之積為三率推得四率立方開之為所求之長或以所得之徑求面羃得面羃以除加分減分之積亦得所求之長此因體致用之大規也按法立制以考其度以審其音八倍黃鍾之管徑五分四釐八毫長一尺四寸五分八釐聲應正黃鍾之律濁宫低工字是篇所載尺度皆以今尺言七倍黃鍾之管徑五分二釐四毫長一尺三寸九分四釐五毫聲應大吕之吕清宫髙工字六倍黃鍾之管徑四分九釐八毫長一尺三寸二分四釐六毫聲應太簇之律濁商低凡字五倍黃鍾之管徑四分六釐八毫長一尺二寸四分六釐五毫聲應夾鍾之吕清商髙凡字四倍黃鍾之管徑四分三釐五毫長一尺一寸五分七釐二毫聲應姑洗之律濁角低六字至於三倍黃鍾之管得聲宜應仲吕之吕今則髙半音而應𬎼賓之律是知管體漸小聲音易别于三倍之積復加正黃鍾之半積始應仲吕之吕於是半積之理生焉故三倍半黃鍾之管徑四分一釐六毫長一尺一寸零六釐八毫聲應仲吕之吕清角髙六字三倍黃鍾之管徑三分九釐五毫長一尺零五分一釐三毫聲應𬎼賓之律濁變徴低五字二倍半黃鍾之管徑三分七釐二毫長九寸八分九釐四毫聲應林鍾之吕清變徴髙五字二倍黃鍾之管聲應南吕之吕而二倍半二倍之間始應夷則之律乃以半積復半之是為四分之一加于二倍之內其分適合於是四分之一之理生焉故二倍加四分之一黃鍾之管徑三分五釐九毫長九寸五分五釐二毫聲應夷則之律濁徴低乙字二倍黃鍾之管徑三分四釐五毫長九寸一分八釐四毫聲應南吕之吕清徴髙乙字正加四分之三黃鍾之管徑三分三釐長八寸七分八釐四釐聲應無射之律濁羽低上字正加四分之二黃鍾之管徑三分一釐三毫長八寸三分四釐四毫聲應應鍾之吕清羽髙上字正加四分之一黃鍾之管徑二分九釐五毫長七寸八分五釐二毫聲應半黃鍾之律濁變宫低尺字此管與正黃鍾最近欲取合清變宫之分則以四分之一復半之為八分之一加於正黃鍾之分其聲始得於是八分之一之理生焉故正加八分之一黃鍾之管徑二分八釐五毫長七寸五分八釐一毫聲應半大吕之吕清變宫髙尺字繼此則正黃鍾之律濁宫低工字與八倍黃鍾之管相應同聲由是而遞減之則黃鍾正積八分之七之管聲大吕之吕清宫髙工字其徑二分六釐二毫長六寸九分七釐二毫八分之六之管聲應太蔟之律濁商低凡字其徑二分四釐九毫長六寸六分二釐三毫八分之五之管聲應夾鍾之吕清商髙凡字其徑二分三釐四毫長六寸二分三釐二毫八分之四之管聲應姑洗之律濁角低六寸其徑二分一釐七毫長五寸七分八釐六毫八分之三半之管聲應仲吕之吕清角髙六字其徑二分零八毫