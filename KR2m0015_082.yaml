body:
  text: 職官考六理藩院理藩院掌蒙古及番部封授朝覲貢獻黜陟徵發之政控馭撫綏以固邦翰焉尚書一人左右侍郎各一人俱不分滿洲䝉古補授額外侍郎一人以䝉古貝勒貝子之賢者任之其屬有六清吏司曰典屬曰王㑹曰旗籍曰柔逺曰理刑曰徠逺臣等謹按順治十八年七月先設立四司録勲賓客柔逺理刑後於乾隆二十二年増定五司二十六年增設徠逺司典屬清吏司郎中滿洲䝉古各一人員外郎滿洲五人蒙古四人主事滿洲䝉古各一人掌游牧察哈爾除授官校喀爾喀及西徼䝉古厄魯特諸部落封爵㑹盟喇嘛畨僧承襲之事王㑹清吏司郎中滿洲䝉古各一人員外郎滿洲三人䝉古二人主事滿洲蒙古各一人掌科爾沁等部落朝貢禄賜之事旗籍清吏司郎中滿洲二人䝉古一人員外郎滿洲三人䝉古四人主事蒙古一人掌䝉古科爾沁等部落封爵㑹盟及歸化城索倫除授官校之事柔逺清吏司郎中滿洲一人員外郎滿洲二人䝉古三人主事滿洲䝉古各一人掌喀爾喀等部落及喇嘛畨僧朝貢禄賜之事理刑清吏司郎中滿洲蒙古各一人員外郎滿洲䝉古各三人主事滿洲一人掌蒙古及畨部刑罰之事徠逺清吏司郎中䝉古一人員外郎滿洲䝉古各二人主事滿洲蒙古各一人掌哈宻吐魯畨及囘部爵禄貢賦並移駐回民耕牧之事臣等謹按舊設四司每司有漢主事一人俱於康熈三十八年裁滿洲䝉古司官增减不一俱不分滿洲䝉古補授堂主事滿洲二人䝉古三人漢軍一人譯書漢文堂主事滿洲漢軍各一人校正漢文官二人於内閣翰林院侍讀學士侍讀内奏委每三年更代司務滿洲蒙古各一人筆帖式滿洲三十六人䝉古五十五人漢軍六人分𨽻各司視事之煩簡以為額銀庫司官二人於本院司官内奏委職掌出納司庫滿洲一人筆帖式滿洲二人庫使滿洲二人䝉古繙譯房員外郎主事各一人司官内簡委唐古忒學司業助教各一人筆帖式四人俱蒙古缺稽察内館外館監督二人由科道各部司官内奏委游牧處員外郎䝉古十六人張家口喜峯口獨石口殺虎口古北口管理驛站官各一人由本院司官内奏委臣等謹按初制有承政叅政理事官副理事官主事凡五等後改為尚書侍郎及郎中員外郎主事與六部同順治十六年以禮部尚書銜掌理藩院事以禮部侍郎銜協理理藩院事十八年仍改為尚書侍郎又初有院判知事副使各一人康熈三十八年裁都察院都察院專掌風憲以整綱飭紀為職凡政事得失官方邪正有闗於國計民生之大利害者皆得言之大獄重囚偕刑部大理寺讞平之左都御史滿洲漢人各一人左副都御史滿洲漢人各二人右都御史右副都御史俱外省督撫加銜無專職臣等謹按初設有僉都御史乾隆十三年裁監察御史掌察糾内外百司之官邪在内刷卷巡視京營監文武鄉㑹試稽察部院諸司在外巡鹽巡漕巡倉等及提督學政各以其事專糾察朝㑹糾儀祭祀監禮有大事集闕廷預議焉分道十有五曰京畿曰河南曰江南曰浙江曰山西曰山東曰陝西曰湖廣曰江西曰福建曰四川曰廣東曰廣西曰雲南曰貴州京畿道監察御史滿洲漢人各二人分理院事及直𨽻盛京刑名稽察内閣順天府大興宛平事務每道掌印滿漢各一人河南道監察御史滿洲漢人各二人初設漢六人順治十年裁一人十八年裁一人康熈七年裁二人分理河南刑名照刷諸司卷宗稽察吏部詹事府步軍統領五城事務江南道監察御史滿洲漢人各四人初設漢五人順治十八年裁一人康熈七年裁二人雍正四年增一人乾隆十四年増定滿漢各四人分理江南刑名稽察户部寶泉局宣課司左右翼監督在京十有二倉總理漕運磨勘三庫奏銷浙江道監察御史滿洲漢人各二人初設漢六人順治九年裁一人十六年裁二人康熈七年裁一人雍正四年増一人乾隆十四年定滿漢各二人分理浙江刑名稽察禮部都察院事務山西道監察御史滿洲漢人各二人初設漢五人順治十年裁一人十八年裁二人分理山西刑名稽察兵部翰林院六科中書科總督倉場坐糧㕔大通橋監督通州二倉事務山東道監察御史滿洲漢人各三人初設漢五人順治十八年裁二人康熈七年裁一人乾隆十四年定滿漢各三人分理山東刑名稽察刑部太醫院總理河道催五城命盜案牘緝捕之事陝西道監察御史滿洲漢人各二人初設漢四人順治十八年裁三人雍正四年增一人分理陝西刑名稽察工部寶源局覈勘在京工程事務湖廣道監察御史滿洲漢人各二人初設漢六人順治八年裁一人九年裁一人十五年裁一人康熈七年裁一人分理湖廣刑名稽察通政司國子監事務江西道監察御史滿洲漢人各二人初設漢六人順治十年裁一人十六年裁一人十八年裁二人分理江西刑名稽察光禄寺事務福建道監察御史滿洲漢人各二人初設漢五人順治十年裁一人十五年裁一人康熈七年裁一人分理福建刑名稽察太常寺事務四川道監察御史滿洲漢人各一人初設漢四人順治十八年裁二人康熈七年裁一人雍正四年増一人乾隆十四年裁一人分理四川刑名稽察鑾儀衞事務廣東道監察御史滿洲漢人各一人初設漢五人順治十八年裁二人康熈七年裁二人雍正四年増一人乾隆十四年裁一人分理廣東刑名稽察大理寺事務廣西道監察御史滿洲漢人各一人初設漢四人順治十八年裁一人康熈元年裁一人乾隆十四年裁一人分理廣西刑名稽察太僕寺事務雲南道監察御史滿洲漢人各一人分理雲南刑名稽察理藩院欽天監事務貴州道監察御史滿洲漢人各一人初設漢四人順治十八年裁二人康熈七年裁一人雍正四年増一人乾隆十四年裁一人分理貴州刑名稽察鴻臚寺事務臣等謹按初滿洲䝉古御史自為定數不分道今遵乾隆十四年所定滿漢御史分道之數考其沿革如右其屬經厯滿洲漢人各一人初設司務後改經厯都事滿洲漢人各一人初設漢軍都事一人康熈三十九年裁筆帖式滿洲三十五人䝉古二人漢軍五人稽察旗務每旗遣滿洲御史二人調旗派遣嵗一更代雍正元年定稽察宗室於宗室之給事中或御史派二人嵗一更代巡視京師通州十有四倉或御史或給事中各倉一人嵗一更代以滿洲漢人叅半用雍正五年設巡視鹽課御史長蘆河東兩淮各一人均給勅書歳一更代或奉特簡用内務府司員詳見征𣙜考又凡巡鹽及巡視盛京臺灣互見於後直省官巡視漕運淮安濟寧天津通州或御史或給事中各一人嵗以次奏請各給闗防滿洲漢人叅半用濟寧巡漕兼理疏濬運河之事巡視盛京吉林黒龍江滿洲御史或給事中各一人三年更代巡視歸化城察哈爾游牧各一人三年更代巡視臺灣或御史或給事中滿洲漢人各一人三年更代漢御史兼提督臺灣學政巡視五城分中東南西北或御史或給事中滿洲漢人各一人三年差滿巡視地方釐剔姦弊以資彈壓凡出差者則題請署事所屬兵馬司正指揮漢人各一人掌巡捕盜賊疏理街道及囚徒火禁之事副指揮漢人各一人初設二人康熈十一年裁一人吏目漢人各一人凡京城内外咸畫境分領之臣等謹按崇德元年設都察院承政左右叅政及理事官順治元年改從今名又有啟心郎滿洲一人漢軍二人順治十五年裁䝉古章京二人康熈元年裁蒙古御史二人康熈五十七年裁漢軍御史八人康熈三十九年裁三人尋俱裁内務府御史四人雍正四年改𨽻山東道貴州道滿御史兼管巡按御史毎省各一人順治元年設十七年裁巡視上下兩江御史二人順治二年設六年裁巡視屯田御史一人順治二年設四年裁督理陵西甘肅洮寧等處茶馬御史一人順治二年設康熈七年裁三十四年復設四十二年復裁巡視山東湖河工務御史一人雍正元年設三年裁雍正三年分遣滿漢御史及部員巡察各省專司稽察盜賊巡查驛站烟燉不干預地方事後亦裁又謹按巡視五城初設滿洲漢軍漢人御史毎城各一人六月更换一次雍正元年始定毎城或派給事中或御史滿洲漢人各一人六科吏科戸科禮科兵科刑科工科掌稽察六部百司之事凡制勅宣行大事覆奏小事署而頒之如有失封還執奏内外章疏分類抄集叅署付部駁正其違悞焉臣等謹按六科於雍正元年始𨽻都察院職掌如舊制凡出差則題請署事吏科掌印給事中滿洲漢人各一人給事中滿洲漢人各一人分稽銓衡註銷吏部順天府文卷戸科掌印給事中滿洲漢人各一人給事中滿洲漢人各一人分稽財賦註銷户部文卷禮科掌印給事中滿洲漢人各一人給事中滿洲漢人各一人分稽典禮註銷禮部宗人府理藩院太常寺光禄寺鴻臚寺國子監欽天監文卷兵科掌印給事中滿洲漢人各一人給事中滿洲漢人各一人分稽軍政註銷兵部鑾儀衞太僕寺文卷刑科掌印給事中滿洲漢人各一人給事中滿洲漢人各一人分稽刑名註銷刑部文卷工科掌印給事中滿洲漢人各一人給事中滿洲漢人各一人分稽工程註銷工部文卷筆帖式八十人分𨽻各科視其事之繁簡為額臣等謹按初設六科增減不一順治十八年設滿漢都給事中各一人滿漢左右給事中各一人漢給事中二人其都給事中由左給事中轉左給事中由右給事中轉康熈四年滿漢各留給事中一人餘悉裁五年増定滿漢掌印給事中各一人通政使司通政使司掌受内外章疏臣民宻封申訢之事凡在外之題本奏本在京之奏本並受而進之於朝覈其不如式及程途稽限者凡大政大獄咸得偕部院預議焉通政使滿洲漢人各一人副使滿洲漢人各一人㕘議滿洲漢人各一人臣等謹按順治元年初設有滿漢左通政各一人漢右通政二人乾隆十年裁右通政一人十三年復裁右通政一人以左通政改為副使初設滿左㕘議二人漢左右㕘議各二人康熈三十八年裁漢右㕘議一人五十二年裁漢右㕘議一人乾隆十年定滿漢㕘議各一人去左右銜其屬經厯滿洲漢人各一人初稱司務後改經厯掌出納文移知事滿洲漢人各一人筆帖式滿洲六人漢軍二人掌繙譯登聞鼓㕔筆帖式滿洲一人漢軍一人臣等謹按舊例派給事中或御史一人更替管理康熈六十一年歸併通政使司兼管又謹按設署以專掌書牘表疏章奏其制實昉於宋之通進使與進奏院而明通政使承其制則法更詳官更備焉洪武初置察言司既改置通政使司建文中改司為寺改使為卿至永樂仍復舊制推明代立法之初意原未嘗不善審命令達幽隠凡執奏者毋忌避駁正者毋阿隨敷陳者毋匿蔽引見者毋留難上諭所司諄諄訓飭故曽秉正劉仁之徒猶能循謹守法然其規太宻其權太重内外章疏四方陳情或告不法等事總先由司啟視然後奏聞甚至事闗機宻重大亦必用本司印記乃入奏若徑自封奏則叅駁隨之大政大獄㑹推文武大臣使司必皆叅預若是乎規條之宻事權之重通政一司且中外庶政之扼其要矣嘉靖後通政日不得人甚至趙文華與嚴嵩相結嵩恐劾疏至無私人為之計遂專任文華俾得上下其手於是擅操章奏之權五軍六部莫之敢發而政府大壞未嘗非綜要太重之故而司厥事者得乘間行私也我國朝規制盡善深鑒有明一代稗政而獨定萬年無弊之法凡内外臣工封事許其自達其陳事之疏在京徑送内閣在外郵遞至司移送内閣則皆進呈御覽無執奏之專無封駁之重無中蔽之隠無叅預之私於庶事為大公於羣情為直達所謂維政猶水長得通流者歟此通政司一官名雖沿而實則異謹考順治以來逮聖上所定規制如右云大理寺大理寺掌審讞平反刑獄之政與刑部都察院為三法司凡會勘之案先經刑部審明送都察院叅核既確送大理寺平允㑹稿具題議同者合其㸔語異則另為一議具奏凡有應議大政大獄與六部都察院通政使稱九卿㑹議焉卿滿洲漢人各一人少卿滿洲漢人各一人初設漢少卿二人乾隆十三年裁一人其屬左右寺丞滿洲漢軍漢人左右各一人左右評事漢人二人堂評事滿洲一人分掌在京及各省刑名與刑部司官同御史稱小三法司㑹讞之初設有左右寺副二人漢軍評事一人康熈三十八年裁司務滿洲漢人各一人筆帖式滿洲四人漢軍二人臣等謹按順治十一年直省有恤刑一差五年一次差官同巡按御史審録罪囚御史執法防其失出恤刑原情防其失入刑部差郎中員外郎十三人本寺差寺正寺副二人取諳練刑名科深任乆者充選尋俱省皇朝文獻通考卷八十二
