body:
  text: 刑考七刑制乾隆三十二年定差役疎縱新疆人犯改發伊犁等處例諭向來發遣新疆人犯中途竄逸者除將該犯緝獲正法外其餘踈縱之差役例應問擬絞候一年不獲請㫖正法此等兵役管觧重犯膽敢怠玩疎縱不可不嚴示儆戒所有新疆人犯脱逃之案除審係有心賄縱仍照與囚同罪例定議其餘應問擬絞候監禁一年之兵役為首情重者著改發伊犁等處既足以昭懲創而若輩年力强壮堪資力作非若積匪猾賊反教人為非者可比於屯田墾闢自属有益其由新疆改烟瘴及黒龍江等處人犯如有脱逃者本犯既照新疆例拿獲正法其疎縱兵役亦著照新定發徃伊犁等處之例辦理互見徒流門定改發新疆人犯仍發内地條例大學士刑部議向例應發項欵二十三條内有按其情節尚非積慣兇徒昜於約束者六條仍照例分别僉妻發徃所有積匪猾賊囘人行竊等項一十六條改發之處槩行停止詳見徒流門是年頒行新修律例先是三十一年刑部奏大清律自乾隆五年至今二十餘載條例増改不一雖經五次修緝止就現定新例依類編入其從前舊例與新例不合之處俱未增刪改併請將歴年欽奉上諭及議准内外臣工條奏并吏戸禮兵工部議有與刑名交渉應纂入條例者分類編緝至是告竣進呈刋刻通行改定獨子留養之例刑部奏准凡獨子㽞養如該犯本有兄弟併侄出繼可以歸宗者及本犯身為人後所後之家可以另繼者概不得以留養聲請三十三年申定觧審命盗重犯遺漏填註年貌議處之例刑部議准觧審命盗重犯及軍流徒遣立發囘原籍收管審訊等犯務於批文内載叙事由開明年貌疤痣箕斗令沿途地方查明轉遞如有中途雇倩頂替情事除本犯觧役人等照例䆒擬外將簽差不慎之員分别議處如原文内未經開載將原解之員照例議處又定流犯在配脱逃按配所定地充發例詳見徒流門又定直省秋審令道府廵歴審勘例諭阿思哈奏各省每年秋審請照京師按册覆讞之例停其提犯到省一摺所奏甚是而其中尚有計議未盡周到之處葢此等罪犯所有案情乆經督撫臬司等確核詳定及秋審届期亦不過循用故事就招册分别情實緩决可矜三項而在省過堂時亦從不聞有聲屈平反之事徒令囚徒輾轉提觧紛擾疎虞種種不免自應酌議停止以省具文第各屬成案頗繁研究務宜詳慎若概免提觧而執法之司惟知抱牘從事於貌稽辭聼之義猶屬未協朕意從古案部録囚原有舊典在督撫統轄全省臬司亦刑名總滙勢難親臨州縣一一按問至本管道府職司既專而分轄地方又不甚遼逺若令於每年審録之前巡歴所屬逐案審勘其情罪無疑義者自可㑹册具申上司間遇有獄成未孚臨時呼寃之犯仍應據實另繕招册將本案犯証一併觧送司院覆訊定擬是於减除陋例之中兼寓慎重祥刑之意立法庶為盡善至道府録報各册無論情罪有無與原案異同俱令加結偹案以杜徇庇屬員及有心翻駁諸弊於責成尤有專屬其應如何酌定條例著該部詳議具奏尋議嗣後應令道員廵歴皆以冬季為期於所屬業經定案應入秋審人犯即率同知府各該州縣一一研訊詳加覆勘造册加結申送如有情罪未協臨時呼寃之犯訊非揑詞翻異者即另繕招册將犯証觧送司院聼候覆審該道府亦出具印結偹案倘有事本寃抑而徇庇屬員不為辨明及案無可疑有心翻異者經該督撫查出嚴叅議處如該督撫不加覺察别經發覺一併議處從之定私帶人口出口之例刑部奏准東三省出口之人若將在京所買奴婢不照例當官立契載入口票私帶出境該守闗兵弁拏送刑部如訊係拐賣即照拐賣例治罪如無拐賣情事照冐渡闗津律治罪定囘民行竊刺囘賊二字刑部議覆陕甘總督呉達善條奏嗣後囘民行竊概刺囘賊二字初犯刺臂再犯刺面若結夥三人以上及執持䋲鞭器械例應改發者仍再刺改遣二字定官犯收禁司監及臬司監視行刑之例奉諭向來各省應入秋審官犯俱於各州縣獄中監禁勾决本到轉行該地方正法辦理尚未妥協嗣後各省官犯於定案時即在按察司衙門收監既與齊民犯罪者稍示區别而臬司獄禁稽察更為周宻亦可免疎虞替代諸弊於防微杜漸之中仍寓仁至義盡之意至勾本到省並著照刑部决囚之例將情實官犯全行綁赴市曹即令按察使監視行刑將奉到諭㫖當塲開讀按照予勾之犯騐明處决於體例既為畫一而省㑹之地共見共聞如此立法森嚴益可使官寮共知儆惕將此通諭知之著為令定拏獲竊盗審出多案闗查贓証確鑿即歸犯事地方完結例刑部議覆浙江按察使曾曰理條奏拿獲竊盗承審官即行嚴訊除贓至滿貫及三犯計贓五十両以上律應擬絞者俱即歸犯事地方完結外若審出多案應照積匪猾賊例擬遣者其供出隣省隣邑之案承審官即行偹文專差闗查若贓証俱屬相符毫無疑義即令拿獲地方迅速辦結毋庸將人犯再行闗觧别境倘或贓供不符首從各别必應質訊或隣境拿獲人衆勢須移少就多者承審官即將必應移觧質訊縁由詳明各該上司簽差妥役將犯移觧隣邑從重歸結如有借端推諉及删减案情希圖就事完結者即將原審之州縣官分别叅處定文武官加級私罪不准抵銷例奉諭内外文武各官遇有承辦事件如失察遲延之類其錯誤本屬因公自應將紀録加級抵銷若意渉營私於政事官箴皆有闗係而該員得籍此為獲符吏議不能持其後殊非黜渉公明本義嗣後吏部兵部議處文武各員被議之事本屬因公者仍照例准抵外其因犯私罪交部議處者一概不准抵銷著為令定赴京越訴之例都察院左都御史素爾納奏稱外省民人赴京控告請分别辦理發還刑部遵㫖議覆凡控訴案件如州縣判斷不公曽赴督撫衙門控訴仍不准理或批斷失當及雖未經在督撫處控告有案而所控案情重大事屬有據者刑部都察院等衙門核其情莭奏聞請㫖查辦其命盗等案事闗罪名出入者即將呈内事理行知該督撫秉公查審若審係刁民希圖䧟害揑詞妄控報復私讐即按律治罪其僅止户㛰田土細事則將原呈發還聼其在地方衙門告理仍治以越訴之罪定窝留造賣賭具分别乆近治罪例刑部議准凡容留製造賭具之房主如訊不知情仍照不應重律治罪外如審係貪得重租知情包庇但在一年以外者將房主與造賣賭具為首之犯一例問擬發邊逺充軍即在一年以内亦將房主照製造為從及販賣為首例杖一百流二千里若在半年以内將房主照販賣為從例杖一百徒三年倘地方官不將窩留造賣月日研究明確從重定擬者將承審之員嚴行恭處互見徒流門申嚴統兵軍官茍圖安逸之罪奉諭提鎮膺專閫重寄平時訓練弁兵加意整頓遇地方偶有奸宄竊發督辦勦捕機宜尤當奮勇身先為戎行表率乃緑營漸染惡習一味恇怯偷安並不肯實心出力如前次李時升朱崙等臨陣畏葸誑詞欺餙其罪為國法所不容已明正典刑宣示中外諒武職大員共知炯戒不意近日復有總兵王巍於䑓灣賊匪黄教紏衆滋事一案觀望逗留以致積匪蔓延毫無措置因令觧京交軍機大臣㑹同刑部按律正法以肅軍紀自來緑營㣲末員弁希心進取尚有勇徃自効之人稍遷至遊守已覺改歩及擢用提鎮則自謂志願已定專務敦體養安臨事退諉自全貽悞軍務亦所不顧曾不思力圖感奮殱賊奏功固得邀酬渥典不幸身攖鋒鏑勤事捐軀國家自必賜䘏褒旌澤及後裔若以一時倖生詭避不惜失律僨轅既負惡名更罹顯戮以彼絜此孰得孰失至愚亦當猛省嗣後務各洗心滌慮激發天良痛懲痼疾以冀承受朕恩如尚不知悛改前事之鑒具在毋謂朕三令五申之不預也將此明切申諭提鎮等知之定改發烟瘴賊犯在配竊盗例詳見徒流門定子孫罪犯致祖父母父母自盡分别斬絞例時廣東省民人何長子誘姦㓜女何大妹致已母廖氏服毒圖頼身死該撫將何長子擬以斬决具題奉諭何長子祗應照子孫過失殺父母例科斷著改為絞决嗣後有案情似此者均照此問擬著為令其有應行分晰定例者著該部詳議具奏尋議子孫因姦因盜以致祖父母父母憂忿戕生或畏累自盡者均照過失殺例治罪若罪犯應死及謀故殺人事情敗露致其祖父母父母自盡者即照本犯罪名擬以立决從之定改發極邉烟瘴充軍之竊盗在配復犯行竊分别枷號例詳見徒流門增定管押餉鞘兵役失事治罪例兩江總督高晉奏准管押餉鞘失事之兵役如有知情同盗仍照舊例分别首從定擬外其違例雇替託故潜囘無故先後散行者减首犯罪一等其依法管觧偶致疎失審有確據者减二等治罪改定尊長被殺子孫受賄私和例先是刑部奏准親屬得贓私和命案者計贓准枉法論從重科斷至是議覆御史成徳條奏凡祖父母父母被人殺而子孫受賄私和無論贓數多寡俱擬杖一百流三千里互見徒流門改定娶親屬妾例互見徒流門定逃兵刺字及混收逃兵入伍之例刑部議准京外在伍兵丁脱逃該營立即通移各標協營一體查拿定限一百日實力嚴緝其有自知畏悔於限内投囘者杖一百枷號一個月不准入伍若被緝獲及逾限投囘者除枷責不准入伍外俱照例刺逃兵二字若各營員召募兵丁不確查來歴將别營犯法逃兵混收入伍將失察之員照㧞補非人例議處定比照叛逆縁坐分晰减流例奉諭本日勾到河南省情實招冊内有徐庚一犯因伊子徐國泰興立邪教照大逆縁坐律問擬斬决改為監候核之原案該犯本不知情特縁伊子坐罪是以停其予勾但思向來辦理逆案内縁坐各犯秋審時經九卿法司均照例列入情實而朕悉凖罪人不孥之義並予從寛免勾固屬法外施仁然其中酌理凖情亦當有所區别如逆犯家屬内所有兄弟妻子自當按例縁坐至本犯之父則更較别項親屬不同設使於伊子肆行悖逆之事原係知情是該犯之父教子不軌即屬逆案正犯不得謂之縁坐倘伊子所犯平時實不知情及並未同居無從覺察者事發之日遽行因子及親一概坐以大辟於情既覺可憫於義尤屬未協嗣後遇有此等逆案家屬應照大逆縁坐律治罪而該犯之父實不知情者應如何酌量定擬明著為令著大學士九卿㑹同刑部悉心詳議具奏尋議除反逆正案之親屬仍照律縁坐外其有人本愚妄或希圖誆騙財物興立邪教名目或因挾仇編告邪説煽惑人心種種情罪可惡比照反逆定罪之案若該犯之父實不知情並不同居無從覺察審有實據者將本犯之父照謀叛之犯父母流二千里律改為流三千里安置其比照反逆縁坐之祖父及伯叔亦一體確審分别減議互見徒流門臣等謹按律載大逆縁坐無知情與不知情之分葢因謀為不軌起意非一日紏合非一人該犯親屬無論籍之逺近不得謂無從覺察是以並坐駢誅所以快人心而申國憲至於比照反逆之案其正犯亦實係狂悖不法不得不嚴加懲治而問刑衙門於縁坐比照亦遂相沿定例不為區别辦理我皇上聖明周燭於比照縁坐案件如本犯父母平時實不知情者勅部分析减流於法無可逭之中寓格外矜全之意斯誠聖主欽恤明刑如天好生之大徳也申嚴各旗外任官員交結本管王公之禁刑部遵㫖議定各旗王公所屬人員除服官在京者如遇年節生辰仍准其向各門徃來其現居外任因事來京者概不許以本管王公處謁見通問違者本人從重治罪該管王公亦一体懲治增定已聘未婚之妻犯姦本夫殺死姦夫例時廣西廵撫宫兆麟題奏龍州民人盧將自㓜聘定黄寧嫜為室尚未成婚與梁亞受通姦本夫聞知徃捉殺死姦夫照罪人不拒捕而擅殺律擬絞監候奉㫖三法司核擬具奏尋議凡聘定未婚之妻與人通姦本夫將姦夫殺死審明姦情屬實除已離姦所非登時殺死不拒捕者仍照例擬絞外其登時殺死及逐至門外殺之者俱照本夫殺死已就拘執之姦夫夤夜無故入人家已就拘執而擅殺律擬徒例擬徒其雖在姦所捉獲非登時而殺者即照本夫殺死已就拘執之姦夫滿徒例加一等杖一百流二千里如姦夫逞兇拒捕為本夫格殺照應捕之人擒拿罪人格鬭致死律勿論從之三十五年增定誣良為盗分别强竊治罪例刑部議覆江蘇按察使吳壇條奏律載誣良為盗雖分别有無捉拿拷詐定罪而所誣之或强或竊並無輕重之别夫行竊得贓最重止於絞候而用强之盗至輕亦即駢首是竊强之罪既有等差其誣告之罪亦當區别應如所請將前例内誣指良民為盗一句酌改為誣指良民為竊再於本條之末添入若誣指良民為强盗雖無拷打嚇詐等項情事亦發邊逺充軍如有拷詐等情即發極邊烟瘴數語並將後例内俱照誣良為盗例治罪一句改為俱照誣良為竊例分别强竊治罪從之増定地方文武官諱盗為竊分别定擬例江蘇按察使條奏地方文武官員因畏疎防承緝處分恐嚇事主抑勒諱盗或改强為竊者均照諱盗例革職承行書辦杖一百若抑勒苦累事主致死或刑傷至篤癈者除革職外照故勘平人律治罪該管司道府㕔州不行查報督撫不行查叅者俱交部照例議處如有奸民以竊報强挾制官長希圖誣良索詐者許州縣官詳明督撫另委别州縣查訊照例辦理部議應如所請從之定竊盗脱逃致事主身死例刑部議准竊盗逃走事主倉皇追捕失足身死及失財窘迫因而自盡者如審無拒鬭情形贓少罪輕不致滿徒者將賊犯照因姦釀命例杖一百徒三年互見徒流門增定偷竊衙署未得財擬徒例詳見徒流門改定因戲誤殺旁人例諭據巴彦弼等奏烏嚕木齊傭工人楊奉隆與鐵匠楊元戲耍誤將鐵銼搪傷李剛越日身死將楊奉隆依因戲而誤殺旁人照因鬭毆而誤殺旁人律减一等杖一百流三千里一摺雖係按例定擬但思戲殺與鬭殺所因縱有不同至於誤殺旁人則情罪本無區别今鬭毆誤殺之例既問擬交候而因戲誤殺者何以獨減等擬流從前定例原未允協夫戲殺雖出無心而既以戲戕其生即不得不比例擬抵正所以重民命而慎獄情且以尋常而論則與甲相戲固與乙無干而既致誤殺則甲與乙有何分别若多一誤殺旁人末减之例是於兇犯過存姑息而死者不可復生揆之情理豈為得平况此等案犯秋審時斷不致入於情實俟數次緩决後原可邀恩减等何妨照鬭毆律問抵暫繫囹圄而必欲遽為開脱耶著刑部將因戲誤殺旁人之例另行改議具奏尋議因戲而誤殺旁人者即照因鬭毆而誤殺旁人以鬭殺論律擬絞監候其减等擬流之例即行删除從之定監犯越獄軍流徒犯脱逃他人捕獲獄卒觧役主守人等俱不准免罪例時浙江巡撫熊學鵬題奏改發烟瘴竊犯陸貴隴在司監越獄經海寧縣拿獲正法其禁卒人等審係無賄縱情弊援限内能自捕得及他人捕得皆免罪定擬奉諭禁卒拘管獄囚理應嚴宻防守乃漫無檢束致監犯得以潜逃其玩法誤公罪已難逭設係限内自行捕獲猶得云情有可原若他人獲犯與彼奚渉亦竟得邀寛免何以杜弊懲頑舊例未為允協著刑部另行核改具奏尋議嗣後監犯越獄之案如百日限内能自捕得准其依律免罪如他人捕獲或囚已死及自首概不准免罪其軍流徒犯在配及中途脱逃主守押觧人等亦照此例定擬定重大案情毋得委員審訊例奉諭外省督撫每遇應行審擬之案動輒委員審訊最為惡習其在尋常案件或可循用審轉成規若事闗重大及案涉疑難亦復假手下僚則瞻徇朦蔽顢頇了事諸弊皆所不免獄情何由得明嗣後督撫於應行提審𦂳要案件務須率同司道等親行研審毋得仍沿委員陋習著為例定官莊壮丁脱逃例吉林將軍傅亮奏准官莊壮丁如有逃走該管官即行具報緝拿獲日照例懲治至發遣人犯入在官莊内者如有脱逃亦令報部獲日究其有無行兇為匪按其原犯罪名照脱逃例分别定擬該管各官按照逃人名數分别議處定滿洲旗人犯盗刼不得聲請情有可原例時盛京刑部侍郎朝銓題奏毆傷事主盗犯齊要齊郭齊里照律正法其遞送財物及把風之蘇薩勒噶齊等情有可原照例免死發遣經部改擬削去旗籍發烏嚕木齊為奴奉諭該犯等身係旗人乃竟甘心為盗實屬從來所未有閲之不勝駭愕豈得僅照尋常盗案為之差等科罪况强盗已行得財律皆擬斬原屬不分首從經我皇祖聖祖仁皇帝法外施仁分别情有可原一條量為末減此以加之民人犯法尚可云憫其愚氓無知若我滿洲素風淳朴今以百餘年來未有之事而忽見此下流敗䫫實為之愧憤難釋即我八旗聞之亦當切齒痛心安得不力挽澆風大加懲創我皇考世宗憲皇帝嘗以旗人殺死旗人情罪最為可惡特命秋審時入於情實予勾用昭炯戒自後鬭狠之風因之歛戢今該犯等不知顧惜顔面畏法自愛至於身犯盗案毋論原擬不足蔽辜即部議削籍改發新疆為奴亦不足以示儆此本著交刑部另行定例㑹同法司核議具奏並將朕明罰勅法正所以保全愛䕶滿洲世僕之苦心通諭八旗知之尋議蘇薩勒噶齊等均照强盗已行得財律擬斬立决嗣後滿洲旗人有犯盗刼之案俱照强盗本律定擬不得以情有可原聲請申嚴鬭毆傷重違例抬騐例增定私渡臺灣各禁例吏部刑部兵部議准凡拿獲偷渡過臺灣客民如尚在陸路客店道路未登舟以前客頭船戸客民俱照本例减一等發落如已登舟無分大船小船已未出口將客頭船戸客民即照偷渡本例治罪若不法客頭船戸内有積慣在於沿海村鎮引誘包攬招集男婦老㓜數至三十人以上者無論巳未登舟一經拿獲即將客頭船户年力强壮者發遣新疆給種地兵丁為奴年老殘廢者改發極邊烟瘴充軍至拿獲偷渡客民務須嚴究沿海陸路在何村鎮客店㑹集將該處兵役澳甲地保客店究明如止於失察兵役杖一百澳甲地保客店人等杖七十如有賄縱情弊計贓從重論兵役澳甲人等能於客店聚集時拿獲及首報偷渡客民者雖在本汛亦按照拿獲偷渡客民計名給賞若將並非偷盗之人輙行妄拿圖功邀賞及挾嫌嚇詐情事仍各照本例從重治罪改定偷刨人参例盛京刑部侍郎朝銓奏改凡拿獲刨參賊犯嚴審明確如有身充財主雇人刨採及積年在外逗留已過三冬者不論參數多寡俱發雲貴兩廣烟瘴地方管束若並無財主實係一時烏合各出資本及受雇偷採或隻身前徃得參者均杖一百流三千里未得參者杖一百徒三年代為運送米石者亦如之旗人有犯該軍流者削去旗檔照民人一體問擬犯該擬徒者免其充配折加枷號兩個月責令各該管官嚴加管束除八旗正身兵丁不准再食錢糧外其餘壮丁各色人等仍令各當本身差徭至折枷之後如有再犯不分刨參已得未得俱銷去旗檔問擬附近充軍旗下家奴俱發駐防兵丁為奴定竊盗窩主統計各贓科罪例凡造意分贓之窩主不得照竊盗律以一主為重應統計各主之贓數在一百二十兩以上者擬絞監候其在一百二十兩以下亦統計各贓科罪定内務府所屬莊頭鷹户人等犯軍遣流徒等罪照民人定擬例奉諭鷹户謝天福等與民人髙士傑等擅將三教菴木植折毁賣錢分肥内務府審擬將髙士傑等擬以杖徒謝天福等因係旗人折加枷號完結固屬循照向例但鷹户人等雖𨽻内務旗籍而散處近京各州縣實與民人無異若犯事到官不當與在城居住當差之旗人一例問擬今於民人髙士傑等擬以實徒而謝天福等則援旗人例折加發落同罪異罰不足以示平允且使若輩恃有此例勢必任意滋事毫無畏忌所謂愛之適以害之嗣後内府所屬莊頭鷹户海户人等如犯軍遣流徒等罪俱照民人一例定擬俾各知所儆戒畏法安分未始非因事成全之道三十六年定熱審减等以發落時為凖例原審具題未届熱審而在熱審期内發落者均照例减等若發落時已逾熱審即在熱審期内定擬者概不准减免増定金刄傷人問擬杖徒之犯仍犯金刄傷人例刑部議准閩省沿海府屬如有金刄傷人問擬杖徒之犯或在配所或徒滿囘籍仍執持金刄傷人者俱發近邊充軍互見徒流門改定偷刨人參計數治罪例凡旗民人等偷刨人參人至四十名以上參至五十兩以上為首之財主及率領之頭目并容留之窩家俱擬絞監候為從係民人發雲貴兩廣烟瘴地方係旗人削去旗檔同民人一體發遣係旗下家奴發駐防兵丁為奴均於面上刺字所獲牲畜等物給付拿獲之人充賞參入官擬絞人犯遇赦减等者亦照為從例發遣其未得參者各减一等販參人犯拿獲時查明參數照財主頭目偷刨人參例减一等治罪免其刺字至刨參人犯内有家奴訊係伊主知情改縱者將伊主杖八十係官交部議處不知者不坐其潜匿禁山刨參人犯被獲治罪逓囘旗籍後復逃往禁山者各於應得本罪上加一等問擬若係旗下家奴即發黒龍江等處給與披甲人為奴將疎縱之該管官交部議處互見徒流門臣等謹按向例人至百人以上參至五百兩以上擬絞監候至是以福建巡撫鐘音題奏刑部議覆改定删改邊外為民律奉諭律例内有邊外為民條欵與現在斷獄事宜不甚允協者著刑部另行定例具奏尋議例載邊外為民者共計十三條烟瘴為民者一條惟科塲代替𫝊遞夾帶及姦民附和苖人伏草捉人二條係邊外為民專例其餘十二條俱係一罪而分軍籍民籍軍籍則發充軍民籍則發為民今衛所乆經裁汰均屬州縣管轄其所犯之罪既同自不冝復有軍民之分請將原例所開情罪相同而分别軍民定擬者則將為民字様删除一體改發充軍改定盗牛治罪之例二十隻以上不計贓數多寡擬絞監候其雖在二十隻以下如計贓至一百二十兩以上者仍照律擬絞監候增定解送馬匹倒斃分别降革定罪例諭兵部舊例觧送軍營馬匹倒斃六十匹以上者不計多寡概予革職而止實未平允著軍機大臣㑹同該部按所觧馬成數分晰定例具奏尋遵㫖議定凡分起觧送之文武各員照軍營賠𥙷馬匹之數每百匹准其倒斃三匹如倒斃三匹以上至二十匹者交部照例分别議處二十匹以上者杖一百三十匹以上者杖六十徒一年三十五匹以上者杖七十徒一年半四十匹以上者杖八十徒二年四十五匹以上者杖九十徒二年半五十匹以上者杖一百徒三年如有盗賣别情從重治罪至總理督觧之員令其督觧總數按其倒斃多寡亦即照此分别議處治罪互見徒流門申嚴嘓匪糾夥刦奪之罪刑部奏准川省嘓匪紏夥五人以上在於場市人烟凑集之所横行搶刼者不論曾否得財為首照光棍例擬斬立决為從同搶者俱擬絞監候若拒捕奪犯殺傷兵役並事主及在場之人者審明首犯即行正法梟示在場加功及助勢者俱擬絞立决同謀搶奪而拒捕奪犯之時並未在場者仍照光棍為從本例擬絞監候其在野攔搶止二三人者除實犯死罪外犯該徒罪以上不分首從俱發雲貴両廣極邊烟瘴地方嚴行管束增定凌虐罪囚例刑部奏准凡遞解人犯除原有杻鐐照舊外其押解人役若擅加杻鐐非法亂打披剥衣物逼致死傷及受財故縱並聼慿狡猾之徒買求殺害者除實犯死罪外徒罪以上俱枷號兩個月發烟瘴充軍申定生員代人作証如虗加等治罪例定州縣拿䕶鄰境盜犯分别本境有無承緝未獲例御史髙樸奏拿獲鄰境盗犯之員著令該督撫查明該員任内果無本境脱逃未獲盗犯案情摺内聲明具奏可否送部引見恭候欽定若本境有逃盗未獲只照例議叙分别加級紀録部議應如所請從之改定威逼人致死三命例舊例威逼人致死一家三命以上發邊逺充軍至是刑部遵㫖議定凡豪强兇惡之徒恃財倚勢因事威逼挾制窘辱令平民寃苦無申情極自盡致死一家三命以上者擬斬監候其致死一家二命及非一家但至三命以上者擬絞監候如無前項情節仍照例分别擬軍定民人於新疆犯事不准編發内地例諭據實麟奏民人岳生梅在哈喇沙爾地方因劉士彦索債爭閙用所佩小刀扎傷劉士彦耳輪等三處傷痕限内平復請將岳生梅從重定擬枷號三個月滿日觧交山西巡撫定地流三千里等語所辦未為允協内地情罪較重之犯俱改發新疆今以内地民人在新疆犯法轉得令其復還中土何以凖情法之平嗣後除發遣新疆人犯在配所滋事不法者仍按定律從重分别定擬外其有内地民人於新疆地方犯至軍流之罪如在烏嚕木齊一帶者即發徃伊犁等處其在伊犁一帶者即發徃烏什葉爾羌等處而在烏什各城者亦發徃伊犁等處並視其情罪量為酌定輕者發各處安挿編管重者給厄魯特及囘人為奴如此明示區分庶衆人共知炯戒而立法更為詳妥將此諭令刑部並通行新疆各處辦事大臣等知之互見徒流門定竊盗遇赦後再犯之例刑部議准御史張敦均條奏凡竊盗已經邀恩得免併計之後再行犯竊復遇恩詔後犯案到官審係再犯三犯俱按照初次恩詔後所犯次數併計照律科罪定尊長故殺卑㓜如有敗倫傷化恩義已絶者照平人定擬秋審情實例諭刑部議覆河南廵撫何煟審擬林朱氏與林朝富通姦啇謀買藥毒死伊媳黄氏一本將林朝富擬以斬候其林朱氏擬發伊犁等處給厄魯特兵丁為奴雖比該撫原議發駐防兵丁為奴稍為加重而核其情罪實不足以蔽辜凡故殺子孫定例原以子孫先有違犯或因其不肖一時忿激所致是以照例科斷若其中别有因事起意致死情節較重已不得復援尋常尊卑長㓜之例定罪林朱氏因與林朝富通姦為伊媳黄氏撞見始則欲汚以塞其口黄氏不從復慮其礙眼啇謀藥死其亷耻盡䘮處心慘毒姑媳之恩至此已絶不但無長㓜名分可言乂豈可僅照發遣完案俾得靦顔存活使倫常風化之大閑㒺知懲創而堅貞之烈婦無人抵命含寃地下將明刑弼教之謂何嗣後凡遇尊長故殺卑㓜案件内有似此等敗倫傷化恩義已絶之罪犯縱不致立行正法亦應照平人謀殺之律定擬監候秋審時入於情實以儆無良而昭法紀著將此通諭中外問刑衙門知之臣等謹按三十五年六月刑部題覆西安民婦老趙氏因偏愛伊女圖分田産將寡媳趙氏縳毆空屋欲令餓斃經伊孫王磨折兒咬繩潜逸老趙氏慮其年長記讐令雇工焦喜財哄誘王磨折兒掀入井内用石塌斃老趙氏問擬杖徒法司議以不准収贖上以老趙氏不惜伊夫伊子永絶宗嗣忍心慘毒著發徃伊犁給厄魯特為奴刑部於林朱氏一案准此科斷然林朱氏因姦殺媳其滛兇殘忍較之老趙氏因偏愛殺孫情罪尤重一例科斷實不足以蔽辜我皇上權衡至當特勅照平人謀殺律定擬為滛兇傷化者示儆他如繼母故殺前妻之子及故殺卑㓜圖頼他人者皆核其情罪量為加重則儆兇殘正所以厚偷紀斯為明刑弼教之至意也夫三十七年定遣犯脱逃自首及父兄首告准免死一次之例諭據徐績奏軍犯李作良自配逃囘利津原籍經該犯之父李海赴縣首禀例應如罪人自首免死但該犯屢犯竊案在配又不能安分殊屬玩法仍擬斬决等語此等軍犯逃囘原籍自屬怙過不悛之徒本無足惜但現經伊父首告禀於律既有如罪人自首之條自可量從末减李作良著從寛免死仍發原配地方嗣後有似此者俱照此例行但因首告而貸死已屬法外之仁祗可一次若到配後仍不知懲艾復敢脱逃雖有父兄等再為首告亦不准其寛减於情法更為允協著為令更定新疆改遣烟瘴人犯酌發省分安置例詳見徒流門改威逼父母例文為子孫不孝致父母祖父母自盡並分别情罪定擬例諭三法司核擬阜寧縣民陳有茂與胞弟陳有盛爭閙致伊母葛氏服滷身死一案照子威逼父母致死例擬以斬决陳有茂因田價細故與弟連次爭閙復逼妻㝷死圖賴其弟以致伊母憐愛少子忿激自盡核其情罪較重自屬法所難寛惟所引子威逼父母例文於義實為未協明刑所以弼教若以威逼二字屬之子孫於父母祖父母言之不順豈可著為法令此等凖情定罪當改為子孫不孝致父母自盡定為例條庶足以飭倫常而示懲儆所有此案即著照此改正苐子孫不孝其親情節輕重不同亦有未可概擬斬决者並著刑部詳悉酌議具奏尋議凡子孫不孝致祖父母父母自盡之案如審係本無觸忤情節但其行為違犯教令以致抱忿輕生自盡者擬以絞候妻妾於夫之祖父母父母有犯罪同若妻妾逼迫夫致死者比依妻毆夫至篤疾者律擬絞奏請定奪軍民人等因事逼迫本管官致死者比依逼迫期親尊長致死律定擬從之定銅厰預給工本銀兩侵盗之例雲南巡撫李湖奏准雲南等省銅厰經放預給工本銀兩如課長爐户有尅扣分肥侵吞入已情弊照常人盗倉庫錢糧例計贓科罪責成該管之員稽查倘狥隐不究察出題恭定假借古錢名色私鑄私販照私錢律治罪之例從大學士髙晉請也定蠧役犯贓刺字之例廣西按察使朱椿條奏蠧役犯贓定有治罪之條但若輩素性狡猾夤縁熟慣日乆事冷鑽營入署或原官去任改名復充或更易姓名潜徃别邑充當姦巧日滋地方官無從辯識請照竊盗例刺字尋刑部議准蠧役除照例分别贓數治罪外無論首從徒罪以下以蠧犯二字刺臂流罪以上刺面白役有犯一體辦理倘犯贓刺字後仍盤踞衙門充當者照更名重役例治罪如有私毁刺字者即照竊盗銷毁例治罪若定案時將應刺字之犯不行刺字及刺字後仍無覺察濫准充當者該管官交部議處增定旗下家奴發配俱行僉妻例諭㫖向來旗下家奴有酗酒行兇者一經本主報明該旗即行送部發遣其妻室有年老殘癈及不願隨帶者俱不同發定例未為周宻如近日秦璜即有將發遣家奴之妻留佔為妻之事不可不另定章程以防流弊葢家奴犯法其妻亦屬有罪之人自當一體發遣但此等犯罪旗奴自不值官為資送若其中果有實在不能隨帶者或令於親屬依棲或聼本婦另嫁自不便仍留服役以杜嫌疑嗣後該部旗遇有發遣家奴之案俱照此辦理著為令定親母因姦謀死子女發伊犁給兵丁為奴例諭㫖刑部奏河南羅山縣民潘九思與王李氏通姦主使王李氏勒死伊子王孟隆一案該撫何煟將王李氏照平人謀殺加功律擬以絞候於情理未妥請改發伊犁為奴部駁甚是上年河南省林朱氏因姦謀汚伊媳黄氏不從用藥毒死一案其處心積慮慘毒非常姑媳之恩已絶是以降㫖照平人謀殺律定擬為滛兇傷化者示儆至此案王李氏聼從姦夫謀死伊子其滛兇殘忍固不足齒於人類但母子為天性之親與姑媳之義以人合者本屬有間若以子死之故令其母繯首抵償於情理究為不順著照刑部所擬發徃伊犁給兵丁為奴通諭中外問刑衙門知之增定繼母因姦殺死前妻之子女例刑部遵㫖議繼母因姦起意將前妻子女致死㓕口者不論現在有無子嗣將姦婦擬絞監候如姦夫起意本婦為從而其夫已故只此一子致令絶嗣者亦擬絞監候若其夫尚有子嗣者將本婦發徃伊犁給兵丁為奴改定考試夾帶換卷雇倩𫝊遞等弊治罪例刑部奏准凡應試舉監生儒及官吏人等但有懷挾文字銀兩當場搜出者枷號一個月滿日杖一百革去職役其越舎與人換冩文字或臨時換卷並用財雇倩夾帶傳遞與夫匠軍役人等受財代替夾帶𫝊遞及知情不舉察捉拿者俱發近邊充軍若計贓重於本罪者從重科斷官縱容者交部議處受財者以枉法論其武塲有犯懷挾等弊俱照此例擬斷三十八年定漕船被竊船戸舵工不行救䕶例刑部議定漕船被盗船户舵工人等除勾留容隠分贓仍照例治罪外如失事時有頻呼不應不力為救䕶者分别强竊照窩主不行不分贓例各減一等治罪失察之該管員弁分别議處其有拿獲别幚盜首及竊盗積案巨窩者交部分别議叙增定囘民結夥搶奪分别人數情罪定擬例凡囘民搶奪結夥在三人以上不分首從俱發黒龍江等處給兵丁為奴如有脱逃被獲請㫖即行正法如數在三人以下審有糾謀持械逞强情形者發極邊烟瘴地方充軍若止一次乗間徒手攫取尚無逞兇情狀者仍照本例擬徒定伊犁等處卡倫緝捕逃人不力例刑部遵㫖議定伊犁等處盤獲逃犯究出經過卡倫地方未經查拿者將該處失察經過官員並失察之地方官及該管大臣交部分别議處兵丁鞭七十如有藏匿負罪潛逃之犯將失察官員並失察之地方官及該管大臣分别議處兵丁鞭八十纂修大清律例告竣修改條例四十九條續纂新例五十條頒行中外定傳授迷人藥方未得財擬斬候監禁例刑部奏准凡用藥迷人圖財案内有首先𫝊授藥方與人以致轉𫝊貽害者雖未同行分贓亦擬斬監候永行監禁改定擬罪錯誤分别處分例時湖南永順縣民潘文科與彭氏通姦殺死本夫一案該撫初擬潘文科依鬭毆殺律絞監候彭氏擬以枷責經部駁覆審究出實情將彭氏依律擬以凌遲處死潘文科擬斬立决三法司㑹議應如所題完結其審議錯誤之廵撫按察使知府知縣等官照遵駁審出實情例均免查議嗣經吏科給事中富爾敏條奏吏部議准凡督撫具題事件内有情罪不協律例不符之處部駁再審該督撫及司道等官虗心按律例改正具題將從前舛錯之處免其議處其死生出入之案原問之州縣核轉之知府俱無庸復與㑹審如有原議徒杖罪名駁審後改為凌遲併斬絞立决者將承審核轉之府州縣均照斬絞重犯不能審出實情例降一級調用從之其監候以下罪名錯誤議應降調離任之員上以其人或有平日辦事尚屬勤能乃以一𤯝概加鐫調未免可惜應畧為區别著該督撫出具考語送部引見著為令嚴留養揑結之例刑部議准凡有死罪人犯如實係親老丁单仍請照例留養若本非獨子地方官知情揑報以故出論如有受賄情弊以枉法論失察者交部議處其鄰保族長人等有假揑出結者照證佐不言實情减本犯罪二等治罪受財者以枉法從重論定决不待時重犯不拘停刑月日例諭本日據薩哈岱鐘音奏拿獲分發為奴脱逃之俄羅斯費約多爾等三犯因八月為停刑之月飭交該縣嚴行監禁於九月初四日正法一摺固屬照例辦理但此等脱逃要犯自應决不待時豈可拘於常格况停止行刑月日原指尋常案犯而言若遇𦂳要重犯應鞫應决者均宜隨時審辦設或拘泥舊文繋獄太乆難保無防守懈弛乗間越獄自戕等事致令倖逃法網殊有闗係嗣後除尋常案件仍照定例月日停刑外其有兇盗逆犯干渉軍機應行立决及當加刑鞫者均即隨時辦理聲明咨部不得拘泥舊例著為令定厄魯特囘子脱逃治罪例理藩院奏准凡厄魯特囘子逃走被獲如闗係重情仍聼理藩院定擬奏聞請㫖外如止係犯逃無論拿獲投囘初次枷號一個月鞭一百給主嚴加管束二次發福州廣州賞給旗下官兵為奴其京城居住並王公等帶來家下厄魯特囘子逃走仍照旗下家人逃走例分别次數年月辦理定私入盛京圍塲竊盗例盛京圍塲内有私入打鎗放狗驚散牲畜者不論次數係旗人發遣各駐防省城當差家奴發遣為奴民人發附近充軍其私入採取蘑菰砍伐木植者擬以滿徒分别旗民辦理起獲鳥鎗入官牲畜器物賞給原拿之人失察私入之該管官查明邊界照例叅處定聞拿投首减等例江蘇按察使胡季堂奏准聞拿投首之犯除律不准首及强盗自首例有正條外其餘一切罪犯俱於本罪上减一等科斷定逃盗能捕獲他盗投首减等例刑部議准山東巡撫徐績奏准凡盗首傷人逃逸後若能捕獲他盗投首照傷人盗犯自首擬軍例减一等杖一百徒三年改定毆死贖身放出奴婢例刑部奏准旗員毆死贖身及放出奴婢並該奴婢之子女者降一級調用故殺者降三級調用旗人枷號四十日鞭一百民人杖一百徒三年毆死族中奴婢杖一百流三千里係官員亦照旗員之例辦理申定救親情切之案分别情罪不得概擬减等例諭例載救親情切一條原因父母被人毆打勢在危急伊子聞聲救䕶實有迫不得已情狀因致傷人其情實有可原是以向例准於疏内聲明兩請候㫖若其父母與人尋釁鬭毆其子踵至從而加功至斃人命是父子逞兇共毆並非情殷䕶救豈可不嚴究實情照例論抵若復巧為援引開脱竟使濟惡重犯倖逃法網何以昭勅法之平尋刑部定例人命案内如其子與人口角父母主令伊子毆打致死或父與人尋釁鬭毆其子踵至助勢共毆斃命俱仍照律科罪不得概擬减等三十九年定歃血訂盟分别治罪例諭李侍堯奏揭陽縣賊匪陳阿髙等聚衆結盟經巡撫徳保核審擬以絞候發囘監禁匪徒林阿裕等潛謀刼獄已交李侍堯嚴審從重定擬矣此案皆由陳阿髙擬罪過輕匪徒見其乆繫囹圄遂爾潛謀滋事致皆身罹重辟及查核原案則陳阿髙之問擬絞候尚係徳保比例加重舊定之例原未允協夫以歃血訂盟豈有十人内外與多至四五十人者可漫無區别乎即如陳阿髙一案結盟至四十餘人之多又該犯年僅二十二嵗而衆皆推之為首即屬匪黨渠魁更非序齒結拜弟兄者可比自當另定例條以示懲創著刑部詳悉妥議具奏尋議凡異姓人但有歃血訂盟焚表結拜弟兄者照謀叛未行律為首者擬絞監候為從減一等若聚衆至二十人以上為首擬絞立决為從者發雲貴兩廣極邊烟瘴充軍其無歃血訂盟焚表事情止序齒結拜弟兄聚至四十人以上為首者擬絞監候為從減一等若年少居首並非依次序列即屬匪黨渠魁首犯擬絞立决為從發雲南兩廣極邊烟瘴地方充軍如序齒結拜數在四十人以下二十人以上為首者杖一百流三千里不及二十人者杖一百枷號兩個月為從各减一等定私製籐牌之禁御史李潄芳條奏廣東省盗案多有用籐牌搇壓事主者民間私藏鳥鎗定有例禁籐牌亦係軍􅋵所用之物平民不應私製請一例查禁尋吏部議准凡民間如有私製籐牌者照私製鳥鎗例杖一百失察之文武地方官亦照例議處定助逆謀殺祖父母父母絞决例諭據熊學鵬奏審擬貴縣民犯李老悶因行竊敗露與蘓觀謀死伊母梁氏移屍謀頼一案已將李老悶照例即行凌遲示衆並聲明同謀之蘇觀律止擬絞監候但該犯助逆㓕倫非尋常謀殺人加功者可比請將蘇觀即行絞决等語所辦甚是向來於此等罪犯概不立案定擬故於同謀加功之犯亦無專條今於逆惡兇犯必令明正刑誅以快人心而申法紀惟同謀加功者尚未議及若僅照尋常謀殺之律定擬絞候實不足以蔽辜此等案情各省或有相類者亦未可定若不明立科條懸擬參差未為允協嗣後如有此等加功之犯均照此定擬該部即纂入例欵遵行原摺並交部存案定私開軍䑓文報治罪例兵部議准凡軍䑓文報如有將報匣夾板及兵部加封事件擅敢拆動以致洩漏事情者該管大臣立即查究供證明確無論官兵馬夫即按軍法從事其專管䑓站之文武員弁革職拿問管轄䑓站大員交部議處至軍營徃來文移扎禀有闗軍需糧餉調遣兵馬及陞調恭革官員等項發遞時俱用釘封鈐葢印信如䑓站書吏人等私自拆閲者查出究明問擬滿流䑓站官弁交部分别議處定篤疾殺人分别致死罪由例刑部議准四川總督文綬條奏凡篤疾殺人罪犯應死者實係鬭殺及戲殺誤殺方准依律奏聞取自上裁其蓄意謀害及有心故殺者俱依律擬罪不准聲請定圍塲過失殺傷例諭昨日圍塲内有虎鎗䕶軍因射生失手誤傷圍墻䝉古兵之事已交行在刑部問擬刑律於此事向無專條而兵部田獵例載凡人用箭傷平人者分别鞭責追銀給與被傷之人即因而致死者僅追銀兩鞭一百亦不擬抵圍塲向用此例揆之情理未為允恊此等雖傷出無心但其人因傷致斃人命攸闗又豈可僅以責罰完結而圍塲内控弦馳射乃得心應手之事更非刑律過失殺所云耳目心思所不及者可比若不另定科條則隨手施放誤殺誤傷者尚知所懲儆乎即如刑律戲殺條下載比較拳棒之類傷人死者以鬭殺擬絞自可為此事比例若傷而未死又當别有等差其應如何分别定擬之處著軍機大臣定擬具奏尋議圍塲内射獸兵丁因射獸而傷平人致死者照比較拳棒戲殺律擬絞監候仍追銀給付死者之家如係前鋒䕶軍親軍領催及甲兵等追給銀一百兩係跟役追給銀五十兩若傷而未死前鋒等項及甲兵頭等傷者將本犯鞭一百罰銀四十兩二等傷者鞭八十罰銀三十兩三等傷者鞭七十罰銀二十兩如係跟役所罰銀數各减十兩給與被傷之人互見贖刑門更定嫡孫衆孫為庶祖母服制并有犯分别科斷例禮部議准江西按察使歐陽永䄎條奏凡嫡孫衆孫為有子之庶祖母照伯叔祖母之條服小功五月有毆傷者照毆傷庶母例减一等至死者擬絞監候謀故殺者擬斬監候秋審時酌量情節辦理若庶祖母毆殺嫡孫者仍同凡論改定守土文員失陷城池與武職同罪例舊例被賊侵入境内者發邊逺充軍是年八月以山東逆匪王倫邪教聚衆侵擾陽糓縣其失陷城池之知縣刑部照律擬軍奉諭陽穀縣知縣張克紳係守土之員賊至不能保禦城池竟若置身局外當與把總孫雲龍同罪乃僅發邊逺充軍此係前明部臣左袒文員之弊斷不可行張克紳著照守邊將帥失䧟城寨律擬斬監候以昭平允仍著該部明白囘奏尋遵㫖議定守土州縣不能保禦城池與武職均照守邊將帥失䧟城寨律擬斬監候從之定旗人住居庄屯一體發遣例諭周元理奏審擬船戸劉治偷賣漕米發烟瘴充軍從犯分别擬徒其從犯内有方天秃聲明係旗人應折枷鞭責固屬照例辦理但同係旗人其間亦各有分别如果身居京師食餉當差在官執役旗人身犯流徒等罪原可折枷號完結若在屯居住及各處庄頭與民人混處日乆即與民人無異則犯法亦當與同科嗣後除京城之滿洲蒙古漢軍現食錢糧當差服役之人及外省駐防之食糧當差如犯流徒等罪仍照舊鞭責發落外其餘住居荘屯旗人及各處莊頭並駐防之無差使者其流徒罪名俱照民人一例發遣著為例互見徒流門定五城提督順天府各衙門案件闗係罪名出入及應行遞解者送交刑部例諭軍機大臣㑹同刑部議奏五城御史遇有詞訟案件闗係罪名出入非笞杖所能完結者但送刑部辦理已依議行矣至遞解人犯一事五城提督等衙門向俱自行辦理究不免有流弊嗣後五城提督順天府各衙門遇有應行遞解人犯除籍係直𨽻就近遞囘者聼各該衙門照舊辦理外其餘應解囘别省人犯均著叙明案由交送刑部核明應解與否妥恊辦理交該地方官嚴行管束並著刑部三月彚奏一次以照慎重各該衙門不得仍前自行遞籍著為令四十年改定大逆縁坐有職人員仍發為奴例諭㫖前㩀𢎞晌等奏查審逆犯吕留良之孫吕懿兼曾孫吕敷光捐納監生一事係户部辦理錯誤現已另降諭㫖至檢閲刑部原議作為另户之案竟係錯㑹朕㫖朕前諭將發遣之曾為職官及舉貢生監出身者免其為奴於戌所另編入旗戸當差係指尋常為奴遣犯而言其真正反叛及强盗免死减等人犯原㫖即在開除不辦之列若吕留良子孫係大逆重犯縁坐即屬反叛豈可援輕罪有職人員概免為奴出户致令逆惡餘孽得仍竄籍良民實不足以示懲創而申法紀嗣後如遇辦理此等案件不特舉貢生監不應减免即官職甚大者既為逆犯子孫罪在不赦亦不當復為區别尋經刑部定例凡大逆縁坐及强盗免死减等發遣為奴人犯俱不准出户倘逢恩詔亦不准與尋常為奴遣犯一體辦理互見徒流門申嚴職官聚賭例凡現任職官有犯屢次聚賭加重發徃烏嚕木齊等處効力贖罪者仍先照賭博本例枷號滿日再行發徃定毆死為奴遣犯妻子例跟隨本犯在主家倚食服役被主責打身死照毆死雇工人科斷其自行謀生者仍以凡論互見徒流門酌定拿獲脱逃斬絞人犯分别定擬條例先是三十九年十一月奉上諭凡有罪應入情實人犯經二三年後始行就獲到案其本罪應斬絞監候者均著改為立决至是三法司核覆山東巡撫楊景素題奏拿獲刨坟絞犯王學孔等改擬立决諭此案法司仿照上年諭㫖擬改立决一本所辦未免誤㑹朕意前㫖所云凡有重罪應入情實人犯經二三年始行就獲均改為立决者原指謀故殺等犯情罪重大者而言若此等刨坟為首及三次人犯雖例應擬絞入情實然皆貧民無奈為之有司民之責者當引以為愧而其犯實無人命之可償也即入本年秋審情實足矣有何不可待而改為立决乎嗣後問擬斬絞監候之犯經二三年後始行就獲者何項應改立决何項仍應監候並著刑部悉心核議酌定條例具奏尋議斬絞情罪稍輕之犯逃脱二三年後就獲應仍監候者五十五條情罪重大斬監候改立决者四十九條絞監候改立决者十八條從之增定過失殺大功以下尊長例舊律無明文皆以凡論至是刑部議定比照過失殺期親尊長律量减杖一百仍追埋葬銀定和姦後拒絶致死例刑部議奏凡因姦殺命之案不論强姦和姦概擬斬决情罪似無區别請嗣後如有先經和姦後因别故拒絶致被殺死者本人既失節於先難與貞良同論應仍照謀故鬭毆本律定擬從之定强盗引線之人分别科斷例刑部遵㫖議定强盗引線除盗首先己立意欲刼某家僅止聼從引路者仍照例以從盗論罪外如有盗並無立意欲刼之家其事主姓名行刼道路悉由引線指出又經分得贓物者雖未同行即與盗首一體擬罪不得以情有可原聲請定子弟犯姦盗殺傷等案父兄同行加功加等治罪例江蘇巡撫薩載具題宿遷縣民劉俊等强搶良家之女姦占為妻將劉俊擬絞監候其父劉殿臣照為從律擬以杖流諭此案劉殿臣係劉俊之父當伊子告知欲搶孟池之女為妻即應嚴斥禁阻乃轉同徃幚搶實屬悖理自有應得之罪若於其子犯案内照為從問擬則名不不正而言不順何可為訓明刑所以弼教豈有坐父兄為子弟從犯之理此乃風化所繫讞獄者不宜掉以輕心夫父兄之教不先已難辭不能約束之咎今劉殿臣明知其子强暴横行反親徃増勢以成其惡此即敗䫫之尤不可不示懲儆著交刑部為父兄不能管束子弟轉同行加功者如何按犯科條分别定罪之處即行悉心妥議具奏尋議凡父兄子弟共犯姦盜殺傷等案如子弟起意父兄同行助勢除律應不分首從及其父兄犯該斬絞死罪者仍按其所犯本罪定擬外餘俱視其本犯科條加一等治罪概不得引用為從字様從之皇朝文獻通考卷二百一
