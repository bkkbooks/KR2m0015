  text: 欽定四庫全書皇朝文獻通考卷五十二
  hash: sha256:960c487e8b7f441202395c9c2483cddb3f62a45ac2a2a28c59a1cd3dc896072b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_052-1a, image: WYG0633/WYG0633-0300a.png}
body:
  text: 選舉考六舉士乾隆四十一年諭朕因平定兩金川集勲奏凱巡幸山左告成泮林山東及各省士子聨袂迎鑾抒誠忭頌進獻詩賦者甚多因照從前巡幸之例命題考試就其文義量加甄録所有列在一等之貢生黄道煚李憲喬監生蔡廷衡俱著賞給舉人其舉人竇汝翼秦瀛著以内閣中書用其列在二等之舉人貢監生員李佩鸞等十六人俱著賞給縀二疋以示偃武修文慶惠士林之至意又諭朕因平定兩金川告成闕里回鑾舉行郊勞盛典蹕途經過津門直𨽻各省士子祇迎道左忭頌抒誠進獻詩賦者甚多因照此次在東省召試之例就其文義量加甄録所有列在一等之進士邱桂山等五人俱著以内閣中書補用蔡萬年等三人俱著賞給舉人其列在二等之舉人貢監生員周光裕等二十人俱著賞縀二疋以示嘉惠士林之至意又諭繙譯鄉㑹試停止以來已二十餘年近日滿洲學習清文善繙譯者益少著加恩以乾隆戊戌年八月考試繙譯舉人己亥年三月考試繙譯進士尋議繙譯㑹試所有中式繙譯進士應與文進士一體截取選用知縣其有歸班銓選者應以翰林院典簿等缺補用四十二年諭昨檢閲内廷舊存摺奏内有康熙五十六年詹事王弈清宻奏請於考官入闈後即諭謄録官凡七藝破承開講等虛字概不謄寫以防關節王奕清所奏自屬防弊之一法但將破承起講等虛字概不謄寫於文理既不明順且篇幅不完體制尤多未協朕思與其暗防弊竇不若明示章程况近今鄉試頭塲改為書藝三篇尤易防範嗣後令順天及各省主考官於刋發題目時即酌定三篇内承題起講應用虛字明白開列另行刋印一紙分給舉子如此科篇首承題用夫字次篇用蓋字三篇用甚矣起講首篇用今夫次篇用且夫三篇用嘗思之類下科即將此等虛字錯綜更换總聽主考臨期酌定俾衆共聞知通塲一體遵用違者貼出如此於防範更為周密至㑹試亦著照此通行將此㫖通諭中外知之并刋入科塲條例又議定房考官無庸分經閲卷及定試卷分束章程奉諭向例鄉㑹試同考官分經閲卷易書詩三經卷分三四五房春秋禮記卷止分一二房以一二人専閲一經則暗藏關節易於識認立法不能無弊况各經卷多者一房閲至數百卷甚且多至千卷其卷少者一房止閲一二百卷校閲多寡亦覺懸殊各省主考既以一人兼閲五經卷則房考官同係科甲出身諒無不能閲看他經之理著自乾隆丁酉科為始鄉㑹試考試官俱不必拘泥五經分房如房官十人試卷五千本則每房各閲五百卷均勻分派其每經分中卷數仍照原額如此各房通看即欲呈送關節勢不能遍送多人於防範更為周密而各房考均勻派閲亦不慮多寡相懸致滋草率之弊將此通行曉諭并刋入科塲條例一體遵行嗣經議奏分給試卷係漢御史一員主持其事應請再定以掣籖分卷之例先令至公堂監臨知貢舉等官於每次進試卷時照房考十八員之數將試卷分為十八束分别登簿即用簽開寫第一束第二束等字様鈐蓋監臨知貢舉關防送進内簾考試大臣㑹同滿漢御史及收掌官先將第㡬房掣籖次將試卷第㡬束掣籖當堂分給仍填號登簿以便稽核其二三場試卷即照頭塲號簿辦理如此則各房試卷並無須逐卷分派而分卷關通之弊不禁而自除至各省鄉試内簾閲卷並請照此掣籖分給以昭畫一從之又諭大學士于敏中等將順天鄉試㑹試卷如何分束之處㑹同順天府禮部詳細酌議尋稱順天鄉試卷有滿合南北中皿之分房考有旗員南北中籍貫之别乾隆三十三年欽奉上諭嗣後順天鄉試仍照乾隆六年所降諭㫖南省人迴避南皿卷北省人迴避北皿卷邊省人迴避中皿卷著為令誠以防弊竇而慎遴選法至善也今議將試卷概分為十八束若以應迴避之卷錯雜其中房考仍難於閲看查近科試卷數目其滿字合字夾字旦字及中皿北皿等卷約在一千七八百卷及二千餘卷即分為南籍房考應掣之卷南皿卷約在九百餘卷及一千餘卷即分為北籍房考應掣之卷如有旗員及邊省人員併入北籍房考數内核計將此儘數酌分十八束其貝字號試卷約在五千餘卷以外除直𨽻籍貫官員例應迴避順天鄉試其餘各籍房考俱可通行閲看則以貝字卷量為勻配以均十八束之數不致多寡叅差其二三塲試卷只須按滿合南北中皿貝夾旦等字様分束概送内簾令查明第一塲掣卷號簿照例分給閲看如此庶於掣籖分卷之中仍與迴避之例不相違碍再查㑹試按省分額房考閲卷向止迴避本省今鄉試分卷之法既定為兩項分掣則㑹試分卷自可比照核辦臣等謹就各省卷數及中額多寡均勻搭配並照上兩科欽派房考籍貫應行迴避之省酌分兩項其迴避員數稍多之項應閲卷數分為十束八旗浙江江西山西河南福建湖北湖南廣東廣西雲南等卷分為十束約共二千餘卷迴避員數較少者所閲卷分為八束奉天直𨽻江南山東陜西四川貴州等卷分為八束約共一千七百餘卷每束卷約在二百以外合計總數不甚相懸知貢舉提調於分送封固後將某省若干卷標於封面至送入内簾即交主考官同内監試按照房考迴避省分員數查對卷束掣籖分閲其二三塲試卷亦即照鄉試辦理庻立法更周而查辦亦易但每科欽㸃房考省分員數多寡不能一律應令知貢舉提調臨時按照派出房考員數省分卷數倣此式量為分配具摺奏聞遵照辦理從之又奉諭科場外簾各官子弟迴避之例節經御史條奏禮部議覆准行其中尚有未甚允協者如監臨知貢舉監試提調總辦塲内一切事務其受卷彌封謄録對讀收掌等官亦各有承辦試卷之責自應令其子弟迴避以杜弊端若兩翼副都統叅領章京不過入塲彈壓事畢即行出闈與考試文字毫無干涉至供給等所並不與士子相見即順天府所委之巡綽等官止於號外巡查不能進號關照又如磚門御史㸃名後例不入塲亦可毋庸防範所有副都統叅領章京磚門御史及供給巡綽等官嗣後俱不必迴避即自今年為始著為令又議定現充謄録不准重考别館禮部議奏各館現充謄録人員嗣後遇考試漢教習之時俱不准其考試並查明現在如有謄録教習兩處兼走之員係先補謄録者即將教習撤回係先補教習者即將謄録撤回如係肄業外班於依限寫書之外仍可自理本業毋庸扣除以昭平允從之又議定申明祖籍寄籍並聲明冒籍條例吏部議准侍郎蔣賜棨條奏本年八月遵㫖定議聲明祖籍寄籍將不由科目出身之各項人員責成地方官督撫及騐看大臣科道稽查籍貫如有混冒即行糾叅治罪嗣後順天中式舉人寄籍者發榜後填寫親供並令據實呈明改歸原籍如無家可歸亦令呈明原籍及因何不能改歸縁由確實註册其實係順天土著取同中舉人互結順天府查明造册送吏部禮部存案備查倘仍有含混隠慝情事後經查出本人治罪互結舉人及順天府承辦之員議處即以本年丁酉科為始遵照辦理又議准御史戈源條奏申明冒籍條例四款一查乾隆九年議准考試大宛童生究出冒籍情弊廪保照變亂版籍例杖八十革去衣頂如受財冒保計贓從重論教官受賄革職交刑部計贓定罪一查乾隆九年二十一年清查籍貫議令廪生一體查明改歸距今日久自宜申禁令應照吏部議准鄉試中式之例飭令改歸無家可歸者呈明註册如實係土著亦飭取各生互結憑查交順天府飭該縣教官分别辦理一查定例考試大宛童生派審音御史滿漢各一員現在南籍御史一體開列誠非逺嫌防弊之意應行迴避扣除一查順天貢監於乾隆二十二年奉㫖令學政於録科時嚴加察騐以杜假冒是學政録科原有稽查之責惟録科之前該貢監等先赴大宛兩縣起文該縣於給發印文時自應逐一查核嗣後令該縣確實查明申送如並不詳查輙行送考照審音不實例議處至申送後仍令學政覆加查察不得因有地方印文率行收考又諭向來雲南貴州舉人進京㑹試一路賞給驛馬騎坐所以體恤逺方寒畯者至優極渥本年陜西鄉試中式第二名舉人黄斌即係新設迪化州阜康縣人可見闗外人文漸盛殊屬可嘉第念該處進京道里較雲貴等省更逺即每科新疆士子赴西安鄉試路亦不近而新疆車馬等項僱覔維艱殊堪軫念嗣後嘉峪闗以外士子赴西安鄉試及進京㑹試並著加恩照雲貴之例一體賞給驛馬以示優恤邊陲寒士之至意四十三年諭今年繙譯鄉試前經降㫖於八月舉行但今秋起鑾前往盛京先朝舉行為便著將繙譯鄉試改為七月又議定彈壓填榜日書吏人役禮部左侍郎謝墉奏稱填榜放榜日期外簾自知貢舉以下俱集聚奎堂共襄開榜供給等官率厨匠皂役亦并入内龍門人數既衆禮部鈐榜官到時䕶印䕶榜送録領卷官并欽天監候時官等下至書吏家人一擁而入向未設有彈壓之員往往紛紜雜㳫有争先㨗報闗通𫝊信以圖厚利至毁物傷人末由迹問且設有匪猾乗此作奸則必至疎縱尤不可不防微而杜漸應請㫖飭令原派之副都統二員於填榜之日早赴貢院至公堂前㑹同外簾巡察御史查騐覈實放入臨期同入内龍門在聚奎堂外仍分兩翼各帶兵數名彈壓巡查從之又諭文以明道自當以清真雅正為宗曽諄諄訓諭而文風總未能醇蓋非一朝一夕之故本年㑹試闈中進呈前十名卷朕詳加披閲文體較為純正尚不失制義之本發榜後詢之大學士于敏中據奏近年風氣喜為長篇又多沿用墨卷膚詞爛調遂爾冗蔓浮華即能文者亦不免為趨向所累等語士子平日覃心經術探討古文及時文諸大家以立其體作文尤須體㑹先儒𫝊説以闡發聖賢精藴獨出心裁屏除習見語其文自然合度何必動輙千言因陳不察耶昔陸機云要辭達而理舉固無取乎冗長韓愈云惟陳言之務去二語實文章正鵠士子宜深味乎其言嗣後鄉㑹兩試及學臣取士每篇俱以七百字為率違者不録其庸熟墨卷悉行剔除又或過為新竒墮入牛鬼蛇神惡道尤在所澄汰操觚者慎毋掉以輕心司衡者各宜示以正軌務期風㑹蒸蒸日上以副朕崇雅黜浮之至意又議更定同考官仍用藍筆大學士于敏中奏稱同考官評閲硃卷近科改用紫筆似未妥協查向例評閲硃卷同考官用藍筆主考用墨筆三色較然且藍筆用於硃字之旁亦不嫌太素自乾隆三十六年經禮部議定將内外簾所用藍筆悉行改易因將同考官閲卷改用紫筆色稍淡即易與硃相混圈㸃加於字旁不甚分明設或㸃乙數字亦難以辨别甚至内簾書吏繕寫文移登記檔案並用紫筆尤覺非宜臣愚以為同考閲卷應仍照舊用藍筆其内收掌及書吏並當一體更正惟内簾監試御史仍用紫筆庶足以昭慎重從之又諭國子監助教吳省蘭助教銜張羲年學問尚優且在四庫館校刋羣書頗為得力俱著加恩准其與本科中式舉人一體殿試又選拔貢生引見奉㫖以部員用者十五人經吏部奏定以七品小京官用又諭本年選拔貢生除引見分别録用外其餘已經考試各生如有情願自備資斧在四庫書館効力者准其呈明充當謄録嗣經議准寫書之日為始扣足五年期滿照例辦理又議減定商學額數及設立鹵字號中額大學士九卿㑹議御史戈源條奏近來商學商人子弟日少外省假冒日多請將商籍生員一體勒回原籍將各處商學運學各額概行删除查商籍定額始自順治十一年相沿日久若因清釐冒考概將真商學額恩例裁除亦未允協商學運學原額直𨽻山東陜西均取進八名山西取進十二名江南取進十四名廣東取進二十名浙江取進五十名額數既多寡不等文風亦髙下不齊是以南省之人每樂向北省夤縁若核實定額即本商亦不肯輕以予人應請敕交各省督撫學政通查各省真商親子弟姪應試者核計人數多寡另行酌減學額具奏欽定至鄉試若實因道路窵逺必在商籍就近應試當照直𨽻從前另編鹵字號之例定額取中除廣東舊設有鹵字號中額外其餘直𨽻江南浙江山東山西陜西均查明從前另設鹵字號之例歸於該省定額内五十名取中一名雖應試多至數百名總不得過二名之額如有因人數過少不敷取中情願改歸本籍者准其呈明改歸嗣議准山東學政姚梁奏商籍之設原因民人逺出充商其子弟不能回籍應考准在行鹽地方入籍嗣後實係逺商其子弟照例收考臣等謹按四十四年議准江蘇商籍鄉試之人每科多則十二三名少則六七名不敷另編鹵字號請併入民卷取中有情願改歸本籍者准其呈明改歸本籍鄉試謹附識舉行繙譯鄉試諭繙譯鄉試卷止須彌封交送内簾校閲毋庸另行謄録是年奉㫖開萬壽恩科諭朕本意以庚子年為朕七旬慶辰越嵗辛丑即恭逢聖母九旬萬壽斯時敷天同慶自當臚歡祝嘏以抒萬姓悃忱今既不能遂朕初願尚復何心為已稱慶但天下士民遇朕七旬皆不免望恩幸澤此則情理之常亦何肯因不舉行慶典並靳恩施乎著於己亥年八月舉行恩科鄉試庚子年三月舉行恩科㑹試以彰壽考作人之盛四十四年舉行繙譯㑹試又諭熱河庠生照宣化府之例另編承字號每科鄉試取中舉人一名又准各省謄録歸入皿字號應順天鄉試又諭近來凡有諭㫖應兼蒙古文者必經朕親加改正方可頒發而以理藩院所擬原稿示䝉古王公等多不能解縁繙譯人員未能諳習䝉古語就虛文實事敷衍成篇遂致不相脗合又如從前徳通所繙清文阿岱閲之往往不能盡曉夫阿岱素精國語無不備知其所以不曉徳通之清文者非阿岱不通清語乃由徳通拘泥漢字文義牽綴為文於國語神理全未體㑹是歧清語與清文而二之無怪其相背也則蒙古王公等之不解理藩院之䝉古文其義亦然總由國朝定鼎至今百有餘年八旗滿洲䝉古子弟自其祖父生長京城不但蒙古語不能兼通即滿洲語亦日漸遺忘又復憚於學習朕屢經訓示而率教者無㡬固由習俗所移亦其人之不肯念本向上耳朕因絜矩而思之非特此也即如制義所以代聖賢立言雖古今時㑹不同而中國語言相沿未改無難㑹意追求乃今之所為時文朕覽之多不能解朕雖不喜作時文然向在書齋中於明季及國初名家大家之文亦曽誦習其中如歸有光黄淳耀純乎古文讀之心喜餘亦理精義正足供玩味柰何今之作者相戾若此至於文理之變固不始於今時曩者魏晉六朝習尚浮靡斯文極敝韓愈出而起衰八代約六經之㫖以成文人見之轉以為怪故其言曰作俗下文字下筆令人慚及示人必以為好小慚者謂之小好大慚者即以為大好是文士趨向之壞在韓愈時且然何况今之距唐又將千載乎夫文風遞降説者每以比之江河日下然聽其流而不返日甚一日伊於胡底昔韓愈尚思迴狂瀾於既倒矧有移風易俗之責者乎文以明道宜以清真雅正為宗朕曽屢降諭㫖諄諄訓誡無如聽之藐藐恬不為怪讀書人於此理尚不能喻安望他日之備國家任使乎大抵近來習制義者止圖速化而不循正軌每以經籍束之髙閣即先正名作亦不暇究心惟取庸陋墨卷𠞰襲撏撦效其浮詞而全無精義師以是教弟以是學舉子以是為揣摩試官即以是為去取且今之舉子即異日之試官不知翻然悔悟豈獨文敝即士習亦不可問矣嗣後作文者務宜沉潛經義體認先儒𫝊説闡發聖賢精藴務去陳言辭達理舉以蘄合於古人立言之道慎毋掉以輕心試官閲卷亦當嚴為甄别一切膚詞爛調槩擯不録庶㡬共知謹凛文化蒸蒸日上以副朕崇雅黜華之至意其繙譯清文䝉古文亦當實力講求勿仍陋習此㫖著頒示貢院暨各省學政及繙書房理藩院各書一通掲之堂楣俾皆觸目警心欽承毋忽并諭中外知之又諭明嵗又屆庚子鄉試正科各省正副考官應行陸續簡派而雲貴省向例於四月中旬進本其時朕南巡尚未回鑾不能預行考試而今嵗考差後尚有陸續進京銷假及陞補各員應與考者亦頗不少未便獨令向隅莫若於今冬再行考試一次除本年已出各省試差及上年㑹試曽經分校人員毋庸考試外著交吏部查明各衙門應行考試人員開具清單於十月中旬奏請定期考試以備簡用嗣經吏部奏請本年順天鄉試分校各員亦著一體無庸考試以昭平允從之又諭原任大學士劉統勲之孫劉鐶之現應順天鄉試未能中式著加恩賞給舉人一體㑹試又諭原任尚書王際華之子王朝梧昨嵗已降㫖賞給内閣中書著加恩准其一體㑹試又諭昨大學士于敏中之孫于徳裕中式舉人前赴行在謝恩因令其將闈中詩文黙出呈覽雖大致尚屬清順但其首篇内朝廷自有養賢之典何臣子偏為過激之辭小臣意為棄取而大君馭富無權又今日之粟出之於國非出之於家國家無以報功而羣下適為多事等句語意俱與𫝊註不合朱註云孔子為魯司宼時以思為宰是思乃孔子家臣九百之粟即夫子所與非受禄於魯國更非頒禄於周室也朝廷之語魯國尚不足以當之而况夫子之家乎又云夫子行芳志潔行芳非六經所有而以擬夫子更覺不倫此實認題不真及遣詞不當之故但恐通塲類此者或所不免而今年鄉試揭曉適當木蘭秋獮迴蹕熱河之時闈中十魁卷例不先行進呈朕無由得見因命軍機大臣取闈中所刻元魁卷前十名勘閲粘簽進呈則首名破題即有尊國制所以重君恩之語而其他如以功詔禄以禄馭富朝廷詔糈之典國家之體制垂焉上尊政體下廣國恩計功詔禄國典攸闗御廪之頒天家之餼等句十名中不可枚舉即其中偶有敘及為宰者亦未切實發揮均未能體㑹正解總由近時文風日壞習制義者祇圖速化而不循正軌無論經籍束之髙閣即先儒𫝊説亦不暇究心専取浮詞俗調撏撦求售師以是教弟以是學舉子以是為揣摩試官即以是為去取豈可聽其流而不返乎前曽降㫖釐正文體務以清真雅正為宗著再明白曉諭嗣後作文者各宜體認先儒𫝊説闡發題義試官閲卷當嚴為甄别若仍復掉以輕心必令將此庸陋之句悉心磨勘以示懲儆毋謂朕不戒視成也將此通行𫝊諭知之四十五年諭浙江進獻詩册考取一等之馬履泰沈颺李彤沈叔埏著特賜舉人授為内閣中書學習行走與考取候補人員挨次補用其二等之吳純等十三名俱著賞縀二疋又諭江蘇安徽進獻詩册諸生其考取一等之舉人汪履基著授為内閣中書遇缺即補吕光復等十人俱著特賜舉人授為内閣中書學習行走與考取候補人員挨次補用江西省考試一等之蔣知讓裘元復著照直𨽻山東召試之例賞給舉人准其一體㑹試其江蘇安徽江西三省考列二等之葉恩紱等三十三名著各賞縀二疋定内簾官入闈後遇有服制事故毋庸即行移㑹知貢舉謝墉疏奏考官入闈後遇有丁憂事故其應行出闈與否於例未有明文請凡在十五日以後者文到禮部暫行押住并不必移文知貢舉如屆十三四日間經禮部移知至公堂以己未送卷為率酌定查定例同考官入闈後如遇有事故奏明交與考官通融辦理毋庸另派是考官入闈後遇有事故向例俱令出塲於防閑未為周密今據知貢舉謝墉所奏較舊例固為詳慎但閲卷既虞洩漏而試題尤應闗防嗣後鄉㑹試主考同考内簾等官入闈後遇有服制事故無論曽否送卷該承辦衙門毋庸移㑹塲内均俟撤棘之日令其守制從之又諭制藝以清真雅正為主其在前列者尤為士林模楷必擇理醇法密辭語精當之作方足以式多士而正文體今日據磨勘大臣奏到覆勘本科㑹試中式第三名之鄧朝縉首藝内有讀鳲鳩在桑之什而表裏瑩然咏鶴鳴九皋之篇而精粗不紊峻徳著協和之績可騐表裏之無違干羽本文徳之敷可見精粗之悉舉等句語意粗雜理題不應有此所奏甚是此等題文在士子擇語不精率意填寫或所不免此卷現據指出而其餘似此未經磨勘者當復不少但即使舍短取長亦只可在二三十名外今竟髙列第三名位置殊為失當近年因文體蹖駮屢經降㫖訓飭凡有衡文之責者尤應悉心甄拔以期有醇無疵使文風日臻淳雅何致漫無區别若此著總裁徳保等明白回奏又諭前以各省舉人選用知縣需次至三十餘年因於壬申辛巳丙戌壬辰等科降㫖挑選分發各省試用於銓政既無壅積而士子得及鋒而試不致淹滯多年今因三十七年壬辰科挑選以後距今又屆九年所有分發一等舉人各省將次用完即二等之教職亦俱陸續補用著該部於明年辛丑科㑹試榜後請特派王大臣再行挑選並照例將近四科舉人扣除俾科分較深者得早乗時自効又議更定開列稽察御史條例都察院左都御史張若溎疏稱鄉㑹試外塲内塲内簾三處派有御史監試所以稽察弊端責任綦重向例惟將資淺御史依次開列二十員指定所司之事請用十員是一年半年之前已可揣度而知保無請託照應請嗣後一體通行開列聖明簡用之人非資格挨定之人於闗防更為周密從之又諭鄉試為掄才大典欲拔真才先清弊竇本年順天鄉試經搜檢王大臣奏挐獲懷挾𫝊逓及頂名代倩不一而足各犯已交部從重辦理用昭炯戒順天科塲特派王大臣等於磚門龍門逐次嚴查尚有此等弊竇何况外省稽察搜查斷不能如京師之嚴密該巡撫等職任監臨摘弊防奸是其専責乃厯年披閲各該撫奏摺惟今年富綱奏稱先於塲前訪查積習出示禁諭并増築夾墻另開更道於擡運人夫逐加搜檢印用號戳並不假手吏胥等語辦理較屬認真此外則均以三塲無弊一奏塞責並未見有查出懷挾𫝊逓頂冒之事豈作奸犯科者惟順天有之而各省竟俱弊絶風清如此乎實因各撫臣模稜市譽不肯認真任怨耳夫取怨於作奸犯科之人亦何妨乎嗣後各省巡撫凡遇大比之年必須實力稽察慎密防閑如有前項弊端即當立時查獲嚴加究治從重核辦務令闈中積弊肅清士子懷刑自愛庶足以甄别人材振興士習將此通諭知之並令於每科引㫖覆奏著為例又諭據磨勘試卷大臣奏江南省第一名顧問卷頭塲四書文三篇純用排偶於文體有闗且首藝未經㸃題請將該考官及本生交部查議制藝代聖賢立言原以清真雅正為宗朕屢經訓諭不啻至再至三何得又將駢體録取且拔冠榜首所謂釐正文風者安在况三藝俱用排偶塲中易於辨識并不必再用字眼闗通更易滋别項情弊殊屬不合除將該舉子交部照例查議外所有江南省正考官錢載副考官戴均元著交部議處並將此通諭知之四十六年諭向來殿試新進士有至次早始交卷者雖伊等草茅新進對揚之始未免矜持但考試給燭最滋弊竇至於連宵達旦則更長人倦防閑更未能周且朝考例作四題尚不過日入完塲而殿試對䇿一道窮日之力寫作已可從容何必焚膏繼晷始得成章乎况殿廷重地尤宜謹慎嗣後殿試交卷至遲亦以日入為度不得仍准給燭其不能完卷者仍准列入三甲末士子等各宜自勉以副朕剔弊遴才之至意又諭各省大挑舉人分發試用向例原以省分大小酌定挑數自乾隆三十七年壬辰科部臣始以逺省挑十之六近省挑十之五定例請㫖固為邊逺士子跋涉較難格外優恤起見而未思及近省中式者本來人多逺省本來人少兹朕閲本年各省大挑舉人名單内所挑近省舉人科分有逺至三十五六年者而逺省科分最久不過二十餘年蓋因直𨽻江浙等近省係中式舉人㑹試三科始得揀選而雲貴川廣等逺省㑹試一科即行揀選是以逺省科分畧深者業已挨班選用其得官已較近省為優今大挑舉人再按五六分挑取則大省科分較深舉人轉多壅滯除本年已經辦畢無庸議外至乾隆五十二年丁未科再加恩舉行大挑時無論省分逺近但就人數多寡均勻挑取俾逺近士子均得乗時自効以示朕加惠寒畯之至意四十七年諭大學士九卿科道等將從前任克溥條陳諸弊㑹議具奏摺内稱現在綱紀肅清前代粃政俱已革除净盡惟在大小臣工實力奉行自不致有因循廢弛之弊此語朕疑信半焉亦惟日慎一日所其無逸耳至副都御史巴彦學有請更定科塲詩論以杜闗節以端士習之奏所言實為深切時弊不虛朕降㫖之意已依議行矣蓋詩題係朕所命且律句謹嚴難以揣摩又若頭塲詩文既不中選則二三塲雖經文策問間有可取亦不准復為呈薦倘同考官仍蹈故轍監試官即可指名叅處如此亦防弊之一端巴彦學此奏殊可嘉尚又御史鄭澂稱論内易藏闗節一款已於巴彦學摺内准行又議覆准舉貢監生員仍得改習經書先是三十五年准廣西學政童鳯三奏請舉貢生員改經之例永行停止今御史施學濓奏稱定例以後春禮孤經習者漸少邊省尤甚閲卷不過數本嗣後舉人㑹試貢監生員鄉試之年仍照向例不准改經外其平時將所習之經具呈請改者原非臨塲趨避應令舉人由該州縣申詳督撫貢監生員由州縣教官分詳學政准改立案並於年終彚造清册咨報禮部以憑查核從之四十八年諭鄉㑹試派出主考房官秉公閲看試卷由内監試按照卷數分為十八束籖派各房閲看此定例也各房官誠能細心檢閲矢公矢慎閲薦之後聽主考取中自可甄拔真才即有一二不肖房官欲通闗節設其人不在所分卷束之内亦無從作弊近聞闈中房考於閲卷時竟有互相披閲之事如此則彼此通同其流弊何所底止嗣後房官於分卷後止准各就所分之卷悉心校閲不得互相抽看著主考官並内簾監試御史時加查核如有仍蹈前轍者指名叅奏毋稍瞻徇又定停止彌封紅號並二三塲佳卷通行校閲例大學士公阿桂等㑹議掌江南道監察御史孟生蕙奏請停止彌封紅號以防割换藏匿之弊科塲試卷定例糊名易書將硃卷戳印紅號分送内簾其紅號一項責令彌封所官親手用印防範本極嚴宻上年御史梁景陽條奏請將頭塲硃卷卷面於印號登簿後照墨卷之例一體彌封經禮部議准通行誠恐不肖胥吏藉紅號關通内簾易於辨識亦為豫防竇弊起見但據御史孟生蕙具奏本年順天鄉試監試外塲所見試卷紅號照新例彌封分送内簾辦理諸形掣肘且恐易滋割換卷面之弊自係現在實情並據查照向來舊例本極詳盡是欲嚴杜弊端惟在監試提調官遵照成例留心查察胥吏人等毋許絲毫洩漏何致内外闗通况紅號一經彌封則落卷無可查對勢難保無割換匿藏情事是欲除弊轉以滋弊自未便輕改前例徒致分更應如所奏將彌封紅號停止仍照舊例辦理再現在條例律詩改置頭塲主考等官將頭塲閲薦既畢再分閲二三塲即不得復薦頭塲從前欽奉諭㫖三塲並重久經遵照辦理今概令於取中已定後再將二三塲核對其頭塲未取中者主考房考官轉可藉名防弊全不寓目是後塲竟屬具文殊非核實之道嗣後令各房考於頭塲閲薦既畢即將二三塲通行細閲如實有出色佳卷仍准補薦頭塲聽主考官酌量取中則博採之中仍寓防閑之意從之五十年又議申定二塲論題並用孝經性理禮部尚書姚成烈疏稱查鄉㑹試舊制二塲論題孝經與性理按科輪出數科以來祇以性理命題恐士子以孝經為功令所不及庋之髙閣祈皇上敕令查明舊制凡典試論題將孝經仍與性理輪出使天下士子益知仰體皇上孝治天下之意從之臣等謹按順治十六年議准鄉㑹試後塲論題令考官間出孝經以勵士習又康熙二十九年以孝經論題甚少將性理太極圖説通書西銘正䝉一併命題嗣後或専用性理或専用孝經或二書參用更改不一乾隆二十一年奉諭㫖將論判表概行刪省二十三年御史吳龍見奏准鄉㑹試仍出性理論一題未曽分晰具奏以致近科惟以性理命題兹經禮部議奏二塲論題仍將孝經與性理二書兼出著為令式所以敦崇實學者至矣又定江南陜西二省迴避安徽甘肅現任官子弟例御史丁雲錦疏稱江寧司道首府首縣准用安徽籍貫人員其子弟等即在江寧省城應試情形與各省不同迹涉嫌疑應酌定條例防於未然所有江南省城司道首府首縣之安徽籍貫人員其子弟宗族姻親概令迴避但須查明鄉試之時現在履任者方照此辨理若屆期改任别省及業經回籍者不在此例又内外簾官不應調取安徽籍貫人員例無明文應請一併載入科塲條例再陜西省城司道首府首縣亦准用甘肅籍貫人員其子弟等即在西安鄉試亦應照此畫一辦理從之又議申定雜項考試人數二百名以外歸貢院考試又諭九卿議覆御史梁景陽條奏滿漢雜項考試應酌歸貢院一摺内稱嗣後各項考試人數在五百名以内仍令在午門考試如五百名以上應歸貢院所議未為允協午門為朝㑹之所考試人數較多不但稽察難周且於觀瞻有礙嗣後人數在二百名以内仍在午門考試如至二百名即歸貢院考試著為令先是三十四年准御史五章阿奏請一切雜項考試人數在五十名以内仍照舊例在午門考試至五十名外歸貢院考試嗣於四十八年刑部尚書胡季堂言貢院地方閒曠難於防範請仍在午門内外朝房辦理今因御史梁景陽疏請仍歸貢院考試經九卿議奏從之登科總目順治三年三月廷試李奭棠等三百七十三人賜傅以漸等進士及第出身有差四年三月廷試李人龍等二百九十八人賜吕宫等進士及第出身有差六年四月廷試左敬祖等二百九十五人賜劉子壯等進士及第出身有差九年三月廷試滿洲進士麻勒吉等五十人賜麻勒吉等進士及第出身有差廷試張星瑞等三百九十七人賜鄒忠倚等進士及第出身有差十二年三月廷試滿洲進士查親等五十人賜圖爾宸等進士及第出身有差廷試秦鉽等四百四十九人賜史大成等進士及第出身有差十五年三月廷試張貞生等三百四十三人賜孫承恩等進士及第出身有差十六年九月廷試朱錦等三百七十六人賜徐元文等進士及第出身有差十八年四月廷試陳常夏等三百八十三人賜馬世俊等進士及第出身有差康熙三年三月廷試沈珩等二百人賜嚴我斯等進士及第出身有差六年三月廷試黄仍緒等一百五十五人賜繆彤等進士及第出身有差九年三月廷試宫夢仁等二百九十九人賜蔡啓僔等進士及第出身有差十二年三月廷試韓菼等一百六十六人賜韓菼等進士及第出身有差十五年三月廷試彭定求等二百九人賜彭定求等進士及第出身有差十八年三月廷試馬教思等一百五十一人賜歸允肅等進士及第出身有差召試博學鴻詞一等彭孫遹等二十名二等李來泰等三十名授翰林院編修檢討並給予職銜有差二十一年九月廷試金徳嘉等一百七十九人賜蔡升元等進士及第出身有差二十四年三月廷試陸肯堂等一百六十四人賜陸肯堂等進士及第出身有差二十七年三月廷試范光陽等一百四十六人賜沈廷文等進士及第出身有差三十年三月廷試張瑗等一百五十七人賜戴有祺等進士及第出身有差三十三年三月廷試裴之仙等一百六十八人賜胡任輿等進士及第出身有差三十六年七月廷試汪士鋐等一百五十人賜李蟠等進士及第出身有差三十九年三月廷試王露等三百五人賜汪繹等進士及第出身有差四十二年五月廷試王式丹等一百六十六人賜王式丹等進士及第出身有差四十五年三月廷試尚居易等二百九十人賜王雲錦等進士及第出身有差四十八年三月廷試戴名世等二百九十二人賜趙熊詔等進士及第出身有差五十一年三月廷試卜俊民等二百七十七人賜王世琛等進士及第出身有差五十二年萬壽恩科十月廷試孫見龍等一百九十六人賜王敬銘等進士及第出身有差五十四年三月廷試李錦等一百九十人賜徐陶璋等進士及第出身有差五十七年三月廷試楊爾徳等一百六十五人賜汪應銓等進士及第出身有差六十年三月廷試儲大文等一百六十三人賜鄧鍾岳等進士及第出身有差雍正元年特恩開科十月廷試楊炳等二百四十六人賜于振等進士及第出身有差二年十月廷試王安國等二百九十九人賜陳惪華等進士及第出身有差五年四月廷試彭啟豐等二百二十六人賜彭啟豐等進士及第出身有差八年四月廷試沈昌宇等三百九十九人賜周􅉈等進士及第出身有差十一年四月廷試陳倓等三百二十八人賜陳倓等進士及第出身有差乾隆元年四月廷試趙青藜等三百四十四人賜金徳瑛等進士及第出身有差召試博學鴻詞一等劉綸等五名二等楊度汪等十名授翰林院編修檢討庶吉士有差次年又補試博學鴻詞一等萬松齡二等朱筌等三名如前例授官有差二年特開恩科五月廷試何其睿等三百二十四人賜于敏中等進士及第出身有差四年四月廷試軒轅誥等三百二十八人賜莊有恭等進士及第出身有差七年四月廷試金甡等三百一十三人賜金甡等進士及第出身有差十年五月廷試蔣元益等三百一十三人賜錢維城等進士及第出身有差十三年四月廷試鄭忬等二百六十四人賜梁國治等進士及第出身有差十六年五月廷試周澧等二百四十三人賜吳鴻等進士及第出身有差十七年皇太后萬壽恩科九月廷試邵嗣宗等二百三十一人賜秦大士等進士及第出身有差十九年四月廷試胡紹鼎等二百四十一人賜莊培因等進士及第出身有差二十二年五月廷試蔡以臺等二百四十二人賜蔡以臺等進士及第出身有差二十五年五月廷試王中孚等一百六十四人賜畢沅等進士及第出身有差二十六年皇太后萬壽恩科四月廷試陳步瀛等二百一十七人賜王杰等進士及第出身有差二十八年四月廷試孫效曽等一百八十八人賜秦大成等進士及第出身有差三十一年四月廷試胡珊等二百十三人賜張書勲等進士及第出身有差三十四年四月廷試徐烺等一百五十一人賜陳初哲等進士及第出身有差三十六年皇太后萬壽恩科四月廷試邵晉涵等一百六十一人賜黄軒等進士及第出身有差三十七年四月廷試孫辰東等一百六十二人賜金榜等進士及第出身有差四十年四月廷試嚴福等一百五十八人賜吳錫齡等進士及第出身有差四十三年四月廷試繆祖培等一百五十七人賜戴衢亨等進士及第出身有差四十五年萬壽恩科五月廷試汪如洋等一百五十七人賜汪如洋等進士及第出身有差四十六年四月廷試錢棨等一百六十九人賜錢棨等進士及第出身有差四十九年四月廷試侯健融等一百二人賜茹棻等進士及第出身有差皇朝文獻通考卷五十二
