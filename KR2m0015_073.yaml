body:
  text: 欽定四庫全書皇朝文獻通考卷七十三學校考十一祠祭褒贈録後一臣等謹按古之立學者必釋奠于先聖先師所以崇德報功示民有則也三代以前皆以其國之明君為先聖而以其時之賢臣為先師漢魏以來始各以其所受業者為先師而推尊周孔為先聖自唐貞觀中詔以孔子為先聖衆儒為先師而後世乃獨尊孔子不言周公蓋由周公而上堯舜禹湯文武非儒生所敢師也由周公而下至孔子而二帝三王之道益彰明于萬世是以厯代宗之無或廢焉國朝列聖相承治法道統逺邁唐虞昭垂奕葉猶復敬學崇儒右文稽古崇德初元即遣官致祭先師孔子嗣是列祖列宗改定廟諡詳定禮儀若釋奠于春秋釋菜于朔望日講經筵先期别祭外其有國家大慶武功告成厚澤覃敷矞皇典制靡不竭誠盡敬命有司行事興秩節焉若乃臨雍親祭謁闕里酹孔林展三跪九叩之文行讀祝跪獻之禮加先世五代之封以追溯前徽設曲阜執事之官以肅將祀典避聖諱以示尊改詣學以示敬自昔帝王幸學議禮考文尊師重道未有如斯之盛者也我皇上欽崇至道孚協心源率由舊章特申隆禮內而書闈講幄外而藝苑詞林以至翠華所臨鍾靈育秀之區胥勤奠酹殷禮閎規超軼萬古矣加以廟易黃瓦器設特懸釐訂樂章躬虔三獻極禮明樂備之盛以致精禋昭報之誠殿額穹碑天章宸翰罔不契道脈而闡微言實集羣聖之大成心傳合一而亦無不與列聖之鴻文巨筆先後同符是豈祠祭之故事曲臺之舊文所可同年而語哉若夫表章元聖之德增定十哲之例升祔賢儒從祀理學殊恩異數且延及乎後昆封爵襲官並涵濡乎教育是又昭明德之報于無涯而益有以仰朝廷崇聖之思于弗替焉臣等謹連類而附書之崇德元年遣官釋奠于先師孔子以顔子曽子子思孟子配享御製文曰惟至聖德配天地道貫古今刪述六經垂憲萬世昭宣文治厯代尊崇謹以楮帛牲醴庶品之儀式陳明薦冀歆享焉至五年定每年二月八月上丁日行釋奠禮順治元年以孔子六十五代孫孔允植襲封衍聖公以原階兼太子太傅其子興燮照例加二品冠服仍命孔允鈺顔紹緒曽聞達孟聞璽承襲五經博士曲阜縣知縣孔貞堪仍為原官其在汶上縣管聖澤書院事世襲太常寺博士仍照舊制以衍聖公第三子承襲尼山書院及四氏學録等官照舊留用其管勾司樂掌書等缺聽衍聖公咨部補授二年賜給衍聖公孔允植三臺銀印定文廟諡大成至聖文宣先師孔子又詳定文廟春秋釋奠禮每嵗春秋仲月上丁日祭先師孔子遣大學士一人行禮翰林院官二人分獻國子監祭酒祭啓聖公于啓聖祠均以先賢先儒配享從祀如遇有事故改用次丁下丁通行府州縣衛各學遵行定太學文廟朔望行釋菜禮每月初一日設酒芹棗栗祭酒官于先師位及四配位前三獻十哲兩廡位前以監丞博士等官分獻次詣啓聖祠行禮分獻官亦隨行禮十五日司業上香行禮與朔日同三年修盛京文廟四年定致祭先師孔子遣滿官贊禮祝詞兼用滿文八年賜衍聖公孔興燮及五經博士顔紹緒等宴于禮部嗣後入覲請安祝夀謝恩各慶賀大典並蒙賜宴著為常例又遣官祭先師孔子于闕里十四年復至聖先師孔子神位舊稱通行直省各學先是順治二年祭酒李若琳請易至聖先師孔子神位為大成至聖文宣先師孔子至是給事中張文光奏言聖至孔子贊美難以形容考之古典魯哀公誄文曰尼父未嘗加一字之褒漢平帝元始元年始加諡曰宣尼父後魏太和十六年乃改諡文唐太宗貞觀十一年尊為宣聖尼父明皇開元二十一年始進諡文宣王明初因之嘉靖九年尊改為至聖先師孔子神位以孔子生不為王歿而王之于理未安且以文宣之號未足以盡孔子曰至聖則無所不該曰先師則名正而實稱可不易矣我朝順治二年改定孔子神位為大成至聖文宣先師孔子不過仍元之舊諡而不稱王耳臣謂追王固屬誣聖即加大成文宣四字亦豈足以盡孔子哉皇上事事稽古議禮制度考文務求至當宜仍改主為至聖先師孔子神位庶質之先聖而無疑傳之萬世而永遵矣從之康熙元年二月遣官祭先師孔子八月亦如之自是春秋嵗舉著為例六年頒中和韶樂于太學詔名樂曲曰平國學釋奠迎神奏咸平辭曰大哉至聖峻德宏功敷文衍化百王是崇典則有常昭兹辟雍有虔簠簋有嚴鼓鐘初獻奠帛奏寧平辭曰覺我生民陶鑄前聖巍巍泰山實豫景行禮備樂和豆籩惟靜既述六經爰斟三正亞獻奏安平辭曰至哉聖師天授明德木鐸萬世式是羣辟清酒維醑言觀秉翟太和常流英材斯植終獻奏景平辭曰猗歟素王示豫物軌曕之在前神其寧止酌彼金罍維清且旨登獻既終勿遐有喜徹饌奏咸平辭曰璧水淵淵崇牙業業既歆宣聖亦儀十哲聲金振玉告兹將徹鬷假有成羮墻靡愒送神望瘞並奏咸平辭曰煌煌學宫四方來宗甄陶胄子暨余微躬思皇多士膚奏厥功佐豫永清三五是隆八年上臨雍禮成賜衍聖公及五經博士五氏子孫等宴于禮部并袍服銀兩各有差十年二月遣官告祭先師孔子以舉行經筵故也臣等謹按經筵大典所以明帝王道法相傳之統也國家列聖相承右文崇教視學釋奠必躬必親先是順治十四年八月初啓經筵禮部疏請皇帝詣𢎞德殿行致祭先師孔子禮至是禮部又請遣官告祭先師孔子迄康熙二十五年二月文華殿告成經筵前一日聖祖仁皇帝詣傳心殿行禮始垂令典矣我皇上濬哲天成緝熙時懋躬御講筵敷宣經義或春秋再舉或嵗一舉行闡先聖之精微發前賢之奧藴而前期展祀之儀率由益恭焉洵聖學之日新合先後而同揆也夫又遣官告祭先師孔子以初次舉行日講禮故也十五年遣官祭先師闕里二十一年遣官祭先師孔子于闕里時以滇省蕩平故也二十三年上躬詣闕里致祭先師孔子行三跪九叩禮以御用曲柄黃傘留供廟廷陳設御詩禮堂視學復詣孔林行三酹禮是時乘輿南巡回蹕費縣諭內閣等衙門曰闕里係聖人之地秉禮之鄉朕幸魯地致祭先師特闡揚文教鼓舞儒學祀典告成講明經書文義窮究心源符合大典應行事宜內閣各部院等衙門會同議奏議上乃命翰林院掌院學士至曲阜同衍聖公于孔氏子弟內選舉講書二人令撰次應講經書講義進呈上幸曲阜衍聖公孔育圻率博士孔育埏等諸職官及其族人五氏子孫年十六以上者于東郊跪迎士庶觀者以數萬計駕至城南行宫跓蹕禮部太常寺鴻臚寺官會集廟廷庀其執事比其位次申戒所司省牲幣眂滌濯陳設祭器祭品展樂懸整舞列張御幄置講筵于詩禮堂令進講者肄習進講儀節陳設大成至聖先師位前其器讀祝案一篚一爵并坫三登一鉶二簠二簋二籩十豆十俎三罍一虗樽三案一因其故又樽并案一香爐燭臺并几案二重其品帛一端檀香一盒大燭二對小燭四對酒三樽牛一羊一豕一大羮一登和羮二鉶黍飯一簠稷飯一簠稻飯一簋粱飯一簋榛一籩菱一籩芡一籩鹿脯一籩形鹽一籩稿魚一籩棗一籩栗一籩白餅一籩黑餅一籩韭菹一豆芹菹一豆菁菹一豆筍菹一豆醓醯一豆鹿醢一豆兔醢一豆魚醢一豆豚胉一豆脾析一豆復聖顔子宗聖曽子述聖子思子亞聖孟子位前其器篚一爵并坫三鉶二簠二簋二籩八豆八俎三香爐并几一燭臺大小八東西樽并案各一其品帛一端檀香一盒燭二酒東西各一樽羊一豕一和羮二鉶黍飯一簠稷飯一簠稻飯一簋粱飯一簋榛一籩菱一籩芡一籩棗一籩栗一籩鹿脯一籩形鹽一籩稿魚一籩韭菹一豆菁菹一豆筍菹一豆醓醢一豆鹿醢一豆兔醢一豆魚醢一豆芹菹一豆各四壇東哲先賢位五同一壇其器同篚一獻爵并坫三香爐并几一大燭臺二樽并案一各鉶一簠二籩四豆四牲盤一各小燭臺二香爐一其品同帛一端大燭二檀香一盒酒一樽黍飯稷飯各一簠各棗一籩栗一籩各鹿脯一籩形鹽一籩各菁菹一豆芹菹一豆各鹿醢一豆兔醢一豆各豕肉一盤小燭一對西哲先賢位五其器其品如之東廡先賢先儒位四十七同一壇二位為一筵其器同篚一獻爵三香盒一大香爐一大燭臺二樽并案一罍并案一各供爵一牲盤一筵各簠二籩四豆四小燭臺一香爐一其品同帛一端酒一樽檀香一盒大燭一對筵各黍飯一簠稷飯一簠栗一籩棗一籩鹿脯一籩形鹽一籩菁菹一豆芹菹一豆鹿醢一豆兔醢一豆各豕肉一盤小燭一對西廡先賢先儒位四十八同一壇二位為一筵其器其品亦如之啓聖公位其器篚一爵并坫三鉶二簠二簋二籩十豆十俎二香盒一香爐并几一燭臺大小六樽罍并案各一其品帛一端檀香一盒酒一樽燭大小各一對羊一豕一和羮二鉶黍一簠稷一簠稻一簋粱一簋榛一籩菱一籩芡一籩棗一籩栗一籩鹿脯一籩稿魚一籩形鹽一籩白餅一籩黑餅一籩菁菹一豆韭菹一豆芹菹一豆筍菹一豆醓醢一豆鹿醢一豆魚醢一豆兔醢一豆豚胉一豆脾析一豆啓聖東配先賢位二位為一壇其器同篚一獻爵并坫三樽并案一香爐并几一大燭臺二香盒一各供爵并坫一鉶二簠二籩四豆四牲盤一小燭臺二其品同帛一端酒一樽檀香一盒大燭二各和羮一鉶黍一簠稷一簠栗一籩棗一籩鹿脯一籩形鹽一籩菁菹一豆芹菹一豆鹿醢一豆兔醢一豆豕肉一盤小燭一對啓聖西配先賢位二位為一壇其器其品如之啓聖東西從祀先儒位二位為一壇其器其品亦如之凡先師位獻爵三羮次之大羮居中和羮居其左右黍稷次之黍左稷右稻粱次之稻左粱右籩之實居左形鹽稿魚棗栗一行榛菱芡鹿脯一行白餅黑餅一行豆之實居右韭菹醓醢菁菹鹿醢一行芹菹兔醢筍菹魚醢一行脾析豚胉一行香燭在其前幣奠于篚在香燭之前太牢又在其前牛居中羊左豕右牛解五體羊豕全體大香爐又在其前左右大燭讀祝案又在燭之左四配位減大羮一鉶白餅黑餅二籩脾析豚胉二豆少牢在其前羊左豕右饌盤在其右香燭在其前東西各重設小几置香燭奠幣于其上十哲位各供爵前列和羮一鉶次之黍稷次之黍左稷右豕肉次之當其中籩之實形鹽栗在黍之左棗鹿脯在豕肉之左豆之實菁菹芹菹在稷之右鹿醢兔醢在豕肉之右香燭在其前壇同豕首一當五位之中重設几奠幣獻爵置香燭饌盤在帛之右兩廡位各供爵前列筵同黍左稷右次之形鹽栗在黍之左少次之棗鹿脯又次之菁菹芹菹在稷之右少次之鹿醢兔醢又次之豕肉二又次之各于其筵供香燭東西壇同豕首四各重設一几奠帛獻爵置香燭饌盤在帛之左右啓聖位視廟祭去大羮用少牢其行列同啓聖四配位視十哲亦東西各豕首一從祀位視四配減豕首其行列同凡酒樽五三在殿之東南隅二在殿之西南隅獻先師酌東第一樽獻東配酌東第二樽獻西配酌西第一樽獻東哲酌東第三樽獻西哲酌西第二樽張樂于露臺之上楹鼓在東南隅編鐘在東偏之南編磬在西偏之南笛東西各三次面北鳯簫塤箎東西各一次面北洞簫東西各三次面北瑟東西各二次面北琴東西各三次面北柷在東北敔在西北田鼓東西各一在其北東西面麾幡在柷之北西面節一東西導引進止文舞籥翟三十六舞列在中道之東西退則立于樂懸之東西樂懸既正俾樂工各執其器麾幡一人節二人田鼓二人柷敔二人瑟四人琴六人洞簫六人鳯簫塤箎六人笛六人笙歌十二人編鐘磬二人楹鼓一人翼日昧爽禮部奏請行禮上御輦設鹵簿由曲阜南門入陪祀官皆跪迎于櫺星門外駕由櫺星門入大中門至同文門于奎文閣前降輦詣齋宿所御幄內少憩贊引官對引官奉引上由奎文閣下步入大成門乃由甬道中