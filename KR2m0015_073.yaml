褂各一領孔氏子孫監生生員白金各五兩曲阜縣康熙二十四年地丁銀兩槩行免征是日諭大學士曰周公大聖人制禮作樂垂示萬世今廟在曲阜應行致祭此係重大典禮其遣恭親王及禮部尚書偕往以示朕尊崇元聖之意御製祝文曰惟公丕承聖緒懋教人倫光烈覲揚成一家之繼述官禮制作垂萬世之經常道闡圖書探六爻而易貢心傳精一兼三代以訏謨啓東魯之典型猶存故澤入尼山之夢寐未墜斯文朕稽古省方瞻言至止郊原縱目遙深松桷之思廟貌崇觀爰切羮墻之慕特申祗薦代以親藩惟冀神靈尚其歆饗復以御書萬世師表匾額恭懸大成殿并頒發直省學宫二十四年命曲阜縣顔氏地畝照孔氏從輕徴糧二十五年上親詣傳心殿祭先師孔子以文華殿告成舉行經筵故也詔增孔林地一千頃有竒免其錢糧頒發御書學達性天四字匾額于宋儒周敦頤張載程皓程頤邵雍朱熹祠堂及白鹿洞書院嶽麓書院並頒日講解義經史諸書二十六年建孔子廟碑上親製碑文御書勒石文曰朕惟道原于天宏之者聖自庖犧氏觀圖畫象闡乾坤之祕堯舜理晰危微厥中允執禹親受其傳湯與文武周公遞承其統靡不奉若天道建極綏猷敻乎尚矣孔子生周之季韋布以老非若伏羲堯舜之聖焉而帝禹湯文武之聖焉而王周公之聖焉而相也巍然以師道作則與及門賢哲紹明絶業教思所及陶成萬世伏羲堯舜禹湯文武周公之統惟孔子繼續而光大之矣間嘗誦習詩書之所刪述大易之所演繫春秋之所筆削禮樂之所修明本末一貫根柢萬有殆與覆載合其德日月並其明四時寒暑協其序焉故曰仲尼之道一天道也朕敬法至聖景仰宫墻嚮往之誠弗釋寤寐嵗甲子十有一月時邁東魯躬詣曲阜展修祀事復謁聖墓循撫松栝儀型在望僾乎至德之親人也朕忝作君啓牖下民深惟夫子師道所建百王治理備焉舍是而圖郅隆曷所依據哉因勒文于石彰朕尊崇聖教以承天治民之意系以辭曰遐哉三五維辟之式於皇尼山師道允植天畀木鐸覺彼羣生百行以正六籍以明賢邁唐虞聖則河洛綏和動來文博禮約性天峻極倫教孔彰學昌洙泗統歸素王炎漢崇儒少牢用享厥後賢君髙山是仰豫懷至聖涖彼東方音徽云邈道德彌光鬱鬱塋林峩峩祠殿企慕安窮羮墻如見泰岱匪髙東海匪深敬揚懿軌終古式欽建孟子廟碑上親製碑文御書勒石文曰自王迹熄于春秋聖人之道或幾于泯滅卒之晦而復明厯千百世而不敝者恃有孔子也孔子歿百有餘年浸假及于戰國楊墨塞路禍尤烈于曩時子輿氏起而闢之于是天下之人始知誦法孔子率由仁義斯道之有傳至于今賴之是以後世學者如韓愈蘇軾之徒或推其功以配大禹而閩洛之儒咸遵為正學之宗傳于戲盛矣夫洪水之禍止于人身已爾楊墨之禍隱然直中于人心不有孟子使楊墨濫觴于前釋老推波于後後之人雖欲從千載之下探尼山之遺緒其孰從而求之因推述厥義刻文于石俾揭于鄒之廟其詩曰尼聖既往敻矣音徽後百餘嵗聖緒浸微尚異實繁楊墨競煽陷溺之禍酷于昏墊惟子輿氏距詖放淫以承先聖以正人心述舜稱堯私淑孔子正學修明百世以俟不有是者斯道孰傳宇宙晦霧萬物狂傎我讀其書曰仁曰義遺澤未湮聞風可企嶽嶽亞聖巖巖泰山功邁禹稷德參孔顔刻石兹文于祠之下誦烈揚休用告來者建周公廟碑上親製碑文御書勒石文曰世運代嬗隔越千載則必有神哲挺生其間以承大統以作名世惟公體上聖之質紹祖考之德孝友篤仁左右寧王厥勳爛矣及乎負扆能以勤勞寅恭惇大忠信之道翼贊其君太和洽而頌聲作焉夫功莫大于致治綏邦業莫隆于制禮作樂公身兼數器開物成務其龎鴻炳爍之烈既已載于詩書志諸史册至于繫爻辭定官禮撰爾雅出言為經又何博奧難窮也昔孟子論厯古帝王至于公曰兼三王施四事而韓愈亦厯數堯舜禹湯文武以至公蓋道統之傳如此豈僅以治理之彰彰者與遙想風徽官公遺嗣俾昭世澤于無窮既命有司新公廟貌希慕之餘勒石頌德而繫之以詩詩曰邃古民朴混混茫茫列聖經綸肇軒迄商敘厥倫紀賁以采章公監二代揆時立制有因有除禮明樂備體國經野成理萬彚集武之勳紹文以孝化成諴民並孔立教為子為臣是則是效宗邦綿厯忠厚所貽貞珉載鐫作頌致思鳧繹同峙億祀為期二十七年命宋儒張載十七世孫張守先為五經博士世襲二十八年頒御製孔子贊及顔曽思孟四贊于太學兼命摹勒頒發直省學宫御製序曰蓋自三才建而天地不居其功一中傳而聖人代宣其藴有行道之聖得位以綏猷有明道之聖立言以垂憲此正學所以常明人心所以不泯也粵稽往緒仰遡前徽堯舜禹湯文武逹而在上兼君師之寄行道之聖人也孔子不得位窮而在下秉刪述之權明道之聖人也行道者勳業炳于一朝明道者教思周于百世堯舜文武之後不有孔子則學術紛淆仁義湮塞斯道之失傳也久矣後之人而欲探二帝三王之心法以為治國平天下之準其奚所取𠂻焉然則孔子之為萬古一人也審矣朕巡省東國謁祀闕里景企滋深敬摛筆而為之贊曰清濁有氣剛柔有質聖人參之人極以立行著習察舍道莫由惟皇建極惟后綏猷作君作師垂統萬古曰惟堯舜禹湯文武五百餘嵗至聖挺生聲金振玉集厥大成序書刪詩定禮正學既窮象繫亦嚴筆削上紹往緒下示來型道不終晦秩然大經百家紛紜殊途異趣日月無踰羮墻可悟孔子之道惟中與庸此心此理千聖所同孔子之德仁義中正秉彛之好根本天性庶幾夙夜朂哉令圖溯源洙泗景躅唐虞載厯庭除式觀禮器濡毫仰贊心焉遐企百世而上以聖為歸百世而下以聖為師非師夫子惟師于道統天御世惟道為寶泰山巖巖東海泱泱墻髙萬仞夫子之堂孰窺其藩孰窺其徑道不逺人克念作聖顔子贊曰聖道早聞天資獨粹約禮博文不遷不二一善服膺萬善來萃能化而齊其樂一致禮樂四代治法兼備用舍行藏王佐之器曽子贊曰洙泗之傳魯以得之一貫曰唯聖學在兹明德新民止善為期格致誠正均平以推至德要道百行所基纂承統緒修明訓辭子思子贊曰於穆天命道之大原靜養動察庸德庸言以育萬物以贊乾坤九經三重大法是存篤恭慎獨成德之門卷之藏密擴之無垠孟子贊曰哲人既萎楊墨昌熾子輿闢之曰仁曰義性善獨闡知言養氣道稱堯舜學屏功利煌煌七篇並垂六藝孔學攸傳禹功作配二十九年命先賢朱子十八世孫朱瀠承襲五經博士以主閩祀福建巡撫張仲舉疏言宋儒朱熹祖籍江南徽州府之婺源縣朱熹父朱松厯官閩土遂家于閩故有閩徽二𣲖前明有世襲五經博士二員分主閩徽祀事今據朱瀠呈報係朱熹十八世嫡孫籲請承襲查舊典朱熹裔原有博士二員請將朱瀠承襲五經博士以主閩𣲖祀事下部議行建子思子廟于闕里五經博士孔育埏疏請照顔子曽子孟子舊制于闕里孔廟西北隅建立専廟部議準行從之命官民人等經過學宫毋得乘馬三十一年修理曲阜縣孔廟成御製重修闕里孔子廟碑曰朕惟大道昭垂堯舜啓中天之聖禹湯文武紹危微精一之傳治功以成道法斯著至孔子雖不得位而贊修刪定闡精義于六經祖述憲章會衆理于一貫為往聖繼絶學為萬世正人心使堯舜禹湯文武之道燦然丕著于宇宙與天地無終極焉誠哉先賢所稱自生民以來未有盛于孔子者也往嵗甲子朕巡省東方躬詣闕里登聖人之堂祗將祀事覩其車服禮器金石絃歌蓋徘徊久之不能去焉顧聖廟多厯年所丹雘改色榱桷漸圯用是惄然于心特發內帑専官往董其役鳩工庀材重加葺治經始于辛未之夏事竣于壬申之秋廟貌一新觀瞻以肅蓋深惟孔子之道垂範古今朕願學之志時切于懷每考天人性道之原修齊治平之要思以逺紹前緒牖迪生民凡所以尊崇褒題者靡不隆禮竭誠以將景行仰止至意而况廟庭之地尤為聖人神明所憑依者哉今者登堂而陳俎豆入室而習禮儀營構既堅采章彌煥庶幾于朕心深有慰焉用是特遣皇子允祉憲皇帝世宗廟諱敬展禋祀以告落成凡我臣民瞻仰宫墻倍增嚴翼尚益思敦崇德義砥礪倫常以不負朕尊師重道之意豈不休歟因勒貞石繫以辭曰麟書啓瑞素王挺生上律下襲玉振金聲範圍百代陶甄萬類道備中和德參天地立型垂訓師道昭宣象懸七曜海納百川曩巡東魯臨河登岱峩峩尼山羮墻斯在虔恭展謁至德是欽宗風溥博教澤閎深洙泗之陽殿寢翼翼上棟下宇神靈安宅冬官特飾締造維新宏規大啓肅奉明禋聖人之居永以觀德千載傳心四方式則三十二年頒御書學達性天匾額于江南徽州紫陽書院又上以闕里文廟落成命皇三子允祉皇四子廟諱致祭于先師孔子御製祭文曰朕惟道統與治統相維作君與作師並重先師孔子德由天縱學集大成綜千聖之心傳為萬世之師表故廟祀久逺垂于無窮朕臨宇以來立綱陳紀彰教敷治咸奉至聖為法程凡典禮追崇竭誠致敬自京師下逮郡邑辟雍泮水建廟釋奠罔不備舉况兹闕里乃聖人鍾育之鄉車服禮器于斯藏守曩者東巡展拜之餘仰觀廟貌多厯年所漸有頺敝深厪于𠂻用是命官董理重加修葺棟宇維新以妥聖靈兹當告成特遣皇子允祉憲皇帝世宗廟諱致祭俎豆肅陳恍乎接至聖之音容以將朕儼恪欽崇之至意陟降在兹尚祈歆饗三十六年上以親征朔漠蕩平厄魯特噶爾丹遣官恭詣太學及闕里告祭先師孔子三十八年御書聖門之哲匾額懸子路廟賜衍聖公孔育圻等御書匾額四十年授先賢邵子後裔世襲五經博士御史杜之昻疏言宋儒邵雍與周程張朱同功五子俱有世襲博士祈敕部查邵雍嫡派子孫授為世襲博士以承祀典從之四十一年命修理國子監文廟又命闕里四氏教授照各府教授一體升轉命給宋儒程氏子孫每年祭銀四十兩先是禮部議覆五經博士程衍祀請給程子祭田應不準行上以給與祭田或為其子孫之不肖者變鬻則祀典仍缺特令該巡撫藩司酌處務令程氏子孫世世奉祀永逺無缺至是河南巡撫徐潮疏言兩程子共祀一祠應于每年春秋文廟附祭外另給致祭銀四十兩以昭曠典從之四十四年御書聖迹遺徽匾額懸挂江南青浦之孔宅諭江南學臣張廷樞曰朕比臨幸松江道經青浦據該邑貢監生員孫鋐等奏稱青浦之北地名孔宅自漢時至聖苗裔避地至此奉至聖衣冠環璧葬焉懇請頒賜匾額朕念孔子乃萬世之師既有遺迹亟宜表章因于萬幾之暇親書聖迹遺徽匾額以示尊崇先師之意可選良工摹刻懸挂又御書理明太極匾額令懸周敦頤祠堂御書正誼明道匾額懸董仲舒祠經術造士匾額懸胡安國書院又御書程氏正宗匾額令懸楊時祠奧學清節匾額令懸羅從彥祠靜中氣象匾額令懸李侗祠霜松雪柏匾額令懸胡安國祠紫陽羽翼匾額令懸蔡元定祠學闡圖疇匾額令懸蔡沈祠力明正學匾額令懸真德秀祠五十一年升朱子配享位於大成殿上以孔孟之後有禆斯文者朱子之功最為宏巨應崇禮表章特諭大學士等詳議具奏尋議宋儒朱子配享孔廟本在東廡先賢之列今應升于大成殿十哲先賢卜子商之次以昭表章至意從之前期遣官二人祇告先師孔子及朱子位前又萬夀聖節遣官告祭闕里又以先賢言偃七十三世孫生員言德堅世襲五經博士五十四年以宋儒范仲淹從祀孔廟禮部議準以學問精純經綸卓越從祀西廡在先儒韓愈之次五十五年定四氏學官考試引見之例先是衍聖公孔育圻疏言請將貢生楊浩補授四氏學正奉上諭學官俱考試引見四氏學官亦令考試引見以後衍聖公所屬應補官員俱著考試引見五十八年定衢州府聖裔入學例學臣汪漋疏言浙江衢州府西安縣之孔氏乃先師嫡裔查兖州府曲阜縣嵗科兩試將孔氏子孫進數十人鄉試另編耳字號將孔氏子孫及四氏子孫中式二人今衢州孔氏後裔繁衍仰請格外加恩于嵗科兩試西安入學額數外將孔氏子孫另編字號每次額取二名從之五十九年授先賢卜商後裔世襲五經博士皇朝文獻通考卷七十三
