body:
  text: 樂考十三樂器七胡笳律吕正義後編曰胡笳木管內徑五分七釐為九倍黃鍾管之徑長二尺三寸九分六釐為本管倍姑洗之度兩端入角口各八分八釐最下一孔距管端二尺一寸三分為本管倍蕤賔之度次上一孔距管端一尺八寸九分三釐為本管倍夷則之度最上一孔距管端一尺四寸二分為本管大吕之度管端角哨長三寸八分四釐吹口徑三分六釐四毫管末角嘴長八寸零九釐大徑一寸七分二釐小徑一寸六分一釐三孔皆閉為上字開下一孔為尺字開下二孔為工字三孔皆開為六字笳本角音今胡笳上下用角意即古角遺制笳之名其後起者也黃鍾加八分之一同形管全管黃鍾之分應簫之髙尺字八倍其積成九倍黃鍾管其全管黃鍾之分仍應簫之髙尺字則其倍姑洗之分應簫之髙六字即笛之髙上字今為笛之低上字是因設哨加嘴而下半音也設哨聲當低加嘴聲當髙以低抵髙故仍下半音也倍蕤賓之分應簫之髙五字即笛之髙尺字今為笛之低尺字倍夷則之分應簫之髙乙字即笛之髙工字今為笛之低工字是亦因設哨加嘴而下半音也大吕之分應簫之低工字即笛之低五字今為笛之低六字是因設哨加嘴而下半音又掣下半音也亦與頭管掣音之理同觱篥律吕正義後編曰瓦爾喀觱篥蘆管徑二分四釐九毫為黃鍾八分之六同形管之徑長五寸三分七釐為本管夾鍾姑洗相和之度簧口距管末四寸五分三釐為本管蕤賓林鍾相和之度第一孔距簧口三寸五分八釐為本管無射應鍾相和之度第二孔距簧口二寸八分五釐為本管半太蔟半夾鍾相和之度第三孔距簧口二寸二分六釐為本管半蕤賓半林鍾相和之度銅嘴長二寸三分二釐為本管半㽔賔之度中有小孔徑九釐上口內徑稱蘆管外徑下口內徑一寸七分四釐為本管半應鍾之度三孔皆閉為上字開下一孔為尺字開下二孔為工字三孔皆開為六字黃鍾八分之六同形管黃鍾大吕相和之分應簫之凡字則其蕤賔林鍾相和之分應簫之乙字即笛之工字今乃為笛之上字是因設簧而下二音也笙設金簧管設葦哨皆下三音今在本管開簧故只下二音耳無射應鍾相和之分應簫之尺字即笛之六字今為笛之尺字是因設簧而下二音又掣下一音也半太蔟半夾鍾相和之分應簫之凡字即笛之乙字今乃為笛之工字半蕤賔半林鍾相和之分應簫之五字即笛之尺字今乃為笛之六字是因設簧而下二音又掣下二音也與頭管掣音之理同巴拉滿律吕正義後編曰回樂巴拉滿以木為管本小末大飾以金通長九寸四分上口內徑四分外徑八分下口內徑六分外徑一寸三分管上口安蘆哨長二寸七分三釐哨入木管五分九釐上口寬二分九釐正面七孔最下第一孔距上口七寸七分得凡字次上第二孔距上口六寸九分得合字次上第三孔距上口六寸五分五釐得四字次上第四孔距上口五寸四分得乙字次上第五孔距上口四寸五分一釐得上字次上第六孔距上口三寸七分五釐得尺字次上第七孔距上口二寸九分三釐得工字最上後出一孔距上口一寸六分八釐得凡字皆應笛聲管律吕正義曰頭管之制未詳創自何時而管之見於經書者未必如今之頭管蓋古以律吕管音先諸樂其所謂管即排簫之管也唐宋而後管色之名始見史志唐人紀琴以管色定絃宋和峴言樂器中有義手笛與雅樂相應其竅有六左四右二請名拱宸管是或頭管之制所由起耶按古之管籥一管為一聲後世一管數孔則兼數管之用今時頭管共有九孔樂工相傳取音為合四乙上勾尺工凡五六髙乙髙上其通長為合最下第一孔為四第二孔為乙第三孔為上第四孔後出為勾第五孔為尺第六孔為工第七孔為六第八孔後出為五第九孔最上為髙乙帶髙上獨無凡字孔分如取凡字則借工字第六孔髙吹之或借六字第七孔低吹之其假聲字之法則又以哨巧借為髙下然終不如簫笛之能轉調其或轉調則必易哨蓋哨薄則軟軟則聲低哨厚則硬硬則聲髙哨長而聲亦低哨短而聲亦髙即如笙簧硬軟長短之分聲字也審哨之音哨得笛之上字者管之通體始得合字哨得尺字則通體得四字哨得工字則通體得乙字今管有大小兩種大者禮部太常並雜樂所用小者乃吳中所制隨歌曲與笙簧相合為用者也大管之徑三分不足長六寸稍餘小管之徑二分稍餘長五寸六分餘大管之孔九取音為十二小管之孔八取音為九但其體與孔皆工人約略為之而無一定之制故所得之音或參雜而不可為準今悉按律吕倍半之分以辨其體以審其音然後知頭管之制固不越乎律吕之範圍而旋宫轉調之義已默寓於其中矣大管以黃鍾為體其徑二分七釐四毫其長則用姑洗之分為哨下口至管通長之度即合字之本音於笛為低上字設哨則復為笛之合字而應倍無射之律其仲吕之分則為六字之位而應倍應鍾之吕因頭管之通長獨取合字故不和以仲吕之隂吕而止取姑洗之陽律焉其第一孔則蕤賔林鍾相和之分聲應黃鍾之律宫聲工字而為此管之四字焉其第二孔則夷則南吕相和之分聲應太簇之律商聲凡字而為此管之乙字焉其第三孔宜於無射應鍾相和之分取之但因管體最短生聲易别其取聲之法又將諸孔依次遞開故至第三孔音即為以下諸孔所掣而少下亦如簫笛乙字分之理是以取半黃鍾半大吕相和之分與無射應鍾相和之分相併折中乃應姑洗之律角聲六字而為此管之上字焉其第四孔則半黃鍾半大吕相和之分聲應仲吕清角髙六字蕤賓變徴低五字之間於笛為髙上字低尺字之間所謂勾字也夫正黃鍾宜得工字而半黃鍾半大吕相和之分宜下一音為尺字今因取聲隨以下諸孔全開之例故此分比尺字下半音而為勾字之後出孔焉工字之半取勾字則為下一音半矣其第五孔則半太蔟半夾鍾相和之分聲應蕤賔之律變徴五字於管為尺字夫半太蔟半夾鍾相和之分宜得工字今為尺字者蓋半黃鍾半大吕相和之分比本分之音已下半音故此半太蔟半夾鍾相和之分宜應工字者比本分之音又下一音而為此管之尺字焉凡字之半取尺字則為下二音矣其第六孔為管之工字依下二音之例則宜以合字之半為度今於第一孔四字之半取之始合蓋因管之半體以上分益短而應聲愈下前孔取全律之半聲下二音而此則又下一音故半蕤賓半林鍾相和之分聲應夷則之律徴聲乙字而為此管之工字孔焉四字之半取工字則為下三音矣至於凡字之分依前孔下三音之例則宜以第二孔乙字之半為度今以第三孔上字之半取之始合乃為下四音之分然管之凡字今又無孔而以工字孔六字孔代之故第七孔即為六字於尺字之半取之乃太蔟夾鍾相和之四分之一聲應半黃鍾之律變宫尺字而為此管六字孔焉尺字之半取六字亦為下四音也其第八孔為後出之五字依下四音之例則宜以工字之半蕤賔林鍾相和之四分之一為度今於乙字四分之一為髙工字之半取之始合乃夷則南吕相和之四分之一聲應黃鍾之律宫聲工字而為此管之後出五字孔焉髙工之半取五字則為下四音半矣其第九孔為最上一孔乃髙乙字帶髙上字者若依下四音半之例則宜以凡字之半為度今以六字之半取之始合乃太蔟夾鍾相和之八分之一聲應太蔟之律商聲凡字而為此管最上之乙字孔焉六字之半取乙字則為下五音矣太蔟夾鍾相和之分應笛之乙字今其八分之一相和之分仍應笛之乙字則又為隔八音而相應矣此大管之體孔分益短而應聲愈下或下一音或下二音或下三音四音五音甚至隔八音以協聲字然其孔竅長短之差必準以律吕倍半之度始能定其位次而辨其聲字觀此大管之制然後可以窮律吕之變而盡律吕之用也小管以黃鍾半積同形管為體其徑二分一釐七毫其長用黃鍾半積同形管之黃鍾大吕相和之分五寸六分零二毫為哨下口至管通長之度聲應姑洗之律為低六字因施哨而應倍無射之律變宫尺字乃為此管之合字焉其太蔟夾鍾相和之分四寸九分七釐九毫聲應黃鍾之律宫聲工字乃為此管之四字第一孔焉其姑洗仲吕相和之分四寸四分二釐六毫聲應太蔟之律商聲凡字乃為此管之乙字第二孔焉其第三孔為上字但因小管不用勾字且上字本分之音又為下孔所掣而少下故取蕤賔林鍾相和之上字分與夷則南吕相和之勾字分相併折中得三寸七分四釐乃為此管之上字第三孔焉其無射應鍾相和之分三寸一分二釐八毫聲應蕤賔之律變徴五字乃為此管之尺字第四孔焉若較以倍半所應聲字則倍無射應鍾相和之分在通體合字之外當下一音為凡字而正無射應鍾相和之分比倍數又下一音為工字今不應工字而應尺字則凡字之半取尺字為下二音也其第五孔工字依前孔下二音之例則宜以通體合字之半為度因管體益短其聲愈為以下諸孔所掣故下三音之分於第一四字孔之半取之始合乃半太蔟半夾鍾相和之分二寸四分八釐九毫為此管之工字第五孔焉其第六孔凡字依下三音之例則宜以第二孔乙字之半為度今下五音之分於勾字之半取之始合乃半夷則半南吕相和之分一寸七分六釐而為此管之凡字第六孔焉其第七孔後出六字計下五音之分於半太蔟半夾鍾相和工字之半取之得一寸二分四釐四毫而為此管之後出六字第七孔焉其第八孔五字亦計下五音之分於半夷則半南吕相和凡字之半取之得八分八釐而為此管之最上五字第八孔焉自黃鍾大吕相和之分以至夷則南吕相和之四分之一其間正律正吕相和者或下一音以相應或下二音三音以相應至於律吕四分之一則下五音以相應其律吕相和之位分不移而聲字自有全半之應使非律吕之分以紀其聲字之序亦何以明立體取音之道也哉律吕正義後編曰大管以姑洗律管為體徑二分七釐四毫哨下口至通長即姑洗之度設哨則為合字第一孔為四字乃蕤賔林鍾相和之分第二孔為乙字乃夷則南吕相和之分第三孔為上字乃黃鍾大吕相和之半與無射應鍾相和之分相併折中第四孔為尺字乃太蔟夾鍾相和之半第五孔為工字乃蕤賔林鍾相和之半第六孔為六字乃黃鍾四分之一第七後出孔為五字乃蕤賔林鍾相和四分之一第八孔髙乙字帶髙上字乃太蔟夾鍾相和八分之一獨無凡字孔則借第七六字孔低吹之為凡字小管以黃鍾半積同形管為體徑二分一釐七毫哨下口至通長為本管黃鍾大吕相和之分聲應姑洗之律設哨則為合字第一孔為四字乃本管太蔟夾鍾相和之分第二孔為乙字乃本管姑洗仲吕相和之分第三孔為上字乃本管㽔賔林鍾相和之分與夷則南吕相和之分相併折中第四孔為尺字乃本管無射應鍾相和之分第五孔為工字乃本管太蔟夾鍾相和之半第六孔為凡字乃本管蕤賔林鍾相和之半第七後出孔為六字乃本管半黃鍾之分第八孔為五字乃本管大吕太蔟相和四分之一管用堅木或骨角為之兩端象牙為飾開孔之法前古皆無定制前編始按律吕之分以審其音而定其度其掣音之理至為精妙然掣音之數多少不同則未嘗有定法也今按氣從本孔出以成音而下孔與底竅能掣氣使下故孔愈髙而所掣愈多此掣之生乎長者也十二正律不掣半律則長半而徑不半故氣散而音下管愈短則所掣愈多此掣之生乎徑者也如黃鍾之管自吹口至底斜界一氣線氣之所吹必成一直線猶日之所視成一視線日之所照成一光線成勾股形其半黃鍾之度氣線亦當橫徑之半內半為一音之分故八分黃鍾之管長半而徑亦半者聲與黃鍾應外半亦為一音之分故半黃鍾之管長半而徑不半者比黃鍾下一音是徑掣一音也半太簇之度氣線內為一分外為一分二故比太簇下一音二即十分音之二每音作十分也而應黃鍾之律低二分是徑掣一音二也至半林鍾之度則氣線內為一分外為二分故比林鍾下二音是徑掣二音也用勾股比例法逐分推之四分黃鍾之管比黃鍾下三音四分林鍾之管比林鍾下五音八分黃鍾之管比黃鍾下七音八分太簇之管比太簇下八音皆徑之所掣使然也外此則所掣不得整音然亦各得所掣之分數截管吹之其音悉合夫徑之掣音既由律定則長之掣音可即管推大管工字孔為㽔賔林鍾相和之半正律本為五字徑掣一音九當為凡字髙一分而此孔實得工字比之凡字髙一分者又下一音一則其為長之所掣可知矣大管五字孔為夷則南吕相和之四分之一正律本為乙字徑掣五音半當為尺字低五分而此孔實得五字比之尺字低五分者又下二音半則其為長之所掣可知矣按孔遞推而小管所掣又多於大管乃知管本角律大管之徑為黃鍾之徑而長為姑洗之長孔長為管長之半當掣一音孔長為管長四分之一當製二音孔長為管長八分之一當掣三音小管之徑為半積黃鍾管之徑而長為本管黃鍾大吕相和之長以徑長相比例孔長為管長之半當掣一音四五孔長為管長四分之一當掣二音九孔長為管長八分之一當掣四音三五用差分法按孔推之其分悉合惟大管六字孔髙六分五字孔髙一分小管凡字孔髙五分六字孔髙一音三分五字孔髙七分夫音與數原出一理大管九孔而合其七小管八孔而合其五則其理已有可憑其餘孔之不合者不得别有一理且舍是理以求數皆不得合則舍是數以求音恐亦未協於是依所推之孔分掣管吹之新管果與律合而舊管稍需遷就則是掣音之法果出於理數之自然而可為定制矣勾字不應正律諸樂器皆無此音故不用詳算術於左求大管徑掣音法以黃鍾長為大股為一率全徑作十分為大勾為二率孔長分為三率求得四率為小勾與全徑十分相減為餘勾以小勾除餘勾得掣音分數求大管長掣音法孔長為正音分孔長與通長或半長或四分之一或八分之一相減餘為掣音分掣音分與正音分相等為掣一音四分之一為掣二音八分之一為掣三音掣音分不及正音分者以掣音分為實以正音分為法除之得掣音小餘纍加之得掣音共數求小管徑掣音法以本管黃鍾之度五寸七分八釐六毫為大股為一率全徑作十分為大勾為二率孔長分為三率求得四率為小勾與全徑十分相減為餘勾以小勾除餘勾得徑掣音分數求小管長掣音法以大管徑二七四一九為一率大管半長二八八為二率以小管徑二一七六二為三率求得四率二二八五為一音分與小管半長二八一相減餘五一六為實以一音分二二八五為法除之得十分音之二小餘二六為半管自掣之分數與下半管一音二二六相加得一音四五二為半管被全管掣音之率乃以孔長為正音分孔長與通長或半長或四分之一或八分之一相減餘為掣音分掣音分與正音分相等為掣一音四五四分之一為掣二音九八分之一為掣四音三五掣音分不及正音分者以掣音分為實以正音分除之得數與掣音率相乘得掣音小餘纍加之得掣音共數大管音分四字孔本管蕤賓林鍾相和之分正律本為四字長掣十分音之一故仍為四字乙字孔本管夷則南吕相和之分正律本為乙字長掣十分音之二故仍為乙字上字孔本管無射應鍾相和之分與半黃鍾半大吕之分相併折中正律本為髙上字長掣半音故為上字尺字孔本管太簇夾鍾相和之半正律本為凡字徑掣一音三長掣十分音之八共掣二音故為尺字工字孔本管蕤賔林鍾相和之半正律本為五字徑掣一音九長掣一音一共掣三音故為工字凡字孔無射應鍾相和之半正律本為上字徑掣二音七長掣一音四共掣四音故為凡字六字孔黃鍾四分之一正律本為低工字徑掣三音長掣一音半共掣四音半故為六字五字孔蕤賓林鍾相和四分之一正律本為五字徑掣四音八長掣二音二共掣七音故仍為五字乙字孔太簇夾鍾相和八分之一正律本為凡字徑掣八音三長掣二音八共掣十一音故為乙字小管音分四字孔本管太簇夾鍾相和之分正律本為四字長掣十分音之一故仍為四字乙字孔本管姑洗仲吕相和之分正律本為乙字長掣十分音之三故仍為乙字上字孔本管蕤賓林鍾相和之分與夷則南吕相和之分相併折中正律為髙上字長掣半音故為上字尺字孔本管無射應鍾相和之分正律本為工字長掣一音故為尺字工字孔本管太簇夾鍾相和之半正律本為四字徑掣一音三長掣一音六共掣三音故為工字凡字孔本管蕤賓林鍾相和之半正律本為上字徑掣一音九長掣二音共掣四音故為凡字六字孔本管半應鍾之分正律為髙工字徑掣二音八長掣二音七共掣五音半故為六字五字孔本管大吕太簇相和四分之一正律本為髙六字徑掣三音四長掣三音共掣六音半故為五字畫角律吕正義後編曰畫角木質空心腹廣端鋭長五尺四寸六分一釐二毫為十二倍夷則之度腹徑四寸三分二釐為南吕之度上口外徑一寸二分一釐五毫為林鍾四分之一內徑七分六釐八毫為應鍾五分之一下口外徑一寸四分四釐為南吕三分之一內徑八分六釐四毫為南吕五分之一上下貼金銅口篐中間貼金藤篐五通體黑漆兩端畫雲上節畫寶相花中節雲龍下節海馬木哨長七寸二分九釐為黃鍾之度黑漆入角口吹之木之屬柷敔律吕正義曰按柷之制方二尺四寸深一尺八寸約以今尺方止一尺九寸四分四釐而深一尺四寸五分八釐而已較其中空容積得容十釜實一萬二千八百籥據此容積尺度而柷之制為有本矣今禮部太常所用柷上闊下小狀如斗然以深一尺四寸五分八釐為度二倍黃鍾之數則一萬二千八百籥之積得上方二尺一寸八分七釐三倍黃鍾之數下方一尺六寸九分零四毫斯制雖上下異數均之即方一尺九寸四分四釐之度也敔制如伏虎背上二十七鉏鋙今定尺度則通體之長為二尺一寸八分七釐三倍黃鍾之數鉏鋙之分為七寸二分九釐黃鍾之數而敔之制亦為有本矣律吕正義後編曰柷深一尺四寸五分八釐上方二尺一寸八分七釐下方一尺六寸九分零四毫體厚七分二釐九毫上口邊寬二寸零二釐二毫厚一寸二分一釐五毫裏面黑漆三面正中各設圓鼓以受擊一面開圓孔以出音徑各四寸八分六釐外面繪五彩山水花卉四角立柱漆以金趺髙三寸零三釐四毫方二尺零四分五釐長四寸八分六釐緑漆推八楞中徑一寸四分五釐八毫兩端徑八分七釐四毫柄用硃漆長一尺二寸一分三釐六毫柄端如意金雲頭以黃絨縧結之敔通體長二尺一寸八分七釐鉏鋙之分七寸二分九釐寬一寸三分六釐五毫髙一寸四分五釐八毫頭髙九寸四分七釐七毫尾髙八寸一分闊六寸四分八釐通身紅黑斑紋趺髙一尺零二分四釐長二尺一寸八分七釐闊一尺二寸一分三釐六毫漆以金旁施兩耳以置籈耳長三寸六分四釐五毫籈以竹為之硃漆長二尺四寸三分徑一寸四分五釐八毫析其半為二十四莖柷以作樂敔以止樂虞書而後傳注無異辭至於堂上堂下之制大小之度戞擊之法則歷代多有不同前編因明舊制而斟酌之以合律分乃為得中若夫擊柷之法禮圖宋史皆謂宜從鄭康成說投椎其中撞之與今制同若如郭璞所云有柄連底挏之令左右擊則鈴鐸之屬其器應俯而不應仰通典唐志皆云傍開圓孔內手其中撞之則其器又應髙而不應卑是皆器與用不合恐其說不可信今考其義其一面有孔者殆亦如琴瑟底之孔以取聲未必內手其中也擊敔之法則先三擊其首而後戞其背自唐宋已然朱載堉謂不必添擊首三聲苐以傳注無擊首之說耳總之古制多不可考據今稽古有義可通則悉仍其舊此我朝制作所以信而有徴也拍板律吕正義後編曰拍板用堅木為之六片長一尺一寸五分二釐為姑洗倍度上闊二寸一分六釐為南吕半度腰闊一寸九分二釐為應鍾半度下闊二寸五分六釐為蕤賔半度上下二片中脊厚四分五釐五毫為夷則十分之一中四片厚三分八釐四毫為應鍾十分之一以黃絨紃聨之左右各三片合擊以節樂周禮舂牘應雅皆節樂之器後世以板代之雖未詳誰作而魏晉以來固有之矣元以前惟用於燕樂明代始用於丹陛樂我朝因之至其用以節樂牛僧孺以為樂句元戚輔之客談以為樂節非句謂歌曲八字一拍以鼓為節當云與鼓同尤佳今按鼓乃樂句拍板則有拍於句之上句之間句之下者但以音節長短相稱不拘定以八字限為一拍也拍律吕正義後編曰拍紫檀板四片以絃合三片為一束執一片拍之中長一尺一寸一分五釐為姑洗仲吕共度邊長一尺零五分一釐為仲吕蕤賓共度上闊二寸零二釐為無射半度下闊二寸四分三釐為林鍾半度中闊一寸六分七釐為仲吕十分之三厚三分五釐為黃鍾大吕相和二十分之一面上一片脊厚四分為無射十分之一二孔距上端三寸五分二釐二孔周相距三分五釐以黃絨紃結之番部拍律吕正義後編曰番部拍紫檀板三片以二片為一束執一片拍之中長八寸零九釐為無射倍度邉長七寸八分八釐五毫為無射應鍾共度上闊一寸四分五釐八毫為林鍾十分之三下闊一寸九分四釐四毫為太蔟十分之三中闊一寸二分一釐三毫為無射十分之三中一片厚二分九釐一毫為林鍾百分之六前後二片脊厚與中片等邊厚一分九釐四毫為太蔟百分之三二孔距上端二寸零二釐二毫二孔周相距四分零四毫以黃絨紃結之臣等謹按拍板之制其式大而六片者凡丹陛樂鹵簿樂導迎樂清樂並用之其稍小而四片者乃慶隆舞樂器此又小於慶隆舞拍且止三片番部合樂用之其制雖各有不同而用以節樂則一也八音之外麾律吕正義後編曰麾黃帛為之長五尺四寸六分七釐五毫闊一尺零七分八釐六毫繡九曲雲龍上鑲藍帛長八寸一分繡紅日日中繡中和金篆字上繡三台星左北斗右南斗帛上雕龍寶蓋髙五寸七分六釐下雕山水座髙三寸六分四釐五毫皆用木漆以以硃杆懸之杆長八尺一寸徑一寸一分五釐二毫上飾鍍金銅龍長一尺零九分三釐五毫龍首曲向前四寸六分零八毫架髙二尺五寸六分闊一尺五寸三分六釐漆以金樂之用麾始見唐志歷代因之舉之而樂作偃之而樂止故麾雖非樂器實樂器之綱戲竹律吕正義後編曰戲竹一對硃紅油攢竹柄下釘貼金銅篐上安貼金木葫蘆內栽紅油竹絲五十莖柄長六尺四寸八分葫蘆長七寸二分九釐竹絲長三尺六寸四分五釐葫蘆上繫綵線流蘇二人執之立丹陛上舉以作樂偃以止樂戲竹始見元史禮樂志言長二尺餘明制則長一丈一尺二寸朝㑹導迎皆用之我朝因明之制蓋丹陛樂無柷敔樂設太和門上惟有戲竹在丹陛上全視其開合以為作止之節舉而合向則樂作偃而開植則樂止也戲音麾與麾同皇朝文獻通考卷一百六十七
