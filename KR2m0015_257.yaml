body:
  text: 欽定四庫全書皇朝文獻通考卷二百五十七象緯考二兩儀七政恆星總論臣等謹按前史志天文者大抵詳於七政恆星而於兩儀則紀其變而弗紀其常我朝作明史天文志以常象雖無古今之異而言天者後勝於前宜標其指要以為綱領爰先兩儀次七政恆星伏惟聖祖仁皇帝著厯象考成一書綜前古周髀宣夜渾天諸家之同異而折衷一是我皇上復以近時實測之數剖析源流著為後編蓋皆循蜚疏仡以來三極彛訓之所未有也兹敬録總論諸篇彚為一卷以識推步測驗者之所據依焉御製厯象考成上編論天象虞書堯典曰欽若昊天厯象日月星辰楚詞天問曰圜則九重孰營度之後世厯家謂天有十二重非天實有如許重數蓋言日月星辰轉運於天各有所行之道即楚詞所謂圜也欲明諸圜之理必詳諸圜之動欲考諸圜之動必以至靜不動者凖之然後得其盈縮蓋天道靜專者也天行動直者也至靜者自有一天與地相為表裏故羣動者運於其間而不息若無至靜者以驗至動則聖人亦無所成其能矣人恆在地面測天而七政之行無不可得者正為以靜驗動故也十二重天最外者為至靜不動次為宗動南北極赤道所由分也次為南北歲差次為東西歲差此二重天其動甚微厯家姑置之而不論焉次為三垣二十八宿經星行焉次為填星所行次為歲星所行次為熒惑所行次則太陽所行黃道是也次為太白所行次為星辰所行最內者則太隂所行白道是也要以去地之逺近而為諸天之內外然所以知去地之逺近者則又從諸曜之掩食及行度之遲疾而得之蓋凡為所掩食者必在上而掩之食之者必在下月體能蔽日光而日為之食是日逺月近之徴也月能掩食五星而月與五星又能掩食恆星是五星髙於月而卑於恆星也五星又能互相掩食是五星各有逺近也又宗動天以渾灝之氣挈諸天左旋其行甚速故近宗動天者左旋速而右移之度遲漸逺宗動天則左旋較遲而右移之度轉速今右移之度惟恆星最遲土木次之火又次之日金水較速而月最速是又以次而近之證也是故恆星與宗動相較而歲差生焉太陽與恆星相會而歲實生焉黃道與赤道出入而節氣生焉太陽與太隂循環而朔望盈虛生焉黃道與白道交錯而薄蝕生焉五星與太陽離合而遲疾順逆生焉地心與諸圜之心不同而盈縮生焉厯代專家多方測量立法布算積久愈詳已得其大體其間或有毫芒之差諸説不無同異者蓋因儀器仰測穹蒼失之纎微年久則著雖有聖人莫能預定惟立窮源竟委之法隨時實測取其精密附近之數折中用之每數十年而一修正斯為治厯之通術而古聖欽若之道庶可復於今日矣御製厯象考成上編論地體欲明天道之流行先達地球之圓體日月星辰每日出入地平一次而天下大地必非同時出入居東方者先見居西方者後見東西相去萬八千里則東方人見日為午正者西方人見日為卯正也周天三百六十度每度當地上二百里是故推驗大地經緯度分皆與天應測緯度者用午正日晷或測南北二極測經度則必於月蝕取之蓋月蝕與日蝕異日之食限分數隨地不同月之食限分數天下皆同但入限有晝夜人有見不見耳此處食甚於子者處其東三十度必食甚於丑處其西三十度必食甚於亥是故相去九十度則此見食於子而彼見食於酉相去百八十度則此見食於子而彼當食於午雖食而不可見矣御製厯象考成上編論黃道赤道天包地外圜轉不息南北兩極為運行之樞紐地居天中體圓而靜人環地面以居隨其所至適見天體之半中華之地面近北故北極常見南極常隱平分兩極之中橫帶天腰者為赤道赤道距天頂之度即北極出地之度也赤道以北為內為隂以南為外為陽斜交赤道而半出其南半出其北者為黃道乃太陽一歲所躔之軌迹也黃赤道相交之兩界為春秋分距赤道南二十三度半為冬至距赤道北二十三度半為夏至七政所行之道紛然不齊惟恃黃赤二道以為推測之本蓋太陽循黃道東行而出入於赤道之南北太隂與五星各循本道東行而又出入於黃道之南北故黃赤二道之位定則晝夜永短寒暑進退以及晦朔弦望薄蝕朏朒皆從此可稽矣御製厯象考成上編論經緯度恆星七政各有經緯度蓋天周弧線縱橫交加即如布帛之經緯然故以東西為經南北為緯然有在天之經緯有隨地之經緯在天則為赤道為黃道隨地則為地平赤道均分三百六十度平分之為半周各一百八十度四分之為象限各九十度六分之為紀限各六十度十二分之為宫為時各三十度是為赤經從經度出弧線與赤道十字相交各引長之會於南北極皆成全圜亦分為三百六十度兩極相距各一百八十度兩極距赤道俱九十度是為赤緯依緯度作圜與赤道平行名距等圈此圈大小不一距赤道近則大距赤道逺則小其度亦三百六十俱與赤道之度相應也赤道之用有動有靜動者隨天左旋與黃道相交日躔之南北於是乎限靜者太虛之位亘古不移晝夜之時刻於是乎紀焉黃道之宫度並如赤道其與赤道相交之兩點為春秋分相距皆半周平分兩交之中為冬夏至距兩交各一象限六分象限為節氣各十五度是為黃經從經度出弧線與黃道十字相交各引長之周於天體即成全圜其各圜相湊之處不在赤道之南北兩極而别有其樞心是為黃極黃極之距赤極即兩道相距之度其距黃道亦皆九十度是為黃緯而月與五星出入黃道之南北者悉於是而辨焉故凡南北圈過赤道極者必與赤道成直角而不能與黃道成直角其過黃道極者亦必與黃道成直角而不能與赤道成直角惟過黃赤兩極之圈其過黃赤道也必當冬夏二至之度所以並成直角名為極至交圈又若赤道度為主而以黃道度凖之則互形大小何也渾圓之體當腰之度最寬漸近兩端則漸狹距等圈之度也二至時黃道以腰度當赤道距等圈之度故黃道一度當赤道一度有餘二分時兩道雖皆腰度然赤道平而黃道斜故黃道一度當赤道一度不足也此所謂同升之差而七政升降之斜正伏見之先後皆由是而推焉至於地平經緯則以各人所居之天頂為極蓋人所居之地不同故天頂各異而經緯從而變也地在天中體圓而小隨人所立凡目力所極適得大圓之一半則地雖圓而與平體無異故謂之地平乃諸曜出沒之界晝夜晦明之交也地平亦分三百六十度四分之為四方子午卯酉各相距九十度二十四分之為二十四向各十五度是為地平經從經度出弧線上會於天頂並皆九十度從地平下至天頂之衝亦九十度是為地平緯又名高弧高弧從地平正午上會天頂者其全圈必過赤道南北兩極名為子午圈乃諸曜出入地平適中之界而北極之高下晷影之長短中星之推移皆由是而測焉是故經緯相求黃赤互變因黃赤而求地平或因地平而求黃赤乃厯象之要務推測之所取凖也御製厯象考成上編論七政宿度日月五星皆有宿度古以十二宮定於二十八宿故宿度逐歲不同者經度亦因而不同今以二十八宿厯於十二宫故宿度逐歲有差而經度終古不變其法以歲差五十一秒按歲積之與各宿第一星黃道經度相加為本年黃道宿鈐乃於七政黃道經度內減去相當黃道宿度餘即七政黃道宿度蓋七政恆星皆宗黃道故宿度亦以黃道推也至於日月交食則并用赤道宿因其關於天行最著故於推算獨詳然各宿赤道經緯度逐歲不同須按推恆星赤道經度法求得本年各宿第一星赤道經度為本年赤道宿鈐乃於太陽太隂赤道經度內減去相當赤道宿度餘即太陽太隂赤道宿度御製厯象考成上編論北極高度北極為天之樞紐居其所而不移其出地有高下者因人所居之地南北之不同也是故寒暑之進退晝夜之永短因之而各異焉蓋厯法以日躔出入赤道之度定諸節氣而北極出地之度即赤道距天頂之度倘推測不精高度差至一分則春秋分必差一時而冬夏至必差一二日日躔既差則月離五星之經緯無不謬矣故測北極出地之高下最宜精密不容或略也御製厯象考成上編論地半徑差凡求七曜出地之高度必用測量乃測量所得之數與推步所得之數往往不合蓋推步所得者七曜距地心之高度而測量所得者七曜距地面之高度也距地心之高度為真高距地面之高度為視高人在地面不在地心故視高必小於真高以有地半徑之差也或有大於真高者則濆蒙氣所為也蓋七曜恆星雖皆麗於天而其高下又各不等惟恆星天為最高其距地最逺地半徑甚微故無視高真高之差若夫七曜諸天則皆有地半徑差御製厯象考成上編論地影半徑太陽照地而生地影太隂遇影而生薄蝕凡食分之淺深食時之久暫皆視地影半徑之大小其所係固非輕也但地影半徑之大小隨時變易其故有二一緣太陽距地有逺近距地逺者影巨而長距地近者影細而短此由太陽而變易者也一緣地影為尖圓體近地粗而逺地細太隂行最卑距地近則過影之粗處其徑大行最高距地逺則過影之細處其徑小此由太隂而變易者也御製厯象考成上編論日月實徑與地徑日最大地次之月最小新法厯書載日徑為地徑之五倍有餘月徑為地徑之百分之二十七強今依其法用日月高卑兩限各數推之所得實徑之數日徑為地徑之五倍又百分之七月徑為地徑之百分之二十七弱皆與舊數大制相符足徴其説之有據而非誣也御製厯象考成上編論清蒙氣差清蒙氣差從古未聞明萬厯間西人第谷始發之其言曰清蒙氣者地中遊氣時時上騰其質輕微不能隔礙人目却能映小為大升卑為高故日月在地平上比於中天則大星座在地平上比於中天則廣此映小為大也定望時地在日月之間人在地面無兩見之理而恆得兩見或日未西沒而已見月食於東日已東出而尚見月食於西此升卑為高也又曰清蒙之氣有厚薄有高下氣盛則厚而高氣微則薄而下而升像之高下亦因之而殊其所以有厚薄有高下者地勢殊也若海或江湖水氣多則清蒙氣必厚且高也故欲定七政之緯宜先定本地之清蒙差第谷言其國北極出地五十五度有竒測得地平上最大之差三十四分自地平以上其差漸少至四十五度其差五秒更高則無差矣此即新法厯書所用之表也近日西人又言於北極出地四十八度之地測得太陽高四十五度時蒙氣差尚有一分餘自地平至天頂皆有蒙氣差即此觀之益見蒙氣差之隨地不同而第谷之言為不妄矣御製厯象考成上編論曚影刻分曚影者古所謂晨昏分也太陽未出之先已入之後距地平一十八度皆有光故以一十八度為曚影限然北極出地有高下太陽距赤道有南北故曚影刻分隨時隨地不同其隨時不同者二分之刻分少二至之刻分多也隨地不同者愈北則刻分愈多愈南則刻分愈少也若夫北極出地五十度則夏至之夜半猶有光愈高則漸不夜矣南至赤道下則二分之刻分極少而二至之刻分相等赤道以南反是御製厯象考成上編論時差時差者平時與用時相較之時分也推步所得者為平時測量所得者為用時用時即視時也二者常不相合其故有二一因太陽之實行而時刻為之進退蓋以高卑為加減之限也一因赤道之升度而時刻為之消長蓋以分至為加減之限也新法厯書合二者以立表名曰日差然高卑每年有行分則宫度引數必不能相同若合立一表歲久即不可用今仍分作二表加減兩次庶於法為密也御製厯象考成上編論歲差歲差者太陽每歲與恆星相距之分也如今年冬至太陽躔某宿度至明年冬至時不能復躔原宿度而有不及之分但其差甚微古人初未之覺至晉虞喜始知之因立歲差法厯代治厯者宗焉而所定之數各家不同喜以五十年差一度劉宋何承天以百年差一度祖沖之以四十五年差一度隋劉焯以七十五年差一度唐傅仁均以五十五年差一度僧一行以八十二年差一度惟宋楊忠輔以六十七年差一度以周天三百六十度每度六十分每分六十秒約之得每年差五十二秒半元郭守敬因之較諸家為密今新法實測晷影驗之中星得七十年有餘而差一度每年差五十一秒此所差之數在古法為冬至西移之度新法為恆星東行之度徴之天象恆星原有動移則新法之理長也御製厯象考成上編論厯元治厯者必有起算之端是謂厯元其法有二一則逺溯古初冬至七曜齊元之日為元自漢太初以來諸厯所用之積年是也一則截算為元若元授時厯以至元辛巳天正冬至為元今時憲厯以崇禎元年戊辰天正冬至為元是也二者雖同為起算之端然積年實不如截算之簡易也夫所謂七曜齊元者乃溯上古冬至之時歲月日時皆會甲子日月如合璧五星如聯珠是以為造厯之元使果有此雖萬世遵用可矣而草一史所載諸家厯元無一同者是其所用積年之久近皆非有所承受但以巧算取之而已當其立法之初亦必有所驗於近測遂援之以立術於是溯而上之至於數千萬年之逺庶幾各曜之躔次可以齊同然既欲其上合厯元又欲其不違近測竒零分秒之數決不能齊勢不能不稍為遷就以求其巧合其始也據近測以求積年其既也且將因積年而改近測矣杜預云治厯者當順天以求合不當為合以驗天積年之法是為合以驗天也安得為立法之盡善乎若夫截算之法不用積年虛率而一以實測為憑誠為順天求合之道治厯者所當取法也御製厯象考成上編論太陽行度太陽行天每歲一周萬古不忒宜其每日平行而無有盈縮乃徴之實測則春分至秋分行天半周而厯日多秋分至春分行天半周而厯日少其在本天所行之度原均而人居地上所見時日不同今即其不平行之數求其所以然之故則惟有本天高卑之説能盡之本天高卑之法有二一為不同心天蓋天包地外以地為心太陽本天亦包乎地外而不以地為心因其有兩心之差而高卑判焉自春分厯夏至以至秋分太陽行本天之大半周故厯日多而自地心立算止行黃道之半周故為行縮自秋分厯冬至以至春分太陽行本天之小半周故厯日少而自地心立算亦行黃道之半周故為行盈夫日在本天原自平行因自地心立算而不以太陽本天心立算遂有高卑盈縮之異故高卑為盈縮之原而兩心之差又高卑之所由生也一為本輪蓋本天與地同心而本天之周又有一本輪本輪心循本天周向東而行日在本輪之周向西而行兩行之度相等太陽在本輪之下半周去地近為卑則順輪心行故見其速於平行在本輪之上半周去地逺為高則背輪心行故見其遲於半行在本輪之左右去地不逺不近為高卑適中故名中距其行與半行等本輪循本天東行為平行度太陽循本輪西行由下而左而上而右而復於下為自行度如太陽在本輪之下去地心最近是為最卑太陽在本輪之上去地心最逺是為最高最高最卑之點皆對本輪心與地心成一直線其平行實行同度故為盈縮起算之端如太陽由本輪下向左順輪心行能益東行之度故較平行度為盈至半象限後所益漸少逮輪心行一象限太陽亦行輪周一象限即無所益而復於平行是為中距然而積盈之多正在中距蓋從地心立算為盈差之極大也從中距而後太陽行本輪之上半周背輪心行故實行漸縮然因有積盈之度方以次漸消其實行仍在平行前逮行滿一象限至最高為極縮而積盈之度始消盡無餘其實行與平行乃合為一線故自最卑至最高半周俱為盈也如太陽由本輪上向右背輪心行能損東行之度故較平行度為縮至半象限後所損漸少逮輪心行一象限太陽亦行輪周一象限即無所損而復於平行是為中距然而積縮之多亦在中距蓋從地心立算為縮差之極大也從中距而後太陽行本輪之下半周順輪心行故實行漸盈然因有積縮之度方以次相補其實行仍在平行後逮行滿一象限至最卑為極盈而積縮之度始補足無缺其實行與平行乃合為一線故自最高至最卑半周俱為縮也求得兩心之差而本輪之徑自見明於本輪之故而盈縮之理益彰其理相通其用相輔可以參稽而互證也御製厯象考成上編論太隂行度太隂行度有九而隨天西轉之行不與焉一曰平行蓋太隂之本天帶一本輪本輪心循本天自西而東每日平行一十三度有竒二十七日有餘而行天一周即白道經度也二曰自行蓋本輪心循白道行自西而東即平行經度太隂復依本輪周行自東而西每日亦行一十三度有竒微不及本輪心行而與本輪心之行順逆參錯人目視之遂生遲疾故名自行以别之授時厯名為轉周滿一周為轉終其所生之遲疾差名為初均數也三曰均輪行西人第谷言用一本輪以齊太隂之行往往與實測未合因將本輪半徑三分之存其二分為本輪半徑用其一分為均輪半徑均輪循本輪周行自東而西即自行轉周度太隂復依均輪周行自西而東每日行二十六度有竒為輪心行之倍度均輪心行一度月行均輪周二度也其所生之遲疾差即今所用之初均數也四曰次輪行蓋用本輪均輪推得遲疾之最大差為四度有竒於朔望時測之其數恰合而於上下弦時測之則不合其大差至七度有竒故又於均輪之周復設一輪循均輪周行命為次輪次輪心自西而東太隂復依次輪周亦自西而東每日行二十四度有竒為本輪心距太陽行之倍度本輪心距太陽行一度月行次輪周二度名為倍離倍離所生之遲疾差名為次均數也五曰次均輪行蓋有初均次均以步朔望以定兩弦則既合矣而於兩弦前後測之又多不合爰思次輪之上必更有一輪以消息乎次均之數今命之曰次均輪其心循次輪周自西而東行倍離之度而太隂則循此輪之周自東而西亦行倍離之度用其所生之差以加減次均數即與太隂兩弦前後所行恰合也六曰交行蓋太隂行白道出入於黃道之內外大距五度有竒其自黃道南過黃道北之點名曰正交即如春分自赤道南過赤道北自黃道北過黃道南之點名曰中交即如秋分自赤道北過赤道南每交之中不能復依原次而不及一度有餘逐日計之退行三分有餘命為兩交左旋之度自東而西也亦名羅計行度也正交曰羅㬋中交曰計都七曰最高行最高者本輪之上半最逺地心之處而最高行者平行與自行相較之分也均輪心從最高左旋微不及於平行每日六分有竒即命為最高左旋之度亦名月孛行度也八曰距日行於每日平行度內減去太陽之行為每日太隂距太陽行二十九日有竒而復與日會是為朔䇿九曰距交行以每日平行度與每日交行相加得每日太隂距交度二十七日有竒而行交一周名為交周也太隂行度用四輪推之而四輪之法皆係實測而得非意設也西人第谷以前步月離惟用本輪次輪蓋因朔望之行有遲疾故知其有本輪而兩弦之行不同於朔望故知其有次輪其法次輪與本輪兩周相切太隂行於次輪之上朔望時太隂正當兩周相切之點故云朔望時太隂循本輪周行而兩弦時太隂則從兩周相切之點行次輪半周距本輪心最逺故次輪全徑為兩弦時大於朔望時平行實行之極大差第谷遵其法用之因不能密合太隂之行故於本輪上復加一均輪且因兩弦前後之行又不同於兩弦故又加一次均輪蓋用本輪推朔望時平行實行之極大差為本輪半徑得四度五十八分有餘而徴之實測惟自行三宫九宫初度之一點為合在最高前後兩象限則失之小在最卑前後兩象限則失之大故第谷將本輪半徑三分之存其二分為本輪半徑取其一分為均輪半徑用求平行實行之差為初均數乃密合於天至於兩弦時平行實行之極大差七度二十五分有餘雖為新本輪半徑併均輪半徑仍加次輪全徑之數然即舊本輪半徑與次輪全徑相併之數也其次均輪行於次輪即如初均輪之行於本輪但所行之度不同耳初均輪行為引數之度次均輪行為倍離之度要之本輪者推本天之高卑均輪者所以消息本輪之行度次輪者定朔望兩弦之逺近次均輪者又所以分别朔望兩弦前後之加減故本輪行度合初均輪之倍引而生初均數分高卑左右而為朔望之加減差也次輪行度合次均輪之倍離而生二三均數分逺近上下而為兩弦及兩弦前後之加減差也是故非驗諸實測無以知四輪之妙而明於四輪之用則於太隂遲疾之故思過半矣御製厯象考成上編論朔望有平實之殊日月相會為朔相對為望而朔望又有平實之殊平朔望者日月之平行度相會相對也實朔望者日月之實行度相會相對也故平朔望與實朔望相距之時刻以兩實行相距之度為凖蓋兩實行相距之度以兩均數相加減而得而兩朔望相距之時刻則以兩實行相距之度變為時刻以加減平朔望而得實朔望故兩實行相距無定度則兩朔望相距亦無定時也御製厯象考成上編論晦朔弦望太隂之晦朔弦望雖無關於自行之遲疾而自行之遲疾實由於朔望兩弦而得知其二十七日有竒而一周者太隂之自行也其二十九日半強而與太陽相會者朔䇿也其間猶有望與上下兩弦之分焉蓋太隂之體賴太陽而生光其向太陽之面恆明背太陽之面恆晦而其行則甚速於太陽當其與太陽相會之時人在地上正見其背故謂之朔朔後漸逺太陽人可漸見其面其光漸長至距朔七日有竒其距太陽九十度人可見其半面太陽在後太隂在前其光向西其魄向東故名上弦上弦以後距太陽愈逺其光漸滿至一百八十度正與太陽相望人居其間正見其面故謂之望自望以後又漸近太陽人不能正見其面其光漸虧其魄漸生至距望七日有竒其距太陽亦九十度則又止見其半面太陽在前太隂在後其光向東其魄向西故名下弦下弦以後距太陽愈近其光漸消至復與太陽相會其光全晦復為朔矣御製厯象考成上編論太隂隱見遲疾合朔之後恆以三日月見於西方故尚書注月之三日為哉生明然有朔後二日即見者更有晦日之晨月見東方朔日之夕月見西方者唐厯家遂為進朔之法致日食乃在晦宋元史已辨其非而未明其故蓋月之隱見遲疾固有一定之理可按數而推殆因乎天行由於地度無庸轉移遷就也至於漢魏厯家未明盈縮遲疾之差以平朔著厯故有晦而月見西方朔而月見東方者此則推步之疏不可以隱見遲疾論也隱見之遲疾一因黃赤道之升降有斜正也蓋春分前後各三宫由星紀至實沈六宫黃道斜升而正降月離此六宫則朔後疾見秋分前後各三宫由鶉首至析木六宫黃道正升而斜降月離此六宫則朔後遲見如日躔降婁初度月離降婁一十五度為正降日入時月在地平上高一十四度餘即可見蓋入地遲而見早也日躔壽星初度月離壽星一十五度為斜降日入時月在地平上高六度餘即不可見蓋入地疾而見遲也若晦前月離正升六宫則隱遲斜升六宫則隱早其理亦同一因月距黃緯有南北也蓋月距黃道北則朔後見早距黃道南則朔後見遲如日躔降婁初度月離降婁一十五度而月距黃道北則月距地平之度多入地遲而見早月距黃道南則月距地平之度少入地疾而見遲也若晦前距黃道北則隱遲距黃道南則隱早其理亦同一因月自行度有遲疾也蓋月自行遲則朔後見遲晦前隱遲自行疾則朔後見早晦前隱早也夫月離正降宫度距日一十五度即可見以每日平行一十二度有竒計之則朔後一日有餘即見生明於西是故合朔如在甲日亥子之間月離正升宫度距黃道北而又行遲厯則甲日太陽未出亦見東方月離正降宫度距黃道北而又行疾厯則乙日太陽已入亦見西方矣御製厯象考成上編論恆星東行恆星行即古歲差也古謂恆星不動而黃道西移今謂黃道不動而恆星東行蓋使恆星不動而黃道西移則恆星之黃道經緯度宜每歲不同赤道經緯度宜終古不變今測恆星之黃道經度每歲東行而緯度不變至於赤道經度則逐歲不同而緯度尤甚自星紀至鶉首六宫星在赤道南者緯度古多而今漸少在赤道北者緯度古少而今漸多自鶉首至星紀六宫星在赤道南者緯度古少而今漸多在赤道北者緯度古多而今漸少凡距赤道二十三度半以內之星在赤道北者皆可以過赤道南在赤道南者亦可以過赤道北則恆星循黃道東行而非黃道之西移明矣新法厯書載西人第谷以前恆星東行之數或云百歲而行一度或云七十餘年而行一度或云六十餘年而行一度隨時修改與古纍改歲差之意同逮第谷定恆星每歲東行五十一秒約七十年有餘而行一度而元郭守敬所定亦為近之至今一百四十餘年驗之於天雖無差忒但星行微渺必厯多年其差乃見然則第谷所定之數亦未可泥為定凖惟隨時測驗依天行以推其數可也御製厯象考成上編論測恆星恆星東行既依黃道則測定一年之黃道經緯度而逐年之黃道經緯度皆視此矣然欲測諸恆星必以一星作距而欲測黃道經緯度必以赤道經緯度為宗蓋諸曜隨天左旋惟赤極不動其經緯既與黃道相當又與地平相應時刻之早晚於是乎紀太陽之躔次於是乎辨非赤道則黃道無從而稽也其法擇恆星之大者測其方中時刻及正午高弧乃以本時太陽赤道經度與太陽距午正赤道經度相加即星之赤道經度又以正午高弧與赤道高度相減即星之赤道緯度既得赤道經緯度則用弧三角法推得黃道經緯度既得一星之黃赤經緯度即以此一星作距或用黃道赤道諸儀測其相距之經緯或用地平象限諸儀測其偏度及高弧而諸星之黃赤經緯度皆可得矣要之測恆星之法先測一星為凖而此星經度必取定於太陽倘於時刻差四分則於天行差一度故須參互考驗方得密合或用太隂及太白比測者然皆有視差不如用太陽之確凖也御製厯象考成上編論恆星出入地平恆星隨宗動天東出西入旋轉有常因節氣有冬夏晝夜有永短人居有南北故所見恆星出入地平之時刻因時各異隨地不同也夫逐時皆有出入地平之恆星逐星皆有出入地平之時刻可以測候而得亦可以推步而知其法用本地北極高度及本星赤道經緯度求得本星與赤道同出入地平之度乃與本時太陽赤道經度相減即得本星出入地平之時刻也御製厯象考成上編論弧三角形弧三角形者球面弧線所成也古厯家有黃赤相凖之率大約就渾儀度之僅得大概未能形諸算術惟元郭守敬以弧矢命算黃赤相求始有定率視古為密但其法用三乘方取數甚難自西人利瑪竇湯若望等翻譯厯書始有曲線三角形之法三弧度相交成三角形其三弧三角各有相應之八線弧與弧相交即線與線相遇而勾股比例生焉於是乎有黃道可以知赤道有赤道可以知黃道有經可以知緯有緯可以知經厯象之法至此而備勾股之用至此而極矣正弧三角形必有一直角者蓋因南北二極為赤道之紐皆距赤道九十度故凡過南北二極經圈與赤道交所成之角俱為直角其相當之弧皆九十度又凡有一圈即有兩極其過兩極經圈與本圈相交亦必為直角其所成三角形必皆為正弧三角形夫正弧三角形所知之三件弧角相對者用弧角之八線所成勾股為比例而弧角不相對者則用次形蓋以弧角之八線所成勾股比例不生於本形而生於次形而次形者乃以本形與象限相減之餘度所成故用本形之餘弦餘切即用次形之正弦正切也其法可易弧為角易角為弧若斜弧三角形可易大形為小形易大邊為小邊易鈍角成鋭角邊與角雖不相對可易為相對且知三角即可以求邊其理實一以貫之也弧三角之有斜弧形猶直線三角之有鋭鈍形也但直線三角之鋭鈍形惟二種一種三角俱鋭一種一鈍兩鋭而斜弧形則不然或三角俱鋭或三角俱鈍或兩鋭一鈍或兩鈍一鋭其三邊或俱大過於九十度或俱小不及九十度或兩大一小或兩小一大參錯成形為類甚多而新法厯書所載推算之法益復繁雜難稽蓋三角三邊各有八線但線與線之比例相當即可相求是故或同步一星或同推一數而所用之法彼此互異遂使學者莫知所從兹約以三法求之無論角之鋭鈍邊之大小並視先所知之三件為斷其一先知之三件有相對之邊角又有對所求之邊角則用邊角比例法其一先知之三件有相對之邊角而無對所求之邊角或求角而無對角之邊或求邊而無對邊之角則用垂弧法其一先知之三件無相對之邊角或三邊求角或有兩邊一角而角在所知兩邊之間或三角求邊或有兩角一邊而邊在所知兩角之間則用總較法明此三法則斜弧之用已備而七政之升降出沒經緯之縱橫交加無不可推測而知矣臣等謹按考成上編首論儀象次即詳弧三角形備列綱領條目圖説及相求比例總較之法誠以日躔月離日食月食五星恆星皆藉是以推步焉兹録總論及分論正斜形各一篇其神明簡易之妙用可概見云御製厯象考成後編論歲實日行天一周為歲周歲之日分為歲實古法日行一度故周天為三百六十五度四分度之一歲實為三百六十五日四分日之一堯典曰期三百有六旬有六日杜預謂舉全數而言則有六日其實五日四分日之一是也漢末劉洪始覺冬至後天以為歲實太強減歲餘分二千五百為二千四百六十二晉虞喜宋何承天祖沖之謂歲當有差乃損歲餘以益天周歲差之法由斯而立元郭守敬取劉宋大明戊寅以來相距之積日時刻求得歲實為三百六十五日二千四百二十五分比四分日之一減七十五分而天周即為三百六十五度二千五百七十五分矣西法周天三百六十度第谷定歲實為三百六十五日五時三刻三分四十五秒以周日一萬分通之得三百六十五日二四二一八七五較之郭守敬又減萬分之三有竒以除周天三百六十度得每日平行五十九分零八秒一十九微四十九纎五十一忽三十九芒即十分度之九分八五六四七三六五八歲差則謂恆星每年東行五十一秒不特天自為天歲自為歲而星又自為星其理甚明後西人奈端等屢測歲實又謂第谷所減太過酌定歲實為三百六十五日五時三刻三分五十七秒四十一微三十八纎二忽二十六芒五十六塵以周日一萬分通之得三百六十五日二四二三三四四二一四一五比第谷所定多萬分之一有竒以除周天三百六十度得每日平行五十九分零八秒一十九微四十四纎四十三忽二十二芒零三塵即十分度之九分八五六四六九六九三五一二八二二五比第谷所定少五纎有竒每年少三十微有竒蓋歲實之分數增則日行之分數減據今表推雍正元年癸卯天正冬至比第谷舊表遲二刻日躔平行根比舊表少一分一十四秒而第谷去今一百四十餘年以數計之其差恰合是亦取前後兩冬至相距之積日時刻而均分之非意為增損也御製厯象考成後編論黃赤距緯黃赤距緯古今所測不同自漢以來皆謂黃道出入赤道南北二十四度元郭守敬所測為二十三度九十分三十秒以周天三百六十度每度六十分約之得二十三度三十三分三十二秒第谷所測為二十三度三十一分三十秒康熙五十二年皇祖聖祖仁皇帝命和碩莊親王等率同儒臣於暢春園蒙養齋開局測太陽高度得黃赤大距為二十三度二十九分三十秒今監臣戴進賢等厯考西史第谷所測蓋在明隆萬時而漢時多祿畝所測為二十三度五十一分三十秒較第谷為多我朝順治年間刻白爾改為二十三度三十分後利酌理噶西尼又改為二十三度二十九分俱較第谷為少其前後多少之故或謂諸家所用蒙氣差地半徑差之數各有不同故所定距緯亦異然合中西考之第谷以前未知有蒙氣差而多祿畝與古為近至郭守敬則與第谷相若而去多祿畝則有十數分之多康熙年間所用蒙氣差地半徑差俱仍第谷之舊與刻白爾噶西尼等所用之數不同而所測大距又相去不逺由此觀之則黃赤距度古今實有不同而非由於所用差數之異所當隨時考測以合天也御製厯象考成後編論地半徑差噶西尼等謂日天半徑甚逺無地半徑差而測量所係只在秒微又有蒙氣雜乎其內最為難定因思日月星之在天惟恆星無地半徑差若以日與恆星相較可得其凖而日星不能兩見是測日不如測五星也土木二星在日上去地尤逺地半徑差愈微金水二星雖有時在日下而其行繞日逼近日光均為難測惟火星繞日而亦繞地能與太陽衝故夜半時火星正當子午線於南北兩處測之同與一恆星相較其距恆星若相等則是無地半徑差若相距不等即為有地半徑差其不等之數即兩處地半徑差之較且火星衝太陽時其距地較太陽為近則太陽地半徑差必更小於火星地半徑差也噶西尼用此法推得火星在地平上最大地半徑差為二十五秒比例得太陽在中距時地平上最大地半徑差為一十秒驗之交食果為吻合近日西法並宗其説今用所定地半徑差求地半徑與日天半徑之比例中距為一與二萬零六百二十六最高為一與二萬零九百七十五最卑為一與二萬零二百七十七以求地平上最大之地半徑差最高為九秒五十微最卑為一十秒一十微御製厯象考成後編論日月實徑從來算家謂日月之在天其實徑原為一定之數而視徑之大小則因距地有逺近而時時不同然所謂實徑者仍以視徑之大小距地之逺近比例而得今日月本天心之距地心數皆與舊不同則日月距地之逺近亦因之而各異且視徑之大小古今所測相差惟在分秒之間在器只爭毫釐而在數已差千百則實徑究亦未有一定之數也西法以日實徑為地徑之五倍有餘中距日天半徑與地半徑之比例為一與一千一百四十二月實徑為地徑百分之二十七強中距朔望時月天半徑與地半徑之比例為一與五十六又百分之七十二上編仍之以推最高日天半徑與地半徑之比例為一與一千一百六十二最卑日天半徑與地半徑之比例為一與一千一百二十一最高朔望時月天半徑與地半徑之比例為一與五十八又百分之一十六最卑朔望時月天半徑與地半徑之比例為一與五十四又百分之八十四今監臣戴進賢等據西人近年所測日天半徑與地半徑之比例最高為一與二萬零九百七十五中距為一與二萬零六百二十六最卑為一與二萬零二百七十七月天半徑與地半徑之比例最高為一與六十三又百分之七十七中距為一與五十九又百分之七十八最卑為一與五十五又百分之七十九又用逺鏡儀西人默爵所製以逺鏡加衡為窺管測得日視徑最高為三十一分四十秒中距為三十二分一十二秒最卑為三十二分四十五秒月視徑最高為二十九分二十三秒中距為三十一分二十一秒最卑為三十三分三十六秒用此數推算日實徑為地徑之九十六倍又十分之六月實徑為地徑百分之二十七小餘二六強夫月實徑與舊大致相符而日實徑差至十九倍者蓋今所測日距地數比舊原大十八倍餘則日實徑比舊大十九倍止為大十八分之一故今之日視徑亦比舊大十八分之一是則視徑之大小固各得之實測要亦合諸推算以成一家之言至於日體純陽其光恆溢於常徑之外新法算書謂周圍皆大一分今説謂大一十五秒故推日食之法必於併徑內減去太陽光分一十五秒餘與視緯相較方為受食之分而日之本徑則仍帶光分算其理固應爾也御製厯象考成後編論日月影半徑及影差日月兩地半徑差相併即與日半徑影半徑相併之數等而日月地半徑差及日半徑皆推交食所必用之數且又皆由距地之高卑逺近而生故近日西法皆不用另求影半差惟以日月兩地半徑差相加內減去日半徑餘即為實影半徑以影差已在其中也此外又有視影之説蓋以地上有蒙氣差能映小為大則太陽實徑必小於視徑實徑小則影大矣又月食時日在地下蒙氣轉蔽日光則地影視徑必尤大於實徑計其所大之分約為太隂地平徑差六十九分之一故又以此為影差與實影半徑相加為視影半徑則所謂影差者名雖同而義實異也總之算家立説古今不必相同然測驗皆期於合天而推步必歸於有據舊説謂太陽有光分能侵地影使小今説謂地周有蒙氣能障地影使大此亦極不同之致矣然最大影半徑舊為四十六分四十八秒今為四十六分五十一秒相差不過三秒最小影半徑舊為四十二分三十八秒今為三十八分二十八秒相差四分有餘蓋地影之大小固由於太陽距地之逺近及太隂距地之高卑而太隂所關為尤重最卑太隂距地今昔相差不過百分地半徑之九十五最高太隂距地則相差至百分地半徑之五百六十一夫月之距地既因兩心差而不同則月徑與影徑遂亦因之而各異要皆據一時之所測設法推步以求合而非為臆説也御製厯象考成後編論清蒙氣差監臣戴進賢等厯考西史第谷所定地平上蒙氣差其門人刻白爾即謂失之稍大而猶未定有確數至噶西尼始從而改正焉其説謂蒙氣繞乎地球之周日月星照乎蒙氣之外人在地面為蒙氣所映必能視之使高而日月星之光線入乎蒙氣之中必反折之使下故光線與視線在蒙氣之內則合而為一蒙氣之外則岐而為二此二線所交之角即為蒙氣差角第谷已悟其理然猶未有算術噶西尼反覆精求謂視線與光線所岐雖有不同而相合則有定處自地心過所合處作線抵圜周則此線即為蒙氣之割線視線與割線成一角光線與割線亦成一角二角相減即得蒙氣差角爰在北極出地高四十四度處屢加精測得地平上最大差為三十二分一十九秒蒙氣之厚為地半徑千萬分之六千零九十五視線角與光線角正弦之比例常如一千萬與一千萬零二千八百四十一用是以推逐度之蒙氣差至八十九度尚有一秒驗諸實測較第谷為密近日西法並宗之御製厯象考成後編論太陽行度欽若授時以日躔為首務蓋日出而為晝入而為夜與月會而為朔行天一周而為歲歲月日皆於是乎紀故堯典以賔餞永短定治厯之大經萬世莫能易也其推步之法三代以上不可考漢晉諸家皆以日行一度三百六十五日四分日之一而一周天自北齊張子信始覺有入氣之差而立損益之率隋劉焯立盈縮躔度與四序為升降厥法加詳至元郭守敬乃分盈縮初末四限較前代為密西法自多祿畝以至第谷則立為本天高卑本輪均輪諸説用三角形推算近世西人刻白爾噶西尼等更相推考又以本天為撱圓均分其面積為平行度與舊法迥殊然以求盈縮之數則界乎本輪均輪所得數之間蓋其法之巧合雖若與第谷不同而其理則猶是本天高卑之説也至若歲實之轉增距緯與兩心差之漸近地半徑差蒙氣差之互為大小則亦由於積候損益舊數以成一家之言今用其法太陽之行有盈縮由於本天有高卑春分至秋分行最高半周故行縮而厯日多秋分至春分行最卑半周故行盈而厯日少其説一為不同心天一為本輪而不同心天之兩心差即本輪之半徑故二者名雖異而理則同也第谷用本輪以推盈縮差惟中距與實測合最高前後則失之小最卑前後則失之大又最高之高於本天半徑最卑之卑於本天半徑者非兩心差之全數而止及其半故又用均輪以消息乎其間而後高卑之數盈縮之行與當時實測相合然天行不能無差元郭守敬定盈縮之最大差為二度四一四以周天三百六十度每度六十分約之得二度二十二分第谷所定之最大差為二度零三分一十一秒刻白爾以來屢加精測盈縮之最大差止有一度五十六分一十二秒又以推逐度之盈縮差最高前後本輪固失之小矣均輪又失之大最卑前後本輪固失之大矣均輪又失之小乃設本天為撱圓均分撱圓面積為逐日平行之度則高卑之理既與舊説無異而高卑前後盈縮之行乃俱與今測相符凡平圓面積自中心分之其所分面積之度即其心角之度以圜界為心角之規而半徑俱相等也若撱圓有大小徑角與積已不相應矣况實行之角平行之積皆不以本天心為心而以地心為心太陽距地心線自最卑以漸而長逐度俱不等又何以知積之為度而與角相較乎然以大小徑之中率作平圓其面積與撱圓等將平圓面積逐度遞析之則度分秒皆可按積而稽撱圓之全積既與平圓全積等則其遞析之面積亦必相等故分撱圓面積雖非度亦可以度命之而度分秒亦可按積而稽也御製厯象考成後編論太隂行度上編言太隂行度有九其實均輪行自行度次輪次均輪皆行月距日倍度則行度止六而已自西人刻白爾創為撱圓之法專主不同心天而不同心天之兩心差及太隂諸行又皆以日行與日天為消息計其行度一平均用日引度二平均最高均用日距月最高之倍度三平均正交均用日距正交之倍度初均仍用自行度二均仍用月距日倍度三均末均用月距日兼月高距日高度交角用日距正交兼月距日度皆實測之數而要不離乎本天高卑中距四限與朔望兩弦前後參互比較而得之太隂之行有遲疾由於本天有高卑其説一為不同心天一為本輪與太陽同自刻白爾創為撱圓之法專主不同心天而不同心天之兩心差及最高行又隨時不同惟日當月天中距時最大遲疾差為四度五十七分五十七秒兩心差為四三三一九倍差即為八十六萬有竒與舊數相去不逺若日當月天最高或當月天最卑則最大遲疾差為七度三十九分三十三秒兩心差為六六七八二日厯月天高卑而後兩心差漸小中距而後兩心差漸大日距月天高卑前後四十五度兩心差適中又日當月天高卑時最高之行常速至高卑後四十五度而止日當月天中距時最高之行常遲至中距後四十五度而止與日月之盈縮遲疾相似而周轉之數倍之是則太隂本天之心必更有一均輪以消息乎兩心差及最高行之數因以地心為心以兩心差最大最小兩數相加折半得五五五五為最高本輪半徑相減折半得一一七三一五為最高均輪半徑均輪心循本輪周右旋行最高平行度本天心循均輪周右旋行日距月最高之倍度用切線分外角法求得地心之角為最高均數即最高行之差求得兩心相距之邊為本天心距地數即本時之兩心差也而其測量諸均數則必在高卑中距或高卑中距之間其數乃整齊而易辨要之測得高卑中距之差則兩心差之數已見而求得兩心差之數則高卑中距之差悉合矣太隂初均數生於兩心差兩心差不等則均數亦不等然於平行無與也自刻白爾以本天為撱圓以平行為面積則兩心差不等而撱圓之面積與太隂之平行亦因之不等蓋兩心差大者小徑之數小而面積亦小兩心差小者小徑之數大而面積亦大故分撱圓之度數雖同而度之面積各異非先求其面積無以求度數也今取兩心差之大中小三數求其小徑及面積以定平行而後均數可得而推也舊法用本輪均輪推初均數日躔月離數雖不同而其法則一也自刻白爾以平行為撱圓面積求實行噶西尼等立借角求角之法亦極補湊之妙矣然日天兩心差為本天半徑千萬分之一十六萬餘所差之最大者不過百分秒之六十六月天兩心差最大者為本天半徑千萬分之六十六萬餘若仍用日躔之法則其差之最大者即至四十秒雖於數不為疏而於法則猶未密故又立用兩三角形之法先以半徑為一邊兩心差為一邊太隂平引與半周相減不及半周者與半周相減過半周者減半周為所夾之角求得對兩心差之小角與前所夾之角相加復為所夾之角仍用半徑與兩心差為兩邊求得對半徑之大角為半圓引數次以大半徑為一率小半徑為二率平圓引數之正切線為三率求得四率為正切線得實引與平引相減餘為初均數依日躔借積求積法細推之其差之最大者不過一十秒較借角求角之法為密云舊法推步朔望惟用初均數刻白爾以來奈端等屢加測驗謂日在最卑後則太隂平行常遲最高平行正交平行常速日在最高後太隂平行常速最高平行正交平行常遲因定日在中距太隂平行差一十一分五十秒最高平行差一十九分五十六秒正交平行差九分三十秒其間逐度之差皆以太陽中距之均數與太陽逐度之均數為比例名曰一平均蓋太陽平行自子正隨天左旋復至子正是為一日月距日一日順行一十二度餘最高一日順行六分餘正交一日退行三分餘皆隨太陽平行為行度故為平行而太隂二均生於月距日之倍度最高均生於日距月最高之倍度正交均生於日距正交之倍度皆以太陽實行立算太陽實行有盈縮則諸行亦隨之有進退此因太陽右旋之盈縮而差者也又太陽右旋加多一度則左旋之時刻差早一度諸行亦隨之而差早一度之行太陽右旋減少一度則左旋之時刻差遲一度諸行亦隨之而差遲一度之行此因太陽隨天左旋之遲早而差者也由是二者故有一平均之法然太隂一平均則惟因左旋時差之故最高平均與正交正均則兼左旋右旋兩差之故焉以太隂一平均言之太隂二均生於月距日之倍度而月距日之度乃置太隂實行減太陽實行而得之太陽右旋之度差而多則月距日之度反差而少太陽右旋之度差而少則月距日之度反差而多是月距日之行不隨太陽右旋之盈縮為進退也惟是太陽左旋時刻差一度倍月距日已差二度太隂又隨之差二度則平行即差四度時差行差早者應減差遲者應加然差早一度者太陽未至子正一度應加一度時差行差遲一度者太陽已過子正一度應減一度時差行是差三倍時差行也故以一小時六十分為一率一小時月距日平行一千八百二十八秒六二為二率太陽中距均數一度五十六分一十三秒變時每度變為四分十五分變為一分十五秒變為一秒得七分四十五秒為三率求得四率二百三十六秒二用三因之得七百零八秒六收為一十一分四十九秒為太隂一平均太陽均數加者為減減者為加是為太陽實行至子正時之太隂平行度也以最高平均與正交平均言之最高均生於日距月最高之倍度正交均生於日距正交之倍度而日距月最高與日距正交之度乃置太陽實行減月最高與正交而得之太陽右旋之度加而多則相距之度亦多太陽右旋之度減而少則相距之度亦少是最高與正交之行固隨太陽右旋之盈縮為進退也又太陽左旋之時刻差一度日距月最高與日距正交之倍度已差二度最高與正交又隨之差二度則最高與正交即差四度時差行差早者應加差遲者應減且最高均與正交均皆隨太陽行相距之倍度太陽實行差一度則最高與正交亦隨之差一度之行大陽又加倍差一度則最高與正交又隨之差半度之行是右旋左旋之差皆為一倍有半而未至子正應加已過子正應減之時差行又其在外者也太隂在本天高卑雖無初均數而太陽在本天高卑前後猶有一平均若太陽亦在本天高卑則並無一平均矣奈端以來又屢加精測謂日天最高與月天最高同度或相距一百八十度日月又同在最高卑則實行與平行合為一線無諸均數太陽雖在最高卑而在月天高卑前後則平行常遲至高卑後四十五度而止在月天中距前後則平行常速至中距後四十五度而止然積遲積速之多正在四十五度而太陽在最高與在最卑其差又有不同因定太陽在最高距月天高卑中距後四十五度之最大差為三分三十四秒太陽在最卑距月天高卑中距後四十五度之最大差為三分五十六秒高卑後為減中距後為加其間日距月最高逐度之差皆以半徑與日距月最高倍度之正弦為比例其太陽距地逐度之差又以太陽高卑距地之立方較與本日太陽距地之立方較為比例名曰二平均蓋太隂本天心循最高均輪周行日距月最高之倍度日在月天高卑則兩心差大而撱圓之面積小故平行遲也日在月天中距則兩心差小而撱圓之面積大故平行速也日距月天高卑中距四十五度則兩心差與撱圓之面積皆為適中太隂平行原以適中之數立算故其平行無遲速也太陽在兩交後平行稍遲在大距後平行稍速其最大差為四十七秒名曰三平均蓋白極在正交均輪周舊法謂行月距日之倍度奈端以來謂行日距正交之倍度故惟太陽在兩交與大距則白極與均輪心參直其平行無加減太陽在兩交後則白極在均輪心之東而白道經圈之過黃道者亦差而東其黃道舊點所當白道度即差而西故平行應減而遲也太陽在大距後則白極在均輪心之西而白道經圈之過黃道者亦差而西其黃道舊點所當白道度即差而東故平行應加而速也此其所差止在數十秒之間雖不易得之仰觀而實可稽之儀象舊法推太隂兩弦行度止有初均二均兩弦前後始有三均初均之最大者四度五十八分餘二均之最大者二度二十七分餘三均之最大者四十二分餘計兩弦前後最大差共八度弱噶西尼以來屢加測驗謂兩弦太隂行度止有初均三均而三均又不盡關乎兩弦之故二均之最大者不在兩弦而在朔弦弦望之間其初均之最大者七度三十九分三十四秒二均之最大者三十七分一十一秒計兩弦前後最大差共八度強則是今之二均固兼舊法二均三均之義而其數則又不同蓋太隂去地甚近其行最著又二十七日有竒而一周天一月之中備日行四時之軌至為參錯不齊古人惟重交食故朔望而外置之弗論西人第谷始創二三均之法其門人精測不已又數十年然後改定則其數必實有所據而非為臆説也其法定日在最高朔望前後四十五度最大差為三十三分一十四秒日在最卑朔望前後四十五度最大差為三十七分一十一秒朔望後為加兩弦後為減其間月距日逐度之二均則以半徑與月距日倍度之正弦為比例其太陽距最高逐度二均之差又以日天高卑距地之立方較與本日太陽距地之立方較為比例與二平均同舊法推步朔望兩弦皆無三均數而三均之最大者每在朔弦弦望之間故知三均之差生於月距日之倍度自噶西尼以來以朔弦弦望間之最大差屬之二均而月距日九十度與月高距日高九十度其差正等月距日四十五度與月高距日高四十五度其差又等則是三均之差不專係乎月距日之故也於是取月距日與月高距日高之共為九十度時測之其差與月距日或月高距日高之獨為九十度者等又取月距日與月高距日高之共為四十五度時測之其差與月距日或月高距日高之獨為四十五度者等乃知三均之差生於月距日與月高距日高之總度半周內為加半周外為減其九十度與二百七十度之最大差為二分二十五秒其間逐度之差以半徑與總度之正弦為比例則三均之法定矣然必日月最高同度或日月同度兩者止有一相距之差則止有三均若月天最高與日天最高有距度日月又有距度則三均之外朔後又差而遲望後又差而速及至月高距日高九十度月距日亦九十度時無三均而其差反最大故知三均之外又有末均乃將月高距日高九十度分為九限各於月距日九十度時測之兩高相距九十度其差三分漸近則漸小其間月距日逐度末均之差皆以半徑與月距日之正弦為比例朔後為減望後為加而後推太隂經度之法纎悉具備今考其所測其數之小者只在秒微之間其時又數十年而不一遇然其用意細密學者茍通乎此何患推測之無術歟御製厯象考成後編論交均及黃白大距正交之行有遲疾由於黃白大距有大小舊法定朔望時交角最小為四度五十八分三十秒兩弦時交角最大為五度一十七分三十秒兩距度之較為一十九分交均之最大者為一度四十六分零八秒自奈端噶西尼以來謂日在兩交時交角最大為五度一十七分二十秒日距交九十度時交角最小為四度五十九分三十五秒兩距度之較為一十七分四十五秒朔望而後交角又有加分因日距交與月距日之漸逺以漸而大至日距交九十度月距日亦九十度時加二分四十三秒交均之最大者為一度二十九分四十二秒皆與舊法不同然厯家測黃白二距必於月距交九十度時夫月距交九十度而值朔望則日距交亦九十度是今之謂日距交九十度交角小猶與朔望交角小之義同也月距交九十度而值兩弦則日必在兩交是今之謂日在兩交交角大猶與兩弦交角大之義同也惟日在兩交而又值朔望則交角關乎食分之淺深日距交九十度而又值兩弦則加分關乎距緯之逺近是必驗諸實測古今確有不同之處參稽經緯以成一家之言而非輕為改定也至其推算之法以五十九為邊總五十六為邊較求得黃極之角為交均以日距交月距日之餘弦比例得加分與最小之交角相加為大距亦與舊法不同取其易於入算故近日西士皆從之皇朝文獻通考卷二百五十七
