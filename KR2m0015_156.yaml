先農壇遣官致祭用中和韶樂奉諭㫖向來先農壇親祭始用中和韶樂遣官則同小祀之例不用中和韶樂查朝日夕月等中祀雖遣官仍用中和韶樂但不飲福受胙而已朕思國之大事在農先農宜在中祀之列此次遣和親王恭代著用中和韶樂永著為例定巡幸樂制鑾儀衛奏皇上巡幸盛京接駕細樂奏與不奏奉㫖此次巡行需日甚久每日迎送不必奏樂至熱河之日奏樂迎接早晩仍舊奏樂定幸盛京頒詔慶賀筵宴樂制皇帝於行營起程至盛京儀仗全設馬上鼓吹導引駕至崇政殿陞座王公文武大臣行禮賜茶畢還宫鼓吹止翼日設丹陛大樂於兩樂亭禮部衙門設龍亭安置慶賀表文校尉舁亭用導迎樂皇帝詣皇太后宫行慶賀禮畢御崇政殿陞座中和韶樂奏元平之章諸王文武大臣行禮宣表丹陛大樂奏慶平之章朝鮮陪臣行禮丹陛大樂奏治平之章頒詔賜茶畢中和韶樂奏和平之章皇帝還宫樂止詔書龍亭出導迎樂作是日御崇政殿筵宴所奏中和清樂與太和殿筵宴同定幸翰林院暨筵宴樂制是日鹵簿全設樂部設中和韶樂於翰林院後堂東西廊下設中和清樂於東廊下設丹陛大樂於敬一門内兩旁午門鳴鐘皇帝出宫至翰林院詣至聖先師祠行禮畢陞御座中和韶樂奏隆平之章掌院大學士率各官行禮丹陛大樂奏慶平之章進茶賜茶丹陛樂奏文物京華盛之章進御宴桌中和清樂奏玉署延英之章進饌樂止承應上呈伎畢進御酒宴桌及各官酒席桌進酒賜酒丹陛清樂奏延閣雲濃之章各官謝恩宴行禮丹陛大樂奏慶平之章駕出還宫中和韶樂奏顯平之章定樂舞生春秋二季赴掌儀司演習諭郊廟朝㑹鉅典攸闗其登歌下管各工必肄業有素方免臨期舛誤太常寺樂舞生每月在神樂所演習雖有定例再當於春秋二季令赴掌儀司演習禮部遵㫖議准每年春秋於三月九月赴掌儀司演樂一次令總理樂部大臣悉心考騐十三年定巡幸致祭岱嶽樂制時上東巡先是大學士等遵㫖議奏致祭泰山應遵康熈二十三年之例行惟是致祭方嶽向未用樂今特舉盛典秩於岱宗請用中和韶樂令儒臣増撰樂章交太常寺協律郎率樂生預習備用至是親祭岱嶽迎神樂奏祈豐之章奠帛初獻樂奏華豐之章亞獻樂奏興豐之章終獻樂奏儀豐之章徹饌樂奏和豐之章送神望燎樂奏錫豐之章樂人用太常寺樂生自京随往樂器於闕里移用駕還行宫照例奏導迎樂十月重定命將出師樂制是月二十七日命大學士傅恒為經畧討金川陳設鹵簿大駕樂器如常朝儀皇帝御太和殿陞座中和韶樂奏隆平之章經畧大學士傅恒跪受勅行禮丹陛大樂奏慶平之章經畧大臣随捧勅大臣由丹陛東階下樂止皇帝還宫中和韶樂奏顯平之章十一月初三日設鹵簿大駕於堂子外設角於柵欄外之東設旗纛於大門外之南設導迎樂於紅樁之北駕至紅樁鳴角進堂子角止皇帝行禮畢復鳴角至纛前行禮畢出至紅樁角止導迎樂作駕至東長安門外御武帳陞座親賜經畧酒飲畢經畧及出師大臣皆佩弓矢跪辭啟行皇帝還宫導迎樂作十四年三月重定凱旋暨筵晏樂制時經畧大學士忠勇公傅恒平定金川凱旋陳設鹵簿大駕樂器如常朝儀皇帝御太和殿陞座中和韶樂奏隆平之章經畧大臣官員謝恩行禮丹陛大樂奏慶平之章皇帝還宫中和韶樂奏顯平之章幸豐澤園筵宴設中和韶樂於帳殿外設丹陛大樂於帳殿南駕至帳殿陞座中和韶樂奏隆平之章皇帝進茶賜茶丹陛清樂奏景運乾坤泰之章掌儀司官捧臺盞巵壺進丹陛清樂奏聖徳誕敷之章經畧大臣跪進爵大臣跪進爵皇帝進酒畢樂止皇帝進饌中和清樂奏日耀中天之章賜各筵食品樂止親賜經畧及凱旋大臣等酒各樂伎以次呈畢中和韶樂奏顯平之章皇帝還宫十五年定祭嵩嶽樂制時上巡幸中州致祭嵩嶽各樂與祭岱嶽同十八年定祈雨致祭仍用樂先是十七年禮部奏言神祇壇本無専祀惟祈雨則祈告於壇而不作樂自乾隆七年始増樂章揆之一應因事祇告之禮均不作樂殊未畫一至甘雨霑足報祭之時僅用酒果脯醢與祈告相同又與報祭之禮未稱請嗣後各壇告祭停止作樂至報祭時均應加籩豆牲牢即將神祇壇樂章用於報祭得㫖祭祀用樂以導和氣而格神祇乃事神之禮與齋戒徹懸自致誠恪其義各别且樂足以宣通陰陽之氣祈雨致祭仍當用樂為是至是復議奏凡祈雨之祭時當待澤孔殷蠲誠致禱與因事祇告之禮原有不同儀文自宜周備應遵㫖仍用樂章其太嵗壇祈雨樂章交樂部另行撰擬從之増定太嵗壇祈雨樂章嵗旱遣官祈禱雨足報祀均用中和韶樂迎神樂奏需豐之章奠帛初獻樂奏宜豐之章亞獻樂奏晉豐之章終獻樂奏協豐之章徹饌樂奏應豐之章送神樂奏洽豐之章十九年定致祭長白山樂制時皇帝再謁祖陵望祭長白山樂制與祭岱嶽同改定神樂署及官名舊制太常寺神樂觀設提㸃知觀等員掌各壇祭祀之樂乾隆八年改神樂觀廟額為神樂所至是禮部奏准神樂所改為神樂署提㸃改為署正知觀改為署丞品級仍舊以昭畫一二十四年十一月増定慶賀頒詔中和樂章時囬部悉平於冬至次日王公羣臣行慶賀禮欽頒恩詔皇帝御太和殿陞座中和韶樂奏遂平之章還宫中和韶樂奏允平之章増定皇太后宫慶賀中和樂章皇帝詣皇太后宫率王公羣臣行慶賀禮皇太后陞座中和韶樂奏豫平之章還宫中和韶樂奏履平之章臣等謹按是時回部悉平西陲底定凱音奏㨗正值新陽初復之時乃更定中和樂章増撰武成慶語以誌膚功以昭盛典其詞詳見樂歌其章名則仍同於舊云二十五年二月重定凱旋郊勞筵宴樂制將軍武毅謀勇公兆恵平定西域凱旋皇帝駐蹕黄新莊行宫是日鹵簿大駕全設張黄幄御座於郊勞處正中南向築臺於黄幄正南設凱旋纛於南面樂部内班署史等承應之鐃歌樂鼓吹樂鳴螺軍士於臺左右排立駕至郊勞處軍士鳴螺鐃歌大樂作皇帝拜天行禮畢御黄幄陞座王公大臣及將軍從征大臣官員兵丁行禮畢候㫖將軍大臣行抱見禮將軍大臣及囬部人等行禮賜坐賜茶畢皇帝出黄幄乗騎鐃歌樂止停鳴螺凱歌樂奏鬯皇威之章在鹵簿前行駕還行宫樂止幸豐澤園筵宴設中和韶樂於帳殿外設丹陛大樂於帳殿南皇帝陞座中和韶樂奏遂平之章皇帝進茶賜茶丹陛清樂奏聖武光昭世之章掌儀司官奉臺盞巵壺進丹陛清樂奏禹甸遐通之章將軍大臣跪進爵大臣跪進爵皇帝進酒賜酒畢樂止進饌賜各筵食品中和清樂奏聖治遐昌之章皇帝還宫中和韶樂奏允平之章二十六年詔定中和韶樂鎛鐘之制先是古鐘十一圜出於江西撫臣摺奏恭進上為正注疏之異同辨編懸之制度訓示廷臣定為鎛鐘至是奉諭㫖著莊親王欽遵皇祖御定律吕正義鐘律尺度參考定制鑄造十二律鎛鐘一分以備特懸其舊有鎛鐘内缺一圜亦著依式補鑄嗣經莊親王奏言臣謹考聖祖仁皇帝御定律吕正義引隋書樂志金之屬二一曰鎛鐘每鐘縣心一簨虡各應律吕之音即黄帝所命伶倫鑄十二鐘和五音者也臣欽遵聖祖仁皇帝御定鐘律之黄鍾尺度參考定制加一倍半得黄鍾之數以下十一鐘俱按本律尺度亦各加一倍半其鐘體上柄旋蟲乳照三分損益各用遞減以合十二律吕遵照舊鐘式様敬謹鑄造俟鑄成後率同樂部官對凖聲音燒古進呈以備特懸至舊有鎛鐘内多損壞即或完好而土花剥蝕曽試考擊未能盡諧今祇就其大小之次擬鑄一圜以補第三鐘之缺抑臣更有請者古者功成樂作原為鼓吹太平盛軌故鑄鐘鼎以紀功徳我皇上聖武逺揚西陲闢地二萬餘里為從古所未有乃當大功告成之時是鐘適出以應昌期臣奉命鑄造鎛鐘伏祈皇上御製銘詞臣按照舊式鐫入以垂永乆得㫖不必燒古著鍍金鐫識處前面寫鐘銘後面寫本鐘律名奏定中和韶樂特磬之制和碩莊親王等奏言兹當西師奏凱西江古鐘應時而出命臣等遵按聖祖仁皇帝欽定黄鍾真度上下損益鑄為鎛鐘十二御製銘詞昭示無極竊以條理宜備始終金聲必兼玉振方今和闐奉賮美材豐博可叶鳴球洵當與泗濵所産同資戛擊應請仿周禮磬氏句博股鼔依律長短之法製造特磬十二虡與鎛鐘俱為特懸以備中和之盛其樂懸位次奏樂儀節臣等詳考古制鎛鐘在東居編鐘之左特磬在西居編磬之右皆北向凡樂作起柷鎛鐘一鳴繼之樂闋撃特磬一乃奏敔凡壇廟大祀慶賀朝㑹大典並依應月之律各設鎛鐘特磬一虡以昭羙備得㫖大學士禮部議奏尋議覆臣等伏念天子建中和之極制作宜隆大樂與天地為昭條理必備當此武功耆定殊域輸誠河成五色之珍律應九成之奏宫商既協戛擊攸司應如所請照周禮磬氏句博股鼓依律製造特磬十二虡與鎛鐘俱為特懸以符體制至所稱樂懸位次奏樂儀節臣等伏思古今樂不相沿懸架本無一定現今樂部編鐘編磬乆列東西則特懸應各從其器其北向之處考儀禮大射樂懸之法編鐘編磬之外又有所謂其南鑮者鑮即鎛也是特懸鐘磬東西定位而向北自古而然叅酌經史若合符契亦應如所奏每遇慶賀朝㑹大典設應月本律之鎛鐘特磬各一三擊柷一鳴鎛鐘中和韶樂作樂闋一擊特磬乃奏敔其壇廟大祀並依應用之律各制鎛鐘特磬一虡以昭羙備其製磬尺度應聽莊親王等詳推器數恭請睿裁其位次儀節亦應交樂部查照敬謹辦理從之三十三年重定闗帝廟樂章臣等謹按舊制闗帝廟樂章春秋時祭奏樂一闋無初亞終獻徹饌樂章至是和碩莊親王奏請加増闗帝廟署史十六名合前八名共二十四名所奏樂以迎神送神三獻各為一章四十一年四月重定凱旋郊勞筵宴樂制將軍誠謀英勇公大學士阿桂平定兩金川紅旗㨗至御製凱歌三十章並増製鐃歌十六章命於郊勞時奏之是月戊辰上御龍袍補服至良鄉城南行郊勞禮大駕鹵簿排設軍士鳴螺鐃歌樂作將軍阿桂率副將軍豐昇額及随征大臣官員兵丁俱甲胄跪迎上登壇拜天行三跪九叩禮將軍等及王公以下官員俱随班位行禮上御黄幄將軍等及王公以下各官行禮訖將軍趨進御座前行抱見禮上慰勞有差賜坐賜茶禮成駕旋凱歌樂前導將軍等扈從至行宫己巳上御紫光閣賜將軍阿桂副將軍豐昇額及有功將士並王公大臣筵宴陞座中和韶樂奏隆平之章進茶賜茶進酒進饌並奏清樂還宫中和韶樂奏顯平之章五月重定凱旋慶賀樂制時兩金川平定是月辛未王公羣臣行慶賀禮皇帝御太和殿陞座奏隆平之章還宫奏顯平之章臣等謹按兩金川負固梗頑蠢迷不率皇上赫怒行師旄鉞所指風馳電掃蟻穴全平郊勞凱宴特命樂部定製樂章復御製凱歌三十章以紀蕩平之畧仰見聖天子不得已用兵之心皇威宣鬯遐邇歸誠誠足垂示萬古已四十五年八月皇上七旬萬夀増製喜起舞樂章臣等謹按乾隆四十五年八月皇上七旬萬夀和碩莊親王等請増撰喜起舞樂詞九章上俞所請古稀錫羨萬國臚歡洵足昭夀㝢昇平之盛典已十月藏僧班禅額爾徳尼進古稀祝嘏樂章臣等謹按班禪額爾徳尼自藏入覲撰古稀祝嘏樂章以獻仰見聖化覃敷前代聲教未通之域莫不効悃輸忱歌詠至徳實為隆古所未有云四十八年正月定乾清宫普宴宗室樂章是月壬寅上御乾清宫賜宗室王貝勒貝子公以下及四品頂帶宗室等宴陞座奏隆平之章進茶奏瑞旭中天麗之章進酒奏珠斗杓逥之章進饌奏景麗仙瀛之章奏世徳舞禮畢還宫奏慶平之章五十年正月定賜宴千叟樂章是月丙辰上御乾清宫自王公大臣以下年逾百嵗及六十以上入宴者共三千人陞座奏隆平之章進茶奏夀愷昇平瑞之章進酒奏紫禁春開之章進饌奏夀宇同登之章還宫奏慶平之章臣等謹按康熈六十年聖祖仁皇帝肇舉千叟宴我皇上久道化成時熙物阜迺以元辰復行慶典夀祺普錫遐邇攸同聖祖神孫後先同揆重熙累洽洵非蓼蕭湛露之休所能比擬於萬一也二月定辟雍殿講學樂章是月上丁上以肇建辟雍親詣太學行釋奠禮畢御辟雍殿講學陞座奏盛平之章羣臣行禮奏慶平之章賜講官以下諸臣茶奏仰君師之章還宫奏道平之章臣等謹按太學為首善之區皇上稽古剙制肇建辟雍親臨講學特命増製樂章以昭盛典凡笙詩抑戒鹿鳴棫樸諸章莫不追復古音間奏登歌一歸大雅藻金石而澤膠庠俾圜橋觀聴漸摩移易於不自知大聖人制作動與天合誠所謂樂由天作者矣八月奉諭古樂以宫商角徴羽為五音合諸變宫變徴則為七音今之樂猶古之樂何以樂部所奏樂章僅以五六工尺上等字為音而問之以宫商角徴羽則茫然不知為何事近偶閱張照所奏論樂劄子辨析頗詳其所謂五六工尺上即宫商角徴羽甚合古意因復取律吕正義再加叅核本屬相合因思今之五六工尺上古之宫商角徴羽名雖異而實則同聲音之道原欲避俗趨雅今反援雅而歸於俗甚非道也况郊廟樂章格天歆祖正朝御殿敷政臨民鐘簴元音自應用古制為節奏今樂部所定樂章俱取便注工尺揆諸名義殊乖莊雅但相沿已久若猝令樂工等改習宫商角徴羽則心手俱所未嫻其勢亦有所難朕意俗用工尺既與宫商角徴羽相同嗣後雖令樂工等取便用工尺等字而於樂章每章每字下則兼注宫商角徴羽變宫變徴字様皆令兼知則不但用諸郊廟朝廷倍彰莊雅而以此潜移黙化漸復古音未始非返樸還淳之一道再古樂中琴瑟與金石並重近來樂部奏樂琴或間能操縵而瑟則竟屬虚陳即業儒之人雖偶有學琴者已非古道至今瑟則未有能鼓者是瑟之為道乆已失傳夫八音迭奏琴瑟相宣豈容偏廢向來樂部奏樂俱因笙笛聲壯琴瑟聲細為其所掩絲不如竹古已有其語是以樂工等罕有嫻習者殊非八音咸備之意從前勵宗萬為太常寺少卿時寺丞張樂盛編輯壇廟樂章勵宗萬為之作序維時已有律吕正義一書而張樂盛所編書内樂章並不仿照兼注宫商輒專注工尺勵宗萬又不為之定正所謂不學無術不可與言樂亦安能窺律吕正義之博洽賅備耶然律吕正義一書卷帙既繁剖析又極精㣲樂工未易領㑹徳保係禮部尚書太常寺樂部皆所綜理莊存與則禮部侍郎而兼管樂部著徳保莊存與向武英殿咨取律吕正義刋本一部將律吕正義書内每字下駢注宫商角徴羽及五六工尺上字様者摘出令樂工等按書演習精熟並著將琴瑟二樂飭令樂舞生一體用心嫻習盖黄鍾為萬事根本五音十二律還相為宫而所謂三分損一隔八相生之說其義原可貫乎今之工尺盖黄鍾生大吕至半大吕而又生黄鍾夫黄鍾宫也以宫商角徴羽變宫變徴之位言之則為七以其相生之數言之則為九此隔八之說所由來也如歳時之有八節八節遞嬗而歳時成矣今之五六工尺上四合合字音之終也而即以生五生生不窮自為循環所謂貞下起元聲音之道與政通也著徳保莊存與悉心講求檢閱於律吕正義一書取要節繁輯為簡要一編㑹同軍機大臣酌定繕寫進呈刋發再律吕正義中原有御製補笙詩六首駢注工尺宫商字様著一併入編頒發學官肄習以示作樂崇徳協律同和之至意十一月奉諭前因樂部所用樂章僅以五六工尺上為音問以宫商角徴羽茫然不知為何事因命徳保莊存與將律吕正義一書取要節繁輯為簡要㑹同軍機大臣酌定繕寫進呈今據將各樂章酌定案語開單呈覽朕詳加披閱與從前張照所論原屬相合不過拘泥黄鍾為宫之說各調俱以羽字起羽字止其實如郊壇及御殿萬夀所用樂章自應以黄鍾為宫羽字起止至每月所用樂章則應以每月本律為宫如太蔟為正月主宫正合人生於寅之義其餘逐月皆依律吕相生所謂旋相為宫者此也今閱所進清單按照樂章將五音配合兼注已屬明晰毋庸另為一編著與旋宫圖俱附入律吕正義後編並於四庫全書内一體補入并將前降諭㫖及此㫖冠於律吕正義後編篇首俾講求樂律之士及肄習伶官俱曉然於宫商角徴羽五音共知避俗趨雅援今入古而仍不禁其五六工尺上俾雅頌各得其所云爾臣等謹按四上競氣見於楚詞至宋史燕樂書遂有合四乙工凡勾尺六五等字嗣後互相沿襲太常樂譜因但注字色轉遺聲律古名皇上身律聲度特重雅樂命樂臣取太常寺樂譜補註宫商以古正俗以俗證古誠為聖王崇徳之盛典至於羽主調宫立宫之說盖以下羽大於宫位於宫前與國語羽逐宫音相合然黄鍾為宫固當以下羽主調其他律旋宫主調者不必皆因下羽之名經聖明指示改用每月本律為宫於旋宫之義更為曠若發蒙近又因朱載堉樂律全書較之律吕正義不免疎漏岐誤凡縱黍横黍一字數音諸說無不詳加訂正仰見聖人之徳實與天地同和鼓舞鏗鏘釐然得所洋洋乎洵駕咸莖韶濩而上之已皇朝文獻通考卷一百五十六
