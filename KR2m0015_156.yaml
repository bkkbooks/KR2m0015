body:
  text: 欽定四庫全書皇朝文獻通考卷一百五十六樂考二樂制二乾隆六年重定中和樂章音律節奏先是和碩莊親王等遵㫖奏試殿陛中和樂章歌音將不協於律之處詳細奏聞詔令大學士禮部㑹同内務府詳酌妥議至是奏覆按現有樂章十二成内元旦皇帝陞座奏元平還宫奏和平冬至陞座奏遂平還宫奏允平萬夀聖節陞座奏乾平還宫奏太平太皇太后陞座奏升平還宫奏恒平皇太后陞座奏豫平還宫奏履平皇后陞座奏淑平還宫奏順平惟淑平順平二成每章八句其十成每章各十句每句四字按之音律節奏則每章八句每句六七八字不等以十句四字之樂章而和以八句六七八字之音律宜其不能盡協請將樂章字句按音律之節奏以調和之章酌從八句句無拘四言令翰林院酌擬交内務府詳細按律奏試務期調協盡善從之詔續纂律吕正義後編和碩莊親王等奏臣等面奉諭㫖朕因臨朝樂章句讀與樂音不相比合是以命大學士該部㑹議重定樂章期合於正恭查康熈五十二年纂修律吕正義重造中和韶樂既經皇祖聖祖仁皇帝欽定豈得樂章樂音尚乃如此逕庭及閱律吕正義凡宗廟朝廷所用樂章並不在内律吕正義一書専為發明樂律而設何以闕如及觀御製序文則係雍正三年皇考所撰意此書在皇祖時尚屬未完之本至雍正三年刻成未暇補足與抑皇祖聖意待製造樂器審比樂音之法具有成書之後再行考定續纂入帙與否則該館辦理之時未經定議奏請是以尚少樂章字譜也夫大樂與天地同和嘉感神祇茂豫民物其事甚鉅不可少有闕遺繼志述事責在後人如果有所未備理宜紹續前典著莊親王等將此書原委悉心查明朕思臨朝樂章如此則壇廟樂章恐亦不相符合著一并查明具奏欽此恭查康熈五十二年十月奉聖祖仁皇帝諭㫖命臣等恭編御製律吕算法等書五十三年十一月臣等以律吕正義進呈至六十一年六月數理精藴告成厯象考成亦發刋刻臣等恭請御製序文弁諸卷首奉㫖這部書甚好實從古所未有朕作此序文不須别為結搆只實述其道理自然成文序候頒發然序文竟聖祖仁皇帝世未㑹頒發也雍正元年九月内校刋全竣世宗憲皇帝御製序文御書交武英殿臣等敬謹勾摹刋刻其製造樂器則自康熈五十二三等年陸續頒付太常至於樂章句讀與樂音不相符合之處曽經禮臣奏請改定奉有聖祖仁皇帝諭㫖遲遲辦理臣等恭思聖意必俟審比樂音之法具有成書之後再行考定續纂誠有如我皇上聖諭所云者是則律吕正義之原委也臣等詳查舊案既知律吕正義一書允宜續纂恭請重修律吕正義後編與前書並垂萬世其壇廟朝廷樂章將新舊所定考訂宫商字譜務使律吕克諧尋考易曉至凡有聲無字之樂章及外藩蠻夷曽入中國之音樂並應以字譜寫之載入簡牘其作何編集之處統俟臣等考校之時將所有管見随時具奏恭請訓定並請開館纂修以襄鉅典得㫖允行奏覆編鐘前後次序及設而不作之制和碩莊親王等遵㫖查奏律吕之法必有倍有半而編鐘無倍蕤賔倍林鍾亦無六半律者以編鐘具八其音中和已足於用低不至倍蕤賔倍林鍾髙不至六半律其序以從低至髙從濁至清倍夷則倍無射當在黄鍾之前倍南吕倍應鍾當在大吕之前與簫管琴絃同為一例不可移易也編鐘上八下八上為陽律下為陰吕考擊之節用黄鍾為宫則止擊上鐘用大吕為宫則止擊下鐘盖臨時以下鐘易置上位而擊之非下八鐘不擊也若上八鐘内又有三鐘不擊者則以八鐘原止七音姑洗為宫黄鍾起調為工字調倍夷則無射為變徵太蔟為變宫三鐘不入調是以不擊工字調外則惟二鐘不擊如以太蔟為宫倍無射起調為尺字調則倍夷則無射太蔟三鐘皆擊而黄鐘為變宫夷則為變徵二鐘又當不擊矣因歴來俱以黄鍾調為黄鍾宫故為考擊之所不及非設而不作也定填註樂章宫譜並考正有聲無字樂章之音節時奉諭㫖壇廟朝廷新舊樂章俱應填註宫譜使依永和聲悉有條理至宴饗之樂乃小雅遺意國朝所用由來已久其有聲無字之樂章並應考其音節一并載入改定祭祀朝㑹宴享樂律吕為宫之制和碩莊親王等奏言臣等詳查樂章字譜天壇太廟朝日壇等處皆係黄鍾為宫地壇夕月壇係大吕為宫近於南齊只用黄鍾之說而兼清濁二均及於大吕義亦有取但編鐘等器内必有設而不作者同於隋以前啞鐘之誚而律吕之用多有闕而未備惟唐時祖考孫所定祭圜丘以黄鍾為宫方澤以林鍾為宫宗廟以太蔟為宫朝賀宴饗則随月用律用吕為宫最為合理請將地壇樂改林鍾為宫太廟樂改太蔟為宫至於社稷壇亦地也宜用林鍾為宫夕月壇改用南吕為宫朝日壇雖應用夾鍾但日為陽亦宜以太蔟為宫朝㑹宴享各以其月之律為宫若夫先農壇為農事也宜以姑洗為宫歴代帝王廟孔子廟則宜春以夾鍾秋以南吕為宫太歳壇則以嵗始之律太蔟為宫除應改宫改調之樂章其字譜自應另定外其應用黄鍾之樂章亦請將字譜逐一核定更正若其文字與宫商必不䏻調者亦斟酌更换務使協律方為盡善奏入上以社稷不可同於方澤或亦同文廟春秋分用夾鍾南吕又帝王廟秋祭以九月或用無射或仍用南吕令更議之尋議奏伏查社稷典禮既不與方澤齊等所用樂章自應不同於地允宜遵改以夾鍾南吕為宫至歴代帝王廟以二月八月致祭然每年多有用三月九月者據欽天監稱係清明霜降前擇吉致祭蓋二八月祀典甚多次第舉行此則排至末後但未屆清明霜降仍是夾鍾南吕似未便以時日在三九月即用姑洗無射也仍請照前議以夾鍾南吕為宫從之七年改定皇太后皇后宫樂用律吕為宫之制先是和碩莊親王等奏議皇太后樂以大吕為宫皇后樂以南吕為宫得㫖皇后樂用南吕皇太后樂似亦宜以南吕為宫至是復議奏南吕位在第四既不至與郊廟有並尊之嫌又與朝廷之樂旋相為宫者先後次序兩無方礙最為妥協請即以南吕為宫從之重定丹陛樂章字句之制和碩莊親王等遵㫖試演丹陛樂考其節奏既與樂章並不相合并與明代樂章亦不相符實係相沿訛謬亟宜改正奏請將廷臣行禮丹陛樂章改用七言四句皇上於皇太后宫行禮丹陛樂章改為五言四句得㫖所奏五言七言近於詩句樂章仍以長短句為是凖其字數與相彷彿可也定皇太后皇后宫樂為中和韶樂和碩莊親王等奏言查丹陛樂與中和樂音節不同因丹陛樂有章而不歌故字句舊未詳審音律不相符合應改正撰擬進呈冄查㑹典惟太皇太后宫用中和韶樂皇太后皇后宫均用丹陛樂考諸掌儀司則自来陞座還宫並用中和韶樂盖昔年撰擬樂章之時以皇太后皇后不敢同於太皇太后便以丹陛名之且樂章一式無别而考擊之法則又全不循章協韵今既查明自應分别陞座還宫為中和韶樂行禮為丹陛樂上是之定冬至大祀用新定樂章和碩莊親王等奏請將新定樂章於立秋後擇期演試務於今年冬至大祀即用以後凡遇祭祀並用新定樂章臣等謹按是年纂輯律書釐定雅樂凡壇廟祭祀樂章皆經御定按宫協調依永和聲時圜丘樂章先已酌定字句節奏交太常寺演習其餘各樂亦陸續更正以後随四時所遇各祭祀並用欽定樂章定内廷丹陛樂章名和碩莊親王等奏言内廷行禮丹陛樂㑹典不載謹擬章名進呈奉㫖用雝平奏准救䕶日食月食祇用金鼔停止作樂重定耕耤筵宴樂章和碩莊親王等奏言耕耤筵宴時所奏雨暘時若五榖豐登家給人足三章係大學士蔣廷錫所撰但照古樂府體為之實不能施於宴樂請照海宇昇平日之例另行撰擬每篇字數較之海宇昇平日止須四分之一已可足用從之添設中和樂器樂工之數時中和韶樂内祇有笙四簫二笛二殿廷髙敞惟聞鐘鼔之聲餘並不揚莊親王奏請添用笙八簫四笛四歌工二名増為四名内廷中和韶樂亦請一例添設從之定丹陛樂節奏之制大學士等議覆和碩莊親王奏稱酌定丹陛樂為五節以一節為趨進三節為三跪九叩頭一節為趨退如有進表宣表禮儀則於第一節樂闋廷臣已跪之後進表宣表畢樂冄作總於賛禮排班之後樂作賛退之後廷臣趨至仗末之時樂止等語所奏節次既分遲速合度既有以逹臣工祇肅之心復有以叶殿陛和平之聽應如所奏從之設立樂部凡太常寺所祭祀之樂和聲署掌儀司所司朝㑹燕饗之樂鑾儀衛所司鐃鼓鼓吹均𨽻樂部欽簡禮部堂官内務府堂官各一人暨各部院堂官之諳於音律者總理其事有署正署丞侍從待詔供奉供用等官鼓手樂工總名為署史而以所司樂器分别其名鐘曰司鐘磬曰司磬琴瑟笙簫等亦如之署史官服有官者各照品級服用無官者仍用駕衣其署史或有應穿補服之時凖照未入流雜職官用黄鸝補向來駕衣上花補亦换黄鸝其有頂帶官員照内務府鴻臚寺等衙門之例不論品級均掛素珠侍班額設樂工内逐一遴選出身清白通曉音律者存留令其承直飭太常寺調習宫商並禁道士承充樂員芟汰濫額奉諭㫖朕因時享聆太常寺笙簫管籥之奏至不能分别宫商何以交神明而逹誠敬朕命莊親王三泰張照為總領樂部大臣非祇轄和聲署也嗣後一應太常寺樂部事務俱著管理又聞向來太常寺樂員係道士承充夫二氏異樂不宜用之朝廷今乃令道士掌宫懸司燎瘞為郊廟大祀駿奔之選暇日則向民間祈禳誦經以餬其口成何典制太常寺樂員嗣後毋得仍習道教有不願改業者削其籍聽為道士可也朕詢問三泰知額設五六百人得毋冗濫者著莊親王等查議如果額數太多奏請芟汰將錢糧歸併酌増精選實能任事之人令其承應重定圜丘大祀樂制先期鹵簿大駕全設皇帝詣齋宫午門鳴鐘不作樂祭日燔柴迎神樂奏始平之章奠玉帛樂奏景平之章進爼樂奏咸平之章初獻樂奏夀平之章亞獻樂奏嘉平之章終獻樂奏永平之章徹饌樂奏熈平之章送神樂奏清平之章望燎樂奏太平之章禮畢和聲署樂奏祐平之章鹵簿大樂並作午門鳴鐘皇帝還宫重定方澤大祀樂制鹵簿大駕全設皇帝詣齋宫午門鳴鐘不作樂致祭瘞毛血迎神樂奏中平之章奠玉帛樂奏廣平之章進爼樂奏含平之章初獻樂奏太平之章亞獻樂奏安平之章終獻樂奏時平之章徹饌樂奏貞平之章送神望瘞樂奏寜平之章禮畢和聲署樂奏祐平之章鹵簿大樂並作午門鳴鐘皇上還宫重定祈榖壇樂制皇帝親詣行禮燔柴迎神樂奏祈平之章奠玉帛樂奏綏平之章進爼樂奏萬平之章初獻樂奏寳平之章亞獻樂奏穰平之章終獻樂奏端平之章徹饌樂奏渥平之章送神樂奏滋平之章望燎樂奏榖平之章餘樂與圜丘大祀同定雩祭樂制迎神樂奏靄平之章奠玉帛樂奏雲平之章進爼樂奏需平之章初獻樂奏霖平之章亞獻樂奏露平之章終獻樂奏霑平之章徹饌樂奏靈平之章送神樂奏霮平之章望燎樂奏霈平之章餘樂與圜丘大祀同定大雩樂制終獻後文舞生退司樂官引舞童執羽翳進舞童按舞歌御製雲漢詩八章歌畢退餘樂與常雩同重定太廟時享樂制鹵簿大駕全設皇帝出宫午門不鳴鐘不作樂致祭迎神樂奏貽平之章奠帛初獻樂奏敉平之章亞獻樂奏敷平之章終獻樂奏紹平之章徹饌樂奏光平之章送神還宫望燎樂奏乂平之章禮畢和聲署樂奏禧平之章午門鳴鐘皇帝還宫重定太廟祫祭樂制迎神樂奏開平之章奠帛初獻樂奏肅平之章亞獻樂奏協平之章終獻樂奏裕平之章徹饌樂奏諴平之章送神還宫望燎樂奏成平之章餘樂與時享同重定奉先殿樂制與時享同重定社稷壇樂制鹵簿