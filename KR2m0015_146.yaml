body:
  text: 王禮考二十二親王公卿以下車輿儀從臣等謹按古者以鹵簿為儀從之通名葉夢得引史所載御史中丞建康令皆有鹵簿是也又宋史儀衛志大駕鹵簿導駕官開封令開封牧太常卿司徒御史大夫兵部尚書謂之六引以上各用本品鹵簿是以馬考有公卿以下車輦鹵簿一門元明以來鹵簿之名不施於臣下而尊卑儀從具有差等今據大清會典所載王公以下儀衛及文武各官儀從輿馬之制具著於篇親王儀衛明轎一木質灑金不施幰蓋通髙三尺三寸倚髙一尺六寸座髙一尺七寸縱一尺八寸橫二尺二寸直轅二各長一丈五尺橫杆二各長六尺二寸肩杆四各長五尺皆髤朱飾金舁以八人暖轎一銀頂金黃蓋幨紅幃緞氊隨時通髙六尺餘制與明轎同五龍繖一紅羅三幨繡龍五曲柄髤朱花繖二紅羅繡雜花瑞草繖二紅羅銷金瑞草皆直柄髤朱花扇二紅羅繡雜花孔雀扇二青羅繡孔雀柄皆髤朱豹尾槍四鐵刃竹柄首冒以木通髤朱繪雲龍注朱旄懸豹尾旗槍十雲羅直幅色各從本旗纛亦如之長三尺廣一尺三寸杆如豹尾槍大纛二雲羅斜幅繡金龍緣為火焰形直徑三尺三寸斜徑七尺五寸杆攢竹髤朱首冠塗金銅頂注朱旄條纛二雲羅直幅長二丈廣二尺四寸五分餘如大纛吾仗四木質髤朱長七尺骨朵四刻木為香草六瓣旁綴圓珠承以龍首皆飾金柄攢竹髤朱卧瓜立瓜各四皆刻木髤金柄如骨朵儀刀四鐵刃木鞘挽緑皮飾以銅郡王儀衛明轎一凡制同前者不復詳暖轎一紅蓋幨幃四龍繖一瑞草繖花扇孔雀扇豹尾槍各二旗槍八條纛二吾仗四骨朵卧瓜各二立瓜四儀刀二自郡王以上轎夫執事人均用繡團獅緑緞衣貝勒儀衛明轎一暖轎一紅蓋青幨紅幃瑞草繖花扇各二旗槍六條纛一吾仗骨朵卧瓜立瓜各二自貝勒以上舁轎俱以八人貝子儀衛明轎一暖轎一紅蓋幨青幃瑞草繖一花扇二旗槍六條纛一吾仗骨朵立瓜各二鎮國公儀衛明轎一暖轎一皂蓋紅幨皂幃瑞草繖孔雀扇各一旗槍六吾仗骨朵各二輔國公儀衛明轎一暖轎一青蓋紅幨青幃瑞草繖孔雀扇各一旗槍六吾仗骨朵各二自貝子至輔國公舁轎俱用四人轎夫執事人用索緑緞衣自王以下公以上轎夫執事人均用黑氊帽綴紅絨纓插紅翎繫紅布帶固倫額駙儀衛紅繖一雲羅不施繡青扇二飾以方金四豹尾槍二旗槍十紅棍四執事人青帽插紅翎青衣紅帶和碩額駙執事人員紅帽插緑翎青衣紅帶民公儀衛和碩額駙同杏黃繖二雲羅不施繡青扇二飾以方金四旗槍十紅棍四侯儀衛郡主額駙同杏黃繖一青扇二飾以方金三旗槍十紅棍四伯儀衛杏黃繖一青扇二飾以圓金四旗槍十金黃棍四子儀衛杏黃繖一青扇二飾以圓金四旗槍八金黃棍二男儀衛杏黃繖一青扇二飾以圓金三旗槍八金黃棍二鎮國將軍儀衛輔國將軍縣主額駙同杏黃繖一青扇一旗槍六奉國將軍儀衛奉恩將軍郡君額駙同青扇一旗槍六鎮國將軍以下凡宗室轎夫執事用青布衣黑氊帽上插緑翎繫緑鐶紅帶縣君額駙儀衛青扇一旗槍四鄉君額駙儀衛青扇一旗槍二自親王以下儀衛遇大典禮及出使全設常日在京師親王前引十後從六世子郡王前引八後從六乘馬俱用金黃韁貝勒長子前引六後從六貝子前引四後從六乘馬俱用紫韁公侯伯子固倫額駙和碩額駙郡主額駙前引二後從八男鎮國將軍縣主額駙前引二後從六郡君額駙前引二後從四輔國將軍奉國將軍前引一後從四縣君額駙後從二鄉君額駙後從一乘馬俱用青韁凡蒙古親王銷金紅繖二條纛二旗槍十郡王銷金繖一條纛一旗槍八貝勒紅繖一條纛一旗槍六貝子鎮國公輔國公紅繖一旗槍六遇行圍出師俱用之馬韁不得用金黃色紫色京官儀從一品杏黃繖一青扇二飾以圓金四各用清漢文書銜旗槍八杏黃色火焰緣金黃棍四二品杏黃繖一青扇二飾以圓金三旗槍六金黃棍二三品杏黃繖一青扇二飾以圓金二旗槍六金黃棍二四品杏黃繖一青扇二灑以金旗槍四五品以下青扇一常日在京師惟用扇一品前引二後從八二品前引二後從六三品前引二後從四文官三品以上用甘蔗棍二武官三品以上用棕竹棍二四品以下不用前引直省文官儀從總督杏黃繖青扇飛虎旗兵拳雁翎刀獸劒金黃棍桐棍槊回避牌肅靜牌各二旗槍四青旗八河道漕運總督並同巡撫杏黃繖青扇獸劒金黃棍桐棍槊回避牌肅靜牌旗槍各二青旗八學政鹽政織造暨各欽差官由三品以上者並同布政使杏黃繖青扇金黃棍槊回避牌肅靜牌各二青旗六學政鹽政織造暨各欽差官由四品以下者並同按察使亦同道杏黃繖青扇各一桐棍槊回避牌肅靜牌各二青旗四知府同府佐二藍繖青扇各一桐棍槊各二肅靜牌二青旗四知州知縣並同縣丞藍繖一桐棍二學官藍繖一雜職竹板二直省武官儀從提督杏黃繖青扇飛虎旗兵拳雁翎刀獸劒刑杖回避牌肅靜牌各二旗槍四青旗八總兵官杏黃繖青扇飛虎旗大刀獸劒回避牌肅靜牌旗槍各二青旗八副將杏黃繖一青扇二金黃棍回避牌肅靜牌各二青旗六參將逰擊都司青扇一青旗四餘並同守備杏黃繖青扇各一金黃棍二青旗四京官滿洲文武均乘馬一品文官年老疾病不能乘馬者許乘轎漢人文官乘轎三品以上頂用銀幃蓋用皂在京舁夫四出京舁夫八四品以下頂用錫舁夫二出京四直省文官乘轎督撫舁夫八司道以下教職以上舁夫四雜職乘馬餘同京官總督河道漕運視總督學政鹽政織造暨各欽差官三品以上視巡撫四品以下視兩司武官乘馬將軍副都統提督總兵官有年老不能乘馬者聽其奏聞請旨文三品武二品官以上用引馬文武四品官以上馬繫繁纓順治九年題準公侯伯都統尚書內大臣大學士及漢文官三品以上皇城外許乘四人暖轎願乘馬者聽康熙元年題準滿漢公侯伯都統內大臣鎮國將軍精竒尼哈番輔國將軍護軍統領前鋒統領副都統阿思罕尼哈番大學士尚書左都御史侍郎副都御史鑾儀衛通政使大理寺卿以上在皇城外許乘四人暖轎願乘馬者聽乾隆十五年諭本朝舊制文武滿漢大臣凡遇朝會皆乘馬並不坐轎從前滿洲大臣內有坐轎者是以降旨禁止武大臣坐轎未禁止文大臣今聞文大臣內務求安逸於京師至近之地亦皆坐轎若謂在部院行走應當坐轎則國初部院大臣未嘗坐轎此由平時不勤習技業惟求安逸之所致也滿洲大臣尚思本朝舊制遵照奉行似此並不演習乘馬倘遇緊急官差將何如耶嗣後文大臣內年及六旬實不能常乘馬者照常坐轎其餘著禁止再王公等不分老幼一槩坐轎亦非古道嗣後長朕一輩之王公等照常坐轎其餘王公內有髙年者亦許坐轎餘皆乘馬王等既有儀衛除年節列儀衛坐轎朝賀外平時皆著乘馬將此通行傳知倘禁止後有坐轎者著查旗御史即行查參若御史不參奏經朕訪聞一併治罪斷不寬宥又諭前因諸王及滿洲大臣等皆互尚安逸行動坐轎並不乘馬經朕降旨禁止坐轎是令伊等嫻習武藝勿致廢弛滿洲舊制之意並非謂大臣等不應坐轎也近聞王大臣內有坐車者試思坐車與坐轎何異視此乃王大臣等全未識朕欲挽回滿洲舊制之意轉似有心致朕降旨亦覺赧顔誠不知伊等是何居心也朕思王大臣早起來圓明園連朝奏事或身有疾病坐轎亦未為不可嗣後諸王及滿漢文職一品大臣如早起來圓明園或身有微疾者照常坐轎王大臣等不識朕意仍總不乘馬專坐轎者經朕察出必懲數人以為衆戒伊等各宜仰體朕體恤之意勿致廢弛滿洲武藝應乘馬之處照常乘馬黽勉向上再八旗大臣以不應坐轎久經禁止近聞有坐車者伊等有何勞苦官差亦尚安逸坐車耶且伊等既有教訓官兵之責理宜為衆表率嗣後八旗大臣及部院二品以下堂官倘有坐車之人著御史等即行指名題參朕必將違禁之人治罪斷不寬宥二十一年諭今王公大臣之轎夫開設賭場者甚多不獨將旗人引誘以失生理殊為可憫致令旗人流於匪僻無所底止關繫尤重是以朕從前降旨諸王一品文大臣及年老之文大臣生轎其餘概不準坐轎者一則不致廢弛乘馬二則為旗人計將轎夫開設賭場之事清理之意今年少官卑人員皆行坐轎應將伊等察出從重處分但為日已久又無専委察參之人此次朕不深究嗣後惟準親王郡王大學士尚書坐轎其貝勒貝子公都統等皆不準坐轎從前因年老之二品文官皆令坐轎是以年少之大臣等亦照伊等坐轎嗣後二品文大臣及京堂等無論年老與否概停坐轎仍令坐轎之王大臣等將轎夫加意管束倘有令其逺居開設賭場者將該王大臣等一併議處此次降旨以後仍有私行坐轎縱令轎夫開設賭場者著步軍統領及該衙門該旗御史等即行參奏從重議處若不嚴察以致懈弛仍蹈舊習將失察之衙門官員一併治罪斷不輕恕二十二年諭外省駐防將軍及緑營之提鎮出行則皆乘輿夫將軍提鎮有總統官兵之責若養尊處優自圖安逸亦何以表率營伍而作其勇敢之氣况旗人幼習騎射即緑營中亦必以其弓馬優嫻始厯加升用乃一至大僚轉致狃於便安忘其故步此豈國家簡擢之意耶京師都統副都統既皆乘馬而滿洲侍郎則無論年逾六旬亦皆不得乘輿即朕巡省所至尚每日乘馬而行乃外省武職獨相沿陋習此甚非宜嗣後將軍提鎮概不許乘輿其編設轎夫並著裁革如有仍行乘坐者照違例治罪可通行傳諭知之又諭前因外省將軍提鎮有表率行伍之責出皆乘輿恐致狃於便安是以特行禁止但此內宣力已久之年老大員又未可一概而論嗣後如年逾七十不能常行乘馬者令該員自行酌量奏聞請旨餘不得假藉四十二年諭從前不準滿洲侍郎坐轎者特令其不廢弛滿洲舊規服習勤勞也但伊等既已年老仍令時常騎馬恐伊等力不能支嗣後滿洲侍郎等年至六十嵗著加恩概準坐轎公主王妃命婦車輿儀從固倫公主儀衛親王福晉同暖轎一朱輪車一皆金黃蓋四角紅緣金黃幨紅幃轅杆軫輪均髤朱花繖三曲柄者一直柄者二皆紅羅繡雜花花扇二皂羅繡雜花孔雀扇二紅羅繡孔雀黑纛二雲羅斜幅紅仗二攢竹髤朱骨朵卧瓜立瓜各二親王福晉同惟暖轎朱輪車紅蓋四角皂緣自親王以下各側室均降一等和碩公主儀衛世子福晉同暖轎一朱輪車一皆紅蓋四角金黃緣金黃幨紅幃花繖三孔雀扇黑纛紅仗骨朵卧瓜立瓜各二世子福晉同惟暖轎朱輪車蓋四角皂緣郡主儀衛郡王福晉同暖轎一朱輪車一皆紅蓋四角皂緣紅簷幃花繖二皆直柄孔雀扇黑纛紅仗骨朵立瓜各二郡王福晉同惟暖轎朱輪車皂幨縣主儀衛貝勒夫人同暖轎一朱輪車一皆紅蓋四角青緣青幨紅幃紅繖紅仗立瓜各二貝勒夫人同惟暖轎朱輪車蓋四角皂緣紅幨皂幃郡君車貝子夫人同朱輪紅蓋四角青緣紅幨青幃縣君車鎮國公夫人同朱輪皂蓋四角紅緣紅幨皂幃鎮國公女鄉君車輔國公夫人同朱輪皂蓋四角青緣紅幨皂幃自公夫人以上蓋幨幃均用雲緞鎮國將軍夫人以下用素緞輔國公女鄉君車鎮國將軍夫人同朱輪皂蓋紅幨青幃輔國將軍夫人車朱輪青蓋紅幨青幃奉國將軍淑人車奉恩將軍恭人同朱輪皂蓋皂幨皂幃民公夫人車黑轅輪緑蓋四角皂緣緑幨皂幃候伯夫人車緑蓋四角青緣餘同民公夫人子夫人車一品命婦同皂蓋四角青緣餘同候伯夫人男夫人車二品命婦同皂蓋不緣餘同子夫人三品命婦車皂蓋不緣皂幨餘同男夫人自三品命婦以下蓋幨幃均用布四品命婦車皂蓋不緣皂幨青幃餘同三品命婦五品以下命婦車蓋幨幃俱用青凡朝賀許侍女隨入固倫公主五親王福晉和碩公主世子福晉俱四郡主郡王福晉縣主俱三郡君貝勒夫人俱二縣君以下俱一皇朝文獻通考卷一百四十六
