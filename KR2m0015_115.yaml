body:
  text: 欽定四庫全書皇朝文獻通考卷一百十五宗廟考九太廟功臣配享臣等謹按從享廟廷諸臣之名已見於前時享儀設神座文中兹敘其蒙國厚恩列廡先後之嵗永昭勳伐焉崇德元年四月丙戍以武功郡王禮敦巴圖魯配享廟廷王妃並配同日以直義公費英東𢎞毅公額亦都配享廟廷臣等謹按一王二功臣之從享備見於盛京太廟太宗文皇帝諏吉丙戌奉安文中逮順治元年世祖章皇帝定鼎京師九月壬子奉太祖髙皇帝孝慈髙皇后太宗文皇帝神位於太廟是日從享以入史臣祗載有捧二功臣牌位儀節恭繹太宗文皇帝肇建太廟祭告太祖山陵文追尊四祖安設神位即繼設伯祖禮敦巴圖魯配位然後及於功臣費英東額亦都配位親賢之序秩然則順治元年九月壬子武功郡王牌位當先二功臣以入而不列於二功臣之列也今前殿東廡多羅通逹郡王列第一位居武功郡王之右則復以親序云順治元年以武勳王揚古利配享廟廷九年六月丙寅追諡功臣圖爾格為忠義公圖賴為昭勳公配享廟廷仍立碑於其墓十一年三月乙邜以多羅慧哲郡王額爾衮多羅宣獻郡王界堪多羅通逹郡王雅爾哈齊配享廟廷王妃並配雍正二年正月庚辰以大學士一等公諡文襄圖海配享廟廷圖海子孫等具疏謝恩世宗憲皇帝諭曰此出自聖祖皇考所遺恩旨爾祖茂著功勳爾等其法祖報效各相奮勉八年以和碩怡賢親王允祥配享廟廷五月丙子世宗憲皇帝諭曰怡親王忠孝性成端方清直當年事我聖祖皇考敬謹恪恭克盡子臣之道深蒙皇考慈愛而王慎密有加小心安分此中外所共知者逮朕御極之初命王總理事務王夙夜匪懈公爾忘私精白一心無欺無隱其殫竭忠誠贊襄於密勿之地者八年有如一日至於軍務機宜度支出納興修水利督領禁軍凡宫中府中事無巨細皆王一人經畫料理無不精詳妥協符合朕心無煩朕之指示其有關於吏治民生之利弊有聞必奏每語必詳而為國家保護善類培養人才一片篤摯真切之念形於寤寐是以雍正四年特書忠敬誠直勤慎廉明八字以賜比時降旨朕深知王之德洞悉王之心覺此八字實不能盡王之美善不過就王事朕之大端而言耳蓋王實能佐朕治安天下朕實賴王翼贊升平且王居心之和平公正行事之寬厚仁慈皆足享遐齡而綿夀算豈朕有獲罪於上天皇考之處而奪我忠誠輔弼之賢王若是之速耶惟王為聖祖皇考之令子為我朝列祖之功臣允宜配享太廟列於從前建立大功諸王之次庶於王之功德相副且可上慰列祖皇考在天之心臣等謹按是月壬午諭凡告廟典禮所關有書王名之處仍用原名今於王配食列祖之巨典遵書原名乾隆十年以大學士鄂爾泰配享廟廷先是雍正十三年八月二十四日奉上諭雍正八年六月內欽奉皇考諭旨張廷玉器量純全抒誠供職其纂修聖祖仁皇帝實録宣力獨多每年遵旨繕寫上諭悉能詳逹朕意訓示臣民其功甚巨鄂爾泰志秉忠貞才猷經濟安民察吏綏靖邊疆泃為不世出之名臣此二人者朕可保其始終不渝萬年之後二臣著配享太廟欽此朕欲將皇考此旨入於遺詔內頒發大學士鄂爾泰張廷玉屢行固辭朕惟知遵奉皇考聖旨復再三降旨而鄂爾泰張廷玉又懇切奏請稽古典禮然朕意以為必應入於遺詔今鄂爾泰張廷玉既以稽古典禮奏請著總理事務莊親王果親王會同徐本慶復鄂善魏廷珍備查古典詳議具奏嗣王大臣等議覆臣等伏查帝王升祔太廟必有配享之臣所以表德酬勳垂諸不朽也我大行皇帝統御寰區勤求治理深仁厚澤萬國均霑至於優恤大臣尤為篤厚凡有寸長足録無不仰叨恩奬而於公忠體國之臣尤必錫之殊榮隆以曠典如大學士鄂爾泰張廷玉者久在聖明洞鑒之中是以特書諭旨密封內廷臣等伏查明太祖洪武二年以李善長等七人入太廟配享再查歷代遺詔史不備載而當洪武之時即命李善長等從祀自必仿效前代曽有之成規理合謹遵諭旨繕入遺詔臣等愚見如此是否有當伏候聖訓奉諭旨王大臣所議是欽此至是年春大學士鄂爾泰病故四月丙辰皇上諭大學士鄂爾泰公忠體國直諒持躬久任邊疆茂著惠績簡預機務思日贊襄才裕經綸學有根柢不愧國家之柱石允為文武之儀型嚮用方殷倚毗正切去冬忽嬰痰疾朕心廑念選醫調治存問日頒今春病勢有加朕親往視加銜太傅冀其漸次獲痊不意竟至不起朕心深為震悼親臨祭奠特旨輟朝二日披覽遺疏具見忠君愛國之悃忱尤為追念不置昔我皇考有配享太廟之遺詔著該部遵奉舉行十五年以定邊左副將軍固倫額駙喀爾喀扎薩克和碩超勇襄親王策凌配享廟廷二月己丑皇上諭定邊左副將軍固倫額駙喀爾喀扎薩克和碩超勇襄親王策凌以名藩尚主班崇懿戚在皇祖時即已宣力邊陲勳猷茂著皇考眷注優隆晉爵親王任專閫外身先血戰殄靖狡寇偉績丕昭益勤忠藎朕以王兩朝勳舊倚毗彌殷寄重長城倍加渥澤前聞遘疾遄命賜藥選醫令伊子馳驛侍奉復遣侍衛前往存問方期漸就痊可忽聞溘逝深為震悼特用加恩賜銀一萬兩治喪命貝勒羅卜藏侍衛德山往奠茶酒允伊子所請扶櫬來京合窆固倫公主園寢到京之日朕親臨奠醊一應齊集典禮俱照宗室親王典禮行考諡建碑具如儀式自昔功臣勳戚侑食廟廷以王之功宜得配享太廟雖蒙古親藩從未有與配享者朕以王功在王室名勒旗常簡在久孚宜膺特典且令衆蒙古知朕崇奬賢勞中外一體俾共知感奮益切勸勉並照和碩怡賢親王之例崇祀賢良祠永垂秩祀以示朕酬庸展親優賢篤舊至意二十年以致仕大學士張廷玉配享廟廷四月壬子皇上諭致仕大學士張廷玉歷事三朝宣力年久勤勞夙著受恩最深前以其年屆八旬精神衰憊特加體恤準令退休實朕優念老臣本懷至於配享太廟一事係奉皇考世宗憲皇帝遺詔遵行而恩禮攸隆則非為臣子者所可要請及朕賜詩為券又不親赴宫門謝恩自不得不示以薄譴用申大義今張廷玉患病溘逝要請之愆雖由自取皇考之命朕何忍違且張廷玉在皇考時勤慎贊襄小心書諭原屬舊臣宜加優恤應仍謹遵遺詔配享太廟以彰我國家酬奬勤勞之盛典四十三年正月辛未命禮親王代善睿親王多爾衮鄭親王濟爾哈朗豫親王多鐸肅親王豪格克勤郡王嶽託配享太廟是日奉諭旨睦親彰善王政宜先繼絶昭忠聖經所重朕自臨御以來間日恭閲列祖列宗實録一册因得備知祖宗創業艱難及爾時懿親藎臣勤勞佐命底定中原偉伐殊功實為從古所未有而當時䇿勳錫爵榮號崇封所以酬答者本從優厚逮其後或有及身緣事旋被降削者或有子孫承襲更易封號者迄今平情凖理若不為之溯述闡揚追復舊恩于心實冇所未愜因念睿親王多爾衮當開國時首先統衆入關掃蕩賊氛肅清宫禁分遣諸王追殱流冦撫定疆陲一切創制規模皆所經畫尋即奉迎世祖車駕入都定國開基以成一統之業厥功最著顧以攝政有年威福不無専擅諸王大臣未免畏而忌之遂致沒後為蘇克薩哈等所搆授欵于其屬人首告誣以謀逆經諸王定罪除封其時我世祖章皇帝實尚在沖齡未嘗親政也夫睿王果萌異志則方兵權在握何事不可為且吳三桂之所迎勝國舊臣之所奉止知有攝政王耳其勢更無難號召即我滿洲大臣心存忠篤者自必不肯順從然彼誠圖為不軌無難潛鋤異己以逞逆謀乃不於彼時因利乘便直至身後以斂服僭用明黃龍衮指為覬覦之證有是情理乎况英親王阿濟格其同母兄也於追捕流賊回京時誆報李自成身死且不候旨班師睿王即遣員斥責其非並免王公等往迎之禮又因阿濟格出征時脅令巡撫李鑑釋免逮問道員及擅至鄂爾多斯土默特取馬令議其罪降為郡王平日辦理政務秉公持正若此是果有叛志無叛志乎又實録載睿王集諸臣貝勒貝子公大臣等遣人語曰今觀諸王貝勒大臣但知諂媚於余未見冇尊崇皇上者豫豈能容此昔太宗升遐嗣君未立英王豫王跪請豫即尊位豫曰爾等若如此言豫當自刎誓死不從遂奉皇上纘承大統似此危疑之時以豫為君子尚不可今乃不敬皇上而媚豫豫何能容自今以後有盡忠皇上者豫用之愛之其不盡忠不敬事皇上者雖媚豫豫不爾宥也且云太宗恩育豫躬所以特異於諸子弟者蓋深信諸子之成立惟豫能成立之每覽實録至此未嘗不為之墮淚則王之立身行事實能篤忠藎感厚恩深明君臣大義尤為史册所罕覯使王彼時如宋太宗之處心積慮則豈肯復以死固辭而不為邪説搖惑耶乃令王之身後久抱不白之寃于泉壤心甚憫焉假令當時王之逆迹稍有左驗削除之罪果出于我世祖聖裁朕亦寧敢復翻成案乃實由宵小姦謀搆成寃獄而王之政績載實録者皆有大功而無叛逆之迹又豈可不為之昭雪乎昨于乾隆三十八年因其塋域久荒特敕量為繕葺並準其近支以時祭掃然以王之生平盡心王室尚不足以慰彼成勞朕以為應加恩復還睿親王封號追諡曰忠補入玉牒並令補繼襲封照親王園寢制度修其塋墓仍令太常春秋致祭又如豫親王多鐸從睿親王入關肅清京輦即率師西平流冦南定江浙實為開國諸王戰功之最乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勳績超邁等倫自應世祚原封以彰殊眷豈可以風影微眚輒加貶易乎朕以為應復其原封又諸王中披堅執鋭拓土開疆共成一統之業者如禮親王代善後改封康親王鄭親王濟爾哈朗後改封簡親王肅親王豪格後改封顯親王克勤郡王嶽託後改封平郡王當時俱茂著壯猷克昭駿烈載在宗盟今其子孫所襲均非始封之名外人不知妄疑宗藩當國家締造時有大勳勞而後裔均不得長延帶礪似為闕典何以垂貽奕祀示酬庸追本之義朕以為應復其原號著交軍機大臣會同宗人府悉心妥議具奏再配享太廟諸王僅有通逹武功慧哲宣獻四郡王其太祖太宗世祖時戮力行間櫛風沐雨之親藩如前所舉數人皆未之及蓋由當時議禮親王各懷私意遂爾沒其勛伐不得同侑馨香豈足以彰公道所有睿親王禮親王鄭親王豫親王肅親王克勤郡王俱著補署牌位配享太廟用以妥功宗而昭渥典并將此通諭知之欽此嗣宗人府會同軍機大臣議奏禮親王睿親王鄭親王豫親王肅親王克勤郡王奉旨配享太廟所有東廡序次禮親王應在宣獻郡王之下睿親王等以次列敘奉諭旨依議功臣配享入廟儀禮部承旨具疏行工部製神主龕座祭案具製成擇吉鐫字如式恭遇四時大饗前期遣官一人祗告太廟如常儀是日太常寺官入廟設龕座於配饗之次陳俎豆鑾儀衛設采亭於工部堂露臺上奉神主遣官一人諸王以郡王功臣以大臣詣工部奉主置采亭內民校舁行前列御仗王吾仗功臣引仗自工部中門出鴻臚寺官二人乘馬前引遣官從至東長安門王至門天安御仗采亭止遣官自亭奉主鴻臚寺官二人導引由東長安左門入端門左門至太廟戟門右門自街門入皆由右出鴻臚寺官止太常寺官引至甬道右拜位王階上功臣階下北面立遣官置主於拜位代行三跪九叩禮畢奉神主興奉安於配享之次王東廡功臣西廡行三叩禮退皇朝文獻通考卷一百十五
