body:
  text: 經籍考十二史載記史評史鈔政書職官臣等謹按古者偏方割據僭號紀年各設史官以紀事迹後人論定因以霸僞目之馬端臨兼用阮孝緒七録隋經籍志之名輯為一類然其書實皆後人追記非其舊作僞霸之號似是實非此四庫全書据東觀漢記晉書等改題載記義至善也今遵此例編輯如左南唐拾遺記一卷毛先舒撰先舒見經類先舒自述曰是書略採宋江南遺事諸不見正史者附于馬陸二書鄭文寶近事陳彭年别録陳霆唐餘記傳之後十六國年表一卷張愈曽撰愈曽字庭碩徽州人張潮跋曰崔鴻十六國春秋不識何以不列年表今得此書可以補其缺略十國春秋一百十四卷吳任臣撰任臣字志伊仁和人康熙己未召試博學鴻詞授翰林院檢討十六國年表二十二卷孔尚質撰尚質字元長武陵人右載記臣等謹按麟經筆削游夏不能贊一辭自史記作而班固復異議焉此史評所以日繁也孔子刪帝魁以後書為百篇實史鈔之權輿厥後鈔節少而論說多朝公武讀書志嘗論之不知二者原相表裏故端臨通考並存而不廢惟於一門之中雜見而無區别于義未善兹故遵四庫全書之例各以類從庶編次不致紊雜云御批通鑑綱目五十九卷通鑑綱目前編十八卷外紀一卷舉要三卷通鑑綱目續編二十七卷康熙四十七年吏部尚書宋犖奉敕校刋聖祖仁皇帝御製序曰朕惟自古帝王言動必記而史事以興顧周禮外史所掌卷帙寖繁即紀傳亦異千百年來微言大義昭揭天壤必以尼山筆削為斷所從來尚矣粵自龍門而降纍朝國乘體製略同涑水司馬氏易分類為合編蓋猶左氏法也紫陽朱子特起而振舉之綱以提要目以備詳嵗時列于上而天統明章程繫于下而人紀立增損精切豫奪謹嚴庶幾春秋大居正之宗指歟雖其間事理櫽括稍有脫誤大都門人一時采輯之過實非晦庵本意也自時厥後有前編有外紀有大紀續編以及考證集覽發明質實之類諸家論著不一而足要皆商確折衷互相參訂明儒陳仁錫裒集而剞劂之不可謂非先哲之功臣也朕幾務之暇留神披閲博稽詳考纎悉靡遺取義必抉其精徴辭必搜其奧析疑正陋釐異闡幽務期法戒昭彰質文融貫前後所著論斷凡百有餘首兹允諸臣請並以付梓頒布宇內俾士子流傳誦習開卷瞭然不特天人理欲之微古今治忽之故一一臚如指掌即子朱子祖述宣尼維持世教之苦衷並可潛孚默契于數千載之下是則朕敦崇古學作新蒸民之至意也爰敘述以冠篇端用昭示於無窮焉臣等謹按朱子因司馬光資治通鑑作綱目綱倣麟經目倣左氏其門人依所手定之凡例而成後有伊起莘之發明劉友益之書法王幼學之集覽徐昭文之考證陳濟之集覽正誤馮智舒之質實汪克寬之考異皆自為一書眀黃仲昭取諸家之書散入各條之下特取其便于披覽國朝張自勳始作綱目續麟芮長恤作綱目指遺則又各執私見以相爭我聖祖仁皇帝睿斷精詳即取陳仁錫刋夲親加評定因羣言之淆亂悉舉而釐正之又金履祥病劉恕通鑑外紀嗜博而好奇乃搜採經傳起帝堯迄周威烈王作通鑑前編又括全書綱領撰為舉要復冠之以外紀一編陳仁錫改題通鑑綱目前編與綱目合刋以補朱子所未及至商輅等通鑑綱目續編因朱子凡例紀宋元兩代之事明人亦有發明廣義附於條下今于前編則仍其舊本御筆特加品題其續編雖議論膚淺考訂粗疏亦因陳仁錫既綴刋綱目之末均得上邀乙覽并示别裁不特綱目全書頓易舊觀而于得失之互見瑕瑜之錯出者訂正秩然絲毫不爽尤足以開千古讀史者之心目云御製評鑑闡要十二卷乾隆三十六年大學士劉統勳等奉敕編録臣等謹按前館臣恭纂通鑑輯覽時分卷屬稿排日進呈皇上親加評隲隨條發論法戒昭然其有敕館臣撰擬黏簽同進者皆䝉睿裁改定塗乙增損十存二三全書既成凡數千條皆刋刻簡端兹復甄輯此書凡分卷十二計恭録御批七百九十八則罔不訓示精詳折衷至當如賈充禇淵等之書死狄仁傑之書周正南北稱寇之文訂遼金元人名官名地名之誤而紀年系統關于保邦凝命之原者尤再三申誡將是非不爽於毫釐即曲說無由而置喙俾讀者既博觀于輯覽又得闡要而約守之洵足以垂教萬世而無窮矣漢史億二卷孫廷銓撰廷銓見傳記類廷銓自序曰荀悅漢紀詳約得中次序有意披讀所到偶有觸輒書數語用備遺忘與于東阿讀史漫録意義暗合者什一亦不去也論世八編十二卷華慶逺編慶逺無錫人慶逺自序曰是書略似竟陵鍾氏史懷或正史或野史或集或說不専一史久之盈冊題曰寒窗嘆後改名為論世八編歷代甲子考一卷黃宗羲撰宗羲見經類臣等謹按此編本宗羲與朱朝瑛之書因曹溶收入學海類編改題今名所論史記甲子與尚書不合謂當從班史反覆詳辨多所引證鑑語經世編二十七卷魏裔介撰裔介見經類讀史吟評一卷史評辨正四卷黃鵬揚撰鵬揚字逺公晉江人順治丁酉舉人官知縣讀史矕疑十卷張彥士撰彥士字龍弼定陶人順治初嵗貢生官黃縣訓導史折三卷續一卷賀裳撰裳字黃公丹陽人康熙初諸生澄景堂史測十四卷施鴻撰鴻字則威邵武人康熙中嵗貢生官奉天府經厯鴻自述曰嵗在甲辰署篆羅源未攜書籍借得溫公通鑑自晉至隋數十冊日夜讀之因而有所論議輯為是編垂芳世型十三卷金維寧撰維寧字德藩華亭人康熙丙午舉人資治通鑑述無卷數陳詵撰詵見經類通鑑大感應録二卷秦鏡撰鏡字非臺翼城人鏡自序曰資治通鑑乃古今來一大感應篇録其彰明較著者俾覽之者有所觀感焉讀史辨惑無卷數王建衡撰建衡號月蘿威縣人嵗貢生候選教諭史論初集無卷數朱直撰直字少文江蘇人詩史十二卷葛震撰震字星巖句容人班范肪截四卷五代史肪截四卷張篤慶撰篤慶字厯友號厚齊又號崑崙外史淄川人康熙丙寅拔貢生增定史韻四卷附讀史小論一卷仲宏道撰宏道字開一嘉興人十七史論九卷年表一卷夏敦仁撰敦仁字調元武進人芝壇文案五卷張鵬翼撰鵬翼字警菴連城人史通訓故補二十卷黃叔琳撰叔琳見經類凡例曰唐劉知幾作史通以前代書史敘其體法因習廢置掇其得反述作曲直分內外篇著為評議舊鮮訓釋惟江西郭延年所注盛行而援引蹖駁每多紕繆河南王惟儉更注之名曰訓故依據正史選擇精嚴逺勝郭書然失之太簡未免遺漏叔琳旁搜博採廣所未備其或注意與本書不相比附或闕而不注或注而不全或相沿錯誤並經改正史通通釋二十卷浦起龍撰起龍字二田無錫人雍正庚戍進士官蘇州府教授起龍自述曰趣乖者法宜訓正疵積者道在刋訛訓正之科其别六曰釋曰按曰證釋曰證按曰夾按曰雜按刋訛之科其别四曰字之失曰句之失曰節之淆曰簡之錯編始于乾隆乙丑至戊辰書成梓行史學正藏五卷宋士宗撰士宗字司秩星子人雍正丙午舉人讀史評論六卷費宏灝撰宏灝號愚軒湖州人十七朝史論一得一卷郭倫撰倫見雜史類石溪史話八卷劉風起撰風起字蘭村睢寧人唐鑑偶評四卷周池撰池字商濓湖口人臣等謹按是書雖名唐鑑然于有唐一代實未完備第上起髙宗之上元元年下迄武宗之㑹昌四年蓋池嘗讀通鑑綱目評其得失而未及成書者也右史評左傳經世十卷魏禧撰禧字氷叔寧都人臣等謹按是書不主解經論文惟以推識成敗考鑒得失為事故以經世名編其間略取杜林之注又復雜採諸說綴以評語讀史蒙拾一卷王士祿編士祿字子底號西樵新城人順治壬辰進士官至吏部考功司員外郎史緯三百三十卷陳允錫編允錫字亹齊晉江人順治己未以薦舉授平湖縣知縣兩晉南北集珍六卷陳維嵩撰維嵩字其年宜興人康熙己未召試博學宏詞授翰林院檢討左傳分國纂要十六卷盧元昌撰元昌字文子華亭人康熙中諸生南史識小録八卷北史識小録八卷沈名蓀朱昆田同編名蓀字澗芳錢塘人昆田字文盎秀水人兩漢䝉拾五卷杭世駿撰世駿見經類臣等謹按世駿掇取兩漢文疑義詮釋昭晰迥異餖飣庶幾抉摘微奧得史家識小之遺右史鈔臣等謹按馬端臨通考列故事一門於職官之上然故事之義後鑒前師與時損益似屬之前代為宜夫史家著録自有體裁隋志載漢武故事濫及稗官唐志載魏文貞故事橫牽家傳則于國政朝章之所係其義類尤為乖誤我國家右文垂獻酌古宜今凡準制度于六官貽規模于億載所謂文武之政布在方策煌煌乎誠今日之盛典也故事之名毋庸沿習考錢溥祕閣日録有政書一類四庫全書據以標目謹依此例以符周官立政之遺義焉欽定大清㑹典一百卷欽定大清㑹典則例一百八十卷乾隆二十九年和碩履親王允祹大學士傅恆等奉敕撰皇上御製序曰自郊廟朝廷放之千百國徼荒服屬之倫而莫之偝創業守文繩之億萬葉矩剃訓行之久而勿之渝非㑹典奚由哉顧惟自聖作明述政府粲陳其間有因者即不能無損與益而要之悉損益以善厥因則方策所麗乃一成不易之書非閲世遞輯之書也國家膺大寶命列聖肇興禮樂明備皇祖聖祖仁皇帝康熙二十三年始敕釐定㑹典則以時當大業甫成實永肩我太祖太宗世祖三朝之統緒不可以無述而述固兼作矣皇考世宗憲皇帝雍正五年申諭閣臣敬奉成編考衷條系則以纍洽重熙更兼皇祖景祚延洪化成久道不可以無述而述且未遑言作矣暨朕寅紹丕基祇祇翼翼一惟法祖宗之法心祖宗之心發册披圖罔或偭隃尺寸㑹西陲大功告蕆幸纘承祖宗欲竟之志事而凡職方官制郡縣營戍屯堡覲饗貢賦錢幣諸大政於六曹庶司之掌無所不𨽻且我皇考勵精圖治十三年之間立綱陳紀復不可無紀以垂永世爰咨館局次第具草乙夜手披是正而諗之曰嚮者發凡排纂率用原議舊儀連篇並載是典與例無辨也夫例可通典不可變今將緣典而傅例後或托例以淆典其可乎於是區㑹典則例各為之部而輔以行諸臣皆謂若網在綱咸正無缺而朕弗敢専也蓋此日所輯之㑹典猶是我皇祖皇考所輯之㑹典而俯焉從事于兹者豈直義取述而不作云爾哉良以抱不得不述之深衷更推明不容輕述之微指稽典者當瞭然知宰世馭物所由來無自疑每朝迭修為故事耳若夫治法心法表裏兼賅精之而貫徹天人擴之而範圍今古如往牒所稱惟睢麟足以行官禮者是又數典之原嘉㑹之本也朕其敢不懋諸敢不與子孫臣民交朂諸臣等謹按國朝㑹典康熙三十三年初修雍正五年續修至是凡三經釐定典章條目燦然大備矣昔周禮一經稱為周公致治之書故傳之萬世尊為法守至歷代所傳如唐六典元典章明㑹典雖法制遞有增損而所謂以官統事以事𨽻官者不易焉夫編纂之工拙繫乎政令之廢修我國家列祖相承聖德神功昭垂瀛海規畫既皆盡善我皇上勵精圖治執兩用中化裁皆衷乎道增刪悉合乎宜則是書之體裁精密若網在綱足以方駕周禮者皆實政有以制之固不徒以意為增損也至則例原本散附各條之下猶沿舊體今則各為編録俾大綱細目互相經緯條理益明即如周禮六官所職一代之典制在焉而度數節文則往往見於他說蓋當時故府所記諒不一書皆與六典相輔而行今則以㑹典為不變之大經而則例繁多可以隨時損益之正與三代之古義同符是書也即以仰窺皇心之運量無窮文武張弛胥於是乎在又豈徒備掌故而已哉欽定續通典一百五十卷乾隆三十二年奉敕撰臣等謹按是書所續自唐肅宗至德元年訖明崇禎末年篇目一仍杜氏之舊然其間稍有不同者杜氏以兵制附刑後今則兵刑各為一篇亦倣周禮夏官秋官之例至于略者詳之繁者節之則以唐代年祀稍逺舊典鮮徴五代及遼史書太略故旁搜圖籍以備參稽明則見聞最近宋金元亦多有遺漏則精别是非以昭傳信凡皆禀裁成之妙酌繁簡之中條分件繫覺九百七十八年內之典制謨猷瞭如指掌洵乎提要鉤元非杜氏所能及矣欽定皇朝通典一百卷乾隆三十二年奉敕撰臣等謹按是書以八門𨽻事其中條例酌為變通如錢幣之附食貨馬政之附軍禮兵制之附刑法于理相通者則仍其舊至于古今異制不可强同如食貨典之𣙜酤算緡禮典之封禪皆當時弊政聖代盡為刪除豈宜更存虛目又地理一門舊典以統括歷代其中分併靡常沿革互異故以九州提綱今則六合同風昄章孔厚區區九州舊界豈足盡職方之所掌故均以大清一統志為斷至于列聖鴻猷皇上令典史不勝書宜乎卷目之繁溢于舊典也欽定皇朝通志二百卷乾隆三十二年奉敕撰臣等謹按鄭樵通志列二十略是書分目相同而紀傳年譜則略而不作蓋實録國史尊藏金匱與考求前代刪述舊文義例固不侔也至二十略中視原本汰其冗雜者凡三補其踈漏者凡二刪併其瑣屑者凡三廣益其未聞者凡三博證詳搜獨昭美備又是編名雖通志然紀傳既從其闕實與通志通考為類故從四庫全書之例恭列於政書中焉欽定吏部則例六十六卷乾隆三十七年大學士公傅恆等奉敕纂臣等謹按各部則例每十年奏請纂修一次吏部則例自乾隆三十二年修竣後尚未刋刻復加增纂輯成是編凡品級考六卷銓選則例十三卷處分則例四十七卷書成刋布元朝典故編年考十卷孫承澤撰承澤見經類右政書類通制幸魯盛典四十卷康熙二十三年襲封衍聖公孔育圻等恭述聖祖仁皇帝御製序曰朕惟自古帝王聲教翔洽風俗茂美莫不由於崇儒重道典學右文用能發詩書之潤澤宣道德之閫奧推厥淵源皆本洙泗以故追崇之典厯代相沿或躬詣闕里修謁奠之儀潔志肅容盡誠備物其間禮數隨世損益至于希風服教百代式型異世同揆莫之或二猗歟盛矣朕臨御以來垂三十載溯危微之統緒念生安之聖哲恆慮涼薄未克祇承用是夙夜單心孜孜不倦惟我至聖先師孔子配天地參隂陽模範百王師表萬祀朕每研搜至道涵泳六經覺憲章祖述刪定贊修之功日星揭而江河流私心向往竊有願學之志焉乃者東巡踰泰岱涉泗沂遂詣闕里親行釋奠得瞻廟貌仰聖容以為德盛功隆欽崇宜極凡厥典禮有加前代又親製文辭手寫以勒之貞石務用導揚至教風示來兹夫緬懷曩哲繼躅前賢猶思覩其物采接其居處况先師遺風餘烈久而彌新重以朕之寤寐羮墻僾乎如見及過杏壇相圃之間山川儼然檜楷如故髣佛金石絃誦之聲聞於千載而上流連往復不能自已也衍聖公孔育圻上疏陳謝且以禮儀隆重非直一家榮遇請修幸魯盛典一書朕既可其奏久之書成復請叙言以冠其端朕萬幾餘晷敦勉弗遑實欲默契先師尊聞行知於以阜物諴民風同道一庶幾躋世運於唐虞登治術於三古是書也豈徒使天下後世知朕於先師欽慕無已如此且愈以見聖人之道覆幬羣倫苞育萬象即凡車服禮器之遺皆足令人感發而興起也故賜之序臣等謹按康熙二十三年聖駕東謁闕里展祀廟庭留寶繖以明䖍鐫豐碑而志盛並各製宸章勒石于周公孟子之廟録聖賢後裔給以世官俾奉祠祀帑金優發廟貌聿新育圻以聖天子尊師隆軌超邁古今宜勒為成書以垂永久得㫖俞允書成奏進復䝉訓示改定刋行凡事蹟二十卷藝文二十卷自有書契以來未有裦崇聖教加禮先師若斯之隆者已萬夀盛典一百二十卷康熙五十二年户部侍郎王原祁等奉敕恭輯臣等謹按是編凡六目曰宸藻曰聖德曰典禮曰恩賚曰慶祝曰歌頌備述率土嵩呼之盛實極古今未有之隆又冠以宋駿業等繪圖二卷摹寫極工纎悉具備垂諸冊府共仰見聖祖仁皇帝久道化成敷天歡洽蓋由深仁厚澤浹髓淪肌故一時抃舞謳吟之盛直軼乎衢歌華祝之休焉欽定大清通禮五十卷乾隆元年奉敕撰皇上御製序曰伊古承天之道治人之情莫善乎禮顧其為用往往詳于朝廟略于鄉閭及考儀禮十七篇所紀獨多士禮自后蒼有推而達之之說儒者奉為本經其等差節度互見于周官戴記然時有抵牾朱子嘗建議請修通解而未既厥業信乎完書之難而行典禮觀㑹通章志貞教經世者所宜重也經禮三百曲禮三千㑹典蓋經禮之遺矩而通禮亦曲禮之濫觴朕臨御之初敕儒臣搜訂前聞折衷令甲準時㑹之宜衡質文之紀釐為全帙用詔方來越嵗己卯排纂裁就寧詎謂副在有司執以蒞事而已哉蓋嘗深維大順大同之化初不越納身軌物與天下共之焉耳三代以下漢稱近古觀叔孫通之朝儀公玉帶之明堂不過椎輪粗具後此如唐開元禮宋太常因革禮元通禮明集禮取足徴一朝掌故逮承用日久俗尚駸尋精意逺而敝攰隨之既茍簡慢易而無以稱其情甚且改錯偭規敢于侈汰而冒其上故禮之通也于是乎始難六經之士雖欲闡教正俗然居下不獲若考亭家禮涑水書儀黨孰間以為兔園陳䇿其事不關功令故禮之通也于是乎尤難是編也約而賅詳而不縟圭臬羣經羽翼㑹典使家誦而戶習之于以達之人倫日用之間興孝弟而正風俗則朕淑世牖民之意或在斯乎或在斯乎因禮官之請爰為序以諗其端臣等謹按通禮與㑹典相為表裏奉詔編纂同㑹典次第進呈卷首恭紀朝廟大典几通行儀制各依類分附其中貴賤之等差節目之先後器物之名數陳設之方位纎悉畢具考訂綦詳書成賜名曰通禮洋洋乎酌于今古之宜達之上下而準鴻綱細目具有規程蓋我皇上以聖人之德居天子之位宜乎酌中立制逺邁周官儀禮之經也已欽定國朝宫史三十六卷乾隆七年奉敕撰二十四年增修臣等謹按是編首訓諭次典禮次宫殿次經費次官制次書籍凡六門我皇上服膺祖訓綱紀修明猶復巽命重申輯成是帙所以垂鴻規于億祀紹家法于萬年者抑何深切而著明也歟欽定滿洲祭神祭天典禮六卷乾隆十二年奉敕撰臣等謹按我國家肇造以來祀典攸垂聿昭誠慤惟是口耳相傳不無小異我皇上欽崇寅畏昭事惟䖍特命王公大臣詳明考訂定著成編首祭儀二篇次彚記故事一篇次儀注祝詞贊詞四十一篇殿以器用數目圖式各一篇皆由聖明釐正典則精詳乾隆四十二年復命依文音釋與通禮相輔而行蓋崇德報功之典至是而燦然大備矣欽定皇朝禮器圖式十八卷乾隆二十四年奉敕撰皇上御製序曰五禮五器之文始著虞書若璣衡若作繪絺繡若笙鏞柷敔粲乎具列逮成周考工記乃詳載廣圍尺度與夫方色鈞鋝圜匡縝疏侈弇之差說者謂器之有圖實權輿是漢儒言禮圖者首推鄭康成自阮諶梁正夏侯伏明輩均莫之逮宋聶崇義彚輯禮圖而陸佃禮象陳祥道禮書復踵而穿穴之其書幾汗牛充棟然嘗念前之作者本精意以制器則器傳後之述者執器而不求精意則器敝要其歸不出臆說傳㑹二者而已我朝列聖相承法物修明折衷大備惟是敬天尊祖頒朝詰戎之典弗懈益䖍苐所司展事具儀間沿前代舊式方名象數時有未協爰諏禮官自郊壇祭器及鹵簿儀仗輦輅以次釐正至冠服以彰物采樂器以備聲容宜準彝章允符定則而觀象臺儀器自皇祖親定閲數紀于今度次不免嵗差又武備器什有舊㑹典未經臚載者皆是範是程進御審定於以崇飭祀饗朝㑹軍旅諸大政顧弗薈萃成帙慮無以垂光策府于是按器譜圖系說左方區為八部用付剞劂俾永其傳夫籩豆簠簋所以事神明也前代以碗盤充數朕則依古改之至于衣冠乃一代昭度夏收殷􅒐本不相襲朕則依我朝之舊而不敢改焉恐後之人執朕此舉而議及衣冠則朕為得罪祖宗之人矣此大不可且北魏遼金以及有元凡改漢衣冠者無不一再世而亡後之子孫能以朕志為志者必不惑于流言于以綿國祚承天佑於萬斯年勿替引之可不慎乎可不戒乎是為序臣等謹按是書分祭器儀器冠服樂器鹵簿武備六門左系論說右方為圖凡形模品質度數采章無不一一臚陳罔失纍黍蓋據器為圖不比阮諶聶崇義等之揣摩仿佛于以奉清廟而薦馨香垂成憲而昭法守聖世鴻規宜乎立隆萬古也南巡盛典一百二十卷乾隆三十一年大學士管兩江總督高晉等恭述皇上御製序曰南巡盛典之作非朕志也兩江總督高晉輯書既成始以入告念已成事不可止苐南巡所經非獨江南也若他省踵為之不益繁且贅乎遂下軍機大臣議則請令浙江山東直隸督撫録其事系南巡者裒付高晉都為一書斯體備而文省乃俞之越嵗而薈纂蕆事復郵進以序請朕惟南巡之典亦遹率我皇祖成憲祇奉慈寧宣祺導豫而民隱遐阻以勤以安不自暇逸乃肇自冀兖達于淮海之域溯乾隆辛未以暨乙酉蓋四蒞焉於凡風土之物宜吏治之善否民生之利病既諏覽而規措之而所在耆庶婦孺臚歡祝釐前于後喁趼頂相望繄兹林總親愛之誠每見益摯然敬惟聖母春秋高而江浙經涂數千里頓置煩數非所以適頤養也爰于四巡回蹕時面敕東南諸大吏勿更以南巡籲亦既衆喻之矣輯書者顧因是有言曰曩者鑾輅時至慶惠迭行淪浹肌髓兹臣民顒跂懇欵既弗克申則鴻典茂儀非是莫紀愷澤良政非是莫著碩畫深逺非是莫循大文炳鑠非是莫備豫曰不然朕法祖省方承志尊養惟其實不惟其文若夫慶賜所頒治要所舉咨度所周罔不布在詔令洽于人心而觀風察聲以時賡識大者揭諸石餘亦鋟詩文各集中尚不欲與文士競短長奚以是敷􅞽扢榷為哉惟是翕河遵海係于澤國民寧者綦巨朕親履相度定清口水志以衛下河培海塘坦簍以驗沙漲與夫徐州之隄微湖之閘及諸河防興作皆蘄于灑淡康乂綜而編孴之俾有司知所稽式亦固其宜且使諸有土大小吏憬然于巡守本意各慎厥職阜厥民不啻朕之入疆考詢毋忘毋怠而朕幾暇披覽及之亦不啻蒼赤之瞻就依戀時在目前則是書又未嘗不可作然朕之志實在彼而不在此序而付之剞劂則從皇祖序幸魯盛典例也臣等謹按乾隆辛未至乙酉六御時巡四臨江浙首厪海塘防築湖河疏蓄之方次慰東南都㑹臣民延跂之望率祖攸行裒時之對維時省耕問俗行慶施仁即罄竹恭書豈能殫述晉等略陳梗概已勒鴻編荷䝉賜製序文俾付剞劂迄今庚子甲辰復經兩幸行見新編續纂益增盛典之光也已欽定禮部則例一百九十四卷乾隆四十九年禮部尚書德保等奉敕纂臣等謹按禮部則例自乾隆二十九年纂修後嗣經欽奉諭㫖及內外臣工條奏議准得㫖允行者積至六百餘條德保等奏請續纂輯成是編奏御刋布欽定學政全書八十卷乾隆三十九年理藩院尚書署禮部尚書素爾納等奉敕纂臣等謹按原書自乾隆五年奉詔纂輯續增至二十年嗣因條例尚簡未經博分門類詳細釐析于現行事例多有參差乃重輯是編奏御刋布學典三十卷孫承澤撰承澤見經類文廟從祀先賢先儒考一卷郎廷極撰廷極鑲黃旗漢軍人官至江西總督頖宫禮樂全書十六卷張安茂撰安茂字蓼匪松江人順治丁亥進士官至浙江提學僉事琉球入太學始末一卷國朝諡法考一卷王士禎撰士禎見傳記類歷代建元考二卷鍾淵映撰淵映字廣漢秀水人北郊配位議一卷辨定嘉靖大禮議二卷制科雜録一卷毛竒齡撰竒齡見經類臣等謹按康熙二十四年太常寺卿徐元珙奏現行祀典北郊既改北向而三祖配位仍首東次西請㫖酌改竒齡時官檢討因撰此書以斤漢元始儀惑于曲禮之文詳明反覆申明以東為上之義其辨定嘉靖大禮議一編力詆楊廷和之說又不拾張璁桂蕚之緒餘辨論頗為典確廟制圖考一卷萬斯同撰斯同字季野鄞縣人彚征録一卷不著撰人名氏國學禮樂録二十四卷李周望謝履忠同撰周望字渭湄蔚州人康熙丁丑進士履忠字方山昆明人康熙癸未進士臣等謹按是編輯孔子世系先賢先儒列傳及歷代祀典禮樂圖譜并石鼓潘迪音訓而終之以祭酒司業題名所列頗多疏謬徵引亦未免稍略紀元彚考三十五卷黃琳撰琳見經類聖門禮樂統二十四卷張行言撰行言字躬先江浦人學宫備考十卷彭其位撰其位字素君吳縣人四譯館考十卷太常紀要十五卷江蘩撰蘩見奏議類紀元要略二卷補遺一卷陳景雲撰景雲見編年類景雲自述曰年號始自漢武故纂始於漢并及高惠文景者欲備一代始末也三國南北朝國各有史宋遼金元亦四史並傳故所纂各繫以國不統于一而于本國改元下仍分注歷國年號以便參考至歷代興廢大略與享年之修短亦附載焉歷代帝王年號二十卷劉宗魏撰宗魏字友韓號柚航贛州人乾隆戊辰進士官至監察御史右政書類儀制欽頒賦役全書不分卷世祖章皇帝御製序曰朕惟古帝王臨御天下必以國計民生為首務故禹貢則壤定賦周官體國經野法至備也當明之初取民有制休養生息至萬歷年間海內殷富家給人足及乎天啓崇禎之世因兵增餉加派繁興貪吏緣以為奸民不堪命國祚隨之良足深鑒朕荷上天付託之重為生民主一夫不獲亦疚朕懷凡服御膳羞深自約損然而祖宗百神軍旅燕饗犒錫之繁以及百官庶役餼廪之給罔不取之民間誠恐有司額外加派豪蠧侵漁中飽民生先困國計何資兹特命戶部右侍郎王𢎞祚將各直省每年額定徴收起存總撒實數編撰成帙詳稽往牘參酌時宜凡在參差遺漏悉行駁正錢糧則例俱照萬歷年間其天啓崇禎時加增盡行蠲免地丁則開原額若干除荒若干原額以萬厯刋書為凖除荒以覆奏御㫖為慿地丁清核次開實徵又次開起存起運者部寺倉口種種分析存留者欵項細數事事條明至若九釐銀舊書未載者今已增入宗祿銀昔為存留者今為起運漕白二糧確依舊額運丁行月必令均平胖襖盔甲昔解本色今俱改折南糧本折昔留南用今抵軍需官員經費定有新規㑹議裁冗改歸正項本色絹布顔料銀珠銅錫茶蠟等項已改折者照督撫題價值開列解本色者照刋書價值造入每年督撫確察時值題明填入易知單內照數辦解更有昔未解而今宜增者有昔太冗而今宜栽者俱細加清核條貫井然後有續增地畞錢糧督撫按彚題造冊報部以慿稽核綱舉目張勒成一編名曰賦役全書頒布天下庶使小民遵兹令式便于輸將官吏奉此章程罔敢苛斂為一代之良法垂萬世之成規雖然此其大略也若夫催科之中寓以撫字廣招徠之法杜欺隱之奸則守令之責也正已率屬承流宣化核出納之數慎挪移之防則布政司之職也舉亷懲貪興利除害課殿最於荒墾昭激揚于完缺恪遵成法以無負朕足國裕民之意則督撫之責有特重焉其敬承之毋忽臣等謹按是編始於順治十一年至十四年書成刋布嗣後陸續纂增篇目日富御定康濟録四卷乾隆四年吏科給事中倪國璉恭進臣等謹按是編四門一前代救援之典二先事之政三臨事之政四事後之政末以摘要備觀賑粥須知捕蝗必覽社倉條約附焉仰見皇上軫念民依無時或釋芻蕘可採真不遺乎一善也欽定户部則例一百二十六卷乾隆四十一年大學士于敏中等奉敕纂臣等謹按戶部向無則例創始乾隆二十六年至四十一年告成奏御刋布嗣是五年一修如刑部律例館之例淮鹺本論二卷胡文學撰文學見奏議類厯代茶𣙜志一卷蔡方炳撰方炳字九寰號息關崑山人蘇松厯代財賦考一卷不著撰人名氏臣等謹按是編厯紀明代蘇松財賦之重後恭録世祖章皇帝聖祖仁皇帝歷年蠲缺減額諸聖諭并及巡撫韓世琦等奏疏仰見我朝自列聖以來莫不子愛元元所以推恩沛澤者至再至三彼東南士女孰不歌咏升平而效康衢擊壤之風哉捕蝗考一卷陳芳生撰芳生字潄六仁和人荒政叢書十卷俞森撰森號存齊錢塘人由貢生官至湖廣布政司參議歷代山澤征稅紀一卷彭寧求撰寧求字文洽長洲人康熙壬戌進士官至左春坊左中允左司筆紀二十卷吳璟撰璟字西齊太倉人康熙戊辰進士官給事中暻自識曰時官户部者稱廣東山西二司為左右二大司暻適官廣東司而所托拾多一曹遺事故以左司筆紀名書泉刀滙纂無卷數邱峻撰峻字晴岩仁和人錢録十二卷張端木撰端木字崑喬上海人乾隆壬戌進士官諸暨縣知縣右政書類邦計欽定八旗通志初集二百五十卷雍正五年大學士鄂爾泰張廷玉等奉敕撰皇上御製序曰粵稽古唐虞封山濬川命官敷教諸大政具載典謨而禹貢周官尤詳于方域官制聖人列之于經所以著一代之憲章垂奕世以法守經邦立政惇典善俗必於兹取則焉我國家受天景命太祖高皇帝龍興東土創造鴻基肇建八旗以統滿洲䝉古漢軍之衆規模宏逺立極萬世太宗文皇帝繼緒膺圖遐邇率服輸誠歸附者雲集景從咸𨽻旗籍以固根本世祖章皇帝統一寰宇定鼎京師詳定規制體統嚴明建置周密重以皇祖皇考德澤涵濡休養訓迪明禮制興學校廣儲蓄典章日益明備蓋自開創以來百有餘年列聖相承經畫盡善而且詬之以天地之恩篤之以家人父子之親隆之以肺腑腹心之寄英藩碩輔宿將名臣佐命宣猷銘鼎鐘而耀竹帛者後先相望下逮卒徒韋布亦共識尊君親上之大義節孝忠烈有不待勉强而出於至性者雖邠岐豐鎬之遺風豐沛南陽之故舊曷以加兹顧其事散見于實録㑹典諸書未有専紀雍正五年皇考命儒臣纂輯八旗志書昭示永久乃採托彚集撰為八志曰旗分曰土田曰營建曰兵制曰職官曰學校曰典禮曰藝文次以八表曰封爵曰世職曰八旗大臣曰宗人府曰內閣大臣曰部院大臣曰直省大臣曰選舉次以列傳曰宗室王公曰名臣曰勳臣曰忠烈曰循吏曰儒林曰孝義曰烈女越乾隆四年書成凡二百五十三卷於是而列祖創垂之緒損益之宜與夫人物殊尤之跡臚舉條分燦然具備與國史相為表裏然是書之作非徒以廣紀載備圖籍已也監成憲則思所以遵守而修明之覽風俗則思所以董勸而振作之篤宗盟則思推一本以睦之念勳舊則思培後裔以酬之生聚蕃衍何以阜之人材蔚起何以牖之本計是圖審所先務斯則皇考命纂是書之大本繼序者當敬承而罔斁也八旗人士尚念國恩之優厚先業之彪炳流風善俗之忠直而敦龎服官者竭股肱從戎者效臂指淳質之風引而弗替克篤前人成烈以長養其子孫國家無疆之休其永有賴夫欽定中樞政考三十一卷八旗則例十二卷乾隆三十七年工部尚書兼管兵部尚書公福隆安等奉敕纂臣等謹按是書凡八旗中樞政考十五卷分金石絲竹匏土革木八門緑營中樞政考十六卷分甲乙丙丁戊己庚辛壬癸十門八旗則例十二卷分忠孝亷節四門自乾隆二十九年修竣後至是復加增纂書成刋布欽定五軍道里表不分卷乾隆四十四年兵部尚書公福隆安等奉敕纂臣等謹按是書原名軍衛道里表乾隆八年纂輯告成嗣經大學士尹繼善奏請重修並以從前五等人犯係發衛所充軍是以定為軍衛道里表今軍犯俱交州縣收管衛所専司挽運漕糧並不收管軍犯因改名五軍道里表至是復加增修書成刋布歷代馬政志一卷蔡方炳撰方炳見邦計類歷代武舉考一卷談吉璁撰吉璁字丹石嘉興人官至登州府知府右政書類軍政大清律例四十七卷乾隆五年大學士三泰徐本等奉敕撰皇上御製序曰象刑有典肇見虞書其用之之道則曰欽曰恤曰明曰允一篇之中三致意焉武王誥康叔以用其義刑義殺而吕刑則曰士制百姓于刑之中以教祇德古先哲王所謂設法飭刑布之象魏縣之門閭自朝廷達于邦國共知遵守者惟是適于義協于中弼成教化以洽其好生之德非徒示之禁令使知所畏懼而已我列祖受天明命撫綏萬邦頒行大清律例仁育義正各得其宜聖祖仁皇帝至仁如天化成久道德洋恩溥涵浹羣生皇考世宗憲皇帝際重熙纍洽之運振起而作新之親定大清律集解刋示中外甄陶訓迪刑期無刑法外之仁垂為明訓有曰寬嚴之用必因乎其時洋洋聖謨洵用法之權衡制刑之準則也朕寅紹丕基恭承德意深念因時之義期以建中于民簡命大臣取律文及遞年奏定成例詳悉參定重加編輯揆諸大臣準諸人情一本于至公而歸于至當折中損益為四百三十六門千有餘條凡四十七卷條分縷析倫敘秩然頒布宇內用昭畫一之守於戲五刑五用以彰天討而嚴天威豫一人恭天成命監成憲以布于下民敢有弗欽雖然有定者律令無窮者情僞也易曰君子以明慎用刑而不留獄書曰式敬爾由獄以長我王國忠信之長慈惠之師尚其慎厥用敬厥由體欽恤明允之意率乂於民棐彞克協于中以弼豫祈天永命允升于大猷從事于斯者胥懋敬哉是為序臣等謹按順治初刑部尚書吳達海奉詔詳考明律參以國制勒為成書康熙九年大學士管刑部尚書事對喀納等奉詔校正雍正元年大學士朱軾尚書查郎阿等奉詔續成我皇上御極之初即允尚書傅鼐之請命廷臣考正成編纂入定例凡一千餘條恭録世祖章皇帝御製原序聖祖仁皇帝上諭世宗憲皇帝御製序文諭㫖並我皇上御序冠於簡端嗣是數載一修各以新定之例分附於後而於讞牘奏陳復量情酌理矜慎再三虞廷欽恤之風洵無加於此矣欽定督捕則例二卷乾隆八年大學士徐本等奉敕纂臣等謹按旗逃名例古所未有順治初創為則例康熙十五年命大學士索額圖校定至是重加釐正續纂成編欽定三流道里表不分卷乾隆四十九年大學士公阿桂等奉敕纂臣等謹按是書自乾隆八年纂輯告成二十年復經修訂嗣因我皇上德盛化神幅員廣闢增設郡邑既為舊表所未備即各直省府㕔州縣亦有裁併增設因請㫖重輯書成刋布右政書類法令欽定工部工程做法七十四卷雍正十二年和碩果親王允禮等奉敕纂臣等謹按工部營造規條多關經制是編詳細編纂開卷瞭然信可以遵行而永守也欽定工部則例五十卷乾隆十四年大學士史貽直等奉敕纂臣等謹按是編因乘輿儀仗金銀器皿應需雕刻漆金鋄鍍並布帛綵繡縫緝等及一切器物所用工料向未詳定條規乃奏請編纂成書以昭畫一欽定工部續增則例九十五卷乾隆二十四年大學士史貽直等奉敕纂臣等謹按工部舊則例日久未修惟據事案辦理工料銀數未免先後參差貽直等請㫖續纂輯成是編欽定物料價值則例二百二十卷乾隆三十三年大學士陳宏謀等奉敕纂臣等謹按乾隆元年經工部題定一切物料按照時價釐定章程編為四卷至是因各處欵項不齊價值互異乃奏請輯為則例詳明纂核勒成是編武英殿聚珍板程式一卷乾隆四十一年户部侍郎金簡恭撰臣等謹按沈括夢溪筆談載慶厯中布衣畢升用膠泥刻字此活板之權輿也厥後王楨之易木板陸深之記鉛字法雖屢變究未精詳乾隆三十八年詔修四庫全書復命擇其善本校正剞劂嘉惠藝林簡因梨棗功繁奏請以活字排印得㫖俞允賜名聚珍行之三載力省功多簡因述其程式繪圖系說以為此書浮梁陶正志一卷吳允嘉撰允嘉見傳記類右政書類考工御製人臣警心録一卷順治十二年世祖章皇帝御撰世祖章皇帝御製序曰朕惟人臣立身制行本諸一心心正則為忠為直衆美集焉不正則為奸為慝羣惡歸焉是故心者萬事之本美惡之所由出也顧事有殊塗心惟一致一于國則忘其家一于君則忘其身如此者不特名顯身榮邦家亦允賴之矣若夫奸邪之流樹黨營私怙權亂政卒至聲名俱喪為國厲階蓋緣居恆無正心之功一當勢利遂昏迷瞀亂狂肆驕矜上昧王章下乖臣誼或作威而聨羽翼或比匪而效奔趨如談泰石漢以纍世舊臣久叨恩遇不思圖報逞臆橫行跋扈自恣目無綱紀陳名夏則一介豎儒驟蒙顯拔倚任深重賜賚優隆而乃背德植交蔑法罔上此皆自作罪孽以致隕厥身家朕厯稽往古宵人誤國代代有之觀諸近事復炯鑒昭然足為永戒恐後之為臣者或仍蹈覆轍負主恩而渝素志至于身罹刑憲悔悼無由故推原情狀而論列之録成一編以為人臣警心之訓云臣等謹按是書取自漢迄宋姦臣惡跡訓誡周詳彚為一冊普示班聫俾知炯鑒仰見世祖章皇帝防微杜漸所以立千秋臣道之間示百爾保身之則者固甚深切而著明也欽定訓飭州縣規條一卷世宗憲皇帝御製序曰牧令為親民之官一人之賢否關係萬姓之休戚故自古以來慎重其選而朕之廣攬旁求訓勉告誡兾其奏循良之績以惠我蒸黎者亦備極苦心矣惟是地方事務皆發端于州縣頭緒紛繁情僞百出而膺斯任者類皆初登仕籍之人未練習于平時而欲措施於一旦無怪乎倣徨瞻顧心志茫然即採訪咨詢而告之者未必其盡言無隱此古人所以有學製美錦之歎也向以大學士朱軾左都御史沈近思外任多年周知地方利弊雍正二年曾令二臣商著規則以為州縣之南車乃書未就緒而沈近思物故邇年以來朱軾復時多病此事遂至遲延去年始降㫖委諸總督田文鏡李衛令二臣各抒所見繕録諸條以進朕親加批覽見其條理詳明言辭剴切民情吏習罔不兼該大綱細目莫不備舉誠新進之津梁庶官之模範也在二臣各就其所閲厯者而言繁簡同異之間不必一致而慎守官方勤恤民隱興利除害易俗移風其大指則一而已矣爰就本文付之剞劂頒賜州縣官各一帙俾置之几案間朝夕觀覽省察提撕治效未臻必思所以勉之弊端未革必思所以去之本之以實心行之以實力毋始勤而終怠毋靜言而庸違如此則不但國家得司牧之賢草野有父母之頌而爾等身膺顯擢叨被榮光福貽子孫名標史冊豈不美歟欽定詞林典故八卷乾隆九年大學士兼翰林院掌院學士鄂爾泰張廷玉等恭纂皇上御製序曰詞林典故書成大學士張廷玉等以序請朕惟六經之士豈易言哉而况躋玉堂而列藝署者盡六經之彥也木天故事厯代沿革具見於斯則又何言惟是國家重館閣之選極優遇之榮詎止蜚其英聲將以華國而已哉如濓溪所謂文以載道者舍是無他求夫布衣韋帶之士由立言以期不朽足矣若夫國家右文重道將以淑世熙績繼往聖之絶學開萬世之太平胥是賴焉名之盛者實難副任之大者責彌重譽之來者毁亦隨其尚思春華秋實之喻而凛虗車麟楦之譏哉欽定國子監志六十二卷乾隆四十三年户部尚書梁國治等奉敕撰臣等謹按本朝國子監及文廟締搆實始于元時國子祭酒陸宗楷等嘗輯太學志一書所述沿革兼及唐宋以前殊失限斷仰承訓示重為校正斷自元初輯成此帙首聖諭次詣學次廟制次祀位次禮次樂次監制次官師次生徒次經費次金石次經籍次藝文而附以紀事綴聞二卷詳徴故實始末釐然讀是編者知國家重道崇儒典隆制備四海之內學校如林庠序盈門者有自來也欽定厯代職官表七十二卷乾隆四十五年奉敕編臣等謹按是編詳述厯朝官制源流排次分目悉遵今制每一曹司為一表表後詳敘建置首列國朝略如唐六典之例次及歷代凡今有而昔無昔有而今無與名同而實異實同而名異者並節引諸書詳為考證上下數千年分職率屬之制展卷瞭然且以見聖朝董政之模逺邁唐虞之稽古矣政學録五卷鄭瑞撰瑞字司直棗强人順治己亥進士官至江南巡撫歷代銓選志一卷袁定逺撰定逺里貫未詳歷代宰輔彚考八卷萬斯同撰斯同見儀制類銓政論略一卷蔡方炳撰方炳見政書類文武金鏡律例指南十六卷凌銘麟撰銘麟字天石杭州人臣等謹按是書専為初仕者而設故于官階儀注蒞任事宜莫不條律分明而于律例大㫖尤重加發明焉為政第一編八卷孫鋐撰鋐字可菴錢塘人百僚金鑑十二卷牛天宿撰天宿字覲薇章邱人官瓊州府知府南唐舊聞十六卷黃叔璥撰叔璥見傳記類臣等謹按王士禎分甘餘話云今都察院可稱南臺不可稱西臺叔璥是編乃記御史典故之書故取此義以南臺為名右職官皇朝文獻通考卷二百二十二
