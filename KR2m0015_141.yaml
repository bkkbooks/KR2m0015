body:
  text: 王禮考十七皇帝冠服皇子親王以下至臣工冠服附臣等謹按孟冬始裘孟夏始絺因乎寒燠之時千古不可變者先儒泥周禮祀昊天上帝則大裘而冕之文謂祀地亦服大裘不知夏至非服裘之時此泥古而固者也若夫冠服之制或因於古或因於今毋追委貎夏周之式各殊縫掖章甫宋魯之俗攸别紗幞行而麻冕皮弁之制廢革鞾著而青絇黄繶之用微古稱紅紫不為䙝服而唐以後貴官始得賜紫古以頭巾為賤者之服而宋世諸帝常朝燕坐亦御頭巾盖古今之時不同毋庸相襲宋儒邵雍亦有今人不敢服古衣之説洵有得乎禮從宜之㫖已我國家龍興東土風尚朴淳衣冠多從儉約吉服燕服各隨所宜列聖相承世守罔替臣等恭讀皇上欽定皇朝禮器圖式御製序文有云籩豆簠簋所以事神明也前代以盌盤充數朕則依古改之至於衣冠乃一代昭度夏收殷冔本不相襲朕則依我朝之舊而不敢改焉恐後之人執朕此舉而議及衣冠則朕為得罪祖宗之人矣此大不可且北魏遼金以及有元凡改漢衣冠者無不一再世而亡後之子孫能以朕志為志者必不惑於流言於以綿國祚承天祐於萬斯年勿替引之可不慎乎可不戒乎至矣㢤聖人之恪守家法防微杜漸如是洵足為億萬禩之金鑑矣厯代史輿服志備載冠服制度馬氏王禮考有君臣冠冕服章一門五朝考亦從其例兹據呈朝禮器圖式以類叙次恭載至尊朝祭冠服朝珠佩𢃄以至皇子諸王公品官各有等差咸著於篇崇徳二年四月諭曰昔金熙宗及金主亮廢其祖宗時衣冠儀度循漢人之俗遂服漢人衣冠盡忘本國言語迨至世宗始復舊制衣冠凡語言及騎射之事時諭子孫勤加學習如元王馬大郭遇漢人訟事則以漢語訊之有女直人訟事則以女直語訊之世宗聞之以其未㤀女直之言甚為嘉許此本國衣冠言語不可輕變也我國家以騎射為業今若不時親弓矢惟躭宴樂則田獵行陣之事必致疎曠武備何由而得習乎盖射獵者演武之法服制者立國之經朕欲爾等時時不忘騎射勤練士卒凡出師田獵許服便服其餘俱令遵照國初之制仍服朝衣且諄諄訓諭者非為目前起見也及朕之身豈有習於漢俗之理正欲爾等識之於心轉相告誡使後世子孫遵守毋變棄祖宗之制耳順治八年閏二月御史匡蘭兆奏言朝祭宜用衮冕得㫖一代自有制度朝廷惟在敬天愛民治安天下何必用兖冕乾隆三十二年五月户部奏臣等恭校禮器圖冠服一門惟雨衣之制向未詳備嗣後文武三品以下官員請分别雨帽邊頂鑲用采色以辨等威恭候欽定增入冠服圖㑹典永逺遵行奉㫖所奏是應照此辦理三十七年十月諭曰朕閲三通館進呈所纂嘉禮考内於遼金元各代冠服之制叙次殊未明晰遼金元衣冠初未嘗不循其國俗後乃改用漢唐儀式其因革次第原非出於一時即如金代朝祭之服其先雖加文飾未至盡去其舊至章帝乃槩為更制是應詳考銓次以徵蔑棄舊典之由並酌入按語俾後人知所鑒戒於輯書闗鍵方為有當若遼及元可例推矣兹因編訂皇朝禮器圖曾親製序文以衣冠必不可輕言改易及批通鑑輯覽又一一發明其義誠以衣冠為一代昭度夏收殷冔本不相沿襲凡一朝所用原自有法程所謂禮不㤀其本也自北魏始有易服之説至遼金元諸君浮慕好名一再世輙改衣冠盡失其純樸素風傳之未久國勢寖弱洊及淪胥葢變本㤀先而隱患中之覆轍具在深可畏也況揆其所以議改者不過云兖冕備章文物足觀耳殊不知潤色彰身即取其文亦何必僅沿其式如本朝所定朝祀之服山龍藻火燦然具列悉皆義本禮經更何通天絳紗之足云耶且祀莫尊於天祖禮莫隆於郊廟溯其昭格之本要在乎誠敬感通不在乎衣冠規制夫萬物本乎天人本乎祖推原其義實天逺而祖近設使輕言改服即已先忘祖宗將何以上祀天地經言仁人饗帝孝子饗親試問仁人孝子豈二人乎不能饗親顧能饗帝乎朕確然有見於此是以不憚諄覆教戒俾後世子孫知所法守是創論實格論也所願奕葉子孫深維根本之計毋為流言所惑永永恪遵朕訓庶幾不為獲罪祖宗之人方為能享上帝之主於以永綿國家億萬年無疆之景祚實有厚望焉其嘉禮考仍交館臣悉心確核遼金元改制時代先後逐一臚載再加按語證明改繕進呈候朕鑒定昭示來許並將此申諭中外仍録一通懸勒上書房四十一年四月諭曰阿桂既已賞給寶石頂四團龍補褂金黄帯令其服用著再加恩賞穿四開裾袍皇帝朝冠冬用薫貂黒狐惟其時上綴朱緯頂三層貫東珠各一皆承以金龍各四飾東珠如其數上銜大珍珠一夏織玉草或藤絲竹絲為之縁石青片金二層裏用紅片金或紅紗上綴朱緯前綴金佛飾東珠十五後綴舍林飾東珠七頂制同皇帝吉服冠冬用海龍薫貂紫貂惟其時上綴朱緯頂滿花金座上銜大珍珠一夏織玉草或藤絲竹絲為之紅紗綢裏石青片金縁上綴朱緯頂制同皇帝常服冠紅絨結頂餘俱如吉服冠皇帝端罩以紫貂皮及黒狐為之明黄緞裏左右垂帯各二下廣而鋭色與裏同皇帝衮服色用石青棉袷紗裘惟其時繡文五爪正面金龍四團兩肩前後各一其章左日右月前後萬夀篆文間以五色雲皇帝朝服色用明黄惟祀天用藍朝日用紅夕月用月白棉袷紗裘惟其時披領及䄂俱石青片金縁冬加海龍縁繡文兩肩前後正龍各一要帷行龍五袵正龍一襞積前後團龍各九裳正龍二行龍四披領行龍二袖端正龍各一列十二章日月星辰山龍華蟲黼黻在衣宗彛藻火粉米在裳間以五色雲下幅八寶平水十一月朔至上元披領及裳俱表以紫貂袖端薫貂繡文兩肩前後正龍各一襞積行龍六列十二章俱在衣間以五色雲皇帝龍袍色用明黄棉袷紗裘惟其時領袖俱石青片金縁繡文金龍九列十二章間以五色雲領前後正龍各一左右及交襟處行龍各一袖端正龍各一下幅八寶立水裾左右開皇帝常服褂色用石青花文隨所御棉袷紗裘惟其時皇帝常服袍色及花文隨所御裾左右開棉袷紗裘惟其時皇帝朝珠縧皆明黄色吉服朝珠珍寶隨所御大典禮朝珠用東珠一百有八佛頭記念背雲大小墜雜飾各從其宜惟祀天以青金石為飾祀地珠用蜜蠟朝日用珊瑚夕月用緑松石皇帝朝𢃄色用明黄龍文金圓版四飾紅寶石或藍寶石及緑松石每具銜東珠五圍珍珠二十左右佩帉淺藍及白各一下廣而鋭中約鏤金圓結飾寶如版圍珠各三十佩囊文繡燧觿刀削結佩惟宜縧皆明黄色凡祭祀龍文金方版四其飾祀天用青金石祀地用黄玉朝日用珊瑚夕月用白玉每具銜東珠五佩帉及縧惟祀天用純青餘如圓版朝帯之制中約圓結如版飾銜東珠各四佩囊純石青左觿右削並從版色吉服常服帯鏤金版四方圓惟便銜以珠玉雜寶各從其宜左右佩帉純白下直而齊中約金結如版飾餘制同皇帝雨冠雨衣雨裳之制皆用明黄色氊及羽縐油紬惟其時皇子朝冠親王同冬用薰貂青狐惟其時上綴朱緯其制下達文武一品皆同後不具詳頂金龍二層飾東珠十上銜紅寶石夏織玉草或藤絲竹絲為之縁石青片金二層裏用紅片金或紅紗上綴朱緯前綴舍林飾東珠五後綴金花飾東珠四頂制同皇子吉服冠冬用海龍薫貂紫貂惟其時上綴朱緯紅絨結頂夏織玉草或藤絲竹絲為之紅紗紬裏石青片金縁上綴朱緯頂制同皇子端罩紫貂為之金黄縀裏左右垂帯各二下廣而鋭色與裏同皇子龍褂色用石青繡文五爪正面金龍四團兩肩前後各一間以五色雲棉袷紗裘惟其時皇子朝服色用金黄披領及袖俱石青片金縁冬加海龍縁繡文兩肩前後正龍各一要帷行龍四裳行龍八披領行龍二䄂端正龍各一下幅八寶平水十一月朔至上元披領及裳俱表以紫貂袖端薰貂繡文兩肩前後正龍各一襞積行龍六間以五色雲皇子蠎袍色用金黄片金縁繡文通九蟒裾左右開制達宗室後不具詳皇子朝珠親王世子郡王同縧皆金黄色自東珠外隨所用雜飾惟宜皇子朝帶親王同色用金黄金銜玊方版四每具飾東珠四中飾貓睛石一左右佩縧如帶色吉服帶色同版飾惟宜皇子雨冠雨衣雨裳之制均用紅色氊及羽紗油紬惟其時親王吉服冠下至貝勒皆同冬用海龍薫貂紫貂惟其時夏織玉草或藤絲竹絲為之紅紗綢裏石青片金縁上綴朱緯其制下達庶官皆同後不具詳頂用紅寶石曾賜紅絨結頂者亦得用之親王端罩下至貝子固倫額駙皆同青狐為之月白緞裏曾賜金黄色者亦得用之左右垂帶各二下廣而鋭色與裏同親王補服世子同色用石青繡五爪金龍四團前後正龍兩肩行龍親王朝服蟒袍世子郡王同藍及石青諸色隨所用曾賜金黄者亦得用之餘如袍皇子朝服蟒之制親王坐褥冬用猞猁猻縁貂皮夏用五爪蟒龍紅緞襯紅白氊餘皆如皇子世子朝冠頂金龍二層飾東珠九上銜紅寶石夏朝冠前綴舍林飾東珠五後綴金花飾東珠四世子朝帯色用金黄銜玉方版四每具飾東珠三左右佩縧如帶色吉服帶色同凡宗室帶色皆如之覺羅用紅世子坐褥冬用貂皮縁猞猁猻夏用四爪蟒文藍緞餘如親王郡王朝冠頂金龍二層飾東珠八上銜紅寶石夏朝冠前綴舍林飾東珠四後綴金花飾東珠三郡王補服色用石青繡五爪行龍四團兩肩前後各一郡王朝帯色用金黄金銜玉方版四每具飾東珠二貓睛石一左右佩縧如帶色餘皆如親王世子貝勒朝冠頂金龍二層飾東珠七上銜紅寶石夏朝冠前綴舍林飾東珠三後綴金花飾東珠二貝勒補服色用石青前後繡四爪正蟒各一團貝勒朝服下至輔國公和碩額駙皆同色自金黄外隨所用披領及袖俱石青片金縁冬加海龍縁繡文兩肩前後正蟒各一要帷行蟒四裳行蟒八披領行蟒二袖端正蟒各一下幅八寶平水十一月朔至上元披領及裳俱表以紫貂袖端薫貂繡文兩肩前後正蟒各一襞積行蟒六間以五色雲貝勒蟒袍下至輔國公和碩額駙皆同色自金黄外隨所用片金縁繡文通九蟒皆四爪貝勒朝珠下至輔國公和碩額駙皆同縧用石青色貝勒朝帶帶色用金黄金銜玉方版四毎具飾東珠二佩縧皆石青色餘如郡王貝子朝冠固倫額駙同頂金龍二層飾東珠六上銜紅寳石夏朝冠前綴舍林飾東珠二後綴金花飾東珠一吉服冠用紅寳石圓頂固倫額駙用珊瑚乾隆五十二年遵之㫖照固倫額駙色布騰巴爾珠爾例戴紅寳石帽頂皆戴三眼孔雀翎貝子補服固倫額駙同色用石青前後繡四爪行蟒各一圑貝子朝帶色用金黄金銜玉方版四毎具飾東珠一貝子坐褥冬用白豹皮夏用藍緞縁以粧緞餘皆如貝勒固倫額駙朝𢃄色用石青或藍金銜玉圓版四每具飾東珠一左右佩縧皆石青色吉服帶色同鎮國公朝冠和碩額駙同頂金龍二層飾東珠五上銜紅寶石夏朝冠前後舍林飾東珠一後綴金花飾緑松石一吉服冠用珊瑚圓頂入八分公用紅寶石俱戴雙眼孔雀翎鎮國公端罩輔國公和碩額駙同紫貂為之月白緞裏左右垂帯各二下廣而鋭色與裏同鎮國公補服輔國公和碩額駙同色用石青前後繡四爪正蟒方補鎮國公朝帶輔國公同每具飾貓睛石一鎮國公坐褥冬用紅豹皮夏用紅閃緞襯紅氊餘皆如貝子輔國公朝冠頂金龍二層飾東珠四輔國公坐褥冬用紅豹皮去首尾夏用青閃緞餘制俱與鎮國公同和碩額駙朝帯每具飾貓晴石一餘如固倫額駙朝帯之制民公朝冠頂鏤花金座中飾東珠四上銜紅寶石吉服冠用珊瑚圓頂民公端罩侯伯子男輔國將軍郡主額駙縣主額駙同貂皮為之藍緞裏左右垂帶各二下廣而鋭色與裏同民公補服侯伯同色用石青前後繡四爪正蟒民公朝