  text: 欽定四庫全書皇朝文獻通考卷一百九十九
  hash: sha256:150f7ec3700880dacf6834a7267a71cf5363e885727c23b8c7449bcdef63fd2a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0015_WYG_199-1a, image: WYG0636/WYG0636-0569a.png}
body:
  text: 刑考五刑制乾隆十一年定聽從毆死大功以下尊長例大學士九卿議覆刑部奏請嗣後凡聽從下手毆本宗小功大功兄姊及尊屬至死者除實係廹於尊長威嚇勉從下手邂逅至死並非助毆傷多情重者仍照律减等外其雖有尊長使令毆打情事而輙行叠毆傷多情重者將本犯擬斬監候秋後處决并載入例冊從之申定掘驗尊長骸骨之例刑部議覆江西按察使張師載奏言愚民惑於風水凡父母𦵏後一二年輙將骸骨起出刮洗驗其紅黒色以定地之吉凶名曰洗筋或曰檢筋紅則仍行掩埋黒則改𦵏别地逾年仍行掘驗請嗣後如有將已葬祖父母父母及五服内尊長骸骨發掘洗筋者均照服制以毁棄坐罪幫同檢洗之人俱照為從論地保扶同隐匿者杖一百如有故而依禮遷葬者仍照律不坐應如所請從之互見徒流門定旗人發掘墳墓之罪先是旗人犯案從未有發掘墳墓之事至是有犯者部議擬絞監候上命改為絞决並通行八旗及各省駐防旗人俾共知儆戒十二年定姦夫拒捕刃傷應捉姦之人例照竊盗拒捕毆所捕人至折傷以上者擬絞監候定追贓二限已滿分别侵貪未完分數之例奉諭侵盗貪婪之犯因例内載有分年减等逾限不完仍照原擬監追之語至秋審時概入緩决外而督撫内而九卿法司習為固然初不計二限已滿既入秋審自當處以本罪豈有虛擬罪名必應緩决之理即如立限减等原屬法外之仁至限滿不完則是明知不死更欲保其身家此等藐法無恥之徒即應照原擬明正其罪嗣後凡二限已滿照原擬監追之犯九卿於秋審時核其情罪應入情實者即入於情實案内以彰國法朕於勾到日再為酌奪其如何分别酌核之處着大學士九卿妥議速奏尋議凡侵貪案犯二限已滿察其獲罪之由如係動用雜項及那移核减一應著賠作為侵欺并收受借貸等欵問擬貪婪迨監追後急圖完公者應量擬為緩决若以身試法贓私累累至監追二限已滿侵蝕未完尚在一千兩以上及貪婪未完尚在八十兩以上者秋審時即列入情實請㫖勾到從之十三年定獨子承祀不得濫請之例陜西廵撫陳宏謀奏獨子承祀之例不宜濫請嗣後惟弟毆胞兄至死夫毆妻致死並無争奪兇毆謀故别情者父母已故家無次丁照例援請承祀毆死一應有服尊長均不得援請承祀其中果係情有可原者止應照例將情有可原之處聲明應否末减從之定聚衆抗官之罪奉諭刁民聚衆抗官大干法紀雖有嚴禁重懲之諭並未專設科條是以無所畏憚該部嚴切定例具奏尋議直省刁民因事閧堂塞署逞兇毆官聚衆至四五十人者為首依例斬决仍照强盗殺人例梟示其同謀聚衆轉相紏約下手毆官者雖屬為從其同惡相濟審與首犯無異亦照光棍例擬斬立决其餘從犯照例擬絞監候被脅同行者照例各杖一百如遇此等案件該督撫先將實在情形奏聞嚴拿正犯速訊明確如實係首惡該督撫一靣具題一面將首犯於該地方即行梟斬并將犯事縁由及正法人犯姓名刻示遍貼城鄉俾愚民咸知儆惕如承審官不將正犯究出混指他人為首因而坐罪及差役誣拿平人株連無干者嚴叅治罪該督撫交部嚴加議處從之定僧尼毆弟子及毆受業師分别徒流之例詳見徒流門定親屬相盗援律减等例三法司議奏律載本宗外烟尊長親屬相盗雖無服之親得减一等科罪但三黨内無服尊屬數不勝紀若不明立界限任意推廣於法未免寛縱嗣後親屬相盗除本宗五服以外俱照無服之親定擬外其餘外姻尊長親屬相盗惟律圖内載明者方准照律减等此外不得一概援引并請載入例冊從之定玩冦老師有心貽誤之律奉諭軍旅乃國家第一重務軍法從事成例綦嚴今查律内玩冦老師有心貽誤竟無正條非所以慎重軍務儆戒失律也自應稽查舊案明著刑章著軍機大臣㑹同該部詳酌定議㝷議凡統兵將帥玩視軍務茍圖安逸故意遷延不將實在情形具奏貽誤國事者又凡將帥因私忿娟嫉推諉牽制以致縻餉老師貽誤軍機者又身為主帥不能克敵轉布流言煽惑衆心借以傾陷他人致誤軍機者均屬有心貽誤應擬斬立决從之十四年更定私鑄私銷律舊例私鑄罪犯擬絞監候燬化制錢俱依私鑄例治罪嗣於雍正三年酌定私鑄錢文例將為首者斬决為從者絞决至乾隆六年刑部議覆御史楊朝鼎條奏因私鑄案内有砂殻一種與成字大錢有間將應斬决者改為斬候應絞决者改為發遣至是三法司核擬湖南私鑄砂殻錢文之羅朝倫照例斬候得㫖依議又據福建廵撫潘思榘審擬私鑄銅錢之頼檜斬决刑部等照例題覆奉諭刑部議覆此案與昨所題湖南羅朝倫一案同係私鑄而一擬斬决一擬斬候雖私鑄例内原有銅鉛砂殻之分但條例既殊援引反難畫一議法者轉得髙下其手以出入人之生死若以為斬决之例過重因增出砂殻一條則既同一私鑄何不歸併斬候以從輕比朕意私銷之罪應重於私鑄嗣後私銷照私鑄之例一體研鞫查禁其作何另行妥擬之處著九卿詳悉定議尋議拿獲私鑄之犯不論砂殻銅鉛為首及匠人俱擬斬候為從及知情員使者俱發遣為奴互見徒流門私銷之犯為首者斬决家産入官為從者絞决知情受賄代為隐匿者照為從律治罪此案賴檜改為斬候從之更定滿洲互相毆殺之例舊例滿洲互相殺傷俱擬斬决至雍正年間乃按律以謀殺鬬殺分别斬絞亦即行正法乾隆二年以旗民條例輕重懸殊酌歸畫一俱擬監候至秋審時茍非謀故重情則概入緩决至是以法輕易犯特命概入情實俾旗人咸知儆惕更定民人行竊䝉古牲畜照蒙古治罪律向例凡在䝉古地方游牧居住仍屬内地管束之人行竊蒙古牲畜俱照民人行竊常例枷責完結乾隆七年定察哈爾旗分人等偷竊䝉古馬匹改照扎薩克䝉古行竊依䝉古竊犯例為首絞候抄没為從鞭一百罰三九牲畜治罪蒙古竊馬賊犯本律至乾隆二十四年復經更定詳後偷竊四項牲畜條嗣乾隆十四年三月定呼倫貝爾旗分巴爾虎人等偷竊厄魯特人牲畜五月定船厰打生索倫人等刼竊壯丁牛馬罪俱改依䝉古律定擬至是理藩院奏民人行竊䝉古牲畜亦請照蒙古律治罪奉諭䝉古偷竊民人牲畜治以重罪而民人偷竊䝉古牲畜止從輕枷責殊未平允合將漢人之竊漢人仍照漢人例漢人之竊蒙古照䝉古例著照理藩院所奏將律文更定改定繼母故殺前妻之子律奉諭繼母如母名分甚尊其於前妻之子究無屬毛離裏之愛果其視如己出則子自當事若所生然忿戾殘刻非理凌虐者比比而是皆由法雖設而不行人心無所儆畏故也律載故殺子孫者杖六十徒一年嫡繼慈養母者加一等致令絶嗣者絞律文之以加等治罪正以其與親生者有間當其戕害軀命則子母之恩已絶况致令絶嗣則得罪於其夫得罪於其夫之先代母子夫婦天倫盡癈執國法以繩之固殺人之兇犯耳揆之天理人情毫無可恕朕意子果不孝經官驗明有據則雖繼母不必治以加等及擬絞之罪如其無罪致死則但當治以國法而不復追論其名分其絶嗣擬絞亦但當論其現在之有無子息而不必計其後此之續娶另生凡情罪可惡者以情實定擬與謀故人犯一併正法則慘毒之行有所畏憚庻足以正刑章而厚倫理著大學士九卿定議尋議繼母故殺前妻之子審係撫如己出而其子不孝經官訊驗有據即照父母故殺子孫律分别擬以杖徒不必援照加等之律如伊子本無違犯教令而繼母非理毆殺故殺者除其夫現有子嗣仍依律加等定擬外若現在並無子嗣即照律擬絞監候於秋審時將情罪可惡者入情實冊内請㫖定奪從之定鬬殺案内死罪不准留養之例刑部奏定凡理直傷輕及戲殺誤殺等案照定例遵行外如罪犯實係理曲或金刃重傷及雖非金刃而連毆多傷致死者此為情重之犯雖係親老丁单應於照例聲請時以不准留養議罪定强姦十二歳以下㓜女未成審有確據者發遣黒龍江互見徒流門定姦夫拒捕殺死本夫姦婦仍擬絞監候例刑部議准凡姦夫並無謀殺本夫之心其因本夫捉姦姦夫情急拒捕姦婦已經逃避或本夫追逐姦夫已離姦所拒捕殺死本夫姦婦並未在塲及雖在塲而當時喊救與事後即行首告並因别事起釁與姦無渉者姦婦仍止科姦罪外其姦夫臨時拒捕姦婦在塲并不喊阻救䕶而事後又不首告者應照姦夫自殺其夫姦婦雖不知情律擬絞監候定代賠帑項限滿不完之罪奉諭向來州縣虧空本犯無力完帑將狥隐之革職知府勒限賠𥙷至限内不完例止革職别無治罪之條夫已經革職復議革職不過照例註册虛文從事耳嗣後應代賠之知府限滿不完作何分别治罪之處該部另行定議具奏尋議知府失察屬員虧空及本犯實係因公那移者仍照原例辦理外其知府通同狥隐州縣侵欺倉庫錢糧著落代賠之項若三限已滿未完按其已未完交分數治罪以十分為率如未完之數在五分以内者杖一百至六分者杖六十徒一年每一分加一等十分無完者杖一百徒三年均不准納贖從之互見徒流門増改殺一家非死罪三人律註刑部奏律内凡殺一家非死罪條下查前明箋釋内有謀殺故殺放火行盗而殺皆是之語是鬬毆殺原不在此限但律内未經註明援引恐致錯誤應請於殺字下増註謂謀殺故殺放火行盗而殺字様又律例箋釋一家謂同居雖奴婢雇工人皆是或不同居果係五服至親亦是迨本朝纂輯律文將五服至親四字改為父子兄弟至親六字推原改纂之意或因五服恐為外姻牽混故指明父子兄弟以切本宗也但恐拘牽字義謂父子兄弟而外不得更加旁推則不同居之祖孫伯叔其分誼服制轉不若同居之雇工得為一家矣應請將父子兄弟字樣改為本宗五服至親六字以便遵照引擬從之十六年定尚未成婚聽從殺夫之罪先是刑部核覆四川總督策楞等審擬卭州民婦趙氏孀貧無子因忿夫弟陳琰不相顧恤復詈其絶嗣遂乘琰夫婦逺出哄令琰養媳劉氏幫同殺死琰子元書元格亦欲使絶嗣劉氏不允趙氏嚇逼㸃燈前行手自持刀連砍元書𩕄門斃命又將砍死元格劉氏熄燈扯止趙氏應絞監候援赦劉氏應凌遲處死經御史范廷楷以趙氏起意謀殺無辜劉氏雖同行殺夫尚未成婚且與手刃有間奏駁至是刑部以劉氏知救夫弟而不救夫情難曲宥趙氏謀殺無辜請照本律不准原减恭候欽定覆奏上以劉氏有未婚情節刑部當據此聲明夾簽併諭此案劉氏童年愚稚尚未成婚遽受極刑情殊可憫著改為立斬趙氏情實慘惡著依本律十七年分别留養人犯是否在籍之例奉諭嗣後凡例應留養之犯必察明現在本籍者方准援請若在他省獲罪即屬忘親不孝之人雖與例相符亦不准其留養十八年定斬絞重犯在監行兇致斃人命例凡犯死罪監候人犯在監復行兇致死人命者照前後所犯斬絞罪名從重擬以立决嚴毆差奪犯致斃人命之例時閩粤等省多有刁悍之民遇官差捕犯則聚衆刼奪定例只坐首犯其未傷人者即首犯亦罪不至死上以法輕易犯特諭嗣後各省有毆差奪犯致斃人命者俱著不分首從即行正法其但經聚衆奪犯無論曾否毆傷差役即照因而傷人律從重擬絞若數年後此等案漸少再為酌量降㫖仍復舊例定鬬毆誤殺尊長不准聲請减等之例時安徽廵撫張師載奏阜陽縣民袁大山因伊姊夫趙應恕罵伊姊袁氏併牽及其父母袁大山聽而氣忿遂與趙應恕鬬毆時適昏夜袁氏在趙應恕背後拉勸袁大山暗中失顧用鎗誤扎伊姊身死伊母痛女扎死又懼伊子問罪亦即投繯殞命袁大山應擬斬立决刑部照例夾簽奉諭袁大山著改為絞决此案袁大山因䕶姊誤扎雖並無逞兇犯尊等事但致伊母張氏自戕殞命於理即不得從寛正為好勇鬬狠以危父母者嚴示炯戒嗣後命案中有似此者即情有可原俱不必聲請减等定殺三人以上之案不得照限完結奉諭命案内殺一家非死罪三人者律應凌遲處死即所殺三人中有實犯死罪及三人而非一家者亦擬斬决良以兇殘不法罪浮謀故當立置重典以示炯戒乃按限審轉僅與尋常命案等閭閻日乆漸忘安望其動色相戒且使兇犯或瘐死囹圄竟逃顯戮亦無以慰幽魂於地下嗣後凡殺死三命四命之案督撫速審題達法司即時核覆不得以定限尚寛稽延時日庻國憲重而人心知警不失辟以止辟之意定御駕廵幸地方民人具呈妄控者照衝突儀仗例杖戌互見徒流門定聚衆械鬬一命一抵之例凡聚衆械鬬互殺多命審係各下手致死之人一命一抵俱列入秋審情實冊内請㫖勾决定禁卒賄縱監犯越獄例河南巡撫蔣炳奏宻縣禁卒陳得魁賄縱重犯申珍等越獄審擬絞監候奉諭禁卒典守監獄乃於斬絞重犯受財故縱此非尋常因事受財可比自應按照本律與囚同罪但則例又載有擬絞緩决候逃囚得獲審豁之條未免法輕易犯嗣後監犯脱逃審出禁卒得賄情節即視所縱囚罪全律科斷如本犯應入秋審情實者亦入情實應絞决者亦擬絞决應斬决以上者亦即擬以斬决著為例定旗人跑迷之例向例旗人跑出失迷著該旗止於年底彚奏無議罪定條至是大學士等議准年未至十五者仍照舊辦理查拿外如十五嵗以上俱照逃人例跑迷㓜孩内至十五嵗不自行投回逾十五嵗外即自行投囘亦照逃人例治罪十九年定情罪重大案犯遇停勾另奏之例奉諭停止勾决之年情實案内有紏衆聚匪刼犯辱官及侵蝕虧空各犯與尋常謀故殺等不同若輩予以監候已屬法外之仁使更久稽顯戮地方百姓日逺漸忘非所以肅刑章而示炯戒嗣後停决年分著刑部將情罪重大案犯開具事由另行奏聞請㫖正法更定僧道匠藝故殺弟子之例先是十三年刑部議准僧尼故殺弟子者照故殺大功卑㓜律擬絞監候謀殺已行者依故殺罪减二等已傷者减一等已殺者依故殺律定擬若止毆傷亦照毆傷卑㓜非折傷勿論律勿論折傷以上减凡人三等至死者照毆殺堂姪律杖流至僧尼毆受業師至篤疾者亦照毆大功尊長至篤疾律擬絞監候傷者照毆傷大功尊長律杖徒折傷以上加凡鬬傷一等至是大學士等奏定凡僧尼道士因姦盗别情謀殺弟子者無論已傷未傷已殺未殺悉照凡人分别定擬其有挾嫌逞兇故殺弟子及毆殺内執持金刃兇器非理扎毆致死者亦同凡論匠藝人等致死弟子亦如之申定檢驗不實之例吏部刑部㑹議御史王應綵奏稱檢驗不實之處分宜歸畫一查吏部則例内官員驗屍有傷報稱無傷或打傷砍傷報稱跌傷磕傷者降二級調用傷痕不全報者降一級調用至致命傷痕報出不致命傷痕遺漏或拳傷報稱踢傷之類罪無出入者罰俸一年刑律開載官吏仵作因檢驗而罪有増减者以出入人罪論失出减五等失入减三等罪俱至擬徒同一檢驗不實罪有出入從處分則例則止於降調從律則至於擬徒未免參差互異臣等酌議請嗣後審有受財故檢情弊以致故出入人罪者仍依律問擬外其止於失出失入並無别情仍送吏部照欽定則例分别降調以歸畫一至刑部叅奏審擬之案或有案情重大降調不足以蔽辜者仍聽刑部臨時酌量辦理從之定旗人犯命案罪應軍流者不准概折鞭枷之例詳見徒流門二十年嚴派往拉林旗人逃回之例時以八旗生計艱難特命選派滿洲旗人令往拉林種地諭派往人等如有不肖為匪之徒私逃囘京者該將軍拏獲奏明於彼處正法示衆定僧道毆傷僱工以凡論之例刑部議浙江省僧人顯剛毆傷工人俞章觀身死畏罪燒屍出錢賄和查例載官民之家凡倩工作之人立有文劵議有年限依僱工人論係明指官民之家僧道例無家長僱工之文應同凡論顯剛除畏罪燒屍賄和各輕罪不議外應依鬬毆殺人律擬絞監候從之更定私盗墳塋木石例歩軍統領衙門奏例載凡子孫將祖父墳園樹木砍伐私賣者照違令律治罪私買者同科奴僕盗賣者計贓加竊盗一等治罪盗他人墳園樹木者准竊盗論其盗賣墳塋之房屋碑石磚瓦木植等項均照此例治罪向來立法太輕以致不肖之徒無所顧忌請嗣後墳園樹木除實在乾枯者許具呈該管官查明准其砍伐外如子孫將祖父墳園樹木砍伐私賣一株至十株者杖一百枷號三個月如在十株以上即行充發奴僕盗賣者罪同盗他人墳塋樹木者杖一百枷號一個月其盗賣墳塋房屋碑石磚瓦木植者亦照此例治罪互見徒流門私買者照現議盗他人墳塋樹木例一體治罪所有私砍樹木等物分别入官給主從之至二十八年又奏定凡看墳人等如果受有房地居住代守墳塋歴有年所輙敢盗賣墳主樹木者雖係民人均照奴僕盗賣例辦理酌定外姻尊屬有犯科罪例刑部奏外祖父母與本家期親尊長無異母舅兩姨新改小功服制其中有名稱同而實不同者如繼母之父母兄弟姊妹皆外祖父母舅姨也查新例繼母非理毆故殺前妻之子若現無子嗣即照律擬絞於秋審時入情實冊内請㫖定奪是繼母之不比於親母其義甚明今設有繼母之父母毆故殺其婿前妻之子反得减等徒流則於情法俱乖但律無明文將何適從竊按禮記云親母死於室則為其黨服而不為繼母之黨服是母死而父再娶其繼母之父母兄弟姊妹一切皆以凡論據經可以定例也請嗣後凡於母黨有犯除親母嫡母本生母黨屬仍照服制定擬外其餘均同凡論著為例從之二十一年定旗下家奴告主徒滿後仍賣為奴之例向例旗下家奴告主徒罪限滿之後仍給還原主管理至是大學士等奏准奴僕告主嫌釁既開仍還原主恐挾嫌凌虐或該奴積怨愈深轉致釀成事端若令回旗竟與開户為民者無别亦非懲治之道嗣後應交與各該旗照例官賣仍令為奴價給原主詳見徒流門二十二年申定金刃扎傷本官即行正法之例定例金刃扎傷本管官者斬决仍定限保辜其限内死者該犯妻子發遣傷痕平復者妻子免遣至是大學士等議奏保辜之限專為該犯妻子發遣免遣之分與該犯毫無干渉若俟保辜限滿始行題達轉令兇犯得以茍延時日請嗣後遇有此等犯案刑部即將本犯具題正法於本内聲明俟保辜限滿再將該犯妻子照例分别辦理從之定秋審官犯行刑之例奉諭官犯審題結案在該省行刑之日以前者皆𥙷疏題請或情實或緩决其情實予勾即行刑之日已過亦著行刑其在行刑以後審結者乃入下年冊内禁止隆冬停訟定例每年四月至七月農忙停訟至隆冬原無不收呈詞之例而外省相沿亦行停訟至是奉諭嗣後除農忙停訟外不得再沿隆冬停訟之陋習應准理者即行准理應完結者即行完結以免稽滯二十三年更定審擬私鑄人犯例大學士等議覆刑部奏請嗣後外省私鑄銅錢案犯亦照私鑄鉛錢例核其錢數至十千以上並雖不及十千而私鑄不止一次後經發覺者秋審時一併列入情實請㫖勾决其偶然偷鑄錢文數不及十千並鑄造未成旋即畏罪中止者情有可原列入緩决若但將伊等照常監禁仍無以昭炯戒應如所請將私鑄案内情輕緩决之犯照强盗免死减等例改發巴里坤種地効力從之互見徒流門定絞犯秋審三次緩决减等發遣之例刑部議定嗣後朝審秋審案内搶竊滿貫及三犯竊贓數至五十兩以上問擬絞候之犯查明緩决三次者均照强盗免死减等發遣例改發雲貴兩廣極邊烟瘴充軍其年老有疾者仍入秋審具題互見徒流門停止侵虧官犯限内完贓之例定例侵貪官犯按律問擬之後勒限追比若於限内完贓者分别减免乾隆六年以侵貪之案漸多該犯於應完贓欵之外仍得以未盡敗露之私贓飽其囊槖特將情罪較重者陸續發往軍臺効力至是奉諭限内完贓發往軍臺効力此雖向例但思完贓减等之例實屬未協茍其因公那移尚可曲諒若監守自盗肆行無忌豈可以贓完限内遂從未减耶且律令之設原以防奸匪以計帑或謂不予减等則孰肯完贓是視帑項為重而弼教為輕也使人果知犯法在所不赦孰肯以身試法其所全當更多耳嗣後除因公那移及倉榖霉浥情有可原等案仍照舊例外所有實係侵虧入已者限内完贓之例著永行停止嚴旗人結交為匪浙江廵撫楊廷璋奏民人陳老元等商謀欲將曹大章等容隐逆黨等詞冩作匿名掲帖而董老九即穆克德納即行書冩貼於各衙門墻壁請將董老九解部發往黒龍江等處當苦差奉諭董老九即穆克德納係旗下世僕乃妄稱匪名又與奸民交結傾䧟平人匪惡已極非尋常犯法者可比著交該管大臣𫝊集該處旗人即行正法俾共知懲創穆克德納之敢於肆行至此者皆因伊父不教訓約束所至罪亦難遣所有穆克德納之父並伊妻子俱發往黒龍江賞給披甲人為奴並𫝊諭八旗嗣後敢似此肆意妄行者必照此辦理申定命案獨子之例刑部議覆署福建廵撫楊應琚奏郭端毆黄睿身死擬絞監候聲請留養奉諭留養之例乃法外之仁必該犯實係理直或誤傷致斃既有一線可原始得邀恩末减若尋常鬬毆曲為開脱於定律之義何居此宜照例定罪秋審時自在可矜之列是其監禁不過一二年之間而定案之初犯者尚知情罪可凖俾好勇之風因而少戢則閭閻寧而致斃者鮮所全實多又何必於理宜監禁一二鬬狠之人曲為開脱若以該犯身係獨子不宜覊於囹圄即出之囹圄此等敗類亦難責以盡心孝養也且一年之後原屬矜免何必亟亟耶將此通行曉諭俾司憲者知臨事檢核一歸平允副朕明刑弼教之至意至二十七年六月大學士九卿遵㫖議准嗣後親老丁单及孀婦獨子留養之犯除實係戲殺誤殺並無鬬毆情形該督撫仍照例於題本内聲請留養法司隨案核覆外其鬬殺之案概令督撫於定案時止將應侍縁由於題本内聲叙不必分别應准不應准字樣統俟秋審時取結報部刑部㑹同九卿核擬入於另冊進呈恭候欽定更定部民軍士吏卒犯上之例刑部議覆湖北廵撫莊有恭奏律載吏卒謀殺六品以下長官并佐貳首領官各依凡論之條不得其平請照軍士謀殺本管官律問擬查部民謀殺本屬長官軍士謀殺本管官吏卒謀殺本部五品以上長官已行者流二千里已傷者絞已殺者皆斬本註内吏卒謀殺六品以下長官并佐貳首領官各依凡論又吏卒毆六品以下長官各减毆五品以上三等此原定之律文也例載因事聚衆將本管及監臨官毆打綁縳者不分首從發極邊充軍此舊有之成例也乾隆十二年定直省刁民因事閧堂塞署逞兇毆官至四五十人者為首照强盗例斬决梟示同惡相濟轉相紏約下手毆官者照光棍例斬决為從者絞候又例載軍民人等毆死在京現任官員照毆死本管官律斬候謀殺者斬决八旗兵丁不服管教將本管官戳死者若閑散及䕶軍披甲人記讐將該管官動兵刃致傷者本犯即行正法此現行之則例也現在辦理毆傷本官之案俱照現行則例擬罪特未明著科條應請嗣後直省部民軍士吏卒有犯罪在官不服據拿審斷或挾讐逞兇殺害本官者拿獲之日無論本官品級及有無謀故等情審明已殺者不分首從皆斬立决已傷者為首照光棍例斬决為從下手者絞候其聚衆逞兇者仍照定例分别首從科罪餘非本屬本管本部各官有犯並該管官恃有嚴例任意凌虐及不守官箴自取侮辱者各案其情罪輕重臨時酌量分别比引辦理從之定嘓匪結黨輪姦及白晝搶奪例刑部議覆四川按察使呉士端奏言四川省嘓匪結黨成羣輪姦行路婦女白晝搶奪塲市貨物較他省為甚應如所請嗣後遇有輪姦之案審實俱照强盗律不分首從皆斬但經同行尚未同姦者仍依本律絞候因而殺死人命者無論成姦與否俱照强盗殺人例奏請斬决梟示至嘓匪搶奪窮兇極惡僅照尋常律例辦理無以示儆請嗣後嘓匪止一二人在曠野攔搶者分别首從該犯徒罪以上者俱發巴里坤等處種地其有川省嘓匪潛逃近省仍行結黨犯法即照新例嚴行懲治從之互見徒流門二十四年申定罪人拒捕刃傷條例凡罪人拒捕刃傷捕捉之人除姦盗罪犯依例照折傷以上擬絞立决外其餘罪人拒捕如毆所捕人至折傷及殘廢篤疾在折傷以上均依律絞候其但係刃傷仍照律加本罪二等問擬申明詐假官假與人官律浙江省秋審招冊内將偽造憑照誘買假官之王星瞻按律擬斬而受買頂冒之童汝德照例擬軍上以情罪未協特覽本律原文諭曰律載凡詐假官假與人官者斬可謂櫽括明切乃自律註日増而律意轉晦司讞者因註語而誤㑹本律又輾轉引用他例遂至强生支節輕重懸殊即如詐假官者即童汝德也假與人官者即王星瞻也今一事兩岐皆因例註滋繁轉易啟髙下其手之弊其所闗於王章民命者甚鉅然同一假官其中情狀亦自不同有假充冒頂止圖為鄉里光榮者有冒稱職官而意在圖騙一人行一事者并有冒名赴任欲臨民用事如童汝德之藐視憲典者若非分别等差精研釐正則當輕而重如民命何當重而輕如王章何其非弼教之意均也所有本條應酌議畫一之處刑部分别定議尋議一偽造憑劄自為假官者偽造憑劄并將有故官員憑劄賣與他人者及買受憑劄冒名赴任者俱擬斬監候知情説合者杖一百流三千里一凡無官而詐稱有官并冒稱現任官員姓名并未造有憑劄止於圖騙一人行一事犯在徒罪以下者發邊衛充軍軍流罪者擬絞監候一假冒頂𢃄自稱職官止圖鄉里光榮無所求為亦無憑劄者杖六十徒一年假冒生監頂𢃄者杖一百從之互見徒流門申定為人後者於本生期功親屬有犯之例江西按察使亢保奏律載為人後者為本生親屬服皆降等服降則罪亦宜降應否與本身親屬有犯照所後服制律分别定擬又查毆期親尊長律注云兄弟雖為人後姊妹雖出嫁降服其罪亦同若出繼之兄毆弟者依現服制科斷又毆大功以下尊長律注云族兄出繼族姊出嫁不作無服是否卑㓜犯尊長俱按本服尊長於卑㓜悉依現服敇下部議尋議律載為人後者為本生親屬降服而不復立有犯科條葢服定則罪定無庸複贅也自律註措詞既不賅備引用遂多疑義應請嗣後為人後者如於本生祖父母父母有犯仍照所後服制定擬外其伯叔兄弟以下均依律圖降一等科罪尊長之於卑㓜亦如之律註二則均請刪除從之更定偷竊四項牲畜條例定例凡䝉古搶奪駝馬牛羊因而殺人者擬斬立决傷而未死者擬斬監候所竊牲畜數少情無可惡者首犯擬絞監候秋審時减等併妻子賞給効力之台吉為奴從犯鞭一百罰三九牲畜上以此等慣行偷竊之徒减等放出勢必仍行偷盗特諭刑部㑹同理藩院詳議尋議嗣後蒙古人等除搶奪四項牲畜殺人及傷人者仍照舊例辦理外如偷盗四項牲畜滿十匹以上者首犯擬絞監候秋審時入於情實其偷盗九匹以下者並計匹數多寡分别烟瘴邉逺附近等處發交驛地當苦差其民人在䝉古地方偷竊九匹以下者俱照此例一體分别充軍為從人犯照定例行并奏請行圍廵幸地方如有偷竊馬匹者不分䝉古民人五匹以上擬絞立决四匹以下分别發往烟瘴邉逺等處地方充軍俱交驛地當苦差為從及知情故買者係民人减本犯一等係䝉古仍照䝉古辦理從之互見徒流門申定白契奴婢及年限僱工有犯之條凡白契所買奴婢如有殺傷家長及家長緦麻以上親者均照紅契奴婢一體治罪家長殺奴婢仍分紅白契辦理凡僱倩工作之人除典當家人及𨽻身長隨有犯俱照定例治罪外其立有文契年限及雖無文契而議有年限或計工受值已閲五年以上者於家長有犯均依僱工人定擬若隨時短僱受值無多者仍同凡論二十五年定獄囚衣制刑部議覆山東按察使沈廷芳條奏嗣後斬絞軍流重犯覊禁在監以及解審發遣俱給衣赭色布服與鎻杻互為標示易為識認弗致有疎脱漏網之虞應如所請通行從之申定隣佑毆斃賊人之例河南按察使蔣嘉年奏隣佑因聞事主聲喊失竊前往協捕將賊人毆打至死者例内未設専條向例多比照罪人不拒捕而擅殺以鬬殺論擬絞監候似覺情輕法重請照减鬬殺二等例定擬刑部遵㫖議覆嗣後除賊犯持杖拒捕捕者格殺之不問事主隣佑俱照律勿論外如有携贓逃遁隣佑人等直前追捕倉猝毆斃或賊勢强横不能力擒送官以致毆打戕命者照事主毆打至死减鬬殺罪二等例杖一百徒三年互見徒流門若業已拿獲輙復叠毆或捕人多於賊犯倚衆共毆及恃强逞兇致斃者仍照罪人不拒捕而擅殺律定擬共毆之餘人仍照律杖一百從之定代刻假印審明是否同謀分贓之例凡起意偽造印信除自行雕刻照律擬斬監候外其他人代為雕刻審係同謀分贓者將起意與雕刻之人並擬斬監候為從减等擬流若僅受些微價值代為私雕並無同謀分贓者以為從論互見徒流門其誆騙財物銀不及十兩錢不及十千罪應擬流者亦將雕刻之人審明是否同謀分贓分别首從辦理定解役開放鎻杻致重犯脱逃例凡押解斬絞重囚在途開放鎻杻致本犯脱逃未獲者即將解役究審定擬嚴行監禁俟拿獲逃犯之日究明賄縱情節即照本犯罪名一律全科如果僅係疏脱並無别故仍照例發落申定罪人拒捕條例先是二十四年刑部奏定凡官司差人捕獲罪人有聚衆中途打奪毆差致死者為首斬决為從下手致命者絞决其傷差未致死者首犯照例絞候但經聚衆奪犯雖未傷人亦照因而傷人例從重擬絞餘仍照律分别坐罪若數年後此風稍息請㫖仍照舊例遵行其非聚衆及不於中途打奪者各按本律註分别辦理至是廣東按察使來朝奏罪人在家毆差奪犯傷人至死僅擬絞候未足蔽辜請酌更條例事下兩廣總督李侍堯詳議尋議凡罪人在家拒捕如造意糾集兇黨至三人以上均係持械下手共毆者不論殺人傷人俱照中途打奪現行定例分别首從治罪其並未糾酌聚衆僅因一時争鬬拒毆致弊人命者俱照本律分别擬議設係有心欲殺究明謀故確情除有罪本犯自行殺傷仍坐以罪人拒捕律外若本犯無罪及非所勾攝人係謀殺按照本律分别首從擬議係故殺為首應斬監候為從下手者發邊衛充軍部議應如所請從之定停止彚奏枷號人犯分别能否改悔之例舊例永逺枷號人犯大理寺於嵗底分别能否改悔彚奏一次上以既經枷號拘管即欲復蹈前轍亦所不能又何從知其改悔與不改悔不過該管各官奉行故事無禆實政特諭嗣後彚奏時止將各犯原案罪由摘叙摺内其分别改悔之例着停止更定解役疎脱重囚例刑部議奏疎脱重囚與故縱有别律例所載各按所犯輕重有减囚罪二等者亦有罪止滿杖者勒限緝拿限内能自捕得及他人捕得俱准免罪未免法輕易犯請嗣後押解斬絞重犯除受賄狥情故縱依新例照禁卒賄縱罪囚辦理外其違例雇替托故潛回無故先後散行止留一人押解者改照故縱律與囚同罪不准照舊减罪囚二等問擬果係依法管解偶致疏脱審有確據者除依律治罪外仍勒限緝拿他人捕得亦不准寛免從之増定狥隐私鑄鉛錢之例刑部議覆廣東按察使來朝條奏查私鑄銅錢房主隣佑甲長俱有分别治罪専條而私鑄鉛錢定例惟有里長知而不首者杖一百不知者不坐之文其房主隣佑未經詳及應如所請嗣後私鑄鉛錢之案如有夥衆開爐鑄至十千以上者房主隣佑十家長知而不首俱杖八十徒二年互見徒流門失於查察者杖八十其實係窮鄉僻壤隣里較逺或空房别舍誤借匪人不及查察者方准依例以不知科斷從之定犯人假冒土苖例凡苗民錯處之地該犯有供認土苗者於定案時飭取地保各結如流徒軍遣等犯揑稱土苗者各依本律發配外先於本犯地方枷號一月其揑結之隣保照例分别治罪至二十八年刑部覆准廣西按察使伯琨條奏土苗斬絞重犯亦令承審官取具地保里隣切實甘結以杜假冒土苗之弊申定賭博􅌪娼及僧道犯姦條例山東按察使沈廷芳條奏三事一壓寳誘賭者將掌盆及同賭之人悉照開塲賭博例一體治罪一生監兵役人等如有窩頓土娼誑誘平人出身架䕶者悉照窩賭治罪如係偶然存留為日無幾枷號三月杖一百若日月經久者杖徒再犯者杖流其有得受娼家財物者仍准枉法計贓從重論一僧道尼僧女冠犯姦係和姦者照軍民相姦律加一等於本寺觀菴院門首枷號兩月杖一百其犯有夫之婦及刁姦者分别杖徒仍於本寺觀菴院門首枷號兩月部議應如所請從之互見徒流門皇朝文獻通考卷一百九十九
