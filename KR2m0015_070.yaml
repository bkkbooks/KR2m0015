雖未設學而苗民繁庶頗知向學請擇其文理明順者量取一二名附入府學苗童之後以示鼓勵部議應如所請從之定順天大興宛平二縣童生考試送府之例學臣吳應棻疏言定例嵗科兩試文武童生先由本縣考取造册送府該府再行考試惟大興宛平兩縣童生向例止慿審音並不衡文以定去取嗣後請照例由縣審音再行考試造册送府庶例歸畫一而假冒頂替之弊亦可永除部議應照所請從之增設福建福寧府等處儒學教官時總督郝玉麟請改福寧州為福寧府設府學教授一員附郭新置一縣曰霞浦設訓導一員其福州府所屬之古田縣雙溪地方新置一縣曰屏南設訓導一員其泉州所屬之永春縣改為直𨽻永春州漳州所屬之龍巖縣改為直𨽻龍巖州二州教諭俱改為學正其訓導仍舊定江蘇江都等縣取進儒童額時江都新分甘泉縣山陽鹽城新分阜寧縣𣲖取江都文生十三名武生八名甘泉文生十二名武生七名山陽鹽城兩縣文生各十九名武生各十一名阜寧文生十二名武生八名增定奉天府復州等學官及廩增出貢文武生童入學之例復州設學正一員文武童生各取進八名廩增各五名三年一貢寧海縣置教諭一員義州置學正一員取進文武童生各四名廩增各二名五年一貢永吉州長寧縣向𨽻順天府相隔俱八九百里司教者難以督課今於永吉州添設學正一員專司董率其長寧縣生徒就近兼管復設河南南召縣學以南陽縣訓導管理學務增定江蘇徐州府銅山縣取進儒童額數及廪增出貢之例徐州改州學為府學取進文武童生各二十名廪增各四十名俟十二年後挨次一年一貢新設銅山縣學取進文武童生各十五名廩增各二十名照例二年一貢更定河南陳州等府縣學教官改陳州許州皆為府各設府教授一員其陳州府新設附郭縣曰淮寧許州府新設附郭縣曰石梁並以二州舊設訓導為訓導申嚴各省生童因事罷考之禁時各省生童往往因與地方有司爭競齟齬相率罷考奉諭嗣後如果該地方官不公不法凌辱士子許令生童等赴該上司衙門控告秉公剖斷倘不行控告而邀約罷考即將罷考之人停其考試若合邑合學罷考即全停考試定湖南永順府縣各學官及生童入學額數時以永順設府分縣以來人文日盛於府城內建立考棚設教授一員所屬永順龍山保靖桑植四縣各設訓導一員府學取進文武童生各十二名縣學各取進八名其永順縣有永定衛歸併户口桑植縣有慈利縣歸併户口俱附澧州考試今俱改歸永順即於永順桑植二縣額設八名內取二名入學更定四川夔州府等處儒童入學之例夔州府原屬之達州改為直𨽻州原屬之梁山縣撥入直𨽻忠州管轄夔州府學取進童生原額內酌撥六名以二名歸直𨽻達州以四名歸梁山縣增置順天府新設直𨽻等州儒童入學額數學臣吳應棻疏言保定正定二府屬業經改設直𨽻等州請於保定府學取進文武童生原額內減取三名以二名歸易州一名歸定州正定府學原額內減去九名以三名歸冀州三名歸趙州二名歸深州一名歸定州禮部議覆正定府學額內祗酌量減去七名冀趙二州各撥歸二名以均多寡得旨改設直𨽻各州應增入學額數著照該學政所請行其府學文武童生仍照原額取進不必裁減改山東大嵩成山二衛學為縣學更定取進儒童及廩膳生員額數時以河東總督王士俊疏言改大嵩成山二衛為二縣大嵩曰海陽成山曰榮城設教諭各一員其靖海衛童生附海陽縣考試威海衛童生附榮城縣考試各取進十六名增設廩生二十名裁改山東鰲山雄崖等衛所學歸併州縣鰲山衛及雄崖浮山二所改歸即墨縣管轄靈山衛改歸膠州管轄其原設教授裁去取進儒童學額照舊籍原設名數各於所歸州縣取進增設廣西崇善縣學廩增生員各四名至十三年定太平土州西林縣學廩增額數亦照例行更定山西蒲州等處府學儒童取進額數蒲州澤州二府學取進文武童生各十五名裁平陽府學原額取進童生二名歸蒲州府學額又裁太原府學原額取進童生三名以一名歸蒲州欣州二名歸直𨽻代州增定廣西鬱林直𨽻州學取進儒童額數以梧州府學原額取進文童五名武童三名撥入增定直𨽻宣化府等處州縣儒童入學額數諭內閣畿輔為天下首善之地是以各府州縣童生入學額數昔年曽加恩增添以示鼓勵惟宣化府屬之蔚州從前原𨽻山西廣平府屬之磁州從前原𨽻河南及改歸直𨽻之後其入學仍照晉豫原額未與直𨽻一體邀恩又新從山西改歸易州管轄之廣昌縣入學之數尚不及直𨽻小縣此兩州一縣均當酌議加增每遇鄉試之年宣化府屬另立旦字號與奉天府屬夾字號額數相同各取中三名今宣郡人材較前漸盛又添蔚州一屬應舉人數加多查夾字號前已廣額二名則旦字號亦應加增中式之數著禮部定議具奏尋覆準蔚州磁州照直𨽻大州縣入學額數每州於原額十五名外加增三名額進文童十八名廣昌縣照直𨽻小縣入學額數於原額八名外加增二名額取文童十名十三年諭內閣定例文武生員不準入伍食糧聞陜甘兵丁內有文武生員現充營伍而延綏一鎮竟至六十餘名之多在文武生員名列膠庠各應専心舉業嫻習技藝以圖上進豈可又挂名營伍其已經入伍之兵粗知文義願應考試者原有準入武場一體鄉試之例不必又附名學校若以一身而兼顧兩途必且互相牽制轉致兩誤著通行陜甘各提鎮將兵內之文武生員查明革糧令其歸學如有情願革去生員當兵食糧者即行知該學政除名準留營差操并飭行各將辨嗣後文武生員一槩不許濫收入伍將此通行各省知之更定湖南澧州等處儒童入學額數時嶽州府屬之澧州衡州府屬之桂陽州俱改為直𨽻州以嶽州府屬原額取進文武童生各五名歸澧州以衡州府學原額取進文武童生各三名歸桂陽州更定安徽六安州等處儒童入學額數時廬州府屬之六安州鳯陽府屬之泗州頴州亳州俱改為直𨽻州以廬州府學原額取進文童三名武童二名歸六安州以鳯陽府學原額取進文童五名以二名歸泗州二名歸頴州一名歸亳州更定河南陕州等處儒童入學額數河南府之陕州汝寧府之光州俱改為直𨽻州以河南府學原額取進文童三名武童六名歸陕州以汝寧府學原額取進文童四名歸光州更定陕西耀州等處儒童入學額數西安府屬之耀州同州華州乾州延安府屬之鄜州鞏昌府屬之秦州俱改為直𨽻州於西安府學原進文童額內以三名分歸耀州同州華州二名歸乾州原進武童額內以一名歸乾州屬之武功縣於延安府學原進武童生額內各以三名歸鄜州於鞏昌府學原進文武童生額內各以三名歸秦州更定四川苗民入學例學臣隋人鵬條奏川省苗民久經向化嗣後苗童有讀書向上者準與漢民文武童生一體考試於各學定額內慿文去取卷靣不必分漢苗字樣部覆應如所請從之增奉天永吉州學廩增生及按年出貢例舊設廩增各一名今以長寧縣學歸永吉州管轄改設廩增各一名五年出貢一次以貴州可渡河南界生童歸雲南宣威州學考試時以威寧州所屬宣化里可渡河之田地户口俱經改歸雲南宣威州管轄增定江蘇太倉等州儒童入學額數蘇州淮安揚州三府分設太倉通海三州於蘇州府學額內以文童五名武童三名歸太倉州於揚州府學額內以文童五名武童三名歸通州於淮安府學額內以文童二名武童三名歸海州設臺灣府彰化縣學廩增生員彰化設學已久文風日盛議準額設廩增各十名十年後出貢一名嗣後四年一貢俟人文加盛之日再照縣學之例題增廩額并二年出貢一名以山東曹州泰安兩州學為府學更定教職等官時改曹州為曹州府泰安州為泰安府各置府教授一員其原設州訓導俱改為二府附郭新縣訓導改山東武定沂州兩州學為府學設廩增生各四十名取進文武童生各二十名一年一貢其新設附郭之惠民蘭山縣學設廩增各二十名取進文武童生各十五名二年一貢更定安徽鳯陽府屬之夀州新分鳯臺縣各學生員額數州學取進文生十二名縣學取進八名州學取進武生九名縣學取進六名州學準其額定廩增各十八名縣學廩增額定各十二名州學二年一貢縣學三年一貢皇朝文獻通考卷七十
