body:
  text: 欽定四庫全書皇朝文獻通考卷一百四十二王禮考十八皇太后皇后妃嬪首飾服章制度福晉以下至命婦附臣等謹按周禮內司服掌王后及內外命婦之服其别有禕衣揄翟鞠衣展衣緣衣素沙追師掌王后之首飾其别有副編次追衡笄漢制太皇太后皇太后入廟服紺上皂下蠶服青上縹下皆深衣制而首飾則有假紒步搖簮珥之名魏晉以降首飾有䥖有花叉以多少為品秩隋制皇后服四等褘衣鞠衣之外别有青衣朱衣唐制命婦之服自翟衣而外别有禮衣公取半袖裙襦大袖連裳之類宋制皇后常服有龍鳳珠翠霞帔蓋厯代之制不同如此誠以損益因乎時毋取沿襲也國朝定制皇太后皇后冠服有朝服吉服二等金約領約朝珠綵帨皆有制度皇貴妃以下及公主諸王福晉命婦各以品秩為差等今據皇朝禮器圖式具載於左皇太后皇后朝冠冬以薰貂為之夏以青絨為之上綴朱緯頂三層貫東珠各一皆承以金鳳飾東珠各三珍珠各十七上銜大東珠一朱緯上周綴金鳳七飾東珠各九貓睛石各一珍珠各二十一後金翟一飾貓睛石一小珍珠十六翟尾垂珠五行二就中間金銜青金石結一飾東珠珍珠各六末綴珊瑚冠後護領垂明黃縧二末綴寶石青緞為帶皇太后皇后吉服冠皇貴妃貴妃同薰貂為之上綴朱緯頂用東珠皇太后皇后金約鏤金雲十三飾東珠各一間以青金石紅片金裏後繫金銜緑松石結貫珠下垂五行三就中間金銜青金石結二每具飾東珠珍珠各八末綴珊瑚皇太后皇后耳飾左右各三每具金龍銜一等東珠各二皇太后皇后朝褂妃皇貴同色用石青緞紗單夾惟其時片金緣領後垂明黃縧繡文或前後立龍各二襞積四層相間上為正龍各四下為福夀文或前後正龍各一要帷行龍四中有襞積下幅行龍八或前後立龍各二中無襞積下幅八寶平水皇太后皇后朝袍妃皇貴同色用明黃緞紗單夾惟其時披領及袖俱石青片金緣冬加海龍或紫貂緣上下襲朝褂處亦加緣領後俱垂明黃縧繡文或金龍九間以五色雲中無襞積下幅八寶平水或前後正龍各一兩肩行龍各一要帷行龍四中有襞積下幅行龍八或中無襞積繡行龍下為八寶平水披領俱行龍二袖端俱正龍各一袖相接處俱行龍各二皇太后皇后龍褂色用石青棉夾紗裘惟其時繡文五爪金龍八團兩肩前後正龍各一襟行龍四或加繡下幅八寶立水袖端行龍各二皇太后皇后龍袍色用明黃領袖俱石青棉夾紗裘惟其時繡文或金龍九間以五色雲福夀文或五爪金龍八團兩肩前後正龍各一襟行龍四下幅俱八寶立水領前後俱正龍各一左右及交襟處俱行龍各一袖俱如朝袍皇太后皇后領約鏤金為之飾珠十一間以珊瑚兩端垂明黃縧二中各貫珊瑚末綴緑松石各二皇太后皇后朝珠朝服御朝珠三東珠一珊瑚二吉服朝珠一隨所御佛頭記念背雲大小墜雜飾各隨其宜縧皆明黃色皇太后皇后綵帨妃皇貴同緑色繡文為五穀豐登佩針管縏袠之屬縧皆明黃色皇太后皇后朝裙以皇貴妃下並同上用織文紅緞下用石青行龍粧緞皆正幅有襞積夏以紗為之片金緣冬加海龍緣皇貴妃朝冠冬以薰貂為之夏以青絨為之上綴朱緯以貴妃下制皆同後不具載頂三層上銜大珍珠一翟尾垂珠三行二就中間金銜金青石結飾東珠珍珠各四餘如后皇朝冠之制皇貴妃金約同貴妃鏤金雲十二飾東珠各一間以珊瑚紅片金裏後繫金銜緑松石結貫珠下垂三行三就中間金銜青金石結二每具飾東珠珍珠各六末綴珊瑚皇貴妃耳飾同貴妃左右各三每具金龍銜二等東珠各二皇貴妃龍褂貴妃妃同色用石青棉夾紗裘惟其時繡文五爪金龍八團兩肩前後俱正龍襟及袖端俱行龍下幅八寶立水皇貴妃龍袍色用明黃領袖俱石青棉夾紗裘惟其時繡文金龍九間以五色雲福夀文下幅八寶立水領前後正龍各一左右及交襟處行龍各一袖端正龍各一皇貴妃領約鏤金為之飾珠七間以珊瑚兩端垂明黃縧二中各貫珊瑚末綴珊瑚各二皇貴妃朝珠朝服用朝珠三蜜珀一珊瑚二餘如珠之皇后朝制貴妃朝冠護領垂金黃縧二餘如冠皇貴妃朝之制貴妃朝褂嬪妃同領後垂金黃縧餘如褂之皇后朝制貴妃朝袍同妃色用金黃領後垂金黃縧餘如袍之皇后朝制貴妃龍袍同妃色用金黃餘如袍皇貴妃龍之制貴妃領約嬪妃同縧用金黃色餘如約皇貴妃領之制貴妃朝珠同妃縧用金黃色餘如珠皇貴妃朝之制貴妃綵帨緑色繡文為五穀豐登結佩惟宜縧皆金黃色妃朝冠頂二層貫東珠各一皆承以金鳳飾東珠共九珍珠各十七上銜貓晴石朱緯上周綴金鳳五飾東珠各七珍珠各二十一後金翟一飾貓晴石一小珍珠十六翟尾垂珠三行二就中間金銜青金石結一飾東珠珍珠各四末綴珊瑚冠後護領垂金黃縧二末綴寶石青緞為帶妃吉服冠同嬪薰貂為之上綴朱緯頂用碧䃁㺨妃金約鏤金雲十一飾東珠各一間以青金石餘如金皇貴妃約之制妃耳飾右右各三每具金龍銜三等東珠各二妃緑帨緑色繡文為雲芝瑞草結佩惟宜縧皆金黃色嬪朝冠頂二層貫東珠各一皆承以金翟上銜􅷨子朱緯上周綴金翟五飾東珠各五珍珠各十九後金翟一飾小珍珠十六垂珠中間金銜青金石結飾東珠珍珠各三餘如之妃朝冠制嬪金約鏤金雲八垂珠中間金銜青金石結二每具飾東珠珍珠各四餘如之妃金約制嬪耳飾左右各三每具金龍銜四等東珠各二嬪朝袍用香色餘如之貴妃朝袍制嬪龍褂色用石青棉夾紗裘惟其時繡文兩肩前後正龍各一襟䕫龍四嬪龍袍用香色餘如袍皇貴妃龍之制嬪朝珠朝服用朝珠三珊瑚一蜜珀二餘如之貴妃朝珠制嬪綵帨緑色不繡花文結佩惟宜縧皆金黃色皇子福晉朝冠親王福晉固倫公主同頂鏤金三層飾東珠十上銜紅寶石朱緯上周綴金孔雀五飾東珠各七小珍珠三十九後金孔雀一垂珠三行二就中間金銜青金石結一飾東珠三末綴珊瑚冠後護領垂金黃縧二末亦綴珊瑚青緞為帶皇子福晉吉服冠下至輔國公夫人鄊君並同薰貂為之上綴朱緯頂用紅寶石皇子福晉金約親王福晉固倫公主同鏤金雲九飾東珠各一間以青金石紅片金裏後繫金銜青金石結貫珠下垂三行三就中間金銜青金石結二每具飾東珠珍珠各四末綴珊瑚皇子福晉耳飾下至輔國公夫人鄊君並同左右各三每具金雲銜珠各二皇子福晉朝褂下至郡王福晉縣主並同色用石青片金緣繡文前行龍四後行龍三領後垂金黃縧皇子福晉朝袍下至郡主福晉縣主並同用香色披領及袖俱石青片金緣冬加海龍緣肩上下襲朝褂處亦加緣領後俱垂金黃縧繡文前後正龍各一兩肩行龍各一襟行龍四披領行龍二袖端正龍各一袖相接處行龍各二皇子福晉吉服褂色用石青繡五爪正龍四團前後兩肩各一皇子福晉蟒袍下至郡王福晉縣主並同用香色通繡九龍皇子福晉領約下至郡王福晉縣主並同鏤金為之飾東珠七間以珊瑚兩端垂金黃縧二中各貫珊瑚末綴珊瑚各二皇子福晉朝珠下至郡王福晉縣主並同朝服用朝珠三珊瑚一蜜珀二吉服用一縧皆金黃色皇子福晉綵帨下至郡王福晉縣主並同月白色不繡花文結佩惟宜縧皆金黃色親王福晉吉服褂世子福晉固倫公主和碩公主郡主並同色用石青繡五爪金龍四團前後正龍兩肩行龍世子福晉朝冠和碩公主同頂鏤金二層飾東珠九朱緯上周綴金孔雀五飾東珠各六不飾珍珠餘如冠皇子福晉朝之制世子福晉金約和碩公主同鏤金雲八餘如約皇子福晉金之制郡王福晉朝冠郡主同頂鏤金二層飾東珠八朱緯上周綴金孔雀五飾東珠各五後垂珠中間金銜青金石結不飾珠餘如世子福音朝冠之制郡王福晉金約郡主同垂珠中間金銜青金石結不飾珠餘如世子福晉金約之制郡王福晉吉服褂縣主同色用石青繡五爪行龍四團前後兩肩各一貝勒夫人朝冠縣主同頂鏤金二層飾東珠七金孔雀飾東珠各三餘如郡王福晉朝冠之制貝勒夫人金約縣主同鏤金雲七餘如郡王福晉金約之制貝勒夫人朝褂下至輔國公大人鄉君並同繡四爪蟒領後垂石青縧餘如褂皇子福晉朝之制貝勒夫人朝袍下至輔國公夫人鄉君並同藍及石青諸色隨所用繡四爪蟒領後垂石青縧餘如袍皇子福晉朝之制貝勒夫人吉服褂郡君同色用石青前後繡四爪正蟒各一團貝勒夫人蟒袍下至輔國公夫人鄉君並同藍及石青諸色隨所用通繡九蟒貝勒夫人領約下至輔國公夫人鄉君並同縧用石青色餘如約皇子福晉領之制貝勒夫人朝珠下至輔國公夫人鄉君並同縧用石青色餘如珠皇子福晉朝之制貝勒夫人綵帨下至輔國公夫人鄉君並同縧用石青色餘如帨皇子福晉綵之制貝子夫人朝冠郡君同頂鏤金二層飾東珠六餘如貝勒夫人朝冠之制貝子夫人金約郡君同鏤金雲六餘如貝勒夫人金約之制貝子夫人吉服褂郡君縣君同繡四爪行蟒餘如貝勒夫人吉服褂之制鎮國公夫人朝冠縣君同頂鏤金二層飾東珠五餘如貝勒夫人朝冠之制鎮國公夫人金約縣君同鏤金雲五餘如貝勒夫人金約之制鎮國公夫人吉服褂輔國公夫人鄉君同色用石青繡花八團輔國公夫人朝冠鎮國公女鄉君同頂鏤金二層飾東珠四餘如貝勒夫人朝冠之制輔國公夫人金約鎮國公女鄉君同鏤金雲四餘如貝勒夫人金約之制輔國公女鄉君朝冠頂鏤金二層飾東珠三餘如貝勒夫人朝冠之制輔國公女鄉君金約鏤金雲三餘如貝勒夫人金約之制民公夫人朝冠冬以薰貂為之夏以青絨為之前綴金簮三飾以珠寶護領縧用石青色其制下逹命婦皆同後不具詳頂鏤花金座中飾東珠四上銜紅寶石吉服冠用珊瑚圓頂民公夫人金約青緞為之紅片金裏中綴鏤金火焰飾珍珠一左右金龍鳳各一後垂青緞帶二亦紅片金裏其制下逹命婦皆同民公夫人耳飾左右各三每具金雲銜珠各二其制下逹命婦皆同民公夫人朝褂色用石青片金緣繡文前行蟒二後行蟒一領後垂石青縧其制下逹命婦皆同民公夫人朝袍藍及石青諸色隨所用披領及袖俱石青片金緣冬加海龍緣繡文前後正蟒各一兩肩行蟒各一襟行蟒四中無襞積披領行蟒二袖端正蟒各一袖相接處行蟒各二後垂石青縧其制下逹奉國將軍夫人及三品命婦皆同民公夫人吉服褂色用石青繡花八團其制下逹命婦皆同民公夫人蟒袍藍及石青諸色隨所用通九蟒皆四爪其制下逹奉國將軍夫人及三品命婦皆同民公夫人領約鏤金為之飾紅藍小寶石五兩端垂石青縧二中各貫珊瑚末綴珊瑚各二其制下逹命婦皆同民公夫人朝珠朝服用三吉服用一珊瑚青金緑松蜜珀隨所用雜飾惟宜縧用石青色其制下逹五品命婦皆同民公夫人綵帨月白色不繡花文雜佩惟宜縧皆石青色其制下逹命婦皆同民公夫人朝裙上紅緞下石青行蟒粧緞皆正幅有襞積夏以紗為之片金緣冬加海龍緣其制下逹奉國將軍夫人及三品命婦皆同四品命婦以下上緑綴緣不加海龍餘制同侯夫人朝冠頂鏤花金座中飾東珠三上銜紅寶石吉服冠用珊瑚圓頂伯夫人朝冠頂鏤花金座中飾東珠二上銜紅寶石吉服冠用珊瑚圓頂子夫人朝冠鎮國將軍夫人與一品命婦並同頂鏤花金座中飾東珠一上銜紅寶石吉服冠用珊瑚圓頂男夫人朝冠輔國夫人夫人與二品命婦並同頂鏤花金座中飾紅寶石一上銜鏤花珊瑚吉服冠用鏤花珊瑚圓頂奉國將軍夫人朝冠三品命婦同頂鏤花金座中飾紅寶石一上銜藍寶石吉服冠用藍寶石圓頂奉恩將軍夫人朝冠四品命婦同頂鏤花金座中飾藍寶石一上銜青金石吉服冠用青金石圓頂五品命婦用水晶六品命婦用碑磔七品命婦用素金奉恩將軍夫人朝袍四品以下命婦並同藍及石青諸色隨所用披領及袖俱石青片金緣繡文前後行蟒各二中無襞積後垂石青縧奉恩將軍夫人蟒袍四品至六品命婦並同藍及石青諸色隨所用通八蟒皆四爪七品命婦五蟒餘制皆同奉恩將軍夫人朝裙四品以下命婦並同上緑緞下石青行蟒粧緞皆正幅有襞積皇朝文獻通考卷一百四十二
