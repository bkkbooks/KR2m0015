body:
  text: 輿地考八安徽省臣等謹按禹畫揚州而當時塗山之㑹執玉帛者萬國杜預以為在壽春東北實為鳯陽府境則今上江之地為當時揚州之都㑹可知已夫安徽界荆吳之交統馭千有餘里其富庶亞於江蘇而江山厄塞形勢險固幾欲過之自春秋之世吳楚爭鍾離居巢州來皆為今廬州鳯陽境地漢代去古未逺而揚州刺史實見治於歷陽降及三國六朝若曹魏之合肥壽春孫吳之濡須牛渚終南北朝並為要地元代以安廬等地屬淮西道而下江之淮揚等地别屬淮東以徽寧等地屬江東道而下江之蘇松等地别屬江南隱然各為一都㑹蓋大江左右獨闢隩區其山川之復㳫疆域之糾錯居東南轇轕之㑹而鈐轄阻深不盡如江蘇所𨽻廣谷長川平疇巨浸號稱澤國也地險民聚自昔而然我朝休養生息編户日衆而政務益繁爰於康熙六年與江蘇分疆而治於是東連姑孰西盡皖江北抵頴川南環歙嶺星羅碁布控制得宜屹然為上游之重鎮矣安徽明直𨽻南京又以鳯陽府為中都共領府十四州四其安慶徽州寧國池州太平廬州鳯陽七府滁和廣德三州為今上江地本朝初設江南布政使司按察使司駐江寧府以操江兼巡撫事駐安慶府轄安慶徽州寧國池州太平五府滁和廣德三州其鳯陽廬州二府與淮安揚州等府及徐州别為一巡撫順治五年設總督駐江寧府六年以漕運總督兼巡撫事轄鳯廬等府十六年仍置鳯廬巡撫十八年與江蘇以左右布政使司分治此為左布政所轄仍寄治江寧康熙元年以操江併於總督專設安徽巡撫三年與江蘇各分按察使司駐安慶五年裁鳯廬巡撫以鳯陽廬州二府歸併安徽巡撫管轄六年停左右布政之名分為安徽布政使司雍正二年升鳯陽府之潁亳泗三州廬州府之六安州並為直𨽻州十三年升潁州為府仍改亳州為屬州乾隆二十五年以安徽布政使司自江寧還治安慶凡領府八直𨽻州五東西距七百六十里南北距一千一百八十里東至江蘇鎮江府溧陽縣界四百六十里西至湖北黃州府蘄州界三百里南至江西九江府彭澤縣界三百十里北至江蘇徐州府睢寧縣界八百七十里東南至浙江嚴州府淳安縣界七百九十五里西南至湖北黃州府黃梅縣界三百四十里東北至江蘇江寧府江浦縣界五百十里西北至河南歸德府商邱縣界七百八十里在京師南二千七百里安慶府為省治東西距四百五十里南北距二百七十五里東至廬州府無為州界一百五十里西至湖北黃州府蘄州界三百里南至池州府東流縣界九十五里北至廬州府舒城縣界一百八十里東南至池州府東流縣界一百二十里西南至江西九江府治四百十里東北至無為州治三百二十里西北至六安州界二百八十里自府治至京師二千七百里明洪武初安慶府直𨽻南京本朝初屬江南省後分為安徽省此為安徽巡撫及布政按察兩司治凡領縣六懷寧縣附郭桐城縣在府東北一百二十里潛山縣在府西北一百二十里太湖縣在府西北二百二十里宿松縣在府西南二百六十里望江縣在府西南一百二十里徽州府在省治東南五百七十里東西距三百九十里南北距二百二十里東至浙江杭州府昌化縣界一百二十里西至江西饒州府浮梁縣界二百七十里南至浙江嚴州府遂安縣界一百里北至寧國府太平縣界一百二十里東南至嚴州府淳安縣界一百十里西南至饒州府樂平縣界二百七十里東北至寧國府寧國縣界一百五十里西北至池州府石埭縣界一百六十里自府治至京師二千八百五十里明初徽州府直𨽻南京本朝初屬江南省後分屬安徽省凡領縣六歙縣附郭休寧縣在府西六十里婺源縣在府西南二百四十里祁門縣在府西一百八十里黟縣在府西北一百四十里績溪縣在府東北六十里寧國府在省治東四百三十里東西距二百二十里南北距三百三十五里東至廣德州建平縣界六十里西至池州府銅陵縣界一百六十里南至徽州府績溪縣界二百十五里北至太平府當塗縣界一百二十里東南至浙江杭州府於潛縣界二百二十里西南至池州府石埭縣界三百里東北至江蘇江寧府髙淳縣界七十里西北至太平府繁昌縣治一百三十里自府治至京師二千七百四十五里明寧國府直𨽻南京本朝初屬江南省後分屬安徽省凡領縣六宣城縣附郭涇縣在府南一百里南陵縣在府西九十里寧國縣在府東南九十里旌德縣在府南二百二十里太平縣在府西南二百二十里池州府在省治東少北一百二十里東西距三百七十里南北距二百三十五里東至寧國府南陵縣界一百五十里西至安慶府望江縣界二百二十里南至徽州府祁門縣界二百二十里北至安慶府桐城縣界十五里東南至寧國府太平縣界二百里西南至江西九江府彭澤縣界二百里東北至太平府繁昌縣界二百里西北至安慶府懷寧縣治一百二十里自府治至京師二千八百里明池州府直𨽻南京本朝初屬江南省後分屬安徽省凡領縣六貴池縣附郭青陽縣在府東八十里銅陵縣在府東北一百二十里石埭縣在府東南一百六十里建德縣在府西南一百八十里東流縣在府西少南一百八十里太平府在省治東北四百九十里東西距九十里南北距二百十里東至江蘇江寧府溧水縣界八十里西至和州界十里南至寧國府南陵縣界一百六十里北至江寧府江寧縣界五十里東南至寧國府治一百八十里西南至池州府銅陵縣界一百六十里東北至江寧府治一百里西北至和州治九十里自府治至京師二千四百六十五里明太平府直𨽻南京本朝初屬江南省後分屬安徽省凡領縣三當塗縣附郭蕪湖縣在府西南六十里繁昌縣在府西南一百三十里廬州府在省治北四百六十里東西距三百十里南北距三百六