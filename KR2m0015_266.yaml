body:
  text: 象緯考十一月五星凌犯臣等謹按馬端臨考月五星凌犯咸據諸史列占應今欽天監於月星相距之度分皆可預推蓋由行度遲速經緯逺近得之則端臨所謂史氏記述豈足憑姑述故事廣異聞者無庸仍其例也兹闡明夫凌犯之數理焉太隂與五星恆星相距十七分以內曰凌十八分以外曰犯兩緯同度曰掩以本日太隂經度在星前次日太隂經度在星後為入限緯度在北為上在南為下如同在黃道北逺者為在上近者為在下同在黃道南近者為在上逺者為在下太隂在上者以二度為距限太隂在下者以一度為距限五星自相距及與恆星相距三分以內曰凌四分以外曰犯兩緯同度曰掩以本日此星經度在彼星前次日此星經度在彼星後為入限緯度無論在上在下皆以一度為距限五星自相距以行速者為凌犯之星行遲者為受凌犯之星如遲速相同而一順一逆則以順行者為凌犯之星逆行者為受凌犯之星太隂與五星皆循黃道右旋皆得相距太隂行黃道南北不過六度填星行黃道南北不過三度嵗星行黃道南北不過二度熒惑行黃道南北不過五度太白行黃道南北不過十度辰星行黃道南北不過四度故太隂每凌犯五星五星每自相凌犯恆星在黃道南北三度以內者太隂五星皆得與相距四度以內者太隂填星熒惑太白辰星得與相距五度以內者太隂熒惑太白辰星得與相距六度以內者太隂熒惑太白得與相距七度以內者太隂太白得與相距十度以內者太白得與相距紫微垣諸星皆在黃道北二十度外太隂五星莫得犯之太微垣右執法星右上將星左執法星左上相星長垣第三星第四星靈臺三星明堂第一星第二星在黃道南北三度內太隂五星皆得犯之長垣第一星在黃道北四度內太隂填星熒惑太白辰星得犯之內屏第二星謁者星在黃道北五度內太隂熒惑太白辰星得犯之內屏第一星第三星右次將星長垣第二星明堂第三星在黃道南北六度內太隂熒惑太白得犯之五帝座第五星三公第一星第三星內屏第四星右次相星左次相星在黃道北十度內太白得犯之其他諸星在黃道北十度外莫得犯之天市垣左垣牆宋星在黃道北十度內太白得犯之其他諸星在黃道北十度外莫得犯之角宿角第一星平道二星進賢二星在黃道南北三度內太隂五星皆得犯之天門第二星在黃道南六度內太隂熒惑太白得犯之角第二星天門第一星在黃道南北十度內太白得犯之亢宿亢第一星第四星在黃道北三度內太隂五星皆得犯之折威第六星第七星在黃道南七度內太隂太白得犯之亢第二星折威第二星第三星第四星第五星在黃道南北十度內太白得犯之其他諸星在黃道南北十一度外莫得犯之氐宿氐第一星第二星在黃道南北三度內太隂五星皆得犯之第三星在黃道北五度內太隂熒惑太白辰星得犯之第四星天輻二星在黃道南北十度內太白得犯之其他諸星在黃道南北十度外莫得犯之房宿房第三星第四星鍵閉星鈎鈴二星東咸第三星第四星日星在黃道南北三度內太隂五星皆得犯之罰第三星西咸第三星第四星東咸第二星在黃道北四度內太隂填星熒惑太白辰星得犯之房第一星在黃道南五度內太隂熒惑太白辰星得犯之東咸第一星在黃道北六度內太隂熒惑太白得犯之西咸第二星在黃道北七度內太隂太白得犯之房第二星罰第二星在黃道南北八度內太白得犯之其他諸星在黃道南北十三度外莫得犯之心宿心第一星第二星在黃道南四度內太隂填星熒惑太白辰星得犯之第三星在黃道南六度內太隂熒惑太白得犯之其積卒二星在黃道南十二度外莫得犯之尾宿天江第三星第四星在黃道南三度內太隂五星皆得犯之第二星在黃道南四度內太隂填星熒惑太白辰星得犯之第一星在黃道南五度內太隂熒惑太白辰星得犯之其他諸星在黃道南十一度外莫得犯之箕宿第一星第二星粳星在黃道南六度內太隂熒惑太白得犯之其他諸星在黃道南十一度外莫得犯之斗宿南斗第二星第三星天籥第一星至第六星建第一星至第三星天雞第二星狗第二星在黃道南北三度內太隂五星皆得犯之南斗第四星天籥第七星建第四星狗第一星在黃道南北四度內太隂填星熒惑太白辰星得犯之南斗第一星第五星天籥第八星建第五星在黃道南北五度內太隂熒惑太白辰星得犯之天雞第一星狗國第一星第二星在黃道南北六度內太隂熒惑太白得犯之南斗第六星建第六星狗國第三星第四星在黃道南北七度內太隂太白得犯之其他諸星在黃道南北十二度外莫得犯之牛宿牽牛第四星第五星第六星羅堰第二星在黃道北二度內太隂五星皆得犯之羅堰第一星第三星在黃道南北四度內太隂填星熒惑太白辰星得犯之牽牛第一星在黃道北五度內太隂熒惑太白辰星得犯之第二星天田第四星在黃道南北七度內太隂太白得犯之牽牛第三星天田第二星第三星在黃道南北九度內太白得犯之其他諸星在黃道南北十一度外莫得犯之女宿周二星秦二星代第一星越星鄭星在黃道南三度內太隂五星皆得犯之趙二星在黃道南四度內太隂填星熒惑太白辰星得犯之齊星楚星在黃道南五度內太隂熒惑太白辰星得犯之代第二星魏星韓星在黃道南六度內太隂熒惑太白得犯之晉星燕星在黃道南七度內太隂太白得犯之婺女第一星第二星在黃道北九度內太白得犯之其他諸星在黃道北十一度外莫得犯之虛宿哭二星泣二星天壘城第四星至第七星在黃道南北三度內太隂五星皆得犯之天壘城第二星第三星第八星第九星在黃道北四度內太隂填星熒惑太白辰星得犯之第十星第十三星在黃道北五度內太隂