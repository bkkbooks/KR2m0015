body:
  text: 欽定四庫全書皇朝文獻通考卷二百五十一封建考異姓封爵二滿洲子一等總兵官額亦都滿洲鑲黄旗人天命年積克城拓地功封贈詳公爵遏必隆額亦都子天聰六年襲坐事削爵晉襲詳公爵殷徳額亦都孫康熙五十二年五月特恩賜襲一等精竒尼哈畨晉襲詳公爵豐阿達額亦都曽孫雍正三年四月襲乾隆元年改為一等子達爾當阿豐阿達弟乾隆三年十二月襲晉襲詳公爵特通額達爾當阿從兄子乾隆二十年十二月襲坐事削爵仁和額亦都四世孫乾隆二十一年十二月襲坐事削爵毓竒仁和族兄乾隆四十六年十二月襲一等精竒尼哈番顧爾布錫滿洲鑲黄旗人天命年自哈爾喀歸順封三等總兵官天聰八年改為三等昂邦章京順治元年五月以入山海闗擊流冦功晉二等四年改為二等精竒尼哈番七年三月遇恩詔晉一等坐事削爵九年十一月復封一等精竒尼哈番卒諡敏襄色楞顧爾布錫子順治十八年三月襲多爾濟色楞子康熙二十五年十二月襲單霸多爾濟弟康熙三十年七月襲阿世坦單霸從弟康熙四十七年四月降襲二等精竒尼哈番沙進阿世坦弟康熙五十年十月襲伽藍保沙進兄子康熙五十七年十二月襲坐事削爵乾隆八年十一月復襲二等子景文伽藍保子乾隆十三年六月襲託喜景文弟乾隆二十五年十二月襲一等精竒尼哈番陳泰滿洲鑲黄旗人一等總兵官贈𢎞毅公額亦都孫順治六年四月以征湖廣福建等處軍功封二等阿思哈尼哈番九年正月遇恩詔晉三等精竒尼哈番又以恩詔晉二等十三年以征湖廣軍功晉一等卒諡忠襄尼滿陳泰嗣子順治十三年八月襲白竒尼滿嗣子順治十八年正月襲以才力不及爵除善岱白竒子康熙三十四年十二月襲乾隆元年改為一等子子降襲詳男爵一等子郎圖滿洲鑲黄旗人三等侯偏圖弟康熙五十六年四月降襲一等精竒尼哈番乾隆元年改為一等子納爾泰郎圖弟子乾隆二年十二月襲徳成格納爾泰子乾隆五年十二月襲一等子明仁滿洲鑲黄旗人贈一等伯傅清子乾隆十五年十一月以傅清盡節封寳倫明仁子乾隆四十年十二月襲三等縂兵官費英東滿洲鑲黄旗人天命四年積克城拓地功封贈詳公爵索海費英東子天命五年襲以罪削爵納海索海兄圖賴索海弟分襲三等縂兵官俱坐事削爵查喀尼索海弟天聪八年改襲三等昂邦章京倭黒查喀尼子崇徳八年十二月襲順治四年改為三等精竒尼哈畨順治七年三月遇恩詔晉二等九年七月晉一等晉襲詳公爵三等精竒尼哈番佟圖賴滿洲鑲黄旗人孝康章皇后父順治三年五月以克太原平江南河南功封二等梅勒章京四年改為二等阿思哈尼哈畨七年三月遇恩詔晉一等九年正月遇恩詔晉三等精竒尼哈番贈襲詳公爵三等精竒尼哈番丹代滿洲鑲黄旗人一等阿思哈尼哈番噶爾哈圖弟順治十二年三月以原職兼襲爵封夸哈丹代子順治十五年二月襲後分襲詳男爵一等子布彦達賚滿洲鑲黄旗人以兄副將軍豐盛額掃平促浸功所有本身公爵加繼勇名號外再給一等子乾隆四十一年正月襲以上鑲黄旗一等縂兵官冷格里滿洲正黄旗人天命年以敗䝉古軍功封一等副將以攻寜逺征䝉古軍功晉三等縂兵官以征朝鮮取義州軍功晉一等卒諡武襄穆成額冷格里子天聪八年五月改襲一等昂邦章京穆赫林穆成額子崇徳五年六月襲順治四年改為一等精竒尼哈畨晉封襲封詳伯爵吉當阿穆赫林孫康熙四十九年二月襲坐事削爵色克圖吉當阿弟雍正四年六月襲乾隆元年改為一等子揚桑阿色克圖兄子乾隆九年十二月襲坐事削爵舒崇阿揚桑阿弟乾隆十八年十二月襲二十五年十二月卒仍以兄揚桑阿襲賽炳阿揚桑阿弟子乾隆三十年十二月襲一等精竒尼哈番噶爾瑪蘇索諾木滿洲正黄旗人順治八年閏二月封子降襲一等精竒尼哈畨敦拜滿洲正黄旗人順治七年五月以平福建江西功封三等阿思哈尼哈畨八月坐事降事白復爵九年正月遇恩詔晉一等阿思哈尼哈畨十三年閠五月以定河間保定征廣東廣西軍功晉封卒諡襄壯胡什布敦拜嗣孫順治十六年七月襲後降襲詳男爵一等精竒尼哈畨賴達庫滿洲正黄旗人初封詳男爵順治八年以一等阿思哈尼哈畨晉封二等精竒尼哈畨九年正月晉一等席喇賴達庫孫康熙二十三年五月襲坐事罷爵薩賴席喇子康熙二十八年五月襲三十七年十月以不勝職罷仍以其父席喇襲四十六年四月以年老削爵子三保住降襲詳男爵一等子根敦滿洲正黄旗人贈一等伯拉布敦子乾隆十五年十一月以拉布敦盡節封隆保拉布敦嗣子乾隆十六年十月襲三十年三月緣事革爵停襲二等子班達爾沙滿洲正黄旗人一等伯莽古爾代從姪孫雍正七年四月降襲二等精竒尼哈畨乾隆元年改為二等子班岱班達爾沙子乾隆八年十二月襲班他哈班岱弟乾隆十一年十二月襲特通阿班他哈子乾隆四十五年十二月襲二等子善保滿洲正黄旗人一等伯令徳子乾隆十五年十一月視一等公索尼初封之二等昂邦章京襲二等子晉襲詳公爵法隆武善保從弟乾隆二十三年十二月襲穆克登額法隆武子乾隆三十四年十二月襲三等縂兵官尼馬禪滿洲正黄旗人一等副將黒東格弟初授備禦兼襲兄爵晉封坐事降三等昂邦章京恩格徳里滿洲正黄旗人天聪八年自蒙古歸順封卒諡端順贈詳公爵額爾克代青恩格徳里子崇徳元年襲順治二年晉二等晉封詳公爵三等昂邦章京呉巴海滿洲正黄旗人崇徳二年以軍功封四年九月分襲三等精竒尼哈畨噶爾瑪葉爾登滿洲正黄旗人崇徳元年自䝉古歸順封三等昂邦章京順治四年改為三等精竒尼哈畨宜那穆噶爾瑪葉爾登子順治八年襲班達爾沙宜那穆子康熙六年二月襲巴理彌班達爾沙弟子康熙三十年十二月襲坐事削爵阿爾那巴理彌從弟雍正十一年八月襲百成阿爾那子雍正十三年二月襲乾隆元年改為三等子博爾中鄂百成子乾隆四十六年十二月襲三等精竒尼哈畨多爾濟滿洲正黄旗人崇徳四年七月積攻城拓地功封一等梅勒章京順治二年二月晉三等昂邦章京四年改為三等精竒尼哈畨綽爾濟多爾濟弟順治五年十月襲七年三月遇恩詔晉二等九年正月遇恩詔晉一等坐事削爵納穆生格綽爾濟弟順治十五年十月仍襲三等精竒尼哈畨征福建陣亡諡直勇十八年二月復以綽爾濟襲二等精竒尼哈畨保住綽爾濟弟子康熙十九年八月襲寳夀保住子康熙五十五年五月降襲三等精竒尼哈畨以疾爵除佛佑寳夀弟康熈五十七年六月襲乾隆元年改為三等子博清額佛佑子乾隆九年十二月襲三十四年晉襲恭誠侯詳侯爵三等精竒尼哈畨希福滿洲正黄旗人順治九年正月遇恩詔封三等阿思哈尼哈畨復敘功晉一等四月晉三等精竒尼哈畨卒諡文簡竒塔特希福子順治十年正月襲費揚武竒塔特子康熈十七年五月襲希昌費揚武子康熙四十九年六月襲來賢希昌子雍正三年六月襲乾隆元年改為三等子坐事削爵文玉來賢弟乾隆三年十二月襲恭安文玉兄子乾隆十三年十二月襲嵩夀恭安叔祖赫奕嗣子乾隆十九年十二月襲増保嵩夀孫乾隆二十年十二月襲三等精竒尼哈畨敬桑滿洲正黄旗人一等精竒尼哈畨噶爾瑪索諾木子康熙三年封無襲以上正黄旗一等精竒尼哈畨呉拜滿洲正白旗人順治二年正月以攻前屯衛入山海闗軍功封一等梅勒章京四年三月以追滕機思追土謝圖汗功晉一等昂邦章京是年改為一等精竒尼哈畨七年三月遇恩詔晉二等伯詳伯爵十六年三月坐事仍降一等精竒尼哈畨卒諡勇壯郎談呉拜子康熙四年九月襲拉歆郎談子康熙三十四年十月襲英兆拉歆子雍正十三年十二月襲乾隆元年改為一等子文慶英兆子乾隆二十九年十二月襲緣事革職七十一文慶從弟乾隆四十五年十二月襲一等精竒尼哈畨準塔滿洲正白旗人崇徳二年七月以克皮島功封三等梅勒章京四年七月以征山東軍功晉二等尋以罪降順治二年二月以入山海闗擊流寇功復晉三等梅勒章京三年四月以平淮安府功晉三等昂邦章京四年改為三等精竒尼哈畨五年六月以征四川軍功晉一等卒諡襄毅阿喇密準塔弟順治五年六月襲晉封詳伯爵舒書準塔兄子康熙二十一年七月襲邁圖舒書子康熈三十三年閠五月襲以罪削爵殷達準塔弟子康熙四十六年八月襲西佛殷達子康熙五十三年十一月襲闗保西佛兄子雍正四年七月襲乾隆元年改為一等子積徳闗保從姪乾隆四年十二月襲常安積徳子乾隆十七年十二月襲二等精竒尼哈畨蘇拜滿洲正白旗人順治五年六月以軍功由二等阿思哈尼哈畨晉封三等精竒尼哈畨七年三月遇恩詔晉二等坐事削爵降襲詳男爵二等精竒尼哈畨碩塔滿洲正白旗人二等公英古爾代子降二等精竒尼哈畨宜圖弟順治九年四月襲額爾金碩塔從姪康熈二十二年十月襲以罪削爵英敏二等公英古爾代孫康熙五十六年十一月降襲三等精竒尼哈畨坐事削爵英俊英敏弟雍正六年十二月襲乾隆元年改為三等子保和英俊子乾隆十二年四月襲哲臣保和子乾隆四十七年十二月襲原封二等精竒尼哈畨蘇克薩哈滿洲正白旗人順治七年三月遇恩詔封三等阿思哈尼哈畨九年正月遇恩詔晉一等十三年八月以征湖廣軍功晉二等精竒尼哈畨以罪削爵蘇常淑蘇克薩哈子康熈八年七月襲蘇永祖蘇常淑弟康熈十一年十二月襲以罪削爵襲詳男爵三等精竒尼哈畨白爾懇滿洲正白旗人康熈十年三月以一等阿思哈尼哈畨晉封原襲詳男爵白清額白爾懇子康熈三十三年二月襲乾隆元年改為三等子子降襲詳男爵三等子額森特滿洲正白旗人初詳男爵乾隆四十六年六月由一等男晉遷三等子哈金太額森特子乾隆四十八年十二月襲以上正白旗三等縂兵官何和禮滿洲正紅旗人天命年以征嘉庫達降兀喇功封卒諡温順和碩圖何和禮子襲三等縂兵官晉封詳公爵三等精竒尼哈畨覺善滿洲正紅旗人順治七年三月遇恩詔封三等阿思哈尼哈畨五月以征湖廣江西軍功晉二等九年正月遇恩詔晉一等又以恩詔晉三等精竒尼哈畨卒諡敏勇噶爾圖覺善子康熈四年正月襲沙爾圖噶爾圖兄康熙四年八月襲三泰沙爾圖子康熙二十三年三月襲後降襲詳男爵以上正紅旗二等精竒尼哈畨尼堪滿洲鑲白旗人順治四年三月以軍功封三等梅勒章京是年改為三等阿思哈尼哈畨尋晉三等精竒尼哈畨十年五月晉二等後分襲三等昂邦章京霸拜滿洲鑲白旗人國初自䝉古歸順封卒諡僖順阿郁實霸拜子天聪八年五月襲順治四年改為三等精竒尼哈畨順治七年三月遇恩詔晉二等賴善阿郁實子順治七年八月襲安保賴善子康熙五十五年十二月降襲三等精竒尼哈畨乾隆元年改為三等子永福安保子乾隆四年十二月襲罡奎永福子乾隆三十六年十二月襲三等精竒尼哈畨朱瑪喇滿洲鑲白旗人順治九年正月遇恩詔封三等阿思哈尼哈畨十三年閠五月以征廣東廣西功晉封卒諡襄敏博通鄂朱瑪喇子康熙元年三月以原職兼襲爵晉一等精竒尼哈畨柯三博通鄂子康熈十五年五月襲子降襲詳男爵三等精竒尼哈畨克什圖滿洲鑲白旗人三等精竒尼哈畨固魯子詳男爵順治十八年十一月襲查彌嚴克什圖子康熙二十四年八月襲子降襲詳男爵以上鑲白旗一等精竒尼哈畨葉臣滿洲鑲紅旗人天聪八年五月以駐防蒙古及克永平府功封