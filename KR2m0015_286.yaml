body:
  text: 輿地考十八四川省臣等謹按禹貢梁州至殷周之世即廢而不置杜佑以為當時已為蠻夷之國牧誓所稱庸蜀羌髳微盧彭濮人是也先儒皆謂梁地併於雍荆豫三州蓋殷周之荆豫皆以漢水為界梁州自嶓冡以東分屬荆豫而嶓冡以西則雍兼之其地雖併入三州而禹貢岷嶓沱潛諸山水無一入職方者說者謂地既入夷則建州設牧非其所宜大抵如唐宋之羈縻州簡其政令寬其賦斂使為不侵不叛之臣而已夫蜀自蠶叢開國以後僻處西南連山深阻天梯雲棧之間言地險者必以為稱首逮乎金牛開道肇啓秦封巴蜀之列於郡縣自此昉矣漢代通道西南夷其疆益大顧冉駹卭嶲之屬種類實繁厯代以來仍世長其地土官土吏之設於蜀郡為獨多明初踵元故事招諭諸蠻凡西南各部來歸者多用原官授之於是有宣慰司宣撫司安撫司長官司諸號苐其介居山箐獷野難馴終明之世惟建昌等處置衛所以領之其餘各土司未嘗設立文武為之鈐轄祗聼其互為雄長而已我國家聲教洋溢率土尊親若建昌松潘諸衛及永寧石砫酉陽諸司或升為府或置㕔州因地制宜已全革其狉獉之俗至於崇岡復嶂之表雜處諸番火種刀耕各安生業亦皆兼幬而並覆之即有一二頑梗無知自相爭奪比於穴中之鬪隨時加以懲創亦莫不聞風震叠讋我皇威是以西抵於藏地南達於䝉番莋馬旄牛皆通王㑹蠻賨僰賧並樂土風聖世攘外安內之謨洵乎威服德懷各得其道矣四川明四川等處承宣布政使司治成都府領成都保寧順慶重慶䕫州叙州馬湖龍安八府潼川嘉定雅眉卭盧六州東川烏䝉烏撒鎮雄四軍民府萬厯二十九年分播州地置遵義府共領府九自府州之外置永寧等宣撫司黎州等安撫司又置四川都指揮使司領成都等十衛及松潘軍民衛天全六番招討司與疊溪等八守禦千戶所置四川行都指揮使司治建昌領建昌寧番鹽井㑹川越嶲等衛本朝初四川巡撫及布政使司按察使司皆駐成都府設總督駐陜西兼轄四川順治十四年専設四川總督康熙四年以烏撒府改𨽻貴州七年改四川總督為川湖總督駐湖北荆州府兼轄四川九年川湖總督移駐重慶府十九年改為川陜甘總督駐西安府兼轄四川雍正四年以東川府改𨽻雲南五年以烏䝉鎮雄二府亦改𨽻雲南併馬湖府入叙州府又以建昌衛改置寧逺府又升成都府屬之茂綿二州及資縣並為直𨽻州六年升䕫州府屬之達川為直𨽻州七年以遵義府改𨽻貴州又升雅州為府八年增置直𨽻叙永㕔同知九年專設四川總督駐成都府十二年升潼川嘉定二州為府又升重慶府屬之忠州為直𨽻州又增置直𨽻黔彭㕔同知十三年仍設川陜甘總督乾隆元年改黔彭㕔置酉陽州十四年復專設四川總督裁四川巡撫以總督兼理巡撫事十七年置直督雜谷㕔同知二十五年置直𨽻松潘㕔同知二十七年置直𨽻石砫㕔同知四十一年平定兩金川以其地置阿爾古美諾二㕔凡領府十一直𨽻州九㕔六各衛所俱以次裁改入州縣東西距三千里南北距三千二百十里東至湖北宜昌府巴東縣界一千七百六十里西至番界一千二百四十里南至雲南武定州元謀縣界二千三十里北至陜西漢中府寧羌州界一千一百八十里東南至貴州大定府畢節縣界一千一百五十里西南由打箭爐出口至西藏界九千六百七十五里東北至陜西興安府界一千四百十里西北至甘肅階州文縣界一千一百五十里在京師西南五千七百十里成都府為省治東西距三百四十里南北距二百七十五里東至潼川府樂至縣界一百六十里西至茂州瓦寺土司界一百八十里南至眉州彭山縣界一百十五里北至綿州綿竹縣界一百六十里東南至資州資陽縣界一百六十五里西南至卭州界一百二十里東北至潼川府中江縣界一百五十里西北至茂州文川縣界一百四十里自府治至京師五千七百十里明為成都府共領州六縣二十五本朝初因之順治十六年省彰明羅江二縣康熙元年省雙流縣七年省崇寧縣及彭縣九年省華陽縣雍正五年升茂綿二州及資縣並為直𨽻州又省威州入保縣與內江等共九縣分屬茂綿資三州又復置華陽縣與成都縣並為府治復置羅江縣分屬綿州六年復置雙流崇寧彭彰明四縣仍並屬府七年以彰明縣改屬龍安府凡領州三縣十三成都縣附郭治府北境華陽縣附郭治府南境康熙九年省入成都縣雍正五年復置與成都縣並為府治雙流縣在府西南四十里康熙元年省入新津縣雍正六年復置溫江縣在府西少南五十里新都縣在府北五十里金堂縣在府東北七十里郫縣在府西四十五里新繁縣在府西北五十六里崇寧縣在府西北八十里康熙七年省入郫縣雍正六年復置彭縣在府西北九十里康熙七年省入新繁縣雍正六年復置灌縣在百西北一十五里簡州在府東少南一百二十里崇慶州在府西南九十里新津縣在府西南九十里漢州在府北少東九十里什邡縣在府北一百三十里保寧府在省治東北六百二十里東西距七百十里南北距五百四十里東至逹州太平縣界五百六十里西至綿州梓潼縣界一百五十里南至順慶府西充縣界一百四十里北至陜西漢中府寧羌州界四百里東南至順慶府蓬州界一百七十里西南至潼川府鹽亭縣界一百里東北至漢中府南鄭縣界五百里西北至龍安府平武縣界三百五十里自府治京師四千二百四十里明為保慶府共領州二縣八本朝初因之雍正五年以綿竹縣改屬綿州凡領州二縣七閬中縣附郭蒼溪縣在府西北四十里南部縣在府南少東七十里廣元縣在府北二百八十里昭化縣在府北少西二百八十里巴州在府東北二百五十里通江縣在府東北四百里南江縣在府東北三百四十里劍州在府