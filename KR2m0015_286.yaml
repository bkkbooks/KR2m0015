軸函括萬邦悉主悉臣五后纘承創守佑啓亦惟是二三藎臣布德宣力豫曰有先後豫曰有禦侮用造我丕丕基罔有蘖芽罔不煦嫗長飬游於大當粵有金川娑羅奔者居西蜀桃關以外界綽斯甲小金川之間向曽從征得受符檄與諸土司齒顧恃其險逺夜郎自大搆釁鄰番各土司申訴封疆吏吏曰蔓之不圖豈其視為甌脫乃請兵籌餉期掃其穴而司其事者或怯縮以老師或􅘀狡以蓄志軍無適從事用弗集豫心􅍀然念邊徼之不寧或致增防置戌重勞吾民大學士忠勇公傅恆義同休戚毅然請肩斯任乃命以經略印益厚集諸路軍芻粟相繼閭閻不驚卜吉於戊辰十一月之三日禡牙以指所征朕親御武帳賜經略酒以行天日和昶陽氣宣復都人士聽覩聳躍岡不忭喜謂露布之旦暮至也乃厯燕晋驅秦隴越劍閣絶川江凌桃關之巇經天射之峻又日計軍實而教誡拊循之均其渴飲飢食同其曉征夜眠至於密贊機務親草奏章則又經略獨勤其勞而諸武臣有所不知有弗能共者恩威既明士用益勵度番落如戶庭過部伍於袵席奸酋授首軍聲大振復以巨炮擊其碉堅碉以摧將俟諸軍之集搗其中堅而番酋騤瞿駾喙稽首請降經略臣以彼罪重惡極窮而乞生久或渝且偝馬慮不允所請朕惟天地之德在好生彼蟻潰而鼠駭者毋寧赦而宥之且求降而盡殱之不可謂武矧不足以汚我斧也於是經略宣朕明㫖登壇受降己巳二月之望日金川平定捷音至京是役也罙入數千里奏凱未七旬而振旅之師多有返自中途未究其用者昔之成功巴蜀如建武之定公孫江陵之降李勢皆在版圖之內無足比數廷臣舉皇祖朔漠皇考青海成例請勒碑成均以示來許夫秉丹誠而運籌决勝永靖荒徼者經略大學士之功也商可否於帷幄衝矢石於行陳者參贊大臣及諸將士力也朕何有焉惟是體乾元之德凛佳兵之戒保大定功安民和衆庶幾可以垂則乎乃系之辭曰維天生人類聚羣分凡兹林林孰非我民有羈而縻有誨而諄豈伊異視逺近殊倫守在四夷稽古名言無己用之寓義於仁蠢彼金夷恃其險阻蠶食豨張謂莫我拒不靖不庭侵厥鄰聚駭奔呌呶以干大咎匪棘匪紓玁狁之故我張我伐玁狁之故我師既集賊亦相持匪敢相持懼誅自支兩易寒暑敉功稍稽賊益以狂怒臂當車罪臣既誅以狥我師朕咨於恆汝往視之朕咨於恆惟汝同德惟我庶士亦久於役將兹旗兵羽林神䇿其勇熊羆其心金石何敵弗摧何攻弗克濟以汝忠奏捷頃刻恆拜稽首臣敢弗蘉既禡既宜師出於京師出於京時維一陽未逾五旬乃壓其疆前旌獵獵有節煌煌羣番乃驚謂自天降惟彼攸恃曰良爾吉以偵以諜如鬼如蜮其恃爰誅其類股栗紀律是明戎兵是詰鑄炮攻碉其守以失惟是懼誅潛弗敢出其潛弗出乃旦夕延將齊我軍披其中堅大鞣大膞期目之前彼乃窮蹙乞降悚䖍惟命是從六事永遵除道築壇肉袒羊牽赳赳鍾琪乃度之訴聿抵賊巢開誠以諭擕其二酋軍門親赴悔罪歸誠車塵馬足順斯撫之昭我王度昔也雷霆今也雨露七縱諸葛單騎汾陽曰我相臣於前有光晋爵錫服黼黻龍章速歸黃閣左右贊襄休養生息惠鮮蜀邦我武既揚無疆惟慶恭載乾隆四十一年御製平定兩金川告成太學碑文文曰太上立德其次立功又其次為立言而德與功皆賴言以傳言之無文行而不逺文之時義大矣哉然傳德之辭直而寡傳功之辭費而多直而寡者不因文而德自見二典三謨經世立教是也費而多者必因文而功乃明周誥殷盤佶屈聱牙是也吾嘗讀韓昌黎平淮西碑益悉此言之不爽何則彼其藩鎮乃家奴之類慫惠因循以致宛成敵國削而平之是宜引以為愧而不可炫以為功賴昌黎之文幾與江漢常武同稱耆定然有識者固知其辭費而多飾而未知憲宗之愧與弗愧耳今之平定金川之文不有類於斯乎解之者曰逆酋羈縻徼外非若淮蔡之居中土元濟之為世臣也吾則以為既已受職為土司則是我臣而其地近接成都逺速衛藏則是我土我土我臣而橫生逆者蠶食鄰封將欲大有所為弗勦而滅之則西川將不能安枕兹雖蕆事與平定淮蔡擒吳元濟何以異故宜引以為愧而不可炫以為功者以為功者以此金川之始見於己巳告功之文兹不復記記其復叛而復征則其隂謀負恩已自戊寅年始蓋戊辰之師實緣其跳梁不靖而師既臨境彼即窮蹙乞降遂以赦罪班師甫十年而其酋即卡即與革布什咱搆釁又四年遂與綽斯甲布及三雜谷為敵而逆子索諾木凶悖益甚自恃地廣人衆力强與各土司搆兵訖無寧嵗故各土司皆畏之如虎而以勢分力散又莫能如之何余以為業已受其降不宜復加兵且蟻鬬蠻觸不足以勞王師因命地方文武大吏隨宜彈壓令弗越內地界亦足以安民而示度耳不虞地方大吏欲息事而每示寬逆酋轉以為無足懼而日益逞其小金川逆酋僧格桑者始則與索諾木水火相仇繼乃狼狽為奸於是索諾木汁殺革布咱土司色楞敦多布取其印敕以歸而僧格桑亦侵占卾克什地界且發兵圍其土司色逹拉之官寨期必於取總督阿爾泰提督董天弼知事不可掩乃有發兵之請是役也或咎阿爾泰依違誤事之過而余則以為阿爾泰之過皆余之過蓋金川因其地險衆悍久蓄異志是以有殺至維州橋之謡維州本漢徼外羌冉駹地蜀將姜維征羌駐此築壘後因名為姜維城唐武德初因其地置維州屢叛屢復廣德中陷吐蕃號為無憂城遂屢入寇擾大中時始復內附五代蜀州內徙改縣曰保寧宋景德初改曰威州元至元間以州治保寧縣并入明洪武初於州境析置保縣有本朝雍正五年省威州入保縣屬茂州今其地尚維州橋之稱而促浸番人以殺至維州橋播為謡曲似係聞吐蕃舊事妄兾效尤耳則其不忘內地情率可知戊辰之役我師深入屢勝即不宜赦其罪而受其降此一誤也甫十年而郎卡偝恩作亂以及逆子踵其蹟皆不及發兵問罪惟令地方大吏隨宜處置又屢誤也以至尾大不掉終於興師故豫不咎人之議為窮兵黷武而轉咎己之類於姑息飬奸蓋中國之制外域張撻伐則彼畏而斂跡主和好則彼輕而生心漢唐宋明之覆轍率可按也若謂豫窮兵黷武則豫賴天恩平伊犁定回部拓疆二萬餘豈其尚不知止足而欲滅蕞爾之金川以為揚赫濯紀勳烈之圖哉雖然平伊犁定回部其事大矣然費帑不及三千萬成功不過五年兹兩金川小寇地不逾千餘里人不滿三萬戶而費帑至七千萬成功亦遲至五年則以跬步皆險番奴效命死守故能延至今日而我將軍阿桂立志堅定決機明敏兩副將軍及參贊領隊諸臣同心合力各軍士敵愾奮勇凡經大小數百餘戰而後成功視平伊犁定回部費力轉不啻倍蓰設非天恩助順衆志成城則金川未易言滅而國威或致少損矣是不可以不記觀斯文者尚諒豫懷慚悔過之不暇知非稱功詡德而為言其庶幾乎繫之以辭用志始末云爾小金首禍曰僧格桑兵救卾什向稱沃日今定為卾克什急呼之則卾什竟抗顔行僧格桑於庚寅夏與鄂克什土司搆怨稱兵阿爾泰董天弼親往誡諭奏稱逆酋遵教退歸亦遂釋而不問未數月復圍卾克什辛卯夏阿爾泰乃遣兵護卾克什而逆酋亦遂與官兵交戰督臣提臣每事遷就知弗勝任將軍别授阿爾泰等名為進兵仍思遷就完事因諭溫福由滇赴川經理軍務且命桂林馳往視之辛卯冬因阿爾泰始終遲疑玩誤遂罷其職而以溫福代為大學士授定邊將軍由西路督兵進攻其四川總督則令桂林代之統兵攻勦南路攻破巴朗向訛為斑斕山今改直取逹圍進抵資哩數月克之兩路夾擊遂得美諾鼠竄狼奔金川助惡溫福初至西路即巢勵將士攻克巴朗拉乘勝直取逹圍進資哩數月而克之繼命豐升額為副將軍同溫福進勦賊尋追還木蘭壩我兵進抵路項宗桂林在南路其始頗合機宜連破約咱卡了諸寨並復革布什咱侵地尋為宋元俊所誤致有墨壟溝之失桂林匿不上聞為阿爾泰所劾因即罷斥而令阿桂為副將軍赴南路代領共兵南路自逹烏至僧格宗皆峭壁懸崕碉卡林立阿桂董飭官軍勵勇摧堅深入其阻乘勝進搗美諾賊營壬辰十一月遂克之溫福亦攻克明郭宗至美諾與阿桂㑹復督兵攻取布朗郭宗逆酋自僻徑竄入金川擒其父澤旺解京乃傳檄撫定汗牛大板昭寫寨落小金川悉平而金川逆酋諾木復敢黨惡拒命因移兵並勦之既平䟎拉小金川番諾木名遂討促浸即金川番語名雪多境隂奏功以沈奏功以沈賊更遮郤緑營怯懦遇戰辟易攻勦促浸之兵溫福由功噶爾拉阿桂由當噶爾拉分兩路並進功噶爾拉之為卡撒了口賊築碉斷徑不能進遂别由昔嶺繞攻而碉堅地險兼多雨雪攻三車半年雖屢得賊卡終未扼其要害緑旗兵既懦蕙溫福又不善調度以二萬餘人散布各卡防守遂以分而見單賊窺其罅隙於癸巳六月遣番衆數百由間道潛至煽誘䟎拉降番復叛董天弼庸懦失守為賊所戕賊益猖獗擾溫福後路直侵大營緑營兵衆先潰將領戰沒者多溫福率親兵與賊摶戰亦遇害趲拉之地復失逆酋等罪大惡極愈不可寬矣兵既無能將復失算豈如南路全師而返叶木阿桂在當噶軍律明而士心固賊不敢犯然木果有事之後當噶亦難獨駐遂整勵兵衆由南路全師而出重調徑旅吉林索倫健鋭火器其心忠純前已簡派八旗兵三千令赴川助勦為溫福等奏止使木果木軍營有滿洲兵在彼則緑營得所依恃亦不致倉皇潰竄是其事仍由溫福自誤幸阿桂一路軍氣甚整即授為定西將軍並健鋭火器營兵三千吉林索倫黑龍江兵四千迅赴軍營重籌進勦仍分兩路堂堂正正不旬日間美諾重定癸巳冬將軍阿桂統兵由西路進攻其南路則令明亮為副將軍進勦兩路並進所向克捷旬日之間即收復小金川全部谷噶既入馬尼去聲並克豢養旗兵允得其力阿桂等於甲午正月搶占谷噶了口山梁明亮等亦於是時攻克馬尼兩路之兵皆因有八旗徑旅奮勇先登緑營觀感激勸皆效法恐後奏績甚速釃三路進一阻宜喜及紴絨布遇隆而止副將軍營豐升額同舒常於宜喜駐兵與阿桂明亮共成三路苐宜喜之兵攻勦半載未能寸進而明亮則由馬尼攻得木溪卡角及抵庚額特亦阻險而未能進遂駐絨布寨阿桂西路則屢建功羅博淜普逮遜克宗甲午三月阿桂攻克羅博瓦山梁六月攻克色淜普此諸寨並峯峻碉堅賊衆悉力死守官軍皆涉隂鐃攻殱醜甚衆遂臨遜克爾崇喇穆山梁日則了口舉默格爾以擾其後我兵攻克色淜普後賊衆防守益力阿桂偵知喇穆喇穆迤西峯崕陡削賊備禦稍踈因分兵超越進攻盡據其碉並攻克日則了口亦六月中事其後兵進稍阻至十月初復繞道攻得默格爾山梁其榮噶爾博曰爾八當噶之賊皆截於後明亮宜喜亦據嶺梁而復難進徒然望洋宜喜為賊要隘守禦極嚴豐升額舒常攻之一年未下繼而命豐升額改赴西路舒常在彼更不能進甲午夏間明亮在絨布屢攻未進不宜頓兵於無用之地令其分兵七千移改正地明亮遣偵卒往探不見賊蹤難以輕進亦赴西路協勦阿桂扎止之㑹綽斯甲布土司懇明亮駐宜喜并願效前驅明亮乃出其不意分兵冒雨直進遂據宜喜山梁並攻得俄坡格勒古賊因掘濠斷路明亮等復為所阻矣逮昨乙未略康薩爾木思土噶賊卡並毁阿桂自攻得默格爾欲乘勝直進賊復於康薩爾山梁抗拒兩月餘乙未正月阿桂派兵分路前進拔其鹿角連越重濠躍上碉項遂毁其碉殱賊衆四月復攻得木思土噶克了口從此下壓勢益順矣明亮河西亦有所據日旁以前五十里路明亮因逹爾圖之路為賊所斷商之阿桂謂當仍由宜喜一路進攻並派西路兵一千令福康安帶往攻克甲索碉卡海蘭察亦往會攻合力并擊先克撒撒其曰旁右之沙壩山並逹爾圖得楞及溝內之斯木咱爾各賊皆紛紛棄碉遁周圍五十餘里寨落悉行焚燒夾河兩軍聲息可通並請後路遜克爾宗五月中明亮攻克額爾替碉卡可下至平坡六月間復攻克石真噶寨阿桂派兵沿河從赤爾寨攻打隔河之沙爾尼一帶兩崕夾擊聲息可通逮阿桂攻得噶爾丹喇嘛寺等處居髙得勢以遜克爾宗在我兵之後留之非計遂派兵三路分進豐升額督率攻勦或斫寨而入或梯牆而進遂得其碉殺賊無算後路亦肅清矣菑則大海昆色拉枯層層破要步步披嶇阿桂以昆色爾爾喇嘛寺在拉枯喇嘛寺之上於此路尤為扼要其菑則大海亦當並勦分派將領統兵同往其昆色爾山梁最險官兵皆蟻附上得占其碉寨復縱火焚燒拉枯喇嘛寺又攻得菑則大海官兵無不造越而登飛騰而入遂克勒圍紅旗飛遞而何四月大捷未至既克西里乃若建瓴科布曲索隆古不日而傾阿桂於八月十五夜攻克勒烏圍其附近碉卡木城六十餘處一夕無不摧破八日而紅旗遞至木蘭詳見聞捷凱歌及志事詩自奏捷後四閲月雖時有克獲未能深入直至十一月初攻克西里軍聲愈壯而賊勢愈蹙尋即攻得科布曲索隆古山梁並克格隆古兜窩等要隘又掃清安布魯木一帶益據建瓴之勢矣雍中舍齊易如拉朽密圍噶喇依賊其奚走阿桂既由索隆古進攻朗阿古則朗噶克了口等處皆克之並據噶占山梁十二月十七日遂由瑪爾古當噶一帶寨落悉行掃蕩並克舍齊喇嘛寺次日復攻克雍中喇嘛寺即於十九日統兵直檮噶喇依四面圍攻水陸俱斷促浸番衆自攻克勒烏圍以來大小男婦紛紛投出其大頭人布籠普阿納木逹什阿庫魯等遂皆相率乞降並索諾木之母阿倉姑阿青及其姊妹亦皆投至軍營僉云索諾木莎羅奔兄弟并作惡之大頭人丹巴沃雜爾等皆在圍中此蓋逆酋賊黨等罪孽深重天奪其魄驅之一處以就擒也是時河西明亮亦入富德馬邦傳檄芥拾明亮既克阿爾古等寨克取獨古木開通乃當山梁並搗甲雜掃獨松河西一帶悉行勦洗過河㑹阿桂合攻賊巢富德亦將河南北之噶咱普庚額特曽逹等各寨落全行掃清直據馬爾邦亦遣兵與阿桂㑹富德所得之地俱不煩兵力易如拾芥設非西路圍噶喇依則其兩路亦無進期明亮富德兩路向皆艱於攻取而富德久駐絨布尤未能寸進自阿桂既克索隆古乘勝席捲已圍噶喇依各處之賊皆膽破心散望風潰降非果由力戰而得若非西路官兵直搗賊巢則明亮富德兩路仍未有進取之期也諸軍既合火功周遭雖據三穴訖其奚逃然猶死守四十餘日計窮力竭乞命而出官兵四面合圍賊猶負嵎力抗繼用大炮環轟摧其碉卡將士等乘勢克取旁近寨落層層進逼殱賊日多逆酋惶懼遣其兄罔逹克彭楚克次第詣營並即拘繫於是攻圍益急據其近碉斷其水道索諾木窘迫無計遂於二月初四日早率其兄弟莎羅奔甲爾瓦屋雜爾斯丹巴並兩土婦及黨惡大頭人丹巴沃雜爾阿木魯綽窩斯甲尼瑪噶喇克巴並兩喇嘛挈大小頭目男婦二千餘人出寨逆酋跪捧印信乞免誅戮因即悉就擒獲俘獻京師自圍勦以來計四十餘日至是全境蕩平罪人斯得紅旗于二月十二日馳至桃花寺行宫適當告功東陵之期此實仰賴士皇祖默佑益深感敬隨諭將軍阿桂等統成功將擇日凱旋俟東巡回蹕至黃新莊舉行郊勞大典以昭偃武䇿勳之盛金川之功阿桂居首特恩異數加之宜厚征勦金川之役實由將軍阿桂藎誠體國不憚艱勞制勝運籌克成偉績實為此事首功特封為頭等誠謀英勇公加賞雙眼孔雀翎紅寶石帽頂四團龍補褂金黃帶紫轡以昭崇奬能出能入有權有經運長擊短後實先聲金川之功允資羣力寸步層峯氷滑石仄將軍指揮無不奮勇以此破敵鹿埵隴種金川之功非豫所期事弗可已久而得之鬬猶獸困捨懲雞肋念我衆勞至今心惻金川之功允賴上蒼靖彼蕃徼我武維揚勒碑太學用遵成例靜言思之文以志愧石砫㕔在省治東一千六百四十里東西距二百二十里南北距二百四十里東至湖北施南府恩施縣界一百二十里西至忠州酆都縣界一百里南至酉陽州黔江縣界一百六十里北至忠州界八十里自㕔治至京師四千八百里明洪武八年置石砫㕔撫司仍屬重慶府嘉靖四十二年改屬䕫州府本朝順治十六年歸附授石砫宣慰司仍屬䕫州府乾隆二十七年改設流官以同知治此直𨽻於川東道皇朝文獻通考卷二百八十六欽定四庫全書皇朝文獻通考卷二百八十七輿地考十九廣東省臣等謹按馬氏輿地考惟以潮州梅州入古揚州域餘則别列為南越以丑嶺之南即非禹跡所及也周初以南海為藩服其後楚既滅越越子孫散處江南海上是為百越考百越之稱一在禹貢揚州之域史記秦降百越之君置㑹稽郡又以閩越王東海王地置閩中郡是也一在揚荆二州徼外即古南越亦稱百粵又名揚越史記秦并天下略定揚越又漢立尉陀為南越王使和集百越是也禹貢揚州曰淮海說者以為及潮陽之海而止蓋自江西大庾嶺東南羣山綿亘以逹於廣東潮州府之揭陽即揚之南界荆州曰荆及衡陽說者以為及嶺而止蓋自湖南騎田嶺迤西接都龎萌渚越城諸嶺即荆之南界故水經注謂五嶺者天地以隔內外也秦漢以來日漸開闢至我朝德化逺被道一風同自嶺嶠以外文物聲明蔚然極盛洵乎聖治之隆非山川風㑹之所能限已若夫廣東諸郡半皆瀕海昔禹貢言東漸於海而朔南但曰暨者以其未至於海也今則海疆清晏琛賮畢臻若夫小西洋及南洋諸島貢市來往悉取道於廣東長波萬里浮舶不驚斯尤承平之盛軌逈越乎前古者矣廣東明廣東等處承宣布政使司治廣州府領廣州韶州南