body:
  text: 欽定四庫全書皇朝文獻通考卷二田賦考二田賦之制康熙元年諭直省有隠匿地畝不納錢糧或反圗冒功報為新墾者州縣衞所各官及該管上可分别處分是年以山東民地内錯雜竈地有在本省者有在直隸南皮鹽山縣者令巡鹽御史及地方官清丈各正疆界二年除江南崇明縣大糧田加徵蘆課江寧巡撫韓世琦言崇明縣大糧田九千六十頃五十畝零除正賦外復徵蘆課銀八千三百八十餘兩實為一田兩賦亟請蠲豁從之減江西南昌府屬浮糧江西巡撫張朝璘言南昌府屬浮糧係陳有諒横行征派明季相沿今蒙恩卹照袁瑞二府一例減免其漕米一項浮多亦係明季踵行弊政請概行減免從之令直省解京各項錢糧總解户部工科給事中吳國龍言直省解京各項錢糧自順治元年起總歸户部至七年復令各部寺分管催收以致欵項繁多易滋奸弊請自康熙三年為始一應雜項俱稱地丁錢糧作十分考成除每年正月扣撥兵餉外其餘通解户部每省各造簡明賦役冊送部查核其易知由單頒給民間者盡除别項名色各部寺衙門應用錢糧令於户部支給部議如所請從之申明地方官開墾勸懲之例凡督撫道府州縣勸墾多者照順治十五年議敘之例州縣衞所荒地一年内全無開墾者令督撫題叅其已墾而復荒者削去各官開墾時所得加級紀録仍限一年督令開墾限内不完者分别降罰前任官墾過熟地後任官復荒者亦照此例議處又以各省開墾甚多自康熙二年為始限五年墾完如六年之後察出荒蕪尚多將督撫以下分别議處至三年以布政使亦有督墾之責照督撫例議敘府同知通判不與知府同城自勸民開墾者照州縣例議敘四年以限年墾荒恐州縣揑報攤派令停止六年定勸墾各官俟三年起科錢糧如數全完取具里老無包賠荒地甘結到部始准議敘臣等謹按是時海内初平人民未盡復業汙莱之未闢者尚多屢詔地方有司招徠墾治並定勸懲之例一時大吏爭以開墾為功其見於檔冊者順治十八年順天府所屬州縣報墾田一千三百三十九頃六十九畝湖南所屬州縣報墾田二千八百九十頃七十二畝康熙二年湖廣安陸岳州寶慶永州常徳辰州靖州各府州報墾田八百八頃六十畝有奇蘄州岳州九谿茶陵荆右銅鼓伍開鎮谿各衞所報墾田六百頃二十畝有奇三年湖南寶永常辰郴靖六府州報墾田六百三十四頃有奇岳長衡辰常靖六府州續墾田五百十八頃三十六畝湖北安荆等十府州續墾田八百七頃四十五畝有奇雲南省墾田二千四百五十九頃又續墾一千二百餘頃四年湖南長沙衡州等屬墾田三千一百三十三頃六十六畝河南省墾田一萬九千三百六十一頃貴州省墾田一萬二千九頃有奇湖北各府墾田四千七百三十九頃五年河南省報墾田六千六百八十餘頃江西省報墾田二千八百三十五頃又續報墾二千八百三十五頃四十五畝湖廣省報墾四千六百餘頃山東省報墾三千二百三十餘頃六年湖南報墾三千一百九十頃五十畝七年山東報墾一百二十二頃六十餘畝九年廣東報墾復民田一萬七百一十五頃四十四畝墾復屯田三十一頃九十二畝俱照例按年陞科土闢民聚已有成效而聖祖猶慮官吏有捏報攤派之弊或致田不加闢而賦日加増故四年有停止限年之令六年有取具里老無包賠甘結始准議敘之例蓋於鼓舞之中寓覈實之意所以為吏治民生計者至周且悉矣三年以州縣錢糧上司動用差提名為提手種種勒索行令嚴禁倘州縣官將已完那用捏稱民欠並加派私徵者革職其該管官不行叅報者罪之四年諭户部設官原以養民民足然後國裕近聞守令貪婪者多徵收錢糧加添火耗或指公費科派或向户行強取借端肥已獻媚上官下至户書里長等役恣行妄派小民困苦無所申告以後著科道各官將此等情弊不時察訪糾參至於夏秋徵收錢糧原有定期隔年預徵小民何能完納以後預徵著停止又以直省田地荒熟相間恐有隠占著令丈量如有司及里書弓手攤派詐擾令督撫題㕘雲南巡撫袁懋功言滇省地勢髙下絶少平曠丈量地畝雖一州一邑經年累月不能告竣請停止京官踏勘之差從之又以湖廣歸州房縣諸處民歸故業酌給牛種銀不拘次年徵收例令三年補還五年以奉天之白旗堡小河西兩處地畝令民耕種照熟地例輸賦廣寧寧逺兩縣曠地給民開墾不許旗人侵占六年諭各省由單欵項繁多小民難以通曉令嗣後務將上中下等則地每畝應徵銀米實數開明至湖廣陝西二省每糧一石派徵本折數目向未開載行令照例開註其由單報部之期有違限八月者州縣衞所及轉報官均行議處户科給事中姚文然言蠲免災荒除本年應蠲錢糧即於本年扣免外亦有本年納户之錢糧收完在前奉蠲在後則以本年應蠲錢糧抵次年應納正賦名曰流抵欲使人人均沾實惠必須將流抵一項載入由單但部題定例次年由單於上年十一月頒發計該州縣磨算錢糧數目欵項造成式樣送布政司磨對必須在上年九十月間而各撫題報災傷夏災報在六月秋災報在九月計題報到部又需月日部中具覆行查被災分數必候該撫查囘部覆奏允然後行咨該撫又轉行各地方官雖至速已至本年十一月十二月及次年正月二月久已在頒發由單之後矣何從填入乎然流抵不填由單部中所取者地方官印結耳印結出於官吏之手民未盡知也奸胥貪官因此侵冒者不少惟有於流抵之下年填入由單之一法譬如康熙五年免灾錢糧應流抵康熙六年者自應於康熙六年抵免訖即於康熙七年由單之首填入一項内開某府某縣於康熙五年分蒙恩蠲免重災田若干畝每畝免錢糧若干或次災田輕災田合縣共該免銀若干兩除本年已完若干兩外尚該流抵銀若干兩俱於康熙六年分内於原被災本户名下額賦各照分數流抵訖並無官吏侵欺等情此後刋入康熙七年分額丁額賦等項如此則應蠲之分數與抵免之銀數每户各執一單一目了然官吏自無所藉手矣至於蠲免者亦於蠲免之下年由單之首照依此式但改流抵字樣為蠲而已疏上勅部議行免浙江麗水等九縣積荒田賦令地方官招墾成熟起科七年諭户部向因地方官員濫徵私派苦累小民屢經嚴飭而積習未改每於正項錢糧外加増火耗或將易知由單不行曉示設立名色恣意科斂或入私囊或賄上官致小民脂膏竭盡困苦已極朕甚憫之督撫原為察吏安民而設布政使職司錢糧釐剔奸弊乃其專責道府各官於州縣尤為親切州縣如有私派濫徵枉法婪贓情弊督撫各官斷無不知之理乃頻年以來糾㕘甚少此皆受賄徇情故為隠蔽即間有糾舉非已經革職即物故之員其見任貪惡害民者反不行糾舉甚至已經發覺之事又為朦混完結此等情弊深可痛恨嗣後督撫司道等官如有前弊或經體訪察出或被科道糾舉或被百姓告發嚴處不貸至爾部收納直隸各省解到錢糧亦須隨到隨收速給批迴毋得縱容司員筆帖式書辦等勒索作弊苦累解官倘有違法即行舉奏如不行嚴禁察出將堂司各官一併從重治罪停止直省造送黄冊及㑹計冊以各省嵗終奏報有奏銷冊開載地丁欵項數目有考成冊開列已完未完數目又五年編審造送丁口增減冊籍立法已屬詳盡其十年一造黄冊及每年造㑹計冊繁費無益併令停止勅部議墾荒事宜雲南道御史徐旭齡言國家生財之道墾荒為要乃行之二十餘年而未見成效者其患有三一則科差太甚而富民以有田為累一則招徠無資而貧民以受田為苦一則考成太寛而有司不以墾田為職誠欲講富國之效則向議一例三年起科者非也田有髙下不等必新荒者三年起科積荒者五年起科極荒者永不起科則民力寛而墾者衆矣向議聽民自佃者非也民有貧富不等必流移者給以官莊匱乏者貸以官牛陂塘溝洫修以官帑則民財裕而力墾者多矣向議停止五年墾限者非也官有勤惰不等必限以幾年招復户口幾年修舉水利幾年墾完地土有田功者陞無田功者黜則懲勸實而督墾者勤矣疏入下部議行八年諭户部前以爾部題請直隷等省廢藩田産差部員㑹同各該督撫將荒熟田地酌量變價今思既以地易價復征額賦重為民累著免其變價撤回所差部員將現在未變價田地交與該督撫給與原種之人令其耕種照常徵糧以副朕愛養民生之意九年免更名地重徵租銀初直𨽻各省廢藩田産改入民户免其易價號為更名地内有廢藩自置之地給民佃種者輸糧之外更納租銀户部議以久載全書不當蠲免得㫖更名地内自置田土百姓既納正賦又徵租銀實為重累令與民田一例輸糧免其納租至易價銀兩有徴收在庫者許抵次年正賦十年准貢監生員民人墾地二十頃以上試其文義通者以縣丞用不能通曉者以百總用一百頃以上文義通順者以知縣用不能通曉者以守備用凡招民墾荒督撫具題户部核明起科果實送吏兵二部照例分敘其招民不足額數墾地錢糧未經起解假捏出結具題者捏報州縣官革職轉報司道府降四級調用題報督撫降二級調用定廣東新墾屯田荒地照民田一例起科廣東新墾屯田荒地凡三千五百餘頃每畝科米三斗較民田殆多數倍民畏糧重認墾者少故有此令又定浙江溫衢處三府屬官兵開墾荒田三年後起科者改照山東西兵丁墾荒之例再寛限一年起科以地係老荒收薄贍口不敷故也又定四川墾荒升用例時以川湖總督蔡毓榮言蜀省有可耕之田而無耕田之民敕部議定招民開墾之例以五年起科如該省現任文武各官招徠流民三百名以上安插得所墾荒成熟者不論俸滿即升其各省候選州同州判縣丞舉貢監生有力招民者授以署縣職銜係開墾起科實授本縣知縣十二年諭户部自古國家久安長治之模莫不以足民為首務必使田野開闢蓋藏有餘而又取之不盡其力然後民氣和樂聿成豐亨豫大之休現行墾荒定例俱限六年起科朕思小民拮据開荒物力艱難恐催科期迫反致失業朕心深為軫念嗣後各省開墾荒地俱再加寛限通計十年方行起科國初定例新墾田地皆以三年起科康熙十年准三年後再寛一年起科十一年令寛至六年之後至是復再寛之十八年始復六年起科之例二十三年以浙江寧台温三府屬沿海田地給民耕種仍循舊例三年後起科十三年禁王以下不得田獵蹂躪人田禾違者官員以上交部議處白衣人鞭責申明截票之法時以江南有隠占詭寄包攬諸弊吏胥豪猾積習相沿特令通計該州縣田地總額與里甲之數均分辦糧當差不許多占隠匿苦累小民十五年定官民隠田罪例該管官能查出隠田者按地多寡分别議敘凡舉首他人隠地十頃以上者即以其地與之妄告者罪凡從前隠匿之地限文到八箇月自首免罪十八年令州縣日收錢糧流水簿於嵗底同奏銷文冊齎司磨對其嵗造赤厯冊永行停止二十年諭户部直省清查隠占地畝州縣有司或利其陞敘虚報田糧攤派民間致滋苦累亦未可定爾部可檄行直省督撫著嚴行察覈二十四年重修賦役全書以賦役全書成於順治初歴有嵗年户口土田視昔有加其間條目易於混淆命重修之止載切要欵目刪去絲杪以下尾數以除吏書飛灑駁查之弊二十六年書成仍以九卿議舊書行之已久新書停其頒發令所司存貯是年總計天下田土共六百七萬八千四百三十頃一畝有奇衞所田土歸入州縣徵糧者并載扵内田賦銀二千四百四十四萬九千七百二十四兩糧四百三十三萬一千一百三十一石各有奇草九萬八千七百二十一束直隷各府州計五十四萬三千四百三十四頃四十八畝有奇田賦銀一百八十二萬四千一百九十一兩米一萬二千二百一十石籽糧四十三石豆七千三百三十八石各有奇奉天錦州二府計三千一百一十七頃五十畝有奇田賦銀九千三百五十二兩有奇江南江蘇計六十七萬五千一百五十三頃九十九畝有奇田賦銀三百六十八萬一百九十二兩米三十五萬九千八百一十石麥三百二十一石豆五千二百三十九石各有奇安徽計三十五萬四千二百七十四頃三十三畝有奇草山荒山在外田賦銀一百四十四萬一千三百二十五兩糧一十六萬六千四百二十七石各有奇山西計四十四萬五千二百二十一頃三十六畝有奇田賦銀二百三十六萬八千八百三十一兩糧五萬九千七百三十七石各有奇草五千七百八束山東計九十二萬五千二百六十八頃四十畝有奇屋基地在外田賦銀二百八十一萬八千一十九兩麥三萬五千五百四十六石米四十七萬六百八十八石榖七百三十一石有奇河南計五十七萬二千一百六頃二十畝有奇田賦銀二百六十萬六千四兩有奇陜西西安計二十九萬一千一百四十九頃六畝有奇田賦銀一百三十一萬五千一十二兩糧一十七萬九百二十二石草五千九百八十三束各有奇鞏昌計一十萬三千八十七頃六十七畝有奇田賦銀一十五萬三千五百二十兩糧四萬七千六百一十七石各有奇草三百三十四束浙江計四十四萬八千五百六十五頃七十六畝有奇田賦銀二百六十一萬八千四百一十六兩米一百三十三萬七千五百一十二石各有奇又徵銀買漕米八千二百六十石江西計四十五萬一千六百一十頃七十一畝有奇官湖房屋在外田賦銀一百七十四萬三千二百四十五兩米九十二萬五千四百二十三石各有奇湖廣湖北計五十四萬二千四百一十八頃一十六畝有奇田賦銀九十二萬三千二百八十八兩米一十三萬八千一百九十七石各有奇湖南計一十三萬八千九百二十三頃八十一畝有奇田賦銀五十一萬七千九十二兩米六萬五千三百六十六石各有奇四川計一萬七千二百六十一頃一十八畝有奇田賦銀三萬二千二百一十一兩米一千二百一十五石各有奇福建計一十一萬一千九百九十五頃四十八畝有奇田賦銀七十六萬二千七百六兩米一十萬四千八百二十九石各有奇廣東計三十萬二千三百九十二頃五十五畝有奇田賦銀二百二萬七千七百九十三兩米三萬六百四十三石各有奇廣西計七萬八千二十四頃五十一畝有奇田賦銀二十九萬三千六百四兩米二十二萬一千七百一十八石各有奇雲南計六萬四千八百一十七頃六十六畝有奇田賦銀九萬九千一百八十二兩米二十萬三千三百六十石各有奇貴州計九千五百九十七頃一十一畝有奇陸地在外田賦銀五萬三千五百一十二兩糧五萬八千五百三十五石蕎折米八百五十三石各有奇榖折米九十四石臣等謹按以上據㑹典所載是年奏銷實數以順治十八年奏銷數較之凡增田五十八萬四千八百五十三頃六十一畝增賦銀二百八十七萬三千七百一十八兩減糧二百一十四萬八千三百三十四石二十五年令各省不作分數雜項錢糧通歸地丁案内奏銷二十六年諭各省刊刻由單不肖官役指稱刻工紙版之費用一派十窮黎不勝其困嗣後直隷由單免其刋刻晉省由單先經該撫題請免刻亦一併停止明年悉免各省刋刻由單惟江蘇所屬於地丁銀内刋造仍聽冊報如舊二十七年諭嗣後民人有出首開墾田畝不必拘定年限俱自出首之年徵收錢糧該管官亦免其議處是年以淮安徐州鳳陽三處近河地方屯田累民永行停止其現在墾出之田若實係無主給與原墾之人起科若有主給還原主起科又准長沙等六州縣開墾新荒田地於起科之年援例開報其本年開報田地起科錢糧減半二十八年行三聨印票法州縣催徵錢糧向用二聨印票不肖有司與姦胥通同作弊借名磨對稽察將花户所納之票強留不給遂有已完作未完多徵作少徵者今行三聨票之法一存州縣一付差役應比一付花户執照嗣後徵收錢糧豆米等項均給三聨印票照數填寫如州縣勒令不許填寫及無票付執者許小民告發以監守自盜論二十九年諭各省紳衿等優免丁銀原有定例惟紳衿豪強詭寄濫免以致徭役不均而其間山東為尤甚凡紳衿户下田畝不應差徭遂有將地畝詭寄紳衿户下因而衙役兵丁效尤免差更有紳衿包攬錢糧將地丁銀米包收代納耗羨盡入私槖官民皆累著照欺隠田畝例通限兩月紳衿本名下田畝各具並無詭寄甘結將從前詭寄地畝盡行退還業户又以四川民少而荒地多凡流寓願墾荒居住者將地畝給為永業定雲南墾荒地納糧之例雲南老荒田地見納軍糧之人承墾者上中二則照民田下則納過五年再照民田上中二則起科下則照民田下則減半納過三年再照民田下則起科其非見納軍糧之人悉照民田下則納過五年糧加十分之五起科至三十二年以滇省明代勲莊田地照老荒田地之例招民開墾免其納價清丈蘆洲田畝凡蘆洲地畝舊例差委道府等官遍歴清丈以一年造報至是令各該州縣於部文到日半年之内盡行查丈造冊具題三十年令直省各州縣衞所照賦役全書科則勒石公署門外使民知悉明年以貴州兵燹荒廢正當招徠勸墾徐議編審暫停勒石每遇嵗徵先期曉諭三十一年遣官往淮揚等處踏勘民田將應免應升科錢糧確查定議河道總督靳輔言淮揚徐鳳衛所州縣各有開河築堤建牐栽柳之處俱係民間納糧地應蠲免錢糧其黄水涸出及河旁淤成膏腴地豪民占種不納賦者應查出升科請勅江南督撫就近清查得㫖此事若遣地方官踏勘恐借端擾民著遣部院堂官前往會同該督撫確查定議令民間隠匿田畝限一年内盡行自首至三十四年令各省自首隠匿地畝再寛限一年三十二年招徠西安等處流民復業每户給牛一頭並犁具銀共五兩穀種銀三兩僱覓人工銀二兩布政司照數支給該撫將所招民數冊報不論旗民照奉天招民例議敘三十三年清丈福建沿海地福建沿海界外田地歴年既久界址混淆至是令將福州府之閩長樂連江羅源興化府之莆田仙逰泉州府之晉江南安惠安同安漳州府之龍溪海澄詔安福安福徳等縣及福寧州沿海地概行清丈三十四年定雲南清浪衞業經清丈田地每十畝科糧一石三十五年嚴湖南省大户包攬納糧之禁先是湖南省里甲有大户小户之名凡小户糧賦俱大户收取不令小户自封投櫃甚有驅使之如奴隷者令嗣後將小户開出别立里甲造冊編定身自納糧如有包攬抗糧勒索加派等弊該督撫題㕘治罪三十八年以湖南幅員遙濶履丈難徧先令民自丈出首官查抽丈如有隠漏治罪明年湖廣總督郭琇陛辭奏曰湖南民稀地廣民或不能完課遂致逃避者有之清丈之後錢糧似比前差減矣上問減幾何琇奏曰約減十分之二上曰果於民有益所減雖倍於此亦所不惜若不清丈以荒田著落他人徴收錢糧有累窮黎斷不可也三十九年設立徵糧滚單凡徵糧立滚單每里之中或五户或十户止用一單於納户名下注明田畝若干該銀米若干春應完若干秋應完若干分作十限每限應完銀若干給與甲内首名挨次滚催令民遵照部例自封投櫃不許里長銀匠櫃役稱收一限若完二限又依此滚催如有一戸沈單不完不繳察出究處臣等謹按是時徵糧之弊上下科派名色不一有合邑通里共攤同出者名曰輭擡有各里各甲輪流獨當者名曰硬䭾豪民奸胥包攬分肥大為民累及滚單之法行簡易明白吏胥不得侵漁天下便之四十一年以山東明藩荒地給民墾種山東有前明廢藩基地可墾者三頃四十八畝有奇民人情願納價每畝納銀五兩自四十二年起科給一印帖守為恒業四十二年令各省州縣徵收串票内將漕項地丁數目分别註明毋許混朦徵比四十三年嚴墾荒隠捏之禁各省墾荒田地如地方官隠匿入已巡撫不行嚴察止據各州縣捏報具題該督即行題參並將不行稽察之司道府一併㕘處四十四年酌改江蘇經徵各官處分時以蘇松常鎮四府賦税繁重於奏銷時不能完全者量為輕減焉又以湖廣省屬大半濵江嗣後有修築隄塍地方官將隄身所壓之田及就近取土之地丈明畝數估定價值攤銀補償本主毋致民間偏累其江夏等十八州縣上年丈過已坍地畝課銀三百六兩准其開除准開墾湖北荒地湖北民人願墾荒地准其開墾無力者本省文武官捐給牛種開墾俟該撫將墾過地畝之數具題日議敘四十五年江西九江府丈出濱江蘆洲地畝三千七十一頃八十九畝二分有奇皆係新淤泥灘草地定為下則起科四十六年定閩省墾荒之限以閩省蕩平二十餘年民人俱已復業其未墾抛荒田地二千六百餘頃至今尚未足額令勒限一年照數墾足徵糧如再遲延該督撫將地方官一併題㕘四十八年以湖南欺隠田地日久未清行令該撫准其展限一年將欺隠田地在限内盡行首報免其治罪如逾限不首者許里民等據實舉首將田入官追徴積逋仍治欺隠之罪倘扶同不舉並坐以罪五十一年諭湖廣四川巡撫民人有自湖廣往四川種地者各於往囘時造冊移送時湖廣民人往四川開墾者甚多去時將原籍房産地畝悉行變賣至五年起徵之時復囘湖廣將原賣房産争告者甚多嗣後湖廣人民有往四川種地者該撫查明年貌姓名籍貫造冊移送四川察核有自四川復囘湖廣者四川巡撫亦照此造冊移送湖廣互相查對又諭嗣後山東民人到口外種地者該撫查明年貌籍貫造冊移送由口外囘山東者亦查明造冊移送該撫覆閲令清查四川隠漏田賦四川巡撫年羹堯言四川錢糧原額一百六十一萬六千六百兩零四十九年現徵錢糧僅有二十萬二千三百兩零甫及原額十分之一蓋積弊已久官借首糧之名需索民錢以致民間首報無多宜立勸懲之法五年内各州縣有增及原額之四五分者准陞不及二分者停陞不及一分者降調無增者革職尋御史段曦言勸懲增賦之法未能無弊川省自明季兵燹之後地廣人稀本朝平定以來雖屢經清查增報而康熙四十九年現徵錢糧甫及原額十分之一且以撫臣之近日加意催查增至二萬六千餘兩亦不過增見糧十分之一耳今欲五年内增及原額十分之二及十分之四五是增見糧之三倍四倍也賢能之員必罹不及分數之參處而不肖有司希圗陞進或且抑勒首報滋擾無窮請將川省錢糧隠漏徹底清查而勸懲可以不立祗宜嚴飭有司實心勸首里民紳士有田無糧隠匿不報者罪如不肖官藉此累擾地方通同侵隠以及抑勒情弊該督撫即行參奏從之五十二年户部議原任偏沅巡撫潘宗洛疏請墾荒展限應行文接任巡撫查明詳議上曰督撫條陳地方事務應據實陳奏潘宗洛奏湖南荒地五百餘頃今天下户口甚繁地無棄土湖南安得有如許未墾之地著差户部司官一員會同總督就潘宗洛奏疏内所有州縣查勘詳明具奏又諭曰湖廣陝西人多地少故百姓俱往四川開墾聞陝西入川之人各自耕種安分營生湖廣入川之人每與四川人爭訟所以四川人甚怨湖廣之人或有將田地開墾至三年後躱避納糧而又他往者今四川之荒地開墾甚多果按田起課則四川省一年内可得錢糧三十餘萬朕意國用已足不事加徵且先年人少田多一畝之田其值銀不過數錢今因人多價貴一畝之值竟至數兩不等即如京師近地民舍市廛日以增多略無空隙今嵗不特田禾大收即芝蔴棉花皆得收穫如此豐年而米粟尚貴皆由人多田少故耳朕巡幸時見直隷自范家口以下向年永定河衝決之處今百姓皆築舍居住斥鹵變為膏肥不下數十百頃皆未嘗令起税也又江南黄河堤岸至所隔遙隄有二三里者亦有六七十丈者其空地先皆植柳以備河工取用今彼處百姓盡行耕種亦並未令起課昔黄河泛漲時水常灌入遙隄不得耕種自清水暢流以來河底刷深水必長至二丈方能及岸遙隄以内皆成沃壤矣又去年趙申喬條奏黄河近邊被衝田畝請查明數目蠲免錢糧不知黄河東岸刷則西岸之田出西岸刷則東岸之田出被衝之田應免錢糧則新出之田不應取錢糧乎朕下此諭㫖欲使知朕於各省事無不洞悉也今遣官勘騐湖南荒田亦此意耳五十三年准甘屬村堡之中有荒地未種者查出撥於無地之人耕種并動庫銀買給牛種五十五年陝西赤金達里等處地方招民捐墾議政大臣等議覆吏部尚書富寧安言巡撫綽奇前往看閲肅州迤北地方可以開墾之處甚多酌量河水灌溉金塔寺地方可種二百石籽種自嘉峪關至西吉木地方可種一百三十石籽種達里圖地方可種一千一百餘石籽種方城子等處地方可種五百餘石籽種查今嵗西吉木達里圖布隆吉爾三處耕種共收糧一萬四千餘石布隆吉爾係沙土之地明年應停其耕種至西吉木達里圖及金塔寺等處地方請動正項錢糧派官招民耕種應如所請從之皇朝文獻通考卷二
