body:
  text: 欽定四庫全書皇朝文獻通考卷五十五選舉考九舉官臣等謹按馬端臨舉官考有云三代兩漢舉士與舉官合而為一士之獲舉未有不入官者也至唐以試士屬禮部試吏屬吏部於是科目舉士銓選舉官區為兩事至吏部主文選兵部主武選則舉官之内又分兩途竊見晉時山濤甄拔人物各為題目號稱啟事夫以天下人士仰品鑒於吏曹以俄頃之周旋定才行之優劣甚至鑽營倖進權在私門晉唐以來宋金元明千數百年此弊未革我朝創業之初詔求賢俊凡貝勒以下咸得各舉所知即一介之微亦得以其所識薦達御前並邀録用我聖祖仁皇帝立賢無方兼收並採惟停止會推之例以杜絶黨援世宗憲皇帝時屢詔廷臣薦舉或密緘書名或露章奏達温綸疊下公聽並觀蓋舉賢之途既廣則事出於公非如往代九流人物衡鑒之權盡歸銓部俾海内賢才决於掌選者一人之耳目也我皇上御極以來權衡銓次損益因時滿漢文武職官各得其叙凡選法之畸輕畸重者斟酌調劑必合乎審量之平自是注品有崇卑序次有前後例之所定一成而不易雖其親暱不得以意為重輕而吏胥之徒亦無從舞弊誘惑選人此則我朝之大經大法度越漢唐垂萬世而無弊者也臣謹依類編次備舉官之典故云太祖高皇帝乙卯年奉諭㫖君天所立也臣君所任也爾諸臣敬念乃職凡有賢才可任國政者知之勿隠國務殷繁必得賢才衆多量能授職倘治國治兵經理乏才何以濟事故勇能攻戰者宜令治軍才優經濟者宜令理國博通典故者宜諮得失嫺習儀文者宜襄典禮若兹賢才當隨地旁求俾列庶位是時上既削平諸國每三百人設一牛录額真五牛录設一甲喇額真五甲喇設一固山額真每固山額真左右設兩梅勒額真初設有四旗旗以純色為别曰黄曰紅曰藍曰白至是添設四旗㕘用其色鑲之共為八旗特命羣臣選舉賢才以備任使天命十年奉諭㫖大臣身秉國政知有公忠之人雖仇勿隠當直指其善知有姦慝之人雖親勿䕶當直指其惡蓋公忠之人當國家締造時身厯艱險創立功名輔成大業固當身履榮顯澤及子孫姦慝之人當經營國事之日借端委謝避害全軀逮國運昇平反欲先蒙其利此宜預設防維毋使遂其巧詐夫國豈常憂患必有安樂之時惟能憂其憂乃能樂其樂也天聰三年上選用儒臣分班侍直巴克什達海同筆帖式剛林蘇開固爾瑪琿托布齊等四人繙譯漢字書籍巴克什庫爾纒同筆帖式烏巴什查素喀瑚球詹霸等四人記注本朝政事以昭信史八年甲喇章京朱繼文之子延慶奏曰臣聞時不當進而進者謂之棄身時當進而不進者謂之棄時伏覩皇上東服朝鮮西滅察哈爾餘孽惟明人耳今秣馬厲兵行將馳驟中原實大事將成之時豪傑効力之日也臣思我國之攻城破敵斬將搴旗者實不乏人守境治民安内攘外者槩未多見往年遵化永平之役得有四城而隨以鮑高寗范分守其地假使再獲數城即㨂擇於漢官中而倉猝之際恐難名實相稱也大抵揣摩於平日者庶可擔當於一旦而不靡臣又聞盡忠莫如進賢故陳平非魏無知不得封列侯管仲非鮑叔牙不得為伯佐此猶往蹟即今事亦有可矜式者寗㕘將以貝勒家僕薦舉數人一從征俱獲顯官固伊等之才能超軼亦皇上釣餌賢豪之計善也臣實庸愚不敢自薦臣有二友又不敢自隠今畧言其行止伏惟睿鑒佟三下陳極新剛果鄭重明理知幾且友於弟孝於母一家藹如能治其家未有不能治其國者也刑部啟心郎申朝紀温雅正直練達世務處家儉而守身約訥於言而敏於行視之若木實足肩鴻任巨也兹二人者雖不能跨步前儔亦足尾其後塵皇上召至御前詢以時務攜之從征試以任使倘若臣言差謬願甘欺㒺之罪臣又聞建大厦者非一木之力成大功者非一人之畧是以臣竭忠冒死而有此奏上覽畢召朱延慶並所舉陳極新申朝紀至謂延慶曰爾所奏之言俱善凡人建言必實指曰某也賢某也不肖於任國政諸大臣必實指曰某大臣能稱厥職某大臣惟利是圗某狥庇所私之人某傾害所惡之人務直指其名以奏凡人於國之賢才皆得薦舉毋曰何賢才如此衆多朕猶以為未足也爾等知其賢而舉之使或變其初心後為不善亦彼自為不善耳於舉者何與焉今朕將録用爾等於是令延慶陳極新於文館録用以申朝紀原係部臣仍令在刑部辦事九年奉諭㫖爾滿漢蒙古各官暨凡有識見人知才堪任事者即行舉薦勿分新舊或已仕未仕但有心術公正克勝任使之人呈送吏部有通曉文義心術公正足備任使者毋分已仕未仕呈送禮部該部貝勒奏聞朕將量才酌用才全徳備之人豈能易得但能公忠任事則善崇徳七年新設漢軍八旗選官補用始編漢軍為八旗各設牛录章京上諭曰漢軍旗内新設官員應用之人賢否朕未悉知著該部王大臣同漢軍固山額真梅勒章京等遴選用之於是多羅睿郡王多爾衮鎮國將軍承政阿拜㕘政滿朱錫禮啟心郎索尼等與漢軍固山額真梅勒章京公同遴選請㫖補授順治元年順天巡撫宋權獻治平三策一廣羅賢才以佐上理併薦故明薊遼總督王永吉等旋飭廷臣各舉所知於是天津總督駱養性侍郎王鼇永左春坊左庶子李若琳吏部左侍郎沈惟炳等並有薦舉令詳註履厯陳奏下部知之嗣以廷臣所舉類多明季舊吏及革職廢員未有肥遯山林隠跡逃名之士令自今以後須嚴責舉主所舉得人必優加進賢之賞所舉舛謬必嚴行連坐之罰至於薦舉本章止許開具鄉貫履厯其才品所宜應聽朝廷定奪不許指定某官坐名何地無論貴賤逺近隠顯升沈果有灼見真知悉許薦舉倘以貲郎襍流市傭村叟及革黜青衿投閒武弁妄充隠逸以致流品不分選法壅滯如前朝保舉故事咎有所歸若畏避連坐困而緘黙不舉者亦必治以蔽賢之罪六年大學士洪承疇奏言平治天下之道在於各省督撫總兵俱得其人欲用得其人宜實行保舉連坐之法如督撫總兵員缺令吏兵二部滿漢堂官詳加評註自書姓名保舉再以諮詢左右大臣議論相合方行㸃用俟後有功效保舉者受薦賢之賞若曠職僨事保舉者受妄昧之罪庶封疆民生兩有攸賴得㫖嗣後用督撫提鎮著内院九卿會推若有獨知灼見情願保舉者許自行保舉得人者陞賞誤舉者連坐又刑科給事中陳調元奏言朝廷之賞罰惟憑督按之舉劾而舉劾之公私全憑道府之開報乃有督臣所薦即按臣所劾者疏内皆云據司道開報夫一人也一以為大賢一以為不肖一揭也忽而加諸膝忽而墜諸淵夫朝廷用人止此舉劾以為察吏致治之本而舛錯至是則督按之耳目安寄國家之賞罰何憑伏祈嚴飭確核開報同異之弊立加處分庶勸懲當而吏治清矣下部院察議又吏部尚書陳名夏等奏言舊例各省道府州縣等官俱俟三年考滿方准陞遷今地方需人若必待考滿勢難懸缺應將各省道府州縣等官厯俸三年撫按有薦者酌量推轉從之九年大學士范文程等疏奏翰林詹事等官陞補畫一之法修撰編修檢討按科分先後資序陞轉凡奉差及終養丁憂治喪依限到京者仍照科分資序違限者計所違月日序於後給假告病者槩序於後降補别衙門復回者俱照現補官品為序永著為例又吏部奏言通判員缺除裁減外所餘不多而節年貢生考定應授兹銜者積至八百餘員挨次銓補其或終身無望請照品改授布政司經厯正副理問按察司經厯知事布政司都司運司經厯運判各府經厯京縣外縣丞外衛經厯等職仍支正六品俸照通判資格陞轉以疏壅滯從之又奉諭㫖銓部職司用人凡有銓選應用才能今朕聞有援引親黨及納賄營私者此風斷不可長嗣後務矢公忠慎擇才能選授使庶司百職俱得其人則朕心安而部臣亦得自慊矣十年工科給事中劉顯績奏言自古帝王左史記言右史記動期昭示當時垂法後世乞設立記注官凡有詔諭及諸臣奏啓皇上一言一動隨事直書存貯内院以為聖子神孫萬世法則報聞十一年奉諭㫖朝廷設内外諸司所以代天工理庶務無論文武衙門大小官員各有責任聞官多缺員皆困吏胥作姦朦混沉壓上下其手竊弄事權求索賄賂吏胥之弊司官不舉司官之弊堂官不察因循延緩日復一日以致弊竇叢生甚至有頻年困頓流落旅邸不得一官者人才淹抑政事廢弛皆此之故今後爾等兩部務須正已率屬剔弊釐姦各該司官務洗心滌慮奉公守法毋得縱役夤縁仍蹈前弊以取罪戾滿漢各官當互相砥礪勉圗職業將現在内外文武大小員缺作速詳察盡行推補務俾人才効用政事修舉稱朕承天愛民至意又奉勅選舉漢軍内外官員有才學品行者數員又奉諭㫖朕念時方用人才不易得不忍以一言偶誤遂致沉抑前有恩詔詿誤官員許該衙門奏明寛宥未盡奉行向來科道各官有因條陳國事所言不當以致降級革職或因糾㕘内外官員事虚反坐以致降級革職者爾部詳察始末縁由明白開列進奏吏部開列科道言事不當革職者具奏得㫖復原官者六人工科給事中張王治條奏六曹除吏部外禮兵則陞道員户刑工則陞知府同𨽻部屬事有異同嗣後並宜道府兼陞從之十二年吏部議覆吏科都給事中朱徽疏言吏部司官一年内陞一人外轉一人科員一年内陞二人外轉二人御史二年内陞三人外轉三人司道除陞巡撫外每年亦内陞三人其司道内陞滿洲不論科目漢人仍以科目出身為限必查其曽舉卓異俸薦俱優者方准内陞此外若又有缺出則以在京衙門應陞之人補用從之又奉諭㫖知府乃吏治之本其最要者如直𨽻之真保河間江南之江寧淮揚蘇松常鎮浙江之杭嘉湖紹山東之濟南青兖山西之太原平陽河南之開封彰徳陜西之西安延安江西之南昌吉安湖廣之武昌荆襄福建之福州泉州共三十府或政事殷繁或地方扼要著在京各衙門滿漢堂官三品以上及在外督撫各舉才行兼優堪任知府者一人詳開履厯事蹟具奏吏部再加察議奏請定奪以備三十處知府之用厯代州縣之制自漢以來皆以人户分大小隋有閒劇衝要之等唐有赤畿望𦂳之差明時因之酌為繁簡定有成例隨才器使各盡其用著吏部詳察舊例㕘酌時宜將地方分為三等具疏奏奪應選官員考其身言書判精加㨂擇亦各三等具奏上等者列名引見候朕面定方將上等之缺從公掣籖其考居二等者授二等地方三等者授三等地方不必引見俱從公掣籖務使州縣各官人地相稱至有司賢否全憑督撫舉劾近乃上下扶同以餽遺之厚薄情面之大小顛倒貪亷吏治因之大壞以後責令司道府推一應官評務要細開事蹟轉報督撫逐件確核如開報不實即先指名題㕘至督撫止憑開報不親自體訪覈實以致賢否混淆事發一體究治臣等謹按唐開元中定天下州府以近畿為四輔其外為六雄則鄭陜汴綘懐魏六州是也又為十望宋亳滑許汝晉洛虢衛相十州是也元有上路下路之别有上縣中縣下縣之分明有上府中府下府之等縣亦如之張九齡論唐時以牧守之任為斥逐之區宋天聖間令選猥下士大夫輕其選或選而不注者有之我朝定鼎之初首重民事是以守令之任慎選其人於各省府缺最要者凡三十府預為簡擇以備任使蓋其時真保河間及太原平陽西安開封所轄最廣餘皆各省繁重之區於天下知府中為最劇非才力素優不足以勝師帥之任縣分三等各視其所考之等授之國初時吏部注選世祖章皇帝特令上等之缺列名引見恭候欽定由是列聖相承凡郡守牧令之選奏名廷陛無不引見之員各省府州縣定為衝繁疲難等缺有四字相兼者有三字者有二字一字者知府員缺有請㫖者有部選者部選中又有繁簡之不同例得於授官後及報最時具摺謝恩請訓召見殿墀於部選初授者觀其應對以覘異日之政聲凡督撫保題者詳其任内實蹟所至地方情形以徵治行之優劣其稱職與否總莫逃洞鑒焉至於牧令籖掣後繕冩名籖聖心簡别量予調補及抵任時各省要缺仍令督撫可以専摺奏請更調蓋斟酌衡量因時因地各得其宜而郡縣官人之法於斯為大備焉又吏部遵諭議奏在外官員應陞州縣者其身言書判無從考察今後凡司府首領州縣佐貳及教職等官中有堪任上等者該督撫巡方特薦臣部覆核無異方陞上等之缺其尋常俸滿有薦應陞州縣正官者舊人不論科目漢人進士舉人俱以中缺補用其俸滿無薦者舊人及漢人進士舉人並貢士俱以下缺用從之又吏部奉諭㫖國家官人原當内外互用以勵羣材近見外官内轉京官外任者多能稱職宜再行互用除翰林官員朕自裁定其六部卿寺等衙門官員有才優經濟堪任養民者著各堂官開列六科官員著吏科開列各道御史著都察院開列通送吏部會同都察院察核速奏其在外司道等官品行著聞政治卓越者確察實蹟遇缺内轉務使内外得人職事修舉以副朕圗治安民至意旋以侍郎等官及科道官俱𫝊諭親加裁定分别酌用遇缺即補吏部議翰林官外陞職銜正詹以布政使用支正二品俸少詹以布政使用侍讀學士以按察使用侍讀中允以㕘政用編修檢討以副使用侍郎副都御史通政使大理寺卿以布政使用支正二品俸太僕寺少卿順天府府丞以按察使用光禄寺少卿以㕘政用六科左右給事以副使用給事中以㕘議用監察御史以副使用從之又吏部奏考選御史舊例在内則用中書行人評士博士在外則用俸深累薦推官知縣如急缺乏人則取厯俸二年以上中行評博及各部主事等官奏明請㫖今科道缺員太多應將在内中行評博及五部主事厯俸二年以上者咨取考補十員餘缺於在外推知内查厯俸三年薦有三次者咨取考選至内院中書應否考選伏候上裁得㫖内院中書不准考選科道著為令十五年七月以行取各官未到暫於各部郎中員外主事察取才品堪用者改授御史至十七年四月議准俸滿中行評博與俸滿未經考選陞主事者一并開列職名與行取推知一體考選又都察院題請考補順天巡撫按得㫖此員缺著照例察取應考官員候朕親選以後科道官考選差遣内陞外轉俱候朕裁定永著為例十三年吏部議覆管尚書事王永吉疏言考選本部司官遇各省缺出於外取俸深有薦及卓異推知於内取中行評博及五部主事未經考選者一同選試從之又停保舉優陞大府知府例十四年奉諭㫖向來屢次考選俱行取俸深保薦有司其乙未科進士外任各員因資俸在後行取未及今著於乙未科進士推官知縣内詳察年力精壯能修職業者行取來京朕親加考選酌用十五年吏部議覆科臣姜希轍疏言凡應陞補方面各官投文到部必隔三推方許推補以杜擇缺趨避之計至陞授知府定例遇知府缺出查内外應陞官陞補遇道府缺兼出俱選郎中但郎中數少各府同知及知州并加級知縣數多未免壅滯今議一道一府應選郎中如知府缺少照道缺分配陞補郎中外其餘府缺仍以内外應陞官陞補從之十六年吏部定議翰林官外轉例除侍讀學士侍講學士以上照常陞轉外侍讀以下應照科道例每年外轉二員春季一員秋季一員侍讀侍講以㕘政用修撰以副使用編修檢討以㕘議用從之又吏部奏言降級候補官員或有人無缺或遇缺出品級同而降補之人出身資格不同碍難遽補應俟人缺相當補用得㫖官員初授應照出身資格既經降處著遇缺即補不必仍論出身資格十七年吏部奉諭㫖巡按御史職司察吏安民所屬官員差滿例應薦舉近覽部覆福建按撫李時茂舉劾方面疏稱道員宋杞等厯俸俱未滿一年李時茂方任巡方薦舉定例豈有不知今違例濫及殊屬不合著嚴加考核議處宋杞等不應薦而獲薦其中豈無請託情弊著一併嚴察議處嗣後違例薦舉者并所薦之人俱照此例一體嚴加處分十八年定沿海之地照邊俸陞轉浙江台州府屬之臨海黄巖太平寧海温州府屬之永嘉樂清平陽瑞安寧波府屬之鄞縣奉化定海象山俱作邊俸其三郡之道府㕔各員一體照邊俸陞轉又吏部奏巡按已經停差其地方事務俱交巡撫管理今議定巡撫薦舉額數順天巡撫應薦方面官一員有司佐貳官共三員教官三員保定巡撫應薦方面官一員有司佐貳官共五員教官五員江寧巡撫應薦方面官二員有司佐貳官共三員教官三員操江巡撫應薦方面官一員有司佐貳官共三員教官三員鳯陽巡撫應薦方面官二員有司佐貳官共四員教官四員山東巡撫應薦方面官二員有司佐貳官共六員教官六員河南巡撫應薦方面官三員有司佐貳官共七員教官六員陜西巡撫應薦方面官四員有司佐貳官共七員教官六員甘肅巡撫應薦方面官一員有司佐貳教官共二員延綏巡撫應薦方面官一員有司佐貳官共二員教官一員寧夏巡撫應薦方面官一員有司佐貳教官共二員浙江巡撫應薦方面官三員有司佐貳官共六員教官五員福建巡撫應薦方面官二員有司佐貳官共四員教官四員江西巡撫應薦方面官三員有司佐貳官共五員教官五員南贛巡撫應薦方面官二員有司佐貳官共三員教官二員鄖陽巡撫應薦方面官一員有司佐貳官共二員教官二員湖廣巡撫應薦方面官四員有司佐貳官共七員教官六員偏沅巡撫應薦方面官三員有司佐貳官共四員教官三員廣東巡撫應薦方面官三員有司佐貳官共六員教官六員廣西巡撫應薦方面官二員有司佐貳官共四員教官四員四川巡撫應薦方面官三員有司佐貳官共七員教官六員貴州巡