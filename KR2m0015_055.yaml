才振興吏治今後科道缺出可移文督撫就有司内舉賢能夙著者咨部爾部詳核具題行取來京朕親選用每嵗宜行取幾人爾部酌議以聞尋議行取知縣既咨行各省令將才能夙著者選送若預定員數或人不及額而庸流得以濫充或人浮於額而賢者無由盡舉嗣後應停其定數凡知縣内有卓異薦舉無錢糧盜案者列名咨送如無卓異薦舉之員將厯俸三年無錢糧盜案才能夙著者令該督撫詳確選擇列名咨送臣部詳核具題行取來京考選以科道用者註册以次題補用完之日再行具題行取若無才能官員不必充數濫送督撫有咨送非人及錢糧盜案未結之員者治以狥情之罪從之八年刑科給事中張登選疏言提鎮統轄將領捍衛地方其權甚重不可不公同選擇請照順治年間定例提督總兵官仍著九卿會推開列恭候簡用至武官功績令兵部逐一詳開九卿會同查核則無功者不致倖進矣得㫖提督及總兵官統轄邊疆地方闗係重大以後缺出將應補授官員兵部册内所載功績逐一開列著九卿科道會推又廣西道御史戈英疏言近者銓部復行寄凴之法其弊匪一有縁事已故而仍選者有懸缺一二年者有人南缺北寄凴赴任往返萬餘里者有在籍物故地方官失於詳報致㕘罰受累者有業經報部憑已先發咨回另選者種種遲誤難以枚舉且在籍候選其人之衰老病癈部臣何由得知及曠職誤事始行㕘黜貽害已多與其㕘黜於後何如慎簡於先况在京候選者見奉有投供㸃卯該部詳閲老病之例掄才器使莫善於此臣以為在外候選各官亦宜倣行此法請查覆舊章停止寄憑槩令赴部投供㸃卯仍飭部臣詳閲斥汰衰邁庶銓選得人而事理可垂久無弊下部確議尋議嗣後凡初授官員約計一年内缺出多寡將奉㫖即用併年分在前者截取令人文到部候選其候補官員原無截取之例亦令人文到部始行補用從之又兵部奏各省提鎮所闗甚重以後提督缺出應將八旗副都統現任總兵官内論俸分缺推選其阿思哈尼哈畨阿達哈哈畨既令陞補副都統㕘領遇提鎮缺出應停止推選從之又吏部奉諭㫖朕思部院事務殷繁諸司官職掌必得賢能方克勝任今爾部但就部院現任官員調補其隨旗上朝者豈無賢能可備擢用乎可諭滿洲漢軍都統副都統等於輕車都尉以下雲騎尉以上有明習滿文或通曉漢文夙具才幹堪任部院者從公詳擇一旗數員咨送爾部俟各旗缺出與應陞者並題補用九年兵部奏近見總督提鎮每遇標員缺出不問地方緩急不論銜缺相當輒將標員坐名題補其中恐有情弊且使厯俸年久及在部候補之人益多壅滯請飭該督提鎮嗣後將副將以下守備以上缺出實係近海沿邊巖疆果屬人地相宜酌量題補外其餘員缺不得概行題補從之又定推陞大選例凡推陞大選缺出將雙月所出之缺彚算如出十缺陞補二人大選八人如出七八缺陞補一人餘缺俱歸大選仍註明冊内與下月所出之缺合計陞補十年停止會推推陞之法順治九年議准尚書侍郎都御史副都御史宗人府府丞通政使大理寺卿内閣學士掌院學士等官俱由會推至是停止將應陞轉各官開列具題凡九卿京堂翰林吏部科道内閣中書及在外布按鹽運使各官遇缺當補即行單題凡部寺屬官及方面有司佐貳雜職缺出掣籖逐月彚題是時惟外省藩臬間一奉㫖推舉至五十一年盡行停止臣等謹按會推之制始於明時定制之初未始不以登明選公為説迨其後則仍以一二有力大臣􅋵其魁柄而下此皆附和之有異議者中以他法亦無能自辨此正昌黎韓愈所云大官臆决唱聲萬口一辭者也沿至故明末造以政府廷推黨同伐異争勝負於口舌之間元黄反覆而國勢隨之我朝祖宗以來乾綱獨斷綜攬化權當闢門籲俊之時未嘗不博採逺詢廣求賢哲而欲以同聲標榜互為進取之地則有所不能蓋至是凡大學士尚書左都御史侍郎副都御史宗人府府丞國子監祭酒等員缺暨直省總督巡撫停止會推將應陞應轉各員開列具題恭候欽定諸臣心跡已體察於平時而聖主權衡更折衷於臨事既省公私之傾軋并無恩怨之牽縈而黨援門戸之風亦從此永息矣十一年吏部議覆河南道御史嚴曾榘疏言凡異途出身之人不得以正印官用果有才能稱職之員該督撫特疏保舉吏部方以正印推陞此定例也但保舉異途人員不開列事實恐庸才得以冒濫請嗣後令督撫於疏内開列事實以憑查核應如所請從之十二年吏部奉諭㫖向來定例外官告病不准起用原以防其規避但其中才品優長政績素著者迫於一時至情引例告歸終身棄置深為可惜宜令地方督撫確行咨訪果有才品堪用者據實保奏以憑擢用又吏部兵部奉諭㫖國家用人宜先沉静之才人臣服官首重㢘恥之節邇來文武官員或因不得陞遷或因不與差遣輒稱寃抑紛紛控告不過圗便已私原非從公起見縱屬應陞應差而自為辨白希求榮利㢘恥之道已虧豈能修舉職業克副任使理宜嚴禁以肅官常十三年准四川省知府以下員缺聽該督酌量題補十四年吏部議覆刑科給事中劉沛先疏言直隸各省行取知縣督撫薦牘有卓異有薦舉有才能列為三項而京官考選獨無差等請於各衙門咨送時論俸之中分别等第宻咨開送應如所奏嗣後科道員缺行取在内五部主事中行評博俱令該衙門堂官於俸滿官員内開送賢能之官如濫送者照督撫濫舉之例處分從之十五年停止陜西十五年薦舉以地方新復官屬未經詳察從督撫等請也停止浙江十五年薦舉以連年用兵新任之員未能即定賢否從督撫等請也十六年吏部議覆雲南道御史陸柞蕃疏言河道闗係重大必得才能熟練之員始能勝任嗣後凡河工道員缺出内而部屬外而知府同知果有曽任河職盡心河務者令總河保題其未任河職才品優長該督所深悉者亦許題請至現任河員果能盡心河務俸深陞授他職者許以陞銜題留原任陞轉時仍照所陞之職陞用應如所請從之十七年都察院右副都御史金鋐疏言向因用兵各省需員甚急故聽督撫坐名題補惟地方最緊要者聽其保舉題請近見保舉一人不曰輕車熟路則曰人地相宜既有保舉字様不得不從臣恐效尤奔競狥情百出嗣後除用兵地方仍聽督撫保舉外其不用兵凡題補保舉應行停止疏入下部議尋議非用兵之地無得保舉題補其保舉之官如有不稱職者仍治督撫濫舉之罪從之十八年都察院左都御史魏象樞疏薦清㢘十人得㫖依議補用原任知縣張沐陸隴其係保舉㢘能之員如直𨽻清苑江南無錫等縣最稱繁劇難治必用之此等地方庶其才可以表見十九年四川道御史張志㨂疏言各部主事不係正途出身者請令各部堂官保舉方許陞轉九卿議不准行上曰各部主事日後皆陞道府與其俟為道府後令督撫保舉何如為主事時即令堂官保舉之為愈耶今後應令不係正途出身之主事厯俸三年果能勝任該衙門堂官保舉方許陞轉二十年諭大學士等曰科道官職司耳目行取知縣内如有曾受偽職之人名義已壞科道不當選用爾等識之又吏部議覆湖廣道御史房廷楨疏言捐納嵗貢終非正途不應考選科道應如所請又督撫子弟應照在京三品京堂子弟例亦不與考選應不准行得㫖漢軍漢人捐納嵗貢俱不准作正途考選京官三品以上子弟既不與考選總督巡撫子弟亦不准考選又奉諭㫖行取官員吏科已經引見其各部主事等漢官朕尚未知其人科道為耳目之司選擇不可不慎爾等即𫝊諭九卿詹事科道令各舉所知將居官潔清辦事才能者從公保舉不可以同年同鄉親黨狥情私保即督撫所舉不當亦著指陳勿隠二十一年定學道内陞一員時河南等六省學道督撫皆以公明尤著保舉科臣奏請下部確議定額部議嗣後各省學道令督撫於三年報滿以公明尤著保題吏部開列欽定一員以京堂録用其餘陞一級以道員先用其未經保題者仍照現行例行從之二十二年奉諭㫖凡職官論俸次陞用若越次用之則倖得者必多况希圗速遷者必非安常守分之人耶又吏部奏舊例按察使員缺由布政司㕘政陞任今推㕘政副使内合例之人甚少難以選擇嗣後按察使員缺將四項道員不論厯俸已滿未滿有無罰俸一體會推從之二十三年大學士奏遵㫖𫝊諭六部應補闗差保舉開送今六部俱云若保舉辦事有才及謹慎者尚有其人至於操守知之實難上曰清操如何可廢凡貪犯之人有應坐之罪如郝洛居官甚好然猶侵蝕錢糧數萬魏象樞曾薦郝洛此等情事安能預知朕皆信其清操而委任之各衙門官員或謹慎有守或生事奔競豈有不知者但將有守之人舉出則被舉者自能効力尋九卿詹事科道舉出吏部郎中蘇赫范承勲江南學道趙倫揚州知府崔華兖州知府張鵬翮靈夀知縣陸隴其上曰格古徳陸隴其向聞其居官甚好今俱各稱善但從此操守不改方為真實好官又山西道御史張佳疏言學道應令九卿會同保舉列名上請得㫖學政闗係文教造就人才各省各官必品行優長者方能稱職應不拘定例將内外各由進士出身官員作何選擇補授著九卿會同確議尋議嗣後停其論俸補授順天學政應將侍讀諭徳開列江西浙江學道缺應將侍講洗馬亦概行開列其餘各省學道缺將應陞之五部郎中及㕘議知府等官選擇開列恭請簡用從之二十四年奉諭㫖九卿詹事科道令其會議會推本期至公至正務得其實今閲九卿會議之事間或不據實具議草率茍且因循而行有此一次立議爭勝以冀下次不與相拂而從之者或有此一次將彼意中之人薦出冀下次將其親朋薦出以相報者或有薦其門生者有薦其同年者有薦其同鄉親友者夫九卿會議會推理宜虚公持論豈可一二人専擅以行爾等齊集滿漢九卿大臣𫝊諭申飭之又吏部議覆都察院左都御史陳廷敬疏言督撫保舉薦舉府州縣官須令第一條實填無加派火耗字様第二條實填實心奉行上諭十六條每月吉聚鄉村鄉約講解字様餘條仍照舊例開具實蹟應如所請嗣後督撫保舉薦舉府州縣官員將此二條添註册内如保舉不實别經發覺者照徇情薦舉卓異例督撫各降二級調用申詳之司道等官各降三級調用從之二十七年湖廣道御史朱廷鋐條奏服滿候補人員内有特簡者有卓異者應不論班次即行録用上諭大學士等曰覽朱廷鋐所奏未必無故但治國家者以人才為要朕親簡之官如與一概丁憂者較年補授何時得録用乎凡條奏合宜即為准行其間有私與否朕不問也下吏部議以單月補授卓異特用人員雙月附摺聲明酌用二十八年奉諭㫖淮安揚州所屬被災地方甚為𦂳要府州縣員缺俱著奏聞選擇補授又議准四省苗疆選員調補楚粤黔蜀四省中如黎平茶陵東川平越等界連苗地府州縣員缺令督撫於本省中㨂選題補定理藩院員外補用例吏部題理藩院郎中缺出例將㕘領輕車都尉掣籖擬正陪具題今員外郎缺出亦應將步軍副尉騎都尉佐領侍衛等掣籖擬正陪具題得㫖理藩院郎中員外等官缺出停其掣籖將八旗移送應補官員引見補授其應補郎中之人已補員外郎主事應補員外之人已補主事若遇伊等應補缺出仍令一併引見又吏部議覆刑科給事中陳世安疏言吏部文選考功二司向有調取才能之例夫選司之陞選有俸册可憑功司之處分有則例可考但得老成㢘靜之人查冊籍奉行足矣請嗣後兩司缺出止依俸次陞補若老邁庸劣不時㕘處應如所請從之二十九年吏部以行取知縣事奏請奉上諭行取知縣以科道用者甚多科道職任闗係𦂳要著九卿各以平昔所知學問優長品行可用者面同舉奏尋戸部尚書王隲舉清苑縣知縣卲嗣堯清㢘慈惠兵部尚書李天馥舉三河縣知縣彭鵬靈夀縣知縣陸隴其居官有聲上諭大學士等曰適九卿列薦有卲嗣堯陸隴其彭鵬三人其服官㢘介朕所素知爾漢大學士亦有知者否梁清標奏曰三人允稱㢘吏徐元文奏曰以臣所聞湖廣麻城縣知縣趙蒼璧牧民有聲聞武昌兵譟時所在州縣官俱棄城潛去惟趙蒼璧安撫百姓修城預備上曰彭鵬卲嗣堯陸隴其趙蒼璧俱准行取三十三年奉諭㫖國家以用人為要或有知其人可用而避嫌不舉者或有明知其人不善而引為黨援者自今九卿當各將所知居官賢能者敬慎公舉科道官職司耳目誠能於所知賢者從公推薦不肖者立行㕘劾則賢者勸而不肖者懲治道豈不美乎三十六年湖廣道御史朱廷鋐疏言卓異與行取同膺異數嗣後應一例引見從之三十七年吏部議覆雲南巡撫石文晟疏言雲南省元江開化廣南廣西四府烟瘴地方請照粤西南寧等四府保題之例即於滇省郡縣中選擇㢘能素著熟悉風土者調補或於滇省應陞官員内陞授并照福建臺灣例三年内稱職即行陞擢又鶴慶順寧永昌三府鄰近蒙番接連中甸外逼烏斯藏之地甚為𦂳要必得壯年勤敏郡守庶可捍禦統攝乞揀選賢員補授五年稱職亦即陞擢俱應如所請嗣後元江四府屬知府以下知縣以上准其保題調補教官雜職報部調補免其具題其鶴慶等府知府缺出臣部照山陜二省奏補從之又吏部議覆御史荆元實疏言州縣官有牧民之責為任甚重應如所請每月掣籖之後令其隨本引見可以居官者照常令其赴任有衰邁昬憒者以原品休致二十以上輕浮冒昧者不分漢軍漢人分撥六部各司辦事三年仍以原職補用得㫖依議同知通判亦著引見又都察院左副部御史呉涵疏言編修檢討等員陞轉壅滯請嗣後變通編修檢討照李濤汪楫之例外補一二人少詹事侍讀學士侍講學士等官照王士正徐潮顧藻王九齡等之例以京堂各衙門調補一二人上諭大學士等曰覽呉涵奏翰林官壅滯所奏極是翰林官員係進士内選拔者教習三年又行考試擇其善者始留衙門不但伊等壅滯即滿洲漢軍翰林官應陞缺出俱與筆帖式較俸是以陞轉甚遲近見滿洲漢軍翰林所學皆好亦不減漢人此奏朕已知之不必令部議也三十八年議准世職㕘領以下補用武職例伯子男㕘領俱以副將用伯子男㕘領兼都督僉事銜輕車都尉火器營㕘領俱以㕘將用兼㕘將銜佐領騎都尉品級等官俱以遊撃用兼署㕘將銜雲騎尉品級等官俱以都司守備用兼都司僉書銜䕶軍校驍騎校六品七品八品等官與候補筆帖式執事人頭目俱以守備用四十年奉諭㫖直省地方料理事務必須簡任賢能可移文總督郭琇張鵬翮桑額華顯巡撫彭鵬李光地徐潮凡伊等所屬道員以下知縣以上官員有實心惠愛民生居官清㢘者雖有罣誤降罰俱不必論各具摺開送内閣其别省官員内有伊等所灼知者即越省亦着列名奏聞四十一年飭諭九卿薦舉毋得保舉同鄉及現任本省官員四十三年停督撫保題行取知縣例四川巡撫能泰疏言行取知縣請停督撫保題但將無錢糧盜案者一槩行取引見候用經吏部議駮上諭大學士等曰覽能泰此奏保題行取知縣時不能無請託之弊且知縣錢糧盜案之有無皆注在部冊可查嗣後督撫保題之例著令停止即令該部於無錢糧盜案知縣内論俸每省行取三四員如此則可塞知縣奔競之路但伊等俱補用言官所係𦂳要俟行取到日再應詳察用之下九卿議覆尋議嗣後行取知縣不用保舉每省限定額數照部冊較俸行取從之四十四年定各部郎中及編檢改補科道免其試俸舊例監察御史内閣中書舍人試職一年方准實授至是定郎中補授御史者停用試俸字翰林官班在科道之上由編檢改補御史亦不用試俸字又吏部議知縣厯俸三年即准考選科道似覺太速嗣後應將行取知縣以各部主事挨班補用方准考選至初任之中行評博亦俟伊等陞任後始准考選科道從之尋又定行取知縣三年一次分省定數直𨽻江南湖廣陜西各五員山東山西河南浙江江西廣東四川福建各三員廣西雲南貴州各一員行取到日與各項主事分數補授自是行取知縣無驟補臺中者四十九年吏部奉諭㫖前以補授雲南貴州廣西四川四省官員不能如期到任懸缺甚多故豫發人員備用今觀此等官員但圗以邊俸速陞居官無一善者地方闗係甚屬𦂳要嗣後四省停其豫發仍照舊例歸於月選得缺人員嚴限速催赴任其以前發往未經得缺人員俱著掣回各歸月分補用又奉諭㫖適引見行取知縣人材俱佳令其候補殊覺可惜著留伊等於京食俸遇主事缺出以主事用遇要地知州缺出以知州用五十一年吏部議覆湖廣道御史徐樹庸疏言舊例文武卓異及河工薦舉各員俱隨本引見請嗣後直𨽻各省督撫如有特薦之員仍照例令其赴部引見庶督撫保題亦加詳慎又藩臬與督撫最為親近定例大計不得薦舉卓異所以絶夤縁杜偏聽也嗣後藩臬缺出督撫不許坐名題補聽部通行開列均應如所請從之五十二年福建巡撫覺羅滿保奏閩縣等十六州縣員缺請於卓異人員揀選補授部議不准奉特㫖允之又定在外論俸推陞之布政使按察使運使直𨽻守道巡道員缺應通行開列恭候欽㸃補授令其引見其推陞道府以下知縣以上由吏部掣籖得缺者及督撫題補並請留任之員俱令隨本引見凡引見過文職官員應照武職例三年内陞補者免其送部又川陜總督鄂海疏言督撫提鎮揀選保送武弁請以曾出兵効力者保送如無出兵効力之人應論俸揀選保送以絶徇私之弊上曰國家承平日久行間効力之人所餘無幾前此保舉人員尚覺公平今漸滋流弊督撫提鎮等官皆各為其子弟夤縁保送者多即部院大臣亦多為其子弟互相援引此本著照鄂海所請行又吏部議覆湖廣道御史徐樹庸疏言九卿保舉陞用之員如有不肖者查原保舉官處分舊有定例但年久法弛嗣後保舉人員倘貪婪事發將原保舉之官從重議處又知府保陞道缺道員保陞臬司缺其陞任之後尚未經到任者不准復行保舉俱應如所請從之五十三年奉諭㫖尚書趙申喬保舉張應詔陞補兩淮運使奏其為郎中時能耐貧苦授知府不製衣服隨從數人為清官者不係於貧富張伯行家道甚饒任所日用皆取諸其家隨從四五十人今以為不清可乎為官之人一心為國即為好官或操守雖清不能辦事無論諭㫖批駮與部駮之事積年累月槩不完結似此清官亦何禆於國事五十五年諭吏部行取直省知縣覃岱等四十二員授額外主事又吏部題請引見月官得㫖道員以下教官以上著滿洲侍郎一員帶領引見其中有衰老不能來者即著革退五十七年兵部題各衙門効力人員至推選時每有弓馬生疎年力衰邁之人請於單月考驗弓馬觀其年貌如有衰老病癈不堪者題明勒令休致其有軍功帶傷之員雖年老仍行推用從之五十九年限九卿詹事科道保舉人數兼定保舉人員陞授正印官之例九卿詹事科道每人一年之内保舉不得過十人凡准貢例監生員吏員出身等官必經該堂官及督撫保舉方陞京堂與正印官六十一年奉諭㫖用人行政朝廷之大權也文官銓選掌之吏部武官選除掌之兵部近來督撫提鎮題補太多始不過州縣官千把總之類今則司道副㕘亦皆題補矣值此用兵之際姑且行之此習若久大有闗係且保舉題補官員内朕不知者甚多補用後遂皆稱為奉㫖補授之員在京大小職官皆朕所選用賢否易知若外省保題之官非朕所素知豈能一一定其優劣下大學士九卿議尋議河工官員闗係𦂳要臺灣逺屬海疆而廣西之南寧太平慶逺思恩四府雲南之元江開化廣西廣南四府俱在邊逺此等地方官員仍照舊例令該督撫保題調補其餘厯年督撫具題增添保題之缺並條奏交與督撫保題之缺概行停止武職副㕘遊都守各官仍遵定例内應保題之缺揀選銜缺相當者題補其餘亦概行停止以後不應題補調補之文武官缺及有事故並越銜保題者將該督撫提鎮并轉詳之官均照徇庇例降三級調用從之世宗憲皇帝登極諭曰朕惟敷政之道用人為先闢門籲俊之典由來尚矣然知人則哲自古為難朕在藩邸不與朝臣往來所以内外大小官吏皆不能悉知今荷皇考大行皇帝命纘承大統臨御之初簡用人材爾諸大臣皆久蒙皇考知遇任以股肱兹值梓宫在上靈爽式憑爾等哀感交迫之時益當各盡忠藎仰報高深内而大臣以及閒曹外而督撫以及州縣或品行端方或操守清㢘或才具敏練者爾等各據真知灼見從公具摺密奏古人云内舉不避親外舉不避仇爾等果矢公忠以人報國或素日同僚共事或同鄉同年或門生親戚子弟俱准保奏勿避忌嫌疑勿徇私援黨勿沽名市恩勿輕聽風聞勿言過其實有一於此則上負皇考任用之恩又負朕諮詢之意矣朕所需者人材但當有舉無劾毋得修怨䧟害爾等具摺或滿字或漢字各須親寫不可假手子弟詞但達意不在文理字畫之工拙其不能書寫者即行面奏又命王以下閒散宗室以上於屬下人員内各保舉一二人又奉諭㫖内廷各執事人員俱係隨侍皇考之人其中亦有大臣官員子弟著各該處總管揀選保奏引見朕酌量録用有通曉滿漢文者著聲明定補用筆帖式考試之例各部院補放滿洲蒙古漢軍筆帖式至繙譯筆帖式班次吏部試以繙譯補用至滿字筆帖式班次試以繕寫滿字補用如不能繙譯繕寫者俱各駮回將其次之人考取補用此駮回之人給假一年學習好時具呈入伊原班註冊如遇缺出仍行考取補用臣等謹按各部院衙門筆帖式舊例由官學生庫使領催補授順治九年題准舉人生員亦得補授康熙元年以廕監生補授四十五年奏准現行補授各部院滿字漢字筆帖式分為二十一班凡補用之人俱照各本班日期先後挨次輪補又有將軍督撫衙門省城邊塞等處筆帖式即入于二十一班内照咨送日期挨次補用蓋筆帖式為八旗出身之路凡識滿漢字者由繙譯考試止識滿字者曲繕寫考試當考試時上命王大臣或大學士等閲卷品定甲乙進呈優者分别品級録用附録於是以誌選用之大概焉皇朝文獻通考卷五十五
