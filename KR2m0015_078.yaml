body:
  text: 職官考上官制乾隆元年總理王大臣議奏封爵之制成周以來列爵惟五秦漢時爵二十級並非世職其世襲者惟有侯爵分縣侯鄉侯亭侯三等至於唐宋並依周制本朝定制公侯伯之下未立子男之爵别列五等世職以視古法尤為隆備但未定漢文名稱今敬擬精竒尼哈畨一等者漢文稱為一等子二等者為二等子三等者為三等子阿思罕尼哈畨一等者漢文稱為一等男二等者為二等男三等者為三等男阿達哈哈畨漢文稱為輕車都尉仍分一等二等三等拜他拉布勒哈畨漢文稱為騎都尉拖沙喇哈畨漢文稱為雲騎尉從之七年命王大臣總領樂部並汰太常寺樂員詳見樂考十三年諭曰向來各衙門京堂員缺屢經酌定其中仍不免於參差如僉都御史則有漢而無滿員左參議則滿員有二而無右參議大理寺少卿少詹事則滿一缺漢二缺太僕寺少卿則滿二缺國子監司業則滿二缺漢員俱止一缺於官制均未允協今既新定㑹典以上參錯不齊各員缺應作何裁改更正之處著該部定議具奏尋議都察院裁僉都御史一缺通政司裁漢右通政一缺改滿左參議一缺為右參議大理寺裁漢少卿一缺詹事府裁漢少詹一缺太僕寺裁滿少卿一缺國子監裁滿司業一缺從之又諭大清㑹典開載内閣滿漢大學士員缺無定出自簡在等語本朝由内三院改設内閣大學士未有定數自是官不必備惟其人之意而康熙年間滿漢大學士率用四員至雍正年間以來多用至六員更或増置一二人協辦朕思内閣居六卿之首滿漢大學士應有定員方合體制嗣後著定為滿漢各二員其協辦滿漢或一員或二員因人酌派又大學士官銜仍兼殿閣㑹典所載中和保和文華武英四殿文淵東閣二閣未為畫一其中和殿名從未有用者即不必開載著增入體仁閣名則三殿三閣較為整齊再大學士缺出定例請㫖開列亦有遲至一月後始行請㫖者朕思大學士職司贊襄如其宣力有年遇有病休病故不忍遽行開列應俟至一月以後乃國家眷念舊臣加恩輔弼之意若縁事降革則機務重地未容久曠自應即行開列不必請㫖將此載入㑹典永著為例裁行人司衙門歸禮部辦理通政司裁滿洲漢人參議各一人内閣中書裁漢人二人十四年諭曰我朝定鼎以來酬庸賞功列爵惟五分等惟三以表世閥而第宏勲雍正年間因公爵居五等之首仿古封號字義錫以嘉名此誠篤念勲舊俾奕世子係承襲者顧名思義意至厚也但封爵之制公侯伯一體優崇前代侯則有冠軍定逺之稱伯則有誠意威寧之號今公爵令名炳著而侯伯僅分等次似屬闕畧朕欲推廣其意凡我朝所封侯伯考厥成勞追加美號庶伊後人感念乃祖乃父之忠勤紹修令緒國家實攸賴焉至子男同位自古以地為號未有别封可仍其舊該部妥酌定議以聞尋擬進欽定侯爵為號凡七曰奉義恭誠順勤順義昭武延恩敦惠伯爵為號凡十有一曰翼烈宣義襄寧昭毅威靖襄勤誠毅昭信懋烈誠武勤宣十六年定恩騎尉世職官臣等謹按順治九年奉恩詔凡陣亡人等之子孫襲次已完者賞給七品官世職至是奉詔自順治九年後其有襲次已完之陣亡子孫俱賞給世職官定名為恩騎尉十八年諭曰國家設官分職期於有禆實政若同一官而差分階級膺此任而兼帶他銜於官制體統殊為未協如翰林部曹小京官補用御史既經簡擢同列諫垣即應無所區别乃舊有五品六品之分試俸不試俸之異又如各省道員例以布政使司叅政叅議按察使司副使僉事等銜分别兼帶但道員職司巡守以整飭吏治彈壓地方為任至於錢榖刑名則藩臬司專責各有攸司且知府以下悉其統轄兼參議僉事銜者階秩反卑其何以表率此皆舊例相沿宜為變通以歸畫一而重職守嗣後給事中著仍為正五品御史仍改為從五品不必試俸直省守巡各道著俱為正四品停其兼銜其道員俸深應如何銓叙之處該部定議具奏尋議覆道員外陞按察使照舊通行開列具題補授至内陞京堂向例兼參政銜者陞太常寺少卿鴻臚寺卿兼副使銜者陞太僕寺少卿通政使司參議兼參議僉事銜者陞光禄寺少卿鴻臚寺少卿品秩懸殊毋庸以道員陞用外餘悉一體陞用從之二十一年諭曰吏部議覆白鍾山所奏曲阜縣知縣改為題缺一本闕里為毓聖之鄉自唐宋以來率以聖裔領縣事夫大宗主鬯既已爵列上公而知縣一官專以民事為職奉法令則以裁制傷恩厚族黨則以偏私廢事甚至因縁為奸簠簋不飭者有之且亦非古人易地而官之道我國家尊崇先聖逺邁前朝延恩後葉有加無已豈於此而有靳焉但與其循舊制而致瘝官有乖政體何如變通宜民俾吏舉其職民安其治於邑中黎庶孔氏族人均有禆益著照該部議行其現任世職知縣既已謝事若歸部改銓不過恩及其身而止於朕心猶有未愜著加恩授為世襲六品官仍令揀選充補用副朕重道崇儒至意二十四年時以準部蕩平伊犂等處内屬議准督臣楊應琚奏移安西提督駐巴里坤於沙州安西柳溝靖逆赤金五衛地置安西府領淵泉玉門敦煌三縣移駐安西道於哈宻以一府三縣屬焉二十五年諭曰現今招撫來京駐劄之葉爾羌哈什噶爾等處回人内其厄塞音既經晉秩公爵麻穆特圖爾都和卓授為扎薩克著作理藩院屬其餘金匠音樂回人等各回人著統編一佐領將拜和卓授為佐領令其管轄作為内務府屬嗣後送到回人俱著入於此佐領下尋准設佐領一人𨽻於内務府正白旗二十七年辦事大臣阿桂等奏於伊犂設二佐領以厄魯特侍衛等往領之臣等謹按伊犂回部盡入版圖皇上睿謨周詳命大臣前往辦事建置各官復因其舊俗設立伯克等官至周至宻此復編為佐領比之八旗䝉古洵盛烈也其各官詳列後本條下二十八年烏嚕木齊為天山北路總滙要區自西陲平定議駐兵四千名屯守其地増設副將一員酌分安西提標兵丁一千四百餘名分左右營其他營願往者聽至是兵丁陸續加增陜甘總督楊應琚疏請更立一營為城守三營峙立總理稽察責任匪輕應將副將改為總兵並增設鎮標中營以符營制統聽巴里坤提督節轄從之又諭曰朕閱續文獻通考館所進職官考内有應增改數處俱經逐一指示發交該館參考訂正其有一二條沿襲舊文於官制未協者所當斟酌釐定以符體制如四川總督條下註明兼巡撫事而直𨽻總督向無巡撫兼銜書内亦未註出但巡撫於地方一切考察核轉皆其職任直𨽻現在既不設巡撫且所管通省事宜與四川總督無異嗣後直𨽻總督官銜著照四川總督之例添列兼管巡撫事務至外省知府向為正四品而巡道各視兼銜為差等則有三四五品之不同今道員既經裁去兼銜統為正四品知府乃其所屬自應量為區别著将各省知府改為從四品封典内旗員武職六七品有封承徳郎文林郎者名義亦覺未當應照漢官武職之例六品改為武信郎七品改為奮武郎但漢官武職至七品而止所有旗員之八九品武職仍照舊制為修職郎登仕郎庶名實相符而官制亦為允協俱著該部遵照辦理並諭令㑹典通考等館一體改正移駐巴里坤提督於烏嚕木齊改設烏嚕木齊總兵於巴里坤時烏嚕木齊地廣土腴分兵屯駐設副將一員並特㫖令内地民人擕家赴墾兵民羣集勢成重鎮是年二月改副將為總兵分立三營至是兵部議准督臣奏移巴里坤提督於烏嚕木齊其原設總兵應移駐巴里坤所設弁兵悉令互改分轄二十九年諭曰前因西陲辦理軍需令陜甘總督駐劄爾州以便調遣迄今大功久竣新疆屯政亦已酌定章程而該督仍駐肅州距西安㑹城較逺於腹地屬員案牘控馭轉多隔礙朕意若將總督移駐蘭州巡撫原署則東西道里適均不難居中節制而甘肅巡撫亦可裁汰當經傳諭楊應琚令其熟籌妥議今據覆奏與朕所見脗合著將蘭州巡撫衙門改為督署令該督移駐並兼管撫事毋容更設巡撫所有原設撫標即改為督標其舊設西安督標改為提標即令固原提督回駐西安管轄至所奏河州鎮總兵改為固原總兵並摺内條議各標營弁兵一切裁汰撥給事宜該部詳悉定擬具奏尋議陜甘總督回駐蘭州固原提督改駐西安俱為地處適中甘肅巡撫即行裁汰固原係平涼重鎮即將河州鎮改駐其地河州改設副將以花馬池協標移駐其花馬池改設參將以地僻事簡之鎮畨營移駐又於蘭州増設城守營以資巡防應以甘肅靖逺下馬關參將等官改駐得㫖允行臣等謹按陜甘改駐總督提鎮控制邊陲星羅碁布洵為因地制宜至於營制兵弁或存或汰經畫完善事詳兵考兹不具載又兵部議准雲貴總督吳達善奏雲南猛戛地處極邊現在土目刁希錦等俱為夷衆悅服應將刁希錦給與土千總銜刁成秀給與土把總銜以示鼓勵三十年諭曰巡視臺灣御史前已降㫖三年簡派一次事竣即回毋庸駐留候代今思該處現有道鎮大員駐劄一應地方事務俱可隨時經理而向來巡察御史在彼並未聞有所建白原屬有名無實若遽行裁撤則地方官或以逺隔海洋無人稽察日久不免廢弛亦不可不防其流弊嗣後届三年請派該衙門仍照例奏請或暫停派往或數次後派員一往巡查候朕隨時酌量辦理其盛京五處分班簡派稽察亦照此例行三十一年大學士公傅恒等奏各直省舉人挑入一等者共八百五十名分發各省以知縣用仍照原議准補陞調遺缺其直隸州州同州判府屬州同州判府經縣丞鹽庫等大使亦准以原銜借補其二等之一千一百五十名以教職銓用應請將訓導復設訓導一併准其借補奉㫖依議臣等謹按此因選途壅滯特派王大臣等揀選八百餘員帶領引見按省分發以知縣補用並准以原銜借補州倅縣佐等官督撫等可量材録用以收指臂之效仰見皇上遴擇人才疏通官職至意又兵部議準雲貴總督楊應琚奏土目傾心相繼輸誠所有猛勇頭目召齋召溪喃給土千總銜歸普洱鎮普洱府管轄猛竜沙人叭獲給指揮同知銜歸臨元鎮元江府管轄補哈頭目噶第牙翁給土千總銜整賣頭目召齋約提景線頭目呐賽給宣撫司銜景海頭目召罕彪六本頭目召猛齋均給土守備銜猛撤頭目喇鮓細利給土千總銜均照例准令世襲加正一真人三品秩奉諭曰正一真人向係承襲一品前據左副都御史梅㲄成奏請量加裁抑經大學士㑹同該部議覆降為五品第念其自宋元以來承襲已久世守道教即遇有過愆亦應抵其人以罪耳不應議及其世襲也然舊例一品班序未免太優遽降五品又未免過於貶損且其法官婁近垣現係四品而伊品秩轉卑亦覺未協今正一真人既來朝進京著加恩視三品秩永為例大學士公傅恒等議删哈爾總管巴爾品奏達里岡愛牧厰請設四品䝉古總管一員由牧羣翼領内㨂選引見簡用其逹都達布遜諾爾牧羣所有翼領等缺酌請裁汰於達里岡愛添設翼領二員新添牧羣内毎羣牧長牧副各一員牧丁各八名均應如所請辦理並交該部另行鑄給關防應得養亷俸銀俱照例支給奉諭㫖依議御史素爾訥奏各門城關以外地方遼闊請將各城吏目移駐城外各屬適中之地以便約束經吏部等議覆吏目微員移駐關外恐不足資彈壓應將副指揮移於城外東城則駐朝陽門外南城則駐永定門外西城則駐阜城門外北城則駐徳勝門外並請另鑄副指揮印信其城内副指揮所轄地方改歸正指揮與吏目分管中城原未管關外地方仍照舊經理從之裁廣西小鎮安土巡檢設流官時以交匪潛匿廣西小鎮安地土巡檢岑繩武年穉無知失察土目總督楊廷璋奏請裁革專設流官以資彈壓從之裁雲南永北府缺增設迤南道大學士管雲南總督楊應琚奏永北向隸迤東道管轄相距窵逺鞭長莫及應增迤南道一員駐普洱將普洱及附近之鎮沅元江臨安四府地歸其管轄永北府知府裁改掌印同知兼理地方從之又奉諭曰向來奉天府尹事務令盛京將軍兼轄今思將軍與府尹所屬旗民事件各有專司若令將軍節制於公務未免牽掣莫若照京城侍郎兼管順天府尹之例於盛京五部侍郎内派出一員管理永著為令三十二年内務府奏新建泉宗廟聖化寺應設苑丞等官請於現有人員内品級職銜量為更易以期充應各差至打埽地靣坐更值宿之園戸園𨽻俱由暢春園等處撥派可否懇恩添給奉諭暢春園等處現有園戸園𨽻二百餘名自應通融撥派毋庸另行添設又諭向來緑旗世職無承襲罔替之例第念官弁等果能宣力効忠勲猷卓越則國家延賞酬庸誼無歧視前經降㫖將黄芳度張勇等特予加恩准其子孫永逺承襲世職並令軍機大臣會同兵部詳查國初以來凡有功冊可稽者分别等差通行列名具奏請㫖兹據覆奏内有殉節陣亡之張國彥等十七員又軍功較著之惠應詔等十四員核其事蹟或致命疆場克昭義烈或折衝閫外茂著勤勞均宜錫以殊施俾臣工共知激勸所有張國彦等子孫其世職有尚應承襲者俟將來襲次滿日著加恩各賞給恩騎尉並准其世襲罔替又大學士公傅恒等議御史王懿徳奏本年京察屆期翰林院學士及左右春坊庶子應俱入於四五品京堂内歸王大臣騐看列為等次分别去留帶領引見恭候欽定奉㫖依議三十三年諭向來各衙門保舉撫民同知通判例由吏部請㫖特派大員考試第思此項人員原不過取其通曉字義標判文書而止並非場屋衡文可比若一一傳集校藝恐其中轉易滋代倩傳遞諸弊甚屬無謂嗣後各衙門保舉此項人員彚送吏部照月選官之例令其赴部親筆繕冩履厯以憑核對不必另為派員考試著為例又諭教職遇有懸缺向來率委别學教官代理此等司鐸微員兩任豈能兼顧現在各省有挑選二等舉人在籍候選教職之員伊等得缺尚遲如有情願及時自効者即赴本省督撫處報名遇有缺出需人聽候督撫㑹同學政挨次派委暫署則員缺既不致久懸而需次者亦不令閒曠自為一舉兩得該部即遵諭行又諭向來外省請簡文職各員俱特派大臣揀發而武職則止交兵部揀選引見嗣後遇有請發參將以上人員著兵部臨時奏派大員㑹同該部揀選帶領引見發往著為令三十四年諭向來萬善殿有年㓜太監十餘人在内讀書派漢教習一員專司其課太監職在供給使令就使讀書不過教之畧識字體何必選派科目人員與之講授令其通曉文字乎現今讀清書之太監等在長房一帶派内務府筆帖式課之此等讀書之人原可附近該處另選内務府筆帖式之曾讀漢書者授之句讀又何必為之專設一漢員教令讀書乎所有萬善殿派用漢教習之例著永逺停止臣等謹按内使之職供給使令即讀書亦不過識文義通姓名乃前明壞政初猶内官監掌文籍尚寶監掌圖書及永樂時已選教官入内教習宣宗時竟特開書堂聚至四五百人且令大學士陳山翰林朱祚等專司教習于是内官悉嫻文墨掌章奏照閣票批硃漸與外庭往來交結正統初即有司禮秉筆之事貽毒至不可勝言我朝立法謹嚴一洗勝代陋習太監等惟令内府筆帖式課讀俾粗知字體萬善殿漢教習一員一併裁之仰見皇上官方整肅防制盡善慎幾微之漸飭宫府之規豈特逺越有明三代後無此良法也三十五年諭向來各省鹽政關差一年任滿例由該部院題請更换而關差内間有自行奏請並不經部辦理者究非體制嗣後除將軍督撫鹽政織造兼管各關仍由該將軍等照例自行題奏外其九江粤海等闗將届一年期滿並著一體報部聽該衙門具題請㫖著為令又諭向來吏部定例四品以上京堂降至六品以下者既無應補之京堂員缺又以京堂品秩優崇若補用司員與體制不合遂停其補用殊屬非是京堂品級雖優如因事獲譴既經予降自應按品授銓用人乃朝廷大權黜陟進退惟視其人之自取設官雖有崇卑示謫本無同異即由崇階而降為末科惟上所命孰敢抗違若拘堂不降司之說輒以曾膺高位不屑於復就下僚是國家詔禄之典竟任臣下自專揀擇紀綱之謂何且以堂官降為司員於體制又有何碍而停其補用則此等人員一經鐫級遂致擯錮終身所謂愛之適以害之於伊等亦復何益此皆相沿前明陋習不可為訓著該部另行改議具奏尋議京堂官降至六品以下照各項降官補用以畫一體制三十八年設鎮西府及迪化州先是奉諭勒爾謹奏巴里坤地方近來生息日繁兵民子弟敦書講射漸已蔚然可觀照烏嚕木齊迪化寧邊二㕔封題代試之例專設學額一摺已批交該部議奏矣惟是該處民居稠宻閭井殷繁兼之屬國來王征軺輻凑實為邊陲一大都㑹今既議定學額而原駐僅一同知尚於體制未合自應將巴里坤改設為府烏嚕木齊改為屬州或將安西府移於巴里坤而安西為州並令統𨽻於邊郡規模尤為閎逺其應如何定制設官酌予嘉名及建立學校之處著大學士九卿詳悉妥議具奏尋議遵㫖將巴里坤改設為府即以烏嚕木齊為屬州所有哈宻闢展穆壘及附近設有職官之處並歸管轄以符體制查安西一府所轄淵泉玉門敦煌三縣其地距嘉峪關不甚相逺今巴里坤既改為府則安西更居内地應將安西府改為安西州直𨽻州知州其淵泉縣一缺即行裁汰所有該州應設學正吏目各一員即將淵泉縣訓導典史裁改其應設州判一員即將原設馬蓮井縣丞改置分駐仍以玉門敦煌為屬縣巴里坤既改設知府應添附府知縣一員其應有經厯一員改為吏目仍管倉大使事並添設學正一員其原設寧邊城通判改為州同特訥格爾縣丞改為州判其附近之哈宻通判闢展同知均歸巴里坤統轄至武職官員巴里坤現有總兵烏嚕木齊現有提督安西現有參將均足資統轄控制無庸更易所有巴里坤改設府縣及烏嚕木齊改州應予嘉名臣等謹酌擬字様另繕清單恭候欽定奉㫖依議府州縣名欽定為鎮西府宜禾縣迪化州四十一年諭昨四庫館呈進裒集永樂大典㪚篇内有麟臺故事一編為宋待制程俱撰具詳當時館閣之制所載典掌三館秘閣書籍以執政領閣事又有直秘閣秘閣校理等官頗稱賅備方今蒐羅遺籍彚為四庫全書毎輯録奏進朕親披閲釐正特於文華殿後建文淵閣弆之以充策府而昭文治淵海縹緗蔚然稱盛第文淵閣國朝雖為大學士兼銜而非職掌在昔並無其地兹既崇構鼎新琅圅環列不可不設官兼掌以副其實自宜酌衷宋制設文淵閣領閣事總其成其次為直閣事同司典掌又其次為校理分司註冊㸃騐所有閣中書籍按時檢曝雖責之内府官屬而一切職掌則領閣事以下各任之於内閣翰詹衙門内兼用其毎銜應設幾員及以何官兼充著大學士會同吏部翰林院定議列名具奏候朕簡定令各分職繫銜將來即為定額用垂久逺尋議查宋制秘書省有檢閲文字官係不常置應請酌仿其制再設文淵閣檢閲官於檢曝書籍時詣閣㸃閲更足以昭慎重於是定文淵閣領閣事二員以大學士協辦大學士翰林院掌院學士充之提舉一員以内務府大臣充之直閣事六員以由科甲出身之内閣學士由内班出身之滿詹事少詹事讀講學士漢詹事少詹事讀講學士充之校理十六員以庶子侍讀侍講編修檢討充之檢閲八員以内閣中書充之又諭向來奉天所屬州縣原係滿漢人員兼用嗣因府尹蘇昌等於辦理流民案内奏稱奉天各州縣凡詞訟等事關涉旗民者俱㑹同旗員審理往往意見參差若將旗員銓選較為畫一等語經軍機大臣議覆降㫖允行今思奉天地方旗人居處者多旗員在彼不無沾涉親故遇有審理事件恐不免心存偏狥嗣後奉天各州縣缺出著照各省仍以滿洲漢人通用惟是奉天地方兼管旗民較為繁劇初任之員恐難辦理裕如所有各州縣缺出應交該部於候補人員内揀選引見候朕簡員補用又禮部議奏查熱河七㕔應試童生分額取進統歸道學應如該督等所奏准其總設道學教授一員得㫖允行四十三年奉諭向來步軍統領衙門設有協理刑名部臣一人參酌刑律原以步軍統領或從武職簡放於一切刑名律例未及周知是以酌設協理以資參核今步軍統領係朕簡用部院内親信大臣遇有刑名事件皆能自辦無所用其參酌且協理所辦刑名不過杖罪以下之稿又大抵隨同畫諾初未嘗置可否於其間殊屬有名無實嗣後步軍統領有由都統等官簡放者該部聲明請㫖簡派其由尚書侍郎簡放者即不必復派協理之員所有原派之侍郎阿揚阿即無庸協理著為令四十七年諭吏部議覆欽天監條奏五官正等官分别陞用之例一摺其蒙古五官正一項人員陞途久滯用之理藩院尚屬通融之一法至請照小京官筆帖式之例遇有才具出衆之員一體保送撫民理事同知通判其事斷不可行此等䝉古人員在監行走原以推算測騐為事素非通習吏治與各部院衙門筆帖式等官不同其有年久熟諳推算者尤宜留於本衙門酌量陞用若一例保送同知通判等官分發試用在外省既増一不諳民社之員而在該衙門反少一推算熟手於量才授職之道兩無禆益吏部議准此條明以欽天監係六阿哥管理未免意存遷就尤屬非是吏部堂官著交都察院議處四十八年諭向例總督俱兼兵部尚書右都御史銜巡撫俱兼兵部侍郎右副都御史銜但漕運河道總督並無地方之責究與各省總督不同况又有由道員陞署及簡擢初任之員若一例兼銜未免太優不可不量為區别嗣後漕運河道總督該部俱奏請給與兵部侍郎銜著為令五十年諭滿洲由科目出身為翰林者本應認真讀書通達事理為國家有用之才方各稱其實向來滿洲之習舉業者其文義本屬淺陋及倖登科目列名翰苑問以文學則曰身係滿洲豈漢人可比及至問以清語騎射又曰我係詞林豈同武夫戰卒兩處躱避進退失據而落於無用之流朕所深惡即從前尹繼善鄂容安鐘音觀保等在翰林中俱稱出色者止能隨常辦事而於邊疆重務並不能經理裕如雖其中鄂容安曾膺軍旅重寄臨危遇變亦惟知一死塞責究於國家大事何所禆補耶此次考試翰詹朕嚴加甄别滿員出缺甚多除簡擢數人外餘竟無員可補與其濫竽充數毋寧核實酌裁所有現出之侍讀侍講學士二缺侍讀侍講二缺已另降㫖裁汰嗣後滿洲人員益當自知愧勉讀書敦行砥礪成材以備國家器使如果能蒸蒸日上一變從前積習人材蔚興彼時朕自當再補還舊額也五十一年諭三通館進呈皇朝通志職官畧一門朕詳加披閱其中所載文武官階諸多未協國家設官分職文武兼資在文職則内而閣部院司外而督撫以至守令丞尉階級等差互相維制至武職為國干城同膺心膂之寄其階級自應與文職相埒方足以重閫寄而勵戎行今志内文職則係正一品起而武職則係從一品起既顯然少予一階且文職自正一品至從九品共十八階武職自從一品至七品止十一階多寡顯有懸殊體制即暗為隆替非所以著朝章垂令典也大抵議定官制編纂志書多出於文臣之手其意在乎重文輕武殊不知國家設立武職原欲其折衝捍衛其責並不輕於文臣有明之季文臣用事於中武臣宣力於外一二臺閣本兵科道書生搆謀倡議俱足以掣武臣之肘卒至武備廢弛疆圉孔棘國事遂不可為此皆重文輕武之流弊不可不引為殷鍳所有武職人員現在所缺正一品之階應照朕前次欽定領侍衛内大臣將軍為正一品之例增入一階其自正七品以下較文職所少之五階亦應於内外武職衙門微末員弁内按其職守酌定正從照文階一體釐正以昭畫一再志内載舊例武官正從一品俱封榮禄大夫正二品至從五品俱封將軍既未為允當嗣更定新例則皆稱大夫因思將軍為專閫主帥大夫係文臣之稱乃舊例則封將軍而今又更封大夫名義殊覺混淆嗣後武職正一品至從二品俱應封為將軍正三品至從九品應分别酌與都尉騎尉校尉等字樣遞為差等以示區别至向來文職遇有降級處分如降一級者俱以正從計算止於正降為從而武職則降一級即降一品辦理既不畫一而武職官員遇有處分即官階較大者轉瞬即降至末弁相形未免偏枯嗣後武職處分亦應照文員之例以正從核計議降庶為平允夫文武初無輕重官聯要於整肅必當詳為更正較若畫一載入典章所有一切增改事宜著軍機大臣㑹同大學士吏兵二部詳晰定議具奏尋議查武職品級自正一品領侍衛内大臣起至從八品止共十六階又自從一品提督起至正七品止共十一階較之文職十八階似覺參差惟文職之十八階係合内外統計始有此數武職合内外統計本有十六階較之文職少正九從九二階自應遵㫖増設查八旗有藍翎長太僕寺委署固山達向無品級今擬將藍翎長作為正九品太僕寺委署固山達作為從九品又緑營七品以下未經設有官階查有經制外委千總外委把總及額外外委亦向無品級今擬將經制外委千總作為正八品經制外委把總作為正九品額外外委作為從九品増入官階内外合計以足十八階之數與文職相埒至各省駐防將軍舊例列入正一品嗣於乾隆三十二年奏明改為從一品查外省文職總督品級係從一品武職將軍亦列從一品則外任文武統率大員品制相當應仍從其舊其降調處分如緑營之提督至參將游擊本有正從遇有處分原得以次遞降至都司以下等官有正無從遇有處分降一級即降一品似覺偏枯但查此等官職當其擢用時陞一等即陞一品是以降調時亦照此遞降是升降亦屬適均且八旗等官降調向係分别滿洲䝉古漢軍指有一定應補之缺營制各殊不能按級計算通融互降是以於乾隆三十二年奏准旗員降補俱照指定應補之缺補用無庸分别正從今請仍照奏定章程辦理至封典名號文職武職均稱大夫體制誠有未協謹遵諭㫖一二品俱封為將軍三四品俱封為都尉五六七品俱封為騎尉八九品俱封為校尉其所增品級係就内外營制現有職任名目酌量添入並未増設官職是以一應陞遷俸禄錢糧等項俱仍照舊例恭候命下纂入例冊遵行並增入㑹典移咨三通館將職官畧一體增定奉㫖依議臣等謹按三通館承纂各門體例俱遵㫖纂至五十年止此次畫一内外文武官階於五十一年甫經議定奉㫖遵行仰見皇上揆文奮武設官分職内外兼資體制合一之至意自經議奏准行即永垂典則從此品秩均平既洗前代畸重畸輕之陋習用昭千古相維相制之大經於國典朝章實有關繫今會典既奉命增入謹加案聲明云皇朝文獻通考卷七十八
