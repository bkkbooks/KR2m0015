body:
  text: 欽定四庫全書皇朝文獻通考卷一百五十三王禮考二十九山陵陵上臣等謹按上陵之禮昉於漢世考遷史周本紀武王上祭於畢馬融以畢為文王墓地名則三代已有之特其儀節未詳後之儒者遂謂葬藏廟祭不可相兼非篤論矣後漢永平初帝率公卿已下朝於原陵史家誇為盛事蔡邕以為至孝惻隠不可奪也唐宋以降車駕朝陵之禮或數傳而一舉或一代全未舉行惟我朝列聖相承孝思肫切天聰崇徳間太宗文皇帝屢詣山陵祗修時享聖祖仁皇帝親政以後仰承世祖章皇帝遺志詣盛京祗謁祖陵至於暫安奉殿孝陵近在畿輔展謁之禮歳必舉行至孝至誠實徃古所未有世宗憲皇帝御宇歳修謁陵之禮皇上御極以來東陵西陵歳時展謁羮牆之慕曰篤不忘而復四詣陪京躬親祗謁尊祖敬宗禮明樂備洵足垂憲億萬世考馬端臨山陵一門於標目下旁注葬禮及上陵字一卷之中隨文互見然上陵之禮吉禮也大葬之禮凶禮也禮雖相因義各有當謹遵大清㑹典及通禮之例叙次謁陵祭陵禮儀别為二卷以備掌故焉天聰六年十二月丁丑太宗文皇帝率諸貝勒大臣詣太祖陵行時享禮九年十二月丁酉上率諸貝勒大臣詣太祖陵祭告時以察哈爾舉國來歸兼獲玉璽上瑞及莽古爾泰徳格類莽古濟等逆黨伏法焚楮祭告將讀祝上跪令大貝勒代善獻爵畢上諭諸大臣曰自古以來凡國有吉慶及變亂之事俱有祭告之典今當祗遵典禮奉告皇考在天之靈於是讀祝册畢上出享殿還宫十年三月丙午朔清明節上率諸貝勒大臣親祭太祖山陵崇徳元年四月乙酉以營建太廟遣官捧祝文祭告太祖山陵時定歲除日清明日祭陵用牛一遣守陵官行禮東京陵用牛二遣宗室覺羅大臣行禮福陵用牛一羊二遣大臣一人行禮忌辰孟秋望日萬夀聖節㸃香燭獻酒果均遣大臣一人奠帛讀祝行禮每月朔望致祭用牛一㸃香燭獻酒果不讀祝奠帛遣守陵官行禮二年六月丙辰以征朝鮮臣服其國及克明皮島㨗音遣官祭告福陵四年四月乙丑以征明大㨗祭告福陵上親詣行禮順治元年七月癸巳以中原平定遷都於燕遣官祭告福陵臣等謹按國有豐功慶典舉行祭告之禮或兼告郊社陵廟或専告山陵俱載入郊社考告祭一門今於天聰崇徳之際凡有祭告皆書順治以後惟紀定鼎遷都告祭一事以見例遇有親行祭告之禮則書二年正月禮部奏言凡恭遇萬夀節應遣官祭福陵昭陵止上香燭供酒果不讀祝從之二月禮部奏言凡遇清明等應令駐防盛京官祭福陵昭陵其東京興京祖陵令守陵官祭奠從之三年正月定毎年歳除清明及慶賀祭昭陵如福陵禮每月朔望於福陵昭陵獻酒果燃香燭罷昭陵每日致獻八年六月定諸陵祀典一興京東京四祖陵於冬至歳暮清明中元十月朔俱致祭其祭品冬至歳暮清明各用牛一獻酒果上飯上羮供香燭焚帛讀祝文中元十月朔各用羊一獻酒果供香燭焚帛讀祝文俱遣宗室覺羅大臣致祭每月朔望薦熟羊一獻酒果供香燭令守陵章京致祭一祭福陵昭陵上躬徃自左門入若遣官自右門入祭文祭品悉由中門入福陵於牌樓前下馬昭陵諸王則於立獅子處下馬官民則於樹紅樁處下馬一福陵昭陵除清明中元歳暮照常致祭外每歳十月朔冬至亦各致祭一次其祭品十月朔用酒果供香燭冬至用牛一羊一豕一獻酒果上飯上羮供香燭焚帛讀祝文定和碩親王以下文武三品官以上謁陵儀凡和碩親王以下文武三品官以上或専徃盛京或道過盛京俱先謁福陵昭陵於二門外行三跪九叩禮及還辭陵禮如前九年正月禮部題興京東京二陵陵寢既同一垣凡祭祀時應在享殿内設祭開後門望陵行禮從之十一年九月壬子遣輔國公班布爾善等恭代祭福陵昭陵先是十年五月丁丑諭内三院朕仰承天眷統一區宇深惟我太祖武皇帝肇造艱難太宗文皇帝大勲克集誕祐朕躬以有今日自登極以來睠懐陵寢輙思展謁但彼時朕年冲㓜未獲舉行每屆祀期瞻仰在天之靈徘徊几筵不禁隕涕以致寢食俱廢日夜靡寧今將躬詣山陵稍展孝思議政諸王大臣滿漢九卿等官其詳議以聞即傳諭禮部知之庚辰和碩鄭親王濟爾哈朗等奏言皇上思念太祖太宗日夜靡寧孝思誠篤堯舜之大孝武王之達孝不是過也兹欲躬詣山陵稍展孝思臣等仰體聖心敢不恭承但思我皇上為天下臣民之主親政以來因革損益各當天心太祖太宗在天之靈必然欣慰見今南方用兵吏治尚未全飭民生尚未全寧一日萬㡬靡不出自親裁若聖駕逺行奏報未免稽遲稍需歳月再議舉行亦不為晚伏望皇上以太祖太宗安定天下之心為心天下太平百姓歌詠聖徳即是太祖太宗之徳永永與天罔極其為聖孝更大矣疏入得㫖覽王等奏欲朕以太祖太宗安定天下之心為心具見為國悃忱但朕追念深恩吴天罔極顧瞻山陵以日為年即今未可必行擬於來年躬詣爾諸王大臣勿阻朕誠禮部屆期預行擇吉具奏至是年三月丙申和碩承澤親王碩塞等奏言近承聖諭擇期躬詣太祖太宗山陵仰見皇上睠懐罔極之孝思但近因畿内水災方遣大臣賑濟又南方弗靖屢發禁兵若聖駕逺行旦夕奏報未免稽遲仍當稍緩俟南征大兵回京方可恭謁疏入得㫖朕曕仰山陵久思恭謁慕戀之誠無忘寤寐四月内朕必親徃己酉和碩鄭親王濟爾哈朗等復奏言聖駕躬詣山陵奉㫖定於四月十一日啟行但經行郡縣值民間粒食方艱恐難供應伏願稍需日月俟物力稍紓然後恭謁以展孝思疏入得㫖朕本欲早謁山陵以抒戀慕今覽王等奏暫停此舉俟於七月間行七月丁巳諭禮部朕方在冲齡即值先帝晏駕終天抱恨時刻靡諼夢想音容涕泗横集自元年定鼎以來綏輯多方焦心勞思不遑寧晷顧瞻陵寢邈在天涯雖歳時祭祀齋沐遣官而朕躬未行恭謁追慕之殷以日為歳每臨餐廢箸中夜以興所以擇吉東行必不獲已兹復思太祖太宗創造丕基付託朕躬纘承匪易目今方隅未靖師旅繁興兼之旱澇頻仍小民失所一應養兵恤民措置規畫朕與諸司夙夜岡維猶虞不給東行徃返未免延曠時日有稽政務欲専心化理則難展至情若亟遂孝思又慮乖民望再四躊躇我太祖太宗原以天下生民為念如天下未安無以上慰太祖太宗在天之靈朕心亦何能安為此今歳停止東行俟他年有暇再行展謁爾部即行傳知至是遣輔國公班布爾善等恭代致祭福陵祝文曰恭荷皇祖考皇祖妣鴻庥獲承天眷慶衍𦕈躬繼登大位十有一年翹望山陵曷勝瞻戀頃於八月謹卜吉期䖍申祭謁第念太祖太宗創興大業及兹纘承付託甚重今者方隅未靖水旱頻仍生民未得其所凡䘏兵養民籌度未遑誠慮徃來道逺動需時日或致有悞國事上負皇祖考皇祖妣乂安天下之至意用是勉從羣議暫止兹行俟歳之暇必當躬徃反復思維不勝愾慕中心感傷兹遣官恭代用將悃誠伏祈神靈昭鑒昭陵祝文同十五年十二月禮部議凡官員有以他事赴盛京者三品以上於皇陵城門外行禮不得入門遇祭祀日二品以上大臣許入門同守陵各官侍班從之十七年派宗室覺羅數人居盛京每祭陵日令其行禮康熙二年十一月禮部題福陵昭陵孝陵四季大祭恭奉神牌安設寶座致祭其聖誕忌辰十月朔及每月朔望祭祀既無祝帛應不動神牌掲幔祭獻從之三年正月更定王以下三品官以上謁陵禮儀禮部議王以下三品官員以上凡有事徃盛京至福陵昭陵祗謁者應於城門外行禮開城門盛京禮部官同看守值班官員導引進謁來時不必進謁若徃孝陵王以下三品官以上應於享殿大門外行禮開享殿大門陵上禮部官同看守值班官員導引進謁來時不必進謁至徃湯泉養疾者詣陵進謁應准行禮若遇進祀供獻不必隨班行禮得㫖王貝勒行禮開殿門城門貝子以下三品官員以上行禮不必開門餘依議定清明節上土儀每歳清明於各陵上土十有三擔承祭官總管防官率官兵共十有三人升寶頂上土預於界外取土貯陵垣潔淨處候用又定陵寢祭享易豕為羊並酌定祭品八年停止宗室覺羅居住盛京每年四陵四時大祭遣多羅貝勒以下奉國將軍覺羅男爵以上前徃致祭九年八月丁酉聖祖仁皇帝奉太皇太后皇太后啟行恭謁孝陵乙巳行祗謁禮丙午上詣隆恩殿大祭丁未詣寶城前致祭先是閏二月丁巳諭禮部皇考升遐倐經十載罔極之思時恫於懐山陵在望未一展祭尤切悽愴朕擬於今歳八月恭行謁陵禮又奉太皇太后㫖思念情殷亦欲詣陵朕敬遵慈命躬侍前徃應行典禮爾部詳議具奏及謁陵之日太皇太后仁憲皇太后孝誠仁皇后公主等先行太皇太后駕入隆恩門至明樓階前降輿仁憲皇太后駕入隆恩門至隆恩殿階東南降輿孝誠仁皇后至隆恩門燎爐旁降輿公主等至隆恩門外階下下車馬扈從婦女至三洞橋迤南下車馬太皇太后於方城上東旁坐祭酒舉哀仁憲皇太后率孝誠仁皇后暨公主等於明樓前正中行六肅三跪三拜禮隨舉哀祭酒時行三拜禮禮畢奉太皇太后陞輿還行宫聖祖仁皇帝至下馬石牌降騎王以下各官均在五洞橋迤北下馬恭謁行禮出乘騎還行宫次日於隆恩殿行大饗禮又次日於寶城前設黄幄行焚楮帛讀文致祭禮恭奉太皇太后仁憲皇太后率孝誠仁皇后公主等先行至寶城前太常官讀祭文聖祖仁皇帝祭酒行禮王以下各官於陵寢門外均隨行禮如儀禮成聖祖仁皇帝御行宫守陵官員行朝見禮臣等謹按康熙九年以後聖祖仁皇帝恭謁孝陵二十七年以後恭謁孝莊文皇后暫安奉殿皆歳或一行或至再三聖孝淳深禮儀頻復史氏已詳書之兹考謹以其儀制初定或復更易者登載於編世宗憲皇帝恭謁昭西陵孝陵孝東陵景陵暨皇上恭謁昭西陵孝陵孝東陵景陵泰陵其紀載之法敬從前例十年九月聖祖仁皇帝恭謁福陵昭陵行告成禮先是九年九月丙辰諭禮部太祖髙皇帝創建鴻圖肇興景運太宗文皇帝丕基式廓大業克宏迨世祖章皇帝誕昭功徳統一寰區即欲躬詣太祖太宗山陵以天下一統致告用展孝思因盗賊未靖師旅繁興暫停徃謁朕以𦕈躬纘承鴻緒上託祖宗隆庥天下底定盗賊戢寧兵戈偃息毎念皇考未竟之志朝夕寢食不遑寧處本欲先詣太祖太宗山陵再詣世祖山陵因奉太皇太后慈命以世祖升遐十年未得一詣陵寢於本年八月前徃朕是以恭侍太皇太后先詣孝陵展謁禮成言旋今欲仰體皇考前志躬詣太祖太宗山陵以告成功展朕孝思著議政王貝勒大臣内院九卿科道掌印不掌印各官會議具奏庚申議政王大臣等議言今歳北地苦旱南方患水兼之黄運二河大興工役皇上已於八月内躬詣孝陵今復徃謁二陵路途遥逺凡一應所用之物預備難及請暫停恭謂得㫖謁陵典禮關係甚大今年暫行停止其舉行日期著候㫖行至是年正月甲子諭禮部朕仰體世祖章皇帝遺志欲躬詣太祖太宗山陵展祭以告成功前命議政王貝勒大臣等會議議政王等以去年各處多有水旱災荒且為時甚迫應用之物預備不及具題暫行停止今思太祖太宗創業垂統功徳隆盛山陵在望刻不能忘去年恭謁孝陵禮成今已數月若再久延孝思莫殫朕懐靡寧兹當海内無事欲乘此躬詣福陵昭陵以告成功用展孝思事關大典著議政王貝勒大臣内閣九卿科道各官會議具奏爾部即遵諭行啟行之前一日聖祖仁皇帝躬詣太廟行祗告禮次日啟鑾設騎駕鹵簿不作樂至日恭謁福陵行禮畢隨恭謁昭陵行禮次日恭謁福陵昭陵隆恩殿行大饗禮又次日於福陵昭陵隆恩殿前設黄幄焚楮帛行讀文致祭禮禮成還宫先期鴻臚寺題請守陵官員暨盛京文武各官咸朝服於崇政殿前序立行三跪九叩禮又命守陵官員盛京官員及老疾休致候補官員咸朝服於大清門兩旁分翼齊集設騎駕鹵簿於大清門前聖祖仁皇帝御門陞座作樂賜燕頒賞畢各官均行三跪九叩禮次頒賞守陵官軍盛京官軍及老疾辭退官軍等畢聖駕回行宫遣王暨内大臣前詣永陵致祭福陵昭陵時諸妃園寢亦照常致祭穎親王薩哈廉克勤郡王岳託功臣直義公費英東𢎞毅公額亦都武勲王揚古利忠義公圖爾格墓各遣大臣祭酒回鑾時率王以下各官恭詣福陵昭陵行告成禮是日不啟正門聖祖仁皇帝進旁門下馬諸王於旁門外下馬各官於紅樁前下馬聖駕回鑾設儀仗作樂經過地方官咸朝服跪迎聖祖仁皇帝徃返均詣孝陵祭酒至京日恭詣太廟行祗告禮畢還宫次日王以下文武各官進表慶賀頒詔天下十五年定陵寢祭品祭儀議准陵寢供獻酌定用五十盤今六十五盤每年清明孟秋望冬至歳暮陵寢各遣官一人陳太牢俎豆上香奠帛獻爵讀文致祭遣官由宗人府具題三月十八日萬夀聖節及十月朔陵寢獻酒果不讀祝奠帛遣守陵官上香行禮各陵寢忌辰行禮同以上由太常寺具題每月朔望陵寢各獻羊一果實十二盤守陵官上香行禮十八年七月宗人府議准盛京三陵每年四時祭祀令盛京將軍副都統侍郎内派出致祭孝陵仍遣在京大臣致祭如有大事致祭四陵俱於和碩親王以下鎮國將軍及文武大臣内遣祭二十年三月辛酉奉移仁孝皇后孝昭皇后梓宫安葬辛巳上謁孝陵行禮次至仁孝皇后孝昭皇后陵命皇子等行禮奠酒自是年始至孝陵畢次聖駕謁陵奠酒皇后儀同十一月甲子上以雲南報㨗恭謁孝陵行禮次至仁孝皇后孝昭皇后陵奠酒丁夘行大祭禮二十一年二月上以雲南底定親詣永陵福陵昭陵告祭行禮啟行前一日祗告奉先殿所過州縣守土官迎送如儀過遵化州遣郡王各一人祭告孝陵及仁孝皇后孝昭皇后陵上仍親詣奠酒三月壬子恭謁福陵昭陵癸丑恭詣福陵寶城前大祭焚楮帛讀文甲寅詣福陵隆恩殿行大祭禮乙夘詣昭陵寶城前大祭焚楮帛讀文丙辰詣昭陵隆恩殿行大祭禮儀與康熙十年同夀康太妃宸妃懿靖大貴妃園寢上皆親詣奠酒康惠淑妃以下遣王等祭酒穎親王薩哈廉克勤郡王岳託武勲王揚古利直義公費英東𢎞毅公額亦都忠義公圖爾格墓遣大臣讀文致祭多羅靖定貝勒飛揚武多羅安平貝勒杜度鎮國公馬占碩翁科洛巴圖魯圖魯什輔國公塔拜鎮國將軍聶克塞鎮國將軍湯五泰鎮國將軍慕爾察都統納穆泰都統楞額禮大學士達海巴克什大學士雅秦都統逹爾哈額駙内大臣伊爾登尚書薩穆什喀領侍衛内大臣精竒尼哈畨多爾濟内大臣諾爾布占土謝圖二等伯明阿都統覺羅拖博輝原列五大臣内碩翁科洛巴圖魯尚書伊孫額駙李永芳都統博爾金侍衛内大臣宗室額克秦盛亰按班章京葉克書尚書冀孫内大臣公常鼐一等精竒尼哈畨巴竒蘭精竒尼哈畨侍衛席爾巴隨從太宗文皇帝安逹理敦逹理尚書車爾格盛京將軍阿穆圖内大臣覺羅色勒尚書馬福塔墓俱遣官奠酒東京達爾漢巴圖魯親王舒爾哈齊卓禮克圖貝勒巴雅喇墓亦遣大臣徃奠己未駕至興京展謁永陵親王以下一等侍衛三品官以上咸素服隨行禮由左門入至臺階下拜位行謁見禮其次日行大饗禮儀與福陵昭陵禮同永陵内武功郡王禮敦巴圖魯恪恭貝勒塔察篇古墓遣大臣於殿外兩旁設筵致祭復遣官祭陵寢附近地方覺羅祖墓禮成賞賚永陵居住官員兵丁各有差次詣黒龍江地方望祭長白山率諸王百官行禮四月丙申以回鑾恭詣福陵昭陵奠酒五月庚戍至遵化州復詣孝陵奠酒次至仁孝皇后孝昭皇后陵奠酒聖駕回京日祗告奉先殿其王以下文武各官表賀奉㫖停止二十二年十一月庚寅上以平定海㓂親謁孝陵行禮次至仁孝皇后孝昭皇后陵奠酒辛夘行告祭禮十二月宗人府議准嗣後孝陵仁孝皇后孝昭皇后陵四時祭祀及遇大事致祭四陵俱將和碩親王以下宗室公以上派出遣祭二十七年四月庚申奉移太皇太后梓宫於暫安奉殿内享殿五月丙申上謁暫安奉殿距陵十里許上哀不能禁沿途哭泣詣暫安奉殿行禮奠酒痛哭良久出殿後乘馬行猶涕泣不止次謁孝陵行禮次至仁孝皇后孝昭皇后陵奠酒丁酉上復詣暫安奉殿痛哭良久始出自是年始殿次謁聖駕謁孝陵暫安奉儀同二十八年十月癸未奉安孝懿皇后梓宫於陵寢癸巳上詣暫安奉殿孝陵奠酒又至仁孝皇后孝昭皇后孝懿皇后陵舉哀三十二年十一月乙巳上奉皇太后謁暫安奉殿孝陵行禮次至仁孝皇后孝昭皇后孝懿皇后陵奠酒三十五年二月丁亥朔上以親征噶爾丹謁暫安奉殿孝陵行禮次至仁孝皇后孝昭皇后孝懿皇后陵奠酒三十六年十月諭曰暫安奉殿非係山陵地方既近嗣後凡忌辰致祭著照四時大饗禮行三十七年七月辛丑上以親征平定噶爾丹恭奉皇太后詣盛京謁陵告祭先期諭大學士等曰朕三次親征剿滅噶爾丹皆祖宗庇佑所致朕奉皇太后躬詣盛京謁陵告祭但此時秋禾盛長若由山海關而行恐致踐踏田畝可取道口外前徃及啟鑾出古北口經䝉古諸部落至松花江及吉林烏拉之地九月癸丑駕至興京甲寅展謁永陵行禮遣官至武功郡王禮敦巴圖魯恪恭貝勒塔察篇古墓奠酒賜守陵官兵銀幣有差丙辰至盛京丁巳展謁福陵昭陵次日戊午詣福陵隆恩殿大祭諭内大臣等曰開國佐運勲臣揚古利費英東額亦都三人効力甚可嘉尚此三人墓朕祭昭陵之日親臨奠酒其餘諸臣効力亦屬可嘉康熙二十一年曾經祭奠者照前舉行穎親王薩哈廉克勤郡王岳託等墓各遣大臣致祭尋揚古利費英東額亦都之子孫福善等奏請停止親臨奠酒上諭之曰太祖太宗開國定鼎爾祖佐輔勲勞即爾等亦不能詳悉朕時閲實録知爾等之祖於開創時功績懋著深屬可嘉朕既來謁陵必當臨爾祖墓奠酒爾等母庸再奏次日己未上詣昭陵隆恩殿大祭畢親臨武勲王揚古利直義公費英東𢎞毅公額亦都墓設牀偏西北向上坐牀上置奠池各奠酒三巵隨從王大臣侍衛等及勲臣子孫皆於墳院内叩頭賜守陵官員人等銀幣有差駕回鑾入山海關十一月辛巳謁暫安奉殿孝陵行禮次至仁孝皇后孝昭皇后孝懿皇后陵奠酒禮成奉皇太后回京四十八年二月丁夘孝昭皇后忌辰前一日遣官致祭陵寢前期禮臣奏二月二十六日清明祭陵之期是日值孝昭皇后忌辰例應致祭查從前並無二祭相值之日且忌辰無祭文今或於前一日致祭或二祭並於一日伏候欽定得㫖著前期一日致祭五十七年四月乙酉奉安孝惠章皇后梓宫於新陵地宫十二月壬戌上謁孝惠章皇后陵奠酒讀文致祭畢旋詣暫安奉殿孝陵舉哀奠酒行禮如常儀六十年正月乙亥上以御極六十年大慶命皇四子和碩雍親王帝世宗憲皇廟諱皇十二子固山貝子允裪世子𢎞晟恭代祭告永陵福陵昭陵先是五十九年十二月諭大學士等曰諸王大臣為朕在位六十年奏請慶賀而於典禮之大者並未議及朕在位六十年皆祖宗積徳隂佑所致幸而六十年來一無所失應先徃盛京三陵行大祭典禮但朕今年近七旬不能親謁三陵應遣阿哥等恭代告祭俟上元節後朕親徃孝陵恭行大祭典禮其祭陵撰文即將朕㫖纂入二月乙巳上以御極六十年大慶恭謁暫安奉殿孝陵孝東陵行禮次至仁孝皇后孝昭皇后孝懿皇后陵奠酒丁未行大祭禮先是正月丁亥文武諸大臣公奏言皇上以御極六十年大慶欲親詣陵寢告祭誠聖孝之至意第皇上足病初愈冐寒逺行恐勞聖體懇祈停止謁陵上諭曰朕前兩次欲親祭陵寢皆因諸大臣勸阻未行至今猶自追悔爾等勸朕不去朕即不去至三月時諸臣若勸朕陞殿行慶賀禮朕亦借風寒不准所請可也文武諸大臣又再四懇請上終不允雍正元年四月辛亥世宗憲皇帝恭謁暫安奉殿孝陵孝東陵行禮次詣仁孝皇后孝昭皇后孝懿皇后陵行禮是日奉安聖祖仁皇帝梓宫於景陵饗殿八月辛未上恭謁暫安奉殿孝陵孝東陵行禮遂至景陵饗殿行禮三年十一月丙午上恭謁昭西陵孝陵孝東陵景陵行禮嗣後孝陵次聖駕恭謁孝東陵昭西陵次謁景謁次謁陵儀同四年十一月定聖祖仁皇帝忌辰致祭儀諭禮部曰皇考聖祖仁皇帝三年大禮已滿朕追念罔極深恩欲於皇考忌辰每嵗遵照三年内祭禮舉行朕終身永慕豈三年祭禮所能限况億萬臣民感戴皇考深仁厚澤自古帝王罕能比並一切禮儀亦非定制所得拘也朕舉行此禮自展思慕誠切之𠂻至於舊制合否皆不遑計此禮亦惟朕躬行於我皇考後世子孫不必奉為成例應行禮儀該部議奏尋禮部議每年聖祖仁皇帝忌辰照周年祭祀例讀文致祭其内務府禮部工部太常寺光禄寺及有執事各該衙門先期奏請遣堂官前徃屆期於在京王公大臣内或陵寢王公大臣内恭候欽命一人主祭在京王公各官三分之一遣徃陪祭永逺遵行五年七月丙辰更定昭西陵帷幄用明黄色諭禮部曰昭西陵帷幄用金黄色孝東陵帷幄用明黄色陵寢神龕寶座供奉之物理應同色但供奉多年不敢輕易更換俟年代久逺遇應更換之時著俱用明黄色八年十一月丙子以聖祖仁皇帝忌辰先期致祭是歳十一月十三日冬至先期於十一日行周年致祭禮皇朝文獻通考卷一百五十三
