body:
  text: 四裔考五南暹羅暹羅東廣南南東埔塞古暹羅斛兩國地也地方千里環國皆山國分郡邑縣𨽻於府府𨽻大庫司大庫司者猶華言布政司也庫司九曰暹羅可刺細馬足曹本皮細緑束骨胎果平匹倒腦細討丕六毗府十四曰綵納無老比采東板魯􅀈皮匹皮里采野多鐃千無里細辭滑采欲欵細灣沾奔魁山縣七十二西北土磽確暹地也東南土平衍羅斛地也王城分八門城壕磚砌周遭十餘里城中有小河通舟城外西南居民輳集王居在城西隅另建城約三里餘殿用金裝綵繪覆以銅瓦室用錫瓦階砌用錫裹磚欄杆用銅裹木王出乘金裝彩轎或乘象車其􅏛蓋以茭蔁葉為之王每旦登殿官僚於臺下設氊以次盤膝坐合掌於頂獻花數朵有事則具文書朗誦上呈候王定奪乃退國王自明洪武中始用中國賜印國朝往封賜以駝紐鍍金銀印文曰暹羅國王其國官制九等一曰握亞往二曰握步喇三曰握蠎四曰握坤五曰握悶六曰握文七曰握板八曰握郎九曰握救選舉由鄊舉於大庫司以文逹於王所王定期試之咨以民事應答得當即授官服補用否則黜考課亦以三年為期其文字皆旁行不通漢字明正德中選留貢使一二人入館肄業後乃稍習漢文其服飾惟王留髮冠金嵌寶石帽製似兜鍪上衣長三尺用五綵縀小䄂下用五綵布幔鞋襪用紅縀官及庶民皆剪髮男女稚結白布纒頭官一等至四等金嵌寶石帽五等至九等五綵絨縀帽衣俱兩截襪履用牛皮婦人粧髻於後飾用金銀簮戒指鐲釧脂粉貧者用銅上衣披五色飛花布幔下衣五綵織金花幔曵地餘二三寸足著紅黑皮靸鞋氣候不常地卑濕人皆樓居上聫檳榔片藤覆之亦有用陶瓦者無床桌椅凳但以氊及藤席藉之而已俗信釋教男女多為僧尼亦居庵寺富貴者尤敬佛百金之産以半施之亦不自惜死者用水銀灌口而葬貧則移尸海濵即有群鴉飛啄頃刻盡所親拾其骨號泣而投之海謂之鳥葬其交易以海􅖝代錢是年不用􅖝則國必大疫官民有銀不得私用皆送王所委官傾㵼成珠用鐵印印文其上每百兩入稅六錢無印文以私銀論罪初犯斷左指再犯斷右指三犯者死錢榖出入之事取决婦人婦多智夫聽命焉國人有名無姓為官者稱握某民上者稱奈某下者稱隘某風俗徑悍習於水戰大將用聖鐵裹身刀矢不能入聖鐵者人腦骨也其土産有龍涎香速香金銀香象牙胡椒藤黃豆蔻蘇木烏木大楓子薔微露西洋閃金花縀之屬皆充貢物又金石則有金綱鑽寶石花錫之屬羽毛鱗介則有孔雀五色鸚鵡犀象金絲猴六足龜之屬花木蔬果則有黃竹萗竹猫竹石榴子水瓜土瓜之屬香則有丁香沉香樹香之屬又産羅斛香味清逺似沉香蓋以其地得名也明洪武中入朝賜印文曰暹羅始稱暹羅國我朝順治九年十二月暹羅遣使請貢并換給印敕勘合從之自是職貢不絶康熙三年七月平南王尚可喜奏言暹羅國來餽禮物却不受並請嗣後外國禁餽邉藩督撫從之四年十一月國王森列拍臘照古龍拍臘馬呼陸坤司由提雅普埃遣陪臣坤司吝喇耶邁低禮等齎金葉表文航海入貢其文曰暹羅國王臣森列拍臘照古龍拍臘馬呼陸坤司由提雅普埃誠惶誠恐稽首頓首謹奏大清皇帝陛下伏以新君御世普照中天四海沾帡幪之德萬方被教化之恩卑國久荷天朝恩渥未傾葵藿之心今特躬誠朝貢敢效輸欵敬差正貢使握坤司吝喇耶邁低禮副貢使握坤心勿吞瓦替三貢使握坤司敕博瓦綈大通事揭帝典辦事等臣綈航渡海齎奉金葉表文方物譯書一道前至廣省差官伴送京師進獻用伸拜舞之誠恪盡逺臣之職伏冀俯垂寬宥不恭微臣瞻仰天聖曷勝屏營之至謹具表稱奏以聞上命從優賞賚七年十一月遣陪臣握坤司吝喇耶邁低禮等來貢時部議以所貢物與㑹典不符應令後次補貢得㫖暹羅小國貢物有産自他國者與㑹典難以相符所少貢物免其補進以後但以伊國所有者進貢十一年三月遣使來貢得㫖貢使所擕貨物願至京師貿易則聽其自運或願在廣東貿易督撫委官監視之十二年二月貢使握坤司吝喇耶邁低禮等至四月封森列拍臘照古龍拍臘馬呼陸坤司由提雅普埃為暹羅國王賜誥命銀印令握坤司吝喇耶邁低禮等齎回誥曰來王來享要荒昭事大之誠悉主悉臣國家著柔逺之義朕纘承鴻緒期德教暨於遐陬誕撫多方使屏翰躋於康乂彛章具在渙號冝頒爾暹羅國森列拍臘照古龍拍臘馬呼陸坤司由提雅普埃秉志忠誠服躬禮義既傾心以向化乃航海而請封礪山帶河克荷維藩之寄制節謹度無忘執玉之心念爾悃忱朕甚嘉焉今封爾為暹羅國王賜之誥命爾其益矢忠貞廣宣聲教膺兹榮寵輯乃封圻於戲保民社而王纂休聲於舊服守共球之職懋嘉績於侯封爾其欽哉無替朕命先是外洋貢船入廣東界守臣查驗屬實進泊河干封貯所携貢物俟禮部文到始貿易物輒毁壞二十三年六月國王遣使來貢因疏請嗣後貢船到廣具報後即次河干俾貨物早得貿易并請本國採買器用乞諭地方官給照置辦貢使進京先遣貢船回國次年差船奉迎聖敕歸國奏入部議應如所請二十四年十二月閣部議覆增賞暹羅縀幣表裏五十從之四十七年六月遣使入貢得㫖貢使所帶貨物聽隨便貿易免其徴稅六十一年四月遣使來貢賜其國王及王妃紗縀諭令運米三十萬石於福建廣東寧波等處糶賣並諭大學士等曰暹羅國人言其地米甚饒裕銀二三錢可買稻米一石朕諭令分運米石至福建等處於地方甚有禆益此三十萬石係官運不必收稅雍正二年十月貢稻種果樹加賜國王蠎緞玉磁等器其船捎目九十六人本係漢人求免回籍得㫖暹羅不憚險逺進獻稻種果樹恭順可嘉其運來米石令地方官以時直售賣毋許行户低昂隨帶貨物槩免征稅捎目九十六人居住該國歷經數代實難勒令歸還應免回籍以示寬大之典六年二月運米入厦門七年六月載米船艘因風飄泊其撈回壓船貨物并免征稅七月遣使入貢賞賚如例又加賜國王蠎縀玉磁等器御書天南樂國匾額賜之並奉㫖該國逺隔海洋所進方物齎送不易朕欲酌量裁減以示恩恤逺藩之意但此次既已齎送難以帶回本國著照往例收納其常貢土物內有束香安息香架裟布匹等嗣後免其入貢是年貢使到廣呈請採買京弓銅線等物上特允之乾隆元年六月國王森列拍照廣拍馬呼陸坤司由提雅普埃以嗣立故遣陪臣朗三立哇提等賫舊篆及方物例貢象一隻因航海故增一以偹並咨禮部言往時欽賜蟒龍大袍藏承恩亭上歷世久逺難保無虞懇再邀恩賞賜一二每年造福送寺需用銅斤求暫開禁例赴粵採買部議不可得㫖暹羅逺處海洋抒誠納貢除照定例給賞外可特賞蟒緞四匹至採買銅斤一節國王稱係造福送寺之用加恩賞給八百斤後不為例八年九月奉㫖暹羅國商人運米至閩源源而來其加恩之處自當著為常例嗣後外洋貨船帶米萬石以上者免船貨稅銀十之五五千石以上者免稅十之三十一年九月暹羅商載米進泊閩海或四千三百石或祗三千八百有零餘皆蘇木鉛錫等貨福建將軍新柱奏畨船載米不足五千之數所有船貨額征未便援例寬免上以該番航海逺來仍加恩免其船貨稅銀十分之二次年福撫陳大受奏言閩商前赴暹羅販米其國木料甚賤應聽造船運回給照查驗報可自是番船益便往來十四年七月遣使入貢御書炎服屏藩匾額賜之十六年閩督奏請商人赴暹羅運米至二千石以上者查明議叙賞給頂帶上從之十八年二月遣使入貢并懇賜人參纓牛良馬象牙并通徹規儀內監部議不可并飭使臣於歸國後曉諭國王恪守規制益勵敬恭得㫖方物照例收受其筵宴賞賚著加恩照上次例行並加賜人參二十二年遣使入貢二十七年遣使入貢三十年十月遣使丕雅嵩統呵沛等賫表入貢三十一年遣使入貢仍照例加賞先是乾隆元年暹羅貢使呈稱國王乞賜蟒龍大袍一二襲奉㫖特賜蟒緞四端十四年入貢特加賜蟒緞片金粧緞閃緞各二匹錦四匹緞八匹玉器六件瑪瑙器二件琺琅器四件松花石硯二方玻璃器十件磁器百四十六件又因續進黑熊白猿等物加賞國王庫緞二十匹十八年特賜人參四斤緞錦共二十匹玉器四件瑪瑙器二件琺琅器六件銅暖硯二方玻璃器十件磁器一百四十件二十二年入貢特賜國王蟒緞錦緞各二匹閃緞片金各一匹八絲緞四匹玉器瑪瑙器各一件松花石硯二方琺琅器十三件磁器一百四十件二十七年三十一年特賜物件俱與二十二年同四十六年正月暹羅國長鄭昭遣使臣朗丕彩悉呢霞握撫突等二人入貢并奏稱自遭緬匪侵凌雖復土報仇紹裔無人兹群吏推昭為長遵例貢獻方物得㫖覽國長遣使航海逺來具見悃忱該部知道原表並發上於山髙水長連日賜使臣宴暹羅貢道由廣東逹京師其國都在廣東省西南海道約四十五晝夜可至始自廣東香山縣登舟乘北風用午針出七洲洋十晝夜抵安南海次中有一山名外羅八晝夜抵占城海次十二晝夜抵大崑崙山又用東北風轉舟向未及申三分五晝夜可抵大真樹港五晝夜可抵暹羅港入港二百里即淡水洋又五日抵暹羅城其國西南有大山綿亘由暹羅沿山海而南為宋腒朥􅀈仔六崑大呢皆暹羅屬國臣等謹按暹羅相傳即隋唐時赤土國隋焬帝時屯田主事常駿至赤土知其國王姓瞿曇氏豈王崇佛教故從之耶考暹羅館志則云人皆有名無姓雖世隔千年而有姓無姓語多不符又暹羅為扶南别種南史海南諸國傳扶南初以女人為王號曰栁葉明王圻續通考稱暹羅婦人智量在男子上其果扶南遺風歟自元明以來世與華通我朝文命逺敷兼令運載米石津濟內地徛歟休哉比於明鄭和之下海洋徒收寶物者何啻霄壤而該國奉琛王享慕義無窮在南方諸國中蓋與安南比埒云港口港口國在西南海中安南暹羅屬國也王鄭姓今王名天錫其沿革世次不可考國中多崇山所轄地才數百里有城以木為之宫室與中國無異自王居以下皆用磚瓦服物制度倣佛前代王蓄髮戴網巾紗帽身衣蟒袍腰圍角帶以鞾為履民衣長領廣袖有喪皆衣白平居以雜色為之其地常暖雖秋冬亦不寒人多裸而以裳圍其下體相見以合掌拱上為禮其風俗重文學好詩書國中建有孔子廟王與國人皆敬禮之有義學選國人子弟之秀者及貧而不能具修脯者絃誦其中漢人有僦居其地而能句讀曉文義者則延以為師子弟皆彬彬如也土産海參魚乾蝦米牛脯本朝雍正七年後通市不絶經七洲大洋到魯萬山由虎門入口達廣東界計程七千二百里距厦門水程一百六十更臣等謹按諸畨之於中華皆海為之限港口東埔寨去粵東止七千里在諸畨中為最近觀其宫室婚姻吉凶之制略與中國同而建文廟設義學俾國人皆知絃誦以自附於中華之禮教是則聖人之道之大與聖朝之化之神也東埔寨尹代嗎附東埔寨在西南海中海岸多泥名瀾泥尾北枕大山國中無城池王即山而建府架竹木為之覆以茅葉民居亦然其尤近海濵者潮汐至則屋為之浮而上沉而下天時暖而不寒常若春夏衣不以鈕扣披于其身若已解者下則圍以裙名曰水幔首蓄髮䝉以花帕自王至于國人無異制惟貴者始得服綢緞國人皆布以是為等差人柔弱喜飼象教之撡演禦敵飲食咸用手團以漁獵耕種為業帶劎入山尋犀角獻尊長以為禮父母喪則剃髮以黑色為居喪之服土産蘇木象牙白豆䓻螣黃麖皮檳榔子黃蠟每冬春間浙閩粵商人往彼互市近則兼市絲斤及夏秋乃歸粵人之歸也舟必經七洲大洋到魯萬山由虎門入計程七千二百里距厦門水程一百七十更國王名竦王丹女之子篡之不知其姓名安南暹羅屬國也其旁有尹代嗎國距厦門水程一百四十更亦屬安南暹羅風俗略與港口東埔寨同宋腒朥􅀈子六崑大呢附宋腒朥在西南海中屬暹羅俗佞佛以手團食男蓄髮削其髯著衣袴無鞋襪首插雉尾腰繫匹帛事耕漁常佩刀女椎髻跣足短衣長裙披錦于肩能紡織土産牛鹿肉蝦米燕窩海參番錫之屬本朝雍正七年後通市不絶其國距厦門水程一百八十更旁有􅀈仔六崑大呢諸國􅀈仔在西南海中東北與宋腒朥接風俗男子服短衣布幔跣足持刀女穿花色衣被絲幔足曵淺拖鞋土産燕窩番錫象牙棉花其國距厦門水程一百八十更西與六崑國接六崑風俗物産同􅀈仔距厦門水程一百五十更大呢一名大年在西南海中東北與六崑接男女短衣跣足佩刀執鎗土産胡椒蝦米燕窩黃蠟牛鹿脯其國距履門水程一百五十更三國自雍正七年後通市不絶與宋腒朥俱暹羅屬國柔佛丁機奴單呾彭亨附柔佛在西南海中背山而國前臨大海歷海洋九千里達廣東界經七洲大洋到魯萬山由虎門入口國中無地郭宫室王府即建於海濵府治非磚瓦所成支以竹木蓋以茅葉民皆環山而居亦竹木茅葉為之崇山峻嶺樹木叢雜野獸縱橫天時雖秋冬亦暖王以桞葉為衣左袵下裳密綴小花為之佩刀首蓄髮長二三寸䝉以金花帕跣足民人冠用銅線為胎幔以白布衣短衫或裸而以裳圍其下體婦女織席挽椎髻肩披錦父母喪則剃髮衣黑衣為喪服夫皆贅於婦相見以合掌拱上為禮俗輕生好殺尚佛教喜鬪雞伐烏木拾海菜時出海劫掠飲食以手忌猪肉嗜烟嵗齊一月舉國絶食見星乃食歷三十日始止土産降香烏木西國米氷片海參胡椒燕窩之屬亦産沙金鑄花小金錢為幣康熙五十七年五月柔佛等國畨人利哈等五十三名遭風飄至新安等縣船壞官給資糧贍恤兩廣總督楊琳奏言柔佛等國無內地商船到彼閩粵二省亦無彼國船隻今原船已壞利哈等永無還鄉之日情殊可憫請給內地船一隻令難番附合駕歸嗣後如有飄至內地難番原船可修者給資修整如船已損壞者給船遣歸奏入上從之時方嚴南洋諸國商販之禁逮雍正七年弛禁後其國通市不絶距厦門水程一百八十更七洲洋中有神鳥狀如海雁而小長喙色紅腳短而緑尾羽如箭長二尺許能導人水程呼是則飛去曰否則仍飛而來獻紙謝神翺翔不知所之矣柔佛屬國有丁機奴單呾彭亨雍正七年後皆通市不絶丁機奴在西南海中四時皆暖雖隆冬無霜雪崇山峻嶺蜿蟺相望風俗略同柔佛土産胡椒美甲於他番餘則沙金氷片沙藤速香等物其國人終身不出境無航海而來中國者每嵗冬春間粵東本港商人以茶葉瓷器色紙諸物往其國互市乾隆二十九年以兩廣總督蘇昌奏准帶土絲及二蠶湖絲浙閩人亦間有往者乃夏秋乃歸必經七洲大洋至魯萬山由虎門入口達廣東界計程九千里單呾在西南海中距厦門水程一百三十更風俗衣服飲食土産與柔佛同彭亨國與柔佛連山相枕內地商民往柔佛國有轉附番舶至其地貿易者亞齊亞齊在西南海中相傳舊為蘇門答剌國明萬歷中乃易今稱其王嚴防衛拓宫殿建六門雖勳貴不得帶刀上殿出乘象象駕亭而帷其外如是者百餘俾人莫測王所在云風俗男女穿長衣頭纒白布土産西洋布丁香肉果水安息蘇合油之屬地本瘠無麥有禾一嵗二稔市道稱平內地商船常往其地貿易吕宋吕宋居南海中在臺灣鳯山沙馬畸東南至厦門水程七十二更其國北面髙山逺視若鋸齒俗曰宰牛坑山有土畨屬於吕宋閩人以其地富饒商販者數萬人往往久居不返至長子孫俗淳朴無爭訟出入佩刀自衛亦時禮佛誦經父子兄弟不同寢席晨鳴鐘為日午鳴鐘為夜昏鳴鐘為日夜半鳴鐘為夜傍午嚴夜禁黃昏張燈火成市國有機易山産金銀傳聞樹生金豆按驗亦不實也明萬歷中佛朗機自西北來見吕宋國弱可取遣酋襲殺王據其國名仍吕宋本朝崇德中吕宋遣使進貢於明使臣留閩未還順治三年福建平守臣送其使入京師四年六月上錫以服物賜敕諭於其王遣歸本國康熙五十六年吕宋等國口岸多聚漢人聖祖仁皇帝諭令商船禁止南洋貿易雍正五年後通市如故十三年正月吕宋以麥收歉薄附洋船載榖二千石銀二千兩海參七百斤來厦門欲易麥二三千石時提臣王郡以例禁五榖出洋奏請得㫖朕統御寰區內外一體吕宋雖隔重洋朕心並無岐視國家所以嚴禁五榖不許出洋者乃杜奸商匪類暗生事端若該國缺少米糧以實情奏聞朕尚酌量豐餘以濟之今載榖易麥更為情理當從著轉飭有司均平糶糴俾畨船載回以濟其用並將朕㫖傳諭來商知之乾隆十八年六月吕宋畨官龍番教魯那羅船被風飄入內地照例支給口糧護送歸國吕宋大山從宰牛坑延繞東南至利仔犮水程十二更又南至甘馬力水程二十一更隔海對峙有五島曰班愛曰惡黨曰速巫曰猫務烟島各有王人家無所蓄其東南又有萬老髙人物土産俱與吕宋相類由吕宋正南行有山名息力大山山之東為蘇祿國臣等謹按吕宋自故明時為佛朗機所據今之通商互市者大率佛朗機人居多然佛朗機本國自在西北海中勢不得以西北舊名名其東來盤踞之地故於此仍名吕宋云至明萬歷時奸民望風滋擾欲往機易山開採吕宋以並無其事拒而不許事具前史故不悉載莽均逹老莽均逹老在東南海中其種類曰巫來由男女服短衣絲幔跣足以手團食土産海參黃臘烏木檳榔之屬本朝雍正七年後通市不絶其國距厦門水程一百五十更噶喇巴噶喇巴本瓜哇故地巫來由種也後屬荷蘭國在南海中距福建厦門水程二百八十更計一萬六千八百里明世諸番互市其國未嘗一至至本朝始與吕宋蘇祿等通商閩海閩廣間人浮海為業者利其土産率潛處番疆逗遛不返康熙五十六年以噶喇巴口岸多聚漢人恐寖長海盜禁止南洋往來其在外人民不得復歸故土嗣奉恩㫖凡五十六年以前出洋民人限三年回籍然亦尚有留者雍正五年弛洋禁嗣後通市不絶乾隆元年閩督郝玉麟復請自康熙五十六年例禁後私去者不准歸國其例前之民願歸者應聽自便從之初噶喇巴為荷蘭人所占委夷目鎮守更代皆聽荷蘭之命漢人居之者以數萬計生長其地曰土生仔司漢人貿易者曰甲必丹人有罪則徙之西隴西隴在西洋中距噶喇巴逺甚荷蘭舊國所屬地也六年閏六月為羣畨所擾荷蘭力不勝遣罪人禦之許立功後令還噶喇巴罪人奮勇效命戰屢捷羣番為之退却荷蘭既有立功贖罪之令又慮遣還罪人則西隴孤弱一再令噶喇巴調無辜漢人往代時有甲必丹連富者以漢人在此貿易惟領票輸銀無調取之例不受命番目拘之被獲者先後不勝計於是漢人大恐鳴金罷市番目怒舉火鳴炮相攻殺傷頗多署福建總督䇿楞提臣王郡聞於朝䇿楞又奏言被害漢人久居番地屢邀寬宥之恩而自棄王化按之國法皆干嚴譴今被其戕殺多人事屬可傷實則孽由自作但噶喇巴以地隔重洋恃其荒逺罔知顧忌肆行殘害恐嗣後擾及商舶請禁止南洋商販俾知畏懼俟革心向化再為請㫖施恩又廣東道監察御史李清芳奏言商人往東洋者十之一南洋者十之九江浙閩廣稅銀多出於此一加禁遏則四省海關稅額必至於缺每年統計不下數十萬其有損於國帑一也大凡民間貿易皆先時而買及時而賣預為蓄積流通不窮今若一旦禁止商旅必至大困二也應暫停噶喇巴貿易俟其哀求然後再往至南洋各道不宜盡禁奏入上令江浙閩廣督撫詳查議奏嗣兩江總督德沛浙閩總督那蘇圖署福建總督䇿楞兩廣總督慶復皆遵㫖議奏王大臣㑹同兵部奏言臣等查各督撫所議或請毋庸禁止南洋商販或請暫禁噶喇巴往來雖所議不同其大意皆以仰體皇上懷柔無外之盛心令海外逺夷悔過自新均霑德澤即議令暫禁噶喇巴者原欲使其畏懼今聞噶喇巴已將夷目黜責於我船返棹時加意撫慰護送囑令再往並無擾及商客之意宜仍准其通商為便奏入上從之十五年四月閩督喀爾吉善等奏龍溪縣民陳怡老久居噶喇巴貿易娶夢噶適畨女髙冷為妾賄通夷目謀充甲必丹於十四年五月潛回厦門為地方官訪獲以聞照例逺遣二十四年禁絲斤出洋二十七年復弛英吉利瑞璉諸國之禁而南洋噶喇巴諸國飭禁如故二十九年十二月廣督李侍堯等奏言噶喇巴諸國仰望殊恩懇將土絲及二蠶粗絲准一體酌帶其數應以一千六百斤為率時江南督撫亦以為請懇嚴立限制不使外番求售無厭或致市價加昂奏入報可由是南洋諸國皆得衣被聖朝章采奉職彌謹云臣等謹按諸畨在西北者皆來互市在南洋者皆往而互市人曰本港商人船曰本港商船大約自十月至二月乘風往自六月至八月乘風回出口船隻有司於四月內造册報部入口船隻有司於九月內造册報部此出入之候也本港商船在聖祖仁皇帝時止准往東洋一帶及安南一國若吕宋噶喇巴等國皆在禁例逮世宗憲皇帝及我皇上御宇以來中外一家特開洋禁海外諸番無不沐浴膏澤不徒本港商船數十萬衆仰邀利賴也而防範周詳商船禁帶軍器康熙五十九年廣東提臣疏奏出洋商人毋許擕帶軍器上命兩江浙閩兩廣山東各督撫公同議奏僉稱各省自五十六年以來即禁止商船携帶軍器歷年巡哨舟師在洋盤查無軍器者為商船有軍器者為賊艘可使奸良立辨且隨船之篙鎗木棍儘足防身應請如該提臣所奏將沿海各省出洋商船炮械軍器概行禁止令該地方官查收如有私帶者從重治罪地方官不嚴查禁止一并嚴加議處從之又商船限定帶歸米石雍正七年福建總督髙其倬奏定商船出洋帶歸米石應按船隻大小分别如有偷漏照接濟外洋例治罪經兵部同王大臣議應如所請准其照數帶歸仍於入口時確查數目除米石多餘一併造報查核外如不足原數即嚴訊偷漏情由照接濟外洋例處絞從之又商船限定歸期乾隆六年福建按察使王丕烈奏言海洋風信皆有定期內地往來固屬甚便即外洋諸番一年一度間有番帳未清致風信久逾耽延隔嵗者謂之壓冬亦止兩年回棹乃近年內地外洋諸船竟有藉口失風私往各畨貿易日久弊生保無踪跡詭祕作奸犯科之事請嗣後海船出口如至內地貿易者查出口處所勘有逾期未歸之船倘遲至二年後始歸不准復聽其出海貿易至船往外洋諸番逾期不歸倘遲至三四年始歸者商人船舵水手飭回原籍安置永逺不許復出海口其外洋各汛如遇洋船停泊汛防各官照舊掛驗報查倘有船照已閲多年者即將該船勒令入口聽地方官訊究經各省督撫議行惟閩浙總督那蘇圖奏請展期以三年為限從之又商船准帶絲斤二十九年兩廣總督蘇昌奏言噶喇巴暹羅港口安南等國夷民聞英吉利諸國准買絲斤冀得一體邀恩懇於本港商人往彼國時每船酌帶土絲一千斤二蠶湖絲六百斤綢縀八折扣算海外屬國霑沐恩榮即本港商民亦邀藉貿易之資尋經户部議准如數配帶仍定以限制每年一次從之此可見天朝富有四海於慈愛之中寓防制之道內治修而逺人服真所謂至於海隅日出罔不率俾者矣皇朝文獻通考卷二百九十七
