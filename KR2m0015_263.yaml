兩心視相距必與併徑等故務求其恰合而初虧復圓乃為確準也雖其數比舊法所差無多而其理甚為細密至於設時之法則亦有食甚用時近時之義耳今亦如食甚之次第先求初虧復圓用時即前設時次求初虧復圓近時即後設時俾學者知設時之準而其求兩心視相距與以兩視距比例時分則猶是設時之法也既得初虧復圓兩心視相距與併徑等則求得併徑與高弧相交之角即為方位角定帶食以兩心視相距求推日食帶食法舊以初虧復圓距時之視行與日出入距食甚之時分為比例得日出入距食甚之視行而後與食甚視緯求其兩心視相距今推食甚先求兩心視相距而後求視行初虧復圓止求兩心視相距更不求視行則帶食亦可徑求兩心視相距不待先求視行矣且舊法推視行雖不見初虧食甚或不見食甚復圓皆猶多此一算今徑求兩心視相距則以地平為斷凡已初虧而帶出者止求帶出時之相距不用求初虧視行未復圓而帶入者止求帶入時之相距不用求復圓視行若已過食甚而帶出者即以帶食視緯求復圓用時未及食甚而帶入者即以帶食視緯求初虧用時固不用求視行亦不用求食甚其法甚簡况視行不與白道平行帶食之視緯必不與食甚等則徑求帶食兩心視相距而不用視行者其理尤確也推日食法臣等謹按考成下編後編所載推日食法自求積朔首朔以後各有不同後編自求赤白二經交角以後復有本法又法之殊今以欽天監所遵用者序列之求積年同推日躔法求中積分同推日躔法求通積分同推日躔法求天正冬至置通積分其日滿紀法六十去之餘為天正冬至日分上考往古則以所餘轉與紀法六十相減餘為天正冬至日分求紀日以天正冬至日數加一日得紀日求積日置中積分加氣應分不用日減本年天正冬至分亦不用日得積日上考往古則置中積分減氣應分加本年天正冬至分得積日求通朔置積日減朔應日分得通朔上考往古則置積日加朔應得通朔求積朔及首朔置通朔以朔䇿二十九日五三五九五三除之得數加一為積朔餘數與朔䇿相減為首朔上考往古則置通朔以朔䇿除之得數為積朔餘數為首朔求首朔太陰交周以積朔與太陰交周朔䇿一十一萬零四百一十三秒九二四四一三三四相乘滿周天一百二十九萬六千秒去之餘數為秒以宫度分收之為積朔太陰交周加首朔太陰交周應宫度分秒微得首朔太陰交周上考往古則置首朔太陰交周應減積朔太陰交周不及減者加十二宫減之得首朔太陰交周求逐月朔太陰交周置本年首朔太陰交周以太陰交周朔䇿宫度分秒微遞加十三次得逐月朔太陰交周求太陰入交月數逐月朔太陰交周自初宫初度至初宫二十一度一十八分自五宫八度四十二分至六宫九度一十四分自十一宫二十度四十六分至十一宫三十度皆為太陰入交第幾月入交即第幾月有食求平朔以太陰入交月數與朔䇿二十九日五三五九五三相乘得數與本年首朔日分相加其所得日數即平朔距冬至之日數再加紀日滿紀法六十去之自初日甲子起算得平朔干支以周日一千四百四十分通其小餘得平朔時分秒求實朔泛時以平朔距冬至之日數用推日躔月離法各求其子正黃道實行如太陰實行未及太陽則平朔日為實朔本日平朔次日為實朔次日如太陰實行已過太陽則平朔前一日為實朔本日平朔日為實朔次日又用推日躔月離法各求其本日或次日子正黃道實行乃以本日次日兩太陽實行相減為一日之日實行本日次日兩太陰實行相減為一日之月實行一日之二實行相減為一日之月距日實行化秒為一率周日一千四百四十分為二率本日太陽實行內減本日太陰實行餘化秒為三率求得四率為距本日子正後之分數以時收之得實朔泛時求實朔實時以實朔泛時之時刻設前後兩時用推日躔月離法各求其黃道實行乃以前後兩時太陽實行相減為一小時之日實行以前後兩時太陰實行相減為一小時之月實行一小時兩實行相減為一小時月距日實行化秒為一率一小時化作三千六百秒為二率前時太陽實行內減前時太陰實行餘化秒為三率求得四率為秒以分收之加於前時得實朔實時再以實朔實時用推日躔月離法各求其黃道實行則太陰太陽必同宫同度乃視本時月距正交自初宫初度至初宫一十八度二十六分自五宫一十一度三十四分至六宫六度二十二分自十一宫二十三度三十八分至十一宫三十度皆入食限為有食不入此限者不食即不必算求均數時差以實朔太陽均數變時得均數時差一度變為四分十五分變為一分十五秒變為一秒均數加者則為減均數減者則為加求升度時差以半徑一千萬為一率黃赤大距二十三度二十九分之餘弦為二率實朔太陽距春秋分黃道經度之正切線為三率求得四率為距春秋分赤道經度之正切線得太陽距春秋分赤道經度與太陽距春秋分黃道經度相減餘為升度差變時得升度時差二分後為加二至後為減求時差總均數時差與升度時差同為加者則相加為時差總仍為加同為減者亦相加為時差總仍為減一為加一為減者則相減為時差總加數大為加減數大為減求實朔用時置實朔實時加減時差總得實朔用時距日出前日入後五刻以內者可以見食五刻以外者則全在夜即不必算求斜距交角差以一小時太陰白道實行化秒為一邊一小時太陽黃道實行化秒為一邊實朔黃白大距為所夾之角用切線分外角法求得對小邊之角為斜距交角差求斜距黃道交角置實朔黃白大距加斜距交角差得斜距黃道交角求兩經斜距以斜距交角差之正弦為一率一小時太陽實行化秒為二率實朔黃白大距之正弦為三率求得四率為秒以分