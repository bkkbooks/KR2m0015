body:
  text: 象緯考八日食臣等謹按馬端臨所紀歷代日食於食分時刻宿度詳略不同蓋以有可考有不可考耳今欽天監紀順治元年以來所紀日食自食及一分以上者具詳宿度時刻分秒至食不及一分者則據實録所書而列之順治元年八月丙辰朔日食在張宿八度十八分食二分四十八秒午初初刻一分初虧午正一刻二分食甚未初一刻十四分復圓二年十二月己卯朔日食先是六月掌欽天監事湯若望言舊法算得本年十二月己卯朔辰時日食三分強回回科算得食一分弱依新法推之止食半分強且在日出地平之前請臨期遣官測驗至是陰雲不見五年五月乙丑朔日食在觜宿十一度七分食九分十二秒卯初三刻八分初虧卯正三刻七分食甚辰正初刻復圓七年十月辛巳朔日食在亢宿二度十五分食七分四十二秒已正二刻六分初虧午正初刻一分食甚未初二刻五分復圓十四年五月癸卯朔日食在觜宿二度十二分食六分三十七秒寅正一刻四分初虧卯初初刻九分食甚卯正初刻四分復圓十五年五月丁酉朔日食在畢宿六度五十七分食四分二十五秒辰正三刻九分初虧已正初刻十一分食甚午初二刻九分復圓康熙三年十二月戊午朔日食在斗宿二十一度二十分食八分五十四秒申初一刻六分初虧申正二刻七分食甚酉初三刻一分復圓五年六月庚戌朔日食在井宿九度四十五分食九分四十七秒申初一刻十四分初虧申正二刻十一分食甚酉初二刻十四分復圓八年四月癸亥朔日食在婁宿十一度食五分二十九秒未初初刻八分初虧未正一刻十二分食甚申初二刻十三分復圓十年八月己卯朔日食在張宿九度二十九分食一分五十九秒申正一刻九分初虧酉初初刻七分食甚酉初二刻十四分復圓十五年五月壬午朔日食掌欽天監事南懷仁疏言依古法推算應食五分六十秒依新法推算應食二十微臣等登臺測驗本日酉正一刻日食未及一分戌初初刻十分復圓其古法所推失之甚逺而新法亦不盡符合者乃清蒙之氣使然按交食歷指等書言地中遊氣時時上騰能映小為大升卑為高如日月出入時與地平相近遊氣掩映比中天時望之其光較大此明驗也今五月朔日食原不過二十微因蒙氣之故自平地視之則為不及一分疏入下禮部知之二十年八月辛巳朔日食在翼宿初度二十三分食三分四十九秒辰正一刻七分初虧已初一刻七分食甚已正二刻五分復圓二十四年十一月丁巳朔日食在心宿一度二十二分食二分十九秒申初初刻八分初虧申初三刻十三分食甚申正二刻十四分復圓聖祖仁皇帝諭大學士等曰天象稍有愆違即當修省或施行政事有未當歟或下有寃抑未得伸歟廷臣詳議以聞二十七年四月癸卯朔日食在婁宿十度五十九分食九分四十九秒辰正初刻八分初虧已初一刻四分食甚已正二刻九分復圓先期諭大學士曰欽天監奏四月朔日食凡應行應革之事其令九卿詹事掌印科道集議以聞二十九年八月己未朔日食在張宿九度二十分食二分四十四秒卯正三刻五分初虧辰初二刻五分食甚辰正一刻十一分復圓三十年二月丁巳朔日食在危宿十度五十二分食三分二十一秒午正初刻二分初虧未初一刻五分食甚未正一刻十三分復圓三十一年正月辛亥朔日食在虛宿九度三十四分食五分十七秒午初三刻三分初虧未初初刻十四分食甚未正三刻二分復圓先期諭禮部曰天象之變見於嵗首朕兢惕靡寧力圖修省其罷元旦行禮筵宴至是覽欽天監所奏日食占驗有大臣黜近臣有憂之語諭大學士曰朕觀自古帝王於不肖大臣正法者頗多今設有貪汚之臣朕得其實亦必置之重典此皆係於人事凡占候當直書其占語今欽天監往往揣度時勢附會陳説如去年視有旱狀則用天時亢旱之占譸張殊甚可傳欽天監監正諭之三十四年十一月己未朔日食在尾宿三度二十六分食八分三十三秒申初二刻十三分初虧申正三刻六分食甚酉初三刻十二分復圓三十六年閏三月辛巳朔日食在婁宿一度五十七分食十分二十二秒辰初三刻八分初虧已初初刻七分食甚已正一刻七分復圓先期諭大學士曰日食雖可預推然自古帝王皆因此而戒懼蓋所以敬天變修人事也若庸主則委諸氣數矣可諭九卿有宜修改者悉以聞四十三年十一月丁酉朔日食在心宿一度二十六分食四分三十七秒先期欽天監預推午正三刻十一分初虧未正一刻食甚申初一刻七分復圓至期上以儀器測驗午正一刻十一分初虧未初三刻一分食甚申初一刻復圓諭詢欽天監監臣以推算未協請罪免之四十五年四月戊子朔日食在胃宿八度十八分食六分二十三秒酉正一刻六分初虧戌初初刻十三分食甚戌正初刻三分復圓四十七年八月甲辰朔日食在翼宿一度四十二分食五分十九秒申正三刻七分初虧酉初三刻三分食甚酉正二刻九分復圓四十八年八月己亥朔日食在張宿九度二十六分食四分五十四秒卯正初刻八分初虧卯正三刻十四分食甚辰初三刻十四分復圓五十一年六月癸丑朔日食在井宿十度三十二分食五分四十一秒寅初二刻十分初虧寅正二刻一分食甚卯初一刻十分復圓五十四年四月丙寅朔日食在婁宿十二度十九分食六分十二秒酉正初刻十一分初虧戌初初刻二分食甚戌初三刻六分復圓先期諭大學士九卿曰自古帝王敬天勤政凡遇垂象必實修人事以答天戒其係國計民生有應行應改者詳議以聞五十八年正月甲戌朔日食在危宿初度四十五分食七分申初初刻七分初虧申正一刻五分食甚酉初一刻十四分復圓諭大學士九卿曰元旦日食以隂雲微雪未見别省無雲之處必有見者况日值三始人事不可不謹政或有闕失諸臣確議以聞五十九年七月丙寅朔日食在栁宿五度十六分食七分二秒已正二刻四分初虧午正初刻十二分食甚未初三刻復圓六十年閏六月庚申朔日食在井宿二十九度四十二分食四分二秒酉初初刻七分初虧酉初三刻十四分食甚酉正三刻二分復圓雍正八年六月戊戌朔日食在井宿二十度四十二分食九分二十二秒午初初刻一分初虧午正三刻一分食甚未正二刻復圓先期世宗憲皇帝諭大學士等曰朕御極以來七年之中未遇日食今欽天監奏稱六月朔日食朕心深為畏懼時刻修省內外臣工宜共相勉朂以凜天戒尋山西巡撫石麟以至期陰雨不見食稱賀江寧織造隋赫德以是日陰雨過午晴明日光無虧稱賀俱奉旨切責又諭大學士等曰天象之災祥由於人事之得失若上天嘉佑而示以休徵欲人之知所黽勉永保令善於勿替也若上天譴責而示以咎徵欲人之知所恐懼痛加修省也日食乃上天垂象示警所當敬畏詎可以偶爾觀瞻之不顯而遂誇張以稱賀乎山西偶值陰雨不可以概天下江南日光不虧朕推求其故蓋日光外向過午之後已是漸次復圓之時所虧止二三分是以不顯虧缺之象昔年遇日食四五分之時日光照曜難以仰視皇考親率朕同諸兄弟在乾清宫用千里鏡測驗四周以紙遮蔽日光然後看出又豈可因此而怠忽天戒稍存縱肆之心乎慶賀之奏甚屬非理大違朕心宣諭中外知之九年十二月庚寅朔日食在斗宿初度二十六分食九分十一秒卯正三刻八分初虧辰初一刻十分帶食六分四十秒出地平辰初三刻四分食甚已初初刻五分復圓十三年九月丁酉朔日食在角宿二度五分食八分二十一秒辰初三刻二分初虧辰正三刻十四分食甚已正一刻三分復圓乾隆七年五月己未朔日食在畢宿七度十七分四秒卯正二刻十一分初虧辰初二刻七分食甚辰正二刻八分復圓十年三月癸酉朔日食在壁宿六度四十九分食一分十秒已正三刻十二分初虧午初三刻一分食甚午正二刻復圓十一年三月丁卯朔日食在室宿十一度二十三分食六分五十七秒已初二刻五分初虧午初初刻五分食甚午正二刻十分復圓先期上諭大學士等曰本月十六日月食三月初一日日食且自上冬以及今春雨雪稀少土膏待澤朕敬天勤民之心倍增乾惕所望大小臣工共體朕意加修省迓天和夫修省之道以實不以文其有關於民生國計者當盡心籌畫竭誠辦理以盡職守若朕躬有愆謬政事有闕失應行陳奏者即據實以聞不得避忌瞻徇亦不得牽引虗文負朕咨詢之意十二年七月己丑朔日食在栁宿六度三十三分食二分二十一秒申正三刻十四分初虧酉初二刻十分食甚酉正一刻三分復圓十六年五月丁酉朔日食在昴宿七度三十七分食四分四十一秒卯正三刻四分初虧辰初二刻九分食甚辰正二刻三分復圓先期諭曰日食天變之大者自古重之顧僅以引咎求言虛文從事夫豈應天以實之義乃者五月丁酉朔日有食之朕自惟宵旰憂勤無時不深乾惕寧待懸象著明始知戒謹然遇災而懼罔敢不欽戒懼修省惟崇實政行在鑾儀衛早晚鼓角是日著停止一日以示撤縣齋戒我君臣當就常存之敬畏倍加謹凛益修實政即如朕向來巡幸地方官惟修治道途此外一無華飾自乾隆十三年東巡該撫等於省會城市稍從觀美後乃踵事增華雖謂巷舞衢歌輿情共樂而以旬月經營僅供途次一覽實覺過於勞費且耳目之娛徒增喧聒朕心深所不取今嵗恭逢皇太后萬壽兆庶亦藉以申祝嘏之忱是以俯順民情至朕待督撫有司惟因其能實心辦事令地方日有起色方加恩奬豫而不知朕心者未必不以辦差華美求工取悅為得計將玩視民瘼專務浮華此風一開於吏治民風所關者甚大嗣後以違制論諭中外知之二十三年十二月癸丑朔日食在斗宿一度五十一分食八分五十一秒申初初刻五分初虧申正一刻五分食甚申正二刻六分帶食七分二十三秒入地平諭大學士九卿科道等曰春秋書日食古聖克警天戒惟是為兢兢兹者季冬之朔日食至八分之多望日又值月食一月之間雙曜薄蝕災莫大焉我君臣當動色相戒側席修省念邇年來西陲底定殊域來歸克奏膚功皆仰賴上蒼福佑在朕宵旰殷懷無刻不以持盈保泰為惕並非出於矯強亦中外臣民所共知苐人情當順適之時檢持或有未至昔人所稱人苦不自知良非虛語夫天心仁愛人事宜修倘用人行政之間有所闕失而不力為振飭何以禆政治而召休和在廷諸臣共襄治理寅恭夙夜宜有同心其各抒所見據實敷陳無有隱諱二十五年五月甲辰朔日食在參宿一度十七分食九分四十二秒申正一刻十一分初虧酉初一刻十二分食甚酉正一刻八分復圓諭大學士等曰序臨北至一陰始生薄蝕適逢益切乾惕所有本月朔內廷例用龍舟上年既以禱雨不行今雖際時和並飭停罷用申祗荷天仁示戒之至意二十七年九月庚申朔日食在角宿三度二十六分食五分四十秒申正三刻五分初虧酉初一刻十三分帶食五分四十秒入地平二十八年九月乙卯朔日食在軫宿六度一分食七分七秒卯正初刻九分初虧卯正一刻三分帶食一分三十四秒出地平辰初初刻二分食甚辰正初刻復圓三十四年五月壬午朔日食在畢宿八度三十八分食三分三十五秒酉初初刻五分初虧酉初三刻二分食甚酉正一刻十三分復圓三十五年五月丁丑朔日食在昴宿七度三十四分食三分五十三秒辰初二刻五分初虧辰正一刻十一分食甚已初一刻七分復圓三十八年三月庚寅朔日食在室宿十二度三十七分食四分十三秒未初一刻三分初虧未正二刻十分食甚申初三刻九分復圓三十九年八月壬午朔日食在張宿十度五十三分食三分五十一秒辰初初刻十四分初虧辰正初刻十二分食甚已初一刻三分復圓四十年八月丙子朔日食在張宿初度六分食四分三十三秒午初一刻六分初虧午正三刻七分食甚未正一刻二分復圓四十年十二月甲辰朔日食在斗宿二十三度四十三分食一分四十七秒已初二刻六分初虧已正一刻五分食甚午初初刻六分復圓四十九年七月甲寅朔日食在柳宿十六度二十一分食一分五十五秒卯初二刻二分初虧卯正初刻十四分食甚卯正三刻十四分復圓五十年七月戊申朔日食在柳宿五度三十五分食四分十七秒卯正二刻十二分初虧辰初二刻十三分食甚辰正三刻八分復圓御製厯象考成上編論日食臣等謹按考成上編論日食甚詳且繪圖繫説兹弗克具載僅録其要而以總論交食者冠列之交食由經緯同度太陰及於黃白二道之交因生薄蝕故名交食然白道出入黃道南北太陰每月必兩次過交而或食或否何也月追及於日而無距度為朔距日一百八十度為望此皆為東西同經其入交也正當黃道而無緯度是為南北同緯雖入交而非朔望則同緯而不同經當朔望而不入交則同經而不同緯皆無食必經緯同度而後有食也蓋合朔時月在日與地之間人目仰視與日月一線參直則月掩蔽日光即為日食望時地在日與月之間亦一線參直地蔽日光而生暗影其體尖圓是為暗虛月入其中則為月食也日為陽精星月皆借光焉月去日逺去人近合朔之頃特能下蔽人目而不能上侵日體故食分時刻南北逈殊東西異視也若夫月食則月入暗虛純為晦魄故九有同觀但時刻有先後耳定食限當較視緯度日食有南北差其視緯度隨地隨時不同最大之南北差一度零一分太陽最大之視半徑一十五分三十二秒三十微太陰最大之視半徑一十六分五十一秒兩視半徑相併得三十二分二十三秒三十微與南北差一度零一分相加得一度三十三分二十三秒三十微為視緯度以推距交經度得一十八度一十五分一十三秒為可食之限太陽最小之視半徑一十四分五十九秒三十微太陰最小之視半徑一十五分五十三秒三十微兩視半徑相併得三十分五十三秒與南北差一度零一分相加得一度三十一分五十三秒為視緯度以推距交經度得一十七度五十六分五十六秒為必食之限然在黃道北者必食在黃道南者或食或不食在黃道北者亦非普天之下皆見食但必有見食之地耳蓋視差因地里之南北而殊而視緯又因實緯之南北而異故食限不可一概而論也今以北極高一十六度至四十六度之地而定食限則太陰距黃道北平朔之限得二十度五十二分實朔之限得一十八度一十五分太陰距黃道南平朔之限得八度五十一分實朔之限得九度一十四分要之視差之故多端食限不過得其大概欲定食之有無必按法求得本地本時視緯度與太陽太陰兩視半徑相較若兩視半徑相併之數大於視緯者為有食小於視緯者為不食也定日食分秒以視緯視徑求日食分秒以太陽與太陰兩視半徑相併內減食甚視緯餘為兩體相掩之分乃命太陽視徑為十分以視徑度分與十分之比即同於減餘度分與十分中幾分之比而得食分為太陽視徑十分中之幾分也或食甚視緯大於併徑則兩周不相切為不食食甚視緯僅與併徑等則兩周相切而不相掩亦為不食或太陰正當黃道而無食甚視緯即以併徑為食分兩心相掩是為全食若遇太陰視徑小於太陽視徑則四周露光名為金環食也定三限時刻以食甚為本日食有三限曰初虧曰食甚曰復圓而無食既生光蓋太陽方食甚即生光也三限時刻曰用時曰近時曰真時三限所同而三限尤以食甚為本今先詳食甚時刻次及初虧復圓夫日食因有東西差必以太陽視經度當最近太陽之點為食甚其實經度與視經度既不同而實行與視行又不同故先以實朔交周求得食甚交周相減為交周升度差以月實行比例得時分加減實朔用時為食甚用時次以食甚用時求得東西差仍以月實行比例得時分加減食甚用時為食甚近時又以食甚近時求得東西差與用時東西差相較得視行然後以視行與用時東西差比例得時分加減食甚用時方為食甚真時是則食甚用時者乃在天實行日月相掩最深之時刻食甚真時者乃人目所見日月相掩最深之時刻而食甚近時者所以定視行以求用時與真時相距之時分者也夫食甚既有用時近時真時則初虧復圓亦必有用時近時真時乃今求日食初虧復圓用時則不以初虧復圓距食甚之時分加減食甚用時而以初虧復圓距食甚之時分加減食甚真時為初虧復圓用時次以初虧復圓用時求得東西差與食甚之東西差相較得視行乃以視行與初虧復圓距食甚之度比例得時分加減食甚真時即為初虧復圓真時然而不用近時者蓋為近時所以求視行今食甚已有東西差則與初虧復圓東西差相較即可以得視行故不必又求近時也要之求日食三限時刻必先求食甚真時而欲求食甚真時必先求食甚用時有食甚用時然後可以知三差之大小而三限時刻皆由此次第生焉定東西南北差以白平象限為本推步日食有三差曰高下差曰東西差曰南北差然東西差南北差又皆由高下差而生蓋食甚用時以地心立算自地面視之遂有地半徑差而太陽地半徑差恆小太陰地半徑差恆大於太陰地半徑差內減太陽地半徑差始為太陰高下差高下差既變真高為視高故經度之東西緯度之南北亦皆因之而變也西法求東西南北差以黃平象限為本者蓋以太陰在黃平象限東者視經度恆差而東太陰在黃平象限西者視經度恆差而西差而東者時刻宜減差而西者時刻宜加故日食之早晚必徵之東西差而後可定也北極出地二十三度半以上者黃平象限恆在天頂南太陰之視緯度恆差而南北極出地二十三度半以下者黃平象限有時在天頂北太陰之視緯度即差而北差而南者實緯在南則加在北則減差而北者實緯在南則減在北則加故日食之淺深必徵之南北差而後可定也其法自黃極作兩經圈一過真高一過視高兩經圈所截黃道度即實經度與視經度之較是為東西差兩經圈之較即實緯度與視緯度之較是為南北差三差相交成正弧三角形直角恆對高下差黃道高弧交角恆對南北差餘角恆對東西差惟太陰正當黃平象限則黃道經圈過天頂與高弧合真高視高同在一經圈上故高下差即南北差而無東西差黃平象限正當天頂則黃道與高弧合真高視高同在黃道上故高下差即東西差而無南北差過此距黃平象限愈近交角愈大則南北差大而東西差小距黃平象限愈逺交角愈小則南北差小而東西差大故必先求黃平象限及黃道高弧交角而後東西南北差可次第求焉今按太陰之經度為白道經度食甚實緯又與白道成直角則東西差乃白道之經差非黃道之經差也南北差乃白道之緯差非黃道之緯差也三差相交成正弧三角形亦白道與白道經圈及高弧所成之三角形非黃道與黃道經圈及高弧所成之三角形也夫白道與黃道斜交則白平象限之與黃平象限白道高弧交角之與黃道高弧交角亦皆有不同新法厯書因日食近兩交黃白二道相距不逺故止用黃道為省算究之必用白道方為密合故今求東西南北差以白平象限為本然白平象限以黃平象限為根而白道高弧交角又以黃道高弧交角為據知太隂距黃平象限東西及黃道高弧交角則可知太陰距白平象限東西及白道高弧交角矣定初虧復圓方位四象限以交角求舊定日食初虧復圓方位月在黃道北初虧西北復圓東北月在黃道南初虧西南復圓東南食八分以上初虧正西復圓正東此東西南北主黃道之經緯言與人目所見地平經度之東西南北頗不相合故今定初虧復圓之點在日體之上下左右乃於仰觀為親切也其法從天頂作高弧過日心至地平即分日體為左右兩半周又平分為上下兩象限即成左上左下右上右下四象限乃視月距黃道之南北距黃平象限之東西及交角之大小而初虧復圓之點可定矣如月在黃道上無緯度又在黃平象限上而交角滿九十度則初虧正右復圓正左在黃平象限西而交角在四十五度以上則初虧右稍偏下復圓左稍偏上交角在四十五度以下則初虧下稍偏右復圓上稍偏左在黃平象限東者反是若月在交前後有距緯則必求緯差角與交角相加減為定交角然後可定其上下左右也御製歷象考成後編論日食臣等謹按考成後編論日食推步法與上下編有異並繪圖繫説兹亦録其要而以總論交食者冠列之定實朔望以日躔月離求從來求實朔望有二法一用本日次日兩子正日月黃道實行度比例其相會之時刻為實朔相對之時刻為實望推逐月朔望用之以已有本年逐日之日躔月離故也一用本年首朔先求本月平朔望之時刻然後求其平行實行之差比例加減而得實朔望之時刻推交食用之因上考往古下推將來不必逐日悉推其躔離而即可徑求其朔望故也斯二法誠不可偏廢但從前交食求平行實行之差太陰惟用初均故甚整齊簡易今求太陰初均又有諸平均之加減既屬繁難而黃白大距又時時不同非推月離不得其準故今交食推實朔望合二法而兼用之先推平朔望以求其入交之月次推本日次日兩子正之日躔月離以求其實朔望之時又推本時次時兩日躔月離以比例其時刻較之舊法似為紆逺然太陰之行甚速因遲疾差之故一日之內行度時時不同且平行實行之差大者至八九度則平朔望與實朔望之相距即至十有餘時今以前後兩時相比例較之止用兩子正實行度相比例者固為精密即較之以距時為比例者亦又加詳矣定食甚時刻以斜距度比例求舊法以實朔用時即為日食食甚用時以實望用時即為月食食甚時刻皆黃白同經後因此時兩心斜距猶逺惟自白極過太陽作經圈與白道成直角太隂臨此直角之點兩心相距最近始為食甚故以白道升度差為食甚距弧以一小時月距日實行比例得時分與實朔望用時相加減方為食甚時刻月食即食甚時刻日食為食甚用時今法用日躔月離比例求實朔望是為黃道同經較之舊法去食甚為尤逺而其求食甚之法則亦以兩心相距最近為食甚實緯以實朔望太陰距最近點之度為食甚距弧又以黃白二道原非平行而日月兩經常相斜距若以太陽為不動則太陰如由斜距線行故求兩心相距最近之線不與白道成直角而與斜距線成直角其距弧變時亦不以月距日實行度為比例而以斜距度為比例雖度分時刻所差無多而其理更為細密定日食三差以白經高弧交角求日食三差之法以黃白二道交角與黃道高弧交角相加減得白道高弧交角白道與高弧及白道經圈相交成正弧三角形直角對高下差交角對南北差餘角對東西差上編言之詳矣今以黃赤二經交角加減黃白二經交角得赤白二經交角與赤經高弧交角相加減得白經高弧交角對東西差餘角對南北差蓋白道與白道經圈相交其角必九十度白經高弧交角即白道高弧交角之餘凡弧角與九十度相減所餘為餘弧餘角是用白經高弧交角與用白道高弧交角等且以赤經高弧交角與黃道赤經交角相加減得黃道高弧交角又加減黃白二道交角為白道髙弧交角須加減二次而黃赤二經交角即黃道赤經交角之餘交食時日必近交黃白二經交角又即與黃白二道交角等故以黃赤二經交角與黃白二經交角相加減得赤白二經交角則為初虧食甚復圓同用之數至求三限白經高弧交角止與赤經高弧交角